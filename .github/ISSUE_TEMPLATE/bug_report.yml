name: Bug Report
description: Report a bug in DartLab / DartLab 버그 신고
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.
        버그 신고 감사합니다. 아래 항목을 작성해 주세요.

  - type: input
    id: version
    attributes:
      label: DartLab Version
      description: "Output of `python -c \"import dartlab; print(dartlab.__version__)\"`"
      placeholder: "0.7.10"
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      options:
        - "3.12"
        - "3.13"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of DartLab is affected?
      options:
        - "Company / Core"
        - "DART Provider"
        - "EDGAR Provider"
        - "Finance / Ratios"
        - "Analysis / Grading"
        - "Sections / Report"
        - "AI / LLM"
        - "MCP Server"
        - "CLI"
        - "Server API"
        - "Charts"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear description of the bug. (Korean OK)"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: "Minimal code to reproduce the issue."
      render: python
      placeholder: |
        import dartlab
        c = dartlab.Company("005930")
        result = c.show("IS")()
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      render: text
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - "Windows"
        - "macOS"
        - "Linux"
        - "WSL"
        - "Google Colab"
    validations:
      required: false
