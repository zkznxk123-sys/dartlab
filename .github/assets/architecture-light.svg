  <text x="544" y="487" fill="#0c4a6e" font-size="9">InspectDataset</text>
  <text x="544" y="507" fill="#0c4a6e" font-size="10" font-weight="700">외부 (2)</text>
  <text x="544" y="522" fill="#0c4a6e" font-size="9">WebSearch · Read</text>
  <text x="544" y="542" fill="#0c4a6e" font-size="10" font-weight="700">출력 · 작업대 (3)</text>
