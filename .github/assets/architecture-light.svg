<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1500" font-family="-apple-system,'Apple SD Gothic Neo',Pretendard,'Noto Sans KR',sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrCall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ca8a04"/>
    </marker>
    <linearGradient id="workbenchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1500" fill="#ffffff"/>

  <text x="40" y="32" fill="#0f172a" font-size="18" font-weight="800">DartLab — 전문 금융 AI 플랫폼</text>
  <text x="40" y="52" fill="#475569" font-size="11">1 차 데이터 (DART · SEC · 향후 EDINET) + 분석 엔진 + AI 자율 작업대 + Skill OS 환류</text>

  <rect x="260" y="76" width="280" height="42" rx="21" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="103" text-anchor="middle" fill="#1e3a8a" font-weight="700" font-size="13">① 사람 · 외부 LLM (MCP)</text>

  <rect x="30" y="148" width="350" height="64" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="205" y="174" text-anchor="middle" fill="#1e3a8a" font-weight="700" font-size="15">dartlab.ask("…")</text>
  <text x="205" y="195" text-anchor="middle" fill="#1e40af" font-size="11">— AI · 외부 LLM 입구</text>

  <rect x="420" y="148" width="350" height="64" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="595" y="174" text-anchor="middle" fill="#1e3a8a" font-weight="700" font-size="15">dartlab.Company(code)</text>
  <text x="595" y="195" text-anchor="middle" fill="#1e40af" font-size="11">— 사람 파사드</text>

  <line x1="350" y1="118" x2="210" y2="148" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="450" y1="118" x2="590" y2="148" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <rect x="20" y="240" width="760" height="500" rx="14" fill="url(#workbenchGrad)" stroke="#dc2626" stroke-width="2.5"/>
  <text x="40" y="270" fill="#991b1b" font-weight="800" font-size="16">③ AI 자율 작업대 — chat-native 루프</text>
  <text x="40" y="291" fill="#475569" font-size="11">LLM 이 매 iteration 도구 자율 호출 · Ref 검산 강제 · 외부 본문 untrusted · graph 강제 X</text>

  <text x="40" y="320" fill="#c2410c" font-weight="700" font-size="11">운용 자원 3 종 — 사람 자산이 자동으로 AI 의 도구가 된다</text>

  <rect x="40" y="332" width="720" height="118" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="60" y="358" fill="#78350f" font-weight="800" font-size="14">Skill OS</text>
  <text x="60" y="376" fill="#78350f" font-size="11">skills/specs/ — engines · operation · runtime · start · recipe</text>
  <text x="60" y="402" fill="#92400e" font-size="12" font-style="italic">"엔진이 다리 — 한 파일이 사람 분석엔진이자 AI skill 본문"</text>
  <text x="60" y="424" fill="#78350f" font-size="11" font-weight="700">↑ 사람 문서 = AI 의 스킬 (이중 용도)</text>
  <text x="60" y="442" fill="#a16207" font-size="10">사람 작성 → AI 검색·호출 → 시장 검증 → 사람 갱신</text>

  <rect x="40" y="462" width="720" height="118" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.3"/>
  <text x="60" y="488" fill="#581c87" font-weight="800" font-size="14">Capability</text>
  <text x="60" y="506" fill="#7e22ce" font-size="11">core/capability/ — 공개 API + docstring 인덱스</text>
  <text x="60" y="532" fill="#581c87" font-size="12" font-style="italic">함수 docstring = AI tool schema (자동 생성)</text>
  <text x="60" y="554" fill="#581c87" font-size="11" font-weight="700">_generated.py · _generated_analysis_graph.py</text>
  <text x="60" y="572" fill="#7e22ce" font-size="10">RunPython 안에서 모든 capability 직접 호출 가능</text>

  <rect x="40" y="592" width="720" height="138" rx="6" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.3"/>
  <text x="60" y="618" fill="#0c4a6e" font-weight="800" font-size="14">Tools — canonical 11 (화이트리스트 강제)</text>
  <text x="60" y="644" fill="#0c4a6e" font-size="12">메타 읽기      ·  ReadSkill · GetSkillBody · ReadCapability</text>
  <text x="60" y="666" fill="#0c4a6e" font-size="12">데이터 실행    ·  RunPython · EngineCall · InspectDataset</text>
  <text x="60" y="688" fill="#0c4a6e" font-size="12">외부            ·  WebSearch · Read</text>
  <text x="60" y="710" fill="#0c4a6e" font-size="12">출력 · 작업대   ·  SaveArtifact · CompileVisual · RunWorkbench</text>

  <line x1="205" y1="212" x2="205" y2="240" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="595" y1="212" x2="595" y2="240" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <rect x="160" y="780" width="480" height="60" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="804" text-anchor="middle" fill="#581c87" font-weight="800" font-size="14">④ L3 종합 — story</text>
  <text x="400" y="824" text-anchor="middle" fill="#7e22ce" font-size="11">6 막 인과 보고서 조립 (경제→섹터→기업→재무→가치→가격)</text>

  <line x1="400" y1="740" x2="400" y2="780" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrCall)"/>
  <text x="412" y="765" fill="#dc2626" font-size="11" font-weight="700">호출</text>

  <text x="20" y="876" fill="#15803d" font-weight="700" font-size="13">⑤ L2 — 공식 분석 엔진 (1 차 데이터 → 신호 · 등급 · 팩터)</text>

  <g>
    <rect x="20" y="888" width="245" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.3"/>
    <text x="142" y="912" text-anchor="middle" fill="#14532d" font-weight="800" font-size="14">analysis</text>
    <text x="142" y="931" text-anchor="middle" fill="#166534" font-size="11">22 축 재무·정성</text>
    <text x="142" y="950" text-anchor="middle" fill="#475569" font-size="10">수익성·성장·현금흐름·세그먼트</text>

    <rect x="277" y="888" width="245" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.3"/>
    <text x="400" y="912" text-anchor="middle" fill="#14532d" font-weight="800" font-size="14">credit</text>
    <text x="400" y="931" text-anchor="middle" fill="#166534" font-size="11">7 축 dCR 신용 등급</text>
    <text x="400" y="950" text-anchor="middle" fill="#475569" font-size="10">독립 등급 · 부도 거리</text>

    <rect x="534" y="888" width="245" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.3"/>
    <text x="657" y="912" text-anchor="middle" fill="#14532d" font-weight="800" font-size="14">macro</text>
    <text x="657" y="931" text-anchor="middle" fill="#166534" font-size="11">6 막 거시</text>
    <text x="657" y="950" text-anchor="middle" fill="#475569" font-size="10">cycle · rates · crisis 국면</text>
  </g>

  <g>
    <rect x="148" y="978" width="245" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.3"/>
    <text x="270" y="1002" text-anchor="middle" fill="#14532d" font-weight="800" font-size="14">quant</text>
    <text x="270" y="1021" text-anchor="middle" fill="#166534" font-size="11">31 축 정량</text>
    <text x="270" y="1040" text-anchor="middle" fill="#475569" font-size="10">모멘텀 · 변동성 · 팩터</text>

    <rect x="406" y="978" width="245" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.3"/>
    <text x="528" y="1002" text-anchor="middle" fill="#14532d" font-weight="800" font-size="14">industry</text>
    <text x="528" y="1021" text-anchor="middle" fill="#166534" font-size="11">산업 + 피어 비교</text>
    <text x="528" y="1040" text-anchor="middle" fill="#475569" font-size="10">taxonomy · 동종사 분포</text>
  </g>

  <line x1="400" y1="840" x2="400" y2="888" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrCall)"/>

  <text x="20" y="1100" fill="#0e7490" font-weight="700" font-size="13">⑥ L1.5 — 횡단 처리 엔진 (전 종목·전 시장 axis)</text>

  <g>
    <rect x="20" y="1112" width="245" height="100" rx="6" fill="#cffafe" stroke="#06b6d4" stroke-width="1.3"/>
    <text x="142" y="1136" text-anchor="middle" fill="#155e75" font-weight="800" font-size="14">gather</text>
    <text x="142" y="1156" text-anchor="middle" fill="#0e7490" font-size="10">11 축 멀티소스 외부 1 차 조달</text>
    <text x="142" y="1174" text-anchor="middle" fill="#475569" font-size="9">가격 · 뉴스 · 거시 · 수급 · 배당 · 소유</text>
    <text x="142" y="1190" text-anchor="middle" fill="#475569" font-size="9">FRED · ECOS · Naver · Google News</text>

    <rect x="277" y="1112" width="245" height="100" rx="6" fill="#cffafe" stroke="#06b6d4" stroke-width="1.3"/>
    <text x="400" y="1136" text-anchor="middle" fill="#155e75" font-weight="800" font-size="14">company — 종목 파사드</text>
    <text x="400" y="1156" text-anchor="middle" fill="#0e7490" font-size="10">provider 라우팅</text>
    <text x="400" y="1174" text-anchor="middle" fill="#475569" font-size="9">DartCompany (DART) · EdgarCompany (SEC)</text>
    <text x="400" y="1190" text-anchor="middle" fill="#475569" font-size="9">+ EdinetCompany (일본 · 확장 예정)</text>

    <rect x="534" y="1112" width="245" height="100" rx="6" fill="#cffafe" stroke="#06b6d4" stroke-width="1.3"/>
    <text x="657" y="1136" text-anchor="middle" fill="#155e75" font-weight="800" font-size="14">scan + search (BETA)</text>
    <text x="657" y="1156" text-anchor="middle" fill="#0e7490" font-size="10">전 시장 횡단 ranking · 공시 검색</text>
    <text x="657" y="1174" text-anchor="middle" fill="#475569" font-size="9">prebuilt parquet · BM25 인덱스</text>
    <text x="657" y="1190" text-anchor="middle" fill="#475569" font-size="9">screen · governance · moat 등</text>
  </g>

  <line x1="142" y1="1056" x2="142" y2="1112" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="400" y1="1056" x2="400" y2="1112" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="528" y1="1056" x2="657" y2="1112" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arr)"/>

  <rect x="20" y="1244" width="760" height="62" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="400" y="1268" text-anchor="middle" fill="#7c2d12" font-weight="800" font-size="14">⑦ L0 core/ — 공통 인프라</text>
  <text x="400" y="1290" text-anchor="middle" fill="#9a3412" font-size="11">mappers (95 / 97 % 매핑) · data · cache (polars · BoundedCache) · providers · viz · dashboard</text>

  <line x1="142" y1="1212" x2="200" y2="1244" stroke="#06b6d4" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="400" y1="1212" x2="400" y2="1244" stroke="#06b6d4" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="657" y1="1212" x2="600" y2="1244" stroke="#06b6d4" stroke-width="1.3" marker-end="url(#arr)"/>

  <ellipse cx="400" cy="1346" rx="320" ry="28" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="400" y="1342" text-anchor="middle" fill="#0f172a" font-weight="800" font-size="14">⑧ 외부 1 차 소스 — untrusted</text>
  <text x="400" y="1362" text-anchor="middle" fill="#475569" font-size="11">DART · SEC EDGAR · 가격 · 뉴스 · (향후 EDINET)</text>
  <line x1="400" y1="1306" x2="400" y2="1318" stroke="#ea580c" stroke-width="1.3" marker-end="url(#arr)"/>

  <rect x="20" y="1396" width="760" height="62" rx="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="40" y="1420" fill="#713f12" font-weight="800" font-size="13">⑨ 3 자 진화 루프 — AI 자율 진화 아님 (사람 + 시장 + AI)</text>
  <text x="40" y="1442" fill="#a16207" font-size="11">답변 + Ref ──outcome_log──▶ 시장 N 일 후 reflection ──사람 검토──▶ Skill OS · 엔진 docstring 갱신 ──↻ 다음 호출 강화──▶ 작업대로 환류</text>

  <path d="M 780 470 Q 798 470, 798 1396" fill="none" stroke="#ca8a04" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrLoop)"/>
  <text x="788" y="930" fill="#a16207" font-size="10" font-weight="700" transform="rotate(90 788 930)">답변 → 시장 → 사람 검토</text>

  <path d="M 20 1426 Q 4 1426, 4 240 L 40 240" fill="none" stroke="#ca8a04" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrLoop)"/>
  <text x="14" y="830" fill="#a16207" font-size="10" font-weight="700" transform="rotate(-90 14 830)">갱신 → 다음 호출 강화</text>

  <g transform="translate(40, 1486)">
    <text x="0" y="0" fill="#475569" font-size="10">실선 ▶ 데이터·제어 흐름</text>
    <text x="160" y="0" fill="#475569" font-size="10">빨강 ▶ 호출 (use)</text>
    <text x="280" y="0" fill="#475569" font-size="10">청록 ▶ 데이터 의존</text>
    <text x="400" y="0" fill="#475569" font-size="10">노랑 점선 ▶ 진화 루프</text>
    <text x="720" y="0" fill="#94a3b8" font-size="10" text-anchor="end">github.com/eddmpython/dartlab</text>
  </g>
</svg>
