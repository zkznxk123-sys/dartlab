  <text x="156" y="510" text-anchor="middle" fill="#92400e" font-size="9" font-style="italic">한 파일이 사람 분석엔진</text>
  <text x="156" y="523" text-anchor="middle" fill="#92400e" font-size="9" font-style="italic">이자 AI skill 본문"</text>
