  <rect width="800" height="1340" fill="#ffffff"/>

  <text x="40" y="32" fill="#0f172a" font-size="18" font-weight="800">DartLab — 전문 금융 AI 플랫폼</text>
  <text x="40" y="52" fill="#475569" font-size="11">1 차 데이터 (DART · SEC · 향후 EDINET) + 분석 엔진 + AI 자율 작업대 + Skill OS 환류</text>

  <rect x="260" y="76" width="280" height="42" rx="21" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="103" text-anchor="middle" fill="#1e3a8a" font-weight="700" font-size="13">① 사람 · 외부 LLM (MCP)</text>

  <rect x="30" y="148" width="350" height="64" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="205" y="174" text-anchor="middle" fill="#1e3a8a" font-weight="700" font-size="15">dartlab.ask("…")</text>
  <text x="205" y="195" text-anchor="middle" fill="#1e40af" font-size="11">— AI · 외부 LLM 입구</text>

  <rect x="420" y="148" width="350" height="64" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="595" y="174" text-anchor="middle" fill="#1e3a8a" font-weight="700" font-size="15">dartlab.Company(code)</text>
