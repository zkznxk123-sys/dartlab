<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" font-family="-apple-system,'Apple SD Gothic Neo',Pretendard,'Noto Sans KR',sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrCall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ca8a04"/>
    </marker>
  </defs>

  <rect width="1100" height="880" fill="#ffffff"/>

  <!-- ① 사용자 -->
  <rect x="430" y="20" width="240" height="42" rx="21" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="550" y="46" text-anchor="middle" font-weight="600" fill="#1e3a8a">① 사람 · 외부 LLM (MCP)</text>

  <!-- ② 입구 두 갈래 -->
  <rect x="240" y="100" width="240" height="62" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="360" y="124" text-anchor="middle" font-weight="700" fill="#1e3a8a" font-size="14">dartlab.ask("…")</text>
  <text x="360" y="146" text-anchor="middle" fill="#1e40af" font-size="11">— AI · 외부 LLM 입구</text>

  <rect x="620" y="100" width="240" height="62" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="740" y="124" text-anchor="middle" font-weight="700" fill="#1e3a8a" font-size="14">dartlab.Company(code)</text>
  <text x="740" y="146" text-anchor="middle" fill="#1e40af" font-size="11">— 사람 파사드</text>

  <line x1="510" y1="62" x2="370" y2="100" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="590" y1="62" x2="730" y2="100" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ③ AI 루프 -->
  <rect x="220" y="200" width="280" height="74" rx="12" fill="#1d4ed8" stroke="#1e40af" stroke-width="2.5"/>
  <text x="360" y="226" text-anchor="middle" font-weight="800" fill="#ffffff" font-size="15">② chat-native 루프</text>
  <text x="360" y="248" text-anchor="middle" fill="#dbeafe" font-size="11">LLM 자율 도구 호출 · Ref 검산</text>
  <text x="360" y="264" text-anchor="middle" fill="#dbeafe" font-size="11">외부 본문 untrusted 마커</text>

  <line x1="360" y1="162" x2="360" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ③ 도구 표면 (5 카테고리) -->
  <text x="36" y="324" font-weight="700" fill="#312e81" font-size="13">③ 도구 표면 — canonical 11 개</text>

  <g>
    <rect x="20"  y="334" width="180" height="92" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="110" y="354" text-anchor="middle" font-weight="700" fill="#312e81" font-size="12">메타 읽기</text>
    <text x="110" y="375" text-anchor="middle" fill="#312e81" font-size="11">ReadSkill</text>
    <text x="110" y="392" text-anchor="middle" fill="#312e81" font-size="11">GetSkillBody</text>
    <text x="110" y="409" text-anchor="middle" fill="#312e81" font-size="11">ReadCapability</text>

    <rect x="220" y="334" width="180" height="92" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="310" y="354" text-anchor="middle" font-weight="700" fill="#312e81" font-size="12">데이터 실행</text>
    <text x="310" y="375" text-anchor="middle" fill="#312e81" font-size="11">RunPython</text>
    <text x="310" y="392" text-anchor="middle" fill="#312e81" font-size="11">EngineCall</text>
    <text x="310" y="409" text-anchor="middle" fill="#312e81" font-size="11">InspectDataset</text>

    <rect x="420" y="334" width="180" height="92" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="510" y="354" text-anchor="middle" font-weight="700" fill="#312e81" font-size="12">외부</text>
    <text x="510" y="375" text-anchor="middle" fill="#312e81" font-size="11">WebSearch</text>
    <text x="510" y="392" text-anchor="middle" fill="#312e81" font-size="11">Read</text>

    <rect x="620" y="334" width="180" height="92" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="710" y="354" text-anchor="middle" font-weight="700" fill="#312e81" font-size="12">출력</text>
    <text x="710" y="375" text-anchor="middle" fill="#312e81" font-size="11">SaveArtifact</text>
    <text x="710" y="392" text-anchor="middle" fill="#312e81" font-size="11">CompileVisual</text>

    <rect x="820" y="334" width="180" height="92" rx="6" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="910" y="354" text-anchor="middle" font-weight="700" fill="#312e81" font-size="12">작업대</text>
    <text x="910" y="375" text-anchor="middle" fill="#312e81" font-size="11">RunWorkbench</text>
  </g>

  <!-- AI 루프 ↔ 도구 (양방향) -->
  <line x1="360" y1="274" x2="360" y2="334" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text x="372" y="308" fill="#1d4ed8" font-size="10" font-weight="600">매 iteration 자율 호출</text>

  <!-- 답변 + Ref (AI 루프 좌측 출구) -->
  <rect x="20" y="208" width="172" height="58" rx="29" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="106" y="232" text-anchor="middle" font-weight="700" fill="#1e3a8a" font-size="12">답변 + Ref 검산</text>
  <text x="106" y="252" text-anchor="middle" fill="#1e40af" font-size="10">executionRef · tableRef · webRef</text>
  <line x1="220" y1="237" x2="192" y2="237" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ④ 메타 계층 (좌, 좀 더 작게) -->
  <text x="36" y="466" font-weight="700" fill="#78350f" font-size="13">④ 메타 계층 — 도구가 '읽는' 곳</text>

  <rect x="20" y="478" width="200" height="180" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="120" y="502" text-anchor="middle" font-weight="800" fill="#78350f" font-size="13">Skill OS</text>
  <text x="120" y="520" text-anchor="middle" fill="#78350f" font-size="11">skills/specs/</text>
  <text x="120" y="536" text-anchor="middle" fill="#92400e" font-size="10">engines · operation</text>
  <text x="120" y="550" text-anchor="middle" fill="#92400e" font-size="10">runtime · start</text>

  <line x1="40" y1="568" x2="200" y2="568" stroke="#fbbf24" stroke-dasharray="3 2"/>

  <text x="120" y="590" text-anchor="middle" font-weight="800" fill="#78350f" font-size="13">Capability</text>
  <text x="120" y="608" text-anchor="middle" fill="#78350f" font-size="11">core/capability/</text>
  <text x="120" y="624" text-anchor="middle" fill="#92400e" font-size="10">공개 API · docstring</text>
  <text x="120" y="640" text-anchor="middle" fill="#92400e" font-size="10">인덱스</text>

  <!-- 메타 읽기 도구 → 메타 계층 -->
  <path d="M 110 426 Q 90 450, 90 478" fill="none" stroke="#ca8a04" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrLoop)"/>
  <text x="40" y="454" fill="#a16207" font-size="10" font-weight="600">읽기</text>

  <!-- ⑤ 엔진 계층 (우, 두 행) -->
  <text x="244" y="466" font-weight="700" fill="#0f172a" font-size="13">⑤ 엔진 계층 — 도구가 '실행하는' 곳</text>

  <rect x="240" y="478" width="840" height="180" rx="6" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 3"/>

  <text x="252" y="498" font-weight="700" fill="#14532d" font-size="11">분석 — 생성</text>
  <g>
    <rect x="252" y="504" width="112" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/>
    <text x="308" y="522" text-anchor="middle" font-weight="700" fill="#14532d" font-size="11">analysis</text>
    <text x="308" y="538" text-anchor="middle" fill="#166534" font-size="9">재무·정성</text>

    <rect x="372" y="504" width="112" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/>
    <text x="428" y="522" text-anchor="middle" font-weight="700" fill="#14532d" font-size="11">credit</text>
    <text x="428" y="538" text-anchor="middle" fill="#166534" font-size="9">신용</text>

    <rect x="492" y="504" width="112" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/>
    <text x="548" y="522" text-anchor="middle" font-weight="700" fill="#14532d" font-size="11">quant</text>
    <text x="548" y="538" text-anchor="middle" fill="#166534" font-size="9">팩터·백테스트</text>

    <rect x="612" y="504" width="112" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/>
    <text x="668" y="522" text-anchor="middle" font-weight="700" fill="#14532d" font-size="11">story</text>
    <text x="668" y="538" text-anchor="middle" fill="#166534" font-size="9">서사 6 막</text>

    <rect x="732" y="504" width="112" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/>
    <text x="788" y="522" text-anchor="middle" font-weight="700" fill="#14532d" font-size="11">industry</text>
    <text x="788" y="538" text-anchor="middle" fill="#166534" font-size="9">산업</text>

    <rect x="852" y="504" width="112" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/>
    <text x="908" y="522" text-anchor="middle" font-weight="700" fill="#14532d" font-size="11">dashboard</text>
    <text x="908" y="538" text-anchor="middle" fill="#166534" font-size="9">대시보드</text>

    <rect x="972" y="504" width="100" height="42" rx="5" fill="#dcfce7" stroke="#16a34a"/>
    <text x="1022" y="522" text-anchor="middle" font-weight="700" fill="#14532d" font-size="11">recipe</text>
    <text x="1022" y="538" text-anchor="middle" fill="#166534" font-size="9">분석 절차</text>
  </g>

  <text x="252" y="572" font-weight="700" fill="#0f172a" font-size="11">데이터 — 조달·조회</text>
  <g>
    <rect x="252" y="578" width="112" height="42" rx="5" fill="#f1f5f9" stroke="#475569"/>
    <text x="308" y="596" text-anchor="middle" font-weight="700" fill="#0f172a" font-size="11">company</text>
    <text x="308" y="612" text-anchor="middle" fill="#334155" font-size="9">종목 파사드</text>

    <rect x="372" y="578" width="112" height="42" rx="5" fill="#f1f5f9" stroke="#475569"/>
    <text x="428" y="596" text-anchor="middle" font-weight="700" fill="#0f172a" font-size="11">scan</text>
    <text x="428" y="612" text-anchor="middle" fill="#334155" font-size="9">전 시장</text>

    <rect x="492" y="578" width="112" height="42" rx="5" fill="#f1f5f9" stroke="#475569"/>
    <text x="548" y="596" text-anchor="middle" font-weight="700" fill="#0f172a" font-size="11">macro</text>
    <text x="548" y="612" text-anchor="middle" fill="#334155" font-size="9">거시</text>

    <rect x="612" y="578" width="112" height="42" rx="5" fill="#f1f5f9" stroke="#475569"/>
    <text x="668" y="596" text-anchor="middle" font-weight="700" fill="#0f172a" font-size="11">gather</text>
    <text x="668" y="612" text-anchor="middle" fill="#334155" font-size="9">뉴스·공시</text>

    <rect x="732" y="578" width="112" height="42" rx="5" fill="#f1f5f9" stroke="#475569"/>
    <text x="788" y="596" text-anchor="middle" font-weight="700" fill="#0f172a" font-size="11">search</text>
    <text x="788" y="612" text-anchor="middle" fill="#334155" font-size="9">전문</text>

    <rect x="852" y="578" width="112" height="42" rx="5" fill="#f1f5f9" stroke="#475569"/>
    <text x="908" y="596" text-anchor="middle" font-weight="700" fill="#0f172a" font-size="11">edgar</text>
    <text x="908" y="612" text-anchor="middle" fill="#334155" font-size="9">SEC</text>

    <rect x="972" y="578" width="100" height="42" rx="5" fill="#f1f5f9" stroke="#475569"/>
    <text x="1022" y="596" text-anchor="middle" font-weight="700" fill="#0f172a" font-size="11">viz</text>
    <text x="1022" y="612" text-anchor="middle" fill="#334155" font-size="9">시각화</text>
  </g>

  <!-- 데이터 실행 도구 → 엔진 계층 -->
  <path d="M 310 426 Q 380 450, 460 478" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrCall)"/>
  <text x="358" y="454" fill="#4338ca" font-size="10" font-weight="600">호출</text>

  <!-- dartlab.Company → 엔진 (우측 긴 곡선) -->
  <path d="M 740 162 Q 1080 200, 1080 478" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="0" marker-end="url(#arr)"/>
  <text x="1040" y="320" fill="#1e40af" font-size="10" font-weight="600">파사드 호출</text>

  <!-- ⑥ core -->
  <rect x="240" y="688" width="840" height="62" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="660" y="710" text-anchor="middle" font-weight="800" fill="#7c2d12" font-size="13">⑥ core/ — 공통 인프라</text>
  <text x="660" y="730" text-anchor="middle" fill="#7c2d12" font-size="11">mappers (95 / 97% 매핑)  ·  data · cache (polars · BoundedCache)  ·  providers (DART · EDGAR · 가격 어댑터)</text>

  <line x1="660" y1="658" x2="660" y2="688" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ⑦ 외부 소스 -->
  <ellipse cx="660" cy="800" rx="280" ry="32" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="660" y="797" text-anchor="middle" font-weight="800" fill="#7f1d1d" font-size="13">⑦ 외부 소스</text>
  <text x="660" y="816" text-anchor="middle" fill="#7f1d1d" font-size="11">DART · SEC EDGAR · 가격 · 뉴스</text>
  <line x1="660" y1="750" x2="660" y2="768" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ⑧ 진화 루프 (좌측 세로 곡선) -->
  <text x="20" y="694" font-weight="700" fill="#713f12" font-size="13">⑧ 진화 루프</text>

  <!-- 답변 → 시장 → reflection → 사람 검토 → 메타 갱신 -->
  <rect x="20" y="704" width="200" height="42" rx="21" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="120" y="724" text-anchor="middle" font-weight="700" fill="#713f12" font-size="11">시장 N 일 후 reflection</text>
  <text x="120" y="738" text-anchor="middle" fill="#854d0e" font-size="10">outcome_log → resolved</text>

  <rect x="20" y="766" width="200" height="42" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="120" y="786" text-anchor="middle" font-weight="700" fill="#713f12" font-size="11">사람 검토</text>
  <text x="120" y="800" text-anchor="middle" fill="#854d0e" font-size="10">skill / docstring 갱신</text>

  <!-- 답변 → 시장 reflection (긴 좌측 곡선) -->
  <path d="M 20 240 Q -20 470, 60 704" fill="none" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrLoop)"/>
  <text x="-30" y="480" fill="#a16207" font-size="10" font-weight="600" transform="rotate(-90 -30 480)">outcome_log</text>

  <!-- 시장 reflection → 사람 검토 -->
  <line x1="120" y1="746" x2="120" y2="766" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrLoop)"/>

  <!-- 사람 검토 → 메타 (Capability 위로) -->
  <path d="M 220 787 Q 240 720, 220 660" fill="none" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrLoop)"/>
  <text x="222" y="724" fill="#a16207" font-size="10" font-weight="600">갱신</text>

  <!-- 범례 -->
  <g transform="translate(820, 20)">
    <rect width="260" height="62" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="10" y="18" font-weight="700" fill="#334155" font-size="11">범례</text>
    <line x1="10" y1="32" x2="40" y2="32" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="46" y="35" fill="#334155" font-size="10">데이터·제어 흐름</text>
    <line x1="140" y1="32" x2="170" y2="32" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrCall)"/>
    <text x="176" y="35" fill="#334155" font-size="10">도구 호출</text>
    <line x1="10" y1="50" x2="40" y2="50" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrLoop)"/>
    <text x="46" y="53" fill="#334155" font-size="10">진화 루프 (반영·갱신)</text>
  </g>
</svg>
