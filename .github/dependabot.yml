version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "보안"
      include: "scope"
    open-pull-requests-limit: 2
    groups:
      python-runtime:
        patterns:
          - "polars*"
          - "pyarrow"
          - "duckdb"
          - "fastapi"
          - "uvicorn*"
          - "starlette"
          - "sse-starlette"
          - "httpx"
          - "huggingface-hub"
          - "pydantic*"
          - "plotly"
      python-test-tooling:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "syrupy"
          - "pandera*"
          - "mutmut"
          - "ruff"
      python-ai-tooling:
        patterns:
          - "openai"
          - "anthropic"
          - "mcp*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "보안"
      include: "scope"
    open-pull-requests-limit: 1
    groups:
      gh-actions-all:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/landing"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "landing"
    commit-message:
      prefix: "보안"
      include: "scope"
    open-pull-requests-limit: 1
    groups:
      landing-all:
        patterns:
          - "*"
