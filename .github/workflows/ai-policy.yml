name: Policy Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ai-marker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check banned AI markers
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            python scripts/audit/check_no_ai_markers.py --check-range "$PR_BASE" "$PR_HEAD"
          else
            python scripts/audit/check_no_ai_markers.py --check-range "$PUSH_BEFORE" "$PUSH_HEAD"
          fi
