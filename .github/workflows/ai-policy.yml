name: Policy Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ai-marker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check banned AI markers
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            python scripts/audit/check_no_ai_markers.py --check-range "$PR_BASE" "$PR_HEAD"
          else
            python scripts/audit/check_no_ai_markers.py --check-range "$PUSH_BEFORE" "$PUSH_HEAD"
          fi

  block-coreloop-auto-merge:
    # Phase R auto-merge 3중 방어의 1차 (workflow) — [CORELOOP-R] PR 에 auto-merge 라벨 금지
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, '[CORELOOP-')
    runs-on: ubuntu-latest
    steps:
      - name: Block auto-merge label on coreloop PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const labels = pr.labels.map(l => l.name);
            if (labels.includes('auto-merge')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: 'auto-merge',
              });
              core.setFailed('[CORELOOP-R] PR 에 auto-merge 라벨 금지 — CODEOWNERS 수동 리뷰 필수');
            }
