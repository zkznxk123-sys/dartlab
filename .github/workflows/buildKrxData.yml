name: KRX Data Sync (Bulk)

# ⛔ engines.gather §9 — 운영자 cron 벌크 (KRX OpenAPI) → HF dataset publish.
# 엔진 내부 (quant/scan/analysis) 는 이 결과를 `_hfBulk.loadFiltered` 로 소비.
# 사용자 직접 호출 (`dartlab.gather('krx', ...)`) 은 별도 경로.

on:
  schedule:
    - cron: '0 11 * * 1-5'  # KST 20:00 평일 (UTC 11:00) — 어제~오늘 재조회 후 upsert
  workflow_dispatch:
    inputs:
      mode:
        description: 'incremental | backfill'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - backfill
      start:
        description: 'backfill 시작일 (YYYY-MM-DD)'
        required: false
      end:
        description: 'backfill 종료일 (YYYY-MM-DD)'
        required: false

permissions:
  contents: read

# engines.data §11 — 모든 HF push 워크플로우는 단일 그룹으로 직렬화 (sliding-window 429 회피).
concurrency:
  group: hf-dataset-push
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Restore KRX parquet cache
        uses: actions/cache/restore@v5
        with:
          path: data/krx/prices
          key: dartlab-krx-prices-${{ github.run_id }}
          restore-keys: dartlab-krx-prices-

      - name: Build KRX raw parquet + push to HF
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          if [ "$MODE" = "backfill" ]; then
            uv run python -X utf8 scripts/build/buildKrxData.py \
              --mode backfill \
              --start "${{ github.event.inputs.start }}" \
              --end "${{ github.event.inputs.end }}" \
              --push
          else
            uv run python -X utf8 scripts/build/buildKrxData.py \
              --mode incremental \
              --push
          fi

      - name: Save KRX parquet cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: data/krx/prices
          key: dartlab-krx-prices-${{ github.run_id }}

      - name: Summary
        if: always()
        run: |
          echo "## KRX Data Sync (Bulk)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} ${{ github.event.schedule }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ github.event.inputs.mode || 'incremental' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HF dataset | \`eddmpython/dartlab-data/krx/prices\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 출력 | \`data/krx/prices/raw-{YYYY}.parquet\` |" >> $GITHUB_STEP_SUMMARY
