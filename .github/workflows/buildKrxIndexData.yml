name: KRX Index Data Sync (Bulk)

# ops/gather.md §9 — KRX idx 시장군별 지수 일별 매매현황 → HF dataset publish.
# 사용자 기본 호출 (`dartlab.gather('krxIndex', ...)`) 은 이 결과를 HF 에서 읽는다.

on:
  schedule:
    - cron: '20 11 * * 1-5'  # KST 20:20 평일 — 장마감 후 당일(T-0)까지 반영
  workflow_dispatch:
    inputs:
      mode:
        description: 'incremental | backfill'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - backfill
      start:
        description: 'backfill 시작일 (YYYY-MM-DD)'
        required: false
      end:
        description: 'backfill 종료일 (YYYY-MM-DD)'
        required: false

permissions:
  contents: read

concurrency:
  group: hf-dataset-push
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Restore KRX index parquet cache
        uses: actions/cache/restore@v5
        with:
          path: data/krx/indices
          key: dartlab-krx-indices-${{ github.run_id }}
          restore-keys: dartlab-krx-indices-

      - name: Build KRX index raw parquet + push to HF
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          if [ "$MODE" = "backfill" ]; then
            uv run python -X utf8 scripts/build/buildKrxIndexData.py \
              --mode backfill \
              --start "${{ github.event.inputs.start }}" \
              --end "${{ github.event.inputs.end }}" \
              --push
          else
            uv run python -X utf8 scripts/build/buildKrxIndexData.py \
              --mode incremental \
              --push
          fi

      - name: Save KRX index parquet cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: data/krx/indices
          key: dartlab-krx-indices-${{ github.run_id }}

      - name: Summary
        if: always()
        run: |
          echo "## KRX Index Data Sync (Bulk)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} ${{ github.event.schedule }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ github.event.inputs.mode || 'incremental' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HF dataset | \`eddmpython/dartlab-data/krx/indices\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 출력 | \`data/krx/indices/raw-{YYYY}.parquet\` |" >> $GITHUB_STEP_SUMMARY
