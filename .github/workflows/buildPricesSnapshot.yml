name: Prices Snapshot Build

# ──────────────────────────────────────────────────────────────
# 스크리너용 prices-snapshot.json 매일 빌드.
# HF dataset (eddmpython/dartlab-data/landing/map/prices-snapshot.json) 에 업로드.
# 후속으로 docs.yml (Deploy Site) 가 trigger 되어 landing 재배포.
#
# 데이터 흐름:
#   1. KRX bulk (buildKrxData.yml) 매일 KST 17:00 → HF krxPrices 갱신
#   2. 본 워크플로우 KST 18:00 → HF krxPrices 에서 1Y pull → snapshot 계산
#   3. landing/static/map/prices-snapshot.json 으로 저장 → HF landing/map/ 업로드
#   4. docs.yml workflow_run → landing 재배포 (seedFromHf 가 자동으로 새 snapshot 가져감)
# ──────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 9 * * 1-5'   # KST 18:00 평일 (UTC 09:00) — KRX 빌드 17:00 후 1 시간
  workflow_run:
    workflows: ["KRX Data Sync (Bulk)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      lookback:
        description: 'HF lookback 일수 (월력)'
        required: false
        default: '400'

# ops/data.md §11 — 모든 HF push 워크플로우는 단일 그룹으로 직렬화 (sliding-window 429 회피).
concurrency:
  group: hf-dataset-push
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Smoke import
        run: uv run python -c "import dartlab; print('dartlab', getattr(dartlab, '__version__', 'dev'))"

      - name: Build prices-snapshot.json + push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          LB="${{ github.event.inputs.lookback || '400' }}"
          uv run python -X utf8 scripts/build/buildPricesSnapshot.py --lookback "$LB"

      - name: Validate output
        run: |
          set -euo pipefail
          path="landing/static/map/prices-snapshot.json"
          if [ ! -f "$path" ]; then
            echo "ERROR: $path 없음"
            exit 1
          fi
          if ! jq empty "$path" >/dev/null 2>&1; then
            echo "ERROR: $path JSON 파싱 실패"
            exit 1
          fi
          count=$(jq '.count' "$path")
          if [ "$count" -lt 1500 ]; then
            echo "ERROR: snapshot count $count < 1500 (하한 미달)"
            exit 1
          fi
          size=$(stat -c%s "$path")
          echo "validation OK: count=$count size=${size}B"

      - name: Summary
        if: always()
        run: |
          echo "## Prices Snapshot Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          path="landing/static/map/prices-snapshot.json"
          if [ -f "$path" ]; then
            count=$(jq '.count' "$path")
            built=$(jq -r '.builtAt' "$path")
            size=$(stat -c%s "$path")
            echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| 회사 수 | ${count} |" >> $GITHUB_STEP_SUMMARY
            echo "| 빌드 시각 | ${built} |" >> $GITHUB_STEP_SUMMARY
            echo "| JSON 크기 | $((size / 1024)) KB |" >> $GITHUB_STEP_SUMMARY
          fi
