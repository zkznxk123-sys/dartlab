name: CI Full

# Tier 2 — master push 직후 통합 회귀 (목표 ≤ 10분). PR 단계는 ci-fast 만.
# 명령 SSOT = tests/run.py GATES. 신규 게이트는 GATES + matrix 양쪽 동시 추가.

on:
  push:
    branches: [master]
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ${{ matrix.runner || 'ubuntu-latest' }}
    timeout-minutes: ${{ matrix.timeout || 20 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - gate: test-full
            python: "3.12"
            timeout: 30
            artifact_name: coverage-report
            artifact_path: htmlcov/
          - gate: test-full
            python: "3.13"
            timeout: 25
          - gate: fixture-integration
            timeout: 15
          - gate: cross-os-smoke
            runner: ubuntu-latest
          - gate: cross-os-smoke
            runner: windows-latest
          - gate: cross-os-smoke
            runner: macos-latest
          - gate: product-smoke-wheel
            timeout: 30
            artifact_name: product-smoke-wheel-release
            artifact_path: product-smoke-wheel-release.json
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python || '3.12' }}
      - name: Run ${{ matrix.gate }}
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -X utf8 tests/run.py gate ${{ matrix.gate }} \
            ${{ matrix.python && format('--python {0}', matrix.python) || '' }}
      - name: Upload coverage to Codecov
        if: ${{ matrix.gate == 'test-full' && matrix.python == '3.12' }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload artifact
        if: ${{ always() && matrix.artifact_name }}
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

  # realdata 는 path-diff 동적 matrix — plan 잡 결과를 suite 잡이 받아 fan-out.
  realdata-plan:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.plan.outputs.tests }}
      hasAny: ${{ steps.plan.outputs.hasAny }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: plan
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
        run: python -X utf8 tests/run.py gate realdata-plan

  realdata-suite:
    needs: realdata-plan
    if: ${{ needs.realdata-plan.outputs.hasAny == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        test_file: ${{ fromJson(needs.realdata-plan.outputs.tests) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -X utf8 tests/run.py gate realdata-suite --test ${{ matrix.test_file }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
