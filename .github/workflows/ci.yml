name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 같은 브랜치/PR 의 새 push 가 들어오면 이전 실행 중 CI 즉시 cancel.
# 연쇄 commit 시 CI 큐 적체 방지 — 항상 최신 commit 만 완주.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov hypothesis pytest-benchmark pytest-xdist

      - name: Install package
        run: pip install -e .[all]

      # 메모리 안전: pytest-xdist -n 2 로 worker 프로세스 분리
      # 각 worker가 별도 프로세스라 Polars 네이티브 메모리가 격리됨
      # CI runner 7GB+ 여유 → worker당 1900MB 한계 (안전 마진)
      # fixture 데이터 주입으로 requires_data 테스트도 CI에서 실행 (과거엔 skip)
      - name: Run tests (pytest-xdist parallel)
        env:
          DARTLAB_DATA_DIR: ${{ github.workspace }}/tests/fixtures
          PYTEST_MEMORY_LIMIT_MB: "1900"
          DARTLAB_TEST_LOCKED: "1"
        # requires_data 제외 유지 — fixture 데이터는 충분치 않아 test_affiliate/test_company 등이
        # 전체 데이터 가정으로 실패. 대신 fixture-integration + realdata-suite jobs 에서
        # fixture 에서 돌아가는 subset 을 실행. 핵심 안전장치는 wheel-smoke + test_bundledResources.
        # --cov-fail-under 플래그로 coverage ratchet 강제. pyproject 의 fail_under
        # 는 디폴트이며 이 플래그가 실제 gate. 하락하면 CI 실패.
        run: pytest tests/ -n 2 --dist loadfile --tb=short -m "not requires_data and not heavy and not realData and not freshInstall" --benchmark-disable --ignore=tests/test_fixture_analysis_real.py --ignore=tests/test_fixture_credit_real.py --ignore=tests/test_fixture_review_real.py --ignore=tests/realData --cov=dartlab --cov-report=term-missing --cov-report=html --cov-report=xml --cov-fail-under=40

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: htmlcov/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.11.6

      - name: Lint check
        run: ruff check src/dartlab/ tests/

      # silent-fail 패턴 lint — 2026-04-19 사고 class 재유입 차단.
      # 번들 리소스 로더가 silent `{}` / `[]` 리턴 패턴을 검사.
      - name: Silent-fail pattern check
        run: python scripts/dev/checkSilentFail.py

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.11.6

      - name: Format check
        run: ruff format --check src/dartlab/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and pyright
        run: |
          python -m pip install --upgrade pip
          pip install -e .[all]
          pip install pyright

      - name: Run pyright
        run: pyright
        continue-on-error: true

  # Cross-OS smoke — Windows/macOS 특이 버그 방어 (경로/인코딩/라인 엔딩).
  # 전체 test 잡은 ubuntu 만 돌리고 (CI 시간 절약), 이 잡은 환경 독립성이 필요한
  # unit + bundle 검증만 3 OS 에서 실행. 약 +5분 CI 시간 추가.
  cross-os-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio hypothesis build pytest-cov pytest-benchmark
          pip install -e .

      # unit 마커 + bundle 계약 만 실행 (환경 무관한 핵심).
      - name: Run unit + bundle tests
        env:
          PYTHONIOENCODING: utf-8
          DARTLAB_TEST_LOCKED: "1"
        run: |
          python -X utf8 -m pytest tests/test_bundledResources.py tests/test_wheelPackaging.py -m "unit and not heavy" --tb=short --no-cov --benchmark-disable

      - name: Silent-fail lint
        run: python -X utf8 scripts/dev/checkSilentFail.py

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import smoke test
        run: |
          python -c "
          import dartlab
          from dartlab import Company
          from dartlab.core.registry import getEntries
          from dartlab.core.finance.ratios import calcRatios
          from dartlab.analysis.financial.insight.grading import analyzePerformance
          from dartlab.providers.dart.finance.mapper import AccountMapper
          entries = getEntries()
          print(f'dartlab imported OK, {len(entries)} registry entries')
          "

  # fixture 기반 integration 테스트 — 메모리가 큰 테스트만 분리 실행.
  # 1500MB 한계에 걸리는 test_fixture_*_real.py 를 단일 worker + 파일별 분리로 돌림.
  fixture-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio hypothesis pytest-benchmark
          pip install -e .[all]

      - name: Run fixture integration tests (high memory, sequential)
        env:
          DARTLAB_DATA_DIR: ${{ github.workspace }}/tests/fixtures
          PYTEST_MEMORY_LIMIT_MB: "5000"
          DARTLAB_TEST_LOCKED: "1"
        run: |
          # 각 파일 독립 프로세스 — Polars 네이티브 메모리 완전 해제 보장
          # --no-cov 제거 — pytest-cov 미설치 환경에서 unrecognized argument 에러
          for f in tests/test_fixture_analysis_real.py tests/test_fixture_credit_real.py tests/test_fixture_review_real.py; do
            echo "=== $f ==="
            pytest "$f" --tb=short -q --benchmark-disable -p no:cacheprovider || exit 1
          done

  # realData plan — git diff 로 영향받은 엔진만 골라 matrix 생성.
  # 변경 파일 → planRealdata.py → test 파일 리스트. infra(core/providers/
  # workflow/pyproject) 변경 시 전수. 엔진 변경 시 해당 엔진 + company facade
  # smoke. docs 변경만 있으면 skip.
  realdata-plan:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.plan.outputs.tests }}
      hasAny: ${{ steps.plan.outputs.hasAny }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # PR multi-commit 다음 base..HEAD 정확 diff

      - name: Plan realData tests by path diff
        id: plan
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref || '' }}
        run: |
          python -X utf8 .github/scripts/planRealdata.py > /tmp/tests.json
          echo "plan 결과:"
          cat /tmp/tests.json
          echo
          COUNT=$(python -c "import json; print(len(json.load(open('/tmp/tests.json'))))")
          echo "tests=$(cat /tmp/tests.json)" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt 0 ]; then
            echo "hasAny=true" >> $GITHUB_OUTPUT
          else
            echo "hasAny=false" >> $GITHUB_OUTPUT
          fi

  # realData 스위트 — plan 결과의 test 파일만 matrix 로 병렬 실행.
  # 각 shard 는 단일 파일 단일 세션 (test-realdata.sh 가 자동 감지).
  # 메모리 격리: shard = 독립 runner.
  realdata-suite:
    needs: realdata-plan
    if: ${{ needs.realdata-plan.outputs.hasAny == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30  # per-shard (heaviest file test_companyTopics 약 15m)
    strategy:
      fail-fast: false
      matrix:
        test_file: ${{ fromJson(needs.realdata-plan.outputs.tests) }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"  # shard 간 pip wheel 캐시 재사용

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio hypothesis
          pip install -e .[all]

      - name: Run ${{ matrix.test_file }}
        env:
          DARTLAB_DATA_DIR: ${{ github.workspace }}/tests/fixtures
          PYTEST_MEMORY_LIMIT_MB: "6000"
          DARTLAB_TEST_LOCKED: "1"
        run: |
          bash scripts/dev/test-realdata.sh tests/realData/${{ matrix.test_file }} -v --tb=short

  # Wheel packaging 게이트 — 2026-04-19 사고 (parserMappings 누락) 재발 방지.
  # python -m build 로 실제 wheel 빌드 → 번들 리소스 zip 검증 → 격리 venv 설치 →
  # loadSections() 런타임 체인 호출. publish.yml 의 "실제 PyPI 갈 wheel" 검증
  # 단계와 로직이 동일. 차이점: CI 는 PR 마다 실행, publish.yml 은 tag push 시.
  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build

      # publish.yml 과 동일한 스크립트 호출 — 검증 로직 단일 출처.
      - name: Build wheel (python -m build, publish.yml 과 동일)
        run: python -m build --wheel --outdir dist

      - name: Verify wheel (bundle + install runtime)
        run: |
          set -euo pipefail
          WHL=$(ls dist/*.whl | head -n1)
          python -X utf8 scripts/build/verifyWheel.py "$WHL"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit

      - name: Run pip-audit
        run: pip-audit --strict --desc on 2>&1 | tee audit-report.txt
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pip-audit-report
          path: audit-report.txt
          retention-days: 30

  quality-gate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install radon vulture

      - name: Run quality gate
        run: python scripts/audit/qualityGate.py

      - name: Record quality history
        if: github.ref == 'refs/heads/master'
        run: python scripts/audit/qualityGate.py --record

      - name: Upload quality history
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v5
        with:
          name: quality-history
          path: scripts/audit/qualityHistory.jsonl
          retention-days: 90

  deps-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and deptry
        run: |
          python -m pip install --upgrade pip
          pip install -e .[all] deptry

      - name: Check dependency health
        run: deptry src/dartlab/ --ignore DEP002,DEP003 --extend-exclude _reference
        continue-on-error: true

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate notebook syntax
        run: python scripts/audit/validateNotebooks.py
