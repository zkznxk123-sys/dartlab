name: Data Prebuild (DART)

# ──────────────────────────────────────────────────────────────
# DART Data Sync 완료 후 자동 트리거.
# scan 프리빌드(changes/finance/report) 생성 → HF 업로드.
#
# EDGAR 프리빌드는 edgarSync.yml 이 전담 (end-to-end 벌크 → scan → HF).
# 여기서는 **DART 전용**.
# ──────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Data Sync"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: hf-dart-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prebuild-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Smoke import (fail fast on src regression)
        run: uv run python -c "import dartlab; print('dartlab', getattr(dartlab, '__version__', 'dev'))"

      # workflow_run 컨텍스트는 소스 workflow 의 run_id 를 모름 → restore-keys 접두사 매칭으로
      # 최신 dataSync 캐시 찾는다. key 는 의도적으로 miss 시켜 fallback 강제.
      - name: Restore finance cache
        id: finance-cache
        uses: actions/cache/restore@v5
        with:
          path: data/dart/finance
          key: dartlab-data-finance-prebuild-never-match
          restore-keys: dartlab-data-finance-

      - name: Restore report cache
        id: report-cache
        uses: actions/cache/restore@v5
        with:
          path: data/dart/report
          key: dartlab-data-report-prebuild-never-match
          restore-keys: dartlab-data-report-

      - name: Restore docs cache
        id: docs-cache
        uses: actions/cache/restore@v5
        with:
          path: data/dart/docs
          key: dartlab-data-docs-prebuild-never-match
          restore-keys: dartlab-data-docs-

      - name: Verify cache hits
        run: |
          for cat in finance report docs; do
            cat_var="$(echo $cat | tr a-z A-Z)"
            var="${cat_var}_CACHE_MATCHED_KEY"
            # actions/cache/restore 는 matched key 를 outputs.cache-matched-key 로 노출
            echo "[$cat] matched=$(eval echo \${CACHE_MATCHED_${cat_var}:-MISS})"
          done
        env:
          CACHE_MATCHED_FINANCE: ${{ steps.finance-cache.outputs.cache-matched-key }}
          CACHE_MATCHED_REPORT: ${{ steps.report-cache.outputs.cache-matched-key }}
          CACHE_MATCHED_DOCS: ${{ steps.docs-cache.outputs.cache-matched-key }}

      # HF seed: cache miss/stale 대비 부족 parquet 을 HF 에서 채움 (idempotent).
      - name: Seed missing parquet from HF
        run: uv run python -X utf8 .github/scripts/sync/seedFromHf.py --category finance,report,docs
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      # KRX KIND listing + corpProfile seed — prebuild = offline only 이므로 buildScan
      # 이 KIND HTTP 호출 시 OfflineViolation. kindlist.yml 이 HF push 한 결과를
      # 다운로드해 KIND file cache 위치에 둔다. 2026-05-18 회귀 차단.
      - name: Seed KRX KIND + corpProfile from HF
        run: |
          mkdir -p data/kindList data/dartList data/dart/scan
          python -c "
          from pathlib import Path
          from huggingface_hub import hf_hub_download
          import shutil
          for src, dst in [
              ('metadata/corpList.parquet', 'data/kindList/corpList.parquet'),
              ('metadata/dartList.parquet', 'data/dartList/dartList.parquet'),
              ('dart/scan/corpProfile.parquet', 'data/dart/scan/corpProfile.parquet'),
          ]:
              try:
                  p = hf_hub_download(
                      repo_id='eddmpython/dartlab-data',
                      repo_type='dataset',
                      filename=src,
                  )
                  Path(dst).parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy(p, dst)
                  print(f'seed: {src} -> {dst}')
              except Exception as e:
                  print(f'seed skip ({src}): {type(e).__name__}: {e}')
          "
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build DART scan prebuilds + upload
        run: uv run python -X utf8 .github/scripts/prebuild/prebuildData.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Save DART scan cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/dart/scan
          key: dartlab-data-scan-${{ github.run_id }}
