name: Data Prebuild (DART)

# ──────────────────────────────────────────────────────────────
# DART Data Sync 완료 후 자동 트리거.
# scan 프리빌드(changes/finance/report) 생성 → HF 업로드.
#
# EDGAR 프리빌드는 edgarSync.yml 이 전담 (end-to-end 벌크 → scan → HF).
# 여기서는 **DART 전용**.
# ──────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Data Sync"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: hf-dataset-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prebuild-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Restore finance cache
        uses: actions/cache/restore@v5
        with:
          path: data/dart/finance
          key: dartlab-data-finance-
          restore-keys: dartlab-data-finance-

      - name: Restore report cache
        uses: actions/cache/restore@v5
        with:
          path: data/dart/report
          key: dartlab-data-report-
          restore-keys: dartlab-data-report-

      - name: Restore docs cache
        uses: actions/cache/restore@v5
        with:
          path: data/dart/docs
          key: dartlab-data-docs-
          restore-keys: dartlab-data-docs-

      - name: Build DART scan prebuilds + upload
        run: uv run python .github/scripts/prebuildData.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Save DART scan cache
        uses: actions/cache/save@v5
        with:
          path: data/dart/scan
          key: dartlab-data-scan-${{ github.run_id }}
