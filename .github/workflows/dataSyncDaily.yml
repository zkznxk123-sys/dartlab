name: Daily Data Sync (DEPRECATED)

# ──────────────────────────────────────────────────────────────
# DEPRECATED (2026-04-06): dataSync.yml로 통합됨.
#
# 이 워크플로우의 모든 동작이 dataSync.yml로 이전됨:
#   - syncRecent.py 호출 (list.json 기반 신규 공시 수집)
#   - finance/report/docs 분리 처리
#   - HF + GH Releases 업로드
#
# 자동 cron은 비활성화 (dataSync.yml이 KST 03:00 + 15:00 매일 2회 실행).
# 수동 실행(workflow_dispatch)만 백업용으로 유지.
# 안정화 후 이 파일은 삭제 예정.
# ──────────────────────────────────────────────────────────────

on:
  # schedule:
  #   - cron: '0 18 * * *'  # DEPRECATED: dataSync.yml에서 처리
  workflow_dispatch:
    inputs:
      lookback_days:
        description: '조회 기간 (일)'
        default: '60'
        type: string

permissions:
  contents: write

# 동시 실행 방지 — 이전 실행이 끝나지 않았으면 대기 (cancel하지 않음)
concurrency:
  group: daily-data-sync
  cancel-in-progress: false

jobs:
  # ── Job 1: finance + report (빠름, ~15분) ──
  sync-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Restore finance cache
        uses: actions/cache@v4
        with:
          path: data/dart/finance
          key: dartlab-data-finance

      - name: Restore report cache
        uses: actions/cache@v4
        with:
          path: data/dart/report
          key: dartlab-data-report

      - name: Collect recent (finance + report)
        run: uv run python .github/scripts/syncRecent.py
        env:
          DART_API_KEYS: ${{ secrets.DART_API_KEYS }}
          SYNC_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '60' }}
          SYNC_CATEGORIES: finance,report

      - name: Upload to HuggingFace (finance)
        if: hashFiles('dist/changed_finance.txt') != ''
        run: |
          if [ -s dist/changed_finance.txt ]; then
            cp dist/changed_finance.txt dist/changed.txt
            uv run python .github/scripts/uploadData.py --target hf
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SYNC_CATEGORY: finance

      - name: Upload to HuggingFace (report)
        if: hashFiles('dist/changed_report.txt') != ''
        run: |
          if [ -s dist/changed_report.txt ]; then
            cp dist/changed_report.txt dist/changed.txt
            uv run python .github/scripts/uploadData.py --target hf
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SYNC_CATEGORY: report

      - name: Upload to GitHub Releases (finance)
        if: hashFiles('dist/changed_finance.txt') != ''
        run: |
          if [ -s dist/changed_finance.txt ]; then
            cp dist/changed_finance.txt dist/changed.txt
            uv run python .github/scripts/uploadData.py --target gh
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_CATEGORY: finance

      - name: Upload to GitHub Releases (report)
        if: hashFiles('dist/changed_report.txt') != ''
        run: |
          if [ -s dist/changed_report.txt ]; then
            cp dist/changed_report.txt dist/changed.txt
            uv run python .github/scripts/uploadData.py --target gh
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_CATEGORY: report

      - name: Save finance cache
        uses: actions/cache/save@v4
        with:
          path: data/dart/finance
          key: dartlab-data-finance

      - name: Save report cache
        uses: actions/cache/save@v4
        with:
          path: data/dart/report
          key: dartlab-data-report

  # ── Job 2: docs (느림, 별도 타임아웃) ──
  sync-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Restore docs cache
        uses: actions/cache@v4
        with:
          path: data/dart/docs
          key: dartlab-data-docs

      - name: Collect recent (docs)
        run: uv run python .github/scripts/syncRecent.py
        env:
          DART_API_KEYS: ${{ secrets.DART_API_KEYS }}
          SYNC_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '60' }}
          SYNC_CATEGORIES: docs

      - name: Upload to HuggingFace (docs)
        if: hashFiles('dist/changed_docs.txt') != ''
        run: |
          if [ -s dist/changed_docs.txt ]; then
            cp dist/changed_docs.txt dist/changed.txt
            uv run python .github/scripts/uploadData.py --target hf
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SYNC_CATEGORY: docs

      - name: Upload to GitHub Releases (docs)
        if: hashFiles('dist/changed_docs.txt') != ''
        run: |
          if [ -s dist/changed_docs.txt ]; then
            cp dist/changed_docs.txt dist/changed.txt
            uv run python .github/scripts/uploadData.py --target gh
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_CATEGORY: docs

      - name: Save docs cache
        uses: actions/cache/save@v4
        with:
          path: data/dart/docs
          key: dartlab-data-docs
