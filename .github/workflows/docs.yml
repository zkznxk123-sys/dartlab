name: Deploy Site

on:
  push:
    branches: [master]
    paths:
      - 'landing/**'
      - 'docs/**'
      - 'src/dartlab/skills/**'
      - 'scripts/build/generateSkills.py'
      - 'blog/**'
      - '.github/workflows/docs.yml'
  workflow_run:
    workflows: ["Industry Map Build"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python (for HF seed)
        run: uv python install 3.12

      - name: Install Python deps
        run: uv sync

      - name: Generate skill catalog
        run: uv run python -X utf8 scripts/build/generateSkills.py

      - name: Verify skill catalog is committed in sync
        run: |
          if ! git diff --quiet -- src/dartlab/skills/index.json src/dartlab/skills/pyodide.json; then
            echo "ERROR: src/dartlab/skills/{index,pyodide}.json out of sync with specs/."
            echo "Run: uv run python -X utf8 scripts/build/generateSkills.py"
            echo "and commit the regenerated artifacts before pushing."
            git diff --stat -- src/dartlab/skills/index.json src/dartlab/skills/pyodide.json
            exit 1
          fi

      # HF SSoT: map JSON 은 git 에 없음 (.gitignore). 빌드 전 HF 에서 내려받아
      # landing/static/map/ 에 풀어둠 → SvelteKit static adapter 가 build/ 에 복사.
      - name: Seed industry map from HF
        run: uv run python -X utf8 .github/scripts/seedFromHf.py --category industryMap
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DARTLAB_DATA_DIR: ${{ github.workspace }}

      - name: Move HF seed to landing/static/map
        run: |
          set -euo pipefail
          # seedFromHf 는 HF 의 dir (landing/map/) 을 $DARTLAB_DATA_DIR 아래에 그대로 복제.
          # landing/map/ → landing/static/map/ 으로 이동 (SvelteKit static path).
          if [ -d landing/map ]; then
            mkdir -p landing/static/map
            cp -r landing/map/. landing/static/map/
            rm -rf landing/map
          fi
          count=$(find landing/static/map/companies -maxdepth 1 -name '*.json' 2>/dev/null | wc -l)
          echo "map companies count: $count"
          [ "$count" -ge 2000 ] || { echo "ERROR: map seed 부족 ($count)"; exit 1; }

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build site
        working-directory: landing
        run: |
          npm ci
          BASE_PATH=/dartlab npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: landing/build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
