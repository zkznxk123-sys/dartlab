name: Deploy Site

on:
  push:
    branches: [master]
    paths:
      - 'landing/**'
      - 'src/dartlab/skills/**'
      - 'blog/**'
      - '.github/workflows/docs.yml'
      - '.github/scripts/buildSkillMarket.py'
  discussion:
    types: [created, edited, answered, unanswered, labeled, unlabeled]
  discussion_comment:
    types: [created, edited, deleted]
  schedule:
    # Skill Market discussion event delivery is not the only source of truth.
    # Daily rebuild keeps the static index in sync if preview events are missed.
    - cron: '0 15 * * *'
  workflow_run:
    workflows: ["Industry Map Build"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  discussions: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python (for HF seed)
        run: uv python install 3.12

      - name: Install Python deps
        run: uv sync

      # HF SSoT: map JSON 은 git 에 없음 (.gitignore). 빌드 전 HF 에서 내려받아
      # landing/static/map/ 에 풀어둠 → SvelteKit static adapter 가 build/ 에 복사.
      - name: Seed industry map from HF
        run: uv run python -X utf8 .github/scripts/seedFromHf.py --category industryMap
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DARTLAB_DATA_DIR: ${{ github.workspace }}

      - name: Move HF seed to landing/static/map
        run: |
          set -euo pipefail
          # seedFromHf 는 HF 의 dir (landing/map/) 을 $DARTLAB_DATA_DIR 아래에 그대로 복제.
          # landing/map/ → landing/static/map/ 으로 이동 (SvelteKit static path).
          if [ -d landing/map ]; then
            mkdir -p landing/static/map
            cp -r landing/map/. landing/static/map/
            rm -rf landing/map
          fi
          count=$(find landing/static/map/companies -maxdepth 1 -name '*.json' 2>/dev/null | wc -l)
          echo "map companies count: $count"
          [ "$count" -ge 2000 ] || { echo "ERROR: map seed 부족 ($count)"; exit 1; }

      - name: Build Skill Market index
        run: uv run python -X utf8 .github/scripts/buildSkillMarket.py --out landing/static/skills/market --category "Skill Market" --write-comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DARTLAB_MARKET_CURATORS: ${{ github.repository_owner }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build site
        working-directory: landing
        run: |
          npm ci
          BASE_PATH=/dartlab npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: landing/build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
