name: Industry Map Build

# ──────────────────────────────────────────────────────────────
# scan 프리빌드 완료 후 산업지도 JSON 전체 재생성.
# ecosystem.json + companies/*.json + industryStats.json 등
# 결과물은 HF dataset (eddmpython/dartlab-data/landing/map/) 에 업로드.
# git master 에는 커밋하지 않음 — landing 빌드가 HF 에서 pull.
# ──────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Data Prebuild (DART)"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: map-build
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-map:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Build industry map (all companies) + HF upload
        run: uv run python -X utf8 scripts/build/buildIndustryMap.py --companies 0
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build dashboards (review type=dashboard per company)
        run: uv run python -X utf8 scripts/build/buildDashboards.py --companies 0
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true  # 대시보드 실패해도 맵 배포는 진행

      - name: Validate map output
        run: |
          set -euo pipefail
          count=$(find landing/static/map/companies -maxdepth 1 -name '*.json' | wc -l)
          if [ "$count" -lt 2000 ]; then
            echo "ERROR: companies JSON 개수 $count < 2000 (하한 미달)"
            exit 1
          fi
          for f in atlas.json ecosystem.json meta.json; do
            path="landing/static/map/$f"
            if [ ! -f "$path" ]; then
              echo "ERROR: $path 없음"
              exit 1
            fi
            if ! jq empty "$path" >/dev/null 2>&1; then
              echo "ERROR: $path JSON 파싱 실패"
              exit 1
            fi
          done
          atlas_size=$(stat -c%s landing/static/map/atlas.json)
          if [ "$atlas_size" -lt 1024 ]; then
            echo "ERROR: atlas.json 크기 $atlas_size < 1024 바이트"
            exit 1
          fi
          echo "validation OK: companies=$count atlas=${atlas_size}B"
