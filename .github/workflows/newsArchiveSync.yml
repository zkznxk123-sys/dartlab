name: News Archive Sync

# ──────────────────────────────────────────────────────────────
# news headlines forward-only archive cron (Phase A).
#
# Google News RSS 일별 수집 (KOSPI200 시총 상위 + 매크로 키워드) →
# `data/news/headlines/{market}/{YYYY}-{MM}-{DD}.parquet` upsert →
# HF push (`eddmpython/dartlab-data/news/headlines/...`).
#
# 본문 archive 영구 제외 (ToS) — 메타데이터 (title/source/url/date +
# market/query/captured_at) 만 박는다.
#
# concurrency group `hf-news-push` 로 DART (`hf-dart-push`) 와 격리 —
# 병렬 가능. RSS 비공식 rate-limit 보호는 syncNewsHeadlines.py 의
# concurrency=4 + asyncio.Semaphore 가 수행.
# ──────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = KST 03:00 (야간 헤드라인 캡처)
    - cron: '0 6 * * *'   # UTC 06:00 = KST 15:00 (당일 오전 헤드라인)
  workflow_dispatch:
    inputs:
      max_queries:
        description: '쿼리 상한 (smoke 테스트용)'
        default: '150'
        type: string

permissions:
  contents: write

concurrency:
  group: hf-news-push
  cancel-in-progress: false

jobs:
  sync-news-kr:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Smoke import
        run: uv run python -c "import dartlab; print('dartlab', getattr(dartlab, '__version__', 'dev'))"

      - name: Restore news headlines cache
        uses: actions/cache/restore@v5
        with:
          path: data/news/headlines
          key: dartlab-news-headlines-${{ github.run_id }}
          restore-keys: dartlab-news-headlines-

      - name: Fetch KR headlines
        run: |
          uv run python -X utf8 .github/scripts/sync/syncNewsHeadlines.py \
            --market KR \
            --once \
            --max-queries ${{ github.event.inputs.max_queries || '150' }}

      - name: Fetch US headlines
        run: |
          uv run python -X utf8 .github/scripts/sync/syncNewsHeadlines.py \
            --market US \
            --once \
            --max-queries ${{ github.event.inputs.max_queries || '80' }}

      - name: HF push (newsHeadlines)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        if: env.HF_TOKEN != ''
        run: |
          # bulkUploadHf 가 .env 또는 env 둘 다 시도 — env 우선 fallback 위해 .env 임시 작성
          echo "HF_TOKEN=$HF_TOKEN" > .env
          uv run python -X utf8 .github/scripts/sync/bulkUploadHf.py newsHeadlines --since 86400

      - name: Save news headlines cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/news/headlines
          key: dartlab-news-headlines-${{ github.run_id }}
