name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-xdist hypothesis pytest-benchmark

      - name: Install package
        run: pip install -e .[all]

      - name: Run tests (pytest-xdist parallel)
        env:
          PYTEST_MEMORY_LIMIT_MB: "1900"
        run: pytest tests/ -n 2 --dist loadfile --tb=short -m "not requires_data and not heavy" --benchmark-disable --ignore=tests/test_fixture_analysis_real.py --ignore=tests/test_fixture_credit_real.py --ignore=tests/test_fixture_review_real.py
        if: hashFiles('tests/') != ''

  build:
    name: Build package
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION, pyproject=$PYPROJECT_VERSION"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build Svelte UI
        run: |
          cd ui/web
          npm ci
          npm run build

      - name: Copy UI build into package
        run: |
          mkdir -p src/dartlab/ui/build
          cp -r ui/web/build/* src/dartlab/ui/build/

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --output-format json -o dartlab-sbom.json

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist

      - name: Upload SBOM
        uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: dartlab-sbom.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - uses: actions/download-artifact@v5
        with:
          name: sbom
          path: sbom

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - uses: actions/checkout@v5

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            echo "body=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<CHANGELOG_EOF"
              echo "$BODY"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: ${{ steps.changelog.outputs.body == '' }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            sbom/dartlab-sbom.json
