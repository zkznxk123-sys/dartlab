name: Search Index Main (monthly)

# ──────────────────────────────────────────────────────────────
# content 인덱스 main 세그먼트 풀리빌드 + HF 업로드.
#
# 매월 1일 KST 05:00 실행 (또는 수동):
#   1. 전체 docs + allFilings → main 세그먼트 풀리빌드 (약 18분)
#   2. HF dart/contentIndex/main.* 업로드
#   3. delta 파일 제거 (main에 흡수)
#
# docs 데이터(8GB)를 HF에서 pull해야 하므로 오래 걸린다.
# delta는 searchIndexDelta.yml (매일 04:00).
# ──────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 20 1 * *'  # UTC 20:00 on 1st = KST 05:00 on 1st
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-searchindex-push
  cancel-in-progress: false

jobs:
  build-main:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3시간 (docs 다운로드 + 빌드)

    steps:
      - uses: actions/checkout@v5

      # docs(8GB)+allFilings(1.3GB)+panel(16GB) ≈ 25GB → 기본 러너 디스크(~14GB) 초과. 선제 확보(~25GB).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Pull all data from HF
        run: |
          # HF 429(1000 req/5분 쿼터) 흡수 — 폴더별 backoff 재시도. panel(91941 파일) 열거가 쿼터 부담.
          ok=0
          for attempt in 1 2 3 4 5; do
            uv run python -c "
          import time
          from huggingface_hub import snapshot_download
          from huggingface_hub.errors import HfHubHTTPError
          # panel 은 nested ({code}/*.parquet) → 재귀 패턴. docs/allFilings 는 flat.
          for folder, pat in [('dart/docs', 'dart/docs/*'), ('dart/allFilings', 'dart/allFilings/*'), ('dart/panel', 'dart/panel/**')]:
              for t in range(6):
                  try:
                      snapshot_download(repo_id='eddmpython/dartlab-data', repo_type='dataset', allow_patterns=pat, local_dir='data', max_workers=4)
                      print(f'pulled {folder}'); break
                  except HfHubHTTPError as e:
                      if '429' in str(e) and t < 5:
                          print(f'{folder} 429 — backoff {(t + 1) * 60}s'); time.sleep((t + 1) * 60)
                      else:
                          raise
          " || true
            # 검증 — 429 가 예외 없이 빈 local_dir 을 반환하는 silent-empty 차단. 폴더별 파일수 확인.
            af=$(find data/dart/allFilings -name '*.parquet' 2>/dev/null | wc -l)
            pn=$(find data/dart/panel -name '*.parquet' 2>/dev/null | wc -l)
            dc=$(find data/dart/docs -name '*.parquet' 2>/dev/null | wc -l)
            echo "pull 검증: docs=$dc allFilings=$af panel=$pn"
            if [ "$af" -gt 0 ] && [ "$pn" -gt 0 ] && [ "$dc" -gt 0 ]; then ok=1; break; fi
            echo "pull attempt $attempt 미완(빈 폴더) — 120s 후 재시도"; sleep 120
          done
          [ "$ok" = "1" ]
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build content main + upload
        run: uv run python .github/scripts/search/buildSearchMain.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
