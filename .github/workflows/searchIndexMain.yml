name: Search Index Main (monthly)

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# content мқёлҚұмҠӨ main м„ёк·ёлЁјнҠё н’ҖлҰ¬л№Ңл“ң + HF м—…лЎңл“ң (full + lite tier).
#
# л§Өмӣ” 1мқј KST 05:00 мӢӨн–ү (лҳҗлҠ” мҲҳлҸҷ):
#   1. м „мІҙ allFilings + panel + лүҙмҠӨ вҶ’ full main м„ёк·ёлЁјнҠё н’ҖлҰ¬л№Ңл“ң (м•Ҫ 18л¶„)
#   2. HF dart/contentIndex/*  (full = flat) м—…лЎңл“ң + delta м ңкұ° (mainм—җ нқЎмҲҳ)
#   3. lite tier вҖ” мөңк·ј Nк°ңмӣ”(DARTLAB_LITE_MONTHS, кё°ліё 18) м¶•мҶҢ мғүмқё вҶ’ dart/contentIndex/lite/ м—…лЎңл“ң
#      (pip мӮ¬мҡ©мһҗ кё°ліё кІҪлҹү л°°нҸ¬; full кіј лі„ л””л үн„°лҰ¬лқј кіөмЎҙ. lite л№Ңл“ң мӢӨнҢЁн•ҙлҸ„ full мқҖ мқҙлҜё л°°нҸ¬лҗЁ)
#
# deltaлҠ” searchIndexDelta.yml (л§Өмқј 04:00).
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

on:
  schedule:
    - cron: '0 20 1 * *'  # UTC 20:00 on 1st = KST 05:00 on 1st
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-searchindex-push
  cancel-in-progress: false

jobs:
  build-main:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3мӢңк°„ (panel лӢӨмҡҙлЎңл“ң + л№Ңл“ң)

    steps:
      - uses: actions/checkout@v5

      # allFilings(1.3GB)+panel(16GB) вҶ’ кё°ліё лҹ¬л„Ҳ л””мҠӨнҒ¬(~14GB) м••л°•. м„ м ң нҷ•ліҙ.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Pull all data from HF
        run: |
          # HF 429(1000 req/5л¶„ мҝјн„°) нқЎмҲҳ вҖ” нҸҙлҚ”лі„ backoff мһ¬мӢңлҸ„. panel(91941 нҢҢмқј) м—ҙкұ°к°Җ мҝјн„° л¶ҖлӢҙ.
          ok=0
          for attempt in 1 2 3 4 5; do
            uv run python -c "
          import time
          from huggingface_hub import snapshot_download
          from huggingface_hub.errors import HfHubHTTPError
          # panelВ·news лҠ” nested вҶ’ мһ¬к·Җ нҢЁн„ҙ. allFilings лҠ” flat. news лҠ” additive(л¶Җмһ¬ н—Ҳмҡ©).
          for folder, pat in [('dart/allFilings', 'dart/allFilings/*'), ('dart/panel', 'dart/panel/**'), ('news/headlines', 'news/headlines/**')]:
              for t in range(6):
                  try:
                      snapshot_download(repo_id='eddmpython/dartlab-data', repo_type='dataset', allow_patterns=pat, local_dir='data', max_workers=4)
                      print(f'pulled {folder}'); break
                  except HfHubHTTPError as e:
                      if '429' in str(e) and t < 5:
                          print(f'{folder} 429 вҖ” backoff {(t + 1) * 60}s'); time.sleep((t + 1) * 60)
                      else:
                          raise
          " || true
            # кІҖмҰқ вҖ” 429 к°Җ мҳҲмҷё м—Ҷмқҙ л№Ҳ local_dir мқ„ л°ҳнҷҳн•ҳлҠ” silent-empty м°ЁлӢЁ. нҸҙлҚ”лі„ нҢҢмқјмҲҳ нҷ•мқё.
            af=$(find data/dart/allFilings -name '*.parquet' 2>/dev/null | wc -l)
            pn=$(find data/dart/panel -name '*.parquet' 2>/dev/null | wc -l)
            nh=$(find data/news/headlines -name '*.parquet' 2>/dev/null | wc -l)
            echo "pull кІҖмҰқ: allFilings=$af panel=$pn news=$nh (news additive)"
            if [ "$af" -gt 0 ] && [ "$pn" -gt 0 ]; then ok=1; break; fi
            echo "pull attempt $attempt лҜёмҷ„(л№Ҳ нҸҙлҚ”) вҖ” 120s нӣ„ мһ¬мӢңлҸ„"; sleep 120
          done
          [ "$ok" = "1" ]
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Build content main + upload
        run: uv run python .github/scripts/search/buildSearchMain.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
