name: Sections Audit

# ─────────────────────────────────────────────────────────────
# DART 문서 sections (textStructure / chunker / pipeline) 회귀 가드.
# Phase A (정공법 zipDocsXml) 도입 후 회귀 차단:
#   - sectionsRawCompare: parquet 본문 vs sections 라벨 — spurious=0
#   - sectionsParity: fragmentHeadings / chapterMixes / koreanInversions = 0
#
# 트리거: PR 이 sections 또는 zipDocsXml/zipCollector 수정 시.
# 5 종목 (005380/005930/035720/207940/000660) baseline 검증.
# ─────────────────────────────────────────────────────────────

on:
  pull_request:
    paths:
      - 'src/dartlab/providers/dart/docs/sections/**'
      - 'src/dartlab/providers/dart/openapi/zipDocsXml.py'
      - 'src/dartlab/providers/dart/openapi/zipCollector.py'
      - 'tests/audit/sectionsRawCompare.py'
      - 'tests/audit/sectionsParity.py'
      - '.github/workflows/sectionsAudit.yml'
  workflow_dispatch:
    inputs:
      codes:
        description: '비교 종목 (콤마 구분, 빈 값=기본 5)'
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: sections-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Smoke import
        run: uv run python -X utf8 -c "import dartlab; print('dartlab', getattr(dartlab, '__version__', 'dev'))"

      # 5 baseline docs parquet 만 받기 — 전체 dataset (수 GB) 다운 회피.
      # HF dataset 직접 fetch (한 파일씩) 으로 트래픽 ≤ 100MB.
      - name: Fetch 5 baseline docs parquet from HF
        run: |
          mkdir -p data/dart/docs
          for code in 005380 005930 035720 207940 000660; do
            uv run python -X utf8 -c "
          from huggingface_hub import hf_hub_download
          import os, shutil
          src = hf_hub_download(repo_id='eddmpython/dartlab-data', repo_type='dataset', filename=f'dart/docs/${code}.parquet', token=os.environ.get('HF_TOKEN'))
          shutil.copy(src, 'data/dart/docs/${code}.parquet')
          print(f'fetched ${code}.parquet')
          "
          done
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: sectionsParity (5 codes)
        run: |
          CODES="${{ github.event.inputs.codes }}"
          if [ -z "$CODES" ]; then CODES="005380,005930,035720,207940,000660"; fi
          uv run python -X utf8 tests/audit/sectionsParity.py --codes "$CODES"

      - name: sectionsRawCompare (5 codes)
        run: |
          CODES="${{ github.event.inputs.codes }}"
          if [ -z "$CODES" ]; then CODES="005380,005930,035720,207940,000660"; fi
          uv run python -X utf8 tests/audit/sectionsRawCompare.py --codes "$CODES"
