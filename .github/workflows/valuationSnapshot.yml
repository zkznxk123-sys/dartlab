name: Valuation Snapshot

# ──────────────────────────────────────────────────────────────
# 매일 KST 04:00 (UTC 19:00) 전종목 네이버 시세·밸류에이션 수집 →
# dart/scan/valuation.parquet 생성 → HuggingFace 업로드.
#
# 설계 의도: dataPrebuild.yml 과 분리해 실패 격리. valuation 은
# 외부 API (네이버) 의존이라 rate-limit / IP 블록 리스크가 있어
# 기존 scan prebuild (finance/changes/report) 파이프라인을 건드리지
# 않는다. 실패해도 HF 에 남은 이전 snapshot 이 계속 사용됨.
# ──────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 23 * * *'   # UTC 23:00 = KST 08:00 (장 마감 후 + searchIndexDelta 19:00·Data Sync 18:00 과 HF 충돌 분리)
  workflow_dispatch:

concurrency:
  group: hf-dart-push
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Smoke import
        run: uv run python -c "import dartlab; print('dartlab', getattr(dartlab, '__version__', 'dev'))"

      - name: Build valuation snapshot + upload to HF
        run: uv run python -X utf8 .github/scripts/sync/prebuildValuation.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
