repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(experiments/|notebooks/)
      - id: end-of-file-fixer
        exclude: ^(experiments/|notebooks/)
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, src/dartlab/, -c, pyproject.toml]
        exclude: ^(experiments/|tests/)

  - repo: local
    hooks:
      - id: quality-gate
        name: quality-gate (complexity + dead code)
        entry: python tests/audit/qualityGate.py --changed-only
        language: system
        types: [python]
        pass_filenames: false

      - id: lint-camelcase
        name: lint-camelcase (camelCase + docstring, diff-based)
        entry: python -X utf8 tests/audit/lint_camelcase_ast.py --changed --strict
        language: system
        types: [python]
        pass_filenames: false
        exclude: ^(tests/|experiments/|notebooks/)

      # P0~P3 warning 모드. P3 끝 후 entry 에 --strict 추가.
      - id: cycle-scan
        name: cycle-scan (양방향 import cycle 검출 — P3 까지 warning)
        entry: python -X utf8 tests/audit/cycleScan.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      # P0 placeholder (aliases.json 비어있음). P5 채워지면 --strict.
      - id: naming-consistency
        name: naming-consistency (매개변수 표준 사전 검사)
        entry: python -X utf8 tests/audit/namingConsistency.py
        language: system
        types: [python]
        pass_filenames: false
        exclude: ^(tests/|experiments/|notebooks/)
