repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(experiments/|notebooks/)
      - id: end-of-file-fixer
        exclude: ^(experiments/|notebooks/)
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, src/dartlab/, -c, pyproject.toml]
        exclude: ^(experiments/|tests/)

  - repo: local
    hooks:
      - id: quality-gate
        name: quality-gate (complexity + dead code)
        entry: python scripts/audit/qualityGate.py --changed-only
        language: system
        types: [python]
        pass_filenames: false
