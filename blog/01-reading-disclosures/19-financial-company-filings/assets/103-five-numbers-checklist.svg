<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="800" height="540" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="539" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Pretendard, Inter, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">금융업 5가지 핵심 숫자 — 위험 체크보드</text>
  <line x1="260" y1="56" x2="540" y2="56" stroke="#a78bfa" stroke-width="1.2" opacity="0.3"/>

  <!-- Item 1 -->
  <rect x="60" y="76" width="680" height="72" rx="10" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="0.8"/>
  <circle cx="92" cy="100" r="14" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="92" y="105" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">1</text>
  <text x="120" y="100" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">이자마진·수익 구조</text>
  <text x="120" y="118" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">은행 NIM 안정 = 핵심 수익 건재 | 증권 IB 비중 높음 = 안정적</text>
  <text x="120" y="136" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: NIM 축소, 수수료 감소, CSM 잔액 하락</text>

  <!-- Item 2 -->
  <rect x="60" y="160" width="680" height="72" rx="10" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="0.8"/>
  <circle cx="92" cy="184" r="14" fill="rgba(56,189,248,0.2)" stroke="#38bdf8" stroke-width="1"/>
  <text x="92" y="189" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">2</text>
  <text x="120" y="184" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">대손충당금·건전성</text>
  <text x="120" y="202" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">NPL &lt; 1% + coverage &gt; 150% = 넉넉한 버퍼</text>
  <text x="120" y="220" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: NPL 급등, 충당금 환입 이익 보정, PF 편중</text>

  <!-- Item 3 -->
  <rect x="60" y="244" width="680" height="72" rx="10" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="0.8"/>
  <circle cx="92" cy="268" r="14" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="92" y="273" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#34d399">3</text>
  <text x="120" y="268" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#34d399">자기자본비율·규제 여유</text>
  <text x="120" y="286" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">BIS 규제 +3~5%p 여유 = 배당 가능 | K-ICS &gt; 150% = 안전</text>
  <text x="120" y="304" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 규제 하한 근접, 위험가중자산 급증, 배당 축소</text>

  <!-- Item 4 -->
  <rect x="60" y="328" width="680" height="72" rx="10" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="0.8"/>
  <circle cx="92" cy="352" r="14" fill="rgba(251,146,60,0.2)" stroke="#fb923c" stroke-width="1"/>
  <text x="92" y="357" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fb923c">4</text>
  <text x="120" y="352" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#fb923c">유가증권 포트폴리오</text>
  <text x="120" y="370" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">FVOCI 손실 자기자본 10% 미만 = 완충 | AC 비중 높음 = 안정</text>
  <text x="120" y="388" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: 미실현손실 20%+, 금리 추가 상승, PF 투자 부실</text>

  <!-- Item 5 -->
  <rect x="60" y="412" width="680" height="72" rx="10" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="0.8"/>
  <circle cx="92" cy="436" r="14" fill="rgba(248,113,113,0.2)" stroke="#f87171" stroke-width="1"/>
  <text x="92" y="441" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#f87171">5</text>
  <text x="120" y="436" font-family="Pretendard, Inter, sans-serif" font-size="13" font-weight="700" fill="#f87171">유동성·자금조달</text>
  <text x="120" y="454" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">LCR &gt; 120% + 예대율 &lt; 100% = 안정 조달</text>
  <text x="120" y="472" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">위험: LCR ≈ 100%, 단기 조달 의존, 만기 집중</text>

  <!-- Branding -->
  <text x="400" y="528" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.08em">DartLab 전자공시 분석</text>
</svg>
