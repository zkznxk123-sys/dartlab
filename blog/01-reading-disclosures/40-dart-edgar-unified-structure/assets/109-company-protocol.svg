<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg4)"/>
  <rect x="1" y="1" width="1198" height="718" rx="8" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="22" font-weight="bold" fill="#f1f5f9">통합 Company 프로토콜 설계</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">One interface, two engines — DART and EDGAR behind a unified facade</text>

  <!-- User Layer -->
  <rect x="200" y="100" width="800" height="60" rx="8" fill="url(#greenGlow)" stroke="#34d399" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="600" y="126" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#34d399">사용자 코드</text>
  <text x="600" y="148" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">c = dartlab.Company("005930")  |  c = dartlab.Company("AAPL")</text>

  <!-- Arrow down -->
  <line x1="600" y1="160" x2="600" y2="185" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="594,182 606,182 600,192" fill="#34d399" fill-opacity="0.5"/>

  <!-- Common Interface Box -->
  <rect x="140" y="195" width="920" height="140" rx="8" fill="#0d1117" stroke="#f1f5f9" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="600" y="220" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#f1f5f9">공통 인터페이스 (CompanyProtocol)</text>

  <!-- Interface methods -->
  <rect x="170" y="238" width="160" height="36" rx="5" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1"/>
  <text x="250" y="261" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#a78bfa">show(topic)</text>

  <rect x="350" y="238" width="130" height="36" rx="5" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1"/>
  <text x="415" y="261" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#38bdf8">index</text>

  <rect x="500" y="238" width="160" height="36" rx="5" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.35" stroke-width="1"/>
  <text x="580" y="261" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#34d399">trace(topic)</text>

  <rect x="680" y="238" width="160" height="36" rx="5" fill="#fb923c" fill-opacity="0.1" stroke="#fb923c" stroke-opacity="0.35" stroke-width="1"/>
  <text x="760" y="261" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#fb923c">sections</text>

  <rect x="860" y="238" width="130" height="36" rx="5" fill="#f87171" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.35" stroke-width="1"/>
  <text x="925" y="261" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#f87171">topics</text>

  <!-- Namespace row -->
  <rect x="220" y="290" width="200" height="30" rx="4" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="320" y="310" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">c.show(topic)  c.trace(topic)</text>

  <rect x="500" y="290" width="200" height="30" rx="4" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="600" y="310" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">c.currency  c.market</text>

  <rect x="780" y="290" width="200" height="30" rx="4" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="880" y="310" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">c.filings()  c.diff()</text>

  <!-- Routing Arrow -->
  <line x1="600" y1="335" x2="600" y2="370" stroke="#f1f5f9" stroke-width="1.5" stroke-opacity="0.3"/>
  <polygon points="594,367 606,367 600,377" fill="#f1f5f9" fill-opacity="0.3"/>

  <!-- Router -->
  <rect x="430" y="378" width="340" height="36" rx="18" fill="#0d1117" stroke="#fb923c" stroke-opacity="0.4" stroke-width="1"/>
  <text x="600" y="401" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="13" fill="#fb923c">자동 라우팅: 숫자 6자리 → DART | 알파벳 → EDGAR</text>

  <!-- Arrows to engines -->
  <line x1="480" y1="414" x2="300" y2="450" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="296,446 306,446 298,456" fill="#a78bfa" fill-opacity="0.5"/>

  <line x1="720" y1="414" x2="900" y2="450" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="894,446 904,446 902,456" fill="#38bdf8" fill-opacity="0.5"/>

  <!-- DART Engine -->
  <rect x="80" y="456" width="440" height="200" rx="8" fill="#0d1117" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="300" y="482" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#a78bfa">DART 엔진</text>
  <text x="300" y="500" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">engines/dart/company.py</text>

  <!-- DART sub-modules -->
  <rect x="100" y="516" width="120" height="50" rx="4" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="1"/>
  <text x="160" y="537" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a78bfa">docs</text>
  <text x="160" y="554" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="10" fill="#64748b">공시 문서 파싱</text>

  <rect x="238" y="516" width="120" height="50" rx="4" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="1"/>
  <text x="298" y="537" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a78bfa">finance</text>
  <text x="298" y="554" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="10" fill="#64748b">XBRL 재무 정규화</text>

  <rect x="376" y="516" width="120" height="50" rx="4" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="1"/>
  <text x="436" y="537" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a78bfa">report</text>
  <text x="436" y="554" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="10" fill="#64748b">28개 정형 API</text>

  <!-- DART profile merge -->
  <rect x="160" y="582" width="280" height="34" rx="4" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1"/>
  <text x="300" y="604" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#a78bfa">profile = docs + finance 대체 + report 채움</text>

  <!-- DART stats -->
  <text x="300" y="642" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">34,249 계정 매핑 | 매핑률 99.95% | 12장 구조</text>

  <!-- EDGAR Engine -->
  <rect x="680" y="456" width="440" height="200" rx="8" fill="#0d1117" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="900" y="482" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="15" font-weight="bold" fill="#38bdf8">EDGAR 엔진</text>
  <text x="900" y="500" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">engines/edgar/company.py</text>

  <!-- EDGAR sub-modules -->
  <rect x="740" y="516" width="140" height="50" rx="4" fill="#38bdf8" fill-opacity="0.08" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1"/>
  <text x="810" y="537" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#38bdf8">docs</text>
  <text x="810" y="554" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="10" fill="#64748b">10-K/10-Q 파싱</text>

  <rect x="900" y="516" width="140" height="50" rx="4" fill="#38bdf8" fill-opacity="0.08" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1"/>
  <text x="970" y="537" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#38bdf8">finance</text>
  <text x="970" y="554" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="10" fill="#64748b">SEC XBRL 정규화</text>

  <!-- EDGAR no report note -->
  <rect x="760" y="582" width="280" height="34" rx="4" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="1"/>
  <text x="900" y="604" text-anchor="middle" font-family="Pretendard, sans-serif" font-size="12" fill="#38bdf8">profile = docs + finance 대체 (report 없음)</text>

  <!-- EDGAR stats -->
  <text x="900" y="642" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">11,660 계정 매핑 | 매핑률 100% | Part I~IV 구조</text>

  <!-- Footer -->
  <text x="600" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#475569">DartLab 전자공시 분석</text>
</svg>
