<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" fill="none">
  <title>좋은 수익 구조 vs 위험한 수익 구조 비교 매트릭스</title>
  <desc>부문 분산, 비용 구조, 현금흐름 기준으로 좋은 구조와 위험한 구조를 나란히 비교</desc>

  <rect width="1200" height="820" rx="16" fill="#0f172a"/>

  <!-- 제목 -->
  <text x="600" y="50" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">수익 구조 — 좋은 신호 vs 위험 신호</text>

  <!-- 헤더 -->
  <rect x="60" y="80" width="520" height="48" rx="8" fill="#22c55e" fill-opacity="0.1"/>
  <text x="320" y="110" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="16" font-weight="700">견실한 구조</text>

  <rect x="620" y="80" width="520" height="48" rx="8" fill="#ef4444" fill-opacity="0.1"/>
  <text x="880" y="110" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="16" font-weight="700">위험한 구조</text>

  <!-- Row 1: 부문 구성 -->
  <text x="600" y="165" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">부문 구성</text>

  <rect x="60" y="180" width="520" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="90" y="210" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">HHI &lt; 2,500 — 분산된 매출</text>
  <text x="90" y="235" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">3개 이상 부문이 각각 15% 이상 기여</text>
  <text x="90" y="255" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">매출 1위 부문 = 이익 1위 부문 (비중-이익 정렬)</text>
  <text x="90" y="275" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">부문 재편 없이 안정적 구조 유지</text>

  <rect x="620" y="180" width="520" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="650" y="210" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="14" font-weight="600">HHI &gt; 5,000 — 단일 부문 의존</text>
  <text x="650" y="235" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">매출의 70%+ 한 부문에 집중</text>
  <text x="650" y="255" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">이익 기여도가 매출 비중과 크게 불일치</text>
  <text x="650" y="275" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">전년 대비 부문명이 바뀜 (재편 신호)</text>

  <!-- Row 2: 비용 구조 -->
  <text x="600" y="315" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">비용 구조</text>

  <rect x="60" y="330" width="520" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="90" y="360" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">원가율 안정 + 판관비 레버리지</text>
  <text x="90" y="385" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">매출원가율 횡보 또는 개선 추세</text>
  <text x="90" y="405" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">매출 증가 시 판관비율 하락 (레버리지 작동)</text>
  <text x="90" y="425" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">매출총이익률 안정 또는 상승</text>

  <rect x="620" y="330" width="520" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="650" y="360" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="14" font-weight="600">원가율 3분기 연속 상승</text>
  <text x="650" y="385" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">원재료 비용 전가 실패 → 마진 압축</text>
  <text x="650" y="405" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">매출 감소에도 판관비 고정 → 이익 급락</text>
  <text x="650" y="425" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">매출총이익률 하락 추세 (방향 전환 신호)</text>

  <!-- Row 3: 현금흐름 -->
  <text x="600" y="465" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">현금흐름</text>

  <rect x="60" y="480" width="520" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="90" y="510" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">OCF &gt; NI + FCF 양수</text>
  <text x="90" y="535" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">이익의 질 양호 — 현금이 이익을 뒷받침</text>
  <text x="90" y="555" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">FCF로 배당·자사주·부채상환 가능</text>
  <text x="90" y="575" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Sloan 발생액 비율 |10%| 이내</text>

  <rect x="620" y="480" width="520" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="650" y="510" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="14" font-weight="600">OCF &lt; NI × 0.5 + FCF 음수</text>
  <text x="650" y="535" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">회계 이익만 있고 현금 회수 부진</text>
  <text x="650" y="555" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">외부 자금(차입·증자) 의존 구조</text>
  <text x="650" y="575" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Sloan 발생액 비율 10%+ (공격적 회계)</text>

  <!-- Row 4: 종합 판단 -->
  <text x="600" y="615" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">종합 판단</text>

  <rect x="60" y="630" width="520" height="80" rx="8" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="1"/>
  <text x="320" y="660" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="15" font-weight="700">사업으로 벌어서 현금이 남는 구조</text>
  <text x="320" y="685" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">→ 자금 구조·자산 구조로 확장 분석</text>

  <rect x="620" y="630" width="520" height="80" rx="8" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="880" y="660" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="15" font-weight="700">이익 있지만 현금·구조가 취약</text>
  <text x="880" y="685" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">→ 자금조달(부채·증자) 리스크 우선 확인</text>

  <!-- 하단 범례 -->
  <text x="600" y="770" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">3개 축(부문·비용·현금)이 모두 좋은 편이면 수익 구조 자체는 견실하다고 판단. 하나라도 위험하면 해당 영역부터 심화 확인.</text>
</svg>