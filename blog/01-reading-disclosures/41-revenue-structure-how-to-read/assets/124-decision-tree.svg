<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <title>수익 구조 분석 판단 분기: segments 유무에 따른 분석 경로</title>
  <desc>부문(세그먼트) 공시가 있으면 부문 분석부터, 없으면 손익 분석으로 바로 가는 분기 도식</desc>

  <rect width="1200" height="720" rx="16" fill="#0f172a"/>

  <!-- 시작점 -->
  <rect x="440" y="30" width="320" height="56" rx="28" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="65" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="18" font-weight="700">수익 구조 분석 시작</text>

  <!-- 화살표 -->
  <line x1="600" y1="86" x2="600" y2="130" stroke="#475569" stroke-width="2"/>

  <!-- 분기점: segments 있는가? -->
  <polygon points="600,130 720,190 600,250 480,190" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="186" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="15" font-weight="600">부문 공시</text>
  <text x="600" y="206" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="15" font-weight="600">있는가?</text>

  <!-- 왼쪽: YES -->
  <line x1="480" y1="190" x2="300" y2="190" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="182" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">YES</text>

  <!-- 왼쪽 경로 -->
  <rect x="80" y="170" width="220" height="44" rx="8" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="190" y="198" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">부문별 매출·이익 구성</text>

  <line x1="190" y1="214" x2="190" y2="250" stroke="#475569" stroke-width="1.5"/>
  <rect x="80" y="250" width="220" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="190" y="275" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">HHI 집중도 계산</text>

  <line x1="190" y1="290" x2="190" y2="320" stroke="#475569" stroke-width="1.5"/>
  <rect x="80" y="320" width="220" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="190" y="345" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">부문별 매출 추이 + YoY</text>

  <line x1="190" y1="360" x2="190" y2="390" stroke="#475569" stroke-width="1.5"/>
  <rect x="80" y="390" width="220" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="190" y="415" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">지역별/제품별 매출</text>

  <!-- 합류 화살표 -->
  <line x1="190" y1="430" x2="190" y2="480" stroke="#475569" stroke-width="1.5"/>
  <line x1="190" y1="480" x2="600" y2="480" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 오른쪽: NO -->
  <line x1="720" y1="190" x2="900" y2="190" stroke="#ef4444" stroke-width="2"/>
  <text x="810" y="182" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="14" font-weight="600">NO</text>

  <!-- 오른쪽 경로 -->
  <rect x="900" y="170" width="220" height="44" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <text x="1010" y="195" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">금융업 / 단일부문 / 데이터 없음</text>

  <line x1="1010" y1="214" x2="1010" y2="260" stroke="#475569" stroke-width="1.5"/>
  <text x="1010" y="255" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">부문 분석 건너뜀</text>

  <line x1="1010" y1="270" x2="1010" y2="480" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1010" y1="480" x2="600" y2="480" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 공통 경로 (아래) -->
  <line x1="600" y1="480" x2="600" y2="500" stroke="#475569" stroke-width="2"/>

  <rect x="380" y="500" width="440" height="44" rx="8" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
  <text x="600" y="528" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="15" font-weight="600">손익 추이 (매출 / 영업이익 / 순이익)</text>

  <line x1="600" y1="544" x2="600" y2="564" stroke="#475569" stroke-width="1.5"/>
  <rect x="380" y="564" width="440" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="590" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">비용 구조 (원가율, 판관비율, 매출총이익률)</text>

  <line x1="600" y1="604" x2="600" y2="624" stroke="#475569" stroke-width="1.5"/>
  <rect x="380" y="624" width="440" height="40" rx="8" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="650" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">현금흐름 + 수익 품질 → 종합 판단</text>

  <!-- 범례 -->
  <rect x="80" y="640" width="12" height="12" rx="2" fill="#22c55e" fill-opacity="0.3"/>
  <text x="100" y="651" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">부문 있는 경우</text>
  <rect x="200" y="640" width="12" height="12" rx="2" fill="#94a3b8" fill-opacity="0.3"/>
  <text x="220" y="651" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">부문 없는 경우</text>
  <rect x="320" y="640" width="12" height="12" rx="2" fill="#8b5cf6" fill-opacity="0.3"/>
  <text x="340" y="651" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">공통 분석</text>
</svg>