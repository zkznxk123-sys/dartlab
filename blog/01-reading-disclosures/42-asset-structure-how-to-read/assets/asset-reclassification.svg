<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>

  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">영업/비영업 비중 변화 -- 세 가지 패턴</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-size="11">5년간 비중 방향이 회사의 전략을 말해준다</text>

  <!-- Pattern 1: 확장형 -->
  <g transform="translate(40,80)">
    <text x="110" y="15" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">확장형</text>
    <text x="110" y="32" text-anchor="middle" fill="#94a3b8" font-size="10">영업자산 비중 상승</text>

    <g transform="translate(10,45)">
      <text x="10" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y1</text>
      <rect x="0" y="0" width="30" height="55" rx="2" fill="#1e3a5f"/>
      <rect x="0" y="55" width="30" height="50" rx="2" fill="#38bdf8" opacity="0.7"/>
      <rect x="0" y="105" width="30" height="15" rx="2" fill="#334155"/>

      <text x="55" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y3</text>
      <rect x="40" y="0" width="30" height="42" rx="2" fill="#1e3a5f"/>
      <rect x="40" y="42" width="30" height="63" rx="2" fill="#38bdf8" opacity="0.7"/>
      <rect x="40" y="105" width="30" height="15" rx="2" fill="#334155"/>

      <text x="100" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y5</text>
      <rect x="85" y="0" width="30" height="30" rx="2" fill="#1e3a5f"/>
      <rect x="85" y="30" width="30" height="75" rx="2" fill="#38bdf8" opacity="0.7"/>
      <rect x="85" y="105" width="30" height="15" rx="2" fill="#334155"/>

      <text x="165" y="55" fill="#38bdf8" font-size="9">+12pp</text>
    </g>

    <text x="110" y="195" text-anchor="middle" fill="#94a3b8" font-size="9">배터리, 반도체</text>
    <text x="110" y="208" text-anchor="middle" fill="#94a3b8" font-size="9">대규모 설비 투자기</text>
  </g>

  <!-- Pattern 2: 안정형 -->
  <g transform="translate(290,80)">
    <text x="110" y="15" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">안정형</text>
    <text x="110" y="32" text-anchor="middle" fill="#94a3b8" font-size="10">비중 변동 미미</text>

    <g transform="translate(10,45)">
      <text x="10" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y1</text>
      <rect x="0" y="0" width="30" height="40" rx="2" fill="#1e3a5f"/>
      <rect x="0" y="40" width="30" height="60" rx="2" fill="#a78bfa" opacity="0.7"/>
      <rect x="0" y="100" width="30" height="20" rx="2" fill="#334155"/>

      <text x="55" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y3</text>
      <rect x="40" y="0" width="30" height="38" rx="2" fill="#1e3a5f"/>
      <rect x="40" y="38" width="30" height="62" rx="2" fill="#a78bfa" opacity="0.7"/>
      <rect x="40" y="100" width="30" height="20" rx="2" fill="#334155"/>

      <text x="100" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y5</text>
      <rect x="85" y="0" width="30" height="39" rx="2" fill="#1e3a5f"/>
      <rect x="85" y="39" width="30" height="61" rx="2" fill="#a78bfa" opacity="0.7"/>
      <rect x="85" y="100" width="30" height="20" rx="2" fill="#334155"/>

      <text x="165" y="70" fill="#a78bfa" font-size="9">+/-2pp</text>
    </g>

    <text x="110" y="195" text-anchor="middle" fill="#94a3b8" font-size="9">성숙기 기업</text>
    <text x="110" y="208" text-anchor="middle" fill="#94a3b8" font-size="9">투자=감가상각 균형</text>
  </g>

  <!-- Pattern 3: 축소형 -->
  <g transform="translate(540,80)">
    <text x="110" y="15" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">축소/전환형</text>
    <text x="110" y="32" text-anchor="middle" fill="#94a3b8" font-size="10">영업자산 비중 하락</text>

    <g transform="translate(10,45)">
      <text x="10" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y1</text>
      <rect x="0" y="0" width="30" height="25" rx="2" fill="#1e3a5f"/>
      <rect x="0" y="25" width="30" height="80" rx="2" fill="#fb923c" opacity="0.7"/>
      <rect x="0" y="105" width="30" height="15" rx="2" fill="#334155"/>

      <text x="55" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y3</text>
      <rect x="40" y="0" width="30" height="40" rx="2" fill="#1e3a5f"/>
      <rect x="40" y="40" width="30" height="65" rx="2" fill="#fb923c" opacity="0.7"/>
      <rect x="40" y="105" width="30" height="15" rx="2" fill="#334155"/>

      <text x="100" y="130" text-anchor="middle" fill="#64748b" font-size="9">Y5</text>
      <rect x="85" y="0" width="30" height="55" rx="2" fill="#1e3a5f"/>
      <rect x="85" y="55" width="30" height="50" rx="2" fill="#fb923c" opacity="0.7"/>
      <rect x="85" y="105" width="30" height="15" rx="2" fill="#334155"/>

      <text x="165" y="75" fill="#fb923c" font-size="9">-15pp</text>
    </g>

    <text x="110" y="195" text-anchor="middle" fill="#94a3b8" font-size="9">사업 축소, 자산 매각</text>
    <text x="110" y="208" text-anchor="middle" fill="#94a3b8" font-size="9">지주사 전환</text>
  </g>

  <!-- Legend -->
  <g transform="translate(250,320)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#38bdf8" opacity="0.7"/>
    <text x="18" y="11" fill="#94a3b8" font-size="10">영업자산</text>
    <rect x="85" y="0" width="12" height="12" rx="2" fill="#1e3a5f"/>
    <text x="103" y="11" fill="#94a3b8" font-size="10">비영업자산</text>
    <rect x="185" y="0" width="12" height="12" rx="2" fill="#334155"/>
    <text x="203" y="11" fill="#94a3b8" font-size="10">기타</text>
  </g>

  <text x="400" y="365" text-anchor="middle" fill="#64748b" font-size="10">비중 변화의 속도가 중요하다 -- 5년간 10pp 이상 변동이면 전략 전환 신호</text>
  <text x="400" y="385" text-anchor="middle" fill="#475569" font-size="9">영업자산 증가 시 매출이 따라오는지, NOA 대비 이익이 유지되는지 반드시 교차 확인</text>
</svg>
