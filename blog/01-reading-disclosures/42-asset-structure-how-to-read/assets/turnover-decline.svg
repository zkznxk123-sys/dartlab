<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="800" height="380" rx="12" fill="#0f172a"/>

  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">자산회전율 하락 -- 두 가지 원인 구분법</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-size="11">총자산회전율 = 매출 / 총자산 -- 같은 하락이라도 원인에 따라 해석이 다르다</text>

  <!-- Cause 1: Asset expansion -->
  <g transform="translate(55,80)">
    <rect width="330" height="230" rx="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="165" y="28" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">원인 1: 자산 팽창 (투자 확대기)</text>
    <line x1="20" y1="40" x2="310" y2="40" stroke="#334155" stroke-width="1"/>

    <text x="60" y="65" text-anchor="middle" fill="#94a3b8" font-size="10">자산</text>
    <rect x="80" y="55" width="40" height="30" rx="3" fill="#38bdf8" opacity="0.4"/>
    <rect x="130" y="45" width="40" height="40" rx="3" fill="#38bdf8" opacity="0.6"/>
    <rect x="180" y="30" width="40" height="55" rx="3" fill="#38bdf8" opacity="0.8"/>
    <text x="245" y="60" fill="#38bdf8" font-size="11" font-weight="700">UP</text>

    <text x="60" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">매출</text>
    <rect x="80" y="100" width="40" height="25" rx="3" fill="#64748b"/>
    <rect x="130" y="100" width="40" height="25" rx="3" fill="#64748b"/>
    <rect x="180" y="100" width="40" height="27" rx="3" fill="#64748b"/>
    <text x="245" y="115" fill="#64748b" font-size="11">--</text>

    <text x="165" y="150" text-anchor="middle" fill="#e2e8f0" font-size="11">CAPEX 급증으로 분모(자산)만 커졌다</text>
    <text x="165" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">신규 공장 양산 전 자연스러운 현상</text>
    <text x="165" y="188" text-anchor="middle" fill="#94a3b8" font-size="10">1~2년 뒤 회전율 회복 추적 필요</text>

    <rect x="40" y="200" width="250" height="22" rx="4" fill="#14532d"/>
    <text x="165" y="215" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">확인: 최근 CAPEX 급증 + CIP 비중 높음</text>
  </g>

  <!-- Cause 2: Revenue decline -->
  <g transform="translate(415,80)">
    <rect width="330" height="230" rx="10" fill="#1e3a5f" stroke="#f87171" stroke-width="1.5"/>
    <text x="165" y="28" text-anchor="middle" fill="#f87171" font-size="14" font-weight="700">원인 2: 매출 둔화 (효율 악화)</text>
    <line x1="20" y1="40" x2="310" y2="40" stroke="#334155" stroke-width="1"/>

    <text x="60" y="65" text-anchor="middle" fill="#94a3b8" font-size="10">자산</text>
    <rect x="80" y="45" width="40" height="40" rx="3" fill="#64748b"/>
    <rect x="130" y="45" width="40" height="40" rx="3" fill="#64748b"/>
    <rect x="180" y="45" width="40" height="40" rx="3" fill="#64748b"/>
    <text x="245" y="70" fill="#64748b" font-size="11">--</text>

    <text x="60" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">매출</text>
    <rect x="80" y="100" width="40" height="30" rx="3" fill="#f87171" opacity="0.8"/>
    <rect x="130" y="105" width="40" height="25" rx="3" fill="#f87171" opacity="0.6"/>
    <rect x="180" y="112" width="40" height="18" rx="3" fill="#f87171" opacity="0.4"/>
    <text x="245" y="120" fill="#f87171" font-size="11" font-weight="700">DOWN</text>

    <text x="165" y="150" text-anchor="middle" fill="#e2e8f0" font-size="11">기존 자산의 가동률이 떨어졌다</text>
    <text x="165" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">수요 감소, 경쟁 심화, 시장 축소</text>
    <text x="165" y="188" text-anchor="middle" fill="#94a3b8" font-size="10">구조적 문제 가능성 -- 더 위험한 신호</text>

    <rect x="40" y="200" width="250" height="22" rx="4" fill="#451a03"/>
    <text x="165" y="215" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">확인: CAPEX 안정적 + 매출 YoY 하락</text>
  </g>

  <!-- Bottom -->
  <rect x="55" y="325" width="690" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="345" text-anchor="middle" fill="#e2e8f0" font-size="11">구분 핵심: <tspan fill="#38bdf8">CAPEX 추이</tspan>와 <tspan fill="#fbbf24">매출 YoY</tspan>를 함께 보면 원인이 특정된다</text>
  <text x="400" y="362" text-anchor="middle" fill="#94a3b8" font-size="9">업종별 기준: IT 서비스 2~3회 | 유통 1~2회 | 제조 0.5~1.0회 | 반도체/배터리 0.3~0.8회</text>
</svg>
