<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>

  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">영업CF / 순이익 -- 이익이 현금으로 뒷받침되는가</text>

  <!-- Formula -->
  <rect x="200" y="55" width="400" height="35" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="78" text-anchor="middle" fill="#e2e8f0" font-size="12">영업CF / 순이익 x 100 = 이익의 현금 전환율</text>

  <!-- 5 zones -->
  <g transform="translate(55,110)">
    <!-- Zone: 100%+ -->
    <rect width="155" height="110" rx="8" fill="#14532d" stroke="#34d399" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">100% 이상</text>
    <line x1="15" y1="32" x2="140" y2="32" stroke="#1e3a5f" stroke-width="1"/>
    <text x="78" y="50" text-anchor="middle" fill="#e2e8f0" font-size="10">이익 이상의</text>
    <text x="78" y="65" text-anchor="middle" fill="#e2e8f0" font-size="10">현금 유입</text>
    <text x="78" y="85" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">양호</text>
    <text x="78" y="102" text-anchor="middle" fill="#94a3b8" font-size="9">감가상각비 효과 포함</text>
  </g>

  <g transform="translate(225,110)">
    <rect width="155" height="110" rx="8" fill="#1e3a5f" stroke="#fbbf24" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">40~100%</text>
    <line x1="15" y1="32" x2="140" y2="32" stroke="#334155" stroke-width="1"/>
    <text x="78" y="50" text-anchor="middle" fill="#e2e8f0" font-size="10">일부 이익이 현금</text>
    <text x="78" y="65" text-anchor="middle" fill="#e2e8f0" font-size="10">미전환</text>
    <text x="78" y="85" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">주의</text>
    <text x="78" y="102" text-anchor="middle" fill="#94a3b8" font-size="9">운전자본 변동 확인</text>
  </g>

  <g transform="translate(395,110)">
    <rect width="155" height="110" rx="8" fill="#451a03" stroke="#f87171" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700">40% 미만</text>
    <line x1="15" y1="32" x2="140" y2="32" stroke="#334155" stroke-width="1"/>
    <text x="78" y="50" text-anchor="middle" fill="#e2e8f0" font-size="10">이익의 현금</text>
    <text x="78" y="65" text-anchor="middle" fill="#e2e8f0" font-size="10">뒷받침 심각 부족</text>
    <text x="78" y="85" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">경고</text>
    <text x="78" y="102" text-anchor="middle" fill="#94a3b8" font-size="9">이익의 질 의문</text>
  </g>

  <g transform="translate(565,110)">
    <rect width="175" height="110" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <text x="88" y="22" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">음수 (특수)</text>
    <line x1="15" y1="32" x2="160" y2="32" stroke="#334155" stroke-width="1"/>
    <text x="88" y="50" text-anchor="middle" fill="#e2e8f0" font-size="10">OCF+, NI- 또는</text>
    <text x="88" y="65" text-anchor="middle" fill="#e2e8f0" font-size="10">OCF-, NI+</text>
    <text x="88" y="85" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">상황별 해석 필요</text>
    <text x="88" y="102" text-anchor="middle" fill="#94a3b8" font-size="9">감가상각비 vs 운전자본</text>
  </g>

  <!-- Key variable: depreciation -->
  <rect x="55" y="240" width="690" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="262" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">핵심 변수: 감가상각비</text>
  <text x="400" y="282" text-anchor="middle" fill="#e2e8f0" font-size="11">IS에서 비용이지만 CF에서는 현금 유출 아님 -- 이것이 IS 이익과 CF 현금의 차이를 만든다</text>
  <text x="400" y="300" text-anchor="middle" fill="#94a3b8" font-size="10">대규모 설비 기업: 순이익 적자여도 영업CF 양수 가능 (감가상각비가 현금을 보존)</text>

  <!-- Time series note -->
  <rect x="55" y="325" width="690" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="400" y="348" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">반드시 시계열로 본다</text>
  <text x="400" y="368" text-anchor="middle" fill="#94a3b8" font-size="10">3년 전 120% -> 올해 50% = 이익의 현금 전환 악화 추세 -- 매출채권/재고 증가 확인</text>
</svg>
