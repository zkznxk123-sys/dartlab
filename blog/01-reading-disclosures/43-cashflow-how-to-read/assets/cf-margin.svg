<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="800" height="380" rx="12" fill="#0f172a"/>

  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">영업CF 마진 -- 매출 대비 현금 창출력</text>

  <!-- Formula -->
  <rect x="200" y="55" width="400" height="35" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="78" text-anchor="middle" fill="#e2e8f0" font-size="12">영업CF 마진 = 영업CF / 매출 x 100</text>

  <!-- Key insight box -->
  <rect x="55" y="105" width="690" height="50" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1"/>
  <text x="400" y="128" text-anchor="middle" fill="#e2e8f0" font-size="11">영업이익률과 영업CF 마진의 <tspan fill="#fbbf24" font-weight="600">괴리</tspan>가 크면</text>
  <text x="400" y="146" text-anchor="middle" fill="#94a3b8" font-size="10">이익의 상당 부분이 현금 미전환 -- 운전자본(매출채권, 재고, 선급금)에 묶임</text>

  <!-- Industry benchmarks -->
  <text x="400" y="185" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="600">업종별 영업CF 마진 기준</text>

  <g transform="translate(55,200)">
    <!-- IT/Software -->
    <rect width="155" height="80" rx="8" fill="#14532d" stroke="#34d399" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">IT/소프트웨어</text>
    <text x="78" y="45" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">20~30%</text>
    <text x="78" y="65" text-anchor="middle" fill="#94a3b8" font-size="9">자본 적게 드는 구조</text>
  </g>

  <g transform="translate(225,200)">
    <!-- Manufacturing -->
    <rect width="155" height="80" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="700">일반 제조업</text>
    <text x="78" y="45" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">10~15%</text>
    <text x="78" y="65" text-anchor="middle" fill="#94a3b8" font-size="9">설비+운전자본 부담</text>
  </g>

  <g transform="translate(395,200)">
    <!-- Heavy industry -->
    <rect width="155" height="80" rx="8" fill="#1e3a5f" stroke="#fb923c" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">중공업/건설</text>
    <text x="78" y="45" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">5~10%</text>
    <text x="78" y="65" text-anchor="middle" fill="#94a3b8" font-size="9">장기 프로젝트, 긴 CCC</text>
  </g>

  <g transform="translate(565,200)">
    <!-- Warning zone -->
    <rect width="175" height="80" rx="8" fill="#451a03" stroke="#f87171" stroke-width="1"/>
    <text x="88" y="22" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700">10% 미만 경고</text>
    <text x="88" y="45" text-anchor="middle" fill="#f87171" font-size="18" font-weight="700">< 10%</text>
    <text x="88" y="65" text-anchor="middle" fill="#94a3b8" font-size="9">현금 창출력 약화</text>
  </g>

  <!-- What to check -->
  <rect x="55" y="300" width="690" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="320" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">영업CF 마진이 하락할 때 확인할 것</text>
  <text x="200" y="345" text-anchor="middle" fill="#94a3b8" font-size="10">매출채권 회전 느려짐?</text>
  <text x="400" y="345" text-anchor="middle" fill="#94a3b8" font-size="10">재고 급증?</text>
  <text x="600" y="345" text-anchor="middle" fill="#94a3b8" font-size="10">선수금/계약부채 감소?</text>

  <text x="400" y="375" text-anchor="middle" fill="#475569" font-size="9">같은 업종 내에서 경쟁사 대비 추세를 비교하는 것이 핵심 -- 절대 수치보다 방향</text>
</svg>
