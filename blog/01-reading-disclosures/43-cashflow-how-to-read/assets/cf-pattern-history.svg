<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="800" height="420" rx="12" fill="#0f172a"/>

  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">CF 6패턴 -- 부호 조합이 말하는 회사의 단계</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-size="11">영업CF / 투자CF / 재무CF의 +/- 조합으로 현금 순환 구조를 판단한다</text>

  <!-- Row 1: Healthy patterns -->
  <g transform="translate(55,75)">
    <rect width="220" height="125" rx="8" fill="#14532d" stroke="#34d399" stroke-width="1"/>
    <text x="110" y="22" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">성숙형</text>
    <text x="30" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="55" y="48" fill="#94a3b8" font-size="10">영업</text>
    <text x="100" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="118" y="48" fill="#94a3b8" font-size="10">투자</text>
    <text x="160" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="178" y="48" fill="#94a3b8" font-size="10">재무</text>
    <line x1="20" y1="58" x2="200" y2="58" stroke="#334155" stroke-width="1"/>
    <text x="110" y="78" text-anchor="middle" fill="#e2e8f0" font-size="10">자체 현금으로 투자 + 부채 상환</text>
    <text x="110" y="95" text-anchor="middle" fill="#94a3b8" font-size="9">가장 건강한 구조</text>
    <text x="110" y="115" text-anchor="middle" fill="#64748b" font-size="9">성숙기 우량 기업에서 관찰</text>
  </g>

  <g transform="translate(290,75)">
    <rect width="220" height="125" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1"/>
    <text x="110" y="22" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">확장형</text>
    <text x="30" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="55" y="48" fill="#94a3b8" font-size="10">영업</text>
    <text x="100" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="118" y="48" fill="#94a3b8" font-size="10">투자</text>
    <text x="160" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="178" y="48" fill="#94a3b8" font-size="10">재무</text>
    <line x1="20" y1="58" x2="200" y2="58" stroke="#334155" stroke-width="1"/>
    <text x="110" y="78" text-anchor="middle" fill="#e2e8f0" font-size="10">본업 + 외부 자금으로 공격적 투자</text>
    <text x="110" y="95" text-anchor="middle" fill="#94a3b8" font-size="9">성장기 기업에 자연스러운 패턴</text>
    <text x="110" y="115" text-anchor="middle" fill="#64748b" font-size="9">장기 지속 시 부채 누적 주의</text>
  </g>

  <g transform="translate(525,75)">
    <rect width="220" height="125" rx="8" fill="#1e3a5f" stroke="#fb923c" stroke-width="1"/>
    <text x="110" y="22" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">구조조정형</text>
    <text x="30" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="55" y="48" fill="#94a3b8" font-size="10">영업</text>
    <text x="100" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="118" y="48" fill="#94a3b8" font-size="10">투자</text>
    <text x="160" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="178" y="48" fill="#94a3b8" font-size="10">재무</text>
    <line x1="20" y1="58" x2="200" y2="58" stroke="#334155" stroke-width="1"/>
    <text x="110" y="78" text-anchor="middle" fill="#e2e8f0" font-size="10">자산 매각 + 부채 상환</text>
    <text x="110" y="95" text-anchor="middle" fill="#94a3b8" font-size="9">재무 건전성 회복 과정</text>
    <text x="110" y="115" text-anchor="middle" fill="#64748b" font-size="9">확장 후 전환 시 관찰</text>
  </g>

  <!-- Row 2: Warning patterns -->
  <g transform="translate(55,220)">
    <rect width="220" height="125" rx="8" fill="#451a03" stroke="#f87171" stroke-width="1"/>
    <text x="110" y="22" text-anchor="middle" fill="#f87171" font-size="13" font-weight="700">위기형</text>
    <text x="30" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="55" y="48" fill="#94a3b8" font-size="10">영업</text>
    <text x="100" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="118" y="48" fill="#94a3b8" font-size="10">투자</text>
    <text x="160" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="178" y="48" fill="#94a3b8" font-size="10">재무</text>
    <line x1="20" y1="58" x2="200" y2="58" stroke="#334155" stroke-width="1"/>
    <text x="110" y="78" text-anchor="middle" fill="#e2e8f0" font-size="10">영업 적자를 차입으로 메움</text>
    <text x="110" y="95" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">외부 자금 의존 심각</text>
    <text x="110" y="115" text-anchor="middle" fill="#64748b" font-size="9">지속 가능성 의문</text>
  </g>

  <g transform="translate(290,220)">
    <rect width="220" height="125" rx="8" fill="#451a03" stroke="#fb923c" stroke-width="1"/>
    <text x="110" y="22" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">축소형</text>
    <text x="30" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="55" y="48" fill="#94a3b8" font-size="10">영업</text>
    <text x="100" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="118" y="48" fill="#94a3b8" font-size="10">투자</text>
    <text x="160" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="178" y="48" fill="#94a3b8" font-size="10">재무</text>
    <line x1="20" y1="58" x2="200" y2="58" stroke="#334155" stroke-width="1"/>
    <text x="110" y="78" text-anchor="middle" fill="#e2e8f0" font-size="10">영업 적자, 자산 매각으로 상환</text>
    <text x="110" y="95" text-anchor="middle" fill="#94a3b8" font-size="9">사업 축소 진행 중</text>
    <text x="110" y="115" text-anchor="middle" fill="#64748b" font-size="9">매각 자산 소진 시 한계</text>
  </g>

  <g transform="translate(525,220)">
    <rect width="220" height="125" rx="8" fill="#451a03" stroke="#fbbf24" stroke-width="1"/>
    <text x="110" y="22" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">전환형</text>
    <text x="30" y="48" fill="#f87171" font-size="16" font-weight="700">-</text>
    <text x="55" y="48" fill="#94a3b8" font-size="10">영업</text>
    <text x="100" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="118" y="48" fill="#94a3b8" font-size="10">투자</text>
    <text x="160" y="48" fill="#34d399" font-size="16" font-weight="700">+</text>
    <text x="178" y="48" fill="#94a3b8" font-size="10">재무</text>
    <line x1="20" y1="58" x2="200" y2="58" stroke="#334155" stroke-width="1"/>
    <text x="110" y="78" text-anchor="middle" fill="#e2e8f0" font-size="10">자산 매각 + 차입으로 적자 보전</text>
    <text x="110" y="95" text-anchor="middle" fill="#94a3b8" font-size="9">사업 전환기 또는 위기</text>
    <text x="110" y="115" text-anchor="middle" fill="#64748b" font-size="9">영업 회복이 관건</text>
  </g>

  <!-- Key insight -->
  <rect x="55" y="365" width="690" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" fill="#e2e8f0" font-size="11">패턴 자체보다 <tspan fill="#fbbf24" font-weight="600">패턴의 변화</tspan>가 더 중요하다 -- 3년간 확장형 -> 구조조정형이면 전략 전환 신호</text>
  <text x="400" y="403" text-anchor="middle" fill="#94a3b8" font-size="9">Subramanyam, Financial Statement Analysis -- dartlab c.review("현금흐름")에서 자동 판정</text>
</svg>
