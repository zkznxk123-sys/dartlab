<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Pretendard, -apple-system, sans-serif">
  <rect width="800" height="380" rx="12" fill="#0f172a"/>

  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">FCF (자유현금흐름) -- 투자까지 감당하고 남는 진짜 여유 현금</text>

  <!-- Formula -->
  <rect x="200" y="55" width="400" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="80" text-anchor="middle" fill="#e2e8f0" font-size="14">FCF = <tspan fill="#38bdf8">영업CF</tspan> - <tspan fill="#fb923c">CAPEX</tspan></text>

  <!-- Two scenarios -->
  <g transform="translate(55,115)">
    <rect width="330" height="180" rx="10" fill="#14532d" stroke="#34d399" stroke-width="1.5"/>
    <text x="165" y="28" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">FCF 양수</text>
    <line x1="20" y1="40" x2="310" y2="40" stroke="#1e3a5f" stroke-width="1"/>

    <!-- Visual: OCF bar > CAPEX bar -->
    <rect x="40" y="55" width="50" height="80" rx="4" fill="#38bdf8" opacity="0.7"/>
    <text x="65" y="148" text-anchor="middle" fill="#94a3b8" font-size="9">영업CF</text>
    <rect x="100" y="80" width="50" height="55" rx="4" fill="#fb923c" opacity="0.7"/>
    <text x="125" y="148" text-anchor="middle" fill="#94a3b8" font-size="9">CAPEX</text>
    <text x="170" y="105" fill="#34d399" font-size="11" font-weight="600">= 여유 현금</text>

    <text x="165" y="168" text-anchor="middle" fill="#e2e8f0" font-size="10">배당, 자사주 매입, 부채 상환 가능</text>
    <text x="165" y="183" text-anchor="middle" fill="#94a3b8" font-size="9">외부 자금 없이 자체 운영 가능한 구조</text>
  </g>

  <g transform="translate(415,115)">
    <rect width="330" height="180" rx="10" fill="#451a03" stroke="#f87171" stroke-width="1.5"/>
    <text x="165" y="28" text-anchor="middle" fill="#f87171" font-size="14" font-weight="700">FCF 음수</text>
    <line x1="20" y1="40" x2="310" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Visual: OCF bar < CAPEX bar -->
    <rect x="40" y="80" width="50" height="55" rx="4" fill="#38bdf8" opacity="0.7"/>
    <text x="65" y="148" text-anchor="middle" fill="#94a3b8" font-size="9">영업CF</text>
    <rect x="100" y="55" width="50" height="80" rx="4" fill="#fb923c" opacity="0.7"/>
    <text x="125" y="148" text-anchor="middle" fill="#94a3b8" font-size="9">CAPEX</text>
    <text x="170" y="95" fill="#f87171" font-size="11" font-weight="600">= 부족분</text>
    <text x="170" y="112" fill="#94a3b8" font-size="9">차입/유증 필요</text>

    <text x="165" y="168" text-anchor="middle" fill="#e2e8f0" font-size="10">외부 자금으로 메워야 하는 구조</text>
    <text x="165" y="183" text-anchor="middle" fill="#94a3b8" font-size="9">장기 지속 시 부채 누적 위험</text>
  </g>

  <!-- Key insight -->
  <rect x="55" y="310" width="690" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="332" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">FCF 음수 자체는 나쁜 것이 아니다 -- 핵심은 기간과 추세</text>
  <text x="400" y="350" text-anchor="middle" fill="#94a3b8" font-size="10">3년+ 적자 지속 + 영업CF 감소 추세 = CAPEX 줄이지 않으면 개선 경로 없음</text>
</svg>
