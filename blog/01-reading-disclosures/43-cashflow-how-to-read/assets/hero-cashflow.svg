<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hcbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" rx="16" fill="url(#hcbg)"/>

  <text x="400" y="42" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">현금흐름 분석 프레임워크</text>
  <text x="400" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">IS 이익과 CF 현금은 왜 다른가 -- 세 가지 축으로 읽는다</text>

  <!-- Core question -->
  <rect x="200" y="85" width="400" height="40" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="110" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">발생주의(IS) vs 현금주의(CF) -- 이 차이가 모든 것을 만든다</text>

  <!-- Three pillars -->
  <g transform="translate(55,145)">
    <rect width="220" height="170" rx="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">1. CF 3구간 + 패턴</text>
    <line x1="20" y1="40" x2="200" y2="40" stroke="#334155" stroke-width="1"/>
    <text x="110" y="60" text-anchor="middle" fill="#e2e8f0" font-size="11">영업CF / 투자CF / 재무CF</text>
    <text x="110" y="80" text-anchor="middle" fill="#94a3b8" font-size="10">부호 조합 = 6가지 패턴</text>
    <text x="110" y="100" text-anchor="middle" fill="#34d399" font-size="10">성숙형 (+/-/-)</text>
    <text x="110" y="114" text-anchor="middle" fill="#38bdf8" font-size="10">확장형 (+/-/+)</text>
    <text x="110" y="128" text-anchor="middle" fill="#fb923c" font-size="10">구조조정형 (+/+/-)</text>
    <text x="110" y="142" text-anchor="middle" fill="#f87171" font-size="10">위기형 (-/-/+)</text>
    <text x="110" y="162" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">패턴 자체보다 변화가 중요</text>
  </g>

  <g transform="translate(290,145)">
    <rect width="220" height="170" rx="10" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">2. FCF (자유현금흐름)</text>
    <line x1="20" y1="40" x2="200" y2="40" stroke="#334155" stroke-width="1"/>
    <text x="110" y="60" text-anchor="middle" fill="#e2e8f0" font-size="11">= 영업CF - CAPEX</text>
    <text x="110" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">투자까지 감당하고 남는 진짜 여유 현금</text>
    <text x="110" y="105" text-anchor="middle" fill="#34d399" font-size="10">양수: 배당/상환/재투자 가능</text>
    <text x="110" y="122" text-anchor="middle" fill="#f87171" font-size="10">음수: 외부 자금으로 메워야</text>
    <text x="110" y="145" text-anchor="middle" fill="#94a3b8" font-size="9">음수 자체보다 기간과 추세가 핵심</text>
    <text x="110" y="162" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">영업CF가 줄면 CAPEX 줄여도 적자</text>
  </g>

  <g transform="translate(525,145)">
    <rect width="220" height="170" rx="10" fill="#1e3a5f" stroke="#fb923c" stroke-width="1.5"/>
    <text x="110" y="28" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="700">3. 이익의 현금 뒷받침</text>
    <line x1="20" y1="40" x2="200" y2="40" stroke="#334155" stroke-width="1"/>
    <text x="110" y="60" text-anchor="middle" fill="#e2e8f0" font-size="11">영업CF / 순이익</text>
    <text x="110" y="80" text-anchor="middle" fill="#94a3b8" font-size="10">IS 이익이 CF 현금으로 전환되는 비율</text>
    <text x="110" y="105" text-anchor="middle" fill="#34d399" font-size="10">100%+: 이익 이상의 현금 유입</text>
    <text x="110" y="122" text-anchor="middle" fill="#fbbf24" font-size="10">40~100%: 부분 전환, 원인 확인</text>
    <text x="110" y="139" text-anchor="middle" fill="#f87171" font-size="10">40% 미만: 이익의 질 의문</text>
    <text x="110" y="162" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">감가상각비가 핵심 변수</text>
  </g>

  <!-- Bottom: CF margin -->
  <rect x="55" y="335" width="690" height="50" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="400" y="358" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700">영업CF 마진 = 영업CF / 매출 -- 매출 대비 현금 창출력의 직접 지표</text>
  <text x="400" y="376" text-anchor="middle" fill="#94a3b8" font-size="10">영업이익률과 영업CF 마진의 괴리가 크면 운전자본에 현금이 묶이고 있다</text>

  <!-- Warning signals -->
  <text x="400" y="410" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">경고 신호</text>
  <text x="200" y="430" text-anchor="middle" fill="#94a3b8" font-size="9">영업CF 적자</text>
  <text x="350" y="430" text-anchor="middle" fill="#94a3b8" font-size="9">FCF 3년+ 적자</text>
  <text x="500" y="430" text-anchor="middle" fill="#94a3b8" font-size="9">위기형 CF 패턴</text>
  <text x="650" y="430" text-anchor="middle" fill="#94a3b8" font-size="9">OCF/NI 40% 미만</text>

  <text x="400" y="448" text-anchor="middle" fill="#475569" font-size="9">Subramanyam CF 패턴 + FCF + Cash Quality -- dartlab c.review("현금흐름")</text>
</svg>
