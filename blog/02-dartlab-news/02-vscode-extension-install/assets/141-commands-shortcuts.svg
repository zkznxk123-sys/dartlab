<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>슬래시 커맨드와 단축키</title>
  <desc>DartLab 익스텐션의 슬래시 커맨드 5개와 키보드 단축키 정리</desc>
  <defs>
    <linearGradient id="bg141c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg141c)" rx="16"/>

  <text x="600" y="58" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">슬래시 한 글자, 단축키 두 키 — 빠른 사용법</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">자주 쓰는 동작은 외울 필요 없이 자동완성이 안내한다</text>

  <!-- 슬래시 커맨드 카드 -->
  <rect x="60" y="130" width="540" height="540" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="330" y="170" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="18" font-weight="700">슬래시 커맨드</text>
  <text x="330" y="194" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">입력창에 / 를 치면 자동완성이 뜬다</text>

  <g font-family="monospace" font-size="14">
    <!-- /new -->
    <rect x="100" y="220" width="460" height="62" rx="8" fill="#0f172a" stroke="#7c3aed"/>
    <text x="120" y="248" fill="#c4b5fd" font-weight="700">/new</text>
    <text x="120" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">새 대화 시작 — 이전 맥락 비우기</text>

    <!-- /clear -->
    <rect x="100" y="294" width="460" height="62" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="120" y="322" fill="#c4b5fd" font-weight="700">/clear</text>
    <text x="120" y="344" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">현재 대화 메시지만 비우기 (대화 자체는 유지)</text>

    <!-- /model -->
    <rect x="100" y="368" width="460" height="62" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="120" y="396" fill="#c4b5fd" font-weight="700">/model</text>
    <text x="120" y="418" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">AI 모델 변경 — Pro · Flash · Mini 등</text>

    <!-- /provider -->
    <rect x="100" y="442" width="460" height="62" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="120" y="470" fill="#c4b5fd" font-weight="700">/provider</text>
    <text x="120" y="492" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Provider 변경 — Gemini · Groq · Cerebras · …</text>

    <!-- /help -->
    <rect x="100" y="516" width="460" height="62" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="120" y="544" fill="#c4b5fd" font-weight="700">/help</text>
    <text x="120" y="566" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">전체 명령 목록 + 사용법</text>
  </g>

  <text x="330" y="618" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">↑ ↓ 키로 입력 히스토리 탐색</text>

  <!-- 단축키 카드 -->
  <rect x="620" y="130" width="520" height="540" rx="14" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="880" y="170" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="18" font-weight="700">키보드 단축키</text>
  <text x="880" y="194" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">손이 키보드를 떠나지 않아도 된다</text>

  <g>
    <!-- 단축키 1 -->
    <rect x="660" y="220" width="440" height="80" rx="10" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
    <g font-family="monospace" font-size="14">
      <rect x="680" y="240" width="48" height="36" rx="5" fill="#1e293b" stroke="#fb923c"/>
      <text x="704" y="263" text-anchor="middle" fill="#fdba74" font-weight="700">Ctrl</text>
      <text x="734" y="263" fill="#64748b">+</text>
      <rect x="746" y="240" width="64" height="36" rx="5" fill="#1e293b" stroke="#fb923c"/>
      <text x="778" y="263" text-anchor="middle" fill="#fdba74" font-weight="700">Shift</text>
      <text x="816" y="263" fill="#64748b">+</text>
      <rect x="828" y="240" width="36" height="36" rx="5" fill="#1e293b" stroke="#fb923c"/>
      <text x="846" y="263" text-anchor="middle" fill="#fdba74" font-weight="700">D</text>
    </g>
    <text x="900" y="263" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="700">DartLab 사이드바 열기</text>
    <text x="900" y="288" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">언제든지 채팅창을 토글</text>

    <!-- 단축키 2 -->
    <rect x="660" y="312" width="440" height="80" rx="10" fill="#0f172a" stroke="#475569"/>
    <g font-family="monospace" font-size="14">
      <rect x="680" y="332" width="48" height="36" rx="5" fill="#1e293b" stroke="#64748b"/>
      <text x="704" y="355" text-anchor="middle" fill="#cbd5e1" font-weight="700">Ctrl</text>
      <text x="734" y="355" fill="#64748b">+</text>
      <rect x="746" y="332" width="64" height="36" rx="5" fill="#1e293b" stroke="#64748b"/>
      <text x="778" y="355" text-anchor="middle" fill="#cbd5e1" font-weight="700">Enter</text>
    </g>
    <text x="822" y="355" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="700">메시지 전송</text>
    <text x="822" y="380" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">엔터는 줄바꿈, Ctrl+Enter는 전송</text>

    <!-- 단축키 3 -->
    <rect x="660" y="404" width="440" height="80" rx="10" fill="#0f172a" stroke="#475569"/>
    <g font-family="monospace" font-size="14">
      <rect x="680" y="424" width="36" height="36" rx="5" fill="#1e293b" stroke="#64748b"/>
      <text x="698" y="447" text-anchor="middle" fill="#cbd5e1" font-weight="700">↑</text>
      <text x="724" y="447" fill="#64748b">/</text>
      <rect x="738" y="424" width="36" height="36" rx="5" fill="#1e293b" stroke="#64748b"/>
      <text x="756" y="447" text-anchor="middle" fill="#cbd5e1" font-weight="700">↓</text>
    </g>
    <text x="790" y="447" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="700">입력 히스토리 탐색</text>
    <text x="790" y="472" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">이전 질문을 즉시 재사용</text>

    <!-- 단축키 4 -->
    <rect x="660" y="496" width="440" height="80" rx="10" fill="#0f172a" stroke="#475569"/>
    <g font-family="monospace" font-size="14">
      <rect x="680" y="516" width="48" height="36" rx="5" fill="#1e293b" stroke="#64748b"/>
      <text x="704" y="539" text-anchor="middle" fill="#cbd5e1" font-weight="700">Ctrl</text>
      <text x="734" y="539" fill="#64748b">+</text>
      <rect x="746" y="516" width="64" height="36" rx="5" fill="#1e293b" stroke="#64748b"/>
      <text x="778" y="539" text-anchor="middle" fill="#cbd5e1" font-weight="700">Shift</text>
      <text x="816" y="539" fill="#64748b">+</text>
      <rect x="828" y="516" width="40" height="36" rx="5" fill="#1e293b" stroke="#64748b"/>
      <text x="848" y="539" text-anchor="middle" fill="#cbd5e1" font-weight="700">P</text>
    </g>
    <text x="880" y="539" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13" font-weight="700">명령 팔레트 → DartLab:</text>
    <text x="880" y="562" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">진단 정보 · 로그 · 새 대화 등</text>
  </g>

  <text x="880" y="618" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">macOS는 Ctrl 대신 Cmd</text>
</svg>
