<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>설치 흐름 — uv 다음 VSCode + DartLab 익스텐션</title>
  <desc>지난 글에서 끝낸 uv 설치 다음 단계로 VSCode 설치 → DartLab 익스텐션 설치 → 종목코드 입력으로 이어지는 4단계 흐름</desc>
  <defs>
    <linearGradient id="bg141i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arr141i" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg141i)" rx="16"/>

  <text x="600" y="58" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">설치 흐름 — 지난 글의 uv 다음 단계</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">터미널 없이도 dartlab을 시작하는 길</text>

  <!-- 0단계 (지난 글) -->
  <rect x="60" y="160" width="240" height="200" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="180" y="192" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">지난 글</text>
  <text x="180" y="222" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="16" font-weight="700">0. uv 설치</text>
  <rect x="80" y="240" width="200" height="36" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="180" y="263" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="12">uv pip install dartlab</text>
  <text x="180" y="300" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Python 패키지 준비 완료</text>
  <text x="180" y="334" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">→ /blog/dartlab-easy-start</text>

  <!-- 1단계 VSCode -->
  <rect x="340" y="160" width="240" height="200" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="460" y="192" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="12">1단계</text>
  <text x="460" y="222" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="700">VSCode 설치</text>
  <rect x="360" y="240" width="200" height="36" rx="6" fill="#0f172a" stroke="#1e40af"/>
  <text x="460" y="263" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11">code.visualstudio.com</text>
  <text x="460" y="300" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">윈도우 · 맥 · 리눅스 무료</text>
  <text x="460" y="324" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">이미 있으면 스킵</text>

  <!-- 2단계 익스텐션 -->
  <rect x="620" y="160" width="240" height="200" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="740" y="192" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="12">2단계</text>
  <text x="740" y="222" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="700">DartLab 익스텐션</text>
  <rect x="640" y="240" width="200" height="36" rx="6" fill="#0f172a" stroke="#7c3aed"/>
  <text x="740" y="263" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12">Ctrl+Shift+X → dartlab</text>
  <text x="740" y="300" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">게시자: eddmpython</text>
  <text x="740" y="324" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Install 클릭 한 번</text>

  <!-- 3단계 첫 실행 -->
  <rect x="900" y="160" width="240" height="200" rx="14" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
  <text x="1020" y="192" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="12">3단계</text>
  <text x="1020" y="222" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="700">종목코드 입력</text>
  <rect x="920" y="240" width="200" height="36" rx="6" fill="#1e293b" stroke="#fb923c"/>
  <text x="1020" y="263" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="12">Ctrl+Shift+D</text>
  <text x="1020" y="300" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">사이드바 채팅창 → "005930"</text>
  <text x="1020" y="324" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">AI가 분석 시작</text>

  <!-- 화살표 -->
  <line x1="300" y1="260" x2="338" y2="260" stroke="#475569" stroke-width="2.5" marker-end="url(#arr141i)"/>
  <line x1="580" y1="260" x2="618" y2="260" stroke="#475569" stroke-width="2.5" marker-end="url(#arr141i)"/>
  <line x1="860" y1="260" x2="898" y2="260" stroke="#475569" stroke-width="2.5" marker-end="url(#arr141i)"/>

  <!-- 결과 박스 -->
  <rect x="60" y="430" width="1080" height="240" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="600" y="468" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="700">설치가 끝나면 화면에 새로 생기는 것</text>

  <g font-family="system-ui, sans-serif">
    <circle cx="170" cy="540" r="32" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
    <text x="170" y="548" text-anchor="middle" fill="#fdba74" font-size="22" font-weight="700">D</text>
    <text x="170" y="600" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">Activity Bar 아이콘</text>
    <text x="170" y="620" text-anchor="middle" fill="#94a3b8" font-size="11">왼쪽 사이드 메뉴</text>

    <rect x="340" y="510" width="180" height="60" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="430" y="535" text-anchor="middle" fill="#c4b5fd" font-size="12">┃ 종목코드 입력 …</text>
    <text x="430" y="555" text-anchor="middle" fill="#64748b" font-size="11">/new  /clear  /model</text>
    <text x="430" y="600" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">사이드바 채팅창</text>
    <text x="430" y="620" text-anchor="middle" fill="#94a3b8" font-size="11">자연어 질문 → 분석</text>

    <rect x="580" y="510" width="180" height="60" rx="8" fill="#1e293b" stroke="#3b82f6"/>
    <text x="670" y="538" text-anchor="middle" fill="#93c5fd" font-size="12">▦ 매출 ─▁▂▃▅█</text>
    <text x="670" y="558" text-anchor="middle" fill="#64748b" font-size="11">표 · 차트 · 링크</text>
    <text x="670" y="600" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">결과 렌더링</text>
    <text x="670" y="620" text-anchor="middle" fill="#94a3b8" font-size="11">채팅창 안에서</text>

    <rect x="820" y="510" width="180" height="60" rx="8" fill="#1e293b" stroke="#4ade80"/>
    <text x="910" y="538" text-anchor="middle" fill="#86efac" font-size="12">MCP server</text>
    <text x="910" y="558" text-anchor="middle" fill="#64748b" font-size="11">Copilot · Claude Code</text>
    <text x="910" y="600" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="700">자동 등록</text>
    <text x="910" y="620" text-anchor="middle" fill="#94a3b8" font-size="11">다른 AI도 dartlab 사용</text>
  </g>
</svg>
