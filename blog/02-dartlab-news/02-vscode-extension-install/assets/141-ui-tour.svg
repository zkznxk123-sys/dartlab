<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>DartLab VSCode UI 투어</title>
  <desc>Activity Bar 아이콘, 사이드바 채팅창, 모듈 토글, 결과 렌더링까지 익스텐션 UI 구성</desc>
  <defs>
    <linearGradient id="bg141u" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg141u)" rx="16"/>

  <text x="600" y="48" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">사이드바 채팅창 한 곳에서 모든 분석</text>
  <text x="600" y="74" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Ctrl + Shift + D 로 열기</text>

  <!-- VSCode mockup -->
  <rect x="60" y="100" width="1080" height="600" rx="10" fill="#1e1e1e"/>

  <!-- Title bar -->
  <rect x="60" y="100" width="1080" height="28" rx="10" fill="#3c3c3c"/>
  <circle cx="84" cy="114" r="5" fill="#ff5f57"/>
  <circle cx="100" cy="114" r="5" fill="#febc2e"/>
  <circle cx="116" cy="114" r="5" fill="#28c840"/>

  <!-- Activity bar -->
  <rect x="60" y="128" width="50" height="572" fill="#333333"/>
  <g>
    <rect x="68" y="144" width="34" height="34" rx="3" fill="#252526"/>
    <text x="85" y="166" text-anchor="middle" fill="#858585" font-size="14">📁</text>
    <rect x="68" y="184" width="34" height="34" rx="3" fill="#252526"/>
    <text x="85" y="206" text-anchor="middle" fill="#858585" font-size="14">🔍</text>
    <rect x="68" y="224" width="34" height="34" rx="3" fill="#252526"/>
    <text x="85" y="246" text-anchor="middle" fill="#858585" font-size="14">⎇</text>
    <rect x="68" y="264" width="34" height="34" rx="3" fill="#252526"/>
    <text x="85" y="286" text-anchor="middle" fill="#858585" font-size="14">▤</text>
    <!-- DartLab icon highlighted -->
    <rect x="64" y="304" width="42" height="42" rx="4" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
    <text x="85" y="332" text-anchor="middle" fill="#fdba74" font-size="22" font-weight="700">D</text>
    <text x="172" y="328" fill="#fdba74" font-family="system-ui, sans-serif" font-size="11">← Activity Bar 아이콘</text>
  </g>

  <!-- Chat sidebar -->
  <rect x="110" y="128" width="380" height="572" fill="#252526"/>

  <!-- header -->
  <rect x="110" y="128" width="380" height="38" fill="#2d2d30"/>
  <text x="128" y="153" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">DartLab</text>
  <text x="200" y="153" fill="#9d9d9d" font-family="system-ui, sans-serif" font-size="11">Gemini 2.5 Pro</text>
  <text x="464" y="153" text-anchor="end" fill="#9d9d9d" font-size="13">⊕ ⋯</text>

  <!-- Conversation list collapse -->
  <rect x="110" y="166" width="380" height="22" fill="#2a2a2c"/>
  <text x="128" y="181" fill="#9d9d9d" font-family="system-ui, sans-serif" font-size="10">▾ 005930 삼성전자 분석</text>

  <!-- User msg -->
  <rect x="128" y="200" width="344" height="44" rx="6" fill="#0e639c"/>
  <text x="144" y="220" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12">삼성전자 영업이익률 추이</text>
  <text x="144" y="236" fill="#cce4f7" font-family="system-ui, sans-serif" font-size="12">차트로 보여줘</text>

  <!-- AI msg with code -->
  <rect x="128" y="256" width="344" height="74" rx="6" fill="#37373d"/>
  <text x="144" y="276" fill="#cccccc" font-family="system-ui, sans-serif" font-size="11">▸ Tool: dartlab.Company</text>
  <rect x="144" y="284" width="312" height="38" rx="4" fill="#1e1e1e"/>
  <text x="156" y="300" fill="#86efac" font-family="monospace" font-size="10">c = Company("005930")</text>
  <text x="156" y="316" fill="#86efac" font-family="monospace" font-size="10">c.select("ratios", ["영업이익률"])</text>

  <!-- AI msg with chart -->
  <rect x="128" y="342" width="344" height="120" rx="6" fill="#37373d"/>
  <text x="144" y="360" fill="#cccccc" font-family="system-ui, sans-serif" font-size="11">▸ 결과 — 영업이익률 (분기)</text>
  <!-- mini chart -->
  <rect x="144" y="370" width="312" height="80" rx="4" fill="#1e1e1e"/>
  <polyline points="156,432 184,420 212,410 240,398 268,386 296,402 324,388 352,372 380,358 408,344 436,330" fill="none" stroke="#fb923c" stroke-width="2"/>
  <line x1="156" y1="450" x2="436" y2="450" stroke="#3c3c3c"/>
  <text x="156" y="446" fill="#64748b" font-family="monospace" font-size="9">'16</text>
  <text x="430" y="446" fill="#64748b" font-family="monospace" font-size="9">'25</text>
  <text x="436" y="382" text-anchor="end" fill="#fdba74" font-family="monospace" font-size="9">28%</text>

  <!-- Module toggles -->
  <rect x="128" y="478" width="344" height="40" rx="6" fill="#2a2a2c"/>
  <text x="144" y="494" fill="#9d9d9d" font-family="system-ui, sans-serif" font-size="10">모듈</text>
  <g font-family="system-ui, sans-serif" font-size="10">
    <rect x="144" y="500" width="56" height="14" rx="7" fill="#0e639c"/>
    <text x="172" y="511" text-anchor="middle" fill="#ffffff">financial</text>
    <rect x="206" y="500" width="44" height="14" rx="7" fill="#3c3c3c"/>
    <text x="228" y="511" text-anchor="middle" fill="#9d9d9d">growth</text>
    <rect x="256" y="500" width="56" height="14" rx="7" fill="#3c3c3c"/>
    <text x="284" y="511" text-anchor="middle" fill="#9d9d9d">valuation</text>
    <rect x="318" y="500" width="36" height="14" rx="7" fill="#3c3c3c"/>
    <text x="336" y="511" text-anchor="middle" fill="#9d9d9d">risk</text>
  </g>

  <!-- Slash command popup -->
  <rect x="128" y="528" width="344" height="100" rx="6" fill="#2d2d30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="144" y="546" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="700">슬래시 커맨드</text>
  <g font-family="monospace" font-size="11" fill="#cccccc">
    <text x="144" y="566">/new</text><text x="220" y="566" fill="#9d9d9d" font-size="10">새 대화</text>
    <text x="144" y="582">/clear</text><text x="220" y="582" fill="#9d9d9d" font-size="10">현재 대화 비우기</text>
    <text x="144" y="598">/model</text><text x="220" y="598" fill="#9d9d9d" font-size="10">AI 모델 변경</text>
    <text x="144" y="614">/provider</text><text x="220" y="614" fill="#9d9d9d" font-size="10">Provider 변경</text>
  </g>

  <!-- Input box -->
  <rect x="128" y="640" width="344" height="44" rx="6" fill="#3c3c3c" stroke="#fb923c"/>
  <text x="144" y="666" fill="#cccccc" font-family="system-ui, sans-serif" font-size="12">┃ 종목코드 또는 질문 입력…</text>
  <text x="464" y="666" text-anchor="end" fill="#fdba74" font-family="system-ui, sans-serif" font-size="14">↵</text>

  <!-- Editor area -->
  <rect x="490" y="128" width="650" height="572" fill="#1e1e1e"/>

  <!-- Tabs -->
  <rect x="490" y="128" width="160" height="32" fill="#2d2d30"/>
  <rect x="490" y="128" width="160" height="2" fill="#fb923c"/>
  <text x="510" y="149" fill="#cccccc" font-family="system-ui, sans-serif" font-size="11">samsung_analysis.ipynb ×</text>

  <!-- Notebook cell -->
  <rect x="510" y="180" width="610" height="120" rx="4" fill="#252526" stroke="#3c3c3c"/>
  <text x="524" y="200" fill="#9d9d9d" font-family="monospace" font-size="10">[1]</text>
  <text x="556" y="202" fill="#86efac" font-family="monospace" font-size="11">import dartlab</text>
  <text x="556" y="220" fill="#86efac" font-family="monospace" font-size="11">c = dartlab.Company("005930")</text>
  <text x="556" y="240" fill="#86efac" font-family="monospace" font-size="11">c.story()</text>
  <text x="556" y="276" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">↓ 익스텐션이 자동으로 같은 dartlab을 공유</text>

  <!-- Result table -->
  <rect x="510" y="316" width="610" height="368" rx="4" fill="#252526" stroke="#3c3c3c"/>
  <text x="524" y="340" fill="#cccccc" font-family="system-ui, sans-serif" font-size="13" font-weight="700">제2막 — 얼마나 잘 하는가 (수익성)</text>
  <line x1="524" y1="350" x2="1106" y2="350" stroke="#3c3c3c"/>

  <g font-family="monospace" font-size="11" fill="#cbd5e1">
    <text x="524" y="378">분기</text>
    <text x="700" y="378">매출액</text>
    <text x="840" y="378">영업이익</text>
    <text x="990" y="378">영업이익률</text>

    <line x1="524" y1="386" x2="1106" y2="386" stroke="#37373d"/>

    <text x="524" y="408">2023Q4</text>
    <text x="700" y="408">67.78조</text>
    <text x="840" y="408">2.82조</text>
    <text x="990" y="408" fill="#fdba74">4.16%</text>

    <text x="524" y="430">2024Q4</text>
    <text x="700" y="430">75.77조</text>
    <text x="840" y="430">8.17조</text>
    <text x="990" y="430" fill="#fdba74">10.78%</text>

    <text x="524" y="452">2025Q3</text>
    <text x="700" y="452">74.06조</text>
    <text x="840" y="452">10.44조</text>
    <text x="990" y="452" fill="#86efac">14.10%</text>
  </g>

  <text x="524" y="496" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">▸ 영업이익률이 한 해 만에 4% → 14%로 회복</text>
  <text x="524" y="516" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">▸ 메모리 반도체 사이클 회복이 마진에 직접 반영</text>

  <!-- Citation -->
  <rect x="524" y="548" width="582" height="120" rx="4" fill="#1e293b" stroke="#a78bfa"/>
  <text x="540" y="572" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="12" font-weight="700">📎 출처</text>
  <g font-family="monospace" font-size="11" fill="#cbd5e1">
    <text x="540" y="596">c.select("IS", ["매출액","영업이익"])</text>
    <text x="540" y="616">c.select("ratios", ["영업이익률"])</text>
    <text x="540" y="636">c.story("수익성")</text>
  </g>
  <text x="540" y="660" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">→ 모든 수치는 dartlab 함수 호출로 검증 가능</text>
</svg>
