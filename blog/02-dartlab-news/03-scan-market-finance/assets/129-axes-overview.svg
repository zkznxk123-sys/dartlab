<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>dartlab.scan — 계정부터 거버넌스까지 시장 전체를 읽는다</title>
  <desc>scan이 다루는 것: 재무 수치, 비재무 구조, 시장 관계</desc>

  <defs>
    <linearGradient id="bg129c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg129c)" rx="16"/>

  <text x="600" y="45" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="24" font-weight="700">dartlab.scan — 계정부터 거버넌스까지 시장을 읽는다</text>
  <text x="600" y="72" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">모든 축은 한글/영문 양방향 호출 가능</text>

  <!-- 그룹 1: 재무 수치 -->
  <rect x="30" y="95" width="750" height="290" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="125" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="18" font-weight="700">재무 수치</text>
  <text x="55" y="148" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">재무제표에서 뽑을 수 있는 모든 것 — scan("financial")로 8축 일괄 가이드</text>

  <!-- 축 카드들 -->
  <rect x="50" y="165" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="132" y="185" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">account</text>
  <text x="132" y="205" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">임의 계정 시계열</text>

  <rect x="225" y="165" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="307" y="185" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">ratio</text>
  <text x="307" y="205" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">임의 비율 시계열</text>

  <rect x="400" y="165" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="482" y="185" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">profitability</text>
  <text x="482" y="205" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">수익성 + 등급</text>

  <rect x="575" y="165" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="657" y="185" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">growth</text>
  <text x="657" y="205" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">CAGR + 성장 패턴</text>

  <rect x="50" y="230" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="132" y="250" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">efficiency</text>
  <text x="132" y="270" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">회전율 + CCC</text>

  <rect x="225" y="230" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="307" y="250" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">quality</text>
  <text x="307" y="270" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">이익의 질</text>

  <rect x="400" y="230" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="482" y="250" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">liquidity</text>
  <text x="482" y="270" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">유동비율 + 당좌비율</text>

  <rect x="575" y="230" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="657" y="250" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">valuation</text>
  <text x="657" y="270" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">PER/PBR/PSR</text>

  <rect x="50" y="295" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="132" y="315" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">cashflow</text>
  <text x="132" y="335" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">OCF/ICF/FCF 패턴</text>

  <rect x="225" y="295" width="165" height="52" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="307" y="315" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="600">dividendTrend</text>
  <text x="307" y="335" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">DPS 추이 + 패턴</text>

  <!-- 그룹 2: 비재무 구조 -->
  <rect x="30" y="400" width="545" height="290" rx="14" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="55" y="430" fill="#c084fc" font-family="system-ui, sans-serif" font-size="18" font-weight="700">비재무 구조</text>
  <text x="55" y="453" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">숫자 뒤에 있는 구조 — 지배구조, 인력, 주주환원</text>

  <rect x="50" y="470" width="240" height="52" rx="8" fill="#0f172a" stroke="#7e22ce" stroke-width="1"/>
  <text x="170" y="490" text-anchor="middle" fill="#d8b4fe" font-family="monospace" font-size="11" font-weight="600">governance</text>
  <text x="170" y="510" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">지배구조 100점 + A~E 등급</text>

  <rect x="300" y="470" width="240" height="52" rx="8" fill="#0f172a" stroke="#7e22ce" stroke-width="1"/>
  <text x="420" y="490" text-anchor="middle" fill="#d8b4fe" font-family="monospace" font-size="11" font-weight="600">workforce</text>
  <text x="420" y="510" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">직원수, 평균급여, 인건비율</text>

  <rect x="50" y="535" width="240" height="52" rx="8" fill="#0f172a" stroke="#7e22ce" stroke-width="1"/>
  <text x="170" y="555" text-anchor="middle" fill="#d8b4fe" font-family="monospace" font-size="11" font-weight="600">capital</text>
  <text x="170" y="575" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">배당, 자사주, 주주환원 분류</text>

  <rect x="300" y="535" width="240" height="52" rx="8" fill="#0f172a" stroke="#7e22ce" stroke-width="1"/>
  <text x="420" y="555" text-anchor="middle" fill="#d8b4fe" font-family="monospace" font-size="11" font-weight="600">debt</text>
  <text x="420" y="575" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">부채비율, ICR, 위험등급</text>

  <rect x="50" y="600" width="240" height="52" rx="8" fill="#0f172a" stroke="#7e22ce" stroke-width="1"/>
  <text x="170" y="620" text-anchor="middle" fill="#d8b4fe" font-family="monospace" font-size="11" font-weight="600">insider</text>
  <text x="170" y="640" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">최대주주 지분변동, 경영권</text>

  <rect x="300" y="600" width="240" height="52" rx="8" fill="#0f172a" stroke="#7e22ce" stroke-width="1"/>
  <text x="420" y="620" text-anchor="middle" fill="#d8b4fe" font-family="monospace" font-size="11" font-weight="600">audit</text>
  <text x="420" y="640" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">감사의견, 감사인변경</text>

  <!-- 그룹 3: 시장 관계 -->
  <rect x="600" y="400" width="570" height="290" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="625" y="430" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="18" font-weight="700">시장 관계</text>
  <text x="625" y="453" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">기업 간 관계와 시장 수준 신호</text>

  <rect x="620" y="470" width="260" height="52" rx="8" fill="#0f172a" stroke="#b45309" stroke-width="1"/>
  <text x="750" y="490" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="11" font-weight="600">network</text>
  <text x="750" y="510" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">상장사 전체 관계 네트워크</text>

  <rect x="890" y="470" width="260" height="52" rx="8" fill="#0f172a" stroke="#b45309" stroke-width="1"/>
  <text x="1020" y="490" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="11" font-weight="600">screen</text>
  <text x="1020" y="510" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">멀티팩터 스크리닝 프리셋</text>

  <rect x="620" y="535" width="260" height="52" rx="8" fill="#0f172a" stroke="#b45309" stroke-width="1"/>
  <text x="750" y="555" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="11" font-weight="600">disclosureRisk</text>
  <text x="750" y="575" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">공시 변화 선행 리스크</text>

  <rect x="890" y="535" width="260" height="52" rx="8" fill="#0f172a" stroke="#b45309" stroke-width="1"/>
  <text x="1020" y="555" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="11" font-weight="600">macroBeta</text>
  <text x="1020" y="575" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">GDP/금리/환율 민감도</text>

  <!-- 하단 가이드 -->
  <rect x="620" y="615" width="530" height="52" rx="10" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="885" y="637" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="12" font-weight="600">scan("financial")  →  재무 8축 일괄 가이드</text>
  <text x="885" y="656" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">scan("수익성") = scan("profitability")</text>
</svg>
