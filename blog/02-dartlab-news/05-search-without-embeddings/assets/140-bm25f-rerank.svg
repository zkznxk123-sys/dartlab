<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>BM25F 필드 가중치 리랭킹</title>
  <desc>"대표이사 변경" 쿼리에서 BM25F 적용 전후 결과 순위 변화. report_nm 매칭이 5배 가중치를 받아 대표이사변경 공시가 1위로 올라온다.</desc>
  <defs>
    <linearGradient id="bg140b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg140b)" rx="16"/>

  <text x="600" y="58" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">BM25F 필드 가중치 — 같은 매칭, 다른 순위</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">쿼리: "대표이사 변경"</text>

  <!-- 가중치 범례 -->
  <g font-family="system-ui, sans-serif" font-size="12">
    <rect x="60" y="110" width="14" height="14" fill="#fb923c"/>
    <text x="82" y="122" fill="#fdba74">report_nm 매칭 ×5</text>
    <rect x="240" y="110" width="14" height="14" fill="#a78bfa"/>
    <text x="262" y="122" fill="#c4b5fd">section_title 매칭 ×2</text>
    <rect x="430" y="110" width="14" height="14" fill="#475569"/>
    <text x="452" y="122" fill="#94a3b8">content 매칭 ×1</text>
  </g>

  <!-- BEFORE -->
  <text x="60" y="172" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" font-weight="700">BEFORE — TF만 사용</text>

  <g font-family="system-ui, sans-serif" font-size="12">
    <!-- row 1 -->
    <rect x="60" y="190" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="76" y="210" fill="#64748b">1위</text>
    <text x="106" y="210" fill="#cbd5e1">사업보고서 — 임원의 현황</text>
    <rect x="106" y="216" width="44" height="14" fill="#475569"/>
    <text x="128" y="227" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <rect x="156" y="216" width="44" height="14" fill="#475569"/>
    <text x="178" y="227" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <text x="540" y="220" text-anchor="end" fill="#94a3b8" font-family="monospace">8.4</text>

    <rect x="60" y="246" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="76" y="266" fill="#64748b">2위</text>
    <text x="106" y="266" fill="#cbd5e1">분기보고서 — 경영진 변동 본문</text>
    <rect x="106" y="272" width="44" height="14" fill="#475569"/>
    <text x="128" y="283" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <text x="540" y="276" text-anchor="end" fill="#94a3b8" font-family="monospace">7.9</text>

    <rect x="60" y="302" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="76" y="322" fill="#64748b">3위</text>
    <text x="106" y="322" fill="#cbd5e1">정관 변경 안내 본문</text>
    <rect x="106" y="328" width="44" height="14" fill="#475569"/>
    <text x="128" y="339" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <text x="540" y="332" text-anchor="end" fill="#94a3b8" font-family="monospace">7.1</text>

    <rect x="60" y="358" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="76" y="378" fill="#64748b">4위</text>
    <text x="106" y="378" fill="#cbd5e1">대표이사 변경 — 본문 매칭</text>
    <rect x="106" y="384" width="44" height="14" fill="#a78bfa"/>
    <text x="128" y="395" fill="#0f172a" font-family="monospace" font-size="10">×2</text>
    <rect x="156" y="384" width="44" height="14" fill="#475569"/>
    <text x="178" y="395" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <text x="540" y="382" text-anchor="end" fill="#94a3b8" font-family="monospace">6.8</text>

    <rect x="60" y="414" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="76" y="434" fill="#64748b">5위</text>
    <text x="106" y="434" fill="#cbd5e1">대표이사 변경 (제목 매칭)</text>
    <rect x="106" y="440" width="44" height="14" fill="#fb923c"/>
    <text x="128" y="451" fill="#0f172a" font-family="monospace" font-size="10">×5</text>
    <text x="540" y="438" text-anchor="end" fill="#94a3b8" font-family="monospace">6.4</text>
  </g>

  <!-- 화살표 -->
  <text x="600" y="330" text-anchor="middle" fill="#fb923c" font-family="system-ui, sans-serif" font-size="20" font-weight="700">→</text>
  <text x="600" y="350" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="11">BM25F</text>

  <!-- AFTER -->
  <text x="640" y="172" fill="#fdba74" font-family="system-ui, sans-serif" font-size="15" font-weight="700">AFTER — 필드 가중치 적용</text>

  <g font-family="system-ui, sans-serif" font-size="12">
    <rect x="640" y="190" width="500" height="48" rx="6" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
    <text x="656" y="210" fill="#fdba74" font-weight="700">1위</text>
    <text x="686" y="210" fill="#fdba74" font-weight="700">대표이사 변경 (제목 매칭)</text>
    <rect x="686" y="216" width="44" height="14" fill="#fb923c"/>
    <text x="708" y="227" fill="#0f172a" font-family="monospace" font-size="10">×5</text>
    <text x="1120" y="220" text-anchor="end" fill="#fdba74" font-family="monospace" font-weight="700">32.0</text>

    <rect x="640" y="246" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="656" y="266" fill="#64748b">2위</text>
    <text x="686" y="266" fill="#cbd5e1">대표이사 변경 — 본문 매칭</text>
    <rect x="686" y="272" width="44" height="14" fill="#a78bfa"/>
    <text x="708" y="283" fill="#0f172a" font-family="monospace" font-size="10">×2</text>
    <rect x="736" y="272" width="44" height="14" fill="#475569"/>
    <text x="758" y="283" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <text x="1120" y="276" text-anchor="end" fill="#94a3b8" font-family="monospace">13.6</text>

    <rect x="640" y="302" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="656" y="322" fill="#64748b">3위</text>
    <text x="686" y="322" fill="#cbd5e1">사업보고서 — 임원의 현황</text>
    <rect x="686" y="328" width="44" height="14" fill="#475569"/>
    <text x="708" y="339" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <rect x="736" y="328" width="44" height="14" fill="#475569"/>
    <text x="758" y="339" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <text x="1120" y="332" text-anchor="end" fill="#94a3b8" font-family="monospace">8.4</text>

    <rect x="640" y="358" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="656" y="378" fill="#64748b">4위</text>
    <text x="686" y="378" fill="#cbd5e1">분기보고서 — 경영진 변동 본문</text>
    <rect x="686" y="384" width="44" height="14" fill="#475569"/>
    <text x="708" y="395" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <text x="1120" y="382" text-anchor="end" fill="#94a3b8" font-family="monospace">7.9</text>

    <rect x="640" y="414" width="500" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="656" y="434" fill="#64748b">5위</text>
    <text x="686" y="434" fill="#cbd5e1">정관 변경 안내 본문</text>
    <rect x="686" y="440" width="44" height="14" fill="#475569"/>
    <text x="708" y="451" fill="#0f172a" font-family="monospace" font-size="10">×1</text>
    <text x="1120" y="438" text-anchor="end" fill="#94a3b8" font-family="monospace">7.1</text>
  </g>

  <!-- 결론 -->
  <rect x="60" y="510" width="1080" height="170" rx="14" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="600" y="546" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="16" font-weight="700">제목에 쿼리가 들어간 공시가 1위로 올라온다</text>
  <text x="600" y="578" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">사업보고서가 임원 본문에서 쿼리를 포함해도, 그건 사용자가 찾는 게 아니다.</text>
  <text x="600" y="602" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">"대표이사 변경"을 친 사람이 보고 싶은 건 대표이사변경 공시 그 자체다.</text>
  <text x="600" y="640" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">인덱스 변경 없이 검색 후처리만으로 구현. Elasticsearch BM25F와 동일 원리.</text>
</svg>
