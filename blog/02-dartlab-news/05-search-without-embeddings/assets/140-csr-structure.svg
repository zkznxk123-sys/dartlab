<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>CSR 역인덱스 구조</title>
  <desc>offsets 배열과 docIds 배열로 구성된 CSR 역인덱스. stemId가 offsets 인덱스가 되고, 그 슬라이스가 docIds에서 해당 stem을 포함하는 문서 ID를 반환한다.</desc>
  <defs>
    <linearGradient id="bg140c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg140c)" rx="16"/>

  <text x="600" y="58" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">CSR 역인덱스 — 두 개의 numpy 배열로 끝</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">scipy CSR과 같은 구조, 의존성은 numpy 하나</text>

  <!-- offsets 배열 -->
  <text x="100" y="160" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="15" font-weight="700">offsets[]</text>
  <text x="200" y="160" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">stemId마다 docIds 시작 위치를 가리킨다</text>

  <g font-family="monospace" font-size="13" text-anchor="middle">
    <rect x="100" y="180" width="80" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="140" y="200" fill="#64748b" font-size="10">[0]</text>
    <text x="140" y="218" fill="#cbd5e1">0</text>

    <rect x="180" y="180" width="80" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="220" y="200" fill="#64748b" font-size="10">[1]</text>
    <text x="220" y="218" fill="#cbd5e1">1247</text>

    <rect x="260" y="180" width="80" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="300" y="200" fill="#64748b" font-size="10">…</text>

    <rect x="340" y="180" width="80" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="380" y="200" fill="#64748b" font-size="10">[41]</text>
    <text x="380" y="218" fill="#cbd5e1">82310</text>

    <rect x="420" y="180" width="80" height="48" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
    <text x="460" y="200" fill="#86efac" font-size="10" font-weight="700">[42]</text>
    <text x="460" y="218" fill="#86efac" font-weight="700">82550</text>

    <rect x="500" y="180" width="80" height="48" rx="6" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
    <text x="540" y="200" fill="#86efac" font-size="10" font-weight="700">[43]</text>
    <text x="540" y="218" fill="#86efac" font-weight="700">82603</text>

    <rect x="580" y="180" width="80" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="620" y="200" fill="#64748b" font-size="10">[44]</text>
    <text x="620" y="218" fill="#cbd5e1">82691</text>

    <rect x="660" y="180" width="80" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="700" y="200" fill="#64748b" font-size="10">…</text>

    <rect x="740" y="180" width="120" height="48" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="800" y="200" fill="#64748b" font-size="10">[5500]</text>
    <text x="800" y="218" fill="#cbd5e1">3,840,221</text>
  </g>

  <text x="900" y="212" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">길이 = stem 수 + 1</text>

  <!-- 쿼리 stem -->
  <rect x="940" y="180" width="200" height="68" rx="10" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="1040" y="206" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="13" font-weight="700">stemId = 42</text>
  <text x="1040" y="232" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">"유상" 토큰</text>

  <!-- 화살표: offsets[42] → 42:43 슬라이스 -->
  <path d="M460 230 Q460 290 460 305" fill="none" stroke="#4ade80" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M540 230 Q540 290 540 305" fill="none" stroke="#4ade80" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="500" y="278" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="11">slice 82550:82603</text>

  <!-- docIds 배열 -->
  <text x="100" y="350" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="15" font-weight="700">docIds[]</text>
  <text x="200" y="350" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">stem이 등장하는 문서 ID들이 압축돼 일렬로 들어간다</text>

  <g font-family="monospace" font-size="11" text-anchor="middle">
    <rect x="100" y="370" width="60" height="40" rx="5" fill="#1e293b" stroke="#334155"/>
    <text x="130" y="394" fill="#64748b">…</text>

    <rect x="160" y="370" width="60" height="40" rx="5" fill="#1e293b" stroke="#334155"/>
    <text x="190" y="394" fill="#64748b">82549</text>

    <rect x="220" y="370" width="80" height="40" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
    <text x="260" y="394" fill="#86efac" font-weight="700">213</text>

    <rect x="300" y="370" width="80" height="40" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
    <text x="340" y="394" fill="#86efac" font-weight="700">8821</text>

    <rect x="380" y="370" width="80" height="40" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
    <text x="420" y="394" fill="#86efac" font-weight="700">11604</text>

    <rect x="460" y="370" width="80" height="40" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
    <text x="500" y="394" fill="#86efac" font-weight="700">…</text>

    <rect x="540" y="370" width="80" height="40" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
    <text x="580" y="394" fill="#86efac" font-weight="700">3,981,002</text>

    <rect x="620" y="370" width="60" height="40" rx="5" fill="#1e293b" stroke="#334155"/>
    <text x="650" y="394" fill="#64748b">82603</text>

    <rect x="680" y="370" width="60" height="40" rx="5" fill="#1e293b" stroke="#334155"/>
    <text x="710" y="394" fill="#64748b">…</text>
  </g>

  <text x="380" y="446" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="13" font-weight="700">"유상"을 포함하는 53개 문서</text>

  <!-- 결과 박스 -->
  <rect x="780" y="370" width="360" height="120" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
  <text x="960" y="402" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="14" font-weight="700">→ 매칭 docId 53건 즉시 반환</text>
  <text x="960" y="430" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">코사인 유사도 계산 없음</text>
  <text x="960" y="450" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">벡터 곱 없음</text>
  <text x="960" y="470" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">numpy 슬라이스 + bincount뿐</text>

  <!-- 비교 박스 -->
  <rect x="60" y="540" width="510" height="140" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="315" y="572" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="15" font-weight="700">JSON 역인덱스</text>
  <text x="315" y="602" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="13">{ "유상": [213, 8821, 11604, ...] }</text>
  <text x="315" y="632" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">2,986KB · 파싱 비용 큼</text>
  <text x="315" y="654" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">파이썬 dict + list 오버헤드</text>

  <rect x="630" y="540" width="510" height="140" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="885" y="572" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="15" font-weight="700">CSR 역인덱스</text>
  <text x="885" y="602" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="13">offsets[int32] + docIds[int32]</text>
  <text x="885" y="632" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="13" font-weight="700">350KB — 8.5x 압축</text>
  <text x="885" y="654" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">numpy mmap, 파싱 0</text>
</svg>
