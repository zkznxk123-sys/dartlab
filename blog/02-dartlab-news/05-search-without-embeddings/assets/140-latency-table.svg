<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>실측 latency</title>
  <desc>4쿼리 실측 latency. cold 4.0초 1회, warm 156~174ms. 인덱스 320MB, 문서 400만 건.</desc>
  <defs>
    <linearGradient id="bg140l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg140l)" rx="16"/>

  <text x="600" y="58" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">실측 — 인덱스 한 번 로드 후 평균 165ms</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">2026-04-06, dartlab 0.x · 인덱스 ~320MB · 400만 문서</text>

  <!-- 콜드 카드 -->
  <rect x="60" y="130" width="540" height="180" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="330" y="166" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="16" font-weight="700">첫 호출 (cold)</text>
  <text x="330" y="226" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="58" font-weight="700">4.0 s</text>
  <text x="330" y="262" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">CSR 인덱스를 메모리에 한 번 mmap</text>
  <text x="330" y="284" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">모델 다운로드 0초 · GPU 불필요</text>

  <!-- 웜 카드 -->
  <rect x="620" y="130" width="520" height="180" rx="14" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
  <text x="880" y="166" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="16" font-weight="700">warm 평균</text>
  <text x="880" y="226" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="58" font-weight="700">165 ms</text>
  <text x="880" y="262" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">numpy slice + bincount</text>
  <text x="880" y="284" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">코사인 유사도 계산 없음</text>

  <!-- 표 -->
  <rect x="60" y="350" width="1080" height="290" rx="12" fill="#1e293b" stroke="#334155"/>

  <line x1="60" y1="396" x2="1140" y2="396" stroke="#334155"/>
  <g font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
    <text x="100" y="382" font-weight="700">쿼리</text>
    <text x="500" y="382" font-weight="700">latency</text>
    <text x="720" y="382" font-weight="700">결과 수</text>
    <text x="940" y="382" font-weight="700">상위 매칭</text>
  </g>

  <g font-family="monospace" font-size="13" fill="#cbd5e1">
    <text x="100" y="430">"유상증자"</text>
    <text x="500" y="430">3,993 ms</text>
    <text x="720" y="430">10</text>
    <text x="940" y="430" font-family="system-ui, sans-serif" font-size="12">유상증자결정(종속회사…)</text>
    <text x="500" y="448" fill="#64748b" font-size="10">↑ 인덱스 첫 로드 포함</text>

    <line x1="80" y1="466" x2="1120" y2="466" stroke="#1e293b"/>

    <text x="100" y="494">"대표이사 변경"</text>
    <text x="500" y="494" fill="#fdba74" font-weight="700">157 ms</text>
    <text x="720" y="494">10</text>
    <text x="940" y="494" font-family="system-ui, sans-serif" font-size="12">대표이사 변경공시</text>

    <line x1="80" y1="514" x2="1120" y2="514" stroke="#1e293b"/>

    <text x="100" y="542">"전환사채"</text>
    <text x="500" y="542" fill="#fdba74" font-weight="700">172 ms</text>
    <text x="720" y="542">10</text>
    <text x="940" y="542" font-family="system-ui, sans-serif" font-size="12">전환사채권 발행결정</text>

    <line x1="80" y1="562" x2="1120" y2="562" stroke="#1e293b"/>

    <text x="100" y="590">"횡령"</text>
    <text x="500" y="590" fill="#fdba74" font-weight="700">174 ms</text>
    <text x="720" y="590">10</text>
    <text x="940" y="590" font-family="system-ui, sans-serif" font-size="12">횡령·배임 발생</text>

    <line x1="80" y1="610" x2="1120" y2="610" stroke="#1e293b"/>

    <text x="100" y="630" fill="#86efac" font-weight="700">평균(warm)</text>
    <text x="500" y="630" fill="#86efac" font-weight="700">≈ 165 ms</text>
  </g>

  <!-- footer -->
  <text x="600" y="688" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">측정 환경: Windows 11 · 동일 세션 내 순차 호출 · 결과는 score 상위 10건</text>
</svg>
