<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>검색 방법별 precision 비교</title>
  <desc>ngram+synonym 95%, trigram 단독 88%, 임베딩 ko-sroberta 83%, BM25 FTS 71%. 의존성과 cold start 함께 표시.</desc>
  <defs>
    <linearGradient id="bg140pr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg140pr)" rx="16"/>

  <text x="600" y="58" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">정형 문서에서는 정확 매칭이 의미 유사도보다 정밀하다</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">precision@5 — DART 공시 검색 벤치마크</text>

  <!-- 축 -->
  <line x1="320" y1="160" x2="320" y2="600" stroke="#334155" stroke-width="1.5"/>
  <g font-family="system-ui, sans-serif" font-size="11" fill="#475569">
    <line x1="320" y1="160" x2="1120" y2="160" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="1130" y="164">100%</text>
    <line x1="320" y1="248" x2="1120" y2="248" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="1130" y="252">80%</text>
    <line x1="320" y1="336" x2="1120" y2="336" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="1130" y="340">60%</text>
    <line x1="320" y1="424" x2="1120" y2="424" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="1130" y="428">40%</text>
    <line x1="320" y1="512" x2="1120" y2="512" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="1130" y="516">20%</text>
    <line x1="320" y1="600" x2="1120" y2="600" stroke="#334155"/>
    <text x="1130" y="604">0%</text>
  </g>

  <!-- 막대 -->
  <!-- 1. ngram+synonym 95% -->
  <g>
    <text x="310" y="220" text-anchor="end" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="700">dartlab.search</text>
    <text x="310" y="238" text-anchor="end" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">ngram + 유형 라우팅</text>
    <rect x="320" y="190" width="760" height="60" rx="6" fill="#4ade80"/>
    <text x="340" y="226" fill="#0a0e1a" font-family="monospace" font-size="22" font-weight="700">95%</text>
    <text x="1090" y="218" fill="#86efac" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">cold 0ms · 의존성 0</text>
    <text x="1090" y="238" fill="#86efac" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">numpy만</text>
  </g>

  <!-- 2. trigram 88% -->
  <g>
    <text x="310" y="320" text-anchor="end" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="700">trigram 단독</text>
    <text x="310" y="338" text-anchor="end" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">정확 매칭만</text>
    <rect x="320" y="290" width="704" height="60" rx="6" fill="#3b82f6" opacity="0.85"/>
    <text x="340" y="326" fill="#0a0e1a" font-family="monospace" font-size="22" font-weight="700">88%</text>
    <text x="1034" y="318" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">cold 0ms · 의존성 0</text>
  </g>

  <!-- 3. 임베딩 83% -->
  <g>
    <text x="310" y="420" text-anchor="end" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="700">ko-sroberta 임베딩</text>
    <text x="310" y="438" text-anchor="end" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">코사인 유사도</text>
    <rect x="320" y="390" width="664" height="60" rx="6" fill="#a78bfa" opacity="0.75"/>
    <text x="340" y="426" fill="#0a0e1a" font-family="monospace" font-size="22" font-weight="700">83%</text>
    <text x="994" y="418" fill="#fda4af" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">cold 12,700ms</text>
    <text x="994" y="438" fill="#fda4af" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">PyTorch 2GB · 모델 420MB</text>
  </g>

  <!-- 4. BM25 71% -->
  <g>
    <text x="310" y="520" text-anchor="end" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="700">BM25 (SQLite FTS)</text>
    <text x="310" y="538" text-anchor="end" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">전문 검색 표준</text>
    <rect x="320" y="490" width="568" height="60" rx="6" fill="#64748b" opacity="0.75"/>
    <text x="340" y="526" fill="#0a0e1a" font-family="monospace" font-size="22" font-weight="700">71%</text>
    <text x="898" y="518" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" text-anchor="end">cold 0ms · sqlite</text>
  </g>

  <!-- 결론 박스 -->
  <rect x="60" y="630" width="1080" height="60" rx="10" fill="#0f172a" stroke="#1e293b"/>
  <text x="600" y="657" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">DART 공시는 어휘가 법적으로 고정돼 있다 — 같은 의미를 다른 단어로 쓰지 않는다.</text>
  <text x="600" y="678" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">의미 공간을 학습할 필요 없이, ngram 정확 매칭이 임베딩보다 12%p 앞선다.</text>
</svg>
