<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>dartlab.search 파이프라인</title>
  <desc>쿼리가 ngram 분해 → stem ID → CSR 역인덱스 → bincount → BM25F 리랭킹을 거쳐 결과로 나오는 흐름</desc>
  <defs>
    <linearGradient id="bg140p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arr140" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg140p)" rx="16"/>

  <text x="600" y="58" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">dartlab.search — 모델 없이 검색이 동작하는 경로</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">쿼리 한 줄이 결과 카드까지 가는 다섯 단계</text>

  <!-- 입력 -->
  <rect x="60" y="160" width="220" height="100" rx="14" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <text x="170" y="195" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="14" font-weight="700">dartlab.search(</text>
  <text x="170" y="217" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="14" font-weight="700">"유상증자"</text>
  <text x="170" y="239" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="14" font-weight="700">)</text>

  <!-- 단계 1 ngram 분해 -->
  <rect x="320" y="160" width="200" height="100" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="420" y="190" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="14" font-weight="700">1. ngram 분해</text>
  <text x="420" y="218" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">"유상", "상증", "증자"</text>
  <text x="420" y="236" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">"유상증", "상증자"</text>
  <text x="420" y="254" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">bigram + trigram</text>

  <!-- 단계 2 stem dict -->
  <rect x="560" y="160" width="200" height="100" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="660" y="190" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="14" font-weight="700">2. stem ID 변환</text>
  <text x="660" y="218" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="12">"유상" → 42</text>
  <text x="660" y="236" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="12">"상증" → 188</text>
  <text x="660" y="254" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">stemDict.json (~5,500개)</text>

  <!-- 단계 3 CSR -->
  <rect x="800" y="160" width="200" height="100" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="900" y="190" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="14" font-weight="700">3. CSR 역인덱스</text>
  <text x="900" y="218" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">offsets[42:43]</text>
  <text x="900" y="236" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">→ docIds 슬라이스</text>
  <text x="900" y="254" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">numpy int32, 320MB</text>

  <!-- 단계 4 bincount -->
  <rect x="320" y="340" width="200" height="100" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="420" y="370" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="14" font-weight="700">4. bincount 집계</text>
  <text x="420" y="398" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">np.concatenate(slices)</text>
  <text x="420" y="416" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">→ np.bincount()</text>
  <text x="420" y="434" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">파이썬 루프 대비 32x</text>

  <!-- 단계 5 BM25F -->
  <rect x="560" y="340" width="200" height="100" rx="12" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="660" y="370" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="14" font-weight="700">5. BM25F 리랭킹</text>
  <text x="660" y="398" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">report_nm 매칭 ×5</text>
  <text x="660" y="416" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">section_title ×2</text>
  <text x="660" y="434" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">필드 가중치 후처리</text>

  <!-- 결과 -->
  <rect x="800" y="340" width="320" height="100" rx="14" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
  <text x="960" y="370" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="14" font-weight="700">결과 카드 10건</text>
  <text x="960" y="398" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">corp_name · report_nm</text>
  <text x="960" y="416" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="11">score · text · dartUrl</text>
  <text x="960" y="434" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">DART 뷰어로 바로 이동</text>

  <!-- 화살표 흐름 -->
  <line x1="280" y1="210" x2="318" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arr140)"/>
  <line x1="520" y1="210" x2="558" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arr140)"/>
  <line x1="760" y1="210" x2="798" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arr140)"/>
  <path d="M900 260 Q900 300 420 300 Q420 320 420 338" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr140)"/>
  <line x1="520" y1="390" x2="558" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arr140)"/>
  <line x1="760" y1="390" x2="798" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arr140)"/>

  <!-- 하단 요약 -->
  <rect x="60" y="520" width="1080" height="150" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="600" y="556" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="700">의존성 0 · 모델 다운로드 0초 · 인덱스 320MB</text>

  <text x="220" y="612" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">인덱스 첫 로드</text>
  <text x="220" y="640" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="22" font-weight="700">4.0초</text>

  <text x="500" y="612" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">warm 검색 평균</text>
  <text x="500" y="640" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="22" font-weight="700">165ms</text>

  <text x="780" y="612" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">precision@5</text>
  <text x="780" y="640" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="22" font-weight="700">95%</text>

  <text x="1020" y="612" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">전체 문서</text>
  <text x="1020" y="640" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="22" font-weight="700">400만</text>
</svg>
