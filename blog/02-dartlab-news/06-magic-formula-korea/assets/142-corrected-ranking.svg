<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>보정 전후 TOP 5</title>
  <desc>비경상 이익 보정 한 줄을 추가한 전후로 마법공식 TOP 5가 어떻게 바뀌는가. KCC가 빠지고 선진이 1위로 올라온다.</desc>
  <defs>
    <linearGradient id="bg142r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg142r)" rx="16"/>

  <text x="600" y="56" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">보정 한 줄 — KCC가 빠지고 선진이 1위로</text>
  <text x="600" y="84" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">filter((순이익률/영업이익률).abs() &lt; 1.5)</text>

  <!-- BEFORE -->
  <text x="60" y="138" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" font-weight="700">BEFORE — Raw 마법공식</text>
  <rect x="60" y="156" width="540" height="450" rx="12" fill="#1e293b" stroke="#334155"/>

  <g font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">
    <text x="80" y="184">순위</text>
    <text x="140" y="184">종목명</text>
    <text x="320" y="184">PER</text>
    <text x="380" y="184">영업률</text>
    <text x="450" y="184">순이익률</text>
    <text x="540" y="184">M</text>
    <line x1="74" y1="194" x2="586" y2="194" stroke="#334155"/>
  </g>

  <g font-family="monospace" font-size="13">
    <!-- 1위 KCC - 빨강 강조 -->
    <rect x="74" y="200" width="512" height="44" rx="6" fill="#7f1d1d" opacity="0.4"/>
    <text x="80" y="228" fill="#fca5a5" font-weight="700">1</text>
    <text x="140" y="228" fill="#fca5a5" font-weight="700">케이씨씨</text>
    <text x="320" y="228" fill="#cbd5e1">2.64</text>
    <text x="380" y="228" fill="#cbd5e1">26.7</text>
    <text x="450" y="228" fill="#fca5a5" font-weight="700">55.9 ⚠</text>
    <text x="540" y="228" fill="#fca5a5">44</text>

    <text x="80" y="272" fill="#cbd5e1">2</text>
    <text x="140" y="272" fill="#cbd5e1">선진</text>
    <text x="320" y="272" fill="#cbd5e1">1.99</text>
    <text x="380" y="272" fill="#cbd5e1">12.3</text>
    <text x="450" y="272" fill="#cbd5e1">10.0</text>
    <text x="540" y="272" fill="#cbd5e1">73</text>

    <!-- 3위 대한해운 - 빨강 -->
    <rect x="74" y="288" width="512" height="44" rx="6" fill="#7f1d1d" opacity="0.4"/>
    <text x="80" y="316" fill="#fca5a5" font-weight="700">3</text>
    <text x="140" y="316" fill="#fca5a5" font-weight="700">대한해운</text>
    <text x="320" y="316" fill="#cbd5e1">4.12</text>
    <text x="380" y="316" fill="#cbd5e1">20.1</text>
    <text x="450" y="316" fill="#fca5a5" font-weight="700">54.5 ⚠</text>
    <text x="540" y="316" fill="#fca5a5">88</text>

    <text x="80" y="360" fill="#cbd5e1">4</text>
    <text x="140" y="360" fill="#cbd5e1">대원산업</text>
    <text x="320" y="360" fill="#cbd5e1">3.26</text>
    <text x="380" y="360" fill="#cbd5e1">8.0</text>
    <text x="450" y="360" fill="#cbd5e1">9.6</text>
    <text x="540" y="360" fill="#cbd5e1">98</text>

    <!-- 5위 태경비케이 - 빨강 -->
    <rect x="74" y="376" width="512" height="44" rx="6" fill="#7f1d1d" opacity="0.4"/>
    <text x="80" y="404" fill="#fca5a5" font-weight="700">5</text>
    <text x="140" y="404" fill="#fca5a5" font-weight="700">태경비케이</text>
    <text x="320" y="404" fill="#cbd5e1">5.16</text>
    <text x="380" y="404" fill="#cbd5e1">39.9</text>
    <text x="450" y="404" fill="#fca5a5" font-weight="700">32.1 ⚠</text>
    <text x="540" y="404" fill="#fca5a5">98</text>
  </g>

  <text x="330" y="468" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="13">⚠ 표시 = 순이익이 영업이익에서 크게 벗어남</text>
  <text x="330" y="494" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">5개 중 3개가 비경상 의심 — PER이 왜곡된 후보들</text>
  <text x="330" y="520" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="12" font-weight="700">PER만 보면 함정에 그대로 빠진다</text>

  <!-- 화살표 -->
  <text x="630" y="380" text-anchor="middle" fill="#fb923c" font-family="system-ui, sans-serif" font-size="32" font-weight="700">→</text>
  <text x="630" y="402" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="11">.filter()</text>

  <!-- AFTER -->
  <text x="660" y="138" fill="#86efac" font-family="system-ui, sans-serif" font-size="15" font-weight="700">AFTER — 비경상 보정 후</text>
  <rect x="660" y="156" width="480" height="450" rx="12" fill="#0f172a" stroke="#4ade80" stroke-width="2"/>

  <g font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">
    <text x="680" y="184">순위</text>
    <text x="740" y="184">종목명</text>
    <text x="900" y="184">PER</text>
    <text x="960" y="184">영업률</text>
    <text x="1040" y="184">순이익률</text>
    <line x1="674" y1="194" x2="1126" y2="194" stroke="#334155"/>
  </g>

  <g font-family="monospace" font-size="13">
    <!-- 1위 선진 -->
    <rect x="674" y="200" width="452" height="44" rx="6" fill="#14532d" opacity="0.5"/>
    <text x="680" y="228" fill="#86efac" font-weight="700">1</text>
    <text x="740" y="228" fill="#86efac" font-weight="700">선진</text>
    <text x="900" y="228" fill="#cbd5e1">1.99</text>
    <text x="960" y="228" fill="#cbd5e1">12.3</text>
    <text x="1060" y="228" fill="#cbd5e1">10.0</text>

    <text x="680" y="272" fill="#cbd5e1">2</text>
    <text x="740" y="272" fill="#cbd5e1">대원산업</text>
    <text x="900" y="272" fill="#cbd5e1">3.26</text>
    <text x="960" y="272" fill="#cbd5e1">8.0</text>
    <text x="1060" y="272" fill="#cbd5e1">9.6</text>

    <text x="680" y="316" fill="#cbd5e1">3</text>
    <text x="740" y="316" fill="#cbd5e1">태경비케이</text>
    <text x="900" y="316" fill="#cbd5e1">5.16</text>
    <text x="960" y="316" fill="#cbd5e1">39.9</text>
    <text x="1060" y="316" fill="#cbd5e1">32.1</text>

    <text x="680" y="360" fill="#cbd5e1">4</text>
    <text x="740" y="360" fill="#cbd5e1">LX홀딩스</text>
    <text x="900" y="360" fill="#cbd5e1">4.60</text>
    <text x="960" y="360" fill="#fdba74">709 ※</text>
    <text x="1060" y="360" fill="#fdba74">700 ※</text>

    <text x="680" y="404" fill="#cbd5e1">5</text>
    <text x="740" y="404" fill="#cbd5e1">지역난방공사</text>
    <text x="900" y="404" fill="#cbd5e1">2.46</text>
    <text x="960" y="404" fill="#cbd5e1">20.5</text>
    <text x="1060" y="404" fill="#cbd5e1">14.8</text>
  </g>

  <text x="900" y="468" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="13" font-weight="700">선진(사료) — 본업 마진과 PER 일치</text>
  <text x="900" y="494" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">※ LX홀딩스는 지주회사 특성(지분법) — 별도 검토</text>
  <text x="900" y="520" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">KCC, 대한해운, INVENI 같은 일회성 종목 제거</text>

  <!-- 결론 박스 -->
  <rect x="60" y="624" width="1080" height="64" rx="10" fill="#0f172a" stroke="#1e293b"/>
  <text x="600" y="650" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">scan → Company.show("IS") → 함정 발견 → 1줄 보정 → 진짜 후보</text>
  <text x="600" y="672" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">스크리너는 답이 아니다. 답을 찾기 위한 후보를 좁혀줄 뿐 — dartlab이 그 검증을 같은 줄에서 가능하게 만든다</text>
</svg>
