<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>KCC 영업이익 vs 당기순이익 5분기 비교</title>
  <desc>KCC 5분기 영업이익과 당기순이익을 막대로 비교. 2025Q2 영업이익 1404억 대비 당기순이익 8933억으로 6.4배. 비경상 이익 트랩의 시각화.</desc>
  <defs>
    <linearGradient id="bg142k" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg142k)" rx="16"/>

  <text x="600" y="56" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">KCC 함정 — 영업이익은 평범, 순이익은 폭주</text>
  <text x="600" y="84" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">c.show("IS") 실측 (단위: 억원)</text>

  <!-- 범례 -->
  <g font-family="system-ui, sans-serif" font-size="12">
    <rect x="780" y="106" width="14" height="14" fill="#3b82f6"/>
    <text x="800" y="118" fill="#93c5fd">영업이익</text>
    <rect x="900" y="106" width="14" height="14" fill="#fb923c"/>
    <text x="920" y="118" fill="#fdba74">당기순이익</text>
    <rect x="1040" y="106" width="14" height="14" fill="#7f1d1d"/>
    <text x="1060" y="118" fill="#fca5a5">적자</text>
  </g>

  <!-- y축 (값 9000억 max) -->
  <line x1="120" y1="170" x2="120" y2="560" stroke="#334155"/>
  <g font-family="monospace" font-size="11" fill="#64748b">
    <line x1="118" y1="170" x2="1140" y2="170" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="174" text-anchor="end">9,000억</text>
    <line x1="118" y1="213" x2="1140" y2="213" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="217" text-anchor="end">8,000</text>
    <line x1="118" y1="256" x2="1140" y2="256" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="260" text-anchor="end">7,000</text>
    <line x1="118" y1="299" x2="1140" y2="299" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="303" text-anchor="end">6,000</text>
    <line x1="118" y1="342" x2="1140" y2="342" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="346" text-anchor="end">5,000</text>
    <line x1="118" y1="385" x2="1140" y2="385" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="389" text-anchor="end">4,000</text>
    <line x1="118" y1="428" x2="1140" y2="428" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="432" text-anchor="end">3,000</text>
    <line x1="118" y1="471" x2="1140" y2="471" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="475" text-anchor="end">2,000</text>
    <line x1="118" y1="514" x2="1140" y2="514" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="518" text-anchor="end">1,000</text>
    <line x1="118" y1="557" x2="1140" y2="557" stroke="#475569"/>
    <text x="110" y="561" text-anchor="end">0</text>
    <line x1="118" y1="585" x2="1140" y2="585" stroke="#1e293b" stroke-dasharray="3 4"/>
    <text x="110" y="589" text-anchor="end">−1,000</text>
  </g>

  <!-- 막대: 5분기 -->
  <!-- scale: 1000억 = 43px (1000/9000 * 387) -->
  <!-- y0 = 557 -->
  <g>
    <!-- 2024Q4: 영업 983, 순 -865 -->
    <text x="225" y="610" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">2024Q4</text>
    <rect x="170" y="514" width="50" height="43" fill="#3b82f6"/>
    <text x="195" y="510" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">983</text>
    <rect x="225" y="557" width="50" height="37" fill="#7f1d1d"/>
    <text x="250" y="618" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="10">−865</text>

    <!-- 2025Q1: 영업 1034, 순 441 -->
    <text x="345" y="610" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">2025Q1</text>
    <rect x="290" y="513" width="50" height="44" fill="#3b82f6"/>
    <text x="315" y="509" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">1,034</text>
    <rect x="345" y="538" width="50" height="19" fill="#fb923c"/>
    <text x="370" y="534" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="10">441</text>

    <!-- 2025Q2: 영업 1404, 순 8933 -->
    <text x="465" y="610" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="12" font-weight="700">2025Q2</text>
    <rect x="410" y="497" width="50" height="60" fill="#3b82f6"/>
    <text x="435" y="493" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">1,404</text>
    <rect x="465" y="173" width="50" height="384" fill="#fb923c" stroke="#fdba74" stroke-width="2"/>
    <text x="490" y="165" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="14" font-weight="700">8,933</text>

    <!-- 2025Q3: 영업 1173, 순 3263 -->
    <text x="585" y="610" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">2025Q3</text>
    <rect x="530" y="507" width="50" height="50" fill="#3b82f6"/>
    <text x="555" y="503" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">1,173</text>
    <rect x="585" y="417" width="50" height="140" fill="#fb923c"/>
    <text x="610" y="411" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="10">3,263</text>

    <!-- 2025Q4: 영업 665, 순 2748 -->
    <text x="705" y="610" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">2025Q4</text>
    <rect x="650" y="528" width="50" height="29" fill="#3b82f6"/>
    <text x="675" y="524" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10">665</text>
    <rect x="705" y="439" width="50" height="118" fill="#fb923c"/>
    <text x="730" y="433" text-anchor="middle" fill="#fdba74" font-family="monospace" font-size="10">2,748</text>
  </g>

  <!-- 강조 박스: 2025Q2 -->
  <rect x="160" y="158" width="360" height="406" rx="6" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
  <line x1="490" y1="170" x2="800" y2="200" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="800" y="180" width="340" height="100" rx="10" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
  <text x="970" y="208" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="14" font-weight="700">2025Q2 — 영업이익의 6.4배</text>
  <text x="970" y="232" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">차이 ~7,500억은 비경상 이익</text>
  <text x="970" y="252" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">자회사 매각 · 평가이익 · 세금 효과</text>
  <text x="970" y="270" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">→ PER이 인위적으로 낮아 보임</text>

  <!-- 결론 -->
  <rect x="80" y="640" width="1060" height="64" rx="10" fill="#0f172a" stroke="#fb923c"/>
  <text x="600" y="664" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="14" font-weight="700">시장이 KCC를 싸게 본 게 아니다 — 분기 EPS에 일회성이 박혀서 PER이 낮아 보였을 뿐</text>
  <text x="600" y="688" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">마법공식은 PER 숫자만 보고 1위로 뽑았다 · dartlab은 한 줄로 그 분해를 보여준다</text>
</svg>
