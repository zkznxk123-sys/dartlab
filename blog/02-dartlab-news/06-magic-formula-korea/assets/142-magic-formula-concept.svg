<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>마법공식 개념도</title>
  <desc>그린블라트의 마법공식 — 두 질문(싼가? 좋은가?)을 두 지표로 랭크한 다음 합산 점수가 작은 순서로 매수</desc>
  <defs>
    <linearGradient id="bg142m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arr142m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg142m)" rx="16"/>

  <text x="600" y="56" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">마법공식 — 두 랭크의 합</text>
  <text x="600" y="84" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Joel Greenblatt, 1999 · 미국 1988~2004 연 30.8%</text>

  <!-- 두 질문 -->
  <g>
    <rect x="100" y="140" width="460" height="160" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="330" y="178" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="16" font-weight="700">질문 1 — 싼가?</text>
    <text x="330" y="218" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">같은 이익을 사는 데 얼마를 내는가</text>
    <rect x="180" y="238" width="300" height="44" rx="8" fill="#0f172a" stroke="#1e40af"/>
    <text x="330" y="266" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="14">Earnings Yield = EBIT / EV</text>

    <rect x="640" y="140" width="460" height="160" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="870" y="178" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="16" font-weight="700">질문 2 — 좋은 사업인가?</text>
    <text x="870" y="218" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="13">투자한 자본 대비 얼마를 버는가</text>
    <rect x="720" y="238" width="300" height="44" rx="8" fill="#0f172a" stroke="#7c3aed"/>
    <text x="870" y="266" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="14">Return on Capital (ROIC)</text>
  </g>

  <!-- 합치는 화살표 -->
  <line x1="330" y1="312" x2="540" y2="372" stroke="#475569" stroke-width="2" marker-end="url(#arr142m)"/>
  <line x1="870" y1="312" x2="660" y2="372" stroke="#475569" stroke-width="2" marker-end="url(#arr142m)"/>

  <!-- 합산 박스 -->
  <rect x="380" y="382" width="440" height="100" rx="14" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
  <text x="600" y="416" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="16" font-weight="700">두 랭크의 합 (작을수록 매수)</text>
  <text x="600" y="450" text-anchor="middle" fill="#cbd5e1" font-family="monospace" font-size="14">MagicScore = rank(EY) + rank(ROC)</text>
  <text x="600" y="470" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">상위 30개 매수 → 1년 보유 → 매년 리밸런싱</text>

  <!-- 한국 적용 -->
  <rect x="100" y="528" width="1000" height="160" rx="14" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="600" y="562" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="15" font-weight="700">한국 적용 — dartlab으로 두 줄</text>

  <rect x="160" y="586" width="380" height="80" rx="10" fill="#0f172a" stroke="#1e40af"/>
  <text x="350" y="610" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="11">EY 대신: 1 / PER</text>
  <text x="350" y="640" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="13">dartlab.scan("valuation")</text>

  <rect x="660" y="586" width="380" height="80" rx="10" fill="#0f172a" stroke="#7c3aed"/>
  <text x="850" y="610" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11">ROIC 대신: ROA</text>
  <text x="850" y="640" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="13">dartlab.scan("profitability")</text>
</svg>
