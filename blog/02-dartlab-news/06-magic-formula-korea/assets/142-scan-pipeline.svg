<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>scan 두 호출 → join → 랭킹</title>
  <desc>dartlab.scan('valuation')과 scan('profitability') 두 테이블을 종목코드로 조인하고 두 지표를 랭크하여 마법공식 점수를 만든다</desc>
  <defs>
    <linearGradient id="bg142s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arr142s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg142s)" rx="16"/>

  <text x="600" y="56" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">두 줄로 시장 전체 → 마법공식 랭킹</text>
  <text x="600" y="84" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">2,556종목 한 번에, 종목코드로 조인</text>

  <!-- valuation table -->
  <rect x="80" y="130" width="450" height="220" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="305" y="156" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13" font-weight="700">dartlab.scan("valuation")</text>
  <text x="305" y="174" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">2,556종목 · 네이버 실시간</text>

  <g font-family="monospace" font-size="11">
    <line x1="100" y1="190" x2="510" y2="190" stroke="#334155"/>
    <text x="110" y="206" fill="#94a3b8">종목코드</text>
    <text x="200" y="206" fill="#94a3b8">종목명</text>
    <text x="320" y="206" fill="#94a3b8">시가총액</text>
    <text x="420" y="206" fill="#60a5fa">PER</text>
    <text x="470" y="206" fill="#94a3b8">PBR</text>
    <line x1="100" y1="216" x2="510" y2="216" stroke="#1e293b"/>

    <text x="110" y="234" fill="#cbd5e1">002380</text>
    <text x="200" y="234" fill="#cbd5e1">케이씨씨</text>
    <text x="320" y="234" fill="#cbd5e1">4.06조</text>
    <text x="420" y="234" fill="#fdba74">2.64</text>
    <text x="470" y="234" fill="#cbd5e1">0.42</text>

    <text x="110" y="254" fill="#cbd5e1">136490</text>
    <text x="200" y="254" fill="#cbd5e1">선진</text>
    <text x="320" y="254" fill="#cbd5e1">2,366억</text>
    <text x="420" y="254" fill="#fdba74">1.99</text>
    <text x="470" y="254" fill="#cbd5e1">0.34</text>

    <text x="110" y="274" fill="#cbd5e1">005880</text>
    <text x="200" y="274" fill="#cbd5e1">대한해운</text>
    <text x="320" y="274" fill="#cbd5e1">7,439억</text>
    <text x="420" y="274" fill="#fdba74">4.12</text>
    <text x="470" y="274" fill="#cbd5e1">0.51</text>

    <text x="110" y="294" fill="#64748b">…</text>
    <text x="200" y="294" fill="#64748b">2,553행 더</text>
  </g>

  <!-- profitability table -->
  <rect x="670" y="130" width="450" height="220" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="895" y="156" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="13" font-weight="700">dartlab.scan("profitability")</text>
  <text x="895" y="174" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">2,060종목 · 프리빌드 parquet</text>

  <g font-family="monospace" font-size="11">
    <line x1="690" y1="190" x2="1100" y2="190" stroke="#334155"/>
    <text x="700" y="206" fill="#94a3b8">종목코드</text>
    <text x="790" y="206" fill="#94a3b8">영업이익률</text>
    <text x="900" y="206" fill="#94a3b8">순이익률</text>
    <text x="990" y="206" fill="#c4b5fd">ROA</text>
    <text x="1040" y="206" fill="#94a3b8">ROE</text>
    <line x1="690" y1="216" x2="1100" y2="216" stroke="#1e293b"/>

    <text x="700" y="234" fill="#cbd5e1">002380</text>
    <text x="800" y="234" fill="#cbd5e1">26.7</text>
    <text x="900" y="234" fill="#fb923c">55.9</text>
    <text x="990" y="234" fill="#fdba74">5.3</text>
    <text x="1040" y="234" fill="#cbd5e1">12.3</text>

    <text x="700" y="254" fill="#cbd5e1">136490</text>
    <text x="800" y="254" fill="#cbd5e1">12.3</text>
    <text x="900" y="254" fill="#cbd5e1">10.0</text>
    <text x="990" y="254" fill="#fdba74">3.5</text>
    <text x="1040" y="254" fill="#cbd5e1">8.7</text>

    <text x="700" y="274" fill="#cbd5e1">005880</text>
    <text x="800" y="274" fill="#cbd5e1">20.1</text>
    <text x="900" y="274" fill="#cbd5e1">54.5</text>
    <text x="990" y="274" fill="#fdba74">4.3</text>
    <text x="1040" y="274" fill="#cbd5e1">9.2</text>

    <text x="700" y="294" fill="#64748b">…</text>
    <text x="790" y="294" fill="#64748b">2,057행 더</text>
  </g>

  <!-- join arrow -->
  <line x1="305" y1="362" x2="540" y2="442" stroke="#475569" stroke-width="2" marker-end="url(#arr142s)"/>
  <line x1="895" y1="362" x2="660" y2="442" stroke="#475569" stroke-width="2" marker-end="url(#arr142s)"/>
  <text x="600" y="400" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">.join(on="종목코드")</text>

  <!-- ranked output -->
  <rect x="200" y="450" width="800" height="240" rx="12" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
  <text x="600" y="478" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="14" font-weight="700">조인 + 랭크 + 정렬 → 마법공식 후보</text>

  <g font-family="monospace" font-size="12">
    <line x1="220" y1="494" x2="980" y2="494" stroke="#334155"/>
    <text x="240" y="512" fill="#94a3b8">순위</text>
    <text x="320" y="512" fill="#94a3b8">종목명</text>
    <text x="500" y="512" fill="#94a3b8">PER</text>
    <text x="600" y="512" fill="#94a3b8">EY%</text>
    <text x="700" y="512" fill="#94a3b8">ROA%</text>
    <text x="820" y="512" fill="#fdba74">MagicScore</text>
    <line x1="220" y1="522" x2="980" y2="522" stroke="#1e293b"/>

    <text x="240" y="544" fill="#fdba74" font-weight="700">1</text>
    <text x="320" y="544" fill="#fdba74" font-weight="700">케이씨씨</text>
    <text x="500" y="544" fill="#cbd5e1">2.64</text>
    <text x="600" y="544" fill="#cbd5e1">37.9</text>
    <text x="700" y="544" fill="#cbd5e1">5.3</text>
    <text x="820" y="544" fill="#fdba74" font-weight="700">44</text>

    <text x="240" y="566" fill="#cbd5e1">2</text>
    <text x="320" y="566" fill="#cbd5e1">선진</text>
    <text x="500" y="566" fill="#cbd5e1">1.99</text>
    <text x="600" y="566" fill="#cbd5e1">50.3</text>
    <text x="700" y="566" fill="#cbd5e1">3.5</text>
    <text x="820" y="566" fill="#cbd5e1">73</text>

    <text x="240" y="588" fill="#cbd5e1">3</text>
    <text x="320" y="588" fill="#cbd5e1">대한해운</text>
    <text x="500" y="588" fill="#cbd5e1">4.12</text>
    <text x="600" y="588" fill="#cbd5e1">24.3</text>
    <text x="700" y="588" fill="#cbd5e1">4.3</text>
    <text x="820" y="588" fill="#cbd5e1">88</text>

    <text x="240" y="610" fill="#cbd5e1">4</text>
    <text x="320" y="610" fill="#cbd5e1">대원산업</text>
    <text x="500" y="610" fill="#cbd5e1">3.26</text>
    <text x="600" y="610" fill="#cbd5e1">30.7</text>
    <text x="700" y="610" fill="#cbd5e1">3.3</text>
    <text x="820" y="610" fill="#cbd5e1">98</text>

    <text x="240" y="632" fill="#cbd5e1">5</text>
    <text x="320" y="632" fill="#cbd5e1">태경비케이</text>
    <text x="500" y="632" fill="#cbd5e1">5.16</text>
    <text x="600" y="632" fill="#cbd5e1">19.4</text>
    <text x="700" y="632" fill="#cbd5e1">5.6</text>
    <text x="820" y="632" fill="#cbd5e1">98</text>
  </g>

  <text x="600" y="668" text-anchor="middle" fill="#fb923c" font-family="system-ui, sans-serif" font-size="12" font-weight="700">↑ 1위 KCC가 함정이라는 사실을 다음 단계가 잡아낸다</text>
</svg>
