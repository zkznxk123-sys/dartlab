<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="820" fill="#ffffff"/>
  <text x="60" y="60" font-size="28" font-weight="700" fill="#0f172a">사용자가 직접 했다면 vs dartlab 데이터셋을 쓰면</text>
  <text x="60" y="92" font-size="16" fill="#475569">같은 분석 한 편에 드는 선행 비용의 차이.</text>

  <!-- Left: Manual -->
  <rect x="60" y="140" width="540" height="640" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="330" y="180" text-anchor="middle" font-size="22" font-weight="700" fill="#7f1d1d">직접 한다면</text>

  <g font-size="14" fill="#7f1d1d">
    <rect x="90" y="210" width="480" height="60" rx="8" fill="#ffffff" stroke="#fca5a5"/>
    <text x="110" y="234" font-weight="700">1. DART API 키 발급</text>
    <text x="110" y="254" font-size="12" fill="#991b1b">opendart.fss.or.kr 가입 → 1일 10,000건 한도 확인</text>

    <rect x="90" y="280" width="480" height="100" rx="8" fill="#ffffff" stroke="#fca5a5"/>
    <text x="110" y="304" font-weight="700">2. list.json으로 공시 목록 긁기</text>
    <text x="110" y="324" font-size="12" fill="#991b1b">2,700+ 종목 × 분기 88개 × 여러 apiType</text>
    <text x="110" y="342" font-size="12" fill="#991b1b">레이트 리밋 튕김 → 재시도 로직</text>
    <text x="110" y="360" font-size="12" fill="#991b1b">잘린 요청 pending 회수 직접 구현</text>
    <text x="110" y="374" font-size="11" fill="#7f1d1d">소요: 수 시간 ~ 며칠</text>

    <rect x="90" y="390" width="480" height="100" rx="8" fill="#ffffff" stroke="#fca5a5"/>
    <text x="110" y="414" font-weight="700">3. 사업보고서 HTML 파싱</text>
    <text x="110" y="434" font-size="12" fill="#991b1b">topic 구분 · 섹션 헤딩 분해 · 테이블 추출</text>
    <text x="110" y="452" font-size="12" fill="#991b1b">회사마다 다른 레이아웃 대응</text>
    <text x="110" y="470" font-size="12" fill="#991b1b">분기마다 바뀌는 공시 구조 감지</text>
    <text x="110" y="484" font-size="11" fill="#7f1d1d">소요: 주 ~ 월 단위</text>

    <rect x="90" y="500" width="480" height="100" rx="8" fill="#ffffff" stroke="#fca5a5"/>
    <text x="110" y="524" font-weight="700">4. 계정명 표준화</text>
    <text x="110" y="544" font-size="12" fill="#991b1b">회사마다 다르게 쓰는 "매출액" · "영업수익"</text>
    <text x="110" y="562" font-size="12" fill="#991b1b">BS 항등식 ±1% 검증 루프</text>
    <text x="110" y="580" font-size="12" fill="#991b1b">34,171개 매핑 관리</text>
    <text x="110" y="594" font-size="11" fill="#7f1d1d">소요: 지속</text>

    <rect x="90" y="610" width="480" height="80" rx="8" fill="#ffffff" stroke="#fca5a5"/>
    <text x="110" y="634" font-weight="700">5. 매일 재수집 인프라</text>
    <text x="110" y="654" font-size="12" fill="#991b1b">cron · 에러 모니터링 · 재시도</text>
    <text x="110" y="672" font-size="12" fill="#991b1b">스토리지 · 증분 diff · 배포</text>
  </g>

  <rect x="90" y="700" width="480" height="60" rx="8" fill="#7f1d1d"/>
  <text x="330" y="726" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">분석을 시작하기 전의 선행 비용</text>
  <text x="330" y="750" text-anchor="middle" font-size="13" fill="#fecaca">= 분석보다 수집이 본업이 된다</text>

  <!-- Right: dartlab -->
  <rect x="640" y="140" width="500" height="640" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="890" y="180" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">dartlab 데이터셋을 쓰면</text>

  <rect x="670" y="210" width="440" height="280" rx="8" fill="#0f172a"/>
  <text x="690" y="238" font-size="12" font-family="monospace" fill="#86efac">$ pip install dartlab</text>
  <text x="690" y="262" font-size="12" font-family="monospace" fill="#e2e8f0">$ python</text>
  <text x="690" y="290" font-size="13" font-family="monospace" fill="#86efac">&gt;&gt;&gt; import dartlab</text>
  <text x="690" y="314" font-size="13" font-family="monospace" fill="#e2e8f0">&gt;&gt;&gt; c = dartlab.Company("005930")</text>
  <text x="690" y="340" font-size="13" font-family="monospace" fill="#93c5fd">&gt;&gt;&gt; c.show("IS")</text>
  <text x="690" y="356" font-size="11" font-family="monospace" fill="#64748b"># [dartlab] download: dart/finance/005930.parquet</text>
  <text x="690" y="372" font-size="11" font-family="monospace" fill="#64748b"># [dartlab] ready (2.1MB in 0.8s)</text>
  <text x="690" y="398" font-size="13" font-family="monospace" fill="#fde68a">&gt;&gt;&gt; c.analysis("수익성")</text>
  <text x="690" y="414" font-size="11" font-family="monospace" fill="#64748b"># 실행 시간 0.03s</text>
  <text x="690" y="440" font-size="13" font-family="monospace" fill="#fde68a">&gt;&gt;&gt; dartlab.scan("profitability")</text>
  <text x="690" y="456" font-size="11" font-family="monospace" fill="#64748b"># [dartlab] scan:prebuild_missing — 271MB 안내</text>
  <text x="690" y="472" font-size="11" font-family="monospace" fill="#64748b"># [dartlab] scan:prebuild_ready (17s)</text>

  <g font-size="14" fill="#14532d">
    <rect x="670" y="510" width="440" height="50" rx="8" fill="#ffffff" stroke="#86efac"/>
    <text x="690" y="540" font-weight="700">DART API 키 · 불필요</text>

    <rect x="670" y="570" width="440" height="50" rx="8" fill="#ffffff" stroke="#86efac"/>
    <text x="690" y="600" font-weight="700">HTML 파싱 · 끝나 있음</text>

    <rect x="670" y="630" width="440" height="50" rx="8" fill="#ffffff" stroke="#86efac"/>
    <text x="690" y="660" font-weight="700">계정명 표준화 · 끝나 있음</text>

    <rect x="670" y="690" width="440" height="50" rx="8" fill="#ffffff" stroke="#86efac"/>
    <text x="690" y="720" font-weight="700">매일 재수집 · GitHub Actions가 한다</text>
  </g>

  <text x="890" y="770" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">사용자는 처음부터 분석부터 시작할 수 있다.</text>
</svg>
