<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="820" fill="#ffffff"/>
  <text x="60" y="60" font-size="28" font-weight="700" fill="#0f172a">데이터셋의 카테고리 — 뭐가 들어 있는가</text>
  <text x="60" y="92" font-size="16" fill="#475569">사용자는 카테고리 이름을 외울 필요가 없다. 함수를 부르면 필요한 카테고리가 자동으로 따라온다.</text>

  <!-- Header row -->
  <rect x="60" y="130" width="1080" height="40" fill="#1e293b"/>
  <text x="90" y="156" font-size="14" font-weight="700" fill="#f1f5f9">카테고리</text>
  <text x="280" y="156" font-size="14" font-weight="700" fill="#f1f5f9">들어있는 것</text>
  <text x="620" y="156" font-size="14" font-weight="700" fill="#f1f5f9">사용자가 쓰는 함수</text>
  <text x="920" y="156" font-size="14" font-weight="700" fill="#f1f5f9">갱신 주기</text>

  <!-- Row 1: docs -->
  <rect x="60" y="170" width="1080" height="90" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="60" y="170" width="10" height="90" fill="#2563eb"/>
  <text x="90" y="204" font-size="15" font-weight="700" fill="#1e3a8a">docs</text>
  <text x="90" y="224" font-size="11" fill="#64748b">dart/docs</text>
  <text x="90" y="244" font-size="11" fill="#64748b">~8GB</text>
  <text x="280" y="200" font-size="13" fill="#0f172a">사업보고서 · 분기보고서 HTML 파싱 결과</text>
  <text x="280" y="220" font-size="13" fill="#0f172a">topic × period 시맨틱 블록 단위</text>
  <text x="280" y="240" font-size="12" fill="#475569">종목당 parquet 하나 · 2,700+ 종목</text>
  <text x="620" y="200" font-size="12" font-family="monospace" fill="#1e3a8a">c.show("IS")</text>
  <text x="620" y="220" font-size="12" font-family="monospace" fill="#1e3a8a">c.show("productService")</text>
  <text x="620" y="240" font-size="12" font-family="monospace" fill="#1e3a8a">c.sections</text>
  <text x="920" y="210" font-size="12" fill="#334155">매일 2회 증분</text>
  <text x="920" y="230" font-size="11" fill="#64748b">12시간 TTL</text>

  <!-- Row 2: finance -->
  <rect x="60" y="260" width="1080" height="90" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="60" y="260" width="10" height="90" fill="#16a34a"/>
  <text x="90" y="294" font-size="15" font-weight="700" fill="#14532d">finance</text>
  <text x="90" y="314" font-size="11" fill="#64748b">dart/finance</text>
  <text x="90" y="334" font-size="11" fill="#64748b">~2GB</text>
  <text x="280" y="290" font-size="13" fill="#0f172a">BS · IS · CF · CIS · SCE — 분기 단위 숫자</text>
  <text x="280" y="310" font-size="13" fill="#0f172a">K-IFRS 계정 표준화 완료</text>
  <text x="280" y="330" font-size="12" fill="#475569">34,171개 계정명 매핑 · snakeId 통일</text>
  <text x="620" y="290" font-size="12" font-family="monospace" fill="#14532d">c.show("IS", freq="Y")</text>
  <text x="620" y="310" font-size="12" font-family="monospace" fill="#14532d">c.select("BS", ["자산총계"])</text>
  <text x="620" y="330" font-size="12" font-family="monospace" fill="#14532d">c.analysis("수익성")</text>
  <text x="920" y="300" font-size="12" fill="#334155">매일 2회 증분</text>
  <text x="920" y="320" font-size="11" fill="#64748b">list.json 기반</text>

  <!-- Row 3: report -->
  <rect x="60" y="350" width="1080" height="90" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="60" y="350" width="10" height="90" fill="#d97706"/>
  <text x="90" y="384" font-size="15" font-weight="700" fill="#78350f">report</text>
  <text x="90" y="404" font-size="11" fill="#64748b">dart/report</text>
  <text x="90" y="424" font-size="11" fill="#64748b">~1GB</text>
  <text x="280" y="380" font-size="13" fill="#0f172a">정기보고서 28 apiType — 배당 · 자사주 · 임원보수 등</text>
  <text x="280" y="400" font-size="13" fill="#0f172a">OpenDART API 구조화 테이블</text>
  <text x="280" y="420" font-size="12" fill="#475569">EDGAR에는 동등 구조 없음 (DART 강점)</text>
  <text x="620" y="380" font-size="12" font-family="monospace" fill="#78350f">c.show("dividend")</text>
  <text x="620" y="400" font-size="12" font-family="monospace" fill="#78350f">c.show("executivePay")</text>
  <text x="620" y="420" font-size="12" font-family="monospace" fill="#78350f">c.governance()</text>
  <text x="920" y="390" font-size="12" fill="#334155">매일 2회 증분</text>
  <text x="920" y="410" font-size="11" fill="#64748b">공시 종료일 ±2주</text>

  <!-- Row 4: scan -->
  <rect x="60" y="440" width="1080" height="90" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="60" y="440" width="10" height="90" fill="#7c3aed"/>
  <text x="90" y="474" font-size="15" font-weight="700" fill="#5b21b6">scan</text>
  <text x="90" y="494" font-size="11" fill="#64748b">dart/scan</text>
  <text x="90" y="514" font-size="11" fill="#64748b">271MB 프리빌드</text>
  <text x="280" y="470" font-size="13" fill="#0f172a">전 종목 횡단분석용 합산 parquet</text>
  <text x="280" y="490" font-size="13" fill="#0f172a">종목별 순회 수분 → 프리빌드 17초</text>
  <text x="280" y="510" font-size="12" fill="#475569">finance · changes · report × 12</text>
  <text x="620" y="470" font-size="12" font-family="monospace" fill="#5b21b6">dartlab.scan("profitability")</text>
  <text x="620" y="490" font-size="12" font-family="monospace" fill="#5b21b6">dartlab.scan("valuation")</text>
  <text x="620" y="510" font-size="12" font-family="monospace" fill="#5b21b6">dartlab.signal("AI")</text>
  <text x="920" y="480" font-size="12" fill="#334155">주 1회 재빌드</text>
  <text x="920" y="500" font-size="11" fill="#64748b">증분 후 합산</text>

  <!-- Row 5: edgar -->
  <rect x="60" y="530" width="1080" height="90" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="60" y="530" width="10" height="90" fill="#0891b2"/>
  <text x="90" y="564" font-size="15" font-weight="700" fill="#155e75">edgar</text>
  <text x="90" y="584" font-size="11" fill="#64748b">edgar/docs · edgar/scan</text>
  <text x="90" y="604" font-size="11" fill="#64748b">미국 시장</text>
  <text x="280" y="560" font-size="13" fill="#0f172a">SEC EDGAR 10-K · 10-Q 파싱 + XBRL companyfacts</text>
  <text x="280" y="580" font-size="13" fill="#0f172a">edgar/finance는 SEC API on-demand (미러 불필요)</text>
  <text x="280" y="600" font-size="12" fill="#475569">나스닥+NYSE ~5,600 종목</text>
  <text x="620" y="560" font-size="12" font-family="monospace" fill="#155e75">Company("AAPL")</text>
  <text x="620" y="580" font-size="12" font-family="monospace" fill="#155e75">c.analysis("수익성")</text>
  <text x="620" y="600" font-size="12" font-family="monospace" fill="#155e75">edgarScan("growth")</text>
  <text x="920" y="570" font-size="12" fill="#334155">매일 SP500 전체</text>
  <text x="920" y="590" font-size="11" fill="#64748b">나머지 증분</text>

  <!-- Row 6: stemIndex -->
  <rect x="60" y="620" width="1080" height="90" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="60" y="620" width="10" height="90" fill="#be123c"/>
  <text x="90" y="654" font-size="15" font-weight="700" fill="#881337">stemIndex</text>
  <text x="90" y="674" font-size="11" fill="#64748b">dart/stemIndex</text>
  <text x="90" y="694" font-size="11" fill="#64748b">320MB · 검색용</text>
  <text x="280" y="650" font-size="13" fill="#0f172a">400만 공시 문서 ngram 역인덱스 + BM25 content 인덱스</text>
  <text x="280" y="670" font-size="13" fill="#0f172a">main 세그먼트(월) + delta 세그먼트(일)</text>
  <text x="280" y="690" font-size="12" fill="#475569">임베딩 모델 0 · warm 165ms · precision 95%</text>
  <text x="620" y="650" font-size="12" font-family="monospace" fill="#881337">dartlab.search("유상증자")</text>
  <text x="620" y="670" font-size="12" font-family="monospace" fill="#881337">dartlab.search(scope="content")</text>
  <text x="620" y="690" font-size="12" font-family="monospace" fill="#881337">dartlab.searchName("삼성")</text>
  <text x="920" y="660" font-size="12" fill="#334155">매일 delta</text>
  <text x="920" y="680" font-size="11" fill="#64748b">매월 1일 main</text>

  <text x="60" y="760" font-size="13" fill="#475569">카테고리는 6개지만 사용자가 직접 다운로드 URL을 다루는 경우는 한 번도 없다.</text>
  <text x="60" y="782" font-size="13" fill="#475569">Company · scan · search 함수가 자기가 필요한 카테고리를 알고 있다.</text>
</svg>
