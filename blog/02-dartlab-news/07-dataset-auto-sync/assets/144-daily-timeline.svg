<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="60" y="60" font-size="28" font-weight="700" fill="#0f172a">하루와 한 달 — dartlab 데이터가 갱신되는 리듬</text>
  <text x="60" y="92" font-size="16" fill="#475569">사용자가 자고 있을 때, Actions가 대신 공시를 수집한다.</text>

  <!-- Daily timeline -->
  <text x="60" y="150" font-size="18" font-weight="700" fill="#1e3a8a">매일 (KST)</text>
  <line x1="60" y1="200" x2="1140" y2="200" stroke="#cbd5e1" stroke-width="2"/>
  <!-- Hour ticks -->
  <g font-size="11" fill="#64748b">
    <text x="60" y="226" text-anchor="middle">00</text>
    <text x="195" y="226" text-anchor="middle">03</text>
    <text x="330" y="226" text-anchor="middle">06</text>
    <text x="465" y="226" text-anchor="middle">09</text>
    <text x="600" y="226" text-anchor="middle">12</text>
    <text x="735" y="226" text-anchor="middle">15</text>
    <text x="870" y="226" text-anchor="middle">18</text>
    <text x="1005" y="226" text-anchor="middle">21</text>
    <text x="1140" y="226" text-anchor="middle">24</text>
  </g>

  <!-- 03:00 Data Sync -->
  <circle cx="195" cy="200" r="12" fill="#dc2626"/>
  <line x1="195" y1="200" x2="195" y2="260" stroke="#dc2626" stroke-width="2"/>
  <rect x="100" y="260" width="220" height="90" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="210" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">03:00 · Data Sync</text>
  <text x="210" y="306" text-anchor="middle" font-size="12" fill="#7f1d1d">야간 공시 캡처</text>
  <text x="210" y="324" text-anchor="middle" font-size="12" fill="#7f1d1d">finance · report · docs</text>
  <text x="210" y="342" text-anchor="middle" font-size="11" fill="#991b1b">누락된 종목만 수집</text>

  <!-- 04:00 Search Delta -->
  <circle cx="240" cy="200" r="8" fill="#7c3aed"/>
  <line x1="240" y1="200" x2="240" y2="390" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="340" y="370" width="220" height="80" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="394" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">04:00 · Search Delta</text>
  <text x="450" y="416" text-anchor="middle" font-size="12" fill="#5b21b6">최근 30일 allFilings</text>
  <text x="450" y="434" text-anchor="middle" font-size="11" fill="#6d28d9">content 인덱스 증분 — 수 초</text>

  <!-- 06:00 EDGAR -->
  <circle cx="330" cy="200" r="8" fill="#0891b2"/>
  <line x1="330" y1="200" x2="330" y2="260" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="340" y="260" width="220" height="90" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="450" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#155e75">06:00 · EDGAR Sync</text>
  <text x="450" y="306" text-anchor="middle" font-size="12" fill="#155e75">SP500 전체 + 증분</text>
  <text x="450" y="324" text-anchor="middle" font-size="12" fill="#155e75">XBRL companyfacts</text>
  <text x="450" y="342" text-anchor="middle" font-size="11" fill="#0e7490">edgar/scan 프리빌드</text>

  <!-- 15:00 Data Sync 2 -->
  <circle cx="735" cy="200" r="12" fill="#dc2626"/>
  <line x1="735" y1="200" x2="735" y2="260" stroke="#dc2626" stroke-width="2"/>
  <rect x="630" y="260" width="220" height="90" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">15:00 · Data Sync</text>
  <text x="740" y="306" text-anchor="middle" font-size="12" fill="#7f1d1d">당일 오전 공시 반영</text>
  <text x="740" y="324" text-anchor="middle" font-size="12" fill="#7f1d1d">12시간 간격 리프레시</text>
  <text x="740" y="342" text-anchor="middle" font-size="11" fill="#991b1b">변경 파일만 HF push</text>

  <!-- Monthly timeline -->
  <text x="60" y="500" font-size="18" font-weight="700" fill="#166534">매월</text>
  <line x1="60" y1="550" x2="1140" y2="550" stroke="#cbd5e1" stroke-width="2"/>
  <g font-size="11" fill="#64748b">
    <text x="96" y="576" text-anchor="middle">1일</text>
    <text x="384" y="576" text-anchor="middle">10일</text>
    <text x="672" y="576" text-anchor="middle">20일</text>
    <text x="1104" y="576" text-anchor="middle">말일</text>
  </g>

  <circle cx="96" cy="550" r="14" fill="#16a34a"/>
  <line x1="96" y1="550" x2="96" y2="610" stroke="#16a34a" stroke-width="2"/>
  <rect x="60" y="610" width="320" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="220" y="634" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">매월 1일 05:00 · Search Index Main</text>
  <text x="220" y="656" text-anchor="middle" font-size="12" fill="#14532d">docs 8GB + allFilings 풀리빌드</text>
  <text x="220" y="674" text-anchor="middle" font-size="12" fill="#14532d">content 인덱스 main 세그먼트 교체</text>
  <text x="220" y="692" text-anchor="middle" font-size="11" fill="#166534">delta는 흡수 · 약 18분</text>

  <!-- Legend -->
  <rect x="500" y="610" width="640" height="90" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="520" y="634" font-size="13" font-weight="700" fill="#0f172a">사용자가 경험하는 것</text>
  <text x="520" y="656" font-size="12" fill="#334155">• 아침에 dartlab을 열면 전날 밤 공시가 이미 들어와 있다</text>
  <text x="520" y="674" font-size="12" fill="#334155">• 오후 작업에서 당일 오전 공시가 반영된다 (최대 12시간 시차)</text>
  <text x="520" y="692" font-size="12" fill="#334155">• 월초에 검색 인덱스가 쇄신 — 그 달의 새 공시 유형·키워드가 커버된다</text>
</svg>
