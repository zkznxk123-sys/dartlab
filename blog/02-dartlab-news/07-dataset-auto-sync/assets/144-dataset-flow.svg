<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <linearGradient id="gHF" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gUser" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="60" y="60" font-size="28" font-weight="700" fill="#0f172a">dartlab 데이터 흐름 — DART API에서 사용자 컴퓨터까지</text>
  <text x="60" y="92" font-size="16" fill="#475569">사용자는 한 줄만 쓴다. 그 뒤의 수집·가공·배포는 전부 자동이다.</text>

  <!-- Stage 1: DART/EDGAR -->
  <rect x="60" y="150" width="220" height="150" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="170" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">원본 소스</text>
  <text x="170" y="220" text-anchor="middle" font-size="14" fill="#1e3a8a">DART OpenAPI</text>
  <text x="170" y="244" text-anchor="middle" font-size="14" fill="#1e3a8a">SEC EDGAR</text>
  <text x="170" y="272" text-anchor="middle" font-size="12" fill="#475569">list.json · 사업보고서</text>
  <text x="170" y="290" text-anchor="middle" font-size="12" fill="#475569">XBRL · 재무 · 공시원문</text>

  <!-- Stage 2: GitHub Actions -->
  <rect x="340" y="150" width="260" height="150" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="470" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#7f1d1d">GitHub Actions</text>
  <text x="470" y="216" text-anchor="middle" font-size="13" fill="#7f1d1d">KST 03:00 · 15:00 매일 2회</text>
  <text x="470" y="236" text-anchor="middle" font-size="13" fill="#7f1d1d">누락 차집합만 수집</text>
  <text x="470" y="256" text-anchor="middle" font-size="13" fill="#7f1d1d">pending.txt 회수</text>
  <text x="470" y="280" text-anchor="middle" font-size="12" fill="#475569">dataSync · edgarSync · searchIndex</text>

  <!-- Stage 3: HuggingFace -->
  <rect x="660" y="150" width="240" height="150" rx="12" fill="url(#gHF)" stroke="#b45309" stroke-width="2"/>
  <text x="780" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#78350f">HuggingFace 데이터셋</text>
  <text x="780" y="216" text-anchor="middle" font-size="13" fill="#78350f">eddmpython/dartlab-data</text>
  <text x="780" y="240" text-anchor="middle" font-size="12" fill="#78350f">docs · finance · report</text>
  <text x="780" y="258" text-anchor="middle" font-size="12" fill="#78350f">scan · edgar · stemIndex</text>
  <text x="780" y="282" text-anchor="middle" font-size="11" fill="#92400e">변경 파일만 incremental push</text>

  <!-- Stage 4: User -->
  <rect x="960" y="150" width="180" height="150" rx="12" fill="url(#gUser)" stroke="#166534" stroke-width="2"/>
  <text x="1050" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">사용자 컴퓨터</text>
  <text x="1050" y="220" text-anchor="middle" font-size="13" fill="#14532d">~/.dartlab/</text>
  <text x="1050" y="246" text-anchor="middle" font-size="12" fill="#14532d">자동 pull on-demand</text>
  <text x="1050" y="270" text-anchor="middle" font-size="12" fill="#14532d">12시간 TTL 갱신</text>
  <text x="1050" y="290" text-anchor="middle" font-size="11" fill="#166534">stale 7일+ 경고</text>

  <!-- Arrows -->
  <line x1="280" y1="225" x2="335" y2="225" stroke="#1f2937" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="225" x2="655" y2="225" stroke="#1f2937" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="900" y1="225" x2="955" y2="225" stroke="#1f2937" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Bottom row: user-facing API -->
  <rect x="60" y="380" width="1080" height="280" rx="14" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="90" y="418" font-size="18" font-weight="700" fill="#0f172a">사용자가 쓰는 한 줄 — 나머지는 전부 이 줄 뒤에 숨어 있다</text>

  <!-- Code box 1 -->
  <rect x="90" y="440" width="320" height="90" rx="8" fill="#0f172a"/>
  <text x="110" y="468" font-size="12" font-family="monospace" fill="#86efac">import dartlab</text>
  <text x="110" y="490" font-size="12" font-family="monospace" fill="#e2e8f0">c = dartlab.Company("005930")</text>
  <text x="110" y="512" font-size="12" font-family="monospace" fill="#93c5fd">c.show("IS")  # 없으면 HF에서 자동 pull</text>

  <rect x="430" y="440" width="320" height="90" rx="8" fill="#0f172a"/>
  <text x="450" y="468" font-size="12" font-family="monospace" fill="#86efac">dartlab.scan("profitability")</text>
  <text x="450" y="490" font-size="12" font-family="monospace" fill="#93c5fd"># scan/finance.parquet 271MB</text>
  <text x="450" y="512" font-size="12" font-family="monospace" fill="#93c5fd"># 첫 호출 1회만 다운로드</text>

  <rect x="770" y="440" width="320" height="90" rx="8" fill="#0f172a"/>
  <text x="790" y="468" font-size="12" font-family="monospace" fill="#86efac">dartlab.search("유상증자")</text>
  <text x="790" y="490" font-size="12" font-family="monospace" fill="#93c5fd"># stemIndex.npz 320MB</text>
  <text x="790" y="512" font-size="12" font-family="monospace" fill="#93c5fd"># pull 후 warm 165ms 검색</text>

  <text x="90" y="570" font-size="14" fill="#334155" font-weight="600">이 한 줄이 호출되는 순간 dartlab은:</text>
  <text x="90" y="594" font-size="13" fill="#475569">① ~/.dartlab/ 로컬 캐시 확인 → 없으면 HF에서 해당 카테고리만 선별 다운로드</text>
  <text x="90" y="614" font-size="13" fill="#475569">② 12시간 지났으면 백그라운드 비교 → 변경된 종목 parquet만 교체 (전체 재다운로드 아님)</text>
  <text x="90" y="634" font-size="13" fill="#475569">③ 7일 이상 stale이면 guide.emit 으로 경고 한 줄, 그래도 작업은 진행</text>
</svg>
