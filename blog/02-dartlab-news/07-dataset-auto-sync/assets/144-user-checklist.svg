<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1080" height="720" fill="#ffffff"/>
  <text x="60" y="60" font-size="26" font-weight="700" fill="#0f172a">사용자가 실제로 해야 하는 것 — 세 줄</text>
  <text x="60" y="92" font-size="15" fill="#475569">데이터 신선도는 dartlab이 알아서 관리한다. 사용자는 경계선만 정해주면 된다.</text>

  <!-- Item 1 -->
  <rect x="60" y="130" width="960" height="140" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <circle cx="100" cy="170" r="22" fill="#0284c7"/>
  <text x="100" y="178" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">1</text>
  <text x="140" y="170" font-size="18" font-weight="700" fill="#075985">설치 — 끝</text>
  <rect x="140" y="190" width="860" height="60" rx="6" fill="#0f172a"/>
  <text x="160" y="228" font-size="14" font-family="monospace" fill="#86efac">pip install dartlab</text>

  <!-- Item 2 -->
  <rect x="60" y="290" width="960" height="180" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <circle cx="100" cy="330" r="22" fill="#16a34a"/>
  <text x="100" y="338" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">2</text>
  <text x="140" y="330" font-size="18" font-weight="700" fill="#14532d">필요한 순간에 한 줄 호출 — 데이터는 알아서 온다</text>
  <rect x="140" y="350" width="860" height="100" rx="6" fill="#0f172a"/>
  <text x="160" y="378" font-size="13" font-family="monospace" fill="#93c5fd">c = dartlab.Company("005930")   # finance · docs · report 자동 pull</text>
  <text x="160" y="402" font-size="13" font-family="monospace" fill="#93c5fd">dartlab.scan("profitability")   # scan 프리빌드 자동 pull</text>
  <text x="160" y="426" font-size="13" font-family="monospace" fill="#93c5fd">dartlab.search("유상증자")       # stemIndex 자동 pull</text>

  <!-- Item 3 -->
  <rect x="60" y="490" width="960" height="180" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <circle cx="100" cy="530" r="22" fill="#ea580c"/>
  <text x="100" y="538" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">3</text>
  <text x="140" y="530" font-size="18" font-weight="700" fill="#7c2d12">선택 — 전체 미리 받고 싶으면 한 줄 더</text>
  <rect x="140" y="550" width="860" height="100" rx="6" fill="#0f172a"/>
  <text x="160" y="578" font-size="13" font-family="monospace" fill="#fde68a">dartlab.downloadAll("scan")     # 271MB 미리 받아두기</text>
  <text x="160" y="602" font-size="13" font-family="monospace" fill="#fde68a">dartlab.downloadAll("finance")  # 2GB 한 번에</text>
  <text x="160" y="626" font-size="13" font-family="monospace" fill="#fde68a">dartlab.downloadAll()           # 전부 — 10GB+</text>

  <text x="60" y="705" font-size="13" fill="#475569">안 받아도 된다. `c.show("IS")` 호출되는 순간 해당 종목 parquet 2MB만 자동으로 따라온다.</text>
</svg>
