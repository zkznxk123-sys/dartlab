<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrOk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrBlock" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="60" y="54" font-size="26" font-weight="700" fill="#0f172a">CORS — "허락 도장" 비유로 이해하기</text>
  <text x="60" y="84" font-size="15" fill="#475569">브라우저는 A 사이트가 B 사이트 데이터를 직접 받으려 할 때 B의 허락 도장을 확인한다. 없으면 차단.</text>

  <!-- Scene 1: Allowed -->
  <text x="60" y="140" font-size="16" font-weight="700" fill="#16a34a">① 허락 도장 있음 — 데이터가 브라우저로 흐른다</text>

  <!-- Browser (A) -->
  <g transform="translate(80,170)">
    <rect x="0" y="0" width="180" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="20" rx="10" fill="#2563eb"/>
    <circle cx="12" cy="10" r="3" fill="#fbbf24"/>
    <circle cx="24" cy="10" r="3" fill="#22c55e"/>
    <circle cx="36" cy="10" r="3" fill="#ef4444"/>
    <text x="90" y="55" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">내 브라우저 (A)</text>
    <text x="90" y="78" text-anchor="middle" font-size="12" fill="#1e3a8a">dartlab-lite 실행 중</text>
    <text x="90" y="96" text-anchor="middle" font-size="12" fill="#475569">→ fetch(B.com/data)</text>
  </g>

  <!-- Arrow allowed -->
  <path d="M 270 225 Q 440 180 610 225" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrOk)"/>
  <text x="440" y="195" text-anchor="middle" font-size="13" fill="#16a34a" font-weight="700">요청 → 허락됨</text>

  <!-- Server (B) with stamp -->
  <g transform="translate(620,170)">
    <rect x="0" y="0" width="180" height="110" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="90" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">서버 B (데이터)</text>
    <text x="90" y="72" text-anchor="middle" font-size="12" fill="#14532d">HuggingFace · Gemini</text>
    <text x="90" y="90" text-anchor="middle" font-size="12" fill="#14532d">OpenAI · OpenDART proxy</text>
  </g>

  <!-- Stamp -->
  <g transform="translate(810,185)">
    <circle cx="35" cy="35" r="35" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="35" y="28" text-anchor="middle" font-size="10" fill="#92400e" font-weight="700">허락</text>
    <text x="35" y="44" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700">도장</text>
    <text x="35" y="58" text-anchor="middle" font-size="10" fill="#92400e">⭕</text>
  </g>
  <text x="845" y="275" text-anchor="middle" font-size="12" fill="#92400e">Access-Control-<tspan font-weight="700">Allow-Origin</tspan></text>

  <!-- Data flowing back -->
  <path d="M 620 260 Q 440 300 270 260" stroke="#16a34a" stroke-width="3" fill="none" stroke-dasharray="6 4" marker-end="url(#arrOk)"/>
  <text x="440" y="310" text-anchor="middle" font-size="13" fill="#16a34a">← 데이터 파일이 브라우저에 도착</text>

  <!-- Divider -->
  <line x1="60" y1="370" x2="1140" y2="370" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Scene 2: Blocked -->
  <text x="60" y="410" font-size="16" font-weight="700" fill="#dc2626">② 허락 도장 없음 — 브라우저가 요청을 막는다</text>

  <!-- Browser again -->
  <g transform="translate(80,440)">
    <rect x="0" y="0" width="180" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="20" rx="10" fill="#2563eb"/>
    <circle cx="12" cy="10" r="3" fill="#fbbf24"/>
    <circle cx="24" cy="10" r="3" fill="#22c55e"/>
    <circle cx="36" cy="10" r="3" fill="#ef4444"/>
    <text x="90" y="55" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">내 브라우저 (A)</text>
    <text x="90" y="78" text-anchor="middle" font-size="12" fill="#1e3a8a">dartlab-lite 실행 중</text>
    <text x="90" y="96" text-anchor="middle" font-size="12" fill="#475569">→ fetch(B.com/data)</text>
  </g>

  <!-- Arrow blocked -->
  <path d="M 270 495 L 580 495" stroke="#dc2626" stroke-width="3" fill="none" stroke-dasharray="8 4"/>
  <g transform="translate(420,485)">
    <circle cx="0" cy="10" r="16" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="0" y="15" text-anchor="middle" font-size="18" font-weight="700" fill="#dc2626">✕</text>
  </g>
  <text x="420" y="460" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">브라우저가 차단</text>

  <!-- Server without stamp -->
  <g transform="translate(620,440)">
    <rect x="0" y="0" width="180" height="110" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="90" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">서버 B (데이터)</text>
    <text x="90" y="72" text-anchor="middle" font-size="12" fill="#7f1d1d">Naver 증권 · Yahoo Finance</text>
    <text x="90" y="90" text-anchor="middle" font-size="12" fill="#7f1d1d">Google News RSS</text>
  </g>

  <!-- No stamp -->
  <g transform="translate(810,455)">
    <circle cx="35" cy="35" r="35" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="35" y="40" text-anchor="middle" font-size="26" fill="#9ca3af">—</text>
  </g>
  <text x="845" y="545" text-anchor="middle" font-size="12" fill="#6b7280">CORS 헤더 없음</text>

  <!-- Bottom note -->
  <rect x="60" y="580" width="1080" height="32" rx="6" fill="#f1f5f9"/>
  <text x="600" y="602" text-anchor="middle" font-size="13" fill="#334155">dartlab에서 Company/analysis/review는 ① 경로로 동작, scan/gather는 ② 경로라 비활성화된다.</text>
</svg>
