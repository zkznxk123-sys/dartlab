<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#ffffff"/>
  <text x="60" y="54" font-size="26" font-weight="700" fill="#0f172a">dartlab을 실행하기까지 — 일반 Python 5단계 vs Pyodide 1단계</text>
  <text x="60" y="84" font-size="15" fill="#475569">Pyodide는 "파이썬 자체를 브라우저가 다운로드해 준다"는 사실 하나로 중간 4단계가 증발한다</text>

  <!-- Row 1: 일반 Python -->
  <text x="60" y="150" font-size="16" font-weight="700" fill="#1e3a8a">일반 Python</text>
  <text x="60" y="172" font-size="13" fill="#475569">평균 5~15분 · 에러 1~2회는 기본</text>

  <g font-size="13" fill="#1e3a8a">
    <!-- Step 1 -->
    <rect x="200" y="130" width="140" height="72" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="270" y="158" text-anchor="middle" font-size="14" font-weight="700">1. Python 설치</text>
    <text x="270" y="180" text-anchor="middle">python.org</text>
    <text x="270" y="196" text-anchor="middle">다운로드</text>

    <!-- Step 2 -->
    <rect x="360" y="130" width="140" height="72" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="430" y="158" text-anchor="middle" font-size="14" font-weight="700">2. venv 생성</text>
    <text x="430" y="180" text-anchor="middle">가상환경 설정</text>
    <text x="430" y="196" text-anchor="middle">PATH 이슈</text>

    <!-- Step 3 -->
    <rect x="520" y="130" width="140" height="72" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="590" y="158" text-anchor="middle" font-size="14" font-weight="700">3. activate</text>
    <text x="590" y="180" text-anchor="middle">source/Scripts</text>
    <text x="590" y="196" text-anchor="middle">(OS별 다름)</text>

    <!-- Step 4 -->
    <rect x="680" y="130" width="140" height="72" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="750" y="158" text-anchor="middle" font-size="14" font-weight="700">4. pip install</text>
    <text x="750" y="180" text-anchor="middle">dartlab 다운로드</text>
    <text x="750" y="196" text-anchor="middle">의존성 해결</text>

    <!-- Step 5 -->
    <rect x="840" y="130" width="140" height="72" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="910" y="158" text-anchor="middle" font-size="14" font-weight="700">5. import dartlab</text>
    <text x="910" y="180" text-anchor="middle">✓ 드디어</text>
    <text x="910" y="196" text-anchor="middle">실행 가능</text>
  </g>

  <!-- Arrows for Python flow -->
  <g stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrBlue)">
    <line x1="340" y1="166" x2="360" y2="166"/>
    <line x1="500" y1="166" x2="520" y2="166"/>
    <line x1="660" y1="166" x2="680" y2="166"/>
    <line x1="820" y1="166" x2="840" y2="166"/>
  </g>

  <!-- Row 2: Pyodide -->
  <text x="60" y="360" font-size="16" font-weight="700" fill="#7f1d1d">Pyodide (dartlab-lite)</text>
  <text x="60" y="382" font-size="13" fill="#475569">평균 10~30초 · 브라우저가 전부 해줌</text>

  <g>
    <!-- Single step: open browser -->
    <rect x="200" y="340" width="220" height="72" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="310" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">1. URL 열기</text>
    <text x="310" y="390" text-anchor="middle" font-size="13" fill="#7f1d1d">xlwings Lite / JupyterLite /</text>
    <text x="310" y="406" text-anchor="middle" font-size="13" fill="#7f1d1d">OneDrive 공유 엑셀</text>

    <!-- Arrow -->
    <line x1="420" y1="376" x2="460" y2="376" stroke="#dc2626" stroke-width="2" marker-end="url(#arrRed)"/>

    <!-- Auto download -->
    <rect x="460" y="340" width="240" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="580" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">[자동] 브라우저가 처리</text>
    <text x="580" y="384" text-anchor="middle" font-size="12" fill="#7f1d1d">.wasm 런타임 + dartlab wheel</text>
    <text x="580" y="400" text-anchor="middle" font-size="12" fill="#7f1d1d">HF parquet 모두 자동 다운로드</text>

    <!-- Arrow -->
    <line x1="700" y1="376" x2="740" y2="376" stroke="#dc2626" stroke-width="2" marker-end="url(#arrRed)"/>

    <!-- Result -->
    <rect x="740" y="340" width="240" height="72" rx="8" fill="#dbeafe" stroke="#dc2626" stroke-width="2"/>
    <text x="860" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">2. import dartlab</text>
    <text x="860" y="390" text-anchor="middle" font-size="13" fill="#7f1d1d">✓ 실행 가능</text>
    <text x="860" y="406" text-anchor="middle" font-size="13" fill="#7f1d1d">(설치 체감 0)</text>
  </g>

  <!-- Bottom callout -->
  <rect x="60" y="470" width="1080" height="62" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="600" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">핵심: Pyodide는 "설치 단계"를 브라우저가 숨겨 준 것 — 파이썬 인터프리터 자체가 .wasm 파일로 다운로드된다</text>
  <text x="600" y="518" text-anchor="middle" font-size="13" fill="#78350f">같은 파이썬, 같은 dartlab, 같은 데이터. 차이는 "런타임을 사용자가 준비하냐, 브라우저가 준비하냐"뿐.</text>
</svg>
