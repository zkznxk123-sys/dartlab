<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="60" y="60" font-size="28" font-weight="700" fill="#0f172a">일반 Python vs Pyodide — 같은 파이썬, 다른 실행 환경</text>
  <text x="60" y="92" font-size="16" fill="#475569">한 줄 차이: 런타임이 내 컴퓨터에 있냐, 브라우저 탭 안에 있냐</text>

  <!-- Left: 일반 Python -->
  <rect x="60" y="140" width="520" height="520" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="188" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">일반 Python (설치형)</text>
  <text x="320" y="214" text-anchor="middle" font-size="14" fill="#475569">내 컴퓨터에 CPython이 설치됨</text>

  <!-- Left icon: laptop -->
  <g transform="translate(250,240)">
    <rect x="0" y="0" width="140" height="86" rx="8" fill="#ffffff" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="10" y="10" width="120" height="66" fill="#1e3a8a"/>
    <text x="70" y="50" text-anchor="middle" font-size="28" fill="#fbbf24">🐍</text>
    <rect x="-10" y="90" width="160" height="8" rx="4" fill="#1e3a8a"/>
  </g>

  <!-- Left bullets -->
  <g font-size="15" fill="#1e3a8a">
    <text x="100" y="390">● 런타임 위치: <tspan font-weight="700">내 하드디스크</tspan></text>
    <text x="100" y="422">● 설치: Python 다운로드 → uv/venv → pip</text>
    <text x="100" y="454">● 속도: 네이티브 CPU 속도 (빠름)</text>
    <text x="100" y="486">● 파일시스템: <tspan font-weight="700">영구</tspan> (디스크)</text>
    <text x="100" y="518">● 스레드: 멀티스레드 가능</text>
    <text x="100" y="550">● 외부 API: 전부 호출 가능 (OS 권한)</text>
    <text x="100" y="582">● scan · gather · search: <tspan font-weight="700">전부 OK</tspan></text>
    <text x="100" y="614">● 배포: 사용자가 직접 설치해야 함</text>
  </g>

  <!-- Right: Pyodide -->
  <rect x="620" y="140" width="520" height="520" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="880" y="188" text-anchor="middle" font-size="22" font-weight="700" fill="#7f1d1d">Pyodide (브라우저형)</text>
  <text x="880" y="214" text-anchor="middle" font-size="14" fill="#475569">브라우저 탭 안에 CPython이 .wasm으로 로드됨</text>

  <!-- Right icon: browser tab -->
  <g transform="translate(810,240)">
    <rect x="0" y="0" width="140" height="86" rx="8" fill="#ffffff" stroke="#7f1d1d" stroke-width="2"/>
    <rect x="0" y="0" width="140" height="18" rx="8" fill="#7f1d1d"/>
    <circle cx="10" cy="9" r="3" fill="#fbbf24"/>
    <circle cx="22" cy="9" r="3" fill="#22c55e"/>
    <circle cx="34" cy="9" r="3" fill="#ef4444"/>
    <text x="70" y="58" text-anchor="middle" font-size="20" fill="#7f1d1d" font-weight="700">.wasm</text>
    <text x="70" y="78" text-anchor="middle" font-size="13" fill="#7f1d1d">🐍 CPython</text>
  </g>

  <!-- Right bullets -->
  <g font-size="15" fill="#7f1d1d">
    <text x="660" y="390">● 런타임 위치: <tspan font-weight="700">브라우저 탭 메모리</tspan></text>
    <text x="660" y="422">● 설치: <tspan font-weight="700">없음</tspan> — URL 하나 열면 끝</text>
    <text x="660" y="454">● 속도: 네이티브의 50~90% (WASM)</text>
    <text x="660" y="486">● 파일시스템: <tspan font-weight="700">휘발</tspan> (MEMFS, 탭 닫으면 사라짐)</text>
    <text x="660" y="518">● 스레드: 싱글 스레드만</text>
    <text x="660" y="550">● 외부 API: <tspan font-weight="700">CORS 허용된 것만</tspan></text>
    <text x="660" y="582">● scan · gather: <tspan font-weight="700">불가</tspan> / Company · analysis: OK</text>
    <text x="660" y="614">● 배포: 웹페이지 한 번 열면 즉시</text>
  </g>

  <!-- Bottom note -->
  <text x="600" y="700" text-anchor="middle" font-size="14" fill="#64748b">같은 CPython, 같은 dartlab API — 차이는 "어디서 돌아가는가" 하나뿐</text>
</svg>
