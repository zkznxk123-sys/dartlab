<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <title>시총 상위 몇 개가 아니라, 전 상장사</title>
  <desc>대부분의 분석 대시보드는 시가총액 상위 몇십 개만 깊게 보여주고 나머지는 표 한 줄이거나 없다. 터미널은 약 2,800개 전 상장사를 같은 깊이로 연다.</desc>

  <defs>
    <linearGradient id="bg09c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="url(#bg09c)" rx="16"/>
  <text x="50" y="56" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="29" font-weight="700">시총 상위 몇 개가 아니라, 전 상장사</text>
  <text x="50" y="88" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">남들이 안 보는 종목을 남들과 같은 도구로 — 그게 더 큰 차이</text>

  <!-- 왼쪽: 보통 대시보드 -->
  <rect x="50" y="125" width="540" height="600" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="320" y="166" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="19" font-weight="700">보통 "분석 대시보드"</text>
  <text x="320" y="192" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">상위 몇십 개만 깊게</text>

  <rect x="86" y="220" width="468" height="60" rx="9" fill="#0f172a" stroke="#3b82f6" stroke-width="1.3"/>
  <text x="320" y="256" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="14" font-weight="600">대형주 — 재무·차트·공시 전부</text>
  <rect x="86" y="290" width="468" height="60" rx="9" fill="#0f172a" stroke="#3b82f6" stroke-width="1.3"/>
  <text x="320" y="326" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="14" font-weight="600">대형주 — 깊게</text>

  <rect x="86" y="372" width="468" height="40" rx="7" fill="#0f172a" stroke="#334155"/>
  <text x="320" y="398" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">중소형주 — 표 한 줄</text>
  <rect x="86" y="420" width="468" height="40" rx="7" fill="#0f172a" stroke="#334155"/>
  <text x="320" y="446" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">중소형주 — 표 한 줄</text>
  <rect x="86" y="468" width="468" height="40" rx="7" fill="#0f172a" stroke="#334155" stroke-dasharray="4 4"/>
  <text x="320" y="494" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="13">그 바깥 — 아예 없음</text>
  <rect x="86" y="516" width="468" height="40" rx="7" fill="#0f172a" stroke="#334155" stroke-dasharray="4 4"/>
  <text x="320" y="542" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="13">그 바깥 — 아예 없음</text>

  <text x="320" y="612" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="15" font-weight="600">관심 종목이 1등 기업이 아니면</text>
  <text x="320" y="638" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">볼 게 없다</text>
  <text x="320" y="690" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">시총 상위 = silent default</text>

  <!-- 오른쪽: 터미널 -->
  <rect x="610" y="125" width="540" height="600" rx="16" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="166" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="19" font-weight="700">dartlab 터미널</text>
  <text x="880" y="192" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">전 상장사가 같은 깊이로</text>

  <rect x="646" y="220" width="468" height="70" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.3"/>
  <text x="880" y="252" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="26" font-weight="700">약 2,800사</text>
  <text x="880" y="278" text-anchor="middle" fill="#bbf7d0" font-family="system-ui, sans-serif" font-size="13">코스피 · 코스닥 전부</text>

  <text x="680" y="324" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="600">어느 회사든 똑같이 열린다</text>
  <rect x="646" y="338" width="225" height="50" rx="8" fill="#1e293b" stroke="#3b82f6"/>
  <text x="758" y="368" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="13">재무 전 기간</text>
  <rect x="889" y="338" width="225" height="50" rx="8" fill="#1e293b" stroke="#38bdf8"/>
  <text x="1001" y="368" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="13">공시 · 차트</text>
  <rect x="646" y="396" width="225" height="50" rx="8" fill="#1e293b" stroke="#a855f7"/>
  <text x="758" y="426" text-anchor="middle" fill="#c084fc" font-family="system-ui, sans-serif" font-size="13">산업 위치</text>
  <rect x="889" y="396" width="225" height="50" rx="8" fill="#1e293b" stroke="#22c55e"/>
  <text x="1001" y="426" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="13">신용</text>

  <rect x="646" y="470" width="468" height="86" rx="11" fill="#1e293b" stroke="#334155"/>
  <text x="880" y="504" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">코스닥 구석의 소형주도</text>
  <text x="880" y="534" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="15" font-weight="700">대형주와 똑같은 깊이로</text>

  <text x="880" y="612" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="15" font-weight="600">남들이 안 보는 종목을</text>
  <text x="880" y="638" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">남들과 같은 도구로</text>
  <text x="880" y="690" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">시총 필터는 사용자가 고를 때만</text>

  <text x="600" y="790" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">전 종목을 한 줄로 꺼내는 scan 이 이 데이터의 바닥이다</text>
</svg>
