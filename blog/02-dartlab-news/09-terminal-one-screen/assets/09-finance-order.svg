<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <title>재무를 보는 순서 — 손익 → 현금 → 효율 → 체력</title>
  <desc>터미널의 재무 화면은 계정을 늘어놓지 않고, 전문가가 회사를 읽는 순서대로 묶여 있다. 얼마나 버나, 그 이익이 진짜 현금인가, 자본을 잘 굴리나, 버틸 수 있나.</desc>

  <defs>
    <linearGradient id="bg09o" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="url(#bg09o)" rx="16"/>
  <text x="50" y="56" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="29" font-weight="700">재무는 보는 순서대로 묶여 있다</text>
  <text x="50" y="88" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">숫자를 외울 필요 없이, 어디서 걸리는지만 보면 된다</text>

  <!-- 1 손익 -->
  <rect x="50" y="120" width="1100" height="150" rx="13" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="84" y="160" fill="#86efac" font-family="system-ui, sans-serif" font-size="20" font-weight="700">① 얼마나 버나</text>
  <text x="84" y="186" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">손익</text>
  <rect x="320" y="140" width="250" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="445" y="178" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">손익구조</text>
  <text x="445" y="208" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">매출에서 이익까지</text>
  <text x="445" y="230" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">어디서 새는지</text>
  <rect x="585" y="140" width="250" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="710" y="178" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">비용구조</text>
  <text x="710" y="208" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">원가·판관비가</text>
  <text x="710" y="230" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">매출을 먹는 정도</text>
  <rect x="850" y="140" width="250" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="975" y="178" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">이익률 추이</text>
  <text x="975" y="208" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">매출총·영업·순</text>
  <text x="975" y="230" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">이익률</text>

  <!-- 2 현금 -->
  <rect x="50" y="288" width="1100" height="150" rx="13" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="84" y="328" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="20" font-weight="700">② 이익이 진짜인가</text>
  <text x="84" y="354" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">현금</text>
  <rect x="320" y="308" width="250" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="445" y="346" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">현금흐름</text>
  <text x="445" y="376" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">영업·투자·재무</text>
  <text x="445" y="398" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">현금의 방향</text>
  <rect x="585" y="308" width="250" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="710" y="346" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">이익의 현금화</text>
  <text x="710" y="376" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">순이익이 실제</text>
  <text x="710" y="398" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">현금으로 오나</text>
  <rect x="850" y="308" width="250" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="975" y="346" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">잉여현금 FCF</text>
  <text x="975" y="376" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">쓰고 남는</text>
  <text x="975" y="398" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">진짜 현금</text>

  <!-- 3 효율 -->
  <rect x="50" y="456" width="1100" height="150" rx="13" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="84" y="496" fill="#c084fc" font-family="system-ui, sans-serif" font-size="20" font-weight="700">③ 자본을 잘 굴리나</text>
  <text x="84" y="522" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">효율</text>
  <rect x="320" y="476" width="380" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="510" y="514" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">자본수익 — ROE · ROA</text>
  <text x="510" y="544" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">자기자본·자산이</text>
  <text x="510" y="566" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">얼마를 벌어들이나</text>
  <rect x="715" y="476" width="385" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="907" y="514" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">ROE 분해 (듀폰)</text>
  <text x="907" y="544" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">마진에서 왔나 · 회전에서 왔나</text>
  <text x="907" y="566" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">레버리지에서 왔나</text>

  <!-- 4 체력 -->
  <rect x="50" y="624" width="1100" height="150" rx="13" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="84" y="664" fill="#fde68a" font-family="system-ui, sans-serif" font-size="20" font-weight="700">④ 버틸 수 있나</text>
  <text x="84" y="690" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">체력</text>
  <rect x="320" y="644" width="380" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="510" y="682" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">자산구조</text>
  <text x="510" y="712" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">자산이 무엇으로</text>
  <text x="510" y="734" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">구성됐는지</text>
  <rect x="715" y="644" width="385" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="907" y="682" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">레버리지 · 유동</text>
  <text x="907" y="712" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">부채와 유동성으로</text>
  <text x="907" y="734" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">버틸 수 있는지</text>

  <text x="160" y="800" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">"매출 3배인데 이익 제자리" → ①에서 걸린다 · "이익은 느는데 현금은 마른다" → ②에서 걸린다</text>
</svg>
