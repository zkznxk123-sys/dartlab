<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <title>판정하지 않는다 — 색은 증거지 방향이 아니다</title>
  <desc>터미널은 매수·매도·수혜주를 찍지 않는다. 곡선·분포·국면을 그려서 보여주고 판단은 보는 사람이 한다. 색은 분석 방향이 아니라 증거의 상태(실측·추정·없음)를 가리킨다.</desc>

  <defs>
    <linearGradient id="bg09v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="720" fill="url(#bg09v)" rx="16"/>
  <text x="50" y="56" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="27" font-weight="700">판정하지 않는다 — 기능이 빠진 게 아니라 정책</text>
  <text x="50" y="86" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">블룸버그가 수익률 곡선을 보여주되 "지금 사라"고 적지 않는 것과 같다</text>

  <!-- 안 찍는 것 -->
  <rect x="50" y="118" width="470" height="240" rx="13" fill="#1e293b" stroke="#ef4444" stroke-width="1.4"/>
  <text x="78" y="156" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="18" font-weight="700">찍지 않는다</text>
  <rect x="78" y="176" width="180" height="44" rx="9" fill="#0f172a" stroke="#7f1d1d"/>
  <text x="168" y="204" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">매수 / 매도</text>
  <rect x="270" y="176" width="180" height="44" rx="9" fill="#0f172a" stroke="#7f1d1d"/>
  <text x="360" y="204" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">수혜 / 피해</text>
  <rect x="78" y="230" width="180" height="44" rx="9" fill="#0f172a" stroke="#7f1d1d"/>
  <text x="168" y="258" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">좋음 / 나쁨</text>
  <rect x="270" y="230" width="180" height="44" rx="9" fill="#0f172a" stroke="#7f1d1d"/>
  <text x="360" y="258" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">단일 점수</text>
  <text x="78" y="310" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">대신 곡선·분포·국면을 그려서 보여주고</text>
  <text x="78" y="334" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">판단은 보는 사람이 한다</text>

  <!-- 보여주는 것 -->
  <rect x="540" y="118" width="490" height="240" rx="13" fill="#1e293b" stroke="#22c55e" stroke-width="1.4"/>
  <text x="568" y="156" fill="#86efac" font-family="system-ui, sans-serif" font-size="18" font-weight="700">그려서 보여준다</text>
  <rect x="568" y="176" width="434" height="44" rx="9" fill="#0f172a" stroke="#334155"/>
  <text x="785" y="204" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">재무 곡선 — 무엇이 어떻게 움직였나</text>
  <rect x="568" y="230" width="434" height="44" rx="9" fill="#0f172a" stroke="#334155"/>
  <text x="785" y="258" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">분포 · 국면 — 지금 어디쯤인가</text>
  <text x="568" y="310" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14">근거(축·기간·출처·한계)를 함께 노출하고</text>
  <text x="568" y="334" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">결론은 사용자가 낸다</text>

  <!-- 색 = 증거 상태 -->
  <rect x="50" y="380" width="980" height="290" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="540" y="420" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="19" font-weight="700">색 = 분석 방향이 아니라 증거의 상태</text>
  <text x="540" y="448" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">빈칸을 그럴듯한 값으로 메우지 않는다 — 어디가 실측이고 어디가 추정인지 드러낸다</text>

  <rect x="100" y="478" width="280" height="150" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="520" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="17" font-weight="700">실측</text>
  <text x="240" y="556" text-anchor="middle" fill="#bbf7d0" font-family="system-ui, sans-serif" font-size="14">공시에서 직접 온 값</text>
  <text x="240" y="586" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">그대로 믿어도 되는</text>

  <rect x="400" y="478" width="280" height="150" rx="12" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="540" y="520" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="17" font-weight="700">추정</text>
  <text x="540" y="556" text-anchor="middle" fill="#fde68a" font-family="system-ui, sans-serif" font-size="14">계산·보정으로 채운 값</text>
  <text x="540" y="586" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">알고 봐야 하는</text>

  <rect x="700" y="478" width="280" height="150" rx="12" fill="#1e293b" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="840" y="520" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="17" font-weight="700">데이터 없음</text>
  <text x="840" y="556" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">아예 비어 있는 구간</text>
  <text x="840" y="586" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">숨기지 않고 비워 둔다</text>

  <text x="540" y="656" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">어떤 숫자가 추정인지 알고 보는 것과 모르고 보는 것은, 같은 화면이라도 다른 판단을 낳는다</text>
</svg>
