<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <title>한 종목을 볼 때, 무엇을 어떤 순서로 겹쳐 보나</title>
  <desc>터미널을 쓰고 나면 남는 건 도구가 아니라 순서다. 재무가 꺾인 자리에서 공시로, 공시에서 주가 반응으로, 다시 업종 안 위치로. 이 순서는 터미널이 없는 곳에서도 쓰는 방식이 된다.</desc>

  <defs>
    <linearGradient id="bg09r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="720" fill="url(#bg09r)" rx="16"/>
  <text x="50" y="56" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="27" font-weight="700">남는 건 도구가 아니라 순서다</text>
  <text x="50" y="86" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">한 종목을 볼 때 무엇을 어떤 순서로 겹쳐 봐야 하는지</text>

  <!-- 4단계 순서 -->
  <rect x="50" y="120" width="980" height="92" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="1.4"/>
  <circle cx="100" cy="166" r="22" fill="#1e3a8a"/>
  <text x="100" y="173" text-anchor="middle" fill="#dbeafe" font-family="system-ui, sans-serif" font-size="18" font-weight="700">1</text>
  <text x="148" y="158" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="17" font-weight="700">재무가 꺾인 자리를 찾는다</text>
  <text x="148" y="186" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">이익률·현금이 어느 분기에 흔들렸나</text>

  <rect x="50" y="232" width="980" height="92" rx="12" fill="#0f172a" stroke="#a855f7" stroke-width="1.4"/>
  <circle cx="100" cy="278" r="22" fill="#581c87"/>
  <text x="100" y="285" text-anchor="middle" fill="#f3e8ff" font-family="system-ui, sans-serif" font-size="18" font-weight="700">2</text>
  <text x="148" y="270" fill="#c084fc" font-family="system-ui, sans-serif" font-size="17" font-weight="700">그 자리에 어떤 공시가 났나</text>
  <text x="148" y="298" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">바로 옆 공시 레일에서 그 시점을 본다</text>

  <rect x="50" y="344" width="980" height="92" rx="12" fill="#0f172a" stroke="#38bdf8" stroke-width="1.4"/>
  <circle cx="100" cy="390" r="22" fill="#0c4a6e"/>
  <text x="100" y="397" text-anchor="middle" fill="#e0f2fe" font-family="system-ui, sans-serif" font-size="18" font-weight="700">3</text>
  <text x="148" y="382" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="17" font-weight="700">주가는 그때 어떻게 반응했나</text>
  <text x="148" y="410" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">같은 시간선의 라이브 차트로 확인</text>

  <rect x="50" y="456" width="980" height="92" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1.4"/>
  <circle cx="100" cy="502" r="22" fill="#78350f"/>
  <text x="100" y="509" text-anchor="middle" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="18" font-weight="700">4</text>
  <text x="148" y="494" fill="#fde68a" font-family="system-ui, sans-serif" font-size="17" font-weight="700">업종 안에서 어디쯤인가</text>
  <text x="148" y="522" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">경쟁사와 견줘 이 회사의 위치를 본다</text>

  <line x1="100" y1="212" x2="100" y2="232" stroke="#475569" stroke-width="2"/>
  <line x1="100" y1="324" x2="100" y2="344" stroke="#475569" stroke-width="2"/>
  <line x1="100" y1="436" x2="100" y2="456" stroke="#475569" stroke-width="2"/>

  <!-- 닫는 메시지 -->
  <rect x="50" y="572" width="980" height="100" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="612" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="18" font-weight="700">이 순서는 터미널이 없는 곳에서도 종목을 보는 방식이 된다</text>
  <text x="540" y="646" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">그리고 그렇게 찾아낸 발견은, 대개 혼자 보기 아깝다 → 카드로 묶어 보낸다</text>
</svg>
