<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>종목 하나, 한 화면 — 흩어진 탭이 아니라 겹쳐 보는 계기판</title>
  <desc>한 회사를 보려고 재무·차트·공시·산업·신용을 탭 예닐곱 개로 흩어 열면 맥락이 끊긴다. 터미널은 같은 종목 맥락에서 다섯 축을 한 화면에 겹쳐 둔다.</desc>

  <defs>
    <linearGradient id="bg09h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg09h)" rx="16"/>
  <text x="50" y="56" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="29" font-weight="700">종목 하나, 한 화면</text>
  <text x="50" y="88" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">흩어진 탭이 아니라, 같은 종목 맥락으로 겹쳐 보는 계기판</text>

  <!-- 왼쪽: 흩어진 탭 -->
  <rect x="50" y="120" width="340" height="560" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="220" y="156" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="17" font-weight="700">탭 예닐곱 개</text>
  <text x="220" y="180" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">이리저리 옮겨 다닌다</text>
  <rect x="80" y="206" width="280" height="46" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="100" y="234" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">재무 사이트</text>
  <rect x="80" y="262" width="280" height="46" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="100" y="290" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">주가 차트 앱</text>
  <rect x="80" y="318" width="280" height="46" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="100" y="346" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">DART 공시 원문</text>
  <rect x="80" y="374" width="280" height="46" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="100" y="402" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">증권사 리포트</text>
  <rect x="80" y="430" width="280" height="46" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="100" y="458" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">신용 페이지</text>
  <rect x="80" y="486" width="280" height="46" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="100" y="514" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">…그리고 또</text>
  <text x="220" y="572" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="15" font-weight="600">옮기는 순간 맥락이 끊긴다</text>
  <text x="220" y="598" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">방금 본 분기를 다시 찾는다</text>
  <text x="220" y="636" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">도구가 늘수록 판단은 느려진다</text>

  <!-- 화살표 -->
  <text x="445" y="405" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="34" font-weight="700">→</text>

  <!-- 오른쪽: 한 계기판 -->
  <rect x="500" y="120" width="650" height="560" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="825" y="156" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="17" font-weight="700">한 계기판 — 다섯 축이 한 시간선 위에</text>

  <rect x="700" y="370" width="250" height="64" rx="12" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <text x="825" y="400" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="16" font-weight="700">종목 하나</text>
  <text x="825" y="422" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">같은 맥락, 동시에</text>

  <line x1="700" y1="402" x2="600" y2="250" stroke="#334155" stroke-width="1.5"/>
  <line x1="825" y1="370" x2="825" y2="250" stroke="#334155" stroke-width="1.5"/>
  <line x1="950" y1="402" x2="1050" y2="250" stroke="#334155" stroke-width="1.5"/>
  <line x1="700" y1="434" x2="620" y2="560" stroke="#334155" stroke-width="1.5"/>
  <line x1="950" y1="434" x2="1030" y2="560" stroke="#334155" stroke-width="1.5"/>

  <rect x="525" y="206" width="170" height="56" rx="10" fill="#1e293b" stroke="#3b82f6"/>
  <text x="610" y="232" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="14" font-weight="600">재무 시계열</text>
  <text x="610" y="251" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">분기별 길게</text>
  <rect x="740" y="194" width="170" height="56" rx="10" fill="#1e293b" stroke="#38bdf8"/>
  <text x="825" y="220" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="14" font-weight="600">라이브 차트</text>
  <text x="825" y="239" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">주가 반응</text>
  <rect x="955" y="206" width="180" height="56" rx="10" fill="#1e293b" stroke="#a855f7"/>
  <text x="1045" y="232" text-anchor="middle" fill="#c084fc" font-family="system-ui, sans-serif" font-size="14" font-weight="600">공시 레일</text>
  <text x="1045" y="251" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">언제 무엇이</text>
  <rect x="535" y="556" width="170" height="56" rx="10" fill="#1e293b" stroke="#fbbf24"/>
  <text x="620" y="582" text-anchor="middle" fill="#fde68a" font-family="system-ui, sans-serif" font-size="14" font-weight="600">산업 위치</text>
  <text x="620" y="601" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">업종 안 어디쯤</text>
  <rect x="945" y="556" width="170" height="56" rx="10" fill="#1e293b" stroke="#22c55e"/>
  <text x="1030" y="582" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">신용</text>
  <text x="1030" y="601" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">공시로 재현</text>

  <text x="825" y="660" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">재무가 꺾인 자리에서 눈만 옮기면, 그때의 공시·주가가 바로 옆</text>
</svg>
