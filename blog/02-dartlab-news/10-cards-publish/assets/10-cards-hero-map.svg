<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>같은 발견, 2만 자 대신 카드 한 묶음</title>
  <desc>긴 분석은 끝까지 안 읽히고, 같은 발견을 카드 묶음으로 만들면 끝까지 스와이프된다. 덱은 표지 한 줄 → 큰 숫자 → 왜 세 박자로 흐른다.</desc>

  <defs>
    <linearGradient id="bg10h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg10h)" rx="16"/>
  <text x="50" y="58" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="30" font-weight="700">같은 발견, 2만 자 대신 카드 한 묶음</text>
  <text x="50" y="90" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">"이 회사 부채 37조인데 빚이 0원이래" — 한 줄은 흥미로운데, 2만 자 링크는 안 읽힌다</text>

  <!-- 왼쪽: 2만 자 분석 -->
  <rect x="50" y="130" width="330" height="250" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="215" y="168" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="17" font-weight="700">2만 자 분석 링크</text>
  <line x1="80" y1="200" x2="350" y2="200" stroke="#334155" stroke-width="6"/>
  <line x1="80" y1="222" x2="350" y2="222" stroke="#334155" stroke-width="6"/>
  <line x1="80" y1="244" x2="320" y2="244" stroke="#334155" stroke-width="6"/>
  <line x1="80" y1="266" x2="350" y2="266" stroke="#334155" stroke-width="6"/>
  <line x1="80" y1="288" x2="300" y2="288" stroke="#334155" stroke-width="6"/>
  <text x="215" y="338" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="15" font-weight="600">끝까지 읽는 사람 거의 없음</text>
  <text x="215" y="362" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">깊을수록 전파는 줄어든다</text>

  <!-- 화살표 -->
  <text x="600" y="260" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="34" font-weight="700">→</text>
  <text x="600" y="290" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">같은 숫자, 다른 그릇</text>

  <!-- 오른쪽: 카드 묶음 -->
  <rect x="820" y="130" width="330" height="250" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="985" y="168" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="17" font-weight="700">4:5 카드 한 묶음</text>
  <rect x="858" y="190" width="80" height="120" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="948" y="190" width="80" height="120" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="1038" y="190" width="80" height="120" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="1095" y="258" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="26" font-weight="700">›</text>
  <text x="985" y="338" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="15" font-weight="600">끝까지 스와이프한다</text>
  <text x="985" y="362" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">인스타에서 늘 하는 그 손동작</text>

  <!-- 하단: 덱 세 박자 -->
  <rect x="50" y="420" width="1100" height="250" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="600" y="458" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="19" font-weight="700">카드는 요약이 아니라, 한 가지를 끝까지 미는 세 박자</text>

  <rect x="90" y="490" width="300" height="150" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="528" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="16" font-weight="700">① 표지 — 한 줄로 던진다</text>
  <text x="240" y="562" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">"이 회사, 빚이 0원이래"</text>
  <text x="240" y="608" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">표지 한 장에 끌려 들어온다</text>

  <rect x="450" y="490" width="300" height="150" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="528" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="16" font-weight="700">② 큰 숫자 — 보여준다</text>
  <text x="600" y="566" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="26" font-weight="700">부채 37조 · 차입금 0</text>
  <text x="600" y="608" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">데이터에서 그대로 그린 숫자</text>

  <rect x="810" y="490" width="300" height="150" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="960" y="528" text-anchor="middle" fill="#c084fc" font-family="system-ui, sans-serif" font-size="16" font-weight="700">③ 왜 — 한 장씩 푼다</text>
  <text x="960" y="562" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">왜 빚이 없는지 한 걸음씩</text>
  <text x="960" y="608" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">짧은데 허전하지 않다</text>

  <text x="420" y="572" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="22">›</text>
  <text x="780" y="572" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="22">›</text>
</svg>
