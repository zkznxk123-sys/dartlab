<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>넘기고, 찾고, 보낸다 — /cards 활용 흐름</title>
  <desc>/cards 피드에서 검색하고 좌우로 스와이프한다. 링크를 보내면 첫 장이 미리보기 그림으로 펼쳐지고, 받은 사람이 누르면 곧장 그 카드로 들어온다.</desc>

  <defs>
    <linearGradient id="bg10f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg10f)" rx="16"/>
  <text x="50" y="58" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="30" font-weight="700">넘기고, 찾고, 보낸다</text>
  <text x="50" y="90" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">/cards 에서 보는 것부터, 친구 손에 닿는 마지막 한 걸음까지</text>

  <!-- 상단: 피드에서 보기 -->
  <rect x="50" y="125" width="1100" height="210" rx="14" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="162" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="18" font-weight="700">/cards 피드 — 인스타처럼 그 자리에서</text>

  <rect x="90" y="186" width="320" height="120" rx="11" fill="#1e293b" stroke="#475569"/>
  <text x="250" y="224" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="600">전 종목이 카드로</text>
  <text x="250" y="254" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">대형주만이 아니라 전부</text>
  <text x="250" y="284" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">펼쳐 두고 기다린다</text>

  <rect x="440" y="186" width="320" height="120" rx="11" fill="#1e293b" stroke="#475569"/>
  <text x="600" y="224" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="600">회사 이름으로 검색</text>
  <text x="600" y="254" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">찾고 싶은 회사·이슈를</text>
  <text x="600" y="284" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">바로 꺼낸다</text>

  <rect x="790" y="186" width="320" height="120" rx="11" fill="#1e293b" stroke="#475569"/>
  <text x="950" y="224" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="600">좌우로 스와이프</text>
  <text x="950" y="254" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">따로 열 필요 없이</text>
  <text x="950" y="284" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">끝까지 넘겨 본다</text>

  <!-- 화살표 아래로 -->
  <text x="600" y="372" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="30" font-weight="700">↓</text>
  <text x="600" y="398" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">마음에 들면, 링크 하나로 보낸다</text>

  <!-- 하단: 공유 -->
  <rect x="50" y="420" width="1100" height="250" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="80" y="458" fill="#86efac" font-family="system-ui, sans-serif" font-size="18" font-weight="700">공유 — 첫 장이 따라온다 (이 마지막 걸음에서 갈린다)</text>

  <rect x="90" y="486" width="280" height="150" rx="11" fill="#1e293b" stroke="#334155"/>
  <text x="230" y="520" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">링크를 붙인다</text>
  <text x="230" y="548" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">메신저 · 스레드 · 인스타</text>
  <rect x="160" y="566" width="140" height="50" rx="8" fill="#0f172a" stroke="#475569"/>
  <text x="230" y="597" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">.../cards/...</text>

  <text x="395" y="568" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="26" font-weight="700">→</text>

  <rect x="420" y="486" width="280" height="150" rx="11" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="560" y="520" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="15" font-weight="700">첫 장이 미리보기로</text>
  <rect x="500" y="538" width="120" height="84" rx="9" fill="#0f172a" stroke="#22c55e"/>
  <text x="560" y="576" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">표지 한 장</text>
  <text x="560" y="600" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">그림으로 펼쳐짐</text>

  <text x="725" y="568" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="26" font-weight="700">→</text>

  <rect x="750" y="486" width="280" height="150" rx="11" fill="#1e293b" stroke="#334155"/>
  <text x="890" y="520" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">누르면 그 카드로 직행</text>
  <text x="890" y="552" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">받은 사람이 곧장 본문 없이</text>
  <text x="890" y="580" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">그 묶음으로 들어온다</text>
  <text x="890" y="612" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="13" font-weight="600">발견이 진짜로 퍼진다</text>
</svg>
