<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <title>카드에 박힌 규칙 — 끌리게 만들되 사실에서 도망가지 않는다</title>
  <desc>숫자는 공시 근거가 있는 것만, 해석은 사람이, 이미지는 저작권 없는 실사만, 발행 전 한 번 더 검토. 그리고 열 때마다 가장 최근 숫자.</desc>

  <defs>
    <linearGradient id="bg10p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="720" fill="url(#bg10p)" rx="16"/>
  <text x="50" y="58" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="28" font-weight="700">카드에 박힌 규칙</text>
  <text x="50" y="88" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">끌리게 만들되, 사실에서 도망가지 않는다 — 후킹과 정직을 맞바꾸지 않는다</text>

  <!-- 4 정책 카드 -->
  <rect x="50" y="120" width="485" height="160" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="78" y="158" fill="#86efac" font-family="system-ui, sans-serif" font-size="18" font-weight="700">① 숫자는 지어내지 않는다</text>
  <text x="78" y="192" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">그 회사가 실제로 낸 공시에서만 가져온다.</text>
  <text x="78" y="220" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">없는 걸 부풀려 키우지 않는다.</text>
  <text x="78" y="252" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">"전망"은 전망이라 적어 속보로 오인 안 되게</text>

  <rect x="545" y="120" width="485" height="160" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="573" y="158" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="18" font-weight="700">② 해석은 사람이 쓴다</text>
  <text x="573" y="192" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">한 줄 해석은 사람이 쓰고 책임진다.</text>
  <text x="573" y="220" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">결론 문장을 자동으로 만들어 붙이지 않는다.</text>
  <text x="573" y="252" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">그래프·표는 데이터가, 해석은 사람이</text>

  <rect x="50" y="296" width="485" height="160" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="78" y="334" fill="#fde68a" font-family="system-ui, sans-serif" font-size="18" font-weight="700">③ 이미지는 저작권 없는 실사만</text>
  <text x="78" y="368" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">공개·CC0 사진만 쓴다.</text>
  <text x="78" y="396" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="15">핀터레스트·구글 이미지에서 긁어오지 않는다.</text>
  <text x="78" y="428" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">출처가 깨끗하지 않으면 카드에 안 올린다</text>

  <rect x="545" y="296" width="485" height="160" rx="12" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="573" y="334" fill="#c084fc" font-family="system-ui, sans-serif" font-size="18" font-weight="700">④ 발행 전에 한 번 더 본다</text>
  <text x="573" y="368" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">훅이 셌는지, 숫자가 다 근거 있는지,</text>
  <text x="573" y="396" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">과장·투자 권유 표현은 없는지.</text>
  <text x="573" y="428" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">내보내기 전에 검토를 거친다</text>

  <!-- 하단: 최신성 -->
  <rect x="50" y="500" width="980" height="170" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="544" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="20" font-weight="700">그리고, 열 때마다 지금 숫자</text>
  <rect x="120" y="572" width="380" height="70" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="310" y="604" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15">지난달에 찍어 둔 화면</text>
  <text x="310" y="628" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="14" font-weight="600">아니다</text>
  <text x="540" y="615" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="26" font-weight="700">→</text>
  <rect x="580" y="572" width="380" height="70" rx="10" fill="#14532d" stroke="#22c55e"/>
  <text x="770" y="604" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="15">펼친 그 순간의 최근 숫자</text>
  <text x="770" y="628" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">로 채워진다</text>
</svg>
