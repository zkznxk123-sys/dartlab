<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <title>본다 → 발행한다 → 다시 본다</title>
  <desc>깊게 보는 터미널과 빠르게 퍼지는 카드가 같은 회사, 같은 숫자에서 나온다. 터미널에서 발견하고, 카드로 보내고, 받은 사람은 다시 터미널에서 연다.</desc>

  <defs>
    <linearGradient id="bg10l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="720" fill="url(#bg10l)" rx="16"/>
  <text x="50" y="58" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="28" font-weight="700">본다 → 발행한다 → 다시 본다</text>
  <text x="50" y="88" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">깊이 보는 화면과 빠르게 퍼지는 카드는 같은 회사, 같은 숫자에서 나온다</text>

  <!-- 본다 (터미널) -->
  <rect x="60" y="150" width="300" height="190" rx="14" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="210" y="195" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="20" font-weight="700">① 본다</text>
  <text x="210" y="228" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">터미널에서 펼쳐 본다</text>
  <text x="210" y="262" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">재무·공시·차트·산업·신용을</text>
  <text x="210" y="288" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">한 화면에서 겹쳐 본다</text>
  <text x="210" y="320" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">흥미로운 발견 하나</text>

  <!-- 발행한다 (카드) -->
  <rect x="390" y="150" width="300" height="190" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="195" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="20" font-weight="700">② 발행한다</text>
  <text x="540" y="228" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">카드로 묶어 보낸다</text>
  <text x="540" y="262" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">긴 글 대신 카드 한 묶음</text>
  <text x="540" y="288" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">첫 장 미리보기와 함께</text>
  <text x="540" y="320" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">메신저로 한 줄</text>

  <!-- 다시 본다 -->
  <rect x="720" y="150" width="300" height="190" rx="14" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
  <text x="870" y="195" text-anchor="middle" fill="#c084fc" font-family="system-ui, sans-serif" font-size="20" font-weight="700">③ 다시 본다</text>
  <text x="870" y="228" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">받은 사람이 터미널로</text>
  <text x="870" y="262" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">그 회사를 다시 연다</text>
  <text x="870" y="288" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">카드에서 화면으로</text>
  <text x="870" y="320" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">다시 깊이 본다</text>

  <text x="375" y="252" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="28" font-weight="700">→</text>
  <text x="705" y="252" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="28" font-weight="700">→</text>

  <!-- 순환 화살표 -->
  <path d="M 870 360 Q 870 430 540 430 Q 210 430 210 360" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="540" y="425" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">다시 발견하면, 다시 카드로 — 순환</text>

  <!-- 하단 요약 -->
  <rect x="60" y="500" width="960" height="160" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="540" y="548" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="19" font-weight="700">입력과 출력의 양 끝 — 다른 제품이 아니다</text>
  <rect x="120" y="576" width="380" height="62" rx="10" fill="#1e293b" stroke="#3b82f6"/>
  <text x="310" y="606" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="15" font-weight="600">터미널 = 깊이</text>
  <text x="310" y="628" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">직접 겹쳐 본다</text>
  <rect x="580" y="576" width="380" height="62" rx="10" fill="#1e293b" stroke="#22c55e"/>
  <text x="770" y="606" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="15" font-weight="600">카드 = 전파</text>
  <text x="770" y="628" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">받아서 넘긴다</text>
</svg>
