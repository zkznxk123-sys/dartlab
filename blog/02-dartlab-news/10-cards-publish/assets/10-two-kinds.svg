<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <title>카드 두 종류 — 회사 카드와 오늘의 이슈 카드</title>
  <desc>회사 카드는 종목 하나를 골라 손익·현금·효율·체력을 차례로 넘겨 본다. 이슈 카드는 종목도 블로그 본문도 없이 그때그때 주제를 카드만으로 낸다.</desc>

  <defs>
    <linearGradient id="bg10k" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="url(#bg10k)" rx="16"/>
  <text x="50" y="58" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="30" font-weight="700">카드는 두 갈래로 나온다</text>
  <text x="50" y="90" fill="#64748b" font-family="system-ui, sans-serif" font-size="16">하나는 특정 회사, 하나는 글로 쓸 새도 없는 오늘의 이슈</text>

  <!-- 회사 카드 -->
  <rect x="50" y="125" width="540" height="640" rx="16" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="168" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="20" font-weight="700">회사 카드</text>
  <text x="320" y="196" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">종목 하나를 고르면, 그 회사 이야기 한 묶음</text>

  <rect x="86" y="222" width="468" height="44" rx="9" fill="#1e293b" stroke="#1e40af"/>
  <text x="320" y="250" text-anchor="middle" fill="#dbeafe" font-family="system-ui, sans-serif" font-size="15" font-weight="600">표지 → 핵심 지표 → 회사 이야기</text>

  <text x="110" y="300" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="15" font-weight="600">재무를 보는 순서대로</text>
  <rect x="110" y="318" width="200" height="64" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="210" y="345" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">① 얼마나 버나</text>
  <text x="210" y="368" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">손익</text>
  <rect x="330" y="318" width="200" height="64" rx="10" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="430" y="345" text-anchor="middle" fill="#bae6fd" font-family="system-ui, sans-serif" font-size="14" font-weight="600">② 진짜 현금인가</text>
  <text x="430" y="368" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">현금</text>
  <rect x="110" y="394" width="200" height="64" rx="10" fill="#3b0764" stroke="#c084fc" stroke-width="1.2"/>
  <text x="210" y="421" text-anchor="middle" fill="#e9d5ff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">③ 잘 굴리나</text>
  <text x="210" y="444" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">효율</text>
  <rect x="330" y="394" width="200" height="64" rx="10" fill="#422006" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="430" y="421" text-anchor="middle" fill="#fde68a" font-family="system-ui, sans-serif" font-size="14" font-weight="600">④ 버틸 수 있나</text>
  <text x="430" y="444" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">체력</text>

  <rect x="86" y="492" width="468" height="80" rx="11" fill="#1e293b" stroke="#334155"/>
  <text x="320" y="524" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">같은 회사라도 보는 점이 다르면</text>
  <text x="320" y="552" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="15" font-weight="700">다른 묶음이 된다 (한 회사 → 여러 편)</text>

  <text x="110" y="615" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">차트와 숫자는 그 회사 공시에서 그대로 온다.</text>
  <text x="110" y="640" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">열 때마다 가장 최근 숫자로 채워진다.</text>
  <text x="320" y="720" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">→ 터미널에서 파다 발견한 회사를 바로 카드로</text>

  <!-- 이슈 카드 -->
  <rect x="610" y="125" width="540" height="640" rx="16" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
  <text x="880" y="168" text-anchor="middle" fill="#c084fc" font-family="system-ui, sans-serif" font-size="20" font-weight="700">오늘의 이슈 카드</text>
  <text x="880" y="196" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">종목도, 블로그 본문도 없이 — 카드만</text>

  <rect x="646" y="230" width="468" height="60" rx="11" fill="#1e293b" stroke="#7e22ce"/>
  <text x="880" y="266" text-anchor="middle" fill="#e9d5ff" font-family="system-ui, sans-serif" font-size="16" font-weight="600">"지금 한국 경제 전망"</text>

  <text x="646" y="332" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="15" font-weight="600">그때그때 짚어야 하는 주제</text>
  <rect x="646" y="350" width="225" height="58" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="758" y="384" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">긴 글 쓸 새 없음</text>
  <rect x="889" y="350" width="225" height="58" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="1001" y="384" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13">데이터·문구 새로 뽑음</text>

  <rect x="646" y="430" width="468" height="120" rx="11" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.2"/>
  <text x="880" y="470" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="15" font-weight="700">본문을 쓸 시간이 없어도</text>
  <text x="880" y="502" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="15">이야기는 멈추지 않는다</text>
  <text x="880" y="530" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">한 묶음으로 바로 발행</text>

  <text x="646" y="605" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">손으로 쓴 해석 슬라이드가 중심이고,</text>
  <text x="646" y="630" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">숫자는 본문 근거가 있는 것만 올린다.</text>
  <text x="880" y="720" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">→ 경제·시장 이슈를 즉시 카드 한 묶음으로</text>

  <text x="600" y="800" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">둘 다 같은 곳(/cards)에서 넘기고, 검색하고, 보낸다</text>
</svg>
