<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">CAPEX 9년 — 베팅의 크기</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">유형자산 취득 (현금흐름표 기준), `c.select("CF", ["유형자산의취득"])`</text>

  <!-- 10 years bars
   2016 1.36 / 2017 2.28 / 2018 4.28 / 2019 2.53 / 2020 2.53 / 2021 2.75 / 2022 4.14 / 2023 1.73 / 2024 7.27 / 2025 11.87
   max 12, scale 12 → 380px
   bar w 70, gap 30, start x 130, group w 100
  -->

  <line x1="100" y1="120" x2="100" y2="540" stroke="#1e2433"/>
  <line x1="100" y1="540" x2="1100" y2="540" stroke="#1e2433"/>

  <g font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    <text x="92" y="124" text-anchor="end">12조</text>
    <text x="92" y="244" text-anchor="end">9조</text>
    <text x="92" y="364" text-anchor="end">6조</text>
    <text x="92" y="484" text-anchor="end">3조</text>
    <text x="92" y="544" text-anchor="end">0</text>
  </g>

  <line x1="100" y1="244" x2="1100" y2="244" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="364" x2="1100" y2="364" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="484" x2="1100" y2="484" stroke="#1e2433" stroke-dasharray="2 4"/>

  <!-- Bars: y = 540 - (val/12)*420
   2016 1.36 → y=492 h=48
   2017 2.28 → y=460 h=80
   2018 4.28 → y=390 h=150
   2019 2.53 → y=451 h=89
   2020 2.53 → y=451 h=89
   2021 2.75 → y=444 h=96
   2022 4.14 → y=395 h=145
   2023 1.73 → y=479 h=61
   2024 7.27 → y=286 h=254
   2025 11.87 → y=125 h=415
  -->

  <g>
    <rect x="135" y="492" width="70" height="48" fill="#475569"/>
    <text x="170" y="556" text-anchor="middle" font-size="11" fill="#94a3b8">2016</text>
    <text x="170" y="484" text-anchor="middle" font-size="10" fill="#94a3b8">1.36</text>

    <rect x="235" y="460" width="70" height="80" fill="#475569"/>
    <text x="270" y="556" text-anchor="middle" font-size="11" fill="#94a3b8">2017</text>
    <text x="270" y="452" text-anchor="middle" font-size="10" fill="#94a3b8">2.28</text>

    <rect x="335" y="390" width="70" height="150" fill="#06b6d4" opacity="0.7"/>
    <text x="370" y="556" text-anchor="middle" font-size="11" fill="#06b6d4">2018</text>
    <text x="370" y="382" text-anchor="middle" font-size="10" font-weight="700" fill="#06b6d4">4.28</text>
    <text x="370" y="364" text-anchor="middle" font-size="9" fill="#64748b">사이클 1 정점</text>

    <rect x="435" y="451" width="70" height="89" fill="#475569"/>
    <text x="470" y="556" text-anchor="middle" font-size="11" fill="#94a3b8">2019</text>
    <text x="470" y="443" text-anchor="middle" font-size="10" fill="#94a3b8">2.53</text>

    <rect x="535" y="451" width="70" height="89" fill="#475569"/>
    <text x="570" y="556" text-anchor="middle" font-size="11" fill="#94a3b8">2020</text>
    <text x="570" y="443" text-anchor="middle" font-size="10" fill="#94a3b8">2.53</text>

    <rect x="635" y="444" width="70" height="96" fill="#475569"/>
    <text x="670" y="556" text-anchor="middle" font-size="11" fill="#94a3b8">2021</text>
    <text x="670" y="436" text-anchor="middle" font-size="10" fill="#94a3b8">2.75</text>

    <rect x="735" y="395" width="70" height="145" fill="#06b6d4" opacity="0.7"/>
    <text x="770" y="556" text-anchor="middle" font-size="11" fill="#06b6d4">2022</text>
    <text x="770" y="387" text-anchor="middle" font-size="10" font-weight="700" fill="#06b6d4">4.14</text>
    <text x="770" y="369" text-anchor="middle" font-size="9" fill="#64748b">사이클 2 정점</text>

    <rect x="835" y="479" width="70" height="61" fill="#ec4899" opacity="0.7"/>
    <text x="870" y="556" text-anchor="middle" font-size="11" fill="#ec4899">2023</text>
    <text x="870" y="471" text-anchor="middle" font-size="10" fill="#ec4899">1.73</text>
    <text x="870" y="453" text-anchor="middle" font-size="9" fill="#64748b">적자기 → 줄임</text>

    <rect x="935" y="286" width="70" height="254" fill="#22c55e" opacity="0.85"/>
    <text x="970" y="556" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">2024</text>
    <text x="970" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">7.27</text>

    <rect x="1035" y="125" width="70" height="415" fill="#22c55e" stroke="#fff" stroke-width="2"/>
    <text x="1070" y="556" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">2025</text>
    <text x="1070" y="115" text-anchor="middle" font-size="13" font-weight="800" fill="#22c55e">11.87 🔥</text>
    <text x="1070" y="100" text-anchor="middle" font-size="10" fill="#64748b">사상 최대 / 매출 28%</text>
  </g>

  <!-- Annotation arrows -->
  <line x1="940" y1="155" x2="1030" y2="155" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <polygon points="1030,150 1040,155 1030,160" fill="#22c55e"/>
  <text x="985" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#22c55e">+63% YoY</text>

  <!-- Conclusion -->
  <rect x="180" y="600" width="840" height="100" rx="10" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.35)"/>
  <text x="600" y="630" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#22c55e">
    HBM 라인 증설 베팅 — 2018 정점의 약 3배
  </text>
  <text x="600" y="654" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">
    2023 적자기에 1.73조까지 줄였다가, 2년 만에 11.87조 (6.9배)
  </text>
  <text x="600" y="678" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    NVIDIA 2026~2027 수요를 받기 위한 청주/이천/인디애나 라인 증설
  </text>
</svg>
