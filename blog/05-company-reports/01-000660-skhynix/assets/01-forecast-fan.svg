<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="bullfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bearfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" rx="16" fill="url(#bg5)"/>
  <rect x="0.5" y="0.5" width="1199" height="819" rx="16" stroke="#1e2433"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">dartlab forecast — 정점인가 새 시대인가</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">매출 시나리오 3개, `c.analysis("forecast", "매출전망").scenarios`</text>

  <!-- Chart area: x 100~1140, y 130~580 -->
  <line x1="100" y1="130" x2="100" y2="580" stroke="#1e2433"/>
  <line x1="100" y1="580" x2="1140" y2="580" stroke="#1e2433"/>

  <!-- y axis: 매출 0~250조 -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    <text x="92" y="134" text-anchor="end">250조</text>
    <text x="92" y="220" text-anchor="end">200조</text>
    <text x="92" y="306" text-anchor="end">150조</text>
    <text x="92" y="392" text-anchor="end">100조</text>
    <text x="92" y="478" text-anchor="end">50조</text>
    <text x="92" y="584" text-anchor="end">0</text>
  </g>

  <line x1="100" y1="220" x2="1140" y2="220" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="306" x2="1140" y2="306" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="392" x2="1140" y2="392" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="478" x2="1140" y2="478" stroke="#1e2433" stroke-dasharray="2 4"/>

  <!--
   x: 4 points: 2025 (실측 97조), 2026, 2027, 2028
   x positions: 250, 530, 810, 1090
   y = 580 - (val/250)*450 = 580 - val*1.8
   2025 actual: 97 → y=406
   base: 2025=97, 2026=177.5 (+83%), 2027=164.9 (-7.1%), 2028=150.4 (-8.8%)
   bull: 2025=97, 2026=203 (+109), 2027=229 (+12.9), 2028=255 (+11.2)
   bear: 2025=97, 2026=152 (+56.7), 2027=110.8 (-27), 2028=78.8 (-28.8)

   y values:
   2025 97 → 406
   base: 2026 177.5 → 261, 2027 164.9 → 283, 2028 150.4 → 309
   bull: 2026 203 → 215, 2027 229 → 168, 2028 255 → 121
   bear: 2026 152 → 306, 2027 110.8 → 381, 2028 78.8 → 438
  -->

  <!-- Bull-Bear fan area -->
  <path d="M 250,406 L 530,215 L 810,168 L 1090,121 L 1090,438 L 810,381 L 530,306 Z" fill="url(#bullfade)" opacity="0.4"/>
  <path d="M 250,406 L 530,306 L 810,381 L 1090,438 L 1090,406 Z" fill="url(#bearfade)" opacity="0.5"/>

  <!-- Past actual line -->
  <line x1="100" y1="500" x2="250" y2="406" stroke="#94a3b8" stroke-width="3" stroke-dasharray="2 0"/>
  <text x="100" y="495" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">2024 (66조)</text>
  <circle cx="100" cy="500" r="4" fill="#94a3b8"/>

  <!-- Bull line -->
  <polyline points="250,406 530,215 810,168 1090,121" stroke="#22c55e" stroke-width="3" fill="none"/>
  <circle cx="530" cy="215" r="5" fill="#22c55e"/>
  <circle cx="810" cy="168" r="5" fill="#22c55e"/>
  <circle cx="1090" cy="121" r="6" fill="#22c55e"/>

  <!-- Base line -->
  <polyline points="250,406 530,261 810,283 1090,309" stroke="#fbbf24" stroke-width="3" fill="none"/>
  <circle cx="530" cy="261" r="5" fill="#fbbf24"/>
  <circle cx="810" cy="283" r="5" fill="#fbbf24"/>
  <circle cx="1090" cy="309" r="6" fill="#fbbf24"/>

  <!-- Bear line -->
  <polyline points="250,406 530,306 810,381 1090,438" stroke="#ec4899" stroke-width="3" fill="none"/>
  <circle cx="530" cy="306" r="5" fill="#ec4899"/>
  <circle cx="810" cy="381" r="5" fill="#ec4899"/>
  <circle cx="1090" cy="438" r="6" fill="#ec4899"/>

  <!-- Anchor 2025 actual -->
  <circle cx="250" cy="406" r="8" fill="#06b6d4" stroke="#fff" stroke-width="2"/>
  <text x="250" y="386" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#06b6d4">2025 — 97조 (실측)</text>

  <!-- x labels -->
  <g font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">
    <text x="250" y="600" text-anchor="middle" font-weight="700">2025</text>
    <text x="530" y="600" text-anchor="middle">2026</text>
    <text x="810" y="600" text-anchor="middle">2027</text>
    <text x="1090" y="600" text-anchor="middle">2028</text>
  </g>

  <!-- End labels -->
  <text x="1095" y="116" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#22c55e">255조</text>
  <text x="1095" y="304" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#fbbf24">150조</text>
  <text x="1095" y="448" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#ec4899">79조</text>

  <!-- Scenario boxes -->
  <g>
    <rect x="120" y="650" width="320" height="140" rx="12" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.4)"/>
    <text x="280" y="676" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#22c55e">BULL — 25%</text>
    <text x="280" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">+109% / +13% / +11%</text>
    <text x="280" y="722" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">3년 매출 255조</text>
    <text x="280" y="744" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">DCF: 400,268원/주</text>
    <text x="280" y="770" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">AI 슈퍼사이클 영구</text>

    <rect x="450" y="650" width="320" height="140" rx="12" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.4)"/>
    <text x="610" y="676" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#fbbf24">BASE — 50%</text>
    <text x="610" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">+83% / -7% / -9%</text>
    <text x="610" y="722" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">3년 매출 150조</text>
    <text x="610" y="744" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">DCF: 328,933원/주</text>
    <text x="610" y="770" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">2026 정점 후 둔화</text>

    <rect x="780" y="650" width="320" height="140" rx="12" fill="rgba(236,72,153,0.08)" stroke="rgba(236,72,153,0.4)"/>
    <text x="940" y="676" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#ec4899">BEAR — 25%</text>
    <text x="940" y="700" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">+57% / -27% / -29%</text>
    <text x="940" y="722" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">3년 매출 79조</text>
    <text x="940" y="744" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">DCF: 258,518원/주</text>
    <text x="940" y="770" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">사이클 폭락 재현</text>
  </g>

  <!-- Market price callout -->
  <line x1="250" y1="406" x2="270" y2="100" stroke="#fff" stroke-width="1" stroke-dasharray="2 4"/>
  <rect x="270" y="80" width="220" height="40" rx="8" fill="rgba(255,255,255,0.06)" stroke="#fff" stroke-width="1"/>
  <text x="380" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff">현재 주가 88만원</text>
  <text x="380" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">bull DCF의 2배 이상</text>
</svg>
