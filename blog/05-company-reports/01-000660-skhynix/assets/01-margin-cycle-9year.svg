<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="redfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">SK하이닉스 영업이익률 — 9년 5번의 사이클</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748b">2016 ~ 2025 분기, dartlab `c.select("ratios", ["영업이익률 (%)"])` 실측</text>

  <!-- chart area: x 100~1140, y 130~580, range -70 ~ +70 -->
  <!-- y axis grid -->
  <line x1="100" y1="130" x2="100" y2="580" stroke="#1e2433" stroke-width="1"/>
  <line x1="100" y1="580" x2="1140" y2="580" stroke="#1e2433" stroke-width="1"/>

  <!-- 0 line -->
  <line x1="100" y1="355" x2="1140" y2="355" stroke="#475569" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="92" y="359" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">0%</text>

  <!-- y labels -->
  <text x="92" y="134" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">+70%</text>
  <text x="92" y="246" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">+35%</text>
  <text x="92" y="464" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">-35%</text>
  <text x="92" y="576" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">-70%</text>

  <!-- data points
   2016Q4 28.67 / 2017Q4 49.47 / 2018Q4 44.58 / 2019Q4 3.41 / 2020Q4 12.13
   2021Q4 34.09 / 2022Q4 -24.74 / 2023Q1 -66.87 / 2023Q4 3.06 / 2024Q4 40.89 / 2025Q4 58.40
   x positions: 9 anchor years + 2 inner = 11 points
   x range 100 → 1140 = 1040, 10 intervals = 104 spacing
   y: value → 355 - (value/70)*225
  -->

  <!-- Filled area under curve (positive=green, negative=red) -->
  <path d="M 100,355
           L 100,283
           L 204,288
           L 308,272
           L 412,344
           L 516,316
           L 620,245
           L 724,435
           L 776,570
           L 828,345
           L 932,224
           L 1036,168
           L 1140,168
           L 1140,355
           Z" fill="url(#greenfade)" opacity="0.8"/>

  <!-- Main line -->
  <polyline points="100,283 204,288 308,272 412,344 516,316 620,245 724,435 776,570 828,345 932,224 1036,168 1140,168" stroke="#06b6d4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Points + labels -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">
    <circle cx="100" cy="283" r="5" fill="#06b6d4"/>
    <text x="100" y="270" text-anchor="middle" font-weight="700" fill="#f1f5f9">28.67</text>
    <text x="100" y="600" text-anchor="middle">2016Q4</text>

    <circle cx="204" cy="288" r="5" fill="#06b6d4"/>
    <text x="204" y="600" text-anchor="middle">2017</text>

    <circle cx="308" cy="272" r="5" fill="#06b6d4"/>
    <text x="308" y="600" text-anchor="middle">2018</text>

    <circle cx="412" cy="344" r="5" fill="#fbbf24"/>
    <text x="412" y="600" text-anchor="middle">2019</text>

    <circle cx="516" cy="316" r="5" fill="#06b6d4"/>
    <text x="516" y="600" text-anchor="middle">2020</text>

    <circle cx="620" cy="245" r="5" fill="#06b6d4"/>
    <text x="620" y="600" text-anchor="middle">2021</text>

    <circle cx="724" cy="435" r="6" fill="#ec4899"/>
    <text x="724" y="455" text-anchor="middle" font-weight="700" fill="#ec4899">-24.74</text>
    <text x="724" y="600" text-anchor="middle">2022Q4</text>

    <circle cx="776" cy="570" r="8" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <text x="776" y="590" text-anchor="middle" font-weight="800" fill="#ef4444">-66.87 ⚠</text>
    <text x="776" y="615" text-anchor="middle" fill="#ef4444">2023Q1</text>

    <circle cx="828" cy="345" r="5" fill="#06b6d4"/>
    <text x="828" y="600" text-anchor="middle">2023Q4</text>

    <circle cx="932" cy="224" r="5" fill="#22c55e"/>
    <text x="932" y="600" text-anchor="middle">2024</text>

    <circle cx="1036" cy="168" r="5" fill="#22c55e"/>
    <text x="1036" y="600" text-anchor="middle">2025Q3</text>

    <circle cx="1140" cy="168" r="9" fill="#22c55e" stroke="#fff" stroke-width="2"/>
    <text x="1140" y="148" text-anchor="middle" font-weight="800" fill="#22c55e">+58.40 🔥</text>
    <text x="1140" y="600" text-anchor="middle" font-weight="700" fill="#22c55e">2025Q4</text>
  </g>

  <!-- Cycle annotations -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="180" y="640" width="240" height="48" rx="8" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.3)"/>
    <text x="300" y="660" text-anchor="middle" font-size="11" font-weight="700" fill="#06b6d4">사이클 1: 2017~2019</text>
    <text x="300" y="678" text-anchor="middle" font-size="10" fill="#94a3b8">정점 49.47% → 바닥 3.41%</text>

    <rect x="450" y="640" width="240" height="48" rx="8" fill="rgba(236,72,153,0.08)" stroke="rgba(236,72,153,0.35)"/>
    <text x="570" y="660" text-anchor="middle" font-size="11" font-weight="700" fill="#ec4899">사이클 2: 2022~2023</text>
    <text x="570" y="678" text-anchor="middle" font-size="10" fill="#94a3b8">+30% → -67% (3분기 만)</text>

    <rect x="720" y="640" width="240" height="48" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.35)"/>
    <text x="840" y="660" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">사이클 3: 2024~2025</text>
    <text x="840" y="678" text-anchor="middle" font-size="10" fill="#94a3b8">+3% → +58% (5분기 만 정점)</text>
  </g>
</svg>
