<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="16" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433" stroke-width="1" fill="none"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">분기 매출 vs 영업이익 — 1년 만에 일어난 일</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748b">2024Q1 ~ 2025Q4 분기 실적, 단위: 조원</text>

  <!-- Bar chart area: 8 quarters, 2024Q1 ~ 2025Q4
       매출:  12.43, 16.42, 17.57, 19.77, 17.64, 22.23, 24.45, 32.83
       영업이익: 2.89, 5.47, 7.03, 8.08, 7.44, 9.21, 11.38, 19.17
       max ~ 33, scale: 33 → 380px height
       8 groups, 2 bars each (revenue + op), bar w 38, gap 8, group w 100, total 800
  -->

  <!-- y axis -->
  <line x1="100" y1="120" x2="100" y2="540" stroke="#1e2433"/>
  <line x1="100" y1="540" x2="1100" y2="540" stroke="#1e2433"/>

  <!-- y labels -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">
    <text x="92" y="124" text-anchor="end">35조</text>
    <text x="92" y="244" text-anchor="end">25조</text>
    <text x="92" y="364" text-anchor="end">15조</text>
    <text x="92" y="484" text-anchor="end">5조</text>
    <text x="92" y="544" text-anchor="end">0</text>
  </g>

  <!-- Grid lines -->
  <line x1="100" y1="244" x2="1100" y2="244" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="364" x2="1100" y2="364" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="484" x2="1100" y2="484" stroke="#1e2433" stroke-dasharray="2 4"/>

  <!--
   y = 540 - (val/35)*420
   각 quarter group center: 165, 285, 405, 525, 645, 765, 885, 1005
   bar width 36, gap 4
  -->
  <g>
    <!-- 2024Q1: rev 12.43 → y=391 / op 2.89 → y=505 -->
    <rect x="145" y="391" width="40" height="149" fill="#06b6d4" opacity="0.85"/>
    <rect x="187" y="505" width="40" height="35" fill="#22c55e"/>
    <text x="186" y="555" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">24Q1</text>
    <text x="165" y="383" text-anchor="middle" font-size="10" fill="#06b6d4">12.4</text>
    <text x="207" y="498" text-anchor="middle" font-size="10" fill="#22c55e">2.9</text>

    <!-- 2024Q2: rev 16.42 → y=343 / op 5.47 → y=474 -->
    <rect x="265" y="343" width="40" height="197" fill="#06b6d4" opacity="0.85"/>
    <rect x="307" y="474" width="40" height="66" fill="#22c55e"/>
    <text x="306" y="555" text-anchor="middle" font-size="11" fill="#94a3b8">24Q2</text>
    <text x="285" y="335" text-anchor="middle" font-size="10" fill="#06b6d4">16.4</text>
    <text x="327" y="467" text-anchor="middle" font-size="10" fill="#22c55e">5.5</text>

    <!-- 2024Q3: rev 17.57 → y=329 / op 7.03 → y=455 -->
    <rect x="385" y="329" width="40" height="211" fill="#06b6d4" opacity="0.85"/>
    <rect x="427" y="455" width="40" height="85" fill="#22c55e"/>
    <text x="426" y="555" text-anchor="middle" font-size="11" fill="#94a3b8">24Q3</text>
    <text x="405" y="321" text-anchor="middle" font-size="10" fill="#06b6d4">17.6</text>
    <text x="447" y="448" text-anchor="middle" font-size="10" fill="#22c55e">7.0</text>

    <!-- 2024Q4: rev 19.77 → y=303 / op 8.08 → y=443 -->
    <rect x="505" y="303" width="40" height="237" fill="#06b6d4" opacity="0.85"/>
    <rect x="547" y="443" width="40" height="97" fill="#22c55e"/>
    <text x="546" y="555" text-anchor="middle" font-size="11" fill="#94a3b8">24Q4</text>
    <text x="525" y="295" text-anchor="middle" font-size="10" fill="#06b6d4">19.8</text>
    <text x="567" y="436" text-anchor="middle" font-size="10" fill="#22c55e">8.1</text>

    <!-- 2025Q1: rev 17.64 → y=328 / op 7.44 → y=451 -->
    <rect x="625" y="328" width="40" height="212" fill="#06b6d4" opacity="0.85"/>
    <rect x="667" y="451" width="40" height="89" fill="#22c55e"/>
    <text x="666" y="555" text-anchor="middle" font-size="11" fill="#94a3b8">25Q1</text>
    <text x="645" y="320" text-anchor="middle" font-size="10" fill="#06b6d4">17.6</text>
    <text x="687" y="444" text-anchor="middle" font-size="10" fill="#22c55e">7.4</text>

    <!-- 2025Q2: rev 22.23 → y=273 / op 9.21 → y=430 -->
    <rect x="745" y="273" width="40" height="267" fill="#06b6d4" opacity="0.85"/>
    <rect x="787" y="430" width="40" height="110" fill="#22c55e"/>
    <text x="786" y="555" text-anchor="middle" font-size="11" fill="#94a3b8">25Q2</text>
    <text x="765" y="265" text-anchor="middle" font-size="10" fill="#06b6d4">22.2</text>
    <text x="807" y="423" text-anchor="middle" font-size="10" fill="#22c55e">9.2</text>

    <!-- 2025Q3: rev 24.45 → y=247 / op 11.38 → y=403 -->
    <rect x="865" y="247" width="40" height="293" fill="#06b6d4" opacity="0.85"/>
    <rect x="907" y="403" width="40" height="137" fill="#22c55e"/>
    <text x="906" y="555" text-anchor="middle" font-size="11" fill="#94a3b8">25Q3</text>
    <text x="885" y="239" text-anchor="middle" font-size="10" fill="#06b6d4">24.5</text>
    <text x="927" y="396" text-anchor="middle" font-size="10" fill="#22c55e">11.4</text>

    <!-- 2025Q4: rev 32.83 → y=146 / op 19.17 → y=310 -->
    <rect x="985" y="146" width="40" height="394" fill="#06b6d4"/>
    <rect x="1027" y="310" width="40" height="230" fill="#22c55e"/>
    <text x="1026" y="555" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">25Q4</text>
    <text x="1005" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#06b6d4">32.8</text>
    <text x="1047" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#22c55e">19.2</text>
  </g>

  <!-- Legend -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13">
    <rect x="280" y="600" width="20" height="14" fill="#06b6d4"/>
    <text x="310" y="612" fill="#f1f5f9">매출액</text>
    <rect x="430" y="600" width="20" height="14" fill="#22c55e"/>
    <text x="460" y="612" fill="#f1f5f9">영업이익</text>
  </g>

  <!-- Conclusion box -->
  <rect x="180" y="640" width="840" height="60" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.4)"/>
  <text x="600" y="666" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#22c55e">
    1년 만에: 매출 19.8조 → 32.8조 (+66%) | 영업이익 8.1조 → 19.2조 (+137%) | 영업이익률 41% → 58%
  </text>
  <text x="600" y="688" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">
    영업이익 증가 속도가 매출 증가 속도의 2배 — 고정비 레버리지의 본보기
  </text>
</svg>
