<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="720" rx="16" fill="url(#bg4)"/>
  <rect x="0.5" y="0.5" width="1079" height="719" rx="16" stroke="#1e2433"/>

  <text x="540" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">ROIC vs WACC — 가치창출의 폭</text>
  <text x="540" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">2025년 dartlab `c.analysis("financial", "투자효율")["roicTimeline"]`</text>

  <!-- 두 막대: ROIC 37.99 / WACC 11.44 -->
  <!-- y axis: 0 ~ 45 -->
  <!-- 막대 영역 y 130~530 = 400 -->

  <line x1="160" y1="130" x2="160" y2="530" stroke="#1e2433"/>
  <line x1="160" y1="530" x2="980" y2="530" stroke="#1e2433"/>

  <g font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    <text x="152" y="134" text-anchor="end">45%</text>
    <text x="152" y="218" text-anchor="end">35%</text>
    <text x="152" y="306" text-anchor="end">25%</text>
    <text x="152" y="394" text-anchor="end">15%</text>
    <text x="152" y="482" text-anchor="end">5%</text>
    <text x="152" y="534" text-anchor="end">0</text>
  </g>

  <line x1="160" y1="218" x2="980" y2="218" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="160" y1="306" x2="980" y2="306" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="160" y1="394" x2="980" y2="394" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="160" y1="482" x2="980" y2="482" stroke="#1e2433" stroke-dasharray="2 4"/>

  <!-- ROIC 37.99 → y = 530 - (37.99/45)*400 = 192 -->
  <rect x="280" y="192" width="180" height="338" fill="#22c55e"/>
  <text x="370" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="44" font-weight="900" fill="#22c55e">37.99%</text>
  <text x="370" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">ROIC</text>
  <text x="370" y="582" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">투자자본 수익률</text>

  <!-- WACC 11.44 → y = 530 - (11.44/45)*400 = 428 -->
  <rect x="640" y="428" width="180" height="102" fill="#ec4899"/>
  <text x="730" y="416" text-anchor="middle" font-family="Inter, sans-serif" font-size="44" font-weight="900" fill="#ec4899">11.44%</text>
  <text x="730" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">WACC</text>
  <text x="730" y="582" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">자본비용</text>

  <!-- Spread label -->
  <line x1="460" y1="192" x2="640" y2="192" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="460" y1="428" x2="640" y2="428" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="550" y1="192" x2="550" y2="428" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="546,196 554,196 550,188" fill="#fbbf24"/>
  <polygon points="546,424 554,424 550,432" fill="#fbbf24"/>
  <text x="568" y="316" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#fbbf24">+26.55pp</text>
  <text x="568" y="338" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">spread (가치창출 폭)</text>

  <!-- Conclusion -->
  <rect x="120" y="620" width="840" height="80" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.4)"/>
  <text x="540" y="650" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">
    100원 투자 → 38원 수익 → 11원 자본비용 → 27원의 신규 가치
  </text>
  <text x="540" y="678" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">
    한국 제조업체에서 spread +27pp가 1년 이상 유지되는 회사는 손에 꼽음
  </text>
</svg>
