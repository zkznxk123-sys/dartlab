<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="720" rx="16" fill="url(#bg6)"/>
  <rect x="0.5" y="0.5" width="1079" height="719" rx="16" stroke="#1e2433"/>

  <text x="540" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">사이클 정점 vs 새 시대 — 4가지 결정 신호</text>
  <text x="540" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">매 분기 dartlab으로 검증 가능. 회귀 테스트로서의 블로그.</text>

  <!-- 4 cards in 2x2 grid -->
  <g font-family="Inter, sans-serif">
    <!-- Card 1: SK하이닉스 매출 -->
    <rect x="80" y="120" width="430" height="220" rx="12" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.4)" stroke-width="1.5"/>
    <text x="100" y="155" font-size="13" font-weight="700" fill="#06b6d4">① SK하이닉스 분기 매출</text>
    <text x="100" y="190" font-size="32" font-weight="800" fill="#f1f5f9">35조 vs 30조</text>
    <text x="100" y="215" font-size="11" fill="#94a3b8">2025Q4: 32.8조 (정점 후보)</text>
    <line x1="100" y1="232" x2="490" y2="232" stroke="#1e2433"/>
    <text x="100" y="258" font-size="12" fill="#22c55e">▲ 35조 이상 → bull 강화</text>
    <text x="100" y="278" font-size="12" fill="#ec4899">▼ 30조 이하 → base 우세</text>
    <text x="100" y="312" font-size="10" fill="#64748b">c.select("IS", ["매출액"])</text>

    <!-- Card 2: CAPEX 비율 -->
    <rect x="540" y="120" width="430" height="220" rx="12" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
    <text x="560" y="155" font-size="13" font-weight="700" fill="#22c55e">② CAPEX / 매출 비율</text>
    <text x="560" y="190" font-size="32" font-weight="800" fill="#f1f5f9">35% vs 25%</text>
    <text x="560" y="215" font-size="11" fill="#94a3b8">2025: 28% (다음 베팅 단계)</text>
    <line x1="560" y1="232" x2="950" y2="232" stroke="#1e2433"/>
    <text x="560" y="258" font-size="12" fill="#ec4899">▲ 35% 이상 → 베팅 과도</text>
    <text x="560" y="278" font-size="12" fill="#22c55e">▼ 25% 이하 → 정점 받아들임</text>
    <text x="560" y="312" font-size="10" fill="#64748b">c.analysis("자본배분")["reinvestment"]</text>

    <!-- Card 3: 삼성전자 마진 -->
    <rect x="80" y="370" width="430" height="220" rx="12" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
    <text x="100" y="405" font-size="13" font-weight="700" fill="#fbbf24">③ 삼성전자 메모리 영업이익률</text>
    <text x="100" y="440" font-size="32" font-weight="800" fill="#f1f5f9">30% 돌파?</text>
    <text x="100" y="465" font-size="11" fill="#94a3b8">2025Q4: 약 21% (HBM 추격 중)</text>
    <line x1="100" y1="482" x2="490" y2="482" stroke="#1e2433"/>
    <text x="100" y="508" font-size="12" fill="#ec4899">▲ 30% 돌파 → SK 점유율 위협</text>
    <text x="100" y="528" font-size="12" fill="#22c55e">▼ 21% 유지 → SK 독주 지속</text>
    <text x="100" y="562" font-size="10" fill="#64748b">Company("005930").analysis("수익성")</text>

    <!-- Card 4: NVIDIA 가이던스 -->
    <rect x="540" y="370" width="430" height="220" rx="12" fill="rgba(236,72,153,0.06)" stroke="rgba(236,72,153,0.4)" stroke-width="1.5"/>
    <text x="560" y="405" font-size="13" font-weight="700" fill="#ec4899">④ NVIDIA 데이터센터 매출 YoY</text>
    <text x="560" y="440" font-size="32" font-weight="800" fill="#f1f5f9">50% 미만?</text>
    <text x="560" y="465" font-size="11" fill="#94a3b8">2025: 90~150% YoY 유지 중</text>
    <line x1="560" y1="482" x2="950" y2="482" stroke="#1e2433"/>
    <text x="560" y="508" font-size="12" fill="#ec4899">▲ 50% 미만 → 첫 번째 경고</text>
    <text x="560" y="528" font-size="12" fill="#22c55e">▲ 80%+ → 사이클 연장</text>
    <text x="560" y="562" font-size="10" fill="#64748b">외부 (NVDA earnings)</text>
  </g>

  <!-- Bottom note -->
  <rect x="80" y="620" width="920" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="#1e2433"/>
  <text x="540" y="650" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">
    매 분기 한 번 4개 신호를 다시 확인 → 시나리오 확률 갱신
  </text>
  <text x="540" y="676" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">
    이 글은 2026 매 분기에 후속 글로 갱신될 예정. 사이클 정점 또는 다음 시대의 첫 데이터 포인트가 나오면.
  </text>
</svg>
