    <circle cx="430" cy="540" r="6" fill="#ec4899"/><text x="430" y="558" text-anchor="middle" fill="#ec4899" font-weight="700">결손기</text><text x="430" y="585" text-anchor="middle" fill="#ec4899">2019</text>
    <circle cx="530" cy="473" r="5" fill="#22c55e"/><text x="530" y="565" text-anchor="middle">2020</text>
    <circle cx="630" cy="456" r="5" fill="#22c55e"/><text x="630" y="565" text-anchor="middle">2021</text>
    <circle cx="730" cy="423" r="5" fill="#22c55e"/><text x="730" y="565" text-anchor="middle">2022</text>
    <circle cx="830" cy="364" r="5" fill="#22c55e"/><text x="830" y="565" text-anchor="middle">2023</text>
    <circle cx="930" cy="263" r="6" fill="#22c55e"/><text x="930" y="249" text-anchor="middle" font-weight="700" fill="#22c55e">3,300</text><text x="930" y="565" text-anchor="middle">2024</text>
    <circle cx="1080" cy="137" r="9" fill="#fbbf24" stroke="#fff" stroke-width="2"/><text x="1080" y="123" text-anchor="middle" font-size="13" font-weight="800" fill="#fbbf24">4,800원 🔥</text><text x="1080" y="565" text-anchor="middle" fill="#fbbf24" font-weight="700">2025</text>
  </g>

  <rect x="180" y="610" width="840" height="80" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.4)"/>
  <text x="600" y="640" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#fbbf24">9년 동안 32배 — 마진 폭발과 동시에 배당 폭발</text>
  <text x="600" y="664" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">DPS 9년 32배 — 영업이익률 폭발과 정확히 동시 진행</text>
  <text x="600" y="684" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">2025년 시가 기준 배당수익률 약 0.4% — 절대액은 32배지만 시가 대비 비율은 낮음</text>
