  <line x1="100" y1="208" x2="1140" y2="208" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="292" x2="1140" y2="292" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="376" x2="1140" y2="376" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="460" x2="1140" y2="460" stroke="#1e2433" stroke-dasharray="2 4"/>

  <!-- 150 / 250 / 400 / null / 800 / 1000 / 1400 / 2100 / 3300 / 4800
       y = 540 - (val/5000)*420
       150 → 527 / 250 → 519 / 400 → 506 / null skip / 800 → 473 / 1000 → 456 / 1400 → 423 / 2100 → 364 / 3300 → 263 / 4800 → 137 -->

  <path d="M 130,527 L 230,519 L 330,506 L 430,540 L 530,473 L 630,456 L 730,423 L 830,364 L 930,263 L 1080,137 L 1080,540 L 130,540 Z" fill="url(#dpsfade)"/>

  <polyline points="130,527 230,519 330,506" stroke="#22c55e" stroke-width="3" fill="none"/>
  <line x1="330" y1="506" x2="430" y2="540" stroke="#ec4899" stroke-width="3" stroke-dasharray="4 4"/>
  <polyline points="430,540 530,473 630,456 730,423 830,364 930,263 1080,137" stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 16px #22c55e);"/>

  <g font-family="Inter, sans-serif" fill="#94a3b8" font-size="11">
    <circle cx="130" cy="527" r="5" fill="#22c55e"/><text x="130" y="513" text-anchor="middle">150</text><text x="130" y="565" text-anchor="middle">2016</text>
