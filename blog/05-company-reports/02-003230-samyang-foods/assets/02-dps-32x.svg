  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">주당 배당금 9년 — 150원에서 4,800원 (32배)</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">DART 사업보고서 — 주당 현금배당금 9년 시계열</text>

  <line x1="100" y1="120" x2="100" y2="540" stroke="#1e2433"/>
  <line x1="100" y1="540" x2="1140" y2="540" stroke="#1e2433"/>
  <g font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    <text x="92" y="124" text-anchor="end">5,000원</text>
    <text x="92" y="208" text-anchor="end">4,000</text>
    <text x="92" y="292" text-anchor="end">3,000</text>
