<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg4)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">고정비 레버리지의 메커니즘 — 매출은 2.6배, 마진은 두 배</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">밀양 1공장 가동률 80%→100% / 라면 한 봉지 한계비용 ≈ 0</text>

  <!-- 좌측: 2022 (낮은 가동률) -->
  <g transform="translate(80,140)">
    <text x="240" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#94a3b8">2022 (가동률 80%)</text>

    <!-- 매출 박스 -->
    <rect x="40" y="60" width="400" height="60" fill="#475569" rx="6"/>
    <text x="240" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#fff">매출 9,100억</text>

    <!-- 비용 박스들 -->
    <rect x="40" y="140" width="280" height="40" fill="#94a3b8" rx="4"/>
    <text x="180" y="166" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#0a0e1a">원재료비 4,400억</text>

    <rect x="40" y="190" width="200" height="40" fill="#94a3b8" rx="4"/>
    <text x="140" y="216" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#0a0e1a">고정비 3,000억</text>

    <rect x="40" y="240" width="80" height="40" fill="#94a3b8" rx="4"/>
    <text x="80" y="266" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0e1a">기타</text>

    <!-- 영업이익 -->
    <rect x="40" y="300" width="80" height="40" fill="#fbbf24" rx="4"/>
    <text x="80" y="326" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0a0e1a">730억</text>
    <text x="240" y="326" font-family="Inter, sans-serif" font-size="14" fill="#fbbf24" font-weight="700">영업이익률 8.0%</text>
  </g>

  <!-- 우측: 2025 (가동률 100%, 매출 2.6배) -->
  <g transform="translate(680,140)">
    <text x="240" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#22c55e">2025 (가동률 100%)</text>

    <!-- 매출 박스 (훨씬 크게) -->
    <rect x="40" y="60" width="400" height="60" fill="#22c55e" rx="6" style="filter:drop-shadow(0 0 16px rgba(34,197,94,0.5))"/>
    <text x="240" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#fff">매출 2.35조 (2.6배)</text>

    <!-- 원재료비도 비례 증가 -->
    <rect x="40" y="140" width="280" height="40" fill="#94a3b8" rx="4"/>
    <text x="180" y="166" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#0a0e1a">원재료비 11,500억 (2.6배)</text>

    <!-- 고정비는 거의 그대로 -->
    <rect x="40" y="190" width="220" height="40" fill="#06b6d4" rx="4"/>
    <text x="150" y="216" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#0a0e1a" font-weight="700">고정비 4,500억 (1.5배만)</text>

    <rect x="40" y="240" width="80" height="40" fill="#94a3b8" rx="4"/>
    <text x="80" y="266" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0e1a">기타</text>

    <!-- 영업이익 (대폭 확대) -->
    <rect x="40" y="300" width="280" height="40" fill="#22c55e" rx="4" style="filter:drop-shadow(0 0 12px rgba(34,197,94,0.6))"/>
    <text x="180" y="326" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fff">영업이익 5,242억 (7.2배)</text>
    <text x="380" y="326" font-family="Inter, sans-serif" font-size="14" fill="#22c55e" font-weight="700">21.83%</text>
  </g>

  <!-- 화살표 -->
  <line x1="560" y1="240" x2="660" y2="240" stroke="#fbbf24" stroke-width="3"/>
  <polygon points="650,234 660,240 650,246" fill="#fbbf24"/>
  <text x="610" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">3년</text>

  <rect x="100" y="560" width="1000" height="130" rx="12" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.4)"/>
  <text x="600" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#06b6d4">왜 마진이 폭발했나 — 한 봉지 더 만드는 한계비용 ≈ 0</text>
  <text x="600" y="618" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">매출 +160% / 원재료비 +160% / 고정비 +50% / 영업이익 +618%</text>
  <text x="600" y="640" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">밀양 라인의 인건비·감가상각·임차료는 가동률 무관 — 매출이 늘수록 단위 고정비가 녹음</text>
  <text x="600" y="668" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">한 봉지 추가 생산 한계비용 ≈ 200원 (원재료) / 미국 판가 ≈ 1,500원 → 1,300원이 영업이익으로 직행</text>
</svg>
