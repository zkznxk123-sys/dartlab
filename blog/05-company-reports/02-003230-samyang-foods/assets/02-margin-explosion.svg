<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="explode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433" stroke-width="1"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">삼양식품 영업이익률 9년 — 라면 빅3 꼴등의 대반전</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">2016Q4 ~ 2025Q4 분기, dartlab `c.select("ratios", ["영업이익률"])`</text>

  <line x1="100" y1="130" x2="100" y2="560" stroke="#1e2433"/>
  <line x1="100" y1="560" x2="1140" y2="560" stroke="#1e2433"/>
  <g font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    <text x="92" y="134" text-anchor="end">25%</text>
    <text x="92" y="220" text-anchor="end">20%</text>
    <text x="92" y="306" text-anchor="end">15%</text>
    <text x="92" y="392" text-anchor="end">10%</text>
    <text x="92" y="478" text-anchor="end">5%</text>
    <text x="92" y="564" text-anchor="end">0</text>
  </g>
  <line x1="100" y1="220" x2="1140" y2="220" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="306" x2="1140" y2="306" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="392" x2="1140" y2="392" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="478" x2="1140" y2="478" stroke="#1e2433" stroke-dasharray="2 4"/>

  <!-- 9.34, 9.4, 10.41, 13.94, 10.47, 11.19, 8.0, 11.07, 18.31, 21.83
       y = 560 - (val/25)*430
       9.34 → 399 / 9.4 → 398 / 10.41 → 381 / 13.94 → 320 / 10.47 → 380
       11.19 → 368 / 8.0 → 423 / 11.07 → 370 / 18.31 → 245 / 21.83 → 184 -->

  <path d="M 100,399 L 215,398 L 330,381 L 445,320 L 560,380 L 675,368 L 790,423 L 905,370 L 1020,245 L 1140,184 L 1140,560 L 100,560 Z" fill="url(#explode)" opacity="0.6"/>

  <polyline points="100,399 215,398 330,381 445,320 560,380 675,368 790,423 905,370 1020,245 1140,184" stroke="#ec4899" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 16px #ec4899);"/>

  <g font-family="Inter, sans-serif" fill="#94a3b8" font-size="11">
    <circle cx="100" cy="399" r="5" fill="#94a3b8"/><text x="100" y="385" text-anchor="middle">9.34</text><text x="100" y="585" text-anchor="middle">2016</text>
    <circle cx="215" cy="398" r="5" fill="#94a3b8"/><text x="215" y="585" text-anchor="middle">2017</text>
    <circle cx="330" cy="381" r="5" fill="#94a3b8"/><text x="330" y="585" text-anchor="middle">2018</text>
    <circle cx="445" cy="320" r="5" fill="#94a3b8"/><text x="445" y="585" text-anchor="middle">2019</text>
    <circle cx="560" cy="380" r="5" fill="#94a3b8"/><text x="560" y="585" text-anchor="middle">2020</text>
    <circle cx="675" cy="368" r="5" fill="#94a3b8"/><text x="675" y="585" text-anchor="middle">2021</text>
    <circle cx="790" cy="423" r="5" fill="#94a3b8"/><text x="790" y="585" text-anchor="middle">2022</text>
    <circle cx="905" cy="370" r="5" fill="#94a3b8"/><text x="905" y="585" text-anchor="middle">2023</text>
    <circle cx="1020" cy="245" r="7" fill="#fbbf24" stroke="#fff" stroke-width="2"/><text x="1020" y="231" text-anchor="middle" font-weight="700" fill="#fbbf24">18.31</text><text x="1020" y="585" text-anchor="middle" fill="#fbbf24" font-weight="700">2024</text>
    <circle cx="1140" cy="184" r="9" fill="#22c55e" stroke="#fff" stroke-width="2"/><text x="1140" y="170" text-anchor="middle" font-size="13" font-weight="800" fill="#22c55e">21.83 🔥</text><text x="1140" y="585" text-anchor="middle" fill="#22c55e" font-weight="700">2025</text>
  </g>

  <!-- 점프 표시 -->
  <line x1="905" y1="370" x2="1020" y2="245" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="965" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">2024Q1 퀀텀 점프</text>

  <rect x="180" y="630" width="840" height="60" rx="10" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.4)"/>
  <text x="600" y="656" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#22c55e">8년간 8~14% 박스권 → 2024 미국 코스트코 입점 → 1년 만에 +10pp 폭발</text>
  <text x="600" y="678" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">2023Q4 11.07% → 2024Q1 20.77% (한 분기 만에 +10pp)</text>
</svg>
