<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">매출 4년 — 2022 9천억에서 2025 2.35조</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">연간 매출 (조원), dartlab `c.select("IS",["매출액"])` 분기 합산</text>

  <line x1="100" y1="120" x2="100" y2="540" stroke="#1e2433"/>
  <line x1="100" y1="540" x2="1100" y2="540" stroke="#1e2433"/>
  <g font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    <text x="92" y="124" text-anchor="end">2.5</text>
    <text x="92" y="208" text-anchor="end">2.0</text>
    <text x="92" y="292" text-anchor="end">1.5</text>
    <text x="92" y="376" text-anchor="end">1.0</text>
    <text x="92" y="460" text-anchor="end">0.5</text>
    <text x="92" y="544" text-anchor="end">0</text>
  </g>
  <line x1="100" y1="208" x2="1100" y2="208" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="292" x2="1100" y2="292" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="376" x2="1100" y2="376" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="460" x2="1100" y2="460" stroke="#1e2433" stroke-dasharray="2 4"/>

  <!-- 4 bars: 2022 0.91 / 2023 1.19 / 2024 1.73 / 2025 2.35
       y = 540 - (val/2.5)*420
       0.91 → 387 / 1.19 → 340 / 1.73 → 250 / 2.35 → 145 -->
  <rect x="180" y="387" width="180" height="153" fill="#475569"/>
  <text x="270" y="377" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#94a3b8">0.91조</text>
  <text x="270" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">2022</text>

  <rect x="410" y="340" width="180" height="200" fill="#06b6d4"/>
  <text x="500" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#06b6d4">1.19조</text>
  <text x="500" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">2023</text>
  <text x="500" y="385" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#22c55e">+30.8%</text>

  <rect x="640" y="250" width="180" height="290" fill="#fbbf24"/>
  <text x="730" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">1.73조</text>
  <text x="730" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#fbbf24" font-weight="700">2024</text>
  <text x="730" y="295" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#22c55e">+45.2%</text>

  <rect x="870" y="145" width="180" height="395" fill="#22c55e" stroke="#fff" stroke-width="2"/>
  <text x="960" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#22c55e">2.35조 🔥</text>
  <text x="960" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#22c55e" font-weight="700">2025</text>
  <text x="960" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fff">+35.9%</text>

  <rect x="180" y="610" width="840" height="80" rx="10" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.35)"/>
  <text x="600" y="638" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#22c55e">3년간 매출 2.6배 (0.91조 → 2.35조)</text>
  <text x="600" y="660" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">2024 미국 코스트코·월마트 입점 + TikTok 챌린지 → 글로벌 15개국 동시 폭발</text>
  <text x="600" y="680" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b">연평균 성장률 +37% — 식품 산업 전체 평균(약 +3%)의 12배</text>
</svg>
