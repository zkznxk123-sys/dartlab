<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="720" rx="16" fill="url(#bg5)"/>
  <rect x="0.5" y="0.5" width="1079" height="719" rx="16" stroke="#1e2433"/>

  <text x="540" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">밀양 2공장 베팅 — 4가지 결정 신호</text>
  <text x="540" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">매 분기 dartlab + 외부 데이터로 검증. 2026Q4 가 첫 분기점.</text>

  <g font-family="Inter, sans-serif">
    <rect x="80" y="120" width="430" height="220" rx="12" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.4)" stroke-width="1.5"/>
    <text x="100" y="155" font-size="13" font-weight="700" fill="#06b6d4">① 분기 매출</text>
    <text x="100" y="195" font-size="34" font-weight="800" fill="#f1f5f9">6,500억 vs 5,500억</text>
    <text x="100" y="220" font-size="11" fill="#94a3b8">2025Q4: 6,377억 (정점 후보)</text>
    <line x1="100" y1="237" x2="490" y2="237" stroke="#1e2433"/>
    <text x="100" y="263" font-size="12" fill="#22c55e">▲ 6,500억 이상 → bull 강화</text>
    <text x="100" y="283" font-size="12" fill="#ec4899">▼ 5,500억 이하 → 정점 신호</text>
    <text x="100" y="317" font-size="10" fill="#64748b">c.select("IS", ["매출액"])</text>

    <rect x="540" y="120" width="430" height="220" rx="12" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
    <text x="560" y="155" font-size="13" font-weight="700" fill="#22c55e">② 미국 매출 비중</text>
    <text x="560" y="195" font-size="34" font-weight="800" fill="#f1f5f9">40% 돌파?</text>
    <text x="560" y="220" font-size="11" fill="#94a3b8">2025: 약 28% (NVIDIA 27% 패턴 유사)</text>
    <line x1="560" y1="237" x2="950" y2="237" stroke="#1e2433"/>
    <text x="560" y="263" font-size="12" fill="#ec4899">▲ 40% 돌파 → 단일국가 의존 위험</text>
    <text x="560" y="283" font-size="12" fill="#22c55e">▼ 30% 미만 → 분산 진행 중</text>
    <text x="560" y="317" font-size="10" fill="#64748b">외부 (IR 보도)</text>

    <rect x="80" y="370" width="430" height="220" rx="12" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
    <text x="100" y="405" font-size="13" font-weight="700" fill="#fbbf24">③ 밀양 2공장 가동률 (2026Q4)</text>
    <text x="100" y="445" font-size="34" font-weight="800" fill="#f1f5f9">80% 돌파?</text>
    <text x="100" y="470" font-size="11" fill="#94a3b8">착공 2024 / 가동 2026 예정 / 3,000억 투자</text>
    <line x1="100" y1="487" x2="490" y2="487" stroke="#1e2433"/>
    <text x="100" y="513" font-size="12" fill="#22c55e">▲ 80% 돌파 → 베팅 성공</text>
    <text x="100" y="533" font-size="12" fill="#ec4899">▼ 50% 이하 → 감가상각 부담</text>
    <text x="100" y="567" font-size="10" fill="#64748b">c.notes.tangibleAsset (CAPEX 추적)</text>

    <rect x="540" y="370" width="430" height="220" rx="12" fill="rgba(236,72,153,0.06)" stroke="rgba(236,72,153,0.4)" stroke-width="1.5"/>
    <text x="560" y="405" font-size="13" font-weight="700" fill="#ec4899">④ TikTok "buldak" 검색량</text>
    <text x="560" y="445" font-size="34" font-weight="800" fill="#f1f5f9">YoY -30%?</text>
    <text x="560" y="470" font-size="11" fill="#94a3b8">2024 폭발 → 2025 유지 → 2026 ?</text>
    <line x1="560" y1="487" x2="950" y2="487" stroke="#1e2433"/>
    <text x="560" y="513" font-size="12" fill="#ec4899">▲ -30% 이하 → 첫 경고</text>
    <text x="560" y="533" font-size="12" fill="#22c55e">▲ +20%↑ → 사이클 연장</text>
    <text x="560" y="567" font-size="10" fill="#64748b">외부 (Google Trends)</text>
  </g>

  <rect x="80" y="620" width="920" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="#1e2433"/>
  <text x="540" y="650" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">
    ① + ③ 은 dartlab 으로 자동 검증 / ② + ④ 는 외부 데이터 필요
  </text>
  <text x="540" y="676" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">
    매 분기 한 번 4개 신호 다시 확인 → 베팅 성공/실패 시나리오 확률 갱신
  </text>
</svg>
