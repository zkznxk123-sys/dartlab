<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360">
  <rect width="1200" height="360" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">체코 두코바니 5.6조 — 다이어트가 끝났다는 외부 인증</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">한국 원자력 역사상 최대 단일 수주 (2025.12.16)</text>

  <!-- Timeline -->
  <line x1="100" y1="160" x2="1100" y2="160" stroke="#334155" stroke-width="2"/>

  <!-- 2020: 위기 -->
  <circle cx="200" cy="160" r="8" fill="#ef4444"/>
  <text x="200" y="140" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2020.04</text>
  <text x="200" y="190" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">산업은행 1조 긴급투입</text>
  <text x="200" y="208" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">부채비율 305%</text>

  <!-- 2022: 사명변경 -->
  <circle cx="440" cy="160" r="6" fill="#f59e0b"/>
  <text x="440" y="140" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2022</text>
  <text x="440" y="190" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">두산에너빌리티 사명변경</text>
  <text x="440" y="208" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">그룹 자산 3조 매각 완료</text>

  <!-- 2024: ICR 회복 -->
  <circle cx="680" cy="160" r="6" fill="#22c55e"/>
  <text x="680" y="140" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2024</text>
  <text x="680" y="190" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">부채비율 140% · ICR 2.8x</text>
  <text x="680" y="208" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">이자 부담 정상화</text>

  <!-- 2025.12: 체코 -->
  <circle cx="980" cy="160" r="12" fill="#fbbf24"/>
  <text x="980" y="132" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">2025.12.16</text>
  <text x="980" y="190" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">체코 두코바니 5·6호기</text>
  <text x="980" y="210" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">5.6조원</text>
  <text x="980" y="230" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">주기기 공급 · 한국 원전 최대 수주</text>

  <!-- Bottom -->
  <rect x="100" y="270" width="1000" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="350" y="296" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">부채비율</text>
  <text x="350" y="318" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">305% → 129%</text>
  <text x="600" y="296" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매각 규모</text>
  <text x="600" y="318" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">3조+ (그룹 절반)</text>
  <text x="850" y="296" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">소요 기간</text>
  <text x="850" y="318" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">5년 8개월</text>
</svg>