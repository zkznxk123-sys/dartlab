<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="diet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">9년 다이어트 — 부채비율 305% → 129%</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">2018Q4 (정점) → 2025Q4, dartlab `c.select("ratios",["부채비율"])`</text>

  <line x1="100" y1="120" x2="100" y2="540" stroke="#1e2433"/>
  <line x1="100" y1="540" x2="1140" y2="540" stroke="#1e2433"/>
  <g font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    <text x="92" y="124" text-anchor="end">350%</text>
    <text x="92" y="208" text-anchor="end">280%</text>
    <text x="92" y="292" text-anchor="end">210%</text>
    <text x="92" y="376" text-anchor="end">140%</text>
    <text x="92" y="460" text-anchor="end">70%</text>
    <text x="92" y="544" text-anchor="end">0</text>
  </g>
  <line x1="100" y1="208" x2="1140" y2="208" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="292" x2="1140" y2="292" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="376" x2="1140" y2="376" stroke="#1e2433" stroke-dasharray="2 4"/>
  <line x1="100" y1="460" x2="1140" y2="460" stroke="#1e2433" stroke-dasharray="2 4"/>

  <!-- 264, 285, 305, 314, 260, 169, 129, 127, 126, 129
       y = 540 - val/350 * 420
       264 → 223 / 285 → 198 / 305 → 174 / 314 → 163 / 260 → 228
       169 → 337 / 129 → 385 / 127 → 388 / 126 → 389 / 129 → 385 -->

  <path d="M 100,223 L 215,198 L 330,174 L 445,163 L 560,228 L 675,337 L 790,385 L 905,388 L 1020,389 L 1140,385 L 1140,540 L 100,540 Z" fill="url(#diet)"/>

  <polyline points="100,223 215,198 330,174 445,163 560,228 675,337 790,385 905,388 1020,389 1140,385" stroke="#06b6d4" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 16px #06b6d4);"/>

  <g font-family="Inter, sans-serif" fill="#94a3b8" font-size="11">
    <circle cx="100" cy="223" r="5" fill="#06b6d4"/><text x="100" y="585" text-anchor="middle">2016</text>
    <circle cx="215" cy="198" r="5" fill="#06b6d4"/><text x="215" y="585" text-anchor="middle">2017</text>
    <circle cx="330" cy="174" r="6" fill="#ec4899" stroke="#fff" stroke-width="2"/><text x="330" y="160" text-anchor="middle" font-weight="700" fill="#ec4899">305%</text><text x="330" y="585" text-anchor="middle" fill="#ec4899" font-weight="700">2018 정점</text>
    <circle cx="445" cy="163" r="6" fill="#ec4899"/><text x="445" y="149" text-anchor="middle" fill="#ec4899">314%</text><text x="445" y="585" text-anchor="middle">2019</text>
    <circle cx="560" cy="228" r="5" fill="#fbbf24"/><text x="560" y="585" text-anchor="middle" fill="#fbbf24">2020 ⚡</text>
    <circle cx="675" cy="337" r="5" fill="#06b6d4"/><text x="675" y="585" text-anchor="middle">2021</text>
    <circle cx="790" cy="385" r="5" fill="#06b6d4"/><text x="790" y="585" text-anchor="middle">2022</text>
    <circle cx="905" cy="388" r="5" fill="#06b6d4"/><text x="905" y="585" text-anchor="middle">2023</text>
    <circle cx="1020" cy="389" r="5" fill="#06b6d4"/><text x="1020" y="585" text-anchor="middle">2024</text>
    <circle cx="1140" cy="385" r="9" fill="#22c55e" stroke="#fff" stroke-width="2"/><text x="1140" y="371" text-anchor="middle" font-size="13" font-weight="800" fill="#22c55e">129%</text><text x="1140" y="585" text-anchor="middle" fill="#22c55e" font-weight="700">2025</text>
  </g>

  <!-- annotation: 2020 채권단 -->
  <line x1="560" y1="240" x2="560" y2="280" stroke="#fbbf24" stroke-width="2"/>
  <text x="560" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fbbf24">2020 채권단 1조 긴급</text>

  <rect x="180" y="620" width="840" height="80" rx="10" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.4)"/>
  <text x="600" y="650" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#22c55e">9년 동안 -176%포인트 — 영업으로 번 돈 거의 다 빚 갚는 데 썼다</text>
  <text x="600" y="674" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">금융부채 5.1조 → 3.4조 (-1.7조) / 부채총액 18.7조 → 15.5조 (-3.2조)</text>
  <text x="600" y="694" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">매각 자산: 두산솔루스 6,986억 + 두산모트롤 4,530억 + 두산타워 8,000억 + 두산인프라코어 8,500억 + 클럽모우CC 1,850억</text>
</svg>
