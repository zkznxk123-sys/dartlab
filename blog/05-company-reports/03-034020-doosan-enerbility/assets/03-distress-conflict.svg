<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="720" rx="16" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="1079" height="719" rx="16" stroke="#1e2433"/>

  <text x="540" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">4 부실지표 충돌 — 정확히 전환점에 있는 회사</text>
  <text x="540" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">dartlab `c.analysis("자금조달")["distressIndicators"]`</text>

  <g font-family="Inter, sans-serif">
    <!-- 좌상: Altman Z (부실) -->
    <rect x="80" y="120" width="430" height="220" rx="14" fill="rgba(236,72,153,0.08)" stroke="rgba(236,72,153,0.6)" stroke-width="2"/>
    <text x="295" y="155" text-anchor="middle" font-size="14" font-weight="800" fill="#ec4899">⚠ Altman Z (과거 5년 가중)</text>
    <text x="295" y="220" text-anchor="middle" font-size="80" font-weight="900" fill="#ec4899">1.10</text>
    <text x="295" y="260" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">부실 위험</text>
    <text x="295" y="290" text-anchor="middle" font-size="11" fill="#94a3b8">기준: 1.81 미만 = 부실</text>
    <text x="295" y="318" text-anchor="middle" font-size="10" fill="#64748b">9년 적자의 과거를 본다</text>

    <!-- 우상: Springate (부실) -->
    <rect x="540" y="120" width="430" height="220" rx="14" fill="rgba(236,72,153,0.08)" stroke="rgba(236,72,153,0.6)" stroke-width="2"/>
    <text x="755" y="155" text-anchor="middle" font-size="14" font-weight="800" fill="#ec4899">⚠ Springate S (과거 사이클)</text>
    <text x="755" y="220" text-anchor="middle" font-size="80" font-weight="900" fill="#ec4899">0.38</text>
    <text x="755" y="260" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">부실 위험</text>
    <text x="755" y="290" text-anchor="middle" font-size="11" fill="#94a3b8">기준: 0.862 미만 = 부실</text>
    <text x="755" y="318" text-anchor="middle" font-size="10" fill="#64748b">변동성 큰 사이클을 본다</text>

    <!-- 좌하: Piotroski F (안전) -->
    <rect x="80" y="370" width="430" height="220" rx="14" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.6)" stroke-width="2"/>
    <text x="295" y="405" text-anchor="middle" font-size="14" font-weight="800" fill="#22c55e">✓ Piotroski F (모멘텀)</text>
    <text x="295" y="475" text-anchor="middle" font-size="80" font-weight="900" fill="#22c55e">7/9</text>
    <text x="295" y="515" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">재무 건전</text>
    <text x="295" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">기준: 7+ = 건전</text>
    <text x="295" y="568" text-anchor="middle" font-size="10" fill="#64748b">최근 분기 흑전·부채감축 잡음</text>

    <!-- 우하: Ohlson (안전) -->
    <rect x="540" y="370" width="430" height="220" rx="14" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.6)" stroke-width="2"/>
    <text x="755" y="405" text-anchor="middle" font-size="14" font-weight="800" fill="#22c55e">✓ Ohlson O (모멘텀)</text>
    <text x="755" y="475" text-anchor="middle" font-size="80" font-weight="900" fill="#22c55e">0.5%</text>
    <text x="755" y="515" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">부실확률 안전</text>
    <text x="755" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">기준: &lt; 5% = 안전</text>
    <text x="755" y="568" text-anchor="middle" font-size="10" fill="#64748b">최근 분기 시장가 잡음</text>
  </g>

  <rect x="80" y="620" width="920" height="80" rx="10" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.5)"/>
  <text x="540" y="650" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#fbbf24">정확히 전환점 — 과거는 부실, 현재는 회복</text>
  <text x="540" y="674" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">두 가지 시간 단위로 같은 회사를 보면 두 가지 답이 나온다</text>
  <text x="540" y="694" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">결정적 한 줄: 2026년에도 198억 이상 배당이 유지되는가 → 흑전 영구화 신호</text>
</svg>
