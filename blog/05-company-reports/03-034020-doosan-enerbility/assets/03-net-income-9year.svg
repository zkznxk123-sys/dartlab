<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">두산에너빌리티 — 9년 적자 → 2025Q4 첫 흑전 +525억</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b">분기 (지배주주) 순이익 (억원), `c.select("IS",["당기순이익"])`</text>

  <line x1="100" y1="120" x2="100" y2="540" stroke="#1e2433"/>
  <line x1="100" y1="540" x2="1140" y2="540" stroke="#1e2433"/>

  <!-- 0 line -->
  <line x1="100" y1="380" x2="1140" y2="380" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="92" y="384" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#64748b">0</text>

  <g font-family="Inter, sans-serif" font-size="11" fill="#64748b">
    <text x="92" y="124" text-anchor="end">+1,000</text>
    <text x="92" y="252" text-anchor="end">+500</text>
    <text x="92" y="508" text-anchor="end">-500</text>
    <text x="92" y="555" text-anchor="end">-650</text>
  </g>

  <!-- 9 years quarterly net income (조원→억원, 단위: 100억)
       2016 -5103 / 2017 -1993 / 2018 -5514 / 2019 -2883 / 2020 +1031 / 2021 +540
       2022 -4841 / 2023 -363 / 2024 -606 / 2025 +525
       y range: -650 ~ +1000 (1650), middle 0 = 380
       y = 380 - val/1650 * 510 (최대) → simplify
       기준: +1000 → 124 / -650 → 555
       formula: 124 + (1000 - val) / 1650 * 431 -->

  <!-- bars -->
  <g>
    <!-- 2016 -510 → y=380, h = 510/1650 * 431 / 0 → above baseline -->
    <!-- 그냥 bar로 -510~+105 사이 매핑 (val/650 * 175 max bar) -->
    <!-- y_top = 380 - max(val,0)*0.18  / y_bottom = 380 + max(-val,0)*0.18 -->
  </g>

  <!-- annotation -->
  <g font-family="Inter, sans-serif">
    <!-- 2016: -5103 -->
    <rect x="135" y="380" width="80" height="135" fill="#ec4899"/>
    <text x="175" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">2016</text>
    <text x="175" y="370" text-anchor="middle" font-size="9" fill="#ec4899">-5,103</text>

    <rect x="235" y="380" width="80" height="55" fill="#ec4899"/>
    <text x="275" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">2017</text>
    <text x="275" y="370" text-anchor="middle" font-size="9" fill="#ec4899">-1,993</text>

    <rect x="335" y="380" width="80" height="145" fill="#ec4899"/>
    <text x="375" y="535" text-anchor="middle" font-size="10" fill="#94a3b8">2018</text>
    <text x="375" y="370" text-anchor="middle" font-size="9" fill="#ec4899">-5,514</text>

    <rect x="435" y="380" width="80" height="80" fill="#ec4899"/>
    <text x="475" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">2019</text>
    <text x="475" y="370" text-anchor="middle" font-size="9" fill="#ec4899">-2,883</text>

    <!-- 2020: +1031 → 흑자 -->
    <rect x="535" y="305" width="80" height="75" fill="#22c55e"/>
    <text x="575" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">2020</text>
    <text x="575" y="297" text-anchor="middle" font-size="9" fill="#22c55e">+1,031</text>

    <rect x="635" y="340" width="80" height="40" fill="#22c55e"/>
    <text x="675" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">2021</text>
    <text x="675" y="332" text-anchor="middle" font-size="9" fill="#22c55e">+540</text>

    <!-- 2022: -4841 -->
    <rect x="735" y="380" width="80" height="130" fill="#ec4899"/>
    <text x="775" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">2022</text>
    <text x="775" y="370" text-anchor="middle" font-size="9" fill="#ec4899">-4,841</text>

    <rect x="835" y="380" width="80" height="15" fill="#ec4899"/>
    <text x="875" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">2023</text>
    <text x="875" y="370" text-anchor="middle" font-size="9" fill="#ec4899">-363</text>

    <rect x="935" y="380" width="80" height="20" fill="#ec4899"/>
    <text x="975" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">2024</text>
    <text x="975" y="370" text-anchor="middle" font-size="9" fill="#ec4899">-606</text>

    <!-- 2025: +525 첫 흑전 -->
    <rect x="1035" y="340" width="80" height="40" fill="#22c55e" stroke="#fff" stroke-width="3"/>
    <text x="1075" y="530" text-anchor="middle" font-size="11" font-weight="800" fill="#22c55e">2025</text>
    <text x="1075" y="328" text-anchor="middle" font-size="13" font-weight="800" fill="#22c55e">+525 ✨</text>
  </g>

  <!-- 2020 흑자 vs 2025 흑자 차이 표시 -->
  <text x="575" y="595" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">일회성 흑자</text>
  <text x="1075" y="595" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#22c55e">9년 다이어트의 첫 진짜 흑자</text>

  <rect x="180" y="620" width="840" height="80" rx="10" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.4)"/>
  <text x="600" y="650" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#22c55e">9년 적자의 진짜 적은 영업이 아니라 이자비용이었다</text>
  <text x="600" y="674" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">영업이익은 9년 모두 양수 / 누적 영업외 손실 ≈ 4조원 (매출 1년치)</text>
  <text x="600" y="694" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">2025년 흑전 + 첫 배당 198억 = 9년 다이어트의 진짜 마지막 증거</text>
</svg>
