<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>9년 누적 영업손실 회수 폭포 차트</title>
  <desc>2016~2024 누적 영업손실을 2025 한 해 영업이익이 모두 회수하는 폭포</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">9년 누적 적자, 2025년 한 해에 회수</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">2016~2023 누적 -776억 → 2024 +254억 → 2025 +1,069억</text>

  <!-- Bars: 2016~2025, base y=460, scale 1억=0.4px -->
  <!-- 누적: -54, -112, -189, -212, -211, -339, -633, -730, -476, +593 -->
  <!-- 일단 막대로 단년 -->
  <!-- 단순 폭포: 9년 누적 -776억 → 2024 +254 → 2025 +1069 → 결과 +547 -->

  <g>
    <!-- 9년 누적 -->
    <rect x="120" y="460" width="200" height="230" rx="8" fill="#ef444444" stroke="#ef4444" stroke-width="3"/>
    <text x="220" y="500" fill="#94a3b8" font-size="14" text-anchor="middle">2016~2023</text>
    <text x="220" y="525" fill="#94a3b8" font-size="14" text-anchor="middle">9년 누적 영업이익</text>
    <text x="220" y="600" fill="#ef4444" font-size="42" font-weight="900" text-anchor="middle">-776억</text>
    <text x="220" y="640" fill="#94a3b8" font-size="13" text-anchor="middle">8년 적자, 1년 BEP</text>

    <!-- 화살표 → -->
    <text x="380" y="580" fill="#fbbf24" font-size="48" font-weight="900" text-anchor="middle">+</text>

    <!-- 2024 -->
    <rect x="430" y="403" width="200" height="60" rx="8" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
    <text x="530" y="427" fill="#94a3b8" font-size="13" text-anchor="middle">2024</text>
    <text x="530" y="452" fill="#22c55e" font-size="22" font-weight="900" text-anchor="middle">+254억</text>

    <!-- 화살표 → -->
    <text x="690" y="580" fill="#fbbf24" font-size="48" font-weight="900" text-anchor="middle">+</text>

    <!-- 2025 -->
    <rect x="740" y="170" width="200" height="290" rx="8" fill="#22c55e44" stroke="#22c55e" stroke-width="3" style="filter: drop-shadow(0 0 24px #22c55e88)"/>
    <text x="840" y="200" fill="#94a3b8" font-size="14" text-anchor="middle">2025</text>
    <text x="840" y="320" fill="#22c55e" font-size="56" font-weight="900" text-anchor="middle">+1,069억</text>
    <text x="840" y="350" fill="#94a3b8" font-size="13" text-anchor="middle">한 해에</text>

    <!-- 화살표 = -->
    <text x="1000" y="580" fill="#fbbf24" font-size="48" font-weight="900" text-anchor="middle">=</text>

    <!-- 결과 -->
    <rect x="1050" y="313" width="120" height="150" rx="8" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
    <text x="1110" y="345" fill="#94a3b8" font-size="13" text-anchor="middle">10년</text>
    <text x="1110" y="367" fill="#94a3b8" font-size="13" text-anchor="middle">총합</text>
    <text x="1110" y="425" fill="#22c55e" font-size="32" font-weight="900" text-anchor="middle">+547</text>
    <text x="1110" y="450" fill="#94a3b8" font-size="11" text-anchor="middle">억</text>
  </g>

  <!-- Bottom note -->
  <text x="600" y="685" fill="#94a3b8" font-size="14" text-anchor="middle" font-style="italic">"9년의 적자가 2025년 한 해의 흑자보다 작다"</text>
</svg>
