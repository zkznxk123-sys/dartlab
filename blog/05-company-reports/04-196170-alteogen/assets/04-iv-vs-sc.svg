<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>키트루다 IV vs SC — 1시간 정맥주사가 5분 피하주사로</title>
  <desc>알테오젠 ALT-B4가 가능하게 만든 정맥주사 → 피하주사 전환의 메커니즘</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">키트루다 IV vs SC — 알테오젠 ALT-B4가 만든 차이</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">정맥주사 1시간 → 피하주사 5분. 환자 편의 + 머크 특허 연장</text>

  <!-- IV column -->
  <g>
    <rect x="80" y="140" width="500" height="500" rx="20" fill="#1e2433" stroke="#475569" stroke-width="2"/>
    <text x="330" y="190" fill="#f1f5f9" font-size="28" font-weight="800" text-anchor="middle">IV (정맥주사)</text>
    <text x="330" y="220" fill="#94a3b8" font-size="14" text-anchor="middle">기존 키트루다</text>

    <!-- IV bag illustration -->
    <rect x="280" y="260" width="100" height="120" rx="6" fill="#22d3ee44" stroke="#22d3ee" stroke-width="2"/>
    <text x="330" y="328" fill="#f1f5f9" font-size="14" text-anchor="middle" font-weight="700">100mg/4mL</text>

    <line x1="330" y1="380" x2="330" y2="440" stroke="#22d3ee" stroke-width="3"/>
    <circle cx="330" cy="445" r="8" fill="#22d3ee"/>

    <!-- specs -->
    <g font-size="16" fill="#cbd5e1">
      <text x="120" y="490">⏱  소요 시간</text>
      <text x="540" y="490" text-anchor="end" font-weight="700">약 30분 ~ 1시간</text>

      <text x="120" y="525">🏥  장소</text>
      <text x="540" y="525" text-anchor="end" font-weight="700">병원 외래 내방</text>

      <text x="120" y="560">👩‍⚕️  필요 인력</text>
      <text x="540" y="560" text-anchor="end" font-weight="700">간호사 + IV 라인</text>

      <text x="120" y="595">😣  환자 부담</text>
      <text x="540" y="595" text-anchor="end" font-weight="700">반복 외래 부담 ↑</text>
    </g>
  </g>

  <!-- Arrow -->
  <g>
    <text x="610" y="395" fill="#fbbf24" font-size="48" font-weight="900" text-anchor="middle">→</text>
    <text x="610" y="440" fill="#fbbf24" font-size="14" text-anchor="middle" font-weight="700">ALT-B4</text>
    <text x="610" y="458" fill="#94a3b8" font-size="12" text-anchor="middle">(인간 히알루로니다제)</text>
  </g>

  <!-- SC column -->
  <g>
    <rect x="660" y="140" width="500" height="500" rx="20" fill="#22c55e22" stroke="#22c55e" stroke-width="3" style="filter: drop-shadow(0 0 24px #22c55e44)"/>
    <text x="910" y="190" fill="#22c55e" font-size="28" font-weight="800" text-anchor="middle">SC (피하주사)</text>
    <text x="910" y="220" fill="#94a3b8" font-size="14" text-anchor="middle">키트루다 SC (2025~)</text>

    <!-- syringe -->
    <rect x="850" y="270" width="120" height="40" rx="6" fill="#22c55e44" stroke="#22c55e" stroke-width="2"/>
    <line x1="970" y1="290" x2="1010" y2="290" stroke="#22c55e" stroke-width="4"/>
    <text x="910" y="330" fill="#f1f5f9" font-size="14" text-anchor="middle" font-weight="700">SC 주사기</text>

    <!-- arrow inside arm-->
    <line x1="910" y1="345" x2="910" y2="380" stroke="#22c55e" stroke-width="3"/>

    <g font-size="16" fill="#cbd5e1">
      <text x="700" y="490">⏱  소요 시간</text>
      <text x="1120" y="490" text-anchor="end" font-weight="700" fill="#22c55e">약 5분</text>

      <text x="700" y="525">🏥  장소</text>
      <text x="1120" y="525" text-anchor="end" font-weight="700" fill="#22c55e">짧은 외래 / 자가 가능성</text>

      <text x="700" y="560">👩‍⚕️  필요 인력</text>
      <text x="1120" y="560" text-anchor="end" font-weight="700" fill="#22c55e">최소화</text>

      <text x="700" y="595">😣  환자 부담</text>
      <text x="1120" y="595" text-anchor="end" font-weight="700" fill="#22c55e">대폭 감소</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="600" y="685" fill="#94a3b8" font-size="14" text-anchor="middle">머크 입장: 환자 편의 + 특허 연장 + 경쟁 바이오시밀러 방어 → 키트루다 SC가 핵심 전략</text>
</svg>
