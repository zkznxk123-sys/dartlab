<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>알테오젠 마진 분해 — 매출총이익률 76.7% / 영업이익률 49.5%</title>
  <desc>2025 1년치 마진 폭포 분해. 매출 100에서 시작해서 영업이익 49.5까지.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">2025년 마진 분해 — 매출 100원이 영업이익 49원 50전</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">매출원가 23%, 판관비 27% — 한국 회사에서 거의 본 적 없는 비용 구조</text>

  <!-- Waterfall bars -->
  <!-- Base y=520, scale 100%=400px -->
  <g>
    <!-- 매출 100% -->
    <rect x="100" y="120" width="140" height="400" rx="6" fill="#22d3ee"/>
    <text x="170" y="115" fill="#22d3ee" font-size="22" font-weight="900" text-anchor="middle">100%</text>
    <text x="170" y="545" fill="#cbd5e1" font-size="14" text-anchor="middle">매출</text>
    <text x="170" y="565" fill="#94a3b8" font-size="12" text-anchor="middle">2,159억</text>

    <!-- 매출원가 -23.27% -->
    <rect x="280" y="120" width="140" height="93" rx="6" fill="#ef4444"/>
    <text x="350" y="115" fill="#ef4444" font-size="20" font-weight="900" text-anchor="middle">-23.27%</text>
    <text x="350" y="545" fill="#cbd5e1" font-size="14" text-anchor="middle">매출원가</text>
    <text x="350" y="565" fill="#94a3b8" font-size="12" text-anchor="middle">-502억</text>

    <!-- 매출총이익 76.73% -->
    <rect x="460" y="213" width="140" height="307" rx="6" fill="#22c55e44" stroke="#22c55e" stroke-width="3"/>
    <text x="530" y="208" fill="#22c55e" font-size="22" font-weight="900" text-anchor="middle">76.73%</text>
    <text x="530" y="545" fill="#cbd5e1" font-size="14" text-anchor="middle">매출총이익</text>
    <text x="530" y="565" fill="#94a3b8" font-size="12" text-anchor="middle">+1,656억</text>

    <!-- 판관비 -27.21% -->
    <rect x="640" y="213" width="140" height="109" rx="6" fill="#ef4444"/>
    <text x="710" y="208" fill="#ef4444" font-size="20" font-weight="900" text-anchor="middle">-27.21%</text>
    <text x="710" y="545" fill="#cbd5e1" font-size="14" text-anchor="middle">판관비 (R&amp;D 포함)</text>
    <text x="710" y="565" fill="#94a3b8" font-size="12" text-anchor="middle">-587억</text>

    <!-- 영업이익 49.52% -->
    <rect x="820" y="322" width="140" height="198" rx="6" fill="#22c55e88" stroke="#22c55e" stroke-width="3" style="filter: drop-shadow(0 0 18px #22c55e88)"/>
    <text x="890" y="317" fill="#22c55e" font-size="24" font-weight="900" text-anchor="middle">49.52%</text>
    <text x="890" y="545" fill="#cbd5e1" font-size="14" text-anchor="middle">영업이익</text>
    <text x="890" y="565" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">+1,069억</text>

    <!-- 순이익 67.25% -->
    <rect x="1000" y="251" width="140" height="269" rx="6" fill="#fbbf2466" stroke="#fbbf24" stroke-width="2"/>
    <text x="1070" y="246" fill="#fbbf24" font-size="22" font-weight="900" text-anchor="middle">67.25%</text>
    <text x="1070" y="545" fill="#cbd5e1" font-size="14" text-anchor="middle">순이익</text>
    <text x="1070" y="565" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">+1,452억</text>
  </g>

  <!-- Reference annotations -->
  <g>
    <line x1="100" y1="600" x2="1140" y2="600" stroke="#1e2433" stroke-width="1"/>
    <text x="100" y="640" fill="#94a3b8" font-size="14">📌 영업이익률 49.52%는 한국 상장사 중 상위 1% 수준 — 같은 marginDriver 분류를 받은 회사는 SK하이닉스 등 손에 꼽힌다</text>
    <text x="100" y="668" fill="#94a3b8" font-size="14">📌 순이익률 67.25%가 영업이익률보다 큰 이유: 금융수익(현금성자산 4,300억) + 법인세율 10.8% (연구개발 세제혜택)</text>
  </g>
</svg>
