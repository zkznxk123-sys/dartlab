<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>머크 계약 구조 — 1,600만 달러에서 10억 달러까지</title>
  <desc>2020 1차 계약과 2024 갱신 후 마일스톤 + 로열티 누적 구조</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">머크 라이선스 구조 — 4가지 수익 단</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">계약금 → 갱신금 → 마일스톤 → 로열티 (2043년 특허 만료까지)</text>

  <!-- 4 stacked tiers -->
  <g>
    <!-- Tier 1: 2020 계약금 -->
    <rect x="120" y="160" width="960" height="80" rx="12" fill="#1e2433" stroke="#94a3b8" stroke-width="2"/>
    <text x="160" y="200" fill="#94a3b8" font-size="18" font-weight="700">2020년 6월</text>
    <text x="160" y="222" fill="#cbd5e1" font-size="14">1차 계약 체결 (비독점)</text>
    <text x="1040" y="210" fill="#94a3b8" font-size="32" font-weight="900" text-anchor="end">+1,600만 $</text>

    <!-- Tier 2: 2024 갱신금 -->
    <rect x="120" y="260" width="960" height="80" rx="12" fill="#fbbf2422" stroke="#fbbf24" stroke-width="2"/>
    <text x="160" y="300" fill="#fbbf24" font-size="18" font-weight="700">2024년 2월</text>
    <text x="160" y="322" fill="#cbd5e1" font-size="14">갱신 (exclusive 전환) — 추가 계약금</text>
    <text x="1040" y="310" fill="#fbbf24" font-size="32" font-weight="900" text-anchor="end">+2,000만 $</text>

    <!-- Tier 3: 마일스톤 -->
    <rect x="120" y="360" width="960" height="120" rx="12" fill="#22d3ee22" stroke="#22d3ee" stroke-width="2"/>
    <text x="160" y="400" fill="#22d3ee" font-size="18" font-weight="700">마일스톤 (총액)</text>
    <text x="160" y="422" fill="#cbd5e1" font-size="14">키트루다 품목허가 + 특허 연장 + 누적 매출 단계마다 지급</text>
    <text x="160" y="460" fill="#94a3b8" font-size="13">  · 2024 갱신: 4억 3,200만 달러</text>
    <text x="1040" y="410" fill="#22d3ee" font-size="32" font-weight="900" text-anchor="end">총 10억 $</text>
    <text x="1040" y="440" fill="#94a3b8" font-size="14" text-anchor="end">≈ 1조 4,770억원</text>

    <!-- Tier 4: 로열티 -->
    <rect x="120" y="500" width="960" height="120" rx="12" fill="#22c55e22" stroke="#22c55e" stroke-width="3" style="filter: drop-shadow(0 0 18px #22c55e44)"/>
    <text x="160" y="540" fill="#22c55e" font-size="18" font-weight="700">로열티 (마일스톤 후)</text>
    <text x="160" y="562" fill="#cbd5e1" font-size="14">키트루다 SC 순매출에 대한 비율 — 2043년 특허 만료까지</text>
    <text x="160" y="600" fill="#94a3b8" font-size="13">  · 시장 기대 4~5% / 머크 공시 기준 ≈2% (마일스톤 다 받은 후)</text>
    <text x="1040" y="555" fill="#22c55e" font-size="38" font-weight="900" text-anchor="end">2%</text>
    <text x="1040" y="585" fill="#94a3b8" font-size="13" text-anchor="end">~ 2043년</text>
  </g>

  <!-- Bottom note -->
  <text x="60" y="675" fill="#94a3b8" font-size="14">출처: 알테오젠 공시(2024), 머크 SEC 분기 공시(2025), 바이오스펙테이터·businesspost 보도</text>
</svg>
