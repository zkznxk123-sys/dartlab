<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>알테오젠 영업이익 9년 — 8년 적자에서 +1,069억으로</title>
  <desc>2016~2025 연간 영업이익 라인. -54억에서 +1,069억까지의 변곡점.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">알테오젠 영업이익 9년 (억원)</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">8년간 매년 적자 → 2024년 첫 의미있는 흑자 → 2025년 폭발</text>

  <!-- Axes -->
  <line x1="100" y1="500" x2="1140" y2="500" stroke="#1e2433" stroke-width="2"/>
  <line x1="100" y1="140" x2="100" y2="600" stroke="#1e2433" stroke-width="2"/>

  <!-- Zero line -->
  <line x1="100" y1="500" x2="1140" y2="500" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 6"/>
  <text x="80" y="505" fill="#64748b" font-size="14" text-anchor="end">0</text>
  <text x="80" y="200" fill="#64748b" font-size="14" text-anchor="end">+1,069</text>
  <text x="80" y="610" fill="#64748b" font-size="14" text-anchor="end">-294</text>

  <!-- Data points: 2016~2025 -->
  <!-- Years: 2016 -54 / 2017 -58 / 2018 -77 / 2019 -23 / 2020 +1 / 2021 -128 / 2022 -294 / 2023 -97 / 2024 +254 / 2025 +1069 -->
  <!-- xMin=140, xMax=1100, step=(1100-140)/9=106.67 -->
  <!-- y: 0 = 500. scale: 1069 → 200 (300px), -294 → 600 (100px). -> 1억=300/1069 위쪽, 1억=100/294 아래쪽 -->

  <polyline points="140,515 247,516 354,521 460,506 567,500 674,536 780,582 887,527 994,429 1100,200"
    stroke="#22d3ee" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"
    style="filter: drop-shadow(0 0 12px #22d3ee88)"/>

  <!-- Points -->
  <g fill="#22d3ee">
    <circle cx="140" cy="515" r="6"/>
    <circle cx="247" cy="516" r="6"/>
    <circle cx="354" cy="521" r="6"/>
    <circle cx="460" cy="506" r="6"/>
    <circle cx="567" cy="500" r="6"/>
    <circle cx="674" cy="536" r="6"/>
    <circle cx="780" cy="582" r="9" fill="#ef4444"/>
    <circle cx="887" cy="527" r="6"/>
    <circle cx="994" cy="429" r="9" fill="#22c55e"/>
    <circle cx="1100" cy="200" r="14" fill="#22c55e" style="filter: drop-shadow(0 0 18px #22c55e)"/>
  </g>

  <!-- Year labels -->
  <g fill="#94a3b8" font-size="14" text-anchor="middle">
    <text x="140" y="635">2016</text>
    <text x="247" y="635">2017</text>
    <text x="354" y="635">2018</text>
    <text x="460" y="635">2019</text>
    <text x="567" y="635">2020</text>
    <text x="674" y="635">2021</text>
    <text x="780" y="635">2022</text>
    <text x="887" y="635">2023</text>
    <text x="994" y="635">2024</text>
    <text x="1100" y="635">2025</text>
  </g>

  <!-- Highlight callouts -->
  <text x="567" y="478" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">2020 BEP +1억</text>
  <text x="780" y="610" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">2022 사상 최악 -294</text>
  <text x="994" y="408" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">2024 첫 흑자 +254</text>
  <text x="1100" y="180" fill="#22c55e" font-size="20" font-weight="900" text-anchor="end">2025  +1,069억</text>

  <!-- Bottom note -->
  <text x="60" y="680" fill="#64748b" font-size="14">데이터: dartlab Q1 2016 ~ Q4 2025 · 호출: c.select("IS", ["영업이익"])</text>
</svg>
