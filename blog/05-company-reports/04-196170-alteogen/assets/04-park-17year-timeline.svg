<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>박순재 17년 시간선 — 2008 창업 → 2025 폭발</title>
  <desc>박순재 대표 창업부터 키트루다 SC 라이선스 폭발까지 17년 시간선</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">박순재의 17년 — 2008년 창업에서 1,069억까지</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">한 사람의 17년이 한 회사의 인생을 바꿨다</text>

  <!-- Horizontal timeline -->
  <line x1="80" y1="380" x2="1120" y2="380" stroke="#475569" stroke-width="3"/>

  <!-- Tick marks (years) -->
  <g stroke="#1e2433" stroke-width="2">
    <line x1="120" y1="370" x2="120" y2="390"/>
    <line x1="280" y1="370" x2="280" y2="390"/>
    <line x1="440" y1="370" x2="440" y2="390"/>
    <line x1="600" y1="370" x2="600" y2="390"/>
    <line x1="760" y1="370" x2="760" y2="390"/>
    <line x1="920" y1="370" x2="920" y2="390"/>
    <line x1="1080" y1="370" x2="1080" y2="390"/>
  </g>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="120" y="415">2008</text>
    <text x="280" y="415">2011</text>
    <text x="440" y="415">2014</text>
    <text x="600" y="415">2017</text>
    <text x="760" y="415">2020</text>
    <text x="920" y="415">2023</text>
    <text x="1080" y="415">2025</text>
  </g>

  <!-- Event markers — 2008 창업 -->
  <g>
    <circle cx="120" cy="380" r="14" fill="#22d3ee" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="120" y1="365" x2="120" y2="240" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="40" y="170" width="200" height="68" rx="8" fill="#22d3ee22" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="140" y="195" fill="#22d3ee" font-size="13" text-anchor="middle" font-weight="700">2008년 5월</text>
    <text x="140" y="218" fill="#f1f5f9" font-size="14" text-anchor="middle">박순재 창업</text>
  </g>

  <!-- 2014 상장 -->
  <g>
    <circle cx="440" cy="380" r="12" fill="#94a3b8" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="440" y1="365" x2="440" y2="240" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="350" y="170" width="180" height="68" rx="8" fill="#94a3b822" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="440" y="195" fill="#94a3b8" font-size="13" text-anchor="middle" font-weight="700">2014년 12월</text>
    <text x="440" y="218" fill="#f1f5f9" font-size="14" text-anchor="middle">코스닥 상장</text>
  </g>

  <!-- 2020 머크 1차 -->
  <g>
    <circle cx="760" cy="380" r="14" fill="#fbbf24" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="760" y1="395" x2="760" y2="500" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="660" y="500" width="200" height="84" rx="8" fill="#fbbf2422" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="760" y="525" fill="#fbbf24" font-size="13" text-anchor="middle" font-weight="700">2020년 6월 17일</text>
    <text x="760" y="548" fill="#f1f5f9" font-size="14" text-anchor="middle">머크 1차 라이선스</text>
    <text x="760" y="568" fill="#94a3b8" font-size="12" text-anchor="middle">계약금 1,600만달러</text>
  </g>

  <!-- 2024 머크 2차 -->
  <g>
    <circle cx="975" cy="380" r="14" fill="#22c55e" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="975" y1="365" x2="975" y2="240" stroke="#22c55e" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="875" y="170" width="200" height="84" rx="8" fill="#22c55e22" stroke="#22c55e" stroke-width="1.5"/>
    <text x="975" y="195" fill="#22c55e" font-size="13" text-anchor="middle" font-weight="700">2024년 2월</text>
    <text x="975" y="218" fill="#f1f5f9" font-size="14" text-anchor="middle">머크 갱신 (exclusive)</text>
    <text x="975" y="238" fill="#94a3b8" font-size="12" text-anchor="middle">마일스톤 4.32억$</text>
  </g>

  <!-- 2025 폭발 -->
  <g>
    <circle cx="1080" cy="380" r="18" fill="#ef4444" stroke="#0a0e1a" stroke-width="3" style="filter: drop-shadow(0 0 18px #ef4444)"/>
    <line x1="1080" y1="395" x2="1080" y2="500" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="980" y="500" width="200" height="84" rx="8" fill="#ef444422" stroke="#ef4444" stroke-width="2"/>
    <text x="1080" y="525" fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700">2025년 결산</text>
    <text x="1080" y="550" fill="#f1f5f9" font-size="16" text-anchor="middle" font-weight="900">매출 2,159억</text>
    <text x="1080" y="572" fill="#22c55e" font-size="14" text-anchor="middle" font-weight="900">영업이익 +1,069</text>
  </g>

  <!-- Bottom note -->
  <text x="600" y="660" fill="#94a3b8" font-size="14" text-anchor="middle" font-style="italic">"한 사람의 17년이 한 회사의 인생을 바꿨다"</text>
</svg>
