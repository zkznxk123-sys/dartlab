<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>알테오젠 매출 10년 31배</title>
  <desc>2016년 68억에서 2025년 2,159억까지 매출 시계열 + 영업이익률 콤보</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">매출 31.7배 + 영업이익률 변화</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">2016 68억 → 2025 2,159억 / 영업이익률 -65% → +49.5%</text>

  <!-- Bars: 매출 -->
  <!-- Years 2016-2025, base y=540 -->
  <!-- Values: 68 125 137 292 424 411 288 965 1029 2159 -->
  <!-- max=2159, h_max=380 -->
  <g>
    <rect x="120" y="528" width="80" height="12" fill="#1e2433"/>
    <rect x="220" y="518" width="80" height="22" fill="#1e2433"/>
    <rect x="320" y="516" width="80" height="24" fill="#1e2433"/>
    <rect x="420" y="489" width="80" height="51" fill="#1e2433"/>
    <rect x="520" y="466" width="80" height="74" fill="#22d3ee"/>
    <rect x="620" y="468" width="80" height="72" fill="#1e2433"/>
    <rect x="720" y="490" width="80" height="50" fill="#1e2433"/>
    <rect x="820" y="370" width="80" height="170" fill="#1e2433"/>
    <rect x="920" y="359" width="80" height="181" fill="#fbbf24"/>
    <rect x="1020" y="160" width="80" height="380" fill="#22c55e" style="filter: drop-shadow(0 0 18px #22c55e88)"/>
  </g>

  <!-- Value labels on top of last 3 -->
  <text x="560" y="455" fill="#22d3ee" font-size="13" text-anchor="middle" font-weight="700">424</text>
  <text x="960" y="348" fill="#fbbf24" font-size="14" text-anchor="middle" font-weight="700">1,029</text>
  <text x="1060" y="148" fill="#22c55e" font-size="20" text-anchor="middle" font-weight="900">2,159억</text>

  <!-- Year labels -->
  <g fill="#94a3b8" font-size="14" text-anchor="middle">
    <text x="160" y="565">2016</text>
    <text x="260" y="565">2017</text>
    <text x="360" y="565">2018</text>
    <text x="460" y="565">2019</text>
    <text x="560" y="565">2020</text>
    <text x="660" y="565">2021</text>
    <text x="760" y="565">2022</text>
    <text x="860" y="565">2023</text>
    <text x="960" y="565">2024</text>
    <text x="1060" y="565">2025</text>
  </g>

  <!-- Bottom callout boxes -->
  <g>
    <rect x="120" y="600" width="280" height="80" rx="12" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
    <text x="260" y="630" fill="#94a3b8" font-size="14" text-anchor="middle">매출 변화</text>
    <text x="260" y="662" fill="#22c55e" font-size="28" font-weight="900" text-anchor="middle">×31.7</text>

    <rect x="430" y="600" width="280" height="80" rx="12" fill="#fbbf2422" stroke="#fbbf24" stroke-width="2"/>
    <text x="570" y="630" fill="#94a3b8" font-size="14" text-anchor="middle">영업이익률</text>
    <text x="570" y="662" fill="#fbbf24" font-size="22" font-weight="900" text-anchor="middle">-65% → +49.5%</text>

    <rect x="740" y="600" width="280" height="80" rx="12" fill="#22d3ee22" stroke="#22d3ee" stroke-width="2"/>
    <text x="880" y="630" fill="#94a3b8" font-size="14" text-anchor="middle">marginDriver</text>
    <text x="880" y="662" fill="#22d3ee" font-size="18" font-weight="900" text-anchor="middle">높은 가격결정력</text>
  </g>
</svg>
