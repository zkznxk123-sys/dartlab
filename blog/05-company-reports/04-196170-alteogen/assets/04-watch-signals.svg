<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>알테오젠 다음 1년 4가지 결정 신호</title>
  <desc>2026년에 추적해야 할 4가지 임계 조건</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">2026년에 봐야 할 4가지 신호</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">한 해 +1,069억이 일회성인지, 새 시대인지를 결정한다</text>

  <!-- 4 cards 2x2 -->
  <g>
    <!-- Card 1 -->
    <rect x="60" y="140" width="470" height="240" rx="16" fill="#1e2433" stroke="#22d3ee" stroke-width="2"/>
    <text x="90" y="180" fill="#22d3ee" font-size="22" font-weight="800">① 키트루다 SC 매출 인식</text>
    <text x="90" y="215" fill="#cbd5e1" font-size="15">머크 2026년 SC 본격 출시 후</text>
    <text x="90" y="237" fill="#cbd5e1" font-size="15">알테오젠 마일스톤 분기별 인식 시점</text>
    <text x="90" y="290" fill="#94a3b8" font-size="13">임계: 2026Q1~Q2 매출 인식</text>
    <text x="90" y="312" fill="#94a3b8" font-size="13">검증: 알테오젠 분기 공시 + 머크 10-Q</text>
    <text x="90" y="350" fill="#22c55e" font-size="14" font-weight="700">→ 시점 빠르면 2026 매출 5,000억+</text>

    <!-- Card 2 -->
    <rect x="550" y="140" width="470" height="240" rx="16" fill="#1e2433" stroke="#fbbf24" stroke-width="2"/>
    <text x="580" y="180" fill="#fbbf24" font-size="22" font-weight="800">② 로열티율 협상 결과</text>
    <text x="580" y="215" fill="#cbd5e1" font-size="15">머크 공시 기준 약 2% (시장 기대 4~5%)</text>
    <text x="580" y="237" fill="#cbd5e1" font-size="15">알테오젠 입장: "단계별 차등, 최종 미공개"</text>
    <text x="580" y="290" fill="#94a3b8" font-size="13">임계: 분기별 매출 / 머크 SC 매출 비율</text>
    <text x="580" y="312" fill="#94a3b8" font-size="13">검증: 키트루다 SC 매출 ÷ 알테오젠 로열티</text>
    <text x="580" y="350" fill="#fbbf24" font-size="14" font-weight="700">→ 2.5%+ 확인되면 시장 우려 해소</text>

    <!-- Card 3 -->
    <rect x="60" y="400" width="470" height="240" rx="16" fill="#1e2433" stroke="#22c55e" stroke-width="2"/>
    <text x="90" y="440" fill="#22c55e" font-size="22" font-weight="800">③ 두 번째 라이선스</text>
    <text x="90" y="475" fill="#cbd5e1" font-size="15">머크 외 다른 빅파마와의 ALT-B4 계약</text>
    <text x="90" y="497" fill="#cbd5e1" font-size="15">다이이찌산쿄 / 산도즈 / 인타스 등 후보</text>
    <text x="90" y="550" fill="#94a3b8" font-size="13">임계: 2026년 2건 이상 추가 발표</text>
    <text x="90" y="572" fill="#94a3b8" font-size="13">검증: 알테오젠 IR + 보도</text>
    <text x="90" y="610" fill="#22c55e" font-size="14" font-weight="700">→ 단일 라이선스 의존도 해소</text>

    <!-- Card 4 -->
    <rect x="550" y="400" width="470" height="240" rx="16" fill="#1e2433" stroke="#ef4444" stroke-width="2"/>
    <text x="580" y="440" fill="#ef4444" font-size="22" font-weight="800">④ Halozyme 경쟁</text>
    <text x="580" y="475" fill="#cbd5e1" font-size="15">미국 Halozyme의 ENHANZE 플랫폼</text>
    <text x="580" y="497" fill="#cbd5e1" font-size="15">로슈/J&amp;J 등 이미 다수 빅파마 보유</text>
    <text x="580" y="550" fill="#94a3b8" font-size="13">임계: 빅파마 신규 SC 변환 계약 추이</text>
    <text x="580" y="572" fill="#94a3b8" font-size="13">검증: 양사 분기 IR 비교</text>
    <text x="580" y="610" fill="#ef4444" font-size="14" font-weight="700">→ 알테오젠이 ALT-B4 우위 입증해야</text>
  </g>

  <text x="540" y="685" fill="#94a3b8" font-size="13" text-anchor="middle">매 분기 dartlab + 머크 SEC + 알테오젠 공시 교차 검증</text>
</svg>
