<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>HMM 자본총계 29배 — 사이클 한 번이 만든 곳간</title>
  <desc>2017 0.95조 → 2024 27.86조 자본총계 폭증</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">자본총계 9년 (조원)</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">9년 적자 끝의 회사가 사이클 한 번으로 자본 29배 — 0.95 → 27.86조</text>

  <!-- Bars -->
  <!-- 2016 0.95 / 2017 0.90 / 2018 1.04 / 2019 1.09 / 2020 1.69 / 2021 10.36 / 2022 20.69 / 2023 21.44 / 2024 27.86 / 2025 26.57 -->
  <!-- max=28, scale 1조=15px -->
  <g>
    <rect x="100" y="535" width="90" height="14" fill="#475569"/>
    <text x="145" y="525" fill="#94a3b8" font-size="13" text-anchor="middle">0.95</text>
    <rect x="200" y="536" width="90" height="13" fill="#475569"/>
    <text x="245" y="525" fill="#94a3b8" font-size="13" text-anchor="middle">0.90</text>
    <rect x="300" y="534" width="90" height="15" fill="#475569"/>
    <text x="345" y="525" fill="#94a3b8" font-size="13" text-anchor="middle">1.04</text>
    <rect x="400" y="533" width="90" height="16" fill="#475569"/>
    <text x="445" y="525" fill="#94a3b8" font-size="13" text-anchor="middle">1.09</text>
    <rect x="500" y="525" width="90" height="24" fill="#94a3b8"/>
    <text x="545" y="515" fill="#94a3b8" font-size="13" text-anchor="middle">1.69</text>
    <rect x="600" y="394" width="90" height="155" fill="#22c55e"/>
    <text x="645" y="384" fill="#22c55e" font-size="14" text-anchor="middle" font-weight="700">10.36</text>
    <rect x="700" y="239" width="90" height="310" fill="#22c55e"/>
    <text x="745" y="229" fill="#22c55e" font-size="14" text-anchor="middle" font-weight="700">20.69</text>
    <rect x="800" y="228" width="90" height="321" fill="#22c55e"/>
    <text x="845" y="218" fill="#22c55e" font-size="14" text-anchor="middle" font-weight="700">21.44</text>
    <rect x="900" y="131" width="90" height="418" fill="#22c55e" style="filter: drop-shadow(0 0 18px #22c55e88)"/>
    <text x="945" y="121" fill="#22c55e" font-size="18" text-anchor="middle" font-weight="900">27.86</text>
    <rect x="1000" y="151" width="90" height="398" fill="#22c55e"/>
    <text x="1045" y="141" fill="#22c55e" font-size="14" text-anchor="middle" font-weight="700">26.57</text>
  </g>

  <!-- year labels -->
  <g fill="#94a3b8" font-size="13" text-anchor="middle">
    <text x="145" y="572">2016</text>
    <text x="245" y="572">2017</text>
    <text x="345" y="572">2018</text>
    <text x="445" y="572">2019</text>
    <text x="545" y="572">2020</text>
    <text x="645" y="572">2021</text>
    <text x="745" y="572">2022</text>
    <text x="845" y="572">2023</text>
    <text x="945" y="572">2024</text>
    <text x="1045" y="572">2025</text>
  </g>

  <!-- Annotations -->
  <g>
    <rect x="60" y="600" width="1080" height="80" rx="12" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
    <text x="600" y="635" fill="#f1f5f9" font-size="18" text-anchor="middle">2020 대비 자본 16배 / 2017 대비 31배 — 한국 상장사 9년 자본 폭증 1위급</text>
    <text x="600" y="660" fill="#94a3b8" font-size="14" text-anchor="middle">코로나 운임 폭발이 만든 17조의 영업이익이 그대로 곳간에 쌓였다</text>
  </g>
</svg>
