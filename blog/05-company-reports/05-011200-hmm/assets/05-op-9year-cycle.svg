<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>HMM 영업이익 9년 사이클</title>
  <desc>2016~2025 영업이익 -8천억 → +9.95조 → +5,873억 → +3.51조 회전</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">HMM 영업이익 10년 (조원)</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">5번 회전 — 4년 적자, 코로나 폭발, 정상화, 미니 회복, 다시 하락</text>

  <!-- Bars -->
  <!-- 2016 -0.83 / 2017 -0.41 / 2018 -0.56 / 2019 -0.30 / 2020 +0.98 / 2021 +7.38 / 2022 +9.95 / 2023 +0.59 / 2024 +3.51 / 2025 +1.46 -->
  <!-- y zero=420, scale 1조=35px (상한 10조→350px) -->
  <g>
    <line x1="80" y1="420" x2="1140" y2="420" stroke="#475569" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="60" y="425" fill="#64748b" font-size="14" text-anchor="end">0</text>

    <!-- 2016 -0.83 -->
    <rect x="100" y="420" width="90" height="29" fill="#ef4444"/>
    <text x="145" y="465" fill="#ef4444" font-size="14" text-anchor="middle" font-weight="700">-0.83</text>
    <text x="145" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2016</text>

    <rect x="200" y="420" width="90" height="14" fill="#ef4444"/>
    <text x="245" y="450" fill="#ef4444" font-size="14" text-anchor="middle" font-weight="700">-0.41</text>
    <text x="245" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2017</text>

    <rect x="300" y="420" width="90" height="20" fill="#ef4444"/>
    <text x="345" y="456" fill="#ef4444" font-size="14" text-anchor="middle" font-weight="700">-0.56</text>
    <text x="345" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2018</text>

    <rect x="400" y="420" width="90" height="11" fill="#ef4444"/>
    <text x="445" y="448" fill="#ef4444" font-size="14" text-anchor="middle" font-weight="700">-0.30</text>
    <text x="445" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2019</text>

    <!-- 2020 +0.98 -->
    <rect x="500" y="386" width="90" height="34" fill="#22c55e"/>
    <text x="545" y="376" fill="#22c55e" font-size="14" text-anchor="middle" font-weight="700">+0.98</text>
    <text x="545" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2020</text>

    <!-- 2021 +7.38 -->
    <rect x="600" y="162" width="90" height="258" fill="#22c55e"/>
    <text x="645" y="152" fill="#22c55e" font-size="16" text-anchor="middle" font-weight="800">+7.38</text>
    <text x="645" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2021</text>

    <!-- 2022 +9.95 사상 최대 -->
    <rect x="700" y="72" width="90" height="348" fill="#22c55e" style="filter: drop-shadow(0 0 18px #22c55e88)"/>
    <text x="745" y="62" fill="#22c55e" font-size="20" text-anchor="middle" font-weight="900">+9.95</text>
    <text x="745" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2022</text>

    <!-- 2023 +0.59 -->
    <rect x="800" y="400" width="90" height="20" fill="#fbbf24"/>
    <text x="845" y="390" fill="#fbbf24" font-size="14" text-anchor="middle" font-weight="700">+0.59</text>
    <text x="845" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2023</text>

    <!-- 2024 +3.51 -->
    <rect x="900" y="297" width="90" height="123" fill="#22d3ee"/>
    <text x="945" y="287" fill="#22d3ee" font-size="16" text-anchor="middle" font-weight="800">+3.51</text>
    <text x="945" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2024</text>

    <!-- 2025 +1.46 -->
    <rect x="1000" y="369" width="90" height="51" fill="#22d3ee"/>
    <text x="1045" y="359" fill="#22d3ee" font-size="14" text-anchor="middle" font-weight="700">+1.46</text>
    <text x="1045" y="485" fill="#94a3b8" font-size="13" text-anchor="middle">2025</text>
  </g>

  <!-- Cycle annotations -->
  <g font-size="13" fill="#94a3b8">
    <line x1="100" y1="535" x2="490" y2="535" stroke="#ef4444" stroke-width="2"/>
    <text x="295" y="555" fill="#ef4444" text-anchor="middle">4년 적자 (한진해운 시대)</text>

    <line x1="500" y1="535" x2="790" y2="535" stroke="#22c55e" stroke-width="2"/>
    <text x="645" y="555" fill="#22c55e" text-anchor="middle">코로나 운임 폭발 (2년 +17조)</text>

    <line x1="800" y1="535" x2="890" y2="535" stroke="#fbbf24" stroke-width="2"/>
    <text x="845" y="555" fill="#fbbf24" text-anchor="middle">정상화 -93%</text>

    <line x1="900" y1="535" x2="1090" y2="535" stroke="#22d3ee" stroke-width="2"/>
    <text x="995" y="555" fill="#22d3ee" text-anchor="middle">홍해 사태 미니 회복</text>
  </g>

  <!-- Bottom note -->
  <text x="60" y="680" fill="#64748b" font-size="14">데이터: dartlab Q1 2016 ~ Q4 2025 · 호출: c.select("IS", ["영업이익"])</text>
</svg>
