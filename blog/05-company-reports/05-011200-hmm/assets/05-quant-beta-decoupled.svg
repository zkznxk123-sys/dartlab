<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>HMM 베타 0.37 R² 10% — 시장과 분리된 사이클</title>
  <desc>HMM 주가의 90%는 시장이 설명하지 않는다. 컨테이너 운임 사이클이 결정한다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">시장과 분리된 회사 — 베타는 0.37, R²는 10%</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">시장은 HMM 주가의 10%만 설명한다. 나머지 90%는 운임 사이클이 결정한다.</text>

  <!-- 4 metric cards -->
  <g>
    <rect x="60" y="140" width="260" height="220" rx="16" fill="#1e2433" stroke="#22d3ee" stroke-width="2"/>
    <text x="190" y="180" fill="#22d3ee" font-size="18" text-anchor="middle">베타 (KOSPI 대비)</text>
    <text x="190" y="265" fill="#22d3ee" font-size="84" font-weight="900" text-anchor="middle">0.37</text>
    <text x="190" y="305" fill="#94a3b8" font-size="14" text-anchor="middle">시장 1% 움직일 때</text>
    <text x="190" y="325" fill="#94a3b8" font-size="14" text-anchor="middle">HMM 평균 0.37%</text>

    <rect x="340" y="140" width="260" height="220" rx="16" fill="#1e2433" stroke="#ef4444" stroke-width="3" style="filter: drop-shadow(0 0 18px #ef444444)"/>
    <text x="470" y="180" fill="#ef4444" font-size="18" text-anchor="middle">R² (시장 설명력)</text>
    <text x="470" y="265" fill="#ef4444" font-size="84" font-weight="900" text-anchor="middle">10.3%</text>
    <text x="470" y="305" fill="#94a3b8" font-size="14" text-anchor="middle">시장이 HMM의</text>
    <text x="470" y="325" fill="#94a3b8" font-size="14" text-anchor="middle">10%만 설명함</text>

    <rect x="620" y="140" width="260" height="220" rx="16" fill="#1e2433" stroke="#fbbf24" stroke-width="2"/>
    <text x="750" y="180" fill="#fbbf24" font-size="18" text-anchor="middle">실현 변동성 (60일)</text>
    <text x="750" y="265" fill="#fbbf24" font-size="84" font-weight="900" text-anchor="middle">59%</text>
    <text x="750" y="305" fill="#94a3b8" font-size="14" text-anchor="middle">KOSPI 변동성의</text>
    <text x="750" y="325" fill="#94a3b8" font-size="14" text-anchor="middle">약 4배 (extremely high)</text>

    <rect x="900" y="140" width="240" height="220" rx="16" fill="#1e2433" stroke="#94a3b8" stroke-width="2"/>
    <text x="1020" y="180" fill="#94a3b8" font-size="18" text-anchor="middle">알파 (CAPM 대비)</text>
    <text x="1020" y="265" fill="#94a3b8" font-size="76" font-weight="900" text-anchor="middle">-15.7</text>
    <text x="1020" y="305" fill="#94a3b8" font-size="14" text-anchor="middle">시장 회수 후</text>
    <text x="1020" y="325" fill="#94a3b8" font-size="14" text-anchor="middle">연간 -15.7% 손실</text>
  </g>

  <!-- Bottom interpretation -->
  <g>
    <rect x="60" y="400" width="1080" height="260" rx="16" fill="#0a0e1a" stroke="#1e2433" stroke-width="2"/>
    <text x="600" y="445" fill="#fbbf24" font-size="22" font-weight="800" text-anchor="middle">한 줄 해석</text>
    <text x="600" y="495" fill="#f1f5f9" font-size="20" text-anchor="middle">HMM 베타가 0.37로 낮은 건 "안전한 회사"가 아닙니다.</text>
    <text x="600" y="525" fill="#f1f5f9" font-size="20" text-anchor="middle">시장과 따로 움직이고, 자기 변동성이 시장의 4배라는 뜻입니다.</text>
    <text x="600" y="565" fill="#22d3ee" font-size="22" font-weight="800" text-anchor="middle">시장이 아니라 컨테이너 운임 사이클이 주가를 결정합니다.</text>
    <text x="600" y="610" fill="#94a3b8" font-size="15" text-anchor="middle">호출: c.quant("판단") + c.quant("변동성")</text>
    <text x="600" y="635" fill="#64748b" font-size="13" text-anchor="middle">표본 243일 / t-stat 5.27 (통계적 유의)</text>
  </g>
</svg>
