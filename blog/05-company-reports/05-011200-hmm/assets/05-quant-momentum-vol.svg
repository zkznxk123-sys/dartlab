<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>HMM 모멘텀 + 변동성 기간구조</title>
  <desc>quant 엔진 모멘텀 1m/3m/6m + 변동성 5d/20d/60d/120d</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">quant 엔진 — 모멘텀과 변동성</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">단기 약세, 중기 강세, 변동성 contango (먼 미래 변동성이 더 큼)</text>

  <!-- Left: 모멘텀 -->
  <g>
    <rect x="60" y="140" width="540" height="540" rx="16" fill="#0a0e1a" stroke="#1e2433" stroke-width="2"/>
    <text x="330" y="180" fill="#fbbf24" font-size="22" font-weight="800" text-anchor="middle">시계열 모멘텀</text>

    <!-- 1m -->
    <text x="100" y="240" fill="#94a3b8" font-size="16">1개월</text>
    <rect x="200" y="225" width="380" height="30" rx="6" fill="#1e2433"/>
    <rect x="380" y="225" width="20" height="30" fill="#ef4444"/>
    <text x="560" y="248" fill="#ef4444" font-size="20" text-anchor="end" font-weight="800">-1.2%</text>
    <text x="100" y="275" fill="#ef4444" font-size="14">  → short signal</text>

    <!-- 3m -->
    <text x="100" y="320" fill="#94a3b8" font-size="16">3개월</text>
    <rect x="200" y="305" width="380" height="30" rx="6" fill="#1e2433"/>
    <rect x="400" y="305" width="60" height="30" fill="#22c55e"/>
    <text x="560" y="328" fill="#22c55e" font-size="20" text-anchor="end" font-weight="800">+3.7%</text>
    <text x="100" y="355" fill="#22c55e" font-size="14">  → long signal</text>

    <!-- 6m -->
    <text x="100" y="400" fill="#94a3b8" font-size="16">6개월</text>
    <rect x="200" y="385" width="380" height="30" rx="6" fill="#1e2433"/>
    <rect x="397" y="385" width="6" height="30" fill="#fbbf24"/>
    <text x="560" y="408" fill="#fbbf24" font-size="20" text-anchor="end" font-weight="800">+0.2%</text>
    <text x="100" y="435" fill="#fbbf24" font-size="14">  → long signal (간신히)</text>

    <text x="330" y="500" fill="#94a3b8" font-size="14" text-anchor="middle">verdict</text>
    <text x="330" y="540" fill="#fbbf24" font-size="42" font-weight="900" text-anchor="middle">mixed</text>
    <text x="330" y="580" fill="#94a3b8" font-size="13" text-anchor="middle">streak: 1일 하락</text>
    <text x="330" y="610" fill="#94a3b8" font-size="13" text-anchor="middle">crashRisk: medium</text>
    <text x="330" y="650" fill="#64748b" font-size="12" text-anchor="middle">c.quant("모멘텀")</text>
  </g>

  <!-- Right: 변동성 기간구조 -->
  <g>
    <rect x="620" y="140" width="540" height="540" rx="16" fill="#0a0e1a" stroke="#1e2433" stroke-width="2"/>
    <text x="890" y="180" fill="#fbbf24" font-size="22" font-weight="800" text-anchor="middle">변동성 기간구조</text>

    <!-- 5d 18.7% -->
    <text x="660" y="240" fill="#94a3b8" font-size="16">5일</text>
    <rect x="760" y="225" width="380" height="30" rx="6" fill="#1e2433"/>
    <rect x="760" y="225" width="120" height="30" fill="#22d3ee"/>
    <text x="1140" y="248" fill="#22d3ee" font-size="18" text-anchor="end" font-weight="800">18.7%</text>

    <!-- 20d 35% -->
    <text x="660" y="320" fill="#94a3b8" font-size="16">20일</text>
    <rect x="760" y="305" width="380" height="30" rx="6" fill="#1e2433"/>
    <rect x="760" y="305" width="222" height="30" fill="#22d3ee"/>
    <text x="1140" y="328" fill="#22d3ee" font-size="18" text-anchor="end" font-weight="800">35.0%</text>

    <!-- 60d 59% -->
    <text x="660" y="400" fill="#94a3b8" font-size="16">60일</text>
    <rect x="760" y="385" width="380" height="30" rx="6" fill="#1e2433"/>
    <rect x="760" y="385" width="380" height="30" fill="#ef4444"/>
    <text x="1140" y="408" fill="#ef4444" font-size="20" text-anchor="end" font-weight="900">59.0%</text>

    <!-- 120d 45% -->
    <text x="660" y="480" fill="#94a3b8" font-size="16">120일</text>
    <rect x="760" y="465" width="380" height="30" rx="6" fill="#1e2433"/>
    <rect x="760" y="465" width="290" height="30" fill="#fbbf24"/>
    <text x="1140" y="488" fill="#fbbf24" font-size="18" text-anchor="end" font-weight="800">45.0%</text>

    <text x="890" y="540" fill="#94a3b8" font-size="14" text-anchor="middle">vol curve shape</text>
    <text x="890" y="580" fill="#ef4444" font-size="32" font-weight="900" text-anchor="middle">contango</text>
    <text x="890" y="610" fill="#94a3b8" font-size="13" text-anchor="middle">먼 미래 변동성이 더 큼 — vol regime "high"</text>
    <text x="890" y="650" fill="#64748b" font-size="12" text-anchor="middle">c.quant("변동성")</text>
  </g>
</svg>
