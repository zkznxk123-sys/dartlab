<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>HMM 다음 사이클 4가지 결정 신호</title>
  <desc>2026년 추적할 4가지 임계 조건</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">HMM 2026년 4가지 신호</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">사이클이 회사이고 회사가 사이클인 종목 — 4개 외부 임계만 보면 된다</text>

  <g>
    <rect x="60" y="140" width="470" height="240" rx="16" fill="#1e2433" stroke="#22d3ee" stroke-width="2"/>
    <text x="90" y="180" fill="#22d3ee" font-size="22" font-weight="800">① SCFI / BDI 운임 지수</text>
    <text x="90" y="215" fill="#cbd5e1" font-size="15">상하이 컨테이너 운임 지수</text>
    <text x="90" y="237" fill="#cbd5e1" font-size="15">2026년 평균이 1,500 이상 유지?</text>
    <text x="90" y="290" fill="#94a3b8" font-size="13">임계: SCFI 1,500 이상 = HMM 분기 흑자</text>
    <text x="90" y="312" fill="#94a3b8" font-size="13">검증: 상하이항운거래소 주간 발표</text>
    <text x="90" y="350" fill="#22c55e" font-size="14" font-weight="700">→ HMM 매출의 직접 트리거</text>

    <rect x="550" y="140" width="470" height="240" rx="16" fill="#1e2433" stroke="#fbbf24" stroke-width="2"/>
    <text x="580" y="180" fill="#fbbf24" font-size="22" font-weight="800">② 홍해 사태 / 우회 항로</text>
    <text x="580" y="215" fill="#cbd5e1" font-size="15">2024년 미니 사이클의 정확한 원인</text>
    <text x="580" y="237" fill="#cbd5e1" font-size="15">2026년 정상화되면 운임 -30~50%</text>
    <text x="580" y="290" fill="#94a3b8" font-size="13">임계: 수에즈 운하 통과량 회복</text>
    <text x="580" y="312" fill="#94a3b8" font-size="13">검증: 수에즈운하청 통계</text>
    <text x="580" y="350" fill="#fbbf24" font-size="14" font-weight="700">→ 미니 사이클 종료 시점</text>

    <rect x="60" y="400" width="470" height="240" rx="16" fill="#1e2433" stroke="#22c55e" stroke-width="2"/>
    <text x="90" y="440" fill="#22c55e" font-size="22" font-weight="800">③ KDB·해진공 매각 진행</text>
    <text x="90" y="475" fill="#cbd5e1" font-size="15">산업은행 + 한국해양진흥공사 합산 약 38%</text>
    <text x="90" y="497" fill="#cbd5e1" font-size="15">매각 시 인수자가 곳간 25조 어떻게?</text>
    <text x="90" y="550" fill="#94a3b8" font-size="13">임계: 매각 발표 / 인수자 후보</text>
    <text x="90" y="572" fill="#94a3b8" font-size="13">검증: 산업은행 IR + 보도</text>
    <text x="90" y="610" fill="#22c55e" font-size="14" font-weight="700">→ 자본 구조의 본질 변화</text>

    <rect x="550" y="400" width="470" height="240" rx="16" fill="#1e2433" stroke="#ef4444" stroke-width="2"/>
    <text x="580" y="440" fill="#ef4444" font-size="22" font-weight="800">④ 글로벌 컨테이너 신조선 인도</text>
    <text x="580" y="475" fill="#cbd5e1" font-size="15">2024~2026 신조선 대량 인도 = 공급 폭증</text>
    <text x="580" y="497" fill="#cbd5e1" font-size="15">선복량 증가율 +10% 시 운임 -50%</text>
    <text x="580" y="550" fill="#94a3b8" font-size="13">임계: 글로벌 컨테이너 선복 증가율</text>
    <text x="580" y="572" fill="#94a3b8" font-size="13">검증: Alphaliner / Drewry</text>
    <text x="580" y="610" fill="#ef4444" font-size="14" font-weight="700">→ 사이클의 다음 정점-바닥</text>
  </g>

  <text x="540" y="685" fill="#94a3b8" font-size="13" text-anchor="middle">매 분기 dartlab + 외부 운임/매각 정보 교차 검증</text>
</svg>
