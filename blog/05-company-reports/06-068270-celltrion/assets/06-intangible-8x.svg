<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>셀트리온 무형자산 8.5배 — 한 결정이 만든 13.78조</title>
  <desc>2022 1.62조 → 2023 13.34조 → 2025 13.78조 합병이 만든 무형자산 폭증</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">무형자산 8.5배 — 한 결정이 만든 13.78조</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">2023년 12월 28일 합병으로 셀트리온헬스케어 글로벌 판권이 본사 BS로 이동</text>

  <!-- Year bars 2016~2025 -->
  <!-- values: 0.72 0.79 0.89 1.01 1.40 1.49 1.62 13.34 13.70 13.78 -->
  <!-- max 14, scale 1조=30px -->
  <g>
    <line x1="80" y1="490" x2="1140" y2="490" stroke="#475569" stroke-width="2"/>

    <rect x="100" y="468" width="90" height="22" fill="#475569"/>
    <text x="145" y="458" fill="#94a3b8" font-size="12" text-anchor="middle">0.72</text>
    <rect x="200" y="466" width="90" height="24" fill="#475569"/>
    <text x="245" y="456" fill="#94a3b8" font-size="12" text-anchor="middle">0.79</text>
    <rect x="300" y="463" width="90" height="27" fill="#475569"/>
    <text x="345" y="453" fill="#94a3b8" font-size="12" text-anchor="middle">0.89</text>
    <rect x="400" y="460" width="90" height="30" fill="#475569"/>
    <text x="445" y="450" fill="#94a3b8" font-size="12" text-anchor="middle">1.01</text>
    <rect x="500" y="448" width="90" height="42" fill="#475569"/>
    <text x="545" y="438" fill="#94a3b8" font-size="12" text-anchor="middle">1.40</text>
    <rect x="600" y="445" width="90" height="45" fill="#475569"/>
    <text x="645" y="435" fill="#94a3b8" font-size="12" text-anchor="middle">1.49</text>
    <rect x="700" y="441" width="90" height="49" fill="#475569"/>
    <text x="745" y="431" fill="#94a3b8" font-size="12" text-anchor="middle">1.62</text>

    <!-- 2023 합병 -->
    <rect x="800" y="90" width="90" height="400" fill="#22c55e" style="filter: drop-shadow(0 0 18px #22c55e)"/>
    <text x="845" y="80" fill="#22c55e" font-size="20" text-anchor="middle" font-weight="900">13.34</text>
    <rect x="900" y="79" width="90" height="411" fill="#22c55e"/>
    <text x="945" y="69" fill="#22c55e" font-size="20" text-anchor="middle" font-weight="900">13.70</text>
    <rect x="1000" y="77" width="90" height="413" fill="#22c55e"/>
    <text x="1045" y="67" fill="#22c55e" font-size="20" text-anchor="middle" font-weight="900">13.78</text>
  </g>

  <g fill="#94a3b8" font-size="13" text-anchor="middle">
    <text x="145" y="515">2016</text>
    <text x="245" y="515">2017</text>
    <text x="345" y="515">2018</text>
    <text x="445" y="515">2019</text>
    <text x="545" y="515">2020</text>
    <text x="645" y="515">2021</text>
    <text x="745" y="515">2022</text>
    <text x="845" y="515">2023</text>
    <text x="945" y="515">2024</text>
    <text x="1045" y="515">2025</text>
  </g>

  <!-- 화살표: 2022 → 2023 -->
  <g>
    <text x="800" y="555" fill="#22c55e" font-size="36" font-weight="900" text-anchor="middle">↑</text>
    <text x="800" y="585" fill="#22c55e" font-size="18" font-weight="800" text-anchor="middle">×8.5배</text>
    <text x="800" y="610" fill="#94a3b8" font-size="13" text-anchor="middle">한 분기 만에</text>
  </g>

  <rect x="60" y="630" width="1080" height="60" rx="12" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="670" fill="#f1f5f9" font-size="18" text-anchor="middle">2023.12.28 합병 — 셀트리온 + 셀트리온헬스케어 = 통합 셀트리온. 헬스케어가 보유하던 글로벌 판권/특허가 본사 BS로 이동</text>
</svg>
