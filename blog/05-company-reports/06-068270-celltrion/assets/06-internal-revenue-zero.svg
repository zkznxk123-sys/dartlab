<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>내부거래 매출 1조 7,319억 → 95,856원</title>
  <desc>합병 한 분기 전후 셀트리온의 특수관계자 매출이 사실상 0이 됐다</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-size="34" font-weight="700">내부거래 매출 — 한 분기 만에 0이 됐다</text>
  <text x="60" y="105" fill="#94a3b8" font-size="18">셀트리온 특수관계자 대상 매출 (합병 직전 vs 직후)</text>

  <!-- left: 1.7조 huge box -->
  <rect x="120" y="160" width="420" height="440" fill="#ea4647" opacity="0.85"/>
  <text x="330" y="370" fill="#f1f5f9" font-size="48" font-weight="800" text-anchor="middle">1조 7,319억</text>
  <text x="330" y="420" fill="#f1f5f9" font-size="22" text-anchor="middle">2022년 (합병 직전)</text>
  <text x="330" y="650" fill="#94a3b8" font-size="16" text-anchor="middle">셀트리온 매출의 약 75%</text>

  <!-- arrow -->
  <text x="615" y="395" fill="#fbbf24" font-size="64" text-anchor="middle">→</text>
  <text x="615" y="440" fill="#94a3b8" font-size="14" text-anchor="middle">합병 1분기</text>

  <!-- right: 95,856원 (tiny dot) -->
  <circle cx="900" cy="395" r="6" fill="#34d399"/>
  <text x="900" y="320" fill="#34d399" font-size="44" font-weight="800" text-anchor="middle">95,856원</text>
  <text x="900" y="360" fill="#f1f5f9" font-size="20" text-anchor="middle">2023년 (합병 직후)</text>
  <text x="900" y="450" fill="#94a3b8" font-size="14" text-anchor="middle">만 원이 아니라 원</text>
  <text x="900" y="475" fill="#94a3b8" font-size="14" text-anchor="middle">사실상 0</text>
  <text x="900" y="650" fill="#94a3b8" font-size="16" text-anchor="middle">5년 공매도 전쟁의 종결</text>

  <text x="60" y="700" fill="#64748b" font-size="13">출처: 탑데일리 · 셀트리온 사업보고서 특수관계자 거래 주석</text>
</svg>
