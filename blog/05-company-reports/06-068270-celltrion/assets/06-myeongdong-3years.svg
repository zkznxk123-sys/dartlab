<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>1999~2002 — 명동 사채와 신체포기각서의 3년</title>
  <desc>창업 첫 3년 — 자살 시도까지 갔던 시기</desc>
  <rect width="1200" height="620" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-size="32" font-weight="700">1999 → 2002 — 가장 어두웠던 3년</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">창업 후 첫 3년의 일상 — 본인 인터뷰 기반</text>

  <!-- timeline horizontal -->
  <line x1="100" y1="280" x2="1140" y2="280" stroke="#1e2433" stroke-width="3"/>

  <!-- node 1 -->
  <circle cx="200" cy="280" r="14" fill="#ea4647"/>
  <text x="200" y="240" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">1999</text>
  <text x="200" y="335" fill="#cbd5e1" font-size="15" text-anchor="middle">넥솔 설립</text>
  <text x="200" y="358" fill="#94a3b8" font-size="13" text-anchor="middle">5천만원 자본금</text>
  <text x="200" y="378" fill="#94a3b8" font-size="13" text-anchor="middle">1년 만에 바닥</text>

  <!-- node 2 -->
  <circle cx="450" cy="280" r="14" fill="#ea4647"/>
  <text x="450" y="240" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">2000</text>
  <text x="450" y="335" fill="#cbd5e1" font-size="15" text-anchor="middle">명동 사채 시장</text>
  <text x="450" y="358" fill="#fbbf24" font-size="13" text-anchor="middle">신체포기각서</text>
  <text x="450" y="378" fill="#94a3b8" font-size="13" text-anchor="middle">담보 = 본인 신체</text>

  <!-- node 3 -->
  <circle cx="700" cy="280" r="14" fill="#ea4647"/>
  <text x="700" y="240" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">2001</text>
  <text x="700" y="335" fill="#cbd5e1" font-size="15" text-anchor="middle">자살 시도</text>
  <text x="700" y="358" fill="#fbbf24" font-size="13" text-anchor="middle">"그 정도로 힘들었다"</text>
  <text x="700" y="378" fill="#94a3b8" font-size="13" text-anchor="middle">— 본인 인터뷰</text>

  <!-- node 4 -->
  <circle cx="950" cy="280" r="14" fill="#34d399"/>
  <text x="950" y="240" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">2002</text>
  <text x="950" y="335" fill="#cbd5e1" font-size="15" text-anchor="middle">셀트리온 설립</text>
  <text x="950" y="358" fill="#34d399" font-size="13" text-anchor="middle">바이오시밀러 결심</text>
  <text x="950" y="378" fill="#94a3b8" font-size="13" text-anchor="middle">2010년 특허만료 노트</text>

  <!-- bottom -->
  <rect x="60" y="450" width="1080" height="120" rx="10" fill="#1a1f2b" stroke="#1e2433"/>
  <text x="600" y="495" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">"남이 만든 약을 정확히 똑같이 만드는 것."</text>
  <text x="600" y="525" fill="#94a3b8" font-size="16" text-anchor="middle">"그게 바이오시밀러였습니다. 그게 무엇을 의미하는지 한국에서는 아무도 몰랐어요."</text>
  <text x="600" y="552" fill="#64748b" font-size="14" text-anchor="middle">— 서정진, 본인 인터뷰</text>
</svg>
