<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>1999년 넥솔 — 자본금 5천만원, 직원 6명</title>
  <desc>인천 연수구청 7층 벤처센터에서 시작한 회사</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-size="32" font-weight="700">1999년, 인천 연수구청 7층</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">41세에 직장을 잃은 한 사람이 시작한 회사 — 넥솔 (현 셀트리온홀딩스)</text>

  <!-- 3 stat cards -->
  <g>
    <rect x="80" y="170" width="320" height="280" rx="12" fill="#1a1f2b" stroke="#1e2433"/>
    <text x="240" y="240" fill="#94a3b8" font-size="18" text-anchor="middle">자본금</text>
    <text x="240" y="320" fill="#ea4647" font-size="56" font-weight="800" text-anchor="middle">5천만원</text>
    <text x="240" y="380" fill="#64748b" font-size="14" text-anchor="middle">대우자동차 임원 시절</text>
    <text x="240" y="402" fill="#64748b" font-size="14" text-anchor="middle">퇴직금의 일부</text>
  </g>

  <g>
    <rect x="440" y="170" width="320" height="280" rx="12" fill="#1a1f2b" stroke="#1e2433"/>
    <text x="600" y="240" fill="#94a3b8" font-size="18" text-anchor="middle">직원</text>
    <text x="600" y="320" fill="#fbbf24" font-size="56" font-weight="800" text-anchor="middle">6명</text>
    <text x="600" y="380" fill="#64748b" font-size="14" text-anchor="middle">대표 포함 7명</text>
    <text x="600" y="402" fill="#64748b" font-size="14" text-anchor="middle">사무실 한 칸짜리 회사</text>
  </g>

  <g>
    <rect x="800" y="170" width="320" height="280" rx="12" fill="#1a1f2b" stroke="#1e2433"/>
    <text x="960" y="240" fill="#94a3b8" font-size="18" text-anchor="middle">대표 나이</text>
    <text x="960" y="320" fill="#34d399" font-size="56" font-weight="800" text-anchor="middle">41세</text>
    <text x="960" y="380" fill="#64748b" font-size="14" text-anchor="middle">IMF로 직장 잃은</text>
    <text x="960" y="402" fill="#64748b" font-size="14" text-anchor="middle">바로 그 다음 해</text>
  </g>

  <text x="600" y="520" fill="#94a3b8" font-size="18" text-anchor="middle">"그 나이에 직장을 잃었다는 게 어떤 느낌인지 압니까."</text>
  <text x="600" y="550" fill="#64748b" font-size="14" text-anchor="middle">— 서정진, 본인 인터뷰</text>
</svg>
