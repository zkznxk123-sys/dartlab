<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>셀트리온 매출 10년</title>
  <desc>2016~2025 매출 0.67조 → 4.16조</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">셀트리온 매출 10년 (조원)</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">0.67조 → 4.16조 (6.2배). 2023 합병 직후 일시 -5%, 2024 +63%, 2025 +17%</text>

  <!-- bars 0.67 0.95 0.98 1.13 1.85 1.91 2.30 2.18 3.56 4.16 -->
  <!-- max 4.5, scale 1조=110px -->
  <g>
    <line x1="80" y1="540" x2="1140" y2="540" stroke="#475569" stroke-width="2"/>
    <rect x="100" y="466" width="90" height="74" fill="#22d3ee"/>
    <text x="145" y="456" fill="#22d3ee" font-size="13" text-anchor="middle">0.67</text>
    <rect x="200" y="436" width="90" height="104" fill="#22d3ee"/>
    <text x="245" y="426" fill="#22d3ee" font-size="13" text-anchor="middle">0.95</text>
    <rect x="300" y="432" width="90" height="108" fill="#22d3ee"/>
    <text x="345" y="422" fill="#22d3ee" font-size="13" text-anchor="middle">0.98</text>
    <rect x="400" y="416" width="90" height="124" fill="#22d3ee"/>
    <text x="445" y="406" fill="#22d3ee" font-size="13" text-anchor="middle">1.13</text>
    <rect x="500" y="337" width="90" height="203" fill="#22d3ee"/>
    <text x="545" y="327" fill="#22d3ee" font-size="13" text-anchor="middle">1.85</text>
    <rect x="600" y="330" width="90" height="210" fill="#22d3ee"/>
    <text x="645" y="320" fill="#22d3ee" font-size="13" text-anchor="middle">1.91</text>
    <rect x="700" y="287" width="90" height="253" fill="#22d3ee"/>
    <text x="745" y="277" fill="#22d3ee" font-size="13" text-anchor="middle">2.30</text>
    <!-- 2023 합병으로 일시 하락 -->
    <rect x="800" y="300" width="90" height="240" fill="#fbbf24"/>
    <text x="845" y="290" fill="#fbbf24" font-size="14" font-weight="800" text-anchor="middle">2.18</text>
    <rect x="900" y="148" width="90" height="392" fill="#22c55e"/>
    <text x="945" y="138" fill="#22c55e" font-size="14" font-weight="800" text-anchor="middle">3.56</text>
    <rect x="1000" y="84" width="90" height="456" fill="#22c55e" style="filter: drop-shadow(0 0 18px #22c55e88)"/>
    <text x="1045" y="74" fill="#22c55e" font-size="18" font-weight="900" text-anchor="middle">4.16</text>
  </g>

  <g fill="#94a3b8" font-size="13" text-anchor="middle">
    <text x="145" y="565">2016</text>
    <text x="245" y="565">2017</text>
    <text x="345" y="565">2018</text>
    <text x="445" y="565">2019</text>
    <text x="545" y="565">2020</text>
    <text x="645" y="565">2021</text>
    <text x="745" y="565">2022</text>
    <text x="845" y="565">2023</text>
    <text x="945" y="565">2024</text>
    <text x="1045" y="565">2025</text>
  </g>

  <!-- 합병 마커 -->
  <g>
    <line x1="845" y1="280" x2="845" y2="220" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="730" y="170" width="230" height="50" rx="8" fill="#fbbf2422" stroke="#fbbf24"/>
    <text x="845" y="195" fill="#fbbf24" font-size="13" text-anchor="middle" font-weight="800">2023.12.28 합병</text>
    <text x="845" y="212" fill="#94a3b8" font-size="11" text-anchor="middle">내부거래 1조7천억 → 0</text>
  </g>

  <text x="600" y="680" fill="#94a3b8" font-size="14" text-anchor="middle">합병 직후 2023년이 -5%로 일시 하락 — 그룹 내 거래가 통합되며 회계상 매출이 빠짐. 그 다음 해 +63% 폭발</text>
</svg>
