<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>서정진 25년 시간선</title>
  <desc>1957 청주 출생부터 2025 합병 후 매출 4.16조까지 한 사람의 시간선</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">서정진의 25년 — 한 사람의 시간선</text>
  <text x="60" y="92" fill="#94a3b8" font-size="18">1957 청주 → 1998 IMF 실직 41세 → 1999 5천만원 창업 → 2025 매출 4.16조</text>

  <line x1="80" y1="380" x2="1120" y2="380" stroke="#475569" stroke-width="3"/>

  <g stroke="#1e2433" stroke-width="2">
    <line x1="120" y1="370" x2="120" y2="390"/>
    <line x1="280" y1="370" x2="280" y2="390"/>
    <line x1="440" y1="370" x2="440" y2="390"/>
    <line x1="600" y1="370" x2="600" y2="390"/>
    <line x1="760" y1="370" x2="760" y2="390"/>
    <line x1="920" y1="370" x2="920" y2="390"/>
    <line x1="1080" y1="370" x2="1080" y2="390"/>
  </g>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="120" y="415">1957</text>
    <text x="280" y="415">1983</text>
    <text x="440" y="415">1998</text>
    <text x="600" y="415">2007</text>
    <text x="760" y="415">2012</text>
    <text x="920" y="415">2017</text>
    <text x="1080" y="415">2025</text>
  </g>

  <!-- 1957 출생 -->
  <g>
    <circle cx="120" cy="380" r="11" fill="#94a3b8" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="120" y1="365" x2="120" y2="240" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="40" y="170" width="200" height="68" rx="8" fill="#94a3b822" stroke="#94a3b8"/>
    <text x="140" y="195" fill="#94a3b8" font-size="13" text-anchor="middle" font-weight="700">1957.10.23</text>
    <text x="140" y="218" fill="#f1f5f9" font-size="14" text-anchor="middle">청주 출생</text>
  </g>

  <!-- 1998 IMF -->
  <g>
    <circle cx="440" cy="380" r="14" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="440" y1="365" x2="440" y2="240" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="350" y="170" width="200" height="84" rx="8" fill="#ef444422" stroke="#ef4444" stroke-width="2"/>
    <text x="450" y="195" fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700">1998 / 41세</text>
    <text x="450" y="218" fill="#f1f5f9" font-size="14" text-anchor="middle">IMF 실직</text>
    <text x="450" y="240" fill="#94a3b8" font-size="12" text-anchor="middle">대우자동차</text>
  </g>

  <!-- 1999 넥솔 -->
  <g>
    <circle cx="490" cy="380" r="14" fill="#22c55e" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="490" y1="395" x2="490" y2="500" stroke="#22c55e" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="380" y="500" width="220" height="100" rx="8" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
    <text x="490" y="525" fill="#22c55e" font-size="13" text-anchor="middle" font-weight="700">1999</text>
    <text x="490" y="548" fill="#f1f5f9" font-size="14" text-anchor="middle">넥솔 창업</text>
    <text x="490" y="570" fill="#94a3b8" font-size="12" text-anchor="middle">자본금 5천만원</text>
    <text x="490" y="588" fill="#94a3b8" font-size="12" text-anchor="middle">직원 6명</text>
  </g>

  <!-- 2007 램시마 시작 -->
  <g>
    <circle cx="600" cy="380" r="11" fill="#fbbf24" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="600" y1="365" x2="600" y2="240" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="540" y="170" width="180" height="68" rx="8" fill="#fbbf2422" stroke="#fbbf24"/>
    <text x="630" y="195" fill="#fbbf24" font-size="13" text-anchor="middle" font-weight="700">2007</text>
    <text x="630" y="218" fill="#f1f5f9" font-size="14" text-anchor="middle">램시마 임상 시작</text>
  </g>

  <!-- 2012 한국 출시 → 2013 EMA → 2016 FDA -->
  <g>
    <circle cx="760" cy="380" r="14" fill="#22d3ee" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="760" y1="395" x2="760" y2="500" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="660" y="500" width="200" height="100" rx="8" fill="#22d3ee22" stroke="#22d3ee" stroke-width="2"/>
    <text x="760" y="525" fill="#22d3ee" font-size="13" text-anchor="middle" font-weight="700">2012.08</text>
    <text x="760" y="548" fill="#f1f5f9" font-size="14" text-anchor="middle">램시마 한국 출시</text>
    <text x="760" y="570" fill="#94a3b8" font-size="11" text-anchor="middle">세계 최초</text>
    <text x="760" y="586" fill="#94a3b8" font-size="11" text-anchor="middle">항체 바이오시밀러</text>
  </g>

  <!-- 2017 공매도 전쟁 -->
  <g>
    <circle cx="920" cy="380" r="11" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
    <line x1="920" y1="365" x2="920" y2="240" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="830" y="170" width="190" height="68" rx="8" fill="#ef444422" stroke="#ef4444"/>
    <text x="925" y="195" fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700">2017</text>
    <text x="925" y="218" fill="#f1f5f9" font-size="14" text-anchor="middle">공매도 전쟁</text>
  </g>

  <!-- 2023 합병 → 2025 -->
  <g>
    <circle cx="1080" cy="380" r="18" fill="#22c55e" stroke="#0a0e1a" stroke-width="3" style="filter: drop-shadow(0 0 18px #22c55e)"/>
    <line x1="1080" y1="395" x2="1080" y2="500" stroke="#22c55e" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="980" y="500" width="200" height="100" rx="8" fill="#22c55e22" stroke="#22c55e" stroke-width="3"/>
    <text x="1080" y="525" fill="#22c55e" font-size="13" text-anchor="middle" font-weight="700">2023.12.28 → 2025</text>
    <text x="1080" y="548" fill="#f1f5f9" font-size="14" text-anchor="middle">합병 → 매출 4.16조</text>
    <text x="1080" y="570" fill="#94a3b8" font-size="11" text-anchor="middle">무형자산 13.78조</text>
    <text x="1080" y="586" fill="#94a3b8" font-size="11" text-anchor="middle">dCR-AA+</text>
  </g>

  <text x="600" y="680" fill="#94a3b8" font-size="14" text-anchor="middle" font-style="italic">"한 사람이 1999년 5천만원으로 시작한 회사가 2025년 매출 4.16조"</text>
</svg>
