<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>셀트리온헬스케어 공매도 잔고 36배 — 1년 만에 206억 → 7,312억</title>
  <desc>2017.08 206억 → 2018.08 7,312억. 셀트리온헬스케어 상장 1년 후 공매도 잔고 36배</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-size="34" font-weight="700">공매도 전쟁 — 1년 만에 36배</text>
  <text x="60" y="105" fill="#94a3b8" font-size="18">셀트리온헬스케어 공매도 잔고 (단위: 억원)</text>

  <!-- baseline -->
  <line x1="100" y1="600" x2="1140" y2="600" stroke="#1e2433" stroke-width="2"/>

  <!-- bar 1: 206 -->
  <rect x="240" y="592" width="160" height="8" fill="#94a3b8"/>
  <text x="320" y="640" fill="#94a3b8" font-size="20" text-anchor="middle">2017.08.30</text>
  <text x="320" y="665" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">206억</text>
  <text x="320" y="690" fill="#64748b" font-size="14" text-anchor="middle">상장 한 달 후</text>

  <!-- bar 2: 7312 -->
  <rect x="720" y="180" width="220" height="420" fill="#ea4647"/>
  <text x="830" y="640" fill="#94a3b8" font-size="20" text-anchor="middle">2018.08.28</text>
  <text x="830" y="665" fill="#ea4647" font-size="34" font-weight="700" text-anchor="middle">7,312억</text>
  <text x="830" y="690" fill="#64748b" font-size="14" text-anchor="middle">정확히 1년 후</text>

  <!-- arrow + multiplier -->
  <text x="600" y="380" fill="#fbbf24" font-size="58" font-weight="800" text-anchor="middle">×36</text>
  <text x="600" y="420" fill="#94a3b8" font-size="18" text-anchor="middle">베팅 규모가 36배가 되는 동안</text>
  <text x="600" y="445" fill="#94a3b8" font-size="18" text-anchor="middle">회사의 매출은 계속 성장 중이었다</text>

  <text x="60" y="160" fill="#64748b" font-size="13">출처: businesspost · 셀트리온헬스케어 공시 잔고</text>
</svg>
