<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2002~2007 — 셀트리온의 5년 피벗 (백신 → 부도 → BMS → 바이오시밀러)</title>
  <desc>셀트리온이 원래 무엇이었는지, 어떻게 살아남았는지의 5년</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="32" font-weight="700">셀트리온은 원래 에이즈 백신 회사였다</text>
  <text x="60" y="92" fill="#94a3b8" font-size="17">2002~2007 — 회사를 두 번 죽일 뻔했고 한 번 살린 5년</text>

  <!-- 4 cards horizontal -->
  <!-- Card 1: 2002 백신 합작 -->
  <g>
    <rect x="50" y="150" width="270" height="430" rx="12" fill="#1a1f2b" stroke="#1e2433"/>
    <text x="185" y="195" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">2002.06</text>
    <text x="185" y="240" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">백신 합작</text>
    <text x="185" y="295" fill="#fbbf24" font-size="32" font-weight="800" text-anchor="middle">2,400억</text>
    <text x="185" y="320" fill="#94a3b8" font-size="13" text-anchor="middle">송도 1공장 5만 리터</text>
    <text x="185" y="365" fill="#cbd5e1" font-size="13" text-anchor="middle">미국 백스젠과</text>
    <text x="185" y="385" fill="#cbd5e1" font-size="13" text-anchor="middle">VCI 합작 설립</text>
    <text x="185" y="425" fill="#cbd5e1" font-size="13" text-anchor="middle">에이즈 백신</text>
    <text x="185" y="445" fill="#cbd5e1" font-size="13" text-anchor="middle">'에이즈백스' CMO</text>
    <text x="185" y="510" fill="#64748b" font-size="12" text-anchor="middle">5천만원으로 시작한</text>
    <text x="185" y="528" fill="#64748b" font-size="12" text-anchor="middle">회사가 3년 만에</text>
    <text x="185" y="546" fill="#64748b" font-size="12" text-anchor="middle">2,400억을 동원</text>
  </g>

  <!-- arrow -->
  <text x="345" y="375" fill="#64748b" font-size="36" text-anchor="middle">→</text>

  <!-- Card 2: 2003 임상 실패 -->
  <g>
    <rect x="370" y="150" width="270" height="430" rx="12" fill="#1a1f2b" stroke="#ea4647" stroke-width="2"/>
    <text x="505" y="195" fill="#ea4647" font-size="18" font-weight="700" text-anchor="middle">2003.11</text>
    <text x="505" y="240" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">임상 실패</text>
    <text x="505" y="295" fill="#ea4647" font-size="36" font-weight="800" text-anchor="middle">0</text>
    <text x="505" y="320" fill="#94a3b8" font-size="13" text-anchor="middle">주문 받을 약</text>
    <text x="505" y="365" fill="#cbd5e1" font-size="13" text-anchor="middle">백스젠 태국 3상</text>
    <text x="505" y="385" fill="#cbd5e1" font-size="13" text-anchor="middle">백신 효능 입증 실패</text>
    <text x="505" y="425" fill="#ea4647" font-size="13" text-anchor="middle">2004.08</text>
    <text x="505" y="445" fill="#cbd5e1" font-size="13" text-anchor="middle">백스젠 나스닥 퇴출</text>
    <text x="505" y="510" fill="#64748b" font-size="12" text-anchor="middle">송도엔 거의 완공된</text>
    <text x="505" y="528" fill="#64748b" font-size="12" text-anchor="middle">5만 리터 공장</text>
    <text x="505" y="546" fill="#fbbf24" font-size="12" text-anchor="middle">서정진의 두 번째 절벽</text>
  </g>

  <!-- arrow -->
  <text x="665" y="375" fill="#64748b" font-size="36" text-anchor="middle">→</text>

  <!-- Card 3: 2005 BMS -->
  <g>
    <rect x="690" y="150" width="270" height="430" rx="12" fill="#1a1f2b" stroke="#34d399" stroke-width="2"/>
    <text x="825" y="195" fill="#34d399" font-size="18" font-weight="700" text-anchor="middle">2005</text>
    <text x="825" y="240" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">기사회생</text>
    <text x="825" y="295" fill="#34d399" font-size="32" font-weight="800" text-anchor="middle">$20억</text>
    <text x="825" y="320" fill="#94a3b8" font-size="13" text-anchor="middle">10년 BMS 위탁생산</text>
    <text x="825" y="365" fill="#cbd5e1" font-size="13" text-anchor="middle">류마티스 치료제</text>
    <text x="825" y="385" fill="#cbd5e1" font-size="13" text-anchor="middle">'오렌시아' CMO 계약</text>
    <text x="825" y="425" fill="#cbd5e1" font-size="13" text-anchor="middle">송도 공장이 살았고</text>
    <text x="825" y="445" fill="#cbd5e1" font-size="13" text-anchor="middle">셀트리온이 살았다</text>
    <text x="825" y="510" fill="#64748b" font-size="12" text-anchor="middle">미국 빅파마 약을</text>
    <text x="825" y="528" fill="#64748b" font-size="12" text-anchor="middle">만들어 주면서</text>
    <text x="825" y="546" fill="#64748b" font-size="12" text-anchor="middle">항체 노하우 축적</text>
  </g>

  <!-- arrow -->
  <text x="985" y="375" fill="#64748b" font-size="36" text-anchor="middle">→</text>

  <!-- Card 4: 2007 자체 -->
  <g>
    <rect x="1010" y="150" width="160" height="430" rx="12" fill="#1a1f2b" stroke="#fbbf24" stroke-width="2"/>
    <text x="1090" y="195" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">2007</text>
    <text x="1090" y="240" fill="#f1f5f9" font-size="20" font-weight="800" text-anchor="middle">자체 개발</text>
    <text x="1090" y="295" fill="#fbbf24" font-size="22" font-weight="800" text-anchor="middle">램시마</text>
    <text x="1090" y="320" fill="#94a3b8" font-size="12" text-anchor="middle">임상 시작</text>
    <text x="1090" y="380" fill="#cbd5e1" font-size="12" text-anchor="middle">"이제 우리</text>
    <text x="1090" y="398" fill="#cbd5e1" font-size="12" text-anchor="middle">약을 만들자"</text>
    <text x="1090" y="510" fill="#64748b" font-size="11" text-anchor="middle">5년 뒤</text>
    <text x="1090" y="528" fill="#64748b" font-size="11" text-anchor="middle">2012 한국 승인</text>
    <text x="1090" y="546" fill="#64748b" font-size="11" text-anchor="middle">9년 뒤 미국 FDA</text>
  </g>

  <text x="600" y="650" fill="#94a3b8" font-size="16" text-anchor="middle">"이 5년이 다르게 끝났다면, 오늘 매출 4조원의 회사는 존재하지 않는다."</text>
  <text x="60" y="700" fill="#64748b" font-size="13">출처: 데일리팜 BMS 위탁생산 / 전자신문 셀트리온 15주년 / 기호일보 외환위기 20년 / HIV i-Base AIDSVAX</text>
</svg>
