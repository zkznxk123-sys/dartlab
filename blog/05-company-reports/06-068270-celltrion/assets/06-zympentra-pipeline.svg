<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>램시마 IV → 짐펜트라 SC — 다음 결정점</title>
  <desc>정맥주사에서 피하주사로, 병원 처방에서 자가주사로</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-size="32" font-weight="700">다음 결정점 — 짐펜트라 (Zymfentra)</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">2024년 미국 FDA 승인. 셀트리온이 직접 판매하는 첫 항체 의약품.</text>

  <!-- left card: 램시마 -->
  <rect x="80" y="160" width="450" height="340" rx="12" fill="#1a1f2b" stroke="#1e2433"/>
  <text x="305" y="210" fill="#94a3b8" font-size="20" font-weight="700" text-anchor="middle">2012~2023</text>
  <text x="305" y="250" fill="#f1f5f9" font-size="36" font-weight="800" text-anchor="middle">램시마 (Remsima)</text>
  <text x="305" y="290" fill="#94a3b8" font-size="18" text-anchor="middle">정맥주사 (IV)</text>
  <text x="305" y="335" fill="#cbd5e1" font-size="15" text-anchor="middle">병원에서 1~2시간 주사</text>
  <text x="305" y="360" fill="#cbd5e1" font-size="15" text-anchor="middle">미국 판매: 화이자 (인플렉트라)</text>
  <text x="305" y="385" fill="#cbd5e1" font-size="15" text-anchor="middle">셀트리온은 공급만 담당</text>
  <text x="305" y="445" fill="#64748b" font-size="14" text-anchor="middle">5년 공매도 전쟁의</text>
  <text x="305" y="465" fill="#64748b" font-size="14" text-anchor="middle">"내부거래" 비판 대상</text>

  <!-- arrow -->
  <text x="600" y="345" fill="#fbbf24" font-size="60" text-anchor="middle">→</text>

  <!-- right card: 짐펜트라 -->
  <rect x="670" y="160" width="450" height="340" rx="12" fill="#1a1f2b" stroke="#ea4647" stroke-width="2"/>
  <text x="895" y="210" fill="#ea4647" font-size="20" font-weight="700" text-anchor="middle">2024~</text>
  <text x="895" y="250" fill="#f1f5f9" font-size="36" font-weight="800" text-anchor="middle">짐펜트라 (Zymfentra)</text>
  <text x="895" y="290" fill="#94a3b8" font-size="18" text-anchor="middle">피하주사 (SC)</text>
  <text x="895" y="335" fill="#cbd5e1" font-size="15" text-anchor="middle">집에서 자가 주사</text>
  <text x="895" y="360" fill="#cbd5e1" font-size="15" text-anchor="middle">미국 판매: 셀트리온 직접</text>
  <text x="895" y="385" fill="#cbd5e1" font-size="15" text-anchor="middle">유통 마진까지 회사가 가져감</text>
  <text x="895" y="445" fill="#fbbf24" font-size="14" text-anchor="middle">2026 분기 1,500억 자리잡으면</text>
  <text x="895" y="465" fill="#fbbf24" font-size="14" text-anchor="middle">매출 6조원대 진입</text>

  <text x="60" y="560" fill="#64748b" font-size="13">출처: FDA 승인 발표 · 셀트리온 IR</text>
</svg>
