<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="48" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">한화에어로스페이스 72년 — 폭약에서 우주까지</text>
  <text x="600" y="74" font-size="13" fill="#64748b" text-anchor="middle">dartlab Company("012450") | 1952 ~ 2026</text>

  <!-- Timeline main line -->
  <line x1="80" y1="200" x2="1120" y2="200" stroke="#334155" stroke-width="3"/>

  <!-- Era labels -->
  <text x="200" y="140" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">폭약</text>
  <text x="390" y="140" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">화약·건설</text>
  <text x="600" y="140" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">방산 진출</text>
  <text x="810" y="140" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">K방산 수출</text>
  <text x="1040" y="140" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="600">우주</text>

  <!-- Era background bars -->
  <rect x="80" y="155" width="220" height="90" rx="6" fill="#ef4444" opacity="0.08"/>
  <rect x="300" y="155" width="180" height="90" rx="6" fill="#fbbf24" opacity="0.08"/>
  <rect x="480" y="155" width="240" height="90" rx="6" fill="#22c55e" opacity="0.08"/>
  <rect x="720" y="155" width="220" height="90" rx="6" fill="#3b82f6" opacity="0.08"/>
  <rect x="940" y="155" width="180" height="90" rx="6" fill="#22d3ee" opacity="0.08"/>

  <!-- Node 1: 1952 -->
  <circle cx="120" cy="200" r="12" fill="#ef4444" filter="url(#glow)"/>
  <text x="120" y="180" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">1952</text>
  <text x="120" y="230" font-size="11" fill="#cbd5e1" text-anchor="middle">한국화약 설립</text>
  <text x="120" y="246" font-size="10" fill="#94a3b8" text-anchor="middle">전쟁 중 군납 화약</text>

  <!-- Node 2: 1977 -->
  <circle cx="280" cy="200" r="12" fill="#ef4444" filter="url(#glow)"/>
  <text x="280" y="180" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">1977</text>
  <text x="280" y="230" font-size="11" fill="#cbd5e1" text-anchor="middle">이리역 폭발</text>
  <text x="280" y="246" font-size="10" fill="#ef4444" text-anchor="middle">59명 사망</text>

  <!-- Node 3: 1981 -->
  <circle cx="390" cy="200" r="10" fill="#fbbf24"/>
  <text x="390" y="180" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">1981</text>
  <text x="390" y="230" font-size="11" fill="#cbd5e1" text-anchor="middle">김승연 회장 취임</text>
  <text x="390" y="246" font-size="10" fill="#94a3b8" text-anchor="middle">29세, 2대 회장</text>

  <!-- Node 4: 1998 -->
  <circle cx="540" cy="200" r="12" fill="#22c55e" filter="url(#glow)"/>
  <text x="540" y="180" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">1998</text>
  <text x="540" y="230" font-size="11" fill="#cbd5e1" text-anchor="middle">K9 자주포 실전 배치</text>
  <text x="540" y="246" font-size="10" fill="#94a3b8" text-anchor="middle">155mm, 사거리 40km+</text>

  <!-- Node 5: 2014 -->
  <circle cx="680" cy="200" r="12" fill="#3b82f6" filter="url(#glow)"/>
  <text x="680" y="180" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">2014</text>
  <text x="680" y="230" font-size="11" fill="#cbd5e1" text-anchor="middle">삼성테크윈 인수</text>
  <text x="680" y="246" font-size="10" fill="#3b82f6" text-anchor="middle">8,400억원</text>

  <!-- Node 6: 2022 -->
  <circle cx="860" cy="200" r="14" fill="#22c55e" filter="url(#glow)"/>
  <text x="860" y="178" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">2022</text>
  <text x="860" y="230" font-size="11" fill="#cbd5e1" text-anchor="middle">폴란드 K방산 계약</text>
  <text x="860" y="246" font-size="10" fill="#22c55e" text-anchor="middle">K9 672문 + 천무 288문</text>

  <!-- Node 7: 2025 -->
  <circle cx="1000" cy="200" r="12" fill="#22d3ee" filter="url(#glow)"/>
  <text x="1000" y="180" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">2025</text>
  <text x="1000" y="230" font-size="11" fill="#cbd5e1" text-anchor="middle">매출 26.6조</text>
  <text x="1000" y="246" font-size="10" fill="#22d3ee" text-anchor="middle">수주잔고 37.2조</text>

  <!-- Node 8: Future -->
  <circle cx="1100" cy="200" r="10" fill="#22d3ee" opacity="0.5"/>
  <text x="1100" y="180" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">2026~</text>
  <text x="1100" y="230" font-size="11" fill="#94a3b8" text-anchor="middle">누리호 + 우주</text>

  <!-- Bottom section: Key metrics cards -->
  <rect x="60" y="310" width="250" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="185" y="340" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">성장성 A</text>
  <text x="185" y="370" font-size="28" font-weight="800" fill="#f1f5f9" text-anchor="middle">CAGR 56.5%</text>
  <text x="185" y="395" font-size="12" fill="#94a3b8" text-anchor="middle">매출 3년 연평균 성장률</text>
  <line x1="110" y1="415" x2="260" y2="415" stroke="#334155" stroke-width="1"/>
  <text x="185" y="440" font-size="12" fill="#cbd5e1" text-anchor="middle">2021 2.0조 → 2025 8.4조</text>
  <text x="185" y="458" font-size="11" fill="#94a3b8" text-anchor="middle">4.2배 증가</text>

  <rect x="340" y="310" width="250" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="465" y="340" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">안정성 F</text>
  <text x="465" y="370" font-size="28" font-weight="800" fill="#f1f5f9" text-anchor="middle">부채비율 221%</text>
  <text x="465" y="395" font-size="12" fill="#94a3b8" text-anchor="middle">Altman Z-Score 0.71 (부실 위험)</text>
  <line x1="390" y1="415" x2="540" y2="415" stroke="#334155" stroke-width="1"/>
  <text x="465" y="440" font-size="12" fill="#cbd5e1" text-anchor="middle">But: 금융차입 0%, 순현금</text>
  <text x="465" y="458" font-size="11" fill="#fbbf24" text-anchor="middle">부채 = 수주 선수금 + 계약부채</text>

  <rect x="620" y="310" width="250" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="745" y="340" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">수주잔고</text>
  <text x="745" y="370" font-size="28" font-weight="800" fill="#f1f5f9" text-anchor="middle">37.2조원</text>
  <text x="745" y="395" font-size="12" fill="#94a3b8" text-anchor="middle">4~5년치 매출 확보</text>
  <line x1="670" y1="415" x2="820" y2="415" stroke="#334155" stroke-width="1"/>
  <text x="745" y="440" font-size="12" fill="#cbd5e1" text-anchor="middle">수출 비중 71%</text>
  <text x="745" y="458" font-size="11" fill="#94a3b8" text-anchor="middle">폴란드 · 호주 · 베트남 · 루마니아</text>

  <rect x="900" y="310" width="250" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1025" y="340" font-size="13" font-weight="700" fill="#22d3ee" text-anchor="middle">K9 글로벌</text>
  <text x="1025" y="370" font-size="28" font-weight="800" fill="#f1f5f9" text-anchor="middle">점유율 52%</text>
  <text x="1025" y="395" font-size="12" fill="#94a3b8" text-anchor="middle">세계 155mm 자주포 시장</text>
  <line x1="950" y1="415" x2="1100" y2="415" stroke="#334155" stroke-width="1"/>
  <text x="1025" y="440" font-size="12" fill="#cbd5e1" text-anchor="middle">600문+ 수출 (10개국+)</text>
  <text x="1025" y="458" font-size="11" fill="#94a3b8" text-anchor="middle">PzH 2000, CAESAR 압도</text>

  <!-- Bottom caption -->
  <text x="600" y="530" font-size="11" fill="#475569" text-anchor="middle">핵심 질문: 폭약회사가 어떻게 K방산의 핵심이 됐고, CAGR 56% 이면에 Z-Score 0.71은 왜 존재하는가?</text>

  <!-- Revenue growth bar chart (small) -->
  <text x="130" y="575" font-size="12" font-weight="700" fill="#94a3b8">매출 추이 (조원)</text>

  <!-- Bars -->
  <rect x="130" y="655" width="50" height="18" rx="3" fill="#334155"/><text x="155" y="668" font-size="9" fill="#94a3b8" text-anchor="middle">1.6</text>
  <text x="155" y="695" font-size="9" fill="#64748b" text-anchor="middle">2018</text>

  <rect x="200" y="652" width="50" height="21" rx="3" fill="#334155"/><text x="225" y="667" font-size="9" fill="#94a3b8" text-anchor="middle">1.7</text>
  <text x="225" y="695" font-size="9" fill="#64748b" text-anchor="middle">2020</text>

  <rect x="270" y="648" width="50" height="25" rx="3" fill="#334155"/><text x="295" y="665" font-size="9" fill="#94a3b8" text-anchor="middle">2.0</text>
  <text x="295" y="695" font-size="9" fill="#64748b" text-anchor="middle">2021</text>

  <rect x="340" y="635" width="50" height="38" rx="3" fill="#3b82f6" opacity="0.7"/><text x="365" y="658" font-size="9" fill="#f1f5f9" text-anchor="middle">3.4</text>
  <text x="365" y="695" font-size="9" fill="#64748b" text-anchor="middle">2023</text>

  <rect x="410" y="618" width="50" height="55" rx="3" fill="#3b82f6" opacity="0.8"/><text x="435" y="650" font-size="9" fill="#f1f5f9" text-anchor="middle">4.8</text>
  <text x="435" y="695" font-size="9" fill="#64748b" text-anchor="middle">2024</text>

  <rect x="480" y="580" width="50" height="93" rx="3" fill="#22c55e" filter="url(#glow)"/><text x="505" y="630" font-size="11" fill="#f1f5f9" text-anchor="middle" font-weight="700">8.4</text>
  <text x="505" y="695" font-size="9" fill="#f1f5f9" text-anchor="middle" font-weight="600">2025</text>

  <!-- CAGR arrow -->
  <text x="570" y="625" font-size="18" font-weight="800" fill="#22c55e">CAGR 56.5%</text>
  <text x="570" y="645" font-size="11" fill="#94a3b8">3년 연평균 성장률</text>

  <!-- Score badges -->
  <text x="830" y="575" font-size="12" font-weight="700" fill="#94a3b8">dartlab 스코어카드</text>

  <rect x="830" y="590" width="70" height="30" rx="6" fill="#22c55e" opacity="0.15"/>
  <text x="865" y="610" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">성장 A</text>

  <rect x="910" y="590" width="70" height="30" rx="6" fill="#22c55e" opacity="0.15"/>
  <text x="945" y="610" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">수익 A</text>

  <rect x="990" y="590" width="70" height="30" rx="6" fill="#22c55e" opacity="0.15"/>
  <text x="1025" y="610" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">CF A</text>

  <rect x="1070" y="590" width="70" height="30" rx="6" fill="#22c55e" opacity="0.15"/>
  <text x="1105" y="610" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">품질 A</text>

  <rect x="830" y="630" width="70" height="30" rx="6" fill="#ef4444" opacity="0.15"/>
  <text x="865" y="650" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">안정 F</text>

  <rect x="910" y="630" width="70" height="30" rx="6" fill="#fbbf24" opacity="0.15"/>
  <text x="945" y="650" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">효율 C</text>

  <rect x="990" y="630" width="70" height="30" rx="6" fill="#fbbf24" opacity="0.15"/>
  <text x="1025" y="650" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">투자 C</text>

  <rect x="1070" y="630" width="70" height="30" rx="6" fill="#fbbf24" opacity="0.15"/>
  <text x="1105" y="650" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">정합 C</text>
</svg>