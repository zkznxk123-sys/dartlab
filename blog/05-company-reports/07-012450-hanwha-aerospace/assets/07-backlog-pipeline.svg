<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgBL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bgBL)"/>

  <text x="600" y="45" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">수주잔고 37.2조 → 매출 전환 파이프라인</text>
  <text x="600" y="70" font-size="13" fill="#64748b" text-anchor="middle">방산은 주문 후 3~5년에 걸쳐 납품 | 수출 비중 71%</text>

  <!-- Pipeline flow -->
  <rect x="60" y="110" width="1080" height="90" rx="16" fill="#1e293b" stroke="url(#pipeGrad)" stroke-width="2"/>

  <!-- Stage 1: Order -->
  <rect x="80" y="125" width="230" height="60" rx="10" fill="#3b82f6" opacity="0.15"/>
  <text x="195" y="150" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">수주 계약</text>
  <text x="195" y="170" font-size="11" fill="#94a3b8" text-anchor="middle">선수금 수령 → 계약부채 발생</text>

  <text x="325" y="158" font-size="20" fill="#475569">→</text>

  <!-- Stage 2: Production -->
  <rect x="350" y="125" width="230" height="60" rx="10" fill="#22d3ee" opacity="0.15"/>
  <text x="465" y="150" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="middle">생산 (2~4년)</text>
  <text x="465" y="170" font-size="11" fill="#94a3b8" text-anchor="middle">부품 조달 → 조립 → 시험</text>

  <text x="595" y="158" font-size="20" fill="#475569">→</text>

  <!-- Stage 3: Delivery -->
  <rect x="620" y="125" width="230" height="60" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="735" y="150" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">납품</text>
  <text x="735" y="170" font-size="11" fill="#94a3b8" text-anchor="middle">계약부채 → 매출 전환</text>

  <text x="865" y="158" font-size="20" fill="#475569">→</text>

  <!-- Stage 4: Revenue -->
  <rect x="890" y="125" width="230" height="60" rx="10" fill="#fbbf24" opacity="0.15"/>
  <text x="1005" y="150" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">매출 인식 + 대금 수령</text>
  <text x="1005" y="170" font-size="11" fill="#94a3b8" text-anchor="middle">부채 감소 → 현금 유입</text>

  <!-- Key insight -->
  <rect x="320" y="220" width="560" height="40" rx="8" fill="#fbbf24" opacity="0.08" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="246" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="700">수주 ↑ → 선수금(부채) ↑ → 생산 → 납품 → 부채 ↓ + 매출 ↑</text>

  <!-- Backlog breakdown -->
  <text x="60" y="305" font-size="16" font-weight="700" fill="#f1f5f9">수주잔고 37.2조 구성</text>

  <!-- Main bar -->
  <rect x="60" y="325" width="740" height="55" rx="8" fill="#3b82f6" opacity="0.4"/>
  <text x="430" y="358" font-size="16" font-weight="800" fill="#f1f5f9" text-anchor="middle">수출 71% — 폴란드 · 호주 · 베트남 · 루마니아 · 이집트 등</text>

  <rect x="800" y="325" width="300" height="55" rx="8" fill="#94a3b8" opacity="0.2"/>
  <text x="950" y="358" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle">내수 29%</text>

  <!-- Yearly conversion estimate -->
  <text x="60" y="430" font-size="16" font-weight="700" fill="#f1f5f9">연도별 매출 전환 추정</text>

  <!-- Year bars -->
  <text x="130" y="470" font-size="13" fill="#94a3b8" text-anchor="middle">2025 (실적)</text>
  <rect x="60" y="480" width="840" height="40" rx="6" fill="#22c55e" opacity="0.3"/>
  <text x="480" y="505" font-size="16" font-weight="800" fill="#22c55e" text-anchor="middle">8.4조 (분기 연환산) / 연결 26.6조</text>

  <text x="130" y="545" font-size="13" fill="#94a3b8" text-anchor="middle">2026E</text>
  <rect x="60" y="555" width="900" height="35" rx="6" fill="#3b82f6" opacity="0.25"/>
  <text x="510" y="577" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">수주잔고 기반 성장 지속 예상</text>

  <text x="130" y="610" font-size="13" fill="#94a3b8" text-anchor="middle">2027E</text>
  <rect x="60" y="620" width="950" height="35" rx="6" fill="#3b82f6" opacity="0.2"/>
  <text x="535" y="642" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">폴란드 2차 물량 + 루마니아/호주 신규</text>

  <text x="130" y="675" font-size="13" fill="#94a3b8" text-anchor="middle">2028~29E</text>
  <rect x="60" y="685" width="700" height="25" rx="6" fill="#fbbf24" opacity="0.15"/>
  <text x="410" y="703" font-size="12" fill="#fbbf24" text-anchor="middle">수주잔고 소진 → 신규 수주 확보 여부가 관건</text>

  <!-- Right side: CCC explanation -->
  <rect x="720" y="415" width="380" height="240" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="910" y="448" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">CCC 254일 — 왜 이렇게 긴가</text>

  <text x="745" y="480" font-size="12" fill="#94a3b8">재고 회전일</text>
  <text x="1070" y="480" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="end">418일</text>
  <text x="745" y="500" font-size="10" fill="#64748b">자주포 1문 생산에 1년+</text>

  <line x1="745" y1="510" x2="1070" y2="510" stroke="#334155" stroke-width="1"/>

  <text x="745" y="530" font-size="12" fill="#94a3b8">매출채권 회전일</text>
  <text x="1070" y="530" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="end">162일</text>
  <text x="745" y="550" font-size="10" fill="#64748b">납품 후 대금 회수까지 5개월+</text>

  <line x1="745" y1="560" x2="1070" y2="560" stroke="#334155" stroke-width="1"/>

  <text x="745" y="580" font-size="12" fill="#94a3b8">매입채무 회전일</text>
  <text x="1070" y="580" font-size="16" font-weight="700" fill="#22c55e" text-anchor="end">-326일</text>
  <text x="745" y="600" font-size="10" fill="#64748b">하청업체 결제를 늦추는 구조</text>

  <line x1="745" y1="615" x2="1070" y2="615" stroke="#fbbf24" stroke-width="1"/>

  <text x="745" y="638" font-size="14" fill="#fbbf24" font-weight="700">= CCC 254일</text>
  <text x="1070" y="638" font-size="12" fill="#94a3b8" text-anchor="end">방산업 특성상 구조적으로 긴 순환</text>
</svg>