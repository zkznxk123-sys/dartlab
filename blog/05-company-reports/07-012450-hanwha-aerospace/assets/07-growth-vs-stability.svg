<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgG2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="720" fill="url(#bgG2)"/>

  <!-- Title -->
  <text x="540" y="45" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">성장성 A vs 안정성 F — 같은 회사의 두 얼굴</text>
  <text x="540" y="70" font-size="13" fill="#64748b" text-anchor="middle">한화에어로스페이스 (012450) | c.analysis("financial", "종합평가")</text>

  <!-- Left panel: Growth A -->
  <rect x="40" y="100" width="480" height="280" rx="16" fill="#0f2e1a" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="280" y="135" font-size="18" font-weight="800" fill="#22c55e" text-anchor="middle">성장성 A</text>

  <text x="80" y="170" font-size="13" fill="#94a3b8">매출 3년 CAGR</text>
  <text x="420" y="170" font-size="22" font-weight="800" fill="#22c55e" text-anchor="end">56.5%</text>

  <text x="80" y="200" font-size="13" fill="#94a3b8">2025 매출 (분기 연환산)</text>
  <text x="420" y="200" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="end">8.4조</text>

  <text x="80" y="230" font-size="13" fill="#94a3b8">수주잔고</text>
  <text x="420" y="230" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="end">37.2조</text>

  <text x="80" y="260" font-size="13" fill="#94a3b8">영업CF</text>
  <text x="420" y="260" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="end">4.1조</text>

  <text x="80" y="290" font-size="13" fill="#94a3b8">FCF</text>
  <text x="420" y="290" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="end">3.2조</text>

  <text x="80" y="320" font-size="13" fill="#94a3b8">영업CF/순이익</text>
  <text x="420" y="320" font-size="22" font-weight="800" fill="#22c55e" text-anchor="end">416%</text>

  <text x="80" y="360" font-size="11" fill="#22c55e">이익보다 4배 많은 현금이 들어오는 회사</text>

  <!-- Right panel: Stability F -->
  <rect x="560" y="100" width="480" height="280" rx="16" fill="#2e0f0f" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <text x="800" y="135" font-size="18" font-weight="800" fill="#ef4444" text-anchor="middle">안정성 F</text>

  <text x="600" y="170" font-size="13" fill="#94a3b8">부채비율</text>
  <text x="940" y="170" font-size="22" font-weight="800" fill="#ef4444" text-anchor="end">221%</text>

  <text x="600" y="200" font-size="13" fill="#94a3b8">Altman Z-Score</text>
  <text x="940" y="200" font-size="22" font-weight="800" fill="#ef4444" text-anchor="end">0.71</text>

  <text x="600" y="230" font-size="13" fill="#94a3b8">이자보상배율</text>
  <text x="940" y="230" font-size="22" font-weight="800" fill="#fbbf24" text-anchor="end">2.8배</text>

  <text x="600" y="260" font-size="13" fill="#94a3b8">CCC (현금전환주기)</text>
  <text x="940" y="260" font-size="22" font-weight="800" fill="#fbbf24" text-anchor="end">254일</text>

  <text x="600" y="290" font-size="13" fill="#94a3b8">부채총계</text>
  <text x="940" y="290" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="end">37.2조</text>

  <text x="600" y="320" font-size="13" fill="#94a3b8">부채 3기 연속 증가</text>
  <text x="940" y="320" font-size="22" font-weight="800" fill="#ef4444" text-anchor="end">+16%</text>

  <text x="600" y="360" font-size="11" fill="#ef4444">Z-Score 기준 "부실 위험 구간"</text>

  <!-- VS divider -->
  <circle cx="540" cy="240" r="28" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="540" y="248" font-size="18" font-weight="800" fill="#fbbf24" text-anchor="middle">VS</text>

  <!-- Bottom: The Truth -->
  <rect x="40" y="420" width="1000" height="260" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <text x="540" y="460" font-size="18" font-weight="800" fill="#fbbf24" text-anchor="middle">모순의 정체: 부채의 구조가 다르다</text>

  <!-- Debt composition -->
  <text x="80" y="500" font-size="14" font-weight="700" fill="#f1f5f9">자금 원천 구성 (2025)</text>

  <!-- Stacked bar -->
  <rect x="80" y="520" width="110" height="40" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="135" y="545" font-size="11" fill="#f1f5f9" text-anchor="middle" font-weight="600">내부유보 11%</text>

  <rect x="195" y="520" width="60" height="40" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="225" y="545" font-size="11" fill="#f1f5f9" text-anchor="middle" font-weight="600">주주 6%</text>

  <rect x="260" y="520" width="8" height="40" rx="4" fill="#94a3b8" opacity="0.3"/>

  <rect x="273" y="520" width="300" height="40" rx="4" fill="#fbbf24" opacity="0.4"/>
  <text x="423" y="545" font-size="13" fill="#f1f5f9" text-anchor="middle" font-weight="700">영업조달 (선수금·계약부채) 30%</text>

  <rect x="578" y="520" width="8" height="40" rx="4" fill="#ef4444" opacity="0.0"/>

  <!-- Arrow pointing to operational debt -->
  <text x="423" y="585" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">금융차입 0% — 은행 빚이 아니라 고객 선수금</text>

  <!-- Key insight boxes -->
  <rect x="80" y="610" width="280" height="55" rx="8" fill="#0f2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="632" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">수주 ↑ → 선수금 ↑ → 부채 ↑</text>
  <text x="220" y="652" font-size="11" fill="#94a3b8" text-anchor="middle">사업이 잘 돼서 높아진 부채</text>

  <rect x="400" y="610" width="280" height="55" rx="8" fill="#2e1f0f" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="632" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">한화오션 연결 = 조선업 부채 합산</text>
  <text x="540" y="652" font-size="11" fill="#94a3b8" text-anchor="middle">별도 vs 연결 괴리</text>

  <rect x="720" y="610" width="280" height="55" rx="8" fill="#2e0f0f" stroke="#ef4444" stroke-width="1"/>
  <text x="860" y="632" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">진짜 리스크: 수주 소화 실패</text>
  <text x="860" y="652" font-size="11" fill="#94a3b8" text-anchor="middle">37조를 제때 납품하지 못할 경우</text>
</svg>