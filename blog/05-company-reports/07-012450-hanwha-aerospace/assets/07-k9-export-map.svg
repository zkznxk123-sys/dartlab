  <text x="480" y="548" font-size="11" fill="#22d3ee">2025 확정</text>

  <rect x="660" y="480" width="180" height="100" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
