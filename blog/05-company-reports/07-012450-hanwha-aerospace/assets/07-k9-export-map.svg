  <text x="770" y="408" font-size="11" fill="#94a3b8">2017 계약</text>

  <rect x="980" y="340" width="170" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1000" y="368" font-size="14" font-weight="700" fill="#cbd5e1">호주</text>
  <text x="1130" y="368" font-size="14" font-weight="800" fill="#f1f5f9" text-anchor="end">30문+</text>
  <text x="1000" y="390" font-size="11" fill="#94a3b8">AS9 Huntsman</text>
  <text x="1000" y="408" font-size="11" fill="#94a3b8">현지생산 계획</text>

