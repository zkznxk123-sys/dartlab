<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="glowM">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="820" fill="url(#bgM)"/>

  <text x="600" y="45" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">K9 자주포 — 세계 155mm 시장 점유율 52%</text>
  <text x="600" y="70" font-size="13" fill="#64748b" text-anchor="middle">10개국+ 수출, 600문+ 납품·계약 | SIPRI 2023</text>

  <!-- Market share donut (simplified) -->
  <circle cx="200" cy="200" r="90" fill="none" stroke="#22c55e" stroke-width="25" stroke-dasharray="283 261" transform="rotate(-90 200 200)"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="#334155" stroke-width="25" stroke-dasharray="261 283" stroke-dashoffset="-283" transform="rotate(-90 200 200)"/>
  <text x="200" y="192" font-size="36" font-weight="800" fill="#22c55e" text-anchor="middle">52%</text>
  <text x="200" y="218" font-size="13" fill="#94a3b8" text-anchor="middle">세계 시장 점유율</text>

  <!-- Competitors -->
  <text x="340" y="145" font-size="12" fill="#94a3b8">비교 (수출량 기준)</text>
  <rect x="340" y="155" width="200" height="28" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="350" y="174" font-size="12" fill="#22c55e" font-weight="600">K9 (한국): 600문+</text>
  <rect x="340" y="190" width="100" height="28" rx="4" fill="#334155"/>
  <text x="350" y="209" font-size="12" fill="#94a3b8">CAESAR (프랑스): ~300문</text>
  <rect x="340" y="225" width="40" height="28" rx="4" fill="#334155"/>
  <text x="350" y="244" font-size="12" fill="#94a3b8">PzH 2000 (독일): ~120문</text>

  <!-- Export country cards -->
  <text x="80" y="320" font-size="16" font-weight="700" fill="#f1f5f9">수출국별 현황</text>

  <!-- Row 1 -->
  <rect x="60" y="340" width="210" height="120" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="368" font-size="14" font-weight="700" fill="#22c55e">폴란드</text>
  <text x="250" y="368" font-size="14" font-weight="800" fill="#f1f5f9" text-anchor="end">672문</text>
  <text x="80" y="390" font-size="11" fill="#94a3b8">K9A1PL + 현지생산 예정</text>
  <text x="80" y="408" font-size="11" fill="#94a3b8">2022 기본계약</text>
  <rect x="80" y="425" width="170" height="18" rx="4" fill="#22c55e" opacity="0.1"/>
  <text x="165" y="438" font-size="10" fill="#22c55e" text-anchor="middle" font-weight="600">최대 수출 계약</text>

  <rect x="290" y="340" width="210" height="120" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
