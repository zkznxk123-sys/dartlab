  <text x="820" y="508" font-size="13" fill="#fbbf24" text-anchor="end">200문+ 협상</text>
  <text x="680" y="530" font-size="11" fill="#94a3b8">세계 무기수입 3위</text>
  <text x="680" y="548" font-size="11" fill="#94a3b8">협상 진행 중</text>

  <rect x="860" y="480" width="180" height="100" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="880" y="508" font-size="14" font-weight="700" fill="#fbbf24">루마니아</text>
  <text x="1020" y="508" font-size="13" fill="#fbbf24" text-anchor="end">협상 중</text>
  <text x="880" y="530" font-size="11" fill="#94a3b8">NATO 동유럽 확대</text>
  <text x="880" y="548" font-size="11" fill="#94a3b8">계약 진행 중</text>

  <!-- Bottom: SIPRI ranking -->
  <rect x="60" y="620" width="1080" height="170" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="655" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="middle">SIPRI 세계 방산 수출 TOP 5 + 한국 (2020~2024)</text>

  <rect x="100" y="675" width="430" height="35" rx="6" fill="#3b82f6" opacity="0.3"/>
  <text x="115" y="698" font-size="13" fill="#f1f5f9" font-weight="700">1. 미국 43.0%</text>

  <rect x="100" y="715" width="96" height="30" rx="6" fill="#334155"/>
  <text x="115" y="735" font-size="12" fill="#94a3b8">2. 프랑스 9.6%</text>

  <rect x="210" y="715" width="78" height="30" rx="6" fill="#334155"/>
  <text x="225" y="735" font-size="12" fill="#94a3b8">3. 러시아 7.8%</text>

  <rect x="302" y="715" width="59" height="30" rx="6" fill="#334155"/>
  <text x="317" y="735" font-size="12" fill="#94a3b8">4. 중국 5.9%</text>

  <rect x="375" y="715" width="56" height="30" rx="6" fill="#334155"/>
  <text x="390" y="735" font-size="12" fill="#94a3b8">5. 독일 5.6%</text>

  <text x="600" y="698" font-size="13" fill="#64748b" text-anchor="middle">...</text>

  <rect x="680" y="675" width="110" height="35" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="735" y="698" font-size="13" fill="#22c55e" font-weight="700" text-anchor="middle">10. 한국 2.2%</text>

  <text x="830" y="698" font-size="12" fill="#94a3b8">→ 목표: 2030년 4위 (6%)</text>

  <text x="735" y="735" font-size="11" fill="#64748b" text-anchor="middle">K방산 빅4 매출 전년대비 31% 급증</text>
