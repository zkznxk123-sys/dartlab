  <rect x="310" y="425" width="170" height="18" rx="4" fill="#fbbf24" opacity="0.1"/>
  <text x="395" y="438" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="600">첫 해외 고객</text>

  <rect x="520" y="340" width="210" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
