<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <filter id="glowR">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bgR)"/>

  <text x="600" y="45" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">한화에어로스페이스 매출 8년 — 전쟁이 바꾼 성장 곡선</text>
  <text x="600" y="70" font-size="13" fill="#64748b" text-anchor="middle">c.select("IS", ["매출액"], freq="Y") | 분기 연환산, 단위: 조원</text>

  <!-- Y axis labels -->
  <text x="100" y="160" font-size="11" fill="#64748b" text-anchor="end">10조</text>
  <line x1="110" y1="157" x2="1100" y2="157" stroke="#1e293b" stroke-width="1"/>
  <text x="100" y="260" font-size="11" fill="#64748b" text-anchor="end">7.5조</text>
  <line x1="110" y1="257" x2="1100" y2="257" stroke="#1e293b" stroke-width="1"/>
  <text x="100" y="360" font-size="11" fill="#64748b" text-anchor="end">5조</text>
  <line x1="110" y1="357" x2="1100" y2="357" stroke="#1e293b" stroke-width="1"/>
  <text x="100" y="460" font-size="11" fill="#64748b" text-anchor="end">2.5조</text>
  <line x1="110" y1="457" x2="1100" y2="457" stroke="#1e293b" stroke-width="1"/>
  <text x="100" y="557" font-size="11" fill="#64748b" text-anchor="end">0</text>
  <line x1="110" y1="557" x2="1100" y2="557" stroke="#334155" stroke-width="2"/>

  <!-- Bars: height = value/10 * 400px, bottom at y=557 -->
  <!-- 2018: 1.6조 → h=64 -->
  <rect x="150" y="493" width="90" height="64" rx="6" fill="#334155"/>
  <text x="195" y="485" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">1.6</text>
  <text x="195" y="580" font-size="13" fill="#94a3b8" text-anchor="middle">2018</text>

  <!-- 2019: 1.6조 -->
  <rect x="270" y="493" width="90" height="64" rx="6" fill="#334155"/>
  <text x="315" y="485" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">1.6</text>
  <text x="315" y="580" font-size="13" fill="#94a3b8" text-anchor="middle">2019</text>

  <!-- 2020: 1.7조 -->
  <rect x="390" y="489" width="90" height="68" rx="6" fill="#334155"/>
  <text x="435" y="481" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">1.7</text>
  <text x="435" y="580" font-size="13" fill="#94a3b8" text-anchor="middle">2020</text>

  <!-- 2021: 2.0조 -->
  <rect x="510" y="477" width="90" height="80" rx="6" fill="#334155"/>
  <text x="555" y="469" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">2.0</text>
  <text x="555" y="580" font-size="13" fill="#94a3b8" text-anchor="middle">2021</text>

  <!-- 2022 war marker -->
  <line x1="600" y1="100" x2="600" y2="557" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="605" y="118" font-size="11" fill="#ef4444" font-weight="600">2022.02.24</text>
  <text x="605" y="133" font-size="11" fill="#ef4444">러시아 침공</text>

  <!-- 2023: 3.4조 → h=136 -->
  <rect x="630" y="421" width="90" height="136" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="675" y="413" font-size="16" font-weight="700" fill="#3b82f6" text-anchor="middle">3.4</text>
  <text x="675" y="580" font-size="13" fill="#cbd5e1" text-anchor="middle">2023</text>
  <text x="675" y="598" font-size="10" fill="#3b82f6" text-anchor="middle">+36.3%</text>

  <!-- 2024: 4.8조 → h=192 -->
  <rect x="750" y="365" width="90" height="192" rx="6" fill="#3b82f6"/>
  <text x="795" y="357" font-size="16" font-weight="700" fill="#3b82f6" text-anchor="middle">4.8</text>
  <text x="795" y="580" font-size="13" fill="#cbd5e1" text-anchor="middle">2024</text>
  <text x="795" y="598" font-size="10" fill="#3b82f6" text-anchor="middle">+40.6%</text>

  <!-- 2025: 8.4조 → h=336 -->
  <rect x="870" y="221" width="110" height="336" rx="8" fill="url(#barGrad)" filter="url(#glowR)"/>
  <text x="925" y="210" font-size="24" font-weight="800" fill="#22c55e" text-anchor="middle">8.4조</text>
  <text x="925" y="580" font-size="15" fill="#f1f5f9" text-anchor="middle" font-weight="700">2025</text>
  <text x="925" y="598" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="600">+74.5%</text>

  <!-- CAGR annotation -->
  <path d="M 195 480 Q 560 350 920 205" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <rect x="1000" y="185" width="160" height="50" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="1080" y="208" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">CAGR 56.5%</text>
  <text x="1080" y="226" font-size="11" fill="#94a3b8" text-anchor="middle">3년 연평균</text>

  <!-- Bottom: Key events -->
  <rect x="120" y="630" width="260" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="250" y="655" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">2022.07 폴란드 기본계약</text>
  <text x="250" y="675" font-size="11" fill="#64748b" text-anchor="middle">K9 672문 + 천무 288문</text>

  <rect x="420" y="630" width="260" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="655" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">2025 연결 매출 26.6조</text>
  <text x="550" y="675" font-size="11" fill="#64748b" text-anchor="middle">방산업체 최초 10조 돌파 (2024)</text>

  <rect x="720" y="630" width="260" height="60" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="850" y="655" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">수주잔고 37.2조</text>
  <text x="850" y="675" font-size="11" fill="#64748b" text-anchor="middle">4~5년치 매출 확보 (수출 71%)</text>
</svg>