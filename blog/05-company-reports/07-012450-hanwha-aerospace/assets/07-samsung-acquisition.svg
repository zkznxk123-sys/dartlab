<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" fill="url(#bgS)"/>

  <text x="600" y="45" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">삼성이 만든 무기를 한화가 가져가다 — 2014년 빅딜</text>
  <text x="600" y="70" font-size="13" fill="#64748b" text-anchor="middle">삼성테크윈 + 삼성탈레스 → 한화테크윈 → 한화에어로스페이스 | 총 1.9조원</text>

  <!-- Before: Samsung -->
  <rect x="60" y="110" width="500" height="320" rx="16" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="310" y="148" font-size="18" font-weight="800" fill="#3b82f6" text-anchor="middle">BEFORE — 삼성 방산 (2014)</text>

  <rect x="90" y="170" width="200" height="70" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="190" y="200" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">삼성테크윈</text>
  <text x="190" y="220" font-size="11" fill="#94a3b8" text-anchor="middle">K9 자주포 · 항공기 엔진</text>

  <rect x="320" y="170" width="200" height="70" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="420" y="200" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">삼성탈레스</text>
  <text x="420" y="220" font-size="11" fill="#94a3b8" text-anchor="middle">레이더 · 항공전자</text>

  <text x="90" y="275" font-size="12" fill="#94a3b8">왜 팔았나:</text>
  <text x="90" y="298" font-size="12" fill="#cbd5e1">1. 반도체·스마트폰 집중 전략 (비주력 정리)</text>
  <text x="90" y="318" font-size="12" fill="#cbd5e1">2. 글로벌 방산 메이저 대비 규모 부족</text>
  <text x="90" y="338" font-size="12" fill="#cbd5e1">3. 2014 방산비리 연쇄 — 이미지 리스크</text>
  <text x="90" y="358" font-size="12" fill="#cbd5e1">4. 이재용이 본 미래에 "무기"는 없었다</text>

  <rect x="90" y="380" width="440" height="30" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="310" y="400" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="600">인수 금액: 삼성테크윈 8,400억 + 삼성탈레스 등 총 1.9조</text>

  <!-- Arrow -->
  <text x="600" y="280" font-size="36" fill="#fbbf24" text-anchor="middle" font-weight="800">→</text>
  <text x="600" y="310" font-size="12" fill="#fbbf24" text-anchor="middle">2014.11</text>

  <!-- After: Hanwha -->
  <rect x="640" y="110" width="500" height="320" rx="16" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="890" y="148" font-size="18" font-weight="800" fill="#22c55e" text-anchor="middle">AFTER — 한화 종합방산 (2018~)</text>

  <rect x="670" y="170" width="440" height="70" rx="10" fill="#0f2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="890" y="198" font-size="16" font-weight="800" fill="#22c55e" text-anchor="middle">한화에어로스페이스</text>
  <text x="890" y="220" font-size="11" fill="#94a3b8" text-anchor="middle">K9 자주포 · 천무 · 항공기 엔진 · 누리호 · 지상장비</text>

  <rect x="670" y="255" width="210" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="775" y="278" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">한화시스템</text>
  <text x="775" y="296" font-size="10" fill="#94a3b8" text-anchor="middle">레이더 · 위성 · 항공전자</text>

  <rect x="900" y="255" width="210" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="1005" y="278" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">한화오션 (구 대우조선)</text>
  <text x="1005" y="296" font-size="10" fill="#94a3b8" text-anchor="middle">함정 · 잠수함</text>

  <text x="670" y="345" font-size="12" fill="#94a3b8">결과:</text>
  <text x="670" y="368" font-size="12" fill="#22c55e" font-weight="600">육(K9/K2/천무) · 해(잠수함/함정) · 공(KF-21/UAV) · 우주(누리호)</text>
  <text x="670" y="388" font-size="12" fill="#cbd5e1">→ 대한민국 유일의 종합 방산 그룹</text>
  <text x="670" y="408" font-size="12" fill="#fbbf24" font-weight="600">"재벌 역사상 최고의 딜" — 8,400억이 수십 조 수주로</text>

  <!-- Bottom: Timeline of name changes -->
  <rect x="60" y="470" width="1080" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="505" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">사명변경 타임라인</text>

  <circle cx="180" cy="540" r="8" fill="#3b82f6"/>
  <text x="180" y="530" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="600">1977</text>
  <text x="180" y="555" font-size="10" fill="#94a3b8" text-anchor="middle">삼성정밀공업</text>

  <line x1="188" y1="540" x2="342" y2="540" stroke="#334155" stroke-width="2"/>

  <circle cx="350" cy="540" r="8" fill="#3b82f6"/>
  <text x="350" y="530" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="600">1987</text>
  <text x="350" y="555" font-size="10" fill="#94a3b8" text-anchor="middle">삼성항공산업</text>

  <line x1="358" y1="540" x2="512" y2="540" stroke="#334155" stroke-width="2"/>

  <circle cx="520" cy="540" r="8" fill="#3b82f6"/>
  <text x="520" y="530" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="600">1999</text>
  <text x="520" y="555" font-size="10" fill="#94a3b8" text-anchor="middle">삼성테크윈</text>

  <line x1="528" y1="540" x2="682" y2="540" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>

  <circle cx="690" cy="540" r="10" fill="#fbbf24"/>
  <text x="690" y="528" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="700">2015</text>
  <text x="690" y="555" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="600">한화테크윈</text>

  <line x1="700" y1="540" x2="882" y2="540" stroke="#22c55e" stroke-width="2"/>

  <circle cx="890" cy="540" r="12" fill="#22c55e"/>
  <text x="890" y="526" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="800">2018</text>
  <text x="890" y="558" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="700">한화에어로스페이스</text>

  <!-- Bottom: Financial comparison -->
  <text x="600" y="615" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="middle">인수 전후 재무 비교</text>

  <rect x="60" y="635" width="530" height="160" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <text x="325" y="665" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">인수 직후 (2018)</text>

  <text x="100" y="695" font-size="13" fill="#94a3b8">매출</text>
  <text x="480" y="695" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="end">1.6조</text>

  <text x="100" y="725" font-size="13" fill="#94a3b8">영업이익</text>
  <text x="480" y="725" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="end">548억</text>

  <text x="100" y="755" font-size="13" fill="#94a3b8">영업이익률</text>
  <text x="480" y="755" font-size="18" font-weight="700" fill="#94a3b8" text-anchor="end">3.3%</text>

  <text x="100" y="785" font-size="13" fill="#94a3b8">총자산</text>
  <text x="480" y="785" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="end">7.4조</text>

  <rect x="610" y="635" width="530" height="160" rx="12" fill="#0f2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="875" y="665" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">현재 (2025)</text>

  <text x="650" y="695" font-size="13" fill="#94a3b8">매출</text>
  <text x="1030" y="695" font-size="18" font-weight="800" fill="#22c55e" text-anchor="end">8.4조 (×5.3)</text>

  <text x="650" y="725" font-size="13" fill="#94a3b8">영업이익</text>
  <text x="1030" y="725" font-size="18" font-weight="800" fill="#22c55e" text-anchor="end">8,076억 (×14.7)</text>

  <text x="650" y="755" font-size="13" fill="#94a3b8">영업이익률</text>
  <text x="1030" y="755" font-size="18" font-weight="800" fill="#f1f5f9" text-anchor="end">9.6%</text>

  <text x="650" y="785" font-size="13" fill="#94a3b8">총자산</text>
  <text x="1030" y="785" font-size="18" font-weight="800" fill="#22c55e" text-anchor="end">54.0조 (×7.3)</text>
</svg>