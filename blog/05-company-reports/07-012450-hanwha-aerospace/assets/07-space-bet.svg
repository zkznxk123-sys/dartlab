<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgSp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0c1220"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="720" fill="url(#bgSp)"/>

  <!-- Stars background -->
  <circle cx="100" cy="80" r="1" fill="#94a3b8" opacity="0.4"/>
  <circle cx="250" cy="120" r="1.5" fill="#cbd5e1" opacity="0.3"/>
  <circle cx="400" cy="60" r="1" fill="#94a3b8" opacity="0.5"/>
  <circle cx="600" cy="90" r="1.2" fill="#cbd5e1" opacity="0.4"/>
  <circle cx="800" cy="70" r="1" fill="#94a3b8" opacity="0.3"/>
  <circle cx="950" cy="110" r="1.5" fill="#cbd5e1" opacity="0.4"/>

  <text x="540" y="45" font-size="22" font-weight="800" fill="#22d3ee" text-anchor="middle">누리호에서 우주로 — 다음 72년의 베팅</text>
  <text x="540" y="70" font-size="13" fill="#64748b" text-anchor="middle">한화그룹 우주 밸류체인 | 폭약 → 방산 → 항공 → 우주</text>

  <!-- 5 transformations -->
  <text x="60" y="115" font-size="14" font-weight="700" fill="#94a3b8">72년간 5번의 변신</text>

  <rect x="60" y="130" width="140" height="45" rx="8" fill="#334155"/>
  <text x="130" y="150" font-size="12" fill="#94a3b8" text-anchor="middle">1952 폭약</text>
  <text x="130" y="166" font-size="10" fill="#64748b" text-anchor="middle">한국화약</text>

  <text x="210" y="155" font-size="16" fill="#475569">→</text>

  <rect x="225" y="130" width="140" height="45" rx="8" fill="#334155"/>
  <text x="295" y="150" font-size="12" fill="#94a3b8" text-anchor="middle">1970s 방산</text>
  <text x="295" y="166" font-size="10" fill="#64748b" text-anchor="middle">유도무기·탄약</text>

  <text x="375" y="155" font-size="16" fill="#475569">→</text>

  <rect x="390" y="130" width="140" height="45" rx="8" fill="#334155"/>
  <text x="460" y="150" font-size="12" fill="#94a3b8" text-anchor="middle">1998 자주포</text>
  <text x="460" y="166" font-size="10" fill="#64748b" text-anchor="middle">K9 실전배치</text>

  <text x="540" y="155" font-size="16" fill="#475569">→</text>

  <rect x="555" y="130" width="140" height="45" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="625" y="150" font-size="12" fill="#22c55e" text-anchor="middle">2018 항공</text>
  <text x="625" y="166" font-size="10" fill="#94a3b8" text-anchor="middle">에어로스페이스 사명</text>

  <text x="705" y="155" font-size="16" fill="#22d3ee">→</text>

  <rect x="720" y="130" width="160" height="45" rx="8" fill="#22d3ee" opacity="0.15" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="800" y="150" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="700">2022~ 우주</text>
  <text x="800" y="166" font-size="10" fill="#94a3b8" text-anchor="middle">누리호·위성·발사체</text>

  <!-- Space value chain -->
  <text x="60" y="220" font-size="16" font-weight="700" fill="#f1f5f9">한화그룹 우주 밸류체인</text>

  <!-- Make (Satellite) -->
  <rect x="60" y="240" width="300" height="190" rx="14" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="272" font-size="15" font-weight="800" fill="#3b82f6" text-anchor="middle">만든다 (위성)</text>

  <rect x="85" y="290" width="250" height="40" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="210" y="310" font-size="13" fill="#cbd5e1" text-anchor="middle" font-weight="600">한화시스템</text>
  <text x="210" y="325" font-size="10" fill="#94a3b8" text-anchor="middle">위성 제작 · 위성통신</text>

  <rect x="85" y="340" width="250" height="40" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="210" y="360" font-size="13" fill="#cbd5e1" text-anchor="middle" font-weight="600">쎄트렉아이</text>
  <text x="210" y="375" font-size="10" fill="#94a3b8" text-anchor="middle">위성체계 개발 · 수출</text>

  <rect x="85" y="390" width="250" height="30" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="210" y="410" font-size="11" fill="#3b82f6" text-anchor="middle">2021 쎄트렉아이 지분 인수</text>

  <!-- Arrow -->
  <text x="400" y="340" font-size="30" fill="#22d3ee" text-anchor="middle">→</text>

  <!-- Launch (Rocket) -->
  <rect x="440" y="240" width="300" height="190" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="590" y="272" font-size="15" font-weight="800" fill="#22d3ee" text-anchor="middle">쏜다 (발사체)</text>

  <rect x="465" y="290" width="250" height="55" rx="8" fill="#0c1a2e" stroke="#22d3ee" stroke-width="1"/>
  <text x="590" y="312" font-size="14" fill="#22d3ee" text-anchor="middle" font-weight="700">한화에어로스페이스</text>
  <text x="590" y="330" font-size="11" fill="#94a3b8" text-anchor="middle">누리호 엔진 총조립 (국내 유일)</text>

  <text x="490" y="370" font-size="12" fill="#cbd5e1">누리호 엔진 52기 제작</text>
  <text x="490" y="390" font-size="12" fill="#cbd5e1">75톤급 39기 + 7톤급 13기</text>
  <text x="490" y="410" font-size="12" fill="#22d3ee" font-weight="600">2022 체계종합기업 선정</text>

  <!-- Operate (Ground) -->
  <rect x="780" y="240" width="240" height="190" rx="14" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="900" y="272" font-size="15" font-weight="800" fill="#94a3b8" text-anchor="middle">운용한다 (지상)</text>

  <text x="810" y="305" font-size="12" fill="#cbd5e1">국방 정찰위성 운용</text>
  <text x="810" y="328" font-size="12" fill="#cbd5e1">위성통신 서비스</text>
  <text x="810" y="351" font-size="12" fill="#cbd5e1">우주 감시 시스템</text>

  <rect x="805" y="375" width="190" height="40" rx="8" fill="#94a3b8" opacity="0.1" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="900" y="398" font-size="11" fill="#94a3b8" text-anchor="middle">매출 규모: 아직 미미</text>
  <text x="900" y="412" font-size="10" fill="#64748b" text-anchor="middle">장기 투자 단계</text>

  <!-- Investment -->
  <rect x="60" y="460" width="480" height="70" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="300" y="490" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="middle">선제 투자 1,300억원 + 항공우주 부문 2025 영업이익 23억 (흑자전환)</text>
  <text x="300" y="512" font-size="12" fill="#94a3b8" text-anchor="middle">수주잔고 37조 대비 우주 투자는 아직 작다 — 그러나 "다음 72년"의 시작</text>

  <!-- Bottom: 4 monitoring signals -->
  <text x="540" y="575" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">4가지 모니터링 신호 (2026~)</text>

  <rect x="60" y="595" width="240" height="100" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="180" y="623" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">1. 수주잔고 소화율</text>
  <text x="180" y="645" font-size="11" fill="#94a3b8" text-anchor="middle">37조를 연 8~10조씩</text>
  <text x="180" y="663" font-size="11" fill="#94a3b8" text-anchor="middle">소화 가능한가?</text>
  <text x="180" y="683" font-size="10" fill="#64748b" text-anchor="middle">창원·대전 증설 진행률</text>

  <rect x="320" y="595" width="240" height="100" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="440" y="623" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">2. 부채비율 추이</text>
  <text x="440" y="645" font-size="11" fill="#94a3b8" text-anchor="middle">221%에서 내려가는가?</text>
  <text x="440" y="663" font-size="11" fill="#94a3b8" text-anchor="middle">300% 재돌파 시 경고</text>
  <text x="440" y="683" font-size="10" fill="#64748b" text-anchor="middle">매출 전환 → 자연 감소 구조</text>

  <rect x="580" y="595" width="240" height="100" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="700" y="623" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">3. 폴란드 이행률</text>
  <text x="700" y="645" font-size="11" fill="#94a3b8" text-anchor="middle">672문 중 152문 1차 납품</text>
  <text x="700" y="663" font-size="11" fill="#94a3b8" text-anchor="middle">현지생산 전환 일정</text>
  <text x="700" y="683" font-size="10" fill="#64748b" text-anchor="middle">지연 시 위약금 리스크</text>

  <rect x="840" y="595" width="180" height="100" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <text x="930" y="623" font-size="13" font-weight="700" fill="#22d3ee" text-anchor="middle">4. 우주 손익분기</text>
  <text x="930" y="645" font-size="11" fill="#94a3b8" text-anchor="middle">23억 → 유의미 규모?</text>
  <text x="930" y="663" font-size="11" fill="#94a3b8" text-anchor="middle">3년 내 성장 여부</text>
  <text x="930" y="683" font-size="10" fill="#64748b" text-anchor="middle">비용 센터 vs 성장 엔진</text>
</svg>