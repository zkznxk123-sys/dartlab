  <text x="480" y="320" font-size="14" font-weight="700" fill="#fbbf24">12.5%</text>

  <text x="540" y="370" font-size="11" fill="#475569" text-anchor="middle">글로벌 경쟁사 대비 10%p+ 높음 — 초고압(765kV) 비중 + 선별 수주 + 고정비 레버리지</text>
