  <text x="540" y="60" font-size="12" fill="#64748b" text-anchor="middle">전력설비 부문 영업이익률 (2025)</text>

  <!-- Bars: horizontal -->
  <text x="60" y="115" font-size="13" fill="#22c55e" font-weight="700">HD현대일렉트릭</text>
  <rect x="220" y="100" width="488" height="30" rx="6" fill="#22c55e" opacity="0.7"/>
  <text x="718" y="120" font-size="14" font-weight="800" fill="#22c55e">24.4%</text>

  <text x="60" y="165" font-size="13" fill="#94a3b8">Siemens Energy</text>
  <rect x="220" y="150" width="320" height="30" rx="6" fill="#334155"/>
  <text x="550" y="170" font-size="14" font-weight="700" fill="#94a3b8">14~16%</text>

  <text x="60" y="215" font-size="13" fill="#94a3b8">GE Vernova</text>
  <rect x="220" y="200" width="260" height="30" rx="6" fill="#334155"/>
  <text x="490" y="220" font-size="14" font-weight="700" fill="#94a3b8">11~13%</text>

  <text x="60" y="265" font-size="13" fill="#94a3b8">Hitachi Energy</text>
  <rect x="220" y="250" width="234" height="30" rx="6" fill="#334155"/>
  <text x="464" y="270" font-size="14" font-weight="700" fill="#94a3b8">11.7%</text>

