<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440">
  <rect width="1200" height="440" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">금융차입 8년간 0% — 고객의 돈으로 공장을 돌린다</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">자금조달 구조 변화 (2018 → 2025)</text>

  <!-- 2018 -->
  <rect x="100" y="110" width="440" height="200" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
  <text x="320" y="142" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2018 (적자기)</text>
  <rect x="130" y="165" width="168" height="30" rx="4" fill="#ef4444" fill-opacity="0.15"/>
  <text x="214" y="185" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">주주자본 42.0%</text>
  <rect x="130" y="205" width="16" height="30" rx="4" fill="#3b82f6" fill-opacity="0.3"/>
  <text x="170" y="225" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업조달 4.1%</text>
  <rect x="130" y="245" width="0" height="30" rx="4"/>
  <text x="148" y="265" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">금융차입 0%</text>
  <text x="130" y="295" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">내부유보 -7.5% (적자 누적)</text>

  <!-- Arrow -->
  <text x="580" y="210" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">→</text>

  <!-- 2025 -->
  <rect x="660" y="110" width="440" height="200" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="880" y="142" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2025 (이익 폭발기)</text>
  <rect x="690" y="165" width="174" height="30" rx="4" fill="#3b82f6" fill-opacity="0.4"/>
  <text x="777" y="185" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">영업조달 43.4%</text>
  <rect x="690" y="205" width="111" height="30" rx="4" fill="#22c55e" fill-opacity="0.3"/>
  <text x="745" y="225" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">내부유보 27.7%</text>
  <rect x="690" y="245" width="49" height="30" rx="4" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="750" y="265" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">주주자본 12.2%</text>
  <text x="690" y="295" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">금융차입 0%</text>

  <!-- Bottom insight -->
  <rect x="100" y="340" width="1000" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="365" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">고객 선수금(계약부채)이 자금의 43% — 변압기를 3~4년 전에 주문하며 미리 돈을 보낸다</text>
  <text x="600" y="390" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">은행에 이자를 한 푼도 안 내면서, 고객의 돈으로 공장을 돌리는 구조</text>
</svg>