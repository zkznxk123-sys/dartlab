  <text x="630" y="250" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">+112%</text>
  <text x="630" y="280" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업 레버리지</text>
  <text x="630" y="310" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="28" font-weight="700">4.9x</text>

  <rect x="885" y="110" width="255" height="240" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1012" y="142" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">2025</text>
  <text x="905" y="172" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출 성장률</text>
  <text x="905" y="196" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">+22.8%</text>
  <text x="905" y="226" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익 성장률</text>
  <text x="905" y="250" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">+48.8%</text>
  <text x="905" y="280" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업 레버리지</text>
  <text x="905" y="310" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="28" font-weight="700">2.1x</text>
  <text x="905" y="335" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">정상화 수렴 중</text>

  <!-- Bottom insight -->
  <rect x="60" y="380" width="1080" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="410" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">고정비 제조업의 전형: 적자기의 고정비가 가동률 상승 시 이익 증폭기로 전환</text>
  <text x="600" y="435" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익 97억(2021) → 9,953억(2025) = 102배 / 앨라배마 제2공장이 두 번째 고정비 장전</text>
</svg>