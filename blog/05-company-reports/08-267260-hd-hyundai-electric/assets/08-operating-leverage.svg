  <text x="355" y="310" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="28" font-weight="700">4.8x</text>

  <rect x="610" y="110" width="255" height="240" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="737" y="142" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">2024</text>
  <text x="630" y="172" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출 성장률</text>
  <text x="630" y="196" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">+22.9%</text>
