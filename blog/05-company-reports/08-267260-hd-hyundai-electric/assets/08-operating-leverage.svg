  <text x="80" y="196" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">+16.5%</text>
  <text x="80" y="226" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익 성장률</text>
  <text x="80" y="250" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">+1,266%</text>
