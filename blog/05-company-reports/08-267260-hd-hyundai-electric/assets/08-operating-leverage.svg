<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <rect width="1200" height="480" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">영업 레버리지 — 매출 16% 증가에 이익 1,266% 증폭</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">4년간 적자로 쌓인 고정비가, 수요 폭발 시점에 이익 증폭기로 전환</text>

  <!-- 4 year cards -->
  <rect x="60" y="110" width="255" height="240" rx="10" fill="#1e293b" stroke="#ea4647" stroke-width="2"/>
