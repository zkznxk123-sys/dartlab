<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">3중 수요가 한꺼번에 터졌다</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">중국 퇴출 + AI 데이터센터 + 노후 교체 → 초고압 변압기 공급 병목</text>

  <!-- Demand 1 -->
  <rect x="60" y="110" width="340" height="200" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="230" y="145" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">1. 중국 퇴출</text>
  <text x="80" y="175" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2019 휴스턴 항 — 중국산 변압기에서</text>
  <text x="80" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">원격 차단 하드웨어 발견</text>
  <text x="80" y="225" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2020 행정명령 13920호</text>
  <text x="80" y="245" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">전력망 국가비상사태 선언</text>
  <text x="80" y="265" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">적성국 전력설비 조달 금지</text>
  <text x="80" y="295" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11">미국 내 제조 가능: HD현대 + 효성 2곳뿐</text>

  <!-- Demand 2 -->
  <rect x="420" y="110" width="340" height="200" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="590" y="145" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2. AI 데이터센터</text>
  <text x="440" y="175" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ChatGPT 1회 = 2.9Wh (구글 검색 10배)</text>
  <text x="440" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">AI 하이퍼스케일 DC = 100MW+</text>
  <text x="440" y="225" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">IEA 전망</text>
  <text x="440" y="245" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">미국 DC 전력 183TWh → 426TWh (+133%)</text>
  <text x="440" y="265" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2030년 미국 전력의 10%+ 소비</text>
  <text x="440" y="295" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11">1GW DC 캠퍼스 1개 = 대형 변압기 수십 대</text>

  <!-- Demand 3 -->
  <rect x="780" y="110" width="360" height="200" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="960" y="145" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">3. 노후 교체</text>
  <text x="800" y="175" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">미국 대형 변압기 55%가 33년 이상 가동</text>
  <text x="800" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">설계 수명 40년 / 전국 6,000~8,000만 대</text>
  <text x="800" y="225" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">NERC 경고</text>
  <text x="800" y="245" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2024~2028년 3억 명 정전 위험 상승</text>
  <text x="800" y="265" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">송전선 70%가 25년 이상 전 설치</text>
  <text x="800" y="295" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11">교체 수요만으로도 공급 초과</text>

  <!-- Arrows converging -->
  <line x1="230" y1="310" x2="520" y2="380" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="590" y1="310" x2="600" y2="380" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="960" y1="310" x2="680" y2="380" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Result -->
  <rect x="350" y="370" width="500" height="120" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="405" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">공급 병목 → 가격결정력</text>
  <text x="600" y="435" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">전 세계 765kV 공장 5~6곳 / 신규 진입 5~7년</text>
  <text x="600" y="460" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">관세를 고객이 대신 낸다 — 가격결정력의 극단적 형태</text>
  <text x="600" y="480" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">OPM -8.9% → 24.4% (7년)</text>
</svg>