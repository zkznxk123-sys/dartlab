<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg8a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/><stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="gl8a"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg8a)"/>
  <text x="600" y="45" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">HD현대일렉트릭 영업이익률 8년 — 적자에서 24%까지</text>
  <text x="600" y="70" font-size="13" fill="#64748b" text-anchor="middle">c.analysis("financial", "수익성") | 2018~2025</text>

  <!-- Y axis -->
  <text x="90" y="150" font-size="11" fill="#64748b" text-anchor="end">25%</text>
  <line x1="100" y1="147" x2="1100" y2="147" stroke="#1e293b" stroke-width="1"/>
  <text x="90" y="250" font-size="11" fill="#64748b" text-anchor="end">15%</text>
  <line x1="100" y1="247" x2="1100" y2="247" stroke="#1e293b" stroke-width="1"/>
  <text x="90" y="350" font-size="11" fill="#64748b" text-anchor="end">5%</text>
  <line x1="100" y1="347" x2="1100" y2="347" stroke="#1e293b" stroke-width="1"/>
  <text x="90" y="450" font-size="11" fill="#64748b" text-anchor="end">0%</text>
  <line x1="100" y1="447" x2="1100" y2="447" stroke="#475569" stroke-width="2"/>
  <text x="90" y="550" font-size="11" fill="#64748b" text-anchor="end">-10%</text>
  <line x1="100" y1="547" x2="1100" y2="547" stroke="#1e293b" stroke-width="1"/>

  <!-- Bars: 0% at y=447, 1%=10px -->
  <!-- 2018: -5.2% → y=447, h=52 downward -->
  <rect x="140" y="447" width="100" height="52" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="190" y="440" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">-5.2%</text>
  <text x="190" y="520" font-size="12" fill="#94a3b8" text-anchor="middle">2018</text>

  <!-- 2019: -8.8% → h=88 -->
  <rect x="260" y="447" width="100" height="88" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="310" y="440" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">-8.8%</text>
  <text x="310" y="555" font-size="12" fill="#94a3b8" text-anchor="middle">2019</text>

  <!-- 2020: 4.0% → y=407, h=40 -->
  <rect x="380" y="407" width="100" height="40" rx="4" fill="#334155"/>
  <text x="430" y="399" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">4.0%</text>
  <text x="430" y="520" font-size="12" fill="#94a3b8" text-anchor="middle">2020</text>

  <!-- 2021: 0.5% → y=442, h=5 -->
  <rect x="500" y="442" width="100" height="5" rx="2" fill="#334155"/>
  <text x="550" y="435" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">0.5%</text>
  <text x="550" y="520" font-size="12" fill="#94a3b8" text-anchor="middle">2021</text>

  <!-- 2022: 6.3% → y=384, h=63 -->
  <rect x="620" y="384" width="100" height="63" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="670" y="376" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">6.3%</text>
  <text x="670" y="520" font-size="12" fill="#cbd5e1" text-anchor="middle">2022</text>

  <!-- 2023: 11.7% → y=330, h=117 -->
  <rect x="740" y="330" width="100" height="117" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="790" y="322" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">11.7%</text>
  <text x="790" y="520" font-size="12" fill="#cbd5e1" text-anchor="middle">2023</text>

  <!-- 2024: 20.1% → y=246, h=201 -->
  <rect x="860" y="246" width="100" height="201" rx="4" fill="#3b82f6"/>
  <text x="910" y="238" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">20.1%</text>
  <text x="910" y="520" font-size="12" fill="#cbd5e1" text-anchor="middle">2024</text>

  <!-- 2025: 24.4% → y=203, h=244 -->
  <rect x="980" y="203" width="110" height="244" rx="6" fill="#22c55e" filter="url(#gl8a)"/>
  <text x="1035" y="193" font-size="18" font-weight="800" fill="#22c55e" text-anchor="middle">24.4%</text>
  <text x="1035" y="520" font-size="13" fill="#f1f5f9" text-anchor="middle" font-weight="700">2025</text>

  <!-- Annotation -->
  <text x="250" y="610" font-size="13" fill="#ef4444">적자 구간 (2018~2019)</text>
  <text x="550" y="610" font-size="13" fill="#94a3b8">전환기 (2020~2021)</text>
  <text x="850" y="610" font-size="13" fill="#22c55e">폭발 성장 (2022~2025)</text>

  <!-- Bottom cards -->
  <rect x="100" y="640" width="300" height="55" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="250" y="665" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">스코어카드 5개 A</text>
  <text x="250" y="683" font-size="11" fill="#94a3b8" text-anchor="middle">성장 · 수익 · 이익품질 · 투자효율 · 재무정합</text>

  <rect x="450" y="640" width="300" height="55" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="665" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">영업이익 CAGR 39%</text>
  <text x="600" y="683" font-size="11" fill="#94a3b8" text-anchor="middle">8년간 연평균 성장률</text>

  <rect x="800" y="640" width="300" height="55" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="950" y="665" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">수주잔고 10~11조</text>
  <text x="950" y="683" font-size="11" fill="#94a3b8" text-anchor="middle">5년치 일감 확보 (북미 66%)</text>
</svg>