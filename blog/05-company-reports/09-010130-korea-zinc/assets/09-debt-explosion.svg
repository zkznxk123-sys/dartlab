<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="600" fill="#0a0e1a"/>
  <text x="540" y="40" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">부채비율 25% → 95%, 1년 만에</text>
  <text x="540" y="62" font-size="12" fill="#64748b" text-anchor="middle">c.analysis("financial", "자금조달") + c.analysis("financial", "안정성")</text>

  <!-- Y axis -->
  <text x="55" y="135" font-size="11" fill="#64748b" text-anchor="end">100%</text>
  <line x1="65" y1="132" x2="1020" y2="132" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="235" font-size="11" fill="#64748b" text-anchor="end">50%</text>
  <line x1="65" y1="232" x2="1020" y2="232" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="335" font-size="11" fill="#64748b" text-anchor="end">0%</text>
  <line x1="65" y1="332" x2="1020" y2="332" stroke="#334155" stroke-width="2"/>

  <!-- Bars: 0% at y=332, 1%=2px -->
  <!-- 2020: 19.9% → h=40 -->
  <rect x="100" y="292" width="90" height="40" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="145" y="285" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">19.9%</text>
  <text x="145" y="355" font-size="12" fill="#94a3b8" text-anchor="middle">2020</text>

  <!-- 2021: 28.8% → h=58 -->
  <rect x="220" y="274" width="90" height="58" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="265" y="267" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">28.8%</text>
  <text x="265" y="355" font-size="12" fill="#94a3b8" text-anchor="middle">2021</text>

  <!-- 2022: 31.0% → h=62 -->
  <rect x="340" y="270" width="90" height="62" rx="4" fill="#22c55e" opacity="0.5"/>
  <text x="385" y="263" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">31.0%</text>
  <text x="385" y="355" font-size="12" fill="#94a3b8" text-anchor="middle">2022</text>

  <!-- 2023: 24.9% → h=50 -->
  <rect x="460" y="282" width="90" height="50" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="505" y="275" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">24.9%</text>
  <text x="505" y="355" font-size="12" fill="#94a3b8" text-anchor="middle">2023</text>

  <!-- Vertical event marker -->
  <line x1="590" y1="100" x2="590" y2="340" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="595" y="115" font-size="11" fill="#ef4444" font-weight="600">경영권 분쟁</text>

  <!-- 2024: 94.7% → h=189 -->
  <rect x="620" y="143" width="110" height="189" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="675" y="135" font-size="20" font-weight="800" fill="#ef4444" text-anchor="middle">94.7%</text>
  <text x="675" y="355" font-size="13" fill="#f1f5f9" text-anchor="middle" font-weight="700">2024</text>

  <!-- 2025: 82.3% → h=165 -->
  <rect x="770" y="167" width="110" height="165" rx="6" fill="#fbbf24" opacity="0.7"/>
  <text x="825" y="159" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">82.3%</text>
  <text x="825" y="355" font-size="12" fill="#cbd5e1" text-anchor="middle">2025</text>
  <text x="825" y="373" font-size="10" fill="#94a3b8" text-anchor="middle">회복 시작?</text>

  <!-- Bottom: funding mix -->
  <text x="540" y="420" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">자금조달 구조 변화 — 금융차입이 7%에서 28%로</text>

  <rect x="80" y="440" width="280" height="55" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="462" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">2023 (분쟁 전)</text>
  <text x="220" y="482" font-size="11" fill="#94a3b8" text-anchor="middle">내부유보 65% | 금융차입 7% | 영업 9%</text>

  <text x="390" y="470" font-size="20" fill="#ef4444">→</text>

  <rect x="420" y="440" width="280" height="55" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="560" y="462" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">2024 (분쟁 중)</text>
  <text x="560" y="482" font-size="11" fill="#94a3b8" text-anchor="middle">내부유보 51% | 금융차입 26% | 영업 13%</text>

  <text x="730" y="470" font-size="20" fill="#fbbf24">→</text>

  <rect x="760" y="440" width="260" height="55" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="890" y="462" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">2025 (분쟁 후)</text>
  <text x="890" y="482" font-size="11" fill="#94a3b8" text-anchor="middle">내부유보 32% | 금융차입 28% | 영업 13%</text>

  <text x="540" y="540" font-size="12" fill="#64748b" text-anchor="middle">50년 무차입 경영 → 1년 만에 금융차입 28%. 경영권 방어가 자금 구조를 바꿨다.</text>
  <text x="540" y="570" font-size="11" fill="#475569" text-anchor="middle">이자보상배율 2.0배 (과다) | Piotroski F-Score 4/9</text>
</svg>