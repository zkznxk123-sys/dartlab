<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380">
  <rect width="1200" height="380" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">경영권 방어 비용 — 2.3조를 쏟아부은 결과</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">75년 동업 파탄의 재무적 흔적 (2024~2025)</text>

  <!-- Cost items -->
  <rect x="60" y="110" width="350" height="120" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="235" y="140" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">자사주 공개매수</text>
  <text x="235" y="170" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700">2.3조원</text>
  <text x="235" y="195" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">MBK+영풍 공격 방어 · 주당 89만원</text>
  <text x="235" y="215" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">금융비용 폭증 → 순손실 직접 원인</text>

  <rect x="430" y="110" width="350" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="605" y="140" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">부채비율 폭등</text>
  <text x="605" y="170" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700">25% → 96%</text>
  <text x="605" y="195" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">1년 만에 3.8배 상승</text>
  <text x="605" y="215" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현금 요새가 빚 요새로 전환</text>

  <rect x="800" y="110" width="340" height="120" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="970" y="140" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">50년 만의 첫 순손실</text>
  <text x="970" y="170" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700">-2,457억</text>
  <text x="970" y="195" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2024 Q4 단일 분기</text>
  <text x="970" y="215" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">사업이 아니라 방어 비용으로 적자</text>

  <!-- Paradox -->
  <rect x="60" y="260" width="1080" height="90" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="290" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">그런데 영업이익은 사상 최대</text>
  <text x="600" y="315" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2025년 영업이익 1.2조 (역대 최고) · 회수율 96.5% 세계 최고 기술은 건재</text>
  <text x="600" y="338" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">경영권 전쟁은 재무제표의 "영업 밖"에서 이익을 먹는다</text>
</svg>