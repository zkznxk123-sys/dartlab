<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380">
  <rect width="1200" height="380" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">영업이익 사상 최대인데 순손실 — 이익 괴리의 정체</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2024년 연간: 영업이익 1.2조 vs 당기순이익 -2,457억</text>

  <!-- Bar comparison -->
  <line x1="200" y1="310" x2="1000" y2="310" stroke="#1e2433" stroke-width="1"/>

  <!-- Operating profit bars -->
  <rect x="260" y="130" width="100" height="180" rx="4" fill="#22c55e" fill-opacity="0.6"/>
  <text x="310" y="122" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">8,874억</text>
  <text x="310" y="330" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2023 영업이익</text>

  <rect x="400" y="100" width="100" height="210" rx="4" fill="#22c55e" fill-opacity="0.8"/>
  <text x="450" y="92" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">1.2조</text>
  <text x="450" y="330" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2024 영업이익</text>
  <text x="450" y="348" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">사상 최대</text>

  <!-- Net income bars -->
  <rect x="620" y="200" width="100" height="110" rx="4" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="670" y="192" text-anchor="middle" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">6,310억</text>
  <text x="670" y="330" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2023 순이익</text>

  <rect x="760" y="310" width="100" height="50" rx="4" fill="#ef4444" fill-opacity="0.6"/>
  <text x="810" y="374" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">-2,457억</text>
  <text x="810" y="330" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2024 순이익</text>
  <text x="810" y="305" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">50년 만의 첫 적자</text>

  <!-- Gap explanation -->
  <line x1="540" y1="200" x2="540" y2="340" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4"/>
  <text x="540" y="195" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">영업 밖에서 1.4조 소멸</text>
  <text x="540" y="355" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">자사주 매입 금융비용 + 환율손실 + 지분법손실</text>
</svg>