<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="500" fill="#0a0e1a"/>
  <text x="600" y="40" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">사명은 "아연"인데, 돈은 "은"에서 번다</text>
  <text x="600" y="62" font-size="12" fill="#64748b" text-anchor="middle">고려아연 금속별 매출 비중 (2025 3Q) | c.analysis("수익구조")</text>

  <!-- Horizontal stacked bar -->
  <text x="60" y="115" font-size="13" fill="#94a3b8">매출 비중</text>

  <!-- Silver 31.5% -->
  <rect x="60" y="130" width="340" height="55" rx="6" fill="#cbd5e1"/>
  <text x="230" y="163" font-size="18" font-weight="800" fill="#0a0e1a" text-anchor="middle">은 31.5%</text>

  <!-- Zinc 25.2% -->
  <rect x="405" y="130" width="272" height="55" rx="6" fill="#64748b"/>
  <text x="541" y="163" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="middle">아연 25.2%</text>

  <!-- Gold 17.7% -->
  <rect x="682" y="130" width="191" height="55" rx="6" fill="#fbbf24"/>
  <text x="777" y="163" font-size="15" font-weight="700" fill="#0a0e1a" text-anchor="middle">금 17.7%</text>

  <!-- Lead 14% -->
  <rect x="878" y="130" width="151" height="55" rx="6" fill="#475569"/>
  <text x="953" y="163" font-size="14" font-weight="600" fill="#cbd5e1" text-anchor="middle">연 14%</text>

  <!-- Others -->
  <rect x="1034" y="130" width="106" height="55" rx="6" fill="#334155"/>
  <text x="1087" y="163" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">기타 11.6%</text>

  <!-- Annotations -->
  <rect x="60" y="220" width="530" height="45" rx="8" fill="#cbd5e1" opacity="0.08" stroke="#cbd5e1" stroke-width="1"/>
  <text x="325" y="248" font-size="14" font-weight="700" fill="#cbd5e1" text-anchor="middle">귀금속 (금+은) = 49.2% — 매출의 절반</text>

  <text x="60" y="310" font-size="14" font-weight="700" fill="#94a3b8">왜 아연 회사가 은으로 돈을 버는가?</text>

  <rect x="60" y="330" width="340" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="230" y="355" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">제련 부산물 구조</text>
  <text x="230" y="378" font-size="11" fill="#94a3b8" text-anchor="middle">아연 정광 안에 금/은이 섞여 있다</text>
  <text x="230" y="393" font-size="11" fill="#94a3b8" text-anchor="middle">침출 시 아연은 녹지만 금/은은 안 녹는다</text>

  <text x="420" y="370" font-size="20" fill="#475569">→</text>

  <rect x="450" y="330" width="340" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="620" y="355" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">금은 슈퍼사이클</text>
  <text x="620" y="378" font-size="11" fill="#94a3b8" text-anchor="middle">금값 랠리 → 금 비중 9.2%→17.7% (2배)</text>
  <text x="620" y="393" font-size="11" fill="#94a3b8" text-anchor="middle">은 수요 (태양광 패널) → 은 1위 등극</text>

  <text x="810" y="370" font-size="20" fill="#475569">→</text>

  <rect x="840" y="330" width="300" height="70" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="990" y="355" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">사업 정체성 변화</text>
  <text x="990" y="378" font-size="11" fill="#94a3b8" text-anchor="middle">"아연 제련소" → "귀금속 회수 플랫폼"</text>
  <text x="990" y="393" font-size="11" fill="#94a3b8" text-anchor="middle">유가금속 회수율 96.5%</text>

  <text x="600" y="460" font-size="12" fill="#475569" text-anchor="middle">전략광물(안티모니, 인듐) 매출 290억 → 900억 (3배+) — 방산 핵심 소재</text>
</svg>