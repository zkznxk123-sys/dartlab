<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440">
  <rect width="1200" height="440" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">판관비율 66.8% → 52.7% — 매출 7배, 고정비 희석</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">판관비율이 50% 이하로 떨어지면 OPM 25%+ 도달</text>

  <!-- Chart area -->
  <!-- Stacked bars: 원가율 + 판관비율 + OPM -->
  <!-- x = 140, 320, 500, 680, 860, 1040 for years 2020-2025 -->

  <!-- Y axis -->
  <line x1="100" y1="120" x2="100" y2="380" stroke="#1e2433" stroke-width="1"/>
  <line x1="100" y1="380" x2="1120" y2="380" stroke="#1e2433" stroke-width="1"/>
  <text x="85" y="384" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">0%</text>
  <line x1="100" y1="250" x2="1120" y2="250" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="254" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">50%</text>
  <line x1="100" y1="120" x2="1120" y2="120" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="124" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">100%</text>

  <!-- 2020: 원가 26.6%, 판관비 66.8%, OPM 6.6% -->
  <rect x="120" y="311" width="80" height="69" rx="3" fill="#ef4444" fill-opacity="0.5"/>
  <rect x="120" y="137" width="80" height="174" rx="3" fill="#f59e0b" fill-opacity="0.5"/>
  <rect x="120" y="120" width="80" height="17" rx="3" fill="#22c55e" fill-opacity="0.6"/>
  <text x="160" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2020</text>
  <text x="160" y="350" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="10">26.6%</text>
  <text x="160" y="230" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="10">66.8%</text>

  <!-- 2021: 원가 27.6%, 판관비 66.9%, OPM 5.5% -->
  <rect x="300" y="308" width="80" height="72" rx="3" fill="#ef4444" fill-opacity="0.5"/>
  <rect x="300" y="134" width="80" height="174" rx="3" fill="#f59e0b" fill-opacity="0.5"/>
  <rect x="300" y="120" width="80" height="14" rx="3" fill="#22c55e" fill-opacity="0.6"/>
  <text x="340" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2021</text>

  <!-- 2022: 원가 26.7%, 판관비 63.4%, OPM 9.9% -->
  <rect x="480" y="311" width="80" height="69" rx="3" fill="#ef4444" fill-opacity="0.5"/>
  <rect x="480" y="146" width="80" height="165" rx="3" fill="#f59e0b" fill-opacity="0.5"/>
  <rect x="480" y="120" width="80" height="26" rx="3" fill="#22c55e" fill-opacity="0.6"/>
  <text x="520" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2022</text>

  <!-- 2023: 원가 24.5%, 판관비 55.6%, OPM 19.9% -->
  <rect x="660" y="316" width="80" height="64" rx="3" fill="#ef4444" fill-opacity="0.5"/>
  <rect x="660" y="172" width="80" height="144" rx="3" fill="#f59e0b" fill-opacity="0.5"/>
  <rect x="660" y="120" width="80" height="52" rx="3" fill="#22c55e" fill-opacity="0.6"/>
  <text x="700" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2023</text>

  <!-- 2024: 원가 24.8%, 판관비 58.2%, OPM 17.0% -->
  <rect x="840" y="315" width="80" height="65" rx="3" fill="#ef4444" fill-opacity="0.5"/>
  <rect x="840" y="163" width="80" height="152" rx="3" fill="#f59e0b" fill-opacity="0.5"/>
  <rect x="840" y="120" width="80" height="43" rx="3" fill="#22c55e" fill-opacity="0.6"/>
  <text x="880" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2024</text>

  <!-- 2025: 원가 23.3%, 판관비 52.7%, OPM 23.9% -->
  <rect x="1020" y="319" width="80" height="61" rx="3" fill="#ef4444" fill-opacity="0.5"/>
  <rect x="1020" y="182" width="80" height="137" rx="3" fill="#f59e0b" fill-opacity="0.5"/>
  <rect x="1020" y="120" width="80" height="62" rx="3" fill="#22c55e" fill-opacity="0.8"/>
  <text x="1060" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025</text>
  <text x="1060" y="155" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">23.9%</text>

  <!-- Legend -->
  <rect x="140" y="410" width="12" height="12" rx="2" fill="#ef4444" fill-opacity="0.5"/>
  <text x="158" y="421" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원가율</text>
  <rect x="240" y="410" width="12" height="12" rx="2" fill="#f59e0b" fill-opacity="0.5"/>
  <text x="258" y="421" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">판관비율</text>
  <rect x="340" y="410" width="12" height="12" rx="2" fill="#22c55e" fill-opacity="0.7"/>
  <text x="358" y="421" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OPM</text>
  <text x="780" y="421" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">판관비율이 50% 이하로 가면 OPM 25%+ 분기점</text>
</svg>