<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <rect width="1200" height="480" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">디바이스 + 세럼 플라이휠 — 객단가 15배의 구조</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">화장품만 팔면 2~3만원, 디바이스+세럼 병용이면 50만원+</text>

  <!-- Flywheel circle elements -->
  <!-- Device -->
  <rect x="420" y="110" width="360" height="100" rx="12" fill="#1e293b" stroke="#ea4647" stroke-width="2"/>
  <text x="600" y="148" text-anchor="middle" fill="#ea4647" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">에이지알 뷰티 디바이스</text>
  <text x="600" y="175" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">6-in-1 홈케어 기기 / $499 / 누적 600만대</text>

  <!-- Arrow down-right -->
  <text x="780" y="245" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24">↓</text>

  <!-- Serum -->
  <rect x="700" y="260" width="340" height="80" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="870" y="293" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">전용 세럼 3~4개 동시 구매</text>
  <text x="870" y="318" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">디바이스가 흡수력을 높임 → 세럼 필수</text>

  <!-- Arrow down-left -->
  <text x="580" y="375" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24">↓</text>

  <!-- Retention -->
  <rect x="160" y="260" width="340" height="80" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="330" y="293" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">리텐션 (재구매 락인)</text>
  <text x="330" y="318" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">세럼 소모 → 재구매 → 브랜드 충성도</text>

  <!-- Arrow up -->
  <text x="400" y="245" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24">↑</text>

  <!-- Result cards -->
  <rect x="80" y="380" width="320" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="240" y="408" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">객단가 50만원+</text>
  <text x="240" y="432" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">화장품 단독(2~3만원)의 15배</text>

  <rect x="440" y="380" width="320" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="408" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">매출 1.53조</text>
  <text x="600" y="432" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">5년 만에 7배 (2,199억→15,273억)</text>

  <rect x="800" y="380" width="320" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="960" y="408" text-anchor="middle" fill="#ea4647" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">OPM 23.9%</text>
  <text x="960" y="432" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">디바이스 27% + DTC + 해외 판가</text>
</svg>