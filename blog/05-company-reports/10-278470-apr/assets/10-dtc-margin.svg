<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="500" fill="#0a0e1a"/>
  <text x="540" y="38" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">직접 만들지 않는데 마진 24% — DTC의 구조</text>
  <text x="540" y="60" font-size="12" fill="#64748b" text-anchor="middle">코스맥스(제조) 8% vs 에이피알(판매) 24% | 같은 제품, 4배 마진 차이</text>

  <!-- Flow -->
  <rect x="40" y="100" width="200" height="80" rx="12" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="140" y="135" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">코스맥스 (ODM)</text>
  <text x="140" y="158" font-size="12" fill="#64748b" text-anchor="middle">제조 · 이익률 8%</text>

  <text x="260" y="145" font-size="22" fill="#475569">→</text>

  <rect x="280" y="100" width="200" height="80" rx="12" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="380" y="135" font-size="14" font-weight="800" fill="#22c55e" text-anchor="middle">에이피알 (DTC)</text>
  <text x="380" y="158" font-size="12" fill="#94a3b8" text-anchor="middle">판매 · 이익률 24%</text>

  <text x="500" y="145" font-size="22" fill="#475569">→</text>

  <rect x="520" y="100" width="200" height="80" rx="12" fill="#1e293b" stroke="#f1f5f9" stroke-width="1"/>
  <text x="620" y="135" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">소비자</text>
  <text x="620" y="158" font-size="12" fill="#94a3b8" text-anchor="middle">자사몰 · TikTok · 아마존</text>

  <rect x="780" y="100" width="260" height="80" rx="12" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="910" y="130" font-size="12" fill="#ef4444" text-anchor="middle">아모레/LG생건 경로</text>
  <text x="910" y="150" font-size="11" fill="#94a3b8" text-anchor="middle">백화점 24% / 면세점 25%</text>
  <text x="910" y="168" font-size="11" fill="#ef4444" text-anchor="middle">→ 에이피알은 이걸 건너뜀</text>

  <!-- Channel comparison -->
  <text x="60" y="230" font-size="14" font-weight="700" fill="#94a3b8">채널별 수수료 — 에이피알은 왜 마진이 높은가</text>

  <rect x="60" y="250" width="160" height="40" rx="6" fill="#ef4444" opacity="0.3"/>
  <text x="140" y="275" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="600">홈쇼핑 35%</text>

  <rect x="240" y="250" width="140" height="40" rx="6" fill="#ef4444" opacity="0.25"/>
  <text x="310" y="275" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="600">면세점 25%</text>

  <rect x="400" y="250" width="130" height="40" rx="6" fill="#fbbf24" opacity="0.2"/>
  <text x="465" y="275" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">백화점 24%</text>

  <rect x="550" y="250" width="90" height="40" rx="6" fill="#3b82f6" opacity="0.2"/>
  <text x="595" y="275" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="600">아마존 12%</text>

  <rect x="660" y="250" width="70" height="40" rx="6" fill="#22c55e" opacity="0.2"/>
  <text x="695" y="275" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="600">TikTok 7%</text>

  <rect x="750" y="250" width="55" height="40" rx="6" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="1"/>
  <text x="777" y="275" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="700">자사몰 4%</text>

  <!-- Bottom: 3사 비교 -->
  <text x="540" y="340" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">K-뷰티 3사 비교 (2025년)</text>

  <rect x="60" y="360" width="300" height="110" rx="12" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1"/>
  <text x="210" y="388" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">에이피알</text>
  <text x="210" y="412" font-size="12" fill="#94a3b8" text-anchor="middle">매출 1.5조 | 영업이익 3,654억</text>
  <text x="210" y="432" font-size="16" font-weight="800" fill="#22c55e" text-anchor="middle">이익률 24% | ROE 65%</text>
  <text x="210" y="455" font-size="11" fill="#64748b" text-anchor="middle">DTC + 해외 80%</text>

  <rect x="390" y="360" width="300" height="110" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="540" y="388" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">아모레퍼시픽</text>
  <text x="540" y="412" font-size="12" fill="#94a3b8" text-anchor="middle">매출 4.6조 | 영업이익 3,680억</text>
  <text x="540" y="432" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">이익률 8% | ROE 5~6%</text>
  <text x="540" y="455" font-size="11" fill="#64748b" text-anchor="middle">백화점+면세 → 탈중국 전환 중</text>

  <rect x="720" y="360" width="300" height="110" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="870" y="388" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">LG생활건강</text>
  <text x="870" y="412" font-size="12" fill="#94a3b8" text-anchor="middle">매출 6.4조 | 영업이익 1,707억</text>
  <text x="870" y="432" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">이익률 2.7% | 뷰티 적자</text>
  <text x="870" y="455" font-size="11" fill="#64748b" text-anchor="middle">면세점+중국 46% 의존</text>
</svg>