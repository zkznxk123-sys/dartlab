<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">K-뷰티 3사 비교 — 아모레의 1/3 매출로 동일 이익</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">채널이 재무제표를 결정한다 (2025년 기준)</text>

  <!-- APR -->
  <rect x="60" y="110" width="340" height="260" rx="10" fill="#1e293b" stroke="#ea4647" stroke-width="2"/>
  <text x="230" y="142" text-anchor="middle" fill="#ea4647" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">에이피알</text>
  <text x="80" y="172" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출</text>
  <text x="230" y="172" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">1.53조</text>
  <text x="80" y="200" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익</text>
  <text x="230" y="200" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">3,655억</text>
  <text x="80" y="228" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">OPM</text>
  <text x="230" y="228" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">23.9%</text>
  <text x="80" y="258" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ROE</text>
  <text x="230" y="258" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">65%</text>
  <text x="80" y="290" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">채널</text>
  <text x="230" y="290" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">DTC (자사몰 3~5%)</text>
  <text x="80" y="318" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">해외 비중</text>
  <text x="230" y="318" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14">80%</text>
  <text x="80" y="348" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">금융차입</text>
  <text x="230" y="348" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">0%</text>

  <!-- 아모레 -->
  <rect x="420" y="110" width="340" height="260" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="590" y="142" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">아모레퍼시픽</text>
  <text x="440" y="172" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출</text>
  <text x="590" y="172" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">4.62조</text>
  <text x="440" y="200" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익</text>
  <text x="590" y="200" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">3,680억</text>
  <text x="440" y="228" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">OPM</text>
  <text x="590" y="228" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">8.0%</text>
  <text x="440" y="258" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ROE</text>
  <text x="590" y="258" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">5~6%</text>
  <text x="440" y="290" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">채널</text>
  <text x="590" y="290" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">백화점 24% + 면세점 25%</text>
  <text x="440" y="318" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">해외 비중</text>
  <text x="590" y="318" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14">~40%</text>
  <text x="440" y="348" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">성장률</text>
  <text x="590" y="348" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14">+8.5%</text>

  <!-- LG생건 -->
  <rect x="780" y="110" width="340" height="260" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="950" y="142" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">LG생활건강</text>
  <text x="800" y="172" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출</text>
  <text x="950" y="172" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">6.36조</text>
  <text x="800" y="200" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익</text>
  <text x="950" y="200" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">1,707억</text>
  <text x="800" y="228" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">OPM</text>
  <text x="950" y="228" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">2.7%</text>
  <text x="800" y="258" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ROE</text>
  <text x="950" y="258" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">~2.3%</text>
  <text x="800" y="290" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">채널</text>
  <text x="950" y="290" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">면세점 + 중국 의존</text>
  <text x="800" y="318" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">성장률</text>
  <text x="950" y="318" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">-6.7%</text>
  <text x="800" y="348" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">뷰티 부문</text>
  <text x="950" y="348" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14">적자 -976억</text>

  <!-- Bottom -->
  <rect x="60" y="390" width="1080" height="20" rx="4" fill="transparent"/>
  <text x="600" y="405" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">DTC 수수료 3~5% vs 백화점 수수료 24% — 그 차이 20%p가 에이피알의 마진에 쌓인다</text>
</svg>