<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="400" fill="#0a0e1a"/>
  <text x="540" y="38" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">해외 매출 55% → 80%, 1년 만에</text>
  <text x="540" y="60" font-size="12" fill="#64748b" text-anchor="middle">에이피알 지역별 매출 비중 변화 | 2024 → 2025</text>

  <!-- 2024 bar -->
  <text x="120" y="110" font-size="14" font-weight="700" fill="#94a3b8">2024</text>
  <rect x="180" y="95" width="385" height="35" rx="6" fill="#3b82f6" opacity="0.5"/>
  <text x="372" y="118" font-size="13" fill="#f1f5f9" text-anchor="middle" font-weight="600">해외 55% (~3,900억)</text>
  <rect x="570" y="95" width="315" height="35" rx="6" fill="#334155"/>
  <text x="727" y="118" font-size="13" fill="#94a3b8" text-anchor="middle">국내 45% (~3,300억)</text>

  <!-- 2025 bar -->
  <text x="120" y="175" font-size="14" font-weight="700" fill="#22c55e">2025</text>
  <rect x="180" y="160" width="700" height="35" rx="6" fill="#22c55e" opacity="0.5"/>
  <text x="530" y="183" font-size="14" fill="#f1f5f9" text-anchor="middle" font-weight="700">해외 80% (~12,300억) — +207%</text>
  <rect x="885" y="160" width="130" height="35" rx="6" fill="#334155"/>
  <text x="950" y="183" font-size="12" fill="#94a3b8" text-anchor="middle">국내 20%</text>

  <!-- Country breakdown -->
  <text x="180" y="235" font-size="13" font-weight="700" fill="#f1f5f9">지역별 (2025)</text>

  <rect x="180" y="250" width="300" height="30" rx="5" fill="#3b82f6" opacity="0.4"/>
  <text x="330" y="270" font-size="12" fill="#f1f5f9" text-anchor="middle" font-weight="600">미국 ~5,700억 (+261%)</text>

  <rect x="490" y="250" width="150" height="30" rx="5" fill="#22d3ee" opacity="0.3"/>
  <text x="565" y="270" font-size="12" fill="#22d3ee" text-anchor="middle" font-weight="600">일본 ~1,800억</text>

  <rect x="650" y="250" width="210" height="30" rx="5" fill="#fbbf24" opacity="0.2"/>
  <text x="755" y="270" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">기타 ~4,800억</text>

  <!-- Impact -->
  <text x="540" y="330" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">해외 비중 ↑ → 판가 ↑ → GP마진 73%→77% → 영업이익률 24%</text>
  <text x="540" y="355" font-size="12" fill="#64748b" text-anchor="middle">단, 환율 민감도도 ↑ — 달러 10% 하락 시 매출 8% 깎임 (1년 전 4.4%)</text>
</svg>