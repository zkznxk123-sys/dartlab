<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>떼어내라던 왕관 — 정관장은 강점이 아니라 '갇힌 가치'였나</title>
  <desc>행동주의 펀드는 더 많은 배당이 아니라 100% 자회사 정관장(KGC인삼공사)의 분리상장을 요구했다. 다각화가 시너지가 아니라 담배 컨글로머릿 디스카운트에 갇힌 보석으로 거래됐다는 주장이다. 회사는 환원은 키웠지만 분리는 거부했다.</desc>
  <rect width="1200" height="620" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">"정관장, 그거 떼어내라"</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">자랑하던 다각화가, 시장에선 '강점'이 아니라 '갇힌 가치'로 거래됐다</text>

  <!-- 담배회사 안에 갇힌 정관장 -->
  <rect x="120" y="140" width="520" height="320" rx="14" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="182" fill="#f59e0b" font-size="20" font-weight="700" text-anchor="middle">KT&amp;G (담배 컨글로머릿)</text>
  <!-- 안에 갇힌 보석 -->
  <rect x="220" y="230" width="320" height="160" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2.5"/>
  <text x="380" y="278" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">정관장 (KGC인삼공사)</text>
  <text x="380" y="312" fill="#94a3b8" font-size="15" text-anchor="middle">100% 자회사 · 홍삼 국내 1위</text>
  <text x="380" y="344" fill="#94a3b8" font-size="15" text-anchor="middle">담배회사 안에 묶여</text>
  <text x="380" y="370" fill="#f59e0b" font-size="15" font-weight="700" text-anchor="middle">따로 평가받지 못한다</text>
  <text x="380" y="432" fill="#64748b" font-size="14" text-anchor="middle">"컨글로머릿 디스카운트에 갇힌 보석"</text>

  <!-- 행동주의 요구 -->
  <text x="680" y="250" fill="#ef4444" font-size="40">→</text>
  <rect x="740" y="160" width="400" height="180" rx="12" fill="#1a1010" stroke="#ef4444" stroke-width="2"/>
  <text x="940" y="200" fill="#ef4444" font-size="19" font-weight="700" text-anchor="middle">행동주의 펀드(FCP·안다)</text>
  <text x="770" y="240" fill="#f1f5f9" font-size="16">· 더 많은 배당이 아니라</text>
  <text x="770" y="272" fill="#ef4444" font-size="17" font-weight="700">· "정관장을 분리상장하라"</text>
  <text x="770" y="304" fill="#94a3b8" font-size="15">· '인삼 떼면 가치 오른다' (주장)</text>

  <rect x="740" y="360" width="400" height="100" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="940" y="400" fill="#22c55e" font-size="19" font-weight="700" text-anchor="middle">회사의 답</text>
  <text x="940" y="436" fill="#f1f5f9" font-size="16" text-anchor="middle">환원은 키우되, 분리는 거부</text>

  <rect x="120" y="490" width="1020" height="100" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="530" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">'비담배 다각화=안정적 강점'이라는 가설을, 시장이 정면으로 반박했다</text>
  <text x="600" y="564" fill="#94a3b8" font-size="15" text-anchor="middle">인삼(정관장)도 담배처럼 1899년 국가 전매 유산 — 사실 한 줄까지, 인과 비약 없음. '분리=가치↑'는 행동주의 주장</text>
</svg>
