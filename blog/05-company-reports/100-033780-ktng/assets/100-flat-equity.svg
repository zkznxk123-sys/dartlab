<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>자본 9.3조의 10년 횡보 — 번 돈을 쌓지 않고 토해낸 흔적</title>
  <desc>순이익 1조원대를 매년 내는데도 자본총계 9.3조가 10년째 제자리다. 무능이 아니라 배당과 자사주 매입·소각으로 번 돈을 주주에게 토해내기 때문이다. 자본 횡보는 환원 정책의 지문이다.</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">살이 안 찌는 회사</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">순이익 1조+를 매년 내는데, 자본총계 9.3조는 10년째 제자리</text>

  <!-- 순이익 유입 (위) -->
  <text x="180" y="160" fill="#22c55e" font-size="17" font-weight="700">순이익 유입 (매년 1조+)</text>
  <g fill="#22c55e" opacity="0.85">
    <text x="200" y="205" font-size="30">↓</text>
    <text x="340" y="205" font-size="30">↓</text>
    <text x="480" y="205" font-size="30">↓</text>
    <text x="620" y="205" font-size="30">↓</text>
  </g>

  <!-- 자본 박스 (가운데, 횡보) -->
  <rect x="160" y="230" width="600" height="90" rx="10" fill="#11161f" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="275" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">자본총계 9.3조 — 횡보</text>
  <text x="460" y="303" fill="#64748b" font-size="14" text-anchor="middle">(부채비율 52% — 레버리지도 안 키움)</text>

  <!-- 환원 유출 (아래) -->
  <g fill="#fbbf24" opacity="0.85">
    <text x="200" y="372" font-size="30">↓</text>
    <text x="340" y="372" font-size="30">↓</text>
    <text x="480" y="372" font-size="30">↓</text>
    <text x="620" y="372" font-size="30">↓</text>
  </g>
  <text x="180" y="410" fill="#fbbf24" font-size="17" font-weight="700">배당 + 자사주 매입·소각 (유출)</text>

  <!-- 우측 설명 -->
  <rect x="800" y="160" width="340" height="250" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="970" y="200" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">왜 안 쌓이나</text>
  <text x="825" y="240" fill="#94a3b8" font-size="15">자사주를 사서 없애면(소각)</text>
  <text x="825" y="266" fill="#94a3b8" font-size="15">자본이 깎인다 → 이익을 내도</text>
  <text x="825" y="292" fill="#94a3b8" font-size="15">자본총계는 제자리</text>
  <text x="825" y="332" fill="#f1f5f9" font-size="16" font-weight="700">자본 횡보 =</text>
  <text x="825" y="360" fill="#22c55e" font-size="16" font-weight="700">위기가 아니라</text>
  <text x="825" y="388" fill="#22c55e" font-size="16" font-weight="700">환원 정책의 지문</text>

  <rect x="160" y="450" width="980" height="118" rx="12" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
  <text x="185" y="490" fill="#f1f5f9" font-size="17" font-weight="700">'더 벌어 더 쌓는' 회사가 아니라 '두껍게 벌어 그대로 토해내는' 회사</text>
  <text x="185" y="522" fill="#94a3b8" font-size="15">회사는 총주주환원율 100%+·배당성향 50%+를 내세운다(외부 인용) — 배당·자사주 총액은 검증 재무 밖</text>
  <text x="185" y="550" fill="#64748b" font-size="14">'번 즉시 전액 토해낸다'고 단정하진 않음 — 다만 '자본이 안 불어난다'는 관찰은 확실, 방향은 환원</text>
</svg>
