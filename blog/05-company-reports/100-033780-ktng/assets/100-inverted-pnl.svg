<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 47% 늘었는데 영업이익은 8% 줄었다</title>
  <desc>2016년 대비 2025년 매출은 4.5조에서 6.6조로 47% 늘었지만 영업이익은 1조4,688억에서 1조3,437억으로 줄었고, 영업이익률은 32.9%에서 20.4%로 12.5%p 깎였다. 외형 성장이 마진 희석을 동반했다.</desc>
  <rect width="1200" height="680" fill="#0a0e1a"/>
  <text x="600" y="52" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">거꾸로 가는 손익계산서</text>
  <text x="600" y="86" fill="#64748b" font-size="16" text-anchor="middle">매출은 위로(+47%), 영업이익은 아래로(-8.5%), 마진은 절벽(-12.5%p)</text>

  <line x1="180" y1="130" x2="180" y2="440" stroke="#334155" stroke-width="1.5"/>
  <line x1="180" y1="440" x2="1060" y2="440" stroke="#334155" stroke-width="1.5"/>

  <text x="280" y="468" fill="#94a3b8" font-size="15" text-anchor="middle">2016</text>
  <text x="640" y="468" fill="#94a3b8" font-size="15" text-anchor="middle">2020</text>
  <text x="1000" y="468" fill="#94a3b8" font-size="15" text-anchor="middle">2025</text>

  <!-- 매출 라인 (blue, up) -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="3.5" points="280,237 640,199 1000,141"/>
  <circle cx="280" cy="237" r="6" fill="#3b82f6"/><text x="280" y="222" fill="#60a5fa" font-size="14" text-anchor="middle">4.5조</text>
  <circle cx="1000" cy="141" r="7" fill="#3b82f6"/><text x="1000" y="126" fill="#60a5fa" font-size="15" font-weight="700" text-anchor="middle">6.6조 (+47%)</text>

  <!-- 영업이익 라인 (green→red, flat-down) -->
  <polyline fill="none" stroke="#22c55e" stroke-width="3.5" points="280,373 640,372 1000,379"/>
  <circle cx="280" cy="373" r="6" fill="#22c55e"/><text x="280" y="405" fill="#22c55e" font-size="14" text-anchor="middle">1.47조</text>
  <circle cx="1000" cy="379" r="7" fill="#ef4444"/><text x="1000" y="412" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">1.34조 (-8.5%)</text>

  <!-- OPM 표시 -->
  <text x="280" y="170" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">OPM 32.9%</text>
  <text x="640" y="170" fill="#f59e0b" font-size="18" text-anchor="middle">27.9%</text>
  <text x="1000" y="170" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">20.4%</text>
  <text x="640" y="200" fill="#64748b" font-size="13" text-anchor="middle">↓ -12.5%p</text>

  <rect x="180" y="510" width="880" height="120" rx="12" fill="#11161f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="210" y="550" fill="#f1f5f9" font-size="18" font-weight="700">외형이 커질수록 마진은 얇아졌다 — '매출 성장=성공' 통념을 손익계산서가 깬다</text>
  <text x="210" y="584" fill="#94a3b8" font-size="16">성장 동력이 내수 고마진 담배가 아니라 해외 궐련·비담배(저마진)라 믹스가 희석된 것</text>
  <text x="210" y="612" fill="#64748b" font-size="13">※담뱃값의 큰 부분이 세금 — 매출을 '실력'으로 곧장 읽으면 안 됨</text>
</svg>
