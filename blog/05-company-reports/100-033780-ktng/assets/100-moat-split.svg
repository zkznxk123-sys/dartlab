<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>규제 해자는 진입만 막는다 — 마진은 못 지킨다</title>
  <desc>담배사업법의 진입장벽은 과점을 봉인해 영업이익률 20%를 떠받치지만, 마진 방어는 별개다. 해외·비담배 믹스가 마진을 희석한다. 규제=리스크도, 규제=만능 해자도 둘 다 틀렸다.</desc>
  <rect width="1200" height="620" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">해자는 진입만 막는다</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">규제 해자의 두 기능 — 하나는 작동하고, 하나는 작동하지 않는다</text>

  <!-- 진입 봉쇄: 작동 O -->
  <rect x="70" y="130" width="510" height="290" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2.5"/>
  <text x="325" y="176" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">진입 봉쇄 — 작동 ✓</text>
  <text x="100" y="224" fill="#f1f5f9" font-size="17">· 담배사업법 진입장벽</text>
  <text x="100" y="260" fill="#94a3b8" font-size="15">· 새 경쟁자가 못 들어온다 (과점 유지)</text>
  <text x="100" y="300" fill="#f1f5f9" font-size="17">· 그래서 영업이익률 20%는</text>
  <text x="100" y="332" fill="#22c55e" font-size="17" font-weight="700">  제조업에서 여전히 두껍다</text>
  <text x="325" y="388" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">해자가 과점을 봉인한다</text>

  <!-- 마진 방어: 작동 X -->
  <rect x="620" y="130" width="510" height="290" rx="14" fill="#1a1010" stroke="#ef4444" stroke-width="2"/>
  <text x="875" y="176" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">마진 방어 — 작동 ✗</text>
  <text x="650" y="224" fill="#f1f5f9" font-size="17">· 외형을 키운 성장 동력이</text>
  <text x="650" y="260" fill="#94a3b8" font-size="15">  해외 궐련·비담배(저마진)</text>
  <text x="650" y="300" fill="#f1f5f9" font-size="17">· 믹스가 그쪽으로 커질수록</text>
  <text x="650" y="332" fill="#ef4444" font-size="17" font-weight="700">  전체 영업이익률 희석 (32.9→20.4)</text>
  <text x="875" y="388" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">해자가 마진까진 못 지킨다</text>

  <rect x="70" y="450" width="1060" height="130" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="492" fill="#fbbf24" font-size="19" font-weight="700" text-anchor="middle">두 클리셰가 동시에 틀렸다</text>
  <text x="100" y="528" fill="#94a3b8" font-size="16">· '규제=리스크' — 틀렸다. 해자가 과점을 봉인해 두꺼운 이익을 떠받친다.</text>
  <text x="100" y="558" fill="#94a3b8" font-size="16">· '규제=만능 해자' — 역시 틀렸다. 해자는 진입을 막을 뿐, 마진을 지켜주진 않는다.</text>
</svg>
