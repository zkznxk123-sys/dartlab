<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>빌린 미국 브랜드를, 본가가 비워둔 중국 시장에 꽂았다</title>
  <desc>F&amp;F는 미국 브랜드 MLB·디스커버리의 라이선스를 빌려, 본가 미국이 비워둔 중국 시장에서 폭발시켰다. 2024년 매출의 약 65%가 MLB, 2026년 1분기 중국 비중이 약 51%다. 폭발 성장기는 2021년 분할 전이라 외부 인용.</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">빌린 브랜드를, 본가가 비워둔 시장에</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">미국 브랜드인데 미국이 아니라 중국에서 컸다</text>

  <!-- 미국 브랜드 -->
  <rect x="60" y="160" width="300" height="200" rx="14" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
  <text x="210" y="206" fill="#f59e0b" font-size="20" font-weight="700" text-anchor="middle">미국 브랜드</text>
  <text x="210" y="248" fill="#f1f5f9" font-size="17" text-anchor="middle">MLB (야구)</text>
  <text x="210" y="282" fill="#f1f5f9" font-size="17" text-anchor="middle">디스커버리 (다큐 채널)</text>
  <text x="210" y="322" fill="#94a3b8" font-size="14" text-anchor="middle">본가는 중국 의류시장을</text>
  <text x="210" y="344" fill="#94a3b8" font-size="14" text-anchor="middle">비워두고 있었다</text>

  <text x="382" y="270" fill="#22c55e" font-size="30">→</text>

  <!-- F&F 운영권 -->
  <rect x="450" y="160" width="300" height="200" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2.5"/>
  <text x="600" y="206" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">F&amp;F 운영권</text>
  <text x="600" y="248" fill="#f1f5f9" font-size="16" text-anchor="middle">라이선스로 빌려</text>
  <text x="600" y="282" fill="#f1f5f9" font-size="16" text-anchor="middle">기획·생산·유통·마케팅</text>
  <text x="600" y="322" fill="#94a3b8" font-size="14" text-anchor="middle">모자·신발로</text>
  <text x="600" y="344" fill="#94a3b8" font-size="14" text-anchor="middle">중국 젊은 층 공략</text>

  <text x="772" y="270" fill="#22c55e" font-size="30">→</text>

  <!-- 중국 폭발 -->
  <rect x="840" y="160" width="300" height="200" rx="14" fill="#0f141f" stroke="#3b82f6" stroke-width="2"/>
  <text x="990" y="206" fill="#60a5fa" font-size="20" font-weight="700" text-anchor="middle">중국에서 폭발</text>
  <text x="990" y="248" fill="#f1f5f9" font-size="16" text-anchor="middle">MLB 약 65% (2024)</text>
  <text x="990" y="282" fill="#f1f5f9" font-size="16" text-anchor="middle">중국 비중 약 51% (26Q1)</text>
  <text x="990" y="322" fill="#fbbf24" font-size="14" text-anchor="middle">빌린 브랜드의 운영권 차익</text>

  <rect x="60" y="410" width="1080" height="150" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="450" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">자산은 옷이 아니라 '본가가 비워둔 시장에 꽂을 수 있는 운영권' 그 자체다</text>
  <text x="90" y="490" fill="#94a3b8" font-size="15">· 폭발 성장기(2019~2021)는 dartlab 검증 데이터 밖 — 2021.5 인적분할 전 구(舊) F&amp;F</text>
  <text x="90" y="518" fill="#94a3b8" font-size="15">· dartlab엔 분할 후(2022~)만 — 그래서 본문의 검증 가능한 그림자는 '이후의 둔화'(4막)</text>
  <text x="90" y="544" fill="#64748b" font-size="13">· 매출구조·지역 비중은 외부 보도 인용(dartlab 검증 재무 아님)</text>
</svg>
