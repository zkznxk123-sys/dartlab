<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>F&amp;F — 2026년에 봐야 할 다섯 가지</title>
  <desc>라이선스 갱신, 중국 매출 둔화 vs 반등, 영업이익률, 자체 브랜드·신규 라이선스, 국내 vs 해외 믹스 — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">매출 성장도 브랜드력도 아니라 — 마진의 질과 빌린 권리의 만료 리스크로</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">MLB·디스커버리 라이선스 갱신</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">강함의 원천이자 약점 — 계약 갱신·연장 여부가 회사 가치의 토대를 정한다</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">중국 매출 둔화 vs 반등</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">중국 비중 약 51% — MLB 중국이 다시 도는지, 더 빠지는지. 26Q1 회복세 지속 여부</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">매출 대비 영업이익률</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">매출 제자리에서 OPM이 24%대를 지키나 — 마진 둔화가 멈추는 지점</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">자체 브랜드·신규 라이선스</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">빌린 권리 의존을 줄이는 움직임(자체 브랜드 육성·새 브랜드 확보)이 매출에 잡히나</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">국내 vs 해외 믹스</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">중국 외 시장으로 분산되나 — 단일 시장 의존 완화가 만료 리스크의 완충</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">F&amp;F의 고마진은 자기 브랜드 없이 만들어진다 — 강함의 원천이 곧 약점</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">— 이 회사의 모든 숫자는 남의 서명 한 장 위에 서 있다</text>
</svg>
