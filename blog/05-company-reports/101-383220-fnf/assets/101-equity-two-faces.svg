<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>자본 두 배의 두 얼굴 — 두툼한 현금이 빌린 권리 위에 서 있다</title>
  <desc>자본총계가 2022년 9,432억에서 2025년 18,787억으로 두 배가 됐다. 좋아 보이는 숫자지만, 이익 누적이 자본을 늘리는 건 정의상 당연하다. 새 정보는 그 자본을 만든 엔진의 소유권이 F&amp;F에 없다는 사실이다.</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">자본 두 배의 두 얼굴</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">자본총계 9,432억 → 18,787억 (2년새 2배) · 부채비율 41%</text>

  <!-- 자본 막대 2개 -->
  <line x1="160" y1="430" x2="500" y2="430" stroke="#334155" stroke-width="1.5"/>
  <rect x="200" y="320" width="90" height="110" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="245" y="305" fill="#60a5fa" font-size="16" font-weight="700" text-anchor="middle">9,432</text>
  <text x="245" y="452" fill="#94a3b8" font-size="14" text-anchor="middle">2022</text>
  <rect x="370" y="210" width="90" height="220" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="415" y="195" fill="#60a5fa" font-size="16" font-weight="700" text-anchor="middle">18,787</text>
  <text x="415" y="452" fill="#94a3b8" font-size="14" text-anchor="middle">2025</text>

  <!-- 좋은 얼굴 -->
  <rect x="560" y="150" width="570" height="120" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.5"/>
  <text x="585" y="190" fill="#22c55e" font-size="18" font-weight="700">😀 좋아 보이는 얼굴</text>
  <text x="585" y="224" fill="#94a3b8" font-size="15">차익이 아직 두텁다 · 재무 건전(부채비율 41%)</text>
  <text x="585" y="252" fill="#64748b" font-size="14">단, 이익 누적=자본 증가는 정의상 당연 — 새 정보 아님</text>

  <!-- 불안한 얼굴 -->
  <rect x="560" y="290" width="570" height="120" rx="12" fill="#1a1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="585" y="330" fill="#ef4444" font-size="18" font-weight="700">😟 뒤집은 얼굴</text>
  <text x="585" y="364" fill="#f1f5f9" font-size="15">그 두툼한 현금이 '자기 것 아닌 권리' 위에 서 있다</text>
  <text x="585" y="392" fill="#94a3b8" font-size="14">자본을 만든 엔진(MLB·디스커버리)의 소유권은 F&amp;F에 없다</text>

  <rect x="160" y="470" width="970" height="100" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="185" y="510" fill="#f1f5f9" font-size="17" font-weight="700">자본 규모를 자랑거리로 읽지 않는다 — '권리 위에 선 현금'이라는 질적 해석으로만 본다</text>
  <text x="185" y="544" fill="#94a3b8" font-size="15">좋아 보이는 숫자(자본 2배)와 불안한 사실(빌린 권리)이 정확히 같은 곳에 묶여 있다</text>
</svg>
