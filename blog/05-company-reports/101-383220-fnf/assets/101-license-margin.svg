<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>자기 브랜드 없이 67~71% 마진 — 옷장사가 아니라 운영권 마진</title>
  <desc>F&amp;F의 매출총이익률은 67~71%로 의류 제조업과 차원이 다르다. 공장도 자기 브랜드도 없이 기획·유통·마케팅만 쥔 자산경량 구조라, 옷장사 마진이 아니라 운영권 마진이다.</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">옷장사 마진이 아니다</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">패션 회사가 67~71% 마진을 내는 건, 옷을 잘 만들어서가 아니라 옷을 만들지 않기 때문</text>

  <!-- F&F가 안 가진 것 -->
  <rect x="70" y="140" width="510" height="290" rx="14" fill="#1a1010" stroke="#ef4444" stroke-width="2"/>
  <text x="325" y="184" fill="#ef4444" font-size="21" font-weight="700" text-anchor="middle">F&amp;F가 갖지 않은 것</text>
  <text x="100" y="234" fill="#94a3b8" font-size="17">✗ 공장 (생산은 위탁)</text>
  <text x="100" y="276" fill="#94a3b8" font-size="17">✗ 자기 브랜드 (MLB·디스커버리는 남의 것)</text>
  <text x="100" y="318" fill="#94a3b8" font-size="17">✗ 무거운 자산</text>
  <text x="325" y="380" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">자산경량(asset-light)</text>

  <!-- F&F가 가진 것 -->
  <rect x="620" y="140" width="510" height="290" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2.5"/>
  <text x="875" y="184" fill="#22c55e" font-size="21" font-weight="700" text-anchor="middle">F&amp;F가 쥔 것</text>
  <text x="650" y="234" fill="#f1f5f9" font-size="17">✓ 기획 (무엇을 만들지)</text>
  <text x="650" y="276" fill="#f1f5f9" font-size="17">✓ 유통 (어디서 팔지)</text>
  <text x="650" y="318" fill="#f1f5f9" font-size="17">✓ 마케팅 (어떻게 띄울지)</text>
  <text x="875" y="380" fill="#22c55e" font-size="26" font-weight="700" text-anchor="middle">매출총이익률 67~71%</text>

  <rect x="70" y="460" width="1060" height="110" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="500" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">이건 옷장사 마진이 아니라 '운영권 마진'이다</text>
  <text x="600" y="536" fill="#94a3b8" font-size="15" text-anchor="middle">단, 고마진 자체가 라이선스의 증거는 아니다(자기 브랜드+직영도 고마진 가능) — 진짜 질문은 '무엇을 소유했나'</text>
  <text x="600" y="560" fill="#64748b" font-size="13" text-anchor="middle">→ 2막: F&amp;F가 실제로 소유한 것은 옷도 브랜드도 아닌 '운영권' 그 자체</text>
</svg>
