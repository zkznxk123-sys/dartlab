<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 그대로인데 영업이익만 꺾였다</title>
  <desc>2022~2025년 매출은 1조8,089억에서 1조9,340억으로 사실상 제자리인데, 영업이익은 23년 5,515억에서 24년 4,507억으로 1,000억 꺾였다가 25년 4,686억으로 일부 반등했다. 옷이 안 팔린 게 아니라 마진 구조가 흔들린 신호다.</desc>
  <rect width="1200" height="680" fill="#0a0e1a"/>
  <text x="600" y="52" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">매출은 제자리, 이익만 빠졌다</text>
  <text x="600" y="86" fill="#64748b" font-size="16" text-anchor="middle">옷이 안 팔린 게 아니다 — 옷은 똑같이 팔렸는데 이익만 사라졌다</text>

  <text x="180" y="150" fill="#60a5fa" font-size="15" font-weight="700">매출 (제자리)</text>
  <!-- 매출 라인 -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="3.5" points="280,210 560,160 800,188 1020,178"/>
  <circle cx="280" cy="210" r="6" fill="#3b82f6"/><text x="280" y="194" fill="#60a5fa" font-size="13" text-anchor="middle">18,089</text>
  <circle cx="560" cy="160" r="6" fill="#3b82f6"/><text x="560" y="146" fill="#60a5fa" font-size="13" text-anchor="middle">19,785</text>
  <circle cx="1020" cy="178" r="6" fill="#3b82f6"/><text x="1020" y="163" fill="#60a5fa" font-size="13" text-anchor="middle">19,340</text>

  <line x1="180" y1="290" x2="1080" y2="290" stroke="#1e293b" stroke-width="1" stroke-dasharray="3 4"/>

  <text x="180" y="345" fill="#22c55e" font-size="15" font-weight="700">영업이익 (꺾임)</text>
  <!-- 영업이익 라인 -->
  <polyline fill="none" stroke="#22c55e" stroke-width="3.5" points="280,380 560,360 800,440 1020,425"/>
  <circle cx="280" cy="380" r="6" fill="#22c55e"/><text x="280" y="368" fill="#22c55e" font-size="13" text-anchor="middle">5,249</text>
  <circle cx="560" cy="360" r="7" fill="#22c55e"/><text x="560" y="348" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">5,515</text>
  <circle cx="800" cy="440" r="7" fill="#ef4444"/><text x="800" y="465" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">4,507</text>
  <circle cx="1020" cy="425" r="6" fill="#f59e0b"/><text x="1020" y="450" fill="#f59e0b" font-size="13" text-anchor="middle">4,686</text>

  <!-- 둔화 화살표 -->
  <path d="M 600 372 Q 700 400 790 432" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="690" y="392" fill="#ef4444" font-size="15" font-weight="700">-1,000억</text>

  <!-- x labels -->
  <text x="280" y="520" fill="#94a3b8" font-size="15" text-anchor="middle">2022</text>
  <text x="560" y="520" fill="#94a3b8" font-size="15" text-anchor="middle">2023</text>
  <text x="800" y="520" fill="#94a3b8" font-size="15" text-anchor="middle">2024</text>
  <text x="1020" y="520" fill="#94a3b8" font-size="15" text-anchor="middle">2025</text>

  <rect x="180" y="552" width="900" height="100" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="205" y="590" fill="#f1f5f9" font-size="17" font-weight="700">빠진 건 옷값이 아니라 다른 무엇 — 이 회사가 파는 게 옷이 아니라는 데 답이 있다</text>
  <text x="205" y="622" fill="#94a3b8" font-size="15">※피크는 23년(19,785), 25년 영업이익 4,686으로 부분 반등 — 두 점만 골라 추세로 포장 금지</text>
  <text x="205" y="646" fill="#64748b" font-size="13">26년 1분기 매출 5,609·영업이익 1,535(+24% YoY, OPM 27.4%)로 회복세</text>
</svg>
