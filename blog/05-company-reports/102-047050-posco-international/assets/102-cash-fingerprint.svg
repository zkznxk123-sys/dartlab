<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>번 돈의 3배가 통장에 들어왔다 — 상사 상식과 정면충돌</title>
  <desc>2025년 포스코인터내셔널의 영업현금흐름 1조9,415억은 순이익 6,368억의 3.05배다. 같은 업종 현대코퍼레이션은 영업CF가 -2,947억으로 거꾸로다. 박리다매 상사라면 불가능한 숫자로, 손익을 깎되 현금은 안 나가는 거대 감가상각 자산이 숨어 있다는 첫 신호다.</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>
  <text x="600" y="52" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">번 돈의 3배가 통장에 들어온 상사</text>
  <text x="600" y="86" fill="#64748b" font-size="16" text-anchor="middle">2025년 — 박리다매 상사라면 불가능한 현금 지문</text>

  <!-- zero line -->
  <line x1="120" y1="470" x2="1080" y2="470" stroke="#475569" stroke-width="2"/>
  <text x="105" y="475" fill="#64748b" font-size="13" text-anchor="end">0</text>

  <!-- 순이익 6368 → 118px -->
  <rect x="180" y="352" width="170" height="118" rx="6" fill="#11161f" stroke="#64748b" stroke-width="2"/>
  <text x="265" y="332" fill="#94a3b8" font-size="22" font-weight="700" text-anchor="middle">6,368</text>
  <text x="265" y="500" fill="#94a3b8" font-size="16" text-anchor="middle">순이익</text>

  <!-- 영업CF 19415 → 360px -->
  <rect x="450" y="110" width="170" height="360" rx="6" fill="#0f1a2a" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="535" y="92" fill="#60a5fa" font-size="24" font-weight="700" text-anchor="middle">19,415</text>
  <text x="535" y="500" fill="#60a5fa" font-size="16" text-anchor="middle">영업현금흐름</text>
  <text x="535" y="522" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">순이익의 3.05배</text>

  <!-- 현대코퍼 -2947 → 55px 아래 -->
  <rect x="780" y="470" width="170" height="55" rx="6" fill="#3a1515" stroke="#ef4444" stroke-width="2"/>
  <text x="865" y="552" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">-2,947</text>
  <text x="865" y="455" fill="#94a3b8" font-size="15" text-anchor="middle">현대코퍼레이션</text>
  <text x="865" y="437" fill="#64748b" font-size="13" text-anchor="middle">(같은 업종 · 발간 글)</text>

  <rect x="120" y="556" width="960" height="68" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="145" y="588" fill="#f1f5f9" font-size="16" font-weight="700">상사는 매출이 커질수록 현금이 운전자본에 묶여 영업CF가 순이익을 밑돈다 — 포스코인터는 거꾸로 3배</text>
  <text x="145" y="613" fill="#94a3b8" font-size="14">손익을 깎되 현금은 안 나가는 거대 감가상각 자산(가스전·발전소)이 손익계산서 밑에 숨어 있다는 뜻</text>
</svg>
