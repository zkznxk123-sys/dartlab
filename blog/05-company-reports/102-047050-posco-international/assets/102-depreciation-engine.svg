<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>감가상각이라는 보이지 않는 엔진 — 깎이지만 통장에선 안 나간다</title>
  <desc>발전소·가스전 같은 자본집약 자산은 감가상각을 만든다. 감가상각은 회계상 비용이라 순이익을 누르지만 실제 현금은 나가지 않아, 영업현금흐름엔 그 돈이 남는다. 그래서 영업CF가 순이익의 3.05배가 된다.</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">감가상각 — 보이지 않는 엔진</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">손익은 깎이는데 현금은 안 나간다 — 그래서 영업CF가 순이익의 3배</text>

  <!-- 손익계산서 경로 -->
  <rect x="70" y="140" width="480" height="380" rx="14" fill="#1a1010" stroke="#ef4444" stroke-width="2"/>
  <text x="310" y="184" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">손익계산서 (장부)</text>
  <text x="100" y="232" fill="#f1f5f9" font-size="17">영업이익 (본업)</text>
  <text x="100" y="276" fill="#94a3b8" font-size="16">− 감가상각 (비용으로 깎음)</text>
  <text x="100" y="320" fill="#94a3b8" font-size="16">− 이자·세금</text>
  <line x1="100" y1="344" x2="520" y2="344" stroke="#334155" stroke-width="1"/>
  <text x="100" y="384" fill="#ef4444" font-size="20" font-weight="700">= 순이익 6,368</text>
  <text x="100" y="430" fill="#64748b" font-size="15">감가상각이 순이익을 눌렀다</text>
  <text x="100" y="470" fill="#94a3b8" font-size="15">하지만 그 감가상각은</text>
  <text x="100" y="496" fill="#fbbf24" font-size="16" font-weight="700">'이미 과거에 쓴 돈'</text>

  <!-- 현금흐름 경로 -->
  <rect x="650" y="140" width="480" height="380" rx="14" fill="#0f1a2a" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="890" y="184" fill="#60a5fa" font-size="20" font-weight="700" text-anchor="middle">현금흐름표 (통장)</text>
  <text x="680" y="232" fill="#f1f5f9" font-size="17">순이익 6,368</text>
  <text x="680" y="276" fill="#22c55e" font-size="16">+ 감가상각 (현금 안 나갔으니 되더함)</text>
  <text x="680" y="320" fill="#94a3b8" font-size="16">± 운전자본 변동</text>
  <line x1="680" y1="344" x2="1100" y2="344" stroke="#334155" stroke-width="1"/>
  <text x="680" y="384" fill="#3b82f6" font-size="20" font-weight="700">= 영업CF 19,415</text>
  <text x="680" y="430" fill="#22c55e" font-size="20" font-weight="700">순이익의 3.05배</text>
  <text x="680" y="470" fill="#94a3b8" font-size="15">깎인 돈이 실제로는 안 나갔으니</text>
  <text x="680" y="496" fill="#3b82f6" font-size="16" font-weight="700">현금엔 고스란히 남는다</text>

  <text x="600" y="305" fill="#fbbf24" font-size="34">↔</text>

  <rect x="70" y="540" width="1060" height="50" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="572" fill="#94a3b8" font-size="15" text-anchor="middle">※감가상각이 주된 설명이되 운전자본 회수도 영향 — '강한 정황'까지. 감가상각 절대액은 추출 불안정으로 비인용(비율로만 논증)</text>
</svg>
