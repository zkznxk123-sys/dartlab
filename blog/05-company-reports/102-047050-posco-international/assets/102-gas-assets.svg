<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>자산의 이름 — 미얀마 가스전과 LNG 발전</title>
  <desc>옛 대우인터내셔널이 2010년 포스코에 인수된 뒤, 미얀마 가스전(2013 생산)·호주 세넥스 가스에 2023년 포스코에너지 합병으로 LNG 발전까지 더해졌다. 회사 발표상 2023년 에너지 부문은 매출 비중 약 13%인데 전사 영업이익의 절반 이상을 냈다.</desc>
  <rect width="1200" height="620" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">매출의 그림자 vs 이익의 실체</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">에너지 부문 — 매출 비중 약 13%인데 전사 영업이익의 절반 이상 (2023, 외부 인용)</text>

  <!-- 매출 도넛 느낌: 막대 -->
  <text x="300" y="150" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">매출 비중</text>
  <rect x="150" y="180" width="300" height="60" rx="8" fill="#1e293b"/>
  <rect x="150" y="180" width="39" height="60" rx="8" fill="#22c55e"/>
  <text x="170" y="217" fill="#0a0e1a" font-size="14" font-weight="700">13%</text>
  <text x="320" y="217" fill="#94a3b8" font-size="15">트레이딩 등 나머지 87%</text>

  <text x="900" y="150" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">영업이익 비중</text>
  <rect x="750" y="180" width="300" height="60" rx="8" fill="#1e293b"/>
  <rect x="750" y="180" width="165" height="60" rx="8" fill="#22c55e"/>
  <text x="832" y="217" fill="#0a0e1a" font-size="15" font-weight="700">50%+</text>
  <text x="985" y="217" fill="#94a3b8" font-size="14" text-anchor="middle">나머지</text>

  <!-- 자산 계보 -->
  <rect x="90" y="290" width="320" height="120" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="330" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">미얀마 가스전</text>
  <text x="250" y="362" fill="#94a3b8" font-size="14" text-anchor="middle">2000년대 탐사 → 2013 생산</text>
  <text x="250" y="386" fill="#64748b" font-size="13" text-anchor="middle">현금 창출의 핵심</text>

  <rect x="440" y="290" width="320" height="120" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="330" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">호주 세넥스 가스</text>
  <text x="600" y="362" fill="#94a3b8" font-size="14" text-anchor="middle">자원개발(업스트림)</text>
  <text x="600" y="386" fill="#64748b" font-size="13" text-anchor="middle">천연가스 생산·판매</text>

  <rect x="790" y="290" width="320" height="120" rx="12" fill="#0f141f" stroke="#3b82f6" stroke-width="2"/>
  <text x="950" y="330" fill="#60a5fa" font-size="18" font-weight="700" text-anchor="middle">LNG 발전</text>
  <text x="950" y="362" fill="#94a3b8" font-size="14" text-anchor="middle">2023.1 포스코에너지 합병</text>
  <text x="950" y="386" fill="#64748b" font-size="13" text-anchor="middle">다운스트림 — 밸류체인 완성</text>

  <rect x="90" y="450" width="1020" height="140" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="490" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">뿌리는 옛 대우인터내셔널(김우중 종합상사) → 2010 포스코 인수</text>
  <text x="120" y="528" fill="#94a3b8" font-size="15">· 운명을 바꾼 건 무역이 아니라 바다 밑 가스 — 오래전 투자가 지금 감가상각과 현금으로 흐른다</text>
  <text x="120" y="556" fill="#94a3b8" font-size="15">· 가스전을 '상사 DNA의 필연'이나 '행운'으로 단정 안 함 — 회계적 사실로만</text>
  <text x="120" y="580" fill="#64748b" font-size="13">· 부문 이익 비중은 dartlab 검증 재무 밖(회사 발표·언론 인용)</text>
</svg>
