<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>이익은 우상향이 아니라 2023년에 계단을 한 칸 올라가 멈췄다</title>
  <desc>영업이익은 2020년 4,745억에서 2023년 1조1,631억으로 2.45배 뛴 뒤, 2023~2025년엔 1조1,631억에서 1조1,653억으로 거의 늘지 않았다. 꾸준한 성장이 아니라 2023년 포스코에너지 합병으로 계단을 한 칸 올라가 멈춘 것이다.</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>
  <text x="600" y="52" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">성장이 아니라 '계단 한 칸'</text>
  <text x="600" y="86" fill="#64748b" font-size="16" text-anchor="middle">영업이익 — 2023년에 한 칸 올라간 뒤 평평하다</text>

  <line x1="150" y1="140" x2="150" y2="470" stroke="#334155" stroke-width="1.5"/>
  <line x1="150" y1="470" x2="1080" y2="470" stroke="#334155" stroke-width="1.5"/>

  <!-- 영업이익 라인: 2016 3181, 2020 4745, 2022 9025, 2023 11631, 2024 11169, 2025 11653 -->
  <!-- x: 16=220, 20=420, 22=620, 23=720, 24=820, 25=920 ; y=470-val/12000*330 -->
  <polyline fill="none" stroke="#22c55e" stroke-width="3.5" points="220,382 420,340 620,222 720,150 820,163 920,150"/>
  <circle cx="220" cy="382" r="6" fill="#22c55e"/><text x="220" y="402" fill="#94a3b8" font-size="13" text-anchor="middle">3,181</text>
  <text x="220" y="492" fill="#64748b" font-size="13" text-anchor="middle">2016</text>
  <circle cx="420" cy="340" r="6" fill="#22c55e"/><text x="420" y="360" fill="#94a3b8" font-size="13" text-anchor="middle">4,745</text>
  <text x="420" y="492" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <circle cx="720" cy="150" r="8" fill="#fbbf24"/><text x="720" y="138" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">11,631</text>
  <text x="720" y="492" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <circle cx="920" cy="150" r="7" fill="#22c55e"/><text x="945" y="142" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">11,653</text>
  <text x="920" y="492" fill="#64748b" font-size="13" text-anchor="middle">2025</text>

  <!-- 점프 구간 표시 -->
  <path d="M 420 340 L 720 150" stroke="#fbbf24" stroke-width="1" stroke-dasharray="5 4" opacity="0.5"/>
  <text x="540" y="230" fill="#fbbf24" font-size="14" font-weight="700">×2.45 (20→23)</text>
  <!-- 평탄 구간 -->
  <rect x="710" y="135" width="220" height="40" rx="6" fill="#22c55e" opacity="0.08"/>
  <text x="820" y="120" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">평탄 (23→25)</text>

  <rect x="150" y="520" width="930" height="104" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="175" y="558" fill="#f1f5f9" font-size="17" font-weight="700">꾸준한 우상향이 아니라 2023년에 계단을 한 칸 올라가 멈췄다</text>
  <text x="175" y="590" fill="#94a3b8" font-size="15">그 계단의 정체 = 2023.1 포스코에너지(LNG 발전) 합병 — 자산이 통째로 들어온 구조적 재평가</text>
  <text x="175" y="614" fill="#64748b" font-size="13">※점프엔 가스전 호황도 겹침 — 합병 단일 귀인 아님</text>
</svg>
