<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>물건을 12% 더 판 게 영업이익을 3배로 만들 수는 없다</title>
  <desc>2022→2023년 아마존 매출은 514.0B에서 574.8B로 11.8%만 늘었는데 영업이익은 12.2B에서 36.9B로 정확히 3배(+202%) 뛰었다. 두 증가율의 17배 격차는 이익이 매출에서 분리됐다는 신호다.</desc>
  <rect width="1200" height="680" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">매출 12% vs 영업이익 3배</text>
  <text x="600" y="90" fill="#64748b" font-size="16" text-anchor="middle">2022 → 2023, 아마존 — 같은 일을 12% 더 한 결과로는 불가능한 격차</text>

  <!-- 매출 증가율 막대 (작음) -->
  <text x="330" y="180" fill="#60a5fa" font-size="20" font-weight="700" text-anchor="middle">매출</text>
  <rect x="180" y="420" width="300" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="330" y="446" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">+11.8%</text>
  <text x="330" y="490" fill="#94a3b8" font-size="15" text-anchor="middle">514.0B → 574.8B</text>

  <!-- 영업이익 증가율 막대 (큼) -->
  <text x="870" y="180" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">영업이익</text>
  <rect x="720" y="210" width="300" height="248" rx="6" fill="#0f2a1a" stroke="#22c55e" stroke-width="2.5"/>
  <text x="870" y="350" fill="#22c55e" font-size="30" font-weight="700" text-anchor="middle">×3.02</text>
  <text x="870" y="385" fill="#94a3b8" font-size="16" text-anchor="middle">(+202%)</text>
  <text x="870" y="490" fill="#94a3b8" font-size="15" text-anchor="middle">12.2B → 36.9B</text>

  <text x="600" y="350" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">17배</text>
  <text x="600" y="375" fill="#64748b" font-size="13" text-anchor="middle">증가율 격차</text>

  <rect x="180" y="540" width="840" height="100" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="205" y="578" fill="#f1f5f9" font-size="17" font-weight="700">더 판 게 아니라, 이익률이 높은 다른 무언가가 켜졌다 — 이익이 매출에서 분리됐다</text>
  <text x="205" y="610" fill="#94a3b8" font-size="15">그 엔진은 연결 손익계산서 어디에도 안 적혀 있다 (정체는 5막의 세그먼트=외부에서만)</text>
</svg>
