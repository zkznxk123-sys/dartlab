<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>아마존 — 2026년에 봐야 할 다섯 가지</title>
  <desc>AWS 세그먼트 영업이익 비중, 광고 성장률, 소매 마진 정상화, 연결 OPM의 다음 한 칸, 자본지출과 영업CF 균형 — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">매출 크기가 아니라, 매출과 따로 노는 이익률 곡선을 본다</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">AWS 세그먼트 영업이익 비중</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">진짜 엔진의 크기 — 최신 10-K에서 AWS가 전사 영업이익의 몇 %인지가 가치의 토대</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">광고(Advertising) 성장률</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">AWS 외 제2 고마진 엔진 — 매출·마진 기여가 계속 커지는지</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">소매(북미·해외) 마진 정상화</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">2022 과잉투자에서 벗어난 소매가 박리에서 얼마나 벗어나나 — 껍데기가 얇아질수록 전사 OPM↑</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">연결 OPM의 다음 한 칸</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">5%대→11%대로 올라온 마진이 더 오르는지, 11%대에서 멈추는지</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">자본지출(CapEx)과 영업CF 균형</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">AI·데이터센터 투자가 다시 과해지면(2022처럼) 마진이 눌릴 수 있다 — 투자와 현금창출의 균형</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">물건을 12% 더 판 게 영업이익을 3배로 만들 수는 없다</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">— 그 답은 연결 손익계산서 어디에도 적혀 있지 않다 (세그먼트=외부)</text>
</svg>
