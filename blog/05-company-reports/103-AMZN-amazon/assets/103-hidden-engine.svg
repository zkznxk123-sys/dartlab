<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>안 보이는 엔진 — 매출 1/6의 AWS가 영업이익 대부분</title>
  <desc>10-K 세그먼트(외부 인용) 기준, AWS는 매출 비중이 약 1/6에 불과하지만 영업이익의 절대다수를 낸다. 매출 표만 보면 조연이지만 이익으로 보면 주연이라, 소매 간판에 가려 연결 손익 한 줄에 안 보인다.</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">매출은 조연, 이익은 주연</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">AWS·광고 — 매출 비중 작은데 영업이익은 절대다수 (10-K 세그먼트, 외부 인용)</text>

  <!-- 매출 비중 -->
  <text x="300" y="150" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">매출 비중</text>
  <rect x="150" y="180" width="300" height="60" rx="8" fill="#1e293b"/>
  <rect x="150" y="180" width="50" height="60" rx="8" fill="#22c55e"/>
  <text x="175" y="217" fill="#0a0e1a" font-size="14" font-weight="700">~1/6</text>
  <text x="320" y="217" fill="#94a3b8" font-size="15">소매가 나머지 대부분</text>

  <!-- 영업이익 비중 -->
  <text x="900" y="150" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">영업이익 비중</text>
  <rect x="750" y="180" width="300" height="60" rx="8" fill="#1e293b"/>
  <rect x="750" y="180" width="225" height="60" rx="8" fill="#22c55e"/>
  <text x="845" y="217" fill="#0a0e1a" font-size="15" font-weight="700">절대다수</text>

  <rect x="150" y="290" width="900" height="120" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="330" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">세그먼트 은닉 — 진짜 엔진이 매출 규모에 묻혀 안 보인다</text>
  <text x="600" y="366" fill="#94a3b8" font-size="16" text-anchor="middle">2006년 자기 인프라를 외부에 빌려주며 시작한 AWS가 지금은 회사 이익의 척추</text>
  <text x="600" y="392" fill="#64748b" font-size="14" text-anchor="middle">매출만 보면 조연(1/6), 이익으로 보면 주연 — 소매 간판에 가려 연결 손익 한 줄에 안 나옴</text>

  <rect x="150" y="440" width="900" height="120" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="175" y="480" fill="#f1f5f9" font-size="17" font-weight="700">★ 이 막 전체가 10-K 세그먼트 '외부 인용' — dartlab 연결로는 0% 증명</text>
  <text x="175" y="514" fill="#94a3b8" font-size="15">연결로 단정 가능한 건 '이익이 매출과 분리됐다'(OPM 5%→11%)까지. 정체는 세그먼트(외부)에서만 확정</text>
  <text x="175" y="540" fill="#64748b" font-size="13">AWS·광고의 정확한 영업이익 % 비중은 최신 10-K로 확인 — 본문은 '1/6·절대다수' 방향까지만</text>
</svg>
