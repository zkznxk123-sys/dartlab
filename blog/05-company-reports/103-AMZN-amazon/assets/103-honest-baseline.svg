<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>6.6배는 붕괴저점 cherry-pick — 왜곡 없이 보면 약 2.1배</title>
  <desc>2022년 영업이익률 2.4%는 데이터 자신이 붕괴라 부른 비정상 저점이다. 이를 출발선 삼으면 영업이익 6.6배라는 과장이 나오지만, 왜곡 없는 기저(2019 5.2%·2021 5.3%) 대비 2025년 11.2%는 약 2.1배다.</desc>
  <rect width="1200" height="660" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">출발선을 어디 두느냐의 함정</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">연결 OPM — 2022는 붕괴저점이지 출발선이 아니다</text>

  <!-- OPM 라인 -->
  <line x1="140" y1="140" x2="140" y2="400" stroke="#334155" stroke-width="1.5"/>
  <line x1="140" y1="400" x2="1080" y2="400" stroke="#334155" stroke-width="1.5"/>
  <!-- OPM: 2019 5.2, 2021 5.3, 2022 2.4(dip), 2023 6.4, 2024 10.8, 2025 11.2; y=400-opm/12*240 -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="3.5" points="220,296 420,294 600,352 760,272 920,184 1040,176"/>
  <circle cx="220" cy="296" r="6" fill="#22c55e"/><text x="220" y="282" fill="#22c55e" font-size="14" text-anchor="middle">5.2%</text>
  <text x="220" y="424" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <circle cx="420" cy="294" r="6" fill="#22c55e"/><text x="420" y="280" fill="#22c55e" font-size="14" text-anchor="middle">5.3%</text>
  <text x="420" y="424" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <circle cx="600" cy="352" r="8" fill="#ef4444"/><text x="600" y="378" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">2.4% 붕괴</text>
  <text x="600" y="424" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <circle cx="1040" cy="176" r="7" fill="#22c55e"/><text x="1040" y="162" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">11.2%</text>
  <text x="1040" y="424" fill="#64748b" font-size="13" text-anchor="middle">2025</text>

  <!-- 두 해석 -->
  <rect x="140" y="450" width="450" height="180" rx="12" fill="#1a1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="365" y="486" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">✗ cherry-pick</text>
  <text x="165" y="522" fill="#f1f5f9" font-size="16">2022 저점(2.4%) → 2025(11.2%)</text>
  <text x="165" y="552" fill="#ef4444" font-size="20" font-weight="700">영업이익 6.6배</text>
  <text x="165" y="586" fill="#94a3b8" font-size="14">가장 낮은 골을 출발선으로 바꿔치기</text>
  <text x="165" y="612" fill="#64748b" font-size="13">"망했다 부활" 드라마 — 과장</text>

  <rect x="630" y="450" width="450" height="180" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="855" y="486" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">✓ 왜곡 없는 기저</text>
  <text x="655" y="522" fill="#f1f5f9" font-size="16">정상 기저(5%대) → 2025(11.2%)</text>
  <text x="655" y="552" fill="#22c55e" font-size="20" font-weight="700">OPM 약 2.1배</text>
  <text x="655" y="586" fill="#94a3b8" font-size="14">2019 5.2%·2021 5.3%이 진짜 출발선</text>
  <text x="655" y="612" fill="#64748b" font-size="13">"5%대 → 11%대 구조 상향"</text>
</svg>
