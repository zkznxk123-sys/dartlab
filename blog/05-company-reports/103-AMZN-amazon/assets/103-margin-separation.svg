<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 곡선과 이익률 곡선이 따로 논다 — 규모와 마진의 분리</title>
  <desc>아마존 매출은 2019년 280.5B에서 2025년 716.9B로 2.6배 커졌지만, 같은 기간 연결 영업이익률은 5.2%에서 11.2%로 따로 움직였다. 소매(박리)는 OPM 두 배 점프를 만들 수 없다.</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">두 곡선이 따로 논다</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">매출(규모)은 2.6배, 그런데 영업이익률은 별개의 곡선 — 소매로는 불가능</text>

  <line x1="150" y1="140" x2="150" y2="460" stroke="#334155" stroke-width="1.5"/>
  <line x1="150" y1="460" x2="1070" y2="460" stroke="#334155" stroke-width="1.5"/>
  <text x="150" y="490" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <text x="450" y="490" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <text x="760" y="490" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <text x="1040" y="490" fill="#64748b" font-size="13" text-anchor="middle">2025</text>

  <!-- 매출 라인 (blue, smooth rise): 280.5/469.8/574.8/716.9 → y=460-rev/717*300 -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="3.5" points="150,343 450,263 760,220 1040,160"/>
  <circle cx="150" cy="343" r="6" fill="#3b82f6"/><circle cx="1040" cy="160" r="7" fill="#3b82f6"/>
  <text x="150" y="328" fill="#60a5fa" font-size="13" text-anchor="middle">280.5B</text>
  <text x="1000" y="150" fill="#60a5fa" font-size="14" font-weight="700" text-anchor="middle">716.9B (2.6배)</text>
  <text x="1055" y="200" fill="#60a5fa" font-size="13" font-weight="700">매출</text>

  <!-- OPM 라인 (amber, separate, dip at 2022 not shown for clean): 5.2/5.3/6.4/11.2 → use lower band -->
  <polyline fill="none" stroke="#fbbf24" stroke-width="3.5" stroke-dasharray="8 4" points="150,420 450,419 760,408 1040,344"/>
  <circle cx="150" cy="420" r="6" fill="#fbbf24"/><circle cx="1040" cy="344" r="7" fill="#fbbf24"/>
  <text x="150" y="440" fill="#fbbf24" font-size="13" text-anchor="middle">5.2%</text>
  <text x="1000" y="334" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">11.2%</text>
  <text x="1055" y="360" fill="#fbbf24" font-size="13" font-weight="700">OPM</text>

  <rect x="150" y="520" width="920" height="100" rx="12" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="558" fill="#f1f5f9" font-size="17" font-weight="700">규모 성장(매출)과 이익률 점프(OPM)가 다른 곡선을 그린다 — 연결 숫자가 '간판 밖'을 가리킨다</text>
  <text x="175" y="590" fill="#94a3b8" font-size="15">매출 1위는 간판일 뿐, 이익의 증명이 아니다. 1차 증거는 OPM 곡선. ※2022 붕괴저점(2.4%)은 2막에서 별도</text>
</svg>
