<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업현금흐름 13.3B이 순이익 8.1B을 앞선다 — 회비 선수령과 정합적</title>
  <desc>FY25 영업현금흐름 13.34B이 순이익 8.10B을 5.24B 웃돈다(1.65배). 회비를 1년치 미리 받고 매출은 기간에 걸쳐 인식하는 선수령 구조와 정합적이다. 단 감가상각·운전자본도 함께 작용하므로 회비 단독의 증거로 단정하지 않는다.</desc>
  <rect width="1000" height="560" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">현금이 장부 이익을 앞선다</text>
  <text x="500" y="84" fill="#64748b" font-size="16" text-anchor="middle">FY25 영업현금흐름 13.3B vs 순이익 8.1B (1.65배)</text>

  <rect x="200" y="240" width="160" height="200" rx="6" fill="#1e293b"/>
  <text x="280" y="228" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">순이익</text>
  <text x="280" y="350" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">8.1B</text>
  <text x="280" y="465" fill="#64748b" font-size="14" text-anchor="middle">장부 이익</text>

  <rect x="540" y="110" width="160" height="330" rx="6" fill="#22c55e"/>
  <text x="620" y="98" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">영업현금흐름</text>
  <text x="620" y="290" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">13.3B</text>
  <text x="620" y="465" fill="#64748b" font-size="14" text-anchor="middle">실제 들어온 현금</text>

  <line x1="360" y1="240" x2="540" y2="110" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="450" y="160" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">+5.2B</text>

  <rect x="150" y="490" width="700" height="50" rx="8" fill="#11161f" stroke="#334155" stroke-width="1"/>
  <text x="500" y="514" fill="#94a3b8" font-size="14" text-anchor="middle">회비 선수령과 정합적 — 단, 감가상각·운전자본도 함께 키운다</text>
  <text x="500" y="532" fill="#64748b" font-size="12" text-anchor="middle">'회비의 흔적'으로 단정 금지 → '정합적 단서'까지만</text>
</svg>
