<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 65% 느는데 영업이익률은 3%대에 못박혀 있다</title>
  <desc>매출은 FY20 166.8B에서 FY25 275.2B로 65% 늘었지만, 연결 영업이익률(OPM)은 3.26%에서 3.77%로 거의 수평이다. 6년간 단 한 번도 4%를 넘지 않았다 — 규모가 마진을 끌어올린다는 유통의 상식이 깨진다.</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="600" y="50" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">매출은 솟는데, 마진율은 평평하다</text>
  <text x="600" y="84" fill="#64748b" font-size="16" text-anchor="middle">매출 +65% (166.8B→275.2B) · OPM 3.26%→3.77% (6년간 4% 미돌파)</text>

  <!-- 매출 막대 -->
  <g>
    <rect x="150" y="282" width="90" height="218" rx="4" fill="#1e3a5f"/>
    <rect x="300" y="244" width="90" height="256" rx="4" fill="#1e3a5f"/>
    <rect x="450" y="203" width="90" height="297" rx="4" fill="#1e3a5f"/>
    <rect x="600" y="183" width="90" height="317" rx="4" fill="#1e3a5f"/>
    <rect x="750" y="167" width="90" height="333" rx="4" fill="#1e3a5f"/>
    <rect x="900" y="140" width="90" height="360" rx="4" fill="#3b82f6"/>
  </g>
  <text x="195" y="274" fill="#94a3b8" font-size="14" text-anchor="middle">167</text>
  <text x="345" y="236" fill="#94a3b8" font-size="14" text-anchor="middle">196</text>
  <text x="495" y="195" fill="#94a3b8" font-size="14" text-anchor="middle">227</text>
  <text x="645" y="175" fill="#94a3b8" font-size="14" text-anchor="middle">242</text>
  <text x="795" y="159" fill="#94a3b8" font-size="14" text-anchor="middle">254</text>
  <text x="945" y="132" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">275</text>

  <!-- OPM 평평한 선 -->
  <polyline points="195,478 345,476 495,476 645,477 795,471 945,469" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="195" cy="478" r="5" fill="#fbbf24"/><circle cx="345" cy="476" r="5" fill="#fbbf24"/><circle cx="495" cy="476" r="5" fill="#fbbf24"/><circle cx="645" cy="477" r="5" fill="#fbbf24"/><circle cx="795" cy="471" r="5" fill="#fbbf24"/><circle cx="945" cy="469" r="5" fill="#fbbf24"/>
  <text x="195" y="525" fill="#fbbf24" font-size="13" text-anchor="middle">3.26%</text>
  <text x="945" y="525" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">3.77%</text>

  <!-- x축 라벨 -->
  <g fill="#64748b" font-size="14" text-anchor="middle">
    <text x="195" y="555">FY20</text><text x="345" y="555">FY21</text><text x="495" y="555">FY22</text><text x="645" y="555">FY23</text><text x="795" y="555">FY24</text><text x="945" y="555">FY25</text>
  </g>
  <rect x="1010" y="140" width="160" height="62" rx="8" fill="#11161f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="1090" y="166" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">■ 매출 ($B)</text>
  <text x="1090" y="190" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">● OPM (%)</text>
  <text x="600" y="588" fill="#94a3b8" font-size="14" text-anchor="middle">마진을 못 키우는 게 아니라, 안 키운다 (dartlab 연결 실측)</text>
</svg>
