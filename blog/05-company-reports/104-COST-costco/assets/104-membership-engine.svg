<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>상품 마진을 0 근처로 깎은 회사의 이익은 입구의 연회비에서 온다</title>
  <desc>매출 270B어치 상품을 거의 원가에 팔아(상품 영업마진 약 2%) 회원을 모으고, 그렇게 모은 회원이 매년 내는 연회비 약 5B이 영업이익 10.4B의 절반에 가깝다. 회비는 매입원가·물류비가 거의 없는 거의 순수익 줄기다. (회비 비중은 10-K 외부·가설)</desc>
  <rect width="1200" height="600" fill="#0a0e1a"/>
  <text x="600" y="50" fill="#f1f5f9" font-size="29" font-weight="700" text-anchor="middle">이익은 진열대가 아니라 입구에서 온다</text>
  <text x="600" y="84" fill="#64748b" font-size="16" text-anchor="middle">상품은 거의 원가로 흘려보내고, 회비가 이익의 절반을 만든다 (회비=10-K 외부)</text>

  <!-- 진열대 -->
  <rect x="120" y="150" width="440" height="150" rx="12" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
  <text x="340" y="188" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">진열대 (상품)</text>
  <text x="340" y="226" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">매출 약 270B</text>
  <text x="340" y="258" fill="#ef4444" font-size="16" text-anchor="middle">거의 원가 판매 — 상품 영업마진 약 2%</text>
  <text x="340" y="284" fill="#64748b" font-size="14" text-anchor="middle">"여기서 사면 남는다"를 매번 증명</text>

  <!-- 화살표 -->
  <text x="600" y="225" fill="#fbbf24" font-size="30" text-anchor="middle">→</text>
  <text x="600" y="255" fill="#64748b" font-size="13" text-anchor="middle">회원을 모은다</text>

  <!-- 입구 회비 -->
  <rect x="640" y="150" width="440" height="150" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.8"/>
  <text x="860" y="188" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">입구 (멤버십 연회비)</text>
  <text x="860" y="226" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">회비 약 5B</text>
  <text x="860" y="258" fill="#22c55e" font-size="16" text-anchor="middle">매입원가·물류비 거의 0 = 거의 순수익</text>
  <text x="860" y="284" fill="#64748b" font-size="14" text-anchor="middle">영업이익 10.4B의 절반에 가까움 (외부)</text>

  <!-- 합 -->
  <rect x="300" y="360" width="600" height="110" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="400" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">영업이익 약 10.4B</text>
  <text x="600" y="436" fill="#94a3b8" font-size="15" text-anchor="middle">매출 270B에 OPM 3.8% — 이익의 큰 절반은 물건이 아니라 회비에서</text>
  <text x="600" y="458" fill="#64748b" font-size="13" text-anchor="middle">★ 연결 IS에 '회비' 라인 없음 — 10-K 외부 인용·가설</text>

  <text x="600" y="520" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">마진 거의 0인 회사가 100억 달러 이익을 낸다 — 그 모순이 화살표를 입구로 돌린다</text>
  <text x="600" y="556" fill="#64748b" font-size="14" text-anchor="middle">연결로 단정 가능한 건 '상품 마진을 3%대에 묶었다'는 모순까지</text>
</svg>
