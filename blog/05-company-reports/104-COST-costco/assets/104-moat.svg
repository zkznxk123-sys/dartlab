<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>마진을 0으로 묶는 미끼가 회비라는 통행료를 정당화한다 — 낮은 마진이 곧 해자</title>
  <desc>대부분의 회사는 높은 마진을 지키는 게 해자지만, 코스트코는 낮은 마진을 지키는 게 해자다. 가격이 오르는 순간 '여기서 사면 남는다'가 깨지고 회원이 입장료를 낼 이유가 사라지기 때문에, 마진을 끌어올릴 여지가 보여도 일부러 봉인한다. 회원 갱신율 90%대(외부)가 줄기를 매년 굳힌다.</desc>
  <rect width="1080" height="600" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="29" font-weight="700" text-anchor="middle">방향이 거꾸로 된 해자</text>
  <text x="540" y="84" fill="#64748b" font-size="16" text-anchor="middle">대부분은 '높은 마진'을 지키는 게 해자, 코스트코는 '낮은 마진'을 지키는 게 해자</text>

  <rect x="90" y="130" width="420" height="200" rx="12" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
  <text x="300" y="170" fill="#94a3b8" font-size="19" font-weight="700" text-anchor="middle">보통 회사</text>
  <text x="300" y="212" fill="#f1f5f9" font-size="17" text-anchor="middle">높은 마진을 지킨다</text>
  <text x="300" y="248" fill="#64748b" font-size="15" text-anchor="middle">가격을 올려 이익을 키우고</text>
  <text x="300" y="276" fill="#64748b" font-size="15" text-anchor="middle">브랜드·규제로 진입을 막는다</text>
  <text x="300" y="310" fill="#94a3b8" font-size="14" text-anchor="middle">→ 마진이 곧 방벽</text>

  <rect x="570" y="130" width="420" height="200" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.8"/>
  <text x="780" y="170" fill="#22c55e" font-size="19" font-weight="700" text-anchor="middle">코스트코</text>
  <text x="780" y="212" fill="#f1f5f9" font-size="17" text-anchor="middle">낮은 마진을 지킨다</text>
  <text x="780" y="248" fill="#94a3b8" font-size="15" text-anchor="middle">가격이 오르면 "여기서 사면 남는다"가</text>
  <text x="780" y="276" fill="#94a3b8" font-size="15" text-anchor="middle">깨지고 회비 낼 이유가 사라진다</text>
  <text x="780" y="310" fill="#22c55e" font-size="14" text-anchor="middle">→ 낮은 마진이 곧 방벽</text>

  <rect x="240" y="380" width="600" height="120" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="540" y="420" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">마진을 인질로 잡는 해자</text>
  <text x="540" y="456" fill="#94a3b8" font-size="15" text-anchor="middle">마진을 끌어올릴 여지가 보여도 일부러 봉인 — 그게 회원을 가둔다</text>
  <text x="540" y="482" fill="#64748b" font-size="14" text-anchor="middle">회원 갱신율 90%대(외부)가 이 줄기를 매년 굳힌다</text>

  <text x="540" y="552" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">물건을 거의 원가에 파는 게 약점이 아니라 가장 강한 무기다</text>
</svg>
