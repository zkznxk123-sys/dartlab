<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>이익 절대액은 +91%인데 마진율은 3%대 띠를 못 벗어난다</title>
  <desc>영업이익 절대액은 FY20 5.43B에서 FY25 10.38B로 91% 늘어 거의 두 배가 됐지만, 마진율은 3.3~3.8%의 좁은 띠를 벗어나지 않는다. 못 키우는 게 아니라 안 키운다는 반전.</desc>
  <rect width="1200" height="560" fill="#0a0e1a"/>
  <text x="600" y="50" fill="#f1f5f9" font-size="29" font-weight="700" text-anchor="middle">절대액은 두 배, 비율은 제자리</text>
  <text x="600" y="84" fill="#64748b" font-size="16" text-anchor="middle">못 키우는 게 아니라 안 키운다</text>

  <!-- 왼쪽: 영업이익 절대액 두 배 -->
  <text x="320" y="140" fill="#22c55e" font-size="19" font-weight="700" text-anchor="middle">영업이익 절대액</text>
  <rect x="200" y="380" width="100" height="90" rx="5" fill="#1e293b"/>
  <text x="250" y="368" fill="#94a3b8" font-size="15" text-anchor="middle">5.43B</text>
  <text x="250" y="490" fill="#64748b" font-size="14" text-anchor="middle">FY20</text>
  <rect x="370" y="220" width="100" height="250" rx="5" fill="#22c55e"/>
  <text x="420" y="208" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">10.38B</text>
  <text x="420" y="490" fill="#64748b" font-size="14" text-anchor="middle">FY25</text>
  <text x="320" y="525" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">+91% ▲</text>

  <!-- 오른쪽: 마진율 띠 -->
  <text x="880" y="140" fill="#fbbf24" font-size="19" font-weight="700" text-anchor="middle">영업이익률 (OPM)</text>
  <rect x="680" y="300" width="400" height="60" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <rect x="680" y="318" width="400" height="24" rx="4" fill="#3a2f12"/>
  <polyline points="700,335 760,333 820,333 880,334 940,328 1000,326" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="700" cy="335" r="4" fill="#fbbf24"/><circle cx="1000" cy="326" r="5" fill="#fbbf24"/>
  <text x="700" y="385" fill="#fbbf24" font-size="14" text-anchor="middle">3.26%</text>
  <text x="1000" y="385" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">3.77%</text>
  <text x="880" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">3.3% ~ 3.8% 좁은 띠 (4% 미돌파)</text>
  <text x="880" y="430" fill="#94a3b8" font-size="15" text-anchor="middle">매출이 +65% 느는 동안</text>
  <text x="880" y="455" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">마진율은 0.5%p만 올랐다</text>

  <text x="600" y="540" fill="#64748b" font-size="14" text-anchor="middle">상품 마진을 위로 끌어올리지 않는다 — 절감분을 가격으로 도로 내려보낸다</text>
</svg>
