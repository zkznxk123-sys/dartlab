<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률 46% — 패티 굽는 회사가 낼 수 있는 숫자가 아니다</title>
  <desc>외식업의 영업이익률은 잘해야 한 자릿수, 아주 잘 굴러가도 10%대다. 맥도날드의 연결 OPM은 약 46%(영업이익 12.4B / 매출 26.9B). 이 46%는 식당 직영 마진이 아니라는 첫 신호다. 단 이 숫자 자체는 가맹 모델까지만 증명하고 '부동산'은 10-K 외부다.</desc>
  <rect width="1000" height="560" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">외식업이 낼 수 없는 숫자</text>
  <text x="500" y="84" fill="#64748b" font-size="16" text-anchor="middle">연결 OPM 약 46% (영업이익 12.4B / 매출 26.9B, 2025)</text>

  <!-- 외식 직영 -->
  <rect x="180" y="400" width="180" height="40" rx="5" fill="#1e293b"/>
  <text x="270" y="388" fill="#94a3b8" font-size="16" font-weight="700" text-anchor="middle">전형적 외식 직영</text>
  <text x="270" y="426" fill="#94a3b8" font-size="15" text-anchor="middle">한 자릿수 ~ 10%대</text>
  <text x="270" y="465" fill="#64748b" font-size="13" text-anchor="middle">고기·기름·인건비가 마진을 깎음</text>

  <!-- 맥도날드 -->
  <rect x="600" y="140" width="180" height="300" rx="5" fill="#fbbf24"/>
  <text x="690" y="128" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">맥도날드</text>
  <text x="690" y="300" fill="#0a0e1a" font-size="32" font-weight="700" text-anchor="middle">46%</text>
  <text x="690" y="465" fill="#64748b" font-size="13" text-anchor="middle">손익에 식당 원가가 거의 없음</text>

  <line x1="180" y1="440" x2="820" y2="440" stroke="#334155" stroke-width="1.5"/>
  <text x="500" y="515" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">높은 건 음식이 아니라 임대료다</text>
  <text x="500" y="545" fill="#64748b" font-size="13" text-anchor="middle">단, 46%는 '식당 직영 마진 아님'까지만 증명 — '임대인'은 10-K 외부 (다음 막)</text>
</svg>
