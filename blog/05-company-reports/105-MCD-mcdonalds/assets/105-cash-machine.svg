<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업현금흐름 10.6B > 순이익 8.6B — 계약성 현금의 두께</title>
  <desc>2025년 영업현금흐름 10.55B이 순이익 8.56B을 웃돈다(1.23배). 임대료·로열티는 매달 계약에 따라 들어오는 예측 가능한 현금이고, 식당 운영의 변동비·재고 부담을 본사가 지지 않아 현금흐름이 두텁다. 단 감가상각·운전자본도 함께 작용하므로 단일귀인하지 않는다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">임대인의 현금 기계</text>
  <text x="500" y="84" fill="#64748b" font-size="16" text-anchor="middle">2025 영업현금흐름 10.6B vs 순이익 8.6B (1.23배)</text>

  <rect x="230" y="220" width="160" height="180" rx="6" fill="#1e293b"/>
  <text x="310" y="208" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">순이익</text>
  <text x="310" y="320" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">8.6B</text>
  <text x="310" y="425" fill="#64748b" font-size="14" text-anchor="middle">장부 이익</text>

  <rect x="570" y="160" width="160" height="240" rx="6" fill="#22c55e"/>
  <text x="650" y="148" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">영업현금흐름</text>
  <text x="650" y="290" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">10.6B</text>
  <text x="650" y="425" fill="#64748b" font-size="14" text-anchor="middle">계약성 현금</text>

  <rect x="150" y="450" width="700" height="52" rx="8" fill="#11161f" stroke="#334155" stroke-width="1"/>
  <text x="500" y="475" fill="#94a3b8" font-size="14" text-anchor="middle">임대료·로열티 = 예측 가능한 현금 — 변동비·재고 부담을 본사가 안 짐</text>
  <text x="500" y="494" fill="#64748b" font-size="12" text-anchor="middle">단, 감가상각·운전자본도 함께 작용 → 단일귀인 금지</text>
</svg>
