<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>맥도날드 — 2026년에 봐야 할 다섯 가지</title>
  <desc>임대료 vs 로열티의 크기 순서, 가맹 비중, 가맹점 수익성, 연결 OPM의 40%대 중반 유지, 지역 세그먼트 — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">간판(햄버거)이 아니라, 외식업이 낼 수 없는 OPM과 임대 구조를 본다</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">임대료 vs 로열티의 크기 순서</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">더 큰 다리가 계속 부동산(임대료)인지 — 2024 임대료 10.0B > 로열티 5.6B 격차 유지 (외부)</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">가맹 비중</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">약 95% franchised가 더 올라가는지 — 직영을 줄일수록 본사 손익은 임대인에 가까워진다 (외부)</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">가맹점 수익성</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">본사 고마진의 전제는 가맹점이 버티는 것 — 어려우면 2020처럼 임대료·로열티를 양보해야 한다</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">연결 OPM이 40%대 중반을 지키는지</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">46% 안착이 흔들리면 모델 자체의 신호 — 식당 마진으로 내려오는지</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">지역 세그먼트 (US·국제 운영·국제 라이선스)</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">어느 지역의 임대·로열티가 성장을 끄는지 (10-K 외부)</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">높은 건 음식이 아니라 임대료다</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">— 답은 연결 손익이 아니라 그 뒤에 숨은 가맹·임대 구조에 있다 (분해=외부)</text>
</svg>
