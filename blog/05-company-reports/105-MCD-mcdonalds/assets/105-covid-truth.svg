<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2020 — 매출 -8.9%인데 영업이익 -19.3%, 이익이 더 빠졌다</title>
  <desc>2019에서 2020년 매장이 멈추자 매출은 8.9% 빠졌는데 영업이익은 19.3%로 두 배 넘게 빠졌다. '임대인이라 불황에 안 흔들린다'는 클리셰를 데이터가 거부한다 — 임대인이라서 덜 흔들린 게 아니라, 세입자를 살리려 먼저 임대료·로열티를 양보했기 때문(외부).</desc>
  <rect width="1000" height="560" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">'불황 무풍 임대인' 클리셰를 거부한다</text>
  <text x="500" y="84" fill="#64748b" font-size="16" text-anchor="middle">2020 코로나 — 이익이 매출보다 더 크게 빠졌다</text>

  <!-- 매출 -->
  <text x="290" y="150" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">매출</text>
  <rect x="200" y="180" width="80" height="120" rx="4" fill="#1e3a5f"/>
  <text x="240" y="172" fill="#64748b" font-size="13" text-anchor="middle">21.1</text>
  <rect x="320" y="200" width="80" height="100" rx="4" fill="#3b82f6"/>
  <text x="360" y="192" fill="#94a3b8" font-size="13" text-anchor="middle">19.2</text>
  <text x="300" y="335" fill="#3b82f6" font-size="20" font-weight="700" text-anchor="middle">-8.9%</text>
  <text x="240" y="320" fill="#64748b" font-size="12" text-anchor="middle">'19</text>
  <text x="360" y="320" fill="#64748b" font-size="12" text-anchor="middle">'20</text>

  <!-- 영업이익 -->
  <text x="710" y="150" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">영업이익</text>
  <rect x="620" y="180" width="80" height="120" rx="4" fill="#3a1518"/>
  <text x="660" y="172" fill="#64748b" font-size="13" text-anchor="middle">9.07</text>
  <rect x="740" y="223" width="80" height="77" rx="4" fill="#ef4444"/>
  <text x="780" y="215" fill="#ef4444" font-size="13" text-anchor="middle">7.32</text>
  <text x="720" y="335" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">-19.3%</text>
  <text x="660" y="320" fill="#64748b" font-size="12" text-anchor="middle">'19</text>
  <text x="780" y="320" fill="#64748b" font-size="12" text-anchor="middle">'20</text>

  <rect x="120" y="380" width="760" height="130" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.4"/>
  <text x="500" y="416" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">임대인이라 덜 흔들린 게 아니라, 먼저 양보했다</text>
  <text x="500" y="450" fill="#94a3b8" font-size="15" text-anchor="middle">가맹점에 임대료 유예·로열티 감면 — 가장 마진 높은 수익을 본사가 깎아 줬다(외부)</text>
  <text x="500" y="478" fill="#94a3b8" font-size="15" text-anchor="middle">세입자가 무너지면 임대 줄기가 끊기니까 — '임대인과 세입자는 한 배'</text>
  <text x="500" y="500" fill="#64748b" font-size="12" text-anchor="middle">dartlab으로 증명되는 건 '이익이 매출보다 더 빠졌다'까지 / 감면 해석은 10-K 외부</text>
</svg>
