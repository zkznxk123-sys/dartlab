<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>가맹 95% + 임대료(10.0B) > 로열티(5.6B) — 더 큰 다리는 부동산 (10-K 외부)</title>
  <desc>매장의 약 95%가 가맹점이고, 본사는 그 점포의 땅·건물을 쥐고 임대료와 로열티를 걷는다. 2024년 가맹수익 약 15.7B 중 임대료가 약 10.0B으로 로열티 약 5.6B을 앞선다 — 더 큰 다리가 브랜드 수수료가 아니라 부동산이다. 전부 10-K 외부 인용.</desc>
  <rect width="1100" height="600" fill="#0a0e1a"/>
  <text x="550" y="50" fill="#f1f5f9" font-size="29" font-weight="700" text-anchor="middle">진짜 업은 임대인 + 로열티 징수자</text>
  <text x="550" y="84" fill="#64748b" font-size="16" text-anchor="middle">매장 약 95%가 가맹점 — 본사는 땅·건물을 쥔다 (전부 10-K 외부 인용)</text>

  <!-- 가맹 비중 -->
  <rect x="120" y="140" width="380" height="70" rx="8" fill="#1e293b"/>
  <rect x="120" y="140" width="361" height="70" rx="8" fill="#3b82f6"/>
  <text x="300" y="183" fill="#0a0e1a" font-size="20" font-weight="700" text-anchor="middle">가맹점 약 95%</text>
  <text x="300" y="240" fill="#64748b" font-size="14" text-anchor="middle">직영 매출원가는 본사 손익에 거의 안 잡힘</text>

  <!-- 임대료 vs 로열티 -->
  <text x="550" y="310" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">2024 가맹수익 약 15.7B의 분해</text>

  <rect x="150" y="340" width="500" height="64" rx="8" fill="#22c55e"/>
  <text x="175" y="380" fill="#0a0e1a" font-size="20" font-weight="700">임대료 (rents) 약 10.0B</text>

  <rect x="150" y="420" width="280" height="64" rx="8" fill="#3b82f6"/>
  <text x="175" y="460" fill="#0a0e1a" font-size="20" font-weight="700">로열티 약 5.6B</text>

  <text x="720" y="382" fill="#22c55e" font-size="17" font-weight="700">▲ 더 큰 다리</text>
  <text x="720" y="462" fill="#94a3b8" font-size="16">브랜드 수수료</text>

  <rect x="150" y="510" width="800" height="58" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="550" y="536" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">더 큰 다리가 브랜드가 아니라 부동산 — '브랜드 회사'조차 아니다</text>
  <text x="550" y="558" fill="#64748b" font-size="13" text-anchor="middle">franchised vs company-operated 분해는 dartlab 연결 밖 = 10-K 외부</text>
</svg>
