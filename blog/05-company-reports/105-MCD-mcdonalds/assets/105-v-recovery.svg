<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>V자 회복 — 2020 골에서 2021 사상 최고 영업이익(10.36B)으로</title>
  <desc>2020년 골(영업이익 7.32B)에서 2021년 10.36B으로 한 해 만에 42% 튀어 올라 코로나 직전 2019년의 9.07B을 넘어선 사상 최고를 찍었다. 진짜 회복력은 안 빠지는 것이 아니라, 빠진 뒤 빠르게 더 높이 돌아오는 것이었다.</desc>
  <rect width="1000" height="560" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">진짜 회복력은 V자에 있었다</text>
  <text x="500" y="84" fill="#64748b" font-size="16" text-anchor="middle">영업이익 — 2020 골에서 1년 만에 사상 최고로</text>

  <!-- 영업이익 라인 2019-2025 -->
  <line x1="120" y1="450" x2="920" y2="450" stroke="#334155" stroke-width="1"/>
  <polyline points="160,250 280,360 400,200 520,238 640,158 760,156 880,140" fill="none" stroke="#22c55e" stroke-width="3"/>
  <circle cx="160" cy="250" r="6" fill="#94a3b8"/><text x="160" y="232" fill="#94a3b8" font-size="13" text-anchor="middle">9.07</text>
  <circle cx="280" cy="360" r="7" fill="#ef4444"/><text x="280" y="385" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">7.32 (골)</text>
  <circle cx="400" cy="200" r="7" fill="#fbbf24"/><text x="400" y="184" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">10.36</text>
  <circle cx="520" cy="238" r="6" fill="#22c55e"/><text x="520" y="222" fill="#94a3b8" font-size="13" text-anchor="middle">9.37</text>
  <circle cx="640" cy="158" r="6" fill="#22c55e"/><text x="640" y="142" fill="#94a3b8" font-size="13" text-anchor="middle">11.65</text>
  <circle cx="760" cy="156" r="6" fill="#22c55e"/><text x="760" y="140" fill="#94a3b8" font-size="13" text-anchor="middle">11.71</text>
  <circle cx="880" cy="140" r="7" fill="#22c55e"/><text x="880" y="124" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">12.39</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="160" y="475">2019</text><text x="280" y="475">2020</text><text x="400" y="475">2021</text><text x="520" y="475">2022</text><text x="640" y="475">2023</text><text x="760" y="475">2024</text><text x="880" y="475">2025</text>
  </g>

  <line x1="400" y1="210" x2="400" y2="250" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="160" y1="250" x2="400" y2="250" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="500" y="515" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">골에서 +42% — 2019 사상 최고를 한 해 만에 넘어섰다 ($B)</text>
  <text x="500" y="544" fill="#64748b" font-size="13" text-anchor="middle">세입자가 살아나자 임대 줄기가 즉시 복원 — 마진 구조 위에서만 가능한 회복</text>
</svg>
