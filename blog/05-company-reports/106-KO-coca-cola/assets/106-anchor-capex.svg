<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 $48B인데 CapEx는 매출의 약 4% — 공장이 안 보이는 음료 회사</title>
  <desc>2025년 매출 $47.94B를 버는 코카콜라가 유형자산 취득(CapEx)에 쓴 돈은 $2.11B, 매출의 약 4.4%에 불과하다. 음료를 대량 생산·냉장·배송하는 제조업이라면 불가능한 초저 자본집약도다. 이것이 연결 숫자가 단독으로 토해낸 '닻'이다.</desc>
  <rect width="1000" height="560" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">매출 $48B, 그런데 공장엔 4%만</text>
  <text x="500" y="84" fill="#64748b" font-size="16" text-anchor="middle">2025년 — 연결 숫자가 단독으로 토해낸 닻</text>

  <rect x="150" y="120" width="200" height="330" rx="6" fill="#22c55e"/>
  <text x="250" y="108" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">매출</text>
  <text x="250" y="300" fill="#0a0e1a" font-size="26" font-weight="700" text-anchor="middle">$47.94B</text>

  <rect x="650" y="435" width="200" height="15" rx="3" fill="#fbbf24"/>
  <text x="750" y="423" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">CapEx</text>
  <text x="750" y="408" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">$2.11B</text>
  <text x="750" y="478" fill="#94a3b8" font-size="15" text-anchor="middle">매출의 약 4.4%</text>

  <line x1="150" y1="450" x2="850" y2="450" stroke="#334155" stroke-width="1.5"/>
  <text x="500" y="515" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">제조업처럼 보이는데, 자본은 거의 깔지 않고 번다</text>
  <text x="500" y="544" fill="#64748b" font-size="13" text-anchor="middle">'왜 안 까나'는 외부 인용(가치사슬 분리) — 닻과 이유는 층이 다르다</text>
</svg>
