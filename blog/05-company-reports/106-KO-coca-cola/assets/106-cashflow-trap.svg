<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2024 딥=IRS 예치(환급가능), 2025=fairlife earnout — 연도·성격 다른 별개 1회성</title>
  <desc>영업현금흐름이 2023년 11.60B에서 2024년 6.80B로 급감한 것처럼 보이지만, 2024년 딥은 IRS 이전가격 소송 예치금 약 6.0B(환급가능)이라는 단일 1회성이고, 2025년은 그와 별개인 fairlife 조건부대가 6.1B 정산이다. 둘을 한 덩어리로 묶으면 안 되며, ex-일회성 FCF는 외려 늘었다. 외부 인용.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">'영업CF 급감'은 영업 약화가 아니다</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">표면 급감(11.60→6.80→7.41)은 두 해의 서로 다른 1회성 착시 (외부)</text>

  <!-- OCF bars -->
  <g>
    <rect x="160" y="180" width="120" height="180" rx="4" fill="#1e3a5f"/><text x="220" y="170" fill="#94a3b8" font-size="14" text-anchor="middle">11.02</text><text x="220" y="378" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
    <rect x="330" y="170" width="120" height="190" rx="4" fill="#1e3a5f"/><text x="390" y="160" fill="#94a3b8" font-size="14" text-anchor="middle">11.60</text><text x="390" y="378" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
    <rect x="500" y="280" width="120" height="80" rx="4" fill="#ef4444"/><text x="560" y="270" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">6.80</text><text x="560" y="378" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
    <rect x="670" y="265" width="120" height="95" rx="4" fill="#3b82f6"/><text x="730" y="255" fill="#94a3b8" font-size="14" text-anchor="middle">7.41</text><text x="730" y="378" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
  </g>
  <line x1="160" y1="360" x2="800" y2="360" stroke="#334155" stroke-width="1.5"/>

  <rect x="430" y="410" width="300" height="64" rx="8" fill="#11161f" stroke="#ef4444" stroke-width="1.3"/>
  <text x="580" y="436" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">2024 딥 = IRS 예치 약 $6.0B</text>
  <text x="580" y="460" fill="#94a3b8" font-size="13" text-anchor="middle">확정비용 아님 — 항소 시 환급가능</text>

  <rect x="750" y="410" width="270" height="64" rx="8" fill="#11161f" stroke="#3b82f6" stroke-width="1.3"/>
  <text x="885" y="436" fill="#3b82f6" font-size="15" font-weight="700" text-anchor="middle">2025 = fairlife $6.1B</text>
  <text x="885" y="460" fill="#94a3b8" font-size="13" text-anchor="middle">별개 사건(조건부대가)</text>

  <text x="540" y="515" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">두 1회성은 연도·성격이 달라 '약 $6B' 한 덩어리로 못 묶는다</text>
  <text x="540" y="543" fill="#64748b" font-size="13" text-anchor="middle">ex-일회성 FCF는 $10.8B(2024,+11%)→$11.4B(2025)로 외려 늘었다 (외부)</text>
</svg>
