<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>코카콜라 — 2026년에 봐야 할 다섯 가지</title>
  <desc>CapEx/매출 약 4% 유지 여부, 원액 vs 완제품 세그먼트 비중, IRS 이전가격 소송 결말, ex-일회성 FCF 추이, 병입사 지분 변동 — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">매출 크기가 아니라, 자본을 거의 안 까는 닻(CapEx)을 본다</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">CapEx/매출이 약 4% 안팎을 유지하는지</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">닻이 흔들리는지 — 자본집약도가 오르면 자산경량 진술을 재검토</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">세그먼트 비중 (원액 vs 완제품)</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">SEC 정본 10-K로 원액 약 6 : 완제품 약 4가 유지되는지 (외부, 정본 확인 대상)</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">IRS 이전가격 소송 결말</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">항소 판결·환급 여부 — 패소 확정 시에만 '예치'가 '비용' 성격으로 (외부)</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">ex-일회성 FCF 추이</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">IRS·fairlife 같은 신규 1회성을 걷어낸 현금창출력이 견고한지($11.4B 다음, 외부)</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">병입사 지분(CCEP 약 17% 등) 변동</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">'완전 무위험 라이선서 아님' 뉘앙스의 근거가 바뀌는지 (외부)</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">빨간 캔은 간판, 진짜 돈줄은 자본을 거의 안 깔고 도는 원액과 라이선스</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">— 사실은 안에서(CapEx), 이유는 밖에서(가치사슬 분리, 외부)</text>
</svg>
