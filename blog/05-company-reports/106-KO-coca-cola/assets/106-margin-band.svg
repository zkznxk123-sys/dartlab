<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>OPM 약 21~29% 밴드(2024 21.2% 딥→2025 28.7%) — 단 그해 순이익은 외려 더 높다</title>
  <desc>코카콜라 영업이익률은 2019년 27.1%, 2024년 21.2%(딥), 2025년 28.7%로 약 21~29% 밴드로 움직인다. '안정 고마진'이 아니다. 그러나 2024 딥을 수익성 붕괴로 읽으면 오독이다 — 같은 해 당기순이익 10.63B는 2019년 8.92B보다 오히려 높다. 마진은 자산경량의 보조 증거일 뿐, 닻은 CapEx 4%다.</desc>
  <rect width="1000" height="560" fill="#0a0e1a"/>
  <text x="500" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">마진도 '안정 29%'가 아니다</text>
  <text x="500" y="82" fill="#64748b" font-size="15" text-anchor="middle">OPM 약 21~29% 밴드 · 2024 21.2% 딥</text>

  <!-- band shading -->
  <rect x="120" y="150" width="760" height="180" fill="#15233a" opacity="0.5"/>
  <text x="135" y="170" fill="#475569" font-size="12">29%</text>
  <text x="135" y="325" fill="#475569" font-size="12">21%</text>

  <polyline points="170,180 320,200 470,235 620,255 770,320 880,165" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="170" cy="180" r="6" fill="#fbbf24"/><text x="170" y="165" fill="#94a3b8" font-size="13" text-anchor="middle">27.1%</text>
  <circle cx="770" cy="320" r="8" fill="#ef4444"/><text x="770" y="345" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">21.2% 딥</text>
  <circle cx="880" cy="165" r="7" fill="#22c55e"/><text x="880" y="150" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">28.7%</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="170" y="360">2019</text><text x="320" y="360">2021</text><text x="470" y="360">2022</text><text x="620" y="360">2023</text><text x="770" y="360">2024</text><text x="880" y="360">2025</text>
  </g>

  <rect x="150" y="400" width="700" height="90" rx="10" fill="#0f1a17" stroke="#22c55e" stroke-width="1.3"/>
  <text x="500" y="434" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">2024 딥은 수익성 붕괴가 아니다</text>
  <text x="500" y="466" fill="#94a3b8" font-size="14" text-anchor="middle">같은 해 당기순이익 $10.63B > 2019 $8.92B — 이익 창출력은 유지</text>

  <text x="500" y="528" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">마진은 보조 증거 — 닻은 여전히 CapEx 약 4%다</text>
</svg>
