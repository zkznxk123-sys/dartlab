<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>원액·브랜드는 본체에, 공장·트럭은 외부 병입사에 — 가치사슬 분리</title>
  <desc>코카콜라는 2013~2017년 북미 자사 병입사업을 독립 파트너에 전량 재프랜차이즈해 공장·트럭·창고를 외부화하고, 본체에는 고마진 원액(concentrate)과 브랜드만 남겼다. 이 구조가 낮은 CapEx와 정합한다. 전부 10-K 외부 인용이며 인과 단정이 아니다.</desc>
  <rect width="1100" height="540" fill="#0a0e1a"/>
  <text x="550" y="50" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">가치사슬을 둘로 갈랐다 (외부 인용)</text>
  <text x="550" y="84" fill="#64748b" font-size="16" text-anchor="middle">2013~2017 북미 자사 병입 전량 재프랜차이즈</text>

  <rect x="90" y="130" width="430" height="280" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.8"/>
  <text x="305" y="170" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">본체 (KO 장부 안)</text>
  <text x="305" y="214" fill="#f1f5f9" font-size="18" text-anchor="middle">원액(concentrate)</text>
  <text x="305" y="248" fill="#f1f5f9" font-size="18" text-anchor="middle">브랜드 · 라이선스</text>
  <text x="305" y="296" fill="#22c55e" font-size="16" text-anchor="middle">고마진 · 저자본</text>
  <text x="305" y="324" fill="#94a3b8" font-size="14" text-anchor="middle">→ CapEx 약 4%로도 굴러간다</text>
  <text x="305" y="364" fill="#64748b" font-size="13" text-anchor="middle">단, FEMSA·CCEP 지분으로 노출은 잔존</text>

  <text x="550" y="275" fill="#fbbf24" font-size="28" text-anchor="middle">↔</text>

  <rect x="580" y="130" width="430" height="280" rx="12" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
  <text x="795" y="170" fill="#94a3b8" font-size="20" font-weight="700" text-anchor="middle">외부 (독립 병입사)</text>
  <text x="795" y="214" fill="#f1f5f9" font-size="18" text-anchor="middle">공장 · 냉장 · 트럭</text>
  <text x="795" y="248" fill="#f1f5f9" font-size="18" text-anchor="middle">병입 · 배송</text>
  <text x="795" y="296" fill="#ef4444" font-size="16" text-anchor="middle">저마진 · 고자본</text>
  <text x="795" y="324" fill="#94a3b8" font-size="14" text-anchor="middle">→ 무거운 자본은 여기에</text>
  <text x="795" y="364" fill="#64748b" font-size="13" text-anchor="middle">10-K: 완제품 매출↑·마진↓</text>

  <text x="550" y="470" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">낮은 CapEx(내부 사실)와 이 구조(외부 사실)가 정합한다 — 인과 단정 아님</text>
  <text x="550" y="500" fill="#64748b" font-size="13" text-anchor="middle">'마진을 노린 의도'로 점프 금지 / 세그먼트 약 6:4(정본 미확인)</text>
</svg>
