<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>요율 설정 권한이 미 합의(잠정)·UK 판결의 정조준 대상 — 현재 사실, 영향은 조건부 미래</title>
  <desc>미국 interchange 집단소송(MDL 1720)에서 옛 약 300억 달러 안은 기각됐고 신 약 380억 달러 수정합의가 2026년 6월 잠정 승인됐으나 항소·반대로 종결이 아니다. UK CAT는 2025년 6월 기본 interchange 구조를 경쟁법 위반으로 판결, 비자 항소 의사. 이는 밴드의 원천(요율 설정 권한)을 겨눈 현재 사실이며 마진 영향은 조건부 미래다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">그 요율표가 지금 법정에 있다</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">비자 매출이 아니라 비자의 '권한'이 걸렸다 (외부 인용)</text>

  <rect x="80" y="120" width="450" height="220" rx="12" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="305" y="156" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">미국 (MDL 1720)</text>
  <text x="305" y="194" fill="#94a3b8" font-size="15" text-anchor="middle">2024.06 약 300억$ 안 → 기각</text>
  <text x="305" y="224" fill="#f1f5f9" font-size="15" text-anchor="middle">2025.11 약 380억$ 수정합의</text>
  <text x="305" y="254" fill="#22c55e" font-size="15" text-anchor="middle">2026.06 '잠정' 승인 (종결 아님)</text>
  <text x="305" y="290" fill="#64748b" font-size="13" text-anchor="middle">신용 요율 인하·소비자 카드율 상한</text>
  <text x="305" y="314" fill="#64748b" font-size="13" text-anchor="middle">가맹점 거절/추가요금 권한</text>

  <rect x="550" y="120" width="450" height="220" rx="12" fill="#11161f" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="775" y="156" fill="#f59e0b" font-size="18" font-weight="700" text-anchor="middle">영국 (UK CAT)</text>
  <text x="775" y="194" fill="#f1f5f9" font-size="15" text-anchor="middle">2025.06 기본 interchange 구조</text>
  <text x="775" y="224" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">경쟁법 위반 판결</text>
  <text x="775" y="258" fill="#94a3b8" font-size="14" text-anchor="middle">비자 항소 의사</text>
  <text x="775" y="298" fill="#64748b" font-size="13" text-anchor="middle">'요율 설정 권한'을 직접 겨눔</text>

  <rect x="120" y="370" width="840" height="120" rx="12" fill="#0f1a17" stroke="#ef4444" stroke-width="1.3"/>
  <text x="540" y="406" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">두 가지 헷갈리면 안 된다</text>
  <text x="540" y="438" fill="#94a3b8" font-size="14" text-anchor="middle">'약 380억$'는 일시 현금이 아니라 수년 인하 추정치 · interchange는 발급은행 수취분(비자 매출 아님)</text>
  <text x="540" y="468" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">그리고 이 소송을 2025 OPM 60.0%와 인과로 잇는 순간 거짓이 된다</text>
</svg>
