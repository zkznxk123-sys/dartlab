<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>발급은행이 신용·대손을 지고 비자는 망 수수료만 — four-party 모델 (10-K 자기기술)</title>
  <desc>비자는 10-K에 카드 발급·여신·요율 수취·신용 리스크를 지지 않는다고 적는다. four-party(open-loop) 모델에서 발급은행(issuer)이 카드 발급과 신용·대손 리스크를 지고, 비자는 그 위에서 결제망(VisaNet)이 승인·정산을 처리해 수수료를 번다. 이 자기기술(외부)과 OPM 밴드 유지(내부)가 정합한다 — 인과가 아니다.</desc>
  <rect width="1100" height="540" fill="#0a0e1a"/>
  <text x="550" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">회사가 스스로 적어둔 문장 (외부 인용)</text>
  <text x="550" y="82" fill="#64748b" font-size="15" text-anchor="middle">four-party 모델 — 위험은 발급은행, 비자는 망 수수료만</text>

  <rect x="80" y="130" width="300" height="150" rx="12" fill="#11161f" stroke="#ef4444" stroke-width="1.6"/>
  <text x="230" y="168" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">발급은행 (issuer)</text>
  <text x="230" y="206" fill="#f1f5f9" font-size="15" text-anchor="middle">카드 발급 · 한도 · 여신</text>
  <text x="230" y="236" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">신용·대손 리스크 부담</text>
  <text x="230" y="264" fill="#64748b" font-size="13" text-anchor="middle">떼이면 여기가 손실</text>

  <text x="430" y="210" fill="#fbbf24" font-size="26" text-anchor="middle">→</text>

  <rect x="470" y="130" width="300" height="150" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.8"/>
  <text x="620" y="168" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">비자 (network)</text>
  <text x="620" y="206" fill="#f1f5f9" font-size="15" text-anchor="middle">VisaNet 승인·정산</text>
  <text x="620" y="236" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">망 수수료만 수취</text>
  <text x="620" y="264" fill="#64748b" font-size="13" text-anchor="middle">신용·대손 미보유</text>

  <text x="820" y="210" fill="#fbbf24" font-size="26" text-anchor="middle">→</text>
  <rect x="860" y="155" width="160" height="100" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.3"/>
  <text x="940" y="195" fill="#94a3b8" font-size="15" font-weight="700" text-anchor="middle">가맹점</text>
  <text x="940" y="225" fill="#64748b" font-size="13" text-anchor="middle">·매입사(acquirer)</text>

  <rect x="150" y="330" width="800" height="150" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="550" y="368" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">10-K: "비자는 카드를 발급하지 않고, 신용을 제공하지 않으며,</text>
  <text x="550" y="396" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">그로부터 매출을 얻거나 신용 리스크를 지지 않는다"</text>
  <text x="550" y="432" fill="#94a3b8" font-size="14" text-anchor="middle">이 자기기술(외부)과 내부 OPM 밴드 유지가 '정합한다' — 여기까지가 한계</text>
  <text x="550" y="460" fill="#64748b" font-size="13" text-anchor="middle">'리스크 비보유라서 마진이 높다'로 한 발 더 가면 검증 범위 밖 (인과 봉합 금지)</text>
</svg>
