<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>OPM 60~66%는 영업비용 34~40%가 실재한다는 뜻 — '비용 0'이 아니라 변동원가가 안 따라온다</title>
  <desc>영업이익률 60~66%는 역으로 영업비용이 매출의 약 34~40% 실재함을 뜻한다. 비용 0이 아니다. 핵심은 매출이 +74% 커지는 동안 그 비용 비율이 마진을 끌어내리지 못했다는 것 — 매출을 따라 늘어나는 변동원가(원가·대손)의 비중이 작은 사업과 정합한다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">'비용 0'이 아니다</text>
  <text x="500" y="82" fill="#64748b" font-size="15" text-anchor="middle">OPM 60~66% ⇒ 영업비용 34~40%가 매년 실재</text>

  <!-- 100% stacked bar -->
  <rect x="150" y="150" width="700" height="90" rx="8" fill="#1e293b"/>
  <rect x="150" y="150" width="438" height="90" rx="8" fill="#22c55e"/>
  <text x="369" y="202" fill="#0a0e1a" font-size="20" font-weight="700" text-anchor="middle">영업이익 약 60~66%</text>
  <rect x="588" y="150" width="262" height="90" fill="#475569"/>
  <text x="719" y="202" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">영업비용 34~40%</text>

  <rect x="150" y="290" width="700" height="170" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="500" y="328" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">진짜 희소한 사실: 매출 +74%에도 그 비용 비율이 안 올랐다</text>
  <text x="500" y="364" fill="#94a3b8" font-size="15" text-anchor="middle">매출을 따라 늘어나는 변동원가(원가·대손)의 비중이 작은 사업과 정합한다</text>
  <text x="500" y="394" fill="#94a3b8" font-size="15" text-anchor="middle">'원가·대손이 갉는 사업이면 불가능'이라는 절대어가 아니라 '정합한다'까지만</text>
  <text x="500" y="428" fill="#64748b" font-size="13" text-anchor="middle">밴드 유지는 환율·고객 인센티브·믹스 등 다요인과도 양립 — 인과 봉합 금지</text>

  <text x="500" y="495" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">그 안 늘어난 변동원가 — 원가·대손 — 는 대체 누가 지는가? → 다음 막</text>
</svg>
