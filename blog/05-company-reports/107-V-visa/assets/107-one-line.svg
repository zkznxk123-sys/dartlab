<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 +74% 6년간 영업이익률이 60%대 밴드를 안 벗어났다 — 증명할 수 있는 한 줄</title>
  <desc>비자 매출은 2019년 22.98B에서 2025년 40.00B로 74% 커졌지만 영업이익률(OPM)은 줄곧 약 60~66% 밴드 안이다. 외형이 1.7배가 되는 동안 마진이 희석되지 않았다. 단 계속 상승이 아니라 2024→2025에 65.7%→60.0%로 5.7%p 내려왔다(경계노이즈 가능). 연결 숫자가 단독으로 증명하는 전부.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">외형 1.7배인데 마진은 안 깎였다</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">매출 +74% (22.98→40.00B) · OPM 약 60~66% 밴드 유지</text>

  <!-- OPM band -->
  <rect x="120" y="120" width="840" height="120" fill="#15233a" opacity="0.5"/>
  <text x="135" y="138" fill="#475569" font-size="12">66%</text>
  <text x="135" y="235" fill="#475569" font-size="12">60%</text>

  <!-- 매출 bars (background, scaled small) -->
  <g opacity="0.5">
    <rect x="160" y="400" width="90" height="40" rx="3" fill="#1e3a5f"/>
    <rect x="320" y="392" width="90" height="48" rx="3" fill="#1e3a5f"/>
    <rect x="480" y="378" width="90" height="62" rx="3" fill="#1e3a5f"/>
    <rect x="640" y="365" width="90" height="75" rx="3" fill="#1e3a5f"/>
    <rect x="800" y="348" width="90" height="92" rx="3" fill="#3b82f6"/>
  </g>
  <text x="205" y="392" fill="#475569" font-size="12" text-anchor="middle">23.0</text>
  <text x="845" y="340" fill="#94a3b8" font-size="13" text-anchor="middle">40.0 (매출 $B)</text>

  <!-- OPM line -->
  <polyline points="205,150 365,165 525,167 685,148 845,232" fill="none" stroke="#fbbf24" stroke-width="3.5"/>
  <circle cx="205" cy="150" r="6" fill="#fbbf24"/><text x="205" y="135" fill="#94a3b8" font-size="13" text-anchor="middle">65.3%</text>
  <circle cx="685" cy="148" r="6" fill="#fbbf24"/><text x="685" y="133" fill="#94a3b8" font-size="13" text-anchor="middle">65.7%</text>
  <circle cx="845" cy="232" r="8" fill="#ef4444"/><text x="845" y="222" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">60.0%</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="205" y="460">2019</text><text x="365" y="460">2022</text><text x="525" y="460">2023</text><text x="685" y="460">2024</text><text x="845" y="460">2025</text>
  </g>

  <text x="540" y="510" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">우리가 숫자로 증명할 수 있는 건 딱 이 한 줄 — '아직 안 깎였다'</text>
  <text x="540" y="540" fill="#64748b" font-size="13" text-anchor="middle">단 '계속 상승' 아님: 2024→2025 5.7%p 하락(2025 점값은 경계노이즈 가능) · 왜인지는 숫자가 말 못 함</text>
</svg>
