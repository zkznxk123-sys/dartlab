<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>비자가 '버는 돈'(망 수수료)과 '정하지만 안 받는 돈'(interchange)은 다른 층</title>
  <desc>비자 매출은 service / data processing / international transaction / other 4종이며 client incentives는 매출 차감(contra-revenue)으로 처리된다. 가맹점이 무는 interchange(스왑피)는 발급은행이 수취하고 비자 매출이 아니다 — 단 그 기본 요율표는 비자가 설정한다. '스왑피=비자 매출' 오독 차단.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">통행료의 정체: 버는 돈 vs 정하는 돈</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">'스왑피 = 비자 매출'은 오독이다 (외부 인용)</text>

  <rect x="80" y="130" width="450" height="250" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.8"/>
  <text x="305" y="168" fill="#22c55e" font-size="19" font-weight="700" text-anchor="middle">비자가 버는 돈 (매출)</text>
  <text x="305" y="208" fill="#f1f5f9" font-size="15" text-anchor="middle">① service</text>
  <text x="305" y="238" fill="#f1f5f9" font-size="15" text-anchor="middle">② data processing</text>
  <text x="305" y="268" fill="#f1f5f9" font-size="15" text-anchor="middle">③ international transaction</text>
  <text x="305" y="298" fill="#f1f5f9" font-size="15" text-anchor="middle">④ other</text>
  <text x="305" y="340" fill="#94a3b8" font-size="14" text-anchor="middle">client incentives는 매출에서 차감</text>
  <text x="305" y="364" fill="#64748b" font-size="13" text-anchor="middle">(contra-revenue) → 순매출 보고</text>

  <rect x="550" y="130" width="450" height="250" rx="12" fill="#11161f" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="775" y="168" fill="#f59e0b" font-size="19" font-weight="700" text-anchor="middle">정하지만 안 받는 돈</text>
  <text x="775" y="208" fill="#f1f5f9" font-size="16" text-anchor="middle">interchange (스왑피)</text>
  <text x="775" y="244" fill="#94a3b8" font-size="15" text-anchor="middle">→ 가맹점이 물고</text>
  <text x="775" y="274" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">발급은행이 수취 (비자 매출 아님)</text>
  <text x="775" y="316" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">단, 기본 요율표는 비자가 설정</text>
  <text x="775" y="346" fill="#64748b" font-size="13" text-anchor="middle">가맹점엔 협상 불가한 고정값</text>

  <text x="540" y="430" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">바로 이 '정하지만 안 받는' 요율 설정 권한이 다음 막에서 법정의 표적이 된다</text>
  <text x="540" y="470" fill="#64748b" font-size="14" text-anchor="middle">시장 색채: 중국 외 결제처리 대략 90% 복점 (2차 자료, '대략'으로만 — 원인 증거 아님)</text>
</svg>
