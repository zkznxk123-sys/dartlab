<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>펩시코 — 2026년에 봐야 할 다섯 가지</title>
  <desc>OPM이 12.2% 딥에서 회복하는가, 영업이익 절대액 회복, 순이익 추이, core 영업이익률·organic 성장, 세그먼트 1차 확정 — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">연결이 증명한 디커플링이 풀리는가 — 점값으로만 추적</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">OPM이 12.2% 딥에서 회복하는가</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">연결로 직접 검증 가능한 단 하나의 추적점 — 딥이 일회성이었는지 추세였는지 사후 판별</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">영업이익 절대액이 $11.50B를 회복하는가</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">비율 착시가 아닌 절대 둔화의 반전 여부</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">당기순이익이 $8.24B 아래로 더 내려가는지</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">OPM과 분리한 별개 라인의 점값 (NPM 밴드로 묶지 말 것)</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">core 영업이익률·organic 성장이 가속하는가</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">organic +1.7%(2018 이래 최저)가 추세로 굳는지 회복하는지 (외부, 회사 가이던스 사후 검증)</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">세그먼트 비중을 1차 10-K로 확정</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">스낵 vs 음료 영업이익 비중·세그먼트 OPM을 미확정 가설에서 사실로 올릴 유일한 경로 (외부)</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">외형은 +40% 커졌는데 이익은 안 따라왔다 — 그 이유는 연결 손익에 없다</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">진짜 주인공은 펩시코가 아니라, 숫자가 증명하는 자리와 입을 닫는 자리의 경계선</text>
</svg>
