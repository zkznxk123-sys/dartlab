<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 +40% 솟는데 영업이익률은 12%대로 — 외형이 수익으로 번역되지 않는다</title>
  <desc>펩시코 매출은 2019년 67.16B에서 2025년 93.92B로 +40% 성장했지만 영업이익률(OPM)은 15.3%에서 12.2%로 내려왔다. 단조 하락은 아니며 2024년 14.0%로 반등했다 2025년 다시 꺾였다. 외형 성장과 수익성의 디커플링 — 연결이 단독으로 증명하는 결과.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">외형은 솟고, 수익성은 따라오지 않는다</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">매출 +40% (67.16→93.92B) · OPM 15.3%→12.2% (디커플링)</text>

  <g>
    <rect x="120" y="300" width="100" height="160" rx="4" fill="#1e3a5f"/>
    <rect x="270" y="271" width="100" height="189" rx="4" fill="#1e3a5f"/>
    <rect x="420" y="255" width="100" height="205" rx="4" fill="#1e3a5f"/>
    <rect x="570" y="243" width="100" height="217" rx="4" fill="#1e3a5f"/>
    <rect x="720" y="242" width="100" height="218" rx="4" fill="#1e3a5f"/>
    <rect x="870" y="237" width="100" height="223" rx="4" fill="#3b82f6"/>
  </g>
  <text x="170" y="292" fill="#94a3b8" font-size="13" text-anchor="middle">67</text>
  <text x="920" y="229" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">94</text>

  <polyline points="170,150 320,165 470,180 620,182 770,162 920,200" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="170" cy="150" r="5" fill="#fbbf24"/><text x="170" y="138" fill="#fbbf24" font-size="12" text-anchor="middle">15.3%</text>
  <circle cx="770" cy="162" r="5" fill="#fbbf24"/><text x="770" y="150" fill="#94a3b8" font-size="12" text-anchor="middle">14.0%</text>
  <circle cx="920" cy="200" r="6" fill="#ef4444"/><text x="920" y="218" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">12.2%</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="170" y="480">2019</text><text x="320" y="480">2021</text><text x="470" y="480">2022</text><text x="620" y="480">2023</text><text x="770" y="480">2024</text><text x="920" y="480">2025</text>
  </g>
  <rect x="120" y="500" width="840" height="44" rx="8" fill="#11161f" stroke="#334155" stroke-width="1"/>
  <text x="540" y="528" fill="#94a3b8" font-size="14" text-anchor="middle">■ 매출($B)  ● OPM(%) — 연결은 '디커플링'만 증명, '왜'는 손익에 없다</text>
</svg>
