<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>reported는 딥, core는 보합 — 정의 차이가 일회성 충격의 크기를 드러낸다 (외부 인용)</title>
  <desc>외부 인용 기준 2025년 회계상(reported) 희석 EPS는 6.00달러로 전년 6.95달러 대비 14% 감소했지만, 회사 조정(core) EPS는 8.14달러로 전년 8.16달러와 사실상 보합이었다. 둘의 괴리는 reported 딥의 상당 부분이 일회성 비용에서 비롯됐음을 시사한다. 전부 외부 인용.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">같은 해, 두 개의 EPS (외부 인용)</text>
  <text x="500" y="80" fill="#64748b" font-size="15" text-anchor="middle">회계상(reported)은 딥, 회사 조정(core)은 보합</text>

  <text x="280" y="130" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">reported 희석 EPS</text>
  <rect x="200" y="180" width="70" height="150" rx="4" fill="#3a1518"/><text x="235" y="170" fill="#94a3b8" font-size="13" text-anchor="middle">$6.95</text><text x="235" y="350" fill="#64748b" font-size="12" text-anchor="middle">2024</text>
  <rect x="320" y="210" width="70" height="120" rx="4" fill="#ef4444"/><text x="355" y="200" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">$6.00</text><text x="355" y="350" fill="#64748b" font-size="12" text-anchor="middle">2025</text>
  <text x="295" y="385" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">-14%</text>

  <text x="720" y="130" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">core EPS (회사 조정)</text>
  <rect x="640" y="190" width="70" height="140" rx="4" fill="#0f1a17" stroke="#22c55e" stroke-width="1.2"/><text x="675" y="180" fill="#94a3b8" font-size="13" text-anchor="middle">$8.16</text><text x="675" y="350" fill="#64748b" font-size="12" text-anchor="middle">2024</text>
  <rect x="760" y="192" width="70" height="138" rx="4" fill="#22c55e"/><text x="795" y="182" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">$8.14</text><text x="795" y="350" fill="#64748b" font-size="12" text-anchor="middle">2025</text>
  <text x="735" y="385" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">보합</text>

  <rect x="150" y="415" width="700" height="80" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="500" y="448" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">큰 괴리(-14% vs 보합) = reported 딥 상당부분이 일회성 비용 시사</text>
  <text x="500" y="476" fill="#64748b" font-size="13" text-anchor="middle">단 organic 매출 +1.7%(2018 이래 최저)로 추세 둔화도 함께 — 일회성만으로 환원 불가</text>
</svg>
