<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>간판은 음료, 이익의 큰 몫은 스낵 — 단 이건 연결로 증명 0, 외부 인용 가설</title>
  <desc>외부 인용(10-K 세그먼트)에 따르면 북미 매출 간판은 음료지만 전사 영업이익 비중은 스낵(Frito-Lay)이 음료를 크게 앞서는 것으로 알려져 있다. 그러나 이는 dartlab 연결로 증명이 0인 가설이며 정밀 자릿수는 미확정이고, 펩시코는 7개 세그먼트라 2분할 자체가 단순화다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">간판은 음료, 이익의 큰 몫은 스낵?</text>
  <text x="540" y="82" fill="#f59e0b" font-size="15" text-anchor="middle">★ 전부 외부 인용 가설 — dartlab 연결로는 증명 0</text>

  <text x="300" y="140" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">매출 간판</text>
  <rect x="120" y="160" width="360" height="56" rx="8" fill="#1e293b"/>
  <rect x="120" y="160" width="200" height="56" rx="8" fill="#3b82f6"/>
  <text x="220" y="196" fill="#0a0e1a" font-size="15" font-weight="700" text-anchor="middle">음료(큰 간판)</text>
  <text x="400" y="196" fill="#94a3b8" font-size="14" text-anchor="middle">스낵</text>

  <text x="780" y="140" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">영업이익 비중 (외부 인용)</text>
  <rect x="600" y="160" width="360" height="56" rx="8" fill="#1e293b"/>
  <rect x="600" y="160" width="250" height="56" rx="8" fill="#22c55e"/>
  <text x="725" y="196" fill="#0a0e1a" font-size="15" font-weight="700" text-anchor="middle">스낵(큰 몫)</text>
  <text x="905" y="196" fill="#94a3b8" font-size="14" text-anchor="middle">음료</text>

  <rect x="150" y="270" width="780" height="150" rx="12" fill="#11161f" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="540" y="306" fill="#f59e0b" font-size="17" font-weight="700" text-anchor="middle">매출로는 조연인 스낵이 이익으로는 주연이라는 '가설'</text>
  <text x="540" y="340" fill="#94a3b8" font-size="14" text-anchor="middle">세그먼트 영업이익 비중·세그먼트 OPM은 10-K 외부 인용이며 정밀 자릿수 미확정</text>
  <text x="540" y="368" fill="#94a3b8" font-size="14" text-anchor="middle">'스낵이 진짜 돈줄'을 연결로 증명한 척 금지 — 7개 세그먼트라 2분할도 단순화</text>
  <text x="540" y="398" fill="#64748b" font-size="13" text-anchor="middle">연결이 증명하는 건 디커플링(결과)까지 / 이 막은 원인 '가설'</text>

  <text x="540" y="480" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">KO 거울: 매출은 KO의 약 2배인데 OPM은 KO의 약 절반(0.45~0.55배)</text>
  <text x="540" y="510" fill="#64748b" font-size="13" text-anchor="middle">통합형(PEP) vs 자산경량 라이선서(KO) — 비율 대비만 정당, 인과 봉합 금지</text>
</svg>
