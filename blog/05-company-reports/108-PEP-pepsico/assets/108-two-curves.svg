<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>외형(매출)과 수익성(OPM) 두 곡선이 따로 논다 — 디커플링</title>
  <desc>2019년을 100으로 지수화하면 매출은 140까지 우상향하는데 영업이익률 지수는 80으로 내려온다. 외형과 수익성이 같은 회사 안에서 정반대 방향으로 갈라진 것이 이 글의 척추다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">한 회사, 두 방향 (2019=100 지수)</text>
  <text x="500" y="80" fill="#64748b" font-size="15" text-anchor="middle">매출은 위로, 마진율은 아래로</text>

  <line x1="120" y1="120" x2="120" y2="420" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="270" x2="900" y2="270" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="100" y="125" fill="#475569" font-size="12" text-anchor="end">140</text>
  <text x="100" y="275" fill="#475569" font-size="12" text-anchor="end">100</text>
  <text x="100" y="420" fill="#475569" font-size="12" text-anchor="end">80</text>

  <polyline points="150,270 320,210 490,175 660,165 830,140" fill="none" stroke="#22c55e" stroke-width="3.5"/>
  <text x="845" y="135" fill="#22c55e" font-size="14" font-weight="700">매출 140</text>

  <polyline points="150,270 320,310 490,330 660,290 830,395" fill="none" stroke="#fbbf24" stroke-width="3.5"/>
  <text x="845" y="400" fill="#fbbf24" font-size="14" font-weight="700">OPM 80</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="150" y="445">2019</text><text x="320" y="445">2021</text><text x="490" y="445">2022</text><text x="660" y="445">2023</text><text x="830" y="445">2025</text>
  </g>
  <text x="500" y="490" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">외형이 +40% 커지는 동안 수익성은 오히려 내려왔다 — 그게 디커플링이다</text>
</svg>
