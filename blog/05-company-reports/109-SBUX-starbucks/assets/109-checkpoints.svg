<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>스타벅스 — 2026년에 봐야 할 다섯 가지</title>
  <desc>OPM이 7.9%에서 회복하는가, 북미 거래건수 추세, NPM-OPM 갭, 중국 매각 후 연결 변화, 영업현금흐름 방향 — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">마진 회복은 손익(내부)에서, '왜'는 회사 발표(외부)에서</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">OPM이 7.9%에서 회복하는가</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">2025가 일회성($1B 구조조정 약 85% 자산성)의 바닥이었는지, 구조적 약세가 이어지는지</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">북미 거래건수(트래픽) 추세</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">거래가 플러스로 돌아서는지 (외부) — 가격 상쇄가 아닌 진짜 방문 회복의 잣대</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">순이익·NPM과 OPM 회복의 갭</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">2025 OPM 7.9% / NPM 5.0%의 약 290bp 갭이 좁혀지는지 — 분리 불가였던 갭의 방향</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">중국 사업 지분 매각 후 연결 변화</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">매각(외부)이 연결 매출·영업이익 라인에 어떻게 반영되는지</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">영업현금흐름의 방향</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">2025 $4.75B(-22%)가 마진 회복 없이도 반등하는지, 손익 약세가 현금에서 지속되는지</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">간판(커피)이 매출은 키웠는데, 그 간판의 마진이 배신한 해</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">내부 숫자가 증명하는 건 '찢어졌다'까지 — '왜'는 전부 회사 바깥의 이야기다</text>
</svg>
