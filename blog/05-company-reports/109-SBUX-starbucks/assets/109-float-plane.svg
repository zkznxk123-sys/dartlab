<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>float는 BS·이연수익 평면 — 손익(2025 마진 붕괴)과 다른 면에 있다</title>
  <desc>고객 선불충전+로열티 잔액(외부 인용 FY2024 약 1,718.7M)은 무이자 부채(이연수익)로 재무상태표 항목이지 손익이 아니다. 충전 시점엔 수익이 아니고 사용·breakage·이자수익으로만 손익에 흘러간다. 2025년 OPM 붕괴(손익)와는 다른 회계 평면이라 인과로 이어지지 않는다. 장기 네슬레 선수 로열티(7.15B)와도 분리.</desc>
  <rect width="1080" height="520" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">'커피 파는 은행'은 다른 평면의 이야기</text>
  <text x="540" y="80" fill="#64748b" font-size="15" text-anchor="middle">흥미롭지만 손익이 아니라 BS·이연수익 (외부 인용)</text>

  <rect x="80" y="120" width="430" height="250" rx="12" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="158" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">float = BS·이연수익 평면</text>
  <text x="295" y="198" fill="#f1f5f9" font-size="16" text-anchor="middle">선불충전+로열티 잔액</text>
  <text x="295" y="228" fill="#f1f5f9" font-size="16" text-anchor="middle">약 $1,718.7M (FY2024, 외부)</text>
  <text x="295" y="262" fill="#94a3b8" font-size="14" text-anchor="middle">무이자 부채 — 충전 시점엔 수익 아님</text>
  <text x="295" y="292" fill="#94a3b8" font-size="14" text-anchor="middle">사용·breakage·이자수익으로만 손익行</text>
  <text x="295" y="332" fill="#64748b" font-size="13" text-anchor="middle">★ 별개: 네슬레 선수 로열티 $7.15B(40년)</text>

  <rect x="570" y="120" width="430" height="250" rx="12" fill="#0f1a17" stroke="#ef4444" stroke-width="1.5"/>
  <text x="785" y="158" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">2025 사건 = 손익 평면</text>
  <text x="785" y="198" fill="#f1f5f9" font-size="16" text-anchor="middle">영업이익 5.87 → 2.94</text>
  <text x="785" y="228" fill="#f1f5f9" font-size="16" text-anchor="middle">OPM 16.3% → 7.9%</text>
  <text x="785" y="268" fill="#94a3b8" font-size="14" text-anchor="middle">마진이 무너진 건 여기(손익)다</text>
  <text x="785" y="302" fill="#94a3b8" font-size="14" text-anchor="middle">float와 인과로 이어지지 않는다</text>

  <text x="540" y="255" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">⊘</text>
  <text x="540" y="425" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">float를 'dartlab로 증명한 척' 금지 — 검증 수치에 한 줄도 없다</text>
  <text x="540" y="455" fill="#64748b" font-size="13" text-anchor="middle">'은행'은 2차 해석 · float($1.7B 단기)와 네슬레($7B 장기)를 합쳐 과장 금지</text>
  <text x="540" y="485" fill="#64748b" font-size="13" text-anchor="middle">흥미로운 곁가지일 뿐, 2025에 무너진 건 float가 아니다</text>
</svg>
