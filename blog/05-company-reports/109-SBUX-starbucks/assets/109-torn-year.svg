<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 사상 최대인데 영업이익은 피크 대비 반토막 — 찢어진 해</title>
  <desc>스타벅스 매출은 2019년 26.51B에서 2025년 37.18B로 +40% 우상향하지만, 영업이익은 2023년 피크 5.87B에서 2025년 2.94B로 정확히 절반이 됐다. 2020년(셧다운, 1.56B)과 2025년(사상 최대 매출인데 2.94B)은 정반대 종류의 두 골이다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">성장과 수익성이 정반대로 찢어진 해</text>
  <text x="540" y="80" fill="#64748b" font-size="15" text-anchor="middle">매출 +40% 우상향 vs 영업이익 피크 대비 반토막</text>

  <!-- 매출 라인 -->
  <polyline points="120,250 270,290 420,210 570,165 720,150 870,148 960,142" fill="none" stroke="#22c55e" stroke-width="3"/>
  <text x="960" y="130" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">매출 37.2</text>
  <circle cx="120" cy="250" r="4" fill="#22c55e"/><text x="120" y="238" fill="#64748b" font-size="11" text-anchor="middle">26.5</text>

  <!-- 영업이익 막대 -->
  <g>
    <rect x="100" y="340" width="44" height="100" rx="3" fill="#1e3a5f"/>
    <rect x="250" y="402" width="44" height="38" rx="3" fill="#ef4444"/>
    <rect x="400" y="320" width="44" height="120" rx="3" fill="#1e3a5f"/>
    <rect x="550" y="326" width="44" height="114" rx="3" fill="#1e3a5f"/>
    <rect x="700" y="296" width="44" height="144" rx="3" fill="#3b82f6"/>
    <rect x="850" y="307" width="44" height="133" rx="3" fill="#1e3a5f"/>
    <rect x="938" y="368" width="44" height="72" rx="3" fill="#ef4444"/>
  </g>
  <text x="272" y="396" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">1.56</text>
  <text x="272" y="458" fill="#ef4444" font-size="11" text-anchor="middle">셧다운</text>
  <text x="722" y="288" fill="#3b82f6" font-size="12" font-weight="700" text-anchor="middle">5.87</text>
  <text x="722" y="458" fill="#64748b" font-size="11" text-anchor="middle">피크</text>
  <text x="960" y="360" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2.94</text>
  <text x="960" y="458" fill="#ef4444" font-size="11" text-anchor="middle">최대매출인데</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="122" y="478">2019</text><text x="272" y="478">2020</text><text x="422" y="478">2021</text><text x="572" y="478">2022</text><text x="722" y="478">2023</text><text x="872" y="478">2024</text><text x="960" y="478">2025</text>
  </g>
  <text x="540" y="520" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">문 닫아 무너진 해(2020)보다, 가장 많이 팔고 무너진 해(2025)가 더 이상하다</text>
  <text x="540" y="546" fill="#64748b" font-size="13" text-anchor="middle">영업이익 2023 5.87 → 2025 2.94 (정확히 0.50배) · OPM 16.3%→7.9%</text>
</svg>
