<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>연결이 증명하는 평면(손익)과 회사가 설명하는 평면(세그먼트·bp)은 다른 면이다</title>
  <desc>dartlab 연결 손익이 단독으로 증명하는 것은 2025년 마진 붕괴(영업이익 5.87→2.94, OPM 16.3→7.9)라는 결과뿐이다. OPM 하락의 bp 분해·북미 세그먼트 약세·구조조정 같은 '왜'는 전부 회사 발표(외부 인용)가 제공하며 연결 손익에 없다. 두 평면을 섞지 않고, 세그먼트→연결 인과로 봉합하지 않는다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">두 개의 평면을 섞지 않는다</text>
  <text x="540" y="80" fill="#64748b" font-size="15" text-anchor="middle">내부가 증명하는 것 vs 회사가 설명하는 것</text>

  <rect x="80" y="120" width="430" height="320" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.8"/>
  <text x="295" y="158" fill="#22c55e" font-size="19" font-weight="700" text-anchor="middle">내부 평면 (dartlab 연결 손익)</text>
  <text x="295" y="200" fill="#f1f5f9" font-size="16" text-anchor="middle">증명하는 것 = 결과</text>
  <text x="295" y="240" fill="#94a3b8" font-size="15" text-anchor="middle">영업이익 5.87 → 2.94 (반토막)</text>
  <text x="295" y="270" fill="#94a3b8" font-size="15" text-anchor="middle">OPM 16.3% → 7.9%</text>
  <text x="295" y="300" fill="#94a3b8" font-size="15" text-anchor="middle">순이익 3.76 → 1.86 / CF 6.10 → 4.75</text>
  <text x="295" y="345" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">"2025에 성장과 수익성이 찢어졌다"</text>
  <text x="295" y="378" fill="#64748b" font-size="13" text-anchor="middle">여기까지가 내부 단독 증명</text>

  <rect x="570" y="120" width="430" height="320" rx="12" fill="#11161f" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="785" y="158" fill="#f59e0b" font-size="19" font-weight="700" text-anchor="middle">외부 평면 (회사 발표·10-K)</text>
  <text x="785" y="200" fill="#f1f5f9" font-size="16" text-anchor="middle">설명하는 것 = 원인 (인용)</text>
  <text x="785" y="240" fill="#94a3b8" font-size="15" text-anchor="middle">OPM bp 분해(디레버리지·인플레)</text>
  <text x="785" y="270" fill="#94a3b8" font-size="15" text-anchor="middle">북미 세그먼트 약세</text>
  <text x="785" y="300" fill="#94a3b8" font-size="15" text-anchor="middle">$1B 구조조정 · 노동 투자</text>
  <text x="785" y="345" fill="#f59e0b" font-size="15" font-weight="700" text-anchor="middle">"왜 무너졌나"</text>
  <text x="785" y="378" fill="#64748b" font-size="13" text-anchor="middle">연결 손익에 단 한 줄도 없음</text>

  <text x="540" y="290" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">⊘</text>
  <text x="540" y="485" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">세그먼트(외부)→연결(내부)을 인과로 봉합하지 않는다 — '양립'까지만</text>
  <text x="540" y="513" fill="#64748b" font-size="13" text-anchor="middle">그 평면 분리 자체가 이 글의 결론이다</text>
</svg>
