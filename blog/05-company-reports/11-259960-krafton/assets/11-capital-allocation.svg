<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <rect width="1200" height="500" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">PUBG가 5년간 번 2.9조 — 어디로 갔는가</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">FCF 29,352억 전액 재투자. 배당 0원. 2026년 3년 1조 환원 시작</text>

  <!-- Source: PUBG FCF -->
  <rect x="60" y="110" width="250" height="140" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="185" y="140" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">PUBG 캐시카우</text>
  <text x="185" y="170" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700">2.9조</text>
  <text x="185" y="195" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">5년 누적 FCF (2021~2025)</text>
  <text x="185" y="215" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출의 80%+ · OPM 31%</text>
  <text x="185" y="235" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">주주 배당: 0원</text>

  <!-- Arrows -->
  <line x1="310" y1="150" x2="420" y2="130" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="420,125 435,130 420,135" fill="#3b82f6"/>
  <line x1="310" y1="180" x2="420" y2="230" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="420,225 435,230 420,235" fill="#f59e0b"/>
  <line x1="310" y1="200" x2="420" y2="330" stroke="#94a3b8" stroke-width="1"/>
  <polygon points="420,325 435,330 420,335" fill="#94a3b8"/>

  <!-- Destination 1: 금융자산 -->
  <rect x="440" y="100" width="300" height="100" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="590" y="128" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">금융자산 (투자)</text>
  <text x="590" y="155" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">2.6조</text>
  <text x="590" y="178" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">스타트업 투자 + 금융상품 + 부동산 5천억</text>

  <!-- Destination 2: 인수 (무형자산) -->
  <rect x="440" y="215" width="300" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="590" y="242" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">인수 (무형자산)</text>
  <text x="590" y="270" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">1.8조</text>
  <text x="460" y="295" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">ADK (일본 애니) — 성과 미확인</text>
  <text x="460" y="313" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">언노운 월즈 — 42% 손상 (-2,445억)</text>
  <text x="460" y="327" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">+ 15개 스튜디오 · 13개 프로젝트</text>

  <!-- Destination 3: 운영 비용 -->
  <rect x="440" y="350" width="300" height="70" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="590" y="375" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">인건비 + R&amp;D 확대</text>
  <text x="590" y="400" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14">인건비 2,840억/년 + RSU 300억+</text>

  <!-- 2026 전환 -->
  <rect x="800" y="100" width="340" height="200" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="970" y="128" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2026 전환: 3년 1조 환원</text>
  <text x="820" y="158" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현금배당</text>
  <text x="1030" y="158" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">3,000억 (3년)</text>
  <text x="820" y="182" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">자사주 소각</text>
  <text x="1030" y="182" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">7,000억 (전량)</text>
  <text x="820" y="210" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">첫 현금배당</text>
  <text x="1030" y="210" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">창사 이래 최초</text>

  <line x1="820" y1="230" x2="1120" y2="230" stroke="#334155" stroke-width="0.5"/>
  <text x="970" y="255" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">베팅이 깨어나는 신호</text>
  <text x="970" y="278" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">inZOI 1주 100만장</text>
  <text x="970" y="294" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">미메시스 100만장+</text>

  <!-- Bottom -->
  <rect x="80" y="440" width="1040" height="40" rx="6" fill="#1e293b"/>
  <text x="600" y="465" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">PUBG가 번 돈은 사라진 게 아니다 — 금융자산 2.6조 + 무형자산 1.8조에 잠들어 있다. 다음 재무제표가 이 베팅의 성패를 말해준다</text>
</svg>