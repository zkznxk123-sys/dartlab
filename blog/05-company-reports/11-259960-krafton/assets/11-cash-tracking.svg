<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="620" fill="#0a0e1a"/>
  <text x="600" y="40" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">현금 3조는 어디로 갔는가 — 크래프톤 현금 추적</text>
  <text x="600" y="65" font-size="13" fill="#64748b" text-anchor="middle">2021 IPO → 2025 | c.select("BS") 실측</text>

  <!-- Left: Cash 2021 -->
  <rect x="40" y="100" width="200" height="120" rx="14" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="135" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">2021년 (IPO)</text>
  <text x="140" y="170" font-size="32" font-weight="800" fill="#22c55e" text-anchor="middle">30,193억</text>
  <text x="140" y="200" font-size="12" fill="#94a3b8" text-anchor="middle">현금성 자산</text>

  <!-- Arrows to destinations -->
  <text x="265" y="160" font-size="24" fill="#475569">→</text>

  <!-- Destination 1: Financial Assets -->
  <rect x="300" y="90" width="250" height="70" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="425" y="118" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">단기 금융자산</text>
  <text x="425" y="143" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">+25,839억</text>

  <!-- Destination 2: Intangibles -->
  <rect x="300" y="175" width="250" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="425" y="203" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">무형자산 (인수)</text>
  <text x="425" y="228" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">+9,755억</text>

  <!-- Destination 3: Real estate -->
  <rect x="580" y="90" width="200" height="70" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="680" y="118" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle">투자부동산</text>
  <text x="680" y="143" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">+3,030억</text>

  <!-- Destination 4: Equity investments -->
  <rect x="580" y="175" width="200" height="70" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="680" y="203" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle">지분법 투자</text>
  <text x="680" y="228" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">+8,060억</text>

  <!-- Right: Cash 2025 -->
  <rect x="830" y="100" width="200" height="120" rx="14" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <text x="930" y="135" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">2025년</text>
  <text x="930" y="170" font-size="32" font-weight="800" fill="#ef4444" text-anchor="middle">5,967억</text>
  <text x="930" y="200" font-size="12" fill="#94a3b8" text-anchor="middle">현금성 자산</text>

  <!-- Arrow -->
  <text x="1055" y="160" font-size="18" fill="#475569">← 남은 현금</text>

  <!-- Bottom: Shopping list -->
  <text x="600" y="300" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="middle">크래프톤의 쇼핑 리스트 (무형자산 +9,755억의 정체)</text>

  <rect x="40" y="320" width="220" height="100" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="348" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">언노운 월즈</text>
  <text x="150" y="372" font-size="18" font-weight="800" fill="#f1f5f9" text-anchor="middle">5,858억</text>
  <text x="150" y="393" font-size="11" fill="#94a3b8" text-anchor="middle">서브노티카 | 손상 2,445억</text>
  <text x="150" y="410" font-size="10" fill="#ef4444" text-anchor="middle">42% 증발</text>

  <rect x="280" y="320" width="220" height="100" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="390" y="348" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">ADK (일본)</text>
  <text x="390" y="372" font-size="18" font-weight="800" fill="#f1f5f9" text-anchor="middle">7,103억</text>
  <text x="390" y="393" font-size="11" fill="#94a3b8" text-anchor="middle">3대 광고회사 | 애니 300편+</text>
  <text x="390" y="410" font-size="10" fill="#fbbf24" text-anchor="middle">매분기 비용 2,922억</text>

  <rect x="520" y="320" width="180" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="610" y="348" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle">캐시프리 (인도)</text>
  <text x="610" y="372" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="middle">776억</text>
  <text x="610" y="393" font-size="11" fill="#94a3b8" text-anchor="middle">결제 서비스</text>

  <rect x="720" y="320" width="180" height="100" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="810" y="348" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle">네온 자이언트</text>
  <text x="810" y="372" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="middle">비공개</text>
  <text x="810" y="393" font-size="11" fill="#94a3b8" text-anchor="middle">스웨덴 | 디 어센트</text>

  <rect x="920" y="320" width="220" height="100" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="1030" y="348" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">주주환원 (2026~)</text>
  <text x="1030" y="372" font-size="18" font-weight="800" fill="#22c55e" text-anchor="middle">1조+</text>
  <text x="1030" y="393" font-size="11" fill="#94a3b8" text-anchor="middle">배당 3,000억 + 소각 7,000억</text>
  <text x="1030" y="410" font-size="10" fill="#22c55e" text-anchor="middle">창사 최초 현금배당</text>

  <!-- Bottom insight -->
  <rect x="40" y="450" width="1120" height="55" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="478" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">FCF 5년 누적 29,352억 | 배당 0원 (2021~2025) | 전부 인수+금융자산+부동산으로</text>
  <text x="600" y="498" font-size="12" fill="#94a3b8" text-anchor="middle">현금이 사라진 게 아니라, 아직 답을 내지 못한 베팅들의 장부가에 잠들어 있다</text>

  <!-- Score badges -->
  <text x="100" y="550" font-size="12" font-weight="700" fill="#94a3b8">dartlab 스코어카드</text>
  <rect x="100" y="565" width="60" height="26" rx="5" fill="#22c55e" opacity="0.15"/><text x="130" y="583" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">수익 A</text>
  <rect x="170" y="565" width="60" height="26" rx="5" fill="#22c55e" opacity="0.15"/><text x="200" y="583" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">안정 A</text>
  <rect x="240" y="565" width="60" height="26" rx="5" fill="#22c55e" opacity="0.15"/><text x="270" y="583" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">CF A</text>
  <rect x="310" y="565" width="60" height="26" rx="5" fill="#22c55e" opacity="0.15"/><text x="340" y="583" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">품질 A</text>
  <rect x="380" y="565" width="60" height="26" rx="5" fill="#22c55e" opacity="0.15"/><text x="410" y="583" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">투자 A</text>
  <rect x="450" y="565" width="60" height="26" rx="5" fill="#fbbf24" opacity="0.15"/><text x="480" y="583" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">성장 C</text>
  <rect x="520" y="565" width="60" height="26" rx="5" fill="#fbbf24" opacity="0.15"/><text x="550" y="583" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">효율 C</text>

  <text x="700" y="583" font-size="11" fill="#64748b">Piotroski 5/9 | "매출 +23%에도 이익 -11% — 수익성 희석"</text>
</svg>