<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="400" fill="#0a0e1a"/>
  <text x="540" y="38" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">FCF 29,352억, 배당 0원 — 그리고 드디어</text>
  <text x="540" y="60" font-size="12" fill="#64748b" text-anchor="middle">c.analysis("financial", "자본배분") | 2021~2025</text>

  <!-- FCF bars -->
  <text x="60" y="115" font-size="11" fill="#64748b">FCF (억원)</text>

  <!-- 2021: 0 -->
  <rect x="120" y="268" width="100" height="2" rx="1" fill="#334155"/>
  <text x="170" y="260" font-size="14" font-weight="700" fill="#64748b" text-anchor="middle">0</text>
  <text x="170" y="290" font-size="12" fill="#94a3b8" text-anchor="middle">2021</text>

  <!-- 2022: 4841 -->
  <rect x="250" y="200" width="100" height="70" rx="4" fill="#3b82f6" opacity="0.5"/>
  <text x="300" y="192" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">4,841</text>
  <text x="300" y="290" font-size="12" fill="#94a3b8" text-anchor="middle">2022</text>

  <!-- 2023: 6268 -->
  <rect x="380" y="180" width="100" height="90" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="430" y="172" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">6,268</text>
  <text x="430" y="290" font-size="12" fill="#94a3b8" text-anchor="middle">2023</text>

  <!-- 2024: 8812 -->
  <rect x="510" y="145" width="100" height="125" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="560" y="137" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">8,812</text>
  <text x="560" y="290" font-size="12" fill="#94a3b8" text-anchor="middle">2024</text>

  <!-- 2025: 9431 -->
  <rect x="640" y="136" width="110" height="134" rx="6" fill="#22c55e" opacity="0.7"/>
  <text x="695" y="128" font-size="16" font-weight="800" fill="#22c55e" text-anchor="middle">9,431</text>
  <text x="695" y="290" font-size="13" fill="#f1f5f9" text-anchor="middle" font-weight="600">2025</text>

  <!-- Dividend = 0 line -->
  <line x1="120" y1="270" x2="750" y2="270" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="780" y="275" font-size="12" fill="#ef4444" font-weight="700">배당 = 0원</text>
  <text x="780" y="292" font-size="10" fill="#64748b">(5년간)</text>

  <!-- 2026 new policy -->
  <rect x="810" y="100" width="230" height="170" rx="14" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1.5"/>
  <text x="925" y="130" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">2026~ 주주환원 1조+</text>
  <text x="925" y="160" font-size="12" fill="#cbd5e1" text-anchor="middle">현금배당 매년 1,000억</text>
  <text x="925" y="180" font-size="12" fill="#cbd5e1" text-anchor="middle">자사주 7,000억 전량 소각</text>
  <text x="925" y="210" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">창사 최초 현금배당</text>
  <text x="925" y="240" font-size="11" fill="#94a3b8" text-anchor="middle">5년간 배당 0원 → 드디어</text>

  <!-- Bottom: cumulative -->
  <rect x="100" y="320" width="880" height="55" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="348" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">FCF 누적 29,352억 → 인수 + 금융자산 + 부동산으로. 주주에게 돌아간 건 0원이었다.</text>
  <text x="540" y="368" font-size="12" fill="#94a3b8" text-anchor="middle">"PUBG가 번 돈으로 크래프톤이 산 것은 게임 스튜디오 6개, 광고회사 1개, 그리고 시간이다."</text>
</svg>