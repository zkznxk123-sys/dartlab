  <text x="55" y="210" font-size="11" fill="#64748b" text-anchor="end">9,000</text>
  <line x1="65" y1="207" x2="1020" y2="207" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="290" font-size="11" fill="#64748b" text-anchor="end">0</text>
  <line x1="65" y1="287" x2="1020" y2="287" stroke="#334155" stroke-width="2"/>

  <!-- 2021: 8287 → h=115 -->
  <rect x="120" y="172" width="130" height="115" rx="6" fill="#334155"/>
  <text x="185" y="162" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">8,287</text>
  <text x="185" y="310" font-size="13" fill="#94a3b8" text-anchor="middle">2021</text>

  <!-- 2022: 8605 -->
  <rect x="280" y="168" width="130" height="119" rx="6" fill="#334155"/>
  <text x="345" y="158" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">8,605</text>
  <text x="345" y="310" font-size="13" fill="#94a3b8" text-anchor="middle">2022</text>

  <!-- 2023: 6078 -->
  <rect x="440" y="203" width="130" height="84" rx="6" fill="#334155"/>
  <text x="505" y="193" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">6,078</text>
  <text x="505" y="310" font-size="13" fill="#94a3b8" text-anchor="middle">2023</text>
  <text x="505" y="328" font-size="10" fill="#ef4444" text-anchor="middle">손상 반영</text>

  <!-- 2024: 6562 -->
  <rect x="600" y="196" width="130" height="91" rx="6" fill="#334155"/>
  <text x="665" y="186" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">6,562</text>
