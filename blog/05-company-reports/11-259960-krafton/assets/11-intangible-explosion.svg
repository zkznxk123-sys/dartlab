  <!-- Bottom annotation -->
  <text x="540" y="380" font-size="13" fill="#94a3b8" text-anchor="middle">ADK 영업권 7,103억 + 기타 인수 + 기존 무형자산 재평가</text>
  <text x="540" y="400" font-size="12" fill="#64748b" text-anchor="middle">dartlab 플래그: "무형자산비율 +11%p 급등 — 대규모 인수 또는 영업권 증가"</text>
