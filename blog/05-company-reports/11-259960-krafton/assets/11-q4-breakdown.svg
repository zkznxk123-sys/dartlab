<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="500" fill="#0a0e1a"/>
  <text x="540" y="38" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">4분기 영업이익 24억 — 99.3% 증발의 내막</text>
  <text x="540" y="60" font-size="12" fill="#64748b" text-anchor="middle">2025 분기별 영업이익 | 단위: 억원</text>

  <!-- Bars -->
  <rect x="100" y="120" width="180" height="200" rx="8" fill="#22c55e" opacity="0.6"/>
  <text x="190" y="108" font-size="22" font-weight="800" fill="#22c55e" text-anchor="middle">4,573</text>
  <text x="190" y="340" font-size="14" fill="#f1f5f9" text-anchor="middle" font-weight="600">1Q</text>

  <rect x="310" y="213" width="180" height="107" rx="8" fill="#3b82f6" opacity="0.6"/>
  <text x="400" y="201" font-size="22" font-weight="800" fill="#3b82f6" text-anchor="middle">2,461</text>
  <text x="400" y="340" font-size="14" fill="#f1f5f9" text-anchor="middle" font-weight="600">2Q</text>

  <rect x="520" y="168" width="180" height="152" rx="8" fill="#3b82f6" opacity="0.7"/>
  <text x="610" y="156" font-size="22" font-weight="800" fill="#3b82f6" text-anchor="middle">3,486</text>
  <text x="610" y="340" font-size="14" fill="#f1f5f9" text-anchor="middle" font-weight="600">3Q</text>

  <rect x="730" y="318" width="180" height="2" rx="1" fill="#ef4444"/>
  <text x="820" y="310" font-size="28" font-weight="800" fill="#ef4444" text-anchor="middle">24</text>
  <text x="820" y="340" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="700">4Q</text>
  <text x="820" y="360" font-size="11" fill="#ef4444" text-anchor="middle">-99.3%</text>

  <!-- Breakdown -->
  <text x="540" y="405" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">4분기에 무슨 일이 있었는가</text>

  <rect x="80" y="425" width="280" height="50" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="220" y="448" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">ADK 연결 편입: 2,922억</text>
  <text x="220" y="466" font-size="11" fill="#94a3b8" text-anchor="middle">매분기 반복 (구조적)</text>

  <rect x="390" y="425" width="280" height="50" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="530" y="448" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">복지기금 선반영: 816억</text>
  <text x="530" y="466" font-size="11" fill="#94a3b8" text-anchor="middle">일회성 (4년치 한꺼번에)</text>

  <rect x="700" y="425" width="280" height="50" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
  <text x="840" y="448" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle">소송/기타: ~252억</text>
  <text x="840" y="466" font-size="11" fill="#64748b" text-anchor="middle">일회성</text>
</svg>