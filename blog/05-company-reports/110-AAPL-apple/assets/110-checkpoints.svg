<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>애플 — 2026년에 봐야 할 다섯 가지</title>
  <desc>OPM 32% 지속, 2023 역성장 단발 여부, 서비스 GPM 추이, 자본환원과 EPS 방향, 세그먼트 보고 구조 변경 — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">확정된 관찰(OPM)은 연결로, 봉인된 질문(왜)은 외부로</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">OPM 32.0%가 FY2026까지 이어지는가</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">연결로 직접 검증 가능한 추적점 — 확대가 멈추는지/꺾이는지</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">2023 -2.8% 역성장이 단발이었는가</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">매출이 $416B 위로 외형 성장을 재개하며 마진율도 동행하는지</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">서비스 GPM(외부)이 73.9% 위/아래로 가는가</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">최신 10-K로 갱신 — 연결 증명은 dartlab 재실측 필요 (외부)</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">자본환원과 그해 EPS 방향</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">'FY2024처럼 순이익↓인데 EPS는 완충'이 반복인지 반전인지 (외부, financing 축)</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">세그먼트 보고 구조 변경 여부</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">지역→사업/제품 세그먼트로 바뀌어 서비스 세그먼트 OPM이 공시되면 봉인 전제가 갱신 (외부)</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">외형을 60% 키우는 동안 마진율도 함께 올렸다 — 그 이유는 손익 밖에</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">강사실은 'OPM 24.6→32%'에서 끝난다 — '왜'를 묻는 순간 증명이 인용이 된다</text>
</svg>
