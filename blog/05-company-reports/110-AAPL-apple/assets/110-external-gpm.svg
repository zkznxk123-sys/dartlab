<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>서비스는 매출의 1/4인데 매출총이익 비중은 더 크다 — 단 GPM≠OPM, 전부 외부 인용</title>
  <desc>외부 인용 FY2024 10-K 기준 서비스는 매출 비중 24.6%인데 매출총이익률(GPM)이 73.9%로 제품(37.2%)보다 훨씬 높아, 전사 매출총이익에서 차지하는 비중이 39.3%다. 그러나 이는 전부 외부 인용이며 dartlab 연결 증명 0이고, GPM과 OPM은 별개 비율이다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">간판은 하드웨어, 매출총이익 몫은?</text>
  <text x="540" y="80" fill="#f59e0b" font-size="15" text-anchor="middle">★ 전부 [외부 인용 — dartlab 연결 증명 0] · GPM ≠ OPM</text>

  <text x="295" y="130" fill="#94a3b8" font-size="16" font-weight="700" text-anchor="middle">매출 비중</text>
  <rect x="100" y="150" width="390" height="50" rx="6" fill="#1e293b"/>
  <rect x="100" y="150" width="294" height="50" rx="6" fill="#3b82f6"/>
  <text x="247" y="182" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">제품 75.4%</text>
  <text x="442" y="182" fill="#94a3b8" font-size="13" text-anchor="middle">서비스</text>
  <text x="442" y="200" fill="#64748b" font-size="11" text-anchor="middle">24.6%</text>

  <text x="785" y="130" fill="#94a3b8" font-size="16" font-weight="700" text-anchor="middle">매출총이익 비중</text>
  <rect x="590" y="150" width="390" height="50" rx="6" fill="#1e293b"/>
  <rect x="590" y="150" width="237" height="50" rx="6" fill="#22c55e"/>
  <text x="708" y="182" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">제품 60.7%</text>
  <text x="903" y="182" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">서비스</text>
  <text x="903" y="200" fill="#22c55e" font-size="11" text-anchor="middle">39.3%</text>

  <rect x="150" y="250" width="780" height="90" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="540" y="285" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">서비스 GPM 73.9% vs 제품 GPM 37.2% (격차 36.7%p)</text>
  <text x="540" y="318" fill="#94a3b8" font-size="14" text-anchor="middle">매출 비중(24.6%)보다 매출총이익 비중(39.3%)이 14.7%p 높다 (외부 인용)</text>

  <rect x="150" y="365" width="780" height="120" rx="10" fill="#0f1a17" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="540" y="400" fill="#f59e0b" font-size="16" font-weight="700" text-anchor="middle">★ 두 개의 경계선</text>
  <text x="540" y="432" fill="#94a3b8" font-size="14" text-anchor="middle">① 전부 외부 인용 — 연결로 증명 0  ② GPM(매출총이익률) ≠ OPM(영업이익률)</text>
  <text x="540" y="460" fill="#64748b" font-size="13" text-anchor="middle">GPM→OPM은 R&amp;D·판관비 배분을 건너뛰어야 하는데 그 다리가 없다 → 다음 막 '봉인'</text>
</svg>
