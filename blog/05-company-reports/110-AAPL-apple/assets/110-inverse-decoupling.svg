<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>보통은 규모↑→마진율 희석인데, 애플은 외형과 마진율이 같은 방향으로 갔다</title>
  <desc>코스트코·펩시코·스타벅스는 외형이 커질수록 영업이익률이 얇아지거나 무너졌다(통상 패턴). 애플은 매출을 +60% 키우는 동안 OPM을 24.6%에서 32.0%로 +7.4%p 함께 올렸다 — 디커플링의 정반대. 비교군 구체 수치는 각 글 참조이며 여기선 방향 대조만.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">규모를 키우면 마진율은 깎인다, 보통은</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">애플은 거꾸로 — 외형과 마진율이 같은 방향</text>

  <rect x="70" y="120" width="450" height="340" rx="12" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
  <text x="295" y="158" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">통상 패턴 (앞선 글들)</text>
  <line x1="120" y1="200" x2="470" y2="200" stroke="#1e293b" stroke-width="1"/>
  <polyline points="120,230 470,210" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <text x="130" y="225" fill="#22c55e" font-size="13">매출 ↑</text>
  <polyline points="120,300 470,380" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <text x="380" y="375" fill="#ef4444" font-size="13">마진율 ↓</text>
  <text x="295" y="430" fill="#64748b" font-size="14" text-anchor="middle">코스트코·펩시코·스타벅스</text>

  <rect x="560" y="120" width="450" height="340" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.8"/>
  <text x="785" y="158" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">애플</text>
  <line x1="610" y1="200" x2="960" y2="200" stroke="#1e293b" stroke-width="1"/>
  <polyline points="610,310 960,250" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <text x="620" y="305" fill="#22c55e" font-size="13">매출 +60% ↑</text>
  <polyline points="610,360 960,300" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <text x="800" y="295" fill="#fbbf24" font-size="13" font-weight="700">OPM +7.4%p ↑</text>
  <text x="785" y="430" fill="#94a3b8" font-size="14" text-anchor="middle">OPM 24.6% → 32.0% (함께 상승)</text>

  <text x="540" y="505" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">이 문장은 dartlab 연결로 반박하기 어렵다 — 문제는 그다음 '왜'다</text>
</svg>
