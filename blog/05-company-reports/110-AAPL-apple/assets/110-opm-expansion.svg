<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>+60% 곡선은 매끈하지 않다 — 2023 역성장, 영업CF peak는 2022</title>
  <desc>애플 매출은 2019년 260.2B에서 2025년 416.2B로 커졌고 OPM은 24.6%에서 32.0%로 올랐지만, 2023년 매출은 -2.8% 역성장했고 영업현금흐름 peak는 2022년 122.2B였다. 매끈한 우상향이 아니며, 단 역성장 해에도 OPM 29.8%로 방어됐다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">매끈하지 않은 +60% 곡선</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">2023 매출 역성장(-2.8%)·영업CF peak는 2022 — 단 OPM은 방어</text>

  <!-- 매출 막대 -->
  <g>
    <rect x="120" y="320" width="100" height="130" rx="4" fill="#1e3a5f"/>
    <rect x="270" y="265" width="100" height="185" rx="4" fill="#1e3a5f"/>
    <rect x="420" y="250" width="100" height="200" rx="4" fill="#1e3a5f"/>
    <rect x="570" y="262" width="100" height="188" rx="4" fill="#ef4444"/>
    <rect x="720" y="256" width="100" height="194" rx="4" fill="#1e3a5f"/>
    <rect x="870" y="240" width="100" height="210" rx="4" fill="#3b82f6"/>
  </g>
  <text x="170" y="312" fill="#94a3b8" font-size="12" text-anchor="middle">260</text>
  <text x="620" y="254" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">383 ▼</text>
  <text x="620" y="468" fill="#ef4444" font-size="11" text-anchor="middle">-2.8%</text>
  <text x="920" y="232" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">416</text>

  <!-- OPM 라인 -->
  <polyline points="170,200 320,160 470,155 620,162 770,148 920,143" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="170" cy="200" r="5" fill="#fbbf24"/><text x="170" y="188" fill="#fbbf24" font-size="12" text-anchor="middle">24.6%</text>
  <circle cx="620" cy="162" r="5" fill="#fbbf24"/><text x="620" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">29.8%</text>
  <circle cx="920" cy="143" r="6" fill="#22c55e"/><text x="920" y="131" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">32.0%</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="170" y="470">2019</text><text x="320" y="470">2021</text><text x="470" y="470">2022</text><text x="620" y="485">2023</text><text x="770" y="470">2024</text><text x="920" y="470">2025</text>
  </g>
  <text x="540" y="515" fill="#94a3b8" font-size="14" text-anchor="middle">■ 매출($B)  ● OPM(%) — 외형이 꺾인 2023에도 마진율은 버텼다</text>
</svg>
