<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>세그먼트 OPM은 공시조차 안 된다 — 믹스↔마진은 영원히 '정합/양립'까지만 (봉인)</title>
  <desc>애플은 지역 세그먼트로 보고하므로 Services 세그먼트의 영업이익률(OPM)이 10-K에 존재조차 하지 않는다. 매출총이익률(GPM)에서 OPM으로 가는 다리(R&D·판관비 배분)가 회사도 dartlab도 공시하지 않아, 서비스 믹스와 OPM 확대는 영원히 정합/양립까지만 말할 수 있다. 이 봉인이 결론이다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="48" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">봉인: 세그먼트 OPM은 공시조차 없다</text>
  <text x="500" y="82" fill="#64748b" font-size="15" text-anchor="middle">애플은 '지역' 세그먼트로 보고 — 서비스 세그먼트 OPM이 10-K에 부재</text>

  <rect x="120" y="120" width="340" height="120" rx="10" fill="#0f1a17" stroke="#22c55e" stroke-width="1.6"/>
  <text x="290" y="158" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">내부 (연결 증명)</text>
  <text x="290" y="192" fill="#f1f5f9" font-size="15" text-anchor="middle">OPM 24.6% → 32.0%</text>
  <text x="290" y="220" fill="#64748b" font-size="13" text-anchor="middle">확대됐다 (결과)</text>

  <rect x="540" y="120" width="340" height="120" rx="10" fill="#11161f" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="710" y="158" fill="#f59e0b" font-size="16" font-weight="700" text-anchor="middle">외부 (10-K GPM)</text>
  <text x="710" y="192" fill="#f1f5f9" font-size="15" text-anchor="middle">서비스 GPM 73.9%</text>
  <text x="710" y="220" fill="#64748b" font-size="13" text-anchor="middle">고마진 믹스 (가설)</text>

  <text x="500" y="290" fill="#ef4444" font-size="34" text-anchor="middle">⊘</text>
  <text x="500" y="325" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">한 문장으로 봉합 금지 — 그 다리(R&amp;D·판관비 배분)가 어디에도 없다</text>

  <rect x="150" y="355" width="700" height="120" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.3"/>
  <text x="500" y="392" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">'서비스 믹스가 OPM 확대를 견인했다' — 이 문장을 쓰지 않는다</text>
  <text x="500" y="424" fill="#94a3b8" font-size="14" text-anchor="middle">두 관찰을 '시간상 같이 일어난 일'로 나란히 둘 뿐, 정합/양립까지만</text>
  <text x="500" y="452" fill="#64748b" font-size="13" text-anchor="middle">데이터가 없는 자리에서 답하는 척하지 않는 것 — 그게 이 글의 페이오프</text>
</svg>
