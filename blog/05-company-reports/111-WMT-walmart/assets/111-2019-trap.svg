<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2019년 — 영업이익 OPM 4.3%(정상)인데 순이익만 6.7B 저점으로 무너졌다</title>
  <desc>2019년 월마트는 영업이익 22.0B로 OPM 4.3% 정상권이었는데 당기순이익은 6.7B, NPM 1.3%로 무너졌다. 영업과 순이익의 괴리가 연결 손익 안에서 직접 드러난다. 저점의 구체 원인은 외부 인용 영역이며, 이 저점을 성장 base로 쓰면 성장률이 부풀려 보인다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="48" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2019년의 함정: 영업은 정상, 순익만 저점</text>
  <text x="500" y="82" fill="#64748b" font-size="15" text-anchor="middle">연결 손익 안에서 OPM 정상 vs NPM 붕괴가 공존</text>

  <text x="290" y="140" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">영업이익 (정상권)</text>
  <rect x="190" y="170" width="200" height="160" rx="6" fill="#22c55e"/>
  <text x="290" y="260" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">$22.0B</text>
  <text x="290" y="355" fill="#94a3b8" font-size="15" text-anchor="middle">OPM 4.3% (정상)</text>

  <text x="710" y="140" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">당기순이익 (저점)</text>
  <rect x="610" y="280" width="200" height="50" rx="6" fill="#ef4444"/>
  <text x="710" y="315" fill="#0a0e1a" font-size="20" font-weight="700" text-anchor="middle">$6.7B</text>
  <text x="710" y="355" fill="#ef4444" font-size="15" text-anchor="middle">NPM 1.3% (★일회성 저점)</text>

  <rect x="150" y="395" width="700" height="100" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="500" y="430" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">저점의 구체 원인(해외·투자손실·세금 등)은 외부 인용 영역</text>
  <text x="500" y="460" fill="#94a3b8" font-size="14" text-anchor="middle">2019를 성장 base로 쓰면 '순익 약 3배' 같은 착시가 나온다</text>
  <text x="500" y="485" fill="#64748b" font-size="13" text-anchor="middle">정직한 성장선은 영업이익 22.0→29.3B(+33%)</text>
</svg>
