<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>광고 매출은 전사의 약 0.65% — '영업이익 1/5' framing과 산술 모순</title>
  <desc>외부 인용 기준 월마트 광고(Walmart Connect) 매출은 FY2025 약 4.4B로 전사 매출 681B(연결 실측)의 약 0.65%다. 일부 보도의 '광고·멤버십이 영업이익의 1/5 초과'(약 5.9B) framing은 광고 매출 4.4B보다 큰 영업이익을 함의해 산술상 불가능하며, 출처별 정의·기간·집계 범위가 달라 합산·교차검증이 안 된다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">'광고가 진짜 돈줄'의 산술 모순</text>
  <text x="500" y="80" fill="#f59e0b" font-size="15" text-anchor="middle">광고 매출 4.4B(외부) ÷ 전사 매출 681B(연결) = 약 0.65%</text>

  <!-- 전사 매출 대비 광고 비중 -->
  <rect x="120" y="130" width="760" height="50" rx="6" fill="#1e293b"/>
  <rect x="120" y="130" width="6" height="50" rx="2" fill="#fbbf24"/>
  <text x="500" y="162" fill="#94a3b8" font-size="14" text-anchor="middle">전사 매출 681B 중 광고 4.4B = 0.65% (노란 띠가 광고)</text>

  <rect x="120" y="220" width="760" height="120" rx="10" fill="#0f1a17" stroke="#ef4444" stroke-width="1.4"/>
  <text x="500" y="256" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">모순: 일부 보도 '광고·멤버십 = 영업이익의 1/5 초과'</text>
  <text x="500" y="288" fill="#94a3b8" font-size="14" text-anchor="middle">영업이익 29.3B의 1/5 ≈ 5.9B인데, 광고 매출 자체가 4.4B</text>
  <text x="500" y="316" fill="#94a3b8" font-size="14" text-anchor="middle">→ 매출보다 큰 영업이익은 불가능 (마진 133%)</text>

  <rect x="120" y="360" width="760" height="110" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="500" y="395" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">출처별 정의·기간·집계 범위(VIZIO 포함 여부)가 달라 합산·교차검증 불가</text>
  <text x="500" y="426" fill="#94a3b8" font-size="14" text-anchor="middle">그래서 광고·멤버십 수치는 '외부 인용 한 막'으로 격리한다</text>
  <text x="500" y="453" fill="#64748b" font-size="13" text-anchor="middle">연결로 증명된 단 하나의 마진 사실 = 전사 OPM 4.3%</text>
</svg>
