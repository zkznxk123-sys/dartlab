<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>월마트 — 2026년에 봐야 할 다섯 가지</title>
  <desc>OPM 밴드 이탈 여부, OPM-NPM 괴리, 광고 매출 단일 정의, 부문 마진 공시, 새 일회성 charge — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">간판(OPM)은 연결로, 영업 바깥과 광고 서사는 외부로</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">OPM이 6년 밴드(3.3~4.5%)를 위로 이탈하는가</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">4.5% 초과 시 '구조적으로 고정'이라는 전제를 재검토</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">OPM–NPM 괴리가 더 좁혀지는가</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">2019 약 3.0%p → 2025 약 1.4%p — 영업선 아래 정상화가 일단락됐는지</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">광고 매출의 단일 정의 확정</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">VIZIO 포함/제외·FY 기준 정리로 $4.4B vs $6.4B 이중 수치 해소 (해소 전 합산 금지)</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">부문 마진 공식 공시 여부</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">광고·멤버십 마진을 회사가 공시하는가 (공시 전 70~90% framing은 외부 추정)</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">새 일회성 charge가 OPM 딥을 다시 만드는가</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">발생 시 '저점을 성장 base로 오용 금지' 가드 재적용</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">안 변한 것은 간판(OPM 4.3%), 움직인 것은 영업 바깥의 순이익뿐</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">'광고가 진짜 돈줄'은 외부 가설 — 매출의 0.65% 소형, 연결 증명 0</text>
</svg>
