<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 $681B 거인의 영업마진은 6년째 4.3% — 영업단은 고정, 순이익만 따로 움직였다</title>
  <desc>월마트 매출은 2019년 514.4B에서 2025년 681.0B로 +32% 컸지만 영업이익률(OPM)은 2019년 4.3%, 2025년 4.3%로 6년째 약 1.2%p 밴드(3.3~4.5%) 안에 묶여 있다. 규모는 마진이 낮은 쪽 원인이지 해자가 아니다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">매출은 솟는데 영업마진은 6년째 4.3%</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">매출 +32% (514→681B) · OPM 4.3%→4.3% (밴드 3.3~4.5%)</text>

  <g>
    <rect x="120" y="300" width="100" height="160" rx="4" fill="#1e3a5f"/>
    <rect x="270" y="285" width="100" height="175" rx="4" fill="#1e3a5f"/>
    <rect x="420" y="270" width="100" height="190" rx="4" fill="#1e3a5f"/>
    <rect x="570" y="255" width="100" height="205" rx="4" fill="#1e3a5f"/>
    <rect x="720" y="243" width="100" height="217" rx="4" fill="#1e3a5f"/>
    <rect x="870" y="232" width="100" height="228" rx="4" fill="#3b82f6"/>
  </g>
  <text x="170" y="292" fill="#94a3b8" font-size="12" text-anchor="middle">514</text>
  <text x="920" y="224" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">681</text>

  <!-- OPM 거의 수평 -->
  <rect x="120" y="150" width="850" height="40" fill="#15233a" opacity="0.5"/>
  <polyline points="170,170 320,176 470,166 620,196 770,172 920,170" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="170" cy="170" r="5" fill="#fbbf24"/><text x="170" y="142" fill="#fbbf24" font-size="12" text-anchor="middle">4.3%</text>
  <circle cx="620" cy="196" r="6" fill="#ef4444"/><text x="620" y="216" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">3.3%딥</text>
  <circle cx="920" cy="170" r="6" fill="#fbbf24"/><text x="920" y="142" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">4.3%</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="170" y="478">2019</text><text x="320" y="478">2021</text><text x="470" y="478">2022</text><text x="620" y="478">2023</text><text x="770" y="478">2024</text><text x="920" y="478">2025</text>
  </g>
  <text x="540" y="515" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">규모는 마진이 낮은 쪽 원인이지 해자가 아니다 — '거인인데도 4% 초박리'</text>
</svg>
