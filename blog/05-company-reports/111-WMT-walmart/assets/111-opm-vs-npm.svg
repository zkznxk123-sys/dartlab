<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>OPM은 6년째 4.3% 상수, NPM만 1.3%→2.85%로 — 변동은 영업선 아래에서 왔다</title>
  <desc>영업이익률(OPM)이 6년 밴드 안에 거의 고정(4.3%→4.3%)인 동안 순이익률(NPM)은 1.3%에서 2.85%로 올랐다. 항등식상 그 변동분은 영업선 아래(이자·세금·해외손익)에서 온 것이다. 단 NPM 상승의 상당부분은 2019년 일회성 저점 소멸이며 새 이익 엔진의 출현이 아니다.</desc>
  <rect width="1000" height="540" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">영업단은 고정, 순이익만 움직였다</text>
  <text x="500" y="80" fill="#64748b" font-size="15" text-anchor="middle">항등식: OPM 거의 불변 + NPM만 변동 → 변동은 영업선 아래</text>

  <line x1="120" y1="120" x2="120" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="400" x2="900" y2="400" stroke="#334155" stroke-width="1"/>

  <!-- OPM flat ~4.3 high band -->
  <polyline points="150,180 380,176 610,200 840,182" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="150" cy="180" r="5" fill="#fbbf24"/><circle cx="840" cy="182" r="5" fill="#fbbf24"/>
  <text x="150" y="166" fill="#fbbf24" font-size="13" font-weight="700">OPM 4.3%</text>
  <text x="855" y="180" fill="#fbbf24" font-size="13" font-weight="700">4.3%</text>

  <!-- NPM rising -->
  <polyline points="150,360 380,300 610,280 840,250" fill="none" stroke="#22c55e" stroke-width="3"/>
  <circle cx="150" cy="360" r="6" fill="#ef4444"/><text x="150" y="380" fill="#ef4444" font-size="13" font-weight="700">NPM 1.3%(저점)</text>
  <circle cx="840" cy="250" r="6" fill="#22c55e"/><text x="855" y="248" fill="#22c55e" font-size="13" font-weight="700">2.85%</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="150" y="420">2019</text><text x="380" y="420">2021</text><text x="610" y="420">2023</text><text x="840" y="420">2025</text>
  </g>

  <rect x="150" y="445" width="700" height="75" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="500" y="478" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">단, NPM 상승의 상당부분은 2019 저점 소멸(base 효과)</text>
  <text x="500" y="504" fill="#64748b" font-size="13" text-anchor="middle">2020 NPM은 이미 2.84% — 새 이익 엔진 출현이 아니라 영업선 아래 정상화</text>
</svg>
