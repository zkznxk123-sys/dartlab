<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>새로 번 1달러 중 55센트가 영업이익이 됐다</title>
  <desc>증분 영업마진 = ΔOI $85.57B ÷ ΔREV $155.88B = 54.9%</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">새로 번 1달러 중 55센트가 영업이익이 됐다</text>
  <text x="540.0" y="82" fill="#64748b" font-size="16" text-anchor="middle">증분 영업마진 = ΔOI $85.57B ÷ ΔREV $155.88B = 54.9%</text>
  <text x="540.0" y="220" fill="#94a3b8" font-size="16" text-anchor="middle">7년간 늘어난 매출 $155.88B 가 어디로 갔나</text>
  <rect x="90.0" y="250" width="494.1" height="120" fill="#fbbf24"/>
  <text x="337.1" y="306.0" fill="#0a0e1a" font-size="30" font-weight="700" text-anchor="middle">55%</text>
  <text x="337.1" y="400.0" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">영업이익 증가분 $85.57B</text>
  <rect x="584.1" y="250" width="405.9" height="120" fill="#475569"/>
  <text x="787.1" y="306.0" fill="#0a0e1a" font-size="30" font-weight="700" text-anchor="middle">45%</text>
  <text x="787.1" y="400.0" fill="#475569" font-size="16" font-weight="700" text-anchor="middle">나머지 비용 증가분</text>
  <rect x="90" y="250" width="900" height="120" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="540.0" y="442" fill="#94a3b8" font-size="15" text-anchor="middle">단, '신규 고마진 매출'인지 '고정비 희석'인지는 연결 손익이 가르지 못함 (둘 다와 정합)</text>
  <text x="540.0" y="532" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">증분 54.9% > 7년 평균 OPM(약 41%) > … 어느 기준보다 높다</text>
</svg>
