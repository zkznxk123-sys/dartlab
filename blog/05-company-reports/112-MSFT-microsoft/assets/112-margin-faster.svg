<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>외형보다 마진이 더 빨리 컸다</title>
  <desc>2019 → 2025 배수 — 영업이익이 매출보다 가파르게(그 차이가 OPM 상승)</desc>
  <rect width="1080" height="600" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">외형보다 마진이 더 빨리 컸다</text>
  <text x="540.0" y="82" fill="#64748b" font-size="16" text-anchor="middle">2019 → 2025 배수 — 영업이익이 매출보다 가파르게(그 차이가 OPM 상승)</text>
  <rect x="285.0" y="259.2" width="150" height="240.8" rx="6" fill="#22c55e"/>
  <text x="360.0" y="243.2" fill="#22c55e" font-size="34" font-weight="700" text-anchor="middle">2.24배</text>
  <text x="360.0" y="530.0" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">매출</text>
  <text x="360.0" y="556.0" fill="#94a3b8" font-size="14" text-anchor="middle">125.84 → 281.72 ($B)</text>
  <rect x="645.0" y="178.6" width="150" height="321.4" rx="6" fill="#3b82f6"/>
  <text x="720.0" y="162.6" fill="#3b82f6" font-size="34" font-weight="700" text-anchor="middle">2.99배</text>
  <text x="720.0" y="530.0" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">영업이익</text>
  <text x="720.0" y="556.0" fill="#94a3b8" font-size="14" text-anchor="middle">42.96 → 128.53 ($B)</text>
  <line x1="60" y1="500" x2="1020" y2="500" stroke="#334155" stroke-width="1.5"/>
  <text x="540.0" y="588" fill="#64748b" font-size="14" text-anchor="middle">배수 = 2025년 값 ÷ 2019년 값 (dartlab 연결 실측, 역년 정규화)</text>
  <text x="540.0" y="572" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">더 빨리 키운 건 매출이 아니라 마진 — OPM 34.1% → 45.6%</text>
</svg>
