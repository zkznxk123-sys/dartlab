<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>OPM 57.6%의 이면 — 비용 0이 아니다</title>
  <desc>영업비용 42.4%는 실재한다. 단지 매출 따라 늘 변동원가가 안 늘었을 뿐</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">OPM 57.6%의 이면 — 비용 0이 아니다</text>
  <text x="540.0" y="82" fill="#64748b" font-size="16" text-anchor="middle">영업비용 42.4%는 실재한다. 단지 매출 따라 늘 변동원가가 안 늘었을 뿐</text>
  <text x="540.0" y="220" fill="#94a3b8" font-size="16" text-anchor="middle">2025년 매출 $32.79B의 구성</text>
  <rect x="90.0" y="250" width="518.4" height="120" fill="#fbbf24"/>
  <text x="349.2" y="306.0" fill="#0a0e1a" font-size="30" font-weight="700" text-anchor="middle">58%</text>
  <text x="349.2" y="400.0" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">영업이익 57.6%</text>
  <rect x="608.4" y="250" width="381.6" height="120" fill="#475569"/>
  <text x="799.2" y="306.0" fill="#0a0e1a" font-size="30" font-weight="700" text-anchor="middle">42%</text>
  <text x="799.2" y="400.0" fill="#475569" font-size="16" font-weight="700" text-anchor="middle">영업비용 42.4%</text>
  <rect x="90" y="250" width="900" height="120" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="540.0" y="442" fill="#94a3b8" font-size="15" text-anchor="middle">매출 따라 늘어나는 변동원가의 비중이 작은 사업과 양립(환율·인센티브·믹스로도 가능)</text>
  <text x="540.0" y="532" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">원가·대손이 안 늘었다면, 그건 누구의 장부에 있나?</text>
</svg>
