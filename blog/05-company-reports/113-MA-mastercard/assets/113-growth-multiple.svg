<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>외형도 영업이익도 1.9배 — 순이익만 한 칸 뒤</title>
  <desc>2019 → 2025 배수 — 영업이익(+96%) > 매출(+94%) > 순이익(+84%)</desc>
  <rect width="1080" height="600" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">외형도 영업이익도 1.9배 — 순이익만 한 칸 뒤</text>
  <text x="540.0" y="82" fill="#64748b" font-size="16" text-anchor="middle">2019 → 2025 배수 — 영업이익(+96%) > 매출(+94%) > 순이익(+84%)</text>
  <rect x="195.0" y="181.9" width="150" height="318.1" rx="6" fill="#22c55e"/>
  <text x="270.0" y="165.9" fill="#22c55e" font-size="34" font-weight="700" text-anchor="middle">1.94배</text>
  <text x="270.0" y="530.0" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">매출</text>
  <text x="270.0" y="556.0" fill="#94a3b8" font-size="14" text-anchor="middle">16.88 → 32.79 ($B)</text>
  <rect x="465.0" y="178.6" width="150" height="321.4" rx="6" fill="#3b82f6"/>
  <text x="540.0" y="162.6" fill="#3b82f6" font-size="34" font-weight="700" text-anchor="middle">1.96배</text>
  <text x="540.0" y="530.0" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">영업이익</text>
  <text x="540.0" y="556.0" fill="#94a3b8" font-size="14" text-anchor="middle">9.66 → 18.90 ($B)</text>
  <rect x="735.0" y="198.3" width="150" height="301.7" rx="6" fill="#fbbf24"/>
  <text x="810.0" y="182.3" fill="#fbbf24" font-size="34" font-weight="700" text-anchor="middle">1.84배</text>
  <text x="810.0" y="530.0" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">순이익</text>
  <text x="810.0" y="556.0" fill="#94a3b8" font-size="14" text-anchor="middle">8.12 → 14.97 ($B)</text>
  <line x1="60" y1="500" x2="1020" y2="500" stroke="#334155" stroke-width="1.5"/>
  <text x="540.0" y="588" fill="#64748b" font-size="14" text-anchor="middle">배수 = 2025 ÷ 2019 (dartlab 연결 실측, 역년 정규화)</text>
  <text x="540.0" y="572" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">영업단까지는 외형보다 빨랐고, 순이익만 외형에 못 미쳤다</text>
</svg>
