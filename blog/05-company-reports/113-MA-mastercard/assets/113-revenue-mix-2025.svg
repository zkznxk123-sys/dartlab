<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Mastercard 2025 revenue mix</title>
  <desc id="desc">Mastercard 2025 net revenue split between payment network and value-added services, with rebates and incentives context.</desc>
  <rect width="1200" height="720" fill="#0b1220"/>
  <text x="62" y="78" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Mastercard 2025 — 순매출은 두 엔진으로 벌고, 리베이트로 깎인다</text>
  <text x="62" y="118" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">단위: USD billions, Mastercard FY2025 10-K 기준</text>

  <rect x="90" y="185" width="460" height="150" rx="16" fill="#1e3a8a"/>
  <text x="125" y="230" fill="#dbeafe" font-family="Arial, sans-serif" font-size="24" font-weight="700">Payment network</text>
  <text x="125" y="278" fill="#ffffff" font-family="Arial, sans-serif" font-size="40" font-weight="700">$19.5B</text>
  <text x="125" y="308" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="18">거래량·국경간·switched transactions</text>

  <rect x="650" y="185" width="460" height="150" rx="16" fill="#065f46"/>
  <text x="685" y="230" fill="#d1fae5" font-family="Arial, sans-serif" font-size="24" font-weight="700">Value-added services</text>
  <text x="685" y="278" fill="#ffffff" font-family="Arial, sans-serif" font-size="40" font-weight="700">$13.3B</text>
  <text x="685" y="308" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="18">보안·인증·데이터·마케팅 솔루션</text>

  <rect x="255" y="430" width="690" height="135" rx="16" fill="#7c2d12"/>
  <text x="300" y="478" fill="#fed7aa" font-family="Arial, sans-serif" font-size="24" font-weight="700">Rebates and incentives to customers</text>
  <text x="300" y="525" fill="#ffffff" font-family="Arial, sans-serif" font-size="40" font-weight="700">$20.5B</text>
  <text x="300" y="555" fill="#fdba74" font-family="Arial, sans-serif" font-size="18">매출총액이 아니라 순매출을 읽어야 하는 이유</text>

  <text x="80" y="640" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="19">요점: 57.6% OPM은 '수수료율 하나'가 아니라 네트워크 매출, 부가서비스 성장, 고객 인센티브 추정이 함께 만든 결과다.</text>
</svg>
