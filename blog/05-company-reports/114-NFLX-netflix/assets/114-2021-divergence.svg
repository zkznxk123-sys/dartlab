  <text x="273.0" y="108.0" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2021 어긋남</text>
  <text x="629.0" y="108.0" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">2023 현금 자리잡음</text>
  <text x="95" y="566" fill="#94a3b8" font-size="14">마진은 손익 비율, OCF는 그해 실제 현금 — 콘텐츠 자본화로 다른 박자(2019는 부분치라 제외)</text>
  <text x="540.0" y="592" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">2021 OPM↑·OCF↓ 어긋남 → 2023 두 곡선 같은 방향 · 시점 격차가 핵심</text>
</svg>
