  <text x="83" y="371.0" fill="#fbbf24" font-size="13" text-anchor="end">19%</text>
  <text x="997" y="371.0" fill="#22c55e" font-size="13" text-anchor="start">5$B</text>
  <line x1="95" y1="284.0" x2="985" y2="284.0" stroke="#334155" stroke-width="1" opacity="0.35"/>
  <text x="83" y="289.0" fill="#fbbf24" font-size="13" text-anchor="end">23%</text>
  <text x="997" y="289.0" fill="#22c55e" font-size="13" text-anchor="start">7$B</text>
  <line x1="95" y1="202.0" x2="985" y2="202.0" stroke="#334155" stroke-width="1" opacity="0.35"/>
  <text x="83" y="207.0" fill="#fbbf24" font-size="13" text-anchor="end">28%</text>
  <text x="997" y="207.0" fill="#22c55e" font-size="13" text-anchor="start">10$B</text>
