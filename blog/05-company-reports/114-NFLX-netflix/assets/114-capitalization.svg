<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>콘텐츠 자본화 — 현금은 먼저, 비용은 나중에</title>
  <desc>제작비는 그해 현금으로 전액 유출되지만, 손익엔 여러 해로 나눠 상각된다</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">콘텐츠 자본화 — 현금은 먼저, 비용은 나중에</text>
  <text x="540.0" y="82" fill="#64748b" font-size="16" text-anchor="middle">제작비는 그해 전액 현금 유출, 손익엔 여러 해로 나눠 상각</text>
  <text x="270" y="150" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">현금흐름표 (그해)</text>
  <rect x="120" y="175" width="300" height="150" rx="8" fill="#ef4444" opacity="0.85"/>
  <text x="270" y="258" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">제작비 전액 현금 유출</text>
  <text x="270" y="355" fill="#94a3b8" font-size="15" text-anchor="middle">→ 영업현금흐름을 그해 깎는다</text>
  <text x="810" y="150" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">손익계산서 (여러 해)</text>
  <rect x="660" y="175" width="34" height="150" rx="5" fill="#3b82f6" opacity="0.85"/>
  <rect x="700" y="183" width="34" height="134" rx="5" fill="#3b82f6" opacity="0.85"/>
  <rect x="740" y="191" width="34" height="118" rx="5" fill="#3b82f6" opacity="0.85"/>
  <rect x="780" y="199" width="34" height="102" rx="5" fill="#3b82f6" opacity="0.85"/>
  <text x="810" y="355" fill="#94a3b8" font-size="15" text-anchor="middle">→ 그해 몫 상각비만 비용 처리</text>
  <text x="540" y="300" fill="#fbbf24" font-size="34" font-weight="700" text-anchor="middle">≠</text>
  <text x="540" y="430" fill="#94a3b8" font-size="16" text-anchor="middle">제작 현금 &gt; 그해 상각비인 국면 → 영업이익 흑자라도 영업현금흐름은 줄 수 있다</text>
  <text x="540.0" y="532" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">2021년의 어긋남이 이 구조와 양립한다 — 단정은 현금흐름표 분해가 있어야</text>
</svg>
