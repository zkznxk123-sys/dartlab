<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 715" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2026년에 봐야 할 다섯 가지</title>
  <desc>장부이익과 현금은 다른 시점의 다른 사건</desc>
  <rect width="1080" height="715" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540.0" y="84" fill="#64748b" font-size="16" text-anchor="middle">장부이익과 현금은 다른 시점의 다른 사건</text>
  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161.0" r="20" fill="#fbbf24"/><text x="135" y="168.0" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="20" font-weight="700">영업이익률(OPM)이 29%대를 지키는가</text>
    <text x="180" y="184" fill="#94a3b8" font-size="15.5">회사는 2025 하반기 OPM이 상반기보다 낮을 것으로 안내(사유=외부)</text>
    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265.0" r="20" fill="#fbbf24"/><text x="135" y="272.0" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="20" font-weight="700">영업현금흐름이 +10B대를 유지하는가</text>
    <text x="180" y="288" fill="#94a3b8" font-size="15.5">2023년부터 자리 잡은 현금 곡선이 콘텐츠 투자 재가속에 흔들리는지</text>
    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369.0" r="20" fill="#fbbf24"/><text x="135" y="376.0" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="20" font-weight="700">마진과 현금의 시차가 다시 벌어지는가</text>
    <text x="180" y="392" fill="#94a3b8" font-size="15.5">2021년처럼 OPM↑·OCF↓ 어긋남이 재현되면 콘텐츠 투자 사이클 신호</text>
    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473.0" r="20" fill="#fbbf24"/><text x="135" y="480.0" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="20" font-weight="700">워너브라더스 인수의 손익 반영</text>
    <text x="180" y="496" fill="#94a3b8" font-size="15.5">외부 합의가 연결 손익에 항목별로 들어오기 시작하는가(전까진 외부 가설)</text>
    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577.0" r="20" fill="#fbbf24"/><text x="135" y="584.0" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="20" font-weight="700">광고요금제가 매출·마진에 분리 기여로 나타나는가</text>
    <text x="180" y="600" fill="#94a3b8" font-size="15.5">'광고가 마진을 올렸다'는 연결이 분리해 보여줄 때만 인과로</text>
  </g>
  <text x="540.0" y="687" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">연결이 증명한 건 'OPM 12.9→29.5% 확대 + 2021 어긋남 + 2023 현금 자리잡음'까지</text>
  <text x="540.0" y="661" fill="#64748b" font-size="14" text-anchor="middle">콘텐츠 자본화 회계와 양립할 뿐 — '왜 마진이 올랐나'는 데이터 밖</text>
</svg>
