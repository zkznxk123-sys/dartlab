<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Netflix content cash bridge</title>
  <desc id="desc">Netflix 2025 content additions, content liability change, content amortization, operating cash flow and content obligations.</desc>
  <rect width="1200" height="720" fill="#111827"/>
  <text x="64" y="76" fill="#f9fafb" font-family="Arial, sans-serif" font-size="34" font-weight="700">Netflix 2025 — 제작 현금과 장부 상각은 같은 줄이 아니다</text>
  <text x="64" y="116" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18">단위: USD billions, Netflix FY2025 10-K 기준</text>

  <rect x="70" y="170" width="260" height="150" rx="14" fill="#7f1d1d"/>
  <text x="98" y="212" fill="#fee2e2" font-family="Arial, sans-serif" font-size="22" font-weight="700">Content additions</text>
  <text x="98" y="256" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="700">-$17.1B</text>
  <text x="98" y="288" fill="#fecaca" font-family="Arial, sans-serif" font-size="17">현금흐름 조정의 큰 유출</text>

  <rect x="375" y="170" width="260" height="150" rx="14" fill="#854d0e"/>
  <text x="403" y="212" fill="#fef3c7" font-family="Arial, sans-serif" font-size="22" font-weight="700">Liability change</text>
  <text x="403" y="256" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="700">-$0.6B</text>
  <text x="403" y="288" fill="#fde68a" font-family="Arial, sans-serif" font-size="17">부채 변화도 현금 박자</text>

  <rect x="680" y="170" width="260" height="150" rx="14" fill="#166534"/>
  <text x="708" y="212" fill="#dcfce7" font-family="Arial, sans-serif" font-size="22" font-weight="700">Content amortization</text>
  <text x="708" y="256" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="700">$16.4B</text>
  <text x="708" y="288" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="17">손익계산서의 비용</text>

  <rect x="205" y="410" width="355" height="135" rx="14" fill="#1d4ed8"/>
  <text x="235" y="458" fill="#dbeafe" font-family="Arial, sans-serif" font-size="22" font-weight="700">Operating cash flow</text>
  <text x="235" y="505" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="700">$10.1B</text>
  <text x="235" y="532" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="17">장부이익보다 늦게 안정화</text>

  <rect x="640" y="410" width="355" height="135" rx="14" fill="#4c1d95"/>
  <text x="670" y="458" fill="#ede9fe" font-family="Arial, sans-serif" font-size="22" font-weight="700">Content obligations</text>
  <text x="670" y="505" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="700">$24.0B</text>
  <text x="670" y="532" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="17">$5.7B on B/S · $18.4B off B/S</text>

  <text x="86" y="640" fill="#d1d5db" font-family="Arial, sans-serif" font-size="19">요점: 상각은 손익의 시간표, additions와 obligations는 현금의 시간표다. 두 줄을 섞으면 Netflix의 현금 전환을 잘못 읽는다.</text>
</svg>
