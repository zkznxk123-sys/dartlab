  <text x="95" y="566" fill="#94a3b8" font-size="14">회복 구간(2022→2025) 한계영업이익률 약 45% > 7년 평균 31.3% — 전환은 단순 잠식 아님</text>
  <text x="540.0" y="592" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">2025 30.8%는 2019 34.3%·2021 고점 37.6%에 여전히 미달</text>
