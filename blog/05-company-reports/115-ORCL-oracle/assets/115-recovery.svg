<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>회복은 했지만 귀환은 아니다</title>
  <desc>영업이익률 7년 — 2022 바닥(25.8) 후 3년 회복, 그러나 출발점 미달</desc>
  <rect width="1080" height="620" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">회복은 했지만 귀환은 아니다</text>
  <text x="540.0" y="82" fill="#64748b" font-size="16" text-anchor="middle">영업이익률 7년 — 2022 바닥(25.8) 후 3년 회복, 그러나 출발점 미달</text>
  <line x1="95" y1="530.0" x2="1020" y2="530.0" stroke="#334155" stroke-width="1" opacity="0.4"/>
