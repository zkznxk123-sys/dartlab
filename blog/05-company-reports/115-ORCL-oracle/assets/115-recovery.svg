  <text x="83" y="453.0" fill="#64748b" font-size="14" text-anchor="end">26%</text>
  <line x1="95" y1="366.0" x2="1020" y2="366.0" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <text x="83" y="371.0" fill="#64748b" font-size="14" text-anchor="end">29%</text>
