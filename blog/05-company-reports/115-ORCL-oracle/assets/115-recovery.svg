  <text x="83" y="207.0" fill="#64748b" font-size="14" text-anchor="end">36%</text>
  <line x1="95" y1="120.0" x2="1020" y2="120.0" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <text x="83" y="125.0" fill="#64748b" font-size="14" text-anchor="end">40%</text>
  <text x="95.0" y="558.0" fill="#94a3b8" font-size="14" text-anchor="middle">2019</text>
