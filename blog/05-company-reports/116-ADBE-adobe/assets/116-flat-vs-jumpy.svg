  <text x="985.0" y="108.0" fill="#3b82f6" font-size="13" font-weight="700" text-anchor="middle">2025 +1.97B</text>
  <text x="95" y="566" fill="#94a3b8" font-size="14">OPM 29.3~36.7% 좁은 띠(평균 약 33.7%) · 영업이익 2022~24 둔화 후 2025 8.71B 최고</text>
  <text x="540.0" y="592" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">'OPM 평탄'을 '이익 정체'로 읽으면 오독 — 절대액은 둔화했다 2025 재점프</text>
