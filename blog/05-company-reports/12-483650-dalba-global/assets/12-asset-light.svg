<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380">
  <rect width="1200" height="380" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">에셋라이트 모델 — 공장 없이 5,197억</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">달바 vs 전통 화장품사: 빚 없이 현금을 쌓는 구조</text>

  <!-- Dalba -->
  <rect x="60" y="110" width="520" height="230" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="142" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">달바글로벌 (에셋라이트)</text>
  <text x="80" y="175" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">유형자산/총자산</text>
  <text x="330" y="175" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">0.4%</text>
  <text x="80" y="200" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">설비투자/매출</text>
  <text x="330" y="200" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">0.1%</text>
  <text x="80" y="225" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">금융차입</text>
  <text x="330" y="225" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">0%</text>
  <text x="80" y="250" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">부채비율</text>
  <text x="330" y="250" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">29%</text>
  <text x="80" y="275" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">순현금</text>
  <text x="330" y="275" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">442억 (현금 > 부채)</text>
  <text x="80" y="300" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">재고회전일</text>
  <text x="330" y="300" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">46일</text>
  <text x="80" y="325" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ROE</text>
  <text x="330" y="325" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">39.8% (레버리지 없이)</text>

  <!-- 아모레 -->
  <rect x="620" y="110" width="520" height="230" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="880" y="142" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">아모레퍼시픽 (전통 제조)</text>
  <text x="640" y="175" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">유형자산/총자산</text>
  <text x="890" y="175" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="15">28%</text>
  <text x="640" y="200" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">설비투자/매출</text>
  <text x="890" y="200" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="15">~3%</text>
  <text x="640" y="225" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">자체 공장</text>
  <text x="890" y="225" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="15">오산, 상해, 프랑스</text>
  <text x="640" y="250" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">재고회전일</text>
  <text x="890" y="250" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="15">120일+</text>
  <text x="640" y="275" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ROE</text>
  <text x="890" y="275" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="15">5~6%</text>
  <text x="640" y="300" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">1인당 매출</text>
  <text x="890" y="300" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="15">7.7억</text>
  <text x="640" y="325" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">달바 1인당 매출</text>
  <text x="890" y="325" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="600">17.3억 (2.2배)</text>

  <text x="600" y="370" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">제조는 코스맥스/한국콜마에 위탁 → 브랜드·마케팅·유통에 집중 → 자본 효율 극대화</text>
</svg>