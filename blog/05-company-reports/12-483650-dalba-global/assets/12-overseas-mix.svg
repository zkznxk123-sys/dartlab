<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <rect width="1200" height="400" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">해외 비중 7% → 63% — 러시아에서 먼저 터졌다</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">서방 브랜드 철수의 진공에 들어간 K-뷰티 / 2025년 기준</text>

  <!-- Market segments as horizontal bars -->
  <text x="140" y="130" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">러시아 29%</text>
  <rect x="310" y="115" width="290" height="24" rx="4" fill="#ef4444" fill-opacity="0.6"/>
  <text x="620" y="132" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">골드애플 럭셔리 3위 · 서방 철수 진공</text>

  <text x="140" y="175" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">일본 22%</text>
  <rect x="310" y="160" width="220" height="24" rx="4" fill="#3b82f6" fill-opacity="0.6"/>
  <text x="550" y="177" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">큐텐 +219% · 라쿠텐 +272%</text>

  <text x="140" y="220" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">아세안 19%</text>
  <rect x="310" y="205" width="190" height="24" rx="4" fill="#f59e0b" fill-opacity="0.6"/>

  <text x="140" y="265" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">북미 18%</text>
  <rect x="310" y="250" width="180" height="24" rx="4" fill="#22c55e" fill-opacity="0.6"/>
  <text x="510" y="267" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">울타 200→1,300개 · 코스트코 29억</text>

  <text x="140" y="310" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">유럽 5%</text>
  <rect x="310" y="295" width="50" height="24" rx="4" fill="#94a3b8" fill-opacity="0.3"/>

  <text x="140" y="355" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">국내 37%</text>
  <rect x="310" y="340" width="370" height="24" rx="4" fill="#475569" fill-opacity="0.3"/>

  <!-- Annotation -->
  <rect x="750" y="110" width="380" height="100" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.5"/>
  <text x="940" y="140" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">분기점: 북미가 러시아를 넘을 때</text>
  <text x="940" y="165" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">북미 판가 ↑ + 지정학 리스크 ↓</text>
  <text x="940" y="185" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">→ 수익성 D → B 전환 조건</text>

  <text x="600" y="390" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">해외 오프라인 3,000개+ 매장 · 진출 40개국 · B2B 38% (유통사가 마케팅 대신)</text>
</svg>