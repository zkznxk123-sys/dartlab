<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="38" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">5개 A와 2개 D의 공존 — 달바글로벌 스코어카드</text>
  <text x="540" y="60" font-size="12" fill="#64748b" text-anchor="middle">c.analysis("financial", "종합평가") | dartlab scan에서 발견한 모순</text>

  <!-- A badges -->
  <rect x="60" y="90" width="150" height="55" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="135" y="115" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">성장 A</text>
  <text x="135" y="135" font-size="11" fill="#94a3b8" text-anchor="middle">매출 3배 (1년)</text>

  <rect x="230" y="90" width="150" height="55" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="305" y="115" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">안정 A</text>
  <text x="305" y="135" font-size="11" fill="#94a3b8" text-anchor="middle">부채비율 29%</text>

  <rect x="400" y="90" width="150" height="55" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="475" y="115" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">이익품질 A</text>
  <text x="475" y="135" font-size="11" fill="#94a3b8" text-anchor="middle">Piotroski 7/9</text>

  <rect x="570" y="90" width="150" height="55" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="645" y="115" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">투자효율 A</text>
  <text x="645" y="135" font-size="11" fill="#94a3b8" text-anchor="middle">CAPEX 0.1%</text>

  <rect x="740" y="90" width="150" height="55" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="815" y="115" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">재무정합 A</text>
  <text x="815" y="135" font-size="11" fill="#94a3b8" text-anchor="middle">금융차입 0%</text>

  <!-- VS -->
  <text x="540" y="185" font-size="18" font-weight="800" fill="#fbbf24" text-anchor="middle">그런데</text>

  <!-- D badges -->
  <rect x="280" y="210" width="220" height="70" rx="12" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="390" y="240" font-size="16" font-weight="800" fill="#ef4444" text-anchor="middle">수익성 D</text>
  <text x="390" y="262" font-size="12" fill="#94a3b8" text-anchor="middle">영업외손실이 영업이익 상쇄</text>

  <rect x="580" y="210" width="220" height="70" rx="12" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="690" y="240" font-size="16" font-weight="800" fill="#ef4444" text-anchor="middle">현금흐름 D</text>
  <text x="690" y="262" font-size="12" fill="#94a3b8" text-anchor="middle">OCF 67% (재고 비축)</text>

  <text x="540" y="325" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">"왜 이렇게 잘 버는데 D가 두 개인가?" — 상장 비용 + 해외 확장 재고가 일시적으로 눌렀다</text>
</svg>