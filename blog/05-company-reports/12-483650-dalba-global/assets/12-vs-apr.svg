<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="400" fill="#0a0e1a"/>
  <text x="540" y="38" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">달바 vs 에이피알 — 같은 K-뷰티, 다른 전략</text>
  <text x="540" y="60" font-size="12" fill="#64748b" text-anchor="middle">둘 다 ODM, 둘 다 금융차입 0%, 둘 다 매총이익률 76%</text>

  <!-- Dalba -->
  <rect x="60" y="90" width="460" height="270" rx="16" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="290" y="122" font-size="16" font-weight="800" fill="#fbbf24" text-anchor="middle">달바글로벌</text>

  <text x="90" y="155" font-size="13" fill="#94a3b8">매출</text>
  <text x="480" y="155" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="end">5,197억</text>

  <text x="90" y="185" font-size="13" fill="#94a3b8">영업이익률</text>
  <text x="480" y="185" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="end">19.5%</text>

  <text x="90" y="215" font-size="13" fill="#94a3b8">핵심 무기</text>
  <text x="480" y="215" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="end">미스트 5,000만병 (단일 SKU)</text>

  <text x="90" y="245" font-size="13" fill="#94a3b8">해외 진출</text>
  <text x="480" y="245" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="end">러시아 먼저 → 북미 확장 중</text>

  <text x="90" y="275" font-size="13" fill="#94a3b8">포지셔닝</text>
  <text x="480" y="275" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="end">프리미엄 (키엘/이솝 목표)</text>

  <text x="90" y="305" font-size="13" fill="#94a3b8">판관비율</text>
  <text x="480" y="305" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="end">56.4%</text>

  <text x="90" y="340" font-size="13" fill="#94a3b8">CAPEX</text>
  <text x="480" y="340" font-size="16" font-weight="700" fill="#22c55e" text-anchor="end">0.1% (공장 0)</text>

  <!-- APR -->
  <rect x="560" y="90" width="460" height="270" rx="16" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="790" y="122" font-size="16" font-weight="800" fill="#22c55e" text-anchor="middle">에이피알</text>

  <text x="590" y="155" font-size="13" fill="#94a3b8">매출</text>
  <text x="980" y="155" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="end">15,273억</text>

  <text x="590" y="185" font-size="13" fill="#94a3b8">영업이익률</text>
  <text x="980" y="185" font-size="18" font-weight="700" fill="#22c55e" text-anchor="end">23.9%</text>

  <text x="590" y="215" font-size="13" fill="#94a3b8">핵심 무기</text>
  <text x="980" y="215" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="end">화장품 + 뷰티 디바이스 4,070억</text>

  <text x="590" y="245" font-size="13" fill="#94a3b8">해외 진출</text>
  <text x="980" y="245" font-size="14" font-weight="600" fill="#f1f5f9" text-anchor="end">미국 먼저 → TikTok 1위</text>

  <text x="590" y="275" font-size="13" fill="#94a3b8">포지셔닝</text>
  <text x="980" y="275" font-size="14" font-weight="600" fill="#22c55e" text-anchor="end">중가 + 디바이스 고가</text>

  <text x="590" y="305" font-size="13" fill="#94a3b8">판관비율</text>
  <text x="980" y="305" font-size="18" font-weight="700" fill="#22c55e" text-anchor="end">52.7%</text>

  <text x="590" y="340" font-size="13" fill="#94a3b8">CAPEX</text>
  <text x="980" y="340" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="end">~2%</text>

  <!-- Bottom -->
  <text x="540" y="390" font-size="12" fill="#475569" text-anchor="middle">4.4%p 영업이익률 차이 = 판관비율 3.7%p 차이. 달바가 성장하면 이 갭이 좁혀지는가?</text>
</svg>