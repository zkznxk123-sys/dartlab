<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 +18.8% vs 영업이익 +30.2% — 이익이 매출보다 1.6배 빨리 자랐다</title>
  <desc>P&G의 FY20→FY25 매출 증가율은 18.8%, 영업이익 증가율은 30.2%로 이익이 매출보다 약 1.6배 빠르게 성장했다. 이 비대칭이 가격결정력의 자국이다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="52" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">이익이 매출을 앞질렀다 (FY20 → FY25)</text>
  <text x="540" y="86" fill="#64748b" font-size="15" text-anchor="middle">매출 +18.8% (70.95 → 84.28B) · 영업이익 +30.2% (15.71 → 20.45B)</text>

  <!-- 매출 bar -->
  <text x="300" y="170" fill="#94a3b8" font-size="17" text-anchor="middle">매출 증가율</text>
  <rect x="160" y="200" width="280" height="64" rx="6" fill="#1e3a5f"/>
  <rect x="160" y="200" width="263" height="64" rx="6" fill="#22c55e"/>
  <text x="300" y="242" fill="#0a0e1a" font-size="24" font-weight="700" text-anchor="middle">+18.8%</text>

  <!-- 영업이익 bar -->
  <text x="300" y="330" fill="#94a3b8" font-size="17" text-anchor="middle">영업이익 증가율</text>
  <rect x="160" y="360" width="420" height="64" rx="6" fill="#1e3a5f"/>
  <rect x="160" y="360" width="423" height="64" rx="6" fill="#3b82f6"/>
  <text x="370" y="402" fill="#f1f5f9" font-size="24" font-weight="700" text-anchor="middle">+30.2%</text>

  <!-- ratio callout -->
  <circle cx="830" cy="290" r="118" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <text x="830" y="270" fill="#fbbf24" font-size="62" font-weight="700" text-anchor="middle">1.6×</text>
  <text x="830" y="312" fill="#94a3b8" font-size="16" text-anchor="middle">이익이 매출보다</text>
  <text x="830" y="336" fill="#94a3b8" font-size="16" text-anchor="middle">빨리 자란 배수</text>

  <text x="540" y="500" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">가격결정력은 '매출이 컸다'가 아니라 '이익이 매출보다 빨리 늘었다'에 박혀 있다</text>
  <text x="540" y="532" fill="#64748b" font-size="13" text-anchor="middle">FY19는 질레트 손상으로 제외, FY20을 정상화 기준점으로 사용</text>
</svg>
