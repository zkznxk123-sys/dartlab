<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>P&G — 2026년에 봐야 할 다섯 가지</title>
  <desc>가격/물량 재균형의 지속, FY25 마진의 출처(가격 vs 비용) 분리, GPM 51%대 안착 여부, 영업현금흐름과 순이익의 동행, 구조조정 후속 효과.</desc>
  <rect width="1080" height="620" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="90" fill="#64748b" font-size="15" text-anchor="middle">가격결정력은 실재하되 무한하지 않다 — 그 경계를 보는 다섯 창</text>

  <g font-size="18">
    <circle cx="90" cy="150" r="22" fill="#3b82f6"/><text x="90" y="157" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">1</text>
    <text x="130" y="146" fill="#f1f5f9" font-weight="700">가격/물량 재균형의 지속</text>
    <text x="130" y="173" fill="#94a3b8" font-size="15">FY25 물량+1·가격+1이 FY26에 물량 우위로 더 기우는가 (가격 일변도 종료의 확증)</text>

    <circle cx="90" cy="230" r="22" fill="#3b82f6"/><text x="90" y="237" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">2</text>
    <text x="130" y="226" fill="#f1f5f9" font-weight="700">FY25 마진의 출처 분리</text>
    <text x="130" y="253" fill="#94a3b8" font-size="15">매출 정체 속 OPM만 또 오르면 7,000명 감원발 '비용' 스토리 강화 (5막 의심)</text>

    <circle cx="90" cy="310" r="22" fill="#3b82f6"/><text x="90" y="317" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">3</text>
    <text x="130" y="306" fill="#f1f5f9" font-weight="700">GPM의 51%대 안착 여부</text>
    <text x="130" y="333" fill="#94a3b8" font-size="15">FY22 47.4%→FY25 51.2%가 새 정상인지, 원가 재상승으로 다시 47~49%로 밀리는지</text>

    <circle cx="90" cy="390" r="22" fill="#3b82f6"/><text x="90" y="397" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">4</text>
    <text x="130" y="386" fill="#f1f5f9" font-weight="700">영업현금흐름과 순이익의 동행</text>
    <text x="130" y="413" fill="#94a3b8" font-size="15">FY25 순이익 16.07B는 최고지만 영업CF 17.82B는 FY24 19.85B보다 낮다 — 이익의 질</text>

    <circle cx="90" cy="470" r="22" fill="#3b82f6"/><text x="90" y="477" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">5</text>
    <text x="130" y="466" fill="#f1f5f9" font-weight="700">구조조정 후속 효과</text>
    <text x="130" y="493" fill="#94a3b8" font-size="15">7,000명 감원이 일회성 비용을 넘어 구조적으로 OPM을 끌어올리는지의 검증 창</text>
  </g>

  <text x="540" y="570" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">가격을 올려도 안 떠나는 소비자 ≠ 그 가격을 영원히 올릴 수 있다</text>
  <text x="540" y="600" fill="#64748b" font-size="13" text-anchor="middle">dartlab 실측 2026-06-14 · 내부(연결 손익) vs 외부(가격/물량·세그먼트) 경계 유지</text>
</svg>
