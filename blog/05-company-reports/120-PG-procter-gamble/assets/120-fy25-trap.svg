<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>FY25는 매출 정체(+0.24B) 위에 이익만 뛴 해 — 가격 아닌 비용 이야기일 위험</title>
  <desc>P&G의 FY24→FY25 매출은 84.04B에서 84.28B로 사실상 정체(+0.24B)했으나 영업이익은 18.55B에서 20.45B로 +1.90B 급증했다. 매출 정체 위 마진 점프는 가격 단독 귀속이 위험하며, 비용절감(7,000명 감원 발표)이 겹친 국면이다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">매출은 멈췄는데 이익만 뛴 해 (FY24 → FY25)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">매출 +0.24B (사실상 정체) · 영업이익 +1.90B (급증)</text>

  <!-- 매출 -->
  <text x="300" y="150" fill="#94a3b8" font-size="17" text-anchor="middle">매출 ($B)</text>
  <rect x="200" y="200" width="80" height="200" fill="#1e3a5f"/>
  <rect x="320" y="198" width="80" height="202" fill="#22c55e"/>
  <text x="240" y="190" fill="#64748b" font-size="14" text-anchor="middle">84.04</text>
  <text x="360" y="188" fill="#94a3b8" font-size="14" text-anchor="middle">84.28</text>
  <text x="240" y="420" fill="#64748b" font-size="13" text-anchor="middle">FY24</text>
  <text x="360" y="420" fill="#64748b" font-size="13" text-anchor="middle">FY25</text>
  <text x="300" y="452" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">+0.3% (정체)</text>

  <!-- 영업이익 -->
  <text x="760" y="150" fill="#94a3b8" font-size="17" text-anchor="middle">영업이익 ($B)</text>
  <rect x="660" y="270" width="80" height="130" fill="#1e3a5f"/>
  <rect x="780" y="230" width="80" height="170" fill="#3b82f6"/>
  <text x="700" y="260" fill="#64748b" font-size="14" text-anchor="middle">18.55</text>
  <text x="820" y="220" fill="#f1f5f9" font-size="14" text-anchor="middle">20.45</text>
  <text x="700" y="420" fill="#64748b" font-size="13" text-anchor="middle">FY24</text>
  <text x="820" y="420" fill="#64748b" font-size="13" text-anchor="middle">FY25</text>
  <text x="760" y="452" fill="#3b82f6" font-size="15" font-weight="700" text-anchor="middle">+10.2%</text>

  <text x="540" y="500" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">매출 정체 위 이익 점프 = '가격을 더 올려서'로 단정하면 위험</text>
  <text x="540" y="532" fill="#64748b" font-size="13" text-anchor="middle">비용절감(외부: 7,000명 감원 발표) + FY25 organic +2%(물량+1·가격+1) 겹친 국면</text>
</svg>
