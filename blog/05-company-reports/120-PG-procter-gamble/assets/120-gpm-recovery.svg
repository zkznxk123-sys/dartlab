<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출총이익률이 FY22 47.4% 저점에서 FY25 51.2%로 3.8%p 되돌아왔다</title>
  <desc>P&amp;G의 매출총이익률(GPM)은 원자재·물류비가 치솟던 FY22에 47.4%까지 눌렸다가 FY24 51.4%·FY25 51.2%로 3.8%p 복원됐다. 가격전가와 원가완화가 겹친 정합이다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">눌렸다가 되돌아온 매출총이익률 (GPM)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">FY22 47.4% 저점 → FY25 51.2% (+3.8%p) — 마진 스토리의 진짜 주인공</text>

  <!-- axis guides -->
  <line x1="130" y1="360" x2="950" y2="360" stroke="#1e293b" stroke-width="1"/>
  <text x="100" y="175" fill="#475569" font-size="13" text-anchor="end">52%</text>
  <text x="100" y="355" fill="#475569" font-size="13" text-anchor="end">47%</text>

  <!-- GPM: FY20 50.3, FY21 51.2, FY22 47.4(dip), FY23 47.9, FY24 51.4, FY25 51.2 -->
  <polyline points="180,206 334,170 488,350 642,330 796,166 950,174" fill="none" stroke="#38bdf8" stroke-width="3.5"/>
  <g fill="#38bdf8"><circle cx="180" cy="206" r="6"/><circle cx="334" cy="170" r="6"/><circle cx="642" cy="330" r="6"/><circle cx="796" cy="166" r="6"/><circle cx="950" cy="174" r="6"/></g>
  <circle cx="488" cy="350" r="8" fill="#ef4444"/>
  <g fill="#94a3b8" font-size="14" text-anchor="middle">
    <text x="180" y="192">50.3%</text><text x="334" y="156">51.2%</text><text x="642" y="352">47.9%</text><text x="796" y="152">51.4%</text><text x="950" y="160">51.2%</text>
  </g>
  <text x="488" y="378" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">47.4% 저점</text>

  <g fill="#64748b" font-size="14" text-anchor="middle">
    <text x="180" y="400">FY20</text><text x="334" y="400">FY21</text><text x="488" y="400">FY22</text>
    <text x="642" y="400">FY23</text><text x="796" y="400">FY24</text><text x="950" y="400">FY25</text>
  </g>

  <text x="540" y="470" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">단, 회복을 '가격결정력 단독'으로 귀속하면 비약</text>
  <text x="540" y="505" fill="#94a3b8" font-size="15" text-anchor="middle">원자재·물류비 하락(외부 매크로)과 겹친 정합 — 내부 수치로 분리 불가</text>
</svg>
