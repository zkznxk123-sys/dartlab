<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률은 22~24% 밴드 — FY25 24.3%는 5년 최고지만 FY21 대비 0.7%p</title>
  <desc>P&amp;G의 영업이익률(OPM)은 FY20 22.1%에서 FY25 24.3%로 5년 중 최고를 갱신했으나, FY21 23.6% 대비 0.7%p 차이라 극적 확장이 아니라 밴드 상단 갱신까지만 말할 수 있다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">영업이익률(OPM)은 22~24% 밴드 안</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">FY25 24.3% = 5년 최고지만 FY21(23.6%) 대비 +0.7%p — '극적 확장' 아님</text>

  <!-- band -->
  <rect x="130" y="150" width="820" height="150" fill="#15233a" opacity="0.55"/>
  <text x="100" y="168" fill="#475569" font-size="13" text-anchor="end">25%</text>
  <text x="100" y="305" fill="#475569" font-size="13" text-anchor="end">22%</text>

  <!-- OPM line: FY20 22.1, FY21 23.6, FY22 22.2, FY23 22.1, FY24 22.1, FY25 24.3 -->
  <polyline points="180,253 334,185 488,248 642,253 796,253 950,160" fill="none" stroke="#fbbf24" stroke-width="3.5"/>
  <g fill="#fbbf24">
    <circle cx="180" cy="253" r="6"/><circle cx="334" cy="185" r="6"/><circle cx="488" cy="248" r="6"/>
    <circle cx="642" cy="253" r="6"/><circle cx="796" cy="253" r="6"/>
  </g>
  <circle cx="950" cy="160" r="8" fill="#22c55e"/>
  <g fill="#94a3b8" font-size="14" text-anchor="middle">
    <text x="180" y="238">22.1%</text><text x="334" y="170">23.6%</text><text x="488" y="233">22.2%</text>
    <text x="642" y="238">22.1%</text><text x="796" y="238">22.1%</text>
  </g>
  <text x="950" y="146" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">24.3%</text>

  <g fill="#64748b" font-size="14" text-anchor="middle">
    <text x="180" y="335">FY20</text><text x="334" y="335">FY21</text><text x="488" y="335">FY22</text>
    <text x="642" y="335">FY23</text><text x="796" y="335">FY24</text><text x="950" y="335">FY25</text>
  </g>

  <text x="540" y="430" fill="#94a3b8" font-size="17" text-anchor="middle">OPM의 0.7%p로는 '이익이 매출보다 1.6배 빠른' 비대칭을 다 설명 못 한다</text>
  <text x="540" y="468" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">비대칭의 무게는 OPM 위쪽 — 매출총이익(GPM) 단에 더 크게 실려 있다</text>
  <text x="540" y="510" fill="#64748b" font-size="13" text-anchor="middle">OPM·NPM·GPM은 별개 비율 · 다음 막에서 GPM을 따로 본다</text>
</svg>
