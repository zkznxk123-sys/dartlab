<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>FY24 organic +4%는 전량 가격 — 가격을 올려도 물량이 안 빠졌다 (외부 인용)</title>
  <desc>P&G의 organic 매출 성장 분해(외부 인용). FY2024는 +4%가 전량 가격이고 물량·믹스는 0이었으며, FY2025는 +2%로 물량 +1·가격 +1로 재균형됐다. 가격 일변도는 인플레 국면의 한시적 특성이었다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">가격을 올려도 물량이 안 빠졌다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">organic 매출 성장의 가격 vs 물량 분해 (외부 인용: P&G IR)</text>

  <!-- FY24 -->
  <text x="330" y="160" fill="#94a3b8" font-size="18" text-anchor="middle">FY2024 · organic +4%</text>
  <rect x="140" y="185" width="380" height="58" rx="5" fill="#3b82f6"/>
  <text x="330" y="223" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">가격 +4%p</text>
  <text x="330" y="278" fill="#64748b" font-size="15" text-anchor="middle">물량·믹스 0 — 전량 가격</text>

  <!-- FY25 -->
  <text x="330" y="350" fill="#94a3b8" font-size="18" text-anchor="middle">FY2025 · organic +2%</text>
  <rect x="140" y="375" width="95" height="58" rx="5" fill="#22c55e"/>
  <text x="187" y="413" fill="#0a0e1a" font-size="17" font-weight="700" text-anchor="middle">물량+1</text>
  <rect x="237" y="375" width="95" height="58" rx="5" fill="#3b82f6"/>
  <text x="284" y="413" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">가격+1</text>
  <text x="330" y="468" fill="#64748b" font-size="15" text-anchor="middle">물량이 다시 등장 — 재균형</text>

  <!-- right note -->
  <text x="800" y="250" fill="#fbbf24" font-size="19" font-weight="700" text-anchor="middle">'가격 일변도'는</text>
  <text x="800" y="282" fill="#fbbf24" font-size="19" font-weight="700" text-anchor="middle">인플레 국면의</text>
  <text x="800" y="314" fill="#fbbf24" font-size="19" font-weight="700" text-anchor="middle">한시적 특성</text>
  <text x="800" y="360" fill="#94a3b8" font-size="14" text-anchor="middle">FY24 가격 점프(외부)와</text>
  <text x="800" y="382" fill="#94a3b8" font-size="14" text-anchor="middle">FY24 GPM 51.4%(내부)는</text>
  <text x="800" y="404" fill="#94a3b8" font-size="14" text-anchor="middle">'정합'이지 인과 아님</text>

  <text x="540" y="525" fill="#64748b" font-size="13" text-anchor="middle">organic = 환율·인수·매각 효과를 뺀 자체 성장 · 분해는 외부, 내부 GPM과 방향만 일치</text>
</svg>
