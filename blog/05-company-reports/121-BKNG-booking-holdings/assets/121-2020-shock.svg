<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 -54.9% 충격이 이익에선 흑자→적자로 부호까지 바꿨다 (2020)</title>
  <desc>2020년 전 세계 여행 동결로 부킹홀딩스 매출은 15.07B에서 6.80B로 -54.9% 무너졌고, 영업이익은 5.34B에서 -0.63B로 적자 전환, OPM은 35.4%에서 -9.3%로 떨어졌다. 매출이 절반 남짓 빠진 충격이 이익에서는 부호까지 바꿔 증폭됐다. 단일 표본이다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">매출은 -55%, 이익은 부호가 바뀌었다 (2019 → 2020)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">외생 충격 1회 — 음(陰)의 증폭이 작동한 직접 증거</text>

  <line x1="120" y1="320" x2="960" y2="320" stroke="#334155" stroke-width="1.5"/>

  <!-- 매출 -->
  <text x="290" y="150" fill="#94a3b8" font-size="16" text-anchor="middle">매출 ($B)</text>
  <rect x="200" y="170" width="80" height="150" fill="#1e3a5f"/>
  <rect x="320" y="252" width="80" height="68" fill="#22c55e"/>
  <text x="240" y="160" fill="#64748b" font-size="13" text-anchor="middle">15.07</text>
  <text x="360" y="244" fill="#94a3b8" font-size="13" text-anchor="middle">6.80</text>
  <text x="290" y="350" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">-54.9%</text>

  <!-- 영업이익 -->
  <text x="760" y="150" fill="#94a3b8" font-size="16" text-anchor="middle">영업이익 ($B)</text>
  <rect x="670" y="200" width="80" height="120" fill="#3b82f6"/>
  <rect x="790" y="320" width="80" height="40" fill="#ef4444"/>
  <text x="710" y="190" fill="#94a3b8" font-size="13" text-anchor="middle">5.34</text>
  <text x="830" y="378" fill="#ef4444" font-size="13" text-anchor="middle">-0.63</text>
  <text x="760" y="430" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">흑자 → 적자</text>

  <text x="290" y="430" fill="#64748b" font-size="13" text-anchor="middle">2019 → 2020</text>
  <text x="760" y="455" fill="#64748b" font-size="13" text-anchor="middle">OPM 35.4% → -9.3%</text>

  <text x="540" y="500" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">'항상 적자가 난다'가 아니라 '2020 이 충격에서 이렇게 작동했다'까지 (표본 1개)</text>
</svg>
