<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>부킹홀딩스 — 2026년에 봐야 할 다섯 가지</title>
  <desc>마케팅 비율의 밴드 이탈 방향, OPM↑·NPM↓ 괴리의 향방, 영업CF/영업이익 배수 유지, OPM이 2018 정점을 넘는지, 마케팅비 안의 통행료 추정치.</desc>
  <rect width="1080" height="620" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="90" fill="#64748b" font-size="15" text-anchor="middle">광고비라는 단일 비용의 동조로 손익이 거의 설명되는 회사</text>

  <g font-size="18">
    <circle cx="90" cy="150" r="22" fill="#3b82f6"/><text x="90" y="157" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">1</text>
    <text x="130" y="146" fill="#f1f5f9" font-weight="700">마케팅/매출 비율의 이탈 방향</text>
    <text x="130" y="173" fill="#94a3b8" font-size="15">30.4% 아래로 처음 내려가는가, 다시 35% 밴드 상단으로 돌아가는가 (내부 추적)</text>

    <circle cx="90" cy="230" r="22" fill="#3b82f6"/><text x="90" y="237" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">2</text>
    <text x="130" y="226" fill="#f1f5f9" font-weight="700">OPM↑·NPM↓ 괴리의 향방</text>
    <text x="130" y="253" fill="#94a3b8" font-size="15">영업이익 8.82B / 순이익 5.40B의 역행이 2026에 좁혀지는가 (원인=항목분해 필요)</text>

    <circle cx="90" cy="310" r="22" fill="#3b82f6"/><text x="90" y="317" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">3</text>
    <text x="130" y="306" fill="#f1f5f9" font-weight="700">영업CF/영업이익 배수 유지</text>
    <text x="130" y="333" fill="#94a3b8" font-size="15">1.07~1.28 밴드가 깨지면 회계이익의 현금 뒷받침 약화 신호 (이연수익 점검)</text>

    <circle cx="90" cy="390" r="22" fill="#3b82f6"/><text x="90" y="397" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">4</text>
    <text x="130" y="386" fill="#f1f5f9" font-weight="700">OPM 32.8%가 2018 정점 36.8%를 넘는가</text>
    <text x="130" y="413" fill="#94a3b8" font-size="15">'완전 회복'이라는 단어는 이 한 선을 넘기 전엔 쓸 수 없다</text>

    <circle cx="90" cy="470" r="22" fill="#3b82f6"/><text x="90" y="477" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">5</text>
    <text x="130" y="466" fill="#f1f5f9" font-weight="700">마케팅비 안의 통행료 추정치(외부)</text>
    <text x="130" y="493" fill="#94a3b8" font-size="15">비율 안정이 'ROI 타게팅' 때문인지 '검색 의존' 때문인지 가르는 유일한 자료</text>
  </g>

  <text x="540" y="570" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">길목을 쥔 동시에 다른 길목에 종속된 회사</text>
  <text x="540" y="600" fill="#64748b" font-size="13" text-anchor="middle">dartlab 실측 2026-06-14 · 마케팅비 총액(내부) vs 통행료 비중(외부) 경계 유지</text>
</svg>
