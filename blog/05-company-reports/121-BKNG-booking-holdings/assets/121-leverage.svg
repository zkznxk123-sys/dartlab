<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출의 1/3은 매출에 연동돼 함께 줄지만, 나머지는 둔감하다 — 증폭은 그 바깥에서</title>
  <desc>부킹홀딩스 매출의 약 3분의 1(마케팅비)은 매출에 연동되어 매출이 빠지면 같이 줄어 손익을 일부 받친다. 나머지 약 3분의 2의 비용은 매출이 빠져도 그만큼 줄지 않아, 매출 충격이 이익 충격으로 증폭되는 자리는 마케팅비 바깥이다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">손익의 지렛대는 비율이 닿지 않는 곳에 있다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">매출의 약 1/3 = 마케팅비(매출에 연동) · 나머지 약 2/3 = 매출에 덜 연동되는 비용</text>

  <!-- donut-ish split -->
  <rect x="180" y="150" width="720" height="70" rx="6" fill="#1e3a5f"/>
  <rect x="180" y="150" width="230" height="70" rx="6" fill="#3b82f6"/>
  <text x="295" y="193" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">마케팅비 ≈ 1/3</text>
  <text x="655" y="193" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">나머지 비용 ≈ 2/3</text>

  <text x="295" y="270" fill="#22c55e" font-size="15" text-anchor="middle">매출 ↓ 하면 ↓ 같이 줄어 방어</text>
  <text x="655" y="270" fill="#ef4444" font-size="15" text-anchor="middle">매출 ↓ 해도 그만큼 안 줄어</text>

  <!-- arrows -->
  <text x="295" y="330" fill="#64748b" font-size="38" text-anchor="middle">↓</text>
  <text x="655" y="330" fill="#ef4444" font-size="38" text-anchor="middle">↯</text>

  <text x="540" y="410" fill="#fbbf24" font-size="19" font-weight="700" text-anchor="middle">매출 충격이 이익 충격으로 증폭되는 자리 = 마케팅비 바깥</text>
  <text x="540" y="455" fill="#94a3b8" font-size="15" text-anchor="middle">여기까지는 구조의 '예고' — 실제 작동은 2020(음)·회복기(양) 숫자가 증언</text>
  <text x="540" y="505" fill="#64748b" font-size="13" text-anchor="middle">비율 안정 = 통계적 동조이지 '회계적 변동비' 단정 아님 (그 '왜'는 외부)</text>
</svg>
