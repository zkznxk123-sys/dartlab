<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>마케팅비는 3.76배 폭증했는데 매출 대비 비율은 30.4~35.1% 밴드에 머물렀다</title>
  <desc>부킹홀딩스의 마케팅비는 2020년 2.18B에서 2025년 8.19B로 3.76배 늘었지만, 매출 대비 비율은 32.1%에서 30.4%로 약 1.6%p 내려가 6년 내내 30.4~35.1% 밴드에 머물렀다. 매출이 3.96배 늘어 마케팅 배수 3.76배를 앞선 결과다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="48" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">절대액은 폭증, 비율은 오히려 하락</text>
  <text x="540" y="82" fill="#64748b" font-size="15" text-anchor="middle">마케팅비 2.18→8.19B (3.76배) · 비율 32.1%→30.4% (약 1.6%p↓)</text>

  <!-- bars: marketing absolute -->
  <g>
    <rect x="150" y="320" width="70" height="60" fill="#3b82f6"/>
    <rect x="280" y="290" width="70" height="90" fill="#3b82f6"/>
    <rect x="410" y="250" width="70" height="130" fill="#3b82f6"/>
    <rect x="540" y="235" width="70" height="145" fill="#3b82f6"/>
    <rect x="670" y="222" width="70" height="158" fill="#3b82f6"/>
    <rect x="800" y="200" width="70" height="180" fill="#3b82f6"/>
  </g>
  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="185" y="312">2.18</text><text x="315" y="282">3.80</text><text x="445" y="242">5.99</text>
    <text x="575" y="227">6.77</text><text x="705" y="214">7.28</text><text x="835" y="192">8.19</text>
  </g>
  <text x="120" y="300" fill="#3b82f6" font-size="13" text-anchor="end">마케팅비($B)</text>

  <!-- band shade -->
  <rect x="135" y="110" width="750" height="60" fill="#15233a" opacity="0.5"/>
  <!-- ratio line -->
  <polyline points="185,142 315,126 445,124 575,144 705,150 835,152" fill="none" stroke="#fbbf24" stroke-width="3.5"/>
  <g fill="#fbbf24"><circle cx="185" cy="142" r="5"/><circle cx="315" cy="126" r="5"/><circle cx="445" cy="124" r="5"/><circle cx="575" cy="144" r="5"/><circle cx="705" cy="150" r="5"/><circle cx="835" cy="152" r="5"/></g>
  <text x="185" y="132" fill="#94a3b8" font-size="12" text-anchor="middle">32.1%</text>
  <text x="445" y="114" fill="#94a3b8" font-size="12" text-anchor="middle">35.1%</text>
  <text x="835" y="142" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">30.4%</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="185" y="400">2020</text><text x="315" y="400">2021</text><text x="445" y="400">2022</text>
    <text x="575" y="400">2023</text><text x="705" y="400">2024</text><text x="835" y="400">2025</text>
  </g>

  <text x="540" y="470" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">매출 배수(3.96) &gt; 마케팅 배수(3.76) — 그 0.20배 차이가 비율 하락</text>
  <text x="540" y="505" fill="#94a3b8" font-size="15" text-anchor="middle">단일 비용이 매출과 거의 같은 배수로 동조 (경로는 비단조: 2021에 한 번 상승)</text>
</svg>
