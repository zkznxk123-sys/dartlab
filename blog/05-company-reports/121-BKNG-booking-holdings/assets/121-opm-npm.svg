<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2025년 OPM은 올랐는데 NPM은 내렸다 — 영업단과 맨 아랫줄이 따로 움직였다</title>
  <desc>2024에서 2025로 부킹홀딩스의 영업이익률(OPM)은 31.8%에서 32.8%로 올랐으나 순이익률(NPM)은 24.8%에서 20.1%로 내렸다. 영업이익은 7.55B에서 8.82B로 늘었지만 순이익은 5.88B에서 5.40B로 줄었다. 내부 수치에 영업외·세금 분해가 없어 관찰에서 멈춘다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">영업단은 올랐는데 맨 아랫줄은 내렸다 (2024 → 2025)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">OPM·NPM은 별개 비율 — 둘이 반대로 갔다</text>

  <line x1="120" y1="180" x2="120" y2="380" stroke="#334155"/>
  <line x1="120" y1="380" x2="960" y2="380" stroke="#334155"/>

  <!-- OPM up -->
  <polyline points="300,250 760,215" fill="none" stroke="#22c55e" stroke-width="4"/>
  <circle cx="300" cy="250" r="7" fill="#22c55e"/><circle cx="760" cy="215" r="9" fill="#22c55e"/>
  <text x="300" y="235" fill="#22c55e" font-size="15" text-anchor="middle">OPM 31.8%</text>
  <text x="760" y="200" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">32.8% ↑</text>

  <!-- NPM down -->
  <polyline points="300,290 760,345" fill="none" stroke="#ef4444" stroke-width="4"/>
  <circle cx="300" cy="290" r="7" fill="#ef4444"/><circle cx="760" cy="345" r="9" fill="#ef4444"/>
  <text x="300" y="310" fill="#ef4444" font-size="15" text-anchor="middle">NPM 24.8%</text>
  <text x="760" y="368" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">20.1% ↓</text>

  <g fill="#64748b" font-size="14" text-anchor="middle"><text x="300" y="405">2024</text><text x="760" y="405">2025</text></g>

  <text x="540" y="455" fill="#94a3b8" font-size="16" text-anchor="middle">영업이익 7.55→8.82B (↑) vs 순이익 5.88→5.40B (↓)</text>
  <text x="540" y="495" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">'관찰'에서 멈춘다 — 영업외·세금 분해가 없어 원인은 단정 안 함</text>
  <text x="540" y="530" fill="#64748b" font-size="13" text-anchor="middle">영업이익률만 보고 '수익성 개선'으로 결론내면 맨 아랫줄의 역행을 놓친다</text>
</svg>
