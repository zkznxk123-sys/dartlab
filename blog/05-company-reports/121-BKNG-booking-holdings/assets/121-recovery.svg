<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>회복기 매출 2.46배에 영업이익 3.53배 — 같은 지렛대의 양(陽)의 작동</title>
  <desc>2021에서 2025로의 회복기에 부킹홀딩스 매출은 2.46배, 영업이익은 3.53배 늘어 이익 배수가 매출 배수를 앞질렀다. OPM은 22.8%에서 32.8%로 올랐으나 2018 정점 36.8%에는 아직 못 미친다.</desc>
  <rect width="1080" height="560" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">회복기엔 이익이 매출보다 빨리 자랐다 (2021 → 2025)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">같은 지렛대의 양(陽)의 작동 — 매출에 덜 연동되는 비용이 희석</text>

  <!-- 매출 배수 -->
  <text x="300" y="160" fill="#94a3b8" font-size="17" text-anchor="middle">매출 증가 배수</text>
  <rect x="160" y="190" width="290" height="58" rx="5" fill="#1e3a5f"/>
  <rect x="160" y="190" width="246" height="58" rx="5" fill="#22c55e"/>
  <text x="285" y="228" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2.46배</text>

  <text x="300" y="320" fill="#94a3b8" font-size="17" text-anchor="middle">영업이익 증가 배수</text>
  <rect x="160" y="350" width="400" height="58" rx="5" fill="#1e3a5f"/>
  <rect x="160" y="350" width="353" height="58" rx="5" fill="#3b82f6"/>
  <text x="335" y="388" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">3.53배</text>

  <!-- OPM callout -->
  <text x="830" y="210" fill="#94a3b8" font-size="16" text-anchor="middle">OPM</text>
  <text x="830" y="260" fill="#fbbf24" font-size="34" font-weight="700" text-anchor="middle">22.8% → 32.8%</text>
  <text x="830" y="305" fill="#ef4444" font-size="15" text-anchor="middle">단, 2018 정점 36.8%엔 미달</text>
  <text x="830" y="332" fill="#ef4444" font-size="15" text-anchor="middle">→ '완전 회복' 아님</text>

  <text x="540" y="470" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">이익 배수(3.53) &gt; 매출 배수(2.46) — 양의 증폭</text>
  <text x="540" y="510" fill="#64748b" font-size="13" text-anchor="middle">3막의 음(陰)과 4막의 양(陽)은 같은 한 메커니즘의 두 면</text>
</svg>
