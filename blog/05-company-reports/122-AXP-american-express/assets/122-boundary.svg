<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>미국 구매액 점유율: 비자 ~60% · 마스터카드 ~27% · AXP ~10% (외부 인용)</title>
  <desc>아메리칸 익스프레스의 미국 구매액 점유율은 약 10%로, 비자 약 60%·마스터카드 약 27%에 비해 절대 규모가 작다. closed-loop는 더 무거운 모델이지 슈퍼 해자가 아니라는 균형추다. 외부 인용.</desc>
  <rect width="1080" height="460" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">균형추 — 절대 규모는 작다 (외부 인용)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">미국 구매액(purchase volume) 점유율</text>

  <!-- Visa -->
  <text x="120" y="150" fill="#cbd5e1" font-size="16">비자</text>
  <rect x="120" y="160" width="720" height="46" rx="4" fill="#1e3a5f"/>
  <rect x="120" y="160" width="720" height="46" rx="4" fill="#3b82f6"/>
  <text x="855" y="190" fill="#3b82f6" font-size="18" font-weight="700">~60%</text>

  <!-- MA -->
  <text x="120" y="245" fill="#cbd5e1" font-size="16">마스터카드</text>
  <rect x="120" y="255" width="324" height="46" rx="4" fill="#1e3a5f"/>
  <rect x="120" y="255" width="324" height="46" rx="4" fill="#64748b"/>
  <text x="459" y="285" fill="#94a3b8" font-size="18" font-weight="700">~27%</text>

  <!-- AXP -->
  <text x="120" y="340" fill="#cbd5e1" font-size="16">AXP</text>
  <rect x="120" y="350" width="120" height="46" rx="4" fill="#1e3a5f"/>
  <rect x="120" y="350" width="120" height="46" rx="4" fill="#fbbf24"/>
  <text x="255" y="380" fill="#fbbf24" font-size="18" font-weight="700">~10%</text>

  <text x="540" y="438" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">closed-loop는 더 무거운 모델(대손·자본·규제 직접)이지 '슈퍼 해자'가 아니다</text>
</svg>
