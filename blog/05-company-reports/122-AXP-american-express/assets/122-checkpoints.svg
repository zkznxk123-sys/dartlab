<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>아메리칸 익스프레스 — 2026년에 봐야 할 다섯 가지</title>
  <desc>순이자이익 절대액의 향방, 대손충당금 매핑 결손 복구, 두 줄의 배수 격차, 순이익이 영업단 호조를 따라가는지, 내부 순이자이익 라인의 외부 정렬.</desc>
  <rect width="1080" height="620" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="90" fill="#64748b" font-size="15" text-anchor="middle">통행료만 받는 망이 아니라, 빌려주고 떼이는 무게까지 진 회사</text>

  <g font-size="18">
    <circle cx="90" cy="150" r="22" fill="#3b82f6"/><text x="90" y="157" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">1</text>
    <text x="130" y="146" fill="#f1f5f9" font-weight="700">순이자이익 절대액의 향방</text>
    <text x="130" y="173" fill="#94a3b8" font-size="15">2025 17.36B(2018의 2.27배)가 금리 하강에도 자라는가 — 대출·회원 vs 금리 단서</text>

    <circle cx="90" cy="230" r="22" fill="#3b82f6"/><text x="90" y="237" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">2</text>
    <text x="130" y="226" fill="#f1f5f9" font-weight="700">대손충당금 매핑 결손 복구</text>
    <text x="130" y="253" fill="#94a3b8" font-size="15">2021~2025 복구되면 '위기 후 정상화' 곡선을 내부로 그릴 수 있다 (외부 5.2B는 분리)</text>

    <circle cx="90" cy="310" r="22" fill="#3b82f6"/><text x="90" y="317" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">3</text>
    <text x="130" y="306" fill="#f1f5f9" font-weight="700">두 줄의 배수 격차</text>
    <text x="130" y="333" fill="#94a3b8" font-size="15">통행료성 줄(1.68배)이 은행 줄(2.27배)과 격차를 좁히는가 — 단 끝까지 따로, 합산 금지</text>

    <circle cx="90" cy="390" r="22" fill="#3b82f6"/><text x="90" y="397" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">4</text>
    <text x="130" y="386" fill="#f1f5f9" font-weight="700">순이익이 영업단 호조를 따라가는가</text>
    <text x="130" y="413" fill="#94a3b8" font-size="15">순이익 2018 6.92→2025 10.83B(1.57배) — 신용사이클이 돌면 대손이 먼저 누른다</text>

    <circle cx="90" cy="470" r="22" fill="#3b82f6"/><text x="90" y="477" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">5</text>
    <text x="130" y="466" fill="#f1f5f9" font-weight="700">내부 순이자이익 라인의 정렬</text>
    <text x="130" y="493" fill="#94a3b8" font-size="15">내부 NII가 외부 보고 NII와 부호·연도 정렬이 다를 수 있다(2020 방향 어긋남)</text>
  </g>

  <text x="540" y="570" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">비자에 없는 두 줄이 있다 — 그 '있다/없다'가 이 회사의 정체</text>
  <text x="540" y="600" fill="#64748b" font-size="13" text-anchor="middle">dartlab 실측 2026-06-14 · 내부 8라인 vs 외부(대출·점유율·소유) 경계 유지</text>
</svg>
