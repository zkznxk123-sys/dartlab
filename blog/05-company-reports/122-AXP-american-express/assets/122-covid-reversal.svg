<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2020: 총수익·비이자수익·순이익이 꺾이는데 대손충당금만 +35.6% 역행</title>
  <desc>2020년 코로나에 아메리칸 익스프레스의 총수익은 -22.0%, 비이자수익 -19.6%, 순이익 -53.7%로 꺾였으나 대손충당금만 +35.6%(3.57→4.84B)로 거꾸로 늘었다. 단일 자연실험에서 대손만 역행한 동시성 관찰이다.</desc>
  <rect width="1080" height="520" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">코로나(2020): 다섯 줄 중 대손만 거꾸로 갔다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">2019 → 2020 변화율 — 외부 의존 가장 낮은 단일 자연실험</text>

  <line x1="120" y1="290" x2="980" y2="290" stroke="#334155" stroke-width="1.5"/>
  <text x="105" y="295" fill="#475569" font-size="12" text-anchor="end">0%</text>

  <!-- down bars -->
  <rect x="180" y="290" width="110" height="88" fill="#ef4444"/>
  <text x="235" y="400" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">-22.0%</text>
  <text x="235" y="270" fill="#94a3b8" font-size="13" text-anchor="middle">총수익</text>

  <rect x="340" y="290" width="110" height="78" fill="#ef4444"/>
  <text x="395" y="390" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">-19.6%</text>
  <text x="395" y="270" fill="#94a3b8" font-size="13" text-anchor="middle">비이자수익</text>

  <rect x="500" y="290" width="110" height="200" fill="#ef4444"/>
  <text x="555" y="510" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">-53.7%</text>
  <text x="555" y="270" fill="#94a3b8" font-size="13" text-anchor="middle">순이익</text>

  <!-- up bar -->
  <rect x="780" y="160" width="130" height="130" fill="#fbbf24"/>
  <text x="845" y="145" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">+35.6%</text>
  <text x="845" y="270" fill="#0a0e1a" font-size="13" font-weight="700" text-anchor="middle">대손충당금</text>
  <text x="845" y="320" fill="#94a3b8" font-size="13" text-anchor="middle">3.57 → 4.84B</text>

  <text x="540" y="455" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">단, 순이익 반토막은 대손 탓 아님 — 수익 하락(-6.19B) &gt; 대손 증가(+1.27B)</text>
</svg>
