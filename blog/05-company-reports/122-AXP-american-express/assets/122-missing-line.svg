<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>비자엔 OPM 줄이 주인공인데, AXP 격자엔 그 줄이 안 잡힌다 (은행형 손익)</title>
  <desc>비자 손익에서는 영업이익률(OPM)이 주인공 라인이지만, 아메리칸 익스프레스의 dartlab 손익 격자에는 영업이익(OPM) 라인이 안 잡힌다. dartlab이 은행형 손익으로 읽어 그 줄이 격자에 안 잡히는 것까지만 말할 수 있다.</desc>
  <rect width="1080" height="520" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">부재라는 첫 단서 — 영업이익 줄이 없다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">은행형 손익이라 dartlab 격자에 OPM 줄이 안 잡힌다 (매핑 사실까지만)</text>

  <!-- VISA panel -->
  <rect x="90" y="120" width="420" height="320" rx="10" fill="#11203a"/>
  <text x="300" y="155" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">비자 (open-loop)</text>
  <text x="120" y="210" fill="#cbd5e1" font-size="16">매출</text>
  <text x="120" y="255" fill="#22c55e" font-size="16" font-weight="700">영업이익 (OPM) ✔ 주인공</text>
  <text x="120" y="300" fill="#64748b" font-size="16">순이자이익 ✘ 없음</text>
  <text x="120" y="345" fill="#64748b" font-size="16">대손충당금 ✘ 없음</text>
  <text x="120" y="400" fill="#475569" font-size="13">신용리스크는 발급은행이 짐</text>

  <!-- AXP panel -->
  <rect x="570" y="120" width="420" height="320" rx="10" fill="#11203a"/>
  <text x="780" y="155" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="middle">AXP (closed-loop)</text>
  <text x="600" y="210" fill="#cbd5e1" font-size="16">총수익</text>
  <text x="600" y="255" fill="#ef4444" font-size="16" font-weight="700">영업이익 (OPM) ✘ 안 잡힘</text>
  <text x="600" y="300" fill="#3b82f6" font-size="16" font-weight="700">순이자이익 ✔ 있음</text>
  <text x="600" y="345" fill="#fbbf24" font-size="16" font-weight="700">대손충당금 ✔ 있음</text>
  <text x="600" y="400" fill="#475569" font-size="13">발급·정산·신용리스크 단일 통제</text>

  <text x="540" y="480" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">영업이익 줄이 없는 그 자리에, 무엇이 있나? → 다음 막</text>
</svg>
