<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>은행 줄(순이자이익) 2.27배 vs 통행료성 줄(비이자수익) 1.68배 — 각자 따로, 합산 금지</title>
  <desc>아메리칸 익스프레스의 순이자이익은 2018년 7.66B에서 2025년 17.36B로 2.27배, 비이자수익은 32.67B에서 54.87B로 1.68배 자랐다. 두 라인은 각자 절대 배수로만 제시하며 합산하지 않는다. 2018년 비이자수익이 총수익보다 커서 산술적으로 더해지지 않기 때문이다.</desc>
  <rect width="1080" height="520" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">두 줄은 각자 자랐다 — 더하지 않는다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">2018 → 2025 절대 배수 (합산 금지: 2018 비이자 32.67 &gt; 총수익 30.38)</text>

  <!-- 순이자이익 -->
  <text x="270" y="150" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">순이자이익 (은행 줄)</text>
  <rect x="170" y="320" width="80" height="70" fill="#1e3a5f"/>
  <rect x="300" y="195" width="80" height="195" fill="#3b82f6"/>
  <text x="210" y="312" fill="#64748b" font-size="13" text-anchor="middle">7.66</text>
  <text x="340" y="187" fill="#94a3b8" font-size="13" text-anchor="middle">17.36</text>
  <text x="270" y="420" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">2.27배</text>
  <text x="210" y="440" fill="#64748b" font-size="12" text-anchor="middle">2018</text>
  <text x="340" y="440" fill="#64748b" font-size="12" text-anchor="middle">2025</text>

  <!-- 비이자수익 -->
  <text x="780" y="150" fill="#f59e0b" font-size="17" font-weight="700" text-anchor="middle">비이자수익 (통행료성 줄)</text>
  <rect x="680" y="230" width="80" height="160" fill="#7c5b1e"/>
  <rect x="810" y="120" width="80" height="270" fill="#f59e0b"/>
  <text x="720" y="222" fill="#64748b" font-size="13" text-anchor="middle">32.67</text>
  <text x="850" y="112" fill="#94a3b8" font-size="13" text-anchor="middle">54.87</text>
  <text x="780" y="420" fill="#f59e0b" font-size="22" font-weight="700" text-anchor="middle">1.68배</text>
  <text x="720" y="440" fill="#64748b" font-size="12" text-anchor="middle">2018</text>
  <text x="850" y="440" fill="#64748b" font-size="12" text-anchor="middle">2025</text>

  <text x="540" y="485" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">'은행 줄이 통행료 줄보다 빨랐다'는 관찰까지만 — '왜'(대출·금리·회원)는 외부</text>
</svg>
