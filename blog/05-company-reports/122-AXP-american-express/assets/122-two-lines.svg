<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>비자 손익엔 없는 두 줄(순이자이익·대손충당금)이 AXP 손익엔 있다</title>
  <desc>비자는 신용리스크를 발급은행에 넘겨 손익에 순이자이익도 대손충당금도 없다. 아메리칸 익스프레스는 closed-loop로 직접 빌려주고 직접 떼이므로 그 두 줄이 손익에 실재한다.</desc>
  <rect width="1080" height="500" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">손익에 '있는 두 줄'</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">직접 빌려주니 이자가, 직접 떼이니 손실이 — 손익에 새 두 줄이 생긴다</text>

  <!-- line 1 -->
  <rect x="120" y="140" width="840" height="100" rx="10" fill="#11203a"/>
  <text x="150" y="180" fill="#3b82f6" font-size="22" font-weight="700">① 순이자이익</text>
  <text x="150" y="215" fill="#94a3b8" font-size="15">카드회원에 직접 빌려준 돈에서 나오는 이자 (직접 대출)</text>
  <text x="930" y="200" fill="#3b82f6" font-size="20" font-weight="700" text-anchor="end">비자엔 ✘</text>

  <!-- line 2 -->
  <rect x="120" y="260" width="840" height="100" rx="10" fill="#11203a"/>
  <text x="150" y="300" fill="#fbbf24" font-size="22" font-weight="700">② 대손충당금</text>
  <text x="150" y="335" fill="#94a3b8" font-size="15">못 받을 것으로 예상해 미리 쌓는 손실 (직접 떼임)</text>
  <text x="930" y="320" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="end">비자엔 ✘</text>

  <text x="540" y="420" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">이 '두 줄의 실재'가 통행료만 받는 망이 아니라는 검증가능한 증거</text>
  <text x="540" y="455" fill="#64748b" font-size="13" text-anchor="middle">closed-loop = 발급·정산·결제망·신용리스크를 한 회사가 다 쥠 (open-loop 비자는 은행에 분산)</text>
</svg>
