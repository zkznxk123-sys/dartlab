<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업CF는 견고하나 연결 합산치 — '주인 몫 현금'이 아니다</title>
  <desc>LG화학의 연결 영업현금흐름은 손익 부진 속에도 2023~2025 7.54, 7.01, 8.23조로 견고하다. 2025년 영업CF는 영업이익의 692%, 반대로 2022년은 영업이익의 19%로 이익과 현금이 따로 논다. 단 이 영업CF는 자회사 포함 연결 합산치라 주인 몫 현금이 아니다.</desc>
  <rect width="1080" height="500" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">현금이라는 다른 화살표, 같은 함정</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">연결 영업CF(초록) vs 영업이익(파랑) — 따로 논다 (단위 조원)</text>

  <line x1="120" y1="360" x2="980" y2="360" stroke="#1e293b"/>

  <!-- pairs: 2022, 2023, 2024, 2025 -->
  <!-- 2022: OP 3.00, CF 0.57 -->
  <rect x="180" y="210" width="55" height="150" fill="#3b82f6"/><rect x="245" y="332" width="55" height="28" fill="#22c55e"/>
  <text x="240" y="200" fill="#94a3b8" font-size="12" text-anchor="middle">OP 3.00</text>
  <text x="240" y="385" fill="#ef4444" font-size="12" text-anchor="middle">CF=OP의 19%</text>
  <text x="240" y="405" fill="#64748b" font-size="12" text-anchor="middle">2022</text>

  <!-- 2023: OP 2.51, CF 7.54 -->
  <rect x="400" y="234" width="55" height="126" fill="#3b82f6"/><rect x="465" y="183" width="55" height="177" fill="#22c55e"/>
  <text x="490" y="405" fill="#64748b" font-size="12" text-anchor="middle">2023</text>

  <!-- 2024: OP 0.92, CF 7.01 -->
  <rect x="620" y="314" width="55" height="46" fill="#3b82f6"/><rect x="685" y="195" width="55" height="165" fill="#22c55e"/>
  <text x="710" y="405" fill="#64748b" font-size="12" text-anchor="middle">2024</text>

  <!-- 2025: OP 1.19, CF 8.23 -->
  <rect x="840" y="300" width="55" height="60" fill="#3b82f6"/><rect x="905" y="167" width="55" height="193" fill="#22c55e"/>
  <text x="932" y="158" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">8.23</text>
  <text x="867" y="290" fill="#3b82f6" font-size="12" text-anchor="middle">1.19</text>
  <text x="930" y="405" fill="#64748b" font-size="12" text-anchor="middle">2025</text>
  <text x="900" y="430" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">CF=OP의 692%</text>

  <text x="540" y="465" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">단, 이 영업CF는 자회사 포함 연결 합산 — '주인 몫 현금' 아님 (구성 분해 불가)</text>
</svg>
