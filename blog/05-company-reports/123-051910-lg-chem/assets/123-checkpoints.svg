<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>LG화학 — 2026년에 봐야 할 다섯 가지</title>
  <desc>지배주주순익의 방향, 총순익 vs 지배순익 차액의 추이, 연결 OPM의 사이클 위치, 영업CF의 견고함 지속, 자회사 보유율과 NAV 디스카운트.</desc>
  <rect width="1080" height="620" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="90" fill="#64748b" font-size="15" text-anchor="middle">한 손익표에 두 회사가 담기면 영업이익 한 줄로는 누구의 몫도 안 읽힌다</text>

  <g font-size="18">
    <circle cx="90" cy="150" r="22" fill="#3b82f6"/><text x="90" y="157" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">1</text>
    <text x="130" y="146" fill="#f1f5f9" font-weight="700">지배주주순익의 방향</text>
    <text x="130" y="173" fill="#94a3b8" font-size="15">-0.69(24)→-1.82조(25) 적자가 2026에 깊어지나 좁혀지나 (현재 표본 2점)</text>

    <circle cx="90" cy="230" r="22" fill="#3b82f6"/><text x="90" y="237" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">2</text>
    <text x="130" y="226" fill="#f1f5f9" font-weight="700">총순익 vs 지배순익 차액의 추이</text>
    <text x="130" y="253" fill="#94a3b8" font-size="15">+1.21(24)→+0.84조(25) 이미 줄었다 — 차액=비지배+별도 합산 변화까지만</text>

    <circle cx="90" cy="310" r="22" fill="#3b82f6"/><text x="90" y="317" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">3</text>
    <text x="130" y="306" fill="#f1f5f9" font-weight="700">연결 OPM의 사이클 위치</text>
    <text x="130" y="333" fill="#94a3b8" font-size="15">2024 1.9% 바닥→2025 2.6%가 일시 반등인지 회복 시작인지 (4%대 회복=상행)</text>

    <circle cx="90" cy="390" r="22" fill="#3b82f6"/><text x="90" y="397" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">4</text>
    <text x="130" y="386" fill="#f1f5f9" font-weight="700">영업CF의 견고함 지속</text>
    <text x="130" y="413" fill="#94a3b8" font-size="15">2023~25 7~8조대가 2026에도 유지되나 (단 연결 합산치임을 유지)</text>

    <circle cx="90" cy="470" r="22" fill="#3b82f6"/><text x="90" y="477" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">5</text>
    <text x="130" y="466" fill="#f1f5f9" font-weight="700">외부 — 자회사 보유율·NAV 디스카운트</text>
    <text x="130" y="493" fill="#94a3b8" font-size="15">PRS·지분 인하 '시도'가 실제 보유율 변동으로 완결되나 (외부·시점, 오독 금지)</text>
  </g>

  <text x="540" y="570" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">내부가 단언하는 건 '연결-지배 괴리'까지 — 시총·디스카운트는 외부</text>
  <text x="540" y="600" fill="#64748b" font-size="13" text-anchor="middle">dartlab 실측 2026-06-14 · 차액=비지배지분 귀속분까지만, 특정 자회사 환산 금지</text>
</svg>
