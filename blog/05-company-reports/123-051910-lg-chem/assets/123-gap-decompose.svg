<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>차액(총순익 - 지배순익)이 비지배지분 귀속분 — LG엔솔 18.2%분 등치는 산술로 반증</title>
  <desc>2024년 총순익 +0.52조에서 지배순익 -0.69조를 빼면 차액 +1.21조, 2025년 총순익 -0.98조에서 지배순익 -1.82조를 빼면 차액 +0.84조다. 이 차액이 비지배지분 귀속분이다. 단 1.21조를 18.2%로 나누면 6.65조로 자회사 순익 규모상 불가능해, LG엔솔 18.2%분과 등치는 산술로 반증된다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">차액에 이름 붙이기 — 절반만</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">총순익 − 지배순익 = 비지배지분 귀속분 (단위 조원)</text>

  <!-- 2024 -->
  <rect x="120" y="130" width="380" height="150" rx="10" fill="#11203a"/>
  <text x="310" y="165" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">2024</text>
  <text x="150" y="205" fill="#cbd5e1" font-size="16">총순익 +0.52</text>
  <text x="150" y="235" fill="#ef4444" font-size="16">− 지배순익 -0.69</text>
  <text x="150" y="265" fill="#fbbf24" font-size="18" font-weight="700">= 차액 +1.21</text>

  <!-- 2025 -->
  <rect x="580" y="130" width="380" height="150" rx="10" fill="#11203a"/>
  <text x="770" y="165" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">2025</text>
  <text x="610" y="205" fill="#cbd5e1" font-size="16">총순익 -0.98</text>
  <text x="610" y="235" fill="#ef4444" font-size="16">− 지배순익 -1.82</text>
  <text x="610" y="265" fill="#fbbf24" font-size="18" font-weight="700">= 차액 +0.84</text>

  <text x="540" y="340" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">차액 = 비지배지분 귀속분 (정상적 소수지분 연결회계, 분식 아님)</text>

  <!-- 반증 -->
  <rect x="180" y="380" width="720" height="100" rx="10" fill="#2a1518" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="415" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">단, 'LG엔솔 18.2%분'과 등치는 산술로 반증</text>
  <text x="540" y="450" fill="#cbd5e1" font-size="16" text-anchor="middle">1.21조 ÷ 0.182 ≈ 6.65조 → 자회사 순익 규모상 불가능</text>

  <text x="540" y="515" fill="#64748b" font-size="13" text-anchor="middle">차액엔 다수 종속회사 비지배지분 + 본업(별도) 손익이 섞임 — 특정 자회사 환산 금지</text>
</svg>
