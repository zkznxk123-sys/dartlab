<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>상장 자회사 손익이 100% 연결로 들어오고, 비지배지분만큼이 빠져 '주인 몫'이 된다</title>
  <desc>약 81.84% 보유 자회사는 연결 손익에 100% 잡히고, 나머지 약 18.2%가 비지배지분으로 분리된다. 차액이 양으로 나오는 회계적 자리이며, 차액이 생기는 한 자리일 뿐 유일한 자리는 아니다.</desc>
  <rect width="1080" height="500" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">한 손익표에 자회사가 통째로 들어온다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">물적분할(2020말)→2022.1 LG에너지솔루션 IPO·약 81.84% 보유 (외부 인용)</text>

  <!-- consolidated 100% -->
  <rect x="150" y="150" width="780" height="60" rx="6" fill="#3b82f6"/>
  <text x="540" y="188" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">자회사 손익 100% → 연결 손익에 인식</text>

  <!-- split -->
  <text x="540" y="255" fill="#64748b" font-size="30" text-anchor="middle">↓</text>

  <rect x="150" y="280" width="638" height="60" rx="6" fill="#22c55e"/>
  <text x="469" y="318" fill="#0a0e1a" font-size="17" font-weight="700" text-anchor="middle">지배주주 몫 (약 81.84%) = '주인 몫'</text>
  <rect x="798" y="280" width="132" height="60" rx="6" fill="#f59e0b"/>
  <text x="864" y="312" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">비지배</text>
  <text x="864" y="330" fill="#0a0e1a" font-size="13" text-anchor="middle">~18.2%</text>

  <text x="540" y="400" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">형태는 '괴리를 드러내는 구조'를 만들었을 뿐, 적자를 만든 건 아니다</text>
  <text x="540" y="438" fill="#94a3b8" font-size="15" text-anchor="middle">2025 적자는 영업이익 흑자(+1.19조) 아래 영업외·세금 단계 (내부 분해 불가)</text>
  <text x="540" y="472" fill="#64748b" font-size="13" text-anchor="middle">'분할이 회사를 망쳤다'는 비약 — 다운사이클·캐즘은 외부 정성 배경</text>
</svg>
