<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>연결 OPM 사이클 — 2021 11.8% 정점 이전에 2018→2021 +123% 상승이 선행했다</title>
  <desc>LG화학의 연결 영업이익률은 2018 8.0%, 2019 3.1%, 2020 6.0%, 2021 11.8% 정점, 2022 5.8%, 2023 4.5%, 2024 1.9%, 2025 2.6%로 진폭이 큰 사이클을 그린다. 추세적 쇠퇴가 아니라 사이클이다.</desc>
  <rect width="1080" height="520" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">추세가 아니라 진폭 큰 사이클</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">연결 OPM — 2018→2021 +123% 상승이 선행한 뒤 내려왔다</text>

  <line x1="110" y1="400" x2="980" y2="400" stroke="#1e293b"/>
  <text x="95" y="160" fill="#475569" font-size="12" text-anchor="end">12%</text>
  <text x="95" y="400" fill="#475569" font-size="12" text-anchor="end">0%</text>

  <!-- OPM: 8.0,3.1,6.0,11.8,5.8,4.5,1.9,2.6 ; y = 400 - opm*20 -->
  <polyline points="150,240 268,338 386,280 504,164 622,284 740,310 858,362 976,348" fill="none" stroke="#fbbf24" stroke-width="3.5"/>
  <g fill="#fbbf24">
    <circle cx="150" cy="240" r="5"/><circle cx="268" cy="338" r="5"/><circle cx="386" cy="280" r="5"/>
    <circle cx="504" cy="164" r="8"/><circle cx="622" cy="284" r="5"/><circle cx="740" cy="310" r="5"/>
    <circle cx="858" cy="362" r="5"/><circle cx="976" cy="348" r="6"/>
  </g>
  <text x="504" y="150" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">11.8% 정점</text>
  <text x="150" y="226" fill="#94a3b8" font-size="12" text-anchor="middle">8.0%</text>
  <text x="858" y="380" fill="#ef4444" font-size="12" text-anchor="middle">1.9%</text>
  <text x="976" y="334" fill="#94a3b8" font-size="12" text-anchor="middle">2.6%</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="150" y="420">2018</text><text x="268" y="420">2019</text><text x="386" y="420">2020</text><text x="504" y="420">2021</text>
    <text x="622" y="420">2022</text><text x="740" y="420">2023</text><text x="858" y="420">2024</text><text x="976" y="420">2025</text>
  </g>

  <text x="540" y="475" fill="#94a3b8" font-size="15" text-anchor="middle">영업이익 절대액 5.02조 → 1.19조 (-76%) · 단 OPM %p와는 다른 척도</text>
  <text x="540" y="503" fill="#64748b" font-size="13" text-anchor="middle">무엇이 진폭을 만들었는지(석화 다운사이클/배터리 캐즘)는 이 한 줄로 못 가른다</text>
</svg>
