<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>연결 영업이익은 오르고 지배주주순익은 더 깊이 꺼졌다 (2024 → 2025)</title>
  <desc>LG화학의 2024에서 2025로 연결 영업이익은 0.92조에서 1.19조로 올랐으나, 지배주주순익은 -0.69조에서 -1.82조로 적자 규모가 약 2.6배 깊어졌다. 한 손익표에서 두 화살표가 정반대로 갈라진다.</desc>
  <rect width="1080" height="520" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">한 해, 두 화살표가 반대로 갈라졌다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">2024 → 2025 · 단위 조원</text>

  <line x1="120" y1="290" x2="960" y2="290" stroke="#334155" stroke-width="1.5"/>
  <text x="105" y="295" fill="#475569" font-size="12" text-anchor="end">0</text>

  <!-- 영업이익 up -->
  <text x="320" y="135" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">연결 영업이익 ↑</text>
  <polyline points="230,250 430,225" fill="none" stroke="#3b82f6" stroke-width="5"/>
  <circle cx="230" cy="250" r="8" fill="#3b82f6"/><circle cx="430" cy="225" r="10" fill="#3b82f6"/>
  <text x="230" y="235" fill="#94a3b8" font-size="14" text-anchor="middle">0.92</text>
  <text x="430" y="210" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">1.19</text>

  <!-- 지배순익 down -->
  <text x="740" y="135" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">지배주주순익 ↓</text>
  <polyline points="650,355 850,440" fill="none" stroke="#ef4444" stroke-width="5"/>
  <circle cx="650" cy="355" r="8" fill="#ef4444"/><circle cx="850" cy="440" r="10" fill="#ef4444"/>
  <text x="650" y="345" fill="#94a3b8" font-size="14" text-anchor="middle">-0.69</text>
  <text x="850" y="465" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">-1.82</text>

  <g fill="#64748b" font-size="13" text-anchor="middle"><text x="230" y="290" dy="18">2024</text><text x="430" y="290" dy="18">2025</text><text x="650" y="290" dy="-8">2024</text><text x="850" y="290" dy="-8">2025</text></g>

  <text x="540" y="500" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">영업이익 한 줄로는 '주인 몫'을 읽을 수 없다 (적자 약 2.6배 악화)</text>
</svg>
