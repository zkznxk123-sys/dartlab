<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2021년 손익은 -0.80조 적자인데 영업현금흐름은 +0.76조 — 부호가 어긋난다</title>
  <desc>적자 정점 2021년 HD현대중공업의 영업이익은 -0.80조인데 영업현금흐름은 +0.76조로 부호가 어긋났다. 5년 누적으로도 영업CF 7.39조가 영업이익 1.84조를 웃돌아 갭이 +5.55조다. 손익과 현금이 서로 다른 시각을 가리킨다.</desc>
  <rect width="1080" height="500" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">손익은 적자인데 현금은 들어왔다 (2021)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">같은 한 해, 부호가 어긋난다 — 인식 시점이 따로 논다</text>

  <line x1="120" y1="250" x2="700" y2="250" stroke="#334155" stroke-width="1.5"/>
  <text x="105" y="255" fill="#475569" font-size="12" text-anchor="end">0</text>

  <rect x="220" y="250" width="120" height="120" fill="#ef4444"/>
  <text x="280" y="240" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">영업이익</text>
  <text x="280" y="395" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">-0.80조</text>

  <rect x="480" y="136" width="120" height="114" fill="#22c55e"/>
  <text x="540" y="126" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">영업현금흐름</text>
  <text x="540" y="160" fill="#0a0e1a" font-size="18" font-weight="700" text-anchor="middle">+0.76조</text>

  <!-- cumulative gap -->
  <rect x="760" y="120" width="240" height="260" rx="10" fill="#11203a"/>
  <text x="880" y="160" fill="#94a3b8" font-size="15" text-anchor="middle">5년 누적</text>
  <text x="880" y="200" fill="#22c55e" font-size="16">영업CF 7.39조</text>
  <text x="880" y="232" fill="#3b82f6" font-size="16">영업이익 1.84조</text>
  <line x1="790" y1="250" x2="970" y2="250" stroke="#334155"/>
  <text x="880" y="290" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">갭 +5.55조</text>

  <text x="540" y="445" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">단, '선수금 덕분'으로 단정 금지 — 감가상각·운전자본·충당금 경로 가능(분해 불가)</text>
  <text x="540" y="478" fill="#64748b" font-size="13" text-anchor="middle">안전한 진술은 하나 — '손익과 현금의 부호가 어긋났다'</text>
</svg>
