<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>HD현대중공업 — 2026년에 봐야 할 다섯 가지</title>
  <desc>OPM 12개월 추세, NPM-OPM 격차의 향방, 영업CF의 부호 정합 지속, HD현대미포 합병 효과의 분해, 수주잔고에서 매출로의 도착 타이밍.</desc>
  <rect width="1080" height="620" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="90" fill="#64748b" font-size="15" text-anchor="middle">장부는 지금이 아니라 2~3년 전 결정이 도착한 시각을 찍는다</text>

  <g font-size="18">
    <circle cx="90" cy="150" r="22" fill="#3b82f6"/><text x="90" y="157" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">1</text>
    <text x="130" y="146" fill="#f1f5f9" font-weight="700">OPM 12개월 추세</text>
    <text x="130" y="173" fill="#94a3b8" font-size="15">2025 11.6%가 한 해 점프(한계마진 약 43%)인지, 2026에도 두 자릿수로 추세가 되는지</text>

    <circle cx="90" cy="230" r="22" fill="#3b82f6"/><text x="90" y="237" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">2</text>
    <text x="130" y="226" fill="#f1f5f9" font-weight="700">NPM-OPM 격차의 향방</text>
    <text x="130" y="253" fill="#94a3b8" font-size="15">OPM 11.6% vs NPM 약 8.1%(갭 약 -0.62조)가 금융·세무에서 벌어지나 좁혀지나</text>

    <circle cx="90" cy="310" r="22" fill="#3b82f6"/><text x="90" y="317" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">3</text>
    <text x="130" y="306" fill="#f1f5f9" font-weight="700">영업CF의 부호 정합 지속</text>
    <text x="130" y="333" fill="#94a3b8" font-size="15">2024~25 급증(2.88→3.51조)이 2026에도 영업이익과 같은 부호로 따라오나 (누적 갭)</text>

    <circle cx="90" cy="390" r="22" fill="#3b82f6"/><text x="90" y="397" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">4</text>
    <text x="130" y="386" fill="#f1f5f9" font-weight="700">HD현대미포 합병 효과의 분해</text>
    <text x="130" y="413" fill="#94a3b8" font-size="15">2025.12 흡수합병(외부) 후 첫 온전한 연도에 한계마진 43% 동일체 전제가 유지되나</text>

    <circle cx="90" cy="470" r="22" fill="#3b82f6"/><text x="90" y="477" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">5</text>
    <text x="130" y="466" fill="#f1f5f9" font-weight="700">수주잔고 → 매출 도착 타이밍(외부)</text>
    <text x="130" y="493" fill="#94a3b8" font-size="15">약 82조(외부·그룹 합산) 잔고가 매출로 도착하는 속도 — 예측 아닌 '도착 타이밍'만</text>
  </g>

  <text x="540" y="570" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">11.6%도 -9.6%도 둘 다 시차의 산물이다</text>
  <text x="540" y="600" fill="#64748b" font-size="13" text-anchor="middle">dartlab 실측 2026-06-14 · 내부=시차 존재까지, 외부(후판·수주잔고)는 정합/양립까지만</text>
</svg>
