<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>간판은 조선이지만 사업부는 조선 73·엔진 22·해양 4% (외부 인용)</title>
  <desc>HD현대중공업의 사업부는 외부 자료 기준 대략 조선 약 73%, 엔진기계 약 22%, 해양 약 4%로 나뉜다. 힘센 중속엔진은 세계 1위급 점유로, 후판·수주 사이클과 다른 박자를 가진 사업부일 수 있다. 전부 외부 인용이며 내부 수치로는 분리 확인 불가.</desc>
  <rect width="1080" height="460" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">간판 뒤의 또 하나의 사업부 (외부 인용)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">한 장부에 최소 두 박자가 겹쳐 있다 — 내부로는 분리 확인 불가</text>

  <!-- stacked bar -->
  <rect x="120" y="160" width="613" height="70" fill="#3b82f6"/>
  <text x="426" y="203" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">조선 약 73%</text>
  <rect x="733" y="160" width="185" height="70" fill="#f59e0b"/>
  <text x="825" y="203" fill="#0a0e1a" font-size="15" font-weight="700" text-anchor="middle">엔진 ~22%</text>
  <rect x="918" y="160" width="42" height="70" fill="#64748b"/>
  <text x="939" y="250" fill="#64748b" font-size="12" text-anchor="middle">해양 ~4%</text>

  <text x="825" y="300" fill="#f59e0b" font-size="16" font-weight="700" text-anchor="middle">힘센 중속엔진 = 세계 1위급(외부)</text>
  <text x="825" y="328" fill="#94a3b8" font-size="14" text-anchor="middle">후판·수주와 다른 사이클 박자</text>

  <text x="540" y="390" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">단, 영업CF 개선(0.76→3.51조)을 '엔진 덕'으로 귀속하면 비약</text>
  <text x="540" y="425" fill="#64748b" font-size="13" text-anchor="middle">외부 정성 서술을 내부 현금흐름에 잘못 귀속 — 5줄은 연결 합산뿐</text>
</svg>
