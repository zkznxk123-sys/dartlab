<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>OPM 레벨은 -9.6%에서 11.6%로 매년 상승, 단 개선 폭은 마지막 해 +6.7%p로 다시 커졌다</title>
  <desc>HD현대중공업의 영업이익률은 2021 -9.6%, 2022 -3.2%, 2023 1.5%, 2024 4.9%, 2025 11.6%로 레벨이 매년 올랐으나 개선 폭(+6.4, +4.7, +3.4, +6.7%p)은 단조가 아니다. 2024→2025 늘어난 매출 1조당 영업이익 약 0.43조가 더해졌다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">시차가 양으로 도착했다 (OPM)</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">레벨은 매년 상승, 단 개선 폭은 일정치 않음 (마지막 해 다시 커짐)</text>

  <line x1="120" y1="330" x2="980" y2="330" stroke="#334155" stroke-width="1.5"/>
  <text x="105" y="335" fill="#475569" font-size="12" text-anchor="end">0%</text>

  <!-- OPM line: -9.6,-3.2,1.5,4.9,11.6 ; y = 330 - v*11 -->
  <polyline points="180,436 380,365 580,314 780,276 980,202" fill="none" stroke="#fbbf24" stroke-width="3.5"/>
  <g fill="#fbbf24">
    <circle cx="180" cy="436" r="6"/><circle cx="380" cy="365" r="6"/><circle cx="580" cy="314" r="6"/><circle cx="780" cy="276" r="6"/><circle cx="980" cy="202" r="8"/>
  </g>
  <text x="180" y="455" fill="#ef4444" font-size="13" text-anchor="middle">-9.6%</text>
  <text x="980" y="188" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">11.6%</text>

  <!-- improvement deltas -->
  <g fill="#94a3b8" font-size="13" text-anchor="middle">
    <text x="280" y="385">+6.4%p</text><text x="480" y="330">+4.7%p</text><text x="680" y="285">+3.4%p</text><text x="880" y="225" fill="#22c55e" font-weight="700">+6.7%p</text>
  </g>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="180" y="490">2021</text><text x="380" y="490">2022</text><text x="580" y="490">2023</text><text x="780" y="490">2024</text><text x="980" y="490">2025</text>
  </g>

  <text x="540" y="522" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">2024→2025 늘어난 매출 1조당 영업이익 약 0.43조 (한계 영업이익률 약 43%, 단일 연도 1점)</text>
</svg>
