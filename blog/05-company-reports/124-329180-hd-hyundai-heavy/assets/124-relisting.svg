<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>5줄이 2021부터인 건 재상장(분할 이력)의 흔적 — 2021=바닥/출발점이 아니다</title>
  <desc>HD현대중공업의 연결 데이터가 2021년부터 시작하는 것은 2021년 9월 재상장(분할 이력) 때문이지 회사가 그때 바닥을 쳤기 때문이 아니다. 5년 창은 한 건조 사이클의 전체가 아니라 잘려나간 더 긴 사이클의 한 토막일 수 있다.</desc>
  <rect width="1080" height="460" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">데이터의 끝 — '2021=바닥'은 착시일 수 있다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">2021년 9월 재상장(분할 이력)으로 그 이전 단독 데이터가 없다</text>

  <!-- timeline -->
  <line x1="120" y1="240" x2="960" y2="240" stroke="#334155" stroke-width="2"/>
  <!-- pre-2021 dashed (unknown) -->
  <line x1="120" y1="240" x2="430" y2="240" stroke="#475569" stroke-width="6" stroke-dasharray="10 10"/>
  <text x="275" y="215" fill="#64748b" font-size="15" text-anchor="middle">데이터 없음 (분할 이전)</text>
  <text x="275" y="290" fill="#475569" font-size="13" text-anchor="middle">더 긴 건조 사이클의 잘려나간 부분</text>

  <!-- 2021 marker -->
  <circle cx="430" cy="240" r="12" fill="#fbbf24"/>
  <text x="430" y="200" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">2021.9 재상장</text>

  <!-- post -->
  <line x1="430" y1="240" x2="960" y2="240" stroke="#22c55e" stroke-width="6"/>
  <text x="695" y="215" fill="#22c55e" font-size="15" text-anchor="middle">우리가 보는 5년 창 (2021~2025)</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="430" y="270">2021</text><text x="960" y="270">2025</text>
  </g>

  <text x="540" y="370" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">결함이 아니라 분할 이력의 흔적 — '회사가 새로 망했다 살아났다'가 아니다</text>
  <text x="540" y="410" fill="#94a3b8" font-size="15" text-anchor="middle">5년 창은 한 사이클의 전체가 아니라 한 토막일 수 있다 (가치판단 얹지 않음)</text>
</svg>
