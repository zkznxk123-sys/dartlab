<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 5년 내내 올랐는데 영업이익 부호는 2년 늦게 2023년에야 흑자로 뒤집혔다</title>
  <desc>HD현대중공업의 매출은 2021부터 2025까지 8.31, 9.05, 11.96, 14.49, 17.58조로 단조 증가했으나 영업이익은 2021 -0.80, 2022 -0.29로 적자였다가 2023년 +0.18조에야 흑자로 뒤집혔다. 흑전한 2023년 매출은 2021보다 약 44% 컸다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="50" fill="#f1f5f9" font-size="27" font-weight="700" text-anchor="middle">매출은 매년 올랐는데, 흑자는 2년 늦게 왔다</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">매출 단조 증가(파랑 라인) vs 영업이익 부호(막대) — 단위 조원</text>

  <line x1="110" y1="370" x2="980" y2="370" stroke="#334155" stroke-width="1.5"/>
  <text x="95" y="375" fill="#475569" font-size="12" text-anchor="end">0</text>

  <!-- 매출 line: 8.31..17.58, scale y=370 - v*16 -->
  <polyline points="170,237 370,225 570,179 770,138 970,89" fill="none" stroke="#22c55e" stroke-width="3.5"/>
  <g fill="#22c55e"><circle cx="170" cy="237" r="6"/><circle cx="370" cy="225" r="6"/><circle cx="570" cy="179" r="6"/><circle cx="770" cy="138" r="6"/><circle cx="970" cy="89" r="7"/></g>
  <text x="170" y="223" fill="#94a3b8" font-size="12" text-anchor="middle">8.31</text>
  <text x="970" y="76" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">17.58</text>

  <!-- 영업이익 bars -->
  <rect x="145" y="370" width="50" height="64" fill="#ef4444"/>
  <rect x="345" y="370" width="50" height="23" fill="#ef4444"/>
  <rect x="545" y="356" width="50" height="14" fill="#3b82f6"/>
  <rect x="745" y="313" width="50" height="57" fill="#3b82f6"/>
  <rect x="945" y="207" width="50" height="163" fill="#3b82f6"/>
  <text x="170" y="452" fill="#ef4444" font-size="12" text-anchor="middle">-0.80</text>
  <text x="370" y="412" fill="#ef4444" font-size="12" text-anchor="middle">-0.29</text>
  <text x="570" y="348" fill="#3b82f6" font-size="12" text-anchor="middle">+0.18</text>
  <text x="970" y="198" fill="#3b82f6" font-size="13" font-weight="700" text-anchor="middle">+2.04</text>

  <text x="570" y="395" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">↑ 2023 흑전</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="170" y="475">2021</text><text x="370" y="475">2022</text><text x="570" y="475">2023</text><text x="770" y="475">2024</text><text x="970" y="475">2025</text>
  </g>

  <text x="540" y="515" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">흑전 시점 매출(11.96조)은 적자 2021보다 약 44% 컸다 — 이익 부호 ≠ 매출 크기</text>
</svg>
