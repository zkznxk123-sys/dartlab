<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>두 골절은 현금의 흔적까지 정반대였다</title>
  <desc>2024년 골절은 순이익이 급락해도 현금은 덜 따라간 비현금성(OCF/순이익 1.30→1.68 상승, OCF/영업이익 0.90→0.75 하락). 2025년 골절은 영업CF가 영업이익과 함께 빠짐(OCF/영업이익 1.04). 같은 회사가 2년 연속 다른 층에서 다른 현금 서명을 남겼다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">두 골절, 두 개의 현금 서명</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">현금이 회계이익을 따라갔는지 — 두 해가 정반대 (dartlab 연결)</text>

  <!-- 2024 panel -->
  <rect x="70" y="120" width="450" height="340" rx="12" fill="#11161f" stroke="#3b82f6" stroke-width="1.6"/>
  <text x="295" y="158" fill="#93c5fd" font-size="19" font-weight="700" text-anchor="middle">2024 — 영업선 아래</text>
  <text x="295" y="190" fill="#94a3b8" font-size="14" text-anchor="middle">순이익 −35.7%인데 현금은 덜 따라감</text>
  <text x="120" y="250" fill="#cbd5e1" font-size="16">OCF / 순이익</text>
  <text x="470" y="250" fill="#22c55e" font-size="18" font-weight="700" text-anchor="end">1.30 → 1.68 ↑</text>
  <text x="120" y="300" fill="#cbd5e1" font-size="16">OCF / 영업이익</text>
  <text x="470" y="300" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="end">0.90 → 0.75 ↓</text>
  <text x="295" y="370" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">= 비현금성 타격</text>
  <text x="295" y="398" fill="#64748b" font-size="13" text-anchor="middle">현금이 회계이익보다 덜 흔들림</text>
  <text x="295" y="430" fill="#475569" font-size="12" text-anchor="middle">[외부: 브라질 매각 손실 대부분 비현금]</text>

  <!-- 2025 panel -->
  <rect x="560" y="120" width="450" height="340" rx="12" fill="#11161f" stroke="#ef4444" stroke-width="1.6"/>
  <text x="785" y="158" fill="#fca5a5" font-size="19" font-weight="700" text-anchor="middle">2025 — 영업선 자체</text>
  <text x="785" y="190" fill="#94a3b8" font-size="14" text-anchor="middle">영업CF가 영업이익과 함께 빠짐</text>
  <text x="610" y="250" fill="#cbd5e1" font-size="16">영업이익</text>
  <text x="960" y="250" fill="#ef4444" font-size="18" font-weight="700" text-anchor="end">−41.3%</text>
  <text x="610" y="300" fill="#cbd5e1" font-size="16">영업CF</text>
  <text x="960" y="300" fill="#ef4444" font-size="18" font-weight="700" text-anchor="end">−18.6%</text>
  <text x="610" y="345" fill="#cbd5e1" font-size="16">OCF / 영업이익</text>
  <text x="960" y="345" fill="#94a3b8" font-size="18" font-weight="700" text-anchor="end">1.04</text>
  <text x="785" y="398" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">= 현금 동반 (비율은 OI가</text>
  <text x="785" y="420" fill="#64748b" font-size="13" text-anchor="middle">더 깊이 빠진 효과, 좋아진 게 아님)</text>

  <text x="540" y="500" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">균열의 무게보다 균열의 위치 — 그리고 그 현금 흔적이 더 많은 걸 말한다</text>
</svg>
