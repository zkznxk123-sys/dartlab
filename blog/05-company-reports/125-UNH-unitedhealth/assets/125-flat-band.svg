<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 +84.8%로 거의 두 배인데 영업이익률 띠는 8%대에서 두꺼워지지 않았다</title>
  <desc>2019~2025 매출은 242.2B에서 447.6B로 +84.8% 상승. 같은 기간 영업이익률(OPM)은 8.07~8.77% 좁은 박스에 머물다 2025년 4.24%로 이탈. 외형과 마진율이 따로 움직인다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">매출은 거의 두 배, 영업이익률은 8%대 박스</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">외형(매출)과 마진율(OPM)이 따로 움직인다 — 2019→2025, dartlab 연결</text>

  <!-- 8% band -->
  <rect x="120" y="232" width="700" height="40" fill="#1e293b" opacity="0.55"/>
  <text x="128" y="226" fill="#475569" font-size="12">OPM 8%대 박스 (2019~2024, 폭 0.70%p)</text>

  <!-- revenue line (rising) -->
  <polyline points="120,408 263,392 407,360 550,322 693,272 837,242 980,190" fill="none" stroke="#22c55e" stroke-width="3"/>
  <circle cx="980" cy="190" r="5" fill="#22c55e"/>
  <text x="120" y="430" fill="#22c55e" font-size="13">매출 242.2B</text>
  <text x="930" y="178" fill="#22c55e" font-size="14" font-weight="700">447.6B (+84.8%)</text>

  <!-- OPM line in band then drop -->
  <polyline points="120,256 263,244 407,252 550,243 693,245 837,258" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <polyline points="837,258 980,360" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="2 0"/>
  <circle cx="980" cy="360" r="5" fill="#ef4444"/>
  <text x="610" y="305" fill="#fbbf24" font-size="13" font-weight="700">OPM 8.1~8.8% (잠김)</text>
  <text x="905" y="385" fill="#ef4444" font-size="14" font-weight="700">4.24%</text>

  <!-- x labels -->
  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="120" y="460">2019</text><text x="263" y="460">2020</text><text x="407" y="460">2021</text>
    <text x="550" y="460">2022</text><text x="693" y="460">2023</text><text x="837" y="460">2024</text><text x="980" y="460">2025</text>
  </g>

  <text x="540" y="505" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">몸집을 두 배 키워도 마진 띠는 두꺼워지지 않았다 — 늘어난 매출이 통과하는 비용이라는 관찰과 정합</text>
</svg>
