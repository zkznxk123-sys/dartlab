<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>첫 골절(2024)은 영업선 아래 — 영업이익은 평탄한데 순이익만 반토막</title>
  <desc>2024년 영업이익은 32.36B에서 32.29B로 달러 평탄(OPM 8.71→8.07%)인데 순이익은 22.38B에서 14.40B로 -35.7% 급락. 영업이익에서 순이익으로 내려오는 OI-NI 간극이 9.98B에서 17.89B로 최대. 균열은 영업선 아래에서 났다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2024 — 영업선은 평탄, 그 아래에서 부러졌다</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업이익 −0.2% vs 순이익 −35.7% — 골절선은 영업이익 '아래'</text>

  <!-- operating income flat line -->
  <line x1="150" y1="170" x2="930" y2="174" stroke="#3b82f6" stroke-width="4"/>
  <circle cx="150" cy="170" r="5" fill="#3b82f6"/><circle cx="930" cy="174" r="5" fill="#3b82f6"/>
  <text x="150" y="155" fill="#3b82f6" font-size="14" font-weight="700">영업이익 32.36B</text>
  <text x="820" y="160" fill="#3b82f6" font-size="14" font-weight="700">32.29B (평탄)</text>

  <!-- the gap zone (below operating line) -->
  <rect x="150" y="180" width="780" height="180" fill="#7f1d1d" opacity="0.18"/>
  <text x="540" y="240" fill="#fca5a5" font-size="15" text-anchor="middle">— 영업선 아래 —</text>
  <text x="540" y="266" fill="#94a3b8" font-size="13" text-anchor="middle">이자·세금·일회성(브라질 매각 −71억$ 비현금·사이버공격 −23~24.5억$) [외부 인용]</text>

  <!-- net income dropping line -->
  <line x1="150" y1="300" x2="930" y2="368" stroke="#ef4444" stroke-width="4"/>
  <circle cx="150" cy="300" r="5" fill="#ef4444"/><circle cx="930" cy="368" r="5" fill="#ef4444"/>
  <text x="150" y="320" fill="#ef4444" font-size="14" font-weight="700">순이익 22.38B</text>
  <text x="800" y="392" fill="#ef4444" font-size="14" font-weight="700">14.40B (−35.7%)</text>

  <!-- gap labels -->
  <line x1="200" y1="174" x2="200" y2="307" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="208" y="250" fill="#64748b" font-size="12">간극 9.98B</text>
  <line x1="900" y1="174" x2="900" y2="362" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="700" y="430" fill="#fbbf24" font-size="13" font-weight="700">OI–NI 간극 17.89B (시리즈 최대)</text>

  <text x="540" y="500" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">OPM(8%대)은 지켰는데 NPM만 6.02→3.60%로 반토막 — 비현금·일회성의 자리</text>
</svg>
