<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>두 번째 골절(2025)은 영업선 자체 — OPM이 6년 박스를 처음 뚫고 반토막</title>
  <desc>2025년 영업이익이 32.29B에서 18.96B로 -41.3% 급락하며 OPM이 8.07%에서 4.24%로 6년 박스를 처음 이탈(×0.525). 분기 영업이익은 9.12→5.15→4.32→0.38B로 점진 붕괴해 4분기 사실상 손익분기.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2025 — 띠 자체가 찢어졌다</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">OPM 8.07% → 4.24% (×0.525) — 6년 박스를 처음 이탈</text>

  <!-- 8% box band -->
  <rect x="120" y="150" width="600" height="42" fill="#1e293b" opacity="0.55"/>
  <text x="128" y="143" fill="#475569" font-size="12">8%대 박스 (2019~2024)</text>
  <polyline points="120,176 240,168 360,174 480,167 600,172 720,180" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <polyline points="720,180 840,300 960,380" fill="none" stroke="#ef4444" stroke-width="3.5"/>
  <circle cx="960" cy="380" r="6" fill="#ef4444"/>
  <text x="880" y="405" fill="#ef4444" font-size="15" font-weight="700">OPM 4.24%</text>

  <!-- quarterly collapse mini panel -->
  <text x="150" y="445" fill="#94a3b8" font-size="14" font-weight="700">2025 분기 영업이익 — 해를 따라 점진 붕괴 ($B)</text>
  <g>
    <rect x="150" y="455" width="120" height="50" rx="4" fill="#1e3a5f"/><text x="210" y="486" fill="#93c5fd" font-size="15" font-weight="700" text-anchor="middle">Q1 9.12</text>
    <rect x="285" y="465" width="120" height="40" rx="4" fill="#334155"/><text x="345" y="491" fill="#cbd5e1" font-size="15" font-weight="700" text-anchor="middle">Q2 5.15</text>
    <rect x="420" y="470" width="120" height="35" rx="4" fill="#475569"/><text x="480" y="493" fill="#cbd5e1" font-size="15" font-weight="700" text-anchor="middle">Q3 4.32</text>
    <rect x="555" y="497" width="120" height="8" rx="2" fill="#7f1d1d"/><text x="615" y="492" fill="#fca5a5" font-size="15" font-weight="700" text-anchor="middle">Q4 0.38</text>
  </g>
  <text x="745" y="492" fill="#fca5a5" font-size="14">→ 4분기 사실상 손익분기</text>

  <text x="540" y="345" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">2024가 '영업선 아래'였다면, 2025는 통과하는 돈 대비 자기 몫의 폭이 깨진 '영업선 자체'</text>
</svg>
