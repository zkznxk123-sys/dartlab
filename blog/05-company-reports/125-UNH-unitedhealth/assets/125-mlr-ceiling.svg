<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>받은 보험료의 8할 이상은 의료비로 통과한다 — 남는 영업 마진은 처음부터 얇다</title>
  <desc>미국 ACA는 보험료의 80~85%를 의료비로 쓰도록 강제(MLR 규제). UNH MLR 2023년 83.2%. 행정비·이익을 합쳐 15~20% 안에서만 움직이는 구조라 영업이익률이 8%대로 얇다. MLR은 외부 인용, OPM은 별개 비율.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">받은 보험료 1달러는 어디로 가나</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">MLR 규제·수치는 외부 인용 / OPM 8%대는 dartlab 연결 (별개 비율)</text>

  <!-- the 100% premium bar -->
  <text x="150" y="135" fill="#94a3b8" font-size="16" font-weight="700">보험료 100%</text>
  <rect x="150" y="150" width="780" height="90" rx="6" fill="#11161f" stroke="#334155" stroke-width="1.5"/>

  <!-- medical cost ~85% -->
  <rect x="150" y="150" width="650" height="90" rx="6" fill="#7f1d1d" opacity="0.7"/>
  <text x="475" y="200" fill="#fca5a5" font-size="18" font-weight="700" text-anchor="middle">의료비 (MLR) 약 83~85% [외부 인용]</text>

  <!-- admin + profit ~15-20% -->
  <rect x="800" y="150" width="130" height="90" rx="6" fill="#1e3a5f" opacity="0.85"/>
  <text x="865" y="195" fill="#93c5fd" font-size="13" text-anchor="middle">행정비</text>
  <text x="865" y="213" fill="#93c5fd" font-size="13" text-anchor="middle">+이익 15~20%</text>

  <!-- arrow down to OPM -->
  <text x="540" y="300" fill="#64748b" font-size="14" text-anchor="middle">↓ 그 좁은 칸 안에서 다시 영업이익만 떼면</text>

  <rect x="350" y="330" width="380" height="70" rx="8" fill="#0f1a17" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="540" y="362" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">연결 영업이익률(OPM) 8%대</text>
  <text x="540" y="386" fill="#94a3b8" font-size="13" text-anchor="middle">2019~2024: 8.07~8.77% (dartlab 연결)</text>

  <text x="540" y="455" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">받은 돈 대부분이 의료비로 '통과'하니, 자기 몫의 폭은 처음부터 8%대로 그어져 있다</text>
  <text x="540" y="486" fill="#475569" font-size="13" text-anchor="middle">※ MLR(분모=보험료)과 OPM(분모=매출)은 별개 비율 — 정합/양립까지만</text>
</svg>
