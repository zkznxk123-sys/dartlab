<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>정점 이익의 해(2024)에 OCF/영업이익이 0.92로 가장 약했다</title>
  <desc>영업현금흐름/영업이익(OCF/OP): 2020 1.39, 2021 1.05, 2022 0.98, 2023 0.99, 2024 0.92(정점·최약), 2025 1.05. 영업이익이 가장 클 때 현금전환이 가장 낮았다. '항상 1.0 넘었다'는 거짓.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">정점 이익일수록 현금전환이 약했다</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">OCF / 영업이익 — 정점(2024)에 0.92로 최저 (dartlab 연결)</text>

  <!-- 1.0 reference line -->
  <line x1="120" y1="250" x2="980" y2="250" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="990" y="255" fill="#64748b" font-size="13">1.0</text>

  <!-- OCF/OP line: map 0.9->300, 1.4->150 -> y = 300 - (v-0.9)/0.5*150 -->
  <polyline points="160,182 320,295 480,304 640,301 800,310 960,295" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <g font-size="15" font-weight="700" text-anchor="middle">
    <circle cx="160" cy="182" r="5" fill="#22c55e"/><text x="160" y="167" fill="#22c55e">1.39</text>
    <circle cx="320" cy="295" r="5" fill="#94a3b8"/><text x="320" y="280" fill="#94a3b8">1.05</text>
    <circle cx="480" cy="304" r="5" fill="#94a3b8"/><text x="480" y="330" fill="#94a3b8">0.98</text>
    <circle cx="640" cy="301" r="5" fill="#94a3b8"/><text x="640" y="286" fill="#94a3b8">0.99</text>
    <circle cx="800" cy="310" r="7" fill="#ef4444"/><text x="800" y="336" fill="#ef4444">0.92 ★</text>
    <circle cx="960" cy="295" r="5" fill="#94a3b8"/><text x="960" y="280" fill="#94a3b8">1.05</text>
  </g>
  <text x="800" y="360" fill="#ef4444" font-size="13" text-anchor="middle">영업이익 정점</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="160" y="400">2020</text><text x="320" y="400">2021</text><text x="480" y="400">2022</text>
    <text x="640" y="400">2023</text><text x="800" y="400">2024</text><text x="960" y="400">2025</text>
  </g>

  <text x="540" y="455" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">발생주의 신기루는 아니다(내내 1.0 근접) — 그러나 '항상 1.0 넘었다'는 거짓</text>
  <text x="540" y="486" fill="#64748b" font-size="13" text-anchor="middle">2022·2023·2024 세 해는 1.0 미만, 이익이 가장 클 때가 가장 낮았다 (원인=운전자본·Cat Financial은 외부)</text>
</svg>
