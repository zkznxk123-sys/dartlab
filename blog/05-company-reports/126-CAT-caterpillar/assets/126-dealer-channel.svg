<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>딜러 재고 채널 — 매출은 최종수요가 아니라 딜러가 재고를 쌓느냐 푸느냐에 먼저 반응한다</title>
  <desc>캐터필러는 직접 고객이 아니라 독립 딜러망에 팔고, 그 재고 구매를 캡티브 금융(Cat Financial)이 받친다. 그래서 회사 매출은 최종수요보다 딜러 재고 변동에 먼저 출렁인다. 채널·금융 구조는 전부 외부 인용.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">매출은 최종수요보다 '딜러 재고'에 먼저 반응한다</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">채널·캡티브 금융 구조는 전부 [외부 인용] — 연결 손익엔 분해 안 됨</text>

  <!-- flow boxes -->
  <g font-size="15" text-anchor="middle">
    <rect x="70" y="180" width="180" height="90" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.4"/>
    <text x="160" y="218" fill="#94a3b8" font-weight="700">최종 수요</text>
    <text x="160" y="242" fill="#64748b" font-size="12">건설·광산·발전</text>

    <rect x="320" y="170" width="200" height="110" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="420" y="210" fill="#fbbf24" font-weight="700">딜러 재고 (버퍼)</text>
    <text x="420" y="234" fill="#94a3b8" font-size="12">쌓으면 매출↑</text>
    <text x="420" y="252" fill="#94a3b8" font-size="12">풀면 매출↓</text>

    <rect x="590" y="180" width="180" height="90" rx="10" fill="#0f1a2e" stroke="#3b82f6" stroke-width="1.6"/>
    <text x="680" y="218" fill="#93c5fd" font-weight="700">CAT 연결 매출</text>
    <text x="680" y="242" fill="#64748b" font-size="12">(여기가 dartlab)</text>

    <rect x="840" y="180" width="170" height="90" rx="10" fill="#0f1a17" stroke="#22c55e" stroke-width="1.6"/>
    <text x="925" y="218" fill="#22c55e" font-weight="700">영업이익</text>
    <text x="925" y="242" fill="#64748b" font-size="12">고정비 레버</text>
  </g>
  <!-- arrows -->
  <g stroke="#475569" stroke-width="2" fill="#475569">
    <line x1="250" y1="225" x2="315" y2="225"/><polygon points="315,225 305,220 305,230"/>
    <line x1="520" y1="225" x2="585" y2="225"/><polygon points="585,225 575,220 575,230"/>
    <line x1="770" y1="225" x2="835" y2="225"/><polygon points="835,225 825,220 825,230"/>
  </g>

  <!-- captive finance underneath -->
  <rect x="320" y="320" width="450" height="64" rx="10" fill="#11161f" stroke="#a855f7" stroke-width="1.4"/>
  <text x="545" y="348" fill="#c4b5fd" font-size="15" font-weight="700" text-anchor="middle">캡티브 금융 (Cat Financial)</text>
  <text x="545" y="370" fill="#94a3b8" font-size="13" text-anchor="middle">딜러 재고 구매·고객 할부를 자기 금융이 받침 [외부]</text>
  <line x1="420" y1="282" x2="450" y2="318" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="680" y1="272" x2="640" y2="318" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="3 3"/>

  <text x="540" y="445" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">그래서 매출이 이익보다, 또 최종수요보다 한 박자 먼저 출렁인다</text>
  <text x="540" y="478" fill="#64748b" font-size="13" text-anchor="middle">2024 매출 −3.4%인데 이익↑, 2025 매출 +4.3%인데 이익 −14.7% — 같은 채널의 두 위상</text>
</svg>
