<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 +62%에 영업이익 +145% — 고정비 위에서 사이클이 마진을 증폭</title>
  <desc>2020→2025 매출은 +61.9%인데 영업이익은 +145.1%, 이익 증가율이 매출의 2.34배. 고정비 위에서 사이클이 마진을 증폭하는 영업 레버리지의 관찰(원인은 외부).</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">고정비 위에서 사이클은 이익을 증폭한다</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">2020 → 2025, dartlab 연결 (관찰된 비대칭)</text>

  <!-- revenue bar -->
  <text x="160" y="175" fill="#94a3b8" font-size="16">매출 증가율</text>
  <rect x="160" y="190" width="430" height="60" rx="6" fill="#1e3a5f"/>
  <rect x="160" y="190" width="430" height="60" rx="6" fill="#3b82f6" opacity="0.85"/>
  <text x="610" y="228" fill="#93c5fd" font-size="24" font-weight="700">+61.9%</text>

  <!-- op income bar (much longer) -->
  <text x="160" y="315" fill="#94a3b8" font-size="16">영업이익 증가율</text>
  <rect x="160" y="330" width="700" height="60" rx="6" fill="#14532d"/>
  <rect x="160" y="330" width="700" height="60" rx="6" fill="#22c55e" opacity="0.85"/>
  <text x="880" y="368" fill="#22c55e" font-size="24" font-weight="700">+145.1%</text>

  <rect x="360" y="425" width="360" height="50" rx="8" fill="#11161f" stroke="#fbbf24" stroke-width="1.4"/>
  <text x="540" y="456" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">이익 증가율 = 매출의 2.34배</text>

  <text x="540" y="512" fill="#475569" font-size="13" text-anchor="middle">※ ΔOP/ΔREV 같은 2점 비율은 분모 작아지면 튀므로 '메커니즘' 아닌 '관찰'로만 — 원인(가격·볼륨)은 외부</text>
</svg>
