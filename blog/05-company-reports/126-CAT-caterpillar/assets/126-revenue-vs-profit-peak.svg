<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 신고점은 2025년인데 영업이익 정점은 그 전 해 2024년 — 두 정점이 어긋난다</title>
  <desc>2020~2025 매출(라인)은 2025년 67.59B로 신고점인데, 영업이익(막대)·OPM 정점은 2024년(13.07B·20.2%)이고 2025년은 11.15B로 -14.7% 빠졌다. 매출 신고점 ≠ 이익 정점.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">매출 신고점 ≠ 영업이익 정점</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">매출은 2025에 최고, 이익은 2024에 정점 — dartlab 연결</text>

  <!-- op income bars (scaled: max 13.07 -> 230px) -->
  <g>
    <rect x="130" y="380" width="90" height="40" fill="#3b82f6"/><text x="175" y="372" fill="#93c5fd" font-size="13" text-anchor="middle">4.55</text>
    <rect x="265" y="350" width="90" height="70" fill="#3b82f6"/><text x="310" y="342" fill="#93c5fd" font-size="13" text-anchor="middle">6.88</text>
    <rect x="400" y="340" width="90" height="80" fill="#3b82f6"/><text x="445" y="332" fill="#93c5fd" font-size="13" text-anchor="middle">7.90</text>
    <rect x="535" y="290" width="90" height="130" fill="#3b82f6"/><text x="580" y="282" fill="#93c5fd" font-size="13" text-anchor="middle">12.97</text>
    <rect x="670" y="288" width="90" height="132" fill="#22c55e"/><text x="715" y="280" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">13.07 ★</text>
    <rect x="805" y="308" width="90" height="112" fill="#ef4444"/><text x="850" y="300" fill="#fca5a5" font-size="13" text-anchor="middle">11.15</text>
  </g>
  <text x="175" y="438" fill="#64748b" font-size="11" text-anchor="middle">영업이익 정점 ↑</text>
  <text x="715" y="455" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">이익 정점 2024</text>

  <!-- revenue line on top (peak 2025) -->
  <polyline points="175,300 310,270 445,245 580,220 715,228 850,216" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="850" cy="216" r="6" fill="#fbbf24"/>
  <text x="175" y="290" fill="#fbbf24" font-size="12">매출 41.75</text>
  <text x="795" y="205" fill="#fbbf24" font-size="14" font-weight="700">67.59 신고점</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="175" y="478">2020</text><text x="310" y="478">2021</text><text x="445" y="478">2022</text>
    <text x="580" y="478">2023</text><text x="715" y="478">2024</text><text x="850" y="478">2025</text>
  </g>
  <text x="540" y="512" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">매출이 가장 높은 해에 이익은 이미 −14.7% 꺾여 있었다</text>
</svg>
