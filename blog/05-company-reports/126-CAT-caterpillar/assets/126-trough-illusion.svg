<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2020은 OPM 10.9% 트로프 — +187% 배수의 절반은 낮은 데서 출발한 기저효과</title>
  <desc>2018·2019 OPM은 15.6%·15.4%인데 2020은 10.9%로 눌린 사이클 저점. 2020→2024 영업이익 +187% 배수의 절반은 트로프에서 출발한 기저효과다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">+187% 배수의 절반은 '트로프 착시'</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">2020 OPM 10.9%는 정상이 아니라 사이클 저점에서 출발</text>

  <!-- OPM line with trough -->
  <line x1="120" y1="380" x2="980" y2="380" stroke="#1e293b" stroke-width="1"/>
  <polyline points="160,210 320,214 480,300 660,170 860,158" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="160" cy="210" r="5" fill="#94a3b8"/><text x="160" y="195" fill="#94a3b8" font-size="14" text-anchor="middle">15.6%</text>
  <circle cx="320" cy="214" r="5" fill="#94a3b8"/><text x="320" y="199" fill="#94a3b8" font-size="14" text-anchor="middle">15.4%</text>
  <circle cx="480" cy="300" r="7" fill="#ef4444"/><text x="480" y="328" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">10.9% 트로프</text>
  <circle cx="660" cy="170" r="5" fill="#3b82f6"/><text x="660" y="155" fill="#93c5fd" font-size="14" text-anchor="middle">19.3%</text>
  <circle cx="860" cy="158" r="6" fill="#22c55e"/><text x="860" y="143" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">20.2% 정점</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="160" y="400">2018</text><text x="320" y="400">2019</text><text x="480" y="400">2020</text>
    <text x="660" y="400">2023</text><text x="860" y="400">2024</text>
  </g>
  <text x="480" y="345" fill="#64748b" font-size="11" text-anchor="middle">(닻 — 서사 골격 외)</text>

  <rect x="300" y="430" width="480" height="56" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
  <text x="540" y="453" fill="#e2e8f0" font-size="14" text-anchor="middle">2020(트로프)→2024 영업이익 +187%</text>
  <text x="540" y="475" fill="#94a3b8" font-size="13" text-anchor="middle">→ 배수의 절반은 레버리지의 힘이 아니라 낮은 출발점</text>

  <text x="540" y="515" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">그래서 배수 대신 사이클 전 구간(2020~2025)에서 매출과 이익의 어긋남을 본다</text>
</svg>
