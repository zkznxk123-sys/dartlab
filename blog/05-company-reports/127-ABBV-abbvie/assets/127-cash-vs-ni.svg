<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>순이익은 4B대인데 영업CF는 그 약 4.5배 — 별개의 두 번째 괴리</title>
  <desc>연도별 순이익(작은 막대)과 영업현금흐름(큰 막대). 2023~2025년 영업CF는 순이익의 약 4.4~4.7배. 이 괴리는 순이익에서 영업CF로 올라가는 비현금 가산(상각 등)으로, OpInc→NI 증발과는 다른 두 번째 괴리. 상각의 대종은 Allergan發(외부).</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">순이익 vs 영업현금흐름 — 약 4.5배 괴리</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">순이익에서 영업CF로 '올라가는' 비현금 가산 (OpInc→NI 증발과는 별개) — dartlab 연결</text>

  <!-- bars: each year a pair. base y=420. scale 25B->300px -->
  <g text-anchor="middle">
    <!-- 2023 -->
    <rect x="150" y="362" width="55" height="58" fill="#f59e0b"/><text x="177" y="354" fill="#fbbf24" font-size="12">4.86</text>
    <rect x="212" y="146" width="55" height="274" fill="#3b82f6"/><text x="239" y="138" fill="#93c5fd" font-size="12">22.84</text>
    <text x="208" y="445" fill="#94a3b8" font-size="13">2023 (4.7×)</text>
    <!-- 2024 -->
    <rect x="450" y="369" width="55" height="51" fill="#f59e0b"/><text x="477" y="361" fill="#fbbf24" font-size="12">4.28</text>
    <rect x="512" y="194" width="55" height="226" fill="#3b82f6"/><text x="539" y="186" fill="#93c5fd" font-size="12">18.81</text>
    <text x="508" y="445" fill="#94a3b8" font-size="13">2024 (4.4×)</text>
    <!-- 2025 -->
    <rect x="750" y="369" width="55" height="51" fill="#f59e0b"/><text x="777" y="361" fill="#fbbf24" font-size="12">4.23</text>
    <rect x="812" y="192" width="55" height="228" fill="#3b82f6"/><text x="839" y="184" fill="#93c5fd" font-size="12">19.03</text>
    <text x="808" y="445" fill="#94a3b8" font-size="13">2025 (4.5×)</text>
  </g>
  <line x1="120" y1="420" x2="960" y2="420" stroke="#475569" stroke-width="1"/>
  <text x="1000" y="200" fill="#93c5fd" font-size="13">영업CF</text>
  <text x="1000" y="395" fill="#fbbf24" font-size="13">순이익</text>

  <text x="540" y="490" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">이 괴리의 크기 자체가 '순이익이 영업 실체를 대표하지 못한다'는 정합적 증거</text>
  <text x="540" y="518" fill="#475569" font-size="12" text-anchor="middle">※ 가산의 대종 = Allergan 인수 무형자산 상각(9개월 2023 6.06B·2024 5.73B) [외부 인용]</text>
</svg>
