<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>애브비 — 2026년에 봐야 할 다섯 가지</title>
  <desc>2026 추적점: OPM vs NPM 간격, 영업CF/순이익 배율, 매출 고점 갱신, 후계 약물 합산 매출(외부), 영업이익 아래 항목 규모(외부).</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="52" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">ABBV — 회복이 영업이익 줄에서 멈췄나, 아래로 내려오나</text>

  <g font-size="16">
    <rect x="90" y="120" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="148" fill="#22c55e" font-size="20" font-weight="700">1</text>
    <text x="150" y="146" fill="#e2e8f0" font-weight="700">OPM vs NPM의 간격</text>
    <text x="150" y="170" fill="#94a3b8" font-size="14">OPM 20%대인데 NPM이 한 자릿수에 머무는 디커플링 지속인지, NPM이 좁혀지는지 [내부]</text>

    <rect x="90" y="192" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="220" fill="#22c55e" font-size="20" font-weight="700">2</text>
    <text x="150" y="218" fill="#e2e8f0" font-weight="700">영업CF/순이익 배율</text>
    <text x="150" y="242" fill="#94a3b8" font-size="14">2023~2025 약 4.4~4.7배 괴리가 유지/좁혀지는지 — 비현금 부담 완화 신호 [내부]</text>

    <rect x="90" y="264" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="292" fill="#22c55e" font-size="20" font-weight="700">3</text>
    <text x="150" y="290" fill="#e2e8f0" font-weight="700">매출 곡선의 고점 갱신 여부</text>
    <text x="150" y="314" fill="#94a3b8" font-size="14">2025년 61.16B를 넘어서는지 — 절벽 회복이 일시 반등인지 추세인지 [내부]</text>

    <rect x="90" y="336" width="900" height="62" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
    <text x="116" y="364" fill="#fbbf24" font-size="20" font-weight="700">4</text>
    <text x="150" y="362" fill="#e2e8f0" font-weight="700">후계 약물 합산 매출 (외부)</text>
    <text x="150" y="386" fill="#94a3b8" font-size="14">스카이리치·린버크 합산이 휴미라 정점을 넘는지 — 단일분자→2종 의존 집중 위험</text>

    <rect x="90" y="408" width="900" height="62" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
    <text x="116" y="436" fill="#fbbf24" font-size="20" font-weight="700">5</text>
    <text x="150" y="434" fill="#e2e8f0" font-weight="700">영업이익 아래 항목의 규모 (외부)</text>
    <text x="150" y="458" fill="#94a3b8" font-size="14">IPR&D·마일스톤·무형자산 손상·Allergan 상각 잔여 + IRA 약가(보톡스 2028)</text>
  </g>
  <text x="540" y="505" fill="#475569" font-size="13" text-anchor="middle">[내부] = dartlab 연결로 검증 가능 · (외부) = 10-K·IR 인용</text>
</svg>
