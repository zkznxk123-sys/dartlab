<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업마진은 제자리로 돌아오는데 순이익률만 바닥에 깔린다 — 벌어지는 가위</title>
  <desc>OPM(영업이익률)과 NPM(순이익률)을 2020~2025로 겹쳐 그리면, 2020년 가까웠던 두 선이 2025년 OPM은 24.6%로 원위치하는데 NPM만 6.9% 바닥에 깔린다. 킬러 대조: 2020 OPM 24.8%/NPM 10.1% vs 2025 OPM 24.6%/NPM 6.9%.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">OPM은 제자리, NPM만 바닥 — 벌어지는 가위</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">OPM·NPM은 끝까지 별개 비율 — dartlab 연결</text>

  <!-- y: 0%->420, 35%->130. y=420-v/35*290 -->
  <!-- OPM -->
  <polyline points="150,215 320,156 490,162 660,225 830,286 1000,216" fill="none" stroke="#22c55e" stroke-width="3.5"/>
  <text x="150" y="200" fill="#22c55e" font-size="13" font-weight="700">OPM 24.8%</text>
  <text x="940" y="205" fill="#22c55e" font-size="14" font-weight="700">24.6%</text>
  <!-- NPM -->
  <polyline points="150,336 320,250 490,251 660,346 830,357 1000,363" fill="none" stroke="#f59e0b" stroke-width="3.5"/>
  <text x="150" y="356" fill="#f59e0b" font-size="13" font-weight="700">NPM 10.1%</text>
  <text x="940" y="382" fill="#f59e0b" font-size="14" font-weight="700">6.9%</text>

  <!-- vertical compare lines 2020 & 2025 -->
  <line x1="150" y1="215" x2="150" y2="336" stroke="#475569" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="150" y="445" fill="#94a3b8" font-size="13" text-anchor="middle">2020: 격차 14.7pp</text>
  <line x1="1000" y1="216" x2="1000" y2="363" stroke="#ef4444" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="1000" y="445" fill="#fca5a5" font-size="13" text-anchor="middle">2025: 격차 17.7pp</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="150" y="465">2020</text><text x="320" y="465">2021</text><text x="490" y="465">2022</text>
    <text x="660" y="465">2023</text><text x="830" y="465">2024</text><text x="1000" y="465">2025</text>
  </g>
  <text x="540" y="500" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">2020≈2025 영업마진 동일(24.8≈24.6%)인데 순이익률만 약 1/3 깎임 — 증발은 영업선 아래</text>
</svg>
