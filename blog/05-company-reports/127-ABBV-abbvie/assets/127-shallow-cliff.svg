<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출 절벽은 얕았다(−6%) — 그런데 순이익은 같은 해 반토막</title>
  <desc>2022→2023 매출은 58.05B에서 54.32B로 -6.4%만 패였다가 2025년 61.16B로 회복. 그런데 같은 2023년 순이익은 11.84B에서 4.86B로 반토막. 매출 곡선과 순이익 곡선이 결별한다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">얕은 매출 절벽, 반토막 난 순이익</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">2023년, 두 곡선이 처음으로 결별한다 — dartlab 연결</text>

  <!-- revenue line (shallow dip) map 45->y, 61->y. y=380-(v-44)/18*180 -->
  <polyline points="150,360 320,256 490,241 660,278 830,258 1000,210" fill="none" stroke="#22c55e" stroke-width="3.5"/>
  <g fill="#22c55e" font-size="13" text-anchor="middle" font-weight="700">
    <circle cx="490" cy="241" r="5"/><text x="490" y="226">58.05</text>
    <circle cx="660" cy="278" r="6" fill="#fbbf24"/><text x="660" y="300" fill="#fbbf24">54.32 (−6.4%)</text>
    <circle cx="1000" cy="210" r="5"/><text x="970" y="198">61.16</text>
  </g>
  <text x="160" y="350" fill="#22c55e" font-size="13">매출</text>

  <!-- net income line (halved) map 4->y 12->y. y=440-(v-4)/8*150 -->
  <polyline points="150,428 320,298 490,292 660,424 830,432 1000,434" fill="none" stroke="#ef4444" stroke-width="3.5"/>
  <g fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700">
    <circle cx="490" cy="292" r="5"/><text x="448" y="285">11.84</text>
    <circle cx="660" cy="424" r="6"/><text x="690" y="445">4.86 (반토막)</text>
  </g>
  <text x="160" y="420" fill="#ef4444" font-size="13">순이익</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="150" y="470">2020</text><text x="320" y="470">2021</text><text x="490" y="470">2022</text>
    <text x="660" y="470">2023</text><text x="830" y="470">2024</text><text x="1000" y="470">2025</text>
  </g>
  <text x="540" y="505" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">절벽은 후계 약이 메워 얕았는데(외부), 순이익만 무너진 첫 신호 — 위 줄은 멀쩡, 아래 줄만 붕괴</text>
</svg>
