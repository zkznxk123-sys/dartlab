<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>한 회사가 동시에 세 가지로 보인다 — 매출은 회복, 순이익은 고착, 현금은 든든</title>
  <desc>2025년 애브비를 세 렌즈로 보면 매출은 사상 최고로 회복, 순이익은 4B대에 고착, 영업현금흐름은 순이익의 약 4.5배로 든든. 세 줄이 서로 다른 방향을 가리킨다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">한 회사, 세 개의 진실</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">2025년 같은 손익계산서를 세 줄로 읽으면 — dartlab 연결</text>

  <g text-anchor="middle">
    <rect x="80" y="140" width="290" height="300" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.6"/>
    <text x="225" y="180" fill="#22c55e" font-size="19" font-weight="700">매출</text>
    <text x="225" y="250" fill="#22c55e" font-size="46" font-weight="700">↑</text>
    <text x="225" y="310" fill="#e2e8f0" font-size="16">사상 최고 61.16B</text>
    <text x="225" y="340" fill="#94a3b8" font-size="14">절벽을 건너 회복</text>
    <text x="225" y="410" fill="#64748b" font-size="13">"회복했다"</text>

    <rect x="395" y="140" width="290" height="300" rx="12" fill="#1a0f0f" stroke="#ef4444" stroke-width="1.6"/>
    <text x="540" y="180" fill="#ef4444" font-size="19" font-weight="700">순이익</text>
    <text x="540" y="250" fill="#ef4444" font-size="46" font-weight="700">→</text>
    <text x="540" y="310" fill="#e2e8f0" font-size="16">4.23B 고착</text>
    <text x="540" y="340" fill="#94a3b8" font-size="14">NPM 6.9% 시리즈 최저</text>
    <text x="540" y="410" fill="#64748b" font-size="13">"무너졌다"</text>

    <rect x="710" y="140" width="290" height="300" rx="12" fill="#0f1320" stroke="#3b82f6" stroke-width="1.6"/>
    <text x="855" y="180" fill="#93c5fd" font-size="19" font-weight="700">영업현금흐름</text>
    <text x="855" y="250" fill="#93c5fd" font-size="46" font-weight="700">→↑</text>
    <text x="855" y="310" fill="#e2e8f0" font-size="16">19.03B 든든</text>
    <text x="855" y="340" fill="#94a3b8" font-size="14">순이익의 약 4.5배</text>
    <text x="855" y="410" fill="#64748b" font-size="13">"멀쩡하다"</text>
  </g>
  <text x="540" y="490" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">가장 눈에 띄는 줄(순이익)이 가장 덜 믿을 줄 — 회복은 영업이익에서 멈췄다</text>
</svg>
