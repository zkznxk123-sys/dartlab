<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2021 정점 — 분기 OPM 14~17%, 일시적 가격결정력</title>
  <desc>2021년 분기 OPM은 14.0/13.7/17.0/16.7%로 내내 두 자릿수 중반. 영업이익 1.49조는 시리즈 절대 정점. 외부: MLCC 공급부족·리드타임 16~20주·가격 20~30% 인상·가동률 90%대로 부품사가 일시적 가격결정력을 쥔 국면.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2021 — 부품사가 가격을 쥐었던 해</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">분기 OPM 14~17%, 영업이익 1.49조(절대 정점) — dartlab 연결</text>

  <!-- quarterly OPM bars: 14.0, 13.7, 17.0, 16.7 -->
  <g text-anchor="middle">
    <rect x="150" y="220" width="150" height="200" fill="#22c55e" opacity="0.85"/><text x="225" y="205" fill="#22c55e" font-size="18" font-weight="700">14.0%</text><text x="225" y="445" fill="#94a3b8" font-size="14">Q1</text>
    <rect x="350" y="225" width="150" height="195" fill="#22c55e" opacity="0.85"/><text x="425" y="210" fill="#22c55e" font-size="18" font-weight="700">13.7%</text><text x="425" y="445" fill="#94a3b8" font-size="14">Q2</text>
    <rect x="550" y="178" width="150" height="242" fill="#22c55e"/><text x="625" y="163" fill="#22c55e" font-size="18" font-weight="700">17.0%</text><text x="625" y="445" fill="#94a3b8" font-size="14">Q3</text>
    <rect x="750" y="182" width="150" height="238" fill="#22c55e"/><text x="825" y="167" fill="#22c55e" font-size="18" font-weight="700">16.7%</text><text x="825" y="445" fill="#94a3b8" font-size="14">Q4</text>
  </g>
  <line x1="120" y1="420" x2="930" y2="420" stroke="#475569" stroke-width="1"/>

  <text x="540" y="485" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">MLCC 공급부족 → 가격 20~30% 인상·가동률 90%대 = 일시적 가격결정력 [외부]</text>
  <text x="540" y="513" fill="#64748b" font-size="13" text-anchor="middle">가격결정력이 일시적이라면, 그것이 빠진 해엔 마진이 무너진다 (→ 2023)</text>
</svg>
