<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2023 저점 — 분기 OPM 4.8~9.2%, 전방 수요가 빠지자 마진 반토막</title>
  <desc>2023년 분기 OPM은 6.9/9.2/7.8/4.8%로 해를 따라 식었다. 매출은 2021년 대비 -8% 남짓 줄었을 뿐인데 OPM은 절반으로 무너졌다. 외부: 전방 세트 수요(스마트폰·PC) 둔화·메모리 한파, 2022 4Q 영업이익 -68% YoY.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2023 — 전방이 빠지자 마진 반토막</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">분기 OPM 6.9 → 9.2 → 7.8 → 4.8%, 매출 −8%인데 OPM 절반 — dartlab 연결</text>

  <!-- quarterly OPM bars: 6.9, 9.2, 7.8, 4.8  scale 10%->300px from base 420 -->
  <g text-anchor="middle">
    <rect x="150" y="213" width="150" height="207" fill="#ef4444" opacity="0.8"/><text x="225" y="198" fill="#fca5a5" font-size="18" font-weight="700">6.9%</text><text x="225" y="445" fill="#94a3b8" font-size="14">Q1</text>
    <rect x="350" y="144" width="150" height="276" fill="#fbbf24" opacity="0.8"/><text x="425" y="129" fill="#fbbf24" font-size="18" font-weight="700">9.2%</text><text x="425" y="445" fill="#94a3b8" font-size="14">Q2</text>
    <rect x="550" y="186" width="150" height="234" fill="#ef4444" opacity="0.8"/><text x="625" y="171" fill="#fca5a5" font-size="18" font-weight="700">7.8%</text><text x="625" y="445" fill="#94a3b8" font-size="14">Q3</text>
    <rect x="750" y="276" width="150" height="144" fill="#ef4444"/><text x="825" y="261" fill="#ef4444" font-size="18" font-weight="700">4.8%</text><text x="825" y="445" fill="#94a3b8" font-size="14">Q4</text>
  </g>
  <line x1="120" y1="420" x2="930" y2="420" stroke="#475569" stroke-width="1"/>

  <text x="540" y="485" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">전방 수요(스마트폰·PC) 둔화·메모리 한파 [외부] — 매출 −8%인데 OPM 반토막</text>
  <text x="540" y="513" fill="#64748b" font-size="13" text-anchor="middle">2021 정점과 2023 저점은 같은 진실의 양면: 부품사의 마진은 전방이 정한다</text>
</svg>
