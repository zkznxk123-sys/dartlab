<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>삼성전기 — 2026년에 봐야 할 다섯 가지</title>
  <desc>2026 추적점: 영업이익이 2021 정점(1.49조)을 넘는가, OPM 두 자릿수 복귀, 매출·영업이익 방향 일치, MLCC 수급·전방 사이클(외부), 신사업 FC-BGA·유리기판 수율(외부).</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="52" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">삼성전기 — 외형이 아니라 전방이 정하는 마진</text>

  <g font-size="16">
    <rect x="90" y="120" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="148" fill="#22c55e" font-size="20" font-weight="700">1</text>
    <text x="150" y="146" fill="#e2e8f0" font-weight="700">영업이익이 2021 정점(1.49조)을 넘는가</text>
    <text x="150" y="170" fill="#94a3b8" font-size="14">사상 최대 매출이 이어지는 가운데 절대 영업이익이 천장을 처음 돌파하는지 [내부]</text>

    <rect x="90" y="192" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="220" fill="#22c55e" font-size="20" font-weight="700">2</text>
    <text x="150" y="218" fill="#e2e8f0" font-weight="700">OPM이 두 자릿수로 복귀하는가</text>
    <text x="150" y="242" fill="#94a3b8" font-size="14">2023~2025 7~8%대에서 다시 두 자릿수로 올라서는지 — 진동의 다음 위상 [내부]</text>

    <rect x="90" y="264" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="292" fill="#22c55e" font-size="20" font-weight="700">3</text>
    <text x="150" y="290" fill="#e2e8f0" font-weight="700">매출과 영업이익의 방향 일치</text>
    <text x="150" y="314" fill="#94a3b8" font-size="14">외형 사상 최대 동안 이익률이 동행하는지, 또 벌어지는지(외형↑·마진↓ 반복) [내부]</text>

    <rect x="90" y="336" width="900" height="62" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
    <text x="116" y="364" fill="#fbbf24" font-size="20" font-weight="700">4</text>
    <text x="150" y="362" fill="#e2e8f0" font-weight="700">MLCC 수급·전방 사이클 (외부)</text>
    <text x="150" y="386" fill="#94a3b8" font-size="14">AI서버·전장 수요가 단가까지 끌어올리는지(2021식 재현), 양적 회복에 그치는지</text>

    <rect x="90" y="408" width="900" height="62" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
    <text x="116" y="436" fill="#fbbf24" font-size="20" font-weight="700">5</text>
    <text x="150" y="434" fill="#e2e8f0" font-weight="700">신사업 FC-BGA·유리기판 수율·가동 (외부)</text>
    <text x="150" y="458" fill="#94a3b8" font-size="14">베트남 투자가 이익으로 전환되는지, 과잉투자 경고대로 감가상각 부담이 되는지</text>
  </g>
  <text x="540" y="505" fill="#475569" font-size="13" text-anchor="middle">[내부] = dartlab 연결로 검증 가능 · (외부) = IR·업계 인용</text>
</svg>
