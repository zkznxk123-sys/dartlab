<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 완만, 영업이익률은 두 배폭 진동 — 외형과 마진이 따로 논다</title>
  <desc>2018~2025 매출은 8.19조에서 11.31조로 완만히 +38% 늘었는데, 영업이익률(OPM)은 7%~15% 사이를 두 배폭으로 진동했다(2021 정점 15.4%, 2023 저점 7.2%).</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">매출은 완만, 마진은 롤러코스터</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">2018~2025, dartlab 연결 — 외형과 마진율이 따로 움직인다</text>

  <!-- x: 8 points. 130 ~ 980, step ~121 -->
  <!-- revenue line (gentle). map 8->380 11.5->200 -->
  <polyline points="130,372 251,378 372,371 493,300 614,312 735,338 856,267 977,216" fill="none" stroke="#22c55e" stroke-width="3"/>
  <text x="130" y="360" fill="#22c55e" font-size="12">매출 8.19조</text>
  <text x="900" y="205" fill="#22c55e" font-size="13" font-weight="700">11.31조 (+38%)</text>

  <!-- OPM line (wild). map 7%->300 16%->130. y=300-(opm-7)/9*170 -->
  <polyline points="130,198 251,272 372,242 493,141 614,194 735,296 856,298 977,279" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <g font-size="12" font-weight="700">
    <circle cx="493" cy="141" r="5" fill="#22c55e"/><text x="493" y="128" fill="#22c55e" text-anchor="middle">15.4%</text>
    <circle cx="735" cy="296" r="5" fill="#ef4444"/><text x="735" y="320" fill="#ef4444" text-anchor="middle">7.2%</text>
  </g>
  <text x="150" y="190" fill="#fbbf24" font-size="12">OPM 12.4%</text>

  <g fill="#64748b" font-size="11" text-anchor="middle">
    <text x="130" y="405">2018</text><text x="251" y="405">2019</text><text x="372" y="405">2020</text><text x="493" y="405">2021</text>
    <text x="614" y="405">2022</text><text x="735" y="405">2023</text><text x="856" y="405">2024</text><text x="977" y="405">2025</text>
  </g>
  <text x="540" y="475" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">매출이 완만히 가는 동안 OPM은 위아래 두 배폭 — 손익을 흔드는 변수는 외형이 아니다</text>
  <text x="540" y="505" fill="#64748b" font-size="13" text-anchor="middle">전방(스마트폰·전장·AI서버) 수요와 MLCC 수급이 마진을 정한다 [외부]</text>
</svg>
