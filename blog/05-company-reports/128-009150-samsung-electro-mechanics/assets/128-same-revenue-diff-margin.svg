<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>같은 매출대(8~9조)에서 OPM이 8.5·15.4·7.2% — 외형이 아니라 단가가 마진을 정한다</title>
  <desc>2019(8.05조)·2021(9.68조)·2023(8.91조)은 매출이 모두 8~9조대로 엇비슷한데, OPM이 8.5%·15.4%·7.2%로 두 배 차이로 갈렸다. 손익을 흔드는 변수는 매출이 아니라 그 한 칸 위(단가·수급)다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">같은 매출, 두 배 차이 나는 마진</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">매출이 거의 같은 세 해에 OPM이 갈린다 — dartlab 연결</text>

  <g text-anchor="middle">
    <!-- 2019 -->
    <text x="225" y="150" fill="#94a3b8" font-size="17" font-weight="700">2019</text>
    <rect x="150" y="300" width="150" height="120" fill="#334155"/>
    <text x="225" y="290" fill="#cbd5e1" font-size="15">매출 8.05조</text>
    <rect x="175" y="372" width="100" height="48" fill="#94a3b8"/>
    <text x="225" y="450" fill="#94a3b8" font-size="22" font-weight="700">OPM 8.5%</text>

    <!-- 2021 -->
    <text x="540" y="150" fill="#22c55e" font-size="17" font-weight="700">2021</text>
    <rect x="465" y="290" width="150" height="130" fill="#334155"/>
    <text x="540" y="280" fill="#cbd5e1" font-size="15">매출 9.68조</text>
    <rect x="490" y="298" width="100" height="122" fill="#22c55e"/>
    <text x="540" y="450" fill="#22c55e" font-size="22" font-weight="700">OPM 15.4%</text>

    <!-- 2023 -->
    <text x="855" y="150" fill="#ef4444" font-size="17" font-weight="700">2023</text>
    <rect x="780" y="298" width="150" height="122" fill="#334155"/>
    <text x="855" y="288" fill="#cbd5e1" font-size="15">매출 8.91조</text>
    <rect x="805" y="380" width="100" height="40" fill="#ef4444"/>
    <text x="855" y="450" fill="#ef4444" font-size="22" font-weight="700">OPM 7.2%</text>
  </g>
  <text x="540" y="495" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">외형이 같은데 이익률이 두 배 차이 — 변수는 매출이 아니라 '한 칸 위'(단가·수급)</text>
  <text x="540" y="522" fill="#475569" font-size="12" text-anchor="middle">※ 손익 7줄만으론 매출원가/판가 특정 불가 — '증거' 아닌 '정황' · 가격은 외부(MLCC 수급)가 정함</text>
</svg>
