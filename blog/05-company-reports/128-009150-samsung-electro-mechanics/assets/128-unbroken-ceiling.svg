<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 사상 최대 능선인데, 영업이익은 옛 봉우리(2018·2021)보다 낮다</title>
  <desc>매출은 2024·2025 연속 사상 최대(10.31·11.31조)인데, 영업이익은 0.73·0.91조로 2021년 정점(1.49조)도 2018년(1.02조)도 넘지 못했다. 외형은 사상 최대인데 이익은 7년 전 자리.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">사상 최대 매출, 못 넘은 이익 천장</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업이익 정점은 2021 — 사상 최대 매출의 해도 그 아래 (dartlab 연결)</text>

  <!-- ceiling lines -->
  <line x1="120" y1="150" x2="980" y2="150" stroke="#22c55e" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="125" y="143" fill="#22c55e" font-size="13">2021 천장 1.49조</text>
  <line x1="120" y1="226" x2="980" y2="226" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="125" y="219" fill="#94a3b8" font-size="13">2018 1.02조</text>

  <!-- op income bars. scale 1.5조 -> 270px from base 420. -->
  <g text-anchor="middle">
    <rect x="150" y="237" width="95" height="183" fill="#475569"/><text x="197" y="225" fill="#94a3b8" font-size="13">1.02</text><text x="197" y="445" fill="#64748b" font-size="12">2018</text>
    <rect x="270" y="270" width="95" height="150" fill="#475569"/><text x="317" y="258" fill="#94a3b8" font-size="13">0.83</text><text x="317" y="445" fill="#64748b" font-size="12">2020</text>
    <rect x="390" y="150" width="95" height="270" fill="#22c55e"/><text x="437" y="138" fill="#22c55e" font-size="14" font-weight="700">1.49 ★</text><text x="437" y="445" fill="#64748b" font-size="12">2021</text>
    <rect x="510" y="307" width="95" height="113" fill="#ef4444" opacity="0.7"/><text x="557" y="295" fill="#fca5a5" font-size="13">0.64</text><text x="557" y="445" fill="#64748b" font-size="12">2023</text>
    <rect x="630" y="288" width="95" height="132" fill="#3b82f6"/><text x="677" y="276" fill="#93c5fd" font-size="13">0.73</text><text x="677" y="445" fill="#64748b" font-size="12">2024</text>
    <rect x="750" y="255" width="95" height="165" fill="#3b82f6"/><text x="797" y="243" fill="#93c5fd" font-size="13">0.91</text><text x="797" y="445" fill="#64748b" font-size="12">2025</text>
  </g>
  <line x1="120" y1="420" x2="980" y2="420" stroke="#475569" stroke-width="1"/>

  <text x="897" y="270" fill="#fbbf24" font-size="13" font-weight="700">매출 사상최대</text>
  <text x="897" y="290" fill="#94a3b8" font-size="12">2025 11.31조</text>
  <text x="897" y="308" fill="#94a3b8" font-size="12">인데 이익은</text>
  <text x="897" y="326" fill="#94a3b8" font-size="12">7년 전 아래</text>

  <text x="540" y="490" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">회복 동력이 단가 스파이크 아닌 고부가 '믹스(양)'라, 절대이익 천장은 미회복 [외부]</text>
</svg>
