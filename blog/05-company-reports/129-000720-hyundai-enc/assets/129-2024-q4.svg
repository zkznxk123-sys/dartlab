<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2024 분기 — 1~3분기는 정상(+), 4분기 단일 분기에 −1.776조</title>
  <desc>2024년 분기 영업이익은 Q1 +0.251, Q2 +0.147, Q3 +0.114조로 정상이었고 Q4 단일 분기에 −1.776조가 났다. 한 해 손실(-1.263조)이 한 분기에 몰렸다. 진행기준 회계에서 연말 원가 재추정이 한 분기에 정정된 형태.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">한 해의 손실이 한 분기에 몰렸다</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">2024 분기 영업이익 (조원) — dartlab 연결</text>

  <!-- zero line -->
  <line x1="120" y1="220" x2="980" y2="220" stroke="#64748b" stroke-width="1.5"/>
  <text x="990" y="225" fill="#64748b" font-size="12">0</text>

  <!-- bars: Q1 +0.251, Q2 +0.147, Q3 +0.114, Q4 -1.776. scale: 0.25->small up, -1.776->big down. 1unit=130px -->
  <g text-anchor="middle">
    <rect x="160" y="187" width="140" height="33" fill="#22c55e"/><text x="230" y="177" fill="#22c55e" font-size="15" font-weight="700">+0.251</text><text x="230" y="245" fill="#94a3b8" font-size="14">Q1</text>
    <rect x="360" y="201" width="140" height="19" fill="#22c55e"/><text x="430" y="191" fill="#22c55e" font-size="15" font-weight="700">+0.147</text><text x="430" y="245" fill="#94a3b8" font-size="14">Q2</text>
    <rect x="560" y="205" width="140" height="15" fill="#22c55e"/><text x="630" y="195" fill="#22c55e" font-size="15" font-weight="700">+0.114</text><text x="630" y="245" fill="#94a3b8" font-size="14">Q3</text>
    <rect x="760" y="220" width="140" height="210" fill="#ef4444"/><text x="830" y="455" fill="#ef4444" font-size="18" font-weight="700">−1.776</text><text x="830" y="200" fill="#fca5a5" font-size="14">Q4</text>
  </g>

  <text x="540" y="495" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">진행률로 미리 인식한 이익이 연말 원가 재추정에 한 분기로 정정된 진행기준의 지문</text>
  <text x="540" y="522" fill="#475569" font-size="12" text-anchor="middle">※ 연간 합 −1.263조 = 직전 5년 누적 영업이익 3.523조의 약 35.9% 규모 · 재추정 사유는 외부</text>
</svg>
