<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2022년부터 손익(흑자)과 영업CF(음수)의 부호가 어긋난다 — 양립일 뿐, 예고가 아니다</title>
  <desc>영업현금흐름은 2019~2021년 양(+)이다가 2022년 -0.143조로 음전환, 2023년 -0.715조로 심화. 그런데 2022·2023년은 둘 다 장부 흑자. 음의 영업CF는 매출 급증기 운전자본 흡수와도 정합하므로 손실의 예고가 아니라 부호 어긋남(양립)까지만.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">현금이 먼저 어긋났다 (부호)</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업현금흐름이 2022년 음(−)으로 — 그런데 그해 장부는 흑자 (dartlab 연결)</text>

  <!-- zero line -->
  <line x1="120" y1="270" x2="980" y2="270" stroke="#64748b" stroke-width="1.5"/>
  <text x="990" y="275" fill="#64748b" font-size="12">0</text>

  <!-- op CF bars: 2019 +0.83, 2020 +1.73, 2021 +1.01, 2022 -0.14, 2023 -0.72, 2024 -0.12, 2025 -0.75. scale 1.8->150px -->
  <g text-anchor="middle">
    <rect x="150" y="200" width="90" height="70" fill="#3b82f6"/><text x="195" y="190" fill="#93c5fd" font-size="12">+0.83</text><text x="195" y="300" fill="#64748b" font-size="12">2019</text>
    <rect x="265" y="125" width="90" height="145" fill="#3b82f6"/><text x="310" y="115" fill="#93c5fd" font-size="12">+1.73</text><text x="310" y="300" fill="#64748b" font-size="12">2020</text>
    <rect x="380" y="185" width="90" height="85" fill="#3b82f6"/><text x="425" y="175" fill="#93c5fd" font-size="12">+1.01</text><text x="425" y="300" fill="#64748b" font-size="12">2021</text>
    <rect x="495" y="270" width="90" height="12" fill="#ef4444"/><text x="540" y="305" fill="#fca5a5" font-size="12">−0.14</text><text x="540" y="325" fill="#64748b" font-size="12">2022</text>
    <rect x="610" y="270" width="90" height="60" fill="#ef4444"/><text x="655" y="352" fill="#fca5a5" font-size="12">−0.72</text><text x="655" y="372" fill="#64748b" font-size="12">2023</text>
    <rect x="725" y="270" width="90" height="10" fill="#ef4444"/><text x="770" y="303" fill="#fca5a5" font-size="12">−0.12</text><text x="770" y="323" fill="#64748b" font-size="12">2024</text>
    <rect x="840" y="270" width="90" height="62" fill="#ef4444"/><text x="885" y="354" fill="#fca5a5" font-size="12">−0.75</text><text x="885" y="374" fill="#64748b" font-size="12">2025</text>
  </g>

  <text x="425" y="155" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">양(+) 평형</text>
  <line x1="488" y1="100" x2="488" y2="390" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="700" y="430" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">2022 부호 전환 — 그러나 장부는 흑자</text>

  <text x="540" y="470" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">음의 영업CF는 매출 급증기 운전자본 흡수와도 정합 — '예고' 아닌 부호 어긋남(양립)</text>
  <text x="540" y="500" fill="#475569" font-size="12" text-anchor="middle">※ 갭의 구성(미청구공사·공사미수금)은 BS·주석 = 외부 인용</text>
</svg>
