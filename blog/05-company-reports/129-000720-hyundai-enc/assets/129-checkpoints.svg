<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>현대건설 — 2026년에 봐야 할 다섯 가지</title>
  <desc>2026 추적점: 영업현금흐름의 부호 반전, OPM 평형선 안정 복귀, 매출·영업이익 방향 일치, 미청구공사·공사미수금 잔액(외부), 해외 EPC·원전 원가 안정성(외부).</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="52" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="84" fill="#64748b" font-size="15" text-anchor="middle">현대건설 — OPM보다 영업CF 라인을 먼저 보라</text>

  <g font-size="16">
    <rect x="90" y="120" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="148" fill="#22c55e" font-size="20" font-weight="700">1</text>
    <text x="150" y="146" fill="#e2e8f0" font-weight="700">2026 영업현금흐름의 부호</text>
    <text x="150" y="170" fill="#94a3b8" font-size="14">5년 만에 양(+)으로 돌아서는가, 5년 연속 음(−)인가 — 어긋남이 닫히는지의 단일 지표 [내부]</text>

    <rect x="90" y="192" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="220" fill="#22c55e" font-size="20" font-weight="700">2</text>
    <text x="150" y="218" fill="#e2e8f0" font-weight="700">OPM이 평형선(2~5%)에 안정 복귀하는가</text>
    <text x="150" y="242" fill="#94a3b8" font-size="14">2024처럼 부호가 다시 뒤집히는지 — 진행기준 정정의 재발을 손익 부호로 관찰 [내부]</text>

    <rect x="90" y="264" width="900" height="62" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
    <text x="116" y="292" fill="#22c55e" font-size="20" font-weight="700">3</text>
    <text x="150" y="290" fill="#e2e8f0" font-weight="700">매출 증가와 영업이익 증가의 방향 일치 회복</text>
    <text x="150" y="314" fill="#94a3b8" font-size="14">'외형↑·마진↓' 역방향이 풀리는지 — 커진 매출이 더 두꺼운 이익으로 전환되는지 [내부]</text>

    <rect x="90" y="336" width="900" height="62" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
    <text x="116" y="364" fill="#fbbf24" font-size="20" font-weight="700">4</text>
    <text x="150" y="362" fill="#e2e8f0" font-weight="700">미청구공사·공사미수금 잔액의 증감 (외부)</text>
    <text x="150" y="386" fill="#94a3b8" font-size="14">운전자본이 현금을 계속 묶는지 푸는지 — 내부 영업CF 음수 지속/해소와 정합 대조</text>

    <rect x="90" y="408" width="900" height="62" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
    <text x="116" y="436" fill="#fbbf24" font-size="20" font-weight="700">5</text>
    <text x="150" y="434" fill="#e2e8f0" font-weight="700">해외 EPC·원전 프로젝트의 원가 안정성 (외부)</text>
    <text x="150" y="458" fill="#94a3b8" font-size="14">발릭파판·자푸라 협상, 원전(코즐로두이) 원가 추정 — 진행기준 재추정이 또 일어날지</text>
  </g>
  <text x="540" y="505" fill="#475569" font-size="13" text-anchor="middle">[내부] = dartlab 연결로 검증 가능 · (외부) = IR·공시 인용</text>
</svg>
