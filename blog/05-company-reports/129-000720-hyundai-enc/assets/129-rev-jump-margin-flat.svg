<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 +64% 점프, OPM은 4.2→2.6% 하락 — 외형↑·마진↓의 첫 긴장</title>
  <desc>2021~2023년 매출은 18.07조에서 29.65조로 +64% 뛰었는데 OPM은 4.2%에서 2.6%로 평형선 하단까지 내려갔다. 2018년 16.73조 대비 2024년 32.67조는 +95%인데 이익률은 더 얇아졌다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">매출은 점프, 마진은 못 따라옴</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">외형 +95%(2018→2024)인데 OPM은 더 얇아졌다 — dartlab 연결</text>

  <!-- revenue bars 2019-2024 (16.7~32.67). scale 33->260px from base 400 -->
  <g text-anchor="middle">
    <rect x="140" y="264" width="100" height="136" fill="#3b82f6" opacity="0.8"/><text x="190" y="252" fill="#93c5fd" font-size="13">17.3</text><text x="190" y="420" fill="#64748b" font-size="12">2019</text>
    <rect x="270" y="266" width="100" height="134" fill="#3b82f6" opacity="0.8"/><text x="320" y="254" fill="#93c5fd" font-size="13">17.0</text><text x="320" y="420" fill="#64748b" font-size="12">2020</text>
    <rect x="400" y="257" width="100" height="143" fill="#3b82f6" opacity="0.8"/><text x="450" y="245" fill="#93c5fd" font-size="13">18.1</text><text x="450" y="420" fill="#64748b" font-size="12">2021</text>
    <rect x="530" y="232" width="100" height="168" fill="#3b82f6"/><text x="580" y="220" fill="#93c5fd" font-size="13">21.2</text><text x="580" y="420" fill="#64748b" font-size="12">2022</text>
    <rect x="660" y="166" width="100" height="234" fill="#3b82f6"/><text x="710" y="154" fill="#93c5fd" font-size="13">29.7</text><text x="710" y="420" fill="#64748b" font-size="12">2023</text>
    <rect x="790" y="142" width="100" height="258" fill="#22c55e"/><text x="840" y="130" fill="#22c55e" font-size="13" font-weight="700">32.7</text><text x="840" y="420" fill="#64748b" font-size="12">2024</text>
  </g>
  <line x1="120" y1="400" x2="920" y2="400" stroke="#475569" stroke-width="1"/>

  <!-- OPM line overlay (4.2->2.6, scale on right) -->
  <polyline points="190,318 320,360 450,330 580,372 710,376 840,455" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="2 0"/>
  <text x="450" y="318" fill="#fbbf24" font-size="13" font-weight="700">OPM 4.2%</text>
  <text x="690" y="392" fill="#fbbf24" font-size="13" font-weight="700">2.6%</text>
  <text x="840" y="475" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2024 −3.9%</text>

  <text x="540" y="510" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">커진 매출이 더 두꺼운 이익으로 전환되지 않았다 — 외형↑·마진↓의 역방향</text>
</svg>
