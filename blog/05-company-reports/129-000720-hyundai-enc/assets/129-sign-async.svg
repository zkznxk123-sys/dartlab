<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>손익은 V자 흑전, 현금은 4년째 음(−) — 회복과 유출이 또 어긋난다</title>
  <desc>회계 손실 최대의 해 2024년 영업CF는 -0.119조로 네 음수 연도 중 가장 덜 음수이고, 좋아 보인 2023·2025년이 -0.715·-0.748조로 더 많이 샜다. 손실=현금유출이라는 직관이 깨지는 부호 비동기성.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">손실 최대의 해에 현금은 가장 덜 빠졌다</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업이익(막대) vs 영업현금흐름(점) — 부호 비동기성 (dartlab 연결)</text>

  <line x1="120" y1="250" x2="980" y2="250" stroke="#64748b" stroke-width="1.5"/>
  <text x="990" y="255" fill="#64748b" font-size="12">0</text>

  <!-- op income bars: 2022 +0.58, 2023 +0.79, 2024 -1.26, 2025 +0.65. scale 1unit=120px -->
  <g text-anchor="middle">
    <rect x="180" y="180" width="120" height="70" fill="#22c55e"/><text x="240" y="170" fill="#22c55e" font-size="14" font-weight="700">영익 +0.58</text><text x="240" y="285" fill="#64748b" font-size="13">2022</text>
    <rect x="420" y="155" width="120" height="95" fill="#22c55e"/><text x="480" y="145" fill="#22c55e" font-size="14" font-weight="700">+0.79</text><text x="480" y="285" fill="#64748b" font-size="13">2023</text>
    <rect x="660" y="250" width="120" height="150" fill="#ef4444"/><text x="720" y="420" fill="#ef4444" font-size="14" font-weight="700">−1.26</text><text x="720" y="285" fill="#94a3b8" font-size="13">2024</text>
    <rect x="900" y="172" width="120" height="78" fill="#22c55e"/><text x="960" y="162" fill="#22c55e" font-size="14" font-weight="700">+0.65</text><text x="960" y="285" fill="#64748b" font-size="13">2025</text>
  </g>

  <!-- op CF dots (all negative): 2022 -0.14, 2023 -0.72, 2024 -0.12, 2025 -0.75. y=250+v*120 -->
  <g>
    <circle cx="240" cy="267" r="8" fill="#f59e0b"/>
    <circle cx="480" cy="336" r="8" fill="#f59e0b"/>
    <circle cx="720" cy="264" r="10" fill="#fbbf24" stroke="#fff" stroke-width="1.5"/>
    <circle cx="960" cy="340" r="8" fill="#f59e0b"/>
    <polyline points="240,267 480,336 720,264 960,340" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 3"/>
  </g>
  <text x="240" y="470" fill="#fbbf24" font-size="12" text-anchor="middle">CF −0.14</text>
  <text x="480" y="470" fill="#fbbf24" font-size="12" text-anchor="middle">−0.72</text>
  <text x="720" y="240" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">−0.12 (가장 덜 음수!)</text>
  <text x="960" y="470" fill="#fbbf24" font-size="12" text-anchor="middle">−0.75 (최대 유출)</text>

  <text x="540" y="510" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">회계 손실 최대(2024)에 현금 유출은 최소, 흑자해(2023·2025)에 현금이 더 샜다</text>
</svg>
