<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>두 장부가 어긋난다 — 손익(흑/적)의 부호와 현금(영업CF)의 부호가 같은 해에 살지 않는다</title>
  <desc>연도별 영업이익 부호(흑/적)와 영업현금흐름 부호(+/−)를 매트릭스로 보면, 2022~2025년 손익은 대체로 흑자인데 영업CF는 음(−)이고, 2024년은 손익 적자인데 영업CF는 가장 덜 음수다. 부호 비동기성.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">손익과 현금, 부호가 어긋난 4년</text>
  <text x="540" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업이익 부호 vs 영업현금흐름 부호 (2019~2025) — dartlab 연결</text>

  <!-- header -->
  <g font-size="13" fill="#64748b" text-anchor="middle">
    <text x="300" y="130">2019</text><text x="400" y="130">2020</text><text x="500" y="130">2021</text>
    <text x="600" y="130">2022</text><text x="700" y="130">2023</text><text x="800" y="130">2024</text><text x="900" y="130">2025</text>
  </g>
  <!-- row labels -->
  <text x="120" y="200" fill="#cbd5e1" font-size="15" font-weight="700">영업이익</text>
  <text x="120" y="310" fill="#cbd5e1" font-size="15" font-weight="700">영업현금흐름</text>

  <!-- op income row: + + + + + - + -->
  <g font-size="22" font-weight="700" text-anchor="middle">
    <circle cx="300" cy="195" r="22" fill="#14532d"/><text x="300" y="203" fill="#22c55e">+</text>
    <circle cx="400" cy="195" r="22" fill="#14532d"/><text x="400" y="203" fill="#22c55e">+</text>
    <circle cx="500" cy="195" r="22" fill="#14532d"/><text x="500" y="203" fill="#22c55e">+</text>
    <circle cx="600" cy="195" r="22" fill="#14532d"/><text x="600" y="203" fill="#22c55e">+</text>
    <circle cx="700" cy="195" r="22" fill="#14532d"/><text x="700" y="203" fill="#22c55e">+</text>
    <circle cx="800" cy="195" r="22" fill="#7f1d1d"/><text x="800" y="203" fill="#fca5a5">−</text>
    <circle cx="900" cy="195" r="22" fill="#14532d"/><text x="900" y="203" fill="#22c55e">+</text>
  </g>
  <!-- op CF row: + + + - - - - -->
  <g font-size="22" font-weight="700" text-anchor="middle">
    <circle cx="300" cy="305" r="22" fill="#1e3a5f"/><text x="300" y="313" fill="#93c5fd">+</text>
    <circle cx="400" cy="305" r="22" fill="#1e3a5f"/><text x="400" y="313" fill="#93c5fd">+</text>
    <circle cx="500" cy="305" r="22" fill="#1e3a5f"/><text x="500" y="313" fill="#93c5fd">+</text>
    <circle cx="600" cy="305" r="22" fill="#7f1d1d"/><text x="600" y="313" fill="#fca5a5">−</text>
    <circle cx="700" cy="305" r="22" fill="#7f1d1d"/><text x="700" y="313" fill="#fca5a5">−</text>
    <circle cx="800" cy="305" r="22" fill="#7f1d1d"/><text x="800" y="313" fill="#fca5a5">−</text>
    <circle cx="900" cy="305" r="22" fill="#7f1d1d"/><text x="900" y="313" fill="#fca5a5">−</text>
  </g>

  <!-- highlight async columns -->
  <rect x="572" y="160" width="56" height="180" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/>
  <rect x="672" y="160" width="56" height="180" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/>
  <rect x="872" y="160" width="56" height="180" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/>

  <text x="540" y="400" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">노란 칸 = 손익은 흑자인데 현금은 음(−) — 장부엔 이익, 금고엔 유출</text>
  <text x="540" y="448" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">2022년부터 손익의 부호와 현금의 부호가 같은 해에 살지 않는다</text>
  <text x="540" y="478" fill="#64748b" font-size="13" text-anchor="middle">이 부호 비동기성이 이 회사를 OPM보다 영업CF 라인부터 읽게 만든다</text>
</svg>
