<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="400" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">CAPEX vs FCF 추이</text>

  <!-- Grid -->
  <line x1="140" y1="70" x2="140" y2="320" stroke="#1e293b" stroke-width="1"/>
  <line x1="140" y1="320" x2="940" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Y-axis labels -->
  <!-- Scale: range -1000 to +1800 => 2800 range over 250px. zero line at y=70 + (1800/2800)*250 = 70+160.7 = 230.7 -->
  <line x1="140" y1="231" x2="940" y2="231" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="235" text-anchor="end" fill="#64748b" font-size="12">0</text>
  <text x="130" y="80" text-anchor="end" fill="#64748b" font-size="12">+1,800</text>
  <text x="130" y="324" text-anchor="end" fill="#64748b" font-size="12">-1,000</text>

  <!-- X-axis labels -->
  <text x="280" y="345" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">2022</text>
  <text x="540" y="345" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">2023</text>
  <text x="800" y="345" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">2024</text>

  <!-- CAPEX line (655, 1113, 1622) -->
  <!-- y = 231 - (value/2800)*250 -->
  <!-- 655: y=231 - 58.5 = 172.5 -->
  <!-- 1113: y=231 - 99.4 = 131.6 -->
  <!-- 1622: y=231 - 144.8 = 86.2 -->
  <polyline points="280,172.5 540,131.6 800,86.2" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="280" cy="172.5" r="6" fill="#ef4444"/>
  <circle cx="540" cy="131.6" r="6" fill="#ef4444"/>
  <circle cx="800" cy="86.2" r="6" fill="#ef4444"/>
  <text x="280" y="162" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">655</text>
  <text x="540" y="121" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">1,113</text>
  <text x="800" y="76" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">1,622</text>

  <!-- FCF line (+1318, -588, -910) -->
  <!-- 1318: y=231 - 117.7 = 113.3 -->
  <!-- -588: y=231 + 52.5 = 283.5 -->
  <!-- -910: y=231 + 81.25 = 312.3 -->
  <polyline points="280,113.3 540,283.5 800,312.3" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="280" cy="113.3" r="6" fill="#22c55e"/>
  <circle cx="540" cy="283.5" r="6" fill="#f59e0b"/>
  <circle cx="800" cy="312.3" r="6" fill="#ef4444"/>
  <text x="280" y="103" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">+1,318</text>
  <text x="540" y="275" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">-588</text>
  <text x="800" y="304" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">-910</text>

  <!-- Crossover highlight -->
  <circle cx="410" cy="198" r="16" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="430" y="210" fill="#fbbf24" font-size="11" font-weight="600">교차</text>

  <!-- Legend -->
  <line x1="680" y1="370" x2="710" y2="370" stroke="#ef4444" stroke-width="3"/>
  <text x="718" y="374" fill="#ef4444" font-size="12" font-weight="600">CAPEX (억원)</text>
  <line x1="830" y1="370" x2="860" y2="370" stroke="#22c55e" stroke-width="3"/>
  <text x="868" y="374" fill="#22c55e" font-size="12" font-weight="600">FCF (억원)</text>

  <!-- Annotation -->
  <rect x="160" y="360" width="300" height="28" rx="6" fill="#1e293b"/>
  <text x="310" y="379" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">CAPEX가 이익을 삼켰다</text>
</svg>