<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" width="1080" height="350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">시장 크기 비교: 온수기 vs 퍼네스</text>

  <!-- Tankless water heater bar (100만대) -->
  <rect x="140" y="80" width="160" height="180" rx="10" fill="#3b82f6" opacity="0.2"/>
  <rect x="140" y="80" width="160" height="180" rx="10" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="155" text-anchor="middle" fill="#3b82f6" font-size="36" font-weight="800">100</text>
  <text x="220" y="180" text-anchor="middle" fill="#94a3b8" font-size="14">만대/년</text>
  <text x="220" y="245" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">탱크리스 온수기</text>

  <!-- Arrow -->
  <text x="390" y="175" text-anchor="middle" fill="#64748b" font-size="30">--></text>

  <!-- Furnace bar (470만대) — proportionally taller -->
  <rect x="480" y="80" width="420" height="180" rx="10" fill="#22c55e" opacity="0.15"/>
  <rect x="480" y="80" width="420" height="180" rx="10" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="690" y="155" text-anchor="middle" fill="#22c55e" font-size="48" font-weight="800">470</text>
  <text x="690" y="185" text-anchor="middle" fill="#94a3b8" font-size="14">만대/년</text>
  <text x="690" y="245" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">퍼네스 (난방기)</text>

  <!-- Multiplier badge -->
  <rect x="920" y="140" width="80" height="40" rx="20" fill="#22c55e" opacity="0.2"/>
  <rect x="920" y="140" width="80" height="40" rx="20" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="960" y="166" text-anchor="middle" fill="#22c55e" font-size="18" font-weight="800">x4.7</text>

  <!-- Bottom section -->
  <rect x="200" y="280" width="680" height="48" rx="10" fill="#1e293b"/>

  <!-- Status labels -->
  <text x="320" y="300" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">나비엔 1위</text>
  <text x="320" y="318" text-anchor="middle" fill="#64748b" font-size="11">(현재)</text>

  <line x1="430" y1="288" x2="430" y2="322" stroke="#334155" stroke-width="1"/>

  <text x="600" y="300" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">NPF 하이드로 퍼네스로 진입</text>
  <text x="600" y="318" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">5배 큰 시장이 열리고 있다</text>
</svg>