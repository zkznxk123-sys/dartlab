<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="400" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">경동나비엔 마진 폭포 — 매출 100% → 영업이익 9.5%</text>

  <!-- Y-axis baseline -->
  <line x1="100" y1="340" x2="980" y2="340" stroke="#334155" stroke-width="1"/>

  <!-- Scale: 100% = 250px height, base y=340 -->
  <!-- Bar 1: 매출 100% (full bar) -->
  <rect x="120" y="90" width="120" height="250" rx="4" fill="#3b82f6" opacity="0.85"/>
  <text x="180" y="80" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">매출</text>
  <text x="180" y="225" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">100%</text>

  <!-- Bar 2: 원가 -57.5% (falling block) -->
  <rect x="280" y="90" width="120" height="143.75" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="340" y="80" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">매출원가</text>
  <text x="340" y="170" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">-57.5%</text>
  <!-- connector -->
  <line x1="240" y1="90" x2="280" y2="90" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bar 3: 매총이익 42.5% (remaining bar) -->
  <rect x="440" y="233.75" width="120" height="106.25" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="500" y="223" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">매출총이익</text>
  <text x="500" y="296" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">42.5%</text>
  <!-- connector -->
  <line x1="400" y1="233.75" x2="440" y2="233.75" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bar 4: 판관비 -33% (falling block) -->
  <rect x="600" y="233.75" width="120" height="82.5" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="660" y="223" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">판관비</text>
  <text x="660" y="282" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">-33.0%</text>
  <!-- connector -->
  <line x1="560" y1="233.75" x2="600" y2="233.75" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bar 5: 영업이익 9.5% (final bar) -->
  <rect x="760" y="316.25" width="120" height="23.75" rx="4" fill="#22c55e" opacity="0.95"/>
  <text x="820" y="306" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">영업이익</text>
  <text x="820" y="332" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="800">9.5%</text>
  <!-- connector -->
  <line x1="720" y1="316.25" x2="760" y2="316.25" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Annotation -->
  <rect x="330" y="350" width="420" height="30" rx="6" fill="#1e293b"/>
  <text x="540" y="370" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">42.5% 매출총이익률 — 제조업에서 이상하게 높다</text>
</svg>