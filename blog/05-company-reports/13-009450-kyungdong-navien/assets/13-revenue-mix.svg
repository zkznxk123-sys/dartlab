<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" width="1080" height="300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">매출 구성</text>

  <!-- Stacked horizontal bar -->
  <rect x="120" y="70" width="840" height="70" rx="8" fill="#1e293b"/>

  <!-- 국내 30% = 252px -->
  <rect x="120" y="70" width="252" height="70" rx="8" fill="#94a3b8" opacity="0.85"/>
  <text x="246" y="112" text-anchor="middle" fill="#0a0e1a" font-size="16" font-weight="800">30%</text>

  <!-- 북미 57% = 478.8px -->
  <rect x="372" y="70" width="478.8" height="70" fill="#22c55e" opacity="0.85"/>
  <text x="611.4" y="112" text-anchor="middle" fill="#0a0e1a" font-size="16" font-weight="800">57%</text>

  <!-- 기타 해외 13% = 109.2px -->
  <rect x="850.8" y="70" width="109.2" height="70" rx="8" fill="#fbbf24" opacity="0.85"/>
  <text x="905.4" y="112" text-anchor="middle" fill="#0a0e1a" font-size="14" font-weight="800">13%</text>

  <!-- Labels below bar -->
  <rect x="120" y="160" width="18" height="18" rx="3" fill="#94a3b8"/>
  <text x="148" y="175" fill="#f1f5f9" font-size="14" font-weight="600">국내</text>

  <rect x="230" y="160" width="18" height="18" rx="3" fill="#22c55e"/>
  <text x="258" y="175" fill="#f1f5f9" font-size="14" font-weight="600">북미</text>

  <rect x="330" y="160" width="18" height="18" rx="3" fill="#fbbf24"/>
  <text x="358" y="175" fill="#f1f5f9" font-size="14" font-weight="600">기타 해외</text>

  <!-- Trend annotation -->
  <rect x="280" y="210" width="520" height="60" rx="10" fill="#1e293b"/>

  <!-- Mini trend arrow -->
  <text x="320" y="236" fill="#64748b" font-size="13">해외 비중</text>
  <text x="420" y="236" fill="#94a3b8" font-size="15" font-weight="700">57%</text>
  <text x="470" y="236" fill="#64748b" font-size="14">---></text>
  <text x="520" y="236" fill="#22c55e" font-size="15" font-weight="700">70%</text>

  <text x="320" y="258" fill="#64748b" font-size="12">2019</text>
  <text x="520" y="258" fill="#64748b" font-size="12">2024</text>

  <text x="620" y="248" fill="#fbbf24" font-size="13" font-weight="600">5년간 +13%p 해외 확대</text>
</svg>