<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" width="1080" height="350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Financial Scorecard</text>

  <!-- Top row: A badges -->
  <g transform="translate(160, 60)">
    <rect x="0" y="0" width="180" height="80" rx="14" fill="#22c55e" opacity="0.13"/>
    <rect x="0" y="0" width="180" height="80" rx="14" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="90" y="36" text-anchor="middle" fill="#22c55e" font-size="28" font-weight="800">A</text>
    <text x="90" y="62" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">수익성</text>
  </g>
  <g transform="translate(380, 60)">
    <rect x="0" y="0" width="180" height="80" rx="14" fill="#22c55e" opacity="0.13"/>
    <rect x="0" y="0" width="180" height="80" rx="14" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="90" y="36" text-anchor="middle" fill="#22c55e" font-size="28" font-weight="800">A</text>
    <text x="90" y="62" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">이익품질</text>
  </g>
  <g transform="translate(600, 60)">
    <rect x="0" y="0" width="180" height="80" rx="14" fill="#22c55e" opacity="0.13"/>
    <rect x="0" y="0" width="180" height="80" rx="14" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="90" y="36" text-anchor="middle" fill="#22c55e" font-size="28" font-weight="800">A</text>
    <text x="90" y="62" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">재무정합</text>
  </g>

  <!-- Divider "그런데" -->
  <line x1="120" y1="170" x2="480" y2="170" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="540" y="176" text-anchor="middle" fill="#f59e0b" font-size="17" font-weight="700">그런데</text>
  <line x1="600" y1="170" x2="960" y2="170" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Bottom row: C badges -->
  <g transform="translate(160, 195)">
    <rect x="0" y="0" width="180" height="80" rx="14" fill="#f59e0b" opacity="0.13"/>
    <rect x="0" y="0" width="180" height="80" rx="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="90" y="36" text-anchor="middle" fill="#f59e0b" font-size="28" font-weight="800">C</text>
    <text x="90" y="62" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">안정성</text>
  </g>
  <g transform="translate(380, 195)">
    <rect x="0" y="0" width="180" height="80" rx="14" fill="#f59e0b" opacity="0.13"/>
    <rect x="0" y="0" width="180" height="80" rx="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="90" y="36" text-anchor="middle" fill="#f59e0b" font-size="28" font-weight="800">C</text>
    <text x="90" y="62" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">성장</text>
  </g>
  <g transform="translate(600, 195)">
    <rect x="0" y="0" width="180" height="80" rx="14" fill="#f59e0b" opacity="0.13"/>
    <rect x="0" y="0" width="180" height="80" rx="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="90" y="36" text-anchor="middle" fill="#f59e0b" font-size="28" font-weight="800">C</text>
    <text x="90" y="62" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">효율</text>
  </g>

  <!-- Bottom question -->
  <rect x="220" y="300" width="640" height="36" rx="8" fill="#1e293b"/>
  <text x="540" y="324" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="600">왜 이렇게 잘 버는데 현금이 없는가?</text>
</svg>