<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 200" width="1080" height="200" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="200" fill="#0a0e1a"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="540" y="28" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="700">경동나비엔 73년 궤적</text>

  <!-- Main line -->
  <line x1="80" y1="95" x2="1000" y2="95" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Nodes: 7 nodes evenly from x=80 to x=1000, step ~153 -->
  <!-- Node 1: 1951 연탄 -->
  <circle cx="80" cy="95" r="8" fill="#94a3b8"/>
  <text x="80" y="75" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">1951</text>
  <text x="80" y="125" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">연탄</text>

  <!-- Node 2: 1978 보일러 -->
  <circle cx="233" cy="95" r="8" fill="#8faab5"/>
  <text x="233" y="75" text-anchor="middle" fill="#8faab5" font-size="13" font-weight="700">1978</text>
  <text x="233" y="125" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">보일러</text>

  <!-- Node 3: 1988 콘덴싱 -->
  <circle cx="386" cy="95" r="8" fill="#7bb1a3"/>
  <text x="386" y="75" text-anchor="middle" fill="#7bb1a3" font-size="13" font-weight="700">1988</text>
  <text x="386" y="125" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">콘덴싱</text>

  <!-- Node 4: 2006 미국 -->
  <circle cx="540" cy="95" r="8" fill="#5db88e"/>
  <text x="540" y="75" text-anchor="middle" fill="#5db88e" font-size="13" font-weight="700">2006</text>
  <text x="540" y="125" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">미국 진출</text>

  <!-- Node 5: 2012 NPE -->
  <circle cx="693" cy="95" r="8" fill="#44bf7c"/>
  <text x="693" y="75" text-anchor="middle" fill="#44bf7c" font-size="13" font-weight="700">2012</text>
  <text x="693" y="125" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">NPE</text>
  <text x="693" y="142" text-anchor="middle" fill="#64748b" font-size="10">(콘덴싱 온수기)</text>

  <!-- Node 6: 2023 퍼네스 -->
  <circle cx="847" cy="95" r="8" fill="#2ec46b"/>
  <text x="847" y="75" text-anchor="middle" fill="#2ec46b" font-size="13" font-weight="700">2023</text>
  <text x="847" y="125" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">퍼네스</text>
  <text x="847" y="142" text-anchor="middle" fill="#64748b" font-size="10">(NPF 하이드로)</text>

  <!-- Node 7: 2025 3세 -->
  <circle cx="1000" cy="95" r="10" fill="#22c55e"/>
  <circle cx="1000" cy="95" r="14" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <text x="1000" y="75" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">2025</text>
  <text x="1000" y="125" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">3세 경영</text>

  <!-- Bottom note -->
  <text x="540" y="180" text-anchor="middle" fill="#64748b" font-size="12">연탄에서 시작해 북미 1위까지 — 매 전환마다 기술이 무기</text>
</svg>