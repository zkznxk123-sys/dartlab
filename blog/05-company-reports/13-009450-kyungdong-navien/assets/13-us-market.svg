<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" width="1080" height="350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">미국 탱크리스 온수기 시장 점유율</text>
  <text x="540" y="58" text-anchor="middle" fill="#64748b" font-size="13">13년 연속 북미 콘덴싱 가스 온수기 1위</text>

  <!-- Donut chart center at 340, 200 -->
  <!-- Navien 50% = 180deg, Rinnai 25% = 90deg, Others 25% = 90deg -->
  <!-- Start from top (-90deg) -->

  <!-- Others 25%: from 180deg to 270deg -->
  <path d="M340,200 L340,80 A120,120 0 0,1 460,200 Z" fill="#475569"/>

  <!-- Rinnai 25%: from 90deg to 180deg -->
  <path d="M340,200 L460,200 A120,120 0 0,1 340,320 Z" fill="#94a3b8"/>

  <!-- Navien 50%: from 270deg to 90deg (bottom half) -->
  <path d="M340,200 L340,320 A120,120 0 0,1 340,80 Z" fill="#fbbf24"/>

  <!-- Center hole -->
  <circle cx="340" cy="200" r="60" fill="#0a0e1a"/>

  <!-- Center text -->
  <text x="340" y="195" text-anchor="middle" fill="#fbbf24" font-size="24" font-weight="800">~50%</text>
  <text x="340" y="216" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">Navien</text>

  <!-- Legend (right side) -->
  <!-- Navien -->
  <rect x="580" y="110" width="24" height="24" rx="4" fill="#fbbf24"/>
  <text x="616" y="127" fill="#f1f5f9" font-size="16" font-weight="700">Navien</text>
  <text x="780" y="127" fill="#fbbf24" font-size="18" font-weight="800">~50%</text>

  <!-- Rinnai -->
  <rect x="580" y="160" width="24" height="24" rx="4" fill="#94a3b8"/>
  <text x="616" y="177" fill="#f1f5f9" font-size="16" font-weight="700">Rinnai</text>
  <text x="780" y="177" fill="#94a3b8" font-size="18" font-weight="800">~25%</text>

  <!-- Others -->
  <rect x="580" y="210" width="24" height="24" rx="4" fill="#475569"/>
  <text x="616" y="227" fill="#f1f5f9" font-size="16" font-weight="700">Others</text>
  <text x="780" y="227" fill="#475569" font-size="18" font-weight="800">~25%</text>

  <!-- Highlight bar -->
  <rect x="580" y="270" width="320" height="40" rx="8" fill="#fbbf24" opacity="0.1"/>
  <rect x="580" y="270" width="320" height="40" rx="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <text x="740" y="295" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">한국 기업이 미국 1위</text>
</svg>