<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>AMD 2026년 체크포인트 세 가지</title>
  <desc>매출총이익률이 49% 위를 유지하는가, 연 약 35억 달러 인수 무형자산 상각이 얇아지는가, GAAP 영업이익률이 두 자릿수에 안착하는가.</desc>
  <rect width="1000" height="420" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2026년에 봐야 할 세 가지</text>

  <g>
    <rect x="60" y="100" width="280" height="250" rx="14" fill="#11161f" stroke="#22c55e" stroke-width="1.5"/>
    <text x="200" y="150" fill="#22c55e" font-size="40" font-weight="800" text-anchor="middle">1</text>
    <text x="200" y="200" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">매출총이익률 49% 유지</text>
    <text x="200" y="245" fill="#94a3b8" font-size="13" text-anchor="middle">2023 46.1% 골→2025 49.5%.</text>
    <text x="200" y="268" fill="#94a3b8" font-size="13" text-anchor="middle">49% 아래로 빠지면</text>
    <text x="200" y="291" fill="#94a3b8" font-size="13" text-anchor="middle">'진짜 엔진=매출총이익'</text>
    <text x="200" y="314" fill="#94a3b8" font-size="13" text-anchor="middle">관통선이 흔들린다</text>
  </g>
  <g>
    <rect x="360" y="100" width="280" height="250" rx="14" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="500" y="150" fill="#fbbf24" font-size="40" font-weight="800" text-anchor="middle">2</text>
    <text x="500" y="200" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">상각 청구서 얇아지는가</text>
    <text x="500" y="245" fill="#94a3b8" font-size="13" text-anchor="middle">연 약 35억$ 인수</text>
    <text x="500" y="268" fill="#94a3b8" font-size="13" text-anchor="middle">무형자산 상각(10-K).</text>
    <text x="500" y="291" fill="#94a3b8" font-size="13" text-anchor="middle">줄면 OPM·GPM 간극↓,</text>
    <text x="500" y="314" fill="#94a3b8" font-size="13" text-anchor="middle">안 줄면 구조 그대로</text>
  </g>
  <g>
    <rect x="660" y="100" width="280" height="250" rx="14" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="800" y="150" fill="#3b82f6" font-size="40" font-weight="800" text-anchor="middle">3</text>
    <text x="800" y="200" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">OPM 두 자릿수 안착</text>
    <text x="800" y="245" fill="#94a3b8" font-size="13" text-anchor="middle">2025 OPM 10.7%.</text>
    <text x="800" y="268" fill="#94a3b8" font-size="13" text-anchor="middle">한 자릿수로 빠지면</text>
    <text x="800" y="291" fill="#94a3b8" font-size="13" text-anchor="middle">수요·R&amp;D 변동이</text>
    <text x="800" y="314" fill="#94a3b8" font-size="13" text-anchor="middle">여전히 영업이익을 흔듦</text>
  </g>
  <text x="500" y="392" fill="#64748b" font-size="13" text-anchor="middle">dartlab 연결 + 10-K — 원인 귀속은 외부 인용</text>
</svg>
