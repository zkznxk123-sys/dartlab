<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AMD 2025 GAAP bridge</title>
  <desc id="desc">AMD 2025 segment operating income before All Other, All Other loss, GAAP and non-GAAP operating income bridge.</desc>
  <rect width="1200" height="720" fill="#0f172a"/>
  <text x="60" y="76" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">AMD 2025 — 세 사업부가 번 돈을 All Other가 지운다</text>
  <text x="60" y="116" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">단위: USD billions, AMD FY2025 10-K / IR 기준</text>

  <rect x="70" y="170" width="250" height="120" rx="14" fill="#14532d"/>
  <text x="95" y="212" fill="#dcfce7" font-family="Arial, sans-serif" font-size="22" font-weight="700">Gross profit</text>
  <text x="95" y="254" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">$17.2B</text>
  <text x="95" y="280" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="17">Gross margin 50%</text>

  <rect x="390" y="170" width="340" height="170" rx="14" fill="#1d4ed8"/>
  <text x="420" y="212" fill="#dbeafe" font-family="Arial, sans-serif" font-size="22" font-weight="700">Segment OI before All Other</text>
  <text x="420" y="255" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">$7.7B</text>
  <text x="420" y="286" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="17">Data Center $3.6B</text>
  <text x="420" y="313" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="17">Client/Gaming $2.9B · Embedded $1.2B</text>

  <rect x="795" y="170" width="330" height="170" rx="14" fill="#7f1d1d"/>
  <text x="825" y="212" fill="#fee2e2" font-family="Arial, sans-serif" font-size="22" font-weight="700">All Other</text>
  <text x="825" y="255" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="700">-$4.0B</text>
  <text x="825" y="286" fill="#fecaca" font-family="Arial, sans-serif" font-size="17">Intangible amortization $2.3B</text>
  <text x="825" y="313" fill="#fecaca" font-family="Arial, sans-serif" font-size="17">Stock-based compensation $1.6B</text>

  <path d="M730 255 L795 255" stroke="#94a3b8" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M320 230 L390 230" stroke="#94a3b8" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="125" y="445" width="420" height="120" rx="14" fill="#334155"/>
  <text x="155" y="490" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="22" font-weight="700">GAAP operating income</text>
  <text x="155" y="535" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="700">$3.7B · OPM 11%</text>

  <rect x="655" y="445" width="420" height="120" rx="14" fill="#4c1d95"/>
  <text x="685" y="490" fill="#ede9fe" font-family="Arial, sans-serif" font-size="22" font-weight="700">Non-GAAP operating income</text>
  <text x="685" y="535" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="700">$7.8B · OPM 22%</text>

  <text x="150" y="635" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="19">읽는 순서: 본업 segment OI → All Other 비용 → GAAP OI. non-GAAP은 보조 렌즈일 뿐 최종 손익이 아니다.</text>
</svg>
