<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출총이익률은 49%대로 회복하고 GAAP 영업이익도 0.40B에서 3.69B로 되올라왔다</title>
  <desc>2023년 바닥(매출총이익률 46.1%·GAAP 영업이익 0.40B) 이후 2024~2025년 매출총이익률은 49.3%·49.5%로, GAAP 영업이익은 1.90B·3.69B로 회복했다. 수요 회복과 상각 청구서가 상대적으로 얇아진 두 힘이 겹친 결과로 양립한다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">바닥에서 되올라온 두 줄</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">매출총이익률(라인) 49%대 회복 + GAAP 영업이익(막대) 0.40B→3.69B</text>

  <line x1="100" y1="110" x2="100" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="400" x2="920" y2="400" stroke="#334155" stroke-width="1"/>

  <!-- OI bars 2023-2025 -->
  <g>
    <rect x="180" y="383" width="120" height="17" rx="4" fill="#ef4444"/>
    <text x="240" y="375" fill="#f87171" font-size="14" font-weight="700" text-anchor="middle">0.40B</text>
    <rect x="450" y="320" width="120" height="80" rx="4" fill="#3b82f6" opacity="0.7"/>
    <text x="510" y="312" fill="#93c5fd" font-size="14" font-weight="700" text-anchor="middle">1.90B</text>
    <rect x="720" y="244" width="120" height="156" rx="4" fill="#22c55e" opacity="0.7"/>
    <text x="780" y="236" fill="#4ade80" font-size="14" font-weight="700" text-anchor="middle">3.69B</text>
  </g>

  <!-- GPM line -->
  <polyline points="240,250 510,210 780,205" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="240" cy="250" r="5" fill="#fbbf24"/><circle cx="510" cy="210" r="5" fill="#fbbf24"/><circle cx="780" cy="205" r="5" fill="#fbbf24"/>
  <text x="240" y="240" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">GPM 46.1%</text>
  <text x="510" y="200" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">49.3%</text>
  <text x="795" y="195" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">49.5%</text>

  <g fill="#64748b" font-size="14" text-anchor="middle">
    <text x="240" y="425">2023</text><text x="510" y="425">2024</text><text x="780" y="425">2025</text>
  </g>

  <rect x="160" y="450" width="680" height="56" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="1.2"/>
  <text x="500" y="475" fill="#4ade80" font-size="14" font-weight="700" text-anchor="middle">수요 회복 + 상각 청구서가 얇아짐 — 두 힘의 겹침(양립)</text>
  <text x="500" y="497" fill="#64748b" font-size="13" text-anchor="middle">시험대 = GPM이 49% 위를 지키고 상각 라인이 줄어드는지</text>
</svg>
