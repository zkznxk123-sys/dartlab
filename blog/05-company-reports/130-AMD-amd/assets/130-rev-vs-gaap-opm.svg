<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 신고점 행진인데 GAAP 영업이익률만 2023년 1.8%로 붕괴</title>
  <desc>AMD 매출은 2019년 67억 달러에서 2025년 346억 달러로 5배 넘게 커졌지만, GAAP 영업이익률(OPM)은 2021년 22.2%에서 2022년 5.4%, 2023년 1.8%로 주저앉았다가 2025년 10.7%로 회복했다. 매출 신고점과 영업이익률 붕괴가 같은 해에 겹친다.</desc>
  <rect width="1000" height="560" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">매출은 5배, GAAP 영업이익률은 1.8%까지 붕괴</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">매출(라인, 좌축 $B) vs GAAP 영업이익률(막대, 우축 %)</text>

  <!-- axes -->
  <line x1="90" y1="120" x2="90" y2="430" stroke="#334155" stroke-width="1"/>
  <line x1="90" y1="430" x2="930" y2="430" stroke="#334155" stroke-width="1"/>

  <!-- OPM bars (right axis 0-25%) baseline 430, scale: 25% -> 300px -->
  <g>
    <rect x="115" y="317" width="70" height="113" fill="#3b82f6" opacity="0.45"/>
    <rect x="230" y="262" width="70" height="168" fill="#3b82f6" opacity="0.55"/>
    <rect x="345" y="164" width="70" height="266" fill="#3b82f6" opacity="0.7"/>
    <rect x="460" y="365" width="70" height="65" fill="#ef4444" opacity="0.85"/>
    <rect x="575" y="408" width="70" height="22" fill="#ef4444"/>
    <rect x="690" y="341" width="70" height="89" fill="#3b82f6" opacity="0.6"/>
    <rect x="805" y="302" width="70" height="128" fill="#22c55e" opacity="0.7"/>
  </g>
  <g fill="#cbd5e1" font-size="13" font-weight="700" text-anchor="middle">
    <text x="150" y="307">9.4%</text>
    <text x="265" y="252">14.0%</text>
    <text x="380" y="154">22.2%</text>
    <text x="495" y="355" fill="#f87171">5.4%</text>
    <text x="610" y="398" fill="#f87171">1.8%</text>
    <text x="725" y="331">7.4%</text>
    <text x="840" y="292" fill="#4ade80">10.7%</text>
  </g>

  <!-- revenue line (left axis), points scaled -->
  <polyline points="150,415 265,400 380,355 495,310 610,318 725,295 840,235" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <g fill="#fbbf24">
    <circle cx="150" cy="415" r="4"/><circle cx="265" cy="400" r="4"/><circle cx="380" cy="355" r="4"/>
    <circle cx="495" cy="310" r="4"/><circle cx="610" cy="318" r="4"/><circle cx="725" cy="295" r="4"/><circle cx="840" cy="235" r="5"/>
  </g>
  <text x="150" y="405" fill="#fbbf24" font-size="11" text-anchor="middle">6.7</text>
  <text x="495" y="300" fill="#fbbf24" font-size="11" text-anchor="middle">23.6</text>
  <text x="840" y="223" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">$34.6B</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="150" y="452">2019</text><text x="265" y="452">2020</text><text x="380" y="452">2021</text>
    <text x="495" y="452">2022</text><text x="610" y="452">2023</text><text x="725" y="452">2024</text><text x="840" y="452">2025</text>
  </g>

  <rect x="150" y="478" width="700" height="62" rx="10" fill="#11161f" stroke="#ef4444" stroke-width="1.2"/>
  <text x="500" y="505" fill="#f87171" font-size="14" font-weight="700" text-anchor="middle">매출 신고점(2022~)과 영업이익률 붕괴(5.4%·1.8%)가 같은 해에 겹친다</text>
  <text x="500" y="528" fill="#64748b" font-size="13" text-anchor="middle">붕괴는 매출이 아니라 매출총이익 아래에서 왔다 — 다음 장</text>
</svg>
