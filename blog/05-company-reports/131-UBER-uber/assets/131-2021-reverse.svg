<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2021년에는 순이익(-0.57)이 영업손실(-3.83)보다 오히려 양호했다</title>
  <desc>2022년·2024년과 달리 2021년에는 영업선 아래가 순이익을 끌어내리기는커녕 끌어올렸다. 순이익 -0.57B가 영업손실 -3.83B보다 양호하다. 괴리는 양방향이라 '잡음이 순이익을 끌어내리기만 한다'는 한 방향 프레이밍은 틀린다.</desc>
  <rect width="1000" height="460" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2021년 — 반대 방향 괴리</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">이 해엔 순이익이 영업손실보다 오히려 '덜' 나빴다</text>

  <line x1="120" y1="120" x2="120" y2="340" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="140" x2="880" y2="140" stroke="#475569" stroke-width="1.5"/>
  <text x="888" y="144" fill="#64748b" font-size="12">0</text>

  <rect x="230" y="140" width="160" height="180" fill="#3b82f6" opacity="0.55"/>
  <text x="310" y="343" fill="#60a5fa" font-size="16" font-weight="700" text-anchor="middle">영업손실</text>
  <text x="310" y="366" fill="#93c5fd" font-size="18" font-weight="800" text-anchor="middle">-3.83B</text>

  <rect x="610" y="140" width="160" height="27" fill="#22c55e" opacity="0.75"/>
  <text x="690" y="200" fill="#4ade80" font-size="16" font-weight="700" text-anchor="middle">순이익</text>
  <text x="690" y="223" fill="#86efac" font-size="18" font-weight="800" text-anchor="middle">-0.57B</text>

  <path d="M 410 230 Q 510 180 590 165" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="500" y="175" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">영업선 아래가 ↑</text>

  <rect x="200" y="388" width="600" height="50" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="1.2"/>
  <text x="500" y="418" fill="#4ade80" font-size="14" font-weight="700" text-anchor="middle">괴리는 양방향 — '잡음이 순이익을 끌어내리기만 한다'는 틀렸다</text>
</svg>
