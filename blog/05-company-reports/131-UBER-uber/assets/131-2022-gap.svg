<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2022년 영업이익 -1.83과 순이익 -9.14의 약 -7.3 격차는 지분 평가손실과 정합</title>
  <desc>2022년 영업이익은 -1.83B로 거의 본전 근처였지만 순이익은 -9.14B로 훨씬 깊었다. 약 -7.3 격차는 오로라·그랩·디디·조마토 지분 평가손실(약 -70억 달러)과 같은 방향·규모로 정합한다.</desc>
  <rect width="1000" height="480" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2022년 — 영업은 본전 근처, 순이익은 -9.14</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">약 -7.3 격차 ≈ 보유 지분 평가손실 약 -70억 달러(정합)</text>

  <line x1="120" y1="130" x2="120" y2="380" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="160" x2="880" y2="160" stroke="#475569" stroke-width="1.5"/>
  <text x="888" y="164" fill="#64748b" font-size="12">0</text>

  <rect x="200" y="160" width="150" height="42" fill="#3b82f6" opacity="0.7"/>
  <text x="275" y="225" fill="#60a5fa" font-size="16" font-weight="700" text-anchor="middle">영업이익</text>
  <text x="275" y="248" fill="#93c5fd" font-size="18" font-weight="800" text-anchor="middle">-1.83B</text>

  <rect x="620" y="160" width="150" height="210" fill="#ef4444" opacity="0.85"/>
  <text x="695" y="393" fill="#f87171" font-size="16" font-weight="700" text-anchor="middle">순이익</text>
  <text x="695" y="416" fill="#fca5a5" font-size="18" font-weight="800" text-anchor="middle">-9.14B</text>

  <!-- gap bracket -->
  <line x1="430" y1="200" x2="430" y2="370" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="500" y="295" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">약 -7.3</text>
  <text x="500" y="318" fill="#94a3b8" font-size="13" text-anchor="middle">= 지분 평가손실</text>
  <text x="500" y="340" fill="#94a3b8" font-size="12" text-anchor="middle">오로라 -3.0 / 그랩 -2.1</text>
  <text x="500" y="358" fill="#94a3b8" font-size="12" text-anchor="middle">디디 -1.0 / 조마토 -0.75</text>

  <text x="500" y="452" fill="#64748b" font-size="13" text-anchor="middle">내부(연결순이익) vs 외부(8-K 평가손실) — 자릿수 단정 아닌 '정합'까지만</text>
</svg>
