<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>우버 2026년 체크포인트 세 가지</title>
  <desc>영업이익·영업현금흐름이 양을 유지하며 동행하는가, 일회성이 빠진 순이익이 영업이익에 근접하는가, 지분 포트폴리오 시가의 방향.</desc>
  <rect width="1000" height="420" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2026년에 봐야 할 세 가지</text>

  <g>
    <rect x="60" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#22c55e" stroke-width="1.5"/>
    <text x="200" y="150" fill="#22c55e" font-size="40" font-weight="800" text-anchor="middle">1</text>
    <text x="200" y="198" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">영업이익·OCF 동행</text>
    <text x="200" y="240" fill="#94a3b8" font-size="13" text-anchor="middle">2025 +5.57·+10.10B.</text>
    <text x="200" y="263" fill="#94a3b8" font-size="13" text-anchor="middle">둘이 양(+) 유지·단조</text>
    <text x="200" y="286" fill="#94a3b8" font-size="13" text-anchor="middle">상승하면 '영업라인이</text>
    <text x="200" y="309" fill="#94a3b8" font-size="13" text-anchor="middle">진짜 상태' 유지</text>
  </g>
  <g>
    <rect x="360" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="500" y="150" fill="#fbbf24" font-size="40" font-weight="800" text-anchor="middle">2</text>
    <text x="500" y="198" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">일회성 빠진 순이익</text>
    <text x="500" y="240" fill="#94a3b8" font-size="13" text-anchor="middle">2024 +64억$ 세무환입</text>
    <text x="500" y="263" fill="#94a3b8" font-size="13" text-anchor="middle">은 일회성. 빠진 뒤</text>
    <text x="500" y="286" fill="#94a3b8" font-size="13" text-anchor="middle">순이익이 영업이익에</text>
    <text x="500" y="309" fill="#94a3b8" font-size="13" text-anchor="middle">근접하면 진단 확인</text>
  </g>
  <g>
    <rect x="660" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="800" y="150" fill="#3b82f6" font-size="40" font-weight="800" text-anchor="middle">3</text>
    <text x="800" y="198" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">지분 시가 방향</text>
    <text x="800" y="240" fill="#94a3b8" font-size="13" text-anchor="middle">디디·그랩·오로라가</text>
    <text x="800" y="263" fill="#94a3b8" font-size="13" text-anchor="middle">빠진 분기엔 영업+인데</text>
    <text x="800" y="286" fill="#94a3b8" font-size="13" text-anchor="middle">순이익이 꺾이는</text>
    <text x="800" y="309" fill="#94a3b8" font-size="13" text-anchor="middle">'2022 재현'이 나오나</text>
  </g>
  <text x="500" y="392" fill="#64748b" font-size="13" text-anchor="middle">dartlab 연결 — 구성 분해(지분·세금)는 8-K·10-K 외부 인용</text>
</svg>
