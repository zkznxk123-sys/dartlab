<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익은 단조롭게 위로 기는데 순이익만 -9.14에서 +9.85까지 거칠게 출렁인다</title>
  <desc>2019~2025년 영업이익은 -8.60에서 +5.57로 단조롭게 회복하지만, 헤드라인 순이익은 2022년 -9.14, 2024년 +9.85로 거칠게 출렁인다. 그 격차가 영업선 아래(지분평가·세금)의 진폭이다.</desc>
  <rect width="1000" height="540" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">영업라인은 잔잔, 순이익만 출렁</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업이익(파랑)은 단조 회복, 순이익(주황)은 -9.14 ~ +9.85 진폭 — $B</text>

  <line x1="90" y1="120" x2="910" y2="120" stroke="#1e293b" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="90" y1="300" x2="910" y2="300" stroke="#475569" stroke-width="1.5"/>
  <text x="918" y="304" fill="#64748b" font-size="12">0</text>
  <line x1="90" y1="120" x2="90" y2="480" stroke="#334155" stroke-width="1"/>

  <!-- operating income line (smooth up) -->
  <polyline points="120,455 250,400 380,378 510,350 640,283 770,255 900,210" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <g fill="#3b82f6"><circle cx="120" cy="455" r="4"/><circle cx="510" cy="350" r="4"/><circle cx="640" cy="283" r="5"/><circle cx="900" cy="210" r="5"/></g>
  <text x="120" y="475" fill="#3b82f6" font-size="11" text-anchor="middle">-8.60</text>
  <text x="640" y="275" fill="#60a5fa" font-size="11" text-anchor="middle">+1.11</text>
  <text x="900" y="200" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">영업 +5.57</text>

  <!-- net income (volatile) -->
  <polyline points="120,452 250,420 380,312 510,475 640,265 770,128 900,125" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="510" cy="475" r="6" fill="#ef4444"/><text x="510" y="495" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">순익 -9.14</text>
  <circle cx="770" cy="128" r="6" fill="#fbbf24"/><text x="770" y="118" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">+9.85</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="120" y="510">2019</text><text x="380" y="510">2021</text><text x="510" y="510">2022</text><text x="640" y="510">2023</text><text x="770" y="510">2024</text><text x="900" y="510">2025</text>
  </g>
  <text x="500" y="530" fill="#94a3b8" font-size="13" text-anchor="middle">격차 = 영업선 아래(지분평가·세금)의 진폭 — 순이익은 가장 시끄러운 줄</text>
</svg>
