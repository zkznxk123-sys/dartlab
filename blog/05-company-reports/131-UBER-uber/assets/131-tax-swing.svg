<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2022년 -70억 평가손실과 2024년 +64억 세무 환입은 같은 통장의 양 끝</title>
  <desc>2022년에는 보유 지분 평가손실 약 -70억 달러가, 2024년에는 약 64억 달러 이연법인세 환입과 분기 지분 평가이익이 순이익을 거꾸로 흔들었다. 같은 포트폴리오 시가와 세무 재평가가 양 끝으로 출렁인 것이다.</desc>
  <rect width="1000" height="480" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">같은 진자의 양 끝</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">2022 평가손실(좌) ↔ 2024 세무 환입·평가이익(우)</text>

  <line x1="500" y1="120" x2="500" y2="400" stroke="#334155" stroke-width="1.5"/>
  <line x1="120" y1="260" x2="880" y2="260" stroke="#475569" stroke-width="1.5"/>

  <!-- 2022 down -->
  <rect x="220" y="260" width="120" height="120" fill="#ef4444" opacity="0.8"/>
  <text x="280" y="240" fill="#f87171" font-size="15" font-weight="700" text-anchor="middle">2022</text>
  <text x="280" y="345" fill="#fff" font-size="16" font-weight="800" text-anchor="middle">-70억$</text>
  <text x="280" y="400" fill="#94a3b8" font-size="12" text-anchor="middle">지분 평가손실</text>

  <!-- 2024 up -->
  <rect x="660" y="140" width="120" height="120" fill="#22c55e" opacity="0.7"/>
  <text x="720" y="130" fill="#4ade80" font-size="15" font-weight="700" text-anchor="middle">2024</text>
  <text x="720" y="195" fill="#fff" font-size="15" font-weight="800" text-anchor="middle">+64억$ 세무</text>
  <text x="720" y="225" fill="#dcfce7" font-size="13" text-anchor="middle">+17억$ 평가이익</text>

  <text x="500" y="438" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">64억(세후)·17억(세전)은 성격이 달라 단순 합산 금지 — '복합 정합'</text>
  <text x="500" y="462" fill="#64748b" font-size="13" text-anchor="middle">같은 디디·오로라·그랩 포트폴리오 시가가 거꾸로 돈 것 + 세무 재평가</text>
</svg>
