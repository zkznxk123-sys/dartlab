<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>설비투자가 매출의 4.5%에서 약 29%로 2020년 기준 6배 넘게 뛰었다</title>
  <desc>설비투자/매출 비율은 2020년 4.5%에서 2023년 약 28.9%로 6배 넘게 상승했고 2025년에도 25.7%로 평상의 3배 가까이 머문다. 어느 해도 10% 미만으로 복귀하지 않았다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">매출 100원에 공장 29원</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">설비투자(capex) / 매출 — 2020년 4.5%에서 6배 넘게</text>

  <line x1="100" y1="110" x2="100" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="400" x2="930" y2="400" stroke="#334155" stroke-width="1"/>

  <!-- bars, scale 31% -> 290px -->
  <g>
    <rect x="150" y="358" width="90" height="42" fill="#22c55e" opacity="0.6"/><text x="195" y="348" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">4.5%</text>
    <rect x="290" y="275" width="90" height="125" fill="#3b82f6" opacity="0.6"/><text x="335" y="265" fill="#93c5fd" font-size="13" font-weight="700" text-anchor="middle">13.4%</text>
    <rect x="430" y="269" width="90" height="131" fill="#3b82f6" opacity="0.65"/><text x="475" y="259" fill="#93c5fd" font-size="13" font-weight="700" text-anchor="middle">14.0%</text>
    <rect x="570" y="130" width="90" height="270" fill="#ef4444" opacity="0.85"/><text x="615" y="120" fill="#f87171" font-size="14" font-weight="700" text-anchor="middle">28.9%</text>
    <rect x="710" y="112" width="90" height="288" fill="#ef4444"/><text x="755" y="102" fill="#f87171" font-size="14" font-weight="700" text-anchor="middle">30.8%</text>
    <rect x="850" y="160" width="90" height="240" fill="#f59e0b" opacity="0.8"/><text x="895" y="150" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">25.7%</text>
  </g>

  <!-- 10% reference line -->
  <line x1="100" y1="307" x2="930" y2="307" stroke="#475569" stroke-width="1" stroke-dasharray="6 5"/>
  <text x="115" y="300" fill="#64748b" font-size="12">평상 ~10% 미만</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="195" y="422">2020</text><text x="335" y="422">2021</text><text x="475" y="422">2022</text><text x="615" y="422">2023</text><text x="755" y="422">2024</text><text x="895" y="422">2025</text>
  </g>

  <rect x="180" y="450" width="640" height="56" rx="10" fill="#11161f" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="500" y="475" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">어느 해도 10% 미만으로 복귀하지 않았다</text>
  <text x="500" y="497" fill="#64748b" font-size="13" text-anchor="middle">2025년에도 25.7% — 평상의 약 3배 (FCF 정의상 분해로 FCF를 끌어내림)</text>
</svg>
