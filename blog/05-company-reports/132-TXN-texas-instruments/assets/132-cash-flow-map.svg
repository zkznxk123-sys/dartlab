<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2023년 영업현금흐름 6.42B 중 5.07B가 설비투자로 빠져 잉여현금은 1.35B만 남았다</title>
  <desc>영업으로 들어온 현금 6.42B에서 신규 300mm 팹 설비투자 5.07B가 빠지면 빚을 갚고 배당·자사주에 쓸 잉여현금흐름은 1.35B만 남는다. 사라진 현금은 손실이 아니라 미래 생산능력에 묻혔다.</desc>
  <rect width="1000" height="460" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">현금은 어디로 흘렀나 (2023년)</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업현금흐름 6.42B → 설비투자 5.07B가 삼키고 → 잉여 1.35B</text>

  <!-- OCF source -->
  <rect x="60" y="170" width="170" height="120" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="2"/>
  <text x="145" y="215" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">영업현금흐름</text>
  <text x="145" y="252" fill="#4ade80" font-size="24" font-weight="800" text-anchor="middle">6.42B</text>

  <!-- big flow to capex -->
  <polygon points="230,185 640,140 640,300 230,250" fill="#ef4444" opacity="0.35"/>
  <rect x="640" y="120" width="180" height="150" rx="10" fill="#11161f" stroke="#ef4444" stroke-width="2"/>
  <text x="730" y="160" fill="#f87171" font-size="15" font-weight="700" text-anchor="middle">신규 팹 설비투자</text>
  <text x="730" y="200" fill="#fca5a5" font-size="26" font-weight="800" text-anchor="middle">5.07B</text>
  <text x="730" y="235" fill="#94a3b8" font-size="12" text-anchor="middle">셔먼·리하이 300mm</text>

  <!-- small flow to FCF -->
  <polygon points="230,260 640,330 640,360 230,275" fill="#fbbf24" opacity="0.45"/>
  <rect x="640" y="320" width="180" height="80" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="2"/>
  <text x="730" y="352" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">잉여현금흐름</text>
  <text x="730" y="382" fill="#fde68a" font-size="20" font-weight="800" text-anchor="middle">1.35B</text>

  <text x="500" y="438" fill="#64748b" font-size="13" text-anchor="middle">사라진 현금은 손실이 아니라 땅에 묻은 미래 생산능력 — 단, 베팅의 성패는 미결</text>
</svg>
