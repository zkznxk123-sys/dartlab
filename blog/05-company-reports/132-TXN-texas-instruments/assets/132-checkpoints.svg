<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 재레버리지됐는데 capex/매출은 25.7%, FCF는 2.60B로 복원 미실현</title>
  <desc>2025년 매출이 17.68B로 회복됐지만 설비투자/매출은 25.7%로 평상의 3배 가까이, 잉여현금흐름은 2.60B로 5B 추세에 못 미친다. '매출 회복=capex 정상화=FCF 복원' 시나리오가 아직 실현되지 않았다.</desc>
  <rect width="1000" height="440" fill="#0a0e1a"/>
  <text x="500" y="48" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">복원되지 않은 약속</text>
  <text x="500" y="80" fill="#64748b" font-size="15" text-anchor="middle">매출은 돌아왔는데 capex/매출도 FCF도 평상으로 돌아오지 않았다</text>

  <g>
    <rect x="80" y="120" width="260" height="230" rx="14" fill="#11161f" stroke="#22c55e" stroke-width="1.5"/>
    <text x="210" y="170" fill="#94a3b8" font-size="15" text-anchor="middle">매출 (재레버리지)</text>
    <text x="210" y="220" fill="#22c55e" font-size="34" font-weight="800" text-anchor="middle">17.68B</text>
    <text x="210" y="255" fill="#64748b" font-size="13" text-anchor="middle">2024 15.64 → 2025</text>
    <text x="210" y="300" fill="#4ade80" font-size="15" text-anchor="middle">↗ 회복은 했다</text>
  </g>
  <g>
    <rect x="370" y="120" width="260" height="230" rx="14" fill="#11161f" stroke="#ef4444" stroke-width="1.5"/>
    <text x="500" y="170" fill="#94a3b8" font-size="15" text-anchor="middle">capex / 매출</text>
    <text x="500" y="220" fill="#f87171" font-size="34" font-weight="800" text-anchor="middle">25.7%</text>
    <text x="500" y="255" fill="#64748b" font-size="13" text-anchor="middle">평상 10% 미만 vs</text>
    <text x="500" y="300" fill="#f87171" font-size="15" text-anchor="middle">✗ 정상화 안 됨</text>
  </g>
  <g>
    <rect x="660" y="120" width="260" height="230" rx="14" fill="#11161f" stroke="#ef4444" stroke-width="1.5"/>
    <text x="790" y="170" fill="#94a3b8" font-size="15" text-anchor="middle">잉여현금흐름(FCF)</text>
    <text x="790" y="220" fill="#f87171" font-size="34" font-weight="800" text-anchor="middle">2.60B</text>
    <text x="790" y="255" fill="#64748b" font-size="13" text-anchor="middle">추세 5B+ 대비</text>
    <text x="790" y="300" fill="#f87171" font-size="15" text-anchor="middle">✗ 복원 미실현</text>
  </g>
  <text x="500" y="408" fill="#64748b" font-size="13" text-anchor="middle">승부는 2026년 이후 capex/매출이 정말 내려오는지로 미뤄진 미결 상태</text>
</svg>
