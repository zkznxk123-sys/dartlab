<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률은 50.6%에서 34.1%로, 순이익은 8.71B에서 4.97B로 함께 빠졌다</title>
  <desc>영업이익률(OPM)은 2022년 50.6% 정점에서 2025년 34.1%로 약 16%포인트 내려앉았고 순이익은 8.71B에서 4.97B로 약 43% 줄었다. 영업현금흐름이 버텨도 회계상 이익은 함께 깎였다.</desc>
  <rect width="1000" height="520" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">현금은 버텨도 이익은 빠졌다</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업이익률(OPM, 라인 %) + 순이익(막대 $B) — '엔진만 멀쩡' 아님</text>

  <line x1="100" y1="110" x2="100" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="400" x2="930" y2="400" stroke="#334155" stroke-width="1"/>

  <!-- NI bars -->
  <g>
    <rect x="150" y="252" width="80" height="148" fill="#3b82f6" opacity="0.5"/><text x="190" y="242" fill="#93c5fd" font-size="12" text-anchor="middle">5.57</text>
    <rect x="290" y="194" width="80" height="206" fill="#3b82f6" opacity="0.55"/><text x="330" y="184" fill="#93c5fd" font-size="12" text-anchor="middle">7.74</text>
    <rect x="430" y="168" width="80" height="232" fill="#22c55e" opacity="0.6"/><text x="470" y="158" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">8.71</text>
    <rect x="570" y="227" width="80" height="173" fill="#3b82f6" opacity="0.5"/><text x="610" y="217" fill="#93c5fd" font-size="12" text-anchor="middle">6.48</text>
    <rect x="710" y="273" width="80" height="127" fill="#ef4444" opacity="0.7"/><text x="750" y="263" fill="#f87171" font-size="12" text-anchor="middle">4.78</text>
    <rect x="850" y="268" width="80" height="132" fill="#ef4444" opacity="0.7"/><text x="890" y="258" fill="#f87171" font-size="13" font-weight="700" text-anchor="middle">4.97</text>
  </g>

  <!-- OPM line -->
  <polyline points="190,200 330,158 470,148 610,196 750,260 890,265" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="470" cy="148" r="5" fill="#fbbf24"/><text x="470" y="138" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">OPM 50.6%</text>
  <circle cx="890" cy="265" r="5" fill="#fbbf24"/><text x="890" y="290" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">34.1%</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="190" y="422">2020</text><text x="330" y="422">2021</text><text x="470" y="422">2022</text><text x="610" y="422">2023</text><text x="750" y="422">2024</text><text x="890" y="422">2025</text>
  </g>

  <rect x="180" y="450" width="640" height="56" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="500" y="475" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">OPM −16%p, 순이익 약 −43% — 함께 깎였다</text>
  <text x="500" y="497" fill="#64748b" font-size="12" text-anchor="middle">원인이 감가상각/사이클/믹스 중 무엇인지는 데이터로 구분 불가(~로 보인다)</text>
</svg>
