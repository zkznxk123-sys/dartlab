<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업현금흐름은 6~9B로 평탄한데 잉여현금흐름만 5.49B에서 1.35B로 무너졌다</title>
  <desc>2020~2025년 영업현금흐름(OCF)은 6.14~8.76B 밴드로 비교적 평탄했지만, 잉여현금흐름(FCF=OCF−capex)은 2020년 5.49B에서 2023년 1.35B로 약 75% 붕괴했다. 그 차이를 설비투자가 가져갔다.</desc>
  <rect width="1000" height="540" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">버는 현금은 그대로, 남는 현금만 증발</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업현금흐름(OCF, 위 라인) vs 잉여현금흐름(FCF, 아래 라인) — $B</text>

  <line x1="100" y1="120" x2="100" y2="420" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="420" x2="930" y2="420" stroke="#334155" stroke-width="1"/>

  <!-- OCF line ~ flat high -->
  <polyline points="150,250 290,170 430,172 570,240 710,245 850,215" fill="none" stroke="#22c55e" stroke-width="3"/>
  <g fill="#22c55e"><circle cx="150" cy="250" r="5"/><circle cx="290" cy="170" r="5"/><circle cx="430" cy="172" r="5"/><circle cx="570" cy="240" r="5"/><circle cx="710" cy="245" r="5"/><circle cx="850" cy="215" r="5"/></g>
  <text x="150" y="240" fill="#22c55e" font-size="12" text-anchor="middle">6.14</text>
  <text x="850" y="205" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">OCF 7.15</text>

  <!-- FCF line collapse -->
  <polyline points="150,270 290,250 430,260 570,390 710,387 850,365" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <g fill="#fbbf24"><circle cx="150" cy="270" r="5"/><circle cx="290" cy="250" r="5"/><circle cx="430" cy="260" r="5"/></g>
  <circle cx="570" cy="390" r="6" fill="#ef4444"/>
  <g fill="#fbbf24"><circle cx="710" cy="387" r="5"/><circle cx="850" cy="365" r="5"/></g>
  <text x="150" y="293" fill="#fbbf24" font-size="12" text-anchor="middle">5.49</text>
  <text x="570" y="410" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">FCF 1.35</text>
  <text x="850" y="355" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">2.60</text>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="150" y="442">2020</text><text x="290" y="442">2021</text><text x="430" y="442">2022</text><text x="570" y="442">2023</text><text x="710" y="442">2024</text><text x="850" y="442">2025</text>
  </g>

  <rect x="160" y="468" width="680" height="58" rx="10" fill="#11161f" stroke="#ef4444" stroke-width="1.2"/>
  <text x="500" y="493" fill="#f87171" font-size="14" font-weight="700" text-anchor="middle">OCF는 +0.28B 늘었는데도 FCF는 4.14B 빠졌다</text>
  <text x="500" y="515" fill="#64748b" font-size="13" text-anchor="middle">차이를 설비투자(capex)가 다 가져갔다 — 다음 장</text>
</svg>
