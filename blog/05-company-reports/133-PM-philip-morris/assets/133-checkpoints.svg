<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>필립모리스 2026년 체크포인트 세 가지</title>
  <desc>영업이익률이 정점 41.3%를 향해 더 오르는가 35~37%에 안착하는가, 순이익이 영업이익 성장 속도를 따라가는가, 무연 매출이 전사 성장을 끌고 가는가.</desc>
  <rect width="1000" height="420" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2026년에 봐야 할 세 가지</text>

  <g>
    <rect x="60" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="200" y="150" fill="#fbbf24" font-size="40" font-weight="800" text-anchor="middle">1</text>
    <text x="200" y="196" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">OPM 재정상화</text>
    <text x="200" y="238" fill="#94a3b8" font-size="13" text-anchor="middle">2025 36.6%가 정점</text>
    <text x="200" y="261" fill="#94a3b8" font-size="13" text-anchor="middle">41.3%로 더 오르나,</text>
    <text x="200" y="284" fill="#94a3b8" font-size="13" text-anchor="middle">35~37%에 안착하나.</text>
    <text x="200" y="307" fill="#94a3b8" font-size="13" text-anchor="middle">눌림이 일회성이었는지</text>
  </g>
  <g>
    <rect x="360" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#22c55e" stroke-width="1.5"/>
    <text x="500" y="150" fill="#22c55e" font-size="40" font-weight="800" text-anchor="middle">2</text>
    <text x="500" y="196" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">순이익이 따라가나</text>
    <text x="500" y="238" fill="#94a3b8" font-size="13" text-anchor="middle">2025 11.35B 반등이</text>
    <text x="500" y="261" fill="#94a3b8" font-size="13" text-anchor="middle">영업이익 14.9B 성장과</text>
    <text x="500" y="284" fill="#94a3b8" font-size="13" text-anchor="middle">정렬되면 일회성 확인,</text>
    <text x="500" y="307" fill="#94a3b8" font-size="13" text-anchor="middle">다시 갈라지면 '흉터'</text>
  </g>
  <g>
    <rect x="660" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="800" y="150" fill="#3b82f6" font-size="40" font-weight="800" text-anchor="middle">3</text>
    <text x="800" y="196" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">무연이 끄는가(외부)</text>
    <text x="800" y="238" fill="#94a3b8" font-size="13" text-anchor="middle">무연 비중 39%(2024)가</text>
    <text x="800" y="261" fill="#94a3b8" font-size="13" text-anchor="middle">50%로 오르는 동안</text>
    <text x="800" y="284" fill="#94a3b8" font-size="13" text-anchor="middle">GPM 63~68% 유지하면</text>
    <text x="800" y="307" fill="#94a3b8" font-size="13" text-anchor="middle">'마진 중립 전환' 증거</text>
  </g>
  <text x="500" y="392" fill="#64748b" font-size="13" text-anchor="middle">dartlab 연결 — 무연 비중·손상 원인은 IR·8-K 외부 인용</text>
</svg>
