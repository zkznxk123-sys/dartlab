<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출총이익률은 6년간 63~68% 밴드를 한 번도 벗어나지 않았다</title>
  <desc>매출이 29.8B에서 40.6B로 +36% 자라는 동안 매출총이익률(GPM)은 63.3~68.1% 밴드 안에 머물렀다. 무연 전환에도 전사 매출총이익률은 희석되지 않았다.</desc>
  <rect width="1000" height="480" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">갈아끼우는데도 안 무너진 매출총이익률</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">매출 +36% 자라는 동안 GPM은 63~68% 밴드 — 무연 전환에도</text>

  <!-- band -->
  <rect x="120" y="150" width="800" height="90" fill="#22c55e" opacity="0.12"/>
  <line x1="120" y1="150" x2="920" y2="150" stroke="#22c55e" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="120" y1="240" x2="920" y2="240" stroke="#22c55e" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="930" y="155" fill="#4ade80" font-size="12">68%</text>
  <text x="930" y="244" fill="#4ade80" font-size="12">63%</text>

  <line x1="120" y1="380" x2="920" y2="380" stroke="#334155" stroke-width="1"/>

  <!-- GPM line -->
  <polyline points="160,200 290,165 420,160 550,225 680,235 790,195 870,170" fill="none" stroke="#22c55e" stroke-width="3"/>
  <g fill="#22c55e">
    <circle cx="160" cy="200" r="5"/><circle cx="290" cy="165" r="5"/><circle cx="420" cy="160" r="5"/><circle cx="550" cy="225" r="5"/><circle cx="680" cy="235" r="5"/><circle cx="790" cy="195" r="5"/><circle cx="870" cy="170" r="5"/>
  </g>
  <text x="160" y="190" fill="#4ade80" font-size="12" text-anchor="middle">64.7</text>
  <text x="420" y="150" fill="#4ade80" font-size="12" text-anchor="middle">68.1</text>
  <text x="680" y="255" fill="#4ade80" font-size="12" text-anchor="middle">63.3</text>
  <text x="870" y="160" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">67.1%</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="160" y="402">2019</text><text x="290" y="402">2020</text><text x="420" y="402">2021</text><text x="550" y="402">2022</text><text x="680" y="402">2023</text><text x="790" y="402">2024</text><text x="870" y="402">2025</text>
  </g>

  <rect x="180" y="425" width="640" height="44" rx="10" fill="#11161f" stroke="#64748b" stroke-width="1"/>
  <text x="500" y="453" fill="#94a3b8" font-size="13" text-anchor="middle">단, 무연 비중(IR 외부)과 전사 GPM(연결)은 병치까지만 — 인과 연결 금지</text>
</svg>
