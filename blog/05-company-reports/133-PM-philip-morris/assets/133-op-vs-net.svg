<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2024년 영업이익 13.40B인데 순이익은 7.06B로 후퇴, 2025년 11.35B로 반등</title>
  <desc>2024년 영업이익은 13.40B(7년 중 2위)인데 순이익만 7.06B로 후퇴했다. 6.34 간극은 영업선 아래(RBH 23억 달러 비현금 손상·인수금융 이자)에서 났고, 2025년 11.35B로 곧장 반등했다. 흉터가 아니라 일회성이었다.</desc>
  <rect width="1000" height="500" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">영업으로 13.40 벌고 손에 쥔 건 7.06</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업이익(파랑) vs 순이익(주황) — 2024 간극, 2025 반등 — $B</text>

  <line x1="100" y1="120" x2="100" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="400" x2="920" y2="400" stroke="#334155" stroke-width="1"/>

  <!-- pairs for 2023, 2024, 2025 scale 16->120 baseline 400 -->
  <g>
    <!-- 2023 -->
    <rect x="200" y="183" width="70" height="217" fill="#3b82f6" opacity="0.6"/><text x="235" y="173" fill="#93c5fd" font-size="12" text-anchor="middle">11.56</text>
    <rect x="285" y="253" width="70" height="147" fill="#f59e0b" opacity="0.7"/><text x="320" y="243" fill="#fbbf24" font-size="12" text-anchor="middle">7.81</text>
    <text x="278" y="422" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
    <!-- 2024 -->
    <rect x="470" y="149" width="70" height="251" fill="#3b82f6" opacity="0.7"/><text x="505" y="139" fill="#93c5fd" font-size="13" font-weight="700" text-anchor="middle">13.40</text>
    <rect x="555" y="268" width="70" height="132" fill="#ef4444" opacity="0.8"/><text x="590" y="258" fill="#f87171" font-size="13" font-weight="700" text-anchor="middle">7.06</text>
    <text x="548" y="422" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
    <!-- 2025 -->
    <rect x="740" y="121" width="70" height="279" fill="#3b82f6" opacity="0.8"/><text x="775" y="111" fill="#93c5fd" font-size="13" font-weight="700" text-anchor="middle">14.89</text>
    <rect x="825" y="187" width="70" height="213" fill="#22c55e" opacity="0.7"/><text x="860" y="177" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">11.35</text>
    <text x="818" y="422" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
  </g>

  <!-- 2024 gap bracket -->
  <text x="512" y="345" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">6.34 간극</text>

  <rect x="160" y="450" width="680" height="44" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="1.2"/>
  <text x="500" y="478" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">2024 후퇴(RBH 손상·이자, 별개·비현금) → 2025 11.35 반등 = 일회성</text>
</svg>
