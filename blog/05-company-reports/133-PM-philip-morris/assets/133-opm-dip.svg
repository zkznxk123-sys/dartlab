<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률은 41.3%(2021)에서 32.9%(2023)로 눌렸다가 36.6%(2025)로 부분 회복</title>
  <desc>영업이익률(OPM)은 2021년 41.3% 정점에서 2023년 32.9%로 7년 최저(2019년 35.3%보다도 낮음)까지 눌렸다가 2025년 36.6%로 되올라왔다. 단 정점에는 한참 못 미치는 부분 회복이며, 밴드가 넓어 '안 깼다'가 안정의 증거는 아니다.</desc>
  <rect width="1000" height="500" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">매끄러운 전환이 아니라 한 번 깊게 눌린 회복</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업이익률(OPM) — 정점 41.3% → 최저 32.9% → 부분 회복 36.6%</text>

  <line x1="100" y1="120" x2="100" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="400" x2="920" y2="400" stroke="#334155" stroke-width="1"/>

  <!-- 2019 reference dashed -->
  <line x1="100" y1="248" x2="920" y2="248" stroke="#475569" stroke-width="1" stroke-dasharray="6 5"/>
  <text x="110" y="242" fill="#64748b" font-size="12">2019 = 35.3%</text>

  <!-- OPM line: 35.3 / 40.7 / 41.3 / 38.6 / 32.9 / 35.4 / 36.6  scale 30->400 45->120 -->
  <polyline points="140,248 270,178 400,170 530,206 660,288 790,238 880,222" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="400" cy="170" r="6" fill="#22c55e"/><text x="400" y="158" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">41.3% 정점</text>
  <circle cx="660" cy="288" r="6" fill="#ef4444"/><text x="660" y="310" fill="#f87171" font-size="13" font-weight="700" text-anchor="middle">32.9% 최저</text>
  <circle cx="880" cy="222" r="6" fill="#fbbf24"/><text x="880" y="212" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">36.6%</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="140" y="422">2019</text><text x="270" y="422">2020</text><text x="400" y="422">2021</text><text x="530" y="422">2022</text><text x="660" y="422">2023</text><text x="790" y="422">2024</text><text x="880" y="422">2025</text>
  </g>

  <rect x="170" y="448" width="660" height="44" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="500" y="476" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">2025 회복은 정점(41.3%) 아래 — 부분 회복 · 밴드 폭 넓어 '안 깼다'≠안정</text>
</svg>
