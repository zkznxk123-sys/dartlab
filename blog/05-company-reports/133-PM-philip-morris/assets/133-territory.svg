<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2008년 분사 — 미국 시장과 말보로 국내권은 알트리아, 미국 밖은 PM</title>
  <desc>2008년 알트리아에서 분사할 때 미국 시장과 말보로 국내권은 알트리아가 가졌고, PM은 미국 밖에서만 담배를 판다. 태어날 때부터 본국과 간판 브랜드 국내권에서 배제된 구조다.</desc>
  <rect width="1000" height="440" fill="#0a0e1a"/>
  <text x="500" y="48" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">태어날 때부터의 결손 (2008년 분사)</text>
  <text x="500" y="80" fill="#64748b" font-size="15" text-anchor="middle">한 회사가 둘로 — 안방과 간판은 옛 주인이 가져갔다</text>

  <!-- Altria box -->
  <rect x="90" y="130" width="360" height="230" rx="14" fill="#11161f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="270" y="172" fill="#f87171" font-size="18" font-weight="700" text-anchor="middle">알트리아 (MO)</text>
  <text x="270" y="220" fill="#f1f5f9" font-size="16" text-anchor="middle">🇺🇸 미국 시장</text>
  <text x="270" y="258" fill="#f1f5f9" font-size="16" text-anchor="middle">말보로 국내권</text>
  <text x="270" y="312" fill="#94a3b8" font-size="14" text-anchor="middle">본국 안방을 가짐</text>

  <!-- arrow -->
  <text x="500" y="250" fill="#475569" font-size="34" text-anchor="middle">→</text>

  <!-- PM box -->
  <rect x="550" y="130" width="360" height="230" rx="14" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="730" y="172" fill="#60a5fa" font-size="18" font-weight="700" text-anchor="middle">필립모리스 (PM)</text>
  <text x="730" y="220" fill="#f1f5f9" font-size="16" text-anchor="middle">🌍 미국 '밖'만</text>
  <text x="730" y="258" fill="#94a3b8" font-size="14" text-anchor="middle">자기 본국에서 못 팜</text>
  <text x="730" y="312" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">16년 뒤 ZYN으로 귀환</text>

  <text x="500" y="410" fill="#64748b" font-size="13" text-anchor="middle">분사 조건은 10-K·8-K 외부 인용 — 매출 절대액만 연결이 증명</text>
</svg>
