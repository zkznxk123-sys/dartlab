<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>홈디포 2026년 체크포인트 세 가지</title>
  <desc>매출총이익률이 33% 부근에서 평탄한가, 영업이익률이 빠지나 회복되나 그 분해가 맞는가, OCF의 역설이 일회성인가 구조인가.</desc>
  <rect width="1000" height="420" fill="#0a0e1a"/>
  <text x="500" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2026년에 봐야 할 세 가지</text>

  <g>
    <rect x="60" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#22c55e" stroke-width="1.5"/>
    <text x="200" y="150" fill="#22c55e" font-size="40" font-weight="800" text-anchor="middle">1</text>
    <text x="200" y="196" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">GPM 33% 평탄한가</text>
    <text x="200" y="238" fill="#94a3b8" font-size="13" text-anchor="middle">SRS 등 저마진 유통이</text>
    <text x="200" y="261" fill="#94a3b8" font-size="13" text-anchor="middle">커지며 33% 아래로</text>
    <text x="200" y="284" fill="#94a3b8" font-size="13" text-anchor="middle">내려가나. '엔진은</text>
    <text x="200" y="307" fill="#94a3b8" font-size="13" text-anchor="middle">그대로'의 핵심 지표</text>
  </g>
  <g>
    <rect x="360" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="500" y="150" fill="#fbbf24" font-size="40" font-weight="800" text-anchor="middle">2</text>
    <text x="500" y="196" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">OPM 빠지나 회복하나</text>
    <text x="500" y="238" fill="#94a3b8" font-size="13" text-anchor="middle">12.7%에서 추가 하락/</text>
    <text x="500" y="261" fill="#94a3b8" font-size="13" text-anchor="middle">회복. 그게 수요 반등·</text>
    <text x="500" y="284" fill="#94a3b8" font-size="13" text-anchor="middle">레버리지 회복인지</text>
    <text x="500" y="307" fill="#94a3b8" font-size="13" text-anchor="middle">믹스 희석인지</text>
  </g>
  <g>
    <rect x="660" y="100" width="280" height="240" rx="14" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="800" y="150" fill="#3b82f6" font-size="40" font-weight="800" text-anchor="middle">3</text>
    <text x="800" y="196" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">OCF 역설=일회성?</text>
    <text x="800" y="238" fill="#94a3b8" font-size="13" text-anchor="middle">프로·SRS 진전 시</text>
    <text x="800" y="261" fill="#94a3b8" font-size="13" text-anchor="middle">OCF가 다시 수요와</text>
    <text x="800" y="284" fill="#94a3b8" font-size="13" text-anchor="middle">역행하나, 운전자본</text>
    <text x="800" y="307" fill="#94a3b8" font-size="13" text-anchor="middle">행태가 바뀌나</text>
  </g>
  <text x="500" y="392" fill="#64748b" font-size="13" text-anchor="middle">dartlab 연결 — 프로 비중·SRS·comp는 10-K·8-K·IR 외부 인용</text>
</svg>
