<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출총이익률은 7년간 34.1%에서 33.3%로 0.8%p만 움직였다</title>
  <desc>매출이 110B에서 165B로 자라는 7년간 매출총이익률(GPM)은 34.1%에서 33.3%로 0.8%p밖에 움직이지 않았다. 사실상 못 박힌 천장이자 마진을 떠받치는 엔진이다.</desc>
  <rect width="1000" height="460" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">평탄한 천장 — GPM 7년 거의 불변</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">매출총이익률(GPM)이 34% 부근에 못 박혀 있다</text>

  <line x1="100" y1="120" x2="100" y2="360" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="360" x2="920" y2="360" stroke="#334155" stroke-width="1"/>

  <!-- narrow band -->
  <rect x="100" y="190" width="820" height="40" fill="#22c55e" opacity="0.1"/>
  <line x1="100" y1="190" x2="920" y2="190" stroke="#22c55e" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="100" y1="230" x2="920" y2="230" stroke="#22c55e" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="930" y="194" fill="#4ade80" font-size="12">34.1%</text>
  <text x="930" y="234" fill="#4ade80" font-size="12">33.3%</text>

  <polyline points="150,195 280,200 410,212 540,216 670,218 800,218 870,222" fill="none" stroke="#22c55e" stroke-width="3"/>
  <g fill="#22c55e"><circle cx="150" cy="195" r="5"/><circle cx="870" cy="222" r="5"/></g>
  <text x="150" y="185" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">34.1%</text>
  <text x="870" y="245" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">33.3%</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="150" y="382">FY19</text><text x="410" y="382">FY21</text><text x="670" y="382">FY23</text><text x="870" y="382">FY25</text>
  </g>

  <rect x="180" y="405" width="640" height="44" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="1.2"/>
  <text x="500" y="433" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">7년간 0.8%p — 마진을 떠받치는 엔진은 그대로다 (OPM과는 별개 비율)</text>
</svg>
