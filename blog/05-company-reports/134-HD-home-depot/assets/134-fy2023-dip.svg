<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출은 FY2023에 4.7B 꺾였다 회복 — 동일점매출 -3.2% 고금리 대기 모드</title>
  <desc>매출은 정체가 아니라 하락 후 회복을 그렸다. FY2023에 157.4B에서 152.7B로 4.7B 꺾였다가 164.7B로 올라왔다. 그 골은 동일점매출 -3.2%, 고금리 대기 모드와 같은 해이며 영업이익률 하락 타이밍과 정합한다.</desc>
  <rect width="1000" height="460" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">가장 적게 판 해 — 정체가 아니라 하락 후 회복</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">매출($B) — FY2023 골(comp -3.2%·고금리 대기 모드)</text>

  <line x1="100" y1="120" x2="100" y2="360" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="360" x2="920" y2="360" stroke="#334155" stroke-width="1"/>

  <!-- revenue line, scale 110->360 165->130 -->
  <polyline points="160,318 290,225 420,194 550,218 680,184 820,159" fill="none" stroke="#22c55e" stroke-width="3"/>
  <g fill="#22c55e"><circle cx="160" cy="318" r="5"/><circle cx="290" cy="225" r="5"/><circle cx="420" cy="194" r="5"/></g>
  <circle cx="550" cy="218" r="7" fill="#ef4444"/>
  <g fill="#22c55e"><circle cx="680" cy="184" r="5"/><circle cx="820" cy="159" r="5"/></g>

  <text x="420" y="184" fill="#4ade80" font-size="12" text-anchor="middle">157.4</text>
  <text x="550" y="240" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">152.7 (-4.7B)</text>
  <text x="820" y="149" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">164.7</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="160" y="382">FY20</text><text x="290" y="382">FY21</text><text x="420" y="382">FY22</text><text x="550" y="382">FY23</text><text x="680" y="382">FY24</text><text x="820" y="382">FY25</text>
  </g>

  <rect x="170" y="405" width="660" height="46" rx="10" fill="#11161f" stroke="#ef4444" stroke-width="1.2"/>
  <text x="500" y="425" fill="#f87171" font-size="13" font-weight="700" text-anchor="middle">comp 감소(분자)와 마진 하락(분모 고정비)은 같은 고금리의 두 증상</text>
  <text x="500" y="444" fill="#64748b" font-size="12" text-anchor="middle">'comp가 떨어져서 마진이 무너졌다'는 단선 인과가 아니다 — 타이밍 정합</text>
</svg>
