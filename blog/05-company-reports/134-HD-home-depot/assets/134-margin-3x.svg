<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>홈디포 영업이익률 12.7%는 월마트 약 4%, 코스트코 약 3.3%의 대략 3~4배</title>
  <desc>같은 대형 소매인데 홈디포의 영업이익률(OPM)은 12.7~15.3%로, 월마트 약 4%·코스트코 약 3.3%의 대략 3~4배다. 비결은 식료품 같은 초저마진 품목을 안 취급하는 빅박스 구조다.</desc>
  <rect width="1000" height="460" fill="#0a0e1a"/>
  <text x="500" y="48" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">같은 대형 소매, 마진은 대략 3~4배</text>
  <text x="500" y="80" fill="#64748b" font-size="15" text-anchor="middle">영업이익률(OPM) 비교 — 비결은 '안 파는 것'</text>

  <line x1="120" y1="380" x2="900" y2="380" stroke="#334155" stroke-width="1"/>

  <!-- HD big -->
  <rect x="180" y="130" width="150" height="250" rx="6" fill="#22c55e" opacity="0.8"/>
  <text x="255" y="115" fill="#4ade80" font-size="26" font-weight="800" text-anchor="middle">12.7%</text>
  <text x="255" y="405" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">홈디포 (HD)</text>

  <!-- WMT small -->
  <rect x="440" y="301" width="150" height="79" rx="6" fill="#3b82f6" opacity="0.6"/>
  <text x="515" y="291" fill="#93c5fd" font-size="22" font-weight="700" text-anchor="middle">~4%</text>
  <text x="515" y="405" fill="#94a3b8" font-size="14" text-anchor="middle">월마트</text>

  <!-- COST small -->
  <rect x="700" y="315" width="150" height="65" rx="6" fill="#3b82f6" opacity="0.5"/>
  <text x="775" y="305" fill="#93c5fd" font-size="22" font-weight="700" text-anchor="middle">~3.3%</text>
  <text x="775" y="405" fill="#94a3b8" font-size="14" text-anchor="middle">코스트코</text>

  <rect x="180" y="425" width="640" height="30" rx="8" fill="#11161f" stroke="#22c55e" stroke-width="1"/>
  <text x="500" y="445" fill="#94a3b8" font-size="13" text-anchor="middle">1~3% 마진 식료품을 처음부터 안 올렸다 — 그 비어 있는 칸이 높이를 만든다</text>
</svg>
