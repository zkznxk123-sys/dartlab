<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업현금흐름 7년 최대 21.17B가 매출 최저해 FY2023에 찍혔다</title>
  <desc>영업현금흐름(OCF)의 7년 최대치 21.17B는 매출이 가장 적었던 FY2023에 나타났다. OCF가 수요와 역방향으로 움직인 역설로, 안 팔린 재고가 현금으로 풀린 운전자본 타이밍과 양립한다. 'OCF=수요'는 배제한다.</desc>
  <rect width="1000" height="470" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">안 팔릴 때 두꺼워진 통장</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">영업현금흐름(막대 $B)과 매출(라인)이 FY2023에 역행</text>

  <line x1="100" y1="110" x2="100" y2="370" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="370" x2="920" y2="370" stroke="#334155" stroke-width="1"/>

  <!-- OCF bars 18.84/16.57/14.62/21.17/19.81/16.33 scale 22->250 -->
  <g>
    <rect x="150" y="156" width="90" height="214" fill="#3b82f6" opacity="0.55"/><text x="195" y="146" fill="#93c5fd" font-size="12" text-anchor="middle">18.84</text>
    <rect x="280" y="182" width="90" height="188" fill="#3b82f6" opacity="0.5"/><text x="325" y="172" fill="#93c5fd" font-size="12" text-anchor="middle">16.57</text>
    <rect x="410" y="204" width="90" height="166" fill="#3b82f6" opacity="0.45"/><text x="455" y="194" fill="#93c5fd" font-size="12" text-anchor="middle">14.62</text>
    <rect x="540" y="129" width="90" height="241" fill="#22c55e" opacity="0.75"/><text x="585" y="119" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">21.17</text>
    <rect x="670" y="145" width="90" height="225" fill="#3b82f6" opacity="0.55"/><text x="715" y="135" fill="#93c5fd" font-size="12" text-anchor="middle">19.81</text>
    <rect x="800" y="184" width="90" height="186" fill="#3b82f6" opacity="0.5"/><text x="845" y="174" fill="#93c5fd" font-size="12" text-anchor="middle">16.33</text>
  </g>

  <!-- revenue line (inverse highlight at FY23) -->
  <polyline points="195,250 325,200 455,180 585,205 715,178 845,165" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="4 3"/>
  <circle cx="585" cy="205" r="6" fill="#ef4444"/><text x="585" y="330" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">매출 최저</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="195" y="392">FY20</text><text x="325" y="392">FY21</text><text x="455" y="392">FY22</text><text x="585" y="392">FY23</text><text x="715" y="392">FY24</text><text x="845" y="392">FY25</text>
  </g>

  <rect x="170" y="415" width="660" height="46" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="1.2"/>
  <text x="500" y="435" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">OCF 최대가 매출 최저해 — 수요와 역행(운전자본 타이밍과 양립)</text>
  <text x="500" y="454" fill="#64748b" font-size="12" text-anchor="middle">'OCF=수요 사이클의 서명'은 명시적으로 배제</text>
</svg>
