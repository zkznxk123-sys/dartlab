<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>프로 고객 비중이 2012년 약 30%에서 FY2024 약 54.5%로 올랐다</title>
  <desc>프로(전문 시공) 고객 비중이 2012년 약 30%에서 FY2024 약 54.5%(약 90B 달러)로 상승했다. 매출의 절반 이상이 DIY 주말 손님이 아니라 대량 자재를 싣는 시공업자에서 나오며, SRS 인수도 이 이동의 한 수다.</desc>
  <rect width="1000" height="440" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">오렌지색 앞치마의 무게중심 이동</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">프로(전문 시공) 고객 비중 — 2012년 약 30% → FY2024 약 54.5%</text>

  <line x1="100" y1="120" x2="100" y2="330" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="330" x2="920" y2="330" stroke="#334155" stroke-width="1"/>

  <!-- 50% reference -->
  <line x1="100" y1="225" x2="920" y2="225" stroke="#475569" stroke-width="1" stroke-dasharray="6 5"/>
  <text x="110" y="219" fill="#64748b" font-size="12">50%</text>

  <!-- rising bars -->
  <rect x="180" y="270" width="120" height="60" fill="#3b82f6" opacity="0.5"/><text x="240" y="258" fill="#93c5fd" font-size="14" font-weight="700" text-anchor="middle">~30%</text><text x="240" y="352" fill="#64748b" font-size="13" text-anchor="middle">2012</text>
  <rect x="430" y="240" width="120" height="90" fill="#3b82f6" opacity="0.6"/><text x="490" y="228" fill="#93c5fd" font-size="14" font-weight="700" text-anchor="middle">~45%</text><text x="490" y="352" fill="#64748b" font-size="13" text-anchor="middle">2018~21</text>
  <rect x="680" y="201" width="120" height="129" fill="#22c55e" opacity="0.7"/><text x="740" y="189" fill="#4ade80" font-size="15" font-weight="700" text-anchor="middle">~54.5%</text><text x="740" y="352" fill="#64748b" font-size="13" text-anchor="middle">FY2024</text>
  <text x="740" y="318" fill="#dcfce7" font-size="12" text-anchor="middle">약 90B$</text>

  <rect x="170" y="378" width="660" height="48" rx="10" fill="#11161f" stroke="#64748b" stroke-width="1"/>
  <text x="500" y="399" fill="#94a3b8" font-size="13" text-anchor="middle">매출 절반 이상이 시공업자에서 — SRS 인수도 이 이동의 한 수(외부 인용)</text>
  <text x="500" y="418" fill="#64748b" font-size="12" text-anchor="middle">단, '마진을 일부러 포기하는 전략'이라는 경영 의도는 단정하지 않음</text>
</svg>
