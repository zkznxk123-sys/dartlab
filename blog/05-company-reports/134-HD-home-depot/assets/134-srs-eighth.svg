<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>정점 대비 누적 260bp 하락 중 회사가 인정한 SRS 1년치 희석은 약 35bp</title>
  <desc>영업이익률은 정점 FY2022 대비 FY2025까지 3년 누적 2.6%p(260bp) 빠졌다. 회사가 공시한 SRS 영업이익률 희석은 FY2025 1년치 약 35bp로, 기간(분모)이 다르다. 크기로만 비교하면 약 8분의 1이다.</desc>
  <rect width="1000" height="460" fill="#0a0e1a"/>
  <text x="500" y="46" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">지목된 범인의 8분의 1</text>
  <text x="500" y="78" fill="#64748b" font-size="15" text-anchor="middle">정점 대비 누적 260bp 하락 vs 회사 인정 SRS 1년치 35bp</text>

  <!-- big bar 260bp -->
  <rect x="180" y="130" width="220" height="230" rx="6" fill="#ef4444" opacity="0.8"/>
  <text x="290" y="115" fill="#f87171" font-size="22" font-weight="800" text-anchor="middle">260bp</text>
  <text x="290" y="385" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">OPM 누적 하락</text>
  <text x="290" y="408" fill="#94a3b8" font-size="12" text-anchor="middle">FY2022→FY2025 (3년)</text>

  <!-- small bar 35bp -->
  <rect x="600" y="329" width="220" height="31" rx="6" fill="#fbbf24" opacity="0.85"/>
  <text x="710" y="315" fill="#fbbf24" font-size="22" font-weight="800" text-anchor="middle">35bp</text>
  <text x="710" y="385" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">SRS 희석</text>
  <text x="710" y="408" fill="#94a3b8" font-size="12" text-anchor="middle">FY2025 (1년치)</text>

  <line x1="180" y1="360" x2="820" y2="360" stroke="#334155" stroke-width="1"/>

  <rect x="170" y="425" width="660" height="30" rx="8" fill="#11161f" stroke="#fbbf24" stroke-width="1"/>
  <text x="500" y="445" fill="#94a3b8" font-size="12.5" text-anchor="middle">기간(분모)이 달라 직접 빼지 않음 — 크기로만 약 1/8. 나머지는 SRS 밖과 정합</text>
</svg>
