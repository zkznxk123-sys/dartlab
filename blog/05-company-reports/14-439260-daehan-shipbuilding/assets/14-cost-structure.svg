<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" width="1080" height="300">
  <defs>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="300" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">판관비율 2.3% — 업종 평균의 1/3</text>
  <text x="540" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">직원 648명으로 매출 1.2조</text>

  <!-- Background grid -->
  <line x1="260" y1="230" x2="960" y2="230" stroke="#1e293b" stroke-width="1"/>

  <!-- Bar 1: 대한조선 2.3% -->
  <rect x="260" y="120" width="161" height="50" rx="6" fill="url(#greenBar)"/>
  <text x="200" y="150" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">대한조선</text>
  <text x="435" y="150" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#22c55e">2.3%</text>

  <!-- Bar 2: 조선업 평균 5~8% (range) -->
  <rect x="260" y="195" width="350" height="50" rx="6" fill="#334155" opacity="0.5"/>
  <rect x="260" y="195" width="560" height="50" rx="6" fill="#475569" opacity="0.3"/>
  <!-- Inner highlight for 5-8% range -->
  <rect x="260" y="195" width="350" height="50" rx="6" fill="#94a3b8" opacity="0.25"/>
  <rect x="610" y="195" width="210" height="50" rx="6" fill="#94a3b8" opacity="0.12"/>

  <text x="200" y="225" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#94a3b8">업종 평균</text>
  <text x="834" y="225" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#94a3b8">5~8%</text>

  <!-- Bracket for range -->
  <text x="260" y="262" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">5%</text>
  <text x="600" y="262" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">8%</text>
  <line x1="270" y1="250" x2="610" y2="250" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Comparison callout -->
  <rect x="700" y="110" width="200" height="60" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="800" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">대비</text>
  <text x="800" y="158" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#22c55e">1/3 수준</text>
</svg>