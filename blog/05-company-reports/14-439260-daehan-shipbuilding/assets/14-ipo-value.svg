<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" width="1080" height="350">
  <defs>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="350" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">2,000억에 사서 3.3조를 만들었다</text>
  <text x="540" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">3년, 16.5배</text>

  <!-- Bar 1: 인수가 2,000억 -->
  <rect x="220" y="220" width="80" height="80" rx="6" fill="#94a3b8"/>
  <rect x="220" y="100" width="80" height="200" rx="6" fill="#94a3b8" opacity="0.15"/>
  <text x="260" y="260" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#0a0e1a">2,000억</text>

  <!-- Label -->
  <text x="260" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#94a3b8">2022 인수</text>

  <!-- Arrow -->
  <line x1="360" y1="200" x2="520" y2="200" stroke="#334155" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="520,192 540,200 520,208" fill="#334155"/>

  <!-- x16.5 badge -->
  <rect x="400" y="155" width="100" height="40" rx="20" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="450" y="181" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="800" fill="#fbbf24">x16.5</text>

  <!-- Bar 2: 시총 33,000억 (3.3조) -->
  <!-- Scale: 2000억 = 80px height, 33000억 = proportional but capped for visual -->
  <rect x="620" y="100" width="200" height="200" rx="8" fill="url(#greenGlow)" filter="url(#softGlow)"/>

  <!-- Inner subdivisions to show scale -->
  <line x1="620" y1="280" x2="820" y2="280" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="260" x2="820" y2="260" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="240" x2="820" y2="240" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="220" x2="820" y2="220" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="200" x2="820" y2="200" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="180" x2="820" y2="180" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="160" x2="820" y2="160" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="140" x2="820" y2="140" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="120" x2="820" y2="120" stroke="#0a0e1a" stroke-width="0.5" opacity="0.3"/>

  <!-- Value inside bar -->
  <text x="720" y="195" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#0a0e1a">3.3조</text>
  <text x="720" y="218" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0a0e1a" opacity="0.7">33,000억</text>

  <!-- Label -->
  <text x="720" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#22c55e">2025 시총</text>
</svg>