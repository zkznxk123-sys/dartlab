<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" width="1080" height="350">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="350" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">조선업 영업이익률 비교 — 대한조선만 24%</text>
  <text x="540" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">방산 프리미엄 없이, 순수 상선으로</text>

  <!-- Grid lines -->
  <line x1="180" y1="280" x2="1020" y2="280" stroke="#1e293b" stroke-width="1"/>
  <line x1="180" y1="230" x2="1020" y2="230" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="180" y1="180" x2="1020" y2="180" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="180" y1="130" x2="1020" y2="130" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y-axis labels -->
  <text x="170" y="284" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">0%</text>
  <text x="170" y="234" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">10%</text>
  <text x="170" y="184" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">20%</text>
  <text x="170" y="134" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">30%</text>

  <!-- Bar 1: 대한조선 24% -->
  <rect x="230" y="160" width="130" height="120" rx="4" fill="url(#greenGrad)"/>
  <text x="295" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#22c55e">24%</text>
  <text x="295" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">대한조선</text>

  <!-- Bar 2: HD한국조선 10% -->
  <rect x="430" y="230" width="130" height="50" rx="4" fill="url(#grayGrad)"/>
  <text x="495" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#94a3b8">10%</text>
  <text x="495" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#94a3b8">HD한국조선</text>

  <!-- Bar 3: 한화오션 9% -->
  <rect x="630" y="235" width="130" height="45" rx="4" fill="url(#grayGrad)"/>
  <text x="695" y="227" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#94a3b8">9%</text>
  <text x="695" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#94a3b8">한화오션</text>

  <!-- Bar 4: 삼성중공업 7% -->
  <rect x="830" y="245" width="130" height="35" rx="4" fill="url(#grayGrad)"/>
  <text x="895" y="237" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#94a3b8">7%</text>
  <text x="895" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#94a3b8">삼성중공업</text>
</svg>