<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 250" width="1080" height="250">
  <rect width="1080" height="250" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">매출의 99.3%가 수출</text>

  <!-- Stacked bar -->
  <rect x="140" y="80" width="800" height="60" rx="8" fill="#475569"/>
  <!-- Export: 99.3% -->
  <rect x="140" y="80" width="794" height="60" rx="8" fill="#22c55e"/>
  <!-- Tiny domestic sliver -->
  <rect x="934" y="80" width="6" height="60" rx="0" fill="#475569"/>
  <!-- Right edge round -->
  <rect x="930" y="80" width="10" height="60" rx="0" fill="#475569"/>

  <!-- Percentage labels on bar -->
  <text x="540" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#0a0e1a">수출 99.3%</text>

  <!-- Legend -->
  <g transform="translate(340, 170)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#22c55e"/>
    <text x="26" y="14" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#f1f5f9">수출 99.3%</text>

    <rect x="200" y="0" width="18" height="18" rx="4" fill="#475569"/>
    <text x="226" y="14" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#94a3b8">내수 0.7%</text>
  </g>

  <!-- Subtitle context -->
  <text x="540" y="220" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">원화 약세 = 직접 수혜 | 글로벌 해운 사이클에 직결</text>
</svg>