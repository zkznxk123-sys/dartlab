<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" width="1080" height="300">
  <defs>
    <filter id="glowY">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="300" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">2025 상반기 수에즈막스 전세계 발주 — 5척 중 4척</text>

  <!-- Donut chart -->
  <!-- 80% = 288 degrees, 20% = 72 degrees -->
  <!-- Circle center: 380, 175; radius: 90 -->
  <!-- 80% arc: start at top (0,-90) going clockwise -->
  <circle cx="380" cy="175" r="90" fill="none" stroke="#1e293b" stroke-width="32"/>

  <!-- 80% arc (golden) -->
  <circle cx="380" cy="175" r="90" fill="none" stroke="#fbbf24" stroke-width="32"
    stroke-dasharray="452.4 113.1" stroke-dashoffset="0"
    transform="rotate(-90 380 175)" filter="url(#glowY)" stroke-linecap="round"/>

  <!-- 20% arc (gray) -->
  <circle cx="380" cy="175" r="90" fill="none" stroke="#475569" stroke-width="28"
    stroke-dasharray="113.1 452.4" stroke-dashoffset="-452.4"
    transform="rotate(-90 380 175)" stroke-linecap="round"/>

  <!-- Center text -->
  <text x="380" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#fbbf24">80%</text>
  <text x="380" y="194" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#94a3b8">점유율</text>

  <!-- Right side: ship icons (5 blocks) -->
  <g transform="translate(580, 100)">
    <!-- 4 golden ships -->
    <rect x="0" y="0" width="70" height="50" rx="6" fill="#fbbf24" opacity="0.9"/>
    <text x="35" y="30" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22">🚢</text>

    <rect x="85" y="0" width="70" height="50" rx="6" fill="#fbbf24" opacity="0.9"/>
    <text x="120" y="30" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22">🚢</text>

    <rect x="0" y="65" width="70" height="50" rx="6" fill="#fbbf24" opacity="0.9"/>
    <text x="35" y="95" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22">🚢</text>

    <rect x="85" y="65" width="70" height="50" rx="6" fill="#fbbf24" opacity="0.9"/>
    <text x="120" y="95" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22">🚢</text>

    <!-- 1 gray ship -->
    <rect x="170" y="0" width="70" height="50" rx="6" fill="#475569" opacity="0.6"/>
    <text x="205" y="30" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" opacity="0.5">🚢</text>
  </g>

  <!-- Labels -->
  <g transform="translate(580, 240)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#fbbf24"/>
    <text x="22" y="12" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">대한조선 4척</text>

    <rect x="170" y="0" width="14" height="14" rx="3" fill="#475569"/>
    <text x="192" y="12" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#94a3b8">기타 1척</text>
  </g>
</svg>