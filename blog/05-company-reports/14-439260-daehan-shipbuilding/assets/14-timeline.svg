<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 200" width="1080" height="200">
  <rect width="1080" height="200" fill="#0a0e1a" rx="12"/>

  <!-- Main timeline line -->
  <line x1="60" y1="100" x2="1020" y2="100" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>

  <!-- Crisis segment (red gradient) -->
  <line x1="60" y1="100" x2="630" y2="100" stroke="#ef4444" stroke-width="3" opacity="0.3"/>

  <!-- Recovery segment (green gradient) -->
  <line x1="770" y1="100" x2="1020" y2="100" stroke="#22c55e" stroke-width="3" opacity="0.3"/>

  <!-- Node 1: 1987 설립 -->
  <circle cx="80" cy="100" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
  <text x="80" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ef4444">1987</text>
  <text x="80" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">설립</text>

  <!-- Node 2: 1997 부도 -->
  <circle cx="230" cy="100" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
  <text x="230" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ef4444">1997</text>
  <text x="230" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">부도</text>
  <text x="230" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#64748b">(IMF)</text>

  <!-- Node 3: 2004 대주인수 -->
  <circle cx="390" cy="100" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
  <text x="390" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ef4444">2004</text>
  <text x="390" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">대주 인수</text>

  <!-- Node 4: 2009 워크아웃 -->
  <circle cx="540" cy="100" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
  <text x="540" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ef4444">2009</text>
  <text x="540" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">워크아웃</text>

  <!-- Node 5: 2014 졸업 — transition -->
  <circle cx="690" cy="100" r="8" fill="#fbbf24" stroke="#0a0e1a" stroke-width="3"/>
  <text x="690" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#fbbf24">2014</text>
  <text x="690" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">워크아웃 졸업</text>

  <!-- Node 6: 2022 KHI 인수 -->
  <circle cx="850" cy="100" r="9" fill="#22c55e" stroke="#0a0e1a" stroke-width="3"/>
  <text x="850" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#22c55e">2022</text>
  <text x="850" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#f1f5f9">KHI 인수</text>

  <!-- Node 7: 2025 상장 -->
  <circle cx="1000" cy="100" r="10" fill="#22c55e" stroke="#22c55e" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="1000" cy="100" r="10" fill="#22c55e" stroke="#0a0e1a" stroke-width="3"/>
  <text x="1000" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#22c55e">2025</text>
  <text x="1000" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">코스피 상장</text>

  <!-- Phase labels -->
  <text x="310" y="180" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#ef4444" opacity="0.6">— 위기의 30년 —</text>
  <text x="925" y="180" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#22c55e" opacity="0.6">— 반전 —</text>
</svg>