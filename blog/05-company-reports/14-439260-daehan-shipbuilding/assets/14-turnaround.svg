<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="400" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">영업이익률 0.5% → 24%, 3년의 턴어라운드</text>

  <!-- Grid -->
  <line x1="140" y1="320" x2="980" y2="320" stroke="#1e293b" stroke-width="1"/>
  <line x1="140" y1="270" x2="980" y2="270" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="140" y1="220" x2="980" y2="220" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="140" y1="170" x2="980" y2="170" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="140" y1="120" x2="980" y2="120" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y-axis -->
  <text x="130" y="324" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">0%</text>
  <text x="130" y="274" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">5%</text>
  <text x="130" y="224" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">10%</text>
  <text x="130" y="174" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">15%</text>
  <text x="130" y="124" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">20%</text>
  <text x="130" y="74" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">25%</text>

  <!-- X-axis labels -->
  <text x="230" y="345" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#94a3b8">2022</text>
  <text x="440" y="345" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#94a3b8">2023</text>
  <text x="650" y="345" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#94a3b8">2024</text>
  <text x="860" y="345" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#f1f5f9">2025</text>

  <!-- Area fill -->
  <polygon points="230,315 440,240 650,173 860,80 860,320 230,320" fill="#22c55e" fill-opacity="0.08"/>

  <!-- Line: 0.5%(315) → 8%(240) → 14.7%(173) → 24%(80) -->
  <polyline points="230,315 440,240 650,173 860,80" fill="none" stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Dots -->
  <circle cx="230" cy="315" r="7" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="440" cy="240" r="7" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="650" cy="173" r="7" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="860" cy="80" r="8" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>

  <!-- Values -->
  <text x="230" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#ef4444">0.5%</text>
  <text x="440" y="226" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#fbbf24">~8%</text>
  <text x="650" y="159" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#22c55e">14.7%</text>
  <text x="860" y="66" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#22c55e">24%</text>

  <!-- Event labels -->
  <rect x="175" y="356" width="110" height="24" rx="12" fill="#1e293b"/>
  <text x="230" y="373" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#ef4444">KHI 인수</text>

  <rect x="381" y="356" width="118" height="24" rx="12" fill="#1e293b"/>
  <text x="440" y="373" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#fbbf24">수에즈막스 집중</text>

  <rect x="600" y="356" width="100" height="24" rx="12" fill="#1e293b"/>
  <text x="650" y="373" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#22c55e">셔틀탱커</text>

  <rect x="805" y="356" width="110" height="24" rx="12" fill="#1e293b"/>
  <text x="860" y="373" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#22c55e">코스피 상장</text>
</svg>