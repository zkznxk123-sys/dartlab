<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2026년에 봐야 할 다섯 가지</title>
  <desc>2026년 추적점 다섯: OPM 9% 돌파·순이익 전환율·영업CF 수렴·매출 반등은 내부, 점유율·마케팅비는 외부.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">하이트진로 — OPM 천장과 손익-현금 디커플링</text>
  <rect x="80" y="118" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="148" fill="#22c55e" font-size="20" font-weight="700">1</text>
  <text x="144" y="146" fill="#e2e8f0" font-size="16" font-weight="700">OPM이 9% 천장을 처음 넘는가</text>
  <text x="144" y="168" fill="#94a3b8" font-size="13">8년간 못 넘은 4.32~8.78% 띠의 상단 돌파 여부</text>
  <rect x="80" y="192" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="222" fill="#22c55e" font-size="20" font-weight="700">2</text>
  <text x="144" y="220" fill="#e2e8f0" font-size="16" font-weight="700">순이익 전환율(NI/OP)이 50%를 넘는가</text>
  <text x="144" y="242" fill="#94a3b8" font-size="13">영업이익의 절반 이하만 남던 구조의 해소</text>
  <rect x="80" y="266" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="296" fill="#22c55e" font-size="20" font-weight="700">3</text>
  <text x="144" y="294" fill="#e2e8f0" font-size="16" font-weight="700">영업현금흐름이 안정적 양(+)으로 수렴하는가</text>
  <text x="144" y="316" fill="#94a3b8" font-size="13">−0.18~+0.622조 출렁임이 손익과 같은 박자로</text>
  <rect x="80" y="340" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="370" fill="#22c55e" font-size="20" font-weight="700">4</text>
  <text x="144" y="368" fill="#e2e8f0" font-size="16" font-weight="700">2024→2025 매출 역성장(−3.8%)이 반등하는가</text>
  <text x="144" y="390" fill="#94a3b8" font-size="13">좁은 띠 상단(2.599조) 회복 여부</text>
  <rect x="80" y="414" width="920" height="64" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
  <text x="108" y="444" fill="#fbbf24" font-size="20" font-weight="700">5</text>
  <text x="144" y="442" fill="#e2e8f0" font-size="16" font-weight="700">맥주 점유율·마케팅비 (외부)</text>
  <text x="144" y="464" fill="#94a3b8" font-size="13">광고선전비가 OPM 저점과 다시 겹치는지 대조</text>
  <text x="540" y="512" fill="#64748b" font-size="13" text-anchor="middle">[내부] = dartlab 연결로 검증 가능 · (외부) = IR·공시·시장지표 인용</text>
</svg>
