<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익이 순이익까지 살아남는 비율(NI/OP)</title>
  <desc>영업이익이 순이익까지 살아남는 비율이 좋은 해 약 46%, 나쁜 해 24%로 갈리고 2019년은 음수다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">영업이익이 순이익까지 살아남는 비율(NI/OP)</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">좋은 해 약 46%·나쁜 해 24%, 2019년은 음수 (dartlab 연결)</text>
  <line x1="110" y1="300" x2="1010" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <text x="1018" y="305" fill="#64748b" font-size="12">0</text>
  <rect x="118.0" y="210.2" width="64" height="89.8" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="150.0" y="200.2" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">24.4%</text>
  <text x="150.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2018</text>
  <rect x="240.9" y="300.0" width="64" height="150.0" rx="3" fill="#ef4444" opacity="1"/>
  <text x="272.9" y="470.0" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">-47.7%</text>
  <text x="272.9" y="525" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <rect x="363.7" y="138.5" width="64" height="161.5" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="395.7" y="128.5" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">43.9%</text>
  <text x="395.7" y="525" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <rect x="486.6" y="147.7" width="64" height="152.3" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="518.6" y="137.7" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">41.4%</text>
  <text x="518.6" y="525" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <rect x="609.4" y="132.6" width="64" height="167.4" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="641.4" y="122.6" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">45.5%</text>
  <text x="641.4" y="525" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <rect x="732.3" y="193.3" width="64" height="106.7" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="764.3" y="183.3" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">29.0%</text>
  <text x="764.3" y="525" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <rect x="855.1" y="130.0" width="64" height="170.0" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="887.1" y="120.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">46.2%</text>
  <text x="887.1" y="525" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
  <rect x="978.0" y="212.4" width="64" height="87.6" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="1010.0" y="202.4" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">23.8%</text>
  <text x="1010.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
</svg>
