<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률(OPM) 8개년 — 9% 천장</title>
  <desc>영업이익률은 8년간 4.32~8.78%의 한 자릿수 띠를 진동하며 9%를 한 번도 넘지 못한다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">영업이익률(OPM) 8개년 — 9% 천장</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">4.32~8.78% 한 자릿수 띠, 매출 규모로 뚫리지 않는다 (dartlab 연결)</text>
  <line x1="110" y1="420" x2="1010" y2="420" stroke="#64748b" stroke-width="1.5"/>
  <text x="1018" y="425" fill="#64748b" font-size="12">0</text>
  <line x1="110" y1="100.0" x2="1010" y2="100.0" stroke="#ef4444" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="1010" y="92.0" fill="#ef4444" font-size="14" font-weight="700" text-anchor="end">9% 천장(미돌파)</text>
  <rect x="118.0" y="250.4" width="64" height="169.6" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="150.0" y="240.4" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.8%</text>
  <text x="150.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2018</text>
  <rect x="240.9" y="266.4" width="64" height="153.6" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="272.9" y="256.4" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.3%</text>
  <text x="272.9" y="525" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <rect x="363.7" y="107.8" width="64" height="312.2" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="395.7" y="97.8" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.8%</text>
  <text x="395.7" y="525" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <rect x="486.6" y="139.1" width="64" height="280.9" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="518.6" y="129.1" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">7.9%</text>
  <text x="518.6" y="525" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <rect x="609.4" y="148.0" width="64" height="272.0" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="641.4" y="138.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">7.7%</text>
  <text x="641.4" y="525" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <rect x="732.3" y="245.1" width="64" height="174.9" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="764.3" y="235.1" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.9%</text>
  <text x="764.3" y="525" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <rect x="855.1" y="135.6" width="64" height="284.4" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="887.1" y="125.6" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.0%</text>
  <text x="887.1" y="525" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
  <rect x="978.0" y="175.4" width="64" height="244.6" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="1010.0" y="165.4" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">6.9%</text>
  <text x="1010.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
</svg>
