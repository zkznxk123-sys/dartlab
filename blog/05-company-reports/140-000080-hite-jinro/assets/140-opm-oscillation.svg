<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>OPM은 두 층을 진동한다</title>
  <desc>OPM이 4%대와 8%대 두 층을 오가며, 2023년은 매출이 늘었는데 영업이익이 급감한 단년 단절이다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">OPM은 두 층을 진동한다</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">4%대와 8%대 사이 톱니 — 2023년은 매출↑인데 영업이익↓(단년 단절)</text>
  <rect x="110" y="289.7" width="900" height="-134.5" fill="#22c55e" opacity="0.08"/>
  <text x="120" y="222.5" fill="#22c55e" font-size="13" opacity="0.85">8%대 층</text>
  <rect x="110" y="491.5" width="900" height="-100.9" fill="#f59e0b" opacity="0.08"/>
  <text x="120" y="441.1" fill="#f59e0b" font-size="13" opacity="0.85">4%대 층</text>
  <polyline points="150.0,439.7 272.9,470.0 395.7,170.0 518.6,229.2 641.4,246.0 764.3,429.6 887.1,222.5 1010.0,297.8" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="150.0" cy="439.7" r="5" fill="#3b82f6"/>
  <text x="150.0" y="424.7" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.8%</text>
  <text x="150.0" y="510" fill="#64748b" font-size="13" text-anchor="middle">2018</text>
  <circle cx="272.9" cy="470.0" r="5" fill="#3b82f6"/>
  <text x="272.9" y="455.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.3%</text>
  <text x="272.9" y="510" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <circle cx="395.7" cy="170.0" r="5" fill="#3b82f6"/>
  <text x="395.7" y="155.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.8%</text>
  <text x="395.7" y="510" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <circle cx="518.6" cy="229.2" r="5" fill="#3b82f6"/>
  <text x="518.6" y="214.2" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">7.9%</text>
  <text x="518.6" y="510" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <circle cx="641.4" cy="246.0" r="5" fill="#3b82f6"/>
  <text x="641.4" y="231.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">7.7%</text>
  <text x="641.4" y="510" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <circle cx="764.3" cy="429.6" r="9" fill="#fbbf24"/>
  <text x="764.3" y="414.6" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.9%</text>
  <text x="764.3" y="510" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <circle cx="887.1" cy="222.5" r="5" fill="#3b82f6"/>
  <text x="887.1" y="207.5" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.0%</text>
  <text x="887.1" y="510" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
  <circle cx="1010.0" cy="297.8" r="5" fill="#3b82f6"/>
  <text x="1010.0" y="282.8" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">6.9%</text>
  <text x="1010.0" y="510" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
</svg>
