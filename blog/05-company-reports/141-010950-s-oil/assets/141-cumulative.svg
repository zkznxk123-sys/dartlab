<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>8년을 합치면 현금이 손익의 3.18배</title>
  <desc>8년 누적 순이익 3.94조 대비 영업현금흐름 12.53조로 약 3.18배. 현금이 손익을 체계적으로 상회한다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">8년을 합치면 현금이 손익의 3.18배</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">단일 연도는 22배까지 어긋나도, 누적으로는 영업CF가 순익을 체계적으로 상회 (dartlab 연결)</text>
  <rect x="90" y="160" width="460" height="250" rx="14" fill="#11161f" stroke="#334155"/>
  <text x="320" y="215" fill="#94a3b8" font-size="18" text-anchor="middle">8년 누적 순이익</text>
  <text x="320" y="305" fill="#f59e0b" font-size="54" font-weight="800" text-anchor="middle">3.94조</text>
  <text x="320" y="360" fill="#64748b" font-size="15" text-anchor="middle">장부가 번 것</text>
  <rect x="530" y="160" width="460" height="250" rx="14" fill="#11161f" stroke="#334155"/>
  <text x="760" y="215" fill="#94a3b8" font-size="18" text-anchor="middle">8년 누적 영업CF</text>
  <text x="760" y="305" fill="#22c55e" font-size="54" font-weight="800" text-anchor="middle">12.53조</text>
  <text x="760" y="360" fill="#64748b" font-size="15" text-anchor="middle">통장에 들어온 것 = 3.18배</text>
  <text x="540" y="300" fill="#64748b" font-size="32" font-weight="700" text-anchor="middle">vs</text>
</svg>
