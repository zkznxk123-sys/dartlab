<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률(OPM) — 가격을 못 정하는 마진</title>
  <desc>영업이익률이 −6.5%에서 +8.0%까지 부호를 바꾼다. 정유사는 정제마진만 받는 가격수용자.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">영업이익률(OPM) — 가격을 못 정하는 마진</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">−6.5%(2020)에서 +8.0%(2022)까지, 정제마진이 정하는 얇은 띠 (dartlab 연결)</text>
  <line x1="110" y1="290" x2="1010" y2="290" stroke="#64748b" stroke-width="1.5"/>
  <text x="1018" y="295" fill="#64748b" font-size="12">0</text>
  <rect x="119.0" y="236.9" width="62" height="53.1" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="150.0" y="226.9" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">2.5%</text>
  <text x="150.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2018</text>
  <rect x="241.9" y="253.9" width="62" height="36.1" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="272.9" y="243.9" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">1.7%</text>
  <text x="272.9" y="525" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <rect x="364.7" y="290.0" width="62" height="120.0" rx="3" fill="#ef4444" opacity="0.85"/>
  <text x="395.7" y="430.0" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">-6.5%</text>
  <text x="395.7" y="525" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <rect x="487.6" y="124.2" width="62" height="165.8" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="518.6" y="114.2" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">7.8%</text>
  <text x="518.6" y="525" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <rect x="610.4" y="120.0" width="62" height="170.0" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="641.4" y="110.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.0%</text>
  <text x="641.4" y="525" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <rect x="733.3" y="209.2" width="62" height="80.8" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="764.3" y="199.2" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">3.8%</text>
  <text x="764.3" y="525" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <rect x="856.1" y="264.5" width="62" height="25.5" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="887.1" y="254.5" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">1.2%</text>
  <text x="887.1" y="525" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
  <rect x="979.0" y="275.1" width="62" height="14.9" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="1010.0" y="265.1" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">0.7%</text>
  <text x="1010.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
</svg>
