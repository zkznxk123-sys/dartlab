<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>같은 매출, 3.35배 다른 영업이익</title>
  <desc>2018과 2021은 매출이 +8% 차이인데 영업이익은 3.35배 차이. 손익을 지배하는 건 매출 규모가 아니라 OPM이다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">같은 매출, 3.35배 다른 영업이익</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">매출은 +8%인데 영업이익은 +235% — 지렛대는 규모가 아니라 마진율 (dartlab 연결)</text>
  <rect x="90" y="160" width="460" height="250" rx="14" fill="#11161f" stroke="#334155"/>
  <text x="320" y="215" fill="#94a3b8" font-size="18" text-anchor="middle">2018</text>
  <text x="320" y="305" fill="#3b82f6" font-size="54" font-weight="800" text-anchor="middle">0.639조</text>
  <text x="320" y="360" fill="#64748b" font-size="15" text-anchor="middle">매출 25.46조 · OPM 2.5%</text>
  <rect x="530" y="160" width="460" height="250" rx="14" fill="#11161f" stroke="#334155"/>
  <text x="760" y="215" fill="#94a3b8" font-size="18" text-anchor="middle">2021</text>
  <text x="760" y="305" fill="#22c55e" font-size="54" font-weight="800" text-anchor="middle">2.141조</text>
  <text x="760" y="360" fill="#64748b" font-size="15" text-anchor="middle">매출 27.46조 · OPM 7.8%</text>
  <text x="540" y="300" fill="#64748b" font-size="32" font-weight="700" text-anchor="middle">vs</text>
</svg>
