<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2026년에 봐야 할 다섯 가지</title>
  <desc>2026 추적점: OPM 8% 돌파·순이익 흑자 유지·영업CF 수렴은 내부, 지역 법인·K뷰티는 외부.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">코스맥스 — 규모≠가치포착, 영업선 아래 누수</text>
  <rect x="80" y="118" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="148" fill="#22c55e" font-size="20" font-weight="700">1</text>
  <text x="144" y="146" fill="#e2e8f0" font-size="16" font-weight="700">OPM이 8% 천장을 처음으로 넘는가</text>
  <text x="144" y="168" fill="#94a3b8" font-size="13">8년 내내 3.3~8.2% 밴드의 상단 돌파 여부</text>
  <rect x="80" y="192" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="222" fill="#22c55e" font-size="20" font-weight="700">2</text>
  <text x="144" y="220" fill="#e2e8f0" font-size="16" font-weight="700">순이익이 적자 없이 자리를 지키는가</text>
  <text x="144" y="242" fill="#94a3b8" font-size="13">2020·2022 같은 영업선 아래 적자의 재발 여부</text>
  <rect x="80" y="266" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="296" fill="#22c55e" font-size="20" font-weight="700">3</text>
  <text x="144" y="294" fill="#e2e8f0" font-size="16" font-weight="700">영업CF가 순이익과 같은 방향으로 수렴하는가</text>
  <text x="144" y="316" fill="#94a3b8" font-size="13">2023 6.08배 같은 역행이 좁혀지는지</text>
  <rect x="80" y="340" width="920" height="64" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
  <text x="108" y="370" fill="#fbbf24" font-size="20" font-weight="700">4</text>
  <text x="144" y="368" fill="#e2e8f0" font-size="16" font-weight="700">중국·미국 법인 손익 (외부)</text>
  <text x="144" y="390" fill="#94a3b8" font-size="13">영업선 아래 누수의 후보 — 지역 법인 적자/회복</text>
  <rect x="80" y="414" width="920" height="64" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
  <text x="108" y="444" fill="#fbbf24" font-size="20" font-weight="700">5</text>
  <text x="144" y="442" fill="#e2e8f0" font-size="16" font-weight="700">K뷰티 수출·고객사 믹스 (외부)</text>
  <text x="144" y="464" fill="#94a3b8" font-size="13">ODM 제조 마진을 끌어올릴 여지가 있는지</text>
  <text x="540" y="512" fill="#64748b" font-size="13" text-anchor="middle">[내부] = dartlab 연결로 검증 가능 · (외부) = IR·공시·시장지표 인용</text>
</svg>
