<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률(OPM) — 한 자릿수 천장</title>
  <desc>영업이익률이 8년 내내 3.3~8.2%의 한 자릿수 밴드에 머문다. 세계 최대 ODM인데 마진은 얇다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">영업이익률(OPM) — 한 자릿수 천장</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">8년 내내 3.3~8.2% 밴드, 최고치도 8.2% — 규모가 마진으로 안 바뀐다 (dartlab 연결)</text>
  <line x1="110" y1="430" x2="1010" y2="430" stroke="#64748b" stroke-width="1.5"/>
  <text x="1018" y="435" fill="#64748b" font-size="12">0</text>
  <rect x="119.0" y="265.0" width="62" height="165.0" rx="3" fill="#ec4899" opacity="0.85"/>
  <text x="150.0" y="255.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.1%</text>
  <text x="150.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2018</text>
  <rect x="241.9" y="265.0" width="62" height="165.0" rx="3" fill="#ec4899" opacity="0.85"/>
  <text x="272.9" y="255.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.1%</text>
  <text x="272.9" y="525" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <rect x="364.7" y="236.8" width="62" height="193.2" rx="3" fill="#ec4899" opacity="0.85"/>
  <text x="395.7" y="226.8" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.8%</text>
  <text x="395.7" y="525" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <rect x="487.6" y="120.1" width="62" height="309.9" rx="3" fill="#ec4899" opacity="0.85"/>
  <text x="518.6" y="110.1" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">7.7%</text>
  <text x="518.6" y="525" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <rect x="610.4" y="297.2" width="62" height="132.8" rx="3" fill="#ec4899" opacity="0.85"/>
  <text x="641.4" y="287.2" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">3.3%</text>
  <text x="641.4" y="525" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <rect x="733.3" y="168.4" width="62" height="261.6" rx="3" fill="#ec4899" opacity="0.85"/>
  <text x="764.3" y="158.4" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">6.5%</text>
  <text x="764.3" y="525" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <rect x="856.1" y="104.0" width="62" height="326.0" rx="3" fill="#ec4899" opacity="0.85"/>
  <text x="887.1" y="94.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.1%</text>
  <text x="887.1" y="525" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
  <rect x="979.0" y="100.0" width="62" height="330.0" rx="3" fill="#ec4899" opacity="0.85"/>
  <text x="1010.0" y="90.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.2%</text>
