  <text x="340.0" y="500" fill="#64748b" font-size="12" text-anchor="middle">2019</text>
  <text x="450.0" y="500" fill="#64748b" font-size="12" text-anchor="middle">2020</text>
  <text x="560.0" y="500" fill="#64748b" font-size="12" text-anchor="middle">2021</text>
  <text x="670.0" y="500" fill="#64748b" font-size="12" text-anchor="middle">2022</text>
  <text x="780.0" y="500" fill="#64748b" font-size="12" text-anchor="middle">2023</text>
  <text x="890.0" y="500" fill="#64748b" font-size="12" text-anchor="middle">2024</text>
  <text x="1000.0" y="500" fill="#64748b" font-size="12" text-anchor="middle">2025</text>
