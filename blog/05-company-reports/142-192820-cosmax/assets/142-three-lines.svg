  <circle cx="340.0" cy="378.4" r="3" fill="#f59e0b"/>
  <circle cx="450.0" cy="406.0" r="3" fill="#f59e0b"/>
  <circle cx="560.0" cy="372.8" r="3" fill="#f59e0b"/>
