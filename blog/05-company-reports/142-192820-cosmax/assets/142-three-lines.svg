<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>세 수평선이 다른 박자로 움직였다</title>
  <desc>매출은 +90% 우상향하지만 영업이익률은 4~8% 천장 밴드에 갇히고 순이익률은 2020·2022 음수까지 톱니로 움직인다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">세 수평선이 다른 박자로 움직였다</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">코스맥스 8개년 — 매출은 우상향, 영업이익률은 천장, 순이익률은 톱니 (dartlab 연결)</text>
  <line x1="200" y1="160" x2="1010" y2="160" stroke="#334155" stroke-width="0.8" stroke-dasharray="2 4"/>
  <text x="40" y="156" fill="#22c55e" font-size="15" font-weight="700">매출</text>
  <text x="40" y="176" fill="#64748b" font-size="11">+90% 우상향(외형)</text>
  <polyline points="230.0,190.0 340.0,186.3 450.0,183.5 560.0,172.5 670.0,172.1 780.0,162.7 890.0,142.3 1000.0,130.0" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linejoin="round" opacity="0.95"/>
  <circle cx="230.0" cy="190.0" r="3" fill="#22c55e"/>
  <circle cx="340.0" cy="186.3" r="3" fill="#22c55e"/>
  <circle cx="450.0" cy="183.5" r="3" fill="#22c55e"/>
  <circle cx="560.0" cy="172.5" r="3" fill="#22c55e"/>
  <circle cx="670.0" cy="172.1" r="3" fill="#22c55e"/>
  <circle cx="780.0" cy="162.7" r="3" fill="#22c55e"/>
  <circle cx="890.0" cy="142.3" r="3" fill="#22c55e"/>
  <circle cx="1000.0" cy="130.0" r="3" fill="#22c55e"/>
  <line x1="200" y1="268" x2="1010" y2="268" stroke="#334155" stroke-width="0.8" stroke-dasharray="2 4"/>
  <text x="40" y="264" fill="#ec4899" font-size="15" font-weight="700">OPM</text>
  <text x="40" y="284" fill="#64748b" font-size="11">4~8% 천장(밴드)</text>
  <polyline points="230.0,285.5 340.0,285.5 450.0,278.1 560.0,247.3 670.0,294.0 780.0,260.0 890.0,243.1 1000.0,242.0" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linejoin="round" opacity="0.95"/>
  <circle cx="230.0" cy="285.5" r="3" fill="#ec4899"/>
  <circle cx="340.0" cy="285.5" r="3" fill="#ec4899"/>
  <circle cx="450.0" cy="278.1" r="3" fill="#ec4899"/>
  <circle cx="560.0" cy="247.3" r="3" fill="#ec4899"/>
  <circle cx="670.0" cy="294.0" r="3" fill="#ec4899"/>
  <circle cx="780.0" cy="260.0" r="3" fill="#ec4899"/>
  <circle cx="890.0" cy="243.1" r="3" fill="#ec4899"/>
  <circle cx="1000.0" cy="242.0" r="3" fill="#ec4899"/>
  <line x1="200" y1="376" x2="1010" y2="376" stroke="#334155" stroke-width="0.8" stroke-dasharray="2 4"/>
  <text x="40" y="372" fill="#f59e0b" font-size="15" font-weight="700">NPM</text>
  <text x="40" y="392" fill="#64748b" font-size="11">톱니·2020·2022 음수</text>
  <polyline points="230.0,376.0 340.0,378.4 450.0,406.0 560.0,372.8 670.0,397.3 780.0,372.8 890.0,357.1 1000.0,346.0" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round" opacity="0.95"/>
