<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>현금이 이익보다 먼저 닿았다 — 배수 9→3</title>
  <desc>영업현금흐름을 영업이익으로 나눈 배수가 2020년 9배에서 2025년 3배로 단조 감소한다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">현금이 이익보다 먼저 닿았다 — 배수 9→3</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">영업현금흐름 ÷ 영업이익. 격차가 단조로 좁혀진다(2019 31배는 분모노이즈라 제외)</text>
  <polyline points="150.0,170.0 322.0,200.0 494.0,230.0 666.0,395.0 838.0,465.0 1010.0,470.0" fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="150.0" cy="170.0" r="5" fill="#22c55e"/>
  <text x="150.0" y="155.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">9.0배</text>
  <text x="150.0" y="510" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <circle cx="322.0" cy="200.0" r="5" fill="#22c55e"/>
  <text x="322.0" y="185.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.4배</text>
  <text x="322.0" y="510" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <circle cx="494.0" cy="230.0" r="5" fill="#22c55e"/>
  <text x="494.0" y="215.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">7.8배</text>
  <text x="494.0" y="510" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <circle cx="666.0" cy="395.0" r="5" fill="#22c55e"/>
  <text x="666.0" y="380.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.5배</text>
  <text x="666.0" y="510" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <circle cx="838.0" cy="465.0" r="5" fill="#22c55e"/>
  <text x="838.0" y="450.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">3.1배</text>
  <text x="838.0" y="510" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
  <circle cx="1010.0" cy="470.0" r="5" fill="#22c55e"/>
  <text x="1010.0" y="455.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">3.0배</text>
  <text x="1010.0" y="510" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
</svg>
