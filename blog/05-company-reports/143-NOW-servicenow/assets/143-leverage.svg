<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>운영 레버리지가 장부에서 켜진 자리</title>
  <desc>2023→2025 영업이익 증가율(+139%)이 매출 증가율(+48%)을 처음 추월. 운영 레버리지가 장부에서 점화했다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">운영 레버리지가 장부에서 켜진 자리</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">2023~2025 들어 영업이익 증가율이 매출 증가율을 처음으로 넘었다 (dartlab 연결)</text>
  <rect x="90" y="160" width="460" height="250" rx="14" fill="#11161f" stroke="#334155"/>
  <text x="320" y="215" fill="#94a3b8" font-size="18" text-anchor="middle">2023→2025 매출</text>
  <text x="320" y="305" fill="#3b82f6" font-size="54" font-weight="800" text-anchor="middle">+48%</text>
  <text x="320" y="360" fill="#64748b" font-size="15" text-anchor="middle">외형 성장</text>
  <rect x="530" y="160" width="460" height="250" rx="14" fill="#11161f" stroke="#334155"/>
  <text x="760" y="215" fill="#94a3b8" font-size="18" text-anchor="middle">2023→2025 영업이익</text>
  <text x="760" y="305" fill="#22c55e" font-size="54" font-weight="800" text-anchor="middle">+139%</text>
  <text x="760" y="360" fill="#64748b" font-size="15" text-anchor="middle">이익이 매출을 처음 추월 = 레버리지</text>
  <text x="540" y="300" fill="#64748b" font-size="32" font-weight="700" text-anchor="middle">vs</text>
</svg>
