<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률(OPM) — 4년 늦게 켜진 스위치</title>
  <desc>영업이익률이 2019년 1.2%에서 2025년 13.7%로, 특히 2023년부터 본격 확장하며 운영 레버리지가 늦게 점화했다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">영업이익률(OPM) — 4년 늦게 켜진 스위치</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">1.2%→13.7%, 2023년부터 본격 확장(레버리지 점화) (dartlab 연결)</text>
  <line x1="110" y1="440" x2="1010" y2="440" stroke="#64748b" stroke-width="1.5"/>
  <text x="1018" y="445" fill="#64748b" font-size="12">0</text>
  <rect x="119.0" y="410.2" width="62" height="29.8" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="150.0" y="400.2" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">1.2%</text>
  <text x="150.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <rect x="262.3" y="330.8" width="62" height="109.2" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="293.3" y="320.8" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.4%</text>
  <text x="293.3" y="525" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <rect x="405.7" y="330.8" width="62" height="109.2" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="436.7" y="320.8" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.4%</text>
  <text x="436.7" y="525" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <rect x="549.0" y="320.9" width="62" height="119.1" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="580.0" y="310.9" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">4.8%</text>
  <text x="580.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <rect x="692.3" y="229.1" width="62" height="210.9" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="723.3" y="219.1" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">8.5%</text>
  <text x="723.3" y="525" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <rect x="835.7" y="132.3" width="62" height="307.7" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="866.7" y="122.3" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">12.4%</text>
  <text x="866.7" y="525" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
  <rect x="979.0" y="100.0" width="62" height="340.0" rx="3" fill="#22c55e" opacity="1"/>
  <text x="1010.0" y="90.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">13.7%</text>
  <text x="1010.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
</svg>
