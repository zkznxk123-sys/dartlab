<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2026년에 봐야 할 다섯 가지</title>
  <desc>2026 추적점: 현금전환 배율·이익-현금 격차·OPM·순이익 변동은 내부, 테이크레이트·믹스는 외부.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">PayPal — 이익은 우상향, 현금은 제자리</text>
  <rect x="80" y="118" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="148" fill="#22c55e" font-size="20" font-weight="700">1</text>
  <text x="144" y="146" fill="#e2e8f0" font-size="16" font-weight="700">OCF/영업이익 배율이 1.06에서 반등하는가</text>
  <text x="144" y="168" fill="#94a3b8" font-size="13">2.50→1.06으로 묽어진 현금전환의 다음 방향</text>
  <rect x="80" y="192" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="222" fill="#22c55e" font-size="20" font-weight="700">2</text>
  <text x="144" y="220" fill="#e2e8f0" font-size="16" font-weight="700">영업이익과 영업CF의 격차가 좁혀지는가</text>
  <text x="144" y="242" fill="#94a3b8" font-size="13">영업이익 2.77배 vs 현금 1.17배의 간극</text>
  <rect x="80" y="266" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="296" fill="#22c55e" font-size="20" font-weight="700">3</text>
  <text x="144" y="294" fill="#e2e8f0" font-size="16" font-weight="700">OPM이 18.3% 위로 더 개선되는가</text>
  <text x="144" y="316" fill="#94a3b8" font-size="13">14→18% 개선의 지속(2022 함몰 재발 여부)</text>
  <rect x="80" y="340" width="920" height="64" rx="8" fill="#11161f" stroke="#334155" stroke-width="1.2"/>
  <text x="108" y="370" fill="#22c55e" font-size="20" font-weight="700">4</text>
  <text x="144" y="368" fill="#e2e8f0" font-size="16" font-weight="700">순이익 변동성(2.42~5.23)이 안정되는가</text>
  <text x="144" y="390" fill="#94a3b8" font-size="13">영업 외 항목이 최종이익을 흔드는지</text>
  <rect x="80" y="414" width="920" height="64" rx="8" fill="#11161f" stroke="#475569" stroke-width="1.2"/>
  <text x="108" y="444" fill="#fbbf24" font-size="20" font-weight="700">5</text>
  <text x="144" y="442" fill="#e2e8f0" font-size="16" font-weight="700">테이크레이트·Braindtree 믹스 (외부)</text>
  <text x="144" y="464" fill="#94a3b8" font-size="13">현금전환 약화의 후보 가설 — 내부 증명 불가</text>
  <text x="540" y="512" fill="#64748b" font-size="13" text-anchor="middle">[내부] = dartlab 연결로 검증 가능 · (외부) = IR·공시·시장지표 인용</text>
</svg>
