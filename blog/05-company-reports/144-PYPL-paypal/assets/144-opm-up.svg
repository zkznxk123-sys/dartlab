<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익률(OPM) — 손익은 분명히 좋아졌다</title>
  <desc>영업이익률이 14.2%에서 18.3%로 개선됐다. 다만 2022년 14.0%로 한 번 함몰했다 회복한 비단조 경로다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">영업이익률(OPM) — 손익은 분명히 좋아졌다</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">14.2%→18.3% 개선, 단 2022년 14.0%로 한 번 함몰 후 회복 (dartlab 연결)</text>
  <line x1="110" y1="440" x2="1010" y2="440" stroke="#64748b" stroke-width="1.5"/>
  <text x="1018" y="445" fill="#64748b" font-size="12">0</text>
  <rect x="119.0" y="183.9" width="62" height="256.1" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="150.0" y="173.9" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">14.2%</text>
  <text x="150.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2018</text>
  <rect x="241.9" y="164.1" width="62" height="275.9" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="272.9" y="154.1" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">15.3%</text>
  <text x="272.9" y="525" fill="#64748b" font-size="13" text-anchor="middle">2019</text>
  <rect x="364.7" y="164.1" width="62" height="275.9" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="395.7" y="154.1" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">15.3%</text>
  <text x="395.7" y="525" fill="#64748b" font-size="13" text-anchor="middle">2020</text>
  <rect x="487.6" y="137.0" width="62" height="303.0" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="518.6" y="127.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">16.8%</text>
  <text x="518.6" y="525" fill="#64748b" font-size="13" text-anchor="middle">2021</text>
  <rect x="610.4" y="187.5" width="62" height="252.5" rx="3" fill="#f59e0b" opacity="1"/>
  <text x="641.4" y="177.5" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">14.0%</text>
  <text x="641.4" y="525" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <rect x="733.3" y="135.2" width="62" height="304.8" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="764.3" y="125.2" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">16.9%</text>
  <text x="764.3" y="525" fill="#64748b" font-size="13" text-anchor="middle">2023</text>
  <rect x="856.1" y="137.0" width="62" height="303.0" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="887.1" y="127.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">16.8%</text>
  <text x="887.1" y="525" fill="#64748b" font-size="13" text-anchor="middle">2024</text>
  <rect x="979.0" y="110.0" width="62" height="330.0" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="1010.0" y="100.0" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">18.3%</text>
  <text x="1010.0" y="525" fill="#64748b" font-size="13" text-anchor="middle">2025</text>
</svg>
