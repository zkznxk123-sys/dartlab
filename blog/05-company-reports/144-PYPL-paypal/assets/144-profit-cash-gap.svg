<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>장부 이익은 2.77배, 통장 현금은 1.17배</title>
  <desc>8년간 영업이익은 2.77배가 됐는데 영업현금흐름은 1.17배에 그쳤다. 이익과 현금이 갈라졌다.</desc>
  <rect width="1080" height="540" fill="#0a0e1a"/>
  <text x="540.0" y="50" fill="#f1f5f9" font-size="25" font-weight="700" text-anchor="middle">장부 이익은 2.77배, 통장 현금은 1.17배</text>
  <text x="540.0" y="82" fill="#64748b" font-size="15" text-anchor="middle">이익은 가파르게 늘었는데 현금은 거의 제자리 — 갈라진 두 배수 (dartlab 연결)</text>
  <rect x="90" y="160" width="460" height="250" rx="14" fill="#11161f" stroke="#334155"/>
  <text x="320" y="215" fill="#94a3b8" font-size="18" text-anchor="middle">8년 영업이익</text>
  <text x="320" y="305" fill="#3b82f6" font-size="54" font-weight="800" text-anchor="middle">2.77배</text>
  <text x="320" y="360" fill="#64748b" font-size="15" text-anchor="middle">장부 이익(2.19→6.07B)</text>
  <rect x="530" y="160" width="460" height="250" rx="14" fill="#11161f" stroke="#334155"/>
  <text x="760" y="215" fill="#94a3b8" font-size="18" text-anchor="middle">8년 영업CF</text>
  <text x="760" y="305" fill="#f59e0b" font-size="54" font-weight="800" text-anchor="middle">1.17배</text>
  <text x="760" y="360" fill="#64748b" font-size="15" text-anchor="middle">실제 현금(5.48→6.42B)</text>
  <text x="540" y="300" fill="#64748b" font-size="32" font-weight="700" text-anchor="middle">vs</text>
</svg>
