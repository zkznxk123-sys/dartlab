<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" font-family="Pretendard, -apple-system, Segoe UI, sans-serif">
<rect width="900" height="506" fill="#0a0e1a"/>
<text x="40" y="46" fill="#e2e8f0" font-size="25" font-weight="700">코인베이스 — 2026년에 봐야 할 다섯 가지</text>
<circle cx="58" cy="115" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="120" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">1</text>
<text x="84" y="112" fill="#e2e8f0" font-size="15">구독·서비스 비중이 거래수익을 추월하는가 (약세장에서 역전되면 '인질 탈출' 첫 증거)</text>
<circle cx="58" cy="147" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="152" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">2</text>
<text x="84" y="144" fill="#e2e8f0" font-size="15">다음 약세장의 영업이익 부호 — ballast 덕에 음수를 피하면 구조 변화 실증</text>
<circle cx="58" cy="179" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="184" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">3</text>
<text x="84" y="176" fill="#e2e8f0" font-size="15">2025 매출 +9%에 영업이익 감소가 일회성(Deribit·SBC)인지 구조적인지</text>
<circle cx="58" cy="211" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="216" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">4</text>
<text x="84" y="208" fill="#e2e8f0" font-size="15">USDC 스테이블코인 이자의 금리 민감도 — ballast가 또 다른 외생변수(금리)에</text>
<text x="84" y="228" fill="#94a3b8" font-size="15">묶이는지</text>
<circle cx="58" cy="263" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="268" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">5</text>
<text x="84" y="260" fill="#e2e8f0" font-size="15">영업현금흐름과 영업이익의 거리 — 수탁자금 섞임에 따른 '현금기계' 오독 위험</text>
</svg>