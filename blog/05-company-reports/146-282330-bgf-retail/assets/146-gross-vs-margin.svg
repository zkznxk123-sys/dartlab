<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" font-family="Pretendard, -apple-system, Segoe UI, sans-serif">
<rect width="900" height="506" fill="#0a0e1a"/>
<text x="40" y="46" fill="#e2e8f0" font-size="25" font-weight="700">매출 총액과 본부의 진짜 몫은 다른 화폐다</text>
<text x="40" y="74" fill="#64748b" font-size="15">principal gross — 가맹점 판매 총액이 본부 장부를 통과</text>
<text x="142" y="240" fill="#22c55e" font-size="46" font-weight="800" text-anchor="middle">9.06조</text>
<text x="142" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">2025 연결 매출 (가맹점</text>
<text x="142" y="307" fill="#94a3b8" font-size="15" text-anchor="middle">상품 총액)</text>
<line x1="245" y1="180" x2="245" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="348" y="240" fill="#3b82f6" font-size="46" font-weight="800" text-anchor="middle">2,540억</text>
<text x="348" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">2025 영업이익 (본부 배분</text>
<text x="348" y="307" fill="#94a3b8" font-size="15" text-anchor="middle">몫)</text>
<line x1="450" y1="180" x2="450" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="552" y="240" fill="#f59e0b" font-size="46" font-weight="800" text-anchor="middle">2.80%</text>
<text x="552" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">영업이익률 (총액 분모 기준)</text>
<line x1="655" y1="180" x2="655" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="758" y="240" fill="#a855f7" font-size="46" font-weight="800" text-anchor="middle">약 1.8만</text>
<text x="758" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">가맹점 수 (외부)</text>
</svg>