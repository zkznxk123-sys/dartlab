<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" font-family="Pretendard, -apple-system, Segoe UI, sans-serif">
<rect width="900" height="506" fill="#0a0e1a"/>
<text x="40" y="46" fill="#e2e8f0" font-size="25" font-weight="700">대상 — 2026년에 봐야 할 다섯 가지</text>
<circle cx="58" cy="115" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="120" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">1</text>
<text x="84" y="112" fill="#e2e8f0" font-size="15">2025 사업보고서의 4분기 순손실 -3,721억 정확한 일회성 항목(손상 vs</text>
<text x="84" y="132" fill="#94a3b8" font-size="15">이연법인세)</text>
<circle cx="58" cy="167" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="172" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">2</text>
<text x="84" y="164" fill="#e2e8f0" font-size="15">전사 OPM이 최근 10년 3.0~5.6% 밴드를 처음</text>
<text x="84" y="184" fill="#94a3b8" font-size="15">상회(&gt;5.6%)/하회(&lt;3%)하는가</text>
<circle cx="58" cy="219" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="224" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">3</text>
<text x="84" y="216" fill="#e2e8f0" font-size="15">알룰로스가 specialty 효과로 마진을 내는가, 증설 경쟁에 commodity화하는가</text>
<circle cx="58" cy="251" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="256" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">4</text>
<text x="84" y="248" fill="#e2e8f0" font-size="15">김치(종가) 브랜드가 소재 대비 구조적 고마진을 내는가 (부문 영업이익 공시)</text>
<circle cx="58" cy="283" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="288" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">5</text>
<text x="84" y="280" fill="#e2e8f0" font-size="15">2026 순이익이 영업이익(~1,700억대)에 수렴해 흑자전환하는가 (일회성 검증)</text>
</svg>