<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" font-family="Pretendard, -apple-system, Segoe UI, sans-serif">
<rect width="900" height="506" fill="#0a0e1a"/>
<text x="40" y="46" fill="#e2e8f0" font-size="25" font-weight="700">발효 한 우물, 산물의 사다리 (외부 인용)</text>
<text x="40" y="74" fill="#64748b" font-size="15">선발→증설→가격결정력 약화 — 같은 사이클 반복</text>
<text x="142" y="240" fill="#22c55e" font-size="46" font-weight="800" text-anchor="middle">MSG</text>
<text x="142" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">1956 미원 — 한국 최초</text>
<text x="142" y="307" fill="#94a3b8" font-size="15" text-anchor="middle">발효조미료</text>
<line x1="245" y1="180" x2="245" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="348" y="240" fill="#f59e0b" font-size="46" font-weight="800" text-anchor="middle">라이신</text>
<text x="348" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">1998 매각→2015 재인수,</text>
<text x="348" y="307" fill="#94a3b8" font-size="15" text-anchor="middle">중국 저가 공세</text>
<line x1="450" y1="180" x2="450" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="552" y="240" fill="#3b82f6" font-size="46" font-weight="800" text-anchor="middle">알룰로스</text>
<text x="552" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">CJ 4년만 철수·삼양</text>
<text x="552" y="307" fill="#94a3b8" font-size="15" text-anchor="middle">1.3만톤 증설</text>
<line x1="655" y1="180" x2="655" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="758" y="240" fill="#ef4444" font-size="46" font-weight="800" text-anchor="middle">→ 천장</text>
<text x="758" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">산물 바뀌어도 증설 경쟁이 따라옴</text>
</svg>