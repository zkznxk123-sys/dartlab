<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" font-family="Pretendard, -apple-system, Segoe UI, sans-serif">
<rect width="900" height="506" fill="#0a0e1a"/>
<text x="40" y="46" fill="#e2e8f0" font-size="25" font-weight="700">할인을 좁히는 손, 그 끝의 지배구조 (외부 보도)</text>
<text x="40" y="74" fill="#64748b" font-size="15">자사주 소각=분모 감소로 지분율 산술 상승 (외부 보도 해석)</text>
<text x="142" y="240" fill="#3b82f6" font-size="46" font-weight="800" text-anchor="middle">13.2%</text>
<text x="142" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">자사주 보통주 전량 소각</text>
<text x="142" y="307" fill="#94a3b8" font-size="15" text-anchor="middle">(2024~26)</text>
<line x1="245" y1="180" x2="245" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="348" y="240" fill="#f59e0b" font-size="46" font-weight="800" text-anchor="middle">+1.79%p</text>
<text x="348" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">이재용 지분율 산술 상승(2년)</text>
<line x1="450" y1="180" x2="450" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="552" y="240" fill="#22c55e" font-size="46" font-weight="800" text-anchor="middle">20.70%</text>
<text x="552" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">2026 이재용 지분율 전망</text>
<line x1="655" y1="180" x2="655" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="758" y="240" fill="#a855f7" font-size="46" font-weight="800" text-anchor="middle">→ 승계</text>
<text x="758" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">이재용→물산→생명→전자</text>
</svg>