<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" font-family="Pretendard, -apple-system, Segoe UI, sans-serif">
<rect width="900" height="506" fill="#0a0e1a"/>
<text x="40" y="46" fill="#e2e8f0" font-size="25" font-weight="700">삼성물산 — 2026년에 봐야 할 다섯 가지</text>
<circle cx="58" cy="115" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="120" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">1</text>
<text x="84" y="112" fill="#e2e8f0" font-size="15">2026.3 자사주 잔여 소각 완료 후 NAV 할인율이 54%대에서 좁혀지는가</text>
<circle cx="58" cy="147" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="152" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">2</text>
<text x="84" y="144" fill="#e2e8f0" font-size="15">삼성바이오로직스 실적이 순이익의 '영업이익 초과분'을 다시 키우는가</text>
<circle cx="58" cy="179" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="184" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">3</text>
<text x="84" y="176" fill="#e2e8f0" font-size="15">본업(건설) 회복으로 영업이익이 2025 3.29조 위로 더 성장하는가</text>
<circle cx="58" cy="211" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="216" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">4</text>
<text x="84" y="208" fill="#e2e8f0" font-size="15">이재용 지분율이 자사주 소각만으로 2026년 20.70%선에 실제 도달하는가</text>
<circle cx="58" cy="243" r="15" fill="#3b82f6" opacity="0.18"/>
<text x="58" y="248" fill="#3b82f6" font-size="16" font-weight="700" text-anchor="middle">5</text>
<text x="84" y="240" fill="#e2e8f0" font-size="15">삼성전자 주가가 삼성물산 시총·NAV 할인율을 끌어당기는 정도(가치 무게추=전자 검증)</text>
</svg>