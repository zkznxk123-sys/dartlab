<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" font-family="Pretendard, -apple-system, Segoe UI, sans-serif">
<rect width="900" height="506" fill="#0a0e1a"/>
<text x="40" y="46" fill="#e2e8f0" font-size="25" font-weight="700">한 회사, 두 시선 — 손익 자산과 가치 자산이 다르다</text>
<text x="40" y="74" fill="#64748b" font-size="15">순이익을 흔드는 자산 ≠ 시가총액을 흔드는 자산 (외부 인용)</text>
<text x="245" y="240" fill="#3b82f6" font-size="46" font-weight="800" text-anchor="middle">바이오</text>
<text x="245" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">손익 엔진 = 삼성바이오로직스</text>
<text x="245" y="307" fill="#94a3b8" font-size="15" text-anchor="middle">(연결 종속, 43%)</text>
<line x1="450" y1="180" x2="450" y2="320" stroke="#1e293b" stroke-width="1"/>
<text x="655" y="240" fill="#22c55e" font-size="46" font-weight="800" text-anchor="middle">전자</text>
<text x="655" y="285" fill="#94a3b8" font-size="15" text-anchor="middle">가치 무게추 = 삼성전자 (연결</text>
<text x="655" y="307" fill="#94a3b8" font-size="15" text-anchor="middle">밖 지분, 5.0%)</text>
</svg>