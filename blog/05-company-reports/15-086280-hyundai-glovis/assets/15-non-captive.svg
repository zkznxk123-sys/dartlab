<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">캡티브 → 비계열 전환 — 적의 차를 실어 나른다</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">해상운송 기준 | BYD 등 중국 OEM 물량 확대</text>

  <!-- 2022 -->
  <text x="200" y="105" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">2022</text>
  <rect x="130" y="110" width="98" height="140" rx="4" fill="#94a3b8" opacity="0.6"/>
  <rect x="228" y="110" width="42" height="140" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="179" y="185" font-size="11" fill="#f1f5f9" text-anchor="middle">70%</text>
  <text x="249" y="185" font-size="11" fill="#f1f5f9" text-anchor="middle">30%</text>

  <!-- 2023 -->
  <text x="380" y="105" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">2023</text>
  <rect x="310" y="110" width="84" height="140" rx="4" fill="#94a3b8" opacity="0.6"/>
  <rect x="394" y="110" width="56" height="140" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="352" y="185" font-size="11" fill="#f1f5f9" text-anchor="middle">60%</text>
  <text x="422" y="185" font-size="11" fill="#f1f5f9" text-anchor="middle">40%</text>

  <!-- 2024 -->
  <text x="560" y="105" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">2024</text>
  <rect x="490" y="110" width="80" height="140" rx="4" fill="#94a3b8" opacity="0.6"/>
  <rect x="570" y="110" width="60" height="140" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="530" y="185" font-size="11" fill="#f1f5f9" text-anchor="middle">57%</text>
  <text x="600" y="185" font-size="11" fill="#f1f5f9" text-anchor="middle">43%</text>

  <!-- 2025 -->
  <text x="740" y="105" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">2025</text>
  <rect x="670" y="110" width="63" height="140" rx="4" fill="#94a3b8" opacity="0.6"/>
  <rect x="733" y="110" width="77" height="140" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="701" y="185" font-size="11" fill="#f1f5f9" text-anchor="middle">45%</text>
  <text x="771" y="185" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">55%</text>

  <!-- 범례 -->
  <rect x="860" y="140" width="16" height="16" rx="3" fill="#94a3b8" opacity="0.6"/>
  <text x="882" y="153" font-size="12" fill="#94a3b8">캡티브</text>
  <rect x="860" y="168" width="16" height="16" rx="3" fill="#22c55e"/>
  <text x="882" y="181" font-size="12" fill="#22c55e">비계열</text>

  <text x="540" y="280" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">2025년, 비계열이 캡티브를 추월했다</text>
</svg>
