<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">물류업 영업이익률 비교 — 현대글로비스 7.0%</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">CJ대한통운의 1.6배, 한진의 2.1배</text>

  <!-- 현대글로비스 7.0% -->
  <text x="200" y="110" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="end">현대글로비스</text>
  <rect x="220" y="92" width="490" height="30" rx="6" fill="#22c55e" opacity="0.85"/>
  <text x="720" y="112" font-size="16" font-weight="800" fill="#22c55e">7.0%</text>

  <!-- CJ대한통운 4.4% -->
  <text x="200" y="165" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="end">CJ대한통운</text>
  <rect x="220" y="147" width="308" height="30" rx="6" fill="#94a3b8" opacity="0.6"/>
  <text x="538" y="167" font-size="16" font-weight="700" fill="#94a3b8">4.4%</text>

  <!-- 한진 3.3% -->
  <text x="200" y="220" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="end">한진</text>
  <rect x="220" y="202" width="231" height="30" rx="6" fill="#94a3b8" opacity="0.6"/>
  <text x="461" y="222" font-size="16" font-weight="700" fill="#94a3b8">3.3%</text>

  <text x="540" y="275" font-size="12" fill="#475569" text-anchor="middle">2025년 기준 | 연결 재무제표</text>
</svg>
