<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">매출의 18%가 이익의 36%를 만든다</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">해운이 진짜 엔진</text>

  <!-- 좌측: 매출 비중 도넛 -->
  <text x="280" y="90" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="middle">매출 비중</text>
  <!-- 유통 47.6% = 171.4deg, 물류 34.1% = 122.8deg, 해운 18.3% = 65.9deg -->
  <!-- 유통: 0~171.4 -->
  <path d="M280,200 L280,80 A120,120 0 0,1 393,263 Z" fill="#94a3b8" opacity="0.7"/>
  <!-- 물류: 171.4~294.2 -->
  <path d="M280,200 L393,263 A120,120 0 0,1 191,284 Z" fill="#3b82f6" opacity="0.7"/>
  <!-- 해운: 294.2~360 -->
  <path d="M280,200 L191,284 A120,120 0 0,1 280,80 Z" fill="#22c55e" opacity="0.85"/>
  <circle cx="280" cy="200" r="55" fill="#0a0e1a"/>
  <text x="280" y="197" font-size="12" font-weight="600" fill="#f1f5f9" text-anchor="middle">매출</text>
  <text x="280" y="213" font-size="11" fill="#64748b" text-anchor="middle">29.6조</text>

  <!-- 우측: 영업이익 비중 도넛 -->
  <text x="800" y="90" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="middle">영업이익 비중</text>
  <!-- 유통 27.7% = 99.7deg, 물류 36.3% = 130.7deg, 해운 35.9% = 129.2deg -->
  <!-- 유통: 0~99.7 -->
  <path d="M800,200 L800,80 A120,120 0 0,1 879,128 Z" fill="#94a3b8" opacity="0.7"/>
  <!-- 물류: 99.7~230.4 -->
  <path d="M800,200 L879,128 A120,120 0 0,1 705,296 Z" fill="#3b82f6" opacity="0.7"/>
  <!-- 해운: 230.4~360 -->
  <path d="M800,200 L705,296 A120,120 0 0,1 800,80 Z" fill="#22c55e" opacity="0.85"/>
  <circle cx="800" cy="200" r="55" fill="#0a0e1a"/>
  <text x="800" y="197" font-size="12" font-weight="600" fill="#f1f5f9" text-anchor="middle">영업이익</text>
  <text x="800" y="213" font-size="11" fill="#64748b" text-anchor="middle">2.07조</text>

  <!-- 범례 -->
  <rect x="440" y="150" width="14" height="14" rx="3" fill="#94a3b8"/>
  <text x="460" y="162" font-size="12" fill="#94a3b8">유통 47.6% → 27.7%</text>
  <rect x="440" y="175" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="460" y="187" font-size="12" fill="#3b82f6">물류 34.1% → 36.3%</text>
  <rect x="440" y="200" width="14" height="14" rx="3" fill="#22c55e"/>
  <text x="460" y="212" font-size="12" font-weight="700" fill="#22c55e">해운 18.3% → 35.9%</text>

  <!-- 화살표 강조 -->
  <text x="540" y="260" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">해운: 매출 비중의 2배를 이익으로 전환</text>
</svg>
