  <rect x="770" y="170" width="60" height="28" rx="14" fill="#fbbf24" opacity="0.2"/>
  <text x="800" y="189" font-size="14" font-weight="800" fill="#fbbf24" text-anchor="middle">×3</text>

  <text x="540" y="380" font-size="12" fill="#475569" text-anchor="middle">6,500CEU 기준 | 글로벌 자동차 수출 폭증 + 선박 공급 부족</text>
