<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">세 겹의 재무제표</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">겉은 물류, 중간은 해운, 안쪽은 지배구조</text>

  <!-- 바깥 원: 물류 -->
  <circle cx="540" cy="195" r="130" fill="#94a3b8" opacity="0.1" stroke="#94a3b8" stroke-width="2"/>
  <text x="540" y="90" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">물류 · 유통</text>
  <text x="540" y="108" font-size="11" fill="#64748b" text-anchor="middle">매출 81.7% | OPM 4~7%</text>

  <!-- 중간 원: 해운 -->
  <circle cx="540" cy="195" r="85" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="140" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">해운 (PCC)</text>
  <text x="540" y="158" font-size="11" fill="#64748b" text-anchor="middle">매출 18.3% → 이익 36% | OPM 14%</text>

  <!-- 안쪽 원: 지배구조 -->
  <circle cx="540" cy="195" r="45" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="2"/>
  <text x="540" y="190" font-size="13" font-weight="800" fill="#fbbf24" text-anchor="middle">지배구조</text>
  <text x="540" y="208" font-size="10" fill="#fbbf24" text-anchor="middle">정의선 23%</text>
  <text x="540" y="222" font-size="10" fill="#fbbf24" text-anchor="middle">보스턴 3.3조</text>

  <!-- 왼쪽 주석 -->
  <line x1="420" y1="320" x2="470" y2="280" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="350" y="335" font-size="11" fill="#94a3b8">CJ대한통운·한진과 같은 층</text>

  <!-- 오른쪽 주석 -->
  <line x1="660" y1="320" x2="610" y2="280" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="620" y="335" font-size="11" fill="#3b82f6">HMM·팬오션과 같은 층</text>
</svg>
