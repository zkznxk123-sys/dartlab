<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Salesforce 인수 소화 타임라인</title>
  <desc id="desc">Slack 인수 이후 낮은 마진 구간을 지나 2024년과 2025년에 비용 효율이 회복되는 흐름을 보여준다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="72" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="38" font-weight="700">M&amp;A로 커진 몸집을, 2024년부터 손익이 소화했다</text>
  <text x="60" y="112" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="20">Slack 인수는 외부 맥락, 마진 회복은 dartlab 손익 실측</text>
  <line x1="120" y1="355" x2="1080" y2="355" stroke="#475569" stroke-width="4"/>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <circle cx="180" cy="355" r="16" fill="#38bdf8"/>
    <text x="140" y="410" fill="#f1f5f9" font-size="22" font-weight="700">2021</text>
    <text x="95" y="442" fill="#cbd5e1" font-size="17">Slack 완료</text>
    <text x="72" y="470" fill="#94a3b8" font-size="15">약 $27.7B 외부 인용</text>
    <circle cx="400" cy="355" r="16" fill="#f59e0b"/>
    <text x="360" y="302" fill="#f1f5f9" font-size="22" font-weight="700">2022</text>
    <text x="323" y="334" fill="#cbd5e1" font-size="17">매출 $26.5B</text>
    <text x="335" y="386" fill="#94a3b8" font-size="15">OPM 2.1%</text>
    <circle cx="620" cy="355" r="16" fill="#ef4444"/>
    <text x="580" y="410" fill="#f1f5f9" font-size="22" font-weight="700">2023</text>
    <text x="535" y="442" fill="#cbd5e1" font-size="17">순이익 $0.21B</text>
    <text x="548" y="470" fill="#94a3b8" font-size="15">OPM 3.3%</text>
    <circle cx="840" cy="355" r="16" fill="#22c55e"/>
    <text x="800" y="302" fill="#f1f5f9" font-size="22" font-weight="700">2024</text>
    <text x="760" y="334" fill="#cbd5e1" font-size="17">OPM 14.4%</text>
    <text x="735" y="386" fill="#94a3b8" font-size="15">판관비율 36.9%</text>
    <circle cx="1060" cy="355" r="16" fill="#22c55e"/>
    <text x="1020" y="410" fill="#f1f5f9" font-size="22" font-weight="700">2025</text>
    <text x="980" y="442" fill="#cbd5e1" font-size="17">OPM 20.1%</text>
    <text x="955" y="470" fill="#94a3b8" font-size="15">OCF $15.0B</text>
  </g>
  <rect x="220" y="560" width="760" height="78" rx="8" fill="#111827" stroke="#334155"/>
  <text x="250" y="594" fill="#fbbf24" font-family="-apple-system, Segoe UI, sans-serif" font-size="21" font-weight="700">주의</text>
  <text x="320" y="594" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">Slack이 모든 원인이라는 뜻이 아니다. 본문은 “인수로 커진 몸집을 비용 discipline이 소화했다”까지만 말한다.</text>
</svg>
