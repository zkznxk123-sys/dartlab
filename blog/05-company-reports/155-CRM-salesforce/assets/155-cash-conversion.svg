<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">Salesforce 현금화 구조</title>
  <desc id="desc">순이익보다 영업현금흐름이 큰 구조와 낮은 CAPEX 비율을 요약한다.</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="54" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700">이익보다 현금이 먼저 들어오는 SaaS 장부</text>
  <text x="54" y="108" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="19">OCF / 순이익: 2024년 247%, 2025년 201%</text>
  <g transform="translate(80 165)">
    <rect x="0" y="0" width="420" height="420" rx="10" fill="#111827" stroke="#334155"/>
    <text x="32" y="46" fill="#fbbf24" font-family="-apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">2024년</text>
    <rect x="60" y="270" width="110" height="78" rx="6" fill="#60a5fa"/>
    <rect x="230" y="156" width="110" height="192" rx="6" fill="#22c55e"/>
    <text x="54" y="374" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="16">순이익</text>
    <text x="47" y="398" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="700">$4.14B</text>
    <text x="236" y="374" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="16">OCF</text>
    <text x="216" y="398" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="700">$10.23B</text>
  </g>
  <g transform="translate(580 165)">
    <rect x="0" y="0" width="420" height="420" rx="10" fill="#111827" stroke="#334155"/>
    <text x="32" y="46" fill="#fbbf24" font-family="-apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">2025년</text>
    <rect x="60" y="210" width="110" height="138" rx="6" fill="#60a5fa"/>
    <rect x="230" y="72" width="110" height="276" rx="6" fill="#22c55e"/>
    <text x="54" y="374" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="16">순이익</text>
    <text x="47" y="398" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="700">$7.46B</text>
    <text x="236" y="374" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="16">OCF</text>
    <text x="216" y="398" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="700">$15.00B</text>
  </g>
  <g transform="translate(95 630)">
    <rect x="0" y="-34" width="890" height="58" rx="8" fill="#052e16" stroke="#22c55e"/>
    <text x="24" y="3" fill="#dcfce7" font-family="-apple-system, Segoe UI, sans-serif" font-size="19">CAPEX / 매출: 2023년 2.55% → 2025년 1.43%. 자본집약 제조업이 아니라 현금화가 빠른 소프트웨어 모델이다.</text>
  </g>
</svg>
