<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">Salesforce 체크포인트</title>
  <desc id="desc">Salesforce를 다음 분기부터 볼 때 확인할 지표를 정리한다.</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="54" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="36" font-weight="700">다음에 봐야 할 것은 성장률보다 마진 유지다</text>
  <text x="54" y="108" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="19">CRM의 질문은 “AI가 매출을 다시 가속하나”보다 “20% 마진을 지키나”에 가깝다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="70" y="160" width="440" height="120" rx="8" fill="#111827" stroke="#334155"/>
    <text x="100" y="202" fill="#22c55e" font-size="24" font-weight="700">1. OPM 20% 방어</text>
    <text x="100" y="238" fill="#cbd5e1" font-size="18">2025년 20.1%가 일회성인지, 새 기준선인지 확인</text>
    <rect x="570" y="160" width="440" height="120" rx="8" fill="#111827" stroke="#334155"/>
    <text x="600" y="202" fill="#22c55e" font-size="24" font-weight="700">2. 판관비율 35% 안착</text>
    <text x="600" y="238" fill="#cbd5e1" font-size="18">43.1%에서 34.6%로 내려온 비용 discipline 유지</text>
    <rect x="70" y="320" width="440" height="120" rx="8" fill="#111827" stroke="#334155"/>
    <text x="100" y="362" fill="#38bdf8" font-size="24" font-weight="700">3. OCF / 순이익 150%+</text>
    <text x="100" y="398" fill="#cbd5e1" font-size="18">2024~2025의 강한 현금화가 계속되는지</text>
    <rect x="570" y="320" width="440" height="120" rx="8" fill="#111827" stroke="#334155"/>
    <text x="600" y="362" fill="#38bdf8" font-size="24" font-weight="700">4. RPO와 Data Cloud</text>
    <text x="600" y="398" fill="#cbd5e1" font-size="18">Agentforce와 Data Cloud가 신규 매출 가속으로 번역되는지</text>
    <rect x="70" y="480" width="440" height="120" rx="8" fill="#111827" stroke="#334155"/>
    <text x="100" y="522" fill="#fbbf24" font-size="24" font-weight="700">5. 매출채권 신호</text>
    <text x="100" y="558" fill="#cbd5e1" font-size="18">dartlab flag: 매출채권 성장이 매출보다 빠른지 점검</text>
    <rect x="570" y="480" width="440" height="120" rx="8" fill="#111827" stroke="#334155"/>
    <text x="600" y="522" fill="#fbbf24" font-size="24" font-weight="700">6. 주주환원 속도</text>
    <text x="600" y="558" fill="#cbd5e1" font-size="18">배당 시작 뒤 FCF의 몇 %를 돌려주는지 확인</text>
  </g>
  <text x="70" y="665" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="16">핵심 판단: CRM은 성장주에서 현금성 품질주로 이동 중이다. 문제는 AI 서사가 아니라 비용 기준선의 지속성이다.</text>
</svg>
