<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Salesforce 비용 레버리지</title>
  <desc id="desc">판관비율과 매출원가율 하락이 2024년과 2025년 영업이익률 상승의 핵심 요인임을 보여준다.</desc>
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="60" y="72" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="38" font-weight="700">비용이 접히자, 같은 매출이 다른 손익이 됐다</text>
  <text x="60" y="112" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="20">영업비용률 69.8% → 56.9%, 판관비율 43.1% → 34.6%</text>
  <g transform="translate(80 170)">
    <rect x="0" y="0" width="1040" height="450" rx="10" fill="#111827" stroke="#334155"/>
    <text x="40" y="48" fill="#fbbf24" font-family="-apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">2023년</text>
    <rect x="40" y="90" width="270" height="270" rx="8" fill="#ef4444" opacity="0.88"/>
    <rect x="40" y="360" width="270" height="34" rx="4" fill="#22c55e"/>
    <text x="335" y="126" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="20">매출 $31.35B</text>
    <text x="335" y="166" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">매출원가율 26.7%</text>
    <text x="335" y="206" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">판관비율 43.1%</text>
    <text x="335" y="246" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="700">OPM 3.3%</text>
    <text x="40" y="430" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="16">빨강 = 비용, 초록 = 영업이익</text>
    <line x1="520" y1="70" x2="520" y2="410" stroke="#334155" stroke-width="2"/>
    <text x="580" y="48" fill="#fbbf24" font-family="-apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700">2025년</text>
    <rect x="580" y="90" width="270" height="220" rx="8" fill="#ef4444" opacity="0.72"/>
    <rect x="580" y="310" width="270" height="84" rx="4" fill="#22c55e"/>
    <text x="875" y="126" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="20">매출 $41.53B</text>
    <text x="875" y="166" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">매출원가율 22.3%</text>
    <text x="875" y="206" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">판관비율 34.6%</text>
    <text x="875" y="246" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="20" font-weight="700">OPM 20.1%</text>
  </g>
  <g transform="translate(110 660)">
    <rect x="0" y="-34" width="980" height="56" rx="8" fill="#172554" stroke="#38bdf8"/>
    <text x="24" y="2" fill="#e0f2fe" font-family="-apple-system, Segoe UI, sans-serif" font-size="20">핵심: 제품 원가보다 판관비율 개선이 더 컸다. 성장주가 비용 discipline을 시작한 흔적이다.</text>
  </g>
</svg>
