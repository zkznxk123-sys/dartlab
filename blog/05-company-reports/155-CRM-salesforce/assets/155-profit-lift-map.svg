<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Salesforce 이익률 리프트 맵</title>
  <desc id="desc">2019년부터 2025년까지 매출 성장과 영업이익률 상승이 동시에 일어난 구간을 요약한다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="72" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="38" font-weight="700">CRM 관통선: 매출 성장보다 늦게 온 이익률 폭발</text>
  <text x="60" y="112" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="20">2019~2023: 성장하지만 낮은 GAAP 마진 → 2024~2025: 비용 비율이 접히며 OPM 20.1%</text>
  <line x1="110" y1="520" x2="1090" y2="520" stroke="#334155" stroke-width="2"/>
  <line x1="110" y1="190" x2="110" y2="520" stroke="#334155" stroke-width="2"/>
  <text x="78" y="196" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="15">OPM</text>
  <text x="84" y="524" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="15">0%</text>
  <polyline points="145,456 295,486 445,488 595,489 745,464 895,313 1045,235" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="145,430 295,334 445,334 595,260 745,197 895,150 1045,86" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="17" fill="#f1f5f9">
    <text x="125" y="555">2019</text>
    <text x="275" y="555">2020</text>
    <text x="425" y="555">2021</text>
    <text x="575" y="555">2022</text>
    <text x="725" y="555">2023</text>
    <text x="875" y="555">2024</text>
    <text x="1025" y="555">2025</text>
  </g>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="16" fill="#94a3b8">
    <text x="124" y="590">$13.3B</text>
    <text x="272" y="590">$21.3B</text>
    <text x="424" y="590">$21.3B</text>
    <text x="574" y="590">$26.5B</text>
    <text x="724" y="590">$31.4B</text>
    <text x="874" y="590">$34.9B</text>
    <text x="1020" y="590">$41.5B</text>
  </g>
  <g>
    <rect x="720" y="610" width="350" height="54" rx="8" fill="#111827" stroke="#334155"/>
    <circle cx="748" cy="637" r="7" fill="#38bdf8"/>
    <text x="765" y="643" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="17">매출</text>
    <circle cx="838" cy="637" r="7" fill="#22c55e"/>
    <text x="855" y="643" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="17">영업이익률</text>
  </g>
  <g>
    <rect x="700" y="208" width="360" height="96" rx="8" fill="#172554" stroke="#38bdf8"/>
    <text x="724" y="244" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">변곡점은 2024년</text>
    <text x="724" y="276" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="17">OPM 3.3% → 14.4% → 20.1%</text>
  </g>
  <g>
    <rect x="150" y="150" width="340" height="96" rx="8" fill="#1f2937" stroke="#334155"/>
    <text x="174" y="186" fill="#fbbf24" font-family="-apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">낮은 마진 성장기</text>
    <text x="174" y="218" fill="#cbd5e1" font-family="-apple-system, Segoe UI, sans-serif" font-size="17">매출은 2.4배, OPM은 2~4%대</text>
  </g>
  <text x="60" y="670" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="16">dartlab 실측: revenue, operatingIncome 기준. 2026년 부분 데이터는 제외.</text>
</svg>
