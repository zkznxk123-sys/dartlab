<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="76" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">FCF가 커진 이유: CAPEX가 따라붙지 않는다</text>
  <text x="64" y="114" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">2025년 CAPEX는 매출의 0.65%, 자유현금흐름은 9.76B</text>
  <line x1="110" y1="540" x2="1090" y2="540" stroke="#334155" stroke-width="2"/>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="130" y="490" width="90" height="50" fill="#ef4444"/><text x="136" y="472" fill="#fca5a5" font-size="14">2021 -0.74B</text>
    <rect x="310" y="516" width="90" height="24" fill="#22c55e"/><text x="306" y="500" fill="#86efac" font-size="14">2022 0.39B</text>
    <rect x="490" y="334" width="90" height="206" fill="#22c55e"/><text x="480" y="316" fill="#86efac" font-size="14">2023 3.36B</text>
    <rect x="670" y="117" width="90" height="423" fill="#22c55e"/><text x="658" y="99" fill="#86efac" font-size="14">2024 6.90B</text>
    <rect x="850" y="72" width="90" height="468" fill="#22c55e"/><text x="840" y="54" fill="#86efac" font-size="14">2025 9.76B</text>
  </g>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="15" fill="#94a3b8">
    <text x="152" y="580">2021</text><text x="332" y="580">2022</text><text x="512" y="580">2023</text><text x="692" y="580">2024</text><text x="872" y="580">2025</text>
  </g>
  <rect x="760" y="260" width="330" height="116" rx="8" fill="#111827" stroke="#334155"/>
  <text x="784" y="298" fill="#fbbf24" font-size="20" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">낮은 자본집약도</text>
  <text x="784" y="330" fill="#e2e8f0" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">차를 직접 대량 보유하지 않아</text>
  <text x="784" y="356" fill="#e2e8f0" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">매출 증가가 CAPEX 증가로 직결되지 않음</text>
  <rect x="64" y="612" width="18" height="18" fill="#22c55e"/><text x="92" y="627" fill="#cbd5e1" font-size="15" font-family="-apple-system, Segoe UI, sans-serif">자유현금흐름</text>
</svg>
