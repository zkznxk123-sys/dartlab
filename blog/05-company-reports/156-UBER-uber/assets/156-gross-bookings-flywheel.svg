<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="76" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">우버 플라이휠은 거래 빈도에서 시작한다</text>
  <text x="64" y="114" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">Trips와 Gross Bookings가 커질수록 플랫폼 고정비가 얇아진다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <circle cx="600" cy="350" r="155" fill="#111827" stroke="#334155" stroke-width="3"/>
    <circle cx="600" cy="350" r="86" fill="#172033" stroke="#475569"/>
    <text x="600" y="338" text-anchor="middle" fill="#fbbf24" font-size="24" font-weight="800">플랫폼 밀도</text>
    <text x="600" y="370" text-anchor="middle" fill="#e2e8f0" font-size="16">더 많은 거래가</text>
    <text x="600" y="394" text-anchor="middle" fill="#e2e8f0" font-size="16">같은 시스템 위를 흐름</text>
    <g fill="#111827" stroke="#334155" stroke-width="2">
      <rect x="80" y="245" width="230" height="96" rx="8"/>
      <rect x="890" y="245" width="230" height="96" rx="8"/>
      <rect x="485" y="74" width="230" height="96" rx="8"/>
      <rect x="485" y="530" width="230" height="96" rx="8"/>
    </g>
    <text x="195" y="285" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="800">Trips</text>
    <text x="195" y="315" text-anchor="middle" fill="#94a3b8" font-size="15">완료된 승차와 배달</text>
    <text x="1005" y="285" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="800">Gross Bookings</text>
    <text x="1005" y="315" text-anchor="middle" fill="#94a3b8" font-size="15">플랫폼 총 거래액</text>
    <text x="600" y="114" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="800">Mobility</text>
    <text x="600" y="144" text-anchor="middle" fill="#94a3b8" font-size="15">승차 수요와 공급</text>
    <text x="600" y="570" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="800">Delivery</text>
    <text x="600" y="600" text-anchor="middle" fill="#94a3b8" font-size="15">앱 빈도와 광고</text>
  </g>
  <g fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round">
    <path d="M315 294 C405 210 475 175 550 170"/>
    <path d="M650 170 C790 175 875 220 928 270"/>
    <path d="M930 330 C870 445 790 510 690 540"/>
    <path d="M510 540 C400 500 325 430 280 340"/>
  </g>
  <text x="72" y="640" fill="#64748b" font-size="15" font-family="-apple-system, Segoe UI, sans-serif">핵심 질문: 거래 총량이 영업이익과 자유현금흐름으로 남는가</text>
</svg>
