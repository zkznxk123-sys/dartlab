    <text x="100" y="560">2019</text><text x="265" y="560">2020</text><text x="430" y="560">2021</text><text x="595" y="560">2022</text><text x="760" y="560">2023</text><text x="925" y="560">2024</text><text x="1070" y="560">2025</text>
