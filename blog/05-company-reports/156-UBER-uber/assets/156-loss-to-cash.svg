<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="76" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">적자 플랫폼에서 현금흐름 플랫폼으로</text>
  <text x="64" y="114" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">영업이익과 자유현금흐름이 2023년부터 동시에 양수로 돌아섰다</text>
  <line x1="110" y1="530" x2="1090" y2="530" stroke="#334155" stroke-width="2"/>
  <line x1="110" y1="145" x2="110" y2="530" stroke="#334155" stroke-width="2"/>
  <text x="70" y="165" fill="#64748b" font-size="14" font-family="-apple-system, Segoe UI, sans-serif">+$10B</text>
  <text x="72" y="527" fill="#64748b" font-size="14" font-family="-apple-system, Segoe UI, sans-serif">$0</text>
  <text x="58" y="620" fill="#64748b" font-size="14" font-family="-apple-system, Segoe UI, sans-serif">-$10B</text>
  <polyline points="110,620 275,570 440,555 605,488 770,405 935,280 1090,180" fill="none" stroke="#22c55e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="110,618 275,640 440,548 605,390 770,250 935,168" fill="none" stroke="#38bdf8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="110" cy="620" r="8" fill="#22c55e"/><circle cx="935" cy="280" r="8" fill="#22c55e"/>
  <circle cx="275" cy="640" r="8" fill="#38bdf8"/><circle cx="935" cy="168" r="8" fill="#38bdf8"/>
  <text x="150" y="608" fill="#fca5a5" font-size="18" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">2019 영업손실 -8.6B</text>
  <text x="810" y="252" fill="#86efac" font-size="18" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">2025 영업이익 5.6B</text>
  <text x="810" y="142" fill="#7dd3fc" font-size="18" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">2025 FCF 9.8B</text>
  <rect x="770" y="438" width="300" height="92" rx="8" fill="#111827" stroke="#334155"/>
  <text x="794" y="472" fill="#fbbf24" font-size="18" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">전환점</text>
  <text x="794" y="502" fill="#e2e8f0" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">2023년부터 영업이익과 FCF가</text>
  <text x="794" y="526" fill="#e2e8f0" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">같이 플러스로 움직이기 시작</text>
