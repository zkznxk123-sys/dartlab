<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="76" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">다음 실적에서 볼 5개 체크포인트</text>
  <text x="64" y="114" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">좋은 플랫폼 이야기는 거래액, 마진, 현금, 주식 수, AV 지위가 같이 살아야 한다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <g transform="translate(70 160)">
      <rect width="500" height="72" rx="8" fill="#111827" stroke="#334155"/>
      <text x="28" y="32" fill="#fbbf24" font-size="18" font-weight="800">1. Trips + Gross Bookings</text>
      <text x="28" y="56" fill="#cbd5e1" font-size="15">둘 다 두 자릿수로 늘어야 플랫폼 밀도가 유지된다</text>
    </g>
    <g transform="translate(630 160)">
      <rect width="500" height="72" rx="8" fill="#111827" stroke="#334155"/>
      <text x="28" y="32" fill="#fbbf24" font-size="18" font-weight="800">2. GAAP 영업이익률</text>
      <text x="28" y="56" fill="#cbd5e1" font-size="15">Adjusted EBITDA보다 장부 영업이익이 중요하다</text>
    </g>
    <g transform="translate(70 282)">
      <rect width="500" height="72" rx="8" fill="#111827" stroke="#334155"/>
      <text x="28" y="32" fill="#fbbf24" font-size="18" font-weight="800">3. 자유현금흐름</text>
      <text x="28" y="56" fill="#cbd5e1" font-size="15">CAPEX가 낮은 상태로 OCF가 유지되는지 확인</text>
    </g>
    <g transform="translate(630 282)">
      <rect width="500" height="72" rx="8" fill="#111827" stroke="#334155"/>
      <text x="28" y="32" fill="#fbbf24" font-size="18" font-weight="800">4. 자사주와 주식 수</text>
      <text x="28" y="56" fill="#cbd5e1" font-size="15">SBC 방어를 넘어 실제 주당가치를 키우는가</text>
    </g>
    <g transform="translate(350 426)">
      <rect width="500" height="86" rx="8" fill="#172033" stroke="#475569"/>
      <text x="28" y="36" fill="#fbbf24" font-size="18" font-weight="800">5. AV 파트너십의 경제성</text>
      <text x="28" y="62" fill="#cbd5e1" font-size="15">자율주행 공급이 우버 수요 지위를 강화하는지 확인</text>
    </g>
  </g>
  <text x="64" y="620" fill="#94a3b8" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">한 줄 결론: 거래액이 현금으로 남고, 그 현금이 주당가치로 남아야 턴어라운드가 구조다.</text>
</svg>
