<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">GEV backlog stack</title>
  <desc id="desc">AI data center power demand turns into GE Vernova orders, backlog, margin, and free cash flow.</desc>
  <rect width="1200" height="640" fill="#f7fafc"/>
  <rect x="48" y="48" width="1104" height="544" rx="24" fill="#ffffff" stroke="#d7dee8"/>
  <text x="82" y="105" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">AI 전력 수요가 GEV 장부에 찍히는 순서</text>
  <text x="82" y="143" font-family="Arial, sans-serif" font-size="18" fill="#5b6777">단어는 테마지만, 주문과 백로그는 실제 납품 의무다.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2b6cb0"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <g transform="translate(88 220)">
      <rect width="190" height="120" rx="16" fill="#e8f2ff" stroke="#86b7ee"/>
      <text x="95" y="45" text-anchor="middle" font-size="23" font-weight="700" fill="#113c68">데이터센터</text>
      <text x="95" y="78" text-anchor="middle" font-size="18" fill="#31506d">전력 연결</text>
    </g>
    <line x1="292" y1="280" x2="386" y2="280" stroke="#2b6cb0" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(400 220)">
      <rect width="190" height="120" rx="16" fill="#e9fbf0" stroke="#63c887"/>
      <text x="95" y="45" text-anchor="middle" font-size="23" font-weight="700" fill="#126036">Orders</text>
      <text x="95" y="78" text-anchor="middle" font-size="18" fill="#2d6b49">2025 59.3B</text>
    </g>
    <line x1="604" y1="280" x2="698" y2="280" stroke="#2b6cb0" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(712 220)">
      <rect width="190" height="120" rx="16" fill="#fff7e6" stroke="#f2c15b"/>
      <text x="95" y="45" text-anchor="middle" font-size="23" font-weight="700" fill="#7c4a03">Backlog</text>
      <text x="95" y="78" text-anchor="middle" font-size="18" fill="#7c5a1d">2025 150.2B</text>
    </g>
    <line x1="916" y1="280" x2="1010" y2="280" stroke="#2b6cb0" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(1020 220)">
      <rect width="94" height="120" rx="16" fill="#f1e9ff" stroke="#bda3ee"/>
      <text x="47" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#563492">FCF</text>
      <text x="47" y="78" text-anchor="middle" font-size="17" fill="#66507f">3.7B</text>
    </g>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="150" y="420" width="900" height="74" rx="18" fill="#111827"/>
    <text x="600" y="451" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">핵심 질문</text>
    <text x="600" y="480" text-anchor="middle" font-size="18" fill="#cbd5e1">백로그가 매출로 바뀔 때 margin과 cash가 남는가?</text>
  </g>
</svg>
