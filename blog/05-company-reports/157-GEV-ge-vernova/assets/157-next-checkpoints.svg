      <text x="78" y="40" font-weight="700" fill="#ffffff">Power margin</text>
      <text x="430" y="40" fill="#cbd5e1">가스터빈 가격과 서비스가 margin을 올리는가</text>
    </g>
    <g transform="translate(80 346)">
