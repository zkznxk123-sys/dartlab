<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">GEV orders and backlog</title>
  <desc id="desc">GE Vernova 2025 revenue, orders, and backlog comparison.</desc>
  <rect width="1200" height="640" fill="#f8fafc"/>
  <text x="72" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#101828">매출보다 큰 주문, 매출의 4배에 가까운 백로그</text>
  <text x="72" y="119" font-family="Arial, sans-serif" font-size="18" fill="#667085">2025년 공식 공시 기준. 백로그는 RPO.</text>
  <line x1="120" y1="520" x2="1080" y2="520" stroke="#cbd5e1" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-weight="700">
    <rect x="170" y="337" width="170" height="183" rx="14" fill="#60a5fa"/>
    <text x="255" y="560" text-anchor="middle" font-size="21" fill="#111827">Revenue</text>
    <text x="255" y="315" text-anchor="middle" font-size="29" fill="#1e3a8a">38.1B</text>
    <rect x="490" y="235" width="170" height="285" rx="14" fill="#34d399"/>
    <text x="575" y="560" text-anchor="middle" font-size="21" fill="#111827">Orders</text>
    <text x="575" y="213" text-anchor="middle" font-size="29" fill="#065f46">59.3B</text>
    <rect x="810" y="78" width="170" height="442" rx="14" fill="#f59e0b"/>
    <text x="895" y="560" text-anchor="middle" font-size="21" fill="#111827">Backlog</text>
    <text x="895" y="56" text-anchor="middle" font-size="29" fill="#92400e">150.2B</text>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="170" y="585" width="810" height="32" rx="16" fill="#e2e8f0"/>
    <text x="575" y="607" text-anchor="middle" font-size="17" fill="#334155">좋은 신호는 주문이 아니라, 좋은 margin의 백로그가 현금으로 풀리는 것이다.</text>
  </g>
</svg>
