<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">GEV profit quality</title>
  <desc id="desc">GE Vernova net income includes tax and M and A items, so adjusted EBITDA and FCF matter.</desc>
  <rect width="1200" height="640" fill="#f8fafc"/>
  <text x="72" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">순이익은 화려하지만 반복 이익은 따로 봐야 한다</text>
  <text x="72" y="118" font-family="Arial, sans-serif" font-size="18" fill="#64748b">2025년 연간과 Q1 2026 모두 headline net income에 큰 조정 요인이 있다.</text>
  <g font-family="Arial, sans-serif">
    <rect x="100" y="190" width="445" height="300" rx="24" fill="#ffffff" stroke="#dbe4ef"/>
    <text x="322" y="236" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">2025</text>
    <text x="322" y="294" text-anchor="middle" font-size="42" font-weight="700" fill="#7c3aed">Net income 4.88B</text>
    <text x="322" y="345" text-anchor="middle" font-size="25" fill="#0f766e">Operating income 1.39B</text>
    <text x="322" y="393" text-anchor="middle" font-size="20" fill="#475569">세금 valuation allowance release 영향</text>
    <text x="322" y="431" text-anchor="middle" font-size="20" fill="#475569">FCF 3.71B가 더 중요한 줄</text>
    <rect x="655" y="190" width="445" height="300" rx="24" fill="#ffffff" stroke="#dbe4ef"/>
    <text x="878" y="236" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">Q1 2026</text>
    <text x="878" y="294" text-anchor="middle" font-size="42" font-weight="700" fill="#7c3aed">Net income 4.75B</text>
    <text x="878" y="345" text-anchor="middle" font-size="25" fill="#0f766e">Adj. EBITDA 0.90B</text>
    <text x="878" y="393" text-anchor="middle" font-size="20" fill="#475569">Prolec GE M&amp;A gain 4.5B 포함</text>
    <text x="878" y="431" text-anchor="middle" font-size="20" fill="#475569">Orders / backlog / FCF를 먼저 확인</text>
  </g>
  <path d="M170 545 H1030" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">GEV의 본문은 순이익이 아니라 segment EBITDA와 free cash flow다.</text>
</svg>
