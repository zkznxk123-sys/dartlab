<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">GEV 2025 segment split</title>
  <desc id="desc">Power and Electrification make EBITDA, Wind remains loss-making.</desc>
  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="70" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">두 엔진은 벌고, Wind는 아직 돈을 쓴다</text>
  <text x="70" y="118" font-family="Arial, sans-serif" font-size="18" fill="#64748b">2025년 segment revenue / EBITDA / margin</text>
  <g font-family="Arial, sans-serif">
    <rect x="90" y="190" width="300" height="300" rx="24" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="240" y="238" text-anchor="middle" font-size="30" font-weight="700" fill="#1d4ed8">Power</text>
    <text x="240" y="295" text-anchor="middle" font-size="24" fill="#1e293b">Revenue 19.8B</text>
    <text x="240" y="345" text-anchor="middle" font-size="34" font-weight="700" fill="#0f766e">EBITDA 2.9B</text>
    <text x="240" y="395" text-anchor="middle" font-size="22" fill="#334155">Margin 14.7%</text>
    <text x="240" y="445" text-anchor="middle" font-size="18" fill="#475569">Gas + services</text>
    <rect x="450" y="190" width="300" height="300" rx="24" fill="#ecfdf5" stroke="#86efac"/>
    <text x="600" y="238" text-anchor="middle" font-size="30" font-weight="700" fill="#047857">Electrification</text>
    <text x="600" y="295" text-anchor="middle" font-size="24" fill="#1e293b">Revenue 9.6B</text>
    <text x="600" y="345" text-anchor="middle" font-size="34" font-weight="700" fill="#0f766e">EBITDA 1.4B</text>
    <text x="600" y="395" text-anchor="middle" font-size="22" fill="#334155">Margin 14.9%</text>
    <text x="600" y="445" text-anchor="middle" font-size="18" fill="#475569">Grid + transformers</text>
    <rect x="810" y="190" width="300" height="300" rx="24" fill="#fff1f2" stroke="#fda4af"/>
    <text x="960" y="238" text-anchor="middle" font-size="30" font-weight="700" fill="#be123c">Wind</text>
    <text x="960" y="295" text-anchor="middle" font-size="24" fill="#1e293b">Revenue 9.1B</text>
    <text x="960" y="345" text-anchor="middle" font-size="34" font-weight="700" fill="#b91c1c">EBITDA -0.6B</text>
    <text x="960" y="395" text-anchor="middle" font-size="22" fill="#334155">Margin -6.6%</text>
    <text x="960" y="445" text-anchor="middle" font-size="18" fill="#475569">Contract + tariff risk</text>
  </g>
  <rect x="185" y="540" width="830" height="44" rx="22" fill="#111827"/>
  <text x="600" y="569" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#ffffff">GEV의 논리는 Power/Electrification 이익이 Wind 손실을 충분히 덮는가에 달려 있다.</text>
</svg>
