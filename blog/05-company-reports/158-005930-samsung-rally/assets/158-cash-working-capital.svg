<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Samsung cash and working capital</title>
  <desc id="desc">Samsung 2025 cash flow is strong but inventory and receivables are rally checkpoints.</desc>
  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="70" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">현금흐름은 강하다. 조기 경보는 운전자본이다</text>
  <text x="70" y="120" font-family="Arial, sans-serif" font-size="18" fill="#64748b">2025년 dartlab 실측, 단위 KRW 조원</text>
  <g font-family="Arial, sans-serif">
    <rect x="90" y="190" width="300" height="260" rx="24" fill="#ecfdf5" stroke="#86efac"/>
    <text x="240" y="238" text-anchor="middle" font-size="25" font-weight="700" fill="#047857">영업현금흐름</text>
    <text x="240" y="328" text-anchor="middle" font-size="58" font-weight="700" fill="#0f172a">85.3</text>
    <text x="240" y="388" text-anchor="middle" font-size="20" fill="#475569">OCF/NI 188.7%</text>
    <rect x="450" y="190" width="300" height="260" rx="24" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="600" y="238" text-anchor="middle" font-size="25" font-weight="700" fill="#1d4ed8">자유현금흐름</text>
    <text x="600" y="328" text-anchor="middle" font-size="58" font-weight="700" fill="#0f172a">33.2</text>
    <text x="600" y="388" text-anchor="middle" font-size="20" fill="#475569">CAPEX 52.2 후 잔여</text>
    <rect x="810" y="190" width="300" height="260" rx="24" fill="#fff7ed" stroke="#fdba74"/>
    <text x="960" y="238" text-anchor="middle" font-size="25" font-weight="700" fill="#c2410c">체크포인트</text>
    <text x="960" y="306" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">재고</text>
    <text x="960" y="350" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">매출채권</text>
    <text x="960" y="394" text-anchor="middle" font-size="20" fill="#475569">사이클 후반 신호</text>
  </g>
  <rect x="190" y="520" width="820" height="44" rx="22" fill="#111827"/>
  <text x="600" y="549" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#ffffff">이익이 높아도 현금 전환이 둔화되면 주가는 먼저 의심한다.</text>
</svg>
