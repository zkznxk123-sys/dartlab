<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Samsung rally checkpoints</title>
  <desc id="desc">Five checkpoints for the Samsung Electronics rally.</desc>
  <rect width="1200" height="640" fill="#0f172a"/>
  <text x="72" y="84" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">랠리가 끝나는 5가지 조건</text>
  <text x="72" y="122" font-family="Arial, sans-serif" font-size="18" fill="#cbd5e1">다음 실적에서 이 순서로 확인한다.</text>
  <g font-family="Arial, sans-serif" font-size="22">
    <g transform="translate(84 178)">
      <rect width="1032" height="64" rx="18" fill="#1e293b" stroke="#334155"/>
      <circle cx="36" cy="32" r="18" fill="#60a5fa"/>
      <text x="36" y="40" text-anchor="middle" font-weight="700" fill="#0f172a">1</text>
      <text x="80" y="40" font-weight="700" fill="#ffffff">DS margin</text>
      <text x="410" y="40" fill="#cbd5e1">66%에서 얼마나 정상화되는가</text>
    </g>
    <g transform="translate(84 262)">
      <rect width="1032" height="64" rx="18" fill="#1e293b" stroke="#334155"/>
      <circle cx="36" cy="32" r="18" fill="#34d399"/>
      <text x="36" y="40" text-anchor="middle" font-weight="700" fill="#0f172a">2</text>
      <text x="80" y="40" font-weight="700" fill="#ffffff">HBM / server DRAM</text>
      <text x="410" y="40" fill="#cbd5e1">출하와 ASP가 같이 유지되는가</text>
    </g>
    <g transform="translate(84 346)">
      <rect width="1032" height="64" rx="18" fill="#1e293b" stroke="#334155"/>
      <circle cx="36" cy="32" r="18" fill="#fbbf24"/>
      <text x="36" y="40" text-anchor="middle" font-weight="700" fill="#0f172a">3</text>
      <text x="80" y="40" font-weight="700" fill="#ffffff">재고와 매출채권</text>
      <text x="410" y="40" fill="#cbd5e1">이익보다 운전자본이 빨리 늘지 않는가</text>
    </g>
    <g transform="translate(84 430)">
      <rect width="1032" height="64" rx="18" fill="#1e293b" stroke="#334155"/>
      <circle cx="36" cy="32" r="18" fill="#fb7185"/>
      <text x="36" y="40" text-anchor="middle" font-weight="700" fill="#0f172a">4</text>
      <text x="80" y="40" font-weight="700" fill="#ffffff">CAPEX</text>
      <text x="410" y="40" fill="#cbd5e1">성장 투자인가, 공급 과잉의 씨앗인가</text>
    </g>
    <g transform="translate(84 514)">
      <rect width="1032" height="64" rx="18" fill="#1e293b" stroke="#334155"/>
      <circle cx="36" cy="32" r="18" fill="#a78bfa"/>
      <text x="36" y="40" text-anchor="middle" font-weight="700" fill="#0f172a">5</text>
      <text x="80" y="40" font-weight="700" fill="#ffffff">EPS revision</text>
      <text x="410" y="40" fill="#cbd5e1">Q1 run-rate가 유지되는가</text>
    </g>
  </g>
</svg>
