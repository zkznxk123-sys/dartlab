<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Samsung Q1 2026 segment profit</title>
  <desc id="desc">Samsung Q1 2026 operating profit is dominated by DS semiconductor.</desc>
  <rect width="1200" height="640" fill="#f8fafc"/>
  <text x="72" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">2026년 1분기 이익은 거의 DS에서 나왔다</text>
  <text x="72" y="120" font-family="Arial, sans-serif" font-size="18" fill="#64748b">단위: KRW 조원, Samsung IR 기준</text>
  <line x1="130" y1="520" x2="1090" y2="520" stroke="#cbd5e1" stroke-width="2"/>
  <g font-family="Arial, sans-serif" font-weight="700">
    <rect x="170" y="118" width="165" height="402" rx="14" fill="#2563eb"/>
    <text x="252" y="96" text-anchor="middle" font-size="30" fill="#1d4ed8">53.7</text>
    <text x="252" y="560" text-anchor="middle" font-size="22" fill="#111827">DS</text>
    <rect x="420" y="498" width="165" height="22" rx="8" fill="#22c55e"/>
    <text x="502" y="480" text-anchor="middle" font-size="26" fill="#047857">3.0</text>
    <text x="502" y="560" text-anchor="middle" font-size="22" fill="#111827">DX</text>
    <rect x="670" y="517" width="165" height="3" rx="2" fill="#f59e0b"/>
    <text x="752" y="480" text-anchor="middle" font-size="26" fill="#92400e">0.4</text>
    <text x="752" y="560" text-anchor="middle" font-size="22" fill="#111827">SDC</text>
    <rect x="920" y="519" width="165" height="1" rx="1" fill="#a855f7"/>
    <text x="1002" y="480" text-anchor="middle" font-size="26" fill="#6b21a8">0.2</text>
    <text x="1002" y="560" text-anchor="middle" font-size="22" fill="#111827">Harman</text>
  </g>
  <text x="600" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">스마트폰보다 DS margin이 현재 주가를 설명한다.</text>
