<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Samsung valuation gap</title>
  <desc id="desc">Trailing P/E and annualized Q1 EPS P/E tell different stories.</desc>
  <rect width="1200" height="640" fill="#fff"/>
  <text x="72" y="84" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">같은 주가, 두 개의 P/E</text>
  <text x="72" y="122" font-family="Arial, sans-serif" font-size="18" fill="#64748b">362,500원을 어떤 EPS로 나누느냐에 따라 이야기가 달라진다.</text>
  <g font-family="Arial, sans-serif">
    <rect x="125" y="200" width="400" height="270" rx="28" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="325" y="255" text-anchor="middle" font-size="26" font-weight="700" fill="#1d4ed8">후행 기준</text>
    <text x="325" y="330" text-anchor="middle" font-size="58" font-weight="700" fill="#0f172a">29.05x</text>
    <text x="325" y="382" text-anchor="middle" font-size="21" fill="#334155">Google Finance P/E</text>
    <text x="325" y="422" text-anchor="middle" font-size="18" fill="#64748b">이미 싸지 않다는 해석</text>
    <rect x="675" y="200" width="400" height="270" rx="28" fill="#ecfdf5" stroke="#86efac"/>
    <text x="875" y="255" text-anchor="middle" font-size="26" font-weight="700" fill="#047857">Q1 연환산</text>
    <text x="875" y="330" text-anchor="middle" font-size="58" font-weight="700" fill="#0f172a">12.7x</text>
    <text x="875" y="382" text-anchor="middle" font-size="21" fill="#334155">7,123원 × 4</text>
    <text x="875" y="422" text-anchor="middle" font-size="18" fill="#64748b">Q1이 반복되면 싸다는 해석</text>
  </g>
  <path d="M555 335 H645" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <text x="600" y="538" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">결론: Q1이 peak인지 run-rate인지가 랠리의 수명을 정한다.</text>
</svg>
