<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">SK하이닉스 이익 엔진</title>
  <desc id="desc">2025년과 2026년 1분기 SK하이닉스 매출과 영업이익 비교</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="70" y="86" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="700">지수를 움직인 것은 이야기보다 이익이었다</text>
  <text x="70" y="126" fill="#475569" font-family="Arial, sans-serif" font-size="18">2025년 사상 최대 실적 뒤에도 2026년 1분기 이익률은 더 올라갔다</text>
  <g transform="translate(130 205)">
    <text x="0" y="-22" fill="#334155" font-family="Arial, sans-serif" font-size="18" font-weight="700">2025년 연간</text>
    <rect x="0" y="0" width="330" height="310" rx="18" fill="#e0f2fe"/>
    <rect x="50" y="64" width="78" height="205" fill="#0284c7"/>
    <rect x="190" y="169" width="78" height="100" fill="#0f766e"/>
    <text x="39" y="304" fill="#075985" font-family="Arial, sans-serif" font-size="17">매출</text>
    <text x="176" y="304" fill="#134e4a" font-family="Arial, sans-serif" font-size="17">영업이익</text>
    <text x="30" y="48" fill="#0c4a6e" font-family="Arial, sans-serif" font-size="26" font-weight="700">97.15조</text>
    <text x="170" y="153" fill="#134e4a" font-family="Arial, sans-serif" font-size="26" font-weight="700">47.21조</text>
    <text x="65" y="350" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="700">OPM 48.6%</text>
  </g>
  <g transform="translate(610 205)">
    <text x="0" y="-22" fill="#334155" font-family="Arial, sans-serif" font-size="18" font-weight="700">2026년 1분기</text>
    <rect x="0" y="0" width="330" height="310" rx="18" fill="#dcfce7"/>
    <rect x="50" y="104" width="78" height="165" fill="#16a34a"/>
    <rect x="190" y="151" width="78" height="118" fill="#15803d"/>
    <text x="39" y="304" fill="#14532d" font-family="Arial, sans-serif" font-size="17">매출</text>
    <text x="176" y="304" fill="#14532d" font-family="Arial, sans-serif" font-size="17">영업이익</text>
    <text x="28" y="88" fill="#14532d" font-family="Arial, sans-serif" font-size="26" font-weight="700">52.58조</text>
    <text x="168" y="135" fill="#14532d" font-family="Arial, sans-serif" font-size="26" font-weight="700">37.61조</text>
    <text x="63" y="350" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="700">OPM 71.5%</text>
  </g>
  <path d="M485 355 L575 355" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <path d="M575 355 L555 338 M575 355 L555 372" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <text x="452" y="330" fill="#92400e" font-family="Arial, sans-serif" font-size="17" font-weight="700">연간 호황 뒤 분기 가속</text>
  <g transform="translate(905 250)">
    <rect x="0" y="0" width="220" height="210" rx="14" fill="#111827"/>
    <text x="22" y="44" fill="#f8fafc" font-family="Arial, sans-serif" font-size="22" font-weight="700">시장 반응</text>
    <text x="22" y="84" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">이익률 70%대는</text>
    <text x="22" y="113" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">평범한 제조업 숫자가</text>
    <text x="22" y="142" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">아니다. 희소성을</text>
    <text x="22" y="171" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">가격으로 바꾼 숫자다.</text>
  </g>
  <text x="70" y="660" fill="#64748b" font-family="Arial, sans-serif" font-size="15">자료: dartlab DART 실측, SK하이닉스 1Q26 실적 발표</text>
</svg>
