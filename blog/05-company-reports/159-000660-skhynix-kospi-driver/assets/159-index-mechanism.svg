<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">SK하이닉스가 지수로 번역되는 경로</title>
  <desc id="desc">HBM 수요가 이익 수정, 외국인 수급, 지수 비중, KOSPI 모멘텀으로 이어지는 과정</desc>
  <rect width="1200" height="720" fill="#ecfeff"/>
  <text x="70" y="86" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="700">하이닉스 이익은 어떻게 KOSPI로 번역되나</text>
  <text x="70" y="126" fill="#475569" font-family="Arial, sans-serif" font-size="18">한 회사의 분기 실적이 지수 랠리가 되는 데는 네 개의 번역 단계가 있다</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <g transform="translate(95 245)">
      <rect width="180" height="150" rx="18" fill="#0e7490"/>
      <text x="90" y="58" text-anchor="middle" fill="#ecfeff">HBM 주문</text>
      <text x="90" y="94" text-anchor="middle" fill="#cffafe" font-size="15">AI 서버 병목</text>
    </g>
    <g transform="translate(335 245)">
      <rect width="180" height="150" rx="18" fill="#0369a1"/>
      <text x="90" y="58" text-anchor="middle" fill="#eff6ff">이익 수정</text>
      <text x="90" y="94" text-anchor="middle" fill="#dbeafe" font-size="15">OPM 재평가</text>
    </g>
    <g transform="translate(575 245)">
      <rect width="180" height="150" rx="18" fill="#166534"/>
      <text x="90" y="58" text-anchor="middle" fill="#f0fdf4">외국인 수급</text>
      <text x="90" y="94" text-anchor="middle" fill="#dcfce7" font-size="15">AI 한국 바스켓</text>
    </g>
    <g transform="translate(815 245)">
      <rect width="180" height="150" rx="18" fill="#a16207"/>
      <text x="90" y="58" text-anchor="middle" fill="#fffbeb">지수 비중</text>
      <text x="90" y="94" text-anchor="middle" fill="#fef3c7" font-size="15">시총가중 효과</text>
    </g>
  </g>
  <g stroke="#0f172a" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M285 320 H325"/>
    <path d="M525 320 H565"/>
    <path d="M765 320 H805"/>
  </g>
  <g fill="#0f172a">
    <path d="M325 320 l-14 -9 v18 z"/>
    <path d="M565 320 l-14 -9 v18 z"/>
    <path d="M805 320 l-14 -9 v18 z"/>
  </g>
  <g transform="translate(390 485)">
    <rect x="0" y="0" width="430" height="92" rx="18" fill="#ffffff" stroke="#67e8f9"/>
    <text x="215" y="38" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="23" font-weight="700">결과: KOSPI 모멘텀</text>
    <text x="215" y="67" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="16">넓은 경기 회복이 아니라 농축된 수급 효과일 수 있다</text>
  </g>
  <path d="M905 395 C900 470 835 515 820 530" stroke="#f97316" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M805 525 L820 530 L814 510" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
  <text x="70" y="660" fill="#64748b" font-family="Arial, sans-serif" font-size="15">해석: 시가총액 가중 지수에서는 이익이 커진 종목이 수급을 더 빨리 흡수한다</text>
</svg>
