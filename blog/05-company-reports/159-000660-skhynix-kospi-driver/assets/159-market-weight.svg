    <text x="548" y="54" fill="#052e16" font-family="Arial, sans-serif" font-size="23" font-weight="700">SK하이닉스</text>
    <text x="78" y="128" fill="#bae6fd" font-family="Arial, sans-serif" font-size="17">시총 2,119조원</text>
    <text x="552" y="128" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="17">시총 1,914조원</text>
  </g>
  <g transform="translate(120 390)">
