<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">SK하이닉스 주가 위치</title>
  <desc id="desc">SK하이닉스 주가가 52주 저점 대비 크게 상승하고 고점권에 머문 상태</desc>
  <rect width="1200" height="720" fill="#fff7ed"/>
  <text x="70" y="86" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">저점 24.2만원에서 268.5만원까지</text>
  <text x="70" y="126" fill="#475569" font-family="Arial, sans-serif" font-size="18">주가가 회사 이익을 따라간 것인지, 다음 이익까지 미리 산 것인지가 이번 질문의 본체다</text>
  <line x1="120" y1="510" x2="1080" y2="510" stroke="#cbd5e1" stroke-width="4"/>
  <line x1="120" y1="510" x2="1058" y2="180" stroke="#f97316" stroke-width="9" stroke-linecap="round"/>
  <circle cx="120" cy="510" r="16" fill="#64748b"/>
  <circle cx="1058" cy="180" r="18" fill="#dc2626"/>
  <circle cx="1037" cy="198" r="12" fill="#f97316"/>
  <text x="92" y="560" fill="#334155" font-family="Arial, sans-serif" font-size="20" font-weight="700">52주 저점</text>
  <text x="82" y="590" fill="#334155" font-family="Arial, sans-serif" font-size="26" font-weight="700">242,000원</text>
  <text x="882" y="154" fill="#991b1b" font-family="Arial, sans-serif" font-size="20" font-weight="700">장중 고점권</text>
  <text x="882" y="188" fill="#991b1b" font-family="Arial, sans-serif" font-size="28" font-weight="700">2,738,000원</text>
  <text x="830" y="250" fill="#9a3412" font-family="Arial, sans-serif" font-size="21" font-weight="700">2026-06-18 종가 2,685,000원</text>
  <g transform="translate(150 210)">
    <rect x="0" y="0" width="410" height="166" rx="16" fill="#ffffff" stroke="#fed7aa"/>
    <text x="28" y="48" fill="#7c2d12" font-family="Arial, sans-serif" font-size="23" font-weight="700">이 숫자가 던지는 질문</text>
    <text x="28" y="88" fill="#334155" font-family="Arial, sans-serif" font-size="18">주가가 1년 저점 대비 11배면</text>
    <text x="28" y="118" fill="#334155" font-family="Arial, sans-serif" font-size="18">더 중요한 것은 목표가가 아니라</text>
    <text x="28" y="148" fill="#334155" font-family="Arial, sans-serif" font-size="18">이익 기대가 꺾이는 조건이다</text>
  </g>
  <text x="70" y="660" fill="#64748b" font-family="Arial, sans-serif" font-size="15">자료: 네이버증권, Google Finance, 2026-06-18 장마감 화면</text>
</svg>
