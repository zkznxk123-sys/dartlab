<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">SK하이닉스 시장 견인력의 종료 조건</title>
  <desc id="desc">HBM 가격, 삼성 추격, 시장 폭, CAPEX, 외국인 수급 등 지수 견인력 약화 조건</desc>
  <rect width="1200" height="720" fill="#111827"/>
  <text x="70" y="86" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">한국장을 계속 끌려면 깨지면 안 되는 5개 조건</text>
  <text x="70" y="126" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">하이닉스 랠리의 리스크는 주가가 많이 올랐다는 사실보다 조건이 좁아졌다는 데 있다</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(90 205)">
      <rect width="310" height="132" rx="16" fill="#1f2937" stroke="#ef4444"/>
      <text x="28" y="42" fill="#fecaca" font-size="22" font-weight="700">1. HBM 가격</text>
      <text x="28" y="78" fill="#e5e7eb" font-size="17">ASP 상승이 멈추면</text>
      <text x="28" y="105" fill="#e5e7eb" font-size="17">이익률 70%대 해석도 바뀐다</text>
    </g>
    <g transform="translate(445 205)">
      <rect width="310" height="132" rx="16" fill="#1f2937" stroke="#f59e0b"/>
      <text x="28" y="42" fill="#fde68a" font-size="22" font-weight="700">2. 삼성 추격</text>
      <text x="28" y="78" fill="#e5e7eb" font-size="17">희소성 프리미엄은</text>
      <text x="28" y="105" fill="#e5e7eb" font-size="17">경쟁자가 따라오면 줄어든다</text>
    </g>
    <g transform="translate(800 205)">
      <rect width="310" height="132" rx="16" fill="#1f2937" stroke="#22c55e"/>
      <text x="28" y="42" fill="#bbf7d0" font-size="22" font-weight="700">3. 시장 폭</text>
      <text x="28" y="78" fill="#e5e7eb" font-size="17">지수가 오르는데</text>
      <text x="28" y="105" fill="#e5e7eb" font-size="17">상승 종목이 줄면 랠리는 약하다</text>
    </g>
    <g transform="translate(265 390)">
      <rect width="310" height="132" rx="16" fill="#1f2937" stroke="#60a5fa"/>
      <text x="28" y="42" fill="#bfdbfe" font-size="22" font-weight="700">4. CAPEX</text>
      <text x="28" y="78" fill="#e5e7eb" font-size="17">투자가 수요를 앞지르면</text>
      <text x="28" y="105" fill="#e5e7eb" font-size="17">다음 다운사이클이 빨라진다</text>
    </g>
    <g transform="translate(625 390)">
      <rect width="310" height="132" rx="16" fill="#1f2937" stroke="#a78bfa"/>
      <text x="28" y="42" fill="#ddd6fe" font-size="22" font-weight="700">5. 외국인 수급</text>
      <text x="28" y="78" fill="#e5e7eb" font-size="17">ETF와 벤치마크가 멈추면</text>
      <text x="28" y="105" fill="#e5e7eb" font-size="17">시총가중 효과는 반대로 돈다</text>
    </g>
  </g>
  <text x="70" y="650" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">다음 분기 확인: 매출채권, 재고, CAPEX, HBM 출하 설명, 외국인 보유율</text>
</svg>
