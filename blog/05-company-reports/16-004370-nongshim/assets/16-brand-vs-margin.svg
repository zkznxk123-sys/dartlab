<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" width="1080" height="300">
  <title>브랜드 인지도 vs 마진 역전 비교</title>
  <desc>SNS 언급량은 농심이 2배지만 영업이익률은 삼양이 4배 높은 역전 구조</desc>
  <rect width="1080" height="300" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="40" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#f1f5f9">브랜드가 강해도 마진으로 전환되지 않는다</text>

  <!-- Row headers -->
  <text x="540" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">농심</text>
  <text x="335" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">&#8592;</text>
  <text x="745" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">&#8594;</text>
  <text x="200" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">삼양</text>
  <text x="880" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">삼양</text>

  <!-- Row 1: SNS 언급 -->
  <text x="60" y="137" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">SNS 언급</text>

  <!-- 삼양 SNS (작은) -->
  <rect x="260" y="115" width="160" height="36" rx="5" fill="#8b5cf6" opacity="0.4"/>
  <text x="275" y="138" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#f1f5f9">11.8만</text>

  <!-- 농심 SNS (큰) -->
  <rect x="440" y="115" width="340" height="36" rx="5" fill="#3b82f6"/>
  <text x="455" y="138" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#fff">23.3만</text>
  <text x="760" y="138" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#3b82f6">2배</text>

  <!-- Divider -->
  <line x1="140" y1="170" x2="940" y2="170" stroke="#334155" stroke-width="1"/>

  <!-- Row 2: 영업이익률 (역전!) -->
  <text x="60" y="212" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">영업이익률</text>

  <!-- 농심 OPM (작은) -->
  <rect x="440" y="190" width="80" height="36" rx="5" fill="#ef4444"/>
  <text x="455" y="213" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#fff">5.2%</text>

  <!-- 삼양 OPM (큰) -->
  <rect x="540" y="190" width="340" height="36" rx="5" fill="#22c55e"/>
  <text x="555" y="213" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#fff">22.0%</text>
  <text x="862" y="213" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#22c55e">4.2배</text>

  <!-- Reversal indicator -->
  <text x="540" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#fbbf24">&#8645;</text>
  <text x="540" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#fbbf24" font-weight="bold">역전</text>
  <text x="540" y="288" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">브랜드 인지도와 수익성은 별개의 문제다</text>

  <!-- Bottom accent -->
  <rect x="0" y="296" width="1080" height="4" fill="#fbbf24" opacity="0.5"/>
</svg>