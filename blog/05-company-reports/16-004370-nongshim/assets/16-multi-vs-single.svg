<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" width="1080" height="300">
  <title>다품종 vs 올인 전략 비교</title>
  <desc>농심의 100+ SKU 분산 전략 vs 삼양의 불닭 올인 전략 비교</desc>
  <rect width="1080" height="300" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#f1f5f9">다품종 vs 올인 -- 어느 쪽이 효율적인가?</text>

  <!-- Divider line -->
  <line x1="540" y1="60" x2="540" y2="260" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="540" y="278" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">VS</text>

  <!-- Left: Nongshim multi-product -->
  <text x="270" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="bold" fill="#ef4444">농심</text>

  <!-- Product grid -->
  <rect x="70" y="100" width="120" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="130" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#f1f5f9">신라면</text>

  <rect x="200" y="100" width="120" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="260" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#f1f5f9">너구리</text>

  <rect x="330" y="100" width="120" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="390" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#f1f5f9">짜파게티</text>

  <rect x="70" y="140" width="120" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="130" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#f1f5f9">새우깡</text>

  <rect x="200" y="140" width="120" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="260" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#f1f5f9">안성탕면</text>

  <rect x="330" y="140" width="120" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="390" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">+95개 SKU</text>

  <!-- Arrow down -->
  <text x="270" y="200" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#64748b">&#8595;</text>

  <rect x="150" y="210" width="240" height="40" rx="8" fill="#ef4444" opacity="0.15"/>
  <text x="270" y="236" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#ef4444">100개+ SKU</text>
  <text x="270" y="256" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">관리비 분산, 마케팅 분산</text>

  <!-- Right: Samyang single product -->
  <text x="810" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="bold" fill="#22c55e">삼양식품</text>

  <!-- Single big product -->
  <rect x="690" y="100" width="240" height="70" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <text x="810" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="bold" fill="#22c55e">불닭</text>
  <text x="810" y="158" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">시리즈 전체</text>

  <!-- Arrow down -->
  <text x="810" y="200" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#64748b">&#8595;</text>

  <rect x="690" y="210" width="240" height="40" rx="8" fill="#22c55e" opacity="0.15"/>
  <text x="810" y="236" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#22c55e">매출의 80%</text>
  <text x="810" y="256" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">자원 집중, 마케팅 집중</text>

  <!-- Bottom accent -->
  <rect x="0" y="296" width="1080" height="4" fill="#8b5cf6" opacity="0.5"/>
</svg>