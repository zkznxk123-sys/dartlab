<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" width="1080" height="300">
  <title>영업이익률 비교: 삼양식품 22% vs 농심 5.2%</title>
  <desc>같은 라면 업종이지만 영업이익률이 4배 차이나는 비교 차트</desc>
  <rect width="1080" height="300" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="45" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="bold" fill="#f1f5f9">같은 라면인데 영업이익률 4배 차이</text>
  <text x="540" y="75" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b">삼양식품 22% vs 농심 5.2%</text>

  <!-- Samyang bar -->
  <text x="120" y="135" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">삼양식품</text>
  <rect x="140" y="115" width="660" height="36" rx="6" fill="#22c55e" opacity="0.15"/>
  <rect x="140" y="115" width="660" height="36" rx="6" fill="#22c55e"/>
  <text x="815" y="139" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#22c55e">22.0%</text>

  <!-- Nongshim bar -->
  <text x="120" y="210" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">농심</text>
  <rect x="140" y="190" width="156" height="36" rx="6" fill="#ef4444"/>
  <text x="312" y="214" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="bold" fill="#ef4444">5.2%</text>

  <!-- Arrow annotation -->
  <line x1="310" y1="165" x2="310" y2="185" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="370" y="178" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">4.2배 차이</text>

  <!-- Bottom accent -->
  <rect x="0" y="296" width="1080" height="4" fill="#ef4444" opacity="0.6"/>
</svg>