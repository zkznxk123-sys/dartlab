<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" width="1080" height="350">
  <title>해외 지역별 매출 비중 비교</title>
  <desc>농심은 미국+중국 편중, 삼양은 일본+유럽 고수익 시장 중심</desc>
  <rect width="1080" height="350" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="40" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#f1f5f9">해외 비중은 비슷한데, 해외의 '질'이 다르다</text>
  <text x="540" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b">농심의 중국 17% vs 삼양의 일본+유럽 60%</text>

  <!-- Nongshim stacked bar -->
  <text x="80" y="135" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">농심</text>

  <!-- US 50% -->
  <rect x="100" y="110" width="390" height="44" rx="0" fill="#3b82f6"/>
  <text x="295" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#fff">미국 50%</text>

  <!-- China 17% -->
  <rect x="490" y="110" width="133" height="44" rx="0" fill="#ef4444"/>
  <text x="556" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#fff">중국 17%</text>

  <!-- Others 33% -->
  <rect x="623" y="110" width="257" height="44" rx="0" fill="#94a3b8" opacity="0.5"/>
  <text x="751" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#fff">기타 33%</text>

  <!-- Rounded corners for first and last -->
  <rect x="100" y="110" width="12" height="44" fill="#3b82f6"/>
  <rect x="868" y="110" width="12" height="44" fill="#94a3b8" opacity="0.5"/>

  <!-- Samyang stacked bar -->
  <text x="80" y="225" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">삼양</text>

  <!-- US 30% -->
  <rect x="100" y="200" width="234" height="44" rx="0" fill="#3b82f6"/>
  <text x="217" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#fff">미국 30%</text>

  <!-- Japan+Europe 60% -->
  <rect x="334" y="200" width="468" height="44" rx="0" fill="#22c55e"/>
  <text x="568" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="bold" fill="#fff">일본+유럽 60%</text>

  <!-- Others 10% -->
  <rect x="802" y="200" width="78" height="44" rx="0" fill="#94a3b8" opacity="0.5"/>
  <text x="841" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#fff">10%</text>

  <!-- Annotations -->
  <rect x="100" y="280" width="380" height="40" rx="8" fill="#1e293b"/>
  <text x="120" y="305" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ef4444">&#9679;</text>
  <text x="140" y="305" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">중국: 현지 공장 + 가격 경쟁 = 저마진</text>

  <rect x="520" y="280" width="460" height="40" rx="8" fill="#1e293b"/>
  <text x="540" y="305" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#22c55e">&#9679;</text>
  <text x="560" y="305" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">일본+유럽: 프리미엄 가격 수용 = 고마진</text>

  <!-- Bottom accent -->
  <rect x="0" y="346" width="1080" height="4" fill="#22c55e" opacity="0.5"/>
</svg>