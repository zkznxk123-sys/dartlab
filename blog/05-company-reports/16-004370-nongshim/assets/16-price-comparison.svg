<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" width="1080" height="350">
  <title>국내 vs 해외 라면 가격 비교</title>
  <desc>신라면과 불닭의 국내/미국 가격 차이와 배수 비교</desc>
  <rect width="1080" height="350" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#f1f5f9">해외에서 2배를 받는데 왜 마진이 안 오르나?</text>

  <!-- Column headers -->
  <text x="440" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b">국내</text>
  <text x="720" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b">미국</text>
  <text x="950" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b">배수</text>

  <!-- Shin Ramyun section -->
  <text x="100" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#ef4444">신라면</text>
  <text x="100" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">농심</text>

  <!-- 국내 950원 -->
  <rect x="300" y="120" width="120" height="40" rx="6" fill="#3b82f6" opacity="0.2"/>
  <rect x="300" y="120" width="120" height="40" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#3b82f6">950원</text>

  <!-- Arrow -->
  <line x1="430" y1="140" x2="560" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 미국 1,900원 -->
  <rect x="570" y="120" width="220" height="40" rx="6" fill="#ef4444" opacity="0.2"/>
  <rect x="570" y="120" width="220" height="40" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="680" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#ef4444">1,900원</text>

  <!-- 배수 -->
  <rect x="880" y="120" width="100" height="40" rx="20" fill="#ef4444"/>
  <text x="930" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#fff">x2.0</text>

  <!-- Buldak section -->
  <text x="100" y="240" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#22c55e">불닭</text>
  <text x="100" y="260" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">삼양식품</text>

  <!-- 국내 1,300원 -->
  <rect x="300" y="220" width="160" height="40" rx="6" fill="#3b82f6" opacity="0.2"/>
  <rect x="300" y="220" width="160" height="40" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#3b82f6">1,300원</text>

  <!-- Arrow -->
  <line x1="470" y1="240" x2="560" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 미국 2,200원 -->
  <rect x="570" y="220" width="220" height="40" rx="6" fill="#22c55e" opacity="0.2"/>
  <rect x="570" y="220" width="220" height="40" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="680" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#22c55e">2,200원</text>

  <!-- 배수 -->
  <rect x="880" y="220" width="100" height="40" rx="20" fill="#22c55e"/>
  <text x="930" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#fff">x1.7</text>

  <!-- Bottom insight -->
  <text x="540" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#64748b">가격 배수는 비슷한데, 농심의 해외 현지 생산 비용이 마진을 갉아먹는다</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Bottom accent -->
  <rect x="0" y="346" width="1080" height="4" fill="#3b82f6" opacity="0.5"/>
</svg>