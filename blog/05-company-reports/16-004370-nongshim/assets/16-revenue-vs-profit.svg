<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400">
  <title>매출 vs 영업이익 교차 비교</title>
  <desc>매출은 농심이 크지만 영업이익은 삼양이 큰 교차 구조</desc>
  <rect width="1080" height="400" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#f1f5f9">매출은 농심이 크지만, 이익은 삼양이 크다</text>

  <!-- Left section: 매출 -->
  <text x="270" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#64748b">매출</text>

  <!-- 농심 매출 bar (bigger) -->
  <text x="90" y="130" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#f1f5f9">농심</text>
  <rect x="140" y="110" width="300" height="34" rx="5" fill="#3b82f6"/>
  <text x="450" y="133" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">3.5조</text>

  <!-- 삼양 매출 bar (smaller) -->
  <text x="90" y="180" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#f1f5f9">삼양</text>
  <rect x="140" y="160" width="200" height="34" rx="5" fill="#8b5cf6"/>
  <text x="350" y="183" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6">2.35조</text>

  <!-- Right section: 영업이익 -->
  <text x="810" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#64748b">영업이익</text>

  <!-- 삼양 영업이익 bar (bigger) -->
  <text x="610" y="130" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#f1f5f9">삼양</text>
  <rect x="660" y="110" width="280" height="34" rx="5" fill="#22c55e"/>
  <text x="950" y="133" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#22c55e">5,150억</text>

  <!-- 농심 영업이익 bar (smaller) -->
  <text x="610" y="180" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#f1f5f9">농심</text>
  <rect x="660" y="160" width="100" height="34" rx="5" fill="#ef4444"/>
  <text x="770" y="183" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#ef4444">1,839억</text>

  <!-- Cross lines -->
  <line x1="440" y1="127" x2="660" y2="177" stroke="#ef4444" stroke-width="2" opacity="0.5" stroke-dasharray="6,4"/>
  <line x1="340" y1="177" x2="660" y2="127" stroke="#22c55e" stroke-width="2" opacity="0.5" stroke-dasharray="6,4"/>

  <!-- X label -->
  <text x="540" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#f1f5f9" opacity="0.3">X</text>

  <!-- Bottom insight cards -->
  <rect x="80" y="240" width="420" height="70" rx="10" fill="#1e293b"/>
  <text x="290" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">농심의 매출은 삼양보다</text>
  <text x="290" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#3b82f6">1.49배 크다</text>

  <rect x="580" y="240" width="420" height="70" rx="10" fill="#1e293b"/>
  <text x="790" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">삼양의 영업이익은 농심보다</text>
  <text x="790" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#22c55e">2.8배 크다</text>

  <!-- Divider -->
  <line x1="540" y1="95" x2="540" y2="210" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom accent -->
  <rect x="0" y="396" width="1080" height="4" fill="#22c55e" opacity="0.5"/>
</svg>