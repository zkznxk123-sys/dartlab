<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 250" width="1080" height="250">
  <title>신라면 툼바 핵심 실적</title>
  <desc>4개월 2500만개 판매, 가격 1300원(+30%), 일본 닛케이 히트상품 선정</desc>
  <rect width="1080" height="250" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="40" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#f1f5f9">신라면 툼바 -- 프리미엄 라인의 시작?</text>

  <!-- Card 1: 4개월 2,500만개 -->
  <rect x="80" y="75" width="280" height="130" rx="12" fill="#1e293b"/>
  <rect x="80" y="75" width="280" height="4" rx="2" fill="#fbbf24"/>
  <text x="220" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="bold" fill="#fbbf24">2,500만개</text>
  <text x="220" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#f1f5f9">출시 4개월 판매량</text>
  <text x="220" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">역대 신제품 최고 속도</text>

  <!-- Card 2: 가격 1,300원 (+30%) -->
  <rect x="400" y="75" width="280" height="130" rx="12" fill="#1e293b"/>
  <rect x="400" y="75" width="280" height="4" rx="2" fill="#22c55e"/>
  <text x="540" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="bold" fill="#22c55e">1,300원</text>
  <text x="540" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#f1f5f9">개당 가격</text>
  <rect x="490" y="160" width="100" height="24" rx="12" fill="#22c55e" opacity="0.2"/>
  <text x="540" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="bold" fill="#22c55e">+30%</text>

  <!-- Card 3: 일본 닛케이 -->
  <rect x="720" y="75" width="280" height="130" rx="12" fill="#1e293b"/>
  <rect x="720" y="75" width="280" height="4" rx="2" fill="#3b82f6"/>
  <text x="860" y="115" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="bold" fill="#3b82f6">&#127471;&#127477;</text>
  <text x="860" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" fill="#f1f5f9">닛케이 히트상품</text>
  <text x="860" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">일본 시장 검증 완료</text>

  <!-- Bottom insight -->
  <text x="540" y="235" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">신라면 툼바가 프리미엄 가격 정책의 돌파구가 될 수 있을까?</text>

  <!-- Bottom accent -->
  <rect x="0" y="246" width="1080" height="4" fill="#fbbf24" opacity="0.5"/>
</svg>