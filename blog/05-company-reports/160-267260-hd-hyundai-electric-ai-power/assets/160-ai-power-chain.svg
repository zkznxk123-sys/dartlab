<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI 전력 사슬</title>
  <desc id="desc">AI 반도체에서 데이터센터, 전력망, 변압기, 수주잔고, 매출 인식으로 이어지는 흐름</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="70" y="60" width="1060" height="555" rx="18" fill="#ffffff" stroke="#dce4ee"/>
  <text x="105" y="120" font-family="Malgun Gothic, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">AI 랠리는 전력망을 지나야 완성된다</text>
  <text x="105" y="158" font-family="Malgun Gothic, Arial, sans-serif" font-size="18" fill="#64748b">반도체에서 전력기기로 이어지는 물리적 사슬</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-family="Malgun Gothic, Arial, sans-serif">
    <g transform="translate(110 285)">
      <rect width="160" height="105" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
      <text x="80" y="45" text-anchor="middle" font-size="22" font-weight="800" fill="#075985">AI 칩</text>
      <text x="80" y="75" text-anchor="middle" font-size="15" fill="#0369a1">HBM·GPU</text>
    </g>
    <g transform="translate(315 285)">
      <rect width="170" height="105" rx="16" fill="#ede9fe" stroke="#8b5cf6"/>
      <text x="85" y="45" text-anchor="middle" font-size="22" font-weight="800" fill="#5b21b6">데이터센터</text>
      <text x="85" y="75" text-anchor="middle" font-size="15" fill="#6d28d9">전력 수요 증가</text>
    </g>
    <g transform="translate(530 285)">
      <rect width="160" height="105" rx="16" fill="#dcfce7" stroke="#22c55e"/>
      <text x="80" y="45" text-anchor="middle" font-size="22" font-weight="800" fill="#166534">전력망</text>
      <text x="80" y="75" text-anchor="middle" font-size="15" fill="#15803d">접속·증설</text>
    </g>
    <g transform="translate(735 285)">
      <rect width="160" height="105" rx="16" fill="#ffedd5" stroke="#f97316"/>
      <text x="80" y="45" text-anchor="middle" font-size="22" font-weight="800" fill="#9a3412">변압기</text>
      <text x="80" y="75" text-anchor="middle" font-size="15" fill="#c2410c">납기 병목</text>
    </g>
    <g transform="translate(940 285)">
      <rect width="160" height="105" rx="16" fill="#fee2e2" stroke="#ef4444"/>
      <text x="80" y="45" text-anchor="middle" font-size="22" font-weight="800" fill="#991b1b">매출 인식</text>
      <text x="80" y="75" text-anchor="middle" font-size="15" fill="#b91c1c">수주→납품</text>
    </g>
    <line x1="275" y1="337" x2="307" y2="337" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="490" y1="337" x2="522" y2="337" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="695" y1="337" x2="727" y2="337" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="900" y1="337" x2="932" y2="337" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
  <text x="240" y="505" font-family="Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">핵심 질문: 서버 수요가 전력장비 매출과 현금흐름으로 얼마나 오래 이어지는가</text>
</svg>
