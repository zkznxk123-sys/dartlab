<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">HD현대일렉트릭 수주잔고 활주로</title>
  <desc id="desc">2025년 말과 2026년 1분기 수주잔고, 신규 수주를 보여주는 차트</desc>
  <rect width="1200" height="675" fill="#f6f8fb"/>
  <rect x="70" y="55" width="1060" height="565" rx="18" fill="#ffffff" stroke="#d9e2ec"/>
  <text x="105" y="113" font-family="Malgun Gothic, Arial, sans-serif" font-size="34" font-weight="800" fill="#102033">수주잔고는 미래 매출의 활주로다</text>
  <text x="105" y="150" font-family="Malgun Gothic, Arial, sans-serif" font-size="18" fill="#64748b">단위: 십억달러, 회사 IR 및 보도 기준</text>
  <line x1="145" y1="510" x2="1045" y2="510" stroke="#cbd5e1" stroke-width="2"/>
  <g>
    <rect x="225" y="259" width="170" height="251" rx="10" fill="#93c5fd"/>
    <rect x="503" y="215" width="170" height="295" rx="10" fill="#2563eb"/>
    <rect x="781" y="443" width="170" height="67" rx="10" fill="#f97316"/>
    <text x="214" y="545" font-family="Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">2025 잔고</text>
    <text x="235" y="245" font-family="Malgun Gothic, Arial, sans-serif" font-size="36" font-weight="900" fill="#1e3a8a">$6.731B</text>
    <text x="488" y="545" font-family="Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">2026Q1 잔고</text>
    <text x="513" y="201" font-family="Malgun Gothic, Arial, sans-serif" font-size="36" font-weight="900" fill="#1d4ed8">$7.888B</text>
    <text x="777" y="545" font-family="Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">2026Q1 수주</text>
    <text x="794" y="429" font-family="Malgun Gothic, Arial, sans-serif" font-size="36" font-weight="900" fill="#c2410c">$1.797B</text>
  </g>
  <path d="M390 325 C435 285 465 260 510 250" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
  <path d="M494 237 L515 249 L500 268" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="350" y="598" font-family="Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">잔고가 커질수록 핵심은 납품 속도와 마진의 질이다</text>
</svg>
