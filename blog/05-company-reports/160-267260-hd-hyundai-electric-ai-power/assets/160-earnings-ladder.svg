<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">HD현대일렉트릭 실적 계단</title>
  <desc id="desc">2025년 연간과 2026년 1분기 매출, 영업이익, 영업이익률 비교</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="70" y="55" width="1060" height="565" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="105" y="112" font-family="Malgun Gothic, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Q1의 핵심은 성장률보다 마진 유지</text>
  <text x="105" y="150" font-family="Malgun Gothic, Arial, sans-serif" font-size="18" fill="#64748b">2025년 연간 OPM 24.4% → 2026년 1분기 OPM 24.9%</text>
  <g transform="translate(130 210)">
    <text x="0" y="0" font-family="Malgun Gothic, Arial, sans-serif" font-size="24" font-weight="700" fill="#334155">2025 연간</text>
    <rect x="0" y="40" width="410" height="62" rx="10" fill="#dbeafe"/>
    <rect x="0" y="126" width="240" height="62" rx="10" fill="#fed7aa"/>
    <rect x="0" y="212" width="176" height="62" rx="10" fill="#bbf7d0"/>
    <text x="22" y="80" font-family="Malgun Gothic, Arial, sans-serif" font-size="25" font-weight="800" fill="#1e3a8a">매출 4.0795조원</text>
    <text x="22" y="166" font-family="Malgun Gothic, Arial, sans-serif" font-size="25" font-weight="800" fill="#9a3412">영업이익 9,953억원</text>
    <text x="22" y="252" font-family="Malgun Gothic, Arial, sans-serif" font-size="25" font-weight="800" fill="#166534">OPM 24.4%</text>
  </g>
  <g transform="translate(650 210)">
    <text x="0" y="0" font-family="Malgun Gothic, Arial, sans-serif" font-size="24" font-weight="700" fill="#334155">2026 1분기</text>
    <rect x="0" y="40" width="300" height="62" rx="10" fill="#dbeafe"/>
    <rect x="0" y="126" width="245" height="62" rx="10" fill="#fed7aa"/>
    <rect x="0" y="212" width="180" height="62" rx="10" fill="#bbf7d0"/>
    <text x="22" y="80" font-family="Malgun Gothic, Arial, sans-serif" font-size="25" font-weight="800" fill="#1e3a8a">매출 1.0365조원</text>
    <text x="22" y="166" font-family="Malgun Gothic, Arial, sans-serif" font-size="25" font-weight="800" fill="#9a3412">영업이익 2,583억원</text>
    <text x="22" y="252" font-family="Malgun Gothic, Arial, sans-serif" font-size="25" font-weight="800" fill="#166534">OPM 24.9%</text>
  </g>
  <path d="M560 343 C595 310 610 310 640 343" fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  <path d="M628 328 L644 343 L628 358" fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="385" y="565" font-family="Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">분기 매출은 흔들릴 수 있지만, 가격은 마진의 지속성을 본다</text>
</svg>
