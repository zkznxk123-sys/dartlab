<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">HD현대일렉트릭 리스크 체크포인트</title>
  <desc id="desc">고평가 구간에서 확인해야 할 다섯 가지 숫자 리스크</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="70" y="55" width="1060" height="565" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="105" y="114" font-family="Malgun Gothic, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">앞으로 볼 것은 테마가 아니라 숫자의 질</text>
  <text x="105" y="152" font-family="Malgun Gothic, Arial, sans-serif" font-size="18" fill="#64748b">PER 50배 근처에서 시장이 확인하려는 다섯 가지</text>
  <g font-family="Malgun Gothic, Arial, sans-serif">
    <g transform="translate(135 220)">
      <circle cx="42" cy="42" r="42" fill="#dbeafe"/>
      <text x="42" y="52" text-anchor="middle" font-size="28" font-weight="900" fill="#1d4ed8">1</text>
      <text x="110" y="34" font-size="23" font-weight="800" fill="#0f172a">매출 인식 속도</text>
      <text x="110" y="68" font-size="17" fill="#64748b">수주가 실제 납품으로 바뀌는가</text>
    </g>
    <g transform="translate(650 220)">
      <circle cx="42" cy="42" r="42" fill="#ffedd5"/>
      <text x="42" y="52" text-anchor="middle" font-size="28" font-weight="900" fill="#c2410c">2</text>
      <text x="110" y="34" font-size="23" font-weight="800" fill="#0f172a">20%대 중반 마진</text>
      <text x="110" y="68" font-size="17" fill="#64748b">공급 부족 프리미엄이 유지되는가</text>
    </g>
    <g transform="translate(135 350)">
      <circle cx="42" cy="42" r="42" fill="#dcfce7"/>
      <text x="42" y="52" text-anchor="middle" font-size="28" font-weight="900" fill="#15803d">3</text>
      <text x="110" y="34" font-size="23" font-weight="800" fill="#0f172a">운전자본</text>
      <text x="110" y="68" font-size="17" fill="#64748b">재고·매출채권이 과도하게 앞서지 않는가</text>
    </g>
    <g transform="translate(650 350)">
      <circle cx="42" cy="42" r="42" fill="#ede9fe"/>
      <text x="42" y="52" text-anchor="middle" font-size="28" font-weight="900" fill="#6d28d9">4</text>
      <text x="110" y="34" font-size="23" font-weight="800" fill="#0f172a">증설 실행</text>
      <text x="110" y="68" font-size="17" fill="#64748b">울산·북미 생산능력이 납기와 품질로 이어지는가</text>
    </g>
    <g transform="translate(375 485)">
      <circle cx="42" cy="42" r="42" fill="#fee2e2"/>
      <text x="42" y="52" text-anchor="middle" font-size="28" font-weight="900" fill="#b91c1c">5</text>
      <text x="110" y="34" font-size="23" font-weight="800" fill="#0f172a">현금흐름</text>
      <text x="110" y="68" font-size="17" fill="#64748b">이익이 FCF로 남는가</text>
    </g>
  </g>
</svg>
