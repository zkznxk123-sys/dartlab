<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 250" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="250" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">EV = 부품 단가 2.5배 상승</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">공조업체에게 EV는 위기가 아니라 기회</text>
  <text x="300" y="110" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle">내연기관 공조</text>
  <rect x="200" y="120" width="200" height="40" rx="6" fill="#94a3b8" opacity="0.6"/>
  <text x="300" y="145" font-size="15" font-weight="700" fill="#f1f5f9" text-anchor="middle">1x (에어컨/히터)</text>
  <text x="700" y="110" font-size="14" font-weight="600" fill="#22c55e" text-anchor="middle">EV 열관리</text>
  <rect x="500" y="120" width="500" height="40" rx="6" fill="#22c55e" opacity="0.7"/>
  <text x="750" y="145" font-size="15" font-weight="700" fill="#f1f5f9" text-anchor="middle">2.5x (배터리 냉각 + 히트펌프 + 모터 냉각 통합)</text>
  <rect x="430" y="175" width="60" height="28" rx="14" fill="#fbbf24" opacity="0.2"/>
  <text x="460" y="194" font-size="14" font-weight="800" fill="#fbbf24" text-anchor="middle">×2.5</text>
  <text x="540" y="230" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">한온시스템 EV 매출 비중 28% | 세계 최초 4세대 히트펌프</text>
</svg>
