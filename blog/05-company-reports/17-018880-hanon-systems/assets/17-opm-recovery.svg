  <text x="620" y="310" font-size="11" fill="#94a3b8" text-anchor="middle">2023</text>
  <circle cx="760" cy="252" r="12" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <circle cx="760" cy="252" r="6" fill="#ef4444"/>
  <text x="760" y="240" font-size="13" font-weight="800" fill="#ef4444" text-anchor="middle">0.9%</text>
  <text x="760" y="270" font-size="10" fill="#ef4444" text-anchor="middle">빅배스</text>
  <text x="760" y="310" font-size="11" fill="#94a3b8" text-anchor="middle">2024</text>
  <circle cx="900" cy="185" r="6" fill="#fbbf24"/>
