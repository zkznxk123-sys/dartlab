  <text x="200" y="310" font-size="11" fill="#94a3b8" text-anchor="middle">2020</text>
  <circle cx="340" cy="105" r="6" fill="#22c55e"/>
  <text x="340" y="93" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">4.4%</text>
  <text x="340" y="310" font-size="11" fill="#94a3b8" text-anchor="middle">2021</text>
  <circle cx="480" cy="164" r="6" fill="#f59e0b"/>
