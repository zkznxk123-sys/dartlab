<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">애플 의존도 추이 — 58%에서 80%까지</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">5원 중 4원이 애플에서 나온다</text>
  <line x1="120" y1="280" x2="960" y2="280" stroke="#334155" stroke-width="1"/>
  <!-- Scale: 50%=250, 85%=80. range 35% over 170px. 1%=4.86px -->
  <!-- 58: y=280-(58-50)*4.86=280-38.9=241 -->
  <polyline points="200,241 340,222 480,159 620,146 760,133 900,120" fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="200" cy="241" r="5" fill="#94a3b8"/>
  <text x="200" y="233" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">58%</text>
  <text x="200" y="300" font-size="11" fill="#64748b" text-anchor="middle">2018</text>
  <circle cx="340" cy="222" r="5" fill="#94a3b8"/>
  <text x="340" y="214" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">62%</text>
  <text x="340" y="300" font-size="11" fill="#64748b" text-anchor="middle">2019</text>
  <circle cx="480" cy="159" r="5" fill="#f59e0b"/>
  <text x="480" y="151" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">75%</text>
  <text x="480" y="300" font-size="11" fill="#64748b" text-anchor="middle">2021</text>
  <circle cx="620" cy="146" r="5" fill="#f59e0b"/>
  <text x="620" y="138" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">77%</text>
  <text x="620" y="300" font-size="11" fill="#64748b" text-anchor="middle">2022</text>
  <circle cx="760" cy="133" r="5" fill="#ef4444"/>
  <text x="760" y="125" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">80%</text>
  <text x="760" y="300" font-size="11" fill="#64748b" text-anchor="middle">2023</text>
  <circle cx="900" cy="120" r="8" fill="#ef4444"/>
  <text x="900" y="110" font-size="14" font-weight="800" fill="#ef4444" text-anchor="middle">80.4%</text>
  <text x="900" y="300" font-size="11" fill="#fbbf24" text-anchor="middle">2025Q1</text>
  <rect x="700" y="80" width="120" height="24" rx="12" fill="#ef4444" opacity="0.2"/>
  <text x="760" y="96" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">역대 최대</text>
</svg>
