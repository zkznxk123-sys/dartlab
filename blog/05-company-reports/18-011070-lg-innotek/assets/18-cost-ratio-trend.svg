<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <rect width="1200" height="480" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">원가가 이익을 먹는 5년 — 매출원가율 87.8% → 91.6%</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">매출 2.5배 늘었는데 OPM은 반 토막. 규모의 경제가 작동하지 않는 구조</text>

  <!-- Y axis labels -->
  <text x="90" y="130" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">100%</text>
  <line x1="100" y1="126" x2="1100" y2="126" stroke="#1e2433" stroke-width="0.5"/>
  <text x="90" y="256" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">85%</text>
  <line x1="100" y1="252" x2="1100" y2="252" stroke="#1e2433" stroke-width="0.5"/>

  <!-- Baseline -->
  <line x1="100" y1="380" x2="1100" y2="380" stroke="#1e2433" stroke-width="1"/>

  <!-- 2020: 원가율 87.8%, 판관비 5.6%, OPM 6.6% -->
  <rect x="140" y="146" width="120" height="198" rx="3" fill="#ef4444" fill-opacity="0.5"/>
  <text x="200" y="166" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">87.8%</text>
  <text x="200" y="182" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">원가율</text>
  <rect x="140" y="344" width="120" height="12" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="200" y="340" text-anchor="middle" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="10">5.6%</text>
  <rect x="140" y="358" width="120" height="16" rx="2" fill="#22c55e" fill-opacity="0.7"/>
  <text x="200" y="372" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700">6.6%</text>
  <text x="200" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2020</text>
  <text x="200" y="416" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">8.9조</text>

  <!-- 2021: 원가율 88.4%, 판관비 5.6%, OPM 6.0% -->
  <rect x="310" y="143" width="120" height="202" rx="3" fill="#ef4444" fill-opacity="0.55"/>
  <text x="370" y="166" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">88.4%</text>
  <text x="370" y="182" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">원가율</text>
  <rect x="310" y="345" width="120" height="12" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="370" y="341" text-anchor="middle" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="10">5.6%</text>
  <rect x="310" y="359" width="120" height="14" rx="2" fill="#22c55e" fill-opacity="0.7"/>
  <text x="370" y="371" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700">6.0%</text>
  <text x="370" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2021</text>
  <text x="370" y="416" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">10.5조</text>

  <!-- 2022: 원가율 89.8%, 판관비 5.4%, OPM 4.8% -->
  <rect x="480" y="139" width="120" height="208" rx="3" fill="#ef4444" fill-opacity="0.6"/>
  <text x="540" y="166" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">89.8%</text>
  <text x="540" y="182" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">원가율</text>
  <rect x="480" y="347" width="120" height="12" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="540" y="343" text-anchor="middle" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="10">5.4%</text>
  <rect x="480" y="361" width="120" height="11" rx="2" fill="#f59e0b" fill-opacity="0.6"/>
  <text x="540" y="370" text-anchor="middle" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">4.8%</text>
  <text x="540" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2022</text>
  <text x="540" y="416" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">19.8조</text>

  <!-- 2023: 원가율 91.7%, 판관비 5.4%, OPM 2.9% -->
  <rect x="650" y="133" width="120" height="216" rx="3" fill="#ef4444" fill-opacity="0.7"/>
  <text x="710" y="166" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">91.7%</text>
  <text x="710" y="182" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">원가율</text>
  <rect x="650" y="349" width="120" height="12" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="710" y="345" text-anchor="middle" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="10">5.4%</text>
  <rect x="650" y="363" width="120" height="8" rx="2" fill="#ef4444" fill-opacity="0.4"/>
  <text x="710" y="370" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">2.9%</text>
  <text x="710" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2023</text>
  <text x="710" y="416" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">20.4조</text>

  <!-- 2024: 원가율 91.6%, 판관비 5.4%, OPM 3.0% -->
  <rect x="820" y="134" width="120" height="215" rx="3" fill="#ef4444" fill-opacity="0.7"/>
  <text x="880" y="166" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">91.6%</text>
  <text x="880" y="182" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">원가율</text>
  <rect x="820" y="349" width="120" height="12" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="880" y="345" text-anchor="middle" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="10">5.4%</text>
  <rect x="820" y="363" width="120" height="8" rx="2" fill="#ef4444" fill-opacity="0.4"/>
  <text x="880" y="370" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">3.0%</text>
  <text x="880" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2024</text>
  <text x="880" y="416" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">22.1조</text>

  <!-- Arrow showing OPM decline -->
  <line x1="200" y1="440" x2="880" y2="440" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6"/>
  <polygon points="880,436 895,440 880,444" fill="#fbbf24"/>
  <text x="540" y="460" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">매출 2.5배 ↑ · OPM 6.6% → 3.0% (반 토막) · 애플 단가 인하 + 원자재 상승이 규모의 경제를 상쇄</text>

  <!-- Legend -->
  <rect x="980" y="140" width="12" height="12" rx="2" fill="#ef4444" fill-opacity="0.6"/>
  <text x="998" y="151" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출원가율</text>
  <rect x="980" y="160" width="12" height="12" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="998" y="171" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">판관비율</text>
  <rect x="980" y="180" width="12" height="12" rx="2" fill="#22c55e" fill-opacity="0.7"/>
  <text x="998" y="191" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">영업이익률</text>
</svg>