<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">독점의 역설에서 벗어나는 세 갈래 탈출구</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">카메라 모듈 OPM 3%는 구조적 천장. 전사 OPM 5%로 가려면 카메라 밖이 답이다</text>

  <!-- Current state -->
  <rect x="60" y="100" width="340" height="160" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="230" y="128" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">현재: 독점의 역설</text>
  <text x="80" y="158" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">애플 의존도</text>
  <text x="300" y="158" text-anchor="end" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">80.4%</text>
  <text x="80" y="182" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">카메라 모듈 OPM</text>
  <text x="300" y="182" text-anchor="end" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">3.0%</text>
  <text x="80" y="206" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">비모바일 비중</text>
  <text x="300" y="206" text-anchor="end" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">21.4%</text>
  <text x="80" y="230" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">PBR</text>
  <text x="300" y="230" text-anchor="end" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="15">1.1x</text>
  <text x="230" y="252" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">독점할수록 의존도↑ → 교섭력↓ → 마진↓</text>

  <!-- Arrow -->
  <line x1="410" y1="180" x2="460" y2="180" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="460,175 475,180 460,185" fill="#fbbf24"/>

  <!-- Escape route 1: FC-BGA -->
  <rect x="490" y="100" width="330" height="120" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="655" y="125" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">탈출구 1 — FC-BGA (AI 반도체 기판)</text>
  <text x="510" y="150" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현재 매출</text>
  <text x="720" y="150" text-anchor="end" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="13">4,000억 (매출 1.8%)</text>
  <text x="510" y="172" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2030 목표</text>
  <text x="720" y="172" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">1조원 (OPM 10~15%)</text>
  <text x="510" y="194" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">핵심</text>
  <text x="720" y="194" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">설계 IP 직접 보유 → 가격 결정권 확보</text>

  <!-- Escape route 2: Automotive -->
  <rect x="490" y="235" width="330" height="120" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="655" y="260" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">탈출구 2 — 차량용 카메라</text>
  <text x="510" y="285" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현재 비중</text>
  <text x="720" y="285" text-anchor="end" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="13">~9% (매출 약 2조)</text>
  <text x="510" y="307" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">차량당 카메라</text>
  <text x="720" y="307" text-anchor="end" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">L2: 6~8개 → L4: 14개+</text>
  <text x="510" y="329" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">핵심</text>
  <text x="720" y="329" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">단가 2~3× · 모델 수명 5~7년 · 마진↑</text>

  <!-- Escape route 3: Non-Mobile -->
  <rect x="490" y="370" width="330" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="655" y="395" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">탈출구 3 — 비모바일 비중 확대</text>
  <text x="510" y="420" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현재</text>
  <text x="720" y="420" text-anchor="end" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="13">21.4% (정체)</text>
  <text x="510" y="442" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">목표</text>
  <text x="720" y="442" text-anchor="end" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">25% → 30% (구조 전환 신호)</text>
  <text x="510" y="462" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">역설</text>
  <text x="720" y="462" text-anchor="end" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">아이폰이 잘 팔릴수록 비중↓</text>

  <!-- Target state -->
  <rect x="850" y="100" width="290" height="160" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="995" y="128" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">목표: 구조 전환 신호</text>
  <text x="870" y="155" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">전사 OPM</text>
  <text x="1050" y="155" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">5.0%</text>
  <text x="870" y="180" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">비모바일</text>
  <text x="1050" y="180" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">30%</text>
  <text x="870" y="205" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">EV/EBITDA</text>
  <text x="1050" y="205" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="700">7x</text>
  <text x="995" y="235" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">세 숫자 동시 달성 = 시장 재평가 시작</text>

  <!-- Bottom -->
  <text x="600" y="500" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">카메라 모듈 OPM 3%는 천장 · FC-BGA OPM 15%가 전사 마진을 끌어올리는 유일한 경로</text>
</svg>