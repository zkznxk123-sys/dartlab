<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">100원 팔면 3원 남는 구조</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">LG이노텍 매출 100원의 행선지</text>
  <!-- 매출원가 92% -->
  <rect x="100" y="90" width="644" height="60" rx="6" fill="#ef4444" opacity="0.7"/>
  <text x="422" y="126" font-size="16" font-weight="700" fill="#f1f5f9" text-anchor="middle">매출원가 92% (소니 센서 + 렌즈 + 조립)</text>
  <!-- 판관비 5% -->
  <rect x="744" y="90" width="35" height="60" rx="6" fill="#f59e0b" opacity="0.7"/>
  <text x="762" y="126" font-size="11" font-weight="600" fill="#f1f5f9" text-anchor="middle" transform="rotate(-90, 762, 126)">판관비 5%</text>
  <!-- 영업이익 3% -->
  <rect x="779" y="90" width="21" height="60" rx="6" fill="#22c55e" opacity="0.9"/>
  <text x="830" y="126" font-size="14" font-weight="800" fill="#22c55e">3%</text>
  <text x="540" y="190" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">핵심 부품(이미지센서)은 소니 것. LG이노텍은 "조립 마진"만 받는다.</text>
  <!-- 비교 -->
  <text x="300" y="240" font-size="13" fill="#94a3b8" text-anchor="middle">삼성전기(갤럭시 카메라): OPM 4%</text>
  <text x="700" y="240" font-size="13" fill="#94a3b8" text-anchor="middle">소니(이미지센서): OPM 10%+</text>
  <text x="540" y="275" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">가치사슬에서 센서가 40%+를 가져간다. 조립은 3%.</text>
</svg>
