<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">애플 카메라 70% 독점 — 그런데 OPM 3%</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">독점이면 마진이 높아야 하는 거 아닌가?</text>
  <rect x="140" y="90" width="350" height="80" rx="12" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="2"/>
  <text x="315" y="125" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">아이폰 카메라 모듈</text>
  <text x="315" y="150" font-size="28" font-weight="800" fill="#22c55e" text-anchor="middle">70%+ 독점</text>
  <text x="540" y="135" font-size="24" fill="#64748b" text-anchor="middle">→</text>
  <rect x="590" y="90" width="350" height="80" rx="12" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2"/>
  <text x="765" y="125" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle">영업이익률</text>
  <text x="765" y="150" font-size="28" font-weight="800" fill="#ef4444" text-anchor="middle">OPM 3%</text>
  <rect x="340" y="200" width="400" height="40" rx="8" fill="#1e293b"/>
  <text x="540" y="226" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">독점인데 을. 애플이 가격을 결정한다.</text>
  <text x="540" y="275" font-size="12" fill="#475569" text-anchor="middle">비교: 삼성전기 OPM 4% | 소니(CMOS) OPM 10%+</text>
</svg>
