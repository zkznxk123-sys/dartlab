<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">2024 화학 빅4 영업이익 — 유일한 흑자</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">같은 불황, 같은 중국 공급과잉. 하나만 흑자.</text>
  <!-- Zero line at y=200 -->
  <line x1="100" y1="200" x2="1000" y2="200" stroke="#334155" stroke-width="1"/>
  <!-- LG화학 -2200억 (석유화학) -->
  <rect x="140" y="200" width="140" height="60" rx="6" fill="#ef4444" opacity="0.7"/>
  <text x="210" y="160" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">LG화학(석화)</text>
  <text x="210" y="278" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">-2,200억</text>
  <!-- 롯데케미칼 -9000억 -->
  <rect x="320" y="200" width="140" height="120" rx="6" fill="#ef4444" opacity="0.85"/>
  <text x="390" y="160" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">롯데케미칼</text>
  <text x="390" y="338" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">-9,000억</text>
  <!-- 한화솔루션 -3000억 -->
  <rect x="500" y="200" width="140" height="70" rx="6" fill="#ef4444" opacity="0.7"/>
  <text x="570" y="160" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">한화솔루션</text>
  <text x="570" y="288" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">-3,000억</text>
  <!-- 금호석유화학 +2717억 -->
  <rect x="680" y="128" width="180" height="72" rx="6" fill="#22c55e" opacity="0.9"/>
  <text x="770" y="118" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">금호석유화학</text>
  <text x="770" y="170" font-size="22" font-weight="800" fill="#f1f5f9" text-anchor="middle">+2,717억</text>
  <rect x="700" y="90" width="140" height="22" rx="11" fill="#22c55e" opacity="0.2"/>
  <text x="770" y="105" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">유일한 흑자</text>
</svg>
