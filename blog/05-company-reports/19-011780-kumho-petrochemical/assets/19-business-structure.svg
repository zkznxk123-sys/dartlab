<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">NCC 없는 구조 — 불황의 방패</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">빅4는 NCC로 사이클을 타고, 금호석화는 다운스트림만 한다</text>
  <!-- 빅4 (NCC 보유) -->
  <rect x="100" y="100" width="400" height="200" rx="12" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2"/>
  <text x="300" y="130" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">LG/롯데/한화 (NCC 보유)</text>
  <rect x="140" y="155" width="320" height="30" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="300" y="176" font-size="12" fill="#f1f5f9" text-anchor="middle">NCC (나프타 → 에틸렌/프로필렌)</text>
  <rect x="140" y="195" width="320" height="30" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="300" y="216" font-size="12" fill="#f1f5f9" text-anchor="middle">↓ 다운스트림 (폴리에틸렌 등)</text>
  <text x="300" y="260" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">에틸렌 가격 폭락 = 직격</text>
  <text x="300" y="278" font-size="11" fill="#64748b" text-anchor="middle">상승기 마진 크지만, 불황기 손실 크다</text>
  <!-- 금호석화 (다운스트림만) -->
  <rect x="580" y="100" width="400" height="200" rx="12" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="130" font-size="15" font-weight="700" fill="#22c55e" text-anchor="middle">금호석화 (NCC 없음)</text>
  <rect x="620" y="155" width="320" height="30" rx="4" fill="#334155"/>
  <text x="780" y="176" font-size="11" fill="#94a3b8" text-anchor="middle">원료를 외부에서 산다</text>
  <rect x="620" y="195" width="320" height="30" rx="4" fill="#22c55e" opacity="0.5"/>
  <text x="780" y="216" font-size="12" fill="#f1f5f9" text-anchor="middle">합성고무/수지/페놀/정밀화학</text>
  <text x="780" y="260" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">원가 오르면 판가 전가</text>
  <text x="780" y="278" font-size="11" fill="#64748b" text-anchor="middle">상승기 마진 작지만, 불황기 방어적</text>
</svg>
