<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="320" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">형이 그룹을 무너뜨리는 동안, 쫓겨난 동생만 살아남았다</text>
  <!-- 형 박삼구 (실패) -->
  <rect x="60" y="80" width="460" height="200" rx="12" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="2"/>
  <text x="290" y="110" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">박삼구 (형) — 금호아시아나</text>
  <line x1="100" y1="145" x2="480" y2="145" stroke="#334155" stroke-dasharray="4,2"/>
  <text x="100" y="170" font-size="12" fill="#ef4444">2006  대우건설 6.4조 인수</text>
  <text x="100" y="190" font-size="12" fill="#ef4444">2008  대한통운 4.2조 인수 (총 10.6조)</text>
  <text x="100" y="210" font-size="12" fill="#ef4444">2009  풋옵션 발동 → 유동성 위기</text>
  <text x="100" y="230" font-size="12" fill="#ef4444">2010  워크아웃 / 계열 해체</text>
  <text x="100" y="250" font-size="12" font-weight="700" fill="#ef4444">2020  그룹 해체, 아시아나 매각</text>
  <!-- 동생 박찬구 (성공) -->
  <rect x="560" y="80" width="460" height="200" rx="12" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="2"/>
  <text x="790" y="110" font-size="15" font-weight="700" fill="#22c55e" text-anchor="middle">박찬구 (동생) — 금호석유화학</text>
  <line x1="600" y1="145" x2="980" y2="145" stroke="#334155" stroke-dasharray="4,2"/>
  <text x="600" y="170" font-size="12" fill="#22c55e">2006~08  대우건설 인수 반대</text>
  <text x="600" y="190" font-size="12" fill="#22c55e">2009.7  박삼구가 해임 (형제의 난)</text>
  <text x="600" y="210" font-size="12" fill="#22c55e">2011  계열분리 독립 (박찬구 복귀)</text>
  <text x="600" y="230" font-size="12" fill="#22c55e">2021  NB라텍스 특수 영업이익 2.4조</text>
  <text x="600" y="250" font-size="12" font-weight="700" fill="#22c55e">2024  빅4 중 유일 흑자 2,717억</text>
</svg>
