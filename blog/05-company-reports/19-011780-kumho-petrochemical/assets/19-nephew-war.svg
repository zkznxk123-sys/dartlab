<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">조카의 난 — 졌지만 이겼다</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">박철완이 4년간 싸우고 기권. 그런데 주주환원 40%가 남았다.</text>
  <!-- 박찬구 연합 승리 -->
  <rect x="120" y="100" width="380" height="90" rx="10" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="130" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">박찬구+박준경 연합 (16.6%)</text>
  <text x="310" y="158" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">승</text>
  <text x="310" y="180" font-size="11" fill="#94a3b8" text-anchor="middle">2021 주총 완패 → 2025 기권 종결</text>
  <!-- 박철완 패배 -->
  <rect x="580" y="100" width="380" height="90" rx="10" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2"/>
  <text x="770" y="130" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">박철완 (최대주주 9.51%)</text>
  <text x="770" y="158" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">패</text>
  <text x="770" y="180" font-size="11" fill="#94a3b8" text-anchor="middle">4년 소송·차파트너스 연합 → 실패</text>
  <!-- 부산물 -->
  <rect x="220" y="220" width="640" height="60" rx="10" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="2"/>
  <text x="540" y="245" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">그런데 주주환원 40% 정착 + 자사주 13% 소각 + 이사회 평가 1위</text>
  <text x="540" y="267" font-size="12" fill="#fbbf24" text-anchor="middle">조카의 싸움이 재무제표를 바꿨다</text>
</svg>
