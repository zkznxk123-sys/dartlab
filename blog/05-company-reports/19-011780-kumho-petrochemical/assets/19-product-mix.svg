<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="320" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">금호석유화학 사업부별 매출 구성</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">합성고무가 절반 — NB라텍스로 세계 1위</text>
  <!-- 합성고무 50% -->
  <rect x="100" y="100" width="450" height="50" rx="6" fill="#22c55e" opacity="0.7"/>
  <text x="325" y="131" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">합성고무 50% (NB라텍스·BR·SBR)</text>
  <!-- 합성수지 30% -->
  <rect x="100" y="160" width="270" height="40" rx="6" fill="#3b82f6" opacity="0.7"/>
  <text x="235" y="186" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">합성수지 30% (ABS)</text>
  <!-- 페놀/정밀/EPDM 20% -->
  <rect x="100" y="210" width="180" height="40" rx="6" fill="#94a3b8" opacity="0.7"/>
  <text x="190" y="236" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">페놀·정밀·EPDM 20%</text>
  <!-- 핵심 한 줄 -->
  <rect x="260" y="270" width="560" height="36" rx="8" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="293" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">NB라텍스 세계 1위 25~30% · 생산능력 94.6만톤</text>
</svg>
