<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">2,500억이 증발한 5년</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">2019 인수 선언 → 2025 대법원 패소 확정</text>
  <rect x="80" y="100" width="200" height="100" rx="10" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="130" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">2019.12</text>
  <text x="180" y="155" font-size="13" fill="#f1f5f9" text-anchor="middle">아시아나 2.5조</text>
  <text x="180" y="175" font-size="13" fill="#f1f5f9" text-anchor="middle">인수 합의</text>
  <rect x="310" y="100" width="200" height="100" rx="10" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="2"/>
  <text x="410" y="130" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">2020.4</text>
  <text x="410" y="155" font-size="13" fill="#f1f5f9" text-anchor="middle">코로나 직격</text>
  <text x="410" y="175" font-size="13" fill="#f1f5f9" text-anchor="middle">재실사 요구</text>
  <rect x="540" y="100" width="200" height="100" rx="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <text x="640" y="130" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">2020.9</text>
  <text x="640" y="155" font-size="13" fill="#f1f5f9" text-anchor="middle">협상 결렬</text>
  <text x="640" y="175" font-size="13" fill="#f1f5f9" text-anchor="middle">계약금 맞소송</text>
  <rect x="770" y="100" width="230" height="100" rx="10" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="2.5"/>
  <text x="885" y="130" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">2025.3 대법원</text>
  <text x="885" y="158" font-size="18" font-weight="800" fill="#ef4444" text-anchor="middle">HDC 패소</text>
  <text x="885" y="180" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">2,500억 증발</text>
  <text x="540" y="250" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">"건설사가 항공사를 왜 사는가?" 질문에 대한 가장 비싼 답</text>
</svg>
