<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">브랜드 평판 꼴찌인데 수주 4.8조 — 두 개의 시장</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">소비자 인식 ≠ 조합원의 합리적 계산. 안전보다 자금력이 먼저인 현실</text>

  <!-- Left: Brand Reputation -->
  <rect x="60" y="100" width="480" height="180" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="300" y="128" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">브랜드 평판지수 (일반 소비자)</text>

  <!-- Brand bars (low to high) -->
  <text x="80" y="162" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">래미안 (삼성)</text>
  <rect x="220" y="150" width="280" height="16" rx="3" fill="#22c55e" fill-opacity="0.5"/>
  <text x="508" y="163" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="10">1위</text>

  <text x="80" y="184" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">자이 (GS)</text>
  <rect x="220" y="172" width="240" height="16" rx="3" fill="#22c55e" fill-opacity="0.4"/>
  <text x="468" y="185" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="10">2위</text>

  <text x="80" y="206" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">힐스테이트 (현대)</text>
  <rect x="220" y="194" width="200" height="16" rx="3" fill="#f59e0b" fill-opacity="0.4"/>
  <text x="428" y="207" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="10">3위</text>

  <text x="80" y="228" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">푸르지오 (대우)</text>
  <rect x="220" y="216" width="160" height="16" rx="3" fill="#f59e0b" fill-opacity="0.3"/>
  <text x="388" y="229" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="10">4위</text>

  <text x="80" y="252" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">아이파크 (HDC)</text>
  <rect x="220" y="240" width="60" height="16" rx="3" fill="#ef4444" fill-opacity="0.7"/>
  <text x="288" y="253" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700">최하위</text>
  <text x="300" y="273" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">"사고 낸 회사 = 위험한 회사" 일반 인식</text>

  <!-- Right: Order -->
  <rect x="580" y="100" width="560" height="180" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="860" y="128" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">도시정비 수주 (조합원 판단)</text>

  <text x="600" y="162" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2022~2023</text>
  <rect x="750" y="150" width="40" height="18" rx="3" fill="#ef4444" fill-opacity="0.5"/>
  <text x="800" y="165" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="12">10위권 밖</text>
  <text x="950" y="165" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">사고 직후 · 수주 공백</text>

  <text x="600" y="200" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2024</text>
  <rect x="750" y="185" width="300" height="22" rx="3" fill="#22c55e" fill-opacity="0.6"/>
  <text x="758" y="202" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">4.8조 (+260%)</text>
  <text x="1070" y="202" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">5위 복귀</text>

  <text x="600" y="235" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">구성</text>
  <text x="750" y="235" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">서울·수도권 70% · 컨소시엄 다수</text>

  <text x="860" y="268" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">조합원: "안전보다 자금력 · 공사 지연 안 되는 회사"</text>

  <!-- Bottom: Explanation -->
  <rect x="60" y="300" width="1080" height="90" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="325" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">두 개의 시장이 따로 움직인다</text>
  <text x="300" y="352" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">일반 소비자 = 감정 (사고 = 위험)</text>
  <text x="300" y="372" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">브랜드 평판 최하위</text>
  <text x="600" y="358" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16">vs</text>
  <text x="900" y="352" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">조합원 = 계산 (PF 사태 → 자금력 우선)</text>
  <text x="900" y="372" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">수주 5위 복귀</text>

  <text x="600" y="412" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">PF 사태로 경쟁사 자금 경색 → 현금 탄탄한 HDC에 수주 집중. 위기가 전략을 검증한 것이다</text>
</svg>