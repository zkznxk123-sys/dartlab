<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">2024 건설 빅4 — 붕괴 낸 두 회사만 흑자</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">사고 후 구조조정한 곳이 정작 살았다</text>
  <line x1="100" y1="230" x2="1000" y2="230" stroke="#334155" stroke-width="1"/>
  <!-- 현대건설 -1.22조 -->
  <rect x="140" y="230" width="150" height="80" rx="6" fill="#ef4444" opacity="0.85"/>
  <text x="215" y="190" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">현대건설</text>
  <text x="215" y="330" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">-1.22조</text>
  <!-- 대우건설 4,031억 (-39%) -->
  <rect x="320" y="180" width="150" height="50" rx="6" fill="#f59e0b" opacity="0.6"/>
  <text x="395" y="168" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">대우건설</text>
  <text x="395" y="208" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">4,031억</text>
  <text x="395" y="245" font-size="11" fill="#ef4444" text-anchor="middle">-39% YoY</text>
  <!-- GS건설 2,862억 (검단 후 흑전) -->
  <rect x="500" y="194" width="150" height="36" rx="6" fill="#22c55e" opacity="0.7"/>
  <text x="575" y="182" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">GS건설</text>
  <text x="575" y="218" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">2,862억</text>
  <text x="575" y="245" font-size="10" fill="#fbbf24" text-anchor="middle">검단 붕괴→흑전</text>
  <!-- HDC현산 2,486억 (+34.7%) -->
  <rect x="680" y="200" width="180" height="30" rx="6" fill="#22c55e" opacity="0.9"/>
  <text x="770" y="188" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">HDC현산</text>
  <text x="770" y="220" font-size="14" font-weight="800" fill="#f1f5f9" text-anchor="middle">2,486억</text>
  <text x="770" y="245" font-size="10" fill="#fbbf24" text-anchor="middle">+34.7% YoY</text>
  <rect x="670" y="150" width="200" height="26" rx="13" fill="#fbbf24" opacity="0.2"/>
  <text x="770" y="168" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">화정 붕괴→흑자 유지</text>
</svg>
