<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 250" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="250" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">두 번의 재난, 그리고 2,486억 흑자</text>
  <line x1="100" y1="130" x2="980" y2="130" stroke="#334155" stroke-width="2"/>
  <circle cx="180" cy="130" r="10" fill="#ef4444"/>
  <text x="180" y="100" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">2019.12</text>
  <text x="180" y="165" font-size="11" fill="#f1f5f9" text-anchor="middle">아시아나</text>
  <text x="180" y="180" font-size="11" fill="#f1f5f9" text-anchor="middle">2.5조 인수</text>
  <circle cx="360" cy="130" r="10" fill="#ef4444"/>
  <text x="360" y="100" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">2020.9</text>
  <text x="360" y="165" font-size="11" fill="#ef4444" text-anchor="middle">계약 파기</text>
  <text x="360" y="180" font-size="11" fill="#ef4444" text-anchor="middle">2,500억 증발</text>
  <circle cx="540" cy="130" r="12" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <circle cx="540" cy="130" r="6" fill="#ef4444"/>
  <text x="540" y="100" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">2022.1.11</text>
  <text x="540" y="165" font-size="11" fill="#ef4444" text-anchor="middle">화정 붕괴</text>
  <text x="540" y="180" font-size="11" fill="#ef4444" text-anchor="middle">6명 사망</text>
  <circle cx="720" cy="130" r="10" fill="#f59e0b"/>
  <text x="720" y="100" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">2022~24</text>
  <text x="720" y="165" font-size="11" fill="#f59e0b" text-anchor="middle">구조조정</text>
  <text x="720" y="180" font-size="11" fill="#f59e0b" text-anchor="middle">선별수주</text>
  <circle cx="900" cy="130" r="10" fill="#22c55e"/>
  <text x="900" y="100" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">2025</text>
  <text x="900" y="165" font-size="11" fill="#22c55e" text-anchor="middle">OI 2,486억</text>
  <text x="900" y="180" font-size="11" fill="#22c55e" text-anchor="middle">+34.7%</text>
  <text x="540" y="225" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">5년 만에 흑자 복귀 — 어떻게 살아남았는가?</text>
</svg>
