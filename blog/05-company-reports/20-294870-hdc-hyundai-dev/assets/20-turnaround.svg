<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">OPM 5년 — 두 번 꺾이고 반등</text>
  <line x1="100" y1="280" x2="960" y2="280" stroke="#334155" stroke-width="1"/>
  <!-- scale: 0%=280, 17%=70. range 17% / 210px. 1%=12.35 -->
  <!-- 13.5: y=280-13.5*12.35=113.3 -->
  <polyline points="180,113 340,76 500,175 660,232 820,202 900,203" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="180" cy="113" r="6" fill="#22c55e"/>
  <text x="180" y="100" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">13.5%</text>
  <text x="180" y="300" font-size="11" fill="#94a3b8" text-anchor="middle">2019</text>
  <circle cx="340" cy="76" r="10" fill="#22c55e" stroke="#22c55e"/>
  <text x="340" y="60" font-size="13" font-weight="800" fill="#22c55e" text-anchor="middle">16.5% (피크)</text>
  <text x="340" y="300" font-size="11" fill="#94a3b8" text-anchor="middle">2020</text>
  <text x="340" y="315" font-size="10" fill="#ef4444" text-anchor="middle">아시아나 충격↓</text>
  <circle cx="500" cy="175" r="6" fill="#f59e0b"/>
  <text x="500" y="162" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">8.5%</text>
  <text x="500" y="300" font-size="11" fill="#94a3b8" text-anchor="middle">2021</text>
  <circle cx="660" cy="232" r="12" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <circle cx="660" cy="232" r="6" fill="#ef4444"/>
  <text x="660" y="220" font-size="13" font-weight="800" fill="#ef4444" text-anchor="middle">3.9% (최저)</text>
  <text x="660" y="300" font-size="11" fill="#94a3b8" text-anchor="middle">2022</text>
  <text x="660" y="315" font-size="10" fill="#ef4444" text-anchor="middle">화정 붕괴</text>
  <circle cx="820" cy="202" r="6" fill="#f59e0b"/>
  <text x="820" y="189" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">6.3%</text>
  <text x="820" y="300" font-size="11" fill="#94a3b8" text-anchor="middle">2024</text>
  <circle cx="900" cy="203" r="8" fill="#fbbf24"/>
  <text x="900" y="190" font-size="14" font-weight="800" fill="#fbbf24" text-anchor="middle">6.3%</text>
  <text x="900" y="300" font-size="11" fill="#fbbf24" text-anchor="middle">2025</text>
  <text x="900" y="315" font-size="10" fill="#22c55e" text-anchor="middle">OI +34.7%</text>
