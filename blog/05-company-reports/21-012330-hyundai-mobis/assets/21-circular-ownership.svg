<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="400" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">현대차그룹 순환출자 — 모비스가 정점</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">정의선 모비스 지분 0.3%. 그런데 모비스를 장악해야 그룹을 장악한다</text>
  <!-- 모비스 (top) -->
  <rect x="440" y="100" width="200" height="70" rx="10" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="540" y="128" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">현대모비스</text>
  <text x="540" y="150" font-size="11" fill="#fbbf24" text-anchor="middle">순환출자 정점</text>
  <!-- 현대차 (bottom left) -->
  <rect x="200" y="280" width="200" height="70" rx="10" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
  <text x="300" y="308" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">현대자동차</text>
  <text x="300" y="330" font-size="11" fill="#3b82f6" text-anchor="middle">(정의선 2.6%)</text>
  <!-- 기아 (bottom right) -->
  <rect x="680" y="280" width="200" height="70" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="308" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">기아</text>
  <text x="780" y="330" font-size="11" fill="#22c55e" text-anchor="middle">(정의선 1.7%)</text>
  <!-- Arrows -->
  <line x1="490" y1="175" x2="340" y2="275" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="380" y="225" font-size="13" font-weight="700" fill="#3b82f6">21%</text>
  <line x1="340" y1="280" x2="720" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="530" y="272" font-size="13" font-weight="700" fill="#22c55e">34%</text>
  <line x1="740" y1="275" x2="590" y2="175" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="690" y="225" font-size="13" font-weight="700" fill="#fbbf24">17%</text>
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
  </defs>
  <text x="540" y="380" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">정의선은 모비스 지분이 없다 → 승계의 가장 큰 퍼즐</text>
</svg>
