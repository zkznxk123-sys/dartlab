<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">같은 회사의 두 숫자 — OPM 15%p 갭</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">연결 vs 별도, 어느 쪽이 진짜인가?</text>
  <rect x="150" y="100" width="320" height="100" rx="10" fill="#94a3b8" opacity="0.12" stroke="#94a3b8" stroke-width="2"/>
  <text x="310" y="128" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">연결 (CFS)</text>
  <text x="310" y="158" font-size="26" font-weight="800" fill="#94a3b8" text-anchor="middle">OPM 5.5%</text>
  <text x="310" y="183" font-size="11" fill="#94a3b8" text-anchor="middle">매출 61조 | 평범한 부품회사</text>
  <rect x="610" y="100" width="320" height="100" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2.5"/>
  <text x="770" y="128" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">별도 (OFS)</text>
  <text x="770" y="158" font-size="26" font-weight="800" fill="#22c55e" text-anchor="middle">OPM 21%</text>
  <text x="770" y="183" font-size="11" fill="#22c55e" text-anchor="middle">매출 16조 | AS 부품 독점</text>
  <text x="540" y="155" font-size="36" font-weight="800" fill="#fbbf24" text-anchor="middle">↔</text>
  <rect x="360" y="225" width="360" height="40" rx="8" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="250" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">15%p 갭 = 해외 자회사 마진 희석</text>
</svg>
