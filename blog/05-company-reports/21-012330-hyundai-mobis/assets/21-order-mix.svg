<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="320" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">해외 성장의 역설 — 성장할수록 마진이 떨어진다</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">별도(국내 AS): 고마진 / 해외 자회사(신차 OEM): 저마진</text>
  <!-- 국내 AS -->
  <rect x="140" y="110" width="380" height="110" rx="10" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="2"/>
  <text x="330" y="140" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">국내 AS 부품 (독점)</text>
  <text x="330" y="170" font-size="22" font-weight="800" fill="#22c55e" text-anchor="middle">OPM 20%+</text>
  <text x="330" y="195" font-size="11" fill="#22c55e" text-anchor="middle">차 1대 팔면 10년 복리 마진</text>
  <text x="330" y="212" font-size="11" fill="#22c55e" text-anchor="middle">현대/기아 차량 1억+ 대 운행</text>
  <!-- 해외 신차용 -->
  <rect x="560" y="110" width="380" height="110" rx="10" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2"/>
  <text x="750" y="140" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">해외 신차용 모듈 (경쟁)</text>
  <text x="750" y="170" font-size="22" font-weight="800" fill="#ef4444" text-anchor="middle">OPM 3~5%</text>
  <text x="750" y="195" font-size="11" fill="#ef4444" text-anchor="middle">GM, VW, 스텔란티스 수주</text>
  <text x="750" y="212" font-size="11" fill="#ef4444" text-anchor="middle">덴소·보쉬와 경쟁</text>
  <rect x="280" y="245" width="520" height="44" rx="8" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="265" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">2024 전동화 수주 88.3억 달러 (대부분 해외 신차용)</text>
  <text x="540" y="283" font-size="11" fill="#fbbf24" text-anchor="middle">해외 비중 ↑ → 연결 OPM 희석 → 5.5% 정체</text>
</svg>
