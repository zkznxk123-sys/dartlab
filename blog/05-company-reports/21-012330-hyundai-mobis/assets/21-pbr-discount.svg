<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">글로벌 부품사 PBR 비교 — 모비스만 0.6배</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">2018 엘리엇 사태 이후 8년째 지배구조 디스카운트</text>
  <!-- 보쉬 2.0 -->
  <rect x="140" y="120" width="160" height="40" rx="6" fill="#94a3b8" opacity="0.6"/>
  <text x="220" y="108" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">보쉬(독)</text>
  <text x="220" y="145" font-size="15" font-weight="700" fill="#f1f5f9" text-anchor="middle">PBR 2.0</text>
  <!-- 덴소 1.5 -->
  <rect x="320" y="130" width="120" height="30" rx="6" fill="#94a3b8" opacity="0.6"/>
  <text x="380" y="118" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">덴소(일)</text>
  <text x="380" y="150" font-size="15" font-weight="700" fill="#f1f5f9" text-anchor="middle">1.5</text>
  <!-- ZF 1.2 -->
  <rect x="460" y="136" width="96" height="24" rx="6" fill="#94a3b8" opacity="0.6"/>
  <text x="508" y="124" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">ZF(독)</text>
  <text x="508" y="153" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">1.2</text>
  <!-- 마그나 0.9 -->
  <rect x="580" y="142" width="72" height="18" rx="6" fill="#94a3b8" opacity="0.5"/>
  <text x="616" y="130" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">마그나</text>
  <text x="616" y="156" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">0.9</text>
  <!-- 모비스 0.6 -->
  <rect x="680" y="148" width="48" height="12" rx="4" fill="#ef4444" opacity="0.9"/>
  <text x="704" y="136" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">현대모비스</text>
  <text x="704" y="175" font-size="14" font-weight="800" fill="#ef4444" text-anchor="middle">0.6</text>
  <line x1="100" y1="165" x2="960" y2="165" stroke="#334155" stroke-width="1"/>
  <rect x="350" y="210" width="380" height="44" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="230" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">덴소의 1/3, 보쉬의 1/3 — 지배구조 리스크 반영</text>
  <text x="540" y="248" font-size="11" fill="#fbbf24" text-anchor="middle">디스카운트 해소 시 시총 2~3배 잠재력</text>
</svg>
