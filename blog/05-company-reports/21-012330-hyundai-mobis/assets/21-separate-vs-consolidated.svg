<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <rect width="1200" height="480" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">같은 회사의 두 얼굴 — 별도 21% vs 연결 5.5%</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">한국 본사는 독점 현금기계. 해외 자회사가 마진을 희석한다</text>

  <!-- Separate (Korean HQ) -->
  <rect x="60" y="100" width="500" height="220" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="128" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">별도 (한국 본사)</text>
  <text x="310" y="150" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="14">매출 16조 · OPM 21%</text>

  <!-- Module segment -->
  <rect x="80" y="170" width="220" height="130" rx="8" fill="#0a0e1a" stroke="#3b82f6" stroke-width="1"/>
  <text x="190" y="195" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">모듈 사업부</text>
  <text x="100" y="218" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 비중</text>
  <text x="240" y="218" text-anchor="end" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12">~70%</text>
  <text x="100" y="240" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OPM</text>
  <text x="240" y="240" text-anchor="end" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="12">3~5%</text>
  <text x="100" y="262" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OI 기여</text>
  <text x="240" y="262" text-anchor="end" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="12">~30%</text>
  <text x="100" y="284" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">현대차가 원가 압박 (캡티브)</text>

  <!-- AS segment -->
  <rect x="320" y="170" width="220" height="130" rx="8" fill="#0a0e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="195" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">AS 부품 사업부</text>
  <text x="340" y="218" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 비중</text>
  <text x="480" y="218" text-anchor="end" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12">~30%</text>
  <text x="340" y="240" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OPM</text>
  <text x="480" y="240" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">20~25%</text>
  <text x="340" y="262" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OI 기여</text>
  <text x="480" y="262" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">60~70%</text>
  <text x="340" y="284" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">순정 독점 · 가격 통제력</text>

  <!-- Arrow: dilution -->
  <text x="590" y="210" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">+</text>

  <!-- Overseas subsidiaries -->
  <rect x="620" y="100" width="280" height="220" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="760" y="128" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">해외 종속회사 (수십 개)</text>
  <text x="640" y="158" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출</text>
  <text x="840" y="158" text-anchor="end" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12">~45조 (연결 추가분)</text>
  <text x="640" y="182" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OPM</text>
  <text x="840" y="182" text-anchor="end" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">1~3%</text>
  <text x="640" y="208" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">역할</text>
  <text x="840" y="208" text-anchor="end" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">신차 모듈 현지 공급</text>
  <text x="640" y="232" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">지역</text>
  <text x="840" y="232" text-anchor="end" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">중국·북미·유럽·인도</text>
  <text x="640" y="258" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">문제</text>
  <text x="840" y="258" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">마진 얇음 · 본사 마진 희석</text>
  <text x="760" y="305" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">해외 AS 마진도 한국 수준 미달</text>

  <!-- Arrow to result -->
  <text x="930" y="210" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">=</text>

  <!-- Consolidated result -->
  <rect x="960" y="130" width="190" height="160" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="1055" y="160" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">연결</text>
  <text x="1055" y="190" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14">매출 61조</text>
  <text x="1055" y="220" text-anchor="middle" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700">OPM 5.5%</text>
  <text x="1055" y="248" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">덴소 5.7% · 마그나 4.1%</text>
  <text x="1055" y="268" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">"평범한 부품사" 취급</text>
  <text x="1055" y="285" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">PBR 0.6x</text>

  <!-- Bottom insight -->
  <rect x="60" y="340" width="1080" height="110" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="368" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">15%p 갭의 정체</text>
  <text x="300" y="398" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">별도 21% = AS 독점 현금기계</text>
  <text x="300" y="420" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">순정 부품 70~80% 장악 · 가격 통제 · 10년 복리 수요</text>
  <text x="900" y="398" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">연결 5.5% = 해외가 희석</text>
  <text x="900" y="420" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">수십 개 현지법인 OPM 1~3% · 순환출자 디스카운트</text>
  <text x="600" y="440" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">���장은 연결만 보고 PBR 0.6x를 매긴다 — 별도 21%의 가치가 묻혀 있다</text>
</svg>