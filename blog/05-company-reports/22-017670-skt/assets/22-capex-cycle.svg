<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440">
  <rect width="1200" height="440" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">설비투자 사이클의 함정 — 5G 끝나자 AI가 왔다</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">고배당의 비밀은 CAPEX 감소였다. AI 전환 = CAPEX 재증가 = 배당 위기</text>

  <!-- Timeline axis -->
  <line x1="100" y1="300" x2="1100" y2="300" stroke="#334155" stroke-width="1"/>

  <!-- Phase 1: 5G 투자기 (2018-2021) -->
  <rect x="120" y="140" width="220" height="160" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="230" y="168" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">5G 투자기</text>
  <text x="230" y="188" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2018~2021</text>
  <text x="140" y="215" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">CAPEX</text>
  <text x="280" y="215" text-anchor="end" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">3조+/년</text>
  <text x="140" y="237" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">FCF</text>
  <text x="280" y="237" text-anchor="end" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="12">제한적</text>
  <text x="140" y="259" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">배당</text>
  <text x="280" y="259" text-anchor="end" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="12">보통</text>
  <text x="140" y="281" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">기지국 건설 비용 집중</text>

  <!-- Arrow 1 -->
  <line x1="350" y1="220" x2="380" y2="220" stroke="#fbbf24" stroke-width="1.5"/>
  <polygon points="380,215 395,220 380,225" fill="#fbbf24"/>

  <!-- Phase 2: 황금기 (2021-2024) -->
  <rect x="400" y="140" width="220" height="160" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="510" y="168" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">고배당 황금기</text>
  <text x="510" y="188" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2021~2024</text>
  <text x="420" y="215" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">CAPEX</text>
  <text x="560" y="215" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">2.5조 (감소)</text>
  <text x="420" y="237" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">FCF</text>
  <text x="560" y="237" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">3.4조</text>
  <text x="420" y="259" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">배당</text>
  <text x="560" y="259" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="12">배당률 6~7%</text>
  <text x="420" y="281" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">5G 투자 끝 → FCF 폭발</text>

  <!-- Arrow 2 -->
  <line x1="630" y1="220" x2="660" y2="220" stroke="#fbbf24" stroke-width="1.5"/>
  <polygon points="660,215 675,220 660,225" fill="#fbbf24"/>

  <!-- Phase 3: 해킹 + AI 전환 (2025~) -->
  <rect x="680" y="140" width="220" height="160" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="790" y="168" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">해킹 + AI 전환기</text>
  <text x="790" y="188" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025~</text>
  <text x="700" y="215" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">CAPEX</text>
  <text x="840" y="215" text-anchor="end" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">3~4조 (재증가)</text>
  <text x="700" y="237" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">FCF</text>
  <text x="840" y="237" text-anchor="end" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="12">급감</text>
  <text x="700" y="259" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">배당</text>
  <text x="840" y="259" text-anchor="end" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">사실상 0%</text>
  <text x="700" y="281" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">해킹 1.1조 + DC 투자 수조</text>

  <!-- Phase 4: 미래? -->
  <rect x="930" y="140" width="160" height="160" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6"/>
  <text x="1010" y="168" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">AI 수익화?</text>
  <text x="1010" y="188" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2030~</text>
  <text x="950" y="218" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">에이닷</text>
  <text x="1040" y="218" text-anchor="end" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">MAU 500만</text>
  <text x="950" y="240" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">ARPU</text>
  <text x="1040" y="240" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">아직 0</text>
  <text x="950" y="262" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">수익화</text>
  <text x="1040" y="262" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">5년+ 소요</text>
  <text x="1010" y="284" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9">구글·메타도 10년 걸림</text>

  <!-- Bottom insight -->
  <rect x="100" y="330" width="1000" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="358" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">구조적 충돌: AI 전환 vs 배당</text>
  <text x="600" y="383" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">AI로 가려면 설비투자↑ → 설비투자↑면 FCF↓ → FCF↓면 배당↓ → 고배당주 정체성 상실</text>
  <text x="600" y="403" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">"안정 고배당주"가 "재미없고 불안정"으로 바뀐 구조적 전환점</text>

  <text x="600" y="434" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">5G 끝나서 좋았던 게 AI 때문에 다시 시작된다 — SKT 주주는 5년+ 인내 구간에 진입</text>
</svg>