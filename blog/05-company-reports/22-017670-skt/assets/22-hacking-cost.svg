<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="320" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">2025.4.22 유심 해킹 — 피해 규모와 비용</text>
  <rect x="120" y="90" width="200" height="100" rx="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="118" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">피해자</text>
  <text x="220" y="152" font-size="28" font-weight="800" fill="#ef4444" text-anchor="middle">2,500만</text>
  <text x="220" y="176" font-size="11" fill="#ef4444" text-anchor="middle">한국 인구의 절반</text>
  <rect x="340" y="90" width="200" height="100" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
  <text x="440" y="118" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">유심 교체 비용</text>
  <text x="440" y="152" font-size="26" font-weight="800" fill="#f59e0b" text-anchor="middle">1,250억</text>
  <text x="440" y="176" font-size="11" fill="#f59e0b" text-anchor="middle">1인당 ~5,000원</text>
  <rect x="560" y="90" width="200" height="100" rx="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="118" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">총 일회성 비용</text>
  <text x="660" y="152" font-size="26" font-weight="800" fill="#ef4444" text-anchor="middle">5,000억+</text>
  <text x="660" y="176" font-size="11" fill="#ef4444" text-anchor="middle">교체+보안+위약금</text>
  <rect x="780" y="90" width="180" height="100" rx="10" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
  <text x="870" y="118" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">OPM 영향</text>
  <text x="870" y="152" font-size="26" font-weight="800" fill="#fbbf24" text-anchor="middle">-3.9%p</text>
  <text x="870" y="176" font-size="11" fill="#fbbf24" text-anchor="middle">10.2 → 6.3</text>
  <rect x="240" y="230" width="600" height="60" rx="10" fill="#1e293b"/>
  <text x="540" y="254" font-size="13" font-weight="700" fill="#f1f5f9" text-anchor="middle">해킹 → 일회성 비용 → OPM 붕괴 → 배당 증발</text>
  <text x="540" y="274" font-size="11" fill="#94a3b8" text-anchor="middle">8년간 쌓인 고배당주 정체성이 한 번에 무너졌다</text>
</svg>
