<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="300" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">빅배스 vs 분산 반영 — 두 전략의 차이</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">GS건설이 택한 길과 안 택한 길</text>
  <rect x="80" y="100" width="440" height="130" rx="10" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="130" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">GS가 택한 길: 빅배스</text>
  <text x="300" y="158" font-size="13" fill="#f1f5f9" text-anchor="middle">2023 Q4: -4,189억 일시 반영</text>
  <text x="300" y="180" font-size="13" fill="#f1f5f9" text-anchor="middle">2024 즉시 흑전 (+2,862억)</text>
  <text x="300" y="205" font-size="11" fill="#22c55e" text-anchor="middle">장점: 불확실성 제거, 빠른 회복 서사</text>
  <rect x="560" y="100" width="440" height="130" rx="10" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2"/>
  <text x="780" y="130" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">안 택한 길: 분산 반영</text>
  <text x="780" y="158" font-size="13" fill="#f1f5f9" text-anchor="middle">3~5년 나눠 매년 -1,000억씩</text>
  <text x="780" y="180" font-size="13" fill="#f1f5f9" text-anchor="middle">실적 서서히 악화</text>
  <text x="780" y="205" font-size="11" fill="#ef4444" text-anchor="middle">단점: 주가 장기 저평가, 신뢰 회복 지연</text>
  <text x="540" y="265" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">빅배스는 자금력과 경영진 결단력이 있어야 가능하다</text>
</svg>
