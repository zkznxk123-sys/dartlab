<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">2023 Q4 — 한 분기에 5,524억을 털어냈다</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">분기별 영업이익 추이 + 검단 빅배스</text>
  <line x1="100" y1="230" x2="1000" y2="230" stroke="#334155" stroke-width="1"/>
  <!-- 2023 Q1-Q3 흑자 -->
  <rect x="140" y="200" width="100" height="30" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="190" y="255" font-size="11" fill="#94a3b8" text-anchor="middle">23Q1</text>
  <text x="190" y="195" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">+850억</text>
  <rect x="270" y="205" width="100" height="25" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="320" y="255" font-size="11" fill="#94a3b8" text-anchor="middle">23Q2</text>
  <text x="320" y="200" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">+450억</text>
  <rect x="400" y="210" width="100" height="20" rx="4" fill="#22c55e" opacity="0.5"/>
  <text x="450" y="255" font-size="11" fill="#94a3b8" text-anchor="middle">23Q3</text>
  <text x="450" y="205" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">+200억</text>
  <!-- Q4 빅배스 -->
  <rect x="530" y="230" width="140" height="100" rx="6" fill="#ef4444" opacity="0.9"/>
  <text x="600" y="195" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">23Q4 빅배스</text>
  <text x="600" y="215" font-size="16" font-weight="800" fill="#ef4444" text-anchor="middle">-4,189억</text>
  <text x="600" y="290" font-size="14" font-weight="800" fill="#f1f5f9" text-anchor="middle">일회성</text>
  <text x="600" y="310" font-size="18" font-weight="800" fill="#f1f5f9" text-anchor="middle">5,524억</text>
  <!-- 2024 회복 -->
  <rect x="700" y="185" width="100" height="45" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="750" y="255" font-size="11" fill="#94a3b8" text-anchor="middle">24Q1</text>
  <text x="750" y="180" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">+710억</text>
  <rect x="830" y="175" width="100" height="55" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="880" y="255" font-size="11" fill="#94a3b8" text-anchor="middle">24Q2~</text>
  <text x="880" y="170" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">흑전 정착</text>
</svg>
