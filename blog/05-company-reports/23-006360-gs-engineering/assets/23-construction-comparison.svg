<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440">
  <rect width="1200" height="440" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">대형 건설 4사 — 2024~2025년 위기 대응 비교</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">경쟁사가 '언제 털지 모르는' 상태인 동안 GS는 이미 털었다</text>

  <!-- GS건설 -->
  <rect x="60" y="100" width="260" height="160" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="190" y="128" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">GS건설 (검단)</text>
  <text x="80" y="155" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">전략</text>
  <text x="250" y="155" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">빅배스 (집중)</text>
  <text x="80" y="177" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">일회성 비용</text>
  <text x="250" y="177" text-anchor="end" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12">5,524억 (1분기)</text>
  <text x="80" y="199" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">회복 기간</text>
  <text x="250" y="199" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">1년</text>
  <text x="80" y="221" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025 OPM</text>
  <text x="250" y="221" text-anchor="end" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">5.0%</text>
  <text x="80" y="243" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">브랜드</text>
  <text x="250" y="243" text-anchor="end" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">자이 유지</text>

  <!-- HDC현산 -->
  <rect x="340" y="100" width="260" height="160" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="470" y="128" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">HDC현산 (화정)</text>
  <text x="360" y="155" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">전략</text>
  <text x="530" y="155" text-anchor="end" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">분산 반영</text>
  <text x="360" y="177" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">일회성 비용</text>
  <text x="530" y="177" text-anchor="end" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12">~4,100억 (3년)</text>
  <text x="360" y="199" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">회복 기간</text>
  <text x="530" y="199" text-anchor="end" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">4년</text>
  <text x="360" y="221" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025 OPM</text>
  <text x="530" y="221" text-anchor="end" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="13">6.3%</text>
  <text x="360" y="243" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">브랜드</text>
  <text x="530" y="243" text-anchor="end" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">아이파크→센테니얼</text>

  <!-- 현대건설 -->
  <rect x="620" y="100" width="260" height="160" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="750" y="128" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">현대건설</text>
  <text x="640" y="155" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">위기 유형</text>
  <text x="810" y="155" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">해외 플랜트 손실</text>
  <text x="640" y="177" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2024 영업이익</text>
  <text x="810" y="177" text-anchor="end" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">-1.22조</text>
  <text x="640" y="199" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">회복 상태</text>
  <text x="810" y="199" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">미완료</text>
  <text x="640" y="221" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">특이점</text>
  <text x="810" y="221" text-anchor="end" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">규모가 커서 빅배스 불가</text>

  <!-- 대우건설 -->
  <rect x="900" y="100" width="240" height="160" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1020" y="128" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">대우건설</text>
  <text x="920" y="155" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">위기 유형</text>
  <text x="1080" y="155" text-anchor="end" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">수익성 급감</text>
  <text x="920" y="177" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2024 영업이익</text>
  <text x="1080" y="177" text-anchor="end" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="13">3,500억 (-39%)</text>
  <text x="920" y="199" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">회복 상태</text>
  <text x="1080" y="199" text-anchor="end" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">하락 진행 중</text>
  <text x="920" y="221" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">특이점</text>
  <text x="1080" y="221" text-anchor="end" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">PF 부실 우려</text>

  <!-- OPM comparison bars -->
  <text x="600" y="300" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">2025년 영업이익률 비교</text>
  <rect x="150" y="320" width="200" height="24" rx="4" fill="#22c55e" fill-opacity="0.6"/>
  <text x="155" y="337" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">GS건설 5.0%</text>
  <rect x="150" y="352" width="252" height="24" rx="4" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="155" y="369" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12">HDC현산 6.3%</text>
  <rect x="150" y="384" width="40" height="24" rx="4" fill="#ef4444" fill-opacity="0.5"/>
  <text x="200" y="401" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="12">현대건설 적자</text>

  <!-- Bottom -->
  <text x="600" y="434" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">빅배스의 진짜 효과는 절대적 회복이 아니라 상대적 포지션이었다 — 경쟁사가 밀려난 결과</text>
</svg>