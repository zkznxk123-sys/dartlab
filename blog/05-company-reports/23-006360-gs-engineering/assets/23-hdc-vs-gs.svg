<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 350" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="350" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">HDC현산 vs GS건설 — 같은 붕괴, 다른 전략</text>
  <rect x="80" y="80" width="440" height="240" rx="12" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="2"/>
  <text x="300" y="108" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">HDC현산 (화정 2022.1.11)</text>
  <line x1="110" y1="125" x2="490" y2="125" stroke="#334155" stroke-dasharray="4,2"/>
  <text x="110" y="150" font-size="12" fill="#ef4444">• 6명 사망 (인명피해 있음)</text>
  <text x="110" y="172" font-size="12" fill="#ef4444">• 영업정지 1년, 형사처벌</text>
  <text x="110" y="194" font-size="12" fill="#ef4444">• 분산 반영 (2022 OPM 3.9% 바닥)</text>
  <text x="110" y="216" font-size="12" fill="#ef4444">• 아이파크→센테니얼 리브랜딩</text>
  <text x="110" y="238" font-size="12" fill="#ef4444">• 완만 회복 3년 (→6.3% OPM)</text>
  <text x="110" y="280" font-size="13" font-weight="700" fill="#ef4444">→ 강제된 선택지</text>
  <text x="110" y="300" font-size="11" fill="#94a3b8">(빅배스 불가: 이미 적자 우려)</text>
  <rect x="560" y="80" width="440" height="240" rx="12" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="108" font-size="15" font-weight="700" fill="#22c55e" text-anchor="middle">GS건설 (검단 2023.4.29)</text>
  <line x1="590" y1="125" x2="970" y2="125" stroke="#334155" stroke-dasharray="4,2"/>
  <text x="590" y="150" font-size="12" fill="#22c55e">• 인명피해 0 (입주 전)</text>
  <text x="590" y="172" font-size="12" fill="#22c55e">• 행정처분만 (형사 없음)</text>
  <text x="590" y="194" font-size="12" fill="#22c55e">• 빅배스 5,524억 Q4 집중</text>
  <text x="590" y="216" font-size="12" fill="#22c55e">• 자이 브랜드 유지</text>
  <text x="590" y="238" font-size="12" fill="#22c55e">• 1년 만에 흑전 (+2,862억)</text>
  <text x="590" y="280" font-size="13" font-weight="700" fill="#22c55e">→ 용감한 선택지</text>
  <text x="590" y="300" font-size="11" fill="#94a3b8">(자금 여력 + 경영진 결단)</text>
</svg>
