<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460">
  <rect width="1200" height="460" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">빅배스 이후 V자 회복 궤적 — 분기별 영업이익</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2023 Q4에 -4,189억 바닥 찍고 다음 해 바로 흑전. 경쟁사 3~4년 걸린 회복을 1년 만에</text>

  <!-- Axis -->
  <line x1="100" y1="280" x2="1130" y2="280" stroke="#334155" stroke-width="1"/>
  <text x="85" y="284" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">0</text>
  <line x1="100" y1="280" x2="1130" y2="280" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- 2023 Q1: +1,750억 -->
  <rect x="120" y="155" width="90" height="125" rx="4" fill="#22c55e" fill-opacity="0.6"/>
  <text x="165" y="147" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">+1,750억</text>
  <text x="165" y="395" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2023 Q1</text>

  <!-- 2023 Q2: +130억 -->
  <rect x="240" y="271" width="90" height="9" rx="3" fill="#22c55e" fill-opacity="0.4"/>
  <text x="285" y="264" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">+130억</text>
  <text x="285" y="395" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Q2</text>

  <!-- 2023 Q3: -1,575억 -->
  <rect x="360" y="280" width="90" height="88" rx="4" fill="#ef4444" fill-opacity="0.5"/>
  <text x="405" y="384" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">-1,575억</text>
  <text x="405" y="395" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Q3</text>
  <text x="405" y="410" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9">검단 1차 반영</text>

  <!-- 2023 Q4: -4,189억 (빅배스) -->
  <rect x="480" y="280" width="90" height="135" rx="4" fill="#ef4444" fill-opacity="0.8"/>
  <text x="525" y="428" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700">-4,189억</text>
  <text x="525" y="395" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Q4</text>
  <text x="525" y="296" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">빅배스</text>

  <!-- Divider -->
  <line x1="600" y1="100" x2="600" y2="430" stroke="#334155" stroke-width="1" stroke-dasharray="6"/>
  <text x="600" y="95" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">회복 구간 →</text>

  <!-- 2024 H1: +1,241억 (추정) -->
  <rect x="630" y="191" width="90" height="89" rx="4" fill="#22c55e" fill-opacity="0.5"/>
  <text x="675" y="183" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">+1,241억</text>
  <text x="675" y="395" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2024 H1</text>

  <!-- 2024 H2: +1,621억 -->
  <rect x="750" y="164" width="90" height="116" rx="4" fill="#22c55e" fill-opacity="0.6"/>
  <text x="795" y="156" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">+1,621억</text>
  <text x="795" y="395" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">H2</text>

  <!-- 2025 3Q: +1,621억 누적 (OPM 5%) -->
  <rect x="870" y="164" width="90" height="116" rx="4" fill="#22c55e" fill-opacity="0.7"/>
  <text x="915" y="156" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">+1,621억</text>
  <text x="915" y="395" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025 3Q</text>
  <text x="915" y="410" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="600">OPM 5.0%</text>

  <!-- OPM line annotation -->
  <rect x="990" y="140" width="150" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1065" y="162" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OPM 추이</text>
  <text x="1065" y="182" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="12">2023: -2.9%</text>
  <text x="1065" y="200" text-anchor="middle" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="12">2024: +2.2%</text>
  <text x="1065" y="218" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">2025: +5.0%</text>

  <!-- Bottom note -->
  <text x="600" y="448" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2023 Q4 한 분기에 5,524억 집중 반영 → 다음 해 바로 흑전 · 충당금 환입 효과 소진 후에도 OPM 5% 유지가 관건</text>
</svg>