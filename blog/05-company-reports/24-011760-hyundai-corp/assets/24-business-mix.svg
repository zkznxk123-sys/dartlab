<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="320" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">매출 1.9조의 행선지 — 무역은 절반뿐</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">자원·철강·물류가 나머지 절반을 만든다</text>
  <rect x="100" y="120" width="400" height="50" rx="6" fill="#3b82f6" opacity="0.7"/>
  <text x="300" y="151" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">무역 (본업) 40% — 마진 3~4%</text>
  <rect x="500" y="120" width="300" height="50" rx="6" fill="#22c55e" opacity="0.8"/>
  <text x="650" y="151" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">자원개발 30% — 시황 연동</text>
  <rect x="800" y="120" width="200" height="50" rx="6" fill="#94a3b8" opacity="0.6"/>
  <text x="900" y="151" font-size="13" font-weight="600" fill="#f1f5f9" text-anchor="middle">철강 20% / 물류 10%</text>
  <rect x="260" y="210" width="560" height="60" rx="10" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="233" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">자원 자회사 이익이 OPM 7.3%의 핵심</text>
  <text x="540" y="253" font-size="11" fill="#fbbf24" text-anchor="middle">석탄·원유·이차전지 광물 — 연결 영업이익에 반영</text>
</svg>
