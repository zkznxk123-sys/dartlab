<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440">
  <rect width="1200" height="440" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">이익은 868억인데 현금은 -2,947억 — 상사의 함정</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">매출이 커질수록 운전자본이 현금을 삼킨다. "사서 판다"의 결제 주기 문제</text>

  <!-- NI vs OCF 3-year comparison -->
  <text x="200" y="110" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">순이익 (NI)</text>
  <text x="600" y="110" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">영업CF (OCF)</text>
  <text x="1000" y="110" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">OCF / NI</text>

  <!-- Zero line -->
  <line x1="80" y1="250" x2="780" y2="250" stroke="#334155" stroke-width="1"/>

  <!-- 2023 -->
  <rect x="100" y="220" width="70" height="30" rx="3" fill="#22c55e" fill-opacity="0.5"/>
  <text x="135" y="214" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">834억</text>
  <text x="135" y="290" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2023</text>

  <rect x="500" y="250" width="70" height="28" rx="3" fill="#ef4444" fill-opacity="0.6"/>
  <text x="535" y="293" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">-699억</text>

  <text x="940" y="248" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">-0.84x</text>
  <text x="940" y="268" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">2023</text>

  <!-- 2024 -->
  <rect x="200" y="208" width="70" height="42" rx="3" fill="#22c55e" fill-opacity="0.6"/>
  <text x="235" y="202" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">1,210억</text>
  <text x="235" y="290" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2024</text>

  <rect x="600" y="236" width="70" height="14" rx="3" fill="#f59e0b" fill-opacity="0.5"/>
  <text x="635" y="230" text-anchor="middle" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="12">405억</text>

  <text x="1000" y="248" text-anchor="middle" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">0.33x</text>
  <text x="1000" y="268" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">2024</text>

  <!-- 2025 -->
  <rect x="300" y="220" width="70" height="30" rx="3" fill="#22c55e" fill-opacity="0.5"/>
  <text x="335" y="214" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">868억</text>
  <text x="335" y="290" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025</text>

  <rect x="700" y="250" width="70" height="80" rx="3" fill="#ef4444" fill-opacity="0.8"/>
  <text x="735" y="346" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700">-2,947억</text>

  <text x="1060" y="248" text-anchor="middle" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700">-3.40x</text>
  <text x="1060" y="268" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">2025</text>

  <!-- Explanation cards -->
  <rect x="80" y="320" width="340" height="90" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="250" y="345" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">현금이 빠지는 원인</text>
  <text x="100" y="368" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출채권 급증 (매출 +8% → 미수금 쌓임)</text>
  <text x="100" y="388" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">재고 포지션 확대 (트레이딩 물량 증가)</text>
  <text x="100" y="398" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">자원 자회사 이익 = 비현금(지분법·평가이익)</text>

  <rect x="440" y="320" width="340" height="90" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="610" y="345" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">현금을 메꾸는 방법</text>
  <text x="460" y="368" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">투자자산 매각 (2024: +3,059억)</text>
  <text x="460" y="388" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">자회사 배당 유입</text>
  <text x="460" y="398" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">→ 본업이 아니라 자산 매각으로 버티는 구조</text>

  <rect x="800" y="320" width="340" height="90" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="970" y="345" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">시험대</text>
  <text x="820" y="368" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">리튬/니켈 사이클에서 현금 플러스 전환?</text>
  <text x="820" y="388" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">부채비율 235% → 200% 이하?</text>
  <text x="820" y="398" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">PBR 0.5x → 1.0x 재평가?</text>

  <text x="600" y="432" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">상사 비즈니스의 본질: 매출이 커질수록 결제 주기 동안 현금이 잠긴다. 이익 ≠ 현금</text>
</svg>