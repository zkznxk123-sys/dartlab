<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1080" height="320" fill="#0a0e1a"/>
  <text x="540" y="36" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">영업이익 1,401억의 정체</text>
  <text x="540" y="58" font-size="12" fill="#64748b" text-anchor="middle">무역 이익(추정) vs 자원 자회사 이익(추정)</text>
  <rect x="100" y="100" width="200" height="120" rx="10" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="130" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle">무역 영업이익</text>
  <text x="200" y="165" font-size="22" font-weight="800" fill="#3b82f6" text-anchor="middle">~300억</text>
  <text x="200" y="195" font-size="11" fill="#3b82f6" text-anchor="middle">OPM 3~4% (상사 평균)</text>
  <text x="350" y="165" font-size="28" fill="#64748b" text-anchor="middle">+</text>
  <rect x="400" y="100" width="200" height="120" rx="10" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="130" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">자원 자회사 이익</text>
  <text x="500" y="165" font-size="22" font-weight="800" fill="#22c55e" text-anchor="middle">~1,100억</text>
  <text x="500" y="195" font-size="11" fill="#22c55e" text-anchor="middle">석탄/원유 사이클</text>
  <text x="650" y="165" font-size="28" fill="#64748b" text-anchor="middle">=</text>
  <rect x="700" y="100" width="220" height="120" rx="10" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="810" y="130" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">전사 영업이익</text>
  <text x="810" y="165" font-size="26" font-weight="800" fill="#fbbf24" text-anchor="middle">1,401억</text>
  <text x="810" y="195" font-size="11" fill="#fbbf24" text-anchor="middle">OPM 7.3%</text>
  <text x="540" y="275" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">리스크: 석탄 가격 꺾이면 OPM 3%대 회귀 (자원 사라짐)</text>
</svg>
