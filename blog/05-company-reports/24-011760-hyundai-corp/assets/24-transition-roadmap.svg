<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <rect width="1200" height="400" fill="#0a0e1a"/>
  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">종합상사 → 자원+지주 — 현대코퍼레이션 47년의 변신</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">"상사"를 사명에서 뺀 건 2016년. 재무제표가 10년 늦게 그 선언을 증명 중</text>

  <!-- Timeline -->
  <line x1="100" y1="160" x2="1100" y2="160" stroke="#334155" stroke-width="2"/>

  <!-- 1976: 설립 -->
  <circle cx="150" cy="160" r="6" fill="#64748b"/>
  <text x="150" y="140" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">1976</text>
  <text x="150" y="185" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">현대종합상사 설립</text>
  <text x="150" y="198" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9">수출 대행 황금기</text>

  <!-- 2000s: 상사 모델 붕괴 -->
  <circle cx="340" cy="160" r="6" fill="#ef4444"/>
  <text x="340" y="140" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2000s</text>
  <text x="340" y="185" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">직수출+인터넷+IMF</text>
  <text x="340" y="198" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9">상사 모델 붕괴</text>

  <!-- 2009: 정몽혁 인수 -->
  <circle cx="500" cy="160" r="8" fill="#f59e0b"/>
  <text x="500" y="135" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2009</text>
  <text x="500" y="185" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">정몽혁 개인 인수</text>
  <text x="500" y="198" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9">지분 20%+ 직접 보유</text>

  <!-- 2016: 사명 변경 -->
  <circle cx="660" cy="160" r="8" fill="#3b82f6"/>
  <text x="660" y="135" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2016</text>
  <text x="660" y="185" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현대코퍼레이션 사명변경</text>
  <text x="660" y="198" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9">"상사" 제거 = 정체성 선언</text>

  <!-- 2025: 자원 이익 입증 -->
  <circle cx="850" cy="160" r="10" fill="#22c55e"/>
  <text x="850" y="130" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2025</text>
  <text x="850" y="185" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">자원 OI 50%+ 입증</text>
  <text x="850" y="200" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="11">OI 1,401억 · PBR 0.5x</text>

  <!-- 2027?: 시험대 -->
  <circle cx="1030" cy="160" r="8" fill="#fbbf24" fill-opacity="0.5" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="1030" y="135" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2027?</text>
  <text x="1030" y="185" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">리튬/니켈 사이클 진입</text>
  <text x="1030" y="198" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9">현금 플러스 전환이 관건</text>

  <!-- Bottom comparison cards -->
  <rect x="80" y="230" width="340" height="130" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="250" y="255" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">과거: 종합상사 프레임</text>
  <text x="100" y="280" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 7.55조 · OPM 1.85%</text>
  <text x="100" y="300" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">상사업 멀티플 → 만년 저평가</text>
  <text x="100" y="320" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">PBR 0.5~0.7x 고착</text>
  <text x="100" y="345" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">"종합상사는 끝났다"</text>

  <text x="540" y="300" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">→</text>

  <rect x="600" y="230" width="340" height="130" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="770" y="255" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">미래: 자원+지주 프레임</text>
  <text x="620" y="280" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">자원 자회사 OI 50%+ (실질 드라이버)</text>
  <text x="620" y="300" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">리튬/니켈/LNG 포트폴리오 확대</text>
  <text x="620" y="320" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">비상장 자회사 상장 옵션</text>
  <text x="620" y="345" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">PBR 1.0x 가능 (업종 재분류 시)</text>

  <!-- Trigger conditions -->
  <rect x="960" y="230" width="180" height="130" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="1050" y="255" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">재평가 트리거</text>
  <text x="975" y="278" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">자원 매출 40%+</text>
  <text x="975" y="296" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">OCF 플러스 전환</text>
  <text x="975" y="314" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">배당성향 30%+</text>
  <text x="975" y="332" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">비상장 자회사 IPO</text>

  <text x="600" y="390" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">이 회사를 "현대종합상사"라고 부르던 시대는 이미 끝났다 — 재무제표가 10년 늦게 증명 중</text>
</svg>