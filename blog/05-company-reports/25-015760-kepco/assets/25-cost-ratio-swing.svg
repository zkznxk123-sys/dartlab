<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" font-family="-apple-system, 'Segoe UI', sans-serif">한국전력 매출원가율 6년 추이 — 100% 넘으면 팔수록 적자</text>
  <text x="400" y="55" text-anchor="middle" fill="#64748b" font-size="13" font-family="-apple-system, 'Segoe UI', sans-serif">매출원가율 = 매출원가 ÷ 매출 × 100</text>
  <!-- 100% line -->
  <line x1="80" y1="200" x2="740" y2="200" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="750" y="204" fill="#fbbf24" font-size="11" font-family="-apple-system, 'Segoe UI', sans-serif">100%</text>
  <!-- Y axis labels -->
  <text x="70" y="105" text-anchor="end" fill="#64748b" font-size="11" font-family="-apple-system, 'Segoe UI', sans-serif">140%</text>
  <text x="70" y="155" text-anchor="end" fill="#64748b" font-size="11" font-family="-apple-system, 'Segoe UI', sans-serif">120%</text>
  <text x="70" y="204" text-anchor="end" fill="#64748b" font-size="11" font-family="-apple-system, 'Segoe UI', sans-serif">100%</text>
  <text x="70" y="254" text-anchor="end" fill="#64748b" font-size="11" font-family="-apple-system, 'Segoe UI', sans-serif">80%</text>
  <text x="70" y="340" text-anchor="end" fill="#64748b" font-size="11" font-family="-apple-system, 'Segoe UI', sans-serif">60%</text>
  <!-- Grid -->
  <line x1="80" y1="100" x2="740" y2="100" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="80" y1="150" x2="740" y2="150" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="80" y1="250" x2="740" y2="250" stroke="#1e293b" stroke-width="0.5"/>
  <!-- Data: 90, 107, 141.6, 103, 88, 84 → Y scale: 60%=340, 140%=100 -->
  <!-- 90%: 262.5, 107%: 182.5, 141.6%: 98, 103%: 200, 88%: 272, 84%: 280 -->
  <!-- Area fill below danger zone -->
  <polygon points="190,182 300,98 410,200 520,272 630,280 630,340 190,340" fill="url(#danger)" opacity="0.15"/>
  <polyline points="80,262 190,182 300,98 410,200 520,272 630,280" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="80" cy="262" r="6" fill="#22c55e"/>
  <circle cx="190" cy="182" r="6" fill="#f59e0b"/>
  <circle cx="300" cy="98" r="7" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <circle cx="410" cy="200" r="6" fill="#f59e0b"/>
  <circle cx="520" cy="272" r="6" fill="#22c55e"/>
  <circle cx="630" cy="280" r="6" fill="#22c55e"/>
  <!-- Labels -->
  <text x="80" y="285" text-anchor="middle" fill="#64748b" font-size="12" font-family="-apple-system, 'Segoe UI', sans-serif">2020</text>
  <text x="190" y="285" text-anchor="middle" fill="#64748b" font-size="12" font-family="-apple-system, 'Segoe UI', sans-serif">2021</text>
  <text x="300" y="285" text-anchor="middle" fill="#64748b" font-size="12" font-family="-apple-system, 'Segoe UI', sans-serif">2022</text>
  <text x="410" y="285" text-anchor="middle" fill="#64748b" font-size="12" font-family="-apple-system, 'Segoe UI', sans-serif">2023</text>
  <text x="520" y="285" text-anchor="middle" fill="#64748b" font-size="12" font-family="-apple-system, 'Segoe UI', sans-serif">2024</text>
  <text x="630" y="285" text-anchor="middle" fill="#64748b" font-size="12" font-family="-apple-system, 'Segoe UI', sans-serif">2025</text>
  <!-- Value labels -->
  <text x="80" y="250" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold" font-family="-apple-system, 'Segoe UI', sans-serif">90%</text>
  <text x="190" y="170" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold" font-family="-apple-system, 'Segoe UI', sans-serif">107%</text>
  <text x="300" y="85" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="bold" font-family="-apple-system, 'Segoe UI', sans-serif">141.6%</text>
  <text x="410" y="220" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold" font-family="-apple-system, 'Segoe UI', sans-serif">103%</text>
  <text x="520" y="260" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold" font-family="-apple-system, 'Segoe UI', sans-serif">88%</text>
  <text x="630" y="268" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold" font-family="-apple-system, 'Segoe UI', sans-serif">84%</text>
  <!-- Annotation -->
  <rect x="240" y="65" width="120" height="22" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="300" y="80" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold" font-family="-apple-system, 'Segoe UI', sans-serif">러-우 전쟁 + 동결</text>
  <text x="400" y="375" text-anchor="middle" fill="#475569" font-size="11" font-family="-apple-system, 'Segoe UI', sans-serif">dartlab 실측 | DART 연결 재무제표 기준</text>
</svg>