<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="barGradRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="interestLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">한국전력 금융부채 추이 — 70조에서 130조, 5년간 60조 증가</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">단위: 조원 | 하단 노란선: 이자비용</text>

  <!-- Chart area: x=100..820, y=80..420 -->
  <!-- Y axis: 0 ~ 140조 -->
  <!-- Grid lines -->
  <line x1="100" y1="420" x2="820" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="371.4" x2="820" y2="371.4" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="322.9" x2="820" y2="322.9" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="274.3" x2="820" y2="274.3" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="225.7" x2="820" y2="225.7" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="177.1" x2="820" y2="177.1" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="128.6" x2="820" y2="128.6" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="80" x2="820" y2="80" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y labels -->
  <text x="90" y="424" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">0</text>
  <text x="90" y="375" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">20</text>
  <text x="90" y="327" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">40</text>
  <text x="90" y="278" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">60</text>
  <text x="90" y="229" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">80</text>
  <text x="90" y="181" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">100</text>
  <text x="90" y="132" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">120</text>
  <text x="90" y="84" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">140</text>

  <!-- Bars: barWidth=80, gap between centers=120, starting at x=160 -->
  <!-- scale: 1조 = 340/140 = 2.4286px -->
  <!-- 2020: 70.1조 → h=170.2, y=249.8 -->
  <rect x="120" y="249.8" width="80" height="170.2" fill="url(#barGrad)" rx="4"/>
  <text x="160" y="243" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">70.1</text>
  <text x="160" y="445" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2020</text>

  <!-- 2021: 80.6조 → h=195.7, y=224.3 -->
  <rect x="240" y="224.3" width="80" height="195.7" fill="url(#barGrad)" rx="4"/>
  <text x="280" y="218" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">80.6</text>
  <text x="280" y="445" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2021</text>

  <!-- 2022: 121조 → h=293.9, y=126.1 — RED highlight -->
  <rect x="360" y="126.1" width="80" height="293.9" fill="url(#barGradRed)" rx="4"/>
  <text x="400" y="118" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">121.0</text>
  <text x="400" y="445" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2022</text>
  <!-- +40.4조 annotation -->
  <line x1="335" y1="224.3" x2="335" y2="126.1" stroke="#ef4444" stroke-width="2" marker-start="url(#arrowDown)" marker-end="url(#arrowUp)"/>
  <text x="350" y="178" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">+40.4조</text>

  <!-- 2023: 134.1조 → h=325.7, y=94.3 -->
  <rect x="480" y="94.3" width="80" height="325.7" fill="url(#barGrad)" rx="4"/>
  <text x="520" y="88" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">134.1</text>
  <text x="520" y="445" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2023</text>

  <!-- 2024: 132.8조 → h=322.5, y=97.5 -->
  <rect x="600" y="97.5" width="80" height="322.5" fill="url(#barGrad)" rx="4"/>
  <text x="640" y="91" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">132.8</text>
  <text x="640" y="445" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2024</text>

  <!-- 2025: 129.9조 → h=315.5, y=104.5 -->
  <rect x="720" y="104.5" width="80" height="315.5" fill="url(#barGrad)" rx="4"/>
  <text x="760" y="98" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">129.9</text>
  <text x="760" y="445" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2025</text>

  <!-- Interest cost line (secondary Y: 0~10조, mapped to same chart area) -->
  <!-- scale: 1조 = 340/10 = 34px from bottom(420) -->
  <!-- 2.8→324.8, 2.9→321.4, 4.8→256.8, 7.7→157.8, 9.1→110.6, 6.1→212.6 -->
  <polyline points="160,324.8 280,321.4 400,256.8 520,157.8 640,110.6 760,212.6"
    fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="160" cy="324.8" r="5" fill="#fbbf24"/>
  <circle cx="280" cy="321.4" r="5" fill="#fbbf24"/>
  <circle cx="400" cy="256.8" r="5" fill="#fbbf24"/>
  <circle cx="520" cy="157.8" r="5" fill="#fbbf24"/>
  <circle cx="640" cy="110.6" r="5" fill="#fbbf24"/>
  <circle cx="760" cy="212.6" r="5" fill="#fbbf24"/>

  <!-- Interest labels -->
  <text x="160" y="340" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2.8</text>
  <text x="280" y="337" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2.9</text>
  <text x="400" y="250" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">4.8</text>
  <text x="520" y="151" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">7.7</text>
  <text x="640" y="104" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">9.1</text>
  <text x="760" y="206" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">6.1</text>

  <!-- Right Y axis label for interest -->
  <text x="855" y="424" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">0</text>
  <text x="855" y="254" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">5조</text>
  <text x="855" y="84" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">10조</text>

  <!-- Legend -->
  <rect x="280" y="475" width="16" height="12" fill="url(#barGrad)" rx="2"/>
  <text x="302" y="486" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">금융부채</text>
  <rect x="380" y="475" width="16" height="12" fill="url(#barGradRed)" rx="2"/>
  <text x="402" y="486" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">급증 연도</text>
  <line x1="480" y1="481" x2="500" y2="481" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="490" cy="481" r="3" fill="#fbbf24"/>
  <text x="508" y="486" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">이자비용(조)</text>
</svg>