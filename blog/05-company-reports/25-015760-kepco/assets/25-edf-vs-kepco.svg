<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <rect width="900" height="480" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">한전 vs EDF vs 미국 유틸리티 — 정부 개입도와 재무 결과</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">정부 개입이 강할수록 요금 자율성이 낮고 재무 부담이 크다</text>

  <!-- 3 columns: x=50..290, x=310..590, x=610..850 -->

  <!-- Column 1: KEPCO — yellow border -->
  <rect x="50" y="80" width="250" height="370" fill="#0f172a" rx="10" stroke="#fbbf24" stroke-width="2"/>
  <rect x="50" y="80" width="250" height="50" fill="#fbbf24" fill-opacity="0.12" rx="10"/>
  <rect x="50" y="105" width="250" height="25" fill="#0f172a"/>
  <text x="175" y="112" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">한국전력 (KEPCO)</text>

  <!-- KEPCO items -->
  <text x="75" y="155" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">정부 지분</text>
  <text x="265" y="155" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">51%</text>
  <line x1="75" y1="165" x2="265" y2="165" stroke="#1e293b" stroke-width="1"/>

  <text x="75" y="195" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">요금 결정</text>
  <text x="265" y="195" text-anchor="end" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">정부 인가제</text>
  <line x1="75" y1="205" x2="265" y2="205" stroke="#1e293b" stroke-width="1"/>

  <text x="75" y="235" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">부채비율</text>
  <text x="265" y="235" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">497%</text>
  <line x1="75" y1="245" x2="265" y2="245" stroke="#1e293b" stroke-width="1"/>

  <text x="75" y="275" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">PER</text>
  <text x="265" y="275" text-anchor="end" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">8x</text>
  <line x1="75" y1="285" x2="265" y2="285" stroke="#1e293b" stroke-width="1"/>

  <text x="75" y="315" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">특징</text>
  <text x="265" y="315" text-anchor="end" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500">원가 미반영 요금</text>
  <text x="265" y="335" text-anchor="end" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500">정책 손실 누적</text>

  <!-- Danger meter -->
  <rect x="75" y="360" width="190" height="24" fill="#1e293b" rx="12"/>
  <rect x="75" y="360" width="152" height="24" fill="#ef4444" fill-opacity="0.6" rx="12"/>
  <text x="170" y="377" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">정부 개입 80%</text>

  <!-- Status -->
  <rect x="100" y="400" width="150" height="30" fill="#fbbf24" fill-opacity="0.15" rx="8"/>
  <text x="175" y="420" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">반(半)국영 상장</text>

  <!-- Column 2: EDF — red border -->
  <rect x="325" y="80" width="250" height="370" fill="#0f172a" rx="10" stroke="#ef4444" stroke-width="2"/>
  <rect x="325" y="80" width="250" height="50" fill="#ef4444" fill-opacity="0.12" rx="10"/>
  <rect x="325" y="105" width="250" height="25" fill="#0f172a"/>
  <text x="450" y="112" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">EDF (프랑스)</text>

  <!-- EDF items -->
  <text x="350" y="155" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">정부 지분</text>
  <text x="540" y="155" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">100%</text>
  <line x1="350" y1="165" x2="540" y2="165" stroke="#1e293b" stroke-width="1"/>

  <text x="350" y="195" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">요금 결정</text>
  <text x="540" y="195" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">상한 규제</text>
  <line x1="350" y1="205" x2="540" y2="205" stroke="#1e293b" stroke-width="1"/>

  <text x="350" y="235" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">부채비율</text>
  <text x="540" y="235" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">550%</text>
  <line x1="350" y1="245" x2="540" y2="245" stroke="#1e293b" stroke-width="1"/>

  <text x="350" y="275" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">PER</text>
  <text x="540" y="275" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">상장폐지</text>
  <line x1="350" y1="285" x2="540" y2="285" stroke="#1e293b" stroke-width="1"/>

  <text x="350" y="315" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">특징</text>
  <text x="540" y="315" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500">2022년 국유화</text>
  <text x="540" y="335" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500">원전 노후화 비용</text>

  <!-- Danger meter -->
  <rect x="350" y="360" width="190" height="24" fill="#1e293b" rx="12"/>
  <rect x="350" y="360" width="190" height="24" fill="#ef4444" fill-opacity="0.6" rx="12"/>
  <text x="445" y="377" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">정부 개입 100%</text>

  <!-- Status -->
  <rect x="375" y="400" width="150" height="30" fill="#ef4444" fill-opacity="0.15" rx="8"/>
  <text x="450" y="420" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">완전 국유화</text>

  <!-- Column 3: US Utilities — green border -->
  <rect x="600" y="80" width="250" height="370" fill="#0f172a" rx="10" stroke="#22c55e" stroke-width="2"/>
  <rect x="600" y="80" width="250" height="50" fill="#22c55e" fill-opacity="0.12" rx="10"/>
  <rect x="600" y="105" width="250" height="25" fill="#0f172a"/>
  <text x="725" y="112" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">미국 유틸리티</text>

  <!-- US items -->
  <text x="625" y="155" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">정부 지분</text>
  <text x="815" y="155" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">0%</text>
  <line x1="625" y1="165" x2="815" y2="165" stroke="#1e293b" stroke-width="1"/>

  <text x="625" y="195" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">요금 결정</text>
  <text x="815" y="195" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">원가+마진 보장</text>
  <line x1="625" y1="205" x2="815" y2="205" stroke="#1e293b" stroke-width="1"/>

  <text x="625" y="235" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">부채비율</text>
  <text x="815" y="235" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">100~150%</text>
  <line x1="625" y1="245" x2="815" y2="245" stroke="#1e293b" stroke-width="1"/>

  <text x="625" y="275" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">PER</text>
  <text x="815" y="275" text-anchor="end" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">18x</text>
  <line x1="625" y1="285" x2="815" y2="285" stroke="#1e293b" stroke-width="1"/>

  <text x="625" y="315" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">특징</text>
  <text x="815" y="315" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500">적정수익률 보장</text>
  <text x="815" y="335" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500">안정 배당 (4~5%)</text>

  <!-- Danger meter -->
  <rect x="625" y="360" width="190" height="24" fill="#1e293b" rx="12"/>
  <rect x="625" y="360" width="38" height="24" fill="#22c55e" fill-opacity="0.6" rx="12"/>
  <text x="720" y="377" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">정부 개입 20%</text>

  <!-- Status -->
  <rect x="650" y="400" width="150" height="30" fill="#22c55e" fill-opacity="0.15" rx="8"/>
  <text x="725" y="420" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">민간 자율 규제</text>

  <!-- Bottom insight -->
  <text x="450" y="470" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-style="italic">정부 개입도가 높을수록 요금 자율성이 낮고, 부채가 구조적으로 쌓인다</text>
</svg>