<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="debtBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#991b1b" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="futureBlock" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">한국전력의 미래 — 130조 부채 + 미래 투자 부담</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">현재 부채에 더해 수십~수백조 규모의 에너지 전환 투자가 예정</text>

  <!-- Left: Current debt column -->
  <rect x="60" y="90" width="130" height="340" fill="url(#debtBar)" rx="8" stroke="#ef4444" stroke-width="1"/>
  <text x="125" y="120" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">현재 부채</text>
  <text x="125" y="160" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800">130조</text>
  <text x="125" y="190" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-opacity="0.7">금융부채 130조</text>
  <text x="125" y="210" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-opacity="0.7">총부채 200조+</text>

  <!-- Divider arrow -->
  <line x1="200" y1="260" x2="235" y2="260" stroke="#64748b" stroke-width="2"/>
  <polygon points="235,260 228,255 228,265" fill="#64748b"/>
  <text x="218" y="280" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">+</text>

  <!-- Timeline header -->
  <text x="560" y="92" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">향후 투자 부담</text>

  <!-- Timeline axis -->
  <line x1="250" y1="425" x2="870" y2="425" stroke="#334155" stroke-width="2"/>
  <!-- Time markers -->
  <text x="250" y="445" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025</text>
  <text x="405" y="445" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2030</text>
  <text x="560" y="445" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2035</text>
  <text x="715" y="445" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2040</text>
  <text x="870" y="445" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2050</text>
  <circle cx="250" cy="425" r="4" fill="#64748b"/>
  <circle cx="405" cy="425" r="4" fill="#64748b"/>
  <circle cx="560" cy="425" r="4" fill="#64748b"/>
  <circle cx="715" cy="425" r="4" fill="#64748b"/>
  <circle cx="870" cy="425" r="4" fill="#64748b"/>

  <!-- Block 1: RE100 재생에너지 (2025~2050, 수십조) -->
  <rect x="250" y="115" width="620" height="65" fill="url(#futureBlock)" rx="8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="560" y="142" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">RE100 재생에너지 전환</text>
  <text x="560" y="165" text-anchor="middle" fill="#93c5fd" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">태양광 + 풍력 + ESS | 수십조 규모 | 2030~2050</text>

  <!-- Block 2: 송전망 확충 (2025~2040, 40조+) -->
  <rect x="250" y="195" width="465" height="65" fill="#6366f1" fill-opacity="0.3" rx="8" stroke="#6366f1" stroke-width="1.5"/>
  <text x="483" y="222" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">송전망 확충 + 스마트그리드</text>
  <text x="483" y="245" text-anchor="middle" fill="#a5b4fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">40조+ 규모 | 신재생 연결 + 노후 교체</text>

  <!-- Block 3: 노후 원전 해체 (2030~2050, 기당 1조+) -->
  <rect x="405" y="275" width="465" height="65" fill="#f59e0b" fill-opacity="0.2" rx="8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="638" y="302" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">노후 원전 해체</text>
  <text x="638" y="325" text-anchor="middle" fill="#fcd34d" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">기당 1조원+ | 고리 1~4호기, 월성 1호기 등</text>

  <!-- Block 4: 탄소배출권 (2025~2050, 연 수조) -->
  <rect x="250" y="355" width="620" height="55" fill="#ef4444" fill-opacity="0.15" rx="8" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="560" y="380" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">탄소배출권 비용</text>
  <text x="560" y="400" text-anchor="middle" fill="#fca5a5" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">연 수조원 | EU CBAM 확대 시 추가 부담</text>

  <!-- Total callout -->
  <rect x="290" y="460" width="320" height="16" fill="none"/>
  <text x="450" y="473" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">현재 130조 + 향후 수백조 = 요금 인상 없이는 해결 불가</text>
</svg>