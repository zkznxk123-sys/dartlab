<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="ocfGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="fcfNeg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="fcfPos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">한국전력 OCF vs FCF — 감가상각이 만드는 현금의 마법</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">단위: 조원 | OCF(초록) vs FCF(빨강/초록)</text>

  <!-- Chart area: x=110..830, y=80..440 -->
  <!-- Y range: -15 ~ +25, total 40조 -->
  <!-- scale: 1조 = 360/40 = 9px -->
  <!-- zero line at y = 80 + 25*9 = 305 -->

  <!-- Grid lines -->
  <line x1="110" y1="80" x2="830" y2="80" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="110" y1="125" x2="830" y2="125" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="110" y1="170" x2="830" y2="170" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="110" y1="215" x2="830" y2="215" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="110" y1="260" x2="830" y2="260" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="110" y1="305" x2="830" y2="305" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="110" y1="350" x2="830" y2="350" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="110" y1="395" x2="830" y2="395" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="110" y1="440" x2="830" y2="440" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y labels -->
  <text x="100" y="84" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">25</text>
  <text x="100" y="129" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">20</text>
  <text x="100" y="174" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">15</text>
  <text x="100" y="219" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">10</text>
  <text x="100" y="264" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">5</text>
  <text x="100" y="309" text-anchor="end" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">0</text>
  <text x="100" y="354" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-5</text>
  <text x="100" y="399" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-10</text>
  <text x="100" y="444" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-15</text>

  <!-- Bars: 6 groups, each group has OCF bar + FCF bar -->
  <!-- Group centers: 170, 290, 410, 530, 650, 770 -->
  <!-- barWidth=45, gap between OCF and FCF = 5 -->

  <!-- 2020: OCF=9.8 (h=88.2, up from 305), FCF=-5.4 (h=48.6, down from 305) -->
  <rect x="145" y="216.8" width="45" height="88.2" fill="url(#ocfGrad)" rx="3"/>
  <text x="167" y="211" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">9.8</text>
  <rect x="195" y="305" width="45" height="48.6" fill="url(#fcfNeg)" rx="3"/>
  <text x="217" y="365" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">-5.4</text>
  <text x="192" y="468" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2020</text>

  <!-- 2021: OCF=7.7 (h=69.3), FCF=-8.4 (h=75.6) -->
  <rect x="265" y="235.7" width="45" height="69.3" fill="url(#ocfGrad)" rx="3"/>
  <text x="287" y="230" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">7.7</text>
  <rect x="315" y="305" width="45" height="75.6" fill="url(#fcfNeg)" rx="3"/>
  <text x="337" y="393" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">-8.4</text>
  <text x="312" y="468" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2021</text>

  <!-- 2022: OCF=4.2 (h=37.8), FCF=-13.1 (h=117.9) -->
  <rect x="385" y="267.2" width="45" height="37.8" fill="url(#ocfGrad)" rx="3"/>
  <text x="407" y="261" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">4.2</text>
  <rect x="435" y="305" width="45" height="117.9" fill="url(#fcfNeg)" rx="3"/>
  <text x="457" y="435" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">-13.1</text>
  <text x="432" y="468" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2022</text>

  <!-- 2023: OCF=9.6 (h=86.4), FCF=-6.2 (h=55.8) -->
  <rect x="505" y="218.6" width="45" height="86.4" fill="url(#ocfGrad)" rx="3"/>
  <text x="527" y="213" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">9.6</text>
  <rect x="555" y="305" width="45" height="55.8" fill="url(#fcfNeg)" rx="3"/>
  <text x="577" y="373" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">-6.2</text>
  <text x="552" y="468" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2023</text>

  <!-- 2024: OCF=15.9 (h=143.1), FCF=-0.6 (h=5.4) -->
  <rect x="625" y="161.9" width="45" height="143.1" fill="url(#ocfGrad)" rx="3"/>
  <text x="647" y="156" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">15.9</text>
  <rect x="675" y="305" width="45" height="5.4" fill="url(#fcfNeg)" rx="3"/>
  <text x="697" y="325" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">-0.6</text>
  <text x="672" y="468" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2024</text>

  <!-- 2025: OCF=20.9 (h=188.1), FCF=+3.9 (h=35.1) — HIGHLIGHT -->
  <rect x="745" y="116.9" width="45" height="188.1" fill="url(#ocfGrad)" rx="3"/>
  <text x="767" y="111" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">20.9</text>
  <rect x="795" y="269.9" width="45" height="35.1" fill="url(#fcfPos)" rx="3" stroke="#fbbf24" stroke-width="2"/>
  <text x="817" y="264" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">+3.9</text>
  <text x="792" y="468" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2025</text>

  <!-- Highlight annotation for 2025 FCF -->
  <rect x="740" y="244" width="100" height="18" fill="#fbbf24" fill-opacity="0.15" rx="9"/>
  <text x="790" y="256" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700">FCF 첫 흑자 전환!</text>

  <!-- Legend -->
  <rect x="300" y="490" width="14" height="12" fill="url(#ocfGrad)" rx="2"/>
  <text x="320" y="501" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업현금흐름(OCF)</text>
  <rect x="460" y="490" width="14" height="12" fill="url(#fcfNeg)" rx="2"/>
  <text x="480" y="501" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">잉여현금흐름(FCF)</text>
</svg>