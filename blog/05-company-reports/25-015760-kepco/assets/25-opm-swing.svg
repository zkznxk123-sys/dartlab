<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="areaPos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="areaNeg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="#0a0e1a" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">한국전력 OPM 스윙 59.6%p — 한국 대기업 최대 진폭</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">영업이익률(%) | 2020~2025 | 저점 -45.8% ~ 고점 13.8%</text>

  <!-- Chart area: x=120..820, y=80..420 -->
  <!-- Y range: -50% ~ +20%, total 70pp -->
  <!-- scale: 1pp = 340/70 = 4.857px -->
  <!-- zero line: y = 80 + 20*4.857 = 177.1 -->

  <!-- Grid lines -->
  <line x1="120" y1="80" x2="820" y2="80" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="128.6" x2="820" y2="128.6" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="177.1" x2="820" y2="177.1" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="120" y1="225.7" x2="820" y2="225.7" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="274.3" x2="820" y2="274.3" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="322.9" x2="820" y2="322.9" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="371.4" x2="820" y2="371.4" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="420" x2="820" y2="420" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y labels -->
  <text x="110" y="84" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">20%</text>
  <text x="110" y="133" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">10%</text>
  <text x="110" y="181" text-anchor="end" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">0%</text>
  <text x="110" y="230" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-10%</text>
  <text x="110" y="278" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-20%</text>
  <text x="110" y="327" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-30%</text>
  <text x="110" y="375" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-40%</text>
  <text x="110" y="424" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-50%</text>

  <!-- Data points x positions: 6 points across 120..820 = spacing 140 -->
  <!-- 2020: 7.0% → y=177.1-7*4.857=143.1 -->
  <!-- 2021: -9.7% → y=177.1+9.7*4.857=224.2 -->
  <!-- 2022: -45.8% → y=177.1+45.8*4.857=399.4 -->
  <!-- 2023: -5.1% → y=177.1+5.1*4.857=201.9 -->
  <!-- 2024: 9.0% → y=177.1-9*4.857=133.4 -->
  <!-- 2025: 13.8% → y=177.1-13.8*4.857=110.1 -->

  <!-- Positive area (above 0 line) -->
  <path d="M 120,143.1 L 260,177.1 L 260,177.1 L 120,177.1 Z" fill="url(#areaPos)"/>
  <path d="M 540,177.1 L 680,133.4 L 820,110.1 L 820,177.1 L 540,177.1 Z" fill="url(#areaPos)"/>

  <!-- Negative area (below 0 line) -->
  <path d="M 120,177.1 L 260,224.2 L 400,399.4 L 540,201.9 L 540,177.1 L 400,177.1 L 260,177.1 Z" fill="url(#areaNeg)"/>

  <!-- Line -->
  <polyline points="120,143.1 260,224.2 400,399.4 540,201.9 680,133.4 820,110.1"
    fill="none" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data dots -->
  <circle cx="120" cy="143.1" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="260" cy="224.2" r="6" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="400" cy="399.4" r="8" fill="#ef4444" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="540" cy="201.9" r="6" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="680" cy="133.4" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="820" cy="110.1" r="8" fill="#22c55e" stroke="#fbbf24" stroke-width="3"/>

  <!-- Value labels -->
  <text x="120" y="130" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">7.0%</text>
  <text x="260" y="244" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">-9.7%</text>
  <text x="400" y="425" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">-45.8%</text>
  <text x="540" y="222" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">-5.1%</text>
  <text x="680" y="120" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">9.0%</text>
  <text x="820" y="97" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">13.8%</text>

  <!-- X labels (years) -->
  <text x="120" y="450" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2020</text>
  <text x="260" y="450" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2021</text>
  <text x="400" y="450" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2022</text>
  <text x="540" y="450" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2023</text>
  <text x="680" y="450" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2024</text>
  <text x="820" y="450" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2025</text>

  <!-- Swing arrow: from lowest point to highest -->
  <line x1="415" y1="399.4" x2="415" y2="110.1" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="415,110.1 410,122 420,122" fill="#fbbf24"/>
  <polygon points="415,399.4 410,387 420,387" fill="#fbbf24"/>

  <!-- Swing label -->
  <rect x="425" y="240" width="100" height="30" fill="#fbbf24" fill-opacity="0.15" rx="6"/>
  <text x="475" y="260" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">59.6%p</text>

  <!-- Low point annotation -->
  <rect x="310" y="380" width="80" height="18" fill="#ef4444" fill-opacity="0.2" rx="4"/>
  <text x="350" y="393" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">역대 저점</text>

  <!-- High point annotation -->
  <rect x="750" y="86" width="80" height="18" fill="#22c55e" fill-opacity="0.2" rx="4"/>
  <text x="790" y="99" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600">5년 고점</text>

  <!-- Bottom note -->
  <text x="450" y="485" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-style="italic">전력 요금 인가제 + 연료비 전가 불가 = 비용 변동이 OPM에 100% 반영</text>
</svg>