<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="480" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">에코프로 매출원가율 — 83%에서 102%, 팔수록 적자로 역전</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="12">2020–2024 · 매출원가/매출 비율 (%) · 100% 초과 = 팔수록 손해</text>

  <!-- Chart area: x=100..720, y=80..390 -->
  <!-- Y axis: 70%–110% -->
  <text x="60" y="96" fill="#64748b" font-size="10" text-anchor="end">110%</text>
  <text x="60" y="173.5" fill="#64748b" font-size="10" text-anchor="end">100%</text>
  <text x="60" y="251" fill="#64748b" font-size="10" text-anchor="end">90%</text>
  <text x="60" y="328.5" fill="#64748b" font-size="10" text-anchor="end">80%</text>
  <text x="60" y="396" fill="#64748b" font-size="10" text-anchor="end">70%</text>

  <!-- Grid -->
  <line x1="70" y1="90" x2="720" y2="90" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="70" y1="167.5" x2="720" y2="167.5" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="70" y1="245" x2="720" y2="245" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="70" y1="322.5" x2="720" y2="322.5" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="70" y1="390" x2="720" y2="390" stroke="#1e293b" stroke-width="1"/>

  <!-- 100% danger line -->
  <line x1="70" y1="167.5" x2="720" y2="167.5" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="726" y="172" fill="#ef4444" font-size="10" font-weight="700">100%</text>
  <text x="726" y="184" fill="#ef4444" font-size="9">위험선</text>

  <!-- y = 390 - ((val-70)/40)*300 -->
  <!-- 83.1→291.8, 85.9→270.8, 93.1→216.8, 102.5→145.6 -->
  <!-- X: 2020=165, 2022=345, 2023=475, 2024=605 (skip 2021) -->

  <!-- Area fill below line (safe zone green) -->
  <polygon points="165,291.8 345,270.8 475,216.8 475,390 345,390 165,390"
    fill="#22c55e" opacity="0.12"/>

  <!-- Area fill above 100% (danger zone red) -->
  <!-- 2024 is above 100% line (167.5). Interpolate crossing between 2023(216.8) and 2024(145.6) -->
  <!-- crossing x: 475 + (216.8-167.5)/(216.8-145.6) * 130 = 475 + 49.3/71.2*130 = 475 + 89.97 ≈ 565 -->
  <polygon points="565,167.5 605,145.6 605,167.5"
    fill="#ef4444" opacity="0.25"/>

  <!-- Line -->
  <polyline points="165,291.8 345,270.8 475,216.8 605,145.6"
    fill="none" stroke="#f1f5f9" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Dots -->
  <circle cx="165" cy="291.8" r="6" fill="#22c55e"/>
  <circle cx="345" cy="270.8" r="6" fill="#22c55e"/>
  <circle cx="475" cy="216.8" r="6" fill="#f59e0b"/>
  <circle cx="605" cy="145.6" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>

  <!-- Labels -->
  <text x="165" y="284" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">83.1%</text>
  <text x="345" y="263" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">85.9%</text>
  <text x="475" y="209" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle">93.1%</text>
  <text x="605" y="136" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">102.5%</text>

  <!-- 2024 callout -->
  <rect x="548" y="105" width="114" height="24" rx="5" fill="#ef444430" stroke="#ef4444" stroke-width="1"/>
  <text x="605" y="121" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">팔수록 적자</text>

  <!-- 2021 no data -->
  <text x="255" y="310" fill="#64748b" font-size="10" text-anchor="middle" font-style="italic">2021 데이터 없음</text>

  <!-- X labels -->
  <text x="165" y="415" fill="#f1f5f9" font-size="12" text-anchor="middle">2020</text>
  <text x="255" y="415" fill="#64748b" font-size="12" text-anchor="middle">2021</text>
  <text x="345" y="415" fill="#f1f5f9" font-size="12" text-anchor="middle">2022</text>
  <text x="475" y="415" fill="#f1f5f9" font-size="12" text-anchor="middle">2023</text>
  <text x="605" y="415" fill="#f1f5f9" font-size="12" text-anchor="middle">2024</text>

  <!-- Bottom note -->
  <text x="400" y="455" text-anchor="middle" fill="#64748b" font-size="11">매출원가율 100% 초과 = 제품 원가가 판매가를 넘어선 상태</text>
</svg>