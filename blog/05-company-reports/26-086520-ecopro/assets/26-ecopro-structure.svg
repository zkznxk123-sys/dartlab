<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="520" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">에코프로 그룹 구조 — 지주사의 실체</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="12">지분 구조 + 주요 자회사 매출 비중</text>

  <!-- Defs -->
  <defs>
    <linearGradient id="bmGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Top: Owner -->
  <rect x="300" y="78" width="200" height="44" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="400" y="100" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">이동채 일가</text>
  <text x="400" y="115" text-anchor="middle" fill="#64748b" font-size="10">최대주주</text>

  <!-- Arrow down to Daisy -->
  <line x1="400" y1="122" x2="400" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
  </marker></defs>
  <text x="420" y="140" fill="#64748b" font-size="9">100%</text>

  <!-- Daisy Partners -->
  <rect x="300" y="148" width="200" height="38" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="400" y="172" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">데이지파트너스</text>

  <!-- Arrow from Daisy to EcoPro BM (direct) -->
  <path d="M400,186 L400,206 L580,206 L580,290" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="500" y="200" fill="#64748b" font-size="9">지분 보유</text>

  <!-- Arrow down from Daisy to EcoPro Holding -->
  <line x1="400" y1="186" x2="400" y2="230" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <defs><marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
  </marker></defs>

  <!-- EcoPro Holding (Center) -->
  <rect x="300" y="230" width="200" height="50" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="400" y="253" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">에코프로</text>
  <text x="400" y="270" text-anchor="middle" fill="#64748b" font-size="10">086520 · 지주회사</text>

  <!-- Arrows down to subsidiaries -->
  <line x1="260" y1="280" x2="120" y2="310" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="360" y1="280" x2="310" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="440" y1="280" x2="490" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="540" y1="280" x2="660" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
  </marker></defs>

  <!-- Subsidiary 1: EcoPro BM (LARGE, emphasized) -->
  <rect x="30" y="310" width="190" height="110" rx="12" fill="url(#bmGlow)" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <text x="125" y="338" text-anchor="middle" fill="#22c55e" font-size="15" font-weight="700">에코프로BM</text>
  <text x="125" y="358" text-anchor="middle" fill="#22c55e" font-size="12">247160</text>
  <line x1="55" y1="368" x2="195" y2="368" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
  <text x="125" y="388" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">매출 비중 95%</text>
  <text x="125" y="408" text-anchor="middle" fill="#64748b" font-size="10">양극재 · 핵심 사업</text>

  <!-- Subsidiary 2: Innovation -->
  <rect x="240" y="310" width="140" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="310" y="340" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">이노베이션</text>
  <text x="310" y="358" text-anchor="middle" fill="#64748b" font-size="10">친환경 소재</text>
  <text x="310" y="378" text-anchor="middle" fill="#64748b" font-size="10">매출 비중 2%</text>

  <!-- Subsidiary 3: HN -->
  <rect x="420" y="310" width="140" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="490" y="340" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">에이치엔</text>
  <text x="490" y="358" text-anchor="middle" fill="#64748b" font-size="10">수소·리사이클</text>
  <text x="490" y="378" text-anchor="middle" fill="#64748b" font-size="10">매출 비중 2%</text>

  <!-- Subsidiary 4: Materials -->
  <rect x="590" y="310" width="170" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="675" y="340" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">머티리얼즈</text>
  <text x="675" y="358" text-anchor="middle" fill="#64748b" font-size="10">전구체</text>
  <text x="675" y="378" text-anchor="middle" fill="#64748b" font-size="10">매출 비중 1%</text>

  <!-- Bottom callout -->
  <rect x="200" y="450" width="400" height="42" rx="8" fill="#fbbf2415" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="470" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">지주사 에코프로의 가치 = 에코프로BM 지분 가치</text>
  <text x="400" y="486" text-anchor="middle" fill="#64748b" font-size="10">자체 매출 거의 없음. BM 실적이 곧 그룹 실적.</text>
</svg>