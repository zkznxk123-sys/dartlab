<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="480" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">리튬 가격이 에코프로 매출을 지배한다 — 가격 -75%, 매출 -57%</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="12">2020–2024 · 리튬 가격($/kg) vs 에코프로 연결 매출(조 원)</text>

  <!-- Chart area: x=90..750, y=80..400 -->
  <!-- Y-axis left: Lithium price 0–90 -->
  <text x="30" y="85" fill="#fbbf24" font-size="11" text-anchor="middle">$/kg</text>
  <text x="55" y="96" fill="#64748b" font-size="10" text-anchor="end">90</text>
  <text x="55" y="176" fill="#64748b" font-size="10" text-anchor="end">60</text>
  <text x="55" y="256" fill="#64748b" font-size="10" text-anchor="end">30</text>
  <text x="55" y="336" fill="#64748b" font-size="10" text-anchor="end">0</text>
  <line x1="60" y1="90" x2="60" y2="400" stroke="#1e293b" stroke-width="1"/>

  <!-- Y-axis right: Revenue 0–8 조 -->
  <text x="770" y="85" fill="#22c55e" font-size="11" text-anchor="middle">조 원</text>
  <text x="758" y="96" fill="#64748b" font-size="10" text-anchor="start">8</text>
  <text x="758" y="176" fill="#64748b" font-size="10" text-anchor="start">6</text>
  <text x="758" y="256" fill="#64748b" font-size="10" text-anchor="start">4</text>
  <text x="758" y="336" fill="#64748b" font-size="10" text-anchor="start">2</text>
  <text x="758" y="400" fill="#64748b" font-size="10" text-anchor="start">0</text>
  <line x1="750" y1="90" x2="750" y2="400" stroke="#1e293b" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="60" y1="90" x2="750" y2="90" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="170.7" x2="750" y2="170.7" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="251.4" x2="750" y2="251.4" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="332.1" x2="750" y2="332.1" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="400" x2="750" y2="400" stroke="#1e293b" stroke-width="1"/>

  <!-- X positions: 2020=142, 2021=280, 2022=418, 2023=556, 2024=694 -->
  <!-- Lithium price: y = 400 - (price/90)*310 -->
  <!-- 10→365.6, 30→296.7, 85→97.6, 40→262.2, 23→320.8 -->
  <polyline points="142,365.6 280,296.7 418,97.6 556,262.2 694,320.8"
    fill="none" stroke="#fbbf24" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="142" cy="365.6" r="5" fill="#fbbf24"/>
  <circle cx="280" cy="296.7" r="5" fill="#fbbf24"/>
  <circle cx="418" cy="97.6" r="6" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="556" cy="262.2" r="5" fill="#fbbf24"/>
  <circle cx="694" cy="320.8" r="5" fill="#fbbf24"/>
  <text x="142" y="358" fill="#fbbf24" font-size="10" text-anchor="middle">$10</text>
  <text x="280" y="289" fill="#fbbf24" font-size="10" text-anchor="middle">$30</text>
  <text x="418" y="88" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">$85</text>
  <text x="556" y="255" fill="#fbbf24" font-size="10" text-anchor="middle">$40</text>
  <text x="694" y="313" fill="#fbbf24" font-size="10" text-anchor="middle">$23</text>

  <!-- Revenue: y = 400 - (rev/8)*310 -->
  <!-- 0.95→363.2, 1.5→341.9, 5.6→183.0, 7.3→117.1, 3.1→280.0 -->
  <polyline points="142,363.2 280,341.9 418,183.0 556,117.1 694,280.0"
    fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="142" cy="363.2" r="5" fill="#22c55e"/>
  <circle cx="280" cy="341.9" r="5" fill="#22c55e"/>
  <circle cx="418" cy="183.0" r="5" fill="#22c55e"/>
  <circle cx="556" cy="117.1" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="694" cy="280.0" r="5" fill="#22c55e"/>
  <text x="142" y="380" fill="#22c55e" font-size="10" text-anchor="middle">0.95조</text>
  <text x="280" y="356" fill="#22c55e" font-size="10" text-anchor="middle">1.5조</text>
  <text x="418" y="198" fill="#22c55e" font-size="10" text-anchor="middle">5.6조</text>
  <text x="556" y="110" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">7.3조</text>
  <text x="694" y="273" fill="#22c55e" font-size="10" text-anchor="middle">3.1조</text>

  <!-- 2022 peak annotation -->
  <rect x="378" y="62" width="80" height="22" rx="4" fill="#fbbf2420" stroke="#fbbf24" stroke-width="1"/>
  <text x="418" y="78" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">2022 피크</text>

  <!-- X labels -->
  <text x="142" y="420" fill="#f1f5f9" font-size="12" text-anchor="middle">2020</text>
  <text x="280" y="420" fill="#f1f5f9" font-size="12" text-anchor="middle">2021</text>
  <text x="418" y="420" fill="#f1f5f9" font-size="12" text-anchor="middle">2022</text>
  <text x="556" y="420" fill="#f1f5f9" font-size="12" text-anchor="middle">2023</text>
  <text x="694" y="420" fill="#f1f5f9" font-size="12" text-anchor="middle">2024</text>

  <!-- Legend -->
  <line x1="260" y1="452" x2="290" y2="452" stroke="#fbbf24" stroke-width="3"/>
  <text x="296" y="456" fill="#fbbf24" font-size="11">리튬 가격 ($/kg)</text>
  <line x1="440" y1="452" x2="470" y2="452" stroke="#22c55e" stroke-width="3"/>
  <text x="476" y="456" fill="#22c55e" font-size="11">에코프로 매출 (조 원)</text>
</svg>