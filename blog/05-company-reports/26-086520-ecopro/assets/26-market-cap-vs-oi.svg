<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="480" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">에코프로 시총 78조 vs 영업이익 864억 — PER 900배의 실체</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="12">2020–2024 · 시가총액(조 원) vs 영업이익(억 원)</text>

  <!-- Chart area: x=90..720, y=80..390 -->
  <!-- Y left: Market cap 0–35조. y = 390 - (val/35)*310 -->
  <!-- Y right: Operating income -4000–8000. y = 390 - ((val+4000)/12000)*310 -->

  <!-- Y-axis left labels -->
  <text x="30" y="85" fill="#fbbf24" font-size="11" text-anchor="middle">시총</text>
  <text x="55" y="96" fill="#64748b" font-size="10" text-anchor="end">35조</text>
  <text x="55" y="185" fill="#64748b" font-size="10" text-anchor="end">25조</text>
  <text x="55" y="274" fill="#64748b" font-size="10" text-anchor="end">15조</text>
  <text x="55" y="363" fill="#64748b" font-size="10" text-anchor="end">5조</text>
  <line x1="60" y1="84" x2="60" y2="390" stroke="#1e293b" stroke-width="1"/>

  <!-- Y-axis right labels -->
  <text x="770" y="85" fill="#ef4444" font-size="11" text-anchor="middle">영업이익</text>
  <text x="758" y="96" fill="#64748b" font-size="10" text-anchor="start">8,000억</text>
  <text x="758" y="200" fill="#64748b" font-size="10" text-anchor="start">4,000억</text>
  <text x="758" y="288" fill="#64748b" font-size="10" text-anchor="start">0</text>
  <text x="758" y="392" fill="#64748b" font-size="10" text-anchor="start">-4,000억</text>
  <line x1="720" y1="84" x2="720" y2="390" stroke="#1e293b" stroke-width="1"/>

  <!-- Grid -->
  <line x1="60" y1="84" x2="720" y2="84" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="184" x2="720" y2="184" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="287" x2="720" y2="287" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="390" x2="720" y2="390" stroke="#1e293b" stroke-width="1"/>

  <!-- X positions: 2020=155, 2021=287, 2022=419, 2023.7=537, 2024=650 -->

  <!-- Market cap area (yellow fill) -->
  <!-- 1→381.1, 5→345.7, 20→212.9, 30→124.3, 8→319.1 -->
  <polygon points="155,381.1 287,345.7 419,212.9 537,124.3 650,319.1 650,390 155,390"
    fill="#fbbf24" opacity="0.15"/>
  <polyline points="155,381.1 287,345.7 419,212.9 537,124.3 650,319.1"
    fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="155" cy="381.1" r="4" fill="#fbbf24"/>
  <circle cx="287" cy="345.7" r="4" fill="#fbbf24"/>
  <circle cx="419" cy="212.9" r="5" fill="#fbbf24"/>
  <circle cx="537" cy="124.3" r="7" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="650" cy="319.1" r="4" fill="#fbbf24"/>
  <text x="155" y="376" fill="#fbbf24" font-size="9" text-anchor="middle">~1조</text>
  <text x="287" y="340" fill="#fbbf24" font-size="9" text-anchor="middle">~5조</text>
  <text x="419" y="207" fill="#fbbf24" font-size="9" text-anchor="middle">~20조</text>
  <text x="537" y="115" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">~30조</text>
  <text x="650" y="314" fill="#fbbf24" font-size="9" text-anchor="middle">~8조</text>

  <!-- Operating income line (red) -->
  <!-- 824: 390-((824+4000)/12000)*310 = 390-124.6=265.4 -->
  <!-- 864: 265.4 (similar) -->
  <!-- 6132: 390-((6132+4000)/12000)*310 = 390-261.8=128.2 -->
  <!-- 2982: 390-((2982+4000)/12000)*310 = 390-180.3=209.7 -->
  <!-- -2930: 390-((-2930+4000)/12000)*310 = 390-27.6=362.4 -->
  <polyline points="155,265.4 287,264.3 419,128.2 537,209.7 650,362.4"
    fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="155" cy="265.4" r="4" fill="#ef4444"/>
  <circle cx="287" cy="264.3" r="4" fill="#ef4444"/>
  <circle cx="419" cy="128.2" r="5" fill="#ef4444"/>
  <circle cx="537" cy="209.7" r="4" fill="#ef4444"/>
  <circle cx="650" cy="362.4" r="5" fill="#ef4444"/>
  <text x="155" y="258" fill="#ef4444" font-size="9" text-anchor="middle">824억</text>
  <text x="287" y="257" fill="#ef4444" font-size="9" text-anchor="middle">864억</text>
  <text x="419" y="121" fill="#ef4444" font-size="9" text-anchor="middle">6,132억</text>
  <text x="537" y="225" fill="#ef4444" font-size="9" text-anchor="middle">2,982억</text>
  <text x="650" y="377" fill="#ef4444" font-size="9" text-anchor="middle">-2,930억</text>

  <!-- 2023.7 peak callout: gap between cap and OI -->
  <line x1="537" y1="130" x2="537" y2="205" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <rect x="469" y="145" width="136" height="40" rx="6" fill="#fbbf2420" stroke="#fbbf24" stroke-width="1"/>
  <text x="537" y="162" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">시총 30조</text>
  <text x="537" y="178" text-anchor="middle" fill="#fbbf24" font-size="10">영업이익 2,982억</text>

  <!-- X labels -->
  <text x="155" y="412" fill="#f1f5f9" font-size="12" text-anchor="middle">2020</text>
  <text x="287" y="412" fill="#f1f5f9" font-size="12" text-anchor="middle">2021</text>
  <text x="419" y="412" fill="#f1f5f9" font-size="12" text-anchor="middle">2022</text>
  <text x="537" y="412" fill="#f1f5f9" font-size="11" text-anchor="middle">2023.7</text>
  <text x="650" y="412" fill="#f1f5f9" font-size="12" text-anchor="middle">2024</text>

  <!-- Legend -->
  <rect x="240" y="440" width="14" height="14" rx="2" fill="#fbbf24" opacity="0.4"/>
  <text x="260" y="452" fill="#fbbf24" font-size="11">시가총액 (조 원)</text>
  <line x1="400" y1="447" x2="430" y2="447" stroke="#ef4444" stroke-width="3"/>
  <text x="436" y="452" fill="#ef4444" font-size="11">영업이익 (억 원)</text>
</svg>