<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="480" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">에코프로 이익 vs 현금 — 정반대로 움직인다</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="12">2020–2024 · 순이익 vs 영업현금흐름(OCF) · 단위: 억 원</text>

  <!-- Chart area: x=100..720, y=80..400. Zero line at y=240 -->
  <!-- Range: -6000 to 6000. Scale: 1 unit = (240-80)/6000 = 0.02667px per 억 -->
  <!-- y = 240 - val * 0.02667 -->

  <!-- Grid -->
  <line x1="80" y1="80" x2="720" y2="80" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="160" x2="720" y2="160" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="240" x2="720" y2="240" stroke="#f1f5f9" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="320" x2="720" y2="320" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="400" x2="720" y2="400" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y labels -->
  <text x="72" y="84" fill="#64748b" font-size="10" text-anchor="end">6,000</text>
  <text x="72" y="164" fill="#64748b" font-size="10" text-anchor="end">3,000</text>
  <text x="72" y="244" fill="#64748b" font-size="10" text-anchor="end">0</text>
  <text x="72" y="324" fill="#64748b" font-size="10" text-anchor="end">-3,000</text>
  <text x="72" y="404" fill="#64748b" font-size="10" text-anchor="end">-6,000</text>
  <text x="36" y="240" fill="#64748b" font-size="10" text-anchor="middle" transform="rotate(-90,36,240)">억 원</text>

  <!-- X positions: 2020=160, 2021=280, 2022=400, 2023=520, 2024=640 -->
  <!-- Bar width 42, gap 10 between NI and OCF -->
  <!-- NI: 542,2789,2206,1353,-2954 -->
  <!-- OCF: 1591,-1406,-5186,809,4888 -->

  <!-- 2020: NI=542→y=240-14.5=225.5 h=14.5, OCF=1591→y=240-42.4=197.6 h=42.4 -->
  <rect x="139" y="225.5" width="42" height="14.5" rx="3" fill="#60a5fa"/>
  <rect x="183" y="197.6" width="42" height="42.4" rx="3" fill="#22c55e"/>
  <text x="160" y="220" fill="#60a5fa" font-size="9" text-anchor="middle">542</text>
  <text x="204" y="192" fill="#22c55e" font-size="9" text-anchor="middle">1,591</text>

  <!-- 2021: NI=2789→y=240-74.3=165.7 h=74.3, OCF=-1406→y=240 h=37.5 -->
  <rect x="259" y="165.7" width="42" height="74.3" rx="3" fill="#60a5fa"/>
  <rect x="303" y="240" width="42" height="37.5" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="280" y="160" fill="#60a5fa" font-size="9" text-anchor="middle">2,789</text>
  <text x="324" y="286" fill="#ef4444" font-size="9" text-anchor="middle">-1,406</text>

  <!-- 2022: NI=2206→y=240-58.8=181.2 h=58.8, OCF=-5186→y=240 h=138.3 -->
  <rect x="379" y="181.2" width="42" height="58.8" rx="3" fill="#60a5fa"/>
  <rect x="423" y="240" width="42" height="138.3" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="400" y="176" fill="#60a5fa" font-size="9" text-anchor="middle">2,206</text>
  <text x="444" y="390" fill="#ef4444" font-size="9" text-anchor="middle">-5,186</text>

  <!-- 2023: NI=1353→y=240-36.1=203.9 h=36.1, OCF=809→y=240-21.6=218.4 h=21.6 -->
  <rect x="499" y="203.9" width="42" height="36.1" rx="3" fill="#60a5fa"/>
  <rect x="543" y="218.4" width="42" height="21.6" rx="3" fill="#22c55e"/>
  <text x="520" y="198" fill="#60a5fa" font-size="9" text-anchor="middle">1,353</text>
  <text x="564" y="213" fill="#22c55e" font-size="9" text-anchor="middle">809</text>

  <!-- 2024: NI=-2954→y=240 h=78.8, OCF=4888→y=240-130.3=109.7 h=130.3 -->
  <rect x="619" y="240" width="42" height="78.8" rx="3" fill="#ef4444" opacity="0.7"/>
  <rect x="663" y="109.7" width="42" height="130.3" rx="3" fill="#22c55e"/>
  <text x="640" y="330" fill="#ef4444" font-size="9" text-anchor="middle">-2,954</text>
  <text x="684" y="104" fill="#22c55e" font-size="9" text-anchor="middle">4,888</text>

  <!-- 2022 annotation -->
  <rect x="370" y="100" width="104" height="36" rx="5" fill="#fbbf2420" stroke="#fbbf24" stroke-width="1"/>
  <text x="422" y="114" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">이익 + 인데</text>
  <text x="422" y="130" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">현금은 -5,186</text>

  <!-- 2024 annotation -->
  <rect x="622" y="72" width="100" height="30" rx="5" fill="#22c55e20" stroke="#22c55e" stroke-width="1"/>
  <text x="672" y="92" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">적자인데 현금 회수</text>

  <!-- X labels -->
  <text x="182" y="430" fill="#f1f5f9" font-size="12" text-anchor="middle">2020</text>
  <text x="302" y="430" fill="#f1f5f9" font-size="12" text-anchor="middle">2021</text>
  <text x="422" y="430" fill="#f1f5f9" font-size="12" text-anchor="middle">2022</text>
  <text x="542" y="430" fill="#f1f5f9" font-size="12" text-anchor="middle">2023</text>
  <text x="662" y="430" fill="#f1f5f9" font-size="12" text-anchor="middle">2024</text>

  <!-- Legend -->
  <rect x="270" y="450" width="14" height="14" rx="2" fill="#60a5fa"/>
  <text x="290" y="462" fill="#60a5fa" font-size="11">순이익</text>
  <rect x="370" y="450" width="14" height="14" rx="2" fill="#22c55e"/>
  <text x="390" y="462" fill="#22c55e" font-size="11">영업현금흐름(OCF)</text>
</svg>