<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="400" fill="#0a0e1a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">쿠팡 CCC -55일 — 공급업체 돈으로 사업하는 구조</text>
  <text x="400" y="65" text-anchor="middle" fill="#64748b" font-size="13">DSI + DSO - DPO = CCC | 2024 기준</text>

  <!-- Timeline bar -->
  <rect x="100" y="150" width="600" height="8" fill="#1e293b" rx="4"/>

  <!-- DSI: 28 days (inventory) -->
  <rect x="100" y="140" width="168" height="28" fill="#3b82f6" rx="4" opacity="0.8"/>
  <text x="184" y="159" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">DSI 28일</text>
  <text x="184" y="185" text-anchor="middle" fill="#64748b" font-size="11">재고 보유</text>

  <!-- DSO: 4 days (receivables) -->
  <rect x="268" y="140" width="24" height="28" fill="#22c55e" rx="4" opacity="0.8"/>
  <text x="280" y="159" text-anchor="middle" fill="#f1f5f9" font-size="10">4</text>
  <text x="310" y="185" fill="#64748b" font-size="11">DSO 4일</text>

  <!-- DPO: 87 days (payables) -->
  <rect x="100" y="220" width="522" height="28" fill="#ef4444" rx="4" opacity="0.8"/>
  <text x="361" y="239" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">DPO 87일 — 공급업체 대금 지급 유예</text>

  <!-- CCC result -->
  <rect x="200" y="290" width="400" height="50" fill="#1e293b" rx="8" stroke="#fbbf24" stroke-width="2"/>
  <text x="400" y="312" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="bold">CCC = 28 + 4 - 87 = -55일</text>
  <text x="400" y="332" text-anchor="middle" fill="#64748b" font-size="12">"물건 팔기 전에 돈이 들어오고, 대금은 3달 뒤에 준다"</text>

  <!-- Flow arrows -->
  <text x="100" y="130" fill="#3b82f6" font-size="11">Day 0: 재고 매입</text>
  <text x="268" y="130" fill="#22c55e" font-size="11">Day 28: 판매</text>
  <text x="292" y="210" fill="#22c55e" font-size="11">Day 32: 현금 수취</text>
  <text x="622" y="240" fill="#ef4444" font-size="11">Day 87: 대금 지급</text>

  <!-- Comparison -->
  <text x="100" y="380" fill="#64748b" font-size="12">비교: 아마존 CCC -15일 | 일반 소매업 CCC +30~60일</text>
</svg>
