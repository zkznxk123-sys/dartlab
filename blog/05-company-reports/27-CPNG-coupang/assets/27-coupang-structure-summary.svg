<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="450" fill="#0a0e1a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">쿠팡 재무 구조 — 이커머스가 아니라 물류 금융 구조</text>
  <text x="400" y="65" text-anchor="middle" fill="#64748b" font-size="13">마진 0.06%의 비밀: CCC -55일 + DO 적자 보조 + 성장 의존</text>

  <!-- Central box: Revenue -->
  <rect x="300" y="90" width="200" height="50" fill="#1e293b" rx="8" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">Revenue $30.3B</text>
  <text x="400" y="130" text-anchor="middle" fill="#64748b" font-size="11">(2024)</text>

  <!-- GP box -->
  <rect x="100" y="170" width="180" height="45" fill="#1e293b" rx="6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="190" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">GP $8.8B (29.2%)</text>
  <text x="190" y="207" text-anchor="middle" fill="#64748b" font-size="10">개선 중: 16%→29%</text>

  <!-- SGA box -->
  <rect x="520" y="170" width="180" height="45" fill="#1e293b" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="610" y="190" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">SG&amp;A $8.4B (27.7%)</text>
  <text x="610" y="207" text-anchor="middle" fill="#64748b" font-size="10">물류 인프라 비용</text>

  <!-- Arrow to OP -->
  <line x1="190" y1="215" x2="350" y2="260" stroke="#3b82f6" stroke-width="1"/>
  <line x1="610" y1="215" x2="450" y2="260" stroke="#ef4444" stroke-width="1"/>

  <!-- OP box -->
  <rect x="300" y="250" width="200" height="45" fill="#1e293b" rx="6" stroke="#fbbf24" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">OP $436M (1.4%)</text>
  <text x="400" y="287" text-anchor="middle" fill="#64748b" font-size="10">PC +5% / DO -$1B</text>

  <!-- CCC box -->
  <rect x="80" y="320" width="200" height="55" fill="#1e293b" rx="6" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="180" y="342" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">CCC -55일</text>
  <text x="180" y="360" text-anchor="middle" fill="#64748b" font-size="10">DPO 87일 = 공급업체 자금</text>
  <text x="180" y="372" text-anchor="middle" fill="#64748b" font-size="10">OCF $1.9B > NI $154M</text>

  <!-- DO box -->
  <rect x="520" y="320" width="200" height="55" fill="#1e293b" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="620" y="342" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">DO 적자 $1B/yr</text>
  <text x="620" y="360" text-anchor="middle" fill="#64748b" font-size="10">이츠·플레이·대만·파페치</text>
  <text x="620" y="372" text-anchor="middle" fill="#64748b" font-size="10">캐시카우 미출현</text>

  <!-- Bottom conclusion -->
  <rect x="150" y="400" width="500" height="35" fill="#1e293b" rx="6" stroke="#f1f5f9" stroke-width="1"/>
  <text x="400" y="422" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">규모가 멈추면 구조가 무너진다 — 성장은 선택이 아니라 생존 조건</text>
</svg>
