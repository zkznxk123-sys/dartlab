<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="400" fill="#0a0e1a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">쿠팡 자본총계 — $7.6B 스윙 (2022→2023)</text>
  <text x="400" y="65" text-anchor="middle" fill="#64748b" font-size="13">2021~2024 | 단위: $B</text>

  <!-- Axes -->
  <line x1="120" y1="320" x2="700" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Zero line -->
  <line x1="120" y1="220" x2="700" y2="220" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="110" y="224" text-anchor="end" fill="#64748b" font-size="12">$0</text>
  <text x="110" y="154" text-anchor="end" fill="#64748b" font-size="12">+$4B</text>
  <text x="110" y="280" text-anchor="end" fill="#64748b" font-size="12">-$4B</text>

  <!-- Bars: 2021=-2.8, 2022=-3.5, 2023=+4.1, 2024=+2.2 -->
  <!-- Scale: $1B = 16.5px -->
  <!-- 2021: -2.8B → height=46, top=220 -->
  <rect x="180" y="220" width="80" height="46" fill="#ef4444" rx="4"/>
  <text x="220" y="280" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">-$2.8B</text>
  <text x="220" y="340" text-anchor="middle" fill="#64748b" font-size="13">2021</text>

  <!-- 2022: -3.5B → height=58, top=220 -->
  <rect x="310" y="220" width="80" height="58" fill="#ef4444" rx="4"/>
  <text x="350" y="292" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">-$3.5B</text>
  <text x="350" y="340" text-anchor="middle" fill="#64748b" font-size="13">2022</text>

  <!-- 2023: +4.1B → height=68, bottom=220 -->
  <rect x="440" y="152" width="80" height="68" fill="#22c55e" rx="4"/>
  <text x="480" y="142" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">+$4.1B</text>
  <text x="480" y="340" text-anchor="middle" fill="#64748b" font-size="13">2023</text>

  <!-- 2024: +2.2B → height=36, bottom=220 -->
  <rect x="570" y="184" width="80" height="36" fill="#22c55e" rx="4"/>
  <text x="610" y="174" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">+$2.2B</text>
  <text x="610" y="340" text-anchor="middle" fill="#64748b" font-size="13">2024</text>

  <!-- Swing arrow -->
  <path d="M350,278 C380,340 450,340 480,152" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="430" y="355" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">$7.6B swing</text>
</svg>
