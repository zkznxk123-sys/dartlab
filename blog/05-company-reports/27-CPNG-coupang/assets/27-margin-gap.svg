<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="400" fill="#0a0e1a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">쿠팡 GP 마진 vs OP 마진 — 29%를 벌어도 1.4%만 남는다</text>
  <text x="400" y="65" text-anchor="middle" fill="#64748b" font-size="13">2021~2024 | 단위: %</text>

  <!-- Axes -->
  <line x1="100" y1="320" x2="720" y2="320" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="90" y="105" text-anchor="end" fill="#64748b" font-size="12">30%</text>
  <text x="90" y="175" text-anchor="end" fill="#64748b" font-size="12">15%</text>
  <text x="90" y="245" text-anchor="end" fill="#64748b" font-size="12">0%</text>
  <text x="90" y="315" text-anchor="end" fill="#64748b" font-size="12">-15%</text>

  <!-- X axis labels -->
  <text x="210" y="345" text-anchor="middle" fill="#64748b" font-size="13">2021</text>
  <text x="370" y="345" text-anchor="middle" fill="#64748b" font-size="13">2022</text>
  <text x="530" y="345" text-anchor="middle" fill="#64748b" font-size="13">2023</text>
  <text x="690" y="345" text-anchor="middle" fill="#64748b" font-size="13">2024</text>

  <!-- GP Margin line (16, 22.9, 25.4, 29.2) -->
  <!-- Scale: 30% = y100, 0% = y245, -15% = y315 -->
  <!-- 1% = 4.83px from y245 upward -->
  <polyline points="210,168 370,134 530,122 690,104" fill="none" stroke="#22c55e" stroke-width="3"/>
  <circle cx="210" cy="168" r="5" fill="#22c55e"/>
  <circle cx="370" cy="134" r="5" fill="#22c55e"/>
  <circle cx="530" cy="122" r="5" fill="#22c55e"/>
  <circle cx="690" cy="104" r="5" fill="#22c55e"/>
  <text x="210" y="158" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">16.0%</text>
  <text x="370" y="124" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">22.9%</text>
  <text x="530" y="112" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">25.4%</text>
  <text x="690" y="94" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">29.2%</text>

  <!-- OP Margin line (-8.1, -0.5, 1.9, 1.4) -->
  <polyline points="210,284 370,247 530,236 690,238" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="210" cy="284" r="5" fill="#f59e0b"/>
  <circle cx="370" cy="247" r="5" fill="#f59e0b"/>
  <circle cx="530" cy="236" r="5" fill="#f59e0b"/>
  <circle cx="690" cy="238" r="5" fill="#f59e0b"/>
  <text x="210" y="300" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">-8.1%</text>
  <text x="370" y="263" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">-0.5%</text>
  <text x="530" y="226" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">1.9%</text>
  <text x="690" y="254" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">1.4%</text>

  <!-- Zero line -->
  <line x1="100" y1="245" x2="720" y2="245" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Legend -->
  <rect x="280" y="370" width="14" height="14" fill="#22c55e"/>
  <text x="300" y="382" fill="#f1f5f9" font-size="12">GP Margin</text>
  <rect x="420" y="370" width="14" height="14" fill="#f59e0b"/>
  <text x="440" y="382" fill="#f1f5f9" font-size="12">OP Margin</text>

  <!-- Gap annotation -->
  <line x1="700" y1="104" x2="700" y2="238" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="740" y="170" fill="#ef4444" font-size="11" font-weight="bold">GAP</text>
  <text x="740" y="185" fill="#ef4444" font-size="11">27.8%p</text>
</svg>
