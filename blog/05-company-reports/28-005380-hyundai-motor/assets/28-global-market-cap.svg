<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <text x="400" y="38" fill="#f1f5f9" font-size="17" font-weight="bold" text-anchor="middle">글로벌 자동차 시총 — 현대차 $97B, BYD $130B, 테슬라 $1T+</text>
  <text x="400" y="60" fill="#64748b" font-size="13" text-anchor="middle">2025년 4월 기준, 단위: $B (십억 달러)</text>

  <!-- Horizontal bar chart -->
  <!-- Max scale: $1,100B → full width 560px at x=160 to x=720 -->
  <!-- Per $1B = 0.509px -->

  <!-- Tesla $1,050B → width=535 -->
  <text x="150" y="110" fill="#94a3b8" font-size="14" text-anchor="end">테슬라</text>
  <rect x="160" y="93" width="535" height="30" rx="4" fill="#64748b" opacity="0.6"/>
  <text x="705" y="113" fill="#94a3b8" font-size="13" font-weight="bold" text-anchor="end">$1,050B</text>

  <!-- Toyota $249B → width=127 -->
  <text x="150" y="165" fill="#94a3b8" font-size="14" text-anchor="end">도요타</text>
  <rect x="160" y="148" width="127" height="30" rx="4" fill="#64748b" opacity="0.6"/>
  <text x="297" y="168" fill="#94a3b8" font-size="13" font-weight="bold" text-anchor="start">$249B</text>

  <!-- BYD $130B → width=66 -->
  <text x="150" y="220" fill="#94a3b8" font-size="14" text-anchor="end">BYD</text>
  <rect x="160" y="203" width="66" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="236" y="223" fill="#ef4444" font-size="13" font-weight="bold" text-anchor="start">$130B</text>

  <!-- Hyundai $97B → width=49 -->
  <text x="150" y="275" fill="#fbbf24" font-size="14" font-weight="bold" text-anchor="end">현대차</text>
  <rect x="160" y="258" width="49" height="30" rx="4" fill="#fbbf24" opacity="0.9"/>
  <text x="219" y="278" fill="#fbbf24" font-size="14" font-weight="bold" text-anchor="start">$97B</text>

  <!-- VW $55B → width=28 -->
  <text x="150" y="330" fill="#94a3b8" font-size="14" text-anchor="end">VW</text>
  <rect x="160" y="313" width="28" height="30" rx="4" fill="#64748b" opacity="0.6"/>
  <text x="198" y="333" fill="#94a3b8" font-size="13" font-weight="bold" text-anchor="start">$55B</text>

  <!-- Annotations -->
  <rect x="160" y="370" width="540" height="40" rx="6" fill="#fbbf24" opacity="0.06"/>
  <text x="430" y="387" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">현대차: 글로벌 판매 4위 → 시총 5위. BYD 대비 -25%, 도요타 대비 -61%</text>
  <text x="430" y="403" fill="#64748b" font-size="11" text-anchor="middle">테슬라 프리미엄은 소프트웨어·에너지 사업 포함 — 전통 OEM과 직접 비교 유의</text>

  <!-- Footer -->
  <text x="400" y="432" fill="#475569" font-size="11" text-anchor="middle">출처: Bloomberg, Yahoo Finance (2025.04 기준)</text>
</svg>