<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <text x="400" y="38" fill="#f1f5f9" font-size="17" font-weight="bold" text-anchor="middle">현대차 미국 판매 — 하이브리드 +61%가 EV +6%를 압도한다</text>
  <text x="400" y="60" fill="#64748b" font-size="13" text-anchor="middle">2024 Q1 vs 2025 Q1 파워트레인별 판매 비중 변화</text>

  <!-- Legend -->
  <rect x="240" y="78" width="14" height="14" rx="2" fill="#22c55e"/>
  <text x="260" y="90" fill="#94a3b8" font-size="12">HEV (하이브리드)</text>
  <rect x="380" y="78" width="14" height="14" rx="2" fill="#3b82f6"/>
  <text x="400" y="90" fill="#94a3b8" font-size="12">EV (전기차)</text>
  <rect x="500" y="78" width="14" height="14" rx="2" fill="#475569"/>
  <text x="520" y="90" fill="#94a3b8" font-size="12">ICE (내연기관)</text>

  <!-- 2024 Q1 stacked bar -->
  <text x="280" y="145" fill="#f1f5f9" font-size="15" font-weight="bold" text-anchor="middle">2024 Q1</text>
  <!-- ICE 78% → width=390 -->
  <rect x="100" y="160" width="390" height="60" rx="0" fill="#475569" opacity="0.7"/>
  <text x="295" y="196" fill="#94a3b8" font-size="13" text-anchor="middle">ICE 78%</text>
  <!-- HEV 13% → width=65 -->
  <rect x="490" y="160" width="65" height="60" rx="0" fill="#22c55e" opacity="0.8"/>
  <text x="522" y="196" fill="#0a0e1a" font-size="12" font-weight="bold" text-anchor="middle">13%</text>
  <!-- EV 9% → width=45 -->
  <rect x="555" y="160" width="45" height="60" rx="0" fill="#3b82f6" opacity="0.8"/>
  <text x="577" y="196" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">9%</text>

  <!-- 2025 Q1 stacked bar -->
  <text x="280" y="270" fill="#f1f5f9" font-size="15" font-weight="bold" text-anchor="middle">2025 Q1</text>
  <!-- ICE 68% → width=340 -->
  <rect x="100" y="285" width="340" height="60" rx="0" fill="#475569" opacity="0.7"/>
  <text x="270" y="321" fill="#94a3b8" font-size="13" text-anchor="middle">ICE 68%</text>
  <!-- HEV 22% → width=110 -->
  <rect x="440" y="285" width="110" height="60" rx="0" fill="#22c55e" opacity="0.9"/>
  <text x="495" y="321" fill="#0a0e1a" font-size="13" font-weight="bold" text-anchor="middle">22%</text>
  <!-- EV 10% → width=50 -->
  <rect x="550" y="285" width="50" height="60" rx="0" fill="#3b82f6" opacity="0.8"/>
  <text x="575" y="321" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">10%</text>

  <!-- Growth arrows -->
  <text x="522" y="247" fill="#22c55e" font-size="14" font-weight="bold" text-anchor="middle">+61%</text>
  <line x1="522" y1="220" x2="495" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="577" y="247" fill="#3b82f6" font-size="13" text-anchor="middle">+6%</text>

  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Annotation -->
  <rect x="140" y="375" width="520" height="36" rx="6" fill="#22c55e" opacity="0.08"/>
  <text x="400" y="398" fill="#22c55e" font-size="13" font-weight="bold" text-anchor="middle">HEV 비중 13% → 22% (+9%p) — 관세 회피 + IRA 보조금 유지 전략의 결과</text>

  <!-- Footer -->
  <text x="400" y="430" fill="#475569" font-size="11" text-anchor="middle">출처: Hyundai Motor America Sales Report (2025 Q1)</text>
</svg>