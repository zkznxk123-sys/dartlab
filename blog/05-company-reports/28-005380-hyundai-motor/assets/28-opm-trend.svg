<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <text x="400" y="40" fill="#f1f5f9" font-size="18" font-weight="bold" text-anchor="middle">현대차 OPM 추이 — 9.3%에서 6.2%로, 2년간 3.1%p 하락</text>
  <text x="400" y="62" fill="#64748b" font-size="13" text-anchor="middle">매출은 역대 최대인데 마진은 역행</text>

  <!-- Grid -->
  <line x1="100" y1="90" x2="100" y2="320" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="320" x2="720" y2="320" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="200" x2="720" y2="200" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="140" x2="720" y2="140" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="260" x2="720" y2="260" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Y labels -->
  <text x="90" y="95" fill="#64748b" font-size="11" text-anchor="end">10%</text>
  <text x="90" y="145" fill="#64748b" font-size="11" text-anchor="end">8%</text>
  <text x="90" y="205" fill="#64748b" font-size="11" text-anchor="end">6%</text>
  <text x="90" y="265" fill="#64748b" font-size="11" text-anchor="end">4%</text>

  <!-- X labels -->
  <text x="162" y="345" fill="#94a3b8" font-size="13" text-anchor="middle">2021</text>
  <text x="286" y="345" fill="#94a3b8" font-size="13" text-anchor="middle">2022</text>
  <text x="410" y="345" fill="#94a3b8" font-size="13" text-anchor="middle">2023</text>
  <text x="534" y="345" fill="#94a3b8" font-size="13" text-anchor="middle">2024</text>
  <text x="658" y="345" fill="#94a3b8" font-size="13" text-anchor="middle">2025</text>

  <!-- OPM line: 5.7, 6.9, 9.3, 8.1, 6.2 → scaled: 10%=90, 4%=320, range 230px for 6%p -->
  <!-- 5.7% → 320 - (5.7-4)/6*230 = 320 - 65.2 = 254.8 -->
  <!-- 6.9% → 320 - (6.9-4)/6*230 = 320 - 111.2 = 208.8 -->
  <!-- 9.3% → 320 - (9.3-4)/6*230 = 320 - 203.2 = 116.8 -->
  <!-- 8.1% → 320 - (8.1-4)/6*230 = 320 - 157.2 = 162.8 -->
  <!-- 6.2% → 320 - (6.2-4)/6*230 = 320 - 84.3 = 235.7 -->

  <polyline points="162,254.8 286,208.8 410,116.8 534,162.8 658,235.7" fill="none" stroke="#fbbf24" stroke-width="3"/>

  <!-- Dots -->
  <circle cx="162" cy="254.8" r="6" fill="#fbbf24"/>
  <circle cx="286" cy="208.8" r="6" fill="#fbbf24"/>
  <circle cx="410" cy="116.8" r="6" fill="#22c55e"/>
  <circle cx="534" cy="162.8" r="6" fill="#fbbf24"/>
  <circle cx="658" cy="235.7" r="6" fill="#ef4444"/>

  <!-- Labels -->
  <text x="162" y="244" fill="#f1f5f9" font-size="13" font-weight="bold" text-anchor="middle">5.7%</text>
  <text x="286" y="198" fill="#f1f5f9" font-size="13" font-weight="bold" text-anchor="middle">6.9%</text>
  <text x="410" y="106" fill="#22c55e" font-size="14" font-weight="bold" text-anchor="middle">9.3%</text>
  <text x="534" y="152" fill="#f1f5f9" font-size="13" font-weight="bold" text-anchor="middle">8.1%</text>
  <text x="658" y="225" fill="#ef4444" font-size="14" font-weight="bold" text-anchor="middle">6.2%</text>

  <!-- Arrow annotation -->
  <text x="534" y="90" fill="#ef4444" font-size="12" text-anchor="middle">-3.1%p (2년)</text>
  <line x1="430" y1="116.8" x2="640" y2="235.7" stroke="#ef4444" stroke-width="1" stroke-dasharray="6"/>
</svg>