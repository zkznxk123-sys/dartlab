<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <text x="400" y="38" fill="#f1f5f9" font-size="17" font-weight="bold" text-anchor="middle">미국 자동차 관세 — 한국 25% vs 일본 15%, 10%p 차등의 무게</text>
  <text x="400" y="60" fill="#64748b" font-size="13" text-anchor="middle">2025년 4월 기준 주요 수출국별 자동차 관세율</text>

  <!-- Grid -->
  <line x1="160" y1="90" x2="160" y2="340" stroke="#1e293b" stroke-width="1"/>
  <line x1="160" y1="340" x2="720" y2="340" stroke="#1e293b" stroke-width="1"/>
  <line x1="160" y1="90" x2="720" y2="90" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="160" y1="153" x2="720" y2="153" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="160" y1="215" x2="720" y2="215" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="160" y1="278" x2="720" y2="278" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Y axis labels (0%, 10%, 20%, 30%) -->
  <text x="148" y="344" fill="#64748b" font-size="11" text-anchor="end">0%</text>
  <text x="148" y="281" fill="#64748b" font-size="11" text-anchor="end">10%</text>
  <text x="148" y="219" fill="#64748b" font-size="11" text-anchor="end">20%</text>
  <text x="148" y="156" fill="#64748b" font-size="11" text-anchor="end">30%</text>

  <!-- Scale: 0%=340, 30%=90, range=250px, per 1%=8.33px -->

  <!-- Korea 25% → 340 - 25*8.33 = 131.75 height=208.25 -->
  <rect x="200" y="131.75" width="90" height="208.25" rx="4" fill="#ef4444" opacity="0.9"/>
  <text x="245" y="122" fill="#ef4444" font-size="16" font-weight="bold" text-anchor="middle">25%</text>
  <text x="245" y="370" fill="#f1f5f9" font-size="14" font-weight="bold" text-anchor="middle">한국</text>

  <!-- Japan 15% → 340 - 15*8.33 = 215.05 height=124.95 -->
  <rect x="330" y="215.05" width="90" height="124.95" rx="4" fill="#3b82f6" opacity="0.9"/>
  <text x="375" y="205" fill="#3b82f6" font-size="16" font-weight="bold" text-anchor="middle">15%</text>
  <text x="375" y="370" fill="#f1f5f9" font-size="14" text-anchor="middle">일본</text>

  <!-- EU 25% → same as Korea -->
  <rect x="460" y="131.75" width="90" height="208.25" rx="4" fill="#64748b" opacity="0.7"/>
  <text x="505" y="122" fill="#94a3b8" font-size="16" font-weight="bold" text-anchor="middle">25%</text>
  <text x="505" y="370" fill="#94a3b8" font-size="14" text-anchor="middle">EU</text>

  <!-- China 27.5% → 340 - 27.5*8.33 = 111 height=229 -->
  <rect x="590" y="111" width="90" height="229" rx="4" fill="#64748b" opacity="0.7"/>
  <text x="635" y="101" fill="#94a3b8" font-size="16" font-weight="bold" text-anchor="middle">27.5%</text>
  <text x="635" y="370" fill="#94a3b8" font-size="14" text-anchor="middle">중국</text>

  <!-- 10%p gap annotation -->
  <line x1="245" y1="131.75" x2="375" y2="131.75" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5"/>
  <line x1="375" y1="131.75" x2="375" y2="215.05" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5"/>
  <rect x="280" y="155" width="86" height="30" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="323" y="175" fill="#ef4444" font-size="14" font-weight="bold" text-anchor="middle">10%p 갭</text>

  <!-- Footer -->
  <text x="400" y="405" fill="#475569" font-size="11" text-anchor="middle">출처: White House Executive Order (2025.04), 상호관세 포함 실효세율</text>
</svg>