<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">Nike 자사주 $11.8B 매입 vs 주가 -55% — 바이백의 역설</text>

  <!-- Legend -->
  <rect x="240" y="52" width="14" height="14" rx="2" fill="#3b82f6" opacity="0.7"/>
  <text x="260" y="63" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">누적 자사주 매입</text>
  <line x1="420" y1="59" x2="450" y2="59" stroke="#ef4444" stroke-width="2.5"/>
  <circle cx="435" cy="59" r="3" fill="#ef4444"/>
  <text x="458" y="63" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">주가</text>

  <!-- Chart area -->
  <!-- Left Y-axis: Buyback cumulative 0-12B, Right Y-axis: Stock price $60-$180 -->
  <!-- X: 4 bars FY2022, FY2023, FY2024, FY2025 at x=200, 340, 480, 620 -->

  <!-- Left Y-axis labels (Buyback) -->
  <text x="90" y="104" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#3b82f6">$12B</text>
  <text x="90" y="174" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#3b82f6">$9B</text>
  <text x="90" y="244" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#3b82f6">$6B</text>
  <text x="90" y="314" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#3b82f6">$3B</text>
  <text x="90" y="384" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#3b82f6">$0</text>

  <!-- Right Y-axis labels (Price) -->
  <text x="740" y="104" text-anchor="start" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">$180</text>
  <text x="740" y="174" text-anchor="start" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">$150</text>
  <text x="740" y="244" text-anchor="start" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">$120</text>
  <text x="740" y="314" text-anchor="start" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">$90</text>
  <text x="740" y="384" text-anchor="start" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">$60</text>

  <!-- Grid -->
  <line x1="110" y1="100" x2="720" y2="100" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="110" y1="170" x2="720" y2="170" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="110" y1="240" x2="720" y2="240" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="110" y1="310" x2="720" y2="310" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="110" y1="380" x2="720" y2="380" stroke="#1e293b" stroke-width="1"/>

  <!-- Buyback bars (cumulative): FY22=$3B, FY23=$6.2B, FY24=$9.1B, FY25=$11.8B -->
  <!-- Scale: 0=380, 12B=100 → 1B = 23.33px -->
  <!-- FY22: 3B → height=70, y=310 -->
  <rect x="170" y="310" width="60" height="70" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="200" y="302" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">$3.0B</text>

  <!-- FY23: 6.2B → height=145, y=235 -->
  <rect x="310" y="235" width="60" height="145" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="340" y="227" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">$6.2B</text>

  <!-- FY24: 9.1B → height=212, y=168 -->
  <rect x="450" y="168" width="60" height="212" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="480" y="160" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">$9.1B</text>

  <!-- FY25: 11.8B → height=275, y=105 -->
  <rect x="590" y="105" width="60" height="275" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="620" y="97" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">$11.8B</text>

  <!-- Stock price line -->
  <!-- Right axis: $60=380, $180=100 → $1 = 2.33px -->
  <!-- FY22 end: ~$170 → 100 + (180-170)*2.33 = 123 -->
  <!-- FY23 end: ~$130 → 100 + (180-130)*2.33 = 217 -->
  <!-- FY24 end: ~$95 → 100 + (180-95)*2.33 = 298 -->
  <!-- FY25 end: ~$72 → 100 + (180-72)*2.33 = 352 -->
  <polyline points="200,123 340,217 480,298 620,352" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="200" cy="123" r="4" fill="#ef4444"/>
  <circle cx="340" cy="217" r="4" fill="#ef4444"/>
  <circle cx="480" cy="298" r="4" fill="#ef4444"/>
  <circle cx="620" cy="352" r="4" fill="#ef4444"/>

  <!-- Price labels -->
  <text x="200" y="113" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#ef4444">$170</text>
  <text x="340" y="207" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#ef4444">$130</text>
  <text x="480" y="288" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#ef4444">$95</text>
  <text x="620" y="370" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#ef4444">$72</text>

  <!-- X-axis labels -->
  <text x="200" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2022</text>
  <text x="340" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2023</text>
  <text x="480" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2024</text>
  <text x="620" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2025</text>

  <!-- Annotation -->
  <rect x="280" y="412" width="240" height="28" rx="4" fill="#ef4444" opacity="0.12"/>
  <text x="400" y="430" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#ef4444">$11.8B를 쏟아부었지만 주가는 -55%</text>
</svg>