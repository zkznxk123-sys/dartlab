<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">빈 선반의 승자들 — Nike -10% vs On +32% vs Hoka +28% vs NB +19%</text>
  <text x="400" y="55" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">FY2024-2025 매출 성장률 (YoY)</text>

  <!-- Horizontal bar chart -->
  <!-- Y positions: 5 bars, spacing 65px, starting at y=100 -->
  <!-- X scale: -15% to +35%, center at x=320 (0%), left edge 110, right edge 730 -->
  <!-- 1% = (730-110)/50 = 12.4px, 0% at x=110+(15*12.4)=296 -->

  <!-- Zero line -->
  <line x1="296" y1="80" x2="296" y2="400" stroke="#475569" stroke-width="1" stroke-dasharray="3"/>
  <text x="296" y="415" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b">0%</text>

  <!-- Grid lines -->
  <line x1="172" y1="80" x2="172" y2="400" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3"/>
  <text x="172" y="415" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b">-10%</text>

  <line x1="420" y1="80" x2="420" y2="400" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3"/>
  <text x="420" y="415" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b">+10%</text>

  <line x1="544" y1="80" x2="544" y2="400" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3"/>
  <text x="544" y="415" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b">+20%</text>

  <line x1="668" y1="80" x2="668" y2="400" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3"/>
  <text x="668" y="415" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b">+30%</text>

  <!-- On Running: +32% → width = 32*12.4 = 396.8, from x=296 to x=693 -->
  <rect x="296" y="90" width="397" height="48" rx="6" fill="#22c55e"/>
  <text x="130" y="118" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">On Running</text>
  <text x="700" y="118" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#22c55e">+32%</text>

  <!-- Hoka: +28% → width = 28*12.4 = 347.2 -->
  <rect x="296" y="155" width="347" height="48" rx="6" fill="#22c55e" opacity="0.85"/>
  <text x="130" y="183" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Hoka</text>
  <text x="650" y="183" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#22c55e">+28%</text>

  <!-- New Balance: +19% → width = 19*12.4 = 235.6 -->
  <rect x="296" y="220" width="236" height="48" rx="6" fill="#22c55e" opacity="0.7"/>
  <text x="130" y="248" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">New Balance</text>
  <text x="539" y="248" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#22c55e">+19%</text>

  <!-- Adidas: +11% → width = 11*12.4 = 136.4 -->
  <rect x="296" y="285" width="136" height="48" rx="6" fill="#22c55e" opacity="0.55"/>
  <text x="130" y="313" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Adidas</text>
  <text x="439" y="313" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#22c55e">+11%</text>

  <!-- Nike: -10% → width = 10*12.4 = 124, going LEFT from x=296 to x=172 -->
  <rect x="172" y="350" width="124" height="48" rx="6" fill="#ef4444"/>
  <text x="130" y="378" text-anchor="start" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Nike</text>
  <text x="120" y="378" text-anchor="end" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ef4444">-10%</text>

  <!-- Nike swoosh highlight -->
  <text x="165" y="378" text-anchor="end" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b">&#x2193;</text>

  <!-- Bottom annotation -->
  <text x="400" y="438" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">Nike가 Wholesale 파트너를 정리하는 동안, 경쟁사가 그 빈 선반을 채웠다</text>
</svg>