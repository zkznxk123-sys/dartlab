<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">Nike DTC vs Wholesale — 올인의 대가</text>

  <!-- Legend -->
  <rect x="280" y="52" width="14" height="14" rx="2" fill="#fbbf24"/>
  <text x="300" y="63" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">DTC (Direct to Consumer)</text>
  <rect x="460" y="52" width="14" height="14" rx="2" fill="#3b82f6"/>
  <text x="480" y="63" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">Wholesale</text>

  <!-- Chart area: y 90-380, x 150-650 -->
  <!-- 3 bars at x=200, x=400, x=600, width=120 -->

  <!-- FY2019: DTC 32%, Wholesale 68% -->
  <!-- Bar height 280px total -->
  <!-- Wholesale: 68% = 190.4px from bottom (y=189.6 to y=380) -->
  <!-- DTC: 32% = 89.6px (y=100 to y=189.6) -->
  <rect x="155" y="100" width="120" height="89.6" rx="3" fill="#fbbf24"/>
  <rect x="155" y="189.6" width="120" height="190.4" rx="3" fill="#3b82f6"/>

  <!-- FY2023: DTC 44%, Wholesale 56% -->
  <!-- DTC: 44% = 123.2px (y=100 to y=223.2) -->
  <!-- Wholesale: 56% = 156.8px (y=223.2 to y=380) -->
  <rect x="340" y="100" width="120" height="123.2" rx="3" fill="#fbbf24"/>
  <rect x="340" y="223.2" width="120" height="156.8" rx="3" fill="#3b82f6"/>

  <!-- FY2025: DTC 42%, Wholesale 58% -->
  <!-- DTC: 42% = 117.6px (y=100 to y=217.6) -->
  <!-- Wholesale: 58% = 162.4px (y=217.6 to y=380) -->
  <rect x="525" y="100" width="120" height="117.6" rx="3" fill="#fbbf24"/>
  <rect x="525" y="217.6" width="120" height="162.4" rx="3" fill="#3b82f6"/>

  <!-- Percentage labels inside bars -->
  <!-- FY2019 -->
  <text x="215" y="152" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">32%</text>
  <text x="215" y="290" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">68%</text>

  <!-- FY2023 -->
  <text x="400" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">44%</text>
  <text x="400" y="310" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">56%</text>

  <!-- FY2025 -->
  <text x="585" y="165" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">42%</text>
  <text x="585" y="305" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">58%</text>

  <!-- X-axis labels -->
  <text x="215" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#f1f5f9">FY2019</text>
  <text x="400" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#f1f5f9">FY2023</text>
  <text x="585" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#f1f5f9">FY2025</text>

  <!-- Annotations -->
  <text x="215" y="418" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b">Wholesale 주도</text>
  <text x="400" y="418" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#fbbf24">DTC 올인 피크</text>
  <text x="585" y="418" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b">부분 후퇴</text>

  <!-- Arrow showing DTC rise and fall -->
  <path d="M 275 135 C 310 110, 330 110, 340 125" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-dasharray="4" marker-end="url(#arrowYellow)"/>
  <text x="310" y="105" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#fbbf24">+12pp</text>

  <path d="M 460 160 C 480 155, 500 155, 525 158" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4" marker-end="url(#arrowRedDtc)"/>
  <text x="493" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#ef4444">-2pp</text>

  <defs>
    <marker id="arrowYellow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#fbbf24" stroke-width="1"/>
    </marker>
    <marker id="arrowRedDtc" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#ef4444" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Subtitle -->
  <text x="400" y="440" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">DTC = Nike.com + Nike 직영 매장 | Wholesale = Foot Locker, Dick's 등 리테일 파트너</text>
</svg>