<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">Nike 마진 추이 — OPM 15.6%에서 8%로</text>

  <!-- Legend -->
  <line x1="260" y1="57" x2="290" y2="57" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="275" cy="57" r="3" fill="#22c55e"/>
  <text x="296" y="61" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">매출총이익률 (GPM)</text>
  <line x1="440" y1="57" x2="470" y2="57" stroke="#fbbf24" stroke-width="2.5"/>
  <circle cx="455" cy="57" r="3" fill="#fbbf24"/>
  <text x="476" y="61" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">영업이익률 (OPM)</text>

  <!-- Chart area: y 90-380, x 120-720 -->
  <!-- Y scale: 0%-50%, 0%=380, 50%=90 → 1%=5.8px -->

  <!-- Grid -->
  <line x1="120" y1="380" x2="720" y2="380" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="90" x2="120" y2="380" stroke="#1e293b" stroke-width="1"/>

  <line x1="120" y1="148" x2="720" y2="148" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="120" y1="206" x2="720" y2="206" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="120" y1="264" x2="720" y2="264" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="120" y1="322" x2="720" y2="322" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Y-axis labels -->
  <text x="110" y="94" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">50%</text>
  <text x="110" y="152" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">40%</text>
  <text x="110" y="210" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">30%</text>
  <text x="110" y="268" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">20%</text>
  <text x="110" y="326" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">10%</text>
  <text x="110" y="384" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">0%</text>

  <!-- X positions: 6 points, FY2020-FY2025 -->
  <!-- x = 180, 288, 396, 504, 612, 720 -->

  <!-- GPM line: FY2020 43.4%, FY2021 45.0%, FY2022 46.0%, FY2023 43.5%, FY2024 44.6%, FY2025 44.0% -->
  <!-- y = 380 - value*5.8 -->
  <!-- 43.4→128.3, 45→119, 46→113.2, 43.5→127.7, 44.6→121.3, 44→124.8 -->
  <polyline points="180,128 288,119 396,113 504,128 612,121 720,125" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="180" cy="128" r="3.5" fill="#22c55e"/>
  <circle cx="288" cy="119" r="3.5" fill="#22c55e"/>
  <circle cx="396" cy="113" r="3.5" fill="#22c55e"/>
  <circle cx="504" cy="128" r="3.5" fill="#22c55e"/>
  <circle cx="612" cy="121" r="3.5" fill="#22c55e"/>
  <circle cx="720" cy="125" r="3.5" fill="#22c55e"/>

  <!-- GPM labels -->
  <text x="180" y="118" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#22c55e">43.4%</text>
  <text x="396" y="103" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#22c55e">46.0%</text>
  <text x="720" y="115" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#22c55e">44.0%</text>

  <!-- OPM line: FY2020 8.3%, FY2021 15.5%, FY2022 15.6%, FY2023 12.5%, FY2024 12.8%, FY2025 8.0% -->
  <!-- 8.3→331.9, 15.5→290.1, 15.6→289.5, 12.5→307.5, 12.8→305.8, 8.0→333.6 -->
  <polyline points="180,332 288,290 396,290" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Decline section in red-orange -->
  <polyline points="396,290 504,308 612,306 720,334" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decline area shading -->
  <polygon points="396,290 504,308 612,306 720,334 720,380 396,380" fill="#ef4444" opacity="0.06"/>

  <circle cx="180" cy="332" r="3.5" fill="#fbbf24"/>
  <circle cx="288" cy="290" r="3.5" fill="#fbbf24"/>
  <circle cx="396" cy="290" r="4" fill="#fbbf24"/>
  <circle cx="504" cy="308" r="3.5" fill="#ef4444"/>
  <circle cx="612" cy="306" r="3.5" fill="#ef4444"/>
  <circle cx="720" cy="334" r="4" fill="#ef4444"/>

  <!-- OPM labels -->
  <text x="180" y="348" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#fbbf24">8.3%</text>
  <text x="396" y="280" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#fbbf24">15.6%</text>
  <text x="720" y="350" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#ef4444">8.0%</text>

  <!-- Peak annotation -->
  <text x="396" y="270" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b">Peak</text>

  <!-- Annotation: gap between GP and OP = SGA -->
  <line x1="730" y1="125" x2="730" y2="334" stroke="#64748b" stroke-width="1" stroke-dasharray="2"/>
  <text x="755" y="230" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b" transform="rotate(90, 755, 230)">SGA 36%p (비용 확대)</text>

  <!-- X-axis labels -->
  <text x="180" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2020</text>
  <text x="288" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2021</text>
  <text x="396" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2022</text>
  <text x="504" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2023</text>
  <text x="612" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2024</text>
  <text x="720" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2025</text>

  <!-- Bottom annotation -->
  <rect x="230" y="416" width="340" height="24" rx="4" fill="#ef4444" opacity="0.1"/>
  <text x="400" y="432" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#ef4444">GPM은 안정 → OPM만 하락 = 판관비(SGA) 비효율</text>
</svg>