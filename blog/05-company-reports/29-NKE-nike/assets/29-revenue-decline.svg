<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">Nike 매출 추이 — $51.4B에서 $46.3B, 세계 1위의 역성장</text>

  <!-- Grid lines -->
  <line x1="100" y1="80" x2="100" y2="380" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="380" x2="740" y2="380" stroke="#1e293b" stroke-width="1"/>

  <!-- Horizontal grid -->
  <line x1="100" y1="140" x2="740" y2="140" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="200" x2="740" y2="200" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="260" x2="740" y2="260" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="320" x2="740" y2="320" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Y-axis labels -->
  <text x="90" y="144" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$55B</text>
  <text x="90" y="204" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$50B</text>
  <text x="90" y="264" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$45B</text>
  <text x="90" y="324" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$40B</text>
  <text x="90" y="384" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$35B</text>

  <!-- Data points: scale 35B=380, 55B=140 → 1B = 12px -->
  <!-- FY2020: 37.4 → 380 - (37.4-35)*12 = 380 - 28.8 = 351.2 -->
  <!-- FY2021: 44.5 → 380 - (44.5-35)*12 = 380 - 114 = 266 -->
  <!-- FY2022: 46.7 → 380 - (46.7-35)*12 = 380 - 140.4 = 239.6 -->
  <!-- FY2023: 51.2 → 380 - (51.2-35)*12 = 380 - 194.4 = 185.6 -->
  <!-- FY2024: 51.4 → 380 - (51.4-35)*12 = 380 - 196.8 = 183.2 -->
  <!-- FY2025: 46.3 → 380 - (46.3-35)*12 = 380 - 135.6 = 244.4 -->

  <!-- X positions: 6 points from 160 to 700, step ~108 -->
  <!-- Growth line (green) FY2020 to FY2024 -->
  <polyline points="160,351 268,266 376,240 484,186 592,183" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decline line (red) FY2024 to FY2025 -->
  <polyline points="592,183 700,244" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decline area -->
  <polygon points="592,183 700,244 700,380 592,380" fill="#ef4444" opacity="0.08"/>

  <!-- Data dots -->
  <circle cx="160" cy="351" r="5" fill="#22c55e"/>
  <circle cx="268" cy="266" r="5" fill="#22c55e"/>
  <circle cx="376" cy="240" r="5" fill="#22c55e"/>
  <circle cx="484" cy="186" r="5" fill="#22c55e"/>
  <circle cx="592" cy="183" r="5" fill="#fbbf24"/>
  <circle cx="700" cy="244" r="5" fill="#ef4444"/>

  <!-- Value labels -->
  <text x="160" y="340" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#22c55e">$37.4B</text>
  <text x="268" y="255" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#22c55e">$44.5B</text>
  <text x="376" y="229" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#22c55e">$46.7B</text>
  <text x="484" y="175" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#22c55e">$51.2B</text>
  <text x="592" y="172" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#fbbf24">$51.4B</text>
  <text x="700" y="233" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#ef4444">$46.3B</text>

  <!-- X-axis labels -->
  <text x="160" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2020</text>
  <text x="268" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2021</text>
  <text x="376" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2022</text>
  <text x="484" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2023</text>
  <text x="592" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2024</text>
  <text x="700" y="400" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">FY2025</text>

  <!-- Decline annotation -->
  <text x="646" y="130" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ef4444">-10%</text>
  <text x="646" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">YoY</text>

  <!-- Arrow -->
  <path d="M 620 155 L 630 170" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#ef4444" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Subtitle -->
  <text x="400" y="435" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">FY = 6월 결산 기준 | 출처: Nike 10-K</text>
</svg>