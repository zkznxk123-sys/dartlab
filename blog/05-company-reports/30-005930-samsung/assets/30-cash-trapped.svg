<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="620" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="619" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">삼성전자 현금 110조 — 국내 11조, 해외 99조</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">2025 연간 | 현금성 자산 + 단기금융자산 기준</text>

  <!-- Donut chart center: (400, 310), outer radius 180, inner radius 100 -->
  <!-- 해외 90%: 0 to 324 degrees -->
  <!-- 국내 10%: 324 to 360 degrees -->

  <!-- 해외 99조 (90%) — large arc -->
  <!-- From 0deg to 324deg -->
  <!-- Start: (580, 310), sweep to 324 deg -->
  <path d="M 580 310
           A 180 180 0 1 1 513.4 158.7
           L 468.6 227.1
           A 100 100 0 1 0 500 310
           Z" fill="#3b82f6" opacity="0.7" stroke="#0a0e1a" stroke-width="3"/>

  <!-- 국내 11조 (10%) — small arc -->
  <path d="M 513.4 158.7
           A 180 180 0 0 1 580 310
           L 500 310
           A 100 100 0 0 0 468.6 227.1
           Z" fill="#ef4444" opacity="0.8" stroke="#0a0e1a" stroke-width="3"/>

  <!-- Center text -->
  <text x="500" y="300" text-anchor="middle" font-size="28" font-weight="800" fill="#f1f5f9">110조</text>
  <text x="500" y="325" text-anchor="middle" font-size="13" fill="#64748b">총 현금성 자산</text>

  <!-- Labels with lines -->
  <!-- 해외 label -->
  <line x1="360" y1="400" x2="250" y2="440" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="360" cy="400" r="4" fill="#3b82f6"/>
  <rect x="100" y="425" width="300" height="70" rx="10" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1"/>
  <text x="250" y="452" text-anchor="middle" font-size="18" font-weight="800" fill="#3b82f6">해외 99조 (90%)</text>
  <text x="250" y="475" text-anchor="middle" font-size="12" fill="#93c5fd">미국/유럽/중국 법인 보유</text>
  <text x="250" y="490" text-anchor="middle" font-size="11" fill="#64748b">본국 송금 시 세금 부담</text>

  <!-- 국내 label -->
  <line x1="490" y1="170" x2="490" y2="130" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="490" cy="170" r="4" fill="#ef4444"/>
  <rect x="410" y="92" width="200" height="36" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1"/>
  <text x="510" y="116" text-anchor="middle" font-size="15" font-weight="800" fill="#ef4444">국내 11조 (10%)</text>

  <!-- Right side: context boxes -->
  <text x="880" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">현금 110조의 진실</text>

  <rect x="720" y="160" width="360" height="65" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="900" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">국내 현금 = 11조</text>
  <text x="900" y="210" text-anchor="middle" font-size="12" fill="#94a3b8">연간 배당 14조 + CAPEX 30조+ 대비 부족</text>

  <rect x="720" y="240" width="360" height="65" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="900" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">해외 현금 = 99조</text>
  <text x="900" y="290" text-anchor="middle" font-size="12" fill="#94a3b8">해외 법인 재투자 + 현지 CAPEX 용도</text>

  <rect x="720" y="320" width="360" height="65" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="900" y="346" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">이재용 지분 = 1.63%</text>
  <text x="900" y="370" text-anchor="middle" font-size="12" fill="#94a3b8">주주환원 압력 낮음 — 오너가 배당 안 늘려도 됨</text>

  <rect x="720" y="400" width="360" height="65" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="900" y="426" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">FCF 2025: 19.7조</text>
  <text x="900" y="450" text-anchor="middle" font-size="12" fill="#94a3b8">벌고는 있다 — 근데 배당 14조에 다 쓰고 남는 건 5조</text>

  <!-- Bottom insight -->
  <rect x="80" y="530" width="1040" height="65" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="555" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">"현금 110조" 맞다 — 근데 국내에 쓸 수 있는 건 11조뿐</text>
  <text x="600" y="575" font-size="12" fill="#94a3b8" text-anchor="middle">해외 현금은 현지 공장 투자에 쓰이고, 국내 현금은 배당과 CAPEX에 빠듯하다</text>
  <text x="600" y="590" font-size="11" fill="#64748b" text-anchor="middle">현금부자가 맞긴 한데, 주주한테 돌아오는 건 생각보다 적다</text>
</svg>