<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="580" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="579" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">삼성 파운드리 vs TSMC — 점유율 4% vs 38%, 10배 격차</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">2025 글로벌 파운드리 시장점유율(매출 기준)</text>

  <!-- Horizontal bar chart -->
  <!-- Chart area: x 200~1080, max bar width = 880 * (share/58) -->
  <!-- Base line -->
  <line x1="200" y1="110" x2="200" y2="430" stroke="#1e2433"/>

  <!-- TSMC: 38% => width = 880 * (38/40) = 836 -->
  <text x="190" y="165" text-anchor="end" font-size="14" font-weight="700" fill="#22c55e">TSMC</text>
  <rect x="200" y="140" width="836" height="50" rx="8" fill="#22c55e" opacity="0.7"/>
  <text x="1050" y="172" text-anchor="start" font-size="22" font-weight="800" fill="#22c55e">38%</text>
  <text x="500" y="170" font-size="13" font-weight="700" fill="#f1f5f9">애플, 엔비디아, AMD, 퀄컴</text>

  <!-- Samsung: 4% => width = 880 * (4/40) = 88 -->
  <text x="190" y="245" text-anchor="end" font-size="14" font-weight="700" fill="#ef4444">삼성</text>
  <rect x="200" y="220" width="88" height="50" rx="8" fill="#ef4444" opacity="0.7"/>
  <text x="300" y="252" text-anchor="start" font-size="22" font-weight="800" fill="#ef4444">4%</text>
  <text x="400" y="252" font-size="13" font-weight="700" fill="#94a3b8">자체 엑시노스 + 일부 외주</text>

  <!-- Others: 기타 58% = but we show top competitors -->
  <!-- GlobalFoundries -->
  <text x="190" y="325" text-anchor="end" font-size="13" font-weight="600" fill="#94a3b8">GF</text>
  <rect x="200" y="300" width="154" height="40" rx="6" fill="#475569" opacity="0.4"/>
  <text x="365" y="326" text-anchor="start" font-size="15" font-weight="700" fill="#94a3b8">7%</text>

  <!-- UMC -->
  <text x="190" y="385" text-anchor="end" font-size="13" font-weight="600" fill="#94a3b8">UMC</text>
  <rect x="200" y="360" width="132" height="40" rx="6" fill="#475569" opacity="0.3"/>
  <text x="345" y="386" text-anchor="start" font-size="15" font-weight="700" fill="#94a3b8">6%</text>

  <!-- SMIC -->
  <text x="190" y="445" text-anchor="end" font-size="13" font-weight="600" fill="#94a3b8">SMIC</text>
  <rect x="200" y="420" width="110" height="40" rx="6" fill="#475569" opacity="0.25"/>
  <text x="320" y="446" text-anchor="start" font-size="15" font-weight="700" fill="#94a3b8">5%</text>

  <!-- x10 gap annotation -->
  <line x1="288" y1="190" x2="288" y2="220" stroke="#fbbf24" stroke-width="2"/>
  <line x1="200" y1="195" x2="1036" y2="195" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6 4" opacity="0.3"/>
  <rect x="500" y="188" width="140" height="28" rx="8" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1"/>
  <text x="570" y="207" text-anchor="middle" font-size="14" font-weight="800" fill="#fbbf24">x10 격차</text>

  <!-- Bottom insight -->
  <rect x="80" y="485" width="1040" height="70" rx="10" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="1"/>
  <text x="600" y="510" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">삼성 파운드리: 매출 점유율 4%, 누적 적자 추정 7조+ — 접어야 하나?</text>
  <text x="600" y="530" font-size="12" fill="#94a3b8" text-anchor="middle">그런데 접을 수가 없다. 파운드리가 없으면 삼성은 "메모리만 잘하는 회사"가 된다.</text>
  <text x="600" y="548" font-size="11" fill="#64748b" text-anchor="middle">TSMC 독점이 강화될수록, 삼성이 파운드리를 포기하기는 더 어려워진다</text>
</svg>