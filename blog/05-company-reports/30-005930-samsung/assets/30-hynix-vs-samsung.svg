<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="599" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">삼성 반도체 vs SK하이닉스 — 같은 메모리인데 영업이익률이 절반</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">2025 연간 기준 | DS부문 vs SK하이닉스</text>

  <!-- Section 1: OPM 비교 -->
  <text x="340" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">영업이익률</text>

  <!-- Samsung DS bar: 27% -->
  <rect x="130" y="150" width="160" height="230" rx="8" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <rect x="130" y="271" width="160" height="109" rx="0" fill="#3b82f6" opacity="0.6"/>
  <text x="210" y="330" text-anchor="middle" font-size="28" font-weight="800" fill="#f1f5f9">27%</text>
  <text x="210" y="355" text-anchor="middle" font-size="12" fill="#93c5fd">삼성 DS</text>
  <text x="210" y="400" text-anchor="middle" font-size="11" fill="#64748b">파운드리 적자 포함</text>

  <!-- SK hynix bar: 49% -->
  <rect x="350" y="150" width="160" height="230" rx="8" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <rect x="350" y="150" width="160" height="198" rx="0" fill="#22c55e" opacity="0.6"/>
  <text x="430" y="250" text-anchor="middle" font-size="28" font-weight="800" fill="#f1f5f9">49%</text>
  <text x="430" y="275" text-anchor="middle" font-size="12" fill="#86efac">SK하이닉스</text>
  <text x="430" y="400" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="700">메모리 올인</text>

  <!-- Gap annotation -->
  <line x1="290" y1="310" x2="350" y2="250" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="270" y="290" width="100" height="26" rx="6" fill="#fbbf24" opacity="0.1" stroke="#fbbf24"/>
  <text x="320" y="308" text-anchor="middle" font-size="12" font-weight="800" fill="#fbbf24">-22%p</text>

  <!-- Divider -->
  <line x1="600" y1="100" x2="600" y2="500" stroke="#1e2433" stroke-width="1"/>

  <!-- Section 2: HBM 점유율 -->
  <text x="880" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">HBM 시장점유율</text>

  <!-- Samsung HBM: 17% -->
  <rect x="670" y="150" width="160" height="230" rx="8" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <rect x="670" y="346" width="160" height="34" rx="0" fill="#ef4444" opacity="0.7"/>
  <text x="750" y="310" text-anchor="middle" font-size="28" font-weight="800" fill="#ef4444">17%</text>
  <text x="750" y="335" text-anchor="middle" font-size="12" fill="#fca5a5">삼성전자</text>
  <text x="750" y="400" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="700">HBM3E 수율 난항</text>

  <!-- SK hynix HBM: 62% -->
  <rect x="890" y="150" width="160" height="230" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <rect x="890" y="150" width="160" height="125" rx="0" fill="#22c55e" opacity="0.7"/>
  <text x="970" y="220" text-anchor="middle" font-size="28" font-weight="800" fill="#f1f5f9">62%</text>
  <text x="970" y="245" text-anchor="middle" font-size="12" fill="#86efac">SK하이닉스</text>
  <text x="970" y="400" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="700">엔비디아 독점 공급</text>

  <!-- Gap -->
  <rect x="830" y="150" width="60" height="26" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444"/>
  <text x="860" y="168" text-anchor="middle" font-size="11" font-weight="800" fill="#ef4444">x3.6</text>

  <!-- Bottom insight boxes -->
  <rect x="80" y="440" width="520" height="55" rx="10" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="1"/>
  <text x="340" y="465" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">삼성의 문제: 파운드리 적자 7조가 DS 이익을 깎아먹는다</text>
  <text x="340" y="483" font-size="11" fill="#94a3b8" text-anchor="middle">메모리만 보면 삼성도 고마진 — 하지만 파운드리를 끊을 수도 없다</text>

  <rect x="620" y="440" width="500" height="55" rx="10" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1"/>
  <text x="870" y="465" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">하이닉스의 답: HBM 올인 → 엔비디아 독점 → 마진 극대화</text>
  <text x="870" y="483" font-size="11" fill="#94a3b8" text-anchor="middle">같은 메모리 회사인데 전략이 정반대 — 선택과 집중 vs 전방위</text>

  <!-- Bottom line -->
  <rect x="80" y="520" width="1040" height="50" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="545" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">OPM 27% vs 49%, HBM 점유율 17% vs 62% — 숫자가 말하는 현실</text>
  <text x="600" y="563" font-size="11" fill="#94a3b8" text-anchor="middle">삼성이 HBM3E 수율을 잡지 못하면, 격차는 더 벌어진다</text>
</svg>