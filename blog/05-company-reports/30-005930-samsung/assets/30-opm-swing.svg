<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="areafade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="680" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="679" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">삼성전자 영업이익률 5년 — 2.5%에서 43%까지, 17배 진동</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">2021 ~ 2026Q1 | dartlab c.select("ratios", ["영업이익률 (%)"]) 실측</text>

  <!-- Chart area: x 120~1100, y 120~520 -->
  <!-- y range: 0% ~ 50% => y 520 = 0%, y 120 = 50% -->
  <line x1="120" y1="120" x2="120" y2="520" stroke="#1e2433"/>
  <line x1="120" y1="520" x2="1100" y2="520" stroke="#1e2433"/>

  <!-- y gridlines -->
  <line x1="120" y1="120" x2="1100" y2="120" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="120" y1="200" x2="1100" y2="200" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="120" y1="280" x2="1100" y2="280" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="120" y1="360" x2="1100" y2="360" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="120" y1="440" x2="1100" y2="440" stroke="#1e2433" stroke-dasharray="4 4"/>

  <!-- y labels -->
  <text x="110" y="124" text-anchor="end" font-size="11" fill="#64748b">50%</text>
  <text x="110" y="204" text-anchor="end" font-size="11" fill="#64748b">40%</text>
  <text x="110" y="284" text-anchor="end" font-size="11" fill="#64748b">30%</text>
  <text x="110" y="364" text-anchor="end" font-size="11" fill="#64748b">20%</text>
  <text x="110" y="444" text-anchor="end" font-size="11" fill="#64748b">10%</text>
  <text x="110" y="524" text-anchor="end" font-size="11" fill="#64748b">0%</text>

  <!-- Data points
    2021: 18.5% => y = 520 - (18.5/50)*400 = 520 - 148 = 372
    2022: 14.4% => y = 520 - (14.4/50)*400 = 520 - 115.2 = 404.8
    2023: 2.5%  => y = 520 - (2.5/50)*400 = 520 - 20 = 500
    2024: 10.9% => y = 520 - (10.9/50)*400 = 520 - 87.2 = 432.8
    2025: 13.1% => y = 520 - (13.1/50)*400 = 520 - 104.8 = 415.2
    2026Q1: 43% => y = 520 - (43/50)*400 = 520 - 344 = 176

    x: 6 points, 120~1100 = 980, spacing 196
    x: 120, 316, 512, 708, 904, 1100
  -->

  <!-- Area fill -->
  <path d="M120,520 L120,372 L316,405 L512,500 L708,433 L904,415 L1100,176 L1100,520 Z" fill="url(#areafade)" opacity="0.7"/>

  <!-- Main line -->
  <polyline points="120,372 316,405 512,500 708,433 904,415 1100,176" stroke="#06b6d4" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points + labels -->
  <g font-size="11" fill="#94a3b8">
    <!-- 2021: 18.5% -->
    <circle cx="120" cy="372" r="5" fill="#06b6d4"/>
    <text x="120" y="358" text-anchor="middle" font-weight="700" fill="#f1f5f9" font-size="13">18.5%</text>
    <text x="120" y="545" text-anchor="middle">2021</text>

    <!-- 2022: 14.4% -->
    <circle cx="316" cy="405" r="5" fill="#fbbf24"/>
    <text x="316" y="391" text-anchor="middle" font-weight="700" fill="#fbbf24" font-size="13">14.4%</text>
    <text x="316" y="545" text-anchor="middle">2022</text>

    <!-- 2023: 2.5% LOW -->
    <circle cx="512" cy="500" r="9" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <text x="512" y="530" text-anchor="middle" font-weight="800" fill="#ef4444" font-size="15">2.5%</text>
    <text x="512" y="545" text-anchor="middle" fill="#ef4444" font-weight="700">2023</text>
    <rect x="446" y="554" width="132" height="24" rx="6" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
    <text x="512" y="571" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">메모리 빙하기</text>

    <!-- 2024: 10.9% -->
    <circle cx="708" cy="433" r="5" fill="#06b6d4"/>
    <text x="708" y="419" text-anchor="middle" font-weight="700" fill="#f1f5f9" font-size="13">10.9%</text>
    <text x="708" y="545" text-anchor="middle">2024</text>

    <!-- 2025: 13.1% -->
    <circle cx="904" cy="415" r="5" fill="#06b6d4"/>
    <text x="904" y="401" text-anchor="middle" font-weight="700" fill="#f1f5f9" font-size="13">13.1%</text>
    <text x="904" y="545" text-anchor="middle">2025</text>

    <!-- 2026Q1: 43% HIGH -->
    <circle cx="1100" cy="176" r="9" fill="#22c55e" stroke="#fff" stroke-width="2"/>
    <text x="1100" y="158" text-anchor="middle" font-weight="800" fill="#22c55e" font-size="17">43%</text>
    <text x="1100" y="545" text-anchor="middle" fill="#22c55e" font-weight="700">2026Q1</text>
    <rect x="1034" y="554" width="132" height="24" rx="6" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
    <text x="1100" y="571" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">HBM 슈퍼사이클</text>
  </g>

  <!-- 17x annotation -->
  <line x1="512" y1="500" x2="512" y2="176" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>
  <line x1="1100" y1="176" x2="512" y2="176" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>
  <rect x="720" y="145" width="130" height="32" rx="8" fill="#fbbf24" opacity="0.1" stroke="#fbbf24" stroke-width="1"/>
  <text x="785" y="166" text-anchor="middle" font-size="14" font-weight="800" fill="#fbbf24">x17 진폭</text>

  <!-- Bottom insight -->
  <rect x="80" y="605" width="1040" height="50" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="630" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">2023년 바닥 2.5% → 2026Q1 정점 43% | 같은 회사가 3년 만에 17배 차이</text>
  <text x="600" y="648" font-size="11" fill="#94a3b8" text-anchor="middle">이것이 반도체 사이클 — 평균이 의미 없는 산업</text>
</svg>