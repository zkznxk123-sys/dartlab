<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="620" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="619" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">삼성전자 부문별 매출 vs 영업이익 — DS가 36%인데 이익의 80%</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">2025 연간 | 부문별 기여도 비교</text>

  <!-- Left: 매출 stacked bar -->
  <text x="310" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">매출 구성</text>
  <text x="310" y="130" text-anchor="middle" font-size="12" fill="#64748b">334조원</text>

  <!-- Total bar height: 360px (y 150~510) -->
  <!-- DS 36% = 129.6px, DX 52% = 187.2px, SDC 8% = 28.8px, Harman 4% = 14.4px -->

  <!-- DX 52% (bottom, largest) -->
  <rect x="200" y="150" width="220" height="187" rx="0" fill="#3b82f6" opacity="0.7"/>
  <text x="310" y="235" text-anchor="middle" font-size="18" font-weight="800" fill="#f1f5f9">DX 52%</text>
  <text x="310" y="255" text-anchor="middle" font-size="11" fill="#dbeafe">스마트폰, 가전</text>

  <!-- DS 36% -->
  <rect x="200" y="337" width="220" height="130" rx="0" fill="#22c55e" opacity="0.8"/>
  <text x="310" y="400" text-anchor="middle" font-size="18" font-weight="800" fill="#f1f5f9">DS 36%</text>
  <text x="310" y="420" text-anchor="middle" font-size="11" fill="#dcfce7">반도체, 파운드리</text>

  <!-- SDC 8% -->
  <rect x="200" y="467" width="220" height="29" rx="0" fill="#fbbf24" opacity="0.6"/>
  <text x="310" y="486" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0e1a">SDC 8%</text>

  <!-- Harman 4% -->
  <rect x="200" y="496" width="220" height="14" rx="0" fill="#94a3b8" opacity="0.5"/>
  <text x="310" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">하만 4%</text>

  <!-- Rounded corners top/bottom -->
  <rect x="200" y="150" width="220" height="360" rx="10" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Right: 영업이익 stacked bar -->
  <text x="800" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">영업이익 구성</text>
  <text x="800" y="130" text-anchor="middle" font-size="12" fill="#64748b">32.7조원</text>

  <!-- DS ~80% = 288px, DX ~30% overlap? Let me recalculate -->
  <!-- Actually: DS 26.3조(80.4%), DX 6조(18.3%), SDC 5.2조(15.9%), Harman 1조(3%) -->
  <!-- But total > 100% because of internal adjustments. Let's normalize visible:
       DS 80%, DX 10%, SDC 7%, Harman 3% for visual clarity -->
  <!-- Using proportional: DS 288px, DX 36px, SDC 25px, Harman 11px = 360 -->

  <!-- DS 80% (dominant) -->
  <rect x="690" y="150" width="220" height="288" rx="0" fill="#22c55e" opacity="0.9"/>
  <text x="800" y="280" text-anchor="middle" font-size="22" font-weight="800" fill="#f1f5f9">DS ~80%</text>
  <text x="800" y="305" text-anchor="middle" font-size="13" fill="#dcfce7">26.3조</text>
  <text x="800" y="325" text-anchor="middle" font-size="11" fill="#dcfce7">반도체가 이익 전부</text>

  <!-- DX -->
  <rect x="690" y="438" width="220" height="36" rx="0" fill="#3b82f6" opacity="0.5"/>
  <text x="800" y="461" text-anchor="middle" font-size="11" font-weight="700" fill="#f1f5f9">DX ~10%</text>

  <!-- SDC -->
  <rect x="690" y="474" width="220" height="25" rx="0" fill="#fbbf24" opacity="0.5"/>
  <text x="800" y="491" text-anchor="middle" font-size="10" font-weight="600" fill="#0a0e1a">SDC</text>

  <!-- Harman -->
  <rect x="690" y="499" width="220" height="11" rx="0" fill="#94a3b8" opacity="0.5"/>

  <rect x="690" y="150" width="220" height="360" rx="10" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Connection arrow highlighting DS -->
  <line x1="420" y1="400" x2="690" y2="290" stroke="#22c55e" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <text x="555" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e" transform="rotate(-15,555,330)">36% → 80%</text>

  <!-- Bottom insight -->
  <rect x="80" y="545" width="1040" height="50" rx="10" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="570" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">매출의 36%인 DS가 이익의 80%를 벌어온다 — 반도체가 망하면 삼성전자가 망한다</text>
  <text x="600" y="588" font-size="11" fill="#94a3b8" text-anchor="middle">DX(스마트폰)는 매출 52%지만 이익 기여는 10% 수준 — 박리다매</text>
</svg>