<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Oklo 자산 83배 폭증</title>
  <desc>$14.9M에서 $1,246M으로 — SPAC 합병과 유상증자의 힘</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="bar2023" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="bar2024" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="bar2025" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="16" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">Oklo 자산 83배 — $14.9M에서 $1,246M, SPAC 합병+유증의 힘</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">FY2023 ~ FY2025 | SEC XBRL 실측 | 총자산(Total Assets) 기준</text>

  <!-- Chart area: x 200~1000, y 130~540 -->
  <!-- y range: $0 ~ $1,400M -->
  <line x1="200" y1="130" x2="200" y2="540" stroke="#1e2433"/>
  <line x1="200" y1="540" x2="1000" y2="540" stroke="#1e2433"/>

  <!-- y gridlines -->
  <line x1="200" y1="130" x2="1000" y2="130" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="200" y1="247" x2="1000" y2="247" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="200" y1="364" x2="1000" y2="364" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="200" y1="481" x2="1000" y2="481" stroke="#1e2433" stroke-dasharray="4 4"/>

  <!-- y labels -->
  <text x="190" y="134" text-anchor="end" font-size="11" fill="#64748b">$1,400M</text>
  <text x="190" y="251" text-anchor="end" font-size="11" fill="#64748b">$1,000M</text>
  <text x="190" y="368" text-anchor="end" font-size="11" fill="#64748b">$600M</text>
  <text x="190" y="485" text-anchor="end" font-size="11" fill="#64748b">$200M</text>
  <text x="190" y="544" text-anchor="end" font-size="11" fill="#64748b">$0</text>

  <!-- FY2023 (SPAC): $510M => 540 - (510/1400)*410 = 540-149.4 = 390.6, h=149.4 -->
  <rect x="280" y="391" width="120" height="149" rx="6" fill="url(#bar2023)" opacity="0.8"/>
  <text x="340" y="375" text-anchor="middle" font-size="20" font-weight="800" fill="#94a3b8">$510M</text>
  <text x="340" y="570" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">FY2023</text>
  <rect x="280" y="583" width="120" height="22" rx="6" fill="#64748b" opacity="0.15" stroke="#64748b" stroke-width="1"/>
  <text x="340" y="599" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">SPAC 트러스트</text>

  <!-- FY2024: $14.9M => 540 - (14.9/1400)*410 = 540-4.4 = 535.6, h=4.4 -->
  <rect x="520" y="534" width="120" height="6" rx="3" fill="url(#bar2024)"/>
  <circle cx="580" cy="534" r="8" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <text x="580" y="515" text-anchor="middle" font-size="20" font-weight="800" fill="#ef4444">$14.9M</text>
  <text x="580" y="570" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">FY2024</text>
  <rect x="510" y="583" width="140" height="22" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="580" y="599" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">합병 후 (현금 소진)</text>

  <!-- FY2025: $1,246M => 540 - (1246/1400)*410 = 540-365.0 = 175.0, h=365 -->
  <rect x="760" y="175" width="120" height="365" rx="6" fill="url(#bar2025)" opacity="0.9"/>
  <text x="820" y="157" text-anchor="middle" font-size="20" font-weight="800" fill="#22c55e">$1,246M</text>
  <text x="820" y="570" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">FY2025</text>
  <rect x="750" y="583" width="140" height="22" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="820" y="599" text-anchor="middle" font-size="10" font-weight="600" fill="#22c55e">유증 $1.1B 유입</text>

  <!-- Arrow: 2024 → 2025 explosion -->
  <line x1="640" y1="534" x2="750" y2="350" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="750,350 740,370 755,365" fill="#fbbf24"/>
  <rect x="660" y="415" width="90" height="32" rx="8" fill="#fbbf24" opacity="0.1" stroke="#fbbf24" stroke-width="1"/>
  <text x="705" y="436" text-anchor="middle" font-size="14" font-weight="800" fill="#fbbf24">x83</text>

  <!-- Arrow: 2023 → 2024 collapse -->
  <line x1="400" y1="440" x2="510" y2="534" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 4"/>
  <polygon points="510,534 500,520 515,522" fill="#ef4444"/>
  <rect x="425" y="470" width="70" height="24" rx="6" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="460" y="487" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">-97%</text>

  <!-- Bottom insight -->
  <rect x="80" y="640" width="1040" height="56" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="665" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">SPAC 합병 → 트러스트 정산으로 자산 97% 증발 → 유증으로 83배 복원</text>
  <text x="600" y="685" font-size="11" fill="#94a3b8" text-anchor="middle">자산 변동의 원인은 사업이 아니라 자본 거래 — 매출은 여전히 $0</text>
</svg>