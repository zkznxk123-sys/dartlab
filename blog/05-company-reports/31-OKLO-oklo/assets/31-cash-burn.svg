<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Oklo 현금 $2.5B vs 연간 소진</title>
  <desc>현금 잔고 추이와 소진 시나리오 3개</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="areafade4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="16" fill="url(#bg4)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">Oklo 현금 $2.5B vs 연간 소진 — 원자로 짓기 시작하면?</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">현금+단기투자 기준 | 소진 시나리오는 dartlab 추정 | 2026-04 기준</text>

  <!-- Chart area: x 140~1080, y 120~520 -->
  <!-- y range: $0 ~ $3.0B -->
  <line x1="140" y1="120" x2="140" y2="520" stroke="#1e2433"/>
  <line x1="140" y1="520" x2="1080" y2="520" stroke="#1e2433"/>

  <!-- y gridlines -->
  <line x1="140" y1="120" x2="1080" y2="120" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="140" y1="187" x2="1080" y2="187" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="140" y1="253" x2="1080" y2="253" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="140" y1="320" x2="1080" y2="320" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="140" y1="387" x2="1080" y2="387" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="140" y1="453" x2="1080" y2="453" stroke="#1e2433" stroke-dasharray="4 4"/>

  <!-- y labels -->
  <text x="130" y="124" text-anchor="end" font-size="11" fill="#64748b">$3.0B</text>
  <text x="130" y="191" text-anchor="end" font-size="11" fill="#64748b">$2.5B</text>
  <text x="130" y="257" text-anchor="end" font-size="11" fill="#64748b">$2.0B</text>
  <text x="130" y="324" text-anchor="end" font-size="11" fill="#64748b">$1.5B</text>
  <text x="130" y="391" text-anchor="end" font-size="11" fill="#64748b">$1.0B</text>
  <text x="130" y="457" text-anchor="end" font-size="11" fill="#64748b">$0.5B</text>
  <text x="130" y="524" text-anchor="end" font-size="11" fill="#64748b">$0</text>

  <!-- x: 2024, 2025(유증후), 2026E, 2027E, 2028E, 2029E, 2030E
       7 points: 140, 297, 454, 611, 768, 925, 1080 -->

  <!-- Actual cash trajectory (solid) -->
  <!-- 2024: $10M => y = 520 - (10/3000)*400 = 520-1.3 = 518.7 -->
  <!-- 2025: $410M => y = 520 - (410/3000)*400 = 520-54.7 = 465.3 -->
  <!-- 2026(유증후): $2,500M => y = 520 - (2500/3000)*400 = 520-333.3 = 186.7 -->

  <!-- Area under actual -->
  <path d="M140,520 L140,519 L297,465 L454,187 L454,520 Z" fill="url(#areafade4)" opacity="0.6"/>

  <!-- Actual line -->
  <polyline points="140,519 297,465 454,187" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Actual data points -->
  <circle cx="140" cy="519" r="5" fill="#ef4444"/>
  <text x="140" y="505" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">$10M</text>
  <text x="140" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">2024</text>

  <circle cx="297" cy="465" r="5" fill="#fbbf24"/>
  <text x="297" y="451" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">$410M</text>
  <text x="297" y="545" text-anchor="middle" font-size="11" fill="#94a3b8">2025</text>

  <circle cx="454" cy="187" r="7" fill="#22c55e" stroke="#fff" stroke-width="2"/>
  <text x="454" y="170" text-anchor="middle" font-size="17" font-weight="800" fill="#22c55e">$2.5B</text>
  <text x="454" y="545" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="700">2026 (유증 후)</text>

  <!-- Scenario 1: R&D only ~$150M/yr (optimistic) -->
  <!-- 2027: $2350M=>y=207, 2028: $2200M=>y=227, 2029: $2050M=>y=247, 2030: $1900M=>y=267 -->
  <polyline points="454,187 611,207 768,227 925,247 1080,267" stroke="#22c55e" stroke-width="2" fill="none" stroke-dasharray="8 4" opacity="0.7"/>
  <text x="1080" y="255" text-anchor="start" font-size="11" font-weight="700" fill="#22c55e" dx="5">R&amp;D만</text>
  <text x="1080" y="270" text-anchor="start" font-size="10" fill="#64748b" dx="5">~$150M/yr</text>

  <!-- Scenario 2: R&D + 건설 시작 ~$400M/yr -->
  <!-- 2027: $2100M=>y=240, 2028: $1700M=>y=293, 2029: $1300M=>y=347, 2030: $900M=>y=400 -->
  <polyline points="454,187 611,240 768,293 925,347 1080,400" stroke="#fbbf24" stroke-width="2" fill="none" stroke-dasharray="8 4" opacity="0.7"/>
  <text x="1080" y="390" text-anchor="start" font-size="11" font-weight="700" fill="#fbbf24" dx="5">건설 착수</text>
  <text x="1080" y="405" text-anchor="start" font-size="10" fill="#64748b" dx="5">~$400M/yr</text>

  <!-- Scenario 3: Full scale ~$700M/yr (aggressive) -->
  <!-- 2027: $1800M=>y=280, 2028: $1100M=>y=373, 2029: $400M=>y=467, 2030: $0 =>y=520 -->
  <polyline points="454,187 611,280 768,373 925,467 1080,520" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="8 4" opacity="0.7"/>
  <circle cx="1080" cy="520" r="6" fill="#ef4444" stroke="#fff" stroke-width="2"/>
  <text x="1040" y="510" text-anchor="end" font-size="11" font-weight="700" fill="#ef4444">대규모 건설</text>
  <text x="1040" y="525" text-anchor="end" font-size="10" fill="#64748b">~$700M/yr</text>

  <!-- x labels for projections -->
  <text x="611" y="545" text-anchor="middle" font-size="11" fill="#64748b">2027E</text>
  <text x="768" y="545" text-anchor="middle" font-size="11" fill="#64748b">2028E</text>
  <text x="925" y="545" text-anchor="middle" font-size="11" fill="#64748b">2029E</text>
  <text x="1080" y="545" text-anchor="middle" font-size="11" fill="#64748b">2030E</text>

  <!-- Legend -->
  <line x1="160" y1="580" x2="190" y2="580" stroke="#22c55e" stroke-width="2"/>
  <text x="195" y="584" font-size="11" fill="#94a3b8">R&amp;D 유지 (17년+)</text>
  <line x1="370" y1="580" x2="400" y2="580" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="405" y="584" font-size="11" fill="#94a3b8">1호기 건설 시작 (6년)</text>
  <line x1="600" y1="580" x2="630" y2="580" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="635" y="584" font-size="11" fill="#94a3b8">대규모 착수 (4년 소진)</text>

  <!-- Bottom insight -->
  <rect x="80" y="610" width="1040" height="90" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="640" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">현재 소진율 $106M/yr → R&amp;D만 하면 17년 버틴다</text>
  <text x="600" y="660" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">그런데 원자로를 짓기 시작하면? SMR 1기 건설비 $1~3B 추정</text>
  <text x="600" y="682" font-size="11" fill="#94a3b8" text-anchor="middle">$2.5B는 많아 보이지만, 원자력 산업에서는 1기 짓고 끝나는 금액</text>
</svg>