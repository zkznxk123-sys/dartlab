<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Oklo 계약 파이프라인 14GW vs 가동 0기</title>
  <desc>Switch 12GW, Meta 1.2GW, Equinix 0.5GW, 미공군 0.075GW — 가동 원자로 0기</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="16" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="1199" height="719" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">Oklo 계약 파이프라인 14GW — 가동 원자로 0기</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">MOU/LOI 기반 | 구속력 있는 PPA(전력구매계약) 아님 | 2026-04 기준</text>

  <!-- Horizontal bar chart: x 200~950 for bars -->
  <!-- Total ~14GW. Scale: 200 = 0GW, 950 = 14GW. 1GW = 53.6px -->

  <!-- Switch: 12GW => width = 12 * 53.6 = 643 -->
  <rect x="200" y="130" width="643" height="64" rx="8" fill="#fbbf24" opacity="0.85"/>
  <text x="190" y="168" text-anchor="end" font-size="15" font-weight="700" fill="#f1f5f9">Switch</text>
  <text x="855" y="160" text-anchor="start" font-size="22" font-weight="800" fill="#fbbf24">12 GW</text>
  <text x="855" y="180" text-anchor="start" font-size="11" fill="#64748b">데이터센터 전력 | 비구속 LOI</text>
  <text x="520" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#0a0e1a">총 파이프라인의 85%</text>

  <!-- Meta: 1.2GW => width = 1.2 * 53.6 = 64 -->
  <rect x="200" y="230" width="64" height="64" rx="8" fill="#22c55e" opacity="0.85"/>
  <text x="190" y="268" text-anchor="end" font-size="15" font-weight="700" fill="#f1f5f9">Meta</text>
  <text x="275" y="260" text-anchor="start" font-size="22" font-weight="800" fill="#22c55e">1.2 GW</text>
  <text x="275" y="280" text-anchor="start" font-size="11" fill="#64748b">AI 데이터센터 | 비구속 LOI</text>

  <!-- Equinix: 0.5GW => width = 0.5 * 53.6 = 27 -->
  <rect x="200" y="330" width="27" height="64" rx="8" fill="#06b6d4" opacity="0.85"/>
  <text x="190" y="368" text-anchor="end" font-size="15" font-weight="700" fill="#f1f5f9">Equinix</text>
  <text x="238" y="360" text-anchor="start" font-size="22" font-weight="800" fill="#06b6d4">500 MW</text>
  <text x="238" y="380" text-anchor="start" font-size="11" fill="#64748b">코로케이션 데이터센터 | LOI</text>

  <!-- US Air Force: 0.075GW => width = 0.075 * 53.6 = 4 (min visible) -->
  <rect x="200" y="430" width="8" height="64" rx="4" fill="#a78bfa" opacity="0.85"/>
  <text x="190" y="468" text-anchor="end" font-size="15" font-weight="700" fill="#f1f5f9">미 공군</text>
  <text x="220" y="460" text-anchor="start" font-size="22" font-weight="800" fill="#a78bfa">75 MW</text>
  <text x="220" y="480" text-anchor="start" font-size="11" fill="#64748b">Eielson 공군기지 | 마이크로원자로</text>

  <!-- Divider -->
  <line x1="100" y1="530" x2="1100" y2="530" stroke="#1e2433" stroke-width="1"/>

  <!-- Reality check: Operating reactors = 0 -->
  <rect x="300" y="555" width="600" height="90" rx="12" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="2"/>
  <text x="600" y="590" text-anchor="middle" font-size="24" font-weight="800" fill="#ef4444">가동 중인 원자로: 0기</text>
  <text x="600" y="616" text-anchor="middle" font-size="14" fill="#94a3b8">NRC 인허가 미취득 | Aurora 설계 변경 중 | 최초 가동 목표: 2027</text>
  <text x="600" y="636" text-anchor="middle" font-size="12" fill="#64748b">2022년 INL 연료 회수형 고속로 인허가 거절 이력</text>

  <!-- Bottom insight -->
  <rect x="80" y="660" width="1040" height="40" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="685" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">계약서는 14GW, 현실은 0GW — 모든 계약이 "원자로가 인허가를 받으면" 조건부</text>
</svg>