<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Oklo 시총 $13B vs 매출 $0</title>
  <desc>매출이 0인 회사의 시총이 $13B — PER 계산 불가</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="680" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="679" rx="16" stroke="#1e2433" fill="none"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">Oklo 시총 $13B vs 매출 $0 — PER 계산 불가</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">2026-04 기준 | NYSE: OKLO | dartlab 실측</text>

  <!-- Chart area -->
  <line x1="200" y1="120" x2="200" y2="520" stroke="#1e2433"/>
  <line x1="200" y1="520" x2="1000" y2="520" stroke="#1e2433"/>

  <!-- y gridlines -->
  <line x1="200" y1="120" x2="1000" y2="120" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="200" y1="220" x2="1000" y2="220" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="200" y1="320" x2="1000" y2="320" stroke="#1e2433" stroke-dasharray="4 4"/>
  <line x1="200" y1="420" x2="1000" y2="420" stroke="#1e2433" stroke-dasharray="4 4"/>

  <!-- y labels ($B) -->
  <text x="190" y="124" text-anchor="end" font-size="11" fill="#64748b">$15B</text>
  <text x="190" y="224" text-anchor="end" font-size="11" fill="#64748b">$10B</text>
  <text x="190" y="324" text-anchor="end" font-size="11" fill="#64748b">$5B</text>
  <text x="190" y="424" text-anchor="end" font-size="11" fill="#64748b">$1B</text>
  <text x="190" y="524" text-anchor="end" font-size="11" fill="#64748b">$0</text>

  <!-- Market Cap bar: $13B => height proportional, y=120 is $15B, y=520 is $0 -->
  <!-- $13B / $15B * 400 = 346.7, y = 520 - 346.7 = 173.3 -->
  <rect x="320" y="173" width="160" height="347" rx="8" fill="url(#goldBar)" opacity="0.9"/>
  <text x="400" y="155" text-anchor="middle" font-size="28" font-weight="800" fill="#fbbf24">$13B</text>
  <text x="400" y="545" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">시가총액</text>
  <text x="400" y="565" text-anchor="middle" font-size="12" fill="#64748b">약 18조원</text>

  <!-- Revenue bar: $0 => no bar, just a flat line at bottom -->
  <rect x="680" y="516" width="160" height="4" rx="2" fill="#ef4444" opacity="0.6"/>
  <text x="760" y="500" text-anchor="middle" font-size="28" font-weight="800" fill="#ef4444">$0</text>
  <text x="760" y="545" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">매출</text>
  <text x="760" y="565" text-anchor="middle" font-size="12" fill="#64748b">3년 연속 0</text>

  <!-- Infinity PER annotation -->
  <line x1="480" y1="340" x2="680" y2="340" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>
  <rect x="525" y="290" width="150" height="80" rx="12" fill="#fbbf24" opacity="0.08" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="325" text-anchor="middle" font-size="48" font-weight="800" fill="#fbbf24" opacity="0.9">&#x221E;</text>
  <text x="600" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">PER = 분모 없음</text>

  <!-- Bottom insight -->
  <rect x="80" y="605" width="1040" height="50" rx="10" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="630" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">시총 $13B / 매출 $0 / 순손실 $105.7M — PER, PSR, EV/EBITDA 전부 계산 불가</text>
  <text x="600" y="648" font-size="11" fill="#94a3b8" text-anchor="middle">직원 1인당 시총 $108M — 전통 밸류에이션이 작동하지 않는 회사</text>
</svg>