<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="380" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">영업활동현금흐름 — 기아는 항상 양수, 현대차는 음수</text>
  <text x="400" y="55" text-anchor="middle" fill="#64748b" font-size="13">같은 그룹인데 재무제표 구조가 정반대 (캡티브 금융 연결 차이)</text>

  <!-- Zero line -->
  <line x1="80" y1="220" x2="750" y2="220" stroke="#475569" stroke-width="1.5"/>
  <text x="70" y="224" text-anchor="end" fill="#94a3b8" font-size="11">0</text>

  <!-- Scale: 1조 = 10px -->
  <!-- Kia bars (positive, going up from 220) -->
  <!-- 2021: 7.4조 = 74px -->
  <rect x="110" y="146" width="55" height="74" rx="3" fill="#22c55e"/>
  <text x="137" y="140" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">7.4</text>

  <!-- 2022: 9.3조 = 93px -->
  <rect x="240" y="127" width="55" height="93" rx="3" fill="#22c55e"/>
  <text x="267" y="121" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">9.3</text>

  <!-- 2023: 11.3조 = 113px -->
  <rect x="370" y="107" width="55" height="113" rx="3" fill="#22c55e"/>
  <text x="397" y="101" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">11.3</text>

  <!-- 2024: 12.6조 = 126px -->
  <rect x="500" y="94" width="55" height="126" rx="3" fill="#22c55e"/>
  <text x="527" y="88" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">12.6</text>

  <!-- 2025: 9.1조 = 91px -->
  <rect x="630" y="129" width="55" height="91" rx="3" fill="#22c55e"/>
  <text x="657" y="123" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">9.1</text>

  <!-- Hyundai bars (mostly negative) -->
  <!-- 2021: 0.9조 (positive) = 9px -->
  <rect x="175" y="211" width="55" height="9" rx="3" fill="#64748b" opacity="0.7"/>
  <text x="202" y="206" text-anchor="middle" fill="#94a3b8" font-size="10">0.9</text>

  <!-- 2022: assume -2조 -->
  <!-- skip 2022, we have incomplete data, show 2024/2025 -->

  <!-- 2024: -5.7조 = 57px -->
  <rect x="565" y="220" width="55" height="57" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="592" y="290" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">-5.7</text>

  <!-- 2025: -6.0조 = 60px -->
  <rect x="695" y="220" width="55" height="60" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="722" y="293" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">-6.0</text>

  <!-- Year labels -->
  <text x="145" y="345" text-anchor="middle" fill="#94a3b8" font-size="12">2021</text>
  <text x="275" y="345" text-anchor="middle" fill="#94a3b8" font-size="12">2022</text>
  <text x="405" y="345" text-anchor="middle" fill="#94a3b8" font-size="12">2023</text>
  <text x="535" y="345" text-anchor="middle" fill="#94a3b8" font-size="12">2024</text>
  <text x="665" y="345" text-anchor="middle" fill="#94a3b8" font-size="12">2025</text>

  <!-- Legend -->
  <rect x="240" y="360" width="14" height="14" rx="2" fill="#22c55e"/>
  <text x="260" y="373" fill="#22c55e" font-size="12">기아 영업CF</text>
  <rect x="390" y="360" width="14" height="14" rx="2" fill="#ef4444" opacity="0.7"/>
  <text x="410" y="373" fill="#ef4444" font-size="12">현대차 영업CF</text>

  <!-- Annotation -->
  <rect x="470" y="305" width="260" height="28" rx="4" fill="#22c55e15" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="324" text-anchor="middle" fill="#22c55e" font-size="11">캡티브 금융 없음 → CF 깨끗</text>
</svg>
