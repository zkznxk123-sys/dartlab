<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="420" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">기아 마진 폭포 — 디자인이 올린 것 vs 품질이 깎은 것</text>
  <text x="400" y="55" text-anchor="middle" fill="#64748b" font-size="13">2021→2024 변화 분해 (매출총이익률 - 판관비율 = OPM)</text>

  <!-- Baseline -->
  <line x1="60" y1="360" x2="760" y2="360" stroke="#1e293b" stroke-width="1"/>

  <!-- 2021 OPM 7.3% bar -->
  <rect x="80" y="213" width="100" height="147" rx="4" fill="#64748b"/>
  <text x="130" y="205" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold">7.3%</text>
  <text x="130" y="385" text-anchor="middle" fill="#94a3b8" font-size="12">2021 OPM</text>

  <!-- GP margin improvement +4.6%p -->
  <rect x="220" y="120" width="100" height="93" rx="4" fill="#22c55e"/>
  <text x="270" y="112" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">+4.6%p</text>
  <text x="270" y="175" text-anchor="middle" fill="#fff" font-size="11">매출총이익률</text>
  <text x="270" y="192" text-anchor="middle" fill="#fff" font-size="11">상승</text>
  <text x="270" y="385" text-anchor="middle" fill="#94a3b8" font-size="11">디자인 프리미엄</text>

  <!-- SGA increase -6.6%p -->
  <rect x="360" y="120" width="100" height="133" rx="4" fill="#ef4444"/>
  <text x="410" y="112" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">-6.6%p</text>
  <text x="410" y="175" text-anchor="middle" fill="#fff" font-size="11">판관비율</text>
  <text x="410" y="192" text-anchor="middle" fill="#fff" font-size="11">폭등</text>
  <text x="410" y="385" text-anchor="middle" fill="#94a3b8" font-size="11">워런티+리콜</text>

  <!-- Net effect arrow -->
  <text x="530" y="175" text-anchor="middle" fill="#64748b" font-size="24">→</text>

  <!-- 2024 OPM 11.8% bar (net: 7.3+4.6-6.6 ≈ but actual is different, show actual) -->
  <!-- Actually: 2024 OPM = 11.8%. The bars show conceptual flow. -->
  <rect x="580" y="122" width="100" height="238" rx="4" fill="#fbbf24"/>
  <text x="630" y="114" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">11.8%</text>
  <text x="630" y="385" text-anchor="middle" fill="#94a3b8" font-size="12">2024 OPM</text>
  <text x="630" y="250" text-anchor="middle" fill="#0a0e1a" font-size="12" font-weight="bold">GP가</text>
  <text x="630" y="267" text-anchor="middle" fill="#0a0e1a" font-size="12" font-weight="bold">판관비를</text>
  <text x="630" y="284" text-anchor="middle" fill="#0a0e1a" font-size="12" font-weight="bold">이긴 해</text>

  <!-- 2025 annotation -->
  <rect x="580" y="30" width="180" height="60" rx="6" fill="#ef444420" stroke="#ef4444" stroke-width="1"/>
  <text x="670" y="52" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">2025: GP도 하락 (19.7%)</text>
  <text x="670" y="70" text-anchor="middle" fill="#ef4444" font-size="12">→ OPM 8.0% 급락</text>
</svg>
