<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="400" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">기아 vs 현대차 영업이익률(OPM) 5년 추이</text>
  <text x="400" y="55" text-anchor="middle" fill="#64748b" font-size="13">같은 플랫폼인데 마진이 다르다 — 2024년 3.7%p 차이</text>

  <!-- Grid -->
  <line x1="100" y1="80" x2="100" y2="340" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="340" x2="740" y2="340" stroke="#1e293b" stroke-width="1"/>
  <!-- Horizontal grid lines -->
  <line x1="100" y1="295" x2="740" y2="295" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="299" text-anchor="end" fill="#64748b" font-size="11">4%</text>
  <line x1="100" y1="250" x2="740" y2="250" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="254" text-anchor="end" fill="#64748b" font-size="11">6%</text>
  <line x1="100" y1="205" x2="740" y2="205" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="209" text-anchor="end" fill="#64748b" font-size="11">8%</text>
  <line x1="100" y1="160" x2="740" y2="160" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="164" text-anchor="end" fill="#64748b" font-size="11">10%</text>
  <line x1="100" y1="115" x2="740" y2="115" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="119" text-anchor="end" fill="#64748b" font-size="11">12%</text>

  <!-- Year labels -->
  <text x="196" y="365" text-anchor="middle" fill="#94a3b8" font-size="12">2021</text>
  <text x="332" y="365" text-anchor="middle" fill="#94a3b8" font-size="12">2022</text>
  <text x="468" y="365" text-anchor="middle" fill="#94a3b8" font-size="12">2023</text>
  <text x="604" y="365" text-anchor="middle" fill="#94a3b8" font-size="12">2024</text>
  <text x="740" y="365" text-anchor="middle" fill="#94a3b8" font-size="12">2025</text>

  <!-- Scale: 1% = 22.5px, 0%=340 -->
  <!-- Kia: 7.3, 8.4, 11.6, 11.8, 8.0 -->
  <!-- Y: 340 - val*22.5 -->
  <!-- 7.3=175.75→164.25, 8.4=151→189, 11.6=79→261, 11.8=74.5→265.5, 8.0=160→180 -->
  <polyline points="196,175.75 332,151 468,79 604,74.5 740,160" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="196" cy="175.75" r="5" fill="#fbbf24"/>
  <circle cx="332" cy="151" r="5" fill="#fbbf24"/>
  <circle cx="468" cy="79" r="5" fill="#fbbf24"/>
  <circle cx="604" cy="74.5" r="6" fill="#fbbf24" stroke="#fff" stroke-width="2"/>
  <circle cx="740" cy="160" r="5" fill="#fbbf24"/>
  <text x="196" y="168" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">7.3%</text>
  <text x="332" y="143" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">8.4%</text>
  <text x="468" y="71" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">11.6%</text>
  <text x="604" y="65" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">11.8%</text>
  <text x="740" y="152" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">8.0%</text>

  <!-- Hyundai: 5.7, 6.9, 9.3, 8.1, 6.2 -->
  <polyline points="196,211.75 332,184.75 468,130.75 604,157.75 740,200.5" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="196" cy="211.75" r="4" fill="#64748b"/>
  <circle cx="332" cy="184.75" r="4" fill="#64748b"/>
  <circle cx="468" cy="130.75" r="4" fill="#64748b"/>
  <circle cx="604" cy="157.75" r="4" fill="#64748b"/>
  <circle cx="740" cy="200.5" r="4" fill="#64748b"/>
  <text x="196" y="228" text-anchor="middle" fill="#94a3b8" font-size="11">5.7%</text>
  <text x="332" y="201" text-anchor="middle" fill="#94a3b8" font-size="11">6.9%</text>
  <text x="468" y="147" text-anchor="middle" fill="#94a3b8" font-size="11">9.3%</text>
  <text x="604" y="174" text-anchor="middle" fill="#94a3b8" font-size="11">8.1%</text>
  <text x="740" y="217" text-anchor="middle" fill="#94a3b8" font-size="11">6.2%</text>

  <!-- Legend -->
  <line x1="240" y1="385" x2="270" y2="385" stroke="#fbbf24" stroke-width="3"/>
  <text x="275" y="389" fill="#fbbf24" font-size="12">기아</text>
  <line x1="340" y1="385" x2="370" y2="385" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="375" y="389" fill="#94a3b8" font-size="12">현대차</text>

  <!-- Annotation -->
  <rect x="535" y="60" width="120" height="24" rx="4" fill="#fbbf2420" stroke="#fbbf24" stroke-width="1"/>
  <text x="595" y="77" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">+3.7%p 차이</text>
</svg>
