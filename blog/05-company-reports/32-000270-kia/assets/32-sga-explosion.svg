<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="380" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">기아 판관비 5년 추이 — 3.3조에서 13.4조로 4배</text>
  <text x="400" y="55" text-anchor="middle" fill="#64748b" font-size="13">2023→2024 한 해에 +75% (+5.2조원) 폭등</text>

  <!-- Bars: scale 1조 = 18px height, base at y=330 -->
  <!-- 2021: 3.3조 = 59.4px -->
  <rect x="110" y="270.6" width="90" height="59.4" rx="4" fill="#64748b"/>
  <text x="155" y="263" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">3.3조</text>
  <text x="155" y="350" text-anchor="middle" fill="#94a3b8" font-size="12">2021</text>
  <text x="155" y="310" text-anchor="middle" fill="#fff" font-size="11">4.7%</text>

  <!-- 2022: 3.9조 = 70.2px -->
  <rect x="240" y="259.8" width="90" height="70.2" rx="4" fill="#64748b"/>
  <text x="285" y="252" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">3.9조</text>
  <text x="285" y="350" text-anchor="middle" fill="#94a3b8" font-size="12">2022</text>
  <text x="285" y="305" text-anchor="middle" fill="#fff" font-size="11">4.5%</text>

  <!-- 2023: 6.9조 = 124.2px -->
  <rect x="370" y="205.8" width="90" height="124.2" rx="4" fill="#f59e0b"/>
  <text x="415" y="198" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">6.9조</text>
  <text x="415" y="350" text-anchor="middle" fill="#94a3b8" font-size="12">2023</text>
  <text x="415" y="280" text-anchor="middle" fill="#fff" font-size="11">6.9%</text>
  <text x="415" y="196" text-anchor="middle" fill="#f59e0b" font-size="10">+79%</text>

  <!-- 2024: 12.1조 = 217.8px -->
  <rect x="500" y="112.2" width="90" height="217.8" rx="4" fill="#ef4444"/>
  <text x="545" y="105" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">12.1조</text>
  <text x="545" y="350" text-anchor="middle" fill="#94a3b8" font-size="12">2024</text>
  <text x="545" y="230" text-anchor="middle" fill="#fff" font-size="11">11.3%</text>
  <text x="545" y="93" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">+75%!</text>

  <!-- 2025: 13.4조 = 241.2px -->
  <rect x="630" y="88.8" width="90" height="241.2" rx="4" fill="#ef4444"/>
  <text x="675" y="81" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">13.4조</text>
  <text x="675" y="350" text-anchor="middle" fill="#94a3b8" font-size="12">2025</text>
  <text x="675" y="220" text-anchor="middle" fill="#fff" font-size="11">11.8%</text>

  <!-- Arrow annotation -->
  <path d="M155,275 C155,100 545,100 545,118" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="350" y="95" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">4배 (306%)</text>
</svg>
