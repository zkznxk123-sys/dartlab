<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="450" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">기아의 이중 구조 — 강점과 약점이 같은 곳에 있다</text>
  <text x="400" y="55" text-anchor="middle" fill="#64748b" font-size="13">현대차 대비 기아의 구조적 차이점 (2024 기준)</text>

  <!-- Strength section -->
  <rect x="40" y="80" width="340" height="340" rx="8" fill="#22c55e10" stroke="#22c55e" stroke-width="1"/>
  <text x="210" y="105" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="bold">강점 구조</text>

  <circle cx="75" cy="140" r="8" fill="#22c55e"/>
  <text x="90" y="145" fill="#f1f5f9" font-size="13">매출총이익률 23.1% (현대차 20.4%)</text>
  <text x="90" y="163" fill="#64748b" font-size="11">디자인 프리미엄 + SUV 믹스</text>

  <circle cx="75" cy="200" r="8" fill="#22c55e"/>
  <text x="90" y="205" fill="#f1f5f9" font-size="13">영업CF 항상 양수 (+12.6조)</text>
  <text x="90" y="223" fill="#64748b" font-size="11">캡티브 금융 미연결 → CF 깨끗</text>

  <circle cx="75" cy="260" r="8" fill="#22c55e"/>
  <text x="90" y="265" fill="#f1f5f9" font-size="13">순현금 10.6조 (빚보다 현금 많음)</text>
  <text x="90" y="283" fill="#64748b" font-size="11">부채비율 66% → 5년 연속 하락</text>

  <circle cx="75" cy="320" r="8" fill="#22c55e"/>
  <text x="90" y="325" fill="#f1f5f9" font-size="13">디자인 3대 어워드 석권</text>
  <text x="90" y="343" fill="#64748b" font-size="11">EV9 레드닷+iF+IDEA 동시</text>

  <circle cx="75" cy="380" r="8" fill="#22c55e"/>
  <text x="90" y="385" fill="#f1f5f9" font-size="13">제네시스 부담 없음</text>
  <text x="90" y="403" fill="#64748b" font-size="11">프리미엄 브랜드 비용 0</text>

  <!-- Weakness section -->
  <rect x="420" y="80" width="340" height="340" rx="8" fill="#ef444410" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="105" text-anchor="middle" fill="#ef4444" font-size="16" font-weight="bold">약점 구조</text>

  <circle cx="455" cy="140" r="8" fill="#ef4444"/>
  <text x="470" y="145" fill="#f1f5f9" font-size="13">판관비 4배 폭증 (3.3→13.4조)</text>
  <text x="470" y="163" fill="#64748b" font-size="11">세타II + EV 화재 워런티</text>

  <circle cx="455" cy="200" r="8" fill="#ef4444"/>
  <text x="470" y="205" fill="#f1f5f9" font-size="13">OPM 11.8% → 8.0% 급락</text>
  <text x="470" y="223" fill="#64748b" font-size="11">원가 + 판관비 이중 압박</text>

  <circle cx="455" cy="260" r="8" fill="#ef4444"/>
  <text x="470" y="265" fill="#f1f5f9" font-size="13">관세 25% → 연 3.3조 부담</text>
  <text x="470" y="283" fill="#64748b" font-size="11">미국 공장 미가동 (2024말 시작)</text>

  <circle cx="455" cy="320" r="8" fill="#f59e0b"/>
  <text x="470" y="325" fill="#f1f5f9" font-size="13">현대차 자회사 (지분 33.88%)</text>
  <text x="470" y="343" fill="#64748b" font-size="11">독립 전략 한계 + 지배구조 디스카운트</text>

  <circle cx="455" cy="380" r="8" fill="#f59e0b"/>
  <text x="470" y="385" fill="#f1f5f9" font-size="13">재고 14.7조 — 매출 대비 12.9%</text>
  <text x="470" y="403" fill="#64748b" font-size="11">5년간 2배 증가 추세</text>
</svg>
