<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="450" fill="#0a0e1a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">Intel 배당 — $1.46에서 중단까지, 92% 삭감의 궤적</text>
  <text x="400" y="62" text-anchor="middle" fill="#64748b" font-size="12">연간 DPS ($), 2020–2025</text>

  <!-- Y축 그리드 -->
  <line x1="120" y1="110" x2="720" y2="110" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="170" x2="720" y2="170" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="230" x2="720" y2="230" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="290" x2="720" y2="290" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="350" x2="720" y2="350" stroke="#1e293b" stroke-width="1"/>

  <!-- Y축 라벨 -->
  <text x="110" y="115" text-anchor="end" fill="#64748b" font-size="11">$1.50</text>
  <text x="110" y="175" text-anchor="end" fill="#64748b" font-size="11">$1.20</text>
  <text x="110" y="235" text-anchor="end" fill="#64748b" font-size="11">$0.90</text>
  <text x="110" y="295" text-anchor="end" fill="#64748b" font-size="11">$0.60</text>
  <text x="110" y="355" text-anchor="end" fill="#64748b" font-size="11">$0.30</text>

  <!-- 스케일: $0=390, $1.50=110 → $0.01 = 186.67px/1.5 ≈ 1.867px per $0.01 -->
  <!-- y = 390 - val * 186.667 -->
  <!-- 2020 $1.39: 390 - 1.39*186.667 = 390 - 259.5 = 130.5 -->
  <!-- 2021 $1.46: 390 - 1.46*186.667 = 390 - 272.5 = 117.5 -->
  <!-- 2022 $1.46: 117.5 -->
  <!-- 2023 $0.50: 390 - 0.50*186.667 = 390 - 93.3 = 296.7 -->
  <!-- 2024 $0.125: 390 - 0.125*186.667 = 390 - 23.3 = 366.7 -->
  <!-- 2025 $0: 390 -->
  <!-- X: 2020=170, 2021=280, 2022=390, 2023=500, 2024=610, 2025=700 -->

  <!-- 안정 구간 (초록) 2020→2021→2022 -->
  <line x1="170" y1="130.5" x2="280" y2="117.5" stroke="#22c55e" stroke-width="3"/>
  <line x1="280" y1="117.5" x2="390" y2="117.5" stroke="#22c55e" stroke-width="3"/>

  <!-- 하락 구간 (빨강) 2022→2025 -->
  <line x1="390" y1="117.5" x2="500" y2="296.7" stroke="#ef4444" stroke-width="3"/>
  <line x1="500" y1="296.7" x2="610" y2="366.7" stroke="#ef4444" stroke-width="3"/>
  <line x1="610" y1="366.7" x2="700" y2="390" stroke="#ef4444" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- 하락 영역 (빨강 반투명) -->
  <polygon points="390,117.5 500,296.7 610,366.7 700,390 700,390 390,390" fill="#ef4444" opacity="0.08"/>

  <!-- 데이터 포인트 -->
  <circle cx="170" cy="130.5" r="5" fill="#22c55e"/>
  <circle cx="280" cy="117.5" r="6" fill="#fbbf24"/>
  <circle cx="390" cy="117.5" r="5" fill="#22c55e"/>
  <circle cx="500" cy="296.7" r="5" fill="#ef4444"/>
  <circle cx="610" cy="366.7" r="5" fill="#ef4444"/>
  <circle cx="700" cy="390" r="7" fill="#ef4444" stroke="#ef4444" stroke-width="2" opacity="0.6"/>

  <!-- 데이터 라벨 -->
  <text x="170" y="120" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">$1.39</text>
  <text x="280" y="105" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">$1.46</text>
  <text x="280" y="93" text-anchor="middle" fill="#fbbf24" font-size="10">PEAK</text>
  <text x="390" y="107" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">$1.46</text>
  <text x="500" y="288" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">$0.50</text>
  <text x="500" y="310" text-anchor="middle" fill="#ef4444" font-size="10">-66%</text>
  <text x="610" y="358" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">$0.125</text>
  <text x="610" y="380" text-anchor="middle" fill="#ef4444" font-size="10">-75%</text>

  <!-- 배당 중단 마크 -->
  <text x="700" y="378" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="bold">$0</text>
  <text x="700" y="360" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">SUSPENDED</text>

  <!-- X축 라벨 -->
  <text x="170" y="415" text-anchor="middle" fill="#94a3b8" font-size="13">2020</text>
  <text x="280" y="415" text-anchor="middle" fill="#94a3b8" font-size="13">2021</text>
  <text x="390" y="415" text-anchor="middle" fill="#94a3b8" font-size="13">2022</text>
  <text x="500" y="415" text-anchor="middle" fill="#94a3b8" font-size="13">2023</text>
  <text x="610" y="415" text-anchor="middle" fill="#94a3b8" font-size="13">2024</text>
  <text x="700" y="415" text-anchor="middle" fill="#94a3b8" font-size="13">2025</text>

  <!-- 주석 -->
  <text x="400" y="440" text-anchor="middle" fill="#64748b" font-size="12">32년 연속 배당 기록 종료 — 현금 보존을 위한 불가피한 결정</text>
</svg>