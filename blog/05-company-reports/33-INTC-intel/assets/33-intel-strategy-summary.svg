<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="500" fill="#0a0e1a"/>
  <text x="400" y="38" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">Intel 전략 요약 — "포기하지 않겠다"의 비용</text>

  <!-- 왼쪽: 위기 -->
  <rect x="40" y="70" width="340" height="200" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
  <text x="210" y="95" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="bold">위기의 숫자</text>
  <text x="60" y="125" fill="#f1f5f9" font-size="13">매출 $79B → $53B (-33%)</text>
  <text x="60" y="150" fill="#f1f5f9" font-size="13">순손실 $18.8B (역대 최대)</text>
  <text x="60" y="175" fill="#f1f5f9" font-size="13">파운드리 적자 $10.3B</text>
  <text x="60" y="200" fill="#f1f5f9" font-size="13">FCF -$15.7B (3년 연속 적자)</text>
  <text x="60" y="225" fill="#f1f5f9" font-size="13">배당 중단 (36년 기록 종료)</text>
  <text x="60" y="250" fill="#f1f5f9" font-size="13">R&amp;D = 매출총이익의 95%</text>

  <!-- 오른쪽: 희망 -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#1e1b2e" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="95" text-anchor="middle" fill="#22c55e" font-size="15" font-weight="bold">반전의 신호</text>
  <text x="440" y="125" fill="#f1f5f9" font-size="13">NVIDIA $5B 투자 (지분 4%)</text>
  <text x="440" y="150" fill="#f1f5f9" font-size="13">Terafab $25B AI칩 파트너십</text>
  <text x="440" y="175" fill="#f1f5f9" font-size="13">18A (1.8nm) 수율 개선 중</text>
  <text x="440" y="200" fill="#f1f5f9" font-size="13">CHIPS Act $8B 보조금</text>
  <text x="440" y="225" fill="#f1f5f9" font-size="13">Lip-Bu Tan 신임 CEO</text>
  <text x="440" y="250" fill="#f1f5f9" font-size="13">Fab 34 $14.2B에 재매입</text>

  <!-- 중앙 화살표 -->
  <polygon points="390,170 410,155 410,185" fill="#fbbf24"/>

  <!-- 하단: 핵심 판단 -->
  <rect x="80" y="300" width="640" height="80" rx="8" fill="#1a1625" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="330" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="bold">핵심 판단</text>
  <text x="400" y="355" text-anchor="middle" fill="#f1f5f9" font-size="13">"파운드리 $10B 적자 = 포기하지 않겠다는 비용"</text>
  <text x="400" y="375" text-anchor="middle" fill="#f1f5f9" font-size="13">"NVIDIA $5B = 포기하지 마라는 메시지"</text>

  <!-- 하단 주석 -->
  <text x="400" y="430" text-anchor="middle" fill="#64748b" font-size="12">주가 213% 급등 = 실적이 아니라 기대</text>
  <text x="400" y="455" text-anchor="middle" fill="#64748b" font-size="12">18A 수율 80% 돌파가 전환점</text>
  <text x="400" y="480" text-anchor="middle" fill="#64748b" font-size="11">dartlab EDGAR 실측 기반 · 2026-04-13</text>
</svg>