<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="400" fill="#0a0e1a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">반도체 시총 비교 — Intel은 NVIDIA의 1/15</text>
  <text x="400" y="62" text-anchor="middle" fill="#64748b" font-size="12">2026.04 기준 ($B)</text>

  <!-- NVIDIA -->
  <rect x="80" y="100" width="600" height="40" rx="4" fill="#6366f1" opacity="0.8"/>
  <text x="90" y="125" fill="#f1f5f9" font-size="14" font-weight="bold">NVIDIA</text>
  <text x="690" y="125" text-anchor="end" fill="#f1f5f9" font-size="14">$4,600B</text>

  <!-- TSMC -->
  <rect x="80" y="155" width="196" height="40" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="90" y="180" fill="#f1f5f9" font-size="14" font-weight="bold">TSMC</text>
  <text x="286" y="180" text-anchor="end" fill="#f1f5f9" font-size="14">$1,500B</text>

  <!-- AMD -->
  <rect x="80" y="210" width="52" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="145" y="235" fill="#f1f5f9" font-size="14" font-weight="bold">AMD $400B</text>

  <!-- Intel -->
  <rect x="80" y="265" width="41" height="40" rx="4" fill="#fbbf24" opacity="0.9"/>
  <text x="135" y="290" fill="#fbbf24" font-size="14" font-weight="bold">Intel $313B</text>

  <!-- 비율 주석 -->
  <text x="400" y="340" text-anchor="middle" fill="#64748b" font-size="13">Intel 시총 = NVIDIA의 1/15, TSMC의 1/5</text>
  <text x="400" y="365" text-anchor="middle" fill="#ef4444" font-size="13">적자라 PER 계산 불가 · PBR ~2.5x</text>
</svg>