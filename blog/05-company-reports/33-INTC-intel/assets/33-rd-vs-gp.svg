<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="480" fill="#0a0e1a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">Intel 연구비 vs 매출총이익 — R&amp;D가 이익을 다 먹는다</text>
  <text x="400" y="62" text-anchor="middle" fill="#64748b" font-size="12">2020–2024 ($B)</text>

  <!-- 범례 -->
  <rect x="270" y="76" width="14" height="14" rx="2" fill="#22c55e" opacity="0.85"/>
  <text x="290" y="88" fill="#94a3b8" font-size="12">매출총이익 (Gross Profit)</text>
  <rect x="470" y="76" width="14" height="14" rx="2" fill="#3b82f6" opacity="0.85"/>
  <text x="490" y="88" fill="#94a3b8" font-size="12">R&amp;D 비용</text>

  <!-- Y축 그리드 -->
  <line x1="120" y1="120" x2="720" y2="120" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="180" x2="720" y2="180" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="240" x2="720" y2="240" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="300" x2="720" y2="300" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="360" x2="720" y2="360" stroke="#1e293b" stroke-width="1"/>

  <!-- Y축 라벨 -->
  <text x="110" y="125" text-anchor="end" fill="#64748b" font-size="11">$50B</text>
  <text x="110" y="185" text-anchor="end" fill="#64748b" font-size="11">$40B</text>
  <text x="110" y="245" text-anchor="end" fill="#64748b" font-size="11">$30B</text>
  <text x="110" y="305" text-anchor="end" fill="#64748b" font-size="11">$20B</text>
  <text x="110" y="365" text-anchor="end" fill="#64748b" font-size="11">$10B</text>

  <!-- 스케일: $0=420, $50B=120 → 1B = 6px, y = 420 - val*6 -->
  <!-- GP: 2020 $43.0B, 2021 $43.8B, 2022 $26.3B, 2023 $21.7B, 2024 $17.3B -->
  <!-- RD: 2020 $13.6B, 2021 $15.2B, 2022 $17.5B, 2023 $16.0B, 2024 $16.5B -->
  <!-- X centers: 2020=195, 2021=315, 2022=435, 2023=555, 2024=675 -->
  <!-- bar width: GP 40px left, RD 40px right, gap 6px -->

  <!-- 2020 -->
  <rect x="152" y="162" width="40" height="258" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="198" y="338.4" width="40" height="81.6" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="172" y="155" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">$43.0B</text>
  <text x="218" y="332" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">$13.6B</text>
  <text x="195" y="440" text-anchor="middle" fill="#64748b" font-size="10">31%</text>

  <!-- 2021 -->
  <rect x="272" y="157.2" width="40" height="262.8" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="318" y="328.8" width="40" height="91.2" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="292" y="150" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">$43.8B</text>
  <text x="338" y="322" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">$15.2B</text>
  <text x="315" y="440" text-anchor="middle" fill="#64748b" font-size="10">35%</text>

  <!-- 2022 -->
  <rect x="392" y="262.2" width="40" height="157.8" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="438" y="315" width="40" height="105" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="412" y="255" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">$26.3B</text>
  <text x="458" y="308" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">$17.5B</text>
  <text x="435" y="440" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">67%</text>

  <!-- 2023 -->
  <rect x="512" y="289.8" width="40" height="130.2" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="558" y="324" width="40" height="96" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="532" y="283" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">$21.7B</text>
  <text x="578" y="317" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">$16.0B</text>
  <text x="555" y="440" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">74%</text>

  <!-- 2024 -->
  <rect x="632" y="316.2" width="40" height="103.8" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="678" y="321" width="40" height="99" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="652" y="309" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">$17.3B</text>
  <text x="698" y="314" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">$16.5B</text>
  <text x="675" y="440" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">95%!</text>

  <!-- X축 라벨 -->
  <text x="195" y="456" text-anchor="middle" fill="#94a3b8" font-size="13">2020</text>
  <text x="315" y="456" text-anchor="middle" fill="#94a3b8" font-size="13">2021</text>
  <text x="435" y="456" text-anchor="middle" fill="#94a3b8" font-size="13">2022</text>
  <text x="555" y="456" text-anchor="middle" fill="#94a3b8" font-size="13">2023</text>
  <text x="675" y="456" text-anchor="middle" fill="#94a3b8" font-size="13">2024</text>

  <!-- R&D/GP 비율 라벨 -->
  <text x="400" y="440" text-anchor="middle" fill="#64748b" font-size="10">R&amp;D / GP 비율</text>
</svg>