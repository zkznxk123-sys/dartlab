<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="450" fill="#0a0e1a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">Intel 매출 추이 — $79B에서 $53B, 반도체 왕좌의 추락</text>
  <text x="400" y="62" text-anchor="middle" fill="#64748b" font-size="12">2020–2024 ($B)</text>

  <!-- Y축 그리드 -->
  <line x1="120" y1="100" x2="720" y2="100" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="160" x2="720" y2="160" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="220" x2="720" y2="220" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="280" x2="720" y2="280" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="340" x2="720" y2="340" stroke="#1e293b" stroke-width="1"/>

  <!-- Y축 라벨 -->
  <text x="110" y="105" text-anchor="end" fill="#64748b" font-size="11">$80B</text>
  <text x="110" y="165" text-anchor="end" fill="#64748b" font-size="11">$70B</text>
  <text x="110" y="225" text-anchor="end" fill="#64748b" font-size="11">$60B</text>
  <text x="110" y="285" text-anchor="end" fill="#64748b" font-size="11">$50B</text>
  <text x="110" y="345" text-anchor="end" fill="#64748b" font-size="11">$40B</text>

  <!-- 데이터: 2020 $77.9B, 2021 $79.0B, 2022 $63.1B, 2023 $54.2B, 2024 $53.1B -->
  <!-- Y 스케일: $40B=340, $80B=100 → 1B = 6px, y = 340 - (val-40)*6 -->
  <!-- 2020: 340-(77.9-40)*6 = 340-227.4 = 112.6 -->
  <!-- 2021: 340-(79.0-40)*6 = 340-234.0 = 106.0 -->
  <!-- 2022: 340-(63.1-40)*6 = 340-138.6 = 201.4 -->
  <!-- 2023: 340-(54.2-40)*6 = 340-85.2  = 254.8 -->
  <!-- 2024: 340-(53.1-40)*6 = 340-78.6  = 261.4 -->
  <!-- X: 2020=195, 2021=315, 2022=435, 2023=555, 2024=675 -->

  <!-- 상승 구간 (초록) 2020→2021 -->
  <line x1="195" y1="112.6" x2="315" y2="106" stroke="#22c55e" stroke-width="3"/>

  <!-- 하락 구간 (빨강) 2021→2024 -->
  <line x1="315" y1="106" x2="435" y2="201.4" stroke="#ef4444" stroke-width="3"/>
  <line x1="435" y1="201.4" x2="555" y2="254.8" stroke="#ef4444" stroke-width="3"/>
  <line x1="555" y1="254.8" x2="675" y2="261.4" stroke="#ef4444" stroke-width="3"/>

  <!-- 하락 영역 (빨강 반투명) -->
  <polygon points="315,106 435,201.4 555,254.8 675,261.4 675,340 315,340" fill="#ef4444" opacity="0.08"/>

  <!-- 데이터 포인트 -->
  <circle cx="195" cy="112.6" r="5" fill="#22c55e"/>
  <circle cx="315" cy="106" r="6" fill="#fbbf24"/>
  <circle cx="435" cy="201.4" r="5" fill="#ef4444"/>
  <circle cx="555" cy="254.8" r="5" fill="#ef4444"/>
  <circle cx="675" cy="261.4" r="5" fill="#ef4444"/>

  <!-- 데이터 라벨 -->
  <text x="195" y="98" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">$77.9B</text>
  <text x="315" y="92" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">$79.0B</text>
  <text x="315" y="80" text-anchor="middle" fill="#fbbf24" font-size="10">PEAK</text>
  <text x="435" y="193" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">$63.1B</text>
  <text x="555" y="246" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">$54.2B</text>
  <text x="675" y="253" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold">$53.1B</text>

  <!-- X축 라벨 -->
  <text x="195" y="370" text-anchor="middle" fill="#94a3b8" font-size="13">2020</text>
  <text x="315" y="370" text-anchor="middle" fill="#94a3b8" font-size="13">2021</text>
  <text x="435" y="370" text-anchor="middle" fill="#94a3b8" font-size="13">2022</text>
  <text x="555" y="370" text-anchor="middle" fill="#94a3b8" font-size="13">2023</text>
  <text x="675" y="370" text-anchor="middle" fill="#94a3b8" font-size="13">2024</text>

  <!-- 하락률 주석 -->
  <text x="400" y="410" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">3년간 -32.8% | 피크 대비 -$25.9B</text>
  <text x="400" y="432" text-anchor="middle" fill="#64748b" font-size="12">PC·서버 동시 수요 감소 + 파운드리 전환 혼란</text>
</svg>