<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="380" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">LG전자 현금흐름 — 영업CF 4.3조, CAPEX 3.9조, FCF 0.4조</text>
  <text x="400" y="57" text-anchor="middle" fill="#64748b" font-size="13">벌어도 남는 돈이 거의 없다</text>

  <!-- Zero line at y=300 -->
  <line x1="80" y1="300" x2="720" y2="300" stroke="#475569" stroke-width="1"/>
  <text x="75" y="304" text-anchor="end" fill="#94a3b8" font-size="11">0</text>

  <!-- Scale: 1조 = 50px -->
  <!-- OCF 4.3조 → height 215px, top 85 -->
  <rect x="140" y="85" width="160" height="215" rx="6" fill="#22c55e"/>
  <text x="220" y="72" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="bold">4.3조</text>
  <text x="220" y="190" text-anchor="middle" fill="#0a0e1a" font-size="16" font-weight="bold">영업CF</text>

  <!-- CAPEX -3.9조 → draw as subtraction waterfall from top of OCF -->
  <!-- Waterfall: starts at y=85, goes down 195px to y=280 -->
  <rect x="340" y="85" width="160" height="195" rx="6" fill="#ef4444" opacity="0.85"/>
  <text x="420" y="72" text-anchor="middle" fill="#ef4444" font-size="20" font-weight="bold">-3.9조</text>
  <text x="420" y="180" text-anchor="middle" fill="#0a0e1a" font-size="16" font-weight="bold">CAPEX</text>

  <!-- Connector line from OCF top to CAPEX top -->
  <line x1="300" y1="85" x2="340" y2="85" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>

  <!-- FCF = 0.4조 → height 20px, from y280 to y300 -->
  <rect x="540" y="280" width="160" height="20" rx="4" fill="#fbbf24"/>
  <text x="620" y="272" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="bold">0.4조</text>
  <text x="620" y="330" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">FCF</text>

  <!-- Connector line from CAPEX bottom to FCF top -->
  <line x1="500" y1="280" x2="540" y2="280" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>

  <!-- Percentage annotation -->
  <text x="620" y="352" text-anchor="middle" fill="#94a3b8" font-size="12">FCF/영업CF = 9%</text>

  <!-- Bottom annotation -->
  <rect x="120" y="350" width="340" height="26" rx="4" fill="#ef444415" stroke="#ef4444" stroke-width="1"/>
  <text x="290" y="368" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">CAPEX 비율 91% — 투자하고 나면 남는 게 없다</text>
</svg>