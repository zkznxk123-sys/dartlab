<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="380" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">LG전자 영업이익률 6년 — 5.05%에서 2.78%, 추세적 하락</text>
  <text x="400" y="57" text-anchor="middle" fill="#64748b" font-size="13">매출은 늘어도 마진은 계속 줄어든다</text>

  <!-- Y축 눈금 -->
  <line x1="90" y1="90" x2="90" y2="310" stroke="#1e293b" stroke-width="1"/>
  <text x="80" y="100" text-anchor="end" fill="#94a3b8" font-size="11">5%</text>
  <line x1="90" y1="96" x2="720" y2="96" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="80" y="152" text-anchor="end" fill="#94a3b8" font-size="11">4%</text>
  <line x1="90" y1="148" x2="720" y2="148" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="80" y="204" text-anchor="end" fill="#94a3b8" font-size="11">3%</text>
  <line x1="90" y1="200" x2="720" y2="200" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="80" y="256" text-anchor="end" fill="#94a3b8" font-size="11">2%</text>
  <line x1="90" y1="252" x2="720" y2="252" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Scale: 5% = y96, 4% = y148, 3% = y200, 2% = y252, 1% per 52px -->
  <!-- 5.05% → y93.4, 4.77% → y107.9, 4.17% → y139.0, 4.21% → y136.9, 3.90% → y153.0, 2.78% → y211.0 -->

  <!-- Line -->
  <polyline points="150,93 260,108 370,139 480,137 590,153 700,211"
            fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round"/>

  <!-- Dots + labels -->
  <circle cx="150" cy="93" r="6" fill="#ef4444"/>
  <text x="150" y="80" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">5.05%</text>

  <circle cx="260" cy="108" r="6" fill="#ef4444"/>
  <text x="260" y="95" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">4.77%</text>

  <circle cx="370" cy="139" r="6" fill="#ef4444"/>
  <text x="370" y="126" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">4.17%</text>

  <circle cx="480" cy="137" r="6" fill="#ef4444"/>
  <text x="480" y="124" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">4.21%</text>

  <circle cx="590" cy="153" r="6" fill="#ef4444"/>
  <text x="590" y="140" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">3.90%</text>

  <circle cx="700" cy="211" r="6" fill="#ef4444"/>
  <text x="700" y="198" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">2.78%</text>

  <!-- Trend arrow -->
  <line x1="140" y1="100" x2="710" y2="218" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6" opacity="0.5"/>

  <!-- Year labels -->
  <text x="150" y="335" text-anchor="middle" fill="#94a3b8" font-size="13">2020</text>
  <text x="260" y="335" text-anchor="middle" fill="#94a3b8" font-size="13">2021</text>
  <text x="370" y="335" text-anchor="middle" fill="#94a3b8" font-size="13">2022</text>
  <text x="480" y="335" text-anchor="middle" fill="#94a3b8" font-size="13">2023</text>
  <text x="590" y="335" text-anchor="middle" fill="#94a3b8" font-size="13">2024</text>
  <text x="700" y="335" text-anchor="middle" fill="#94a3b8" font-size="13">2025</text>

  <!-- Annotation -->
  <rect x="430" y="348" width="300" height="26" rx="4" fill="#ef444415" stroke="#ef4444" stroke-width="1"/>
  <text x="580" y="366" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">6년 연속 하락 — 구조적 마진 압축</text>
</svg>