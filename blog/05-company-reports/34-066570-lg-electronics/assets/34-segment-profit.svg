<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="380" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">LG전자 부문별 영업이익 (2025) — TV가 회사를 깎아먹는다</text>
  <text x="400" y="57" text-anchor="middle" fill="#64748b" font-size="13">HS/ES/VS가 벌어놓으면 MS가 까먹는 구조</text>

  <!-- Zero line -->
  <line x1="300" y1="80" x2="300" y2="330" stroke="#475569" stroke-width="1.5"/>
  <text x="300" y="350" text-anchor="middle" fill="#94a3b8" font-size="11">0</text>

  <!-- Scale: 0.1조 = 30px roughly. Max 1.28조 = ~384px from zero line -->
  <!-- HS +1.28조 → width 320px -->
  <rect x="300" y="92" width="320" height="44" rx="4" fill="#22c55e"/>
  <text x="140" y="118" text-anchor="end" fill="#f1f5f9" font-size="15" font-weight="600">H&amp;A (가전)</text>
  <text x="630" y="120" fill="#22c55e" font-size="14" font-weight="bold">+1.28조</text>

  <!-- ES +0.65조 → width 163px -->
  <rect x="300" y="152" width="163" height="44" rx="4" fill="#22c55e"/>
  <text x="140" y="178" text-anchor="end" fill="#f1f5f9" font-size="15" font-weight="600">BS (전장)</text>
  <text x="473" y="180" fill="#22c55e" font-size="14" font-weight="bold">+0.65조</text>

  <!-- VS +0.56조 → width 140px -->
  <rect x="300" y="212" width="140" height="44" rx="4" fill="#22c55e"/>
  <text x="140" y="238" text-anchor="end" fill="#f1f5f9" font-size="15" font-weight="600">VS (전장부품)</text>
  <text x="450" y="240" fill="#22c55e" font-size="14" font-weight="bold">+0.56조</text>

  <!-- MS -0.75조 → width 188px to the left -->
  <rect x="112" y="272" width="188" height="44" rx="4" fill="#ef4444"/>
  <text x="750" y="298" text-anchor="end" fill="#f1f5f9" font-size="15" font-weight="600">MS (TV/모니터)</text>
  <text x="100" y="300" text-anchor="end" fill="#ef4444" font-size="14" font-weight="bold">-0.75조</text>

  <!-- MS 강조 박스 -->
  <rect x="105" y="268" width="200" height="52" rx="6" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5"/>

  <!-- Annotation -->
  <rect x="370" y="280" width="320" height="26" rx="4" fill="#ef444415" stroke="#ef4444" stroke-width="1"/>
  <text x="530" y="298" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">TV 사업 적자가 가전 이익의 59%를 상쇄</text>
</svg>