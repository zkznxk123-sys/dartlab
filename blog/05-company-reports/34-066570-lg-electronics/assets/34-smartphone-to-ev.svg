<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="380" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">스마트폰 적자 → 전장 흑자, 손익 스윙 1.4조</text>
  <text x="400" y="57" text-anchor="middle" fill="#64748b" font-size="13">MC 사업부 철수(2021) → VS 사업부 성장</text>

  <!-- BEFORE: MC -->
  <rect x="60" y="110" width="280" height="180" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="200" y="148" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">BEFORE</text>
  <text x="200" y="178" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">MC (스마트폰)</text>
  <text x="200" y="215" text-anchor="middle" fill="#ef4444" font-size="36" font-weight="bold">-8,000억</text>
  <text x="200" y="245" text-anchor="middle" fill="#94a3b8" font-size="13">2017~2020 연평균 적자</text>
  <text x="200" y="268" text-anchor="middle" fill="#ef4444" font-size="12">누적 5조 이상 소각</text>

  <!-- Arrow -->
  <line x1="360" y1="200" x2="440" y2="200" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>
  <text x="400" y="180" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">2021</text>
  <text x="400" y="225" text-anchor="middle" fill="#fbbf24" font-size="12">철수</text>

  <!-- AFTER: VS -->
  <rect x="460" y="110" width="280" height="180" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="148" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">AFTER</text>
  <text x="600" y="178" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">VS (전장)</text>
  <text x="600" y="215" text-anchor="middle" fill="#22c55e" font-size="36" font-weight="bold">+5,590억</text>
  <text x="600" y="245" text-anchor="middle" fill="#94a3b8" font-size="13">2025 영업이익</text>
  <text x="600" y="268" text-anchor="middle" fill="#22c55e" font-size="12">매출 8.6조, 흑자 전환 완료</text>

  <!-- Bottom annotation -->
  <rect x="200" y="320" width="400" height="36" rx="6" fill="#fbbf2415" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="343" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">손익 스윙 +1.4조 — LG전자 역사상 가장 큰 구조조정 성과</text>
</svg>