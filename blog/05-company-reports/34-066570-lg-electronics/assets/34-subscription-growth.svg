<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="800" height="380" fill="#0a0e1a" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">LG전자 구독가전 매출 — 2.5조, YoY +29%</text>
  <text x="400" y="57" text-anchor="middle" fill="#64748b" font-size="13">팔고 끝이 아니라, 매달 과금한다</text>

  <!-- Y축 눈금 -->
  <text x="100" y="100" text-anchor="end" fill="#94a3b8" font-size="11">3.0조</text>
  <line x1="110" y1="96" x2="700" y2="96" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="100" y="170" text-anchor="end" fill="#94a3b8" font-size="11">2.0조</text>
  <line x1="110" y1="166" x2="700" y2="166" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="100" y="240" text-anchor="end" fill="#94a3b8" font-size="11">1.0조</text>
  <line x1="110" y1="236" x2="700" y2="236" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Scale: 1조 = 70px. 0조 = y306 -->
  <!-- 2023: 1.5조 → height 105px, top y201 -->
  <rect x="180" y="201" width="110" height="105" rx="6" fill="#3b82f6" opacity="0.6"/>
  <text x="235" y="190" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="bold">1.5조</text>
  <text x="235" y="250" text-anchor="middle" fill="#94a3b8" font-size="11">(추정)</text>

  <!-- 2024: 1.9조 → height 133px, top y173 -->
  <rect x="360" y="173" width="110" height="133" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="415" y="162" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="bold">1.9조</text>
  <text x="415" y="222" text-anchor="middle" fill="#94a3b8" font-size="11">(추정)</text>

  <!-- 2025: 2.5조 → height 175px, top y131 -->
  <rect x="540" y="131" width="110" height="175" rx="6" fill="#22c55e"/>
  <text x="595" y="120" text-anchor="middle" fill="#22c55e" font-size="18" font-weight="bold">2.5조</text>

  <!-- Growth arrows -->
  <text x="325" y="165" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">+27%</text>
  <text x="505" y="140" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="bold">+29%</text>

  <!-- Year labels -->
  <text x="235" y="330" text-anchor="middle" fill="#94a3b8" font-size="14">2023</text>
  <text x="415" y="330" text-anchor="middle" fill="#94a3b8" font-size="14">2024</text>
  <text x="595" y="330" text-anchor="middle" fill="#94a3b8" font-size="14">2025</text>

  <!-- Annotation -->
  <rect x="200" y="348" width="400" height="26" rx="4" fill="#22c55e15" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="366" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">정수기/에어컨/세탁기 — 가전의 SaaS화</text>
</svg>