<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Under Armour CEO 교체 — 4년간 3명, 매출은 줄었다</title>
  <desc>Plank에서 Frisk, Linnartz를 거쳐 Plank 복귀까지의 CEO 타임라인과 각 구간 매출</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="56" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="700">Under Armour CEO 교체 — 4년간 3명, 매출은 줄었다</text>
  <text x="600" y="86" text-anchor="middle" fill="#64748b" font-size="16">창업자가 떠나고, 외부 영입 2명이 실패하고, 창업자가 돌아왔다</text>

  <!-- Horizontal timeline -->
  <line x1="100" y1="380" x2="1100" y2="380" stroke="#475569" stroke-width="3"/>

  <!-- Tick marks -->
  <g stroke="#334155" stroke-width="2">
    <line x1="160" y1="368" x2="160" y2="392"/>
    <line x1="410" y1="368" x2="410" y2="392"/>
    <line x1="660" y1="368" x2="660" y2="392"/>
    <line x1="860" y1="368" x2="860" y2="392"/>
    <line x1="1060" y1="368" x2="1060" y2="392"/>
  </g>

  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="160" y="415">2019</text>
    <text x="410" y="415">2020</text>
    <text x="660" y="415">2022</text>
    <text x="860" y="415">2023</text>
    <text x="1060" y="415">2024</text>
  </g>

  <!-- Era 1: Plank (~2020.1) -->
  <rect x="100" y="350" width="310" height="60" rx="8" fill="#fbbf2415" stroke="#fbbf24" stroke-width="1"/>
  <text x="255" y="340" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">Kevin Plank (창업자)</text>

  <!-- Event: Plank steps down -->
  <circle cx="410" cy="380" r="14" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
  <line x1="410" y1="365" x2="410" y2="200" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="310" y="130" width="200" height="68" rx="8" fill="#ef444422" stroke="#ef4444" stroke-width="1.5"/>
  <text x="410" y="155" fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700">2020년 1월</text>
  <text x="410" y="178" fill="#f1f5f9" font-size="14" text-anchor="middle">Plank CEO 사임</text>

  <!-- Era 2: Frisk (2020.1~2022.6) -->
  <rect x="410" y="350" width="250" height="60" rx="8" fill="#3b82f615" stroke="#3b82f6" stroke-width="1"/>
  <text x="535" y="340" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">Patrik Frisk</text>

  <!-- Frisk revenue -->
  <line x1="535" y1="410" x2="535" y2="480" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="440" y="480" width="190" height="68" rx="8" fill="#3b82f622" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="535" y="505" fill="#3b82f6" font-size="13" text-anchor="middle" font-weight="700">2년 재임</text>
  <text x="535" y="528" fill="#f1f5f9" font-size="14" text-anchor="middle">$4.5B → $5.7B</text>

  <!-- Event: Frisk out -->
  <circle cx="660" cy="380" r="12" fill="#94a3b8" stroke="#0a0e1a" stroke-width="3"/>

  <!-- Era 3: Linnartz (2023.2~2024.3) -->
  <rect x="660" y="350" width="200" height="60" rx="8" fill="#a855f715" stroke="#a855f7" stroke-width="1"/>
  <text x="760" y="340" text-anchor="middle" fill="#a855f7" font-size="14" font-weight="700">Stephanie Linnartz</text>

  <!-- Linnartz revenue -->
  <line x1="760" y1="410" x2="760" y2="480" stroke="#a855f7" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="665" y="480" width="190" height="68" rx="8" fill="#a855f722" stroke="#a855f7" stroke-width="1.5"/>
  <text x="760" y="505" fill="#a855f7" font-size="13" text-anchor="middle" font-weight="700">1년 재임</text>
  <text x="760" y="528" fill="#f1f5f9" font-size="14" text-anchor="middle">$5.9B → $5.7B</text>

  <!-- Event: Plank returns -->
  <circle cx="860" cy="380" r="16" fill="#fbbf24" stroke="#0a0e1a" stroke-width="3" style="filter: drop-shadow(0 0 12px #fbbf24)"/>
  <line x1="860" y1="365" x2="860" y2="200" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="760" y="130" width="200" height="68" rx="8" fill="#fbbf2422" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="860" y="155" fill="#fbbf24" font-size="13" text-anchor="middle" font-weight="700">2024년 4월</text>
  <text x="860" y="178" fill="#f1f5f9" font-size="14" text-anchor="middle">Plank CEO 복귀</text>

  <!-- Era 4: Plank returns (2024.4~) -->
  <rect x="860" y="350" width="240" height="60" rx="8" fill="#fbbf2415" stroke="#fbbf24" stroke-width="1"/>
  <text x="980" y="340" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">Kevin Plank (복귀)</text>

  <!-- Plank return revenue -->
  <line x1="980" y1="410" x2="980" y2="480" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="885" y="480" width="190" height="84" rx="8" fill="#fbbf2422" stroke="#fbbf24" stroke-width="2"/>
  <text x="980" y="505" fill="#fbbf24" font-size="13" text-anchor="middle" font-weight="700">구조조정 중</text>
  <text x="980" y="530" fill="#f1f5f9" font-size="16" text-anchor="middle" font-weight="900">$5.7B → ~$4.9B</text>
  <text x="980" y="550" fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700">SKU 25% 축소</text>

  <!-- Revenue trend arrow -->
  <text x="160" y="460" fill="#94a3b8" font-size="14" font-weight="600">매출 $5.3B</text>
  <line x1="220" y1="468" x2="980" y2="468" stroke="#ef444466" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="1060" y="460" fill="#ef4444" font-size="14" font-weight="600">~$4.9B</text>

  <!-- Bottom note -->
  <rect x="250" y="620" width="700" height="40" rx="8" fill="#1e293b"/>
  <text x="600" y="646" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="600">4년간 CEO 3명 교체 — 매출은 오히려 줄었다. 결국 창업자가 돌아왔다.</text>
</svg>