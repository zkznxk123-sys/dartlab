<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Under Armour 매출총이익률 47% vs Nike 41% — 제품 마진은 UA가 높다</title>
  <desc>스포츠웨어 4사 매출총이익률 비교 막대 차트</desc>
  <rect width="1080" height="400" fill="#0a0e1a"/>

  <text x="540" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Under Armour 매출총이익률 47% vs Nike 41% — 제품 마진은 UA가 높다</text>
  <text x="540" y="62" text-anchor="middle" fill="#64748b" font-size="13">FY2024 기준. Adidas는 유럽 프리미엄 포지셔닝, New Balance는 비공개.</text>

  <!-- Y-axis -->
  <line x1="140" y1="100" x2="140" y2="340" stroke="#334155" stroke-width="1"/>
  <!-- X baseline -->
  <line x1="140" y1="340" x2="960" y2="340" stroke="#334155" stroke-width="1"/>

  <!-- Y labels -->
  <text x="130" y="105" text-anchor="end" fill="#64748b" font-size="11">50%</text>
  <line x1="140" y1="100" x2="960" y2="100" stroke="#1e293b" stroke-width="1"/>
  <text x="130" y="153" text-anchor="end" fill="#64748b" font-size="11">45%</text>
  <line x1="140" y1="148" x2="960" y2="148" stroke="#1e293b" stroke-width="1"/>
  <text x="130" y="201" text-anchor="end" fill="#64748b" font-size="11">40%</text>
  <line x1="140" y1="196" x2="960" y2="196" stroke="#1e293b" stroke-width="1"/>
  <text x="130" y="249" text-anchor="end" fill="#64748b" font-size="11">35%</text>
  <line x1="140" y1="244" x2="960" y2="244" stroke="#1e293b" stroke-width="1"/>
  <text x="130" y="297" text-anchor="end" fill="#64748b" font-size="11">30%</text>
  <line x1="140" y1="292" x2="960" y2="292" stroke="#1e293b" stroke-width="1"/>
  <text x="130" y="345" text-anchor="end" fill="#64748b" font-size="11">25%</text>

  <!-- Scale: 25%=340, 50%=100 → 1%=9.6px -->
  <!-- Adidas 50.1% → y=100+(50-50.1)*9.6=99 h=241 -->
  <rect x="190" y="99" width="140" height="241" rx="6" fill="#3b82f6" opacity="0.6"/>
  <text x="260" y="90" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="700">Adidas</text>
  <text x="260" y="230" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">50%</text>

  <!-- Under Armour 47% → y=100+(50-47)*9.6=129 h=211 -->
  <rect x="390" y="129" width="140" height="211" rx="6" fill="#fbbf24" opacity="0.95"/>
  <text x="460" y="119" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">Under Armour</text>
  <text x="460" y="245" text-anchor="middle" fill="#0a0e1a" font-size="24" font-weight="800">47%</text>
  <!-- highlight badge -->
  <rect x="415" y="260" width="90" height="22" rx="4" fill="#0a0e1a" opacity="0.6"/>
  <text x="460" y="277" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">Nike보다 높다</text>

  <!-- Nike 41% → y=100+(50-41)*9.6=186 h=154 -->
  <rect x="590" y="186" width="140" height="154" rx="6" fill="#22c55e" opacity="0.6"/>
  <text x="660" y="176" text-anchor="middle" fill="#22c55e" font-size="15" font-weight="700">Nike</text>
  <text x="660" y="275" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">41%</text>

  <!-- New Balance ? → placeholder -->
  <rect x="790" y="196" width="140" height="144" rx="6" fill="#475569" opacity="0.4" stroke="#475569" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="860" y="186" text-anchor="middle" fill="#475569" font-size="15" font-weight="700">New Balance</text>
  <text x="860" y="275" text-anchor="middle" fill="#64748b" font-size="20" font-weight="700">비공개</text>

  <!-- Bottom note -->
  <rect x="200" y="358" width="680" height="30" rx="6" fill="#1e293b"/>
  <text x="540" y="378" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">UA의 제품 마진은 높다. 문제는 판관비(SGA)가 이 마진을 전부 먹는다는 것이다.</text>
</svg>