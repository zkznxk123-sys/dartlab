<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Under Armour 마진 폭포 — 매출총이익률 47%인데 영업이익률 4%</title>
  <desc>매출 100%에서 영업이익 4%까지의 마진 폭포 차트. SGA가 42%를 먹는다.</desc>
  <rect width="1080" height="400" fill="#0a0e1a"/>

  <text x="540" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Under Armour 마진 폭포 — 매출총이익률 47%인데 영업이익률 4%</text>
  <text x="540" y="58" text-anchor="middle" fill="#64748b" font-size="13">FY2024 기준. 47%의 마진이 어디서 사라지는가?</text>

  <!-- Y-axis baseline -->
  <line x1="80" y1="340" x2="1000" y2="340" stroke="#334155" stroke-width="1"/>

  <!-- Scale: 100% = 260px height, base y=340 -->
  <!-- Bar 1: 매출 100% -->
  <rect x="100" y="80" width="130" height="260" rx="4" fill="#3b82f6" opacity="0.85"/>
  <text x="165" y="70" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">매출</text>
  <text x="165" y="220" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800">100%</text>

  <!-- Bar 2: 원가 -53% (falling) -->
  <rect x="270" y="80" width="130" height="137.8" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="335" y="70" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">매출원가</text>
  <text x="335" y="158" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">-53%</text>
  <line x1="230" y1="80" x2="270" y2="80" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bar 3: 매출총이익 47% -->
  <rect x="440" y="217.8" width="130" height="122.2" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="505" y="208" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">매출총이익</text>
  <text x="505" y="286" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800">47%</text>
  <line x1="400" y1="217.8" x2="440" y2="217.8" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bar 4: SGA -42% (falling, RED HIGHLIGHT) -->
  <rect x="610" y="217.8" width="130" height="109.2" rx="4" fill="#ef4444" opacity="0.95"/>
  <!-- Glow effect for emphasis -->
  <rect x="608" y="215.8" width="134" height="113.2" rx="6" fill="none" stroke="#ef4444" stroke-width="2" style="filter: drop-shadow(0 0 8px #ef4444)"/>
  <text x="675" y="208" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="800">판관비 (SGA)</text>
  <text x="675" y="280" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">-42%</text>
  <line x1="570" y1="217.8" x2="610" y2="217.8" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow pointing to SGA -->
  <text x="675" y="354" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">$2.4B 마케팅+운영비</text>

  <!-- Bar 5: 영업이익 4% (tiny) -->
  <rect x="780" y="329.6" width="130" height="10.4" rx="3" fill="#22c55e" opacity="0.95"/>
  <text x="845" y="320" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">영업이익</text>
  <text x="845" y="310" text-anchor="middle" fill="#22c55e" font-size="22" font-weight="800">4%</text>
  <line x1="740" y1="327" x2="780" y2="327" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Nike comparison line -->
  <line x1="780" y1="319.2" x2="910" y2="319.2" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="950" y="323" text-anchor="start" fill="#fbbf24" font-size="11" font-weight="600">Nike OPM 8%</text>

  <!-- Bottom annotation -->
  <rect x="250" y="365" width="580" height="28" rx="6" fill="#1e293b"/>
  <text x="540" y="384" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">47%의 마진이 판관비에 먹힌다. Nike보다 GPM이 높은데 OPM은 절반.</text>
</svg>