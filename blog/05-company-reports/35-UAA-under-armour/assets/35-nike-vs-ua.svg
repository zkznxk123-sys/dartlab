<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Nike vs Under Armour — 같은 위기, 반대 궤적</title>
  <desc>Nike와 Under Armour의 핵심 지표 2열 비교 카드</desc>
  <rect width="1080" height="480" fill="#0a0e1a"/>

  <text x="540" y="40" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">Nike vs Under Armour — 같은 위기, 반대 궤적</text>
  <text x="540" y="64" text-anchor="middle" fill="#64748b" font-size="13">둘 다 CEO 교체 + DTC 실패. 하지만 스케일이 다르고 궤적이 갈린다.</text>

  <!-- Nike Card -->
  <rect x="60" y="90" width="460" height="350" rx="16" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="290" y="126" font-size="18" font-weight="800" fill="#22c55e" text-anchor="middle">Nike (NKE)</text>
  <text x="290" y="148" font-size="12" fill="#64748b" text-anchor="middle">FY2024 (6월 결산)</text>

  <text x="90" y="185" font-size="13" fill="#94a3b8">매출</text>
  <text x="480" y="185" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="end">$46.1B</text>

  <text x="90" y="220" font-size="13" fill="#94a3b8">매출총이익률</text>
  <text x="480" y="220" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="end">41%</text>

  <text x="90" y="255" font-size="13" fill="#94a3b8">영업이익률</text>
  <text x="480" y="255" font-size="20" font-weight="700" fill="#22c55e" text-anchor="end">8%</text>

  <text x="90" y="290" font-size="13" fill="#94a3b8">주가 (고점 대비)</text>
  <text x="480" y="290" font-size="18" font-weight="700" fill="#ef4444" text-anchor="end">-60%</text>

  <text x="90" y="325" font-size="13" fill="#94a3b8">CEO</text>
  <text x="480" y="325" font-size="14" font-weight="600" fill="#22c55e" text-anchor="end">Elliott Hill 복귀 (Nike 32년)</text>

  <text x="90" y="360" font-size="13" fill="#94a3b8">시가총액</text>
  <text x="480" y="360" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="end">~$90B</text>

  <text x="90" y="395" font-size="13" fill="#94a3b8">위기 원인</text>
  <text x="480" y="395" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="end">DTC 전환 실패 + 도매 관계 파괴</text>

  <!-- Under Armour Card -->
  <rect x="560" y="90" width="460" height="350" rx="16" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="790" y="126" font-size="18" font-weight="800" fill="#fbbf24" text-anchor="middle">Under Armour (UAA)</text>
  <text x="790" y="148" font-size="12" fill="#64748b" text-anchor="middle">FY2024 (3월 결산)</text>

  <text x="590" y="185" font-size="13" fill="#94a3b8">매출</text>
  <text x="980" y="185" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="end">$5.7B</text>

  <text x="590" y="220" font-size="13" fill="#94a3b8">매출총이익률</text>
  <text x="980" y="220" font-size="20" font-weight="700" fill="#fbbf24" text-anchor="end">47%</text>
  <!-- GPM badge -->
  <rect x="895" y="225" width="85" height="18" rx="4" fill="#fbbf2433"/>
  <text x="937" y="238" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Nike보다 높다</text>

  <text x="590" y="255" font-size="13" fill="#94a3b8">영업이익률</text>
  <text x="980" y="255" font-size="20" font-weight="700" fill="#ef4444" text-anchor="end">4%</text>
  <!-- OPM badge -->
  <rect x="895" y="260" width="85" height="18" rx="4" fill="#ef444433"/>
  <text x="937" y="273" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">Nike의 절반</text>

  <text x="590" y="290" font-size="13" fill="#94a3b8">주가 (고점 대비)</text>
  <text x="980" y="290" font-size="18" font-weight="700" fill="#ef4444" text-anchor="end">-87%</text>

  <text x="590" y="325" font-size="13" fill="#94a3b8">CEO</text>
  <text x="980" y="325" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="end">Kevin Plank 복귀 (창업자)</text>

  <text x="590" y="360" font-size="13" fill="#94a3b8">시가총액</text>
  <text x="980" y="360" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="end">~$2.5B</text>

  <text x="590" y="395" font-size="13" fill="#94a3b8">위기 원인</text>
  <text x="980" y="395" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="end">CEO 3명 교체 + 성장 한계 + 카테고리 벽</text>

  <!-- Bottom comparison -->
  <rect x="200" y="450" width="680" height="24" rx="6" fill="#1e293b"/>
  <text x="540" y="467" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600">Nike $90B vs UA $2.5B — UA는 Nike 시가총액의 3%도 안 된다. 같은 위기지만 스케일이 다르다.</text>
</svg>