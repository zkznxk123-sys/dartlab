<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Under Armour 매출 추이 — $5.7B에서 $4.9B, 역성장</title>
  <desc>FY2019부터 FY2026E까지 매출 라인 차트. 코로나 이후 반등했으나 다시 하락세.</desc>
  <rect width="1080" height="480" fill="#0a0e1a"/>

  <text x="540" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Under Armour 매출 추이 — $5.7B에서 $4.9B, 역성장</text>
  <text x="540" y="62" text-anchor="middle" fill="#64748b" font-size="13">단위: $B. 3월 결산 기준. FY2026E는 외부 추정치.</text>

  <!-- Chart area: x=120~1020, y=100~400 -->
  <!-- Y scale: $4.0B=400, $6.0B=100 → $1B=150px -->
  <!-- Grid lines -->
  <line x1="120" y1="100" x2="1020" y2="100" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="105" text-anchor="end" fill="#64748b" font-size="11">$6.0B</text>
  <line x1="120" y1="175" x2="1020" y2="175" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="180" text-anchor="end" fill="#64748b" font-size="11">$5.5B</text>
  <line x1="120" y1="250" x2="1020" y2="250" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="255" text-anchor="end" fill="#64748b" font-size="11">$5.0B</text>
  <line x1="120" y1="325" x2="1020" y2="325" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="330" text-anchor="end" fill="#64748b" font-size="11">$4.5B</text>
  <line x1="120" y1="400" x2="1020" y2="400" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="405" text-anchor="end" fill="#64748b" font-size="11">$4.0B</text>

  <!-- X axis -->
  <line x1="120" y1="400" x2="1020" y2="400" stroke="#334155" stroke-width="1"/>

  <!-- Data points: 7 points across 900px = 150px spacing -->
  <!-- FY2019 $5.3B → y=400-(5.3-4.0)*150=205 x=170 -->
  <!-- FY2020 $4.5B → y=400-(4.5-4.0)*150=325 x=320 -->
  <!-- FY2021 $5.7B → y=400-(5.7-4.0)*150=145 x=470 -->
  <!-- FY2023 $5.9B → y=400-(5.9-4.0)*150=115 x=620 -->
  <!-- FY2024 $5.7B → y=400-(5.7-4.0)*150=145 x=720 -->
  <!-- FY2025 $5.2B → y=400-(5.2-4.0)*150=220 x=870 -->
  <!-- FY2026E $4.9B → y=400-(4.9-4.0)*150=265 x=1020 -->

  <!-- Line segments: green until peak, red after -->
  <!-- Up segment: FY2019 to FY2023 peak -->
  <polyline points="170,205 320,325 470,145 620,115" fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round"/>
  <!-- Down segment: FY2023 peak to FY2026E -->
  <polyline points="620,115 720,145 870,220 1020,265" fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round" stroke-dasharray="0"/>

  <!-- Fill area under decline -->
  <polygon points="620,115 720,145 870,220 1020,265 1020,400 620,400" fill="#ef4444" opacity="0.08"/>

  <!-- Data points -->
  <circle cx="170" cy="205" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="320" cy="325" r="6" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="470" cy="145" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="620" cy="115" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="720" cy="145" r="6" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="870" cy="220" r="6" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="1020" cy="265" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="2" style="filter: drop-shadow(0 0 6px #ef4444)"/>

  <!-- Labels -->
  <text x="170" y="195" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">$5.3B</text>
  <text x="170" y="422" text-anchor="middle" fill="#64748b" font-size="12">FY2019</text>

  <text x="320" y="345" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">$4.5B</text>
  <text x="320" y="422" text-anchor="middle" fill="#64748b" font-size="12">FY2020</text>
  <!-- COVID label -->
  <rect x="282" y="350" width="76" height="18" rx="4" fill="#ef444433"/>
  <text x="320" y="363" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">COVID-19</text>

  <text x="470" y="135" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">$5.7B</text>
  <text x="470" y="422" text-anchor="middle" fill="#64748b" font-size="12">FY2021</text>

  <text x="620" y="105" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">$5.9B</text>
  <text x="620" y="422" text-anchor="middle" fill="#64748b" font-size="12">FY2023</text>

  <text x="720" y="135" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">$5.7B</text>
  <text x="720" y="422" text-anchor="middle" fill="#64748b" font-size="12">FY2024</text>

  <text x="870" y="210" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">$5.2B</text>
  <text x="870" y="422" text-anchor="middle" fill="#64748b" font-size="12">FY2025</text>

  <text x="1020" y="255" text-anchor="middle" fill="#ef4444" font-size="16" font-weight="800">~$4.9B</text>
  <text x="1020" y="422" text-anchor="middle" fill="#64748b" font-size="12">FY2026E</text>

  <!-- Annotation arrows -->
  <text x="545" y="138" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">코로나 반등</text>
  <text x="870" y="240" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">구조조정 역성장</text>

  <!-- Bottom note -->
  <rect x="250" y="440" width="580" height="30" rx="6" fill="#1e293b"/>
  <text x="540" y="460" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">코로나 반등 이후 3년 연속 하락. 인플레이션 감안하면 실질 역성장이 더 크다.</text>
</svg>