<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720" role="img" aria-labelledby="t d">
  <title id="t">제1막 — 남아공 변호사 두 명이 $14.6M에 인수한 주스 회사가 Monster가 되기까지</title>
  <desc id="d">Rodney Sacks와 Hilton Schlosberg의 1992년 Hansen 인수 · 2002년 Monster 출시 · 2012년 사명 변경 30년 여정.</desc>

  <rect width="1080" height="720" fill="#0a0e1a"/>

  <text x="40" y="50" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#f1f5f9">제1막 · 이 회사는 누가 만들었는가</text>
  <text x="40" y="78" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">남아공에서 온 변호사 둘이 California 주스 회사를 인수한 이야기</text>

  <!-- Founder 1: Sacks -->
  <rect x="40" y="110" width="480" height="220" rx="12" fill="#111827" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="110" cy="180" r="38" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="2"/>
  <text x="110" y="190" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#fbbf24">RS</text>
  <text x="170" y="150" font-family="-apple-system, sans-serif" font-size="20" font-weight="800" fill="#f1f5f9">Rodney Sacks</text>
  <text x="170" y="175" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">1949년생 · 남아공 출생 · 변호사 출신</text>
  <text x="170" y="205" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">1992 ~ 2025.6 : 공동 CEO</text>
  <text x="170" y="227" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">2025.6 ~ : 회장직 유지</text>
  <text x="60" y="275" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">하버드 출신 아님. 남아공 Witwatersrand 법대.</text>
  <text x="60" y="295" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">M&amp;A 전문 변호사 커리어 → Hansen 인수 딜 설계.</text>
  <text x="60" y="315" font-family="-apple-system, sans-serif" font-size="13" fill="#84cc16">영업 · 유통 · 외부 파트너십 담당</text>

  <!-- Founder 2: Schlosberg -->
  <rect x="560" y="110" width="480" height="220" rx="12" fill="#111827" stroke="#84cc16" stroke-width="1.5"/>
  <circle cx="630" cy="180" r="38" fill="#84cc16" opacity="0.15" stroke="#84cc16" stroke-width="2"/>
  <text x="630" y="190" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#84cc16">HS</text>
  <text x="690" y="150" font-family="-apple-system, sans-serif" font-size="20" font-weight="800" fill="#f1f5f9">Hilton Schlosberg</text>
  <text x="690" y="175" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">남아공 출생 · 변호사 출신 · 회계/재무 특화</text>
  <text x="690" y="205" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">1992 ~ 2025.6 : 공동 CEO</text>
  <text x="690" y="227" font-family="-apple-system, sans-serif" font-size="14" fill="#22c55e">2025.6 ~ : 단독 CEO</text>
  <text x="580" y="275" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">재무 · 운영 · 내부 통제 담당.</text>
  <text x="580" y="295" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">2024년 $3.77B 자사주 매입 실행 당시 재무 책임자.</text>
  <text x="580" y="315" font-family="-apple-system, sans-serif" font-size="13" fill="#84cc16">33년 듀오 → 2025년 단일 리더십 전환</text>

  <!-- Duo arrow -->
  <path d="M 430 220 L 570 220" stroke="#fbbf24" stroke-width="2" marker-end="url(#arr)" fill="none"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Timeline strip: Hansen -> Monster -->
  <text x="40" y="385" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">Hansen Natural → Monster Beverage · 브랜드가 회사를 삼키다</text>

  <!-- Step 1: 1992 -->
  <rect x="40" y="410" width="300" height="200" rx="10" fill="#111827" stroke="#334155"/>
  <text x="60" y="442" font-family="-apple-system, sans-serif" font-size="30" font-weight="800" fill="#fbbf24">1992.07</text>
  <text x="60" y="468" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">Hansen Natural 인수</text>
  <line x1="60" y1="480" x2="320" y2="480" stroke="#334155"/>
  <text x="60" y="505" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">파산 직전 California 주스 브랜드</text>
  <text x="60" y="525" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#84cc16">$14.6M</text>
  <text x="60" y="545" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">매출 $17M · 자연 주스 소규모</text>
  <text x="60" y="575" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">당시 에너지 드링크 카테고리</text>
  <text x="60" y="592" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">아직 존재하지 않음</text>

  <!-- Arrow -->
  <path d="M 350 510 L 385 510" stroke="#64748b" stroke-width="2" marker-end="url(#arr2)" fill="none"/>
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Step 2: 2002 -->
  <rect x="390" y="410" width="300" height="200" rx="10" fill="#111827" stroke="#334155"/>
  <text x="410" y="442" font-family="-apple-system, sans-serif" font-size="30" font-weight="800" fill="#84cc16">2002.04</text>
  <text x="410" y="468" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">Monster Energy 출시</text>
  <line x1="410" y1="480" x2="670" y2="480" stroke="#334155"/>
  <text x="410" y="505" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">Red Bull(8.4oz) 대비 2배 용량</text>
  <text x="410" y="525" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#fbbf24">16oz · 동일가</text>
  <text x="410" y="545" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Claw-M 로고 · 블랙 캔</text>
  <text x="410" y="575" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">그래피티 · 익스트림 스포츠</text>
  <text x="410" y="592" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">브랜드 정체성 확립</text>

  <!-- Arrow -->
  <path d="M 700 510 L 735 510" stroke="#64748b" stroke-width="2" marker-end="url(#arr3)" fill="none"/>
  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Step 3: 2012 -->
  <rect x="740" y="410" width="300" height="200" rx="10" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="760" y="442" font-family="-apple-system, sans-serif" font-size="30" font-weight="800" fill="#22c55e">2012.06.28</text>
  <text x="760" y="468" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">사명 변경 + S&amp;P 500</text>
  <line x1="760" y1="480" x2="1020" y2="480" stroke="#334155"/>
  <text x="760" y="505" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">Hansen Natural → Monster Beverage</text>
  <text x="760" y="528" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">브랜드 = 회사</text>
  <text x="760" y="555" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">같은 달 S&amp;P 500 정식 편입</text>
  <text x="760" y="578" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">주스 회사의 흔적 완전 제거.</text>
  <text x="760" y="595" font-family="-apple-system, sans-serif" font-size="12" fill="#fbbf24">Monster Energy가 전부</text>

  <!-- Verdict -->
  <rect x="40" y="635" width="1000" height="60" rx="8" fill="#111827" stroke="#fbbf24"/>
  <text x="540" y="662" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">핵심 판단: 30년 누적 S&amp;P 500 수익률 1위(CNBC 보도) — $14.6M 인수 딜의 본질은</text>
  <text x="540" y="683" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#84cc16">"주스 라벨"이 아니라 "유통망 플랫폼" 확보. 2015년 KO 결합으로 이 플랫폼이 완성됨</text>

  <!-- role: Act 1 - founders and brand emergence -->
</svg>
