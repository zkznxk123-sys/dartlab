<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="t d">
  <title id="t">제2막 — Monster의 영업이익률 29% 구조: 매출원가 44% + SG&amp;A 27%</title>
  <desc id="d">매출 100% 에서 매출원가 44%와 판관비 27%를 차감한 잔여가 영업이익 29%. 9년 OPM 사이클 미니 라인차트 병치.</desc>

  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="40" y="50" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#f1f5f9">제2막 · Monster 마진 해부 — 매출 $1 당 영업이익 29센트</text>
  <text x="40" y="78" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">원가 44% + 판관비 27% + 영업이익 29% = 100% · 9년 OPM 밴드 25~35%</text>

  <!-- Waterfall -->
  <g transform="translate(40, 120)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">매출 $1 워터폴 (2024 기준)</text>

    <!-- Bar 1: Revenue 100% -->
    <rect x="0" y="30" width="160" height="360" fill="#60a5fa"/>
    <text x="80" y="220" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="34" font-weight="800" fill="#0a0e1a">100%</text>
    <text x="80" y="250" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a">매출</text>
    <text x="80" y="410" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">매출</text>
    <text x="80" y="428" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">$7.49B</text>

    <!-- Arrow/minus -->
    <text x="180" y="230" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#ef4444">−</text>

    <!-- Bar 2: COGS 44% (red) -->
    <rect x="210" y="30" width="160" height="158" fill="#ef4444"/>
    <text x="290" y="120" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="32" font-weight="800" fill="#f1f5f9">44%</text>
    <text x="290" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">매출원가</text>
    <text x="290" y="410" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">원재료 · 병입 수수료</text>
    <text x="290" y="428" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">$3.30B · KO 네트워크 수수료</text>

    <text x="380" y="230" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#64748b">=</text>

    <!-- Bar 3: Gross Profit 56% -->
    <rect x="410" y="30" width="160" height="202" fill="#84cc16"/>
    <text x="490" y="140" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="32" font-weight="800" fill="#0a0e1a">56%</text>
    <text x="490" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#0a0e1a">매출총이익</text>
    <text x="490" y="410" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">매출총이익</text>
    <text x="490" y="428" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#84cc16">$4.19B · 업계 최상위권</text>

    <text x="580" y="230" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#ef4444">−</text>

    <!-- Bar 4: SG&A 27% -->
    <rect x="610" y="30" width="160" height="97" fill="#f59e0b"/>
    <text x="690" y="85" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#0a0e1a">27%</text>
    <text x="690" y="110" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#0a0e1a">SG&amp;A</text>
    <text x="690" y="410" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">판매관리비</text>
    <text x="690" y="428" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">$2.02B · 마케팅 + 스포츠 스폰</text>

    <text x="780" y="230" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#64748b">=</text>

    <!-- Bar 5: OPM 29% -->
    <rect x="810" y="130" width="160" height="102" fill="#fbbf24" stroke="#f1f5f9" stroke-width="2"/>
    <text x="890" y="185" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="34" font-weight="800" fill="#0a0e1a">29%</text>
    <text x="890" y="215" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="800" fill="#0a0e1a">영업이익</text>
    <text x="890" y="410" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">영업이익</text>
    <text x="890" y="428" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#fbbf24">$2.17B · OPM 29%</text>
  </g>

  <!-- Mini line chart: 9yr OPM -->
  <g transform="translate(40, 500)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">9년 OPM 사이클 — 35% → 25% → 29%</text>
    <text x="0" y="22" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">2016년 피크 35%, 2022년 원재료 급등기 25% 저점, 2024년 29% 회복 · 변동성 ±5%p</text>

    <!-- Axis -->
    <line x1="60" y1="50" x2="1100" y2="50" stroke="#334155"/>
    <line x1="60" y1="50" x2="60" y2="180" stroke="#334155"/>

    <!-- Grid lines + y labels -->
    <line x1="60" y1="60" x2="1100" y2="60" stroke="#1e293b"/>
    <text x="50" y="64" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">35%</text>
    <line x1="60" y1="110" x2="1100" y2="110" stroke="#1e293b"/>
    <text x="50" y="114" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">30%</text>
    <line x1="60" y1="160" x2="1100" y2="160" stroke="#1e293b"/>
    <text x="50" y="164" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">25%</text>

    <!-- Data points: 2016=35,2017=33,2018=32,2019=33,2020=33,2021=30,2022=25,2023=27,2024=29 -->
    <!-- y = 60 + (35-val)*10 ; x spacing 1040/8 = 130 -->
    <polyline points="60,60 190,80 320,90 450,80 580,80 710,110 840,160 970,140 1100,120"
              stroke="#fbbf24" stroke-width="3" fill="none"/>

    <!-- Dots -->
    <circle cx="60"   cy="60"  r="5" fill="#fbbf24"/>
    <circle cx="190"  cy="80"  r="5" fill="#fbbf24"/>
    <circle cx="320"  cy="90"  r="5" fill="#fbbf24"/>
    <circle cx="450"  cy="80"  r="5" fill="#fbbf24"/>
    <circle cx="580"  cy="80"  r="5" fill="#fbbf24"/>
    <circle cx="710"  cy="110" r="5" fill="#fbbf24"/>
    <circle cx="840"  cy="160" r="7" fill="#ef4444" stroke="#f1f5f9" stroke-width="2"/>
    <circle cx="970"  cy="140" r="5" fill="#fbbf24"/>
    <circle cx="1100" cy="120" r="7" fill="#22c55e" stroke="#f1f5f9" stroke-width="2"/>

    <!-- Year labels -->
    <text x="60"   y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2016</text>
    <text x="190"  y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2017</text>
    <text x="320"  y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2018</text>
    <text x="450"  y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2019</text>
    <text x="580"  y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2020</text>
    <text x="710"  y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2021</text>
    <text x="840"  y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">2022</text>
    <text x="970"  y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2023</text>
    <text x="1100" y="200" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#22c55e">2024</text>

    <!-- Peak/Trough annotations -->
    <text x="60" y="42" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#84cc16">35% 피크</text>
    <text x="840" y="180" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#ef4444">25% 저점</text>
    <text x="1100" y="105" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#22c55e">29% 회복</text>
  </g>

  <!-- role: Act 2 - margin structure + OPM cycle -->
</svg>
