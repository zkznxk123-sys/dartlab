<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>CCC 분해 스택 — DSO/DIO/DPO 5년 궤적</title>
  <desc>공장 없는 Monster의 현금 전환 주기를 DSO(매출채권), DIO(재고), DPO(매입채무)로 분해. 2023 Bang 인수 피크, 2025 DSO 급등.</desc>

  <defs>
    <linearGradient id="dsoG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="dioG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="dpoG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="64" fill="#f1f5f9" font-size="30" font-weight="700">CCC 분해 — 공장 없는 회사의 유일한 현금 잠금장치</text>
  <text x="60" y="94" fill="#64748b" font-size="16">DSO(매출채권) + DIO(재고) − DPO(매입채무) = CCC · 2023년 Bang 인수 피크, 2025년 매출채권 경보</text>

  <!-- Chart: x 130..1020 (5 years, step 222), zero at y=380. scale 1일=1.4px → max ~200 up, ~90 down -->
  <!-- Zero axis y=380. Top y=380-175*1.4/1.1 ... simplify: 1day = 1.3px. DSO+DIO max=173 → 225px up -->
  <g>
    <!-- Zero line -->
    <line x1="90" y1="380" x2="1050" y2="380" stroke="#334155" stroke-width="1.5"/>

    <!-- Grid -->
    <line x1="90" y1="250" x2="1050" y2="250" stroke="#1e293b"/>
    <line x1="90" y1="120" x2="1050" y2="120" stroke="#1e293b"/>
    <line x1="90" y1="510" x2="1050" y2="510" stroke="#1e293b"/>

    <text x="78" y="124" fill="#64748b" font-size="13" text-anchor="end">+200일</text>
    <text x="78" y="254" fill="#64748b" font-size="13" text-anchor="end">+100일</text>
    <text x="78" y="384" fill="#64748b" font-size="13" text-anchor="end">0</text>
    <text x="78" y="514" fill="#64748b" font-size="13" text-anchor="end">−100일</text>

    <!-- scale: 1day = 1.3px -->
    <!-- DSO (blue) stacked on zero going up. y_top = 380 - DSO*1.3 -->
    <!-- 2021 DSO 52 → top 312.4; 2022 55→308.5; 2023 60→302; 2024 58→304.6; 2025 71→287.7 -->
    <!-- DIO stacked on top of DSO: extends further up by DIO*1.3 -->
    <!-- 2021: 52+69=121 → 380-157.3=222.7; 2022: 55+95=150 → 185; 2023: 60+103=163 → 167.9; 2024: 58+95=153 → 181.1; 2025: 71+80=151 → 183.7 -->
    <!-- DPO (below zero): 380 + DPO*1.3 -->
    <!-- 2021 47→441.1; 2022 50→445; 2023 58→455.4; 2024 60→458; 2025 56→452.8 -->

    <!-- Bar width 70, centered at x positions: 181, 363, 545, 727, 909 -->
    <!-- 2021 -->
    <rect x="146" y="312.4" width="70" height="67.6" fill="url(#dsoG)"/>
    <rect x="146" y="222.7" width="70" height="89.7" fill="url(#dioG)"/>
    <rect x="146" y="380" width="70" height="61.1" fill="url(#dpoG)"/>

    <!-- 2022 -->
    <rect x="328" y="308.5" width="70" height="71.5" fill="url(#dsoG)"/>
    <rect x="328" y="185" width="70" height="123.5" fill="url(#dioG)"/>
    <rect x="328" y="380" width="70" height="65" fill="url(#dpoG)"/>

    <!-- 2023 PEAK -->
    <rect x="510" y="302" width="70" height="78" fill="url(#dsoG)"/>
    <rect x="510" y="167.9" width="70" height="134.1" fill="url(#dioG)" stroke="#ef4444" stroke-width="2"/>
    <rect x="510" y="380" width="70" height="75.4" fill="url(#dpoG)"/>

    <!-- 2024 -->
    <rect x="692" y="304.6" width="70" height="75.4" fill="url(#dsoG)"/>
    <rect x="692" y="181.1" width="70" height="123.5" fill="url(#dioG)"/>
    <rect x="692" y="380" width="70" height="78" fill="url(#dpoG)"/>

    <!-- 2025 DSO alert -->
    <rect x="874" y="287.7" width="70" height="92.3" fill="url(#dsoG)" stroke="#ef4444" stroke-width="2"/>
    <rect x="874" y="183.7" width="70" height="104" fill="url(#dioG)"/>
    <rect x="874" y="380" width="70" height="72.8" fill="url(#dpoG)"/>

    <!-- CCC line overlay: CCC values 74,100,105,93,95. Plot as y = 380 - CCC*1.3 -->
    <!-- 74→283.8; 100→250; 105→243.5; 93→259.1; 95→256.5 -->
    <path d="M 181,283.8 L 363,250 L 545,243.5 L 727,259.1 L 909,256.5" stroke="#f1f5f9" stroke-width="3" fill="none" stroke-linecap="round"/>
    <g fill="#f1f5f9">
      <circle cx="181" cy="283.8" r="6"/><circle cx="363" cy="250" r="6"/><circle cx="545" cy="243.5" r="6" fill="#ef4444"/><circle cx="727" cy="259.1" r="6"/><circle cx="909" cy="256.5" r="6"/>
    </g>

    <!-- CCC labels -->
    <text x="181" y="275" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">CCC 74</text>
    <text x="363" y="241" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">100</text>
    <text x="545" y="234" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">105 peak</text>
    <text x="727" y="250" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">93</text>
    <text x="909" y="247" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">95</text>

    <!-- X labels -->
    <text x="181" y="535" fill="#f1f5f9" font-size="14" text-anchor="middle">2021</text>
    <text x="363" y="535" fill="#f1f5f9" font-size="14" text-anchor="middle">2022</text>
    <text x="545" y="535" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">2023 · Bang 인수</text>
    <text x="727" y="535" fill="#f1f5f9" font-size="14" text-anchor="middle">2024</text>
    <text x="909" y="535" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">2025 · DSO 71↑</text>
  </g>

  <!-- Legend -->
  <g transform="translate(90,108)" font-size="14">
    <rect width="14" height="14" y="-11" fill="url(#dsoG)"/>
    <text x="22" y="0" fill="#f1f5f9">DSO 매출채권</text>
    <rect width="14" height="14" x="150" y="-11" fill="url(#dioG)"/>
    <text x="172" y="0" fill="#f1f5f9">DIO 재고</text>
    <rect width="14" height="14" x="270" y="-11" fill="url(#dpoG)"/>
    <text x="292" y="0" fill="#f1f5f9">DPO 매입채무 (−)</text>
    <line x1="430" y1="-4" x2="460" y2="-4" stroke="#f1f5f9" stroke-width="3"/>
    <text x="468" y="0" fill="#f1f5f9">CCC (일)</text>
  </g>

  <!-- Conclusion -->
  <g transform="translate(60,580)">
    <rect width="1080" height="110" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="24" y="36" fill="#3b82f6" font-size="18" font-weight="700">공장 없는 회사의 유일한 현금 잠금장치 — 운전자본이 출렁였다</text>
    <text x="24" y="66" fill="#cbd5e1" font-size="14">2023 Bang 인수로 재고 103일 피크 → 정상화 과정에서 2025 매출채권 71일로 역전 부상</text>
    <text x="24" y="90" fill="#94a3b8" font-size="13">CAPEX가 거의 없는 구조에서 CCC는 현금흐름 품질의 단일 지표 · DSO 지속 감시 필요</text>
  </g>
</svg>
