<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="t d">
  <title id="t">제3막 — Monster 현금전환주기 CCC 9년 추이와 2025년 매출채권 +25%p 경보</title>
  <desc id="d">CCC 2016년 74일에서 2023년 105일 피크, 2024년 95일로 회복. 2025년 매출채권 증가율 +25%p 이상 스파이크 경보. Sloan 발생액 -0.019.</desc>

  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="40" y="50" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#f1f5f9">제3막 · 현금은 실제로 도는가 — CCC 74 → 105 → 95일</text>
  <text x="40" y="78" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">재고회전 둔화 + 매출채권 연장. 2025년 첫 분기 매출채권 +25%p 스파이크는 이익품질 경보</text>

  <!-- CCC bar chart -->
  <g transform="translate(60, 120)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">CCC (Cash Conversion Cycle) — 9년 시계열 (일)</text>

    <!-- Axis -->
    <line x1="40" y1="310" x2="1100" y2="310" stroke="#334155" stroke-width="2"/>
    <line x1="40" y1="50" x2="40" y2="310" stroke="#334155"/>

    <!-- Grid -->
    <line x1="40" y1="250" x2="1100" y2="250" stroke="#1e293b"/>
    <text x="30" y="254" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">30</text>
    <line x1="40" y1="190" x2="1100" y2="190" stroke="#1e293b"/>
    <text x="30" y="194" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">60</text>
    <line x1="40" y1="130" x2="1100" y2="130" stroke="#1e293b"/>
    <text x="30" y="134" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">90</text>
    <line x1="40" y1="70" x2="1100" y2="70" stroke="#1e293b"/>
    <text x="30" y="74" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">120</text>

    <!-- Bars: 2016=74, 2017=78, 2018=82, 2019=85, 2020=88, 2021=92, 2022=98, 2023=105, 2024=95 -->
    <!-- bar top y = 310 - val*2 -->
    <!-- width: 90, spacing 30 -->
    <!-- x positions: 60, 180, 300, 420, 540, 660, 780, 900, 1020 -->

    <rect x="60"   y="162" width="90" height="148" fill="#84cc16"/>
    <text x="105" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">74</text>

    <rect x="180"  y="154" width="90" height="156" fill="#84cc16"/>
    <text x="225" y="147" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">78</text>

    <rect x="300"  y="146" width="90" height="164" fill="#fbbf24"/>
    <text x="345" y="139" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">82</text>

    <rect x="420"  y="140" width="90" height="170" fill="#fbbf24"/>
    <text x="465" y="133" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">85</text>

    <rect x="540"  y="134" width="90" height="176" fill="#fbbf24"/>
    <text x="585" y="127" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">88</text>

    <rect x="660"  y="126" width="90" height="184" fill="#f59e0b"/>
    <text x="705" y="119" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">92</text>

    <rect x="780"  y="114" width="90" height="196" fill="#ef4444"/>
    <text x="825" y="107" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">98</text>

    <rect x="900"  y="100" width="90" height="210" fill="#ef4444" stroke="#f1f5f9" stroke-width="2"/>
    <text x="945" y="93"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="800" fill="#ef4444">105</text>

    <rect x="1020" y="120" width="90" height="190" fill="#22c55e"/>
    <text x="1065" y="113" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="800" fill="#22c55e">95</text>

    <!-- Year labels -->
    <text x="105"  y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2016</text>
    <text x="225"  y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2017</text>
    <text x="345"  y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2018</text>
    <text x="465"  y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2019</text>
    <text x="585"  y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2020</text>
    <text x="705"  y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2021</text>
    <text x="825"  y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f59e0b">2022</text>
    <text x="945"  y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">2023 피크</text>
    <text x="1065" y="330" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#22c55e">2024</text>
  </g>

  <!-- Alert badges -->
  <g transform="translate(40, 490)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">2025년 이익품질 경보 3건</text>

    <!-- Badge 1: AR spike -->
    <rect x="0" y="20" width="360" height="140" rx="10" fill="#111827" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="50" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#ef4444">경보 1 · 매출채권 스파이크</text>
    <text x="20" y="92" font-family="-apple-system, sans-serif" font-size="36" font-weight="800" fill="#ef4444">+25%p</text>
    <text x="20" y="115" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">매출 YoY +5% 대비 AR +30% 증가</text>
    <text x="20" y="134" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Dechow benchmark: +10%p 이상 = 경보</text>
    <text x="20" y="152" font-family="-apple-system, sans-serif" font-size="12" fill="#f59e0b">→ 채널 밀어넣기 또는 수요 둔화 시그널</text>

    <!-- Badge 2: Sloan accrual -->
    <rect x="380" y="20" width="360" height="140" rx="10" fill="#111827" stroke="#22c55e" stroke-width="2"/>
    <text x="400" y="50" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#22c55e">Sloan 발생액 비율</text>
    <text x="400" y="92" font-family="-apple-system, sans-serif" font-size="36" font-weight="800" fill="#22c55e">−0.019</text>
    <text x="400" y="115" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">(NI − OCF) / 평균자산</text>
    <text x="400" y="134" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">음수 = 현금이 이익을 초과</text>
    <text x="400" y="152" font-family="-apple-system, sans-serif" font-size="12" fill="#22c55e">→ 이익 품질 양호 (회계 조작 신호 없음)</text>

    <!-- Badge 3: OCF/NI -->
    <rect x="760" y="20" width="360" height="140" rx="10" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
    <text x="780" y="50" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">OCF / NI 전환률</text>
    <text x="780" y="92" font-family="-apple-system, sans-serif" font-size="36" font-weight="800" fill="#fbbf24">1.04x</text>
    <text x="780" y="115" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">순이익 $1 당 영업현금 $1.04</text>
    <text x="780" y="134" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Buffett 기준: 1.0x 이상 = 우량</text>
    <text x="780" y="152" font-family="-apple-system, sans-serif" font-size="12" fill="#fbbf24">→ 이익이 실제 현금으로 뒷받침</text>
  </g>

  <!-- Verdict -->
  <rect x="40" y="660" width="1120" height="40" rx="6" fill="#111827" stroke="#fbbf24"/>
  <text x="600" y="686" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">핵심 판단: CCC는 회복됐지만 2025년 AR 스파이크는 채널 정체의 선행 지표. 다음 분기 매출 둔화 가능성 감시</text>

  <!-- role: Act 3 - CCC 9yr + 2025 AR alert + Sloan accrual -->
</svg>
