<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>DuPont 역설 — ROE 추락 vs OPM 회복</title>
  <desc>2021~2025 ROE/OPM/Leverage 3축 라인과 Equity 영역. 자본이 순이익보다 3배 빨리 팽창한 성공의 저주 시각화.</desc>

  <defs>
    <linearGradient id="eqGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="64" fill="#f1f5f9" font-size="30" font-weight="700">DuPont 역설 — ROE 23%인데 OPM은 회복 중</text>
  <text x="60" y="94" fill="#64748b" font-size="16">순이익은 늘었지만 자기자본이 더 빨리 팽창한 5년</text>

  <!-- Chart area: x 90..1000, y 150..560 -->
  <g>
    <!-- Grid -->
    <line x1="90" y1="150" x2="1000" y2="150" stroke="#1e293b" stroke-width="1"/>
    <line x1="90" y1="252" x2="1000" y2="252" stroke="#1e293b" stroke-width="1"/>
    <line x1="90" y1="355" x2="1000" y2="355" stroke="#1e293b" stroke-width="1"/>
    <line x1="90" y1="457" x2="1000" y2="457" stroke="#1e293b" stroke-width="1"/>
    <line x1="90" y1="560" x2="1000" y2="560" stroke="#334155" stroke-width="1.5"/>

    <!-- Y-axis labels (percent left) -->
    <text x="78" y="154" fill="#64748b" font-size="13" text-anchor="end">40%</text>
    <text x="78" y="256" fill="#64748b" font-size="13" text-anchor="end">30%</text>
    <text x="78" y="359" fill="#64748b" font-size="13" text-anchor="end">20%</text>
    <text x="78" y="461" fill="#64748b" font-size="13" text-anchor="end">10%</text>
    <text x="78" y="564" fill="#64748b" font-size="13" text-anchor="end">0%</text>

    <!-- Y-axis right (Equity $B 0..10) -->
    <text x="1012" y="154" fill="#fbbf24" font-size="13">$10B</text>
    <text x="1012" y="256" fill="#fbbf24" font-size="13">$7.5B</text>
    <text x="1012" y="359" fill="#fbbf24" font-size="13">$5B</text>
    <text x="1012" y="461" fill="#fbbf24" font-size="13">$2.5B</text>
    <text x="1012" y="564" fill="#fbbf24" font-size="13">$0</text>

    <!-- X-axis labels -->
    <text x="181" y="585" fill="#f1f5f9" font-size="14" text-anchor="middle">2021</text>
    <text x="363" y="585" fill="#f1f5f9" font-size="14" text-anchor="middle">2022</text>
    <text x="545" y="585" fill="#f1f5f9" font-size="14" text-anchor="middle">2023</text>
    <text x="727" y="585" fill="#f1f5f9" font-size="14" text-anchor="middle">2024</text>
    <text x="909" y="585" fill="#f1f5f9" font-size="14" text-anchor="middle">2025</text>

    <!-- Equity area (0..10 scale, 3.61,4.17,5.16,6.57,8.25) -->
    <!-- y = 560 - (v/10)*410 -->
    <path d="M 181,412 L 363,389 L 545,348 L 727,291 L 909,222 L 909,560 L 181,560 Z" fill="url(#eqGrad)"/>
    <path d="M 181,412 L 363,389 L 545,348 L 727,291 L 909,222" stroke="#fbbf24" stroke-width="2" fill="none" stroke-dasharray="4 3"/>

    <!-- Leverage line (1.72,1.65,1.55,1.40,1.21) scale to % axis as ratio*10 → 17.2,16.5,15.5,14.0,12.1  y=560-(v/40)*410 -->
    <!-- Actually rescale: treat as 0..2.0 mapped to 0..40% area. v*20 → 34.4,33,31,28,24.2 -->
    <path d="M 181,207 L 363,222 L 545,242 L 727,273 L 909,312" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- ROE line (38.15,28.50,31.50,23.00,23.08) y=560-(v/40)*410 -->
    <path d="M 181,169 L 363,268 L 545,237 L 727,324 L 909,324" stroke="#ef4444" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- OPM line (32.44,25.10,27.40,25.80,29.17) -->
    <path d="M 181,228 L 363,303 L 545,279 L 727,296 L 909,261" stroke="#22c55e" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Points -->
    <g fill="#ef4444">
      <circle cx="181" cy="169" r="5"/><circle cx="363" cy="268" r="5"/><circle cx="545" cy="237" r="5"/><circle cx="727" cy="324" r="5"/><circle cx="909" cy="324" r="5"/>
    </g>
    <g fill="#22c55e">
      <circle cx="181" cy="228" r="5"/><circle cx="363" cy="303" r="5"/><circle cx="545" cy="279" r="5"/><circle cx="727" cy="296" r="5"/><circle cx="909" cy="261" r="5"/>
    </g>

    <!-- Value labels ROE -->
    <text x="181" y="156" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">38.2%</text>
    <text x="909" y="312" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">23.1%</text>
    <!-- OPM -->
    <text x="181" y="218" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">32.4%</text>
    <text x="909" y="249" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">29.2%</text>
    <!-- Leverage -->
    <text x="181" y="198" fill="#94a3b8" font-size="13" text-anchor="middle">1.72x</text>
    <text x="909" y="302" fill="#94a3b8" font-size="13" text-anchor="middle">1.21x</text>
    <!-- Equity -->
    <text x="181" y="405" fill="#fbbf24" font-size="13" text-anchor="middle">$3.6B</text>
    <text x="909" y="215" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">$8.25B</text>
  </g>

  <!-- Legend -->
  <g transform="translate(90,108)" font-size="14">
    <rect width="12" height="12" y="-10" fill="#ef4444"/>
    <text x="20" y="0" fill="#f1f5f9">ROE</text>
    <rect width="12" height="12" x="90" y="-10" fill="#22c55e"/>
    <text x="110" y="0" fill="#f1f5f9">OPM</text>
    <rect width="12" height="12" x="180" y="-10" fill="#94a3b8"/>
    <text x="200" y="-1" fill="#f1f5f9">Leverage (배)</text>
    <rect width="12" height="12" x="330" y="-10" fill="#fbbf24"/>
    <text x="350" y="0" fill="#f1f5f9">자기자본 Equity ($B)</text>
  </g>

  <!-- Conclusion card -->
  <g transform="translate(60,620)">
    <rect width="1080" height="78" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="24" y="32" fill="#fbbf24" font-size="17" font-weight="700">성공의 저주 — 자본이 순이익보다 3배 빨리 팽창</text>
    <text x="24" y="58" fill="#cbd5e1" font-size="14">자기자본 +129% (3.6B→8.25B) vs 순이익 +38% · OPM은 V자 회복 중인데 ROE는 Leverage 하락에 잠식당함</text>
  </g>
</svg>
