<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" role="img" aria-labelledby="t d">
  <title id="t">제4막 — Monster 관통선: CAPEX/매출 2~3% 고정밴드와 2015년 Coca-Cola $2.15B 결합 구조도</title>
  <desc id="d">Monster는 자체 생산 없이 KO 병입 네트워크에 의존. CAPEX/매출 비율이 9년간 2~3%에 고정된 것과 KO 결합의 구조가 관통선.</desc>

  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="40" y="50" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#f1f5f9">제4막 · 관통선 — 자체 생산 없이 KO 네트워크에 올라탄 자본배분</text>
  <text x="40" y="78" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">상단: CAPEX/매출 9년 2~3% 고정밴드 · 하단: 2015.06 Coca-Cola 결합 구조도 · FCF 9년 누적 $12.3B</text>

  <!-- Top: CAPEX/Revenue band chart -->
  <g transform="translate(60, 110)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">CAPEX / 매출 비율 · 9년 2~3% 밴드 고정 (음료업계 평균 5~7%)</text>

    <!-- Axis -->
    <line x1="40" y1="210" x2="1100" y2="210" stroke="#334155" stroke-width="2"/>
    <line x1="40" y1="40" x2="40" y2="210" stroke="#334155"/>

    <!-- Band highlight: 2% ~ 3% band -->
    <!-- y range: 0%=210, 5%=40. 1%=34px. 2%=142, 3%=108 -->
    <rect x="40" y="108" width="1060" height="34" fill="#fbbf24" opacity="0.1"/>
    <line x1="40" y1="108" x2="1100" y2="108" stroke="#fbbf24" stroke-dasharray="4,4"/>
    <line x1="40" y1="142" x2="1100" y2="142" stroke="#fbbf24" stroke-dasharray="4,4"/>
    <text x="1110" y="112" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#fbbf24">3%</text>
    <text x="1110" y="146" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#fbbf24">2%</text>

    <!-- Y labels -->
    <text x="30" y="44"  text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">5%</text>
    <text x="30" y="78"  text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">4%</text>
    <text x="30" y="112" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">3%</text>
    <text x="30" y="146" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2%</text>
    <text x="30" y="180" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">1%</text>
    <text x="30" y="214" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">0%</text>

    <!-- Bars: 2016=2.2, 2017=2.1, 2018=2.4, 2019=2.3, 2020=2.0, 2021=2.5, 2022=2.8, 2023=2.6, 2024=2.3 -->
    <!-- y = 210 - val*34 -->
    <rect x="60"   y="135" width="90" height="75" fill="#84cc16"/>
    <text x="105" y="128" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.2%</text>
    <rect x="180"  y="138" width="90" height="72" fill="#84cc16"/>
    <text x="225" y="131" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.1%</text>
    <rect x="300"  y="128" width="90" height="82" fill="#84cc16"/>
    <text x="345" y="121" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.4%</text>
    <rect x="420"  y="132" width="90" height="78" fill="#84cc16"/>
    <text x="465" y="125" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.3%</text>
    <rect x="540"  y="142" width="90" height="68" fill="#84cc16"/>
    <text x="585" y="135" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.0%</text>
    <rect x="660"  y="125" width="90" height="85" fill="#84cc16"/>
    <text x="705" y="118" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.5%</text>
    <rect x="780"  y="115" width="90" height="95" fill="#fbbf24"/>
    <text x="825" y="108" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.8%</text>
    <rect x="900"  y="122" width="90" height="88" fill="#84cc16"/>
    <text x="945" y="115" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.6%</text>
    <rect x="1020" y="132" width="90" height="78" fill="#84cc16"/>
    <text x="1065" y="125" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">2.3%</text>

    <!-- Year labels -->
    <text x="105" y="230"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2016</text>
    <text x="225" y="230"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2017</text>
    <text x="345" y="230"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2018</text>
    <text x="465" y="230"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2019</text>
    <text x="585" y="230"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2020</text>
    <text x="705" y="230"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2021</text>
    <text x="825" y="230"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2022</text>
    <text x="945" y="230"  text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2023</text>
    <text x="1065" y="230" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2024</text>

    <!-- FCF highlight -->
    <rect x="40" y="260" width="1060" height="50" rx="6" fill="#111827" stroke="#22c55e"/>
    <text x="60" y="290" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#22c55e">9년 FCF 누적 $12.3B</text>
    <text x="300" y="290" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">— 영업이익률 29% × 낮은 CAPEX 2.3% = FCF 전환률 85% 이상. 배당 $0, 전량 자사주 매입에 사용</text>
  </g>

  <!-- Bottom: KO deal structure -->
  <g transform="translate(60, 450)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">2015.06.12 Coca-Cola 자본 결합 — 현금/브랜드 교환 구조도</text>
    <text x="0" y="22" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">KO가 Monster 지분 16.7% 취득 + 에너지 브랜드 이관 + 병입 네트워크 제공. Monster는 KO 비에너지 브랜드 인수</text>

    <!-- KO box -->
    <rect x="0" y="50" width="320" height="220" rx="10" fill="#111827" stroke="#ef4444" stroke-width="2"/>
    <text x="160" y="85" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#ef4444">Coca-Cola (KO)</text>
    <text x="160" y="108" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">시총 $260B · 글로벌 병입 네트워크</text>
    <line x1="20" y1="125" x2="300" y2="125" stroke="#334155"/>
    <text x="20" y="150" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">지급 →</text>
    <text x="20" y="175" font-family="-apple-system, sans-serif" font-size="16" font-weight="800" fill="#fbbf24">$2.15B 현금</text>
    <text x="20" y="197" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">+ NOS, Full Throttle, Burn,</text>
    <text x="20" y="215" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">  Mother, Play, Power Play 등</text>
    <text x="20" y="233" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">  에너지 브랜드 10종 이관</text>
    <text x="20" y="255" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">+ 글로벌 병입 독점 유통권 제공</text>

    <!-- Arrow 1: KO -> Monster -->
    <path d="M 330 140 L 490 140" stroke="#ef4444" stroke-width="3" marker-end="url(#arrR)"/>
    <text x="410" y="130" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">현금 + 브랜드 + 유통</text>

    <!-- Arrow 2: Monster -> KO -->
    <path d="M 490 190 L 330 190" stroke="#84cc16" stroke-width="3" marker-end="url(#arrL)"/>
    <text x="410" y="210" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#84cc16">지분 16.7% · 주스 브랜드</text>

    <defs>
      <marker id="arrR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 z" fill="#ef4444"/>
      </marker>
      <marker id="arrL" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto">
        <path d="M8,0 L0,3 L8,6 z" fill="#84cc16"/>
      </marker>
    </defs>

    <!-- Monster box -->
    <rect x="500" y="50" width="320" height="220" rx="10" fill="#111827" stroke="#84cc16" stroke-width="2"/>
    <text x="660" y="85" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#84cc16">Monster (MNST)</text>
    <text x="660" y="108" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">시총 당시 $18B · 에너지 집중</text>
    <line x1="520" y1="125" x2="800" y2="125" stroke="#334155"/>
    <text x="520" y="150" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">수취 →</text>
    <text x="520" y="175" font-family="-apple-system, sans-serif" font-size="16" font-weight="800" fill="#fbbf24">KO 지분 16.7%</text>
    <text x="520" y="197" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">+ Hansen Juice, Peace Tea,</text>
    <text x="520" y="215" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">  Hubert&#39;s Lemonade 등</text>
    <text x="520" y="233" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">  비에너지 주스 브랜드 이관</text>
    <text x="520" y="255" font-family="-apple-system, sans-serif" font-size="12" fill="#84cc16">= 에너지 순수 플레이어로 전환</text>

    <!-- Result box -->
    <rect x="840" y="50" width="260" height="220" rx="10" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
    <text x="970" y="85" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#fbbf24">딜의 결과</text>
    <line x1="860" y1="100" x2="1080" y2="100" stroke="#334155"/>
    <text x="860" y="125" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">자체 병입 투자 불필요</text>
    <text x="860" y="147" font-family="-apple-system, sans-serif" font-size="13" fill="#84cc16">→ CAPEX 2~3% 고정</text>
    <text x="860" y="175" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">KO 글로벌 200여국 접근</text>
    <text x="860" y="197" font-family="-apple-system, sans-serif" font-size="13" fill="#84cc16">→ 매출 9년 CAGR 9%</text>
    <text x="860" y="225" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">에너지 세그먼트 집중</text>
    <text x="860" y="247" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24">→ OPM 29% 고정</text>
  </g>

  <!-- Verdict -->
  <rect x="40" y="760" width="1120" height="44" rx="6" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="787" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">핵심 판단: Monster가 S&amp;P 500 30년 1위가 된 이유는 브랜드가 아니라 "자본을 쓰지 않고도 글로벌 유통"이 가능했기 때문 — 2015년 KO 결합이 그 관통선</text>

  <!-- role: Act 4 - CAPEX band + KO deal structure (main thread) -->
</svg>
