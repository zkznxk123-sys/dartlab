<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>ROIC 워터폴 — 31.5% → 28.4% 분해</title>
  <desc>2024→2025 ROIC 변동을 Margin/Turnover/Tax 3개 요인으로 분해. 마진은 밀었지만 회전이 끌어내림.</desc>

  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="64" fill="#f1f5f9" font-size="30" font-weight="700">ROIC 워터폴 — 마진은 밀고, 회전이 끌어내렸다</text>
  <text x="60" y="94" fill="#64748b" font-size="16">2024 → 2025 ROIC 변동의 요인 분해 (63.8% 설명력)</text>

  <!-- Chart baseline y=500, top y=180 → 32%..0% scale (h=320 for 32pp) -->
  <g>
    <!-- Grid -->
    <line x1="90" y1="180" x2="1140" y2="180" stroke="#1e293b"/>
    <line x1="90" y1="260" x2="1140" y2="260" stroke="#1e293b"/>
    <line x1="90" y1="340" x2="1140" y2="340" stroke="#1e293b"/>
    <line x1="90" y1="420" x2="1140" y2="420" stroke="#1e293b"/>
    <line x1="90" y1="500" x2="1140" y2="500" stroke="#334155" stroke-width="1.5"/>

    <text x="78" y="184" fill="#64748b" font-size="13" text-anchor="end">32%</text>
    <text x="78" y="264" fill="#64748b" font-size="13" text-anchor="end">24%</text>
    <text x="78" y="344" fill="#64748b" font-size="13" text-anchor="end">16%</text>
    <text x="78" y="424" fill="#64748b" font-size="13" text-anchor="end">8%</text>
    <text x="78" y="504" fill="#64748b" font-size="13" text-anchor="end">0%</text>

    <!-- y per pp: 10px. start=31.5% → 500-315=185 -->
    <!-- Bar 1: 2024 ROIC 31.5% (full bar 0→31.5) -->
    <rect x="150" y="185" width="140" height="315" fill="#3b82f6" rx="4"/>
    <text x="220" y="175" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">31.5%</text>
    <text x="220" y="520" fill="#94a3b8" font-size="14" text-anchor="middle">2024 ROIC</text>

    <!-- Floating: Margin +3.75pp → from 185 up to 185-37.5=147.5 -->
    <rect x="340" y="147.5" width="140" height="37.5" fill="#22c55e" rx="4"/>
    <text x="410" y="138" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">+3.75pp</text>
    <text x="410" y="520" fill="#22c55e" font-size="14" text-anchor="middle">Margin 효과</text>
    <!-- connector -->
    <line x1="290" y1="185" x2="340" y2="185" stroke="#475569" stroke-dasharray="3 3"/>

    <!-- Turnover -7.25pp → from 147.5 down to 147.5+72.5=220 -->
    <rect x="530" y="147.5" width="140" height="72.5" fill="#ef4444" rx="4"/>
    <text x="600" y="138" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">−7.25pp</text>
    <text x="600" y="520" fill="#ef4444" font-size="14" text-anchor="middle">Turnover 효과</text>
    <line x1="480" y1="147.5" x2="530" y2="147.5" stroke="#475569" stroke-dasharray="3 3"/>

    <!-- Tax +0.36pp → from 220 up to 220-3.6=216.4 -->
    <rect x="720" y="216.4" width="140" height="3.6" fill="#94a3b8" rx="2"/>
    <text x="790" y="208" fill="#94a3b8" font-size="17" font-weight="700" text-anchor="middle">+0.36pp</text>
    <text x="790" y="520" fill="#94a3b8" font-size="14" text-anchor="middle">Tax 효과</text>
    <line x1="670" y1="220" x2="720" y2="220" stroke="#475569" stroke-dasharray="3 3"/>

    <!-- End bar 28.4% (full bar 0→28.4 → 500-284=216) -->
    <rect x="910" y="216" width="140" height="284" fill="#84cc16" rx="4"/>
    <text x="980" y="206" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">28.4%</text>
    <text x="980" y="520" fill="#84cc16" font-size="14" font-weight="700" text-anchor="middle">2025 ROIC</text>
    <line x1="860" y1="216.4" x2="910" y2="216" stroke="#475569" stroke-dasharray="3 3"/>
  </g>

  <!-- WACC reference line -->
  <line x1="150" y1="405.4" x2="1050" y2="405.4" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="1060" y="409" fill="#fbbf24" font-size="13">WACC 9.46%</text>

  <!-- Spread annotation -->
  <g transform="translate(1070,216)">
    <line x1="0" y1="0" x2="0" y2="189.4" stroke="#fbbf24" stroke-width="1"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="-6" y1="189.4" x2="6" y2="189.4" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="14" y="100" fill="#fbbf24" font-size="14" font-weight="700">Spread</text>
    <text x="14" y="118" fill="#fbbf24" font-size="14" font-weight="700">+18.9pp</text>
  </g>

  <!-- Conclusion card -->
  <g transform="translate(60,580)">
    <rect width="1080" height="110" rx="10" fill="#1e293b" stroke="#84cc16" stroke-width="1.5"/>
    <text x="24" y="36" fill="#84cc16" font-size="18" font-weight="700">WACC 9.46% 대비 Spread 약 19%p — 한국 대기업 평균의 4배</text>
    <text x="24" y="66" fill="#cbd5e1" font-size="14">마진은 +3.75pp 밀어올렸지만 회전율이 −7.25pp 끌어내림 · 자본 팽창이 자산 회전을 잠식</text>
    <text x="24" y="90" fill="#94a3b8" font-size="13">3요인이 변동의 63.8%를 설명 · 나머지는 영업외/비영업자산 조정</text>
  </g>
</svg>
