<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="t d">
  <title id="t">제5막 — Monster 자사주 9년 $8.3B · 2024년 단일연도 $3.77B 폭탄과 7년 무차입 깨진 $374M 차입</title>
  <desc id="d">9년 자사주 매입 누적 $8.3B 중 2024년 한 해 $3.77B 집중. 배당은 0, 7년간 장기차입 0에서 2024년 처음 $374M 발생.</desc>

  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="40" y="50" font-family="-apple-system, sans-serif" font-size="24" font-weight="800" fill="#f1f5f9">제5막 · 번 돈을 어떻게 쓰는가 — 자사주 $8.3B 누적, 2024년 $3.77B 집중</text>
  <text x="40" y="78" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">배당은 9년 연속 $0. 장기차입도 7년 연속 $0. 2024년 첫 차입 $374M은 자사주 레버리지의 신호</text>

  <!-- Left: Buyback bar chart -->
  <g transform="translate(40, 120)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">자사주 매입 9년 시계열 ($B)</text>
    <text x="0" y="22" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">2024년 단일연도 $3.77B = 9년 누적의 45%. FCF 2년치를 한 번에 소진</text>

    <!-- Axis -->
    <line x1="40" y1="480" x2="770" y2="480" stroke="#334155" stroke-width="2"/>
    <line x1="40" y1="60" x2="40" y2="480" stroke="#334155"/>

    <!-- Y labels (0 ~ 4B) -->
    <!-- 4B = y60, 0 = y480. scale: 1B = 105px -->
    <text x="30" y="64"  text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$4.0B</text>
    <line x1="40" y1="60"  x2="770" y2="60"  stroke="#1e293b"/>
    <text x="30" y="169" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$3.0B</text>
    <line x1="40" y1="165" x2="770" y2="165" stroke="#1e293b"/>
    <text x="30" y="274" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$2.0B</text>
    <line x1="40" y1="270" x2="770" y2="270" stroke="#1e293b"/>
    <text x="30" y="379" text-anchor="end" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">$1.0B</text>
    <line x1="40" y1="375" x2="770" y2="375" stroke="#1e293b"/>

    <!-- Data: 2016=0.75, 2017=0.40, 2018=1.41, 2019=0.45, 2020=0.25, 2021=0.50, 2022=0.30, 2023=0.50, 2024=3.77 -->
    <!-- y bar top = 480 - val*105 -->
    <rect x="60"   y="401" width="70" height="79"  fill="#84cc16"/>
    <text x="95"  y="396" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">0.75</text>

    <rect x="140"  y="438" width="70" height="42"  fill="#84cc16"/>
    <text x="175" y="433" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">0.40</text>

    <rect x="220"  y="332" width="70" height="148" fill="#84cc16"/>
    <text x="255" y="327" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">1.41</text>

    <rect x="300"  y="432" width="70" height="48"  fill="#84cc16"/>
    <text x="335" y="427" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">0.45</text>

    <rect x="380"  y="454" width="70" height="26"  fill="#84cc16"/>
    <text x="415" y="449" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">0.25</text>

    <rect x="460"  y="427" width="70" height="53"  fill="#84cc16"/>
    <text x="495" y="422" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">0.50</text>

    <rect x="540"  y="448" width="70" height="32"  fill="#84cc16"/>
    <text x="575" y="443" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">0.30</text>

    <rect x="620"  y="427" width="70" height="53"  fill="#84cc16"/>
    <text x="655" y="422" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f1f5f9">0.50</text>

    <!-- 2024 BOMB -->
    <rect x="700"  y="84" width="70" height="396" fill="#ef4444" stroke="#fbbf24" stroke-width="3"/>
    <text x="735" y="75" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#ef4444">$3.77B</text>
    <text x="735" y="280" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="15" font-weight="800" fill="#f1f5f9" transform="rotate(-90, 735, 280)">2024 폭탄</text>

    <!-- Year labels -->
    <text x="95"  y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2016</text>
    <text x="175" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2017</text>
    <text x="255" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2018</text>
    <text x="335" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2019</text>
    <text x="415" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2020</text>
    <text x="495" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2021</text>
    <text x="575" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2022</text>
    <text x="655" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2023</text>
    <text x="735" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#ef4444">2024</text>

    <!-- Sum -->
    <text x="400" y="540" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">9년 누적 합계</text>
    <text x="400" y="566" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="30" font-weight="800" fill="#fbbf24">$8.33B</text>
  </g>

  <!-- Right: Three badges -->
  <g transform="translate(830, 120)">
    <!-- Dividend -->
    <rect x="0" y="0" width="330" height="150" rx="10" fill="#111827" stroke="#64748b" stroke-width="1"/>
    <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">배당 (Dividend)</text>
    <text x="20" y="85" font-family="-apple-system, sans-serif" font-size="48" font-weight="800" fill="#64748b">$0</text>
    <text x="20" y="115" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">9년 연속 배당 전혀 없음</text>
    <text x="20" y="135" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Sacks: "자사주가 더 효율적"</text>

    <!-- Long-term debt -->
    <rect x="0" y="170" width="330" height="200" rx="10" fill="#111827" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="202" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#ef4444">장기차입금 · 2024년 최초 발생</text>
    <text x="20" y="244" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">2017 ~ 2023 (7년)</text>
    <text x="20" y="274" font-family="-apple-system, sans-serif" font-size="32" font-weight="800" fill="#84cc16">$0</text>
    <text x="170" y="244" font-family="-apple-system, sans-serif" font-size="14" fill="#ef4444">2024</text>
    <text x="170" y="274" font-family="-apple-system, sans-serif" font-size="32" font-weight="800" fill="#ef4444">$374M</text>
    <text x="20" y="310" font-family="-apple-system, sans-serif" font-size="12" fill="#f1f5f9">무차입 전통이 깨진 첫 해</text>
    <text x="20" y="328" font-family="-apple-system, sans-serif" font-size="12" fill="#fbbf24">원인: $3.77B 자사주 레버리지</text>
    <text x="20" y="350" font-family="-apple-system, sans-serif" font-size="12" fill="#ef4444">→ 관찰 변수 #2: 2025년 증감 주시</text>

    <!-- Total return -->
    <rect x="0" y="390" width="330" height="170" rx="10" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
    <text x="20" y="422" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">총 주주환원 9년</text>
    <text x="20" y="478" font-family="-apple-system, sans-serif" font-size="40" font-weight="800" fill="#fbbf24">$8.3B</text>
    <text x="20" y="502" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">= 자사주 $8.33B + 배당 $0</text>
    <text x="20" y="522" font-family="-apple-system, sans-serif" font-size="12" fill="#f1f5f9">9년 FCF $12.3B 중 67% 환원</text>
    <text x="20" y="544" font-family="-apple-system, sans-serif" font-size="12" fill="#84cc16">나머지 33% = 현금 보유/M&amp;A</text>
  </g>

  <!-- Verdict -->
  <rect x="40" y="670" width="1120" height="42" rx="6" fill="#111827" stroke="#fbbf24"/>
  <text x="600" y="697" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">핵심 판단: 2024년 $3.77B 자사주 + $374M 첫 차입은 경영진의 주가 자신감 표시 — 다만 2025년 AR 경보와 결합하면 위험 신호로 재해석</text>

  <!-- role: Act 5 - capital allocation: buyback + no dividend + first debt -->
</svg>
