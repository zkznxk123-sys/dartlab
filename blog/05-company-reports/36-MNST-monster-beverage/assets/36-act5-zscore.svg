<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Altman Z″-Score 8년 궤적 — 2024 자사주 폭탄의 흔적</title>
  <desc>2018~2025 Z″-Score와 retainedEarnings/TA 동반 라인. 2024 $3.77B 자사주 매입으로 이익잉여금 잠식, 1년 내 회복.</desc>

  <defs>
    <linearGradient id="safeZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="64" fill="#f1f5f9" font-size="30" font-weight="700">Altman Z″-Score — 2024 자사주 폭탄의 흔적</text>
  <text x="60" y="94" fill="#64748b" font-size="16">신용지표가 출렁였지만 1년 만에 회복 · 이익 엔진의 봉합력</text>

  <!-- Chart: x 100..1100 (8 years, step ~143), y: Z axis 0..10 on left, RE/TA 0..1.2 on right -->
  <!-- y=560 (zero), y=140 (top). 420px height. Z 10 → top. 1day per unit -->
  <g>
    <!-- Safe zone: Z > 5.85. y(5.85) = 560 - 5.85*42 = 560-245.7=314.3. Zone from 140 to 314.3 -->
    <rect x="100" y="140" width="1000" height="174.3" fill="url(#safeZone)"/>
    <line x1="100" y1="314.3" x2="1100" y2="314.3" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="1108" y="318" fill="#22c55e" font-size="13" font-weight="700">안전 5.85</text>

    <!-- Grid -->
    <line x1="100" y1="140" x2="1100" y2="140" stroke="#1e293b"/>
    <line x1="100" y1="224" x2="1100" y2="224" stroke="#1e293b"/>
    <line x1="100" y1="398" x2="1100" y2="398" stroke="#1e293b"/>
    <line x1="100" y1="476" x2="1100" y2="476" stroke="#1e293b"/>
    <line x1="100" y1="560" x2="1100" y2="560" stroke="#334155" stroke-width="1.5"/>

    <text x="88" y="144" fill="#64748b" font-size="13" text-anchor="end">Z 10</text>
    <text x="88" y="228" fill="#64748b" font-size="13" text-anchor="end">Z 8</text>
    <text x="88" y="402" fill="#64748b" font-size="13" text-anchor="end">Z 4</text>
    <text x="88" y="480" fill="#64748b" font-size="13" text-anchor="end">Z 2</text>
    <text x="88" y="564" fill="#64748b" font-size="13" text-anchor="end">0</text>

    <!-- Right axis RE/TA 0..1.2 → same y range -->
    <text x="1108" y="144" fill="#fbbf24" font-size="13">1.2</text>
    <text x="1108" y="354" fill="#fbbf24" font-size="13">0.6</text>
    <text x="1108" y="564" fill="#fbbf24" font-size="13">0.0</text>

    <!-- X axis labels -->
    <g fill="#f1f5f9" font-size="14" text-anchor="middle">
      <text x="171" y="588">2018</text>
      <text x="304" y="588">2019</text>
      <text x="437" y="588">2020</text>
      <text x="570" y="588">2021</text>
      <text x="703" y="588">2022</text>
      <text x="836" y="588">2023</text>
      <text x="969" y="588" fill="#ef4444" font-weight="700">2024</text>
      <text x="1029" y="588">2025</text>
    </g>

    <!-- Z″ line: 8.50,8.95,9.20,9.10,8.85,9.00,7.15,8.12 -->
    <!-- y = 560 - Z*42 -->
    <!-- 8.50→203; 8.95→184.1; 9.20→173.6; 9.10→177.8; 8.85→188.3; 9.00→182; 7.15→259.7; 8.12→218.96 -->
    <!-- 8 points across 100..1100, step=142.86. xs: 171.4, 314.3, 457.1, 600, 742.9, 885.7, 1028.6, 1028.6? need 8 positions -->
    <!-- use: 171, 304, 437, 570, 703, 836, 969, 1029... better: equal step within 100..1100 with 8 points: step=142.86. x_i=171.4 + i*142.86 → 171.4, 314.3, 457.1, 600, 742.9, 885.7, 1028.6, (1171.4 OOB) -->
    <!-- Use 8 points: step=1000/7=142.86, x=100+i*142.86 → 100,242.9,385.7,528.6,671.4,814.3,957.1,1100 -->
    <!-- adjust labels -->
    <path d="M 100,203 L 242.9,184.1 L 385.7,173.6 L 528.6,177.8 L 671.4,188.3 L 814.3,182 L 957.1,259.7 L 1100,218.96"
          stroke="#f1f5f9" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- RE/TA line: 0.85,0.90,0.95,0.93,0.88,1.09,0.61,0.94 scale: y=560-(v/1.2)*420 -->
    <!-- 0.85→262.5; 0.90→245; 0.95→227.5; 0.93→234.5; 0.88→252; 1.09→178.5; 0.61→346.5; 0.94→231 -->
    <path d="M 100,262.5 L 242.9,245 L 385.7,227.5 L 528.6,234.5 L 671.4,252 L 814.3,178.5 L 957.1,346.5 L 1100,231"
          stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="5 3"/>

    <!-- Points Z -->
    <g fill="#f1f5f9">
      <circle cx="100" cy="203" r="5"/>
      <circle cx="242.9" cy="184.1" r="5"/>
      <circle cx="385.7" cy="173.6" r="5"/>
      <circle cx="528.6" cy="177.8" r="5"/>
      <circle cx="671.4" cy="188.3" r="5"/>
      <circle cx="814.3" cy="182" r="5"/>
      <circle cx="957.1" cy="259.7" r="8" fill="#ef4444"/>
      <circle cx="1100" cy="218.96" r="5"/>
    </g>

    <!-- Z value labels edges -->
    <text x="100" y="193" fill="#f1f5f9" font-size="13" text-anchor="middle">8.50</text>
    <text x="957.1" y="280" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">7.15 ↓</text>
    <text x="1100" y="208" fill="#22c55e" font-size="14" font-weight="700" text-anchor="end">8.12 ↑</text>

    <!-- X axis labels re-positioned to match 8 points -->
    <g fill="#f1f5f9" font-size="14" text-anchor="middle">
      <rect x="0" y="0" width="1" height="1" fill="none"/>
    </g>

    <!-- 2024 annotation -->
    <g>
      <line x1="957.1" y1="260" x2="957.1" y2="420" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3"/>
      <rect x="810" y="425" width="294" height="56" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="6"/>
      <text x="957" y="448" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">$3.77B 자사주 폭탄</text>
      <text x="957" y="470" fill="#cbd5e1" font-size="12" text-anchor="middle">이익잉여금/자산 0.61로 급락</text>
    </g>
  </g>

  <!-- Re-render X labels to align with 8 equal points -->
  <g fill="#f1f5f9" font-size="14" text-anchor="middle">
    <rect x="60" y="594" width="1080" height="1" fill="none"/>
    <text x="100" y="610">2018</text>
    <text x="242.9" y="610">2019</text>
    <text x="385.7" y="610">2020</text>
    <text x="528.6" y="610">2021</text>
    <text x="671.4" y="610">2022</text>
    <text x="814.3" y="610">2023</text>
    <text x="957.1" y="610" fill="#ef4444" font-weight="700">2024</text>
    <text x="1100" y="610">2025</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100,118)" font-size="14">
    <line x1="0" y1="-4" x2="30" y2="-4" stroke="#f1f5f9" stroke-width="3.5"/>
    <text x="38" y="0" fill="#f1f5f9">Altman Z″-Score</text>
    <line x1="200" y1="-4" x2="230" y2="-4" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="5 3"/>
    <text x="238" y="0" fill="#fbbf24">이익잉여금 / 자산</text>
    <rect width="14" height="14" x="400" y="-11" fill="#22c55e" opacity="0.3"/>
    <text x="422" y="0" fill="#22c55e">안전 zone (Z &gt; 5.85)</text>
  </g>

  <!-- Conclusion -->
  <g transform="translate(60,640)">
    <rect width="1080" height="60" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="24" y="30" fill="#22c55e" font-size="17" font-weight="700">신용지표가 출렁였지만 1년 만에 회복 — 이익 엔진의 봉합력</text>
    <text x="24" y="50" fill="#cbd5e1" font-size="13">안전 임계의 1.4배 위에서 복귀 · 자사주 매입은 충격이었을 뿐 구조 손상은 아니었다</text>
  </g>
</svg>
