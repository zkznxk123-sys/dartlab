<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>dCR 7축 신용 레이더 — dCR-AA+ 96.28점</title>
  <desc>dartlab Credit Rating 7축 점수 시각화. 중심=최우량(0), 바깥=위험. 사업안정성만 튀어나온 구조.</desc>

  <defs>
    <radialGradient id="riskGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="scoreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="56" fill="#f1f5f9" font-size="30" font-weight="700">dCR 신용 레이더 — dCR-AA+ 96.28점</text>
  <text x="60" y="86" fill="#64748b" font-size="16">중심(0)=최우량, 바깥(100)=위험 · 7축 중 6축은 중심에 붙어있음</text>

  <!-- Center at (440, 380), max radius 220 = score 100 -->
  <!-- Axes at angles starting top=-90°, step 360/7 = 51.43° -->
  <!-- Order: 채무상환능력(1.5), 자본구조(2.1), 유동성(0.8), 현금흐름(1.2), 사업안정성(27.95), 재무신뢰성(3.5), 공시리스크(2.0) -->

  <!-- Background rings at 20,40,60,80,100 -->
  <g fill="none" stroke="#1e293b" stroke-width="1">
    <circle cx="440" cy="380" r="44"/>
    <circle cx="440" cy="380" r="88"/>
    <circle cx="440" cy="380" r="132"/>
    <circle cx="440" cy="380" r="176"/>
    <circle cx="440" cy="380" r="220"/>
  </g>
  <!-- Colored risk backdrop -->
  <circle cx="440" cy="380" r="220" fill="url(#riskGrad)"/>

  <!-- Ring labels -->
  <g fill="#475569" font-size="11">
    <text x="446" y="337">20</text>
    <text x="446" y="293">40</text>
    <text x="446" y="249">60</text>
    <text x="446" y="205">80</text>
    <text x="446" y="161">100</text>
  </g>

  <!-- Axes lines & labels. Angles from -90: 0:-90, 1:-38.57, 2:12.86, 3:64.29, 4:115.71, 5:167.14, 6:218.57 -->
  <!-- Compute endpoint at r=220: (cx+r*cos, cy+r*sin) -->
  <g stroke="#334155" stroke-width="1">
    <line x1="440" y1="380" x2="440" y2="160"/>
    <line x1="440" y1="380" x2="612.0" y2="242.8"/>
    <line x1="440" y1="380" x2="654.5" y2="428.9"/>
    <line x1="440" y1="380" x2="535.5" y2="578.3"/>
    <line x1="440" y1="380" x2="344.5" y2="578.3"/>
    <line x1="440" y1="380" x2="225.5" y2="428.9"/>
    <line x1="440" y1="380" x2="268.0" y2="242.8"/>
  </g>

  <!-- Axis labels (outside circle) -->
  <g fill="#f1f5f9" font-size="15" font-weight="600" text-anchor="middle">
    <text x="440" y="148">채무상환능력</text>
    <text x="640" y="232">자본구조</text>
    <text x="686" y="434">유동성</text>
    <text x="555" y="602">현금흐름</text>
    <text x="325" y="602" fill="#ef4444">사업안정성</text>
    <text x="194" y="434">재무신뢰성</text>
    <text x="240" y="232">공시리스크</text>
  </g>

  <!-- Score polygon. r = score * 2.2 (since 100=220px) -->
  <!-- 1.5→3.3, 2.1→4.62, 0.8→1.76, 1.2→2.64, 27.95→61.49, 3.5→7.7, 2.0→4.4 -->
  <!-- Points (angle order): -->
  <!-- i=0 angle=-90: (440, 380-3.3) = (440, 376.7) -->
  <!-- i=1 angle=-38.57: cos=0.7818, sin=-0.6235 → (440+4.62*0.7818, 380+4.62*-0.6235)=(443.61, 377.12) -->
  <!-- i=2 angle=12.86: cos=0.9749, sin=0.2225 → (440+1.76*0.9749, 380+1.76*0.2225)=(441.72, 380.39) -->
  <!-- i=3 angle=64.29: cos=0.4339, sin=0.9009 → (440+2.64*0.4339, 380+2.64*0.9009)=(441.15, 382.38) -->
  <!-- i=4 angle=115.71: cos=-0.4339, sin=0.9009 → (440+61.49*-0.4339, 380+61.49*0.9009)=(413.32, 435.40) -->
  <!-- i=5 angle=167.14: cos=-0.9749, sin=0.2225 → (440+7.7*-0.9749, 380+7.7*0.2225)=(432.49, 381.71) -->
  <!-- i=6 angle=218.57: cos=-0.7818, sin=-0.6235 → (440+4.4*-0.7818, 380+4.4*-0.6235)=(436.56, 377.26) -->

  <polygon points="440,376.7 443.61,377.12 441.72,380.39 441.15,382.38 413.32,435.40 432.49,381.71 436.56,377.26"
           fill="url(#scoreGrad)" stroke="#84cc16" stroke-width="2.5"/>

  <!-- Score points -->
  <g>
    <circle cx="440" cy="376.7" r="4" fill="#22c55e"/>
    <circle cx="443.61" cy="377.12" r="4" fill="#22c55e"/>
    <circle cx="441.72" cy="380.39" r="4" fill="#22c55e"/>
    <circle cx="441.15" cy="382.38" r="4" fill="#22c55e"/>
    <circle cx="413.32" cy="435.40" r="7" fill="#ef4444" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="432.49" cy="381.71" r="4" fill="#22c55e"/>
    <circle cx="436.56" cy="377.26" r="4" fill="#22c55e"/>
  </g>

  <!-- Score value labels -->
  <g font-size="13" font-weight="700">
    <text x="440" y="370" fill="#22c55e" text-anchor="middle">1.5</text>
    <text x="460" y="370" fill="#22c55e">2.1</text>
    <text x="460" y="390" fill="#22c55e">0.8</text>
    <text x="454" y="398" fill="#22c55e">1.2</text>
    <text x="397" y="454" fill="#ef4444" font-size="16">27.95</text>
    <text x="415" y="372" fill="#22c55e" text-anchor="end">3.5</text>
    <text x="425" y="370" fill="#22c55e" text-anchor="end">2.0</text>
  </g>

  <!-- Center dot -->
  <circle cx="440" cy="380" r="3" fill="#f1f5f9"/>

  <!-- Right side summary panel -->
  <g transform="translate(740,130)">
    <rect width="400" height="460" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="24" y="40" fill="#84cc16" font-size="24" font-weight="700">dCR-AA+</text>
    <text x="24" y="68" fill="#f1f5f9" font-size="36" font-weight="800">96.28 <tspan font-size="18" fill="#64748b">/ 100</tspan></text>

    <line x1="24" y1="90" x2="376" y2="90" stroke="#334155"/>

    <!-- Score rows: score displayed as deduction -->
    <g font-size="14">
      <text x="24" y="120" fill="#cbd5e1">채무상환능력</text>
      <text x="376" y="120" fill="#22c55e" text-anchor="end" font-weight="700">−1.5</text>

      <text x="24" y="150" fill="#cbd5e1">자본구조</text>
      <text x="376" y="150" fill="#22c55e" text-anchor="end" font-weight="700">−2.1</text>

      <text x="24" y="180" fill="#cbd5e1">유동성</text>
      <text x="376" y="180" fill="#22c55e" text-anchor="end" font-weight="700">−0.8</text>

      <text x="24" y="210" fill="#cbd5e1">현금흐름</text>
      <text x="376" y="210" fill="#22c55e" text-anchor="end" font-weight="700">−1.2</text>

      <text x="24" y="240" fill="#ef4444" font-weight="700">사업안정성</text>
      <text x="376" y="240" fill="#ef4444" text-anchor="end" font-weight="700">−27.95</text>

      <text x="24" y="270" fill="#cbd5e1">재무신뢰성</text>
      <text x="376" y="270" fill="#22c55e" text-anchor="end" font-weight="700">−3.5</text>

      <text x="24" y="300" fill="#cbd5e1">공시리스크</text>
      <text x="376" y="300" fill="#22c55e" text-anchor="end" font-weight="700">−2.0</text>
    </g>

    <line x1="24" y1="320" x2="376" y2="320" stroke="#334155"/>

    <text x="24" y="352" fill="#fbbf24" font-size="15" font-weight="700">유동성·차입구조 완벽</text>
    <text x="24" y="376" fill="#cbd5e1" font-size="13">6개 축은 각 5점 미만 감점</text>

    <text x="24" y="412" fill="#ef4444" font-size="15" font-weight="700">사업안정성만 출렁임</text>
    <text x="24" y="436" fill="#cbd5e1" font-size="13">Bang 인수 + 원자재 사이클 반영</text>
  </g>

  <!-- Conclusion -->
  <g transform="translate(60,630)">
    <rect width="1080" height="70" rx="10" fill="#1e293b" stroke="#84cc16" stroke-width="1.5"/>
    <text x="24" y="32" fill="#84cc16" font-size="17" font-weight="700">유동성·차입구조 완벽, 사업안정성만 튀어나온 별 모양</text>
    <text x="24" y="56" fill="#cbd5e1" font-size="13">6축은 중심에 밀착 · Bang 인수 후유증과 원자재 사이클이 단일 돌기로 남음</text>
  </g>
</svg>
