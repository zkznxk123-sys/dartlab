<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" role="img" aria-labelledby="t d">
  <title id="t">제6막 — Monster 최종 판단: dCR-AA+ 96.28점, DCF 경고, 관찰 변수 2개 체크리스트</title>
  <desc id="d">신용등급 AA+ 96.28점의 안정성 대비 DCF 상 고평가 경고. CAPEX/매출 3% 초과와 장기차입 $374M 증감이 향후 2개 관찰 변수.</desc>

  <rect width="960" height="640" fill="#0a0e1a"/>

  <text x="40" y="48" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">제6막 · 최종 판단 — 관찰 변수 2개로 압축</text>
  <text x="40" y="72" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">신용은 최상위, 가치는 고평가. 답은 "보유하되 2개 지표만 주시"</text>

  <!-- Left: Observation checklist -->
  <g transform="translate(40, 110)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fbbf24">관찰 변수 체크리스트</text>

    <!-- Variable 1 -->
    <rect x="0" y="20" width="540" height="180" rx="10" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="35" cy="55" r="16" fill="#fbbf24"/>
    <text x="35" y="62" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#0a0e1a">1</text>
    <text x="65" y="60" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">CAPEX / 매출 3% 초과 여부</text>
    <line x1="20" y1="80" x2="520" y2="80" stroke="#334155"/>
    <text x="20" y="108" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">9년 평균 2.3% · 2022년 고점 2.8%</text>
    <text x="20" y="130" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">임계: 3% 돌파 = KO 네트워크 의존 약화</text>
    <text x="20" y="152" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">= 자체 생산 필요 = OPM 29% 위협</text>
    <text x="20" y="180" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24">→ 관통선(2015 KO 딜) 이 깨지는 신호</text>

    <!-- Variable 2 -->
    <rect x="0" y="220" width="540" height="180" rx="10" fill="#111827" stroke="#ef4444" stroke-width="2"/>
    <circle cx="35" cy="255" r="16" fill="#ef4444"/>
    <text x="35" y="262" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#0a0e1a">2</text>
    <text x="65" y="260" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">장기차입 $374M 증감 방향</text>
    <line x1="20" y1="280" x2="520" y2="280" stroke="#334155"/>
    <text x="20" y="308" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">2017 ~ 2023 (7년) 무차입 → 2024 $374M</text>
    <text x="20" y="330" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">임계: 2025년 차입 증가 = 자사주 중독</text>
    <text x="20" y="352" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">임계: 상환 = 일회성 레버리지로 확정</text>
    <text x="20" y="380" font-family="-apple-system, sans-serif" font-size="13" fill="#ef4444">→ 무차입 DNA 회복 여부가 품질 신호</text>
  </g>

  <!-- Right: Credit card + DCF warning -->
  <g transform="translate(600, 110)">
    <!-- Credit rating card -->
    <rect x="0" y="20" width="320" height="180" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2"/>
    <text x="20" y="50" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#22c55e">dartlab Credit Rating</text>
    <text x="20" y="100" font-family="-apple-system, sans-serif" font-size="40" font-weight="800" fill="#22c55e">dCR-AA+</text>
    <text x="20" y="135" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">종합 점수</text>
    <text x="20" y="170" font-family="-apple-system, sans-serif" font-size="32" font-weight="800" fill="#fbbf24">96.28</text>
    <text x="150" y="170" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">/ 100</text>
    <text x="150" y="188" font-family="-apple-system, sans-serif" font-size="11" fill="#22c55e">상위 1% 안정성</text>

    <!-- DCF warning card -->
    <rect x="0" y="220" width="320" height="180" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="250" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#ef4444">DCF 가치평가 경고</text>

    <text x="20" y="292" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">현재가</text>
    <text x="20" y="318" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#f1f5f9">$55~60</text>

    <text x="170" y="292" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">DCF 적정</text>
    <text x="170" y="318" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#ef4444">$38~45</text>

    <line x1="20" y1="335" x2="300" y2="335" stroke="#334155"/>
    <text x="20" y="358" font-family="-apple-system, sans-serif" font-size="13" fill="#f1f5f9">프리미엄</text>
    <text x="20" y="382" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#ef4444">+30 ~ 40%</text>
    <text x="170" y="372" font-family="-apple-system, sans-serif" font-size="11" fill="#fbbf24">= 성장 프리미엄</text>
    <text x="170" y="388" font-family="-apple-system, sans-serif" font-size="11" fill="#fbbf24">을 이미 반영한 가격</text>
  </g>

  <!-- Bottom verdict -->
  <rect x="40" y="530" width="880" height="90" rx="10" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
  <text x="60" y="562" font-family="-apple-system, sans-serif" font-size="15" font-weight="800" fill="#fbbf24">최종 판단</text>
  <text x="60" y="588" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">신용은 상위 1%, 가치는 고평가. 신규 진입 비권장 · 기존 보유자는 2개 변수만 체크</text>
  <text x="60" y="610" font-family="-apple-system, sans-serif" font-size="13" fill="#84cc16">CAPEX/매출 3% 이하 유지 + 장기차입 감소 = 보유 지속. 둘 중 하나 이탈 = 재검토</text>

  <!-- role: Act 6 - final verdict with 2 observation variables -->
</svg>
