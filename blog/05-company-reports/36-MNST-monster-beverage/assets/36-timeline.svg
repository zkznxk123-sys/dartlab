<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" width="1200" height="430" role="img" aria-labelledby="t d">
  <title id="t">Monster Beverage 33년 연표 — $14.6M Hansen 인수에서 S&amp;P 500 30년 1위까지</title>
  <desc id="d">1992년 Sacks와 Schlosberg의 Hansen 인수부터 2025년 Schlosberg 단독 CEO 체제까지 6개 이정표.</desc>

  <rect width="1200" height="430" fill="#0a0e1a"/>

  <text x="40" y="48" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Monster Beverage 33년 — $14.6M Hansen에서 시작해 S&amp;P 500 30년 수익률 1위로</text>
  <text x="40" y="74" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">1992년 인수 · 2002년 Monster 출시 · 2012년 S&amp;P 편입 · 2015년 KO $2.15B · 2023년 Bang 인수 · 2025년 단독 CEO</text>

  <line x1="80" y1="240" x2="1140" y2="240" stroke="#334155" stroke-width="2"/>

  <!-- 1992 -->
  <circle cx="130" cy="240" r="10" fill="#fbbf24"/>
  <line x1="130" y1="240" x2="130" y2="120" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="130" y="110" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="26" font-weight="800" fill="#fbbf24">1992</text>
  <text x="130" y="135" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">Hansen 인수</text>
  <text x="130" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#84cc16">$14.6M</text>
  <text x="130" y="275" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">Sacks + Schlosberg</text>
  <text x="130" y="290" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">남아공 출신 변호사 듀오</text>

  <!-- 2002 -->
  <circle cx="310" cy="240" r="10" fill="#84cc16"/>
  <line x1="310" y1="240" x2="310" y2="120" stroke="#84cc16" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="310" y="110" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="26" font-weight="800" fill="#84cc16">2002</text>
  <text x="310" y="135" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">Monster 에너지 출시</text>
  <text x="310" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">16oz 최초 대용량</text>
  <text x="310" y="275" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">Red Bull 8.4oz 대비</text>
  <text x="310" y="290" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">2배 용량 · 동일 가격</text>

  <!-- 2012 -->
  <circle cx="490" cy="240" r="10" fill="#22c55e"/>
  <line x1="490" y1="240" x2="490" y2="120" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="490" y="110" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="26" font-weight="800" fill="#22c55e">2012</text>
  <text x="490" y="135" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">사명 변경 + S&amp;P 500</text>
  <text x="490" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">Hansen → Monster</text>
  <text x="490" y="275" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">6월 28일 정식 편입</text>
  <text x="490" y="290" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">브랜드 = 회사</text>

  <!-- 2015 -->
  <circle cx="670" cy="240" r="14" fill="#fbbf24" stroke="#f1f5f9" stroke-width="2"/>
  <line x1="670" y1="240" x2="670" y2="120" stroke="#fbbf24" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="26" font-weight="800" fill="#fbbf24">2015</text>
  <text x="670" y="135" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">Coca-Cola 자본 결합</text>
  <text x="670" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#fbbf24">$2.15B · 16.7%</text>
  <text x="670" y="275" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">KO 글로벌 유통 + 10 브랜드</text>
  <text x="670" y="290" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#84cc16">사실상 통합 = 관통선</text>

  <!-- 2023 -->
  <circle cx="850" cy="240" r="10" fill="#60a5fa"/>
  <line x1="850" y1="240" x2="850" y2="120" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="850" y="110" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="26" font-weight="800" fill="#60a5fa">2023</text>
  <text x="850" y="135" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">Bang 인수</text>
  <text x="850" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">$362M</text>
  <text x="850" y="275" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">VPX 자산 Ch.11 인수</text>
  <text x="850" y="290" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">성과형 세그먼트</text>

  <!-- 2025 -->
  <circle cx="1060" cy="240" r="10" fill="#ef4444"/>
  <line x1="1060" y1="240" x2="1060" y2="120" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="1060" y="110" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="26" font-weight="800" fill="#ef4444">2025</text>
  <text x="1060" y="135" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9">Schlosberg 단독 CEO</text>
  <text x="1060" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">공동 체제 종료</text>
  <text x="1060" y="275" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">Sacks 회장직 유지</text>
  <text x="1060" y="290" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">지배구조 리스크 감시</text>

  <!-- Bottom verdict -->
  <rect x="80" y="340" width="1040" height="60" rx="8" fill="#111827" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="368" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fbbf24">핵심 판단: 1992년 $14.6M 인수가 2025년 시총 $60B+ 로 — S&amp;P 500 30년 누적 수익률 1위는 유통망 레버리지의 결과</text>
  <text x="600" y="388" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">브랜드가 아니라 2015년 KO 결합이 관통선. 자체 생산 없이 Coca-Cola 병입 네트워크로 글로벌 진출</text>

  <!-- role: hero-map timeline -->
</svg>
