<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">첫 배당 + 부채 2배 — 자본배분의 모순</text>
  <text x="600" y="76" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">2024년 첫 배당 시작 — 동시에 차입금 $0 → $59B</text>

  <!-- Timeline -->
  <line x1="100" y1="150" x2="1100" y2="150" stroke="#1e2433" stroke-width="2"/>

  <!-- 2021: No debt, no dividend -->
  <circle cx="200" cy="150" r="8" fill="#3b82f6"/>
  <text x="200" y="130" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">2021</text>
  <rect x="130" y="170" width="140" height="60" rx="6" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="200" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">차입금 $0</text>
  <text x="200" y="215" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">배당 $0</text>

  <!-- 2022: First debt -->
  <circle cx="400" cy="150" r="8" fill="#f59e0b"/>
  <text x="400" y="130" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">2022</text>
  <rect x="330" y="170" width="140" height="60" rx="6" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">차입금 $10B</text>
  <text x="400" y="215" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">배당 $0</text>

  <!-- 2023 -->
  <circle cx="600" cy="150" r="8" fill="#f59e0b"/>
  <text x="600" y="130" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">2023</text>
  <rect x="530" y="170" width="140" height="60" rx="6" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="600" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">차입금 $18B</text>
  <text x="600" y="215" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">배당 $0</text>

  <!-- 2024: First dividend -->
  <circle cx="800" cy="150" r="10" fill="#fbbf24"/>
  <text x="800" y="130" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2024</text>
  <rect x="720" y="170" width="160" height="70" rx="6" fill="#1a1f2b" stroke="#fbbf24" stroke-width="2"/>
  <text x="800" y="195" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">첫 배당 $5.1B</text>
  <text x="800" y="218" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">차입금 $29B</text>

  <!-- 2025 -->
  <circle cx="1000" cy="150" r="10" fill="#ef4444"/>
  <text x="1000" y="130" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2025</text>
  <rect x="920" y="170" width="160" height="70" rx="6" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <text x="1000" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">배당 $5.3B</text>
  <text x="1000" y="218" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">차입금 $59B</text>

  <!-- Bottom: Why section -->
  <text x="600" y="300" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle">왜 배당과 부채를 동시에?</text>

  <!-- Three reason boxes -->
  <rect x="60" y="330" width="340" height="150" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="362" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">배당 = 성숙 시그널</text>
  <text x="80" y="390" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">payout ratio 8.8% (상징적)</text>
  <text x="80" y="413" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">"성장만 하는 회사가 아니라</text>
  <text x="80" y="433" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">돌려주는 회사이기도 하다"</text>
  <text x="80" y="463" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">→ 기관투자자 편입 기준 충족</text>

  <rect x="430" y="330" width="340" height="150" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="362" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">부채 = AI 투자 자금</text>
  <text x="450" y="390" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">CAPEX $70B + 자사주 $34B + 배당 $5B</text>
  <text x="450" y="413" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">= 필요 자금 ~$109B</text>
  <text x="450" y="440" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">OCF $116B로 거의 커버되지만</text>
  <text x="450" y="463" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2026년 CAPEX 증가 대비 차입</text>

  <rect x="800" y="330" width="340" height="150" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="820" y="362" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">안전장치</text>
  <text x="820" y="390" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">이자보상배율 76.4배</text>
  <text x="820" y="413" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현금 $35.9B</text>
  <text x="820" y="440" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익 $83B 대비</text>
  <text x="820" y="463" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">이자 $1.1B — 아직 안전</text>

  <!-- BS stacked bar mini chart -->
  <text x="600" y="530" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">자본 vs 부채 변화 ($B)</text>

  <!-- 2021 -->
  <rect x="160" y="560" width="84" height="80" rx="4" fill="#22c55e" opacity="0.7"/>
  <rect x="160" y="640" width="31" height="40" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="200" y="695" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2021</text>

  <!-- 2022 -->
  <rect x="310" y="545" width="101" height="95" rx="4" fill="#22c55e" opacity="0.7"/>
  <rect x="310" y="640" width="41" height="40" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="360" y="695" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2022</text>

  <!-- 2023 -->
  <rect x="460" y="522" width="128" height="118" rx="4" fill="#22c55e" opacity="0.7"/>
  <rect x="460" y="640" width="60" height="40" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="520" y="695" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2023</text>

  <!-- 2024 -->
  <rect x="610" y="525" width="125" height="115" rx="4" fill="#22c55e" opacity="0.7"/>
  <rect x="610" y="640" width="76" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="670" y="695" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2024</text>

  <!-- 2025 -->
  <rect x="760" y="440" width="217" height="200" rx="4" fill="#22c55e" opacity="0.7"/>
  <rect x="760" y="640" width="149" height="40" rx="4" fill="#ef4444"/>
  <text x="870" y="695" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">2025</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>