<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">현금흐름의 이중 구조 — 이익보다 현금이 2배</text>
  <text x="600" y="76" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">순이익 $60B → 영업현금흐름 $116B → CAPEX $70B → FCF $46B</text>

  <!-- Flow diagram -->
  <!-- NI box -->
  <rect x="60" y="160" width="200" height="90" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="195" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">당기순이익</text>
  <text x="160" y="228" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle">$60.5B</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="205" x2="320" y2="205" stroke="#64748b" stroke-width="2"/>
  <polygon points="320,200 335,205 320,210" fill="#64748b"/>

  <!-- + Depreciation -->
  <rect x="340" y="130" width="180" height="70" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="158" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">+ 감가상각</text>
  <text x="430" y="183" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle">~$21B</text>

  <!-- + SBC -->
  <rect x="340" y="210" width="180" height="70" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="238" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">+ 주식보상비용(SBC)</text>
  <text x="430" y="263" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle">~$22B</text>

  <!-- + Other -->
  <rect x="340" y="290" width="180" height="50" rx="10" fill="#1a1f2b" stroke="#64748b" stroke-width="1"/>
  <text x="430" y="316" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">+ 운전자본 등 ~$12B</text>

  <!-- Arrow 2 -->
  <line x1="520" y1="205" x2="580" y2="205" stroke="#64748b" stroke-width="2"/>
  <polygon points="580,200 595,205 580,210" fill="#64748b"/>

  <!-- OCF box -->
  <rect x="600" y="155" width="220" height="100" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="710" y="190" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">영업활동현금흐름</text>
  <text x="710" y="228" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" text-anchor="middle">$115.8B</text>

  <!-- Arrow 3 down -->
  <line x1="710" y1="255" x2="710" y2="330" stroke="#64748b" stroke-width="2"/>
  <polygon points="705,330 710,345 715,330" fill="#64748b"/>

  <!-- Split: CAPEX and FCF -->
  <!-- CAPEX box -->
  <rect x="480" y="350" width="200" height="90" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <text x="580" y="382" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">- CAPEX (설비투자)</text>
  <text x="580" y="418" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle">$69.7B</text>

  <!-- FCF box -->
  <rect x="740" y="350" width="200" height="90" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <text x="840" y="382" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">= 잉여현금흐름(FCF)</text>
  <text x="840" y="418" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle">$46.1B</text>

  <!-- Split lines -->
  <line x1="710" y1="345" x2="580" y2="350" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="710" y1="345" x2="840" y2="350" stroke="#22c55e" stroke-width="1.5"/>

  <!-- FCF usage -->
  <line x1="840" y1="440" x2="840" y2="490" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="835,490 840,502 845,490" fill="#64748b"/>

  <rect x="660" y="505" width="140" height="50" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="730" y="527" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">배당</text>
  <text x="730" y="545" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">$5.3B</text>

  <rect x="820" y="505" width="140" height="50" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="890" y="527" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">자사주 매입</text>
  <text x="890" y="545" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">~$34B</text>

  <rect x="980" y="505" width="140" height="50" rx="8" fill="#1a1f2b" stroke="#64748b" stroke-width="1"/>
  <text x="1050" y="527" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">잔여</text>
  <text x="1050" y="545" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">~$7B</text>

  <line x1="840" y1="502" x2="730" y2="505" stroke="#64748b" stroke-width="1"/>
  <line x1="840" y1="502" x2="890" y2="505" stroke="#64748b" stroke-width="1"/>
  <line x1="840" y1="502" x2="1050" y2="505" stroke="#64748b" stroke-width="1"/>

  <!-- Key stat -->
  <rect x="60" y="450" width="350" height="120" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="80" y="480" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">OCF/NI = 191%</text>
  <text x="80" y="505" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">이익보다 현금이 거의 2배 많다.</text>
  <text x="80" y="530" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">비용이지만 현금 유출이 아닌 항목들:</text>
  <text x="80" y="550" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">감가상각 + SBC = ~$43B</text>

  <!-- Insight -->
  <rect x="60" y="620" width="1080" height="50" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="650" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">순이익만 보면 CAPEX $70B가 불가능해 보이지만, 현금흐름 기준으로는 투자 후에도 $46B가 남는다.</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>