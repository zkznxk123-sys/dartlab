<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">매출총이익률 비교 — Meta는 순수 소프트웨어에 가깝다</text>
  <text x="600" y="76" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">제조업 → 하드웨어 → SaaS → 광고 플랫폼 순서로 마진이 높아진다</text>

  <!-- Horizontal bar chart -->
  <!-- Samsung -->
  <text x="200" y="160" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" text-anchor="end">삼성전자</text>
  <text x="200" y="178" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">반도체 + 스마트폰</text>
  <rect x="220" y="148" width="378" height="36" rx="6" fill="#3b82f6" opacity="0.6"/>
  <text x="608" y="172" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">42%</text>
  <text x="660" y="172" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원재료, 웨이퍼, 장비 감가상각</text>

  <!-- Apple -->
  <text x="200" y="240" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" text-anchor="end">Apple</text>
  <text x="200" y="258" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">하드웨어 + 서비스</text>
  <rect x="220" y="228" width="414" height="36" rx="6" fill="#3b82f6" opacity="0.7"/>
  <text x="644" y="252" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">46%</text>
  <text x="696" y="252" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">부품, 조립, 물류</text>

  <!-- Google -->
  <text x="200" y="320" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" text-anchor="end">Alphabet</text>
  <text x="200" y="338" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">검색 광고 + 클라우드</text>
  <rect x="220" y="308" width="522" height="36" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="752" y="332" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">58%</text>
  <text x="804" y="332" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">TAC(트래픽 확보 비용), 데이터센터</text>

  <!-- Microsoft -->
  <text x="200" y="400" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" text-anchor="end">Microsoft</text>
  <text x="200" y="418" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">클라우드 + SaaS</text>
  <rect x="220" y="388" width="621" height="36" rx="6" fill="#3b82f6" opacity="0.85"/>
  <text x="851" y="412" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">69%</text>
  <text x="903" y="412" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">클라우드 인프라, 라이선스</text>

  <!-- NVIDIA -->
  <text x="200" y="480" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" text-anchor="end">NVIDIA</text>
  <text x="200" y="498" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">GPU 설계 (팹리스)</text>
  <rect x="220" y="468" width="684" height="36" rx="6" fill="#3b82f6" opacity="0.9"/>
  <text x="914" y="492" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">76%</text>
  <text x="966" y="492" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">TSMC 위탁 생산비</text>

  <!-- Meta - highlighted -->
  <text x="200" y="565" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="end">Meta</text>
  <text x="200" y="583" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end" opacity="0.8">소셜 광고 플랫폼</text>
  <rect x="220" y="548" width="738" height="42" rx="6" fill="#fbbf24" opacity="0.2"/>
  <rect x="220" y="548" width="738" height="42" rx="6" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="968" y="575" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">82%</text>

  <!-- Legend -->
  <text x="220" y="640" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출총이익률 = (매출 - 매출원가) ÷ 매출 × 100</text>

  <!-- Key insight boxes -->
  <rect x="60" y="680" width="520" height="80" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="80" y="710" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">Meta의 82%가 의미하는 것</text>
  <text x="80" y="735" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">사용자 1명 추가 비용 ≈ $0. 광고 1건 추가 비용 ≈ $0.</text>
  <text x="80" y="752" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">한계비용이 거의 0 — 팔수록 남는 구조.</text>

  <rect x="620" y="680" width="520" height="80" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="640" y="710" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">모순</text>
  <text x="640" y="735" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출원가율은 소프트웨어(18%)인데</text>
  <text x="640" y="752" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">CAPEX는 삼성전자보다 많다($70B vs ~$36B).</text>

  <text x="1140" y="810" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>