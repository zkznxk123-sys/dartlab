  <text x="915" y="395" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2024</text>

  <rect x="960" y="140" width="70" height="236" rx="4" fill="url(#capexGrad)"/>
  <text x="995" y="160" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">$70B</text>
  <text x="995" y="395" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">2025</text>

