  <text x="80" y="558" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출원가율 18%. 공장도 원재료도 없다.</text>

  <rect x="430" y="480" width="340" height="100" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="450" y="510" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">현금 보호막</text>
  <text x="450" y="535" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">OCF $116B — 순이익의 2배</text>
  <text x="450" y="558" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">CAPEX $70B 후에도 FCF $46B 잔여</text>

  <rect x="800" y="480" width="340" height="100" rx="8" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="820" y="510" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">리스크</text>
  <text x="820" y="535" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">자산회전율 3기 하락 (0.55회)</text>
