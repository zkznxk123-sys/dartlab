  <text x="470" y="225" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">-18%</text>

  <rect x="120" y="246" width="295" height="44" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="130" y="273" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">매출총이익 $165B</text>
  <text x="470" y="273" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">82%</text>

  <rect x="120" y="298" width="73" height="36" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="203" y="321" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">R&amp;D + SGA</text>
  <text x="470" y="321" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">-40.6%</text>

