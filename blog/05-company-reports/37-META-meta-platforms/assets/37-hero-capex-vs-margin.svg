  <rect x="60" y="620" width="120" height="36" rx="18" fill="#22c55e" opacity="0.15"/>
  <text x="120" y="643" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">dCR-AA</text>

  <rect x="200" y="620" width="160" height="36" rx="18" fill="#f59e0b" opacity="0.15"/>
  <text x="280" y="643" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">Outlook 부정적</text>

  <rect x="380" y="620" width="160" height="36" rx="18" fill="#3b82f6" opacity="0.15"/>
  <text x="460" y="643" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">Piotroski 4/9</text>

  <text x="1140" y="700" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>