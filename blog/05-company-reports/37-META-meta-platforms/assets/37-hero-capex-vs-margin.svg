  <text x="300" y="120" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">2025 마진 구조 ($B)</text>

  <!-- Waterfall bars -->
  <rect x="120" y="150" width="360" height="44" rx="4" fill="#22c55e" opacity="0.9"/>
