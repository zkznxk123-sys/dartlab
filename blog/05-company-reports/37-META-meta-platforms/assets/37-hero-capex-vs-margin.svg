  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="52" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" text-anchor="middle">CAPEX $70B를 쏟아부으면서 OPM 41%를 유지하는 구조</text>
  <text x="600" y="80" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" text-anchor="middle">Meta Platforms 2021~2025 | dartlab 실측</text>

