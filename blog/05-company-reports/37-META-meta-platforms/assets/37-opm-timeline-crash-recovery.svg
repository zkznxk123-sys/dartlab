<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#060a14"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg2)"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">영업이익률 추락과 복귀 — 2017~2025</text>
  <text x="600" y="76" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">82%의 매출총이익률은 변하지 않았다. 바뀐 건 비용 구조.</text>

  <!-- Chart area -->
  <line x1="100" y1="580" x2="1100" y2="580" stroke="#1e2433" stroke-width="1"/>
  <line x1="100" y1="130" x2="100" y2="580" stroke="#1e2433" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="85" y="136" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">50%</text>
  <text x="85" y="226" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">40%</text>
  <text x="85" y="316" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">30%</text>
  <text x="85" y="406" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">20%</text>

  <!-- Grid lines -->
  <line x1="100" y1="130" x2="1100" y2="130" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="100" y1="220" x2="1100" y2="220" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="100" y1="310" x2="1100" y2="310" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="100" y1="400" x2="1100" y2="400" stroke="#1e2433" stroke-width="0.5"/>

  <!-- OPM line: 2017=49.7, 2018=44.6, 2019=33.9, 2020=38.0, 2021=39.6, 2022=24.8, 2023=34.7, 2024=42.2, 2025=41.4 -->
  <!-- Scale: 20%=400, 30%=310, 40%=220, 50%=130. Each 1% = 9px -->
  <!-- X: 2017=180, 2018=295, 2019=410, 2020=525, 2021=640, 2022=755, 2023=870, 2024=985, 2025=1060 -->

  <!-- GP Margin line (dashed, 82% constant — off chart top, just label) -->
  <line x1="100" y1="95" x2="1100" y2="95" stroke="#22c55e" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="1105" y="99" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" opacity="0.7">GP 82%</text>

  <!-- OPM polyline -->
  <polyline points="180,133 295,172 410,268 525,238 640,224 755,354 870,262 985,200 1060,208"
    fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round"/>

  <!-- Data points + labels -->
  <circle cx="180" cy="133" r="5" fill="#3b82f6"/>
  <text x="180" y="120" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">49.7%</text>
  <text x="180" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2017</text>

  <circle cx="295" cy="172" r="5" fill="#3b82f6"/>
  <text x="295" y="159" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">44.6%</text>
  <text x="295" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2018</text>

  <circle cx="410" cy="268" r="5" fill="#3b82f6"/>
  <text x="410" y="290" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">33.9%</text>
  <text x="410" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2019</text>

  <circle cx="525" cy="238" r="5" fill="#3b82f6"/>
  <text x="525" y="225" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">38.0%</text>
  <text x="525" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2020</text>

  <circle cx="640" cy="224" r="5" fill="#3b82f6"/>
  <text x="640" y="211" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">39.6%</text>
  <text x="640" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2021</text>

  <!-- 2022 crash point - highlighted -->
  <circle cx="755" cy="354" r="8" fill="#ef4444"/>
  <text x="755" y="380" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">24.8%</text>
  <text x="755" y="600" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">2022</text>

  <circle cx="870" cy="262" r="5" fill="#3b82f6"/>
  <text x="870" y="249" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">34.7%</text>
  <text x="870" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2023</text>

  <!-- 2024 peak - highlighted -->
  <circle cx="985" cy="200" r="6" fill="#fbbf24"/>
  <text x="985" y="187" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">42.2%</text>
  <text x="985" y="600" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">2024</text>

  <circle cx="1060" cy="208" r="5" fill="#3b82f6"/>
  <text x="1060" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">41.4%</text>
  <text x="1060" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2025</text>

  <!-- Annotations -->
  <rect x="660" y="415" width="200" height="60" rx="6" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="760" y="437" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">2022 크래시</text>
  <text x="760" y="458" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">ATT + Reality Labs + 과잉 채용</text>
  <line x1="755" y1="362" x2="755" y2="415" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="870" y="415" width="230" height="60" rx="6" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="985" y="437" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">Year of Efficiency</text>
  <text x="985" y="458" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">21,000명 해고 → OPM 42.2% 최고치</text>

  <!-- Key insight -->
  <rect x="120" y="640" width="960" height="50" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="670" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">GP마진 82%는 한 번도 흔들리지 않았다. 추락은 비용 비대화, 복귀는 비용 구조 개선.</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측</text>
</svg>