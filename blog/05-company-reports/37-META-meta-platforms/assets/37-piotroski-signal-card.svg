<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <text x="540" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle">dCR-AA인데 Piotroski 4/9 — 경고 신호 카드</text>
  <text x="540" y="76" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">신용등급은 최우량이지만 재무 건전성 지표 5개가 경고</text>

  <!-- Two panels -->
  <!-- Left: Credit -->
  <rect x="40" y="110" width="480" height="240" rx="12" fill="#1a1f2b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="280" y="145" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">dCR-AA · 건강점수 94.57</text>

  <text x="70" y="185" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">등급</text>
  <text x="220" y="185" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">투자적격 상위</text>

  <text x="70" y="215" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">이자보상배율</text>
  <text x="220" y="215" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">76.4배</text>

  <text x="70" y="245" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">Beneish M-Score</text>
  <text x="220" y="245" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">-3.07 (조작 위험 최저)</text>

  <text x="70" y="280" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">EVA</text>
  <text x="220" y="280" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">$38.2B (ROIC 24% vs WACC 8.5%)</text>

  <text x="70" y="320" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">Outlook</text>
  <text x="220" y="320" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">부정적 (부채 3기 연속 증가)</text>

  <!-- Right: Piotroski -->
  <rect x="560" y="110" width="480" height="240" rx="12" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="800" y="145" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">Piotroski F-Score 4/9</text>

  <!-- Pass items -->
  <text x="590" y="180" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10003;</text>
  <text x="615" y="180" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">영업CF 양수</text>

  <text x="590" y="208" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10003;</text>
  <text x="615" y="208" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">CF &gt; 순이익</text>

  <text x="590" y="236" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10003;</text>
  <text x="615" y="236" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">주식 미발행</text>

  <text x="590" y="264" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10003;</text>
  <text x="615" y="264" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">매출총이익률 개선</text>

  <!-- Fail items -->
  <text x="800" y="180" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10007;</text>
  <text x="825" y="180" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">ROA 양수</text>

  <text x="800" y="208" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10007;</text>
  <text x="825" y="208" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">ROA 개선</text>

  <text x="800" y="236" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10007;</text>
  <text x="825" y="236" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">장기부채 감소</text>

  <text x="800" y="264" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10007;</text>
  <text x="825" y="264" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">유동비율 개선</text>

  <text x="800" y="292" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">&#10007;</text>
  <text x="825" y="292" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">자산회전율 개선</text>

  <!-- Analysis section -->
  <text x="540" y="400" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle">5개 실패의 공통 원인: 자산 급증 ($230B → $366B, +59%)</text>

  <!-- Three risk cards -->
  <rect x="40" y="430" width="320" height="120" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="460" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">자산회전율 3기 연속 하락</text>
  <text x="60" y="488" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">0.55회</text>
  <text x="60" y="515" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출 +22% vs 자산 +59%</text>
  <text x="60" y="535" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">투자 → 매출 전환이 아직 안 됨</text>

  <rect x="380" y="430" width="320" height="120" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="460" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">부채 3기 연속 증가</text>
  <text x="400" y="488" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">+95%</text>
  <text x="400" y="515" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">차입금 $0 → $58.7B (3년)</text>
  <text x="400" y="535" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">무차입 경영 포기</text>

  <rect x="720" y="430" width="320" height="120" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="740" y="460" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">감가상각 폭탄</text>
  <text x="740" y="488" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">2027~</text>
  <text x="740" y="515" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">3년간 CAPEX $135B의 상각 시작</text>
  <text x="740" y="535" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">연 $30~35B 상각 → 이익 압박</text>

  <!-- Bottom verdict -->
  <rect x="40" y="590" width="1000" height="80" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="540" y="622" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">2026년에 봐야 할 한 줄</text>
  <text x="540" y="652" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">AI CAPEX의 매출 전환율 — 자산회전율이 반등하면 성공, 계속 하락하면 Piotroski의 경고가 현실이 된다.</text>

  <text x="1020" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>