<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">OCF $14.75B vs NI $3.85B — 이익이 아닌 현금의 구조</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">OCF/NI = 389%. 하지만 dFV는 3년 뒤 FCF 마이너스 전망</text>

  <!-- Current vs projection comparison -->
  <!-- Current (2025) section -->
  <text x="300" y="125" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">현재 (2025)</text>

  <!-- NI box -->
  <rect x="130" y="150" width="140" height="70" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="178" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">당기순이익</text>
  <text x="200" y="205" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" text-anchor="middle">$3.85B</text>

  <text x="300" y="193" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" text-anchor="middle">→</text>

  <!-- OCF box -->
  <rect x="330" y="150" width="140" height="70" rx="8" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="178" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">OCF</text>
  <text x="400" y="205" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" text-anchor="middle">$14.75B</text>

  <!-- +감가상각/SBC text -->
  <text x="300" y="250" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">+ 감가상각 ~$6.6B + SBC ~$2.5B + 운전자본 등</text>

  <!-- CAPEX subtract -->
  <text x="200" y="310" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" text-anchor="middle">↓</text>
  <rect x="130" y="320" width="140" height="60" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="200" y="343" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">- CAPEX</text>
  <text x="200" y="370" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" text-anchor="middle">$8.53B</text>

  <!-- FCF current -->
  <rect x="330" y="320" width="140" height="60" rx="8" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="343" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">= FCF</text>
  <text x="400" y="370" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" text-anchor="middle">$6.22B</text>

  <!-- Divider -->
  <line x1="520" y1="120" x2="520" y2="500" stroke="#1e2433" stroke-width="2"/>

  <!-- dFV projection section -->
  <text x="860" y="125" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">dFV 5년 FCF 전망</text>

  <!-- Projection chart -->
  <!-- Zero line -->
  <line x1="560" y1="330" x2="1150" y2="330" stroke="#64748b" stroke-width="1.5"/>
  <text x="555" y="334" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="end">$0</text>

  <!-- Bars: +4.50, +0.86, -0.65, -0.67, -0.69 -->
  <!-- Scale: $5B = 150px. Each $B = 30px -->

  <!-- +1yr: $4.50B -->
  <rect x="590" y="195" width="90" height="135" fill="#22c55e" opacity="0.8"/>
  <text x="635" y="185" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">+$4.50B</text>
  <text x="635" y="470" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">+1년</text>

  <!-- +2yr: $0.86B -->
  <rect x="700" y="304" width="90" height="26" fill="#f59e0b" opacity="0.8"/>
  <text x="745" y="294" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">+$0.86B</text>
  <text x="745" y="470" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">+2년</text>

  <!-- +3yr: -$0.65B -->
  <rect x="810" y="330" width="90" height="20" fill="#ef4444"/>
  <text x="855" y="370" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">-$0.65B</text>
  <text x="855" y="470" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">+3년</text>

  <!-- +4yr: -$0.67B -->
  <rect x="920" y="330" width="90" height="20" fill="#ef4444"/>
  <text x="965" y="370" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">-$0.67B</text>
  <text x="965" y="470" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">+4년</text>

  <!-- +5yr: -$0.69B -->
  <rect x="1030" y="330" width="90" height="21" fill="#ef4444"/>
  <text x="1075" y="370" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">-$0.69B</text>
  <text x="1075" y="470" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">+5년</text>

  <!-- FCF decline annotation -->
  <text x="860" y="510" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">3년차부터 FCF 마이너스 전환</text>

  <!-- Bottom boxes -->
  <rect x="60" y="560" width="340" height="130" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="80" y="590" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">괴리의 정체</text>
  <text x="80" y="615" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">자산 집약 제조업</text>
  <text x="80" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">대규모 감가상각 + SBC</text>
  <text x="80" y="665" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">IS-CF 괴리 -289%</text>

  <rect x="430" y="560" width="340" height="130" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="590" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2024 vs 2025 FCF</text>
  <text x="450" y="615" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">FCF $3.58B → $6.22B (+74%)</text>
  <text x="450" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">CAPEX 축소 효과 ($11.3B → $8.5B)</text>
  <text x="450" y="665" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">공장 증설 재개 시 다시 축소</text>

  <rect x="800" y="560" width="340" height="130" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="820" y="590" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">dFV 전망 근거</text>
  <text x="820" y="615" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">초기 성장률 5.19% (CAGR 35%→)</text>
  <text x="820" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">CAPEX 유지 + 마진 회복 미전망</text>
  <text x="820" y="665" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">WACC 9.32%, 영구성장 3%</text>
</svg>