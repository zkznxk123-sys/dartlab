<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">자본 +165% — 희석을 받아주는 주주들</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">$31B → $83B, 1년에 $51.6B 자본 증가. 차입금은 $8.2B 유지.</text>

  <!-- Equity growth bars -->
  <!-- Scale: $85B = top (y=140), $0 = bottom (y=440). Each $B = 3.5px -->

  <!-- Y labels -->
  <text x="70" y="145" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$85B</text>
  <text x="70" y="250" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$55B</text>
  <text x="70" y="355" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$25B</text>
  <text x="70" y="440" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$0</text>

  <line x1="80" y1="140" x2="1120" y2="140" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="80" y1="250" x2="1120" y2="250" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="80" y1="355" x2="1120" y2="355" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="80" y1="440" x2="1120" y2="440" stroke="#64748b" stroke-width="1"/>

  <!-- Bars: 2021=6.4, 2022=8.0, 2023=23.5, 2024=31.3, 2025=82.9 -->
  <!-- 2021 -->
  <rect x="170" y="418" width="130" height="22" fill="#22c55e" opacity="0.5"/>
  <text x="235" y="408" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">$6.4B</text>
  <text x="235" y="465" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2021</text>

  <!-- 2022 -->
  <rect x="340" y="412" width="130" height="28" fill="#22c55e" opacity="0.55"/>
  <text x="405" y="402" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">$8.0B</text>
  <text x="405" y="465" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2022</text>

  <!-- 2023 -->
  <rect x="510" y="358" width="130" height="82" fill="#22c55e" opacity="0.65"/>
  <text x="575" y="348" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">$23.5B</text>
  <text x="575" y="465" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2023</text>

  <!-- 2024 -->
  <rect x="680" y="331" width="130" height="109" fill="#22c55e" opacity="0.7"/>
  <text x="745" y="321" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">$31.3B</text>
  <text x="745" y="465" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2024</text>

  <!-- 2025 - highlighted -->
  <rect x="850" y="150" width="130" height="290" fill="#fbbf24"/>
  <text x="915" y="140" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">$82.9B</text>
  <text x="915" y="465" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">2025</text>

  <!-- +165% arrow -->
  <text x="915" y="200" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">+165%</text>

  <!-- Three sources -->
  <text x="600" y="510" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">자본이 늘어난 세 경로</text>

  <rect x="60" y="530" width="340" height="160" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="560" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">1. 영업 유보</text>
  <text x="80" y="588" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">순이익 $3.85B 전액</text>
  <text x="80" y="608" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">(무배당, 이익잉여금으로)</text>
  <text x="80" y="638" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">→ 전체 $51.6B 증가 중 7% 설명</text>
  <text x="80" y="665" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">나머지 93%는 주식 발행</text>

  <rect x="430" y="530" width="340" height="160" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="2"/>
  <text x="450" y="560" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">2. Musk 성과보수 (핵심)</text>
  <text x="450" y="588" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2018년 패키지 재승인</text>
  <text x="450" y="608" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">약 $29B 주식 부여</text>
  <text x="450" y="638" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">스톡옵션 행사 → 자본 증가</text>
  <text x="450" y="665" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Tesla Proxy 2025 (DEF 14A)</text>

  <rect x="800" y="530" width="340" height="160" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="820" y="560" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">3. AI 증자</text>
  <text x="820" y="588" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">xAI 합병 논의</text>
  <text x="820" y="608" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Dojo/Optimus 자본 확보</text>
  <text x="820" y="638" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">시장이 받아주는 조건: 내러티브 유지</text>
  <text x="820" y="665" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">깨지면 차입 의존으로 전환</text>
</svg>