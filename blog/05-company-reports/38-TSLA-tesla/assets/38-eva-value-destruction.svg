<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">EVA +$7.8B → -$4.2B — 가치 창출에서 파괴로</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">ROIC 41% → 4.3%, WACC 9.89% 미달. 자본비용조차 못 벌고 있다.</text>

  <!-- EVA timeline bars -->
  <!-- Scale: 0 at y=350, +10B at y=150, -10B at y=550 -->

  <!-- Zero line -->
  <line x1="100" y1="350" x2="1100" y2="350" stroke="#64748b" stroke-width="2"/>
  <text x="1110" y="354" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">$0</text>

  <!-- +7.5B line (gridline) -->
  <line x1="100" y1="200" x2="1100" y2="200" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="92" y="204" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">+$7.5B</text>

  <line x1="100" y1="275" x2="1100" y2="275" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="92" y="279" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">+$3.75B</text>

  <line x1="100" y1="425" x2="1100" y2="425" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="92" y="429" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">-$3.75B</text>

  <line x1="100" y1="500" x2="1100" y2="500" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="92" y="504" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">-$7.5B</text>

  <!-- EVA values: 2022=+7.80, 2023=+2.48, 2024=-0.55, 2025=-4.19 -->
  <!-- Each $B = 20px. So 2022 = 7.8*20 = 156 up from zero. 2025 = 4.19*20 = 83.8 down -->

  <!-- 2022 -->
  <rect x="200" y="194" width="140" height="156" fill="#22c55e"/>
  <text x="270" y="184" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" text-anchor="middle">+$7.80B</text>
  <text x="270" y="590" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2022</text>
  <text x="270" y="610" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">ROIC 41%</text>

  <!-- 2023 -->
  <rect x="400" y="300" width="140" height="50" fill="#22c55e" opacity="0.7"/>
  <text x="470" y="290" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">+$2.48B</text>
  <text x="470" y="590" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">2023</text>
  <text x="470" y="610" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">ROIC 15.8%</text>

  <!-- 2024 -->
  <rect x="600" y="350" width="140" height="11" fill="#ef4444" opacity="0.7"/>
  <text x="670" y="380" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">-$0.55B</text>
  <text x="670" y="590" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">2024</text>
  <text x="670" y="610" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">ROIC 8.9%</text>

  <!-- 2025 -->
  <rect x="800" y="350" width="140" height="83.8" fill="#ef4444"/>
  <text x="870" y="450" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" text-anchor="middle">-$4.19B</text>
  <text x="870" y="590" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2025</text>
  <text x="870" y="610" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">ROIC 4.27%</text>

  <!-- WACC reference line -->
  <text x="1000" y="354" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">WACC 9.89%</text>
  <text x="1000" y="370" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">(자본비용)</text>

  <!-- ROIC trajectory annotation -->
  <text x="600" y="140" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">ROIC: 41.1% → 15.8% → 8.9% → 4.3%</text>
  <text x="600" y="160" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">투자자본 1달러당 수익이 41센트에서 4센트로 축소</text>

  <!-- Bottom mechanism -->
  <rect x="60" y="650" width="520" height="50" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="80" y="672" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">두 축의 동시 작동</text>
  <text x="80" y="690" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">마진 붕괴 (2막) + 투하자본 3배 증가 ($25B → $74.5B)</text>

  <rect x="620" y="650" width="520" height="50" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="640" y="672" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">연간 파괴되는 가치</text>
  <text x="640" y="690" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$4.2B/년 — 10년이면 $42B의 누적 가치 파괴</text>
</svg>