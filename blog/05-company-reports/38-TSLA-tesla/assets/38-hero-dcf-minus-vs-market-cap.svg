<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">DCF 마이너스 vs 시총 $1T — 내러티브의 가격</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">자동차 회사 기준 가치평가는 (-), 시장은 $1T 이상 — 차이는 옵션 가치</text>

  <!-- Three-step valuation ladder -->
  <!-- DCF minus -->
  <rect x="100" y="160" width="300" height="140" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="195" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">dartlab DCF</text>
  <text x="250" y="235" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="700" text-anchor="middle">-$3.7B</text>
  <text x="250" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">기업가치 마이너스</text>
  <text x="250" y="285" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">자동차 사업 단독 기준</text>

  <!-- Arrow -->
  <text x="420" y="235" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" text-anchor="middle">→</text>

  <!-- dFV weighted target -->
  <rect x="450" y="160" width="300" height="140" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="195" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">dFV 가중 타겟</text>
  <text x="600" y="235" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="700" text-anchor="middle">$321~963B</text>
  <text x="600" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">DCF + RIM + 상대가치 혼합</text>
  <text x="600" y="285" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">시나리오 중앙값 $321B</text>

  <!-- Arrow -->
  <text x="770" y="235" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" text-anchor="middle">→</text>

  <!-- Market cap -->
  <rect x="800" y="160" width="300" height="140" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <text x="950" y="195" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">시가총액 (시장)</text>
  <text x="950" y="235" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="700" text-anchor="middle">~$1,000B</text>
  <text x="950" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2026-04 기준</text>
  <text x="950" y="285" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">로보택시/FSD/Optimus 포함</text>

  <!-- Gap section -->
  <text x="600" y="360" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">$500~700B의 옵션 가치 — 숫자에 없는 네 가지</text>

  <!-- Four options -->
  <rect x="60" y="390" width="265" height="130" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="420" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">로보택시</text>
  <text x="80" y="445" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">완전 자율주행 시</text>
  <text x="80" y="465" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">라이드 공유 수수료</text>
  <text x="80" y="495" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">상용화 시점: 2026~?</text>

  <rect x="335" y="390" width="265" height="130" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="355" y="420" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">FSD 라이선싱</text>
  <text x="355" y="445" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">타 자동차사에 FSD 판매</text>
  <text x="355" y="465" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Apple CarPlay 모델</text>
  <text x="355" y="495" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현재 계약: 0건</text>

  <rect x="610" y="390" width="265" height="130" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="630" y="420" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Optimus 로봇</text>
  <text x="630" y="445" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">휴머노이드 양산</text>
  <text x="630" y="465" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">산업/가정 수요</text>
  <text x="630" y="495" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">양산 시점: 2027~?</text>

  <rect x="885" y="390" width="255" height="130" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="905" y="420" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Dojo + xAI</text>
  <text x="905" y="445" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">AI 인프라 + 모델</text>
  <text x="905" y="465" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">xAI 합병 논의 중</text>
  <text x="905" y="495" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 기여: 0</text>

  <!-- Bottom metrics -->
  <rect x="60" y="550" width="260" height="70" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="80" y="578" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">매출 YoY</text>
  <text x="80" y="605" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">-2.9%</text>
  <text x="200" y="605" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">10년 첫 역성장</text>

  <rect x="340" y="550" width="260" height="70" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="578" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">EVA</text>
  <text x="360" y="605" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">-$4.2B</text>
  <text x="470" y="605" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">자본 파괴 중</text>

  <rect x="620" y="550" width="260" height="70" rx="8" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="640" y="578" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">OPM</text>
  <text x="640" y="605" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">4.6%</text>
  <text x="730" y="605" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2022 16.8% → 1/4토막</text>

  <rect x="900" y="550" width="240" height="70" rx="8" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="920" y="578" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">dCR</text>
  <text x="920" y="605" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">AA-</text>
  <text x="985" y="605" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">순차입금 (-)$8.4B</text>

  <!-- Bottom insight -->
  <rect x="60" y="645" width="1080" height="40" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="670" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">Tesla는 회사라기보다 자동차 사업 + 네 가지 옵션의 포트폴리오에 가깝다.</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>