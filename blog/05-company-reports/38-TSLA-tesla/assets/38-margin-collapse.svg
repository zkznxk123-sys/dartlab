<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">영업이익률 16.8% → 4.6% — 마진 붕괴의 해부</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">가격 인하 + 공장 가동률 + Cybertruck 손실 + 영업레버리지 13.1</text>

  <!-- OPM comparison with peers -->
  <text x="600" y="125" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">영업이익률 비교 (2022 vs 2025)</text>

  <!-- Tesla 2022 -->
  <text x="200" y="175" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="end">Tesla 2022</text>
  <rect x="220" y="160" width="336" height="30" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="565" y="181" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">16.8%</text>

  <!-- Toyota 2022 -->
  <text x="200" y="220" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">Toyota 2022</text>
  <rect x="220" y="205" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="410" y="226" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">9.0%</text>

  <!-- BMW 2022 -->
  <text x="200" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">BMW 2022</text>
  <rect x="220" y="250" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="410" y="271" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">9.0%</text>

  <!-- Tesla 2025 -->
  <text x="200" y="320" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="end">Tesla 2025</text>
  <rect x="220" y="305" width="92" height="30" rx="4" fill="#ef4444" opacity="0.9"/>
  <text x="322" y="326" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">4.6%</text>
  <text x="380" y="326" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Toyota보다 낮다</text>

  <!-- Mechanism section -->
  <text x="600" y="400" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">GP마진 25.6% → 18% — 사라진 7.6%p의 원인</text>

  <!-- Three cause boxes -->
  <rect x="60" y="430" width="340" height="160" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="80" y="460" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">1. 가격 인하</text>
  <text x="80" y="488" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2023년 초 Model 3/Y</text>
  <text x="80" y="508" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">미국 최대 20% 가격 인하</text>
  <text x="80" y="538" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">수요 회복보다 점유율 방어</text>
  <text x="80" y="565" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">가격↓ 원가 그대로 → 마진 직격</text>

  <rect x="430" y="430" width="340" height="160" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="460" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">2. 공장 가동률 하락</text>
  <text x="450" y="488" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">베를린/텍사스 공장</text>
  <text x="450" y="508" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">풀 가동 도달 실패</text>
  <text x="450" y="538" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">고정비 → 매출보다 빨리 증가</text>
  <text x="450" y="565" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">공장 감가상각 대당 비용 상승</text>

  <rect x="800" y="430" width="340" height="160" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="820" y="460" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">3. Cybertruck 손실</text>
  <text x="820" y="488" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2024 양산 시작</text>
  <text x="820" y="508" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">초기 불량률/재작업</text>
  <text x="820" y="538" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">대당 적자 상태</text>
  <text x="820" y="565" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">전체 GP마진 끌어내림</text>

  <!-- DOL warning -->
  <rect x="60" y="620" width="1080" height="70" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="650" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">영업레버리지(DOL) 13.1 — 경고 신호</text>
  <text x="100" y="675" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">매출 1% 변동에 영업이익 13% 변동. 2025년 매출 -2.9%가 영업이익 -38.4%로 증폭됨. 자동차는 전형적 고정비 산업.</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>