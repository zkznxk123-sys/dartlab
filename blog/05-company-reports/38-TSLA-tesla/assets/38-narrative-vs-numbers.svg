<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">내러티브 vs 숫자 — 2026년에 봐야 할 것</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">자동차 회사로서는 피크아웃, AI 회사로서는 시작 전. 어느 쪽이 맞는가</text>

  <!-- Two-column split -->
  <!-- Left: Automotive view -->
  <rect x="60" y="120" width="540" height="400" rx="12" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <text x="330" y="155" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" text-anchor="middle">자동차 회사 관점</text>

  <text x="90" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">피크아웃 완료</text>
  <text x="90" y="225" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">✗ 매출 YoY -2.9% (10년 첫 역성장)</text>
  <text x="90" y="250" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">✗ OPM 16.8% → 4.6% (Toyota 미달)</text>
  <text x="90" y="275" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">✗ EVA -$4.2B (자본 파괴 중)</text>
  <text x="90" y="300" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">✗ ROIC 4.27% &lt; WACC 9.89%</text>
  <text x="90" y="325" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">✗ DCF 기업가치 -$3.7B</text>
  <text x="90" y="350" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">✗ 영업레버리지 13.1 (하방 증폭)</text>
  <text x="90" y="375" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">✗ 매출채권 성장 33%p 빠름 (인식 의심)</text>

  <rect x="90" y="400" width="480" height="100" rx="8" fill="#0a0e1a" stroke="#ef4444" stroke-width="1"/>
  <text x="110" y="425" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">적정 기업가치</text>
  <text x="110" y="455" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700">$321B</text>
  <text x="250" y="455" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">dFV 중앙값</text>
  <text x="110" y="480" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현재 시총 $1T의 1/3 수준</text>

  <!-- Right: AI view -->
  <rect x="620" y="120" width="540" height="400" rx="12" fill="#1a1f2b" stroke="#3b82f6" stroke-width="2"/>
  <text x="890" y="155" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" text-anchor="middle">AI 회사 관점</text>

  <text x="650" y="195" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">시작도 안 함</text>
  <text x="650" y="225" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">? 로보택시 — 2026 상용화 약속</text>
  <text x="650" y="250" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">? FSD 라이선싱 — 현재 계약 0건</text>
  <text x="650" y="275" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">? Optimus 양산 — 2027~</text>
  <text x="650" y="300" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">? Dojo + xAI 합병 논의</text>
  <text x="650" y="325" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">? 완전 자율주행 기술 선두</text>
  <text x="650" y="350" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">? AI 인프라 Dojo 슈퍼컴퓨터</text>
  <text x="650" y="375" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">? Musk 창업자 리더십</text>

  <rect x="650" y="400" width="480" height="100" rx="8" fill="#0a0e1a" stroke="#3b82f6" stroke-width="1"/>
  <text x="670" y="425" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">시장 시총</text>
  <text x="670" y="455" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700">~$1,000B</text>
  <text x="830" y="455" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">옵션 포트폴리오</text>
  <text x="670" y="480" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">네 가지 모두 실현 시 저평가</text>

  <!-- Verdict -->
  <rect x="60" y="550" width="1100" height="130" rx="12" fill="#1a1f2b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="585" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" text-anchor="middle">2026년에 봐야 할 한 줄</text>
  <text x="600" y="618" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" text-anchor="middle">로보택시 상업 서비스의 분기 매출</text>
  <text x="600" y="645" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">전환되면 시총 $1T 정당화 시작. 안 되면 dFV 중앙값 $321B 쪽으로 수렴.</text>
  <text x="600" y="668" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">Tesla는 회사라기보다 자동차 + 4가지 옵션의 포트폴리오. 2026년은 내러티브가 숫자로 바뀌는 해.</text>

  <!-- Bottom summary -->
  <rect x="60" y="710" width="540" height="80" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="90" y="740" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">재무 건전성 (아직 안전)</text>
  <text x="90" y="765" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">dCR-AA- / 건강점수 90.19</text>
  <text x="90" y="783" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">순차입금 -$8.4B, 현금 $16.5B &gt; 차입금 $8.2B</text>

  <rect x="620" y="710" width="540" height="80" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="650" y="740" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">경고 플래그 (다음 분기 주목)</text>
  <text x="650" y="765" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출채권 성장 매출 성장보다 33%p 빠름</text>
  <text x="650" y="783" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 인식 의심 — 재고의 딜러 밀어내기 가능성</text>

  <text x="1140" y="810" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>