<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">매출 10년 만의 역성장 — 자동차 사이클의 피크아웃</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">2010년 상장 이후 첫 매출 감소. 영업이익은 3년 전부터 이미 무너졌다.</text>

  <!-- Chart area -->
  <line x1="80" y1="520" x2="1120" y2="520" stroke="#1e2433" stroke-width="1"/>
  <line x1="80" y1="140" x2="80" y2="520" stroke="#1e2433" stroke-width="1"/>

  <!-- Y labels (revenue scale 0-100, opm 0-20%) -->
  <text x="70" y="145" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$100B</text>
  <text x="70" y="235" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$75B</text>
  <text x="70" y="330" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$50B</text>
  <text x="70" y="425" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$25B</text>
  <text x="70" y="520" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$0</text>

  <!-- Gridlines -->
  <line x1="80" y1="140" x2="1120" y2="140" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="80" y1="235" x2="1120" y2="235" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="80" y1="330" x2="1120" y2="330" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="80" y1="425" x2="1120" y2="425" stroke="#1e2433" stroke-width="0.5"/>

  <!-- Revenue bars: 2017=11.76, 2018=21.46, 2019=24.58, 2020=31.54, 2021=53.82, 2022=81.46, 2023=96.77, 2024=97.69, 2025=94.83 -->
  <!-- Scale: $100B = 140 (top), $0 = 520 (bottom). Each $B = 3.8px -->
  <!-- X positions: 2017=160, 2018=260, 2019=360, 2020=460, 2021=560, 2022=660, 2023=760, 2024=860, 2025=960 -->

  <!-- 2017 -->
  <rect x="130" y="475" width="60" height="45" fill="#3b82f6" opacity="0.7"/>
  <text x="160" y="465" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">11.8</text>
  <text x="160" y="540" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2017</text>

  <!-- 2018 -->
  <rect x="230" y="438" width="60" height="82" fill="#3b82f6" opacity="0.75"/>
  <text x="260" y="428" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">21.5</text>
  <text x="260" y="540" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2018</text>

  <!-- 2019 -->
  <rect x="330" y="427" width="60" height="93" fill="#3b82f6" opacity="0.75"/>
  <text x="360" y="417" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">24.6</text>
  <text x="360" y="540" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2019</text>

  <!-- 2020 -->
  <rect x="430" y="400" width="60" height="120" fill="#3b82f6" opacity="0.8"/>
  <text x="460" y="390" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">31.5</text>
  <text x="460" y="540" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2020</text>

  <!-- 2021 -->
  <rect x="530" y="316" width="60" height="204" fill="#3b82f6" opacity="0.85"/>
  <text x="560" y="306" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">53.8</text>
  <text x="560" y="540" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2021</text>

  <!-- 2022 -->
  <rect x="630" y="211" width="60" height="309" fill="#22c55e" opacity="0.85"/>
  <text x="660" y="201" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">81.5</text>
  <text x="660" y="540" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2022</text>

  <!-- 2023 -->
  <rect x="730" y="152" width="60" height="368" fill="#22c55e" opacity="0.85"/>
  <text x="760" y="142" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">96.8</text>
  <text x="760" y="540" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2023</text>

  <!-- 2024 peak -->
  <rect x="830" y="148" width="60" height="372" fill="#fbbf24"/>
  <text x="860" y="138" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">97.7</text>
  <text x="860" y="540" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" text-anchor="middle">2024 정점</text>

  <!-- 2025 decline -->
  <rect x="930" y="160" width="60" height="360" fill="#ef4444"/>
  <text x="960" y="150" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">94.8</text>
  <text x="960" y="540" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" text-anchor="middle">2025 -2.9%</text>

  <!-- YoY annotation -->
  <line x1="895" y1="148" x2="925" y2="160" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="925,160 915,155 918,162" fill="#ef4444"/>

  <!-- Three shocks callout -->
  <rect x="60" y="580" width="340" height="110" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="80" y="610" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">1. 수요 둔화</text>
  <text x="80" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">중국 BYD가 가격·품질 추월</text>
  <text x="80" y="655" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">유럽 VW/Stellantis 공세</text>
  <text x="80" y="675" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Ford/GM 미국 가격 전쟁</text>

  <rect x="420" y="580" width="340" height="110" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="440" y="610" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2. 라인업 노후화</text>
  <text x="440" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Model Y 출시 5년째</text>
  <text x="440" y="655" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">신차 사이클 공백</text>
  <text x="440" y="675" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Cybertruck 볼륨 기여 미미</text>

  <rect x="780" y="580" width="360" height="110" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="800" y="610" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">3. 브랜드 리스크</text>
  <text x="800" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Musk 정치 이슈가 수요에 타격</text>
  <text x="800" y="655" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">유럽/캘리포니아 보이콧 수치화</text>
  <text x="800" y="675" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">브랜드 프리미엄 저변 흔들림</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>