<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 820">
  <rect width="1080" height="820" fill="#0a0e1a"/>

  <text x="540" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle">2026년에 봐야 할 투자 체크포인트 5가지</text>
  <text x="540" y="76" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">BTS 복귀 + NewJeans 회복이 구조적인지 증명되는 해</text>

  <!-- 5 checkpoint cards -->
  <!-- 1. BTS 초동 -->
  <rect x="60" y="110" width="480" height="120" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="100" cy="140" r="18" fill="#fbbf24"/>
  <text x="100" y="147" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <text x="140" y="145" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">BTS 첫 컴백 앨범 초동</text>
  <text x="80" y="178" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">지표: 초동 판매량 300만 장 회복 여부</text>
  <text x="80" y="198" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">300만+: 팬덤 복귀 확정</text>
  <text x="80" y="215" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">200만-: 공백기 손실 확정 / 매출차 ±2,000억</text>

  <!-- 2. 공연 원가율 -->
  <rect x="560" y="110" width="460" height="120" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="600" cy="140" r="18" fill="#3b82f6"/>
  <text x="600" y="147" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <text x="640" y="145" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">공연 매출 vs 매출원가율</text>
  <text x="580" y="178" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">지표: 분기별 매출원가율 추적</text>
  <text x="580" y="198" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">60% 미만: 구조 개선 신호</text>
  <text x="580" y="215" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">c.select("IS", ["매출액","매출원가"])</text>

  <!-- 3. 무형자산 -->
  <rect x="60" y="260" width="480" height="120" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="100" cy="290" r="18" fill="#ef4444"/>
  <text x="100" y="297" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">3</text>
  <text x="140" y="295" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">무형자산 장부가액 변화</text>
  <text x="80" y="328" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">지표: 북미 인수 영업권 잔액 Q4 추적</text>
  <text x="80" y="348" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">10%+ 하락: 2차 손상 경고</text>
  <text x="80" y="365" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">c.select("BS", ["무형자산","영업권"])</text>

  <!-- 4. NewJeans 재개 -->
  <rect x="560" y="260" width="460" height="120" rx="10" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="600" cy="290" r="18" fill="#a78bfa"/>
  <text x="600" y="297" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">4</text>
  <text x="640" y="295" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">NewJeans 활동 재개 속도</text>
  <text x="580" y="328" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">지표: 1~2분기 앨범 + 월드투어 발표</text>
  <text x="580" y="348" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">투어 15회+: ADOR 정상화</text>
  <text x="580" y="365" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">반년 무발매: ADOR 상각 2차 위험</text>

  <!-- 5. 이자보상 -->
  <rect x="60" y="410" width="960" height="120" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="100" cy="440" r="18" fill="#f59e0b"/>
  <text x="100" y="447" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">5</text>
  <text x="140" y="445" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">이자보상배율 복구 — 가장 중요</text>
  <text x="80" y="478" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현재: 0.3배 (영업이익 493억 / 이자 1,400억+) — "이자 지급 불능" 플래그</text>
  <text x="80" y="500" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">방어선: 영업이익 1,500억+ 회복 → 이자보상배율 1배 이상</text>
  <text x="80" y="518" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">미달 시: 신용등급 dCR-BBB+ → dCR-BBB 하향 압력 현실화</text>

  <!-- Scenario bar -->
  <text x="540" y="575" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">2026년 시나리오 3단</text>

  <!-- Scenario A -->
  <rect x="60" y="595" width="310" height="145" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="80" y="623" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">A. 낙관</text>
  <text x="80" y="648" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">BTS 완전체 + NewJeans 회복</text>
  <text x="80" y="675" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">매출 3.2조 (+20%)</text>
  <text x="80" y="695" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">OPM 11%</text>
  <text x="80" y="720" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">순이익 2,000~2,500억 복귀</text>

  <!-- Scenario B -->
  <rect x="385" y="595" width="310" height="145" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="405" y="623" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">B. 중립</text>
  <text x="405" y="648" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">BTS 부분 + NewJeans 정상</text>
  <text x="405" y="675" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">매출 2.9조 (+9%)</text>
  <text x="405" y="695" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">OPM 7~8%</text>
  <text x="405" y="720" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">순이익 500~1,000억</text>

  <!-- Scenario C -->
  <rect x="710" y="595" width="310" height="145" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="730" y="623" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">C. 보수</text>
  <text x="730" y="648" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">BTS 지연 + 글로벌 정체</text>
  <text x="730" y="675" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">매출 2.7조 (+2%)</text>
  <text x="730" y="695" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">OPM 4~5%</text>
  <text x="730" y="720" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">순이익 0~500억</text>

  <!-- Verdict -->
  <rect x="60" y="760" width="960" height="45" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="540" y="788" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">핵심: 매출 회복이 아니라 마진 회복이 지표. OPM 10%대 복귀 여부가 구조 회복 증명.</text>
</svg>