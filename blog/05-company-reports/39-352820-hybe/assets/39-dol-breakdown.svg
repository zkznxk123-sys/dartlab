<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">영업레버리지 DOL -4.19 — 음의 증폭이 일어난 해</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">매출 +17.5%가 영업이익 -73.2%로 번진 메커니즘</text>

  <!-- DOL timeline: 2022=+0.59, 2023=+1.10, 2024=-10.6, 2025=-4.19 -->
  <line x1="100" y1="350" x2="1100" y2="350" stroke="#64748b" stroke-width="2"/>
  <text x="1110" y="354" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">0</text>

  <!-- Zero line at y=350, positive up, negative down -->
  <!-- +1 = y=325, -1 = y=375, -5 = y=475, -10 = y=600 (scale: 25px/unit) -->

  <!-- 2022: +0.59 (small green up) -->
  <rect x="180" y="335" width="140" height="15" fill="#22c55e" opacity="0.7"/>
  <text x="250" y="320" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">+0.59</text>
  <text x="250" y="640" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">2022</text>
  <text x="250" y="660" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">매출+41% · 영업+25%</text>

  <!-- 2023: +1.10 (green up) -->
  <rect x="350" y="322" width="140" height="28" fill="#22c55e" opacity="0.85"/>
  <text x="420" y="310" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">+1.10</text>
  <text x="420" y="640" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">2023</text>
  <text x="420" y="660" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">매출+23% · 영업+25%</text>

  <!-- 2024: -10.6 (deep red down) — capped visually -->
  <rect x="520" y="350" width="140" height="220" fill="#ef4444"/>
  <text x="590" y="590" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">-10.6</text>
  <text x="590" y="640" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">2024</text>
  <text x="590" y="660" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">매출+3.6% · 영업-38%</text>

  <!-- 2025: -4.19 (red down) -->
  <rect x="690" y="350" width="140" height="105" fill="#ef4444" opacity="0.9"/>
  <text x="760" y="475" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">-4.19</text>
  <text x="760" y="640" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">2025</text>
  <text x="760" y="660" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">매출+17.5% · 영업-73%</text>

  <!-- Annotations -->
  <rect x="880" y="280" width="260" height="150" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="900" y="310" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">음수 DOL의 의미</text>
  <text x="900" y="335" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">정상: 매출↑ → 이익 증폭↑</text>
  <text x="900" y="358" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">병리: 매출↑ → 이익↓</text>
  <text x="900" y="388" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원가·판관비가 매출보다</text>
  <text x="900" y="405" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">빨리 증가하는 구조</text>

  <!-- Three causes -->
  <rect x="60" y="450" width="360" height="110" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="80" y="480" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">1. 신인 비중 과다</text>
  <text x="80" y="505" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">투어스, 아일릿, &amp;TEAM</text>
  <text x="80" y="525" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">동시 초기 투자 단계</text>
  <text x="80" y="548" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">BTS 되풀이 수익 0</text>

  <rect x="440" y="450" width="360" height="110" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="460" y="480" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2. 북미 현지화 투자</text>
  <text x="460" y="505" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">HYBE Latin America</text>
  <text x="460" y="525" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">QC Media / Ithaca Holdings</text>
  <text x="460" y="548" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현지 제작비 + 환율</text>

  <rect x="820" y="450" width="320" height="110" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="840" y="480" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">3. 경영진 리스크</text>
  <text x="840" y="505" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">민희진 풋옵션 255억</text>
  <text x="840" y="525" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ADOR 법률 비용</text>
  <text x="840" y="548" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">여러 레이블 경영진 교체</text>

  <text x="1140" y="705" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab growthQuality.leverageEffect</text>
</svg>