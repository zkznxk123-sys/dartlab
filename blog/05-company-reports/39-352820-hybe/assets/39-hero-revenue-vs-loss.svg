<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">매출 사상 최대 vs 당기순손실 -2,566억 — 괴리의 해부</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">BTS 공백 2년, 공연 +69%로 매출 폭발. 원가율·영업레버리지·손상차손이 이익을 지웠다.</text>

  <!-- Left: Revenue bar -->
  <text x="220" y="130" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">매출</text>
  <rect x="100" y="150" width="240" height="340" rx="8" fill="#22c55e" opacity="0.9"/>
  <text x="220" y="290" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" text-anchor="middle">+17.5%</text>
  <text x="220" y="325" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle">2.65조원</text>
  <text x="220" y="350" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">창사 최대</text>

  <!-- Middle: Operating profit -->
  <text x="530" y="130" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">영업이익</text>
  <rect x="410" y="380" width="240" height="110" rx="8" fill="#f59e0b" opacity="0.85"/>
  <text x="530" y="420" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" text-anchor="middle">-73%</text>
  <text x="530" y="450" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" text-anchor="middle">493억</text>
  <text x="530" y="472" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">(2022 2,369억 → 1/5)</text>

  <!-- Right: Net loss (negative bar growing down) -->
  <text x="840" y="130" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">당기순이익</text>
  <rect x="720" y="300" width="240" height="200" rx="8" fill="#ef4444"/>
  <text x="840" y="370" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="700" text-anchor="middle">적자 전환</text>
  <text x="840" y="410" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">-2,566억</text>
  <text x="840" y="440" fill="#fca5a5" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">창사 이래 첫 연간 적자</text>
  <text x="840" y="475" fill="#fca5a5" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">2023 +2,831억 → 2025 -2,566억</text>

  <!-- Arrow annotations between bars -->
  <text x="370" y="260" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" text-anchor="middle">→</text>
  <text x="680" y="400" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" text-anchor="middle">→</text>

  <!-- Three causes -->
  <text x="600" y="555" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">이익을 지운 3단계</text>

  <rect x="60" y="575" width="370" height="95" rx="8" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="80" y="603" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">1단계: 매출원가율 +12%p</text>
  <text x="80" y="626" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">52.6% → 64.7% (공연 비중 상승)</text>
  <text x="80" y="650" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출총이익률 35.3%로 축소</text>

  <rect x="450" y="575" width="330" height="95" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="470" y="603" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2단계: DOL -4.19</text>
  <text x="470" y="626" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출 +17.5% → 영업이익 -73.2%</text>
  <text x="470" y="650" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">음의 영업레버리지 — 병리 구조</text>

  <rect x="800" y="575" width="340" height="95" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <text x="820" y="603" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">3단계: 손상차손 2,000억</text>
  <text x="820" y="626" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ADOR + 북미 매니지먼트 (4Q)</text>
  <text x="820" y="650" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">영업외손실 → 당기순손실 확정</text>

  <text x="1140" y="705" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>