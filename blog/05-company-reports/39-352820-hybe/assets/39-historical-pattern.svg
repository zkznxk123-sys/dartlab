<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">하이브 5년의 궤적 — 단계별 투자 쏠림과 회수 공백</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">2020 IPO → 레이블 확장 → 북미 인수 → 공백기 집중 비용</text>

  <!-- Timeline -->
  <line x1="100" y1="380" x2="1120" y2="380" stroke="#1e2433" stroke-width="2"/>

  <!-- 2020 -->
  <circle cx="180" cy="380" r="10" fill="#3b82f6"/>
  <text x="180" y="355" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2020</text>
  <rect x="100" y="400" width="160" height="130" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="180" y="425" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">IPO</text>
  <text x="180" y="450" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">매출 7,963억</text>
  <text x="180" y="470" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">OPM 18.3%</text>
  <text x="180" y="500" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">BTS 단일 그룹</text>
  <text x="180" y="517" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">강점 + 의존도</text>

  <!-- 2021-2022 -->
  <circle cx="370" cy="380" r="10" fill="#22c55e"/>
  <text x="370" y="355" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2021~22</text>
  <rect x="290" y="400" width="160" height="130" rx="8" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="370" y="425" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">레이블 확장</text>
  <text x="370" y="450" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">매출 1.3조→1.8조</text>
  <text x="370" y="470" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">OPM 13~15%</text>
  <text x="370" y="500" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">쏘스·플레디스·KOZ</text>
  <text x="370" y="517" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">성공 사례</text>

  <!-- 2023 -->
  <circle cx="560" cy="380" r="12" fill="#fbbf24"/>
  <text x="560" y="355" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2023</text>
  <rect x="480" y="400" width="160" height="130" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="2"/>
  <text x="560" y="425" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">이익 정점</text>
  <text x="560" y="450" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">매출 2.18조</text>
  <text x="560" y="470" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" text-anchor="middle">OPM 13.6% (정점)</text>
  <text x="560" y="500" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">Ithaca 인수 + 뉴진스</text>
  <text x="560" y="517" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">북미 확장 시작</text>

  <!-- 2024 -->
  <circle cx="750" cy="380" r="10" fill="#f59e0b"/>
  <text x="750" y="355" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2024</text>
  <rect x="670" y="400" width="160" height="130" rx="8" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="750" y="425" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">균열 시작</text>
  <text x="750" y="450" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">매출 +3.6%만</text>
  <text x="750" y="470" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">OPM 8.2% (-5.4%p)</text>
  <text x="750" y="500" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">BTS 공백 본격</text>
  <text x="750" y="517" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">ADOR 분쟁 발발</text>

  <!-- 2025 -->
  <circle cx="940" cy="380" r="14" fill="#ef4444"/>
  <text x="940" y="355" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2025</text>
  <rect x="860" y="400" width="160" height="130" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <text x="940" y="425" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">첫 적자</text>
  <text x="940" y="450" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">매출 2.65조 (최대)</text>
  <text x="940" y="470" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" text-anchor="middle">OPM 1.9% 붕괴</text>
  <text x="940" y="500" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" text-anchor="middle">순손실 -2,566억</text>
  <text x="940" y="517" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">손상 + 분쟁 봉합</text>

  <!-- Future: 2026 -->
  <circle cx="1120" cy="380" r="10" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="1120" y="355" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2026?</text>

  <!-- Top context -->
  <text x="180" y="150" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">BTS 정점</text>
  <text x="370" y="150" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">BTS 정점 + 신규 투자</text>
  <text x="560" y="150" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">BTS 군복무 시작</text>
  <text x="750" y="150" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">BTS 완전 공백</text>
  <text x="940" y="150" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">공연 폭발 / 손상 인식</text>

  <!-- Revenue arrows showing upward -->
  <path d="M 180 280 Q 370 240, 560 200 T 940 170" stroke="#22c55e" stroke-width="2" fill="none"/>
  <text x="180" y="210" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">매출 궤적 (우상향)</text>

  <!-- Pattern insight -->
  <rect x="60" y="570" width="1080" height="120" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="600" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">반복된 패턴: 전성기 → 다음 투자 가속 → 회수 공백 누적</text>
  <text x="100" y="628" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">• BTS 전성기(2019~21)에 멀티 레이블 확장에 투자 → 성공</text>
  <text x="100" y="650" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">• 레이블 전성기(2022~23)에 북미 현지화에 투자 → 2025 손상 선언</text>
  <text x="100" y="672" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">• 2024~25 공백기 = 세 단계 투자의 회수 시점이 모두 늦어져 비용만 집중</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 2026-04-16</text>
</svg>