<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">영업이익 493억 → 당기순손실 -2,566억 — 영업외단의 3,400억</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">4분기 북미 매니지먼트 손상차손 2,000억이 적자 전환의 결정타</text>

  <!-- Vertical flow: 영업이익 → 영업외손실 → 세전이익 → 세금 → 순손실 -->

  <!-- 영업이익 493억 (positive, small) -->
  <rect x="440" y="130" width="320" height="70" rx="8" fill="#3b82f6" opacity="0.8"/>
  <text x="600" y="158" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">영업이익</text>
  <text x="600" y="186" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" text-anchor="middle">+493억</text>

  <!-- Arrow down -->
  <line x1="600" y1="205" x2="600" y2="240" stroke="#64748b" stroke-width="2"/>
  <polygon points="595,240 600,252 605,240" fill="#64748b"/>

  <!-- 영업외손실 -3,400억 (big negative) -->
  <rect x="380" y="260" width="440" height="90" rx="8" fill="#ef4444"/>
  <text x="600" y="290" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">영업외손실</text>
  <text x="600" y="325" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">-3,400억</text>
  <text x="600" y="345" fill="#fca5a5" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">영업이익 100% 상쇄 + 초과</text>

  <line x1="600" y1="355" x2="600" y2="390" stroke="#64748b" stroke-width="2"/>
  <polygon points="595,390 600,402 605,390" fill="#64748b"/>

  <!-- 세전이익 -2,900억 -->
  <rect x="400" y="410" width="400" height="70" rx="8" fill="#ef4444" opacity="0.8"/>
  <text x="600" y="438" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">세전이익</text>
  <text x="600" y="466" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" text-anchor="middle">-2,900억</text>

  <line x1="600" y1="485" x2="600" y2="510" stroke="#64748b" stroke-width="2"/>
  <polygon points="595,510 600,522 605,510" fill="#64748b"/>

  <!-- 당기순손실 -2,566억 -->
  <rect x="410" y="530" width="380" height="80" rx="8" fill="#ef4444" stroke="#fca5a5" stroke-width="2"/>
  <text x="600" y="562" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">당기순손실 (창사 최초 적자)</text>
  <text x="600" y="595" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" text-anchor="middle">-2,566억</text>

  <!-- Left side: 영업외손실 내역 -->
  <rect x="60" y="240" width="290" height="220" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="80" y="270" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">영업외손실 3,400억 내역</text>

  <text x="80" y="305" fill="#fca5a5" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">북미 매니지먼트 손상</text>
  <text x="80" y="325" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">약 2,000억</text>
  <text x="80" y="345" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">QC Media · Ithaca 등 영업권</text>

  <text x="80" y="385" fill="#fca5a5" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">ADOR 관련</text>
  <text x="80" y="405" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">풋옵션 255억 + 법률비용</text>
  <text x="80" y="425" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025-11 법원 판결</text>
  <text x="80" y="448" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">지분법 평가손실 추가</text>

  <!-- Right side: 현금은 나가지 않음 -->
  <rect x="850" y="240" width="290" height="220" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="870" y="270" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">현금은 나가지 않았다</text>

  <text x="870" y="305" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">OCF 1,075억 양수</text>
  <text x="870" y="328" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">손상차손은 과거 투자의</text>
  <text x="870" y="345" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">회계적 재평가일 뿐</text>

  <text x="870" y="380" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">하지만 돌아오지 않는다</text>
  <text x="870" y="403" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">영업권 손상 = 복구 불가</text>
  <text x="870" y="420" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2021~22 북미 인수의</text>
  <text x="870" y="437" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">실패 선언</text>

  <text x="1140" y="705" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">외부: SPOTV NEWS 2026-02-13</text>
</svg>