<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">K-Pop 빅4 영업이익률 — 하이브의 문제는 산업이 아니라 개별 전략</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">industry: 미디어·엔터 > 콘텐츠 제작 | peers: JYP, 에스엠, 와이지</text>

  <!-- 2024 comparison section -->
  <text x="600" y="130" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">2024년 K-Pop 빅4 영업이익률</text>

  <!-- JYP - highest -->
  <text x="160" y="185" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="end">JYP Ent.</text>
  <rect x="180" y="170" width="468" height="30" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="658" y="191" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">15.6%</text>
  <text x="720" y="191" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 5,665억</text>

  <!-- SM -->
  <text x="160" y="240" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="end">에스엠</text>
  <rect x="180" y="225" width="279" height="30" rx="4" fill="#3b82f6" opacity="0.75"/>
  <text x="469" y="246" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">9.3%</text>
  <text x="525" y="246" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 9,894억</text>

  <!-- HYBE 2024 -->
  <text x="160" y="295" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="end">하이브 2024</text>
  <rect x="180" y="280" width="246" height="30" rx="4" fill="#f59e0b" opacity="0.85"/>
  <text x="436" y="301" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">8.2%</text>
  <text x="490" y="301" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 22,556억</text>

  <!-- YG -->
  <text x="160" y="350" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="end">와이지엔터</text>
  <rect x="180" y="335" width="66" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="256" y="356" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">2.2%</text>
  <text x="320" y="356" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 3,901억</text>

  <!-- 2025 HYBE — fall below all -->
  <text x="160" y="405" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="end">하이브 2025</text>
  <rect x="180" y="390" width="57" height="30" rx="4" fill="#ef4444" stroke="#fca5a5" stroke-width="2"/>
  <text x="247" y="411" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">1.9%</text>
  <text x="310" y="411" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">업계 최하위 전환</text>

  <!-- Industry pattern boxes -->
  <text x="600" y="475" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">K-Pop 산업의 구조적 4가지</text>

  <rect x="60" y="495" width="275" height="145" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="525" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">1. 아티스트는 감가상각 자산</text>
  <text x="80" y="550" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">전속계약 7년 + 커리어 사이클</text>
  <text x="80" y="572" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">새 그룹 데뷔 투자 불가피</text>
  <text x="80" y="605" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">하이브: BTS 전성기에</text>
  <text x="80" y="623" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">멀티 레이블 투자 가속</text>

  <rect x="355" y="495" width="275" height="145" rx="10" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
  <text x="375" y="525" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2. 공연 수익은 비선형</text>
  <text x="375" y="550" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">도시/회차마다 원가 상이</text>
  <text x="375" y="572" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">지역 믹스가 마진 결정</text>
  <text x="375" y="605" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">북미 스타디움 &gt; 남미/동유럽</text>
  <text x="375" y="623" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">하이브 2025 = 고원가 믹스</text>

  <rect x="650" y="495" width="275" height="145" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="670" y="525" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">3. 글로벌 확장은 마진 희생</text>
  <text x="670" y="550" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">한국 본진 = 원가 안정</text>
  <text x="670" y="572" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">해외 진출 = 초기 비용 폭발</text>
  <text x="670" y="605" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">하이브 2024~25</text>
  <text x="670" y="623" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">확장 비용 집중 시기</text>

  <rect x="945" y="495" width="195" height="145" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="965" y="525" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">4. 경영진 리스크</text>
  <text x="965" y="550" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">프로듀서 이탈 =</text>
  <text x="965" y="568" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">IP 가치 반토막</text>
  <text x="965" y="605" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">ADOR/민희진</text>
  <text x="965" y="623" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">리스크 실현 사례</text>

  <!-- Pattern conclusion -->
  <rect x="60" y="670" width="1080" height="80" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="700" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">하이브의 패턴: "한 그룹의 전성기에 다음 단계 투자를 가속"</text>
  <text x="600" y="728" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">BTS 전성기 → 멀티 레이블 / 레이블 전성기 → 북미 인수. 회수 시점이 겹치지 않아 2024~25에 비용만 집중됐다.</text>

  <text x="1140" y="810" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab industry 엔진 + 각사 공시</text>
</svg>