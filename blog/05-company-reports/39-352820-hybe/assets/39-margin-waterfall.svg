<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">매출 2.65조 → 영업이익 493억 — 9,359억이 판관비로 사라졌다</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">원가율 12%p 상승이 영업이익률 12%p 하락을 거의 그대로 만들었다</text>

  <!-- Waterfall: 매출 → 매출원가 → 매출총이익 → 판관비 → 영업이익 -->
  <!-- Scale: 매출 100% = 800px wide, 모든 막대 height=60 -->

  <!-- 1. 매출 100% -->
  <rect x="200" y="130" width="800" height="60" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="210" y="163" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">매출 26,499억</text>
  <text x="990" y="163" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="end">100%</text>

  <!-- 2. 매출원가 -64.68% (517px) -->
  <rect x="200" y="220" width="517" height="60" rx="4" fill="#ef4444" opacity="0.85"/>
  <text x="210" y="253" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">매출원가 17,140억</text>
  <text x="707" y="253" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="end">-64.68%</text>

  <!-- 3. 매출총이익 35.32% (283px) -->
  <rect x="200" y="310" width="283" height="60" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="210" y="343" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">매출총이익 9,359억</text>
  <text x="473" y="343" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="end">35.32%</text>

  <!-- 4. 판관비 -33.46% (268px) -->
  <rect x="200" y="400" width="268" height="60" rx="4" fill="#f59e0b" opacity="0.85"/>
  <text x="210" y="433" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">판관비 8,866억</text>
  <text x="458" y="433" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="end">-33.46%</text>

  <!-- 5. 영업이익 1.86% (15px) -->
  <rect x="200" y="490" width="15" height="60" rx="2" fill="#3b82f6"/>
  <text x="230" y="523" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">영업이익 493억</text>
  <text x="450" y="523" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">1.86%</text>

  <!-- Comparison with 2022 -->
  <rect x="60" y="580" width="540" height="110" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="80" y="610" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">2022 — 정상 구조</text>
  <text x="80" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출원가율 52.6% · 판관비율 34.1% · OPM 13.3%</text>
  <text x="80" y="658" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">음반·MD 중심 매출 → 원가 절반만 지출</text>
  <text x="80" y="680" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">이익률 안정적, 영업레버리지 양수</text>

  <rect x="620" y="580" width="520" height="110" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <text x="640" y="610" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">2025 — 붕괴 구조</text>
  <text x="640" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출원가율 64.7% · 판관비율 33.5% · OPM 1.9%</text>
  <text x="640" y="658" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">판관비는 유지 · 원가가 12%p 증가 → 이익 12%p 소멸</text>
  <text x="640" y="680" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">공연 비중 확대 + 북미 현지화 비용</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab marginWaterfall 실측</text>
</svg>