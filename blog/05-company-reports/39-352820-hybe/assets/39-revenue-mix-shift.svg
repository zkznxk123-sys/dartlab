<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">매출 구성의 이동 — 공연 비중 20%→38%, 원가율 12%p 상승</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">앨범 마진 65% vs 공연 마진 30% — 무엇을 팔았는지가 마진을 결정했다</text>

  <!-- Left: 2022 mix -->
  <text x="300" y="130" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle">2022 매출 구성</text>
  <text x="300" y="150" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">1조 7,762억 · 원가율 52.6%</text>

  <!-- 2022 stacked bar (horizontal) -->
  <rect x="120" y="180" width="70" height="300" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="90" y="340" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="end">공연</text>
  <text x="90" y="358" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">20%</text>
  <text x="155" y="335" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">공연</text>
  <text x="155" y="350" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">20%</text>

  <rect x="200" y="180" width="100" height="300" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="250" y="335" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">음반/음원</text>
  <text x="250" y="350" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">35%</text>

  <rect x="310" y="180" width="75" height="300" rx="4" fill="#a78bfa" opacity="0.8"/>
  <text x="347" y="335" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">MD</text>
  <text x="347" y="350" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">22%</text>

  <rect x="395" y="180" width="60" height="300" rx="4" fill="#fbbf24" opacity="0.8"/>
  <text x="425" y="335" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" text-anchor="middle">팬클럽</text>
  <text x="425" y="350" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">14%</text>

  <rect x="465" y="180" width="40" height="300" rx="4" fill="#64748b" opacity="0.6"/>
  <text x="485" y="335" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">광고9%</text>

  <!-- Right: 2025 mix -->
  <text x="900" y="130" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">2025 매출 구성</text>
  <text x="900" y="150" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2조 6,498억 · 원가율 64.7%</text>

  <!-- 2025 stacked bar — 공연 비중 대폭 확대 -->
  <rect x="700" y="180" width="142" height="300" rx="4" fill="#ef4444" opacity="0.85"/>
  <text x="772" y="332" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">공연</text>
  <text x="772" y="352" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">38%</text>

  <rect x="850" y="180" width="105" height="300" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="902" y="335" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">음반/음원</text>
  <text x="902" y="350" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">28%</text>

  <rect x="960" y="180" width="64" height="300" rx="4" fill="#a78bfa" opacity="0.8"/>
  <text x="992" y="340" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" text-anchor="middle">MD 17%</text>

  <rect x="1030" y="180" width="42" height="300" rx="4" fill="#fbbf24" opacity="0.8"/>
  <text x="1051" y="340" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" text-anchor="middle">팬11%</text>

  <rect x="1078" y="180" width="22" height="300" rx="4" fill="#64748b" opacity="0.6"/>
  <text x="1089" y="340" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9" text-anchor="middle">광6%</text>

  <!-- 공연 YoY 강조 -->
  <text x="772" y="500" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">+69% YoY</text>
  <text x="772" y="520" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">공연 관객 1,500만명+</text>

  <!-- Segment margin reference -->
  <text x="600" y="570" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">사업별 마진 (업계 평균)</text>

  <rect x="100" y="590" width="250" height="90" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="120" y="615" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">앨범 (음반)</text>
  <text x="120" y="640" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">마진 60~70%</text>
  <text x="120" y="662" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원가율 30~40%</text>

  <rect x="370" y="590" width="250" height="90" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="390" y="615" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">팬클럽/플랫폼</text>
  <text x="390" y="640" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">마진 75~85%</text>
  <text x="390" y="662" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원가율 15~25%</text>

  <rect x="640" y="590" width="250" height="90" rx="8" fill="#1a1f2b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="660" y="615" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">콘서트 (공연)</text>
  <text x="660" y="640" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">마진 25~40%</text>
  <text x="660" y="662" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원가율 60~75%</text>

  <rect x="910" y="590" width="240" height="90" rx="8" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
  <text x="930" y="615" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">MD/굿즈</text>
  <text x="930" y="640" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">마진 45~55%</text>
  <text x="930" y="662" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원가율 45~55%</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">외부: straightnews 2026-02-13, 데모데이</text>
</svg>