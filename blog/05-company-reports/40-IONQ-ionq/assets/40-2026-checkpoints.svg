<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 820">
  <rect width="1080" height="820" fill="#0a0e1a"/>

  <text x="540" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle">2026 투자 체크포인트 5가지</text>
  <text x="540" y="76" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">양자 컴퓨팅이 IR 서사에서 기업 실체로 전환되는지 가를 5가지 지표</text>

  <!-- 5 checkpoints -->
  <rect x="60" y="110" width="480" height="125" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="100" cy="140" r="18" fill="#fbbf24"/>
  <text x="100" y="147" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <text x="140" y="145" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Tempo 출하 진도 (핵심)</text>
  <text x="80" y="178" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">지표: 분기별 systems delivered 수</text>
  <text x="80" y="198" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">+ hardware revenue 비중</text>
  <text x="80" y="220" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">hardware 50%+: Tempo 실체 확인</text>

  <rect x="560" y="110" width="460" height="125" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="600" cy="140" r="18" fill="#3b82f6"/>
  <text x="600" y="147" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <text x="640" y="145" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">OCF 악화 여부</text>
  <text x="580" y="178" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현재: -$283M / 가이던스 매출 +81%</text>
  <text x="580" y="198" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OCF -$200M 이내 개선 → 규모 경제</text>
  <text x="580" y="218" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">악화 → 자본 태우기 가속 경고</text>

  <rect x="60" y="260" width="480" height="125" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <circle cx="100" cy="290" r="18" fill="#ef4444"/>
  <text x="100" y="297" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">3</text>
  <text x="140" y="295" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Warrant liability 잔량</text>
  <text x="80" y="328" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현재: $2B+ 규모</text>
  <text x="80" y="348" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">주가 ±20% → 손익 ±$500M</text>
  <text x="80" y="370" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">참고 지표: 영업이익, Adj EBITDA, OCF</text>

  <rect x="560" y="260" width="460" height="125" rx="10" fill="#1a1f2b" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="600" cy="290" r="18" fill="#a78bfa"/>
  <text x="600" y="297" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">4</text>
  <text x="640" y="295" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">추가 자본 조달 시점</text>
  <text x="580" y="328" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">런웨이: 3.6년 (2028~2029 재조달)</text>
  <text x="580" y="348" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">warrant 행사 시 희석 25~30% 추가</text>
  <text x="580" y="370" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Heights 3차 참여 여부 관찰</text>

  <rect x="60" y="410" width="960" height="125" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <circle cx="100" cy="440" r="18" fill="#22c55e"/>
  <text x="100" y="447" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">5</text>
  <text x="140" y="445" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">경쟁사 대비 매출 격차</text>
  <text x="80" y="478" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현재: IonQ $130M vs D-Wave $24.6M (5.3배) vs Rigetti $7.09M (18배)</text>
  <text x="80" y="500" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">격차 10배+ 확대: 양자 섹터 자금 IonQ 집중 → 대장주 지위 공고</text>
  <text x="80" y="518" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">격차 축소: 경쟁 심화 → 섹터 전체 재평가 리스크</text>

  <!-- 2026 outlook banner -->
  <text x="540" y="580" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">2026 기본 시나리오 3단</text>

  <rect x="60" y="600" width="310" height="160" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="80" y="628" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">A. 낙관</text>
  <text x="80" y="653" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Tempo 10대+ 출하, hardware 60%</text>
  <text x="80" y="680" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">매출 $245M+</text>
  <text x="80" y="700" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">OCF -$200M</text>
  <text x="80" y="725" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">영업손실 축소 궤도 진입</text>
  <text x="80" y="745" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">대장주 지위 고착</text>

  <rect x="385" y="600" width="310" height="160" rx="10" fill="#1a1f2b" stroke="#f59e0b" stroke-width="1"/>
  <text x="405" y="628" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">B. 중립 (가이던스 적중)</text>
  <text x="405" y="653" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Tempo 5~7대, hardware 40%</text>
  <text x="405" y="680" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">매출 $225~245M</text>
  <text x="405" y="700" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">OCF -$280M</text>
  <text x="405" y="725" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">영업손실 -$600M 유지</text>
  <text x="405" y="745" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">IR 서사 유지</text>

  <rect x="710" y="600" width="310" height="160" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="730" y="628" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">C. 보수 (Tempo 지연)</text>
  <text x="730" y="653" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Tempo 2대 이하, 정부만</text>
  <text x="730" y="680" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">매출 $180M 수준</text>
  <text x="730" y="700" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">OCF -$350M</text>
  <text x="730" y="725" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2027 대규모 추가 조달 필요</text>
  <text x="730" y="745" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">섹터 재평가 압력</text>

  <!-- Verdict -->
  <rect x="60" y="780" width="960" height="35" rx="6" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="540" y="803" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle">핵심: "양자 컴퓨팅이 기업이 되는 해"인가, "계속 IR인 해"인가 — Tempo 출하가 판가름</text>
</svg>