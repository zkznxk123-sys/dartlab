<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">자산 12배 + 부채 39배 — Heights Capital $3B 베팅</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">2025년 두 차례 증자 — 양자 업계 역사상 최대 단일 기관 투자</text>

  <!-- Timeline -->
  <line x1="100" y1="200" x2="1120" y2="200" stroke="#1e2433" stroke-width="2"/>

  <!-- 2024 end -->
  <circle cx="180" cy="200" r="8" fill="#3b82f6"/>
  <text x="180" y="180" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">2024 말</text>
  <rect x="110" y="220" width="140" height="60" rx="6" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="180" y="245" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">자산 $554M</text>
  <text x="180" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">현금 $36M</text>

  <!-- 2025-02 CEO -->
  <circle cx="330" cy="200" r="8" fill="#fbbf24"/>
  <text x="330" y="180" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">2025-02</text>
  <rect x="260" y="220" width="140" height="60" rx="6" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="330" y="245" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">CEO 교체</text>
  <text x="330" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">Chapman → de Masi</text>

  <!-- 2025-07 $1B -->
  <circle cx="480" cy="200" r="12" fill="#22c55e"/>
  <text x="480" y="178" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">2025-07</text>
  <rect x="400" y="220" width="160" height="80" rx="6" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="245" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">$1.0B 증자</text>
  <text x="480" y="265" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">14.2M주 @ $55.49</text>
  <text x="480" y="283" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">7년 warrant @ $99.88</text>

  <!-- 2025-09 Oxford Ionics -->
  <circle cx="650" cy="200" r="10" fill="#a78bfa"/>
  <text x="650" y="180" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">2025-09</text>
  <rect x="580" y="220" width="140" height="80" rx="6" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
  <text x="650" y="245" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">Oxford Ionics</text>
  <text x="650" y="265" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">$1.075B 인수</text>
  <text x="650" y="283" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">반도체 칩 이온트랩</text>

  <!-- 2025-10 $2B -->
  <circle cx="830" cy="200" r="14" fill="#22c55e"/>
  <text x="830" y="175" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">2025-10</text>
  <rect x="750" y="220" width="160" height="80" rx="6" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <text x="830" y="245" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">$2.0B 증자</text>
  <text x="830" y="265" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">16.5M주 @ $93</text>
  <text x="830" y="283" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">7년 warrant @ $155</text>

  <!-- 2025-11 KISTI -->
  <circle cx="970" cy="200" r="10" fill="#fbbf24"/>
  <text x="970" y="180" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">2025-11</text>
  <rect x="900" y="220" width="140" height="60" rx="6" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="970" y="245" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle">KISTI 계약</text>
  <text x="970" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">100-qubit Tempo</text>

  <!-- 2025-Q4 -->
  <circle cx="1090" cy="200" r="12" fill="#ef4444"/>
  <text x="1090" y="178" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">2025 말</text>
  <rect x="1020" y="220" width="140" height="60" rx="6" fill="#1a1f2b" stroke="#ef4444" stroke-width="2"/>
  <text x="1090" y="245" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle">자산 $6,570M</text>
  <text x="1090" y="265" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">(+1,086%)</text>

  <!-- Heights Capital analysis -->
  <text x="600" y="360" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">Heights Capital Management — 단독 투자자</text>

  <rect x="60" y="385" width="360" height="160" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="413" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">투자자 정보</text>
  <text x="80" y="440" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Susquehanna International 계열</text>
  <text x="80" y="460" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">PIPE 투자 전문</text>
  <text x="80" y="490" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">3개월 간격 두 차례 연속 베팅</text>
  <text x="80" y="510" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">JPMorgan 단독 주관</text>
  <text x="80" y="535" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">양자 업계 역사상 최대 단일 투자</text>

  <rect x="440" y="385" width="360" height="160" rx="10" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
  <text x="460" y="413" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">구조 — 주식 + warrant 패키지</text>
  <text x="460" y="440" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">보통주 30.7M주 + pre-funded 8.9M</text>
  <text x="460" y="460" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">7년 warrant 79.1M주</text>
  <text x="460" y="490" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">행사가 $99.88, $155</text>
  <text x="460" y="510" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">주가 상승 시 Heights 추가 이익</text>
  <text x="460" y="535" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">주가 하락 시 IonQ 회계 이익 (warrant 평가)</text>

  <rect x="820" y="385" width="320" height="160" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="840" y="413" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">주주 희석 리스크</text>
  <text x="840" y="440" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">warrant 79M주 행사 시</text>
  <text x="840" y="460" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">기존 주주 희석 ~25-30%</text>
  <text x="840" y="490" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">주가 &gt; 행사가 시 자동 희석</text>
  <text x="840" y="510" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">희석 완료는 2032년까지</text>
  <text x="840" y="535" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Beneish M -0.16 경고 원인</text>

  <!-- Runway -->
  <rect x="60" y="580" width="1080" height="110" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="610" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">태우기 여력 — 3.6년</text>
  <text x="100" y="637" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">• 현재 현금: $1,030M / OCF 번율: -$283M/년 = 3.6년 runway</text>
  <text x="100" y="658" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">• 2026 가이던스 $235M 달성 + burn 유지 시 2028~2029 재조달 필요</text>
  <text x="100" y="678" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• Heights 3차 투자 여부 + 타 투자자 참여 여부가 희석 정도 결정</text>
</svg>