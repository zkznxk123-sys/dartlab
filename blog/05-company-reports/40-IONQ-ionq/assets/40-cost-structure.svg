<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">매출 $130M → 영업손실 -$634M — $725M 고정비의 정체</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">매출총이익률 71%는 소프트웨어 수준. 문제는 R&amp;D + SG&amp;A가 매출의 5.58배</text>

  <!-- Waterfall — 매출 → COGS → 매출총이익 → R&D → SGA → 영업이익 -->
  <!-- Scale: 매출 100% = 500px. Each 1% = 5px -->

  <!-- 1. 매출 -->
  <rect x="200" y="130" width="500" height="48" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="210" y="160" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">매출 $130M</text>
  <text x="690" y="160" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="end">100%</text>

  <!-- 2. 매출원가 -->
  <rect x="200" y="200" width="147" height="40" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="210" y="226" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">매출원가 $38M</text>
  <text x="337" y="226" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">-29%</text>

  <!-- 3. 매출총이익 -->
  <rect x="200" y="260" width="353" height="40" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="210" y="286" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">매출총이익 $92M</text>
  <text x="543" y="286" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="end">71%</text>

  <!-- 4. R&D (huge) -->
  <rect x="200" y="320" width="1000" height="48" rx="4" fill="#ef4444"/>
  <text x="210" y="350" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">R&amp;D $350M</text>
  <text x="1190" y="350" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="end">-269%</text>

  <!-- 5. SG&A (even huger) -->
  <rect x="200" y="385" width="1000" height="48" rx="4" fill="#ef4444" opacity="0.85"/>
  <text x="210" y="415" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">SG&amp;A $375M</text>
  <text x="1190" y="415" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="end">-289%</text>

  <!-- 6. 영업이익 -->
  <rect x="200" y="450" width="1000" height="48" rx="4" fill="#991b1b"/>
  <text x="210" y="480" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">영업이익 -$634M</text>
  <text x="1190" y="480" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="end">-487%</text>

  <!-- Comparison -->
  <rect x="60" y="540" width="540" height="150" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="80" y="570" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">매출총이익률 71%는 건강하다</text>
  <text x="80" y="598" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">NVIDIA 약 70% · MSFT 70% · Adobe 88%</text>
  <text x="80" y="620" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">IonQ 단위 경제성은 소프트웨어 기업과 대등</text>
  <text x="80" y="655" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">잠재: 매출 8배 ($1B)에서 영업 BEP</text>
  <text x="80" y="675" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">고정비 $725M ÷ 매출총이익률 71% = 손익분기 $1,020M</text>

  <rect x="620" y="540" width="520" height="150" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="640" y="570" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">고정비 규모가 매출을 압도한다</text>
  <text x="640" y="598" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">R&amp;D/매출 269% (NVIDIA 9%, Apple 7%)</text>
  <text x="640" y="620" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">SG&amp;A/매출 289%</text>
  <text x="640" y="650" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">R&amp;D + SG&amp;A = 매출총이익의 7.9배</text>
  <text x="640" y="672" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">이온트랩 하드웨어 + M&amp;A + SBC + warrant 수수료</text>

  <text x="1140" y="710" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab marginWaterfall + SEC 10-K</text>
</svg>