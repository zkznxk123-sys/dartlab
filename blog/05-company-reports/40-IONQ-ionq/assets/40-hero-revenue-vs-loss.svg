<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">매출 $130M (첫 $100M 돌파) vs 영업손실 $634M — 양자 회사의 역설</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">4년 565배 성장 + 영업손실 43배 확대 + $3B 자본 조달 + M&amp;A 6건</text>

  <!-- Left: Revenue growth -->
  <text x="260" y="130" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">매출 (사상 최대)</text>
  <rect x="130" y="150" width="260" height="300" rx="8" fill="#22c55e" opacity="0.9"/>
  <text x="260" y="270" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="700" text-anchor="middle">$130M</text>
  <text x="260" y="310" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle">+202% YoY</text>
  <text x="260" y="340" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">4년 565배 성장</text>
  <text x="260" y="365" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">첫 공개 양자 $100M 돌파</text>

  <!-- Center: Arrow -->
  <text x="480" y="300" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" text-anchor="middle">→</text>

  <!-- Right: Operating loss -->
  <text x="700" y="130" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">영업손실 (사상 최악)</text>
  <rect x="550" y="150" width="300" height="300" rx="8" fill="#ef4444"/>
  <text x="700" y="270" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" text-anchor="middle">-$634M</text>
  <text x="700" y="310" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle">매출의 4.87배</text>
  <text x="700" y="340" fill="#fca5a5" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2021 -$14.8M → 43배 악화</text>
  <text x="700" y="365" fill="#fca5a5" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">OPM -487.4%</text>

  <!-- Right box 2: Quarter net income rollercoaster -->
  <text x="1020" y="130" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">분기 순이익 요동</text>
  <rect x="900" y="150" width="240" height="300" rx="8" fill="#1a1f2b" stroke="#f59e0b" stroke-width="2"/>
  <text x="920" y="185" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">Q1 +$155M</text>
  <text x="920" y="215" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">Q2 -$373M</text>
  <text x="920" y="245" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Q3 -$1,056M</text>
  <text x="920" y="275" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Q4 +$753M</text>
  <line x1="920" y1="295" x2="1120" y2="295" stroke="#1e2433" stroke-width="1"/>
  <text x="920" y="320" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">요동 폭 $1,809M</text>
  <text x="920" y="342" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">(매출의 14배)</text>
  <text x="920" y="375" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">원인: Warrant 공정가치</text>
  <text x="920" y="395" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매 분기 재평가</text>
  <text x="920" y="425" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">주가와 반비례</text>

  <!-- Three events bar -->
  <text x="600" y="505" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">2025년에 동시 진행된 3가지</text>

  <rect x="60" y="525" width="370" height="145" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="555" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">자본 조달 $3B</text>
  <text x="80" y="580" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">7월 $1B + 10월 $2B 증자</text>
  <text x="80" y="602" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Heights Capital 단독 투자</text>
  <text x="80" y="630" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">자산 $554M → $6,570M (12배)</text>
  <text x="80" y="650" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">부채 +3,919% (warrant 포함)</text>

  <rect x="450" y="525" width="320" height="145" rx="8" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
  <text x="470" y="555" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">M&amp;A 6건</text>
  <text x="470" y="580" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Oxford Ionics $1.075B (9월)</text>
  <text x="470" y="602" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Vector Atomic, Capella Space</text>
  <text x="470" y="622" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Lightsynq, Qubitekk, ID Quantique</text>
  <text x="470" y="650" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">양자 스택 수직계열화 베팅</text>

  <rect x="790" y="525" width="350" height="145" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="810" y="555" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">CEO 교체 + 한국 계약</text>
  <text x="810" y="580" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">P. Chapman → N. de Masi (2월)</text>
  <text x="810" y="602" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">기술 중심 → M&amp;A/IR 중심</text>
  <text x="810" y="625" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">KISTI 100-qubit 공급 확정</text>
  <text x="810" y="652" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">DARPA HARQ 선정 (2026-04)</text>

  <text x="1140" y="705" fill="#334155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">dartlab 실측 + IonQ IR 2026-04-16</text>
</svg>