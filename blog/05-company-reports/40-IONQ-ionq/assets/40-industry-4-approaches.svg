<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">양자 컴퓨팅 4대 기술 — 이온트랩(IonQ)의 자리</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">충실도 vs 확장성 — Oxford Ionics 인수는 이온트랩의 확장성 병목을 풀려는 베팅</text>

  <!-- 4 approach cards -->
  <rect x="60" y="120" width="270" height="340" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="2"/>
  <text x="80" y="150" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">이온트랩 (IonQ ←)</text>
  <text x="80" y="178" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">대표: IonQ, Quantinuum</text>

  <text x="80" y="215" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">장점</text>
  <text x="80" y="237" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 2-qubit fidelity 99.99%</text>
  <text x="80" y="255" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 세계 최고 충실도</text>
  <text x="80" y="273" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 상온에서 안정적</text>

  <text x="80" y="305" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">단점</text>
  <text x="80" y="327" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 게이트 속도 느림</text>
  <text x="80" y="345" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• qubit 수 확장 어려움</text>

  <text x="80" y="380" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현재 IonQ: #AQ 64, Tempo 2026</text>
  <text x="80" y="400" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">목표 2030: 2M physical / 80K logical</text>
  <text x="80" y="430" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">Oxford Ionics 인수로 확장 병목 해소</text>

  <!-- 초전도 -->
  <rect x="350" y="120" width="270" height="340" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="370" y="150" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">초전도 (최대 경쟁)</text>
  <text x="370" y="178" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">대표: IBM, Google, Rigetti</text>

  <text x="370" y="215" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">장점</text>
  <text x="370" y="237" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• qubit 수 확장 (IBM Condor 1,121)</text>
  <text x="370" y="255" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 게이트 속도 빠름</text>
  <text x="370" y="273" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 반도체 공정 재활용</text>

  <text x="370" y="305" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">단점</text>
  <text x="370" y="327" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 노이즈 심함</text>
  <text x="370" y="345" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 극저온 (15mK) 필요</text>

  <text x="370" y="380" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Google Willow 105 qubit (2024-12)</text>
  <text x="370" y="398" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Google Quantum Echoes (2025-10)</text>
  <text x="370" y="416" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">에러 threshold 하회 achieved</text>
  <text x="370" y="437" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">IBM 2026 advantage / 2029 FT 선언</text>

  <!-- 중성원자 -->
  <rect x="640" y="120" width="270" height="340" rx="10" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="660" y="150" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">중성원자 (신흥)</text>
  <text x="660" y="178" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">대표: Atom Computing, QuEra</text>

  <text x="660" y="215" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">장점</text>
  <text x="660" y="237" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 극한 확장성 (3,000 qubit 배열)</text>
  <text x="660" y="255" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 에러 보정 선두</text>
  <text x="660" y="273" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 광학 트랩 간단</text>

  <text x="660" y="305" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">단점</text>
  <text x="660" y="327" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 상대적 신기술</text>
  <text x="660" y="345" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 상용화 초기</text>

  <text x="660" y="380" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">QuEra 3,000 qubit 연속 운용</text>
  <text x="660" y="398" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Nature fault tolerance 논문</text>
  <text x="660" y="416" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">QuEra $230M 조달 (2025-02)</text>
  <text x="660" y="437" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">Atom Magne: 2027 50 logical</text>

  <!-- 광자 -->
  <rect x="930" y="120" width="210" height="340" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="950" y="150" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">광자</text>
  <text x="950" y="178" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">대표: PsiQuantum, Xanadu</text>

  <text x="950" y="215" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">장점</text>
  <text x="950" y="237" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 상온 동작</text>
  <text x="950" y="255" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 확장 잠재력</text>

  <text x="950" y="285" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">단점</text>
  <text x="950" y="307" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 기술 미성숙</text>
  <text x="950" y="325" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">• 큰 장비 필요</text>

  <text x="950" y="370" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">PsiQuantum $1.3B+ 조달</text>
  <text x="950" y="388" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">GlobalFoundries 양자칩 양산</text>
  <text x="950" y="406" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">2026 IPO 예상</text>

  <!-- Revenue comparison -->
  <text x="600" y="510" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">공개 양자 컴퓨팅 상장사 2025 매출 비교</text>

  <!-- Bar chart -->
  <!-- IONQ: $130M (widest) -->
  <text x="180" y="555" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="end">IonQ</text>
  <rect x="200" y="540" width="800" height="30" rx="4" fill="#22c55e"/>
  <text x="1010" y="561" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$130.0M</text>

  <!-- QBTS: $24.6M (~5x smaller) -->
  <text x="180" y="595" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">D-Wave</text>
  <rect x="200" y="580" width="151" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="360" y="601" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">$24.6M</text>

  <!-- RGTI: $7.09M -->
  <text x="180" y="635" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">Rigetti</text>
  <rect x="200" y="620" width="44" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="255" y="641" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$7.09M</text>
  <text x="320" y="641" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">(매출 -34%)</text>

  <!-- QUBT: $0.68M -->
  <text x="180" y="675" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="end">QUBT</text>
  <rect x="200" y="660" width="5" height="30" rx="2" fill="#64748b"/>
  <text x="215" y="681" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$0.68M</text>

  <!-- Conclusion -->
  <rect x="60" y="720" width="1080" height="80" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="750" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">IonQ가 D-Wave의 5.3배 · Rigetti의 18배 · QUBT의 191배 매출</text>
  <text x="600" y="775" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">양자 컴퓨팅 상장사 "대장주" 지위 확정. 하지만 매출 절대 규모는 여전히 중소기업 수준.</text>
</svg>