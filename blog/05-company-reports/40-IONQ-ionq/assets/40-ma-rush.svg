<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">2025년 M&amp;A 6건 — 양자 스택 수직계열화 베팅</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">de Masi 체제 9개월간의 공격적 확장 — 가장 큰 건 Oxford Ionics $1.075B</text>

  <!-- 6 M&A cards in 2 rows of 3 -->
  <!-- Top row -->
  <rect x="60" y="130" width="350" height="180" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <text x="80" y="160" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">1. Oxford Ionics (최대)</text>
  <text x="80" y="185" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">$1.075B</text>
  <text x="80" y="208" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025-09-17 완료</text>
  <text x="80" y="232" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영국 옥스퍼드 대학 스핀오프</text>
  <text x="80" y="252" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">반도체 칩 기반 이온트랩</text>
  <text x="80" y="275" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">qubit 확장 병목 해소 목적</text>
  <text x="80" y="295" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">주식 $1.065B + 현금 $10M</text>

  <rect x="430" y="130" width="350" height="180" rx="10" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
  <text x="450" y="160" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">2. Vector Atomic</text>
  <text x="450" y="185" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">비공개</text>
  <text x="450" y="208" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025-10-07 완료</text>
  <text x="450" y="232" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">정밀 원자시계</text>
  <text x="450" y="252" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">양자 센싱 / DoD X-37B</text>
  <text x="450" y="275" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">방산 양자 센싱 시장 진출</text>

  <rect x="800" y="130" width="340" height="180" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="820" y="160" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">3. Capella Space</text>
  <text x="820" y="185" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">비공개</text>
  <text x="820" y="208" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025-07-15 완료</text>
  <text x="820" y="232" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">SAR 위성 기업</text>
  <text x="820" y="252" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">우주 기반 QKD 네트워크</text>
  <text x="820" y="275" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">양자 통신 인프라 확보</text>

  <!-- Bottom row -->
  <rect x="60" y="335" width="350" height="165" rx="10" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1"/>
  <text x="80" y="365" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">4. Lightsynq Technologies</text>
  <text x="80" y="390" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">비공개</text>
  <text x="80" y="413" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025-07 완료</text>
  <text x="80" y="437" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">하버드 스핀오프</text>
  <text x="80" y="457" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">quantum memory / repeater</text>
  <text x="80" y="485" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">장거리 양자 네트워킹</text>

  <rect x="430" y="335" width="350" height="165" rx="10" fill="#1a1f2b" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="365" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">5. Qubitekk</text>
  <text x="450" y="390" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">비공개</text>
  <text x="450" y="413" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025 완료</text>
  <text x="450" y="437" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">quantum networking 솔루션</text>
  <text x="450" y="457" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Entangled Photon Source</text>
  <text x="450" y="485" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">quantum-safe 네트워크</text>

  <rect x="800" y="335" width="340" height="165" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="820" y="365" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">6. ID Quantique (지분 과반)</text>
  <text x="820" y="390" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">비공개</text>
  <text x="820" y="413" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025 완료</text>
  <text x="820" y="437" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">스위스 quantum-safe</text>
  <text x="820" y="457" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">네트워크 솔루션</text>
  <text x="820" y="485" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600">유럽 거점 확보</text>

  <!-- Strategic framework -->
  <text x="600" y="545" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">6건의 공통 전략: 양자 컴퓨팅 + 네트워킹 + 센싱 수직계열화</text>

  <rect x="60" y="570" width="350" height="120" rx="10" fill="#1a1f2b" stroke="#22c55e" stroke-width="1"/>
  <text x="80" y="598" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">양자 컴퓨팅 코어</text>
  <text x="80" y="623" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Oxford Ionics</text>
  <text x="80" y="648" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">반도체 칩 이온트랩 제조</text>
  <text x="80" y="670" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">qubit 스케일링 병목 해소</text>

  <rect x="430" y="570" width="350" height="120" rx="10" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="450" y="598" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">양자 네트워킹 / 통신</text>
  <text x="450" y="623" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Lightsynq + Qubitekk + ID Q + Capella</text>
  <text x="450" y="648" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">quantum-safe 암호화</text>
  <text x="450" y="670" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">우주·지상 QKD 망 구축</text>

  <rect x="800" y="570" width="340" height="120" rx="10" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
  <text x="820" y="598" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">양자 센싱 / 정밀 측정</text>
  <text x="820" y="623" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Vector Atomic</text>
  <text x="820" y="648" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원자시계, GPS 대체 센싱</text>
  <text x="820" y="670" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">DoD·방산 시장 진출</text>
</svg>