<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">매출 4년 565배 성장 — $0.23M → $130M</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">3축 성장: 클라우드 접근 → 정부·방산 계약 → 시스템 직접 판매 (KISTI, DoD)</text>

  <!-- Chart area -->
  <line x1="100" y1="580" x2="1120" y2="580" stroke="#1e2433" stroke-width="1"/>
  <line x1="100" y1="140" x2="100" y2="580" stroke="#1e2433" stroke-width="1"/>

  <!-- Y axis labels ($0~$130M, log-like scale) -->
  <text x="90" y="145" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$130M</text>
  <text x="90" y="245" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$100M</text>
  <text x="90" y="345" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$65M</text>
  <text x="90" y="445" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$30M</text>
  <text x="90" y="580" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">$0</text>

  <!-- Bars: 2021=0.23, 2022=11.13, 2023=22.05, 2024=43.07, 2025=130.02 -->
  <!-- Scale: $130M = 140 top, $0 = 580 bottom. 440px for $130M. 1M = 3.38px -->

  <!-- 2021: 0.23M = 0.78px -->
  <rect x="180" y="579" width="140" height="1.5" fill="#3b82f6" opacity="0.5"/>
  <text x="250" y="570" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">$0.23M</text>
  <text x="250" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2021</text>

  <!-- 2022: 11.13M = 37.6px -->
  <rect x="360" y="542" width="140" height="38" fill="#3b82f6" opacity="0.6"/>
  <text x="430" y="533" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">$11.1M</text>
  <text x="430" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2022</text>

  <!-- 2023: 22.05M = 74.5px -->
  <rect x="540" y="505" width="140" height="75" fill="#3b82f6" opacity="0.75"/>
  <text x="610" y="495" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">$22.1M</text>
  <text x="610" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2023</text>

  <!-- 2024: 43.07M = 145.6px -->
  <rect x="720" y="434" width="140" height="146" fill="#3b82f6" opacity="0.85"/>
  <text x="790" y="425" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle">$43.1M</text>
  <text x="790" y="600" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">2024</text>

  <!-- 2025: 130.02M = 440px, top at y=140 -->
  <rect x="900" y="140" width="140" height="440" fill="#22c55e"/>
  <text x="970" y="130" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">$130.0M</text>
  <text x="970" y="600" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">2025</text>

  <!-- Growth rate callouts -->
  <text x="430" y="515" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" text-anchor="middle">+4,752%</text>
  <text x="610" y="477" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" text-anchor="middle">+98%</text>
  <text x="790" y="406" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" text-anchor="middle">+95%</text>
  <text x="970" y="112" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">+202%</text>

  <!-- 3축 boxes -->
  <rect x="60" y="625" width="360" height="80" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
  <text x="80" y="650" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">1. 클라우드 접근 (2021~)</text>
  <text x="80" y="673" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">AWS Braket, Azure Quantum, GCP Engine</text>
  <text x="80" y="692" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">IonQ Aria/Forte 시간당 과금</text>

  <rect x="440" y="625" width="360" height="80" rx="8" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
  <text x="460" y="650" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2. 정부·방산 계약 (2023~)</text>
  <text x="460" y="673" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">AFRL, DoD, ARLIS, DARPA HARQ</text>
  <text x="460" y="692" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025년 비중 30%+ 추정</text>

  <rect x="820" y="625" width="320" height="80" rx="8" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
  <text x="840" y="650" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">3. 시스템 직판 (2025 폭발)</text>
  <text x="840" y="673" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Tempo 100-qubit KISTI, DoD</text>
  <text x="840" y="692" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">Q4 2025 $61.9M (YoY +429%)</text>
</svg>