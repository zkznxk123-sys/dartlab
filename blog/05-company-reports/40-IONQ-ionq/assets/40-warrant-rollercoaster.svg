<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" text-anchor="middle">분기 순이익 ±10억 달러 요동 — Warrant 회계의 롤러코스터</text>
  <text x="600" y="78" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">Q4 +$753M은 $949.6M 비현금 평가이익이 만든 회계 노이즈. 실제 현금 $283M 태움.</text>

  <!-- Zero line -->
  <line x1="100" y1="340" x2="1100" y2="340" stroke="#64748b" stroke-width="2"/>
  <text x="1110" y="344" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">$0</text>

  <!-- Scale: +$800M at top (y=120), -$1200M at bottom (y=580). Range 2000M = 460px. Each $100M = 23px -->
  <text x="95" y="125" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">+$800M</text>
  <text x="95" y="225" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">+$400M</text>
  <text x="95" y="455" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">-$500M</text>
  <text x="95" y="585" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="end">-$1,100M</text>

  <!-- Gridlines -->
  <line x1="100" y1="120" x2="1100" y2="120" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="100" y1="220" x2="1100" y2="220" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="100" y1="450" x2="1100" y2="450" stroke="#1e2433" stroke-width="0.5"/>
  <line x1="100" y1="580" x2="1100" y2="580" stroke="#1e2433" stroke-width="0.5"/>

  <!-- Q1 2025: +$155M (+155 * 0.23 = 35.65px up from zero) -->
  <rect x="200" y="304" width="150" height="36" fill="#22c55e" opacity="0.8"/>
  <text x="275" y="290" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">+$155M</text>
  <text x="275" y="610" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">Q1 2025</text>

  <!-- Q2 2025: -$373M (373 * 0.23 = 85.79px down) -->
  <rect x="400" y="340" width="150" height="86" fill="#ef4444" opacity="0.85"/>
  <text x="475" y="446" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle">-$373M</text>
  <text x="475" y="610" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">Q2 2025</text>

  <!-- Q3 2025: -$1,056M (1056*0.23 = 242.88px — limited to chart bottom) -->
  <rect x="600" y="340" width="150" height="243" fill="#ef4444"/>
  <text x="675" y="603" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">-$1,056M</text>
  <text x="675" y="630" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">Q3 2025</text>

  <!-- Q4 2025: +$753M (753*0.23 = 173px up) -->
  <rect x="800" y="167" width="150" height="173" fill="#22c55e"/>
  <text x="875" y="157" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle">+$753M</text>
  <text x="875" y="610" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" text-anchor="middle">Q4 2025</text>

  <!-- Annotations -->
  <rect x="540" y="130" width="330" height="80" rx="8" fill="#1a1f2b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="560" y="158" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">Q4의 비밀: 비현금 $949.6M</text>
  <text x="560" y="180" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Warrant liabilities 공정가치 변동</text>
  <text x="560" y="200" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">주가 하락 → 부채 감소 → 회계 이익</text>

  <!-- Bottom section: 진짜 지표 3가지 -->
  <text x="600" y="665" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">실질 수익성은 이 3가지로 봐야 — 순이익은 노이즈</text>

  <!-- Bottom 3 boxes, moved up slightly so they don't collide with quarter labels -->
  <g transform="translate(0, -50)">
    <rect x="60" y="700" width="350" height="75" rx="8" fill="#1a1f2b" stroke="#3b82f6" stroke-width="1"/>
    <text x="80" y="725" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">1. 영업이익</text>
    <text x="80" y="748" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">-$634M</text>
    <text x="180" y="748" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">핵심 지표</text>
    <text x="80" y="768" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">warrant 영향 제외</text>

    <rect x="430" y="700" width="350" height="75" rx="8" fill="#1a1f2b" stroke="#a78bfa" stroke-width="1"/>
    <text x="450" y="725" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2. Adjusted EBITDA</text>
    <text x="450" y="748" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">-$186.8M</text>
    <text x="580" y="748" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">IonQ 자체 공시</text>
    <text x="450" y="768" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">SBC + warrant 제외</text>

    <rect x="800" y="700" width="340" height="75" rx="8" fill="#1a1f2b" stroke="#22c55e" stroke-width="2"/>
    <text x="820" y="725" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">3. 영업활동현금흐름 (가장 실질적)</text>
    <text x="820" y="748" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">-$283M</text>
    <text x="920" y="748" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">실제 현금 번율</text>
    <text x="820" y="768" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">이것이 진짜 "얼마 태웠나"</text>
  </g>
</svg>