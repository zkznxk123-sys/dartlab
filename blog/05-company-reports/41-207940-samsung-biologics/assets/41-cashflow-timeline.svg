  <!-- Key insight box -->
  <rect x="110" y="610" width="980" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="637" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#f1f5f9">2023년 전환점: OCF가 CAPEX를 안정적으로 초과하기 시작. OCF 마진 49% — 매출의 절반이 현금으로 들어온다.</text>
  <text x="600" y="657" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">영업활동현금흐름/순이익 = 126% — 이익이 진짜 현금이다</text>

  <text x="1100" y="700" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">dartlab 실측</text>
