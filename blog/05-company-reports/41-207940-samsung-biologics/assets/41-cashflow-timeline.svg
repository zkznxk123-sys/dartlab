  <text x="600" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">OCF vs CAPEX vs FCF (억원) — 2023년이 전환점</text>

  <!-- Phase labels -->
  <rect x="110" y="100" width="200" height="30" rx="6" fill="#ef4444" opacity="0.2"/>
