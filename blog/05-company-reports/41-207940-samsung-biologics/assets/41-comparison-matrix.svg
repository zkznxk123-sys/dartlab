<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="600" y="50" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">바이오에서 돈 버는 세 가지 방법</text>
  <text x="600" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">삼성바이오로직스 vs 셀트리온 vs 알테오젠 — 같은 산업, 정반대 구조</text>

  <!-- Column headers -->
  <rect x="280" y="110" width="250" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="405" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#3b82f6">삼성바이오로직스</text>

  <rect x="560" y="110" width="250" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="685" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#8b5cf6">셀트리온</text>

  <rect x="840" y="110" width="250" height="50" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <text x="965" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#ec4899">알테오젠</text>

  <!-- Row labels + data -->
  <!-- Row 1: 사업 모델 -->
  <text x="150" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">사업 모델</text>
  <rect x="280" y="185" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="405" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">CMO (위탁생산)</text>
  <rect x="560" y="185" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="685" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">자체 바이오시밀러</text>
  <rect x="840" y="185" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="965" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">플랫폼 라이선스</text>

  <!-- Row 2: 매출 -->
  <text x="150" y="270" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">매출</text>
  <rect x="280" y="245" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="405" y="270" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">4.56조</text>
  <rect x="560" y="245" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="685" y="270" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">4.16조</text>
  <rect x="840" y="245" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="965" y="270" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">0.33조</text>

  <!-- Row 3: OPM -->
  <text x="150" y="330" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">영업이익률</text>
  <rect x="280" y="305" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="405" y="330" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#22c55e">45%</text>
  <rect x="560" y="305" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="685" y="330" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#22c55e">28%</text>
  <rect x="840" y="305" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="965" y="330" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#22c55e">49%</text>

  <!-- Row 4: 수익 원천 -->
  <text x="150" y="390" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">수익 원천</text>
  <rect x="280" y="365" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="405" y="390" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">생산능력 (배양 용량)</text>
  <rect x="560" y="365" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="685" y="390" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">약 자체 (특허 + 허가)</text>
  <rect x="840" y="365" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="965" y="390" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">기술료 (ALT-B4 플랫폼)</text>

  <!-- Row 5: 핵심 리스크 -->
  <text x="150" y="450" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">핵심 리스크</text>
  <rect x="280" y="425" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="405" y="450" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f59e0b">수주 파이프라인 의존</text>
  <rect x="560" y="425" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="685" y="450" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f59e0b">특허 만료 + 제네릭</text>
  <rect x="840" y="425" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="965" y="450" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f59e0b">단일 거래 집중</text>

  <!-- Row 6: 신용등급 -->
  <text x="150" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">dartlab 신용</text>
  <rect x="280" y="485" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="405" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#22c55e">dCR-AA-</text>
  <rect x="560" y="485" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="685" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#22c55e">dCR-AA+</text>
  <rect x="840" y="485" width="250" height="40" rx="6" fill="#1e293b"/>
  <text x="965" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#22c55e">dCR-AA</text>

  <!-- Row 7: 이야기 유형 -->
  <text x="150" y="570" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">이야기 유형</text>
  <rect x="280" y="545" width="250" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="405" y="570" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#3b82f6">구조의 발견</text>
  <rect x="560" y="545" width="250" height="40" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="685" y="570" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">인물 서사</text>
  <rect x="840" y="545" width="250" height="40" rx="6" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <text x="965" y="570" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ec4899">인내의 회수</text>

  <!-- Bottom insight -->
  <rect x="100" y="620" width="1000" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="650" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#fbbf24">같은 바이오, 세 가지 수익 구조</text>
  <text x="600" y="680" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">CMO = 생산능력 판매 | 바이오시밀러 = 약 자체 판매 | 플랫폼 = 기술 라이선스 — 재무제표가 전혀 다르다</text>

  <text x="1100" y="800" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">dartlab 실측 2026-04-17</text>
</svg>