<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="540" y="50" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">투자 → 가동 → 마진 상승 → 현금 축적 → 재투자</text>
  <text x="540" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">1~4공장에서 3번 반복된 선순환 사이클</text>

  <!-- Cycle: 5 nodes in circle -->
  <!-- Node 1: 공장 건설 (top) -->
  <circle cx="540" cy="180" r="60" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="540" y="175" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#fbbf24">공장 건설</text>
  <text x="540" y="195" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">CAPEX 급증</text>

  <!-- Node 2: 가동 개시 (right) -->
  <circle cx="800" cy="340" r="60" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="800" y="335" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#3b82f6">가동 개시</text>
  <text x="800" y="355" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">CIP→유형자산</text>

  <!-- Node 3: 마진 상승 (bottom-right) -->
  <circle cx="700" cy="540" r="60" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="535" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#22c55e">마진 상승</text>
  <text x="700" y="555" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">고정비 분산</text>

  <!-- Node 4: 현금 축적 (bottom-left) -->
  <circle cx="380" cy="540" r="60" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="380" y="535" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#8b5cf6">현금 축적</text>
  <text x="380" y="555" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">이익잉여금 ↑</text>

  <!-- Node 5: 재투자 (left) -->
  <circle cx="280" cy="340" r="60" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <text x="280" y="335" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#ec4899">재투자</text>
  <text x="280" y="355" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">차입 최소화</text>

  <!-- Arrows between nodes -->
  <path d="M590 210 Q700 240 770 300" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M820 400 Q810 470 740 510" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M640 550 Q540 570 440 550" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M330 510 Q290 470 280 400" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M310 300 Q360 240 490 190" fill="none" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f1f5f9"/>
    </marker>
  </defs>

  <!-- Cycle instances at bottom -->
  <rect x="80" y="640" width="280" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="220" y="660" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#f59e0b">1차 사이클 (2013~2017)</text>
  <text x="220" y="678" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">1·2공장 → 매출 0.46조</text>

  <rect x="400" y="640" width="280" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="540" y="660" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#f59e0b">2차 사이클 (2018~2020)</text>
  <text x="540" y="678" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">3공장 → 매출 1.16조</text>

  <rect x="720" y="640" width="280" height="50" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="860" y="660" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#22c55e">3차 사이클 (2021~2025)</text>
  <text x="860" y="678" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">4공장 → 매출 4.56조</text>

  <text x="980" y="710" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">dartlab 실측</text>
</svg>