<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="50" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">매출원가율 72% → 45% — 마진이 올라가는 메커니즘</text>
  <text x="600" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">고정비(인건비+감가상각) 52% — 가동률이 올라가면 단위원가가 내려간다</text>

  <!-- Y축 -->
  <line x1="100" y1="120" x2="100" y2="600" stroke="#334155" stroke-width="1"/>
  <text x="90" y="140" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">80%</text>
  <text x="90" y="260" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">60%</text>
  <text x="90" y="380" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">40%</text>
  <text x="90" y="500" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">20%</text>
  <text x="90" y="600" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">0%</text>

  <!-- 매출원가율 bars (높을수록 위) -->
  <!-- 2017: 72% -->
  <rect x="140" y="168" width="80" height="432" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="180" y="155" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#ef4444">72.0%</text>
  <text x="180" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2017</text>

  <!-- 2018: 72.1% -->
  <rect x="250" y="169" width="80" height="432" rx="4" fill="#ef4444" opacity="0.75"/>
  <text x="290" y="155" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#ef4444">72.1%</text>
  <text x="290" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2018</text>

  <!-- 2019: 72.9% -->
  <rect x="360" y="163" width="80" height="438" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="400" y="155" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#ef4444">72.9%</text>
  <text x="400" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2019</text>

  <!-- 2020: 63.8% -->
  <rect x="470" y="218" width="80" height="382" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="510" y="205" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#f59e0b">63.8%</text>
  <text x="510" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2020</text>

  <!-- 2021: 53.5% -->
  <rect x="580" y="280" width="80" height="320" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="620" y="267" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#f59e0b">53.5%</text>
  <text x="620" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2021</text>

  <!-- 2022: 51.0% -->
  <rect x="690" y="295" width="80" height="305" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="730" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#22c55e">51.0%</text>
  <text x="730" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2022</text>

  <!-- 2023: 51.2% -->
  <rect x="800" y="293" width="80" height="307" rx="4" fill="#22c55e" opacity="0.65"/>
  <text x="840" y="280" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#22c55e">51.2%</text>
  <text x="840" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2023</text>

  <!-- 2024: 49.7% -->
  <rect x="910" y="302" width="80" height="298" rx="4" fill="#22c55e" opacity="0.75"/>
  <text x="950" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#22c55e">49.7%</text>
  <text x="950" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2024</text>

  <!-- 2025: 44.8% -->
  <rect x="1020" y="332" width="80" height="268" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="1060" y="319" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#22c55e">44.8%</text>
  <text x="1060" y="620" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#f1f5f9">2025</text>

  <!-- Annotation arrow -->
  <line x1="200" y1="170" x2="1040" y2="330" stroke="#fbbf24" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="700" y="230" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#fbbf24">-27pp (8년)</text>

  <!-- Legend -->
  <rect x="140" y="660" width="16" height="16" rx="3" fill="#ef4444"/>
  <text x="165" y="674" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">적자기 (1-2공장)</text>
  <rect x="340" y="660" width="16" height="16" rx="3" fill="#f59e0b"/>
  <text x="365" y="674" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">전환기 (3공장)</text>
  <rect x="540" y="660" width="16" height="16" rx="3" fill="#22c55e"/>
  <text x="565" y="674" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">성숙기 (4공장)</text>

  <text x="1100" y="700" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">dartlab 실측</text>
</svg>