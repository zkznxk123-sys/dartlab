<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640">
  <rect width="960" height="640" fill="#0a0e1a"/>
  <text x="480" y="45" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">2026년에 봐야 할 5가지 체크포인트</text>
  <text x="480" y="70" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">"공장을 지으면 마진이 올라간다" — 이 문장이 계속 맞는지 확인하는 법</text>

  <!-- Card 1 -->
  <rect x="40" y="100" width="420" height="110" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <circle cx="80" cy="155" r="22" fill="#22c55e" opacity="0.2"/>
  <text x="80" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#22c55e">1</text>
  <text x="120" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">4공장 가동률 추이</text>
  <text x="120" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">가동률 ↑ 인데 OPM ↓ 이면 → 천장 신호</text>
  <text x="120" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">가동률 ↑ 이고 OPM ↑ 이면 → 선순환 지속</text>

  <!-- Card 2 -->
  <rect x="500" y="100" width="420" height="110" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="540" cy="155" r="22" fill="#3b82f6" opacity="0.2"/>
  <text x="540" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#3b82f6">2</text>
  <text x="580" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">신규 수주 파이프라인</text>
  <text x="580" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">ADC, mRNA 등 차세대 모달리티 수주 비중</text>
  <text x="580" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">항체 단일 의존 → 다변화 여부</text>

  <!-- Card 3 -->
  <rect x="40" y="240" width="420" height="110" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <circle cx="80" cy="295" r="22" fill="#fbbf24" opacity="0.2"/>
  <text x="80" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#fbbf24">3</text>
  <text x="120" y="280" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">CAPEX/매출 비율</text>
  <text x="120" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">현재 32.4% — 30% 이하 안정 시 성숙기 확인</text>
  <text x="120" y="322" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">5공장 투자 결정 시 다시 상승 예상</text>

  <!-- Card 4 -->
  <rect x="500" y="240" width="420" height="110" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="540" cy="295" r="22" fill="#8b5cf6" opacity="0.2"/>
  <text x="540" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#8b5cf6">4</text>
  <text x="580" y="280" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">에피스 분리 후 연결 실적</text>
  <text x="580" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">순수 CMO의 마진 지속성 검증</text>
  <text x="580" y="322" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">2025Q4 연결범위 변동 영향 추적</text>

  <!-- Card 5 -->
  <rect x="270" y="380" width="420" height="110" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <circle cx="310" cy="435" r="22" fill="#ec4899" opacity="0.2"/>
  <text x="310" y="442" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#ec4899">5</text>
  <text x="350" y="420" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">5공장 투자 결정</text>
  <text x="350" y="442" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">같은 패턴의 반복인가, 새로운 국면인가</text>
  <text x="350" y="462" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">글로벌 CMO 수요 vs 경쟁 구도 변화</text>

  <!-- Bottom verdict -->
  <rect x="100" y="530" width="760" height="70" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="480" y="560" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#fbbf24">판단 기준</text>
  <text x="480" y="585" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">가동률이 올라가는데 영업이익률이 내려가는 분기가 오면 — 이 구조의 천장이 보이기 시작한다</text>

  <text x="880" y="625" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">dartlab 실측 2026-04-17</text>
</svg>