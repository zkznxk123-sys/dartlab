<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640">
  <rect width="960" height="640" fill="#0a0e1a"/>
  <text x="480" y="50" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">2026년 체크포인트 3가지</text>
  <text x="480" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">현대로템 (064350) — 다음 분기에 반드시 확인해야 할 것</text>

  <!-- Card 1: 수주잔고 -->
  <rect x="40" y="110" width="270" height="360" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <circle cx="175" cy="170" r="40" fill="#22c55e" opacity="0.15"/>
  <text x="175" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#22c55e">1</text>
  <text x="175" y="235" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#22c55e">수주잔고 증감</text>

  <line x1="80" y1="260" x2="270" y2="260" stroke="#334155" stroke-width="1"/>

  <text x="175" y="295" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">폴란드 K2 후속 계약</text>
  <text x="175" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">호주·루마니아·노르웨이</text>
  <text x="175" y="345" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">추가 수출 계약 체결 여부</text>

  <rect x="70" y="375" width="210" height="40" rx="6" fill="#22c55e" opacity="0.1"/>
  <text x="175" y="400" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#22c55e">수주 증가 = 매출 지속</text>

  <text x="175" y="445" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">방위사업청 분기 공시</text>

  <!-- Card 2: OPM 유지 -->
  <rect x="345" y="110" width="270" height="360" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="480" cy="170" r="40" fill="#f59e0b" opacity="0.15"/>
  <text x="480" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#f59e0b">2</text>
  <text x="480" y="235" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#f59e0b">OPM 15% 유지</text>

  <line x1="385" y1="260" x2="575" y2="260" stroke="#334155" stroke-width="1"/>

  <text x="480" y="295" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">수주 믹스가 핵심</text>
  <text x="480" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">방산 수출 비중 유지 시</text>
  <text x="480" y="345" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">고마진 구조 지속</text>

  <rect x="375" y="375" width="210" height="40" rx="6" fill="#f59e0b" opacity="0.1"/>
  <text x="480" y="400" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#f59e0b">철도 비중 증가 = 경고</text>

  <text x="480" y="445" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">분기 손익계산서 원가율 추적</text>

  <!-- Card 3: 매출채권 DSO -->
  <rect x="650" y="110" width="270" height="360" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <circle cx="785" cy="170" r="40" fill="#ef4444" opacity="0.15"/>
  <text x="785" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#ef4444">3</text>
  <text x="785" y="235" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#ef4444">매출채권 DSO</text>

  <line x1="690" y1="260" x2="880" y2="260" stroke="#334155" stroke-width="1"/>

  <text x="785" y="295" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">현재 매출채권 3.39조</text>
  <text x="785" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">정부 간 결제 = 느림</text>
  <text x="785" y="345" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">DSO 증가 시 현금 병목</text>

  <rect x="680" y="375" width="210" height="40" rx="6" fill="#ef4444" opacity="0.1"/>
  <text x="785" y="400" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ef4444">회수 지연 = 현금 감옥</text>

  <text x="785" y="445" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">분기 재무상태표 추적</text>

  <!-- Bottom judgment -->
  <rect x="40" y="510" width="880" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="545" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#fbbf24">판단 기준</text>
  <text x="480" y="575" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#f1f5f9">가동률이 올라가는데 OPM이 내려가는 분기가 오면, 수주 믹스 역전이 시작된 것이다.</text>

  <text x="920" y="630" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#475569">dartlab 실측 2026-04-17</text>
</svg>