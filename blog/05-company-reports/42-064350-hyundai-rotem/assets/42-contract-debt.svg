<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="50" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">계약부채 vs 차입금 — 주문이 늘면 빚이 준다</text>
  <text x="600" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">현대로템 (064350) | 계약부채 = 고객 선수금, 차입금 = 금융기관 빚</text>

  <!-- Chart area -->
  <!-- Left Y axis: 계약부채 (조원) 0~4.5 -->
  <text x="55" y="115" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#22c55e">계약부채(조)</text>
  <text x="55" y="145" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">4.0</text>
  <text x="55" y="237" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">3.0</text>
  <text x="55" y="329" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">2.0</text>
  <text x="55" y="421" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">1.0</text>
  <text x="55" y="513" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">0</text>

  <!-- Right Y axis: 차입금 (억원) 0~5000 -->
  <text x="1145" y="115" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ef4444">차입금(억)</text>
  <text x="1150" y="145" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">5,000</text>
  <text x="1150" y="237" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">3,750</text>
  <text x="1150" y="329" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">2,500</text>
  <text x="1150" y="421" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">1,250</text>
  <text x="1150" y="513" text-anchor="start" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">0</text>

  <!-- Grid lines -->
  <line x1="70" y1="140" x2="1130" y2="140" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="232" x2="1130" y2="232" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="324" x2="1130" y2="324" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="416" x2="1130" y2="416" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="508" x2="1130" y2="508" stroke="#334155" stroke-width="1"/>

  <!-- Scale: 계약부채 0=y508, 4.5=y140. range=368px. 1조=81.78px -->
  <!-- Scale: 차입금 0=y508, 5000=y140. range=368px. 1000억=73.6px -->

  <!-- 계약부채 bars (green, left side of each slot) -->
  <!-- 2020: 0.33조 y=508-(0.33*81.78)=508-27=481 h=27 -->
  <rect x="120" y="481" width="80" height="27" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="160" y="473" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#22c55e">0.33</text>

  <!-- 2021: 0.45조 y=508-36.8=471.2 h=36.8 -->
  <rect x="290" y="471" width="80" height="37" rx="4" fill="#22c55e" opacity="0.65"/>
  <text x="330" y="463" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#22c55e">0.45</text>

  <!-- 2022: 0.73조 y=508-59.7=448.3 h=59.7 -->
  <rect x="460" y="448" width="80" height="60" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="500" y="440" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#22c55e">0.73</text>

  <!-- 2023: 1.21조 y=508-98.95=409 h=99 -->
  <rect x="630" y="409" width="80" height="99" rx="4" fill="#22c55e" opacity="0.75"/>
  <text x="670" y="401" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#22c55e">1.21</text>

  <!-- 2024: 1.79조 y=508-146.4=361.6 h=146.4 -->
  <rect x="800" y="362" width="80" height="146" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="840" y="354" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#22c55e">1.79</text>

  <!-- 2025: 3.97조 y=508-324.7=183.3 h=324.7 -->
  <rect x="970" y="183" width="80" height="325" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="1010" y="173" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#22c55e">3.97조</text>

  <!-- 차입금 line (red, diamond markers) -->
  <!-- 2020: 4013억 y=508-(4013/1000*73.6)=508-295.4=212.6 -->
  <!-- 2021: 3545억 y=508-260.9=247.1 -->
  <!-- 2022: 9498억 -> capped display. y=508-(5000/1000*73.6) would be y=140 but 9498>5000. Let's adjust scale to 0-10000. range=368. 1000=36.8px -->
  <!-- Rescale 차입금: 0=y508, 10000=y140. 1000억=36.8px -->

  <!-- 차입금 line with rescaled axis -->
  <!-- 2020: 4013억 y=508-(4013*0.0368)=508-147.7=360.3 -->
  <circle cx="160" cy="360" r="6" fill="#ef4444"/>
  <text x="160" y="348" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ef4444">4,013</text>

  <!-- 2021: 3545억 y=508-130.5=377.5 -->
  <circle cx="330" cy="378" r="6" fill="#ef4444"/>
  <text x="330" y="366" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ef4444">3,545</text>

  <!-- 2022: 9498억 y=508-349.5=158.5 -->
  <circle cx="500" cy="159" r="6" fill="#ef4444"/>
  <text x="500" y="147" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#ef4444">9,498</text>

  <!-- 2023: 5624억 y=508-207=301 -->
  <circle cx="670" cy="301" r="6" fill="#ef4444"/>
  <text x="670" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ef4444">5,624</text>

  <!-- 2024: 1760억 y=508-64.8=443.2 -->
  <circle cx="840" cy="443" r="6" fill="#ef4444"/>
  <text x="840" y="431" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#ef4444">1,760</text>

  <!-- 2025: 608억 y=508-22.4=485.6 -->
  <circle cx="1010" cy="486" r="6" fill="#ef4444"/>
  <text x="1010" y="505" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#ef4444">608억</text>

  <!-- Connect line -->
  <polyline points="160,360 330,378 500,159 670,301 840,443 1010,486" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Year labels -->
  <text x="160" y="540" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2020</text>
  <text x="330" y="540" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2021</text>
  <text x="500" y="540" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2022</text>
  <text x="670" y="540" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2023</text>
  <text x="840" y="540" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2024</text>
  <text x="1010" y="540" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2025</text>

  <!-- K2 계약 marker -->
  <rect x="460" y="558" width="120" height="24" rx="12" fill="#fbbf24" opacity="0.2"/>
  <text x="520" y="574" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#fbbf24">폴란드 K2 계약</text>

  <!-- Legend -->
  <rect x="380" y="600" width="16" height="16" rx="3" fill="#22c55e"/>
  <text x="402" y="613" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">계약부채 (고객 선수금)</text>
  <circle cx="590" cy="608" r="6" fill="#ef4444"/>
  <line x1="580" y1="608" x2="600" y2="608" stroke="#ef4444" stroke-width="2.5"/>
  <text x="612" y="613" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f1f5f9">차입금 (금융기관 빚)</text>

  <!-- Insight box -->
  <rect x="100" y="640" width="1000" height="45" rx="8" fill="#1e293b"/>
  <text x="600" y="668" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#fbbf24">주문이 늘면 빚이 준다 — 선수금이 차입금을 대체. 부채비율 206%의 실체는 고객 돈이다.</text>

  <text x="1160" y="710" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#475569">dartlab 실측 2026-04-17</text>
</svg>