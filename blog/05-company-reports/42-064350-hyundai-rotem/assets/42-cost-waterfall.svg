<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="50" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">매출원가율 8년 변화 — 104%에서 76%로</text>
  <text x="600" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">현대로템 (064350) | 감가상각비 395억 = 매출의 0.7%. 설비 투자 없이 28pp 개선.</text>

  <!-- 100% baseline -->
  <line x1="100" y1="200" x2="1100" y2="200" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="90" y="205" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">100%</text>

  <!-- 80% line -->
  <line x1="100" y1="360" x2="1100" y2="360" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="90" y="365" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">80%</text>

  <!-- Y axis labels -->
  <text x="90" y="125" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">110%</text>
  <line x1="100" y1="120" x2="1100" y2="120" stroke="#1e293b" stroke-width="1"/>
  <text x="90" y="285" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">90%</text>
  <line x1="100" y1="280" x2="1100" y2="280" stroke="#1e293b" stroke-width="1"/>
  <text x="90" y="445" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">70%</text>
  <line x1="100" y1="440" x2="1100" y2="440" stroke="#1e293b" stroke-width="1"/>

  <!-- Bars: each bar 100px wide, gap 25px. Start x=115. Height: 8pp = 64px -->
  <!-- 2018: 100.7% -> red. height from baseline(200) up. 100.7-70=30.7 -> (30.7/40)*320=245.6px from y=440 -->
  <!-- Scale: 70%=y440, 110%=y120. 40pp=320px. 1pp=8px -->
  <!-- y = 440 - (val-70)*8 -->

  <!-- 2018: 100.7% y=440-(30.7*8)=440-245.6=194.4 h=440-194.4=245.6 -->
  <rect x="115" y="194" width="100" height="246" rx="4" fill="#ef4444" opacity="0.85"/>
  <text x="165" y="184" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#ef4444">100.7%</text>
  <text x="165" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2018</text>
  <text x="165" y="530" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#ef4444">적자</text>

  <!-- 2019: 103.8% y=440-(33.8*8)=440-270.4=169.6 h=270.4 -->
  <rect x="240" y="170" width="100" height="270" rx="4" fill="#ef4444" opacity="0.9"/>
  <text x="290" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#ef4444">103.8%</text>
  <text x="290" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2019</text>
  <text x="290" y="530" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#ef4444">바닥</text>

  <!-- 2020: 91.2% y=440-(21.2*8)=440-169.6=270.4 h=169.6 -->
  <rect x="365" y="270" width="100" height="170" rx="4" fill="#f59e0b" opacity="0.85"/>
  <text x="415" y="260" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#f59e0b">91.2%</text>
  <text x="415" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2020</text>

  <!-- 2021: 91.2% same -->
  <rect x="490" y="270" width="100" height="170" rx="4" fill="#f59e0b" opacity="0.85"/>
  <text x="540" y="260" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#f59e0b">91.2%</text>
  <text x="540" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2021</text>

  <!-- 2022: 88.5% y=440-(18.5*8)=440-148=292 h=148 -->
  <rect x="615" y="292" width="100" height="148" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="665" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#f59e0b">88.5%</text>
  <text x="665" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2022</text>
  <text x="665" y="530" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#fbbf24">K2 계약</text>

  <!-- 2023: 87.1% y=440-(17.1*8)=440-136.8=303.2 h=136.8 -->
  <rect x="740" y="303" width="100" height="137" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="790" y="293" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#22c55e">87.1%</text>
  <text x="790" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2023</text>

  <!-- 2024: 81.1% y=440-(11.1*8)=440-88.8=351.2 h=88.8 -->
  <rect x="865" y="351" width="100" height="89" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="915" y="341" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#22c55e">81.1%</text>
  <text x="915" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2024</text>

  <!-- 2025: 76.2% y=440-(6.2*8)=440-49.6=390.4 h=49.6 -->
  <rect x="990" y="390" width="100" height="50" rx="4" fill="#22c55e" opacity="0.95"/>
  <text x="1040" y="380" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#22c55e">76.2%</text>
  <text x="1040" y="510" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">2025</text>
  <text x="1040" y="530" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#22c55e">OPM 17%</text>

  <!-- Phase labels -->
  <rect x="115" y="555" width="225" height="32" rx="6" fill="#ef4444" opacity="0.15"/>
  <text x="227" y="576" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ef4444">적자기</text>

  <rect x="365" y="555" width="350" height="32" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="540" y="576" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#f59e0b">전환기</text>

  <rect x="740" y="555" width="350" height="32" rx="6" fill="#22c55e" opacity="0.15"/>
  <text x="915" y="576" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#22c55e">성장기</text>

  <!-- Trend arrow -->
  <line x1="165" y1="170" x2="1040" y2="385" stroke="#fbbf24" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>

  <!-- Insight box -->
  <rect x="100" y="620" width="1000" height="55" rx="8" fill="#1e293b"/>
  <text x="600" y="648" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#fbbf24">설비 투자 없이 28pp 개선 — 감가상각비 395억(매출의 0.7%). 수주 믹스가 원가를 바꿨다.</text>
  <text x="600" y="668" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b">국내 저마진 방산·철도 → 해외 고마진 K2 전차 수출. 같은 공장, 다른 수익.</text>

  <text x="1160" y="710" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#475569">dartlab 실측 2026-04-17</text>
</svg>