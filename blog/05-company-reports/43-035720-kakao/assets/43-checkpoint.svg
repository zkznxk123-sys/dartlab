<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>카카오 2026년 체크포인트 — OPM 10% 돌파 여부를 판단하는 5가지 지표</title>
  <desc>카카오 투자 시 봐야 할 핵심 체크포인트 5개</desc>
  <rect width="960" height="640" fill="#0a0e1a"/>

  <text x="480" y="45" fill="#f1f5f9" font-size="22" font-weight="bold" text-anchor="middle">2026년 체크포인트 — OPM 10% 돌파할 수 있는가</text>
  <text x="480" y="72" fill="#64748b" font-size="14" text-anchor="middle">카카오가 "플랫폼 마진"을 회복하려면 이 5가지를 봐야 한다</text>

  <!-- 체크 1 -->
  <rect x="60" y="110" width="840" height="80" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="140" fill="#fbbf24" font-size="18" font-weight="bold">①</text>
  <text x="130" y="140" fill="#f1f5f9" font-size="15" font-weight="bold">연결 영업이익률(OPM) 분기 추이</text>
  <text x="130" y="165" fill="#94a3b8" font-size="13">2025 연간 9.0% → 분기별로 10% 이상 찍는 분기가 나오는가. 플랫폼 부문 단독 OPM 20%+ 유지 여부.</text>

  <!-- 체크 2 -->
  <rect x="60" y="205" width="840" height="80" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="100" y="235" fill="#22c55e" font-size="18" font-weight="bold">②</text>
  <text x="130" y="235" fill="#f1f5f9" font-size="15" font-weight="bold">SM엔터테인먼트 영업이익 전환</text>
  <text x="130" y="260" fill="#94a3b8" font-size="13">2023 인수 후 영업권 상각 + 구조조정 비용 → 2026년 SM 단독 흑자 전환 여부가 연결 마진의 열쇠.</text>

  <!-- 체크 3 -->
  <rect x="60" y="300" width="840" height="80" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="100" y="330" fill="#ef4444" font-size="18" font-weight="bold">③</text>
  <text x="130" y="330" fill="#f1f5f9" font-size="15" font-weight="bold">순차입금 4.2조 추이 + OCF/순차입 비율</text>
  <text x="130" y="355" fill="#94a3b8" font-size="13">OCF 1.40조 대비 순차입금 4.2조 = 3.0년. SM 인수 차입 상환 속도가 재무 안정성의 바로미터.</text>

  <!-- 체크 4 -->
  <rect x="60" y="395" width="840" height="80" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="100" y="425" fill="#f59e0b" font-size="18" font-weight="bold">④</text>
  <text x="130" y="425" fill="#f1f5f9" font-size="15" font-weight="bold">자회사 매각·정리 실행 여부</text>
  <text x="130" y="450" fill="#94a3b8" font-size="13">카카오VX, 카카오스타일 등 비핵심 자회사 매각 발표 → 실행 속도 + 매각 규모. 포트폴리오 경량화 신호.</text>

  <!-- 체크 5 -->
  <rect x="60" y="490" width="840" height="80" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="520" fill="#94a3b8" font-size="18" font-weight="bold">⑤</text>
  <text x="130" y="520" fill="#f1f5f9" font-size="15" font-weight="bold">김범수 경영 복귀 후 전략 방향</text>
  <text x="130" y="545" fill="#94a3b8" font-size="13">2024 구속 → 2025 보석 후 경영 복귀. "선택과 집중" 실행 여부가 카카오의 구조적 전환점이 될 수 있다.</text>

  <!-- 판단 -->
  <rect x="160" y="590" width="640" height="35" rx="8" fill="#fbbf24" opacity="0.1" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="613" fill="#fbbf24" font-size="14" font-weight="bold" text-anchor="middle">OPM 10% 돌파 = 자회사 정리 속도 × SM 흑자 전환 × 플랫폼 광고 성장</text>
</svg>