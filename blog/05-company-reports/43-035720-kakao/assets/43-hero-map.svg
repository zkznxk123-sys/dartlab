<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>카카오 핵심 구조 — 3,000만 DAU를 자회사 수십 개로 수익화한 구조가 OPM 한 자릿수의 원인</title>
  <desc>매출 2.4→8.1조 성장에도 영업이익률이 11%에서 5.8%로 빠진 6막 인과 흐름</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 타이틀 -->
  <text x="600" y="52" fill="#f1f5f9" font-size="26" font-weight="bold" text-anchor="middle">카카오 (035720) — 3,000만 DAU가 매일 열어도 마진이 한 자릿수인 이유</text>
  <text x="600" y="80" fill="#64748b" font-size="15" text-anchor="middle">매출 2.4→8.1조, OPM 11%→5.8%→9% | 자회사 확장이 마진의 천장을 만든 구조</text>

  <!-- 관통선 화살표 배경 -->
  <line x1="80" y1="130" x2="1120" y2="130" stroke="#fbbf24" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="600" y="125" fill="#fbbf24" font-size="13" text-anchor="middle" font-weight="bold">관통선: 트래픽 독점 → 자회사 수십 개 → 매출 4배 → 마진 한 자릿수</text>

  <!-- 1막 -->
  <rect x="40" y="155" width="170" height="230" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="125" y="182" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">1막</text>
  <text x="125" y="205" fill="#f1f5f9" font-size="12" text-anchor="middle">매일 3,000만이</text>
  <text x="125" y="222" fill="#f1f5f9" font-size="12" text-anchor="middle">여는 앱</text>
  <text x="125" y="252" fill="#22c55e" font-size="20" font-weight="bold" text-anchor="middle">8.10조</text>
  <text x="125" y="272" fill="#64748b" font-size="11" text-anchor="middle">2025 매출</text>
  <text x="125" y="300" fill="#94a3b8" font-size="11" text-anchor="middle">2018: 2.42조</text>
  <text x="125" y="318" fill="#94a3b8" font-size="11" text-anchor="middle">8년간 4배 성장</text>
  <rect x="60" y="340" width="130" height="30" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="125" y="360" fill="#22c55e" font-size="11" text-anchor="middle">DAU 3,000만 독점</text>

  <!-- 화살표 1→2 -->
  <path d="M215 270 L240 270" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 2막 -->
  <rect x="240" y="155" width="170" height="230" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="325" y="182" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">2막</text>
  <text x="325" y="205" fill="#f1f5f9" font-size="12" text-anchor="middle">트래픽을 자회사에</text>
  <text x="325" y="222" fill="#f1f5f9" font-size="12" text-anchor="middle">나눠주다</text>
  <text x="325" y="252" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">카카오뱅크</text>
  <text x="325" y="272" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">카카오페이</text>
  <text x="325" y="292" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">카카오엔터</text>
  <text x="325" y="312" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">카카오모빌리티</text>
  <rect x="260" y="340" width="130" height="30" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="325" y="360" fill="#f59e0b" font-size="11" text-anchor="middle">연결자회사 100+</text>

  <!-- 화살표 2→3 -->
  <path d="M415 270 L440 270" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 3막 -->
  <rect x="440" y="155" width="170" height="230" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="525" y="182" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">3막</text>
  <text x="525" y="205" fill="#f1f5f9" font-size="12" text-anchor="middle">OPM 11%→5.8%</text>
  <text x="525" y="222" fill="#f1f5f9" font-size="12" text-anchor="middle">마진이 녹는 4년</text>
  <text x="525" y="258" fill="#ef4444" font-size="22" font-weight="bold" text-anchor="middle">5.8%</text>
  <text x="525" y="280" fill="#64748b" font-size="11" text-anchor="middle">2024 영업이익률</text>
  <text x="525" y="305" fill="#94a3b8" font-size="11" text-anchor="middle">정점 2020: 11.1%</text>
  <rect x="460" y="340" width="130" height="30" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="525" y="360" fill="#ef4444" font-size="11" text-anchor="middle">네이버의 절반</text>

  <!-- 화살표 3→4 -->
  <path d="M615 270 L640 270" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 4막 -->
  <rect x="640" y="155" width="170" height="230" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="725" y="182" fill="#ef4444" font-size="13" font-weight="bold" text-anchor="middle">4막</text>
  <text x="725" y="205" fill="#f1f5f9" font-size="12" text-anchor="middle">SM 인수의 대가</text>
  <text x="725" y="258" fill="#ef4444" font-size="22" font-weight="bold" text-anchor="middle">-1.82조</text>
  <text x="725" y="280" fill="#64748b" font-size="11" text-anchor="middle">2023 순손실</text>
  <text x="725" y="305" fill="#94a3b8" font-size="11" text-anchor="middle">무형자산 급증</text>
  <text x="725" y="322" fill="#94a3b8" font-size="11" text-anchor="middle">영업권 5조+</text>
  <rect x="660" y="340" width="130" height="30" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="725" y="360" fill="#ef4444" font-size="11" text-anchor="middle">자산 무거워짐</text>

  <!-- 화살표 4→5 -->
  <path d="M815 270 L840 270" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 5막 -->
  <rect x="840" y="155" width="150" height="230" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="915" y="182" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">5막</text>
  <text x="915" y="205" fill="#f1f5f9" font-size="12" text-anchor="middle">자산 27.8조</text>
  <text x="915" y="222" fill="#f1f5f9" font-size="12" text-anchor="middle">해부</text>
  <text x="915" y="252" fill="#f59e0b" font-size="16" font-weight="bold" text-anchor="middle">27.8조</text>
  <text x="915" y="272" fill="#64748b" font-size="11" text-anchor="middle">총자산</text>
  <text x="915" y="298" fill="#94a3b8" font-size="11" text-anchor="middle">부채비율 82%</text>
  <text x="915" y="318" fill="#94a3b8" font-size="11" text-anchor="middle">순차입금 4.2조</text>
  <rect x="860" y="340" width="110" height="30" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="915" y="360" fill="#f59e0b" font-size="11" text-anchor="middle">제조업처럼 무거움</text>

  <!-- 화살표 5→6 -->
  <path d="M995 270 L1020 270" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 6막 -->
  <rect x="1020" y="155" width="140" height="230" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="1090" y="182" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">6막</text>
  <text x="1090" y="205" fill="#f1f5f9" font-size="12" text-anchor="middle">OPM 9%는</text>
  <text x="1090" y="222" fill="#f1f5f9" font-size="12" text-anchor="middle">정상인가</text>
  <text x="1090" y="258" fill="#fbbf24" font-size="22" font-weight="bold" text-anchor="middle">9.0%</text>
  <text x="1090" y="280" fill="#64748b" font-size="11" text-anchor="middle">2025 OPM</text>
  <text x="1090" y="305" fill="#94a3b8" font-size="11" text-anchor="middle">네이버 18%의</text>
  <text x="1090" y="322" fill="#94a3b8" font-size="11" text-anchor="middle">절반이 구조적</text>
  <rect x="1040" y="340" width="100" height="30" rx="4" fill="#fbbf24" opacity="0.15"/>
  <text x="1090" y="360" fill="#fbbf24" font-size="11" text-anchor="middle">마진 딜레마</text>

  <!-- 하단 판단 -->
  <rect x="200" y="430" width="800" height="80" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="462" fill="#fbbf24" font-size="16" font-weight="bold" text-anchor="middle">판단</text>
  <text x="600" y="488" fill="#f1f5f9" font-size="14" text-anchor="middle">카카오톡 3,000만 DAU를 자회사 수십 개로 수익화한 구조가 OPM 한 자릿수의 원인이다.</text>
  <text x="600" y="505" fill="#64748b" font-size="12" text-anchor="middle">트래픽은 독점이지만 마진은 독점이 아니다 — 자회사마다 시장 경쟁에 노출</text>

  <!-- 하단 KPI -->
  <rect x="100" y="550" width="200" height="80" rx="8" fill="#1e293b"/>
  <text x="200" y="578" fill="#22c55e" font-size="22" font-weight="bold" text-anchor="middle">dCR-AA</text>
  <text x="200" y="600" fill="#64748b" font-size="12" text-anchor="middle">신용등급 | health 84</text>

  <rect x="380" y="550" width="200" height="80" rx="8" fill="#1e293b"/>
  <text x="480" y="578" fill="#22c55e" font-size="22" font-weight="bold" text-anchor="middle">OCF 1.40조</text>
  <text x="480" y="600" fill="#64748b" font-size="12" text-anchor="middle">2025 영업현금흐름</text>

  <rect x="660" y="550" width="200" height="80" rx="8" fill="#1e293b"/>
  <text x="760" y="578" fill="#ef4444" font-size="22" font-weight="bold" text-anchor="middle">ROE 3.4%</text>
  <text x="760" y="600" fill="#64748b" font-size="12" text-anchor="middle">자본 대비 수익률</text>

  <rect x="940" y="550" width="180" height="80" rx="8" fill="#1e293b"/>
  <text x="1030" y="578" fill="#f59e0b" font-size="22" font-weight="bold" text-anchor="middle">부채 82%</text>
  <text x="1030" y="600" fill="#64748b" font-size="12" text-anchor="middle">순차입금 4.2조</text>

  <text x="600" y="680" fill="#64748b" font-size="11" text-anchor="middle">2026-04-18 dartlab 실측 | DART 연결재무제표 기준</text>

  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>