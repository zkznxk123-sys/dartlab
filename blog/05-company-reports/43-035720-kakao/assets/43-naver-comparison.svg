<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>네이버 vs 카카오 비교 매트릭스 — 같은 플랫폼인데 OPM이 2배 차이 나는 이유</title>
  <desc>카카오와 네이버의 핵심 재무 지표 비교</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="45" fill="#f1f5f9" font-size="22" font-weight="bold" text-anchor="middle">네이버 vs 카카오 — 같은 "플랫폼"인데 OPM이 2배 차이</text>
  <text x="600" y="70" fill="#64748b" font-size="14" text-anchor="middle">네이버는 검색 광고 집중, 카카오는 자회사 확장 — 전략 차이가 마진 차이</text>

  <!-- 헤더 -->
  <rect x="80" y="100" width="340" height="50" rx="8" fill="#22c55e" opacity="0.15"/>
  <text x="250" y="132" fill="#22c55e" font-size="18" font-weight="bold" text-anchor="middle">네이버 (NAVER)</text>

  <rect x="480" y="100" width="200" height="50" rx="8" fill="#64748b" opacity="0.2"/>
  <text x="580" y="132" fill="#f1f5f9" font-size="16" font-weight="bold" text-anchor="middle">비교 항목</text>

  <rect x="740" y="100" width="380" height="50" rx="8" fill="#fbbf24" opacity="0.15"/>
  <text x="930" y="132" fill="#fbbf24" font-size="18" font-weight="bold" text-anchor="middle">카카오 (Kakao)</text>

  <!-- 행 1: 매출 -->
  <rect x="80" y="170" width="340" height="55" rx="6" fill="#1e293b"/>
  <text x="250" y="203" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">10.89조</text>
  <rect x="480" y="170" width="200" height="55" rx="6" fill="#1e293b"/>
  <text x="580" y="198" fill="#94a3b8" font-size="14" text-anchor="middle">2025 매출</text>
  <text x="580" y="215" fill="#64748b" font-size="11" text-anchor="middle">(1년치 합산)</text>
  <rect x="740" y="170" width="380" height="55" rx="6" fill="#1e293b"/>
  <text x="930" y="203" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">8.10조</text>

  <!-- 행 2: OPM -->
  <rect x="80" y="240" width="340" height="55" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="250" y="273" fill="#22c55e" font-size="24" font-weight="bold" text-anchor="middle">18.0%</text>
  <rect x="480" y="240" width="200" height="55" rx="6" fill="#1e293b"/>
  <text x="580" y="268" fill="#94a3b8" font-size="14" text-anchor="middle">영업이익률</text>
  <text x="580" y="285" fill="#fbbf24" font-size="12" text-anchor="middle">2배 차이</text>
  <rect x="740" y="240" width="380" height="55" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="930" y="273" fill="#ef4444" font-size="24" font-weight="bold" text-anchor="middle">9.0%</text>

  <!-- 행 3: 영업이익 -->
  <rect x="80" y="310" width="340" height="55" rx="6" fill="#1e293b"/>
  <text x="250" y="343" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">1.96조</text>
  <rect x="480" y="310" width="200" height="55" rx="6" fill="#1e293b"/>
  <text x="580" y="343" fill="#94a3b8" font-size="14" text-anchor="middle">영업이익</text>
  <rect x="740" y="310" width="380" height="55" rx="6" fill="#1e293b"/>
  <text x="930" y="343" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">0.73조</text>

  <!-- 행 4: 순이익 -->
  <rect x="80" y="380" width="340" height="55" rx="6" fill="#1e293b"/>
  <text x="250" y="413" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">1.25조</text>
  <rect x="480" y="380" width="200" height="55" rx="6" fill="#1e293b"/>
  <text x="580" y="413" fill="#94a3b8" font-size="14" text-anchor="middle">당기순이익</text>
  <rect x="740" y="380" width="380" height="55" rx="6" fill="#1e293b"/>
  <text x="930" y="413" fill="#f1f5f9" font-size="20" font-weight="bold" text-anchor="middle">0.52조</text>

  <!-- 행 5: 전략 -->
  <rect x="80" y="450" width="340" height="70" rx="6" fill="#1e293b"/>
  <text x="250" y="478" fill="#22c55e" font-size="14" font-weight="bold" text-anchor="middle">검색 광고 + 커머스 집중</text>
  <text x="250" y="500" fill="#94a3b8" font-size="12" text-anchor="middle">핵심 사업 마진 극대화</text>
  <rect x="480" y="450" width="200" height="70" rx="6" fill="#1e293b"/>
  <text x="580" y="490" fill="#94a3b8" font-size="14" text-anchor="middle">수익화 전략</text>
  <rect x="740" y="450" width="380" height="70" rx="6" fill="#1e293b"/>
  <text x="930" y="478" fill="#fbbf24" font-size="14" font-weight="bold" text-anchor="middle">자회사 100+ 분산 투자</text>
  <text x="930" y="500" fill="#94a3b8" font-size="12" text-anchor="middle">트래픽을 자회사에 나눠줌</text>

  <!-- 행 6: 연결자회사 -->
  <rect x="80" y="535" width="340" height="55" rx="6" fill="#1e293b"/>
  <text x="250" y="568" fill="#f1f5f9" font-size="18" font-weight="bold" text-anchor="middle">연결자회사 ~80개</text>
  <rect x="480" y="535" width="200" height="55" rx="6" fill="#1e293b"/>
  <text x="580" y="568" fill="#94a3b8" font-size="14" text-anchor="middle">연결대상</text>
  <rect x="740" y="535" width="380" height="55" rx="6" fill="#1e293b"/>
  <text x="930" y="568" fill="#f1f5f9" font-size="18" font-weight="bold" text-anchor="middle">연결자회사 100+</text>

  <!-- 핵심 메시지 -->
  <rect x="200" y="620" width="800" height="55" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="653" fill="#fbbf24" font-size="15" font-weight="bold" text-anchor="middle">같은 "플랫폼"이라 불리지만, 네이버는 집중→고마진, 카카오는 확장→저마진</text>

  <text x="600" y="705" fill="#64748b" font-size="11" text-anchor="middle">네이버 수치 = dartlab 실측 (추정치) | 카카오 수치 = dartlab 실측 | 2026-04-18 기준</text>
</svg>