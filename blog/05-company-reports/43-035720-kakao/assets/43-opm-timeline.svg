<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>카카오 영업이익률 8년 시계열 — OPM 11.1% 정점에서 5.8% 바닥까지</title>
  <desc>2018~2025 영업이익률과 매출 변화를 보여주는 시계열 차트</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="45" fill="#f1f5f9" font-size="22" font-weight="bold" text-anchor="middle">영업이익률(OPM) 8년 — 11.1% 정점에서 5.8% 바닥, 9%로 회복</text>
  <text x="600" y="70" fill="#64748b" font-size="14" text-anchor="middle">매출은 4배 늘었지만 마진은 제자리 — 자회사 확장의 대가</text>

  <!-- 차트 영역 -->
  <!-- Y축 -->
  <line x1="120" y1="110" x2="120" y2="530" stroke="#334155" stroke-width="1"/>
  <text x="55" y="140" fill="#64748b" font-size="12" text-anchor="middle">12%</text>
  <line x1="115" y1="140" x2="1120" y2="140" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="207" fill="#64748b" font-size="12" text-anchor="middle">10%</text>
  <line x1="115" y1="207" x2="1120" y2="207" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="274" fill="#64748b" font-size="12" text-anchor="middle">8%</text>
  <line x1="115" y1="274" x2="1120" y2="274" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="340" fill="#64748b" font-size="12" text-anchor="middle">6%</text>
  <line x1="115" y1="340" x2="1120" y2="340" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="407" fill="#64748b" font-size="12" text-anchor="middle">4%</text>
  <line x1="115" y1="407" x2="1120" y2="407" stroke="#1e293b" stroke-width="1"/>
  <text x="55" y="474" fill="#64748b" font-size="12" text-anchor="middle">2%</text>
  <line x1="115" y1="474" x2="1120" y2="474" stroke="#1e293b" stroke-width="1"/>

  <!-- X축 -->
  <line x1="120" y1="530" x2="1120" y2="530" stroke="#334155" stroke-width="1"/>

  <!-- 네이버 비교선 18% -->
  <line x1="120" y1="60" x2="1120" y2="60" stroke="#22c55e" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="1130" y="64" fill="#22c55e" font-size="11" text-anchor="start">네이버 18%</text>

  <!-- 데이터 포인트 (OPM: 3.0, 6.7, 11.1, 9.9, 8.4, 7.8, 5.8, 9.0) -->
  <!-- Y축: 12%=140, 0%=530 → 1%=32.5px, base=530 -->
  <!-- 3.0%: 530-97.5=432.5, 6.7%: 530-217.8=312.3, 11.1%: 530-360.8=169.3, 9.9%: 530-321.8=208.3 -->
  <!-- 8.4%: 530-273=257, 7.8%: 530-253.5=276.5, 5.8%: 530-188.5=341.5, 9.0%: 530-292.5=237.5 -->

  <!-- 연결 라인 -->
  <polyline points="245,432 370,312 495,169 620,208 745,257 870,277 995,342 1060,238"
            fill="none" stroke="#fbbf24" stroke-width="3" stroke-linejoin="round"/>

  <!-- 매출 막대 (배경) -->
  <!-- 매출: 2.42, 3.07, 4.84, 6.20, 6.99, 7.39, 7.07, 8.10 조원 -->
  <!-- 높이 비율: max 8.10 = 120px -->
  <rect x="215" y="556" width="60" height="36" rx="3" fill="#3b82f6" opacity="0.25"/>
  <text x="245" y="606" fill="#3b82f6" font-size="11" text-anchor="middle">2.42조</text>
  <rect x="340" y="556" width="60" height="45" rx="3" fill="#3b82f6" opacity="0.25"/>
  <text x="370" y="616" fill="#3b82f6" font-size="11" text-anchor="middle">3.07조</text>
  <rect x="465" y="556" width="60" height="72" rx="3" fill="#3b82f6" opacity="0.25"/>
  <text x="495" y="642" fill="#3b82f6" font-size="11" text-anchor="middle">4.84조</text>
  <rect x="590" y="556" width="60" height="92" rx="3" fill="#3b82f6" opacity="0.25"/>
  <text x="620" y="660" fill="#3b82f6" font-size="11" text-anchor="middle">6.20조</text>
  <rect x="715" y="556" width="60" height="104" rx="3" fill="#3b82f6" opacity="0.25"/>
  <text x="745" y="672" fill="#3b82f6" font-size="11" text-anchor="middle">6.99조</text>
  <rect x="840" y="556" width="60" height="110" rx="3" fill="#3b82f6" opacity="0.25"/>
  <text x="870" y="678" fill="#3b82f6" font-size="11" text-anchor="middle">7.39조</text>
  <rect x="965" y="556" width="60" height="105" rx="3" fill="#3b82f6" opacity="0.25"/>
  <text x="995" y="674" fill="#3b82f6" font-size="11" text-anchor="middle">7.07조</text>
  <rect x="1030" y="556" width="60" height="120" rx="3" fill="#3b82f6" opacity="0.30"/>
  <text x="1060" y="688" fill="#3b82f6" font-size="11" text-anchor="middle">8.10조</text>

  <!-- 데이터 포인트 + 라벨 -->
  <circle cx="245" cy="432" r="7" fill="#fbbf24"/>
  <text x="245" y="420" fill="#f1f5f9" font-size="13" font-weight="bold" text-anchor="middle">3.0%</text>
  <text x="245" y="545" fill="#94a3b8" font-size="12" text-anchor="middle">2018</text>

  <circle cx="370" cy="312" r="7" fill="#fbbf24"/>
  <text x="370" y="300" fill="#f1f5f9" font-size="13" font-weight="bold" text-anchor="middle">6.7%</text>
  <text x="370" y="545" fill="#94a3b8" font-size="12" text-anchor="middle">2019</text>

  <!-- 정점 강조 -->
  <circle cx="495" cy="169" r="10" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="495" cy="169" r="7" fill="#fbbf24"/>
  <rect x="445" y="138" width="100" height="24" rx="4" fill="#fbbf24" opacity="0.2"/>
  <text x="495" y="155" fill="#fbbf24" font-size="15" font-weight="bold" text-anchor="middle">11.1% 정점</text>
  <text x="495" y="545" fill="#94a3b8" font-size="12" text-anchor="middle">2020</text>

  <circle cx="620" cy="208" r="7" fill="#fbbf24"/>
  <text x="620" y="198" fill="#f1f5f9" font-size="13" font-weight="bold" text-anchor="middle">9.9%</text>
  <text x="620" y="545" fill="#94a3b8" font-size="12" text-anchor="middle">2021</text>

  <circle cx="745" cy="257" r="7" fill="#fbbf24"/>
  <text x="745" y="247" fill="#f1f5f9" font-size="13" font-weight="bold" text-anchor="middle">8.4%</text>
  <text x="745" y="545" fill="#94a3b8" font-size="12" text-anchor="middle">2022</text>

  <circle cx="870" cy="277" r="7" fill="#fbbf24"/>
  <text x="870" y="267" fill="#f1f5f9" font-size="13" font-weight="bold" text-anchor="middle">7.8%</text>
  <text x="870" y="545" fill="#94a3b8" font-size="12" text-anchor="middle">2023</text>

  <!-- 바닥 강조 -->
  <circle cx="995" cy="342" r="10" fill="none" stroke="#ef4444" stroke-width="2"/>
  <circle cx="995" cy="342" r="7" fill="#ef4444"/>
  <rect x="945" y="348" width="100" height="24" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="995" y="365" fill="#ef4444" font-size="15" font-weight="bold" text-anchor="middle">5.8% 바닥</text>
  <text x="995" y="545" fill="#94a3b8" font-size="12" text-anchor="middle">2024</text>

  <!-- 회복 -->
  <circle cx="1060" cy="238" r="8" fill="#22c55e"/>
  <text x="1060" y="225" fill="#22c55e" font-size="15" font-weight="bold" text-anchor="middle">9.0%</text>
  <text x="1060" y="545" fill="#94a3b8" font-size="12" text-anchor="middle">2025</text>

  <!-- 범례 -->
  <rect x="80" y="690" width="12" height="12" rx="2" fill="#fbbf24"/>
  <text x="98" y="701" fill="#94a3b8" font-size="12">영업이익률(OPM)</text>
  <rect x="230" y="690" width="12" height="12" rx="2" fill="#3b82f6" opacity="0.3"/>
  <text x="248" y="701" fill="#94a3b8" font-size="12">매출(조원)</text>
  <line x1="370" y1="696" x2="410" y2="696" stroke="#22c55e" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="418" y="701" fill="#94a3b8" font-size="12">네이버 OPM 18%</text>

  <text x="1120" y="701" fill="#64748b" font-size="11" text-anchor="end">dartlab 실측 | DART 연결 기준</text>
</svg>