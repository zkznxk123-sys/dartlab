<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>카카오 자회사 확장 구조 — 트래픽을 수십 개 자회사로 분배한 플랫폼 지주 모델</title>
  <desc>카카오톡 DAU 3,000만에서 각 자회사로 트래픽이 분산되고, 자회사별 마진 기여 구조</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="600" y="45" fill="#f1f5f9" font-size="22" font-weight="bold" text-anchor="middle">카카오 자회사 확장 구조 — 트래픽 독점, 마진 분산</text>
  <text x="600" y="72" fill="#64748b" font-size="14" text-anchor="middle">카카오톡 3,000만 DAU → 자회사 100+ → 각 자회사가 자기 시장에서 경쟁 → 연결 마진 희석</text>

  <!-- 카카오톡 중심 -->
  <rect x="440" y="100" width="320" height="90" rx="16" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="135" fill="#fbbf24" font-size="24" font-weight="bold" text-anchor="middle">카카오톡</text>
  <text x="600" y="162" fill="#f1f5f9" font-size="15" text-anchor="middle">DAU 3,000만 | 대한민국 메신저 독점</text>

  <!-- 분기선 -->
  <line x1="600" y1="190" x2="600" y2="230" stroke="#fbbf24" stroke-width="2"/>
  <line x1="150" y1="230" x2="1050" y2="230" stroke="#fbbf24" stroke-width="2"/>

  <!-- 자회사 박스들 -->
  <!-- 플랫폼 (매출 비중 높음) -->
  <line x1="150" y1="230" x2="150" y2="265" stroke="#fbbf24" stroke-width="2"/>
  <rect x="60" y="265" width="180" height="140" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="150" y="292" fill="#22c55e" font-size="14" font-weight="bold" text-anchor="middle">플랫폼 부문</text>
  <text x="150" y="316" fill="#f1f5f9" font-size="12" text-anchor="middle">톡비즈 · 포털 · 커머스</text>
  <text x="150" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">광고 + 톡스토어</text>
  <rect x="80" y="355" width="140" height="24" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="150" y="372" fill="#22c55e" font-size="12" font-weight="bold" text-anchor="middle">OPM 20%+ (추정)</text>
  <text x="150" y="395" fill="#64748b" font-size="11" text-anchor="middle">연결 매출 핵심</text>

  <!-- 카카오엔터 -->
  <line x1="370" y1="230" x2="370" y2="265" stroke="#fbbf24" stroke-width="2"/>
  <rect x="280" y="265" width="180" height="140" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="370" y="292" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">카카오엔터테인먼트</text>
  <text x="370" y="316" fill="#f1f5f9" font-size="12" text-anchor="middle">음악 · 웹툰 · 웹소설</text>
  <text x="370" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">멜론 · 카카오페이지</text>
  <rect x="300" y="355" width="140" height="24" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="370" y="372" fill="#f59e0b" font-size="12" font-weight="bold" text-anchor="middle">OPM 낮음 + SM 적자</text>
  <text x="370" y="395" fill="#64748b" font-size="11" text-anchor="middle">연결 마진 희석 주범</text>

  <!-- 카카오페이 -->
  <line x1="600" y1="230" x2="600" y2="265" stroke="#fbbf24" stroke-width="2"/>
  <rect x="510" y="265" width="180" height="140" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="292" fill="#ef4444" font-size="14" font-weight="bold" text-anchor="middle">카카오페이</text>
  <text x="600" y="316" fill="#f1f5f9" font-size="12" text-anchor="middle">결제 · 송금 · 보험</text>
  <text x="600" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">핀테크 경쟁 (토스·네이버)</text>
  <rect x="530" y="355" width="140" height="24" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="600" y="372" fill="#ef4444" font-size="12" font-weight="bold" text-anchor="middle">적자 or 저마진</text>
  <text x="600" y="395" fill="#64748b" font-size="11" text-anchor="middle">시장 점유율 확대 중</text>

  <!-- 카카오뱅크 -->
  <line x1="830" y1="230" x2="830" y2="265" stroke="#fbbf24" stroke-width="2"/>
  <rect x="740" y="265" width="180" height="140" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="830" y="292" fill="#22c55e" font-size="14" font-weight="bold" text-anchor="middle">카카오뱅크</text>
  <text x="830" y="316" fill="#f1f5f9" font-size="12" text-anchor="middle">인터넷은행</text>
  <text x="830" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">여수신 · 대출 · 예금</text>
  <rect x="760" y="355" width="140" height="24" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="830" y="372" fill="#22c55e" font-size="12" font-weight="bold" text-anchor="middle">흑자 전환 완료</text>
  <text x="830" y="395" fill="#64748b" font-size="11" text-anchor="middle">지분법 반영</text>

  <!-- 카카오모빌리티 -->
  <line x1="1050" y1="230" x2="1050" y2="265" stroke="#fbbf24" stroke-width="2"/>
  <rect x="960" y="265" width="180" height="140" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1050" y="292" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">카카오모빌리티</text>
  <text x="1050" y="316" fill="#f1f5f9" font-size="12" text-anchor="middle">택시 · 대리 · 주차</text>
  <text x="1050" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">T플랫폼 · 데이터</text>
  <rect x="980" y="355" width="140" height="24" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="1050" y="372" fill="#f59e0b" font-size="12" font-weight="bold" text-anchor="middle">적자 → 흑자 전환 중</text>
  <text x="1050" y="395" fill="#64748b" font-size="11" text-anchor="middle">높은 투자 지속</text>

  <!-- 2단 자회사 -->
  <text x="600" y="460" fill="#64748b" font-size="14" font-weight="bold" text-anchor="middle">— 2단 자회사 + SM 인수 —</text>

  <rect x="60" y="485" width="160" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="140" y="512" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">SM엔터테인먼트</text>
  <text x="140" y="535" fill="#ef4444" font-size="11" text-anchor="middle">2023 인수 → 영업권 5조+</text>

  <rect x="250" y="485" width="160" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="330" y="512" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">카카오게임즈</text>
  <text x="330" y="535" fill="#94a3b8" font-size="11" text-anchor="middle">게임 퍼블리싱</text>

  <rect x="440" y="485" width="160" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="520" y="512" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">카카오스타일</text>
  <text x="520" y="535" fill="#94a3b8" font-size="11" text-anchor="middle">패션 커머스 (지그재그)</text>

  <rect x="630" y="485" width="160" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="710" y="512" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">카카오헬스케어</text>
  <text x="710" y="535" fill="#94a3b8" font-size="11" text-anchor="middle">의료·건강 플랫폼</text>

  <rect x="820" y="485" width="160" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="900" y="512" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">카카오클라우드</text>
  <text x="900" y="535" fill="#94a3b8" font-size="11" text-anchor="middle">AI · 클라우드 인프라</text>

  <rect x="1010" y="485" width="130" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="1075" y="512" fill="#f1f5f9" font-size="12" font-weight="bold" text-anchor="middle">기타 수십 개</text>
  <text x="1075" y="535" fill="#94a3b8" font-size="11" text-anchor="middle">100+ 연결대상</text>

  <!-- 핵심 메시지 -->
  <rect x="150" y="600" width="900" height="90" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="630" fill="#fbbf24" font-size="16" font-weight="bold" text-anchor="middle">자회사 확장의 구조적 딜레마</text>
  <text x="600" y="655" fill="#f1f5f9" font-size="13" text-anchor="middle">트래픽 독점 → 자회사마다 다른 시장에서 경쟁 → 저마진 사업이 연결 마진을 끌어내림</text>
  <text x="600" y="678" fill="#94a3b8" font-size="12" text-anchor="middle">플랫폼 자체 OPM 20%+ 이지만, 엔터·페이·모빌리티가 합산하면 → 연결 OPM 9%</text>

  <!-- 범례 -->
  <rect x="300" y="730" width="12" height="12" rx="2" fill="#22c55e" opacity="0.5"/>
  <text x="318" y="741" fill="#94a3b8" font-size="12">흑자 기여</text>
  <rect x="430" y="730" width="12" height="12" rx="2" fill="#f59e0b" opacity="0.5"/>
  <text x="448" y="741" fill="#94a3b8" font-size="12">흑자 전환 중</text>
  <rect x="580" y="730" width="12" height="12" rx="2" fill="#ef4444" opacity="0.5"/>
  <text x="598" y="741" fill="#94a3b8" font-size="12">적자/저마진</text>

  <text x="600" y="790" fill="#64748b" font-size="11" text-anchor="middle">2026-04-18 dartlab 실측 기준 | 자회사 마진은 세그먼트 공시 + 개별 사업보고서 추정</text>
</svg>