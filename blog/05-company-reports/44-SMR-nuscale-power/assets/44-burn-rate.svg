<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>뉴스케일파워 현금 소진 시나리오</title>
  <desc>연간 burn rate 대비 잔여 현금 시나리오 3가지</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg2)"/>

  <!-- 타이틀 -->
  <text x="600" y="45" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">현금 소진 시나리오 — $1.25B는 얼마나 버틸 수 있는가</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2025 영업현금흐름 -$348M 기준, 3가지 시나리오</text>

  <!-- Y축 라벨 -->
  <text x="60" y="120" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" transform="rotate(-90 60 350)">잔여 현금 ($B)</text>

  <!-- 그리드 -->
  <line x1="120" y1="100" x2="120" y2="580" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="580" x2="1100" y2="580" stroke="#1e293b" stroke-width="1"/>

  <!-- Y축 눈금 -->
  <text x="105" y="140" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$1.4B</text>
  <line x1="115" y1="140" x2="1100" y2="140" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="105" y="250" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$1.0B</text>
  <line x1="115" y1="250" x2="1100" y2="250" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="105" y="360" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$0.6B</text>
  <line x1="115" y1="360" x2="1100" y2="360" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="105" y="470" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$0.2B</text>
  <line x1="115" y1="470" x2="1100" y2="470" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="105" y="580" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$0</text>

  <!-- X축 눈금 -->
  <text x="120" y="605" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2025</text>
  <text x="365" y="605" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2026</text>
  <text x="610" y="605" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2027</text>
  <text x="855" y="605" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2028</text>
  <text x="1100" y="605" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2029</text>

  <!-- 시나리오 A: 현재 burn rate 유지 ($350M/년) → 2028 중반 고갈 -->
  <polyline points="120,130 365,240 610,350 855,470 950,580" fill="none" stroke="#ef4444" stroke-width="3"/>
  <circle cx="120" cy="130" r="5" fill="#ef4444"/>
  <circle cx="365" cy="240" r="5" fill="#ef4444"/>
  <circle cx="610" cy="350" r="5" fill="#ef4444"/>
  <circle cx="855" cy="470" r="5" fill="#ef4444"/>
  <circle cx="950" cy="580" r="5" fill="#ef4444"/>

  <!-- 시나리오 B: burn rate 절반 ($175M/년) → 2032 -->
  <polyline points="120,130 365,185 610,240 855,295 1100,350" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="120" cy="130" r="5" fill="#fbbf24"/>
  <circle cx="365" cy="185" r="5" fill="#fbbf24"/>
  <circle cx="610" cy="240" r="5" fill="#fbbf24"/>
  <circle cx="855" cy="295" r="5" fill="#fbbf24"/>
  <circle cx="1100" cy="350" r="5" fill="#fbbf24"/>

  <!-- 시나리오 C: 매출 성장 + burn 감소 ($100M/년) -->
  <polyline points="120,130 365,160 610,190 855,220 1100,250" fill="none" stroke="#22c55e" stroke-width="3"/>
  <circle cx="120" cy="130" r="5" fill="#22c55e"/>
  <circle cx="365" cy="160" r="5" fill="#22c55e"/>
  <circle cx="610" cy="190" r="5" fill="#22c55e"/>
  <circle cx="855" cy="220" r="5" fill="#22c55e"/>
  <circle cx="1100" cy="250" r="5" fill="#22c55e"/>

  <!-- 범례 -->
  <rect x="160" y="635" width="300" height="65" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <line x1="175" y1="655" x2="210" y2="655" stroke="#ef4444" stroke-width="3"/>
  <text x="218" y="659" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">A. 현재 burn 유지 ($350M/년) → 2028 중반 고갈</text>
  <line x1="175" y1="675" x2="210" y2="675" stroke="#fbbf24" stroke-width="3"/>
  <text x="218" y="679" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">B. burn 절반 ($175M/년) → 2032년까지</text>
  <line x1="175" y1="695" x2="210" y2="695" stroke="#22c55e" stroke-width="3"/>
  <text x="218" y="699" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">C. 매출 성장 + burn 감소 → 장기 생존</text>

  <!-- 위험선 -->
  <line x1="120" y1="580" x2="1100" y2="580" stroke="#ef4444" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="1080" y="570" text-anchor="end" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">현금 고갈선</text>

  <!-- 핵심 판단 -->
  <rect x="620" y="635" width="460" height="65" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="850" y="660" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">2025 OCF: -$348M (영업현금 유출)</text>
  <text x="850" y="682" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현재 속도면 $1.25B는 3.6년 — 2028~2029년 추가 조달 필요</text>

  <!-- 출처 -->
  <text x="600" y="712" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">dartlab 실측 | NuScale Power 10-K FY2025</text>
</svg>