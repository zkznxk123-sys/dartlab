<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <title>뉴스케일파워 2026~2028 체크포인트</title>
  <desc>투자자가 추적해야 할 5가지 지표</desc>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="960" height="640" fill="url(#bg5)"/>

  <text x="480" y="42" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">2026~2028 체크포인트 — 경제성 증명의 시간</text>
  <text x="480" y="66" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">졸업장은 있다. 취업 여부를 판단하는 5가지 지표</text>

  <!-- 체크포인트 1 -->
  <rect x="60" y="100" width="840" height="80" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="100" cy="140" r="18" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="146" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">1</text>
  <text x="140" y="128" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">첫 원전 건설 착공 여부</text>
  <text x="140" y="150" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현재 착공 확정된 프로젝트 0건. 루마니아 Doicesti, 미국 SRP/UAMPS 후속 —</text>
  <text x="140" y="168" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2027년까지 착공 계약 1건이라도 확정되면 게임 체인저</text>

  <!-- 체크포인트 2 -->
  <rect x="60" y="195" width="840" height="80" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="100" cy="235" r="18" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
  <text x="100" y="241" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2</text>
  <text x="140" y="223" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">현금 소진율 (OCF)</text>
  <text x="140" y="245" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2025 OCF -$348M. 이 속도면 3.6년 후 현금 고갈.</text>
  <text x="140" y="263" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">분기별 OCF 추이 모니터링. -$100M 이하로 줄어야 시간 확보</text>

  <!-- 체크포인트 3 -->
  <rect x="60" y="290" width="840" height="80" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="100" cy="330" r="18" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
  <text x="100" y="336" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">3</text>
  <text x="140" y="318" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">추가 유상증자 / 희석 여부</text>
  <text x="140" y="340" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">현금이 $500M 이하로 떨어지면 추가 조달 불가피. 주당 가치 희석 위험.</text>
  <text x="140" y="358" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2025년 유증으로 발행주식 26% 증가. 추가 희석 시 기존 주주 손실 확대</text>

  <!-- 체크포인트 4 -->
  <rect x="60" y="385" width="840" height="80" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="100" cy="425" r="18" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="431" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">4</text>
  <text x="140" y="413" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">MWh당 발전 단가 (LCOE) 확정</text>
  <text x="140" y="435" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">아이다호 취소 핵심 원인 = 비용 초과. 차기 프로젝트에서 경쟁력 있는 LCOE 제시 필수.</text>
  <text x="140" y="453" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$58/MWh 목표 vs 천연가스 $30~45/MWh — 간극 해소가 경제성 증명의 핵심</text>

  <!-- 체크포인트 5 -->
  <rect x="60" y="480" width="840" height="80" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="100" cy="520" r="18" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="2"/>
  <text x="100" y="526" text-anchor="middle" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">5</text>
  <text x="140" y="508" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">DOE/정부 지원금 연장 여부</text>
  <text x="140" y="530" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">아이다호 프로젝트 DOE $1.35B 지원. 취소로 소멸. 차기 프로젝트에 신규 지원금 확보 필수.</text>
  <text x="140" y="548" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">IRA(인플레이션감축법) + ADVANCE Act 혜택 적용 여부가 LCOE 좌우</text>

  <!-- 하단 결론 -->
  <rect x="160" y="580" width="640" height="40" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="605" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">5가지 중 1, 4번이 결정적. 나머지는 1번이 해결되면 자동으로 풀린다.</text>

  <text x="480" y="635" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">dartlab 실측 | 2026-04-18</text>
</svg>