<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>뉴스케일파워 — 매출 $31M, 현금 $1.25B, 원전 0기</title>
  <desc>NRC 인증 유일 SMR 기업의 7막 서사 흐름도</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- 관통선 -->
  <text x="600" y="52" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" filter="url(#glow)">뉴스케일파워 (SMR) — 관통선</text>
  <text x="600" y="86" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17">"NRC 인증까지 받은 유일한 SMR이 매출의 22배를 태우는 이유"</text>
  <text x="600" y="112" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">기술은 됐지만 경제성은 아직 — 현금 $1.25B는 시간을 산 것이다</text>

  <!-- 중앙 핵심 수치 3개 -->
  <rect x="120" y="140" width="280" height="80" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="260" y="172" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">$31M</text>
  <text x="260" y="202" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">매출 (2025)</text>

  <rect x="460" y="140" width="280" height="80" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="172" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">$1.25B</text>
  <text x="600" y="202" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">현금 (자산의 89%)</text>

  <rect x="800" y="140" width="280" height="80" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="940" y="172" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">-$690M</text>
  <text x="940" y="202" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">영업손실 (매출의 22배)</text>

  <!-- 7막 흐름 -->
  <!-- 1막 -->
  <rect x="40" y="270" width="148" height="110" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="114" y="296" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">1막</text>
  <text x="114" y="316" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">재무의 정체</text>
  <text x="114" y="340" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 $31M</text>
  <text x="114" y="358" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">손실 $690M</text>
  <text x="114" y="374" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">원전 0기</text>

  <!-- 화살표 1→2 -->
  <line x1="188" y1="325" x2="208" y2="325" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2막 -->
  <rect x="210" y="270" width="148" height="110" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="284" y="296" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">2막</text>
  <text x="284" y="316" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">NRC 인증</text>
  <text x="284" y="340" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2020년 설계인증</text>
  <text x="284" y="358" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">세계 유일 SMR</text>
  <text x="284" y="374" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">기술 검증 완료</text>

  <!-- 화살표 2→3 -->
  <line x1="358" y1="325" x2="378" y2="325" stroke="#475569" stroke-width="1.5"/>

  <!-- 3막 -->
  <rect x="380" y="270" width="148" height="110" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="454" y="296" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">3막</text>
  <text x="454" y="316" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">아이다호 취소</text>
  <text x="454" y="340" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">$9.3B 프로젝트</text>
  <text x="454" y="358" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">UAMPS 철수</text>
  <text x="454" y="374" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">첫 고객 소실</text>

  <!-- 화살표 3→4 -->
  <line x1="528" y1="325" x2="548" y2="325" stroke="#475569" stroke-width="1.5"/>

  <!-- 4막 -->
  <rect x="550" y="270" width="148" height="110" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="624" y="296" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">4막</text>
  <text x="624" y="316" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">AI 전력 수요</text>
  <text x="624" y="340" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">데이터센터 폭증</text>
  <text x="624" y="358" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">META 원전 수요</text>
  <text x="624" y="374" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">SMR 부활 서사</text>

  <!-- 화살표 4→5 -->
  <line x1="698" y1="325" x2="718" y2="325" stroke="#475569" stroke-width="1.5"/>

  <!-- 5막 -->
  <rect x="720" y="270" width="148" height="110" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="794" y="296" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">5막</text>
  <text x="794" y="316" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">현금 $1.25B</text>
  <text x="794" y="340" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">자산의 89%</text>
  <text x="794" y="358" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2~3년 런웨이</text>
  <text x="794" y="374" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">시간을 산 회사</text>

  <!-- 화살표 5→6 -->
  <line x1="868" y1="325" x2="888" y2="325" stroke="#475569" stroke-width="1.5"/>

  <!-- 6막 -->
  <rect x="890" y="270" width="148" height="110" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="964" y="296" text-anchor="middle" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">6막</text>
  <text x="964" y="316" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">OKLO 비교</text>
  <text x="964" y="340" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">인증 有 vs 無</text>
  <text x="964" y="358" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">시총 $4B vs $13B</text>
  <text x="964" y="374" text-anchor="middle" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">인증의 가치</text>

  <!-- 7막 (결론) 중앙 하단 -->
  <rect x="380" y="430" width="440" height="100" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="462" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">7막: 졸업장은 있다, 취업은 아직이다</text>
  <text x="600" y="490" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">NRC 인증 = 졸업장 | 상용 원전 건설 = 취업</text>
  <text x="600" y="512" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$1.25B로 취업 기한을 2~3년 더 연장했다</text>

  <!-- 연결선 6막→7막 -->
  <path d="M964 380 L964 410 L820 430" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M114 380 L114 410 L380 430" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 핵심 판단 하단 -->
  <rect x="200" y="570" width="800" height="70" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="600" y="600" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">기술 검증은 끝났다. 경제성 검증은 시작도 하지 않았다.</text>
  <text x="600" y="624" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">R&amp;D $45M/년으로 줄였지만, 매출 $31M으로는 자생이 불가능하다.</text>

  <!-- 하단 출처 -->
  <text x="600" y="700" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">dartlab 실측 | 2026-04-18</text>
</svg>