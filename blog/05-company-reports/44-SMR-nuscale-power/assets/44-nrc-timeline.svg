<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>뉴스케일파워 NRC 인증 타임라인</title>
  <desc>2007년 설립부터 2026년 현재까지 주요 사건</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg3)"/>

  <text x="600" y="45" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">NuScale Power 타임라인 — 설립에서 현재까지</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">NRC 인증 → 아이다호 취소 → AI 전력 수요 → 재기</text>

  <!-- 타임라인 축 -->
  <line x1="80" y1="360" x2="1120" y2="360" stroke="#475569" stroke-width="2"/>

  <!-- 2007 설립 -->
  <circle cx="120" cy="360" r="8" fill="#3b82f6"/>
  <line x1="120" y1="360" x2="120" y2="200" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="50" y="150" width="140" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="120" y="172" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2007</text>
  <text x="120" y="190" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">NuScale 설립</text>

  <!-- 2016 NRC 신청 -->
  <circle cx="280" cy="360" r="8" fill="#a78bfa"/>
  <line x1="280" y1="360" x2="280" y2="440" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="200" y="440" width="160" height="60" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="280" y="462" text-anchor="middle" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2016</text>
  <text x="280" y="480" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">NRC 설계인증 신청</text>
  <text x="280" y="494" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">SMR 최초</text>

  <!-- 2020 NRC 인증 -->
  <circle cx="440" cy="360" r="12" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
  <line x1="440" y1="360" x2="440" y2="180" stroke="#22c55e" stroke-width="2"/>
  <rect x="350" y="120" width="180" height="65" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="440" y="145" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2020</text>
  <text x="440" y="165" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">NRC 설계인증 획득</text>
  <text x="440" y="180" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">세계 유일 SMR 인증</text>

  <!-- 2022 SPAC 상장 -->
  <circle cx="560" cy="360" r="8" fill="#3b82f6"/>
  <line x1="560" y1="360" x2="560" y2="450" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="480" y="450" width="160" height="55" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="560" y="472" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2022.05</text>
  <text x="560" y="490" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">SPAC 합병 → NYSE 상장</text>

  <!-- 2023 아이다호 취소 -->
  <circle cx="700" cy="360" r="12" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <line x1="700" y1="360" x2="700" y2="195" stroke="#ef4444" stroke-width="2"/>
  <rect x="610" y="135" width="180" height="65" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="700" y="158" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2023.11</text>
  <text x="700" y="178" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">아이다호 프로젝트 취소</text>
  <text x="700" y="193" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">$9.3B → 무산, UAMPS 철수</text>

  <!-- 2024 AI 전력 수요 -->
  <circle cx="840" cy="360" r="8" fill="#fbbf24"/>
  <line x1="840" y1="360" x2="840" y2="450" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="755" y="450" width="170" height="65" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="840" y="472" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2024~2025</text>
  <text x="840" y="492" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">AI 전력 수요 폭발</text>
  <text x="840" y="508" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">주가 급등 + 현금 조달</text>

  <!-- 2025 현금 $1.25B -->
  <circle cx="980" cy="360" r="10" fill="#22c55e"/>
  <line x1="980" y1="360" x2="980" y2="210" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="895" y="150" width="170" height="65" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="980" y="172" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2025 말</text>
  <text x="980" y="192" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">현금 $1.25B 확보</text>
  <text x="980" y="208" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">자산의 89%, 유증 + DOE 지원</text>

  <!-- 2026~ 미래 -->
  <circle cx="1080" cy="360" r="6" fill="#475569" stroke="#fbbf24" stroke-width="2"/>
  <line x1="1080" y1="360" x2="1080" y2="440" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="1000" y="440" width="160" height="50" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1080" y="462" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">2026~?</text>
  <text x="1080" y="482" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">첫 원전 착공 미정</text>

  <!-- 하단 요약 -->
  <rect x="200" y="570" width="800" height="60" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="600" y="595" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">19년간의 여정: 설립 → NRC 인증(13년) → 첫 고객 취소 → AI 수요로 제2막</text>
  <text x="600" y="618" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">기술 검증 13년, 경제성 검증 0년 — 졸업장은 받았으나 취업 전</text>

  <text x="600" y="700" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">dartlab 실측 + SEC EDGAR + NRC 공식 자료 | 2026-04-18</text>
</svg>