<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <title>OKLO vs 뉴스케일파워 비교 매트릭스</title>
  <desc>NRC 인증 유무가 만드는 재무·기술·사업 차이</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" fill="url(#bg4)"/>

  <text x="600" y="45" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">OKLO vs NuScale Power — 인증의 가치는 얼마인가</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">같은 SMR이지만 NRC 인증 유무가 모든 것을 바꾼다</text>

  <!-- 헤더 행 -->
  <rect x="80" y="100" width="320" height="55" rx="0" fill="#1e293b"/>
  <text x="240" y="133" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">항목</text>

  <rect x="400" y="100" width="360" height="55" rx="0" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="580" y="126" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">NuScale Power (SMR)</text>
  <text x="580" y="146" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">NRC 인증 보유</text>

  <rect x="760" y="100" width="360" height="55" rx="0" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="940" y="126" text-anchor="middle" fill="#a78bfa" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">Oklo (OKLO)</text>
  <text x="940" y="146" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">NRC 인증 없음 (거절 이력)</text>

  <!-- 행 1: NRC 인증 -->
  <rect x="80" y="155" width="320" height="50" rx="0" fill="#0f172a"/>
  <text x="240" y="185" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">NRC 설계인증</text>
  <rect x="400" y="155" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="580" y="185" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">획득 (2020, 세계 유일)</text>
  <rect x="760" y="155" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="940" y="185" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">미획득 (2022 거절)</text>

  <!-- 행 2: 매출 -->
  <rect x="80" y="205" width="320" height="50" rx="0" fill="#111827"/>
  <text x="240" y="235" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">매출 (2025)</text>
  <rect x="400" y="205" width="360" height="50" rx="0" fill="#111827"/>
  <text x="580" y="235" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$31.5M</text>
  <rect x="760" y="205" width="360" height="50" rx="0" fill="#111827"/>
  <text x="940" y="235" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$0</text>

  <!-- 행 3: 영업손실 -->
  <rect x="80" y="255" width="320" height="50" rx="0" fill="#0f172a"/>
  <text x="240" y="285" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">영업손실 (2025)</text>
  <rect x="400" y="255" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="580" y="285" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">-$689.6M</text>
  <rect x="760" y="255" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="940" y="285" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">-$210.4M</text>

  <!-- 행 4: 현금 -->
  <rect x="80" y="305" width="320" height="50" rx="0" fill="#111827"/>
  <text x="240" y="335" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">현금 + 단기투자</text>
  <rect x="400" y="305" width="360" height="50" rx="0" fill="#111827"/>
  <text x="580" y="335" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$1.25B (자산 89%)</text>
  <rect x="760" y="305" width="360" height="50" rx="0" fill="#111827"/>
  <text x="940" y="335" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">$604M (자산 87%)</text>

  <!-- 행 5: 시총 -->
  <rect x="80" y="355" width="320" height="50" rx="0" fill="#0f172a"/>
  <text x="240" y="385" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">시총 (2026.04)</text>
  <rect x="400" y="355" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="580" y="385" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">~$4B</text>
  <rect x="760" y="355" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="940" y="385" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">~$13B</text>

  <!-- 행 6: 원자로 기술 -->
  <rect x="80" y="405" width="320" height="50" rx="0" fill="#111827"/>
  <text x="240" y="435" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">원자로 기술</text>
  <rect x="400" y="405" width="360" height="50" rx="0" fill="#111827"/>
  <text x="580" y="435" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">경수로 PWR (77MWe 모듈)</text>
  <rect x="760" y="405" width="360" height="50" rx="0" fill="#111827"/>
  <text x="940" y="435" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">고속로 (금속연료, 15MWe)</text>

  <!-- 행 7: 상장 방식 -->
  <rect x="80" y="455" width="320" height="50" rx="0" fill="#0f172a"/>
  <text x="240" y="485" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">상장 방식</text>
  <rect x="400" y="455" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="580" y="485" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">SPAC (Spring Valley, 2022)</text>
  <rect x="760" y="455" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="940" y="485" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">SPAC (Sam Altman, 2024)</text>

  <!-- 행 8: 직원 -->
  <rect x="80" y="505" width="320" height="50" rx="0" fill="#111827"/>
  <text x="240" y="535" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">직원 수</text>
  <rect x="400" y="505" width="360" height="50" rx="0" fill="#111827"/>
  <text x="580" y="535" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">~450명</text>
  <rect x="760" y="505" width="360" height="50" rx="0" fill="#111827"/>
  <text x="940" y="535" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">~120명</text>

  <!-- 행 9: 가동 원자로 -->
  <rect x="80" y="555" width="320" height="50" rx="0" fill="#0f172a"/>
  <text x="240" y="585" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">가동 원자로</text>
  <rect x="400" y="555" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="580" y="585" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">0기</text>
  <rect x="760" y="555" width="360" height="50" rx="0" fill="#0f172a"/>
  <text x="940" y="585" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">0기</text>

  <!-- 핵심 판단 -->
  <rect x="140" y="640" width="920" height="80" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="670" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">핵심 질문: NRC 인증이 있는 NuScale의 시총이 왜 OKLO의 1/3인가?</text>
  <text x="600" y="698" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">NuScale = 매출 有, 인증 有, 시총 $4B | OKLO = 매출 $0, 인증 無, 시총 $13B (Sam Altman + AI 내러티브 프리미엄)</text>

  <text x="600" y="760" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">둘 다 가동 원자로 0기. 차이는 인증과 매출이 아니라 "누가 투자자인가"</text>

  <text x="600" y="800" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">dartlab 실측 | SEC EDGAR | 2026-04-18</text>
</svg>