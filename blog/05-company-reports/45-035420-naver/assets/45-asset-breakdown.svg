<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="45" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">네이버 자산 41조의 구성 — 비영업자산 55%</text>
  <text x="600" y="70" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">검색 광고로 벌어서 자회사·인프라에 투자하는 구조</text>

  <!-- Stacked bar: 41.08조 = 100% -->
  <!-- 영업 21% (8.77조), 투자 41% (16.65조), 현금 15% (5.98조), 기타 24% (9.68조) -->
  <!-- Bar area: x=150~1050, width=900 -->

  <!-- 투자 41% = 369px -->
  <rect x="150" y="120" width="369" height="200" rx="0" fill="#f59e0b" opacity="0.85"/>
  <text x="334" y="200" text-anchor="middle" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">16.6조</text>
  <text x="334" y="228" text-anchor="middle" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">투자 자산 (41%)</text>
  <text x="334" y="250" text-anchor="middle" fill="#451a03" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">종속·관계기업·금융자산</text>
  <text x="334" y="270" text-anchor="middle" fill="#451a03" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Z Holdings, 네이버웹툰, 포시마크...</text>

  <!-- 기타 24% = 216px -->
  <rect x="519" y="120" width="216" height="200" rx="0" fill="#475569"/>
  <text x="627" y="200" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700">9.7조</text>
  <text x="627" y="228" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">기타 (24%)</text>

  <!-- 영업 21% = 189px -->
  <rect x="735" y="120" width="189" height="200" rx="0" fill="#22c55e" opacity="0.85"/>
  <text x="829" y="200" text-anchor="middle" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700">8.8조</text>
  <text x="829" y="228" text-anchor="middle" fill="#0a0e1a" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">영업자산 (21%)</text>
  <text x="829" y="250" text-anchor="middle" fill="#052e16" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출채권+유형+무형</text>

  <!-- 현금 15% = 135px -->
  <rect x="924" y="120" width="126" height="200" rx="0" fill="#3b82f6" opacity="0.85"/>
  <text x="987" y="200" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">6.0조</text>
  <text x="987" y="228" text-anchor="middle" fill="#dbeafe" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">현금 (15%)</text>

  <!-- Detail boxes below -->
  <text x="600" y="370" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">영업자산 8.8조 상세 분해</text>

  <!-- PPE -->
  <rect x="150" y="400" width="250" height="100" rx="10" fill="#1e293b"/>
  <text x="275" y="430" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">3.61조</text>
  <text x="275" y="455" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">유형자산</text>
  <text x="275" y="480" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">데이터센터 (각 세종·각 춘천)</text>

  <!-- Intangibles -->
  <rect x="430" y="400" width="250" height="100" rx="10" fill="#1e293b"/>
  <text x="555" y="430" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">3.42조</text>
  <text x="555" y="455" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">무형자산</text>
  <text x="555" y="480" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">M&amp;A 기술·브랜드·고객관계</text>

  <!-- ROU -->
  <rect x="710" y="400" width="250" height="100" rx="10" fill="#1e293b"/>
  <text x="835" y="430" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">0.92조</text>
  <text x="835" y="455" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">사용권자산</text>
  <text x="835" y="480" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">사무실·장비 리스</text>

  <!-- CAPEX annotation -->
  <rect x="250" y="540" width="700" height="70" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="570" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">2025 CAPEX 1.32조 = 감가상각의 3.66배 → "더 짓겠다"</text>
  <text x="600" y="595" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">AI 인프라 · HyperCLOVA X · 클라우드 확장</text>

  <!-- Badge -->
  <rect x="400" y="650" width="400" height="35" rx="8" fill="#1e293b"/>
  <text x="600" y="673" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">dartlab 플래그: "비영업자산 55% — 지주/투자 성격"</text>

  <title>네이버 자산 41조 구성 — 투자 41%, 영업 21%, 현금 15%, 기타 24%</title>
</svg>