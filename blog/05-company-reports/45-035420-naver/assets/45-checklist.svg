<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <text x="540" y="45" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">네이버 — 2026년에 봐야 할 체크포인트 5가지</text>
  <text x="540" y="70" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">별도 OPM 75%가 유지되는 한, 57%포인트는 "공격적 투자"로 쓰인다</text>

  <!-- 5 checklist items -->
  <!-- Item 1 -->
  <rect x="60" y="100" width="960" height="100" rx="12" fill="#1e293b"/>
  <circle cx="110" cy="150" r="18" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <text x="110" y="156" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">1</text>
  <text x="150" y="137" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">별도 OPM 유지 여부</text>
  <text x="150" y="160" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">AI 검색 전환기에 검색 광고 마진 75%가 유지되는가 — 이 숫자가 전체 투자 구조의 토대</text>
  <text x="150" y="182" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">60% 이상 → 안전 | 50% 이하 → 경고 | 현재: 75.7%</text>

  <!-- Item 2 -->
  <rect x="60" y="215" width="960" height="100" rx="12" fill="#1e293b"/>
  <circle cx="110" cy="265" r="18" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="110" y="271" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2</text>
  <text x="150" y="252" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">CAPEX/감가상각 비율</text>
  <text x="150" y="275" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">3.66배는 공격적 투자 중. 3년 내 매출 전환되지 않으면 ROE 하락</text>
  <text x="150" y="297" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2.0배 이하 → 투자 소화 완료 | 4.0배 이상 → 과잉 투자 경고 | 현재: 3.66배</text>

  <!-- Item 3 -->
  <rect x="60" y="330" width="960" height="100" rx="12" fill="#1e293b"/>
  <circle cx="110" cy="380" r="18" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <text x="110" y="386" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">3</text>
  <text x="150" y="367" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">LY Corporation 지분 변동</text>
  <text x="150" y="390" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">일본 정부·소프트뱅크의 지분 재편 결과 — 지분법이익 4,951억(영업이익의 22%)이 위험</text>
  <text x="150" y="412" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">지분 유지 → 안정 | 희석 → 순이익 25% 감소 시나리오</text>

  <!-- Item 4 -->
  <rect x="60" y="445" width="960" height="100" rx="12" fill="#1e293b"/>
  <circle cx="110" cy="495" r="18" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="110" y="501" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">4</text>
  <text x="150" y="482" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">OCF/영업이익 비율</text>
  <text x="150" y="505" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">현재 140% (3.10조/2.21조) — 장부 이익보다 현금이 더 많이 들어오는 건강한 구조</text>
  <text x="150" y="527" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">100% 이상 → 건강 | 100% 미만 → 현금 창출력 약화 신호</text>

  <!-- Item 5 -->
  <rect x="60" y="560" width="960" height="100" rx="12" fill="#1e293b"/>
  <circle cx="110" cy="610" r="18" fill="none" stroke="#a855f7" stroke-width="2.5"/>
  <text x="110" y="616" text-anchor="middle" fill="#a855f7" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">5</text>
  <text x="150" y="597" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">클라우드·AI 매출 별도 공시</text>
  <text x="150" y="620" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">현재 세그먼트 분리 미흡 — AI/클라우드 매출이 별도 공시되면 성장 판단 근거</text>
  <text x="150" y="642" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">HyperCLOVA X 기업 고객 매출, 큐:(Cue:) 검색 전환율</text>

  <!-- Bottom badge -->
  <rect x="280" y="680" width="520" height="30" rx="8" fill="#1e293b"/>
  <text x="540" y="700" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">dCR-AA · 부채비율 42% · 순현금 4.6조 · 2026-04-18 dartlab 실측</text>

  <title>네이버 투자 체크포인트 5가지 — 별도 OPM, CAPEX, LY Corp, OCF, AI 매출</title>
</svg>