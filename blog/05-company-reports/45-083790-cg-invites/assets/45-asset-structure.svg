<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>CG인바이츠 자산 구조 — 자산 2,241억인데 매출 274억, 자산의 정체는</title>
  <desc>자산 2,241억 중 무형자산과 개발비의 비중을 분해. 매출 대비 자산 회전율이 극히 낮은 구조의 원인</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg4)"/>

  <text x="600" y="45" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">자산 2,241억의 정체 — 왜 매출은 274억뿐인가</text>
  <text x="600" y="72" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">자산회전율 0.12회 — 자산이 매출을 거의 만들지 못하고 있다. 자산의 실체를 분해한다.</text>

  <!-- 좌측: 자산 파이 분해 -->
  <rect x="40" y="100" width="520" height="560" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="300" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">자산 구성 추정 (2025, 억원)</text>
  <text x="300" y="165" text-anchor="middle" font-size="13" fill="#64748b">총자산 2,241억 중 매출을 직접 만드는 자산은 얼마인가</text>

  <!-- 스택 바 -->
  <rect x="80" y="200" width="440" height="60" rx="8" fill="#3b82f6" opacity="0.7"/>
  <text x="300" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">무형자산 + 개발비 — 게임 IP의 장부가치</text>
  <text x="500" y="220" text-anchor="end" font-size="12" fill="#94a3b8">(추정 30~50%)</text>

  <rect x="80" y="270" width="300" height="50" rx="8" fill="#22c55e" opacity="0.6"/>
  <text x="230" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">현금 + 단기금융자산</text>
  <text x="365" y="295" text-anchor="end" font-size="12" fill="#94a3b8">(유동성)</text>

  <rect x="80" y="330" width="250" height="50" rx="8" fill="#f59e0b" opacity="0.6"/>
  <text x="205" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">투자자산 (종속기업·관계기업)</text>

  <rect x="80" y="390" width="150" height="50" rx="8" fill="#64748b" opacity="0.6"/>
  <text x="155" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">유형자산 + 기타</text>

  <!-- 핵심 지적 -->
  <rect x="80" y="470" width="440" height="120" rx="8" fill="#0a0e1a" stroke="#ef4444" stroke-width="1"/>
  <text x="300" y="500" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">개발비 자산화의 위험</text>
  <text x="100" y="530" font-size="12" fill="#f1f5f9">게임 개발에 쓴 돈을 비용이 아닌 자산으로 장부에 쌓는다.</text>
  <text x="100" y="550" font-size="12" fill="#f1f5f9">출시 성공 → 매출로 회수. 출시 실패 → 일괄 상각 = 대규모 손실.</text>
  <text x="100" y="575" font-size="12" fill="#f59e0b">2023~2024 적자 500+억의 일부가 이 상각일 가능성.</text>

  <!-- 우측: 자산회전율 비교 -->
  <rect x="600" y="100" width="560" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="880" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">자산회전율 비교 — "자산 1원이 매출을 얼마나 만드나"</text>

  <text x="620" y="180" font-size="12" fill="#64748b">CG인바이츠</text>
  <rect x="780" y="168" width="24" height="18" rx="3" fill="#ef4444"/>
  <text x="812" y="182" font-size="13" font-weight="700" fill="#ef4444">0.12회</text>

  <text x="620" y="215" font-size="12" fill="#64748b">크래프톤</text>
  <rect x="780" y="203" width="130" height="18" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="918" y="217" font-size="13" fill="#22c55e">0.65회</text>

  <text x="620" y="250" font-size="12" fill="#64748b">카카오</text>
  <rect x="780" y="238" width="58" height="18" rx="3" fill="#3b82f6" opacity="0.7"/>
  <text x="846" y="252" font-size="13" fill="#3b82f6">0.29회</text>

  <text x="620" y="285" font-size="12" fill="#64748b">네이버</text>
  <rect x="780" y="273" width="80" height="18" rx="3" fill="#3b82f6" opacity="0.7"/>
  <text x="868" y="287" font-size="13" fill="#3b82f6">0.40회</text>

  <text x="620" y="320" font-size="12" fill="#64748b">제조업 평균</text>
  <rect x="780" y="308" width="200" height="18" rx="3" fill="#22c55e" opacity="0.5"/>
  <text x="988" y="322" font-size="13" fill="#22c55e">1.0~1.5회</text>

  <text x="880" y="360" text-anchor="middle" font-size="12" fill="#94a3b8">자산회전율 = 매출 ÷ 총자산. 0.12회 = 자산이 거의 놀고 있다.</text>

  <!-- 우측 하단: 개발비 사이클 -->
  <rect x="600" y="400" width="560" height="300" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="880" y="440" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">게임사 개발비 사이클</text>

  <!-- 흐름도 -->
  <rect x="640" y="470" width="140" height="50" rx="8" fill="#3b82f6" opacity="0.5"/>
  <text x="710" y="500" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">개발비 투입</text>

  <line x1="780" y1="495" x2="820" y2="495" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="800" y="485" text-anchor="middle" font-size="10" fill="#64748b">자산화</text>

  <rect x="820" y="470" width="140" height="50" rx="8" fill="#f59e0b" opacity="0.5"/>
  <text x="890" y="500" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">무형자산 적재</text>

  <line x1="960" y1="495" x2="1000" y2="495" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="980" y="485" text-anchor="middle" font-size="10" fill="#64748b">출시</text>

  <!-- 분기 -->
  <rect x="1000" y="460" width="130" height="30" rx="6" fill="#22c55e" opacity="0.5"/>
  <text x="1065" y="480" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">성공 → 매출 회수</text>

  <rect x="1000" y="500" width="130" height="30" rx="6" fill="#ef4444" opacity="0.5"/>
  <text x="1065" y="520" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">실패 → 일괄 상각</text>

  <!-- 하단 설명 -->
  <text x="880" y="570" text-anchor="middle" font-size="14" fill="#f1f5f9">CG인바이츠의 자산 2,241억 중 상당 부분이</text>
  <text x="880" y="595" text-anchor="middle" font-size="14" fill="#f1f5f9">"아직 출시 안 한 게임"의 개발비일 가능성</text>
  <text x="880" y="630" text-anchor="middle" font-size="13" fill="#f59e0b">이 자산이 매출로 전환되지 않으면</text>
  <text x="880" y="655" text-anchor="middle" font-size="13" fill="#ef4444">상각 → 자본 급감 → 자본잠식 가속</text>

  <text x="880" y="690" text-anchor="middle" font-size="12" fill="#64748b">매출 274억 반등이 이 자산의 "실현"인지가 핵심 판단 포인트</text>
</svg>