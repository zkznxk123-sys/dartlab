<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <title>CG인바이츠 자본잠식 경고 신호 카드 — 2026년에 봐야 할 5가지 지표</title>
  <desc>자본잠식 진입 여부를 판별하는 5가지 체크포인트. 각 지표의 현재 수치와 임계값을 카드 형태로 배치</desc>
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="720" fill="url(#bg6)"/>

  <text x="540" y="45" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">2026년에 봐야 할 5가지 — 자본잠식 경계 모니터링</text>
  <text x="540" y="72" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">현재 자본 1,187억. 이 중 하나라도 악화되면 자본잠식 진입 가속.</text>

  <!-- 카드 1 -->
  <rect x="40" y="110" width="310" height="260" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="195" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#ef4444">1. 분기 매출 추이</text>
  <line x1="60" y1="160" x2="330" y2="160" stroke="#334155" stroke-width="1"/>
  <text x="195" y="190" text-anchor="middle" font-size="28" font-weight="700" fill="#fbbf24">274억</text>
  <text x="195" y="215" text-anchor="middle" font-size="13" fill="#94a3b8">2025년 연간 (전년 73억)</text>
  <text x="60" y="250" font-size="12" fill="#f1f5f9">2026 상반기 매출이 150억+ 유지하면</text>
  <text x="60" y="270" font-size="12" fill="#22c55e">신작 효과 지속 신호</text>
  <text x="60" y="300" font-size="12" fill="#f1f5f9">100억 미만으로 회귀하면</text>
  <text x="60" y="320" font-size="12" fill="#ef4444">2021~2024 패턴 반복 = 위험</text>
  <text x="195" y="355" text-anchor="middle" font-size="11" fill="#64748b">임계값: 분기 50억 이하 = 적신호</text>

  <!-- 카드 2 -->
  <rect x="385" y="110" width="310" height="260" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#f59e0b">2. 영업이익 흑자전환</text>
  <line x1="405" y1="160" x2="675" y2="160" stroke="#334155" stroke-width="1"/>
  <text x="540" y="190" text-anchor="middle" font-size="28" font-weight="700" fill="#ef4444">-238억</text>
  <text x="540" y="215" text-anchor="middle" font-size="13" fill="#94a3b8">2025년 영업이익 (OPM -87%)</text>
  <text x="405" y="250" font-size="12" fill="#f1f5f9">매출 400억+ 달성 시 흑자전환 가능성</text>
  <text x="405" y="280" font-size="12" fill="#f1f5f9">2024년 대비 적자 폭 39% 축소는</text>
  <text x="405" y="300" font-size="12" fill="#f59e0b">방향은 맞지만 속도가 충분한지 확인</text>
  <text x="540" y="355" text-anchor="middle" font-size="11" fill="#64748b">임계값: 분기 OPM 0%+ 달성 여부</text>

  <!-- 카드 3 -->
  <rect x="730" y="110" width="310" height="260" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="885" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#3b82f6">3. 유상증자 공시</text>
  <line x1="750" y1="160" x2="1020" y2="160" stroke="#334155" stroke-width="1"/>
  <text x="885" y="195" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">주주 희석</text>
  <text x="885" y="225" text-anchor="middle" font-size="13" fill="#94a3b8">추가 유상증자 여부가 핵심</text>
  <text x="750" y="260" font-size="12" fill="#f1f5f9">2024년에도 유상증자 실시</text>
  <text x="750" y="280" font-size="12" fill="#f1f5f9">→ 기존 주주 지분 희석</text>
  <text x="750" y="310" font-size="12" fill="#f1f5f9">2026년 추가 증자 공시가 나오면</text>
  <text x="750" y="330" font-size="12" fill="#ef4444">"자체 생존 불가" 신호</text>
  <text x="885" y="355" text-anchor="middle" font-size="11" fill="#64748b">임계: 1년 내 재증자 = 위험 확대</text>

  <!-- 카드 4 -->
  <rect x="40" y="400" width="310" height="290" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="195" y="435" text-anchor="middle" font-size="16" font-weight="700" fill="#22c55e">4. 현금 보유량</text>
  <line x1="60" y1="450" x2="330" y2="450" stroke="#334155" stroke-width="1"/>
  <text x="195" y="485" text-anchor="middle" font-size="13" fill="#94a3b8">현금 및 현금성자산 추이</text>
  <text x="60" y="520" font-size="12" fill="#f1f5f9">매출 반등해도 현금이 줄고 있으면</text>
  <text x="60" y="540" font-size="12" fill="#f1f5f9">운전자본이나 투자에 소진 중</text>
  <text x="60" y="575" font-size="12" fill="#f1f5f9">분기보고서에서 확인할 것:</text>
  <text x="60" y="600" font-size="12" fill="#fbbf24">- 현금흐름표 영업CF 부호</text>
  <text x="60" y="620" font-size="12" fill="#fbbf24">- 현금 잔액 전분기 대비 증감</text>
  <text x="60" y="640" font-size="12" fill="#fbbf24">- 단기차입금 증가 여부</text>
  <text x="195" y="675" text-anchor="middle" font-size="11" fill="#64748b">임계: 현금 100억 미만 = 유동성 위기</text>

  <!-- 카드 5 -->
  <rect x="385" y="400" width="310" height="290" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="435" text-anchor="middle" font-size="16" font-weight="700" fill="#ef4444">5. 무형자산 상각</text>
  <line x1="405" y1="450" x2="675" y2="450" stroke="#334155" stroke-width="1"/>
  <text x="540" y="485" text-anchor="middle" font-size="13" fill="#94a3b8">개발비 + 무형자산 감소 여부</text>
  <text x="405" y="520" font-size="12" fill="#f1f5f9">개발비가 급감하면:</text>
  <text x="405" y="545" font-size="12" fill="#ef4444">→ 게임 출시 실패로 일괄 상각</text>
  <text x="405" y="570" font-size="12" fill="#ef4444">→ 자본 급감 = 잠식 가속</text>
  <text x="405" y="605" font-size="12" fill="#f1f5f9">개발비가 유지/증가하면:</text>
  <text x="405" y="630" font-size="12" fill="#f59e0b">→ 아직 출시 전 게임 존재</text>
  <text x="405" y="650" font-size="12" fill="#f59e0b">→ 미래 매출 후보이자 미래 리스크</text>
  <text x="540" y="675" text-anchor="middle" font-size="11" fill="#64748b">임계: 전년 대비 30%+ 감소 = 상각 발생</text>

  <!-- 종합 판단 박스 -->
  <rect x="730" y="400" width="310" height="290" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="885" y="435" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">종합 판단</text>
  <line x1="750" y1="450" x2="1020" y2="450" stroke="#334155" stroke-width="1"/>

  <text x="750" y="485" font-size="13" fill="#22c55e">긍정 시나리오</text>
  <text x="750" y="510" font-size="12" fill="#f1f5f9">매출 400억+ 유지 + OPM 흑자전환</text>
  <text x="750" y="530" font-size="12" fill="#f1f5f9">+ 유상증자 없음 = 진짜 턴어라운드</text>

  <line x1="750" y1="550" x2="1020" y2="550" stroke="#334155" stroke-width="1"/>

  <text x="750" y="575" font-size="13" fill="#f59e0b">중립 시나리오</text>
  <text x="750" y="600" font-size="12" fill="#f1f5f9">매출 200~300억 유지, 적자 지속</text>
  <text x="750" y="620" font-size="12" fill="#f1f5f9">= 느린 자본 소진, 3~5년 여유</text>

  <line x1="750" y1="640" x2="1020" y2="640" stroke="#334155" stroke-width="1"/>

  <text x="750" y="665" font-size="13" fill="#ef4444">부정 시나리오</text>
  <text x="750" y="685" font-size="12" fill="#f1f5f9">매출 100억 미만 회귀 + 재증자</text>
  <text x="750" y="705" font-size="12" fill="#ef4444">= 자본잠식 2~3년 내 현실화</text>
</svg>