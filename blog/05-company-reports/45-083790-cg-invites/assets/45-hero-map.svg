<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>CG인바이츠 핵심 구조 — 7년 연속 적자인데 자본잠식 없이 살아있는 이유</title>
  <desc>매출 73억에서 274억 반등, 그러나 누적적자 2,200억 이상. 자본 감소 추이와 생존 메커니즘을 한 눈에 보여주는 구조도</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- 타이틀 -->
  <text x="600" y="50" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">CG인바이츠 (083790) — 7년 적자 생존의 구조</text>
  <text x="600" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#64748b">매출 424억 → 73억 → 274억, 누적적자 2,200억+에도 자본잠식은 아닌 이유</text>

  <!-- 좌측: 매출 궤적 -->
  <rect x="40" y="110" width="350" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="215" y="145" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#fbbf24">매출 궤적 (억원)</text>

  <!-- 매출 바 차트 -->
  <rect x="70" y="275" width="35" height="42" rx="3" fill="#22c55e" opacity="0.8"/>
  <text x="87" y="270" text-anchor="middle" font-size="11" fill="#94a3b8">139</text>
  <text x="87" y="370" text-anchor="middle" font-size="10" fill="#64748b">2018</text>

  <rect x="115" y="275" width="35" height="42" rx="3" fill="#22c55e" opacity="0.8"/>
  <text x="132" y="270" text-anchor="middle" font-size="11" fill="#94a3b8">140</text>
  <text x="132" y="370" text-anchor="middle" font-size="10" fill="#64748b">2019</text>

  <rect x="160" y="195" width="35" height="122" rx="3" fill="#22c55e" opacity="0.9"/>
  <text x="177" y="190" text-anchor="middle" font-size="11" fill="#94a3b8">302</text>
  <text x="177" y="370" text-anchor="middle" font-size="10" fill="#64748b">2020</text>

  <rect x="205" y="160" width="35" height="157" rx="3" fill="#22c55e"/>
  <text x="222" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">424</text>
  <text x="222" y="370" text-anchor="middle" font-size="10" fill="#64748b">2021</text>

  <rect x="250" y="190" width="35" height="127" rx="3" fill="#f59e0b" opacity="0.8"/>
  <text x="267" y="185" text-anchor="middle" font-size="11" fill="#94a3b8">386</text>
  <text x="267" y="370" text-anchor="middle" font-size="10" fill="#64748b">2022</text>

  <rect x="295" y="295" width="35" height="22" rx="3" fill="#ef4444" opacity="0.8"/>
  <text x="312" y="290" text-anchor="middle" font-size="11" fill="#ef4444">82</text>
  <text x="312" y="370" text-anchor="middle" font-size="10" fill="#64748b">2023</text>

  <rect x="340" y="300" width="35" height="17" rx="3" fill="#ef4444"/>
  <text x="357" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">73</text>
  <text x="357" y="370" text-anchor="middle" font-size="10" fill="#64748b">2024</text>

  <!-- 2025 반등 강조 -->
  <rect x="60" y="385" width="320" height="0" fill="none"/>
  <line x1="340" y1="308" x2="365" y2="230" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="355" y="210" width="35" height="107" rx="3" fill="url(#yellowGrad)"/>
  <text x="372" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">274</text>
  <text x="372" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#fbbf24">2025</text>

  <!-- 중앙: 핵심 질문 -->
  <rect x="420" y="110" width="360" height="130" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#fbbf24">핵심 질문</text>
  <text x="600" y="180" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#f1f5f9">누적 적자 2,200억+, 매출 73억까지 추락해도</text>
  <text x="600" y="205" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#f1f5f9">자본잠식 없이 살아있는 비결은?</text>
  <text x="600" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b">그리고 2025년 매출 4배 반등은 진짜인가</text>

  <!-- 중앙 하단: 생존 메커니즘 3요소 -->
  <rect x="420" y="260" width="115" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="477" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">유상증자</text>
  <text x="477" y="315" text-anchor="middle" font-size="11" fill="#94a3b8">외부 자본</text>
  <text x="477" y="335" text-anchor="middle" font-size="11" fill="#94a3b8">수혈로</text>
  <text x="477" y="355" text-anchor="middle" font-size="11" fill="#94a3b8">적자 버팀</text>

  <rect x="543" y="260" width="115" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">무형자산</text>
  <text x="600" y="315" text-anchor="middle" font-size="11" fill="#94a3b8">게임 IP·</text>
  <text x="600" y="335" text-anchor="middle" font-size="11" fill="#94a3b8">개발비가</text>
  <text x="600" y="355" text-anchor="middle" font-size="11" fill="#94a3b8">자산의 핵심</text>

  <rect x="666" y="260" width="115" height="130" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="723" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">신작 출시</text>
  <text x="723" y="315" text-anchor="middle" font-size="11" fill="#94a3b8">2025 매출</text>
  <text x="723" y="335" text-anchor="middle" font-size="11" fill="#94a3b8">274억은</text>
  <text x="723" y="355" text-anchor="middle" font-size="11" fill="#94a3b8">신작 효과?</text>

  <!-- 우측: 자본 감소 경고 -->
  <rect x="810" y="110" width="350" height="280" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="985" y="145" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#ef4444">자본 잠식 경로 (억원)</text>

  <!-- 자본 감소 바 -->
  <rect x="840" y="170" width="290" height="40" rx="6" fill="#22c55e" opacity="0.3"/>
  <rect x="840" y="170" width="290" height="40" rx="6" fill="#22c55e" opacity="0.6"/>
  <text x="850" y="195" font-size="13" font-weight="700" fill="#f1f5f9">2022  자본 1,934억</text>

  <rect x="840" y="220" width="220" height="40" rx="6" fill="#f59e0b" opacity="0.5"/>
  <text x="850" y="245" font-size="13" font-weight="700" fill="#f1f5f9">2023  자본 1,453억</text>

  <rect x="840" y="270" width="183" height="40" rx="6" fill="#f59e0b" opacity="0.7"/>
  <text x="850" y="295" font-size="13" font-weight="700" fill="#f1f5f9">2024  자본 1,208억</text>

  <rect x="840" y="320" width="179" height="40" rx="6" fill="#ef4444" opacity="0.7"/>
  <text x="850" y="345" font-size="13" font-weight="700" fill="#f1f5f9">2025  자본 1,187억</text>

  <!-- 하단: 신용등급 + 투자 체크포인트 -->
  <rect x="40" y="420" width="250" height="280" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="165" y="460" text-anchor="middle" font-size="42" font-weight="700" fill="#ef4444">BB</text>
  <text x="165" y="490" text-anchor="middle" font-size="14" fill="#64748b">dartlab 신용등급 (dCR)</text>
  <text x="165" y="520" text-anchor="middle" font-size="14" fill="#f59e0b">투기등급</text>
  <text x="165" y="555" text-anchor="middle" font-size="12" fill="#94a3b8">재무건전성 59 / 100</text>
  <text x="165" y="580" text-anchor="middle" font-size="12" fill="#94a3b8">영업이익 7년 연속 적자</text>
  <text x="165" y="605" text-anchor="middle" font-size="12" fill="#94a3b8">이자보상배율 음수</text>
  <text x="165" y="640" text-anchor="middle" font-size="12" fill="#94a3b8">자본 3년 연속 감소</text>
  <text x="165" y="670" text-anchor="middle" font-size="12" fill="#ef4444">자본잠식 진입 경계</text>

  <!-- 하단 중앙: 6막 구조 -->
  <rect x="310" y="420" width="570" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="595" y="455" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">6막 구조 — 인과의 흐름</text>

  <text x="330" y="490" font-size="12" font-weight="700" fill="#fbbf24">1막</text>
  <text x="360" y="490" font-size="12" fill="#f1f5f9">유일한 흑자 2018 → 7년 적자의 시작</text>

  <text x="330" y="520" font-size="12" font-weight="700" fill="#fbbf24">2막</text>
  <text x="360" y="520" font-size="12" fill="#f1f5f9">매출 424→73억 — 주력 게임이 꺼졌다</text>

  <text x="330" y="550" font-size="12" font-weight="700" fill="#fbbf24">3막</text>
  <text x="360" y="550" font-size="12" fill="#f1f5f9">적자인데 왜 안 죽나 — 유상증자와 자본 구조</text>

  <text x="330" y="580" font-size="12" font-weight="700" fill="#fbbf24">4막</text>
  <text x="360" y="580" font-size="12" fill="#f1f5f9">자산 2,241억의 정체 — 무형자산과 개발비</text>

  <text x="330" y="610" font-size="12" font-weight="700" fill="#fbbf24">5막</text>
  <text x="360" y="610" font-size="12" fill="#f1f5f9">2025년 매출 274억 반등 — 진짜인가</text>

  <text x="330" y="640" font-size="12" font-weight="700" fill="#fbbf24">6막</text>
  <text x="360" y="640" font-size="12" fill="#f1f5f9">자본잠식 경계에 선 턴어라운드 판단</text>

  <line x1="340" y1="500" x2="340" y2="645" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 하단 우측: 핵심 지표 -->
  <rect x="900" y="420" width="260" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1030" y="455" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">핵심 지표</text>

  <text x="920" y="490" font-size="12" fill="#64748b">매출 반등</text>
  <text x="1140" y="490" text-anchor="end" font-size="14" font-weight="700" fill="#fbbf24">73 → 274억 (3.8×)</text>

  <text x="920" y="525" font-size="12" fill="#64748b">영업이익률</text>
  <text x="1140" y="525" text-anchor="end" font-size="14" font-weight="700" fill="#ef4444">-87% (2025)</text>

  <text x="920" y="560" font-size="12" fill="#64748b">누적 순손실</text>
  <text x="1140" y="560" text-anchor="end" font-size="14" font-weight="700" fill="#ef4444">~2,200억+</text>

  <text x="920" y="595" font-size="12" fill="#64748b">자본 잔액</text>
  <text x="1140" y="595" text-anchor="end" font-size="14" font-weight="700" fill="#f59e0b">1,187억</text>

  <text x="920" y="630" font-size="12" fill="#64748b">자산 대비 매출</text>
  <text x="1140" y="630" text-anchor="end" font-size="14" font-weight="700" fill="#64748b">12% (극히 낮음)</text>

  <text x="920" y="665" font-size="12" fill="#64748b">dCR 등급</text>
  <text x="1140" y="665" text-anchor="end" font-size="14" font-weight="700" fill="#ef4444">BB (투기등급)</text>
</svg>