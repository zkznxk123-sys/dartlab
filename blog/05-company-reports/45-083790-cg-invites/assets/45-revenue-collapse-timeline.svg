<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>CG인바이츠 매출 궤적 — 424억 정점에서 73억 바닥, 274억 반등까지</title>
  <desc>2018~2025 매출과 영업이익률 추이. 주력 게임 수명 주기와 신작 출시의 연관성을 시간선으로 표현</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg2)"/>

  <text x="600" y="45" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">매출 궤적과 게임 수명주기</text>
  <text x="600" y="72" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">매출 424억 정점(2021) → 73억 바닥(2024) → 274억 반등(2025) — 무슨 게임이 켜지고 꺼졌는가</text>

  <!-- 축 -->
  <line x1="100" y1="550" x2="1100" y2="550" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="550" stroke="#334155" stroke-width="1"/>

  <!-- Y축 라벨 -->
  <text x="85" y="550" text-anchor="end" font-size="11" fill="#64748b">0</text>
  <text x="85" y="440" text-anchor="end" font-size="11" fill="#64748b">100</text>
  <text x="85" y="330" text-anchor="end" font-size="11" fill="#64748b">200</text>
  <text x="85" y="220" text-anchor="end" font-size="11" fill="#64748b">300</text>
  <text x="85" y="110" text-anchor="end" font-size="11" fill="#64748b">400+</text>
  <text x="40" y="330" text-anchor="middle" font-size="12" fill="#94a3b8" transform="rotate(-90,40,330)">매출 (억원)</text>

  <!-- 그리드 -->
  <line x1="100" y1="440" x2="1100" y2="440" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="330" x2="1100" y2="330" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="220" x2="1100" y2="220" stroke="#1e293b" stroke-width="1"/>

  <!-- X축 라벨 -->
  <text x="175" y="575" text-anchor="middle" font-size="12" fill="#94a3b8">2018</text>
  <text x="300" y="575" text-anchor="middle" font-size="12" fill="#94a3b8">2019</text>
  <text x="425" y="575" text-anchor="middle" font-size="12" fill="#94a3b8">2020</text>
  <text x="550" y="575" text-anchor="middle" font-size="12" fill="#94a3b8">2021</text>
  <text x="675" y="575" text-anchor="middle" font-size="12" fill="#94a3b8">2022</text>
  <text x="800" y="575" text-anchor="middle" font-size="12" fill="#94a3b8">2023</text>
  <text x="925" y="575" text-anchor="middle" font-size="12" fill="#94a3b8">2024</text>
  <text x="1050" y="575" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">2025</text>

  <!-- 매출 바 -->
  <rect x="150" y="397" width="50" height="153" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="175" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">139</text>

  <rect x="275" y="396" width="50" height="154" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="300" y="389" text-anchor="middle" font-size="13" fill="#94a3b8">140</text>

  <rect x="400" y="218" width="50" height="332" rx="4" fill="#3b82f6" opacity="0.7"/>
  <text x="425" y="211" text-anchor="middle" font-size="13" fill="#3b82f6">302</text>

  <rect x="525" y="084" width="50" height="466" rx="4" fill="#3b82f6"/>
  <text x="550" y="077" text-anchor="middle" font-size="15" font-weight="700" fill="#22c55e">424</text>

  <rect x="650" y="126" width="50" height="424" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="675" y="119" text-anchor="middle" font-size="13" fill="#f59e0b">386</text>

  <rect x="775" y="460" width="50" height="90" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="800" y="453" text-anchor="middle" font-size="13" fill="#ef4444">82</text>

  <rect x="900" y="470" width="50" height="80" rx="4" fill="#ef4444"/>
  <text x="925" y="463" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">73</text>

  <rect x="1025" y="249" width="50" height="301" rx="4" fill="#fbbf24"/>
  <text x="1050" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">274</text>

  <!-- 이벤트 주석 -->
  <rect x="130" y="600" width="170" height="50" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="215" y="620" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">유일한 흑자 구간</text>
  <text x="215" y="638" text-anchor="middle" font-size="10" fill="#94a3b8">OPM 13% (기존 IP 수확)</text>

  <rect x="380" y="600" width="230" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="495" y="620" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">주력 게임 성장기</text>
  <text x="495" y="638" text-anchor="middle" font-size="10" fill="#94a3b8">신규 게임 출시 효과로 매출 3배</text>

  <rect x="730" y="600" width="210" height="50" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="835" y="620" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">주력 게임 소멸</text>
  <text x="835" y="638" text-anchor="middle" font-size="10" fill="#94a3b8">매출 82% 급감, 73억 바닥</text>

  <rect x="990" y="600" width="150" height="50" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="1065" y="620" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">반등?</text>
  <text x="1065" y="638" text-anchor="middle" font-size="10" fill="#94a3b8">신작 출시 효과</text>

  <!-- OPM 라인 (우측 Y축) -->
  <text x="1160" y="330" text-anchor="middle" font-size="12" fill="#94a3b8" transform="rotate(90,1160,330)">OPM (%)</text>
  <text x="1120" y="550" text-anchor="start" font-size="10" fill="#64748b">-500%</text>
  <text x="1120" y="440" text-anchor="start" font-size="10" fill="#64748b">-250%</text>
  <text x="1120" y="330" text-anchor="start" font-size="10" fill="#64748b">0%</text>

  <!-- OPM 점들 -->
  <circle cx="175" cy="316" r="5" fill="#fbbf24"/>
  <text x="175" y="306" text-anchor="middle" font-size="10" font-weight="700" fill="#fbbf24">13%</text>

  <circle cx="300" cy="375" r="4" fill="#ef4444"/>
  <circle cx="425" cy="363" r="4" fill="#ef4444"/>
  <circle cx="550" cy="344" r="4" fill="#ef4444"/>
  <circle cx="675" cy="463" r="4" fill="#ef4444"/>
  <circle cx="800" cy="535" r="5" fill="#ef4444"/>
  <text x="800" y="525" text-anchor="middle" font-size="10" fill="#ef4444">-383%</text>
  <circle cx="925" cy="550" r="5" fill="#ef4444"/>
  <text x="925" y="540" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">-535%</text>
  <circle cx="1050" cy="400" r="5" fill="#f59e0b"/>
  <text x="1050" y="390" text-anchor="middle" font-size="10" font-weight="700" fill="#f59e0b">-87%</text>

  <!-- OPM 연결선 -->
  <polyline points="175,316 300,375 425,363 550,344 675,463 800,535 925,550 1050,400" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 범례 -->
  <rect x="100" y="670" width="12" height="12" rx="2" fill="#22c55e"/>
  <text x="118" y="681" font-size="11" fill="#94a3b8">매출 (억원)</text>
  <circle cx="215" cy="676" r="4" fill="#fbbf24"/>
  <text x="225" y="681" font-size="11" fill="#94a3b8">영업이익률 (%)</text>
</svg>