<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <title>CG인바이츠 적자 생존 메커니즘 — 유상증자 + 자본 소진 구조</title>
  <desc>7년 연속 적자에도 자본잠식 미진입. 유상증자로 자본을 채우고 적자로 까이는 반복 구조를 비교 매트릭스로 분해</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" fill="url(#bg3)"/>

  <text x="600" y="45" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">적자 생존 메커니즘 — 유상증자가 적자를 메우는 구조</text>
  <text x="600" y="72" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">매년 순손실이 자본을 깎고, 유상증자가 자본을 채우는 반복. 이 사이클이 멈추면?</text>

  <!-- 자본 워터폴 -->
  <rect x="50" y="100" width="1100" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="135" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">자본총계 워터폴 (억원)</text>

  <!-- 2022 시작 -->
  <rect x="110" y="170" width="110" height="200" rx="6" fill="#22c55e" opacity="0.7"/>
  <text x="165" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">1,934</text>
  <text x="165" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2022</text>

  <!-- 순손실 -->
  <rect x="240" y="298" width="80" height="72" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="280" y="340" text-anchor="middle" font-size="11" fill="#f1f5f9">순손실</text>
  <text x="280" y="356" text-anchor="middle" font-size="11" fill="#f1f5f9">-500</text>
  <line x1="220" y1="270" x2="240" y2="298" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 2023 -->
  <rect x="340" y="220" width="110" height="150" rx="6" fill="#22c55e" opacity="0.5"/>
  <text x="395" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">1,453</text>
  <text x="395" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2023</text>
  <text x="395" y="410" text-anchor="middle" font-size="10" fill="#ef4444">-481 감소</text>

  <!-- 순손실 + 유상증자 -->
  <rect x="470" y="298" width="80" height="72" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="510" y="325" text-anchor="middle" font-size="11" fill="#f1f5f9">순손실</text>
  <text x="510" y="341" text-anchor="middle" font-size="11" fill="#f1f5f9">-518</text>
  <rect x="470" y="220" width="80" height="60" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="510" y="248" text-anchor="middle" font-size="11" fill="#f1f5f9">유상증자</text>
  <text x="510" y="264" text-anchor="middle" font-size="11" fill="#f1f5f9">+273</text>

  <!-- 2024 -->
  <rect x="570" y="245" width="110" height="125" rx="6" fill="#f59e0b" opacity="0.5"/>
  <text x="625" y="237" text-anchor="middle" font-size="14" font-weight="700" fill="#f59e0b">1,208</text>
  <text x="625" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2024</text>
  <text x="625" y="410" text-anchor="middle" font-size="10" fill="#ef4444">-245 감소</text>

  <!-- 순손실 -->
  <rect x="700" y="320" width="80" height="50" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="740" y="342" text-anchor="middle" font-size="11" fill="#f1f5f9">순손실</text>
  <text x="740" y="358" text-anchor="middle" font-size="11" fill="#f1f5f9">-125</text>

  <!-- 2025 -->
  <rect x="800" y="248" width="110" height="122" rx="6" fill="#ef4444" opacity="0.4" stroke="#ef4444" stroke-width="2"/>
  <text x="855" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">1,187</text>
  <text x="855" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">2025</text>
  <text x="855" y="410" text-anchor="middle" font-size="10" fill="#ef4444">-21 감소</text>

  <!-- 경고 -->
  <rect x="930" y="200" width="200" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="1030" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">경고</text>
  <text x="1030" y="255" text-anchor="middle" font-size="12" fill="#f1f5f9">3년간 자본 -747억</text>
  <text x="1030" y="278" text-anchor="middle" font-size="12" fill="#94a3b8">연 -250억 속도면</text>
  <text x="1030" y="295" text-anchor="middle" font-size="12" fill="#ef4444">~5년 내 자본잠식</text>

  <!-- 하단: 비교 매트릭스 -->
  <rect x="50" y="460" width="540" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="320" y="500" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">적자 게임사 생존 패턴 비교</text>

  <!-- 헤더 -->
  <line x1="70" y1="520" x2="570" y2="520" stroke="#334155" stroke-width="1"/>
  <text x="120" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">항목</text>
  <text x="280" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">CG인바이츠</text>
  <text x="440" y="540" text-anchor="middle" font-size="12" font-weight="700" fill="#22c55e">크래프톤(비교)</text>

  <line x1="70" y1="555" x2="570" y2="555" stroke="#334155" stroke-width="1"/>

  <text x="120" y="580" text-anchor="middle" font-size="12" fill="#94a3b8">매출(2025)</text>
  <text x="280" y="580" text-anchor="middle" font-size="12" fill="#ef4444">274억</text>
  <text x="440" y="580" text-anchor="middle" font-size="12" fill="#22c55e">2.8조</text>

  <text x="120" y="610" text-anchor="middle" font-size="12" fill="#94a3b8">OPM</text>
  <text x="280" y="610" text-anchor="middle" font-size="12" fill="#ef4444">-87%</text>
  <text x="440" y="610" text-anchor="middle" font-size="12" fill="#22c55e">35%+</text>

  <text x="120" y="640" text-anchor="middle" font-size="12" fill="#94a3b8">신용등급</text>
  <text x="280" y="640" text-anchor="middle" font-size="12" fill="#ef4444">BB (투기)</text>
  <text x="440" y="640" text-anchor="middle" font-size="12" fill="#22c55e">AA (안정)</text>

  <text x="120" y="670" text-anchor="middle" font-size="12" fill="#94a3b8">사업모델</text>
  <text x="280" y="670" text-anchor="middle" font-size="12" fill="#f59e0b">신작 의존</text>
  <text x="440" y="670" text-anchor="middle" font-size="12" fill="#22c55e">배그 장수 IP</text>

  <text x="120" y="700" text-anchor="middle" font-size="12" fill="#94a3b8">현금흐름</text>
  <text x="280" y="700" text-anchor="middle" font-size="12" fill="#ef4444">유상증자 의존</text>
  <text x="440" y="700" text-anchor="middle" font-size="12" fill="#22c55e">FCF 양호</text>

  <text x="120" y="730" text-anchor="middle" font-size="12" fill="#94a3b8">핵심 리스크</text>
  <text x="280" y="730" text-anchor="middle" font-size="12" fill="#ef4444">자본잠식 경계</text>
  <text x="440" y="730" text-anchor="middle" font-size="12" fill="#f59e0b">배그 의존 집중</text>

  <text x="320" y="775" text-anchor="middle" font-size="11" fill="#64748b">같은 게임업, 완전히 다른 재무 구조. 차이는 "장수 IP" 유무.</text>

  <!-- 우측: 핵심 메시지 -->
  <rect x="620" y="460" width="530" height="340" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="885" y="500" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">적자 게임사가 사는 법</text>

  <text x="650" y="540" font-size="14" fill="#f1f5f9">1. 유상증자로 자본 수혈</text>
  <text x="670" y="565" font-size="12" fill="#94a3b8">→ 기존 주주 지분 희석 = 주가 하락 압력</text>

  <text x="650" y="600" font-size="14" fill="#f1f5f9">2. 개발비 자산화</text>
  <text x="670" y="625" font-size="12" fill="#94a3b8">→ 비용을 자산으로 쌓아 적자 폭 축소</text>
  <text x="670" y="645" font-size="12" fill="#94a3b8">→ 게임 출시 실패 시 일괄 상각 = 시한폭탄</text>

  <text x="650" y="680" font-size="14" fill="#f1f5f9">3. 신작 매출로 적자 감축</text>
  <text x="670" y="705" font-size="12" fill="#94a3b8">→ 2025 매출 274억 = 1년치 적자 238억과 비슷</text>
  <text x="670" y="725" font-size="12" fill="#94a3b8">→ BEP 달성하려면 매출 400억+ 필요</text>

  <text x="650" y="760" font-size="14" font-weight="700" fill="#ef4444">결론: 신작이 실패하면 자본잠식 직행</text>
  <text x="670" y="785" font-size="12" fill="#64748b">현 자본 1,187억 ÷ 연 순손실 125억 ≈ 9.5년 여유</text>
</svg>