<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <title>CG인바이츠 턴어라운드 판단 트리 — 매출 반등이 진짜인지 판별하는 3가지 조건</title>
  <desc>2025년 매출 274억 반등이 지속 가능한 턴어라운드인지, 일시적 반등인지를 판별하는 의사결정 트리</desc>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="720" fill="url(#bg5)"/>

  <text x="540" y="45" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">턴어라운드인가, 일시 반등인가 — 판단 트리</text>
  <text x="540" y="72" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b">매출 73억→274억 반등의 지속성을 판별하는 3단계 질문</text>

  <!-- 시작 -->
  <rect x="380" y="100" width="320" height="60" rx="12" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
  <text x="540" y="137" text-anchor="middle" font-size="16" font-weight="700" fill="#fbbf24">매출 274억 반등 (2025)</text>

  <line x1="540" y1="160" x2="540" y2="200" stroke="#fbbf24" stroke-width="2"/>

  <!-- Q1 -->
  <rect x="340" y="200" width="400" height="55" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">Q1. 매출의 원천은 무엇인가?</text>
  <text x="540" y="245" text-anchor="middle" font-size="12" fill="#94a3b8">신작 1개 집중? 복수 IP? 퍼블리싱 수수료?</text>

  <!-- 분기 -->
  <line x1="440" y1="255" x2="240" y2="310" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="640" y1="255" x2="840" y2="310" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="120" y="310" width="240" height="50" rx="8" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="240" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">신작 1개에 90%+ 집중</text>
  <text x="240" y="350" text-anchor="middle" font-size="11" fill="#94a3b8">→ 고위험: 해당 게임 흥행 실패 시 재추락</text>

  <rect x="720" y="310" width="240" height="50" rx="8" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="840" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#22c55e">복수 IP + 퍼블리싱 분산</text>
  <text x="840" y="350" text-anchor="middle" font-size="11" fill="#94a3b8">→ 구조적 전환 신호</text>

  <!-- Q2 -->
  <line x1="540" y1="255" x2="540" y2="400" stroke="#3b82f6" stroke-width="2"/>
  <rect x="340" y="400" width="400" height="55" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="425" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">Q2. 비용 구조가 바뀌었는가?</text>
  <text x="540" y="445" text-anchor="middle" font-size="12" fill="#94a3b8">OPM -87% → 흑자전환에 필요한 매출 규모는?</text>

  <line x1="440" y1="455" x2="240" y2="490" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="640" y1="455" x2="840" y2="490" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="120" y="490" width="240" height="50" rx="8" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="240" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">고정비 그대로, 매출만 반등</text>
  <text x="240" y="530" text-anchor="middle" font-size="11" fill="#94a3b8">→ 매출 400억+ 없으면 적자 지속</text>

  <rect x="720" y="490" width="240" height="50" rx="8" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="840" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#22c55e">인력 구조조정 + 비용 축소</text>
  <text x="840" y="530" text-anchor="middle" font-size="11" fill="#94a3b8">→ BEP 낮아져 흑자 가능성 상승</text>

  <!-- Q3 -->
  <line x1="540" y1="455" x2="540" y2="580" stroke="#3b82f6" stroke-width="2"/>
  <rect x="340" y="580" width="400" height="55" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="605" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">Q3. 추가 자본 조달 없이 버틸 수 있는가?</text>
  <text x="540" y="625" text-anchor="middle" font-size="12" fill="#94a3b8">현금 보유량 vs 월 소진액 (burn rate)</text>

  <line x1="440" y1="635" x2="240" y2="660" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="640" y1="635" x2="840" y2="660" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="120" y="660" width="240" height="45" rx="8" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="687" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">유상증자 필요 → 희석 지속</text>

  <rect x="720" y="660" width="240" height="45" rx="8" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="2"/>
  <text x="840" y="687" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">자체 현금으로 1년+ 버팀</text>
</svg>