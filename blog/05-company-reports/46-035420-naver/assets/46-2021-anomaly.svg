<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="45" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">2021Q1 미스터리 — 영업이익 0.29조인데 순이익 15.31조</text>
  <text x="600" y="70" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">LINE + Yahoo Japan → Z Holdings 합병이 만든 한 줄</text>

  <!-- Timeline: 2021 Q1~Q4 -->
  <line x1="150" y1="350" x2="1050" y2="350" stroke="#334155" stroke-width="2"/>

  <!-- Q1 -->
  <circle cx="300" cy="350" r="8" fill="#ef4444"/>
  <text x="300" y="385" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2021Q1</text>

  <!-- Q1 box - massive -->
  <rect x="180" y="100" width="240" height="220" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2021Q1</text>
  <text x="300" y="175" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700">15.31조</text>
  <text x="300" y="200" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">당기순이익</text>
  <text x="300" y="230" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익: 0.29조</text>
  <text x="300" y="250" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">영업외: +15.02조</text>
  <text x="300" y="280" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">LINE → Z Holdings</text>
  <text x="300" y="298" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">재측정 차익 (일회성)</text>

  <!-- Q2 -->
  <circle cx="525" cy="350" r="6" fill="#22c55e"/>
  <text x="525" y="385" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">Q2</text>
  <rect x="465" y="250" width="120" height="80" rx="10" fill="#1e293b"/>
  <text x="525" y="280" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">0.54조</text>
  <text x="525" y="300" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OP: 0.34조</text>

  <!-- Q3 -->
  <circle cx="750" cy="350" r="6" fill="#22c55e"/>
  <text x="750" y="385" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">Q3</text>
  <rect x="690" y="250" width="120" height="80" rx="10" fill="#1e293b"/>
  <text x="750" y="280" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">0.32조</text>
  <text x="750" y="300" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OP: 0.35조</text>

  <!-- Q4 -->
  <circle cx="975" cy="350" r="6" fill="#22c55e"/>
  <text x="975" y="385" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">Q4</text>
  <rect x="915" y="250" width="120" height="80" rx="10" fill="#1e293b"/>
  <text x="975" y="280" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">0.30조</text>
  <text x="975" y="300" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">OP: 0.35조</text>

  <!-- Asset jump -->
  <text x="600" y="440" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">자산총계 변동 — 1년 만에 2배</text>

  <rect x="180" y="470" width="350" height="100" rx="12" fill="#1e293b"/>
  <text x="355" y="505" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2020년 말</text>
  <text x="355" y="540" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">17.01조</text>

  <!-- Arrow -->
  <line x1="540" y1="520" x2="650" y2="520" stroke="#f59e0b" stroke-width="3"/>
  <polygon points="650,512 670,520 650,528" fill="#f59e0b"/>
  <text x="600" y="510" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">×2.0</text>

  <rect x="680" y="470" width="350" height="100" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="855" y="505" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2021년 말</text>
  <text x="855" y="540" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">33.69조</text>

  <!-- Explanation -->
  <rect x="250" y="610" width="700" height="65" rx="12" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="600" y="637" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">LINE(종속기업) 제거 → Z Holdings(관계기업) 등장 → 재측정 차익 15조</text>
  <text x="600" y="660" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">이후 매년 관계기업 지분법이익이 순이익의 7~93%를 차지</text>

  <title>2021Q1 순이익 15.31조 — LINE과 Z Holdings 합병의 재무제표 흔적</title>
</svg>