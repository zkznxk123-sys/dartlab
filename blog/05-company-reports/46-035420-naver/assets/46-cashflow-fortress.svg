<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="45" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">현금 요새 — OCF 3.1조, 순현금 4.6조, 배당 0원</text>
  <text x="600" y="70" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">검색 엔진이 매일 49억씩 쌓아주는 현금, 전부 재투자로</text>

  <!-- OCF bar chart: 2017~2025 -->
  <!-- x=120~1080, 9 bars, each width=80, gap=27 -->
  <!-- y=550 baseline, max OCF=3.10조, y scale: 3.10→100~550, factor=145 per 1조 -->

  <!-- 2017: 0.74 → h=107 -->
  <rect x="125" y="443" width="80" height="107" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="165" y="435" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">0.74</text>
  <text x="165" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2017</text>

  <!-- 2018: 0.97 → h=141 -->
  <rect x="232" y="409" width="80" height="141" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="272" y="401" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">0.97</text>
  <text x="272" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2018</text>

  <!-- 2019: 1.02 → h=148 -->
  <rect x="339" y="402" width="80" height="148" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="379" y="394" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">1.02</text>
  <text x="379" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2019</text>

  <!-- 2020: 1.45 → h=210 -->
  <rect x="446" y="340" width="80" height="210" rx="4" fill="#22c55e" opacity="0.75"/>
  <text x="486" y="332" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">1.45</text>
  <text x="486" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2020</text>

  <!-- 2021: 1.38 → h=200 -->
  <rect x="553" y="350" width="80" height="200" rx="4" fill="#22c55e" opacity="0.75"/>
  <text x="593" y="342" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">1.38</text>
  <text x="593" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2021</text>

  <!-- 2022: 1.45 → h=210 -->
  <rect x="660" y="340" width="80" height="210" rx="4" fill="#22c55e" opacity="0.75"/>
  <text x="700" y="332" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">1.45</text>
  <text x="700" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2022</text>

  <!-- 2023: 2.00 → h=290 -->
  <rect x="767" y="260" width="80" height="290" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="807" y="252" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2.00</text>
  <text x="807" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2023</text>

  <!-- 2024: 2.59 → h=375 -->
  <rect x="874" y="175" width="80" height="375" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="914" y="167" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2.59</text>
  <text x="914" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2024</text>

  <!-- 2025: 3.10 → h=450 -->
  <rect x="981" y="100" width="80" height="450" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="1021" y="92" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">3.10</text>
  <text x="1021" y="575" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2025</text>

  <!-- Axis label -->
  <text x="60" y="555" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" transform="rotate(-90, 60, 400)">영업활동현금흐름 (조원)</text>

  <!-- Annotation: 4.2x -->
  <line x1="165" y1="440" x2="165" y2="610" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1021" y1="100" x2="1021" y2="610" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="165" y1="610" x2="1021" y2="610" stroke="#fbbf24" stroke-width="2"/>
  <text x="593" y="635" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">9년간 4.2배 성장 — CAGR 17%</text>

  <!-- Bottom cards -->
  <rect x="120" y="660" width="300" height="45" rx="8" fill="#1e293b"/>
  <text x="270" y="688" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">순현금 <tspan fill="#22c55e" font-weight="700">4.6조</tspan> (빚보다 현금이 많음)</text>

  <rect x="450" y="660" width="300" height="45" rx="8" fill="#1e293b"/>
  <text x="600" y="688" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">배당 <tspan fill="#f59e0b" font-weight="700">0원</tspan> (3년 연속)</text>

  <rect x="780" y="660" width="300" height="45" rx="8" fill="#1e293b"/>
  <text x="930" y="688" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">FCF <tspan fill="#22c55e" font-weight="700">1.78조</tspan> (매일 49억)</text>

  <title>네이버 영업활동현금흐름 9년 추이 — 0.74조에서 3.10조, 4.2배 성장</title>
</svg>