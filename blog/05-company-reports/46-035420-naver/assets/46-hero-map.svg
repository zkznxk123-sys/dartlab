<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700">네이버 (035420) — 사라진 57%포인트의 행방</text>
  <text x="600" y="82" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">별도 OPM 75.7% → 연결 OPM 18.3% — 57%p가 사라지는 구조</text>

  <!-- Left: 별도 (네이버 본체) -->
  <rect x="60" y="120" width="300" height="240" rx="16" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="210" y="155" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">네이버 본체 (별도)</text>
  <text x="210" y="195" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700">75.7%</text>
  <text x="210" y="225" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">영업이익률 (별도)</text>
  <text x="210" y="260" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">검색 광고</text>
  <text x="210" y="280" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">한계비용 ≈ 0</text>
  <text x="210" y="300" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">사용자 3,000만 명</text>
  <text x="210" y="330" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">현금 인쇄기</text>

  <!-- Arrow -->
  <line x1="370" y1="240" x2="470" y2="240" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="470,232 490,240 470,248" fill="#f59e0b"/>
  <text x="430" y="220" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">-57%p</text>

  <!-- Middle: 연결 -->
  <rect x="500" y="120" width="300" height="240" rx="16" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <text x="650" y="155" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">네이버 연결</text>
  <text x="650" y="195" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700">18.3%</text>
  <text x="650" y="225" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">영업이익률 (연결)</text>
  <text x="650" y="260" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">자회사 100+개</text>
  <text x="650" y="280" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">투자 자산 16.6조</text>
  <text x="650" y="300" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">비영업자산 55%</text>
  <text x="650" y="330" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">지주 + 투자 구조</text>

  <!-- Right: 카카오 비교 -->
  <rect x="870" y="120" width="270" height="240" rx="16" fill="#0f172a" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1005" y="155" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">카카오 연결 (비교)</text>
  <text x="1005" y="195" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700">9.0%</text>
  <text x="1005" y="225" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">영업이익률 (연결)</text>
  <text x="1005" y="260" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">같은 DAU 3,000만</text>
  <text x="1005" y="280" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">본체 = 트래픽 통로</text>
  <text x="1005" y="300" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">자회사 = 매출원</text>

  <!-- Bottom: 57%p가 가는 곳 -->
  <text x="600" y="410" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">57%포인트가 사라지는 곳</text>

  <!-- 4 boxes -->
  <rect x="60" y="440" width="250" height="120" rx="12" fill="#1e293b"/>
  <text x="185" y="475" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">16.6조</text>
  <text x="185" y="500" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">투자 자산</text>
  <text x="185" y="520" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">자회사·관계기업·금융</text>
  <text x="185" y="540" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">전체 자산의 41%</text>

  <rect x="340" y="440" width="250" height="120" rx="12" fill="#1e293b"/>
  <text x="465" y="475" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">1.32조</text>
  <text x="465" y="500" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2025 CAPEX</text>
  <text x="465" y="520" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">감가상각의 3.66배</text>
  <text x="465" y="540" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">데이터센터 · AI 인프라</text>

  <rect x="620" y="440" width="250" height="120" rx="12" fill="#1e293b"/>
  <text x="745" y="475" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">4,951억</text>
  <text x="745" y="500" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">관계기업 지분법이익</text>
  <text x="745" y="520" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Z Holdings(LY Corp) 등</text>
  <text x="745" y="540" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익의 22%</text>

  <rect x="900" y="440" width="250" height="120" rx="12" fill="#1e293b"/>
  <text x="1025" y="475" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">3.10조</text>
  <text x="1025" y="500" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">영업활동현금흐름</text>
  <text x="1025" y="520" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">9년간 4.2배 성장</text>
  <text x="1025" y="540" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">검색 엔진이 벌어옴</text>

  <!-- Bottom verdict -->
  <rect x="200" y="600" width="800" height="70" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="632" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">결론: 57%p는 "비용"이 아니라 "투자" — 검색 광고가 매일 찍는 현금으로 다음 판을 사는 구조</text>
  <text x="600" y="655" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">dCR-AA · 순현금 4.6조 · 부채비율 42% · 2026-04-18 dartlab 실측</text>

  <title>네이버 핵심 구조 — 별도 OPM 75%가 연결 18%로 떨어지는 경로</title>
</svg>