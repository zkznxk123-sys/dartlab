<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg2)"/>

  <text x="600" y="45" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">네이버 vs 카카오 — 영업이익률 9년 추이</text>
  <text x="600" y="70" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">같은 DAU 3,000만, 한 번도 역전되지 않은 마진 격차</text>

  <!-- Chart area: x=120~1080, y=110~550 -->
  <!-- Y axis: 0% ~ 30% -->
  <!-- Grid lines -->
  <line x1="120" y1="550" x2="1080" y2="550" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="403" x2="1080" y2="403" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="257" x2="1080" y2="257" stroke="#1e293b" stroke-width="1"/>
  <line x1="120" y1="110" x2="1080" y2="110" stroke="#1e293b" stroke-width="1"/>

  <!-- Y labels -->
  <text x="110" y="555" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">0%</text>
  <text x="110" y="408" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">10%</text>
  <text x="110" y="262" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">20%</text>
  <text x="110" y="115" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">30%</text>

  <!-- X positions: 2017=180, 2018=300, 2019=420, 2020=540, 2021=660, 2022=780, 2023=900, 2024=960, 2025=1020 -->
  <!-- Naver OPM: 25.2, 16.9, 10.8, 16.4, 19.4, 15.9, 15.4, 18.4, 18.3 -->
  <!-- Y = 550 - (val/30)*440 -->
  <!-- 25.2→181, 16.9→302, 10.8→392, 16.4→310, 19.4→266, 15.9→317, 15.4→325, 18.4→281, 18.3→282 -->

  <!-- Naver line -->
  <polyline points="180,181 300,302 420,392 540,310 660,266 780,317 900,325 960,281 1020,282"
    fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round"/>

  <!-- Kakao OPM: 8.4, 3.0, 6.7, 11.1, 9.9, 8.4, 7.8, 5.8, 9.0 -->
  <!-- 8.4→427, 3.0→506, 6.7→452, 11.1→387, 9.9→405, 8.4→427, 7.8→436, 5.8→465, 9.0→418 -->

  <!-- Kakao line -->
  <polyline points="180,427 300,506 420,452 540,387 660,405 780,427 900,436 960,465 1020,418"
    fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round" stroke-dasharray="8,4"/>

  <!-- Data points - Naver -->
  <circle cx="180" cy="181" r="5" fill="#22c55e"/>
  <circle cx="300" cy="302" r="5" fill="#22c55e"/>
  <circle cx="420" cy="392" r="5" fill="#22c55e"/>
  <circle cx="540" cy="310" r="5" fill="#22c55e"/>
  <circle cx="660" cy="266" r="5" fill="#22c55e"/>
  <circle cx="780" cy="317" r="5" fill="#22c55e"/>
  <circle cx="900" cy="325" r="5" fill="#22c55e"/>
  <circle cx="960" cy="281" r="5" fill="#22c55e"/>
  <circle cx="1020" cy="282" r="5" fill="#22c55e"/>

  <!-- Data points - Kakao -->
  <circle cx="180" cy="427" r="5" fill="#ef4444"/>
  <circle cx="300" cy="506" r="5" fill="#ef4444"/>
  <circle cx="420" cy="452" r="5" fill="#ef4444"/>
  <circle cx="540" cy="387" r="5" fill="#ef4444"/>
  <circle cx="660" cy="405" r="5" fill="#ef4444"/>
  <circle cx="780" cy="427" r="5" fill="#ef4444"/>
  <circle cx="900" cy="436" r="5" fill="#ef4444"/>
  <circle cx="960" cy="465" r="5" fill="#ef4444"/>
  <circle cx="1020" cy="418" r="5" fill="#ef4444"/>

  <!-- Naver labels -->
  <text x="180" y="170" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">25.2</text>
  <text x="420" y="415" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">10.8</text>
  <text x="660" y="255" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">19.4</text>
  <text x="1020" y="271" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">18.3</text>

  <!-- Kakao labels -->
  <text x="300" y="525" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">3.0</text>
  <text x="540" y="376" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">11.1</text>
  <text x="960" y="484" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">5.8</text>
  <text x="1020" y="437" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700">9.0</text>

  <!-- X labels -->
  <text x="180" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2017</text>
  <text x="300" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2018</text>
  <text x="420" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2019</text>
  <text x="540" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2020</text>
  <text x="660" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2021</text>
  <text x="780" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2022</text>
  <text x="900" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2023</text>
  <text x="960" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2024</text>
  <text x="1020" y="580" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">2025</text>

  <!-- Annotations -->
  <rect x="350" y="380" width="160" height="30" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="430" y="400" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">LINE 적자 + 신사업 투자</text>

  <rect x="600" y="232" width="140" height="30" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="670" y="252" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">LINE 분리 → 회복</text>

  <!-- Legend -->
  <line x1="380" y1="645" x2="420" y2="645" stroke="#22c55e" stroke-width="3"/>
  <text x="430" y="650" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">네이버 OPM</text>
  <line x1="580" y1="645" x2="620" y2="645" stroke="#ef4444" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="630" y="650" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">카카오 OPM</text>

  <!-- Bottom note -->
  <text x="600" y="690" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">9년간 한 번도 역전되지 않은 마진 격차 — 2018년 5.6배에서 2025년 2.0배</text>

  <title>네이버 vs 카카오 영업이익률 9년 추이 비교</title>
</svg>