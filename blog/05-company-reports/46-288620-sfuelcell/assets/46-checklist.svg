<svg viewBox="0 0 1080 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="52" text-anchor="middle" font-size="27" font-weight="700" fill="#f1f5f9">에스퓨얼셀 생존 체크포인트</text>
  <text x="540" y="78" text-anchor="middle" font-size="14" fill="#64748b">투자자가 확인해야 할 5가지 신호 — 이것이 바뀌어야 스토리가 바뀐다</text>

  <!-- Item 1: 빨강 -->
  <rect x="40" y="104" width="1000" height="96" rx="12" fill="#0f1629" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="96" cy="152" r="22" fill="#ef4444" fill-opacity="0.18" stroke="#ef4444" stroke-width="2"/>
  <text x="96" y="158" text-anchor="middle" font-size="20" font-weight="800" fill="#ef4444">1</text>
  <text x="148" y="143" font-size="16" font-weight="700" fill="#f1f5f9">분기 매출 100억 회복 여부</text>
  <rect x="148" y="150" width="74" height="22" rx="5" fill="#ef4444" fill-opacity="0.2"/>
  <text x="185" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">현재 미달</text>
  <text x="240" y="166" font-size="13" fill="#94a3b8">현재 39억/분기 → 100억 넘어야 고정비 커버 가능</text>
  <text x="148" y="188" font-size="13" fill="#64748b">100억 미만 지속 = 구조적 손실 탈출 불가, 자본잠식 가속</text>

  <!-- Item 2: 빨강 -->
  <rect x="40" y="216" width="1000" height="96" rx="12" fill="#0f1629" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="96" cy="264" r="22" fill="#ef4444" fill-opacity="0.18" stroke="#ef4444" stroke-width="2"/>
  <text x="96" y="270" text-anchor="middle" font-size="20" font-weight="800" fill="#ef4444">2</text>
  <text x="148" y="255" font-size="16" font-weight="700" fill="#f1f5f9">매출원가율 100% 이하 복귀</text>
  <rect x="148" y="262" width="74" height="22" rx="5" fill="#ef4444" fill-opacity="0.2"/>
  <text x="185" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">현재 127%</text>
  <text x="240" y="278" font-size="13" fill="#94a3b8">원가율 100% 미만이면 구조 정상화 신호</text>
  <text x="148" y="300" font-size="13" fill="#64748b">100% 초과 = 팔면 팔수록 손해, 매출 성장이 오히려 손실을 키운다</text>

  <!-- Item 3: 노랑 -->
  <rect x="40" y="328" width="1000" height="96" rx="12" fill="#0f1629" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="96" cy="376" r="22" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-width="2"/>
  <text x="96" y="382" text-anchor="middle" font-size="20" font-weight="800" fill="#f59e0b">3</text>
  <text x="148" y="367" font-size="16" font-weight="700" fill="#f1f5f9">유상증자 / 전환사채 발행 여부</text>
  <rect x="148" y="374" width="86" height="22" rx="5" fill="#f59e0b" fill-opacity="0.18"/>
  <text x="191" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">자금조달 필수</text>
  <text x="252" y="390" font-size="13" fill="#94a3b8">현금 6억으로 버틸 시간 없음 — 자금조달이 생사를 가른다</text>
  <text x="148" y="412" font-size="13" fill="#64748b">발행 조건(할인율·전환가)이 주주 희석 규모를 결정, 조건을 반드시 확인할 것</text>

  <!-- Item 4: 노랑 -->
  <rect x="40" y="440" width="1000" height="96" rx="12" fill="#0f1629" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="96" cy="488" r="22" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-width="2"/>
  <text x="96" y="494" text-anchor="middle" font-size="20" font-weight="800" fill="#f59e0b">4</text>
  <text x="148" y="479" font-size="16" font-weight="700" fill="#f1f5f9">정부 수소경제 정책 변화</text>
  <rect x="148" y="486" width="86" height="22" rx="5" fill="#f59e0b" fill-opacity="0.18"/>
  <text x="191" y="502" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">모니터링</text>
  <text x="252" y="502" font-size="13" fill="#94a3b8">RPS 의무 비율 상향 / 수소법 개정안 — 규제가 시장을 만든다</text>
  <text x="148" y="524" font-size="13" fill="#64748b">정책 약화 = 수요 기반 소멸 / 정책 강화 = 구조적 수요 회복의 직접 트리거</text>

  <!-- Item 5: 회색 -->
  <rect x="40" y="552" width="1000" height="96" rx="12" fill="#0f1629" stroke="#475569" stroke-width="1.5"/>
  <circle cx="96" cy="600" r="22" fill="#475569" fill-opacity="0.18" stroke="#475569" stroke-width="2"/>
  <text x="96" y="606" text-anchor="middle" font-size="20" font-weight="800" fill="#94a3b8">5</text>
  <text x="148" y="591" font-size="16" font-weight="700" fill="#f1f5f9">해외 수출 계약 성사</text>
  <rect x="148" y="598" width="74" height="22" rx="5" fill="#475569" fill-opacity="0.22"/>
  <text x="185" y="614" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">중장기 과제</text>
  <text x="240" y="614" font-size="13" fill="#94a3b8">국내 시장만으로는 규모화 불가 — 해외가 유일한 성장 경로</text>
  <text x="148" y="636" font-size="13" fill="#64748b">중동·동남아 수소 인프라 수출 MOU/본계약 여부가 밸류에이션 재평가 트리거</text>

  <!-- Bottom critical notice -->
  <rect x="40" y="666" width="1000" height="40" rx="10" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="692" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">현금 6억 → 분기 적자 -38억 → 두 분기 이내 자금 확보 못하면 자본잠식</text>
</svg>
