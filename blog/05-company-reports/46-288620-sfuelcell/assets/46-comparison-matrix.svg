<svg viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">에스퓨얼셀 vs 뉴스케일파워 — 상세 비교</text>
  <text x="600" y="80" text-anchor="middle" font-size="15" fill="#64748b">같은 신에너지 적자 기업, 본질이 다른 이유</text>

  <!-- Table header -->
  <rect x="50" y="106" width="1100" height="50" rx="10" fill="#1e2d45"/>
  <text x="220" y="136" text-anchor="middle" font-size="15" font-weight="700" fill="#94a3b8">항목</text>
  <line x1="390" y1="106" x2="390" y2="156" stroke="#334155" stroke-width="1"/>
  <text x="650" y="136" text-anchor="middle" font-size="15" font-weight="700" fill="#ef4444">에스퓨얼셀 288620</text>
  <line x1="910" y1="106" x2="910" y2="156" stroke="#334155" stroke-width="1"/>
  <text x="1030" y="136" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">뉴스케일파워 SMR</text>

  <!-- Table rows -->
  <!-- Row data: [label, sfuelcell, nuscale, sfuelcell_color, nuscale_color] -->
  <!-- y positions: 156, 230, 304, 378, 452, 526, 600, 674 (row height=74) -->

  <!-- Row 1: 기술 -->
  <rect x="50" y="156" width="1100" height="74" fill="#0d1526"/>
  <line x1="50" y1="230" x2="1150" y2="230" stroke="#1e293b" stroke-width="1"/>
  <line x1="390" y1="156" x2="390" y2="230" stroke="#1e293b" stroke-width="1"/>
  <line x1="910" y1="156" x2="910" y2="230" stroke="#1e293b" stroke-width="1"/>
  <text x="220" y="197" text-anchor="middle" font-size="14" fill="#64748b">기술</text>
  <text x="650" y="190" text-anchor="middle" font-size="14" fill="#94a3b8">수소연료전지</text>
  <text x="650" y="210" text-anchor="middle" font-size="12" fill="#64748b">PEMFC, 건물·산업용 에너지</text>
  <text x="1030" y="190" text-anchor="middle" font-size="14" fill="#fbbf24">소형모듈원자로 (SMR)</text>
  <text x="1030" y="210" text-anchor="middle" font-size="12" fill="#64748b">77MWe, 도심 분산 전력</text>

  <!-- Row 2: 매출 -->
  <rect x="50" y="230" width="1100" height="74" fill="#0a0e1a"/>
  <line x1="50" y1="304" x2="1150" y2="304" stroke="#1e293b" stroke-width="1"/>
  <line x1="390" y1="230" x2="390" y2="304" stroke="#1e293b" stroke-width="1"/>
  <line x1="910" y1="230" x2="910" y2="304" stroke="#1e293b" stroke-width="1"/>
  <text x="220" y="270" text-anchor="middle" font-size="14" fill="#64748b">매출</text>
  <text x="650" y="264" text-anchor="middle" font-size="16" font-weight="700" fill="#ef4444">158억원</text>
  <text x="650" y="284" text-anchor="middle" font-size="12" fill="#ef4444">전년比 -53% — 소멸 중</text>
  <text x="1030" y="264" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">$31.5M (460억원)</text>
  <text x="1030" y="284" text-anchor="middle" font-size="12" fill="#22c55e">YoY 성장 중</text>

  <!-- Row 3: OPM -->
  <rect x="50" y="304" width="1100" height="74" fill="#0d1526"/>
  <line x1="50" y1="378" x2="1150" y2="378" stroke="#1e293b" stroke-width="1"/>
  <line x1="390" y1="304" x2="390" y2="378" stroke="#1e293b" stroke-width="1"/>
  <line x1="910" y1="304" x2="910" y2="378" stroke="#1e293b" stroke-width="1"/>
  <text x="220" y="344" text-anchor="middle" font-size="14" fill="#64748b">OPM</text>
  <text x="650" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#ef4444">-95.1%</text>
  <text x="650" y="358" text-anchor="middle" font-size="12" fill="#94a3b8">원가율 127% — 구조적 역마진</text>
  <text x="1030" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#f59e0b">-2,188%</text>
  <text x="1030" y="358" text-anchor="middle" font-size="12" fill="#94a3b8">R&amp;D·인증 단계 — 계획된 적자</text>

  <!-- Row 4: 현금 -->
  <rect x="50" y="378" width="1100" height="74" fill="#0a0e1a"/>
  <line x1="50" y1="452" x2="1150" y2="452" stroke="#1e293b" stroke-width="1"/>
  <line x1="390" y1="378" x2="390" y2="452" stroke="#1e293b" stroke-width="1"/>
  <line x1="910" y1="378" x2="910" y2="452" stroke="#1e293b" stroke-width="1"/>
  <text x="220" y="418" text-anchor="middle" font-size="14" fill="#64748b">현금 보유</text>
  <text x="650" y="412" text-anchor="middle" font-size="16" font-weight="700" fill="#ef4444">6억원</text>
  <text x="650" y="432" text-anchor="middle" font-size="12" fill="#ef4444">분기 적자 38억 — 약 두 분기 버팀목</text>
  <text x="1030" y="412" text-anchor="middle" font-size="16" font-weight="700" fill="#22c55e">$1.25B (1.8조원)</text>
  <text x="1030" y="432" text-anchor="middle" font-size="12" fill="#22c55e">런웨이 3년 이상 확보</text>

  <!-- Row 5: 인증 -->
  <rect x="50" y="452" width="1100" height="74" fill="#0d1526"/>
  <line x1="50" y1="526" x2="1150" y2="526" stroke="#1e293b" stroke-width="1"/>
  <line x1="390" y1="452" x2="390" y2="526" stroke="#1e293b" stroke-width="1"/>
  <line x1="910" y1="452" x2="910" y2="526" stroke="#1e293b" stroke-width="1"/>
  <text x="220" y="492" text-anchor="middle" font-size="14" fill="#64748b">인증</text>
  <text x="650" y="486" text-anchor="middle" font-size="14" fill="#94a3b8">GS칼텍스 라이선스</text>
  <text x="650" y="506" text-anchor="middle" font-size="12" fill="#64748b">독점 인증 없음</text>
  <rect x="960" y="463" width="140" height="28" rx="6" fill="#22c55e" fill-opacity="0.2"/>
  <text x="1030" y="481" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">NRC 설계인증 (세계 유일)</text>
  <text x="1030" y="506" text-anchor="middle" font-size="12" fill="#22c55e">진입장벽 = 경제적 해자</text>

  <!-- Row 6: 정부 지원 -->
  <rect x="50" y="526" width="1100" height="74" fill="#0a0e1a"/>
  <line x1="50" y1="600" x2="1150" y2="600" stroke="#1e293b" stroke-width="1"/>
  <line x1="390" y1="526" x2="390" y2="600" stroke="#1e293b" stroke-width="1"/>
  <line x1="910" y1="526" x2="910" y2="600" stroke="#1e293b" stroke-width="1"/>
  <text x="220" y="566" text-anchor="middle" font-size="14" fill="#64748b">정부 지원</text>
  <text x="650" y="560" text-anchor="middle" font-size="14" fill="#f59e0b">RPS 의무 / 수소법</text>
  <text x="650" y="580" text-anchor="middle" font-size="12" fill="#f59e0b">규제 완화 중 — 약화 우려</text>
  <text x="1030" y="560" text-anchor="middle" font-size="14" fill="#22c55e">IRA 세액공제 + DOE 지원</text>
  <text x="1030" y="580" text-anchor="middle" font-size="12" fill="#22c55e">연방 전략 에너지 자산 지정</text>

  <!-- Row 7: 핵심 리스크 -->
  <rect x="50" y="600" width="1100" height="74" fill="#0d1526"/>
  <line x1="50" y1="674" x2="1150" y2="674" stroke="#1e293b" stroke-width="1"/>
  <line x1="390" y1="600" x2="390" y2="674" stroke="#1e293b" stroke-width="1"/>
  <line x1="910" y1="600" x2="910" y2="674" stroke="#1e293b" stroke-width="1"/>
  <text x="220" y="640" text-anchor="middle" font-size="14" fill="#64748b">핵심 리스크</text>
  <text x="650" y="634" text-anchor="middle" font-size="14" font-weight="600" fill="#ef4444">매출 소멸 + 현금 고갈</text>
  <text x="650" y="654" text-anchor="middle" font-size="12" fill="#ef4444">시간이 없다</text>
  <text x="1030" y="634" text-anchor="middle" font-size="14" font-weight="600" fill="#f59e0b">경제성 미증명</text>
  <text x="1030" y="654" text-anchor="middle" font-size="12" fill="#f59e0b">시간이 있다</text>

  <!-- Row 8: 상태 -->
  <rect x="50" y="674" width="1100" height="56" rx="0" fill="#0a0e1a"/>
  <line x1="390" y1="674" x2="390" y2="730" stroke="#1e293b" stroke-width="1"/>
  <line x1="910" y1="674" x2="910" y2="730" stroke="#1e293b" stroke-width="1"/>
  <text x="220" y="706" text-anchor="middle" font-size="14" fill="#64748b">상태 요약</text>
  <rect x="480" y="681" width="340" height="36" rx="8" fill="#ef4444" fill-opacity="0.18"/>
  <text x="650" y="704" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">매출 있으나 소멸 중</text>
  <rect x="930" y="681" width="200" height="36" rx="8" fill="#22c55e" fill-opacity="0.18"/>
  <text x="1030" y="704" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">매출 미미, 성장 중</text>

  <!-- Outer table border -->
  <rect x="50" y="106" width="1100" height="624" rx="10" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Bottom conclusion -->
  <rect x="50" y="744" width="1100" height="58" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="768" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">인증이 없으면 적자는 그냥 적자 — 인증이 있으면 적자는 시간을 사는 것</text>
  <text x="600" y="790" text-anchor="middle" font-size="13" fill="#94a3b8">같은 에너지 섹터, 같은 적자, 그러나 생존 가능성의 방향이 정반대다</text>
</svg>
