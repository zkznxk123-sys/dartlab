<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#f1f5f9">같은 적자, 다른 운명</text>
  <text x="600" y="90" text-anchor="middle" font-size="16" fill="#64748b">에스퓨얼셀(288620) vs 뉴스케일파워(SMR) — 적자의 본질이 다르다</text>

  <!-- Left box: 에스퓨얼셀 -->
  <rect x="60" y="120" width="460" height="440" rx="14" fill="#0f1629" stroke="#ef4444" stroke-width="2.5"/>
  <rect x="60" y="120" width="460" height="56" rx="14" fill="#ef4444" fill-opacity="0.18"/>
  <text x="290" y="153" text-anchor="middle" font-size="20" font-weight="700" fill="#ef4444">에스퓨얼셀 288620</text>
  <text x="290" y="175" text-anchor="middle" font-size="13" fill="#94a3b8">수소연료전지</text>

  <line x1="80" y1="192" x2="500" y2="192" stroke="#1e293b" stroke-width="1"/>

  <!-- 에스퓨얼셀 metrics -->
  <text x="100" y="228" font-size="13" fill="#64748b">매출</text>
  <text x="500" y="228" text-anchor="end" font-size="15" font-weight="600" fill="#ef4444">470억 → 158억  (-66%)</text>

  <text x="100" y="268" font-size="13" fill="#64748b">OPM (2025)</text>
  <text x="500" y="268" text-anchor="end" font-size="15" font-weight="600" fill="#ef4444">-95.1%</text>

  <text x="100" y="308" font-size="13" fill="#64748b">현금 보유</text>
  <text x="500" y="308" text-anchor="end" font-size="15" font-weight="600" fill="#ef4444">6억원</text>

  <text x="100" y="348" font-size="13" fill="#64748b">매출원가율</text>
  <text x="500" y="348" text-anchor="end" font-size="15" font-weight="600" fill="#ef4444">127% — 팔수록 손해</text>

  <text x="100" y="388" font-size="13" fill="#64748b">신용등급 (dCR)</text>
  <rect x="370" y="370" width="110" height="28" rx="6" fill="#ef4444" fill-opacity="0.22"/>
  <text x="425" y="390" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">BB- (투기등급)</text>

  <text x="100" y="428" font-size="13" fill="#64748b">Altman Z</text>
  <rect x="370" y="410" width="110" height="28" rx="6" fill="#ef4444" fill-opacity="0.22"/>
  <text x="425" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">0.20 (부실)</text>

  <text x="100" y="468" font-size="13" fill="#64748b">인증 현황</text>
  <text x="500" y="468" text-anchor="end" font-size="14" fill="#94a3b8">GS칼텍스 라이선스</text>

  <text x="100" y="508" font-size="13" fill="#64748b">핵심 리스크</text>
  <text x="500" y="508" text-anchor="end" font-size="14" fill="#ef4444">매출 소멸 + 현금 고갈</text>

  <!-- Right box: 뉴스케일 -->
  <rect x="680" y="120" width="460" height="440" rx="14" fill="#0f1629" stroke="#fbbf24" stroke-width="2.5"/>
  <rect x="680" y="120" width="460" height="56" rx="14" fill="#fbbf24" fill-opacity="0.14"/>
  <text x="910" y="153" text-anchor="middle" font-size="20" font-weight="700" fill="#fbbf24">뉴스케일파워 SMR</text>
  <text x="910" y="175" text-anchor="middle" font-size="13" fill="#94a3b8">소형모듈원자로(Small Modular Reactor)</text>

  <line x1="700" y1="192" x2="1120" y2="192" stroke="#1e293b" stroke-width="1"/>

  <!-- 뉴스케일 metrics -->
  <text x="700" y="228" font-size="13" fill="#64748b">매출</text>
  <text x="1120" y="228" text-anchor="end" font-size="15" font-weight="600" fill="#f1f5f9">$31.5M (460억원)</text>

  <text x="700" y="268" font-size="13" fill="#64748b">OPM</text>
  <text x="1120" y="268" text-anchor="end" font-size="15" font-weight="600" fill="#f59e0b">-2,188%</text>

  <text x="700" y="308" font-size="13" fill="#64748b">현금 보유</text>
  <text x="1120" y="308" text-anchor="end" font-size="15" font-weight="600" fill="#22c55e">$1.25B (1.8조원)</text>

  <text x="700" y="348" font-size="13" fill="#64748b">정부 지원</text>
  <text x="1120" y="348" text-anchor="end" font-size="14" fill="#fbbf24">IRA + DOE 전략적 지원</text>

  <text x="700" y="388" font-size="13" fill="#64748b">인증 현황</text>
  <rect x="960" y="370" width="140" height="28" rx="6" fill="#22c55e" fill-opacity="0.22"/>
  <text x="1030" y="390" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">NRC 설계인증 (유일)</text>

  <text x="700" y="428" font-size="13" fill="#64748b">Altman Z</text>
  <text x="1120" y="428" text-anchor="end" font-size="14" fill="#f1f5f9">현금 런웨이 3년+</text>

  <text x="700" y="468" font-size="13" fill="#64748b">핵심 리스크</text>
  <text x="1120" y="468" text-anchor="end" font-size="14" fill="#f59e0b">경제성 미증명 (시간 필요)</text>

  <text x="700" y="508" font-size="13" fill="#64748b">상태</text>
  <text x="1120" y="508" text-anchor="end" font-size="14" fill="#22c55e">매출 미미하나 성장중</text>

  <!-- Center arrow / label -->
  <line x1="524" y1="340" x2="676" y2="340" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="676,334 690,340 676,346" fill="#64748b"/>
  <rect x="546" y="318" width="108" height="44" rx="8" fill="#1e2d45"/>
  <text x="600" y="337" text-anchor="middle" font-size="13" font-weight="600" fill="#fbbf24">같은 적자</text>
  <text x="600" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#fbbf24">다른 시간</text>

  <!-- Bottom conclusion box -->
  <rect x="60" y="584" width="1080" height="96" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="618" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">차이는 &apos;인증&apos;이라는 한 장</text>
  <text x="600" y="645" text-anchor="middle" font-size="14" fill="#94a3b8">인증이 없으면 적자는 소멸 — 인증이 있으면 적자는 투자</text>
  <text x="600" y="668" text-anchor="middle" font-size="13" fill="#64748b">에스퓨얼셀은 매출이 있지만 소멸 중이고, 뉴스케일은 매출이 없지만 성장 중이다</text>
</svg>
