  <text x="104" y="252" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">현재 1.52배 — 이자 부담 완전 해소 기준선. 3.0배 돌파 시 재무 안정 신호</text>
  <rect x="870" y="216" width="120" height="28" rx="4" fill="#f59e0b20"/>
  <text x="930" y="235" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#f59e0b">현재 1.52배</text>

