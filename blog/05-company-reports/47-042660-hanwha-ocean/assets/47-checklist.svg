  <circle cx="72" cy="448" r="18" fill="#3b82f6"/>
  <text x="72" y="454" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">4</text>
  <rect x="1002" y="422" width="24" height="24" rx="4" fill="#3b82f620"/>
  <text x="1014" y="439" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#3b82f6">→</text>
