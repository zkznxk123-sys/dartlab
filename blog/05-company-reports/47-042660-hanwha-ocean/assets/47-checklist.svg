  <text x="70" y="631" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">달성</text>

  <rect x="140" y="616" width="20" height="20" rx="3" fill="#f59e0b20"/>
  <text x="152" y="631" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#f59e0b">!</text>
  <text x="170" y="631" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">진행 중</text>

  <rect x="250" y="616" width="20" height="20" rx="3" fill="#3b82f620"/>
  <text x="262" y="631" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#3b82f6">→</text>
  <text x="280" y="631" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">모니터링</text>

  <rect x="370" y="616" width="20" height="20" rx="3" fill="#ef444420"/>
  <text x="382" y="631" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#ef4444">✗</text>
  <text x="400" y="631" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">미달성</text>

