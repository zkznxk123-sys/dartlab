  <text x="540" y="680" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">dCR-BBB · 수주잔고 34.5조 · 부채비율 226% · 2026-04-18 dartlab 실측</text>
