  <rect x="40" y="508" width="1000" height="88" rx="8" fill="#0f1623" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="72" cy="552" r="18" fill="#ef4444"/>
  <text x="72" y="558" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">5</text>
  <rect x="1002" y="526" width="24" height="24" rx="4" fill="#ef444420"/>
  <text x="1014" y="543" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#ef4444">✗</text>
  <text x="104" y="538" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#ef4444">부채비율 150% 이하</text>
  <text x="104" y="564" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">현재 226% — 사이클 하강 시 재무 버퍼 부족. 150% 달성이 구조적 안정화 기준</text>
  <rect x="870" y="526" width="120" height="28" rx="4" fill="#ef444420"/>
  <text x="930" y="545" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#ef4444">현재 226%</text>

