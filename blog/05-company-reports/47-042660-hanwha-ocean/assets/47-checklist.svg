  <text x="104" y="356" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">KSS-III 배치3, 차기호위함 등 해군 프로그램 — 방산 비중이 20%를 넘으면 마진 구조 개선</text>
