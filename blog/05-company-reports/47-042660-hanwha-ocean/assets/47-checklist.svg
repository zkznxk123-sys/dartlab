<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="540" y="44" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">투자 체크포인트 5개</text>
  <text x="540" y="68" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">한화오션 (042660) — 다음 사이클 진입 전 확인해야 할 것들</text>

  <!-- ============= 체크 1: OPM 10% ============= -->
  <rect x="40" y="92" width="1000" height="88" rx="8" fill="#0f1623" stroke="#22c55e" stroke-width="1.5"/>
  <!-- 번호 배지 -->
  <circle cx="72" cy="136" r="18" fill="#22c55e"/>
  <text x="72" y="142" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">1</text>
  <!-- 상태 아이콘 -->
  <rect x="1002" y="110" width="24" height="24" rx="4" fill="#22c55e20"/>
  <text x="1014" y="127" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#22c55e">✓</text>
  <!-- 제목 -->
  <text x="104" y="122" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#22c55e">분기 OPM 10% 이상 유지</text>
  <!-- 설명 -->
  <text x="104" y="148" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2025년 8~11% 범위 달성 — 10% 안착이 구조적 턴어라운드 확인 신호</text>
  <!-- 현재 값 -->
  <rect x="870" y="112" width="120" height="28" rx="4" fill="#22c55e20"/>
  <text x="930" y="131" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#22c55e">현재 9.1%</text>

  <!-- ============= 체크 2: ICR 3.0배 ============= -->
  <rect x="40" y="196" width="1000" height="88" rx="8" fill="#0f1623" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="72" cy="240" r="18" fill="#f59e0b"/>
  <text x="72" y="246" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">2</text>
