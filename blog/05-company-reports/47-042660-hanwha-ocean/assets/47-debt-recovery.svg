<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="44" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">재무 회복 대시보드</text>
  <text x="600" y="68" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">한화오션 2025년 기준 핵심 재무 지표 6개</text>

  <!-- === 카드 1: 부채비율 === -->
  <rect x="40" y="92" width="350" height="200" rx="10" fill="#0f1623" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="40" y="92" width="350" height="6" rx="5" fill="#f59e0b"/>
  <text x="215" y="128" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">부채비율</text>
  <text x="215" y="172" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="42" font-weight="700" fill="#f59e0b">226%</text>
  <text x="215" y="200" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">조선업 평균 대비 높음</text>
  <!-- 프로그레스 바 -->
  <rect x="60" y="218" width="310" height="10" rx="5" fill="#1e2d45"/>
  <rect x="60" y="218" width="226" height="10" rx="5" fill="#f59e0b"/>
  <text x="370" y="228" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#f59e0b">226/300</text>
  <text x="215" y="268" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">목표: 150% 이하</text>

  <!-- === 카드 2: ICR === -->
  <rect x="425" y="92" width="350" height="200" rx="10" fill="#0f1623" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="425" y="92" width="350" height="6" rx="5" fill="#f59e0b"/>
  <text x="600" y="128" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">이자보상배율 (ICR)</text>
  <text x="600" y="172" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="42" font-weight="700" fill="#f59e0b">1.52배</text>
  <text x="600" y="200" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">안전마진 부족 — 목표 3.0배</text>
  <!-- 프로그레스 바 -->
  <rect x="445" y="218" width="310" height="10" rx="5" fill="#1e2d45"/>
  <rect x="445" y="218" width="157" height="10" rx="5" fill="#f59e0b"/>
  <text x="755" y="228" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#f59e0b">1.52/3.0</text>
  <text x="600" y="268" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">이자 부담 해소까지 2배 더 필요</text>

  <!-- === 카드 3: Altman Z === -->
  <rect x="810" y="92" width="350" height="200" rx="10" fill="#0f1623" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="810" y="92" width="350" height="6" rx="5" fill="#fbbf24"/>
  <text x="985" y="128" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">Altman Z-Score</text>
  <text x="985" y="172" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="42" font-weight="700" fill="#fbbf24">1.59</text>
  <text x="985" y="200" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">회색구간 (2022: -2.72에서 회복)</text>
  <!-- Z-score 구간 바 -->
  <rect x="830" y="218" width="310" height="10" rx="5" fill="#ef4444"/>
  <rect x="925" y="218" width="130" height="10" rx="0" fill="#fbbf24"/>
  <rect x="1055" y="218" width="85" height="10" rx="0" fill="#22c55e" stroke-radius="5"/>
  <!-- 현재 위치 마커: Z=1.59, 범위 1.8~3.0 경계에 가까움 -->
  <line x1="925" y1="214" x2="925" y2="232" stroke="#f1f5f9" stroke-width="2"/>
  <line x1="1055" y1="214" x2="1055" y2="232" stroke="#f1f5f9" stroke-width="2"/>
  <!-- 현재값 마커 -->
  <circle cx="873" cy="223" r="5" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
  <text x="830" y="248" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#ef4444">위험</text>
  <text x="925" y="248" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#fbbf24">회색</text>
  <text x="1055" y="248" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#22c55e">안전</text>
  <text x="985" y="270" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24">회색구간 하단 — 회복 중이나 아직 위험</text>

  <!-- === 카드 4: 자본 회복 === -->
  <rect x="40" y="320" width="350" height="200" rx="10" fill="#0f1623" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="40" y="320" width="350" height="6" rx="5" fill="#22c55e"/>
  <text x="215" y="356" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">자본 회복</text>
  <text x="215" y="400" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="42" font-weight="700" fill="#22c55e">8.3배</text>
  <text x="215" y="424" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f1f5f9">0.74조 (2022) → 6.17조 (2025)</text>
  <!-- 화살표 표현 -->
  <rect x="60" y="440" width="90" height="28" rx="4" fill="#ef444420"/>
  <text x="105" y="459" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#ef4444">0.74조</text>
  <text x="215" y="459" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#64748b">→</text>
  <rect x="250" y="440" width="90" height="28" rx="4" fill="#22c55e20"/>
  <text x="295" y="459" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#22c55e">6.17조</text>
  <text x="215" y="496" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">한화 인수 + 유증 + 실적 회복</text>

  <!-- === 카드 5: DOL === -->
  <rect x="425" y="320" width="350" height="200" rx="10" fill="#0f1623" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="425" y="320" width="350" height="6" rx="5" fill="#f59e0b"/>
  <text x="600" y="356" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">영업 레버리지 (DOL)</text>
  <text x="600" y="400" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="42" font-weight="700" fill="#f59e0b">20배</text>
  <text x="600" y="424" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f1f5f9">매출 10% 증가 → 영업이익 200%</text>
  <rect x="445" y="444" width="310" height="36" rx="6" fill="#f59e0b15"/>
  <text x="600" y="462" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#f59e0b">양날의 검 — 호황엔 폭발적 이익,</text>
  <text x="600" y="478" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#f59e0b">불황엔 손실 증폭</text>
  <text x="600" y="500" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">고정비 구조의 조선업 특성</text>

  <!-- === 카드 6: 수주잔고 === -->
  <rect x="810" y="320" width="350" height="200" rx="10" fill="#0f1623" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="810" y="320" width="350" height="6" rx="5" fill="#22c55e"/>
  <text x="985" y="356" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">수주잔고</text>
  <text x="985" y="400" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="42" font-weight="700" fill="#22c55e">34.5조</text>
  <text x="985" y="424" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f1f5f9">매출 2.7년치 가시성 확보</text>
  <!-- 막대 -->
  <rect x="830" y="442" width="310" height="14" rx="3" fill="#1e2d45"/>
  <rect x="830" y="442" width="274" height="14" rx="3" fill="#22c55e"/>
  <text x="985" y="476" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#22c55e">3년치에 근접 — 중기 매출 가시성 확보</text>
  <text x="985" y="496" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">업황 하강 시 완충 역할</text>

  <!-- 하단 결론 박스 -->
  <rect x="40" y="548" width="1120" height="90" rx="10" fill="#0f1623" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="548" width="1120" height="5" rx="5" fill="#334155"/>
  <text x="600" y="590" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">회복은 됐지만 완전하지 않다</text>
  <text x="600" y="616" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">부채비율 226%와 ICR 1.52×가 다음 사이클의 방어력 — 수주잔고 34.5조가 유일한 완충</text>

  <!-- 레이팅 요약 바 -->
  <rect x="40" y="660" width="1120" height="110" rx="10" fill="#0f1623" stroke="#1e2d45" stroke-width="1"/>

  <rect x="60" y="680" width="200" height="70" rx="6" fill="#ef444415"/>
  <text x="160" y="706" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">신용등급</text>
  <text x="160" y="734" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#fbbf24">dCR-BBB</text>

  <rect x="286" y="680" width="200" height="70" rx="6" fill="#3b82f615"/>
  <text x="386" y="706" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">아키타입</text>
  <text x="386" y="734" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#3b82f6">턴어라운드</text>

  <rect x="512" y="680" width="200" height="70" rx="6" fill="#22c55e15"/>
  <text x="612" y="706" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">방향성</text>
  <text x="612" y="734" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#22c55e">개선 중</text>

  <rect x="738" y="680" width="200" height="70" rx="6" fill="#f59e0b15"/>
  <text x="838" y="706" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">신뢰도</text>
  <text x="838" y="734" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#f59e0b">보통</text>

  <rect x="964" y="680" width="176" height="70" rx="6" fill="#1e2d45"/>
  <text x="1052" y="706" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">데이터 기준</text>
  <text x="1052" y="734" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#94a3b8">2026-04-18</text>

  <!-- 하단 출처 -->
  <text x="600" y="810" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#334155">dartlab 실측 · DART 사업보고서 기반</text>
</svg>
