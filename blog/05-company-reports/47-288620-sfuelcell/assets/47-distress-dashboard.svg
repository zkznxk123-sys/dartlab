<svg viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="600" y="54" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">부실 위험 신호 대시보드</text>
  <text x="600" y="82" text-anchor="middle" font-size="15" fill="#64748b">에스퓨얼셀 288620 — 6개 핵심 지표 종합 진단</text>

  <!-- Badge -->
  <rect x="506" y="92" width="188" height="32" rx="8" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">dCR-BB- (투기등급)</text>

  <!-- Card dimensions: 340x200, 3 cols × 2 rows -->
  <!-- Row 1: y=142, Row 2: y=368 -->
  <!-- Col x: 50, 430, 810 -->

  <!-- Card 1: Altman Z -->
  <rect x="50" y="142" width="340" height="200" rx="14" fill="#0f1629" stroke="#ef4444" stroke-width="2"/>
  <rect x="50" y="142" width="340" height="46" rx="14" fill="#ef4444" fill-opacity="0.12"/>
  <text x="220" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#ef4444">Altman Z-Score</text>
  <text x="220" y="244" text-anchor="middle" font-size="56" font-weight="800" fill="#ef4444">0.20</text>
  <text x="220" y="272" text-anchor="middle" font-size="12" fill="#94a3b8">부실 구간 기준: 1.81 미만</text>
  <!-- Progress bar -->
  <rect x="70" y="288" width="300" height="10" rx="5" fill="#1e293b"/>
  <rect x="70" y="288" width="33" height="10" rx="5" fill="#ef4444"/>
  <circle cx="70" cy="293" r="0"/>
  <text x="70" y="318" font-size="11" fill="#64748b">0</text>
  <text x="220" y="318" text-anchor="middle" font-size="11" fill="#f59e0b">|1.81</text>
  <text x="370" y="318" text-anchor="end" font-size="11" fill="#64748b">3.0+</text>
  <text x="220" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">부실 위험 구간</text>

  <!-- Card 2: ICR -->
  <rect x="430" y="142" width="340" height="200" rx="14" fill="#0f1629" stroke="#ef4444" stroke-width="2"/>
  <rect x="430" y="142" width="340" height="46" rx="14" fill="#ef4444" fill-opacity="0.12"/>
  <text x="600" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#ef4444">이자보상배율 (ICR)</text>
  <text x="600" y="244" text-anchor="middle" font-size="56" font-weight="800" fill="#ef4444">-3.86</text>
  <text x="600" y="272" text-anchor="middle" font-size="12" fill="#94a3b8">정상: 1.0배 이상 / 현재: 이자 지급 불능</text>
  <rect x="450" y="284" width="300" height="36" rx="8" fill="#ef4444" fill-opacity="0.18"/>
  <text x="600" y="300" text-anchor="middle" font-size="12" fill="#ef4444">영업이익 (-150억) / 이자비용 (39억)</text>
  <text x="600" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">이자조차 갚을 수 없는 구조</text>

  <!-- Card 3: 현금 -->
  <rect x="810" y="142" width="340" height="200" rx="14" fill="#0f1629" stroke="#ef4444" stroke-width="2"/>
  <rect x="810" y="142" width="340" height="46" rx="14" fill="#ef4444" fill-opacity="0.12"/>
  <text x="980" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#ef4444">현금 보유 vs 순차입금</text>
  <text x="980" y="244" text-anchor="middle" font-size="52" font-weight="800" fill="#ef4444">6억</text>
  <text x="980" y="272" text-anchor="middle" font-size="12" fill="#94a3b8">순차입금 235억 대비 현금 보유</text>
  <!-- Bar comparison -->
  <rect x="830" y="288" width="300" height="14" rx="5" fill="#1e293b"/>
  <rect x="830" y="288" width="8" height="14" rx="3" fill="#ef4444"/>
  <text x="980" y="318" text-anchor="middle" font-size="12" fill="#94a3b8">현금 6억 / 순차입금 235억</text>
  <text x="980" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">분기 적자 38억 — 두 분기 버팀목</text>

  <!-- Card 4: CCC -->
  <rect x="50" y="368" width="340" height="200" rx="14" fill="#0f1629" stroke="#f59e0b" stroke-width="2"/>
  <rect x="50" y="368" width="340" height="46" rx="14" fill="#f59e0b" fill-opacity="0.12"/>
  <text x="220" y="398" text-anchor="middle" font-size="14" font-weight="600" fill="#f59e0b">현금전환주기 (CCC)</text>
  <text x="220" y="468" text-anchor="middle" font-size="56" font-weight="800" fill="#f59e0b">447일</text>
  <text x="220" y="496" text-anchor="middle" font-size="12" fill="#94a3b8">현금이 돌아오는 데 1년 이상 소요</text>
  <rect x="70" y="512" width="300" height="36" rx="8" fill="#f59e0b" fill-opacity="0.12"/>
  <text x="220" y="528" text-anchor="middle" font-size="12" fill="#f59e0b">매출채권 회전 지연 + 재고 장기화</text>
  <text x="220" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">운전자본 부담 극심</text>

  <!-- Card 5: CAPEX -->
  <rect x="430" y="368" width="340" height="200" rx="14" fill="#0f1629" stroke="#f59e0b" stroke-width="2"/>
  <rect x="430" y="368" width="340" height="46" rx="14" fill="#f59e0b" fill-opacity="0.12"/>
  <text x="600" y="398" text-anchor="middle" font-size="14" font-weight="600" fill="#f59e0b">CAPEX / 매출비율</text>
  <text x="600" y="468" text-anchor="middle" font-size="56" font-weight="800" fill="#f59e0b">0.7%</text>
  <text x="600" y="496" text-anchor="middle" font-size="12" fill="#94a3b8">투자 실질 중단 수준 (정상: 3~8%)</text>
  <rect x="450" y="512" width="300" height="36" rx="8" fill="#f59e0b" fill-opacity="0.12"/>
  <text x="600" y="528" text-anchor="middle" font-size="12" fill="#f59e0b">성장 투자 중단 = 미래 매출 기반 소멸</text>
  <text x="600" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">생존 우선, 성장 포기</text>

  <!-- Card 6: Springate -->
  <rect x="810" y="368" width="340" height="200" rx="14" fill="#0f1629" stroke="#ef4444" stroke-width="2"/>
  <rect x="810" y="368" width="340" height="46" rx="14" fill="#ef4444" fill-opacity="0.12"/>
  <text x="980" y="398" text-anchor="middle" font-size="14" font-weight="600" fill="#ef4444">Springate S-Score</text>
  <text x="980" y="468" text-anchor="middle" font-size="56" font-weight="800" fill="#ef4444">-0.43</text>
  <text x="980" y="496" text-anchor="middle" font-size="12" fill="#94a3b8">부실 기준: 0.862 미만</text>
  <rect x="830" y="512" width="300" height="14" rx="5" fill="#1e293b"/>
  <rect x="830" y="512" width="45" height="14" rx="3" fill="#ef4444"/>
  <text x="980" y="544" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">Altman과 동일한 부실 진단</text>

  <!-- Summary bar -->
  <rect x="50" y="594" width="1100" height="96" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="628" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">종합 진단</text>

  <!-- 4 red + 2 yellow indicators -->
  <circle cx="240" cy="655" r="8" fill="#ef4444"/>
  <circle cx="290" cy="655" r="8" fill="#ef4444"/>
  <circle cx="340" cy="655" r="8" fill="#ef4444"/>
  <circle cx="390" cy="655" r="8" fill="#ef4444"/>
  <circle cx="440" cy="655" r="8" fill="#f59e0b"/>
  <circle cx="490" cy="655" r="8" fill="#f59e0b"/>
  <text x="540" y="660" font-size="14" fill="#94a3b8">← 부실 4개   경고 2개</text>

  <text x="600" y="678" text-anchor="middle" font-size="13" fill="#94a3b8">자생 회복 없으면 자본잠식 경로 — 외부 자금 조달 또는 매출 반등이 유일한 탈출구</text>

  <!-- Bottom note -->
  <text x="600" y="730" text-anchor="middle" font-size="13" fill="#475569">분석 기준: 2025년 사업보고서 (감사완료 전) | Altman Z: 제조업 수정 공식 적용</text>
  <text x="600" y="752" text-anchor="middle" font-size="12" fill="#334155">투자 판단의 참고 자료이며 매수/매도 권유가 아닙니다</text>
</svg>
