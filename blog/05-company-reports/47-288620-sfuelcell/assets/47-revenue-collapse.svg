<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">에스퓨얼셀 매출 붕괴 — 역마진 구조</text>
  <text x="600" y="80" text-anchor="middle" font-size="15" fill="#64748b">연간 매출(억원) + 영업이익률(OPM) 추이 2019–2025</text>

  <!-- Chart area: x=100..1100, y=120..560 -->
  <!-- Y axis labels (매출 억원) -->
  <text x="88" y="128" text-anchor="end" font-size="12" fill="#64748b">500</text>
  <text x="88" y="218" text-anchor="end" font-size="12" fill="#64748b">400</text>
  <text x="88" y="308" text-anchor="end" font-size="12" fill="#64748b">300</text>
  <text x="88" y="398" text-anchor="end" font-size="12" fill="#64748b">200</text>
  <text x="88" y="488" text-anchor="end" font-size="12" fill="#64748b">100</text>
  <text x="88" y="562" text-anchor="end" font-size="12" fill="#64748b">0</text>

  <!-- Grid lines -->
  <line x1="100" y1="125" x2="1100" y2="125" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="215" x2="1100" y2="215" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="305" x2="1100" y2="305" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="395" x2="1100" y2="395" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="485" x2="1100" y2="485" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="560" x2="1100" y2="560" stroke="#334155" stroke-width="1.5"/>

  <!-- Bar width = 90, gap = 53, start x = 128
       scale: 500 units = 435px  → 1 unit = 0.87px
       bar top = 560 - (value * 0.87)
       2019:380 → 560-330.6=229.4  h=330.6
       2020:470 → 560-408.9=151.1  h=408.9
       2021:473 → 560-411.5=148.5  h=411.5
       2022:468 → 560-407.2=152.8  h=407.2
       2023:325 → 560-282.8=277.2  h=282.8
       2024:337 → 560-293.2=266.8  h=293.2
       2025:158 → 560-137.5=422.5  h=137.5
       x positions (center): 171, 314, 457, 600, 743, 886, 1029
  -->

  <!-- Bars -->
  <!-- 2019 -->
  <rect x="126" y="229" width="90" height="331" rx="4" fill="#3b82f6" fill-opacity="0.7"/>
  <text x="171" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">380</text>

  <!-- 2020 -->
  <rect x="269" y="151" width="90" height="409" rx="4" fill="#3b82f6" fill-opacity="0.7"/>
  <text x="314" y="142" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">470</text>

  <!-- 2021 -->
  <rect x="412" y="149" width="90" height="412" rx="4" fill="#3b82f6" fill-opacity="0.7"/>
  <text x="457" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">473</text>

  <!-- 2022 -->
  <rect x="555" y="153" width="90" height="407" rx="4" fill="#3b82f6" fill-opacity="0.7"/>
  <text x="600" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">468</text>

  <!-- 2023 -->
  <rect x="698" y="277" width="90" height="283" rx="4" fill="#f59e0b" fill-opacity="0.7"/>
  <text x="743" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#f59e0b">325</text>

  <!-- 2024 -->
  <rect x="841" y="267" width="90" height="293" rx="4" fill="#f59e0b" fill-opacity="0.7"/>
  <text x="886" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#f59e0b">337</text>

  <!-- 2025 (강조) -->
  <rect x="984" y="423" width="90" height="137" rx="4" fill="#ef4444" fill-opacity="0.85"/>
  <text x="1029" y="413" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">158</text>

  <!-- X axis labels -->
  <text x="171" y="580" text-anchor="middle" font-size="13" fill="#64748b">2019</text>
  <text x="314" y="580" text-anchor="middle" font-size="13" fill="#64748b">2020</text>
  <text x="457" y="580" text-anchor="middle" font-size="13" fill="#64748b">2021</text>
  <text x="600" y="580" text-anchor="middle" font-size="13" fill="#64748b">2022</text>
  <text x="743" y="580" text-anchor="middle" font-size="13" fill="#64748b">2023</text>
  <text x="886" y="580" text-anchor="middle" font-size="13" fill="#64748b">2024</text>
  <text x="1029" y="580" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">2025</text>

  <!-- OPM line overlay
       OPM scale: range -100% to +10%  → total 110%, chart height 435px
       baseline (0%) = 560 - (0/110)*435 = 560
       positive above, negative below
       y = 560 - (opm/110)*435
       2019: 5.8% → 560 - 22.9 = 537.1
       2020: 4.5% → 560 - 17.8 = 542.2
       2021: 4.8% → 560 - 19.0 = 541.0
       2022: 2.6% → 560 - 10.3 = 549.7
       2023: -7.6% → 560 + 30.1 = 590.1  (below chart — will clip)
       2024: -12.3% → 560 + 48.7 = 608.7
       2025: -95.1% → 560 + 376.3 = 936.3  (way off — show as separate indicator)
  -->

  <!-- OPM secondary axis label -->
  <text x="1112" y="560" font-size="11" fill="#22c55e">0%</text>
  <text x="1112" y="537" font-size="11" fill="#22c55e">+5%</text>

  <!-- OPM line (2019-2022, positive range visible) -->
  <polyline points="171,537 314,542 457,541 600,550" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- OPM dots positive -->
  <circle cx="171" cy="537" r="5" fill="#22c55e"/>
  <text x="171" y="524" text-anchor="middle" font-size="11" fill="#22c55e">+5.8%</text>
  <circle cx="314" cy="542" r="5" fill="#22c55e"/>
  <text x="314" y="529" text-anchor="middle" font-size="11" fill="#22c55e">+4.5%</text>
  <circle cx="457" cy="541" r="5" fill="#22c55e"/>
  <text x="457" y="528" text-anchor="middle" font-size="11" fill="#22c55e">+4.8%</text>
  <circle cx="600" cy="550" r="5" fill="#22c55e"/>
  <text x="600" y="537" text-anchor="middle" font-size="11" fill="#22c55e">+2.6%</text>

  <!-- OPM declining 2023 onward — shown as badges below x-axis -->
  <rect x="688" y="588" width="110" height="26" rx="5" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="743" y="606" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">OPM -7.6%</text>
  <rect x="831" y="588" width="110" height="26" rx="5" fill="#ef4444" fill-opacity="0.2"/>
  <text x="886" y="606" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">OPM -12.3%</text>
  <rect x="974" y="588" width="110" height="26" rx="5" fill="#ef4444" fill-opacity="0.3"/>
  <text x="1029" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">OPM -95.1%</text>

  <!-- 2025 highlight badge -->
  <rect x="960" y="330" width="140" height="52" rx="8" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1030" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">매출원가율 127%</text>
  <text x="1030" y="372" text-anchor="middle" font-size="11" fill="#ef4444">팔수록 적자</text>

  <!-- Bottom annotation -->
  <rect x="60" y="638" width="1080" height="62" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="664" text-anchor="middle" font-size="14" font-weight="600" fill="#fbbf24">매출이 반토막 나면서 고정비를 흡수 못함</text>
  <text x="600" y="686" text-anchor="middle" font-size="13" fill="#94a3b8">원가율이 100%를 넘으면 구조적 역마진 — 매출이 늘어도 손실이 함께 커진다</text>
</svg>
