<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <filter id="item-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Red glow -->
    <filter id="red-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="720" fill="url(#bg5)"/>

  <!-- Title -->
  <text x="540" y="50" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">오뚜기 투자 체크포인트</text>
  <text x="540" y="78" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">5가지 모니터링 지표 — 해소 여부에 따라 투자 판단 변화</text>

  <!-- ========== ITEM 1: OPM 7% 회복 (빨강) ========== -->
  <g filter="url(#item-shadow)">
    <rect x="60" y="100" width="960" height="84" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2"/>
  </g>
  <!-- Left status indicator -->
  <rect x="60" y="100" width="8" height="84" rx="4" fill="#ef4444"/>
  <!-- Number badge -->
  <circle cx="108" cy="142" r="22" fill="#ef4444" opacity="0.15"/>
  <circle cx="108" cy="142" r="22" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="108" y="148" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#ef4444">1</text>
  <!-- Content -->
  <text x="152" y="132" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">OPM 7% 회복</text>
  <text x="152" y="156" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2023년 7.4%에서 4.8%로 하락 — 원가율 + 판관비 동시 악화</text>
  <!-- Right status tag -->
  <rect x="880" y="118" width="120" height="32" rx="8" fill="#ef4444" opacity="0.15"/>
  <rect x="880" y="118" width="120" height="32" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="940" y="139" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ef4444">미해소 ✗</text>
  <!-- Progress bar -->
  <rect x="152" y="166" width="700" height="6" rx="3" fill="#1e293b"/>
  <rect x="152" y="166" width="336" height="6" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="860" y="174" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#ef4444">4.8% / 7.0%</text>

  <!-- ========== ITEM 2: 해외 20% 돌파 (노랑) ========== -->
  <g filter="url(#item-shadow)">
    <rect x="60" y="198" width="960" height="84" rx="12" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
  </g>
  <rect x="60" y="198" width="8" height="84" rx="4" fill="#fbbf24"/>
  <circle cx="108" cy="240" r="22" fill="#fbbf24" opacity="0.12"/>
  <circle cx="108" cy="240" r="22" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="108" y="246" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#fbbf24">2</text>

  <text x="152" y="230" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">해외 매출 비중 20% 돌파</text>
  <text x="152" y="254" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">현재 15% — 진라면 수출 가속 여부, OEM 확대 계획 모니터링</text>

  <rect x="880" y="216" width="120" height="32" rx="8" fill="#fbbf24" opacity="0.12"/>
  <rect x="880" y="216" width="120" height="32" rx="8" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="940" y="237" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#fbbf24">진행중 △</text>

  <rect x="152" y="264" width="700" height="6" rx="3" fill="#1e293b"/>
  <rect x="152" y="264" width="525" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <text x="860" y="272" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24">15% / 20%</text>

  <!-- ========== ITEM 3: 판관비율 10% 이하 (노랑) ========== -->
  <g filter="url(#item-shadow)">
    <rect x="60" y="296" width="960" height="84" rx="12" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
  </g>
  <rect x="60" y="296" width="8" height="84" rx="4" fill="#fbbf24"/>
  <circle cx="108" cy="338" r="22" fill="#fbbf24" opacity="0.12"/>
  <circle cx="108" cy="338" r="22" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="108" y="344" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#fbbf24">3</text>

  <text x="152" y="328" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">판관비율 10% 이하 복귀</text>
  <text x="152" y="352" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">현재 11.3% — 3년 연속 상승 중 (물류비 + 광고비 증가)</text>

  <rect x="880" y="314" width="120" height="32" rx="8" fill="#fbbf24" opacity="0.12"/>
  <rect x="880" y="314" width="120" height="32" rx="8" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="940" y="335" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#fbbf24">미해소 △</text>

  <rect x="152" y="362" width="700" height="6" rx="3" fill="#1e293b"/>
  <rect x="152" y="362" width="617" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <text x="860" y="370" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24">11.3% / 10%</text>

  <!-- ========== ITEM 4: 프리미엄 신제품 (파랑) ========== -->
  <g filter="url(#item-shadow)">
    <rect x="60" y="394" width="960" height="84" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="60" y="394" width="8" height="84" rx="4" fill="#3b82f6"/>
  <circle cx="108" cy="436" r="22" fill="#3b82f6" opacity="0.12"/>
  <circle cx="108" cy="436" r="22" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="108" y="442" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#3b82f6">4</text>

  <text x="152" y="426" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">프리미엄 신제품 성과</text>
  <text x="152" y="450" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">라면 외 카레·소스·HMR 마진 기여도 — 고부가 카테고리 성장 여부</text>

  <rect x="880" y="412" width="120" height="32" rx="8" fill="#3b82f6" opacity="0.12"/>
  <rect x="880" y="412" width="120" height="32" rx="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="940" y="433" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#3b82f6">모니터링 ◎</text>

  <rect x="152" y="460" width="700" height="6" rx="3" fill="#1e293b"/>
  <rect x="152" y="460" width="350" height="6" rx="3" fill="#3b82f6" opacity="0.6"/>
  <text x="860" y="468" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#3b82f6">데이터 누적 필요</text>

  <!-- ========== ITEM 5: 배당 정책 (빨강) ========== -->
  <g filter="url(#item-shadow)">
    <rect x="60" y="492" width="960" height="84" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="60" y="492" width="8" height="84" rx="4" fill="#ef4444"/>
  <circle cx="108" cy="534" r="22" fill="#ef4444" opacity="0.15"/>
  <circle cx="108" cy="534" r="22" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="108" y="540" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#ef4444">5</text>

  <text x="152" y="524" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">배당 정책 유지</text>
  <text x="152" y="548" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2025년 배당 미지급 — 재개 여부 및 배당 정책 정상화 확인 필요</text>

  <rect x="880" y="510" width="120" height="32" rx="8" fill="#ef4444" opacity="0.15"/>
  <rect x="880" y="510" width="120" height="32" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="940" y="531" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#ef4444">미지급 ✗</text>

  <rect x="152" y="558" width="700" height="6" rx="3" fill="#1e293b"/>
  <rect x="152" y="558" width="140" height="6" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="860" y="566" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#ef4444">2025년 미지급</text>

  <!-- ========== Footer ========== -->
  <rect x="60" y="598" width="960" height="90" rx="12" fill="#1e2330" stroke="#334155" stroke-width="1"/>
  <!-- Stats -->
  <text x="180" y="630" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">신용등급</text>
  <text x="180" y="654" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="#22c55e">dCR-A</text>
  <line x1="280" y1="608" x2="280" y2="678" stroke="#334155" stroke-width="1"/>

  <text x="400" y="630" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">현금 보유</text>
  <text x="400" y="654" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="#22c55e">4,127억</text>
  <line x1="500" y1="608" x2="500" y2="678" stroke="#334155" stroke-width="1"/>

  <text x="620" y="630" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">부채비율</text>
  <text x="620" y="654" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="#22c55e">65%</text>
  <line x1="720" y1="608" x2="720" y2="678" stroke="#334155" stroke-width="1"/>

  <text x="870" y="630" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#475569">측정 기준일</text>
  <text x="870" y="652" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#64748b">2026-04-18</text>
  <text x="870" y="671" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#334155">dartlab 실측</text>
</svg>
