<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <filter id="bar-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">3사 비용 구조 비교 — 100원 팔면 얼마가 남나</text>
  <text x="600" y="80" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">매출원가 / 판관비 / 영업이익 (% of 매출, 2025년 기준)</text>

  <!-- Legend -->
  <rect x="320" y="96" width="16" height="16" rx="3" fill="#475569"/>
  <text x="342" y="108" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">매출원가</text>
  <rect x="460" y="96" width="16" height="16" rx="3" fill="#2563eb"/>
  <text x="482" y="108" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">판관비</text>
  <rect x="560" y="96" width="16" height="16" rx="3" fill="#22c55e"/>
  <text x="582" y="108" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#22c55e" font-weight="600">영업이익</text>

  <!-- Bar chart: horizontal stacked 100% -->
  <!-- Bar area: x=220 ~ 1060 (width=840), y: row1=170, row2=320, row3=470 -->
  <!-- Each bar height: 80px -->
  <!-- 1px = 840/100 = 8.4 -->

  <!-- ========== 삼양식품: 원가 55%, 판관비 23%, 이익 22% ========== -->
  <!-- Row 1 y=170 -->
  <text x="210" y="218" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#22c55e">삼양식품</text>

  <!-- Cost bar (55% = 462px) -->
  <rect x="220" y="175" width="462" height="80" rx="0" fill="#475569" filter="url(#bar-shadow)"/>
  <text x="441" y="221" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">매출원가 55%</text>

  <!-- SGA bar (23% = 193.2px → from 682 to 875) -->
  <rect x="682" y="175" width="193" height="80" fill="#2563eb" filter="url(#bar-shadow)"/>
  <text x="778" y="221" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="600" fill="#f1f5f9">판관비 23%</text>

  <!-- OPM bar (22% = 184.8px → from 875 to 1060) -->
  <rect x="875" y="175" width="185" height="80" rx="0" fill="#22c55e" filter="url(#bar-shadow)"/>
  <text x="967" y="221" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="800" fill="#0a0e1a">OPM 22%</text>

  <!-- right round cap -->
  <rect x="1055" y="175" width="10" height="80" rx="0" fill="#22c55e"/>

  <!-- Annotation right -->
  <text x="1075" y="215" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#22c55e">▲ 22원 남음</text>

  <!-- ========== 농심: 원가 76%, 판관비 19%, 이익 5% ========== -->
  <text x="210" y="368" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#fbbf24">농심</text>

  <!-- Cost bar (76% = 638.4px) -->
  <rect x="220" y="325" width="638" height="80" fill="#475569" filter="url(#bar-shadow)"/>
  <text x="539" y="371" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">매출원가 76%</text>

  <!-- SGA bar (19% = 159.6px → from 858 to 1017) -->
  <rect x="858" y="325" width="160" height="80" fill="#2563eb" filter="url(#bar-shadow)"/>
  <text x="938" y="371" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#f1f5f9">판관비 19%</text>

  <!-- OPM bar (5% = 42px → from 1018 to 1060) -->
  <rect x="1018" y="325" width="42" height="80" fill="#fbbf24" filter="url(#bar-shadow)"/>

  <text x="1075" y="365" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24">OPM 5.2%</text>

  <!-- ========== 오뚜기: 원가 84%, 판관비 11%, 이익 5% ========== -->
  <text x="210" y="518" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#ef4444">오뚜기</text>

  <!-- Cost bar (84% = 705.6px) -->
  <rect x="220" y="475" width="706" height="80" fill="#475569" filter="url(#bar-shadow)"/>
  <!-- highlight overshoot -->
  <rect x="220" y="475" width="706" height="80" fill="#ef4444" opacity="0.12"/>
  <text x="573" y="521" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#fca5a5">매출원가 84%</text>

  <!-- SGA bar (11% = 92.4px → from 926 to 1018) -->
  <rect x="926" y="475" width="92" height="80" fill="#2563eb" filter="url(#bar-shadow)"/>
  <text x="972" y="521" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#f1f5f9">판관비 11%</text>

  <!-- OPM bar (5% = 42px → from 1018 to 1060) -->
  <rect x="1018" y="475" width="42" height="80" fill="#ef4444" filter="url(#bar-shadow)"/>

  <text x="1075" y="511" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#ef4444">OPM 4.8%</text>
  <text x="1075" y="529" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">▼ 5원만</text>

  <!-- ========== Annotation box ========== -->
  <rect x="80" y="576" width="1040" height="56" rx="8" fill="#1e2330" stroke="#334155" stroke-width="1"/>
  <text x="600" y="599" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">오뚜기 원가율 84% — 100원 팔면 84원이 원가. 남는 16원에서 판관비 11원 빼면 <tspan font-weight="700" fill="#ef4444">5원</tspan></text>
  <text x="600" y="620" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#22c55e">삼양의 비밀: 원가율이 낮다 (55%) — 해외 프리미엄 가격이 원가율을 누른다</text>

  <!-- X axis labels -->
  <text x="220" y="648" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">0%</text>
  <text x="430" y="648" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">25%</text>
  <text x="640" y="648" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">50%</text>
  <text x="850" y="648" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">75%</text>
  <text x="1055" y="648" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">100%</text>

  <!-- vertical guide lines for 25/50/75 -->
  <line x1="430" y1="165" x2="430" y2="575" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="640" y1="165" x2="640" y2="575" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="850" y1="165" x2="850" y2="575" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
</svg>
