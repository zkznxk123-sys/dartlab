<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <filter id="card4shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Arc for health score gauge -->
    <linearGradient id="gauge-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">오뚜기 프랜차이즈 프로필</text>
  <text x="600" y="80" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">강점과 약점 대시보드 — 2025년 기준</text>

  <!-- ============ CARD 1: dCR-A (좌상) ============ -->
  <g filter="url(#card4shadow)">
    <rect x="80" y="110" width="490" height="240" rx="16" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  </g>
  <!-- Badge top -->
  <rect x="80" y="110" width="490" height="52" rx="16" fill="#22c55e" opacity="0.15"/>
  <rect x="80" y="138" width="490" height="24" fill="#22c55e" opacity="0.15"/>
  <text x="325" y="140" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac" font-weight="600">신용 등급</text>
  <text x="325" y="158" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac">dartlab Credit Rating</text>

  <!-- Grade display -->
  <text x="200" y="240" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="80" font-weight="900" fill="#22c55e">A</text>
  <text x="200" y="274" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">dCR 등급</text>

  <!-- Health score -->
  <text x="390" y="200" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">종합 건전성</text>
  <!-- Score arc background -->
  <circle cx="390" cy="238" r="56" fill="none" stroke="#1e293b" stroke-width="8"/>
  <!-- Score arc (82/100 = 295.2deg of 360 = 82% of circumference 351.9 = 288.5) -->
  <!-- circumference = 2*pi*56 ≈ 351.9 -->
  <!-- 82% of 351.9 = 288.6 -->
  <circle cx="390" cy="238" r="56" fill="none" stroke="#22c55e" stroke-width="8"
          stroke-dasharray="288.6 351.9" stroke-dashoffset="88" stroke-linecap="round" transform="rotate(-90 390 238)"/>
  <text x="390" y="244" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="800" fill="#22c55e">82</text>
  <text x="390" y="262" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">/ 100점</text>

  <text x="325" y="318" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">우량 — 재무 안정성 상위권</text>
  <rect x="110" y="328" width="430" height="2" rx="1" fill="#22c55e" opacity="0.2"/>
  <text x="325" y="342" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">현금 4,127억 · 순차입 없음</text>

  <!-- ============ CARD 2: 부채비율 (우상) ============ -->
  <g filter="url(#card4shadow)">
    <rect x="630" y="110" width="490" height="240" rx="16" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  </g>
  <rect x="630" y="110" width="490" height="52" rx="16" fill="#22c55e" opacity="0.12"/>
  <rect x="630" y="138" width="490" height="24" fill="#22c55e" opacity="0.12"/>
  <text x="875" y="140" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac" font-weight="600">재무 안정성</text>
  <text x="875" y="158" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac">부채비율</text>

  <!-- Big number -->
  <text x="875" y="235" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="72" font-weight="900" fill="#22c55e">65%</text>
  <text x="875" y="262" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">업종 평균 대비 낮음</text>

  <!-- Bar comparison -->
  <text x="660" y="298" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">오뚜기</text>
  <rect x="720" y="288" width="163" height="14" rx="7" fill="#22c55e" opacity="0.8"/>
  <rect x="720" y="288" width="250" height="14" rx="7" fill="#22c55e" opacity="0.1"/>
  <text x="890" y="299" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e">65%</text>

  <text x="660" y="324" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">업종평균</text>
  <rect x="720" y="314" width="200" height="14" rx="7" fill="#fbbf24" opacity="0.5"/>
  <rect x="720" y="314" width="250" height="14" rx="7" fill="#fbbf24" opacity="0.1"/>
  <text x="928" y="325" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#fbbf24">~80%</text>

  <text x="875" y="348" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#22c55e">안정 — 배당·투자 여력 존재</text>

  <!-- ============ CARD 3: OPM (좌하) ============ -->
  <g filter="url(#card4shadow)">
    <rect x="80" y="378" width="490" height="240" rx="16" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
  </g>
  <rect x="80" y="378" width="490" height="52" rx="16" fill="#fbbf24" opacity="0.10"/>
  <rect x="80" y="406" width="490" height="24" fill="#fbbf24" opacity="0.10"/>
  <text x="325" y="408" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fde68a" font-weight="600">수익성 경고</text>
  <text x="325" y="426" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fde68a">영업이익률 (OPM)</text>

  <text x="875" y="0" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b"/>

  <!-- Trend mini chart -->
  <text x="210" y="490" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="56" font-weight="900" fill="#fbbf24">4.8%</text>
  <text x="210" y="516" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">2025년 OPM</text>

  <!-- Trend mini bars: 7.4, 5.0, 2.6, 4.8 -->
  <text x="390" y="458" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">최근 4개 연도 추이</text>
  <!-- bars height = val * 8 -->
  <!-- 2022=5.0→40, 2023=7.4→59, 2024=2.6→21, 2025=4.8→38 -->
  <rect x="336" y="499" width="28" height="40" rx="3" fill="#fbbf24" opacity="0.5"/>
  <text x="350" y="550" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#64748b">22</text>
  <text x="350" y="496" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#fbbf24">5.0%</text>

  <rect x="376" y="480" width="28" height="59" rx="3" fill="#fbbf24" opacity="0.7"/>
  <text x="390" y="550" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#64748b">23</text>
  <text x="390" y="477" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#fbbf24">7.4%</text>

  <rect x="416" y="518" width="28" height="21" rx="3" fill="#ef4444" opacity="0.8"/>
  <text x="430" y="550" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#64748b">24</text>
  <text x="430" y="514" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#ef4444">2.6%</text>

  <rect x="456" y="501" width="28" height="38" rx="3" fill="#fbbf24" opacity="0.6"/>
  <text x="470" y="550" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#64748b">25</text>
  <text x="470" y="497" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#fbbf24">4.8%</text>

  <text x="325" y="572" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24">3기 연속 하락 — 원가율+판관비 동시 악화</text>
  <text x="325" y="592" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">2023년 고점 7.4% → 2025년 4.8%</text>
  <text x="325" y="610" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">▲ 판관비 3년 연속 상승 중</text>

  <!-- ============ CARD 4: 해외 비중 (우하) ============ -->
  <g filter="url(#card4shadow)">
    <rect x="630" y="378" width="490" height="240" rx="16" fill="#111827" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="630" y="378" width="490" height="52" rx="16" fill="#ef4444" opacity="0.10"/>
  <rect x="630" y="406" width="490" height="24" fill="#ef4444" opacity="0.10"/>
  <text x="875" y="408" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5" font-weight="600">성장성 경고</text>
  <text x="875" y="426" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5">해외 매출 비중</text>

  <text x="800" y="490" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="56" font-weight="900" fill="#ef4444">15%</text>
  <text x="800" y="516" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">내수 의존</text>

  <!-- Pie-like bar comparison -->
  <text x="960" y="460" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">경쟁사 비교</text>
  <rect x="920" y="468" width="80" height="10" rx="5" fill="#1e293b"/>
  <rect x="920" y="468" width="12" height="10" rx="5" fill="#ef4444"/>
  <text x="1008" y="477" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#ef4444">오뚜기 15%</text>

  <rect x="920" y="490" width="80" height="10" rx="5" fill="#1e293b"/>
  <rect x="920" y="490" width="52" height="10" rx="5" fill="#fbbf24"/>
  <text x="1008" y="499" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24">농심 66%</text>

  <rect x="920" y="512" width="80" height="10" rx="5" fill="#1e293b"/>
  <rect x="920" y="512" width="62" height="10" rx="5" fill="#22c55e"/>
  <text x="1008" y="521" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#22c55e">삼양 77%</text>

  <text x="875" y="572" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#ef4444">내수 의존 — 성장 한계 명확</text>
  <text x="875" y="592" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">진라면 수출 확장이 유일한 레버</text>
  <text x="875" y="610" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">목표: 20% 돌파 여부 모니터링 필요</text>

  <!-- ============ CENTER LABEL ============ -->
  <rect x="360" y="642" width="480" height="50" rx="12" fill="#1e2330" stroke="#334155" stroke-width="1"/>
  <text x="600" y="662" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8">안정적이지만</text>
  <text x="600" y="682" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#fbbf24">성장하지 않는 프랜차이즈</text>
</svg>
