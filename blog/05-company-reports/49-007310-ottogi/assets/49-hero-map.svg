<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <!-- connector line dash -->
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg-grad)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="640" x2="1200" y2="640" stroke="#1e293b" stroke-width="1" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">라면 빅3 — 같은 라면인데 OPM이 22%, 5%, 5%</text>
  <text x="600" y="80" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">2025년 기준 | 영업이익률 비교</text>

  <!-- =========== CONNECTOR LINES =========== -->
  <!-- 삼양(270,240) → 농심(930,240) -->
  <line x1="420" y1="270" x2="780" y2="270" stroke="#334155" stroke-width="2" stroke-dasharray="8,5"/>
  <!-- 삼양(270,240) → 오뚜기(600,510) -->
  <line x1="320" y1="390" x2="530" y2="480" stroke="#334155" stroke-width="2" stroke-dasharray="8,5"/>
  <!-- 농심(930,240) → 오뚜기(600,510) -->
  <line x1="880" y1="390" x2="670" y2="480" stroke="#334155" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- Center label -->
  <rect x="490" y="250" width="220" height="40" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="275" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#fbbf24">차이는 해외 비중</text>

  <!-- =========== 삼양식품 카드 (좌상) =========== -->
  <g filter="url(#card-shadow)">
    <rect x="80" y="130" width="320" height="280" rx="16" fill="#111827" stroke="#22c55e" stroke-width="2.5"/>
  </g>
  <!-- 상단 badge -->
  <rect x="80" y="130" width="320" height="50" rx="16" fill="#22c55e" opacity="0.15"/>
  <rect x="80" y="155" width="320" height="25" fill="#22c55e" opacity="0.15"/>
  <text x="240" y="162" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#22c55e">삼양식품</text>
  <text x="240" y="182" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#86efac">매출 2.35조</text>

  <!-- OPM big -->
  <text x="240" y="240" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="56" font-weight="800" fill="#22c55e">22%</text>
  <text x="240" y="265" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">영업이익률 (OPM)</text>

  <!-- Stats -->
  <line x1="110" y1="280" x2="370" y2="280" stroke="#1e293b" stroke-width="1"/>
  <text x="130" y="302" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">해외 비중</text>
  <text x="370" y="302" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#22c55e">77%</text>
  <text x="130" y="326" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">핵심 IP</text>
  <text x="370" y="326" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f1f5f9">불닭 단일IP</text>
  <text x="130" y="350" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">매출원가율</text>
  <text x="370" y="350" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#22c55e">55%</text>
  <text x="130" y="374" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">해외 프리미엄 가격 → 원가율 압축</text>

  <!-- =========== 농심 카드 (우상) =========== -->
  <g filter="url(#card-shadow)">
    <rect x="800" y="130" width="320" height="280" rx="16" fill="#111827" stroke="#fbbf24" stroke-width="2.5"/>
  </g>
  <rect x="800" y="130" width="320" height="50" rx="16" fill="#fbbf24" opacity="0.12"/>
  <rect x="800" y="155" width="320" height="25" fill="#fbbf24" opacity="0.12"/>
  <text x="960" y="162" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#fbbf24">농심</text>
  <text x="960" y="182" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fde68a">매출 3.51조</text>

  <text x="960" y="240" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="56" font-weight="800" fill="#fbbf24">5.2%</text>
  <text x="960" y="265" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">영업이익률 (OPM)</text>

  <line x1="830" y1="280" x2="1090" y2="280" stroke="#1e293b" stroke-width="1"/>
  <text x="850" y="302" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">해외 비중</text>
  <text x="1090" y="302" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#fbbf24">66%</text>
  <text x="850" y="326" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">핵심 IP</text>
  <text x="1090" y="326" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f1f5f9">신라면 100+SKU</text>
  <text x="850" y="350" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">매출원가율</text>
  <text x="1090" y="350" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24">76%</text>
  <text x="850" y="374" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">SKU 다변화 → 원가율 관리 어려움</text>

  <!-- =========== 오뚜기 카드 (하단 중앙, 강조) =========== -->
  <g filter="url(#card-shadow)">
    <rect x="410" y="460" width="380" height="190" rx="16" fill="#111827" stroke="#ef4444" stroke-width="3"/>
  </g>
  <rect x="410" y="460" width="380" height="48" rx="16" fill="#ef4444" opacity="0.15"/>
  <rect x="410" y="482" width="380" height="26" fill="#ef4444" opacity="0.15"/>
  <text x="600" y="492" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#ef4444">오뚜기 ▼ 분석 대상</text>
  <text x="600" y="512" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fca5a5">매출 0.90조</text>

  <!-- OPM -->
  <text x="600" y="562" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="52" font-weight="800" fill="#ef4444">4.8%</text>
  <text x="600" y="582" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">영업이익률 (OPM)</text>

  <!-- Stats horizontal -->
  <text x="440" y="620" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">해외</text>
  <text x="490" y="620" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#ef4444">15%</text>
  <text x="555" y="620" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">원가율</text>
  <text x="615" y="620" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#ef4444">84%</text>
  <text x="680" y="620" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">라면+카레+소스</text>
  <text x="760" y="620" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b">내수</text>

  <!-- =========== 하단 결론 =========== -->
  <rect x="80" y="666" width="1040" height="42" rx="8" fill="#1e293b"/>
  <text x="600" y="692" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#f1f5f9">해외 77%인 삼양만 마진이 다르다 — <tspan font-weight="700" fill="#fbbf24">내수 식품의 OPM 천장은 5~7%</tspan></text>
</svg>
