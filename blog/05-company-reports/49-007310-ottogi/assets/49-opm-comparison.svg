<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <!-- Glow for samyang spike -->
    <filter id="spike-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Shaded area for samyang -->
    <linearGradient id="samyang-area" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="ottogi-area" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">라면 빅3 OPM 9년 추이 (2017~2025)</text>
  <text x="600" y="76" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">영업이익률 (%) — 삼양식품 / 농심 / 오뚜기</text>

  <!-- Chart area: x 120~1100, y 110~590 -->
  <!-- Y axis: 0~25%, step 5 -->
  <!-- Chart dimensions -->
  <!-- xStart=120, xEnd=1100, yTop=110, yBottom=590 -->
  <!-- yRange=480px for 25% range → 1% = 19.2px -->
  <!-- x: 9 years, step = 980/8 = 122.5 -->

  <!-- Grid lines horizontal (0,5,10,15,20,25%) -->
  <line x1="120" y1="590" x2="1100" y2="590" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="120" y1="494" x2="1100" y2="494" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="120" y1="398" x2="1100" y2="398" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="120" y1="302" x2="1100" y2="302" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="120" y1="206" x2="1100" y2="206" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="120" y1="110" x2="1100" y2="110" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- Y axis labels -->
  <text x="108" y="594" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">0%</text>
  <text x="108" y="498" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">5%</text>
  <text x="108" y="402" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">10%</text>
  <text x="108" y="306" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">15%</text>
  <text x="108" y="210" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">20%</text>
  <text x="108" y="114" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">25%</text>

  <!-- Left axis -->
  <line x1="120" y1="110" x2="120" y2="590" stroke="#334155" stroke-width="1.5"/>

  <!-- X axis years: 2017~2025 -->
  <!-- x positions: 120 + i*(980/8) = 120 + i*122.5 -->
  <!-- 2017=120, 2018=242.5, 2019=365, 2020=487.5, 2021=610, 2022=732.5, 2023=855, 2024=977.5, 2025=1100 -->

  <text x="120" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2017</text>
  <text x="242" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2018</text>
  <text x="365" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2019</text>
  <text x="488" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2020</text>
  <text x="610" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2021</text>
  <text x="733" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2022</text>
  <text x="855" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2023</text>
  <text x="978" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24" font-weight="700">2024</text>
  <text x="1100" y="614" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">2025</text>

  <!-- Tick marks -->
  <line x1="120" y1="590" x2="120" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="242" y1="590" x2="242" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="365" y1="590" x2="365" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="488" y1="590" x2="488" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="610" y1="590" x2="610" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="733" y1="590" x2="733" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="855" y1="590" x2="855" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="978" y1="590" x2="978" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="1100" y1="590" x2="1100" y2="600" stroke="#334155" stroke-width="1.5"/>

  <!-- 2024 divergence highlight band -->
  <rect x="978" y="110" width="122" height="480" fill="#fbbf24" opacity="0.04"/>
  <line x1="978" y1="110" x2="978" y2="590" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- =========== DATA =========== -->
  <!-- y = 590 - (val * 19.2) -->
  <!-- 삼양: 9.4,10.4,13.9,10.5,11.2,8.0,11.1,18.3,21.8 -->
  <!-- y:  409.5, 390.5, 323.1, 388.4, 375.0, 436.4, 377.9, 238.6, 171.4 -->

  <!-- Samyang area fill -->
  <polygon points="120,409 242,390 365,323 488,389 610,375 733,436 855,378 978,239 1100,171 1100,590 120,590"
           fill="url(#samyang-area)"/>

  <!-- Samyang line (녹색 실선) -->
  <polyline points="120,409 242,390 365,323 488,389 610,375 733,436 855,378 978,239 1100,171"
            fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" filter="url(#spike-glow)"/>

  <!-- Samyang dots -->
  <circle cx="120" cy="409" r="5" fill="#22c55e"/>
  <circle cx="242" cy="390" r="5" fill="#22c55e"/>
  <circle cx="365" cy="323" r="5" fill="#22c55e"/>
  <circle cx="488" cy="389" r="5" fill="#22c55e"/>
  <circle cx="610" cy="375" r="5" fill="#22c55e"/>
  <circle cx="733" cy="436" r="5" fill="#22c55e"/>
  <circle cx="855" cy="378" r="5" fill="#22c55e"/>
  <circle cx="978" cy="239" r="7" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="1100" cy="171" r="8" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>

  <!-- Samyang value labels -->
  <text x="120" y="402" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#22c55e">9.4</text>
  <text x="1100" y="162" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#22c55e">21.8%</text>
  <text x="978" y="230" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#22c55e">18.3</text>

  <!-- =========== 농심: 5,5,5,5,4.7,4.5,6.6,4.7,5.2 =========== -->
  <!-- y: 494,494,494,494,500,503,463,500,490 -->

  <polyline points="120,494 242,494 365,494 488,494 610,500 733,503 855,463 978,500 1100,490"
            fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="10,5" stroke-linejoin="round" stroke-linecap="round"/>

  <circle cx="120" cy="494" r="4" fill="#fbbf24"/>
  <circle cx="242" cy="494" r="4" fill="#fbbf24"/>
  <circle cx="365" cy="494" r="4" fill="#fbbf24"/>
  <circle cx="488" cy="494" r="4" fill="#fbbf24"/>
  <circle cx="610" cy="500" r="4" fill="#fbbf24"/>
  <circle cx="733" cy="503" r="4" fill="#fbbf24"/>
  <circle cx="855" cy="463" r="5" fill="#fbbf24"/>
  <circle cx="978" cy="500" r="4" fill="#fbbf24"/>
  <circle cx="1100" cy="490" r="5" fill="#fbbf24"/>

  <text x="1100" y="483" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#fbbf24">5.2%</text>

  <!-- =========== 오뚜기: 5.9,6.1,3.5,4.6,3.9,4.2,5.0,2.6,2.2 =========== -->
  <!-- y: 477, 473, 523, 502, 515, 509, 494, 540, 548 -->
  <!-- val*19.2 from 590: 5.9→477.1, 6.1→473.0, 3.5→522.8, 4.6→501.7, 3.9→515.1, 4.2→509.4, 5.0→494.0, 2.6→540.1, 2.2→547.8 -->

  <!-- Ottogi area -->
  <polygon points="120,477 242,473 365,523 488,502 610,515 733,509 855,494 978,540 1100,548 1100,590 120,590"
           fill="url(#ottogi-area)"/>

  <polyline points="120,477 242,473 365,523 488,502 610,515 733,509 855,494 978,540 1100,548"
            fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <circle cx="120" cy="477" r="4" fill="#ef4444"/>
  <circle cx="242" cy="473" r="4" fill="#ef4444"/>
  <circle cx="365" cy="523" r="4" fill="#ef4444"/>
  <circle cx="488" cy="502" r="4" fill="#ef4444"/>
  <circle cx="610" cy="515" r="4" fill="#ef4444"/>
  <circle cx="733" cy="509" r="4" fill="#ef4444"/>
  <circle cx="855" cy="494" r="4" fill="#ef4444"/>
  <circle cx="978" cy="540" r="5" fill="#ef4444"/>
  <circle cx="1100" cy="548" r="6" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>

  <text x="1100" y="542" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#ef4444">2.2% ▼</text>

  <!-- =========== Legend =========== -->
  <rect x="130" y="118" width="12" height="3" rx="1" fill="#22c55e"/>
  <circle cx="136" cy="119" r="5" fill="#22c55e"/>
  <text x="148" y="124" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#22c55e" font-weight="600">삼양식품</text>

  <line x1="250" y1="119" x2="274" y2="119" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="8,4"/>
  <circle cx="262" cy="119" r="4" fill="#fbbf24"/>
  <text x="282" y="124" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24" font-weight="600">농심</text>

  <line x1="340" y1="119" x2="364" y2="119" stroke="#ef4444" stroke-width="2.5"/>
  <circle cx="352" cy="119" r="4" fill="#ef4444"/>
  <text x="372" y="124" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#ef4444" font-weight="600">오뚜기 (하락 추세)</text>

  <!-- Divergence annotation -->
  <rect x="820" y="140" width="260" height="50" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="950" y="161" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#fbbf24" font-weight="700">2024년 — 구조적 분리 시작</text>
  <text x="950" y="179" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#94a3b8">삼양 18.3% vs 오뚜기 2.6%</text>

  <!-- Bottom conclusion -->
  <rect x="80" y="634" width="1040" height="58" rx="8" fill="#1e293b"/>
  <text x="600" y="657" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#f1f5f9">2024년부터 삼양만 이탈 —</text>
  <text x="600" y="678" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#fbbf24">불닭 해외 수출이 만든 구조적 분리</text>
</svg>
