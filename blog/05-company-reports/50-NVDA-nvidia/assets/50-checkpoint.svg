<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720">
  <title>투자 포인트 체크리스트 — 다음 4분기에 봐야 할 5가지</title>
  <desc>NVIDIA 투자 시 분기마다 확인해야 할 핵심 체크포인트 5개</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <text x="540" y="50" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">투자 포인트 — 다음 4분기에 봐야 할 5가지</text>
  <text x="540" y="78" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">이 숫자가 이탈하면 OPM 62% 구조에 균열</text>

  <!-- Item 1 -->
  <rect x="60" y="110" width="960" height="100" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <circle cx="100" cy="160" r="22" fill="#22c55e" opacity="0.2"/>
  <text x="100" y="167" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">1</text>
  <text x="140" y="145" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">데이터센터 분기 매출 $30B 돌파 여부</text>
  <text x="140" y="170" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2025 연간 $115B ÷ 4 = 분기 $29B 평균. 성장률 둔화 시 주가 멀티플 재조정</text>
  <text x="140" y="195" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">확인: 분기 실적 발표 (매년 2/5/8/11월)</text>

  <!-- Item 2 -->
  <rect x="60" y="225" width="960" height="100" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <circle cx="100" cy="275" r="22" fill="#fbbf24" opacity="0.2"/>
  <text x="100" y="282" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">2</text>
  <text x="140" y="260" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">GPM 73% 이하로 하락하는가</text>
  <text x="140" y="285" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">Blackwell 초기 수율 문제 시 원가 상승. 75% → 73% 이하 = 가격결정력 균열 신호</text>
  <text x="140" y="310" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">확인: 분기 매출총이익률 추이</text>

  <!-- Item 3 -->
  <rect x="60" y="340" width="960" height="100" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <circle cx="100" cy="390" r="22" fill="#ef4444" opacity="0.2"/>
  <text x="100" y="397" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">3</text>
  <text x="140" y="375" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">중국 규제 — 매출 비중 12~17% 구간 변화</text>
  <text x="140" y="400" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">미국 정부 대중국 수출 규제 강화 중. H20 칩 제한 확대 시 $15~20B 매출 리스크</text>
  <text x="140" y="425" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">확인: BIS 수출 규제 업데이트 + 10-K 지역별 매출</text>

  <!-- Item 4 -->
  <rect x="60" y="455" width="960" height="100" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="100" cy="505" r="22" fill="#8b5cf6" opacity="0.2"/>
  <text x="100" y="512" text-anchor="middle" fill="#8b5cf6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">4</text>
  <text x="140" y="490" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">AMD MI300X 분기 매출 추이 + 자체 칩 전환율</text>
  <text x="140" y="515" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">Google TPU, Amazon Trainium 내부 전환율. NVIDIA 점유율 75% 아래 = 가격결정력 위협</text>
  <text x="140" y="540" fill="#8b5cf6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">확인: AMD 분기 실적 + 클라우드 업체 CAPEX 발표</text>

  <!-- Item 5 -->
  <rect x="60" y="570" width="960" height="100" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="100" cy="620" r="22" fill="#3b82f6" opacity="0.2"/>
  <text x="100" y="627" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700">5</text>
  <text x="140" y="605" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">자사주 매입 규모 vs FCF 비율</text>
  <text x="140" y="630" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2025년 $33.7B 자사주. FCF 대비 환원 비율 축소 = 자체 파운드리 등 전략 전환 신호</text>
  <text x="140" y="655" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">확인: 분기 CF + 이사회 자사주 매입 승인 규모</text>
</svg>