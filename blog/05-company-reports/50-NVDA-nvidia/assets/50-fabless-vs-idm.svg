<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>팹리스 vs IDM — NVIDIA와 Intel의 원가 구조 비교</title>
  <desc>공장 유무가 매출총이익률에 미치는 영향을 비교하는 매트릭스</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg2)"/>

  <text x="600" y="50" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700">팹리스 vs IDM — 같은 반도체, 다른 마진</text>
  <text x="600" y="78" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2025년 기준, 단위 $B</text>

  <!-- NVIDIA column -->
  <rect x="80" y="110" width="480" height="560" rx="12" fill="#0f1a2e" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="150" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">NVIDIA (팹리스)</text>
  <text x="320" y="175" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">설계만 한다. 공장 없음.</text>

  <!-- NVIDIA bars -->
  <text x="120" y="220" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">매출</text>
  <rect x="200" y="205" width="320" height="24" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="530" y="223" text-anchor="end" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$130.5B</text>

  <text x="120" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">유형자산</text>
  <rect x="200" y="250" width="14" height="24" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="224" y="268" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$5.8B</text>

  <text x="120" y="310" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">CAPEX</text>
  <rect x="200" y="295" width="8" height="24" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="218" y="313" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$3.2B</text>

  <text x="120" y="355" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">감가상각</text>
  <rect x="200" y="340" width="5" height="24" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="215" y="358" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$2.1B</text>

  <!-- NVIDIA metrics -->
  <rect x="120" y="400" width="160" height="80" rx="8" fill="#1e293b"/>
  <text x="200" y="430" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출총이익률</text>
  <text x="200" y="465" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="700">75.0%</text>

  <rect x="310" y="400" width="160" height="80" rx="8" fill="#1e293b"/>
  <text x="390" y="430" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익률</text>
  <text x="390" y="465" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="700">62.4%</text>

  <rect x="120" y="500" width="350" height="50" rx="8" fill="#14281e" stroke="#22c55e" stroke-width="1"/>
  <text x="295" y="532" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">CAPEX/매출 2.5% — 고정비 거의 없음</text>

  <text x="320" y="600" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">매출 5배 → 영업이익 19.4배</text>
  <text x="320" y="625" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업 레버리지 극대화</text>

  <!-- Intel column -->
  <rect x="640" y="110" width="480" height="560" rx="12" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
  <text x="880" y="150" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">Intel (IDM)</text>
  <text x="880" y="175" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">설계 + 제조. 공장 보유.</text>

  <!-- Intel bars -->
  <text x="680" y="220" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">매출</text>
  <rect x="760" y="205" width="130" height="24" rx="4" fill="#ef4444" opacity="0.6"/>
  <text x="900" y="223" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$53.1B</text>

  <text x="680" y="265" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">유형자산</text>
  <rect x="760" y="250" width="260" height="24" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="1030" y="268" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$104.2B</text>

  <text x="680" y="310" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">CAPEX</text>
  <rect x="760" y="295" width="53" height="24" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="823" y="313" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$21.3B</text>

  <text x="680" y="355" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">감가상각</text>
  <rect x="760" y="340" width="29" height="24" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="799" y="358" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">$11.5B</text>

  <!-- Intel metrics -->
  <rect x="680" y="400" width="160" height="80" rx="8" fill="#1e293b"/>
  <text x="760" y="430" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출총이익률</text>
  <text x="760" y="465" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="700">32.7%</text>

  <rect x="870" y="400" width="160" height="80" rx="8" fill="#1e293b"/>
  <text x="950" y="430" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">영업이익률</text>
  <text x="950" y="465" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="700">-21.5%</text>

  <rect x="680" y="500" width="350" height="50" rx="8" fill="#1a1215" stroke="#ef4444" stroke-width="1"/>
  <text x="855" y="532" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">CAPEX/매출 40% — 감가상각이 이익을 삼킴</text>

  <text x="880" y="600" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">매출 감소 → 고정비 부담 → 적자</text>
  <text x="880" y="625" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">역 레버리지</text>

  <!-- VS divider -->
  <circle cx="600" cy="390" r="30" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="397" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">VS</text>
</svg>