<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>엔비디아 관통선 — 팹리스 + AI 수요 독점 = OPM 62%</title>
  <desc>공장 없는 반도체 회사가 영업이익률 62%를 찍은 구조를 한눈에 보여주는 요약 다이어그램</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700">공장 없는 반도체 회사가 OPM 62%를 찍은 구조</text>
  <text x="600" y="85" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16">NVIDIA (NVDA) — 핵심 질문: 칩을 설계만 하는데 왜 마진이 소프트웨어보다 높은가?</text>

  <!-- Left column: 팹리스 모델 -->
  <rect x="40" y="120" width="350" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="215" y="155" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">축 1: 팹리스 모델</text>
  <text x="215" y="185" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">공장 없음 → 고정비 최소</text>

  <text x="70" y="220" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">CAPEX/매출</text>
  <text x="350" y="220" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">2.5%</text>

  <text x="70" y="252" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">유형자산 (Intel 대비)</text>
  <text x="350" y="252" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">1/18</text>

  <text x="70" y="284" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">매출 5배 시 영업이익</text>
  <text x="350" y="284" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">19.4배</text>

  <text x="70" y="316" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">감가상각 부담</text>
  <text x="350" y="316" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">$2.1B</text>
  <text x="350" y="336" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">Intel: $11.5B</text>

  <text x="215" y="370" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">설계: NVIDIA → 제조: TSMC</text>

  <!-- Right column: AI 수요 독점 -->
  <rect x="810" y="120" width="350" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="985" y="155" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">축 2: AI 수요 독점</text>
  <text x="985" y="185" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">CUDA 생태계 = 전환 비용</text>

  <text x="840" y="220" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">AI 훈련 점유율</text>
  <text x="1120" y="220" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">80%+</text>

  <text x="840" y="252" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">DC 매출 비중 (2025)</text>
  <text x="1120" y="252" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">88%</text>

  <text x="840" y="284" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">DC 매출 2년 성장</text>
  <text x="1120" y="284" text-anchor="end" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">7.7배</text>

  <text x="840" y="316" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">GPM (가격결정력)</text>
  <text x="1120" y="316" text-anchor="end" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">75.0%</text>
  <text x="1120" y="336" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">소프트웨어 수준</text>

  <text x="985" y="370" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">$15B → $115B (2년)</text>

  <!-- Center: 결합 결과 -->
  <line x1="390" y1="250" x2="440" y2="250" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="440,245 450,250 440,255" fill="#fbbf24"/>

  <rect x="450" y="140" width="300" height="240" rx="16" fill="#1a2332" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="175" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">결합 결과</text>

  <text x="600" y="215" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">매출 (2년)</text>
  <text x="600" y="240" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">$27B → $131B</text>

  <text x="600" y="275" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">영업이익률 (2년)</text>
  <text x="600" y="300" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700">16% → 62%</text>

  <text x="600" y="335" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">OCF</text>
  <text x="600" y="360" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">$64.1B</text>

  <line x1="750" y1="250" x2="800" y2="250" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="800,245 810,250 800,255" fill="#fbbf24"/>

  <!-- Bottom: 리스크 -->
  <rect x="100" y="430" width="1000" height="120" rx="12" fill="#1e1215" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="600" y="465" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">리스크 — 이 구조가 깨지는 시나리오</text>

  <text x="250" y="500" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">TSMC 단일 제조 의존</text>
  <text x="250" y="520" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">대만 리스크, 공정 차질</text>

  <text x="600" y="500" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">AI 투자 사이클 둔화</text>
  <text x="600" y="520" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">ROI 미검증 → CAPEX 축소</text>

  <text x="950" y="500" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">경쟁 + 중국 규제</text>
  <text x="950" y="520" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">AMD/Google/Amazon + 수출 제한</text>

  <!-- Bottom: 판단 -->
  <rect x="200" y="590" width="800" height="90" rx="12" fill="#1a2332" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="625" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">판단: 팹리스 + AI 수요 독점 = 역사상 가장 빠른 대형주 성장</text>
  <text x="600" y="655" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">다음 분기 체크포인트: 데이터센터 분기 매출 $30B 돌파 여부</text>
</svg>