<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
  <title>엔비디아 마진 6년 시계열 — GPM과 OPM의 V자 반등</title>
  <desc>2020~2025 매출총이익률과 영업이익률 변화를 보여주는 타임라인</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>

  <text x="600" y="45" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">마진 6년 시계열 — 2023년 바닥에서 2025년 역대 최고</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">ChatGPT 출시(2022.11) 이후 V자 반등</text>

  <!-- Chart area -->
  <!-- Y axis labels -->
  <text x="70" y="115" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">80%</text>
  <text x="70" y="195" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">60%</text>
  <text x="70" y="275" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">40%</text>
  <text x="70" y="355" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">20%</text>
  <text x="70" y="435" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">0%</text>

  <!-- Grid lines -->
  <line x1="90" y1="110" x2="1130" y2="110" stroke="#1e293b" stroke-width="1"/>
  <line x1="90" y1="190" x2="1130" y2="190" stroke="#1e293b" stroke-width="1"/>
  <line x1="90" y1="270" x2="1130" y2="270" stroke="#1e293b" stroke-width="1"/>
  <line x1="90" y1="350" x2="1130" y2="350" stroke="#1e293b" stroke-width="1"/>
  <line x1="90" y1="430" x2="1130" y2="430" stroke="#1e293b" stroke-width="1"/>

  <!-- X positions: 2020=190, 2021=380, 2022=570, 2023=760, 2024=950, 2025=1060 -->
  <!-- Y scale: 0%=430, 80%=110, so 1%=4px, y=430-(val*4) -->

  <!-- GPM line (green) -->
  <!-- 67.6, 64.3, 65.0, 56.9, 72.7, 75.0 -->
  <polyline points="190,159.6 380,172.8 570,170 760,202.4 950,139.2 1060,130" fill="none" stroke="#22c55e" stroke-width="3"/>
  <circle cx="190" cy="159.6" r="6" fill="#22c55e"/>
  <circle cx="380" cy="172.8" r="6" fill="#22c55e"/>
  <circle cx="570" cy="170" r="6" fill="#22c55e"/>
  <circle cx="760" cy="202.4" r="8" fill="#ef4444" stroke="#22c55e" stroke-width="2"/>
  <circle cx="950" cy="139.2" r="6" fill="#22c55e"/>
  <circle cx="1060" cy="130" r="8" fill="#22c55e" stroke="#fbbf24" stroke-width="2"/>

  <!-- GPM labels -->
  <text x="190" y="148" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">67.6</text>
  <text x="380" y="165" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">64.3</text>
  <text x="570" y="162" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">65.0</text>
  <text x="760" y="220" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">56.9 ← 바닥</text>
  <text x="950" y="130" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">72.7</text>
  <text x="1060" y="118" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">75.0</text>

  <!-- OPM line (amber) -->
  <!-- 27.9, 35.1, 37.6, 15.7, 54.1, 62.4 -->
  <polyline points="190,318.4 380,289.6 570,279.6 760,367.2 950,213.6 1060,180.4" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="190" cy="318.4" r="6" fill="#fbbf24"/>
  <circle cx="380" cy="289.6" r="6" fill="#fbbf24"/>
  <circle cx="570" cy="279.6" r="6" fill="#fbbf24"/>
  <circle cx="760" cy="367.2" r="8" fill="#ef4444" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="950" cy="213.6" r="6" fill="#fbbf24"/>
  <circle cx="1060" cy="180.4" r="8" fill="#fbbf24" stroke="#fbbf24" stroke-width="2"/>

  <!-- OPM labels -->
  <text x="190" y="338" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">27.9</text>
  <text x="380" y="310" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">35.1</text>
  <text x="570" y="300" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">37.6</text>
  <text x="760" y="392" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">15.7 ← 바닥</text>
  <text x="950" y="238" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">54.1</text>
  <text x="1060" y="170" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">62.4</text>

  <!-- X axis labels -->
  <text x="190" y="460" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2020</text>
  <text x="380" y="460" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2021</text>
  <text x="570" y="460" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2022</text>
  <text x="760" y="460" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">2023</text>
  <text x="950" y="460" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2024</text>
  <text x="1060" y="460" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">2025</text>

  <!-- ChatGPT event marker -->
  <line x1="665" y1="100" x2="665" y2="440" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="665" y="95" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">ChatGPT 출시 (2022.11)</text>

  <!-- Legend -->
  <rect x="350" y="500" width="500" height="110" rx="10" fill="#1e293b"/>
  <circle cx="400" cy="530" r="8" fill="#22c55e"/>
  <text x="420" y="535" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">매출총이익률 (GPM) — 원가 빼고 남는 비율</text>

  <circle cx="400" cy="565" r="8" fill="#fbbf24"/>
  <text x="420" y="570" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">영업이익률 (OPM) — R&amp;D, 판관비까지 빼고 남는 비율</text>

  <text x="600" y="600" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">GPM-OPM 갭 축소 = 고정비(R&amp;D/판관비)가 매출 대비 작아지는 효과</text>
</svg>