<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <title>매출 6년 시계열 — $10B에서 $131B</title>
  <desc>NVIDIA 매출 6년 추이와 세그먼트별 구성 변화</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="45" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">매출 6년 — $10B에서 $131B, 2년 만에 5배</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">단위 $B | 데이터센터(초록) + 게이밍(파랑) + 기타(회색)</text>

  <!-- Y axis -->
  <text x="65" y="118" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$140B</text>
  <text x="65" y="198" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$120B</text>
  <text x="65" y="278" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$100B</text>
  <text x="65" y="358" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$80B</text>
  <text x="65" y="438" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$60B</text>
  <text x="65" y="518" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$40B</text>
  <text x="65" y="598" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$20B</text>
  <text x="65" y="660" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">$0</text>

  <!-- Grid -->
  <line x1="80" y1="115" x2="1130" y2="115" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="195" x2="1130" y2="195" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="275" x2="1130" y2="275" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="355" x2="1130" y2="355" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="435" x2="1130" y2="435" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="515" x2="1130" y2="515" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="595" x2="1130" y2="595" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="655" x2="1130" y2="655" stroke="#334155" stroke-width="1"/>

  <!-- Bars: x positions 150, 320, 490, 660, 830, 1000; width=120 -->
  <!-- Scale: $140B=115, $0=655; range=540px for 140; 1B = 3.857px -->
  <!-- y = 655 - (val * 3.857) -->

  <!-- 2020: total $10B = DC 3.7 + Gaming 5.5 + Other 0.8 -->
  <rect x="150" y="633.4" width="120" height="21.6" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="150" y="612.2" width="120" height="21.2" rx="0" fill="#3b82f6" opacity="0.7"/>
  <rect x="150" y="609.1" width="120" height="3.1" rx="3" fill="#64748b" opacity="0.5"/>
  <text x="210" y="600" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">$10B</text>

  <!-- 2021: total $18B = DC 7.5 + Gaming 9.0 + Other 1.5 -->
  <rect x="320" y="626.1" width="120" height="28.9" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="320" y="591.4" width="120" height="34.7" rx="0" fill="#3b82f6" opacity="0.7"/>
  <rect x="320" y="585.6" width="120" height="5.8" rx="3" fill="#64748b" opacity="0.5"/>
  <text x="380" y="576" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">$18B</text>

  <!-- 2022: total $13.6B = DC 6.0 + Gaming 6.2 + Other 1.4 -->
  <rect x="490" y="631.9" width="120" height="23.1" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="490" y="608.0" width="120" height="23.9" rx="0" fill="#3b82f6" opacity="0.7"/>
  <rect x="490" y="602.6" width="120" height="5.4" rx="3" fill="#64748b" opacity="0.5"/>
  <text x="550" y="594" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">$14B</text>

  <!-- 2023: total $27B = DC 15 + Gaming 9.1 + Other 2.9 -->
  <rect x="660" y="597.1" width="120" height="57.9" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="660" y="562.0" width="120" height="35.1" rx="0" fill="#3b82f6" opacity="0.7"/>
  <rect x="660" y="550.8" width="120" height="11.2" rx="3" fill="#64748b" opacity="0.5"/>
  <text x="720" y="542" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">$27B</text>

  <!-- 2024: total $60.9B = DC 47.5 + Gaming 10.4 + Other 3.0 -->
  <rect x="830" y="471.7" width="120" height="183.3" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="830" y="431.6" width="120" height="40.1" rx="0" fill="#3b82f6" opacity="0.7"/>
  <rect x="830" y="420.0" width="120" height="11.6" rx="3" fill="#64748b" opacity="0.5"/>
  <text x="890" y="410" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600">$61B</text>

  <!-- 2025: total $130.5B = DC 115.2 + Gaming 11.4 + Other 3.9 -->
  <rect x="1000" y="210.6" width="120" height="444.4" rx="3" fill="#22c55e" opacity="0.85"/>
  <rect x="1000" y="166.6" width="120" height="44.0" rx="0" fill="#3b82f6" opacity="0.7"/>
  <rect x="1000" y="151.6" width="120" height="15.0" rx="3" fill="#64748b" opacity="0.5"/>
  <text x="1060" y="140" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">$131B</text>

  <!-- X axis labels -->
  <text x="210" y="685" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2020</text>
  <text x="380" y="685" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2021</text>
  <text x="550" y="685" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2022</text>
  <text x="720" y="685" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2023</text>
  <text x="890" y="685" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2024</text>
  <text x="1060" y="685" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">2025</text>

  <!-- Legend -->
  <rect x="130" y="92" width="16" height="12" rx="2" fill="#22c55e" opacity="0.85"/>
  <text x="155" y="103" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">데이터센터</text>
  <rect x="260" y="92" width="16" height="12" rx="2" fill="#3b82f6" opacity="0.7"/>
  <text x="285" y="103" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">게이밍</text>
  <rect x="360" y="92" width="16" height="12" rx="2" fill="#64748b" opacity="0.5"/>
  <text x="385" y="103" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">기타 (자동차/시각화)</text>

  <!-- Annotation arrow -->
  <text x="840" y="330" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">2년 만에 5배 →</text>
</svg>