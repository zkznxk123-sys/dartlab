<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
  <title>NVIDIA 공급망 구조 — 설계에서 최종 고객까지</title>
  <desc>SK하이닉스(HBM) → TSMC(제조) → NVIDIA(설계) → 하이퍼스케일러(최종) → 전력 인프라 파급</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>

  <text x="600" y="45" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700">NVIDIA 공급망 — 설계에서 전력까지</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">한 곳이 멈추면 전체가 멈추는 체인</text>

  <!-- Row 1: Supply chain nodes -->
  <!-- Node 1: SK하이닉스 -->
  <rect x="40" y="130" width="200" height="140" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="165" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">SK하이닉스</text>
  <text x="140" y="190" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">HBM3E 메모리</text>
  <text x="140" y="212" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">GPU에 붙는 고대역폭 메모리</text>
  <text x="140" y="234" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">점유율 61% (추정)</text>
  <text x="140" y="258" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">dartlab 블로그 #01</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="200" x2="290" y2="200" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="290,195 300,200 290,205" fill="#fbbf24"/>
  <text x="270" y="188" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">HBM 납품</text>

  <!-- Node 2: TSMC -->
  <rect x="300" y="130" width="200" height="140" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" fill="#8b5cf6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">TSMC</text>
  <text x="400" y="190" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">GPU 웨이퍼 제조</text>
  <text x="400" y="212" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">4nm/5nm 첨단 공정</text>
  <text x="400" y="234" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">단일 제조 의존 (리스크)</text>
  <text x="400" y="258" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">대만 소재</text>

  <!-- Arrow 2→3 -->
  <line x1="500" y1="200" x2="550" y2="200" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="550,195 560,200 550,205" fill="#fbbf24"/>
  <text x="530" y="188" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">웨이퍼 납품</text>

  <!-- Node 3: NVIDIA (center, highlighted) -->
  <rect x="560" y="120" width="220" height="160" rx="12" fill="#1a2332" stroke="#fbbf24" stroke-width="3"/>
  <text x="670" y="155" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700">NVIDIA</text>
  <text x="670" y="180" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">GPU 설계 + CUDA</text>
  <text x="670" y="202" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">GPM 75% | OPM 62%</text>
  <text x="670" y="224" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">공장 없음 (팹리스)</text>
  <text x="670" y="246" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">H100 / H200 / Blackwell</text>
  <text x="670" y="268" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">매출 $130.5B</text>

  <!-- Arrow 3→4 -->
  <line x1="780" y1="200" x2="830" y2="200" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="830,195 840,200 830,205" fill="#fbbf24"/>
  <text x="810" y="188" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10">GPU 판매</text>

  <!-- Node 4: 하이퍼스케일러 -->
  <rect x="840" y="130" width="320" height="140" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="1000" y="160" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">하이퍼스케일러 (최종 고객)</text>
  <text x="905" y="190" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">Microsoft</text>
  <text x="905" y="212" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">Amazon (AWS)</text>
  <text x="1060" y="190" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">Google Cloud</text>
  <text x="1060" y="212" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">Meta / Oracle</text>
  <text x="1000" y="240" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">AI CAPEX 합계 $300B+ (2025)</text>
  <text x="1000" y="258" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">NVIDIA 매출의 88%</text>

  <!-- Row 2: Power demand cascade -->
  <text x="600" y="340" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">↓ AI 전력 수요 파급 ↓</text>

  <!-- Power chain -->
  <rect x="80" y="380" width="250" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="205" y="410" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">데이터센터 전력 소비</text>
  <text x="205" y="435" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">H100 한 장 = 700W TDP</text>
  <text x="205" y="457" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">IEA: AI 전력 160TWh (2026)</text>

  <line x1="330" y1="430" x2="380" y2="430" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="380,425 390,430 380,435" fill="#f59e0b"/>

  <rect x="390" y="380" width="200" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="490" y="410" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">전력 인프라</text>
  <text x="490" y="435" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">HD현대일렉트릭</text>
  <text x="490" y="457" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">dartlab 블로그 #08</text>

  <line x1="590" y1="430" x2="640" y2="430" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="640,425 650,430 640,435" fill="#f59e0b"/>

  <rect x="650" y="380" width="200" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="750" y="410" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">원전 / 신에너지</text>
  <text x="750" y="435" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">뉴스케일파워 (SMR)</text>
  <text x="750" y="457" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">dartlab 블로그 #44</text>

  <line x1="850" y1="430" x2="900" y2="430" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="900,425 910,430 900,435" fill="#f59e0b"/>

  <rect x="910" y="380" width="240" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="1030" y="410" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">경쟁사 자체 칩</text>
  <text x="1030" y="435" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">Google TPU · Amazon Trainium</text>
  <text x="1030" y="457" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">NVIDIA 대체 시도</text>

  <!-- Bottom summary -->
  <rect x="200" y="520" width="800" height="80" rx="12" fill="#1a2332" stroke="#fbbf24" stroke-width="1"/>
  <text x="600" y="555" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">NVIDIA가 칩을 팔면 → 데이터센터가 돌아가고 → 전력 인프라 전체가 같이 움직인다</text>
  <text x="600" y="580" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">반대로 AI 투자가 꺾이면 → 이 모든 체인이 동시에 둔화된다</text>
</svg>