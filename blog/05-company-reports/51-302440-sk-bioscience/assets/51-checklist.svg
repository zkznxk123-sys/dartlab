<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720" font-family="-apple-system,'Segoe UI',sans-serif">
  <!-- 배경 -->
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="540" y="50" text-anchor="middle" font-size="24" font-weight="700" fill="#f1f5f9">SK바이오사이언스 — 매수 전 5개 체크포인트</text>
  <text x="540" y="80" text-anchor="middle" font-size="14" fill="#64748b">현재 기준 미충족 3개 · 주시 2개 — 투자 사이클 전환 전 관망 구간</text>

  <!-- 구분선 -->
  <line x1="40" y1="98" x2="1040" y2="98" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== 체크포인트 1 — 빨강 (미충족) ===== -->
  <rect x="40" y="112" width="1000" height="96" rx="12" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>

  <!-- 상태 아이콘 (X) -->
  <circle cx="88" cy="160" r="22" fill="#ef4444"/>
  <text x="88" y="168" text-anchor="middle" font-size="22" font-weight="900" fill="white">✗</text>

  <!-- 번호 + 제목 -->
  <text x="124" y="147" font-size="11" fill="#64748b">CHECK 01</text>
  <text x="124" y="168" font-size="16" font-weight="700" fill="#f1f5f9">분기 OPM 흑자 전환</text>

  <!-- 상태 태그 -->
  <rect x="124" y="176" width="68" height="22" rx="4" fill="#7f1d1d"/>
  <text x="158" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#fca5a5">미충족</text>

  <!-- 설명 -->
  <text x="720" y="148" text-anchor="end" font-size="13" fill="#94a3b8">2023Q3 +26.3% 이후</text>
  <text x="720" y="168" text-anchor="end" font-size="14" fill="#ef4444" font-weight="600">7분기 연속 OPM 적자</text>
  <text x="720" y="188" text-anchor="end" font-size="13" fill="#64748b">흑자 분기 1개가 첫 매수 신호</text>

  <!-- 우측 상태바 -->
  <rect x="740" y="140" width="280" height="12" rx="6" fill="#1e293b"/>
  <rect x="740" y="140" width="0" height="12" rx="6" fill="#ef4444"/>
  <text x="880" y="172" text-anchor="middle" font-size="11" fill="#ef4444">현재 충족률 0%</text>
  <text x="880" y="190" text-anchor="middle" font-size="11" fill="#64748b">OPM &gt; 0% 분기 필요</text>

  <!-- ===== 체크포인트 2 — 빨강 (미충족) ===== -->
  <rect x="40" y="220" width="1000" height="96" rx="12" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>

  <circle cx="88" cy="268" r="22" fill="#ef4444"/>
  <text x="88" y="276" text-anchor="middle" font-size="22" font-weight="900" fill="white">✗</text>

  <text x="124" y="255" font-size="11" fill="#64748b">CHECK 02</text>
  <text x="124" y="276" font-size="16" font-weight="700" fill="#f1f5f9">원가율 80% 이하 달성</text>

  <rect x="124" y="284" width="68" height="22" rx="4" fill="#7f1d1d"/>
  <text x="158" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#fca5a5">미충족</text>

  <text x="720" y="256" text-anchor="end" font-size="13" fill="#94a3b8">코로나 시절 원가율 39%는 불가</text>
  <text x="720" y="276" text-anchor="end" font-size="14" fill="#ef4444" font-weight="600">현재 88% → 목표 80%</text>
  <text x="720" y="296" text-anchor="end" font-size="13" fill="#64748b">80% 돌파 = GPM 20% → OPM 흑자 가능</text>

  <!-- 원가율 게이지 -->
  <rect x="740" y="252" width="280" height="12" rx="6" fill="#1e293b"/>
  <!-- 88% 기준으로 진행바 표시 (88/100 * 280 = 246px 하지만 역방향: 낮을수록 좋음) -->
  <!-- 현재 88%는 나쁨, 80% 목표 라인 표시 -->
  <rect x="740" y="252" width="246" height="12" rx="6" fill="#ef4444" opacity="0.7"/>
  <!-- 목표선 80% = 224px -->
  <rect x="964" y="248" width="2" height="20" fill="#fbbf24"/>
  <text x="960" y="288" text-anchor="end" font-size="10" fill="#fbbf24">목표 80%</text>
  <text x="880" y="272" text-anchor="middle" font-size="11" fill="white">현재 88%</text>

  <!-- ===== 체크포인트 3 — 노랑 (주시) ===== -->
  <rect x="40" y="328" width="1000" height="96" rx="12" fill="#1c1500" stroke="#fbbf24" stroke-width="1.5"/>

  <circle cx="88" cy="376" r="22" fill="#d97706"/>
  <text x="88" y="384" text-anchor="middle" font-size="22" font-weight="900" fill="white">△</text>

  <text x="124" y="363" font-size="11" fill="#64748b">CHECK 03</text>
  <text x="124" y="384" font-size="16" font-weight="700" fill="#f1f5f9">CDMO 대형 계약 공시</text>

  <rect x="124" y="392" width="56" height="22" rx="4" fill="#78350f"/>
  <text x="152" y="407" text-anchor="middle" font-size="11" font-weight="600" fill="#fde68a">주시</text>

  <text x="720" y="364" text-anchor="end" font-size="13" fill="#94a3b8">삼바(#41)처럼 CMO/CDMO 계약이</text>
  <text x="720" y="384" text-anchor="end" font-size="14" fill="#fbbf24" font-weight="600">매출 가시성의 핵심</text>
  <text x="720" y="404" text-anchor="end" font-size="13" fill="#64748b">대형 계약 공시 시 매출 예측 가능성 급등</text>

  <rect x="740" y="364" width="280" height="36" rx="6" fill="#292100"/>
  <text x="880" y="380" text-anchor="middle" font-size="12" fill="#fde68a">공시 모니터링 필수</text>
  <text x="880" y="396" text-anchor="middle" font-size="11" fill="#64748b">1건 계약 = 수백억 매출 가시성</text>

  <!-- ===== 체크포인트 4 — 노랑 (주시) ===== -->
  <rect x="40" y="436" width="1000" height="96" rx="12" fill="#1c1500" stroke="#fbbf24" stroke-width="1.5"/>

  <circle cx="88" cy="484" r="22" fill="#d97706"/>
  <text x="88" y="492" text-anchor="middle" font-size="22" font-weight="900" fill="white">△</text>

  <text x="124" y="471" font-size="11" fill="#64748b">CHECK 04</text>
  <text x="124" y="492" font-size="16" font-weight="700" fill="#f1f5f9">대상포진·독감 백신 시장 점유율</text>

  <rect x="124" y="500" width="56" height="22" rx="4" fill="#78350f"/>
  <text x="152" y="515" text-anchor="middle" font-size="11" font-weight="600" fill="#fde68a">주시</text>

  <text x="720" y="472" text-anchor="end" font-size="13" fill="#94a3b8">스카이조스터(대상포진) · 스카이셀플루</text>
  <text x="720" y="492" text-anchor="end" font-size="14" fill="#fbbf24" font-weight="600">자체 제품 마진 &gt; CMO·상품 마진</text>
  <text x="720" y="512" text-anchor="end" font-size="13" fill="#64748b">점유율 확대 = GPM 회복의 열쇠</text>

  <rect x="740" y="472" width="280" height="36" rx="6" fill="#292100"/>
  <text x="880" y="488" text-anchor="middle" font-size="12" fill="#fde68a">분기 매출 믹스 변화 추적</text>
  <text x="880" y="504" text-anchor="middle" font-size="11" fill="#64748b">제품군 비중 회복 여부</text>

  <!-- ===== 체크포인트 5 — 빨강 (미충족) ===== -->
  <rect x="40" y="544" width="1000" height="96" rx="12" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>

  <circle cx="88" cy="592" r="22" fill="#ef4444"/>
  <text x="88" y="600" text-anchor="middle" font-size="22" font-weight="900" fill="white">✗</text>

  <text x="124" y="579" font-size="11" fill="#64748b">CHECK 05</text>
  <text x="124" y="600" font-size="16" font-weight="700" fill="#f1f5f9">현금 2,000억 이상 유지</text>

  <rect x="124" y="608" width="68" height="22" rx="4" fill="#7f1d1d"/>
  <text x="158" y="623" text-anchor="middle" font-size="11" font-weight="600" fill="#fca5a5">미충족</text>

  <text x="720" y="580" text-anchor="end" font-size="13" fill="#94a3b8">2024 3,127억 → 현재 1,056억</text>
  <text x="720" y="600" text-anchor="end" font-size="14" fill="#ef4444" font-weight="600">현재 1,056억 — 목표 대비 부족</text>
  <text x="720" y="620" text-anchor="end" font-size="13" fill="#64748b">CAPEX 지속 시 유동성 추가 확인 필요</text>

  <!-- 현금 게이지 -->
  <rect x="740" y="580" width="280" height="12" rx="6" fill="#1e293b"/>
  <!-- 1056/3127 = 34% -->
  <rect x="740" y="580" width="95" height="12" rx="6" fill="#ef4444"/>
  <!-- 목표선 2000억 = 2000/3127 * 280 = 179px -->
  <rect x="919" y="576" width="2" height="20" fill="#fbbf24"/>
  <text x="920" y="612" text-anchor="end" font-size="10" fill="#fbbf24">목표 2,000억</text>
  <text x="820" y="604" text-anchor="middle" font-size="11" fill="white">1,056억</text>

  <!-- ===== 하단 결론 ===== -->
  <rect x="40" y="656" width="1000" height="48" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="540" y="679" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">dCR-BBB+ · CAPEX 2,604억 · 부채비율 45%</text>
  <text x="540" y="697" text-anchor="middle" font-size="12" fill="#64748b">2026-04-18 dartlab 실측 · 미충족 ✗ 3개 / 주시 △ 2개</text>
</svg>
