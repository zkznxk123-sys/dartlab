<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="-apple-system,'Segoe UI',sans-serif">
  <!-- 배경 -->
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 상단 제목 -->
  <text x="600" y="54" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">SK바이오사이언스 (302440) — 5년 사이클 지도</text>
  <text x="600" y="88" text-anchor="middle" font-size="18" fill="#64748b">매출은 돌아왔다, 마진은 안 돌아왔다</text>

  <!-- 구분선 -->
  <line x1="80" y1="108" x2="1120" y2="108" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== 좌: 2021 절정 카드 ===== -->
  <rect x="60" y="130" width="300" height="340" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <rect x="60" y="130" width="300" height="48" rx="14" fill="#16a34a"/>
  <rect x="60" y="158" width="300" height="20" fill="#16a34a"/>
  <text x="210" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#f0fdf4">2021 — 절정</text>
  <text x="210" y="200" text-anchor="middle" font-size="13" fill="#86efac">코로나 백신 CMO 수혜</text>

  <text x="90" y="240" font-size="13" fill="#64748b">매출</text>
  <text x="330" y="240" text-anchor="end" font-size="22" font-weight="700" fill="#22c55e">9,290억</text>

  <line x1="85" y1="250" x2="335" y2="250" stroke="#166534" stroke-width="1"/>

  <text x="90" y="278" font-size="13" fill="#64748b">GPM</text>
  <text x="330" y="278" text-anchor="end" font-size="20" font-weight="700" fill="#22c55e">61.4%</text>

  <text x="90" y="315" font-size="13" fill="#64748b">OPM</text>
  <text x="330" y="315" text-anchor="end" font-size="20" font-weight="700" fill="#22c55e">51.1%</text>

  <line x1="85" y1="328" x2="335" y2="328" stroke="#166534" stroke-width="1"/>

  <text x="90" y="356" font-size="13" fill="#64748b">원가율</text>
  <text x="330" y="356" text-anchor="end" font-size="18" font-weight="600" fill="#4ade80">38.6%</text>

  <text x="90" y="393" font-size="13" fill="#64748b">CMO 비중</text>
  <text x="330" y="393" text-anchor="end" font-size="18" font-weight="600" fill="#4ade80">29%</text>

  <rect x="75" y="412" width="270" height="44" rx="8" fill="#166534"/>
  <text x="210" y="439" text-anchor="middle" font-size="13" fill="#bbf7d0">AZ·노바백스 백신 위탁생산</text>
  <text x="210" y="456" text-anchor="middle" font-size="11" fill="#86efac">초고마진 CMO 전성기</text>

  <!-- ===== 중: 2024 바닥 카드 ===== -->
  <rect x="450" y="130" width="300" height="340" rx="14" fill="#2d0a0a" stroke="#ef4444" stroke-width="2"/>
  <rect x="450" y="130" width="300" height="48" rx="14" fill="#dc2626"/>
  <rect x="450" y="158" width="300" height="20" fill="#dc2626"/>
  <text x="600" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#fef2f2">2024 — 바닥</text>
  <text x="600" y="200" text-anchor="middle" font-size="13" fill="#fca5a5">코로나 수요 소멸 · 현금 소진</text>

  <text x="480" y="240" font-size="13" fill="#64748b">매출</text>
  <text x="720" y="240" text-anchor="end" font-size="22" font-weight="700" fill="#ef4444">2,675억</text>

  <line x1="475" y1="250" x2="725" y2="250" stroke="#7f1d1d" stroke-width="1"/>

  <text x="480" y="278" font-size="13" fill="#64748b">GPM</text>
  <text x="720" y="278" text-anchor="end" font-size="20" font-weight="700" fill="#ef4444">11.6%</text>

  <text x="480" y="315" font-size="13" fill="#64748b">OPM</text>
  <text x="720" y="315" text-anchor="end" font-size="20" font-weight="700" fill="#ef4444">-51.7%</text>

  <line x1="475" y1="328" x2="725" y2="328" stroke="#7f1d1d" stroke-width="1"/>

  <text x="480" y="356" font-size="13" fill="#64748b">원가율</text>
  <text x="720" y="356" text-anchor="end" font-size="18" font-weight="600" fill="#f87171">88.4%</text>

  <text x="480" y="393" font-size="13" fill="#64748b">전년比 매출</text>
  <text x="720" y="393" text-anchor="end" font-size="18" font-weight="600" fill="#f87171">-71%</text>

  <rect x="465" y="412" width="270" height="44" rx="8" fill="#7f1d1d"/>
  <text x="600" y="439" text-anchor="middle" font-size="13" fill="#fecaca">현금 3,127억 → 소진 시작</text>
  <text x="600" y="456" text-anchor="middle" font-size="11" fill="#fca5a5">고정비 부담 · 적자 지속</text>

  <!-- ===== 우: 2025 반등 카드 ===== -->
  <rect x="840" y="130" width="300" height="340" rx="14" fill="#1c1500" stroke="#fbbf24" stroke-width="2"/>
  <rect x="840" y="130" width="300" height="48" rx="14" fill="#d97706"/>
  <rect x="840" y="158" width="300" height="20" fill="#d97706"/>
  <text x="990" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#fffbeb">2025 — 반등</text>
  <text x="990" y="200" text-anchor="middle" font-size="13" fill="#fde68a">매출 회복 · 마진은 아직</text>

  <text x="870" y="240" font-size="13" fill="#64748b">매출</text>
  <text x="1110" y="240" text-anchor="end" font-size="22" font-weight="700" fill="#fbbf24">6,514억</text>

  <line x1="865" y1="250" x2="1115" y2="250" stroke="#78350f" stroke-width="1"/>

  <text x="870" y="278" font-size="13" fill="#64748b">GPM</text>
  <text x="1110" y="278" text-anchor="end" font-size="20" font-weight="700" fill="#fbbf24">11.7%</text>

  <text x="870" y="315" font-size="13" fill="#64748b">OPM</text>
  <text x="1110" y="315" text-anchor="end" font-size="20" font-weight="700" fill="#ef4444">-19.0%</text>

  <line x1="865" y1="328" x2="1115" y2="328" stroke="#78350f" stroke-width="1"/>

  <text x="870" y="356" font-size="13" fill="#64748b">원가율</text>
  <text x="1110" y="356" text-anchor="end" font-size="18" font-weight="600" fill="#fcd34d">88%</text>

  <text x="870" y="393" font-size="13" fill="#64748b">전년比 매출</text>
  <text x="1110" y="393" text-anchor="end" font-size="18" font-weight="600" fill="#fbbf24">+143%</text>

  <rect x="855" y="412" width="270" height="44" rx="8" fill="#78350f"/>
  <text x="990" y="439" text-anchor="middle" font-size="13" fill="#fef3c7">CAPEX 2,604억 — 공장 증설 중</text>
  <text x="990" y="456" text-anchor="middle" font-size="11" fill="#fde68a">마진 회복은 2026~2027 과제</text>

  <!-- ===== 화살표 연결 ===== -->
  <!-- 좌→중 화살표 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <line x1="365" y1="300" x2="445" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="405" y="292" text-anchor="middle" font-size="11" fill="#ef4444">-71%</text>
  <text x="405" y="316" text-anchor="middle" font-size="10" fill="#64748b">3년 하락</text>

  <!-- 중→우 화살표 -->
  <line x1="755" y1="300" x2="835" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="795" y="292" text-anchor="middle" font-size="11" fill="#fbbf24">+143%</text>
  <text x="795" y="316" text-anchor="middle" font-size="10" fill="#64748b">매출 반등</text>

  <!-- ===== 하단 결론 ===== -->
  <rect x="60" y="510" width="1080" height="90" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="600" y="548" text-anchor="middle" font-size="17" font-weight="700" fill="#f1f5f9">매출은 2.4배 뛰었다. 마진은 안 돌아왔다. 원가율 88%가 문제다.</text>
  <text x="600" y="576" text-anchor="middle" font-size="13" fill="#64748b">GPM 61% → 12% / 2021 초고마진 사업모델은 소멸 · 2025는 구조 전환 중</text>
  <text x="600" y="596" text-anchor="middle" font-size="12" fill="#475569">2026-04-18 dartlab 실측</text>

  <!-- 하단 연도 타임라인 바 -->
  <rect x="80" y="618" width="1040" height="6" rx="3" fill="#1e293b"/>
  <rect x="80" y="618" width="200" height="6" rx="3" fill="#22c55e"/>
  <rect x="280" y="618" width="520" height="6" rx="3" fill="#ef4444" opacity="0.6"/>
  <rect x="800" y="618" width="320" height="6" rx="3" fill="#fbbf24" opacity="0.8"/>

  <text x="80" y="644" font-size="11" fill="#64748b">2021</text>
  <text x="275" y="644" text-anchor="end" font-size="11" fill="#64748b">2022</text>
  <text x="535" y="644" text-anchor="middle" font-size="11" fill="#64748b">2023</text>
  <text x="800" y="644" text-anchor="middle" font-size="11" fill="#64748b">2024</text>
  <text x="1120" y="644" text-anchor="end" font-size="11" fill="#64748b">2025</text>
</svg>
