<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="-apple-system,'Segoe UI',sans-serif">
  <!-- 배경 -->
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">SK바이오사이언스 — 투자 사이클 현황 대시보드</text>
  <text x="600" y="84" text-anchor="middle" font-size="15" fill="#64748b">CAPEX 역대 최대 집행 중 — 매출로 회수되기 전까지 적자 지속 구간</text>

  <!-- 구분선 -->
  <line x1="60" y1="102" x2="1140" y2="102" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== 카드 레이아웃: 3×2 그리드 ===== -->
  <!-- Row1: y=120, Row2: y=390 -->
  <!-- Col1: x=60, Col2: x=440, Col3: x=820 -->
  <!-- 카드 width=340, height=240 -->

  <!-- ===== 카드 1: CAPEX 2,604억 ===== -->
  <rect x="60" y="120" width="340" height="240" rx="14" fill="#1c1500" stroke="#fbbf24" stroke-width="2"/>
  <!-- 상단 색상 바 -->
  <rect x="60" y="120" width="340" height="6" rx="14" fill="#fbbf24"/>

  <text x="240" y="160" text-anchor="middle" font-size="13" fill="#64748b">CAPEX (설비투자)</text>

  <text x="240" y="218" text-anchor="middle" font-size="42" font-weight="900" fill="#fbbf24">2,604억</text>

  <rect x="80" y="230" width="300" height="28" rx="6" fill="#292100"/>
  <text x="230" y="249" text-anchor="middle" font-size="13" fill="#fde68a">매출 대비 40% — 역대 최대</text>

  <text x="240" y="288" text-anchor="middle" font-size="13" fill="#94a3b8">공장 증설 / 신규 생산 라인</text>
  <text x="240" y="308" text-anchor="middle" font-size="13" fill="#94a3b8">안동 L HOUSE 글로벌 허브화</text>

  <text x="240" y="346" text-anchor="middle" font-size="20" font-weight="700" fill="#fbbf24">★ 투자 한가운데</text>

  <!-- ===== 카드 2: 부채비율 45% ===== -->
  <rect x="430" y="120" width="340" height="240" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <rect x="430" y="120" width="340" height="6" rx="14" fill="#22c55e"/>

  <text x="600" y="160" text-anchor="middle" font-size="13" fill="#64748b">부채비율</text>

  <text x="600" y="218" text-anchor="middle" font-size="42" font-weight="900" fill="#22c55e">45%</text>

  <rect x="450" y="230" width="300" height="28" rx="6" fill="#0a3d20"/>
  <text x="600" y="249" text-anchor="middle" font-size="13" fill="#bbf7d0">2023 8.7% → 2025 45% — 급등</text>

  <text x="600" y="288" text-anchor="middle" font-size="13" fill="#94a3b8">절대치는 양호 (업계 200%+ 대비)</text>
  <text x="600" y="308" text-anchor="middle" font-size="13" fill="#94a3b8">CAPEX 차입 확대 영향</text>

  <!-- 미니 바차트: 2023→2025 -->
  <rect x="480" y="320" width="30" height="22" rx="3" fill="#22c55e" opacity="0.5"/>
  <text x="495" y="335" text-anchor="middle" font-size="10" fill="#86efac">8.7%</text>
  <rect x="520" y="310" width="30" height="32" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="535" y="330" text-anchor="middle" font-size="10" fill="#86efac">~25%</text>
  <rect x="560" y="300" width="30" height="42" rx="3" fill="#22c55e"/>
  <text x="575" y="318" text-anchor="middle" font-size="10" fill="white">45%</text>
  <text x="480" y="358" font-size="10" fill="#64748b">2023</text>
  <text x="520" y="358" font-size="10" fill="#64748b">2024</text>
  <text x="560" y="358" font-size="10" fill="#64748b">2025</text>

  <!-- ===== 카드 3: 현금 1,056억 ===== -->
  <rect x="800" y="120" width="340" height="240" rx="14" fill="#1c1000" stroke="#f59e0b" stroke-width="2"/>
  <rect x="800" y="120" width="340" height="6" rx="14" fill="#f59e0b"/>

  <text x="970" y="160" text-anchor="middle" font-size="13" fill="#64748b">현금 및 현금성 자산</text>

  <text x="970" y="218" text-anchor="middle" font-size="42" font-weight="900" fill="#f59e0b">1,056억</text>

  <rect x="820" y="230" width="300" height="28" rx="6" fill="#251000"/>
  <text x="970" y="249" text-anchor="middle" font-size="13" fill="#fde68a">2024 3,127억에서 66% 감소</text>

  <text x="970" y="288" text-anchor="middle" font-size="13" fill="#94a3b8">CAPEX 집행 + 영업 적자 병행</text>

  <!-- 현금 소진 바 -->
  <rect x="820" y="306" width="300" height="16" rx="4" fill="#1e293b"/>
  <rect x="820" y="306" width="102" height="16" rx="4" fill="#f59e0b"/>
  <text x="970" y="340" text-anchor="middle" font-size="12" fill="#94a3b8">2024 대비 34% 남음</text>
  <text x="970" y="356" text-anchor="middle" font-size="12" fill="#fbbf24">OCF 흑자로 추가 감소 완화</text>

  <!-- ===== 카드 4: OCF +1,025억 ===== -->
  <rect x="60" y="390" width="340" height="240" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <rect x="60" y="390" width="340" height="6" rx="14" fill="#22c55e"/>

  <text x="240" y="430" text-anchor="middle" font-size="13" fill="#64748b">영업현금흐름 (OCF)</text>

  <text x="240" y="490" text-anchor="middle" font-size="40" font-weight="900" fill="#22c55e">+1,025억</text>

  <rect x="80" y="502" width="300" height="28" rx="6" fill="#0a3d20"/>
  <text x="230" y="521" text-anchor="middle" font-size="13" fill="#bbf7d0">영업현금 흑자 전환 — 긍정 신호</text>

  <text x="240" y="558" text-anchor="middle" font-size="13" fill="#94a3b8">2024 OCF 적자에서 회복</text>
  <text x="240" y="578" text-anchor="middle" font-size="13" fill="#94a3b8">CAPEX 2,604억과 상쇄 → FCF 적자</text>

  <text x="240" y="614" text-anchor="middle" font-size="18" font-weight="700" fill="#22c55e">▲ 흑자 전환</text>

  <!-- ===== 카드 5: 판관비율 30.6% ===== -->
  <rect x="430" y="390" width="340" height="240" rx="14" fill="#2d0a0a" stroke="#ef4444" stroke-width="2"/>
  <rect x="430" y="390" width="340" height="6" rx="14" fill="#ef4444"/>

  <text x="600" y="430" text-anchor="middle" font-size="13" fill="#64748b">판관비율 (SG&amp;A / 매출)</text>

  <text x="600" y="490" text-anchor="middle" font-size="40" font-weight="900" fill="#ef4444">30.6%</text>

  <rect x="450" y="502" width="300" height="28" rx="6" fill="#3d0a0a"/>
  <text x="600" y="521" text-anchor="middle" font-size="13" fill="#fecaca">R&amp;D + 인력 + 시설 유지비</text>

  <text x="600" y="558" text-anchor="middle" font-size="13" fill="#94a3b8">매출 반등에도 고정 판관비 부담</text>
  <text x="600" y="578" text-anchor="middle" font-size="13" fill="#94a3b8">GPM 11.7% - 판관비 30.6% = -18.9%</text>

  <text x="600" y="614" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">▼ OPM 적자 원인</text>

  <!-- ===== 카드 6: ICR -2.8배 ===== -->
  <rect x="800" y="390" width="340" height="240" rx="14" fill="#2d0a0a" stroke="#ef4444" stroke-width="2"/>
  <rect x="800" y="390" width="340" height="6" rx="14" fill="#ef4444"/>

  <text x="970" y="430" text-anchor="middle" font-size="13" fill="#64748b">이자보상배율 (ICR)</text>

  <text x="970" y="490" text-anchor="middle" font-size="40" font-weight="900" fill="#ef4444">-2.8배</text>

  <rect x="820" y="502" width="300" height="28" rx="6" fill="#3d0a0a"/>
  <text x="970" y="521" text-anchor="middle" font-size="13" fill="#fecaca">이자 지급 불능 상태</text>

  <text x="970" y="558" text-anchor="middle" font-size="13" fill="#94a3b8">영업이익이 음수 → 이자 미커버</text>
  <text x="970" y="578" text-anchor="middle" font-size="13" fill="#94a3b8">부채비율 45% 양호하나 수익성 선결</text>

  <text x="970" y="614" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">▼ 적자 지속 구간</text>

  <!-- ===== 하단 결론 ===== -->
  <rect x="60" y="656" width="1080" height="100" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="600" y="690" text-anchor="middle" font-size="17" font-weight="700" fill="#fbbf24">투자 사이클 한가운데</text>
  <text x="600" y="716" text-anchor="middle" font-size="14" fill="#f1f5f9">CAPEX가 매출로 돌아오기 전까지 적자 지속 — 2026~2027년이 변곡점</text>
  <text x="600" y="738" text-anchor="middle" font-size="13" fill="#64748b">OCF 흑자 전환은 긍정적 / 현금 1,056억 · CAPEX 부담 병존 · 부채비율은 아직 양호</text>
  <text x="600" y="750" text-anchor="middle" font-size="11" fill="#475569">2026-04-18 dartlab 실측</text>
</svg>
