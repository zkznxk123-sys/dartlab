<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="-apple-system,'Segoe UI',sans-serif">
  <!-- 배경 -->
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">SK바이오사이언스 — GPM / OPM 5년 추이</text>
  <text x="600" y="84" text-anchor="middle" font-size="16" fill="#64748b">GPM 61% → 12% — 초고마진 사업모델 소멸</text>

  <!-- 차트 영역 정의 -->
  <!-- X: 2021~2025, 간격 190px, 시작 160, 끝 960 -->
  <!-- Y: +70% ~ -60%, 총 130%, 차트 높이 400px -->
  <!-- 차트 박스 top=140, bottom=540 -->

  <!-- 격자선 및 Y축 레이블 -->
  <!-- Y=0% 기준선 (y좌표 계산: 140 + (70/(70+60)) * 400 = 140 + 215 = 355) -->

  <!-- 격자 수평선 -->
  <line x1="160" y1="140" x2="960" y2="140" stroke="#1e293b" stroke-width="1"/>
  <!-- +60% -->
  <line x1="160" y1="171" x2="960" y2="171" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- +40% -->
  <line x1="160" y1="232" x2="960" y2="232" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- +20% -->
  <line x1="160" y1="294" x2="960" y2="294" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- 0% 기준선 강조 -->
  <line x1="160" y1="355" x2="960" y2="355" stroke="#334155" stroke-width="2"/>
  <!-- -20% -->
  <line x1="160" y1="416" x2="960" y2="416" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- -40% -->
  <line x1="160" y1="478" x2="960" y2="478" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- -60% -->
  <line x1="160" y1="540" x2="960" y2="540" stroke="#1e293b" stroke-width="1"/>

  <!-- Y축 레이블 -->
  <text x="145" y="144" text-anchor="end" font-size="12" fill="#64748b">+70%</text>
  <text x="145" y="175" text-anchor="end" font-size="12" fill="#64748b">+60%</text>
  <text x="145" y="236" text-anchor="end" font-size="12" fill="#64748b">+40%</text>
  <text x="145" y="298" text-anchor="end" font-size="12" fill="#64748b">+20%</text>
  <text x="145" y="359" text-anchor="end" font-size="12" fill="#94a3b8">0%</text>
  <text x="145" y="420" text-anchor="end" font-size="12" fill="#64748b">-20%</text>
  <text x="145" y="482" text-anchor="end" font-size="12" fill="#64748b">-40%</text>
  <text x="145" y="544" text-anchor="end" font-size="12" fill="#64748b">-60%</text>

  <!-- X축 연도 레이블 (x좌표: 2021=210, 2022=400, 2023=590, 2024=780, 2025=960 아니고 균등) -->
  <!-- X 포인트: 2021=210, 2022=400, 2023=580, 2024=760, 2025=940 -->
  <text x="210" y="570" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2021</text>
  <text x="400" y="570" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2022</text>
  <text x="580" y="570" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2023</text>
  <text x="760" y="570" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2024</text>
  <text x="940" y="570" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2025</text>

  <!-- Y좌표 변환 공식: y = 140 + (70 - val) / 130 * 400 -->
  <!-- GPM 데이터: 61.4, 52.5, 38.5, 11.6, 11.7 -->
  <!-- 2021 GPM: y = 140 + (70-61.4)/130*400 = 140 + 26.5 = 166 -->
  <!-- 2022 GPM: y = 140 + (70-52.5)/130*400 = 140 + 53.8 = 194 -->
  <!-- 2023 GPM: y = 140 + (70-38.5)/130*400 = 140 + 96.9 = 237 -->
  <!-- 2024 GPM: y = 140 + (70-11.6)/130*400 = 140 + 179.7 = 320 -->
  <!-- 2025 GPM: y = 140 + (70-11.7)/130*400 = 140 + 179.4 = 319 -->

  <!-- OPM 데이터: 51.1, 25.2, -3.2, -51.7, -19.0 -->
  <!-- 2021 OPM: y = 140 + (70-51.1)/130*400 = 140 + 58.2 = 198 -->
  <!-- 2022 OPM: y = 140 + (70-25.2)/130*400 = 140 + 137.8 = 278 -->
  <!-- 2023 OPM: y = 140 + (70-(-3.2))/130*400 = 140 + 225.2 = 365 -->
  <!-- 2024 OPM: y = 140 + (70-(-51.7))/130*400 = 140 + 374.5 = 515 -->
  <!-- 2025 OPM: y = 140 + (70-(-19.0))/130*400 = 140 + 273.8 = 414 -->

  <!-- GPM 라인 (녹색) — 영역 채우기 -->
  <polygon points="210,166 400,194 580,237 760,320 940,319 940,355 760,355 580,355 400,355 210,355" fill="#22c55e" opacity="0.08"/>

  <!-- GPM 라인 -->
  <polyline points="210,166 400,194 580,237 760,320 940,319" fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round"/>

  <!-- OPM 영역 (0% 이하 부분 강조) -->
  <polygon points="580,365 760,515 940,414 940,355 760,355 580,355" fill="#ef4444" opacity="0.08"/>

  <!-- OPM 라인 -->
  <polyline points="210,198 400,278 580,365 760,515 940,414" fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round"/>

  <!-- GPM 데이터 포인트 + 레이블 -->
  <circle cx="210" cy="166" r="6" fill="#22c55e"/>
  <text x="210" y="153" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">61.4%</text>

  <circle cx="400" cy="194" r="6" fill="#22c55e"/>
  <text x="400" y="181" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">52.5%</text>

  <circle cx="580" cy="237" r="6" fill="#22c55e"/>
  <text x="580" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">38.5%</text>

  <circle cx="760" cy="320" r="6" fill="#22c55e"/>
  <text x="760" y="307" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">11.6%</text>

  <circle cx="940" cy="319" r="6" fill="#22c55e"/>
  <text x="940" y="306" text-anchor="middle" font-size="13" font-weight="700" fill="#22c55e">11.7%</text>

  <!-- OPM 데이터 포인트 + 레이블 -->
  <circle cx="210" cy="198" r="6" fill="#ef4444"/>
  <text x="210" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">51.1%</text>

  <circle cx="400" cy="278" r="6" fill="#ef4444"/>
  <text x="400" y="296" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">25.2%</text>

  <circle cx="580" cy="365" r="6" fill="#ef4444"/>
  <text x="622" y="368" font-size="13" font-weight="700" fill="#ef4444">-3.2%</text>

  <circle cx="760" cy="515" r="6" fill="#ef4444"/>
  <text x="760" y="534" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">-51.7%</text>

  <circle cx="940" cy="414" r="6" fill="#ef4444"/>
  <text x="940" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">-19.0%</text>

  <!-- 주석 레이블 -->
  <!-- 2021 AZ 백신 CMO -->
  <rect x="155" y="108" width="130" height="28" rx="5" fill="#166534" opacity="0.9"/>
  <text x="220" y="127" text-anchor="middle" font-size="11" fill="#bbf7d0">AZ 백신 CMO</text>

  <!-- 2023 코로나 수요 소멸 -->
  <rect x="510" y="108" width="152" height="28" rx="5" fill="#7f1d1d" opacity="0.9"/>
  <text x="586" y="127" text-anchor="middle" font-size="11" fill="#fecaca">코로나 수요 소멸</text>

  <!-- 2025 매출 반등 but 원가율 그대로 -->
  <rect x="860" y="108" width="100" height="44" rx="5" fill="#78350f" opacity="0.9"/>
  <text x="910" y="125" text-anchor="middle" font-size="10" fill="#fde68a">매출 반등</text>
  <text x="910" y="143" text-anchor="middle" font-size="10" fill="#fde68a">원가율 그대로</text>

  <!-- 범례 -->
  <rect x="980" y="200" width="190" height="90" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <line x1="996" y1="230" x2="1030" y2="230" stroke="#22c55e" stroke-width="3"/>
  <circle cx="1013" cy="230" r="5" fill="#22c55e"/>
  <text x="1038" y="235" font-size="13" fill="#f1f5f9">GPM (매출총이익률)</text>
  <line x1="996" y1="268" x2="1030" y2="268" stroke="#ef4444" stroke-width="3"/>
  <circle cx="1013" cy="268" r="5" fill="#ef4444"/>
  <text x="1038" y="273" font-size="13" fill="#f1f5f9">OPM (영업이익률)</text>

  <!-- 강조 박스: GPM 61→12 -->
  <rect x="980" y="310" width="190" height="72" rx="8" fill="#1c0505" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1075" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">GPM 61% → 12%</text>
  <text x="1075" y="354" text-anchor="middle" font-size="11" fill="#fca5a5">초고마진 완전 소멸</text>
  <text x="1075" y="374" text-anchor="middle" font-size="11" fill="#64748b">4년 만에 -49.7%p</text>

  <!-- 하단 바 -->
  <rect x="60" y="600" width="1080" height="72" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="600" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#fbbf24">핵심: GPM 하락이 OPM 하락의 근본 원인</text>
  <text x="600" y="656" text-anchor="middle" font-size="13" fill="#64748b">원가율 38% → 88% — CMO 고마진 소멸 후 자체 제품·상품 마진이 구조적으로 낮다</text>
</svg>
