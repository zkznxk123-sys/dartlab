<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="-apple-system,'Segoe UI',sans-serif">
  <!-- 배경 -->
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">SK바이오사이언스 — 매출 구성 변화 (2021~2025)</text>
  <text x="600" y="82" text-anchor="middle" font-size="15" fill="#64748b">상품(CDO/CDMO) 비중 2% → 35% — 자체 백신에서 위탁생산으로 전환 중</text>

  <!-- 범례 -->
  <rect x="340" y="100" width="16" height="16" rx="3" fill="#3b82f6"/>
  <text x="362" y="113" font-size="13" fill="#f1f5f9">제품 (자체 백신)</text>
  <rect x="510" y="100" width="16" height="16" rx="3" fill="#22c55e"/>
  <text x="532" y="113" font-size="13" fill="#f1f5f9">용역 (CMO)</text>
  <rect x="640" y="100" width="16" height="16" rx="3" fill="#fbbf24"/>
  <text x="662" y="113" font-size="13" fill="#f1f5f9">상품 (CDO/CDMO)</text>

  <!-- 차트 영역: top=140, bottom=530, height=390 -->
  <!-- X축: 5개 바, 시작 160, 끝 1040, 각 바 너비 100, 간격 76 -->
  <!-- x 중심: 2021=220, 2022=410, 2023=600, 2024=790, 2025=980 -->

  <!-- 최대 매출 9290억 기준 스케일 (390px = 9290억) -->
  <!-- 높이 계산: h = val/9290 * 390 -->
  <!-- 2021: 제품 6970(75%), 용역 2694(29%), 상품 186(2%) — 총 9290 -->
  <!-- 비율로만: 제품 69%, CMO 29%, 상품 2% -->

  <!-- ===== 2021 바 ===== -->
  <!-- 총 9290억 → 390px -->
  <!-- 상품 2% = 7.8px, 용역 29% = 113px, 제품 69% = 269px -->
  <!-- 스택: 상품 bottom=530, 용역 위, 제품 맨 위 -->

  <!-- 상품 (fbbf24) -->
  <rect x="170" y="522" width="100" height="8" rx="0" fill="#fbbf24"/>
  <!-- 용역 CMO (22c55e) -->
  <rect x="170" y="409" width="100" height="113" rx="0" fill="#22c55e"/>
  <!-- 제품 (3b82f6) -->
  <rect x="170" y="140" width="100" height="269" rx="0" fill="#3b82f6"/>
  <!-- 바 상단 라운드 -->
  <rect x="170" y="140" width="100" height="12" rx="6" fill="#3b82f6"/>
  <!-- 바 하단 라운드 -->
  <rect x="170" y="518" width="100" height="12" rx="6" fill="#fbbf24"/>

  <!-- 레이블 (바 내부) -->
  <text x="220" y="286" text-anchor="middle" font-size="13" font-weight="700" fill="white">69%</text>
  <text x="220" y="466" text-anchor="middle" font-size="12" fill="white">CMO</text>
  <text x="220" y="482" text-anchor="middle" font-size="12" fill="white">29%</text>
  <text x="220" y="529" text-anchor="middle" font-size="10" fill="#1c1500">2%</text>

  <!-- 매출 총액 레이블 -->
  <text x="220" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">9,290억</text>

  <!-- ===== 2022 바 ===== -->
  <!-- 총 4567억 → 195px -->
  <!-- 제품 95% = 185px, 상품 5% = 10px -->
  <rect x="360" y="520" width="100" height="10" rx="0" fill="#fbbf24"/>
  <rect x="360" y="335" width="100" height="185" rx="0" fill="#3b82f6"/>
  <rect x="360" y="335" width="100" height="12" rx="6" fill="#3b82f6"/>
  <rect x="360" y="518" width="100" height="12" rx="6" fill="#fbbf24"/>

  <text x="410" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="white">95%</text>
  <text x="410" y="528" text-anchor="middle" font-size="10" fill="#1c1500">5%</text>

  <text x="410" y="321" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">4,567억</text>

  <!-- ===== 2023 바 ===== -->
  <!-- 총 3695억 → 158px -->
  <!-- 제품 83% = 131px, 상품 17% = 27px -->
  <rect x="550" y="503" width="100" height="27" rx="0" fill="#fbbf24"/>
  <rect x="550" y="372" width="100" height="131" rx="0" fill="#3b82f6"/>
  <rect x="550" y="372" width="100" height="12" rx="6" fill="#3b82f6"/>
  <rect x="550" y="501" width="100" height="12" rx="6" fill="#fbbf24"/>

  <text x="600" y="442" text-anchor="middle" font-size="13" font-weight="700" fill="white">83%</text>
  <text x="600" y="520" text-anchor="middle" font-size="11" fill="#1c1500">17%</text>

  <text x="600" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">3,695억</text>

  <!-- ===== 2024 바 ===== -->
  <!-- 총 2675억 → 112px -->
  <!-- 제품 65% = 73px, 상품 35% = 39px -->
  <rect x="740" y="491" width="100" height="39" rx="0" fill="#fbbf24"/>
  <rect x="740" y="418" width="100" height="73" rx="0" fill="#3b82f6"/>
  <rect x="740" y="418" width="100" height="12" rx="6" fill="#3b82f6"/>
  <rect x="740" y="489" width="100" height="12" rx="6" fill="#fbbf24"/>

  <text x="790" y="458" text-anchor="middle" font-size="12" font-weight="700" fill="white">65%</text>
  <text x="790" y="514" text-anchor="middle" font-size="11" fill="#1c1500">35%</text>

  <text x="790" y="404" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">2,675억</text>

  <!-- ===== 2025 바 (추정) ===== -->
  <!-- 총 6514억 → 273px -->
  <!-- 제품 60% = 164px, 상품 40% = 109px -->
  <rect x="930" y="421" width="100" height="109" rx="0" fill="#fbbf24"/>
  <rect x="930" y="257" width="100" height="164" rx="0" fill="#3b82f6"/>
  <rect x="930" y="257" width="100" height="12" rx="6" fill="#3b82f6"/>
  <rect x="930" y="419" width="100" height="12" rx="6" fill="#fbbf24"/>

  <!-- 추정 빗금 오버레이 -->
  <rect x="930" y="257" width="100" height="273" rx="6" fill="url(#hatch)" opacity="0.25"/>
  <defs>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#ffffff" stroke-width="1.5"/>
    </pattern>
  </defs>

  <text x="980" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="white">60%</text>
  <text x="980" y="478" text-anchor="middle" font-size="12" font-weight="700" fill="#1c1500">40%</text>

  <text x="980" y="243" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">6,514억</text>
  <text x="980" y="220" text-anchor="middle" font-size="11" fill="#64748b">(추정)</text>

  <!-- X축 연도 레이블 -->
  <line x1="140" y1="530" x2="1060" y2="530" stroke="#334155" stroke-width="1"/>
  <text x="220" y="556" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2021</text>
  <text x="410" y="556" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2022</text>
  <text x="600" y="556" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2023</text>
  <text x="790" y="556" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">2024</text>
  <text x="980" y="556" text-anchor="middle" font-size="14" font-weight="600" fill="#fbbf24">2025E</text>

  <!-- 상품 비중 트렌드 화살표 + 주석 -->
  <path d="M 220 518 Q 600 490 980 415" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
  <text x="600" y="584" text-anchor="middle" font-size="12" fill="#fbbf24">상품(CDO/CDMO) 비중 2% → 40% 확대 추세</text>

  <!-- 하단 결론 박스 -->
  <rect x="60" y="614" width="1080" height="76" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="600" y="645" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">CMO 전성기 종료 → CDO/CDMO 위탁생산으로 사업모델 전환 진행 중</text>
  <text x="600" y="668" text-anchor="middle" font-size="13" fill="#64748b">자체 제품(제품군) 마진이 CMO보다 낮아 GPM 회복이 더딘 구조적 원인</text>
  <text x="600" y="684" text-anchor="middle" font-size="11" fill="#475569">2026-04-18 dartlab 실측</text>
</svg>
