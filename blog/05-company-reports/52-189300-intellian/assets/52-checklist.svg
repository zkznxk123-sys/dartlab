<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="540" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">투자 전 체크포인트 5</text>
  <text x="540" y="80" text-anchor="middle" font-size="15" fill="#64748b">인텔리안테크 189300 — 매수 전 확인해야 할 조건</text>

  <!-- Item 1: 분기 OPM 흑자 연속 (노랑 - 관찰중) -->
  <rect x="50" y="105" width="980" height="88" fill="#1a160a" rx="10" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Icon circle -->
  <circle cx="105" cy="149" r="28" fill="#2a2000" stroke="#fbbf24" stroke-width="2"/>
  <text x="105" y="155" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">1</text>
  <!-- Status badge -->
  <rect x="890" y="126" width="120" height="26" fill="#2a2000" rx="13" stroke="#fbbf24" stroke-width="1"/>
  <text x="950" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#fbbf24">관찰 중</text>
  <!-- Content -->
  <text x="155" y="135" font-size="16" font-weight="700" fill="#f1f5f9">분기 OPM 흑자 연속 유지</text>
  <text x="155" y="158" font-size="13" fill="#94a3b8">2025 Q2~Q4 3분기 연속 흑자 확인 — Q1 적자 패턴 탈피 여부 모니터링</text>
  <text x="155" y="178" font-size="12" fill="#64748b">2026Q1 실적 발표 시 OPM 흑자 유지 여부가 첫 관문</text>

  <!-- Item 2: 판관비율 35% 이하 (노랑) -->
  <rect x="50" y="205" width="980" height="88" fill="#1a160a" rx="10" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="105" cy="249" r="28" fill="#2a2000" stroke="#fbbf24" stroke-width="2"/>
  <text x="105" y="255" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">2</text>
  <rect x="890" y="226" width="120" height="26" fill="#2a2000" rx="13" stroke="#fbbf24" stroke-width="1"/>
  <text x="950" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#fbbf24">관찰 중</text>
  <text x="155" y="235" font-size="16" font-weight="700" fill="#f1f5f9">판관비율 35% 이하 유지</text>
  <text x="155" y="258" font-size="13" fill="#94a3b8">2024년 46% 폭등이 적자 원인 — 2025년 35%로 정상화, 36% 밑이면 안정 신호</text>
  <text x="155" y="278" font-size="12" fill="#64748b">분기별 판관비율 트래킹 필수, 인건비·R&amp;D 재증가 여부 확인</text>

  <!-- Item 3: LEO 수주 공시 (녹색) -->
  <rect x="50" y="305" width="980" height="88" fill="#0a1f14" rx="10" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="105" cy="349" r="28" fill="#0a2a14" stroke="#22c55e" stroke-width="2"/>
  <text x="105" y="355" text-anchor="middle" font-size="18" font-weight="700" fill="#22c55e">3</text>
  <rect x="890" y="326" width="120" height="26" fill="#0a2a14" rx="13" stroke="#22c55e" stroke-width="1"/>
  <text x="950" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#22c55e">핵심 촉매</text>
  <text x="155" y="335" font-size="16" font-weight="700" fill="#f1f5f9">LEO 안테나 대형 수주 공시</text>
  <text x="155" y="358" font-size="13" fill="#94a3b8">스타링크 / OneWeb / Amazon Kuiper 안테나 계약 공시가 매출 가시성의 핵심</text>
  <text x="155" y="378" font-size="12" fill="#64748b">공시 확인: DART 중요사항 보고서 + IR 자료 주시 필요</text>

  <!-- Item 4: 부채비율 70% 이하 (빨강) -->
  <rect x="50" y="405" width="980" height="88" fill="#1a0a0a" rx="10" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="105" cy="449" r="28" fill="#2a0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="105" y="455" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">4</text>
  <rect x="890" y="426" width="120" height="26" fill="#2a0a0a" rx="13" stroke="#ef4444" stroke-width="1"/>
  <text x="950" y="444" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">위험 요소</text>
  <text x="155" y="435" font-size="16" font-weight="700" fill="#f1f5f9">부채비율 70% 이하 달성</text>
  <text x="155" y="458" font-size="13" fill="#94a3b8">현재 87% — 차입금 1,363억 (2년 만에 2배 증가), 이자 부담이 영업이익 잠식 중</text>
  <text x="155" y="478" font-size="12" fill="#64748b">매 분기 차입금 잔액 + 이자보상배율 트래킹. 하락 추세 확인 필요</text>

  <!-- Item 5: FCF 흑자 (빨강) -->
  <rect x="50" y="505" width="980" height="88" fill="#1a0a0a" rx="10" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="105" cy="549" r="28" fill="#2a0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="105" y="555" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">5</text>
  <rect x="890" y="526" width="120" height="26" fill="#2a0a0a" rx="13" stroke="#ef4444" stroke-width="1"/>
  <text x="950" y="544" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">위험 요소</text>
  <text x="155" y="535" font-size="16" font-weight="700" fill="#f1f5f9">연간 FCF 흑자 전환</text>
  <text x="155" y="558" font-size="13" fill="#94a3b8">2021~2022, 2025 FCF 마이너스 — 영업현금흐름으로 투자 감당 가능 여부 미확인</text>
  <text x="155" y="578" font-size="12" fill="#64748b">연간 현금흐름표 기준: 영업CF &gt; CAPEX 달성 시 자생적 성장 가능</text>

  <!-- Legend -->
  <circle cx="270" cy="625" r="6" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="285" y="630" font-size="12" fill="#94a3b8">핵심 촉매 (성장 트리거)</text>
  <circle cx="460" cy="625" r="6" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="475" y="630" font-size="12" fill="#94a3b8">관찰 중 (진행 확인)</text>
  <circle cx="640" cy="625" r="6" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="655" y="630" font-size="12" fill="#94a3b8">위험 요소 (미해결)</text>

  <!-- Bottom disclaimer -->
  <rect x="50" y="652" width="980" height="48" fill="#0f172a" rx="8"/>
  <text x="540" y="672" text-anchor="middle" font-size="12" fill="#64748b">dCR-BB+ · 차입금 1,363억 · 부채비율 87% · 2026-04-18 dartlab 실측</text>
  <text x="540" y="690" text-anchor="middle" font-size="11" fill="#475569">본 자료는 투자 권유가 아닙니다. 투자 결정은 본인 책임입니다.</text>
</svg>
