<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">비용 구조 3년 비교</text>
  <text x="600" y="85" text-anchor="middle" font-size="16" fill="#64748b">원가 / 판관비 / 영업이익률 — 매출 100% 기준</text>

  <!-- Bar width: each 200px, gap 50px, start x=150 -->
  <!-- bar height total: 400px (100%) → 4px per % -->
  <!-- y start: 530, go upward -->

  <!-- 2023 Bar (x=150~350) -->
  <!-- OPM: 3.5% → h=14, y=516 -->
  <!-- SGA: 37% → h=148 -->
  <!-- COGS: 60% → h=240 -->

  <!-- 2023 COGS -->
  <rect x="200" y="290" width="200" height="240" fill="#3b82f6" rx="0" opacity="0.8"/>
  <!-- 2023 SGA -->
  <rect x="200" y="142" width="200" height="148" fill="#8b5cf6" rx="0" opacity="0.8"/>
  <!-- 2023 OPM -->
  <rect x="200" y="128" width="200" height="14" fill="#22c55e" rx="0" opacity="0.9"/>
  <!-- 2023 top rounded -->
  <rect x="200" y="128" width="200" height="8" fill="#22c55e" rx="4" opacity="0.9"/>

  <!-- 2024 Bar (x=500~700) -->
  <!-- OPM: -7.5% → show as negative, visualize as 0 and note -->
  <!-- SGA: 46% → h=184 -->
  <!-- COGS: 61% → h=244 -->
  <!-- Note: total 107.5% → normalize to 100% display, show red line for negative OPM -->

  <!-- 2024 COGS -->
  <rect x="500" y="286" width="200" height="244" fill="#3b82f6" rx="0" opacity="0.8"/>
  <!-- 2024 SGA -->
  <rect x="500" y="102" width="200" height="184" fill="#ef4444" rx="0" opacity="0.85"/>
  <!-- negative OPM marker -->
  <rect x="500" y="530" width="200" height="30" fill="#ef444420" rx="0"/>
  <line x1="500" y1="530" x2="700" y2="530" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 2024 top rounded -->
  <rect x="500" y="102" width="200" height="8" fill="#ef4444" rx="4" opacity="0.85"/>

  <!-- 2025 Bar (x=800~1000) -->
  <!-- OPM: 3.7% → h=15 -->
  <!-- SGA: 35% → h=140 -->
  <!-- COGS: 61% → h=244 -->

  <!-- 2025 COGS -->
  <rect x="800" y="286" width="200" height="244" fill="#3b82f6" rx="0" opacity="0.8"/>
  <!-- 2025 SGA -->
  <rect x="800" y="146" width="200" height="140" fill="#8b5cf6" rx="0" opacity="0.8"/>
  <!-- 2025 OPM -->
  <rect x="800" y="131" width="200" height="15" fill="#22c55e" rx="0" opacity="0.9"/>
  <!-- 2025 top rounded -->
  <rect x="800" y="131" width="200" height="8" fill="#22c55e" rx="4" opacity="0.9"/>

  <!-- Base line -->
  <line x1="150" y1="530" x2="1050" y2="530" stroke="#334155" stroke-width="2"/>

  <!-- Year labels -->
  <text x="300" y="560" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">2023</text>
  <text x="600" y="560" text-anchor="middle" font-size="20" font-weight="700" fill="#ef4444">2024</text>
  <text x="900" y="560" text-anchor="middle" font-size="20" font-weight="700" fill="#22c55e">2025</text>

  <!-- Percentage labels inside bars -->
  <!-- 2023 -->
  <text x="300" y="420" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">원가 60%</text>
  <text x="300" y="215" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">판관비 37%</text>
  <text x="300" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#0a0e1a">OPM 3.5%</text>

  <!-- 2024 -->
  <text x="600" y="415" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">원가 61%</text>
  <text x="600" y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">판관비 46%</text>
  <text x="600" y="547" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">OPM -7.5%</text>

  <!-- 2025 -->
  <text x="900" y="420" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">원가 61%</text>
  <text x="900" y="215" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">판관비 35%</text>
  <text x="900" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#0a0e1a">OPM 3.7%</text>

  <!-- Annotation: 2024 판관비 -->
  <line x1="700" y1="195" x2="750" y2="175" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="752" y="152" width="295" height="46" fill="#1e293b" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="900" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">2024년 판관비 46%</text>
  <text x="900" y="189" text-anchor="middle" font-size="11" fill="#94a3b8">매출 15% 줄었는데 판관비는 안 줄었다</text>

  <!-- Legend -->
  <rect x="280" y="610" width="16" height="14" fill="#3b82f6" rx="2" opacity="0.8"/>
  <text x="302" y="622" font-size="13" fill="#94a3b8">매출원가 (COGS)</text>
  <rect x="450" y="610" width="16" height="14" fill="#8b5cf6" rx="2" opacity="0.8"/>
  <text x="472" y="622" font-size="13" fill="#94a3b8">판매관리비 (SGA)</text>
  <rect x="620" y="610" width="16" height="14" fill="#ef4444" rx="2" opacity="0.85"/>
  <text x="642" y="622" font-size="13" fill="#94a3b8">판관비 비정상 (2024)</text>
  <rect x="810" y="610" width="16" height="14" fill="#22c55e" rx="2" opacity="0.9"/>
  <text x="832" y="622" font-size="13" fill="#94a3b8">영업이익률</text>

  <!-- Bottom note -->
  <rect x="80" y="653" width="1040" height="50" fill="#0f172a" rx="8"/>
  <text x="600" y="674" text-anchor="middle" font-size="13" fill="#94a3b8">판관비 정상화(35%)로 2025년 흑자 전환 — 하지만 원가율 61% 고착, 매출 성장이 유일한 레버</text>
  <text x="600" y="692" text-anchor="middle" font-size="12" fill="#475569">2026-04-18 dartlab 실측 | 인텔리안테크 사업보고서</text>
</svg>
