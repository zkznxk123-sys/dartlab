<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#f1f5f9">연간 OPM 3.7%인데 Q4 혼자 16%</text>
  <text x="600" y="95" text-anchor="middle" font-size="18" fill="#64748b">인텔리안테크 2025년 분기별 매출 &amp; 영업이익률</text>

  <!-- Chart Area: x 80~1120, y 150~560 -->
  <!-- Y-axis labels (OPM %) -->
  <!-- Grid lines -->
  <line x1="140" y1="160" x2="1120" y2="160" stroke="#1e293b" stroke-width="1"/>
  <line x1="140" y1="220" x2="1120" y2="220" stroke="#1e293b" stroke-width="1"/>
  <line x1="140" y1="280" x2="1120" y2="280" stroke="#1e293b" stroke-width="1"/>
  <line x1="140" y1="340" x2="1120" y2="340" stroke="#1e293b" stroke-width="1"/>
  <line x1="140" y1="400" x2="1120" y2="400" stroke="#1e293b" stroke-width="1"/>
  <line x1="140" y1="460" x2="1120" y2="460" stroke="#1e293b" stroke-width="1"/>
  <line x1="140" y1="520" x2="1120" y2="520" stroke="#1e293b" stroke-width="1"/>

  <!-- X axis -->
  <line x1="140" y1="520" x2="1120" y2="520" stroke="#334155" stroke-width="2"/>
  <!-- Y axis -->
  <line x1="140" y1="140" x2="140" y2="530" stroke="#334155" stroke-width="2"/>

  <!-- Y-axis labels (매출 left) -->
  <text x="130" y="165" text-anchor="end" font-size="12" fill="#64748b">1400억</text>
  <text x="130" y="225" text-anchor="end" font-size="12" fill="#64748b">1200억</text>
  <text x="130" y="285" text-anchor="end" font-size="12" fill="#64748b">1000억</text>
  <text x="130" y="345" text-anchor="end" font-size="12" fill="#64748b">800억</text>
  <text x="130" y="405" text-anchor="end" font-size="12" fill="#64748b">600억</text>
  <text x="130" y="465" text-anchor="end" font-size="12" fill="#64748b">400억</text>
  <text x="130" y="525" text-anchor="end" font-size="12" fill="#64748b">0</text>

  <!-- Bar width and positions: 4 quarters + annual -->
  <!-- Chart height: 520-160=360px for 1400억 max -->
  <!-- scale: 360/1400 = 0.257 px/억 -->

  <!-- Q1: 434억, x=190, bar_h=434*0.257=111.5 -->
  <rect x="190" y="409" width="120" height="111" fill="#ef4444" rx="4"/>
  <text x="250" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">434억</text>

  <!-- Q2: 747억, x=400, bar_h=747*0.257=192 -->
  <rect x="400" y="328" width="120" height="192" fill="#fbbf24" rx="4"/>
  <text x="460" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">747억</text>

  <!-- Q3: 772억, x=610, bar_h=772*0.257=198.4 -->
  <rect x="610" y="322" width="120" height="198" fill="#fbbf24" rx="4"/>
  <text x="670" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">772억</text>

  <!-- Q4: 1243억, x=820, bar_h=1243*0.257=319.5 -->
  <rect x="820" y="201" width="120" height="319" fill="#22c55e" rx="4"/>
  <!-- Highlight glow -->
  <rect x="820" y="201" width="120" height="319" fill="none" stroke="#22c55e" stroke-width="2" rx="4" opacity="0.6"/>
  <text x="880" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#22c55e">1,243억</text>

  <!-- Q labels -->
  <text x="250" y="545" text-anchor="middle" font-size="16" font-weight="600" fill="#f1f5f9">Q1</text>
  <text x="460" y="545" text-anchor="middle" font-size="16" font-weight="600" fill="#f1f5f9">Q2</text>
  <text x="670" y="545" text-anchor="middle" font-size="16" font-weight="600" fill="#f1f5f9">Q3</text>
  <text x="880" y="545" text-anchor="middle" font-size="16" font-weight="600" fill="#22c55e">Q4 ★</text>

  <!-- OPM labels inside/below bars -->
  <text x="250" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">-27.8%</text>
  <text x="460" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#0a0e1a">+2.4%</text>
  <text x="670" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#0a0e1a">+3.1%</text>
  <text x="880" y="270" text-anchor="middle" font-size="15" font-weight="700" fill="#0a0e1a">+16.0%</text>

  <!-- Annual summary box -->
  <rect x="1000" y="300" width="100" height="80" fill="#1e293b" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="1050" y="325" text-anchor="middle" font-size="12" fill="#64748b">연간</text>
  <text x="1050" y="348" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">3,196억</text>
  <text x="1050" y="370" text-anchor="middle" font-size="14" font-weight="600" fill="#fbbf24">3.7%</text>

  <!-- OPM Right Y axis label -->
  <text x="1130" y="525" text-anchor="start" font-size="12" fill="#64748b">OPM</text>

  <!-- Legend -->
  <rect x="190" y="570" width="16" height="12" fill="#ef4444" rx="2"/>
  <text x="212" y="581" font-size="13" fill="#64748b">적자 분기</text>
  <rect x="320" y="570" width="16" height="12" fill="#fbbf24" rx="2"/>
  <text x="342" y="581" font-size="13" fill="#64748b">저마진 분기</text>
  <rect x="460" y="570" width="16" height="12" fill="#22c55e" rx="2"/>
  <text x="482" y="581" font-size="13" fill="#64748b">Q4 집중 수익</text>

  <!-- Bottom note -->
  <rect x="80" y="620" width="1040" height="60" fill="#0f172a" rx="8"/>
  <text x="600" y="646" text-anchor="middle" font-size="14" fill="#94a3b8">Q4에 대형 수주 납기가 집중 &#8212; 고정비를 분기마다 감당할 수 없는 구조</text>
  <text x="600" y="668" text-anchor="middle" font-size="12" fill="#475569">2026-04-18 dartlab 실측 | 인텔리안테크 2025 사업보고서</text>
</svg>
