<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">매출 9년 추이 &amp; OPM 오버레이</text>
  <text x="600" y="82" text-anchor="middle" font-size="16" fill="#64748b">인텔리안테크 2017~2025 | 매출(억원) + OPM(%)</text>

  <!-- Chart area: x 100~1120, y 110~520 -->
  <!-- Max revenue ~3200억, chart height 410px → scale 410/3200=0.128 -->
  <!-- X: 9 bars, width per bar = 1020/9 = ~113px -->

  <!-- Grid lines -->
  <line x1="100" y1="120" x2="1120" y2="120" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="185" x2="1120" y2="185" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="250" x2="1120" y2="250" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="315" x2="1120" y2="315" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="380" x2="1120" y2="380" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="445" x2="1120" y2="445" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="520" x2="1120" y2="520" stroke="#334155" stroke-width="2"/>

  <!-- Y axis left -->
  <line x1="100" y1="110" x2="100" y2="530" stroke="#334155" stroke-width="2"/>

  <!-- Y axis labels (매출) -->
  <text x="90" y="125" text-anchor="end" font-size="11" fill="#64748b">3200</text>
  <text x="90" y="190" text-anchor="end" font-size="11" fill="#64748b">2600</text>
  <text x="90" y="255" text-anchor="end" font-size="11" fill="#64748b">2000</text>
  <text x="90" y="320" text-anchor="end" font-size="11" fill="#64748b">1400</text>
  <text x="90" y="385" text-anchor="end" font-size="11" fill="#64748b">800</text>
  <text x="90" y="450" text-anchor="end" font-size="11" fill="#64748b">200</text>

  <!-- Bar data: revenues 837,1098,1180,1101,1380,2395,3050,2578,3196 -->
  <!-- scale: 410/3200 = 0.128125 per 억 -->
  <!-- bar x positions: 100 + i*113 + margin -->
  <!-- Each bar width: 70px, centered in 113px slot -->

  <!-- 2017: 837억, h=837*0.128=107 -->
  <rect x="121" y="413" width="70" height="107" fill="#3b82f6" rx="3" opacity="0.8"/>
  <text x="156" y="407" text-anchor="middle" font-size="10" fill="#94a3b8">837</text>

  <!-- 2018: 1098억, h=141 -->
  <rect x="234" y="379" width="70" height="141" fill="#3b82f6" rx="3" opacity="0.8"/>
  <text x="269" y="373" text-anchor="middle" font-size="10" fill="#94a3b8">1098</text>

  <!-- 2019: 1180억, h=151 -->
  <rect x="347" y="369" width="70" height="151" fill="#3b82f6" rx="3" opacity="0.8"/>
  <text x="382" y="363" text-anchor="middle" font-size="10" fill="#94a3b8">1180</text>

  <!-- 2020: 1101억, h=141 -->
  <rect x="460" y="379" width="70" height="141" fill="#3b82f6" rx="3" opacity="0.8"/>
  <text x="495" y="373" text-anchor="middle" font-size="10" fill="#94a3b8">1101</text>

  <!-- 2021: 1380억, h=177 -->
  <rect x="573" y="343" width="70" height="177" fill="#3b82f6" rx="3" opacity="0.8"/>
  <text x="608" y="337" text-anchor="middle" font-size="10" fill="#94a3b8">1380</text>

  <!-- 2022: 2395억, h=307 — highlight year -->
  <rect x="686" y="213" width="70" height="307" fill="#60a5fa" rx="3" opacity="0.9"/>
  <text x="721" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#fbbf24">2395</text>

  <!-- 2023: 3050억, h=391 -->
  <rect x="799" y="129" width="70" height="391" fill="#3b82f6" rx="3" opacity="0.8"/>
  <text x="834" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">3050</text>

  <!-- 2024: 2578억, h=330 — red tint for loss year -->
  <rect x="912" y="190" width="70" height="330" fill="#7c3aed" rx="3" opacity="0.8"/>
  <text x="947" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#c084fc">2578</text>

  <!-- 2025: 3196억, h=410 -->
  <rect x="1025" y="120" width="70" height="400" fill="#22c55e" rx="3" opacity="0.9"/>
  <text x="1060" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#22c55e">3196</text>

  <!-- X labels -->
  <text x="156" y="538" text-anchor="middle" font-size="12" fill="#64748b">2017</text>
  <text x="269" y="538" text-anchor="middle" font-size="12" fill="#64748b">2018</text>
  <text x="382" y="538" text-anchor="middle" font-size="12" fill="#64748b">2019</text>
  <text x="495" y="538" text-anchor="middle" font-size="12" fill="#64748b">2020</text>
  <text x="608" y="538" text-anchor="middle" font-size="12" fill="#64748b">2021</text>
  <text x="721" y="538" text-anchor="middle" font-size="12" fill="#fbbf24">2022</text>
  <text x="834" y="538" text-anchor="middle" font-size="12" fill="#64748b">2023</text>
  <text x="947" y="538" text-anchor="middle" font-size="12" fill="#c084fc">2024</text>
  <text x="1060" y="538" text-anchor="middle" font-size="12" fill="#22c55e">2025</text>

  <!-- OPM Line Overlay -->
  <!-- OPM values: 8.4, 9.4, 6.1, 3.0, 1.6, 6.4, 3.5, -7.5, 3.7 -->
  <!-- OPM scale: center at 520, +1% = -12px (up), -1% = +12px (down) -->
  <!-- baseline at y=520, 10% up = -120px → y=400 -->
  <!-- Points: center x of each bar -->
  <!-- 8.4%: y=520-8.4*12=520-101=419 -->
  <!-- 9.4%: y=520-9.4*12=520-113=407 -->
  <!-- 6.1%: y=520-6.1*12=520-73=447 -->
  <!-- 3.0%: y=520-3.0*12=520-36=484 -->
  <!-- 1.6%: y=520-1.6*12=520-19=501 -->
  <!-- 6.4%: y=520-6.4*12=520-77=443 -->
  <!-- 3.5%: y=520-3.5*12=520-42=478 -->
  <!-- -7.5%: y=520+7.5*12=520+90=610 → capped, show below -->
  <!-- 3.7%: y=520-3.7*12=520-44=476 -->

  <polyline
    points="156,419 269,407 382,447 495,484 608,501 721,443 834,478 947,610 1060,476"
    fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.9"/>

  <!-- OPM dots -->
  <circle cx="156" cy="419" r="5" fill="#fbbf24"/>
  <circle cx="269" cy="407" r="5" fill="#fbbf24"/>
  <circle cx="382" cy="447" r="5" fill="#fbbf24"/>
  <circle cx="495" cy="484" r="5" fill="#fbbf24"/>
  <circle cx="608" cy="501" r="5" fill="#fbbf24"/>
  <circle cx="721" cy="443" r="5" fill="#fbbf24"/>
  <circle cx="834" cy="478" r="5" fill="#fbbf24"/>
  <circle cx="947" cy="570" r="5" fill="#ef4444"/>
  <circle cx="1060" cy="476" r="5" fill="#22c55e"/>

  <!-- OPM value labels -->
  <text x="156" y="411" text-anchor="middle" font-size="10" fill="#fbbf24">8.4%</text>
  <text x="269" y="399" text-anchor="middle" font-size="10" fill="#fbbf24">9.4%</text>
  <text x="382" y="439" text-anchor="middle" font-size="10" fill="#fbbf24">6.1%</text>
  <text x="495" y="476" text-anchor="middle" font-size="10" fill="#fbbf24">3.0%</text>
  <text x="608" y="493" text-anchor="middle" font-size="10" fill="#fbbf24">1.6%</text>
  <text x="721" y="435" text-anchor="middle" font-size="10" fill="#fbbf24">6.4%</text>
  <text x="834" y="470" text-anchor="middle" font-size="10" fill="#fbbf24">3.5%</text>
  <text x="947" y="562" text-anchor="middle" font-size="10" fill="#ef4444">-7.5%</text>
  <text x="1060" y="468" text-anchor="middle" font-size="10" fill="#22c55e">3.7%</text>

  <!-- Annotations -->
  <!-- 2022 annotation -->
  <line x1="721" y1="200" x2="760" y2="175" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="762" y="155" width="165" height="32" fill="#1e293b" rx="5" stroke="#fbbf24" stroke-width="1"/>
  <text x="844" y="173" text-anchor="middle" font-size="11" fill="#fbbf24">위성통신 투자 붐</text>

  <!-- 2024 annotation -->
  <line x1="947" y1="183" x2="980" y2="158" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="982" y="138" width="165" height="32" fill="#1e293b" rx="5" stroke="#c084fc" stroke-width="1"/>
  <text x="1064" y="156" text-anchor="middle" font-size="11" fill="#c084fc">재고 조정 적자</text>

  <!-- Legend -->
  <rect x="300" y="570" width="14" height="14" fill="#3b82f6" rx="2" opacity="0.8"/>
  <text x="320" y="582" font-size="13" fill="#94a3b8">매출(억원)</text>
  <line x1="440" y1="577" x2="480" y2="577" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="460" cy="577" r="4" fill="#fbbf24"/>
  <text x="490" y="582" font-size="13" fill="#94a3b8">OPM(%)</text>

  <!-- Bottom note -->
  <rect x="80" y="620" width="1040" height="55" fill="#0f172a" rx="8"/>
  <text x="600" y="643" text-anchor="middle" font-size="13" fill="#94a3b8">2022년 위성통신 투자 붐으로 매출 급성장 → 2024년 재고 조정으로 OPM -7.5% 적자 → 2025년 회복 3.7%</text>
  <text x="600" y="663" text-anchor="middle" font-size="12" fill="#475569">2026-04-18 dartlab 실측 | 인텔리안테크 사업보고서</text>
</svg>
