<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
    <!-- Glow filters -->
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-yellow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <!-- Stars background decoration -->
  <circle cx="80" cy="50" r="1" fill="#f1f5f9" opacity="0.4"/>
  <circle cx="200" cy="30" r="1.5" fill="#f1f5f9" opacity="0.3"/>
  <circle cx="350" cy="80" r="1" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="500" cy="20" r="1" fill="#f1f5f9" opacity="0.3"/>
  <circle cx="700" cy="60" r="1.5" fill="#f1f5f9" opacity="0.4"/>
  <circle cx="900" cy="35" r="1" fill="#f1f5f9" opacity="0.3"/>
  <circle cx="1050" cy="70" r="1" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="1150" cy="40" r="1.5" fill="#f1f5f9" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-size="30" font-weight="700" fill="#f1f5f9">위성 안테나 시장 포지셔닝</text>
  <text x="600" y="92" text-anchor="middle" font-size="17" fill="#64748b">인텔리안테크가 경쟁하는 3개 시장</text>

  <!-- Card 1: 해상 VSAT (Green - World #1) -->
  <rect x="60" y="130" width="330" height="340" fill="#0f1f14" rx="16" stroke="#22c55e" stroke-width="2"/>
  <rect x="60" y="130" width="330" height="6" fill="#22c55e" rx="3"/>

  <!-- Badge -->
  <rect x="80" y="155" width="100" height="26" fill="#22c55e" rx="13"/>
  <text x="130" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#0a0e1a">세계 1위권</text>

  <!-- Icon area -->
  <circle cx="225" cy="265" r="55" fill="#0a1f0f" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
  <!-- Ship icon (simplified) -->
  <rect x="195" y="268" width="60" height="20" fill="#22c55e" rx="3" opacity="0.8"/>
  <polygon points="185,268 265,268 255,255 195,255" fill="#22c55e" opacity="0.6"/>
  <rect x="218" y="240" width="8" height="18" fill="#22c55e" opacity="0.9"/>
  <ellipse cx="222" cy="238" rx="12" ry="8" fill="none" stroke="#22c55e" stroke-width="1.5"/>

  <text x="225" y="345" text-anchor="middle" font-size="20" font-weight="700" fill="#22c55e">해상 VSAT</text>
  <text x="225" y="372" text-anchor="middle" font-size="14" fill="#f1f5f9">선박용 위성통신</text>
  <text x="225" y="395" text-anchor="middle" font-size="13" fill="#94a3b8">전 세계 선박 대상</text>
  <text x="225" y="415" text-anchor="middle" font-size="13" fill="#94a3b8">안정적 수요 기반</text>
  <text x="225" y="440" text-anchor="middle" font-size="12" fill="#64748b">현재 핵심 매출원</text>

  <!-- Card 2: LEO (Yellow - Growth) -->
  <rect x="435" y="130" width="330" height="340" fill="#1f1a0a" rx="16" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow-yellow)"/>
  <rect x="435" y="130" width="330" height="6" fill="#fbbf24" rx="3"/>

  <!-- Badge -->
  <rect x="455" y="155" width="130" height="26" fill="#fbbf24" rx="13"/>
  <text x="520" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#0a0e1a">차세대 성장 동력 ★</text>

  <!-- Satellite constellation icon -->
  <circle cx="600" cy="265" r="55" fill="#1a1500" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
  <!-- Earth -->
  <circle cx="600" cy="272" r="20" fill="#1d4ed8" opacity="0.8"/>
  <!-- Orbit rings -->
  <ellipse cx="600" cy="265" rx="38" ry="12" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="600" cy="265" rx="48" ry="18" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
  <!-- Satellites -->
  <circle cx="562" cy="265" r="4" fill="#fbbf24"/>
  <circle cx="638" cy="265" r="4" fill="#fbbf24"/>
  <circle cx="600" cy="247" r="4" fill="#fbbf24"/>

  <text x="600" y="345" text-anchor="middle" font-size="20" font-weight="700" fill="#fbbf24">LEO 저궤도</text>
  <text x="600" y="372" text-anchor="middle" font-size="14" fill="#f1f5f9">스타링크 수요 폭발</text>
  <text x="600" y="395" text-anchor="middle" font-size="13" fill="#94a3b8">SpaceX·OneWeb·Amazon</text>
  <text x="600" y="415" text-anchor="middle" font-size="13" fill="#fbbf24">안테나 수요 급성장 중</text>
  <text x="600" y="440" text-anchor="middle" font-size="12" fill="#64748b">다음 판을 결정할 시장</text>

  <!-- Card 3: GEO (Gray - Mature) -->
  <rect x="810" y="130" width="330" height="340" fill="#0f1520" rx="16" stroke="#64748b" stroke-width="1.5"/>
  <rect x="810" y="130" width="330" height="6" fill="#64748b" rx="3"/>

  <!-- Badge -->
  <rect x="830" y="155" width="110" height="26" fill="#334155" rx="13"/>
  <text x="885" y="173" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">성숙 시장</text>

  <!-- GEO orbit icon -->
  <circle cx="975" cy="265" r="55" fill="#0a1020" stroke="#64748b" stroke-width="1.5" opacity="0.8"/>
  <circle cx="975" cy="272" r="20" fill="#1d4ed8" opacity="0.5"/>
  <ellipse cx="975" cy="265" rx="50" ry="10" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.8"/>
  <circle cx="925" cy="265" r="5" fill="#64748b" opacity="0.8"/>
  <circle cx="1025" cy="265" r="5" fill="#64748b" opacity="0.8"/>

  <text x="975" y="345" text-anchor="middle" font-size="20" font-weight="700" fill="#94a3b8">GEO 정지궤도</text>
  <text x="975" y="372" text-anchor="middle" font-size="14" fill="#f1f5f9">기존 위성통신 시장</text>
  <text x="975" y="395" text-anchor="middle" font-size="13" fill="#94a3b8">안정적 수요</text>
  <text x="975" y="415" text-anchor="middle" font-size="13" fill="#64748b">성장 둔화 추세</text>
  <text x="975" y="440" text-anchor="middle" font-size="12" fill="#475569">LEO 전환 압력 증가</text>

  <!-- Market share / positioning visualization -->
  <rect x="60" y="510" width="1080" height="180" fill="#0d1525" rx="12" stroke="#1e293b" stroke-width="1"/>

  <!-- Positioning bar: market opportunity -->
  <text x="600" y="538" text-anchor="middle" font-size="16" font-weight="600" fill="#f1f5f9">시장 기회 크기</text>

  <!-- Bar segments -->
  <rect x="100" y="555" width="300" height="40" fill="#22c55e" rx="4" opacity="0.7"/>
  <text x="250" y="580" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">해상 VSAT — 현재 수익</text>

  <rect x="410" y="545" width="460" height="60" fill="#fbbf24" rx="4" opacity="0.7"/>
  <text x="640" y="575" text-anchor="middle" font-size="14" font-weight="700" fill="#0a0e1a">LEO 저궤도 — 폭발적 성장 예상</text>
  <text x="640" y="592" text-anchor="middle" font-size="11" fill="#0a0e1a">2025~2030 핵심 성장 구간</text>

  <rect x="880" y="558" width="220" height="34" fill="#64748b" rx="4" opacity="0.6"/>
  <text x="990" y="579" text-anchor="middle" font-size="12" fill="#f1f5f9">GEO — 유지</text>

  <!-- Bottom note -->
  <rect x="60" y="710" width="1080" height="78" fill="#0f172a" rx="10"/>
  <text x="600" y="738" text-anchor="middle" font-size="16" font-weight="600" fill="#fbbf24">LEO 전환이 인텔리안의 다음 판</text>
  <text x="600" y="762" text-anchor="middle" font-size="14" fill="#94a3b8">스타링크도 안테나가 필요하다 — 선박·항공·육상 모두 LEO 안테나 교체 사이클 시작</text>
  <text x="600" y="782" text-anchor="middle" font-size="12" fill="#475569">2026-04-18 dartlab | 인텔리안테크 189300</text>
</svg>
