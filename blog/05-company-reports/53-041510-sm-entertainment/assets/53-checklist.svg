<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <!-- 헤더 -->
  <text x="540" y="52" text-anchor="middle" font-size="15" fill="#64748b" letter-spacing="2">투자 체크포인트</text>
  <text x="540" y="88" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">SM엔터테인먼트 — 지금 무엇을 봐야 하나</text>

  <!-- 구분선 -->
  <line x1="60" y1="106" x2="1020" y2="106" stroke="#1e293b" stroke-width="1.5"/>

  <!-- 체크포인트 1 — 녹색 (안정) -->
  <rect x="60" y="120" width="960" height="88" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <!-- 체크 아이콘 -->
  <circle cx="110" cy="164" r="22" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-width="1.5"/>
  <text x="110" y="171" text-anchor="middle" font-size="20" fill="#22c55e">✓</text>
  <!-- 번호 -->
  <text x="152" y="150" font-size="12" fill="#22c55e" font-weight="600">체크 1 — 안정</text>
  <text x="152" y="174" font-size="17" font-weight="700" fill="#f1f5f9">OPM 15% 이상 유지</text>
  <text x="152" y="196" font-size="13" fill="#94a3b8">2025년 전 분기 14%+ 달성 · 구조적 안착 확인 · 원가·판관비 양쪽 통제</text>
  <!-- 상태 배지 -->
  <rect x="880" y="144" width="120" height="36" rx="8" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-width="1"/>
  <text x="940" y="167" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">구조적 안착</text>

  <!-- 체크포인트 2 — 노랑 (모니터링) -->
  <rect x="60" y="220" width="960" height="88" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="110" cy="264" r="22" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="110" y="271" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">?</text>
  <text x="152" y="250" font-size="12" fill="#fbbf24" font-weight="600">체크 2 — 모니터링</text>
  <text x="152" y="274" font-size="17" font-weight="700" fill="#f1f5f9">관계기업손익 일회성 여부</text>
  <text x="152" y="296" font-size="13" fill="#94a3b8">2025Q1 관계기업손익 2,262억 — 반복 가능한 구조인지 vs 일회성 여부 확인 필요</text>
  <rect x="880" y="244" width="120" height="36" rx="8" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
  <text x="940" y="267" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">추가 확인</text>

  <!-- 체크포인트 3 — 녹색 (안정) -->
  <rect x="60" y="320" width="960" height="88" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="110" cy="364" r="22" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-width="1.5"/>
  <text x="110" y="371" text-anchor="middle" font-size="20" fill="#22c55e">✓</text>
  <text x="152" y="350" font-size="12" fill="#22c55e" font-weight="600">체크 3 — 안정</text>
  <text x="152" y="374" font-size="17" font-weight="700" fill="#f1f5f9">HYBE와의 마진 격차 지속</text>
  <text x="152" y="396" font-size="13" fill="#94a3b8">SM 15.6% vs HYBE 1.9% — 판관비율 구조 차이(21% vs 33%)가 근본 원인 · 단기 좁히기 어려움</text>
  <rect x="880" y="344" width="120" height="36" rx="8" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-width="1"/>
  <text x="940" y="367" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">구조적 우위</text>

  <!-- 체크포인트 4 — 노랑 (모니터링) -->
  <rect x="60" y="420" width="960" height="88" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="110" cy="464" r="22" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="110" y="471" text-anchor="middle" font-size="18" font-weight="700" fill="#fbbf24">!</text>
  <text x="152" y="450" font-size="12" fill="#fbbf24" font-weight="600">체크 4 — 모니터링</text>
  <text x="152" y="474" font-size="17" font-weight="700" fill="#f1f5f9">카카오 지분 재편 리스크</text>
  <text x="152" y="496" font-size="13" fill="#94a3b8">카카오 최대주주 지위 변동 가능성 · 대주주 교체 시 경영 독립성 및 IP 전략 변화 리스크</text>
  <rect x="880" y="444" width="120" height="36" rx="8" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
  <text x="940" y="467" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">지속 주시</text>

  <!-- 체크포인트 5 — 파랑 (성장) -->
  <rect x="60" y="520" width="960" height="88" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="110" cy="564" r="22" fill="#3b82f6" fill-opacity="0.18" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="110" y="571" text-anchor="middle" font-size="18" font-weight="700" fill="#3b82f6">↑</text>
  <text x="152" y="550" font-size="12" fill="#3b82f6" font-weight="600">체크 5 — 성장</text>
  <text x="152" y="574" font-size="17" font-weight="700" fill="#f1f5f9">신규 그룹 데뷔 성과</text>
  <text x="152" y="596" font-size="13" fill="#94a3b8">에스파·라이즈 이후 차세대 IP 육성 현황 · 글로벌 팬덤 확장 속도가 OPM 지속성의 열쇠</text>
  <rect x="880" y="544" width="120" height="36" rx="8" fill="#3b82f6" fill-opacity="0.18" stroke="#3b82f6" stroke-width="1"/>
  <text x="940" y="567" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">성장 모니터</text>

  <!-- 하단 결론 -->
  <line x1="60" y1="628" x2="1020" y2="628" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="60" y="642" width="960" height="52" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="540" y="660" text-anchor="middle" font-size="12" fill="#64748b">신용등급 · 재무 현황</text>
  <text x="540" y="683" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">dCR-AA- · 순현금 3,594억 · 부채비율 48% · 2026-04-18 dartlab 실측</text>
</svg>
