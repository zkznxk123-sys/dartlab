<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 헤더 -->
  <text x="600" y="52" text-anchor="middle" font-size="15" fill="#64748b" letter-spacing="2">비용 구조 비교 · 2025년 기준</text>
  <text x="600" y="88" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">원가율은 비슷(63 vs 65%), 판관비가 다르다</text>
  <text x="600" y="116" text-anchor="middle" font-size="15" fill="#64748b">SM 21% vs HYBE 33% — 12%p 차이가 OPM 13.7%p를 만든다</text>

  <!-- 범례 -->
  <rect x="380" y="136" width="16" height="16" rx="3" fill="#3b82f6"/>
  <text x="402" y="149" font-size="13" fill="#94a3b8">원가율</text>
  <rect x="480" y="136" width="16" height="16" rx="3" fill="#f97316"/>
  <text x="502" y="149" font-size="13" fill="#94a3b8">판관비율</text>
  <rect x="580" y="136" width="16" height="16" rx="3" fill="#22c55e"/>
  <text x="602" y="149" font-size="13" fill="#94a3b8">영업이익률(OPM)</text>
  <rect x="730" y="136" width="16" height="16" rx="3" fill="#ef4444"/>
  <text x="752" y="149" font-size="13" fill="#94a3b8">OPM(손실 방향)</text>

  <!-- SM 바 (좌측) -->
  <text x="300" y="192" text-anchor="middle" font-size="20" font-weight="700" fill="#22c55e">SM엔터테인먼트 2025</text>

  <!-- SM 바 총 너비: 전체 100% = 500px, 시작 x=50 -->
  <!-- 원가 63% = 315px, 판관비 21% = 105px, OPM 15.6% = 78px (약 78px, 나머지 2px 기타) -->
  <!-- 시작 y=220, 높이=80 -->

  <!-- 원가 63% -->
  <rect x="50" y="220" width="315" height="80" rx="0" fill="#3b82f6"/>
  <text x="207" y="268" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">원가 63%</text>

  <!-- 판관비 21% -->
  <rect x="365" y="220" width="105" height="80" fill="#f97316"/>
  <text x="417" y="268" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">판관비</text>
  <text x="417" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">21%</text>

  <!-- OPM 15.6% -->
  <rect x="470" y="220" width="78" height="80" rx="0" fill="#22c55e"/>
  <text x="509" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">OPM</text>
  <text x="509" y="277" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">15.6%</text>

  <!-- 기타/세금 약 0.4% -->
  <rect x="548" y="220" width="2" height="80" fill="#475569"/>

  <!-- SM 라벨들 -->
  <text x="50" y="316" font-size="12" fill="#3b82f6">63%</text>
  <text x="365" y="316" font-size="12" fill="#f97316">21%</text>
  <text x="470" y="316" font-size="12" fill="#22c55e">15.6%</text>

  <!-- SM OPM 강조 박스 -->
  <rect x="580" y="230" width="180" height="60" rx="10" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="670" y="254" text-anchor="middle" font-size="13" fill="#64748b">영업이익률</text>
  <text x="670" y="280" text-anchor="middle" font-size="30" font-weight="800" fill="#22c55e">15.6%</text>

  <!-- 구분선 -->
  <line x1="50" y1="360" x2="1150" y2="360" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- HYBE 바 (하단) -->
  <text x="700" y="405" text-anchor="middle" font-size="20" font-weight="700" fill="#ef4444">HYBE 2025</text>

  <!-- HYBE 바 총 100% = 500px, 시작 x=50 -->
  <!-- 원가 65% = 325px, 판관비 33% = 165px, OPM 1.9% = 9.5px (≈10px) -->

  <!-- 원가 65% -->
  <rect x="50" y="420" width="325" height="80" fill="#3b82f6"/>
  <text x="212" y="468" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">원가 65%</text>

  <!-- 판관비 33% -->
  <rect x="375" y="420" width="165" height="80" fill="#f97316"/>
  <text x="457" y="462" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">판관비</text>
  <text x="457" y="484" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">33%</text>

  <!-- OPM 1.9% -->
  <rect x="540" y="420" width="10" height="80" fill="#ef4444"/>

  <!-- HYBE 라벨들 -->
  <text x="50" y="516" font-size="12" fill="#3b82f6">65%</text>
  <text x="375" y="516" font-size="12" fill="#f97316">33%</text>
  <text x="540" y="516" font-size="12" fill="#ef4444">1.9%</text>

  <!-- HYBE OPM 강조 박스 -->
  <rect x="580" y="430" width="180" height="60" rx="10" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="670" y="454" text-anchor="middle" font-size="13" fill="#64748b">영업이익률</text>
  <text x="670" y="480" text-anchor="middle" font-size="30" font-weight="800" fill="#ef4444">1.9%</text>

  <!-- 판관비 차이 강조 화살표/박스 -->
  <rect x="820" y="390" width="310" height="110" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="975" y="420" text-anchor="middle" font-size="13" fill="#64748b">판관비율 차이</text>
  <text x="975" y="454" text-anchor="middle" font-size="38" font-weight="800" fill="#fbbf24">12%p</text>
  <text x="975" y="484" text-anchor="middle" font-size="13" fill="#94a3b8">SM 21% vs HYBE 33%</text>

  <!-- OPM 차이 -->
  <rect x="820" y="514" width="310" height="60" rx="10" fill="#0f172a" stroke="#64748b" stroke-width="1"/>
  <text x="975" y="538" text-anchor="middle" font-size="13" fill="#64748b">OPM 차이</text>
  <text x="975" y="563" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">15.6% - 1.9% = <tspan fill="#22c55e">13.7%p</tspan></text>

  <!-- 하단 결론 -->
  <line x1="50" y1="598" x2="1150" y2="598" stroke="#1e293b" stroke-width="1.5"/>
  <text x="600" y="638" text-anchor="middle" font-size="17" font-weight="700" fill="#f1f5f9">원가율은 비슷(63 vs 65%), 판관비가 다르다(21% vs 33%)</text>
  <text x="600" y="664" text-anchor="middle" font-size="14" fill="#64748b">SM은 아티스트 IP 효율화, HYBE는 공격적 확장 비용이 마진을 잠식</text>
  <text x="600" y="694" text-anchor="middle" font-size="12" fill="#475569">2026-04-18 dartlab 실측</text>
</svg>
