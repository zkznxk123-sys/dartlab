<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 상단 헤더 -->
  <text x="600" y="52" text-anchor="middle" font-size="15" fill="#64748b" letter-spacing="2">K-엔터 빅3 비교</text>
  <text x="600" y="90" text-anchor="middle" font-size="28" font-weight="700" fill="#f1f5f9">인수한 쪽이 -1.82조, 인수당한 쪽이 OPM 15.6%</text>

  <!-- 구분선 -->
  <line x1="80" y1="108" x2="1120" y2="108" stroke="#1e293b" stroke-width="1.5"/>

  <!-- SM 카드 (좌) -->
  <rect x="60" y="130" width="320" height="440" rx="16" fill="#0f172a" stroke="#22c55e" stroke-width="2.5"/>
  <rect x="60" y="130" width="320" height="56" rx="16" fill="#22c55e" fill-opacity="0.18"/>
  <text x="220" y="167" text-anchor="middle" font-size="20" font-weight="700" fill="#22c55e">SM엔터테인먼트</text>
  <text x="220" y="188" text-anchor="middle" font-size="11" fill="#64748b">041510 · KOSPI</text>

  <text x="220" y="240" text-anchor="middle" font-size="13" fill="#64748b">영업이익률 (OPM)</text>
  <text x="220" y="282" text-anchor="middle" font-size="52" font-weight="800" fill="#22c55e">15.6%</text>

  <line x1="100" y1="300" x2="340" y2="300" stroke="#1e293b" stroke-width="1"/>

  <text x="140" y="335" text-anchor="middle" font-size="12" fill="#64748b">매출</text>
  <text x="140" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">1.17조</text>

  <text x="220" y="335" text-anchor="middle" font-size="12" fill="#64748b">순이익</text>
  <text x="220" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#22c55e">3,594억</text>

  <text x="300" y="335" text-anchor="middle" font-size="12" fill="#64748b">신용</text>
  <text x="300" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#22c55e">AA-</text>

  <line x1="100" y1="378" x2="340" y2="378" stroke="#1e293b" stroke-width="1"/>

  <text x="220" y="410" text-anchor="middle" font-size="13" fill="#64748b">주요 아티스트</text>
  <text x="220" y="436" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">에스파 · NCT · 라이즈</text>
  <text x="220" y="458" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">샤이니 · 보아 · 동방신기</text>

  <rect x="110" y="490" width="220" height="44" rx="10" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="220" y="508" text-anchor="middle" font-size="11" fill="#22c55e">dCR-AA- · 순현금 보유</text>
  <text x="220" y="525" text-anchor="middle" font-size="12" font-weight="600" fill="#22c55e">인수당한 쪽</text>

  <!-- HYBE 카드 (중) -->
  <rect x="440" y="130" width="320" height="440" rx="16" fill="#0f172a" stroke="#ef4444" stroke-width="2.5"/>
  <rect x="440" y="130" width="320" height="56" rx="16" fill="#ef4444" fill-opacity="0.18"/>
  <text x="600" y="167" text-anchor="middle" font-size="20" font-weight="700" fill="#ef4444">HYBE</text>
  <text x="600" y="188" text-anchor="middle" font-size="11" fill="#64748b">352820 · KOSPI</text>

  <text x="600" y="240" text-anchor="middle" font-size="13" fill="#64748b">영업이익률 (OPM)</text>
  <text x="600" y="282" text-anchor="middle" font-size="52" font-weight="800" fill="#ef4444">1.9%</text>

  <line x1="480" y1="300" x2="720" y2="300" stroke="#1e293b" stroke-width="1"/>

  <text x="520" y="335" text-anchor="middle" font-size="12" fill="#64748b">매출</text>
  <text x="520" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">2.65조</text>

  <text x="600" y="335" text-anchor="middle" font-size="12" fill="#64748b">순손실</text>
  <text x="600" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">-2,544억</text>

  <text x="680" y="335" text-anchor="middle" font-size="12" fill="#64748b">매출규모</text>
  <text x="680" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">2.3배</text>

  <line x1="480" y1="378" x2="720" y2="378" stroke="#1e293b" stroke-width="1"/>

  <text x="600" y="410" text-anchor="middle" font-size="13" fill="#64748b">주요 아티스트</text>
  <text x="600" y="436" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">BTS · 세븐틴 · TXT</text>
  <text x="600" y="458" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">뉴진스 · 르세라핌</text>

  <rect x="490" y="490" width="220" height="44" rx="10" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="508" text-anchor="middle" font-size="11" fill="#ef4444">매출 2.3배 vs SM, 수익성 역전</text>
  <text x="600" y="525" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">판관비율 33%가 발목</text>

  <!-- 카카오 카드 (우) -->
  <rect x="820" y="130" width="320" height="440" rx="16" fill="#0f172a" stroke="#fbbf24" stroke-width="2" stroke-dasharray="10 5"/>
  <rect x="820" y="130" width="320" height="56" rx="16" fill="#fbbf24" fill-opacity="0.12"/>
  <text x="980" y="167" text-anchor="middle" font-size="20" font-weight="700" fill="#fbbf24">카카오</text>
  <text x="980" y="188" text-anchor="middle" font-size="11" fill="#64748b">035720 · KOSPI · SM 최대주주</text>

  <text x="980" y="240" text-anchor="middle" font-size="13" fill="#64748b">SM 인수 대가</text>
  <text x="980" y="282" text-anchor="middle" font-size="52" font-weight="800" fill="#fbbf24">4조원</text>

  <line x1="860" y1="300" x2="1120" y2="300" stroke="#1e293b" stroke-width="1"/>

  <text x="900" y="335" text-anchor="middle" font-size="12" fill="#64748b">2023 순손실</text>
  <text x="900" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">-1.82조</text>

  <text x="980" y="335" text-anchor="middle" font-size="12" fill="#64748b">손상차손</text>
  <text x="980" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">대규모</text>

  <text x="1060" y="335" text-anchor="middle" font-size="12" fill="#64748b">OPM(2025)</text>
  <text x="1060" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">9.0%</text>

  <line x1="860" y1="378" x2="1120" y2="378" stroke="#1e293b" stroke-width="1"/>

  <text x="980" y="410" text-anchor="middle" font-size="13" fill="#64748b">인수 타임라인</text>
  <text x="980" y="436" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">2023.02 HYBE와 경쟁 입찰</text>
  <text x="980" y="458" text-anchor="middle" font-size="14" font-weight="600" fill="#f1f5f9">2023.12 영업권 손상차손 인식</text>

  <rect x="870" y="490" width="220" height="44" rx="10" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="980" y="508" text-anchor="middle" font-size="11" fill="#fbbf24">4조 쓰고 -1.82조 손실</text>
  <text x="980" y="525" text-anchor="middle" font-size="12" font-weight="600" fill="#fbbf24">인수한 쪽</text>

  <!-- 하단 결론 -->
  <line x1="80" y1="604" x2="1120" y2="604" stroke="#1e293b" stroke-width="1.5"/>
  <text x="600" y="644" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">같은 K-Pop인데 OPM이 15.6% vs 1.9% — 차이는 원가구조</text>
  <text x="600" y="672" text-anchor="middle" font-size="14" fill="#64748b">SM: 판관비율 21% · HYBE: 판관비율 33% · 매출이 커도 수익성은 SM</text>
  <text x="600" y="700" text-anchor="middle" font-size="12" fill="#475569">2026-04-18 dartlab 실측</text>
</svg>
