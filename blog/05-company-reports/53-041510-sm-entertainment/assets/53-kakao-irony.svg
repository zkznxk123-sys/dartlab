<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <!-- 헤더 -->
  <text x="600" y="52" text-anchor="middle" font-size="15" fill="#64748b" letter-spacing="2">카카오의 SM 인수 아이러니</text>
  <text x="600" y="88" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">인수한 쪽이 망하고 인수당한 쪽이 번 아이러니</text>

  <!-- 타임라인 수직선 -->
  <line x1="200" y1="145" x2="200" y2="670" stroke="#1e293b" stroke-width="3"/>

  <!-- 이벤트 1: 2023.02 카카오 SM 인수 -->
  <circle cx="200" cy="175" r="14" fill="#fbbf24" stroke="#0a0e1a" stroke-width="3"/>
  <text x="200" y="181" text-anchor="middle" font-size="14" font-weight="800" fill="#0a0e1a">1</text>

  <rect x="240" y="148" width="760" height="54" rx="12" fill="#1a1f2e" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="260" y="170" font-size="13" fill="#fbbf24" font-weight="700">2023.02</text>
  <text x="360" y="170" font-size="15" font-weight="700" fill="#f1f5f9">카카오, SM엔터테인먼트 인수 확정</text>
  <text x="260" y="192" font-size="13" fill="#94a3b8">HYBE와 경쟁 입찰 끝에 SM 최대주주 등극 · 인수 총액 약 4조원</text>

  <!-- 화살표 아래 -->
  <line x1="200" y1="202" x2="200" y2="248" stroke="#1e293b" stroke-width="2"/>

  <!-- 이벤트 2: 2023.12 카카오 손실 -->
  <circle cx="200" cy="262" r="14" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
  <text x="200" y="268" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">2</text>

  <rect x="240" y="235" width="760" height="54" rx="12" fill="#1a1f2e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="260" y="257" font-size="13" fill="#ef4444" font-weight="700">2023.12</text>
  <text x="360" y="257" font-size="15" font-weight="700" fill="#f1f5f9">카카오 연간 순손실 -1.82조 발생</text>
  <text x="260" y="279" font-size="13" fill="#94a3b8">SM 영업권 손상차손 + 금리 급등 + 계열사 구조조정 삼중고</text>

  <!-- 카카오 손실 상세 박스 -->
  <rect x="1020" y="228" width="150" height="68" rx="10" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1095" y="252" text-anchor="middle" font-size="12" fill="#64748b">카카오 순손실</text>
  <text x="1095" y="278" text-anchor="middle" font-size="22" font-weight="800" fill="#ef4444">-1.82조</text>

  <line x1="200" y1="289" x2="200" y2="335" stroke="#1e293b" stroke-width="2"/>

  <!-- 이벤트 3: 2024 OPM 비교 -->
  <circle cx="200" cy="349" r="14" fill="#64748b" stroke="#0a0e1a" stroke-width="3"/>
  <text x="200" y="355" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">3</text>

  <rect x="240" y="322" width="760" height="54" rx="12" fill="#1a1f2e" stroke="#64748b" stroke-width="1.5"/>
  <text x="260" y="344" font-size="13" fill="#94a3b8" font-weight="700">2024년</text>
  <text x="360" y="344" font-size="15" font-weight="700" fill="#f1f5f9">수익성 역전 시작</text>
  <text x="260" y="366" font-size="13" fill="#94a3b8">SM OPM 8.8% vs 카카오 OPM 5.8% — 인수당한 쪽이 앞서기 시작</text>

  <!-- OPM 비교 미니 -->
  <rect x="1020" y="318" width="150" height="62" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="1050" y="340" font-size="12" fill="#22c55e">SM 8.8%</text>
  <text x="1050" y="360" font-size="12" fill="#94a3b8">KKO 5.8%</text>
  <text x="1095" y="374" text-anchor="middle" font-size="11" fill="#64748b">OPM 2024</text>

  <line x1="200" y1="376" x2="200" y2="422" stroke="#1e293b" stroke-width="2"/>

  <!-- 이벤트 4: 2025 OPM 격차 확대 -->
  <circle cx="200" cy="436" r="14" fill="#22c55e" stroke="#0a0e1a" stroke-width="3"/>
  <text x="200" y="442" text-anchor="middle" font-size="14" font-weight="800" fill="#0a0e1a">4</text>

  <rect x="240" y="409" width="760" height="54" rx="12" fill="#1a1f2e" stroke="#22c55e" stroke-width="2"/>
  <text x="260" y="431" font-size="13" fill="#22c55e" font-weight="700">2025년</text>
  <text x="360" y="431" font-size="15" font-weight="700" fill="#f1f5f9">SM OPM 역대 최고 · 카카오와 격차 6.6%p</text>
  <text x="260" y="453" font-size="13" fill="#94a3b8">SM OPM 15.6% vs 카카오 OPM 9.0% — 에스파·라이즈 글로벌 IP 효과</text>

  <!-- OPM 비교 미니 2025 -->
  <rect x="1020" y="405" width="150" height="62" rx="10" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1050" y="428" font-size="12" font-weight="700" fill="#22c55e">SM 15.6%</text>
  <text x="1050" y="448" font-size="12" fill="#94a3b8">KKO 9.0%</text>
  <text x="1095" y="462" text-anchor="middle" font-size="11" fill="#64748b">OPM 2025</text>

  <line x1="200" y1="463" x2="200" y2="509" stroke="#1e293b" stroke-width="2"/>

  <!-- 이벤트 5: 종합 아이러니 -->
  <circle cx="200" cy="523" r="18" fill="#fbbf24" stroke="#0a0e1a" stroke-width="3"/>
  <text x="200" y="530" text-anchor="middle" font-size="18" font-weight="800" fill="#0a0e1a">!</text>

  <rect x="240" y="492" width="760" height="68" rx="12" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-width="2"/>
  <text x="260" y="516" font-size="13" fill="#fbbf24" font-weight="700">결론</text>
  <text x="360" y="516" font-size="15" font-weight="800" fill="#f1f5f9">4조 쓴 카카오보다 4조 받은 SM이 더 잘 벌고 있다</text>
  <text x="260" y="540" font-size="13" fill="#94a3b8">인수금액 4조 → 당해 손실 1.82조 · 피인수사 OPM은 역대 최고 경신</text>
  <text x="260" y="556" font-size="13" fill="#94a3b8">M&amp;A가 반드시 인수자에게 유리하지 않음을 보여주는 K-엔터 사례</text>

  <!-- 비교 요약 박스 (우측) -->
  <rect x="240" y="590" width="760" height="60" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="400" y="612" text-anchor="middle" font-size="13" fill="#64748b">카카오 OPM 9.0%</text>
  <text x="400" y="636" text-anchor="middle" font-size="22" font-weight="800" fill="#94a3b8">9.0%</text>

  <line x1="560" y1="598" x2="560" y2="642" stroke="#1e293b" stroke-width="1"/>

  <text x="620" y="612" text-anchor="start" font-size="12" fill="#64748b">→ SM OPM</text>
  <text x="720" y="636" text-anchor="middle" font-size="22" font-weight="800" fill="#22c55e">15.6%</text>

  <text x="830" y="624" text-anchor="middle" font-size="14" fill="#fbbf24" font-weight="700">6.6%p 격차</text>
  <text x="930" y="624" text-anchor="middle" font-size="12" fill="#64748b">(인수당한 쪽 우위)</text>

  <!-- 하단 결론 -->
  <line x1="80" y1="684" x2="1120" y2="684" stroke="#1e293b" stroke-width="1.5"/>
  <text x="600" y="724" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">인수한 쪽이 망하고 인수당한 쪽이 번 아이러니</text>
  <text x="600" y="752" text-anchor="middle" font-size="14" fill="#64748b">카카오 2023 순손실 -1.82조 vs SM 2025 순이익 +3,594억</text>
  <text x="600" y="784" text-anchor="middle" font-size="12" fill="#475569">2026-04-18 dartlab 실측</text>
</svg>
