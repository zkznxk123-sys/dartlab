<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 헤더 -->
  <text x="600" y="52" text-anchor="middle" font-size="15" fill="#64748b" letter-spacing="2">SM엔터테인먼트 OPM 9년 추이</text>
  <text x="600" y="88" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">코로나 OPM 1.1% → 5년 만에 15.6%</text>
  <text x="600" y="116" text-anchor="middle" font-size="15" fill="#64748b">에스파 · NCT · 라이즈가 만든 회복</text>

  <!-- 차트 영역 정의 -->
  <!-- x: 120~1080, y: 160~560 (범위 400px), 최대값 18%, 0기준선 y=560 -->
  <!-- 각 연도 x좌표: 2017=120, 2018=233, 2019=346, 2020=458, 2021=571, 2022=684, 2023=796, 2024=909, 2025=1022 -->
  <!-- OPM값: 3.0, 7.8, 6.1, 1.1, 9.6, 10.7, 11.8, 8.8, 15.6 -->
  <!-- y = 560 - (opm/18)*400 -->
  <!-- 3.0→493, 7.8→387, 6.1→425, 1.1→536, 9.6→347, 10.7→323, 11.8→298, 8.8→364, 15.6→214 -->

  <!-- 격자선 및 y축 레이블 -->
  <line x1="100" y1="560" x2="1100" y2="560" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="100" y1="560" x2="100" y2="148" stroke="#1e293b" stroke-width="1.5"/>

  <!-- 수평 격자 (0%, 5%, 10%, 15%) -->
  <line x1="100" y1="560" x2="1100" y2="560" stroke="#1e293b" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="88" y="564" text-anchor="end" font-size="12" fill="#475569">0%</text>

  <line x1="100" y1="449" x2="1100" y2="449" stroke="#1e293b" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="88" y="453" text-anchor="end" font-size="12" fill="#475569">5%</text>

  <line x1="100" y1="338" x2="1100" y2="338" stroke="#1e293b" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="88" y="342" text-anchor="end" font-size="12" fill="#475569">10%</text>

  <line x1="100" y1="227" x2="1100" y2="227" stroke="#1e293b" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text x="88" y="231" text-anchor="end" font-size="12" fill="#475569">15%</text>

  <!-- 데이터 포인트 좌표 -->
  <!-- 2017(120,493) 2018(233,387) 2019(346,425) 2020(458,536) 2021(571,347) 2022(684,323) 2023(796,298) 2024(909,364) 2025(1022,214) -->

  <!-- 채움 영역 -->
  <defs>
    <linearGradient id="opmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <polygon points="120,493 233,387 346,425 458,536 571,347 684,323 796,298 909,364 1022,214 1022,560 120,560" fill="url(#opmGrad)"/>

  <!-- 라인 -->
  <polyline points="120,493 233,387 346,425 458,536 571,347 684,323 796,298 909,364 1022,214" fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 데이터 포인트 원 -->
  <circle cx="120" cy="493" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="233" cy="387" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="346" cy="425" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="458" cy="536" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="571" cy="347" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="684" cy="323" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="796" cy="298" r="6" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="909" cy="364" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="1022" cy="214" r="10" fill="#22c55e" stroke="#0a0e1a" stroke-width="3"/>

  <!-- OPM 값 레이블 -->
  <text x="120" y="480" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">3.0%</text>
  <text x="233" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">7.8%</text>
  <text x="346" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">6.1%</text>
  <text x="458" y="522" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">1.1%</text>
  <text x="571" y="334" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">9.6%</text>
  <text x="684" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">10.7%</text>
  <text x="796" y="285" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">11.8%</text>
  <text x="909" y="351" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">8.8%</text>
  <text x="1022" y="198" text-anchor="middle" font-size="14" font-weight="800" fill="#22c55e">15.6%</text>

  <!-- x축 연도 레이블 -->
  <text x="120" y="584" text-anchor="middle" font-size="13" fill="#64748b">2017</text>
  <text x="233" y="584" text-anchor="middle" font-size="13" fill="#64748b">2018</text>
  <text x="346" y="584" text-anchor="middle" font-size="13" fill="#64748b">2019</text>
  <text x="458" y="584" text-anchor="middle" font-size="13" fill="#64748b">2020</text>
  <text x="571" y="584" text-anchor="middle" font-size="13" fill="#64748b">2021</text>
  <text x="684" y="584" text-anchor="middle" font-size="13" fill="#64748b">2022</text>
  <text x="796" y="584" text-anchor="middle" font-size="13" fill="#64748b">2023</text>
  <text x="909" y="584" text-anchor="middle" font-size="13" fill="#64748b">2024</text>
  <text x="1022" y="584" text-anchor="middle" font-size="13" fill="#64748b">2025</text>

  <!-- 주석: 2020 코로나 바닥 -->
  <line x1="458" y1="536" x2="390" y2="610" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="300" y="608" width="180" height="28" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="390" y="627" text-anchor="middle" font-size="12" fill="#ef4444">코로나 바닥 · 1.1%</text>

  <!-- 주석: 2023 카카오 인수 -->
  <line x1="796" y1="298" x2="840" y2="236" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="780" y="216" width="160" height="28" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="860" y="235" text-anchor="middle" font-size="12" fill="#fbbf24">카카오 인수 · 11.8%</text>

  <!-- 주석: 2025 역대 최고 -->
  <rect x="900" y="152" width="210" height="48" rx="10" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1005" y="173" text-anchor="middle" font-size="12" fill="#22c55e">역대 최고</text>
  <text x="1005" y="191" text-anchor="middle" font-size="18" font-weight="800" fill="#22c55e">15.6%</text>

  <!-- 하단 결론 -->
  <line x1="80" y1="628" x2="1120" y2="628" stroke="#1e293b" stroke-width="1.5"/>
  <text x="600" y="666" text-anchor="middle" font-size="17" font-weight="700" fill="#f1f5f9">코로나 OPM 1.1% → 5년 만에 15.6% — 에스파 · NCT · 라이즈가 만든 회복</text>
  <text x="600" y="694" text-anchor="middle" font-size="13" fill="#64748b">2017~2025 연간 OPM 추이 · 2026-04-18 dartlab 실측</text>
</svg>
