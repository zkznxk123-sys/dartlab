<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="barOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="barYellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="url(#bg)"/>

  <!-- 태그 -->
  <rect x="48" y="36" width="180" height="28" rx="6" fill="#1e293b"/>
  <text x="138" y="55" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">자산경량화 분석</text>

  <!-- 제목 -->
  <text x="600" y="100" font-family="-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#f1f5f9" text-anchor="middle">자산경량화 — 공장 없는 군수업체</text>
  <text x="600" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#64748b" text-anchor="middle">설비투자(매출 대비) · 현금 보유 비교</text>

  <line x1="48" y1="158" x2="1152" y2="158" stroke="#1e293b" stroke-width="1"/>

  <!-- 4개 카드 수평 배치 (y=170부터) -->
  <!-- 카드 1: 삼성바이오 -->
  <rect x="48" y="174" width="258" height="420" rx="14" fill="#0f172a" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="48" y="174" width="258" height="5" rx="3" fill="#f97316"/>

  <text x="177" y="218" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b" text-anchor="middle">삼성바이오로직스</text>
  <text x="177" y="246" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="middle">제약·바이오 (DART)</text>

  <line x1="72" y1="260" x2="282" y2="260" stroke="#1e293b" stroke-width="1"/>

  <!-- 설비투자 막대 -->
  <text x="177" y="288" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">설비투자</text>
  <text x="177" y="318" font-family="-apple-system,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#f97316" text-anchor="middle">$2.3B</text>

  <!-- 비율 시각화 막대 -->
  <rect x="72" y="336" width="210" height="20" rx="6" fill="#1e293b"/>
  <rect x="72" y="336" width="210" height="20" rx="6" fill="url(#barOrange)"/>
  <text x="177" y="378" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f97316" text-anchor="middle" font-weight="700">매출 대비 50%</text>
  <text x="177" y="398" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">대규모 생산설비 투자 필수</text>

  <line x1="72" y1="416" x2="282" y2="416" stroke="#1e293b" stroke-width="1"/>

  <text x="177" y="444" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">자산 특성</text>
  <text x="177" y="466" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">공장 · 장비 · 설비가 핵심</text>
  <text x="177" y="486" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">전형적인 자본집약 산업</text>

  <rect x="68" y="504" width="218" height="64" rx="8" fill="#1a0f0a"/>
  <text x="177" y="530" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#f97316" text-anchor="middle" font-weight="600">고정자산 의존도 높음</text>
  <text x="177" y="550" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">감가상각 · 유지비용 크다</text>

  <!-- 카드 2: 엔비디아 -->
  <rect x="322" y="174" width="258" height="420" rx="14" fill="#0f172a" stroke="#eab308" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="322" y="174" width="258" height="5" rx="3" fill="#eab308"/>

  <text x="451" y="218" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b" text-anchor="middle">엔비디아</text>
  <text x="451" y="246" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="middle">반도체·AI (EDGAR)</text>

  <line x1="346" y1="260" x2="556" y2="260" stroke="#1e293b" stroke-width="1"/>

  <text x="451" y="288" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">설비투자</text>
  <text x="451" y="318" font-family="-apple-system,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#eab308" text-anchor="middle">$3.2B</text>

  <rect x="346" y="336" width="210" height="20" rx="6" fill="#1e293b"/>
  <rect x="346" y="336" width="5" height="20" rx="3" fill="url(#barYellow)"/>
  <text x="451" y="378" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#eab308" text-anchor="middle" font-weight="700">매출 대비 2.4%</text>
  <text x="451" y="398" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">팹리스 — 생산은 TSMC에 외주</text>

  <line x1="346" y1="416" x2="556" y2="416" stroke="#1e293b" stroke-width="1"/>

  <text x="451" y="444" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">자산 특성</text>
  <text x="451" y="466" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">설계 IP · 소프트웨어가 핵심</text>
  <text x="451" y="486" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">경량화된 자본 구조</text>

  <rect x="342" y="504" width="218" height="64" rx="8" fill="#1a1a0a"/>
  <text x="451" y="530" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#eab308" text-anchor="middle" font-weight="600">팹리스 모델의 효율성</text>
  <text x="451" y="550" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">설비투자 절대액은 크지만 비율 낮음</text>

  <!-- 카드 3: 팔란티어 (강조) -->
  <rect x="596" y="174" width="258" height="420" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2.5" stroke-opacity="0.8"/>
  <rect x="596" y="174" width="258" height="5" rx="3" fill="#22c55e"/>

  <!-- 강조 배지 -->
  <rect x="688" y="162" width="82" height="22" rx="11" fill="#22c55e"/>
  <text x="729" y="177" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#0a0e1a" text-anchor="middle" font-weight="700">분석 대상</text>

  <text x="725" y="218" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f1f5f9" text-anchor="middle" font-weight="600">팔란티어</text>
  <text x="725" y="246" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="middle">AI·데이터 플랫폼 (EDGAR)</text>

  <line x1="620" y1="260" x2="830" y2="260" stroke="#22c55e" stroke-width="1" opacity="0.3"/>

  <text x="725" y="288" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">설비투자</text>
  <text x="725" y="318" font-family="-apple-system,'Segoe UI',sans-serif" font-size="34" font-weight="800" fill="#22c55e" text-anchor="middle">$34M</text>

  <rect x="620" y="336" width="210" height="20" rx="6" fill="#1e293b"/>
  <rect x="620" y="336" width="1.5" height="20" rx="1" fill="url(#barGreen)"/>
  <text x="725" y="378" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="700">매출 대비 0.7%</text>
  <text x="725" y="398" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">소프트웨어 플랫폼 — 공장 불필요</text>

  <line x1="620" y1="416" x2="830" y2="416" stroke="#22c55e" stroke-width="1" opacity="0.3"/>

  <text x="725" y="444" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">자산 특성</text>
  <text x="725" y="466" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">현금 + 알고리즘이 핵심</text>
  <text x="725" y="486" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">거의 모든 자산이 유동성 자산</text>

  <rect x="616" y="504" width="218" height="64" rx="8" fill="#0a1a0f"/>
  <text x="725" y="530" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">극단적 자산경량화</text>
  <text x="725" y="550" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">전통적 설비투자 분석 무의미</text>

  <!-- 현금 카드 (4번째) -->
  <rect x="870" y="174" width="282" height="420" rx="14" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="870" y="174" width="282" height="5" rx="3" fill="#3b82f6"/>

  <text x="1011" y="218" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b" text-anchor="middle">팔란티어 현금 현황</text>
  <text x="1011" y="246" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="middle">2025년 말 기준</text>

  <line x1="894" y1="260" x2="1128" y2="260" stroke="#1e293b" stroke-width="1"/>

  <text x="1011" y="290" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">현금 + 단기투자</text>
  <text x="1011" y="328" font-family="-apple-system,'Segoe UI',sans-serif" font-size="38" font-weight="800" fill="#3b82f6" text-anchor="middle">$7.17B</text>

  <!-- 도넛 차트 시뮬레이션 -->
  <circle cx="1011" cy="430" r="68" fill="none" stroke="#1e293b" stroke-width="28"/>
  <!-- 81% = 292도 호 -->
  <circle cx="1011" cy="430" r="68" fill="none" stroke="#3b82f6" stroke-width="28"
    stroke-dasharray="347 427" stroke-dashoffset="107" stroke-linecap="round"/>
  <!-- 19% = 나머지 -->
  <circle cx="1011" cy="430" r="68" fill="none" stroke="#334155" stroke-width="28"
    stroke-dasharray="81 427" stroke-dashoffset="-240" stroke-linecap="round"/>

  <text x="1011" y="424" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="#3b82f6" text-anchor="middle">81%</text>
  <text x="1011" y="444" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">총자산 대비</text>

  <rect x="890" y="510" width="242" height="58" rx="8" fill="#0a1020"/>
  <text x="1011" y="534" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">총자산의 81%가 현금성 자산</text>
  <text x="1011" y="554" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">차입금 0 · 재무 리스크 사실상 없음</text>

  <!-- 하단 핵심 메시지 -->
  <rect x="48" y="626" width="1104" height="156" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.5"/>

  <text x="600" y="660" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">결론</text>
  <text x="600" y="690" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" fill="#f1f5f9" text-anchor="middle" font-weight="600">자산이 거의 다 현금 — 전통적 자산 분석이 무의미한 회사</text>
  <text x="600" y="716" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">설비투자 $34M은 매출($4.6B)의 0.7% — 삼성바이오의 50%와 70배 차이</text>
  <text x="600" y="740" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b" text-anchor="middle">팔란티어의 핵심 자산은 알고리즘과 플랫폼 · P/B 같은 전통 지표로 가치 평가 불가</text>
  <text x="600" y="762" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#475569" text-anchor="middle">2026-04-18 dartlab 실측</text>
</svg>
