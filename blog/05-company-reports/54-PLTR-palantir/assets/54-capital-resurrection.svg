<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="40%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- 태그 -->
  <rect x="48" y="36" width="210" height="28" rx="6" fill="#1e293b"/>
  <text x="153" y="55" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">자본 구조 변천 2021→2025</text>

  <!-- 제목 -->
  <text x="600" y="100" font-family="-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#f1f5f9" text-anchor="middle">자본잠식 → +$7.5B — 4년의 부활</text>
  <text x="600" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#64748b" text-anchor="middle">총자본(자기자본) 추이 · 주식보상비용이 자본잉여금으로 전환되는 구조</text>

  <!-- 타임라인 배경 트랙 -->
  <line x1="100" y1="380" x2="1100" y2="380" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>

  <!-- 그라디언트 연결선 -->
  <line x1="190" y1="380" x2="1010" y2="380" stroke="url(#lineGrad)" stroke-width="3" stroke-dasharray="8,4" opacity="0.5"/>

  <!-- 연도별 노드 위치: 190, 390, 590, 790, 1010 -->

  <!-- 2021: -$1.75B (빨강, 아래) -->
  <line x1="190" y1="380" x2="190" y2="520" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="190" cy="380" r="14" fill="#ef4444" stroke="#0a0e1a" stroke-width="3"/>
  <text x="190" y="385" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="700">✕</text>

  <rect x="100" y="524" width="180" height="88" rx="10" fill="#1a0808" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="190" y="548" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2021</text>
  <text x="190" y="574" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="800" fill="#ef4444" text-anchor="middle">-$1.75B</text>
  <text x="190" y="596" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">자본잠식 상태</text>
  <text x="190" y="612" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#475569" text-anchor="middle">주식보상비용 $778M</text>

  <!-- 2022: +$2.64B (노랑, 위) -->
  <line x1="390" y1="380" x2="390" y2="240" stroke="#eab308" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="390" cy="380" r="14" fill="#eab308" stroke="#0a0e1a" stroke-width="3"/>
  <text x="390" y="385" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="700">→</text>

  <rect x="300" y="152" width="180" height="88" rx="10" fill="#1a1500" stroke="#eab308" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="390" y="176" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2022</text>
  <text x="390" y="202" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="800" fill="#eab308" text-anchor="middle">+$2.64B</text>
  <text x="390" y="224" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">IPO 이후 자본잉여금 급증</text>
  <text x="390" y="240" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#475569" text-anchor="middle">주식보상비용 $565M</text>

  <!-- 2023: +$1.52B (연두, 위) -->
  <line x1="590" y1="380" x2="590" y2="276" stroke="#84cc16" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="590" cy="380" r="14" fill="#84cc16" stroke="#0a0e1a" stroke-width="3"/>
  <text x="590" y="385" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="700">↑</text>

  <rect x="500" y="188" width="180" height="88" rx="10" fill="#111a08" stroke="#84cc16" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="590" y="212" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2023</text>
  <text x="590" y="238" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="800" fill="#84cc16" text-anchor="middle">+$1.52B</text>
  <text x="590" y="260" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">흑자 전환 첫 해</text>
  <text x="590" y="276" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#475569" text-anchor="middle">주식보상비용 $476M</text>

  <!-- 2024: +$2.29B (녹색, 위) -->
  <line x1="790" y1="380" x2="790" y2="260" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="790" cy="380" r="14" fill="#22c55e" stroke="#0a0e1a" stroke-width="3"/>
  <text x="790" y="385" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="700">↑</text>

  <rect x="700" y="172" width="180" height="88" rx="10" fill="#0a1a0e" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="790" y="196" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2024</text>
  <text x="790" y="222" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="800" fill="#22c55e" text-anchor="middle">+$2.29B</text>
  <text x="790" y="244" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">매출 가속 + 이익 확대</text>
  <text x="790" y="260" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#475569" text-anchor="middle">주식보상비용 $692M</text>

  <!-- 2025: +$7.49B (진녹색, 위 크게) -->
  <line x1="1010" y1="380" x2="1010" y2="170" stroke="#22c55e" stroke-width="3"/>
  <circle cx="1010" cy="380" r="18" fill="#22c55e" stroke="#0a0e1a" stroke-width="3"/>
  <text x="1010" y="387" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="800">★</text>

  <rect x="910" y="80" width="200" height="90" rx="10" fill="#0a1a0e" stroke="#22c55e" stroke-width="2.5"/>
  <text x="1010" y="106" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2025</text>
  <text x="1010" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="30" font-weight="800" fill="#22c55e" text-anchor="middle">+$7.49B</text>
  <text x="1010" y="158" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">주식보상비용 $684M</text>
  <text x="1010" y="170" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#475569" text-anchor="middle">순이익 $1,625M 급증</text>

  <!-- 스윙 표시 -->
  <rect x="440" y="368" width="240" height="24" rx="12" fill="#fbbf24" opacity="0.12"/>
  <text x="560" y="384" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">+$9.24B 반전</text>

  <!-- 하단 핵심 주석 박스 -->
  <rect x="60" y="630" width="1080" height="68" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="600" y="658" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="600">구조 해설</text>
  <text x="600" y="680" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">누적 순이익 $1.4B로는 $9.2B 반전을 설명할 수 없다 — 주식보상비용이 자본잉여금으로 쌓인 효과</text>
</svg>
