<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="720" fill="url(#bg)"/>

  <!-- 태그 -->
  <rect x="40" y="32" width="160" height="28" rx="6" fill="#1e293b"/>
  <text x="120" y="51" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">투자 체크포인트</text>

  <!-- 제목 -->
  <text x="540" y="94" font-family="-apple-system,'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#f1f5f9" text-anchor="middle">팔란티어 투자 전 확인할 5가지</text>
  <text x="540" y="126" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b" text-anchor="middle">현황 + 모니터링 포인트</text>

  <line x1="40" y1="144" x2="1040" y2="144" stroke="#1e293b" stroke-width="1"/>

  <!-- 체크 1: 녹색 (통과) -->
  <rect x="40" y="156" width="1000" height="88" rx="10" fill="#0a1a0e" stroke="#22c55e" stroke-width="1.5"/>

  <!-- 상태 아이콘 -->
  <circle cx="90" cy="200" r="24" fill="#22c55e"/>
  <text x="90" y="208" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">✓</text>

  <!-- 번호 -->
  <text x="136" y="192" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#22c55e" font-weight="600">POINT 1</text>
  <text x="136" y="214" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" fill="#f1f5f9" font-weight="600">상업 매출 비중 50% 돌파 — 정부 의존도 탈피 확인</text>
  <text x="136" y="234" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">현재 정부 55% · 상업 45% 구조 → 상업 매출 성장률 &gt; 정부 매출 성장률 지속 여부</text>

  <rect x="900" y="172" width="120" height="36" rx="8" fill="#052e16"/>
  <text x="960" y="195" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="700">확인 중</text>

  <!-- 체크 2: 노랑 (주의) -->
  <rect x="40" y="256" width="1000" height="88" rx="10" fill="#1a1500" stroke="#eab308" stroke-width="1.5"/>

  <circle cx="90" cy="300" r="24" fill="#eab308"/>
  <text x="90" y="308" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">!</text>

  <text x="136" y="292" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#eab308" font-weight="600">POINT 2</text>
  <text x="136" y="314" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" fill="#f1f5f9" font-weight="600">주식보상비용/매출 비율 10% 이하 — 희석 속도 감소</text>
  <text x="136" y="334" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">현재 15% 수준 · 비율이 낮아지는 추세인지 분기별 확인 필요</text>

  <rect x="900" y="272" width="120" height="36" rx="8" fill="#2d2200"/>
  <text x="960" y="295" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#eab308" text-anchor="middle" font-weight="700">모니터링</text>

  <!-- 체크 3: 노랑 (주의) -->
  <rect x="40" y="356" width="1000" height="88" rx="10" fill="#1a1500" stroke="#eab308" stroke-width="1.5"/>

  <circle cx="90" cy="400" r="24" fill="#eab308"/>
  <text x="90" y="408" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">!</text>

  <text x="136" y="392" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#eab308" font-weight="600">POINT 3</text>
  <text x="136" y="414" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" fill="#f1f5f9" font-weight="600">분기 영업이익률 4분기 편중 해소 — 안정적 수익성 확인</text>
  <text x="136" y="434" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">2024년 4분기 영업이익률 1.3% 재현 여부 · 연간 분기별 균등 분배 추세 확인</text>

  <rect x="900" y="372" width="120" height="36" rx="8" fill="#2d2200"/>
  <text x="960" y="395" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#eab308" text-anchor="middle" font-weight="700">모니터링</text>

  <!-- 체크 4: 파랑 (중립) -->
  <rect x="40" y="456" width="1000" height="88" rx="10" fill="#0a1020" stroke="#3b82f6" stroke-width="1.5"/>

  <circle cx="90" cy="500" r="24" fill="#3b82f6"/>
  <text x="90" y="508" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">?</text>

  <text x="136" y="492" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#3b82f6" font-weight="600">POINT 4</text>
  <text x="136" y="514" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" fill="#f1f5f9" font-weight="600">대형 인수합병 또는 주주환원 — 현금 $7.2B 용도 결정</text>
  <text x="136" y="534" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">현금 $7.2B를 어떻게 쓸 것인지 미결 · 전략적 방향성이 밸류에이션을 바꿀 수 있음</text>

  <rect x="900" y="472" width="120" height="36" rx="8" fill="#0a1628"/>
  <text x="960" y="495" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="700">미결정</text>

  <!-- 체크 5: 빨강 (위험) -->
  <rect x="40" y="556" width="1000" height="88" rx="10" fill="#1a0808" stroke="#ef4444" stroke-width="1.5"/>

  <circle cx="90" cy="600" r="24" fill="#ef4444"/>
  <text x="90" y="608" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">⚑</text>

  <text x="136" y="592" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#ef4444" font-weight="600">POINT 5</text>
  <text x="136" y="614" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" fill="#f1f5f9" font-weight="600">매출채권 성장 정상화 — 회계 신호 해소 확인</text>
  <text x="136" y="634" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">Beneish M-Score 임계값 초과 해소 여부 · 매출채권 증가율이 매출 증가율 이내인지 확인</text>

  <rect x="900" y="572" width="120" height="36" rx="8" fill="#2d0a0a"/>
  <text x="960" y="595" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="700">주의 요망</text>

  <!-- 하단 footer -->
  <line x1="40" y1="660" x2="1040" y2="660" stroke="#1e293b" stroke-width="1"/>

  <text x="40" y="686" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#22c55e">dCR-AA+</text>
  <text x="120" y="686" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#475569">·</text>
  <text x="135" y="686" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">현금 $7.2B</text>
  <text x="240" y="686" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#475569">·</text>
  <text x="255" y="686" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">차입금 0</text>

  <text x="1040" y="686" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#475569" text-anchor="end">2026-04-18 dartlab 실측</text>

  <text x="540" y="706" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#334155" text-anchor="middle">본 자료는 투자 권유가 아닙니다. 투자 결정은 본인 책임입니다.</text>
</svg>
