<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="cardRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d0a0a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- 상단 태그 -->
  <rect x="48" y="40" width="120" height="28" rx="6" fill="#1e293b"/>
  <text x="108" y="59" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">PALANTIR · PLTR</text>

  <!-- 메인 제목 -->
  <text x="600" y="108" font-family="-apple-system,'Segoe UI',sans-serif" font-size="34" font-weight="700" fill="#f1f5f9" text-anchor="middle">영업이익률 31%인데 이익의 절반이 현금이 아닌 이유</text>
  <text x="600" y="148" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" fill="#64748b" text-anchor="middle">손익계산서가 말하지 않는 팔란티어의 진짜 구조</text>

  <!-- 구분선 -->
  <line x1="48" y1="172" x2="1152" y2="172" stroke="#1e293b" stroke-width="1"/>

  <!-- 카드 1: 영업이익 (녹색) -->
  <rect x="60" y="196" width="340" height="360" rx="16" fill="url(#cardGreen)" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="60" y="196" width="340" height="6" rx="3" fill="#22c55e"/>

  <text x="240" y="260" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b" text-anchor="middle">영업이익</text>
  <text x="240" y="320" font-family="-apple-system,'Segoe UI',sans-serif" font-size="52" font-weight="800" fill="#22c55e" text-anchor="middle">$1.4B</text>
  <text x="240" y="360" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b" text-anchor="middle">2025년 연간</text>

  <line x1="100" y1="388" x2="360" y2="388" stroke="#1e293b" stroke-width="1"/>

  <text x="240" y="420" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">영업이익률</text>
  <text x="240" y="460" font-family="-apple-system,'Segoe UI',sans-serif" font-size="38" font-weight="700" fill="#22c55e" text-anchor="middle">31.6%</text>
  <text x="240" y="490" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">매출총이익률 82% 기반</text>
  <text x="240" y="530" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">▲ 2024년 10.8%에서 대폭 개선</text>

  <!-- 카드 2: 주식보상비용 (빨강) -->
  <rect x="430" y="196" width="340" height="360" rx="16" fill="url(#cardRed)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="430" y="196" width="340" height="6" rx="3" fill="#ef4444"/>

  <text x="600" y="260" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b" text-anchor="middle">주식보상비용</text>
  <text x="600" y="320" font-family="-apple-system,'Segoe UI',sans-serif" font-size="52" font-weight="800" fill="#ef4444" text-anchor="middle">$684M</text>
  <text x="600" y="360" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b" text-anchor="middle">2025년 연간</text>

  <line x1="470" y1="388" x2="730" y2="388" stroke="#1e293b" stroke-width="1"/>

  <text x="600" y="420" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">영업이익 대비 비중</text>
  <text x="600" y="460" font-family="-apple-system,'Segoe UI',sans-serif" font-size="38" font-weight="700" fill="#ef4444" text-anchor="middle">48%</text>
  <text x="600" y="490" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">현금 지출 없는 비용</text>
  <text x="600" y="530" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#f87171" text-anchor="middle">이익의 절반이 주식으로 지급됨</text>

  <!-- 카드 3: 잉여현금흐름 (파랑) -->
  <rect x="800" y="196" width="340" height="360" rx="16" fill="url(#cardBlue)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="800" y="196" width="340" height="6" rx="3" fill="#3b82f6"/>

  <text x="970" y="260" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b" text-anchor="middle">잉여현금흐름</text>
  <text x="970" y="320" font-family="-apple-system,'Segoe UI',sans-serif" font-size="52" font-weight="800" fill="#3b82f6" text-anchor="middle">$2.1B</text>
  <text x="970" y="360" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b" text-anchor="middle">2025년 연간</text>

  <line x1="840" y1="388" x2="1100" y2="388" stroke="#1e293b" stroke-width="1"/>

  <text x="970" y="420" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">잉여현금흐름률</text>
  <text x="970" y="460" font-family="-apple-system,'Segoe UI',sans-serif" font-size="38" font-weight="700" fill="#3b82f6" text-anchor="middle">46%</text>
  <text x="970" y="490" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">매출 대비 잉여현금흐름</text>
  <text x="970" y="530" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">영업이익보다 잉여현금흐름이 더 큼</text>

  <!-- 화살표 연결 -->
  <path d="M 400 376 L 430 376" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <path d="M 770 376 L 800 376" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 하단 핵심 메시지 박스 -->
  <rect x="60" y="586" width="1080" height="90" rx="12" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="600" y="622" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">핵심 열쇠</text>
  <text x="600" y="648" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#f1f5f9" text-anchor="middle">주식보상비용이 손익 · 자본 · 현금흐름 전부를 설명하는 열쇠</text>
  <text x="600" y="668" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">현금 안 나가는 비용 → 순이익 낮추고 · 자본잉여금 쌓고 · 잉여현금흐름은 오히려 크게</text>
</svg>
