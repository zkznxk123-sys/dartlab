<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="barPos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="barNeg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- 태그 -->
  <rect x="48" y="36" width="180" height="28" rx="6" fill="#1e293b"/>
  <text x="138" y="55" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">영업이익률 5년 스윙</text>

  <!-- 제목 -->
  <text x="600" y="100" font-family="-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#f1f5f9" text-anchor="middle">영업이익률 5년간 58%p 스윙</text>
  <text x="600" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#64748b" text-anchor="middle">-26.7% → +31.6% · 매출총이익률은 78→82%로 안정적</text>

  <!-- 범례 -->
  <rect x="330" y="154" width="14" height="14" rx="3" fill="#22c55e"/>
  <text x="350" y="165" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">영업이익률 (양)</text>
  <rect x="490" y="154" width="14" height="14" rx="3" fill="#ef4444"/>
  <text x="510" y="165" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">영업이익률 (음)</text>
  <line x1="660" y1="161" x2="686" y2="161" stroke="#fbbf24" stroke-width="2.5"/>
  <circle cx="673" cy="161" r="4" fill="#fbbf24"/>
  <text x="694" y="165" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">매출총이익률</text>

  <!-- 차트 영역 설정 -->
  <!-- Y축: -30% ~ +35%, 총 65% 범위, 높이 = 460px → 1% = 7.08px -->
  <!-- 제로선 y = 183 + (35/65)*460 = 183 + 247 = 430 -->
  <!-- 상단 y=183, 하단 y=643 -->

  <!-- Y축 라벨 -->
  <text x="80" y="188" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">+35%</text>
  <text x="80" y="258" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">+25%</text>
  <text x="80" y="328" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">+15%</text>
  <text x="80" y="398" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">+5%</text>
  <text x="80" y="430" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">0%</text>
  <text x="80" y="480" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">-10%</text>
  <text x="80" y="540" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">-20%</text>
  <text x="80" y="600" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">-30%</text>

  <!-- 단위 -->
  <text x="86" y="178" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">(%)</text>

  <!-- 격자선 -->
  <line x1="90" y1="258" x2="1140" y2="258" stroke="#1e293b" stroke-width="1"/>
  <line x1="90" y1="328" x2="1140" y2="328" stroke="#1e293b" stroke-width="1"/>
  <line x1="90" y1="398" x2="1140" y2="398" stroke="#1e293b" stroke-width="1"/>
  <line x1="90" y1="430" x2="1140" y2="430" stroke="#334155" stroke-width="2"/>
  <line x1="90" y1="480" x2="1140" y2="480" stroke="#1e293b" stroke-width="1"/>
  <line x1="90" y1="540" x2="1140" y2="540" stroke="#1e293b" stroke-width="1"/>

  <!-- X축 위치: 2021=200, 2022=400, 2023=600, 2024=800, 2025=1000 -->
  <!-- 막대 폭 80px 중앙 정렬 -->

  <!-- 2021: -26.7% → 높이 189px, 위쪽(음수)이므로 y=430부터 아래로 -->
  <rect x="160" y="430" width="80" height="189" rx="6" fill="url(#barNeg)"/>
  <text x="200" y="428" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle">-26.7%</text>

  <!-- 2022: -8.5% → 높이 60px -->
  <rect x="360" y="430" width="80" height="60" rx="6" fill="url(#barNeg)"/>
  <text x="400" y="428" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle">-8.5%</text>

  <!-- 2023: +5.4% → 높이 38px -->
  <rect x="560" y="392" width="80" height="38" rx="6" fill="url(#barPos)"/>
  <text x="600" y="386" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">+5.4%</text>

  <!-- 2024: +10.8% → 높이 76px -->
  <rect x="760" y="354" width="80" height="76" rx="6" fill="url(#barPos)"/>
  <text x="800" y="348" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">+10.8%</text>

  <!-- 2025: +31.6% → 높이 224px -->
  <rect x="960" y="206" width="80" height="224" rx="6" fill="url(#barPos)"/>
  <text x="1000" y="200" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="800" fill="#22c55e" text-anchor="middle">+31.6%</text>

  <!-- X축 연도 -->
  <text x="200" y="650" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2021</text>
  <text x="400" y="650" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2022</text>
  <text x="600" y="650" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2023</text>
  <text x="800" y="650" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2024</text>
  <text x="1000" y="650" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="700">2025</text>

  <!-- 매출총이익률 라인 (노랑): 78→80→81→81→82 -->
  <!-- y = 430 - (val/65)*460 -->
  <!-- 78% → y = 430 - (78/65)*460 = 430 - 551 = -121 (범위 밖, 상단 위) -->
  <!-- 별도 우측 Y축으로 표시, 범위 70~90% -->
  <!-- 우측 Y축 범위 70~90% = 20% 범위, 동일 460px 높이 -->
  <!-- 70%: y=643, 80%: y=413, 90%: y=183 -->
  <!-- 78%: y=643-(8/20)*460 = 643-184 = 459 -->
  <!-- 80%: y=643-(10/20)*460 = 643-230 = 413 -->
  <!-- 81%: y=643-(11/20)*460 = 643-253 = 390 -->
  <!-- 82%: y=643-(12/20)*460 = 643-276 = 367 -->

  <!-- 우측 Y축 라벨 -->
  <text x="1152" y="368" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24" text-anchor="start">82%</text>
  <text x="1152" y="391" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24" text-anchor="start">81%</text>
  <text x="1152" y="414" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24" text-anchor="start">80%</text>
  <text x="1152" y="460" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24" text-anchor="start">78%</text>
  <text x="1152" y="188" font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#fbbf24" text-anchor="start">매출총이익률</text>

  <polyline points="200,459 400,413 600,390 800,390 1000,367"
    fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="6,3"/>
  <circle cx="200" cy="459" r="5" fill="#fbbf24"/>
  <circle cx="400" cy="413" r="5" fill="#fbbf24"/>
  <circle cx="600" cy="390" r="5" fill="#fbbf24"/>
  <circle cx="800" cy="390" r="5" fill="#fbbf24"/>
  <circle cx="1000" cy="367" r="5" fill="#fbbf24"/>

  <!-- Q4 편중 주석 박스 -->
  <rect x="620" y="280" width="400" height="70" rx="8" fill="#1e1a0a" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.5"/>
  <text x="820" y="306" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="600">주의: Q4 편중</text>
  <text x="820" y="326" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">2024년 4분기 영업이익률 = 단 1.3%</text>
  <text x="820" y="344" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">주식보상비용 $282M이 4분기에 집중 (연간의 41%)</text>
</svg>
