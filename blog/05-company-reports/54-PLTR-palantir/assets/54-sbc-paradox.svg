<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- 상단 태그 -->
  <rect x="48" y="36" width="160" height="28" rx="6" fill="#1e293b"/>
  <text x="128" y="55" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">주식보상비용 패러독스</text>

  <!-- 제목 -->
  <text x="600" y="100" font-family="-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#f1f5f9" text-anchor="middle">비용인데 현금이 나가지 않는다</text>
  <text x="600" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#64748b" text-anchor="middle">2021 — 2025 순이익 vs 잉여현금흐름 vs 주식보상비용</text>

  <!-- 범례 -->
  <rect x="340" y="156" width="16" height="4" rx="2" fill="#ef4444"/>
  <text x="362" y="163" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">순이익</text>
  <rect x="460" y="156" width="16" height="4" rx="2" fill="#22c55e"/>
  <text x="482" y="163" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">잉여현금흐름</text>
  <rect x="620" y="152" width="16" height="12" rx="2" fill="#3b82f6" opacity="0.5"/>
  <text x="642" y="163" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8">주식보상비용 (막대)</text>

  <!-- 차트 영역 -->
  <!-- Y축 라벨 (단위: $M) -->
  <text x="72" y="198" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">2,200</text>
  <text x="72" y="258" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">1,500</text>
  <text x="72" y="338" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">700</text>
  <text x="72" y="408" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">0</text>
  <text x="72" y="468" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">-400</text>
  <text x="72" y="528" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569" text-anchor="end">-700</text>

  <!-- 단위 표기 -->
  <text x="78" y="178" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">($M)</text>

  <!-- 격자선 -->
  <line x1="82" y1="198" x2="1140" y2="198" stroke="#1e293b" stroke-width="1"/>
  <line x1="82" y1="258" x2="1140" y2="258" stroke="#1e293b" stroke-width="1"/>
  <line x1="82" y1="338" x2="1140" y2="338" stroke="#1e293b" stroke-width="1"/>
  <line x1="82" y1="408" x2="1140" y2="408" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- 제로선 강조 -->
  <line x1="82" y1="408" x2="1140" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="82" y1="468" x2="1140" y2="468" stroke="#1e293b" stroke-width="1"/>
  <line x1="82" y1="528" x2="1140" y2="528" stroke="#1e293b" stroke-width="1"/>

  <!-- 연도별 X 위치: 2021=190, 2022=380, 2023=570, 2024=760, 2025=950 -->
  <!-- 스케일: 0 = 408px, 100M = 9.4px 기준 (700 = -66px, 2100 = +198px 기준) -->
  <!-- 총 범위: -700 ~ 2200 = 2900M, 높이 330px → 1M = 0.1138px -->

  <!-- 주식보상비용 막대 (파랑, 반투명) -->
  <!-- 2021: 778M → 높이 88.5px, y = 408-88.5 = 319.5 -->
  <rect x="152" y="320" width="76" height="88" rx="4" fill="#3b82f6" opacity="0.35"/>
  <!-- 2022: 565M → 높이 64px -->
  <rect x="342" y="343" width="76" height="65" rx="4" fill="#3b82f6" opacity="0.35"/>
  <!-- 2023: 476M → 높이 54px -->
  <rect x="532" y="354" width="76" height="54" rx="4" fill="#3b82f6" opacity="0.35"/>
  <!-- 2024: 692M → 높이 79px -->
  <rect x="722" y="329" width="76" height="79" rx="4" fill="#3b82f6" opacity="0.35"/>
  <!-- 2025: 684M → 높이 78px -->
  <rect x="912" y="330" width="76" height="78" rx="4" fill="#3b82f6" opacity="0.35"/>

  <!-- 막대 위 주식보상비용 수치 -->
  <text x="190" y="314" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">$778M</text>
  <text x="380" y="337" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">$565M</text>
  <text x="570" y="348" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">$476M</text>
  <text x="760" y="323" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">$692M</text>
  <text x="950" y="324" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">$684M</text>

  <!-- 잉여현금흐름 라인 (녹색) -->
  <!-- 2021: 321M → y = 408 - 36.5 = 371.5 -->
  <!-- 2022: 184M → y = 408 - 20.9 = 387.1 -->
  <!-- 2023: 697M → y = 408 - 79.3 = 328.7 -->
  <!-- 2024: 1141M → y = 408 - 129.8 = 278.2 -->
  <!-- 2025: 2101M → y = 408 - 239 = 169 -->
  <polyline points="190,372 380,387 570,329 760,278 950,169"
    fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 잉여현금흐름 점 -->
  <circle cx="190" cy="372" r="6" fill="#22c55e"/>
  <circle cx="380" cy="387" r="6" fill="#22c55e"/>
  <circle cx="570" cy="329" r="6" fill="#22c55e"/>
  <circle cx="760" cy="278" r="6" fill="#22c55e"/>
  <circle cx="950" cy="169" r="6" fill="#22c55e"/>
  <!-- 잉여현금흐름 수치 -->
  <text x="190" y="362" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">$321M</text>
  <text x="380" y="377" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">$184M</text>
  <text x="570" y="319" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">$697M</text>
  <text x="760" y="268" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">$1,141M</text>
  <text x="950" y="159" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="700">$2,101M</text>

  <!-- 순이익 라인 (빨강) -->
  <!-- 2021: -520M → y = 408 + 59.2 = 467.2 -->
  <!-- 2022: -374M → y = 408 + 42.6 = 450.6 -->
  <!-- 2023: +210M → y = 408 - 23.9 = 384.1 -->
  <!-- 2024: +462M → y = 408 - 52.6 = 355.4 -->
  <!-- 2025: +1625M → y = 408 - 185 = 223 -->
  <polyline points="190,467 380,451 570,384 760,355 950,223"
    fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="8,4"/>
  <!-- 순이익 점 -->
  <circle cx="190" cy="467" r="6" fill="#ef4444"/>
  <circle cx="380" cy="451" r="6" fill="#ef4444"/>
  <circle cx="570" cy="384" r="6" fill="#ef4444"/>
  <circle cx="760" cy="355" r="6" fill="#ef4444"/>
  <circle cx="950" cy="223" r="6" fill="#ef4444"/>
  <!-- 순이익 수치 -->
  <text x="190" y="482" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">-$520M</text>
  <text x="380" y="466" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">-$374M</text>
  <text x="570" y="400" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">+$210M</text>
  <text x="760" y="370" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">+$462M</text>
  <text x="950" y="238" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="700">+$1,625M</text>

  <!-- X축 연도 -->
  <text x="190" y="554" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2021</text>
  <text x="380" y="554" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2022</text>
  <text x="570" y="554" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2023</text>
  <text x="760" y="554" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="600">2024</text>
  <text x="950" y="554" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="700">2025</text>

  <!-- 하단 핵심 주석 -->
  <rect x="60" y="574" width="1080" height="108" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="604" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">패러독스 해설</text>
  <text x="600" y="628" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#f1f5f9" text-anchor="middle">순이익이 적자여도 잉여현금흐름은 항상 플러스였다</text>
  <text x="600" y="652" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">주식보상비용은 손익계산서에서 비용으로 처리되지만 실제 현금은 나가지 않는다</text>
  <text x="600" y="672" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">그래서 잉여현금흐름 계산 시 다시 더해진다 → 이것이 순이익 &lt; 잉여현금흐름의 이유</text>
</svg>
