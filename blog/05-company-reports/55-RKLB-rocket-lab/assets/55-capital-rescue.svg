<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">자본 변동 4년 타임라인</text>
  <text x="600" y="82" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">주식 발행으로 $2B를 수혈 — 영업으로 번 돈이 아님</text>

  <!-- 중앙 타임라인 축 -->
  <line x1="160" y1="360" x2="1040" y2="360" stroke="#1e293b" stroke-width="2"/>

  <!-- 연도 포인트 -->
  <!-- 2022: x=220, 2023: x=480, 2024: x=740, 2025: x=1000 -->
  <circle cx="220" cy="360" r="10" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="480" cy="360" r="10" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="740" cy="360" r="10" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="1000" cy="360" r="10" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>

  <!-- 연도 레이블 -->
  <text x="220" y="390" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#94a3b8">2022</text>
  <text x="480" y="390" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#94a3b8">2023</text>
  <text x="740" y="390" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#94a3b8">2024</text>
  <text x="1000" y="390" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#94a3b8">2025</text>

  <!-- 2022 카드 (위) -->
  <rect x="100" y="130" width="240" height="180" rx="12" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="220" y="164" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">총자본</text>
  <text x="220" y="196" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="34" font-weight="700" fill="#ef4444">-$119M</text>
  <text x="220" y="226" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5">자본잠식</text>
  <line x1="120" y1="244" x2="340" y2="244" stroke="#7f1d1d" stroke-width="1"/>
  <text x="220" y="264" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">주식 발행: 해당연도 누적</text>
  <text x="220" y="284" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">SPAC 상장 직후</text>
  <line x1="220" y1="310" x2="220" y2="350" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 2023 카드 (위) -->
  <rect x="360" y="100" width="240" height="210" rx="12" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="134" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">총자본</text>
  <text x="480" y="168" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="34" font-weight="700" fill="#ef4444">-$167M</text>
  <text x="480" y="198" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5">자본잠식 심화</text>
  <line x1="380" y1="216" x2="580" y2="216" stroke="#7f1d1d" stroke-width="1"/>
  <text x="480" y="236" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">전년 대비 -$48M 악화</text>
  <text x="480" y="258" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">영업손실 누적</text>
  <text x="480" y="280" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">-$178M (2023 영업손실)</text>
  <line x1="480" y1="310" x2="480" y2="350" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 2024 카드 (아래) -->
  <rect x="620" y="410" width="240" height="210" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="740" y="444" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">총자본</text>
  <text x="740" y="480" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="34" font-weight="700" fill="#22c55e">+$698M</text>
  <text x="740" y="510" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac">자본 전환 성공</text>
  <line x1="640" y1="528" x2="840" y2="528" stroke="#166534" stroke-width="1"/>
  <text x="740" y="548" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">주식 발행액</text>
  <text x="740" y="572" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#22c55e">$1,071M</text>
  <text x="740" y="594" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#86efac">대규모 유상증자</text>
  <line x1="740" y1="370" x2="740" y2="410" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 2025 카드 (아래) -->
  <rect x="880" y="410" width="240" height="210" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1000" y="444" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">총자본</text>
  <text x="1000" y="480" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="34" font-weight="700" fill="#22c55e">+$1,722M</text>
  <text x="1000" y="510" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac">자본 대폭 확충</text>
  <line x1="900" y1="528" x2="1100" y2="528" stroke="#166534" stroke-width="1"/>
  <text x="1000" y="548" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">추가 주식 발행</text>
  <text x="1000" y="572" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#22c55e">$2B+ 누적</text>
  <text x="1000" y="594" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#86efac">현금 $1B 확보</text>
  <line x1="1000" y1="370" x2="1000" y2="410" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 방향 화살표 (전환점) -->
  <polygon points="710,358 730,350 730,366" fill="#fbbf24"/>
  <text x="605" y="348" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#fbbf24">전환점</text>

  <!-- 주석 -->
  <rect x="180" y="648" width="840" height="50" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="670" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">4년 동안 주식 발행으로 $2B를 수혈</text>
  <text x="600" y="690" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#fbbf24">영업으로 번 돈이 아님 — 희석 리스크 진행 중</text>
</svg>
