<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <rect width="1080" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="540" y="52" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">투자 체크포인트 5가지</text>
  <text x="540" y="82" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">Rocket Lab — 2026년까지 확인해야 할 신호</text>

  <!-- 체크포인트 아이템들 -->
  <!-- 아이템 높이 78, 시작 y=110 -->

  <!-- 1. Neutron 첫 발사 — 빨강 -->
  <rect x="60" y="110" width="960" height="72" rx="10" fill="#1a0505" stroke="#ef4444" stroke-width="1.5"/>
  <!-- 상태 뱃지 -->
  <rect x="900" y="122" width="100" height="28" rx="14" fill="#ef4444"/>
  <text x="950" y="141" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">미달성</text>
  <!-- 번호 -->
  <circle cx="100" cy="146" r="18" fill="#ef4444"/>
  <text x="100" y="152" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">1</text>
  <!-- 내용 -->
  <text x="136" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">Neutron 첫 발사 성공</text>
  <text x="136" y="160" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">2026년 목표 — 지연 여부 실시간 확인 필요. 지연 = 현금 소진 가속</text>

  <!-- 2. 분기 영업손실 — 노랑 -->
  <rect x="60" y="198" width="960" height="72" rx="10" fill="#1a1200" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="900" y="210" width="100" height="28" rx="14" fill="#fbbf24"/>
  <text x="950" y="229" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0a0e1a">경과 중</text>
  <circle cx="100" cy="234" r="18" fill="#fbbf24"/>
  <text x="100" y="240" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">2</text>
  <text x="136" y="224" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">분기 영업손실 -$30M 이하</text>
  <text x="136" y="248" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">현재 분기 약 -$51M 고정 — 비용 레버리지 아직 미작동</text>

  <!-- 3. 매출총이익률 40% -->
  <rect x="60" y="286" width="960" height="72" rx="10" fill="#1a1200" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="900" y="298" width="100" height="28" rx="14" fill="#fbbf24"/>
  <text x="950" y="317" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0a0e1a">경과 중</text>
  <circle cx="100" cy="322" r="18" fill="#fbbf24"/>
  <text x="100" y="328" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">3</text>
  <text x="136" y="312" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">매출총이익률 40% 돌파</text>
  <text x="136" y="336" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">현재 34% — 규모의 경제 시작점. 발사 횟수 증가 시 달성 가능</text>

  <!-- 4. 잉여현금흐름 -->
  <rect x="60" y="374" width="960" height="72" rx="10" fill="#1a0505" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="900" y="386" width="100" height="28" rx="14" fill="#ef4444"/>
  <text x="950" y="405" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">미달성</text>
  <circle cx="100" cy="410" r="18" fill="#ef4444"/>
  <text x="100" y="416" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">4</text>
  <text x="136" y="400" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">잉여현금흐름 -$200M 이하</text>
  <text x="136" y="424" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">현재 -$322M — 현금 소진 속도. 현금 $1B 기준 약 3년치 런웨이</text>

  <!-- 5. 주식보상비용/매출 -->
  <rect x="60" y="462" width="960" height="72" rx="10" fill="#1a1200" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="900" y="474" width="100" height="28" rx="14" fill="#fbbf24"/>
  <text x="950" y="493" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#0a0e1a">경과 중</text>
  <circle cx="100" cy="498" r="18" fill="#fbbf24"/>
  <text x="100" y="504" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">5</text>
  <text x="136" y="488" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">주식보상비용/매출 10% 이하</text>
  <text x="136" y="512" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">현재 12% — 희석 속도 과다. 매출 성장이 희석 속도를 앞질러야 함</text>

  <!-- 범례 -->
  <rect x="60" y="556" width="440" height="36" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="82" y="568" width="14" height="14" rx="7" fill="#ef4444"/>
  <text x="104" y="580" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">미달성 (즉시 모니터링)</text>
  <rect x="260" y="568" width="14" height="14" rx="7" fill="#fbbf24"/>
  <text x="282" y="580" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#94a3b8">경과 중 (개선 추적)</text>

  <!-- 하단 메타 -->
  <rect x="60" y="610" width="960" height="80" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="540" y="636" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">dCR-BBB · 현금 $1B · 영업손실 -$229M</text>
  <text x="540" y="658" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">2026-04-18 dartlab 실측</text>
  <text x="540" y="680" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#334155">Rocket Lab USA, Inc. (RKLB) — 10-K 기준 실측값</text>
</svg>
