<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">2025년 매출 $602M — 비용 구조 폭포 차트</text>
  <text x="600" y="82" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">매출총이익이 연구개발비에 잠식되는 구조</text>

  <!-- 폭포 차트: 중앙 정렬, 각 블록 너비 140, 간격 -->
  <!-- x 중심 600, 총 7단계 블록, 단계당 간격 -->
  <!-- 스케일: 600M = 460px, 1M = 0.767px -->
  <!-- y 기준: 바닥 680 -->

  <!-- 단계 정의:
    1. 매출 $602M (기준, 양수) → 높이 462px, y=218, x=90
    2. 매출원가 -$395M (음수 감소) → 높이 303px, y=377 (위에서 내려옴), x=270
    3. 매출총이익 $207M (결과) → 높이 159px, y=521, x=450
    4. 판관비 -$164M (감소) → 높이 126px, y=521, x=630
    5. 영업이익(연구개발비 전) $43M → 높이 33px, y=647, x=810
    6. 연구개발비 -$272M → 높이 209px, y=471, x=990  (손실 초래)
    7. 영업손실 -$229M → 높이 176px, y=504 (음수 구간 표현)
  -->

  <!-- 블록 너비 -->
  <!-- 1: 매출 -->
  <rect x="90" y="218" width="140" height="462" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="160" y="207" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac">매출</text>
  <text x="160" y="195" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#22c55e">$602M</text>
  <text x="160" y="450" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#0a0e1a" font-weight="600">100%</text>

  <!-- 연결선 -->
  <line x1="230" y1="218" x2="270" y2="218" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="230" y1="680" x2="270" y2="680" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 2: 매출원가 -$395M (감소 블록) -->
  <rect x="270" y="377" width="140" height="303" rx="4" fill="#ef4444" opacity="0.75"/>
  <text x="340" y="365" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5">매출원가</text>
  <text x="340" y="353" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#ef4444">-$395M</text>
  <text x="340" y="535" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#f1f5f9">66%</text>

  <!-- 연결선 -->
  <line x1="410" y1="377" x2="450" y2="377" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="410" y1="680" x2="450" y2="680" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 3: 매출총이익 $207M (결과) -->
  <rect x="450" y="521" width="140" height="159" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="520" y="509" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac">매출총이익</text>
  <text x="520" y="497" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#22c55e">$207M</text>
  <text x="520" y="607" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#0a0e1a" font-weight="600">34%</text>

  <!-- 연결선 -->
  <line x1="590" y1="521" x2="630" y2="521" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="590" y1="680" x2="630" y2="680" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 4: 판관비 -$164M -->
  <rect x="630" y="554" width="140" height="126" rx="4" fill="#ef4444" opacity="0.65"/>
  <text x="700" y="542" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5">판관비</text>
  <text x="700" y="530" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#ef4444">-$164M</text>
  <text x="700" y="622" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#f1f5f9">27%</text>

  <!-- 연결선 -->
  <line x1="770" y1="554" x2="810" y2="554" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="770" y1="680" x2="810" y2="680" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 5: 연구개발비 전 $43M -->
  <rect x="810" y="647" width="140" height="33" rx="4" fill="#fbbf24" opacity="0.85"/>
  <text x="880" y="635" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#fbbf24">연구개발비 전</text>
  <text x="880" y="622" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#fbbf24">+$43M</text>

  <!-- 연결선 -->
  <line x1="950" y1="647" x2="990" y2="647" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="950" y1="680" x2="990" y2="680" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 6: 연구개발비 -$272M (647 기준으로 위로) -->
  <rect x="990" y="438" width="140" height="209" rx="4" fill="#ef4444" opacity="0.9"/>
  <text x="1060" y="426" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5">연구개발비</text>
  <text x="1060" y="414" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#ef4444">-$272M</text>
  <text x="1060" y="548" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#f1f5f9">45%</text>

  <!-- 영업손실 결과 레이블 (마지막 지점) -->
  <text x="1060" y="720" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#fca5a5">→ 영업손실</text>
  <text x="1060" y="745" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#ef4444">-$229M (-38%)</text>

  <!-- 바닥선 -->
  <line x1="80" y1="680" x2="1150" y2="680" stroke="#1e293b" stroke-width="1.5"/>

  <!-- 핵심 주석 -->
  <rect x="150" y="756" width="900" height="46" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="779" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">매출총이익 $207M 전부를</text>
  <text x="600" y="797" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#fbbf24">연구개발비 $272M이 삼킨다</text>
</svg>
