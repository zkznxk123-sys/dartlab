<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">로켓 비교: Electron vs Neutron vs Falcon 9</text>
  <text x="600" y="82" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">현재 매출원 vs 미래 베팅 vs 시장 지배자</text>

  <!-- 3열 카드 -->

  <!-- 카드 1: Electron -->
  <rect x="40" y="106" width="340" height="500" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <!-- 헤더 -->
  <rect x="40" y="106" width="340" height="64" rx="14" fill="#166534"/>
  <rect x="40" y="152" width="340" height="18" fill="#166534"/>
  <text x="210" y="132" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Electron</text>
  <text x="210" y="152" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#86efac">현재 매출원 (운영 중)</text>

  <!-- 로켓 시각 (소형) -->
  <rect x="185" y="178" width="50" height="110" rx="10" fill="#334155"/>
  <polygon points="185,178 235,178 210,148" fill="#475569"/>
  <rect x="195" y="278" width="10" height="20" rx="2" fill="#64748b"/>
  <rect x="220" y="278" width="10" height="20" rx="2" fill="#64748b"/>
  <!-- 화염 -->
  <ellipse cx="200" cy="302" rx="6" ry="10" fill="#fbbf24" opacity="0.8"/>
  <ellipse cx="225" cy="302" rx="6" ry="10" fill="#fbbf24" opacity="0.8"/>

  <line x1="60" y1="318" x2="360" y2="318" stroke="#1e293b" stroke-width="1"/>

  <text x="80" y="346" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">발사 단가</text>
  <text x="80" y="370" font-family="-apple-system,'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#22c55e">$7.5M</text>

  <text x="80" y="400" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">탑재 중량</text>
  <text x="80" y="424" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">최대 300kg</text>

  <text x="80" y="454" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">누적 발사</text>
  <text x="80" y="478" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">68회+</text>

  <text x="80" y="508" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">분류</text>
  <text x="80" y="530" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#86efac">소형 발사체</text>

  <rect x="60" y="550" width="300" height="42" rx="8" fill="#052e16"/>
  <text x="210" y="568" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#86efac">발사할수록 적자</text>
  <text x="210" y="585" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#86efac">매출원가율 &gt; 매출단가</text>

  <!-- 카드 2: Neutron -->
  <rect x="430" y="106" width="340" height="500" rx="14" fill="#0f172a" stroke="#fbbf24" stroke-width="2.5"/>
  <rect x="430" y="106" width="340" height="64" rx="14" fill="#92400e"/>
  <rect x="430" y="152" width="340" height="18" fill="#92400e"/>
  <text x="600" y="132" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Neutron</text>
  <text x="600" y="152" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#fde68a">개발 중 — 2026 첫 발사 목표</text>

  <!-- 로켓 시각 (대형) -->
  <rect x="565" y="158" width="70" height="150" rx="12" fill="#334155"/>
  <polygon points="565,158 635,158 600,118" fill="#475569"/>
  <rect x="572" y="300" width="14" height="26" rx="2" fill="#64748b"/>
  <rect x="614" y="300" width="14" height="26" rx="2" fill="#64748b"/>
  <ellipse cx="579" cy="329" rx="8" ry="13" fill="#fbbf24" opacity="0.9"/>
  <ellipse cx="621" cy="329" rx="8" ry="13" fill="#fbbf24" opacity="0.9"/>

  <line x1="450" y1="342" x2="750" y2="342" stroke="#1e293b" stroke-width="1"/>

  <text x="470" y="370" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">목표 발사 단가</text>
  <text x="470" y="394" font-family="-apple-system,'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#fbbf24">$55M</text>

  <text x="470" y="424" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">탑재 중량</text>
  <text x="470" y="448" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">최대 13톤</text>

  <text x="470" y="478" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">발사 실적</text>
  <text x="470" y="502" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#fbbf24">0회 (미발사)</text>

  <text x="470" y="530" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">분류</text>
  <text x="470" y="552" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#fde68a">중형 발사체 (재사용)</text>

  <rect x="450" y="564" width="300" height="28" rx="8" fill="#451a03"/>
  <text x="600" y="582" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#fde68a">발사 성공 = 손익분기점 전환 열쇠</text>

  <!-- 카드 3: Falcon 9 -->
  <rect x="820" y="106" width="340" height="500" rx="14" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <rect x="820" y="106" width="340" height="64" rx="14" fill="#1e293b"/>
  <rect x="820" y="152" width="340" height="18" fill="#1e293b"/>
  <text x="990" y="132" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#94a3b8">Falcon 9</text>
  <text x="990" y="152" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">SpaceX — 시장 지배자</text>

  <!-- 로켓 시각 (최대형) -->
  <rect x="950" y="148" width="80" height="170" rx="12" fill="#334155"/>
  <polygon points="950,148 1030,148 990,102" fill="#475569"/>
  <rect x="956" y="310" width="16" height="30" rx="2" fill="#64748b"/>
  <rect x="1008" y="310" width="16" height="30" rx="2" fill="#64748b"/>
  <ellipse cx="964" cy="344" rx="9" ry="15" fill="#94a3b8" opacity="0.7"/>
  <ellipse cx="1016" cy="344" rx="9" ry="15" fill="#94a3b8" opacity="0.7"/>

  <line x1="840" y1="358" x2="1140" y2="358" stroke="#1e293b" stroke-width="1"/>

  <text x="860" y="386" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">발사 단가</text>
  <text x="860" y="410" font-family="-apple-system,'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#94a3b8">$67M</text>

  <text x="860" y="440" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">탑재 중량</text>
  <text x="860" y="464" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">최대 22톤</text>

  <text x="860" y="494" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">누적 발사</text>
  <text x="860" y="518" font-family="-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#94a3b8">400회+</text>

  <text x="860" y="546" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#64748b">분류</text>
  <text x="860" y="568" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8">중대형 재사용 발사체</text>

  <rect x="840" y="582" width="300" height="28" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="990" y="600" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#64748b">Neutron이 도전해야 할 기준선</text>

  <!-- 하단 주석 -->
  <rect x="100" y="638" width="1000" height="58" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="663" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#64748b">Electron은 팔릴수록 적자,</text>
  <text x="600" y="685" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#fbbf24">Neutron이 날아올라야 돈이 된다</text>
</svg>
