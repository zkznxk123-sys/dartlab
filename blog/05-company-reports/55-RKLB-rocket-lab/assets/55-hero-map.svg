<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="58" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">매출 2.8배 + 매출총이익률 9%→34% 개선</text>
  <text x="600" y="96" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="28" font-weight="700" fill="#ef4444">vs 영업손실 70% 확대</text>
  <text x="600" y="132" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#64748b">Rocket Lab USA (RKLB) — 2022~2025 핵심 지표</text>

  <!-- 좌측 카드 (녹색: 성장 신호) -->
  <rect x="60" y="158" width="480" height="300" rx="16" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <rect x="60" y="158" width="480" height="52" rx="16" fill="#15803d"/>
  <rect x="60" y="190" width="480" height="20" fill="#15803d"/>
  <text x="300" y="191" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">성장 신호</text>

  <text x="100" y="250" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">매출</text>
  <text x="100" y="278" font-family="-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#22c55e">$211M → $602M</text>
  <text x="100" y="302" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac">4년간 2.85배 성장</text>

  <line x1="100" y1="322" x2="500" y2="322" stroke="#166534" stroke-width="1"/>

  <text x="100" y="352" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">매출총이익률</text>
  <text x="100" y="380" font-family="-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#22c55e">9% → 34%</text>
  <text x="100" y="404" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#86efac">+25%p 구조적 개선</text>

  <!-- 우측 카드 (빨강: 모순 신호) -->
  <rect x="660" y="158" width="480" height="300" rx="16" fill="#2d0a0a" stroke="#ef4444" stroke-width="2"/>
  <rect x="660" y="158" width="480" height="52" rx="16" fill="#991b1b"/>
  <rect x="660" y="190" width="480" height="20" fill="#991b1b"/>
  <text x="900" y="191" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">모순 신호</text>

  <text x="700" y="250" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">영업손실</text>
  <text x="700" y="278" font-family="-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#ef4444">-$135M → -$229M</text>
  <text x="700" y="302" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5">70% 확대 (손실 심화)</text>

  <line x1="700" y1="322" x2="1100" y2="322" stroke="#7f1d1d" stroke-width="1"/>

  <text x="700" y="352" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">잉여현금흐름</text>
  <text x="700" y="380" font-family="-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#ef4444">-$322M</text>
  <text x="700" y="404" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#fca5a5">2025년 현금 소진액</text>

  <!-- 가운데 설명 박스 -->
  <rect x="160" y="488" width="880" height="76" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="520" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" fill="#64748b">개선된 마진을 다 삼킨 것은</text>
  <text x="600" y="547" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#fbbf24">R&amp;D + 주식보상비용 + Neutron 개발비</text>

  <!-- 하단 질문 -->
  <rect x="200" y="594" width="800" height="60" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="600" y="624" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#94a3b8">현금 $1B가</text>
  <text x="600" y="645" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#fbbf24">Neutron 첫 발사까지 버텨줄 수 있는가</text>

  <!-- 화살표 연결 -->
  <line x1="540" y1="308" x2="660" y2="308" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="655,303 665,308 655,313" fill="#475569"/>
  <text x="600" y="305" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#475569">vs</text>
</svg>
