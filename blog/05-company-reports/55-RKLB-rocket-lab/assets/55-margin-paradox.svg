<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">마진 역설: 매출총이익률은 오르고, 영업손실은 커진다</text>
  <text x="600" y="82" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#64748b">2022~2025년 — 규모의 비경제</text>

  <!-- 차트 영역 -->
  <!-- 축 정의: x: 2022~2025, 4구간 -->
  <!-- 좌축: 매출총이익률(%) 0~40, 우축: 영업손실($M) 0~-250 -->

  <!-- 배경 그리드 -->
  <line x1="160" y1="120" x2="160" y2="580" stroke="#1e293b" stroke-width="1"/>
  <line x1="160" y1="580" x2="1040" y2="580" stroke="#1e293b" stroke-width="1"/>

  <!-- 수평 그리드 -->
  <line x1="160" y1="580" x2="1040" y2="580" stroke="#1e293b" stroke-width="1"/>
  <line x1="160" y1="466" x2="1040" y2="466" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="352" x2="1040" y2="352" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="238" x2="1040" y2="238" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="124" x2="1040" y2="124" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- 좌축 레이블 (매출총이익률 %) -->
  <text x="140" y="584" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e">0%</text>
  <text x="140" y="470" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e">10%</text>
  <text x="140" y="356" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e">20%</text>
  <text x="140" y="242" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e">30%</text>
  <text x="140" y="128" text-anchor="end" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#22c55e">40%</text>
  <text x="70" y="356" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#22c55e" transform="rotate(-90 70 356)">매출총이익률 (%)</text>

  <!-- 우축 레이블 (영업손실 $M) -->
  <text x="1060" y="584" text-anchor="start" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444">0</text>
  <text x="1060" y="470" text-anchor="start" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444">-62M</text>
  <text x="1060" y="356" text-anchor="start" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444">-124M</text>
  <text x="1060" y="242" text-anchor="start" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444">-186M</text>
  <text x="1060" y="128" text-anchor="start" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#ef4444">-248M</text>
  <text x="1130" y="356" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#ef4444" transform="rotate(90 1130 356)">영업손실 ($M)</text>

  <!-- X축 레이블 -->
  <!-- 4개 연도: 2022=x280, 2023=x520, 2024=x760, 2025=x1000 -->
  <text x="280" y="610" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#94a3b8">2022</text>
  <text x="520" y="610" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#94a3b8">2023</text>
  <text x="760" y="610" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#94a3b8">2024</text>
  <text x="1000" y="610" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" fill="#94a3b8">2025</text>

  <!-- 영업손실 막대 (빨강): 스케일 580 기준, 250=$M → 456px 범위
       -135M → y=580-(135/248*456)=580-248=332, h=248
       -178M → h=328
       -190M → h=350
       -229M → h=421 -->
  <!-- 막대 너비 80, 중앙 정렬 -->
  <rect x="240" y="332" width="80" height="248" rx="4" fill="#ef4444" opacity="0.7"/>
  <rect x="480" y="253" width="80" height="327" rx="4" fill="#ef4444" opacity="0.7"/>
  <rect x="720" y="231" width="80" height="349" rx="4" fill="#ef4444" opacity="0.7"/>
  <rect x="960" y="159" width="80" height="421" rx="4" fill="#ef4444" opacity="0.7"/>

  <!-- 막대 위 수치 -->
  <text x="280" y="325" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#fca5a5">-$135M</text>
  <text x="520" y="246" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#fca5a5">-$178M</text>
  <text x="760" y="224" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#fca5a5">-$190M</text>
  <text x="1000" y="152" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#fca5a5">-$229M</text>

  <!-- 매출총이익률 라인차트 (녹색)
       스케일: 40% → 456px 범위, 1% = 11.4px
       9% → y=580-(9/40*456)=580-102.6=477
       21% → y=580-239.4=341
       26.6% → y=580-303.2=277
       34.4% → y=580-392.2=188 -->
  <polyline points="280,477 520,341 760,277 1000,188" fill="none" stroke="#22c55e" stroke-width="3" stroke-linejoin="round"/>

  <!-- 포인트 -->
  <circle cx="280" cy="477" r="7" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="520" cy="341" r="7" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="760" cy="277" r="7" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
  <circle cx="1000" cy="188" r="7" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>

  <!-- 라인 수치 레이블 -->
  <text x="280" y="468" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#86efac">9.0%</text>
  <text x="520" y="332" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#86efac">21.0%</text>
  <text x="760" y="268" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#86efac">26.6%</text>
  <text x="1000" y="179" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#86efac">34.4%</text>

  <!-- 범례 -->
  <rect x="350" y="640" width="16" height="16" rx="3" fill="#22c55e"/>
  <text x="374" y="653" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f1f5f9">매출총이익률 (라인)</text>
  <rect x="620" y="640" width="16" height="16" rx="3" fill="#ef4444" opacity="0.8"/>
  <text x="644" y="653" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#f1f5f9">영업손실 절대액 (막대)</text>

  <!-- 주석 -->
  <rect x="200" y="670" width="800" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="693" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" fill="#fbbf24">마진이 올라가는데 적자는 더 커진다 — 규모의 비경제</text>
</svg>
