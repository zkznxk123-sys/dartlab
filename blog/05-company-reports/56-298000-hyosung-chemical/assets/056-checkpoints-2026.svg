<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>2026년 효성화학에서 볼 3가지 체크포인트</title>
  <desc>매출원가율, 단기차입금, 그룹 지원 — 2026년 분기공시에서 확인할 신호</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026년 분기공시에서 볼 3가지 신호</text>
  <text x="60" y="108" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">효성화학이 진짜 턴어라운드인지, 일회성 반등인지 가릴 지표</text>

  <!-- Signal 1 -->
  <g transform="translate(60, 165)">
    <rect x="0" y="0" width="960" height="150" fill="#1e293b" stroke="#6366F1" stroke-width="2" rx="12"/>
    <circle cx="50" cy="75" r="32" fill="#6366F1"/>
    <text x="50" y="84" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#f8fafc" text-anchor="middle">1</text>
    <text x="100" y="42" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">매출원가율의 분기 추이</text>
    <text x="100" y="72" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">2025Q2에 97.9% 플러스 진입 → Q3·Q4 재악화. 2026Q1·Q2 2분기 연속 개선 여부.</text>

    <!-- Signal zone -->
    <rect x="100" y="90" width="280" height="42" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="240" y="117" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="middle">+1%p 개선 × 2분기 → 회복 신호</text>

    <rect x="400" y="90" width="280" height="42" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="540" y="117" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="middle">-5% 유지 → 과잉 지속</text>
  </g>

  <!-- Signal 2 -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="960" height="150" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <circle cx="50" cy="75" r="32" fill="#fbbf24"/>
    <text x="50" y="84" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#0a0e1a" text-anchor="middle">2</text>
    <text x="100" y="42" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">단기차입금 규모의 지속 감소</text>
    <text x="100" y="72" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">2025년 말 유동차입금 1.02조. 매 분기 롤오버 관리가 유동성 위험의 1차 지표.</text>

    <rect x="100" y="90" width="280" height="42" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="240" y="117" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="middle">2026Q2 8,500억 미만 → 정상화</text>

    <rect x="400" y="90" width="280" height="42" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="540" y="117" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="middle">1조 유지 → 추가 매각/증자 임박</text>
  </g>

  <!-- Signal 3 -->
  <g transform="translate(60, 515)">
    <rect x="0" y="0" width="960" height="150" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="12"/>
    <circle cx="50" cy="75" r="32" fill="#ef4444"/>
    <text x="50" y="84" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#f8fafc" text-anchor="middle">3</text>
    <text x="100" y="42" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">효성그룹 추가 지원 여부</text>
    <text x="100" y="72" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">2026년 3월 주주총회 — 유상증자 의안 포함 여부가 가장 강한 시그널.</text>

    <rect x="100" y="90" width="380" height="42" fill="#450a0a" stroke="#fbbf24" stroke-width="2" rx="6"/>
    <text x="290" y="117" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">유상증자 / 사내대차 / 잔여 자산 매각 중 하나 실행</text>

    <rect x="500" y="90" width="440" height="42" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="720" y="117" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">셋 다 없으면 → 2026 하반기 자본잠식 재진입 위험</text>
  </g>

  <!-- Bottom tag -->
  <text x="540" y="700" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">출처: c.select("ratios"), c.analysis("자금조달"), c.governance() — 2026-04-18 dartlab 실측</text>
</svg>
