  <!-- Footer -->
  <text x="540" y="695" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">c.credit("등급") → grade=dCR-B, score=57.48, healthScore=42.52 (2026-04-18 기준)</text>
</svg>
