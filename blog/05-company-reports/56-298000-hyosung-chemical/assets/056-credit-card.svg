<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>효성화학 dartlab 신용등급 카드 — dCR-B (57.48점)</title>
  <desc>D/EBITDA 10.6배, FCF·OCF 모두 음수, 자본구조 하방 압력</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">효성화학 신용등급 진단 카드</text>
  <text x="60" y="108" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">dartlab dCR — 공시 정량 기반 신용 점수 (정성 요소 미반영)</text>

  <!-- Grade card -->
  <rect x="60" y="160" width="400" height="500" fill="#1e293b" stroke="#fbbf24" stroke-width="3" rx="16"/>
  <text x="260" y="215" font-family="-apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">dartlab 신용등급</text>
  <text x="260" y="305" font-family="-apple-system, sans-serif" font-size="92" font-weight="800" fill="#fbbf24" text-anchor="middle">dCR-B</text>
  <text x="260" y="345" font-family="-apple-system, sans-serif" font-size="18" fill="#fde68a" text-anchor="middle">투자 부적격 직전 구간</text>

  <line x1="100" y1="380" x2="420" y2="380" stroke="#334155" stroke-width="1.5"/>

  <g font-family="-apple-system, sans-serif">
    <text x="100" y="420" font-size="15" fill="#94a3b8">종합 점수</text>
    <text x="420" y="420" font-size="22" font-weight="700" fill="#f1f5f9" text-anchor="end">57.48 / 100</text>

    <text x="100" y="465" font-size="15" fill="#94a3b8">건강 점수</text>
    <text x="420" y="465" font-size="22" font-weight="700" fill="#ef4444" text-anchor="end">42.52 / 100</text>

    <text x="100" y="510" font-size="15" fill="#94a3b8">자본구조 축</text>
    <text x="420" y="510" font-size="20" font-weight="700" fill="#fca5a5" text-anchor="end">76 (하방 압력)</text>

    <text x="100" y="555" font-size="15" fill="#94a3b8">D/EBITDA</text>
    <text x="420" y="555" font-size="22" font-weight="700" fill="#ef4444" text-anchor="end">10.6배</text>

    <text x="100" y="600" font-size="15" fill="#94a3b8">이자보상배율</text>
    <text x="420" y="600" font-size="22" font-weight="700" fill="#ef4444" text-anchor="end">-0.63배</text>

    <text x="100" y="645" font-size="15" fill="#94a3b8">유동비율</text>
    <text x="420" y="645" font-size="22" font-weight="700" fill="#fca5a5" text-anchor="end">40.5%</text>
  </g>

  <!-- Right panel: findings -->
  <g transform="translate(500, 160)">
    <rect x="0" y="0" width="520" height="500" fill="#1e293b" stroke="#334155" stroke-width="2" rx="16"/>
    <text x="30" y="42" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">진단 4가지</text>

    <!-- Finding 1 -->
    <g transform="translate(30, 75)">
      <circle cx="14" cy="14" r="14" fill="#ef4444"/>
      <text x="14" y="19" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
      <text x="42" y="18" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#fca5a5">자본구조 축 76점 — 등급 하방 압력</text>
      <text x="42" y="40" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">자본 재건에도 부채비율 310% 여전</text>
    </g>

    <!-- Finding 2 -->
    <g transform="translate(30, 170)">
      <circle cx="14" cy="14" r="14" fill="#ef4444"/>
      <text x="14" y="19" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a" text-anchor="middle">2</text>
      <text x="42" y="18" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#fca5a5">FCF·OCF 모두 음수 — 현금흐름 악화</text>
      <text x="42" y="40" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">2025 영업활동현금흐름 -850억, 잉여현금흐름 -1,289억</text>
    </g>

    <!-- Finding 3 -->
    <g transform="translate(30, 265)">
      <circle cx="14" cy="14" r="14" fill="#f59e0b"/>
      <text x="14" y="19" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a" text-anchor="middle">3</text>
      <text x="42" y="18" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#fde68a">D/EBITDA 10.6배 — 자본집약 구조 특성</text>
      <text x="42" y="40" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">번 돈으로 부채 갚는데 10.6년 (건전 기준 2~3배)</text>
    </g>

    <!-- Finding 4 -->
    <g transform="translate(30, 360)">
      <circle cx="14" cy="14" r="14" fill="#22c55e"/>
      <text x="14" y="19" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a" text-anchor="middle">4</text>
      <text x="42" y="18" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#86efac">정성 요소 미반영 — 그룹 지원 가능성</text>
      <text x="42" y="40" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">지배구조 A (92점), 지분율 52.3% 효성그룹 단독 지배</text>
    </g>

    <line x1="30" y1="450" x2="490" y2="450" stroke="#334155"/>
    <text x="30" y="478" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b" font-style="italic">dartlab dCR은 시장 지위·경영진·그룹 지원 등 정성 요소는 미반영</text>
