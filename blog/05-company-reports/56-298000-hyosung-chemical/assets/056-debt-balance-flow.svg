<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>효성화학 자본잠식 탈출 매커니즘 — 자산 -6,800 + 자본 +7,011 = 부채 -13,790</title>
  <desc>2024년 말 → 2025년 말 재무상태표 변화의 숫자 균형</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매각이 만든 재무상태표 재구성</text>
  <text x="60" y="108" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">특수가스사업부 9,200억 매각 → 자산 감소 + 부채 상환 + 자본 재건</text>

  <!-- 2024 BS -->
  <g transform="translate(90, 170)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">2024년 말 (매각 전)</text>
    <text x="0" y="30" font-family="-apple-system, sans-serif" font-size="15" fill="#64748b">총자산 3.27조 · 자본잠식 -680억</text>

    <!-- Asset box -->
    <rect x="0" y="50" width="180" height="420" fill="#1e293b" stroke="#334155" stroke-width="2" rx="8"/>
    <text x="90" y="78" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">자산</text>
    <text x="90" y="105" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="middle">32,720억</text>

    <rect x="20" y="130" width="140" height="100" fill="#6366F1" rx="4"/>
    <text x="90" y="170" font-family="-apple-system, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">유동자산</text>
    <text x="90" y="192" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle">1.06조</text>

    <rect x="20" y="240" width="140" height="220" fill="#3b82f6" rx="4"/>
    <text x="90" y="295" font-family="-apple-system, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">비유동자산</text>
    <text x="90" y="321" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle">2.21조</text>
    <text x="90" y="345" font-family="-apple-system, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">(베트남 NCC +</text>
    <text x="90" y="362" font-family="-apple-system, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">특수가스 포함)</text>

    <!-- Liability + equity box -->
    <rect x="200" y="50" width="180" height="420" fill="#1e293b" stroke="#334155" stroke-width="2" rx="8"/>
    <text x="290" y="78" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">부채+자본</text>

    <rect x="220" y="95" width="140" height="370" fill="#dc2626" rx="4"/>
    <text x="290" y="140" font-family="-apple-system, sans-serif" font-size="15" fill="#fef2f2" text-anchor="middle">부채총계</text>
    <text x="290" y="170" font-family="-apple-system, sans-serif" font-size="19" font-weight="700" fill="#fef2f2" text-anchor="middle">33,400억</text>
    <text x="290" y="200" font-family="-apple-system, sans-serif" font-size="13" fill="#fecaca" text-anchor="middle">부채비율 4,912%</text>

    <!-- 자본잠식 -680 -->
    <rect x="220" y="470" width="140" height="40" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="4"/>
    <text x="290" y="497" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fecaca" text-anchor="middle">자본 -680억 ⚠</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(500, 370)">
    <path d="M 0 0 L 120 0 M 100 -15 L 120 0 L 100 15" stroke="#fbbf24" stroke-width="4" fill="none"/>
    <text x="60" y="-30" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">매각</text>
    <text x="60" y="35" font-family="-apple-system, sans-serif" font-size="15" fill="#fde68a" text-anchor="middle">9,200억</text>
  </g>

  <!-- 2025 BS -->
  <g transform="translate(680, 170)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">2025년 말 (매각 후)</text>
    <text x="0" y="30" font-family="-apple-system, sans-serif" font-size="15" fill="#64748b">총자산 2.59조 · 자본 +6,331억 회복</text>

    <!-- Asset box -->
    <rect x="0" y="50" width="180" height="340" fill="#1e293b" stroke="#334155" stroke-width="2" rx="8"/>
    <text x="90" y="78" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">자산</text>
    <text x="90" y="105" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9" text-anchor="middle">25,941억</text>

    <rect x="20" y="130" width="140" height="80" fill="#6366F1" rx="4"/>
    <text x="90" y="165" font-family="-apple-system, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">유동자산</text>
    <text x="90" y="187" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle">6,475억</text>

    <rect x="20" y="220" width="140" height="160" fill="#3b82f6" rx="4"/>
    <text x="90" y="265" font-family="-apple-system, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">비유동자산</text>
    <text x="90" y="290" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle">1.95조</text>
    <text x="90" y="315" font-family="-apple-system, sans-serif" font-size="12" fill="#dbeafe" text-anchor="middle">(베트남 NCC 중심)</text>

    <!-- Liability + equity -->
    <rect x="200" y="50" width="180" height="340" fill="#1e293b" stroke="#334155" stroke-width="2" rx="8"/>
    <text x="290" y="78" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">부채+자본</text>

    <rect x="220" y="95" width="140" height="220" fill="#dc2626" rx="4"/>
    <text x="290" y="140" font-family="-apple-system, sans-serif" font-size="15" fill="#fef2f2" text-anchor="middle">부채총계</text>
    <text x="290" y="170" font-family="-apple-system, sans-serif" font-size="19" font-weight="700" fill="#fef2f2" text-anchor="middle">19,610억</text>
    <text x="290" y="200" font-family="-apple-system, sans-serif" font-size="13" fill="#fecaca" text-anchor="middle">부채비율 310%</text>

    <!-- 자본 +6,331 -->
    <rect x="220" y="320" width="140" height="70" fill="#22c55e" rx="4"/>
    <text x="290" y="350" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#0a0e1a" text-anchor="middle">자본</text>
    <text x="290" y="376" font-family="-apple-system, sans-serif" font-size="19" font-weight="700" fill="#0a0e1a" text-anchor="middle">+6,331억</text>
  </g>

  <!-- Bottom equation -->
  <g transform="translate(60, 605)">
    <rect x="0" y="0" width="1080" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="540" y="34" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fbbf24" text-anchor="middle">회계 균형식 — 숫자가 정확히 맞는다</text>
    <text x="540" y="68" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9" text-anchor="middle">자산 변화 -6,779억  +  자본 변화 +7,011억  =  부채 변화 -13,790억</text>
  </g>
</svg>
