<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>효성화학 2025 손익계산서 두 얼굴</title>
  <desc>영업이익률 -7.05%, 금융비용 -11.13%, 그런데 순이익 +13.68%로 역전되는 구조</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="#f1f5f9">효성화학 2025 손익계산서의 두 얼굴</text>
  <text x="60" y="108" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#64748b">영업으로는 7% 잃고, 이자로 11% 더 잃는데, 순이익은 왜 +13.68%인가</text>

  <!-- Top bars: income waterfall -->
  <g transform="translate(60, 160)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="17" fill="#94a3b8">매출 대비 누적 비율(%, 2025 연간)</text>

    <!-- 매출 100 -->
    <rect x="0" y="20" width="400" height="48" fill="#6366F1" rx="4"/>
    <text x="10" y="51" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#f8fafc">매출 100% (2.38조)</text>

    <!-- 매출총이익 -3.27 -->
    <rect x="0" y="90" width="12" height="48" fill="#ef4444" rx="3"/>
    <text x="28" y="121" font-family="-apple-system, sans-serif" font-size="18" fill="#fca5a5">매출총이익 -3.27%  (팔수록 적자 4년)</text>

    <!-- 영업이익 -7.05 -->
    <rect x="0" y="160" width="28" height="48" fill="#ef4444" rx="3"/>
    <text x="44" y="191" font-family="-apple-system, sans-serif" font-size="18" fill="#fca5a5">영업이익 -7.05%  (-1,681억)</text>

    <!-- 금융비용 누적 -18.18 -->
    <rect x="0" y="230" width="73" height="48" fill="#dc2626" rx="3"/>
    <text x="89" y="261" font-family="-apple-system, sans-serif" font-size="18" fill="#fca5a5">영업+금융 누적 -18.18%  (이자만 2,652억)</text>

    <!-- 세전이익 +10.74 -->
    <rect x="0" y="305" width="43" height="48" fill="#22c55e" rx="3"/>
    <text x="59" y="336" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#86efac">세전이익 +10.74%  ← 중간에 +6,891억 유입</text>

    <!-- 순이익 +13.68 -->
    <rect x="0" y="375" width="55" height="56" fill="#22c55e" rx="3"/>
    <text x="71" y="410" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#86efac">순이익 +13.68%  (+3,260억 흑자전환)</text>
  </g>

  <!-- Right annotation box -->
  <g transform="translate(780, 190)">
    <rect x="0" y="0" width="360" height="280" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <text x="24" y="42" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#fbbf24">+6,891억의 정체</text>
    <text x="24" y="82" font-family="-apple-system, sans-serif" font-size="16" fill="#e2e8f0">세전이익 + 2,558억</text>
    <text x="24" y="108" font-family="-apple-system, sans-serif" font-size="16" fill="#e2e8f0">− (영업 -1,681 + 금융 -2,652)</text>
    <text x="24" y="134" font-family="-apple-system, sans-serif" font-size="16" fill="#e2e8f0">= +6,891억 영업외이익</text>
    <line x1="24" y1="155" x2="336" y2="155" stroke="#334155"/>
    <text x="24" y="185" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#fbbf24">→ 특수가스사업부 매각차익</text>
    <text x="24" y="215" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8">매각가 ≈ 9,200억 (추정)</text>
    <text x="24" y="240" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8">자산 -6,800 + 부채 -13,800</text>
    <text x="24" y="260" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8">+ 자본 +7,011 시퀀스와 일치</text>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="72" fill="#1e293b" rx="8"/>
    <text x="24" y="32" font-family="-apple-system, sans-serif" font-size="16" fill="#94a3b8">본업은 움직이지 않았다 — 영업이익 개선 +24억, 이자 부담 개선 +82억</text>
    <text x="24" y="58" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">2025년 순이익 +6,517억 스윙 = 매각 한 번이 지난 4년의 적자를 한꺼번에 메운 결과</text>
  </g>
</svg>
