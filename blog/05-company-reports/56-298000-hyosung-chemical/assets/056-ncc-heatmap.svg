<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <title>한국 나프타분해설비 5사 영업이익률 비교 2021~2025</title>
  <desc>LG화학·롯데케미칼·한화솔루션·GS·효성화학 연간 영업이익률(%) 히트맵</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">한국 석유화학 빙하기 — 5사 영업이익률 5년 비교</text>
  <text x="60" y="108" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">효성화학은 5사 중 가장 깊은 골짜기 — 베트남 단일 공장 의존 + 다각화 부재</text>

  <!-- Header row -->
  <g font-family="-apple-system, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle" font-weight="600">
    <text x="260" y="185">2021</text>
    <text x="420" y="185">2022</text>
    <text x="580" y="185">2023</text>
    <text x="740" y="185">2024</text>
    <text x="900" y="185">2025</text>
  </g>

  <!-- Company rows -->
  <g font-family="-apple-system, sans-serif">
    <!-- LG화학 -->
    <text x="60" y="245" font-size="17" fill="#f1f5f9" font-weight="600">LG화학</text>
    <text x="60" y="265" font-size="13" fill="#64748b">051910</text>
    <rect x="190" y="210" width="140" height="60" fill="#22c55e" rx="4"/><text x="260" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+10.8</text>
    <rect x="350" y="210" width="140" height="60" fill="#86efac" rx="4"/><text x="420" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+7.7</text>
    <rect x="510" y="210" width="140" height="60" fill="#bbf7d0" rx="4"/><text x="580" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+3.6</text>
    <rect x="670" y="210" width="140" height="60" fill="#bbf7d0" rx="4"/><text x="740" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+3.5</text>
    <rect x="830" y="210" width="140" height="60" fill="#bbf7d0" rx="4"/><text x="900" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+4.1</text>

    <!-- 롯데케미칼 -->
    <text x="60" y="325" font-size="17" fill="#f1f5f9" font-weight="600">롯데케미칼</text>
    <text x="60" y="345" font-size="13" fill="#64748b">011170</text>
    <rect x="190" y="290" width="140" height="60" fill="#86efac" rx="4"/><text x="260" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+6.6</text>
    <rect x="350" y="290" width="140" height="60" fill="#fca5a5" rx="4"/><text x="420" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">-3.5</text>
    <rect x="510" y="290" width="140" height="60" fill="#fecdd3" rx="4"/><text x="580" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">-0.9</text>
    <rect x="670" y="290" width="140" height="60" fill="#fca5a5" rx="4"/><text x="740" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">-3.0</text>
    <rect x="830" y="290" width="140" height="60" fill="#ef4444" rx="4"/><text x="900" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">-5.2</text>

    <!-- 한화솔루션 -->
    <text x="60" y="405" font-size="17" fill="#f1f5f9" font-weight="600">한화솔루션</text>
    <text x="60" y="425" font-size="13" fill="#64748b">009830</text>
    <rect x="190" y="370" width="140" height="60" fill="#22c55e" rx="4"/><text x="260" y="408" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+11.5</text>
    <rect x="350" y="370" width="140" height="60" fill="#22c55e" rx="4"/><text x="420" y="408" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+10.2</text>
    <rect x="510" y="370" width="140" height="60" fill="#bbf7d0" rx="4"/><text x="580" y="408" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+3.0</text>
    <rect x="670" y="370" width="140" height="60" fill="#fca5a5" rx="4"/><text x="740" y="408" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">-3.2</text>
    <rect x="830" y="370" width="140" height="60" fill="#fca5a5" rx="4"/><text x="900" y="408" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">-2.8</text>

    <!-- GS -->
    <text x="60" y="485" font-size="17" fill="#f1f5f9" font-weight="600">GS</text>
    <text x="60" y="505" font-size="13" fill="#64748b">078930</text>
    <rect x="190" y="450" width="140" height="60" fill="#22c55e" rx="4"/><text x="260" y="488" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+14.8</text>
    <rect x="350" y="450" width="140" height="60" fill="#86efac" rx="4"/><text x="420" y="488" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+8.5</text>
    <rect x="510" y="450" width="140" height="60" fill="#bbf7d0" rx="4"/><text x="580" y="488" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+3.2</text>
    <rect x="670" y="450" width="140" height="60" fill="#fef9c3" rx="4"/><text x="740" y="488" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+1.1</text>
    <rect x="830" y="450" width="140" height="60" fill="#fef9c3" rx="4"/><text x="900" y="488" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+0.4</text>

    <!-- 효성화학 (highlighted) -->
    <rect x="50" y="545" width="1000" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="8"/>
    <text x="60" y="580" font-size="17" fill="#fbbf24" font-weight="700">효성화학</text>
    <text x="60" y="602" font-size="13" fill="#fde68a">298000 ★</text>
    <rect x="190" y="555" width="140" height="55" fill="#86efac" rx="4"/><text x="260" y="591" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+6.1</text>
    <rect x="350" y="555" width="140" height="55" fill="#dc2626" rx="4"/><text x="420" y="591" font-size="20" font-weight="700" fill="#fef2f2" text-anchor="middle">-11.7</text>
    <rect x="510" y="555" width="140" height="55" fill="#ef4444" rx="4"/><text x="580" y="591" font-size="20" font-weight="700" fill="#fef2f2" text-anchor="middle">-6.8</text>
    <rect x="670" y="555" width="140" height="55" fill="#ef4444" rx="4"/><text x="740" y="591" font-size="20" font-weight="700" fill="#fef2f2" text-anchor="middle">-6.0</text>
    <rect x="830" y="555" width="140" height="55" fill="#dc2626" rx="4"/><text x="900" y="591" font-size="20" font-weight="700" fill="#fef2f2" text-anchor="middle">-7.1</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 665)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">영업이익률(%) — 색상 스케일</text>
    <rect x="0" y="12" width="28" height="22" fill="#22c55e"/><text x="34" y="29" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">+10%↑</text>
    <rect x="100" y="12" width="28" height="22" fill="#bbf7d0"/><text x="134" y="29" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">+3~7%</text>
    <rect x="210" y="12" width="28" height="22" fill="#fef9c3"/><text x="244" y="29" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">0~3%</text>
    <rect x="310" y="12" width="28" height="22" fill="#fca5a5"/><text x="344" y="29" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">-3%↓</text>
    <rect x="400" y="12" width="28" height="22" fill="#dc2626"/><text x="434" y="29" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">-5%↓ 심각</text>
  </g>

  <!-- Insight -->
  <g transform="translate(60, 725)">
    <rect x="0" y="0" width="1080" height="72" fill="#1e293b" rx="8"/>
    <text x="24" y="32" font-family="-apple-system, sans-serif" font-size="16" fill="#94a3b8">동반 침몰 — 5사 중 4사(LG화학 제외)가 2022~2025 어느 해든 적자 기록</text>
    <text x="24" y="58" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">효성화학은 2021 사이클 정점에서도 중위권(+6.1%), 바닥에선 최악(-11.7%) — 단일 공장 레버리지가 양방향으로 증폭</text>
  </g>
</svg>
