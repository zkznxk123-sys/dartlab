<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>효성화학 베트남 공장 타임라인 — 2018 건설 → 2020.04 가동 → 2022 적자 → 2025 매각</title>
  <desc>베트남 나프타분해설비 공장의 타이밍이 만든 운명의 8년 추적</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9">베트남 공장 한 번의 타이밍, 그리고 8년의 결과</text>
  <text x="60" y="108" font-family="-apple-system, sans-serif" font-size="19" fill="#64748b">2020년 4월 풀가동 직후, 중국이 연간 에틸렌 5,000만 톤 증설 — 공급 과잉 직격</text>

  <!-- Timeline axis -->
  <line x1="100" y1="400" x2="1120" y2="400" stroke="#334155" stroke-width="3"/>

  <!-- Year markers -->
  <g font-family="-apple-system, sans-serif" font-size="17" fill="#94a3b8" text-anchor="middle">
    <circle cx="150" cy="400" r="8" fill="#6366F1"/><text x="150" y="440">2018</text>
    <circle cx="275" cy="400" r="8" fill="#6366F1"/><text x="275" y="440">2019</text>
    <circle cx="400" cy="400" r="14" fill="#fbbf24"/><text x="400" y="442" fill="#fbbf24" font-weight="700">2020.04</text>
    <circle cx="525" cy="400" r="8" fill="#22c55e"/><text x="525" y="440">2021</text>
    <circle cx="650" cy="400" r="14" fill="#ef4444"/><text x="650" y="442" fill="#ef4444" font-weight="700">2022</text>
    <circle cx="775" cy="400" r="8" fill="#ef4444"/><text x="775" y="440">2023</text>
    <circle cx="900" cy="400" r="14" fill="#dc2626"/><text x="900" y="442" fill="#dc2626" font-weight="700">2024</text>
    <circle cx="1060" cy="400" r="14" fill="#fbbf24"/><text x="1060" y="442" fill="#fbbf24" font-weight="700">2025</text>
  </g>

  <!-- Above-axis: operating profit bars -->
  <g font-family="-apple-system, sans-serif" font-size="14" fill="#f1f5f9" text-anchor="middle">
    <!-- 2018 +527 -->
    <rect x="137" y="374" width="26" height="26" fill="#22c55e"/>
    <text x="150" y="362" fill="#86efac">+527</text>
    <!-- 2019 +1539 -->
    <rect x="262" y="320" width="26" height="80" fill="#22c55e"/>
    <text x="275" y="308" fill="#86efac">+1,539</text>
    <!-- 2020 +609 -->
    <rect x="387" y="370" width="26" height="30" fill="#22c55e"/>
    <text x="400" y="358" fill="#86efac">+609</text>
    <!-- 2021 +1486 -->
    <rect x="512" y="322" width="26" height="78" fill="#22c55e"/>
    <text x="525" y="310" fill="#86efac">+1,486</text>
    <!-- 2022 -3367 -->
    <rect x="637" y="400" width="26" height="170" fill="#ef4444"/>
    <text x="650" y="590" fill="#fca5a5">-3,367</text>
    <!-- 2023 -1888 -->
    <rect x="762" y="400" width="26" height="94" fill="#ef4444"/>
    <text x="775" y="514" fill="#fca5a5">-1,888</text>
    <!-- 2024 -1705 -->
    <rect x="887" y="400" width="26" height="85" fill="#ef4444"/>
    <text x="900" y="505" fill="#fca5a5">-1,705</text>
    <!-- 2025 -1681 -->
    <rect x="1047" y="400" width="26" height="84" fill="#ef4444"/>
    <text x="1060" y="504" fill="#fca5a5">-1,681</text>
  </g>

  <text x="60" y="180" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8">영업이익 (억원)</text>
  <text x="60" y="560" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8">↓ 영업적자</text>

  <!-- Event annotations -->
  <g font-family="-apple-system, sans-serif">
    <!-- 2018 -->
    <text x="90" y="205" font-size="14" fill="#6366F1" font-weight="700">2018.07</text>
    <text x="90" y="225" font-size="13" fill="#94a3b8">㈜효성에서</text>
    <text x="90" y="243" font-size="13" fill="#94a3b8">분할 설립</text>

    <!-- 2020.04 -->
    <text x="355" y="175" font-size="15" fill="#fbbf24" font-weight="700">2020.04</text>
    <text x="355" y="195" font-size="13" fill="#fde68a">Vina Chemicals</text>
    <text x="355" y="213" font-size="13" fill="#fde68a">베트남 공장 가동</text>
    <text x="355" y="231" font-size="12" fill="#64748b">1.3조 투자 완료</text>

    <!-- 2020~2024 중국 -->
    <rect x="380" y="260" width="560" height="40" fill="#1e293b" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="660" y="288" font-size="15" fill="#fecaca" text-anchor="middle" font-weight="700">← 중국 에틸렌 5,000만 톤 증설 (2020~2024) → PP 1,500만 톤 쏟아짐 →</text>

    <!-- 2022 사이클 무너짐 -->
    <text x="600" y="655" font-size="15" fill="#ef4444" font-weight="700">2022</text>
    <text x="600" y="675" font-size="13" fill="#fca5a5">스프레드 붕괴</text>
    <text x="600" y="693" font-size="13" fill="#fca5a5">매출원가율 108%</text>

    <!-- 2024 자본잠식 -->
    <text x="860" y="655" font-size="15" fill="#dc2626" font-weight="700">2024</text>
    <text x="860" y="675" font-size="13" fill="#fca5a5">자본총계 -680억</text>
    <text x="860" y="693" font-size="13" fill="#fca5a5">(자본잠식 돌입)</text>

    <!-- 2025 매각 -->
    <text x="1010" y="655" font-size="15" fill="#fbbf24" font-weight="700">2025</text>
    <text x="1010" y="675" font-size="13" fill="#fde68a">특수가스 매각</text>
    <text x="1010" y="693" font-size="13" fill="#fde68a">9,200억 유입</text>
  </g>

  <!-- Bottom caption -->
  <rect x="60" y="660" width="480" height="40" fill="#1e293b" rx="6"/>
  <text x="76" y="685" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">영업이익률(매출 대비 영업이익 비율) 막대 — 위쪽 흑자 / 아래쪽 적자</text>
</svg>
