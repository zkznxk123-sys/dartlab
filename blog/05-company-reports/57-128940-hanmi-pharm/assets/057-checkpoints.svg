<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>2026년 한미약품에서 볼 3가지 체크포인트</title>
  <desc>기술수출 분기 매출, R&D 반등, 신규 글로벌 계약 — 다음 2년 시그널</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="64" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2027 한미약품에서 볼 3가지</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">로열티 국면 진입, R&amp;D 재투자 사이클, 신규 기술수출 계약</text>

  <!-- Signal 1 -->
  <g transform="translate(60, 155)">
    <rect x="0" y="0" width="960" height="150" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <circle cx="50" cy="75" r="32" fill="#22c55e"/>
    <text x="50" y="84" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
    <text x="100" y="42" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">기술수출 분기 매출 70~100억 돌파</text>
    <text x="100" y="72" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">2025Q4 59억 → 롤베돈 미국 매출 확대 시 분기 100억+ 구간 진입.</text>

    <rect x="100" y="90" width="380" height="42" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="290" y="117" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="middle">100억+ 분기 → 로열티 국면 확인</text>

    <rect x="500" y="90" width="380" height="42" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="690" y="117" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="middle">50억 정체 → 구조적 재검토</text>
  </g>

  <!-- Signal 2 -->
  <g transform="translate(60, 330)">
    <rect x="0" y="0" width="960" height="150" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" rx="12"/>
    <circle cx="50" cy="75" r="32" fill="#8b5cf6"/>
    <text x="50" y="84" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#f8fafc" text-anchor="middle">2</text>
    <text x="100" y="42" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">R&amp;D 연 2,500억 돌파 (재투자 사이클)</text>
    <text x="100" y="72" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">2024 저점 1,340억 → 2025 1,958억 반등. 차세대 3상 진입 신호.</text>

    <rect x="100" y="90" width="380" height="42" fill="#2e1065" stroke="#a855f7" stroke-width="2" rx="6"/>
    <text x="290" y="117" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#c4b5fd" text-anchor="middle">2,500억+ → 신규 파이프라인 진입</text>

    <rect x="500" y="90" width="380" height="42" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="690" y="117" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="middle">2,000억 이하 → 선택과 집중 지속</text>
  </g>

  <!-- Signal 3 -->
  <g transform="translate(60, 505)">
    <rect x="0" y="0" width="960" height="150" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <circle cx="50" cy="75" r="32" fill="#fbbf24"/>
    <text x="50" y="84" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#0a0e1a" text-anchor="middle">3</text>
    <text x="100" y="42" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">HM15275 (MASH/비만) 글로벌 기술수출</text>
    <text x="100" y="72" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">2026~2027 중 계약 체결 시 계약 총액 $20억+ 예상. 영업이익 3,500억 방아쇠.</text>

    <rect x="100" y="90" width="380" height="42" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="6"/>
    <text x="290" y="117" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">체결 → 5년 마일스톤 + 로열티 확보</text>

    <rect x="500" y="90" width="380" height="42" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="690" y="117" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">2027까지 미체결 → 자체 임상 부담 지속</text>
  </g>

  <text x="540" y="695" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">c.select("IS",["연구개발비","기술수출수익"]) · c.filings() 실측 (2026-04-19 dartlab)</text>
</svg>
