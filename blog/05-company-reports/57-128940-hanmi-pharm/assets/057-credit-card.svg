<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>한미약품 dartlab 신용등급 카드 dCR-A+ (13.22점)</title>
  <desc>부채비율 50%, 이자보상배율 7.4배, 건강 86.78 — 한국 제약 상위권</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="64" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">한미약품 신용등급 진단 카드</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">부채비율 132% → 50% 다이어트 6년의 결과 — dCR-A+ 상위 10%</text>

  <!-- Grade card -->
  <rect x="60" y="150" width="400" height="500" fill="#1e293b" stroke="#22c55e" stroke-width="3" rx="16"/>
  <text x="260" y="205" font-family="-apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">dartlab 신용등급</text>
  <text x="260" y="300" font-family="-apple-system, sans-serif" font-size="92" font-weight="800" fill="#22c55e" text-anchor="middle">dCR-A+</text>
  <text x="260" y="340" font-family="-apple-system, sans-serif" font-size="18" fill="#86efac" text-anchor="middle">상위 10% 구간 · 건전</text>

  <line x1="100" y1="380" x2="420" y2="380" stroke="#334155" stroke-width="1.5"/>

  <g font-family="-apple-system, sans-serif">
    <text x="100" y="420" font-size="15" fill="#94a3b8">종합 점수</text>
    <text x="420" y="420" font-size="22" font-weight="700" fill="#f1f5f9" text-anchor="end">13.22 / 100</text>

    <text x="100" y="465" font-size="15" fill="#94a3b8">건강 점수</text>
    <text x="420" y="465" font-size="22" font-weight="700" fill="#22c55e" text-anchor="end">86.78 / 100</text>

    <text x="100" y="510" font-size="15" fill="#94a3b8">부채비율</text>
    <text x="420" y="510" font-size="22" font-weight="700" fill="#86efac" text-anchor="end">50.2%</text>

    <text x="100" y="555" font-size="15" fill="#94a3b8">이자보상배율</text>
    <text x="420" y="555" font-size="22" font-weight="700" fill="#22c55e" text-anchor="end">7.4배</text>

    <text x="100" y="600" font-size="15" fill="#94a3b8">자기자본비율</text>
    <text x="420" y="600" font-size="22" font-weight="700" fill="#86efac" text-anchor="end">66.6%</text>

    <text x="100" y="645" font-size="15" fill="#94a3b8">유동비율</text>
    <text x="420" y="645" font-size="22" font-weight="700" fill="#86efac" text-anchor="end">147.7%</text>
  </g>

  <!-- Right panel -->
  <g transform="translate(500, 150)">
    <rect x="0" y="0" width="520" height="500" fill="#1e293b" stroke="#334155" stroke-width="2" rx="16"/>
    <text x="30" y="42" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">진단 4가지</text>

    <g transform="translate(30, 75)">
      <circle cx="14" cy="14" r="14" fill="#22c55e"/>
      <text x="14" y="19" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
      <text x="42" y="18" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#86efac">부채비율 6년 만에 132% → 50% 반토막</text>
      <text x="42" y="40" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">자본총계 +80% (7,924→14,229억) 유보이익 축적</text>
    </g>

    <g transform="translate(30, 170)">
      <circle cx="14" cy="14" r="14" fill="#22c55e"/>
      <text x="14" y="19" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a" text-anchor="middle">2</text>
      <text x="42" y="18" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#86efac">영업활동현금흐름 5년 연속 플러스</text>
      <text x="42" y="40" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">2020부터 OCF 1,500~2,200억 안정적 창출</text>
    </g>

    <g transform="translate(30, 265)">
      <circle cx="14" cy="14" r="14" fill="#22c55e"/>
      <text x="14" y="19" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a" text-anchor="middle">3</text>
      <text x="42" y="18" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#86efac">이자보상배율 7.4배 — 재무 유연성 충분</text>
      <text x="42" y="40" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">영업이익 2,578억 vs 금융비용 약 350억</text>
    </g>

    <g transform="translate(30, 360)">
      <circle cx="14" cy="14" r="14" fill="#f59e0b"/>
      <text x="14" y="19" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0a0e1a" text-anchor="middle">4</text>
      <text x="42" y="18" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#fde68a">유동성 축 37점 — 유일한 약점</text>
      <text x="42" y="40" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">순현금 1,083억 = 매출의 7% (매출 대비 타이트)</text>
    </g>

    <line x1="30" y1="450" x2="490" y2="450" stroke="#334155"/>
    <text x="30" y="478" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b" font-style="italic">dartlab dCR은 공시 정량 기반 — 시장 지위·경영진 정성 요소는 미반영</text>
  </g>

  <text x="540" y="695" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">c.credit("등급") → grade=dCR-A+, score=13.22, healthScore=86.78 (2026-04-19 기준)</text>
</svg>
