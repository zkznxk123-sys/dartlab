<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <title>한미약품 개량신약 포트폴리오 — 매출총이익률 57% 지탱하는 6개 핵심 제품</title>
  <desc>에소메졸·아모잘탄·한미탐스·로수젯·몬테리진·팔팔 6개 개량신약의 매출과 출시년도</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="64" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출총이익률 57%를 지킨 개량신약 포트폴리오</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">자체 개발 + 특허 보호 + 오리지널의 70~80% 가격 = 원가율 30%대 구조</text>

  <!-- Row 1 -->
  <!-- 에소메졸 -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="350" height="170" fill="#1e293b" stroke="#6366F1" stroke-width="2" rx="12"/>
    <text x="24" y="40" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">에소메졸</text>
    <text x="24" y="62" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">위식도 역류질환 / 프로톤펌프억제제</text>
    <text x="24" y="92" font-family="-apple-system, sans-serif" font-size="16" fill="#c7d2fe">성분: 에스오메프라졸 마그네슘</text>
    <text x="24" y="115" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">오리지널: 아스트라제네카 넥시움</text>
    <line x1="24" y1="130" x2="326" y2="130" stroke="#334155"/>
    <text x="24" y="152" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24">출시 2008 · 연 매출 1,000억+ 안정</text>
  </g>

  <!-- 아모잘탄 -->
  <g transform="translate(425, 150)">
    <rect x="0" y="0" width="350" height="170" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <text x="24" y="40" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">아모잘탄</text>
    <text x="24" y="62" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">고혈압 / 복합제 개량신약</text>
    <text x="24" y="92" font-family="-apple-system, sans-serif" font-size="16" fill="#86efac">성분: 아모디핀 + 로사르탄</text>
    <text x="24" y="115" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">특허: 제형 복합 — 복제약 진입 제한</text>
    <line x1="24" y1="130" x2="326" y2="130" stroke="#334155"/>
    <text x="24" y="152" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24">출시 2009 · 연 매출 1,200억+ 1위</text>
  </g>

  <!-- 한미탐스 -->
  <g transform="translate(790, 150)">
    <rect x="0" y="0" width="350" height="170" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <text x="24" y="40" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">한미탐스</text>
    <text x="24" y="62" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">전립선 비대증 / 알파차단제</text>
    <text x="24" y="92" font-family="-apple-system, sans-serif" font-size="16" fill="#fde68a">성분: 탐술로신 서방정</text>
    <text x="24" y="115" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">오리지널: 베링거인겔하임 하루날</text>
    <line x1="24" y1="130" x2="326" y2="130" stroke="#334155"/>
    <text x="24" y="152" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24">출시 2010 · 연 매출 500억+</text>
  </g>

  <!-- Row 2 -->
  <!-- 로수젯 -->
  <g transform="translate(60, 340)">
    <rect x="0" y="0" width="350" height="170" fill="#1e293b" stroke="#f97316" stroke-width="2" rx="12"/>
    <text x="24" y="40" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">로수젯</text>
    <text x="24" y="62" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">고지혈증 / 복합제 개량신약</text>
    <text x="24" y="92" font-family="-apple-system, sans-serif" font-size="16" fill="#fdba74">성분: 로수바스타틴 + 에제티미브</text>
    <text x="24" y="115" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">복합 투여로 순응도 개선</text>
    <line x1="24" y1="130" x2="326" y2="130" stroke="#334155"/>
    <text x="24" y="152" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24">출시 2015 · 연 매출 1,500억+ 급성장</text>
  </g>

  <!-- 몬테리진 -->
  <g transform="translate(425, 340)">
    <rect x="0" y="0" width="350" height="170" fill="#1e293b" stroke="#ec4899" stroke-width="2" rx="12"/>
    <text x="24" y="40" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">몬테리진</text>
    <text x="24" y="62" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">알레르기성 비염 / 복합제</text>
    <text x="24" y="92" font-family="-apple-system, sans-serif" font-size="16" fill="#fbcfe8">성분: 몬테루카스트 + 레보세티리진</text>
    <text x="24" y="115" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">1일 1정 — 복용 편의성</text>
    <line x1="24" y1="130" x2="326" y2="130" stroke="#334155"/>
    <text x="24" y="152" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24">출시 2016 · 연 매출 400억+</text>
  </g>

  <!-- 팔팔 -->
  <g transform="translate(790, 340)">
    <rect x="0" y="0" width="350" height="170" fill="#1e293b" stroke="#06b6d4" stroke-width="2" rx="12"/>
    <text x="24" y="40" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">팔팔 / 구구</text>
    <text x="24" y="62" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">발기부전 / 제네릭 선점</text>
    <text x="24" y="92" font-family="-apple-system, sans-serif" font-size="16" fill="#a5f3fc">성분: 실데나필 / 타다라필</text>
    <text x="24" y="115" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">오리지널: 비아그라·시알리스</text>
    <line x1="24" y1="130" x2="326" y2="130" stroke="#334155"/>
    <text x="24" y="152" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24">출시 2012 · 연 매출 600억+ 1위</text>
  </g>

  <!-- Row 3: Aggregate summary -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="110" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <text x="40" y="40" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fbbf24">포트폴리오 합산 효과</text>
    <text x="40" y="72" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">핵심 6개 개량신약 연 매출 합계 ≈ <tspan fill="#fbbf24" font-weight="700">5,000억+</tspan> (한미 연결매출 1.55조의 32%)</text>
    <text x="40" y="94" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">원가율 30%대 자체 제조 → 전체 매출총이익률 <tspan fill="#fbbf24" font-weight="700">57.1% 9년 유지</tspan>의 하단 지지</text>
  </g>

  <!-- Caption -->
  <g transform="translate(60, 680)">
    <text x="0" y="22" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">개량신약(improved drug) = 오리지널 특허 만료 후 제형·용법·용량을 개량해 재허가받은 약. 제네릭과 다르게 5~10년 신규 특허 보호.</text>
    <text x="0" y="48" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">한미약품은 20년간 이 개량신약 포트폴리오를 쌓아 올려 제약 업계 평균 대비 원가율 -15%p 낮은 구조를 확보.</text>
  </g>

  <!-- Bottom rule -->
  <g transform="translate(60, 755)">
    <rect x="0" y="0" width="1080" height="40" fill="#1e293b" rx="6"/>
    <text x="24" y="26" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">출처: 한미약품 사업보고서 2017~2025 · dartlab.Company('128940').show('businessOverview')</text>
  </g>
</svg>
