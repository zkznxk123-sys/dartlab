<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>한미약품 R&amp;D 3,724억 피크와 영업이익 2,578억 회복의 9년 파동</title>
  <desc>2017~2025 연간 연구개발비와 영업이익 병렬 막대 — R&amp;D 태운 뒤 5년 뒤 회수의 흐름</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="64" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">R&amp;D 3,724억 태우고 5년 뒤 영업이익 2,578억</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2017~2025 연구개발비(보라) vs 영업이익(노랑) — 태운 뒤 돌아오는 패턴</text>

  <!-- Axes -->
  <line x1="100" y1="560" x2="1140" y2="560" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="160" x2="100" y2="560" stroke="#334155" stroke-width="1.5"/>

  <!-- Y-axis labels (R&amp;D scale, max 4000억) -->
  <g font-family="-apple-system, sans-serif" font-size="12" fill="#94a3b8">
    <text x="90" y="165" text-anchor="end">4,000</text>
    <text x="90" y="265" text-anchor="end">3,000</text>
    <text x="90" y="365" text-anchor="end">2,000</text>
    <text x="90" y="465" text-anchor="end">1,000</text>
    <text x="90" y="565" text-anchor="end">0</text>
  </g>
  <text x="40" y="360" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" transform="rotate(-90 40 360)">(억원)</text>

  <!-- Grid lines -->
  <g stroke="#1e293b" stroke-dasharray="3,3">
    <line x1="100" y1="265" x2="1140" y2="265"/>
    <line x1="100" y1="365" x2="1140" y2="365"/>
    <line x1="100" y1="465" x2="1140" y2="465"/>
  </g>

  <!-- Bars per year — R&amp;D purple, OP yellow -->
  <!-- 2017: R&amp;D 2600, OP 822 -->
  <g>
    <rect x="130" y="300" width="32" height="260" fill="#8b5cf6" rx="3"/>
    <text x="146" y="294" font-family="-apple-system, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">2,600</text>
    <rect x="168" y="478" width="32" height="82" fill="#fbbf24" rx="3"/>
    <text x="184" y="472" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">822</text>
    <text x="165" y="585" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">2017</text>
  </g>

  <!-- 2018: R&amp;D 2860, OP 836 -->
  <g>
    <rect x="244" y="274" width="32" height="286" fill="#8b5cf6" rx="3"/>
    <text x="260" y="268" font-family="-apple-system, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">2,860</text>
    <rect x="282" y="476" width="32" height="84" fill="#fbbf24" rx="3"/>
    <text x="298" y="470" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">836</text>
    <text x="279" y="585" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">2018</text>
  </g>

  <!-- 2019: R&amp;D 3153, OP 1039 -->
  <g>
    <rect x="358" y="245" width="32" height="315" fill="#8b5cf6" rx="3"/>
    <text x="374" y="239" font-family="-apple-system, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">3,153</text>
    <rect x="396" y="456" width="32" height="104" fill="#fbbf24" rx="3"/>
    <text x="412" y="450" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">1,039</text>
    <text x="393" y="585" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">2019</text>
  </g>

  <!-- 2020: R&amp;D 3724 (PEAK), OP 490 (BOTTOM) -->
  <g>
    <rect x="472" y="188" width="32" height="372" fill="#a855f7" stroke="#fde68a" stroke-width="2" rx="3"/>
    <text x="488" y="180" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">3,724 ★</text>
    <rect x="510" y="511" width="32" height="49" fill="#ef4444" rx="3"/>
    <text x="526" y="505" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#fca5a5" text-anchor="middle">490 ↓</text>
    <text x="507" y="585" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">2020</text>
  </g>

  <!-- 2021: R&amp;D 2282, OP 1254 -->
  <g>
    <rect x="586" y="332" width="32" height="228" fill="#8b5cf6" rx="3"/>
    <text x="602" y="326" font-family="-apple-system, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">2,282</text>
    <rect x="624" y="435" width="32" height="125" fill="#fbbf24" rx="3"/>
    <text x="640" y="429" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">1,254</text>
    <text x="621" y="585" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">2021</text>
  </g>

  <!-- 2022: R&amp;D 2667, OP 1581 -->
  <g>
    <rect x="700" y="293" width="32" height="267" fill="#8b5cf6" rx="3"/>
    <text x="716" y="287" font-family="-apple-system, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">2,667</text>
    <rect x="738" y="402" width="32" height="158" fill="#fbbf24" rx="3"/>
    <text x="754" y="396" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">1,581</text>
    <text x="735" y="585" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">2022</text>
  </g>

  <!-- 2023: R&amp;D 1818, OP 2207 -->
  <g>
    <rect x="814" y="378" width="32" height="182" fill="#8b5cf6" rx="3"/>
    <text x="830" y="372" font-family="-apple-system, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">1,818</text>
    <rect x="852" y="339" width="32" height="221" fill="#fbbf24" rx="3"/>
    <text x="868" y="333" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">2,207</text>
    <text x="849" y="585" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">2023</text>
  </g>

  <!-- 2024: R&amp;D 1340 (LOW), OP 2162 -->
  <g>
    <rect x="928" y="426" width="32" height="134" fill="#8b5cf6" rx="3"/>
    <text x="944" y="420" font-family="-apple-system, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">1,340</text>
    <rect x="966" y="344" width="32" height="216" fill="#fbbf24" rx="3"/>
    <text x="982" y="338" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">2,162</text>
    <text x="963" y="585" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">2024</text>
  </g>

  <!-- 2025: R&amp;D 1958, OP 2578 (MAX) -->
  <g>
    <rect x="1042" y="364" width="32" height="196" fill="#8b5cf6" rx="3"/>
    <text x="1058" y="358" font-family="-apple-system, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">1,958</text>
    <rect x="1080" y="302" width="32" height="258" fill="#22c55e" stroke="#fde68a" stroke-width="2" rx="3"/>
    <text x="1096" y="294" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">2,578 ★</text>
    <text x="1077" y="585" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">2025</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 622)">
    <rect x="0" y="0" width="28" height="18" fill="#8b5cf6"/>
    <text x="36" y="14" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">연구개발비 (R&amp;D)</text>
    <rect x="180" y="0" width="28" height="18" fill="#fbbf24"/>
    <text x="216" y="14" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">영업이익</text>
    <text x="330" y="14" font-family="-apple-system, sans-serif" font-size="14" fill="#fbbf24">★ = 사상 최대 (9년 범위)</text>
  </g>

  <!-- Insight box -->
  <g transform="translate(60, 660)">
    <rect x="0" y="0" width="1080" height="44" fill="#1e293b" rx="6"/>
    <text x="24" y="28" font-family="-apple-system, sans-serif" font-size="15" font-weight="600" fill="#f1f5f9">2020년 R&amp;D 3,724억(매출 34.6%) 태움 → 2020년 영업이익 490억 바닥 → 5년 뒤 2025년 영업이익 2,578억 사상 최대</text>
  </g>
</svg>
