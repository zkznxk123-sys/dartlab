<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>한미약품 4번의 라이선스 반환 쇼크 타임라인 2015~2022</title>
  <desc>사노피·베링거·얀센·GSK 계약과 반환, 총 $54억+ 계약이 공중분해된 흐름</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="64" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">$54억 계약이 공중분해된 네 번의 반환</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2015~2022 한미약품 기술수출 4건의 체결(녹색)과 반환(빨강) 타임라인</text>

  <!-- Timeline axis -->
  <line x1="80" y1="380" x2="1120" y2="380" stroke="#334155" stroke-width="3"/>
  <g font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    <text x="130" y="420">2015</text><circle cx="130" cy="380" r="6" fill="#64748b"/>
    <text x="280" y="420">2016</text><circle cx="280" cy="380" r="6" fill="#64748b"/>
    <text x="430" y="420">2017</text><circle cx="430" cy="380" r="6" fill="#64748b"/>
    <text x="580" y="420">2018</text><circle cx="580" cy="380" r="6" fill="#64748b"/>
    <text x="730" y="420">2019</text><circle cx="730" cy="380" r="6" fill="#64748b"/>
    <text x="880" y="420">2020</text><circle cx="880" cy="380" r="6" fill="#64748b"/>
    <text x="1030" y="420">2021</text><circle cx="1030" cy="380" r="6" fill="#64748b"/>
  </g>

  <!-- 사노피 퀀텀: 2015 체결 → 2020 반환 -->
  <g>
    <line x1="130" y1="380" x2="130" y2="180" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="130" cy="180" r="10" fill="#22c55e"/>
    <text x="148" y="165" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac">사노피 체결</text>
    <text x="148" y="183" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">당뇨 3종 · $39억</text>

    <line x1="880" y1="380" x2="880" y2="180" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="880" cy="180" r="12" fill="#ef4444"/>
    <text x="898" y="165" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fca5a5">사노피 반환 2020.5</text>
    <text x="898" y="183" font-family="-apple-system, sans-serif" font-size="13" fill="#fca5a5">영업이익 -53% 충격</text>

    <line x1="130" y1="175" x2="880" y2="175" stroke="#dc2626" stroke-width="2.5"/>
  </g>

  <!-- 베링거인겔하임 HM61713: 2015 체결 → 2016 반환 -->
  <g>
    <line x1="130" y1="380" x2="130" y2="250" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="130" cy="250" r="9" fill="#22c55e"/>
    <text x="22" y="245" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#86efac">베링거 체결</text>
    <text x="22" y="262" font-family="-apple-system, sans-serif" font-size="12" fill="#cbd5e1">폐암 $7.3억</text>

    <line x1="280" y1="380" x2="280" y2="250" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="280" cy="250" r="11" fill="#dc2626"/>
    <text x="300" y="247" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fca5a5">베링거 반환 2016.9</text>
    <text x="300" y="265" font-family="-apple-system, sans-serif" font-size="12" fill="#fca5a5">주가 -18% 하루 폭락</text>

    <line x1="130" y1="245" x2="280" y2="245" stroke="#dc2626" stroke-width="2.5"/>
  </g>

  <!-- 얀센 HM12525A: 2015 체결 → 2019 반환 -->
  <g>
    <line x1="130" y1="380" x2="130" y2="320" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="130" cy="320" r="8" fill="#22c55e"/>
    <text x="22" y="315" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#86efac">얀센 체결</text>
    <text x="22" y="332" font-family="-apple-system, sans-serif" font-size="11" fill="#cbd5e1">$9.15억</text>

    <line x1="730" y1="380" x2="730" y2="320" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="730" cy="320" r="10" fill="#dc2626"/>
    <text x="748" y="315" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">얀센 반환 2019.7</text>
    <text x="748" y="333" font-family="-apple-system, sans-serif" font-size="11" fill="#fca5a5">당뇨·비만 안전성 시그널</text>

    <line x1="130" y1="315" x2="730" y2="315" stroke="#dc2626" stroke-width="2"/>
  </g>

  <!-- GSK/릴리: 2019 체결 → 2021~2022 부분 반환 -->
  <g>
    <line x1="730" y1="380" x2="730" y2="540" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="730" cy="540" r="9" fill="#22c55e"/>
    <text x="560" y="538" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#86efac" text-anchor="end">GSK/릴리 체결</text>
    <text x="560" y="556" font-family="-apple-system, sans-serif" font-size="11" fill="#cbd5e1" text-anchor="end">희귀질환 (미공개)</text>

    <line x1="1030" y1="380" x2="1030" y2="540" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="1030" cy="540" r="10" fill="#dc2626"/>
    <text x="1050" y="538" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">부분 반환 2021~22</text>
    <text x="1050" y="556" font-family="-apple-system, sans-serif" font-size="11" fill="#fca5a5">포트폴리오 재편</text>

    <line x1="730" y1="545" x2="1030" y2="545" stroke="#dc2626" stroke-width="2"/>
  </g>

  <!-- Total box -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="540" y="36" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#fbbf24" text-anchor="middle">4번 반환 · 총 계약 규모 $54억+ (약 7.5조)</text>
    <text x="540" y="70" font-family="-apple-system, sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">이미 인식한 upfront + 마일스톤은 유지, 미래 로열티 손실. 이것이 2020년 영업이익 490억 바닥의 직접 원인</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80, 460)">
    <circle cx="8" cy="8" r="6" fill="#22c55e"/>
    <text x="22" y="13" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">계약 체결</text>
    <circle cx="108" cy="8" r="6" fill="#dc2626"/>
    <text x="122" y="13" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">계약 반환</text>
    <line x1="210" y1="8" x2="270" y2="8" stroke="#dc2626" stroke-width="2.5"/>
    <text x="282" y="13" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">계약 기간</text>
  </g>
</svg>
