<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>엔씨소프트 2020~2022 현금 축적과 판교 R&D 센터 5조 투자</title>
  <desc>리니지W 피크에서 번 돈이 판교 사옥·자사주·현금으로 흘러간 경로</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">쌓아둔 3조 — 돈은 어디로 갔는가</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2020~2024 영업활동현금흐름 2.3조 — 판교 사옥 5조·자사주 2,700억·현금 1.26조</text>

  <!-- Source box (left) -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="280" height="460" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" rx="12"/>
    <text x="140" y="40" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#86efac" text-anchor="middle">유입 — OCF 누계</text>
    <text x="140" y="66" font-family="-apple-system, sans-serif" font-size="14" fill="#d1fae5" text-anchor="middle">2020~2024 영업활동현금흐름</text>

    <line x1="30" y1="90" x2="250" y2="90" stroke="#334155"/>

    <text x="30" y="125" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">2020</text>
    <text x="250" y="125" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">7,076억</text>

    <text x="30" y="160" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">2021</text>
    <text x="250" y="160" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">3,911억</text>

    <text x="30" y="195" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">2022</text>
    <text x="250" y="195" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">7,360억</text>

    <text x="30" y="230" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">2023</text>
    <text x="250" y="230" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">1,399억</text>

    <text x="30" y="265" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">2024</text>
    <text x="250" y="265" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">1,070억</text>

    <text x="30" y="300" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">2025</text>
    <text x="250" y="300" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">1,620억</text>

    <line x1="30" y1="330" x2="250" y2="330" stroke="#fbbf24" stroke-width="2"/>

    <text x="30" y="365" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#fbbf24">합계</text>
    <text x="250" y="365" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fbbf24" text-anchor="end">약 2.24조</text>

    <text x="30" y="400" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">+ 기존 누적 자본</text>
    <text x="250" y="400" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="end">약 2.4조</text>

    <rect x="30" y="415" width="220" height="35" fill="#052e16" stroke="#22c55e" stroke-width="1.5" rx="4"/>
    <text x="140" y="438" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">현 자본 3.37조 · 현금 3조</text>
  </g>

  <!-- Arrows to destinations -->
  <g>
    <path d="M 340 280 L 480 220" stroke="#fbbf24" stroke-width="3" fill="none"/>
    <path d="M 475 225 L 468 212 L 484 217 Z" fill="#fbbf24"/>
    <path d="M 340 380 L 480 380" stroke="#fbbf24" stroke-width="3" fill="none"/>
    <path d="M 475 380 L 462 370 L 462 390 Z" fill="#fbbf24"/>
    <path d="M 340 460 L 480 530" stroke="#fbbf24" stroke-width="3" fill="none"/>
    <path d="M 475 525 L 465 535 L 480 545 Z" fill="#fbbf24"/>
  </g>

  <!-- Destination 1: 판교 R&D 센터 -->
  <g transform="translate(500, 140)">
    <rect x="0" y="0" width="340" height="175" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5" rx="12"/>
    <text x="20" y="35" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fde68a">① 판교 R&amp;D 센터</text>
    <text x="20" y="62" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">경기 성남 분당구 · 지상 17층 · 9만 평</text>

    <line x1="20" y1="80" x2="320" y2="80" stroke="#334155"/>

    <text x="20" y="110" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">2020 유형자산 취득</text>
    <text x="320" y="110" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fde68a" text-anchor="end">-1.72조</text>

    <text x="20" y="135" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">2022 유형자산 취득</text>
    <text x="320" y="135" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fde68a" text-anchor="end">-5.31조</text>

    <rect x="20" y="148" width="300" height="24" fill="#422006" stroke="#f59e0b" rx="3"/>
    <text x="170" y="165" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">누적 약 5~6조 (부지+건축)</text>
  </g>

  <!-- Destination 2: 자사주 -->
  <g transform="translate(500, 330)">
    <rect x="0" y="0" width="340" height="105" fill="#1e293b" stroke="#8b5cf6" stroke-width="2.5" rx="12"/>
    <text x="20" y="35" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#c4b5fd">② 자사주 매입</text>
    <text x="20" y="62" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">주주환원 — 주가 하락 시점 집중 매입</text>

    <line x1="20" y1="75" x2="320" y2="75" stroke="#334155"/>

    <text x="20" y="95" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">2021 1,643억 + 2024 1,071억 = 약 2,700억</text>
  </g>

  <!-- Destination 3: 현금 잔액 -->
  <g transform="translate(500, 460)">
    <rect x="0" y="0" width="340" height="135" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" rx="12"/>
    <text x="20" y="35" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#86efac">③ 현금·금융자산</text>
    <text x="20" y="62" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">이자수익으로 돌아오는 방어벽</text>

    <line x1="20" y1="75" x2="320" y2="75" stroke="#334155"/>

    <text x="20" y="100" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">2024Q4 현금성 자산</text>
    <text x="320" y="100" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#86efac" text-anchor="end">1.26조</text>

    <text x="20" y="125" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">+ 단기·장기 금융상품</text>
    <text x="320" y="125" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#86efac" text-anchor="end">약 3조</text>
  </g>

  <!-- Right-side consequence panel -->
  <g transform="translate(870, 160)">
    <rect x="0" y="0" width="280" height="460" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="12"/>
    <text x="140" y="40" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">그 결과</text>

    <text x="140" y="75" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">2024~2025 재무 프로필</text>

    <line x1="20" y1="95" x2="260" y2="95" stroke="#334155"/>

    <text x="20" y="125" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">자본총계</text>
    <text x="260" y="125" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#86efac" text-anchor="end">3.37조</text>

    <text x="20" y="155" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">부채비율</text>
    <text x="260" y="155" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#86efac" text-anchor="end">28.6%</text>

    <text x="20" y="185" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">유동비율</text>
    <text x="260" y="185" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#86efac" text-anchor="end">353.5%</text>

    <text x="20" y="215" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">신용등급</text>
    <text x="260" y="215" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="end">dCR-A+</text>

    <line x1="20" y1="240" x2="260" y2="240" stroke="#334155"/>

    <text x="140" y="275" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">→ 2024 영업 -1,092억</text>
    <text x="140" y="298" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">본업이 흔들려도</text>
    <text x="140" y="316" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">순이익 +941억 흑자</text>

    <text x="140" y="355" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">→ 2025 영업 161억</text>
    <text x="140" y="378" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">순이익 3,474억</text>
    <text x="140" y="396" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">(영업의 21배)</text>

    <line x1="20" y1="415" x2="260" y2="415" stroke="#fbbf24"/>

    <text x="140" y="440" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a" text-anchor="middle" font-style="italic">쌓아둔 돈의 이자가</text>
    <text x="140" y="456" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a" text-anchor="middle" font-style="italic">본업을 대신해 벌었다</text>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="695" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">출처: c.select("CF"/"BS") 2018~2025 · 판교 R&amp;D 센터 투자는 유형자산 취득 계정 추정</text>
</svg>
