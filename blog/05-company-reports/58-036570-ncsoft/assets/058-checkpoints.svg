<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>2026~2028 엔씨소프트 관찰 4가지 체크포인트</title>
  <desc>신작·주주환원·M&amp;A·구조조정 — 게임회사인지 금융투자회사인지 판가름 신호</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2028 엔씨 관찰 4가지</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">게임회사로 돌아오는가, 금융투자회사로 내려앉는가 — 4개 신호의 값</text>

  <!-- Signal 1 -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#22c55e"/>
    <text x="50" y="71" font-family="-apple-system, sans-serif" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
    <text x="100" y="38" font-family="-apple-system, sans-serif" font-size="19" font-weight="700" fill="#f1f5f9">신작 파이프라인 — LLL / 배너스오브루인 / 아이온2</text>
    <text x="100" y="62" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">2026~2028 출시 예정. TL 이후 최초 메이저 신작들.</text>

    <rect x="100" y="78" width="380" height="34" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">출시 첫 6개월 CCU 10만+ → 게임회사 복귀</text>

    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">CCU 5만 이하 이탈 → 리니지 재의존 장기화</text>
  </g>

  <!-- Signal 2 -->
  <g transform="translate(60, 285)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#fbbf24"/>
    <text x="50" y="71" font-family="-apple-system, sans-serif" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">2</text>
    <text x="100" y="38" font-family="-apple-system, sans-serif" font-size="19" font-weight="700" fill="#f1f5f9">주주환원 — 배당성향 50%+ 또는 특별배당</text>
    <text x="100" y="62" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">현재 배당성향 약 30%. 쌓인 3조의 분배 요구 확대 중.</text>

    <rect x="100" y="78" width="380" height="34" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">배당성향 50%+ → 금융투자회사 전환 확정</text>

    <rect x="500" y="78" width="380" height="34" fill="#1e1b4b" stroke="#6366F1" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#c7d2fe" text-anchor="middle">30% 유지 → 신작 투자 재원 확보 시그널</text>
  </g>

  <!-- Signal 3 -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#8b5cf6"/>
    <text x="50" y="71" font-family="-apple-system, sans-serif" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">3</text>
    <text x="100" y="38" font-family="-apple-system, sans-serif" font-size="19" font-weight="700" fill="#f1f5f9">현금 사용처 — M&amp;A 또는 IP 라이선스 인수</text>
    <text x="100" y="62" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">3조 중 일부가 글로벌 스튜디오 지분 · AAA IP 인수에 투입되는가.</text>

    <rect x="100" y="78" width="380" height="34" fill="#2e1065" stroke="#a855f7" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">글로벌 M&amp;A 1건+ → 성장 시나리오 유지</text>

    <rect x="500" y="78" width="380" height="34" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">M&amp;A 0건 → 쌓인 현금의 정적 축적 지속</text>
  </g>

  <!-- Signal 4 -->
  <g transform="translate(60, 575)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#ef4444"/>
    <text x="50" y="71" font-family="-apple-system, sans-serif" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">4</text>
    <text x="100" y="38" font-family="-apple-system, sans-serif" font-size="19" font-weight="700" fill="#f1f5f9">판관비 인건비 — 3,900명에서 추가 감축 여부</text>
    <text x="100" y="62" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">2022 4,800명 → 2025 3,900명 (-18%). 추가 감축 = 체질 개선 지속.</text>

    <rect x="100" y="78" width="380" height="34" fill="#1e293b" stroke="#94a3b8" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">인력 유지 3,900명 → 정상화 국면</text>

    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">추가 감축 → 본업 회복 난항 신호</text>
  </g>
</svg>
