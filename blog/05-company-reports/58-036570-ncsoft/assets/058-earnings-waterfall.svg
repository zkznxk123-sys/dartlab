<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>엔씨소프트 2025 영업이익 161억 → 순이익 3,474억 재구성</title>
  <desc>영업이익에서 순이익까지 21배 증폭되는 과정 — 금융수익·지분법·자산처분·세금</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">영업 161억이 순이익 3,474억이 되는 경로</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2025년 엔씨소프트 — 쌓아둔 3조가 금리 상승기에 이자수익으로 돌아온 해</text>

  <!-- Waterfall chart -->
  <g transform="translate(60, 160)">
    <!-- Baseline (0) -->
    <line x1="0" y1="400" x2="1080" y2="400" stroke="#334155" stroke-width="1.5"/>

    <!-- 영업이익 +161 -->
    <rect x="20" y="390" width="90" height="10" fill="#22c55e" rx="2"/>
    <text x="65" y="380" font-family="-apple-system, sans-serif" font-size="14" fill="#86efac" text-anchor="middle">+161</text>
    <text x="65" y="430" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">영업이익</text>

    <!-- 금융수익 +1,650 -->
    <rect x="150" y="290" width="90" height="100" fill="#fbbf24" rx="2"/>
    <text x="195" y="280" font-family="-apple-system, sans-serif" font-size="14" fill="#fde68a" text-anchor="middle">+1,650</text>
    <text x="195" y="430" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">금융수익</text>
    <text x="195" y="447" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(이자+평가익)</text>

    <!-- 금융비용 -200 -->
    <rect x="280" y="390" width="90" height="15" fill="#ef4444" rx="2"/>
    <text x="325" y="420" font-family="-apple-system, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">-200</text>
    <text x="325" y="460" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">금융비용</text>

    <!-- 지분법손익 +650 -->
    <rect x="410" y="350" width="90" height="40" fill="#fbbf24" rx="2"/>
    <text x="455" y="340" font-family="-apple-system, sans-serif" font-size="14" fill="#fde68a" text-anchor="middle">+650</text>
    <text x="455" y="430" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">지분법손익</text>
    <text x="455" y="447" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(자회사)</text>

    <!-- 기타영업외 +1,740 -->
    <rect x="540" y="285" width="90" height="105" fill="#fbbf24" rx="2"/>
    <text x="585" y="275" font-family="-apple-system, sans-serif" font-size="14" fill="#fde68a" text-anchor="middle">+1,740</text>
    <text x="585" y="430" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">기타영업외</text>
    <text x="585" y="447" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(처분익·외환 등)</text>

    <!-- 세전이익 =4,200 -->
    <rect x="670" y="150" width="90" height="250" fill="#6366F1" stroke="#fbbf24" stroke-width="2" rx="2"/>
    <text x="715" y="140" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#c7d2fe" text-anchor="middle">≈ 4,200</text>
    <text x="715" y="430" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">세전이익</text>

    <!-- 법인세 -726 -->
    <rect x="800" y="400" width="90" height="45" fill="#ef4444" rx="2"/>
    <text x="845" y="460" font-family="-apple-system, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">-726</text>
    <text x="845" y="480" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">법인세</text>

    <!-- 순이익 +3,474 -->
    <rect x="930" y="193" width="120" height="207" fill="#22c55e" stroke="#fbbf24" stroke-width="3" rx="2"/>
    <text x="990" y="180" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fde68a" text-anchor="middle">+3,474 ★</text>
    <text x="990" y="430" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">순이익</text>
  </g>

  <!-- Multiplier badge -->
  <g transform="translate(900, 450)">
    <rect x="-40" y="100" width="240" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="12"/>
    <text x="80" y="130" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">영업이익 대비 순이익</text>
    <text x="80" y="172" font-family="-apple-system, sans-serif" font-size="42" font-weight="800" fill="#fbbf24" text-anchor="middle">× 21.6배</text>
  </g>

  <!-- Insight box -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="80" fill="#1e293b" rx="8"/>
    <text x="24" y="30" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8">영업외 + 4,040억 = 금융수익 1,650 + 지분법 650 + 기타 1,740 (금융비용 200 제외)</text>
    <text x="24" y="56" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">쌓아둔 3조가 금리 상승기 이자수익으로 돌아온 흔적 — 게임회사가 부분적으로 금융투자회사가 되고 있다</text>
  </g>
</svg>
