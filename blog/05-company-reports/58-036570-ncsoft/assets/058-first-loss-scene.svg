<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>엔씨소프트 2024년 첫 영업적자 -1,092억 — 28년 기록이 깨진 하루</title>
  <desc>1997 창업 이래 28년 연속 흑자였던 엔씨소프트가 2024년 처음으로 영업손실 -1,092억을 기록한 장면</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">28년 연속 흑자 기록이 깨진 하루</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2024년 3월 — 엔씨소프트 창사 이래 첫 영업손실 -1,092억 공시</text>

  <!-- Axis -->
  <line x1="80" y1="480" x2="1140" y2="480" stroke="#334155" stroke-width="2"/>

  <!-- Year markers -->
  <g font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="120" y="510">1997</text><circle cx="120" cy="480" r="5" fill="#64748b"/>
    <text x="270" y="510">2001</text><circle cx="270" cy="480" r="5" fill="#64748b"/>
    <text x="420" y="510">2008</text><circle cx="420" cy="480" r="5" fill="#64748b"/>
    <text x="560" y="510">2017</text><circle cx="560" cy="480" r="5" fill="#64748b"/>
    <text x="720" y="510">2020</text><circle cx="720" cy="480" r="5" fill="#64748b"/>
    <text x="870" y="510">2022</text><circle cx="870" cy="480" r="5" fill="#64748b"/>
    <text x="1010" y="510">2024</text><circle cx="1010" cy="480" r="9" fill="#ef4444"/>
    <text x="1110" y="510">2025</text><circle cx="1110" cy="480" r="5" fill="#22c55e"/>
  </g>

  <!-- 28년 흑자 긴 박스 (1997~2023) -->
  <rect x="120" y="260" width="880" height="200" fill="#22c55e" opacity="0.25" rx="4"/>
  <rect x="120" y="260" width="880" height="200" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3" rx="4"/>
  <text x="560" y="300" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#86efac" text-anchor="middle">1997 ~ 2023 · 27년 연속 흑자</text>
  <text x="560" y="340" font-family="-apple-system, sans-serif" font-size="16" fill="#d1fae5" text-anchor="middle">창업 → 리니지1(1998) → 상장(2000) → 리니지M(2017) → 리니지W(2021)</text>
  <text x="560" y="368" font-family="-apple-system, sans-serif" font-size="16" fill="#d1fae5" text-anchor="middle">영업이익 최저 1,039억 (2003) · 최고 8,248억 (2020)</text>

  <!-- 2024 적자 박스 (강조) -->
  <rect x="1000" y="540" width="80" height="130" fill="#ef4444" stroke="#fbbf24" stroke-width="3" rx="4"/>
  <text x="1040" y="575" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fef2f2" text-anchor="middle">2024</text>
  <text x="1040" y="600" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fef2f2" text-anchor="middle">-1,092억</text>
  <text x="1040" y="628" font-family="-apple-system, sans-serif" font-size="12" fill="#fde68a" text-anchor="middle">창사 첫</text>
  <text x="1040" y="645" font-family="-apple-system, sans-serif" font-size="12" fill="#fde68a" text-anchor="middle">영업적자</text>

  <!-- 2025 복귀 박스 -->
  <rect x="1095" y="440" width="50" height="38" fill="#22c55e" rx="3"/>
  <text x="1120" y="465" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#0a0e1a" text-anchor="middle">+161억</text>
  <text x="1120" y="430" font-family="-apple-system, sans-serif" font-size="12" fill="#86efac" text-anchor="middle">2025 Q</text>

  <!-- Arrow from 2023 to 2024 -->
  <path d="M 920 450 Q 950 560 1000 600" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-dasharray="5,3"/>
  <text x="940" y="520" font-family="-apple-system, sans-serif" font-size="13" fill="#fca5a5" text-anchor="middle">매출 -31% + TL 실패</text>

  <!-- Event annotations -->
  <g font-family="-apple-system, sans-serif">
    <!-- 1997 창업 -->
    <line x1="120" y1="480" x2="120" y2="180" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="120" y="170" font-size="13" fill="#cbd5e1" text-anchor="middle">NC 창업</text>
    <text x="120" y="153" font-size="11" fill="#94a3b8" text-anchor="middle">삼성동 8평</text>

    <!-- 1998 리니지1 -->
    <line x1="155" y1="480" x2="155" y2="215" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="155" y="205" font-size="13" fill="#86efac" text-anchor="middle">리니지1</text>

    <!-- 2000 상장 -->
    <line x1="235" y1="480" x2="235" y2="180" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="235" y="170" font-size="13" fill="#fde68a" text-anchor="middle">코스닥 상장</text>

    <!-- 2017 리니지M -->
    <line x1="560" y1="480" x2="560" y2="215" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="560" y="205" font-size="14" fill="#86efac" text-anchor="middle" font-weight="600">리니지M 모바일</text>
    <text x="560" y="188" font-size="11" fill="#94a3b8" text-anchor="middle">하루 107억 매출</text>

    <!-- 2020 COVID -->
    <line x1="720" y1="480" x2="720" y2="180" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="720" y="170" font-size="13" fill="#fde68a" text-anchor="middle">영업이익 사상최대</text>
    <text x="720" y="153" font-size="11" fill="#94a3b8" text-anchor="middle">8,248억 (COVID)</text>

    <!-- 2022 매출 피크 -->
    <line x1="870" y1="480" x2="870" y2="210" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="870" y="200" font-size="13" fill="#fde68a" text-anchor="middle">매출 피크 2.57조</text>

    <!-- 2023 TL 출시 -->
    <line x1="960" y1="480" x2="960" y2="180" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="960" y="170" font-size="13" fill="#fca5a5" text-anchor="middle">TL 출시 실패</text>
    <text x="960" y="153" font-size="11" fill="#94a3b8" text-anchor="middle">2023.12</text>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(60, 680)">
    <rect x="0" y="-14" width="1080" height="38" fill="#1e293b" rx="6"/>
    <text x="540" y="10" font-family="-apple-system, sans-serif" font-size="15" font-weight="600" fill="#f1f5f9" text-anchor="middle">리니지 단일 IP 23년 의존 + 판교 5조 사옥 + TL 실패 + 판관비 고정비 = 28년 연속 흑자가 끊긴 해</text>
  </g>
</svg>
