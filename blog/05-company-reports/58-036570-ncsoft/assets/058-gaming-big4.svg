<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <title>한국 게임 빅4 영업이익률 5년 비교 2021~2025</title>
  <desc>엔씨소프트·넥슨·넷마블·크래프톤 수익성 이력 — 엔씨가 1위에서 3위로 내려온 경로</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">한국 게임 빅4 — 엔씨가 3위로 내려온 5년</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2021년 엔씨(OPM 16.2%) > 넷마블. 2025년 엔씨(1.1%) < 크래프톤 · 넥슨. IP 다각화가 결정했다</text>

  <!-- Header -->
  <g font-family="-apple-system, sans-serif" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="600">
    <text x="260" y="185">2021</text>
    <text x="430" y="185">2022</text>
    <text x="600" y="185">2023</text>
    <text x="770" y="185">2024</text>
    <text x="940" y="185">2025</text>
  </g>

  <!-- 넥슨 -->
  <g>
    <text x="60" y="245" font-size="17" fill="#f1f5f9" font-weight="600">넥슨</text>
    <text x="60" y="265" font-size="13" fill="#64748b">(도쿄 3659.JP)</text>
    <rect x="180" y="210" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="260" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+30.5</text>
    <rect x="350" y="210" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="430" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+29.8</text>
    <rect x="520" y="210" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="600" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+31.2</text>
    <rect x="690" y="210" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="770" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+25.6</text>
    <rect x="860" y="210" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="940" y="248" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+27.8</text>
    <text x="1060" y="248" font-size="14" fill="#86efac" font-weight="700">★ 1위</text>
  </g>

  <!-- 크래프톤 -->
  <g>
    <text x="60" y="325" font-size="17" fill="#f1f5f9" font-weight="600">크래프톤</text>
    <text x="60" y="345" font-size="13" fill="#64748b">259960</text>
    <rect x="180" y="290" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="260" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+37.6</text>
    <rect x="350" y="290" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="430" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+30.2</text>
    <rect x="520" y="290" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="600" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+28.9</text>
    <rect x="690" y="290" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="770" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+23.8</text>
    <rect x="860" y="290" width="160" height="60" fill="#22c55e" rx="4"/>
    <text x="940" y="328" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+25.4</text>
    <text x="1060" y="328" font-size="14" fill="#86efac" font-weight="700">★ 2위</text>
  </g>

  <!-- 엔씨소프트 (강조) -->
  <g>
    <rect x="50" y="382" width="1000" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="8"/>
    <text x="60" y="417" font-size="17" fill="#fbbf24" font-weight="700">엔씨소프트</text>
    <text x="60" y="439" font-size="13" fill="#fde68a">036570 ★</text>
    <rect x="180" y="390" width="160" height="55" fill="#22c55e" rx="4"/>
    <text x="260" y="425" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+16.2</text>
    <rect x="350" y="390" width="160" height="55" fill="#86efac" rx="4"/>
    <text x="430" y="425" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+21.7</text>
    <rect x="520" y="390" width="160" height="55" fill="#bbf7d0" rx="4"/>
    <text x="600" y="425" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+7.7</text>
    <rect x="690" y="390" width="160" height="55" fill="#dc2626" rx="4"/>
    <text x="770" y="425" font-size="20" font-weight="700" fill="#fef2f2" text-anchor="middle">-6.9</text>
    <rect x="860" y="390" width="160" height="55" fill="#fef9c3" rx="4"/>
    <text x="940" y="425" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+1.1</text>
    <text x="1060" y="425" font-size="14" fill="#fde68a" font-weight="700">3위</text>
  </g>

  <!-- 넷마블 -->
  <g>
    <text x="60" y="495" font-size="17" fill="#f1f5f9" font-weight="600">넷마블</text>
    <text x="60" y="515" font-size="13" fill="#64748b">251270</text>
    <rect x="180" y="460" width="160" height="60" fill="#fef9c3" rx="4"/>
    <text x="260" y="498" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+1.9</text>
    <rect x="350" y="460" width="160" height="60" fill="#fca5a5" rx="4"/>
    <text x="430" y="498" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">-4.6</text>
    <rect x="520" y="460" width="160" height="60" fill="#fca5a5" rx="4"/>
    <text x="600" y="498" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">-2.1</text>
    <rect x="690" y="460" width="160" height="60" fill="#fef9c3" rx="4"/>
    <text x="770" y="498" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+1.2</text>
    <rect x="860" y="460" width="160" height="60" fill="#bbf7d0" rx="4"/>
    <text x="940" y="498" font-size="20" font-weight="700" fill="#0a0e1a" text-anchor="middle">+3.5</text>
    <text x="1060" y="498" font-size="14" fill="#cbd5e1">4위</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 555)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">영업이익률(%) 색상 스케일</text>
    <rect x="0" y="12" width="28" height="22" fill="#22c55e"/><text x="34" y="29" font-size="13" fill="#cbd5e1">+20%↑</text>
    <rect x="100" y="12" width="28" height="22" fill="#86efac"/><text x="134" y="29" font-size="13" fill="#cbd5e1">+10~20%</text>
    <rect x="210" y="12" width="28" height="22" fill="#bbf7d0"/><text x="244" y="29" font-size="13" fill="#cbd5e1">+3~10%</text>
    <rect x="320" y="12" width="28" height="22" fill="#fef9c3"/><text x="354" y="29" font-size="13" fill="#cbd5e1">0~3%</text>
    <rect x="420" y="12" width="28" height="22" fill="#fca5a5"/><text x="454" y="29" font-size="13" fill="#cbd5e1">-5%↓</text>
    <rect x="520" y="12" width="28" height="22" fill="#dc2626"/><text x="554" y="29" font-size="13" fill="#cbd5e1">-5%↓↓ 적자</text>
  </g>

  <!-- Structural analysis panel -->
  <g transform="translate(60, 625)">
    <rect x="0" y="0" width="1080" height="170" fill="#1e293b" rx="10"/>
    <text x="30" y="35" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">구조적 차이 — 한 IP 집중 vs 다각화</text>

    <g font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">
      <text x="30" y="72" font-weight="700" fill="#86efac">넥슨</text><text x="90" y="72">메이플스토리(25년) + 던파 + 서든어택 — IP 다각화 + 중국 텐센트 퍼블리싱</text>
      <text x="30" y="100" font-weight="700" fill="#86efac">크래프톤</text><text x="90" y="100">PUBG 단일 IP지만 글로벌 시장 지배(인도·동남아 1위) + PC·모바일·콘솔 멀티플랫폼</text>
      <text x="30" y="128" font-weight="700" fill="#fbbf24">엔씨소프트</text><text x="120" y="128">리니지 시리즈 3종(M·2M·W) 집중 + 한국 시장 80%+ — TL 실패로 대체 IP 부재 노출</text>
      <text x="30" y="156" font-weight="700" fill="#cbd5e1">넷마블</text><text x="90" y="156">모바일 퍼블리셔 성격 — 마블·세븐나이츠 등 IP 다각, 마진은 낮지만 변동성도 낮음</text>
    </g>
  </g>
</svg>
