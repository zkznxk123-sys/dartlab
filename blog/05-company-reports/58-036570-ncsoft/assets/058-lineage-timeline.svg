<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>리니지 시리즈 연대기 1998~2025 — 한 게임 IP가 만든 28년</title>
  <desc>리니지1부터 리니지W·TL 실패까지 28년간의 출시·매출·BM 변화</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">리니지 한 IP가 만든 28년</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">월정액 → 부분유료화 → 확률형 아이템, BM 3단계 진화와 함께 성장한 IP</text>

  <!-- Central timeline -->
  <line x1="80" y1="380" x2="1140" y2="380" stroke="#334155" stroke-width="2"/>

  <!-- Years -->
  <g font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="120" y="402">1998</text>
    <text x="260" y="402">2003</text>
    <text x="400" y="402">2008</text>
    <text x="540" y="402">2017</text>
    <text x="700" y="402">2019</text>
    <text x="860" y="402">2021</text>
    <text x="1020" y="402">2023</text>
    <text x="1140" y="402">2025</text>
  </g>

  <!-- BM Phase backgrounds -->
  <rect x="100" y="420" width="280" height="40" fill="#6366F1" opacity="0.25" rx="3"/>
  <text x="240" y="446" font-family="-apple-system, sans-serif" font-size="14" fill="#c7d2fe" text-anchor="middle">BM 1단계 — 월정액 (29,700원)</text>

  <rect x="380" y="420" width="200" height="40" fill="#8b5cf6" opacity="0.25" rx="3"/>
  <text x="480" y="446" font-family="-apple-system, sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle">BM 2단계 — 부분유료화</text>

  <rect x="580" y="420" width="560" height="40" fill="#ec4899" opacity="0.3" rx="3"/>
  <text x="860" y="446" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#fbcfe8" text-anchor="middle">BM 3단계 — 확률형 아이템 (월 ARPU 50만원)</text>

  <!-- Game releases (top) -->
  <!-- 리니지1 -->
  <g>
    <circle cx="120" cy="380" r="14" fill="#22c55e"/>
    <line x1="120" y1="366" x2="120" y2="260" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="70" y="190" width="100" height="70" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="120" y="215" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">리니지1</text>
    <text x="120" y="236" font-family="-apple-system, sans-serif" font-size="12" fill="#d1fae5" text-anchor="middle">1998.09</text>
    <text x="120" y="252" font-family="-apple-system, sans-serif" font-size="11" fill="#d1fae5" text-anchor="middle">PC 한국</text>
  </g>

  <!-- 리니지2 -->
  <g>
    <circle cx="260" cy="380" r="12" fill="#6366F1"/>
    <line x1="260" y1="368" x2="260" y2="290" stroke="#6366F1" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="215" y="220" width="90" height="70" fill="#1e293b" stroke="#6366F1" stroke-width="2" rx="6"/>
    <text x="260" y="245" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#c7d2fe" text-anchor="middle">리니지2</text>
    <text x="260" y="266" font-family="-apple-system, sans-serif" font-size="12" fill="#dbeafe" text-anchor="middle">2003.10</text>
    <text x="260" y="282" font-family="-apple-system, sans-serif" font-size="11" fill="#dbeafe" text-anchor="middle">PC 3D</text>
  </g>

  <!-- 아이온·블소 -->
  <g>
    <circle cx="400" cy="380" r="10" fill="#94a3b8"/>
    <line x1="400" y1="370" x2="400" y2="300" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="360" y="240" width="80" height="60" fill="#1e293b" stroke="#94a3b8" stroke-width="1" rx="5"/>
    <text x="400" y="262" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">아이온</text>
    <text x="400" y="280" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">블소</text>
    <text x="400" y="295" font-family="-apple-system, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">2008~11</text>
  </g>

  <!-- 리니지M (모바일) -->
  <g>
    <circle cx="540" cy="380" r="16" fill="#ec4899" stroke="#fbbf24" stroke-width="2"/>
    <line x1="540" y1="364" x2="540" y2="230" stroke="#ec4899" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="470" y="140" width="140" height="90" fill="#1e293b" stroke="#ec4899" stroke-width="2" rx="6"/>
    <text x="540" y="168" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fbcfe8" text-anchor="middle">리니지M ★</text>
    <text x="540" y="190" font-family="-apple-system, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">2017.06 모바일</text>
    <text x="540" y="208" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">사전예약 500만</text>
    <text x="540" y="225" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">첫날 107억</text>
  </g>

  <!-- 리니지2M -->
  <g>
    <circle cx="700" cy="380" r="12" fill="#ec4899"/>
    <line x1="700" y1="368" x2="700" y2="290" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="655" y="220" width="90" height="70" fill="#1e293b" stroke="#ec4899" stroke-width="1.5" rx="6"/>
    <text x="700" y="245" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#fbcfe8" text-anchor="middle">리니지2M</text>
    <text x="700" y="264" font-family="-apple-system, sans-serif" font-size="11" fill="#fce7f3" text-anchor="middle">2019.11</text>
    <text x="700" y="280" font-family="-apple-system, sans-serif" font-size="11" fill="#fce7f3" text-anchor="middle">모바일</text>
  </g>

  <!-- 리니지W (글로벌) -->
  <g>
    <circle cx="860" cy="380" r="16" fill="#ec4899" stroke="#fbbf24" stroke-width="2"/>
    <line x1="860" y1="364" x2="860" y2="230" stroke="#ec4899" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="790" y="140" width="140" height="90" fill="#1e293b" stroke="#ec4899" stroke-width="2" rx="6"/>
    <text x="860" y="168" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fbcfe8" text-anchor="middle">리니지W ★</text>
    <text x="860" y="190" font-family="-apple-system, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">2021.11 글로벌</text>
    <text x="860" y="208" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">매출 2.57조</text>
    <text x="860" y="225" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">정점 (2022)</text>
  </g>

  <!-- TL (실패) -->
  <g>
    <circle cx="1020" cy="380" r="14" fill="#ef4444" stroke="#fbbf24" stroke-width="2"/>
    <line x1="1020" y1="366" x2="1020" y2="260" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="960" y="190" width="120" height="70" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="1020" y="213" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">TL (실패)</text>
    <text x="1020" y="233" font-family="-apple-system, sans-serif" font-size="12" fill="#fecaca" text-anchor="middle">2023.12 PC</text>
    <text x="1020" y="250" font-family="-apple-system, sans-serif" font-size="11" fill="#fecaca" text-anchor="middle">한국 CCU 5만 이하</text>
  </g>

  <!-- 2024 첫 적자 -->
  <g>
    <circle cx="1095" cy="380" r="12" fill="#ef4444"/>
    <line x1="1095" y1="392" x2="1095" y2="500" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="1045" y="510" width="100" height="55" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="1095" y="534" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">2024</text>
    <text x="1095" y="553" font-family="-apple-system, sans-serif" font-size="11" fill="#fecaca" text-anchor="middle">영업 -1,092억</text>
  </g>

  <!-- Bottom narrative -->
  <g transform="translate(60, 615)">
    <rect x="0" y="0" width="1080" height="72" fill="#1e293b" rx="8"/>
    <text x="24" y="30" font-family="-apple-system, sans-serif" font-size="16" fill="#f1f5f9">
      <tspan fill="#fbbf24" font-weight="700">★ = 매출 피크 주역 게임.</tspan>
      <tspan> 리니지M(2017)과 리니지W(2021)가 각각 모바일 시대의 한 축을 열었다.</tspan>
    </text>
    <text x="24" y="56" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">
      <tspan>TL(2023.12)가 리니지 이후 최초의 대작 신작이었으나 한국 시장 반응 부정적 → 2024년 첫 영업적자의 직접 원인.</tspan>
    </text>
  </g>
</svg>
