<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>판관비 1,965억 절감이 만든 2024 → 2025 영업이익 턴어라운드</title>
  <desc>구조조정 인력 18% 감축과 마케팅 축소로 판관비 2,000억 줄여 적자에서 흑자로</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">판관비 절감 -1,965억이 만든 흑자 복귀</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2024 영업 -1,092억 → 2025 영업 +161억 — 매출 감소에도 비용을 더 크게 잘라낸 결과</text>

  <!-- Left: 2024 structure -->
  <g transform="translate(80, 160)">
    <text x="190" y="-20" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fca5a5" text-anchor="middle">2024년</text>

    <!-- Revenue bar -->
    <rect x="0" y="20" width="380" height="56" fill="#6366F1" rx="4"/>
    <text x="190" y="55" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#f8fafc" text-anchor="middle">매출 1조 5,781억</text>

    <!-- Opex -->
    <rect x="0" y="95" width="406" height="56" fill="#ef4444" rx="4"/>
    <text x="203" y="130" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#fef2f2" text-anchor="middle">판관비 1조 6,873억</text>

    <!-- OP -->
    <rect x="0" y="170" width="26" height="40" fill="#dc2626" rx="3"/>
    <text x="50" y="196" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#fca5a5">영업이익 -1,092억</text>

    <!-- Judgment -->
    <rect x="0" y="240" width="380" height="90" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="190" y="268" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fca5a5" text-anchor="middle">창사 첫 영업적자</text>
    <text x="20" y="295" font-family="-apple-system, sans-serif" font-size="13" fill="#fecaca">· 매출 -11% (리니지 둔화 + TL 출시 초기 실망)</text>
    <text x="20" y="315" font-family="-apple-system, sans-serif" font-size="13" fill="#fecaca">· 판관비 +3% (TL 마케팅 + 구조조정 일회성 비용)</text>
  </g>

  <!-- Arrow -->
  <g>
    <path d="M 510 340 L 640 340" stroke="#fbbf24" stroke-width="4" fill="none"/>
    <path d="M 635 340 L 620 328 L 620 352 Z" fill="#fbbf24"/>
    <text x="575" y="320" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">구조조정</text>
    <text x="575" y="372" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a" text-anchor="middle">인력 -18%</text>
    <text x="575" y="390" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a" text-anchor="middle">마케팅 축소</text>
  </g>

  <!-- Right: 2025 structure -->
  <g transform="translate(720, 160)">
    <text x="190" y="-20" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#86efac" text-anchor="middle">2025년</text>

    <rect x="0" y="20" width="360" height="56" fill="#6366F1" rx="4"/>
    <text x="180" y="55" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#f8fafc" text-anchor="middle">매출 1조 5,069억</text>

    <rect x="0" y="95" width="358" height="56" fill="#ef4444" rx="4"/>
    <text x="179" y="130" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#fef2f2" text-anchor="middle">판관비 1조 4,908억</text>

    <rect x="0" y="170" width="4" height="40" fill="#22c55e" rx="3"/>
    <text x="10" y="196" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#86efac">영업이익 +161억</text>

    <rect x="0" y="240" width="380" height="90" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="190" y="268" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#86efac" text-anchor="middle">간신히 흑자 복귀</text>
    <text x="20" y="295" font-family="-apple-system, sans-serif" font-size="13" fill="#d1fae5">· 매출 -4.5% (리니지 자연 감쇠)</text>
    <text x="20" y="315" font-family="-apple-system, sans-serif" font-size="13" fill="#d1fae5">· 판관비 -12% (인건비 절감이 매출 감소를 상쇄)</text>
  </g>

  <!-- Bottom: decomposition table -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="1020" height="160" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="510" y="32" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">영업이익 개선 분해 — 2024 → 2025</text>

    <line x1="30" y1="50" x2="990" y2="50" stroke="#334155"/>

    <text x="30" y="80" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">매출 감소 효과</text>
    <text x="400" y="80" font-family="-apple-system, sans-serif" font-size="15" fill="#fca5a5">15,781 → 15,069 = -712억</text>
    <text x="980" y="80" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fca5a5" text-anchor="end">-712</text>

    <text x="30" y="110" font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">판관비 절감 효과 (인건비·마케팅)</text>
    <text x="400" y="110" font-family="-apple-system, sans-serif" font-size="15" fill="#86efac">16,873 → 14,908 = -1,965억</text>
    <text x="980" y="110" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#86efac" text-anchor="end">+1,965</text>

    <line x1="30" y1="125" x2="990" y2="125" stroke="#fbbf24"/>

    <text x="30" y="150" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#fbbf24">영업이익 개선</text>
    <text x="400" y="150" font-family="-apple-system, sans-serif" font-size="15" fill="#fde68a">비용 통제가 매출 감소를 1,253억 상쇄</text>
    <text x="980" y="150" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fbbf24" text-anchor="end">+1,253</text>
  </g>
</svg>
