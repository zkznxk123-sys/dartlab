<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2024.12 대한항공 아시아나 흡수 후 BS 급팽창 — 자산 +16.6조, 부채 +15.5조</title>
  <desc>합병 전 2023 BS vs 합병 후 2024 BS 비교, 아시아나 자산·부채 흡수의 크기</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">아시아나 흡수 — BS가 1.55배 커진 하루</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">자산 30.4조 → 47.0조 (+16.6조) · 부채 20.6조 → 36.0조 (+15.5조) · 자본 9.8조 → 11.0조</text>

  <!-- 2023 (합병 전) -->
  <g transform="translate(100, 170)">
    <text x="150" y="-20" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1" text-anchor="middle">2023년 말 (합병 전)</text>
    <text x="150" y="8" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">대한항공 단독</text>

    <!-- Asset column -->
    <rect x="0" y="40" width="120" height="304" fill="#1e293b" stroke="#6366F1" stroke-width="2" rx="6"/>
    <text x="60" y="65" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">자산</text>
    <text x="60" y="93" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#c7d2fe" text-anchor="middle">30.4조</text>
    <rect x="10" y="120" width="100" height="215" fill="#6366F1" opacity="0.65" rx="3"/>
    <text x="60" y="225" font-family="-apple-system, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">대한항공</text>
    <text x="60" y="243" font-family="-apple-system, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">자산만</text>

    <!-- Liab+equity column -->
    <rect x="140" y="40" width="120" height="304" fill="#1e293b" stroke="#334155" stroke-width="2" rx="6"/>
    <rect x="150" y="120" width="100" height="145" fill="#dc2626" opacity="0.7" rx="3"/>
    <text x="200" y="185" font-family="-apple-system, sans-serif" font-size="13" fill="#fef2f2" text-anchor="middle">부채</text>
    <text x="200" y="203" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#fef2f2" text-anchor="middle">20.6조</text>

    <rect x="150" y="270" width="100" height="65" fill="#22c55e" opacity="0.7" rx="3"/>
    <text x="200" y="298" font-family="-apple-system, sans-serif" font-size="13" fill="#052e16" text-anchor="middle">자본</text>
    <text x="200" y="318" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#052e16" text-anchor="middle">9.8조</text>

    <text x="130" y="370" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle">부채비율 210%</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(450, 350)">
    <path d="M 0 0 L 100 0" stroke="#fbbf24" stroke-width="4" fill="none"/>
    <path d="M 95 0 L 80 -12 L 80 12 Z" fill="#fbbf24"/>
    <text x="50" y="-20" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">2024.12.11</text>
    <text x="50" y="30" font-family="-apple-system, sans-serif" font-size="14" fill="#fde68a" text-anchor="middle">아시아나</text>
    <text x="50" y="48" font-family="-apple-system, sans-serif" font-size="14" fill="#fde68a" text-anchor="middle">흡수</text>
  </g>

  <!-- 2024 (합병 후) -->
  <g transform="translate(620, 170)">
    <text x="220" y="-20" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#fde68a" text-anchor="middle">2024년 말 (합병 후)</text>
    <text x="220" y="8" font-family="-apple-system, sans-serif" font-size="15" fill="#fbbf24" text-anchor="middle">대한항공 + 아시아나 연결</text>

    <!-- Asset column (bigger) -->
    <rect x="0" y="40" width="180" height="450" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="6"/>
    <text x="90" y="65" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">자산</text>
    <text x="90" y="93" font-family="-apple-system, sans-serif" font-size="24" font-weight="700" fill="#fde68a" text-anchor="middle">47.0조</text>

    <rect x="10" y="120" width="160" height="215" fill="#6366F1" opacity="0.65" rx="3"/>
    <text x="90" y="225" font-family="-apple-system, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">대한항공 기존</text>
    <text x="90" y="243" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#e0e7ff" text-anchor="middle">30.4조</text>

    <rect x="10" y="345" width="160" height="135" fill="#fbbf24" opacity="0.6" rx="3"/>
    <text x="90" y="392" font-family="-apple-system, sans-serif" font-size="13" fill="#422006" font-weight="700" text-anchor="middle">+ 아시아나</text>
    <text x="90" y="412" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#422006" text-anchor="middle">+16.6조</text>
    <text x="90" y="432" font-family="-apple-system, sans-serif" font-size="11" fill="#422006" text-anchor="middle">(공정가치 재평가)</text>

    <!-- Liab+equity column -->
    <rect x="200" y="40" width="180" height="450" fill="#1e293b" stroke="#334155" stroke-width="2" rx="6"/>
    <rect x="210" y="120" width="160" height="285" fill="#dc2626" opacity="0.7" rx="3"/>
    <text x="290" y="240" font-family="-apple-system, sans-serif" font-size="14" fill="#fef2f2" text-anchor="middle">부채</text>
    <text x="290" y="265" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fef2f2" text-anchor="middle">36.0조</text>
    <text x="290" y="290" font-family="-apple-system, sans-serif" font-size="12" fill="#fecaca" text-anchor="middle">(+15.5조 흡수)</text>

    <rect x="210" y="410" width="160" height="75" fill="#22c55e" opacity="0.7" rx="3"/>
    <text x="290" y="440" font-family="-apple-system, sans-serif" font-size="14" fill="#052e16" text-anchor="middle">자본</text>
    <text x="290" y="465" font-family="-apple-system, sans-serif" font-size="19" font-weight="700" fill="#052e16" text-anchor="middle">11.0조</text>
    <text x="290" y="482" font-family="-apple-system, sans-serif" font-size="11" fill="#052e16" text-anchor="middle">(+1.1조)</text>

    <text x="290" y="515" font-family="-apple-system, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle" font-weight="700">부채비율 329% (+119%p)</text>
  </g>

  <!-- Bottom: balance equation -->
  <g transform="translate(60, 645)">
    <rect x="0" y="0" width="1080" height="60" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="540" y="28" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="#fbbf24" text-anchor="middle">회계 균형식 — 자산 증가 16.6조 = 부채 증가 15.5조 + 자본 증가 1.1조</text>
    <text x="540" y="50" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">자본 증가 1.1조 = 인수대가 1.5조 신주 + 염가매수차익 약 8,000억 추정 (아시아나 자본잠식 but 무형자산 재평가)</text>
  </g>
</svg>
