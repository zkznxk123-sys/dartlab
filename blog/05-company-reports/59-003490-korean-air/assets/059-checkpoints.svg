<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>2026~2028 대한항공 관찰 4가지</title>
  <desc>영업이익률 6%+ · 통합 시너지 공개 · 유가 방어력 · 주주환원 정책</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2028 대한항공 관찰 4가지</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">합병 첫 해 충격이 구조적 약화인지 단기 전환 비용인지 판가름할 신호</text>

  <!-- Signal 1 -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#22c55e"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">분기 영업이익률 6%+ 안정화</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">2025Q4 5.5% → 2026 연간 6~7%로 복귀해야 정상화 국면 진입.</text>
    <rect x="100" y="78" width="380" height="34" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">6%+ 2분기 연속 → 정상화</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">4% 이하 지속 → 통합 시너지 지연</text>
  </g>

  <!-- Signal 2 -->
  <g transform="translate(60, 285)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#fbbf24"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">2</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">통합 시너지 연 5,000~7,000억 실현</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">IR 가이던스의 80%+ 실현되는지 — 2026~2027년 공시에서 확인.</text>
    <rect x="100" y="78" width="380" height="34" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">4,000억+ 실현 → 시너지 작동</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">2,000억 이하 → 통합 실패 신호</text>
  </g>

  <!-- Signal 3 -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#8b5cf6"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">3</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">유가·환율 방어력 — 외부 충격 대응</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">유가 $80+ / 원·달러 1,400원+ 시나리오에서 영업이익 방어 능력.</text>
    <rect x="100" y="78" width="380" height="34" fill="#2e1065" stroke="#a855f7" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">고유가에도 영업이익률 5%+ 유지</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">3%대로 하락 → 방어막 약함</text>
  </g>

  <!-- Signal 4 -->
  <g transform="translate(60, 575)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#ef4444"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">4</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">주주환원 — 배당성향 30%+ 복귀 여부</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">자본 11.46조 대비 배당 복귀 = 안정화 국면 진입 시그널.</text>
    <rect x="100" y="78" width="380" height="34" fill="#1e293b" stroke="#94a3b8" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">2026 배당성향 30%+ → 회복 확인</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">무배당·감배 → 재무 부담 지속</text>
  </g>
</svg>
