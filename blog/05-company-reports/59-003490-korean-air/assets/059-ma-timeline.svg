<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>대한항공 아시아나 합병 11년 타임라인 2013~2024</title>
  <desc>2013 통합 논의 → 2019 조양호 별세 → 2020 코로나·산업은행 제안 → 2024.12 합병 완료</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">10년 걸린 항공사 합병의 타임라인</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2013 통합 논의 → 2019 조양호 별세 → 2020 코로나·산은 제안 → 2024.12.11 완료</text>

  <!-- Timeline axis -->
  <line x1="80" y1="400" x2="1140" y2="400" stroke="#334155" stroke-width="2"/>

  <!-- Years -->
  <g font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="130" y="430">2013</text><circle cx="130" cy="400" r="5" fill="#64748b"/>
    <text x="260" y="430">2017</text><circle cx="260" cy="400" r="5" fill="#64748b"/>
    <text x="400" y="430">2019.04</text><circle cx="400" cy="400" r="8" fill="#fbbf24"/>
    <text x="520" y="430">2020.03</text><circle cx="520" cy="400" r="9" fill="#ef4444"/>
    <text x="640" y="430">2020.11</text><circle cx="640" cy="400" r="9" fill="#fbbf24"/>
    <text x="760" y="430">2022</text><circle cx="760" cy="400" r="5" fill="#64748b"/>
    <text x="880" y="430">2024.02</text><circle cx="880" cy="400" r="7" fill="#22c55e"/>
    <text x="1000" y="430">2024.10</text><circle cx="1000" cy="400" r="7" fill="#22c55e"/>
    <text x="1110" y="430">2024.12.11</text><circle cx="1110" cy="400" r="12" fill="#22c55e" stroke="#fbbf24" stroke-width="3"/>
  </g>

  <!-- Events (above line) -->
  <g font-family="-apple-system, sans-serif">
    <!-- 2013 -->
    <line x1="130" y1="400" x2="130" y2="250" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="80" y="180" width="100" height="65" fill="#1e293b" stroke="#64748b" rx="5"/>
    <text x="130" y="205" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">통합 논의</text>
    <text x="130" y="223" font-size="11" fill="#94a3b8" text-anchor="middle">(비공식)</text>
    <text x="130" y="238" font-size="11" fill="#94a3b8" text-anchor="middle">항공업 구조조정</text>

    <!-- 2017 인수 타진 -->
    <line x1="260" y1="400" x2="260" y2="280" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="210" y="215" width="100" height="65" fill="#1e293b" stroke="#64748b" rx="5"/>
    <text x="260" y="238" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">1차 타진</text>
    <text x="260" y="256" font-size="11" fill="#94a3b8" text-anchor="middle">아시아나 재무</text>
    <text x="260" y="271" font-size="11" fill="#94a3b8" text-anchor="middle">악화 본격화</text>

    <!-- 2019.04 조양호 별세 -->
    <line x1="400" y1="400" x2="400" y2="220" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="340" y="140" width="120" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="6"/>
    <text x="400" y="165" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">2019.04.08</text>
    <text x="400" y="183" font-size="13" fill="#fde68a" text-anchor="middle">조양호 회장</text>
    <text x="400" y="200" font-size="13" fill="#fde68a" text-anchor="middle">별세</text>
    <text x="400" y="216" font-size="11" fill="#94a3b8" text-anchor="middle">조원태 승계</text>

    <!-- 2020.03 코로나 -->
    <line x1="520" y1="400" x2="520" y2="160" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="460" y="90" width="120" height="85" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="520" y="115" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">2020.03~05</text>
    <text x="520" y="133" font-size="13" fill="#fca5a5" text-anchor="middle">코로나 직격</text>
    <text x="520" y="150" font-size="13" fill="#fca5a5" text-anchor="middle">70% 순환휴직</text>
    <text x="520" y="168" font-size="11" fill="#fecaca" text-anchor="middle">자본잠식 직전</text>

    <!-- 2020.11 산은 제안 -->
    <line x1="640" y1="400" x2="640" y2="180" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="580" y="105" width="120" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="6"/>
    <text x="640" y="130" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">2020.11.16</text>
    <text x="640" y="148" font-size="13" fill="#fde68a" text-anchor="middle">산업은행</text>
    <text x="640" y="165" font-size="13" fill="#fde68a" text-anchor="middle">통합 제안</text>
    <text x="640" y="181" font-size="11" fill="#94a3b8" text-anchor="middle">+8,000억 지원</text>

    <!-- 2022 EU 심사 -->
    <line x1="760" y1="400" x2="760" y2="280" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="710" y="215" width="100" height="65" fill="#1e293b" stroke="#64748b" rx="5"/>
    <text x="760" y="238" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">EU 심사 시작</text>
    <text x="760" y="256" font-size="11" fill="#94a3b8" text-anchor="middle">13개국 릴레이</text>
    <text x="760" y="271" font-size="11" fill="#94a3b8" text-anchor="middle">2년 심의</text>

    <!-- 2024.02 EU 승인 -->
    <line x1="880" y1="400" x2="880" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="820" y="170" width="120" height="75" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="880" y="195" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">2024.02</text>
    <text x="880" y="212" font-size="12" fill="#d1fae5" text-anchor="middle">EU 조건부 승인</text>
    <text x="880" y="229" font-size="11" fill="#d1fae5" text-anchor="middle">12개 슬롯 양도</text>

    <!-- 2024.10 미국 승인 -->
    <line x1="1000" y1="400" x2="1000" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="940" y="170" width="120" height="75" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="1000" y="195" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">2024.10</text>
    <text x="1000" y="212" font-size="12" fill="#d1fae5" text-anchor="middle">미국 DOJ 승인</text>
    <text x="1000" y="229" font-size="11" fill="#d1fae5" text-anchor="middle">+하와이안 $1.9B</text>

    <!-- 2024.12.11 완료 -->
    <line x1="1110" y1="400" x2="1110" y2="250" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="3,3"/>
    <rect x="1030" y="150" width="150" height="100" fill="#0f2e1a" stroke="#22c55e" stroke-width="3" rx="8"/>
    <text x="1105" y="178" font-size="15" font-weight="800" fill="#fde68a" text-anchor="middle">2024.12.11 ★</text>
    <text x="1105" y="200" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">합병 완료</text>
    <text x="1105" y="218" font-size="12" fill="#d1fae5" text-anchor="middle">인수대가 1.72조</text>
    <text x="1105" y="236" font-size="12" fill="#d1fae5" text-anchor="middle">자산 +16.6조</text>
  </g>

  <!-- Timeline duration annotation -->
  <g transform="translate(80, 465)">
    <rect x="0" y="0" width="1060" height="50" fill="#1e293b" rx="6"/>
    <text x="20" y="22" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">2013 통합 논의 → 2020.11 공식 발표 → 2024.12.11 완료</text>
    <text x="20" y="42" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fbbf24">= 11년 프로젝트 · 4년 1개월 공식 절차 · 13개국 경쟁당국 심사</text>
  </g>

  <!-- Bottom caption -->
  <g transform="translate(60, 555)">
    <rect x="0" y="0" width="1080" height="110" fill="#1e293b" rx="10"/>
    <text x="30" y="30" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">이 타임라인이 중요한 이유</text>
    <text x="30" y="60" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">2019년 조양호 별세 후 조원태 승계 → 2020년 코로나 자본잠식 → 2020.11 산은 제안 → 4년 규제 → 2024.12 완료</text>
    <text x="30" y="80" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">= 가족 지형 변화 + 외부 쇼크 + 정책 개입 + 글로벌 경쟁 심사가 11년 겹쳐 만든 프로젝트</text>
    <text x="30" y="100" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a">이 11년의 비용과 부담이 2025년 실적(영업이익 -47%)에 한 번에 찍혔다.</text>
  </g>
</svg>
