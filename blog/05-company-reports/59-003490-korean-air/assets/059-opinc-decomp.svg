<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>대한항공 2024 → 2025 영업이익 -9,966억 3요인 분해</title>
  <desc>화물 사이클 정상화 + 아시아나 마진 희석 + 통합 일회성 비용</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">영업이익 -9,966억의 3요인 분해</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2024 영업 21,102억 → 2025 영업 11,136억 — 화물 정상화 + 마진 희석 + 통합 비용</text>

  <!-- Waterfall chart -->
  <g transform="translate(80, 170)">
    <!-- Baseline -->
    <line x1="0" y1="390" x2="1040" y2="390" stroke="#334155" stroke-width="1.5"/>

    <!-- 2024 영업이익 +21,102 -->
    <rect x="20" y="110" width="140" height="280" fill="#22c55e" stroke="#fbbf24" stroke-width="2" rx="3"/>
    <text x="90" y="100" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#86efac" text-anchor="middle">+21,102</text>
    <text x="90" y="415" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">2024 영업이익</text>

    <!-- 요인 ① 화물 사이클 -5,500 -->
    <rect x="210" y="390" width="140" height="73" fill="#ef4444" rx="3"/>
    <text x="280" y="483" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fca5a5" text-anchor="middle">-5,500</text>
    <text x="280" y="510" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">화물 사이클</text>
    <text x="280" y="527" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">정상화</text>

    <!-- 요인 ② 아시아나 마진 희석 -3,000 -->
    <rect x="390" y="390" width="140" height="40" fill="#ef4444" rx="3"/>
    <text x="460" y="450" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fca5a5" text-anchor="middle">-3,000</text>
    <text x="460" y="510" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">아시아나</text>
    <text x="460" y="527" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">마진 희석</text>

    <!-- 요인 ③ 통합 비용 -1,700 -->
    <rect x="570" y="390" width="140" height="23" fill="#ef4444" rx="3"/>
    <text x="640" y="433" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fca5a5" text-anchor="middle">-1,700</text>
    <text x="640" y="510" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">통합 일회성</text>
    <text x="640" y="527" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">비용</text>

    <!-- 아시아나 + 여객 회복 +234 (순효과 반영) -->
    <rect x="750" y="388" width="140" height="3" fill="#22c55e" rx="1"/>
    <text x="820" y="380" font-family="-apple-system, sans-serif" font-size="13" fill="#86efac" text-anchor="middle">+234 기타</text>
    <text x="820" y="527" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">잔여 조정</text>

    <!-- 2025 영업이익 +11,136 -->
    <rect x="880" y="242" width="140" height="148" fill="#22c55e" stroke="#fbbf24" stroke-width="2" rx="3"/>
    <text x="950" y="232" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fde68a" text-anchor="middle">+11,136</text>
    <text x="950" y="415" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">2025 영업이익</text>
  </g>

  <!-- 3요인 설명 박스 -->
  <g transform="translate(80, 600)">
    <rect x="0" y="-20" width="320" height="110" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="16" y="10" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fca5a5">① 화물 -5,500억</text>
    <text x="16" y="34" font-family="-apple-system, sans-serif" font-size="12" fill="#cbd5e1">톤·km 단가 $0.45(2022) → $0.22(2025)</text>
    <text x="16" y="52" font-family="-apple-system, sans-serif" font-size="12" fill="#cbd5e1">화물 매출 7.6조 → 5.0조 (-2.6조)</text>
    <text x="16" y="76" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a">= 가장 큰 영향 (-47%의 55%)</text>

    <rect x="340" y="-20" width="320" height="110" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="356" y="10" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fca5a5">② 아시아나 희석 -3,000억</text>
    <text x="356" y="34" font-family="-apple-system, sans-serif" font-size="12" fill="#cbd5e1">아시아나 OPM 3~4% vs 대한 12~15%</text>
    <text x="356" y="52" font-family="-apple-system, sans-serif" font-size="12" fill="#cbd5e1">가중평균 마진 약 1%p 하락</text>
    <text x="356" y="76" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a">= 장기 시너지로 메워야 함</text>

    <rect x="680" y="-20" width="320" height="110" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="696" y="10" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#fca5a5">③ 통합 일회성 -1,700억</text>
    <text x="696" y="34" font-family="-apple-system, sans-serif" font-size="12" fill="#cbd5e1">IT 통합·조직 중복 해소·브랜드 전환</text>
    <text x="696" y="52" font-family="-apple-system, sans-serif" font-size="12" fill="#cbd5e1">2025년에 주로 찍힘</text>
    <text x="696" y="76" font-family="-apple-system, sans-serif" font-size="11" fill="#fde68a">= 2026~2027 단계적 소멸</text>
  </g>
</svg>
