<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>대한항공 아시아나 합병 13개국 경쟁당국 심사 4년</title>
  <desc>한국·미국·EU·영국·일본·중국 등 각국 심사 일지와 조건부 승인 내용</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">13개국 경쟁당국이 4년간 한 심사</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">대한항공+아시아나가 인천공항 국제선의 80%+ 독점 → 각국이 조건부 승인</text>

  <!-- Column headers -->
  <g font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" font-weight="600">
    <text x="40" y="165">국가/기관</text>
    <text x="280" y="165">심사 시작</text>
    <text x="430" y="165">최종 승인</text>
    <text x="620" y="165">소요</text>
    <text x="760" y="165">핵심 조건</text>
  </g>
  <line x1="30" y1="175" x2="1170" y2="175" stroke="#334155" stroke-width="1.5"/>

  <!-- Rows -->
  <g font-family="-apple-system, sans-serif" font-size="14" fill="#e2e8f0">
    <!-- 한국 공정위 -->
    <text x="40" y="205" font-weight="600">🇰🇷 한국 공정위</text>
    <text x="280" y="205">2021.01</text>
    <text x="430" y="205" fill="#86efac" font-weight="600">2022.02</text>
    <text x="620" y="205">13개월</text>
    <text x="760" y="205" fill="#cbd5e1">국내선 일부 노선 경쟁 회복</text>

    <!-- 일본 -->
    <text x="40" y="245" font-weight="600">🇯🇵 일본 공정취위</text>
    <text x="280" y="245">2021.05</text>
    <text x="430" y="245" fill="#86efac" font-weight="600">2024.01</text>
    <text x="620" y="245">32개월</text>
    <text x="760" y="245" fill="#cbd5e1">서울-도쿄 일부 슬롯 양도</text>

    <!-- 중국 -->
    <text x="40" y="285" font-weight="600">🇨🇳 중국 국가시장감독관리총국</text>
    <text x="280" y="285">2021.02</text>
    <text x="430" y="285" fill="#86efac" font-weight="600">2023.05</text>
    <text x="620" y="285">27개월</text>
    <text x="760" y="285" fill="#cbd5e1">조건 없음</text>

    <!-- EU -->
    <text x="40" y="325" font-weight="600" fill="#fde68a">🇪🇺 유럽연합 경쟁위 ★</text>
    <text x="280" y="325">2022.04</text>
    <text x="430" y="325" fill="#fbbf24" font-weight="600">2024.02</text>
    <text x="620" y="325" fill="#fbbf24">22개월</text>
    <text x="760" y="325" fill="#fde68a">파리·프랑크푸르트·바르셀로나·로마 4노선 양도</text>

    <!-- 영국 -->
    <text x="40" y="365" font-weight="600">🇬🇧 영국 CMA</text>
    <text x="280" y="365">2022.03</text>
    <text x="430" y="365" fill="#86efac" font-weight="600">2024.03</text>
    <text x="620" y="365">24개월</text>
    <text x="760" y="365" fill="#cbd5e1">런던 노선 티웨이 이전</text>

    <!-- 미국 DOJ (강조) -->
    <text x="40" y="405" font-weight="600" fill="#fca5a5">🇺🇸 미국 DOJ ★</text>
    <text x="280" y="405">2021.01</text>
    <text x="430" y="405" fill="#fca5a5" font-weight="600">2024.10</text>
    <text x="620" y="405" fill="#fca5a5" font-weight="700">45개월</text>
    <text x="760" y="405" fill="#fecaca">하와이안 항공 지분 인수 $1.9B 조건</text>

    <!-- 호주/뉴질랜드/튀르키예 -->
    <text x="40" y="445" font-weight="600">🇦🇺 호주·🇳🇿 뉴질랜드·🇹🇷 튀르키예</text>
    <text x="280" y="445">2021~2023</text>
    <text x="430" y="445" fill="#86efac" font-weight="600">2023~2024</text>
    <text x="620" y="445">—</text>
    <text x="760" y="445" fill="#cbd5e1">대부분 무조건 승인</text>
  </g>

  <line x1="30" y1="465" x2="1170" y2="465" stroke="#fbbf24" stroke-width="2"/>

  <!-- Summary boxes -->
  <g transform="translate(60, 490)">
    <!-- Left: 가장 길었던 심사 -->
    <rect x="0" y="0" width="520" height="130" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fca5a5">🇺🇸 가장 길었던 심사 — 미국 DOJ (45개월)</text>
    <text x="20" y="60" font-family="-apple-system, sans-serif" font-size="13" fill="#fecaca">조건: 하와이안 항공 지분 $1.9B 인수로 미국 저비용</text>
    <text x="20" y="78" font-family="-apple-system, sans-serif" font-size="13" fill="#fecaca">항공 경쟁 보조</text>
    <text x="20" y="102" font-family="-apple-system, sans-serif" font-size="13" fill="#fecaca">→ 아시아나 인수에 미국 항공사 추가 지분까지</text>
    <text x="20" y="118" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">→ 총 M&amp;A 부담 1.72조 + 2.6조 = 약 4.3조</text>
  </g>

  <g transform="translate(620, 490)">
    <!-- Right: 가장 비싼 조건 -->
    <rect x="0" y="0" width="520" height="130" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fde68a">🇪🇺 가장 비싼 조건 — EU 12개 슬롯 양도</text>
    <text x="20" y="60" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a">파리·런던·프랑크푸르트·바르셀로나·로마·밀라노</text>
    <text x="20" y="78" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a">+ 일본 노선까지 총 12개</text>
    <text x="20" y="102" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a">→ 티웨이·에어프레미아가 인수</text>
    <text x="20" y="118" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">→ 연 매출 1~1.5조 규모 양도</text>
  </g>

  <!-- Bottom -->
  <text x="600" y="665" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">출처: 각국 경쟁당국 승인 공시 · 한국 공정거래위원회 최종 시정조치 (2024.10)</text>
</svg>
