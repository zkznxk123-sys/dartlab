<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>대한항공 2025년 매출 25.23조 사업부 구성</title>
  <desc>여객 17조 (67%) · 화물 5조 (20%) · 기타 3.3조 (13%)</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2025년 매출 25.23조 — 세 축의 비율</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">여객 67% · 화물 20% · 마일리지·정비·기내식 13% — 3개 사업부가 서로 다른 사이클을 탄다</text>

  <!-- Donut chart -->
  <g transform="translate(320, 400)">
    <!-- 여객 67% (0~67%) -->
    <path d="M 0 -200 A 200 200 0 1 1 -123.6 157.4 L 0 0 Z" fill="#6366F1"/>
    <!-- 화물 20% (67~87%) -->
    <path d="M -123.6 157.4 A 200 200 0 0 1 -190.2 -61.8 L 0 0 Z" fill="#fbbf24"/>
    <!-- 기타 13% (87~100%) -->
    <path d="M -190.2 -61.8 A 200 200 0 0 1 0 -200 L 0 0 Z" fill="#22c55e"/>

    <!-- Center hole -->
    <circle cx="0" cy="0" r="110" fill="#0a0e1a"/>
    <text x="0" y="-10" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">매출 합계</text>
    <text x="0" y="22" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#fbbf24" text-anchor="middle">25.23조</text>
    <text x="0" y="48" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1" text-anchor="middle">(+41% vs 2024)</text>

    <!-- Labels -->
    <text x="100" y="-20" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">여객 67%</text>
    <text x="100" y="0" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#c7d2fe">약 17.0조</text>

    <text x="-180" y="170" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fbbf24">화물 20%</text>
    <text x="-180" y="190" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#fde68a">약 5.0조</text>

    <text x="-220" y="-100" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#86efac">기타 13%</text>
    <text x="-220" y="-80" font-family="-apple-system, sans-serif" font-size="13" fill="#d1fae5">약 3.3조</text>
  </g>

  <!-- Right side: segment details -->
  <g transform="translate(680, 160)">
    <!-- 여객 -->
    <rect x="0" y="0" width="480" height="140" fill="#1e293b" stroke="#6366F1" stroke-width="2" rx="10"/>
    <text x="20" y="30" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#c7d2fe">여객 — 약 17.0조 (+52%)</text>
    <text x="20" y="60" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">드라이버: 아시아나 편입 5조 + 국제선 회복 수요</text>
    <text x="20" y="85" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">영업이익률: 약 8~10% (합병 전 대한항공)</text>
    <text x="20" y="112" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">약점: 유가·환율·LCC 경쟁에 민감</text>
    <text x="20" y="130" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a">2025 최대 축. 아시아나 합병 효과 집중 반영</text>

    <!-- 화물 -->
    <rect x="0" y="160" width="480" height="140" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="20" y="190" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fde68a">화물 — 약 5.0조 (+8%)</text>
    <text x="20" y="220" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">드라이버: 2022 피크 7.6조 → 단가 정상화</text>
    <text x="20" y="245" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">영업이익률: 정상화 후 15~20%</text>
    <text x="20" y="272" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">강점: 글로벌 화물 항공 5위, 반도체·의료용품 수송</text>
    <text x="20" y="290" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a">2022 슈퍼사이클 정점 이후 3년 하락</text>

    <!-- 기타 (마일리지·정비·기내식) -->
    <rect x="0" y="320" width="480" height="140" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="20" y="350" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#86efac">기타 — 약 3.3조 (+25%)</text>
    <text x="20" y="380" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">마일리지 전환 (SKYPASS 부채 2.8조)</text>
    <text x="20" y="405" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">항공정비(MRO) · 기내식 · 면세 · 여행사</text>
    <text x="20" y="432" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">영업이익률: 항목별 편차 큼 (MRO 높음)</text>
    <text x="20" y="450" font-family="-apple-system, sans-serif" font-size="13" fill="#fde68a">아시아나 MRO 편입으로 +25% 증가</text>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="1080" height="60" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="540" y="25" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fde68a" text-anchor="middle">여객은 +52% 폭증, 화물은 정상화 +8%, 기타는 +25%</text>
    <text x="540" y="48" font-family="-apple-system, sans-serif" font-size="14" fill="#fde68a" text-anchor="middle">→ 매출 +41% 겉모습 안에 3축이 서로 다른 속도로 움직인다</text>
  </g>
</svg>
