<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>CPU 아키텍처 3축 경쟁 — ARM · x86 · RISC-V 2024~2030</title>
  <desc>데이터센터·모바일·IoT 영역별 점유율과 ARM의 상대 위치</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">3개 CPU 아키텍처의 전쟁</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">x86 방어 · ARM 진격 · RISC-V 후방 침투 — 2030년까지의 지도</text>

  <!-- Column headers -->
  <g font-family="-apple-system, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle" font-weight="600">
    <text x="290" y="170">모바일 (스마트폰)</text>
    <text x="600" y="170">데이터센터 (서버)</text>
    <text x="910" y="170">IoT·임베디드</text>
  </g>

  <!-- ARM row -->
  <g>
    <text x="60" y="245" font-size="20" fill="#fbbf24" font-weight="700">ARM</text>
    <text x="60" y="265" font-size="12" fill="#fde68a">현재 지배 영역</text>

    <!-- ARM 모바일 99% -->
    <rect x="180" y="210" width="220" height="60" fill="#22c55e" rx="4"/>
    <text x="290" y="246" font-size="22" font-weight="700" fill="#0a0e1a" text-anchor="middle">99%</text>
    <text x="290" y="296" font-size="13" fill="#86efac" text-anchor="middle">Apple·Qualcomm·Samsung</text>

    <!-- ARM 데이터센터 20% -->
    <rect x="490" y="210" width="40" height="60" fill="#fbbf24" rx="4"/>
    <text x="490" y="246" font-size="20" font-weight="700" fill="#fde68a" text-anchor="start">  20%+ 🚀</text>
    <text x="600" y="296" font-size="13" fill="#fde68a" text-anchor="middle">성장 주역 (AI)</text>

    <!-- ARM IoT 90% -->
    <rect x="800" y="210" width="200" height="60" fill="#22c55e" rx="4"/>
    <text x="910" y="246" font-size="22" font-weight="700" fill="#0a0e1a" text-anchor="middle">90%</text>
    <text x="910" y="296" font-size="13" fill="#86efac" text-anchor="middle">Cortex-M 독점</text>
  </g>

  <!-- x86 row -->
  <g>
    <text x="60" y="385" font-size="20" fill="#ef4444" font-weight="700">x86</text>
    <text x="60" y="405" font-size="12" fill="#fecaca">Intel + AMD</text>

    <!-- x86 모바일 ~0 -->
    <rect x="180" y="350" width="4" height="60" fill="#ef4444" rx="2"/>
    <text x="190" y="386" font-size="18" font-weight="700" fill="#fca5a5">&lt;1%</text>
    <text x="290" y="436" font-size="13" fill="#fca5a5" text-anchor="middle">퇴출 (전력 효율 열세)</text>

    <!-- x86 데이터센터 75% -->
    <rect x="490" y="350" width="165" height="60" fill="#ef4444" rx="4"/>
    <text x="572" y="386" font-size="22" font-weight="700" fill="#fef2f2" text-anchor="middle">75%</text>
    <text x="600" y="436" font-size="13" fill="#fecaca" text-anchor="middle">기존 소프트웨어 호환성 방어</text>

    <!-- x86 IoT ~5 -->
    <rect x="800" y="350" width="12" height="60" fill="#ef4444" rx="2"/>
    <text x="815" y="386" font-size="18" font-weight="700" fill="#fca5a5">5%</text>
    <text x="910" y="436" font-size="13" fill="#fca5a5" text-anchor="middle">산업용 일부</text>
  </g>

  <!-- RISC-V row -->
  <g>
    <text x="60" y="525" font-size="20" fill="#a855f7" font-weight="700">RISC-V</text>
    <text x="60" y="545" font-size="12" fill="#c4b5fd">오픈소스 · 무료</text>

    <!-- RISC-V 모바일 ~0 -->
    <rect x="180" y="490" width="3" height="60" fill="#8b5cf6" rx="2"/>
    <text x="190" y="526" font-size="18" font-weight="700" fill="#c4b5fd">&lt;1%</text>
    <text x="290" y="576" font-size="13" fill="#c4b5fd" text-anchor="middle">성능 부족</text>

    <!-- RISC-V 데이터센터 ~5% -->
    <rect x="490" y="490" width="12" height="60" fill="#8b5cf6" rx="2"/>
    <text x="510" y="526" font-size="16" font-weight="700" fill="#c4b5fd">~5%</text>
    <text x="600" y="576" font-size="13" fill="#c4b5fd" text-anchor="middle">중국 국가 주도 성장 시작</text>

    <!-- RISC-V IoT 10% -->
    <rect x="800" y="490" width="25" height="60" fill="#8b5cf6" rx="2"/>
    <text x="825" y="526" font-size="18" font-weight="700" fill="#c4b5fd">10%</text>
    <text x="910" y="576" font-size="13" fill="#c4b5fd" text-anchor="middle">로열티 無 — 저가 침투</text>
  </g>

  <!-- Bottom analysis -->
  <g transform="translate(60, 625)">
    <rect x="0" y="0" width="1080" height="80" fill="#1e293b" rx="10"/>
    <text x="24" y="26" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">2030년 예상: 모바일 ARM 99%, 데이터센터 ARM 30%+ (vs x86 65%), IoT ARM 85% · RISC-V 15%</text>
    <text x="24" y="48" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">ARM 기회: 데이터센터 AI CPU 로열티 확대. 단가 스마트폰 대비 100~200배 높음.</text>
    <text x="24" y="68" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">ARM 위협: RISC-V가 IoT·임베디드 저가 영역에서 로열티 수익 잠식 (장기)</text>
  </g>
</svg>
