<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>2026~2028 ARM 관찰 4가지</title>
  <desc>데이터센터 성장률·소프트뱅크 지분 매각·고객 다변화·RISC-V 침투 속도</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2028 ARM 관찰 4가지</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">플랫폼 프리미엄 37배가 정당화될지 축소될지를 가릴 신호</text>

  <!-- Signal 1 -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#22c55e"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">데이터센터 매출 성장률 +40% 이상 유지</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">FY2025 $0.6B (+65%). AI 서버 CPU 로열티가 핵심 성장 엔진.</text>
    <rect x="100" y="78" width="380" height="34" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">+40%+ 유지 → AI 플랫폼 프리미엄 유지</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">+25% 이하 → PER 190배 축소 압력</text>
  </g>

  <!-- Signal 2 -->
  <g transform="translate(60, 285)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#ec4899" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#ec4899"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">2</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">소프트뱅크 지분 매각 스케줄</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">현재 90% 보유. 단계적 블록딜로 유동성 확대 예상.</text>
    <rect x="100" y="78" width="380" height="34" fill="#831843" stroke="#ec4899" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#fbcfe8" text-anchor="middle">연 5%씩 점진 → 시장 충격 완화</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">15%+ 대형 블록딜 → 단기 -10%</text>
  </g>

  <!-- Signal 3 -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#fbbf24"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">3</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">고객사 다변화 — Apple 25% 비중 축소</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">현재 상위 5개 고객 50%+. 의존도 축소가 BM 안정성 강화.</text>
    <rect x="100" y="78" width="380" height="34" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">Apple 20% 이하 · 상위 5개 45% → 건강</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">Apple 30%+ → 집중 리스크 증가</text>
  </g>

  <!-- Signal 4 -->
  <g transform="translate(60, 575)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#8b5cf6"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">4</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">RISC-V 데이터센터 진입 속도</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">2027년까지 RISC-V 서버 점유율이 ARM 장기 리스크 신호.</text>
    <rect x="100" y="78" width="380" height="34" fill="#1e1b4b" stroke="#6366F1" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#c7d2fe" text-anchor="middle">2027 RISC-V 5% 미만 → ARM 우위</text>
    <rect x="500" y="78" width="380" height="34" fill="#2e1065" stroke="#a855f7" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">2027 RISC-V 10%+ → 장기 대체 가속</text>
  </g>
</svg>
