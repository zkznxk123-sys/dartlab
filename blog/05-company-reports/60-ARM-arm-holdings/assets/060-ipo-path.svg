<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2020.9 엔비디아 $40B 인수 시도 → 2022.2 무산 → 2023.9 IPO 경로</title>
  <desc>소프트뱅크의 두 가지 출구 전략 — 실패한 매각과 성공한 재상장</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">$40B에 팔려다 $150B로 평가받은 3년</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">엔비디아 인수 무산이 역설적으로 ARM 평가를 끌어올렸다</text>

  <!-- Path A: 엔비디아 매각 시도 -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="540" height="200" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="12"/>
    <text x="24" y="38" font-size="20" font-weight="700" fill="#fca5a5">❌ 경로 A — 엔비디아 매각 (실패)</text>

    <text x="24" y="75" font-size="14" font-weight="600" fill="#fecaca">2020.9.13 발표</text>
    <text x="24" y="95" font-size="13" fill="#fecaca">엔비디아 $40B 인수 → AI CPU+GPU 수직통합 목표</text>

    <text x="24" y="125" font-size="14" font-weight="600" fill="#fecaca">2021 13개국 경쟁당국 심사</text>
    <text x="24" y="145" font-size="13" fill="#fecaca">미국 FTC 소송 · EU 2단계 · 영국 심층 · 중국 비공식 반대</text>

    <text x="24" y="175" font-size="14" font-weight="600" fill="#fca5a5">2022.2.7 공식 포기 · 위약금 $1.25B 지급</text>
  </g>

  <!-- Divergence arrow -->
  <g transform="translate(600, 260)">
    <path d="M 0 0 L 60 -60" stroke="#fbbf24" stroke-width="3" fill="none"/>
    <path d="M 55 -55 L 60 -40 L 45 -50 Z" fill="#fbbf24"/>
    <path d="M 0 0 L 60 60" stroke="#22c55e" stroke-width="3" fill="none"/>
    <path d="M 55 55 L 45 50 L 60 40 Z" fill="#22c55e"/>
  </g>

  <!-- Path B: IPO 성공 -->
  <g transform="translate(680, 160)">
    <rect x="0" y="0" width="480" height="200" fill="#052e16" stroke="#22c55e" stroke-width="2.5" rx="12"/>
    <text x="24" y="38" font-size="20" font-weight="700" fill="#86efac">✅ 경로 B — IPO 재상장 (성공)</text>

    <text x="24" y="75" font-size="14" font-weight="600" fill="#d1fae5">2023.9.14 나스닥 상장</text>
    <text x="24" y="95" font-size="13" fill="#d1fae5">공모가 $51 → 첫날 $63.59 (+24.7%)</text>

    <text x="24" y="125" font-size="14" font-weight="600" fill="#d1fae5">앵커 투자자 = ARM 고객사 10개</text>
    <text x="24" y="145" font-size="13" fill="#d1fae5">Apple · Nvidia · Google · AMD · Intel · Samsung · TSMC</text>

    <text x="24" y="175" font-size="14" font-weight="700" fill="#86efac">공모 10% 지분만 판매 → 소프트뱅크 잔여 90%</text>
  </g>

  <!-- Result comparison -->
  <g transform="translate(60, 400)">
    <text x="540" y="0" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#fbbf24" text-anchor="middle">결과 비교</text>

    <rect x="0" y="30" width="540" height="150" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="24" y="60" font-size="16" font-weight="700" fill="#fca5a5">경로 A가 실현됐다면</text>
    <text x="24" y="85" font-size="14" fill="#cbd5e1">매각가 $40B — 고정 가격</text>
    <text x="24" y="108" font-size="14" fill="#cbd5e1">엔비디아 산하 → 중립성 훼손 → 경쟁사 이탈 가능성</text>
    <text x="24" y="133" font-size="14" fill="#cbd5e1">장기적으로 ARM 평가 가치 하락 추정</text>
    <text x="24" y="162" font-size="14" font-weight="700" fill="#fca5a5">→ 잃을 뻔한 미래</text>

    <rect x="580" y="30" width="540" height="150" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="604" y="60" font-size="16" font-weight="700" fill="#86efac">경로 B 현실 (2026.4)</text>
    <text x="604" y="85" font-size="14" fill="#cbd5e1">시가총액 $150B — 3.75배 평가 상향</text>
    <text x="604" y="108" font-size="14" fill="#cbd5e1">소프트뱅크 지분 90% × $150B = $135B 평가</text>
    <text x="604" y="133" font-size="14" fill="#cbd5e1">중립성 유지 → AI 서버 로열티 성장 지속</text>
    <text x="604" y="162" font-size="14" font-weight="700" fill="#86efac">→ 얻은 미래</text>
  </g>

  <!-- Soft bank's gain -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="70" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="540" y="30" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fde68a" text-anchor="middle">소프트뱅크의 결과적 셈법</text>
    <text x="540" y="55" font-family="-apple-system, sans-serif" font-size="14" fill="#fde68a" text-anchor="middle">2016 인수 $32B → 2023 IPO 시점 90% 지분 평가 $48B → 2026 $135B = 10년 만에 +$103B (+322%)</text>
  </g>
</svg>
