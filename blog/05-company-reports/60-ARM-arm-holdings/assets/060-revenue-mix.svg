<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>ARM FY2025 매출 $4.01B 4축 해부 — 모바일·데이터센터·자동차·IoT</title>
  <desc>모바일 55% · 데이터센터 15% (+65% 성장) · 자동차 14% · IoT 16%</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출 $4.01B 4축 — AI가 바꾸는 비중</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">모바일 55% (현금 기계) · 데이터센터 15% (+65% AI 성장) · 자동차 14% · IoT 16%</text>

  <!-- Segment 1: Mobile -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="260" height="530" fill="#1e293b" stroke="#6366F1" stroke-width="2.5" rx="12"/>
    <text x="130" y="40" font-size="22" font-weight="700" fill="#c7d2fe" text-anchor="middle">모바일</text>
    <text x="130" y="68" font-size="14" fill="#dbeafe" text-anchor="middle">스마트폰·태블릿</text>

    <!-- Revenue bar -->
    <rect x="40" y="100" width="180" height="280" fill="#6366F1" opacity="0.7" rx="4"/>
    <text x="130" y="240" font-size="34" font-weight="700" fill="#f8fafc" text-anchor="middle">$2.2B</text>
    <text x="130" y="270" font-size="18" fill="#f8fafc" text-anchor="middle">55%</text>

    <line x1="20" y1="400" x2="240" y2="400" stroke="#334155"/>
    <text x="30" y="428" font-size="13" fill="#94a3b8">전년 성장</text>
    <text x="230" y="428" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">+8%</text>
    <text x="30" y="455" font-size="13" fill="#94a3b8">점유율</text>
    <text x="230" y="455" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="end">99% 🥇</text>
    <text x="30" y="500" font-size="13" fill="#cbd5e1" text-anchor="start">Apple·Qualcomm·MediaTek·Samsung</text>
  </g>

  <!-- Segment 2: Data Center -->
  <g transform="translate(340, 150)">
    <rect x="0" y="0" width="260" height="530" fill="#1e293b" stroke="#22c55e" stroke-width="3" rx="12"/>
    <text x="130" y="40" font-size="22" font-weight="700" fill="#86efac" text-anchor="middle">데이터센터 ★</text>
    <text x="130" y="68" font-size="14" fill="#d1fae5" text-anchor="middle">서버·AI</text>

    <rect x="60" y="255" width="140" height="125" fill="#22c55e" opacity="0.7" rx="4"/>
    <text x="130" y="315" font-size="32" font-weight="700" fill="#f8fafc" text-anchor="middle">$0.6B</text>
    <text x="130" y="343" font-size="17" fill="#f8fafc" text-anchor="middle">15%</text>

    <line x1="20" y1="400" x2="240" y2="400" stroke="#334155"/>
    <text x="30" y="428" font-size="13" fill="#94a3b8">전년 성장</text>
    <text x="230" y="428" font-size="17" font-weight="700" fill="#fbbf24" text-anchor="end">+65% 🚀</text>
    <text x="30" y="455" font-size="13" fill="#94a3b8">점유율</text>
    <text x="230" y="455" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">20%+</text>
    <text x="30" y="500" font-size="12" fill="#cbd5e1" text-anchor="start">AWS Graviton · Nvidia Grace · MS Cobalt · Google Axion</text>
  </g>

  <!-- Segment 3: Automotive -->
  <g transform="translate(620, 150)">
    <rect x="0" y="0" width="260" height="530" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="12"/>
    <text x="130" y="40" font-size="22" font-weight="700" fill="#fde68a" text-anchor="middle">자동차</text>
    <text x="130" y="68" font-size="14" fill="#fde68a" text-anchor="middle">ADAS·인포테인먼트</text>

    <rect x="70" y="270" width="120" height="110" fill="#fbbf24" opacity="0.7" rx="4"/>
    <text x="130" y="325" font-size="30" font-weight="700" fill="#0a0e1a" text-anchor="middle">$0.55B</text>
    <text x="130" y="352" font-size="17" fill="#0a0e1a" text-anchor="middle">14%</text>

    <line x1="20" y1="400" x2="240" y2="400" stroke="#334155"/>
    <text x="30" y="428" font-size="13" fill="#94a3b8">전년 성장</text>
    <text x="230" y="428" font-size="15" font-weight="700" fill="#86efac" text-anchor="end">+25%</text>
    <text x="30" y="455" font-size="13" fill="#94a3b8">점유율</text>
    <text x="230" y="455" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="end">60%+</text>
    <text x="30" y="500" font-size="13" fill="#cbd5e1" text-anchor="start">Tesla FSD · 현대 · 폭스바겐 · BMW</text>
  </g>

  <!-- Segment 4: IoT -->
  <g transform="translate(900, 150)">
    <rect x="0" y="0" width="240" height="530" fill="#1e293b" stroke="#94a3b8" stroke-width="2" rx="12"/>
    <text x="120" y="40" font-size="22" font-weight="700" fill="#cbd5e1" text-anchor="middle">IoT·임베디드</text>
    <text x="120" y="68" font-size="13" fill="#cbd5e1" text-anchor="middle">가전·산업·웨어러블</text>

    <rect x="60" y="250" width="120" height="130" fill="#94a3b8" opacity="0.65" rx="4"/>
    <text x="120" y="310" font-size="30" font-weight="700" fill="#0a0e1a" text-anchor="middle">$0.66B</text>
    <text x="120" y="338" font-size="17" fill="#0a0e1a" text-anchor="middle">16%</text>

    <line x1="20" y1="400" x2="220" y2="400" stroke="#334155"/>
    <text x="30" y="428" font-size="13" fill="#94a3b8">전년 성장</text>
    <text x="210" y="428" font-size="15" font-weight="700" fill="#cbd5e1" text-anchor="end">+5%</text>
    <text x="30" y="455" font-size="13" fill="#94a3b8">점유율</text>
    <text x="210" y="455" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="end">90%+</text>
    <text x="30" y="500" font-size="12" fill="#cbd5e1" text-anchor="start">ARM Cortex-M · 수백억 개 출하</text>
  </g>

  <!-- Insight -->
  <text x="600" y="700" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">출처: ARM FY2025 사업보고서 세그먼트 주석 (2025년 3월 결산 기준)</text>
</svg>
