<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>ARM 34년 타임라인 1990~2026</title>
  <desc>1990 설립 → 2016 소프트뱅크 인수 → 2020 엔비디아 인수 시도 → 2023 IPO</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">ARM 34년 — 제조 없는 반도체 회사의 궤적</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">1990 케임브리지 12명 → 2016 소프트뱅크 $32B 인수 → 2023 나스닥 재상장</text>

  <!-- Axis -->
  <line x1="80" y1="400" x2="1140" y2="400" stroke="#334155" stroke-width="2"/>

  <g font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="130" y="430">1990</text><circle cx="130" cy="400" r="8" fill="#fbbf24"/>
    <text x="260" y="430">1993</text><circle cx="260" cy="400" r="5" fill="#64748b"/>
    <text x="400" y="430">1998</text><circle cx="400" cy="400" r="7" fill="#6366F1"/>
    <text x="550" y="430">2016.7</text><circle cx="550" cy="400" r="10" fill="#ec4899"/>
    <text x="700" y="430">2020.9</text><circle cx="700" cy="400" r="10" fill="#fbbf24"/>
    <text x="850" y="430">2022.2</text><circle cx="850" cy="400" r="8" fill="#ef4444"/>
    <text x="1010" y="430">2023.9.14</text><circle cx="1010" cy="400" r="12" fill="#22c55e" stroke="#fbbf24" stroke-width="3"/>
    <text x="1130" y="430">2026</text><circle cx="1130" cy="400" r="5" fill="#64748b"/>
  </g>

  <!-- Events -->
  <g font-family="-apple-system, sans-serif">
    <!-- 1990 설립 -->
    <line x1="130" y1="400" x2="130" y2="200" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="60" y="150" width="140" height="50" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="6"/>
    <text x="130" y="172" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">1990.11.27</text>
    <text x="130" y="190" font-size="12" fill="#fde68a" text-anchor="middle">ARM 설립 (Apple $3M)</text>

    <!-- 1993 Newton -->
    <line x1="260" y1="400" x2="260" y2="280" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="210" y="240" width="100" height="40" fill="#1e293b" stroke="#64748b" rx="5"/>
    <text x="260" y="263" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">Apple Newton</text>

    <!-- 1998 양대 상장 -->
    <line x1="400" y1="400" x2="400" y2="240" stroke="#6366F1" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="330" y="190" width="140" height="55" fill="#1e293b" stroke="#6366F1" stroke-width="2" rx="6"/>
    <text x="400" y="214" font-size="13" font-weight="700" fill="#c7d2fe" text-anchor="middle">1998</text>
    <text x="400" y="232" font-size="12" fill="#dbeafe" text-anchor="middle">런던·나스닥 상장</text>

    <!-- 2016 소프트뱅크 -->
    <line x1="550" y1="400" x2="550" y2="180" stroke="#ec4899" stroke-width="2.5" stroke-dasharray="3,3"/>
    <rect x="475" y="120" width="150" height="65" fill="#831843" stroke="#ec4899" stroke-width="2" rx="6"/>
    <text x="550" y="145" font-size="14" font-weight="700" fill="#fbcfe8" text-anchor="middle">2016.7.18</text>
    <text x="550" y="163" font-size="13" fill="#fce7f3" text-anchor="middle">소프트뱅크 $32B</text>
    <text x="550" y="180" font-size="12" fill="#fce7f3" text-anchor="middle">전량 인수 · 비상장</text>

    <!-- 2020.9 Nvidia -->
    <line x1="700" y1="400" x2="700" y2="250" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="625" y="190" width="150" height="60" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="6"/>
    <text x="700" y="213" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">2020.9.13</text>
    <text x="700" y="231" font-size="12" fill="#fde68a" text-anchor="middle">엔비디아 $40B</text>
    <text x="700" y="247" font-size="12" fill="#fde68a" text-anchor="middle">인수 발표</text>

    <!-- 2022.2 무산 -->
    <line x1="850" y1="400" x2="850" y2="200" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="790" y="150" width="120" height="50" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="850" y="174" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">2022.2.7</text>
    <text x="850" y="192" font-size="12" fill="#fca5a5" text-anchor="middle">인수 무산</text>

    <!-- 2023.9 IPO -->
    <line x1="1010" y1="400" x2="1010" y2="160" stroke="#22c55e" stroke-width="3" stroke-dasharray="3,3"/>
    <rect x="930" y="90" width="160" height="75" fill="#0f2e1a" stroke="#22c55e" stroke-width="3" rx="8"/>
    <text x="1010" y="115" font-size="15" font-weight="800" fill="#fde68a" text-anchor="middle">2023.9.14 ★</text>
    <text x="1010" y="135" font-size="13" fill="#86efac" text-anchor="middle">나스닥 IPO</text>
    <text x="1010" y="153" font-size="12" fill="#d1fae5" text-anchor="middle">$51 → $63 (+24.7%)</text>

    <!-- 2023 이후 AI 붐 -->
    <rect x="1040" y="460" width="130" height="80" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="1105" y="486" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">2024~2026</text>
    <text x="1105" y="506" font-size="12" fill="#d1fae5" text-anchor="middle">AI 붐</text>
    <text x="1105" y="524" font-size="12" fill="#d1fae5" text-anchor="middle">시가총액 $150B</text>
  </g>

  <!-- Key moments rows -->
  <g transform="translate(80, 550)">
    <rect x="0" y="0" width="1060" height="50" fill="#1e293b" rx="6"/>
    <text x="20" y="23" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">1990 설립 → 설계만 팔기로 한 결정이 2026년 시가총액 $150B를 만들었다</text>
    <text x="20" y="42" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">30년간 "제조 안 함" 구조가 Apple·Qualcomm·Nvidia·Samsung 모두의 공급자이자 경쟁사 사이 중립 지위로 성장</text>
  </g>

  <g transform="translate(80, 615)">
    <rect x="0" y="0" width="1060" height="50" fill="#1e293b" rx="6"/>
    <text x="20" y="23" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ec4899">2016 소프트뱅크 $32B 인수 → 2023 IPO로 $150B 평가받음 = 7년 만에 +370%</text>
    <text x="20" y="42" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">비상장 기간에 AI 시대 도래 + Apple Mac ARM 전환(2020) + AWS Graviton 확산 = 평가 폭증의 기반</text>
  </g>
</svg>
