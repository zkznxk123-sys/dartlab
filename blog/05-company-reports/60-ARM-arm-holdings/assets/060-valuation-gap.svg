<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>ARM 매출 $4B vs 시가총액 $150B — 플랫폼 평가의 37배 간극</title>
  <desc>ARM 매출·영업이익·자본 vs 시가총액의 크기 비교, 플랫폼 프리미엄 구조</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출 $4B 회사의 시가총액 $150B</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">ARM을 반도체 회사가 아닌 반도체 플랫폼으로 평가한 시장 — 37배 간극</text>

  <!-- Bar comparison -->
  <g transform="translate(60, 160)">
    <!-- 매출 $4.01B -->
    <rect x="0" y="30" width="28" height="80" fill="#6366F1" rx="3"/>
    <text x="40" y="80" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#c7d2fe">매출 $4.01B</text>
    <text x="200" y="80" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">FY2025 · 1배 기준선</text>

    <!-- 영업이익 $0.83B -->
    <rect x="0" y="140" width="6" height="80" fill="#22c55e" rx="2"/>
    <text x="40" y="190" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#86efac">영업이익 $0.83B</text>
    <text x="250" y="190" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">0.21배 (영업이익률 20.7%)</text>

    <!-- 자본 $4.05B -->
    <rect x="0" y="250" width="29" height="80" fill="#fbbf24" rx="3"/>
    <text x="40" y="300" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fde68a">자본 $4.05B</text>
    <text x="200" y="300" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">1.01배 (장부가 기준)</text>

    <!-- 시가총액 $150B -->
    <rect x="0" y="380" width="1040" height="120" fill="#ec4899" stroke="#fbbf24" stroke-width="3" rx="6"/>
    <text x="24" y="420" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#fbcfe8">시가총액 $150B</text>
    <text x="24" y="450" font-family="-apple-system, sans-serif" font-size="16" fill="#fce7f3">37배 (매출 대비) · 190배 (순이익 대비)</text>
    <text x="24" y="480" font-family="-apple-system, sans-serif" font-size="15" fill="#fde68a">→ 시장이 ARM을 "반도체 회사"가 아닌 "반도체 플랫폼"으로 평가한다는 뜻</text>
  </g>

  <!-- Comparison benchmarks -->
  <g transform="translate(60, 680)">
    <rect x="0" y="-20" width="1080" height="38" fill="#1e293b" rx="6"/>
    <text x="540" y="3" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9" text-anchor="middle">S&amp;P 500 평균 PSR 3배 / 반도체 섹터 8배 / 소프트웨어 섹터 10배 / Visa·Mastercard 15배 / ARM 37배</text>
  </g>
</svg>
