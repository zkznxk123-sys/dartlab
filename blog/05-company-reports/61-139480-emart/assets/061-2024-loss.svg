<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2024 순손실 -5,734억 해부</title>
  <desc>영업이익 +471억 → 영업권 손상 -2,500 + 금융비용 -3,800 = 순손실 -5,734억</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">순손실 -5,734억은 어떻게 만들어졌는가</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2024년 손익계산서 맨 아래 다섯 줄 — 영업 흑자인데 순이익은 창사 최악</text>

  <!-- Waterfall -->
  <g transform="translate(80, 160)">
    <line x1="0" y1="390" x2="1040" y2="390" stroke="#334155" stroke-width="1.5"/>

    <!-- 영업이익 +471 -->
    <rect x="30" y="380" width="100" height="14" fill="#22c55e" stroke="#fbbf24" stroke-width="2" rx="2"/>
    <text x="80" y="372" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">+471</text>
    <text x="80" y="420" font-size="13" fill="#cbd5e1" text-anchor="middle">영업이익</text>

    <!-- 금융수익 +900 -->
    <rect x="170" y="366" width="100" height="24" fill="#fbbf24" rx="2"/>
    <text x="220" y="358" font-size="14" fill="#fde68a" text-anchor="middle">+900</text>
    <text x="220" y="420" font-size="13" fill="#cbd5e1" text-anchor="middle">금융수익</text>

    <!-- 금융비용 -3,800 -->
    <rect x="310" y="390" width="100" height="112" fill="#ef4444" rx="2"/>
    <text x="360" y="514" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">-3,800</text>
    <text x="360" y="540" font-size="13" fill="#cbd5e1" text-anchor="middle">금융비용</text>
    <text x="360" y="558" font-size="11" fill="#94a3b8" text-anchor="middle">(차입이자+리스이자)</text>

    <!-- 기타 영업외 -3,300 -->
    <rect x="450" y="390" width="100" height="97" fill="#dc2626" stroke="#fbbf24" stroke-width="2" rx="2"/>
    <text x="500" y="499" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">-3,300</text>
    <text x="500" y="540" font-size="13" fill="#cbd5e1" text-anchor="middle">영업외 손실</text>
    <text x="500" y="558" font-size="11" fill="#fde68a" text-anchor="middle">(영업권 손상 포함)</text>

    <!-- 기타 +200 -->
    <rect x="590" y="386" width="60" height="4" fill="#22c55e" rx="1"/>
    <text x="620" y="378" font-size="13" fill="#86efac" text-anchor="middle">+200</text>
    <text x="620" y="420" font-size="13" fill="#cbd5e1" text-anchor="middle">기타</text>

    <!-- 세전이익 -5,500 -->
    <rect x="690" y="390" width="100" height="165" fill="#ef4444" rx="2"/>
    <text x="740" y="567" font-size="16" font-weight="700" fill="#fca5a5" text-anchor="middle">-5,500</text>
    <text x="740" y="594" font-size="14" font-weight="700" fill="#cbd5e1" text-anchor="middle">세전이익</text>

    <!-- 법인세 -234 -->
    <rect x="830" y="390" width="60" height="10" fill="#ef4444" rx="1"/>
    <text x="860" y="418" font-size="13" fill="#fca5a5" text-anchor="middle">-234</text>

    <!-- 순이익 -5,734 -->
    <rect x="920" y="390" width="120" height="172" fill="#dc2626" stroke="#fbbf24" stroke-width="3" rx="3"/>
    <text x="980" y="575" font-size="18" font-weight="800" fill="#fde68a" text-anchor="middle">-5,734 ★</text>
    <text x="980" y="602" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">순이익</text>
    <text x="980" y="620" font-size="12" fill="#fca5a5" text-anchor="middle">창사 최악</text>
  </g>

  <!-- Breakdown panel -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="100" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="24" y="30" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fbbf24">영업외 손실 -3,300억 내역 (사업보고서 주석 기반)</text>
    <text x="24" y="55" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">영업권 손상차손 (G마켓) 약 2,500억 · 유형자산 손상 약 500억 · 투자주식 평가손 약 200억 · 기타 100억</text>
    <text x="24" y="80" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fde68a">영업이익 +471억을 영업권 손상 2,500억과 금융비용 3,800억이 압도 → 순손실 -5,734억 (창사 최대)</text>
  </g>
</svg>
