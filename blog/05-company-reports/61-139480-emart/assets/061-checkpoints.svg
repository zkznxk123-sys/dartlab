<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>2026~2028 이마트 관찰 4가지</title>
  <desc>영업이익률 2% 복귀·영업권 추가 손상·SSG닷컴 흑자 전환·신용등급 방향</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2028 이마트 관찰 4가지</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">매출 기계가 다시 이익 기계로 돌아갈지를 가릴 신호</text>

  <!-- Signal 1 -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#22c55e"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">연결 영업이익률 2% 복귀</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">2025 1.11% → 2027 2.0% 궤적이면 정상화. 미만이면 구조적 쇠퇴 굳어짐.</text>
    <rect x="100" y="78" width="380" height="34" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">2027 2.0% → 한 대표 성공</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">1.5% 미만 정체 → 본업 쇠퇴 확정</text>
  </g>

  <!-- Signal 2 -->
  <g transform="translate(60, 285)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#ec4899" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#ec4899"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">2</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">이베이코리아 영업권 추가 손상 여부</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">2025 말 잔여 영업권 2.3~2.5조. G마켓 거래액 -10%+ 감소면 추가 1,000~2,000억 손상.</text>
    <rect x="100" y="78" width="380" height="34" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">2026 추가 손상 無 → 최악 통과</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">추가 1,000억+ 손상 → 또 순손실</text>
  </g>

  <!-- Signal 3 -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#fbbf24"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">3</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">SSG닷컴 영업 흑자 전환</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">2024 적자 약 1,500억. 2026 흑자 전환이 e커머스 전략 성공의 결정 지표.</text>
    <rect x="100" y="78" width="380" height="34" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">2026 흑자 → e커머스 생존 확인</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">적자 지속 → 분사·매각 카드</text>
  </g>

  <!-- Signal 4 -->
  <g transform="translate(60, 575)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#8b5cf6"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">4</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">신용등급 dCR-BB+ 이탈 방향</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">현재 투기등급 근접. 영업이익+부채 축소 시 회복, 악화 시 투기등급 진입.</text>
    <rect x="100" y="78" width="380" height="34" fill="#1e1b4b" stroke="#6366F1" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#c7d2fe" text-anchor="middle">dCR-BBB- 승격 → 자금조달 정상화</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">BB 이하 → 투기등급 진입, 조달비용↑</text>
  </g>
</svg>
