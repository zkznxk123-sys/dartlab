<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>이마트 4개 전선 — 쿠팡·컬리·네이버·코스트코 동시 경쟁</title>
  <desc>사업부별로 서로 다른 경쟁사와 마주하는 다방면 전선의 지도</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">이마트는 4개 전선에서 동시에 싸운다</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">사업부마다 경쟁사가 다르고, 이기는 전선·비기는 전선·지는 전선이 섞여 있다</text>

  <!-- 이마트 중앙 -->
  <g transform="translate(600, 380)">
    <circle cx="0" cy="0" r="95" fill="#1e293b" stroke="#fbbf24" stroke-width="3"/>
    <text x="0" y="-10" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#fde68a" text-anchor="middle">이마트</text>
    <text x="0" y="15" font-family="-apple-system, sans-serif" font-size="14" fill="#fde68a" text-anchor="middle">매출 29조</text>
    <text x="0" y="35" font-family="-apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">영업 3,225억</text>
    <text x="0" y="52" font-family="-apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">OPM 1.1%</text>
  </g>

  <!-- 전선 1: 대형마트 - 롯데/홈플 -->
  <g transform="translate(120, 160)">
    <rect x="0" y="0" width="260" height="130" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="130" y="30" font-size="16" font-weight="700" fill="#86efac" text-anchor="middle">전선 1 · 대형마트</text>
    <text x="130" y="55" font-size="13" fill="#d1fae5" text-anchor="middle">이마트 본체 16조</text>
    <text x="130" y="78" font-size="14" fill="#cbd5e1" text-anchor="middle">vs 롯데마트 5.2조</text>
    <text x="130" y="96" font-size="14" fill="#cbd5e1" text-anchor="middle">vs 홈플러스 5.2조</text>
    <text x="130" y="120" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">이기는 중 · 40% 점유</text>
  </g>

  <!-- 전선 2: 창고형 - 코스트코 -->
  <g transform="translate(820, 160)">
    <rect x="0" y="0" width="260" height="130" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="130" y="30" font-size="16" font-weight="700" fill="#fde68a" text-anchor="middle">전선 2 · 창고형</text>
    <text x="130" y="55" font-size="13" fill="#fde68a" text-anchor="middle">트레이더스 4.2조</text>
    <text x="130" y="78" font-size="14" fill="#cbd5e1" text-anchor="middle">vs 코스트코 6.5조</text>
    <text x="130" y="96" font-size="12" fill="#94a3b8" text-anchor="middle">(점포·회원 열세)</text>
    <text x="130" y="120" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">뒤처지는 중 · 45%</text>
  </g>

  <!-- 전선 3: 편의점 - GS/CU/세븐 -->
  <g transform="translate(120, 480)">
    <rect x="0" y="0" width="260" height="130" fill="#1e293b" stroke="#f97316" stroke-width="2" rx="10"/>
    <text x="130" y="30" font-size="16" font-weight="700" fill="#fdba74" text-anchor="middle">전선 3 · 편의점</text>
    <text x="130" y="55" font-size="13" fill="#fed7aa" text-anchor="middle">이마트24 2.5조</text>
    <text x="130" y="78" font-size="14" fill="#cbd5e1" text-anchor="middle">vs GS25 · CU · 세븐일레븐</text>
    <text x="130" y="96" font-size="12" fill="#94a3b8" text-anchor="middle">(1/3 규모 후발주자)</text>
    <text x="130" y="120" font-size="14" font-weight="700" fill="#fdba74" text-anchor="middle">지고 있음 · 10% 4위</text>
  </g>

  <!-- 전선 4: e커머스 - 쿠팡/네이버/컬리 -->
  <g transform="translate(820, 480)">
    <rect x="0" y="0" width="260" height="130" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="130" y="30" font-size="16" font-weight="700" fill="#fca5a5" text-anchor="middle">전선 4 · e커머스</text>
    <text x="130" y="55" font-size="13" fill="#fecaca" text-anchor="middle">SSG+G마켓 4.5조</text>
    <text x="130" y="78" font-size="14" fill="#cbd5e1" text-anchor="middle">vs 쿠팡 38조 · 네이버 50조</text>
    <text x="130" y="96" font-size="12" fill="#94a3b8" text-anchor="middle">· 컬리 2.5조</text>
    <text x="130" y="120" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">지고 있음 · 6%</text>
  </g>

  <!-- Connecting lines from center -->
  <g stroke-width="2" fill="none">
    <line x1="510" y1="340" x2="380" y2="225" stroke="#22c55e" stroke-dasharray="5,3"/>
    <line x1="690" y1="340" x2="820" y2="225" stroke="#fbbf24" stroke-dasharray="5,3"/>
    <line x1="510" y1="420" x2="380" y2="545" stroke="#f97316" stroke-dasharray="5,3"/>
    <line x1="690" y1="420" x2="820" y2="545" stroke="#ef4444" stroke-dasharray="5,3"/>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="1080" height="60" fill="#1e293b" rx="8"/>
    <text x="24" y="30" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">4개 전선 중 1개만 이기는 중 · 1개 비기는 중 · 2개 지는 중</text>
    <text x="24" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">지는 2개 전선(편의점·e커머스)이 매출의 15%·적자의 대부분 담당 → 연결 영업이익률 1.1%의 본질</text>
  </g>
</svg>
