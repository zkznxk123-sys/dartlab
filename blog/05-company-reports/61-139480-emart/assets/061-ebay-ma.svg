<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2021.3 이베이코리아 3.4조 인수 → 2023~2024 영업권 손상 6,500억</title>
  <desc>이마트의 결정적 M&amp;A 한 건이 2024년 창사 최대 순손실을 만든 과정</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">3.4조 인수가 5,700억 손실이 된 4년</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">이베이코리아 인수 → G마켓 거래액 -35% → 영업권 누적 손상 4,700억</text>

  <!-- 인수 금액 구성 -->
  <g transform="translate(60, 160)">
    <text x="280" y="0" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fde68a" text-anchor="middle">2021.3.24 인수 대가 3조 4,404억</text>

    <!-- 식별 가능 순자산 -->
    <rect x="0" y="30" width="100" height="170" fill="#22c55e" opacity="0.7" rx="4"/>
    <text x="50" y="125" font-size="14" fill="#f8fafc" text-anchor="middle">식별 가능</text>
    <text x="50" y="145" font-size="14" fill="#f8fafc" text-anchor="middle">순자산</text>
    <text x="50" y="170" font-size="18" font-weight="700" fill="#f8fafc" text-anchor="middle">약 4,500억</text>

    <!-- 영업권 -->
    <rect x="110" y="30" width="450" height="170" fill="#ec4899" opacity="0.7" stroke="#fbbf24" stroke-width="2" rx="4"/>
    <text x="335" y="105" font-size="22" font-weight="700" fill="#fbcfe8" text-anchor="middle">영업권 (goodwill)</text>
    <text x="335" y="140" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">약 2조 9,900억</text>
    <text x="335" y="175" font-size="14" fill="#fce7f3" text-anchor="middle">= 인수가의 86%가 무형자산</text>
  </g>

  <!-- G마켓 거래액 하락 -->
  <g transform="translate(60, 390)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">G마켓 + 옥션 거래액 추이</text>

    <!-- Bars for 거래액 -->
    <g font-size="12" fill="#cbd5e1" text-anchor="middle">
      <rect x="30" y="30" width="100" height="100" fill="#22c55e" opacity="0.7" rx="3"/>
      <text x="80" y="85" fill="#f8fafc" font-weight="700" font-size="15">20.0조</text>
      <text x="80" y="150">2020 (인수 전)</text>

      <rect x="160" y="33" width="100" height="97" fill="#86efac" opacity="0.7" rx="3"/>
      <text x="210" y="85" fill="#f8fafc" font-weight="700" font-size="15">19.5조</text>
      <text x="210" y="150">2021</text>

      <rect x="290" y="42" width="100" height="88" fill="#fef9c3" opacity="0.7" rx="3"/>
      <text x="340" y="90" fill="#0a0e1a" font-weight="700" font-size="15">17.8조</text>
      <text x="340" y="150">2022</text>

      <rect x="420" y="55" width="100" height="75" fill="#fbbf24" opacity="0.7" rx="3"/>
      <text x="470" y="98" fill="#0a0e1a" font-weight="700" font-size="15">15.2조</text>
      <text x="470" y="150">2023</text>

      <rect x="550" y="66" width="100" height="64" fill="#f97316" opacity="0.8" rx="3"/>
      <text x="600" y="103" fill="#f8fafc" font-weight="700" font-size="15">13.0조</text>
      <text x="600" y="150">2024</text>

      <rect x="680" y="72" width="100" height="58" fill="#ef4444" opacity="0.8" rx="3"/>
      <text x="730" y="106" fill="#f8fafc" font-weight="700" font-size="15">12.0조</text>
      <text x="730" y="150">2025</text>
    </g>

    <!-- Arrow showing decline -->
    <path d="M 80 130 Q 405 250 730 160" stroke="#ef4444" stroke-width="3" fill="none" stroke-dasharray="5,3"/>
    <text x="405" y="245" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="middle">4년간 거래액 -35%</text>

    <!-- 손상차손 박스 -->
    <g transform="translate(830, 30)">
      <rect x="0" y="0" width="230" height="155" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="8"/>
      <text x="115" y="30" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="middle">영업권 손상차손</text>
      <line x1="20" y1="45" x2="210" y2="45" stroke="#334155"/>
      <text x="30" y="75" font-size="14" fill="#cbd5e1">2023</text>
      <text x="200" y="75" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="end">-2,200억</text>
      <text x="30" y="105" font-size="14" fill="#cbd5e1">2024</text>
      <text x="200" y="105" font-size="15" font-weight="700" fill="#fca5a5" text-anchor="end">-4,300억</text>
      <line x1="20" y1="120" x2="210" y2="120" stroke="#fbbf24"/>
      <text x="30" y="145" font-size="15" font-weight="700" fill="#fbbf24">누적</text>
      <text x="200" y="145" font-size="18" font-weight="700" fill="#fde68a" text-anchor="end">-6,500억</text>
    </g>
  </g>

  <!-- Bottom: 가치 파괴 -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="24" y="30" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fbbf24">인수 가치 파괴 정량화</text>
    <text x="24" y="55" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">지불가 3.44조 · 2025 현재 G마켓 연결 기업가치 약 1조 · 누적 영업손실+영업권 손상 약 1.2조 = 순가치 파괴 약 2~2.4조</text>
    <text x="24" y="74" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fca5a5">4년 만에 인수금액의 60~70%가 장부에서 소멸 → 2024년 창사 최대 순손실의 직접 원인</text>
  </g>
</svg>
