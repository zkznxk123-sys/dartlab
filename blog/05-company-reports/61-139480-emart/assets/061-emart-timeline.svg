<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>이마트 32년 타임라인 1993~2025</title>
  <desc>1993 창동 1호점 → 2011 분할상장 → 2012 규제 → 2021 이베이 인수 → 2023 창사 첫 적자</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">이마트 32년 — 한국 대형마트의 서사</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">1993 창동 1호점 → 2011 분할 → 2021 이베이코리아 3.4조 → 2024 첫 순손실</text>

  <!-- Timeline -->
  <line x1="80" y1="380" x2="1140" y2="380" stroke="#334155" stroke-width="2"/>

  <g font-family="-apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
    <text x="130" y="405">1993</text><circle cx="130" cy="380" r="10" fill="#22c55e"/>
    <text x="260" y="405">2000</text><circle cx="260" cy="380" r="5" fill="#64748b"/>
    <text x="390" y="405">2011</text><circle cx="390" cy="380" r="9" fill="#6366F1"/>
    <text x="520" y="405">2012</text><circle cx="520" cy="380" r="7" fill="#ef4444"/>
    <text x="650" y="405">2015</text><circle cx="650" cy="380" r="7" fill="#fbbf24"/>
    <text x="780" y="405">2021.3</text><circle cx="780" cy="380" r="11" fill="#ec4899" stroke="#fbbf24" stroke-width="2"/>
    <text x="910" y="405">2023</text><circle cx="910" cy="380" r="8" fill="#ef4444"/>
    <text x="1030" y="405">2024</text><circle cx="1030" cy="380" r="11" fill="#dc2626" stroke="#fbbf24" stroke-width="2"/>
    <text x="1120" y="405">2025</text><circle cx="1120" cy="380" r="7" fill="#22c55e"/>
  </g>

  <!-- Events -->
  <g font-family="-apple-system, sans-serif">
    <!-- 1993 창동점 -->
    <line x1="130" y1="380" x2="130" y2="220" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="65" y="170" width="130" height="55" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="130" y="195" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">1993.11.12</text>
    <text x="130" y="214" font-size="12" fill="#d1fae5" text-anchor="middle">창동 1호점 개점</text>

    <!-- 2000 30점 -->
    <line x1="260" y1="380" x2="260" y2="270" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="210" y="235" width="100" height="40" fill="#1e293b" stroke="#64748b" rx="5"/>
    <text x="260" y="258" font-size="12" fill="#cbd5e1" text-anchor="middle">30호점 돌파</text>

    <!-- 2011 분할 -->
    <line x1="390" y1="380" x2="390" y2="215" stroke="#6366F1" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="320" y="170" width="140" height="55" fill="#1e293b" stroke="#6366F1" stroke-width="2" rx="6"/>
    <text x="390" y="195" font-size="14" font-weight="700" fill="#c7d2fe" text-anchor="middle">2011.5</text>
    <text x="390" y="214" font-size="12" fill="#dbeafe" text-anchor="middle">신세계 분할 상장</text>

    <!-- 2012 규제 -->
    <line x1="520" y1="380" x2="520" y2="270" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="450" y="235" width="140" height="40" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="520" y="258" font-size="12" font-weight="700" fill="#fca5a5" text-anchor="middle">월 2회 의무 휴무</text>

    <!-- 2015 스타필드 -->
    <line x1="650" y1="380" x2="650" y2="220" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="580" y="175" width="140" height="50" fill="#422006" stroke="#fbbf24" stroke-width="1.5" rx="6"/>
    <text x="650" y="198" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">2015.9</text>
    <text x="650" y="215" font-size="12" fill="#fde68a" text-anchor="middle">스타필드 하남</text>

    <!-- 2021 이베이 -->
    <line x1="780" y1="380" x2="780" y2="170" stroke="#ec4899" stroke-width="2.5" stroke-dasharray="3,3"/>
    <rect x="700" y="120" width="160" height="55" fill="#831843" stroke="#ec4899" stroke-width="2.5" rx="6"/>
    <text x="780" y="145" font-size="14" font-weight="700" fill="#fbcfe8" text-anchor="middle">2021.3.24</text>
    <text x="780" y="164" font-size="12" fill="#fce7f3" text-anchor="middle">이베이코리아 3.4조</text>

    <!-- 2023 첫 적자 -->
    <line x1="910" y1="380" x2="910" y2="460" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="845" y="465" width="130" height="55" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="910" y="487" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">2023 창사 첫</text>
    <text x="910" y="506" font-size="12" fill="#fca5a5" text-anchor="middle">영업적자 -469억</text>

    <!-- 2024 순손실 -->
    <line x1="1030" y1="380" x2="1030" y2="540" stroke="#dc2626" stroke-width="3" stroke-dasharray="3,3"/>
    <rect x="950" y="545" width="160" height="70" fill="#3c0a0a" stroke="#dc2626" stroke-width="3" rx="8"/>
    <text x="1030" y="572" font-size="15" font-weight="800" fill="#fde68a" text-anchor="middle">2024 ★ 창사 최악</text>
    <text x="1030" y="592" font-size="14" fill="#fca5a5" text-anchor="middle">순손실 -5,734억</text>
    <text x="1030" y="608" font-size="11" fill="#fca5a5" text-anchor="middle">영업권 손상 4,300억</text>

    <!-- 2025 회복 -->
    <line x1="1120" y1="380" x2="1120" y2="485" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="1060" y="490" width="120" height="40" fill="#052e16" stroke="#22c55e" rx="4"/>
    <text x="1120" y="515" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">2025 영업 3,225억</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(60, 650)">
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b" rx="6"/>
    <text x="24" y="22" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fbbf24">32년간의 두 변곡점: 2012 규제 (성장 둔화) + 2021 이베이 인수 (수익 타격)</text>
    <text x="24" y="42" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">2023년 처음으로 영업이익이 빨간 글자로 찍혔고, 2024년 순손실이 창사 최악을 기록</text>
  </g>
</svg>
