<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>이마트 8년 역행 — 매출 2배 성장 vs 영업이익 반토막</title>
  <desc>2017~2025 매출·영업이익·영업이익률 추이와 방향의 역행</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출 2배·영업이익 반토막 — 8년의 역행</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2017 매출 15.88조 → 2025 28.97조 · 영업이익 5,669억 → 3,225억</text>

  <!-- Axis labels -->
  <text x="60" y="170" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">연도</text>
  <text x="60" y="480" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">영업이익률(%)</text>

  <!-- Year columns -->
  <g font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="145" y="160">2017</text>
    <text x="265" y="160">2018</text>
    <text x="385" y="160">2019</text>
    <text x="505" y="160">2020</text>
    <text x="625" y="160">2021</text>
    <text x="745" y="160">2022</text>
    <text x="865" y="160">2023</text>
    <text x="985" y="160">2024</text>
    <text x="1105" y="160">2025</text>
  </g>

  <!-- Revenue bars (상단, blue) -->
  <g>
    <text x="55" y="200" font-size="12" fill="#c7d2fe">매출 (조원)</text>
    <!-- 15.88 -> 28.97 scale: width = value * 8, y offset -->
    <rect x="120" y="310" width="50" height="50" fill="#6366F1" rx="3"/>
    <text x="145" y="343" font-size="14" fill="#f8fafc" text-anchor="middle">15.9</text>

    <rect x="240" y="303" width="50" height="57" fill="#6366F1" rx="3"/>
    <text x="265" y="336" font-size="14" fill="#f8fafc" text-anchor="middle">17.0</text>

    <rect x="360" y="290" width="50" height="70" fill="#6366F1" rx="3"/>
    <text x="385" y="323" font-size="14" fill="#f8fafc" text-anchor="middle">19.1</text>

    <rect x="480" y="275" width="50" height="85" fill="#6366F1" rx="3"/>
    <text x="505" y="308" font-size="14" fill="#f8fafc" text-anchor="middle">22.0</text>

    <rect x="600" y="254" width="50" height="106" fill="#6366F1" rx="3"/>
    <text x="625" y="285" font-size="14" fill="#f8fafc" text-anchor="middle">24.9</text>

    <rect x="720" y="225" width="50" height="135" fill="#6366F1" rx="3"/>
    <text x="745" y="256" font-size="14" fill="#f8fafc" text-anchor="middle">29.3</text>

    <rect x="840" y="224" width="50" height="136" fill="#6366F1" rx="3"/>
    <text x="865" y="255" font-size="14" fill="#f8fafc" text-anchor="middle">29.5</text>

    <rect x="960" y="227" width="50" height="133" fill="#6366F1" rx="3"/>
    <text x="985" y="258" font-size="14" fill="#f8fafc" text-anchor="middle">29.0</text>

    <rect x="1080" y="228" width="50" height="132" fill="#6366F1" stroke="#fbbf24" stroke-width="2" rx="3"/>
    <text x="1105" y="259" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">29.0</text>
  </g>

  <!-- Operating profit line (하단) -->
  <g>
    <text x="55" y="510" font-size="12" fill="#fde68a">영업이익률(%)</text>

    <!-- y baseline: 600 (=0%), 1%=60px down, -1%=60px up -->
    <line x1="100" y1="600" x2="1140" y2="600" stroke="#334155" stroke-width="1.5"/>

    <!-- OPM values: 3.57 → 2.71 → 0.79 → 1.08 → 1.27 → 0.46 → -0.16 → 0.16 → 1.11 -->
    <polyline points="145,386 265,437 385,553 505,535 625,524 745,572 865,610 985,590 1105,533" stroke="#fbbf24" stroke-width="3.5" fill="none"/>
    <g fill="#fbbf24" stroke="#0a0e1a" stroke-width="2">
      <circle cx="145" cy="386" r="7"/>
      <circle cx="265" cy="437" r="6"/>
      <circle cx="385" cy="553" r="6"/>
      <circle cx="505" cy="535" r="6"/>
      <circle cx="625" cy="524" r="6"/>
      <circle cx="745" cy="572" r="6"/>
      <circle cx="865" cy="610" r="8" fill="#ef4444"/>
      <circle cx="985" cy="590" r="6"/>
      <circle cx="1105" cy="533" r="7"/>
    </g>

    <!-- OPM value labels -->
    <g font-size="12" fill="#fde68a" text-anchor="middle">
      <text x="145" y="378">3.57%</text>
      <text x="265" y="429">2.71%</text>
      <text x="385" y="545">0.79%</text>
      <text x="505" y="527">1.08%</text>
      <text x="625" y="516">1.27%</text>
      <text x="745" y="564">0.46%</text>
      <text x="865" y="625" fill="#fca5a5" font-weight="700">-0.16% ★</text>
      <text x="985" y="582">0.16%</text>
      <text x="1105" y="525" font-weight="700">1.11%</text>
    </g>
  </g>

  <!-- Arrow from 2017 to 2025 (역행) -->
  <g transform="translate(0, 0)">
    <path d="M 200 250 Q 600 180 1080 290" stroke="#22c55e" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
    <text x="600" y="200" font-size="15" fill="#86efac" text-anchor="middle" font-weight="600">매출 방향 ↑ (+83%)</text>
  </g>

  <g transform="translate(0, 0)">
    <path d="M 200 390 Q 600 660 1080 540" stroke="#ef4444" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
    <text x="600" y="700" font-size="15" fill="#fca5a5" text-anchor="middle" font-weight="600">영업이익률 방향 ↓ (-69%) — 매출과 반대로</text>
  </g>

  <!-- Insight box -->
  <g transform="translate(60, 655)">
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b" rx="8"/>
    <text x="24" y="30" font-family="-apple-system, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">매출 +83% · 영업이익률 -2.46%p · 영업이익 절대값 -43% → 성장과 수익이 서로 반대 방향으로 움직인 8년</text>
  </g>
</svg>
