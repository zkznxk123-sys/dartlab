<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>매출총이익률 +2.9%p vs 판관비율 +5.4%p — 영업이익률 -2.5%p의 구조</title>
  <desc>2017 vs 2025 매출총이익·판관비·영업이익 변화의 워터폴</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출총이익 +4.57조 = 판관비 +4.82조 + α</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">매출총이익률은 개선 · 판관비율은 더 많이 악화 → 영업이익률 -2.46%p</text>

  <!-- 2017 / 2025 컬럼 비교 -->
  <g transform="translate(100, 170)">
    <!-- 2017 header -->
    <text x="140" y="0" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1" text-anchor="middle">2017</text>
    <text x="140" y="25" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">매출 15.88조</text>

    <!-- 매출총이익 2017: 4.52조 (28.5%) -->
    <rect x="20" y="60" width="240" height="114" fill="#22c55e" opacity="0.7" rx="4"/>
    <text x="140" y="115" font-size="20" font-weight="700" fill="#f8fafc" text-anchor="middle">매출총이익</text>
    <text x="140" y="142" font-size="18" font-weight="700" fill="#f8fafc" text-anchor="middle">4.52조 (28.5%)</text>

    <!-- 판관비 2017: 3.95조 (24.9%) -->
    <rect x="20" y="195" width="240" height="100" fill="#ef4444" opacity="0.7" rx="4"/>
    <text x="140" y="240" font-size="20" font-weight="700" fill="#fef2f2" text-anchor="middle">판관비</text>
    <text x="140" y="268" font-size="18" font-weight="700" fill="#fef2f2" text-anchor="middle">3.95조 (24.9%)</text>

    <!-- 영업이익 2017 -->
    <rect x="20" y="315" width="240" height="30" fill="#fbbf24" rx="3"/>
    <text x="140" y="337" font-size="16" font-weight="700" fill="#0a0e1a" text-anchor="middle">영업 0.57조 (3.57%) ★</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(450, 370)">
    <text x="0" y="-30" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">8년</text>
    <path d="M -60 0 L 60 0" stroke="#fbbf24" stroke-width="4" fill="none"/>
    <path d="M 55 0 L 40 -12 L 40 12 Z" fill="#fbbf24"/>
    <text x="0" y="40" font-size="15" fill="#fde68a" text-anchor="middle">+매출 +82%</text>
  </g>

  <!-- 2025 컬럼 -->
  <g transform="translate(620, 170)">
    <text x="140" y="0" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#fde68a" text-anchor="middle">2025</text>
    <text x="140" y="25" font-family="-apple-system, sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle">매출 28.97조</text>

    <!-- 매출총이익 2025: 9.09조 (31.4%) -->
    <rect x="20" y="60" width="240" height="125" fill="#22c55e" opacity="0.85" stroke="#fbbf24" stroke-width="2" rx="4"/>
    <text x="140" y="115" font-size="20" font-weight="700" fill="#f8fafc" text-anchor="middle">매출총이익</text>
    <text x="140" y="142" font-size="18" font-weight="700" fill="#f8fafc" text-anchor="middle">9.09조 (31.4%) ↑</text>
    <text x="140" y="170" font-size="14" fill="#d1fae5" text-anchor="middle">+2.9%p 개선</text>

    <!-- 판관비 2025: 8.77조 (30.3%) -->
    <rect x="20" y="205" width="240" height="121" fill="#ef4444" opacity="0.85" stroke="#fbbf24" stroke-width="2" rx="4"/>
    <text x="140" y="255" font-size="20" font-weight="700" fill="#fef2f2" text-anchor="middle">판관비</text>
    <text x="140" y="283" font-size="18" font-weight="700" fill="#fef2f2" text-anchor="middle">8.77조 (30.3%) ↑↑</text>
    <text x="140" y="311" font-size="14" fill="#fecaca" text-anchor="middle">+5.4%p 악화 (더 많이)</text>

    <!-- 영업이익 2025 -->
    <rect x="20" y="346" width="240" height="12" fill="#fbbf24" rx="2"/>
    <text x="140" y="376" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">영업 0.32조 (1.11%) ↓</text>
  </g>

  <!-- Bottom: decomposition -->
  <g transform="translate(60, 580)">
    <rect x="0" y="0" width="1080" height="110" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="24" y="32" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fbbf24">영업이익률 -2.46%p 분해</text>
    <text x="24" y="58" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">매출총이익률 개선 +2.9%p − 판관비율 증가 +5.4%p = 영업이익률 -2.5%p</text>
    <text x="24" y="80" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">판관비 +4.82조 증가 요인: IFRS 16 리스(+1조) + 이베이 자회사 편입(+1.5조) + 최저임금·인건비(+1조) + 기타(+1.3조)</text>
    <text x="24" y="102" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#fde68a">매출총이익 증가분 +4.57조가 판관비 증가 +4.82조에 거의 정확히 흡수됨</text>
  </g>
</svg>
