<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <title>한국 5대 금융지주 2025 비교 — PBR·ROE·주주환원율 3축</title>
  <desc>메리츠·KB·신한·하나·우리 비교 매트릭스</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">한국 5대 금융지주 2025 비교</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">메리츠 PBR 1.8배는 나머지 4사의 3~4배 수준 — 오너 결단의 값</text>

  <!-- Header row -->
  <g font-family="-apple-system, sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle" font-weight="600">
    <text x="240" y="175">시가총액 (조)</text>
    <text x="460" y="175">PBR</text>
    <text x="680" y="175">ROE (%)</text>
    <text x="900" y="175">주주환원율 (%)</text>
    <text x="1110" y="175">순위</text>
  </g>
  <line x1="50" y1="190" x2="1170" y2="190" stroke="#334155" stroke-width="1.5"/>

  <!-- 메리츠 (highlighted) -->
  <g>
    <rect x="40" y="205" width="1130" height="80" fill="#422006" stroke="#fbbf24" stroke-width="2.5" rx="8"/>
    <text x="60" y="245" font-size="18" font-weight="700" fill="#fbbf24">메리츠금융지주</text>
    <text x="60" y="268" font-size="13" fill="#fde68a">138040 ★</text>

    <text x="240" y="253" font-size="22" font-weight="700" fill="#fde68a" text-anchor="middle">20</text>

    <rect x="410" y="230" width="100" height="36" fill="#22c55e" rx="4"/>
    <text x="460" y="255" font-size="22" font-weight="700" fill="#0a0e1a" text-anchor="middle">1.8 🥇</text>

    <rect x="630" y="230" width="100" height="36" fill="#22c55e" rx="4"/>
    <text x="680" y="255" font-size="22" font-weight="700" fill="#0a0e1a" text-anchor="middle">22 🥇</text>

    <rect x="850" y="230" width="100" height="36" fill="#22c55e" rx="4"/>
    <text x="900" y="255" font-size="22" font-weight="700" fill="#0a0e1a" text-anchor="middle">46 🥇</text>

    <text x="1110" y="253" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">1위 (3축)</text>
  </g>

  <!-- KB -->
  <g>
    <text x="60" y="325" font-size="16" font-weight="600" fill="#f1f5f9">KB금융</text>
    <text x="60" y="345" font-size="12" fill="#64748b">105560</text>
    <text x="240" y="333" font-size="18" font-weight="700" fill="#cbd5e1" text-anchor="middle">32</text>

    <rect x="420" y="315" width="80" height="30" fill="#fef9c3" rx="3"/>
    <text x="460" y="335" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">0.7</text>

    <rect x="640" y="315" width="80" height="30" fill="#bbf7d0" rx="3"/>
    <text x="680" y="335" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">9</text>

    <rect x="860" y="315" width="80" height="30" fill="#fef9c3" rx="3"/>
    <text x="900" y="335" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">40</text>

    <text x="1110" y="333" font-size="14" fill="#cbd5e1" text-anchor="middle">2위</text>
  </g>

  <!-- 신한 -->
  <g>
    <text x="60" y="405" font-size="16" font-weight="600" fill="#f1f5f9">신한금융지주</text>
    <text x="60" y="425" font-size="12" fill="#64748b">055550</text>
    <text x="240" y="413" font-size="18" font-weight="700" fill="#cbd5e1" text-anchor="middle">22</text>

    <rect x="420" y="395" width="80" height="30" fill="#fcd34d" rx="3"/>
    <text x="460" y="415" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">0.6</text>

    <rect x="640" y="395" width="80" height="30" fill="#bbf7d0" rx="3"/>
    <text x="680" y="415" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">8</text>

    <rect x="860" y="395" width="80" height="30" fill="#fef9c3" rx="3"/>
    <text x="900" y="415" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">40</text>

    <text x="1110" y="413" font-size="14" fill="#cbd5e1" text-anchor="middle">3위</text>
  </g>

  <!-- 하나 -->
  <g>
    <text x="60" y="485" font-size="16" font-weight="600" fill="#f1f5f9">하나금융지주</text>
    <text x="60" y="505" font-size="12" fill="#64748b">086790</text>
    <text x="240" y="493" font-size="18" font-weight="700" fill="#cbd5e1" text-anchor="middle">14</text>

    <rect x="420" y="475" width="80" height="30" fill="#fb923c" rx="3"/>
    <text x="460" y="495" font-size="17" font-weight="700" fill="#f8fafc" text-anchor="middle">0.5</text>

    <rect x="640" y="475" width="80" height="30" fill="#bbf7d0" rx="3"/>
    <text x="680" y="495" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">10</text>

    <rect x="860" y="475" width="80" height="30" fill="#fef9c3" rx="3"/>
    <text x="900" y="495" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">40</text>

    <text x="1110" y="493" font-size="14" fill="#cbd5e1" text-anchor="middle">4위</text>
  </g>

  <!-- 우리 -->
  <g>
    <text x="60" y="565" font-size="16" font-weight="600" fill="#f1f5f9">우리금융지주</text>
    <text x="60" y="585" font-size="12" fill="#64748b">316140</text>
    <text x="240" y="573" font-size="18" font-weight="700" fill="#cbd5e1" text-anchor="middle">11</text>

    <rect x="420" y="555" width="80" height="30" fill="#fca5a5" rx="3"/>
    <text x="460" y="575" font-size="17" font-weight="700" fill="#f8fafc" text-anchor="middle">0.4</text>

    <rect x="640" y="555" width="80" height="30" fill="#bbf7d0" rx="3"/>
    <text x="680" y="575" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">8</text>

    <rect x="860" y="555" width="80" height="30" fill="#fbbf24" rx="3"/>
    <text x="900" y="575" font-size="17" font-weight="700" fill="#0a0e1a" text-anchor="middle">35</text>

    <text x="1110" y="573" font-size="14" fill="#cbd5e1" text-anchor="middle">5위</text>
  </g>

  <!-- Bottom analysis -->
  <g transform="translate(60, 625)">
    <rect x="0" y="0" width="1080" height="170" fill="#1e293b" rx="10"/>
    <text x="30" y="35" font-size="18" font-weight="700" fill="#fbbf24">왜 메리츠만 3축 모두 1위인가</text>

    <text x="30" y="70" font-size="14" fill="#cbd5e1">
      <tspan font-weight="700" fill="#86efac">① 지배구조 차이 —</tspan> 오너 단일 지배로 결단 속도 압도적. KB·신한·하나는 전문경영인 + 외국인 30% 분산.
    </text>
    <text x="30" y="100" font-size="14" fill="#cbd5e1">
      <tspan font-weight="700" fill="#fbbf24">② 자본 규제 차이 —</tspan> 은행 중심 금융지주는 바젤 III 14%+ 유지 필요, 환원 여력 제약. 메리츠는 보험·증권이라 규제 체계 다름.
    </text>
    <text x="30" y="130" font-size="14" fill="#cbd5e1">
      <tspan font-weight="700" fill="#ec4899">③ 자산 구조 차이 —</tspan> 은행은 대출 성장하면 자본 소요 증가. 메리츠는 보험료·IB 자산이라 대출 성장 부담 적음.
    </text>
    <text x="30" y="155" font-size="13" fill="#94a3b8" font-style="italic">
      → 다른 4사가 "따라하고 싶어도 못 하는" 구조적 제약. 메리츠 독보적 위치는 당분간 유지될 가능성 큼.
    </text>
  </g>
</svg>
