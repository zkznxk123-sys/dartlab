<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <title>2026~2028 메리츠금융지주 관찰 4가지</title>
  <desc>순이익·자사주 소각·ROE·오너 승계 4개 체크포인트</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2028 메리츠 관찰 4가지</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">PBR 1.8배 재평가의 지속 가능성을 가릴 신호</text>

  <!-- Signal 1 -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#22c55e"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">연간 순이익 2.5조+ 유지</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">2024 2.33조 · 2025 2.35조. 2026 2.5조+ 이면 성장 궤적 유지.</text>
    <rect x="100" y="78" width="380" height="34" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">2026 2.5조+ → 성장 지속</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">2조 미만 → 환원 축소 압력</text>
  </g>

  <!-- Signal 2 -->
  <g transform="translate(60, 285)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#ec4899" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#ec4899"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">2</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">자사주 소각 연 6,000억+ 유지</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">3년 평균 연 6,000억 페이스. 5,000억 이하로 떨어지면 "약속보다 줄었다" 신호.</text>
    <rect x="100" y="78" width="380" height="34" fill="#831843" stroke="#ec4899" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#fbcfe8" text-anchor="middle">6,000억+ 유지 → 약속 이행</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">5,000억 이하 → 주주환원 후퇴</text>
  </g>

  <!-- Signal 3 -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#fbbf24"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#0a0e1a" text-anchor="middle">3</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">ROE 20%+ 유지</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">2024 22%. 15% 이하 하락 시 PBR 1.8배 정당화 어려움.</text>
    <rect x="100" y="78" width="380" height="34" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">ROE 20%+ → PBR 1.8 방어</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">15% 이하 → PBR 1.3 수준 조정</text>
  </g>

  <!-- Signal 4 -->
  <g transform="translate(60, 575)">
    <rect x="0" y="0" width="960" height="125" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" rx="12"/>
    <circle cx="50" cy="62" r="28" fill="#8b5cf6"/>
    <text x="50" y="71" font-size="26" font-weight="700" fill="#f8fafc" text-anchor="middle">4</text>
    <text x="100" y="38" font-size="19" font-weight="700" fill="#f1f5f9">오너 승계 관련 공시</text>
    <text x="100" y="62" font-size="14" fill="#cbd5e1">조정호 회장(1958년생) 승계 시점. 2030년까지 관련 공시 모니터링 필수.</text>
    <rect x="100" y="78" width="380" height="34" fill="#2e1065" stroke="#a855f7" stroke-width="2" rx="5"/>
    <text x="290" y="100" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">체계적 승계 → 구조 지속성 확보</text>
    <rect x="500" y="78" width="380" height="34" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="5"/>
    <text x="690" y="100" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">급작 승계 → 정책 연속성 의문</text>
  </g>
</svg>
