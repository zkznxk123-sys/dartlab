<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>메리츠금융지주 PBR 0.5→1.8 · 주가 3.5배 3년 궤적</title>
  <desc>2022.11.15 오너 결단 이후 재평가된 PBR과 주가</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">PBR 0.5 → 1.8, 주가 3.5배 — 3년의 재평가</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">한국 금융지주 최악이 최고가 된 3년 — 2022.11.15 이후 시간선</text>

  <!-- Before box -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="340" height="300" fill="#450a0a" stroke="#ef4444" stroke-width="2.5" rx="12"/>
    <text x="170" y="40" font-size="22" font-weight="700" fill="#fca5a5" text-anchor="middle">2022년 10월</text>
    <text x="170" y="65" font-size="14" fill="#fecaca" text-anchor="middle">공시 1개월 전</text>

    <line x1="30" y1="90" x2="310" y2="90" stroke="#7f1d1d"/>

    <text x="30" y="130" font-size="15" fill="#fecaca">PBR</text>
    <text x="310" y="130" font-size="26" font-weight="700" fill="#fef2f2" text-anchor="end">0.49</text>

    <text x="30" y="175" font-size="15" fill="#fecaca">주가 (원)</text>
    <text x="310" y="175" font-size="26" font-weight="700" fill="#fef2f2" text-anchor="end">약 30,000</text>

    <text x="30" y="220" font-size="15" fill="#fecaca">시가총액</text>
    <text x="310" y="220" font-size="22" font-weight="700" fill="#fef2f2" text-anchor="end">약 5.5조</text>

    <text x="30" y="260" font-size="15" fill="#fecaca">금융지주 PBR</text>
    <text x="310" y="260" font-size="18" font-weight="700" fill="#fca5a5" text-anchor="end">5대 중 4위</text>

    <text x="170" y="286" font-size="14" fill="#fca5a5" text-anchor="middle" font-style="italic">장부가의 절반 평가</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(470, 310)">
    <text x="0" y="-30" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">3년</text>
    <path d="M -80 0 L 80 0" stroke="#fbbf24" stroke-width="4" fill="none"/>
    <path d="M 75 0 L 55 -12 L 55 12 Z" fill="#fbbf24"/>
    <text x="0" y="30" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">2022.11.15</text>
    <text x="0" y="50" font-size="12" fill="#fde68a" text-anchor="middle">3건 공시</text>
  </g>

  <!-- After box -->
  <g transform="translate(620, 160)">
    <rect x="0" y="0" width="520" height="300" fill="#052e16" stroke="#22c55e" stroke-width="3" rx="12"/>
    <text x="260" y="40" font-size="22" font-weight="700" fill="#86efac" text-anchor="middle">2025년 12월</text>
    <text x="260" y="65" font-size="14" fill="#d1fae5" text-anchor="middle">3년 2개월 후</text>

    <line x1="30" y1="90" x2="490" y2="90" stroke="#064e3b"/>

    <text x="30" y="130" font-size="15" fill="#d1fae5">PBR</text>
    <text x="490" y="130" font-size="32" font-weight="800" fill="#fde68a" text-anchor="end">1.8 ★</text>
    <text x="490" y="152" font-size="12" fill="#86efac" text-anchor="end">+3.6배 ↑</text>

    <text x="30" y="185" font-size="15" fill="#d1fae5">주가 (원)</text>
    <text x="490" y="185" font-size="32" font-weight="800" fill="#fde68a" text-anchor="end">약 105,000</text>
    <text x="490" y="207" font-size="12" fill="#86efac" text-anchor="end">+3.5배 ↑</text>

    <text x="30" y="240" font-size="15" fill="#d1fae5">시가총액</text>
    <text x="490" y="240" font-size="24" font-weight="700" fill="#fde68a" text-anchor="end">약 20조</text>

    <text x="260" y="278" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">한국 5대 금융지주 PBR · ROE · 주주환원율 1위</text>
  </g>

  <!-- Bottom panel -->
  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="1080" height="190" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="17" font-weight="700" fill="#fbbf24">세 축이 같은 날 움직였다</text>

    <rect x="24" y="55" width="340" height="115" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="40" y="82" font-size="14" font-weight="700" fill="#86efac">① 완전자회사화</text>
    <text x="40" y="105" font-size="12" fill="#cbd5e1">메리츠화재·증권 흡수</text>
    <text x="40" y="123" font-size="12" fill="#cbd5e1">이중상장 해소</text>
    <text x="40" y="148" font-size="11" fill="#94a3b8" font-style="italic">→ 자회사 디스카운트 소멸</text>

    <rect x="378" y="55" width="340" height="115" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="394" y="82" font-size="14" font-weight="700" fill="#fde68a">② 주주환원 50%</text>
    <text x="394" y="105" font-size="12" fill="#cbd5e1">당기순이익 50% 정관 명시</text>
    <text x="394" y="123" font-size="12" fill="#cbd5e1">구속력 있는 규칙</text>
    <text x="394" y="148" font-size="11" fill="#94a3b8" font-style="italic">→ 이익이 주주에게 온다는 신호</text>

    <rect x="732" y="55" width="324" height="115" fill="#0f172a" stroke="#ec4899" stroke-width="2" rx="8"/>
    <text x="748" y="82" font-size="14" font-weight="700" fill="#fbcfe8">③ 자사주 매입·소각</text>
    <text x="748" y="105" font-size="12" fill="#cbd5e1">연 6,000억+ 지속 집행</text>
    <text x="748" y="123" font-size="12" fill="#cbd5e1">유통주식 감소</text>
    <text x="748" y="148" font-size="11" fill="#94a3b8" font-style="italic">→ EPS·오너 지분 자동 상승</text>
  </g>
</svg>
