<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2024 메리츠금융지주 순이익 2.33조 3축 구성</title>
  <desc>메리츠화재 73% + 메리츠증권 24% + 자산운용 3%</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2024 순이익 2.33조 — 3개 자회사의 합산</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">메리츠화재가 73% 차지. 손해보험 업계 순이익률 최상위권</text>

  <!-- Donut chart -->
  <g transform="translate(320, 400)">
    <!-- 화재 73% (0~73%) -->
    <path d="M 0 -200 A 200 200 0 1 1 -38 196.4 L 0 0 Z" fill="#6366F1"/>
    <!-- 증권 24% (73~97%) -->
    <path d="M -38 196.4 A 200 200 0 0 1 -190 -62.4 L 0 0 Z" fill="#fbbf24"/>
    <!-- 자산운용 3% (97~100%) -->
    <path d="M -190 -62.4 A 200 200 0 0 1 0 -200 L 0 0 Z" fill="#22c55e"/>

    <circle cx="0" cy="0" r="110" fill="#0a0e1a"/>
    <text x="0" y="-10" font-size="14" fill="#94a3b8" text-anchor="middle">2024 순이익</text>
    <text x="0" y="22" font-size="30" font-weight="700" fill="#fbbf24" text-anchor="middle">2.33조</text>
    <text x="0" y="48" font-size="13" fill="#cbd5e1" text-anchor="middle">(사상 최대)</text>

    <text x="120" y="-20" font-size="18" font-weight="700" fill="#c7d2fe">메리츠화재 73%</text>
    <text x="120" y="0" font-size="16" fill="#c7d2fe">1조 7,000억</text>
    <text x="-100" y="190" font-size="16" font-weight="700" fill="#fbbf24">메리츠증권 24%</text>
    <text x="-100" y="210" font-size="14" fill="#fde68a">5,500억</text>
    <text x="-220" y="-100" font-size="14" font-weight="700" fill="#86efac">자산운용 3%</text>
    <text x="-220" y="-80" font-size="12" fill="#d1fae5">800억</text>
  </g>

  <!-- Right: details -->
  <g transform="translate(680, 160)">
    <!-- 메리츠화재 -->
    <rect x="0" y="0" width="480" height="165" fill="#1e293b" stroke="#6366F1" stroke-width="2.5" rx="10"/>
    <text x="20" y="32" font-size="20" font-weight="700" fill="#c7d2fe">메리츠화재 — 손해보험 1.7조</text>
    <text x="20" y="62" font-size="13" fill="#cbd5e1">매출 약 21조 · 영업이익률 8.1% (업계 최상위)</text>
    <text x="20" y="85" font-size="13" fill="#cbd5e1">언더라이팅 규율 + 자산운용 대체투자 비중 25%</text>
    <text x="20" y="108" font-size="13" fill="#cbd5e1">국내 손보 순이익률 1~2위 (삼성화재와 경합)</text>
    <text x="20" y="131" font-size="13" fill="#94a3b8">→ 순이익의 약 50%가 자산운용 수익</text>
    <text x="20" y="153" font-size="13" font-weight="700" fill="#86efac">2024 순이익 1.7조 = 전체의 73%</text>

    <!-- 메리츠증권 -->
    <rect x="0" y="185" width="480" height="160" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="10"/>
    <text x="20" y="217" font-size="20" font-weight="700" fill="#fde68a">메리츠증권 — IB 중심 5,500억</text>
    <text x="20" y="247" font-size="13" fill="#cbd5e1">매출 약 23조 · IB 부문 매출의 50%+</text>
    <text x="20" y="270" font-size="13" fill="#cbd5e1">소매 브로커리지 약함 → 부동산 PF·기업금융 집중</text>
    <text x="20" y="293" font-size="13" fill="#cbd5e1">2020~2022 PF 위기에서도 선제적 리스크 관리</text>
    <text x="20" y="316" font-size="13" font-weight="700" fill="#fbbf24">2024 한국 증권사 IB 부문 상위권</text>

    <!-- 자산운용 -->
    <rect x="0" y="365" width="480" height="140" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="20" y="397" font-size="20" font-weight="700" fill="#86efac">메리츠자산운용 + 기타 — 800억</text>
    <text x="20" y="427" font-size="13" fill="#cbd5e1">매출 약 2.5조 · 운용자산 약 20조</text>
    <text x="20" y="450" font-size="13" fill="#cbd5e1">대체투자·사모펀드 중심 자산운용사</text>
    <text x="20" y="473" font-size="13" fill="#cbd5e1">지주사 직접 자회사 · 한국 자산운용 중위권</text>
    <text x="20" y="495" font-size="13" font-weight="700" fill="#86efac">전체의 3%이지만 고마진 사업부</text>
  </g>

  <!-- Bottom -->
  <text x="600" y="695" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">출처: 메리츠금융지주 2024 사업보고서 세그먼트 주석 + 메리츠화재·증권 자회사별 재무제표</text>
</svg>
