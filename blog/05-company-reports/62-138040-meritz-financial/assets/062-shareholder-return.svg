<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>3년간 주주환원 2.9조 추적 — 자사주 매입·소각·배당</title>
  <desc>2022~2025 메리츠금융지주 주주환원 금액과 환원율 연도별</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">3년간 주주환원 2.9조 — 약속의 실제 집행</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">자사주 매입 2.0조 · 자사주 소각 1.9조 · 배당 1.2조 = 당기순이익의 약 50% 환원</text>

  <!-- Header row -->
  <g transform="translate(80, 160)" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" font-weight="600">
    <text x="100" y="0" text-anchor="middle">연도</text>
    <text x="280" y="0" text-anchor="middle">자사주 매입</text>
    <text x="460" y="0" text-anchor="middle">자사주 소각</text>
    <text x="620" y="0" text-anchor="middle">배당</text>
    <text x="780" y="0" text-anchor="middle">환원 합계</text>
    <text x="940" y="0" text-anchor="middle">순이익</text>
    <text x="1060" y="0" text-anchor="middle">환원율</text>
  </g>
  <line x1="40" y1="180" x2="1160" y2="180" stroke="#334155" stroke-width="1.5"/>

  <!-- 2022 (Nov-Dec) -->
  <g transform="translate(80, 220)" font-family="-apple-system, sans-serif" font-size="15">
    <text x="100" y="0" font-weight="700" fill="#cbd5e1" text-anchor="middle">2022</text>
    <text x="100" y="20" font-size="11" fill="#94a3b8" text-anchor="middle">(11~12월 2개월)</text>
    <text x="280" y="5" fill="#fbcfe8" text-anchor="middle">2,000억</text>
    <text x="460" y="5" fill="#94a3b8" text-anchor="middle">0</text>
    <text x="620" y="5" fill="#fde68a" text-anchor="middle">500억</text>
    <text x="780" y="5" font-weight="700" fill="#f1f5f9" text-anchor="middle">2,500억</text>
    <text x="940" y="5" fill="#cbd5e1" text-anchor="middle">8,000억</text>
    <text x="1060" y="5" font-weight="700" fill="#fbbf24" text-anchor="middle">31%</text>
  </g>

  <line x1="40" y1="265" x2="1160" y2="265" stroke="#1e293b"/>

  <!-- 2023 -->
  <g transform="translate(80, 305)" font-family="-apple-system, sans-serif" font-size="15">
    <text x="100" y="0" font-weight="700" fill="#cbd5e1" text-anchor="middle">2023</text>
    <text x="280" y="0" fill="#fbcfe8" text-anchor="middle">6,500억</text>
    <text x="460" y="0" fill="#ec4899" text-anchor="middle" font-weight="700">6,000억</text>
    <text x="620" y="0" fill="#fde68a" text-anchor="middle">2,400억</text>
    <text x="780" y="0" font-size="17" font-weight="700" fill="#f1f5f9" text-anchor="middle">8,900억</text>
    <text x="940" y="0" fill="#cbd5e1" text-anchor="middle">9,451억</text>
    <text x="1060" y="0" font-size="18" font-weight="800" fill="#fbbf24" text-anchor="middle">94% ★</text>
    <text x="1060" y="22" font-size="10" fill="#94a3b8" text-anchor="middle">순이익의 94%</text>
  </g>

  <line x1="40" y1="350" x2="1160" y2="350" stroke="#1e293b"/>

  <!-- 2024 -->
  <g transform="translate(80, 390)" font-family="-apple-system, sans-serif" font-size="15">
    <text x="100" y="0" font-weight="700" fill="#cbd5e1" text-anchor="middle">2024</text>
    <text x="280" y="0" fill="#fbcfe8" text-anchor="middle">5,500억</text>
    <text x="460" y="0" fill="#ec4899" text-anchor="middle" font-weight="700">7,000억</text>
    <text x="620" y="0" fill="#fde68a" text-anchor="middle">4,500억</text>
    <text x="780" y="0" font-size="17" font-weight="700" fill="#f1f5f9" text-anchor="middle">10,000억</text>
    <text x="940" y="0" font-weight="700" fill="#86efac" text-anchor="middle">23,334억</text>
    <text x="1060" y="0" font-weight="700" fill="#fbbf24" text-anchor="middle">43%</text>
  </g>

  <line x1="40" y1="435" x2="1160" y2="435" stroke="#1e293b"/>

  <!-- 2025 -->
  <g transform="translate(80, 475)" font-family="-apple-system, sans-serif" font-size="15">
    <text x="100" y="0" font-weight="700" fill="#cbd5e1" text-anchor="middle">2025</text>
    <text x="280" y="0" fill="#fbcfe8" text-anchor="middle">5,500억</text>
    <text x="460" y="0" fill="#ec4899" text-anchor="middle" font-weight="700">6,000억</text>
    <text x="620" y="0" fill="#fde68a" text-anchor="middle">5,200억</text>
    <text x="780" y="0" font-size="17" font-weight="700" fill="#f1f5f9" text-anchor="middle">10,700억</text>
    <text x="940" y="0" font-weight="700" fill="#86efac" text-anchor="middle">23,501억</text>
    <text x="1060" y="0" font-weight="700" fill="#fbbf24" text-anchor="middle">46%</text>
  </g>

  <line x1="40" y1="515" x2="1160" y2="515" stroke="#fbbf24" stroke-width="2"/>

  <!-- Total -->
  <g transform="translate(80, 555)" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">
    <text x="100" y="0" fill="#fbbf24" text-anchor="middle">누적</text>
    <text x="280" y="0" fill="#fbcfe8" text-anchor="middle">2.0조</text>
    <text x="460" y="0" fill="#ec4899" text-anchor="middle">1.9조</text>
    <text x="620" y="0" fill="#fde68a" text-anchor="middle">1.2조</text>
    <text x="780" y="0" font-size="24" fill="#fbbf24" text-anchor="middle">2.9조</text>
    <text x="940" y="0" fill="#86efac" text-anchor="middle">5.6조</text>
    <text x="1060" y="0" fill="#fbbf24" text-anchor="middle">52%</text>
  </g>

  <!-- Bottom panel -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="24" y="30" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#fbbf24">3년간 순이익 5.6조 → 주주환원 2.9조 실제 집행</text>
    <text x="24" y="55" font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">2023년 환원율 94% = 전년 이월 + 유통주식 재정비 집중 기간. 2024~2025는 약속된 50% 수준에서 안정적 유지.</text>
  </g>
</svg>
