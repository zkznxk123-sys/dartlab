<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2022.11.15 메리츠금융지주 3건 공시 구조</title>
  <desc>완전자회사화·주주환원 50%·자사주 매입 세 축의 동시 집행</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2022.11.15 오후 4:30 — 3건 공시의 구조</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">3건이 동시에 발표된 것이 개별 공시보다 몇 배 강력한 시그널을 만들었다</text>

  <!-- 3 boxes -->
  <g transform="translate(60, 160)">
    <!-- 공시 1 -->
    <rect x="0" y="0" width="340" height="380" fill="#1e293b" stroke="#22c55e" stroke-width="3" rx="12"/>
    <circle cx="60" cy="50" r="26" fill="#22c55e"/>
    <text x="60" y="58" font-size="22" font-weight="700" fill="#0a0e1a" text-anchor="middle">1</text>
    <text x="100" y="58" font-size="18" font-weight="700" fill="#86efac">완전자회사화</text>

    <line x1="20" y1="100" x2="320" y2="100" stroke="#064e3b"/>

    <text x="20" y="130" font-size="14" font-weight="600" fill="#d1fae5">대상</text>
    <text x="20" y="152" font-size="13" fill="#cbd5e1">메리츠화재 + 메리츠증권</text>
    <text x="20" y="170" font-size="13" fill="#cbd5e1">2개 자회사 동시</text>

    <text x="20" y="200" font-size="14" font-weight="600" fill="#d1fae5">교환 비율</text>
    <text x="20" y="222" font-size="13" fill="#cbd5e1">화재 1주 : 지주 1.2558주</text>
    <text x="20" y="240" font-size="13" fill="#cbd5e1">증권 1주 : 지주 0.1607주</text>

    <text x="20" y="270" font-size="14" font-weight="600" fill="#d1fae5">실행일</text>
    <text x="20" y="292" font-size="13" fill="#cbd5e1">2023.4.5 (5개월 뒤)</text>

    <text x="20" y="322" font-size="14" font-weight="600" fill="#d1fae5">결과</text>
    <text x="20" y="344" font-size="13" fill="#86efac">자회사 2개 상장폐지</text>
    <text x="20" y="362" font-size="12" fill="#86efac">→ 이중상장 디스카운트 해소</text>
  </g>

  <g transform="translate(430, 160)">
    <!-- 공시 2 -->
    <rect x="0" y="0" width="340" height="380" fill="#1e293b" stroke="#fbbf24" stroke-width="3" rx="12"/>
    <circle cx="60" cy="50" r="26" fill="#fbbf24"/>
    <text x="60" y="58" font-size="22" font-weight="700" fill="#0a0e1a" text-anchor="middle">2</text>
    <text x="100" y="58" font-size="18" font-weight="700" fill="#fde68a">주주환원 50%</text>

    <line x1="20" y1="100" x2="320" y2="100" stroke="#422006"/>

    <text x="20" y="130" font-size="14" font-weight="600" fill="#fde68a">기준</text>
    <text x="20" y="152" font-size="13" fill="#cbd5e1">연결 당기순이익</text>
    <text x="20" y="170" font-size="13" fill="#cbd5e1">50% 이상</text>

    <text x="20" y="200" font-size="14" font-weight="600" fill="#fde68a">수단</text>
    <text x="20" y="222" font-size="13" fill="#cbd5e1">배당 + 자사주 매입·소각</text>

    <text x="20" y="252" font-size="14" font-weight="600" fill="#fde68a">구속력</text>
    <text x="20" y="274" font-size="13" fill="#cbd5e1">정관 + 이사회 결의 명시</text>
    <text x="20" y="292" font-size="13" fill="#cbd5e1">= 단순 약속 아님</text>

    <text x="20" y="322" font-size="14" font-weight="600" fill="#fde68a">업계 비교</text>
    <text x="20" y="344" font-size="13" fill="#fde68a">한국 금융지주 평균 30%</text>
    <text x="20" y="362" font-size="12" fill="#fbbf24">→ 2배 높은 환원</text>
  </g>

  <g transform="translate(800, 160)">
    <!-- 공시 3 -->
    <rect x="0" y="0" width="340" height="380" fill="#1e293b" stroke="#ec4899" stroke-width="3" rx="12"/>
    <circle cx="60" cy="50" r="26" fill="#ec4899"/>
    <text x="60" y="58" font-size="22" font-weight="700" fill="#f8fafc" text-anchor="middle">3</text>
    <text x="100" y="58" font-size="18" font-weight="700" fill="#fbcfe8">자사주 매입</text>

    <line x1="20" y1="100" x2="320" y2="100" stroke="#831843"/>

    <text x="20" y="130" font-size="14" font-weight="600" fill="#fbcfe8">즉시 집행</text>
    <text x="20" y="152" font-size="13" fill="#cbd5e1">2022.11 시작</text>
    <text x="20" y="170" font-size="13" fill="#cbd5e1">연 6,000억+ 페이스</text>

    <text x="20" y="200" font-size="14" font-weight="600" fill="#fbcfe8">방식</text>
    <text x="20" y="222" font-size="13" fill="#cbd5e1">매입 후 전량 소각</text>
    <text x="20" y="240" font-size="13" fill="#cbd5e1">유통주식 감소 효과</text>

    <text x="20" y="270" font-size="14" font-weight="600" fill="#fbcfe8">효과</text>
    <text x="20" y="292" font-size="13" fill="#cbd5e1">EPS 자동 상승</text>
    <text x="20" y="310" font-size="13" fill="#cbd5e1">오너 지분율 자연 증가</text>

    <text x="20" y="340" font-size="14" font-weight="600" fill="#fbcfe8">3년 누적</text>
    <text x="20" y="362" font-size="15" font-weight="700" fill="#fbcfe8">약 2조 매입·소각</text>
  </g>

  <!-- Bottom: why all three together -->
  <g transform="translate(60, 565)">
    <rect x="0" y="0" width="1080" height="125" fill="#422006" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="24" y="35" font-size="18" font-weight="700" fill="#fde68a">왜 3건이 같은 날 터져야 했는가</text>
    <text x="24" y="65" font-size="13" fill="#cbd5e1"><tspan fill="#86efac" font-weight="700">완전자회사화만:</tspan> 지주사에 이익 쌓여도 주주에게 안 가면 주가 안 오름</text>
    <text x="24" y="87" font-size="13" fill="#cbd5e1"><tspan fill="#fde68a" font-weight="700">주주환원 약속만:</tspan> 실제 집행 안 하면 립서비스 — 자사주 즉시 매입으로 증명 필요</text>
    <text x="24" y="109" font-size="13" fill="#cbd5e1"><tspan fill="#fbcfe8" font-weight="700">자사주 매입만:</tspan> 일시적 부양 효과만 있고 지속성 없음 — 정관 명시로 영구 규칙화 필요</text>
  </g>
</svg>
