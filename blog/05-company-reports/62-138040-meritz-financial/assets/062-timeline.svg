<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>메리츠금융지주 17년 타임라인 2005~2022</title>
  <desc>2005 창업 → 2013 지주사 설립 → 2022.11 오너 결단까지의 PBR 감옥 17년</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">17년 PBR 감옥 — 2005~2022</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">이익은 꾸준히 쌓였는데 주가가 따라오지 않았던 17년, 그리고 2022.11 터진 결단</text>

  <!-- Timeline -->
  <line x1="80" y1="400" x2="1140" y2="400" stroke="#334155" stroke-width="2"/>

  <g font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="130" y="425">2005</text><circle cx="130" cy="400" r="9" fill="#22c55e"/>
    <text x="280" y="425">2011</text><circle cx="280" cy="400" r="7" fill="#6366F1"/>
    <text x="430" y="425">2013</text><circle cx="430" cy="400" r="8" fill="#8b5cf6"/>
    <text x="600" y="425">2018~2020</text><circle cx="600" cy="400" r="6" fill="#64748b"/>
    <text x="780" y="425">2022.10</text><circle cx="780" cy="400" r="9" fill="#ef4444"/>
    <text x="960" y="425">2022.11.15</text><circle cx="960" cy="400" r="14" fill="#fbbf24" stroke="#fde68a" stroke-width="3"/>
    <text x="1100" y="425">2023~</text><circle cx="1100" cy="400" r="7" fill="#22c55e"/>
  </g>

  <!-- Events above -->
  <g font-family="-apple-system, sans-serif">
    <line x1="130" y1="400" x2="130" y2="225" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="70" y="180" width="120" height="50" fill="#052e16" stroke="#22c55e" stroke-width="1.5" rx="5"/>
    <text x="130" y="203" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">2005.01</text>
    <text x="130" y="220" font-size="11" fill="#d1fae5" text-anchor="middle">메리츠종금 독립</text>

    <line x1="280" y1="400" x2="280" y2="290" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="220" y="250" width="120" height="45" fill="#1e293b" stroke="#6366F1" rx="5"/>
    <text x="280" y="273" font-size="13" font-weight="600" fill="#c7d2fe" text-anchor="middle">2011</text>
    <text x="280" y="288" font-size="11" fill="#dbeafe" text-anchor="middle">메리츠화재 인수</text>

    <line x1="430" y1="400" x2="430" y2="235" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="365" y="190" width="130" height="50" fill="#1e293b" stroke="#8b5cf6" rx="5"/>
    <text x="430" y="213" font-size="13" font-weight="700" fill="#c4b5fd" text-anchor="middle">2013</text>
    <text x="430" y="230" font-size="11" fill="#c4b5fd" text-anchor="middle">금융지주 설립·상장</text>

    <line x1="600" y1="400" x2="600" y2="300" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="540" y="265" width="120" height="40" fill="#1e293b" stroke="#94a3b8" rx="5"/>
    <text x="600" y="290" font-size="12" fill="#cbd5e1" text-anchor="middle">이익 꾸준 성장</text>

    <!-- 2022.10 PBR 최저 -->
    <line x1="780" y1="400" x2="780" y2="175" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="3,3"/>
    <rect x="700" y="120" width="160" height="60" fill="#450a0a" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="780" y="144" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">2022.10 PBR 0.49</text>
    <text x="780" y="162" font-size="12" fill="#fecaca" text-anchor="middle">17년 PBR 바닥</text>
    <text x="780" y="178" font-size="11" fill="#fca5a5" text-anchor="middle">주가 약 30,000원</text>

    <!-- 2022.11.15 결단 -->
    <line x1="960" y1="400" x2="960" y2="145" stroke="#fbbf24" stroke-width="3" stroke-dasharray="3,3"/>
    <rect x="870" y="90" width="180" height="60" fill="#422006" stroke="#fbbf24" stroke-width="3" rx="8"/>
    <text x="960" y="115" font-size="14" font-weight="800" fill="#fde68a" text-anchor="middle">2022.11.15 ★</text>
    <text x="960" y="133" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">3건 공시 동시</text>
    <text x="960" y="148" font-size="11" fill="#fde68a" text-anchor="middle">완전자회사화 + 50% + 자사주</text>

    <!-- 2023~ 재평가 -->
    <line x1="1100" y1="400" x2="1100" y2="260" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3"/>
    <rect x="1040" y="215" width="130" height="50" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="6"/>
    <text x="1105" y="237" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">2023~2025</text>
    <text x="1105" y="255" font-size="11" fill="#d1fae5" text-anchor="middle">재평가 3년</text>
  </g>

  <!-- Events below: PBR history -->
  <g transform="translate(0, 0)" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">
    <!-- PBR 표시 -->
    <text x="130" y="455" fill="#fbbf24">PBR 1.0</text>
    <text x="280" y="455" fill="#fbbf24">PBR 0.8</text>
    <text x="430" y="455" fill="#fbbf24">PBR 0.7</text>
    <text x="600" y="455" fill="#fbbf24">PBR 0.55</text>
    <text x="780" y="455" fill="#ef4444" font-weight="700">PBR 0.49</text>
    <text x="960" y="455" fill="#fbbf24" font-weight="700">→ 0.85</text>
    <text x="1100" y="455" fill="#22c55e" font-weight="700">PBR 1.8</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="1080" height="170" fill="#1e293b" rx="10"/>
    <text x="30" y="32" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#fbbf24">17년 vs 3년의 대비</text>

    <text x="30" y="65" font-size="14" fill="#cbd5e1"><tspan fill="#94a3b8">2005~2022 (17년):</tspan> 이익은 꾸준히 늘었는데 PBR은 1.0에서 0.5로 오히려 하락</text>
    <text x="30" y="89" font-size="14" fill="#cbd5e1"><tspan fill="#94a3b8">원인:</tspan> 이중상장 디스카운트 + 주주환원 불명확 + 지주사 함정</text>

    <text x="30" y="125" font-size="14" fill="#cbd5e1"><tspan fill="#fde68a">2022.11~2025 (3년):</tspan> 3건 공시 동시 집행 → PBR 0.5 → 1.8 (3.6배) · 주가 3.5배</text>
    <text x="30" y="149" font-size="14" fill="#cbd5e1"><tspan fill="#fde68a">전환점:</tspan> 조정호 회장의 '조용한 17년' 끝에 한 날 모든 걸 바꾼 결정</text>
  </g>
</svg>
