<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2023 순이익 2,672억 해부 — 영업 346억 + 영업외 2,300억</title>
  <desc>자회사 매각 1,500억 + 부동산 재평가 500억 + 투자유가증권 평가익 300억</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">순이익 2,672억 ≠ 영업이익 346억 — 7.7배 괴리의 정체</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2023 영업외이익 2,300억이 자본총계를 +1,818억으로 밀어올려 2024 투자 여력을 만들었다</text>

  <!-- Waterfall chart -->
  <g transform="translate(60, 160)">
    <!-- Y axis reference line -->
    <line x1="0" y1="300" x2="1080" y2="300" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="-10" y="304" font-size="11" fill="#64748b" text-anchor="end">0</text>

    <!-- 영업이익 +346 -->
    <rect x="20" y="245" width="100" height="55" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
    <text x="70" y="238" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">+346</text>
    <text x="70" y="340" font-size="12" fill="#cbd5e1" text-anchor="middle">영업이익</text>
    <text x="70" y="356" font-size="10" fill="#94a3b8" text-anchor="middle">본업</text>

    <!-- Connector -->
    <line x1="120" y1="245" x2="160" y2="245" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- 금융수익 +200 -->
    <rect x="160" y="213" width="100" height="32" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
    <text x="210" y="206" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">+200</text>
    <text x="210" y="340" font-size="12" fill="#cbd5e1" text-anchor="middle">금융수익</text>
    <text x="210" y="356" font-size="10" fill="#94a3b8" text-anchor="middle">이자·배당</text>

    <line x1="260" y1="213" x2="300" y2="213" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- 금융비용 -100 -->
    <rect x="300" y="213" width="100" height="16" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
    <text x="350" y="244" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">-100</text>
    <text x="350" y="340" font-size="12" fill="#cbd5e1" text-anchor="middle">금융비용</text>
    <text x="350" y="356" font-size="10" fill="#94a3b8" text-anchor="middle">이자지급</text>

    <line x1="400" y1="229" x2="440" y2="229" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- 영업외이익 +2,300 (highlight big) -->
    <rect x="440" y="-140" width="220" height="369" fill="#fbbf24" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="550" y="-152" font-size="22" font-weight="800" fill="#fde68a" text-anchor="middle">+2,300 ★</text>
    <text x="550" y="-128" font-size="12" fill="#92400e" text-anchor="middle" font-weight="600">일회성 영업외이익</text>
    <text x="550" y="340" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">기타 영업외수익</text>
    <text x="550" y="356" font-size="10" fill="#94a3b8" text-anchor="middle">재평가·매각·평가익</text>

    <line x1="660" y1="-140" x2="700" y2="-140" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- 세전 +2,746 -->
    <rect x="700" y="-156" width="100" height="456" fill="#0ea5e9" stroke="#0284c7" stroke-width="1.5" opacity="0.7"/>
    <text x="750" y="-166" font-size="15" font-weight="800" fill="#7dd3fc" text-anchor="middle">+2,746</text>
    <text x="750" y="340" font-size="12" fill="#cbd5e1" text-anchor="middle">세전이익</text>

    <line x1="800" y1="-156" x2="840" y2="-156" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- 법인세 -74 -->
    <rect x="840" y="-156" width="100" height="12" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
    <text x="890" y="-165" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">-74</text>
    <text x="890" y="340" font-size="12" fill="#cbd5e1" text-anchor="middle">법인세</text>
    <text x="890" y="356" font-size="10" fill="#94a3b8" text-anchor="middle">이연법인세 효과</text>

    <line x1="940" y1="-144" x2="980" y2="-144" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- 당기순이익 +2,672 -->
    <rect x="980" y="-144" width="100" height="444" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
    <text x="1030" y="-156" font-size="18" font-weight="800" fill="#86efac" text-anchor="middle">+2,672</text>
    <text x="1030" y="340" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">당기순이익</text>
    <text x="1030" y="356" font-size="10" fill="#94a3b8" text-anchor="middle">영업이익의 7.7배</text>
  </g>

  <!-- Bottom panel: breakdown of 2300억 -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="155" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="17" font-weight="700" fill="#fbbf24">영업외이익 2,300억의 내역 (사업보고서 주석 기반 추정)</text>

    <g transform="translate(24, 55)">
      <rect x="0" y="0" width="340" height="85" fill="#0f172a" stroke="#c084fc" stroke-width="2" rx="6"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#e9d5ff">① 한미세미트론 매각</text>
      <text x="324" y="52" font-size="24" font-weight="800" fill="#fde68a" text-anchor="end">약 1,500억</text>
      <text x="16" y="74" font-size="11" fill="#94a3b8">자회사 지분 처분이익 · 외부 펀드 매각</text>
    </g>

    <g transform="translate(370, 55)">
      <rect x="0" y="0" width="340" height="85" fill="#0f172a" stroke="#60a5fa" stroke-width="2" rx="6"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#93c5fd">② 부동산 재평가</text>
      <text x="324" y="52" font-size="24" font-weight="800" fill="#fde68a" text-anchor="end">약 500억</text>
      <text x="16" y="74" font-size="11" fill="#94a3b8">인천 본사 부지 공정가치 조정 (IFRS)</text>
    </g>

    <g transform="translate(716, 55)">
      <rect x="0" y="0" width="340" height="85" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="6"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#86efac">③ 투자유가증권 평가</text>
      <text x="324" y="52" font-size="24" font-weight="800" fill="#fde68a" text-anchor="end">약 300억</text>
      <text x="16" y="74" font-size="11" fill="#94a3b8">상장주식·채권·펀드 평가이익</text>
    </g>
  </g>
</svg>
