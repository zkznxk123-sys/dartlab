<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2023 바닥 → 2024 매출 3.5배·영업이익 7.4배의 분해</title>
  <desc>매출 증가 3,999억 중 영업이익 증가 2,208억, 한계이익률 59% 반도체 장비 업계 최상위</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출 +3,999억 중 영업이익 +2,208억 — 한계이익률 59%</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2023 → 2024 P&amp;L 증분 분해 · 매출 100 늘 때 영업이익 55 직결</text>

  <!-- Bar chart -->
  <g transform="translate(60, 160)">
    <!-- Y axis labels -->
    <text x="0" y="30" font-size="13" fill="#cbd5e1">매출</text>
    <text x="0" y="110" font-size="13" fill="#cbd5e1">매출원가</text>
    <text x="0" y="190" font-size="13" fill="#cbd5e1">매출총이익</text>
    <text x="0" y="270" font-size="13" fill="#cbd5e1">판관비</text>
    <text x="0" y="350" font-size="13" fill="#cbd5e1">영업이익</text>

    <!-- 2023 bars (compressed scale, 1단위 = 1억) -->
    <!-- Scale: 6000억 = 720px width -->
    <!-- 매출 -->
    <rect x="120" y="10" width="191" height="28" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <text x="315" y="30" font-size="14" font-weight="700" fill="#fecaca" text-anchor="start" dx="5">1,590</text>
    <rect x="120" y="42" width="671" height="32" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
    <text x="795" y="64" font-size="16" font-weight="800" fill="#86efac" dx="5">5,589</text>

    <!-- 매출원가 -->
    <rect x="120" y="90" width="96" height="28" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <text x="220" y="110" font-size="14" font-weight="700" fill="#fecaca" dx="5">796</text>
    <rect x="120" y="122" width="293" height="32" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
    <text x="417" y="144" font-size="16" font-weight="800" fill="#86efac" dx="5">2,444</text>

    <!-- 매출총이익 -->
    <rect x="120" y="170" width="95" height="28" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <text x="219" y="190" font-size="14" font-weight="700" fill="#fecaca" dx="5">794</text>
    <rect x="120" y="202" width="378" height="32" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
    <text x="502" y="224" font-size="16" font-weight="800" fill="#86efac" dx="5">3,145</text>

    <!-- 판관비 -->
    <rect x="120" y="250" width="35" height="28" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <text x="159" y="270" font-size="14" font-weight="700" fill="#fecaca" dx="5">290</text>
    <rect x="120" y="282" width="50" height="32" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
    <text x="174" y="304" font-size="14" font-weight="700" fill="#86efac" dx="5">413</text>

    <!-- 영업이익 -->
    <rect x="120" y="330" width="42" height="28" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
    <text x="166" y="350" font-size="14" font-weight="700" fill="#fecaca" dx="5">346</text>
    <rect x="120" y="362" width="307" height="36" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <text x="431" y="386" font-size="18" font-weight="800" fill="#fde68a" dx="5">2,554 ★</text>

    <!-- Legend -->
    <g transform="translate(920, 0)">
      <rect x="0" y="8" width="16" height="16" fill="#7f1d1d" stroke="#ef4444"/>
      <text x="24" y="22" font-size="13" fill="#fca5a5">2023</text>
      <rect x="0" y="36" width="16" height="16" fill="#052e16" stroke="#22c55e"/>
      <text x="24" y="50" font-size="13" fill="#86efac">2024</text>
      <rect x="0" y="64" width="16" height="16" fill="#fbbf24" stroke="#f59e0b"/>
      <text x="24" y="78" font-size="13" fill="#fde68a">변화 하이라이트</text>
    </g>
  </g>

  <!-- Delta box -->
  <g transform="translate(60, 600)">
    <rect x="0" y="-50" width="1080" height="120" fill="#1e293b" rx="10"/>
    <text x="24" y="-18" font-size="17" font-weight="700" fill="#fbbf24">증분 분해 — 매출 +3,999억이 영업이익 +2,208억으로 전환된 경로</text>

    <g transform="translate(24, -5)">
      <rect x="0" y="0" width="250" height="62" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" rx="6"/>
      <text x="16" y="22" font-size="12" font-weight="700" fill="#93c5fd">매출 증가분</text>
      <text x="234" y="44" font-size="22" font-weight="800" fill="#dbeafe" text-anchor="end">+3,999</text>
      <text x="234" y="58" font-size="10" fill="#94a3b8" text-anchor="end">+251%</text>
    </g>

    <g transform="translate(290, -5)">
      <rect x="0" y="0" width="250" height="62" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" rx="6"/>
      <text x="16" y="22" font-size="12" font-weight="700" fill="#fca5a5">매출원가 증가분</text>
      <text x="234" y="44" font-size="22" font-weight="800" fill="#fecaca" text-anchor="end">+1,648</text>
      <text x="234" y="58" font-size="10" fill="#94a3b8" text-anchor="end">매출 대비 41%만 증가</text>
    </g>

    <g transform="translate(556, -5)">
      <rect x="0" y="0" width="250" height="62" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" rx="6"/>
      <text x="16" y="22" font-size="12" font-weight="700" fill="#86efac">매출총이익 증가분</text>
      <text x="234" y="44" font-size="22" font-weight="800" fill="#d1fae5" text-anchor="end">+2,351</text>
      <text x="234" y="58" font-size="10" fill="#94a3b8" text-anchor="end">한계이익률 59%</text>
    </g>

    <g transform="translate(822, -5)">
      <rect x="0" y="0" width="234" height="62" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="6"/>
      <text x="16" y="22" font-size="12" font-weight="700" fill="#fde68a">영업이익 증가분</text>
      <text x="218" y="44" font-size="22" font-weight="800" fill="#fbbf24" text-anchor="end">+2,208</text>
      <text x="218" y="58" font-size="10" fill="#94a3b8" text-anchor="end">매출 증가분의 55%</text>
    </g>
  </g>
</svg>
