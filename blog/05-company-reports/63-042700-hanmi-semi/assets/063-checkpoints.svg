<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2026~2028 한미반도체 관찰 4가지 — 하이브리드·고객·마진·주주환원</title>
  <desc>독점이 얼마나 오래 가는가를 검증할 4가지 신호</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2028 관찰 4가지 — 독점의 다음 시험대</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">TC 본딩 독점이 하이브리드 본딩으로 이어지느냐가 핵심 · 4가지 신호가 시총 궤적을 정한다</text>

  <!-- 2x2 grid of 4 cards -->
  <!-- Card 1: Hybrid bonder -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="550" height="230" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#22c55e"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#052e16" text-anchor="middle">1</text>
    <text x="68" y="44" font-size="18" font-weight="800" fill="#86efac">하이브리드 본더 양산 성공</text>

    <text x="24" y="86" font-size="13" fill="#cbd5e1">2025 초 테스트 장비 SK하이닉스에 첫 납품 · 2026~2027</text>
    <text x="24" y="105" font-size="13" fill="#cbd5e1">양산 수율 <tspan font-weight="800" fill="#fde68a">85%+ 달성 여부</tspan>가 HBM4 시대 생존의 기반</text>

    <rect x="24" y="130" width="502" height="58" fill="#0f172a" rx="6"/>
    <text x="40" y="152" font-size="11" font-weight="700" fill="#86efac">성공 시</text>
    <text x="110" y="152" font-size="11" fill="#d1fae5">TC 독점 → 하이브리드 독점 이어짐 · 시총 30조+ 재진입</text>
    <text x="40" y="174" font-size="11" font-weight="700" fill="#fca5a5">실패 시</text>
    <text x="110" y="174" font-size="11" fill="#fecaca">Besi · Applied Materials에 지위 뺏김 · 시총 10조대 조정</text>

    <text x="24" y="212" font-size="10" fill="#94a3b8" font-style="italic">관측점 — SK하이닉스 HBM4 공급사 확정 발표 (2026~2027 예상)</text>
  </g>

  <!-- Card 2: SK dependency -->
  <g transform="translate(630, 160)">
    <rect x="0" y="0" width="510" height="230" fill="#1e293b" stroke="#c084fc" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#c084fc"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#1e1b4b" text-anchor="middle">2</text>
    <text x="68" y="44" font-size="18" font-weight="800" fill="#e9d5ff">SK하이닉스 의존도</text>

    <g transform="translate(24, 80)">
      <rect x="0" y="0" width="220" height="110" fill="#0f172a" rx="6"/>
      <text x="110" y="24" font-size="12" font-weight="700" fill="#fca5a5" text-anchor="middle">현재 (2024)</text>
      <text x="110" y="62" font-size="38" font-weight="800" fill="#fecaca" text-anchor="middle">55~60%</text>
      <text x="110" y="90" font-size="11" fill="#94a3b8" text-anchor="middle">단일 고객 집중 리스크</text>
    </g>

    <path d="M 260 135 L 280 135" stroke="#fbbf24" stroke-width="3"/>
    <path d="M 275 135 L 267 130 L 267 140 Z" fill="#fbbf24"/>

    <g transform="translate(290, 80)">
      <rect x="0" y="0" width="196" height="110" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" rx="6"/>
      <text x="98" y="24" font-size="12" font-weight="700" fill="#86efac" text-anchor="middle">목표 (2027)</text>
      <text x="98" y="62" font-size="38" font-weight="800" fill="#fde68a" text-anchor="middle">45~50%</text>
      <text x="98" y="90" font-size="11" fill="#94a3b8" text-anchor="middle">마이크론 확대로 완화</text>
    </g>

    <text x="24" y="212" font-size="10" fill="#94a3b8" font-style="italic">관측점 — 분기 공시 고객별 매출 비중 · 마이크론 HBM 점유율 변화</text>
  </g>

  <!-- Card 3: OPM 40%+ -->
  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="550" height="270" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#fbbf24"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#78350f" text-anchor="middle">3</text>
    <text x="68" y="44" font-size="18" font-weight="800" fill="#fde68a">영업이익률 40%+ 유지</text>

    <text x="24" y="86" font-size="13" fill="#cbd5e1">2024 45.7% → 2025 43.6% · 40% 아래로 내려가면</text>
    <text x="24" y="105" font-size="13" fill="#cbd5e1"><tspan font-weight="800" fill="#fde68a">독점 마진 붕괴</tspan> — 경쟁 심화 또는 고객 가격 협상력 증가 신호</text>

    <!-- 5-year trend dots -->
    <g transform="translate(30, 130)">
      <line x1="0" y1="80" x2="480" y2="80" stroke="#334155"/>
      <text x="0" y="100" font-size="10" fill="#64748b">2023</text>
      <text x="120" y="100" font-size="10" fill="#64748b">2024</text>
      <text x="240" y="100" font-size="10" fill="#64748b">2025</text>
      <text x="360" y="100" font-size="10" fill="#fbbf24">2026?</text>
      <text x="460" y="100" font-size="10" fill="#fbbf24">2027?</text>

      <!-- 21.8% → scale: 50% = 0px, 0% = 100px -->
      <circle cx="0" cy="57" r="6" fill="#ef4444"/>
      <text x="0" y="48" font-size="10" fill="#fca5a5" text-anchor="middle">21.8%</text>

      <circle cx="120" cy="9" r="7" fill="#22c55e"/>
      <text x="120" y="0" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">45.7%</text>

      <circle cx="240" cy="13" r="7" fill="#22c55e"/>
      <text x="240" y="4" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">43.6%</text>

      <line x1="240" y1="20" x2="360" y2="20" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 4"/>
      <circle cx="360" cy="20" r="5" fill="#fbbf24" opacity="0.6"/>
      <text x="360" y="12" font-size="10" fill="#fbbf24" text-anchor="middle">40%?</text>

      <!-- Warning zone -->
      <line x1="0" y1="40" x2="480" y2="40" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="480" y="38" font-size="10" fill="#fca5a5" text-anchor="end">40% 경계선</text>
    </g>

    <text x="24" y="252" font-size="10" fill="#94a3b8" font-style="italic">관측점 — 분기 IS 영업이익률 · 반도체 장비 업계 상위권 유지 여부</text>
  </g>

  <!-- Card 4: Shareholder return -->
  <g transform="translate(630, 410)">
    <rect x="0" y="0" width="510" height="270" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#60a5fa"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#1e3a8a" text-anchor="middle">4</text>
    <text x="68" y="44" font-size="18" font-weight="800" fill="#dbeafe">주주환원 정책 전환</text>

    <text x="24" y="86" font-size="13" fill="#cbd5e1">현재 자사주 매입 연 <tspan font-weight="800" fill="#fde68a">200억 수준</tspan>,</text>
    <text x="24" y="105" font-size="13" fill="#cbd5e1">자본 6,903억 × 자기자본수익률 30%+ → 연 순이익 2,000억+ 예상</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="230" height="100" fill="#0f172a" rx="6"/>
      <text x="115" y="26" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">현재 (2025)</text>
      <text x="115" y="58" font-size="22" font-weight="800" fill="#fecaca" text-anchor="middle">자사주 200억</text>
      <text x="115" y="82" font-size="11" fill="#94a3b8" text-anchor="middle">배당 최소 · 내부유보</text>
    </g>

    <path d="M 270 180 L 290 180" stroke="#fbbf24" stroke-width="3"/>
    <path d="M 285 180 L 277 175 L 277 185 Z" fill="#fbbf24"/>

    <g transform="translate(300, 130)">
      <rect x="0" y="0" width="186" height="100" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" rx="6"/>
      <text x="93" y="26" font-size="12" font-weight="700" fill="#93c5fd" text-anchor="middle">2026~2027 기대</text>
      <text x="93" y="58" font-size="22" font-weight="800" fill="#fde68a" text-anchor="middle">배당 30%+</text>
      <text x="93" y="82" font-size="11" fill="#94a3b8" text-anchor="middle">중장기 주가 지탱</text>
    </g>

    <text x="24" y="252" font-size="10" fill="#94a3b8" font-style="italic">관측점 — 연간 실적 발표 시 배당성향 · 자사주 소각 규모</text>
  </g>
</svg>
