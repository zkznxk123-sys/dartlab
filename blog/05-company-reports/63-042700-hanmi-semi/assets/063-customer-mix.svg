<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>3대 고객 집중도 — SK하이닉스 60% + 마이크론 18% + 삼성 10%</title>
  <desc>매출 70~80%가 상위 2개 고객에서 나오는 집중 리스크와 그 양날의 검</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">3대 고객이 매출 85% — 집중의 양날</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">HBM 글로벌 점유율 90%+ 3사가 매출을 쥐고 있다 · 한 고객이 끊으면 40% 증발</text>

  <!-- Left: donut chart -->
  <g transform="translate(280, 370)">
    <!-- Donut segments (approximate using stroke-dasharray on circle) -->
    <!-- Circle circumference = 2*pi*140 ≈ 879 -->
    <!-- SK: 57.5% → 505.6 -->
    <!-- Micron: 17.5% → 153.8 -->
    <!-- Samsung: 10% → 87.9 -->
    <!-- OSAT: 10% → 87.9 -->
    <!-- 기타: 5% → 44.0 -->

    <circle cx="0" cy="0" r="140" fill="none" stroke="#7c3aed" stroke-width="60" stroke-dasharray="505.6 879" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#22c55e" stroke-width="60" stroke-dasharray="153.8 879" stroke-dashoffset="-505.6" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#3b82f6" stroke-width="60" stroke-dasharray="87.9 879" stroke-dashoffset="-659.4" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#f59e0b" stroke-width="60" stroke-dasharray="87.9 879" stroke-dashoffset="-747.3" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#64748b" stroke-width="60" stroke-dasharray="44.0 879" stroke-dashoffset="-835.2" transform="rotate(-90)"/>

    <!-- Center label -->
    <text x="0" y="-8" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">2024 매출</text>
    <text x="0" y="22" font-size="30" font-weight="800" fill="#fbbf24" text-anchor="middle">5,589억</text>
    <text x="0" y="44" font-size="13" fill="#94a3b8" text-anchor="middle">상위 3사 85%</text>
  </g>

  <!-- Right: detailed breakdown -->
  <g transform="translate(560, 160)">
    <rect x="0" y="0" width="580" height="460" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="18" font-weight="700" fill="#fbbf24">고객별 관계와 리스크</text>

    <!-- SK하이닉스 -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="540" height="74" fill="#0f172a" stroke="#c084fc" stroke-width="2" rx="6"/>
      <circle cx="20" cy="22" r="8" fill="#7c3aed"/>
      <text x="40" y="28" font-size="15" font-weight="800" fill="#e9d5ff">SK하이닉스</text>
      <text x="520" y="28" font-size="18" font-weight="800" fill="#fde68a" text-anchor="end">55~60%</text>
      <text x="40" y="50" font-size="11" fill="#cbd5e1">약 3,100~3,300억 · 2017 TC본더 첫 납품 이후 7년</text>
      <text x="40" y="66" font-size="10" fill="#fbbf24">리스크 — 2024.6 발언 사건 후 ASMPT 병행 도입 확대</text>
    </g>

    <!-- 마이크론 -->
    <g transform="translate(20, 146)">
      <rect x="0" y="0" width="540" height="66" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="6"/>
      <circle cx="20" cy="22" r="8" fill="#22c55e"/>
      <text x="40" y="28" font-size="15" font-weight="800" fill="#86efac">마이크론 (미국)</text>
      <text x="520" y="28" font-size="18" font-weight="800" fill="#fde68a" text-anchor="end">15~20%</text>
      <text x="40" y="50" font-size="11" fill="#cbd5e1">약 1,000~1,100억 · 2023 말 HBM3E 양산 도입 시 신규</text>
    </g>

    <!-- 삼성전자 -->
    <g transform="translate(20, 224)">
      <rect x="0" y="0" width="540" height="66" fill="#0f172a" stroke="#3b82f6" stroke-width="2" rx="6"/>
      <circle cx="20" cy="22" r="8" fill="#3b82f6"/>
      <text x="40" y="28" font-size="15" font-weight="800" fill="#93c5fd">삼성전자</text>
      <text x="520" y="28" font-size="18" font-weight="800" fill="#fde68a" text-anchor="end">8~10%</text>
      <text x="40" y="50" font-size="11" fill="#cbd5e1">자체 개발 + ASMPT 혼용 · 한미 의존도 최소화 전략</text>
    </g>

    <!-- OSAT -->
    <g transform="translate(20, 302)">
      <rect x="0" y="0" width="540" height="54" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
      <circle cx="20" cy="20" r="8" fill="#f59e0b"/>
      <text x="40" y="26" font-size="13" font-weight="700" fill="#fde68a">OSAT (앰코·SPIL·ASE 등)</text>
      <text x="520" y="26" font-size="16" font-weight="700" fill="#fde68a" text-anchor="end">약 10%</text>
      <text x="40" y="44" font-size="10" fill="#cbd5e1">전통 후공정 장비 (Die Sawing·Pick &amp; Place)</text>
    </g>

    <!-- 기타 -->
    <g transform="translate(20, 368)">
      <rect x="0" y="0" width="540" height="40" fill="#0f172a" stroke="#64748b" stroke-width="1" rx="6"/>
      <circle cx="20" cy="18" r="7" fill="#64748b"/>
      <text x="40" y="24" font-size="12" font-weight="600" fill="#cbd5e1">기타 (연구용·개발용)</text>
      <text x="520" y="24" font-size="14" font-weight="700" fill="#cbd5e1" text-anchor="end">약 5%</text>
    </g>

    <text x="290" y="442" font-size="12" fill="#fbbf24" text-anchor="middle" font-style="italic">상위 2사(SK·마이크론)가 매출 70~80% — HBM 점유율 90%+ 시장 전체 커버</text>
  </g>

  <!-- Bottom panel: the double-edged sword -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="1080" height="60" fill="#1e293b" rx="8"/>
    <text x="24" y="32" font-size="14" font-weight="700" fill="#fbbf24">양날의 검 — 호황기 독점 수혜 ↔ 한 고객 이탈 시 매출 40%+ 증발 · 2025 매출 정체(+3%)는 SK 의존도 완화의 단기 비용</text>
    <text x="24" y="52" font-size="11" fill="#94a3b8">한미의 다변화 전략 — 마이크론 비중 25~30%로 확대, 중국 합법 범위 재진입, 하이브리드 본딩 선점</text>
  </g>
</svg>
