<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>한미반도체 2023 바닥 → 2024 매출 3.5배·영업이익 7.4배 급반등</title>
  <desc>매출 1,590억에서 5,589억으로, 영업이익 346억에서 2,554억으로, 시총 2조에서 30조까지</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출 반토막 난 회사가 1년 만에 영업이익 7.4배</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">한미반도체 2023 → 2024 · HBM TC 본더 장비 독점이 AI 사이클 상류로 역류한 결과</text>

  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="340" height="320" fill="#450a0a" stroke="#ef4444" stroke-width="2.5" rx="12"/>
    <text x="170" y="40" font-size="22" font-weight="700" fill="#fca5a5" text-anchor="middle">2023년</text>
    <text x="170" y="65" font-size="14" fill="#fecaca" text-anchor="middle">사이클 바닥 · HBM3 전환기 공백</text>

    <line x1="30" y1="90" x2="310" y2="90" stroke="#7f1d1d"/>

    <text x="30" y="130" font-size="15" fill="#fecaca">매출</text>
    <text x="310" y="130" font-size="26" font-weight="700" fill="#fef2f2" text-anchor="end">1,590억</text>
    <text x="310" y="150" font-size="12" fill="#fca5a5" text-anchor="end">전년 3,276 대비 -51%</text>

    <text x="30" y="190" font-size="15" fill="#fecaca">영업이익</text>
    <text x="310" y="190" font-size="26" font-weight="700" fill="#fef2f2" text-anchor="end">346억</text>
    <text x="310" y="210" font-size="12" fill="#fca5a5" text-anchor="end">-69%</text>

    <text x="30" y="250" font-size="15" fill="#fecaca">영업이익률</text>
    <text x="310" y="250" font-size="26" font-weight="700" fill="#fef2f2" text-anchor="end">21.8%</text>

    <text x="30" y="290" font-size="15" fill="#fecaca">시가총액 (3월)</text>
    <text x="310" y="290" font-size="22" font-weight="700" fill="#fef2f2" text-anchor="end">약 2조</text>
  </g>

  <g transform="translate(470, 310)">
    <text x="0" y="-30" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">12개월</text>
    <path d="M -80 0 L 80 0" stroke="#fbbf24" stroke-width="4" fill="none"/>
    <path d="M 75 0 L 55 -12 L 55 12 Z" fill="#fbbf24"/>
    <text x="0" y="30" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">HBM3E 양산 구간</text>
    <text x="0" y="50" font-size="12" fill="#fde68a" text-anchor="middle">엔비디아 H200/B100</text>
  </g>

  <g transform="translate(620, 160)">
    <rect x="0" y="0" width="520" height="320" fill="#052e16" stroke="#22c55e" stroke-width="3" rx="12"/>
    <text x="260" y="40" font-size="22" font-weight="700" fill="#86efac" text-anchor="middle">2024년</text>
    <text x="260" y="65" font-size="14" fill="#d1fae5" text-anchor="middle">HBM3E 양산 · TC 본더 독점 수혜</text>

    <line x1="30" y1="90" x2="490" y2="90" stroke="#064e3b"/>

    <text x="30" y="130" font-size="15" fill="#d1fae5">매출</text>
    <text x="490" y="130" font-size="32" font-weight="800" fill="#fde68a" text-anchor="end">5,589억 ★</text>
    <text x="490" y="152" font-size="12" fill="#86efac" text-anchor="end">+3.5배 ↑</text>

    <text x="30" y="190" font-size="15" fill="#d1fae5">영업이익</text>
    <text x="490" y="190" font-size="32" font-weight="800" fill="#fde68a" text-anchor="end">2,554억</text>
    <text x="490" y="212" font-size="12" fill="#86efac" text-anchor="end">+7.4배 ↑</text>

    <text x="30" y="250" font-size="15" fill="#d1fae5">영업이익률</text>
    <text x="490" y="250" font-size="32" font-weight="800" fill="#fde68a" text-anchor="end">45.7%</text>
    <text x="490" y="272" font-size="12" fill="#86efac" text-anchor="end">글로벌 장비사 1위 수준</text>

    <text x="30" y="310" font-size="15" fill="#d1fae5">시가총액 (3월 피크)</text>
    <text x="490" y="310" font-size="24" font-weight="700" fill="#fde68a" text-anchor="end">약 30조 · 15배</text>
  </g>

  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="1080" height="170" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="17" font-weight="700" fill="#fbbf24">독점 공급망 4중 구조 — AI 수요가 상류로 역류하는 경로</text>

    <g transform="translate(24, 60)">
      <rect x="0" y="0" width="200" height="90" fill="#0f172a" stroke="#60a5fa" stroke-width="2" rx="8"/>
      <text x="100" y="30" font-size="13" font-weight="700" fill="#dbeafe" text-anchor="middle">엔비디아</text>
      <text x="100" y="55" font-size="11" fill="#cbd5e1" text-anchor="middle">AI GPU 독점</text>
      <text x="100" y="73" font-size="10" fill="#94a3b8" text-anchor="middle">H100 · H200 · B100</text>
    </g>

    <path d="M 230 105 L 258 105" stroke="#fbbf24" stroke-width="3"/>
    <path d="M 253 105 L 243 99 L 243 111 Z" fill="#fbbf24"/>

    <g transform="translate(262, 60)">
      <rect x="0" y="0" width="200" height="90" fill="#0f172a" stroke="#c084fc" stroke-width="2" rx="8"/>
      <text x="100" y="30" font-size="13" font-weight="700" fill="#e9d5ff" text-anchor="middle">SK하이닉스</text>
      <text x="100" y="55" font-size="11" fill="#cbd5e1" text-anchor="middle">HBM 글로벌 1위</text>
      <text x="100" y="73" font-size="10" fill="#94a3b8" text-anchor="middle">HBM3 · HBM3E 독점</text>
    </g>

    <path d="M 468 105 L 496 105" stroke="#fbbf24" stroke-width="3"/>
    <path d="M 491 105 L 481 99 L 481 111 Z" fill="#fbbf24"/>

    <g transform="translate(500, 60)">
      <rect x="0" y="0" width="260" height="90" fill="#0f172a" stroke="#22c55e" stroke-width="3" rx="8"/>
      <text x="130" y="30" font-size="14" font-weight="800" fill="#86efac" text-anchor="middle">한미반도체</text>
      <text x="130" y="55" font-size="11" fill="#d1fae5" text-anchor="middle">TC 본딩 장비 독점</text>
      <text x="130" y="73" font-size="10" fill="#94a3b8" text-anchor="middle">HBM3E 양산 검증 유일</text>
    </g>

    <path d="M 766 105 L 794 105" stroke="#fbbf24" stroke-width="3"/>
    <path d="M 789 105 L 779 99 L 779 111 Z" fill="#fbbf24"/>

    <g transform="translate(798, 60)">
      <rect x="0" y="0" width="258" height="90" fill="#0f172a" stroke="#f59e0b" stroke-width="2" rx="8"/>
      <text x="129" y="30" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">ASMPT · Besi · 삼성 내재화</text>
      <text x="129" y="55" font-size="11" fill="#cbd5e1" text-anchor="middle">경쟁자 3중 위협</text>
      <text x="129" y="73" font-size="10" fill="#94a3b8" text-anchor="middle">HBM4 구간 재협상</text>
    </g>
  </g>
</svg>
