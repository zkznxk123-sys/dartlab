<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>TC 본딩 장비 — HBM 생산라인의 병목 지점</title>
  <desc>D램 8~12층 수직 적층과 TSV 정렬 ±1μm, 열압 250~400도 ±5μm 제어</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">TC 본딩 — HBM 생산라인의 단일 병목</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">D램 8~12층 수직 적층 · TSV ±1μm 정렬 · 열 250~400도·압력 ±5μm 동시 제어</text>

  <!-- Left: HBM stack illustration -->
  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="360" height="460" fill="#1e293b" rx="10"/>
    <text x="180" y="32" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">HBM 구조 — 수직 적층 12단</text>

    <!-- TC bonder arm -->
    <g transform="translate(180, 68)">
      <rect x="-40" y="0" width="80" height="28" fill="#3b82f6" stroke="#60a5fa" stroke-width="1.5" rx="4"/>
      <text x="0" y="19" font-size="11" font-weight="700" fill="#dbeafe" text-anchor="middle">TC 본더</text>
      <path d="M -8 28 L -8 46 L 8 46 L 8 28 Z" fill="#60a5fa"/>
      <text x="50" y="18" font-size="10" fill="#fbbf24">250~400°C</text>
      <text x="50" y="34" font-size="10" fill="#fbbf24">압력 ±5μm</text>
    </g>

    <!-- D-RAM stack (12 layers) -->
    <g transform="translate(90, 125)">
      <!-- 12 stacked rectangles -->
      <rect x="0" y="0" width="180" height="18" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="-10" y="13" font-size="9" fill="#94a3b8" text-anchor="end">12</text>

      <rect x="0" y="18" width="180" height="18" fill="#8b5cf6" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="36" width="180" height="18" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="54" width="180" height="18" fill="#8b5cf6" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="72" width="180" height="18" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="90" width="180" height="18" fill="#8b5cf6" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="-10" y="103" font-size="9" fill="#94a3b8" text-anchor="end">6</text>

      <rect x="0" y="108" width="180" height="18" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="126" width="180" height="18" fill="#8b5cf6" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="144" width="180" height="18" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="162" width="180" height="18" fill="#8b5cf6" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="180" width="180" height="18" fill="#7c3aed" stroke="#a78bfa" stroke-width="0.8"/>
      <rect x="0" y="198" width="180" height="18" fill="#8b5cf6" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="-10" y="211" font-size="9" fill="#94a3b8" text-anchor="end">1</text>

      <!-- TSV dots (vertical lines through stack) -->
      <line x1="30" y1="0" x2="30" y2="216" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
      <line x1="60" y1="0" x2="60" y2="216" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
      <line x1="90" y1="0" x2="90" y2="216" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
      <line x1="120" y1="0" x2="120" y2="216" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
      <line x1="150" y1="0" x2="150" y2="216" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>

      <!-- Base substrate -->
      <rect x="0" y="216" width="180" height="24" fill="#475569" stroke="#64748b" stroke-width="1.2"/>
      <text x="90" y="232" font-size="10" fill="#e2e8f0" text-anchor="middle">베이스 다이 + 로직</text>

      <!-- Label TSV -->
      <text x="210" y="110" font-size="11" font-weight="700" fill="#fbbf24">TSV</text>
      <text x="210" y="125" font-size="10" fill="#fde68a">수천 개</text>
      <text x="210" y="140" font-size="10" fill="#fde68a">관통 전극</text>
      <text x="210" y="158" font-size="10" fill="#fde68a">±1μm 정렬</text>
    </g>

    <!-- Bottom label -->
    <text x="180" y="420" font-size="12" fill="#cbd5e1" text-anchor="middle">HBM3E 1개에 D램 8~12층 + TSV 수천 개</text>
    <text x="180" y="440" font-size="11" fill="#94a3b8" text-anchor="middle">열압 제어 실패 시 전체 칩 폐기</text>
  </g>

  <!-- Right: Competitor table -->
  <g transform="translate(480, 160)">
    <rect x="0" y="0" width="660" height="460" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="18" font-weight="700" fill="#fbbf24">세계 TC 본더 4사 비교 (2024)</text>
    <text x="24" y="60" font-size="12" fill="#94a3b8">HBM3E 양산 검증이 된 곳은 한미뿐 · ASMPT는 HBM3까지 · Besi·K&amp;S는 차세대 진입 단계</text>

    <!-- Table header -->
    <g transform="translate(20, 90)">
      <rect x="0" y="0" width="620" height="34" fill="#0f172a"/>
      <text x="18" y="22" font-size="12" font-weight="700" fill="#94a3b8">회사</text>
      <text x="188" y="22" font-size="12" font-weight="700" fill="#94a3b8">국적</text>
      <text x="290" y="22" font-size="12" font-weight="700" fill="#94a3b8">HBM3E 양산</text>
      <text x="450" y="22" font-size="12" font-weight="700" fill="#94a3b8">주 고객</text>
    </g>

    <!-- Hanmi row (highlighted) -->
    <g transform="translate(20, 128)">
      <rect x="0" y="0" width="620" height="46" fill="#052e16" stroke="#22c55e" stroke-width="2" rx="4"/>
      <text x="18" y="20" font-size="14" font-weight="800" fill="#86efac">한미반도체</text>
      <text x="18" y="38" font-size="10" fill="#d1fae5">월 수십 대 생산</text>
      <text x="188" y="28" font-size="12" fill="#d1fae5">한국 · 인천</text>
      <text x="290" y="20" font-size="14" font-weight="800" fill="#fde68a">O · 양산 검증 ★</text>
      <text x="290" y="38" font-size="10" fill="#86efac">HBM3/HBM3E 모두</text>
      <text x="450" y="28" font-size="12" fill="#d1fae5">SK하이닉스 · 마이크론</text>
    </g>

    <g transform="translate(20, 184)">
      <rect x="0" y="0" width="620" height="42" fill="#0f172a"/>
      <text x="18" y="20" font-size="13" font-weight="700" fill="#f1f5f9">ASMPT</text>
      <text x="18" y="35" font-size="10" fill="#94a3b8">월 수십 대</text>
      <text x="188" y="26" font-size="12" fill="#cbd5e1">싱가포르 · 홍콩</text>
      <text x="290" y="20" font-size="13" font-weight="700" fill="#fbbf24">△ · HBM3까지</text>
      <text x="290" y="35" font-size="10" fill="#94a3b8">HBM3E 인증 단계</text>
      <text x="450" y="26" font-size="12" fill="#cbd5e1">삼성전자</text>
    </g>

    <g transform="translate(20, 236)">
      <rect x="0" y="0" width="620" height="42" fill="#0f172a"/>
      <text x="18" y="20" font-size="13" font-weight="700" fill="#f1f5f9">Besi</text>
      <text x="18" y="35" font-size="10" fill="#94a3b8">월 10~20대</text>
      <text x="188" y="26" font-size="12" fill="#cbd5e1">네덜란드</text>
      <text x="290" y="20" font-size="13" font-weight="700" fill="#fca5a5">X · 차세대 진입</text>
      <text x="290" y="35" font-size="10" fill="#94a3b8">하이브리드 본딩 선제 투자</text>
      <text x="450" y="26" font-size="12" fill="#cbd5e1">연구용 · AMAT 제휴</text>
    </g>

    <g transform="translate(20, 288)">
      <rect x="0" y="0" width="620" height="42" fill="#0f172a"/>
      <text x="18" y="20" font-size="13" font-weight="700" fill="#f1f5f9">Kulicke &amp; Soffa</text>
      <text x="18" y="35" font-size="10" fill="#94a3b8">월 5~10대</text>
      <text x="188" y="26" font-size="12" fill="#cbd5e1">미국</text>
      <text x="290" y="20" font-size="13" font-weight="700" fill="#fca5a5">X</text>
      <text x="290" y="35" font-size="10" fill="#94a3b8">와이어 본더 중심</text>
      <text x="450" y="26" font-size="12" fill="#cbd5e1">로직 칩</text>
    </g>

    <!-- Why Hanmi dominates box -->
    <g transform="translate(20, 348)">
      <rect x="0" y="0" width="620" height="96" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" rx="6"/>
      <text x="18" y="26" font-size="13" font-weight="700" fill="#86efac">한미의 격차 — 양산 수율 + 설치·유지보수 인프라 + SK하이닉스와의 7년 검증</text>
      <text x="18" y="50" font-size="11" fill="#cbd5e1">① 2017 로직 MCM 첫 납품으로 7년 필드 데이터 축적 — 경쟁사 대비 3~5년 앞섬</text>
      <text x="18" y="68" font-size="11" fill="#cbd5e1">② 한국 생산 기반 — SK하이닉스 이천·청주 공장과 지리적 밀착</text>
      <text x="18" y="86" font-size="11" fill="#cbd5e1">③ 양산 수율 5~10%p 격차 — 장비 한 대당 연간 수십억 경제 가치 차이</text>
    </g>
  </g>
</svg>
