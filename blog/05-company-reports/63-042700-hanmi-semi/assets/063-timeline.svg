<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>한미반도체 43년 타임라인</title>
  <desc>1980 창업 → 2017 TC본더 납품 → 2024 시총 30조</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">43년 후공정 장비 회사가 HBM 독점 기업이 된 경로</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">1980 창업 → 2017 TC본더 첫 납품 → 2024 시가총액 30조 · 세 단계의 누적</text>

  <!-- Timeline spine -->
  <line x1="120" y1="380" x2="1140" y2="380" stroke="#334155" stroke-width="3"/>

  <!-- Phase backgrounds -->
  <rect x="120" y="200" width="330" height="360" fill="#1e293b" opacity="0.4" rx="8"/>
  <rect x="450" y="200" width="310" height="360" fill="#1e293b" opacity="0.4" rx="8"/>
  <rect x="760" y="200" width="380" height="360" fill="#1e293b" opacity="0.4" rx="8"/>

  <!-- Phase labels -->
  <text x="285" y="230" font-size="16" font-weight="700" fill="#64748b" text-anchor="middle">Phase 1 · 1980~2010</text>
  <text x="285" y="250" font-size="13" fill="#94a3b8" text-anchor="middle">후공정 장비 국산화 1세대</text>

  <text x="605" y="230" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">Phase 2 · 2012~2021</text>
  <text x="605" y="250" font-size="13" fill="#fde68a" text-anchor="middle">TC 본더 개발 · HBM3 준비</text>

  <text x="950" y="230" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">Phase 3 · 2023~2025</text>
  <text x="950" y="250" font-size="13" fill="#86efac" text-anchor="middle">사이클 V + HBM3E 독점 수혜</text>

  <!-- 1980 -->
  <circle cx="180" cy="380" r="9" fill="#64748b"/>
  <line x1="180" y1="380" x2="180" y2="305" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="180" y="295" font-size="14" font-weight="700" fill="#cbd5e1" text-anchor="middle">1980</text>
  <text x="180" y="420" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">창업</text>
  <text x="180" y="440" font-size="10" fill="#94a3b8" text-anchor="middle">곽노권 설립</text>
  <text x="180" y="455" font-size="10" fill="#94a3b8" text-anchor="middle">Die Sawing</text>

  <!-- 1990s -->
  <circle cx="310" cy="380" r="7" fill="#64748b"/>
  <line x1="310" y1="380" x2="310" y2="320" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="310" y="310" font-size="14" font-weight="700" fill="#cbd5e1" text-anchor="middle">1990s</text>
  <text x="310" y="420" font-size="11" fill="#94a3b8" text-anchor="middle">삼성·LG반도체</text>
  <text x="310" y="435" font-size="11" fill="#94a3b8" text-anchor="middle">장비 공급</text>

  <!-- 2012 -->
  <circle cx="470" cy="380" r="9" fill="#fbbf24"/>
  <line x1="470" y1="380" x2="470" y2="305" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="470" y="295" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">2012~2015</text>
  <text x="470" y="420" font-size="12" font-weight="600" fill="#fde68a" text-anchor="middle">TC 본더</text>
  <text x="470" y="440" font-size="11" fill="#94a3b8" text-anchor="middle">자체 개발</text>
  <text x="470" y="455" font-size="11" fill="#94a3b8" text-anchor="middle">시작</text>

  <!-- 2017 -->
  <circle cx="590" cy="380" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <line x1="590" y1="380" x2="590" y2="305" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="590" y="295" font-size="15" font-weight="800" fill="#fbbf24" text-anchor="middle">2017 ★</text>
  <text x="590" y="420" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">SK하이닉스</text>
  <text x="590" y="438" font-size="12" fill="#fde68a" text-anchor="middle">첫 납품</text>
  <text x="590" y="455" font-size="10" fill="#94a3b8" text-anchor="middle">로직 MCM용</text>

  <!-- 2021 -->
  <circle cx="710" cy="380" r="9" fill="#fbbf24"/>
  <line x1="710" y1="380" x2="710" y2="320" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="710" y="310" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">2021</text>
  <text x="710" y="420" font-size="11" fill="#94a3b8" text-anchor="middle">매출 3,732억</text>
  <text x="710" y="435" font-size="11" fill="#94a3b8" text-anchor="middle">HBM2E 피크</text>

  <!-- 2023 -->
  <circle cx="800" cy="380" r="9" fill="#ef4444"/>
  <line x1="800" y1="380" x2="800" y2="460" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="800" y="480" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">2023</text>
  <text x="800" y="502" font-size="12" font-weight="600" fill="#fca5a5" text-anchor="middle">반토막</text>
  <text x="800" y="520" font-size="11" fill="#fca5a5" text-anchor="middle">매출 1,590억</text>
  <text x="800" y="535" font-size="11" fill="#fca5a5" text-anchor="middle">-51%</text>

  <!-- 2024 -->
  <circle cx="950" cy="380" r="14" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <line x1="950" y1="380" x2="950" y2="300" stroke="#22c55e" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="950" y="290" font-size="15" font-weight="800" fill="#22c55e" text-anchor="middle">2024 ★</text>
  <text x="950" y="420" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">폭발</text>
  <text x="950" y="440" font-size="12" fill="#d1fae5" text-anchor="middle">매출 5,589억</text>
  <text x="950" y="455" font-size="12" fill="#d1fae5" text-anchor="middle">영업이익률 45.7%</text>
  <text x="950" y="475" font-size="11" fill="#fbbf24" text-anchor="middle">시총 30조 (3월)</text>

  <!-- 2025 -->
  <circle cx="1080" cy="380" r="9" fill="#22c55e"/>
  <line x1="1080" y1="380" x2="1080" y2="320" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="1080" y="310" font-size="14" font-weight="700" fill="#86efac" text-anchor="middle">2025</text>
  <text x="1080" y="420" font-size="11" fill="#94a3b8" text-anchor="middle">매출 5,767억</text>
  <text x="1080" y="435" font-size="11" fill="#94a3b8" text-anchor="middle">이익률 43.6%</text>
  <text x="1080" y="450" font-size="10" fill="#fbbf24" text-anchor="middle">시총 18조</text>

  <!-- Bottom insight -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="95" fill="#1e293b" rx="10"/>
    <text x="24" y="34" font-size="16" font-weight="700" fill="#fbbf24">핵심 — 2017년 TC본더 첫 납품 경험이 2024년 폭발의 기반</text>
    <text x="24" y="60" font-size="13" fill="#cbd5e1">로직 MCM용으로 시작한 TC 본더가 HBM3E 양산 구간에서 글로벌 유일 검증 장비로 수렴.</text>
    <text x="24" y="80" font-size="13" fill="#cbd5e1">7년 누적 경험이 ASMPT·Besi 대비 HBM3E 양산 수율에서 결정적 격차를 만들었다.</text>
  </g>
</svg>
