<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>AI 칩 테스트 수요 폭증 — 2024 vs 2028</title>
  <desc>HBM · AI GPU · 패키징 · 자동차 4대 드라이버로 포고핀 수요 5배</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2024 → 2028 포고핀 수요 5배 예상</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">HBM 수요 5배 · AI GPU 10배 · 2.5D/3D 패키징 5배 · 자동차 반도체 2배</text>

  <!-- 4 drivers as cards -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="540" height="220" fill="#1e293b" stroke="#c084fc" stroke-width="2" rx="10"/>
    <circle cx="40" cy="40" r="16" fill="#c084fc"/>
    <text x="40" y="46" font-size="18" font-weight="800" fill="#1e1b4b" text-anchor="middle">1</text>
    <text x="72" y="48" font-size="20" font-weight="800" fill="#e9d5ff">HBM 테스트</text>

    <text x="24" y="90" font-size="13" fill="#cbd5e1">D램 12층 수직 적층 → 층별 + 통합 이중 테스트</text>
    <text x="24" y="110" font-size="13" fill="#cbd5e1">한 HBM당 포고핀 <tspan font-weight="800" fill="#fde68a">수천 개</tspan> 소요</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="492" height="80" fill="#0f172a" rx="6"/>
      <text x="16" y="26" font-size="12" font-weight="700" fill="#fbbf24">글로벌 HBM 시장</text>
      <text x="16" y="50" font-size="14" fill="#cbd5e1">2024 <tspan font-weight="700" fill="#fde68a">$16B</tspan> → 2026 <tspan font-weight="700" fill="#fde68a">$40B</tspan> → 2028 <tspan font-weight="700" fill="#fde68a">$80B</tspan></text>
      <text x="16" y="70" font-size="11" fill="#94a3b8">테스트 포고핀 수요 <tspan font-weight="700" fill="#86efac">5배</tspan> 증가 예상</text>
    </g>
  </g>

  <g transform="translate(620, 150)">
    <rect x="0" y="0" width="520" height="220" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <circle cx="40" cy="40" r="16" fill="#22c55e"/>
    <text x="40" y="46" font-size="18" font-weight="800" fill="#052e16" text-anchor="middle">2</text>
    <text x="72" y="48" font-size="20" font-weight="800" fill="#86efac">AI GPU/ASIC 테스트</text>

    <text x="24" y="90" font-size="13" fill="#cbd5e1">엔비디아 H100/H200/B100/B300 + AMD MI300 + TPU</text>
    <text x="24" y="110" font-size="13" fill="#cbd5e1">I/O 핀 밀도 <tspan font-weight="800" fill="#fde68a">2~3배</tspan></text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="472" height="80" fill="#0f172a" rx="6"/>
      <text x="16" y="26" font-size="12" font-weight="700" fill="#fbbf24">AI 칩 출하량 (2023 대비 2026)</text>
      <text x="16" y="50" font-size="20" font-weight="800" fill="#fde68a">10배</text>
      <text x="16" y="70" font-size="11" fill="#94a3b8">리노 AI 소켓 매출 2023 200억 → 2028 1,500억+ 기대</text>
    </g>
  </g>

  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="540" height="220" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <circle cx="40" cy="40" r="16" fill="#fbbf24"/>
    <text x="40" y="46" font-size="18" font-weight="800" fill="#78350f" text-anchor="middle">3</text>
    <text x="72" y="48" font-size="20" font-weight="800" fill="#fde68a">2.5D/3D 패키징 복잡도</text>

    <text x="24" y="90" font-size="13" fill="#cbd5e1">CoWoS · Foveros · X-Cube — 하나의 패키지에 여러 칩</text>
    <text x="24" y="110" font-size="13" fill="#cbd5e1">TSMC CoWoS capacity <tspan font-weight="800" fill="#fde68a">2023 12만 → 2027 60만</tspan></text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="492" height="80" fill="#0f172a" rx="6"/>
      <text x="16" y="26" font-size="12" font-weight="700" fill="#fbbf24">패키지당 포고핀 수요</text>
      <text x="16" y="50" font-size="20" font-weight="800" fill="#fde68a">5배</text>
      <text x="16" y="70" font-size="11" fill="#94a3b8">테스트 복잡도 급증 → 포고핀 세트당 채용 수 급증</text>
    </g>
  </g>

  <g transform="translate(620, 390)">
    <rect x="0" y="0" width="520" height="220" fill="#1e293b" stroke="#60a5fa" stroke-width="2" rx="10"/>
    <circle cx="40" cy="40" r="16" fill="#60a5fa"/>
    <text x="40" y="46" font-size="18" font-weight="800" fill="#1e3a8a" text-anchor="middle">4</text>
    <text x="72" y="48" font-size="20" font-weight="800" fill="#dbeafe">자동차·IoT 반도체</text>

    <text x="24" y="90" font-size="13" fill="#cbd5e1">EV 1대당 반도체 300~500개 (내연기관 대비 3~4배)</text>
    <text x="24" y="110" font-size="13" fill="#cbd5e1">자동차 반도체 테스트 포고핀 시장 <tspan font-weight="800" fill="#fde68a">연 15~20%</tspan> 성장</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="472" height="80" fill="#0f172a" rx="6"/>
      <text x="16" y="26" font-size="12" font-weight="700" fill="#fbbf24">리노 자동차 비중 전망</text>
      <text x="16" y="50" font-size="16" fill="#dbeafe"><tspan fill="#94a3b8">현재 5% 미만 →</tspan> <tspan font-weight="800" fill="#fde68a">2028 10~15%</tspan></text>
      <text x="16" y="70" font-size="11" fill="#94a3b8">반도체 고객 다변화의 새로운 축</text>
    </g>
  </g>

  <!-- Bottom: aggregate growth -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="1080" height="60" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="540" y="25" font-size="15" font-weight="700" fill="#fbbf24" text-anchor="middle">4가지 드라이버 총합</text>
    <text x="540" y="48" font-size="14" fill="#cbd5e1" text-anchor="middle">→ <tspan font-weight="800" fill="#fde68a">2024 기준 포고핀 수요가 2028년까지 약 5배 증가</tspan> · 리노 매출 잠재 확대 구간</text>
  </g>
</svg>
