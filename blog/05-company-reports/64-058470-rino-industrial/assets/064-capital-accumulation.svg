<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2016→2025 자본 축적 경로</title>
  <desc>누적 순이익 8,000억 중 배당 2,700억 + 내부유보 5,300억</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">자본 +5,303억 축적 — 배당 34% + 유보 66%</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">10년 누적 순이익 약 8,000억 → 배당 2,700억 + 내부유보 5,303억 = 자본 2,009→7,312억</text>

  <!-- Stacked bar chart for capital over years -->
  <g transform="translate(80, 160)">
    <line x1="60" y1="400" x2="1060" y2="400" stroke="#334155" stroke-width="1.5"/>

    <!-- Y axis labels -->
    <text x="50" y="405" font-size="11" fill="#64748b" text-anchor="end">0</text>
    <text x="50" y="330" font-size="11" fill="#64748b" text-anchor="end">2천억</text>
    <line x1="55" y1="325" x2="1060" y2="325" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4"/>
    <text x="50" y="255" font-size="11" fill="#64748b" text-anchor="end">4천억</text>
    <line x1="55" y1="250" x2="1060" y2="250" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4"/>
    <text x="50" y="180" font-size="11" fill="#64748b" text-anchor="end">6천억</text>
    <line x1="55" y1="175" x2="1060" y2="175" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4"/>
    <text x="50" y="105" font-size="11" fill="#64748b" text-anchor="end">8천억</text>
    <line x1="55" y1="100" x2="1060" y2="100" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4"/>

    <!-- Bars for 2016-2025 capital -->
    <!-- Values: 2009, 2279, 2628, 3002, 3373, 4177, 4932, 5571, 5867, 7312 -->
    <!-- Scale: 1억 = 0.0375px (400px for 8000억) ⇒ 1000억 = 47.6px -->
    <!-- Actually, 8,000억 @ 100 y ⇒ 1,000억 = (400-100)/8 = 37.5 ⇒ y = 400 - val*0.0375 -->

    <g>
      <rect x="80" y="324" width="70" height="76" fill="#1e40af"/>
      <text x="115" y="420" font-size="11" fill="#93c5fd" text-anchor="middle">2016</text>
      <text x="115" y="316" font-size="11" font-weight="700" fill="#dbeafe" text-anchor="middle">2,009</text>
    </g>

    <g>
      <rect x="170" y="314" width="70" height="86" fill="#2563eb"/>
      <text x="205" y="420" font-size="11" fill="#93c5fd" text-anchor="middle">2017</text>
      <text x="205" y="306" font-size="11" fill="#dbeafe" text-anchor="middle">2,279</text>
    </g>

    <g>
      <rect x="260" y="301" width="70" height="99" fill="#3b82f6"/>
      <text x="295" y="420" font-size="11" fill="#93c5fd" text-anchor="middle">2018</text>
    </g>

    <g>
      <rect x="350" y="287" width="70" height="113" fill="#60a5fa"/>
      <text x="385" y="420" font-size="11" fill="#93c5fd" text-anchor="middle">2019</text>
    </g>

    <g>
      <rect x="440" y="274" width="70" height="126" fill="#7c3aed"/>
      <text x="475" y="420" font-size="11" fill="#e9d5ff" text-anchor="middle">2020</text>
    </g>

    <g>
      <rect x="530" y="244" width="70" height="156" fill="#8b5cf6"/>
      <text x="565" y="420" font-size="11" fill="#e9d5ff" text-anchor="middle">2021</text>
    </g>

    <g>
      <rect x="620" y="215" width="70" height="185" fill="#a78bfa"/>
      <text x="655" y="420" font-size="11" fill="#e9d5ff" text-anchor="middle">2022</text>
    </g>

    <g>
      <rect x="710" y="191" width="70" height="209" fill="#c084fc"/>
      <text x="745" y="420" font-size="11" fill="#e9d5ff" text-anchor="middle">2023</text>
      <text x="745" y="183" font-size="11" fill="#e9d5ff" text-anchor="middle">5,571</text>
    </g>

    <g>
      <rect x="800" y="180" width="70" height="220" fill="#d8b4fe"/>
      <text x="835" y="420" font-size="11" fill="#e9d5ff" text-anchor="middle">2024</text>
    </g>

    <g>
      <rect x="890" y="126" width="70" height="274" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
      <text x="925" y="420" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">2025</text>
      <text x="925" y="118" font-size="13" font-weight="800" fill="#fde68a" text-anchor="middle">7,312 ★</text>
    </g>

    <!-- Arrow showing growth -->
    <path d="M 150 324 C 400 300 700 180 890 126" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
    <text x="510" y="230" font-size="14" font-weight="700" fill="#fbbf24">10년간 +5,303억 (3.6배)</text>
  </g>

  <!-- Bottom breakdown -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="100" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="17" font-weight="700" fill="#fbbf24">자본 축적 메커니즘</text>

    <g transform="translate(24, 55)">
      <rect x="0" y="0" width="300" height="34" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#93c5fd">10년 누적 순이익</text>
      <text x="284" y="22" font-size="16" font-weight="800" fill="#dbeafe" text-anchor="end">약 8,000억</text>
    </g>

    <g transform="translate(340, 55)">
      <rect x="0" y="0" width="300" height="34" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#fca5a5">10년 누적 배당 (유출)</text>
      <text x="284" y="22" font-size="16" font-weight="800" fill="#fecaca" text-anchor="end">-2,700억 (34%)</text>
    </g>

    <g transform="translate(656, 55)">
      <rect x="0" y="0" width="400" height="34" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#86efac">내부유보 (자본 증가)</text>
      <text x="384" y="22" font-size="16" font-weight="800" fill="#fde68a" text-anchor="end">+5,303억 (66%)</text>
    </g>
  </g>
</svg>
