<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2026~2028 리노공업 관찰 5가지</title>
  <desc>마진 방어선·AI 비중·경쟁사 AI 출시·승계·중국 경쟁</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2028 관찰 5가지 — 48년 독점의 시험대</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">5가지 신호 중 2개 이상 경고등이 켜지면 영업이익률 40%+ 방어선 재평가 구간</text>

  <!-- 5 cards: 3 top + 2 bottom -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="340" height="240" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#fbbf24"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#78350f" text-anchor="middle">1</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#fde68a">영업이익률 45%+ 유지</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">2024 <tspan font-weight="800" fill="#fde68a">44.8%</tspan>가 10년 저점</text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">2025 48.3% 반등</text>

    <rect x="24" y="130" width="292" height="90" fill="#0f172a" rx="6"/>
    <text x="40" y="152" font-size="11" font-weight="700" fill="#86efac">유지 시</text>
    <text x="40" y="170" font-size="11" fill="#d1fae5">4가지 해자 조건 견고</text>
    <text x="40" y="194" font-size="11" font-weight="700" fill="#fca5a5">3분기 이상 40% 미만 시</text>
    <text x="40" y="212" font-size="11" fill="#fecaca">해자 붕괴 시그널</text>
  </g>

  <g transform="translate(430, 150)">
    <rect x="0" y="0" width="340" height="240" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#22c55e"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#052e16" text-anchor="middle">2</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#86efac">AI·HBM 포고핀 비중</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">2025 추정 <tspan font-weight="800" fill="#fde68a">10~15%</tspan></text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">2028 목표 25~30%</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="292" height="90" fill="#0f172a" rx="6"/>
      <text x="146" y="24" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">AI 비중 궤적</text>
      <line x1="20" y1="60" x2="272" y2="60" stroke="#334155"/>
      <circle cx="40" cy="60" r="4" fill="#94a3b8"/>
      <text x="40" y="75" font-size="9" fill="#94a3b8" text-anchor="middle">2023</text>
      <circle cx="146" cy="48" r="5" fill="#fbbf24"/>
      <text x="146" y="40" font-size="10" fill="#fde68a" text-anchor="middle">15%</text>
      <text x="146" y="75" font-size="9" fill="#94a3b8" text-anchor="middle">2025</text>
      <circle cx="252" cy="30" r="6" fill="#22c55e"/>
      <text x="252" y="22" font-size="10" font-weight="700" fill="#86efac" text-anchor="middle">28%</text>
      <text x="252" y="75" font-size="9" fill="#94a3b8" text-anchor="middle">2028?</text>
    </g>
  </g>

  <g transform="translate(800, 150)">
    <rect x="0" y="0" width="340" height="240" fill="#1e293b" stroke="#ef4444" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#ef4444"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#450a0a" text-anchor="middle">3</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#fca5a5">Smiths·Yokowo AI 출시</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">2026~2027 AI 전용 포고핀 출시 예상</text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">리노 <tspan font-weight="800" fill="#fde68a">1~2년 기술 우위</tspan> 유지 관건</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="292" height="90" fill="#0f172a" rx="6"/>
      <text x="20" y="24" font-size="11" font-weight="700" fill="#fbbf24">관찰 포인트</text>
      <text x="20" y="46" font-size="11" fill="#d1fae5">· 리노 AI 소켓 가격 프리미엄 유지</text>
      <text x="20" y="64" font-size="11" fill="#d1fae5">· 글로벌 설계사 이탈 여부</text>
      <text x="20" y="82" font-size="11" fill="#fca5a5">· 가격 인하 압력 발생 시 경고</text>
    </g>
  </g>

  <!-- Bottom 2 cards -->
  <g transform="translate(220, 410)">
    <rect x="0" y="0" width="340" height="270" fill="#1e293b" stroke="#c084fc" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#c084fc"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#1e1b4b" text-anchor="middle">4</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#e9d5ff">이채윤 → 이선진 승계</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">현재 회장 80세</text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">이선진 대표 2020 취임 후 5년</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="292" height="124" fill="#0f172a" rx="6"/>
      <text x="146" y="24" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">2027~2028 완전 승계 가능성</text>
      <text x="20" y="56" font-size="11" fill="#e9d5ff">기대: 배당 정책 강화 · ESG 확대</text>
      <text x="20" y="78" font-size="11" fill="#e9d5ff">주주환원 상향 조정</text>
      <text x="20" y="104" font-size="11" fill="#fca5a5">리스크: 승계 과정 잡음</text>
    </g>
  </g>

  <g transform="translate(640, 410)">
    <rect x="0" y="0" width="340" height="270" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#f59e0b"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#78350f" text-anchor="middle">5</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#fde68a">중국 경쟁사 부상</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">중국 정부 반도체 자립 정책</text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">현재 품질 격차 <tspan font-weight="800" fill="#fde68a">크지만 좁혀짐</tspan></text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="292" height="124" fill="#0f172a" rx="6"/>
      <text x="146" y="24" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">2028년 시나리오</text>
      <text x="20" y="56" font-size="11" fill="#d1fae5">A · 미국 제재로 중국 내수 제한</text>
      <text x="20" y="80" font-size="11" fill="#fde68a">B · 중국 현지 포고핀 글로벌 10% 차지</text>
      <text x="20" y="104" font-size="11" fill="#fca5a5">C · 스탠다드 포고핀(리노 60%) 일부 잠식</text>
    </g>
  </g>
</svg>
