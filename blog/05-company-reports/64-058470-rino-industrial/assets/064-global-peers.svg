<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>글로벌 포고핀 4사 비교</title>
  <desc>리노공업 영업이익률 48.3%가 글로벌 1위</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">영업이익률 48.3% — 글로벌 포고핀 1위</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">Smiths·Yokowo·Feinmetall 전부를 매출 성장률과 마진에서 앞섰다</text>

  <!-- Table -->
  <g transform="translate(60, 160)">
    <!-- Header -->
    <rect x="0" y="0" width="1080" height="40" fill="#0f172a"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#94a3b8">회사</text>
    <text x="270" y="26" font-size="13" font-weight="700" fill="#94a3b8">국적</text>
    <text x="440" y="26" font-size="13" font-weight="700" fill="#94a3b8">매출</text>
    <text x="620" y="26" font-size="13" font-weight="700" fill="#94a3b8">영업이익률</text>
    <text x="830" y="26" font-size="13" font-weight="700" fill="#94a3b8">주력 제품</text>

    <!-- Rino (highlighted) -->
    <g transform="translate(0, 48)">
      <rect x="0" y="0" width="1080" height="62" fill="#052e16" stroke="#22c55e" stroke-width="2.5" rx="4"/>
      <text x="20" y="28" font-size="15" font-weight="800" fill="#86efac">리노공업 (058470)</text>
      <text x="20" y="48" font-size="11" fill="#d1fae5">KOSDAQ 상장 · 가족경영 48년</text>
      <text x="270" y="36" font-size="14" fill="#d1fae5">한국 · 부산</text>
      <text x="440" y="28" font-size="16" font-weight="800" fill="#fde68a">3,725억</text>
      <text x="440" y="50" font-size="11" fill="#86efac">2025 +91%</text>
      <text x="620" y="28" font-size="24" font-weight="800" fill="#fde68a">48.3% ★</text>
      <text x="620" y="50" font-size="11" fill="#86efac">글로벌 1위</text>
      <text x="830" y="30" font-size="13" fill="#d1fae5">포고핀 풀라인 + IC 소켓</text>
      <text x="830" y="48" font-size="11" fill="#86efac">반도체 설계사 10개+</text>
    </g>

    <g transform="translate(0, 120)">
      <rect x="0" y="0" width="1080" height="54" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" rx="4"/>
      <text x="20" y="26" font-size="14" font-weight="700" fill="#f1f5f9">Smiths Interconnect</text>
      <text x="20" y="44" font-size="10" fill="#94a3b8">Smiths Group 자회사 (영국 상장)</text>
      <text x="270" y="32" font-size="13" fill="#cbd5e1">영국/미국</text>
      <text x="440" y="28" font-size="14" font-weight="700" fill="#cbd5e1">$300M</text>
      <text x="440" y="46" font-size="10" fill="#94a3b8">약 4,000억</text>
      <text x="620" y="30" font-size="18" font-weight="700" fill="#fca5a5">15~20%</text>
      <text x="830" y="32" font-size="12" fill="#cbd5e1">고주파·우주항공 커넥터</text>
    </g>

    <g transform="translate(0, 184)">
      <rect x="0" y="0" width="1080" height="54" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
      <text x="20" y="26" font-size="14" font-weight="700" fill="#f1f5f9">Yokowo (요코와)</text>
      <text x="20" y="44" font-size="10" fill="#94a3b8">도쿄 상장 · 1922 설립</text>
      <text x="270" y="32" font-size="13" fill="#cbd5e1">일본</text>
      <text x="440" y="28" font-size="14" font-weight="700" fill="#cbd5e1">$500M</text>
      <text x="440" y="46" font-size="10" fill="#94a3b8">포고핀 부문 $150M</text>
      <text x="620" y="30" font-size="18" font-weight="700" fill="#fca5a5">8~12%</text>
      <text x="830" y="32" font-size="12" fill="#cbd5e1">자동차용 커넥터 주력</text>
    </g>

    <g transform="translate(0, 248)">
      <rect x="0" y="0" width="1080" height="54" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" rx="4"/>
      <text x="20" y="26" font-size="14" font-weight="700" fill="#f1f5f9">Feinmetall</text>
      <text x="20" y="44" font-size="10" fill="#94a3b8">비상장 · 1948 설립</text>
      <text x="270" y="32" font-size="13" fill="#cbd5e1">독일</text>
      <text x="440" y="28" font-size="14" font-weight="700" fill="#cbd5e1">$150M</text>
      <text x="440" y="46" font-size="10" fill="#94a3b8">약 2,000억</text>
      <text x="620" y="30" font-size="18" font-weight="700" fill="#fbbf24">20%+</text>
      <text x="830" y="32" font-size="12" fill="#cbd5e1">고정밀 테스트 소켓</text>
    </g>

    <g transform="translate(0, 312)">
      <rect x="0" y="0" width="1080" height="54" fill="#0f172a" stroke="#64748b" stroke-width="1" rx="4"/>
      <text x="20" y="26" font-size="13" font-weight="600" fill="#cbd5e1">LTI Corp (ISC)</text>
      <text x="20" y="44" font-size="10" fill="#94a3b8">KOSDAQ 상장 · 국내 경쟁</text>
      <text x="270" y="32" font-size="12" fill="#cbd5e1">한국</text>
      <text x="440" y="32" font-size="13" font-weight="600" fill="#cbd5e1">1,500억</text>
      <text x="620" y="30" font-size="16" font-weight="700" fill="#fca5a5">15%</text>
      <text x="830" y="32" font-size="12" fill="#cbd5e1">IC 테스트 소켓</text>
    </g>
  </g>

  <!-- Market share -->
  <g transform="translate(60, 550)">
    <rect x="0" y="0" width="1080" height="150" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="17" font-weight="700" fill="#fbbf24">세계 포고핀 시장 — 약 $1.5~2B</text>
    <text x="24" y="60" font-size="13" fill="#cbd5e1">리노 $2.7B × 포고핀 60% = $1.6B → <tspan font-weight="800" fill="#fde68a">글로벌 시장 약 50%+ 점유</tspan></text>

    <!-- Market share bar -->
    <g transform="translate(24, 80)">
      <rect x="0" y="0" width="1032" height="40" fill="#0f172a" rx="4"/>
      <rect x="0" y="0" width="516" height="40" fill="#22c55e"/>
      <text x="258" y="26" font-size="14" font-weight="800" fill="#052e16" text-anchor="middle">리노 50%+</text>
      <rect x="516" y="0" width="207" height="40" fill="#f59e0b"/>
      <text x="620" y="26" font-size="12" font-weight="700" fill="#78350f" text-anchor="middle">Yokowo 20%</text>
      <rect x="723" y="0" width="155" height="40" fill="#ef4444"/>
      <text x="800" y="26" font-size="12" font-weight="700" fill="#450a0a" text-anchor="middle">Smiths 15%</text>
      <rect x="878" y="0" width="77" height="40" fill="#60a5fa"/>
      <text x="916" y="26" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">Fein 7.5%</text>
      <rect x="955" y="0" width="77" height="40" fill="#64748b"/>
      <text x="993" y="26" font-size="10" font-weight="700" fill="#0f172a" text-anchor="middle">기타 7.5%</text>
    </g>

    <text x="24" y="138" font-size="11" fill="#94a3b8" font-style="italic">이 점유율은 AI·HBM 세그먼트에서 더 높다 (추정 60~70%). 고성장 분야에서 격차 확대.</text>
  </g>
</svg>
