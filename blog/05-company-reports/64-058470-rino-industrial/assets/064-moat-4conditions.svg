<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>10년 영업이익률 40%+를 지탱한 4가지 구조 조건</title>
  <desc>소모품화 + 재인증 비용 + 저판관비 + 저자본집약도</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">48% 마진을 지탱하는 4가지 교차 조건</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">4가지를 동시에 만족하는 반도체 회사는 극히 드물다 — "작은 회사의 큰 마진"</text>

  <!-- 2x2 grid -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="540" height="240" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="12"/>
    <circle cx="40" cy="40" r="18" fill="#fbbf24"/>
    <text x="40" y="47" font-size="20" font-weight="800" fill="#78350f" text-anchor="middle">1</text>
    <text x="76" y="48" font-size="20" font-weight="800" fill="#fde68a">소모품화 — 10,000회 교체</text>

    <text x="24" y="96" font-size="13" fill="#cbd5e1">포고핀은 쓰면 닳는다 · 10,000회 접촉 후 교체 필수</text>
    <text x="24" y="116" font-size="13" fill="#cbd5e1">→ <tspan font-weight="800" fill="#fde68a">기존 라인 돌리는 한 지속 주문</tspan></text>

    <rect x="24" y="140" width="492" height="80" fill="#0f172a" rx="6"/>
    <text x="40" y="164" font-size="12" font-weight="700" fill="#86efac">장비(한미 TC 본더) vs 소모품(리노 포고핀)</text>
    <text x="40" y="184" font-size="11" fill="#cbd5e1">장비: 5~10년 사용 · 투자 사이클 직결 · 2023 매출 -51%</text>
    <text x="40" y="204" font-size="11" fill="#cbd5e1">소모품: 즉시 교체 · 유지보수 직결 · 2024 매출 -24%</text>
  </g>

  <g transform="translate(620, 160)">
    <rect x="0" y="0" width="520" height="240" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" rx="12"/>
    <circle cx="40" cy="40" r="18" fill="#22c55e"/>
    <text x="40" y="47" font-size="20" font-weight="800" fill="#052e16" text-anchor="middle">2</text>
    <text x="76" y="48" font-size="20" font-weight="800" fill="#86efac">재인증 비용의 비대칭</text>

    <text x="24" y="96" font-size="13" fill="#cbd5e1">공급사 교체 → 재인증 <tspan font-weight="800" fill="#fde68a">$100K~500K / 칩 모델</tspan></text>
    <text x="24" y="116" font-size="13" fill="#cbd5e1">+ 인증 기간 <tspan font-weight="800" fill="#fde68a">3~6개월</tspan> + 출시 지연 리스크</text>

    <rect x="24" y="140" width="472" height="80" fill="#0f172a" rx="6"/>
    <text x="40" y="164" font-size="12" font-weight="700" fill="#fde68a">한 번 승인된 공급사 = 그 칩 모델의 생명주기 동안 독점</text>
    <text x="40" y="184" font-size="11" fill="#cbd5e1">2015~2020년 리노 진입 고객 모델 → 지금도 리노를 씀</text>
    <text x="40" y="204" font-size="11" fill="#cbd5e1">이게 "승인된 공급사 독점" — 10년 마진 안정성의 원천</text>
  </g>

  <g transform="translate(60, 420)">
    <rect x="0" y="0" width="540" height="260" fill="#1e293b" stroke="#c084fc" stroke-width="2.5" rx="12"/>
    <circle cx="40" cy="40" r="18" fill="#c084fc"/>
    <text x="40" y="47" font-size="20" font-weight="800" fill="#1e1b4b" text-anchor="middle">3</text>
    <text x="76" y="48" font-size="20" font-weight="800" fill="#e9d5ff">판관비 극저수준</text>

    <g transform="translate(24, 76)">
      <rect x="0" y="0" width="492" height="104" fill="#0f172a" rx="6"/>
      <text x="20" y="26" font-size="13" font-weight="700" fill="#fbbf24">리노공업 (2025)</text>
      <text x="20" y="52" font-size="13" fill="#cbd5e1">매출 3,725억 → 판관비 174억 = <tspan font-weight="800" fill="#fde68a">4.7%</tspan></text>
      <text x="20" y="76" font-size="12" fill="#94a3b8">R&amp;D 3~4% · 본사 1곳 · 가족경영</text>
      <text x="20" y="94" font-size="11" fill="#86efac">→ 매출총이익 52% - 4.7% = 영업이익 48.3%</text>
    </g>

    <g transform="translate(24, 192)">
      <rect x="0" y="0" width="492" height="54" fill="#0f172a" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#cbd5e1">업계 평균 판관비 비중</text>
      <text x="20" y="44" font-size="11" fill="#94a3b8">대기업 반도체 장비사: 8~15% · 중견사: 6~10%</text>
    </g>
  </g>

  <g transform="translate(620, 420)">
    <rect x="0" y="0" width="520" height="260" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5" rx="12"/>
    <circle cx="40" cy="40" r="18" fill="#60a5fa"/>
    <text x="40" y="47" font-size="20" font-weight="800" fill="#1e3a8a" text-anchor="middle">4</text>
    <text x="76" y="48" font-size="20" font-weight="800" fill="#dbeafe">자본 집약도 낮음</text>

    <g transform="translate(24, 76)">
      <rect x="0" y="0" width="472" height="80" fill="#0f172a" rx="6"/>
      <text x="20" y="26" font-size="13" font-weight="700" fill="#93c5fd">유형자산 / 매출 비율</text>
      <text x="20" y="50" font-size="16" font-weight="800" fill="#dbeafe">리노 40% vs 한미 60%</text>
      <text x="20" y="70" font-size="11" fill="#94a3b8">CNC 선반·도금 → 장비 제조보다 자본투자 적음</text>
    </g>

    <g transform="translate(24, 168)">
      <rect x="0" y="0" width="472" height="80" fill="#0f172a" rx="6"/>
      <text x="20" y="26" font-size="13" font-weight="700" fill="#fde68a">2024→2025 한계이익률 54.8%</text>
      <text x="20" y="50" font-size="11" fill="#cbd5e1">매출 +1,777억 중 매출총이익 +974억 전환</text>
      <text x="20" y="70" font-size="11" fill="#cbd5e1">→ 성장할 때 영업이익이 강하게 붙는 레버리지</text>
    </g>
  </g>
</svg>
