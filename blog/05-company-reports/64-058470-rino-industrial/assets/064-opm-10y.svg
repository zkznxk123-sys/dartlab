<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>리노공업 10년 영업이익률 궤적 — 한미반도체(#63)과의 대조</title>
  <desc>리노는 10년간 영업이익률 30% 아래로 한 번도 떨어지지 않은 꾸준형, 한미는 사이클 폭주형</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">10년간 영업이익률이 30% 아래로 내려간 적 없다</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">리노공업 꾸준형 vs 한미반도체(#63) 폭주형 — 같은 반도체 상류 독점, 다른 변동성</text>

  <!-- Chart area -->
  <g transform="translate(80, 160)">
    <!-- Axes -->
    <line x1="60" y1="400" x2="1060" y2="400" stroke="#334155" stroke-width="1.5"/>
    <line x1="60" y1="0" x2="60" y2="400" stroke="#334155" stroke-width="1.5"/>

    <!-- Y-axis labels (0% to 60%) -->
    <text x="50" y="405" font-size="11" fill="#64748b" text-anchor="end">0</text>
    <line x1="55" y1="400" x2="60" y2="400" stroke="#334155"/>
    <text x="50" y="338" font-size="11" fill="#64748b" text-anchor="end">10</text>
    <line x1="55" y1="333" x2="1060" y2="333" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4"/>
    <text x="50" y="272" font-size="11" fill="#64748b" text-anchor="end">20</text>
    <line x1="55" y1="267" x2="1060" y2="267" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4"/>
    <text x="50" y="205" font-size="11" fill="#94a3b8" text-anchor="end">30%</text>
    <line x1="55" y1="200" x2="1060" y2="200" stroke="#475569" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="1050" y="195" font-size="10" fill="#fbbf24" text-anchor="end" font-style="italic">리노 방어선 30%</text>
    <text x="50" y="138" font-size="11" fill="#64748b" text-anchor="end">40</text>
    <line x1="55" y1="133" x2="1060" y2="133" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4"/>
    <text x="50" y="72" font-size="11" fill="#64748b" text-anchor="end">50</text>
    <line x1="55" y1="67" x2="1060" y2="67" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 4"/>

    <!-- X-axis years -->
    <text x="90" y="420" font-size="11" fill="#64748b" text-anchor="middle">2016</text>
    <text x="190" y="420" font-size="11" fill="#64748b" text-anchor="middle">2017</text>
    <text x="290" y="420" font-size="11" fill="#64748b" text-anchor="middle">2018</text>
    <text x="390" y="420" font-size="11" fill="#64748b" text-anchor="middle">2019</text>
    <text x="490" y="420" font-size="11" fill="#64748b" text-anchor="middle">2020</text>
    <text x="590" y="420" font-size="11" fill="#64748b" text-anchor="middle">2021</text>
    <text x="690" y="420" font-size="11" fill="#64748b" text-anchor="middle">2022</text>
    <text x="790" y="420" font-size="11" fill="#fca5a5" text-anchor="middle" font-weight="700">2023</text>
    <text x="890" y="420" font-size="11" fill="#64748b" text-anchor="middle">2024</text>
    <text x="990" y="420" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="700">2025</text>

    <!-- Rino line (꾸준형) — 영업이익률 값 -->
    <!-- 2016:34.8, 2017:34.8, 2018:34.0, 2019:37.6, 2020:38.7, 2021:41.8, 2022:42.4, 2023:44.8, 2024:44.8, 2025:48.3 -->
    <!-- Y = 400 - (val * 400/60) -->
    <!-- 34.8: 400-232=168, 34.8:168, 34.0:173, 37.6:149, 38.7:142, 41.8:121, 42.4:117, 44.8:101, 44.8:101, 48.3:78 -->
    <path d="M 90 168 L 190 168 L 290 173 L 390 149 L 490 142 L 590 121 L 690 117 L 790 101 L 890 101 L 990 78"
      stroke="#22c55e" stroke-width="3" fill="none"/>

    <!-- Rino points -->
    <g fill="#22c55e">
      <circle cx="90" cy="168" r="5"/>
      <circle cx="190" cy="168" r="5"/>
      <circle cx="290" cy="173" r="5"/>
      <circle cx="390" cy="149" r="5"/>
      <circle cx="490" cy="142" r="5"/>
      <circle cx="590" cy="121" r="5"/>
      <circle cx="690" cy="117" r="5"/>
      <circle cx="790" cy="101" r="5"/>
      <circle cx="890" cy="101" r="5"/>
      <circle cx="990" cy="78" r="7" stroke="#fbbf24" stroke-width="2"/>
    </g>

    <!-- Rino 값 labels -->
    <text x="90" y="158" font-size="10" fill="#86efac" text-anchor="middle">34.8</text>
    <text x="490" y="132" font-size="10" fill="#86efac" text-anchor="middle">38.7</text>
    <text x="690" y="107" font-size="10" fill="#86efac" text-anchor="middle">42.4</text>
    <text x="990" y="68" font-size="12" font-weight="800" fill="#fde68a" text-anchor="middle">48.3★</text>

    <!-- Hanmi line (폭주형) — 2016:?, 데이터 없음 가정, 2020:?, 2021:?, 2022:34.2, 2023:21.8 (바닥!), 2024:45.7, 2025:43.6 -->
    <!-- 2022:34.2:172, 2023:21.8:255, 2024:45.7:95, 2025:43.6:109 -->
    <path d="M 690 172 L 790 255 L 890 95 L 990 109"
      stroke="#ef4444" stroke-width="3" fill="none" stroke-dasharray="6 3"/>

    <g fill="#ef4444">
      <circle cx="690" cy="172" r="5"/>
      <circle cx="790" cy="255" r="6" stroke="#fca5a5" stroke-width="2"/>
      <circle cx="890" cy="95" r="6" stroke="#fca5a5" stroke-width="2"/>
      <circle cx="990" cy="109" r="5"/>
    </g>

    <text x="790" y="275" font-size="11" font-weight="700" fill="#fca5a5" text-anchor="middle">21.8% ↓</text>
    <text x="790" y="288" font-size="9" fill="#fca5a5" text-anchor="middle">한미 바닥</text>
    <text x="890" y="80" font-size="11" font-weight="700" fill="#fca5a5" text-anchor="middle">45.7% ↑</text>

    <!-- Legend -->
    <g transform="translate(100, 20)">
      <rect x="0" y="0" width="300" height="70" fill="#0f172a" stroke="#334155" rx="6"/>
      <line x1="10" y1="22" x2="30" y2="22" stroke="#22c55e" stroke-width="3"/>
      <circle cx="20" cy="22" r="4" fill="#22c55e"/>
      <text x="40" y="26" font-size="12" fill="#86efac">리노공업 (058470) — 꾸준형</text>
      <line x1="10" y1="48" x2="30" y2="48" stroke="#ef4444" stroke-width="3" stroke-dasharray="6 3"/>
      <circle cx="20" cy="48" r="4" fill="#ef4444"/>
      <text x="40" y="52" font-size="12" fill="#fca5a5">한미반도체 (042700) — 폭주형</text>
    </g>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(60, 610)">
    <rect x="0" y="0" width="1080" height="88" fill="#1e293b" rx="10"/>
    <text x="24" y="32" font-size="15" font-weight="700" fill="#fbbf24">핵심 — 리노 영업이익률 범위 34.0~48.3%(14.3%p) · 한미 21.8~45.7%(23.9%p)</text>
    <text x="24" y="56" font-size="12" fill="#cbd5e1">리노는 10년간 30% 방어선을 한 번도 넘지 않았다. 한미는 2023년 21.8%까지 내려갔다가 2024년 45.7%로 다시 올라왔다.</text>
    <text x="24" y="74" font-size="12" fill="#cbd5e1">차이의 원천: 한미는 장비(5~10년 내구) 주문 0→폭주, 리노는 소모품(10,000회 후 교체) 지속 재구매.</text>
  </g>
</svg>
