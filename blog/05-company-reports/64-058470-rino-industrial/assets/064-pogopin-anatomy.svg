<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>포고핀 1개의 해부 — 길이 5mm · 지름 0.1mm</title>
  <desc>스프링 내장 금속 핀이 칩 표면과 10,000회 반복 접촉</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">길이 5mm 금속 핀이 10,000번 접촉한다</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">포고핀 1개의 5가지 기술 요건 — 탄성·저항·고주파·수명·피치</text>

  <!-- Left: enlarged pogo pin cross-section -->
  <g transform="translate(80, 150)">
    <rect x="0" y="0" width="420" height="470" fill="#1e293b" rx="10"/>
    <text x="210" y="36" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">포고핀 단면 (약 50배 확대)</text>

    <!-- Main pogo pin body - horizontal -->
    <!-- Total length ~5mm represented as 340px wide -->
    <g transform="translate(40, 240)">
      <!-- Top plunger (contact tip) -->
      <polygon points="0,-15 30,-15 45,-5 45,5 30,15 0,15" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="22" y="-25" font-size="10" font-weight="700" fill="#fde68a" text-anchor="middle">접촉 팁</text>
      <text x="22" y="32" font-size="9" fill="#fde68a" text-anchor="middle">금도금</text>

      <!-- Barrel (cylindrical housing) -->
      <rect x="45" y="-12" width="260" height="24" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
      <text x="175" y="-20" font-size="10" font-weight="600" fill="#cbd5e1" text-anchor="middle">배럴 (구리합금 하우징)</text>

      <!-- Spring (coils inside) -->
      <g transform="translate(80, 0)" stroke="#ef4444" stroke-width="1.8" fill="none">
        <path d="M 0 -8 Q 8 0 0 8 Q -8 16 0 24" transform="translate(0,-8)"/>
        <path d="M 10 -8 Q 18 0 10 8 Q 2 16 10 24" transform="translate(0,-8)"/>
        <path d="M 20 -8 Q 28 0 20 8 Q 12 16 20 24" transform="translate(0,-8)"/>
        <path d="M 30 -8 Q 38 0 30 8 Q 22 16 30 24" transform="translate(0,-8)"/>
        <path d="M 40 -8 Q 48 0 40 8 Q 32 16 40 24" transform="translate(0,-8)"/>
        <path d="M 50 -8 Q 58 0 50 8 Q 42 16 50 24" transform="translate(0,-8)"/>
        <path d="M 60 -8 Q 68 0 60 8 Q 52 16 60 24" transform="translate(0,-8)"/>
        <path d="M 70 -8 Q 78 0 70 8 Q 62 16 70 24" transform="translate(0,-8)"/>
        <path d="M 80 -8 Q 88 0 80 8 Q 72 16 80 24" transform="translate(0,-8)"/>
        <path d="M 90 -8 Q 98 0 90 8 Q 82 16 90 24" transform="translate(0,-8)"/>
        <path d="M 100 -8 Q 108 0 100 8 Q 92 16 100 24" transform="translate(0,-8)"/>
        <path d="M 110 -8 Q 118 0 110 8 Q 102 16 110 24" transform="translate(0,-8)"/>
      </g>
      <text x="175" y="30" font-size="9" fill="#fca5a5" text-anchor="middle">내부 스프링 (길이 2~3mm · 탄성 ±1%)</text>

      <!-- Bottom plunger -->
      <polygon points="305,-15 335,-15 335,15 305,15 290,5 290,-5" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="320" y="-25" font-size="10" font-weight="700" fill="#fde68a" text-anchor="middle">반대 팁</text>
      <text x="320" y="32" font-size="9" fill="#fde68a" text-anchor="middle">장비 연결</text>
    </g>

    <!-- Dimensions -->
    <g transform="translate(40, 310)">
      <line x1="0" y1="0" x2="340" y2="0" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2 2"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#fbbf24" stroke-width="1"/>
      <line x1="340" y1="-5" x2="340" y2="5" stroke="#fbbf24" stroke-width="1"/>
      <text x="170" y="20" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">전체 길이 5mm</text>
    </g>

    <!-- Dimension: diameter -->
    <g transform="translate(400, 228)">
      <line x1="-20" y1="0" x2="10" y2="0" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2 2"/>
      <line x1="-20" y1="12" x2="10" y2="12" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2 2"/>
      <text x="5" y="9" font-size="11" fill="#fbbf24">지름 0.1~0.5mm</text>
    </g>

    <!-- Scale reference -->
    <g transform="translate(30, 430)">
      <rect x="0" y="0" width="360" height="20" fill="#0f172a" rx="4"/>
      <text x="180" y="14" font-size="11" fill="#94a3b8" text-anchor="middle">비교 — 인간 머리카락 지름 약 0.08mm (포고핀 팁과 비슷)</text>
    </g>
  </g>

  <!-- Right: 5 technical requirements -->
  <g transform="translate(540, 150)">
    <rect x="0" y="0" width="600" height="470" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="18" font-weight="700" fill="#fbbf24">5가지 기술 요건 — 동시 만족 필수</text>

    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="560" height="74" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" rx="6"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#93c5fd">① 탄성 반복 정밀도</text>
      <text x="550" y="28" font-size="15" font-weight="800" fill="#fde68a" text-anchor="end">±1% 이내</text>
      <text x="20" y="52" font-size="11" fill="#cbd5e1">칩 표면 누르는 힘 0.5~1N · 10,000회 반복 후에도 동일</text>
      <text x="20" y="68" font-size="10" fill="#94a3b8">약하면 접촉 불량, 세면 칩 파손</text>
    </g>

    <g transform="translate(20, 144)">
      <rect x="0" y="0" width="560" height="60" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" rx="6"/>
      <text x="20" y="26" font-size="13" font-weight="700" fill="#86efac">② 접촉 저항 안정성</text>
      <text x="550" y="26" font-size="15" font-weight="800" fill="#fde68a" text-anchor="end">0.5옴 이하</text>
      <text x="20" y="48" font-size="11" fill="#cbd5e1">금·팔라듐·로듐 코팅 · 10,000회 후 저항 증가 5% 이하</text>
    </g>

    <g transform="translate(20, 214)">
      <rect x="0" y="0" width="560" height="60" fill="#0f172a" stroke="#c084fc" stroke-width="1.5" rx="6"/>
      <text x="20" y="26" font-size="13" font-weight="700" fill="#e9d5ff">③ 고주파 특성</text>
      <text x="550" y="26" font-size="15" font-weight="800" fill="#fde68a" text-anchor="end">수십 GHz</text>
      <text x="20" y="48" font-size="11" fill="#cbd5e1">AI GPU·5G 모뎀 · 인덕턴스·임피던스 최소화 설계</text>
    </g>

    <g transform="translate(20, 284)">
      <rect x="0" y="0" width="560" height="60" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" rx="6"/>
      <text x="20" y="26" font-size="13" font-weight="700" fill="#fca5a5">④ 수명 — 10,000회 접촉</text>
      <text x="550" y="26" font-size="15" font-weight="800" fill="#fde68a" text-anchor="end">소모품</text>
      <text x="20" y="48" font-size="11" fill="#cbd5e1">마모·오염 시 교체 필수 · 이게 바로 "소모품 독점"의 핵심</text>
    </g>

    <g transform="translate(20, 354)">
      <rect x="0" y="0" width="560" height="60" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
      <text x="20" y="26" font-size="13" font-weight="700" fill="#fde68a">⑤ 피치(간격) 정밀도</text>
      <text x="550" y="26" font-size="15" font-weight="800" fill="#fde68a" text-anchor="end">0.2~0.3mm</text>
      <text x="20" y="48" font-size="11" fill="#cbd5e1">최신 AI 칩 접촉점 간격 · 수백 핀이 전기적 간섭 없이 개별 작동</text>
    </g>

    <text x="300" y="440" font-size="12" fill="#fbbf24" text-anchor="middle" font-style="italic">이 5가지를 동시에 맞추는 회사가 전 세계 3~4곳뿐 — 리노가 그 중 글로벌 매출 1위</text>
  </g>
</svg>
