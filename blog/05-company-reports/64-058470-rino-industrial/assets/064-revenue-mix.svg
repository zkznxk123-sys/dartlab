<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2025 매출 3,725억 구성</title>
  <desc>포고핀 60% + IC 테스트 소켓 35% + 기타 5%</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출 3,725억 = 포고핀 60% + 소켓 35%</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">제품군 2개 · 고객 10개+ · 지역 4개 — 한미(2사 75%)보다 훨씬 분산</text>

  <!-- Left: Donut chart -->
  <g transform="translate(280, 370)">
    <!-- Segments: 포고핀 60% (216°), IC소켓 35% (126°), 기타 5% (18°) -->
    <!-- Circumference = 2*pi*140 = 879.6 -->
    <!-- 60%: 527.8, 35%: 307.9, 5%: 44.0 -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#fbbf24" stroke-width="60" stroke-dasharray="527.8 879" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#22c55e" stroke-width="60" stroke-dasharray="307.9 879" stroke-dashoffset="-527.8" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#60a5fa" stroke-width="60" stroke-dasharray="44.0 879" stroke-dashoffset="-835.7" transform="rotate(-90)"/>

    <text x="0" y="-8" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">2025 매출</text>
    <text x="0" y="22" font-size="32" font-weight="800" fill="#fbbf24" text-anchor="middle">3,725억</text>
    <text x="0" y="46" font-size="12" fill="#94a3b8" text-anchor="middle">+91% vs 2024</text>
  </g>

  <!-- Right: Product + region -->
  <g transform="translate(560, 150)">
    <rect x="0" y="0" width="580" height="230" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="17" font-weight="700" fill="#fbbf24">제품별 (2025 추정)</text>

    <g transform="translate(20, 56)">
      <rect x="0" y="0" width="540" height="42" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="6"/>
      <circle cx="18" cy="21" r="8" fill="#fbbf24"/>
      <text x="38" y="26" font-size="14" font-weight="800" fill="#fde68a">포고핀 단품</text>
      <text x="340" y="26" font-size="13" fill="#cbd5e1">삼성·SK·엔비디아·AMD</text>
      <text x="530" y="26" font-size="16" font-weight="800" fill="#fde68a" text-anchor="end">60% · 2,235억</text>
    </g>

    <g transform="translate(20, 108)">
      <rect x="0" y="0" width="540" height="42" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="6"/>
      <circle cx="18" cy="21" r="8" fill="#22c55e"/>
      <text x="38" y="26" font-size="14" font-weight="800" fill="#86efac">IC 테스트 소켓</text>
      <text x="340" y="26" font-size="13" fill="#cbd5e1">인텔·퀄컴·미디어텍·MTK</text>
      <text x="530" y="26" font-size="16" font-weight="800" fill="#fde68a" text-anchor="end">35% · 1,304억</text>
    </g>

    <g transform="translate(20, 160)">
      <rect x="0" y="0" width="540" height="42" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" rx="6"/>
      <circle cx="18" cy="21" r="7" fill="#60a5fa"/>
      <text x="38" y="26" font-size="13" font-weight="700" fill="#93c5fd">기타 정밀부품</text>
      <text x="340" y="26" font-size="12" fill="#cbd5e1">OSAT·연구소</text>
      <text x="530" y="26" font-size="14" font-weight="700" fill="#dbeafe" text-anchor="end">5% · 186억</text>
    </g>
  </g>

  <!-- Region breakdown -->
  <g transform="translate(560, 400)">
    <rect x="0" y="0" width="580" height="240" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="17" font-weight="700" fill="#fbbf24">지역별 (해외 65%+)</text>

    <g transform="translate(20, 56)">
      <rect x="0" y="0" width="540" height="34" fill="#0f172a" stroke="#c084fc" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#e9d5ff">한국 (삼성·SK·앰코)</text>
      <text x="530" y="22" font-size="14" font-weight="800" fill="#fde68a" text-anchor="end">30~35%</text>
    </g>

    <g transform="translate(20, 100)">
      <rect x="0" y="0" width="540" height="34" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#fca5a5">미국 (인텔·퀄컴·엔비디아·AMD·브로드컴·애플)</text>
      <text x="530" y="22" font-size="14" font-weight="800" fill="#fde68a" text-anchor="end">30~35%</text>
    </g>

    <g transform="translate(20, 144)">
      <rect x="0" y="0" width="540" height="34" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#86efac">대만 (TSMC·MTK·ASE·SPIL)</text>
      <text x="530" y="22" font-size="14" font-weight="800" fill="#fde68a" text-anchor="end">15~20%</text>
    </g>

    <g transform="translate(20, 188)">
      <rect x="0" y="0" width="540" height="34" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#fde68a">일본·기타</text>
      <text x="530" y="22" font-size="14" font-weight="800" fill="#fde68a" text-anchor="end">15~20%</text>
    </g>
  </g>

  <!-- Bottom: Hanmi comparison -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="1080" height="60" fill="#0f172a" stroke="#334155" rx="8"/>
    <text x="24" y="32" font-size="13" font-weight="700" fill="#fbbf24">한미반도체(#63) 대비 — 고객 집중도 결정적 차이</text>
    <text x="24" y="52" font-size="11" fill="#cbd5e1">한미: SK하이닉스·마이크론 2사 75%+ | 리노: 상위 3사도 40% 내외, 10개+ 고객에 분산</text>
  </g>
</svg>
