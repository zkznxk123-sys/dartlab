<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>리노공업 48년 타임라인</title>
  <desc>1978 창업 → 2001 KOSDAQ 상장 → 2025 시총 4조</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">부산 강서구 기계공장 48년의 복리</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">1978 이채윤 창업 → 2001 KOSDAQ 상장 → 2016 글로벌 진입 → 2025 시총 4조</text>

  <line x1="120" y1="380" x2="1140" y2="380" stroke="#334155" stroke-width="3"/>

  <rect x="120" y="210" width="240" height="340" fill="#1e293b" opacity="0.4" rx="8"/>
  <rect x="360" y="210" width="300" height="340" fill="#1e293b" opacity="0.4" rx="8"/>
  <rect x="660" y="210" width="320" height="340" fill="#1e293b" opacity="0.4" rx="8"/>
  <rect x="980" y="210" width="160" height="340" fill="#1e293b" opacity="0.4" rx="8"/>

  <text x="240" y="240" font-size="16" font-weight="700" fill="#64748b" text-anchor="middle">Phase 1 · 1978~2000</text>
  <text x="240" y="260" font-size="13" fill="#94a3b8" text-anchor="middle">부산 기계공장 → 반도체 부품 전환</text>

  <text x="510" y="240" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">Phase 2 · 2001~2015</text>
  <text x="510" y="260" font-size="13" fill="#fde68a" text-anchor="middle">KOSDAQ 상장 · 국내 대기업 납품</text>

  <text x="820" y="240" font-size="16" font-weight="700" fill="#c084fc" text-anchor="middle">Phase 3 · 2016~2023</text>
  <text x="820" y="260" font-size="13" fill="#e9d5ff" text-anchor="middle">글로벌 설계사 진입 · 매출 3배</text>

  <text x="1060" y="240" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">Phase 4 · 2024~</text>
  <text x="1060" y="260" font-size="13" fill="#86efac" text-anchor="middle">AI 수혜 · 사상 최대</text>

  <!-- 1978 -->
  <circle cx="180" cy="380" r="10" fill="#64748b"/>
  <line x1="180" y1="380" x2="180" y2="300" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="180" y="290" font-size="14" font-weight="700" fill="#cbd5e1" text-anchor="middle">1978</text>
  <text x="180" y="420" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">창업</text>
  <text x="180" y="438" font-size="10" fill="#94a3b8" text-anchor="middle">이채윤 (33세)</text>
  <text x="180" y="452" font-size="10" fill="#94a3b8" text-anchor="middle">부산 강서구</text>

  <!-- 1985 -->
  <circle cx="300" cy="380" r="7" fill="#64748b"/>
  <text x="300" y="310" font-size="13" font-weight="700" fill="#cbd5e1" text-anchor="middle">~1990s</text>
  <line x1="300" y1="380" x2="300" y2="320" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="300" y="420" font-size="11" fill="#94a3b8" text-anchor="middle">포고핀</text>
  <text x="300" y="435" font-size="11" fill="#94a3b8" text-anchor="middle">국산화 도전</text>

  <!-- 1997 법인 재설립 -->
  <circle cx="420" cy="380" r="10" fill="#fbbf24"/>
  <line x1="420" y1="380" x2="420" y2="300" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="420" y="290" font-size="14" font-weight="700" fill="#fde68a" text-anchor="middle">1997</text>
  <text x="420" y="420" font-size="12" font-weight="600" fill="#fde68a" text-anchor="middle">법인 재설립</text>
  <text x="420" y="438" font-size="10" fill="#94a3b8" text-anchor="middle">IMF 한복판</text>
  <text x="420" y="452" font-size="10" fill="#94a3b8" text-anchor="middle">(주)리노공업</text>

  <!-- 2001 상장 -->
  <circle cx="520" cy="380" r="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <line x1="520" y1="380" x2="520" y2="300" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="520" y="290" font-size="15" font-weight="800" fill="#fbbf24" text-anchor="middle">2001 ★</text>
  <text x="520" y="420" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">KOSDAQ 상장</text>
  <text x="520" y="438" font-size="11" fill="#fde68a" text-anchor="middle">시총 400억</text>
  <text x="520" y="454" font-size="10" fill="#94a3b8" text-anchor="middle">공장 확장</text>

  <!-- 2016 글로벌 진입 -->
  <circle cx="720" cy="380" r="12" fill="#c084fc" stroke="#a855f7" stroke-width="2"/>
  <line x1="720" y1="380" x2="720" y2="300" stroke="#c084fc" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="720" y="290" font-size="15" font-weight="800" fill="#c084fc" text-anchor="middle">2016 ★</text>
  <text x="720" y="420" font-size="13" font-weight="700" fill="#e9d5ff" text-anchor="middle">퀄컴 5G 모뎀</text>
  <text x="720" y="438" font-size="12" fill="#e9d5ff" text-anchor="middle">첫 진입</text>
  <text x="720" y="454" font-size="10" fill="#94a3b8" text-anchor="middle">매출 1,128억</text>

  <!-- 2020 이선진 대표 -->
  <circle cx="860" cy="380" r="9" fill="#c084fc"/>
  <line x1="860" y1="380" x2="860" y2="320" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="860" y="310" font-size="14" font-weight="700" fill="#e9d5ff" text-anchor="middle">2020</text>
  <text x="860" y="420" font-size="11" fill="#94a3b8" text-anchor="middle">이선진</text>
  <text x="860" y="435" font-size="11" fill="#94a3b8" text-anchor="middle">대표 취임</text>

  <!-- 2022 사상 첫 3천억 -->
  <circle cx="950" cy="380" r="9" fill="#c084fc"/>
  <text x="950" y="460" font-size="13" font-weight="700" fill="#e9d5ff" text-anchor="middle">2022</text>
  <line x1="950" y1="380" x2="950" y2="460" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="950" y="480" font-size="12" fill="#e9d5ff" text-anchor="middle">매출 3,224억</text>
  <text x="950" y="495" font-size="10" fill="#94a3b8" text-anchor="middle">사상 첫 3천억</text>

  <!-- 2025 피크 -->
  <circle cx="1060" cy="380" r="14" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <line x1="1060" y1="380" x2="1060" y2="290" stroke="#22c55e" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="1060" y="280" font-size="15" font-weight="800" fill="#22c55e" text-anchor="middle">2025 ★</text>
  <text x="1060" y="420" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">사상 최대</text>
  <text x="1060" y="438" font-size="12" fill="#d1fae5" text-anchor="middle">매출 3,725억</text>
  <text x="1060" y="454" font-size="12" fill="#d1fae5" text-anchor="middle">이익률 48.3%</text>
  <text x="1060" y="470" font-size="11" fill="#fbbf24" text-anchor="middle">시총 4조</text>

  <g transform="translate(60, 610)">
    <rect x="0" y="0" width="1080" height="95" fill="#1e293b" rx="10"/>
    <text x="24" y="34" font-size="16" font-weight="700" fill="#fbbf24">핵심 — 48년 단일 창업자 · 가족경영 · 본사 이전 없음</text>
    <text x="24" y="60" font-size="13" fill="#cbd5e1">이채윤 회장(80세)이 1978년부터 현재까지 48년 단일 최대주주. 본사는 부산 강서구 지사동 한 곳.</text>
    <text x="24" y="80" font-size="13" fill="#cbd5e1">"분기 실적보다 10년을 생각한다"는 기업문화가 영업이익률 40%+의 근본 원천.</text>
  </g>
</svg>
