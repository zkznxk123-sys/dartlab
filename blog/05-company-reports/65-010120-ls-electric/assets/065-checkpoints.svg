<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>2026~2028 LS ELECTRIC 관찰 5가지</title>
  <desc>영업이익률 10%·텍사스 6천억·자동화 25%·수주잔고 6조·순이익 3천억</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2026~2028 관찰 5가지 — 두 자릿수 진입 시험대</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">영업이익률 10% 진입 · 미국 매출 · 자동화 비중 · 수주잔고 · 순이익 복원</text>

  <!-- 3 top cards + 2 bottom -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="340" height="240" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#fbbf24"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#78350f" text-anchor="middle">1</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#fde68a">영업이익률 10% 진입</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">2025 <tspan font-weight="800" fill="#fde68a">8.6% 플라토</tspan></text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">3분기 연속 10% 돌파 여부</text>

    <rect x="24" y="130" width="292" height="90" fill="#0f172a" rx="6"/>
    <text x="40" y="152" font-size="11" font-weight="700" fill="#86efac">진입 성공 시</text>
    <text x="40" y="170" font-size="11" fill="#d1fae5">글로벌 3사 추격 경로 확정</text>
    <text x="40" y="194" font-size="11" font-weight="700" fill="#fca5a5">8~9% 고착 시</text>
    <text x="40" y="212" font-size="11" fill="#fecaca">PER 32배 재평가 조정</text>
  </g>

  <g transform="translate(430, 150)">
    <rect x="0" y="0" width="340" height="240" fill="#1e293b" stroke="#ef4444" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#ef4444"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#450a0a" text-anchor="middle">2</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#fca5a5">미국 텍사스 공장 6,000억+</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">2024년 약 3,000억 → 2026년 6,000억</text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">IRA 세액공제 <tspan font-weight="800" fill="#fde68a">30%</tspan> 수혜</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="292" height="90" fill="#0f172a" rx="6"/>
      <text x="146" y="24" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">미국 매출 비중 전망</text>
      <line x1="20" y1="64" x2="272" y2="64" stroke="#334155"/>
      <circle cx="40" cy="64" r="5" fill="#94a3b8"/>
      <text x="40" y="56" font-size="10" fill="#94a3b8" text-anchor="middle">2024</text>
      <text x="40" y="82" font-size="10" fill="#94a3b8" text-anchor="middle">약 15%</text>
      <circle cx="252" cy="44" r="7" fill="#22c55e"/>
      <text x="252" y="36" font-size="10" font-weight="700" fill="#86efac" text-anchor="middle">2026</text>
      <text x="252" y="82" font-size="10" fill="#94a3b8" text-anchor="middle">30%</text>
    </g>
  </g>

  <g transform="translate(800, 150)">
    <rect x="0" y="0" width="340" height="240" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#22c55e"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#052e16" text-anchor="middle">3</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#86efac">자동화 비중 25%+</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">현재 20% · 이익률 <tspan font-weight="800" fill="#fde68a">12~15%</tspan></text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">25%+ 확대 시 전체 +1%p 기여</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="292" height="90" fill="#0f172a" rx="6"/>
      <text x="20" y="26" font-size="11" font-weight="700" fill="#fbbf24">글로벌 경쟁</text>
      <text x="20" y="48" font-size="11" fill="#d1fae5">· 미쓰비시·지멘스 중가 타겟</text>
      <text x="20" y="66" font-size="11" fill="#d1fae5">· PLC·인버터 기술력</text>
      <text x="20" y="84" font-size="10" fill="#94a3b8">K-공장 자동화 수요 → 직접 수혜</text>
    </g>
  </g>

  <!-- Bottom 2 cards -->
  <g transform="translate(220, 410)">
    <rect x="0" y="0" width="340" height="270" fill="#1e293b" stroke="#c084fc" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#c084fc"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#1e1b4b" text-anchor="middle">4</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#e9d5ff">수주잔고 6조+ 도달</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">2025 말 약 5조 → 2027 6조+</text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">매출 대비 <tspan font-weight="800" fill="#fde68a">1.2년 커버리지</tspan></text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="292" height="124" fill="#0f172a" rx="6"/>
      <text x="146" y="24" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">달성 시 의미</text>
      <text x="20" y="56" font-size="11" fill="#d1fae5">· 2028 매출 6조+ 안정 성장</text>
      <text x="20" y="78" font-size="11" fill="#d1fae5">· AI 데이터센터 수주 지속</text>
      <text x="20" y="104" font-size="11" fill="#fca5a5">미달성 시 매출 성장 둔화</text>
    </g>
  </g>

  <g transform="translate(640, 410)">
    <rect x="0" y="0" width="340" height="270" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5" rx="12"/>
    <circle cx="36" cy="38" r="16" fill="#60a5fa"/>
    <text x="36" y="44" font-size="18" font-weight="800" fill="#1e3a8a" text-anchor="middle">5</text>
    <text x="68" y="44" font-size="17" font-weight="800" fill="#dbeafe">순이익 3,000억+ 복원</text>

    <text x="24" y="90" font-size="12" fill="#cbd5e1">2024 <tspan font-weight="800" fill="#fde68a">2,422억</tspan> 피크</text>
    <text x="24" y="110" font-size="12" fill="#cbd5e1">2025 2,170억 -10% 감소</text>

    <g transform="translate(24, 130)">
      <rect x="0" y="0" width="292" height="124" fill="#0f172a" rx="6"/>
      <text x="146" y="24" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">복원 시 PER 정상화</text>
      <text x="20" y="56" font-size="11" fill="#d1fae5">3,000억 복원 → PER 32→23배</text>
      <text x="20" y="80" font-size="11" fill="#fde68a">고착 시 PER 32 조정 위험</text>
      <text x="20" y="104" font-size="11" fill="#fca5a5">금융·법인세 부담 구조적?</text>
    </g>
  </g>
</svg>
