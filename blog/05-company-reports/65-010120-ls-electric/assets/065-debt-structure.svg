<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>부채 28,154억의 구성 — 선수금·매입채무 73%</title>
  <desc>부채비율 131%가 위험 신호가 아닌 이유 — 실질 금융차입금은 자본 대비 24%에 불과</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">부채비율 131% — 위험인가, 정상인가</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">실질 금융차입금은 5,000억(자본 대비 24%) · 나머지 23,000억은 운전자본·선수금</text>

  <!-- Stacked bar for debt breakdown -->
  <g transform="translate(80, 160)">
    <text x="0" y="0" font-size="16" font-weight="700" fill="#fbbf24">부채 28,154억의 내역 (2025 추정)</text>

    <!-- Total bar -->
    <g transform="translate(0, 30)">
      <!-- 매입채무 43% = 471px / 1060 -->
      <rect x="0" y="0" width="458" height="80" fill="#22c55e"/>
      <text x="229" y="34" font-size="14" font-weight="700" fill="#052e16" text-anchor="middle">매입채무·미지급금</text>
      <text x="229" y="56" font-size="20" font-weight="800" fill="#052e16" text-anchor="middle">12,000억 (43%)</text>
      <text x="229" y="74" font-size="11" fill="#052e16" text-anchor="middle" font-style="italic">운전자본 (매입채무·미지급급여 등)</text>

      <rect x="458" y="0" width="266" height="80" fill="#3b82f6"/>
      <text x="591" y="34" font-size="13" font-weight="700" fill="#dbeafe" text-anchor="middle">선수금</text>
      <text x="591" y="56" font-size="18" font-weight="800" fill="#dbeafe" text-anchor="middle">7,000억 (25%)</text>
      <text x="591" y="74" font-size="10" fill="#dbeafe" text-anchor="middle" font-style="italic">수주 선입금</text>

      <rect x="724" y="0" width="191" height="80" fill="#ef4444"/>
      <text x="819" y="34" font-size="13" font-weight="700" fill="#fecaca" text-anchor="middle">금융차입금</text>
      <text x="819" y="56" font-size="16" font-weight="800" fill="#fecaca" text-anchor="middle">5,000억 (18%)</text>
      <text x="819" y="74" font-size="10" fill="#fecaca" text-anchor="middle" font-style="italic">단기+장기</text>

      <rect x="915" y="0" width="57" height="80" fill="#fbbf24"/>
      <text x="943" y="34" font-size="11" font-weight="700" fill="#78350f" text-anchor="middle">이연</text>
      <text x="943" y="50" font-size="12" font-weight="800" fill="#78350f" text-anchor="middle">1,500</text>
      <text x="943" y="66" font-size="9" fill="#78350f" text-anchor="middle">5%</text>

      <rect x="972" y="0" width="88" height="80" fill="#64748b"/>
      <text x="1016" y="34" font-size="11" font-weight="700" fill="#cbd5e1" text-anchor="middle">기타</text>
      <text x="1016" y="52" font-size="12" font-weight="800" fill="#cbd5e1" text-anchor="middle">2,654</text>
      <text x="1016" y="68" font-size="9" fill="#cbd5e1" text-anchor="middle">9%</text>
    </g>

    <!-- Scale label -->
    <text x="0" y="132" font-size="11" fill="#94a3b8">0</text>
    <text x="1060" y="132" font-size="11" fill="#94a3b8" text-anchor="end">28,154억</text>
  </g>

  <!-- Comparison with other posts -->
  <g transform="translate(80, 340)">
    <text x="0" y="0" font-size="16" font-weight="700" fill="#fbbf24">부채비율 비교 (2025 말)</text>

    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="1060" height="54" fill="#0f172a" stroke="#60a5fa" stroke-width="2" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#dbeafe">LS ELECTRIC (010120, #65)</text>
      <text x="16" y="42" font-size="10" fill="#94a3b8">대형 프로젝트형 · 선수금+매입채무 73%</text>
      <rect x="300" y="14" width="520" height="26" fill="#3b82f6"/>
      <text x="830" y="32" font-size="16" font-weight="800" fill="#fbbf24" text-anchor="start" dx="10">131.5%</text>
    </g>

    <g transform="translate(0, 98)">
      <rect x="0" y="0" width="1060" height="50" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#fde68a">HD현대일렉트릭 (267260, #08)</text>
      <text x="16" y="42" font-size="10" fill="#94a3b8">대형 프로젝트형 · 수주잔고 8조+</text>
      <rect x="300" y="12" width="316" height="26" fill="#f59e0b"/>
      <text x="626" y="30" font-size="14" font-weight="700" fill="#fde68a" text-anchor="start" dx="10">약 80%</text>
    </g>

    <g transform="translate(0, 156)">
      <rect x="0" y="0" width="1060" height="50" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#86efac">한미반도체 (042700, #63)</text>
      <text x="16" y="42" font-size="10" fill="#94a3b8">장비 단건 판매 · 선수금 낮음</text>
      <rect x="300" y="12" width="71" height="26" fill="#22c55e"/>
      <text x="381" y="30" font-size="14" font-weight="700" fill="#86efac" text-anchor="start" dx="10">17.8%</text>
    </g>

    <g transform="translate(0, 214)">
      <rect x="0" y="0" width="1060" height="50" fill="#0f172a" stroke="#c084fc" stroke-width="1.5" rx="4"/>
      <text x="16" y="22" font-size="13" font-weight="700" fill="#e9d5ff">리노공업 (058470, #64)</text>
      <text x="16" y="42" font-size="10" fill="#94a3b8">소모품 반복 판매 · 사실상 무차입</text>
      <rect x="300" y="12" width="33" height="26" fill="#c084fc"/>
      <text x="343" y="30" font-size="14" font-weight="700" fill="#e9d5ff" text-anchor="start" dx="10">8.3%</text>
    </g>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(80, 650)">
    <rect x="0" y="-20" width="1040" height="60" fill="#1e293b" rx="8"/>
    <text x="24" y="6" font-size="14" font-weight="700" fill="#fbbf24">결론 — 부채비율 131%는 대형 프로젝트형 제조업의 정상 패턴</text>
    <text x="24" y="28" font-size="11" fill="#cbd5e1">금융차입금 5,000억은 자본(21,413억) 대비 24% · 건전. 선수금 7,000억은 오히려 무이자 자금 조달로 유리하다.</text>
  </g>
</svg>
