<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>글로벌 전력기기 5사 매출·마진 비교</title>
  <desc>슈나이더·ABB·지멘스·미쓰비시와 LS ELECTRIC의 위치</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">글로벌 전력기기 과점 — LS는 매출 1/10, 마진 1/2</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">유럽 3사(슈나이더·ABB·지멘스) 17~18% vs LS 8.6% · 미쓰비시(7%)와 비슷한 수준</text>

  <!-- Bubble/bar chart combined -->
  <g transform="translate(80, 160)">
    <!-- Axes -->
    <line x1="80" y1="400" x2="1040" y2="400" stroke="#334155"/>
    <line x1="80" y1="0" x2="80" y2="400" stroke="#334155"/>

    <!-- X-axis (매출, 0~60조) -->
    <text x="80" y="420" font-size="10" fill="#64748b" text-anchor="middle">0</text>
    <text x="220" y="420" font-size="10" fill="#64748b" text-anchor="middle">10조</text>
    <text x="360" y="420" font-size="10" fill="#64748b" text-anchor="middle">20조</text>
    <text x="500" y="420" font-size="10" fill="#64748b" text-anchor="middle">30조</text>
    <text x="640" y="420" font-size="10" fill="#64748b" text-anchor="middle">40조</text>
    <text x="780" y="420" font-size="10" fill="#64748b" text-anchor="middle">50조</text>
    <text x="920" y="420" font-size="10" fill="#64748b" text-anchor="middle">60조</text>
    <text x="500" y="440" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">매출 (조원)</text>

    <!-- Y-axis (영업이익률, 0~30%) -->
    <text x="75" y="405" font-size="10" fill="#64748b" text-anchor="end">0%</text>
    <text x="75" y="340" font-size="10" fill="#64748b" text-anchor="end">5%</text>
    <line x1="80" y1="333" x2="1040" y2="333" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="75" y="274" font-size="10" fill="#64748b" text-anchor="end">10%</text>
    <line x1="80" y1="267" x2="1040" y2="267" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="75" y="208" font-size="10" fill="#64748b" text-anchor="end">15%</text>
    <line x1="80" y1="200" x2="1040" y2="200" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="75" y="142" font-size="10" fill="#64748b" text-anchor="end">20%</text>
    <line x1="80" y1="133" x2="1040" y2="133" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="75" y="78" font-size="10" fill="#64748b" text-anchor="end">25%</text>
    <line x1="80" y1="67" x2="1040" y2="67" stroke="#1e293b" stroke-dasharray="2 4"/>

    <!-- Bubbles: (x, y, size) -->
    <!-- Schneider: 매출 50조, OPM 17% → x=780, y=175, size=40 -->
    <circle cx="780" cy="175" r="35" fill="#3b82f6" opacity="0.7" stroke="#60a5fa" stroke-width="2"/>
    <text x="780" y="180" font-size="12" font-weight="700" fill="#f1f5f9" text-anchor="middle">슈나이더</text>
    <text x="780" y="222" font-size="10" fill="#93c5fd" text-anchor="middle">50조 · 17%</text>

    <!-- ABB: 매출 44조, OPM 17% → x=696, y=175 -->
    <circle cx="696" cy="175" r="32" fill="#22c55e" opacity="0.7" stroke="#4ade80" stroke-width="2"/>
    <text x="696" y="180" font-size="11" font-weight="700" fill="#f1f5f9" text-anchor="middle">ABB</text>
    <text x="696" y="222" font-size="10" fill="#86efac" text-anchor="middle">44조 · 17%</text>

    <!-- Siemens 부문 (전력): 매출 14조, OPM 18% → x=276, y=155 -->
    <circle cx="276" cy="155" r="24" fill="#c084fc" opacity="0.7" stroke="#a78bfa" stroke-width="2"/>
    <text x="276" y="160" font-size="11" font-weight="700" fill="#f1f5f9" text-anchor="middle">지멘스</text>
    <text x="276" y="195" font-size="9" fill="#e9d5ff" text-anchor="middle">14조 · 18%</text>

    <!-- Mitsubishi: 매출 46조, OPM 7% → x=724, y=311 -->
    <circle cx="724" cy="311" r="33" fill="#f59e0b" opacity="0.7" stroke="#fbbf24" stroke-width="2"/>
    <text x="724" y="316" font-size="11" font-weight="700" fill="#0a0e1a" text-anchor="middle">미쓰비시</text>
    <text x="724" y="358" font-size="10" fill="#fde68a" text-anchor="middle">46조 · 7%</text>

    <!-- LS ELECTRIC: 매출 5조, OPM 8.6% → x=150, y=289 -->
    <circle cx="150" cy="289" r="22" fill="#ef4444" opacity="0.85" stroke="#fca5a5" stroke-width="3"/>
    <text x="150" y="294" font-size="10" font-weight="800" fill="#fef2f2" text-anchor="middle">LS</text>
    <text x="180" y="260" font-size="12" font-weight="700" fill="#fbbf24">LS ELECTRIC</text>
    <text x="180" y="278" font-size="10" fill="#fde68a">5조 · 8.6%</text>

    <!-- HD현대일렉트릭: 매출 2.7조, OPM 24% → x=118, y=86 -->
    <circle cx="118" cy="86" r="18" fill="#fbbf24" opacity="0.85" stroke="#fde68a" stroke-width="3"/>
    <text x="118" y="91" font-size="10" font-weight="800" fill="#78350f" text-anchor="middle">HD</text>
    <text x="150" y="60" font-size="12" font-weight="700" fill="#fbbf24">HD현대일렉트릭</text>
    <text x="150" y="78" font-size="10" fill="#fde68a">2.7조 · 24%</text>
  </g>

  <!-- Right-side legend box -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="100" fill="#1e293b" rx="10"/>
    <text x="24" y="30" font-size="15" font-weight="700" fill="#fbbf24">LS ELECTRIC의 위치 — 유럽 3사의 1/10 매출, 1/2 마진, 미쓰비시와 유사</text>
    <text x="24" y="54" font-size="12" fill="#cbd5e1">마진 격차의 원인: R&amp;D 지출 5~6% vs 3%, 고마진 SW·프로세스 자동화 비중 차이, 지역 다변화 부족, 브랜드 프리미엄 격차</text>
    <text x="24" y="74" font-size="12" fill="#cbd5e1">추격 경로: 미국 현지 생산(텍사스) + 자동화 사업부 고도화 + 한국 반도체 팹 수주 = 마진 10%+ 진입 가능성</text>
    <text x="24" y="90" font-size="11" fill="#94a3b8" font-style="italic">버블 크기 = 매출 규모 · HD현대일렉트릭은 단일 제품 독점으로 작지만 고마진</text>
  </g>
</svg>
