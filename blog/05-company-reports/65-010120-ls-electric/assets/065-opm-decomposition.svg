<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>영업이익률 5.6% → 8.6% 개선 분해</title>
  <desc>매출총이익률 17.7% → 21.2% 개선(+3.5%p)이 영업이익률 개선의 거의 전부</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">2022 → 2025 영업이익 +127% — 어디서 왔나</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">매출 +47% + 매출총이익률 +3.5%p + 판관비율 +0.5%p (악화) = 영업이익률 +3.0%p</text>

  <!-- Waterfall chart -->
  <g transform="translate(80, 160)">
    <line x1="0" y1="320" x2="1040" y2="320" stroke="#334155" stroke-width="1"/>

    <!-- Y axis -->
    <text x="-10" y="324" font-size="11" fill="#64748b" text-anchor="end">0%</text>
    <text x="-10" y="264" font-size="11" fill="#64748b" text-anchor="end">2%</text>
    <line x1="-5" y1="260" x2="1040" y2="260" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="-10" y="204" font-size="11" fill="#64748b" text-anchor="end">4%</text>
    <line x1="-5" y1="200" x2="1040" y2="200" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="-10" y="144" font-size="11" fill="#64748b" text-anchor="end">6%</text>
    <line x1="-5" y1="140" x2="1040" y2="140" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="-10" y="84" font-size="11" fill="#64748b" text-anchor="end">8%</text>
    <line x1="-5" y1="80" x2="1040" y2="80" stroke="#1e293b" stroke-dasharray="2 4"/>

    <!-- 2022 영업이익률 5.6% -->
    <rect x="60" y="152" width="140" height="168" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
    <text x="130" y="340" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">2022</text>
    <text x="130" y="355" font-size="10" fill="#94a3b8" text-anchor="middle">영업이익률</text>
    <text x="130" y="140" font-size="20" font-weight="800" fill="#fecaca" text-anchor="middle">5.6%</text>

    <!-- 매출총이익률 개선 +3.5%p -->
    <rect x="260" y="52" width="140" height="100" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
    <text x="330" y="340" font-size="13" font-weight="700" fill="#86efac" text-anchor="middle">매출총이익률</text>
    <text x="330" y="355" font-size="10" fill="#94a3b8" text-anchor="middle">개선</text>
    <text x="330" y="40" font-size="18" font-weight="800" fill="#86efac" text-anchor="middle">+3.5%p</text>
    <text x="330" y="105" font-size="11" fill="#d1fae5" text-anchor="middle">17.7→21.2%</text>

    <!-- 판관비율 악화 -0.5%p -->
    <rect x="460" y="52" width="140" height="14" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="530" y="340" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">판관비율</text>
    <text x="530" y="355" font-size="10" fill="#94a3b8" text-anchor="middle">악화</text>
    <text x="530" y="40" font-size="16" font-weight="700" fill="#fca5a5" text-anchor="middle">-0.5%p</text>

    <!-- 2025 영업이익률 8.6% -->
    <rect x="660" y="66" width="140" height="254" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
    <text x="730" y="340" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">2025</text>
    <text x="730" y="355" font-size="10" fill="#94a3b8" text-anchor="middle">영업이익률</text>
    <text x="730" y="54" font-size="22" font-weight="800" fill="#fde68a" text-anchor="middle">8.6% ★</text>

    <!-- +3.0%p arrow -->
    <g transform="translate(870, 120)">
      <path d="M -60 0 L 60 0" stroke="#fde68a" stroke-width="3"/>
      <path d="M 55 0 L 40 -8 L 40 8 Z" fill="#fde68a"/>
      <text x="0" y="-12" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">+3.0%p</text>
      <text x="0" y="24" font-size="11" fill="#fde68a" text-anchor="middle">3년간 영업이익률</text>
      <text x="0" y="40" font-size="11" fill="#fde68a" text-anchor="middle">3% 포인트 개선</text>
    </g>
  </g>

  <!-- Bottom panel: 개선 원인 5가지 -->
  <g transform="translate(60, 550)">
    <rect x="0" y="0" width="1080" height="150" fill="#1e293b" rx="10"/>
    <text x="24" y="34" font-size="17" font-weight="700" fill="#fbbf24">매출총이익률 개선 원인 5가지</text>

    <g transform="translate(24, 52)">
      <rect x="0" y="0" width="200" height="84" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5" rx="6"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#93c5fd">A. 고마진 제품</text>
      <text x="16" y="42" font-size="10" fill="#cbd5e1">초고압·HVDC 비중</text>
      <text x="16" y="58" font-size="10" fill="#cbd5e1">6~8% → 12~15%</text>
      <text x="16" y="74" font-size="11" font-weight="700" fill="#86efac">+1.5%p 기여</text>
    </g>

    <g transform="translate(234, 52)">
      <rect x="0" y="0" width="200" height="84" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" rx="6"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#fca5a5">B. 미국 현지 생산</text>
      <text x="16" y="42" font-size="10" fill="#cbd5e1">텍사스 공장 + IRA</text>
      <text x="16" y="58" font-size="10" fill="#cbd5e1">30% 세액공제</text>
      <text x="16" y="74" font-size="11" font-weight="700" fill="#86efac">+0.8%p 기여</text>
    </g>

    <g transform="translate(444, 52)">
      <rect x="0" y="0" width="200" height="84" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" rx="6"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#86efac">C. 자동화 비중</text>
      <text x="16" y="42" font-size="10" fill="#cbd5e1">15% → 20%</text>
      <text x="16" y="58" font-size="10" fill="#cbd5e1">이익률 12~15%</text>
      <text x="16" y="74" font-size="11" font-weight="700" fill="#86efac">+0.6%p 기여</text>
    </g>

    <g transform="translate(654, 52)">
      <rect x="0" y="0" width="200" height="84" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" rx="6"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#fde68a">D. 원자재 안정</text>
      <text x="16" y="42" font-size="10" fill="#cbd5e1">구리·알루미늄</text>
      <text x="16" y="58" font-size="10" fill="#cbd5e1">2024 이후 안정</text>
      <text x="16" y="74" font-size="11" font-weight="700" fill="#86efac">+0.4%p 기여</text>
    </g>

    <g transform="translate(864, 52)">
      <rect x="0" y="0" width="192" height="84" fill="#0f172a" stroke="#c084fc" stroke-width="1.5" rx="6"/>
      <text x="16" y="22" font-size="11" font-weight="700" fill="#e9d5ff">E. 저마진 사업 축소</text>
      <text x="16" y="42" font-size="10" fill="#cbd5e1">태양광 모듈 등</text>
      <text x="16" y="58" font-size="10" fill="#cbd5e1">정리 완료</text>
      <text x="16" y="74" font-size="11" font-weight="700" fill="#86efac">+0.2%p 기여</text>
    </g>
  </g>
</svg>
