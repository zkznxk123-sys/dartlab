<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>LS ELECTRIC vs HD현대일렉트릭(#08) — 같은 전력 슈퍼사이클, 정반대 마진</title>
  <desc>LS 매출 5조·영업이익률 8.6% vs HD 매출 2.7조·영업이익률 24% — 다품종 vs 단일제품</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">매출 1.8배 · 영업이익률 1/3 — 같은 슈퍼사이클 정반대 숫자</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">LS ELECTRIC 다품종 Conglomerate vs HD현대일렉트릭 단일제품 Boutique</text>

  <!-- Two-column comparison boxes -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="540" height="440" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5" rx="12"/>
    <text x="270" y="38" font-size="22" font-weight="800" fill="#dbeafe" text-anchor="middle">LS ELECTRIC (010120)</text>
    <text x="270" y="62" font-size="13" fill="#93c5fd" text-anchor="middle">다품종 Conglomerate · 배전·전력·자동화·스마트</text>

    <line x1="30" y1="80" x2="510" y2="80" stroke="#334155"/>

    <g transform="translate(30, 110)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">매출 (2025)</text>
      <text x="480" y="0" font-size="32" font-weight="800" fill="#dbeafe" text-anchor="end">4.97조</text>
    </g>

    <g transform="translate(30, 170)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">영업이익 (2025)</text>
      <text x="480" y="0" font-size="26" font-weight="700" fill="#93c5fd" text-anchor="end">4,264억</text>
    </g>

    <g transform="translate(30, 220)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">영업이익률</text>
      <text x="480" y="0" font-size="38" font-weight="800" fill="#fca5a5" text-anchor="end">8.6%</text>
    </g>

    <g transform="translate(30, 280)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">매출총이익률</text>
      <text x="480" y="0" font-size="20" font-weight="700" fill="#93c5fd" text-anchor="end">21.2%</text>
    </g>

    <g transform="translate(30, 320)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">2023말 대비 주가</text>
      <text x="480" y="0" font-size="22" font-weight="800" fill="#86efac" text-anchor="end">약 4.5배</text>
    </g>

    <g transform="translate(30, 360)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">시가총액 / 매출</text>
      <text x="480" y="0" font-size="18" font-weight="700" fill="#dbeafe" text-anchor="end">1.4배</text>
    </g>

    <g transform="translate(30, 400)">
      <text x="0" y="0" font-size="12" fill="#94a3b8" font-style="italic">주력: 배전 40% · 전력 25% · 자동화 20% · 스마트 15%</text>
    </g>
  </g>

  <g transform="translate(620, 160)">
    <rect x="0" y="0" width="520" height="440" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5" rx="12"/>
    <text x="260" y="38" font-size="22" font-weight="800" fill="#fde68a" text-anchor="middle">HD현대일렉트릭 (267260)</text>
    <text x="260" y="62" font-size="13" fill="#fbbf24" text-anchor="middle">단일제품 Boutique · 765kV 초고압 변압기 주력</text>

    <line x1="30" y1="80" x2="490" y2="80" stroke="#334155"/>

    <g transform="translate(30, 110)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">매출 (2024)</text>
      <text x="460" y="0" font-size="32" font-weight="800" fill="#fde68a" text-anchor="end">2.73조</text>
    </g>

    <g transform="translate(30, 170)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">영업이익 (2024)</text>
      <text x="460" y="0" font-size="26" font-weight="700" fill="#fbbf24" text-anchor="end">약 6,000억</text>
    </g>

    <g transform="translate(30, 220)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">영업이익률</text>
      <text x="460" y="0" font-size="38" font-weight="800" fill="#86efac" text-anchor="end">24.4% ★</text>
    </g>

    <g transform="translate(30, 280)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">매출총이익률</text>
      <text x="460" y="0" font-size="20" font-weight="700" fill="#fbbf24" text-anchor="end">약 30%</text>
    </g>

    <g transform="translate(30, 320)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">2023말 대비 주가</text>
      <text x="460" y="0" font-size="22" font-weight="700" fill="#86efac" text-anchor="end">약 2.5배</text>
    </g>

    <g transform="translate(30, 360)">
      <text x="0" y="0" font-size="13" fill="#94a3b8">시가총액 / 매출</text>
      <text x="460" y="0" font-size="18" font-weight="700" fill="#fde68a" text-anchor="end">3.7배</text>
    </g>

    <g transform="translate(30, 400)">
      <text x="0" y="0" font-size="12" fill="#94a3b8" font-style="italic">주력: 초고압 변압기 60%+ · 수주잔고 8조+</text>
    </g>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="80" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="16" font-weight="700" fill="#fbbf24">전략의 차이 — "단일 제품 몰입" vs "다품종 분산"</text>
    <text x="24" y="58" font-size="12" fill="#cbd5e1">HD는 초고압 변압기 1개 제품의 마진 급등(10%→24%)으로, LS는 4대 사업부 매출 총합(2.35→4.97조)으로 같은 슈퍼사이클 수혜를 받는다.</text>
    <text x="24" y="74" font-size="12" fill="#cbd5e1">영업이익률 3배 차이는 경쟁력이 아닌 전략의 차이. 주가 상승률은 LS가 더 높다 (PER 배수 확대가 주범).</text>
  </g>
</svg>
