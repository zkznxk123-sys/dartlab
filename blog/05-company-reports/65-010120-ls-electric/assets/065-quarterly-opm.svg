<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>LS ELECTRIC 분기별 영업이익률 8~9% 안정 구간 정착</title>
  <desc>2024Q3 6.5% 단기 저점 이후 회복 · 8~9% 플라토 고착</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">분기별 영업이익률 — 8~9% 플라토 고착</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">2024Q3 6.5% 단기 저점 이후 회복 · 10% 진입 여부가 2026 핵심 변수</text>

  <!-- Chart -->
  <g transform="translate(80, 160)">
    <!-- Axes -->
    <line x1="80" y1="400" x2="1040" y2="400" stroke="#334155" stroke-width="1.5"/>
    <line x1="80" y1="0" x2="80" y2="400" stroke="#334155" stroke-width="1.5"/>

    <!-- Y labels -->
    <text x="75" y="405" font-size="11" fill="#64748b" text-anchor="end">0%</text>
    <text x="75" y="340" font-size="11" fill="#64748b" text-anchor="end">2%</text>
    <line x1="80" y1="333" x2="1040" y2="333" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="75" y="272" font-size="11" fill="#64748b" text-anchor="end">4%</text>
    <line x1="80" y1="267" x2="1040" y2="267" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="75" y="205" font-size="11" fill="#64748b" text-anchor="end">6%</text>
    <line x1="80" y1="200" x2="1040" y2="200" stroke="#1e293b" stroke-dasharray="2 4"/>
    <text x="75" y="138" font-size="11" fill="#94a3b8" text-anchor="end" font-weight="700">8%</text>
    <line x1="80" y1="133" x2="1040" y2="133" stroke="#475569" stroke-dasharray="4 3"/>
    <text x="1030" y="128" font-size="10" fill="#fde68a" text-anchor="end" font-style="italic">현재 플라토</text>
    <text x="75" y="72" font-size="11" fill="#94a3b8" text-anchor="end" font-weight="700">10%</text>
    <line x1="80" y1="67" x2="1040" y2="67" stroke="#fbbf24" stroke-dasharray="4 3"/>
    <text x="1030" y="62" font-size="10" fill="#fbbf24" text-anchor="end" font-style="italic">다음 진입선</text>

    <!-- X labels (2024Q1 ~ 2025Q4) -->
    <g font-size="11" fill="#94a3b8" text-anchor="middle">
      <text x="180" y="420">2024Q1</text>
      <text x="300" y="420">Q2</text>
      <text x="420" y="420">Q3</text>
      <text x="540" y="420">Q4</text>
      <text x="660" y="420" fill="#fbbf24">2025Q1</text>
      <text x="780" y="420" fill="#fbbf24">Q2</text>
      <text x="900" y="420" fill="#fbbf24">Q3</text>
      <text x="1020" y="420" fill="#fbbf24">Q4</text>
    </g>

    <!-- Bars representing quarterly OPM -->
    <!-- values: 9.0, 9.7, 6.5, 8.8, 8.6, 9.2, 8.3, 8.5 -->
    <!-- Scale: 10% = 70 (70->0, 0%->400) i.e., y = 400 - val * 33.3 -->
    <g>
      <!-- 2024Q1: 9.0 → y=400-299=100, height=300 -->
      <rect x="150" y="100" width="60" height="300" fill="#3b82f6"/>
      <text x="180" y="92" font-size="13" font-weight="700" fill="#dbeafe" text-anchor="middle">9.0%</text>

      <!-- 2024Q2: 9.7 → y=400-323=77 -->
      <rect x="270" y="77" width="60" height="323" fill="#3b82f6"/>
      <text x="300" y="69" font-size="13" font-weight="700" fill="#dbeafe" text-anchor="middle">9.7%</text>

      <!-- 2024Q3: 6.5 (단기 저점) → y=400-217=183 -->
      <rect x="390" y="183" width="60" height="217" fill="#ef4444"/>
      <text x="420" y="175" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">6.5% ↓</text>

      <!-- 2024Q4: 8.8 → y=400-293=107 -->
      <rect x="510" y="107" width="60" height="293" fill="#3b82f6"/>
      <text x="540" y="99" font-size="13" font-weight="700" fill="#dbeafe" text-anchor="middle">8.8%</text>

      <!-- 2025Q1: 8.6 → y=400-286=114 -->
      <rect x="630" y="114" width="60" height="286" fill="#fbbf24"/>
      <text x="660" y="106" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">8.6%</text>

      <!-- 2025Q2: 9.2 → y=400-306=94 -->
      <rect x="750" y="94" width="60" height="306" fill="#fbbf24"/>
      <text x="780" y="86" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">9.2%</text>

      <!-- 2025Q3: 8.3 → y=400-276=124 -->
      <rect x="870" y="124" width="60" height="276" fill="#fbbf24"/>
      <text x="900" y="116" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">8.3%</text>

      <!-- 2025Q4: 8.5 → y=400-283=117 -->
      <rect x="990" y="117" width="60" height="283" fill="#fbbf24"/>
      <text x="1020" y="109" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">8.5%</text>
    </g>

    <!-- Trend line through Q1 2024 ~ Q4 2025 (mean line) -->
    <line x1="150" y1="117" x2="1050" y2="117" stroke="#22c55e" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
    <text x="1035" y="112" font-size="10" fill="#86efac" text-anchor="end" font-style="italic">평균 8.6%</text>
  </g>

  <!-- Bottom panel -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="100" fill="#1e293b" rx="10"/>
    <text x="24" y="34" font-size="16" font-weight="700" fill="#fbbf24">분기 영업이익률 진동 범위 6.5~9.7% — 평균 8.6% 플라토 정착</text>
    <text x="24" y="58" font-size="12" fill="#cbd5e1">2024Q3 6.5%는 일시 조정 (원자재 상승 + 프로젝트 매출 인식 타이밍). 이후 8.5~9.2% 안정 구간.</text>
    <text x="24" y="78" font-size="12" fill="#cbd5e1">다음 단계 — 2026에 10%를 3분기 연속 달성하면 "신규 성장 구간" 진입, 8~9% 고착 시 재평가 조정.</text>
  </g>
</svg>
