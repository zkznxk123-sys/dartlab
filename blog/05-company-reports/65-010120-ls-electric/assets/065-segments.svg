<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <title>LS ELECTRIC 4대 사업부 매출 믹스</title>
  <desc>배전 40% · 전력 25% · 자동화 20% · 스마트 15% — 평균 영업이익률 8.6%의 원천</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="62" font-family="-apple-system, sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">4대 사업부 · 평균 영업이익률 8.6%의 내부 구성</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" fill="#64748b">가장 큰 사업부(배전 40%)가 평균 근처 마진 · 고마진 영역은 20% 비중에 그침</text>

  <!-- Left: donut chart -->
  <g transform="translate(280, 370)">
    <!-- Segments: 배전 40%, 전력 25%, 자동화 20%, 스마트 15% -->
    <!-- Circumference = 2*pi*140 = 879.6 -->
    <!-- 40%: 351.8, 25%: 219.9, 20%: 175.9, 15%: 131.9 -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#3b82f6" stroke-width="60" stroke-dasharray="351.8 879" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#fbbf24" stroke-width="60" stroke-dasharray="219.9 879" stroke-dashoffset="-351.8" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#22c55e" stroke-width="60" stroke-dasharray="175.9 879" stroke-dashoffset="-571.7" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#c084fc" stroke-width="60" stroke-dasharray="131.9 879" stroke-dashoffset="-747.6" transform="rotate(-90)"/>

    <text x="0" y="-8" font-size="14" font-weight="700" fill="#94a3b8" text-anchor="middle">2025 매출</text>
    <text x="0" y="22" font-size="28" font-weight="800" fill="#fbbf24" text-anchor="middle">4.97조</text>
    <text x="0" y="46" font-size="12" fill="#94a3b8" text-anchor="middle">평균 OPM 8.6%</text>
  </g>

  <!-- Right: table -->
  <g transform="translate(560, 160)">
    <rect x="0" y="0" width="580" height="460" fill="#1e293b" rx="10"/>
    <text x="24" y="36" font-size="18" font-weight="700" fill="#fbbf24">4대 사업부 해부</text>

    <!-- Header -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="540" height="30" fill="#0f172a"/>
      <text x="16" y="20" font-size="11" font-weight="700" fill="#94a3b8">사업부</text>
      <text x="200" y="20" font-size="11" font-weight="700" fill="#94a3b8">매출</text>
      <text x="320" y="20" font-size="11" font-weight="700" fill="#94a3b8">이익률</text>
      <text x="440" y="20" font-size="11" font-weight="700" fill="#94a3b8">주요 제품</text>
    </g>

    <!-- 배전 -->
    <g transform="translate(20, 95)">
      <rect x="0" y="0" width="540" height="72" fill="#0f172a" stroke="#3b82f6" stroke-width="2" rx="6"/>
      <circle cx="16" cy="20" r="7" fill="#3b82f6"/>
      <text x="32" y="26" font-size="14" font-weight="800" fill="#dbeafe">배전</text>
      <text x="32" y="44" font-size="10" fill="#94a3b8">중저압 차단기·배전반</text>
      <text x="190" y="28" font-size="14" font-weight="700" fill="#dbeafe">1.99조</text>
      <text x="190" y="44" font-size="10" fill="#94a3b8">40%</text>
      <text x="320" y="28" font-size="14" font-weight="700" fill="#fca5a5">7~9%</text>
      <text x="440" y="28" font-size="11" fill="#cbd5e1">글로벌 톱10</text>
      <text x="440" y="44" font-size="10" fill="#94a3b8">슈나이더·ABB 경쟁</text>
    </g>

    <!-- 전력인프라 -->
    <g transform="translate(20, 179)">
      <rect x="0" y="0" width="540" height="72" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="6"/>
      <circle cx="16" cy="20" r="7" fill="#fbbf24"/>
      <text x="32" y="26" font-size="14" font-weight="800" fill="#fde68a">전력인프라</text>
      <text x="32" y="44" font-size="10" fill="#94a3b8">고압 차단기·변압기·HVDC</text>
      <text x="190" y="28" font-size="14" font-weight="700" fill="#fde68a">1.24조</text>
      <text x="190" y="44" font-size="10" fill="#94a3b8">25%</text>
      <text x="320" y="28" font-size="14" font-weight="700" fill="#fbbf24">10~13%</text>
      <text x="440" y="28" font-size="11" fill="#cbd5e1">HD현대와 경쟁</text>
      <text x="440" y="44" font-size="10" fill="#94a3b8">초고압 10~15%만</text>
    </g>

    <!-- 자동화 -->
    <g transform="translate(20, 263)">
      <rect x="0" y="0" width="540" height="72" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="6"/>
      <circle cx="16" cy="20" r="7" fill="#22c55e"/>
      <text x="32" y="26" font-size="14" font-weight="800" fill="#86efac">자동화</text>
      <text x="32" y="44" font-size="10" fill="#94a3b8">PLC·인버터·제어기</text>
      <text x="190" y="28" font-size="14" font-weight="700" fill="#86efac">0.99조</text>
      <text x="190" y="44" font-size="10" fill="#94a3b8">20%</text>
      <text x="320" y="28" font-size="14" font-weight="700" fill="#fbbf24">12~15% ★</text>
      <text x="440" y="28" font-size="11" fill="#cbd5e1">한국 1위</text>
      <text x="440" y="44" font-size="10" fill="#94a3b8">미쓰비시·지멘스 도전</text>
    </g>

    <!-- 스마트에너지 -->
    <g transform="translate(20, 347)">
      <rect x="0" y="0" width="540" height="72" fill="#0f172a" stroke="#c084fc" stroke-width="2" rx="6"/>
      <circle cx="16" cy="20" r="7" fill="#c084fc"/>
      <text x="32" y="26" font-size="14" font-weight="800" fill="#e9d5ff">스마트에너지</text>
      <text x="32" y="44" font-size="10" fill="#94a3b8">ESS·인버터·EV충전</text>
      <text x="190" y="28" font-size="14" font-weight="700" fill="#e9d5ff">0.75조</text>
      <text x="190" y="44" font-size="10" fill="#94a3b8">15%</text>
      <text x="320" y="28" font-size="14" font-weight="700" fill="#fca5a5">4~7%</text>
      <text x="440" y="28" font-size="11" fill="#cbd5e1">저마진 신사업</text>
      <text x="440" y="44" font-size="10" fill="#94a3b8">투자 구간</text>
    </g>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="1080" height="60" fill="#0f172a" stroke="#334155" rx="8"/>
    <text x="24" y="30" font-size="14" font-weight="700" fill="#fbbf24">구조적 한계 — 가장 큰 사업부가 평균 마진, 고마진 영역은 20%에 그침</text>
    <text x="24" y="50" font-size="11" fill="#cbd5e1">자동화 비중 20% → 25%+로 확대되면 전체 평균 이익률 9~10% 진입 가능 · 이게 마진 개선의 핵심 경로</text>
  </g>
</svg>
