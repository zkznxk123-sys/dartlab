<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" role="img" aria-labelledby="peerTitle peerDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="peerTitle">조선 4사 — 같은 업종, 네 가지 전략 모양</title>
  <desc id="peerDesc">2025 영업이익률 8% ~ 24%. 이익률 격차를 만드는 건 선종 집중도와 자본구조.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">조선 4사 — 이익률 8%부터 24%까지 3배 격차</text>
  <text x="60" y="90" fill="#64748b" font-size="15">같은 조선업인데 전략이 다르면 재무제표가 3배 다르다</text>

  <!-- Bar chart: OPM comparison -->
  <g transform="translate(60, 140)">
    <text x="0" y="-10" fill="#f1f5f9" font-size="16" font-weight="700">2025 영업이익률 (%)</text>
    <!-- scale: 0~25% → 1000px. 1% = 40px -->
    <line x1="0" y1="320" x2="1080" y2="320" stroke="#334155"/>

    <!-- Grid at 5,10,15,20,25 -->
    <line x1="200" y1="0" x2="200" y2="320" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="1000" y1="0" x2="1000" y2="320" stroke="#1e293b" stroke-dasharray="3,3"/>

    <text x="200" y="340" fill="#64748b" font-size="11" text-anchor="middle">5%</text>
    <text x="400" y="340" fill="#64748b" font-size="11" text-anchor="middle">10%</text>
    <text x="600" y="340" fill="#64748b" font-size="11" text-anchor="middle">15%</text>
    <text x="800" y="340" fill="#64748b" font-size="11" text-anchor="middle">20%</text>
    <text x="1000" y="340" fill="#64748b" font-size="11" text-anchor="middle">25%</text>

    <!-- Row: HD한국조선해양 13.04% -->
    <rect x="0" y="16" width="522" height="50" fill="#22c55e"/>
    <text x="532" y="48" fill="#22c55e" font-size="18" font-weight="700">13.04%</text>
    <text x="10" y="12" fill="#f1f5f9" font-size="13" font-weight="700">HD한국조선해양 (지주)</text>

    <!-- Row: HD현대중공업 11.6% -->
    <rect x="0" y="86" width="464" height="50" fill="#60a5fa"/>
    <text x="474" y="118" fill="#60a5fa" font-size="18" font-weight="700">11.6%</text>
    <text x="10" y="82" fill="#94a3b8" font-size="13">HD현대중공업 (자회사 상장)</text>

    <!-- Row: 한화오션 9.1% -->
    <rect x="0" y="156" width="364" height="50" fill="#a78bfa"/>
    <text x="374" y="188" fill="#a78bfa" font-size="18" font-weight="700">9.10%</text>
    <text x="10" y="152" fill="#94a3b8" font-size="13">한화오션 (방산+상선 턴어라운드)</text>

    <!-- Row: 삼성중공업 8.1% -->
    <rect x="0" y="226" width="324" height="50" fill="#8b5cf6"/>
    <text x="334" y="258" fill="#8b5cf6" font-size="18" font-weight="700">8.10%</text>
    <text x="10" y="222" fill="#94a3b8" font-size="13">삼성중공업 (드릴십+FLNG 특화)</text>

    <!-- Row: 대한조선 23.95% -->
    <rect x="0" y="296" width="958" height="50" fill="#fbbf24"/>
    <text x="968" y="328" fill="#fbbf24" font-size="18" font-weight="700">23.95%</text>
    <text x="10" y="292" fill="#f1f5f9" font-size="13" font-weight="700">대한조선 (수에즈막스 올인)</text>
  </g>

  <!-- Comparison table -->
  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="1080" height="280" fill="#1e293b" stroke="#334155"/>

    <!-- Header -->
    <line x1="0" y1="40" x2="1080" y2="40" stroke="#475569"/>
    <line x1="240" y1="0" x2="240" y2="280" stroke="#334155"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="#334155"/>
    <line x1="560" y1="0" x2="560" y2="280" stroke="#334155"/>
    <line x1="720" y1="0" x2="720" y2="280" stroke="#334155"/>

    <text x="20" y="27" fill="#f1f5f9" font-size="13" font-weight="700">회사</text>
    <text x="320" y="27" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">매출 (조원)</text>
    <text x="480" y="27" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">영업이익 (조)</text>
    <text x="640" y="27" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">수주잔고</text>
    <text x="900" y="27" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">전략 유형</text>

    <!-- Rows -->
    <g>
      <line x1="0" y1="88" x2="1080" y2="88" stroke="#1e293b"/>
      <text x="20" y="70" fill="#22c55e" font-size="14" font-weight="700">HD한국조선해양</text>
      <text x="20" y="84" fill="#64748b" font-size="11">009540</text>
      <text x="320" y="70" fill="#f1f5f9" font-size="13" text-anchor="middle">29.93</text>
      <text x="480" y="70" fill="#f1f5f9" font-size="13" text-anchor="middle">3.90</text>
      <text x="640" y="70" fill="#f1f5f9" font-size="13" text-anchor="middle">약 83조</text>
      <text x="900" y="70" fill="#94a3b8" font-size="12" text-anchor="middle">지주 포트폴리오</text>
    </g>

    <g>
      <line x1="0" y1="136" x2="1080" y2="136" stroke="#1e293b"/>
      <text x="20" y="118" fill="#60a5fa" font-size="14" font-weight="700">HD현대중공업</text>
      <text x="20" y="132" fill="#64748b" font-size="11">329180 (지주 78%)</text>
      <text x="320" y="118" fill="#f1f5f9" font-size="13" text-anchor="middle">17.58</text>
      <text x="480" y="118" fill="#f1f5f9" font-size="13" text-anchor="middle">2.04</text>
      <text x="640" y="118" fill="#f1f5f9" font-size="13" text-anchor="middle">약 48조</text>
      <text x="900" y="118" fill="#94a3b8" font-size="12" text-anchor="middle">풀라인업 단독</text>
    </g>

    <g>
      <line x1="0" y1="184" x2="1080" y2="184" stroke="#1e293b"/>
      <text x="20" y="166" fill="#a78bfa" font-size="14" font-weight="700">한화오션</text>
      <text x="20" y="180" fill="#64748b" font-size="11">042660</text>
      <text x="320" y="166" fill="#f1f5f9" font-size="13" text-anchor="middle">12.78</text>
      <text x="480" y="166" fill="#f1f5f9" font-size="13" text-anchor="middle">1.17</text>
      <text x="640" y="166" fill="#f1f5f9" font-size="13" text-anchor="middle">34.5조</text>
      <text x="900" y="166" fill="#94a3b8" font-size="12" text-anchor="middle">방산+상선 턴어라운드</text>
    </g>

    <g>
      <line x1="0" y1="232" x2="1080" y2="232" stroke="#1e293b"/>
      <text x="20" y="214" fill="#8b5cf6" font-size="14" font-weight="700">삼성중공업</text>
      <text x="20" y="228" fill="#64748b" font-size="11">010140</text>
      <text x="320" y="214" fill="#f1f5f9" font-size="13" text-anchor="middle">10.65</text>
      <text x="480" y="214" fill="#f1f5f9" font-size="13" text-anchor="middle">0.86</text>
      <text x="640" y="214" fill="#f1f5f9" font-size="13" text-anchor="middle">약 40조</text>
      <text x="900" y="214" fill="#94a3b8" font-size="12" text-anchor="middle">드릴십·FLNG 특화</text>
    </g>

    <g>
      <text x="20" y="262" fill="#fbbf24" font-size="14" font-weight="700">대한조선</text>
      <text x="20" y="276" fill="#64748b" font-size="11">439260</text>
      <text x="320" y="262" fill="#f1f5f9" font-size="13" text-anchor="middle">1.23</text>
      <text x="480" y="262" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">0.29</text>
      <text x="640" y="262" fill="#f1f5f9" font-size="13" text-anchor="middle">약 3.3조</text>
      <text x="900" y="262" fill="#94a3b8" font-size="12" text-anchor="middle">수에즈막스 올인</text>
    </g>
  </g>
</svg>
