<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="backlogTitle backlogDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="backlogTitle">수주잔고 + 신조선가 지수 — 2022 호황 수주가 2025 이익으로 실현된 3년 지연</title>
  <desc id="backlogDesc">수주-매출 인식 2~3년 지연. 현재 잔고 약 83조(매출 2.8년치)가 2026~2028 이익 파이프라인.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">수주잔고 83조 — 2026~2028 이익 파이프라인</text>
  <text x="60" y="90" fill="#64748b" font-size="15">2022 호황 수주 → 2025 매출 인식. 이 지연이 조선업 사이클의 본질.</text>

  <g transform="translate(90, 140)">
    <line x1="0" y1="0" x2="0" y2="360" stroke="#334155"/>
    <line x1="0" y1="360" x2="1020" y2="360" stroke="#334155"/>

    <!-- Left axis: Backlog (조) — 0~100조 -->
    <text x="-40" y="10" fill="#60a5fa" font-size="11" text-anchor="end">100조</text>
    <text x="-40" y="100" fill="#60a5fa" font-size="11" text-anchor="end">75조</text>
    <text x="-40" y="190" fill="#60a5fa" font-size="11" text-anchor="end">50조</text>
    <text x="-40" y="280" fill="#60a5fa" font-size="11" text-anchor="end">25조</text>
    <text x="-40" y="365" fill="#60a5fa" font-size="11" text-anchor="end">0</text>

    <!-- Right axis: Clarksons index 100~200 -->
    <text x="1050" y="10" fill="#fbbf24" font-size="11">200pt</text>
    <text x="1050" y="100" fill="#fbbf24" font-size="11">175pt</text>
    <text x="1050" y="190" fill="#fbbf24" font-size="11">150pt</text>
    <text x="1050" y="280" fill="#fbbf24" font-size="11">125pt</text>
    <text x="1050" y="365" fill="#fbbf24" font-size="11">100pt</text>

    <!-- Grid lines -->
    <line x1="0" y1="100" x2="1020" y2="100" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="0" y1="190" x2="1020" y2="190" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="0" y1="280" x2="1020" y2="280" stroke="#1e293b" stroke-dasharray="3,3"/>

    <!-- Backlog bars: each year -->
    <!-- data: 2020:32, 2021:45, 2022:60, 2023:62, 2024:67, 2025:83  y = 360 - val*3.6 -->
    <g>
      <rect x="40" y="244" width="90" height="116" fill="#60a5fa" opacity="0.8"/>
      <text x="85" y="236" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">32</text>

      <rect x="200" y="198" width="90" height="162" fill="#60a5fa" opacity="0.8"/>
      <text x="245" y="190" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">45</text>

      <rect x="360" y="144" width="90" height="216" fill="#60a5fa" opacity="0.8"/>
      <text x="405" y="136" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">60</text>

      <rect x="520" y="137" width="90" height="223" fill="#60a5fa" opacity="0.8"/>
      <text x="565" y="128" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">62</text>

      <rect x="680" y="119" width="90" height="241" fill="#60a5fa" opacity="0.8"/>
      <text x="725" y="111" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">66.8</text>

      <rect x="840" y="61" width="90" height="299" fill="#22c55e"/>
      <text x="885" y="53" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">83</text>
    </g>

    <!-- Year labels -->
    <text x="85" y="385" fill="#94a3b8" font-size="13" text-anchor="middle">2020</text>
    <text x="245" y="385" fill="#94a3b8" font-size="13" text-anchor="middle">2021</text>
    <text x="405" y="385" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">2022</text>
    <text x="405" y="403" fill="#fbbf24" font-size="11" text-anchor="middle">LNG 호황</text>
    <text x="565" y="385" fill="#94a3b8" font-size="13" text-anchor="middle">2023</text>
    <text x="725" y="385" fill="#94a3b8" font-size="13" text-anchor="middle">2024</text>
    <text x="885" y="385" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">2025</text>

    <!-- Clarksons index line overlay: 100pt=360, 200pt=0, scale 3.6px/pt -->
    <!-- 2020:130=266, 2021:155=198, 2022:170=252... wait 360-170*3.6=360-612 oops -->
    <!-- Simpler: new scale 100pt=360, 200pt=0, scale 3.6 per pt so 130pt=360-30*3.6=360-108=252 -->
    <!-- 2020:130→252, 2021:155→162, 2022:170→108, 2023:180→72, 2024:178→79, 2025:175→90 -->

    <polyline points="85,252 245,162 405,108 565,72 725,79 885,90" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="6,4"/>
    <circle cx="85" cy="252" r="5" fill="#fbbf24"/>
    <circle cx="245" cy="162" r="5" fill="#fbbf24"/>
    <circle cx="405" cy="108" r="5" fill="#fbbf24"/>
    <circle cx="565" cy="72" r="6" fill="#fbbf24"/>
    <circle cx="725" cy="79" r="5" fill="#fbbf24"/>
    <circle cx="885" cy="90" r="5" fill="#fbbf24"/>

    <text x="85" y="270" fill="#fbbf24" font-size="11" text-anchor="middle">130</text>
    <text x="245" y="180" fill="#fbbf24" font-size="11" text-anchor="middle">155</text>
    <text x="405" y="126" fill="#fbbf24" font-size="11" text-anchor="middle">170</text>
    <text x="565" y="54" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">180</text>
    <text x="725" y="97" fill="#fbbf24" font-size="11" text-anchor="middle">178</text>
    <text x="885" y="108" fill="#fbbf24" font-size="11" text-anchor="middle">175</text>
  </g>

  <!-- Legend -->
  <g transform="translate(90, 530)">
    <rect x="0" y="0" width="1020" height="150" fill="#1e293b" stroke="#334155"/>
    <rect x="20" y="20" width="20" height="20" fill="#22c55e"/>
    <text x="50" y="36" fill="#f1f5f9" font-size="13">수주잔고 (연결, 조원) — 좌측 축</text>

    <line x1="20" y1="60" x2="40" y2="60" stroke="#fbbf24" stroke-width="3" stroke-dasharray="4,3"/>
    <text x="50" y="65" fill="#f1f5f9" font-size="13">Clarksons 신조선가 지수 (2010=100) — 우측 축</text>

    <text x="420" y="36" fill="#fbbf24" font-size="13" font-weight="700">2022 호황의 재무적 의미</text>
    <text x="420" y="58" fill="#94a3b8" font-size="12">수주 238억$ → 2025 매출 인식 → 영업이익 3.9조 (2022의 3배 발주 효과가 3년 지연)</text>
    <text x="420" y="78" fill="#94a3b8" font-size="12">잔고 83조 = 2025 매출 29.93조의 2.8년치 → 2026~2028 매출·이익 파이프라인 확보</text>

    <text x="20" y="100" fill="#22c55e" font-size="13" font-weight="700">2026~2028 다음 사이클 3축</text>
    <text x="20" y="122" fill="#94a3b8" font-size="12">① QatarEnergy LNG Fleet 200척 확장 (2025~2028 단계 발주, 한국 3사 과반 기대)</text>
    <text x="20" y="140" fill="#94a3b8" font-size="12">② 미국 해군 MSRA 체결 + 메탄올·암모니아 대체연료선 → IMO 2050 규제 수혜</text>
  </g>
</svg>
