<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="cogsTitle cogsDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="cogsTitle">매출원가율 9년 시계열 — 2021년 103.3% 정점에서 2025년 82.2%로 21%p 회복</title>
  <desc id="cogsDesc">조선업 사이클의 골짜기가 재무제표에 찍히는 방식. 원가율이 100%를 넘은 해는 팔수록 손해 본 해.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">매출원가율 — 21.1%p 회복이 만든 이익 스윙</text>
  <text x="60" y="90" fill="#64748b" font-size="15">2021년 103.3%(팔수록 손해) → 2025년 82.2%. 이 21%p × 매출 29.93조 = 6.32조 효과.</text>

  <g transform="translate(90, 150)">
    <line x1="0" y1="0" x2="0" y2="400" stroke="#334155"/>
    <line x1="0" y1="400" x2="1020" y2="400" stroke="#334155"/>

    <!-- 100% reference line -->
    <line x1="0" y1="120" x2="1020" y2="120" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,5"/>
    <text x="1030" y="125" fill="#ef4444" font-size="12" font-weight="700">100% (손익분기점)</text>

    <!-- 90% reference line -->
    <line x1="0" y1="200" x2="1020" y2="200" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="1030" y="205" fill="#64748b" font-size="11">90%</text>

    <!-- 80% reference -->
    <line x1="0" y1="280" x2="1020" y2="280" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="1030" y="285" fill="#64748b" font-size="11">80%</text>

    <!-- Axis label -->
    <text x="-60" y="60" fill="#94a3b8" font-size="12">110%</text>
    <text x="-50" y="120" fill="#94a3b8" font-size="12">100%</text>
    <text x="-50" y="360" fill="#94a3b8" font-size="12">70%</text>

    <!-- Data: x at year, y based on cogs ratio (each %p = 8px; 110%=40, 100%=120, 90%=200, 80%=280, 70%=360) -->
    <!-- 2017 93.3% -> y = 120 + (100-93.3)*8 = 173.6 -->
    <!-- 2018 97.3% -> 141.6 -->
    <!-- 2019 93.5% -> 172.0 -->
    <!-- 2020 95.0% -> 160.0 -->
    <!-- 2021 103.3% -> 93.6 (above 100) -->
    <!-- 2022 97.9% -> 136.8 -->
    <!-- 2023 95.1% -> 159.2 -->
    <!-- 2024 89.8% -> 201.6 -->
    <!-- 2025 82.2% -> 262.4 -->

    <path d="M 60 174 L 180 142 L 300 172 L 420 160 L 540 94 L 660 137 L 780 159 L 900 202 L 1020 262" fill="none" stroke="#60a5fa" stroke-width="3"/>

    <!-- Points -->
    <circle cx="60" cy="174" r="6" fill="#60a5fa"/>
    <circle cx="180" cy="142" r="6" fill="#60a5fa"/>
    <circle cx="300" cy="172" r="6" fill="#60a5fa"/>
    <circle cx="420" cy="160" r="6" fill="#60a5fa"/>
    <circle cx="540" cy="94" r="9" fill="#ef4444"/>
    <circle cx="660" cy="137" r="6" fill="#60a5fa"/>
    <circle cx="780" cy="159" r="6" fill="#60a5fa"/>
    <circle cx="900" cy="202" r="6" fill="#60a5fa"/>
    <circle cx="1020" cy="262" r="9" fill="#22c55e"/>

    <!-- Year labels -->
    <text x="60" y="420" fill="#94a3b8" font-size="13" text-anchor="middle">2017</text>
    <text x="180" y="420" fill="#94a3b8" font-size="13" text-anchor="middle">2018</text>
    <text x="300" y="420" fill="#94a3b8" font-size="13" text-anchor="middle">2019</text>
    <text x="420" y="420" fill="#94a3b8" font-size="13" text-anchor="middle">2020</text>
    <text x="540" y="420" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2021</text>
    <text x="660" y="420" fill="#94a3b8" font-size="13" text-anchor="middle">2022</text>
    <text x="780" y="420" fill="#94a3b8" font-size="13" text-anchor="middle">2023</text>
    <text x="900" y="420" fill="#94a3b8" font-size="13" text-anchor="middle">2024</text>
    <text x="1020" y="420" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">2025</text>

    <!-- Value labels -->
    <text x="60" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">93.3%</text>
    <text x="180" y="128" fill="#94a3b8" font-size="11" text-anchor="middle">97.3%</text>
    <text x="300" y="158" fill="#94a3b8" font-size="11" text-anchor="middle">93.5%</text>
    <text x="420" y="146" fill="#94a3b8" font-size="11" text-anchor="middle">95.0%</text>
    <text x="540" y="80" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">103.3%</text>
    <text x="660" y="123" fill="#94a3b8" font-size="11" text-anchor="middle">97.9%</text>
    <text x="780" y="145" fill="#94a3b8" font-size="11" text-anchor="middle">95.1%</text>
    <text x="900" y="188" fill="#94a3b8" font-size="11" text-anchor="middle">89.8%</text>
    <text x="1020" y="248" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">82.2%</text>

    <!-- Events annotations -->
    <text x="540" y="60" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">⬈ 팔수록 손해</text>

    <line x1="540" y1="94" x2="900" y2="300" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
    <text x="720" y="220" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle" transform="rotate(20 720 220)">−21.1%p 회복</text>
  </g>

  <g transform="translate(90, 580)">
    <rect width="1020" height="100" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="32" fill="#f1f5f9" font-size="15" font-weight="700">2021년 원가율 103.3%를 만든 4요인</text>
    <text x="30" y="58" fill="#94a3b8" font-size="12">① 코로나 시기 저가 수주 (2020 Clarksons 신조선가 130pt 바닥에서 체결한 계약)</text>
    <text x="30" y="78" fill="#94a3b8" font-size="12">② 후판 가격 폭등 (2020 톤당 70만→2021.12 톤당 150만원, 2배)</text>
    <text x="540" y="58" fill="#94a3b8" font-size="12">③ 해양플랜트 마무리 원가 초과 (2014~2016 저유가 수주의 말미)</text>
    <text x="540" y="78" fill="#94a3b8" font-size="12">④ 환율 파생 평가손실 (금융비용 1.73조 추가)</text>
  </g>
</svg>
