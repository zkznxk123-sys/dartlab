<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="finTitle finDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="finTitle">2024 금융비용 6.49조 수수께끼 — 환율 파생이 영업이익을 삼킨 해</title>
  <desc id="finDesc">영업이익 1.43조 → 금융비용 -6.49조 → 금융수익·기타 +6.88조 상쇄 → 세전이익 +1.82조 역전.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="26" font-weight="700">2024 폭포 차트 — 영업이익이 삼켜졌다가 되돌아온 길</text>
  <text x="60" y="90" fill="#64748b" font-size="15">금융비용 6.49조(매출의 25%)를 금융수익·기타이익 약 6.88조가 상쇄. 순 -0.39조.</text>

  <!-- waterfall -->
  <g transform="translate(80, 140)">
    <!-- y-axis -->
    <line x1="0" y1="0" x2="0" y2="420" stroke="#334155"/>
    <line x1="0" y1="420" x2="1060" y2="420" stroke="#334155"/>

    <!-- Reference grid -->
    <line x1="0" y1="60" x2="1060" y2="60" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="0" y1="150" x2="1060" y2="150" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="0" y1="240" x2="1060" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="0" y1="330" x2="1060" y2="330" stroke="#1e293b" stroke-dasharray="3,3"/>

    <text x="-15" y="65" fill="#64748b" font-size="11" text-anchor="end">+8조</text>
    <text x="-15" y="155" fill="#64748b" font-size="11" text-anchor="end">+4조</text>
    <text x="-15" y="245" fill="#64748b" font-size="11" text-anchor="end">0</text>
    <text x="-15" y="335" fill="#64748b" font-size="11" text-anchor="end">-4조</text>
    <text x="-15" y="420" fill="#64748b" font-size="11" text-anchor="end">-8조</text>

    <!-- zero line -->
    <line x1="0" y1="240" x2="1060" y2="240" stroke="#475569" stroke-width="1.5"/>

    <!-- Bars: each 120 wide with gap, scale 8조=180px so 1조=22.5px -->
    <!-- 1) 영업이익 +1.43 = 32.2px -->
    <rect x="40" y="208" width="120" height="32" fill="#22c55e"/>
    <text x="100" y="200" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">+1.43</text>
    <text x="100" y="455" fill="#94a3b8" font-size="12" text-anchor="middle">영업이익</text>
    <text x="100" y="472" fill="#64748b" font-size="11" text-anchor="middle">2024</text>

    <!-- 2) 금융비용 -6.49 = 146px 아래 (from end of 영업이익 position) -->
    <!-- flow: start at +1.43 (208) down by 146 to 354 -->
    <rect x="200" y="208" width="120" height="146" fill="#ef4444"/>
    <text x="260" y="336" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">-6.49</text>
    <text x="260" y="380" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">금융비용</text>
    <text x="260" y="455" fill="#94a3b8" font-size="12" text-anchor="middle">환율 파생 평가손실</text>
    <text x="260" y="472" fill="#64748b" font-size="11" text-anchor="middle">선물환 매도 포지션</text>

    <!-- Connector dashed -->
    <line x1="160" y1="208" x2="200" y2="208" stroke="#475569" stroke-dasharray="3,3"/>
    <line x1="320" y1="354" x2="360" y2="354" stroke="#475569" stroke-dasharray="3,3"/>

    <!-- 3) 금융수익·기타 +6.88 = 155px up from 354 to 199 -->
    <rect x="360" y="199" width="120" height="155" fill="#22c55e"/>
    <text x="420" y="195" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">+6.88</text>
    <text x="420" y="455" fill="#94a3b8" font-size="12" text-anchor="middle">금융수익+기타이익</text>
    <text x="420" y="472" fill="#64748b" font-size="11" text-anchor="middle">달러자산 평가이익+지분법 등</text>

    <!-- Connector -->
    <line x1="480" y1="199" x2="520" y2="199" stroke="#475569" stroke-dasharray="3,3"/>

    <!-- 4) 세전이익 +1.82 = 41px up from 240 to 199 -->
    <rect x="520" y="199" width="120" height="41" fill="#60a5fa"/>
    <text x="580" y="192" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">+1.82</text>
    <text x="580" y="455" fill="#94a3b8" font-size="12" text-anchor="middle">세전이익</text>
    <text x="580" y="472" fill="#64748b" font-size="11" text-anchor="middle">역전 완료</text>

    <!-- Connector -->
    <line x1="640" y1="199" x2="680" y2="199" stroke="#475569" stroke-dasharray="3,3"/>

    <!-- 5) 법인세 -0.37 = 8.3px -->
    <rect x="680" y="199" width="120" height="8" fill="#ef4444"/>
    <text x="740" y="195" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">-0.37</text>
    <text x="740" y="455" fill="#94a3b8" font-size="12" text-anchor="middle">법인세</text>
    <text x="740" y="472" fill="#64748b" font-size="11" text-anchor="middle">유효세율 20.2%</text>

    <!-- Connector -->
    <line x1="800" y1="207" x2="840" y2="207" stroke="#475569" stroke-dasharray="3,3"/>

    <!-- 6) 순이익 +1.45 = 32.7px -->
    <rect x="840" y="207" width="120" height="33" fill="#60a5fa"/>
    <text x="900" y="200" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">+1.45</text>
    <text x="900" y="455" fill="#94a3b8" font-size="12" text-anchor="middle">당기순이익</text>
    <text x="900" y="472" fill="#64748b" font-size="11" text-anchor="middle">영업활동현금흐름 4.29조</text>
  </g>

  <!-- Bottom explanation -->
  <g transform="translate(80, 600)">
    <rect width="1040" height="100" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="32" fill="#fbbf24" font-size="15" font-weight="700">왜 2024년만 유독 큰가</text>
    <text x="30" y="58" fill="#94a3b8" font-size="12">① 수주잔고 자체 확장 (2020 말 $200억 → 2024 말 $475억, 2.4배) — 같은 환율 변동도 절대금액이 2배 커짐</text>
    <text x="30" y="80" fill="#94a3b8" font-size="12">② 2024 원달러 환율 +15.5% (1,275→1,472원) — 외환위기 이후 드문 변동폭. 평가손익 양쪽이 동시에 튀어오름</text>
    <text x="580" y="58" fill="#22c55e" font-size="12" font-weight="700">교훈: 조선 지주는 영업이익보다 영업활동현금흐름을 먼저 읽어야 한다</text>
    <text x="580" y="80" fill="#64748b" font-size="11">2024 OCF 4.29조 (순이익 1.45조의 약 3배) — 환율 잡음 지우면 진짜 성과 보임</text>
  </g>
</svg>
