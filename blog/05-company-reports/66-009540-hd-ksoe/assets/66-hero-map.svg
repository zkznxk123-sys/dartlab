<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="heroTitle heroDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="heroTitle">HD한국조선해양 — 세 개의 조선소가 한 지주 아래</title>
  <desc id="heroDesc">지주 영업이익률 13%가 상장 자회사보다 높은 이유 — 비상장 HD현대삼호가 이익의 핵심 엔진.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="30" font-weight="700">HD한국조선해양 — 이익의 진짜 엔진은 어디인가</text>
  <text x="60" y="92" fill="#64748b" font-size="16">지주 OPM 13.04% &gt; 자회사 HD현대중공업 11.6% — 그 격차를 만드는 한 회사</text>

  <g>
    <rect x="60" y="130" width="1080" height="70" fill="#1e293b" stroke="#334155"/>
    <text x="90" y="158" fill="#f1f5f9" font-size="20" font-weight="700">최상위 지주  HD현대 (267250)</text>
    <text x="90" y="180" fill="#94a3b8" font-size="14">정기선 회장 — 조선·에너지·전력·건설기계·로보틱스 포트폴리오 보유</text>
    <text x="950" y="158" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="end">지분 35.05%</text>
    <text x="950" y="180" fill="#64748b" font-size="12" text-anchor="end">HD현대 → HD한국조선해양</text>
  </g>

  <path d="M 600 200 L 600 240" stroke="#475569" stroke-width="2"/>
  <path d="M 595 238 L 600 248 L 605 238 Z" fill="#475569"/>

  <g>
    <rect x="60" y="250" width="1080" height="80" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="90" y="280" fill="#22c55e" font-size="22" font-weight="700">중간지주  HD한국조선해양 (009540)</text>
    <text x="90" y="304" fill="#f1f5f9" font-size="15">2025 연결 매출 29.93조  ·  영업이익 3.90조  ·  영업이익률 13.04%  ·  ROIC 24.35%</text>
    <text x="950" y="304" fill="#64748b" font-size="13" text-anchor="end">dCR-AA-  ·  순현금 3.7조</text>
  </g>

  <path d="M 260 330 L 260 380" stroke="#475569" stroke-width="2"/>
  <path d="M 255 378 L 260 388 L 265 378 Z" fill="#475569"/>
  <path d="M 600 330 L 600 380" stroke="#475569" stroke-width="2"/>
  <path d="M 595 378 L 600 388 L 605 378 Z" fill="#475569"/>
  <path d="M 940 330 L 940 380" stroke="#fbbf24" stroke-width="3"/>
  <path d="M 935 378 L 940 390 L 945 378 Z" fill="#fbbf24"/>

  <g>
    <rect x="80" y="390" width="360" height="240" fill="#1e293b" stroke="#334155"/>
    <text x="110" y="420" fill="#f1f5f9" font-size="17" font-weight="700">HD현대중공업 (329180)</text>
    <text x="110" y="443" fill="#60a5fa" font-size="13">상장  ·  지주 지분 78.02%</text>
    <line x1="110" y1="455" x2="420" y2="455" stroke="#334155"/>
    <text x="110" y="480" fill="#f1f5f9" font-size="14">매출 17.58조 (59%)</text>
    <text x="110" y="504" fill="#f1f5f9" font-size="14">영업이익 2.04조</text>
    <text x="110" y="528" fill="#f1f5f9" font-size="14">영업이익률 11.6%</text>
    <line x1="110" y1="540" x2="420" y2="540" stroke="#334155"/>
    <text x="110" y="564" fill="#94a3b8" font-size="12">LNG선·VLCC·컨테이너선</text>
    <text x="110" y="582" fill="#94a3b8" font-size="12">해양플랜트·잠수함·엔진</text>
    <text x="110" y="610" fill="#64748b" font-size="11">울산 9개 도크 — 풀라인업 조선소</text>
  </g>

  <g>
    <rect x="460" y="390" width="280" height="240" fill="#1e293b" stroke="#334155"/>
    <text x="490" y="420" fill="#f1f5f9" font-size="17" font-weight="700">HD현대미포 (010620)</text>
    <text x="490" y="443" fill="#60a5fa" font-size="13">상장  ·  지주 지분 42.38%</text>
    <line x1="490" y1="455" x2="720" y2="455" stroke="#334155"/>
    <text x="490" y="480" fill="#f1f5f9" font-size="14">매출 약 4조 (13%)</text>
    <text x="490" y="504" fill="#f1f5f9" font-size="14">영업이익 약 0.2조</text>
    <text x="490" y="528" fill="#f1f5f9" font-size="14">영업이익률 약 5%</text>
    <line x1="490" y1="540" x2="720" y2="540" stroke="#334155"/>
    <text x="490" y="564" fill="#94a3b8" font-size="12">PC선(석유화학제품운반)</text>
    <text x="490" y="582" fill="#94a3b8" font-size="12">중형 컨테이너선·LPG선</text>
    <text x="490" y="610" fill="#64748b" font-size="11">울산 4개 도크 — 중형·특수</text>
  </g>

  <g>
    <rect x="760" y="390" width="360" height="240" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <text x="790" y="420" fill="#fbbf24" font-size="17" font-weight="700">HD현대삼호  ⟵  이익의 진짜 엔진</text>
    <text x="790" y="443" fill="#fbbf24" font-size="13">비상장  ·  지주 지분 80%+</text>
    <line x1="790" y1="455" x2="1100" y2="455" stroke="#475569"/>
    <text x="790" y="480" fill="#fbbf24" font-size="14">매출 약 7.9조 추정 (27%)</text>
    <text x="790" y="504" fill="#fbbf24" font-size="14">영업이익 약 1.6조 추정</text>
    <text x="790" y="528" fill="#fbbf24" font-size="14">영업이익률 18~22% 추정</text>
    <line x1="790" y1="540" x2="1100" y2="540" stroke="#475569"/>
    <text x="790" y="564" fill="#f1f5f9" font-size="12">VLCC·LNG선·컨테이너선·LPG선</text>
    <text x="790" y="582" fill="#f1f5f9" font-size="12">해양플랜트·방산 없음 — 깨끗한 포트폴리오</text>
    <text x="790" y="610" fill="#94a3b8" font-size="11">영암 2개 초대형 도크 — 고마진 상선 특화</text>
  </g>

  <g>
    <rect x="60" y="660" width="1080" height="40" fill="none"/>
    <text x="600" y="685" fill="#94a3b8" font-size="14" text-anchor="middle">지주 연결 영업이익 3.90조 = HD현대중공업 2.04 + HD현대미포 약 0.2 + <tspan fill="#fbbf24" font-weight="700">HD현대삼호 약 1.6 (41%)</tspan> + 본사 조정</text>
  </g>
</svg>
