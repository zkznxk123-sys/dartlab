<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" role="img" aria-labelledby="cascadeTitle cascadeDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="cascadeTitle">지분 캐스케이드 — 조선에서 번 3.9조가 네 주머니로 나뉘는 4단계</title>
  <desc id="cascadeDesc">HD현대 35% → 지주 → 자회사 3사 → 비지배주주 21%. 각 단계에서 지분율이 돈의 흐름을 자른다.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">지분 캐스케이드 — 4단계를 흐르는 영업이익 3.90조</text>
  <text x="60" y="90" fill="#64748b" font-size="15">조선소에서 배를 지어 번 돈이 어떻게 네 갈래로 잘려 나가는가</text>

  <!-- Level 4: Subsidiaries (bottom) -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="340" height="100" fill="#1e293b" stroke="#60a5fa"/>
    <text x="20" y="28" fill="#60a5fa" font-size="14" font-weight="700">HD현대중공업 (329180)</text>
    <text x="20" y="50" fill="#f1f5f9" font-size="13">2025 영업이익 2.04조</text>
    <text x="20" y="72" fill="#fbbf24" font-size="12">→ 외부주주 22% = 0.45조 유출</text>
    <text x="20" y="90" fill="#94a3b8" font-size="11">→ 지주 78% = 1.59조</text>

    <rect x="370" y="0" width="260" height="100" fill="#1e293b" stroke="#a78bfa"/>
    <text x="390" y="28" fill="#a78bfa" font-size="13" font-weight="700">HD현대미포 (010620)</text>
    <text x="390" y="50" fill="#f1f5f9" font-size="13">영업이익 약 0.2조 추정</text>
    <text x="390" y="72" fill="#fbbf24" font-size="12">→ 외부주주 57% = 0.11조</text>
    <text x="390" y="90" fill="#94a3b8" font-size="11">→ 지주 43% = 0.09조</text>

    <rect x="600" y="0" width="340" height="100" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="620" y="28" fill="#fbbf24" font-size="14" font-weight="700">HD현대삼호 (비상장)</text>
    <text x="620" y="50" fill="#f1f5f9" font-size="13">영업이익 약 1.6조 추정</text>
    <text x="620" y="72" fill="#94a3b8" font-size="12">→ 지주 80%+ = 약 1.30조</text>
    <text x="620" y="90" fill="#64748b" font-size="11">→ 외부주주 소수 (비상장)</text>

    <rect x="950" y="0" width="130" height="100" fill="#0f172a" stroke="#64748b"/>
    <text x="1015" y="32" fill="#64748b" font-size="12" font-weight="700" text-anchor="middle">본사·조정</text>
    <text x="1015" y="56" fill="#94a3b8" font-size="11" text-anchor="middle">+0.1조 내외</text>
    <text x="1015" y="76" fill="#64748b" font-size="10" text-anchor="middle">엔진·R&amp;D</text>
  </g>

  <!-- Arrows Level 4 → Level 3 -->
  <path d="M 230 640 L 230 580" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arr1)"/>
  <path d="M 500 640 L 500 580" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr2)"/>
  <path d="M 770 640 L 770 580" stroke="#fbbf24" stroke-width="3" marker-end="url(#arr3)"/>

  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/></marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/></marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/></marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/></marker>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
  </defs>

  <!-- Level 3: 중간지주 HD한국조선해양 -->
  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="1080" height="110" fill="#0f172a" stroke="#22c55e" stroke-width="2.5"/>
    <text x="30" y="30" fill="#22c55e" font-size="18" font-weight="700">HD한국조선해양 (009540) — 연결 영업이익 3.90조 수합</text>
    <text x="30" y="55" fill="#f1f5f9" font-size="14">지배주주 귀속 순이익 2.32조  ·  비지배주주 귀속 0.61조 (21%)</text>
    <text x="30" y="82" fill="#94a3b8" font-size="13">자본총계 16.91조  ·  부채비율 134%  ·  순현금 3.7조  ·  dCR-AA-</text>
    <text x="1050" y="100" fill="#64748b" font-size="11" text-anchor="end">자산 39.54조</text>
  </g>

  <!-- Arrow Level 3 → Level 2 -->
  <path d="M 600 460 L 600 400" stroke="#22c55e" stroke-width="3" marker-end="url(#arr4)"/>
  <text x="615" y="435" fill="#22c55e" font-size="12">지배주주 35.05%</text>
  <text x="615" y="452" fill="#94a3b8" font-size="11">= 0.81조 귀속</text>

  <!-- Level 2: HD현대 -->
  <g transform="translate(60, 290)">
    <rect x="0" y="0" width="1080" height="110" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="30" fill="#f1f5f9" font-size="17" font-weight="700">HD현대 (267250) — 최상위 지주</text>
    <text x="30" y="55" fill="#94a3b8" font-size="13">포트폴리오: 조선(009540 35%) + 오일뱅크(73.85%) + 일렉트릭(30.83%) + 건설기계 + 인프라코어 + 로보틱스</text>
    <text x="30" y="82" fill="#94a3b8" font-size="13">대표이사 회장: <tspan fill="#fbbf24" font-weight="700">정기선</tspan> (2024~)  ·  정몽준 전 회장의 장남  ·  그룹 전반의 자본배분 결정권</text>
  </g>

  <!-- Arrow Level 2 → Level 1 -->
  <path d="M 600 290 L 600 230" stroke="#f1f5f9" stroke-width="3"/>
  <text x="615" y="265" fill="#f1f5f9" font-size="12">일가·재단 약 30%</text>
  <text x="615" y="282" fill="#94a3b8" font-size="11">= 약 0.25조 최종 귀속</text>

  <!-- Level 1: 일가 -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="1080" height="80" fill="#1e293b" stroke="#fbbf24"/>
    <text x="30" y="32" fill="#fbbf24" font-size="16" font-weight="700">최대주주 일가 · 관련 재단</text>
    <text x="30" y="58" fill="#f1f5f9" font-size="13">정몽준 전 회장 + 정기선 회장 + 아산사회복지재단 + 아산나눔재단 — HD현대 통해 그룹 전체 지배</text>
  </g>

  <!-- Right-side outflow summary -->
  <g transform="translate(800, 150)">
    <rect x="0" y="0" width="340" height="80" fill="#0f172a" stroke="#ef4444"/>
    <text x="20" y="30" fill="#ef4444" font-size="14" font-weight="700">유출: 자회사 외부주주</text>
    <text x="20" y="55" fill="#94a3b8" font-size="12">329180 22% + 010620 57% = 약 0.56조</text>
    <text x="20" y="72" fill="#64748b" font-size="11">지주 연결에서 빠져나가는 비지배주주 몫</text>
  </g>
</svg>
