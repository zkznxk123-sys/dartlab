<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="splitTitle splitDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="splitTitle">009540 종목 변신 연혁 — 45년 단일 조선사 → 조선 지주</title>
  <desc id="splitDesc">2017 인적분할·2019 물적분할·2021 재상장·2022 브랜드 변경. 다섯 번의 분할과 상호변경을 거친 회사.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">009540 — 한 종목코드의 다섯 번 변신</text>
  <text x="60" y="90" fill="#64748b" font-size="15">현대중공업 → (인적분할) → 한국조선해양 (지주화) → HD한국조선해양. 1972~2023 51년 연혁.</text>

  <line x1="90" y1="360" x2="1140" y2="360" stroke="#475569" stroke-width="3"/>

  <g>
    <circle cx="130" cy="360" r="10" fill="#22c55e"/>
    <line x1="130" y1="350" x2="130" y2="180" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="130" y="170" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">1972.3</text>
    <text x="130" y="150" fill="#f1f5f9" font-size="13" text-anchor="middle">현대조선중공업</text>
    <text x="130" y="132" fill="#94a3b8" font-size="11" text-anchor="middle">설립</text>
    <text x="130" y="110" fill="#64748b" font-size="11" text-anchor="middle">정주영</text>
  </g>

  <g>
    <circle cx="280" cy="360" r="9" fill="#60a5fa"/>
    <text x="280" y="395" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">1983</text>
    <text x="280" y="415" fill="#f1f5f9" font-size="12" text-anchor="middle">증시 상장</text>
    <text x="280" y="433" fill="#94a3b8" font-size="11" text-anchor="middle">코드 009540</text>
  </g>

  <g>
    <circle cx="440" cy="360" r="9" fill="#ef4444"/>
    <text x="440" y="395" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2014~2016</text>
    <text x="440" y="415" fill="#f1f5f9" font-size="12" text-anchor="middle">3년 누적 적자</text>
    <text x="440" y="433" fill="#94a3b8" font-size="11" text-anchor="middle">해양플랜트 쇼크 5조</text>
    <text x="440" y="451" fill="#64748b" font-size="11" text-anchor="middle">구조조정 압박</text>
  </g>

  <g>
    <circle cx="580" cy="360" r="12" fill="#fbbf24"/>
    <line x1="580" y1="350" x2="580" y2="180" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="580" y="170" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">2017.4.1</text>
    <text x="580" y="150" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">인적분할 4사로</text>
    <text x="580" y="130" fill="#94a3b8" font-size="11" text-anchor="middle">존속: 현대중공업 (조선) 74.93%</text>
    <text x="580" y="112" fill="#94a3b8" font-size="11" text-anchor="middle">신설: 전기·건설기계·로보틱스</text>
    <text x="580" y="94" fill="#64748b" font-size="11" text-anchor="middle">매출 39.3조 → 15.5조 (-61%)</text>
  </g>

  <g>
    <circle cx="720" cy="360" r="12" fill="#22c55e"/>
    <text x="720" y="395" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">2019.6</text>
    <text x="720" y="415" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">물적분할 + 지주 전환</text>
    <text x="720" y="433" fill="#94a3b8" font-size="11" text-anchor="middle">009540 → 한국조선해양</text>
    <text x="720" y="451" fill="#94a3b8" font-size="11" text-anchor="middle">신설 현대중공업 (비상장)</text>
    <text x="720" y="469" fill="#64748b" font-size="11" text-anchor="middle">조선 3사 중간지주 체제</text>
  </g>

  <g>
    <circle cx="870" cy="360" r="12" fill="#60a5fa"/>
    <line x1="870" y1="350" x2="870" y2="180" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="870" y="170" fill="#60a5fa" font-size="14" font-weight="700" text-anchor="middle">2021.9</text>
    <text x="870" y="150" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">HD현대중공업 재상장</text>
    <text x="870" y="130" fill="#94a3b8" font-size="11" text-anchor="middle">코드 329180 · 공모가 60,000원</text>
    <text x="870" y="112" fill="#94a3b8" font-size="11" text-anchor="middle">시총 5.3조 → 2025 29조 (5배)</text>
    <text x="870" y="94" fill="#64748b" font-size="11" text-anchor="middle">지주 지분 100%→78% 희석</text>
  </g>

  <g>
    <circle cx="1010" cy="360" r="10" fill="#a78bfa"/>
    <text x="1010" y="395" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">2022.3</text>
    <text x="1010" y="415" fill="#f1f5f9" font-size="12" text-anchor="middle">"HD" 브랜드 리셋</text>
    <text x="1010" y="433" fill="#94a3b8" font-size="11" text-anchor="middle">HD한국조선해양으로</text>
    <text x="1010" y="451" fill="#94a3b8" font-size="11" text-anchor="middle">정기선 회장 체제 본격화</text>
  </g>

  <g>
    <circle cx="1120" cy="360" r="9" fill="#22c55e"/>
    <text x="1120" y="395" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">2025</text>
    <text x="1120" y="415" fill="#f1f5f9" font-size="12" text-anchor="middle">영업이익</text>
    <text x="1120" y="433" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">3.90조</text>
    <text x="1120" y="453" fill="#64748b" font-size="11" text-anchor="middle">사상 최대</text>
  </g>

  <g transform="translate(60, 530)">
    <rect width="1080" height="160" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="35" fill="#f1f5f9" font-size="16" font-weight="700">분할의 재무 흔적 — 2016 vs 2017 (Q4 스냅샷, 조원)</text>

    <text x="30" y="72" fill="#94a3b8" font-size="13">자산총계</text>
    <text x="260" y="72" fill="#f1f5f9" font-size="14" text-anchor="end">48.95</text>
    <text x="280" y="72" fill="#64748b" font-size="14">→</text>
    <text x="370" y="72" fill="#f1f5f9" font-size="14" text-anchor="end">30.41</text>
    <text x="450" y="72" fill="#ef4444" font-size="13" font-weight="700">-18.54조 이전</text>

    <text x="30" y="100" fill="#94a3b8" font-size="13">자본총계</text>
    <text x="260" y="100" fill="#f1f5f9" font-size="14" text-anchor="end">17.79</text>
    <text x="280" y="100" fill="#64748b" font-size="14">→</text>
    <text x="370" y="100" fill="#f1f5f9" font-size="14" text-anchor="end">12.37</text>
    <text x="450" y="100" fill="#ef4444" font-size="13" font-weight="700">-5.42조 이전</text>

    <text x="30" y="128" fill="#94a3b8" font-size="13">매출액 (1년치)</text>
    <text x="260" y="128" fill="#f1f5f9" font-size="14" text-anchor="end">39.32</text>
    <text x="280" y="128" fill="#64748b" font-size="14">→</text>
    <text x="370" y="128" fill="#f1f5f9" font-size="14" text-anchor="end">15.47</text>
    <text x="450" y="128" fill="#ef4444" font-size="13" font-weight="700">-23.85조 (-61%)</text>

    <text x="620" y="72" fill="#fbbf24" font-size="13" font-weight="700">2017 당기순이익 2.69조</text>
    <text x="620" y="94" fill="#94a3b8" font-size="12">영업이익은 146억(거의 0)</text>
    <text x="620" y="114" fill="#94a3b8" font-size="12">→ 분할 회계상 처분이익이 대부분</text>
    <text x="620" y="138" fill="#64748b" font-size="11">경고: 2017 순이익을 "실적"으로 읽으면 안 됨</text>
  </g>
</svg>
