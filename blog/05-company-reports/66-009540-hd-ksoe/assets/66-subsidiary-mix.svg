<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" role="img" aria-labelledby="subTitle subDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="subTitle">자회사 3사 매출·영업이익·지주귀속 분해 — 비상장 HD현대삼호의 기여</title>
  <desc id="subDesc">지주 연결 영업이익 3.9조 중 HD현대삼호가 약 41%를 차지하는 구조.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">자회사 3사 — 매출 vs 영업이익 기여도</text>
  <text x="60" y="90" fill="#64748b" font-size="15">매출 규모는 HD현대중공업이 크지만, 이익률은 HD현대삼호가 가장 높다</text>

  <!-- Row 1: Revenue share -->
  <text x="60" y="160" fill="#f1f5f9" font-size="18" font-weight="700">매출 구성 (2025 연결 29.93조)</text>
  <g transform="translate(60, 180)">
    <rect x="0" y="0" width="660" height="60" fill="#60a5fa"/>
    <rect x="660" y="0" width="150" height="60" fill="#a78bfa"/>
    <rect x="810" y="0" width="300" height="60" fill="#fbbf24"/>
    <rect x="1110" y="0" width="30" height="60" fill="#64748b"/>

    <text x="330" y="28" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">HD현대중공업 (329180)</text>
    <text x="330" y="48" fill="#0a0e1a" font-size="13" text-anchor="middle">17.58조 · 59%</text>

    <text x="735" y="28" fill="#0a0e1a" font-size="12" font-weight="700" text-anchor="middle">HD현대미포</text>
    <text x="735" y="48" fill="#0a0e1a" font-size="11" text-anchor="middle">약 4조 · 13%</text>

    <text x="960" y="28" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">HD현대삼호 + 본사 조정</text>
    <text x="960" y="48" fill="#0a0e1a" font-size="13" text-anchor="middle">약 8.4조 · 28%</text>
  </g>

  <!-- Row 2: Operating income share -->
  <text x="60" y="310" fill="#f1f5f9" font-size="18" font-weight="700">영업이익 기여 (2025 연결 3.90조)</text>
  <g transform="translate(60, 330)">
    <rect x="0" y="0" width="520" height="60" fill="#60a5fa"/>
    <rect x="520" y="0" width="58" height="60" fill="#a78bfa"/>
    <rect x="578" y="0" width="480" height="60" fill="#fbbf24"/>
    <rect x="1058" y="0" width="82" height="60" fill="#64748b"/>

    <text x="260" y="28" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">HD현대중공업</text>
    <text x="260" y="48" fill="#0a0e1a" font-size="13" text-anchor="middle">2.04조 · 52%</text>

    <text x="549" y="28" fill="#0a0e1a" font-size="10" font-weight="700" text-anchor="middle">미포</text>
    <text x="549" y="46" fill="#0a0e1a" font-size="10" text-anchor="middle">0.15 · 4%</text>

    <text x="818" y="28" fill="#0a0e1a" font-size="16" font-weight="700" text-anchor="middle">HD현대삼호 (추정)</text>
    <text x="818" y="50" fill="#0a0e1a" font-size="13" text-anchor="middle">약 1.6조 · 41%</text>

    <text x="1099" y="28" fill="#f1f5f9" font-size="11" text-anchor="middle">본사</text>
    <text x="1099" y="46" fill="#f1f5f9" font-size="10" text-anchor="middle">+0.1조</text>
  </g>

  <!-- Row 3: Operating margin comparison -->
  <text x="60" y="460" fill="#f1f5f9" font-size="18" font-weight="700">영업이익률 (%)</text>
  <g transform="translate(60, 480)">
    <!-- scale: 0~25% over 700px, 1% = 28px -->
    <line x1="0" y1="200" x2="700" y2="200" stroke="#334155"/>

    <!-- HD현대중공업 11.6% -->
    <rect x="0" y="76" width="325" height="30" fill="#60a5fa"/>
    <text x="330" y="96" fill="#60a5fa" font-size="14" font-weight="700">11.6%</text>
    <text x="0" y="66" fill="#94a3b8" font-size="13">HD현대중공업</text>

    <!-- HD현대미포 약 5% -->
    <rect x="0" y="126" width="140" height="30" fill="#a78bfa"/>
    <text x="145" y="146" fill="#a78bfa" font-size="14" font-weight="700">약 5%</text>
    <text x="0" y="116" fill="#94a3b8" font-size="13">HD현대미포</text>

    <!-- HD현대삼호 20% 추정 -->
    <rect x="0" y="176" width="560" height="30" fill="#fbbf24"/>
    <text x="565" y="196" fill="#fbbf24" font-size="14" font-weight="700">18~22% 추정</text>
    <text x="0" y="166" fill="#fbbf24" font-size="13" font-weight="700">HD현대삼호 (비상장)</text>

    <!-- 지주 연결 13.04% -->
    <rect x="0" y="26" width="365" height="30" fill="#22c55e"/>
    <text x="370" y="46" fill="#22c55e" font-size="14" font-weight="700">13.04%</text>
    <text x="0" y="16" fill="#22c55e" font-size="13" font-weight="700">HD한국조선해양 (지주 연결)</text>
  </g>

  <!-- Bottom key insight -->
  <g transform="translate(60, 720)">
    <rect width="1080" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="35" fill="#fbbf24" font-size="16" font-weight="700">핵심: 지주 OPM 13% &gt; 자회사 HD현대중공업 11.6%</text>
    <text x="30" y="60" fill="#f1f5f9" font-size="13">비상장 HD현대삼호가 매출 28%로 영업이익의 41%를 만든다 → 연결 마진을 상장 자회사 단독 대비 1.4%p 끌어올림</text>
    <text x="30" y="78" fill="#64748b" font-size="12">포트폴리오 구조: 해양·방산 포함 풀라인업(329180) + 중형 특수(010620) + 고마진 상선 특화(삼호) 3갈래 분업</text>
  </g>
</svg>
