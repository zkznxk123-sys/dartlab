<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="verdictTitle verdictDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="verdictTitle">판단 요약 — 이익 3.9조의 4갈래 분배 + 2026 체크포인트 4개</title>
  <desc id="verdictDesc">영업이익 3.9조가 4개 주머니로 나뉘는 구조와, 다음 사이클의 방향을 결정할 4가지 신호.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">2026년에 봐야 할 한 줄 — 이익의 주인이 바뀌는 신호</text>
  <text x="60" y="90" fill="#64748b" font-size="15">3.9조가 흐르는 4갈래와, 이 구조가 흔들릴 4개 포인트</text>

  <!-- Left: 이익 분배 -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="560" height="540" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="20" y="35" fill="#22c55e" font-size="18" font-weight="700">영업이익 3.90조의 4갈래 분배</text>
    <text x="20" y="58" fill="#64748b" font-size="12">지배주주 귀속 순이익 2.32조 기준 분해</text>

    <!-- Bar diagram -->
    <g transform="translate(20, 90)">
      <!-- Total bar -->
      <rect x="0" y="0" width="520" height="60" fill="#0f172a" stroke="#334155"/>
      <text x="10" y="28" fill="#fbbf24" font-size="14" font-weight="700">100% = 순이익 2.32조 + 비지배귀속 0.61조 = 영업이익 3.9조 경로</text>

      <!-- Cascade -->
      <g transform="translate(0, 90)">
        <rect x="0" y="0" width="100" height="50" fill="#ef4444"/>
        <text x="50" y="22" fill="#f1f5f9" font-size="11" font-weight="700" text-anchor="middle">329180</text>
        <text x="50" y="38" fill="#f1f5f9" font-size="11" text-anchor="middle">외부 22%</text>
        <text x="50" y="65" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">0.45조</text>

        <rect x="110" y="0" width="40" height="50" fill="#ef4444" opacity="0.7"/>
        <text x="130" y="22" fill="#f1f5f9" font-size="10" font-weight="700" text-anchor="middle">010620</text>
        <text x="130" y="38" fill="#f1f5f9" font-size="10" text-anchor="middle">57%</text>
        <text x="130" y="65" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">0.11조</text>

        <rect x="160" y="0" width="240" height="50" fill="#60a5fa"/>
        <text x="280" y="22" fill="#0a0e1a" font-size="13" font-weight="700" text-anchor="middle">지주 009540 일반주주</text>
        <text x="280" y="38" fill="#0a0e1a" font-size="12" text-anchor="middle">63.36%</text>
        <text x="280" y="65" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">1.47조</text>

        <rect x="410" y="0" width="110" height="50" fill="#fbbf24"/>
        <text x="465" y="22" fill="#0a0e1a" font-size="11" font-weight="700" text-anchor="middle">최대주주 일가</text>
        <text x="465" y="38" fill="#0a0e1a" font-size="11" text-anchor="middle">(HD현대 경유)</text>
        <text x="465" y="65" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">0.81조</text>
      </g>

      <!-- Labels -->
      <g transform="translate(0, 200)">
        <text x="0" y="0" fill="#f1f5f9" font-size="13" font-weight="700">유출 경로 (조선소 → 네 주머니)</text>
        <text x="0" y="26" fill="#ef4444" font-size="12">① 329180 외부주주 22%  ·  0.45조</text>
        <text x="0" y="48" fill="#ef4444" font-size="12">② 010620 외부주주 57%  ·  0.11조</text>
        <text x="0" y="70" fill="#60a5fa" font-size="12">③ 009540 일반주주 63.36%  ·  1.47조</text>
        <text x="0" y="92" fill="#fbbf24" font-size="12">④ HD현대 경유 일가  ·  0.81조</text>
        <text x="0" y="120" fill="#94a3b8" font-size="12">합계 = 3.9조 - 비조선 본사 이익 차이 - 세금</text>
      </g>

      <g transform="translate(0, 340)">
        <rect x="0" y="0" width="520" height="90" fill="#0a0e1a" stroke="#fbbf24"/>
        <text x="20" y="30" fill="#fbbf24" font-size="14" font-weight="700">핵심 — 지주 주주가 가장 많이 받는 구조</text>
        <text x="20" y="55" fill="#94a3b8" font-size="12">비지배주주 21%가 빠져나간 뒤에도 지주 주주(일가+일반)가 2.28조를 나눠 가짐</text>
        <text x="20" y="75" fill="#64748b" font-size="11">조선업 상장사 중 지주 구조가 가장 투명하게 정리된 축</text>
      </g>
    </g>
  </g>

  <!-- Right: 2026 체크포인트 -->
  <g transform="translate(660, 140)">
    <rect x="0" y="0" width="480" height="540" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="20" y="35" fill="#fbbf24" font-size="18" font-weight="700">2026~2027 체크포인트 4개</text>
    <text x="20" y="58" fill="#64748b" font-size="12">이 신호들이 "이익의 주인"을 바꾼다</text>

    <g transform="translate(20, 90)">
      <!-- 1 -->
      <rect x="0" y="0" width="440" height="90" fill="#0f172a" stroke="#22c55e"/>
      <text x="20" y="25" fill="#22c55e" font-size="15" font-weight="700">1. HD현대삼호 IPO 여부</text>
      <text x="20" y="48" fill="#f1f5f9" font-size="12">비상장 엔진의 가치 현실화 이벤트</text>
      <text x="20" y="68" fill="#94a3b8" font-size="11">2019~20 한 차례 보류 → 이익률 18~22%에서 재추진 시</text>
      <text x="20" y="84" fill="#94a3b8" font-size="11">지주 주주에게 자본이익 가능</text>

      <!-- 2 -->
      <rect x="0" y="110" width="440" height="90" fill="#0f172a" stroke="#60a5fa"/>
      <text x="20" y="135" fill="#60a5fa" font-size="15" font-weight="700">2. Clarksons 지수 180pt 유지</text>
      <text x="20" y="158" fill="#f1f5f9" font-size="12">박스권 이탈 시 2028~29 이익 꺾임</text>
      <text x="20" y="178" fill="#94a3b8" font-size="11">2025 상반기 발주량 -30~40% 감소 조짐</text>
      <text x="20" y="194" fill="#94a3b8" font-size="11">175~185pt 유지 = 고마진 수명 연장</text>

      <!-- 3 -->
      <rect x="0" y="220" width="440" height="90" fill="#0f172a" stroke="#a78bfa"/>
      <text x="20" y="245" fill="#a78bfa" font-size="15" font-weight="700">3. LNG 재수주 점유율</text>
      <text x="20" y="268" fill="#f1f5f9" font-size="12">QatarEnergy 200척 확장의 과반 확보</text>
      <text x="20" y="288" fill="#94a3b8" font-size="11">ExxonMobil·Shell 장기계약 경쟁</text>
      <text x="20" y="304" fill="#94a3b8" font-size="11">목표 50%+ 유지 시 2030년대 파이프라인</text>

      <!-- 4 -->
      <rect x="0" y="330" width="440" height="90" fill="#0f172a" stroke="#fbbf24"/>
      <text x="20" y="355" fill="#fbbf24" font-size="15" font-weight="700">4. 환율 파생 방향성</text>
      <text x="20" y="378" fill="#f1f5f9" font-size="12">2024 +15.5% 급등이 2026 안정화 시</text>
      <text x="20" y="398" fill="#94a3b8" font-size="11">금융수익 감소로 세전이익 영업이익 대비 낮아질 수</text>
      <text x="20" y="414" fill="#94a3b8" font-size="11">→ 영업활동현금흐름을 판단 기준으로</text>
    </g>

    <g transform="translate(20, 470)">
      <text x="0" y="0" fill="#22c55e" font-size="12" font-weight="700">이 4가지가 "다음에 이익을 누가 가져가는가"를 결정</text>
      <text x="0" y="22" fill="#94a3b8" font-size="11">지주 할인 해소 → 일반주주 귀속 증가</text>
      <text x="0" y="40" fill="#94a3b8" font-size="11">고정 분배 → 자회사 외부주주·최상위 지주 유지</text>
    </g>
  </g>
</svg>
