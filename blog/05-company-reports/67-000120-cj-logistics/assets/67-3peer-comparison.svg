<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="peer3Title peer3Desc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="peer3Title">물류 3사 — 현대글로비스·CJ대한통운·한진의 세 가지 구조</title>
  <desc id="peer3Desc">캡티브 65%·15%·5% 차이가 OPM 7%·4%·3.7%로 귀결되는 구조.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">물류 3사 — 캡티브 비중이 OPM을 결정한다</text>
  <text x="60" y="90" fill="#64748b" font-size="15">현대글로비스 OPM 7% vs CJ대한통운 4% vs 한진 3.7%의 격차를 설명하는 한 변수</text>

  <!-- OPM bar comparison -->
  <g transform="translate(60, 140)">
    <text x="0" y="0" fill="#f1f5f9" font-size="17" font-weight="700">2025 영업이익률 비교</text>
    <line x1="0" y1="240" x2="1080" y2="240" stroke="#334155"/>

    <!-- scale 0~8% -->
    <line x1="135" y1="0" x2="135" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="270" y1="0" x2="270" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="405" y1="0" x2="405" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="540" y1="0" x2="540" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="675" y1="0" x2="675" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="810" y1="0" x2="810" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="945" y1="0" x2="945" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>

    <text x="135" y="258" fill="#64748b" font-size="10" text-anchor="middle">1%</text>
    <text x="270" y="258" fill="#64748b" font-size="10" text-anchor="middle">2%</text>
    <text x="405" y="258" fill="#64748b" font-size="10" text-anchor="middle">3%</text>
    <text x="540" y="258" fill="#64748b" font-size="10" text-anchor="middle">4%</text>
    <text x="675" y="258" fill="#64748b" font-size="10" text-anchor="middle">5%</text>
    <text x="810" y="258" fill="#64748b" font-size="10" text-anchor="middle">6%</text>
    <text x="945" y="258" fill="#64748b" font-size="10" text-anchor="middle">7%</text>

    <!-- 현대글로비스 7.01% = 946 -->
    <rect x="180" y="20" width="946" height="50" fill="#fbbf24"/>
    <text x="10" y="50" fill="#fbbf24" font-size="14" font-weight="700">현대글로비스 (086280)</text>
    <text x="1140" y="50" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="end">7.01%</text>

    <!-- CJ대한통운 4.14% = 559 -->
    <rect x="180" y="90" width="559" height="50" fill="#22c55e"/>
    <text x="10" y="120" fill="#22c55e" font-size="14" font-weight="700">CJ대한통운 (000120)</text>
    <text x="745" y="120" fill="#22c55e" font-size="18" font-weight="700">4.14%</text>

    <!-- 한진 3.66% = 494 -->
    <rect x="180" y="160" width="494" height="50" fill="#ef4444"/>
    <text x="10" y="190" fill="#ef4444" font-size="14" font-weight="700">한진 (002320)</text>
    <text x="685" y="190" fill="#ef4444" font-size="18" font-weight="700">3.66%</text>
  </g>

  <!-- Captive ratio column comparison -->
  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="1080" height="240" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="35" fill="#f1f5f9" font-size="17" font-weight="700">캡티브(계열사 내부 거래) 비중이 OPM을 결정한다</text>

    <g transform="translate(30, 60)">
      <rect x="0" y="0" width="320" height="150" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <text x="20" y="30" fill="#fbbf24" font-size="15" font-weight="700">현대글로비스 — 캡티브 65%</text>
      <text x="20" y="55" fill="#f1f5f9" font-size="13">현대차·기아 완성차 물류 독점</text>
      <text x="20" y="76" fill="#94a3b8" font-size="12">+ PCTC 자동차운반선 자체 운영</text>
      <text x="20" y="96" fill="#94a3b8" font-size="12">+ 내부 가격 정책 유리</text>
      <text x="20" y="118" fill="#fbbf24" font-size="12" font-weight="700">→ 외부 경쟁 최소</text>
      <text x="20" y="138" fill="#fbbf24" font-size="12" font-weight="700">→ OPM 7%대 안착</text>
    </g>

    <g transform="translate(380, 60)">
      <rect x="0" y="0" width="320" height="150" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
      <text x="20" y="30" fill="#22c55e" font-size="15" font-weight="700">CJ대한통운 — 캡티브 15%</text>
      <text x="20" y="55" fill="#f1f5f9" font-size="13">CJ제일제당·올리브영·ENM 물류</text>
      <text x="20" y="76" fill="#94a3b8" font-size="12">+ 외부 택배·계약물류·글로벌 85%</text>
      <text x="20" y="96" fill="#94a3b8" font-size="12">+ 쿠팡·네이버 압박 노출</text>
      <text x="20" y="118" fill="#22c55e" font-size="12" font-weight="700">→ 경쟁 시장 정면 노출</text>
      <text x="20" y="138" fill="#22c55e" font-size="12" font-weight="700">→ OPM 4%대 천장</text>
    </g>

    <g transform="translate(730, 60)">
      <rect x="0" y="0" width="320" height="150" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
      <text x="20" y="30" fill="#ef4444" font-size="15" font-weight="700">한진 — 캡티브 5% 미만</text>
      <text x="20" y="55" fill="#f1f5f9" font-size="13">한진그룹 내부 물량 미미</text>
      <text x="20" y="76" fill="#94a3b8" font-size="12">+ 순수 외부 택배·포워딩</text>
      <text x="20" y="96" fill="#94a3b8" font-size="12">+ 규모 CJ의 25%</text>
      <text x="20" y="118" fill="#ef4444" font-size="12" font-weight="700">→ 규모·캡티브 둘 다 없음</text>
      <text x="20" y="138" fill="#ef4444" font-size="12" font-weight="700">→ OPM 3.7% 바닥 근접</text>
    </g>
  </g>
</svg>
