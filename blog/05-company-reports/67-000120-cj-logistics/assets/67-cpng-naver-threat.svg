<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="threatTitle threatDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="threatTitle">매출 정체의 3대 외부 요인 — 쿠팡·네이버·C커머스가 택배 시장을 바꾼 방식</title>
  <desc id="threatDesc">한국 택배 물동량은 늘어나는데 CJ대한통운 매출이 멈춘 이유를 3요인으로 분해.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">매출 정체의 정체 — 시장은 커졌지만 점유율이 까였다</text>
  <text x="60" y="90" fill="#64748b" font-size="15">2018 25.4억 → 2024 53억 박스 (+109%), 그런데 CJ 매출은 2022부터 정체</text>

  <!-- Left column: market growth chart -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="520" height="300" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="30" fill="#f1f5f9" font-size="16" font-weight="700">한국 택배 시장 물동량 (억 박스)</text>

    <line x1="60" y1="270" x2="500" y2="270" stroke="#334155"/>
    <!-- scale 0~55 at 270-30=240px. so 1억=4.36 -->
    <rect x="80" y="159" width="50" height="111" fill="#60a5fa" opacity="0.7"/>
    <text x="105" y="150" fill="#60a5fa" font-size="11" text-anchor="middle">25.4</text>
    <text x="105" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">2018</text>

    <rect x="160" y="135" width="50" height="135" fill="#60a5fa" opacity="0.7"/>
    <text x="185" y="126" fill="#60a5fa" font-size="11" text-anchor="middle">31.0</text>
    <text x="185" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">2020</text>

    <rect x="240" y="90" width="50" height="180" fill="#60a5fa" opacity="0.7"/>
    <text x="265" y="81" fill="#60a5fa" font-size="11" text-anchor="middle">41.3</text>
    <text x="265" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">2022</text>

    <rect x="320" y="70" width="50" height="200" fill="#60a5fa" opacity="0.7"/>
    <text x="345" y="61" fill="#60a5fa" font-size="11" text-anchor="middle">47.2</text>
    <text x="345" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">2023</text>

    <rect x="400" y="43" width="50" height="227" fill="#22c55e"/>
    <text x="425" y="34" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">53.0</text>
    <text x="425" y="288" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">2024</text>
  </g>

  <!-- Right column: CJ 매출 flat line -->
  <g transform="translate(620, 140)">
    <rect x="0" y="0" width="520" height="300" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="30" fill="#f1f5f9" font-size="16" font-weight="700">CJ대한통운 매출 (조원) — 2022부터 플랫</text>

    <line x1="60" y1="270" x2="500" y2="270" stroke="#334155"/>
    <!-- scale 0~13 at 270-30=240px. so 1조=18.5 -->
    <rect x="80" y="99" width="50" height="171" fill="#a78bfa" opacity="0.5"/>
    <text x="105" y="90" fill="#a78bfa" font-size="11" text-anchor="middle">9.22</text>
    <text x="105" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">2018</text>

    <rect x="160" y="68" width="50" height="202" fill="#a78bfa" opacity="0.6"/>
    <text x="185" y="59" fill="#a78bfa" font-size="11" text-anchor="middle">10.78</text>
    <text x="185" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">2020</text>

    <rect x="240" y="46" width="50" height="224" fill="#a78bfa" opacity="0.8"/>
    <text x="265" y="37" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">12.13</text>
    <text x="265" y="288" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">2022</text>

    <rect x="320" y="52" width="50" height="218" fill="#ef4444" opacity="0.8"/>
    <text x="345" y="43" fill="#ef4444" font-size="11" text-anchor="middle">11.77</text>
    <text x="345" y="288" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">2023</text>

    <rect x="400" y="43" width="50" height="227" fill="#60a5fa" opacity="0.9"/>
    <text x="425" y="34" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">12.28</text>
    <text x="425" y="288" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">2025</text>

    <line x1="275" y1="30" x2="425" y2="30" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="350" y="22" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">+1.2% 3년 정체</text>
  </g>

  <!-- Bottom: 3 threat factors -->
  <g transform="translate(60, 470)">
    <rect x="0" y="0" width="340" height="230" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="35" fill="#ef4444" font-size="16" font-weight="700">요인 1 — 쿠팡 자체 배송</text>
    <text x="20" y="62" fill="#f1f5f9" font-size="13">쿠팡친구 + 로켓배송</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">매출 20조(2022)→31조(2024), +11조</text>
    <text x="20" y="108" fill="#94a3b8" font-size="12">이 증가분의 99%가 자체 물류</text>
    <text x="20" y="128" fill="#94a3b8" font-size="12">→ CJ 기회손실 1.5~2조 추정</text>
    <text x="20" y="160" fill="#ef4444" font-size="13" font-weight="700">효과 — 외부 물류 시장 축소</text>
    <text x="20" y="180" fill="#64748b" font-size="11">한국 택배업계에서 쿠팡은 시장에</text>
    <text x="20" y="198" fill="#64748b" font-size="11">집계되지 않는 "블랙홀"로 작동</text>
  </g>

  <g transform="translate(430, 470)">
    <rect x="0" y="0" width="340" height="230" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="20" y="35" fill="#a78bfa" font-size="16" font-weight="700">요인 2 — 네이버 단가 압박</text>
    <text x="20" y="62" fill="#f1f5f9" font-size="13">스마트스토어 + CJ 파트너십</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">2020 2,500원 → 2024 1,800원</text>
    <text x="20" y="108" fill="#94a3b8" font-size="12">평균 배송단가 -28%</text>
    <text x="20" y="128" fill="#94a3b8" font-size="12">→ 물량 늘어도 매출 상쇄</text>
    <text x="20" y="160" fill="#a78bfa" font-size="13" font-weight="700">효과 — 단가 하방 압력</text>
    <text x="20" y="180" fill="#64748b" font-size="11">네이버가 가격 결정권 보유</text>
    <text x="20" y="198" fill="#64748b" font-size="11">2023 단가 -7% 협상 타결</text>
  </g>

  <g transform="translate(800, 470)">
    <rect x="0" y="0" width="340" height="230" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="20" y="35" fill="#fbbf24" font-size="16" font-weight="700">요인 3 — 알리·테무·쉬인</text>
    <text x="20" y="62" fill="#f1f5f9" font-size="13">해외 직구 소형 택배</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">2024 1.3억 건, 단가 1,500원</text>
    <text x="20" y="108" fill="#94a3b8" font-size="12">객단가 2만원급 소형 물량</text>
    <text x="20" y="128" fill="#94a3b8" font-size="12">→ "작은 박스"에 마진 없음</text>
    <text x="20" y="160" fill="#fbbf24" font-size="13" font-weight="700">효과 — 물량↑ 수익률↓</text>
    <text x="20" y="180" fill="#64748b" font-size="11">2023 매출 -2.9% 역성장의</text>
    <text x="20" y="198" fill="#64748b" font-size="11">글로벌 포워딩 부문 -0.4조 기여</text>
  </g>
</svg>
