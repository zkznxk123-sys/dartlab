<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="debtTitle debtDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="debtTitle">순차입금 1.6조와 금융비용 2,617억의 관계 — 영업이익 51%를 삼키는 구조</title>
  <desc id="debtDesc">2013 CJ 편입 당시 차입의 12년 이월 잔존이 오늘 이자로 나타나는 구조.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">금융비용 2,617억 — 12년째 이월되는 2011년 인수 차입</text>
  <text x="60" y="90" fill="#64748b" font-size="15">OP 5,081억 → 금융비용 2,617억 증발 → 세전 3,297억. 매년 반복되는 구조.</text>

  <!-- Left: 순차입금 시계열 -->
  <g transform="translate(60, 140)">
    <text x="0" y="0" fill="#f1f5f9" font-size="17" font-weight="700">순차입금 추이 (조원)</text>

    <line x1="0" y1="270" x2="520" y2="270" stroke="#334155"/>

    <!-- 2018 2.3 / 2020 2.5 / 2022 2.0 / 2024 1.7 / 2025 1.6 -->
    <rect x="20" y="40" width="80" height="230" fill="#ef4444" opacity="0.8"/>
    <text x="60" y="30" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2.3</text>
    <text x="60" y="290" fill="#94a3b8" font-size="11" text-anchor="middle">2018</text>

    <rect x="120" y="20" width="80" height="250" fill="#ef4444" opacity="0.9"/>
    <text x="160" y="12" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">2.5</text>
    <text x="160" y="290" fill="#ef4444" font-size="11" text-anchor="middle">2020 peak</text>

    <rect x="220" y="70" width="80" height="200" fill="#fbbf24" opacity="0.8"/>
    <text x="260" y="60" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">2.0</text>
    <text x="260" y="290" fill="#94a3b8" font-size="11" text-anchor="middle">2022</text>

    <rect x="320" y="100" width="80" height="170" fill="#60a5fa" opacity="0.8"/>
    <text x="360" y="90" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">1.7</text>
    <text x="360" y="290" fill="#94a3b8" font-size="11" text-anchor="middle">2024</text>

    <rect x="420" y="110" width="80" height="160" fill="#22c55e"/>
    <text x="460" y="100" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">1.6</text>
    <text x="460" y="290" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">2025</text>

    <text x="260" y="340" fill="#94a3b8" font-size="12" text-anchor="middle">5년간 -0.9조 상환 (연 180억 감소)</text>
    <text x="260" y="360" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">→ 2030년 1조 하회 전망</text>
  </g>

  <!-- Right: 금융비용 분해 -->
  <g transform="translate(620, 140)">
    <text x="0" y="0" fill="#f1f5f9" font-size="17" font-weight="700">2025 금융비용 2,617억 분해 (IS 기준)</text>

    <rect x="0" y="30" width="520" height="340" fill="#0f172a" stroke="#334155"/>

    <rect x="20" y="60" width="480" height="50" fill="#ef4444"/>
    <text x="260" y="92" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">현금 이자지급 1,550억 (59.2%)</text>

    <rect x="20" y="130" width="220" height="50" fill="#fbbf24"/>
    <text x="130" y="162" fill="#0a0e1a" font-size="13" font-weight="700" text-anchor="middle">외화 평가손 약 600억</text>

    <rect x="20" y="200" width="140" height="50" fill="#a78bfa"/>
    <text x="90" y="232" fill="#0a0e1a" font-size="12" font-weight="700" text-anchor="middle">파생 평가손 약 300억</text>

    <rect x="20" y="270" width="80" height="50" fill="#8b5cf6"/>
    <text x="60" y="302" fill="#0a0e1a" font-size="11" font-weight="700" text-anchor="middle">기타·수수료 약 167억</text>

    <text x="280" y="155" fill="#94a3b8" font-size="12">→ 2024 환율 +15.5%의</text>
    <text x="280" y="172" fill="#94a3b8" font-size="12">이월 효과 상당</text>

    <text x="270" y="225" fill="#94a3b8" font-size="12">→ 외환헷지 선물환</text>
    <text x="270" y="242" fill="#94a3b8" font-size="12">평가손실</text>

    <text x="210" y="295" fill="#94a3b8" font-size="12">→ 사채할인차금 상각</text>
    <text x="210" y="312" fill="#94a3b8" font-size="12">+ 금융기관 수수료</text>
  </g>

  <!-- Bottom: credit axes + EBITDA/이자비용 -->
  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="1080" height="170" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="35" fill="#fbbf24" font-size="17" font-weight="700">dartlab credit 엔진: dCR-AA- (score 20.25) — 하지만 실제는 +4 notch 보정</text>

    <text x="30" y="68" fill="#f1f5f9" font-size="13" font-weight="700">원시 점수 기준 등급</text>
    <text x="30" y="90" fill="#94a3b8" font-size="12">EBITDA/이자비용 1.94배 = 43.2점 (BB+~BBB- 범위)</text>
    <text x="30" y="110" fill="#94a3b8" font-size="12">유동성 축 55점 (단기차입금 비중 100% 하방 압력)</text>
    <text x="30" y="130" fill="#94a3b8" font-size="12">→ 조정 전 등급 추정 A-</text>

    <text x="530" y="68" fill="#22c55e" font-size="13" font-weight="700">Notch 조정 +4</text>
    <text x="530" y="90" fill="#94a3b8" font-size="12">• 중대형기업 (매출 12조) +2</text>
    <text x="530" y="110" fill="#94a3b8" font-size="12">• 캡티브금융 (CJ그룹 내부 물류) +1</text>
    <text x="530" y="130" fill="#94a3b8" font-size="12">• 연속 8기 영업흑자 +1</text>

    <text x="880" y="90" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">AA-</text>
    <text x="880" y="115" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">최우량</text>
    <text x="880" y="135" fill="#64748b" font-size="11" text-anchor="middle">pdEstimate 0.03%</text>
  </g>
</svg>
