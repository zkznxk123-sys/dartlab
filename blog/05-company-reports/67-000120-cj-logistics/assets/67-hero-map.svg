<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="heroTitle heroDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="heroTitle">CJ대한통운 10년 — 매출 2배, 영업이익 2.2배, ROIC 2.6배, 그런데 OPM 4% 천장</title>
  <desc id="heroDesc">매출·영업이익·ROIC는 2배씩 올랐지만 OPM은 4%에 묶여 있는 1위 물류회사의 재무 풍경.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="30" font-weight="700">CJ대한통운 — 매출이 멈춰도 이익이 늘어나는 재무제표</text>
  <text x="60" y="92" fill="#64748b" font-size="16">2022~2025 매출 +1.2%, 영업이익 +23.4% — 판관비·자동화·글로벌·세율 4엔진의 동시 작동</text>

  <!-- Four KPI cards -->
  <g>
    <rect x="60" y="140" width="260" height="130" fill="#1e293b" stroke="#22c55e"/>
    <text x="80" y="170" fill="#22c55e" font-size="15" font-weight="700">매출 (2016→2025)</text>
    <text x="80" y="215" fill="#f1f5f9" font-size="28" font-weight="700">6.08조 → 12.28조</text>
    <text x="80" y="240" fill="#94a3b8" font-size="13">10년 +102% · 연평균 +7.3%</text>
    <text x="80" y="258" fill="#fbbf24" font-size="12">2022 이후 3년 +1.2% 정체</text>
  </g>

  <g>
    <rect x="340" y="140" width="260" height="130" fill="#1e293b" stroke="#60a5fa"/>
    <text x="360" y="170" fill="#60a5fa" font-size="15" font-weight="700">영업이익 (2016→2025)</text>
    <text x="360" y="215" fill="#f1f5f9" font-size="28" font-weight="700">2,284 → 5,081억</text>
    <text x="360" y="240" fill="#94a3b8" font-size="13">10년 +122% · 연평균 +8.3%</text>
    <text x="360" y="258" fill="#22c55e" font-size="12">2022~2025 +23.4% 가속</text>
  </g>

  <g>
    <rect x="620" y="140" width="260" height="130" fill="#1e293b" stroke="#a78bfa"/>
    <text x="640" y="170" fill="#a78bfa" font-size="15" font-weight="700">ROIC (2018→2025)</text>
    <text x="640" y="215" fill="#f1f5f9" font-size="28" font-weight="700">2.79% → 7.22%</text>
    <text x="640" y="240" fill="#94a3b8" font-size="13">7년 +4.43%p · 2.6배</text>
    <text x="640" y="258" fill="#64748b" font-size="12">마진·회전율 공동 개선</text>
  </g>

  <g>
    <rect x="900" y="140" width="260" height="130" fill="#1e293b" stroke="#fbbf24"/>
    <text x="920" y="170" fill="#fbbf24" font-size="15" font-weight="700">영업이익률 천장</text>
    <text x="920" y="215" fill="#f1f5f9" font-size="28" font-weight="700">4.14%</text>
    <text x="920" y="240" fill="#94a3b8" font-size="13">10년 +1.75%p 개선 중</text>
    <text x="920" y="258" fill="#ef4444" font-size="12">현대글로비스 7.01%의 59%</text>
  </g>

  <!-- Middle: margin waterfall 2025 -->
  <g transform="translate(60, 310)">
    <text x="0" y="0" fill="#f1f5f9" font-size="18" font-weight="700">2025 손익 폭포 — 영업이익 5,081억 중 51%가 금융비용으로 증발</text>
    <line x1="0" y1="15" x2="1080" y2="15" stroke="#334155"/>

    <!-- 매출 12.28조 -->
    <rect x="0" y="30" width="1080" height="30" fill="#60a5fa" opacity="0.85"/>
    <text x="540" y="50" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">매출 12.28조 (100%)</text>

    <!-- 매출원가 89% -->
    <rect x="0" y="80" width="960" height="30" fill="#64748b"/>
    <text x="480" y="100" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">매출원가 89.0% = 10.93조</text>

    <!-- 매출총이익 11% -->
    <rect x="960" y="80" width="120" height="30" fill="#22c55e"/>
    <text x="1020" y="100" fill="#0a0e1a" font-size="12" font-weight="700" text-anchor="middle">GP 11%</text>

    <!-- 판관비 6.87% + 영업이익 4.14% -->
    <rect x="960" y="130" width="75" height="30" fill="#ef4444"/>
    <rect x="1035" y="130" width="45" height="30" fill="#22c55e"/>
    <text x="997" y="150" fill="#0a0e1a" font-size="11" font-weight="700" text-anchor="middle">판관비 6.87%</text>
    <text x="1058" y="150" fill="#0a0e1a" font-size="11" font-weight="700" text-anchor="middle">OP 4.14%</text>

    <!-- 영업이익 -> 금융비용 -> 순이익 -->
    <rect x="1035" y="180" width="23" height="30" fill="#ef4444"/>
    <rect x="1058" y="180" width="22" height="30" fill="#60a5fa"/>
    <text x="1046" y="200" fill="#f1f5f9" font-size="9" font-weight="700" text-anchor="middle">이자</text>
    <text x="1069" y="200" fill="#0a0e1a" font-size="9" font-weight="700" text-anchor="middle">NI</text>
    <text x="1046" y="228" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">2,617억</text>
    <text x="1069" y="228" fill="#60a5fa" font-size="11" font-weight="700" text-anchor="middle">2,587억</text>

    <text x="540" y="200" fill="#94a3b8" font-size="12" text-anchor="middle">영업이익 5,081억의 51%(2,617억)가 금융비용(이자비용+환차손+파생평가)으로 증발 → 순이익 2,587억</text>
  </g>

  <!-- Bottom: key insight -->
  <g transform="translate(60, 570)">
    <rect x="0" y="0" width="1080" height="130" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="35" fill="#fbbf24" font-size="17" font-weight="700">핵심: 매출이 멈춰도 영업이익이 느는 이유</text>

    <text x="30" y="68" fill="#f1f5f9" font-size="13" font-weight="700">엔진 1 — 판관비 통제</text>
    <text x="30" y="88" fill="#94a3b8" font-size="12">2024 7.06% → 2025 6.87% (-0.19%p)</text>

    <text x="290" y="68" fill="#f1f5f9" font-size="13" font-weight="700">엔진 2 — 자동화 CAPEX</text>
    <text x="290" y="88" fill="#94a3b8" font-size="12">2025 5,740억 (2024의 3배)</text>

    <text x="550" y="68" fill="#f1f5f9" font-size="13" font-weight="700">엔진 3 — 글로벌 수익성</text>
    <text x="550" y="88" fill="#94a3b8" font-size="12">OPM 1%대 → 2.5%대</text>

    <text x="810" y="68" fill="#f1f5f9" font-size="13" font-weight="700">엔진 4 — 세율 정상화</text>
    <text x="810" y="88" fill="#94a3b8" font-size="12">2019 45.8% → 2025 21.5%</text>

    <text x="30" y="115" fill="#22c55e" font-size="12" font-weight="700">→ 2022~2025 영업이익 +963억 증가. 글로벌+판관비가 68% 설명. 매출 성장은 정지.</text>
  </g>
</svg>
