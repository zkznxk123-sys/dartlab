<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="histTitle histDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="histTitle">대한통운 연혁 — 1930 조선미곡창고부터 2013 CJ 편입, 2025 매출 12조까지</title>
  <desc id="histDesc">95년간 4차례 소유주가 바뀐 한국 1위 물류회사의 인수 릴레이.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">CJ대한통운 95년 — 네 번 주인이 바뀐 국가대표 물류사</text>
  <text x="60" y="90" fill="#64748b" font-size="15">조선미곡창고(1930) → 대한통운(1962) → 동아건설(1996) → 금호(2008) → CJ(2011) → 글로벌(2015+)</text>

  <line x1="70" y1="380" x2="1140" y2="380" stroke="#475569" stroke-width="3"/>

  <g>
    <circle cx="120" cy="380" r="10" fill="#22c55e"/>
    <line x1="120" y1="370" x2="120" y2="200" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="120" y="190" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">1930</text>
    <text x="120" y="170" fill="#f1f5f9" font-size="12" text-anchor="middle">조선미곡창고</text>
    <text x="120" y="152" fill="#94a3b8" font-size="11" text-anchor="middle">인천·부산·목포</text>
    <text x="120" y="134" fill="#64748b" font-size="11" text-anchor="middle">쌀 창고·운송</text>
  </g>

  <g>
    <circle cx="250" cy="380" r="9" fill="#60a5fa"/>
    <text x="250" y="415" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">1962</text>
    <text x="250" y="435" fill="#f1f5f9" font-size="12" text-anchor="middle">대한통운 개명</text>
    <text x="250" y="453" fill="#94a3b8" font-size="11" text-anchor="middle">일반 화물 확장</text>
  </g>

  <g>
    <circle cx="380" cy="380" r="9" fill="#a78bfa"/>
    <text x="380" y="415" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">1973</text>
    <text x="380" y="435" fill="#f1f5f9" font-size="12" text-anchor="middle">종합물류 면허</text>
    <text x="380" y="453" fill="#94a3b8" font-size="11" text-anchor="middle">한국 1호</text>
  </g>

  <g>
    <circle cx="510" cy="380" r="11" fill="#ef4444"/>
    <line x1="510" y1="370" x2="510" y2="200" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="510" y="190" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">1996</text>
    <text x="510" y="170" fill="#f1f5f9" font-size="12" text-anchor="middle">동아건설 인수</text>
    <text x="510" y="152" fill="#94a3b8" font-size="11" text-anchor="middle">→ 2001 법정관리</text>
    <text x="510" y="134" fill="#ef4444" font-size="11" text-anchor="middle">IMF + 모회사 붕괴</text>
  </g>

  <g>
    <circle cx="640" cy="380" r="12" fill="#ef4444"/>
    <text x="640" y="415" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2008</text>
    <text x="640" y="435" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">금호아시아나 4.1조</text>
    <text x="640" y="453" fill="#94a3b8" font-size="11" text-anchor="middle">리먼 쇼크 + 차입</text>
    <text x="640" y="471" fill="#ef4444" font-size="11" text-anchor="middle">→ 2009 워크아웃</text>
  </g>

  <g>
    <circle cx="770" cy="380" r="13" fill="#22c55e"/>
    <line x1="770" y1="370" x2="770" y2="200" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="770" y="190" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">2011.12</text>
    <text x="770" y="170" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">CJ제일제당 2조</text>
    <text x="770" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">이재현이 삼성을 이김</text>
    <text x="770" y="132" fill="#94a3b8" font-size="11" text-anchor="middle">캡티브 물류 전환</text>
    <text x="770" y="114" fill="#64748b" font-size="11" text-anchor="middle">2013.4 상호변경</text>
  </g>

  <g>
    <circle cx="900" cy="380" r="10" fill="#fbbf24"/>
    <text x="900" y="415" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">2015~2020</text>
    <text x="900" y="435" fill="#f1f5f9" font-size="12" text-anchor="middle">글로벌 M&amp;A 1.2조+</text>
    <text x="900" y="453" fill="#94a3b8" font-size="11" text-anchor="middle">中 로킨 / 印 다슬</text>
    <text x="900" y="471" fill="#94a3b8" font-size="11" text-anchor="middle">獨 슈완스 / 美 진출</text>
  </g>

  <g>
    <circle cx="1030" cy="380" r="11" fill="#ef4444"/>
    <text x="1030" y="415" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2022~</text>
    <text x="1030" y="435" fill="#f1f5f9" font-size="12" text-anchor="middle">매출 12조 정체</text>
    <text x="1030" y="453" fill="#ef4444" font-size="11" text-anchor="middle">쿠팡·네이버·C커머스</text>
  </g>

  <g>
    <circle cx="1130" cy="380" r="10" fill="#22c55e"/>
    <text x="1130" y="415" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">2025</text>
    <text x="1130" y="435" fill="#f1f5f9" font-size="12" text-anchor="middle">OPM 4.14%</text>
    <text x="1130" y="453" fill="#22c55e" font-size="11" text-anchor="middle">dCR-AA-</text>
  </g>

  <!-- Bottom: inheritance summary -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="160" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="32" fill="#f1f5f9" font-size="16" font-weight="700">4차례 인수의 재무 흔적 — 이자부담 12년 이월</text>

    <text x="30" y="62" fill="#ef4444" font-size="13" font-weight="700">동아→금호→CJ</text>
    <text x="30" y="82" fill="#94a3b8" font-size="12">매 인수마다 수천억~수조 원 차입.</text>
    <text x="30" y="100" fill="#94a3b8" font-size="12">인수 주체가 바뀌어도 피인수 회사의 차입은 이월.</text>

    <text x="380" y="62" fill="#fbbf24" font-size="13" font-weight="700">2011 CJ 인수가 1.9~2.0조</text>
    <text x="380" y="82" fill="#94a3b8" font-size="12">대부분이 CJ제일제당 차입.</text>
    <text x="380" y="100" fill="#94a3b8" font-size="12">CJ 편입 후 12년, 아직 순차입금 1.6조.</text>

    <text x="730" y="62" fill="#22c55e" font-size="13" font-weight="700">2025 금융비용 2,617억</text>
    <text x="730" y="82" fill="#94a3b8" font-size="12">영업이익 5,081억의 51%.</text>
    <text x="730" y="100" fill="#94a3b8" font-size="12">2030년 순차입금 1조 하회 목표.</text>

    <text x="30" y="135" fill="#64748b" font-size="11">종목코드 000120 — 1956년 증시 개설 이후 세 자리 초기 상장 기업. 삼성전자(005930)·현대차(005380)와 같은 세대.</text>
  </g>
</svg>
