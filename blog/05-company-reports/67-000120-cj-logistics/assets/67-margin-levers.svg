<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" role="img" aria-labelledby="leverTitle leverDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="leverTitle">영업이익 +963억 증가의 4엔진 기여도 분해 (2022→2025)</title>
  <desc id="leverDesc">판관비 통제·자동화 CAPEX·글로벌 수익성·이연법인세 해소가 영업이익 개선에 기여한 비율.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">매출이 멈춰도 이익이 늘어난 4엔진</text>
  <text x="60" y="90" fill="#64748b" font-size="15">영업이익 +963억 기여도 분해 — 글로벌과 판관비가 68% 설명</text>

  <!-- Stacked contribution bar -->
  <g transform="translate(60, 150)">
    <text x="0" y="0" fill="#f1f5f9" font-size="18" font-weight="700">2022 영업이익 4,118억 → 2025 5,081억 (+963억, +23.4%)</text>

    <!-- Total bar 1080 wide for 963억 -->
    <rect x="0" y="30" width="1080" height="60" fill="#0f172a" stroke="#334155"/>

    <!-- 엔진 1 판관비 200억 = 224px -->
    <rect x="0" y="30" width="224" height="60" fill="#22c55e"/>
    <text x="112" y="55" fill="#0a0e1a" font-size="13" font-weight="700" text-anchor="middle">엔진 1 — 판관비</text>
    <text x="112" y="75" fill="#0a0e1a" font-size="13" font-weight="700" text-anchor="middle">+200억 (21%)</text>

    <!-- 엔진 2 CAPEX 100억 = 112px -->
    <rect x="224" y="30" width="112" height="60" fill="#60a5fa"/>
    <text x="280" y="55" fill="#0a0e1a" font-size="12" font-weight="700" text-anchor="middle">엔진 2 — CAPEX</text>
    <text x="280" y="75" fill="#0a0e1a" font-size="12" font-weight="700" text-anchor="middle">+100억 (10%)</text>

    <!-- 엔진 3 글로벌 450억 = 505px -->
    <rect x="336" y="30" width="505" height="60" fill="#fbbf24"/>
    <text x="588" y="55" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">엔진 3 — 글로벌 수익성 개선</text>
    <text x="588" y="75" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">+450억 (47%)</text>

    <!-- 기타 213억 = 239px -->
    <rect x="841" y="30" width="239" height="60" fill="#a78bfa"/>
    <text x="960" y="55" fill="#0a0e1a" font-size="13" font-weight="700" text-anchor="middle">믹스·원가 효율</text>
    <text x="960" y="75" fill="#0a0e1a" font-size="13" font-weight="700" text-anchor="middle">+213억 (22%)</text>
  </g>

  <!-- Engine detail cards -->
  <g transform="translate(60, 290)">
    <rect x="0" y="0" width="260" height="240" fill="#1e293b" stroke="#22c55e"/>
    <text x="20" y="35" fill="#22c55e" font-size="16" font-weight="700">엔진 1 — 판관비 통제</text>
    <text x="20" y="65" fill="#f1f5f9" font-size="13" font-weight="700">2024 7.06% → 2025 6.87%</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">-0.19%p, 금액 -125억 감소</text>
    <text x="20" y="115" fill="#f1f5f9" font-size="13" font-weight="700">구조 개편 집중 구간</text>
    <text x="20" y="138" fill="#94a3b8" font-size="12">2023 5.4% (일시 저점)</text>
    <text x="20" y="158" fill="#94a3b8" font-size="12">→ 2024 조정 후 2025 재통제</text>
    <text x="20" y="190" fill="#22c55e" font-size="12" font-weight="700">→ 영업이익 +200억 기여</text>
    <text x="20" y="212" fill="#64748b" font-size="11">관리·영업·IT 인력 효율화</text>
  </g>

  <g transform="translate(340, 290)">
    <rect x="0" y="0" width="260" height="240" fill="#1e293b" stroke="#60a5fa"/>
    <text x="20" y="35" fill="#60a5fa" font-size="16" font-weight="700">엔진 2 — 자동화 CAPEX</text>
    <text x="20" y="65" fill="#f1f5f9" font-size="13" font-weight="700">2025 유형자산 취득 5,740억</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">(2024 1,933억의 약 3배)</text>
    <text x="20" y="115" fill="#f1f5f9" font-size="13" font-weight="700">투자 내역 (공시 추정)</text>
    <text x="20" y="138" fill="#94a3b8" font-size="11">• 곤지암 2단계 자동화 2,000억</text>
    <text x="20" y="158" fill="#94a3b8" font-size="11">• 뉴저지 허브 1,200억</text>
    <text x="20" y="178" fill="#94a3b8" font-size="11">• 동남아 800억 + IT 1,000억</text>
    <text x="20" y="202" fill="#60a5fa" font-size="12" font-weight="700">→ 2026~27 본격 효과 예상</text>
    <text x="20" y="222" fill="#64748b" font-size="11">AMR·AI 비전 인건비 절감</text>
  </g>

  <g transform="translate(620, 290)">
    <rect x="0" y="0" width="260" height="240" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="20" y="35" fill="#fbbf24" font-size="16" font-weight="700">엔진 3 — 글로벌 수익성</text>
    <text x="20" y="65" fill="#fbbf24" font-size="13" font-weight="700">OPM 1%대 → 2.5%대</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">해외 M&amp;A 통합 완성 단계</text>
    <text x="20" y="115" fill="#f1f5f9" font-size="13" font-weight="700">주요 자회사 실적</text>
    <text x="20" y="138" fill="#94a3b8" font-size="11">• CJ로킨(중국) 매출 1조 돌파</text>
    <text x="20" y="158" fill="#94a3b8" font-size="11">• CJ다슬(인도) 7,000억 성장</text>
    <text x="20" y="178" fill="#94a3b8" font-size="11">• CJ슈완스(독일) 통합 완료</text>
    <text x="20" y="202" fill="#fbbf24" font-size="12" font-weight="700">→ 영업이익 +450억 (47% 기여)</text>
    <text x="20" y="222" fill="#64748b" font-size="11">매출 3조 × 1.5%p 개선</text>
  </g>

  <g transform="translate(900, 290)">
    <rect x="0" y="0" width="260" height="240" fill="#1e293b" stroke="#a78bfa"/>
    <text x="20" y="35" fill="#a78bfa" font-size="16" font-weight="700">엔진 4 — 세율 정상화</text>
    <text x="20" y="65" fill="#f1f5f9" font-size="13" font-weight="700">2019 45.8% → 2025 21.5%</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">법정세율 22% 근처 회귀</text>
    <text x="20" y="115" fill="#f1f5f9" font-size="13" font-weight="700">이연법인세 자산 소진</text>
    <text x="20" y="138" fill="#94a3b8" font-size="11">과거 이월결손금 해소 +</text>
    <text x="20" y="158" fill="#94a3b8" font-size="11">관계사 거래 조정 안정화</text>
    <text x="20" y="185" fill="#a78bfa" font-size="12" font-weight="700">→ 영업이익에는 영향 없음</text>
    <text x="20" y="205" fill="#a78bfa" font-size="12" font-weight="700">→ 순이익 +250억 개선</text>
    <text x="20" y="225" fill="#64748b" font-size="11">유효세율 개선 4.7%p</text>
  </g>

  <!-- Bottom: effective tax rate trend -->
  <g transform="translate(60, 580)">
    <rect x="0" y="0" width="1080" height="200" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="35" fill="#f1f5f9" font-size="16" font-weight="700">유효세율 시계열 — 이연법인세 해소 흐름</text>

    <line x1="60" y1="150" x2="1000" y2="150" stroke="#475569"/>

    <!-- 7 bars: 2019~2025 -->
    <!-- 2019 45.8% -->
    <rect x="80" y="70" width="100" height="80" fill="#ef4444"/>
    <text x="130" y="58" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">45.8%</text>
    <text x="130" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">2019</text>

    <!-- 2020 29.5% -->
    <rect x="210" y="98" width="100" height="52" fill="#60a5fa"/>
    <text x="260" y="88" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">29.5%</text>
    <text x="260" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">2020</text>

    <!-- 2021 33.8% -->
    <rect x="340" y="92" width="100" height="58" fill="#60a5fa"/>
    <text x="390" y="82" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">33.8%</text>
    <text x="390" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">2021</text>

    <!-- 2022 31.0% -->
    <rect x="470" y="96" width="100" height="54" fill="#60a5fa"/>
    <text x="520" y="86" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">31.0%</text>
    <text x="520" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">2022</text>

    <!-- 2023 25.3% -->
    <rect x="600" y="106" width="100" height="44" fill="#60a5fa"/>
    <text x="650" y="96" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">25.3%</text>
    <text x="650" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">2023</text>

    <!-- 2024 29.1% -->
    <rect x="730" y="100" width="100" height="50" fill="#60a5fa"/>
    <text x="780" y="90" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">29.1%</text>
    <text x="780" y="170" fill="#94a3b8" font-size="11" text-anchor="middle">2024</text>

    <!-- 2025 21.5% -->
    <rect x="860" y="113" width="100" height="37" fill="#22c55e"/>
    <text x="910" y="103" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">21.5%</text>
    <text x="910" y="170" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">2025</text>

    <line x1="60" y1="110" x2="1000" y2="110" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="1015" y="115" fill="#fbbf24" font-size="11" font-weight="700">법정 22%</text>
  </g>
</svg>
