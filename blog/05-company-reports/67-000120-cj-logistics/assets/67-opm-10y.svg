<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="opmTitle opmDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="opmTitle">영업이익률 10년 시계열 — 2018 2.63%에서 2024 4.38%로 1.75%p 개선</title>
  <desc id="opmDesc">매출 2배 늘어날 동안 OPM이 천천히 2.6%→4%대로 이동한 궤적.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">영업이익률 궤적 — OPM 4% 천장까지의 10년</text>
  <text x="60" y="90" fill="#64748b" font-size="15">2018년 2.63% 바닥에서 2024년 4.38% 고점. 연평균 +0.18%p 개선 속도.</text>

  <g transform="translate(90, 150)">
    <line x1="0" y1="0" x2="0" y2="400" stroke="#334155"/>
    <line x1="0" y1="400" x2="1020" y2="400" stroke="#334155"/>

    <!-- Y scale 0~5% -->
    <line x1="0" y1="80" x2="1020" y2="80" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="0" y1="160" x2="1020" y2="160" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="0" y1="240" x2="1020" y2="240" stroke="#1e293b" stroke-dasharray="3,3"/>
    <line x1="0" y1="320" x2="1020" y2="320" stroke="#1e293b" stroke-dasharray="3,3"/>

    <text x="-15" y="85" fill="#64748b" font-size="11" text-anchor="end">4%</text>
    <text x="-15" y="165" fill="#64748b" font-size="11" text-anchor="end">3%</text>
    <text x="-15" y="245" fill="#64748b" font-size="11" text-anchor="end">2%</text>
    <text x="-15" y="325" fill="#64748b" font-size="11" text-anchor="end">1%</text>
    <text x="-15" y="405" fill="#64748b" font-size="11" text-anchor="end">0%</text>

    <!-- Data: scale 1%=80px. 0% = 400. So y = 400 - val*80  -->
    <!-- 2016 3.76 → 400-301 = 99  -->
    <!-- 2017 3.31 → 400-265 = 135 -->
    <!-- 2018 2.63 → 400-210 = 190 -->
    <!-- 2019 2.95 → 400-236 = 164 -->
    <!-- 2020 3.02 → 400-242 = 158 -->
    <!-- 2021 3.03 → 400-242 = 158 -->
    <!-- 2022 3.39 → 400-271 = 129 -->
    <!-- 2023 4.08 → 400-326 = 74 -->
    <!-- 2024 4.38 → 400-350 = 50 -->
    <!-- 2025 4.14 → 400-331 = 69 -->

    <polyline points="60,99 163,135 266,190 369,164 472,158 575,158 678,129 781,74 884,50 987,69"
      fill="none" stroke="#60a5fa" stroke-width="3"/>

    <circle cx="60" cy="99" r="5" fill="#60a5fa"/>
    <circle cx="163" cy="135" r="5" fill="#60a5fa"/>
    <circle cx="266" cy="190" r="8" fill="#ef4444"/>
    <circle cx="369" cy="164" r="5" fill="#60a5fa"/>
    <circle cx="472" cy="158" r="5" fill="#60a5fa"/>
    <circle cx="575" cy="158" r="5" fill="#60a5fa"/>
    <circle cx="678" cy="129" r="5" fill="#60a5fa"/>
    <circle cx="781" cy="74" r="5" fill="#60a5fa"/>
    <circle cx="884" cy="50" r="8" fill="#22c55e"/>
    <circle cx="987" cy="69" r="6" fill="#60a5fa"/>

    <text x="60" y="425" fill="#94a3b8" font-size="12" text-anchor="middle">2016</text>
    <text x="163" y="425" fill="#94a3b8" font-size="12" text-anchor="middle">2017</text>
    <text x="266" y="425" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2018</text>
    <text x="369" y="425" fill="#94a3b8" font-size="12" text-anchor="middle">2019</text>
    <text x="472" y="425" fill="#94a3b8" font-size="12" text-anchor="middle">2020</text>
    <text x="575" y="425" fill="#94a3b8" font-size="12" text-anchor="middle">2021</text>
    <text x="678" y="425" fill="#94a3b8" font-size="12" text-anchor="middle">2022</text>
    <text x="781" y="425" fill="#94a3b8" font-size="12" text-anchor="middle">2023</text>
    <text x="884" y="425" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">2024</text>
    <text x="987" y="425" fill="#94a3b8" font-size="12" text-anchor="middle">2025</text>

    <text x="60" y="87" fill="#94a3b8" font-size="11" text-anchor="middle">3.76%</text>
    <text x="266" y="205" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2.63%</text>
    <text x="266" y="221" fill="#ef4444" font-size="10" text-anchor="middle">10년 최저</text>
    <text x="884" y="38" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">4.38%</text>
    <text x="884" y="22" fill="#22c55e" font-size="10" text-anchor="middle">10년 최고</text>
    <text x="987" y="57" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">4.14%</text>

    <!-- Annotations -->
    <line x1="266" y1="190" x2="884" y2="50" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
    <text x="575" y="118" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle" transform="rotate(-12 575 118)">+1.75%p 6년 개선</text>
  </g>

  <!-- Bottom panels: peer comparison + industry ceiling -->
  <g transform="translate(90, 600)">
    <rect x="0" y="0" width="1020" height="100" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="30" fill="#f1f5f9" font-size="15" font-weight="700">같은 시기 물류 peer 비교 (2025 OPM)</text>

    <text x="30" y="60" fill="#a78bfa" font-size="13">현대글로비스 <tspan font-weight="700" fill="#a78bfa">7.01%</tspan> (완성차 독점)</text>
    <text x="260" y="60" fill="#60a5fa" font-size="13">CJ대한통운 <tspan font-weight="700" fill="#60a5fa">4.14%</tspan></text>
    <text x="490" y="60" fill="#ef4444" font-size="13">한진 <tspan font-weight="700" fill="#ef4444">3.66%</tspan> (종합 2위)</text>
    <text x="710" y="60" fill="#fbbf24" font-size="13">한국 범용 물류 천장 ≈ <tspan font-weight="700" fill="#fbbf24">4%</tspan></text>

    <text x="30" y="82" fill="#64748b" font-size="11">→ CJ대한통운은 한진과 같은 범용 물류지만 규모의 경제로 OPM 0.5%p 우위. 현대글로비스와의 갭 2.87%p는 캡티브 독점에서 온다.</text>
  </g>
</svg>
