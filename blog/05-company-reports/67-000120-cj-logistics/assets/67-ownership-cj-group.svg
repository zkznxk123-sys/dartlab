<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="cjOwnTitle cjOwnDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="cjOwnTitle">CJ그룹 4단계 지배구조 — 이재현에서 CJ대한통운까지 실질 지분 7.1%</title>
  <desc id="cjOwnDesc">다단 지주 구조에서 최상위 가문 지분이 41% × 43% × 40.16% = 7.1%로 희석되는 흐름.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">CJ 4단계 지주 구조 — 이익이 흐르는 길과 세금 벽</text>
  <text x="60" y="90" fill="#64748b" font-size="15">최상위 가문 실질 지분 41% × 43% × 40.16% = 7.1%로 희석</text>

  <!-- Level 1: 이재현 일가 -->
  <g>
    <rect x="60" y="140" width="1080" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="90" y="170" fill="#fbbf24" font-size="18" font-weight="700">① 이재현 회장 일가 + 재단 · CJ주식회사 지분 약 41%</text>
    <text x="90" y="195" fill="#94a3b8" font-size="13">이재현(회장) + 이미경(이사) + 재단 + 임원 — CJ그룹 최상위 오너 그룹</text>
    <text x="950" y="193" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="end">지분 약 41%</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 600 220 L 600 260" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrGold)"/>
  <text x="615" y="245" fill="#fbbf24" font-size="12" font-weight="700">× 41%</text>

  <defs>
    <marker id="arrGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/></marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/></marker>
  </defs>

  <!-- Level 2: CJ주식회사 -->
  <g>
    <rect x="60" y="270" width="1080" height="80" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <text x="90" y="300" fill="#60a5fa" font-size="18" font-weight="700">② CJ주식회사 (001040, 지주)</text>
    <text x="90" y="325" fill="#94a3b8" font-size="13">그룹 최상위 지주 — CJ제일제당·CJ ENM·CJ CGV 등 자회사 보유</text>
    <text x="950" y="323" fill="#60a5fa" font-size="14" font-weight="700" text-anchor="end">CJ제일제당 지분 43%</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 600 350 L 600 390" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrGold)"/>
  <text x="615" y="375" fill="#60a5fa" font-size="12" font-weight="700">× 43%</text>

  <!-- Level 3: CJ제일제당 -->
  <g>
    <rect x="60" y="400" width="1080" height="80" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="90" y="430" fill="#a78bfa" font-size="18" font-weight="700">③ CJ제일제당 (097950, 식품·바이오 자회사)</text>
    <text x="90" y="455" fill="#94a3b8" font-size="13">식품 사업회사 — 2011년 대한통운 2조 원에 인수한 본인 법인</text>
    <text x="950" y="453" fill="#a78bfa" font-size="14" font-weight="700" text-anchor="end">CJ대한통운 지분 40.16%</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 600 480 L 600 520" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrGold)"/>
  <text x="615" y="505" fill="#a78bfa" font-size="12" font-weight="700">× 40.16%</text>

  <!-- Level 4: CJ대한통운 -->
  <g>
    <rect x="60" y="530" width="1080" height="80" fill="#0f172a" stroke="#22c55e" stroke-width="2.5"/>
    <text x="90" y="560" fill="#22c55e" font-size="20" font-weight="700">④ CJ대한통운 (000120) — 2025 영업이익 5,081억 · 순이익 2,587억</text>
    <text x="90" y="585" fill="#f1f5f9" font-size="13">매출 12.28조 · OPM 4.14% · ROIC 7.22% · dCR-AA-</text>
    <text x="950" y="583" fill="#22c55e" font-size="14" font-weight="700" text-anchor="end">사외이사 60% 양호</text>
  </g>

  <!-- Bottom: cascade math -->
  <g transform="translate(60, 630)">
    <rect x="0" y="0" width="1080" height="70" fill="#0f172a" stroke="#fbbf24"/>
    <text x="30" y="30" fill="#fbbf24" font-size="15" font-weight="700">실질 경제적 지분 계산</text>
    <text x="30" y="55" fill="#f1f5f9" font-size="14">41% × 43% × 40.16% = <tspan font-weight="700" fill="#22c55e">7.07%</tspan> → 2025 순이익 2,587억 중 <tspan font-weight="700" fill="#22c55e">약 183억</tspan>이 최상위 가문 귀속 (회계상 지분가치 기준, 실제 배당 흐름은 각 단계 세금·유보 후 더 감소)</text>
  </g>
</svg>
