<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="waterTitle waterDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="waterTitle">2025 손익 폭포 — 영업손실 -1.72조에서 순손실 -0.58조로</title>
  <desc id="waterDesc">매출 13.27조 → GPM 11% → 판관비 26% → OP -12.98% → 금융비용 -1.05조 → 기타이익 +1.6조 상쇄 → 순이익 -0.58조.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">2025 손익 폭포 — 적자의 정체</text>
  <text x="60" y="90" fill="#64748b" font-size="15">매출 13.27조에서 순손실 -0.58조까지 — 다섯 구간의 연쇄 악화와 기타이익 버팀목</text>

  <g transform="translate(80, 150)">
    <!-- zero line -->
    <line x1="0" y1="260" x2="1060" y2="260" stroke="#475569"/>
    <text x="-15" y="5" fill="#64748b" font-size="11" text-anchor="end">+15조</text>
    <text x="-15" y="135" fill="#64748b" font-size="11" text-anchor="end">+7조</text>
    <text x="-15" y="265" fill="#64748b" font-size="11" text-anchor="end">0</text>
    <text x="-15" y="390" fill="#64748b" font-size="11" text-anchor="end">-2조</text>

    <!-- Bars width 100, scale 조=16.67px, so 10조=167px -->

    <!-- 매출 132,667억 = 13.27조 (음수가 아니지만 표시상 100%로) — scale 1조=16.67 → 13.27조=221 high from 260 up -->
    <rect x="20" y="39" width="120" height="221" fill="#60a5fa"/>
    <text x="80" y="30" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">매출 13.27조</text>
    <text x="80" y="280" fill="#94a3b8" font-size="11" text-anchor="middle">100%</text>

    <!-- 매출원가 -11.81조 = 197px 아래 -->
    <rect x="160" y="39" width="120" height="197" fill="#64748b"/>
    <text x="220" y="155" fill="#f1f5f9" font-size="12" font-weight="700" text-anchor="middle">-10.93조</text>
    <text x="220" y="175" fill="#f1f5f9" font-size="11" text-anchor="middle">-89.0%</text>
    <text x="220" y="280" fill="#94a3b8" font-size="11" text-anchor="middle">매출원가</text>

    <!-- 매출총이익 1.46조 = 24px high from zero -->
    <rect x="300" y="236" width="120" height="24" fill="#22c55e"/>
    <text x="360" y="228" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">+1.46조</text>
    <text x="360" y="280" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">GP 11%</text>

    <!-- 판관비 -3.46조 = 58px 아래 -->
    <rect x="440" y="236" width="120" height="58" fill="#ef4444"/>
    <text x="500" y="320" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">-3.46조</text>
    <text x="500" y="340" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">판관비 26%</text>

    <!-- 영업이익 -1.72조 = 29px 아래 zero -->
    <rect x="580" y="260" width="120" height="29" fill="#ef4444"/>
    <text x="640" y="315" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">-1.72조</text>
    <text x="640" y="335" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">OP -12.98%</text>

    <!-- 금융비용 -1.05조 = 18px -->
    <rect x="720" y="289" width="120" height="18" fill="#ef4444" opacity="0.7"/>
    <text x="780" y="328" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">-1.05조</text>
    <text x="780" y="348" fill="#94a3b8" font-size="11" text-anchor="middle">금융비용</text>

    <!-- 기타이익 +1.6조 = 27px up -->
    <rect x="860" y="262" width="120" height="27" fill="#a78bfa"/>
    <text x="920" y="254" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">+1.60조</text>
    <text x="920" y="280" fill="#a78bfa" font-size="11" text-anchor="middle">기타이익 (환·지분법)</text>

    <!-- 순이익 -0.58조 = 10px 아래 zero -->
    <rect x="1000" y="260" width="60" height="10" fill="#ef4444"/>
    <text x="1030" y="287" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">-0.58조</text>
    <text x="1030" y="305" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">순이익</text>
  </g>

  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="160" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="35" fill="#fbbf24" font-size="16" font-weight="700">구조 분석 — 영업이익이 플러스일 땐 숨어 있던 비용이 다 드러난다</text>

    <text x="30" y="65" fill="#94a3b8" font-size="12">① 매출원가율 79.03%(2022) → 88.98%(2025): 9.95%p 악화 (가동률 하락 + 재고 감손)</text>
    <text x="30" y="85" fill="#94a3b8" font-size="12">② 판관비율 11.99%(2022) → 26.07%(2025): 14.08%p 악화 (R&D 유지 + 감가상각 증가 + 매출 축소 기저 효과)</text>
    <text x="30" y="105" fill="#94a3b8" font-size="12">③ 금융비용 1.44조(2022) → 1.05조(2025): 이자 3,499억으로 6배 증가, 총차입 3조→8조</text>
    <text x="30" y="125" fill="#22c55e" font-size="12">④ 기타이익 +1.6조 상쇄 (환평가·지분법) + 법인세 환급 4,892억 → 순손실 -0.58조에 착지</text>

    <text x="30" y="150" fill="#fbbf24" font-size="11" font-weight="700">교훈: 영업이익이 0 근처로 가면 금융비용·판관비 같은 고정비가 모두 손실로 전이</text>
  </g>
</svg>
