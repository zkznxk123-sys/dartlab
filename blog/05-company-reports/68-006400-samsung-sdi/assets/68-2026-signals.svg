<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="sigTitle sigDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="sigTitle">2026 바닥 확인 4대 신호 — 흑자 전환의 조건</title>
  <desc id="sigDesc">분기 적자 축소·가동률 회복·LFP 대응·수주잔고 4축 + 장기 산업 구도 3축.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">2026 바닥 확인 신호 + 장기 산업 구도 3축</text>
  <text x="60" y="90" fill="#64748b" font-size="15">사이클 회사의 다음 정점을 예측하는 선행 지표</text>

  <!-- 4 signals -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="260" height="210" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="20" y="35" fill="#22c55e" font-size="15" font-weight="700">신호 1 — 분기 적자 축소</text>
    <text x="20" y="65" fill="#f1f5f9" font-size="13" font-weight="700">2025Q4 -4,638억</text>
    <text x="20" y="85" fill="#94a3b8" font-size="12">→ 2026Q1 -2천억대 축소?</text>
    <text x="20" y="108" fill="#94a3b8" font-size="11">4분기 연속 개선 누적 시</text>
    <text x="20" y="126" fill="#94a3b8" font-size="11">바닥 확인</text>
    <text x="20" y="160" fill="#22c55e" font-size="12" font-weight="700">기준선: -2,000억 이하</text>
    <text x="20" y="183" fill="#64748b" font-size="11">현 수준의 50% 이하</text>
  </g>

  <g transform="translate(340, 140)">
    <rect x="0" y="0" width="260" height="210" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <text x="20" y="35" fill="#60a5fa" font-size="15" font-weight="700">신호 2 — 가동률 회복</text>
    <text x="20" y="65" fill="#f1f5f9" font-size="13" font-weight="700">유럽·미국 공장 75%+</text>
    <text x="20" y="85" fill="#94a3b8" font-size="12">현 60~70% 수준에서</text>
    <text x="20" y="108" fill="#94a3b8" font-size="11">75% 진입 시 고정비</text>
    <text x="20" y="126" fill="#94a3b8" font-size="11">흡수 급격히 개선</text>
    <text x="20" y="160" fill="#60a5fa" font-size="12" font-weight="700">기준선: 75% 지속</text>
    <text x="20" y="183" fill="#64748b" font-size="11">분기 컨콜 발표 추적</text>
  </g>

  <g transform="translate(620, 140)">
    <rect x="0" y="0" width="260" height="210" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="20" y="35" fill="#a78bfa" font-size="15" font-weight="700">신호 3 — LFP 양산</text>
    <text x="20" y="65" fill="#f1f5f9" font-size="13" font-weight="700">2026 상용 공급 계약</text>
    <text x="20" y="85" fill="#94a3b8" font-size="12">중국 2사·LG엔솔 대비</text>
    <text x="20" y="108" fill="#94a3b8" font-size="11">후행 진입 극복 신호</text>
    <text x="20" y="126" fill="#94a3b8" font-size="11">글로벌 LFP 45%→60% 추세</text>
    <text x="20" y="160" fill="#a78bfa" font-size="12" font-weight="700">기준선: 파일럿→상용</text>
    <text x="20" y="183" fill="#64748b" font-size="11">BMW·Ford 등 고객 계약</text>
  </g>

  <g transform="translate(900, 140)">
    <rect x="0" y="0" width="260" height="210" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="20" y="35" fill="#fbbf24" font-size="15" font-weight="700">신호 4 — 수주잔고</text>
    <text x="20" y="65" fill="#f1f5f9" font-size="13" font-weight="700">2026 분기별 공시</text>
    <text x="20" y="85" fill="#94a3b8" font-size="12">2024~25 신규 수주가</text>
    <text x="20" y="108" fill="#94a3b8" font-size="11">2026~28 매출로 이어짐</text>
    <text x="20" y="126" fill="#94a3b8" font-size="11">계약 체결 급감 시 위험</text>
    <text x="20" y="160" fill="#fbbf24" font-size="12" font-weight="700">기준선: 전년 대비 +0%</text>
    <text x="20" y="183" fill="#64748b" font-size="11">축소 지속 시 장기 회복 늦어짐</text>
  </g>

  <!-- Long-term 3 axes -->
  <g transform="translate(60, 380)">
    <text x="0" y="0" fill="#f1f5f9" font-size="18" font-weight="700">장기 산업 구도 — 다음 10년을 결정하는 3축</text>

    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="360" height="230" fill="#0f172a" stroke="#8b5cf6"/>
      <text x="20" y="35" fill="#8b5cf6" font-size="15" font-weight="700">축 1 — LFP vs NCM 비중 이동</text>
      <text x="20" y="65" fill="#f1f5f9" font-size="13">2020 NCM 80% / LFP 20%</text>
      <text x="20" y="88" fill="#f1f5f9" font-size="13">2024 NCM 55% / LFP 45%</text>
      <text x="20" y="111" fill="#f1f5f9" font-size="13">2030 NCM 40% / LFP 60% 예상</text>
      <text x="20" y="145" fill="#94a3b8" font-size="12">한국 3사는 NCM 중심</text>
      <text x="20" y="165" fill="#94a3b8" font-size="12">→ LFP 전환 속도가 결정적</text>
      <text x="20" y="195" fill="#8b5cf6" font-size="12" font-weight="700">삼성SDI: 2026 LFP 파일럿</text>
      <text x="20" y="215" fill="#8b5cf6" font-size="12" font-weight="700">타이밍이 결과 결정</text>
    </g>

    <g transform="translate(380, 30)">
      <rect x="0" y="0" width="360" height="230" fill="#0f172a" stroke="#ef4444"/>
      <text x="20" y="35" fill="#ef4444" font-size="15" font-weight="700">축 2 — 중국 2사 독주</text>
      <text x="20" y="65" fill="#f1f5f9" font-size="13">2024 글로벌 점유율 (SNE)</text>
      <text x="20" y="88" fill="#94a3b8" font-size="12">CATL 37% · BYD 17% = 54%</text>
      <text x="20" y="108" fill="#94a3b8" font-size="12">LG엔솔 13% · SK온 5% · 삼성SDI 5.6%</text>
      <text x="20" y="140" fill="#ef4444" font-size="13" font-weight="700">한국 3사 합 24%</text>
      <text x="20" y="168" fill="#94a3b8" font-size="12">중국 2사와의 갭 계속 벌어짐</text>
      <text x="20" y="190" fill="#94a3b8" font-size="12">유럽 시장에서 중국산 침투 급증</text>
      <text x="20" y="215" fill="#ef4444" font-size="12" font-weight="700">→ 가격·규모 경쟁의 벽</text>
    </g>

    <g transform="translate(760, 30)">
      <rect x="0" y="0" width="360" height="230" fill="#0f172a" stroke="#fbbf24"/>
      <text x="20" y="35" fill="#fbbf24" font-size="15" font-weight="700">축 3 — IRA·보조금 변수</text>
      <text x="20" y="65" fill="#f1f5f9" font-size="13">2022 IRA → 한국 3사 100조 혜택</text>
      <text x="20" y="88" fill="#94a3b8" font-size="12">2025 Trump 2기 일부 축소·변경</text>
      <text x="20" y="115" fill="#fbbf24" font-size="13" font-weight="700">정책 불확실성 증가</text>
      <text x="20" y="145" fill="#94a3b8" font-size="12">Starplus Energy·합작사 전반</text>
      <text x="20" y="165" fill="#94a3b8" font-size="12">미국 투자 재검토 필요</text>
      <text x="20" y="195" fill="#fbbf24" font-size="12" font-weight="700">2026 정책 방향이</text>
      <text x="20" y="215" fill="#fbbf24" font-size="12" font-weight="700">회복 속도 결정</text>
    </g>
  </g>
</svg>
