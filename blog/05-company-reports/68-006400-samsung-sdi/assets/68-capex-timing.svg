<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="cxTitle cxDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="cxTitle">CAPEX 6.27조 피크와 EV 수요 둔화의 타이밍 충돌</title>
  <desc id="cxDesc">2024년 사상 최대 CAPEX를 결정한 시점은 2022~2023년. 수요 둔화가 본격화된 2024에 집행.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">CAPEX 6.27조 — 피크 수요 지난 뒤의 투자 집행</text>
  <text x="60" y="90" fill="#64748b" font-size="15">2023 4.05조 + 2024 6.27조 = 2년 10.32조. 감가상각이 2025부터 매년 1조씩 내려온다.</text>

  <!-- CAPEX 시계열 + 수요지표 overlay -->
  <g transform="translate(60, 140)">
    <line x1="0" y1="350" x2="1080" y2="350" stroke="#334155"/>
    <line x1="0" y1="0" x2="0" y2="350" stroke="#334155"/>

    <!-- CAPEX bars. Scale 0~7조 over 340px. 1조=48.6px -->
    <!-- 2019 0.99 → 48px -->
    <!-- 2020 1.73 → 84 -->
    <!-- 2021 2.25 → 109 -->
    <!-- 2022 2.81 → 137 -->
    <!-- 2023 4.05 → 197 -->
    <!-- 2024 6.27 → 305 -->
    <!-- 2025 3.07 → 149 -->

    <rect x="40" y="302" width="120" height="48" fill="#60a5fa" opacity="0.6"/>
    <text x="100" y="294" fill="#60a5fa" font-size="11" text-anchor="middle">0.99</text>
    <text x="100" y="370" fill="#94a3b8" font-size="11" text-anchor="middle">2019</text>

    <rect x="180" y="266" width="120" height="84" fill="#60a5fa" opacity="0.7"/>
    <text x="240" y="258" fill="#60a5fa" font-size="11" text-anchor="middle">1.73</text>
    <text x="240" y="370" fill="#94a3b8" font-size="11" text-anchor="middle">2020</text>

    <rect x="320" y="241" width="120" height="109" fill="#60a5fa" opacity="0.8"/>
    <text x="380" y="233" fill="#60a5fa" font-size="11" text-anchor="middle">2.25</text>
    <text x="380" y="370" fill="#94a3b8" font-size="11" text-anchor="middle">2021</text>

    <rect x="460" y="213" width="120" height="137" fill="#60a5fa"/>
    <text x="520" y="205" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">2.81</text>
    <text x="520" y="370" fill="#94a3b8" font-size="11" text-anchor="middle">2022</text>

    <rect x="600" y="153" width="120" height="197" fill="#fbbf24" opacity="0.8"/>
    <text x="660" y="145" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">4.05</text>
    <text x="660" y="370" fill="#94a3b8" font-size="11" text-anchor="middle">2023</text>

    <rect x="740" y="45" width="120" height="305" fill="#ef4444"/>
    <text x="800" y="37" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">6.27</text>
    <text x="800" y="370" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2024 피크</text>
    <text x="800" y="390" fill="#ef4444" font-size="10" text-anchor="middle">매출의 36.3%</text>

    <rect x="880" y="201" width="120" height="149" fill="#a78bfa"/>
    <text x="940" y="193" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">3.07</text>
    <text x="940" y="370" fill="#a78bfa" font-size="11" text-anchor="middle">2025 축소</text>

    <text x="540" y="-10" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">CAPEX (조원)</text>
  </g>

  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="170" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="30" y="35" fill="#ef4444" font-size="16" font-weight="700">2024 CAPEX 6.27조 분해 (공시 기반 추정)</text>

    <text x="30" y="65" fill="#f1f5f9" font-size="13">• 한국 천안·수원: 약 1.2조 (전고체 파일럿 + R&D)</text>
    <text x="30" y="88" fill="#f1f5f9" font-size="13">• 헝가리 괴드 2공장 증설: 약 1.8조 (BMW·Stellantis·VW)</text>
    <text x="30" y="111" fill="#f1f5f9" font-size="13">• 말레이시아 스렘반: 약 1.3조 (21700 원통형 확장)</text>
    <text x="30" y="134" fill="#f1f5f9" font-size="13">• 미국 애리조나 Stellantis JV (Starplus Energy): 약 1.5조 — 2026 가동 목표 23→15GWh 하향</text>

    <text x="560" y="65" fill="#fbbf24" font-size="13" font-weight="700">감가상각 도미노</text>
    <text x="560" y="88" fill="#94a3b8" font-size="12">설비 내용연수 10년 가정 시</text>
    <text x="560" y="108" fill="#94a3b8" font-size="12">2024 CAPEX × 1/10 = 연간 6,270억</text>
    <text x="560" y="128" fill="#94a3b8" font-size="12">2023 CAPEX × 1/10 = 연간 4,050억</text>
    <text x="560" y="150" fill="#fbbf24" font-size="12" font-weight="700">→ 2025~27 매년 1조+ 감가상각 추가</text>
  </g>
</svg>
