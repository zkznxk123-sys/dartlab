<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="evTitle evDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="evTitle">글로벌 EV 판매 증가율 + 고객사별 2024 판매 변화</title>
  <desc id="evDesc">2021 +119% → 2025 +17% 증가율 급락. 삼성SDI 주요 고객(BMW·Ford·Stellantis·Volvo) 집중 악화.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">EV 캐즘 — 증가율 6배 둔화, 삼성SDI 고객은 집중 타격</text>
  <text x="60" y="90" fill="#64748b" font-size="15">2021 +119% → 2025 +17% 증가율 급락. BMW·Ford·Stellantis·Volvo 모두 -15~-30%</text>

  <!-- Left: EV growth rate -->
  <g transform="translate(60, 140)">
    <text x="0" y="0" fill="#f1f5f9" font-size="16" font-weight="700">글로벌 EV 판매 증가율 (%)</text>
    <rect x="0" y="20" width="520" height="300" fill="#0f172a" stroke="#334155"/>

    <!-- 2020 +41 / 2021 +119 / 2022 +56 / 2023 +33 / 2024 +23 / 2025 +17 -->
    <!-- scale 0~120 → 280px bar area -->
    <!-- 2020 41 → 95.6px -->
    <!-- 2021 119 → 277.6px -->
    <!-- 2022 56 → 130.7px -->
    <!-- 2023 33 → 77px -->
    <!-- 2024 23 → 53.7px -->
    <!-- 2025 17 → 39.7px -->

    <line x1="40" y1="300" x2="500" y2="300" stroke="#334155"/>

    <rect x="60" y="204" width="50" height="96" fill="#60a5fa" opacity="0.6"/>
    <text x="85" y="195" fill="#60a5fa" font-size="11" text-anchor="middle">+41%</text>
    <text x="85" y="318" fill="#94a3b8" font-size="10" text-anchor="middle">2020</text>

    <rect x="130" y="22" width="50" height="278" fill="#22c55e"/>
    <text x="155" y="14" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">+119%</text>
    <text x="155" y="318" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">2021</text>

    <rect x="200" y="169" width="50" height="131" fill="#60a5fa"/>
    <text x="225" y="160" fill="#60a5fa" font-size="11" text-anchor="middle">+56%</text>
    <text x="225" y="318" fill="#94a3b8" font-size="10" text-anchor="middle">2022</text>

    <rect x="270" y="223" width="50" height="77" fill="#60a5fa" opacity="0.7"/>
    <text x="295" y="214" fill="#60a5fa" font-size="11" text-anchor="middle">+33%</text>
    <text x="295" y="318" fill="#94a3b8" font-size="10" text-anchor="middle">2023</text>

    <rect x="340" y="246" width="50" height="54" fill="#fbbf24"/>
    <text x="365" y="237" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">+23%</text>
    <text x="365" y="318" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">2024</text>
    <text x="365" y="336" fill="#fbbf24" font-size="10" text-anchor="middle">캐즘 본격화</text>

    <rect x="410" y="260" width="50" height="40" fill="#ef4444"/>
    <text x="435" y="251" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">+17%</text>
    <text x="435" y="318" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">2025</text>

    <text x="260" y="355" fill="#94a3b8" font-size="12" text-anchor="middle">증가율은 떨어졌지만 절대 판매량은 여전히 증가 중</text>
    <text x="260" y="375" fill="#64748b" font-size="11" text-anchor="middle">→ "성장률 리셋" 구간 진입</text>
  </g>

  <!-- Right: 고객사별 -->
  <g transform="translate(620, 140)">
    <text x="0" y="0" fill="#f1f5f9" font-size="16" font-weight="700">삼성SDI 주요 고객 2024 EV 판매 YoY</text>
    <rect x="0" y="20" width="520" height="300" fill="#0f172a" stroke="#334155"/>

    <!-- BMW iX/i4 -17% / Ford Mach-E·F150 -25% / Stellantis -30% / Volvo -15% -->
    <!-- Scale -30~0 in 260px, 1%=8.67px -->

    <line x1="180" y1="40" x2="180" y2="300" stroke="#475569" stroke-width="1.5"/>
    <text x="180" y="35" fill="#64748b" font-size="11" text-anchor="middle">0%</text>

    <!-- BMW -17% = 147px -->
    <rect x="33" y="60" width="147" height="45" fill="#ef4444"/>
    <text x="20" y="88" fill="#ef4444" font-size="12" font-weight="700" text-anchor="end">BMW</text>
    <text x="190" y="88" fill="#ef4444" font-size="12" font-weight="700">-17%</text>
    <text x="100" y="120" fill="#94a3b8" font-size="10" text-anchor="middle">iX · i4 (프리미엄)</text>

    <!-- Ford -25% = 217px -->
    <rect x="-37" y="140" width="217" height="45" fill="#ef4444"/>
    <text x="-50" y="168" fill="#ef4444" font-size="12" font-weight="700" text-anchor="end">Ford</text>
    <text x="190" y="168" fill="#ef4444" font-size="12" font-weight="700">-25%</text>
    <text x="70" y="200" fill="#94a3b8" font-size="10" text-anchor="middle">Mach-E · F-150 Lightning</text>

    <!-- Stellantis -30% = 260px -->
    <rect x="-80" y="220" width="260" height="45" fill="#ef4444"/>
    <text x="-90" y="248" fill="#ef4444" font-size="12" font-weight="700" text-anchor="end">Stellantis</text>
    <text x="190" y="248" fill="#ef4444" font-size="13" font-weight="700">-30%</text>
    <text x="50" y="280" fill="#94a3b8" font-size="10" text-anchor="middle">Jeep · Ram · Chrysler</text>

    <text x="260" y="355" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">4개 주력 고객 모두 -15~-30%</text>
    <text x="260" y="375" fill="#94a3b8" font-size="11" text-anchor="middle">프리미엄 OEM의 얼리 마조리티 저항 직격</text>
  </g>

  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="1080" height="200" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="35" fill="#fbbf24" font-size="16" font-weight="700">재고자산 2.94조 — 매출 대비 22.2% (9년 최고)</text>
    <text x="30" y="65" fill="#f1f5f9" font-size="13">2022 재고/매출 12.4% → 2023 14.1% → 2024 16.7% → <tspan fill="#ef4444" font-weight="700">2025 22.2%</tspan></text>

    <text x="30" y="100" fill="#f1f5f9" font-size="13" font-weight="700">재고 중 상당 부분은 원소재·중간재</text>
    <text x="30" y="123" fill="#94a3b8" font-size="12">• 2021~22 장기 계약으로 고가 확보한 리튬·니켈·코발트</text>
    <text x="30" y="143" fill="#94a3b8" font-size="12">• 2023부터 리튬 -70% 폭락으로 현 시가 대비 평가손실 상태</text>
    <text x="30" y="163" fill="#94a3b8" font-size="12">• 평가손실이 분기마다 매출원가로 인식 (2025 추정 3천억 규모)</text>

    <text x="30" y="188" fill="#ef4444" font-size="11" font-weight="700">→ 2024Q3 적자 전환의 핵심 방아쇠</text>
  </g>
</svg>
