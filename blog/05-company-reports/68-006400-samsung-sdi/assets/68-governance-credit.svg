<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="gcTitle gcDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="gcTitle">credit dCR-A (부정적) + 이자비용 6배 증가의 그림자</title>
  <desc id="gcDesc">삼성전자 19.58% 최대주주, 총차입금 3조→8조, 이자 581억→3,499억 6배 증가.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">credit dCR-A 부정적 — 이자비용 6배 증가의 그림자</text>
  <text x="60" y="90" fill="#64748b" font-size="15">총차입금 3조→8조 + 금리 상승 + 영업이익 적자 전환 = 신용등급 하향 압력</text>

  <!-- Left: 이자지급 시계열 -->
  <g transform="translate(60, 140)">
    <text x="0" y="0" fill="#f1f5f9" font-size="17" font-weight="700">이자지급 (억원) — 5년 6배</text>
    <line x1="0" y1="310" x2="520" y2="310" stroke="#334155"/>

    <!-- 2020 581 / 2021 487 / 2022 811 / 2023 2213 / 2024 3246 / 2025 3499 -->
    <!-- Scale 0~3600 in 280px, 100=7.78 -->

    <rect x="20" y="265" width="70" height="45" fill="#60a5fa" opacity="0.6"/>
    <text x="55" y="258" fill="#60a5fa" font-size="11" text-anchor="middle">581</text>
    <text x="55" y="328" fill="#94a3b8" font-size="11" text-anchor="middle">2020</text>

    <rect x="100" y="272" width="70" height="38" fill="#60a5fa" opacity="0.6"/>
    <text x="135" y="265" fill="#60a5fa" font-size="11" text-anchor="middle">487</text>
    <text x="135" y="328" fill="#94a3b8" font-size="11" text-anchor="middle">2021</text>

    <rect x="180" y="247" width="70" height="63" fill="#60a5fa" opacity="0.7"/>
    <text x="215" y="240" fill="#60a5fa" font-size="11" text-anchor="middle">811</text>
    <text x="215" y="328" fill="#94a3b8" font-size="11" text-anchor="middle">2022</text>

    <rect x="260" y="138" width="70" height="172" fill="#fbbf24"/>
    <text x="295" y="130" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">2,213</text>
    <text x="295" y="328" fill="#94a3b8" font-size="11" text-anchor="middle">2023</text>

    <rect x="340" y="58" width="70" height="252" fill="#ef4444" opacity="0.9"/>
    <text x="375" y="50" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">3,246</text>
    <text x="375" y="328" fill="#ef4444" font-size="11" text-anchor="middle">2024</text>

    <rect x="420" y="38" width="70" height="272" fill="#ef4444"/>
    <text x="455" y="30" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">3,499</text>
    <text x="455" y="328" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2025</text>

    <text x="260" y="365" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">6.0배 증가 (581 → 3,499)</text>
    <text x="260" y="385" fill="#94a3b8" font-size="11" text-anchor="middle">원인: 차입 3조→8조 + 금리 상승</text>
  </g>

  <!-- Right: dCR axes -->
  <g transform="translate(620, 140)">
    <text x="0" y="0" fill="#f1f5f9" font-size="17" font-weight="700">dCR-A score 32.23 (outlook 부정적)</text>
    <rect x="0" y="20" width="520" height="350" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>

    <text x="20" y="55" fill="#ef4444" font-size="14" font-weight="700">이전 AA- → 현재 A (한 단계 하향)</text>

    <line x1="20" y1="75" x2="500" y2="75" stroke="#334155"/>

    <g transform="translate(20, 90)">
      <text x="0" y="20" fill="#f1f5f9" font-size="13" font-weight="700">축별 위험 점수 (높을수록 위험)</text>

      <text x="0" y="50" fill="#94a3b8" font-size="12">채무상환능력 (30%)</text>
      <text x="470" y="50" fill="#ef4444" font-size="12" font-weight="700" text-anchor="end">EBITDA/이자 악화</text>

      <text x="0" y="75" fill="#94a3b8" font-size="12">자본구조 (15%)</text>
      <text x="470" y="75" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="end">부채비율 132% 상승</text>

      <text x="0" y="100" fill="#94a3b8" font-size="12">유동성 (15%)</text>
      <text x="470" y="100" fill="#ef4444" font-size="12" font-weight="700" text-anchor="end">현금 1.80조 (4% 수준)</text>

      <text x="0" y="125" fill="#94a3b8" font-size="12">현금흐름 (15%)</text>
      <text x="470" y="125" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="end">OCF 0.79조 (전고점의 30%)</text>

      <text x="0" y="150" fill="#94a3b8" font-size="12">사업안정성 (10%)</text>
      <text x="470" y="150" fill="#ef4444" font-size="12" font-weight="700" text-anchor="end">매출 -41% 2년 연속</text>

      <text x="0" y="175" fill="#94a3b8" font-size="12">재무신뢰성 (10%)</text>
      <text x="470" y="175" fill="#22c55e" font-size="12" font-weight="700" text-anchor="end">감사의견 적정</text>
    </g>

    <g transform="translate(20, 290)">
      <text x="0" y="0" fill="#fbbf24" font-size="13" font-weight="700">outlook 부정적의 의미</text>
      <text x="0" y="25" fill="#94a3b8" font-size="11">12~18개월 내 추가 하향 가능</text>
      <text x="0" y="45" fill="#94a3b8" font-size="11">A → A- 하향 시 차입 조달비용 +0.2~0.5%p</text>
      <text x="0" y="65" fill="#ef4444" font-size="11" font-weight="700">→ 2026 흑자 전환이 필수 조건</text>
    </g>
  </g>

  <g transform="translate(60, 550)">
    <rect x="0" y="0" width="1080" height="150" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="30" y="35" fill="#a78bfa" font-size="16" font-weight="700">삼성그룹 지배구조 — 삼성전자 19.58% 최대주주</text>

    <text x="30" y="65" fill="#f1f5f9" font-size="13">삼성전자(005930) <tspan fill="#a78bfa" font-weight="700">19.58%</tspan>  +  삼성문화재단 0.58%  +  삼성복지재단 0.25%  +  이재용 극소량  +  국민연금 약 8%  +  외국인 약 38%</text>
    <text x="30" y="88" fill="#94a3b8" font-size="12">완전 자회사(50%+)도 완전 독립도 아닌 어정쩡한 위치. 그룹 전략의 영향을 받지만 재무적으로는 독립.</text>
    <text x="30" y="108" fill="#94a3b8" font-size="12">"삼성 계열" 브랜드 효과로 채권시장에서 동일 등급 타사 대비 스프레드 낮게 형성 — 캡티브 금융 간접 혜택.</text>
    <text x="30" y="130" fill="#22c55e" font-size="11" font-weight="700">→ 정성 요소는 dartlab credit에 반영 안 됨. 실제 시장 지원은 등급보다 강함.</text>
  </g>
</svg>
