<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="heroTitle heroDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="heroTitle">삼성SDI 9년 — 매출 2배 성장 후 -41%, 영업이익 3.3조 반전</title>
  <desc id="heroDesc">2022 피크에서 2025 바닥까지 3년 만에 이익이 최대에서 최대 적자로 뒤집힌 재무 풍경.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="30" font-weight="700">삼성SDI — 2년 만에 이익이 3.3조 사라졌다</text>
  <text x="60" y="92" fill="#64748b" font-size="16">2022~2023 사상 최대 이익 → 2024~2025 사상 최대 적자. EV 캐즘 + CAPEX 6.27조 피크의 타이밍 미스.</text>

  <!-- Four KPI cards -->
  <g>
    <rect x="60" y="140" width="260" height="130" fill="#1e293b" stroke="#ef4444"/>
    <text x="80" y="170" fill="#ef4444" font-size="15" font-weight="700">영업이익 (2023→2025)</text>
    <text x="80" y="215" fill="#f1f5f9" font-size="28" font-weight="700">+1.63조 → -1.72조</text>
    <text x="80" y="240" fill="#94a3b8" font-size="13">2년 -3.35조 반전</text>
    <text x="80" y="258" fill="#ef4444" font-size="12">사상 최대 이익 → 사상 최대 적자</text>
  </g>

  <g>
    <rect x="340" y="140" width="260" height="130" fill="#1e293b" stroke="#fbbf24"/>
    <text x="360" y="170" fill="#fbbf24" font-size="15" font-weight="700">매출 (2023→2025)</text>
    <text x="360" y="215" fill="#f1f5f9" font-size="28" font-weight="700">22.71 → 13.27조</text>
    <text x="360" y="240" fill="#94a3b8" font-size="13">2년 -41.5% 감소</text>
    <text x="360" y="258" fill="#fbbf24" font-size="12">EV 캐즘 + 고객사 판매 -15~-30%</text>
  </g>

  <g>
    <rect x="620" y="140" width="260" height="130" fill="#1e293b" stroke="#a78bfa"/>
    <text x="640" y="170" fill="#a78bfa" font-size="15" font-weight="700">2024 CAPEX 사상 최대</text>
    <text x="640" y="215" fill="#f1f5f9" font-size="28" font-weight="700">6.27조</text>
    <text x="640" y="240" fill="#94a3b8" font-size="13">매출의 36.3% (LG엔솔 17.8%)</text>
    <text x="640" y="258" fill="#a78bfa" font-size="12">피크 수요 지난 후 투자 집행</text>
  </g>

  <g>
    <rect x="900" y="140" width="260" height="130" fill="#1e293b" stroke="#60a5fa"/>
    <text x="920" y="170" fill="#60a5fa" font-size="15" font-weight="700">LG엔솔 vs 삼성SDI</text>
    <text x="920" y="215" fill="#f1f5f9" font-size="28" font-weight="700">+5.69% vs -12.98%</text>
    <text x="920" y="240" fill="#94a3b8" font-size="13">OPM 갭 18.67%p</text>
    <text x="920" y="258" fill="#60a5fa" font-size="12">같은 산업, 갈라진 길</text>
  </g>

  <!-- 9년 시계열 바 차트 -->
  <g transform="translate(60, 310)">
    <text x="0" y="0" fill="#f1f5f9" font-size="17" font-weight="700">영업이익 9년 시계열 (억원)</text>
    <line x1="0" y1="220" x2="1080" y2="220" stroke="#475569"/>

    <!-- Scale: -20000 ~ +20000, zero line at 220 (middle), 1억=0.0055px? 40000범위를 220px에 매핑: 1억=0.0055 -->
    <!-- 더 쉽게: 값 -20000~+20000을 y 20~420으로. zero=220. 1억당 0.01px → 100억=1px, 1000억=10px, 10000억=100px -->
    <!-- 2017 120억 → 220-1.2=219 -->
    <!-- 2018 720억 → 220-7.2=213 -->
    <!-- 2019 460억 → 220-4.6=215 -->
    <!-- 2020 6713 → 220-67=153 -->
    <!-- 2021 10676 → 220-107=113 -->
    <!-- 2022 18080 → 220-181=39 -->
    <!-- 2023 16334 → 220-163=57 -->
    <!-- 2024 4209 → 220-42=178 -->
    <!-- 2025 -17224 → 220+172=392 -->

    <!-- bars width 100, gap 20 -->
    <rect x="40" y="219" width="100" height="1" fill="#64748b"/>
    <text x="90" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">2017</text>
    <text x="90" y="215" fill="#64748b" font-size="10" text-anchor="middle">120</text>

    <rect x="160" y="213" width="100" height="7" fill="#64748b"/>
    <text x="210" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">2018</text>
    <text x="210" y="209" fill="#64748b" font-size="10" text-anchor="middle">720</text>

    <rect x="280" y="215" width="100" height="5" fill="#64748b"/>
    <text x="330" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">2019</text>
    <text x="330" y="211" fill="#64748b" font-size="10" text-anchor="middle">460</text>

    <rect x="400" y="153" width="100" height="67" fill="#60a5fa"/>
    <text x="450" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">2020</text>
    <text x="450" y="149" fill="#60a5fa" font-size="11" text-anchor="middle">6,713</text>

    <rect x="520" y="113" width="100" height="107" fill="#60a5fa"/>
    <text x="570" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">2021</text>
    <text x="570" y="109" fill="#60a5fa" font-size="11" text-anchor="middle">10,676</text>

    <rect x="640" y="39" width="100" height="181" fill="#22c55e"/>
    <text x="690" y="240" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">2022</text>
    <text x="690" y="33" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">18,080</text>

    <rect x="760" y="57" width="100" height="163" fill="#22c55e"/>
    <text x="810" y="240" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">2023</text>
    <text x="810" y="51" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">16,334</text>

    <rect x="880" y="178" width="100" height="42" fill="#fbbf24"/>
    <text x="930" y="240" fill="#fbbf24" font-size="11" text-anchor="middle">2024</text>
    <text x="930" y="172" fill="#fbbf24" font-size="11" text-anchor="middle">4,209</text>

    <rect x="1000" y="220" width="100" height="172" fill="#ef4444"/>
    <text x="1050" y="412" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">2025</text>
    <text x="1050" y="408" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">-17,224</text>
  </g>

  <!-- Bottom: insight -->
  <g transform="translate(60, 580)">
    <rect x="0" y="0" width="1080" height="120" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="35" fill="#fbbf24" font-size="17" font-weight="700">핵심: 사이클 피크에서의 CAPEX 베팅이 투자 타이밍 미스로 회수되는 과정</text>
    <text x="30" y="65" fill="#f1f5f9" font-size="13">2022~2023 사상 최대 이익기에 결정한 CAPEX 10.32조(2023+2024)가 2024~2025 수요 둔화와 정면으로 충돌</text>
    <text x="30" y="88" fill="#94a3b8" font-size="13">→ 감가상각·고정비 급등 + 가동률 하락 + 재고 감손이 매출 축소와 결합해 OPM -12.98% 대규모 적자</text>
    <text x="30" y="108" fill="#22c55e" font-size="12">같은 산업 LG에너지솔루션은 매출 -7.5%·CAPEX 비율 17.8%로 OPM +5.69% 방어. 포지션 차이가 결과를 만듦.</text>
  </g>
</svg>
