<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="histTitle histDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="histTitle">삼성SDI 55년 연혁 — 진공관(1970)에서 EV 배터리(2015+)까지 네 번의 변신</title>
  <desc id="histDesc">삼성-NEC로 시작해 리튬이온 배터리 1994년 착수, 2022~2023 슈퍼사이클, 2024~2025 EV 캐즘.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">삼성SDI 55년 — 네 번 변신한 소재 회사</text>
  <text x="60" y="90" fill="#64748b" font-size="15">삼성-NEC(1970) → 브라운관 → PDP·LCD → 리튬이온 배터리(1994) → EV 배터리(2015+)</text>

  <line x1="70" y1="380" x2="1140" y2="380" stroke="#475569" stroke-width="3"/>

  <g>
    <circle cx="120" cy="380" r="10" fill="#64748b"/>
    <line x1="120" y1="370" x2="120" y2="200" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="120" y="190" fill="#64748b" font-size="13" font-weight="700" text-anchor="middle">1970</text>
    <text x="120" y="170" fill="#f1f5f9" font-size="12" text-anchor="middle">삼성-NEC 설립</text>
    <text x="120" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">일본 NEC 합작</text>
    <text x="120" y="132" fill="#64748b" font-size="11" text-anchor="middle">진공관·브라운관</text>
  </g>

  <g>
    <circle cx="250" cy="380" r="9" fill="#60a5fa"/>
    <text x="250" y="415" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">1984</text>
    <text x="250" y="435" fill="#f1f5f9" font-size="12" text-anchor="middle">SDD 이름변경</text>
    <text x="250" y="453" fill="#94a3b8" font-size="11" text-anchor="middle">1987 상장 006400</text>
  </g>

  <g>
    <circle cx="380" cy="380" r="12" fill="#fbbf24"/>
    <line x1="380" y1="370" x2="380" y2="200" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="380" y="190" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">1994</text>
    <text x="380" y="170" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">결정적 베팅</text>
    <text x="380" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">리튬이온 배터리 착수</text>
    <text x="380" y="132" fill="#64748b" font-size="11" text-anchor="middle">1999 양산 개시</text>
  </g>

  <g>
    <circle cx="510" cy="380" r="10" fill="#a78bfa"/>
    <text x="510" y="415" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">2001</text>
    <text x="510" y="435" fill="#f1f5f9" font-size="12" text-anchor="middle">삼성SDI 변신</text>
    <text x="510" y="453" fill="#94a3b8" font-size="11" text-anchor="middle">2012 제일모직 합병</text>
  </g>

  <g>
    <circle cx="640" cy="380" r="11" fill="#ef4444"/>
    <text x="640" y="415" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2014</text>
    <text x="640" y="435" fill="#f1f5f9" font-size="13" text-anchor="middle">PDP 종료</text>
    <text x="640" y="453" fill="#94a3b8" font-size="11" text-anchor="middle">사업 재편 완료</text>
  </g>

  <g>
    <circle cx="770" cy="380" r="12" fill="#22c55e"/>
    <line x1="770" y1="370" x2="770" y2="200" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="770" y="190" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">2015</text>
    <text x="770" y="170" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">EV 배터리 본격</text>
    <text x="770" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">BMW i3·i8 공급</text>
    <text x="770" y="132" fill="#64748b" font-size="11" text-anchor="middle">프리미엄 OEM</text>
  </g>

  <g>
    <circle cx="900" cy="380" r="13" fill="#22c55e"/>
    <text x="900" y="415" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">2022</text>
    <text x="900" y="435" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">사상 최대 OP 1.81조</text>
    <text x="900" y="455" fill="#94a3b8" font-size="11" text-anchor="middle">IRA + 유럽 그린딜</text>
    <text x="900" y="473" fill="#64748b" font-size="11" text-anchor="middle">주가 78만원 피크</text>
  </g>

  <g>
    <circle cx="1030" cy="380" r="12" fill="#ef4444"/>
    <line x1="1030" y1="370" x2="1030" y2="200" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="1030" y="190" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">2024</text>
    <text x="1030" y="170" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">EV 캐즘 본격</text>
    <text x="1030" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">CAPEX 6.27조 피크</text>
    <text x="1030" y="132" fill="#64748b" font-size="11" text-anchor="middle">Q3 영업적자 전환</text>
  </g>

  <g>
    <circle cx="1130" cy="380" r="13" fill="#ef4444"/>
    <text x="1130" y="415" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2025</text>
    <text x="1130" y="435" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">OP -1.72조</text>
    <text x="1130" y="455" fill="#ef4444" font-size="11" text-anchor="middle">dCR-A 부정적</text>
  </g>

  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="160" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="32" fill="#f1f5f9" font-size="16" font-weight="700">변신의 재무 흔적 — 사업 포트폴리오 재편 주기</text>

    <text x="30" y="62" fill="#94a3b8" font-size="13">1970~1990 브라운관 전성기 → 1990~2010 CRT 소멸, PDP·LCD 전환 → 1994 리튬이온 착수</text>
    <text x="30" y="85" fill="#94a3b8" font-size="13">2001 삼성SDI 변신 → 2014 PDP 종료 → 2015~2023 EV 배터리 슈퍼사이클 (매출 2배, OP 6.7천억→1.8조)</text>
    <text x="30" y="108" fill="#fbbf24" font-size="13" font-weight="700">2024~2025 EV 캐즘 = 5번째 변신 진입 구간? — 전고체·LFP로 다음 기술 사이클 준비 중</text>
    <text x="30" y="135" fill="#64748b" font-size="11">30년 간격의 주기: CRT(1970~2000, 30년) → 이차전지 IT(2000~2015, 15년) → 이차전지 EV(2015~) → 전고체? (2030~)</text>
  </g>
</svg>
