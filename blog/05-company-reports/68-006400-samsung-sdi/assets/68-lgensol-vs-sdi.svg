<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" role="img" aria-labelledby="lgTitle lgDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="lgTitle">LG에너지솔루션 vs 삼성SDI — 같은 산업 다른 결과 18.67%p 갭</title>
  <desc id="lgDesc">고객 포트폴리오·CAPEX 비율·제품 믹스 세 축에서의 포지션 차이가 OPM 갭을 만든다.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">LG엔솔 vs 삼성SDI — 포지션이 만든 18.67%p 갭</text>
  <text x="60" y="90" fill="#64748b" font-size="15">같은 EV 캐즘, 다른 고객·CAPEX·제품 포지션 → OPM +5.69% vs -12.98%</text>

  <!-- 2025 핵심 비교 -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="520" height="260" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <text x="20" y="35" fill="#60a5fa" font-size="18" font-weight="700">LG에너지솔루션 (373220)</text>

    <text x="20" y="70" fill="#f1f5f9" font-size="13">매출</text>
    <text x="500" y="70" fill="#60a5fa" font-size="20" font-weight="700" text-anchor="end">23.67조</text>

    <text x="20" y="105" fill="#f1f5f9" font-size="13">영업이익</text>
    <text x="500" y="105" fill="#22c55e" font-size="20" font-weight="700" text-anchor="end">+1.35조</text>

    <text x="20" y="140" fill="#f1f5f9" font-size="13">영업이익률</text>
    <text x="500" y="140" fill="#22c55e" font-size="22" font-weight="700" text-anchor="end">+5.69%</text>

    <text x="20" y="175" fill="#f1f5f9" font-size="13">2022→25 매출 변화</text>
    <text x="500" y="175" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="end">-7.5%</text>

    <text x="20" y="210" fill="#f1f5f9" font-size="13">2024 CAPEX / 매출</text>
    <text x="500" y="210" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="end">17.8%</text>

    <text x="20" y="245" fill="#f1f5f9" font-size="13">주요 고객</text>
    <text x="500" y="245" fill="#94a3b8" font-size="13" text-anchor="end">GM · Hyundai · Tesla</text>
  </g>

  <g transform="translate(620, 140)">
    <rect x="0" y="0" width="520" height="260" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="35" fill="#ef4444" font-size="18" font-weight="700">삼성SDI (006400)</text>

    <text x="20" y="70" fill="#f1f5f9" font-size="13">매출</text>
    <text x="500" y="70" fill="#ef4444" font-size="20" font-weight="700" text-anchor="end">13.27조</text>

    <text x="20" y="105" fill="#f1f5f9" font-size="13">영업이익</text>
    <text x="500" y="105" fill="#ef4444" font-size="20" font-weight="700" text-anchor="end">-1.72조</text>

    <text x="20" y="140" fill="#f1f5f9" font-size="13">영업이익률</text>
    <text x="500" y="140" fill="#ef4444" font-size="22" font-weight="700" text-anchor="end">-12.98%</text>

    <text x="20" y="175" fill="#f1f5f9" font-size="13">2022→25 매출 변화</text>
    <text x="500" y="175" fill="#ef4444" font-size="16" font-weight="700" text-anchor="end">-34.0%</text>

    <text x="20" y="210" fill="#f1f5f9" font-size="13">2024 CAPEX / 매출</text>
    <text x="500" y="210" fill="#ef4444" font-size="16" font-weight="700" text-anchor="end">36.3%</text>

    <text x="20" y="245" fill="#f1f5f9" font-size="13">주요 고객</text>
    <text x="500" y="245" fill="#94a3b8" font-size="13" text-anchor="end">BMW · Stellantis · Ford</text>
  </g>

  <!-- Gap bar -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="1080" height="80" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <text x="540" y="35" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">OPM 갭 18.67%p · 영업이익 차이 3.07조</text>
    <text x="540" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">같은 산업 같은 시기에 정반대 결과를 만든 세 축 — 고객 포트폴리오 · CAPEX 비율 · 제품 믹스</text>
  </g>

  <!-- Three axes -->
  <g transform="translate(60, 550)">
    <rect x="0" y="0" width="340" height="250" fill="#1e293b" stroke="#60a5fa"/>
    <text x="20" y="35" fill="#60a5fa" font-size="16" font-weight="700">축 1 — 고객 포트폴리오</text>

    <text x="20" y="68" fill="#22c55e" font-size="13" font-weight="700">LG엔솔 고객 2024~25</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">• GM: 저가 Equinox EV 회복</text>
    <text x="20" y="106" fill="#94a3b8" font-size="12">• 현대·기아: 2024 +10% 성장</text>
    <text x="20" y="124" fill="#94a3b8" font-size="12">• Tesla: 안정적 판매</text>

    <text x="20" y="155" fill="#ef4444" font-size="13" font-weight="700">삼성SDI 고객 2024~25</text>
    <text x="20" y="175" fill="#94a3b8" font-size="12">• BMW iX/i4: -17%</text>
    <text x="20" y="193" fill="#94a3b8" font-size="12">• Stellantis: -30%</text>
    <text x="20" y="211" fill="#94a3b8" font-size="12">• Ford Mach-E/F-150: -25%</text>
    <text x="20" y="229" fill="#ef4444" font-size="11" font-weight="700">→ 프리미엄 OEM 집중 타격</text>
  </g>

  <g transform="translate(430, 550)">
    <rect x="0" y="0" width="340" height="250" fill="#1e293b" stroke="#a78bfa"/>
    <text x="20" y="35" fill="#a78bfa" font-size="16" font-weight="700">축 2 — CAPEX 타이밍</text>

    <text x="20" y="68" fill="#22c55e" font-size="13" font-weight="700">LG엔솔 CAPEX/매출</text>
    <text x="20" y="88" fill="#f1f5f9" font-size="14" font-weight="700">17.8% (2024)</text>
    <text x="20" y="108" fill="#94a3b8" font-size="12">매출 27.1조에 5.1조 CAPEX</text>
    <text x="20" y="126" fill="#94a3b8" font-size="12">규모 대비 여유 있는 투자</text>

    <text x="20" y="155" fill="#ef4444" font-size="13" font-weight="700">삼성SDI CAPEX/매출</text>
    <text x="20" y="175" fill="#f1f5f9" font-size="14" font-weight="700">36.3% (2024)</text>
    <text x="20" y="195" fill="#94a3b8" font-size="12">매출 17.3조에 6.27조 CAPEX</text>
    <text x="20" y="213" fill="#94a3b8" font-size="12">매출 대비 과도한 배팅</text>
    <text x="20" y="231" fill="#ef4444" font-size="11" font-weight="700">→ 감가상각 부담 2배</text>
  </g>

  <g transform="translate(800, 550)">
    <rect x="0" y="0" width="340" height="250" fill="#1e293b" stroke="#fbbf24"/>
    <text x="20" y="35" fill="#fbbf24" font-size="16" font-weight="700">축 3 — 제품 믹스</text>

    <text x="20" y="68" fill="#22c55e" font-size="13" font-weight="700">LG엔솔</text>
    <text x="20" y="88" fill="#94a3b8" font-size="12">• 파우치형 NCM 중심</text>
    <text x="20" y="106" fill="#94a3b8" font-size="12">• Tesla·Ford LFP 공급 시작 (2024)</text>
    <text x="20" y="124" fill="#22c55e" font-size="12" font-weight="700">→ LFP 전환 선제 대응</text>

    <text x="20" y="155" fill="#ef4444" font-size="13" font-weight="700">삼성SDI</text>
    <text x="20" y="175" fill="#94a3b8" font-size="12">• 각형 NCM 중심</text>
    <text x="20" y="193" fill="#94a3b8" font-size="12">• LFP 양산 진입 전</text>
    <text x="20" y="211" fill="#94a3b8" font-size="12">• 2024 글로벌 LFP 45%로 확산</text>
    <text x="20" y="229" fill="#ef4444" font-size="11" font-weight="700">→ 제품 대응 후행</text>
  </g>
</svg>
