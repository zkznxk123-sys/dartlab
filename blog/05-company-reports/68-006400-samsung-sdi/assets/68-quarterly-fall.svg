<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="qTitle qDesc" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title id="qTitle">분기별 매출·영업이익 시계열 — 2024Q3 적자 전환 이후 5분기 연속</title>
  <desc id="qDesc">2023Q4 분기 영업이익 3,118억에서 2025Q1 -4,341억으로 7,459억 분기 반전.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="60" fill="#f1f5f9" font-size="28" font-weight="700">분기별 급전직하 — 2024Q3 적자 전환 이후 5분기 연속</text>
  <text x="60" y="90" fill="#64748b" font-size="15">2024Q3 -1,281억으로 적자 전환 → 2025 4개 분기 연속 -4천억대</text>

  <g transform="translate(90, 150)">
    <line x1="0" y1="0" x2="0" y2="400" stroke="#334155"/>
    <line x1="0" y1="200" x2="1020" y2="200" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="400" x2="1020" y2="400" stroke="#334155"/>

    <!-- 영업이익 bars: scale 8000억 = 200px -->
    <!-- 2023Q4 3118 → 200-78=122 / 78px bar -->
    <!-- 2024Q1 2674 → 200-67=133 / 67px -->
    <!-- 2024Q2 2802 → 200-70=130 / 70px -->
    <!-- 2024Q3 -1281 → 200+32=232 / 32px bar from 200 -->
    <!-- 2024Q4 -155 → 200+4=204 / 4px -->
    <!-- 2025Q1 -4341 → 200+109=309 / 109px -->
    <!-- 2025Q2 -4202 → 200+105=305 / 105px -->
    <!-- 2025Q3 -4043 → 200+101=301 / 101px -->
    <!-- 2025Q4 -4638 → 200+116=316 / 116px -->

    <!-- y labels -->
    <text x="-15" y="5" fill="#64748b" font-size="11" text-anchor="end">+4천억</text>
    <text x="-15" y="205" fill="#64748b" font-size="11" text-anchor="end">0</text>
    <text x="-15" y="405" fill="#64748b" font-size="11" text-anchor="end">-4천억</text>

    <rect x="20" y="122" width="100" height="78" fill="#22c55e"/>
    <text x="70" y="115" fill="#22c55e" font-size="11" text-anchor="middle">3,118</text>
    <text x="70" y="430" fill="#94a3b8" font-size="11" text-anchor="middle">2023Q4</text>

    <rect x="130" y="133" width="100" height="67" fill="#60a5fa"/>
    <text x="180" y="126" fill="#60a5fa" font-size="11" text-anchor="middle">2,674</text>
    <text x="180" y="430" fill="#94a3b8" font-size="11" text-anchor="middle">24Q1</text>

    <rect x="240" y="130" width="100" height="70" fill="#60a5fa"/>
    <text x="290" y="123" fill="#60a5fa" font-size="11" text-anchor="middle">2,802</text>
    <text x="290" y="430" fill="#94a3b8" font-size="11" text-anchor="middle">24Q2</text>

    <rect x="350" y="200" width="100" height="32" fill="#ef4444"/>
    <text x="400" y="246" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">-1,281</text>
    <text x="400" y="430" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">24Q3</text>
    <text x="400" y="448" fill="#ef4444" font-size="10" text-anchor="middle">적자 전환</text>

    <rect x="460" y="200" width="100" height="4" fill="#ef4444"/>
    <text x="510" y="218" fill="#ef4444" font-size="11" text-anchor="middle">-155</text>
    <text x="510" y="430" fill="#94a3b8" font-size="11" text-anchor="middle">24Q4</text>

    <rect x="570" y="200" width="100" height="109" fill="#ef4444" opacity="0.9"/>
    <text x="620" y="324" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">-4,341</text>
    <text x="620" y="430" fill="#ef4444" font-size="11" text-anchor="middle">25Q1</text>

    <rect x="680" y="200" width="100" height="105" fill="#ef4444" opacity="0.9"/>
    <text x="730" y="320" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">-4,202</text>
    <text x="730" y="430" fill="#94a3b8" font-size="11" text-anchor="middle">25Q2</text>

    <rect x="790" y="200" width="100" height="101" fill="#ef4444" opacity="0.9"/>
    <text x="840" y="316" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">-4,043</text>
    <text x="840" y="430" fill="#94a3b8" font-size="11" text-anchor="middle">25Q3</text>

    <rect x="900" y="200" width="100" height="116" fill="#ef4444"/>
    <text x="950" y="331" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">-4,638</text>
    <text x="950" y="430" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">25Q4</text>
  </g>

  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="100" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="30" y="32" fill="#ef4444" font-size="15" font-weight="700">2024Q3 전환점 — 한 분기 영업이익 4,083억 감소</text>
    <text x="30" y="58" fill="#94a3b8" font-size="12">① 매출 -30% (EV 재고조정) + ② 고가 재고 감손 인식 + ③ 유럽·미국 공장 가동률 70% 이하 하락</text>
    <text x="30" y="80" fill="#22c55e" font-size="12" font-weight="700">→ 2025년 내내 이 3요인 유지. 분기당 -4천억대 적자 5분기 연속 (2024Q3~2025Q4).</text>
  </g>
</svg>
