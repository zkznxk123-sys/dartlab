<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>향후 12~24개월 투자 포인트 체크리스트 5가지</title>
  <desc>분기 매출·매출총이익률·AMPC·이자보상·LFP 대응 5개 추적 지표</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">다음 12~24개월 추적 5개</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">분기 보고서 나올 때마다 이 5개를 체크하면 사이클 방향이 보인다</text>

  <!-- 체크리스트 5개 항목 -->
  <g transform="translate(60, 150)" font-family="-apple-system,'Segoe UI',sans-serif">
    <!-- 1 -->
    <rect x="0" y="0" width="960" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="45" r="22" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="52" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="85" y="38" fill="#f1f5f9" font-size="18" font-weight="700">분기 매출 저점 확인</text>
    <text x="85" y="62" fill="#e2e8f0" font-size="14">2025Q2~Q3 저점 5.57~5.70조 · 2026 분기 6조대 복귀 여부 = EV 수요 반등 초기 신호</text>
    <text x="85" y="82" fill="#fbbf24" font-size="12">→ 분기 실적 공시 · `c.select("IS",["매출액"])`</text>

    <!-- 2 -->
    <rect x="0" y="105" width="960" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="150" r="22" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="40" y="157" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="85" y="143" fill="#f1f5f9" font-size="18" font-weight="700">매출총이익률 18%+ 안정</text>
    <text x="85" y="167" fill="#e2e8f0" font-size="14">2025 17.88% 돌파. 2026년 분기 20% 회복 여부 = 고정비 흡수·가동률 정상화 직접 지표</text>
    <text x="85" y="187" fill="#fbbf24" font-size="12">→ 분기 IR · `c.analysis("financial","수익성")["marginWaterfall"]`</text>

    <!-- 3 -->
    <rect x="0" y="210" width="960" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="255" r="22" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="262" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="85" y="248" fill="#f1f5f9" font-size="18" font-weight="700">IRA AMPC 정책 변화</text>
    <text x="85" y="272" fill="#e2e8f0" font-size="14">미국 IRA 개정 법안 실제 통과 여부. 단계 축소 시 영업이익 1조 수준 삭감 가능. 뉴스 추적 필수</text>
    <text x="85" y="292" fill="#fbbf24" font-size="12">→ 미국 의회 법안 · LG에너지솔루션 IR 해명 공시</text>

    <!-- 4 -->
    <rect x="0" y="315" width="960" height="90" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="360" r="22" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="40" y="367" fill="#a855f7" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="85" y="353" fill="#f1f5f9" font-size="18" font-weight="700">이자보상배율 3배 복귀</text>
    <text x="85" y="377" fill="#e2e8f0" font-size="14">현재 1.2배 위험 수준. 3배 복귀 = 재무 건전화. 영업 5천억+ 분기 + 차입금 순감소 동반 조건</text>
    <text x="85" y="397" fill="#fbbf24" font-size="12">→ 분기 재무제표 · `c.analysis("financial","자금조달")["interestBurden"]`</text>

    <!-- 5 -->
    <rect x="0" y="420" width="960" height="90" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="465" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="472" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="85" y="458" fill="#f1f5f9" font-size="18" font-weight="700">LFP 대응 가속 여부</text>
    <text x="85" y="482" fill="#e2e8f0" font-size="14">난징 LFP 전용라인·북미 ESS 라인 생산능력 확대 공시. 2026 GWh 단위 구체 숫자 나오는지</text>
    <text x="85" y="502" fill="#fbbf24" font-size="12">→ CMD (Capital Markets Day) · 증설 공시</text>
  </g>

  <!-- 하단 요약 -->
  <g transform="translate(60, 690)">
    <text x="0" y="15" fill="#94a3b8" font-size="13">5개 모두 긍정 = 첫 사이클 완성 · 하나라도 미달 = 두 번째 계곡 · AMPC가 변수 1순위</text>
  </g>
</svg>
