<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>이차전지 4사 비교 — 2025년 LG엔솔·삼성SDI·SK이노·포스코퓨처엠·에코프로비엠</title>
  <desc>영업이익률·부채비율·사채 단기비중·ICR 대조. LG엔솔이 마진+만기구조 모두 건전</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">이차전지 5사 — 같은 사이클, 다른 자리</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">2025년 기준 · 매출·OPM·부채비율·사채 만기구조·ICR 동시 비교</text>

  <!-- 표 영역 -->
  <g transform="translate(60, 160)">
    <!-- 헤더 행 -->
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b"/>
    <text x="30" y="32" fill="#e2e8f0" font-size="16" font-weight="700">회사</text>
    <text x="275" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">매출 (조)</text>
    <text x="425" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">OPM (%)</text>
    <text x="580" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">부채비율 (%)</text>
    <text x="745" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">단기비중 (%)</text>
    <text x="900" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">ICR (배)</text>
    <text x="1035" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">등급</text>

    <!-- 구분선 -->
    <line x1="0" y1="50" x2="1080" y2="50" stroke="#334155" stroke-width="1"/>

    <!-- LG엔솔 (강조) -->
    <rect x="0" y="50" width="1080" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="85" fill="#fbbf24" font-size="18" font-weight="700">LG에너지솔루션</text>
    <text x="30" y="108" fill="#94a3b8" font-size="13">373220 · 글로벌 2위</text>
    <text x="275" y="95" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">23.67</text>
    <text x="425" y="95" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">+5.69</text>
    <text x="580" y="95" fill="#fbbf24" font-size="18" text-anchor="middle">121.0</text>
    <text x="745" y="95" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">10.9</text>
    <text x="900" y="95" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">6.54</text>
    <text x="1035" y="95" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">dCR-A-</text>

    <!-- 삼성SDI -->
    <rect x="0" y="120" width="1080" height="70" fill="#0f172a"/>
    <text x="30" y="155" fill="#e2e8f0" font-size="17" font-weight="700">삼성SDI</text>
    <text x="30" y="178" fill="#94a3b8" font-size="13">006400 · 글로벌 6위</text>
    <text x="275" y="165" fill="#e2e8f0" font-size="17" text-anchor="middle">13.27</text>
    <text x="425" y="165" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">-12.98</text>
    <text x="580" y="165" fill="#22c55e" font-size="17" text-anchor="middle">81.3</text>
    <text x="745" y="165" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
    <text x="900" y="165" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">-0.41</text>
    <text x="1035" y="165" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">dCR-A</text>

    <!-- SK이노베이션 -->
    <rect x="0" y="190" width="1080" height="70" fill="#1e293b"/>
    <text x="30" y="225" fill="#e2e8f0" font-size="17" font-weight="700">SK이노베이션</text>
    <text x="30" y="248" fill="#94a3b8" font-size="13">096770 · SK On 연결</text>
    <text x="275" y="235" fill="#e2e8f0" font-size="17" text-anchor="middle">74.09</text>
    <text x="425" y="235" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
    <text x="580" y="235" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">194.4</text>
    <text x="745" y="235" fill="#fbbf24" font-size="17" text-anchor="middle">34.2</text>
    <text x="900" y="235" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">-0.01</text>
    <text x="1035" y="235" fill="#ef4444" font-size="17" text-anchor="middle">고위험</text>

    <!-- 포스코퓨처엠 -->
    <rect x="0" y="260" width="1080" height="70" fill="#0f172a"/>
    <text x="30" y="295" fill="#e2e8f0" font-size="17" font-weight="700">포스코퓨처엠</text>
    <text x="30" y="318" fill="#94a3b8" font-size="13">003670 · 양극재·음극재</text>
    <text x="275" y="305" fill="#e2e8f0" font-size="17" text-anchor="middle">~4.5</text>
    <text x="425" y="305" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
    <text x="580" y="305" fill="#fbbf24" font-size="17" text-anchor="middle">108.3</text>
    <text x="745" y="305" fill="#fbbf24" font-size="17" text-anchor="middle">35.3</text>
    <text x="900" y="305" fill="#fbbf24" font-size="17" text-anchor="middle">0.20</text>
    <text x="1035" y="305" fill="#fbbf24" font-size="17" text-anchor="middle">주의</text>

    <!-- 에코프로비엠 -->
    <rect x="0" y="330" width="1080" height="70" fill="#1e293b"/>
    <text x="30" y="365" fill="#e2e8f0" font-size="17" font-weight="700">에코프로비엠</text>
    <text x="30" y="388" fill="#94a3b8" font-size="13">247540 · 양극재 전문</text>
    <text x="275" y="375" fill="#e2e8f0" font-size="17" text-anchor="middle">~2.0</text>
    <text x="425" y="375" fill="#94a3b8" font-size="14" text-anchor="middle">—</text>
    <text x="580" y="375" fill="#ef4444" font-size="17" text-anchor="middle">142.2</text>
    <text x="745" y="375" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">100.0</text>
    <text x="900" y="375" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">0.03</text>
    <text x="1035" y="375" fill="#ef4444" font-size="17" text-anchor="middle">고위험</text>
  </g>

  <!-- 하단 해석 박스 -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="140" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <text x="30" y="35" fill="#22c55e" font-size="18" font-weight="700">핵심 해석</text>

    <text x="30" y="68" fill="#e2e8f0" font-size="15">• LG엔솔만 흑자 유지. 삼성SDI는 OPM -12.98%로 적자, SK이노베이션 배터리 자회사(SK온) 지속 적자로 부채비율 194%.</text>
    <text x="30" y="94" fill="#e2e8f0" font-size="15">• LG엔솔 단기차입 비중 10.9%로 5사 중 가장 낮음. 사채 중심 장기조달 구조 = 유동성 긴장도 낮음.</text>
    <text x="30" y="120" fill="#e2e8f0" font-size="15">• 캡티브 고객 분산(GM·현대차·Stellantis 3축)이 2024~2025 수요 감속 충격을 분산. 삼성SDI는 BMW·Stellantis 의존이 급소.</text>
  </g>

  <text x="60" y="795" fill="#64748b" font-size="12">데이터: dartlab.scan("debt") + c.analysis("financial","수익성") · 2026-04-23</text>
</svg>
