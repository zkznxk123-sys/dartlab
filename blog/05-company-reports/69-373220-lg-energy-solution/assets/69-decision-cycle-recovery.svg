<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>사이클 반등 판단 트리 — 2026~2027 3조건 동시 충족</title>
  <desc>분기 매출 6조 + 매출총이익률 20% + 이자보상배율 3배. 셋 중 하나라도 못 오면 계곡 바닥</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">사이클이 돌았는가 — 2026 3조건 동시 검증</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">"매출 반등 + 마진 회복 + 이자 부담 완화" 3개가 동시에 와야 첫 사이클 완성</text>

  <!-- 상단: 현재 상태 -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="1080" height="100" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="20" y="35" fill="#fbbf24" font-size="18" font-weight="700">현재 (2025년 말)</text>
    <text x="20" y="65" fill="#e2e8f0" font-size="14">매출 23.67조 (2023 대비 -29.9%) · OPM 5.69% V자 · 매출총이익률 17.88% · 이자보상배율 1.2배</text>
    <text x="20" y="88" fill="#94a3b8" font-size="13">영업이익 1.35조 흑자 유지, 그러나 순이익은 808억으로 금융비용+법인세가 94% 흡수</text>
  </g>

  <!-- 중앙 분기 -->
  <g transform="translate(60, 290)">
    <text x="540" y="30" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">↓ 2026~2027 3조건 ↓</text>
  </g>

  <!-- 3 조건 박스 -->
  <g transform="translate(60, 350)">
    <!-- 조건 1 -->
    <rect x="0" y="0" width="340" height="220" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="170" y="40" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">조건 1 · 매출 반등</text>
    <text x="170" y="90" fill="#fbbf24" font-size="30" font-weight="700" text-anchor="middle">분기 6조+</text>
    <text x="170" y="115" fill="#94a3b8" font-size="13" text-anchor="middle">연율 24조 복귀 ≒ 2024 수준</text>

    <text x="20" y="155" fill="#e2e8f0" font-size="14">• 2025Q2~Q3 저점 5.57~5.70조</text>
    <text x="20" y="180" fill="#e2e8f0" font-size="14">• 2026 전 분기 6조대</text>
    <text x="20" y="205" fill="#22c55e" font-size="14" font-weight="700">→ EV 수요 반등 초기 신호</text>

    <!-- 조건 2 -->
    <rect x="370" y="0" width="340" height="220" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>
    <text x="540" y="40" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">조건 2 · 마진 안정</text>
    <text x="540" y="90" fill="#fbbf24" font-size="30" font-weight="700" text-anchor="middle">GPM 20%+</text>
    <text x="540" y="115" fill="#94a3b8" font-size="13" text-anchor="middle">분기 매출총이익률 20% 회복</text>

    <text x="390" y="155" fill="#e2e8f0" font-size="14">• 현재 17.88% · 2021 21.84%</text>
    <text x="390" y="180" fill="#e2e8f0" font-size="14">• 가동률 80%+ 정상화</text>
    <text x="390" y="205" fill="#3b82f6" font-size="14" font-weight="700">→ 고정비 흡수 완료</text>

    <!-- 조건 3 -->
    <rect x="740" y="0" width="340" height="220" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
    <text x="910" y="40" fill="#a855f7" font-size="18" font-weight="700" text-anchor="middle">조건 3 · 이자 완화</text>
    <text x="910" y="90" fill="#fbbf24" font-size="30" font-weight="700" text-anchor="middle">ICR 3배+</text>
    <text x="910" y="115" fill="#94a3b8" font-size="13" text-anchor="middle">이자보상배율 3배 복귀</text>

    <text x="760" y="155" fill="#e2e8f0" font-size="14">• 현재 1.2배 · 위험 수준</text>
    <text x="760" y="180" fill="#e2e8f0" font-size="14">• 영업 5천억+ 분기 안정</text>
    <text x="760" y="205" fill="#a855f7" font-size="14" font-weight="700">→ 차입 구조 건전화</text>
  </g>

  <!-- 결론 분기 -->
  <g transform="translate(60, 620)">
    <!-- 3개 모두 OK -->
    <rect x="0" y="0" width="520" height="130" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="260" y="38" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">✓ 3조건 동시 충족</text>
    <text x="20" y="70" fill="#e2e8f0" font-size="15">첫 사이클 완성 · 이익 재투자 구조 정상화</text>
    <text x="20" y="95" fill="#e2e8f0" font-size="15">배당 재개 가능성 검토 · ROIC 10%+ 복귀 경로</text>
    <text x="20" y="120" fill="#94a3b8" font-size="13">2026~2027 유지되면 "CAPEX가 수익으로 전환된 해" 확정</text>

    <!-- 하나라도 미달 -->
    <rect x="560" y="0" width="520" height="130" fill="#0f172a" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="820" y="38" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">✗ 하나라도 미달</text>
    <text x="580" y="70" fill="#e2e8f0" font-size="15">두 번째 계곡 진입 가능성</text>
    <text x="580" y="95" fill="#e2e8f0" font-size="15">이자보상 1배 이하 시 차입 구조 위험 확대</text>
    <text x="580" y="120" fill="#94a3b8" font-size="13">AMPC 축소 + EV 수요 지체 + 중국 LFP 침투 복합 시</text>
  </g>

  <text x="60" y="790" fill="#64748b" font-size="12">데이터: dartlab.Company("373220") · quarterly tracking · 2026~2027 분기 보고 시 재평가</text>
</svg>
