<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>LG에너지솔루션 글로벌 공장 지형 — 4대륙 550GWh</title>
  <desc>한국·중국·폴란드·미국·캐나다·인도네시아 공장 위치와 연 생산능력·파트너 구조</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">CAPEX 55조가 남긴 것 — 4대륙 550GWh</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">한국 오창 · 중국 난징 · 폴란드 브로츠와프 · 미국 5공장 · 캐나다 1 · 인도네시아 1</text>

  <!-- 지역별 박스 -->
  <g transform="translate(60, 150)">
    <!-- 한국 -->
    <rect x="0" y="0" width="250" height="150" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>
    <text x="20" y="35" fill="#3b82f6" font-size="18" font-weight="700">🇰🇷 한국</text>
    <text x="20" y="65" fill="#f1f5f9" font-size="14">오창 1·2공장 (충북)</text>
    <text x="20" y="90" fill="#94a3b8" font-size="13">단독 운영</text>
    <text x="20" y="125" fill="#fbbf24" font-size="22" font-weight="700">~34 GWh</text>

    <!-- 중국 -->
    <rect x="270" y="0" width="250" height="150" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="290" y="35" fill="#ef4444" font-size="18" font-weight="700">🇨🇳 중국</text>
    <text x="290" y="65" fill="#f1f5f9" font-size="14">난징 1·2·3공장 (장쑤)</text>
    <text x="290" y="90" fill="#94a3b8" font-size="13">단독 · LFP 증설 중</text>
    <text x="290" y="125" fill="#fbbf24" font-size="22" font-weight="700">~105 GWh</text>

    <!-- 폴란드 -->
    <rect x="540" y="0" width="250" height="150" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="560" y="35" fill="#22c55e" font-size="18" font-weight="700">🇵🇱 폴란드</text>
    <text x="560" y="65" fill="#f1f5f9" font-size="14">브로츠와프 1·2공장</text>
    <text x="560" y="90" fill="#94a3b8" font-size="13">단독 · 유럽 1위</text>
    <text x="560" y="125" fill="#fbbf24" font-size="22" font-weight="700">~86 GWh</text>

    <!-- 인도네시아 -->
    <rect x="810" y="0" width="250" height="150" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="830" y="35" fill="#fbbf24" font-size="18" font-weight="700">🇮🇩 인도네시아</text>
    <text x="830" y="65" fill="#f1f5f9" font-size="14">KIT Batang (HLI)</text>
    <text x="830" y="90" fill="#94a3b8" font-size="13">현대차 JV · 2025 양산</text>
    <text x="830" y="125" fill="#fbbf24" font-size="22" font-weight="700">~33 GWh</text>

    <!-- 미국 (큰 블록) -->
    <rect x="0" y="170" width="790" height="250" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
    <text x="20" y="205" fill="#a855f7" font-size="18" font-weight="700">🇺🇸 미국 — JV 4 + 단독 1</text>

    <line x1="20" y1="215" x2="770" y2="215" stroke="#334155" stroke-width="1"/>

    <!-- 미시간 -->
    <text x="20" y="245" fill="#f1f5f9" font-size="14" font-weight="700">홀랜드 (미시간)</text>
    <text x="20" y="265" fill="#94a3b8" font-size="12">단독 · 확장 중</text>
    <text x="20" y="290" fill="#fbbf24" font-size="18" font-weight="700">~25 GWh</text>

    <!-- 얼티엄셀즈 -->
    <text x="220" y="245" fill="#f1f5f9" font-size="14" font-weight="700">얼티엄셀즈 1·2·3</text>
    <text x="220" y="265" fill="#94a3b8" font-size="12">GM JV 50:50</text>
    <text x="220" y="290" fill="#fbbf24" font-size="18" font-weight="700">~145 GWh</text>
    <text x="220" y="310" fill="#22c55e" font-size="11">오하이오·테네시·미시간</text>

    <!-- 애리조나 -->
    <text x="420" y="245" fill="#f1f5f9" font-size="14" font-weight="700">Queen Creek (AZ)</text>
    <text x="420" y="265" fill="#94a3b8" font-size="12">단독 · 2025 말 양산</text>
    <text x="420" y="290" fill="#fbbf24" font-size="18" font-weight="700">~43 GWh</text>
    <text x="420" y="310" fill="#94a3b8" font-size="11">ESS + EV 파우치</text>

    <!-- HAEL 조지아 -->
    <text x="620" y="245" fill="#f1f5f9" font-size="14" font-weight="700">HAEL (조지아)</text>
    <text x="620" y="265" fill="#94a3b8" font-size="12">현대차 JV · 2025 가동</text>
    <text x="620" y="290" fill="#fbbf24" font-size="18" font-weight="700">~30 GWh</text>

    <!-- IRA AMPC 태그 -->
    <rect x="20" y="340" width="750" height="60" fill="#0f172a" rx="6"/>
    <text x="35" y="365" fill="#fbbf24" font-size="14" font-weight="700">⚡ IRA AMPC: 미국 공장 전체에서 kWh당 $45 세액공제 적용 — 2025 약 1.5조</text>
    <text x="35" y="387" fill="#94a3b8" font-size="12">얼티엄셀즈 3공장 + 홀랜드 + 애리조나 + HAEL 합산 수혜. 정책 축소 시 영업이익 직접 타격</text>

    <!-- 캐나다 (오른쪽 작은 박스) -->
    <rect x="810" y="170" width="250" height="250" fill="#1e293b" stroke="#60a5fa" stroke-width="2" rx="10"/>
    <text x="830" y="205" fill="#60a5fa" font-size="18" font-weight="700">🇨🇦 캐나다</text>
    <text x="830" y="240" fill="#f1f5f9" font-size="14" font-weight="700">Nextstar Energy</text>
    <text x="830" y="265" fill="#f1f5f9" font-size="14">(Windsor, 온타리오)</text>
    <text x="830" y="295" fill="#94a3b8" font-size="13">Stellantis JV 50:50</text>
    <text x="830" y="320" fill="#94a3b8" font-size="13">2024 가동 시작</text>
    <text x="830" y="360" fill="#fbbf24" font-size="24" font-weight="700">~49 GWh</text>
    <text x="830" y="390" fill="#ef4444" font-size="12">⚠ Stellantis EV 축소로</text>
    <text x="830" y="405" fill="#ef4444" font-size="12">가동률 미달 중</text>
  </g>

  <!-- 하단 합계 -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="30" y="40" fill="#fbbf24" font-size="20" font-weight="700">총 공식·추진 용량 약 550 GWh</text>
    <text x="30" y="62" fill="#94a3b8" font-size="13">실가동 300~400 GWh · 세계 2위 (1위 CATL ~670) · JV 5개·단독 5개 분산 구조</text>
  </g>

  <text x="60" y="700" fill="#64748b" font-size="12">데이터: LG에너지솔루션 IR + 공시 + SNE Research 2025년 1월 · 2026-04-23</text>
</svg>
