<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>LG에너지솔루션 2025 — 매출 23.67조에서 순이익 808억까지</title>
  <desc>매출총이익률 17.88%에서 영업이익률 5.69%, 세전 1.75%, 순이익률 0.34%로 단계별 감손</desc>

  <!-- 제목 -->
  <text x="60" y="70" fill="#f1f5f9" font-size="32" font-weight="700">LG에너지솔루션 2025 — 이익이 감손되는 4단계</text>
  <text x="60" y="105" fill="#94a3b8" font-size="18">매출 100원이 순이익 0.34원이 될 때까지 · 단위: 매출 대비 누적 %</text>

  <!-- 막대 그래프 -->
  <g transform="translate(60, 160)">
    <!-- 기준선 -->
    <line x1="0" y1="400" x2="1080" y2="400" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Step 1: 매출 100% -->
    <rect x="0" y="0" width="120" height="400" fill="#3b82f6" opacity="0.85"/>
    <text x="60" y="-12" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">매출</text>
    <text x="60" y="215" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">100.00%</text>
    <text x="60" y="245" fill="#e2e8f0" font-size="14" text-anchor="middle">23.67조</text>

    <!-- 감소 화살 1 → 매출원가 -->
    <path d="M 125 200 L 155 200" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="140" y="180" fill="#ef4444" font-size="14" text-anchor="middle">−82.12</text>

    <!-- Step 2: 매출총이익 17.88% -->
    <rect x="160" y="329" width="120" height="71" fill="#22c55e" opacity="0.85"/>
    <text x="220" y="317" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">매출총이익</text>
    <text x="220" y="380" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">17.88%</text>
    <text x="220" y="420" fill="#e2e8f0" font-size="14" text-anchor="middle">4.23조</text>

    <!-- 감소 화살 2 → 판관비 -->
    <path d="M 285 365 L 315 365" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="300" y="345" fill="#ef4444" font-size="14" text-anchor="middle">−19.15</text>

    <!-- Step 3: 영업이익 5.69% -->
    <rect x="320" y="377" width="120" height="23" fill="#22c55e" opacity="0.85"/>
    <text x="380" y="365" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">영업이익</text>
    <text x="380" y="395" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">5.69%</text>
    <text x="380" y="420" fill="#e2e8f0" font-size="14" text-anchor="middle">1.35조</text>

    <!-- 감소 화살 3 → 금융비용 -->
    <path d="M 445 390 L 475 390" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="460" y="370" fill="#ef4444" font-size="14" text-anchor="middle">−4.67</text>

    <!-- Step 4: 세전이익 1.75% -->
    <rect x="480" y="393" width="120" height="7" fill="#fbbf24" opacity="0.85"/>
    <text x="540" y="381" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">세전이익</text>
    <text x="540" y="389" fill="#f1f5f9" font-size="12" font-weight="700" text-anchor="middle">1.75%</text>
    <text x="540" y="420" fill="#e2e8f0" font-size="14" text-anchor="middle">0.41조</text>

    <!-- 감소 화살 4 → 법인세 -->
    <path d="M 605 395 L 635 395" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="620" y="375" fill="#ef4444" font-size="14" text-anchor="middle">−1.41</text>

    <!-- Step 5: 순이익 0.34% -->
    <rect x="640" y="399" width="120" height="1.4" fill="#ef4444" opacity="0.95"/>
    <text x="700" y="385" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">순이익</text>
    <text x="700" y="393" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">0.34%</text>
    <text x="700" y="420" fill="#fbbf24" font-size="14" text-anchor="middle">808억</text>

    <!-- 강조 배지 -->
    <g transform="translate(800, 140)">
      <rect x="0" y="0" width="260" height="240" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
      <text x="130" y="40" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">핵심 판단</text>
      <text x="20" y="80" fill="#e2e8f0" font-size="15">영업이익의 94%가</text>
      <text x="20" y="108" fill="#e2e8f0" font-size="15">금융비용 + 법인세로</text>
      <text x="20" y="136" fill="#e2e8f0" font-size="15">상쇄된다.</text>
      <text x="20" y="175" fill="#94a3b8" font-size="13">금융비용 1.10조</text>
      <text x="20" y="198" fill="#94a3b8" font-size="13">법인세 0.33조</text>
      <text x="20" y="221" fill="#94a3b8" font-size="13">유효세율 80.5%</text>
    </g>

    <!-- 화살표 정의 -->
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
      </marker>
    </defs>
  </g>

  <!-- 하단 라벨 -->
  <text x="60" y="680" fill="#64748b" font-size="13">데이터: dartlab c.analysis("financial","수익성")["marginWaterfall"]["history"][0] · 2026-04-23</text>
</svg>
