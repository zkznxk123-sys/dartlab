<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>매출총이익률 V자 반등 — 3엔진 시그널 카드</title>
  <desc>2024 저점 13.29% → 2025 17.88% +4.59%p. 고가 재고 소진·LFP 전환·AMPC 3엔진</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">매출총이익률 V자 반등의 3엔진</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">2024 13.29% → 2025 17.88% · +4.59%p · 매출은 빠졌는데 원가가 먼저 내려간 해</text>

  <!-- 중앙 V자 그래프 (간단) -->
  <g transform="translate(60, 140)">
    <line x1="0" y1="140" x2="960" y2="140" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- 2021 21.84% -->
    <circle cx="60" cy="0" r="8" fill="#3b82f6"/>
    <text x="60" y="-18" fill="#3b82f6" font-size="13" text-anchor="middle">21.84%</text>
    <text x="60" y="170" fill="#94a3b8" font-size="13" text-anchor="middle">2021</text>

    <!-- 2022 16.76% -->
    <circle cx="250" cy="80" r="8" fill="#3b82f6"/>
    <text x="250" y="62" fill="#3b82f6" font-size="13" text-anchor="middle">16.76%</text>
    <text x="250" y="170" fill="#94a3b8" font-size="13" text-anchor="middle">2022</text>

    <!-- 2023 14.65% -->
    <circle cx="440" cy="115" r="8" fill="#3b82f6"/>
    <text x="440" y="97" fill="#3b82f6" font-size="13" text-anchor="middle">14.65%</text>
    <text x="440" y="170" fill="#94a3b8" font-size="13" text-anchor="middle">2023</text>

    <!-- 2024 13.29% ★저점 -->
    <circle cx="630" cy="137" r="11" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <text x="630" y="122" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">13.29% 저점</text>
    <text x="630" y="170" fill="#94a3b8" font-size="13" text-anchor="middle">2024</text>

    <!-- 2025 17.88% ★반등 -->
    <circle cx="820" cy="66" r="11" fill="#22c55e" stroke="#fff" stroke-width="2"/>
    <text x="820" y="48" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">17.88% 반등</text>
    <text x="820" y="170" fill="#94a3b8" font-size="13" text-anchor="middle">2025</text>

    <!-- 연결선 -->
    <polyline points="60,0 250,80 440,115 630,137 820,66" fill="none" stroke="#fbbf24" stroke-width="3"/>
  </g>

  <!-- 3엔진 카드 -->
  <g transform="translate(60, 360)">
    <!-- 엔진 1: 재고 소진 -->
    <rect x="0" y="0" width="300" height="280" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="150" y="40" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">엔진 1 · 재고 소진</text>
    <text x="150" y="85" fill="#fbbf24" font-size="38" font-weight="700" text-anchor="middle">7.00 → 4.35</text>
    <text x="150" y="108" fill="#94a3b8" font-size="12" text-anchor="middle">재고자산 (2022Q4 → 2025Q4, 조원)</text>

    <text x="20" y="150" fill="#e2e8f0" font-size="13">리튬 가격 −87%</text>
    <text x="20" y="175" fill="#94a3b8" font-size="12">톤당 60만 → 8만 위안</text>

    <text x="20" y="205" fill="#e2e8f0" font-size="13">3년간 2.65조 재고 소진</text>
    <text x="20" y="230" fill="#94a3b8" font-size="12">고가 원재료 소진 완료</text>

    <text x="20" y="260" fill="#22c55e" font-size="12" font-weight="700">→ 매출원가율 −4.59%p 기여</text>

    <!-- 엔진 2: LFP 전환 -->
    <rect x="330" y="0" width="300" height="280" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>
    <text x="480" y="40" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">엔진 2 · LFP 전환</text>
    <text x="480" y="85" fill="#fbbf24" font-size="38" font-weight="700" text-anchor="middle">0 → 15%</text>
    <text x="480" y="108" fill="#94a3b8" font-size="12" text-anchor="middle">LFP 비중 (2023 → 2025)</text>

    <text x="350" y="150" fill="#e2e8f0" font-size="13">난징 LFP 전용라인</text>
    <text x="350" y="175" fill="#94a3b8" font-size="12">2024 증설 + 양산</text>

    <text x="350" y="205" fill="#e2e8f0" font-size="13">북미 ESS LFP + 캐스퍼</text>
    <text x="350" y="230" fill="#94a3b8" font-size="12">볼륨 + 가동률 유지</text>

    <text x="350" y="260" fill="#3b82f6" font-size="12" font-weight="700">→ 공장 고정비 분산</text>

    <!-- 엔진 3: AMPC -->
    <rect x="660" y="0" width="300" height="280" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="810" y="40" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">엔진 3 · IRA AMPC</text>
    <text x="810" y="85" fill="#fbbf24" font-size="38" font-weight="700" text-anchor="middle">~1.5조</text>
    <text x="810" y="108" fill="#94a3b8" font-size="12" text-anchor="middle">2025 AMPC 추산 (매출 인식)</text>

    <text x="680" y="150" fill="#e2e8f0" font-size="13">kWh당 $45 세액공제</text>
    <text x="680" y="175" fill="#94a3b8" font-size="12">셀 $35 + 모듈 $10</text>

    <text x="680" y="205" fill="#e2e8f0" font-size="13">영업이익 1.35조와 동급</text>
    <text x="680" y="230" fill="#94a3b8" font-size="12">AMPC ≒ 영업이익 전체</text>

    <text x="680" y="260" fill="#ef4444" font-size="12" font-weight="700">⚠ 미국 정치 리스크</text>
  </g>

  <text x="60" y="695" fill="#64748b" font-size="12">데이터: dartlab marginWaterfall · notesDetail · IR 추정 (AMPC) · 2026-04-23</text>
</svg>
