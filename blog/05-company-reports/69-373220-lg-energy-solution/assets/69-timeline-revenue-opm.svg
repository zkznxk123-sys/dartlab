<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>LG에너지솔루션 4년 시계열 — 매출·영업이익률·순이익</title>
  <desc>2021~2025 매출 바 + OPM 선 + 순이익 점. 매출 피크 2023, OPM V자 반등 2024→2025</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">4년의 궤적 — 매출은 내려가고 이익률은 돌아온다</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">매출 (바) · 영업이익률 (선) · 순이익 (점) · 상장 후 2022~2025</text>

  <!-- 축 영역 -->
  <g transform="translate(80, 170)">
    <!-- Y축 1 (매출) -->
    <text x="-15" y="0" fill="#60a5fa" font-size="13" text-anchor="end">40조</text>
    <text x="-15" y="85" fill="#60a5fa" font-size="13" text-anchor="end">30조</text>
    <text x="-15" y="170" fill="#60a5fa" font-size="13" text-anchor="end">20조</text>
    <text x="-15" y="255" fill="#60a5fa" font-size="13" text-anchor="end">10조</text>
    <text x="-15" y="340" fill="#60a5fa" font-size="13" text-anchor="end">0</text>

    <!-- Y축 2 (OPM %) 오른쪽 -->
    <text x="1055" y="0" fill="#fbbf24" font-size="13">10%</text>
    <text x="1055" y="85" fill="#fbbf24" font-size="13">7%</text>
    <text x="1055" y="170" fill="#fbbf24" font-size="13">4%</text>
    <text x="1055" y="255" fill="#fbbf24" font-size="13">1%</text>
    <text x="1055" y="340" fill="#fbbf24" font-size="13">0</text>

    <!-- 기준선 -->
    <line x1="0" y1="340" x2="1040" y2="340" stroke="#334155" stroke-width="1"/>

    <!-- 매출 바 (2021~2025) -->
    <!-- 2021: 17.85조 -->
    <rect x="80" y="188" width="140" height="152" fill="#3b82f6" opacity="0.75"/>
    <text x="150" y="355" fill="#e2e8f0" font-size="14" text-anchor="middle">2021</text>
    <text x="150" y="180" fill="#e2e8f0" font-size="13" text-anchor="middle">17.85</text>

    <!-- 2022: 25.60조 -->
    <rect x="260" y="122" width="140" height="218" fill="#3b82f6" opacity="0.85"/>
    <text x="330" y="355" fill="#e2e8f0" font-size="14" text-anchor="middle">2022</text>
    <text x="330" y="114" fill="#e2e8f0" font-size="13" text-anchor="middle">25.60</text>

    <!-- 2023: 33.75조 (피크) -->
    <rect x="440" y="53" width="140" height="287" fill="#22c55e" opacity="0.9"/>
    <text x="510" y="355" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">2023 ★피크</text>
    <text x="510" y="45" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">33.75</text>

    <!-- 2024: 25.62조 -->
    <rect x="620" y="122" width="140" height="218" fill="#3b82f6" opacity="0.85"/>
    <text x="690" y="355" fill="#e2e8f0" font-size="14" text-anchor="middle">2024</text>
    <text x="690" y="114" fill="#e2e8f0" font-size="13" text-anchor="middle">25.62</text>

    <!-- 2025: 23.67조 -->
    <rect x="800" y="139" width="140" height="201" fill="#ef4444" opacity="0.8"/>
    <text x="870" y="355" fill="#e2e8f0" font-size="14" text-anchor="middle">2025</text>
    <text x="870" y="131" fill="#e2e8f0" font-size="13" text-anchor="middle">23.67</text>

    <!-- OPM 꺾은선 (2021 4.30% · 2022 4.74% · 2023 6.41% · 2024 2.25% · 2025 5.69%) -->
    <polyline points="150,208 330,193 510,128 690,265 870,150"
              fill="none" stroke="#fbbf24" stroke-width="4"/>
    <!-- OPM 점 + 라벨 -->
    <g font-size="13" font-weight="700">
      <circle cx="150" cy="208" r="6" fill="#fbbf24"/>
      <text x="150" y="197" fill="#fbbf24" text-anchor="middle">4.30%</text>

      <circle cx="330" cy="193" r="6" fill="#fbbf24"/>
      <text x="330" y="182" fill="#fbbf24" text-anchor="middle">4.74%</text>

      <circle cx="510" cy="128" r="7" fill="#fbbf24" stroke="#fff" stroke-width="1.5"/>
      <text x="510" y="117" fill="#fbbf24" text-anchor="middle">6.41%</text>

      <circle cx="690" cy="265" r="7" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
      <text x="690" y="281" fill="#ef4444" text-anchor="middle">2.25% ↓</text>

      <circle cx="870" cy="150" r="7" fill="#fbbf24" stroke="#fff" stroke-width="1.5"/>
      <text x="870" y="138" fill="#fbbf24" text-anchor="middle">5.69% ↑</text>
    </g>

    <!-- 순이익 점 + 라벨 -->
    <g font-size="12">
      <circle cx="150" cy="280" r="4" fill="#a855f7"/>
      <text x="150" y="298" fill="#a855f7" text-anchor="middle">순 0.93</text>

      <circle cx="330" cy="290" r="4" fill="#a855f7"/>
      <text x="330" y="308" fill="#a855f7" text-anchor="middle">순 0.78</text>

      <circle cx="510" cy="262" r="4" fill="#a855f7"/>
      <text x="510" y="298" fill="#a855f7" text-anchor="middle">순 1.64</text>

      <circle cx="690" cy="322" r="4" fill="#a855f7"/>
      <text x="690" y="328" fill="#a855f7" text-anchor="middle">순 0.34</text>

      <circle cx="870" cy="337" r="5" fill="#ef4444" stroke="#fff" stroke-width="1"/>
      <text x="870" y="312" fill="#ef4444" font-weight="700" text-anchor="middle">순 0.08 ↓↓</text>
    </g>
  </g>

  <!-- 하단 범례 + 해석 -->
  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="18" height="18" fill="#3b82f6"/>
    <text x="28" y="14" fill="#e2e8f0" font-size="14">매출 (조원)</text>

    <rect x="150" y="8" width="24" height="3" fill="#fbbf24"/>
    <text x="184" y="14" fill="#e2e8f0" font-size="14">영업이익률 (%)</text>

    <circle cx="320" cy="11" r="5" fill="#a855f7"/>
    <text x="334" y="14" fill="#e2e8f0" font-size="14">순이익 (조원)</text>
  </g>

  <g transform="translate(80, 620)">
    <text x="0" y="20" fill="#fbbf24" font-size="16" font-weight="700">매출은 -29.9% 빠졌는데 영업이익률은 2년 만에 V자로 돌아왔다.</text>
    <text x="0" y="42" fill="#94a3b8" font-size="14">그런데 순이익은 1.64조 → 0.08조, 20분의 1. 영업이익과 순이익 사이에 1.27조가 사라진 해.</text>
  </g>

  <text x="80" y="700" fill="#64748b" font-size="12">데이터: dartlab c.select("IS",[...]) 분기 합산 · 2026-04-23 실측</text>
</svg>
