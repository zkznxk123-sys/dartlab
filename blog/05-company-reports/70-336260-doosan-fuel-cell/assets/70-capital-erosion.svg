<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>자본 -26% · 부채 +22% · 이자보상 -3.9배 — 재무 긴장도 4지표</title>
  <desc>2024 Q4 vs 2025 Q4 자본총계 4,989억 → 3,675억, 부채총계 6,808 → 8,309억, 부채비율 136% → 226%, Altman Z 0.27.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">재무 긴장도 4지표 — 자본은 줄고 부채는 늘었다</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">2024Q4 → 2025Q4 한 해 변화 · dartlab capitalFlags 경고 3건 동시 점등</text>

  <!-- 4개 지표 카드 -->
  <g transform="translate(60, 150)">
    <!-- 1: 자본총계 -->
    <rect x="0" y="0" width="250" height="200" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="125" y="40" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">자본총계 (억원)</text>
    <text x="125" y="95" fill="#94a3b8" font-size="26" font-weight="700" text-anchor="middle">4,989</text>
    <text x="125" y="115" fill="#94a3b8" font-size="12" text-anchor="middle">↓ -1,314억</text>
    <text x="125" y="155" fill="#ef4444" font-size="30" font-weight="700" text-anchor="middle">3,675</text>
    <text x="125" y="180" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">-26%</text>

    <!-- 2: 부채총계 -->
    <rect x="270" y="0" width="250" height="200" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="395" y="40" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">부채총계 (억원)</text>
    <text x="395" y="95" fill="#94a3b8" font-size="26" font-weight="700" text-anchor="middle">6,808</text>
    <text x="395" y="115" fill="#94a3b8" font-size="12" text-anchor="middle">↑ +1,501억</text>
    <text x="395" y="155" fill="#fbbf24" font-size="30" font-weight="700" text-anchor="middle">8,309</text>
    <text x="395" y="180" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">+22%</text>

    <!-- 3: 부채비율 -->
    <rect x="540" y="0" width="250" height="200" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="665" y="40" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">부채비율 (%)</text>
    <text x="665" y="95" fill="#94a3b8" font-size="26" font-weight="700" text-anchor="middle">136%</text>
    <text x="665" y="115" fill="#94a3b8" font-size="12" text-anchor="middle">↑ +90%p</text>
    <text x="665" y="155" fill="#ef4444" font-size="30" font-weight="700" text-anchor="middle">226%</text>
    <text x="665" y="180" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">고위험</text>

    <!-- 4: 자기자본비율 -->
    <rect x="810" y="0" width="250" height="200" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="935" y="40" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">자기자본비율 (%)</text>
    <text x="935" y="95" fill="#94a3b8" font-size="26" font-weight="700" text-anchor="middle">42%</text>
    <text x="935" y="115" fill="#94a3b8" font-size="12" text-anchor="middle">↓ -11%p</text>
    <text x="935" y="155" fill="#fbbf24" font-size="30" font-weight="700" text-anchor="middle">31%</text>
    <text x="935" y="180" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">주의</text>
  </g>

  <!-- 경고 플래그 영역 -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="1080" height="180" fill="#0f172a" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#ef4444" font-size="20" font-weight="700">⚠ dartlab capitalFlags 경고 3건 동시 점등</text>

    <g transform="translate(30, 70)">
      <circle cx="10" cy="10" r="6" fill="#ef4444"/>
      <text x="30" y="15" fill="#e2e8f0" font-size="15" font-weight="700">고부채 (부채비율 226%)</text>
      <text x="300" y="15" fill="#94a3b8" font-size="13">정상 범위 100% 이하 대비 2배 초과</text>
    </g>

    <g transform="translate(30, 100)">
      <circle cx="10" cy="10" r="6" fill="#ef4444"/>
      <text x="30" y="15" fill="#e2e8f0" font-size="15" font-weight="700">이자보상 심각 (-3.9배)</text>
      <text x="300" y="15" fill="#94a3b8" font-size="13">영업적자로 이자 지급 능력 음수 전환</text>
    </g>

    <g transform="translate(30, 130)">
      <circle cx="10" cy="10" r="6" fill="#ef4444"/>
      <text x="30" y="15" fill="#e2e8f0" font-size="15" font-weight="700">Altman Z 부실 경계 (0.27)</text>
      <text x="300" y="15" fill="#94a3b8" font-size="13">1.81 이상이 안전 구간, 0.27은 완전 부실 근접</text>
    </g>
  </g>

  <!-- 추가 경고 -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="30" y="35" fill="#fbbf24" font-size="17" font-weight="700">이익잉여금 +478억 → -850억 — 6년 누적 이익이 음수로 전환</text>
    <text x="30" y="60" fill="#94a3b8" font-size="14">자본잉여금 4,200억이 남아있어 완전자본잠식은 아니지만, 2026년 같은 수준 적자 시 상계 구간 진입 가능.</text>
  </g>

  <text x="60" y="710" fill="#64748b" font-size="12">데이터: dartlab c.analysis("financial","자금조달")["capitalFlags"] + c.credit("등급") · 2026-04-23</text>
</svg>
