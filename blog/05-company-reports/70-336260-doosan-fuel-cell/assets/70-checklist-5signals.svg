<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>다음 12~24개월 추적 5개 — 두산퓨얼셀 회생 조건</title>
  <desc>매출총이익률 0% 복귀 · HPS 4차 낙찰가 130원대 · SOFC 공식 정리 · 자본 확충 공시 · 해외 수출 20%</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">다음 12~24개월 추적 5개</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">분기 공시 나올 때마다 체크하면 회생 여부가 보인다</text>

  <g transform="translate(60, 150)">
    <!-- 1 -->
    <rect x="0" y="0" width="960" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="45" r="22" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="52" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="85" y="38" fill="#f1f5f9" font-size="18" font-weight="700">매출총이익률 0% 복귀</text>
    <text x="85" y="62" fill="#e2e8f0" font-size="14">현재 -13.70%. 2026 연간 GPM 0% 이상 복귀 = 구조 적자 탈출 최소 조건</text>
    <text x="85" y="82" fill="#fbbf24" font-size="12">→ 분기 공시 · c.analysis("financial","수익성")["marginWaterfall"]</text>

    <!-- 2 -->
    <rect x="0" y="105" width="960" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="150" r="22" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="40" y="157" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="85" y="143" fill="#f1f5f9" font-size="18" font-weight="700">HPS 4차 입찰 낙찰가 130원대 유지</text>
    <text x="85" y="167" fill="#e2e8f0" font-size="14">2026 상반기 4차 일반수소 입찰. 120원 아래로 빠지면 저가 수주 재체결 → 2027 재악화 경로</text>
    <text x="85" y="187" fill="#fbbf24" font-size="12">→ 산업통상자원부 입찰 공고 · 낙찰 결과 공시</text>

    <!-- 3 -->
    <rect x="0" y="210" width="960" height="90" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="255" r="22" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="40" y="262" fill="#a855f7" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="85" y="248" fill="#f1f5f9" font-size="18" font-weight="700">SOFC 사업 공식 정리</text>
    <text x="85" y="272" fill="#e2e8f0" font-size="14">이미 감손 400~500억 집행. 사업부 폐지 또는 분할매각 공시 = 재발 감손 리스크 제거 신호</text>
    <text x="85" y="292" fill="#fbbf24" font-size="12">→ 주요경영사항 공시 · 사업보고서 II장</text>

    <!-- 4 -->
    <rect x="0" y="315" width="960" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="360" r="22" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="367" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="85" y="353" fill="#f1f5f9" font-size="18" font-weight="700">자본 확충 공시 (유상증자 · 그룹 지원)</text>
    <text x="85" y="377" fill="#e2e8f0" font-size="14">자본 -26% 감소. 1,000억+ 확충 시 부채비율 완화. 두산그룹 지원 또는 제3자배정 가능성</text>
    <text x="85" y="397" fill="#fbbf24" font-size="12">→ 증권신고서 · 주식발행초과금 변동</text>

    <!-- 5 -->
    <rect x="0" y="420" width="960" height="90" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="465" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="472" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="85" y="458" fill="#f1f5f9" font-size="18" font-weight="700">해외 수출 비중 20% 복귀</text>
    <text x="85" y="482" fill="#e2e8f0" font-size="14">현재 10~15%. 미국·중국·동남아 수출 확대 시 HPS 입찰가 영향 없어 마진 방어 가능</text>
    <text x="85" y="502" fill="#fbbf24" font-size="12">→ 수출계약 체결 공시 · 분기 사업보고서</text>
  </g>

  <g transform="translate(60, 690)">
    <text x="0" y="15" fill="#94a3b8" font-size="13">5개 모두 긍정 = 사이클 바닥 통과 · 하나라도 부정 = 2026 재적자 가능성 · 자본 확충이 시간 벌기 1순위</text>
  </g>
</svg>
