<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>수소·SMR 3사 비교 — 두산퓨얼셀·에스퓨얼셀·뉴스케일파워</title>
  <desc>같은 에너지 전환 기조 회사들이 각자 다른 방식으로 현금이 녹는 중. 제품·규모·현금 여력 대조.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">수소·SMR 3사 — 같은 전환 기조, 다른 적자 형태</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">에너지 전환 업종 3편 완성편 · 각자 다른 속도로 현금이 녹는 중</text>

  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b"/>
    <text x="30" y="32" fill="#e2e8f0" font-size="16" font-weight="700">회사</text>
    <text x="320" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">제품</text>
    <text x="520" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">매출</text>
    <text x="680" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">OPM (%)</text>
    <text x="830" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">현금</text>
    <text x="990" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">생존 여력</text>

    <line x1="0" y1="50" x2="1080" y2="50" stroke="#334155"/>

    <!-- 두산퓨얼셀 (강조) -->
    <rect x="0" y="50" width="1080" height="100" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="90" fill="#fbbf24" font-size="18" font-weight="700">두산퓨얼셀</text>
    <text x="30" y="115" fill="#94a3b8" font-size="13">336260 · 국내 1위</text>
    <text x="30" y="138" fill="#94a3b8" font-size="12">이번 편 #70</text>
    <text x="320" y="95" fill="#e2e8f0" font-size="15" text-anchor="middle">PAFC 440kW</text>
    <text x="320" y="115" fill="#94a3b8" font-size="12" text-anchor="middle">인산형 발전</text>
    <text x="520" y="105" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">4,548억</text>
    <text x="680" y="105" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">-23.24</text>
    <text x="830" y="105" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">648억</text>
    <text x="990" y="100" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">2~3년</text>
    <text x="990" y="120" fill="#94a3b8" font-size="11" text-anchor="middle">(계약 재협상 조건)</text>

    <!-- 에스퓨얼셀 -->
    <rect x="0" y="155" width="1080" height="100" fill="#0f172a"/>
    <text x="30" y="195" fill="#e2e8f0" font-size="17" font-weight="700">에스퓨얼셀</text>
    <text x="30" y="220" fill="#94a3b8" font-size="13">288620 · 건물·수송</text>
    <text x="30" y="243" fill="#60a5fa" font-size="12">[#47]</text>
    <text x="320" y="200" fill="#e2e8f0" font-size="15" text-anchor="middle">PEMFC</text>
    <text x="320" y="220" fill="#94a3b8" font-size="12" text-anchor="middle">저온형 건물·차량</text>
    <text x="520" y="210" fill="#e2e8f0" font-size="17" text-anchor="middle">158억</text>
    <text x="680" y="210" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">-95.1</text>
    <text x="830" y="210" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">6억</text>
    <text x="990" y="205" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">1년 미만</text>
    <text x="990" y="225" fill="#94a3b8" font-size="11" text-anchor="middle">(증자 없으면 소멸)</text>

    <!-- 뉴스케일파워 -->
    <rect x="0" y="260" width="1080" height="100" fill="#1e293b"/>
    <text x="30" y="300" fill="#e2e8f0" font-size="17" font-weight="700">뉴스케일파워</text>
    <text x="30" y="325" fill="#94a3b8" font-size="13">SMR · NYSE</text>
    <text x="30" y="348" fill="#60a5fa" font-size="12">[#44]</text>
    <text x="320" y="305" fill="#e2e8f0" font-size="15" text-anchor="middle">SMR 77MW</text>
    <text x="320" y="325" fill="#94a3b8" font-size="12" text-anchor="middle">소형 원전 (NRC 인증)</text>
    <text x="520" y="315" fill="#e2e8f0" font-size="17" text-anchor="middle">$31M ≈ 425억</text>
    <text x="680" y="315" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">-2,225</text>
    <text x="830" y="315" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">$1.25B ≈ 1.7조</text>
    <text x="990" y="310" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">3~4년</text>
    <text x="990" y="330" fill="#94a3b8" font-size="11" text-anchor="middle">(매출 전환 대기)</text>
  </g>

  <!-- 하단 해석 -->
  <g transform="translate(60, 560)">
    <rect x="0" y="0" width="1080" height="200" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <text x="30" y="40" fill="#22c55e" font-size="18" font-weight="700">세 회사의 자리</text>

    <text x="30" y="75" fill="#ef4444" font-size="15" font-weight="700">• 에스퓨얼셀 (#47):</text>
    <text x="200" y="75" fill="#e2e8f0" font-size="15">"인증 없는 적자" — 주문 자체가 부족, 1년 내 증자 없으면 소멸 위험</text>

    <text x="30" y="110" fill="#22c55e" font-size="15" font-weight="700">• 뉴스케일파워 (#44):</text>
    <text x="230" y="110" fill="#e2e8f0" font-size="15">"인증은 땄는데 취업은 아직" — 현금 1.7조로 3~4년 버틸 여력</text>

    <text x="30" y="145" fill="#fbbf24" font-size="15" font-weight="700">• 두산퓨얼셀 (#70):</text>
    <text x="215" y="145" fill="#e2e8f0" font-size="15">"인증·매출·고객 모두 있는데 저가 수주 묶여 구조적 적자"</text>

    <text x="30" y="180" fill="#94a3b8" font-size="13">같은 수소·원자력 전환 기조에 올라탄 회사들인데 각자 다른 방식으로 현금이 녹고 있다.</text>
  </g>

  <text x="60" y="795" fill="#64748b" font-size="12">데이터: 각 블로그 #44 · #47 · #70 검증표 교차 참조 · 2026-04-23</text>
</svg>
