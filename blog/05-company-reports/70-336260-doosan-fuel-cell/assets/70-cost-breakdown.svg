<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>매출원가 +1,415억 상승의 3요인 — 원재료·저가수주·SOFC 감손</title>
  <desc>2024→2025 매출원가 3,756억 → 5,171억 증가. 원재료 +250, 저가수주 초과원가 +500~700, SOFC 감손 +400~500.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">매출원가 +1,415억의 3요인 분해</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">2024 매출원가 3,756억 → 2025 5,171억 · 매출 +10%인데 원가는 +37.7% 증가</text>

  <!-- 3 카드 -->
  <g transform="translate(60, 150)">
    <!-- 요인 1: 원재료 -->
    <rect x="0" y="0" width="320" height="320" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="160" y="45" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">요인 1 · 원재료·연료</text>
    <text x="160" y="110" fill="#ef4444" font-size="44" font-weight="700" text-anchor="middle">+250억</text>
    <text x="160" y="135" fill="#94a3b8" font-size="13" text-anchor="middle">추정 기여분</text>

    <text x="20" y="180" fill="#e2e8f0" font-size="14">• 백금 $950 → $1,200 (+26%)</text>
    <text x="20" y="205" fill="#e2e8f0" font-size="14">• 인산 +18% (PAFC 전해질)</text>
    <text x="20" y="230" fill="#e2e8f0" font-size="14">• LNG 산업용 +15%</text>
    <text x="20" y="255" fill="#e2e8f0" font-size="14">• 수소 연료 +10~20%</text>

    <text x="20" y="295" fill="#fbbf24" font-size="13" font-weight="700">→ 글로벌 원자재 동시 상승</text>

    <!-- 요인 2: 저가수주 -->
    <rect x="350" y="0" width="320" height="320" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="510" y="45" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">요인 2 · 저가 장기계약</text>
    <text x="510" y="110" fill="#ef4444" font-size="44" font-weight="700" text-anchor="middle">+500~700억</text>
    <text x="510" y="135" fill="#94a3b8" font-size="13" text-anchor="middle">추정 기여분</text>

    <text x="370" y="180" fill="#e2e8f0" font-size="14">• 2021~22 수주 HPS 고정가</text>
    <text x="370" y="205" fill="#e2e8f0" font-size="14">• 2025 납품 집중 (수주잔고 소진)</text>
    <text x="370" y="230" fill="#e2e8f0" font-size="14">• 초과원가 20~30%</text>
    <text x="370" y="255" fill="#e2e8f0" font-size="14">• 비중 매출의 60~70%</text>

    <text x="370" y="295" fill="#ef4444" font-size="13" font-weight="700">→ 납품 많을수록 더 깊은 적자</text>

    <!-- 요인 3: SOFC 감손 -->
    <rect x="700" y="0" width="320" height="320" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
    <text x="860" y="45" fill="#a855f7" font-size="20" font-weight="700" text-anchor="middle">요인 3 · SOFC 감손</text>
    <text x="860" y="110" fill="#ef4444" font-size="44" font-weight="700" text-anchor="middle">+400~500억</text>
    <text x="860" y="135" fill="#94a3b8" font-size="13" text-anchor="middle">추정 기여분</text>

    <text x="720" y="180" fill="#e2e8f0" font-size="14">• 고온형 신사업 전환 실패</text>
    <text x="720" y="205" fill="#e2e8f0" font-size="14">• SK에코·Bloom 선제 진입</text>
    <text x="720" y="230" fill="#e2e8f0" font-size="14">• 개발비·시제품 재고 감손</text>
    <text x="720" y="255" fill="#e2e8f0" font-size="14">• 전용 설비 자산손상</text>

    <text x="720" y="295" fill="#a855f7" font-size="13" font-weight="700">→ 2023 전환 결정의 청구서</text>
  </g>

  <!-- 합산 박스 -->
  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="960" height="160" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#fbbf24" font-size="18" font-weight="700">합산 — 매출총이익 -985억 감소 (+362 → -623)</text>

    <text x="30" y="80" fill="#e2e8f0" font-size="15">• 원재료 상승 -250억 + 저가수주 초과원가 -500~700억 + SOFC 감손 -400~500억</text>
    <text x="30" y="110" fill="#e2e8f0" font-size="15">• 매출 +10%가 가져온 +50억은 19배로 상쇄됨</text>
    <text x="30" y="140" fill="#ef4444" font-size="15" font-weight="700">→ 매출이 늘어도 이익이 더 빠지는 "역관성" 구조가 완성된 해</text>
  </g>

  <text x="60" y="695" fill="#64748b" font-size="12">데이터: dartlab marginWaterfall + 추정 (공시 원가 주석·외부 원자재 지수) · 2026-04-23</text>
</svg>
