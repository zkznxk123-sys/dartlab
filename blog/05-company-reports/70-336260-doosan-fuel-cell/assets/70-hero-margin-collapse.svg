<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>두산퓨얼셀 2025 — 매출 100원이 순이익 -29원이 될 때까지</title>
  <desc>매출원가 113.70 → 매출총이익 -13.70 → 판관비 -9.54 → 영업이익 -23.24 → 세전 -27.27 → 순이익 -29.20. 매출총이익률이 음수로 역전된 해.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="32" font-weight="700">두산퓨얼셀 2025 — 팔수록 원가가 더 드는 해</text>
  <text x="60" y="105" fill="#94a3b8" font-size="18">매출 100원이 순이익 -29.20원이 될 때까지 · 매출원가율 113.7%</text>

  <g transform="translate(60, 160)">
    <line x1="0" y1="220" x2="1080" y2="220" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="-10" y="225" fill="#94a3b8" font-size="12" text-anchor="end">0%</text>

    <!-- Step 1: 매출 100% -->
    <rect x="0" y="0" width="120" height="220" fill="#3b82f6" opacity="0.85"/>
    <text x="60" y="-12" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">매출</text>
    <text x="60" y="120" fill="#f1f5f9" font-size="26" font-weight="700" text-anchor="middle">100.00%</text>
    <text x="60" y="245" fill="#e2e8f0" font-size="13" text-anchor="middle">4,548억</text>

    <!-- 감소 화살 1 → 매출원가 -->
    <path d="M 125 110 L 155 110" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="140" y="90" fill="#ef4444" font-size="14" text-anchor="middle">−113.70</text>

    <!-- Step 2: 매출총이익 -13.70% (아래로) -->
    <rect x="160" y="220" width="120" height="30" fill="#ef4444" opacity="0.9"/>
    <text x="220" y="207" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">매출총이익</text>
    <text x="220" y="240" fill="#f1f5f9" font-size="13" font-weight="700" text-anchor="middle">-13.70%</text>
    <text x="220" y="275" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">-623억</text>

    <!-- 감소 화살 2 → 판관비 -->
    <path d="M 285 235 L 315 235" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="300" y="215" fill="#ef4444" font-size="14" text-anchor="middle">−9.54</text>

    <!-- Step 3: 영업이익 -23.24% -->
    <rect x="320" y="220" width="120" height="51" fill="#ef4444" opacity="0.95"/>
    <text x="380" y="207" fill="#f1f5f9" font-size="15" font-weight="700" text-anchor="middle">영업이익</text>
    <text x="380" y="250" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">-23.24%</text>
    <text x="380" y="290" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">-1,057억</text>

    <!-- 감소 화살 3 → 금융비용 -->
    <path d="M 445 255 L 475 255" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="460" y="235" fill="#ef4444" font-size="14" text-anchor="middle">−5.95</text>

    <!-- Step 4: 세전이익 -27.27% -->
    <rect x="480" y="220" width="120" height="60" fill="#ef4444" opacity="0.95"/>
    <text x="540" y="207" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">세전이익</text>
    <text x="540" y="258" fill="#f1f5f9" font-size="13" text-anchor="middle">-27.27%</text>

    <!-- 감소 화살 4 → 법인세 -->
    <path d="M 605 260 L 635 260" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="620" y="240" fill="#ef4444" font-size="14" text-anchor="middle">−1.93</text>

    <!-- Step 5: 순이익 -29.20% -->
    <rect x="640" y="220" width="120" height="64" fill="#a855f7" opacity="0.95"/>
    <text x="700" y="207" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">순이익</text>
    <text x="700" y="262" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">-29.20%</text>
    <text x="700" y="300" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">-1,328억</text>

    <!-- 강조 배지 -->
    <g transform="translate(800, 80)">
      <rect x="0" y="0" width="270" height="240" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="12"/>
      <text x="135" y="38" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">핵심 판단</text>
      <text x="20" y="80" fill="#e2e8f0" font-size="15">매출원가율이 91%에서</text>
      <text x="20" y="108" fill="#e2e8f0" font-size="15">113.7%로 뛰어오른 해.</text>
      <text x="20" y="136" fill="#e2e8f0" font-size="15">팔수록 매출총이익이</text>
      <text x="20" y="164" fill="#e2e8f0" font-size="15">음수로 역전된다.</text>
      <text x="20" y="197" fill="#fbbf24" font-size="13">6년 중 처음으로</text>
      <text x="20" y="218" fill="#fbbf24" font-size="13">GPM이 마이너스.</text>
    </g>

    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
      </marker>
    </defs>
  </g>

  <text x="60" y="690" fill="#64748b" font-size="13">데이터: dartlab c.analysis("financial","수익성")["marginWaterfall"]["history"][0] · 2026-04-23</text>
</svg>
