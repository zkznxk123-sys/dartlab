<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>두산퓨얼셀 6년 시계열 — 매출·영업이익·매출총이익률</title>
  <desc>2020 매출 4,618억 OPM 10.06% 정점 → 2023 매출 2,609억 바닥 → 2025 매출 4,548억 반등 but 영업적자 1,057억 사상 최악.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">6년의 궤적 — 매출은 돌아왔는데 이익은 바닥을 뚫었다</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">매출 (바) · 영업이익 (점) · 매출총이익률 (선) · 2020~2025 상장 이후</text>

  <g transform="translate(80, 170)">
    <!-- 축 -->
    <text x="-15" y="0" fill="#60a5fa" font-size="13" text-anchor="end">5,000</text>
    <text x="-15" y="85" fill="#60a5fa" font-size="13" text-anchor="end">3,750</text>
    <text x="-15" y="170" fill="#60a5fa" font-size="13" text-anchor="end">2,500</text>
    <text x="-15" y="255" fill="#60a5fa" font-size="13" text-anchor="end">1,250</text>
    <text x="-15" y="340" fill="#60a5fa" font-size="13" text-anchor="end">0</text>

    <text x="1055" y="0" fill="#fbbf24" font-size="13">20%</text>
    <text x="1055" y="85" fill="#fbbf24" font-size="13">10%</text>
    <text x="1055" y="170" fill="#fbbf24" font-size="13">0%</text>
    <text x="1055" y="255" fill="#fbbf24" font-size="13">-10%</text>
    <text x="1055" y="340" fill="#fbbf24" font-size="13">-20%</text>

    <line x1="0" y1="340" x2="1040" y2="340" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="170" x2="1040" y2="170" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- 매출 바 (2020~2025) — 매출/5000 * 340 -->
    <!-- 2020: 4618 -->
    <rect x="40" y="26" width="120" height="314" fill="#22c55e" opacity="0.85"/>
    <text x="100" y="355" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">2020 ★피크</text>
    <text x="100" y="18" fill="#e2e8f0" font-size="13" text-anchor="middle">4,618</text>

    <!-- 2021: 3814 -->
    <rect x="200" y="81" width="120" height="259" fill="#3b82f6" opacity="0.85"/>
    <text x="260" y="355" fill="#e2e8f0" font-size="14" text-anchor="middle">2021</text>
    <text x="260" y="73" fill="#e2e8f0" font-size="13" text-anchor="middle">3,814</text>

    <!-- 2022: 3121 -->
    <rect x="360" y="128" width="120" height="212" fill="#3b82f6" opacity="0.85"/>
    <text x="420" y="355" fill="#e2e8f0" font-size="14" text-anchor="middle">2022</text>
    <text x="420" y="120" fill="#e2e8f0" font-size="13" text-anchor="middle">3,121</text>

    <!-- 2023: 2609 -->
    <rect x="520" y="163" width="120" height="177" fill="#ef4444" opacity="0.85"/>
    <text x="580" y="355" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">2023 바닥</text>
    <text x="580" y="155" fill="#e2e8f0" font-size="13" text-anchor="middle">2,609</text>

    <!-- 2024: 4118 -->
    <rect x="680" y="60" width="120" height="280" fill="#3b82f6" opacity="0.85"/>
    <text x="740" y="355" fill="#e2e8f0" font-size="14" text-anchor="middle">2024</text>
    <text x="740" y="52" fill="#e2e8f0" font-size="13" text-anchor="middle">4,118</text>

    <!-- 2025: 4548 -->
    <rect x="840" y="31" width="120" height="309" fill="#fbbf24" opacity="0.9"/>
    <text x="900" y="355" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">2025 ★반전</text>
    <text x="900" y="23" fill="#e2e8f0" font-size="13" text-anchor="middle">4,548</text>

    <!-- 매출총이익률 선 (2020 10.96 · 2021 12.64 · 2022 14.31 · 2023 15.16 · 2024 8.78 · 2025 -13.70) -->
    <!-- y 매핑: 20% = 0, 0% = 170, -20% = 340. y = 170 - pct*8.5 -->
    <polyline points="100,77 260,63 420,48 580,41 740,95 900,286"
              fill="none" stroke="#fbbf24" stroke-width="4"/>
    <g font-size="13" font-weight="700">
      <circle cx="100" cy="77" r="6" fill="#fbbf24"/>
      <text x="100" y="64" fill="#fbbf24" text-anchor="middle">10.96%</text>
      <circle cx="260" cy="63" r="6" fill="#fbbf24"/>
      <text x="260" y="50" fill="#fbbf24" text-anchor="middle">12.64%</text>
      <circle cx="420" cy="48" r="6" fill="#fbbf24"/>
      <text x="420" y="35" fill="#fbbf24" text-anchor="middle">14.31%</text>
      <circle cx="580" cy="41" r="6" fill="#fbbf24"/>
      <text x="580" y="33" fill="#fbbf24" text-anchor="middle">15.16%</text>
      <circle cx="740" cy="95" r="7" fill="#fbbf24" stroke="#fff" stroke-width="1.5"/>
      <text x="740" y="110" fill="#fbbf24" text-anchor="middle">8.78%</text>
      <circle cx="900" cy="286" r="9" fill="#ef4444" stroke="#fff" stroke-width="2"/>
      <text x="900" y="273" fill="#ef4444" text-anchor="middle">-13.70% ↓↓</text>
    </g>

    <!-- 영업이익 점 (억원) -->
    <g font-size="12">
      <circle cx="100" cy="260" r="5" fill="#a855f7"/>
      <text x="100" y="275" fill="#a855f7" text-anchor="middle">영 +465</text>
      <circle cx="260" cy="285" r="5" fill="#a855f7"/>
      <text x="260" y="300" fill="#a855f7" text-anchor="middle">영 +270</text>
      <circle cx="420" cy="345" r="5" fill="#a855f7"/>
      <text x="420" y="332" fill="#a855f7" text-anchor="middle">영 -31</text>
      <circle cx="580" cy="339" r="5" fill="#a855f7"/>
      <text x="580" y="325" fill="#a855f7" text-anchor="middle">영 +60</text>
      <circle cx="740" cy="341" r="5" fill="#a855f7"/>
      <text x="740" y="327" fill="#a855f7" text-anchor="middle">영 -17</text>
      <circle cx="900" cy="456" r="9" fill="#ef4444" stroke="#fff" stroke-width="1.5"/>
      <text x="900" y="472" fill="#ef4444" font-weight="700" text-anchor="middle">영 -1,057 ★</text>
    </g>
  </g>

  <!-- 하단 -->
  <g transform="translate(80, 600)">
    <rect x="0" y="0" width="1040" height="80" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="20" y="35" fill="#ef4444" font-size="17" font-weight="700">6년 중 처음으로 매출총이익률이 음수</text>
    <text x="20" y="62" fill="#94a3b8" font-size="14">매출은 2020 피크의 98.5%까지 돌아왔는데, 매출총이익은 +506억 → -623억. 매출 1,000억이 적자 1,100억이 된 해.</text>
  </g>
  <text x="80" y="700" fill="#64748b" font-size="12">데이터: dartlab c.select("IS",[...]) 분기 합산 · 2026-04-23</text>
</svg>
