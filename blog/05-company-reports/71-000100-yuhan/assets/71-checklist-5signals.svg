<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>다음 12~24개월 추적 5개 — 유한양행 이익 경로</title>
  <desc>렉라자 글로벌 매출·새 마일스톤·유한킴벌리 지분법·본업 OPM 5%·주가 회복 5개 추적.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">다음 12~24개월 추적 5개</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">얀센 분기 보고서 + 사업보고서 주석 + 유한양행 IR 발표로 확인</text>

  <g transform="translate(60, 150)">
    <!-- 1 -->
    <rect x="0" y="0" width="960" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="45" r="22" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="52" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="85" y="38" fill="#f1f5f9" font-size="18" font-weight="700">렉라자 글로벌 매출 (얀센 분기 보고)</text>
    <text x="85" y="62" fill="#e2e8f0" font-size="14">2026 분기 $100M 돌파 → 연 $400M+ 안정 → 3년차 $600M+ 세 단계 순차 확인</text>
    <text x="85" y="82" fill="#fbbf24" font-size="12">→ J&J 분기 10-Q · Lazcluze segment</text>

    <!-- 2 -->
    <rect x="0" y="105" width="960" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="150" r="22" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="157" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="85" y="143" fill="#f1f5f9" font-size="18" font-weight="700">새 기술이전 마일스톤 발생</text>
    <text x="85" y="167" fill="#e2e8f0" font-size="14">렉라자 외 YH41723·YH25724 등 파이프라인 글로벌 기술이전 공시. 연 1건+ = 영업외 하단 확대</text>
    <text x="85" y="187" fill="#fbbf24" font-size="12">→ DART "기타판매·구매계약" · 회사 IR</text>

    <!-- 3 -->
    <rect x="0" y="210" width="960" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="255" r="22" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="40" y="262" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="85" y="248" fill="#f1f5f9" font-size="18" font-weight="700">유한킴벌리 지분법이익 700억+ 유지</text>
    <text x="85" y="272" fill="#e2e8f0" font-size="14">비상장이라 간접 확인 — 유한양행 사업보고서 관계기업 주석의 지분법이익 행</text>
    <text x="85" y="292" fill="#fbbf24" font-size="12">→ 사업보고서 IX장 "관계기업·공동기업 투자"</text>

    <!-- 4 -->
    <rect x="0" y="315" width="960" height="90" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="360" r="22" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="40" y="367" fill="#a855f7" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="85" y="353" fill="#f1f5f9" font-size="18" font-weight="700">본업 영업이익률 5%+ 안정</text>
    <text x="85" y="377" fill="#e2e8f0" font-size="14">2025 OPM 4.77% 회복 → 2026 분기 5% 이상 유지 여부 = 본업 개선 시그널</text>
    <text x="85" y="397" fill="#fbbf24" font-size="12">→ 분기 IR · c.analysis("financial","수익성")["marginWaterfall"]</text>

    <!-- 5 -->
    <rect x="0" y="420" width="960" height="90" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="465" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="472" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="85" y="458" fill="#f1f5f9" font-size="18" font-weight="700">dCR-A+ 상향 여부</text>
    <text x="85" y="482" fill="#e2e8f0" font-size="14">현재 dCR-A · CHS 모델 -1.5점 하향(주가 반영). 주가 회복 + 재무 안정 동반 시 A+ 상향</text>
    <text x="85" y="502" fill="#fbbf24" font-size="12">→ c.credit("등급") 분기별 추적</text>
  </g>

  <g transform="translate(60, 690)">
    <text x="0" y="15" fill="#94a3b8" font-size="13">5개 중 1, 2, 3번이 영업외 지속성, 4번이 본업 개선, 5번이 시장 평가. 2026~2027 결산에 방향 확정.</text>
  </g>
</svg>
