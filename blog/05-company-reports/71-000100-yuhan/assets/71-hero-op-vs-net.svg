<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>유한양행 9년 — 영업이익 vs 순이익 역전 구조</title>
  <desc>9년 중 8번 순이익이 영업이익을 초과. 영업외 (유한킴벌리 지분법 + 렉라자 마일스톤)이 하단 방어.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">유한양행 9년 — 영업이익보다 순이익이 큰 이유</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">영업이익 (빨강) · 순이익 (초록) · 격차 = 영업외수익 · 9년 중 8번 순이익이 앞선다</text>

  <g transform="translate(80, 170)">
    <line x1="0" y1="340" x2="1040" y2="340" stroke="#334155"/>
    <text x="-15" y="0" fill="#94a3b8" font-size="13" text-anchor="end">2,000</text>
    <text x="-15" y="85" fill="#94a3b8" font-size="13" text-anchor="end">1,500</text>
    <text x="-15" y="170" fill="#94a3b8" font-size="13" text-anchor="end">1,000</text>
    <text x="-15" y="255" fill="#94a3b8" font-size="13" text-anchor="end">500</text>
    <text x="-15" y="340" fill="#94a3b8" font-size="13" text-anchor="end">0 (억)</text>

    <!-- x축: 9년 (2017~2025), 간격 약 110 -->
    <!-- 영업이익: 887, 501, 125, 843, 486, 360, 568, 549, 1044 -->
    <!-- 순이익: 1097, 583, 366, 1904, 991, 906, 1340, 552, 1853 -->
    <!-- y = 340 - (value/2000)*340 -->

    <!-- 영업이익 바 -->
    <g>
      <rect x="0" y="189" width="45" height="151" fill="#ef4444" opacity="0.85"/>
      <text x="22" y="180" fill="#ef4444" font-size="12" text-anchor="middle">887</text>
      <rect x="115" y="255" width="45" height="85" fill="#ef4444" opacity="0.85"/>
      <text x="137" y="248" fill="#ef4444" font-size="12" text-anchor="middle">501</text>
      <rect x="230" y="319" width="45" height="21" fill="#ef4444" opacity="0.85"/>
      <text x="252" y="312" fill="#ef4444" font-size="12" text-anchor="middle">125</text>
      <rect x="345" y="197" width="45" height="143" fill="#ef4444" opacity="0.85"/>
      <text x="367" y="190" fill="#ef4444" font-size="12" text-anchor="middle">843</text>
      <rect x="460" y="257" width="45" height="83" fill="#ef4444" opacity="0.85"/>
      <text x="482" y="250" fill="#ef4444" font-size="12" text-anchor="middle">486</text>
      <rect x="575" y="279" width="45" height="61" fill="#ef4444" opacity="0.85"/>
      <text x="597" y="272" fill="#ef4444" font-size="12" text-anchor="middle">360</text>
      <rect x="690" y="244" width="45" height="96" fill="#ef4444" opacity="0.85"/>
      <text x="712" y="237" fill="#ef4444" font-size="12" text-anchor="middle">568</text>
      <rect x="805" y="247" width="45" height="93" fill="#ef4444" opacity="0.85"/>
      <text x="827" y="240" fill="#ef4444" font-size="12" text-anchor="middle">549</text>
      <rect x="920" y="163" width="45" height="177" fill="#ef4444" opacity="0.9"/>
      <text x="942" y="156" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">1,044</text>
    </g>

    <!-- 순이익 바 -->
    <g>
      <rect x="48" y="154" width="45" height="186" fill="#22c55e" opacity="0.85"/>
      <text x="70" y="145" fill="#22c55e" font-size="12" text-anchor="middle">1,097</text>
      <rect x="163" y="241" width="45" height="99" fill="#22c55e" opacity="0.85"/>
      <text x="185" y="234" fill="#22c55e" font-size="12" text-anchor="middle">583</text>
      <rect x="278" y="278" width="45" height="62" fill="#22c55e" opacity="0.85"/>
      <text x="300" y="271" fill="#22c55e" font-size="12" text-anchor="middle">366</text>
      <rect x="393" y="16" width="45" height="324" fill="#22c55e" opacity="0.95" stroke="#fbbf24" stroke-width="2"/>
      <text x="415" y="9" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">1,904 ★</text>
      <rect x="508" y="172" width="45" height="168" fill="#22c55e" opacity="0.85"/>
      <text x="530" y="165" fill="#22c55e" font-size="12" text-anchor="middle">991</text>
      <rect x="623" y="186" width="45" height="154" fill="#22c55e" opacity="0.85"/>
      <text x="645" y="179" fill="#22c55e" font-size="12" text-anchor="middle">906</text>
      <rect x="738" y="112" width="45" height="228" fill="#22c55e" opacity="0.85"/>
      <text x="760" y="105" fill="#22c55e" font-size="12" text-anchor="middle">1,340</text>
      <rect x="853" y="246" width="45" height="94" fill="#22c55e" opacity="0.85"/>
      <text x="875" y="239" fill="#22c55e" font-size="12" text-anchor="middle">552</text>
      <rect x="968" y="25" width="45" height="315" fill="#22c55e" opacity="0.95" stroke="#fbbf24" stroke-width="2"/>
      <text x="990" y="18" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">1,853 ★</text>
    </g>

    <!-- x축 라벨 -->
    <g fill="#94a3b8" font-size="13" text-anchor="middle">
      <text x="47" y="370">2017</text>
      <text x="162" y="370">2018</text>
      <text x="277" y="370">2019</text>
      <text x="392" y="370">2020</text>
      <text x="507" y="370">2021</text>
      <text x="622" y="370">2022</text>
      <text x="737" y="370">2023</text>
      <text x="852" y="370">2024</text>
      <text x="967" y="370">2025</text>
    </g>
  </g>

  <!-- 범례 -->
  <g transform="translate(80, 560)">
    <rect x="0" y="0" width="18" height="18" fill="#ef4444"/>
    <text x="28" y="14" fill="#e2e8f0" font-size="14">영업이익 (억원)</text>
    <rect x="180" y="0" width="18" height="18" fill="#22c55e"/>
    <text x="208" y="14" fill="#e2e8f0" font-size="14">순이익 (억원)</text>
    <rect x="360" y="0" width="18" height="18" fill="#fbbf24"/>
    <text x="388" y="14" fill="#e2e8f0" font-size="14">★ 9년 중 최고 수치</text>
  </g>

  <g transform="translate(80, 600)">
    <rect x="0" y="0" width="1040" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="20" y="35" fill="#fbbf24" font-size="17" font-weight="700">9년 중 8번 순이익이 영업이익을 초과</text>
    <text x="20" y="62" fill="#94a3b8" font-size="14">차이 = 영업외수익. 유한킴벌리 지분법 + 렉라자 라이선스 마일스톤 + 금융·기타가 매년 300~1,200억 추가.</text>
  </g>

  <text x="80" y="705" fill="#64748b" font-size="12">데이터: dartlab c.select("IS",["영업이익","당기순이익"]) 분기 합산 · 2026-04-23</text>
</svg>
