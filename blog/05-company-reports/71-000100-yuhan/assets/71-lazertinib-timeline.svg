<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>렉라자 10년 여정 — 오스코텍 인수에서 FDA 1차 치료제까지</title>
  <desc>2015 YH25448 도입 → 2018 얀센 $1.255B 기술이전 → 2021 국내 31번째 신약 → 2024.8.19 FDA 1차 치료제 승인.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">렉라자 (Lazertinib) 10년 여정</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">작은 후보물질이 한국 개발 첫 FDA 폐암 1차 치료제가 되기까지 · 2015~2025</text>

  <!-- 타임라인 축 -->
  <g transform="translate(80, 180)">
    <line x1="0" y1="80" x2="1040" y2="80" stroke="#fbbf24" stroke-width="3"/>

    <!-- 2015: 오스코텍 -->
    <circle cx="0" cy="80" r="10" fill="#3b82f6"/>
    <text x="0" y="50" fill="#3b82f6" font-size="15" font-weight="700" text-anchor="middle">2015.10</text>
    <text x="0" y="110" fill="#e2e8f0" font-size="13" text-anchor="middle">오스코텍</text>
    <text x="0" y="128" fill="#e2e8f0" font-size="13" text-anchor="middle">YH25448 도입</text>
    <text x="0" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">후보물질 가치 ~10억</text>

    <!-- 2018: 얀센 -->
    <circle cx="260" cy="80" r="11" fill="#22c55e"/>
    <text x="260" y="50" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">2018.11</text>
    <text x="260" y="110" fill="#e2e8f0" font-size="13" text-anchor="middle">얀센 기술이전</text>
    <text x="260" y="128" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">$1.255B</text>
    <text x="260" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">계약금 $50M + 마일스톤</text>

    <!-- 2021: 국내 승인 -->
    <circle cx="520" cy="80" r="10" fill="#3b82f6"/>
    <text x="520" y="50" fill="#3b82f6" font-size="15" font-weight="700" text-anchor="middle">2021.01</text>
    <text x="520" y="110" fill="#e2e8f0" font-size="13" text-anchor="middle">식약처 승인</text>
    <text x="520" y="128" fill="#e2e8f0" font-size="13" text-anchor="middle">국내 31번째 신약</text>
    <text x="520" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">제품명 "렉라자"</text>

    <!-- 2023: FDA 단독요법 -->
    <circle cx="780" cy="80" r="10" fill="#a855f7"/>
    <text x="780" y="50" fill="#a855f7" font-size="15" font-weight="700" text-anchor="middle">2023</text>
    <text x="780" y="110" fill="#e2e8f0" font-size="13" text-anchor="middle">FDA 단독요법</text>
    <text x="780" y="128" fill="#e2e8f0" font-size="13" text-anchor="middle">1차 승인 (제한적)</text>

    <!-- 2024.8.19: FDA 1차 치료제 (병용) -->
    <circle cx="1040" cy="80" r="14" fill="#fbbf24" stroke="#fff" stroke-width="3"/>
    <text x="1040" y="50" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">2024.8.19 ★</text>
    <text x="1040" y="110" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">FDA 1차 치료제</text>
    <text x="1040" y="128" fill="#e2e8f0" font-size="13" text-anchor="middle">렉라자 + 리브리반트</text>
    <text x="1040" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">한국 개발 첫 폐암 1차</text>
  </g>

  <!-- 임상 데이터 박스 -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="540" height="150" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="270" y="38" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">임상 MARIPOSA — 타그리소 대비 우위</text>
    <text x="30" y="75" fill="#e2e8f0" font-size="14">• PFS (무진행 생존기간) 23.7개월 vs 타그리소 16.6개월</text>
    <text x="30" y="100" fill="#e2e8f0" font-size="14">• +7.1개월 연장 (43% 개선)</text>
    <text x="30" y="125" fill="#94a3b8" font-size="13">N Engl J Med 2024 · ASCO 2023 발표</text>

    <rect x="560" y="0" width="520" height="150" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="820" y="38" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">시장 규모와 로열티</text>
    <text x="590" y="75" fill="#e2e8f0" font-size="14">• EGFR 1차 치료제 시장 $80억 (타그리소 독점)</text>
    <text x="590" y="100" fill="#e2e8f0" font-size="14">• 얀센 목표 20~30% 점유 → 연 $20억</text>
    <text x="590" y="125" fill="#fbbf24" font-size="14" font-weight="700">• 유한 로열티 10~20% → 연 2,700~5,500억</text>
  </g>

  <!-- 유한양행 수익 -->
  <g transform="translate(60, 570)">
    <rect x="0" y="0" width="1080" height="110" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#fbbf24" font-size="18" font-weight="700">유한양행 인식 순서 (추정)</text>
    <text x="30" y="72" fill="#e2e8f0" font-size="14">2018 계약금 $50M (약 660억) → 2021~23 국내 매출 연 200~400억 → <tspan fill="#fbbf24" font-weight="700">2025 FDA 마일스톤 300~500억</tspan> → 2026+ 글로벌 로열티 연 1,000~3,000억+</text>
    <text x="30" y="96" fill="#94a3b8" font-size="13">본격 로열티는 얀센 분기 실적의 Lazcluze 매출이 본 궤도에 오르는 2026~2028년부터.</text>
  </g>

  <text x="60" y="700" fill="#64748b" font-size="12">데이터: 얀센 10-K · DART 공시 2018.11.06 · N Engl J Med 2024 · IQVIA 시장 분석 · 2026-04-23</text>
</svg>
