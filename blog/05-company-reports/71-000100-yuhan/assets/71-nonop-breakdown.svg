<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>영업외 +1,183억의 3갈래 — 유한킴벌리·렉라자·기타</title>
  <desc>2025 영업외수익 구조 해부. 유한킴벌리 지분법(고정) + 렉라자 마일스톤(일회성) + 기타 기술이전·운용수익.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">영업외 +1,183억의 3갈래</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">영업이익 1,044억 위에 얹혀 순이익 1,853억을 만든 구조 · 2025년</text>

  <g transform="translate(60, 140)">
    <!-- 기둥 1: 유한킴벌리 지분법 (고정) -->
    <rect x="0" y="0" width="340" height="340" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="170" y="40" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">기둥 1 · 유한킴벌리 지분법</text>
    <text x="170" y="65" fill="#94a3b8" font-size="13" text-anchor="middle">고정 · 55년째 안정</text>
    <text x="170" y="130" fill="#fbbf24" font-size="42" font-weight="700" text-anchor="middle">500~700억</text>
    <text x="170" y="155" fill="#94a3b8" font-size="12" text-anchor="middle">연 평균 지분법이익</text>

    <text x="20" y="200" fill="#e2e8f0" font-size="14">• 지분 30% (킴벌리클라크 70%)</text>
    <text x="20" y="225" fill="#e2e8f0" font-size="14">• 유한킴벌리 매출 약 1.5조</text>
    <text x="20" y="250" fill="#e2e8f0" font-size="14">• 순이익 약 2,100억 × 30%</text>
    <text x="20" y="275" fill="#e2e8f0" font-size="14">• 하기스·화이트·크리넥스 등</text>
    <text x="20" y="300" fill="#22c55e" font-size="13" font-weight="700">→ 9년 동안 한 번도 끊긴 적 없음</text>
    <text x="20" y="325" fill="#94a3b8" font-size="12">1970년 합작법인 설립</text>

    <!-- 기둥 2: 렉라자 마일스톤 -->
    <rect x="370" y="0" width="340" height="340" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="540" y="40" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">기둥 2 · 렉라자 얀센 마일스톤</text>
    <text x="540" y="65" fill="#94a3b8" font-size="13" text-anchor="middle">2025년 본격 시작 · 2026+ 확대</text>
    <text x="540" y="130" fill="#fbbf24" font-size="42" font-weight="700" text-anchor="middle">300~500억</text>
    <text x="540" y="155" fill="#94a3b8" font-size="12" text-anchor="middle">2025 FDA 승인 마일스톤 추정</text>

    <text x="390" y="200" fill="#e2e8f0" font-size="14">• 얀센 계약 $1.255B (2018.11)</text>
    <text x="390" y="225" fill="#e2e8f0" font-size="14">• 2024.8.19 FDA 1차 치료제 승인</text>
    <text x="390" y="250" fill="#e2e8f0" font-size="14">• 단계별 마일스톤 $1.205B</text>
    <text x="390" y="275" fill="#e2e8f0" font-size="14">• 판매 로열티 2자리수 (10~20%)</text>
    <text x="390" y="300" fill="#fbbf24" font-size="13" font-weight="700">→ 2026+ 연 1,000억+ 확대 가능</text>
    <text x="390" y="325" fill="#94a3b8" font-size="12">2015 오스코텍 인수 → 10년</text>

    <!-- 기둥 3: 기타 -->
    <rect x="740" y="0" width="340" height="340" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
    <text x="910" y="40" fill="#a855f7" font-size="18" font-weight="700" text-anchor="middle">기둥 3 · 기타 운용·기술이전</text>
    <text x="910" y="65" fill="#94a3b8" font-size="13" text-anchor="middle">매년 변동 · 100~400억</text>
    <text x="910" y="130" fill="#fbbf24" font-size="42" font-weight="700" text-anchor="middle">200~400억</text>
    <text x="910" y="155" fill="#94a3b8" font-size="12" text-anchor="middle">2025 추정 기여분</text>

    <text x="760" y="200" fill="#e2e8f0" font-size="14">• 금융수익 188억 (이자·배당)</text>
    <text x="760" y="225" fill="#e2e8f0" font-size="14">• 금융비용 -255억</text>
    <text x="760" y="250" fill="#e2e8f0" font-size="14">• 기술이전 잔여 분할 인식</text>
    <text x="760" y="275" fill="#e2e8f0" font-size="14">• 부동산·유가증권 평가</text>
    <text x="760" y="300" fill="#a855f7" font-size="13" font-weight="700">→ 매년 편차 있지만 하단 방어</text>
    <text x="760" y="325" fill="#94a3b8" font-size="12">외환차익 포함</text>
  </g>

  <!-- 합산 -->
  <g transform="translate(60, 510)">
    <rect x="0" y="0" width="1080" height="170" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#fbbf24" font-size="20" font-weight="700">합산 — 영업외 +1,183억 (영업이익의 113.3%)</text>
    <text x="30" y="80" fill="#e2e8f0" font-size="15">• 영업이익 1,044 + 영업외 1,183 = 세전이익 2,227억 → 법인세 -374억 → 순이익 1,853억</text>
    <text x="30" y="108" fill="#e2e8f0" font-size="15">• 지속성 있는 것 (유한킴벌리 + 일부 로열티) ≈ 700~900억 · 일회성 (FDA 마일스톤·기타) ≈ 300~500억</text>
    <text x="30" y="140" fill="#22c55e" font-size="15" font-weight="700">→ 2026+ 렉라자 로열티가 "일회성"에서 "지속성"으로 전환되면 연 2,500억+ 순이익 진입 가능</text>
  </g>

  <text x="60" y="700" fill="#64748b" font-size="12">데이터: dartlab c.analysis("financial","이익품질")["nonOperatingBreakdown"]["history"][0] + 사업보고서 주석 추정 · 2026-04-23</text>
</svg>
