<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>다음 12~24개월 추적 5개 — 실리콘투</title>
  <desc>분기 매출 성장률·재고회전일수·영업현금흐름 회복·GPM 30%·해외 시장 확장 5개 추적.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">다음 12~24개월 추적 5개</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">분기 공시 + 회사 IR로 확인 · 성장형 왜곡 정상화 신호 판별</text>

  <g transform="translate(60, 150)">
    <!-- 1 -->
    <rect x="0" y="0" width="960" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="45" r="22" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="52" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="85" y="38" fill="#f1f5f9" font-size="18" font-weight="700">분기 매출 YoY 30% 유지</text>
    <text x="85" y="62" fill="#e2e8f0" font-size="14">2025Q4 +52% 유지 or 하락. 30%+ 유지 = 선제 재고 정당화. 20% 이하 = 과잉 재고 경보</text>
    <text x="85" y="82" fill="#fbbf24" font-size="12">→ 분기 매출 공시 · c.select("IS",["매출액"])</text>

    <!-- 2 -->
    <rect x="0" y="105" width="960" height="90" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="150" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="157" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="85" y="143" fill="#f1f5f9" font-size="18" font-weight="700">재고회전일수 120일 복귀</text>
    <text x="85" y="167" fill="#e2e8f0" font-size="14">현재 142일. 120일 이내 = 운전자본 정상화. 150일 초과 = 2026 상반기 재고 감손 가능</text>
    <text x="85" y="187" fill="#fbbf24" font-size="12">→ 분기 BS 재고 ÷ 매출원가 × 90</text>

    <!-- 3 -->
    <rect x="0" y="210" width="960" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="255" r="22" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="262" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="85" y="248" fill="#f1f5f9" font-size="18" font-weight="700">영업현금흐름 연 800억+ 복귀</text>
    <text x="85" y="272" fill="#e2e8f0" font-size="14">2025 11억 → 2026 연 800억+ = 성장형 왜곡 확인. 2026 OCF 다시 음수 = 구조적 문제</text>
    <text x="85" y="292" fill="#fbbf24" font-size="12">→ 분기 CF · c.select("CF",["영업활동현금흐름"])</text>

    <!-- 4 -->
    <rect x="0" y="315" width="960" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="360" r="22" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="40" y="367" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="85" y="353" fill="#f1f5f9" font-size="18" font-weight="700">GPM 30% 유지</text>
    <text x="85" y="377" fill="#e2e8f0" font-size="14">2024 33.67% → 2025 31.06% -2.61%p. 2026 30% 이상 유지. 28% 이하 = OPM 15% 하락 위험</text>
    <text x="85" y="397" fill="#fbbf24" font-size="12">→ c.analysis("financial","수익성")["marginWaterfall"]</text>

    <!-- 5 -->
    <rect x="0" y="420" width="960" height="90" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="465" r="22" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="40" y="472" fill="#a855f7" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="85" y="458" fill="#f1f5f9" font-size="18" font-weight="700">해외 시장 확장 공시</text>
    <text x="85" y="482" fill="#e2e8f0" font-size="14">남미·중동·인도 등 신규 시장 진출. 연 1건+ = 단일 국가 의존 리스크 분산</text>
    <text x="85" y="502" fill="#fbbf24" font-size="12">→ 회사 IR · 분기 사업보고서 II장</text>
  </g>

  <g transform="translate(60, 690)">
    <text x="0" y="15" fill="#94a3b8" font-size="13">1·2·3번이 현금 정상화 축, 4번이 마진 방어, 5번이 성장 지속. 2026 Q1~Q2에 방향 결정.</text>
  </g>
</svg>
