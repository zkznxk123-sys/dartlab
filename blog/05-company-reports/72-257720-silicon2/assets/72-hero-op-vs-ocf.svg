<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>실리콘투 2025 — 영업이익 2,054억 vs 영업현금흐름 11억</title>
  <desc>영업이익 대비 영업현금흐름이 0.54%만. 재고 +1,542억과 매출채권 증가가 이익을 운전자본에 묶음.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">영업이익 2,054억 vs 영업현금흐름 11억</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">2025 순이익 1,686억의 0.7%만 현금으로 회수 · 재고·매출채권이 이익을 흡수한 해</text>

  <g transform="translate(80, 170)">
    <!-- 영업이익 바 (크게) -->
    <rect x="100" y="50" width="160" height="360" fill="#22c55e" opacity="0.9"/>
    <text x="180" y="35" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">영업이익</text>
    <text x="180" y="210" fill="#f1f5f9" font-size="42" font-weight="700" text-anchor="middle">2,054</text>
    <text x="180" y="245" fill="#e2e8f0" font-size="16" text-anchor="middle">억원</text>
    <text x="180" y="435" fill="#22c55e" font-size="14" text-anchor="middle">영업이익률 18.40%</text>

    <!-- 순이익 바 -->
    <rect x="380" y="115" width="160" height="295" fill="#3b82f6" opacity="0.9"/>
    <text x="460" y="100" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">순이익</text>
    <text x="460" y="250" fill="#f1f5f9" font-size="42" font-weight="700" text-anchor="middle">1,686</text>
    <text x="460" y="285" fill="#e2e8f0" font-size="16" text-anchor="middle">억원</text>
    <text x="460" y="435" fill="#3b82f6" font-size="14" text-anchor="middle">순이익률 15.10%</text>

    <!-- 영업현금흐름 바 (거의 없음) -->
    <rect x="660" y="408" width="160" height="2" fill="#ef4444" opacity="1"/>
    <text x="740" y="100" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">영업현금흐름</text>
    <text x="740" y="400" fill="#ef4444" font-size="42" font-weight="700" text-anchor="middle">11</text>
    <text x="740" y="385" fill="#e2e8f0" font-size="16" text-anchor="middle">억원</text>
    <text x="740" y="435" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">OCF/NI = 0.7%</text>

    <!-- 격차 설명 박스 -->
    <g transform="translate(880, 50)">
      <rect x="0" y="0" width="260" height="360" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="12"/>
      <text x="130" y="40" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">이익이 어디 갔나</text>

      <text x="20" y="85" fill="#e2e8f0" font-size="15">재고 증가</text>
      <text x="240" y="85" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="end">+1,542억</text>

      <text x="20" y="125" fill="#e2e8f0" font-size="15">매출채권 증가</text>
      <text x="240" y="125" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="end">+700억</text>

      <text x="20" y="165" fill="#e2e8f0" font-size="15">매입채무 증가</text>
      <text x="240" y="165" fill="#22c55e" font-size="16" font-weight="700" text-anchor="end">+400억</text>

      <line x1="20" y1="185" x2="240" y2="185" stroke="#334155" stroke-width="1"/>

      <text x="20" y="215" fill="#fbbf24" font-size="15" font-weight="700">순 발생액</text>
      <text x="240" y="215" fill="#ef4444" font-size="16" font-weight="700" text-anchor="end">약 +1,842억</text>

      <text x="20" y="260" fill="#94a3b8" font-size="13">순이익 1,686억이</text>
      <text x="20" y="282" fill="#94a3b8" font-size="13">운전자본 +1,842억에</text>
      <text x="20" y="304" fill="#94a3b8" font-size="13">전부 흡수됐다.</text>

      <text x="20" y="340" fill="#fbbf24" font-size="13" font-weight="700">→ 창고에 갇힌 이익</text>
    </g>
  </g>

  <!-- 하단 해석 -->
  <g transform="translate(80, 600)">
    <rect x="0" y="0" width="1040" height="80" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="20" y="35" fill="#ef4444" font-size="17" font-weight="700">이익 현금화 경고 4건 (dartlab 이익품질 엔진)</text>
    <text x="20" y="62" fill="#94a3b8" font-size="14">Sloan 발생액비율 23.6% · OCF/NI 1% · 이익 변동계수 0.74 · Beneish M-Score -0.51 — 성장형 운전자본 팽창 신호</text>
  </g>

  <text x="80" y="710" fill="#64748b" font-size="12">데이터: dartlab c.analysis("financial","이익품질")["accrualAnalysis"] · 2026-04-23</text>
</svg>
