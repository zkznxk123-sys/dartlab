<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>재고 3,001억의 의미 — 회전 142일, 13.77배 증가</title>
  <desc>2021 재고 218억 → 2025 3,001억 (13.77배). 재고회전일수 116일 → 142일. 이익이 창고에 갇힘.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">재고 3,001억 — 창고에 갇힌 이익</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">5년 재고 13.77배 증가 · 회전일수 116일 → 142일 · +1,542억 한 해 순증</text>

  <!-- 재고 증가 바 차트 -->
  <g transform="translate(60, 150)">
    <text x="-15" y="0" fill="#94a3b8" font-size="13" text-anchor="end">3,500억</text>
    <text x="-15" y="70" fill="#94a3b8" font-size="13" text-anchor="end">2,500</text>
    <text x="-15" y="140" fill="#94a3b8" font-size="13" text-anchor="end">1,500</text>
    <text x="-15" y="210" fill="#94a3b8" font-size="13" text-anchor="end">500</text>
    <text x="-15" y="280" fill="#94a3b8" font-size="13" text-anchor="end">0</text>

    <line x1="0" y1="280" x2="960" y2="280" stroke="#334155"/>

    <!-- 재고 5년: 218, 286, 785, 1459, 3001 -->
    <!-- y = 280 - (val/3500)*280 -->
    <g>
      <rect x="40" y="263" width="160" height="17" fill="#3b82f6" opacity="0.85"/>
      <text x="120" y="255" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">218</text>
      <text x="120" y="300" fill="#94a3b8" font-size="13" text-anchor="middle">2021</text>

      <rect x="220" y="257" width="160" height="23" fill="#3b82f6" opacity="0.85"/>
      <text x="300" y="249" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">286</text>
      <text x="300" y="300" fill="#94a3b8" font-size="13" text-anchor="middle">2022</text>

      <rect x="400" y="217" width="160" height="63" fill="#3b82f6" opacity="0.85"/>
      <text x="480" y="209" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">785</text>
      <text x="480" y="300" fill="#94a3b8" font-size="13" text-anchor="middle">2023</text>

      <rect x="580" y="163" width="160" height="117" fill="#fbbf24" opacity="0.85"/>
      <text x="660" y="155" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">1,459</text>
      <text x="660" y="300" fill="#94a3b8" font-size="13" text-anchor="middle">2024</text>

      <rect x="760" y="40" width="160" height="240" fill="#ef4444" opacity="0.9"/>
      <text x="840" y="32" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">3,001 ★</text>
      <text x="840" y="300" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2025</text>
    </g>

    <!-- 증가분 강조 -->
    <path d="M 680 163 Q 720 120, 760 85" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
    <text x="730" y="130" fill="#ef4444" font-size="13" font-weight="700">+1,542억</text>
  </g>

  <!-- 회전일수 -->
  <g transform="translate(60, 490)">
    <rect x="0" y="0" width="320" height="150" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="160" y="35" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">재고회전일수</text>
    <text x="100" y="85" fill="#94a3b8" font-size="14" text-anchor="middle">2024</text>
    <text x="100" y="115" fill="#e2e8f0" font-size="28" font-weight="700" text-anchor="middle">116일</text>
    <text x="220" y="85" fill="#ef4444" font-size="14" text-anchor="middle">2025</text>
    <text x="220" y="115" fill="#ef4444" font-size="28" font-weight="700" text-anchor="middle">142일</text>
    <text x="160" y="140" fill="#94a3b8" font-size="12" text-anchor="middle">+26일 · 상품이 창고에 머무는 시간</text>

    <rect x="340" y="0" width="320" height="150" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="500" y="35" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">재고/매출 비율</text>
    <text x="440" y="85" fill="#94a3b8" font-size="14" text-anchor="middle">2024</text>
    <text x="440" y="115" fill="#e2e8f0" font-size="28" font-weight="700" text-anchor="middle">21.10%</text>
    <text x="560" y="85" fill="#ef4444" font-size="14" text-anchor="middle">2025</text>
    <text x="560" y="115" fill="#ef4444" font-size="28" font-weight="700" text-anchor="middle">26.88%</text>
    <text x="500" y="140" fill="#94a3b8" font-size="12" text-anchor="middle">+5.78%p 악화</text>

    <rect x="680" y="0" width="320" height="150" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="840" y="35" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">5년 누적 증가</text>
    <text x="840" y="85" fill="#e2e8f0" font-size="28" font-weight="700" text-anchor="middle">13.77배</text>
    <text x="840" y="115" fill="#94a3b8" font-size="14" text-anchor="middle">218억 → 3,001억</text>
    <text x="840" y="140" fill="#94a3b8" font-size="12" text-anchor="middle">같은 기간 매출 16.97배</text>
  </g>

  <text x="60" y="700" fill="#64748b" font-size="12">데이터: dartlab c.select("BS",["재고자산"]) · 매출원가 ÷ 재고로 회전일수 계산 · 2026-04-23</text>
</svg>
