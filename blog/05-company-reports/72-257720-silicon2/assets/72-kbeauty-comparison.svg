<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>K-뷰티 두 모델 — 실리콘투 vs 달바글로벌</title>
  <desc>유통 플랫폼 모델(실리콘투) vs 자체 브랜드 제조 모델(달바글로벌). 같은 K-뷰티 붐의 다른 수익 구조.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">K-뷰티의 두 가지 수익 모델</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">실리콘투 (유통 플랫폼) vs 달바글로벌 (자체 브랜드) · 같은 붐의 정반대 구조</text>

  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b"/>
    <text x="30" y="32" fill="#e2e8f0" font-size="16" font-weight="700">지표</text>
    <text x="540" y="32" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">실리콘투 (#72)</text>
    <text x="900" y="32" fill="#ec4899" font-size="16" font-weight="700" text-anchor="middle">달바글로벌 (#12)</text>

    <line x1="0" y1="50" x2="1080" y2="50" stroke="#334155"/>

    <!-- 비즈니스 모델 -->
    <rect x="0" y="50" width="1080" height="70" fill="#0f172a"/>
    <text x="30" y="92" fill="#e2e8f0" font-size="15" font-weight="700">비즈니스 모델</text>
    <text x="540" y="85" fill="#f1f5f9" font-size="15" text-anchor="middle">K-뷰티 글로벌 유통 플랫폼</text>
    <text x="540" y="105" fill="#94a3b8" font-size="12" text-anchor="middle">150+ 한국 브랜드 상품 도매·B2C</text>
    <text x="900" y="85" fill="#f1f5f9" font-size="15" text-anchor="middle">자체 브랜드 화장품 제조</text>
    <text x="900" y="105" fill="#94a3b8" font-size="12" text-anchor="middle">달바 "더블 세럼" 등 단일 브랜드</text>

    <!-- 매출 -->
    <rect x="0" y="120" width="1080" height="60" fill="#1e293b"/>
    <text x="30" y="157" fill="#e2e8f0" font-size="15" font-weight="700">매출 (2025)</text>
    <text x="540" y="157" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">1.12조</text>
    <text x="900" y="157" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">약 3,000억</text>

    <!-- GPM -->
    <rect x="0" y="180" width="1080" height="60" fill="#0f172a"/>
    <text x="30" y="217" fill="#e2e8f0" font-size="15" font-weight="700">매출총이익률</text>
    <text x="540" y="217" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">31.06%</text>
    <text x="900" y="217" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">약 60%</text>

    <!-- OPM -->
    <rect x="0" y="240" width="1080" height="60" fill="#1e293b"/>
    <text x="30" y="277" fill="#e2e8f0" font-size="15" font-weight="700">영업이익률</text>
    <text x="540" y="277" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">18.40%</text>
    <text x="900" y="277" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">약 25%</text>

    <!-- R&amp;D -->
    <rect x="0" y="300" width="1080" height="60" fill="#0f172a"/>
    <text x="30" y="337" fill="#e2e8f0" font-size="15" font-weight="700">R&amp;D / 매출</text>
    <text x="540" y="337" fill="#94a3b8" font-size="18" text-anchor="middle">거의 없음</text>
    <text x="900" y="337" fill="#94a3b8" font-size="18" text-anchor="middle">약 5~8%</text>

    <!-- 재고회전 -->
    <rect x="0" y="360" width="1080" height="60" fill="#1e293b"/>
    <text x="30" y="397" fill="#e2e8f0" font-size="15" font-weight="700">재고회전일수</text>
    <text x="540" y="397" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">142일 ↑</text>
    <text x="900" y="397" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">60~80일</text>

    <!-- 시장 -->
    <rect x="0" y="420" width="1080" height="60" fill="#0f172a"/>
    <text x="30" y="457" fill="#e2e8f0" font-size="15" font-weight="700">주요 시장</text>
    <text x="540" y="457" fill="#f1f5f9" font-size="15" text-anchor="middle">글로벌 120+국 (다변화)</text>
    <text x="900" y="457" fill="#f1f5f9" font-size="15" text-anchor="middle">러시아·북미·동남아</text>
  </g>

  <!-- 두 모델 요약 카드 -->
  <g transform="translate(60, 670)">
    <rect x="0" y="0" width="520" height="130" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="260" y="38" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">실리콘투 — 유통 플랫폼</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="14">• 볼륨 폭발 (매출 3년 17배)</text>
    <text x="20" y="90" fill="#e2e8f0" font-size="14">• GPM 낮음 + 판관비 레버리지로 OPM 18%</text>
    <text x="20" y="112" fill="#ef4444" font-size="14" font-weight="700">• 리스크: 재고·매출채권 운전자본 팽창</text>

    <rect x="560" y="0" width="520" height="130" fill="#1e293b" stroke="#ec4899" stroke-width="2" rx="10"/>
    <text x="820" y="38" fill="#ec4899" font-size="17" font-weight="700" text-anchor="middle">달바글로벌 — 자체 브랜드</text>
    <text x="580" y="68" fill="#e2e8f0" font-size="14">• 고마진 (GPM 60% · OPM 25%)</text>
    <text x="580" y="90" fill="#e2e8f0" font-size="14">• 재고 회전 빠름 (자체 예측 가능)</text>
    <text x="580" y="112" fill="#ef4444" font-size="14" font-weight="700">• 리스크: 브랜드 수명·신제품 의존</text>
  </g>

  <text x="60" y="815" fill="#64748b" font-size="12">데이터: 각 블로그 #12 · #72 검증표 교차 · 2026-04-23</text>
</svg>
