<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>실리콘투 5년 매출 17배·영업이익 68배 시계열</title>
  <desc>2021 매출 658억 → 2025 11,163억. 영업이익률 4.54% → 18.40%. CAGR 매출 102.8%, 영업이익 185.6%.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">매출 3년 17배 · 영업이익 68배</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">CAGR 매출 102.8% · 영업이익 185.6% · 영업이익률 4.54% → 18.40%</text>

  <g transform="translate(80, 170)">
    <!-- 매출 바 (왼쪽) + 영업이익률 선 (오른쪽) -->
    <line x1="0" y1="340" x2="1040" y2="340" stroke="#334155"/>
    <text x="-15" y="0" fill="#3b82f6" font-size="13" text-anchor="end">12,000억</text>
    <text x="-15" y="85" fill="#3b82f6" font-size="13" text-anchor="end">9,000</text>
    <text x="-15" y="170" fill="#3b82f6" font-size="13" text-anchor="end">6,000</text>
    <text x="-15" y="255" fill="#3b82f6" font-size="13" text-anchor="end">3,000</text>
    <text x="-15" y="340" fill="#3b82f6" font-size="13" text-anchor="end">0</text>

    <text x="1055" y="0" fill="#fbbf24" font-size="13">25%</text>
    <text x="1055" y="85" fill="#fbbf24" font-size="13">20%</text>
    <text x="1055" y="170" fill="#fbbf24" font-size="13">15%</text>
    <text x="1055" y="255" fill="#fbbf24" font-size="13">10%</text>
    <text x="1055" y="340" fill="#fbbf24" font-size="13">0</text>

    <!-- 매출 바: 658, 1653, 3429, 6915, 11163 -->
    <!-- y = 340 - (value/12000)*340 -->
    <g>
      <rect x="60" y="321" width="130" height="19" fill="#3b82f6" opacity="0.85"/>
      <text x="125" y="313" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">658</text>
      <text x="125" y="362" fill="#94a3b8" font-size="14" text-anchor="middle">2021</text>

      <rect x="240" y="293" width="130" height="47" fill="#3b82f6" opacity="0.85"/>
      <text x="305" y="285" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">1,653</text>
      <text x="305" y="362" fill="#94a3b8" font-size="14" text-anchor="middle">2022</text>

      <rect x="420" y="243" width="130" height="97" fill="#3b82f6" opacity="0.85"/>
      <text x="485" y="235" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">3,429</text>
      <text x="485" y="362" fill="#94a3b8" font-size="14" text-anchor="middle">2023</text>

      <rect x="600" y="144" width="130" height="196" fill="#22c55e" opacity="0.85"/>
      <text x="665" y="136" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">6,915</text>
      <text x="665" y="362" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">2024 ★피크OPM</text>

      <rect x="780" y="24" width="130" height="316" fill="#fbbf24" opacity="0.95"/>
      <text x="845" y="16" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">11,163 ★</text>
      <text x="845" y="362" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">2025 ★</text>
    </g>

    <!-- OPM 선: 4.54, 8.62, 13.94, 19.89, 18.40 -->
    <!-- y = 340 - (opm/25)*340 -->
    <polyline points="125,278 305,223 485,150 665,70 845,90" fill="none" stroke="#ef4444" stroke-width="4"/>
    <g font-size="13" font-weight="700">
      <circle cx="125" cy="278" r="6" fill="#ef4444"/>
      <text x="125" y="268" fill="#ef4444" text-anchor="middle">4.54%</text>

      <circle cx="305" cy="223" r="6" fill="#ef4444"/>
      <text x="305" y="213" fill="#ef4444" text-anchor="middle">8.62%</text>

      <circle cx="485" cy="150" r="6" fill="#ef4444"/>
      <text x="485" y="140" fill="#ef4444" text-anchor="middle">13.94%</text>

      <circle cx="665" cy="70" r="8" fill="#fbbf24" stroke="#fff" stroke-width="2"/>
      <text x="665" y="60" fill="#fbbf24" text-anchor="middle">19.89% 피크</text>

      <circle cx="845" cy="90" r="8" fill="#ef4444" stroke="#fff" stroke-width="2"/>
      <text x="845" y="80" fill="#ef4444" text-anchor="middle">18.40%</text>
    </g>
  </g>

  <!-- 범례 -->
  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="18" height="18" fill="#3b82f6"/>
    <text x="28" y="14" fill="#e2e8f0" font-size="14">매출 (억원)</text>
    <rect x="180" y="8" width="24" height="3" fill="#ef4444"/>
    <text x="214" y="14" fill="#e2e8f0" font-size="14">영업이익률 (%)</text>
  </g>

  <g transform="translate(80, 620)">
    <rect x="0" y="0" width="1040" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="20" y="30" fill="#fbbf24" font-size="16" font-weight="700">2024 OPM 19.89% 정점 → 2025 18.40% 첫 감속 (-1.49%p)</text>
    <text x="20" y="55" fill="#94a3b8" font-size="13">같은 기간 GPM도 33.67% → 31.06% (-2.61%p). 성장은 계속되지만 마진은 수축 국면 초기.</text>
  </g>

  <text x="80" y="712" fill="#64748b" font-size="12">데이터: dartlab c.select("IS",["매출액","영업이익"]) 분기 합산 · 2026-04-23</text>
</svg>
