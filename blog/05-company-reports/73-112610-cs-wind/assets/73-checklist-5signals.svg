<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>다음 12~24개월 추적 5개 — 씨에스윈드</title>
  <desc>영업외 -1,000억 이하 복귀 · IRA AMPC · 부채비율 150% · 해상풍력 수주잔고 · 중국 경쟁.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">다음 12~24개월 추적 5개</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">2026년 구조 전환 확인 조건 · 분기 공시 + IR로 검증</text>

  <g transform="translate(60, 150)">
    <!-- 1 -->
    <rect x="0" y="0" width="960" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="45" r="22" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="52" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="85" y="38" fill="#f1f5f9" font-size="18" font-weight="700">영업외 -1,000억 이하 복귀</text>
    <text x="85" y="62" fill="#e2e8f0" font-size="14">2025 -2,665억 → 2026 -1,000억 이하 = 구조적 문제 해소. -2,000억 이상 지속 시 Vestas 감손 고착 우려</text>
    <text x="85" y="82" fill="#fbbf24" font-size="12">→ 분기 공시 · c.analysis("financial","이익품질")["nonOperatingBreakdown"]</text>

    <!-- 2 -->
    <rect x="0" y="105" width="960" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="150" r="22" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="157" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="85" y="143" fill="#f1f5f9" font-size="18" font-weight="700">미국 IRA AMPC 실수혜액 800억+</text>
    <text x="85" y="167" fill="#e2e8f0" font-size="14">2025·2026 IRS 공제 실적. 연 800억+ 유지 = 푸에블로 공장 정당화. 2028 대선 결과가 2029 이후 결정</text>
    <text x="85" y="187" fill="#fbbf24" font-size="12">→ 회사 IR + US IRS Section 45X 공시</text>

    <!-- 3 -->
    <rect x="0" y="210" width="960" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="255" r="22" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="40" y="262" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="85" y="248" fill="#f1f5f9" font-size="18" font-weight="700">부채비율 150% 이하 복귀</text>
    <text x="85" y="272" fill="#e2e8f0" font-size="14">2024 201% → 2025 168% → 2026~27 150%대. Altman Z 1.73 → 2.0 복귀 = 재무 건전화 확인</text>
    <text x="85" y="292" fill="#fbbf24" font-size="12">→ c.analysis("financial","자금조달")["capitalFlags"]</text>

    <!-- 4 -->
    <rect x="0" y="315" width="960" height="90" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="360" r="22" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="40" y="367" fill="#a855f7" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="85" y="353" fill="#f1f5f9" font-size="18" font-weight="700">해상풍력 수주잔고 5조+</text>
    <text x="85" y="377" fill="#e2e8f0" font-size="14">유럽·대만·한국 해상풍력 프로젝트 신규 수주. 2026년 수주잔고 5조+ = 3년치 매출 확보</text>
    <text x="85" y="397" fill="#fbbf24" font-size="12">→ 회사 IR · 분기 주요경영사항 공시</text>

    <!-- 5 -->
    <rect x="0" y="420" width="960" height="90" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="465" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="472" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="85" y="458" fill="#f1f5f9" font-size="18" font-weight="700">풍력 타워 글로벌 점유율 30% 유지</text>
    <text x="85" y="482" fill="#e2e8f0" font-size="14">중국 CATL·Titan의 해외 진출 속도. 아시아·중동 경쟁 격화 시 매출 성장 둔화 가능</text>
    <text x="85" y="502" fill="#fbbf24" font-size="12">→ GWEC 연간 보고서 · BNEF 풍력 공급망 리포트</text>
  </g>

  <g transform="translate(60, 690)">
    <text x="0" y="15" fill="#94a3b8" font-size="13">1·2·3이 재무 정상화 축, 4가 매출 성장, 5가 경쟁 지형. 2026년 1~2분기에 방향 결정</text>
  </g>
</svg>
