<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>에너지 전환 4사 비교</title>
  <desc>씨에스윈드·LG엔솔·삼성SDI·두산퓨얼셀. 매출·OPM·부채비율·영업외 비중 대조.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">에너지 전환 4사 — 풍력·배터리·수소의 2025</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">수익성·영업외·부채 3축 비교 · 씨에스윈드만 OPM 10%대 회복</text>

  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b"/>
    <text x="30" y="32" fill="#e2e8f0" font-size="16" font-weight="700">회사</text>
    <text x="380" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">매출 (조)</text>
    <text x="540" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">OPM (%)</text>
    <text x="730" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">영업외/영업 (%)</text>
    <text x="920" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">부채비율 (%)</text>
    <text x="1050" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">dCR</text>

    <line x1="0" y1="50" x2="1080" y2="50" stroke="#334155"/>

    <!-- 씨에스윈드 (강조) -->
    <rect x="0" y="50" width="1080" height="95" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="85" fill="#fbbf24" font-size="18" font-weight="700">씨에스윈드 (#73)</text>
    <text x="30" y="108" fill="#94a3b8" font-size="13">112610 · 풍력 타워 글로벌 1위</text>
    <text x="30" y="131" fill="#94a3b8" font-size="12">이번 편</text>
    <text x="380" y="105" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">2.93</text>
    <text x="540" y="105" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">+10.93</text>
    <text x="730" y="105" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">83.2</text>
    <text x="920" y="105" fill="#fbbf24" font-size="18" text-anchor="middle">168</text>
    <text x="1050" y="105" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">A-</text>

    <!-- LG엔솔 -->
    <rect x="0" y="145" width="1080" height="95" fill="#0f172a"/>
    <text x="30" y="180" fill="#e2e8f0" font-size="17" font-weight="700">LG에너지솔루션</text>
    <text x="30" y="203" fill="#94a3b8" font-size="13">373220 · EV 배터리</text>
    <text x="30" y="226" fill="#60a5fa" font-size="12">[#69]</text>
    <text x="380" y="200" fill="#e2e8f0" font-size="18" text-anchor="middle">23.67</text>
    <text x="540" y="200" fill="#22c55e" font-size="18" text-anchor="middle">+5.69</text>
    <text x="730" y="200" fill="#fbbf24" font-size="18" text-anchor="middle">69.2</text>
    <text x="920" y="200" fill="#fbbf24" font-size="18" text-anchor="middle">129</text>
    <text x="1050" y="200" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">A-</text>

    <!-- 삼성SDI -->
    <rect x="0" y="240" width="1080" height="95" fill="#1e293b"/>
    <text x="30" y="275" fill="#e2e8f0" font-size="17" font-weight="700">삼성SDI</text>
    <text x="30" y="298" fill="#94a3b8" font-size="13">006400 · EV 배터리</text>
    <text x="30" y="321" fill="#60a5fa" font-size="12">[#68]</text>
    <text x="380" y="295" fill="#e2e8f0" font-size="18" text-anchor="middle">13.27</text>
    <text x="540" y="295" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">-12.98</text>
    <text x="730" y="295" fill="#94a3b8" font-size="16" text-anchor="middle">(적자)</text>
    <text x="920" y="295" fill="#22c55e" font-size="18" text-anchor="middle">81</text>
    <text x="1050" y="295" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">A</text>

    <!-- 두산퓨얼셀 -->
    <rect x="0" y="335" width="1080" height="95" fill="#0f172a"/>
    <text x="30" y="370" fill="#e2e8f0" font-size="17" font-weight="700">두산퓨얼셀</text>
    <text x="30" y="393" fill="#94a3b8" font-size="13">336260 · 수소연료전지</text>
    <text x="30" y="416" fill="#60a5fa" font-size="12">[#70]</text>
    <text x="380" y="390" fill="#e2e8f0" font-size="18" text-anchor="middle">0.45</text>
    <text x="540" y="390" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">-23.24</text>
    <text x="730" y="390" fill="#94a3b8" font-size="16" text-anchor="middle">(적자)</text>
    <text x="920" y="390" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">226</text>
    <text x="1050" y="390" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">BB</text>
  </g>

  <!-- 해석 -->
  <g transform="translate(60, 630)">
    <rect x="0" y="0" width="1080" height="160" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#22c55e" font-size="18" font-weight="700">에너지 전환 클러스터의 3가지 공통 그늘</text>

    <text x="30" y="75" fill="#e2e8f0" font-size="14">① 본업 영업이익 회복/유지인데 영업외 손실이 순이익을 깎는다 (씨에스윈드 83%·LG엔솔 69%)</text>
    <text x="30" y="100" fill="#e2e8f0" font-size="14">② CAPEX·부채 급증 결과가 영업외에 찍힌다 (유형자산 감손·금융비용·환손실·영업권 조정)</text>
    <text x="30" y="125" fill="#e2e8f0" font-size="14">③ 정책 의존도가 크고 2026~2028 정책 변화가 방향을 결정 (IRA·HPS·EU CRM Act)</text>

    <text x="30" y="150" fill="#fbbf24" font-size="13" font-weight="700">→ 씨에스윈드는 이 그늘의 한 축을 2025년에 통과 중 — 수익성·현금흐름은 최고, 영업외는 최악</text>
  </g>

  <text x="60" y="810" fill="#64748b" font-size="12">데이터: 각 블로그 #68 · #69 · #70 · #73 검증표 교차 · 2026-04-23</text>
</svg>
