<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>씨에스윈드 글로벌 공장 8개국</title>
  <desc>한국·베트남·터키·말레이시아·대만·포르투갈·미국·덴마크 8개국 공장. Vestas 인수로 2023.7 +2개국.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">글로벌 공장 8개국 — 풍력 타워 1위의 지리적 분산</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">한국·아시아·유럽·미국 총 8개국. 2023.7 Vestas 인수로 미국·덴마크 추가</text>

  <!-- 기존 공장 6개국 -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="540" height="250" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>
    <text x="270" y="35" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">기존 6개국 공장 (2010~2020)</text>

    <g transform="translate(30, 60)">
      <text x="0" y="20" fill="#fbbf24" font-size="15" font-weight="700">🇰🇷 한국 (본사)</text>
      <text x="150" y="20" fill="#e2e8f0" font-size="13">군산 공장 · 해상풍력 중심</text>

      <text x="0" y="55" fill="#fbbf24" font-size="15" font-weight="700">🇻🇳 베트남</text>
      <text x="150" y="55" fill="#e2e8f0" font-size="13">붕따우 · 아시아 해상풍력</text>

      <text x="0" y="90" fill="#fbbf24" font-size="15" font-weight="700">🇹🇷 터키</text>
      <text x="150" y="90" fill="#e2e8f0" font-size="13">방코크·게브제 · 유럽/MENA</text>

      <text x="0" y="125" fill="#fbbf24" font-size="15" font-weight="700">🇲🇾 말레이시아</text>
      <text x="150" y="125" fill="#e2e8f0" font-size="13">쿠안탄 · 동남아 풍력</text>

      <text x="0" y="160" fill="#fbbf24" font-size="15" font-weight="700">🇹🇼 대만</text>
      <text x="150" y="160" fill="#e2e8f0" font-size="13">타이중 · 대만 해상풍력</text>

      <text x="0" y="195" fill="#fbbf24" font-size="15" font-weight="700">🇵🇹 포르투갈</text>
      <text x="150" y="195" fill="#e2e8f0" font-size="13">시네스 · 유럽 남부</text>
    </g>
  </g>

  <!-- Vestas 인수 2개국 -->
  <g transform="translate(620, 150)">
    <rect x="0" y="0" width="520" height="250" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="260" y="35" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">Vestas 인수 추가 2개국 (2023.7)</text>

    <g transform="translate(30, 60)">
      <text x="0" y="20" fill="#ef4444" font-size="15" font-weight="700">🇺🇸 미국 콜로라도</text>
      <text x="180" y="20" fill="#e2e8f0" font-size="13">푸에블로 공장</text>
      <text x="0" y="45" fill="#94a3b8" font-size="12">• IRA AMPC 수혜</text>
      <text x="0" y="68" fill="#94a3b8" font-size="12">• $3/MW 세액공제</text>
      <text x="0" y="91" fill="#94a3b8" font-size="12">• 2025 신규 수주 지연</text>

      <text x="0" y="135" fill="#ef4444" font-size="15" font-weight="700">🇩🇰 덴마크 바레</text>
      <text x="180" y="135" fill="#e2e8f0" font-size="13">바레 공장</text>
      <text x="0" y="160" fill="#94a3b8" font-size="12">• 북해 해상풍력</text>
      <text x="0" y="183" fill="#94a3b8" font-size="12">• Vestas 장기 독점 공급</text>
      <text x="0" y="206" fill="#94a3b8" font-size="12">• 2024~25 수주 둔화</text>

      <text x="0" y="240" fill="#ef4444" font-size="12" font-weight="700">→ 두 공장이 2025 영업외 감손 주요 대상</text>
    </g>
  </g>

  <!-- 인수 경제성 -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="1080" height="140" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#fbbf24" font-size="18" font-weight="700">Vestas 타워 사업부 인수 (2023.7)</text>

    <text x="30" y="75" fill="#e2e8f0" font-size="14">인수 금액 $1.2억 (약 1,560억) · 공장 2개 (미국 푸에블로 + 덴마크 바레) · Vestas 10년 독점 공급 계약</text>
    <text x="30" y="100" fill="#e2e8f0" font-size="14">결과: 2024 매출 1.52조 → 3.07조 <tspan fill="#fbbf24" font-weight="700">+102% 폭증</tspan> · 공장 6개국 → 8개국 · 점유율 30%+ 확보</text>
    <text x="30" y="125" fill="#94a3b8" font-size="13">부작용: 부채비율 92% → 201% · 차입금 이자비용 연 1,000억+ · 2025 영업외 감손 주요 원인</text>
  </g>

  <!-- 점유율 -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="30" y="35" fill="#22c55e" font-size="17" font-weight="700">글로벌 풍력 타워 점유율</text>
    <text x="30" y="65" fill="#e2e8f0" font-size="14">중국 제외 기준 약 50% · 전체 시장 약 30%+ · 해상풍력 비중 40%+ (육상 대비 단가 1.5~2배)</text>
  </g>

  <text x="60" y="710" fill="#64748b" font-size="12">데이터: 회사 IR + 사업보고서 II장 + GWEC 2024 글로벌 풍력 보고서 · 2026-04-23</text>
</svg>
