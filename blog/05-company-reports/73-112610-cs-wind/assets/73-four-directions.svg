<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>씨에스윈드 2025 — 4방향 반전</title>
  <desc>매출 -4.6% · 영업이익 +25% · OCF +970% · 순이익 -72%. 한 회사가 한 해에 네 가지 다른 방향으로 움직임.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="32" font-weight="700">한 회사가 한 해에 네 방향으로 움직였다</text>
  <text x="60" y="105" fill="#94a3b8" font-size="18">매출 · 영업이익 · 현금흐름 · 순이익 — 각자 다른 반전을 만든 2025년</text>

  <g transform="translate(60, 150)">
    <!-- 1: 매출 -4.6% -->
    <rect x="0" y="0" width="260" height="230" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <text x="130" y="40" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">① 매출</text>
    <text x="130" y="80" fill="#e2e8f0" font-size="14" text-anchor="middle">2024 3.07조 → 2025 2.93조</text>
    <text x="130" y="135" fill="#fbbf24" font-size="46" font-weight="700" text-anchor="middle">-4.6%</text>
    <text x="130" y="175" fill="#94a3b8" font-size="13" text-anchor="middle">풍력 프로젝트 납기 조정</text>
    <text x="130" y="195" fill="#94a3b8" font-size="13" text-anchor="middle">일시적 감속</text>
    <text x="130" y="215" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">→ 일회성 감소</text>

    <!-- 2: 영업이익 +25% -->
    <rect x="280" y="0" width="260" height="230" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="12"/>
    <text x="410" y="40" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">② 영업이익</text>
    <text x="410" y="80" fill="#e2e8f0" font-size="14" text-anchor="middle">2,555억 → 3,203억</text>
    <text x="410" y="135" fill="#22c55e" font-size="46" font-weight="700" text-anchor="middle">+25%</text>
    <text x="410" y="175" fill="#94a3b8" font-size="13" text-anchor="middle">OPM 8.32% → 10.93%</text>
    <text x="410" y="195" fill="#94a3b8" font-size="13" text-anchor="middle">원가율 -2.81%p + 통합완료</text>
    <text x="410" y="215" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">→ 구조적 개선</text>

    <!-- 3: 영업현금흐름 +970% -->
    <rect x="560" y="0" width="260" height="230" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="12"/>
    <text x="690" y="40" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">③ 영업현금흐름</text>
    <text x="690" y="80" fill="#e2e8f0" font-size="14" text-anchor="middle">491억 → 5,277억</text>
    <text x="690" y="135" fill="#3b82f6" font-size="46" font-weight="700" text-anchor="middle">+970%</text>
    <text x="690" y="175" fill="#94a3b8" font-size="13" text-anchor="middle">재고 -1,555억 소진</text>
    <text x="690" y="195" fill="#94a3b8" font-size="13" text-anchor="middle">운전자본 축소</text>
    <text x="690" y="215" fill="#3b82f6" font-size="12" font-weight="700" text-anchor="middle">→ 일회성 폭증</text>

    <!-- 4: 순이익 -72% -->
    <rect x="840" y="0" width="260" height="230" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="12"/>
    <text x="970" y="40" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">④ 순이익</text>
    <text x="970" y="80" fill="#e2e8f0" font-size="14" text-anchor="middle">1,437억 → 401억</text>
    <text x="970" y="135" fill="#ef4444" font-size="46" font-weight="700" text-anchor="middle">-72%</text>
    <text x="970" y="175" fill="#94a3b8" font-size="13" text-anchor="middle">영업외 -2,665억 흡수</text>
    <text x="970" y="195" fill="#94a3b8" font-size="13" text-anchor="middle">(영업이익의 83%)</text>
    <text x="970" y="215" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">→ 일회성+구조적 혼합</text>
  </g>

  <!-- 해석 -->
  <g transform="translate(60, 420)">
    <rect x="0" y="0" width="1080" height="240" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="12"/>
    <text x="30" y="40" fill="#fbbf24" font-size="20" font-weight="700">핵심 판단</text>

    <text x="30" y="80" fill="#e2e8f0" font-size="15">① 매출 -4.6% + ③ OCF +970% = <tspan fill="#fbbf24">일회성 · 2026년 정상화 예상</tspan></text>
    <text x="30" y="110" fill="#e2e8f0" font-size="15">② 영업이익 +25% = <tspan fill="#22c55e" font-weight="700">구조적 회복 · Vestas 통합 완료 효과</tspan></text>
    <text x="30" y="140" fill="#e2e8f0" font-size="15">④ 순이익 -72% = <tspan fill="#ef4444" font-weight="700">일회성 감손 + 금융비용의 복합 · 2026년이 판단 지점</tspan></text>

    <text x="30" y="185" fill="#94a3b8" font-size="13">영업외 -2,665억의 정체: 외환·파생 평가손실 -700~900억 + Vestas 공장 감손 -600~800억 +</text>
    <text x="30" y="205" fill="#94a3b8" font-size="13">재고 감손 -300~400억 + 영업권 조정 -200~300억 = 약 -2,000~2,400억 (사업보고서 주석 추정)</text>
    <text x="30" y="230" fill="#fbbf24" font-size="13" font-weight="700">→ 2026년 영업외 -1,000억 이하 복귀 여부가 구조 전환 확인 지점</text>
  </g>

  <text x="60" y="705" fill="#64748b" font-size="13">데이터: dartlab c.analysis("financial","수익성")["marginWaterfall"] + "이익품질"["nonOperatingBreakdown"] · 2026-04-23</text>
</svg>
