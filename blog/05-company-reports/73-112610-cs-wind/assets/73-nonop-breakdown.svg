<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>영업외 -2,665억의 4갈래</title>
  <desc>순금융 -511억 + 외환/파생 -700~900억 + Vestas 공장 감손 -600~800억 + 재고감손 -300~400억 + 영업권 -200~300억.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">영업외 -2,665억의 4갈래 (영업이익 83%)</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">영업이익 3,203억에서 순이익 401억까지 사라진 2,665억의 정체</text>

  <g transform="translate(60, 160)">
    <!-- 요인 1: 순금융 -->
    <rect x="0" y="0" width="255" height="290" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
    <text x="127" y="40" fill="#a855f7" font-size="17" font-weight="700" text-anchor="middle">① 순금융</text>
    <text x="127" y="60" fill="#94a3b8" font-size="12" text-anchor="middle">dartlab 실측</text>
    <text x="127" y="120" fill="#ef4444" font-size="38" font-weight="700" text-anchor="middle">-511억</text>

    <text x="20" y="170" fill="#e2e8f0" font-size="13">• 금융수익 +862억</text>
    <text x="20" y="195" fill="#e2e8f0" font-size="13">• 금융비용 -1,373억</text>
    <text x="20" y="225" fill="#94a3b8" font-size="12">Vestas 인수 차입금</text>
    <text x="20" y="245" fill="#94a3b8" font-size="12">이자부담 대부분</text>
    <text x="20" y="275" fill="#a855f7" font-size="12" font-weight="700">→ 부채 감축으로 개선 중</text>

    <!-- 요인 2: 외환/파생 -->
    <rect x="275" y="0" width="255" height="290" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="402" y="40" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">② 외환·파생 평가손실</text>
    <text x="402" y="60" fill="#94a3b8" font-size="12" text-anchor="middle">추정 기여</text>
    <text x="402" y="120" fill="#ef4444" font-size="38" font-weight="700" text-anchor="middle">-700~900억</text>

    <text x="295" y="170" fill="#e2e8f0" font-size="13">• 8개국 달러·유로 부채</text>
    <text x="295" y="195" fill="#e2e8f0" font-size="13">• 환율 헷지 파생 평가</text>
    <text x="295" y="225" fill="#94a3b8" font-size="12">달러 상승 구간에</text>
    <text x="295" y="245" fill="#94a3b8" font-size="12">비금융 평가손실 집중</text>
    <text x="295" y="275" fill="#ef4444" font-size="12" font-weight="700">→ 환율 역전 시 회복 가능</text>

    <!-- 요인 3: Vestas 공장 감손 -->
    <rect x="550" y="0" width="255" height="290" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="677" y="40" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">③ Vestas 공장 감손</text>
    <text x="677" y="60" fill="#94a3b8" font-size="12" text-anchor="middle">추정 기여</text>
    <text x="677" y="120" fill="#fbbf24" font-size="38" font-weight="700" text-anchor="middle">-600~800억</text>

    <text x="570" y="170" fill="#e2e8f0" font-size="13">• 미국 푸에블로 일부 라인</text>
    <text x="570" y="195" fill="#e2e8f0" font-size="13">• 덴마크 바레 공장</text>
    <text x="570" y="225" fill="#94a3b8" font-size="12">신규 수주 지연 →</text>
    <text x="570" y="245" fill="#94a3b8" font-size="12">장기 현금흐름 재평가</text>
    <text x="570" y="275" fill="#ef4444" font-size="12" font-weight="700">→ 구조적 요인 가능성</text>

    <!-- 요인 4: 재고·영업권 -->
    <rect x="825" y="0" width="255" height="290" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>
    <text x="952" y="40" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">④ 재고·영업권 조정</text>
    <text x="952" y="60" fill="#94a3b8" font-size="12" text-anchor="middle">추정 기여</text>
    <text x="952" y="120" fill="#3b82f6" font-size="38" font-weight="700" text-anchor="middle">-500~700억</text>

    <text x="845" y="170" fill="#e2e8f0" font-size="13">• 강재 가격 -8% 재고평가</text>
    <text x="845" y="195" fill="#e2e8f0" font-size="13">• 영업권 부분 상각</text>
    <text x="845" y="225" fill="#94a3b8" font-size="12">Vestas 인수 영업권</text>
    <text x="845" y="245" fill="#94a3b8" font-size="12">우발부채 실현 포함</text>
    <text x="845" y="275" fill="#3b82f6" font-size="12" font-weight="700">→ 일회성 위주</text>
  </g>

  <!-- 합산 -->
  <g transform="translate(60, 490)">
    <rect x="0" y="0" width="1080" height="200" fill="#0f172a" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#ef4444" font-size="20" font-weight="700">합산 — 영업외 -2,665억 = 영업이익 3,203억의 83.2%</text>

    <text x="30" y="80" fill="#e2e8f0" font-size="15">• 영업이익 3,203억 + 영업외 -2,665억 = 세전이익 539억 → 법인세 -137억 → 순이익 401억</text>
    <text x="30" y="110" fill="#e2e8f0" font-size="15">• 일회성(②·④ 합 약 -1,200~1,600억) + 구조적(① + ③ 합 약 -1,100~1,300억)</text>
    <text x="30" y="140" fill="#94a3b8" font-size="13">일회성이 사라지면 2026년 영업외 -1,000~-1,300억 수준으로 복귀 가능, 순이익 1,000억+ 복귀 시나리오</text>
    <text x="30" y="170" fill="#fbbf24" font-size="14" font-weight="700">→ 2026년 영업외 -1,000억 이하 + 부채비율 150%대 복귀가 구조 전환 확인 지점</text>
  </g>

  <text x="60" y="705" fill="#64748b" font-size="12">데이터: dartlab c.analysis("financial","이익품질")["nonOperatingBreakdown"]["history"][0] + 사업보고서 주석 추정 · 2026-04-23</text>
</svg>
