<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>씨에스윈드 9년 매출·영업이익률</title>
  <desc>2017 3,122억 → 2024 30,725억 (9.8배). 2024 Vestas 인수 효과 2배 폭증. 영업이익률 2022 3.06% 저점 → 2025 10.93% 회복.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">9년 궤적 — 매출 9.8배 · OPM 10% 회복</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">2017 3,122억 → 2024 30,725억 (Vestas 인수 효과) · OPM V자 반등</text>

  <g transform="translate(80, 170)">
    <line x1="0" y1="340" x2="1040" y2="340" stroke="#334155"/>
    <text x="-15" y="0" fill="#3b82f6" font-size="12" text-anchor="end">35,000억</text>
    <text x="-15" y="85" fill="#3b82f6" font-size="12" text-anchor="end">26,250</text>
    <text x="-15" y="170" fill="#3b82f6" font-size="12" text-anchor="end">17,500</text>
    <text x="-15" y="255" fill="#3b82f6" font-size="12" text-anchor="end">8,750</text>
    <text x="-15" y="340" fill="#3b82f6" font-size="12" text-anchor="end">0</text>

    <text x="1055" y="0" fill="#fbbf24" font-size="12">12%</text>
    <text x="1055" y="85" fill="#fbbf24" font-size="12">9%</text>
    <text x="1055" y="170" fill="#fbbf24" font-size="12">6%</text>
    <text x="1055" y="255" fill="#fbbf24" font-size="12">3%</text>
    <text x="1055" y="340" fill="#fbbf24" font-size="12">0</text>

    <!-- 매출 바 (9개) 2017~2025 -->
    <!-- 매출: 3122, 5022, 7994, 9691, 12034, 13749, 15202, 30725, 29316 -->
    <!-- y = 340 - (val/35000)*340 -->
    <g font-size="11" font-weight="700">
      <rect x="30" y="309" width="85" height="31" fill="#3b82f6" opacity="0.85"/>
      <text x="72" y="301" fill="#3b82f6" text-anchor="middle">3,122</text>
      <text x="72" y="362" fill="#94a3b8" text-anchor="middle">2017</text>

      <rect x="145" y="291" width="85" height="49" fill="#3b82f6" opacity="0.85"/>
      <text x="187" y="283" fill="#3b82f6" text-anchor="middle">5,022</text>
      <text x="187" y="362" fill="#94a3b8" text-anchor="middle">2018</text>

      <rect x="260" y="262" width="85" height="78" fill="#3b82f6" opacity="0.85"/>
      <text x="302" y="254" fill="#3b82f6" text-anchor="middle">7,994</text>
      <text x="302" y="362" fill="#94a3b8" text-anchor="middle">2019</text>

      <rect x="375" y="246" width="85" height="94" fill="#3b82f6" opacity="0.85"/>
      <text x="417" y="238" fill="#3b82f6" text-anchor="middle">9,691</text>
      <text x="417" y="362" fill="#94a3b8" text-anchor="middle">2020</text>

      <rect x="490" y="223" width="85" height="117" fill="#3b82f6" opacity="0.85"/>
      <text x="532" y="215" fill="#3b82f6" text-anchor="middle">12,034</text>
      <text x="532" y="362" fill="#94a3b8" text-anchor="middle">2021</text>

      <rect x="605" y="207" width="85" height="133" fill="#ef4444" opacity="0.75"/>
      <text x="647" y="199" fill="#ef4444" text-anchor="middle">13,749</text>
      <text x="647" y="362" fill="#ef4444" text-anchor="middle">2022 저점</text>

      <rect x="720" y="193" width="85" height="147" fill="#3b82f6" opacity="0.85"/>
      <text x="762" y="185" fill="#3b82f6" text-anchor="middle">15,202</text>
      <text x="762" y="362" fill="#94a3b8" text-anchor="middle">2023</text>

      <rect x="835" y="42" width="85" height="298" fill="#fbbf24" opacity="0.95"/>
      <text x="877" y="34" fill="#fbbf24" font-size="13" text-anchor="middle">30,725 ★</text>
      <text x="877" y="362" fill="#fbbf24" font-size="13" text-anchor="middle">2024 Vestas</text>

      <rect x="950" y="55" width="85" height="285" fill="#22c55e" opacity="0.9"/>
      <text x="992" y="47" fill="#22c55e" font-size="13" text-anchor="middle">29,316</text>
      <text x="992" y="362" fill="#94a3b8" text-anchor="middle">2025</text>
    </g>

    <!-- OPM 선 -->
    <!-- OPM: 11.34, 6.52, 7.52, 10.07, 8.39, 3.06, 6.89, 8.32, 10.93 -->
    <!-- y = 340 - (opm/12)*340 -->
    <polyline points="72,19 187,156 302,127 417,55 532,102 647,254 762,145 877,104 992,31" fill="none" stroke="#ef4444" stroke-width="4"/>
    <g font-size="12" font-weight="700">
      <circle cx="72" cy="19" r="5" fill="#ef4444"/>
      <text x="72" y="10" fill="#ef4444" text-anchor="middle">11.34%</text>
      <circle cx="647" cy="254" r="8" fill="#ef4444" stroke="#fff" stroke-width="2"/>
      <text x="647" y="272" fill="#ef4444" text-anchor="middle">3.06% 저점</text>
      <circle cx="992" cy="31" r="8" fill="#22c55e" stroke="#fff" stroke-width="2"/>
      <text x="992" y="22" fill="#22c55e" text-anchor="middle">10.93% ★</text>
    </g>
  </g>

  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="18" height="18" fill="#3b82f6"/>
    <text x="28" y="14" fill="#e2e8f0" font-size="14">매출 (억원)</text>
    <rect x="180" y="8" width="24" height="3" fill="#ef4444"/>
    <text x="214" y="14" fill="#e2e8f0" font-size="14">영업이익률 (%)</text>
  </g>

  <g transform="translate(80, 620)">
    <rect x="0" y="0" width="1040" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="20" y="30" fill="#fbbf24" font-size="16" font-weight="700">2023.7 Vestas 타워 인수 → 2024 매출 2배 폭증 → 2025 수익성 회복</text>
    <text x="20" y="55" fill="#94a3b8" font-size="13">9년 매출 CAGR 28%. OPM 2022 3.06% 저점에서 2025 10.93%까지 3.6배 회복. 풍력 사이클 정상화</text>
  </g>

  <text x="80" y="710" fill="#64748b" font-size="12">데이터: dartlab c.select("IS",[...]) 분기 합산 · 2026-04-23</text>
</svg>
