<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>전력 3사 — 변압기 vs 배전 vs 케이블</title>
  <desc>HD현대일렉트릭(변압기 OPM 24%) vs LS ELECTRIC(배전 OPM 8%) vs 대한전선(케이블 OPM 3.5%). 같은 AI 전력 수혜인데 마진 7배 차이.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">전력 3사 — 같은 AI 전력 수요, 7배 다른 마진</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">변압기 OPM 24% · 배전 OPM 8% · 케이블 OPM 3.5% — 부품 위치가 마진을 결정</text>

  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b"/>
    <text x="30" y="32" fill="#e2e8f0" font-size="16" font-weight="700">회사</text>
    <text x="380" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">매출 (조)</text>
    <text x="530" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">OPM (%)</text>
    <text x="700" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">이자보상</text>
    <text x="870" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">dCR</text>
    <text x="1030" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">핵심 사업</text>

    <line x1="0" y1="50" x2="1080" y2="50" stroke="#334155"/>

    <!-- HD현대일렉트릭 -->
    <rect x="0" y="50" width="1080" height="100" fill="#1e293b"/>
    <text x="30" y="85" fill="#22c55e" font-size="18" font-weight="700">HD현대일렉트릭</text>
    <text x="30" y="108" fill="#94a3b8" font-size="13">267260 · [#08]</text>
    <text x="380" y="100" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">3.96</text>
    <text x="530" y="100" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">24.4</text>
    <text x="700" y="100" fill="#22c55e" font-size="18" text-anchor="middle">매우 안전</text>
    <text x="870" y="100" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">A+</text>
    <text x="1030" y="100" fill="#fbbf24" font-size="14" text-anchor="middle">변압기</text>

    <!-- LS ELECTRIC -->
    <rect x="0" y="150" width="1080" height="100" fill="#0f172a"/>
    <text x="30" y="185" fill="#3b82f6" font-size="18" font-weight="700">LS ELECTRIC</text>
    <text x="30" y="208" fill="#94a3b8" font-size="13">010120 · [#65]</text>
    <text x="380" y="200" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">4.97</text>
    <text x="530" y="200" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">8.6</text>
    <text x="700" y="200" fill="#3b82f6" font-size="18" text-anchor="middle">안전</text>
    <text x="870" y="200" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">A-</text>
    <text x="1030" y="200" fill="#3b82f6" font-size="14" text-anchor="middle">배전·자동화</text>

    <!-- 대한전선 (강조) -->
    <rect x="0" y="250" width="1080" height="100" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="285" fill="#fbbf24" font-size="18" font-weight="700">대한전선 (#74)</text>
    <text x="30" y="308" fill="#94a3b8" font-size="13">001440 · 이번 편</text>
    <text x="380" y="300" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">3.64</text>
    <text x="530" y="300" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">3.54</text>
    <text x="700" y="300" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">0.6배 위험</text>
    <text x="870" y="300" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">BBB+</text>
    <text x="1030" y="300" fill="#ef4444" font-size="14" text-anchor="middle">케이블·해저</text>
  </g>

  <!-- 마진 차이의 이유 -->
  <g transform="translate(60, 530)">
    <rect x="0" y="0" width="1080" height="120" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#fbbf24" font-size="18" font-weight="700">왜 부품 위치가 마진을 결정하는가</text>

    <text x="30" y="75" fill="#e2e8f0" font-size="14">• <tspan fill="#22c55e" font-weight="700">변압기·고압개폐기</tspan>: 기술 진입장벽 높음 (HV 절연·시험 인증 8년+) · 글로벌 6강 독점</text>
    <text x="30" y="100" fill="#e2e8f0" font-size="14">• <tspan fill="#3b82f6" font-weight="700">배전·자동화</tspan>: 중간 진입장벽 (통신 + 안전 인증) · 한국·일본·미국 경쟁</text>
  </g>

  <g transform="translate(60, 670)">
    <rect x="0" y="0" width="1080" height="100" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#ef4444" font-size="18" font-weight="700">대한전선 — 케이블의 한계와 해저로 가는 길</text>
    <text x="30" y="70" fill="#e2e8f0" font-size="14">케이블은 구리 60~70% 비중 → 원가 변동 직접 노출 → 마진 본질적 낮음</text>
    <text x="30" y="92" fill="#94a3b8" font-size="13">→ 해저케이블·HVDC로 마진 15~25% 시장 진입 시 OPM 6~8% 회복 경로 (현재 15% 비중 → 2027 25%+)</text>
  </g>

  <text x="60" y="800" fill="#64748b" font-size="12">데이터: 각 블로그 #08 · #65 · #74 검증표 · 2026-04-23</text>
</svg>
