<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>다음 12~24개월 추적 5개 — 대한전선</title>
  <desc>OCF 회복·이자보상 1.5배+·재고회전 100일·해저케이블 25%+·해외 신규 수주.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">다음 12~24개월 추적 5개</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">2026 신사업 베팅 회수 시작 · 분기 공시로 검증</text>

  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="960" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="45" r="22" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="52" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="85" y="38" fill="#f1f5f9" font-size="18" font-weight="700">영업현금흐름 +1,000억 복귀</text>
    <text x="85" y="62" fill="#e2e8f0" font-size="14">2025 -1,713억 → 2026 +1,000억+ = 운전자본 정점 통과. -1,000억 이하 지속 시 구조 문제 가능</text>
    <text x="85" y="82" fill="#fbbf24" font-size="12">→ 분기 CF · c.select("CF",["영업활동현금흐름"])</text>

    <rect x="0" y="105" width="960" height="90" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="150" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="157" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="85" y="143" fill="#f1f5f9" font-size="18" font-weight="700">이자보상배율 1.5배+ 복귀</text>
    <text x="85" y="167" fill="#e2e8f0" font-size="14">2025 0.6배 → 2026 1.5배+ = 영업이익으로 이자 갚는 정상 구조. 차입금 감축 + 영업이익 증가 동반</text>
    <text x="85" y="187" fill="#fbbf24" font-size="12">→ c.analysis("financial","자금조달")["interestBurden"]</text>

    <rect x="0" y="210" width="960" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="255" r="22" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="262" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="85" y="248" fill="#f1f5f9" font-size="18" font-weight="700">재고회전일수 100일 이내 유지</text>
    <text x="85" y="272" fill="#e2e8f0" font-size="14">2025 약 90일 → 2026 100일 이내. 150일+ 시 과잉 재고 가능성. 해저케이블 매출 인식 페이스가 변수</text>
    <text x="85" y="292" fill="#fbbf24" font-size="12">→ 분기 BS 재고 ÷ 매출원가 × 90</text>

    <rect x="0" y="315" width="960" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="360" r="22" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="40" y="367" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="85" y="353" fill="#f1f5f9" font-size="18" font-weight="700">해저케이블 매출 비중 25%+</text>
    <text x="85" y="377" fill="#e2e8f0" font-size="14">2025 약 15% → 2027 25%+ 도달 = 마진 구조 전환 확인. OPM 6~8% 회복 경로</text>
    <text x="85" y="397" fill="#fbbf24" font-size="12">→ 회사 IR · 분기 사업보고서 II장</text>

    <rect x="0" y="420" width="960" height="90" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="465" r="22" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="40" y="472" fill="#a855f7" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="85" y="458" fill="#f1f5f9" font-size="18" font-weight="700">해외 신규 수주 5,000억+</text>
    <text x="85" y="482" fill="#e2e8f0" font-size="14">미국·유럽·대만 해상풍력 입찰. 연 1건+ 대형 수주 = 2027~2028 매출 기반 확보</text>
    <text x="85" y="502" fill="#fbbf24" font-size="12">→ 회사 주요경영사항 공시</text>
  </g>

  <g transform="translate(60, 690)">
    <text x="0" y="15" fill="#94a3b8" font-size="13">1·2번이 재무 정상화, 3·4가 사업 전환, 5가 매출 기반. 2026 1~2분기에 방향 결정</text>
  </g>
</svg>
