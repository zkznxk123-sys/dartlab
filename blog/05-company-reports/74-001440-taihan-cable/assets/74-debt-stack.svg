<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>부채 +7,143억의 사용처</title>
  <desc>차입금 +5,000억 = 당진 공장 2차 증설 2,500~3,000 + 운전자본 1,500~2,000 + 해외 자회사 500~1,000.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">부채 +7,143억의 사용처 (2024→2025)</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">차입금 +5,000억 (143% 폭증) + 매입채무·기타 +2,143억 = 부채 총 +62%</text>

  <!-- 좌측: 부채 변화 막대 -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="320" height="450" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>
    <text x="160" y="40" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">총부채 변화</text>

    <!-- 2024 -->
    <rect x="40" y="180" width="100" height="220" fill="#3b82f6" opacity="0.7"/>
    <text x="90" y="172" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">2024Q4</text>
    <text x="90" y="295" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">11,466</text>
    <text x="90" y="420" fill="#94a3b8" font-size="12" text-anchor="middle">부채비율 76.7%</text>

    <!-- 2025 -->
    <rect x="180" y="40" width="100" height="360" fill="#ef4444" opacity="0.9"/>
    <text x="230" y="32" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">2025Q4</text>
    <text x="230" y="225" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">18,609</text>
    <text x="230" y="420" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">부채비율 114%</text>

    <!-- 화살표 -->
    <path d="M 145 250 L 175 250" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowyellow)"/>
    <text x="160" y="240" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">+62%</text>

    <defs>
      <marker id="arrowyellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
      </marker>
    </defs>
  </g>

  <!-- 우측: 사용처 -->
  <g transform="translate(420, 150)">
    <rect x="0" y="0" width="720" height="450" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="360" y="40" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">차입금 +5,000억의 사용처</text>

    <!-- 항목 1 -->
    <g transform="translate(40, 80)">
      <rect x="0" y="0" width="60" height="40" fill="#a855f7" opacity="0.7" rx="4"/>
      <text x="30" y="27" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">①</text>
      <text x="80" y="22" fill="#e2e8f0" font-size="15" font-weight="700">당진 해저케이블 공장 2차 증설</text>
      <text x="600" y="27" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="end">2,500~3,000억</text>

      <text x="80" y="48" fill="#94a3b8" font-size="13">HVDC 320kV급 양산 라인 추가 · 해저 케이블 케이블링선 발주</text>
    </g>

    <!-- 항목 2 -->
    <g transform="translate(40, 180)">
      <rect x="0" y="0" width="60" height="40" fill="#fbbf24" opacity="0.7" rx="4"/>
      <text x="30" y="27" fill="#0a0e1a" font-size="14" font-weight="700" text-anchor="middle">②</text>
      <text x="80" y="22" fill="#e2e8f0" font-size="15" font-weight="700">운전자본 (재고 + 매출채권)</text>
      <text x="600" y="27" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="end">1,500~2,000억</text>

      <text x="80" y="48" fill="#94a3b8" font-size="13">재고 +2,597억 · 해저케이블 한 본당 6~12개월 제조 (재공품 늘어남)</text>
    </g>

    <!-- 항목 3 -->
    <g transform="translate(40, 280)">
      <rect x="0" y="0" width="60" height="40" fill="#22c55e" opacity="0.7" rx="4"/>
      <text x="30" y="27" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="middle">③</text>
      <text x="80" y="22" fill="#e2e8f0" font-size="15" font-weight="700">해외 자회사 운영자금</text>
      <text x="600" y="27" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="end">500~1,000억</text>

      <text x="80" y="48" fill="#94a3b8" font-size="13">미국·유럽 입찰 참여 + 현지 영업조직 + Buy American 대응</text>
    </g>

    <!-- 결과 -->
    <g transform="translate(40, 380)">
      <rect x="0" y="0" width="640" height="50" fill="#0f172a" stroke="#ef4444" stroke-width="1" rx="6"/>
      <text x="20" y="32" fill="#ef4444" font-size="14" font-weight="700">결과: 이자비용 99억 → 2,124억 (21배 폭증) · 이자보상 0.6배</text>
    </g>
  </g>

  <!-- 하단 -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="70" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="20" y="32" fill="#22c55e" font-size="16" font-weight="700">베팅의 회수: 5조원 수주잔고 (해저케이블 비중 35%+)</text>
    <text x="20" y="55" fill="#94a3b8" font-size="13">→ 2026~2027 매출 인식 시 운전자본 회수 + 이자보상 1.5배+ 정상화 가능 시나리오</text>
  </g>

  <text x="60" y="710" fill="#64748b" font-size="12">데이터: dartlab capitalOverview + 사업보고서 자금 사용처 추정 · 2026-04-23</text>
</svg>
