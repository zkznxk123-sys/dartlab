<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>대한전선 2025 — 영업이익 1,286억 vs 이자비용 2,124억</title>
  <desc>이자보상배율 0.6배 위험. 매출 사상 최대인데 이자비용이 영업이익을 1.65배 초과. 부채 +7,143억·재고 +2,597억·OCF -1,713억의 합.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">영업이익 1,286억 vs 이자비용 2,124억</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">이자보상배율 0.6배 — 영업에서 번 돈으로 이자조차 못 갚는 구조</text>

  <g transform="translate(80, 170)">
    <!-- 영업이익 막대 -->
    <rect x="50" y="160" width="180" height="200" fill="#22c55e" opacity="0.85"/>
    <text x="140" y="148" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">영업이익 (2025)</text>
    <text x="140" y="270" fill="#f1f5f9" font-size="42" font-weight="700" text-anchor="middle">1,286억</text>
    <text x="140" y="385" fill="#22c55e" font-size="14" text-anchor="middle">사상 최대 · OPM 3.54%</text>

    <!-- vs 화살표 -->
    <text x="320" y="270" fill="#fbbf24" font-size="36" font-weight="700" text-anchor="middle">vs</text>

    <!-- 이자비용 막대 (더 큼) -->
    <rect x="400" y="30" width="180" height="330" fill="#ef4444" opacity="0.95"/>
    <text x="490" y="18" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">이자비용 (2025)</text>
    <text x="490" y="200" fill="#f1f5f9" font-size="42" font-weight="700" text-anchor="middle">2,124억</text>
    <text x="490" y="385" fill="#ef4444" font-size="14" text-anchor="middle">영업이익의 1.65배</text>

    <!-- 차이 강조 박스 -->
    <g transform="translate(630, 80)">
      <rect x="0" y="0" width="370" height="280" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="12"/>
      <text x="185" y="40" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">이자보상배율 0.6배</text>
      <text x="185" y="70" fill="#94a3b8" font-size="13" text-anchor="middle">위험 등급 (1배 미만)</text>

      <text x="20" y="120" fill="#e2e8f0" font-size="15">2024 이자비용</text>
      <text x="350" y="120" fill="#94a3b8" font-size="16" font-weight="700" text-anchor="end">99억</text>

      <text x="20" y="150" fill="#e2e8f0" font-size="15">2025 이자비용</text>
      <text x="350" y="150" fill="#ef4444" font-size="18" font-weight="700" text-anchor="end">2,124억</text>

      <line x1="20" y1="170" x2="350" y2="170" stroke="#334155" stroke-width="1"/>

      <text x="20" y="200" fill="#fbbf24" font-size="15" font-weight="700">증감</text>
      <text x="350" y="200" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="end">21배 폭증</text>

      <text x="20" y="240" fill="#94a3b8" font-size="13">차입금 +143% 증가의 결과</text>
      <text x="20" y="260" fill="#94a3b8" font-size="13">(3,500 → 8,500억 추정)</text>
    </g>
  </g>

  <!-- 4개 적신호 -->
  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="1040" height="115" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="20" y="35" fill="#fbbf24" font-size="18" font-weight="700">2025년 4개 적신호 (모두 같은 원인)</text>

    <text x="20" y="65" fill="#e2e8f0" font-size="14">① 부채 +7,143억 (114%) · ② 재고 +2,597억 (44%) · ③ OCF -1,713억 · ④ 이자보상 0.6배</text>
    <text x="20" y="90" fill="#94a3b8" font-size="13">→ 해저케이블·HVDC 신사업 베팅을 위한 공장 증설 + 운전자본 + 차입금이 한꺼번에 들어온 첫 청구서</text>
  </g>

  <text x="80" y="710" fill="#64748b" font-size="12">데이터: dartlab c.analysis("financial","자금조달")["interestBurden"] + capitalFlags · 2026-04-23</text>
</svg>
