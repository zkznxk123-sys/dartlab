<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>대한전선 9년 매출·영업이익률·이자보상</title>
  <desc>2017 1.59조 → 2025 3.64조 매출 2.3배. OPM 2~3.5% 안정. 그러나 이자보상배율이 2024 11.6배에서 2025 0.6배로 급락.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">9년 궤적 — 매출 2.3배 · 이자보상 11.6→0.6배</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">2017 1.59조 → 2025 3.64조 (CAGR 11.0%) · 호반 인수 후 4년 매출 +82%</text>

  <g transform="translate(80, 170)">
    <line x1="0" y1="340" x2="1040" y2="340" stroke="#334155"/>
    <text x="-15" y="0" fill="#3b82f6" font-size="12" text-anchor="end">40,000억</text>
    <text x="-15" y="85" fill="#3b82f6" font-size="12" text-anchor="end">30,000</text>
    <text x="-15" y="170" fill="#3b82f6" font-size="12" text-anchor="end">20,000</text>
    <text x="-15" y="255" fill="#3b82f6" font-size="12" text-anchor="end">10,000</text>
    <text x="-15" y="340" fill="#3b82f6" font-size="12" text-anchor="end">0</text>

    <text x="1055" y="0" fill="#fbbf24" font-size="12">12배</text>
    <text x="1055" y="85" fill="#fbbf24" font-size="12">9배</text>
    <text x="1055" y="170" fill="#fbbf24" font-size="12">6배</text>
    <text x="1055" y="255" fill="#fbbf24" font-size="12">3배</text>
    <text x="1055" y="340" fill="#fbbf24" font-size="12">0</text>

    <!-- 매출 바 9년 -->
    <!-- 매출: 15876, 16488, 15547, 15968, 19977, 24505, 28440, 32913, 36360 -->
    <!-- y = 340 - (val/40000)*340 -->
    <g font-size="11" font-weight="700">
      <rect x="30" y="205" width="85" height="135" fill="#3b82f6" opacity="0.85"/>
      <text x="72" y="197" fill="#3b82f6" text-anchor="middle">15,876</text>
      <text x="72" y="362" fill="#94a3b8" text-anchor="middle">2017</text>

      <rect x="145" y="200" width="85" height="140" fill="#3b82f6" opacity="0.85"/>
      <text x="187" y="192" fill="#3b82f6" text-anchor="middle">16,488</text>
      <text x="187" y="362" fill="#94a3b8" text-anchor="middle">2018</text>

      <rect x="260" y="208" width="85" height="132" fill="#3b82f6" opacity="0.85"/>
      <text x="302" y="200" fill="#3b82f6" text-anchor="middle">15,547</text>
      <text x="302" y="362" fill="#94a3b8" text-anchor="middle">2019</text>

      <rect x="375" y="204" width="85" height="136" fill="#3b82f6" opacity="0.85"/>
      <text x="417" y="196" fill="#3b82f6" text-anchor="middle">15,968</text>
      <text x="417" y="362" fill="#94a3b8" text-anchor="middle">2020</text>

      <rect x="490" y="170" width="85" height="170" fill="#fbbf24" opacity="0.85"/>
      <text x="532" y="162" fill="#fbbf24" text-anchor="middle">19,977</text>
      <text x="532" y="362" fill="#fbbf24" text-anchor="middle">2021 호반</text>

      <rect x="605" y="132" width="85" height="208" fill="#3b82f6" opacity="0.85"/>
      <text x="647" y="124" fill="#3b82f6" text-anchor="middle">24,505</text>
      <text x="647" y="362" fill="#94a3b8" text-anchor="middle">2022</text>

      <rect x="720" y="98" width="85" height="242" fill="#3b82f6" opacity="0.85"/>
      <text x="762" y="90" fill="#3b82f6" text-anchor="middle">28,440</text>
      <text x="762" y="362" fill="#94a3b8" text-anchor="middle">2023</text>

      <rect x="835" y="60" width="85" height="280" fill="#3b82f6" opacity="0.85"/>
      <text x="877" y="52" fill="#3b82f6" text-anchor="middle">32,913</text>
      <text x="877" y="362" fill="#94a3b8" text-anchor="middle">2024</text>

      <rect x="950" y="31" width="85" height="309" fill="#22c55e" opacity="0.95"/>
      <text x="992" y="23" fill="#22c55e" font-size="13" text-anchor="middle">36,360 ★</text>
      <text x="992" y="362" fill="#22c55e" text-anchor="middle">2025</text>
    </g>

    <!-- 이자보상배율 선 (2017 1.6, 2018 1.7, 2019 1.5, 2020 2.3, 2021 1.7, 2022 1.8, 2023 4.0, 2024 11.6, 2025 0.6) -->
    <!-- y = 340 - (icr/12)*340 -->
    <polyline points="72,295 187,292 302,298 417,275 532,292 647,289 762,227 877,11 992,323" fill="none" stroke="#ef4444" stroke-width="4"/>
    <g font-size="12" font-weight="700">
      <circle cx="877" cy="11" r="8" fill="#fbbf24" stroke="#fff" stroke-width="2"/>
      <text x="877" y="3" fill="#fbbf24" text-anchor="middle">11.6배 ★</text>

      <circle cx="992" cy="323" r="9" fill="#ef4444" stroke="#fff" stroke-width="2"/>
      <text x="992" y="343" fill="#ef4444" text-anchor="middle">0.6배 위험 ★</text>
    </g>
  </g>

  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="18" height="18" fill="#3b82f6"/>
    <text x="28" y="14" fill="#e2e8f0" font-size="14">매출 (억원)</text>
    <rect x="180" y="8" width="24" height="3" fill="#ef4444"/>
    <text x="214" y="14" fill="#e2e8f0" font-size="14">이자보상배율 (배)</text>
  </g>

  <g transform="translate(80, 620)">
    <rect x="0" y="0" width="1040" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="20" y="30" fill="#fbbf24" font-size="16" font-weight="700">2024 ICR 11.6배 → 2025 0.6배 — 한 해 만의 19배 악화</text>
    <text x="20" y="55" fill="#94a3b8" font-size="13">매출은 사상 최대로 가는 동안 차입금 +143% 폭증 → 이자비용 21배 증가 → 이자보상 위험 진입</text>
  </g>

  <text x="80" y="710" fill="#64748b" font-size="12">데이터: dartlab c.select("IS",[...]) + interestBurden 9년 시계열 · 2026-04-23</text>
</svg>
