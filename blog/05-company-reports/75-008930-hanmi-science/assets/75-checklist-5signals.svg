<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>다음 12~24개월 추적 5개 — 한미사이언스</title>
  <desc>한미약품 OPM 16%+·지분법 복원·Health Science 성장·경영권 정착·상속세 완료.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">다음 12~24개월 추적 5개</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">5년 다큐 이후 정상 궤도 유지 검증 조건</text>

  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="960" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="45" r="22" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="52" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="85" y="38" fill="#f1f5f9" font-size="18" font-weight="700">한미약품 OPM 16%+ 유지</text>
    <text x="85" y="62" fill="#e2e8f0" font-size="14">한미사이언스 지분법이익 직접 원천. 한미약품 분기 OPM 15%+ = 지주 지분법 800억+ 유지</text>
    <text x="85" y="82" fill="#fbbf24" font-size="12">→ [한미약품 #57](/blog/hanmi-pharm) 분기 실적 추적</text>

    <rect x="0" y="105" width="960" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="150" r="22" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="157" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="85" y="143" fill="#f1f5f9" font-size="18" font-weight="700">지분법이익 800억+ 복원 지속</text>
    <text x="85" y="167" fill="#e2e8f0" font-size="14">2025 818억 → 2026 800억+. 다시 0으로 빠지면 회계 이슈 재발 경고 신호</text>
    <text x="85" y="187" fill="#fbbf24" font-size="12">→ c.analysis("financial","이익품질")["nonOperatingBreakdown"]</text>

    <rect x="0" y="210" width="960" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="255" r="22" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="40" y="262" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="85" y="248" fill="#f1f5f9" font-size="18" font-weight="700">Health Science 매출 연 10%+ 성장</text>
    <text x="85" y="272" fill="#e2e8f0" font-size="14">자체 사업 성장 엔진. 1,100억 → 1,200억+ 유지. 임팩티브·헬시플로라 중심</text>
    <text x="85" y="292" fill="#fbbf24" font-size="12">→ 분기 사업부별 세그먼트 공시</text>

    <rect x="0" y="315" width="960" height="90" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="360" r="22" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="40" y="367" fill="#a855f7" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="85" y="353" fill="#f1f5f9" font-size="18" font-weight="700">경영권 정착 공시</text>
    <text x="85" y="377" fill="#e2e8f0" font-size="14">2024~2025 분쟁 이후 이사회 구성·임기. 임종윤·송영숙 진영 경영 분담 공시 안정</text>
    <text x="85" y="397" fill="#fbbf24" font-size="12">→ 이사회 임면·경영진 변동 공시</text>

    <rect x="0" y="420" width="960" height="90" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="465" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="472" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="85" y="458" fill="#f1f5f9" font-size="18" font-weight="700">상속세 최종 납부 완료</text>
    <text x="85" y="482" fill="#e2e8f0" font-size="14">5년 연부연납 2025년 종료 예정. 완료 공시 = 5년 불확실성 해소의 마지막 신호</text>
    <text x="85" y="502" fill="#fbbf24" font-size="12">→ 유족 측 주식담보대출 상환 · 경영권 지분 안정화</text>
  </g>

  <g transform="translate(60, 690)">
    <text x="0" y="15" fill="#94a3b8" font-size="13">1·2가 실적 축, 3이 자체 사업, 4·5가 경영권 · 2026 안에 모두 긍정이면 정상 궤도 확정</text>
  </g>
</svg>
