<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>한미사이언스 2025 — 지분법이익 V자 반등</title>
  <desc>지분법이익 2024 0 → 2025 818억 회복. 영업이익 989 → 1,387억 (+40%), 순이익 567 → 1,177억 (+108%).</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">영업 +40% vs 순이익 +108% — 지분법 V자 반등</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">한미약품 41% 지주회사의 5년 경영권 다큐 · 2025년 기록 경신</text>

  <g transform="translate(80, 170)">
    <!-- 2024 막대 -->
    <g>
      <rect x="80" y="120" width="140" height="220" fill="#ef4444" opacity="0.7"/>
      <text x="150" y="112" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">2024</text>
      <text x="150" y="235" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">989</text>
      <text x="150" y="260" fill="#e2e8f0" font-size="13" text-anchor="middle">영업이익</text>
      <text x="150" y="360" fill="#ef4444" font-size="13" text-anchor="middle">OPM 7.70%</text>
    </g>

    <!-- 2024 순이익 -->
    <g>
      <rect x="250" y="215" width="140" height="125" fill="#ef4444" opacity="0.4"/>
      <text x="320" y="282" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">567</text>
      <text x="320" y="307" fill="#e2e8f0" font-size="12" text-anchor="middle">순이익</text>
      <text x="320" y="360" fill="#ef4444" font-size="12" text-anchor="middle">지분법 0 · -51%</text>
    </g>

    <!-- 화살표 -->
    <text x="460" y="240" fill="#fbbf24" font-size="40" font-weight="700" text-anchor="middle">→</text>

    <!-- 2025 영업이익 -->
    <g>
      <rect x="520" y="30" width="140" height="310" fill="#22c55e" opacity="0.9"/>
      <text x="590" y="22" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">2025 ★</text>
      <text x="590" y="195" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">1,387</text>
      <text x="590" y="220" fill="#e2e8f0" font-size="13" text-anchor="middle">영업이익 +40%</text>
      <text x="590" y="360" fill="#22c55e" font-size="13" text-anchor="middle">OPM 10.22% 사상 최대</text>
    </g>

    <!-- 2025 순이익 -->
    <g>
      <rect x="690" y="75" width="140" height="265" fill="#22c55e" opacity="0.7"/>
      <text x="760" y="212" fill="#f1f5f9" font-size="28" font-weight="700" text-anchor="middle">1,177</text>
      <text x="760" y="237" fill="#e2e8f0" font-size="12" text-anchor="middle">순이익 +108%</text>
      <text x="760" y="360" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">지분법 818억 ↑</text>
    </g>

    <!-- 강조 박스 -->
    <g transform="translate(870, 60)">
      <rect x="0" y="0" width="240" height="290" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="12"/>
      <text x="120" y="40" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">지분법이익</text>
      <text x="120" y="60" fill="#94a3b8" font-size="12" text-anchor="middle">한미약품 41%</text>

      <text x="20" y="110" fill="#e2e8f0" font-size="14">2023</text>
      <text x="220" y="110" fill="#94a3b8" font-size="16" font-weight="700" text-anchor="end">675억</text>

      <text x="20" y="145" fill="#e2e8f0" font-size="14">2024</text>
      <text x="220" y="145" fill="#ef4444" font-size="20" font-weight="700" text-anchor="end">0 ★</text>

      <text x="20" y="180" fill="#e2e8f0" font-size="14">2025</text>
      <text x="220" y="180" fill="#22c55e" font-size="20" font-weight="700" text-anchor="end">818 ★</text>

      <line x1="20" y1="200" x2="220" y2="200" stroke="#334155"/>

      <text x="120" y="230" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">지분법 복귀</text>
      <text x="120" y="250" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">= 순이익 V자</text>
      <text x="120" y="275" fill="#94a3b8" font-size="11" text-anchor="middle">한미약품 #57 회복 반영</text>
    </g>
  </g>

  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="1040" height="115" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="20" y="35" fill="#fbbf24" font-size="18" font-weight="700">5년 경영권 다큐 정리</text>
    <text x="20" y="65" fill="#e2e8f0" font-size="14">2020.08 임성기 별세 → 상속세 5,400억 → 2024.01 OCI 합병 시도 → 2024.02 주총 부결 → 2024.03~09 분쟁 → 2025 안착</text>
    <text x="20" y="90" fill="#94a3b8" font-size="13">→ 2025년 한미약품 실적 회복(OPM 16.6%)·지분법 818억·OPM 10.22% 사상 최대 3 조건 동시 충족</text>
  </g>

  <text x="80" y="710" fill="#64748b" font-size="12">데이터: dartlab marginWaterfall + nonOperatingBreakdown · 2026-04-23</text>
</svg>
