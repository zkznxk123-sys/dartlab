<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>한미사이언스 지주 구조 — 한미약품 41% 연결</title>
  <desc>유족 34% → 한미사이언스 → 한미약품 41% + 자체 사업. 매출 80% 한미약품 + 20% Health Science.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">지주 구조 — 한미약품 41% + 자체 사업</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">유족 34% → 한미사이언스 → 한미약품 41% 지분 + Health Science 자체 사업</text>

  <!-- 최상위: 유족 -->
  <g transform="translate(450, 130)">
    <rect x="0" y="0" width="300" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="150" y="30" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">임성기 창업주 유족</text>
    <text x="150" y="55" fill="#94a3b8" font-size="13" text-anchor="middle">송영숙 + 자녀 3명 (종윤·주현·종훈)</text>
    <text x="150" y="72" fill="#94a3b8" font-size="12" text-anchor="middle">지분 약 34%</text>
  </g>

  <!-- 화살표 1 -->
  <path d="M 600 215 L 600 255" stroke="#fbbf24" stroke-width="3" marker-end="url(#arr1)"/>
  <text x="620" y="240" fill="#fbbf24" font-size="14" font-weight="700">34%</text>

  <!-- 한미사이언스 -->
  <g transform="translate(400, 270)">
    <rect x="0" y="0" width="400" height="100" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" rx="10"/>
    <text x="200" y="35" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">한미사이언스 (008930)</text>
    <text x="200" y="62" fill="#e2e8f0" font-size="14" text-anchor="middle">지주회사 (2010.07 전환)</text>
    <text x="200" y="85" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">매출 1.36조 · OPM 10.22%</text>
  </g>

  <!-- 분기 -->
  <g>
    <!-- 좌하: 한미약품 -->
    <path d="M 470 375 L 270 430" stroke="#22c55e" stroke-width="3" marker-end="url(#arr2)"/>
    <text x="300" y="400" fill="#22c55e" font-size="15" font-weight="700">41%</text>

    <!-- 우하: 자체 사업 -->
    <path d="M 730 375 L 930 430" stroke="#3b82f6" stroke-width="3" marker-end="url(#arr3)"/>
    <text x="870" y="400" fill="#3b82f6" font-size="15" font-weight="700">100%</text>
  </g>

  <!-- 한미약품 -->
  <g transform="translate(30, 440)">
    <rect x="0" y="0" width="480" height="220" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="240" y="35" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">한미약품 (128940) [#57]</text>
    <text x="240" y="60" fill="#94a3b8" font-size="13" text-anchor="middle">자체 신약 R&D 제약사</text>

    <text x="30" y="105" fill="#e2e8f0" font-size="14">매출</text>
    <text x="450" y="105" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="end">1.55조</text>

    <text x="30" y="135" fill="#e2e8f0" font-size="14">영업이익률</text>
    <text x="450" y="135" fill="#22c55e" font-size="16" font-weight="700" text-anchor="end">16.60%</text>

    <text x="30" y="165" fill="#e2e8f0" font-size="14">순이익</text>
    <text x="450" y="165" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="end">1,871억</text>

    <text x="30" y="195" fill="#fbbf24" font-size="13" font-weight="700">→ 한미사이언스 지분법이익 818억 (41%)</text>
  </g>

  <!-- 자체 사업 -->
  <g transform="translate(690, 440)">
    <rect x="0" y="0" width="480" height="220" fill="#0f172a" stroke="#3b82f6" stroke-width="2" rx="10"/>
    <text x="240" y="35" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">한미사이언스 자체 사업</text>
    <text x="240" y="60" fill="#94a3b8" font-size="13" text-anchor="middle">Health Science + 유통</text>

    <text x="30" y="95" fill="#e2e8f0" font-size="13">Health Science (임팩티브 등)</text>
    <text x="450" y="95" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="end">~1,100억</text>

    <text x="30" y="120" fill="#e2e8f0" font-size="13">헬스케어 기기 (혈압계·혈당계)</text>
    <text x="450" y="120" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="end">~500억</text>

    <text x="30" y="145" fill="#e2e8f0" font-size="13">의약품 유통 (제3자 도매)</text>
    <text x="450" y="145" fill="#f1f5f9" font-size="14" font-weight="700" text-anchor="end">~700억</text>

    <line x1="30" y1="160" x2="450" y2="160" stroke="#334155"/>

    <text x="30" y="185" fill="#fbbf24" font-size="14" font-weight="700">자체 사업 합</text>
    <text x="450" y="185" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="end">~2,300억 (20%)</text>

    <text x="30" y="210" fill="#94a3b8" font-size="12">→ 영업이익 기여 약 350억 (25%)</text>
  </g>

  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <text x="60" y="705" fill="#64748b" font-size="12">데이터: 사업보고서 IX장 관계기업 + 회사 IR · 2026-04-23</text>
</svg>
