<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>제약 지주 3사 비교 — 한미사이언스·녹십자홀딩스·종근당홀딩스</title>
  <desc>한미사이언스 OPM 10.22%가 제약 지주 4사 중 최고. 한미약품 16.6% 모회사 효과.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">제약 지주 4사 비교 — OPM 10.22% 최고</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">한미약품 자회사가 고마진인 것이 한미사이언스 지주 OPM 상위의 이유</text>

  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b"/>
    <text x="30" y="32" fill="#e2e8f0" font-size="16" font-weight="700">지주회사</text>
    <text x="350" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">주력 자회사</text>
    <text x="640" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">매출 (조)</text>
    <text x="790" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">OPM (%)</text>
    <text x="940" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">자회사 OPM</text>
    <text x="1050" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">dCR</text>

    <line x1="0" y1="50" x2="1080" y2="50" stroke="#334155"/>

    <!-- 한미사이언스 (강조) -->
    <rect x="0" y="50" width="1080" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="85" fill="#fbbf24" font-size="18" font-weight="700">한미사이언스 (008930)</text>
    <text x="30" y="110" fill="#94a3b8" font-size="13">이번 편 [#75]</text>
    <text x="350" y="95" fill="#e2e8f0" font-size="15" text-anchor="middle">한미약품 (#57)</text>
    <text x="640" y="95" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">1.36</text>
    <text x="790" y="95" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">10.22</text>
    <text x="940" y="95" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">16.60</text>
    <text x="1050" y="95" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">A</text>

    <!-- 녹십자홀딩스 -->
    <rect x="0" y="130" width="1080" height="80" fill="#0f172a"/>
    <text x="30" y="165" fill="#e2e8f0" font-size="17" font-weight="700">녹십자홀딩스 (005250)</text>
    <text x="350" y="175" fill="#e2e8f0" font-size="15" text-anchor="middle">GC녹십자 · GC셀 등</text>
    <text x="640" y="175" fill="#e2e8f0" font-size="17" text-anchor="middle">약 1.7</text>
    <text x="790" y="175" fill="#fbbf24" font-size="17" text-anchor="middle">약 5</text>
    <text x="940" y="175" fill="#94a3b8" font-size="15" text-anchor="middle">약 5</text>
    <text x="1050" y="175" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">A-</text>

    <!-- 종근당홀딩스 -->
    <rect x="0" y="210" width="1080" height="80" fill="#1e293b"/>
    <text x="30" y="245" fill="#e2e8f0" font-size="17" font-weight="700">종근당홀딩스 (001630)</text>
    <text x="350" y="255" fill="#e2e8f0" font-size="15" text-anchor="middle">종근당</text>
    <text x="640" y="255" fill="#e2e8f0" font-size="17" text-anchor="middle">약 1.5</text>
    <text x="790" y="255" fill="#fbbf24" font-size="17" text-anchor="middle">약 6</text>
    <text x="940" y="255" fill="#94a3b8" font-size="15" text-anchor="middle">약 7</text>
    <text x="1050" y="255" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">A-</text>

    <!-- JW중외제약 -->
    <rect x="0" y="290" width="1080" height="80" fill="#0f172a"/>
    <text x="30" y="325" fill="#e2e8f0" font-size="17" font-weight="700">JW중외제약 (001060)</text>
    <text x="350" y="335" fill="#e2e8f0" font-size="15" text-anchor="middle">JW중외제약</text>
    <text x="640" y="335" fill="#e2e8f0" font-size="17" text-anchor="middle">약 0.9</text>
    <text x="790" y="335" fill="#fbbf24" font-size="17" text-anchor="middle">약 7</text>
    <text x="940" y="335" fill="#94a3b8" font-size="15" text-anchor="middle">약 8</text>
    <text x="1050" y="335" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">A</text>
  </g>

  <!-- 해석 -->
  <g transform="translate(60, 550)">
    <rect x="0" y="0" width="1080" height="150" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#fbbf24" font-size="18" font-weight="700">지주 OPM의 공식: 자회사 OPM × 지분율 + 자체 사업 OPM</text>

    <text x="30" y="75" fill="#e2e8f0" font-size="14">한미사이언스 OPM 10.22% 높은 이유 = <tspan fill="#22c55e" font-weight="700">한미약품 OPM 16.6%가 타 제약사 대비 1.7~3배 높음</tspan></text>
    <text x="30" y="100" fill="#e2e8f0" font-size="14">→ 모회사 OPM은 자회사 OPM의 상한에 근사. 한미약품이 고마진 자체 신약 구조라 지주도 수혜</text>
    <text x="30" y="130" fill="#94a3b8" font-size="13">한미 5년 승계 다큐를 제외하면, 정량적으로는 4사 중 가장 안정적 지주 구조</text>
  </g>

  <text x="60" y="710" fill="#64748b" font-size="12">데이터: 각 블로그 #57 + 제약사 공시 2025 · 2026-04-23</text>
</svg>
