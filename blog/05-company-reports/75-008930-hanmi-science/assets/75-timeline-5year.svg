<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>한미사이언스 5년 경영권 다큐 타임라인</title>
  <desc>2020.08 임성기 별세 → 상속세 5,400억 → 2024.01 OCI 합병 → 2024.02 주총 부결 → 2024.03 경영권 분쟁 → 2025 안착.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">5년 경영권 다큐 (2020~2025)</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">임성기 별세부터 2025 기록 경신까지 · 한국 상장사 최장 경영권 다큐 중 하나</text>

  <!-- 타임라인 -->
  <g transform="translate(80, 160)">
    <line x1="0" y1="80" x2="1040" y2="80" stroke="#fbbf24" stroke-width="3"/>

    <!-- 1. 2020.08 임성기 별세 -->
    <circle cx="0" cy="80" r="12" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <text x="0" y="50" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">2020.08</text>
    <text x="0" y="115" fill="#e2e8f0" font-size="13" text-anchor="middle">임성기</text>
    <text x="0" y="135" fill="#e2e8f0" font-size="13" text-anchor="middle">창업주 별세</text>
    <text x="0" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">78세</text>

    <!-- 2. 2020~2023 상속세 -->
    <circle cx="260" cy="80" r="10" fill="#fbbf24"/>
    <text x="260" y="50" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">2020~2023</text>
    <text x="260" y="115" fill="#e2e8f0" font-size="13" text-anchor="middle">상속세 분할</text>
    <text x="260" y="135" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">5,400억</text>
    <text x="260" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">5년 연부연납</text>

    <!-- 3. 2024.01 OCI 합병 -->
    <circle cx="520" cy="80" r="12" fill="#a855f7" stroke="#fff" stroke-width="2"/>
    <text x="520" y="50" fill="#a855f7" font-size="15" font-weight="700" text-anchor="middle">2024.01.12</text>
    <text x="520" y="115" fill="#e2e8f0" font-size="13" text-anchor="middle">OCI 합병 공시</text>
    <text x="520" y="135" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">1.5조</text>
    <text x="520" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">송영숙 회장 주도</text>

    <!-- 4. 2024.02 부결 -->
    <circle cx="680" cy="80" r="12" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <text x="680" y="50" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">2024.02.22</text>
    <text x="680" y="115" fill="#e2e8f0" font-size="13" text-anchor="middle">주총 부결</text>
    <text x="680" y="135" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">합병 무산</text>
    <text x="680" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">임종윤 반대</text>

    <!-- 5. 2024.03~09 분쟁 -->
    <circle cx="840" cy="80" r="10" fill="#fbbf24"/>
    <text x="840" y="50" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">2024.03~09</text>
    <text x="840" y="115" fill="#e2e8f0" font-size="13" text-anchor="middle">경영권 분쟁</text>
    <text x="840" y="135" fill="#94a3b8" font-size="12" text-anchor="middle">송영숙 vs 임종윤</text>
    <text x="840" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">이사회 개편</text>

    <!-- 6. 2025 안착 -->
    <circle cx="1040" cy="80" r="14" fill="#22c55e" stroke="#fff" stroke-width="3"/>
    <text x="1040" y="50" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">2025 ★</text>
    <text x="1040" y="115" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">안착 + 기록</text>
    <text x="1040" y="135" fill="#22c55e" font-size="13" text-anchor="middle">OPM 10.22%</text>
    <text x="1040" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">순이익 +108%</text>
  </g>

  <!-- 이벤트 해석 -->
  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="540" height="170" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="270" y="35" fill="#ef4444" font-size="17" font-weight="700" text-anchor="middle">경제적 결과 — 5년의 할인</text>
    <text x="30" y="70" fill="#e2e8f0" font-size="14">• 주가 2020~2024 지속 할인 (상속세·분쟁 프리미엄 제거)</text>
    <text x="30" y="95" fill="#e2e8f0" font-size="14">• 지분 담보대출 약 1,500억 (유족 현금 확보)</text>
    <text x="30" y="120" fill="#e2e8f0" font-size="14">• 배당 확대로 상속세 재원</text>
    <text x="30" y="145" fill="#94a3b8" font-size="13">→ 2020~2024 주주 신뢰 하락기</text>

    <rect x="560" y="0" width="520" height="170" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="820" y="35" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">2025 회복 신호 3가지</text>
    <text x="580" y="70" fill="#e2e8f0" font-size="14">① 경영권 안착 (송영숙 + 임종윤 진영 분담)</text>
    <text x="580" y="95" fill="#e2e8f0" font-size="14">② 한미약품 #57 레이저티닙 FDA 승인 마일스톤</text>
    <text x="580" y="120" fill="#e2e8f0" font-size="14">③ 지분법이익 0 → 818억 V자 복귀</text>
    <text x="580" y="145" fill="#fbbf24" font-size="13" font-weight="700">→ 3개 조건 동시 충족이 2025 기록 경신의 토대</text>
  </g>

  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="90" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="35" fill="#fbbf24" font-size="16" font-weight="700">한미그룹 승계 구조</text>
    <text x="30" y="65" fill="#e2e8f0" font-size="13">임성기(1940~2020) · 송영숙(배우자) · 임종윤·임주현·임종훈(자녀) 3남 1녀 상속 구조. 한국 상장사 역대 최대 상속세 중 하나.</text>
  </g>

  <text x="60" y="710" fill="#64748b" font-size="12">데이터: DART 공시 (2020~2025) + 언론 보도 · 2026-04-23</text>
</svg>
