<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>록히드마틴 자사주 매입 누적 $30B</title>
  <desc>2010~2024 누적 자사주 매입 약 $30B + 배당 $20B = 주주환원 $50B. 자기자본 $6.7B 작아진 이유.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">자사주 매입 누적 $30B의 회계학</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">매출 $75B 회사가 자기자본 $6.7B만 남은 이유 · 미국 대형주 정형 패턴</text>

  <g transform="translate(60, 150)">
    <!-- 좌측: 주주환원 누적 -->
    <rect x="0" y="0" width="460" height="370" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="230" y="40" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">2010~2024 누적 주주환원</text>

    <!-- 자사주 매입 -->
    <rect x="40" y="80" width="380" height="60" fill="#ef4444" opacity="0.85" rx="6"/>
    <text x="50" y="118" fill="#f1f5f9" font-size="16" font-weight="700">자사주 매입</text>
    <text x="410" y="118" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="end">~$30B</text>

    <!-- 배당 -->
    <rect x="40" y="160" width="253" height="50" fill="#3b82f6" opacity="0.85" rx="6"/>
    <text x="50" y="192" fill="#f1f5f9" font-size="16" font-weight="700">현금 배당</text>
    <text x="410" y="192" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="end">~$20B</text>

    <!-- 합계 -->
    <line x1="40" y1="225" x2="420" y2="225" stroke="#334155" stroke-width="1"/>
    <text x="50" y="260" fill="#fbbf24" font-size="16" font-weight="700">주주환원 합계</text>
    <text x="410" y="260" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="end">~$50B</text>

    <text x="50" y="300" fill="#94a3b8" font-size="13">15년 누적 순이익 ~$55B 중</text>
    <text x="50" y="320" fill="#94a3b8" font-size="13">→ 약 91% 주주환원</text>

    <text x="50" y="355" fill="#ef4444" font-size="13" font-weight="700">자기자본을 깎는 결과</text>

    <!-- 우측: 결과 -->
    <rect x="500" y="0" width="500" height="370" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="750" y="40" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">2025Q4 자본 구조</text>

    <text x="520" y="85" fill="#e2e8f0" font-size="14">자기자본</text>
    <text x="980" y="85" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="end">$6.7B</text>

    <text x="520" y="120" fill="#94a3b8" font-size="12">  매출 $75B의 9% 수준</text>

    <text x="520" y="160" fill="#e2e8f0" font-size="14">순차입금</text>
    <text x="980" y="160" fill="#ef4444" font-size="20" font-weight="700" text-anchor="end">$18.7B</text>

    <text x="520" y="195" fill="#94a3b8" font-size="12">  순차입금/자본 = 279%</text>

    <text x="520" y="235" fill="#e2e8f0" font-size="14">매출/자기자본</text>
    <text x="980" y="235" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="end">11.2배</text>

    <text x="520" y="265" fill="#94a3b8" font-size="12">  한화에어로 1.2배 대비 9배</text>

    <text x="520" y="310" fill="#22c55e" font-size="13" font-weight="700">→ 작은 자본으로 큰 매출</text>
    <text x="520" y="330" fill="#22c55e" font-size="13" font-weight="700">→ ROE 인위적 부양</text>
    <text x="520" y="355" fill="#fbbf24" font-size="13">⚠ 신용등급 하방 압력 상시</text>
  </g>

  <!-- 모델 작동 조건 -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="960" height="160" fill="#0f172a" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#22c55e" font-size="18" font-weight="700">이 자본 모델이 작동하려면</text>

    <text x="30" y="75" fill="#e2e8f0" font-size="14">① 영업이익이 이자비용을 <tspan fill="#22c55e" font-weight="700">3배+ 안정 커버</tspan> → LMT 8.4배 ✅</text>
    <text x="30" y="100" fill="#e2e8f0" font-size="14">② 매출이 <tspan fill="#22c55e" font-weight="700">사이클에 둔감</tspan> → 미국 국방예산 의존 ≈ 안정 수요 ✅</text>
    <text x="30" y="125" fill="#e2e8f0" font-size="14">③ 영업현금흐름 <tspan fill="#22c55e" font-weight="700">순이익 1배+ 지속</tspan> → LMT OCF/NI 1.1~1.7 ✅</text>

    <text x="30" y="150" fill="#fbbf24" font-size="12" font-weight="700">→ 3 조건 충족하는 한 자본 모델 안정. 이자보상 깨지면 즉시 신용등급 BBB → BB로 하향 위험</text>
  </g>

  <text x="60" y="715" fill="#64748b" font-size="12">데이터: 회사 IR 자사주 매입 누계 + dartlab capitalOverview · 2026-04-23</text>
</svg>
