<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>다음 12~24개월 추적 5개 — 록히드마틴</title>
  <desc>OPM 12% 회복·MFC 글로벌 수주·F-35 인도 130대·자사주 매입·신용등급.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">다음 12~24개월 추적 5개</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">2026 OPM 정상화 + 매출 안정성 확인 조건</text>

  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="960" height="90" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="45" r="22" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
    <text x="40" y="52" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="85" y="38" fill="#f1f5f9" font-size="18" font-weight="700">OPM 12% 회복 여부</text>
    <text x="85" y="62" fill="#e2e8f0" font-size="14">2025 10.30% → 2026 12%+ = Sentinel 손실 정상화 확인. 미달 시 cost-plus 구조 한계 확인</text>
    <text x="85" y="82" fill="#fbbf24" font-size="12">→ 분기 10-Q · c.analysis("financial","수익성")</text>

    <rect x="0" y="105" width="960" height="90" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="150" r="22" fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="40" y="157" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="85" y="143" fill="#f1f5f9" font-size="18" font-weight="700">MFC 글로벌 수주 $5B+ 유지</text>
    <text x="85" y="167" fill="#e2e8f0" font-size="14">PAC-3·HIMARS·THAAD 우크라이나·중동·아시아 수출. 연간 신규 수주 $5B+ 유지가 OPM 14~16% 유지의 토대</text>
    <text x="85" y="187" fill="#fbbf24" font-size="12">→ 회사 IR 분기 어닝콜 + DSCA Foreign Military Sales 공지</text>

    <rect x="0" y="210" width="960" height="90" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="255" r="22" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <text x="40" y="262" fill="#3b82f6" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="85" y="248" fill="#f1f5f9" font-size="18" font-weight="700">F-35 인도 대수 연 130대 확대</text>
    <text x="85" y="272" fill="#e2e8f0" font-size="14">2024 110대 → 2026 130대+ 목표. 인플레이션·공급망 정상화 시 Aero 부문 OPM 회복</text>
    <text x="85" y="292" fill="#fbbf24" font-size="12">→ F-35 Joint Program Office 분기 인도 보고</text>

    <rect x="0" y="315" width="960" height="90" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="360" r="22" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <text x="40" y="367" fill="#a855f7" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="85" y="353" fill="#f1f5f9" font-size="18" font-weight="700">자사주 매입 페이스 $6B+ 유지</text>
    <text x="85" y="377" fill="#e2e8f0" font-size="14">2024 $4.5B → 2025 $6B 가이던스. EPS 부양 + 주주 환원 신호. 감액 시 주가 압력</text>
    <text x="85" y="397" fill="#fbbf24" font-size="12">→ 분기 10-Q · 자사주 매입 공시</text>

    <rect x="0" y="420" width="960" height="90" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" rx="8"/>
    <circle cx="40" cy="465" r="22" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="40" y="472" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="85" y="458" fill="#f1f5f9" font-size="18" font-weight="700">신용등급 하방 리스크 (BBB+ → BBB)</text>
    <text x="85" y="482" fill="#e2e8f0" font-size="14">자본 $6.7B 더 줄어들거나 이자보상 5배 이하 하락 시 신용등급 하향 → 차입 비용 상승</text>
    <text x="85" y="502" fill="#fbbf24" font-size="12">→ 무디스/S&P 정기 신용평가 + dartlab dCR 등급 추적</text>
  </g>

  <g transform="translate(60, 690)">
    <text x="0" y="15" fill="#94a3b8" font-size="13">1·2·3이 사업 회복, 4가 주주환원, 5가 재무 리스크. 2026~2027 OPM 12%+ 안착이 핵심 분기점</text>
  </g>
</svg>
