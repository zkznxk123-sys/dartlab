<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>록히드마틴 vs 한국 방산 3사</title>
  <desc>LMT 매출 100조·OPM 10.3% vs 한화에어로 12조·17~24% vs 현대로템·한화오션. 미국 cost-plus vs 한국 fixed-price 차이.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">록히드마틴 vs 한국 방산 3사 — 매출 8배인데 OPM 절반</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">계약 구조 차이가 마진 차이를 만든다 — Cost-Plus vs Fixed-Price</text>

  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="1080" height="50" fill="#1e293b"/>
    <text x="30" y="32" fill="#e2e8f0" font-size="16" font-weight="700">회사</text>
    <text x="380" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">매출 (조)</text>
    <text x="540" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">OPM (%)</text>
    <text x="700" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">계약 구조</text>
    <text x="900" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">주요 시장</text>
    <text x="1050" y="32" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">dCR</text>

    <line x1="0" y1="50" x2="1080" y2="50" stroke="#334155"/>

    <!-- LMT (강조) -->
    <rect x="0" y="50" width="1080" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="30" y="85" fill="#fbbf24" font-size="18" font-weight="700">록히드마틴 (#76)</text>
    <text x="30" y="108" fill="#94a3b8" font-size="13">LMT · NYSE · F-35·HIMARS</text>
    <text x="380" y="100" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">103.6</text>
    <text x="540" y="100" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">10.30</text>
    <text x="700" y="100" fill="#ef4444" font-size="14" text-anchor="middle">Cost-Plus 50~60%</text>
    <text x="900" y="100" fill="#94a3b8" font-size="14" text-anchor="middle">미국 정부 90%</text>
    <text x="1050" y="100" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">BBB+</text>

    <!-- 한화에어로 -->
    <rect x="0" y="130" width="1080" height="80" fill="#0f172a"/>
    <text x="30" y="165" fill="#22c55e" font-size="17" font-weight="700">한화에어로스페이스</text>
    <text x="30" y="188" fill="#94a3b8" font-size="13">012450 · [#07] K9·천궁·우주</text>
    <text x="380" y="180" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">약 12</text>
    <text x="540" y="180" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">17~24</text>
    <text x="700" y="180" fill="#22c55e" font-size="14" text-anchor="middle">Fixed-Price 글로벌</text>
    <text x="900" y="180" fill="#94a3b8" font-size="14" text-anchor="middle">폴란드·UAE·인니</text>
    <text x="1050" y="180" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">A</text>

    <!-- 현대로템 -->
    <rect x="0" y="210" width="1080" height="80" fill="#1e293b"/>
    <text x="30" y="245" fill="#3b82f6" font-size="17" font-weight="700">현대로템</text>
    <text x="30" y="268" fill="#94a3b8" font-size="13">064350 · [#42] K2 전차</text>
    <text x="380" y="260" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">약 5</text>
    <text x="540" y="260" fill="#3b82f6" font-size="20" font-weight="700" text-anchor="middle">17 (방산)</text>
    <text x="700" y="260" fill="#22c55e" font-size="14" text-anchor="middle">Fixed-Price 폴란드</text>
    <text x="900" y="260" fill="#94a3b8" font-size="14" text-anchor="middle">폴란드 · 방산 17%</text>
    <text x="1050" y="260" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">A-</text>

    <!-- 한화오션 -->
    <rect x="0" y="290" width="1080" height="80" fill="#0f172a"/>
    <text x="30" y="325" fill="#a855f7" font-size="17" font-weight="700">한화오션</text>
    <text x="30" y="348" fill="#94a3b8" font-size="13">042660 · [#48] 잠수함·구축함</text>
    <text x="380" y="340" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">약 11</text>
    <text x="540" y="340" fill="#a855f7" font-size="20" font-weight="700" text-anchor="middle">9.1</text>
    <text x="700" y="340" fill="#fbbf24" font-size="14" text-anchor="middle">정부 fixed-price</text>
    <text x="900" y="340" fill="#94a3b8" font-size="14" text-anchor="middle">한국 해군 + 상선</text>
    <text x="1050" y="340" fill="#3b82f6" font-size="17" font-weight="700" text-anchor="middle">A-</text>
  </g>

  <!-- 격차 해석 -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="160" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#fbbf24" font-size="18" font-weight="700">왜 한국 방산이 LMT보다 OPM이 높은가 — 3가지 구조 차이</text>

    <text x="30" y="75" fill="#e2e8f0" font-size="14">① <tspan fill="#22c55e" font-weight="700">계약 구조</tspan>: LMT cost-plus 50~60% (마진 캡 8~12%) vs 한국 방산 fixed-price 글로벌 수출 비중 큼</text>
    <text x="30" y="100" fill="#e2e8f0" font-size="14">② <tspan fill="#22c55e" font-weight="700">가격 자유도</tspan>: 한국 방산은 폴란드 K9·K2 같은 글로벌 입찰에서 단가 자유 책정. 단가 1.3배 책정 가능</text>
    <text x="30" y="125" fill="#e2e8f0" font-size="14">③ <tspan fill="#22c55e" font-weight="700">R&amp;D 부담</tspan>: 한국 방산은 방위사업청 정부 R&amp;D 지원, LMT는 자체 R&amp;D $1.5~2B/년 부담</text>

    <text x="30" y="155" fill="#94a3b8" font-size="12">→ 다만 LMT는 매출 8배·수주잔고 $176B 절대 안정성으로 다른 차원에서 작동</text>
  </g>

  <text x="60" y="710" fill="#64748b" font-size="12">데이터: 각 블로그 #07·#42·#48 검증표 + LMT EDGAR · 2026-04-23</text>
</svg>
