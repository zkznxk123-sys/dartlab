<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>록히드마틴 OPM 9년 — 12.59% → 9.87% → 10.30%</title>
  <desc>2024 Sentinel ICBM 손실 $1.7B로 OPM 사상 최저급 추락. 2025 부분 회복. 한화에어로 OPM 24%의 절반.</desc>

  <text x="60" y="70" fill="#f1f5f9" font-size="30" font-weight="700">록히드마틴 OPM 9년 — 14% → 10%</text>
  <text x="60" y="105" fill="#94a3b8" font-size="17">매출 $75B 사상 최대인데 영업이익률은 한화에어로 24%의 절반</text>

  <g transform="translate(80, 170)">
    <line x1="0" y1="340" x2="1040" y2="340" stroke="#334155"/>
    <text x="-15" y="0" fill="#3b82f6" font-size="12" text-anchor="end">$80B</text>
    <text x="-15" y="85" fill="#3b82f6" font-size="12" text-anchor="end">$60B</text>
    <text x="-15" y="170" fill="#3b82f6" font-size="12" text-anchor="end">$40B</text>
    <text x="-15" y="255" fill="#3b82f6" font-size="12" text-anchor="end">$20B</text>
    <text x="-15" y="340" fill="#3b82f6" font-size="12" text-anchor="end">0</text>

    <text x="1055" y="0" fill="#fbbf24" font-size="12">20%</text>
    <text x="1055" y="85" fill="#fbbf24" font-size="12">15%</text>
    <text x="1055" y="170" fill="#fbbf24" font-size="12">10%</text>
    <text x="1055" y="255" fill="#fbbf24" font-size="12">5%</text>
    <text x="1055" y="340" fill="#fbbf24" font-size="12">0</text>

    <!-- 매출 바 (9년) — 43.9, 37.5, 59.8, 65.4, 67.0, 66.0, 67.6, 71.0, 75.0 ($B) -->
    <g font-size="11" font-weight="700">
      <rect x="30" y="153" width="85" height="187" fill="#3b82f6" opacity="0.85"/>
      <text x="72" y="145" fill="#3b82f6" text-anchor="middle">$43.9</text>
      <text x="72" y="362" fill="#94a3b8" text-anchor="middle">2017</text>

      <rect x="145" y="180" width="85" height="160" fill="#3b82f6" opacity="0.7"/>
      <text x="187" y="172" fill="#3b82f6" text-anchor="middle">$37.5</text>
      <text x="187" y="362" fill="#94a3b8" text-anchor="middle">2018*</text>

      <rect x="260" y="86" width="85" height="254" fill="#3b82f6" opacity="0.85"/>
      <text x="302" y="78" fill="#3b82f6" text-anchor="middle">$59.8</text>
      <text x="302" y="362" fill="#94a3b8" text-anchor="middle">2019</text>

      <rect x="375" y="62" width="85" height="278" fill="#3b82f6" opacity="0.85"/>
      <text x="417" y="54" fill="#3b82f6" text-anchor="middle">$65.4</text>
      <text x="417" y="362" fill="#94a3b8" text-anchor="middle">2020</text>

      <rect x="490" y="55" width="85" height="285" fill="#3b82f6" opacity="0.85"/>
      <text x="532" y="47" fill="#3b82f6" text-anchor="middle">$67.0</text>
      <text x="532" y="362" fill="#94a3b8" text-anchor="middle">2021</text>

      <rect x="605" y="60" width="85" height="280" fill="#3b82f6" opacity="0.85"/>
      <text x="647" y="52" fill="#3b82f6" text-anchor="middle">$66.0</text>
      <text x="647" y="362" fill="#94a3b8" text-anchor="middle">2022</text>

      <rect x="720" y="53" width="85" height="287" fill="#3b82f6" opacity="0.85"/>
      <text x="762" y="45" fill="#3b82f6" text-anchor="middle">$67.6</text>
      <text x="762" y="362" fill="#94a3b8" text-anchor="middle">2023</text>

      <rect x="835" y="38" width="85" height="302" fill="#ef4444" opacity="0.7"/>
      <text x="877" y="30" fill="#ef4444" text-anchor="middle">$71.0</text>
      <text x="877" y="362" fill="#ef4444" text-anchor="middle">2024 ★</text>

      <rect x="950" y="21" width="85" height="319" fill="#22c55e" opacity="0.9"/>
      <text x="992" y="13" fill="#22c55e" font-size="13" text-anchor="middle">$75.0</text>
      <text x="992" y="362" fill="#22c55e" text-anchor="middle">2025</text>
    </g>

    <!-- OPM 선 — 13.49, 19.57, 14.29, 13.22, 13.61, 12.65, 12.59, 9.87, 10.30 -->
    <!-- 2018 19.57은 회계 변경 노이즈 — 라벨에 표기 -->
    <!-- y = 340 - (opm/20)*340 -->
    <polyline points="72,111 187,8 302,97 417,115 532,109 647,125 762,126 877,172 992,165" fill="none" stroke="#ef4444" stroke-width="4"/>
    <g font-size="12" font-weight="700">
      <circle cx="72" cy="111" r="5" fill="#ef4444"/>
      <text x="72" y="103" fill="#ef4444" text-anchor="middle">13.49%</text>
      <circle cx="302" cy="97" r="6" fill="#fbbf24"/>
      <text x="302" y="89" fill="#fbbf24" text-anchor="middle">14.29%</text>
      <circle cx="877" cy="172" r="9" fill="#ef4444" stroke="#fff" stroke-width="2"/>
      <text x="877" y="190" fill="#ef4444" text-anchor="middle">9.87% ★Sentinel</text>
      <circle cx="992" cy="165" r="9" fill="#22c55e" stroke="#fff" stroke-width="2"/>
      <text x="992" y="155" fill="#22c55e" text-anchor="middle">10.30%</text>
    </g>
  </g>

  <g transform="translate(80, 580)">
    <rect x="0" y="0" width="18" height="18" fill="#3b82f6"/>
    <text x="28" y="14" fill="#e2e8f0" font-size="14">매출 ($B)</text>
    <rect x="180" y="8" width="24" height="3" fill="#ef4444"/>
    <text x="214" y="14" fill="#e2e8f0" font-size="14">영업이익률 (%)</text>
    <text x="380" y="14" fill="#94a3b8" font-size="12">* 2018 ASC 606 회계 변경 영향</text>
  </g>

  <g transform="translate(80, 620)">
    <rect x="0" y="0" width="1040" height="70" fill="#1e293b" stroke="#fbbf24" stroke-width="2" rx="8"/>
    <text x="20" y="30" fill="#fbbf24" font-size="16" font-weight="700">2024 Sentinel ICBM 손실 $1.7B → OPM -2.72%p 추락</text>
    <text x="20" y="55" fill="#94a3b8" font-size="13">9년 누적 매출 +71% (CAGR 6.9%) 안정 성장하지만 OPM은 2019 14.29% 정점 후 하향 추세</text>
  </g>
  <text x="80" y="710" fill="#64748b" font-size="12">데이터: dartlab c.select("IS") + marginWaterfall · EDGAR companyfacts · 2026-04-23</text>
</svg>
