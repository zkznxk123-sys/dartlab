<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" style="background:#0a0e1a;font-family:-apple-system,'Segoe UI',sans-serif">
  <title>록히드마틴 4개 사업부 — Aero·MFC·RMS·Space</title>
  <desc>2024 매출 비중·OPM. Aero 40%·OPM 9~10% / MFC 18%·OPM 14~16% / RMS 25%·OPM 8~10% / Space 17%·OPM 7~9%.</desc>

  <text x="60" y="65" fill="#f1f5f9" font-size="28" font-weight="700">4개 사업부 — 매출 비중과 OPM 차이</text>
  <text x="60" y="98" fill="#94a3b8" font-size="16">2024 기준 · MFC가 OPM 14~16%로 최고 (HIMARS·PAC-3 글로벌 수출)</text>

  <g transform="translate(60, 150)">
    <!-- Aeronautics -->
    <rect x="0" y="0" width="270" height="280" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>
    <text x="135" y="40" fill="#3b82f6" font-size="18" font-weight="700" text-anchor="middle">① Aeronautics (항공)</text>
    <text x="135" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">매출 $28.6B · 비중 40.3%</text>
    <text x="135" y="120" fill="#fbbf24" font-size="40" font-weight="700" text-anchor="middle">9~10%</text>
    <text x="135" y="148" fill="#94a3b8" font-size="13" text-anchor="middle">OPM (사업부)</text>

    <text x="20" y="195" fill="#e2e8f0" font-size="13">• F-35 Lightning II</text>
    <text x="20" y="220" fill="#e2e8f0" font-size="13">• F-22 Raptor</text>
    <text x="20" y="245" fill="#e2e8f0" font-size="13">• F-16 · C-130J</text>
    <text x="20" y="270" fill="#3b82f6" font-size="12" font-weight="700">→ Cost-Plus 비중 큼</text>

    <!-- MFC (강조) -->
    <rect x="290" y="0" width="270" height="280" fill="#1e293b" stroke="#22c55e" stroke-width="2.5" rx="10"/>
    <text x="425" y="40" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">② MFC (미사일·화기)</text>
    <text x="425" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">매출 $12.5B · 비중 17.6%</text>
    <text x="425" y="120" fill="#22c55e" font-size="40" font-weight="700" text-anchor="middle">14~16%</text>
    <text x="425" y="148" fill="#94a3b8" font-size="13" text-anchor="middle">OPM 사업부 최고</text>

    <text x="310" y="195" fill="#e2e8f0" font-size="13">• PAC-3 (Patriot 요격)</text>
    <text x="310" y="220" fill="#e2e8f0" font-size="13">• HIMARS · ATACMS</text>
    <text x="310" y="245" fill="#e2e8f0" font-size="13">• THAAD · Javelin</text>
    <text x="310" y="270" fill="#22c55e" font-size="12" font-weight="700">→ Fixed-Price 글로벌 수출</text>

    <!-- RMS -->
    <rect x="580" y="0" width="270" height="280" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
    <text x="715" y="40" fill="#a855f7" font-size="18" font-weight="700" text-anchor="middle">③ RMS (회전·통합)</text>
    <text x="715" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">매출 $17.6B · 비중 24.8%</text>
    <text x="715" y="120" fill="#fbbf24" font-size="40" font-weight="700" text-anchor="middle">8~10%</text>
    <text x="715" y="148" fill="#94a3b8" font-size="13" text-anchor="middle">OPM (사업부)</text>

    <text x="600" y="195" fill="#e2e8f0" font-size="13">• Sikorsky 블랙호크</text>
    <text x="600" y="220" fill="#e2e8f0" font-size="13">• 시호크 (해군)</text>
    <text x="600" y="245" fill="#e2e8f0" font-size="13">• Aegis · 레이더</text>
    <text x="600" y="270" fill="#a855f7" font-size="12" font-weight="700">→ Sentinel 손실 영향</text>

    <!-- Space -->
    <rect x="870" y="0" width="270" height="280" fill="#1e293b" stroke="#ef4444" stroke-width="2" rx="10"/>
    <text x="1005" y="40" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">④ Space (우주)</text>
    <text x="1005" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">매출 $12.4B · 비중 17.4%</text>
    <text x="1005" y="120" fill="#ef4444" font-size="40" font-weight="700" text-anchor="middle">7~9%</text>
    <text x="1005" y="148" fill="#94a3b8" font-size="13" text-anchor="middle">OPM 사업부 최저</text>

    <text x="890" y="195" fill="#e2e8f0" font-size="13">• Orion (NASA Artemis)</text>
    <text x="890" y="220" fill="#e2e8f0" font-size="13">• GPS III/IIIF</text>
    <text x="890" y="245" fill="#e2e8f0" font-size="13">• AEHF · SBIRS</text>
    <text x="890" y="270" fill="#ef4444" font-size="12" font-weight="700">→ R&D·개발 부담</text>
  </g>

  <!-- 가중평균 해석 -->
  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="1080" height="160" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="10"/>
    <text x="30" y="40" fill="#fbbf24" font-size="18" font-weight="700">전체 OPM 10.30%의 가중평균 산수</text>

    <text x="30" y="80" fill="#e2e8f0" font-size="14">Aero (40% × 9.5%) + MFC (18% × 15%) + RMS (25% × 9%) + Space (17% × 8%) ≈ 10.5%</text>
    <text x="30" y="110" fill="#94a3b8" font-size="13">• MFC 사업부가 OPM을 끌어올리는 핵심 — HIMARS 우크라이나·PAC-3 중동 수출 폭증으로 마진 안정</text>
    <text x="30" y="135" fill="#94a3b8" font-size="13">• Aero(40%)가 cost-plus F-35 비중 커서 마진 캡 → 전체 OPM 상한 결정</text>
  </g>

  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="1080" height="55" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="20" y="35" fill="#22c55e" font-size="14" font-weight="700">→ MFC 비중 확대 (글로벌 수주 증가) 시 전체 OPM 12%대 회복 가능 — 2026 추적 1순위</text>
  </g>

  <text x="60" y="710" fill="#64748b" font-size="12">데이터: 회사 10-K item7Mdna 부문별 정보 + dartlab c.show("10-K::item7Mdna") · 2026-04-23</text>
</svg>
