<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700">AI 전력 슈퍼사이클 — 전력기기 4사 포지셔닝</text>
  <text x="600" y="82" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">같은 수요, 다른 마진. 변압기 · 배전반 · 차단기 · 권선의 구조적 차이</text>

  <!-- Y-axis label -->
  <text x="30" y="400" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" transform="rotate(-90, 30, 400)">영업이익률 (OPM %)</text>

  <!-- X-axis label -->
  <text x="600" y="695" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">매출 (조원, 2025)</text>

  <!-- Grid -->
  <line x1="100" y1="120" x2="100" y2="640" stroke="#1e2433" stroke-width="1"/>
  <line x1="100" y1="640" x2="1100" y2="640" stroke="#1e2433" stroke-width="1"/>

  <!-- Y grid lines -->
  <line x1="100" y1="536" x2="1100" y2="536" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="540" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">5%</text>
  <line x1="100" y1="432" x2="1100" y2="432" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="436" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">10%</text>
  <line x1="100" y1="328" x2="1100" y2="328" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="332" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">15%</text>
  <line x1="100" y1="224" x2="1100" y2="224" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="228" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">20%</text>
  <line x1="100" y1="120" x2="1100" y2="120" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="124" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">25%</text>

  <!-- X grid labels -->
  <text x="267" y="660" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2조</text>
  <text x="433" y="660" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">3조</text>
  <text x="600" y="660" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">4조</text>
  <text x="767" y="660" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">5조</text>
  <text x="933" y="660" text-anchor="middle" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">6조</text>

  <!-- HD현대일렉트릭: 매출 4.08조, OPM 24.4% -->
  <circle cx="580" cy="132" r="38" fill="#ea4647" fill-opacity="0.2" stroke="#ea4647" stroke-width="2"/>
  <text x="580" y="128" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">HD현대</text>
  <text x="580" y="144" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">일렉트릭</text>
  <text x="580" y="92" text-anchor="middle" fill="#ea4647" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">OPM 24.4%</text>
  <text x="580" y="186" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">변압기 | PER 61배</text>

  <!-- 효성중공업: 매출 5.97조, OPM 12.5% -->
  <circle cx="893" cy="380" r="42" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
  <text x="893" y="376" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">효성</text>
  <text x="893" y="392" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">중공업</text>
  <text x="893" y="340" text-anchor="middle" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">OPM 12.5%</text>
  <text x="893" y="436" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">차단기+건설 | PER 64배</text>

  <!-- LS전기: 매출 4.97조, OPM 8.6% -->
  <circle cx="760" cy="461" r="36" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="760" y="465" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">LS전기</text>
  <text x="760" y="425" text-anchor="middle" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">OPM 8.6%</text>
  <text x="760" y="505" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">배전반 | PER 119배</text>

  <!-- 일진전기: 매출 2.04조, OPM 7.4% -->
  <circle cx="273" cy="486" r="30" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="273" y="490" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700">일진전기</text>
  <text x="273" y="450" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="700">OPM 7.4%</text>
  <text x="273" y="524" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">권선·부품 | PER 44배</text>

  <!-- Insight box -->
  <rect x="130" y="580" width="380" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="320" y="607" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">변압기 공급 병목 → 단가 인상 → 마진 독주</text>
</svg>