<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="600" y="48" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700">OPM 궤적 — 7년간 무슨 일이 일어났나</text>
  <text x="600" y="76" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">HD현대일렉트릭만 꺾어 올라간다. 나머지 3사는 완만 상승 또는 횡보.</text>

  <!-- Legend -->
  <circle cx="200" cy="108" r="6" fill="#ea4647"/>
  <text x="214" y="112" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">HD현대일렉트릭</text>
  <circle cx="380" cy="108" r="6" fill="#f59e0b"/>
  <text x="394" y="112" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">효성중공업</text>
  <circle cx="520" cy="108" r="6" fill="#3b82f6"/>
  <text x="534" y="112" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">LS전기</text>
  <circle cx="630" cy="108" r="6" fill="#22c55e"/>
  <text x="644" y="112" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">일진전기</text>

  <!-- Chart area: x=100-1100, y=140-620 -->
  <!-- Y: -10% to 25%, range 35pp, 1pp = 13.7px -->
  <!-- X: 2019-2025, 7 years, gap = 142.8px -->
  <!-- y(opm) = 620 - (opm + 10) * 13.7 -->

  <!-- Grid lines -->
  <line x1="100" y1="620" x2="1100" y2="620" stroke="#1e2433" stroke-width="1"/>
  <line x1="100" y1="140" x2="100" y2="620" stroke="#1e2433" stroke-width="1"/>

  <!-- 0% line -->
  <line x1="100" y1="483" x2="1100" y2="483" stroke="#475569" stroke-width="0.5" stroke-dasharray="6"/>
  <text x="85" y="487" text-anchor="end" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">0%</text>

  <!-- 10% -->
  <line x1="100" y1="346" x2="1100" y2="346" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="350" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">10%</text>

  <!-- 20% -->
  <line x1="100" y1="209" x2="1100" y2="209" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="213" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">20%</text>

  <!-- -5% -->
  <line x1="100" y1="551" x2="1100" y2="551" stroke="#1e2433" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="85" y="555" text-anchor="end" fill="#475569" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">-5%</text>

  <!-- X labels -->
  <text x="172" y="645" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2019</text>
  <text x="314" y="645" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2020</text>
  <text x="457" y="645" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2021</text>
  <text x="600" y="645" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2022</text>
  <text x="743" y="645" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2023</text>
  <text x="886" y="645" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2024</text>
  <text x="1028" y="645" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">2025</text>

  <!-- HD현대일렉트릭: -8.85, 4.01, 0.54, 6.32, 11.66, 20.14, 24.40 -->
  <polyline points="172,604 314,428 457,475 600,396 743,323 886,207 1028,163" fill="none" stroke="#ea4647" stroke-width="3"/>
  <circle cx="172" cy="604" r="4" fill="#ea4647"/>
  <circle cx="314" cy="428" r="4" fill="#ea4647"/>
  <circle cx="457" cy="475" r="4" fill="#ea4647"/>
  <circle cx="600" cy="396" r="4" fill="#ea4647"/>
  <circle cx="743" cy="323" r="4" fill="#ea4647"/>
  <circle cx="886" cy="207" r="4" fill="#ea4647"/>
  <circle cx="1028" cy="163" r="5" fill="#ea4647"/>
  <text x="1040" y="155" fill="#ea4647" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">24.4%</text>
  <text x="160" y="618" fill="#ea4647" font-family="'JetBrains Mono', monospace" font-size="11">-8.9%</text>

  <!-- 효성중공업: 3.44, 1.48, 3.88, 4.62, 6.0, 7.41, 12.52 -->
  <polyline points="172,436 314,461 457,430 600,420 743,401 886,381 1028,311" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="1028" cy="311" r="5" fill="#f59e0b"/>
  <text x="1040" y="303" fill="#f59e0b" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">12.5%</text>

  <!-- LS전기: 7.18, 5.57, 5.81, 5.55, 7.68, 8.56, 8.59 -->
  <polyline points="172,385 314,407 457,403 600,407 743,378 886,366 1028,365" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <circle cx="1028" cy="365" r="5" fill="#3b82f6"/>
  <text x="1040" y="357" fill="#3b82f6" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">8.6%</text>

  <!-- 일진전기: 1.71, 1.95, 2.19, 2.70, 4.87, 5.06, 7.40 -->
  <polyline points="172,460 314,457 457,453 600,446 743,416 886,414 1028,381" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="1028" cy="381" r="5" fill="#22c55e"/>
  <text x="1040" y="373" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700">7.4%</text>

  <!-- Annotation: HD turning point -->
  <rect x="560" y="260" width="230" height="36" rx="4" fill="#1e293b" stroke="#ea4647" stroke-width="1" stroke-opacity="0.5"/>
  <text x="675" y="282" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">2022 → 2025: OPM 6% → 24%</text>
  <line x1="675" y1="296" x2="743" y2="323" stroke="#ea4647" stroke-width="1" stroke-dasharray="3"/>
</svg>