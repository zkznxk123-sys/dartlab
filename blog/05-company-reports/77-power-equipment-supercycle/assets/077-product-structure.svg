<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="600" y="48" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700">왜 변압기 마진이 높은가 — 제품 구조 비교</text>
  <text x="600" y="76" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">진입 장벽 × 단가 × 경쟁 강도가 마진을 결정한다</text>

  <!-- HD현대일렉트릭 -->
  <rect x="60" y="120" width="260" height="320" rx="12" fill="#1e293b" stroke="#ea4647" stroke-width="2"/>
  <text x="190" y="155" text-anchor="middle" fill="#ea4647" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">HD현대일렉트릭</text>
  <text x="190" y="178" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700">OPM 24.4%</text>

  <text x="80" y="210" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">핵심 제품</text>
  <text x="80" y="232" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">초고압 변압기 (345kV+)</text>

  <line x1="80" y1="250" x2="300" y2="250" stroke="#334155" stroke-width="1"/>

  <text x="80" y="275" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">진입 장벽</text>
  <text x="80" y="295" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">전세계 공장 수십 곳뿐</text>
  <text x="80" y="313" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">신규 진입 3~5년 + 인증 2년</text>

  <text x="80" y="340" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">단가</text>
  <text x="80" y="360" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">대형 1대 수십억 원</text>
  <text x="80" y="378" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">리드타임 24~36개월</text>

  <text x="80" y="405" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">가격 결정권</text>
  <text x="80" y="425" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">공급자 우위 (병목)</text>

  <!-- LS전기 -->
  <rect x="340" y="120" width="260" height="320" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="470" y="155" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">LS전기</text>
  <text x="470" y="178" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700">OPM 8.6%</text>

  <text x="360" y="210" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">핵심 제품</text>
  <text x="360" y="232" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">배전반 · 자동화 장비</text>

  <line x1="360" y1="250" x2="580" y2="250" stroke="#334155" stroke-width="1"/>

  <text x="360" y="275" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">진입 장벽</text>
  <text x="360" y="295" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">다수 경쟁사 존재</text>
  <text x="360" y="313" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">다품종 소량 생산</text>

  <text x="360" y="340" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">단가</text>
  <text x="360" y="360" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">변압기 대비 낮은 단가</text>
  <text x="360" y="378" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">고객별 맞춤 사양</text>

  <text x="360" y="405" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">가격 결정권</text>
  <text x="360" y="425" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">구매자 우위 (EPC)</text>

  <!-- 효성중공업 -->
  <rect x="620" y="120" width="260" height="320" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="155" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">효성중공업</text>
  <text x="750" y="178" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700">OPM 12.5%</text>

  <text x="640" y="210" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">핵심 제품</text>
  <text x="640" y="232" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">차단기 + 건설 사업</text>

  <line x1="640" y1="250" x2="860" y2="250" stroke="#334155" stroke-width="1"/>

  <text x="640" y="275" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">진입 장벽</text>
  <text x="640" y="295" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">전력기기 중간 수준</text>
  <text x="640" y="313" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">건설은 저마진 사업</text>

  <text x="640" y="340" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">단가</text>
  <text x="640" y="360" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">차단기 중단가</text>
  <text x="640" y="378" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">건설 혼합 = 마진 희석</text>

  <text x="640" y="405" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">가격 결정권</text>
  <text x="640" y="425" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">혼합 (사업별 상이)</text>

  <!-- 일진전기 -->
  <rect x="900" y="120" width="260" height="320" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="1030" y="155" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">일진전기</text>
  <text x="1030" y="178" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700">OPM 7.4%</text>

  <text x="920" y="210" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">핵심 제품</text>
  <text x="920" y="232" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600">권선 · 변압기 부품</text>

  <line x1="920" y1="250" x2="1140" y2="250" stroke="#334155" stroke-width="1"/>

  <text x="920" y="275" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">진입 장벽</text>
  <text x="920" y="295" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">부품 = 상대적 낮음</text>
  <text x="920" y="313" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">완제품 기업 종속</text>

  <text x="920" y="340" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">단가</text>
  <text x="920" y="360" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">부품 단가 (가장 낮음)</text>
  <text x="920" y="378" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">매출 CAGR 88% 최고</text>

  <text x="920" y="405" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">가격 결정권</text>
  <text x="920" y="425" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">완제품 기업에 종속</text>

  <!-- Bottom insight -->
  <rect x="60" y="480" width="1080" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="510" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">핵심 판단</text>
  <text x="600" y="535" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">공급 병목이 심할수록, 단가가 높을수록, 경쟁이 적을수록 마진이 높다. 변압기 &gt; 차단기 &gt; 배전반 &gt; 부품.</text>

  <!-- Flow arrows bottom -->
  <text x="600" y="600" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">진입 장벽 ↑ · 단가 ↑ · 경쟁 ↓ → OPM ↑</text>

  <!-- Risk section -->
  <rect x="60" y="640" width="530" height="150" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="325" y="670" text-anchor="middle" fill="#ef4444" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">부채 · 재무 위험 비교</text>
  <text x="80" y="700" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">부채비율</text>
  <text x="250" y="700" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12">HD 135% | LS 132% | 효성 190% | 일진 159%</text>
  <text x="80" y="725" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">이자보상배율</text>
  <text x="250" y="725" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12">HD 3.0x | LS 1.7x | 효성 1.3x | 일진 7.5x</text>
  <text x="80" y="750" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">위험등급</text>
  <text x="250" y="750" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="12"><tspan fill="#22c55e">HD 안전</tspan> | <tspan fill="#f59e0b">LS 주의</tspan> | <tspan fill="#f59e0b">효성 주의</tspan> | <tspan fill="#f59e0b">일진 주의</tspan></text>

  <!-- Valuation warning -->
  <rect x="610" y="640" width="530" height="150" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.4"/>
  <text x="875" y="670" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">밸류에이션 과열 경고</text>
  <text x="630" y="700" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">4사 모두 dartlab 등급 "과열"</text>
  <text x="630" y="725" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13">PER 44~119배 — 성장 기대가 이미 가격에 반영</text>
  <text x="630" y="750" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">LS전기 PER 119배: OPM 8.6%에 가장 높은 기대</text>
</svg>