<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#0a0e1a"/>

  <text x="600" y="48" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700">매출 성장 비교 — 누가 가장 빨리 컸나</text>
  <text x="600" y="76" text-anchor="middle" fill="#64748b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14">2019 → 2025 매출 (조원) 및 CAGR</text>

  <!-- Chart area: 4 company pairs, x=120~1080 -->
  <!-- Each company block: 220px wide, gap 20px -->

  <!-- HD현대일렉트릭 -->
  <rect x="140" y="130" width="220" height="420" rx="10" fill="#1e293b" stroke="#ea4647" stroke-width="1.5"/>
  <text x="250" y="162" text-anchor="middle" fill="#ea4647" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">HD현대일렉트릭</text>

  <!-- 2019 bar -->
  <rect x="170" y="320" width="80" height="96" rx="4" fill="#334155"/>
  <text x="210" y="312" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2019</text>
  <text x="210" y="370" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">1.77조</text>

  <!-- 2025 bar -->
  <rect x="260" y="196" width="80" height="220" rx="4" fill="#ea4647" fill-opacity="0.7"/>
  <text x="300" y="188" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025</text>
  <text x="300" y="310" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">4.08조</text>

  <!-- CAGR -->
  <text x="250" y="450" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">CAGR 15%</text>
  <text x="250" y="475" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">×2.3배</text>

  <!-- 매출 성장 화살표 -->
  <line x1="215" y1="340" x2="260" y2="280" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 효성중공업 -->
  <rect x="380" y="130" width="220" height="420" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="162" text-anchor="middle" fill="#f59e0b" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">효성중공업</text>

  <rect x="410" y="256" width="80" height="160" rx="4" fill="#334155"/>
  <text x="450" y="248" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2019</text>
  <text x="450" y="340" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">3.69조</text>

  <rect x="500" y="196" width="80" height="220" rx="4" fill="#f59e0b" fill-opacity="0.7"/>
  <text x="540" y="188" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025</text>
  <text x="540" y="310" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">5.97조</text>

  <text x="490" y="450" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">CAGR 8%</text>
  <text x="490" y="475" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">×1.6배</text>

  <!-- LS전기 -->
  <rect x="620" y="130" width="220" height="420" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="730" y="162" text-anchor="middle" fill="#3b82f6" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">LS전기</text>

  <rect x="650" y="280" width="80" height="136" rx="4" fill="#334155"/>
  <text x="690" y="272" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2019</text>
  <text x="690" y="352" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">2.87조</text>

  <rect x="740" y="204" width="80" height="212" rx="4" fill="#3b82f6" fill-opacity="0.7"/>
  <text x="780" y="196" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025</text>
  <text x="780" y="314" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">4.97조</text>

  <text x="730" y="450" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">CAGR 10%</text>
  <text x="730" y="475" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">×1.7배</text>

  <!-- 일진전기 -->
  <rect x="860" y="130" width="220" height="420" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="970" y="162" text-anchor="middle" fill="#22c55e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700">일진전기</text>

  <rect x="890" y="376" width="80" height="40" rx="4" fill="#334155"/>
  <text x="930" y="368" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2019</text>
  <text x="930" y="400" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">0.76조</text>

  <rect x="980" y="296" width="80" height="120" rx="4" fill="#22c55e" fill-opacity="0.7"/>
  <text x="1020" y="288" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11">2025</text>
  <text x="1020" y="360" text-anchor="middle" fill="#f1f5f9" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="600">2.04조</text>

  <text x="970" y="450" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">CAGR 18%</text>
  <text x="970" y="475" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12">×2.7배</text>

  <!-- Bottom insight -->
  <rect x="120" y="560" width="960" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="585" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600">일진전기가 가장 빠르게 성장했지만(×2.7배), OPM은 가장 낮다(7.4%). 성장 ≠ 마진.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>
</svg>