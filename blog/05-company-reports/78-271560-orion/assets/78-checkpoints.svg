<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">오리온 2026 체크포인트</title>
  <desc id="desc">오리온을 2026년에 볼 때 확인할 핵심 지표 5가지</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">2026년에 봐야 할 5개 지표</text>
  <text x="64" y="108" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">오리온의 관통선은 해외 현지화가 마진 천장을 계속 깨는가다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="18">
    <rect x="82" y="165" width="916" height="72" rx="8" fill="#111827" stroke="#334155"/>
    <text x="120" y="210" fill="#fbbf24" font-weight="800">1</text><text x="165" y="210" fill="#f1f5f9" font-weight="700">해외 매출 비중 65%대 유지</text>
    <rect x="82" y="255" width="916" height="72" rx="8" fill="#111827" stroke="#334155"/>
    <text x="120" y="300" fill="#fbbf24" font-weight="800">2</text><text x="165" y="300" fill="#f1f5f9" font-weight="700">영업이익률 15%대 방어</text>
    <rect x="82" y="345" width="916" height="72" rx="8" fill="#111827" stroke="#334155"/>
    <text x="120" y="390" fill="#fbbf24" font-weight="800">3</text><text x="165" y="390" fill="#f1f5f9" font-weight="700">러시아 공급 부족 해소와 CAPA 확장</text>
    <rect x="82" y="435" width="916" height="72" rx="8" fill="#111827" stroke="#334155"/>
    <text x="120" y="480" fill="#fbbf24" font-weight="800">4</text><text x="165" y="480" fill="#f1f5f9" font-weight="700">영업현금흐름 5천억대 유지</text>
    <rect x="82" y="525" width="916" height="72" rx="8" fill="#111827" stroke="#334155"/>
    <text x="120" y="570" fill="#fbbf24" font-weight="800">5</text><text x="165" y="570" fill="#f1f5f9" font-weight="700">투자활동현금흐름이 매출 성장으로 회수되는지</text>
  </g>
</svg>
