<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">오리온 해외 국가별 역할</title>
  <desc id="desc">중국, 베트남, 러시아, 인도가 오리온 해외 성장에서 맡는 역할</desc>
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="72" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">해외 비중 65%대는 한 덩어리가 아니다</text>
  <text x="72" y="108" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">중국은 기반, 베트남은 선물, 러시아는 공급 부족, 인도는 옵션</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="80" y="185" width="245" height="330" rx="8" fill="#111827" stroke="#3b82f6"/>
    <text x="202" y="235" fill="#f1f5f9" font-size="28" font-weight="800" text-anchor="middle">중국</text>
    <text x="202" y="285" fill="#60a5fa" font-size="20" font-weight="800" text-anchor="middle">규모의 기반</text>
    <text x="202" y="335" fill="#cbd5e1" font-size="16" text-anchor="middle">오랜 현지 법인</text>
    <text x="202" y="370" fill="#cbd5e1" font-size="16" text-anchor="middle">대형 유통망</text>
    <text x="202" y="405" fill="#cbd5e1" font-size="16" text-anchor="middle">성장 둔화 방어</text>
    <rect x="355" y="185" width="245" height="330" rx="8" fill="#111827" stroke="#22c55e"/>
    <text x="477" y="235" fill="#f1f5f9" font-size="28" font-weight="800" text-anchor="middle">베트남</text>
    <text x="477" y="285" fill="#22c55e" font-size="20" font-weight="800" text-anchor="middle">명절·선물 수요</text>
    <text x="477" y="335" fill="#cbd5e1" font-size="16" text-anchor="middle">뗏 소비 영향</text>
    <text x="477" y="370" fill="#cbd5e1" font-size="16" text-anchor="middle">가족 간식 포지션</text>
    <text x="477" y="405" fill="#cbd5e1" font-size="16" text-anchor="middle">반복 구매 기반</text>
    <rect x="630" y="185" width="245" height="330" rx="8" fill="#111827" stroke="#fbbf24"/>
    <text x="752" y="235" fill="#f1f5f9" font-size="28" font-weight="800" text-anchor="middle">러시아</text>
    <text x="752" y="285" fill="#fbbf24" font-size="20" font-weight="800" text-anchor="middle">공급 부족 성장</text>
    <text x="752" y="335" fill="#cbd5e1" font-size="16" text-anchor="middle">초코파이 수요 강함</text>
    <text x="752" y="370" fill="#cbd5e1" font-size="16" text-anchor="middle">생산라인 140%+</text>
    <text x="752" y="405" fill="#cbd5e1" font-size="16" text-anchor="middle">CAPA 확장 포인트</text>
    <rect x="905" y="185" width="245" height="330" rx="8" fill="#111827" stroke="#a78bfa"/>
    <text x="1027" y="235" fill="#f1f5f9" font-size="28" font-weight="800" text-anchor="middle">인도</text>
    <text x="1027" y="285" fill="#a78bfa" font-size="20" font-weight="800" text-anchor="middle">다음 옵션</text>
    <text x="1027" y="335" fill="#cbd5e1" font-size="16" text-anchor="middle">높은 성장률</text>
    <text x="1027" y="370" fill="#cbd5e1" font-size="16" text-anchor="middle">아직 절대 규모 작음</text>
    <text x="1027" y="405" fill="#cbd5e1" font-size="16" text-anchor="middle">10년 확장 후보</text>
  </g>
</svg>
