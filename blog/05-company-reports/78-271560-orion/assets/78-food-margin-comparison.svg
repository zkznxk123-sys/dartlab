<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">식품 4사 영업이익률 비교</title>
  <desc id="desc">오리온, 삼양식품, 농심, 오뚜기의 2025년 영업이익률 비교</desc>
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="70" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">2025 식품 4사 영업이익률</text>
  <text x="70" y="108" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">오리온은 내수 5% 천장과 삼양 폭발 사이의 안정형 고마진</text>
  <g font-family="-apple-system, Segoe UI, sans-serif" transform="translate(120 150)">
    <line x1="0" y1="460" x2="960" y2="460" stroke="#334155"/>
    <line x1="0" y1="0" x2="0" y2="460" stroke="#334155"/>
    <g fill="#64748b" font-size="14">
      <text x="-42" y="465">0%</text><line x1="-6" y1="460" x2="960" y2="460" stroke="#1f2937"/>
      <text x="-48" y="361">5%</text><line x1="-6" y1="356" x2="960" y2="356" stroke="#1f2937"/>
      <text x="-56" y="256">10%</text><line x1="-6" y1="252" x2="960" y2="252" stroke="#1f2937"/>
      <text x="-56" y="152">15%</text><line x1="-6" y1="148" x2="960" y2="148" stroke="#1f2937"/>
      <text x="-56" y="48">20%</text><line x1="-6" y1="44" x2="960" y2="44" stroke="#1f2937"/>
    </g>
    <rect x="60" y="111" width="145" height="349" rx="6" fill="#fbbf24"/>
    <rect x="295" y="0" width="145" height="460" rx="6" fill="#22c55e"/>
    <rect x="530" y="352" width="145" height="108" rx="6" fill="#ef4444"/>
    <rect x="765" y="360" width="145" height="100" rx="6" fill="#f59e0b"/>
    <g text-anchor="middle" font-size="18" font-weight="800">
      <text x="132" y="95" fill="#fbbf24">16.75%</text>
      <text x="367" y="-16" fill="#22c55e">22.29%</text>
      <text x="602" y="334" fill="#ef4444">5.23%</text>
      <text x="837" y="342" fill="#f59e0b">4.82%</text>
    </g>
    <g text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">
      <text x="132" y="505">오리온</text>
      <text x="367" y="505">삼양식품</text>
      <text x="602" y="505">농심</text>
      <text x="837" y="505">오뚜기</text>
    </g>
    <rect x="510" y="385" width="420" height="44" rx="22" fill="#1e293b" stroke="#475569"/>
    <text x="720" y="413" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">내수 식품 5% 천장</text>
  </g>
</svg>
