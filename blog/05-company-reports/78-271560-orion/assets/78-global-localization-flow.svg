<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">오리온 해외 현지화 구조</title>
  <desc id="desc">한국 브랜드가 해외 현지 생산과 유통을 거쳐 현지 식품이 되는 흐름</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="72" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">수출이 아니라 현지화</text>
  <text x="72" y="108" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">오리온의 해외 비중은 컨테이너 수출이 아니라 현지 공장·유통망에서 나온다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="70" y="190" width="220" height="130" rx="8" fill="#111827" stroke="#334155"/>
    <text x="180" y="235" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">한국 브랜드</text>
    <text x="180" y="275" fill="#94a3b8" font-size="16" text-anchor="middle">초코파이 · 포카칩</text>
    <rect x="370" y="160" width="220" height="190" rx="8" fill="#111827" stroke="#fbbf24"/>
    <text x="480" y="205" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">현지 공장</text>
    <text x="480" y="245" fill="#cbd5e1" font-size="16" text-anchor="middle">중국</text>
    <text x="480" y="275" fill="#cbd5e1" font-size="16" text-anchor="middle">베트남</text>
    <text x="480" y="305" fill="#cbd5e1" font-size="16" text-anchor="middle">러시아</text>
    <rect x="670" y="190" width="220" height="130" rx="8" fill="#111827" stroke="#22c55e"/>
    <text x="780" y="235" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">현지 유통</text>
    <text x="780" y="275" fill="#94a3b8" font-size="16" text-anchor="middle">마트 · 소매점 · 명절 선물</text>
    <rect x="970" y="190" width="160" height="130" rx="8" fill="#111827" stroke="#3b82f6"/>
    <text x="1050" y="235" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">현지 식품</text>
    <text x="1050" y="275" fill="#94a3b8" font-size="16" text-anchor="middle">반복 구매</text>
    <path d="M292 255 H362" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M592 255 H662" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M892 255 H962" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="110" y="455" width="980" height="84" rx="8" fill="#172554" stroke="#3b82f6"/>
    <text x="600" y="490" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">마진 효과</text>
    <text x="600" y="522" fill="#cbd5e1" font-size="17" text-anchor="middle">운송비·관세 부담 축소 + 현지 가격대 + 기존 유통망 레버리지 = 15~17% OPM</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker></defs>
</svg>
