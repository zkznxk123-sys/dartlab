<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">오리온 마진 지도</title>
  <desc id="desc">오리온이 내수 식품의 5% 마진 천장을 해외 현지화로 넘어선 구조</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="72" y="72" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="36" font-weight="800">오리온은 왜 식품회사인데 16.75% 마진인가</text>
  <text x="72" y="112" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">내수 식품의 5% 천장과 다른 답: 해외 현지 생산망</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="76" y="180" width="250" height="330" rx="8" fill="#111827" stroke="#334155"/>
    <text x="201" y="220" fill="#f1f5f9" font-size="24" font-weight="800" text-anchor="middle">내수 식품</text>
    <text x="201" y="260" fill="#94a3b8" font-size="16" text-anchor="middle">농심 · 오뚜기</text>
    <text x="201" y="330" fill="#ef4444" font-size="54" font-weight="900" text-anchor="middle">5%</text>
    <text x="201" y="370" fill="#cbd5e1" font-size="16" text-anchor="middle">가격 규제 · 판촉 · 원가 압박</text>
    <text x="201" y="410" fill="#cbd5e1" font-size="16" text-anchor="middle">국내 진열대 경쟁</text>
    <text x="201" y="450" fill="#cbd5e1" font-size="16" text-anchor="middle">마진 방어 어려움</text>
    <rect x="475" y="180" width="250" height="330" rx="8" fill="#111827" stroke="#fbbf24"/>
    <text x="600" y="220" fill="#f1f5f9" font-size="24" font-weight="800" text-anchor="middle">오리온</text>
    <text x="600" y="260" fill="#94a3b8" font-size="16" text-anchor="middle">초코파이 · 포카칩 · 꼬북칩</text>
    <text x="600" y="330" fill="#fbbf24" font-size="54" font-weight="900" text-anchor="middle">16.75%</text>
    <text x="600" y="370" fill="#cbd5e1" font-size="16" text-anchor="middle">중국 · 베트남 · 러시아 공장</text>
    <text x="600" y="410" fill="#cbd5e1" font-size="16" text-anchor="middle">현지 브랜드 + 현지 유통</text>
    <text x="600" y="450" fill="#cbd5e1" font-size="16" text-anchor="middle">판관비 레버리지</text>
    <rect x="874" y="180" width="250" height="330" rx="8" fill="#111827" stroke="#22c55e"/>
    <text x="999" y="220" fill="#f1f5f9" font-size="24" font-weight="800" text-anchor="middle">삼양식품</text>
    <text x="999" y="260" fill="#94a3b8" font-size="16" text-anchor="middle">불닭 글로벌 밈</text>
    <text x="999" y="330" fill="#22c55e" font-size="54" font-weight="900" text-anchor="middle">22.29%</text>
    <text x="999" y="370" fill="#cbd5e1" font-size="16" text-anchor="middle">단일 브랜드 폭발</text>
    <text x="999" y="410" fill="#cbd5e1" font-size="16" text-anchor="middle">고마진 수출 믹스</text>
    <text x="999" y="450" fill="#cbd5e1" font-size="16" text-anchor="middle">CAPEX 동반 성장</text>
    <path d="M332 345 H456" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M730 345 H854" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="248" y="575" width="704" height="62" rx="8" fill="#172554" stroke="#3b82f6"/>
    <text x="600" y="615" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">관통선: 초코파이는 과자가 아니라 해외 생산망이다</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker></defs>
</svg>
