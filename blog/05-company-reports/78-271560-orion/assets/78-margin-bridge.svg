<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">오리온 마진 브리지</title>
  <desc id="desc">매출총이익률 하락에도 판관비 레버리지로 영업이익률을 방어한 구조</desc>
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="72" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">매출총이익률은 내려갔는데 OPM은 버텼다</text>
  <text x="72" y="108" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">2018→2025: 원가 부담을 판관비 레버리지가 흡수</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="92" y="190" width="300" height="300" rx="8" fill="#111827" stroke="#334155"/>
    <text x="242" y="235" fill="#f1f5f9" font-size="24" font-weight="800" text-anchor="middle">2018</text>
    <text x="242" y="310" fill="#22c55e" font-size="48" font-weight="900" text-anchor="middle">45.51%</text>
    <text x="242" y="342" fill="#94a3b8" font-size="16" text-anchor="middle">매출총이익률</text>
    <text x="242" y="410" fill="#fbbf24" font-size="44" font-weight="900" text-anchor="middle">14.64%</text>
    <text x="242" y="442" fill="#94a3b8" font-size="16" text-anchor="middle">영업이익률</text>
    <rect x="450" y="250" width="300" height="180" rx="8" fill="#172554" stroke="#3b82f6"/>
    <text x="600" y="300" fill="#f1f5f9" font-size="24" font-weight="800" text-anchor="middle">중간 변화</text>
    <text x="600" y="342" fill="#cbd5e1" font-size="17" text-anchor="middle">원재료 가격 상승</text>
    <text x="600" y="374" fill="#cbd5e1" font-size="17" text-anchor="middle">해외 법인 매출 확대</text>
    <text x="600" y="406" fill="#cbd5e1" font-size="17" text-anchor="middle">판관비율 축소</text>
    <rect x="808" y="190" width="300" height="300" rx="8" fill="#111827" stroke="#334155"/>
    <text x="958" y="235" fill="#f1f5f9" font-size="24" font-weight="800" text-anchor="middle">2025</text>
    <text x="958" y="310" fill="#f59e0b" font-size="48" font-weight="900" text-anchor="middle">36.71%</text>
    <text x="958" y="342" fill="#94a3b8" font-size="16" text-anchor="middle">매출총이익률</text>
    <text x="958" y="410" fill="#fbbf24" font-size="44" font-weight="900" text-anchor="middle">16.75%</text>
    <text x="958" y="442" fill="#94a3b8" font-size="16" text-anchor="middle">영업이익률</text>
    <path d="M395 340 H438" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M752 340 H795" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="220" y="585" width="760" height="62" rx="8" fill="#1e293b" stroke="#475569"/>
    <text x="600" y="624" fill="#f1f5f9" font-size="21" font-weight="800" text-anchor="middle">핵심: 원가율 악화보다 판관비 레버리지 개선이 더 컸다</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker></defs>
</svg>
