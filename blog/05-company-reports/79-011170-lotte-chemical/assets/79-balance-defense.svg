<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">롯데케미칼 재무 방어력</title>
  <desc id="desc">부채비율 76.5%, 현금 1.87조, dCR-BBB가 보여주는 방어력과 약점</desc>
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">망가진 건 본업, 아직 버티는 건 재무상태표</text>
  <text x="64" y="106" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">자산 31.1조, 자본 17.6조, 부채비율 76.5%. 그래서 문제는 유동성보다 이익 회복이다.</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="90" y="185" width="230" height="300" rx="10" fill="#172554" stroke="#3b82f6"/>
    <text x="205" y="235" fill="#bfdbfe" text-anchor="middle" font-size="20" font-weight="800">자산총계</text>
    <text x="205" y="315" fill="#f1f5f9" text-anchor="middle" font-size="36" font-weight="900">31.1조</text>
    <text x="205" y="365" fill="#94a3b8" text-anchor="middle" font-size="15">2025년 말</text>
    <rect x="360" y="185" width="230" height="300" rx="10" fill="#052e16" stroke="#22c55e"/>
    <text x="475" y="235" fill="#bbf7d0" text-anchor="middle" font-size="20" font-weight="800">자본총계</text>
    <text x="475" y="315" fill="#f1f5f9" text-anchor="middle" font-size="36" font-weight="900">17.6조</text>
    <text x="475" y="365" fill="#94a3b8" text-anchor="middle" font-size="15">손실 흡수 쿠션</text>
    <rect x="630" y="185" width="230" height="300" rx="10" fill="#3f1d0b" stroke="#f97316"/>
    <text x="745" y="235" fill="#fed7aa" text-anchor="middle" font-size="20" font-weight="800">부채비율</text>
    <text x="745" y="315" fill="#f1f5f9" text-anchor="middle" font-size="36" font-weight="900">76.5%</text>
    <text x="745" y="365" fill="#94a3b8" text-anchor="middle" font-size="15">화학 대형사로는 방어적</text>
    <rect x="900" y="185" width="230" height="300" rx="10" fill="#450a0a" stroke="#ef4444"/>
    <text x="1015" y="235" fill="#fecaca" text-anchor="middle" font-size="20" font-weight="800">EBITDA/이자</text>
    <text x="1015" y="315" fill="#f1f5f9" text-anchor="middle" font-size="36" font-weight="900">-1.08배</text>
    <text x="1015" y="365" fill="#94a3b8" text-anchor="middle" font-size="15">이익으로 이자를 못 덮음</text>
  </g>
  <rect x="180" y="545" width="840" height="62" rx="10" fill="#111827" stroke="#fbbf24"/>
  <text x="600" y="582" fill="#fbbf24" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="22" font-weight="800">dCR-BBB: 부도보다 구조조정 성공 여부가 핵심 리스크</text>
</svg>
