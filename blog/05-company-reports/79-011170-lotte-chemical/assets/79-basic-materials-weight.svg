<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">기초소재 비중과 손실</title>
  <desc id="desc">기초화학이 매출 62%, 자산 68%를 차지하며 손실을 낸다는 구조</desc>
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">문제 사업이 회사의 중심에 있다</text>
  <text x="64" y="106" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">기초화학은 줄이고 싶은 사업이지만, 아직 매출과 자산 대부분을 차지한다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <text x="190" y="185" fill="#f1f5f9" font-size="23" font-weight="800">매출 비중</text>
    <rect x="190" y="225" width="720" height="64" rx="8" fill="#1e293b"/>
    <rect x="190" y="225" width="446" height="64" rx="8" fill="#ef4444"/>
    <text x="413" y="264" fill="#fff" text-anchor="middle" font-size="20" font-weight="800">기초화학 62%</text>
    <text x="774" y="264" fill="#cbd5e1" text-anchor="middle" font-size="18">기타 38%</text>
    <text x="190" y="370" fill="#f1f5f9" font-size="23" font-weight="800">자산 비중</text>
    <rect x="190" y="410" width="720" height="64" rx="8" fill="#1e293b"/>
    <rect x="190" y="410" width="490" height="64" rx="8" fill="#f97316"/>
    <text x="435" y="449" fill="#fff" text-anchor="middle" font-size="20" font-weight="800">기초화학 68%</text>
    <text x="794" y="449" fill="#cbd5e1" text-anchor="middle" font-size="18">기타 32%</text>
  </g>
  <rect x="155" y="535" width="890" height="72" rx="10" fill="#111827" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="565" fill="#fbbf24" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="21" font-weight="800">기초화학 2025 영업손실 8,577억</text>
  <text x="600" y="592" fill="#94a3b8" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="15">ICIS 보도 기준. 롯데케미칼은 중장기적으로 기초화학 비중 40% 미만을 목표로 제시.</text>
</svg>
