<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">롯데케미칼 관찰 5가지</title>
  <desc id="desc">롯데케미칼 투자 관찰 포인트 5가지</desc>
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">2026~2028년 관찰 5가지</text>
  <text x="64" y="106" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">롯데케미칼은 좋아졌다는 말보다 이 다섯 숫자가 먼저 돌아와야 한다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="18">
    <rect x="90" y="160" width="1020" height="72" rx="10" fill="#111827" stroke="#334155"/>
    <text x="125" y="205" fill="#fbbf24" font-weight="800">1</text><text x="170" y="205" fill="#f1f5f9">기초화학 영업손실 8,577억이 실제로 줄어드는가</text>
    <rect x="90" y="250" width="1020" height="72" rx="10" fill="#111827" stroke="#334155"/>
    <text x="125" y="295" fill="#fbbf24" font-weight="800">2</text><text x="170" y="295" fill="#f1f5f9">대산 50:50 JV와 여수 33.3% JV가 일정대로 닫히는가</text>
    <rect x="90" y="340" width="1020" height="72" rx="10" fill="#111827" stroke="#334155"/>
    <text x="125" y="385" fill="#fbbf24" font-weight="800">3</text><text x="170" y="385" fill="#f1f5f9">매출총이익률 1.45%가 5% 이상으로 회복되는가</text>
    <rect x="90" y="430" width="1020" height="72" rx="10" fill="#111827" stroke="#334155"/>
    <text x="125" y="475" fill="#fbbf24" font-weight="800">4</text><text x="170" y="475" fill="#f1f5f9">영업현금흐름이 CAPEX와 구조조정 비용을 동시에 감당하는가</text>
    <rect x="90" y="520" width="1020" height="72" rx="10" fill="#111827" stroke="#334155"/>
    <text x="125" y="565" fill="#fbbf24" font-weight="800">5</text><text x="170" y="565" fill="#f1f5f9">첨단소재·정밀화학·동박이 범용 석화 손실을 상쇄할 만큼 커지는가</text>
  </g>
</svg>
