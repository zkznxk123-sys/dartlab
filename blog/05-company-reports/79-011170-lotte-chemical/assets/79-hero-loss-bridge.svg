<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">롯데케미칼 2025 손익 브리지</title>
  <desc id="desc">매출 18.6조에서 매출총이익 2,689억, 영업손실 9,375억으로 내려가는 구조</desc>
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">매출 18.6조 회사가 영업손실 9,375억을 냈다</text>
  <text x="64" y="106" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">2025년 롯데케미칼 연결 손익계산서 — 문제는 매출이 아니라 스프레드다</text>
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#334155" stroke-width="2"/>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="16">
    <rect x="110" y="145" width="170" height="415" fill="#2563eb" rx="6"/>
    <text x="195" y="590" fill="#f1f5f9" text-anchor="middle">매출</text>
    <text x="195" y="130" fill="#bfdbfe" text-anchor="middle" font-size="24" font-weight="800">18.6조</text>
    <rect x="385" y="497" width="170" height="63" fill="#22c55e" rx="6"/>
    <text x="470" y="590" fill="#f1f5f9" text-anchor="middle">매출총이익</text>
    <text x="470" y="485" fill="#bbf7d0" text-anchor="middle" font-size="24" font-weight="800">2,689억</text>
    <rect x="660" y="560" width="170" height="214" fill="#ef4444" rx="6"/>
    <text x="745" y="590" fill="#f1f5f9" text-anchor="middle">영업손실</text>
    <text x="745" y="530" fill="#fecaca" text-anchor="middle" font-size="24" font-weight="800">-9,375억</text>
    <rect x="935" y="560" width="170" height="201" fill="#f97316" rx="6"/>
    <text x="1020" y="590" fill="#f1f5f9" text-anchor="middle">지배주주순손실</text>
    <text x="1020" y="530" fill="#fed7aa" text-anchor="middle" font-size="24" font-weight="800">-2.04조</text>
  </g>
  <path d="M282 330 C330 330 340 530 382 530" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M557 530 C610 530 620 665 657 665" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="335" y="300" fill="#fbbf24" font-family="-apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700">매출원가율 98.6%</text>
  <text x="600" y="640" fill="#fbbf24" font-family="-apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700">판관비를 빼면 바로 적자</text>
  <text x="64" y="635" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="14">단위: 억원, dartlab 2025 연결 재무제표 기준</text>
</svg>
