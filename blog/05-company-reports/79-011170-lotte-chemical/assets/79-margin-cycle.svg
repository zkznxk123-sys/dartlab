<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">롯데케미칼 영업이익률 사이클</title>
  <desc id="desc">2018년 11.9%에서 2025년 -5.0%까지 내려간 영업이익률 추이</desc>
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">2018년 OPM 11.9% → 2025년 -5.0%</text>
  <text x="64" y="106" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">중국 증설과 저가 수출이 사이클 회복을 막으면서 4년 연속 적자 구간으로 들어갔다</text>
  <line x1="90" y1="520" x2="1120" y2="520" stroke="#475569" stroke-width="2"/>
  <line x1="90" y1="150" x2="90" y2="560" stroke="#475569" stroke-width="2"/>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="90" y1="170" x2="1120" y2="170"/>
    <line x1="90" y1="290" x2="1120" y2="290"/>
    <line x1="90" y1="410" x2="1120" y2="410"/>
  </g>
  <polyline points="110,185 250,295 390,410 530,222 670,600 810,552 950,578 1090,600" fill="none" stroke="#fbbf24" stroke-width="5"/>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="15" fill="#f1f5f9">
    <circle cx="110" cy="185" r="7" fill="#22c55e"/><text x="110" y="610" text-anchor="middle">2018</text><text x="110" y="165" text-anchor="middle">11.9%</text>
    <circle cx="250" cy="295" r="7" fill="#22c55e"/><text x="250" y="610" text-anchor="middle">2019</text><text x="250" y="275" text-anchor="middle">7.3%</text>
    <circle cx="390" cy="410" r="7" fill="#22c55e"/><text x="390" y="610" text-anchor="middle">2020</text><text x="390" y="390" text-anchor="middle">2.9%</text>
    <circle cx="530" cy="222" r="7" fill="#22c55e"/><text x="530" y="610" text-anchor="middle">2021</text><text x="530" y="202" text-anchor="middle">8.5%</text>
    <circle cx="670" cy="600" r="7" fill="#ef4444"/><text x="670" y="635" text-anchor="middle">2022</text><text x="670" y="580" text-anchor="middle">-3.4%</text>
    <circle cx="810" cy="552" r="7" fill="#ef4444"/><text x="810" y="635" text-anchor="middle">2023</text><text x="810" y="532" text-anchor="middle">-1.7%</text>
    <circle cx="950" cy="578" r="7" fill="#ef4444"/><text x="950" y="635" text-anchor="middle">2024</text><text x="950" y="558" text-anchor="middle">-4.4%</text>
    <circle cx="1090" cy="600" r="7" fill="#ef4444"/><text x="1090" y="635" text-anchor="middle">2025</text><text x="1090" y="580" text-anchor="middle">-5.0%</text>
  </g>
  <text x="104" y="152" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="14">12%</text>
  <text x="104" y="292" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="14">6%</text>
  <text x="104" y="522" fill="#64748b" font-family="-apple-system, Segoe UI, sans-serif" font-size="14">0%</text>
</svg>
