<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">대산과 여수 구조조정 지도</title>
  <desc id="desc">대산은 HD현대케미칼과 50대50, 여수는 여천NCC와 3사 공동 지배로 재편되는 구조</desc>
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">2026년 구조조정은 두 곳에서 동시에 일어난다</text>
  <text x="64" y="106" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">대산은 HD현대오일뱅크와, 여수는 한화솔루션·DL케미칼과 설비를 묶는다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="90" y="170" width="470" height="360" rx="14" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
    <text x="325" y="220" fill="#bfdbfe" text-anchor="middle" font-size="28" font-weight="800">대산 프로젝트</text>
    <text x="325" y="265" fill="#f1f5f9" text-anchor="middle" font-size="18">롯데 대산 기초소재 분할</text>
    <text x="325" y="302" fill="#94a3b8" text-anchor="middle" font-size="16">2026-06-01 롯데대산석화 신설</text>
    <text x="325" y="340" fill="#f1f5f9" text-anchor="middle" font-size="18">HD현대케미칼과 합병</text>
    <text x="325" y="378" fill="#fbbf24" text-anchor="middle" font-size="20" font-weight="800">롯데 50% · HD현대오일뱅크 50%</text>
    <text x="325" y="430" fill="#cbd5e1" text-anchor="middle" font-size="16">원료 수급·가동률·중복 설비 정리</text>
    <rect x="640" y="170" width="470" height="360" rx="14" fill="#111827" stroke="#22c55e" stroke-width="2"/>
    <text x="875" y="220" fill="#bbf7d0" text-anchor="middle" font-size="28" font-weight="800">여수 프로젝트</text>
    <text x="875" y="265" fill="#f1f5f9" text-anchor="middle" font-size="18">롯데 여수 NCC 물적분할</text>
    <text x="875" y="302" fill="#94a3b8" text-anchor="middle" font-size="16">여천NCC와 흡수합병 추진</text>
    <text x="875" y="340" fill="#f1f5f9" text-anchor="middle" font-size="18">PE·석유수지 현물출자</text>
    <text x="875" y="378" fill="#fbbf24" text-anchor="middle" font-size="20" font-weight="800">롯데 · 한화 · DL 각 33.3%</text>
    <text x="875" y="430" fill="#cbd5e1" text-anchor="middle" font-size="16">여수 설비 통합과 가동률 방어</text>
  </g>
  <text x="600" y="610" fill="#64748b" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="14">2026년 4월 현재 보도·회사 발표 기준. 최종 구조는 인허가와 합병 절차에 따라 변동 가능.</text>
</svg>
