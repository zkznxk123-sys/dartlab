<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">나프타 NCC 스프레드 함정</title>
  <desc id="desc">원유 기반 나프타 가격과 중국 공급 과잉이 제품 가격 사이를 압착하는 구조</desc>
  <rect width="1200" height="675" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800">롯데케미칼의 본업은 가격 결정권이 없는 스프레드 게임</text>
  <text x="64" y="106" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">원료는 국제 유가, 제품가는 중국 공급과 수요가 결정한다. 중간 스프레드가 사라지면 매출이 커도 적자다.</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="80" y="210" width="260" height="180" rx="10" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
    <text x="210" y="260" fill="#bfdbfe" text-anchor="middle" font-size="25" font-weight="800">나프타</text>
    <text x="210" y="302" fill="#f1f5f9" text-anchor="middle" font-size="17">원유 가격 연동</text>
    <text x="210" y="333" fill="#94a3b8" text-anchor="middle" font-size="15">롯데가 통제 못 함</text>
    <rect x="470" y="175" width="260" height="250" rx="10" fill="#3f1d0b" stroke="#f97316" stroke-width="2"/>
    <text x="600" y="240" fill="#fed7aa" text-anchor="middle" font-size="25" font-weight="800">NCC 설비</text>
    <text x="600" y="284" fill="#f1f5f9" text-anchor="middle" font-size="17">에틸렌·프로필렌 생산</text>
    <text x="600" y="316" fill="#94a3b8" text-anchor="middle" font-size="15">고정비 크고 멈추기 어려움</text>
    <rect x="860" y="210" width="260" height="180" rx="10" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
    <text x="990" y="260" fill="#bbf7d0" text-anchor="middle" font-size="25" font-weight="800">범용 플라스틱</text>
    <text x="990" y="302" fill="#f1f5f9" text-anchor="middle" font-size="17">PE·PP·BD·BTX</text>
    <text x="990" y="333" fill="#94a3b8" text-anchor="middle" font-size="15">중국 공급이 가격 압박</text>
  </g>
  <path d="M345 300 H460" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M735 300 H850" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="300" y="500" width="600" height="70" rx="8" fill="#111827" stroke="#ef4444"/>
  <text x="600" y="530" fill="#fecaca" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="23" font-weight="800">2025 매출총이익률 1.45%</text>
  <text x="600" y="558" fill="#94a3b8" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="15">18.6조 매출에서 원가를 빼고 남은 돈이 2,689억뿐</text>
</svg>
