<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>배터리 3사 2025 위치</title>
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">배터리 3사 2025년 위치</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="95" y="170" width="300" height="360" rx="8" fill="#052e16" stroke="#22c55e"/>
    <text x="130" y="230" fill="#22c55e" font-size="28" font-weight="700">LG에너지솔루션</text>
    <text x="130" y="285" fill="#f1f5f9" font-size="22">매출 23.67조</text>
    <text x="130" y="325" fill="#f1f5f9" font-size="22">OPM +5.69%</text>
    <text x="130" y="385" fill="#94a3b8" font-size="18">AMPC·고객 분산</text>
    <text x="130" y="415" fill="#94a3b8" font-size="18">고가 재고 소진</text>
    <text x="130" y="475" fill="#22c55e" font-size="24">흑자 방어</text>
    <rect x="450" y="170" width="300" height="360" rx="8" fill="#451a03" stroke="#f59e0b"/>
    <text x="485" y="230" fill="#fbbf24" font-size="28" font-weight="700">삼성SDI</text>
    <text x="485" y="285" fill="#f1f5f9" font-size="22">매출 13.27조</text>
    <text x="485" y="325" fill="#f1f5f9" font-size="22">OPM -12.98%</text>
    <text x="485" y="385" fill="#94a3b8" font-size="18">CAPEX 타이밍</text>
    <text x="485" y="415" fill="#94a3b8" font-size="18">가동률 하락</text>
    <text x="485" y="475" fill="#fbbf24" font-size="24">영업적자</text>
    <rect x="805" y="170" width="300" height="360" rx="8" fill="#450a0a" stroke="#ef4444"/>
    <text x="840" y="230" fill="#f87171" font-size="28" font-weight="700">SK온</text>
    <text x="840" y="285" fill="#f1f5f9" font-size="22">매출 6.98조</text>
    <text x="840" y="325" fill="#f1f5f9" font-size="22">영업손실 9,319억</text>
