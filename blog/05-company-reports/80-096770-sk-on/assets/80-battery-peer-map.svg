    <text x="840" y="475" fill="#f87171" font-size="24">구조조정</text>
    <text x="120" y="630" fill="#f1f5f9" font-size="24">같은 EV 캐즘이어도 장부에 찍히는 위치가 다르다: 흑자 방어, 영업적자, 영업외 손상.</text>
