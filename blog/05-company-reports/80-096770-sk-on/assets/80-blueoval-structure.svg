<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <title>BlueOval SK 합작 구조</title>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">BlueOval SK 구조</text>
  <text x="60" y="112" fill="#94a3b8" font-size="20" font-family="-apple-system, Segoe UI, sans-serif">Ford 수요 약속과 SK온 생산능력이 미국 3개 공장에 묶였다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="90" y="190" width="260" height="140" rx="8" fill="#111827" stroke="#3b82f6"/>
    <text x="125" y="245" fill="#60a5fa" font-size="28" font-weight="700">Ford</text>
    <text x="125" y="286" fill="#f1f5f9" font-size="19">F-150 Lightning</text>
    <text x="125" y="312" fill="#94a3b8" font-size="17">전기 픽업 수요</text>
    <rect x="850" y="190" width="260" height="140" rx="8" fill="#111827" stroke="#22c55e"/>
    <text x="885" y="245" fill="#22c55e" font-size="28" font-weight="700">SK온</text>
    <text x="885" y="286" fill="#f1f5f9" font-size="19">북미 현지 생산</text>
    <text x="885" y="312" fill="#94a3b8" font-size="17">IRA 공급망 대응</text>
    <rect x="410" y="180" width="380" height="270" rx="10" fill="#1f2937" stroke="#fbbf24"/>
    <text x="475" y="240" fill="#fbbf24" font-size="31" font-weight="700">BlueOval SK</text>
    <text x="475" y="285" fill="#f1f5f9" font-size="22">$11.4B 합작 투자</text>
    <text x="475" y="330" fill="#94a3b8" font-size="18">Kentucky 2개 공장</text>
    <text x="475" y="362" fill="#94a3b8" font-size="18">Tennessee 1개 공장</text>
    <text x="475" y="394" fill="#94a3b8" font-size="18">2026Q1 해체 목표</text>
    <path d="M350 260H410M790 260H850" stroke="#475569" stroke-width="4"/>
    <rect x="220" y="540" width="760" height="80" rx="8" fill="#111827" stroke="#ef4444"/>
    <text x="260" y="590" fill="#ef4444" font-size="24" font-weight="700">전제 변화:</text>
    <text x="405" y="590" fill="#f1f5f9" font-size="24">Ford EV 속도 하향 → 공장 현금흐름 재추정 → 손상</text>
  </g>
</svg>
