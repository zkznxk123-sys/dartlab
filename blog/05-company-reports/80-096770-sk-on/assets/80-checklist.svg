<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <title>SK온 2026 체크리스트</title>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">SK온 2026 체크리스트</text>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="22">
    <rect x="80" y="130" width="920" height="90" rx="8" fill="#111827" stroke="#334155"/>
    <text x="125" y="185" fill="#f1f5f9">1. 영업손실 5,000억원 이하로 축소</text>
    <rect x="80" y="240" width="920" height="90" rx="8" fill="#111827" stroke="#334155"/>
    <text x="125" y="295" fill="#f1f5f9">2. Tennessee 공장 가동률과 고객 물량 확인</text>
    <rect x="80" y="350" width="920" height="90" rx="8" fill="#111827" stroke="#334155"/>
    <text x="125" y="405" fill="#f1f5f9">3. ESS 장기 수주를 GWh 단위로 공시</text>
    <rect x="80" y="460" width="920" height="90" rx="8" fill="#111827" stroke="#334155"/>
    <text x="125" y="515" fill="#f1f5f9">4. SK Enmove 결합 후 EBITDA 개선</text>
    <rect x="80" y="570" width="920" height="90" rx="8" fill="#111827" stroke="#ef4444"/>
    <text x="125" y="625" fill="#f87171">5. SK이노베이션 기타비용 1조 이하 정상화</text>
  </g>
</svg>
