<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <title>EV에서 ESS로 관찰 포인트 이동</title>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">EV에서 ESS로 바뀌는 질문</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="90" y="150" width="450" height="420" rx="10" fill="#111827" stroke="#ef4444"/>
    <text x="130" y="215" fill="#f87171" font-size="30" font-weight="700">EV 중심 질문</text>
    <text x="130" y="280" fill="#f1f5f9" font-size="22">Ford 전기차 판매량</text>
    <text x="130" y="330" fill="#f1f5f9" font-size="22">F-150 Lightning 생산계획</text>
    <text x="130" y="380" fill="#f1f5f9" font-size="22">보조금과 소비자 수요</text>
    <text x="130" y="430" fill="#f1f5f9" font-size="22">공장 가동률 70% 이상</text>
    <rect x="660" y="150" width="450" height="420" rx="10" fill="#111827" stroke="#22c55e"/>
    <text x="700" y="215" fill="#22c55e" font-size="30" font-weight="700">ESS 중심 질문</text>
    <text x="700" y="280" fill="#f1f5f9" font-size="22">데이터센터 전력 수요</text>
    <text x="700" y="330" fill="#f1f5f9" font-size="22">LFP 원가 경쟁력</text>
    <text x="700" y="380" fill="#f1f5f9" font-size="22">장기 전력계약</text>
    <text x="700" y="430" fill="#f1f5f9" font-size="22">비중국 공급망 프리미엄</text>
    <path d="M550 360H650" stroke="#fbbf24" stroke-width="6" marker-end="url(#a)"/>
    <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#fbbf24"/></marker></defs>
    <text x="440" y="640" fill="#fbbf24" font-size="26">탈출구이지만 쉬운 시장은 아니다</text>
  </g>
</svg>
