<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <title>SK온 BlueOval 손실 구조</title>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="64" y="72" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">SK온 2025년의 한 줄</text>
  <text x="64" y="116" fill="#94a3b8" font-size="20" font-family="-apple-system, Segoe UI, sans-serif">매출은 생겼지만, 합작공장 구조조정이 손익계산서 아래층을 무너뜨렸다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="70" y="180" width="230" height="150" rx="8" fill="#111827" stroke="#334155"/>
    <text x="96" y="230" fill="#94a3b8" font-size="19">SK온 2025 매출</text>
    <text x="96" y="278" fill="#22c55e" font-size="38" font-weight="700">6.98조</text>
    <text x="96" y="306" fill="#64748b" font-size="16">비상장 자회사</text>
    <rect x="350" y="180" width="230" height="150" rx="8" fill="#111827" stroke="#334155"/>
    <text x="376" y="230" fill="#94a3b8" font-size="19">SK온 영업손실</text>
    <text x="376" y="278" fill="#ef4444" font-size="38" font-weight="700">-9,319억</text>
    <text x="376" y="306" fill="#64748b" font-size="16">매출 7조에도 적자</text>
    <rect x="630" y="180" width="230" height="150" rx="8" fill="#111827" stroke="#334155"/>
    <text x="656" y="230" fill="#94a3b8" font-size="19">BlueOval SK</text>
    <text x="656" y="278" fill="#fbbf24" font-size="38" font-weight="700">$11.4B</text>
    <text x="656" y="306" fill="#64748b" font-size="16">Ford 합작공장</text>
    <rect x="910" y="180" width="230" height="150" rx="8" fill="#111827" stroke="#334155"/>
    <text x="936" y="230" fill="#94a3b8" font-size="19">모회사 순손실</text>
    <text x="936" y="278" fill="#ef4444" font-size="38" font-weight="700">-5.54조</text>
    <text x="936" y="306" fill="#64748b" font-size="16">SK이노베이션 연결</text>
    <path d="M300 255H350M580 255H630M860 255H910" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker></defs>
    <rect x="120" y="430" width="960" height="120" rx="10" fill="#1f2937" stroke="#f59e0b"/>
    <text x="160" y="482" fill="#f1f5f9" font-size="28" font-weight="700">관통선</text>
    <text x="160" y="526" fill="#fbbf24" font-size="26">왜 11조 합작공장은 성장 투자가 아니라 5조대 손실의 출발점이 됐는가</text>
  </g>
</svg>
