<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <title>공장 투자에서 손상까지</title>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">공장 투자가 손상차손이 되는 5단계</text>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="18">
    <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker></defs>
    <g>
      <rect x="70" y="190" width="185" height="150" rx="8" fill="#111827" stroke="#334155"/>
      <text x="100" y="245" fill="#fbbf24" font-size="24" font-weight="700">1 수요 약속</text>
      <text x="100" y="285" fill="#f1f5f9">Ford 전기차</text>
      <text x="100" y="312" fill="#94a3b8">생산계획</text>
    </g>
    <path d="M255 265H315" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <g>
      <rect x="315" y="190" width="185" height="150" rx="8" fill="#111827" stroke="#334155"/>
      <text x="345" y="245" fill="#fbbf24" font-size="24" font-weight="700">2 선투자</text>
      <text x="345" y="285" fill="#f1f5f9">토지·장비</text>
      <text x="345" y="312" fill="#94a3b8">인력 채용</text>
    </g>
    <path d="M500 265H560" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <g>
      <rect x="560" y="190" width="185" height="150" rx="8" fill="#111827" stroke="#334155"/>
      <text x="590" y="245" fill="#fbbf24" font-size="24" font-weight="700">3 수요 둔화</text>
      <text x="590" y="285" fill="#f1f5f9">가동률 하락</text>
      <text x="590" y="312" fill="#94a3b8">EV 캐즘</text>
    </g>
    <path d="M745 265H805" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <g>
      <rect x="805" y="190" width="185" height="150" rx="8" fill="#111827" stroke="#334155"/>
      <text x="835" y="245" fill="#fbbf24" font-size="24" font-weight="700">4 재추정</text>
      <text x="835" y="285" fill="#f1f5f9">미래 현금흐름</text>
      <text x="835" y="312" fill="#94a3b8">낮게 평가</text>
    </g>
    <path d="M990 265H1050" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <g>
      <rect x="1050" y="190" width="120" height="150" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
      <text x="1075" y="245" fill="#fff" font-size="24" font-weight="700">5 손상</text>
      <text x="1075" y="285" fill="#fecaca">비용</text>
      <text x="1075" y="312" fill="#fecaca">인식</text>
    </g>
    <rect x="170" y="470" width="860" height="105" rx="8" fill="#1f2937" stroke="#ef4444"/>
    <text x="220" y="535" fill="#f1f5f9" font-size="26">장부가 100의 공장이 앞으로 60만 벌 것 같으면 40은 비용이 된다</text>
  </g>
</svg>
