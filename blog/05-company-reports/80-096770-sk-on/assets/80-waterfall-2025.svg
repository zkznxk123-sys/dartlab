<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <title>SK이노베이션 2025 손익 폭포</title>
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="64" y="70" fill="#f1f5f9" font-family="-apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">2025 손익 폭포</text>
  <text x="64" y="112" fill="#94a3b8" font-size="20" font-family="-apple-system, Segoe UI, sans-serif">영업이익은 흑자였지만 금융비용과 기타비용이 순손실을 만들었다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <line x1="90" y1="620" x2="1110" y2="620" stroke="#334155"/>
    <rect x="110" y="190" width="120" height="430" fill="#22c55e"/>
    <text x="110" y="660" fill="#f1f5f9" font-size="17">매출</text><text x="110" y="685" fill="#94a3b8" font-size="16">80.30조</text>
    <rect x="270" y="590" width="120" height="30" fill="#22c55e"/>
    <text x="270" y="660" fill="#f1f5f9" font-size="17">영업이익</text><text x="270" y="685" fill="#94a3b8" font-size="16">0.45조</text>
    <rect x="430" y="350" width="120" height="270" fill="#ef4444"/>
    <text x="430" y="660" fill="#f1f5f9" font-size="17">금융비용</text><text x="430" y="685" fill="#94a3b8" font-size="16">-6.36조</text>
    <rect x="590" y="380" width="120" height="240" fill="#f97316"/>
    <text x="590" y="660" fill="#f1f5f9" font-size="17">기타비용</text><text x="590" y="685" fill="#94a3b8" font-size="16">-5.64조</text>
    <rect x="750" y="620" width="120" height="95" fill="#ef4444"/>
    <text x="750" y="660" fill="#f1f5f9" font-size="17">순손실</text><text x="750" y="685" fill="#94a3b8" font-size="16">-5.54조</text>
    <rect x="930" y="220" width="170" height="110" rx="8" fill="#111827" stroke="#f59e0b"/>
    <text x="955" y="262" fill="#fbbf24" font-size="23" font-weight="700">핵심</text>
    <text x="955" y="296" fill="#f1f5f9" font-size="18">기타비용이</text>
    <text x="955" y="322" fill="#f1f5f9" font-size="18">8배로 급증</text>
  </g>
</svg>
