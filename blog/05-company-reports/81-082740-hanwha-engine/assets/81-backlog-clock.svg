<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">수주잔고 4.114조의 매출 전환 시계</title>
  <desc id="desc">한화엔진의 수주잔고와 평균 18개월 매출 전환 구조를 보여준다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#f1f5f9">수주잔고는 매출이 아니라 시간표다</text>
  <text x="60" y="105" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8">한화엔진 IR 기준 수주잔고 4.114조. 2025 매출 1.37조의 약 3.0배지만, 평균 18개월에 걸쳐 매출로 풀린다.</text>
  <line x1="130" y1="360" x2="1070" y2="360" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
  <g font-family="-apple-system, 'Segoe UI', sans-serif">
    <circle cx="180" cy="360" r="58" fill="#111827" stroke="#38bdf8" stroke-width="4"/>
    <text x="180" y="350" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">수주</text>
    <text x="180" y="380" text-anchor="middle" font-size="15" fill="#94a3b8">계약 확보</text>
    <circle cx="490" cy="360" r="78" fill="#111827" stroke="#fbbf24" stroke-width="4"/>
    <text x="490" y="342" text-anchor="middle" font-size="48" font-weight="900" fill="#fbbf24">18</text>
    <text x="490" y="375" text-anchor="middle" font-size="18" font-weight="800" fill="#f1f5f9">개월</text>
    <text x="490" y="402" text-anchor="middle" font-size="15" fill="#94a3b8">제작·검사·납품</text>
    <circle cx="800" cy="360" r="58" fill="#111827" stroke="#22c55e" stroke-width="4"/>
    <text x="800" y="350" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">매출</text>
    <text x="800" y="380" text-anchor="middle" font-size="15" fill="#94a3b8">인식</text>
    <circle cx="1020" cy="360" r="58" fill="#111827" stroke="#ef4444" stroke-width="4"/>
    <text x="1020" y="350" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">마진</text>
    <text x="1020" y="380" text-anchor="middle" font-size="15" fill="#94a3b8">원가 차감</text>
  </g>
  <g transform="translate(80 520)" font-family="-apple-system, 'Segoe UI', sans-serif">
    <rect width="1040" height="105" rx="8" fill="#111827" stroke="#334155"/>
    <text x="35" y="38" font-size="19" font-weight="800" fill="#e2e8f0">수주잔고 4.114조 ÷ 2025 매출 1.371조 = 3.0년치처럼 보인다.</text>
    <text x="35" y="72" font-size="16" fill="#cbd5e1">하지만 조선 엔진은 납기와 프로젝트 진행률이 핵심이다. 그래서 투자자는 “잔고 크기”보다 “새 수주 단가와 원가율”을 같이 봐야 한다.</text>
  </g>
</svg>
