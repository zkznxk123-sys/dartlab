<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">한화엔진 투자 체크리스트</title>
  <desc id="desc">한화엔진을 볼 때 확인해야 할 다섯 가지 신호를 정리한다.</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="54" y="70" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#f1f5f9">한화엔진은 이 5개를 확인할 때만 데이터센터 이야기다</text>
  <text x="54" y="105" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8">직접 수주가 나오기 전까지는 기대가 아니라 검증표로 봐야 한다.</text>
  <g font-family="-apple-system, 'Segoe UI', sans-serif" transform="translate(70 155)">
    <g transform="translate(0 0)"><rect width="940" height="82" rx="8" fill="#111827" stroke="#334155"/><text x="28" y="34" font-size="20" font-weight="800" fill="#fbbf24">① 데이터센터 발전엔진 직접 수주</text><text x="28" y="62" font-size="15" fill="#cbd5e1">한화엔진 명의 또는 고객사의 구체 계약 공시가 나오는가</text></g>
    <g transform="translate(0 100)"><rect width="940" height="82" rx="8" fill="#111827" stroke="#334155"/><text x="28" y="34" font-size="20" font-weight="800" fill="#fbbf24">② 수주잔고의 제품 믹스</text><text x="28" y="62" font-size="15" fill="#cbd5e1">DF엔진 88% 같은 고부가 수주 비중이 유지되는가</text></g>
    <g transform="translate(0 200)"><rect width="940" height="82" rx="8" fill="#111827" stroke="#334155"/><text x="28" y="34" font-size="20" font-weight="800" fill="#fbbf24">③ 원가율 86%대 유지</text><text x="28" y="62" font-size="15" fill="#cbd5e1">2025년 턴어라운드가 일회성인지 구조 개선인지 확인</text></g>
    <g transform="translate(0 300)"><rect width="940" height="82" rx="8" fill="#111827" stroke="#334155"/><text x="28" y="34" font-size="20" font-weight="800" fill="#fbbf24">④ 운전자본과 현금흐름</text><text x="28" y="62" font-size="15" fill="#cbd5e1">영업현금흐름 3,303억이 반복되는가, 재고·매출채권이 먼저 늘어나는가</text></g>
    <g transform="translate(0 400)"><rect width="940" height="82" rx="8" fill="#111827" stroke="#334155"/><text x="28" y="34" font-size="20" font-weight="800" fill="#fbbf24">⑤ 고객사 확장</text><text x="28" y="62" font-size="15" fill="#cbd5e1">조선소 납품을 넘어 발전 프로젝트 EPC·데이터센터 사업자와 연결되는가</text></g>
  </g>
</svg>
