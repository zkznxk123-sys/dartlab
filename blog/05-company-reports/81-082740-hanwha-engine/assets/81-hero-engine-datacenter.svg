<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">한화엔진 관통선 — 선박엔진 수주가 데이터센터 전력원 질문으로 넘어간다</title>
  <desc id="desc">한화엔진의 선박엔진 본업, 4.114조 수주잔고, DF엔진 88%, 18개월 매출 전환, HD현대중공업 684MW 데이터센터 계약을 연결한다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#f1f5f9">배 엔진은 왜 AI 데이터센터 앞으로 불려갔나</text>
  <text x="60" y="105" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8">한화엔진의 직접 데이터센터 수주는 아직 미확인. 그러나 옆 회사의 684MW 계약이 엔진 산업의 새 질문을 만들었다.</text>
  <g transform="translate(60 165)">
    <rect x="0" y="0" width="300" height="370" rx="8" fill="#111827" stroke="#334155"/>
    <text x="28" y="44" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="23" font-weight="800" fill="#38bdf8">1. 선박엔진 본업</text>
    <text x="28" y="86" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="54" font-weight="900" fill="#fbbf24">1.37조</text>
    <text x="28" y="118" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">2025 매출, dartlab 실측</text>
    <text x="28" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="900" fill="#22c55e">9.5%</text>
    <text x="28" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">영업이익률. 2021년 -6.6%에서 회복</text>
    <text x="28" y="255" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">핵심 변화</text>
    <text x="28" y="286" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">원가율 101.7% → 86.5%</text>
    <text x="28" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">매출총이익률 -1.7% → 13.5%</text>
  </g>
  <g transform="translate(450 165)">
    <rect x="0" y="0" width="300" height="370" rx="8" fill="#111827" stroke="#334155"/>
    <text x="28" y="44" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="23" font-weight="800" fill="#38bdf8">2. 수주잔고의 시계</text>
    <text x="28" y="86" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="54" font-weight="900" fill="#fbbf24">4.114조</text>
    <text x="28" y="118" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">2025년 1분기 IR 수주잔고</text>
    <text x="28" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="900" fill="#22c55e">18개월</text>
    <text x="28" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">평균 수주→매출 전환 기간</text>
    <text x="28" y="255" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">품질 변화</text>
    <text x="28" y="286" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">선박엔진 97%</text>
    <text x="28" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">DF엔진 신규수주 88%</text>
  </g>
  <g transform="translate(840 165)">
    <rect x="0" y="0" width="300" height="370" rx="8" fill="#111827" stroke="#334155"/>
    <text x="28" y="44" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="23" font-weight="800" fill="#38bdf8">3. 새 질문</text>
    <text x="28" y="86" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="54" font-weight="900" fill="#fbbf24">684MW</text>
    <text x="28" y="118" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">HD현대중공업 미국 데이터센터 발전설비</text>
    <text x="28" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="900" fill="#22c55e">6,271억</text>
    <text x="28" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">계약금액. 엔진이 선박 밖으로 나간 사례</text>
    <text x="28" y="255" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">한화엔진 판단</text>
    <text x="28" y="286" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">직접 수주 확인 전까지는 옵션</text>
    <text x="28" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#cbd5e1">본업 체력과 고객 확장성을 따로 본다</text>
  </g>
  <path d="M370 350 L430 350" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M760 350 L820 350" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect x="60" y="590" width="1080" height="70" rx="8" fill="#172033" stroke="#334155"/>
  <text x="90" y="635" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="21" font-weight="800" fill="#f1f5f9">결론: 이 글은 “한화엔진이 이미 데이터센터 회사다”가 아니라 “데이터센터가 엔진 장부를 다시 읽게 만들었다”를 검증한다.</text>
</svg>
