<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">AI 전력 인프라에서 엔진 회사의 위치</title>
  <desc id="desc">데이터센터 전력 경로에서 변압기, 배전반, 엔진 발전기, 선박엔진 회사의 역할을 구분한다.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#f1f5f9">AI 전력망 지도에서 한화엔진은 변압기가 아니다</text>
  <text x="60" y="105" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8">기존 77번 글은 변압기·배전반 이야기였다. 이번 글은 전력망이 늦을 때 현장 발전이 왜 등장하는지에 초점을 둔다.</text>
  <g font-family="-apple-system, 'Segoe UI', sans-serif" transform="translate(80 170)">
    <rect x="0" y="0" width="220" height="180" rx="8" fill="#111827" stroke="#38bdf8"/>
    <text x="110" y="48" text-anchor="middle" font-size="22" font-weight="800" fill="#f1f5f9">송전망</text>
    <text x="110" y="88" text-anchor="middle" font-size="15" fill="#cbd5e1">발전소→변전소</text>
    <text x="110" y="122" text-anchor="middle" font-size="15" fill="#94a3b8">초고압 변압기</text>
    <text x="110" y="150" text-anchor="middle" font-size="14" fill="#fbbf24">HD현대일렉트릭</text>
    <rect x="320" y="0" width="220" height="180" rx="8" fill="#111827" stroke="#38bdf8"/>
    <text x="430" y="48" text-anchor="middle" font-size="22" font-weight="800" fill="#f1f5f9">내부 배전</text>
    <text x="430" y="88" text-anchor="middle" font-size="15" fill="#cbd5e1">전력실→서버랙</text>
    <text x="430" y="122" text-anchor="middle" font-size="15" fill="#94a3b8">배전반·차단기</text>
    <text x="430" y="150" text-anchor="middle" font-size="14" fill="#fbbf24">LS ELECTRIC</text>
    <rect x="640" y="0" width="220" height="180" rx="8" fill="#111827" stroke="#fbbf24"/>
    <text x="750" y="48" text-anchor="middle" font-size="22" font-weight="800" fill="#f1f5f9">현장 발전</text>
    <text x="750" y="88" text-anchor="middle" font-size="15" fill="#cbd5e1">그리드 대기시간 보완</text>
    <text x="750" y="122" text-anchor="middle" font-size="15" fill="#94a3b8">엔진 발전기</text>
    <text x="750" y="150" text-anchor="middle" font-size="14" fill="#fbbf24">HD현대중공업 사례</text>
    <rect x="860" y="290" width="220" height="180" rx="8" fill="#111827" stroke="#22c55e"/>
    <text x="970" y="338" text-anchor="middle" font-size="22" font-weight="800" fill="#f1f5f9">엔진 공급망</text>
    <text x="970" y="378" text-anchor="middle" font-size="15" fill="#cbd5e1">선박엔진 기술·부품</text>
    <text x="970" y="412" text-anchor="middle" font-size="15" fill="#94a3b8">DF엔진·유지보수</text>
    <text x="970" y="440" text-anchor="middle" font-size="14" fill="#fbbf24">한화엔진 관찰 지점</text>
    <path d="M220 90 H320" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <path d="M540 90 H640" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <path d="M820 180 C880 240 900 260 940 290" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#a)"/>
    <rect x="0" y="545" width="1080" height="95" rx="8" fill="#172033" stroke="#334155"/>
    <text x="28" y="584" font-size="20" font-weight="800" fill="#f1f5f9">중복 회피 포인트</text>
    <text x="28" y="618" font-size="16" fill="#cbd5e1">이번 글은 “AI 전력기기”가 아니라 “선박용 중속엔진 기술이 데이터센터 비상·상시 발전 수요를 만날 수 있는가”를 묻는다.</text>
  </g>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
</svg>
