<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">한화엔진 영업이익률 턴어라운드</title>
  <desc id="desc">2021년 적자에서 2025년 영업이익률 9.5%로 회복한 궤적과 원가율 개선을 표시한다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="60" y="70" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#f1f5f9">턴어라운드는 매출보다 원가율에서 먼저 보인다</text>
  <text x="60" y="105" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8">2021년 매출원가율 101.7%였던 회사가 2025년 86.5%까지 내려왔다. 이 변화가 영업이익률 9.5%를 만들었다.</text>
  <g transform="translate(100 160)" font-family="-apple-system, 'Segoe UI', sans-serif">
    <line x1="0" y1="420" x2="1000" y2="420" stroke="#334155"/>
    <line x1="0" y1="80" x2="0" y2="420" stroke="#334155"/>
    <text x="-10" y="86" text-anchor="end" font-size="13" fill="#94a3b8">12%</text>
    <text x="-10" y="250" text-anchor="end" font-size="13" fill="#94a3b8">0%</text>
    <text x="-10" y="420" text-anchor="end" font-size="13" fill="#94a3b8">-8%</text>
    <polyline points="80,390 330,332 580,236 830,170" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#22c55e">
      <circle cx="80" cy="390" r="8"/><circle cx="330" cy="332" r="8"/><circle cx="580" cy="236" r="8"/><circle cx="830" cy="170" r="8"/>
    </g>
    <g font-size="16" fill="#f1f5f9" font-weight="800">
      <text x="80" y="455" text-anchor="middle">2021</text>
      <text x="330" y="455" text-anchor="middle">2022</text>
      <text x="580" y="455" text-anchor="middle">2023</text>
      <text x="830" y="455" text-anchor="middle">2025</text>
    </g>
    <g font-size="18" fill="#fbbf24" font-weight="900">
      <text x="80" y="375" text-anchor="middle">-6.6%</text>
      <text x="330" y="318" text-anchor="middle">-3.9%</text>
      <text x="580" y="222" text-anchor="middle">1.0%</text>
      <text x="830" y="156" text-anchor="middle">9.5%</text>
    </g>
  </g>
  <g transform="translate(760 520)" font-family="-apple-system, 'Segoe UI', sans-serif">
    <rect x="0" y="0" width="360" height="110" rx="8" fill="#111827" stroke="#334155"/>
    <text x="24" y="38" font-size="18" font-weight="800" fill="#f1f5f9">dartlab 수익성 분해</text>
    <text x="24" y="68" font-size="15" fill="#cbd5e1">영업이익률 개선 기여의 대부분은</text>
    <text x="24" y="92" font-size="15" font-weight="800" fill="#fbbf24">원가율 개선 13.23%p</text>
  </g>
</svg>
