<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="70" y="78" fill="#f1f5f9" font-size="34" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">ASU 2023-08 전후: 같은 비트코인, 다른 손익계산서</text>
  <text x="70" y="116" fill="#94a3b8" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">2025년 1월 1일부터 공정가치 변동이 순손익으로 들어온다</text>
  <g transform="translate(70 170)">
    <rect width="500" height="520" rx="22" fill="#101827" stroke="#334155"/>
    <text x="34" y="58" fill="#f1f5f9" font-size="27" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">2024년까지</text>
    <text x="34" y="94" fill="#94a3b8" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">Cost-less-impairment model</text>
    <rect x="46" y="145" width="408" height="72" rx="14" fill="#172033"/>
    <text x="68" y="188" fill="#f1f5f9" font-size="20" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">가격 하락</text>
    <text x="255" y="188" fill="#ef4444" font-size="20" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">손상차손 인식</text>
    <rect x="46" y="245" width="408" height="72" rx="14" fill="#172033"/>
    <text x="68" y="288" fill="#f1f5f9" font-size="20" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">가격 상승</text>
    <text x="255" y="288" fill="#64748b" font-size="20" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">이익 미인식</text>
    <path d="M110 395 L390 395" stroke="#64748b" stroke-width="4"/>
    <path d="M250 360 L250 430" stroke="#64748b" stroke-width="4"/>
    <text x="88" y="480" fill="#cbd5e1" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">손익은 하방으로만 열려 있었다.</text>
  </g>
  <g transform="translate(630 170)">
    <rect width="500" height="520" rx="22" fill="#111f33" stroke="#fbbf24"/>
    <text x="34" y="58" fill="#f1f5f9" font-size="27" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">2025년부터</text>
    <text x="34" y="94" fill="#94a3b8" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">Fair value through net income</text>
    <rect x="46" y="145" width="408" height="72" rx="14" fill="#172033"/>
    <text x="68" y="188" fill="#f1f5f9" font-size="20" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">가격 하락</text>
    <text x="255" y="188" fill="#ef4444" font-size="20" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">손실 인식</text>
    <rect x="46" y="245" width="408" height="72" rx="14" fill="#172033"/>
    <text x="68" y="288" fill="#f1f5f9" font-size="20" font-weight="700" font-family="-apple-system, Segoe UI, sans-serif">가격 상승</text>
    <text x="255" y="288" fill="#22c55e" font-size="20" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">이익 인식</text>
    <path d="M100 418 C170 318 234 496 306 376 C348 306 384 336 420 292" stroke="#fbbf24" stroke-width="5" fill="none"/>
    <text x="74" y="480" fill="#cbd5e1" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">손익이 비트코인 가격표와 같이 움직인다.</text>
  </g>
  <text x="70" y="750" fill="#fbbf24" font-size="22" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">결론: 2025년 이후 MSTR의 순이익은 제품 판매보다 BTC 종가에 더 민감하다.</text>
</svg>
