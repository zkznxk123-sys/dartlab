<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="68" y="82" fill="#f1f5f9" font-size="34" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">대차대조표 폭발: 자산 12.9배, 자본 52.1배</text>
  <text x="68" y="120" fill="#94a3b8" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">dartlab 안정성 분석: 2024 → 2025, 공정가치 회계와 자본조달이 만든 장부 재배열</text>
  <g transform="translate(90 180)">
    <text x="0" y="0" fill="#cbd5e1" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">총자산</text>
    <rect x="0" y="28" width="80" height="68" rx="10" fill="#334155"/>
    <rect x="110" y="28" width="850" height="68" rx="10" fill="#22c55e"/>
    <text x="0" y="140" fill="#94a3b8" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">2024 $4.76B</text>
    <text x="720" y="140" fill="#f1f5f9" font-size="26" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">2025 $61.64B</text>
  </g>
  <g transform="translate(90 355)">
    <text x="0" y="0" fill="#cbd5e1" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">자본</text>
    <rect x="0" y="28" width="24" height="68" rx="10" fill="#334155"/>
    <rect x="110" y="28" width="745" height="68" rx="10" fill="#3b82f6"/>
    <text x="0" y="140" fill="#94a3b8" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">2024 $0.98B</text>
    <text x="630" y="140" fill="#f1f5f9" font-size="26" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">2025 $51.04B</text>
  </g>
  <g transform="translate(90 545)">
    <rect width="275" height="96" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="24" y="40" fill="#94a3b8" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">부채비율</text>
    <text x="24" y="76" fill="#fbbf24" font-size="30" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">265% → 21%</text>
  </g>
  <g transform="translate(405 545)">
    <rect width="275" height="96" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="24" y="40" fill="#94a3b8" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">총차입</text>
    <text x="24" y="76" fill="#f1f5f9" font-size="30" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">$8.19B</text>
  </g>
  <g transform="translate(720 545)">
    <rect width="330" height="96" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="24" y="40" fill="#94a3b8" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">단기차입 비중</text>
    <text x="24" y="76" fill="#22c55e" font-size="30" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">0.38%</text>
  </g>
