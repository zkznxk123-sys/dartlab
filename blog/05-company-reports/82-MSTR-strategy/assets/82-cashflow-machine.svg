<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="70" y="80" fill="#f1f5f9" font-size="34" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">현금흐름표가 말하는 실제 사업 모델</text>
  <text x="70" y="118" fill="#94a3b8" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">2025년: 영업현금흐름은 -$67M, 투자현금흐름은 -$22.5B, 재무현금흐름은 +$24.8B</text>
  <g transform="translate(80 205)">
    <rect width="260" height="245" rx="20" fill="#172033" stroke="#334155"/>
    <text x="28" y="56" fill="#f1f5f9" font-size="24" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">영업</text>
    <text x="28" y="122" fill="#ef4444" font-size="46" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">-$67M</text>
    <text x="28" y="170" fill="#cbd5e1" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">소프트웨어 현금 창출력은</text>
    <text x="28" y="198" fill="#cbd5e1" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">자본 구조를 혼자 못 받친다</text>
  </g>
  <path d="M360 325 L462 325" stroke="#fbbf24" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(480 205)">
    <rect width="260" height="245" rx="20" fill="#172033" stroke="#334155"/>
    <text x="28" y="56" fill="#f1f5f9" font-size="24" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">투자</text>
    <text x="28" y="122" fill="#ef4444" font-size="46" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">-$22.5B</text>
    <text x="28" y="170" fill="#cbd5e1" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">대부분 비트코인 매입</text>
    <text x="28" y="198" fill="#cbd5e1" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">CAPEX는 $8M 수준</text>
  </g>
  <path d="M760 325 L862 325" stroke="#fbbf24" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(880 205)">
    <rect width="260" height="245" rx="20" fill="#172033" stroke="#334155"/>
    <text x="28" y="56" fill="#f1f5f9" font-size="24" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">재무</text>
    <text x="28" y="122" fill="#22c55e" font-size="46" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">+$24.8B</text>
    <text x="28" y="170" fill="#cbd5e1" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">주식·우선주·전환사채</text>
    <text x="28" y="198" fill="#cbd5e1" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">자본시장이 연료다</text>
  </g>
  <rect x="170" y="545" width="860" height="78" rx="18" fill="#111f33" stroke="#475569"/>
  <text x="205" y="593" fill="#fbbf24" font-size="22" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">공식: 자본 조달 → BTC 매입 → 공정가치 변동 → 손익·자본 변동 → 다시 자본 조달</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#fbbf24"/></marker></defs>
</svg>
