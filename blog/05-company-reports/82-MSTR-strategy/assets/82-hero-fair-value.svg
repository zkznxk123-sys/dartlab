<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Strategy MSTR 공정가치 회계 지도</title>
  <desc id="desc">소프트웨어 매출보다 비트코인 공정가치가 손익과 자본을 지배하는 구조</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <rect x="52" y="48" width="1096" height="624" rx="28" fill="#101827" stroke="#263244"/>
  <text x="82" y="105" fill="#f1f5f9" font-size="34" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">MSTR은 이제 소프트웨어 회사 손익계산서가 아니다</text>
  <text x="82" y="143" fill="#94a3b8" font-size="19" font-family="-apple-system, Segoe UI, sans-serif">2025년 10-K 기준: 매출 $0.48B 회사가 비트코인 장부 $58.85B를 들고 있다</text>
  <g transform="translate(82 200)">
    <rect x="0" y="0" width="310" height="360" rx="18" fill="#111f33" stroke="#334155"/>
    <text x="28" y="52" fill="#f1f5f9" font-size="24" font-weight="750" font-family="-apple-system, Segoe UI, sans-serif">본업</text>
    <text x="28" y="92" fill="#94a3b8" font-size="16" font-family="-apple-system, Segoe UI, sans-serif">Enterprise analytics software</text>
    <rect x="28" y="135" width="254" height="38" rx="10" fill="#1e293b"/>
    <rect x="28" y="135" width="96" height="38" rx="10" fill="#22c55e"/>
    <text x="28" y="217" fill="#f1f5f9" font-size="52" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">$477M</text>
    <text x="30" y="250" fill="#94a3b8" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">2025 매출</text>
    <text x="30" y="295" fill="#cbd5e1" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">구독은 성장하지만 규모는 작다</text>
    <text x="30" y="324" fill="#64748b" font-size="15" font-family="-apple-system, Segoe UI, sans-serif">Q4 구독 매출 +62.1% YoY</text>
  </g>
  <g transform="translate(445 160)">
    <rect x="0" y="0" width="670" height="440" rx="22" fill="#172033" stroke="#475569"/>
    <text x="34" y="62" fill="#f1f5f9" font-size="26" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">비트코인 재무부</text>
    <text x="34" y="100" fill="#94a3b8" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">672,500 BTC · 취득원가 $50.44B · 장부가 $58.85B</text>
    <circle cx="148" cy="236" r="94" fill="#f59e0b" opacity="0.18"/>
    <circle cx="148" cy="236" r="68" fill="#fbbf24"/>
    <text x="125" y="254" fill="#0a0e1a" font-size="52" font-weight="900" font-family="-apple-system, Segoe UI, sans-serif">₿</text>
    <text x="285" y="202" fill="#f1f5f9" font-size="60" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">$58.85B</text>
    <text x="288" y="240" fill="#94a3b8" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">2025년 말 digital asset carrying value</text>
    <line x1="288" y1="286" x2="606" y2="286" stroke="#334155" stroke-width="2"/>
    <text x="288" y="330" fill="#ef4444" font-size="30" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">2026 Q1: -$14.46B</text>
    <text x="288" y="362" fill="#cbd5e1" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">비트코인 가격 하락이면 본업과 무관하게 손익이 뒤집힌다</text>
  </g>
  <path d="M397 377 C430 377 421 377 448 377" stroke="#fbbf24" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#fbbf24"/></marker>
  </defs>
  <text x="82" y="632" fill="#fbbf24" font-size="20" font-weight="750" font-family="-apple-system, Segoe UI, sans-serif">관통선: 소프트웨어 손익은 바닥 소음이고, 공정가치 회계가 분기 실적의 볼륨을 잡는다.</text>
</svg>
