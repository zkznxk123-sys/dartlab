<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="58" y="78" fill="#f1f5f9" font-size="32" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">MSTR을 볼 때 손익보다 먼저 봐야 할 6개</text>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="20">
    <rect x="58" y="130" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="86" y="170" fill="#fbbf24" font-weight="800">1. BTC 보유량</text>
    <text x="86" y="200" fill="#cbd5e1" font-size="16">672,500 BTC → 766,970 BTC로 증가</text>
    <rect x="567" y="130" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="595" y="170" fill="#fbbf24" font-weight="800">2. 평균 취득원가</text>
    <text x="595" y="200" fill="#cbd5e1" font-size="16">$74,997 → $75,644 근처</text>
    <rect x="58" y="255" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="86" y="295" fill="#fbbf24" font-weight="800">3. 공정가치 손익</text>
    <text x="86" y="325" fill="#cbd5e1" font-size="16">2025 -$5.40B, 2026Q1 -$14.46B</text>
    <rect x="567" y="255" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="595" y="295" fill="#fbbf24" font-weight="800">4. 희석과 BTC per share</text>
    <text x="595" y="325" fill="#cbd5e1" font-size="16">BTC 수보다 주당 BTC가 중요</text>
    <rect x="58" y="380" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="86" y="420" fill="#fbbf24" font-weight="800">5. 우선주 배당·이자</text>
    <text x="86" y="450" fill="#cbd5e1" font-size="16">소프트웨어 OCF로는 고정비 감당 제한</text>
    <rect x="567" y="380" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="595" y="420" fill="#fbbf24" font-weight="800">6. 세금과 valuation allowance</text>
    <text x="595" y="450" fill="#cbd5e1" font-size="16">DTA·DTL이 BTC 종가에 같이 흔들림</text>
  </g>
  <rect x="116" y="560" width="848" height="86" rx="18" fill="#172033" stroke="#fbbf24"/>
  <text x="152" y="612" fill="#f1f5f9" font-size="22" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">MSTR의 질문은 “순이익 얼마?”가 아니라 “이 자본 구조가 BTC 변동을 견디며 주당 BTC를 늘리나?”다.</text>
</svg>
