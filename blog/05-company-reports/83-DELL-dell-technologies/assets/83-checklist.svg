<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="58" y="78" fill="#f1f5f9" font-size="32" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">DELL을 볼 때 EPS보다 먼저 볼 6개</text>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="20">
    <rect x="58" y="130" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="86" y="170" fill="#fbbf24" font-weight="800">1. AI 서버 매출</text>
    <text x="86" y="200" fill="#cbd5e1" font-size="16">$24.7B → FY27 가이던스 약 $50B</text>
    <rect x="567" y="130" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="595" y="170" fill="#fbbf24" font-weight="800">2. 제품 gross margin</text>
    <text x="595" y="200" fill="#cbd5e1" font-size="16">15.8% → 13.7% 하락</text>
    <rect x="58" y="255" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="86" y="295" fill="#fbbf24" font-weight="800">3. ISG 영업마진</text>
    <text x="86" y="325" fill="#cbd5e1" font-size="16">12.8% → 11.7%, 성장 속 마진 압박</text>
    <rect x="567" y="255" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="595" y="295" fill="#fbbf24" font-weight="800">4. 운전자본</text>
    <text x="595" y="325" fill="#cbd5e1" font-size="16">재고·채권·매입채무 타이밍</text>
    <rect x="58" y="380" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="86" y="420" fill="#fbbf24" font-weight="800">5. FCF와 환원</text>
    <text x="86" y="450" fill="#cbd5e1" font-size="16">FCF $8.55B, 환원 $7.5B</text>
    <rect x="567" y="380" width="455" height="95" rx="16" fill="#111f33" stroke="#334155"/>
    <text x="595" y="420" fill="#fbbf24" font-weight="800">6. 부채와 DFS</text>
    <text x="595" y="450" fill="#cbd5e1" font-size="16">총부채·고객금융이 현금흐름을 흔든다</text>
  </g>
  <rect x="105" y="560" width="870" height="86" rx="18" fill="#172033" stroke="#fbbf24"/>
  <text x="142" y="612" fill="#f1f5f9" font-size="22" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">Dell의 질문은 “AI 수요가 있나?”가 아니라 “AI 수요를 얼마의 마진과 현금으로 바꾸나?”다.</text>
</svg>
