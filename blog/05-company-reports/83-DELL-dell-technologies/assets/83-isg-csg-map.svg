    <text x="36" y="205" fill="#94a3b8" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">매출 +5%</text>
    <text x="34" y="278" fill="#f59e0b" font-size="44" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">$2.8B</text>
