  <text x="86" y="640" fill="#fbbf24" font-size="21" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">ISG가 성장 엔진이 됐지만, 그 안에서도 AI 서버는 대형고객·부품·가격경쟁의 영향을 크게 받는다.</text>
