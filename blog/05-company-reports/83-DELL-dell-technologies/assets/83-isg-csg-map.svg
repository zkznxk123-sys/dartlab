    <text x="34" y="98" fill="#94a3b8" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">Infrastructure Solutions Group</text>
    <text x="34" y="172" fill="#3b82f6" font-size="54" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">$60.8B</text>
    <text x="36" y="205" fill="#94a3b8" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">매출 +40%</text>
    <text x="34" y="278" fill="#22c55e" font-size="44" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">$7.1B</text>
    <text x="36" y="310" fill="#94a3b8" font-size="17" font-family="-apple-system, Segoe UI, sans-serif">영업이익률 11.7%</text>
  </g>
  <g transform="translate(616 150)">
    <rect width="500" height="420" rx="24" fill="#101827" stroke="#334155"/>
    <text x="34" y="62" fill="#f1f5f9" font-size="30" font-weight="850" font-family="-apple-system, Segoe UI, sans-serif">CSG</text>
    <text x="34" y="98" fill="#94a3b8" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">Client Solutions Group</text>
