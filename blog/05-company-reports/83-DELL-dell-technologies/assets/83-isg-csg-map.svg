<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="70" y="82" fill="#f1f5f9" font-size="34" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">Dell은 PC 회사에서 AI 인프라 회사로 무게중심이 이동 중</text>
  <g transform="translate(86 150)">
