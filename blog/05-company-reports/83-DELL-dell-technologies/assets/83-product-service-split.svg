<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="72" y="82" fill="#f1f5f9" font-size="34" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">제품 매출이 커질수록 총마진은 희석된다</text>
  <text x="72" y="120" fill="#94a3b8" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">FY2026 제품 매출 $90.4B, 서비스 매출 $23.1B. 제품 gross margin은 13.7%, 서비스는 44.8%.</text>
  <g transform="translate(90 175)">
    <rect x="0" y="0" width="470" height="430" rx="22" fill="#101827" stroke="#334155"/>
    <text x="32" y="58" fill="#f1f5f9" font-size="26" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">매출 비중</text>
    <rect x="54" y="120" width="360" height="54" rx="10" fill="#1e293b"/>
    <rect x="54" y="120" width="286" height="54" rx="10" fill="#3b82f6"/>
    <text x="54" y="210" fill="#3b82f6" font-size="32" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">제품 79.6%</text>
    <text x="54" y="254" fill="#22c55e" font-size="32" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">서비스 20.4%</text>
    <text x="54" y="330" fill="#cbd5e1" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">AI 서버는 제품 매출을 밀어 올린다.</text>
    <text x="54" y="360" fill="#cbd5e1" font-size="18" font-family="-apple-system, Segoe UI, sans-serif">하지만 제품은 서비스보다 훨씬 낮은 마진이다.</text>
  </g>
  <g transform="translate(640 175)">
    <rect x="0" y="0" width="470" height="430" rx="22" fill="#101827" stroke="#334155"/>
    <text x="32" y="58" fill="#f1f5f9" font-size="26" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">Gross margin</text>
    <rect x="54" y="115" width="360" height="54" rx="10" fill="#1e293b"/>
    <rect x="54" y="115" width="110" height="54" rx="10" fill="#ef4444"/>
    <text x="54" y="205" fill="#ef4444" font-size="32" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">제품 13.7%</text>
    <rect x="54" y="260" width="360" height="54" rx="10" fill="#1e293b"/>
    <rect x="54" y="260" width="322" height="54" rx="10" fill="#22c55e"/>
    <text x="54" y="350" fill="#22c55e" font-size="32" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">서비스 44.8%</text>
  </g>
  <text x="90" y="685" fill="#fbbf24" font-size="22" font-weight="800" font-family="-apple-system, Segoe UI, sans-serif">AI 서버는 고성장 제품이지만, 서비스처럼 높은 마진을 주지 않는다. 이게 Dell 재무제표의 첫 번째 반전이다.</text>
</svg>
