<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">포스코퓨처엠 자산 빌드아웃</title>
  <desc id="desc">총자산과 유형자산이 2021년 이후 빠르게 늘어난 모습</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="70" y="85" fill="#0f172a" font-family="-apple-system, Segoe UI, sans-serif" font-size="38" font-weight="850">성장주는 장치산업이 됐다</text>
  <text x="70" y="124" fill="#475569" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">총자산 9.14조, 유형자산 6.25조. 공장이 손익보다 먼저 커진다.</text>
  <g transform="translate(120 165)" font-family="-apple-system, Segoe UI, sans-serif">
    <line x1="0" y1="360" x2="940" y2="360" stroke="#cbd5e1"/>
    <g fill="#1d4ed8" opacity="0.82">
      <rect x="70" y="206" width="70" height="154"/>
      <rect x="250" y="178" width="70" height="182"/>
      <rect x="430" y="98" width="70" height="262"/>
      <rect x="610" y="32" width="70" height="328"/>
      <rect x="790" y="-18" width="70" height="378"/>
    </g>
    <g fill="#22c55e" opacity="0.9">
      <rect x="145" y="302" width="70" height="58"/>
      <rect x="325" y="273" width="70" height="87"/>
      <rect x="505" y="221" width="70" height="139"/>
      <rect x="685" y="146" width="70" height="214"/>
      <rect x="865" y="101" width="70" height="259"/>
    </g>
    <g fill="#0f172a" font-size="17" font-weight="700" text-anchor="middle">
      <text x="142" y="400">2021</text>
      <text x="322" y="400">2022</text>
      <text x="502" y="400">2023</text>
      <text x="682" y="400">2024</text>
      <text x="862" y="400">2025</text>
    </g>
    <g fill="#0f172a" font-size="15" text-anchor="middle">
      <text x="105" y="195">3.92조</text><text x="285" y="167">4.64조</text><text x="465" y="87">6.33조</text><text x="645" y="21">7.93조</text><text x="825" y="-29">9.14조</text>
      <text x="180" y="292">1.46조</text><text x="360" y="263">2.10조</text><text x="540" y="211">3.36조</text><text x="720" y="136">5.16조</text><text x="900" y="91">6.25조</text>
    </g>
  </g>
  <rect x="780" y="82" width="22" height="22" fill="#1d4ed8"/><text x="813" y="100" fill="#334155" font-family="-apple-system, Segoe UI, sans-serif" font-size="17">총자산</text>
  <rect x="900" y="82" width="22" height="22" fill="#22c55e"/><text x="933" y="100" fill="#334155" font-family="-apple-system, Segoe UI, sans-serif" font-size="17">유형자산</text>
</svg>
