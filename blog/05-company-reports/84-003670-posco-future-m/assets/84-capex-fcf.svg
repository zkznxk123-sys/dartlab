<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">포스코퓨처엠 CAPEX와 FCF</title>
  <desc id="desc">2021년부터 2025년까지 CAPEX는 커지고 FCF는 계속 음수</desc>
  <rect width="1200" height="630" fill="#111827"/>
  <text x="70" y="82" fill="#f8fafc" font-family="-apple-system, Segoe UI, sans-serif" font-size="38" font-weight="850">CAPEX가 이익보다 먼저 온 5년</text>
  <text x="70" y="122" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">단위: 조원 · CAPEX는 양수 막대, FCF는 음수 막대</text>
  <g transform="translate(95 160)" font-family="-apple-system, Segoe UI, sans-serif">
    <line x1="0" y1="250" x2="1010" y2="250" stroke="#475569"/>
    <g fill="#fb923c">
