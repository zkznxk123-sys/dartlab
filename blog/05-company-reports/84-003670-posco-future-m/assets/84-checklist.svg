<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">포스코퓨처엠 체크리스트</title>
  <desc id="desc">2026년 이후 볼 핵심 숫자 6개</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="70" y="82" fill="#0f172a" font-family="-apple-system, Segoe UI, sans-serif" font-size="38" font-weight="850">2026년에 볼 6개 숫자</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <g fill="#ffffff" stroke="#cbd5e1">
      <rect x="75" y="135" width="500" height="95" rx="14"/><rect x="625" y="135" width="500" height="95" rx="14"/>
      <rect x="75" y="260" width="500" height="95" rx="14"/><rect x="625" y="260" width="500" height="95" rx="14"/>
      <rect x="75" y="385" width="500" height="95" rx="14"/><rect x="625" y="385" width="500" height="95" rx="14"/>
    </g>
    <g fill="#0f172a" font-size="22" font-weight="850">
      <text x="115" y="177">1. 에너지소재 매출 2조 복귀</text>
      <text x="665" y="177">2. OPM 3% 방어선</text>
      <text x="115" y="302">3. CAPEX 피크아웃</text>
      <text x="665" y="302">4. OCF 플러스 안정</text>
      <text x="115" y="427">5. 음극재 출하와 이익</text>
      <text x="665" y="427">6. 그룹 지원과 희석</text>
    </g>
    <g fill="#64748b" font-size="16">
      <text x="115" y="205">2025년 1.57조에서 회복되는가</text>
      <text x="665" y="205">1%대 마진으로는 CAPEX를 감당하기 어렵다</text>
      <text x="115" y="330">투자 규모가 매출 성장보다 빨리 줄어드는가</text>
      <text x="665" y="330">순이익보다 현금흐름 회복이 먼저다</text>
      <text x="115" y="455">1조원 계약이 손익으로 바뀌는가</text>
      <text x="665" y="455">안전망이면서 자본효율의 부담</text>
    </g>
  </g>
</svg>
