<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">EV 캐즘 전달 경로</title>
  <desc id="desc">EV 수요 둔화가 소재 회사 손익과 현금흐름으로 전달되는 순서</desc>
  <rect width="1200" height="630" fill="#0f172a"/>
  <text x="70" y="88" fill="#f8fafc" font-family="-apple-system, Segoe UI, sans-serif" font-size="38" font-weight="850">EV 캐즘은 가격표를 먼저 바꾼다</text>
  <text x="70" y="126" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">수요 둔화는 소재 회사에 판가, 재고, 가동률, 현금흐름 순서로 전달된다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="19" font-weight="800">
    <g fill="#1e293b" stroke="#475569">
      <rect x="70" y="230" width="170" height="100" rx="16"/><rect x="265" y="230" width="170" height="100" rx="16"/><rect x="460" y="230" width="170" height="100" rx="16"/>
      <rect x="655" y="230" width="170" height="100" rx="16"/><rect x="850" y="230" width="170" height="100" rx="16"/>
    </g>
    <g fill="#f8fafc" text-anchor="middle">
      <text x="155" y="275">EV 수요</text><text x="155" y="303">감속</text>
      <text x="350" y="275">금속 가격</text><text x="350" y="303">하락</text>
      <text x="545" y="275">양극재 판가</text><text x="545" y="303">하락</text>
      <text x="740" y="275">재고평가</text><text x="740" y="303">부담</text>
      <text x="935" y="275">가동률·현금</text><text x="935" y="303">압박</text>
    </g>
    <g stroke="#fb923c" stroke-width="5" marker-end="url(#arrow)">
      <path d="M240 280 H260"/><path d="M435 280 H455"/><path d="M630 280 H650"/><path d="M825 280 H845"/>
    </g>
  </g>
  <text x="600" y="440" text-anchor="middle" fill="#e2e8f0" font-family="-apple-system, Segoe UI, sans-serif" font-size="25" font-weight="850">포스코퓨처엠의 2025년은 이 전달 경로의 한가운데 있다</text>
  <text x="600" y="482" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">매출 2.94조 · OPM 1.12% · OCF -336억</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fb923c"/></marker></defs>
</svg>
