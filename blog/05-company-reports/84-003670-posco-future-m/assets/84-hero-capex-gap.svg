<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">포스코퓨처엠 2025 관통선</title>
  <desc id="desc">영업이익 328억, CAPEX 1.50조, FCF -1.53조의 격차</desc>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="56" y="54" width="1088" height="522" rx="20" fill="#111827" stroke="#334155"/>
  <text x="96" y="125" fill="#f8fafc" font-family="-apple-system, Segoe UI, sans-serif" font-size="44" font-weight="800">포스코퓨처엠 2025</text>
  <text x="96" y="170" fill="#94a3b8" font-family="-apple-system, Segoe UI, sans-serif" font-size="22">이익보다 먼저 온 공장, 양극재 베팅의 가격</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="105" y="245" width="220" height="160" rx="14" fill="#064e3b"/>
    <text x="215" y="300" text-anchor="middle" fill="#bbf7d0" font-size="19" font-weight="700">영업이익</text>
    <text x="215" y="354" text-anchor="middle" fill="#f8fafc" font-size="42" font-weight="900">328억</text>
    <rect x="490" y="170" width="220" height="235" rx="14" fill="#7c2d12"/>
    <text x="600" y="240" text-anchor="middle" fill="#fed7aa" font-size="19" font-weight="700">CAPEX</text>
    <text x="600" y="305" text-anchor="middle" fill="#f8fafc" font-size="42" font-weight="900">1.50조</text>
    <rect x="875" y="170" width="220" height="235" rx="14" fill="#7f1d1d"/>
    <text x="985" y="240" text-anchor="middle" fill="#fecaca" font-size="19" font-weight="700">FCF</text>
    <text x="985" y="305" text-anchor="middle" fill="#f8fafc" font-size="42" font-weight="900">-1.53조</text>
    <path d="M330 325 H475" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
    <path d="M715 287 H860" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"/>
    <text x="600" y="472" text-anchor="middle" fill="#e2e8f0" font-size="25" font-weight="800">배터리 소재는 매출보다 공장이 먼저 온다</text>
    <text x="600" y="512" text-anchor="middle" fill="#94a3b8" font-size="18">2025 매출 2.94조 · 총자산 9.14조 · dCR-BBB-</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
