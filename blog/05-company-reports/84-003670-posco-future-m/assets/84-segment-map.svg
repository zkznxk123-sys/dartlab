<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">포스코퓨처엠 사업부 매출 지도</title>
  <desc id="desc">에너지소재, 라임화성, 내화물 3개 사업부 비중</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <text x="70" y="88" fill="#0f172a" font-family="-apple-system, Segoe UI, sans-serif" font-size="38" font-weight="850">2025 매출 2.94조의 3개 얼굴</text>
  <text x="70" y="126" fill="#475569" font-family="-apple-system, Segoe UI, sans-serif" font-size="18">에너지소재가 주인공이지만, 전통 소재 사업이 손익 방어선을 만든다</text>
  <g font-family="-apple-system, Segoe UI, sans-serif">
    <rect x="86" y="200" width="610" height="250" rx="18" fill="#dcfce7" stroke="#22c55e"/>
    <text x="126" y="265" fill="#14532d" font-size="30" font-weight="850">에너지소재사업부</text>
    <text x="126" y="325" fill="#166534" font-size="44" font-weight="900">1.57조</text>
    <text x="126" y="375" fill="#166534" font-size="22">53.6% · 양극재 + 음극재</text>
    <rect x="735" y="200" width="380" height="110" rx="16" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="765" y="245" fill="#075985" font-size="25" font-weight="800">라임화성사업</text>
    <text x="765" y="285" fill="#0369a1" font-size="32" font-weight="900">8,593억 · 29.2%</text>
    <rect x="735" y="340" width="380" height="110" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="765" y="385" fill="#78350f" font-size="25" font-weight="800">내화물사업</text>
    <text x="765" y="425" fill="#92400e" font-size="32" font-weight="900">5,053억 · 17.2%</text>
    <text x="600" y="535" text-anchor="middle" fill="#334155" font-size="24" font-weight="800">미래는 에너지소재, 버팀목은 포스코 생태계 소재</text>
  </g>
</svg>
