<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">SK스퀘어 자산 구조</title>
  <desc id="desc">2023년부터 2025년까지 자산과 자본이 늘어난 모습을 표시</desc>
  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="70" y="70" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">자산이 커진 이유는 공장이 아니라 지분 가치다</text>
  <text x="70" y="106" fill="#64748b" font-family="Arial, sans-serif" font-size="18">총자산: 17.97조 → 21.92조 → 30.50조 / 자기자본: 15.82조 → 19.59조 → 27.98조</text>
  <g transform="translate(170 160)" font-family="Arial, sans-serif">
    <g transform="translate(0 0)">
      <rect x="0" y="102" width="190" height="208" fill="#93c5fd"/>
      <rect x="0" y="80" width="190" height="22" fill="#1d4ed8"/>
      <text x="95" y="345" text-anchor="middle" fill="#334155" font-size="18">2023</text>
      <text x="95" y="70" text-anchor="middle" fill="#111827" font-size="20" font-weight="700">17.97조</text>
    </g>
    <g transform="translate(320 0)">
      <rect x="0" y="56" width="190" height="254" fill="#86efac"/>
      <rect x="0" y="34" width="190" height="22" fill="#16a34a"/>
      <text x="95" y="345" text-anchor="middle" fill="#334155" font-size="18">2024</text>
      <text x="95" y="24" text-anchor="middle" fill="#111827" font-size="20" font-weight="700">21.92조</text>
    </g>
    <g transform="translate(640 0)">
      <rect x="0" y="0" width="190" height="310" fill="#fcd34d"/>
      <rect x="0" y="284" width="190" height="26" fill="#f97316"/>
      <text x="95" y="345" text-anchor="middle" fill="#334155" font-size="18">2025</text>
      <text x="95" y="-12" text-anchor="middle" fill="#111827" font-size="20" font-weight="700">30.50조</text>
    </g>
  </g>
  <rect x="840" y="126" width="18" height="18" fill="#fcd34d"/>
  <text x="868" y="141" fill="#334155" font-family="Arial, sans-serif" font-size="18">대부분 자기자본</text>
  <rect x="840" y="158" width="18" height="18" fill="#f97316"/>
  <text x="868" y="173" fill="#334155" font-family="Arial, sans-serif" font-size="18">부채 2.52조</text>
</svg>
