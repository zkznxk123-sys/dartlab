<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">SK스퀘어 체크리스트</title>
  <desc id="desc">SK스퀘어 투자자가 확인할 여섯 가지 질문</desc>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="70" y="72" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">2026년에 볼 체크리스트</text>
  <g font-family="Arial, sans-serif" font-size="23" fill="#111827">
    <g transform="translate(90 130)"><circle cx="20" cy="20" r="20" fill="#22c55e"/><text x="20" y="28" text-anchor="middle" fill="#fff" font-weight="700">1</text><text x="65" y="28">SK하이닉스 이익이 지분법으로 얼마나 유지되는가</text></g>
    <g transform="translate(90 205)"><circle cx="20" cy="20" r="20" fill="#22c55e"/><text x="20" y="28" text-anchor="middle" fill="#fff" font-weight="700">2</text><text x="65" y="28">ICT 포트폴리오 적자가 실제로 줄어드는가</text></g>
    <g transform="translate(90 280)"><circle cx="20" cy="20" r="20" fill="#22c55e"/><text x="20" y="28" text-anchor="middle" fill="#fff" font-weight="700">3</text><text x="65" y="28">비핵심 지분 정리가 현금과 NAV로 바뀌는가</text></g>
    <g transform="translate(90 355)"><circle cx="20" cy="20" r="20" fill="#22c55e"/><text x="20" y="28" text-anchor="middle" fill="#fff" font-weight="700">4</text><text x="65" y="28">신규 AI·반도체 투자가 하이닉스와 연결되는가</text></g>
    <g transform="translate(90 430)"><circle cx="20" cy="20" r="20" fill="#22c55e"/><text x="20" y="28" text-anchor="middle" fill="#fff" font-weight="700">5</text><text x="65" y="28">자사주 매입·소각이 반복 가능한 정책인가</text></g>
    <g transform="translate(90 505)"><circle cx="20" cy="20" r="20" fill="#22c55e"/><text x="20" y="28" text-anchor="middle" fill="#fff" font-weight="700">6</text><text x="65" y="28">NAV 할인율이 줄어드는 속도가 실적보다 빠른가</text></g>
  </g>
</svg>
