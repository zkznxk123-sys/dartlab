<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">SK스퀘어 사이클 리스크</title>
  <desc id="desc">HBM 수요, SK하이닉스 이익, 지분법이익, SK스퀘어 순자산가치로 이어지는 경로</desc>
  <rect width="1200" height="520" fill="#0b1120"/>
  <text x="70" y="70" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">좋은 해에는 레버리지처럼 보이고, 나쁜 해에는 할인처럼 보인다</text>
  <g transform="translate(90 155)" font-family="Arial, sans-serif" text-anchor="middle">
    <g>
      <circle cx="90" cy="110" r="82" fill="#1e40af"/>
      <text x="90" y="100" fill="#fff" font-size="22" font-weight="700">AI 메모리</text>
      <text x="90" y="130" fill="#bfdbfe" font-size="16">HBM·eSSD</text>
    </g>
    <g transform="translate(260 0)">
      <circle cx="90" cy="110" r="82" fill="#15803d"/>
      <text x="90" y="100" fill="#fff" font-size="22" font-weight="700">하이닉스</text>
      <text x="90" y="130" fill="#bbf7d0" font-size="16">이익 사이클</text>
    </g>
    <g transform="translate(520 0)">
      <circle cx="90" cy="110" r="82" fill="#b45309"/>
      <text x="90" y="100" fill="#fff" font-size="22" font-weight="700">지분법</text>
      <text x="90" y="130" fill="#fde68a" font-size="16">손익계산서</text>
    </g>
    <g transform="translate(780 0)">
      <circle cx="90" cy="110" r="82" fill="#7e22ce"/>
      <text x="90" y="100" fill="#fff" font-size="22" font-weight="700">NAV</text>
      <text x="90" y="130" fill="#e9d5ff" font-size="16">할인율</text>
    </g>
  </g>
  <path d="M250 265H330M510 265H590M770 265H850" stroke="#94a3b8" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <text x="90" y="435" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">그래서 SK스퀘어의 밸류에이션은 보유자산 가격, 할인율, 자본배치가 동시에 결정한다.</text>
</svg>
