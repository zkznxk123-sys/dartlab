<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SK스퀘어 2025 관통선</title>
  <desc id="desc">매출 1.41조, 영업이익 8.80조, 지분법이익 8.93조를 비교한 도해</desc>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="70" y="70" width="1060" height="490" rx="8" fill="#111827" stroke="#334155"/>
  <text x="100" y="125" fill="#f8fafc" font-family="Arial, sans-serif" font-size="42" font-weight="700">SK스퀘어 2025</text>
  <text x="100" y="166" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">매출보다 큰 영업이익은 어디서 왔나</text>
  <g transform="translate(100 235)">
    <rect x="0" y="0" width="250" height="220" rx="8" fill="#1e293b"/>
    <text x="28" y="54" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">매출</text>
    <text x="28" y="118" fill="#38bdf8" font-family="Arial, sans-serif" font-size="48" font-weight="700">1.41조</text>
    <text x="28" y="162" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">ICT 포트폴리오와 투자회사 수익</text>
  </g>
  <g transform="translate(475 235)">
    <rect x="0" y="0" width="250" height="220" rx="8" fill="#1e293b"/>
    <text x="28" y="54" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">지분법이익</text>
    <text x="28" y="118" fill="#22c55e" font-family="Arial, sans-serif" font-size="48" font-weight="700">8.93조</text>
    <text x="28" y="162" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">SK하이닉스 이익이 장부로 유입</text>
  </g>
  <g transform="translate(850 235)">
    <rect x="0" y="0" width="250" height="220" rx="8" fill="#1e293b"/>
    <text x="28" y="54" fill="#94a3b8" font-family="Arial, sans-serif" font-size="20">영업이익</text>
    <text x="28" y="118" fill="#f59e0b" font-family="Arial, sans-serif" font-size="48" font-weight="700">8.80조</text>
    <text x="28" y="162" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">매출총이익보다 지분법이 더 큼</text>
  </g>
  <path d="M350 345H455" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
  <path d="M725 345H830" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="100" y="520" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="22" font-weight="700">핵심 질문: SK스퀘어는 ICT 투자회사인가, SK하이닉스 20.07% 지분의 가격표인가?</text>
</svg>
