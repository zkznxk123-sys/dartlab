<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">SK스퀘어 NAV 할인 예시</title>
  <desc id="desc">SK하이닉스 지분가치, 비상장 포트폴리오, 현금, 시가총액을 비교한 순자산가치 할인 도해</desc>
  <rect width="1200" height="560" fill="#fff"/>
  <text x="70" y="70" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">NAV 할인은 손익보다 더 직접적인 주가 질문이다</text>
  <text x="70" y="106" fill="#64748b" font-family="Arial, sans-serif" font-size="18">예시: 2026년 3월 31일 리서치 추정치 기준, 단위 조원</text>
  <g transform="translate(90 170)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="210" height="250" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="105" y="55" text-anchor="middle" fill="#1e3a8a" font-size="24" font-weight="700">상장자산</text>
    <text x="105" y="122" text-anchor="middle" fill="#1d4ed8" font-size="44" font-weight="800">88.0</text>
    <text x="105" y="166" text-anchor="middle" fill="#334155" font-size="18">대부분 SK하이닉스</text>
    <rect x="260" y="155" width="210" height="95" fill="#dcfce7" stroke="#22c55e"/>
    <text x="365" y="130" text-anchor="middle" fill="#14532d" font-size="24" font-weight="700">비상장</text>
    <text x="365" y="215" text-anchor="middle" fill="#15803d" font-size="40" font-weight="800">3.4</text>
    <rect x="520" y="172" width="210" height="78" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="625" y="150" text-anchor="middle" fill="#78350f" font-size="24" font-weight="700">현금</text>
    <text x="625" y="225" text-anchor="middle" fill="#b45309" font-size="40" font-weight="800">1.2</text>
    <text x="775" y="130" fill="#334155" font-size="34" font-weight="700">≈ NAV 93.3조</text>
    <rect x="775" y="175" width="250" height="115" fill="#fee2e2" stroke="#ef4444"/>
    <text x="900" y="220" text-anchor="middle" fill="#991b1b" font-size="24" font-weight="700">시가총액</text>
    <text x="900" y="270" text-anchor="middle" fill="#dc2626" font-size="42" font-weight="800">61.6조</text>
    <text x="775" y="345" fill="#334155" font-size="24">할인율 예시: 약 34%</text>
    <text x="775" y="385" fill="#64748b" font-size="18">좋은 자산을 들고 있어도, 시장은 바로 1:1로 가격을 주지 않는다.</text>
  </g>
</svg>
