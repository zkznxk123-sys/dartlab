<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">SK스퀘어 포트폴리오 지도</title>
  <desc id="desc">SK하이닉스, ICT 포트폴리오, 신규투자, 주주환원을 네 축으로 표시</desc>
  <rect width="1200" height="560" fill="#f1f5f9"/>
  <text x="70" y="68" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="700">SK스퀘어를 네 덩어리로 나누면 보인다</text>
  <g font-family="Arial, sans-serif">
    <rect x="80" y="130" width="500" height="150" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="110" y="172" fill="#1e3a8a" font-size="26" font-weight="700">SK하이닉스 지분 20.07%</text>
    <text x="110" y="212" fill="#334155" font-size="19">2025년 이익 대부분을 만든 핵심 자산</text>
    <text x="110" y="244" fill="#334155" font-size="19">HBM·eSSD 사이클이 SK스퀘어 손익을 흔든다</text>
    <rect x="620" y="130" width="500" height="150" rx="8" fill="#dcfce7" stroke="#22c55e"/>
    <text x="650" y="172" fill="#14532d" font-size="26" font-weight="700">ICT 포트폴리오</text>
    <text x="650" y="212" fill="#334155" font-size="19">티맵모빌리티, 원스토어, SK플래닛 등</text>
    <text x="650" y="244" fill="#334155" font-size="19">적자 축소와 구조조정이 실제 경영 성과</text>
    <rect x="80" y="330" width="500" height="150" rx="8" fill="#ffedd5" stroke="#fb923c"/>
    <text x="110" y="372" fill="#7c2d12" font-size="26" font-weight="700">AI·반도체 신규투자</text>
    <text x="110" y="412" fill="#334155" font-size="19">하이닉스 생태계 주변 병목에 투자</text>
    <text x="110" y="444" fill="#334155" font-size="19">성공하면 지주사 할인 축소, 실패하면 비용</text>
    <rect x="620" y="330" width="500" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="650" y="372" fill="#78350f" font-size="26" font-weight="700">주주환원·자본배치</text>
    <text x="650" y="412" fill="#334155" font-size="19">자사주 매입·소각, 비핵심 지분 정리</text>
    <text x="650" y="444" fill="#334155" font-size="19">NAV 할인율을 줄이는 실행의 문제</text>
  </g>
</svg>
