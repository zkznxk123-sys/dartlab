<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">SK스퀘어 주주환원 연표</title>
  <desc id="desc">2023년부터 2026년까지 SK스퀘어 자사주 매입과 소각 흐름</desc>
  <rect width="1200" height="560" fill="#0f172a"/>
  <text x="70" y="72" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">할인율을 줄이는 행동: 매입하고, 소각하고, 반복한다</text>
  <text x="70" y="108" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">SK Square IR 주주환원 페이지 기준</text>
  <line x1="120" y1="290" x2="1080" y2="290" stroke="#64748b" stroke-width="4"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(170 0)">
      <circle cx="0" cy="290" r="16" fill="#38bdf8"/>
      <text x="0" y="220" fill="#f8fafc" font-size="24" font-weight="700">2023</text>
      <text x="0" y="255" fill="#bfdbfe" font-size="17">3,100억 결의</text>
      <text x="0" y="335" fill="#cbd5e1" font-size="17">2,670억 실행</text>
    </g>
    <g transform="translate(390 0)">
      <circle cx="0" cy="290" r="16" fill="#22c55e"/>
      <text x="0" y="220" fill="#f8fafc" font-size="24" font-weight="700">2024</text>
      <text x="0" y="255" fill="#bbf7d0" font-size="17">2,000억 결의</text>
      <text x="0" y="335" fill="#cbd5e1" font-size="17">1,550억 실행</text>
    </g>
    <g transform="translate(610 0)">
      <circle cx="0" cy="290" r="16" fill="#f59e0b"/>
      <text x="0" y="220" fill="#f8fafc" font-size="24" font-weight="700">2025 1H</text>
      <text x="0" y="255" fill="#fde68a" font-size="17">1,000억 결의</text>
      <text x="0" y="335" fill="#cbd5e1" font-size="17">900억 실행</text>
    </g>
    <g transform="translate(830 0)">
      <circle cx="0" cy="290" r="16" fill="#a78bfa"/>
      <text x="0" y="220" fill="#f8fafc" font-size="24" font-weight="700">2026.04</text>
      <text x="0" y="255" fill="#ddd6fe" font-size="17">1,000억 매입</text>
      <text x="0" y="335" fill="#cbd5e1" font-size="17">소각 완료</text>
    </g>
    <g transform="translate(1030 0)">
      <circle cx="0" cy="290" r="16" fill="#fb7185"/>
      <text x="0" y="220" fill="#f8fafc" font-size="24" font-weight="700">2026.03~06</text>
      <text x="0" y="255" fill="#fecdd3" font-size="17">400억 매입</text>
      <text x="0" y="335" fill="#cbd5e1" font-size="17">진행 구간</text>
    </g>
  </g>
  <text x="90" y="455" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="22">지주회사 할인은 말로 줄지 않는다. 반복되는 매입·소각과 포트폴리오 정리가 할인율을 움직인다.</text>
</svg>
