<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">2018.4 CJ헬스케어 1.31조 인수의 BS 변화</title>
  <desc id="desc">2017Q4 → 2018Q4 자산 3.3배·차입 4.1배·무형자산 19.8배·비지배 13.5배 폭증.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="70" y="60" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="32" font-weight="700">2018년 4월 4일 — 화장품 ODM이 제약회사를 사다</text>
  <text x="70" y="98" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="20">CJ헬스케어 1조 3,100억 인수 → 자산 3.3배 폭증</text>

  <!-- 2017Q4 회사 (좌측) -->
  <text x="180" y="170" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="22" text-anchor="middle">2017Q4 — 인수 직전</text>

  <g font-family="-apple-system, sans-serif" font-size="16" fill="#cbd5e1">
    <!-- 자산 박스 -->
    <rect x="60" y="200" width="240" height="80" fill="#1e293b" stroke="#475569"/>
    <text x="180" y="232" text-anchor="middle">자산총계</text>
    <text x="180" y="262" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="700">6,685억</text>

    <!-- 부채 -->
    <rect x="60" y="300" width="240" height="60" fill="#1e293b" stroke="#475569"/>
    <text x="180" y="328" text-anchor="middle">부채 3,359억</text>
    <text x="180" y="350" text-anchor="middle" fill="#94a3b8" font-size="13">부채비율 64%</text>

    <!-- 자본 -->
    <rect x="60" y="380" width="240" height="80" fill="#1e293b" stroke="#475569"/>
    <text x="180" y="408" text-anchor="middle">자본 3,326억</text>
    <text x="180" y="430" text-anchor="middle" fill="#94a3b8" font-size="13">비지배지분 275억</text>
    <text x="180" y="450" text-anchor="middle" fill="#94a3b8" font-size="13">무형자산 580억</text>
  </g>

  <!-- 화살표 -->
  <g font-family="-apple-system, sans-serif" font-size="20" fill="#fbbf24">
    <line x1="320" y1="330" x2="600" y2="330" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" markerWidth="14" markerHeight="14" refX="14" refY="7" orient="auto">
        <polygon points="0 0, 14 7, 0 14" fill="#fbbf24"/>
      </marker>
    </defs>
    <text x="460" y="305" text-anchor="middle" fill="#fbbf24" font-weight="700">CJ헬스케어 1.31조</text>
    <text x="460" y="356" text-anchor="middle" fill="#fbbf24" font-size="16">차입 1.1조 + 비지배 0.34조 + 자기 0.14조</text>
  </g>

  <!-- 2018Q4 회사 (우측) -->
  <text x="980" y="170" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="22" text-anchor="middle">2018Q4 — 인수 직후</text>

  <g font-family="-apple-system, sans-serif" font-size="16" fill="#cbd5e1">
    <rect x="640" y="200" width="600" height="80" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
    <text x="940" y="232" text-anchor="middle" fill="#0a0e1a" font-weight="700">자산총계</text>
    <text x="940" y="262" text-anchor="middle" fill="#0a0e1a" font-size="26" font-weight="700">21,864억 (3.27배)</text>

    <rect x="640" y="300" width="600" height="60" fill="#ef4444" stroke="#ef4444"/>
    <text x="940" y="328" text-anchor="middle" fill="#0a0e1a" font-weight="700">부채 13,765억 (4.10배)</text>
    <text x="940" y="350" text-anchor="middle" fill="#0a0e1a" font-size="13">차입 11,069억 신규</text>

    <rect x="640" y="380" width="600" height="80" fill="#3b82f6" stroke="#3b82f6"/>
    <text x="940" y="408" text-anchor="middle" fill="#f1f5f9" font-weight="700">자본 8,098억 (2.43배)</text>
    <text x="940" y="430" text-anchor="middle" fill="#f1f5f9" font-size="13">비지배지분 3,715억 (13.51배)</text>
    <text x="940" y="450" text-anchor="middle" fill="#f1f5f9" font-size="13">무형자산 11,507억 (19.84배)</text>
  </g>

  <!-- 핵심 영향 박스 -->
  <text x="600" y="540" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" text-anchor="middle">이 인수가 9년 영업외에 깐 4가지 부담</text>

  <g font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">
    <!-- 박스 1 -->
    <rect x="60" y="570" width="270" height="110" fill="#1e293b" stroke="#fbbf24"/>
    <text x="195" y="600" text-anchor="middle" fill="#fbbf24" font-weight="700" font-size="16">① 차입 이자</text>
    <text x="195" y="630" text-anchor="middle" font-size="22" font-weight="700">540억/년</text>
    <text x="195" y="655" text-anchor="middle" fill="#94a3b8" font-size="13">차입 1.1조 × 평균 5%</text>
    <text x="195" y="673" text-anchor="middle" fill="#94a3b8" font-size="13">9년 누적 약 -4,300억</text>

    <!-- 박스 2 -->
    <rect x="350" y="570" width="270" height="110" fill="#1e293b" stroke="#fbbf24"/>
    <text x="485" y="600" text-anchor="middle" fill="#fbbf24" font-weight="700" font-size="16">② 영업권 손상</text>
    <text x="485" y="630" text-anchor="middle" font-size="22" font-weight="700">~1.1조</text>
    <text x="485" y="655" text-anchor="middle" fill="#94a3b8" font-size="13">매년 손상검사 → 손상 시</text>
    <text x="485" y="673" text-anchor="middle" fill="#94a3b8" font-size="13">영업외 비용 직격</text>

    <!-- 박스 3 -->
    <rect x="640" y="570" width="270" height="110" fill="#1e293b" stroke="#fbbf24"/>
    <text x="775" y="600" text-anchor="middle" fill="#fbbf24" font-weight="700" font-size="16">③ 비지배순이익</text>
    <text x="775" y="630" text-anchor="middle" font-size="22" font-weight="700">외부 LP 40%</text>
    <text x="775" y="655" text-anchor="middle" fill="#94a3b8" font-size="13">자회사 이익의 40%</text>
    <text x="775" y="673" text-anchor="middle" fill="#94a3b8" font-size="13">지배주주 순이익에서 차감</text>

    <!-- 박스 4 -->
    <rect x="930" y="570" width="270" height="110" fill="#1e293b" stroke="#fbbf24"/>
    <text x="1065" y="600" text-anchor="middle" fill="#fbbf24" font-weight="700" font-size="16">④ 외환 노출</text>
    <text x="1065" y="630" text-anchor="middle" font-size="22" font-weight="700">자회사 다국적</text>
    <text x="1065" y="655" text-anchor="middle" fill="#94a3b8" font-size="13">중국 무석·북경, 미국</text>
    <text x="1065" y="673" text-anchor="middle" fill="#94a3b8" font-size="13">원달러 변동 직격</text>
  </g>

  <!-- 결과 -->
  <rect x="60" y="710" width="1140" height="80" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="80" y="740" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">결과: 2018~2024 7년 연속 영업외 음수, 누적 약 -3,500억</text>
  <text x="80" y="765" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="14">본업 ODM의 영업이익 8년 누적 +9,200억의 약 38%가 영업외에서 새 나갔다.</text>
  <text x="80" y="783" fill="#22c55e" font-family="-apple-system, sans-serif" font-size="14">2025 영업외 -279억으로 평년치 대비 절반 이하 — 인수 회수 사이클의 첫 결실.</text>
</svg>
