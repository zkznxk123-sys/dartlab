<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">한국콜마 8년 사이클 7단계</title>
  <desc id="desc">2018 인수 → 2025 본업 압도까지 8년의 7단계 회계 사이클.</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>

  <text x="70" y="60" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="32" font-weight="700">8년 사이클 — 인수에서 본업 압도까지</text>
  <text x="70" y="98" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="20">2018 → 2025: 두 회계가 흐른 7단계</text>

  <!-- 시간선 라인 -->
  <line x1="80" y1="320" x2="1140" y2="320" stroke="#475569" stroke-width="2"/>

  <!-- 단계별 원 + 라벨 -->
  <g font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">
    <!-- ① 2018 인수 -->
    <circle cx="155" cy="320" r="20" fill="#fbbf24"/>
    <text x="155" y="326" text-anchor="middle" fill="#0a0e1a" font-weight="700">①</text>
    <text x="155" y="200" text-anchor="middle" fill="#fbbf24" font-weight="700" font-size="15">2018.4 인수</text>
    <text x="155" y="220" text-anchor="middle" font-size="12">CJ헬스케어 1.31조</text>
    <text x="155" y="238" text-anchor="middle" font-size="12">자산 3.3배·차입 1.1조</text>
    <text x="155" y="256" text-anchor="middle" fill="#94a3b8" font-size="11">두 회계 개시</text>

    <!-- ② 2018~2020 부담 흡수 -->
    <circle cx="295" cy="320" r="20" fill="#3b82f6"/>
    <text x="295" y="326" text-anchor="middle" fill="#fff" font-weight="700">②</text>
    <text x="295" y="380" text-anchor="middle" fill="#3b82f6" font-weight="700" font-size="15">2018~2020 흡수</text>
    <text x="295" y="402" text-anchor="middle" font-size="12">OPM 6.6 → 9.4%</text>
    <text x="295" y="420" text-anchor="middle" font-size="12">2020 자산매각 단발</text>
    <text x="295" y="438" text-anchor="middle" fill="#94a3b8" font-size="11">+1,606 순익 단발</text>

    <!-- ③ 2021~2022 본업 약화 -->
    <circle cx="435" cy="320" r="20" fill="#ef4444"/>
    <text x="435" y="326" text-anchor="middle" fill="#fff" font-weight="700">③</text>
    <text x="435" y="200" text-anchor="middle" fill="#ef4444" font-weight="700" font-size="15">2021~2022 본업 약화</text>
    <text x="435" y="220" text-anchor="middle" font-size="12">매출 +14~18%</text>
    <text x="435" y="238" text-anchor="middle" font-size="12">OPM 5.3 → 3.9%</text>
    <text x="435" y="256" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">2022 적자전환 -41</text>

    <!-- ④ 2022~2023 두 회계 동시 악화 -->
    <circle cx="575" cy="320" r="22" fill="#ef4444" stroke="#fbbf24" stroke-width="2"/>
    <text x="575" y="326" text-anchor="middle" fill="#fff" font-weight="700">④</text>
    <text x="575" y="380" text-anchor="middle" fill="#ef4444" font-weight="700" font-size="15">2022~2023 동시 악화</text>
    <text x="575" y="402" text-anchor="middle" font-size="12">매출원가율 75%</text>
    <text x="575" y="420" text-anchor="middle" font-size="12">영업외 -1,018 (최악)</text>
    <text x="575" y="438" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">흡수율 75~77%</text>

    <!-- ⑤ 2023~2024 V자 시작 -->
    <circle cx="715" cy="320" r="20" fill="#fbbf24"/>
    <text x="715" y="326" text-anchor="middle" fill="#0a0e1a" font-weight="700">⑤</text>
    <text x="715" y="200" text-anchor="middle" fill="#fbbf24" font-weight="700" font-size="15">2023~2024 V자</text>
    <text x="715" y="220" text-anchor="middle" font-size="12">DOL +5.52 폭발</text>
    <text x="715" y="238" text-anchor="middle" font-size="12">매출원가율 -1.7%p</text>
    <text x="715" y="256" text-anchor="middle" fill="#fbbf24" font-size="11">K-뷰티 인디 폭발 시작</text>

    <!-- ⑥ 2024.5 HK이노엔 매각 -->
    <circle cx="855" cy="320" r="20" fill="#22c55e"/>
    <text x="855" y="326" text-anchor="middle" fill="#0a0e1a" font-weight="700">⑥</text>
    <text x="855" y="380" text-anchor="middle" fill="#22c55e" font-weight="700" font-size="15">2024.5 매각</text>
    <text x="855" y="402" text-anchor="middle" font-size="12">HK이노엔 일부 매각</text>
    <text x="855" y="420" text-anchor="middle" font-size="12">비지배 -569억</text>
    <text x="855" y="438" text-anchor="middle" fill="#94a3b8" font-size="11">인수 회수 시작</text>

    <!-- ⑦ 2025 본업 압도 -->
    <circle cx="1075" cy="320" r="25" fill="#22c55e" stroke="#fbbf24" stroke-width="3"/>
    <text x="1075" y="328" text-anchor="middle" fill="#0a0e1a" font-weight="700" font-size="14">⑦</text>
    <text x="1075" y="200" text-anchor="middle" fill="#22c55e" font-weight="700" font-size="16">2025 본업 압도</text>
    <text x="1075" y="220" text-anchor="middle" font-size="12">OPM 8.80% 사상 최대</text>
    <text x="1075" y="238" text-anchor="middle" font-size="12">영업외 흡수율 12%</text>
    <text x="1075" y="256" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">9년 최저 — 본업 첫 승</text>
  </g>

  <!-- 결과 박스 -->
  <rect x="80" y="510" width="1060" height="100" fill="#1e293b" stroke="#22c55e"/>
  <text x="100" y="540" fill="#22c55e" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">8년 누적 결과</text>
  <text x="100" y="567" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="14">본업: 매출 1.36조 → 2.72조 (2.0배), 영업이익 900억 → 2,396억 (2.7배), OPM 6.62% → 8.80% (+2.18%p)</text>
  <text x="100" y="588" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="14">인수 회계: 영업외 8년 누적 약 -3,500억, 무형자산 11,507 → 12,435억, 차입 1.1조 미상환 잔존</text>
  <text x="100" y="603" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="13">→ 본업이 인수 회계의 평균 잠식을 따라잡고 처음 압도한 해가 2025년.</text>
</svg>
