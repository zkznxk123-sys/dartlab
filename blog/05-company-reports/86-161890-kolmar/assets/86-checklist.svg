<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">한국콜마 2026년 추적 5가지</title>
  <desc id="desc">영업외 흡수율, 차입 이자, 매출원가율, 비지배지분, 코스맥스 비교 5개 체크포인트.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="70" y="60" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="32" font-weight="700">2026년에 봐야 할 다섯 가지</text>
  <text x="70" y="98" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="20">본업 V자가 일회성인지 구조 변화인지 확인할 5개 지표</text>

  <g font-family="-apple-system, sans-serif" font-size="16" fill="#cbd5e1">
    <!-- 1 -->
    <g transform="translate(80 140)">
      <circle cx="30" cy="30" r="30" fill="#22c55e"/>
      <text x="30" y="38" text-anchor="middle" fill="#0a0e1a" font-weight="700" font-size="22">1</text>
      <text x="80" y="22" fill="#f1f5f9" font-weight="700" font-size="20">영업외 흡수율 10% 이하 유지</text>
      <text x="80" y="50" fill="#cbd5e1" font-size="14">2025 12% → 2026 10%대 초반 유지하면 본업 압도가 구조 변화로 확인.</text>
      <text x="80" y="72" fill="#94a3b8" font-size="13">측정: 분기 IR 영업외 합계 / 영업이익. HK이노엔 잔여 매각 시 단발 +는 별도 분리.</text>
    </g>

    <!-- 2 -->
    <g transform="translate(80 250)">
      <circle cx="30" cy="30" r="30" fill="#22c55e"/>
      <text x="30" y="38" text-anchor="middle" fill="#0a0e1a" font-weight="700" font-size="22">2</text>
      <text x="80" y="22" fill="#f1f5f9" font-weight="700" font-size="20">인수 차입 540억 → 400억대 점진 감소</text>
      <text x="80" y="50" fill="#cbd5e1" font-size="14">단기차입 7,441억 + 사채 2,446억 = 9,887억의 일부를 매각 대금으로 상환.</text>
      <text x="80" y="72" fill="#94a3b8" font-size="13">측정: 분기 차입금 만기구조 + 이자비용 분기 시계열. 평균 5% × 잔여 차입.</text>
    </g>

    <!-- 3 -->
    <g transform="translate(80 360)">
      <circle cx="30" cy="30" r="30" fill="#22c55e"/>
      <text x="30" y="38" text-anchor="middle" fill="#0a0e1a" font-weight="700" font-size="22">3</text>
      <text x="80" y="22" fill="#f1f5f9" font-weight="700" font-size="20">매출원가율 70% 아래 진입</text>
      <text x="80" y="50" fill="#cbd5e1" font-size="14">2025 70.93% → 2026 70.0% 아래면 영업레버리지 정상 단계 진입.</text>
      <text x="80" y="72" fill="#94a3b8" font-size="13">측정: 매출원가율 -1%p ≈ 영업이익 +280억. 가동률·원자재·신규 라인.</text>
    </g>

    <!-- 4 -->
    <g transform="translate(80 470)">
      <circle cx="30" cy="30" r="30" fill="#22c55e"/>
      <text x="30" y="38" text-anchor="middle" fill="#0a0e1a" font-weight="700" font-size="22">4</text>
      <text x="80" y="22" fill="#f1f5f9" font-weight="700" font-size="20">비지배지분 7,570 → 6,000~6,500 정착</text>
      <text x="80" y="50" fill="#cbd5e1" font-size="14">HK이노엔 잔여 매각 완료 시 비지배지분 단계적 감소 → ODM 단일 회사 회귀.</text>
      <text x="80" y="72" fill="#94a3b8" font-size="13">측정: 비지배지분 분기 추이 + 무형자산 12,435 → 잔여 본업 무형자산만.</text>
    </g>

    <!-- 5 -->
    <g transform="translate(80 580)">
      <circle cx="30" cy="30" r="30" fill="#22c55e"/>
      <text x="30" y="38" text-anchor="middle" fill="#0a0e1a" font-weight="700" font-size="22">5</text>
      <text x="80" y="22" fill="#f1f5f9" font-weight="700" font-size="20">코스맥스 vs 한국콜마 영업외 청산 속도</text>
      <text x="80" y="50" fill="#cbd5e1" font-size="14">코스맥스 비지배 +542 → 1,000+, 금융비용 986 → 800대로 빨리 가는지.</text>
      <text x="80" y="72" fill="#94a3b8" font-size="13">측정: 두 회사 분기 영업외 합계 절대값 비교. 빨리 청산하는 쪽이 다음 1년 우위.</text>
    </g>
  </g>
</svg>
