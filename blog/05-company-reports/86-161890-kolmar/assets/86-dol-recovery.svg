<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">K-뷰티 인디 폭발의 ODM 영업레버리지 5.52배</title>
  <desc id="desc">DOL 시계열과 매출원가율 4년 연속 개선. 2022 바닥에서 2023~2025 V자 회복.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="70" y="60" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="32" font-weight="700">K-뷰티 인디 폭발 → ODM 본업의 5.52배 영업레버리지</text>
  <text x="70" y="98" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="20">매출 +1% 늘 때 영업이익 +5% 늘어난 첫 해, 2023</text>

  <!-- DOL 표 -->
  <text x="70" y="155" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="16">DOL (영업레버리지) — 매출 변화 1% 당 영업이익 변화</text>

  <g font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">
    <!-- 헤더 -->
    <text x="100" y="195" font-weight="700">연도</text>
    <text x="240" y="195" font-weight="700" text-anchor="end">매출 (조원)</text>
    <text x="380" y="195" font-weight="700" text-anchor="end">영업이익 (억)</text>
    <text x="520" y="195" font-weight="700" text-anchor="end">영업이익률</text>
    <text x="660" y="195" font-weight="700" text-anchor="end">DOL</text>
    <text x="800" y="195" font-weight="700">의미</text>

    <line x1="80" y1="205" x2="1180" y2="205" stroke="#475569"/>

    <!-- 2019 -->
    <text x="100" y="230">2019</text>
    <text x="240" y="230" text-anchor="end">1.54</text>
    <text x="380" y="230" text-anchor="end">1,178</text>
    <text x="520" y="230" text-anchor="end">7.65%</text>
    <text x="660" y="230" text-anchor="end" fill="#94a3b8">+2.30</text>
    <text x="800" y="230" fill="#94a3b8" font-size="13">정상 레버리지</text>

    <!-- 2020 -->
    <text x="100" y="260">2020</text>
    <text x="240" y="260" text-anchor="end">1.36</text>
    <text x="380" y="260" text-anchor="end">1,280</text>
    <text x="520" y="260" text-anchor="end">9.39%</text>
    <text x="660" y="260" text-anchor="end" fill="#94a3b8">-0.75</text>
    <text x="800" y="260" fill="#94a3b8" font-size="13">매출 감소 + 마스크 마진 강세</text>

    <!-- 2021 -->
    <text x="100" y="290">2021</text>
    <text x="240" y="290" text-anchor="end">1.59</text>
    <text x="380" y="290" text-anchor="end">843</text>
    <text x="520" y="290" text-anchor="end">5.31%</text>
    <text x="660" y="290" text-anchor="end" fill="#ef4444">-2.09</text>
    <text x="800" y="290" fill="#ef4444" font-size="13">매출 +14%인데 영업이익 -34%</text>

    <!-- 2022 (적자전환 강조) -->
    <text x="100" y="325" fill="#ef4444" font-weight="700">2022</text>
    <text x="240" y="325" text-anchor="end" fill="#ef4444" font-weight="700">1.87</text>
    <text x="380" y="325" text-anchor="end" fill="#ef4444" font-weight="700">733</text>
    <text x="520" y="325" text-anchor="end" fill="#ef4444" font-weight="700">3.93%</text>
    <text x="660" y="325" text-anchor="end" fill="#ef4444" font-weight="700">-0.74</text>
    <text x="800" y="325" fill="#ef4444" font-size="13" font-weight="700">바닥 — 영업이익률 9년 최저</text>

    <line x1="80" y1="340" x2="1180" y2="340" stroke="#fbbf24" stroke-dasharray="4,3"/>

    <!-- 2023 (V자 시작) -->
    <text x="100" y="370" fill="#22c55e" font-weight="700">2023</text>
    <text x="240" y="370" text-anchor="end" fill="#22c55e" font-weight="700">2.16</text>
    <text x="380" y="370" text-anchor="end" fill="#22c55e" font-weight="700">1,361</text>
    <text x="520" y="370" text-anchor="end" fill="#22c55e" font-weight="700">6.32%</text>
    <text x="660" y="370" text-anchor="end" fill="#22c55e" font-weight="700">+5.52</text>
    <text x="800" y="370" fill="#22c55e" font-size="13" font-weight="700">매출 +16%에 영업이익 +86%</text>

    <!-- 2024 -->
    <text x="100" y="400" fill="#22c55e">2024</text>
    <text x="240" y="400" text-anchor="end" fill="#22c55e">2.45</text>
    <text x="380" y="400" text-anchor="end" fill="#22c55e">1,939</text>
    <text x="520" y="400" text-anchor="end" fill="#22c55e">7.91%</text>
    <text x="660" y="400" text-anchor="end" fill="#22c55e">+3.08</text>
    <text x="800" y="400" fill="#22c55e" font-size="13">레버리지 가속 단계</text>

    <!-- 2025 -->
    <text x="100" y="430" fill="#22c55e" font-weight="700">2025</text>
    <text x="240" y="430" text-anchor="end" fill="#22c55e" font-weight="700">2.72</text>
    <text x="380" y="430" text-anchor="end" fill="#22c55e" font-weight="700">2,396</text>
    <text x="520" y="430" text-anchor="end" fill="#22c55e" font-weight="700">8.80%</text>
    <text x="660" y="430" text-anchor="end" fill="#22c55e" font-weight="700">+2.14</text>
    <text x="800" y="430" fill="#22c55e" font-size="13" font-weight="700">정상화 단계 — 사상 최대 영업이익</text>
  </g>

  <!-- 매출원가율 4년 연속 개선 박스 -->
  <text x="70" y="490" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="16">매출원가율 4년 연속 개선 — 누적 -3.94%p ≈ 영업이익 +1,073억 효과</text>

  <g font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1">
    <!-- 매출원가율 막대 (낮을수록 좋음) -->
    <rect x="100" y="540" width="80" height="120" fill="#ef4444"/>
    <text x="140" y="530" text-anchor="middle" fill="#ef4444" font-weight="700">74.87%</text>
    <text x="140" y="685" text-anchor="middle">2022</text>

    <rect x="200" y="557" width="80" height="103" fill="#fbbf24"/>
    <text x="240" y="547" text-anchor="middle" fill="#fbbf24" font-weight="700">73.18%</text>
    <text x="240" y="685" text-anchor="middle">2023</text>

    <rect x="300" y="574" width="80" height="86" fill="#fbbf24"/>
    <text x="340" y="564" text-anchor="middle" fill="#fbbf24" font-weight="700">71.50%</text>
    <text x="340" y="685" text-anchor="middle">2024</text>

    <rect x="400" y="580" width="80" height="80" fill="#22c55e"/>
    <text x="440" y="570" text-anchor="middle" fill="#22c55e" font-weight="700">70.93%</text>
    <text x="440" y="685" text-anchor="middle">2025</text>
  </g>

  <!-- 우측 메시지 박스 -->
  <rect x="540" y="510" width="640" height="170" fill="#1e293b" stroke="#22c55e"/>
  <text x="560" y="540" fill="#22c55e" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">3 가지 동시 회복 엔진</text>
  <text x="560" y="572" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="15">① 가동률 정상화 — 인디 브랜드 800+ 글로벌 매출 폭증</text>
  <text x="560" y="595" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="13">달바·메디큐브·라네즈·CNP·닥터지·셀퓨전씨 — 한국콜마 ODM 라인 풀가동</text>
  <text x="560" y="620" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="15">② 원자재 안정 — 향료·계면활성제·유지·포장재 인덱스 정상화</text>
  <text x="560" y="643" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="15">③ 판관비 레버리지 — 매출 두 배 늘어도 판관비율 20%대 유지</text>
  <text x="560" y="668" fill="#22c55e" font-family="-apple-system, sans-serif" font-size="14" font-weight="700">→ ROIC 1.66%(2022) → 7.40%(2025), WACC 7~8% 첫 통과</text>
</svg>
