<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">한국콜마 9년 — 영업이익 vs 영업외 흡수율</title>
  <desc id="desc">2017~2025 영업이익 곡선과 영업외 흡수율 시계열. 2025년 흡수율 12% 9년 최저 — 본업이 처음 영업외를 압도한 해.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- 제목 -->
  <text x="70" y="60" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700">매년 사상최대 영업이익이 영업외에서 새던 8년</text>
  <text x="70" y="98" fill="#fbbf24" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22">2025 흡수율 12% — 9년 최저, 본업이 처음 영업외를 이긴 해</text>

  <!-- 좌측 영업이익 곡선 영역 -->
  <text x="70" y="160" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="16">영업이익 (1년치 합산, 억원)</text>

  <!-- 영업이익 막대 -->
  <g font-family="-apple-system, sans-serif" font-size="13" fill="#cbd5e1">
    <!-- 670 -->
    <rect x="80" y="510" width="55" height="60" fill="#3b82f6"/>
    <text x="107" y="500" text-anchor="middle" fill="#cbd5e1">670</text>
    <text x="107" y="600" text-anchor="middle" fill="#94a3b8">2017</text>
    <!-- 900 -->
    <rect x="145" y="490" width="55" height="80" fill="#3b82f6"/>
    <text x="172" y="480" text-anchor="middle">900</text>
    <text x="172" y="600" text-anchor="middle" fill="#94a3b8">2018</text>
    <!-- 1178 -->
    <rect x="210" y="465" width="55" height="105" fill="#3b82f6"/>
    <text x="237" y="455" text-anchor="middle">1,178</text>
    <text x="237" y="600" text-anchor="middle" fill="#94a3b8">2019</text>
    <!-- 1280 -->
    <rect x="275" y="456" width="55" height="114" fill="#3b82f6"/>
    <text x="302" y="446" text-anchor="middle">1,280</text>
    <text x="302" y="600" text-anchor="middle" fill="#94a3b8">2020</text>
    <!-- 843 -->
    <rect x="340" y="495" width="55" height="75" fill="#3b82f6"/>
    <text x="367" y="485" text-anchor="middle">843</text>
    <text x="367" y="600" text-anchor="middle" fill="#94a3b8">2021</text>
    <!-- 733 (적자전환 강조) -->
    <rect x="405" y="505" width="55" height="65" fill="#ef4444"/>
    <text x="432" y="495" text-anchor="middle" fill="#ef4444" font-weight="700">733</text>
    <text x="432" y="600" text-anchor="middle" fill="#ef4444">2022</text>
    <text x="432" y="618" text-anchor="middle" fill="#ef4444" font-size="11">순이익 -41 적자</text>
    <!-- 1361 -->
    <rect x="470" y="448" width="55" height="122" fill="#3b82f6"/>
    <text x="497" y="438" text-anchor="middle">1,361</text>
    <text x="497" y="600" text-anchor="middle" fill="#94a3b8">2023</text>
    <!-- 1939 -->
    <rect x="535" y="396" width="55" height="174" fill="#3b82f6"/>
    <text x="562" y="386" text-anchor="middle">1,939</text>
    <text x="562" y="600" text-anchor="middle" fill="#94a3b8">2024</text>
    <!-- 2396 (사상최대 강조) -->
    <rect x="600" y="355" width="55" height="215" fill="#22c55e"/>
    <text x="627" y="345" text-anchor="middle" fill="#22c55e" font-weight="700">2,396</text>
    <text x="627" y="600" text-anchor="middle" fill="#22c55e" font-weight="700">2025</text>
    <text x="627" y="618" text-anchor="middle" fill="#22c55e" font-size="11">사상 최대</text>
  </g>

  <!-- 좌측 X축 -->
  <line x1="80" y1="570" x2="660" y2="570" stroke="#475569" stroke-width="1"/>

  <!-- 우측 흡수율 곡선 -->
  <text x="720" y="160" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="16">영업외 흡수율 = -영업외 / 영업이익</text>

  <!-- 흡수율 라인 차트 -->
  <g font-family="-apple-system, sans-serif" font-size="12" fill="#fbbf24">
    <!-- 폴리라인: 7% / 38% / 46% / -78% / 21% / 77% / 75% / 28% / 12% -->
    <!-- y 매핑: 100% = y200, 0% = y540, 음수도 표현 -->
    <polyline points="745,514 800,460 855,449 910,650 965,485 1020,418 1075,422 1130,488 1185,533"
              fill="none" stroke="#fbbf24" stroke-width="3"/>

    <!-- 점 + 라벨 -->
    <circle cx="745" cy="514" r="5" fill="#fbbf24"/>
    <text x="745" y="500" text-anchor="middle">7%</text>
    <text x="745" y="595" text-anchor="middle" fill="#94a3b8">2017</text>

    <circle cx="800" cy="460" r="5" fill="#fbbf24"/>
    <text x="800" y="446" text-anchor="middle">38%</text>
    <text x="800" y="595" text-anchor="middle" fill="#94a3b8">2018</text>

    <circle cx="855" cy="449" r="5" fill="#fbbf24"/>
    <text x="855" y="435" text-anchor="middle">46%</text>
    <text x="855" y="595" text-anchor="middle" fill="#94a3b8">2019</text>

    <circle cx="910" cy="650" r="6" fill="#22c55e"/>
    <text x="910" y="673" text-anchor="middle" fill="#22c55e" font-size="11">2020 자산매각</text>
    <text x="910" y="685" text-anchor="middle" fill="#22c55e" font-size="11">영업외 +995</text>

    <circle cx="965" cy="485" r="5" fill="#fbbf24"/>
    <text x="965" y="471" text-anchor="middle">21%</text>
    <text x="965" y="595" text-anchor="middle" fill="#94a3b8">2021</text>

    <circle cx="1020" cy="418" r="6" fill="#ef4444"/>
    <text x="1020" y="404" text-anchor="middle" fill="#ef4444" font-weight="700">77%</text>
    <text x="1020" y="595" text-anchor="middle" fill="#ef4444" font-weight="700">2022</text>

    <circle cx="1075" cy="422" r="6" fill="#ef4444"/>
    <text x="1075" y="408" text-anchor="middle" fill="#ef4444" font-weight="700">75%</text>
    <text x="1075" y="595" text-anchor="middle" fill="#ef4444" font-weight="700">2023</text>

    <circle cx="1130" cy="488" r="5" fill="#fbbf24"/>
    <text x="1130" y="474" text-anchor="middle">28%</text>
    <text x="1130" y="595" text-anchor="middle" fill="#94a3b8">2024</text>

    <circle cx="1185" cy="533" r="7" fill="#22c55e"/>
    <text x="1185" y="519" text-anchor="middle" fill="#22c55e" font-weight="700">12%</text>
    <text x="1185" y="595" text-anchor="middle" fill="#22c55e" font-weight="700">2025</text>
    <text x="1185" y="615" text-anchor="middle" fill="#22c55e" font-size="11">9년 최저</text>
  </g>

  <!-- 0%·77%·100% 가이드라인 -->
  <line x1="720" y1="540" x2="1200" y2="540" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="725" y="556" fill="#475569" font-family="-apple-system, sans-serif" font-size="11">0%</text>

  <!-- 핵심 메시지 -->
  <rect x="70" y="652" width="1060" height="50" fill="#1e293b" stroke="#fbbf24" stroke-width="1"/>
  <text x="90" y="678" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="16">2018년 4월 1.31조 CJ헬스케어 인수의 차입 이자 540억/년이 8년간 본업의 영업이익을 매번 깎아왔다.</text>
  <text x="90" y="697" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="14">→ 2025 K-뷰티 인디 폭발 + HK이노엔 매각 회수 = 본업이 영업외를 처음 압도한 해.</text>
</svg>
