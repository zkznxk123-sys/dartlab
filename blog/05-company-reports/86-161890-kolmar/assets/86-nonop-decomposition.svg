<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">2022 적자전환의 5가지 결정타</title>
  <desc id="desc">영업이익 733억 흑자가 어떻게 순이익 -41억 적자가 됐는가. 5단계 분해.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="70" y="60" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="32" font-weight="700">2022년 — 영업이익 733억이 어떻게 순이익 -41억이 됐나</text>
  <text x="70" y="98" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="20">9년 시계열 단 한 번의 적자전환, 영업외에서 5가지가 동시 폭발</text>

  <!-- Bridge chart 5단계 -->
  <g font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">
    <!-- 영업이익 시작점 -->
    <rect x="80" y="200" width="140" height="200" fill="#22c55e"/>
    <text x="150" y="180" text-anchor="middle" fill="#22c55e" font-weight="700" font-size="18">영업이익</text>
    <text x="150" y="280" text-anchor="middle" fill="#0a0e1a" font-weight="700" font-size="22">+733</text>
    <text x="150" y="305" text-anchor="middle" fill="#0a0e1a" font-size="13">매출 1.87조 +18%</text>
    <text x="150" y="430" text-anchor="middle" fill="#94a3b8" font-size="14">시작</text>

    <!-- 1. 금융비용 -->
    <rect x="245" y="280" width="100" height="120" fill="#ef4444"/>
    <text x="295" y="270" text-anchor="middle" fill="#ef4444" font-size="14">금융비용</text>
    <text x="295" y="345" text-anchor="middle" fill="#f1f5f9" font-weight="700" font-size="20">-596</text>
    <text x="295" y="430" text-anchor="middle" fill="#94a3b8" font-size="13">차입 이자</text>

    <!-- 1.5 금융수익 (상쇄) -->
    <rect x="370" y="350" width="100" height="50" fill="#22c55e" fill-opacity="0.5"/>
    <text x="420" y="340" text-anchor="middle" fill="#22c55e" font-size="14">금융수익</text>
    <text x="420" y="385" text-anchor="middle" fill="#22c55e" font-weight="700" font-size="20">+352</text>
    <text x="420" y="430" text-anchor="middle" fill="#94a3b8" font-size="13">이자수익</text>

    <!-- 2. 기타비용 -->
    <rect x="495" y="320" width="100" height="80" fill="#ef4444"/>
    <text x="545" y="310" text-anchor="middle" fill="#ef4444" font-size="14">기타비용</text>
    <text x="545" y="365" text-anchor="middle" fill="#f1f5f9" font-weight="700" font-size="20">-396</text>
    <text x="545" y="430" text-anchor="middle" fill="#94a3b8" font-size="13">외환·손상·지분</text>

    <!-- 3. 공정가치 평가손실 -->
    <rect x="620" y="340" width="100" height="60" fill="#ef4444"/>
    <text x="670" y="330" text-anchor="middle" fill="#ef4444" font-size="14">공정가치</text>
    <text x="670" y="378" text-anchor="middle" fill="#f1f5f9" font-weight="700" font-size="20">-290</text>
    <text x="670" y="430" text-anchor="middle" fill="#94a3b8" font-size="13">금융자산 시가</text>

    <!-- 세전이익 -->
    <rect x="745" y="380" width="120" height="20" fill="#fbbf24"/>
    <text x="805" y="370" text-anchor="middle" fill="#fbbf24" font-size="14">세전이익</text>
    <text x="805" y="395" text-anchor="middle" fill="#0a0e1a" font-weight="700" font-size="14">+170</text>
    <text x="805" y="430" text-anchor="middle" fill="#94a3b8" font-size="13">영업외 -563</text>

    <!-- 4. 법인세 -->
    <rect x="890" y="385" width="100" height="65" fill="#ef4444"/>
    <text x="940" y="375" text-anchor="middle" fill="#ef4444" font-size="14">법인세</text>
    <text x="940" y="425" text-anchor="middle" fill="#f1f5f9" font-weight="700" font-size="20">-211</text>
    <text x="940" y="465" text-anchor="middle" fill="#94a3b8" font-size="13">유효세율 124%</text>

    <!-- 결과: 순이익 -41 (적자) -->
    <rect x="1015" y="438" width="140" height="20" fill="#ef4444"/>
    <text x="1085" y="428" text-anchor="middle" fill="#ef4444" font-weight="700" font-size="18">순이익</text>
    <text x="1085" y="453" text-anchor="middle" fill="#f1f5f9" font-weight="700" font-size="20">-41</text>
    <text x="1085" y="490" text-anchor="middle" fill="#ef4444" font-size="13">9년 단 1회 적자</text>
  </g>

  <!-- Y축 0 라인 -->
  <line x1="80" y1="400" x2="1160" y2="400" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1170" y="404" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="12">0</text>

  <!-- 핵심 메시지 -->
  <rect x="70" y="540" width="1060" height="150" fill="#1e293b" stroke="#fbbf24"/>
  <text x="90" y="572" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">두 회계가 동시에 무너진 첫 해</text>
  <text x="90" y="603" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="15">본업 ODM — 매출원가율 74.87% 9년 최악, 인디 브랜드 정체 + 원자재 인플레로 영업이익률 3.93% 바닥.</text>
  <text x="90" y="630" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="15">인수 회계 — 금융비용 596억 평년치 + 기타비용 396억 + 공정가치 -290억 → 영업외 -563억.</text>
  <text x="90" y="660" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="14">유효세율 124% = K-IFRS 연결 세무의 비대칭 (자회사 단위 과세 + 모회사 손실 차감 효과).</text>
  <text x="90" y="681" fill="#22c55e" font-family="-apple-system, sans-serif" font-size="14">→ 2025년 같은 5개 항목 모두 정상화 또는 회복: -279 / 538 / 129 / +112 / 435 → 흡수율 12%.</text>
</svg>
