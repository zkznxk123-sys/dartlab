<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">한국콜마 vs 코스맥스 — 같은 마진의 정반대 회계</title>
  <desc id="desc">K-뷰티 ODM 빅2 비교. 인수형 vs 자체진출형, 두 가지 글로벌 진출 모델.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="70" y="60" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="32" font-weight="700">K-뷰티 ODM 빅2 — 같은 8% 마진, 정반대 회계</text>
  <text x="70" y="98" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="20">인수형(한국콜마) vs 자체진출형(코스맥스), 영업외 부담의 두 가지 모양</text>

  <!-- 헤더 -->
  <g font-family="-apple-system, sans-serif" font-size="18" fill="#f1f5f9">
    <text x="350" y="160" text-anchor="middle" font-weight="700">한국콜마 (161890)</text>
    <text x="900" y="160" text-anchor="middle" font-weight="700">코스맥스 (192820)</text>
  </g>

  <!-- 비교 테이블 -->
  <g font-family="-apple-system, sans-serif" font-size="15" fill="#cbd5e1">
    <line x1="80" y1="180" x2="1180" y2="180" stroke="#475569"/>

    <!-- 매출 -->
    <text x="100" y="215" fill="#94a3b8">2025 매출</text>
    <text x="350" y="215" text-anchor="middle" font-weight="700" font-size="20">2.72조</text>
    <text x="900" y="215" text-anchor="middle" font-weight="700" font-size="20">2.40조</text>

    <!-- OPM -->
    <text x="100" y="250" fill="#94a3b8">영업이익률</text>
    <text x="350" y="250" text-anchor="middle" fill="#22c55e" font-weight="700" font-size="20">8.80%</text>
    <text x="900" y="250" text-anchor="middle" fill="#22c55e" font-weight="700" font-size="20">8.16%</text>
    <text x="635" y="250" text-anchor="middle" fill="#fbbf24" font-size="13">≈ 같음</text>

    <!-- 매출원가율 -->
    <text x="100" y="285" fill="#94a3b8">매출원가율</text>
    <text x="350" y="285" text-anchor="middle">70.93%</text>
    <text x="900" y="285" text-anchor="middle" fill="#ef4444">82.95%</text>
    <text x="635" y="285" text-anchor="middle" fill="#fbbf24" font-size="13">-12%p</text>

    <line x1="80" y1="300" x2="1180" y2="300" stroke="#475569"/>

    <!-- 금융비용 -->
    <text x="100" y="335" fill="#94a3b8">금융비용</text>
    <text x="350" y="335" text-anchor="middle" fill="#ef4444">538억</text>
    <text x="900" y="335" text-anchor="middle" fill="#ef4444">986억</text>
    <text x="635" y="335" text-anchor="middle" fill="#fbbf24" font-size="13">코스맥스 +448</text>

    <!-- 영업외 -->
    <text x="100" y="370" fill="#94a3b8">영업외 합계</text>
    <text x="350" y="370" text-anchor="middle">-279</text>
    <text x="900" y="370" text-anchor="middle">-393</text>
    <text x="635" y="370" text-anchor="middle" fill="#94a3b8" font-size="13">둘 다 음수</text>

    <!-- 무형자산 -->
    <text x="100" y="405" fill="#94a3b8">무형자산 (Q4)</text>
    <text x="350" y="405" text-anchor="middle" fill="#fbbf24" font-weight="700">12,435억</text>
    <text x="900" y="405" text-anchor="middle">638억</text>
    <text x="635" y="405" text-anchor="middle" fill="#fbbf24" font-size="13">19배 차이</text>

    <!-- 비지배지분 -->
    <text x="100" y="440" fill="#94a3b8">비지배지분 (Q4)</text>
    <text x="350" y="440" text-anchor="middle">+7,570</text>
    <text x="900" y="440" text-anchor="middle">+542</text>
    <text x="635" y="440" text-anchor="middle" fill="#fbbf24" font-size="13">14배 차이</text>

    <!-- 9년 적자 횟수 -->
    <text x="100" y="475" fill="#94a3b8">9년 적자 횟수</text>
    <text x="350" y="475" text-anchor="middle">1회 (2022)</text>
    <text x="900" y="475" text-anchor="middle" fill="#ef4444">2회 (2020·2022)</text>

    <line x1="80" y1="495" x2="1180" y2="495" stroke="#475569"/>

    <!-- 글로벌 진출 모델 -->
    <text x="100" y="530" fill="#94a3b8">글로벌 진출 모델</text>
    <text x="350" y="530" text-anchor="middle" fill="#fbbf24" font-weight="700">인수형</text>
    <text x="900" y="530" text-anchor="middle" fill="#fbbf24" font-weight="700">자체진출형</text>

    <text x="350" y="555" text-anchor="middle" font-size="13" fill="#94a3b8">2018 CJ헬스케어 1.31조 인수</text>
    <text x="900" y="555" text-anchor="middle" font-size="13" fill="#94a3b8">2004~2014 중국·미국 자체 공장</text>

    <!-- 영업외 음수의 출처 -->
    <text x="100" y="600" fill="#94a3b8">영업외 음수의 주축</text>
    <text x="350" y="600" text-anchor="middle" font-size="14">인수 차입 이자 540억/년</text>
    <text x="900" y="600" text-anchor="middle" font-size="14">중국 자회사 자본잠식 + 차입</text>

    <text x="350" y="625" text-anchor="middle" font-size="13" fill="#94a3b8">+ 영업권 손상 risk</text>
    <text x="900" y="625" text-anchor="middle" font-size="13" fill="#94a3b8">+ 운영자금 차입 이자</text>

    <line x1="80" y1="650" x2="1180" y2="650" stroke="#475569"/>

    <!-- 비지배 곡선 -->
    <text x="100" y="685" fill="#94a3b8">비지배 9년 곡선</text>
    <text x="350" y="685" text-anchor="middle" font-size="13">+275 → +3,715 → +8,054 → +7,570</text>
    <text x="900" y="685" text-anchor="middle" font-size="13" fill="#ef4444">+103 → -236 → -1,369 → +542</text>

    <text x="350" y="708" text-anchor="middle" font-size="12" fill="#94a3b8">SPC 외부 LP 출자 흔적</text>
    <text x="900" y="708" text-anchor="middle" font-size="12" fill="#94a3b8">중국 코스맥스 자본잠식 누적</text>
  </g>

  <!-- 핵심 메시지 -->
  <rect x="70" y="745" width="1060" height="55" fill="#1e293b" stroke="#fbbf24"/>
  <text x="90" y="773" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="16" font-weight="700">두 회사 모두 영업이익 8%대지만 영업외 음수의 출처가 정반대 — 인수 회수 vs 자회사 회복.</text>
  <text x="90" y="793" fill="#fbbf24" font-family="-apple-system, sans-serif" font-size="14">→ 어느 쪽이 더 빨리 영업외 청산을 마치는지가 K-뷰티 ODM 빅2 다음 1년의 주가 결정 변수.</text>
</svg>
