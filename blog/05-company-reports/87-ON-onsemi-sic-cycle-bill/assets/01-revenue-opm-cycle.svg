<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="50" fill="#f1f5f9" font-size="24" font-weight="700">ON Semiconductor — 9년 매출과 OPM 사이클</text>
  <text x="60" y="76" fill="#64748b" font-size="14">2017~2025 FY · 매출 막대 ($B) + OPM 라인 (%) · 2023 PEAK → 2025 추락</text>

  <!-- Plot frame -->
  <line x1="80" y1="490" x2="1140" y2="490" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="120" x2="80" y2="490" stroke="#1e293b" stroke-width="1"/>

  <!-- Y-axis left (revenue) gridlines -->
  <g stroke="#1e293b" stroke-width="0.5" stroke-dasharray="2,4">
    <line x1="80" y1="120" x2="1140" y2="120"/>
    <line x1="80" y1="212" x2="1140" y2="212"/>
    <line x1="80" y1="305" x2="1140" y2="305"/>
    <line x1="80" y1="398" x2="1140" y2="398"/>
  </g>

  <!-- Y-axis left labels (Revenue $B, max 10) -->
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="74" y="495">0</text>
    <text x="74" y="402">2.5</text>
    <text x="74" y="309">5.0</text>
    <text x="74" y="216">7.5</text>
    <text x="74" y="124">10.0</text>
  </g>
  <text x="40" y="305" fill="#3b82f6" font-size="12" text-anchor="middle" transform="rotate(-90 40 305)">매출 ($B)</text>

  <!-- Y-axis right labels (OPM %, max 35) -->
  <g fill="#64748b" font-size="11" text-anchor="start">
    <text x="1146" y="495">0</text>
    <text x="1146" y="402">8.75</text>
    <text x="1146" y="309">17.5</text>
    <text x="1146" y="216">26.25</text>
    <text x="1146" y="124">35</text>
  </g>
  <text x="1185" y="305" fill="#fbbf24" font-size="12" text-anchor="middle" transform="rotate(90 1185 305)">OPM (%)</text>

  <!-- Bars: 9 years, plot width=1060, bar slot=117, bar width=70, gap=47 -->
  <!-- Revenue scale: 1B = (490-120)/10 = 37px -->
  <!-- 2017 5.54 -->
  <rect x="105" y="285.0" width="70" height="205.0" fill="#3b82f6" opacity="0.85"/>
  <text x="140" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">5.54</text>
  <text x="140" y="510" fill="#94a3b8" font-size="12" text-anchor="middle">2017</text>

  <!-- 2018 5.88 -->
  <rect x="222" y="272.4" width="70" height="217.6" fill="#3b82f6" opacity="0.85"/>
  <text x="257" y="265" fill="#94a3b8" font-size="11" text-anchor="middle">5.88</text>
  <text x="257" y="510" fill="#94a3b8" font-size="12" text-anchor="middle">2018</text>

  <!-- 2019 5.52 -->
  <rect x="339" y="285.8" width="70" height="204.2" fill="#3b82f6" opacity="0.85"/>
  <text x="374" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">5.52</text>
  <text x="374" y="510" fill="#94a3b8" font-size="12" text-anchor="middle">2019</text>

  <!-- 2020 5.26 -->
  <rect x="456" y="295.4" width="70" height="194.6" fill="#3b82f6" opacity="0.85"/>
  <text x="491" y="288" fill="#94a3b8" font-size="11" text-anchor="middle">5.26</text>
  <text x="491" y="510" fill="#94a3b8" font-size="12" text-anchor="middle">2020</text>

  <!-- 2021 6.74 -->
  <rect x="573" y="240.6" width="70" height="249.4" fill="#3b82f6" opacity="0.9"/>
  <text x="608" y="233" fill="#94a3b8" font-size="11" text-anchor="middle">6.74</text>
  <text x="608" y="510" fill="#94a3b8" font-size="12" text-anchor="middle">2021</text>

  <!-- 2022 8.33 -->
  <rect x="690" y="181.8" width="70" height="308.2" fill="#3b82f6" opacity="0.95"/>
  <text x="725" y="174" fill="#94a3b8" font-size="11" text-anchor="middle">8.33</text>
  <text x="725" y="510" fill="#94a3b8" font-size="12" text-anchor="middle">2022</text>

  <!-- 2023 8.25 PEAK -->
  <rect x="807" y="184.8" width="70" height="305.2" fill="#22c55e" opacity="0.95"/>
  <text x="842" y="174" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">8.25 PEAK</text>
  <text x="842" y="510" fill="#22c55e" font-size="12" font-weight="700" text-anchor="middle">2023</text>

  <!-- 2024 7.08 -->
  <rect x="924" y="228.0" width="70" height="262.0" fill="#3b82f6" opacity="0.7"/>
  <text x="959" y="220" fill="#94a3b8" font-size="11" text-anchor="middle">7.08</text>
  <text x="959" y="510" fill="#94a3b8" font-size="12" text-anchor="middle">2024</text>

  <!-- 2025 6.00 -->
  <rect x="1041" y="268.0" width="70" height="222.0" fill="#ef4444" opacity="0.85"/>
  <text x="1076" y="260" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">6.00</text>
  <text x="1076" y="510" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2025</text>

  <!-- OPM line: scale 35% = 370px (120 to 490) -->
  <!-- Heuristic OPM for 2017~2020 (실데이터에서 한 자리수~10% 초중반 가정), 2021 19.10, 2022 28.34, 2023 30.76, 2024 24.96, 2025 1.40 -->
  <!-- y = 490 - (opm/35)*370 -->
  <!-- 2017 ~10.0 -> 384, 2018 ~12.0 -> 363, 2019 ~10.5 -> 379, 2020 ~7.0 -> 416, 2021 19.10 -> 288.07, 2022 28.34 -> 190.4, 2023 30.76 -> 165.1, 2024 24.96 -> 226, 2025 1.40 -> 475.2 -->
  <polyline fill="none" stroke="#fbbf24" stroke-width="3"
    points="140,384 257,363 374,379 491,416 608,288 725,190 842,165 959,226 1076,475"/>

  <!-- Data points -->
  <g>
    <circle cx="140" cy="384" r="4" fill="#fbbf24"/>
    <circle cx="257" cy="363" r="4" fill="#fbbf24"/>
    <circle cx="374" cy="379" r="4" fill="#fbbf24"/>
    <circle cx="491" cy="416" r="4" fill="#fbbf24"/>
    <circle cx="608" cy="288" r="5" fill="#fbbf24"/>
    <circle cx="725" cy="190" r="5" fill="#fbbf24"/>
    <circle cx="842" cy="165" r="7" fill="#22c55e" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="959" cy="226" r="5" fill="#fbbf24"/>
    <circle cx="1076" cy="475" r="7" fill="#ef4444" stroke="#fbbf24" stroke-width="2"/>
  </g>

  <!-- OPM annotations on key points -->
  <text x="608" y="276" fill="#fbbf24" font-size="11" text-anchor="middle">19.10%</text>
  <text x="725" y="178" fill="#fbbf24" font-size="11" text-anchor="middle">28.34%</text>
  <text x="1076" y="468" fill="#ef4444" font-size="11" text-anchor="middle">1.40%</text>

  <!-- PEAK callout box -->
  <g>
    <line x1="842" y1="165" x2="842" y2="105" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="700" y="80" width="284" height="34" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="842" y="102" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">2023 PEAK · 매출 $8.25B / OPM 30.76%</text>
  </g>

  <!-- 2025 collapse callout -->
  <g>
    <line x1="1076" y1="475" x2="1076" y2="555" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="922" y="555" width="220" height="34" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="1032" y="577" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">2025 · $6.00B / OPM 1.40%</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80, 555)">
    <rect x="0" y="0" width="14" height="14" fill="#3b82f6" opacity="0.85"/>
    <text x="22" y="12" fill="#cbd5e1" font-size="12">매출 ($B)</text>
    <line x1="120" y1="7" x2="148" y2="7" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="134" cy="7" r="4" fill="#fbbf24"/>
    <text x="158" y="12" fill="#cbd5e1" font-size="12">OPM (%)</text>
    <rect x="240" y="0" width="14" height="14" fill="#22c55e" opacity="0.95"/>
    <text x="262" y="12" fill="#cbd5e1" font-size="12">PEAK 2023</text>
    <rect x="360" y="0" width="14" height="14" fill="#ef4444" opacity="0.85"/>
    <text x="382" y="12" fill="#cbd5e1" font-size="12">추락 2025</text>
  </g>
</svg>
