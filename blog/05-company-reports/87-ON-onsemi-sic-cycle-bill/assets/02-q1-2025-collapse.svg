<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="50" fill="#f1f5f9" font-size="24" font-weight="700">2025년 1분기 — 한 분기에 도착한 청구서</text>
  <text x="60" y="76" fill="#64748b" font-size="14">영업적자 -$573.7M 의 75% 가 자산손상이라는 비현금 회계 처리에서 왔다</text>

  <!-- Total bar background frame -->
  <text x="60" y="138" fill="#cbd5e1" font-size="14" font-weight="600">2025Q1 영업적자 -$573.7M 분해</text>

  <!-- Stacked horizontal bar: total width=720, start at x=60, y=160, h=80 -->
  <!-- Impairment 431.5 / 573.7 = 75.2% → 541.4px -->
  <!-- Real OpLoss 142.2 / 573.7 = 24.8% → 178.6px -->

  <!-- Bar background -->
  <rect x="60" y="160" width="720" height="80" rx="6" fill="#1e293b"/>

  <!-- Impairment segment -->
  <rect x="60" y="160" width="541.4" height="80" rx="6" fill="#ef4444"/>
  <text x="330.7" y="195" fill="#fff7ed" font-size="20" font-weight="700" text-anchor="middle">자산손상 $431.5M</text>
  <text x="330.7" y="222" fill="#fff7ed" font-size="14" text-anchor="middle">75.2% · 비현금 회계 처리</text>

  <!-- Real op loss segment -->
  <rect x="601.4" y="160" width="178.6" height="80" rx="6" fill="#f59e0b"/>
  <text x="690.7" y="195" fill="#0a0e1a" font-size="15" font-weight="700" text-anchor="middle">실질 영업적자</text>
  <text x="690.7" y="217" fill="#0a0e1a" font-size="13" font-weight="600" text-anchor="middle">$142.2M (24.8%)</text>

  <!-- Total label below -->
  <text x="60" y="270" fill="#cbd5e1" font-size="13">합계 = -$573.7M (영업적자)</text>
  <line x1="60" y1="280" x2="780" y2="280" stroke="#1e293b" stroke-width="1"/>

  <!-- Scale ticks -->
  <g fill="#64748b" font-size="11" text-anchor="middle">
    <text x="60" y="296">$0</text>
    <text x="240" y="296">-$143M</text>
    <text x="420" y="296">-$287M</text>
    <text x="600" y="296">-$430M</text>
    <text x="780" y="296">-$574M</text>
  </g>

  <!-- Sub-section: Why 1분기 with detail boxes -->
  <text x="60" y="350" fill="#cbd5e1" font-size="14" font-weight="600">한 해의 비용이 1분기에 쏠린 패턴</text>

  <!-- Three detail boxes -->
  <!-- Box 1: 자산손상 분기 집중 -->
  <g>
    <rect x="60" y="370" width="350" height="170" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="80" y="400" fill="#ef4444" font-size="14" font-weight="700">자산손상 분기 집중</text>
    <text x="80" y="430" fill="#f1f5f9" font-size="32" font-weight="800">87%</text>
    <text x="80" y="455" fill="#94a3b8" font-size="12">연간 자산손상 $496.0M 중</text>
    <text x="80" y="473" fill="#94a3b8" font-size="12">$431.5M 가 1분기에 한꺼번에 처리</text>
    <text x="80" y="510" fill="#cbd5e1" font-size="11">2022~2023 PEAK 캐파를</text>
    <text x="80" y="528" fill="#cbd5e1" font-size="11">"회수 어렵다" 고 인정한 분기</text>
  </g>

  <!-- Box 2: severance -->
  <g>
    <rect x="425" y="370" width="350" height="170" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="445" y="400" fill="#f59e0b" font-size="14" font-weight="700">구조조정 비용 (severance)</text>
    <text x="445" y="430" fill="#f1f5f9" font-size="32" font-weight="800">$67.1M</text>
    <text x="445" y="455" fill="#94a3b8" font-size="12">연간 severance 합계</text>
    <text x="445" y="473" fill="#94a3b8" font-size="12">자산손상과 같은 분기에 인식</text>
    <text x="445" y="510" fill="#cbd5e1" font-size="11">자산손상 + severance 합계</text>
    <text x="445" y="528" fill="#cbd5e1" font-size="11">≈ $563M / 한 해 청구서</text>
  </g>

  <!-- Box 3: 인력 -->
  <g>
    <rect x="790" y="370" width="350" height="170" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="810" y="400" fill="#fbbf24" font-size="14" font-weight="700">감원 규모 (2025-01-14 발표)</text>
    <text x="810" y="430" fill="#f1f5f9" font-size="32" font-weight="800">2,400명</text>
    <text x="810" y="455" fill="#94a3b8" font-size="12">글로벌 22,600명의 9%</text>
    <text x="810" y="473" fill="#94a3b8" font-size="12">SiC 캐파 축소와 동시 발표</text>
    <text x="810" y="510" fill="#cbd5e1" font-size="11">같은 날 Qorvo SiC JFET</text>
    <text x="810" y="528" fill="#cbd5e1" font-size="11">$118.8M 인수도 동시 발표</text>
  </g>

  <!-- Footer note -->
  <rect x="60" y="555" width="1080" height="32" rx="4" fill="#0f172a" stroke="#1e293b"/>
  <text x="600" y="576" fill="#cbd5e1" font-size="12" text-anchor="middle">자산손상 $431.5M (비현금) 을 빼고 본 실질 영업적자는 -$142.2M · 1분기 충격의 4분의 3 은 과거 자산 정리</text>
</svg>
