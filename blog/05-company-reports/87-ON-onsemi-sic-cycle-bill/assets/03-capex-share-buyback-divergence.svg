<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="50" fill="#f1f5f9" font-size="24" font-weight="700">PEAK 캐파에서 자사주로 — 한 회사의 두 방향 (2018~2025)</text>
  <text x="60" y="76" fill="#64748b" font-size="14">CAPEX/매출 PEAK 는 2023, 자사주 매입 PEAK 는 2025 — 같은 회사, 두 PEAK 가 다른 방향</text>

  <!-- Plot frame: x=100 to 1140, y=120 to 480 -->
  <line x1="100" y1="480" x2="1140" y2="480" stroke="#1e293b" stroke-width="1"/>
  <line x1="100" y1="120" x2="100" y2="480" stroke="#1e293b" stroke-width="1"/>

  <!-- Gridlines -->
  <g stroke="#1e293b" stroke-width="0.5" stroke-dasharray="2,4">
    <line x1="100" y1="120" x2="1140" y2="120"/>
    <line x1="100" y1="210" x2="1140" y2="210"/>
    <line x1="100" y1="300" x2="1140" y2="300"/>
    <line x1="100" y1="390" x2="1140" y2="390"/>
  </g>

  <!-- Y-axis left (CAPEX/매출 %, max 20) -->
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="94" y="484">0</text>
    <text x="94" y="394">5</text>
    <text x="94" y="304">10</text>
    <text x="94" y="214">15</text>
    <text x="94" y="124">20</text>
  </g>
  <text x="50" y="300" fill="#3b82f6" font-size="12" text-anchor="middle" transform="rotate(-90 50 300)">CAPEX / 매출 (%)</text>

  <!-- Y-axis right (자사주 매입 $M, max 1500) -->
  <g fill="#64748b" font-size="11" text-anchor="start">
    <text x="1146" y="484">0</text>
    <text x="1146" y="394">375</text>
    <text x="1146" y="304">750</text>
    <text x="1146" y="214">1,125</text>
    <text x="1146" y="124">1,500</text>
  </g>
  <text x="1188" y="300" fill="#fbbf24" font-size="12" text-anchor="middle" transform="rotate(90 1188 300)">자사주 매입 ($M)</text>

  <!-- X-axis: 8 years 2018~2025, plot width 1040, slot=130 -->
  <g fill="#94a3b8" font-size="12" text-anchor="middle">
    <text x="165" y="500">2018</text>
    <text x="295" y="500">2019</text>
    <text x="425" y="500">2020</text>
    <text x="555" y="500">2021</text>
    <text x="685" y="500">2022</text>
    <text x="815" y="500">2023</text>
    <text x="945" y="500">2024</text>
    <text x="1075" y="500">2025</text>
  </g>

  <!-- CAPEX/매출 line (left axis 0~20%) -->
  <!-- y = 480 - (val/20) * 360 -->
  <!-- 2018 8.76 -> 322.3, 2019 9.69 -> 305.6, 2020 7.30 -> 348.6, 2021 6.60 -> 361.2, 2022 12.07 -> 262.7, 2023 19.09 -> 136.4 PEAK, 2024 9.80 -> 303.6, 2025 5.69 -> 377.6 -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="3"
    points="165,322 295,306 425,349 555,361 685,263 815,136 945,304 1075,378"/>

  <!-- CAPEX points -->
  <g>
    <circle cx="165" cy="322" r="5" fill="#3b82f6"/>
    <circle cx="295" cy="306" r="5" fill="#3b82f6"/>
    <circle cx="425" cy="349" r="5" fill="#3b82f6"/>
    <circle cx="555" cy="361" r="5" fill="#3b82f6"/>
    <circle cx="685" cy="263" r="5" fill="#3b82f6"/>
    <circle cx="815" cy="136" r="8" fill="#3b82f6" stroke="#22c55e" stroke-width="3"/>
    <circle cx="945" cy="304" r="5" fill="#3b82f6"/>
    <circle cx="1075" cy="378" r="5" fill="#3b82f6"/>
  </g>

  <!-- CAPEX value labels -->
  <g fill="#3b82f6" font-size="11" text-anchor="middle">
    <text x="165" y="312">8.76</text>
    <text x="295" y="296">9.69</text>
    <text x="425" y="339">7.30</text>
    <text x="555" y="351">6.60</text>
    <text x="685" y="253">12.07</text>
    <text x="945" y="294">9.80</text>
    <text x="1075" y="368">5.69</text>
  </g>

  <!-- 자사주 매입 line (right axis 0~1500) -->
  <!-- y = 480 - (val/1500) * 360 -->
  <!-- 2018 ~50 -> 468, 2019 ~25 -> 474, 2020 ~10 -> 477.6, 2021 ~30 -> 472.8, 2022 77 -> 461.5, 2023 564 -> 344.6, 2024 654 -> 323.0, 2025 1378 -> 149.3 PEAK -->
  <polyline fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="0"
    points="165,468 295,474 425,478 555,473 685,461 815,345 945,323 1075,149"/>

  <!-- 자사주 points -->
  <g>
    <circle cx="165" cy="468" r="4" fill="#fbbf24"/>
    <circle cx="295" cy="474" r="4" fill="#fbbf24"/>
    <circle cx="425" cy="478" r="4" fill="#fbbf24"/>
    <circle cx="555" cy="473" r="4" fill="#fbbf24"/>
    <circle cx="685" cy="461" r="5" fill="#fbbf24"/>
    <circle cx="815" cy="345" r="5" fill="#fbbf24"/>
    <circle cx="945" cy="323" r="5" fill="#fbbf24"/>
    <circle cx="1075" cy="149" r="8" fill="#fbbf24" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- 자사주 value labels -->
  <g fill="#fbbf24" font-size="11" text-anchor="middle">
    <text x="685" y="455">$77M</text>
    <text x="815" y="335">$564M</text>
    <text x="945" y="313">$654M</text>
  </g>

  <!-- CAPEX PEAK callout -->
  <g>
    <line x1="815" y1="136" x2="815" y2="100" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="700" y="76" width="230" height="34" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="815" y="98" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">2023 CAPEX/매출 19.09% PEAK</text>
  </g>

  <!-- 자사주 PEAK callout -->
  <g>
    <line x1="1075" y1="149" x2="1075" y2="160" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="912" y="124" width="226" height="36" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="1025" y="148" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2025 자사주 $1,378M PEAK</text>
  </g>

  <!-- Crossing arrow / 의미 -->
  <text x="600" y="555" fill="#cbd5e1" font-size="13" text-anchor="middle">PEAK 캐파에서 발 빼고 그 현금으로 자기 주식을 산 12개월 — 두 PEAK 사이 2년</text>

  <!-- Legend -->
  <g transform="translate(100, 555)">
    <line x1="0" y1="7" x2="28" y2="7" stroke="#3b82f6" stroke-width="3"/>
    <circle cx="14" cy="7" r="4" fill="#3b82f6"/>
    <text x="38" y="12" fill="#cbd5e1" font-size="12">CAPEX/매출 (%)</text>
    <line x1="180" y1="7" x2="208" y2="7" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="194" cy="7" r="4" fill="#fbbf24"/>
    <text x="218" y="12" fill="#cbd5e1" font-size="12">자사주 매입 ($M)</text>
  </g>
</svg>
