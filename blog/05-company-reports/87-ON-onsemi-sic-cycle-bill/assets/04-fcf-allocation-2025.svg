<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="50" fill="#f1f5f9" font-size="24" font-weight="700">2025 FCF $1,418M — 어디로 갔나</text>
  <text x="60" y="76" fill="#64748b" font-size="14">FCF 환원율 97.2% · 영업이익이 $84M 인 해의 자본배분 한 줄</text>

  <!-- Source FCF block (left) -->
  <!-- Total height proportional: total bar 480px tall representing $1,418M -->
  <!-- Left source rectangle, x=120, y=110, w=200, h=420 -->
  <rect x="120" y="110" width="200" height="420" rx="8" fill="#22c55e" opacity="0.92"/>
  <text x="220" y="305" fill="#0a0e1a" font-size="22" font-weight="800" text-anchor="middle">FCF</text>
  <text x="220" y="338" fill="#0a0e1a" font-size="28" font-weight="800" text-anchor="middle">$1,418M</text>
  <text x="220" y="368" fill="#0a0e1a" font-size="13" font-weight="600" text-anchor="middle">2025 잉여현금흐름</text>
  <text x="220" y="98" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">분모 (Source)</text>

  <!-- Right destination stacked bar -->
  <!-- Buyback: 1378/1418 = 97.18% -> 408.2px height -->
  <!-- Remainder: 40/1418 = 2.82% -> 11.8px -->
  <!-- Dividend: 0 -->
  <!-- x=600, w=240, y=110 to 530 -->
  <rect x="600" y="110" width="240" height="408.2" rx="8 8 0 0" fill="#fbbf24" opacity="0.95"/>
  <rect x="600" y="518.2" width="240" height="11.8" fill="#3b82f6" opacity="0.85"/>

  <!-- Hide rounding overlap with single rect background subtle -->
  <!-- Buyback labels -->
  <text x="720" y="290" fill="#0a0e1a" font-size="20" font-weight="800" text-anchor="middle">자사주 매입</text>
  <text x="720" y="324" fill="#0a0e1a" font-size="32" font-weight="800" text-anchor="middle">$1,378M</text>
  <text x="720" y="358" fill="#0a0e1a" font-size="22" font-weight="800" text-anchor="middle">97.2%</text>
  <text x="720" y="98" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">분자 (Allocation)</text>

  <!-- Remainder strip label -->
  <text x="720" y="528" fill="#0a0e1a" font-size="11" font-weight="700" text-anchor="middle">잔여 $40M (2.8%)</text>

  <!-- Dividend zero box (below) -->
  <rect x="900" y="110" width="240" height="60" rx="8" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <text x="1020" y="138" fill="#64748b" font-size="14" font-weight="700" text-anchor="middle">배당</text>
  <text x="1020" y="160" fill="#64748b" font-size="22" font-weight="800" text-anchor="middle">$0</text>

  <!-- Net income context -->
  <rect x="900" y="190" width="240" height="60" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="1020" y="218" fill="#94a3b8" font-size="13" font-weight="700" text-anchor="middle">참고 · 2025 영업이익</text>
  <text x="1020" y="240" fill="#f1f5f9" font-size="20" font-weight="800" text-anchor="middle">$84M</text>

  <!-- Why FCF up box -->
  <rect x="900" y="270" width="240" height="200" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="920" y="296" fill="#fbbf24" font-size="13" font-weight="700">왜 FCF 가 +17% 늘었나</text>
  <text x="920" y="322" fill="#cbd5e1" font-size="12">1. 자산손상 $496M 은 비현금</text>
  <text x="920" y="342" fill="#cbd5e1" font-size="12">    → 영업이익만 깎이고</text>
  <text x="920" y="360" fill="#cbd5e1" font-size="12">    현금은 안 빠져나감</text>
  <text x="920" y="386" fill="#cbd5e1" font-size="12">2. CAPEX 19% → 5.69% 축소</text>
  <text x="920" y="404" fill="#cbd5e1" font-size="12">    + 운전자본 회수</text>
  <text x="920" y="430" fill="#fbbf24" font-size="12" font-weight="700">PEAK 캐파에서 발을 빼는</text>
  <text x="920" y="448" fill="#fbbf24" font-size="12" font-weight="700">과정의 결과 = 분모 FCF</text>

  <!-- Connecting flow arrows from source to destination -->
  <!-- Path from right of FCF bar to left of buyback bar -->
  <path d="M 320,200 C 460,200 460,200 600,200" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 320,300 C 460,300 460,300 600,300" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 320,400 C 460,400 460,400 600,400" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 320,490 C 460,490 460,490 600,490" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Tiny remainder flow -->
  <path d="M 320,524 C 460,524 460,524 600,524" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Flow label -->
  <text x="460" y="180" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">97.2% 흐름</text>

  <!-- Footer note -->
  <rect x="60" y="555" width="1080" height="32" rx="4" fill="#0f172a" stroke="#1e293b"/>
  <text x="600" y="576" fill="#cbd5e1" font-size="12" text-anchor="middle">CAPEX 에서 회수한 현금이 fab 으로 재투자되지 않고 자사주로 옮겨간 12 개월 · 분모 FCF 의 출처가 환원율 97% 의 의미를 바꾼다</text>
</svg>
