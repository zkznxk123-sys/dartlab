<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="50" fill="#f1f5f9" font-size="24" font-weight="700">2025 부실 4 신호 — 동시 점등</text>
  <text x="60" y="76" fill="#64748b" font-size="14">손익·재무구조·이자커버 세 축이 같은 방향으로 약해진 한 해</text>

  <!--
    Half-circle gauge geometry:
    Each gauge: cx, cy=240, r=100. Arc from (cx-100, 240) to (cx+100, 240) — top half.
    Path: M (cx-100) 240 A 100 100 0 0 1 (cx+100) 240 (sweep=1 = clockwise = upper arc)
    Total arc length: pi*100. Pointer angle: 180° (left) to 0° (right).
    For value v normalized to [0,1]: angle = 180 - 180*v (degrees from positive x-axis, ccw)
    Actually: at v=0, pointer points left (-1,0). At v=1, pointer points right (1,0).
    angle_rad = pi * (1 - v). x = cx + r*cos(angle), y = cy - r*sin(angle).
  -->

  <!-- Gauge 1: Altman Z = 1.98, scale 0~4, danger<1.81 (0.4525), gray 1.81~2.99 (0.7475), safe>2.99
       v_norm = 1.98 / 4 = 0.495. angle = 180 - 180*0.495 = 90.9° -->
  <!-- Gauge centers: cx1=180, cx2=480, cx3=780, cx4=1080. cy=270 -->

  <!-- ===== Gauge 1: Altman Z ===== -->
  <g>
    <!-- Track segments: danger (red), gray (yellow), safe (green) -->
    <!-- Full track gray base -->
    <path d="M 80 270 A 100 100 0 0 1 280 270" stroke="#1e293b" stroke-width="20" fill="none"/>
    <!-- Danger segment 0 to 0.4525: angle 180° to 98.55° -->
    <path d="M 80 270 A 100 100 0 0 1 165.18 220.18" stroke="#ef4444" stroke-width="20" fill="none" opacity="0.85"/>
    <!-- Gray segment 0.4525 to 0.7475 -->
    <path d="M 165.18 220.18 A 100 100 0 0 1 234.96 184.84" stroke="#f59e0b" stroke-width="20" fill="none" opacity="0.85"/>
    <!-- Safe segment 0.7475 to 1 -->
    <path d="M 234.96 184.84 A 100 100 0 0 1 280 270" stroke="#22c55e" stroke-width="20" fill="none" opacity="0.85"/>

    <!-- Pointer: angle = 90.9° (radians 1.587). x = 180 + 100*cos(90.9°) = 180 - 1.57 = 178.43. y = 270 - 100*sin(90.9°) = 270 - 99.99 = 170.01 -->
    <line x1="180" y1="270" x2="178" y2="170" stroke="#f59e0b" stroke-width="4"/>
    <circle cx="180" cy="270" r="8" fill="#f59e0b"/>

    <!-- Value -->
    <text x="180" y="320" fill="#f1f5f9" font-size="36" font-weight="800" text-anchor="middle">1.98</text>
    <text x="180" y="345" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">회색지대</text>

    <!-- Tick labels -->
    <text x="80" y="295" fill="#64748b" font-size="10" text-anchor="middle">0</text>
    <text x="180" y="160" fill="#64748b" font-size="10" text-anchor="middle">2.0</text>
    <text x="280" y="295" fill="#64748b" font-size="10" text-anchor="middle">4.0</text>

    <!-- Title -->
    <text x="180" y="380" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">Altman Z</text>
    <text x="180" y="402" fill="#94a3b8" font-size="11" text-anchor="middle">safe ≥ 2.99 · danger &lt; 1.81</text>
    <text x="180" y="430" fill="#cbd5e1" font-size="12" text-anchor="middle">안전과 부실 사이</text>
    <text x="180" y="448" fill="#cbd5e1" font-size="12" text-anchor="middle">회색지대 상단부</text>
  </g>

  <!-- ===== Gauge 2: Springate S = 0.65, safe ≥ 0.862, scale 0~1.5 -->
  <!-- v_norm = 0.65/1.5 = 0.4333. angle = 180 - 180*0.4333 = 102° -->
  <!-- Threshold 0.862/1.5 = 0.5747, so danger 0~0.5747 (red), safe>0.5747 -->
  <g>
    <path d="M 380 270 A 100 100 0 0 1 580 270" stroke="#1e293b" stroke-width="20" fill="none"/>
    <!-- Danger 0 to 0.5747: angle 180 to 76.55° -->
    <path d="M 380 270 A 100 100 0 0 1 503.31 172.71" stroke="#ef4444" stroke-width="20" fill="none" opacity="0.85"/>
    <!-- Safe 0.5747 to 1 -->
    <path d="M 503.31 172.71 A 100 100 0 0 1 580 270" stroke="#22c55e" stroke-width="20" fill="none" opacity="0.85"/>

    <!-- Pointer angle 102°. x = 480 + 100*cos(102°) = 480 - 20.79 = 459.21. y = 270 - 100*sin(102°) = 270 - 97.81 = 172.19 -->
    <line x1="480" y1="270" x2="459" y2="172" stroke="#ef4444" stroke-width="4"/>
    <circle cx="480" cy="270" r="8" fill="#ef4444"/>

    <text x="480" y="320" fill="#f1f5f9" font-size="36" font-weight="800" text-anchor="middle">0.65</text>
    <text x="480" y="345" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">부실 위험</text>

    <text x="380" y="295" fill="#64748b" font-size="10" text-anchor="middle">0</text>
    <text x="480" y="160" fill="#64748b" font-size="10" text-anchor="middle">0.75</text>
    <text x="580" y="295" fill="#64748b" font-size="10" text-anchor="middle">1.5</text>

    <text x="480" y="380" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">Springate S</text>
    <text x="480" y="402" fill="#94a3b8" font-size="11" text-anchor="middle">safe ≥ 0.862</text>
    <text x="480" y="430" fill="#cbd5e1" font-size="12" text-anchor="middle">통계 모델이 부실</text>
    <text x="480" y="448" fill="#cbd5e1" font-size="12" text-anchor="middle">위험 영역으로 분류</text>
  </g>

  <!-- ===== Gauge 3: 이자보상배수 = 1.1, scale 0~5, safe ≥ 3.0 -->
  <!-- v_norm = 1.1/5 = 0.22. angle = 180 - 180*0.22 = 140.4° -->
  <!-- Danger 0 to 1.0/5=0.2 red, warn 0.2 to 0.6 yellow, safe>0.6 green -->
  <g>
    <path d="M 680 270 A 100 100 0 0 1 880 270" stroke="#1e293b" stroke-width="20" fill="none"/>
    <!-- Danger 0~0.2: angle 180~144 -->
    <path d="M 680 270 A 100 100 0 0 1 699.10 211.20" stroke="#ef4444" stroke-width="20" fill="none" opacity="0.85"/>
    <!-- Warn 0.2~0.6: angle 144~108 -->
    <path d="M 699.10 211.20 A 100 100 0 0 1 749.10 174.90" stroke="#f59e0b" stroke-width="20" fill="none" opacity="0.85"/>
    <!-- Safe 0.6~1.0 -->
    <path d="M 749.10 174.90 A 100 100 0 0 1 880 270" stroke="#22c55e" stroke-width="20" fill="none" opacity="0.85"/>

    <!-- Pointer angle 140.4°. cos(140.4°) = -0.7705, sin = 0.6374. x = 780 + 100*(-0.7705) = 780 - 77.05 = 702.95. y = 270 - 100*0.6374 = 270 - 63.74 = 206.26 -->
    <line x1="780" y1="270" x2="703" y2="206" stroke="#f59e0b" stroke-width="4"/>
    <circle cx="780" cy="270" r="8" fill="#f59e0b"/>

    <text x="780" y="320" fill="#f1f5f9" font-size="36" font-weight="800" text-anchor="middle">1.1×</text>
    <text x="780" y="345" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">warning</text>

    <text x="680" y="295" fill="#64748b" font-size="10" text-anchor="middle">0</text>
    <text x="780" y="160" fill="#64748b" font-size="10" text-anchor="middle">2.5</text>
    <text x="880" y="295" fill="#64748b" font-size="10" text-anchor="middle">5</text>

    <text x="780" y="380" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">이자보상배수</text>
    <text x="780" y="402" fill="#94a3b8" font-size="11" text-anchor="middle">safe ≥ 3.0×</text>
    <text x="780" y="430" fill="#cbd5e1" font-size="12" text-anchor="middle">영업이익이 이자비용을</text>
    <text x="780" y="448" fill="#cbd5e1" font-size="12" text-anchor="middle">1.1번 밖에 못 덮는다</text>
  </g>

  <!-- ===== Gauge 4: 금융부채 비중 = 62%, scale 0~100%, safe ≤ 40% -->
  <!-- v_norm = 0.62. angle = 180 - 180*0.62 = 68.4° -->
  <!-- Safe 0~0.4 green, warn 0.4~0.7 yellow, danger>0.7 red -->
  <g>
    <path d="M 980 270 A 100 100 0 0 1 1180 270" stroke="#1e293b" stroke-width="20" fill="none"/>
    <!-- Safe 0~0.4: angle 180~108 -->
    <path d="M 980 270 A 100 100 0 0 1 1049.10 174.90" stroke="#22c55e" stroke-width="20" fill="none" opacity="0.85"/>
    <!-- Warn 0.4~0.7: angle 108~54 -->
    <path d="M 1049.10 174.90 A 100 100 0 0 1 1138.78 189.10" stroke="#f59e0b" stroke-width="20" fill="none" opacity="0.85"/>
    <!-- Danger 0.7~1.0 -->
    <path d="M 1138.78 189.10 A 100 100 0 0 1 1180 270" stroke="#ef4444" stroke-width="20" fill="none" opacity="0.85"/>

    <!-- Pointer angle 68.4°. cos(68.4°) = 0.3681, sin = 0.9298. x = 1080 + 100*0.3681 = 1116.81. y = 270 - 100*0.9298 = 177.02 -->
    <line x1="1080" y1="270" x2="1117" y2="177" stroke="#f59e0b" stroke-width="4"/>
    <circle cx="1080" cy="270" r="8" fill="#f59e0b"/>

    <text x="1080" y="320" fill="#f1f5f9" font-size="36" font-weight="800" text-anchor="middle">62%</text>
    <text x="1080" y="345" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">warning</text>

    <text x="980" y="295" fill="#64748b" font-size="10" text-anchor="middle">0%</text>
    <text x="1080" y="160" fill="#64748b" font-size="10" text-anchor="middle">50%</text>
    <text x="1180" y="295" fill="#64748b" font-size="10" text-anchor="middle">100%</text>

    <text x="1080" y="380" fill="#cbd5e1" font-size="16" font-weight="700" text-anchor="middle">금융부채 비중</text>
    <text x="1080" y="402" fill="#94a3b8" font-size="11" text-anchor="middle">safe ≤ 40%</text>
    <text x="1080" y="430" fill="#cbd5e1" font-size="12" text-anchor="middle">레버리지가 이익 감소에</text>
    <text x="1080" y="448" fill="#cbd5e1" font-size="12" text-anchor="middle">가장 먼저 약점 노출</text>
  </g>

  <!-- Bottom callout -->
  <rect x="60" y="495" width="1080" height="50" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
  <text x="600" y="520" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">손익·재무구조·이자커버 세 축이 같은 분기에 같은 방향으로 약해졌다</text>
  <text x="600" y="538" fill="#cbd5e1" font-size="12" text-anchor="middle">한 항목이 흔들린 게 아니라 4 신호가 동시에 점등 — 회계 차원 일회성 처리가 아닌 체력 전반의 신호</text>

  <!-- Bottom note -->
  <text x="600" y="582" fill="#64748b" font-size="11" text-anchor="middle">참고 · Piotroski F 6/9 (보통) 은 FCF 흑자 유지 덕분 — 운전자본 회수 + capex 축소로 현금흐름은 살아 있는 두 갈래 신호</text>
</svg>
