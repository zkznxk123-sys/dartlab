<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <text x="600" y="50" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="700">한앤컴퍼니 9 년 사이클 — 4 단 출구의 시간표</text>
  <text x="600" y="80" text-anchor="middle" fill="#64748b" font-size="14">2016 인수 → 자기주식 소각 → 공개매수 → 자진상폐 → 역합병 → 합병기일</text>

  <!-- Main timeline axis -->
  <line x1="80" y1="340" x2="1120" y2="340" stroke="#334155" stroke-width="2"/>

  <!-- Year ticks -->
  <g fill="#64748b" font-size="11" text-anchor="middle">
    <line x1="80" y1="335" x2="80" y2="345" stroke="#334155" stroke-width="2"/>
    <text x="80" y="365">2016</text>
    <line x1="220" y1="335" x2="220" y2="345" stroke="#334155" stroke-width="2"/>
    <text x="220" y="365">2018</text>
    <line x1="360" y1="335" x2="360" y2="345" stroke="#334155" stroke-width="2"/>
    <text x="360" y="365">2020</text>
    <line x1="500" y1="335" x2="500" y2="345" stroke="#334155" stroke-width="2"/>
    <text x="500" y="365">2022</text>
    <line x1="640" y1="335" x2="640" y2="345" stroke="#334155" stroke-width="2"/>
    <text x="640" y="365">2023</text>
    <line x1="780" y1="335" x2="780" y2="345" stroke="#334155" stroke-width="2"/>
    <text x="780" y="365">2024</text>
    <line x1="920" y1="335" x2="920" y2="345" stroke="#334155" stroke-width="2"/>
    <text x="920" y="365">2025</text>
    <line x1="1060" y1="335" x2="1060" y2="345" stroke="#334155" stroke-width="2"/>
    <text x="1060" y="365">2026</text>
  </g>

  <!-- Event 1: 2016-04 Acquisition -->
  <g>
    <line x1="100" y1="200" x2="100" y2="340" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="100" cy="340" r="9" fill="#fbbf24"/>
    <text x="100" y="180" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">2016-04</text>
    <text x="100" y="160" text-anchor="middle" fill="#f1f5f9" font-size="12">한앤컴퍼니 인수</text>
    <text x="100" y="140" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">1.44 조</text>
    <text x="100" y="120" text-anchor="middle" fill="#64748b" font-size="11">지분 77.68%</text>
    <text x="100" y="105" text-anchor="middle" fill="#64748b" font-size="11">LBO 7,800 억</text>
  </g>

  <!-- Event 2: 2023.09/10 Treasury share cancel -->
  <g>
    <line x1="640" y1="200" x2="640" y2="340" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="640" cy="340" r="9" fill="#fbbf24"/>
    <text x="640" y="180" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">2023-09 / 10</text>
    <text x="640" y="160" text-anchor="middle" fill="#f1f5f9" font-size="12">자기주식 소각</text>
    <text x="640" y="140" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">516 만 주</text>
    <text x="640" y="120" text-anchor="middle" fill="#64748b" font-size="11">한 해 두 차례</text>
  </g>

  <!-- Event 3: 2024-02~03 Tender offer -->
  <g>
    <line x1="760" y1="430" x2="760" y2="340" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="760" cy="340" r="9" fill="#fbbf24"/>
    <text x="760" y="455" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">2024-02 ~ 03</text>
    <text x="760" y="475" text-anchor="middle" fill="#f1f5f9" font-size="12">공개매수</text>
    <text x="760" y="495" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">7,018 억</text>
    <text x="760" y="513" text-anchor="middle" fill="#64748b" font-size="11">7,000 원 / 주</text>
  </g>

  <!-- Event 4: 2024-07-09 Voluntary delist -->
  <g>
    <line x1="820" y1="200" x2="820" y2="340" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="820" cy="340" r="9" fill="#fbbf24"/>
    <text x="820" y="180" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">2024-07-09</text>
    <text x="820" y="160" text-anchor="middle" fill="#f1f5f9" font-size="12">자진 상장폐지</text>
    <text x="820" y="140" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">49 년 만</text>
    <text x="820" y="120" text-anchor="middle" fill="#64748b" font-size="11">상장 1975 →</text>
  </g>

  <!-- Event 5: 2025-10-27 Reverse merger -->
  <g>
    <line x1="970" y1="430" x2="970" y2="340" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="970" cy="340" r="9" fill="#fbbf24"/>
    <text x="970" y="455" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">2025-10-27</text>
    <text x="970" y="475" text-anchor="middle" fill="#f1f5f9" font-size="12">역합병 결정</text>
    <text x="970" y="495" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">0.0260909</text>
    <text x="970" y="513" text-anchor="middle" fill="#64748b" font-size="11">자회사 → 모회사</text>
  </g>

  <!-- Event 6: 2026-01-01 Merger effective (future) -->
  <g>
    <line x1="1060" y1="200" x2="1060" y2="340" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="1060" cy="340" r="11" fill="#22c55e"/>
    <text x="1060" y="180" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">2026-01-01</text>
    <text x="1060" y="160" text-anchor="middle" fill="#f1f5f9" font-size="12">합병 기일</text>
    <text x="1060" y="140" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">미래</text>
    <text x="1060" y="120" text-anchor="middle" fill="#64748b" font-size="11">BS 정상화 완성</text>
  </g>

  <!-- Holding period bracket -->
  <g>
    <line x1="100" y1="270" x2="970" y2="270" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="535" y="262" text-anchor="middle" fill="#64748b" font-size="13">9 년 보유 사이클 (PE 표준 5~7 년 대비 +2~4 년)</text>
  </g>

  <!-- Footer -->
  <text x="600" y="555" text-anchor="middle" fill="#64748b" font-size="11">출처: DART 공시 · 사업보고서 (2025.12) · rcept_no 20251027000344</text>
  <text x="600" y="575" text-anchor="middle" fill="#64748b" font-size="11">합병기일 2026-01-01 부로 SPV 한앤코시멘트홀딩스 부채 일괄 승계 + 자본 재배치</text>
</svg>
