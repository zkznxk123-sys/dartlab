<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="700">매출 -20% 의 4 갈래 — 같은 회사 안에서 정반대 방향</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-size="14">시멘트 내수 -20% / 수출 +35% / 환경 +5% / 기타 -56% (2023 → 2025, 단위 억원)</text>

  <!-- Stacked bar chart area -->
  <!-- Bar parameters: x positions for 2023, 2024, 2025; baseline y=520, top y=130 -->
  <!-- Max bar value 18,694 → height 390 -->
  <!-- Helper: scale = 390 / 18700 ≈ 0.02086 px per ₩억 -->

  <!-- Y axis -->
  <line x1="180" y1="130" x2="180" y2="520" stroke="#334155" stroke-width="1"/>
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="170" y="525">0</text>
    <text x="170" y="427">5,000</text>
    <text x="170" y="329">10,000</text>
    <text x="170" y="231">15,000</text>
    <text x="170" y="135">20,000</text>
  </g>
  <g stroke="#1e293b" stroke-width="1" stroke-dasharray="2,3">
    <line x1="180" y1="424" x2="1100" y2="424"/>
    <line x1="180" y1="326" x2="1100" y2="326"/>
    <line x1="180" y1="228" x2="1100" y2="228"/>
    <line x1="180" y1="130" x2="1100" y2="130"/>
  </g>

  <!-- 2023: total 18,694 → 13,887 + 1,003 + 1,215 + 2,589 -->
  <!-- bar x=260, width=180 -->
  <!-- 시멘트 내수 13,887 → height 290 → top y = 520-290 = 230 -->
  <!-- 시멘트 수출 1,003 → height 21 → top y = 230-21 = 209 -->
  <!-- 환경 1,215 → height 25 → top y = 209-25 = 184 -->
  <!-- 기타 2,589 → height 54 → top y = 184-54 = 130 -->
  <g>
    <rect x="260" y="230" width="180" height="290" fill="#ef4444" opacity="0.85"/>
    <rect x="260" y="209" width="180" height="21" fill="#22c55e" opacity="0.85"/>
    <rect x="260" y="184" width="180" height="25" fill="#fbbf24" opacity="0.85"/>
    <rect x="260" y="130" width="180" height="54" fill="#64748b" opacity="0.85"/>
    <text x="350" y="544" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">2023</text>
    <text x="350" y="120" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">18,694</text>
  </g>

  <!-- 2024: total 16,957 → 12,884 + 1,042 + 1,247 + 1,784 -->
  <!-- 시멘트 내수 12,884 → 269 → y = 520-269 = 251 -->
  <!-- 시멘트 수출 1,042 → 22 → y = 251-22 = 229 -->
  <!-- 환경 1,247 → 26 → y = 229-26 = 203 -->
  <!-- 기타 1,784 → 37 → y = 203-37 = 166 -->
  <g>
    <rect x="510" y="251" width="180" height="269" fill="#ef4444" opacity="0.85"/>
    <rect x="510" y="229" width="180" height="22" fill="#22c55e" opacity="0.85"/>
    <rect x="510" y="203" width="180" height="26" fill="#fbbf24" opacity="0.85"/>
    <rect x="510" y="166" width="180" height="37" fill="#64748b" opacity="0.85"/>
    <text x="600" y="544" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">2024</text>
    <text x="600" y="156" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">16,957</text>
  </g>

  <!-- 2025: total 14,886 → 11,108 + 1,355 + 1,279 + 1,143 -->
  <!-- 시멘트 내수 11,108 → 232 → y = 520-232 = 288 -->
  <!-- 시멘트 수출 1,355 → 28 → y = 288-28 = 260 -->
  <!-- 환경 1,279 → 27 → y = 260-27 = 233 -->
  <!-- 기타 1,143 → 24 → y = 233-24 = 209 -->
  <g>
    <rect x="760" y="288" width="180" height="232" fill="#ef4444" opacity="0.85"/>
    <rect x="760" y="260" width="180" height="28" fill="#22c55e" opacity="0.85"/>
    <rect x="760" y="233" width="180" height="27" fill="#fbbf24" opacity="0.85"/>
    <rect x="760" y="209" width="180" height="24" fill="#64748b" opacity="0.85"/>
    <text x="850" y="544" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">2025</text>
    <text x="850" y="199" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">14,886</text>
  </g>

  <!-- Change arrows -->
  <!-- 시멘트 내수 -20% : at right side -->
  <g>
    <text x="985" y="410" fill="#ef4444" font-size="13" font-weight="700">시멘트 내수</text>
    <text x="985" y="430" fill="#ef4444" font-size="20" font-weight="700">-20.0%</text>
    <text x="985" y="447" fill="#64748b" font-size="11">13,887 → 11,108</text>
  </g>
  <g>
    <text x="985" y="280" fill="#22c55e" font-size="13" font-weight="700">시멘트 수출</text>
    <text x="985" y="300" fill="#22c55e" font-size="20" font-weight="700">+35.2%</text>
    <text x="985" y="317" fill="#64748b" font-size="11">1,003 → 1,355</text>
  </g>
  <g>
    <text x="985" y="240" fill="#fbbf24" font-size="13" font-weight="700">환경</text>
    <text x="985" y="225" fill="#fbbf24" font-size="18" font-weight="700">+5.3%</text>
    <text x="985" y="208" fill="#64748b" font-size="11">1,215 → 1,279</text>
  </g>
  <g>
    <text x="985" y="180" fill="#94a3b8" font-size="13" font-weight="700">기타</text>
    <text x="985" y="160" fill="#94a3b8" font-size="18" font-weight="700">-55.8%</text>
    <text x="985" y="143" fill="#64748b" font-size="11">2,589 → 1,143</text>
  </g>

  <!-- Legend top-left -->
  <g font-size="12">
    <rect x="200" y="92" width="14" height="14" fill="#ef4444" opacity="0.85"/>
    <text x="220" y="103" fill="#f1f5f9">시멘트 내수</text>
    <rect x="320" y="92" width="14" height="14" fill="#22c55e" opacity="0.85"/>
    <text x="340" y="103" fill="#f1f5f9">시멘트 수출</text>
    <rect x="440" y="92" width="14" height="14" fill="#fbbf24" opacity="0.85"/>
    <text x="460" y="103" fill="#f1f5f9">환경</text>
    <rect x="510" y="92" width="14" height="14" fill="#64748b" opacity="0.85"/>
    <text x="530" y="103" fill="#f1f5f9">기타</text>
  </g>

  <text x="600" y="585" text-anchor="middle" fill="#64748b" font-size="11">출처: 쌍용씨앤이 사업보고서 사업부별 매출 (2023~2025) · 단위 억원</text>
</svg>
