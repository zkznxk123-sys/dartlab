<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="700">2025 부실 4 신호 동시 점등</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-size="14">Altman Z · Springate S · Piotroski F · 유동비율 — 모형값 4 개가 같은 임계 아래</text>

  <!-- Each gauge: arc 180° from 200° to 340° (so center top), radius 90, center y=240 -->
  <!-- Use a simple semicircle arc from (-90°)=left to (+90°)=right meaning arc going from x-r to x+r. -->
  <!-- We will draw a half-donut (semi-circle bottom) with foreground arc indicating value, background arc indicating range. -->

  <!-- Helper marker definitions -->
  <defs>
    <linearGradient id="zoneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Gauge 1: Altman Z = 0.64, threshold 1.81, danger -->
  <!-- Center x=200 y=260 r=90 -->
  <g>
    <!-- Background semicircle -->
    <path d="M 110 260 A 90 90 0 0 1 290 260" fill="none" stroke="#1e293b" stroke-width="20" stroke-linecap="round"/>
    <!-- Zones: red 0-1.81 (110->210), amber 1.81-2.99, green 2.99+. We render as gradient mock with marker -->
    <!-- Red zone full from start to 60% mark for visual safety zone separation -->
    <path d="M 110 260 A 90 90 0 0 1 290 260" fill="none" stroke="url(#zoneGrad)" stroke-width="20" stroke-linecap="round" opacity="0.25"/>
    <!-- Threshold line at 1.81 (out of, say, 4 max) → angle = 180° + (1.81/4)*180° = 180 + 81.45 = 261.45° -->
    <!-- Easier: position threshold marker on arc mathematically. theta_deg = 180° (left) + ratio*180°  -->
    <!-- ratio = 1.81/4 = 0.4525 → theta = 180 + 81.45 = 261.45 (measured ccw from x-axis; but arc here is upper semicircle) -->
    <!-- Simpler: position threshold tick visually at ~left-middle -->
    <line x1="160" y1="187" x2="170" y2="200" stroke="#22c55e" stroke-width="2"/>
    <text x="155" y="183" text-anchor="end" fill="#22c55e" font-size="10">1.81</text>
    <!-- Needle for value 0.64 (out of 4): ratio 0.16 → far left -->
    <line x1="200" y1="260" x2="124" y2="226" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <circle cx="200" cy="260" r="6" fill="#ef4444"/>
    <text x="200" y="295" text-anchor="middle" fill="#ef4444" font-size="32" font-weight="700">0.64</text>
    <text x="200" y="320" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">Altman Z</text>
    <text x="200" y="338" text-anchor="middle" fill="#64748b" font-size="11">safe ≥ 1.81</text>
    <text x="200" y="355" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">부실 위험</text>
  </g>

  <!-- Gauge 2: Springate S = -0.18, threshold 0.862 -->
  <g>
    <path d="M 410 260 A 90 90 0 0 1 590 260" fill="none" stroke="#1e293b" stroke-width="20" stroke-linecap="round"/>
    <path d="M 410 260 A 90 90 0 0 1 590 260" fill="none" stroke="url(#zoneGrad)" stroke-width="20" stroke-linecap="round" opacity="0.25"/>
    <!-- Threshold at 0.862 (assume range -1 to 2; ratio = (0.862+1)/3 = 0.621 → angle 180+111.7 ≈ at upper-right) -->
    <line x1="540" y1="187" x2="538" y2="200" stroke="#22c55e" stroke-width="2"/>
    <text x="555" y="183" text-anchor="start" fill="#22c55e" font-size="10">0.862</text>
    <!-- Needle for -0.18 (range -1 to 2 → ratio 0.27) → far left -->
    <line x1="500" y1="260" x2="425" y2="234" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <circle cx="500" cy="260" r="6" fill="#ef4444"/>
    <text x="500" y="295" text-anchor="middle" fill="#ef4444" font-size="32" font-weight="700">-0.18</text>
    <text x="500" y="320" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">Springate S</text>
    <text x="500" y="338" text-anchor="middle" fill="#64748b" font-size="11">safe ≥ 0.862</text>
    <text x="500" y="355" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">부실 위험</text>
  </g>

  <!-- Gauge 3: Piotroski F = 1/9, threshold 7 -->
  <g>
    <path d="M 710 260 A 90 90 0 0 1 890 260" fill="none" stroke="#1e293b" stroke-width="20" stroke-linecap="round"/>
    <path d="M 710 260 A 90 90 0 0 1 890 260" fill="none" stroke="url(#zoneGrad)" stroke-width="20" stroke-linecap="round" opacity="0.25"/>
    <!-- Threshold at 7/9 → ratio 0.778 → upper-right area -->
    <line x1="855" y1="200" x2="858" y2="213" stroke="#22c55e" stroke-width="2"/>
    <text x="868" y="200" text-anchor="start" fill="#22c55e" font-size="10">7/9</text>
    <!-- Needle for 1/9 → ratio 0.111 → far left -->
    <line x1="800" y1="260" x2="720" y2="244" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <circle cx="800" cy="260" r="6" fill="#ef4444"/>
    <text x="800" y="295" text-anchor="middle" fill="#ef4444" font-size="32" font-weight="700">1 / 9</text>
    <text x="800" y="320" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">Piotroski F</text>
    <text x="800" y="338" text-anchor="middle" fill="#64748b" font-size="11">safe ≥ 7</text>
    <text x="800" y="355" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">재무 약화</text>
  </g>

  <!-- Gauge 4: 유동비율 = 45.4%, threshold 100% -->
  <g>
    <path d="M 1010 260 A 90 90 0 0 1 1190 260" fill="none" stroke="#1e293b" stroke-width="20" stroke-linecap="round"/>
    <path d="M 1010 260 A 90 90 0 0 1 1190 260" fill="none" stroke="url(#zoneGrad)" stroke-width="20" stroke-linecap="round" opacity="0.25"/>
    <!-- Threshold at 100% (range 0-200%) → ratio 0.5 → top center -->
    <line x1="1100" y1="170" x2="1100" y2="183" stroke="#22c55e" stroke-width="2"/>
    <text x="1100" y="163" text-anchor="middle" fill="#22c55e" font-size="10">100%</text>
    <!-- Needle for 45.4% → ratio 0.227 → left-upper -->
    <line x1="1100" y1="260" x2="1024" y2="234" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <circle cx="1100" cy="260" r="6" fill="#f59e0b"/>
    <text x="1100" y="295" text-anchor="middle" fill="#f59e0b" font-size="32" font-weight="700">45.4%</text>
    <text x="1100" y="320" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">유동비율</text>
    <text x="1100" y="338" text-anchor="middle" fill="#64748b" font-size="11">safe ≥ 100%</text>
    <text x="1100" y="355" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">경고 구간</text>
  </g>

  <!-- Bottom callout panel -->
  <g>
    <rect x="100" y="410" width="1000" height="125" fill="#111827" stroke="#334155" stroke-width="1" rx="6"/>
    <text x="600" y="445" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">분자 약화 + 분모 (자본) 점프 — 부채비율만 102% 정상 구간</text>
    <text x="600" y="475" text-anchor="middle" fill="#f1f5f9" font-size="13">운전자본 -7,260 억 · EBIT 1,060 억 · 시가총액 비공개 — Z·S·F 분자 4 항이 동시에 약해진 자리</text>
    <text x="600" y="500" text-anchor="middle" fill="#94a3b8" font-size="13">같은 BS 의 부채비율은 641% → 102% 로 정상화 — 분모 (자본총계) 가 +14,833 억 점프한 결과</text>
    <text x="600" y="522" text-anchor="middle" fill="#64748b" font-size="11">한쪽 표는 부실 진입을, 다른 쪽 표는 재구성 성공을 같은 12 개월에서 가리킨다</text>
  </g>

  <text x="600" y="575" text-anchor="middle" fill="#64748b" font-size="11">출처: 쌍용씨앤이 사업보고서 (2025.12) · dartlab analysis 엔진 distress signals</text>
</svg>
