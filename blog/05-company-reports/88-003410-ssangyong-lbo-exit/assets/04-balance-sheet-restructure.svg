<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="700">부채비율 641% → 102% — 1 년 만의 합병 회계 충격</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-size="14">2024 년 말 vs 2025 년 말 BS 비교 — 비유동부채 -18,500 억 · 자본총계 +14,833 억 (단위 억원)</text>

  <!-- Two BS columns: left (2024) and right (2025); each has stacked bars: 부채총계 (top) + 자본총계 (bottom) split -->
  <!-- We'll show side-by-side stacked bars: each = 부채 (red) on top, 자본 (gold) on bottom; total = 부채 + 자본 -->

  <!-- Scale: max total = 38,936 + 6,074 = 45,010 (2024) ;  21,238 + 20,907 = 42,145 (2025) -->
  <!-- Use scale: 1 억 = 0.0095 px; max total ~45,010 → height 428 -->
  <!-- baseline y=520, top of tallest bar = 520-428 = 92. We'll target top y~110 → max h=410 → scale 0.0091 -->

  <!-- Helper note: 2024: 부채 38,936 → 354 px; 자본 6,074 → 55 px; total height 409 -->
  <!-- 2025: 부채 21,238 → 193 px; 자본 20,907 → 190 px; total height 383 -->

  <!-- 2024 Bar -->
  <g>
    <rect x="200" y="166" width="200" height="354" fill="#ef4444" opacity="0.85"/>
    <rect x="200" y="465" width="200" height="55" fill="#fbbf24" opacity="0.85"/>
    <text x="300" y="544" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">2024 년 말</text>
    <text x="300" y="560" text-anchor="middle" fill="#64748b" font-size="11">자진상폐 직후 LBO 시기 BS</text>

    <!-- Inside labels -->
    <text x="300" y="345" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">부채총계</text>
    <text x="300" y="365" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">38,936</text>
    <text x="300" y="500" text-anchor="middle" fill="#0a0e1a" font-size="13" font-weight="700">자본 6,074</text>

    <!-- Right side breakdown -->
    <text x="300" y="156" text-anchor="middle" fill="#ef4444" font-size="22" font-weight="700">641%</text>
    <text x="300" y="135" text-anchor="middle" fill="#64748b" font-size="11">부채비율 = 부채 ÷ 자본</text>
  </g>

  <!-- 2025 Bar -->
  <g>
    <rect x="800" y="137" width="200" height="193" fill="#22c55e" opacity="0.55"/>
    <rect x="800" y="330" width="200" height="190" fill="#fbbf24" opacity="0.85"/>
    <text x="900" y="544" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">2025 년 말</text>
    <text x="900" y="560" text-anchor="middle" fill="#64748b" font-size="11">역합병 후 BS 정상화</text>

    <text x="900" y="225" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">부채총계</text>
    <text x="900" y="245" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">21,238</text>
    <text x="900" y="420" text-anchor="middle" fill="#0a0e1a" font-size="14" font-weight="700">자본총계</text>
    <text x="900" y="440" text-anchor="middle" fill="#0a0e1a" font-size="20" font-weight="700">20,907</text>

    <text x="900" y="125" text-anchor="middle" fill="#22c55e" font-size="22" font-weight="700">102%</text>
    <text x="900" y="104" text-anchor="middle" fill="#64748b" font-size="11">부채비율 정상권 진입</text>
  </g>

  <!-- Center change panel -->
  <g>
    <rect x="450" y="160" width="300" height="340" fill="#111827" stroke="#334155" stroke-width="1" rx="6"/>
    <text x="600" y="190" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">12 개월 변화의 4 줄</text>

    <!-- Change row 1 -->
    <g>
      <text x="475" y="232" fill="#f1f5f9" font-size="13">비유동부채</text>
      <text x="725" y="232" text-anchor="end" fill="#22c55e" font-size="15" font-weight="700">-18,500</text>
      <text x="475" y="248" fill="#64748b" font-size="11">26,448 → 7,948 억</text>
    </g>

    <!-- Change row 2 -->
    <g>
      <text x="475" y="288" fill="#f1f5f9" font-size="13">자본총계</text>
      <text x="725" y="288" text-anchor="end" fill="#fbbf24" font-size="15" font-weight="700">+14,833</text>
      <text x="475" y="304" fill="#64748b" font-size="11">6,074 → 20,907 억</text>
    </g>

    <!-- Change row 3 -->
    <g>
      <text x="475" y="344" fill="#f1f5f9" font-size="13">이익잉여금</text>
      <text x="725" y="344" text-anchor="end" fill="#fbbf24" font-size="15" font-weight="700">+10,104</text>
      <text x="475" y="360" fill="#64748b" font-size="11">7,262 → 17,366 억</text>
    </g>

    <!-- Change row 4 -->
    <g>
      <text x="475" y="400" fill="#f1f5f9" font-size="13">자본잉여금</text>
      <text x="725" y="400" text-anchor="end" fill="#fbbf24" font-size="15" font-weight="700">+4,285</text>
      <text x="475" y="416" fill="#64748b" font-size="11">2,627 → 6,912 억</text>
    </g>

    <line x1="475" y1="438" x2="725" y2="438" stroke="#334155" stroke-width="1"/>
    <text x="600" y="465" text-anchor="middle" fill="#94a3b8" font-size="11">합병 회계 → SPV 부채 승계 +</text>
    <text x="600" y="482" text-anchor="middle" fill="#94a3b8" font-size="11">자본 항목 재배치의 결과</text>
  </g>

  <!-- Arrows from left bar to center and from center to right bar -->
  <g>
    <line x1="405" y1="350" x2="445" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
    <line x1="755" y1="280" x2="795" y2="280" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowY)"/>
  </g>
  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrowY" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Legend -->
  <g font-size="12">
    <rect x="100" y="92" width="14" height="14" fill="#ef4444" opacity="0.85"/>
    <text x="120" y="103" fill="#f1f5f9">부채 (LBO 시기)</text>
    <rect x="240" y="92" width="14" height="14" fill="#22c55e" opacity="0.55"/>
    <text x="260" y="103" fill="#f1f5f9">부채 (재구성 후)</text>
    <rect x="380" y="92" width="14" height="14" fill="#fbbf24" opacity="0.85"/>
    <text x="400" y="103" fill="#f1f5f9">자본총계</text>
  </g>

  <text x="600" y="585" text-anchor="middle" fill="#64748b" font-size="11">출처: 쌍용씨앤이 사업보고서 (2024 · 2025) BS · 합병 효력 발생 전 결산 비교</text>
</svg>
