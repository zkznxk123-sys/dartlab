<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <text x="600" y="44" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="700">한국 시멘트 출하량 — 1991 년 이래 34 년 최저</text>
  <text x="600" y="72" text-anchor="middle" fill="#64748b" font-size="14">2025 년 3,650 만 톤 — 1 기 신도시 시작 (1991) 이래 가장 낮은 자리</text>

  <!-- Chart area: x: 90~990, y: 130~440 -->
  <!-- Year axis 1991~2025 (34 years) -->
  <!-- Y axis: 3,000~5,500 (만 톤) -->

  <!-- Y axis -->
  <line x1="90" y1="130" x2="90" y2="440" stroke="#334155" stroke-width="1"/>
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="82" y="135">5,500</text>
    <text x="82" y="197">5,000</text>
    <text x="82" y="259">4,500</text>
    <text x="82" y="321">4,000</text>
    <text x="82" y="383">3,500</text>
    <text x="82" y="445">3,000</text>
  </g>
  <g stroke="#1e293b" stroke-width="1" stroke-dasharray="2,3">
    <line x1="90" y1="193" x2="990" y2="193"/>
    <line x1="90" y1="255" x2="990" y2="255"/>
    <line x1="90" y1="317" x2="990" y2="317"/>
    <line x1="90" y1="379" x2="990" y2="379"/>
  </g>

  <!-- X axis -->
  <line x1="90" y1="440" x2="990" y2="440" stroke="#334155" stroke-width="1"/>

  <!-- year_to_x = 90 + ((year-1991)/34) * 900 -->
  <!-- Helper: x for each labelled year -->
  <!-- 1991 → 90 ; 1995 → 90 + (4/34)*900=196 ; 2000 → 90 + (9/34)*900=328 ; 2005 → 460 ; 2008 → 540 ; 2010 → 593 ; 2015 → 725 ; 2020 → 858 ; 2024 → 963 ; 2025 → 990 -->

  <!-- val_to_y: y = 440 - ((val-3000)/2500)*310, where val in 만 톤 -->
  <!-- 3,711 → 440 - (711/2500)*310 = 440 - 88 = 352 -->
  <!-- 5,400 → 440 - (2400/2500)*310 = 440 - 298 = 142 -->
  <!-- 4,800 → 440 - (1800/2500)*310 = 440 - 223 = 217 -->
  <!-- 5,000 → 440 - (2000/2500)*310 = 440 - 248 = 192 -->
  <!-- 4,500 → 440 - (1500/2500)*310 = 440 - 186 = 254 -->
  <!-- 4,300 → 440 - (1300/2500)*310 = 440 - 161 = 279 -->
  <!-- 3,650 → 440 - (650/2500)*310 = 440 - 81 = 359 -->

  <!-- Line path through key points: -->
  <!-- 1991 (90,352), 1995 (196,200), 1998 (276,300) IMF dip,  2000 (328,260), 2005 (460,220), 2008 (540,142) PEAK, 2010 (593,200), 2015 (725,217), 2020 (858,192), 2023 (937,254), 2024 (963,279), 2025 (990,359) -->

  <path d="M 90 352 L 150 250 L 196 200 L 276 300 L 328 260 L 460 220 L 540 142 L 593 200 L 725 217 L 858 192 L 937 254 L 963 279 L 990 359" fill="none" stroke="#94a3b8" stroke-width="2"/>

  <!-- Last segment in red emphasising 2025 drop -->
  <path d="M 963 279 L 990 359" fill="none" stroke="#ef4444" stroke-width="3"/>

  <!-- Highlight points -->
  <g>
    <!-- 1991 -->
    <circle cx="90" cy="352" r="5" fill="#fbbf24"/>
    <text x="95" y="378" fill="#fbbf24" font-size="11" font-weight="600">1991</text>
    <text x="95" y="392" fill="#64748b" font-size="10">3,711 만 톤</text>
    <text x="95" y="406" fill="#64748b" font-size="10">(1 기 신도시 시작)</text>

    <!-- 2008 PEAK -->
    <circle cx="540" cy="142" r="5" fill="#22c55e"/>
    <text x="540" y="128" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">2008 PEAK</text>
    <text x="540" y="115" text-anchor="middle" fill="#64748b" font-size="10">5,400 만 톤</text>

    <!-- 2015 -->
    <circle cx="725" cy="217" r="4" fill="#94a3b8"/>
    <text x="725" y="207" text-anchor="middle" fill="#94a3b8" font-size="10">2015</text>
    <text x="725" y="195" text-anchor="middle" fill="#64748b" font-size="10">한앤 인수 1 년 전</text>

    <!-- 2025 -->
    <circle cx="990" cy="359" r="7" fill="#ef4444"/>
    <text x="985" y="332" text-anchor="end" fill="#ef4444" font-size="13" font-weight="700">2025</text>
    <text x="985" y="318" text-anchor="end" fill="#ef4444" font-size="14" font-weight="700">3,650 만 톤</text>
    <text x="985" y="304" text-anchor="end" fill="#ef4444" font-size="11">34 년 최저</text>
    <text x="985" y="290" text-anchor="end" fill="#64748b" font-size="10">PF 위기 + 출하 동시 추락</text>
  </g>

  <!-- X-axis ticks -->
  <g fill="#64748b" font-size="10" text-anchor="middle">
    <text x="90" y="456">1991</text>
    <text x="328" y="456">2000</text>
    <text x="540" y="456">2008</text>
    <text x="725" y="456">2015</text>
    <text x="858" y="456">2020</text>
    <text x="990" y="456">2025</text>
  </g>

  <!-- 6사 가동률 박스 (right side) -->
  <g>
    <rect x="1015" y="130" width="170" height="310" fill="#111827" stroke="#334155" stroke-width="1" rx="6"/>
    <text x="1100" y="155" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">2025 6 사 가동률</text>
    <line x1="1030" y1="165" x2="1170" y2="165" stroke="#334155" stroke-width="1"/>

    <!-- Each row -->
    <g font-size="12">
      <text x="1030" y="190" fill="#22c55e" font-weight="700">쌍용</text>
      <text x="1170" y="190" text-anchor="end" fill="#22c55e" font-weight="700">77.4%</text>
      <text x="1030" y="208" fill="#64748b" font-size="10">1 위</text>

      <text x="1030" y="240" fill="#f1f5f9">한일</text>
      <text x="1170" y="240" text-anchor="end" fill="#f1f5f9">—</text>

      <text x="1030" y="270" fill="#f1f5f9">아세아</text>
      <text x="1170" y="270" text-anchor="end" fill="#f59e0b">57.0%</text>

      <text x="1030" y="300" fill="#f1f5f9">성신</text>
      <text x="1170" y="300" text-anchor="end" fill="#ef4444">49.3%</text>

      <text x="1030" y="330" fill="#f1f5f9">삼표</text>
      <text x="1170" y="330" text-anchor="end" fill="#ef4444">48.3%</text>
    </g>

    <line x1="1030" y1="345" x2="1170" y2="345" stroke="#334155" stroke-width="1"/>
    <text x="1100" y="370" text-anchor="middle" fill="#94a3b8" font-size="10">6 사 평균 50% 대 산업</text>
    <text x="1100" y="385" text-anchor="middle" fill="#94a3b8" font-size="10">에서 1 위도 풀가동의</text>
    <text x="1100" y="400" text-anchor="middle" fill="#94a3b8" font-size="10">3/4 자리</text>
    <text x="1100" y="425" text-anchor="middle" fill="#64748b" font-size="9">(KCA 산업 출하 통계)</text>
  </g>

  <!-- Bottom note -->
  <g>
    <rect x="90" y="475" width="1095" height="80" fill="#111827" stroke="#334155" stroke-width="1" rx="6"/>
    <text x="640" y="500" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700">"PF 위기 + 1991 이래 최저" — 산업 사이클 바닥에서 LBO 출구가 진행됐다</text>
    <text x="640" y="525" text-anchor="middle" fill="#94a3b8" font-size="12">민간 PF 130 조 익스포저 + 정부 SOC 둔화 — 양쪽 동시 약화 자리에서 시멘트 출하가 가장 먼저 후퇴</text>
    <text x="640" y="545" text-anchor="middle" fill="#64748b" font-size="11">쌍용 한 회사의 매출 -20% 는 산업 전체 사이클 바닥의 표시</text>
  </g>

  <text x="600" y="585" text-anchor="middle" fill="#64748b" font-size="11">출처: 한국시멘트협회 (KCA) 출하 통계 · 1991~2025 · 2025 = 3,650 만 톤 (잠정)</text>
</svg>
