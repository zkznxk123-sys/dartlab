<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="40" y="46" fill="#f1f5f9" font-size="22" font-weight="700">분기 매출 9 년 시계열 — Q4 spike 6 년과 2024 소실</text>
  <text x="40" y="72" fill="#64748b" font-size="13">2017Q4 → 2025Q4 · 단위 억원 · 직전 6 년 Q4 평균 4,036 억 · 2024Q4 -76% 폭락</text>

  <!-- Y axis -->
  <line x1="80" y1="110" x2="80" y2="500" stroke="#1e293b" stroke-width="1"/>
  <line x1="80" y1="500" x2="1160" y2="500" stroke="#334155" stroke-width="1"/>

  <!-- Y grid + labels (max 6,000) -->
  <g font-size="11" fill="#64748b" text-anchor="end">
    <line x1="80" y1="500" x2="1160" y2="500" stroke="#1e293b" stroke-width="1"/>
    <text x="74" y="504">0</text>
    <line x1="80" y1="435" x2="1160" y2="435" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="74" y="439">1,000</text>
    <line x1="80" y1="370" x2="1160" y2="370" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="74" y="374">2,000</text>
    <line x1="80" y1="305" x2="1160" y2="305" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="74" y="309">3,000</text>
    <line x1="80" y1="240" x2="1160" y2="240" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="74" y="244">4,000</text>
    <line x1="80" y1="175" x2="1160" y2="175" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="74" y="179">5,000</text>
    <line x1="80" y1="110" x2="1160" y2="110" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="74" y="114">6,000</text>
  </g>

  <!-- Bars: 35 quarters from 2017Q4 to 2025Q4 -->
  <!-- bar width 26, gap 4, start x=92 -->
  <!-- value→y: y = 500 - value/6000*390 -->
  <g>
    <!-- 2017Q4: 524 -->
    <rect x="92"  y="466" width="26" height="34"  fill="#334155"/>
    <!-- 2018Q1: 755 / Q2: 850 / Q3: 1100 / Q4: 4046 -->
    <rect x="122" y="451" width="26" height="49"  fill="#334155"/>
    <rect x="152" y="445" width="26" height="55"  fill="#334155"/>
    <rect x="182" y="429" width="26" height="71"  fill="#334155"/>
    <rect x="212" y="237" width="26" height="263" fill="#475569"/>
    <!-- 2019Q1: 1308 / Q2: 1326 / Q3: 1364 / Q4: 5359 PEAK -->
    <rect x="242" y="415" width="26" height="85"  fill="#334155"/>
    <rect x="272" y="414" width="26" height="86"  fill="#334155"/>
    <rect x="302" y="411" width="26" height="89"  fill="#334155"/>
    <rect x="332" y="152" width="26" height="348" fill="#22c55e"/>
    <!-- 2020Q1: 1332 / Q2: 1206 / Q3: 1293 / Q4: 4454 -->
    <rect x="362" y="413" width="26" height="87"  fill="#334155"/>
    <rect x="392" y="422" width="26" height="78"  fill="#334155"/>
    <rect x="422" y="416" width="26" height="84"  fill="#334155"/>
    <rect x="452" y="210" width="26" height="290" fill="#475569"/>
    <!-- 2021Q1: 1009 / Q2: 944 / Q3: 905 / Q4: 4032 -->
    <rect x="482" y="434" width="26" height="66"  fill="#334155"/>
    <rect x="512" y="439" width="26" height="61"  fill="#334155"/>
    <rect x="542" y="441" width="26" height="59"  fill="#334155"/>
    <rect x="572" y="238" width="26" height="262" fill="#475569"/>
    <!-- 2022Q1: 869 / Q2: 905 / Q3: 1054 / Q4: 2988 -->
    <rect x="602" y="443" width="26" height="57"  fill="#334155"/>
    <rect x="632" y="441" width="26" height="59"  fill="#334155"/>
    <rect x="662" y="432" width="26" height="68"  fill="#334155"/>
    <rect x="692" y="306" width="26" height="194" fill="#475569"/>
    <!-- 2023Q1: 821 / Q2: 763 / Q3: 906 / Q4: 3339 -->
    <rect x="722" y="446" width="26" height="54"  fill="#334155"/>
    <rect x="752" y="450" width="26" height="50"  fill="#334155"/>
    <rect x="782" y="441" width="26" height="59"  fill="#334155"/>
    <rect x="812" y="283" width="26" height="217" fill="#475569"/>
    <!-- 2024Q1: 854 / Q2: 818 / Q3: 795 / Q4: 957 SOSIL -->
    <rect x="842" y="445" width="26" height="55"  fill="#334155"/>
    <rect x="872" y="447" width="26" height="53"  fill="#334155"/>
    <rect x="902" y="448" width="26" height="52"  fill="#334155"/>
    <rect x="932" y="438" width="26" height="62"  fill="#ef4444"/>
    <!-- 2025Q1: 837 / Q2: 796 / Q3: 1068 / Q4: 955 -->
    <rect x="962"  y="446" width="26" height="54" fill="#334155"/>
    <rect x="992"  y="448" width="26" height="52" fill="#334155"/>
    <rect x="1022" y="431" width="26" height="69" fill="#334155"/>
    <rect x="1052" y="438" width="26" height="62" fill="#334155"/>
  </g>

  <!-- X axis year labels (under Q1 of each year) -->
  <g font-size="11" fill="#64748b" text-anchor="middle">
    <text x="105" y="520">2017</text>
    <text x="167" y="520">2018</text>
    <text x="287" y="520">2019</text>
    <text x="407" y="520">2020</text>
    <text x="527" y="520">2021</text>
    <text x="647" y="520">2022</text>
    <text x="767" y="520">2023</text>
    <text x="887" y="520">2024</text>
    <text x="1007" y="520">2025</text>
  </g>

  <!-- Q4 markers under each year's Q4 -->
  <g font-size="10" fill="#475569" text-anchor="middle">
    <text x="105"  y="536">Q4</text>
    <text x="225"  y="536">Q4</text>
    <text x="345"  y="536">Q4</text>
    <text x="465"  y="536">Q4</text>
    <text x="585"  y="536">Q4</text>
    <text x="705"  y="536">Q4</text>
    <text x="825"  y="536">Q4</text>
    <text x="945"  y="536">Q4</text>
    <text x="1065" y="536">Q4</text>
  </g>

  <!-- PEAK callout for 2019Q4 -->
  <g>
    <line x1="345" y1="152" x2="345" y2="120" stroke="#22c55e" stroke-width="1"/>
    <rect x="270" y="86" width="170" height="32" rx="4" fill="#0a0e1a" stroke="#22c55e" stroke-width="1.5"/>
    <text x="355" y="100" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">2019Q4 PEAK</text>
    <text x="355" y="113" fill="#f1f5f9" font-size="11" text-anchor="middle">5,359 억</text>
  </g>

  <!-- 2024Q4 소실 callout -->
  <g>
    <line x1="945" y1="438" x2="945" y2="380" stroke="#ef4444" stroke-width="1"/>
    <rect x="870" y="346" width="180" height="34" rx="4" fill="#0a0e1a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="960" y="361" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">2024Q4 소실</text>
    <text x="960" y="374" fill="#f1f5f9" font-size="11" text-anchor="middle">957 억 (-76%)</text>
  </g>

  <!-- 6년 Q4 평균 라인 -->
  <line x1="212" y1="237.7" x2="843" y2="237.7" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="1100" y="226" width="60" height="22" fill="#0a0e1a"/>
  <text x="1095" y="234" fill="#fbbf24" font-size="11" text-anchor="end" font-weight="600">직전 6 년 Q4 평균 4,036 억</text>

  <!-- Legend -->
  <g font-size="11" transform="translate(40,560)">
    <rect width="14" height="14" fill="#475569"/>
    <text x="20" y="11" fill="#94a3b8">Q4 spike</text>
    <rect x="100" width="14" height="14" fill="#22c55e"/>
    <text x="120" y="11" fill="#94a3b8">2019Q4 PEAK</text>
    <rect x="240" width="14" height="14" fill="#ef4444"/>
    <text x="260" y="11" fill="#94a3b8">2024Q4 소실</text>
    <rect x="370" width="14" height="14" fill="#334155"/>
    <text x="390" y="11" fill="#94a3b8">비-Q4 평상치</text>
    <line x1="500" y1="7" x2="528" y2="7" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="534" y="11" fill="#94a3b8">6 년 Q4 평균선</text>
  </g>
</svg>
