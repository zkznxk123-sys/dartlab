  <!-- 2019 G-STAR 붉은사막 첫 공개 -->
  <g>
    <circle cx="708" cy="180" r="3" fill="#fbbf24"/>
    <line x1="708" y1="185" x2="708" y2="208" stroke="#fbbf24" stroke-width="1"/>
    <text x="708" y="222" fill="#fbbf24" font-size="10" text-anchor="middle">2019 G-STAR</text>
    <text x="708" y="234" fill="#f1f5f9" font-size="11" text-anchor="middle">붉은사막 첫 공개</text>
  </g>
  <!-- 2020-12 TGA 트레일러 -->
  <g>
    <circle cx="787" cy="180" r="4" fill="#fbbf24"/>
    <line x1="787" y1="185" x2="787" y2="262" stroke="#475569" stroke-width="1"/>
