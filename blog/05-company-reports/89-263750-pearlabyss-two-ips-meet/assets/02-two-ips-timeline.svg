  <!-- 2019Q4 PEAK -->
  <g>
    <circle cx="708" cy="180" r="6" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
    <line x1="708" y1="175" x2="708" y2="148" stroke="#22c55e" stroke-width="1"/>
