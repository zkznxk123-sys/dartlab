  <!-- Bottom axis: CCP / 외부 IP -->
  <text x="40" y="478" fill="#ef4444" font-size="13" font-weight="700">외부 IP — CCP / EVE Online</text>

  <line x1="60" y1="420" x2="1160" y2="420" stroke="#ef4444" stroke-width="2"/>

  <!-- Bottom events -->
  <!-- 2018-09 CCP 인수 -->
  <g>
    <circle cx="601" cy="420" r="6" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
    <line x1="601" y1="426" x2="601" y2="448" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="510" y="450" width="180" height="30" rx="4" fill="#0a0e1a" stroke="#ef4444" stroke-width="1"/>
