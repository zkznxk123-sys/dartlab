  <!-- 2024 spike 소실 -->
  <g>
    <circle cx="1026" cy="180" r="5" fill="#ef4444"/>
    <line x1="1026" y1="175" x2="1026" y2="148" stroke="#ef4444" stroke-width="1"/>
