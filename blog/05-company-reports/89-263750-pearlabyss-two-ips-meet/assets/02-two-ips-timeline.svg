<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="40" y="46" fill="#f1f5f9" font-size="22" font-weight="700">두 IP 의 운명 — 2018 CCP 인수에서 2026 만남까지</text>
  <text x="40" y="72" fill="#64748b" font-size="13">검은사막 자체 IP (위 / 양호) · CCP·EVE 외부 IP (아래 / 위험) · 한 분기에 만난 두 결정</text>

  <!-- Top axis: black desert / 자체 IP -->
  <text x="40" y="118" fill="#22c55e" font-size="13" font-weight="700">자체 IP — 검은사막 / 붉은사막</text>

  <line x1="60" y1="180" x2="1160" y2="180" stroke="#22c55e" stroke-width="2"/>
  <!-- year ticks on top line -->
  <g font-size="11" fill="#64748b" text-anchor="middle">
    <line x1="60"   y1="176" x2="60"   y2="184" stroke="#22c55e"/>
    <line x1="129"  y1="176" x2="129"  y2="184" stroke="#22c55e"/>
    <line x1="198"  y1="176" x2="198"  y2="184" stroke="#22c55e"/>
    <line x1="267"  y1="176" x2="267"  y2="184" stroke="#22c55e"/>
    <line x1="336"  y1="176" x2="336"  y2="184" stroke="#22c55e"/>
    <line x1="405"  y1="176" x2="405"  y2="184" stroke="#22c55e"/>
    <line x1="474"  y1="176" x2="474"  y2="184" stroke="#22c55e"/>
    <line x1="543"  y1="176" x2="543"  y2="184" stroke="#22c55e"/>
    <line x1="612"  y1="176" x2="612"  y2="184" stroke="#22c55e"/>
    <line x1="681"  y1="176" x2="681"  y2="184" stroke="#22c55e"/>
    <line x1="750"  y1="176" x2="750"  y2="184" stroke="#22c55e"/>
    <line x1="819"  y1="176" x2="819"  y2="184" stroke="#22c55e"/>
    <line x1="888"  y1="176" x2="888"  y2="184" stroke="#22c55e"/>
    <line x1="957"  y1="176" x2="957"  y2="184" stroke="#22c55e"/>
    <line x1="1026" y1="176" x2="1026" y2="184" stroke="#22c55e"/>
    <line x1="1095" y1="176" x2="1095" y2="184" stroke="#22c55e"/>
    <line x1="1160" y1="176" x2="1160" y2="184" stroke="#22c55e"/>
  </g>

  <!-- Top events (자체 IP) -->
  <!-- 2010-09 창업 -->
  <g>
    <circle cx="60" cy="180" r="5" fill="#22c55e"/>
    <line x1="60" y1="175" x2="60" y2="148" stroke="#475569" stroke-width="1"/>
    <text x="60" y="142" fill="#94a3b8" font-size="10" text-anchor="middle">2010-09</text>
    <text x="60" y="130" fill="#f1f5f9" font-size="11" text-anchor="middle" font-weight="600">창업 (김대일)</text>
  </g>
  <!-- 2014-12 OBT -->
  <g>
    <circle cx="349" cy="180" r="5" fill="#22c55e"/>
    <line x1="349" y1="175" x2="349" y2="148" stroke="#475569" stroke-width="1"/>
    <text x="349" y="142" fill="#94a3b8" font-size="10" text-anchor="middle">2014-12</text>
    <text x="349" y="130" fill="#f1f5f9" font-size="11" text-anchor="middle" font-weight="600">검은사막 OBT</text>
  </g>
  <!-- 2017-09 IPO -->
  <g>
    <circle cx="535" cy="180" r="5" fill="#22c55e"/>
    <line x1="535" y1="175" x2="535" y2="148" stroke="#475569" stroke-width="1"/>
    <text x="535" y="142" fill="#94a3b8" font-size="10" text-anchor="middle">2017-09</text>
    <text x="535" y="130" fill="#f1f5f9" font-size="11" text-anchor="middle" font-weight="600">IPO</text>
  </g>
  <!-- 2018-02 모바일 한일대만 -->
  <g>
    <circle cx="582" cy="180" r="5" fill="#22c55e"/>
    <line x1="582" y1="185" x2="582" y2="208" stroke="#475569" stroke-width="1"/>
