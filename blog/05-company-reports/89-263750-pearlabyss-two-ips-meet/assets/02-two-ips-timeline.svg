  <!-- 8년 보유 bracket -->
  <line x1="601" y1="420" x2="1138" y2="420" stroke="#ef4444" stroke-width="6" opacity="0.25"/>
  <text x="869" y="411" fill="#94a3b8" font-size="11" text-anchor="middle">8 년 보유</text>

  <!-- 2026-04 CCP 매각 -->
  <g>
    <circle cx="1138" cy="420" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
    <line x1="1138" y1="426" x2="1138" y2="500" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="1010" y="500" width="160" height="44" rx="4" fill="#0a0e1a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1090" y="516" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">2026-04 CCP 매각</text>
    <text x="1090" y="529" fill="#f1f5f9" font-size="11" text-anchor="middle">$120M</text>
    <text x="1090" y="541" fill="#ef4444" font-size="11" text-anchor="middle">-$105M (-46%)</text>
  </g>

  <!-- year labels -->
  <g font-size="11" fill="#64748b" text-anchor="middle">
    <text x="60"   y="585">2010</text>
    <text x="129"  y="585">2011</text>
    <text x="198"  y="585">2012</text>
    <text x="267"  y="585">2013</text>
    <text x="336"  y="585">2014</text>
    <text x="405"  y="585">2015</text>
    <text x="474"  y="585">2016</text>
    <text x="543"  y="585">2017</text>
    <text x="612"  y="585">2018</text>
    <text x="681"  y="585">2019</text>
    <text x="750"  y="585">2020</text>
    <text x="819"  y="585">2021</text>
    <text x="888"  y="585">2022</text>
    <text x="957"  y="585">2023</text>
    <text x="1026" y="585">2024</text>
    <text x="1095" y="585">2025</text>
    <text x="1155" y="585">2026</text>
