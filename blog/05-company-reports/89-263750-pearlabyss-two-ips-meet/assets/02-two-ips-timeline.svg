  </g>
  <!-- 2025-09-24 PS 발표 -->
  <g>
    <circle cx="1083" cy="180" r="4" fill="#fbbf24"/>
    <line x1="1083" y1="185" x2="1083" y2="262" stroke="#475569" stroke-width="1"/>
    <text x="1083" y="276" fill="#94a3b8" font-size="10" text-anchor="middle">2025-09</text>
    <text x="1083" y="288" fill="#f1f5f9" font-size="11" text-anchor="middle">PS 출시일 발표</text>
  </g>
  <!-- 2026-03-19 붉은사막 출시 -->
  <g>
    <circle cx="1131" cy="180" r="8" fill="#22c55e" stroke="#0a0e1a" stroke-width="2"/>
    <line x1="1131" y1="172" x2="1131" y2="120" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="1010" y="92" width="160" height="30" rx="4" fill="#0a0e1a" stroke="#22c55e" stroke-width="1.5"/>
