<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="40" y="46" fill="#f1f5f9" font-size="22" font-weight="700">매출 사이클 — 2020 PEAK 8,285 억에서 2024 -41% 폭락까지</text>
  <text x="40" y="72" fill="#64748b" font-size="13">매출 (막대, 좌축 억원) · OPM (라인, 우축 %) · 2024 -41.26% / OPM 2023 부터 4 년 연속 적자</text>

  <!-- Plot area: x=120..1100, y=120..480 -->
  <line x1="120" y1="480" x2="1100" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="120" x2="120" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="1100" y1="120" x2="1100" y2="480" stroke="#334155" stroke-width="1"/>

  <!-- Left Y axis: 매출 (max 9000) -->
  <g font-size="11" fill="#64748b" text-anchor="end">
    <text x="114" y="484">0</text>
    <line x1="120" y1="420" x2="1100" y2="420" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="114" y="424">1,500</text>
    <line x1="120" y1="360" x2="1100" y2="360" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="114" y="364">3,000</text>
    <line x1="120" y1="300" x2="1100" y2="300" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="114" y="304">4,500</text>
    <line x1="120" y1="240" x2="1100" y2="240" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="114" y="244">6,000</text>
    <line x1="120" y1="180" x2="1100" y2="180" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="114" y="184">7,500</text>
    <line x1="120" y1="120" x2="1100" y2="120" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="114" y="124">9,000</text>
  </g>
  <text x="50" y="100" fill="#94a3b8" font-size="12" font-weight="600">매출 (억)</text>

  <!-- Right Y axis: OPM (-10 ~ 25) center at 0 → y = 480 - (val+10)/35 * 360 → 0% at y=377, 25% at y=120, -10% at y=480 -->
  <g font-size="11" fill="#64748b">
    <line x1="120" y1="377" x2="1100" y2="377" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="1108" y="381" fill="#94a3b8">0%</text>
    <text x="1108" y="278">10%</text>
    <text x="1108" y="175">20%</text>
    <text x="1108" y="481">-10%</text>
  </g>
  <text x="1108" y="100" fill="#94a3b8" font-size="12" font-weight="600">OPM</text>

  <!-- Bars: 6 years 2020~2025, x positions and widths -->
  <!-- bar width 90, slot width 160, start x=160 -->
  <!-- value→y: y = 480 - val/9000*360 -->

  <!-- 2020: 8285 -->
  <rect x="155" y="148.6" width="90" height="331.4" fill="#475569"/>
  <text x="200" y="140" fill="#f1f5f9" font-size="12" text-anchor="middle" font-weight="600">8,285</text>

  <!-- 2021: 6890 -->
  <rect x="315" y="204.4" width="90" height="275.6" fill="#475569"/>
  <text x="360" y="196" fill="#f1f5f9" font-size="12" text-anchor="middle" font-weight="600">6,890</text>

  <!-- 2022: 5816 -->
  <rect x="475" y="247.4" width="90" height="232.6" fill="#475569"/>
  <text x="520" y="239" fill="#f1f5f9" font-size="12" text-anchor="middle" font-weight="600">5,816</text>

  <!-- 2023: 5829 -->
  <rect x="635" y="246.8" width="90" height="233.2" fill="#475569"/>
  <text x="680" y="238" fill="#f1f5f9" font-size="12" text-anchor="middle" font-weight="600">5,829</text>

  <!-- 2024: 3424 (PLUNGE) -->
  <rect x="795" y="343" width="90" height="137" fill="#ef4444"/>
  <text x="840" y="335" fill="#ef4444" font-size="12" text-anchor="middle" font-weight="700">3,424</text>

  <!-- 2025: 3656 -->
  <rect x="955" y="333.8" width="90" height="146.2" fill="#475569"/>
  <text x="1000" y="325" fill="#f1f5f9" font-size="12" text-anchor="middle" font-weight="600">3,656</text>

  <!-- OPM line: 2020 19.0% / 2021 6.24% / 2022 2.82% / 2023 -2.80% / 2024 -3.59% / 2025 -4.05% -->
  <!-- y = 377 - opm * 10.286 (since 1% = (1/35)*360 = 10.286px) -->
  <!-- 2020: 19.0 → y=181.6 -->
  <!-- 2021: 6.24 → y=312.8 -->
  <!-- 2022: 2.82 → y=348.0 -->
  <!-- 2023: -2.80 → y=405.8 -->
  <!-- 2024: -3.59 → y=413.9 -->
  <!-- 2025: -4.05 → y=418.7 -->
  <polyline points="200,181.6 360,312.8 520,348.0 680,405.8 840,413.9 1000,418.7"
            fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <g>
    <circle cx="200"  cy="181.6" r="5" fill="#fbbf24"/>
    <circle cx="360"  cy="312.8" r="5" fill="#fbbf24"/>
    <circle cx="520"  cy="348.0" r="5" fill="#fbbf24"/>
    <circle cx="680"  cy="405.8" r="5" fill="#ef4444"/>
    <circle cx="840"  cy="413.9" r="5" fill="#ef4444"/>
    <circle cx="1000" cy="418.7" r="5" fill="#ef4444"/>
  </g>
  <!-- OPM labels -->
  <g font-size="11" font-weight="600">
    <text x="200"  y="173" fill="#fbbf24" text-anchor="middle">19.0%</text>
    <text x="360"  y="304" fill="#fbbf24" text-anchor="middle">6.24%</text>
    <text x="520"  y="340" fill="#fbbf24" text-anchor="middle">2.82%</text>
    <text x="680"  y="425" fill="#ef4444" text-anchor="middle">-2.80%</text>
    <text x="840"  y="434" fill="#ef4444" text-anchor="middle">-3.59%</text>
    <text x="1000" y="439" fill="#ef4444" text-anchor="middle">-4.05%</text>
  </g>

  <!-- X axis labels -->
  <g font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="600">
    <text x="200" y="504">2020</text>
    <text x="360" y="504">2021</text>
    <text x="520" y="504">2022</text>
    <text x="680" y="504">2023</text>
    <text x="840" y="504">2024</text>
    <text x="1000" y="504">2025</text>
  </g>

  <!-- 폭락 화살표 2023→2024 -->
  <g>
    <path d="M 720 270 Q 765 265 800 350" fill="none" stroke="#ef4444" stroke-width="2"/>
    <polygon points="800,350 793,338 808,340" fill="#ef4444"/>
    <rect x="708" y="234" width="180" height="32" rx="4" fill="#0a0e1a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="798" y="248" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">2024 매출 -41.26%</text>
    <text x="798" y="261" fill="#f1f5f9" font-size="11" text-anchor="middle">5,829 → 3,424 억</text>
  </g>

  <!-- 흑자/적자 구분 라벨 (OPM 0% 라인 위/아래) -->
  <text x="540" y="372" fill="#22c55e" font-size="10" font-weight="600">↑ 흑자</text>
  <text x="540" y="395" fill="#ef4444" font-size="10" font-weight="600">↓ 적자</text>

  <!-- Legend -->
  <g font-size="11" transform="translate(40,560)">
    <rect width="14" height="14" fill="#475569"/>
    <text x="20" y="11" fill="#94a3b8">매출 (억)</text>
    <rect x="100" width="14" height="14" fill="#ef4444"/>
    <text x="120" y="11" fill="#94a3b8">2024 폭락</text>
    <line x1="200" y1="7" x2="228" y2="7" stroke="#fbbf24" stroke-width="2.5"/>
    <circle cx="214" cy="7" r="4" fill="#fbbf24"/>
    <text x="234" y="11" fill="#94a3b8">OPM (%)</text>
  </g>
</svg>
