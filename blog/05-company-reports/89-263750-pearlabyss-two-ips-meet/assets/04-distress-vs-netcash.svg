<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="40" y="46" fill="#f1f5f9" font-size="22" font-weight="700">부실 4 신호 + 순현금 모순 (2025Q4)</text>
  <text x="40" y="72" fill="#64748b" font-size="13">손익계산서 4 부실 모형 (좌) vs 자본·BS 의 순현금 (우) — 같은 분기, 같은 회사의 두 얼굴</text>

  <!-- Left: 4 gauges -->
  <text x="40" y="118" fill="#ef4444" font-size="14" font-weight="700">손익계산서·운전자본 — 4 부실 신호</text>

  <!-- Gauge 1: Altman Z 1.83 (회색지대) -->
  <g transform="translate(60,150)">
    <text x="0" y="14" fill="#f1f5f9" font-size="13" font-weight="600">Altman Z-Score</text>
    <text x="510" y="14" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="end">1.83</text>
    <text x="510" y="28" fill="#94a3b8" font-size="10" text-anchor="end">회색지대 (임계 1.81 의 +0.02)</text>
    <!-- bar: 0..3 scale, length 510, val 1.83 → 311.1 -->
    <rect x="0" y="36" width="510" height="14" rx="3" fill="#1e293b"/>
    <!-- distress zone 0..1.81 -->
    <rect x="0" y="36" width="307.7" height="14" rx="3" fill="#ef4444" opacity="0.25"/>
    <!-- gray zone 1.81..2.99 -->
    <rect x="307.7" y="36" width="200.7" height="14" fill="#fbbf24" opacity="0.25"/>
    <!-- safe 2.99+ -->
    <rect x="508.4" y="36" width="1.6" height="14" rx="3" fill="#22c55e" opacity="0.25"/>
    <!-- needle -->
    <line x1="311.1" y1="32" x2="311.1" y2="54" stroke="#fbbf24" stroke-width="3"/>
    <text x="0" y="64" fill="#475569" font-size="9">0</text>
    <text x="307" y="64" fill="#94a3b8" font-size="9">1.81</text>
    <text x="508" y="64" fill="#94a3b8" font-size="9" text-anchor="end">2.99</text>
  </g>

  <!-- Gauge 2: Springate 0.32 (부실권) -->
  <g transform="translate(60,235)">
    <text x="0" y="14" fill="#f1f5f9" font-size="13" font-weight="600">Springate S-Score</text>
    <text x="510" y="14" fill="#ef4444" font-size="13" font-weight="700" text-anchor="end">0.32</text>
    <text x="510" y="28" fill="#94a3b8" font-size="10" text-anchor="end">부실권 (임계 0.862 의 37%)</text>
    <rect x="0" y="36" width="510" height="14" rx="3" fill="#1e293b"/>
    <!-- distress 0..0.862, safe above (scale 0..1.5 → 0.862 = 293) -->
    <rect x="0" y="36" width="293" height="14" rx="3" fill="#ef4444" opacity="0.25"/>
    <rect x="293" y="36" width="217" height="14" fill="#22c55e" opacity="0.25"/>
    <line x1="108.8" y1="32" x2="108.8" y2="54" stroke="#ef4444" stroke-width="3"/>
    <text x="0" y="64" fill="#475569" font-size="9">0</text>
    <text x="293" y="64" fill="#94a3b8" font-size="9">0.862</text>
    <text x="508" y="64" fill="#94a3b8" font-size="9" text-anchor="end">1.5</text>
  </g>

  <!-- Gauge 3: Piotroski 4/9 -->
  <g transform="translate(60,320)">
    <text x="0" y="14" fill="#f1f5f9" font-size="13" font-weight="600">Piotroski F-Score</text>
    <text x="510" y="14" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="end">4 / 9</text>
    <text x="510" y="28" fill="#94a3b8" font-size="10" text-anchor="end">보통 (양호 임계 7 미달)</text>
    <!-- 9 dots -->
    <g>
      <circle cx="20"  cy="44" r="14" fill="#22c55e"/>
      <circle cx="80"  cy="44" r="14" fill="#22c55e"/>
      <circle cx="140" cy="44" r="14" fill="#22c55e"/>
      <circle cx="200" cy="44" r="14" fill="#22c55e"/>
      <circle cx="260" cy="44" r="14" fill="#1e293b" stroke="#334155"/>
      <circle cx="320" cy="44" r="14" fill="#1e293b" stroke="#334155"/>
      <circle cx="380" cy="44" r="14" fill="#1e293b" stroke="#334155"/>
      <circle cx="440" cy="44" r="14" fill="#1e293b" stroke="#334155"/>
      <circle cx="500" cy="44" r="14" fill="#1e293b" stroke="#334155"/>
    </g>
    <text x="20"  y="48" fill="#0a0e1a" font-size="11" text-anchor="middle" font-weight="700">1</text>
    <text x="80"  y="48" fill="#0a0e1a" font-size="11" text-anchor="middle" font-weight="700">2</text>
    <text x="140" y="48" fill="#0a0e1a" font-size="11" text-anchor="middle" font-weight="700">3</text>
    <text x="200" y="48" fill="#0a0e1a" font-size="11" text-anchor="middle" font-weight="700">4</text>
    <text x="260" y="48" fill="#475569" font-size="11" text-anchor="middle">5</text>
    <text x="320" y="48" fill="#475569" font-size="11" text-anchor="middle">6</text>
    <text x="380" y="48" fill="#475569" font-size="11" text-anchor="middle">7</text>
    <text x="440" y="48" fill="#475569" font-size="11" text-anchor="middle">8</text>
    <text x="500" y="48" fill="#475569" font-size="11" text-anchor="middle">9</text>
  </g>

  <!-- Gauge 4: 이자보상 -0.6배 -->
  <g transform="translate(60,405)">
    <text x="0" y="14" fill="#f1f5f9" font-size="13" font-weight="600">이자보상배수</text>
    <text x="510" y="14" fill="#ef4444" font-size="13" font-weight="700" text-anchor="end">-0.6 배</text>
    <text x="510" y="28" fill="#94a3b8" font-size="10" text-anchor="end">위험 (영업적자 → 이자 못 갚는 구조)</text>
    <!-- scale -3 ~ 5, center at 0 ; total 510 ; 1 unit = 510/8 = 63.75 ; 0 at x=191.25 -->
    <rect x="0" y="36" width="510" height="14" rx="3" fill="#1e293b"/>
    <rect x="0" y="36" width="191.25" height="14" rx="3" fill="#ef4444" opacity="0.25"/>
    <rect x="191.25" y="36" width="63.75" height="14" fill="#fbbf24" opacity="0.25"/>
    <rect x="255" y="36" width="255" height="14" fill="#22c55e" opacity="0.25"/>
    <!-- 0 line -->
    <line x1="191.25" y1="32" x2="191.25" y2="54" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>
    <!-- needle at -0.6 → 191.25 - 0.6*63.75 = 153.0 -->
    <line x1="153" y1="32" x2="153" y2="54" stroke="#ef4444" stroke-width="3"/>
    <text x="0" y="64" fill="#475569" font-size="9">-3</text>
    <text x="191" y="64" fill="#94a3b8" font-size="9">0 (이자 = 영업이익)</text>
    <text x="510" y="64" fill="#94a3b8" font-size="9" text-anchor="end">5</text>
  </g>

  <!-- Right: 순현금 박스 -->
  <text x="650" y="118" fill="#22c55e" font-size="14" font-weight="700">자본·BS — 순현금 상태</text>

  <g transform="translate(650,150)">
    <!-- 현금 박스 -->
    <rect x="0" y="20" width="490" height="140" rx="6" fill="#0a0e1a" stroke="#22c55e" stroke-width="2"/>
    <text x="20" y="48" fill="#22c55e" font-size="14" font-weight="700">현금성 자산</text>
    <text x="20" y="100" fill="#f1f5f9" font-size="44" font-weight="800">1,339</text>
    <text x="190" y="100" fill="#94a3b8" font-size="14">억원</text>
    <text x="20" y="135" fill="#64748b" font-size="11">2025Q4 연결 BS · 단기금융상품 포함</text>
    <text x="20" y="151" fill="#64748b" font-size="11">2017 IPO + 2018~2021 모바일 spike 잉여</text>

    <!-- VS -->
    <text x="245" y="200" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">vs</text>

    <!-- 차입 박스 -->
    <rect x="0" y="220" width="490" height="100" rx="6" fill="#0a0e1a" stroke="#475569" stroke-width="1.5"/>
    <text x="20" y="248" fill="#94a3b8" font-size="14" font-weight="700">총 차입금</text>
    <text x="20" y="290" fill="#94a3b8" font-size="32" font-weight="800">0 ~ 수백</text>
    <text x="220" y="290" fill="#94a3b8" font-size="14">억 추정</text>
    <text x="20" y="310" fill="#64748b" font-size="11">3 년 적자에도 차입 미증가 (Ohlson 부실확률 0.7%)</text>

    <!-- 결론 -->
    <rect x="0" y="340" width="490" height="60" rx="6" fill="#22c55e" opacity="0.10" stroke="#22c55e" stroke-width="1"/>
    <text x="20" y="364" fill="#22c55e" font-size="13" font-weight="700">→ 순현금 (Net Cash) 회사</text>
    <text x="20" y="385" fill="#f1f5f9" font-size="11">현금이 차입을 압도. 자본잠식 위험 낮음 — 부실 4 신호의 반대 얼굴.</text>
  </g>

  <!-- 콜아웃 (하단) -->
  <g transform="translate(60,560)">
    <rect x="0" y="0" width="1080" height="30" rx="4" fill="#0a0e1a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="540" y="20" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">본업 적자 vs 자본 안정 — 같은 BS 의 두 얼굴 · 누적 영업적자 -435 억을 9 년치 잉여가 흡수</text>
  </g>
</svg>
