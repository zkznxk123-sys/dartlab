<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="40" y="46" fill="#f1f5f9" font-size="22" font-weight="700">K-게임 빅 5 OPM 분포 — 같은 해 둘로 갈라짐 (2024)</text>
  <text x="40" y="72" fill="#64748b" font-size="13">크래프톤 43.6% (역대 최고) ↔ 펄어비스 -3.59% / 엔씨 -6.91% — 47.19%pt 격차</text>

  <!-- Plot area: x=240..1100 (bars area), y=120..480 -->
  <!-- Scale: -10% ~ 50%, total 60% over 860px → 1% = 14.333px -->
  <!-- 0% line at x = 240 + 10*14.333 = 383.3 -->

  <!-- Y axis tick lines (vertical, since horizontal bars) -->
  <g font-size="10" fill="#64748b" text-anchor="middle">
    <!-- 0% line -->
    <line x1="383.3" y1="110" x2="383.3" y2="500" stroke="#475569" stroke-width="1.5"/>
    <text x="383.3" y="516" fill="#94a3b8" font-weight="700">0%</text>
    <!-- -10 -->
    <line x1="240" y1="110" x2="240" y2="500" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="240" y="516">-10%</text>
    <!-- 10 -->
    <line x1="526.7" y1="110" x2="526.7" y2="500" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="526.7" y="516">10%</text>
    <!-- 20 -->
    <line x1="670" y1="110" x2="670" y2="500" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="670" y="516">20%</text>
    <!-- 30 -->
    <line x1="813.3" y1="110" x2="813.3" y2="500" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="813.3" y="516">30%</text>
    <!-- 40 -->
    <line x1="956.7" y1="110" x2="956.7" y2="500" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="956.7" y="516">40%</text>
    <!-- 50 -->
    <line x1="1100" y1="110" x2="1100" y2="500" stroke="#1e293b" stroke-dasharray="2,4"/>
    <text x="1100" y="516">50%</text>
  </g>
  <text x="595" y="538" fill="#64748b" font-size="12" text-anchor="middle">2024 영업이익률 (OPM, %)</text>

  <!-- Row settings -->
  <!-- 5 rows, y = 130, 200, 270, 340, 410 (height 50, gap 20) -->

  <!-- Row 1: 크래프톤 43.6% -->
  <g>
    <text x="225" y="155" fill="#22c55e" font-size="14" font-weight="700" text-anchor="end">크래프톤</text>
    <text x="225" y="170" fill="#64748b" font-size="10" text-anchor="end">PUBG 90%+ 단일 IP</text>
    <!-- bar from 0% (x=383.3) to 43.6% (x=383.3 + 43.6*14.333 = 1008.4) -->
    <rect x="383.3" y="135" width="625.1" height="40" fill="#22c55e"/>
    <text x="1018" y="161" fill="#22c55e" font-size="14" font-weight="700">43.6%</text>
    <text x="1018" y="174" fill="#94a3b8" font-size="10">영업이익 11,825 억 (역대 최고)</text>
  </g>

  <!-- Row 2: 넥슨 28.8% -->
  <g>
    <text x="225" y="225" fill="#22c55e" font-size="14" font-weight="700" text-anchor="end">넥슨</text>
    <text x="225" y="240" fill="#64748b" font-size="10" text-anchor="end">던파+메이플+FC 분산</text>
    <!-- 28.8% → x=383.3 + 28.8*14.333 = 796.0 -->
    <rect x="383.3" y="205" width="412.7" height="40" fill="#22c55e" opacity="0.85"/>
    <text x="806" y="231" fill="#22c55e" font-size="14" font-weight="700">28.8%</text>
    <text x="806" y="244" fill="#94a3b8" font-size="10">영업이익 11,907 억</text>
  </g>

  <!-- Row 3: 카카오게임즈 1.6% -->
  <g>
    <text x="225" y="295" fill="#94a3b8" font-size="14" font-weight="700" text-anchor="end">카카오게임즈</text>
    <text x="225" y="310" fill="#64748b" font-size="10" text-anchor="end">오딘+우마무스메 분산</text>
    <!-- 1.6% → x=383.3 + 1.6*14.333 = 406.2 -->
    <rect x="383.3" y="275" width="22.9" height="40" fill="#94a3b8"/>
    <text x="416" y="301" fill="#94a3b8" font-size="14" font-weight="700">1.6%</text>
    <text x="416" y="314" fill="#64748b" font-size="10">영업이익 126 억 (-83% YoY)</text>
  </g>

  <!-- Row 4: 펄어비스 -3.59% -->
  <g>
    <text x="225" y="365" fill="#ef4444" font-size="14" font-weight="700" text-anchor="end">펄어비스</text>
    <text x="225" y="380" fill="#64748b" font-size="10" text-anchor="end">검은사막 75~85% 단일 IP</text>
    <!-- -3.59% → bar from x=383.3-3.59*14.333=331.9 to x=383.3 -->
    <rect x="331.9" y="345" width="51.4" height="40" fill="#ef4444"/>
    <text x="319" y="371" fill="#ef4444" font-size="14" font-weight="700" text-anchor="end">-3.59%</text>
    <text x="319" y="384" fill="#94a3b8" font-size="10" text-anchor="end">영업이익 -123 억 (적자)</text>
  </g>

  <!-- Row 5: 엔씨소프트 -6.91% -->
  <g>
    <text x="225" y="435" fill="#ef4444" font-size="14" font-weight="700" text-anchor="end">엔씨소프트</text>
    <text x="225" y="450" fill="#64748b" font-size="10" text-anchor="end">리니지 라인 70~80%</text>
    <!-- -6.91% → bar from x=383.3-6.91*14.333=284.3 to 383.3 -->
    <rect x="284.3" y="415" width="99.0" height="40" fill="#ef4444" opacity="0.85"/>
    <text x="271" y="441" fill="#ef4444" font-size="14" font-weight="700" text-anchor="end">-6.91%</text>
    <text x="271" y="454" fill="#94a3b8" font-size="10" text-anchor="end">영업이익 -1,092 억 (적자)</text>
  </g>

  <!-- 47.19%pt 격차 콜아웃 -->
  <g>
    <!-- arrow span: 펄어비스 좌끝 (x=331.9, y=365) → 크래프톤 우끝 (x=1008.4, y=155) -->
    <line x1="331.9" y1="345" x2="331.9" y2="55" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="1008.4" y1="135" x2="1008.4" y2="55" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="331.9" y1="60" x2="1008.4" y2="60" stroke="#fbbf24" stroke-width="2"/>
    <polygon points="331.9,60 343,55 343,65" fill="#fbbf24"/>
    <polygon points="1008.4,60 997,55 997,65" fill="#fbbf24"/>
    <rect x="555" y="42" width="230" height="36" rx="4" fill="#0a0e1a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="670" y="58" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">47.19%pt 격차</text>
    <text x="670" y="72" fill="#f1f5f9" font-size="10" text-anchor="middle">크래프톤 (+43.6) − 펄어비스 (-3.59)</text>
  </g>

  <!-- 흑자/적자 라벨 -->
  <text x="397" y="100" fill="#22c55e" font-size="11" font-weight="600">→ 흑자</text>
  <text x="370" y="100" fill="#ef4444" font-size="11" font-weight="600" text-anchor="end">적자 ←</text>

  <!-- Bottom note -->
  <text x="600" y="568" fill="#64748b" font-size="11" text-anchor="middle">신작·재흥 사이클 도래 여부가 손익을 둘로 갈랐다 — IP 다변화가 아니라 IP 표면적 (지역·플랫폼·모드) 의 차이</text>
</svg>
