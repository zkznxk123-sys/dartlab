<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title>차석용 21년 황금기 시간선 — 매출 1조 → 8조, 시총 1조 → 27조</title>
  <desc>2005.1 부임부터 2024.3 사임까지 19년의 매출·인수·정점·하강. 후(后) 럭셔리 화장품의 출시·정점·추락 단계와 LG생활건강 매출 9년 시계열의 정합성.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="62" font-size="30" font-weight="700" fill="#f1f5f9">차석용 21년 황금기, 그리고 종지부</text>
  <text x="60" y="92" font-size="16" fill="#94a3b8">2005.1 부임 → 2024.3 사임 · 매출 1조 → 8.09조(8배) · 시총 약 1조 → 27조 정점 → 5조</text>

  <!-- Timeline horizontal axis -->
  <line x1="80" y1="380" x2="1140" y2="380" stroke="#475569" stroke-width="2"/>
  <!-- Year ticks -->
  <g font-size="11" fill="#64748b">
    <line x1="140" y1="378" x2="140" y2="386" stroke="#475569"/>
    <text x="140" y="402" text-anchor="middle">2005</text>
    <line x1="280" y1="378" x2="280" y2="386" stroke="#475569"/>
    <text x="280" y="402" text-anchor="middle">2010</text>
    <line x1="420" y1="378" x2="420" y2="386" stroke="#475569"/>
    <text x="420" y="402" text-anchor="middle">2015</text>
    <line x1="560" y1="378" x2="560" y2="386" stroke="#475569"/>
    <text x="560" y="402" text-anchor="middle">2017</text>
    <line x1="700" y1="378" x2="700" y2="386" stroke="#475569"/>
    <text x="700" y="402" text-anchor="middle">2020</text>
    <line x1="840" y1="378" x2="840" y2="386" stroke="#475569"/>
    <text x="840" y="402" text-anchor="middle">2021</text>
    <line x1="980" y1="378" x2="980" y2="386" stroke="#475569"/>
    <text x="980" y="402" text-anchor="middle">2024.3</text>
    <line x1="1120" y1="378" x2="1120" y2="386" stroke="#475569"/>
    <text x="1120" y="402" text-anchor="middle">2025</text>
  </g>

  <!-- Above the line: positive events (green) -->
  <!-- 2005.1 부임 -->
  <line x1="140" y1="380" x2="140" y2="240" stroke="#22c55e" stroke-width="2"/>
  <circle cx="140" cy="240" r="6" fill="#22c55e"/>
  <text x="140" y="220" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">2005.1</text>
  <text x="140" y="200" font-size="11" fill="#94a3b8" text-anchor="middle">차석용 부임</text>
  <text x="140" y="184" font-size="10" fill="#64748b" text-anchor="middle">매출 약 1조</text>

  <!-- 2003 코카콜라 (before but mark it pre-2005) Actually let's mark 2007 더페이스샵 -->
  <line x1="220" y1="380" x2="220" y2="290" stroke="#22c55e" stroke-width="2"/>
  <circle cx="220" cy="290" r="6" fill="#22c55e"/>
  <text x="220" y="276" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">2007</text>
  <text x="220" y="260" font-size="10" fill="#94a3b8" text-anchor="middle">더페이스샵 인수</text>

  <!-- 2010~2011 해태HTB -->
  <line x1="300" y1="380" x2="300" y2="320" stroke="#22c55e" stroke-width="2"/>
  <circle cx="300" cy="320" r="6" fill="#22c55e"/>
  <text x="300" y="306" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">2010~11</text>
  <text x="300" y="290" font-size="10" fill="#94a3b8" text-anchor="middle">해태HTB 인수</text>

  <!-- 2017 태극제약 -->
  <line x1="560" y1="380" x2="560" y2="280" stroke="#22c55e" stroke-width="2"/>
  <circle cx="560" cy="280" r="6" fill="#22c55e"/>
  <text x="560" y="266" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">2017</text>
  <text x="560" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">태극제약 인수</text>

  <!-- 2021 정점 (큰 이정표) -->
  <line x1="840" y1="380" x2="840" y2="200" stroke="#fbbf24" stroke-width="3"/>
  <circle cx="840" cy="200" r="9" fill="#fbbf24"/>
  <rect x="780" y="155" width="120" height="38" rx="6" fill="#fbbf24" opacity="0.18" stroke="#fbbf24"/>
  <text x="840" y="178" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">2021 정점</text>
  <text x="840" y="139" font-size="11" fill="#fbbf24" text-anchor="middle">매출 8.09조 / 영업이익 1.29조</text>

  <!-- Below the line: warnings/negatives (orange/red) -->
  <!-- 2017 사드 -->
  <line x1="540" y1="380" x2="540" y2="490" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="540" cy="490" r="6" fill="#fbbf24"/>
  <text x="540" y="510" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">2017</text>
  <text x="540" y="528" font-size="10" fill="#94a3b8" text-anchor="middle">사드 한한령 시작</text>
  <text x="540" y="544" font-size="10" fill="#64748b" text-anchor="middle">중국 본토 매출 직격</text>

  <!-- 2017~2021 면세점 따이공 의존 -->
  <rect x="540" y="558" width="300" height="22" rx="4" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1"/>
  <text x="690" y="574" font-size="11" fill="#fbbf24" text-anchor="middle">2017~2021 면세점 따이공 의존 5년</text>

  <!-- 2022 매출 -11% (전환점) -->
  <line x1="900" y1="380" x2="900" y2="490" stroke="#ef4444" stroke-width="2"/>
  <circle cx="900" cy="490" r="6" fill="#ef4444"/>
  <text x="900" y="510" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">2022</text>
  <text x="900" y="528" font-size="10" fill="#94a3b8" text-anchor="middle">매출 -11.2%</text>
  <text x="900" y="544" font-size="10" fill="#64748b" text-anchor="middle">코로나 봉쇄·따이공 단속</text>

  <!-- 2022~23 배당 0원 -->
  <rect x="850" y="558" width="180" height="22" rx="4" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1"/>
  <text x="940" y="574" font-size="11" fill="#ef4444" text-anchor="middle">2022·2023 배당 0원 (18년 단절)</text>

  <!-- 2024.3 차석용 사임 -->
  <line x1="980" y1="380" x2="980" y2="540" stroke="#ef4444" stroke-width="3"/>
  <circle cx="980" cy="540" r="9" fill="#ef4444"/>
  <rect x="920" y="595" width="120" height="38" rx="6" fill="#ef4444" opacity="0.18" stroke="#ef4444"/>
  <text x="980" y="618" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">2024.3 사임</text>
  <text x="980" y="649" font-size="10" fill="#94a3b8" text-anchor="middle">19년 1개월 만에 CEO 교체</text>
  <text x="980" y="664" font-size="10" fill="#64748b" text-anchor="middle">이정애 신임 부임</text>

  <!-- 2025 첫 분기 영업적자 -->
  <line x1="1120" y1="380" x2="1120" y2="490" stroke="#ef4444" stroke-width="3"/>
  <circle cx="1120" cy="490" r="9" fill="#ef4444"/>
  <text x="1120" y="510" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">2025Q4</text>
  <text x="1120" y="528" font-size="10" fill="#fbbf24" text-anchor="middle">사상 첫 분기 영업적자</text>
  <text x="1120" y="544" font-size="10" fill="#64748b" text-anchor="middle">-727억 / OPM -4.94%</text>

  <!-- Top right: phase summary -->
  <g transform="translate(900, 60)">
    <rect width="240" height="84" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="16" y="22" font-size="11" fill="#94a3b8">차석용 시대 두 페이즈</text>
    <text x="16" y="44" font-size="13" font-weight="600" fill="#22c55e">① 2005~2021 황금기 17년</text>
    <text x="16" y="64" font-size="13" font-weight="600" fill="#fbbf24">② 2022~2024 후반 추락 3년</text>
  </g>

  <!-- Bottom callout -->
  <rect x="60" y="688" width="1080" height="22" fill="#0f172a"/>
  <text x="600" y="704" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">21년 황금기에 1.29조까지 갔던 영업이익이, 후임 2년차 1,707억으로 8분의 1로 줄었다 — 한 사람의 시대가 한 줄로 사라진 회계</text>
</svg>
