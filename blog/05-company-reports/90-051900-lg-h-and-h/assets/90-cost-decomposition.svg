<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title>비용 성격별 5년 변화 — 지급수수료 -44.4%, 종업원급여 +10.4%</title>
  <desc>매출원가율 37.6%→50.5% 추락의 메커니즘. 7개 비용 항목 중 지급수수료(광고·면세점 수수료·로열티)가 1.82조→1.01조 -44%로 가장 깊게 줄었지만, 종업원급여만 +10.4% 늘었다 — 면세점 채널 위축의 회계 흔적.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="60" y="62" font-size="30" font-weight="700" fill="#f1f5f9">매출원가율 37.6% → 50.5%, +13%p가 어디서 왔는가</text>
  <text x="60" y="92" font-size="16" fill="#94a3b8">비용 성격별 5년 분해 · `analysis.financial.비용구조.notesDetail.costByNature` (조원, 별도 일부)</text>

  <!-- Verdict bar -->
  <rect x="60" y="115" width="640" height="36" rx="18" fill="#7f1d1d" opacity="0.22" stroke="#ef4444" stroke-width="1"/>
  <text x="78" y="139" font-size="14" font-weight="700" fill="#ef4444">지급수수료 -44.4% · 종업원급여 +10.4% — 마케팅은 줄였지만 인력은 못 줄였다</text>

  <!-- Headers -->
  <g font-size="13" font-weight="600" fill="#94a3b8">
    <text x="60" y="190">비용 성격</text>
    <text x="380" y="190" text-anchor="end">2021</text>
    <text x="510" y="190" text-anchor="end">2025</text>
    <text x="640" y="190" text-anchor="end">변화 (조원)</text>
    <text x="780" y="190" text-anchor="end">변화율</text>
    <text x="820" y="190">시각화 (5년 변화율)</text>
  </g>
  <line x1="60" y1="200" x2="1140" y2="200" stroke="#1e293b" stroke-width="1"/>

  <!-- Row template: y=220, 270, 320, 370, 420, 470, 520 (7 rows) -->
  <!-- chart bar zone: x 820 ~ 1130, center at 970 -->

  <!-- Row 1: 지급수수료 (가장 큰 변화) -->
  <g font-size="14" fill="#cbd5e1">
    <rect x="55" y="210" width="1090" height="40" rx="4" fill="#0f172a"/>
    <text x="60" y="236" font-weight="700" fill="#fbbf24">지급수수료</text>
    <text x="160" y="236" font-size="11" fill="#64748b">광고·면세점 수수료·로열티·외주마케팅</text>
    <text x="380" y="236" text-anchor="end" font-weight="600">1.820</text>
    <text x="510" y="236" text-anchor="end" font-weight="600">1.013</text>
    <text x="640" y="236" text-anchor="end" font-weight="700" fill="#ef4444">-0.808</text>
    <text x="780" y="236" text-anchor="end" font-weight="700" fill="#ef4444">-44.4%</text>
    <!-- bar -->
    <line x1="970" y1="230" x2="970" y2="244" stroke="#475569" stroke-width="1"/>
    <rect x="826" y="226" width="144" height="16" fill="#ef4444"/>
    <text x="822" y="237" font-size="10" font-weight="600" fill="#ef4444" text-anchor="end">-44%</text>
  </g>

  <!-- Row 2: 감가상각비 -->
  <g font-size="14" fill="#cbd5e1">
    <text x="60" y="278" font-weight="600">감가상각비</text>
    <text x="160" y="278" font-size="11" fill="#64748b">장기 자산 회계적 비용</text>
    <text x="380" y="278" text-anchor="end">0.275</text>
    <text x="510" y="278" text-anchor="end">0.240</text>
    <text x="640" y="278" text-anchor="end" fill="#fbbf24">-0.035</text>
    <text x="780" y="278" text-anchor="end" fill="#fbbf24">-12.7%</text>
    <line x1="970" y1="272" x2="970" y2="286" stroke="#475569" stroke-width="1"/>
    <rect x="929" y="268" width="41" height="16" fill="#fbbf24" opacity="0.7"/>
    <text x="925" y="279" font-size="10" fill="#fbbf24" text-anchor="end">-13%</text>
  </g>

  <!-- Row 3: 외주가공비 -->
  <g font-size="14" fill="#cbd5e1">
    <rect x="55" y="290" width="1090" height="40" rx="4" fill="#0f172a"/>
    <text x="60" y="316" font-weight="600">외주가공비</text>
    <text x="160" y="316" font-size="11" fill="#64748b">OEM·ODM 외주 생산</text>
    <text x="380" y="316" text-anchor="end">0.389</text>
    <text x="510" y="316" text-anchor="end">0.374</text>
    <text x="640" y="316" text-anchor="end" fill="#94a3b8">-0.015</text>
    <text x="780" y="316" text-anchor="end" fill="#94a3b8">-3.9%</text>
    <line x1="970" y1="310" x2="970" y2="324" stroke="#475569" stroke-width="1"/>
    <rect x="957" y="306" width="13" height="16" fill="#94a3b8" opacity="0.7"/>
    <text x="953" y="317" font-size="10" fill="#94a3b8" text-anchor="end">-4%</text>
  </g>

  <!-- Row 4: 기타비용 -->
  <g font-size="14" fill="#cbd5e1">
    <text x="60" y="358" font-weight="600">기타비용</text>
    <text x="160" y="358" font-size="11" fill="#64748b">전기·운송·임차료·연구개발 등</text>
    <text x="380" y="358" text-anchor="end">1.031</text>
    <text x="510" y="358" text-anchor="end">1.008</text>
    <text x="640" y="358" text-anchor="end" fill="#94a3b8">-0.023</text>
    <text x="780" y="358" text-anchor="end" fill="#94a3b8">-2.2%</text>
    <line x1="970" y1="352" x2="970" y2="366" stroke="#475569" stroke-width="1"/>
    <rect x="963" y="348" width="7" height="16" fill="#94a3b8" opacity="0.5"/>
    <text x="958" y="359" font-size="10" fill="#94a3b8" text-anchor="end">-2%</text>
  </g>

  <!-- Row 5: 원재료사용 -->
  <g font-size="14" fill="#cbd5e1">
    <rect x="55" y="370" width="1090" height="40" rx="4" fill="#0f172a"/>
    <text x="60" y="396" font-weight="600">원재료사용</text>
    <text x="160" y="396" font-size="11" fill="#64748b">향료·계면활성제·유지·포장재</text>
    <text x="380" y="396" text-anchor="end">2.586</text>
    <text x="510" y="396" text-anchor="end">2.536</text>
    <text x="640" y="396" text-anchor="end" fill="#94a3b8">-0.050</text>
    <text x="780" y="396" text-anchor="end" fill="#94a3b8">-1.9%</text>
    <line x1="970" y1="390" x2="970" y2="404" stroke="#475569" stroke-width="1"/>
    <rect x="964" y="386" width="6" height="16" fill="#94a3b8" opacity="0.5"/>
    <text x="958" y="397" font-size="10" fill="#94a3b8" text-anchor="end">-2%</text>
  </g>

  <!-- Row 6: 종업원급여 (positive — 한 줄에 강조) -->
  <g font-size="14" fill="#cbd5e1">
    <text x="60" y="438" font-weight="700" fill="#22c55e">종업원급여</text>
    <text x="160" y="438" font-size="11" fill="#64748b">임직원 임금·복리후생 (인당 자연증가)</text>
    <text x="380" y="438" text-anchor="end" font-weight="600">0.841</text>
    <text x="510" y="438" text-anchor="end" font-weight="600">0.928</text>
    <text x="640" y="438" text-anchor="end" font-weight="700" fill="#22c55e">+0.087</text>
    <text x="780" y="438" text-anchor="end" font-weight="700" fill="#22c55e">+10.4%</text>
    <line x1="970" y1="432" x2="970" y2="446" stroke="#475569" stroke-width="1"/>
    <rect x="970" y="428" width="34" height="16" fill="#22c55e"/>
    <text x="1010" y="439" font-size="10" font-weight="600" fill="#22c55e">+10%</text>
  </g>

  <!-- Row 7: 재고자산변동 (info only) -->
  <g font-size="14" fill="#cbd5e1">
    <rect x="55" y="450" width="1090" height="40" rx="4" fill="#0f172a"/>
    <text x="60" y="476" font-weight="600">재고자산변동</text>
    <text x="160" y="476" font-size="11" fill="#64748b">재고 증감의 매출원가 반영 (음수→양수 의미 다름)</text>
    <text x="380" y="476" text-anchor="end">-0.147</text>
    <text x="510" y="476" text-anchor="end">+0.086</text>
    <text x="640" y="476" text-anchor="end" fill="#64748b">+0.233</text>
    <text x="780" y="476" text-anchor="end" fill="#64748b">방향 전환</text>
    <text x="1000" y="476" text-anchor="middle" font-size="11" fill="#64748b">(부호 의미 다름)</text>
  </g>

  <!-- Bottom mechanism summary block -->
  <g transform="translate(60, 540)">
    <rect width="1080" height="240" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="24" y="36" font-size="16" font-weight="700" fill="#f1f5f9">매출 -21% × 두 비용 — 5년의 회계적 메커니즘</text>

    <!-- Two pillar boxes -->
    <g transform="translate(24, 60)">
      <rect width="510" height="160" rx="10" fill="#0a0e1a" stroke="#ef4444" stroke-width="1"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#ef4444">① 줄인 비용 — 지급수수료 -8,083억</text>
      <text x="20" y="58" font-size="13" fill="#cbd5e1">광고선전비 + 면세점 수수료 + 로열티 + 외주 마케팅</text>
      <text x="20" y="82" font-size="13" fill="#cbd5e1">2017~2021 따이공 의존 시기 매출의 30~35% 수수료</text>
      <text x="20" y="106" font-size="13" fill="#cbd5e1">2022~2025 면세점 채널 위축 → 비례 감소</text>
      <text x="20" y="138" font-size="14" font-weight="600" fill="#fbbf24">매출 감소 -1.74조에 비례한 -44.4% 마케팅 컷</text>
    </g>

    <g transform="translate(550, 60)">
      <rect width="510" height="160" rx="10" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
      <text x="20" y="32" font-size="14" font-weight="700" fill="#22c55e">② 못 줄인 비용 — 종업원급여 +870억</text>
      <text x="20" y="58" font-size="13" fill="#cbd5e1">임직원 약 4,200명 (5년 보합)</text>
      <text x="20" y="82" font-size="13" fill="#cbd5e1">한국 대기업 평균 인당 임금 자연증가 연 3~4%</text>
      <text x="20" y="106" font-size="13" fill="#cbd5e1">고정비 점착성 — 매출 -21%에 인력 -0%</text>
      <text x="20" y="138" font-size="14" font-weight="600" fill="#fbbf24">DOL 9.4의 직접 원인 — 매출 변동에 이익 민감</text>
    </g>
  </g>
</svg>
