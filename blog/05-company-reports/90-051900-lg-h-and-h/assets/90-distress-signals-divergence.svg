<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title>두 부실 시그널의 분기 — Altman Z 안전 vs Springate 부실</title>
  <desc>LG생활건강 2025 부실 모델 4종이 두 진영으로 갈렸다. BS 중심 모델(Altman Z 3.66 안전, Ohlson 0.2% 안전)은 자본 5.57조의 두께를 본다. IS·CF 중심 모델(Springate S 0.66 부실 위험)은 영업이익률 2.69%의 추락을 본다. 자본 위기가 아니라 이익 위기다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="62" font-size="30" font-weight="700" fill="#f1f5f9">자본은 안전, 이익만 무너졌다 — 두 시그널의 분기</text>
  <text x="60" y="92" font-size="16" fill="#94a3b8">4가지 부실 모델이 같은 회사에서 정반대 신호 · `analysis.financial.자금조달.distressIndicators`</text>

  <!-- Header verdict -->
  <rect x="60" y="115" width="700" height="36" rx="18" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="78" y="139" font-size="14" font-weight="700" fill="#fbbf24">자본 5.57조 + 이익잉여금 5.54조 = Altman Z 안전 / 영업이익률 2.69% = Springate 부실</text>

  <!-- Two columns: SAFE (left) vs DISTRESS (right) -->

  <!-- LEFT COLUMN — BS-based safe -->
  <g transform="translate(60, 180)">
    <rect width="540" height="380" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="24" y="34" font-size="18" font-weight="700" fill="#22c55e">BS 중심 모델 — 안전권</text>
    <text x="24" y="56" font-size="12" fill="#94a3b8">자본·이익잉여금·매출 절대규모를 가중치로 평가</text>

    <!-- Altman Z big -->
    <g transform="translate(24, 80)">
      <rect width="240" height="116" rx="10" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
      <text x="16" y="26" font-size="13" font-weight="600" fill="#cbd5e1">Altman Z-Score</text>
      <text x="16" y="62" font-size="38" font-weight="800" fill="#22c55e">3.66</text>
      <text x="16" y="84" font-size="11" fill="#94a3b8">임계: &lt; 1.81 부실 / &gt; 2.99 안전</text>
      <text x="16" y="103" font-size="11" font-weight="600" fill="#22c55e">★ 안전권 (정상 한참 넘김)</text>
    </g>

    <g transform="translate(280, 80)">
      <rect width="236" height="116" rx="10" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
      <text x="16" y="26" font-size="13" font-weight="600" fill="#cbd5e1">Ohlson 부실확률</text>
      <text x="16" y="62" font-size="38" font-weight="800" fill="#22c55e">0.2%</text>
      <text x="16" y="84" font-size="11" fill="#94a3b8">임계: &gt; 50% 위험</text>
      <text x="16" y="103" font-size="11" font-weight="600" fill="#22c55e">★ 안전 (1년 내 부도 확률 0.2%)</text>
    </g>

    <!-- Driver labels -->
    <text x="24" y="220" font-size="13" font-weight="600" fill="#cbd5e1">이 모델들이 보는 숫자</text>
    <g font-size="13" fill="#94a3b8">
      <text x="24" y="248">자본총계</text>
      <text x="240" y="248" text-anchor="end" font-weight="600" fill="#f1f5f9">5.57조</text>
      <text x="24" y="276">이익잉여금</text>
      <text x="240" y="276" text-anchor="end" font-weight="600" fill="#f1f5f9">5.54조 (자본의 99%)</text>
      <text x="24" y="304">부채비율</text>
      <text x="240" y="304" text-anchor="end" font-weight="600" fill="#f1f5f9">23.32%</text>
      <text x="24" y="332">현금성자산</text>
      <text x="240" y="332" text-anchor="end" font-weight="600" fill="#f1f5f9">1.09조</text>
      <text x="24" y="360">순차입금</text>
      <text x="240" y="360" text-anchor="end" font-weight="600" fill="#22c55e">-1.0조 (순현금)</text>
    </g>
  </g>

  <!-- RIGHT COLUMN — IS·CF based distress -->
  <g transform="translate(620, 180)">
    <rect width="520" height="380" rx="14" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
    <text x="24" y="34" font-size="18" font-weight="700" fill="#ef4444">IS·CF 중심 모델 — 부실 위험</text>
    <text x="24" y="56" font-size="12" fill="#94a3b8">영업이익률·EBIT/총자산·현금흐름을 가중치로 평가</text>

    <g transform="translate(24, 80)">
      <rect width="220" height="116" rx="10" fill="#0a0e1a" stroke="#ef4444" stroke-width="1"/>
      <text x="16" y="26" font-size="13" font-weight="600" fill="#cbd5e1">Springate S-Score</text>
      <text x="16" y="62" font-size="38" font-weight="800" fill="#ef4444">0.66</text>
      <text x="16" y="84" font-size="11" fill="#94a3b8">임계: &lt; 0.862 부실 위험</text>
      <text x="16" y="103" font-size="11" font-weight="600" fill="#ef4444">⚠ 부실 위험 진영</text>
    </g>

    <g transform="translate(260, 80)">
      <rect width="220" height="116" rx="10" fill="#0a0e1a" stroke="#fbbf24" stroke-width="1"/>
      <text x="16" y="26" font-size="13" font-weight="600" fill="#cbd5e1">Piotroski F-Score</text>
      <text x="16" y="62" font-size="38" font-weight="800" fill="#fbbf24">6/9</text>
      <text x="16" y="84" font-size="11" fill="#94a3b8">&lt; 4 약함 / &gt; 6 강함</text>
      <text x="16" y="103" font-size="11" font-weight="600" fill="#fbbf24">⚪ 보통</text>
    </g>

    <text x="24" y="220" font-size="13" font-weight="600" fill="#cbd5e1">이 모델들이 보는 숫자</text>
    <g font-size="13" fill="#94a3b8">
      <text x="24" y="248">영업이익률</text>
      <text x="476" y="248" text-anchor="end" font-weight="600" fill="#ef4444">2.69% (9년 최저)</text>
      <text x="24" y="276">매출총이익률</text>
      <text x="476" y="276" text-anchor="end" font-weight="600" fill="#ef4444">49.48% (-12.95%p)</text>
      <text x="24" y="304">EBIT/총자산</text>
      <text x="476" y="304" text-anchor="end" font-weight="600" fill="#ef4444">2.49% (9년 최저)</text>
      <text x="24" y="332">DOL (영업레버리지)</text>
      <text x="476" y="332" text-anchor="end" font-weight="600" fill="#ef4444">9.38배 (위험)</text>
      <text x="24" y="360">안전마진</text>
      <text x="476" y="360" text-anchor="end" font-weight="600" fill="#ef4444">5.43% (BEP 코앞)</text>
    </g>
  </g>

  <!-- Bottom: dCR-AA- card + outlook + interpretation -->
  <g transform="translate(60, 590)">
    <rect width="1080" height="100" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="24" y="32" font-size="13" fill="#94a3b8">dartlab Credit Rating</text>
    <text x="24" y="68" font-size="32" font-weight="800" fill="#22c55e">dCR-AA-</text>
    <text x="24" y="90" font-size="11" fill="#94a3b8">투자적격 상위, score 8.08, health 91.92</text>

    <line x1="240" y1="20" x2="240" y2="80" stroke="#475569"/>

    <text x="260" y="32" font-size="13" fill="#94a3b8">Outlook</text>
    <text x="260" y="68" font-size="26" font-weight="700" fill="#fbbf24">부정적</text>
    <text x="260" y="90" font-size="11" fill="#94a3b8">유동성 30점 — 등급 하방 압력</text>

    <line x1="430" y1="20" x2="430" y2="80" stroke="#475569"/>

    <text x="450" y="32" font-size="13" fill="#94a3b8">함의 — 두 시그널 분기의 의미</text>
    <text x="450" y="58" font-size="14" fill="#f1f5f9">자본은 부도 위험 없음 (5.57조 + 순현금 1.0조)</text>
    <text x="450" y="80" font-size="14" font-weight="600" fill="#fbbf24">→ 자본 위기가 아니라 이익 모델 위기</text>
  </g>
</svg>
