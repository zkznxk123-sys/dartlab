<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title>LG생활건강 영업이익 1.29조 → 1,707억 8분의 1 추락</title>
  <desc>21년 차석용 황금기 정점 1조 2,896억(2021)에서 후임 2년차 1,707억(2025)으로 -86.8% 추락. 사상 첫 분기 영업적자(2025Q4 -727억)와 사상 첫 연간 순손실(-858억)이 같은 해 도래.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <!-- Title block -->
  <text x="60" y="62" font-size="32" font-weight="700" fill="#f1f5f9">영업이익 1.29조 → 1,707억, 8분의 1로 줄어든 해</text>
  <text x="60" y="92" font-size="16" fill="#94a3b8">LG생활건강 (051900) · 차석용 21년 황금기 vs 후임 2년차 · 2026-05-07 dartlab 실측</text>

  <!-- Verdict pill -->
  <rect x="60" y="115" width="280" height="34" rx="17" fill="#7f1d1d" opacity="0.22" stroke="#ef4444" stroke-width="1"/>
  <text x="78" y="138" font-size="14" font-weight="600" fill="#ef4444">— 86.8% (5년 누적, 17개 분기)</text>

  <rect x="350" y="115" width="280" height="34" rx="17" fill="#92400e" opacity="0.22" stroke="#fbbf24" stroke-width="1"/>
  <text x="368" y="138" font-size="14" font-weight="600" fill="#fbbf24">2025Q4 — 사상 첫 분기 영업적자</text>

  <rect x="640" y="115" width="280" height="34" rx="17" fill="#7f1d1d" opacity="0.22" stroke="#ef4444" stroke-width="1"/>
  <text x="658" y="138" font-size="14" font-weight="600" fill="#ef4444">2025 — 사상 첫 연간 순손실 -858억</text>

  <!-- Y axis label -->
  <text x="60" y="190" font-size="12" fill="#64748b">영업이익 (1년치 합산, 조원)</text>

  <!-- Bars: 2018~2025 (8 years) -->
  <!-- chart frame: x 90 ~ 990, y 200 ~ 540, max value 1.30, baseline at y=540 -->
  <line x1="90" y1="540" x2="1000" y2="540" stroke="#1e293b" stroke-width="1"/>
  <!-- Y gridlines and labels -->
  <line x1="90" y1="200" x2="1000" y2="200" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 4"/>
  <text x="78" y="204" font-size="11" fill="#475569" text-anchor="end">1.30</text>
  <line x1="90" y1="285" x2="1000" y2="285" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 4"/>
  <text x="78" y="289" font-size="11" fill="#475569" text-anchor="end">1.00</text>
  <line x1="90" y1="370" x2="1000" y2="370" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 4"/>
  <text x="78" y="374" font-size="11" fill="#475569" text-anchor="end">0.65</text>
  <line x1="90" y1="455" x2="1000" y2="455" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 4"/>
  <text x="78" y="459" font-size="11" fill="#475569" text-anchor="end">0.33</text>

  <!-- 2018: 1.04 -->
  <rect x="120" y="261" width="80" height="279" fill="#22c55e" opacity="0.55"/>
  <text x="160" y="252" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">1.04</text>
  <text x="160" y="558" font-size="12" fill="#94a3b8" text-anchor="middle">2018</text>

  <!-- 2019: 1.18 -->
  <rect x="220" y="231" width="80" height="309" fill="#22c55e" opacity="0.65"/>
  <text x="260" y="222" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">1.18</text>
  <text x="260" y="558" font-size="12" fill="#94a3b8" text-anchor="middle">2019</text>

  <!-- 2020: 1.22 -->
  <rect x="320" y="222" width="80" height="318" fill="#22c55e" opacity="0.75"/>
  <text x="360" y="213" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">1.22</text>
  <text x="360" y="558" font-size="12" fill="#94a3b8" text-anchor="middle">2020</text>

  <!-- 2021: 1.29 (peak) -->
  <rect x="420" y="207" width="80" height="333" fill="#22c55e"/>
  <text x="460" y="198" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">1.29 ★</text>
  <text x="460" y="558" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">2021 정점</text>

  <!-- 2022: 0.71 -->
  <rect x="520" y="358" width="80" height="182" fill="#fbbf24" opacity="0.7"/>
  <text x="560" y="349" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">0.71</text>
  <text x="560" y="558" font-size="12" fill="#94a3b8" text-anchor="middle">2022</text>

  <!-- 2023: 0.49 -->
  <rect x="620" y="416" width="80" height="124" fill="#f59e0b" opacity="0.7"/>
  <text x="660" y="407" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">0.49</text>
  <text x="660" y="558" font-size="12" fill="#94a3b8" text-anchor="middle">2023</text>

  <!-- 2024: 0.46 -->
  <rect x="720" y="423" width="80" height="117" fill="#f59e0b" opacity="0.7"/>
  <text x="760" y="414" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">0.46</text>
  <text x="760" y="558" font-size="12" fill="#94a3b8" text-anchor="middle">2024</text>

  <!-- 2025: 0.17 (8분의 1) -->
  <rect x="820" y="496" width="80" height="44" fill="#ef4444"/>
  <text x="860" y="487" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">0.17 ↓</text>
  <text x="860" y="558" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">2025</text>

  <!-- Annotation arrow from 2021 peak to 2025 trough -->
  <path d="M 460 195 Q 660 90 860 480" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 5" fill="none" opacity="0.6"/>
  <text x="660" y="80" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">5년 누적 -86.8% · 8분의 1로 줄었다</text>

  <!-- CEO timeline at bottom -->
  <line x1="120" y1="600" x2="800" y2="600" stroke="#475569" stroke-width="1"/>
  <text x="120" y="595" font-size="11" fill="#94a3b8">차석용 19년 (2005.1~2024.3)</text>
  <circle cx="800" cy="600" r="5" fill="#ef4444"/>
  <text x="810" y="604" font-size="12" font-weight="600" fill="#ef4444">2024.3 사임</text>
  <line x1="800" y1="600" x2="900" y2="600" stroke="#fbbf24" stroke-width="2"/>
  <text x="900" y="595" font-size="11" font-weight="600" fill="#fbbf24">이정애 (2024.3~)</text>

  <!-- Bottom mechanism -->
  <rect x="60" y="630" width="1080" height="68" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="80" y="654" font-size="14" font-weight="600" fill="#f1f5f9">메커니즘 한 줄</text>
  <text x="80" y="680" font-size="13" fill="#94a3b8">매출 -21% × 영업레버리지(DOL) 9.4배 = 영업이익 -87% · 매출총이익률 62.4% → 49.5% (-13%p) · 안전마진 5.4%로 손익분기점 코앞</text>
</svg>
