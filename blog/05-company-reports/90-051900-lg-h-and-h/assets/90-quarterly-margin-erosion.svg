<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title>분기 OPM·GPM 16분기 — 단조 함몰의 점진성</title>
  <desc>2022Q1부터 2025Q4까지 16분기 영업이익률(OPM)과 매출총이익률(GPM) 시계열. 14분기 단조 감소, 2025Q1 일시 반등(OPM 8.39%) 후 다시 추락. 2025Q4 OPM -4.94% 사상 첫 분기 영업적자.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>

  <text x="60" y="62" font-size="30" font-weight="700" fill="#f1f5f9">분기 마진의 단조 함몰 — 16분기 동안 점진적으로 무너졌다</text>
  <text x="60" y="92" font-size="16" fill="#94a3b8">매출총이익률(GPM) -16%p · 영업이익률(OPM) -23%p · 2025Q4 첫 분기 영업적자</text>

  <!-- Top legend / annotations -->
  <g transform="translate(60, 120)">
    <rect width="180" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <line x1="14" y1="16" x2="44" y2="16" stroke="#3b82f6" stroke-width="3"/>
    <text x="56" y="21" font-size="13" font-weight="600" fill="#3b82f6">매출총이익률 (GPM)</text>

    <rect x="200" width="180" height="32" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
    <line x1="214" y1="16" x2="244" y2="16" stroke="#fbbf24" stroke-width="3"/>
    <text x="256" y="21" font-size="13" font-weight="600" fill="#fbbf24">영업이익률 (OPM)</text>

    <rect x="400" width="200" height="32" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="500" y="21" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">★ 2025Q4 첫 분기 영업적자</text>
  </g>

  <!-- Chart frame: x 80~1120, y 200~560 -->
  <!-- GPM range: 47~57% maps to y=560~200 -->
  <!-- OPM range: -5~12% maps to y=560~200 (we'll use shared y but different scaling) -->
  <!-- Use dual axis: GPM left, OPM right -->

  <!-- Y-axis grid (GPM) -->
  <line x1="80" y1="200" x2="1120" y2="200" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="72" y="205" font-size="10" fill="#475569" text-anchor="end">57%</text>
  <line x1="80" y1="290" x2="1120" y2="290" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="72" y="295" font-size="10" fill="#475569" text-anchor="end">54%</text>
  <line x1="80" y1="380" x2="1120" y2="380" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="72" y="385" font-size="10" fill="#475569" text-anchor="end">51%</text>
  <line x1="80" y1="470" x2="1120" y2="470" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="72" y="475" font-size="10" fill="#475569" text-anchor="end">48%</text>
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#475569" stroke-width="1"/>
  <text x="72" y="565" font-size="10" fill="#475569" text-anchor="end">45%</text>

  <!-- Right axis OPM scale -->
  <text x="1140" y="205" font-size="10" fill="#475569">12%</text>
  <text x="1140" y="295" font-size="10" fill="#475569">7%</text>
  <text x="1140" y="385" font-size="10" fill="#475569">2%</text>
  <text x="1140" y="475" font-size="10" fill="#475569">-3%</text>
  <text x="1140" y="565" font-size="10" fill="#475569">-8%</text>

  <!-- 16 quarters x positions: 80 + i*65 -->
  <!-- GPM data: 55.30, 56.98, 55.68, 55.59, 53.74, 54.65, 52.82, 51.81, 53.62, 53.55, 51.18, 50.60, 51.72, 50.20, 47.44, 48.29 -->
  <!-- y(GPM%) = 200 + (57 - GPM%)/12 * 360 -->
  <!-- y(55.30) = 200 + (57-55.30)/12*360 = 200 + 51 = 251 -->
  <!-- y(56.98) = 200 + (57-56.98)/12*360 = 200 + 0.6 = 200.6 -->
  <!-- y(55.68) = 200 + (57-55.68)/12*360 = 200 + 39.6 = 239.6 -->
  <!-- y(55.59) = 200 + (57-55.59)/12*360 = 242 -->
  <!-- y(53.74) = 200 + (57-53.74)/12*360 = 297.8 -->
  <!-- y(54.65) = 200 + (57-54.65)/12*360 = 270.5 -->
  <!-- y(52.82) = 200 + (57-52.82)/12*360 = 325.4 -->
  <!-- y(51.81) = 200 + (57-51.81)/12*360 = 355.7 -->
  <!-- y(53.62) = 200 + (57-53.62)/12*360 = 301.4 -->
  <!-- y(53.55) = 200 + (57-53.55)/12*360 = 303.5 -->
  <!-- y(51.18) = 200 + (57-51.18)/12*360 = 374.6 -->
  <!-- y(50.60) = 200 + (57-50.60)/12*360 = 392 -->
  <!-- y(51.72) = 200 + (57-51.72)/12*360 = 358.4 -->
  <!-- y(50.20) = 200 + (57-50.20)/12*360 = 404 -->
  <!-- y(47.44) = 200 + (57-47.44)/12*360 = 486.8 -->
  <!-- y(48.29) = 200 + (57-48.29)/12*360 = 461.3 -->

  <polyline points="80,251 145,201 210,240 275,242 340,298 405,271 470,325 535,356 600,301 665,304 730,375 795,392 860,358 925,404 990,487 1055,461" fill="none" stroke="#3b82f6" stroke-width="3"/>

  <!-- GPM data points -->
  <g fill="#3b82f6">
    <circle cx="80" cy="251" r="4"/>
    <circle cx="145" cy="201" r="4"/>
    <circle cx="210" cy="240" r="4"/>
    <circle cx="275" cy="242" r="4"/>
    <circle cx="340" cy="298" r="4"/>
    <circle cx="405" cy="271" r="4"/>
    <circle cx="470" cy="325" r="4"/>
    <circle cx="535" cy="356" r="4"/>
    <circle cx="600" cy="301" r="4"/>
    <circle cx="665" cy="304" r="4"/>
    <circle cx="730" cy="375" r="4"/>
    <circle cx="795" cy="392" r="4"/>
    <circle cx="860" cy="358" r="4"/>
    <circle cx="925" cy="404" r="4"/>
    <circle cx="990" cy="487" r="4"/>
    <circle cx="1055" cy="461" r="4"/>
  </g>

  <!-- OPM data: 10.67, 11.63, 10.16, 7.13, 8.67, 8.73, 7.36, 3.49, 8.74, 9.01, 6.19, 2.70, 8.39, 3.42, 2.92, -4.94 -->
  <!-- y(OPM%) = 200 + (12 - OPM%)/20 * 360 -->
  <!-- y(10.67) = 200 + (12-10.67)/20*360 = 224 -->
  <!-- y(11.63) = 200 + (12-11.63)/20*360 = 207 -->
  <!-- y(10.16) = 200 + (12-10.16)/20*360 = 233 -->
  <!-- y(7.13) = 200 + (12-7.13)/20*360 = 288 -->
  <!-- y(8.67) = 200 + (12-8.67)/20*360 = 260 -->
  <!-- y(8.73) = 200 + (12-8.73)/20*360 = 259 -->
  <!-- y(7.36) = 200 + (12-7.36)/20*360 = 283.5 -->
  <!-- y(3.49) = 200 + (12-3.49)/20*360 = 353 -->
  <!-- y(8.74) = 200 + (12-8.74)/20*360 = 258.7 -->
  <!-- y(9.01) = 200 + (12-9.01)/20*360 = 253.8 -->
  <!-- y(6.19) = 200 + (12-6.19)/20*360 = 304.6 -->
  <!-- y(2.70) = 200 + (12-2.70)/20*360 = 367.4 -->
  <!-- y(8.39) = 200 + (12-8.39)/20*360 = 265 -->
  <!-- y(3.42) = 200 + (12-3.42)/20*360 = 354.4 -->
  <!-- y(2.92) = 200 + (12-2.92)/20*360 = 363.4 -->
  <!-- y(-4.94) = 200 + (12+4.94)/20*360 = 200 + 305 = 505 -->

  <polyline points="80,224 145,207 210,233 275,288 340,260 405,259 470,284 535,353 600,259 665,254 730,305 795,367 860,265 925,354 990,363 1055,505" fill="none" stroke="#fbbf24" stroke-width="3"/>

  <g fill="#fbbf24">
    <circle cx="80" cy="224" r="4"/>
    <circle cx="145" cy="207" r="4"/>
    <circle cx="210" cy="233" r="4"/>
    <circle cx="275" cy="288" r="4"/>
    <circle cx="340" cy="260" r="4"/>
    <circle cx="405" cy="259" r="4"/>
    <circle cx="470" cy="284" r="4"/>
    <circle cx="535" cy="353" r="4"/>
    <circle cx="600" cy="259" r="4"/>
    <circle cx="665" cy="254" r="4"/>
    <circle cx="730" cy="305" r="4"/>
    <circle cx="795" cy="367" r="4"/>
    <circle cx="860" cy="265" r="4"/>
    <circle cx="925" cy="354" r="4"/>
    <circle cx="990" cy="363" r="4"/>
  </g>
  <!-- 2025Q4 OPM is -4.94%, highlight -->
  <circle cx="1055" cy="505" r="8" fill="#ef4444" stroke="#0a0e1a" stroke-width="2"/>
  <text x="1055" y="530" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">-4.94%</text>

  <!-- 2021 peak reference line annotation -->
  <line x1="80" y1="180" x2="1120" y2="180" stroke="#475569" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="1120" y="175" font-size="11" fill="#475569" text-anchor="end">2021Q1 정점 OPM 18.20% / GPM 63.71% (이 차트 위쪽 밖)</text>

  <!-- Q labels -->
  <g font-size="11" fill="#64748b" text-anchor="middle">
    <text x="80" y="585">22Q1</text>
    <text x="145" y="585">Q2</text>
    <text x="210" y="585">Q3</text>
    <text x="275" y="585">Q4</text>
    <text x="340" y="585">23Q1</text>
    <text x="405" y="585">Q2</text>
    <text x="470" y="585">Q3</text>
    <text x="535" y="585">Q4</text>
    <text x="600" y="585">24Q1</text>
    <text x="665" y="585">Q2</text>
    <text x="730" y="585">Q3</text>
    <text x="795" y="585">Q4</text>
    <text x="860" y="585" fill="#fbbf24" font-weight="600">25Q1</text>
    <text x="925" y="585">Q2</text>
    <text x="990" y="585">Q3</text>
    <text x="1055" y="585" fill="#ef4444" font-weight="700">★Q4</text>
  </g>

  <!-- Year separators -->
  <line x1="307" y1="200" x2="307" y2="560" stroke="#475569" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="567" y1="200" x2="567" y2="560" stroke="#475569" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="827" y1="200" x2="827" y2="560" stroke="#475569" stroke-width="0.5" stroke-dasharray="2 4"/>

  <!-- 2025Q1 reversal annotation -->
  <rect x="800" y="615" width="120" height="22" rx="4" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
  <text x="860" y="631" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">25Q1 일시 반등 8.39%</text>

  <!-- Bottom mechanism -->
  <rect x="60" y="660" width="1080" height="44" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="80" y="682" font-size="13" font-weight="600" fill="#cbd5e1">단조 함몰의 의미 — 일회성 사고가 아닌 <tspan font-weight="700" fill="#ef4444">럭셔리 채널 믹스가 분기마다 한 줌씩 빠지면서</tspan> 회사 가중평균 매출총이익률을 갉아먹는 구조적 함몰.</text>
  <text x="80" y="699" font-size="12" fill="#94a3b8">2025Q1 OPM 8.39% 반등은 비용 통제·분기 계절성 효과로 추정. Q2~Q4 다시 추락 → 추세 우세, 반등 단발성.</text>
</svg>
