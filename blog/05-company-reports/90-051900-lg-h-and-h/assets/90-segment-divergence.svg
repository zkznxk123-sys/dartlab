<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title>4사업부 매출 변동 기여 — 화장품 본체 -158% vs 음료·제약 +138%</title>
  <desc>LG생활건강 2022→2025 매출 -3.1%p 변동을 사업부별로 분해. 화장품 본체 한 사업부가 -158% 기여, 음료 자회사 2곳(코카콜라음료·해태HTB)이 +138% 상쇄. 매출 감소의 158%를 화장품이 만든 셈.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>

  <text x="60" y="62" font-size="30" font-weight="700" fill="#f1f5f9">화장품만 죽고 음료·제약은 살았다</text>
  <text x="60" y="92" font-size="16" fill="#94a3b8">2022 → 2025 매출 -3.1%p 변동의 사업부별 기여 분해 · `analysis.financial.수익구조.growthContribution`</text>

  <!-- The verdict line -->
  <rect x="60" y="115" width="700" height="38" rx="19" fill="#7f1d1d" opacity="0.22" stroke="#ef4444" stroke-width="1"/>
  <text x="78" y="140" font-size="15" font-weight="700" fill="#ef4444">화장품 본체 한 사업부가 전체 매출 감소의 158%를 기여했다</text>

  <!-- 4 Segment cards layout -->
  <!-- Card 1: 화장품 본체 (negative big) -->
  <g transform="translate(60,180)">
    <rect width="540" height="180" rx="14" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
    <text x="24" y="34" font-size="16" font-weight="700" fill="#ef4444">(주)LG생활건강 본체 — 화장품</text>
    <text x="24" y="58" font-size="13" fill="#94a3b8">후(后)·오휘·숨37° 럭셔리 라인 + 일반 화장품·생활용품</text>
    <text x="24" y="100" font-size="14" fill="#cbd5e1">매출 비중 (2025)</text>
    <text x="200" y="100" font-size="22" font-weight="700" fill="#f1f5f9">24.83%</text>
    <text x="24" y="130" font-size="14" fill="#cbd5e1">2022→2025 매출 변동 기여</text>
    <text x="270" y="130" font-size="22" font-weight="700" fill="#ef4444">-4.9%p</text>
    <text x="24" y="160" font-size="14" fill="#cbd5e1">전체 변동 대비</text>
    <text x="200" y="160" font-size="22" font-weight="700" fill="#ef4444">-158.06%</text>
  </g>

  <!-- Card 2: 코카콜라음료 (positive) -->
  <g transform="translate(620,180)">
    <rect width="260" height="180" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="20" y="34" font-size="15" font-weight="700" fill="#22c55e">코카콜라음료(주)</text>
    <text x="20" y="56" font-size="12" fill="#94a3b8">한국 보틀링·점유 1위</text>
    <text x="20" y="92" font-size="13" fill="#cbd5e1">비중 (2025)</text>
    <text x="20" y="118" font-size="20" font-weight="700" fill="#f1f5f9">21.50%</text>
    <text x="20" y="148" font-size="13" fill="#cbd5e1">변동 기여</text>
    <text x="20" y="172" font-size="18" font-weight="700" fill="#22c55e">+2.0%p · +64.5%</text>
  </g>

  <!-- Card 3: 해태HTB (positive) -->
  <g transform="translate(900,180)">
    <rect width="240" height="180" rx="14" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="20" y="34" font-size="15" font-weight="700" fill="#22c55e">해태에이치티비</text>
    <text x="20" y="56" font-size="12" fill="#94a3b8">평창수·강원평창수 등</text>
    <text x="20" y="92" font-size="13" fill="#cbd5e1">비중 (2025)</text>
    <text x="20" y="118" font-size="20" font-weight="700" fill="#f1f5f9">27.19%</text>
    <text x="20" y="148" font-size="13" fill="#cbd5e1">변동 기여</text>
    <text x="20" y="172" font-size="18" font-weight="700" fill="#22c55e">+2.3%p · +74.2%</text>
  </g>

  <!-- Card 4: 태극제약 (slight negative) -->
  <g transform="translate(620,375)">
    <rect width="520" height="120" rx="14" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <text x="24" y="34" font-size="15" font-weight="700" fill="#fbbf24">태극제약(주) — 의약품·OTC</text>
    <text x="24" y="56" font-size="12" fill="#94a3b8">2017 인수 · 안정적 내수 사업, OPM 3~6%</text>
    <text x="24" y="90" font-size="13" fill="#cbd5e1">비중 26.48%</text>
    <text x="200" y="90" font-size="13" fill="#cbd5e1">변동 기여</text>
    <text x="320" y="90" font-size="18" font-weight="700" fill="#fbbf24">-2.5%p · -80.6%</text>
  </g>

  <!-- Summary stripe with HHI and net -->
  <g transform="translate(60,510)">
    <rect width="1080" height="100" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="24" y="32" font-size="14" fill="#94a3b8">HHI(허핀달 지수)</text>
    <text x="24" y="65" font-size="24" font-weight="700" fill="#f1f5f9">2,519</text>
    <text x="24" y="88" font-size="11" fill="#64748b">중간 집중도 — 4사업부 21~27% 균형</text>

    <line x1="220" y1="20" x2="220" y2="80" stroke="#1e293b"/>

    <text x="240" y="32" font-size="14" fill="#94a3b8">전체 매출 변동 (2022→2025)</text>
    <text x="240" y="65" font-size="24" font-weight="700" fill="#fbbf24">-3.1%p</text>
    <text x="240" y="88" font-size="11" fill="#64748b">화장품 -4.9%p × 음료 +4.3%p × 제약 -2.5%p 합산</text>

    <line x1="540" y1="20" x2="540" y2="80" stroke="#1e293b"/>

    <text x="560" y="32" font-size="14" fill="#94a3b8">함의 — 다각화의 가치</text>
    <text x="560" y="58" font-size="14" fill="#cbd5e1">음료가 없었다면 매출 -44%로 떨어졌을 회사.</text>
    <text x="560" y="78" font-size="14" fill="#cbd5e1">화장품 한 사업부 위기 → 음료가 -58% 상쇄 → 회사 -21% 결착.</text>
  </g>

  <!-- 5-year revenue trend mini chart -->
  <g transform="translate(60,640)">
    <text x="0" y="20" font-size="14" font-weight="600" fill="#cbd5e1">매출 5년 시계열 (조원, 1년치 합산)</text>
    <text x="0" y="38" font-size="11" fill="#64748b">2021 정점 8.09 → 2025 6.36 (-21.4%)</text>

    <!-- mini chart 1100x90 frame -->
    <line x1="0" y1="155" x2="1080" y2="155" stroke="#1e293b" stroke-width="1"/>

    <!-- 5 bars: 2021~2025 -->
    <rect x="100" y="60" width="120" height="95" fill="#22c55e" opacity="0.7"/>
    <text x="160" y="50" font-size="12" font-weight="700" fill="#22c55e" text-anchor="middle">8.09</text>
    <text x="160" y="172" font-size="11" fill="#94a3b8" text-anchor="middle">2021</text>

    <rect x="280" y="74" width="120" height="81" fill="#22c55e" opacity="0.55"/>
    <text x="340" y="64" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">7.19</text>
    <text x="340" y="172" font-size="11" fill="#94a3b8" text-anchor="middle">2022</text>

    <rect x="460" y="80" width="120" height="75" fill="#fbbf24" opacity="0.6"/>
    <text x="520" y="70" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">6.80</text>
    <text x="520" y="172" font-size="11" fill="#94a3b8" text-anchor="middle">2023</text>

    <rect x="640" y="80" width="120" height="75" fill="#fbbf24" opacity="0.6"/>
    <text x="700" y="70" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="middle">6.81</text>
    <text x="700" y="172" font-size="11" fill="#94a3b8" text-anchor="middle">2024</text>

    <rect x="820" y="89" width="120" height="66" fill="#ef4444" opacity="0.7"/>
    <text x="880" y="79" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">6.36</text>
    <text x="880" y="172" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">2025</text>
  </g>
</svg>
