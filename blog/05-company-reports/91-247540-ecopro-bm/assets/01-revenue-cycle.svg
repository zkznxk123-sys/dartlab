<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="58" fill="#f1f5f9" font-size="26" font-weight="700">매출 +708% (3년) → -60% (1년) — 양극재 슈퍼사이클</text>
  <text x="60" y="88" fill="#64748b" font-size="14">FY 2020~2025 연 매출 (억원, 좌축) · OPM (%, 우축) · 출처: DART</text>

  <!-- Chart frame -->
  <line x1="100" y1="480" x2="1140" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="140" x2="100" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="1140" y1="140" x2="1140" y2="480" stroke="#334155" stroke-width="1"/>

  <!-- Y-axis ticks (revenue, max ≈ 70,000) -->
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="92" y="484">0</text>
    <text x="92" y="399">17,500</text>
    <text x="92" y="314">35,000</text>
    <text x="92" y="229">52,500</text>
    <text x="92" y="144">70,000</text>
  </g>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="100" y1="395" x2="1140" y2="395"/>
    <line x1="100" y1="310" x2="1140" y2="310"/>
    <line x1="100" y1="225" x2="1140" y2="225"/>
  </g>

  <!-- Y-axis right (OPM, range -2 ~ 10) -->
  <g fill="#64748b" font-size="11" text-anchor="start">
    <text x="1148" y="172">10%</text>
    <text x="1148" y="257">7%</text>
    <text x="1148" y="370">3%</text>
    <text x="1148" y="427">0%</text>
    <text x="1148" y="484">-2%</text>
  </g>

  <!-- Bar geometry: 6 bars, x positions -->
  <!-- Heights: revenue / 70000 * 340 -->
  <!-- 2020: 8547 → 41.5 → bar height 41.5 -->
  <!-- 2021: 14856 → 72.2 -->
  <!-- 2022: 53576 → 260.4 -->
  <!-- 2023: 69009 → 335.4 -->
  <!-- 2024: 27668 → 134.5 -->
  <!-- 2025: 25316 → 123.0 -->

  <!-- 2020 -->
  <rect x="180" y="438.5" width="100" height="41.5" fill="#475569"/>
  <text x="230" y="430" fill="#f1f5f9" font-size="13" text-anchor="middle">8,547</text>
  <text x="230" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2020</text>

  <!-- 2021 -->
  <rect x="320" y="407.8" width="100" height="72.2" fill="#475569"/>
  <text x="370" y="400" fill="#f1f5f9" font-size="13" text-anchor="middle">14,856</text>
  <text x="370" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2021</text>

  <!-- 2022 -->
  <rect x="460" y="219.6" width="100" height="260.4" fill="#64748b"/>
  <text x="510" y="212" fill="#f1f5f9" font-size="13" text-anchor="middle">53,576</text>
  <text x="510" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2022</text>

  <!-- 2023 PEAK -->
  <rect x="600" y="144.6" width="100" height="335.4" fill="#22c55e"/>
  <text x="650" y="137" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">69,009 PEAK</text>
  <text x="650" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2023</text>

  <!-- 2024 crash -->
  <rect x="740" y="345.5" width="100" height="134.5" fill="#ef4444"/>
  <text x="790" y="338" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">27,668 (-60%)</text>
  <text x="790" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2024</text>

  <!-- 2025 -->
  <rect x="880" y="357" width="100" height="123" fill="#475569"/>
  <text x="930" y="349" fill="#f1f5f9" font-size="13" text-anchor="middle">25,316</text>
  <text x="930" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2025</text>

  <!-- OPM line -->
  <!-- OPM mapping: range -2..10, axis 480..140 (340 px) -->
  <!-- y = 480 - (OPM + 2) / 12 * 340 -->
  <!-- 6.41 → 480 - 8.41/12*340 = 480 - 238.3 = 241.7 -->
  <!-- 7.74 → 480 - 9.74/12*340 = 480 - 275.9 = 204.1 -->
  <!-- 7.11 → 480 - 9.11/12*340 = 480 - 258.1 = 221.9 -->
  <!-- 2.26 → 480 - 4.26/12*340 = 480 - 120.7 = 359.3 -->
  <!-- -1.23 → 480 - 0.77/12*340 = 480 - 21.8 = 458.2 -->
  <!-- 5.66 → 480 - 7.66/12*340 = 480 - 217.0 = 263.0 -->
  <polyline points="230,241.7 370,204.1 510,221.9 650,359.3 790,458.2 930,263.0" fill="none" stroke="#fbbf24" stroke-width="2.5"/>

  <!-- OPM points -->
  <g fill="#fbbf24">
    <circle cx="230" cy="241.7" r="4.5"/>
    <circle cx="370" cy="204.1" r="4.5"/>
    <circle cx="510" cy="221.9" r="4.5"/>
    <circle cx="650" cy="359.3" r="4.5"/>
    <circle cx="790" cy="458.2" r="4.5"/>
    <circle cx="930" cy="263.0" r="4.5"/>
  </g>

  <!-- OPM labels -->
  <g fill="#fbbf24" font-size="11" text-anchor="middle">
    <text x="230" y="232">6.41%</text>
    <text x="370" y="194">7.74%</text>
    <text x="510" y="212">7.11%</text>
    <text x="650" y="378">2.26%</text>
    <text x="790" y="478">-1.23%</text>
    <text x="930" y="253">5.66%</text>
  </g>

  <!-- Legend -->
  <rect x="60" y="544" width="14" height="14" fill="#22c55e"/>
  <text x="80" y="556" fill="#94a3b8" font-size="12">매출 (PEAK 2023)</text>
  <rect x="240" y="544" width="14" height="14" fill="#ef4444"/>
  <text x="260" y="556" fill="#94a3b8" font-size="12">매출 (붕괴 2024)</text>
  <rect x="420" y="544" width="14" height="14" fill="#475569"/>
  <text x="440" y="556" fill="#94a3b8" font-size="12">매출 (기타)</text>
  <line x1="556" y1="551" x2="588" y2="551" stroke="#fbbf24" stroke-width="2.5"/>
  <circle cx="572" cy="551" r="4" fill="#fbbf24"/>
  <text x="596" y="556" fill="#94a3b8" font-size="12">OPM (영업이익률)</text>
</svg>
