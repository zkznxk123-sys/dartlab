<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="58" fill="#f1f5f9" font-size="26" font-weight="700">분기 매출 36 분기 — 2023Q1 PEAK 2.01 조 → 2024Q4 4,649 억 (-77%)</text>
  <text x="60" y="88" fill="#64748b" font-size="14">2017Q1~2025Q4 분기 매출 (억원) · PEAK 2023Q1 → -77% 단일 회사 단일 분기 사상 최대</text>

  <!-- Frame -->
  <line x1="80" y1="500" x2="1160" y2="500" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="140" x2="80" y2="500" stroke="#334155" stroke-width="1"/>

  <!-- Y ticks (max 22000) -->
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="72" y="504">0</text>
    <text x="72" y="414">5,500</text>
    <text x="72" y="324">11,000</text>
    <text x="72" y="234">16,500</text>
    <text x="72" y="144">22,000</text>
  </g>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="80" y1="410" x2="1160" y2="410"/>
    <line x1="80" y1="320" x2="1160" y2="320"/>
    <line x1="80" y1="230" x2="1160" y2="230"/>
  </g>

  <!-- 36 quarter bars from x=90 to x=1150, width 30 + gap. Width 1060/36 ≈ 29.4. bar w 22, step 29.4 -->
  <!-- y = 500 - val/22000 * 360 -->
  <!-- Approximate quarterly values (억) — climb 2017~2020, ramp 2021, spike 2022~2023Q1, collapse to 2024Q4, slight rebound 2025 -->
  <!-- 17Q1 1500, 17Q2 1700, 17Q3 1850, 17Q4 1750 -->
  <!-- 18Q1 1450, 18Q2 1450, 18Q3 1450, 18Q4 1450 -->
  <!-- 19Q1 1500, 19Q2 1550, 19Q3 1600, 19Q4 1700 -->
  <!-- 20Q1 1900, 20Q2 1950, 20Q3 2200, 20Q4 2500 -->
  <!-- 21Q1 2900, 21Q2 3300, 21Q3 4000, 21Q4 4700 -->
  <!-- 22Q1 6500, 22Q2 11000, 22Q3 15600, 22Q4 20500 -->
  <!-- 23Q1 20100 PEAK, 23Q2 19100, 23Q3 18000, 23Q4 11800 -->
  <!-- 24Q1 9705, 24Q2 8400, 24Q3 5219, 24Q4 4649 -->
  <!-- 25Q1 4500, 25Q2 5100, 25Q3 5800, 25Q4 4970 -->

  <g>
    <!-- 2017 (4 bars) -->
    <rect x="92" y="475.45" width="22" height="24.55" fill="#475569"/>
    <rect x="121.4" y="472.18" width="22" height="27.82" fill="#475569"/>
    <rect x="150.8" y="469.73" width="22" height="30.27" fill="#475569"/>
