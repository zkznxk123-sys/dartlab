    <rect x="915.2" y="341.0" width="22" height="159.0" fill="#f59e0b"/>
    <rect x="944.6" y="362.55" width="22" height="137.45" fill="#f59e0b"/>
    <rect x="974.0" y="414.58" width="22" height="85.42" fill="#ef4444"/>
    <rect x="1003.4" y="423.92" width="22" height="76.08" fill="#ef4444"/>
    <!-- 2025 rebound -->
    <rect x="1032.8" y="426.36" width="22" height="73.64" fill="#475569"/>
