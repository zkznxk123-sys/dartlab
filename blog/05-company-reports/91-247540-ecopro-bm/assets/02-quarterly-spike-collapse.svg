    <rect x="327.2" y="475.45" width="22" height="24.55" fill="#475569"/>
    <rect x="356.6" y="474.64" width="22" height="25.36" fill="#475569"/>
    <rect x="386.0" y="473.82" width="22" height="26.18" fill="#475569"/>
    <rect x="415.4" y="472.18" width="22" height="27.82" fill="#475569"/>
