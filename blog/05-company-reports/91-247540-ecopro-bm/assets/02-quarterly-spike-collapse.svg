  <line x1="1014" y1="425" x2="1050" y2="470" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="940" y="455" width="210" height="40" fill="#0a0e1a" stroke="#ef4444" stroke-width="1.5" rx="4"/>
  <text x="1045" y="473" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2024Q4 4,649 억 (-77%)</text>
  <text x="1045" y="489" fill="#f1f5f9" font-size="12" text-anchor="middle">PEAK 대비 1/4 수준</text>

  <!-- Legend -->
  <rect x="60" y="558" width="14" height="14" fill="#22c55e"/>
  <text x="80" y="570" fill="#94a3b8" font-size="12">PEAK 분기</text>
  <rect x="170" y="558" width="14" height="14" fill="#f59e0b"/>
