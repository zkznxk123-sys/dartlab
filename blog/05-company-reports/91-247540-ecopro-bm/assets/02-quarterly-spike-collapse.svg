    <rect x="621.2" y="434.55" width="22" height="65.45" fill="#475569"/>
    <rect x="650.6" y="423.09" width="22" height="76.91" fill="#475569"/>
    <!-- 2022 ramp -->
    <rect x="680.0" y="393.64" width="22" height="106.36" fill="#64748b"/>
    <rect x="709.4" y="320.0" width="22" height="180.0" fill="#64748b"/>
