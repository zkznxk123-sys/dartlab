<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="58" fill="#f1f5f9" font-size="26" font-weight="700">매출 -60% 의 해에 CAPEX 1 조 — 자본집약의 모순</text>
  <text x="60" y="88" fill="#64748b" font-size="14">좌: 매출 6.27 조 → 2.77 조 (-60%) · 우: CAPEX 매출의 37% PEAK · 차입 691 → 1,797 억 (2.6×)</text>

  <!-- Vertical divider -->
  <line x1="600" y1="120" x2="600" y2="500" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== LEFT panel: Revenue 2022/2023/2024 ===== -->
  <text x="100" y="125" fill="#94a3b8" font-size="14" font-weight="600">매출 (조원, FY)</text>
  <line x1="100" y1="480" x2="560" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="150" x2="100" y2="480" stroke="#334155" stroke-width="1"/>

  <!-- Y ticks revenue (max 7 trillion) -->
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="92" y="484">0</text>
    <text x="92" y="398">1.75</text>
    <text x="92" y="316">3.50</text>
    <text x="92" y="234">5.25</text>
    <text x="92" y="152">7.00</text>
  </g>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="100" y1="395" x2="560" y2="395"/>
    <line x1="100" y1="313" x2="560" y2="313"/>
    <line x1="100" y1="231" x2="560" y2="231"/>
  </g>

  <!-- Revenue bars: y = 480 - val/7 * 330 -->
  <!-- 2022: 5.36 → 480 - 252.7 = 227.3, height 252.7 -->
  <!-- 2023: 6.90 → 480 - 325.3 = 154.7, height 325.3 -->
  <!-- 2024: 2.77 → 480 - 130.6 = 349.4, height 130.6 -->
  <rect x="160" y="227.3" width="100" height="252.7" fill="#475569"/>
  <text x="210" y="219" fill="#f1f5f9" font-size="13" text-anchor="middle">5.36 조</text>
  <text x="210" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2022</text>

  <rect x="290" y="154.7" width="100" height="325.3" fill="#22c55e"/>
  <text x="340" y="146" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">6.90 조 PEAK</text>
  <text x="340" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2023</text>

  <rect x="420" y="349.4" width="100" height="130.6" fill="#ef4444"/>
  <text x="470" y="341" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">2.77 조 (-60%)</text>
  <text x="470" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2024</text>

  <!-- Arrow showing -60% drop -->
  <path d="M 350 200 Q 425 180 470 340" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
  <polygon points="466,330 470,344 478,332" fill="#ef4444"/>
  <text x="430" y="195" fill="#ef4444" font-size="12" font-weight="600">-60.2%</text>

  <!-- ===== RIGHT panel: CAPEX + Debt overlay ===== -->
  <text x="640" y="125" fill="#94a3b8" font-size="14" font-weight="600">CAPEX (억원, 좌축) · 차입금 (억원, 우축)</text>
  <line x1="640" y1="480" x2="1140" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="640" y1="150" x2="640" y2="480" stroke="#334155" stroke-width="1"/>
  <line x1="1140" y1="150" x2="1140" y2="480" stroke="#334155" stroke-width="1"/>

  <!-- Y ticks CAPEX left (max 11000) -->
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="632" y="484">0</text>
    <text x="632" y="398">2,750</text>
    <text x="632" y="316">5,500</text>
    <text x="632" y="234">8,250</text>
    <text x="632" y="152">11,000</text>
  </g>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="640" y1="395" x2="1140" y2="395"/>
    <line x1="640" y1="313" x2="1140" y2="313"/>
    <line x1="640" y1="231" x2="1140" y2="231"/>
  </g>

  <!-- Y ticks Debt right (max 2200) -->
  <g fill="#fbbf24" font-size="11" text-anchor="start">
    <text x="1148" y="484">0</text>
    <text x="1148" y="398">550</text>
    <text x="1148" y="316">1,100</text>
    <text x="1148" y="234">1,650</text>
    <text x="1148" y="152">2,200</text>
  </g>

  <!-- CAPEX bars: y = 480 - val/11000 * 330 -->
  <!-- 2022: ~5500 (approx capex peak ramp) → height 165, y 315  (illustrative — pre-2024 ramp) -->
  <!-- Use conservative values: 2022 CAPEX 약 5,500 / 2023 약 8,500 / 2024 10,238 / 2025 4,382 -->
  <!-- Actually requirement says 2022, 2024, 2025: include 2023 too for clarity. Keep three bars matching x positions of revenue panel -->
  <!-- 2022: 5500 → height 165, y 315 -->
  <!-- 2024: 10238 → height 307.1, y 172.9  (PEAK 37%) -->
  <!-- 2025: 4382 → height 131.5, y 348.5 -->

  <rect x="700" y="315" width="100" height="165" fill="#475569"/>
  <text x="750" y="307" fill="#f1f5f9" font-size="13" text-anchor="middle">5,500 (10%)</text>
  <text x="750" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2022</text>

  <rect x="830" y="172.9" width="100" height="307.1" fill="#fbbf24"/>
  <text x="880" y="164" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">10,238 (37%)</text>
  <text x="880" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2024 PEAK</text>

  <rect x="960" y="348.5" width="100" height="131.5" fill="#475569"/>
  <text x="1010" y="340" fill="#f1f5f9" font-size="13" text-anchor="middle">4,382 (17%)</text>
  <text x="1010" y="500" fill="#94a3b8" font-size="13" text-anchor="middle">FY 2025</text>

  <!-- Debt overlay line (2022Q4 691, 2024Q4 1797, 2025Q4 1771) -->
  <!-- Mapping val/2200 * 330 from y=480 -->
  <!-- 691 → 480 - 103.6 = 376.4 -->
  <!-- 1797 → 480 - 269.5 = 210.5 -->
  <!-- 1771 → 480 - 265.6 = 214.4 -->
  <polyline points="750,376.4 880,210.5 1010,214.4" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="6,3"/>
  <g fill="#fbbf24">
    <circle cx="750" cy="376.4" r="5"/>
    <circle cx="880" cy="210.5" r="5"/>
    <circle cx="1010" cy="214.4" r="5"/>
  </g>
  <g fill="#fbbf24" font-size="11" text-anchor="middle">
    <text x="750" y="368">691</text>
    <text x="880" y="200">1,797 (2.6×)</text>
    <text x="1010" y="206">1,771</text>
  </g>

  <!-- Annotation banner -->
  <rect x="60" y="540" width="1080" height="40" fill="#1e293b" rx="4"/>
  <text x="600" y="565" fill="#fbbf24" font-size="14" font-weight="600" text-anchor="middle">매출 -60% 의 해에 CAPEX 1 조 (매출 37%) · 차입 2.6 배 — 사이클 결정은 2 년 전, 청구서는 지금 도착</text>

  <!-- Legend right panel -->
  <rect x="640" y="510" width="14" height="14" fill="#fbbf24"/>
  <text x="660" y="522" fill="#94a3b8" font-size="12">CAPEX PEAK (2024)</text>
  <line x1="800" y1="517" x2="836" y2="517" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="818" cy="517" r="4" fill="#fbbf24"/>
  <text x="844" y="522" fill="#94a3b8" font-size="12">차입금 합계 (우축)</text>
</svg>
