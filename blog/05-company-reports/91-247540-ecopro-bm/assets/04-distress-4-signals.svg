<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="58" fill="#f1f5f9" font-size="26" font-weight="700">부실 4 신호 동시 점등 (2025Q4)</text>
  <text x="60" y="88" fill="#64748b" font-size="14">Altman Z · Springate · Piotroski · 이자보상배수 — 한 분기에 모두 적색 구간</text>

  <!-- 4 gauge panels: each ~270 wide -->
  <!-- Common: x positions 60, 348, 636, 924, width 256 -->

  <!-- Helper: each panel is a card -->

  <!-- ===== Panel 1: Altman Z 0.88 ===== -->
  <rect x="60" y="120" width="256" height="280" fill="#0f172a" stroke="#1e293b" stroke-width="1" rx="6"/>
  <text x="188" y="148" fill="#94a3b8" font-size="13" text-anchor="middle">Altman Z-Score</text>
  <text x="188" y="200" fill="#ef4444" font-size="56" font-weight="700" text-anchor="middle">0.88</text>
  <text x="188" y="225" fill="#ef4444" font-size="13" text-anchor="middle">부실 위험 (&lt; 1.81)</text>

  <!-- Bar gauge: range 0..3.5, 1.81 threshold -->
  <rect x="80" y="260" width="216" height="14" fill="#1e293b" rx="2"/>
  <!-- Distress 0..1.81 → 0..(1.81/3.5)*216 = 111.7 -->
  <rect x="80" y="260" width="111.7" height="14" fill="#7f1d1d" rx="2"/>
  <!-- Grey zone 1.81..2.99 -->
  <rect x="191.7" y="260" width="72.8" height="14" fill="#3f3f46"/>
  <!-- Safe 2.99..3.5 -->
  <rect x="264.5" y="260" width="31.5" height="14" fill="#14532d" rx="2"/>
  <!-- Marker for 0.88 → 0.88/3.5*216 = 54.3 → x=80+54.3=134.3 -->
  <line x1="134.3" y1="252" x2="134.3" y2="282" stroke="#ef4444" stroke-width="3"/>
  <polygon points="130.3,250 138.3,250 134.3,260" fill="#ef4444"/>

  <text x="80" y="298" fill="#64748b" font-size="11">0</text>
  <text x="186" y="298" fill="#64748b" font-size="11" text-anchor="middle">1.81</text>
  <text x="296" y="298" fill="#64748b" font-size="11" text-anchor="end">3.5</text>

  <text x="188" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">임계 1.81 의 절반 미만</text>
  <text x="188" y="358" fill="#94a3b8" font-size="11" text-anchor="middle">5 항목 중 4 개 적색</text>
  <text x="188" y="376" fill="#94a3b8" font-size="11" text-anchor="middle">Market Equity 항목 -75%</text>

  <!-- ===== Panel 2: Springate 0.21 ===== -->
  <rect x="348" y="120" width="256" height="280" fill="#0f172a" stroke="#1e293b" stroke-width="1" rx="6"/>
  <text x="476" y="148" fill="#94a3b8" font-size="13" text-anchor="middle">Springate S-Score</text>
  <text x="476" y="200" fill="#ef4444" font-size="56" font-weight="700" text-anchor="middle">0.21</text>
  <text x="476" y="225" fill="#ef4444" font-size="13" text-anchor="middle">부실 위험 (&lt; 0.862)</text>

  <rect x="368" y="260" width="216" height="14" fill="#1e293b" rx="2"/>
  <!-- Range 0..2, threshold 0.862 → 0.862/2*216 = 93.0 -->
  <rect x="368" y="260" width="93.0" height="14" fill="#7f1d1d" rx="2"/>
  <rect x="461.0" y="260" width="123.0" height="14" fill="#14532d" rx="2"/>
  <!-- Marker for 0.21 → 0.21/2*216 = 22.7 → x=368+22.7=390.7 -->
  <line x1="390.7" y1="252" x2="390.7" y2="282" stroke="#ef4444" stroke-width="3"/>
  <polygon points="386.7,250 394.7,250 390.7,260" fill="#ef4444"/>

  <text x="368" y="298" fill="#64748b" font-size="11">0</text>
  <text x="461" y="298" fill="#64748b" font-size="11" text-anchor="middle">0.862</text>
  <text x="584" y="298" fill="#64748b" font-size="11" text-anchor="end">2.0</text>

  <text x="476" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">임계의 1/4 수준</text>
  <text x="476" y="358" fill="#94a3b8" font-size="11" text-anchor="middle">Altman 변형 — 같은 방향</text>
  <text x="476" y="376" fill="#94a3b8" font-size="11" text-anchor="middle">EBT/CL · EBIT/TA 약화</text>

  <!-- ===== Panel 3: Piotroski 3/9 ===== -->
  <rect x="636" y="120" width="256" height="280" fill="#0f172a" stroke="#1e293b" stroke-width="1" rx="6"/>
  <text x="764" y="148" fill="#94a3b8" font-size="13" text-anchor="middle">Piotroski F-Score</text>
  <text x="764" y="200" fill="#ef4444" font-size="56" font-weight="700" text-anchor="middle">3<tspan fill="#64748b" font-size="32">/9</tspan></text>
  <text x="764" y="225" fill="#ef4444" font-size="13" text-anchor="middle">재무 약화 (≥ 7 양호)</text>

  <!-- 9 dot indicators: 3 green, 6 red -->
  <g>
    <!-- 3 green (positions 1,2,3) -->
    <circle cx="664" cy="270" r="11" fill="#22c55e"/>
    <circle cx="688" cy="270" r="11" fill="#22c55e"/>
    <circle cx="712" cy="270" r="11" fill="#22c55e"/>
    <!-- 6 red -->
    <circle cx="736" cy="270" r="11" fill="#ef4444"/>
    <circle cx="760" cy="270" r="11" fill="#ef4444"/>
    <circle cx="784" cy="270" r="11" fill="#ef4444"/>
    <circle cx="808" cy="270" r="11" fill="#ef4444"/>
    <circle cx="832" cy="270" r="11" fill="#ef4444"/>
    <circle cx="856" cy="270" r="11" fill="#ef4444"/>
  </g>

  <text x="664" y="304" fill="#64748b" font-size="11" text-anchor="middle">통과</text>
  <text x="856" y="304" fill="#64748b" font-size="11" text-anchor="middle">실패</text>

  <text x="764" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">9 항목 중 6 개 빨간불</text>
  <text x="764" y="358" fill="#94a3b8" font-size="11" text-anchor="middle">ROA · CFO · ΔLeverage 등</text>
  <text x="764" y="376" fill="#94a3b8" font-size="11" text-anchor="middle">5 미만 = 약함 구간</text>

  <!-- ===== Panel 4: 이자보상 1.0 ===== -->
  <rect x="924" y="120" width="216" height="280" fill="#0f172a" stroke="#1e293b" stroke-width="1" rx="6"/>
  <text x="1032" y="148" fill="#94a3b8" font-size="13" text-anchor="middle">이자보상배수</text>
  <text x="1032" y="200" fill="#ef4444" font-size="56" font-weight="700" text-anchor="middle">1.0×</text>
  <text x="1032" y="225" fill="#ef4444" font-size="13" text-anchor="middle">임계 (&lt; 1.5 warning)</text>

  <rect x="944" y="260" width="176" height="14" fill="#1e293b" rx="2"/>
  <!-- Range 0..5, distress 0..1.5 -->
  <rect x="944" y="260" width="52.8" height="14" fill="#7f1d1d" rx="2"/>
  <rect x="996.8" y="260" width="123.2" height="14" fill="#14532d" rx="2"/>
  <!-- Marker for 1.0 → 1.0/5*176 = 35.2 → x=944+35.2=979.2 -->
  <line x1="979.2" y1="252" x2="979.2" y2="282" stroke="#ef4444" stroke-width="3"/>
  <polygon points="975.2,250 983.2,250 979.2,260" fill="#ef4444"/>

  <text x="944" y="298" fill="#64748b" font-size="11">0</text>
  <text x="996" y="298" fill="#64748b" font-size="11" text-anchor="middle">1.5</text>
  <text x="1120" y="298" fill="#64748b" font-size="11" text-anchor="end">5.0</text>

  <text x="1032" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">영업이익 = 이자비용</text>
  <text x="1032" y="358" fill="#94a3b8" font-size="11" text-anchor="middle">한 해 번 돈 → 이자 한 번</text>
  <text x="1032" y="376" fill="#94a3b8" font-size="11" text-anchor="middle">유동비율 72% 동반</text>

  <!-- Bottom callout banner -->
  <rect x="60" y="438" width="1080" height="100" fill="#1e293b" rx="6"/>
  <text x="600" y="468" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">본업 적자 -341 억 (FY 2024) vs 차입 1.77 조 + CAPEX 1 조 (매출 37%)</text>
  <text x="600" y="495" fill="#f1f5f9" font-size="13" text-anchor="middle">사업 일시 침체가 아니라 BS 구조 자체가 흔들린다는 신호</text>
  <text x="600" y="518" fill="#94a3b8" font-size="12" text-anchor="middle">출처: dartlab.Company('247540').analysis('자금조달') · 2025Q4 연결 기준</text>

  <!-- footer -->
  <text x="60" y="572" fill="#64748b" font-size="11">임계: Altman Z 1.81 / Springate 0.862 / Piotroski 5 (보수)·7 (양호) / 이자보상 1.5 (warning)</text>
</svg>
