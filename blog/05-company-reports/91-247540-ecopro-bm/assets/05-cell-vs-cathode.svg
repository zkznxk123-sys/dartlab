<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif">
  <rect width="1200" height="600" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="60" y="58" fill="#f1f5f9" font-size="26" font-weight="700">셀 -24% vs 양극재 -60% — 가격 전가력 단방향</text>
  <text x="60" y="88" fill="#64748b" font-size="14">2024 매출 YoY · 셀 평균 -24% 대비 양극재 4 사 평균 -55% — 충격 약 2.3 배 증폭</text>

  <!-- ===== LEFT panel: Cell vs Cathode bar comparison ===== -->
  <text x="100" y="135" fill="#94a3b8" font-size="13" font-weight="600">셀 메이커 vs 양극재 평균 (2024 매출 YoY)</text>

  <!-- Chart area: y axis from 0% (top) to -70% (bottom). x=100..560 -->
  <line x1="100" y1="160" x2="560" y2="160" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="160" x2="100" y2="460" stroke="#334155" stroke-width="1"/>

  <!-- Y ticks (0 → -70%) -->
  <g fill="#64748b" font-size="11" text-anchor="end">
    <text x="92" y="164">0%</text>
    <text x="92" y="246">-20%</text>
    <text x="92" y="328">-40%</text>
    <text x="92" y="410">-60%</text>
  </g>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="100" y1="242" x2="560" y2="242"/>
    <line x1="100" y1="324" x2="560" y2="324"/>
    <line x1="100" y1="406" x2="560" y2="406"/>
  </g>

  <!-- Bar mapping: y=160 (top, 0%), height = abs(YoY)/70 * 286 (axis 160..446) -->
  <!-- LG엔솔 -24% → height 98.1 → bar 160..258.1 -->
  <!-- 삼성SDI -10% (적자전환, illustrative magnitude) → height 40.9 → 160..200.9 -->
  <!-- 양극재 평균 -55% → height 224.7 → 160..384.7 -->

  <!-- LG엔솔 (cell) -->
  <rect x="140" y="160" width="80" height="98.1" fill="#f59e0b"/>
  <text x="180" y="276" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">-24%</text>
  <text x="180" y="475" fill="#94a3b8" font-size="12" text-anchor="middle">LG엔솔</text>
  <text x="180" y="491" fill="#64748b" font-size="11" text-anchor="middle">(셀)</text>

  <!-- 삼성SDI (cell, 적자 전환 — magnitude visualised conservatively) -->
  <rect x="260" y="160" width="80" height="40.9" fill="#f59e0b"/>
  <text x="300" y="218" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">적자 전환</text>
  <text x="300" y="475" fill="#94a3b8" font-size="12" text-anchor="middle">삼성SDI</text>
  <text x="300" y="491" fill="#64748b" font-size="11" text-anchor="middle">(셀)</text>

  <!-- 양극재 4 사 평균 -->
  <rect x="380" y="160" width="80" height="224.7" fill="#ef4444"/>
  <text x="420" y="402" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">-55%</text>
  <text x="420" y="475" fill="#94a3b8" font-size="12" text-anchor="middle">양극재 4 사</text>
  <text x="420" y="491" fill="#64748b" font-size="11" text-anchor="middle">평균 (소재)</text>

  <!-- 2.3x amplification arrow -->
  <path d="M 200 290 Q 300 410 400 410" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="394,402 408,410 394,418" fill="#fbbf24"/>
  <rect x="225" y="435" width="120" height="28" fill="#0a0e1a" stroke="#fbbf24" stroke-width="1.5" rx="4"/>
  <text x="285" y="454" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">2.3 배 증폭</text>

  <!-- ===== RIGHT panel: Cathode 4 firms distribution ===== -->
  <line x1="600" y1="120" x2="600" y2="510" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="640" y="135" fill="#94a3b8" font-size="13" font-weight="600">양극재 4 사 분포 (2024 매출 YoY)</text>

  <!-- horizontal bars from x=720 toward left for negative YoY, or right for value text -->
  <!-- Each row: company label x=640, bar starts x=740, width = abs(YoY)/70 * 350 -->
  <!-- BM -60% → 300 -->
  <!-- 포스코퓨처엠 -50% → 250 -->
  <!-- 엘앤에프 -55% → 275 -->
  <!-- LG화학 (배터리소재) -50% → 250 -->

  <!-- Row backgrounds -->
  <line x1="740" y1="160" x2="1140" y2="160" stroke="#334155" stroke-width="1"/>
  <line x1="740" y1="510" x2="1140" y2="510" stroke="#334155" stroke-width="1"/>

  <!-- BM (highlighted) -->
  <text x="730" y="200" fill="#ef4444" font-weight="700" font-size="13" text-anchor="end">에코프로비엠</text>
  <rect x="740" y="184" width="300" height="32" fill="#ef4444"/>
  <text x="1050" y="206" fill="#ef4444" font-size="14" font-weight="700">-60%</text>

  <!-- 엘앤에프 -->
  <text x="730" y="260" fill="#f1f5f9" font-size="13" text-anchor="end">엘앤에프</text>
  <rect x="740" y="244" width="275" height="32" fill="#f59e0b"/>
  <text x="1025" y="266" fill="#f59e0b" font-size="14" font-weight="700">-55%</text>

  <!-- 포스코퓨처엠 -->
  <text x="730" y="320" fill="#f1f5f9" font-size="13" text-anchor="end">포스코퓨처엠 (#84)</text>
  <rect x="740" y="304" width="250" height="32" fill="#f59e0b"/>
  <text x="1000" y="326" fill="#f59e0b" font-size="14" font-weight="700">-50%</text>

  <!-- LG화학 배터리소재 -->
  <text x="730" y="380" fill="#f1f5f9" font-size="13" text-anchor="end">LG화학 (배터리소재)</text>
  <rect x="740" y="364" width="250" height="32" fill="#f59e0b"/>
  <text x="1000" y="386" fill="#f59e0b" font-size="14" font-weight="700">-50%</text>

  <!-- average reference line -->
  <line x1="740" y1="430" x2="1015" y2="430" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="730" y="434" fill="#fbbf24" font-size="12" text-anchor="end">4 사 평균</text>
  <text x="1025" y="434" fill="#fbbf24" font-size="14" font-weight="700">-55%</text>

  <!-- x-axis ticks for right panel -->
  <g fill="#64748b" font-size="11" text-anchor="middle">
    <text x="740" y="450">0%</text>
    <text x="840" y="450">-20%</text>
    <text x="940" y="450">-40%</text>
    <text x="1040" y="450">-60%</text>
  </g>

  <!-- Insight box -->
  <rect x="640" y="465" width="500" height="44" fill="#1e293b" rx="4"/>
  <text x="890" y="485" fill="#f1f5f9" font-size="13" font-weight="600" text-anchor="middle">한 회사 실수가 아니라 산업 위치값 — 4 사가 같은 띠</text>
  <text x="890" y="502" fill="#94a3b8" font-size="11" text-anchor="middle">셀 BOM 40% · 메탈 페그 ASP · 셀 3 사 80%+ 의존</text>

  <!-- Bottom note -->
  <text x="600" y="555" fill="#fbbf24" font-size="13" font-weight="600" text-anchor="middle">가격 충격은 가치사슬 위에서 아래로만 흐른다 — 셀 적자, 양극재 더 깊은 적자</text>
  <text x="600" y="578" fill="#64748b" font-size="11" text-anchor="middle">출처: 각사 사업보고서 / CEO스코어데일리 양극재 4 사 비교 보도 / 2024 FY 연결</text>
</svg>
