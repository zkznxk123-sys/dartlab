<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>아모레퍼시픽 — 만드는 손은 멀쩡한데 파는 다리가 부러졌다</title>
  <desc>매출총이익률 73%는 9년 불변(만드는 손), 그러나 중국 채널이 무너지며 영업이익은 60% 감소(파는 다리). 발명은 안에서, 명운은 밖에서.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="58" fill="#f1f5f9" font-size="34" font-weight="700" text-anchor="middle">만드는 손은 멀쩡한데, 파는 다리가 부러졌다</text>
  <text x="600" y="92" fill="#64748b" font-size="18" text-anchor="middle">아모레퍼시픽(090430) — 제품의 힘은 9년째 그대로, 무너진 건 파는 길이었다</text>

  <!-- LEFT: 만드는 손 -->
  <rect x="70" y="130" width="480" height="420" rx="14" fill="#0f1f17" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="175" fill="#22c55e" font-size="24" font-weight="700" text-anchor="middle">① 만드는 손 — 멀쩡</text>
  <text x="100" y="228" fill="#f1f5f9" font-size="20">매출총이익률 73% (9년 내내 68~75%)</text>
  <text x="100" y="262" fill="#94a3b8" font-size="16">원가는 싸고 값은 비싼 브랜드의 힘</text>
  <text x="100" y="312" fill="#f1f5f9" font-size="20">세계 최초 한방(1966) · 쿠션(2008)</text>
  <text x="100" y="346" fill="#94a3b8" font-size="16">없던 물건을 처음 만들어 낸 발명의 기질</text>
  <text x="100" y="396" fill="#f1f5f9" font-size="20">빚 없는 재무 — 부채비율 26%</text>
  <text x="100" y="430" fill="#94a3b8" font-size="16">자본 3.9조 → 5.5조로 오히려 축적</text>
  <text x="100" y="492" fill="#22c55e" font-size="18" font-weight="700">제품도 현금도 체력도 무사했다</text>

  <!-- RIGHT: 파는 다리 -->
  <rect x="650" y="130" width="480" height="420" rx="14" fill="#1f1112" stroke="#ef4444" stroke-width="2"/>
  <text x="890" y="175" fill="#ef4444" font-size="24" font-weight="700" text-anchor="middle">② 파는 다리 — 부러짐</text>
  <text x="680" y="228" fill="#f1f5f9" font-size="20">채널 = 중국 따이공 · 면세점</text>
  <text x="680" y="262" fill="#94a3b8" font-size="16">면세 매출의 80%대를 보따리상이 운반</text>
  <text x="680" y="312" fill="#f1f5f9" font-size="20">설화수 중국 4,408억 → 962억</text>
  <text x="680" y="346" fill="#94a3b8" font-size="16">채널이 통째로 사라졌다 (외부 추정)</text>
  <text x="680" y="396" fill="#f1f5f9" font-size="20">CAPEX 1조862억 → 646억 (-94%)</text>
  <text x="680" y="430" fill="#94a3b8" font-size="16">닫힌 문 앞에 멈춰 선 9년의 투자</text>
  <text x="680" y="492" fill="#ef4444" font-size="18" font-weight="700">잘 만든 걸 팔 길이 무너졌다</text>

  <!-- BOTTOM verdict -->
  <rect x="70" y="582" width="1060" height="100" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="628" fill="#f1f5f9" font-size="22" font-weight="700">영업이익 8,481억<tspan fill="#64748b" font-weight="400" font-size="16"> (2016 정점)</tspan>  →  3,358억<tspan fill="#64748b" font-weight="400" font-size="16"> (2025)</tspan>  =  <tspan fill="#ef4444">-60%</tspan></text>
  <text x="100" y="662" fill="#fbbf24" font-size="18" font-weight="700">관통선 — 발명은 늘 안에서, 명운은 늘 밖에서 결정됐다</text>
</svg>
