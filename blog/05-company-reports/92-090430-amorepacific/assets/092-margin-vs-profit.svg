<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출총이익률은 평탄, 영업이익률만 무너진 9년</title>
  <desc>매출총이익률은 9년 내내 68~75%로 평탄한데 영업이익률만 15%에서 2.9%로 무너졌다가 7.9%로 회복. 두 선의 벌어진 간격이 '파는 비용'의 붕괴를 보여준다.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">만드는 손은 평평한데, 파는 다리만 꺾였다</text>
  <text x="600" y="88" fill="#64748b" font-size="17" text-anchor="middle">매출총이익률(제품의 힘)은 9년 그대로, 영업이익률(파는 단계)만 붕괴 — 두 선 사이가 곧 무너진 '파는 비용'</text>

  <!-- axes -->
  <line x1="140" y1="120" x2="140" y2="620" stroke="#334155" stroke-width="2"/>
  <line x1="140" y1="620" x2="1090" y2="620" stroke="#334155" stroke-width="2"/>
  <text x="120" y="160" fill="#475569" font-size="13" text-anchor="end">80%</text>
  <text x="120" y="285" fill="#475569" font-size="13" text-anchor="end">60%</text>
  <text x="120" y="410" fill="#475569" font-size="13" text-anchor="end">40%</text>
  <text x="120" y="535" fill="#475569" font-size="13" text-anchor="end">20%</text>
  <text x="120" y="624" fill="#475569" font-size="13" text-anchor="end">0%</text>

  <!-- GPM line (green, flat) -->
  <polyline fill="none" stroke="#22c55e" stroke-width="3.5" points="160,153 260,163 360,165 460,163 560,173 660,170 760,198 860,191 960,178 1060,168"/>
  <text x="170" y="138" fill="#22c55e" font-size="18" font-weight="700">매출총이익률 74.8% → 72.3% (평탄)</text>

  <!-- OPM line (red, collapse) -->
  <polyline fill="none" stroke="#ef4444" stroke-width="3.5" points="160,526 260,548 360,563 460,572 560,600 660,576 760,588 860,602 960,584 1060,571"/>
  <circle cx="160" cy="526" r="6" fill="#fbbf24"/>
  <text x="160" y="512" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">15.0%</text>
  <circle cx="860" cy="602" r="6" fill="#ef4444"/>
  <text x="860" y="592" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">2.9%</text>
  <circle cx="1060" cy="571" r="6" fill="#f59e0b"/>
  <text x="1060" y="560" fill="#f59e0b" font-size="16" font-weight="700" text-anchor="middle">7.9%</text>
  <text x="600" y="660" fill="#ef4444" font-size="17" text-anchor="middle">영업이익률 15.0%(2016) → 2.9%(2023 바닥) → 7.9%(2025)</text>

  <!-- year labels -->
  <g fill="#64748b" font-size="14" text-anchor="middle">
    <text x="160" y="642">2016</text><text x="260" y="642">2017</text><text x="360" y="642">2018</text>
    <text x="460" y="642">2019</text><text x="560" y="642">2020</text><text x="660" y="642">2021</text>
    <text x="760" y="642">2022</text><text x="860" y="642">2023</text><text x="960" y="642">2024</text><text x="1060" y="642">2025</text>
  </g>

  <!-- bottom verdict -->
  <rect x="140" y="690" width="950" height="100" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="165" y="730" fill="#f1f5f9" font-size="19" font-weight="700">원가를 빼고 남는 돈(제품의 힘)은 멀쩡한데, 팔고 남는 돈만 녹았다</text>
  <text x="165" y="763" fill="#94a3b8" font-size="16">무너진 지점은 매출총이익 아래 — 잘 만든 물건을 시장에 가져다 파는 구간이다</text>
  <text x="165" y="783" fill="#ef4444" font-size="15">같은 기간 설비투자(CAPEX)도 1조862억(2016) → 646억(2025), -94%로 동결</text>
</svg>
