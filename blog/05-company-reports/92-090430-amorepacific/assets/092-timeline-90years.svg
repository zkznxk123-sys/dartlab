<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>아모레퍼시픽 90년 타임라인 — 발명과 외생 변수</title>
  <desc>1932 동백기름부터 2024 북미 전환까지, 발명은 안에서 일어나고 폭발과 붕괴는 밖에서 온 90년의 타임라인.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">발명은 안에서, 폭발과 붕괴는 밖에서 — 90년</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">초록 = 회사가 안에서 만든 것 · 노랑/빨강 = 회사 밖에서 결정된 것</text>

  <!-- vertical spine -->
  <line x1="160" y1="130" x2="160" y2="660" stroke="#334155" stroke-width="3"/>

  <!-- nodes -->
  <circle cx="160" cy="160" r="9" fill="#22c55e"/>
  <text x="190" y="156" fill="#22c55e" font-size="20" font-weight="700">1932 · 어머니의 동백기름</text>
  <text x="190" y="182" fill="#94a3b8" font-size="15">윤독정이 개성에서 손으로 짠 머릿기름 — 회사의 진짜 시작</text>

  <circle cx="160" cy="226" r="9" fill="#22c55e"/>
  <text x="190" y="222" fill="#22c55e" font-size="20" font-weight="700">1966 · 세계 최초 한방(인삼크림)</text>
  <text x="190" y="248" fill="#94a3b8" font-size="15">"인삼 화장품을 만들어 봅시다" — 설화수의 효시. 그러나 시장은 없었다</text>

  <circle cx="160" cy="292" r="9" fill="#22c55e"/>
  <text x="190" y="288" fill="#22c55e" font-size="20" font-weight="700">2008 · 세계 최초 에어쿠션</text>
  <text x="190" y="314" fill="#94a3b8" font-size="15">또 하나의 세계 최초 — K뷰티 혁신의 상징</text>

  <circle cx="160" cy="358" r="9" fill="#fbbf24"/>
  <text x="190" y="354" fill="#fbbf24" font-size="20" font-weight="700">2014 · '별에서 온 그대' (밖에서 열린 문)</text>
  <text x="190" y="380" fill="#94a3b8" font-size="15">드라마 한 편이 48년 잠든 한방을 깨움 — 회사가 한 일은 없었다</text>

  <circle cx="160" cy="424" r="9" fill="#fbbf24"/>
  <text x="190" y="420" fill="#fbbf24" font-size="20" font-weight="700">2016 · 정점 (매출 5.65조 · 영업이익 8,481억)</text>
  <text x="190" y="446" fill="#94a3b8" font-size="15">서경배 한국 주식부호 1위 · 분기 영업이익률 22.75% 사상 최고</text>

  <circle cx="160" cy="490" r="9" fill="#ef4444"/>
  <text x="190" y="486" fill="#ef4444" font-size="20" font-weight="700">2016~20 · 사드·따이공규제·코로나 (밖에서 닫힌 문)</text>
  <text x="190" y="512" fill="#94a3b8" font-size="15">중국으로 가는 길과 그 길로 팔던 방식이 함께 무너짐</text>

  <circle cx="160" cy="556" r="9" fill="#ef4444"/>
  <text x="190" y="552" fill="#ef4444" font-size="20" font-weight="700">2023 · 바닥 (영업이익 1,082억)</text>
  <text x="190" y="578" fill="#94a3b8" font-size="15">정점의 13% — 매출은 -35%인데 영업이익은 -87%</text>

  <circle cx="160" cy="622" r="9" fill="#fbbf24"/>
  <text x="190" y="618" fill="#fbbf24" font-size="20" font-weight="700">2024~25 · 북미 전환 (또 새 문)</text>
  <text x="190" y="644" fill="#94a3b8" font-size="15">라네즈 미국 세포라 상위 · 코스알엑스 인수 → 영업이익 3,358억 회복(정점의 40%)</text>
</svg>
