<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2016년 — 같은 해, 두 길이 동시에 무너지다</title>
  <desc>2016년 사드로 중국 가는 길이 막히고, 따이공 의존이라는 파는 방식이 동시에 무너지며 분기 영업이익률이 22.75%에서 7.77%로 추락.</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">2016년 — 한 해에 두 길이 동시에 무너졌다</text>
  <text x="540" y="90" fill="#64748b" font-size="17" text-anchor="middle">충격이 손익에 박히는 데 걸린 시간은 1년이 아니라 한 분기였다</text>

  <!-- two doors -->
  <rect x="80" y="130" width="430" height="180" rx="12" fill="#1f1112" stroke="#ef4444" stroke-width="2"/>
  <text x="295" y="172" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">길 ① 중국으로 가는 길</text>
  <text x="110" y="212" fill="#f1f5f9" font-size="18">2016.7 사드 배치 → 한한령 보복</text>
  <text x="110" y="244" fill="#94a3b8" font-size="15">단체관광 차단 · 중국 내 한국 제품 소비 동결</text>
  <text x="110" y="284" fill="#94a3b8" font-size="15">→ 수요가 들어오던 통로가 막혔다</text>

  <rect x="570" y="130" width="430" height="180" rx="12" fill="#1f1112" stroke="#ef4444" stroke-width="2"/>
  <text x="785" y="172" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">길 ② 그 길로만 팔던 방식</text>
  <text x="600" y="212" fill="#f1f5f9" font-size="18">따이공·면세 의존 (면세 80%대)</text>
  <text x="600" y="244" fill="#94a3b8" font-size="15">자국 소비자도 직영 채널도 아닌 회색 중간상</text>
  <text x="600" y="284" fill="#94a3b8" font-size="15">→ 길이 막히자 팔 방법이 사라졌다</text>

  <!-- quarterly collapse -->
  <text x="540" y="372" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">같은 해 분기 영업이익률 — 사상 최고에서 3분의 1로</text>

  <!-- bars -->
  <g>
    <rect x="180" y="430" width="120" height="180" fill="#22c55e" opacity="0.85"/>
    <text x="240" y="420" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">22.75%</text>
    <text x="240" y="638" fill="#94a3b8" font-size="16" text-anchor="middle">2016 Q1</text>

    <rect x="380" y="478" width="120" height="132" fill="#84cc16" opacity="0.85"/>
    <text x="440" y="468" fill="#a3e635" font-size="22" font-weight="700" text-anchor="middle">16.67%</text>
    <text x="440" y="638" fill="#94a3b8" font-size="16" text-anchor="middle">2016 Q2</text>

    <rect x="580" y="515" width="120" height="95" fill="#f59e0b" opacity="0.85"/>
    <text x="640" y="505" fill="#f59e0b" font-size="22" font-weight="700" text-anchor="middle">11.96%</text>
    <text x="640" y="638" fill="#94a3b8" font-size="16" text-anchor="middle">2016 Q3</text>

    <rect x="780" y="548" width="120" height="62" fill="#ef4444" opacity="0.9"/>
    <text x="840" y="538" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">7.77%</text>
    <text x="840" y="638" fill="#94a3b8" font-size="16" text-anchor="middle">2016 Q4</text>
  </g>
  <text x="540" y="682" fill="#64748b" font-size="15" text-anchor="middle">사드 발표(7월)를 전후로 같은 회계연도 안에서 영업이익률이 22.75% → 7.77%</text>
</svg>
