<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익 -2.5조인데 현금은 +1.7조 — 감가상각의 비밀</title>
  <desc>2023년 영업이익은 -2.51조 사상 최악인데 영업활동현금흐름은 +1.68조였다. 손익을 갉은 감가상각은 현금이 나가지 않는 비용이기 때문. 병은 만들수록 현금이 새는 게 아니라 공장값을 못 건지는 것.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">영업이익 -2.5조인데, 현금은 +1.7조 들어왔다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">"원가에 판다"가 아니라 "비싸게 지은 공장값을 떨어진 가격으로 못 건진다"</text>

  <!-- 2023 대비: 영익 vs 영업CF -->
  <text x="600" y="140" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">2023년 — 같은 해, 정반대 부호</text>
  <rect x="180" y="170" width="360" height="200" rx="10" fill="#1a1012" stroke="#ef4444" stroke-width="2"/>
  <text x="360" y="212" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">영업이익</text>
  <text x="360" y="270" fill="#ef4444" font-size="44" font-weight="700" text-anchor="middle">-2.51조</text>
  <text x="360" y="320" fill="#94a3b8" font-size="15" text-anchor="middle">사상 최악 — 손익은 적자</text>
  <text x="360" y="348" fill="#94a3b8" font-size="15" text-anchor="middle">(감가상각이 갉아먹음)</text>
  <rect x="660" y="170" width="360" height="200" rx="10" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="840" y="212" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">영업활동현금흐름</text>
  <text x="840" y="270" fill="#22c55e" font-size="44" font-weight="700" text-anchor="middle">+1.68조</text>
  <text x="840" y="320" fill="#94a3b8" font-size="15" text-anchor="middle">현금은 오히려 들어옴</text>
  <text x="840" y="348" fill="#94a3b8" font-size="15" text-anchor="middle">(감가상각은 현금 안 나감)</text>

  <!-- 매출총이익률 line -->
  <text x="600" y="430" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">매출총이익률 — 가격이 떨어지자 고정비를 못 건진다</text>
  <line x1="150" y1="470" x2="150" y2="660" stroke="#334155" stroke-width="2"/>
  <line x1="150" y1="660" x2="1060" y2="660" stroke="#334155" stroke-width="2"/>
  <polyline fill="none" stroke="#fbbf24" stroke-width="3.5" points="200,520 320,560 440,610 560,560 680,490 800,640 920,655 1010,545"/>
  <circle cx="200" cy="520" r="5" fill="#22c55e"/><text x="200" y="508" fill="#22c55e" font-size="14" text-anchor="middle">19.3%</text>
  <circle cx="680" cy="490" r="5" fill="#22c55e"/><text x="680" y="478" fill="#22c55e" font-size="14" text-anchor="middle">17.8%</text>
  <circle cx="920" cy="655" r="5" fill="#ef4444"/><text x="920" y="645" fill="#ef4444" font-size="14" text-anchor="middle">1.6%</text>
  <circle cx="1010" cy="545" r="5" fill="#f59e0b"/><text x="1010" y="533" fill="#f59e0b" font-size="14" text-anchor="middle">13.1%</text>
  <g fill="#64748b" font-size="13" text-anchor="middle"><text x="200" y="682">2017</text><text x="440" y="682">2019</text><text x="680" y="682">2021</text><text x="920" y="682">2023</text><text x="1010" y="682">2025</text></g>

  <rect x="150" y="710" width="910" height="80" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="175" y="748" fill="#f1f5f9" font-size="18" font-weight="700">감가상각은 패널이 비싸든 싸든 똑같이 찍힌다 — 가격이 떨어지면 매출총이익률이 폭락</text>
  <text x="175" y="776" fill="#94a3b8" font-size="15">2018년 설비투자 7.94조 — 그때 지은 공장의 값이 지금도 매년 손익을 누른다</text>
</svg>
