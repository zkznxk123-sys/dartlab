<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>LG디스플레이 — 매출은 거대한데 값을 자기가 못 정하는 회사</title>
  <desc>매출은 9년 내내 21~30조로 안정적인데 영업이익은 +2.46조에서 -2.51조로 부호가 뒤집힌다. 가격을 회사가 아니라 중국·애플이 정하는 가격수용자.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">매출은 거대한데, 값을 자기가 못 정한다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">LG디스플레이(034220) — 파는 양은 9년째 그대로, 무너진 건 그 매출에서 남기는 돈</text>

  <!-- LEFT: 매출 안정 -->
  <rect x="70" y="130" width="500" height="300" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="172" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">매출 = 9년 내내 21~30조 (안정)</text>
  <g>
    <rect x="110" y="320" width="40" height="80" fill="#22c55e" opacity="0.7"/>
    <rect x="170" y="305" width="40" height="95" fill="#22c55e" opacity="0.7"/>
    <rect x="230" y="335" width="40" height="65" fill="#22c55e" opacity="0.7"/>
    <rect x="290" y="300" width="40" height="100" fill="#22c55e" opacity="0.7"/>
    <rect x="350" y="345" width="40" height="55" fill="#22c55e" opacity="0.7"/>
    <rect x="410" y="318" width="40" height="82" fill="#22c55e" opacity="0.7"/>
    <rect x="470" y="328" width="40" height="72" fill="#22c55e" opacity="0.7"/>
  </g>
  <text x="320" y="416" fill="#94a3b8" font-size="15" text-anchor="middle">파는 양은 멀쩡하다 — 안 팔려서 망한 게 아니다</text>

  <!-- RIGHT: 영익 롤러코스터 -->
  <rect x="630" y="130" width="500" height="300" rx="12" fill="#1a1012" stroke="#ef4444" stroke-width="2"/>
  <text x="880" y="172" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">영업이익 = +2.46조 ↔ -2.51조</text>
  <line x1="660" y1="290" x2="1100" y2="290" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <polyline fill="none" stroke="#fbbf24" stroke-width="3" points="670,250 730,210 790,285 850,330 910,225 970,360 1030,372 1090,255"/>
  <circle cx="730" cy="210" r="5" fill="#22c55e"/><text x="730" y="200" fill="#22c55e" font-size="13" text-anchor="middle">+2.46조</text>
  <circle cx="1030" cy="372" r="5" fill="#ef4444"/><text x="1030" y="392" fill="#ef4444" font-size="13" text-anchor="middle">-2.51조</text>
  <text x="880" y="416" fill="#94a3b8" font-size="15" text-anchor="middle">매출은 거의 그대로인데 이익만 부호가 뒤집힌다</text>

  <!-- BOTTOM verdict -->
  <rect x="70" y="470" width="1060" height="210" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="515" fill="#f1f5f9" font-size="21" font-weight="700">2023년: 21.3조를 팔아 매출총이익 3,452억 — 100원 팔아 1.6원</text>
  <text x="100" y="552" fill="#94a3b8" font-size="16">매출총이익률 19.3%(2017) → 1.6%(2023) → 13.1%(2025)</text>
  <text x="100" y="592" fill="#f1f5f9" font-size="18">가격은 중국 공급량과 애플이 정한다. 회사는 그 값을 받아들일 뿐.</text>
  <text x="100" y="624" fill="#94a3b8" font-size="16">다 지어놓은 공장의 감가상각(고정비)만 떠안는 가격수용자(price-taker)</text>
  <text x="100" y="660" fill="#fbbf24" font-size="17" font-weight="700">관통선 — 세계 1위가, 자기 흑자일지 적자일지를 스스로 못 정한다</text>
</svg>
