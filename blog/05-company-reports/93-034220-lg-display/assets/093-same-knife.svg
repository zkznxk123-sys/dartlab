<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>같은 칼 — 치킨게임으로 흥하고, 같은 치킨게임에 베이다</title>
  <desc>한국이 저가 물량공세(치킨게임)로 일본 샤프를 고사시켜 1위에 올랐고, 중국 BOE가 더 큰 규모로 똑같이 해서 LG디스플레이를 끌어내렸다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">같은 칼로 흥하고, 같은 칼에 베이다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">치킨게임 — 적자를 감수하고 물량을 쏟아부어 경쟁사를 먼저 쓰러뜨리는 전략</text>

  <!-- 윗줄: 한국이 일본을 -->
  <rect x="70" y="130" width="1060" height="240" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="172" fill="#22c55e" font-size="22" font-weight="700">2000년대 — 한국이 칼을 쥐다</text>
  <rect x="100" y="200" width="240" height="120" rx="8" fill="#11161f" stroke="#334155"/>
  <text x="220" y="245" fill="#f1f5f9" font-size="18" text-anchor="middle">한국 (LG·삼성)</text>
  <text x="220" y="278" fill="#94a3b8" font-size="14" text-anchor="middle">6~7세대 LCD</text>
  <text x="220" y="300" fill="#94a3b8" font-size="14" text-anchor="middle">저가 물량공세</text>
  <text x="430" y="265" fill="#fbbf24" font-size="40">→</text>
  <rect x="500" y="200" width="240" height="120" rx="8" fill="#1a1012" stroke="#ef4444"/>
  <text x="620" y="245" fill="#ef4444" font-size="18" text-anchor="middle">일본 샤프</text>
  <text x="620" y="278" fill="#94a3b8" font-size="14" text-anchor="middle">소모전에서 고사</text>
  <text x="620" y="300" fill="#94a3b8" font-size="14" text-anchor="middle">패권 상실</text>
  <text x="830" y="252" fill="#22c55e" font-size="20" font-weight="700">결과: 한국</text>
  <text x="830" y="282" fill="#22c55e" font-size="20" font-weight="700">세계 1위 등극</text>

  <!-- 아랫줄: 중국이 LG를 (거울) -->
  <rect x="70" y="400" width="1060" height="240" rx="12" fill="#1a1012" stroke="#ef4444" stroke-width="2"/>
  <text x="100" y="442" fill="#ef4444" font-size="22" font-weight="700">2020년대 — 같은 칼이 거울처럼 되돌아오다</text>
  <rect x="100" y="470" width="240" height="120" rx="8" fill="#11161f" stroke="#334155"/>
  <text x="220" y="515" fill="#f1f5f9" font-size="18" text-anchor="middle">중국 (BOE·CSOT)</text>
  <text x="220" y="548" fill="#94a3b8" font-size="14" text-anchor="middle">국가 보조 + 더 큰 라인</text>
  <text x="220" y="570" fill="#94a3b8" font-size="14" text-anchor="middle">더 큰 물량공세</text>
  <text x="430" y="535" fill="#fbbf24" font-size="40">→</text>
  <rect x="500" y="470" width="240" height="120" rx="8" fill="#1a1012" stroke="#ef4444"/>
  <text x="620" y="515" fill="#ef4444" font-size="18" text-anchor="middle">LG디스플레이</text>
  <text x="620" y="548" fill="#94a3b8" font-size="14" text-anchor="middle">LCD 가격 폭락·만성적자</text>
  <text x="620" y="570" fill="#94a3b8" font-size="14" text-anchor="middle">가격수용자로 전락</text>
  <text x="830" y="522" fill="#ef4444" font-size="20" font-weight="700">결과: 2021 점유율</text>
  <text x="830" y="552" fill="#ef4444" font-size="20" font-weight="700">중국 41.5% &gt; 한국 33.3%</text>
</svg>
