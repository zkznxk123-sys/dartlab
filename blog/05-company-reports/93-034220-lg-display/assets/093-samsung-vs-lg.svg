<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>같은 한국, 다른 좌표 — 삼성 82% vs LG 2%</title>
  <desc>대형 OLED TV는 LG가 세계 1등이지만, 돈이 되는 스마트폰 OLED는 삼성 82% vs LG 2%다. 같은 환경에서 삼성은 다른 좌표로 갈아타 살아남았다 — 외부 탓이 아니라 좌표 선택의 문제.</desc>
  <rect width="1200" height="820" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">같은 한국, 다른 좌표 — 그래서 외부 탓만은 아니다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">같은 중국 공급과잉 환경에서, 삼성은 다른 좌표로 갈아타 살아남았다</text>

  <!-- 대형 OLED TV -->
  <rect x="70" y="130" width="1060" height="200" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="172" fill="#22c55e" font-size="22" font-weight="700">대형 OLED TV 패널 — LG 세계 1등 (거의 유일 양산)</text>
  <rect x="100" y="200" width="700" height="50" rx="6" fill="#22c55e" opacity="0.8"/>
  <text x="120" y="234" fill="#0a0e1a" font-size="20" font-weight="700">LG디스플레이 — 세계 최초·세계 1등</text>
  <text x="100" y="300" fill="#94a3b8" font-size="16">그러나 대형 패널은 commodity 좌표 — 1등이어도 가격을 못 정한다 (마진을 못 지킴)</text>

  <!-- 스마트폰 OLED -->
  <rect x="70" y="360" width="1060" height="280" rx="12" fill="#1a1012" stroke="#ef4444" stroke-width="2"/>
  <text x="100" y="402" fill="#ef4444" font-size="22" font-weight="700">스마트폰 OLED — 돈이 되는 좌표인데 (2019)</text>
  <text x="120" y="452" fill="#f1f5f9" font-size="18">삼성디스플레이</text>
  <rect x="120" y="465" width="820" height="46" rx="6" fill="#3b82f6" opacity="0.85"/>
  <text x="140" y="497" fill="#f1f5f9" font-size="22" font-weight="700">82%</text>
  <text x="120" y="552" fill="#f1f5f9" font-size="18">LG디스플레이</text>
  <rect x="120" y="565" width="22" height="46" rx="6" fill="#ef4444" opacity="0.9"/>
  <text x="160" y="597" fill="#ef4444" font-size="22" font-weight="700">2%</text>
  <text x="100" y="628" fill="#94a3b8" font-size="15">대형 1등인데 돈 되는 중소형은 41배 열세 — 기술 1위가 가격결정력으로 자동 번역되지 않는다</text>

  <rect x="70" y="670" width="1060" height="110" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="712" fill="#f1f5f9" font-size="19" font-weight="700">삼성은 메모리·모바일 OLED로 갈아타 살았고, LG는 '대형 패널' 좌표에 공장을 박은 채 남았다</text>
  <text x="100" y="748" fill="#fbbf24" font-size="17" font-weight="700">무너진 진짜 원인은 환경이 아니라 — 어떤 좌표에 몸을 실었느냐였다</text>
  <text x="100" y="772" fill="#94a3b8" font-size="14">같은 국적 생존자(삼성)의 존재가 "중국에 밀려서 졌다"는 변명을 깬다</text>
</svg>
