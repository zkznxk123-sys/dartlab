<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>호텔신라 — 2026년에 봐야 할 다섯 가지</title>
  <desc>송객수수료율 방향, 영업이익률 한 자릿수 회복, 공항 구조조정 마무리, 채널 균형, 호텔 부문 비중 — 다음 1년 체크포인트.</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="540" y="58" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="92" fill="#64748b" font-size="17" text-anchor="middle">매출이 아니라 '매출의 이익을 누가 가져가느냐'가 핵심이다</text>

  <g>
    <rect x="90" y="125" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="171" r="20" fill="#fbbf24"/><text x="135" y="178" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="162" fill="#f1f5f9" font-size="21" font-weight="700">송객수수료율의 방향</text>
    <text x="180" y="194" fill="#94a3b8" font-size="16">따이공 커미션이 줄어드는가 — 면세업 이익의 1번 변수. 자제 움직임이 마진으로 돌아오는지</text>

    <rect x="90" y="229" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="275" r="20" fill="#fbbf24"/><text x="135" y="282" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="266" fill="#f1f5f9" font-size="21" font-weight="700">영업이익률의 한 자릿수 회복</text>
    <text x="180" y="298" fill="#94a3b8" font-size="16">0.3%(2025)가 2019년 5.2% 쪽으로 가는가 — 매출 규모가 아니라 매출 1원당 남는 돈</text>

    <rect x="90" y="333" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="379" r="20" fill="#fbbf24"/><text x="135" y="386" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="370" fill="#f1f5f9" font-size="21" font-weight="700">공항 면세 구조조정 마무리</text>
    <text x="180" y="402" fill="#94a3b8" font-size="16">인천 DF1 철수 같은 일회성 비용이 끝나고 영업이익과 당기순이익의 격차가 좁혀지는지</text>

    <rect x="90" y="437" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="483" r="20" fill="#fbbf24"/><text x="135" y="490" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="474" fill="#f1f5f9" font-size="21" font-weight="700">직접 맞는 손님의 비중</text>
    <text x="180" y="506" fill="#94a3b8" font-size="16">따이공 한 채널 의존을 줄이고 내국인·자체 채널을 키우는가 — '이익 귀속'을 되찾는 길</text>

    <rect x="90" y="541" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="587" r="20" fill="#fbbf24"/><text x="135" y="594" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="578" fill="#f1f5f9" font-size="21" font-weight="700">호텔&amp;레저 부문의 비중</text>
    <text x="180" y="610" fill="#94a3b8" font-size="16">환대 본업(신라호텔·신라스테이)이 면세의 변동성을 받쳐 주는가 — 한 몸 동거의 다른 다리</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">다음 시험은 매출을 늘리는 게 아니라, 그 매출의 이익을 자기 손으로 되찾는 것</text>
</svg>
