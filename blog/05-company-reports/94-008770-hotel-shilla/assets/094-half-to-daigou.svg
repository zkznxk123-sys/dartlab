<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>절반을 남에게 주는 가게 — 송객수수료의 구조</title>
  <desc>면세점은 손님을 데려오는 따이공·여행사에 정가의 40~50%를 송객수수료로 준다. 매출은 면세점 장부에 찍히지만 이익은 손님을 데려온 자에게 흘러간다.</desc>
  <rect width="1080" height="720" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">절반을 남에게 주는 가게</text>
  <text x="540" y="90" fill="#64748b" font-size="17" text-anchor="middle">손님을 '데려오는 자'가 매출의 절반 가까이를 가져간다</text>

  <!-- flow -->
  <rect x="80" y="140" width="260" height="120" rx="10" fill="#11161f" stroke="#3b82f6" stroke-width="2"/>
  <text x="210" y="185" fill="#3b82f6" font-size="20" font-weight="700" text-anchor="middle">따이공 (보따리상)</text>
  <text x="210" y="218" fill="#94a3b8" font-size="14" text-anchor="middle">중국 손님을 데려온다</text>
  <text x="210" y="240" fill="#94a3b8" font-size="14" text-anchor="middle">물건을 박스째 사 간다</text>
  <text x="430" y="208" fill="#fbbf24" font-size="36">→</text>
  <rect x="490" y="140" width="260" height="120" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="185" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">신라면세점</text>
  <text x="620" y="218" fill="#94a3b8" font-size="14" text-anchor="middle">매출은 여기 장부에 찍힌다</text>
  <text x="620" y="240" fill="#94a3b8" font-size="14" text-anchor="middle">세계 3위까지 갔다 (2018)</text>
  <text x="840" y="208" fill="#ef4444" font-size="36">↩</text>
  <text x="900" y="195" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">수수료</text>
  <text x="900" y="218" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">정가의</text>
  <text x="900" y="241" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">40~50%</text>

  <!-- 100원 막대 -->
  <text x="540" y="330" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">100원어치를 팔면 — 40~50원이 손님 데려온 자에게</text>
  <rect x="90" y="360" width="900" height="70" rx="8" fill="#1e293b"/>
  <rect x="90" y="360" width="450" height="70" fill="#475569"/>
  <text x="315" y="402" fill="#f1f5f9" font-size="18" text-anchor="middle" font-weight="700">상품 원가</text>
  <rect x="540" y="360" width="405" height="70" fill="#ef4444" opacity="0.85"/>
  <text x="742" y="395" fill="#f1f5f9" font-size="17" text-anchor="middle" font-weight="700">송객수수료 40~50원</text>
  <text x="742" y="418" fill="#f1f5f9" font-size="14" text-anchor="middle">2021년 면세 매출의 약 22.5%</text>
  <rect x="945" y="360" width="45" height="70" fill="#22c55e" opacity="0.7"/>

  <rect x="90" y="470" width="900" height="180" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="115" y="512" fill="#f1f5f9" font-size="19" font-weight="700">면세업 영업이익률은 잘 나와야 한 자릿수~20%</text>
  <text x="115" y="548" fill="#94a3b8" font-size="16">손님 데려오는 비용(수수료)이 그 마진을 넘으면 —</text>
  <text x="115" y="582" fill="#ef4444" font-size="19" font-weight="700">매출을 늘릴수록 이익이 줄어드는 구조가 된다</text>
  <text x="115" y="620" fill="#94a3b8" font-size="15">매출은 신라 장부에, 그 매출의 이익은 따이공·공항으로 — 빼앗긴 건 '이익의 귀속'</text>
  <text x="115" y="642" fill="#64748b" font-size="13">※ 22.5%는 2021년 특정 시점 외부 인용 — 회사가 비용 항목을 분기별로 공개하지 않아 추세는 단정 불가</text>
</svg>
