<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>호텔신라 — 손님이 줄수록 더 잘 벌게 된 호텔</title>
  <desc>손님 맞으려 지은 영빈관에서 시작한 회사가, 손님이 줄수록 이익이 나는 회사가 됐다. 매출은 장부에 남고 이익은 손님을 데려온 따이공·공항으로 떠난다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">손님이 줄수록 더 잘 벌게 된 호텔</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">호텔신라(008770) — 매출은 자기 장부에 남고, 이익은 손님과 함께 남의 손으로</text>

  <!-- 출생 -->
  <rect x="70" y="130" width="500" height="180" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="172" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">출생 (1967) — 환대</text>
  <text x="100" y="212" fill="#f1f5f9" font-size="18">국가가 외국 귀빈 맞으려 지은 영빈관</text>
  <text x="100" y="244" fill="#94a3b8" font-size="15">손님을 직접 맞이하려고 태어난 회사</text>
  <text x="100" y="284" fill="#94a3b8" font-size="15">1979 신라호텔 · 1986 호텔 안 면세 카운터 하나</text>

  <!-- 생존 -->
  <rect x="630" y="130" width="500" height="180" rx="12" fill="#1a1012" stroke="#ef4444" stroke-width="2"/>
  <text x="880" y="172" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">생존 (지금) — 중개</text>
  <text x="660" y="212" fill="#f1f5f9" font-size="18">손님을 '데려오는 자'에 의존</text>
  <text x="660" y="244" fill="#94a3b8" font-size="15">따이공(보따리상) + 공항이 사이에 선다</text>
  <text x="660" y="284" fill="#94a3b8" font-size="15">매출의 약 90%가 면세 — 호텔이 면세에 삼켜짐</text>

  <!-- 역설 -->
  <rect x="70" y="345" width="1060" height="150" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="388" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">2023년 한 분기 — 면세 매출 -30%인데 영업이익 +192%</text>
  <text x="600" y="426" fill="#f1f5f9" font-size="18" text-anchor="middle">장사가 안 됐는데 더 벌었다 — 그 매출이 이익을 깎고 있었다는 자백</text>
  <text x="600" y="462" fill="#94a3b8" font-size="16" text-anchor="middle">손님이 많을수록 가난해지고, 사라질수록 부유해지는 이상한 가게</text>

  <!-- 매출의 행방 -->
  <text x="600" y="540" fill="#f1f5f9" font-size="19" font-weight="700" text-anchor="middle">매출 100원의 행방</text>
  <rect x="150" y="560" width="900" height="56" rx="6" fill="#1e293b"/>
  <rect x="150" y="560" width="380" height="56" rx="6" fill="#475569"/>
  <text x="340" y="595" fill="#f1f5f9" font-size="17" text-anchor="middle" font-weight="700">상품 원가</text>
  <rect x="530" y="560" width="380" height="56" fill="#ef4444" opacity="0.85"/>
  <text x="720" y="588" fill="#f1f5f9" font-size="16" text-anchor="middle" font-weight="700">송객수수료(따이공) 40~50원</text>
  <text x="720" y="608" fill="#f1f5f9" font-size="13" text-anchor="middle">+ 공항 임대료(MAG)</text>
  <rect x="910" y="560" width="140" height="56" fill="#22c55e" opacity="0.7"/>
  <text x="980" y="588" fill="#0a0e1a" font-size="15" text-anchor="middle" font-weight="700">신라 몫</text>
  <text x="980" y="608" fill="#0a0e1a" font-size="13" text-anchor="middle">거의 0</text>
  <text x="600" y="660" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">관통선 — 빼앗긴 건 매출(양)도 단가도 아닌, 그 매출의 '이익 귀속'이다</text>
</svg>
