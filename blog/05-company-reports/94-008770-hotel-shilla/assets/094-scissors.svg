<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>숫자의 가위 — 매출은 돌아왔는데 이익은 안 돌아온다</title>
  <desc>매출은 코로나 저점에서 4조대로 회복했지만 영업이익은 2019년 정점 2,959억에서 2025년 135억으로 쪼그라들었다. 매출선과 이익선이 벌어지는 가위 모양.</desc>
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">숫자의 가위 — 매출은 돌아왔는데 이익은 안 왔다</text>
  <text x="600" y="88" fill="#64748b" font-size="17" text-anchor="middle">매출(양)은 2017 수준으로 복귀, 영업이익률은 정점의 1/17</text>

  <!-- 매출 영역 -->
  <text x="120" y="140" fill="#22c55e" font-size="18" font-weight="700">매출 (조원)</text>
  <line x1="120" y1="150" x2="120" y2="370" stroke="#334155" stroke-width="1.5"/>
  <polyline fill="none" stroke="#22c55e" stroke-width="3.5" points="160,224 260,213 360,187 460,150 560,243 660,221 760,180 860,229 960,215 1060,211"/>
  <circle cx="460" cy="150" r="5" fill="#22c55e"/><text x="460" y="138" fill="#22c55e" font-size="14" text-anchor="middle">5.72조(정점)</text>
  <circle cx="560" cy="243" r="5" fill="#f59e0b"/><text x="560" y="262" fill="#f59e0b" font-size="13" text-anchor="middle">3.19조(코로나)</text>
  <circle cx="1060" cy="211" r="5" fill="#22c55e"/><text x="1040" y="200" fill="#22c55e" font-size="13" text-anchor="middle">4.07조</text>

  <!-- 영업이익 영역 -->
  <text x="120" y="420" fill="#ef4444" font-size="18" font-weight="700">영업이익 (억원)</text>
  <line x1="120" y1="430" x2="120" y2="660" stroke="#334155" stroke-width="1.5"/>
  <line x1="120" y1="564" x2="1090" y2="564" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <text x="105" y="568" fill="#475569" font-size="12" text-anchor="end">0</text>
  <polyline fill="none" stroke="#ef4444" stroke-width="3.5" points="160,527 260,530 360,470 460,432 560,644 660,510 760,527 860,522 960,564 1060,556"/>
  <circle cx="460" cy="432" r="5" fill="#22c55e"/><text x="460" y="421" fill="#22c55e" font-size="13" text-anchor="middle">2,959억(정점)</text>
  <circle cx="560" cy="644" r="5" fill="#ef4444"/><text x="560" y="664" fill="#ef4444" font-size="13" text-anchor="middle">-1,853억</text>
  <circle cx="1060" cy="556" r="5" fill="#f59e0b"/><text x="1045" y="546" fill="#f59e0b" font-size="13" text-anchor="middle">135억</text>

  <!-- year labels -->
  <g fill="#64748b" font-size="13" text-anchor="middle">
    <text x="160" y="686">2016</text><text x="260" y="686">2017</text><text x="360" y="686">2018</text><text x="460" y="686">2019</text><text x="560" y="686">2020</text><text x="660" y="686">2021</text><text x="760" y="686">2022</text><text x="860" y="686">2023</text><text x="960" y="686">2024</text><text x="1060" y="686">2025</text>
  </g>

  <rect x="120" y="706" width="970" height="42" rx="8" fill="#11161f" stroke="#fbbf24" stroke-width="1"/>
  <text x="140" y="733" fill="#fbbf24" font-size="16" font-weight="700">영업이익률 2019 5.2% → 2025 0.3% (약 1/17) — 매출은 돌아왔는데 이익은 채널로 샜다</text>
</svg>
