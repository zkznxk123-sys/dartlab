<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>호텔신라 — 환대에서 중개로, 60년 타임라인</title>
  <desc>1967 국가 영빈관에서 시작해 면세가 호텔을 삼키고, 중국 붐과 따이공에 올라탔다가 사드·코로나로 흔들리고 2025년 공항 면세 자리를 포기하기까지.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">환대로 태어나 중개로 살아남은 60년</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">초록 = 환대(직접 맞는 손님) · 노랑 = 외부가 열어준 문 · 빨강 = 그 문이 닫힘</text>

  <line x1="160" y1="130" x2="160" y2="660" stroke="#334155" stroke-width="3"/>

  <circle cx="160" cy="158" r="9" fill="#22c55e"/>
  <text x="190" y="154" fill="#22c55e" font-size="19" font-weight="700">1967 · 국가가 손님 맞으려 영빈관을 짓다</text>
  <text x="190" y="180" fill="#94a3b8" font-size="14">외국 국빈 숙소 — 환대의 국가적 원형</text>

  <circle cx="160" cy="222" r="9" fill="#22c55e"/>
  <text x="190" y="218" fill="#22c55e" font-size="19" font-weight="700">1973~1979 · 삼성 인수 → 서울신라호텔</text>
  <text x="190" y="244" fill="#94a3b8" font-size="14">창업주 이병철 — 손님을 맞이하는 호텔 본업</text>

  <circle cx="160" cy="286" r="9" fill="#94a3b8"/>
  <text x="190" y="282" fill="#cbd5e1" font-size="19" font-weight="700">1986 · 호텔 안에 면세점 카운터 하나</text>
  <text x="190" y="308" fill="#94a3b8" font-size="14">환대 본업 곁의 작은 씨앗 · 1991 상장</text>

  <circle cx="160" cy="350" r="9" fill="#fbbf24"/>
  <text x="190" y="346" fill="#fbbf24" font-size="19" font-weight="700">2010~2018 · 중국이 문을 열다 (밖에서)</text>
  <text x="190" y="372" fill="#94a3b8" font-size="14">시내면세 중국인 15%→70% · 세계 3위($6.2bn) · 면세가 매출의 90% 차지</text>

  <circle cx="160" cy="414" r="9" fill="#fbbf24"/>
  <text x="190" y="410" fill="#fbbf24" font-size="19" font-weight="700">2017 · 사드의 역설 — 손님 끊겼는데 면세 사상최대</text>
  <text x="190" y="436" fill="#94a3b8" font-size="14">요우커(사람)를 따이공(중개)이 대체 · 더 위험한 모델로 전환</text>

  <circle cx="160" cy="478" r="9" fill="#ef4444"/>
  <text x="190" y="474" fill="#ef4444" font-size="19" font-weight="700">2020 · 코로나 — 20년 만의 첫 적자</text>
  <text x="190" y="500" fill="#94a3b8" font-size="14">영업손실 -1,853억 · 영업현금흐름마저 -517억</text>

  <circle cx="160" cy="542" r="9" fill="#ef4444"/>
  <text x="190" y="538" fill="#ef4444" font-size="19" font-weight="700">2021~ · 송객수수료 군비경쟁 (매출의 22.5%)</text>
  <text x="190" y="564" fill="#94a3b8" font-size="14">따이공에 정가 40~50% 커미션 — 매출 늘수록 이익 줄어드는 구조</text>

  <circle cx="160" cy="606" r="9" fill="#ef4444"/>
  <text x="190" y="602" fill="#ef4444" font-size="19" font-weight="700">2025 · 인천공항 보증금 1,900억 포기·철수</text>
  <text x="190" y="628" fill="#94a3b8" font-size="14">매출 자리를 돈 버리며 떠남 — 매출을 줄이는 게 생존이 된 회사</text>
  <text x="190" y="650" fill="#fbbf24" font-size="14" font-weight="700">매출은 4조로 돌아왔지만 영업이익은 정점의 1/17</text>
</svg>
