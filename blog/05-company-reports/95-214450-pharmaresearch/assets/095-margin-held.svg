<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>파마리서치 — 13배 크는 내내 마진을 안 내준 회사</title>
  <desc>미용 회사는 크면 마진을 잃는 게 법칙인데(휴메딕스 42→25, 메디톡스 50→7) 파마리서치는 13배 크는 내내 영업이익률 40%를 지켰다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">13배 컸는데, 마진은 안 깎였다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">파마리서치(214450) — 빨리 크려면 마진을 내주는 게 이 바닥의 법칙인데</text>

  <text x="600" y="140" fill="#94a3b8" font-size="18" text-anchor="middle">2017년엔 셋 다 영업이익률 37~50%로 비슷했다. 8년 뒤 —</text>

  <!-- 3 companies -->
  <g>
    <rect x="100" y="180" width="310" height="300" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
    <text x="255" y="222" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">파마리서치</text>
    <text x="255" y="300" fill="#22c55e" font-size="52" font-weight="700" text-anchor="middle">40%</text>
    <text x="255" y="332" fill="#94a3b8" font-size="15" text-anchor="middle">영업이익률 (2025)</text>
    <text x="255" y="392" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">매출 13.5배</text>
    <text x="255" y="420" fill="#94a3b8" font-size="14" text-anchor="middle">396억 → 5,363억</text>
    <text x="255" y="458" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">크면서 마진 사수</text>

    <rect x="445" y="180" width="310" height="300" rx="14" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
    <text x="600" y="222" fill="#f59e0b" font-size="22" font-weight="700" text-anchor="middle">휴메딕스</text>
    <text x="600" y="300" fill="#f59e0b" font-size="52" font-weight="700" text-anchor="middle">25%</text>
    <text x="600" y="332" fill="#94a3b8" font-size="15" text-anchor="middle">42% → 25% (2023)</text>
    <text x="600" y="392" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">매출 5.4배</text>
    <text x="600" y="420" fill="#94a3b8" font-size="14" text-anchor="middle">280억 → 1,523억</text>
    <text x="600" y="458" fill="#f59e0b" font-size="16" font-weight="700" text-anchor="middle">크면서 마진 절반</text>

    <rect x="790" y="180" width="310" height="300" rx="14" fill="#1a1012" stroke="#ef4444" stroke-width="2"/>
    <text x="945" y="222" fill="#ef4444" font-size="22" font-weight="700" text-anchor="middle">메디톡스</text>
    <text x="945" y="300" fill="#ef4444" font-size="52" font-weight="700" text-anchor="middle">7%</text>
    <text x="945" y="332" fill="#94a3b8" font-size="15" text-anchor="middle">50% → 7% (2025)</text>
    <text x="945" y="392" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">매출 1.4배</text>
    <text x="945" y="420" fill="#94a3b8" font-size="14" text-anchor="middle">1,812억 → 2,473억</text>
    <text x="945" y="458" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">못 크고 마진 붕괴</text>
  </g>

  <rect x="100" y="510" width="1000" height="170" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="130" y="552" fill="#f1f5f9" font-size="20" font-weight="700">관통선 — 미용 회사는 크면 마진을 잃는데, 왜 이 회사만 13배 크면서 안 잃었나</text>
  <text x="130" y="590" fill="#94a3b8" font-size="16">비결: 연어에서 국산화한 한 분자(PDRN)를 미용(리쥬란)에서 정형(콘쥬란)으로 갈아끼움</text>
  <text x="130" y="622" fill="#94a3b8" font-size="16">받을 돈(매출채권)조차 매출의 38% → 8.3%로 줄이며 컸다</text>
  <text x="130" y="658" fill="#fbbf24" font-size="15">단, 공짜는 아니었다 — 재고는 매출(13.6배)보다 빠른 16배로 늘었다</text>
</svg>
