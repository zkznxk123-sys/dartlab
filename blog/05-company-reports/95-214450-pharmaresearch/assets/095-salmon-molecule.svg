<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>같은 분자, 다른 진료실 — 연어 PDRN 갈아끼우기</title>
  <desc>연어 정소에서 국산화한 한 분자(PDRN)를 미용(리쥬란)에서 정형(콘쥬란)으로 갈아끼우며, 한 시장이 가격경쟁에 들어가기 전에 인접 진료실로 옮긴 구조.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">같은 분자, 다른 진료실</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">제품을 늘린 게 아니라, 한 소재가 가지를 쳤다</text>

  <!-- source -->
  <rect x="450" y="130" width="300" height="120" rx="12" fill="#11161f" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="172" fill="#3b82f6" font-size="20" font-weight="700" text-anchor="middle">연어 정소 → PDRN/PN</text>
  <text x="600" y="205" fill="#94a3b8" font-size="14" text-anchor="middle">2008 KIST와 국산화 착수</text>
  <text x="600" y="228" fill="#94a3b8" font-size="14" text-anchor="middle">빌리지 않고 직접 쥔 한 분자</text>

  <!-- branches -->
  <line x1="540" y1="250" x2="320" y2="330" stroke="#475569" stroke-width="2"/>
  <line x1="660" y1="250" x2="880" y2="330" stroke="#475569" stroke-width="2"/>

  <rect x="100" y="335" width="440" height="180" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="378" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">미용 — 리쥬란 (2014)</text>
  <text x="130" y="418" fill="#f1f5f9" font-size="17">피부에 주사하는 스킨부스터</text>
  <text x="130" y="448" fill="#94a3b8" font-size="15">국내 스킨부스터의 대표 브랜드로 성장</text>
  <text x="130" y="486" fill="#94a3b8" font-size="15">진료실: 피부과·성형외과</text>

  <rect x="660" y="335" width="440" height="180" rx="12" fill="#0f141f" stroke="#3b82f6" stroke-width="2"/>
  <text x="880" y="378" fill="#60a5fa" font-size="22" font-weight="700" text-anchor="middle">정형 — 콘쥬란 (2017)</text>
  <text x="690" y="418" fill="#f1f5f9" font-size="17">무릎 관절강에 주사하는 골관절 치료</text>
  <text x="690" y="448" fill="#94a3b8" font-size="15">2019 신의료기술 인정</text>
  <text x="690" y="486" fill="#94a3b8" font-size="15">진료실: 정형외과</text>

  <rect x="100" y="550" width="1000" height="130" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="130" y="592" fill="#f1f5f9" font-size="19" font-weight="700">한 시장이 가격경쟁에 들어가기 전에, 인접한 진료실로 매출 무게중심을 옮긴다</text>
  <text x="130" y="628" fill="#94a3b8" font-size="16">같은 공장·같은 원료·다른 진료실 — 단일 제품 회사처럼 "가격을 깎아 점유율을 사는" 압력에 덜 노출</text>
  <text x="130" y="662" fill="#fbbf24" font-size="15">※ 이 적층↔마진 방어의 연결은 가설 — 재무제표는 "원가가 낮다"까지만 보여준다</text>
</svg>
