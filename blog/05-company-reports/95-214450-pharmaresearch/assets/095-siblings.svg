<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>형제 3사 영업이익률 — 2017에서 최근까지</title>
  <desc>2017년 셋 다 영업이익률 37~50%로 비슷했으나, 휴메딕스는 25%, 메디톡스는 7%로 내려가고 파마리서치만 40%로 올라갔다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">같은 출발선, 8년 뒤 갈라진 운명</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">영업이익률 — 2017년엔 셋 다 37~50%로 비슷했다</text>

  <!-- axes -->
  <text x="320" y="640" fill="#94a3b8" font-size="18" text-anchor="middle" font-weight="700">2017</text>
  <text x="880" y="640" fill="#94a3b8" font-size="18" text-anchor="middle" font-weight="700">최근</text>
  <line x1="320" y1="170" x2="320" y2="600" stroke="#334155" stroke-width="1.5"/>
  <line x1="880" y1="170" x2="880" y2="600" stroke="#334155" stroke-width="1.5"/>

  <!-- 파마 (green, flat high) -->
  <polyline fill="none" stroke="#22c55e" stroke-width="4" points="320,314 880,295"/>
  <circle cx="320" cy="314" r="7" fill="#22c55e"/><circle cx="880" cy="295" r="7" fill="#22c55e"/>
  <text x="300" y="310" fill="#22c55e" font-size="18" font-weight="700" text-anchor="end">37%</text>
  <text x="900" y="290" fill="#22c55e" font-size="20" font-weight="700">40% · 파마리서치</text>
  <text x="900" y="314" fill="#64748b" font-size="14">매출 13.5배</text>

  <!-- 휴메 (amber, down) -->
  <polyline fill="none" stroke="#f59e0b" stroke-width="4" points="320,275 880,413"/>
  <circle cx="320" cy="275" r="7" fill="#f59e0b"/><circle cx="880" cy="413" r="7" fill="#f59e0b"/>
  <text x="300" y="271" fill="#f59e0b" font-size="18" font-weight="700" text-anchor="end">42%</text>
  <text x="900" y="408" fill="#f59e0b" font-size="20" font-weight="700">25% · 휴메딕스</text>
  <text x="900" y="432" fill="#64748b" font-size="14">매출 5.4배 (2023 최신)</text>

  <!-- 메디 (red, steep down) -->
  <polyline fill="none" stroke="#ef4444" stroke-width="4" points="320,220 880,547"/>
  <circle cx="320" cy="220" r="7" fill="#ef4444"/><circle cx="880" cy="547" r="7" fill="#ef4444"/>
  <text x="300" y="216" fill="#ef4444" font-size="18" font-weight="700" text-anchor="end">50%</text>
  <text x="900" y="542" fill="#ef4444" font-size="20" font-weight="700">7% · 메디톡스</text>
  <text x="900" y="566" fill="#64748b" font-size="14">매출 1.4배 (소송 요인 큼)</text>

  <rect x="120" y="660" width="960" height="44" rx="8" fill="#11161f" stroke="#fbbf24" stroke-width="1"/>
  <text x="140" y="688" fill="#fbbf24" font-size="16" font-weight="700">빨리 크려면 마진을 내주는 게 법칙 — 13배 크면서 마진을 끌어올린 건 파마리서치 하나뿐이다</text>
</svg>
