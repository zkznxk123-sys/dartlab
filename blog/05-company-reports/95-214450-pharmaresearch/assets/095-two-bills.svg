<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>성장의 청구서 — 안 날아온 것과 날아온 것</title>
  <desc>매출채권 비율은 38%에서 8.3%로 줄어 안 날아왔지만, 재고는 51억에서 827억으로 16배 늘어 날아왔다. 성장 비용을 통째로 면제받은 건 아니다.</desc>
  <rect width="1200" height="760" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">성장의 청구서 — 반쪽만 면제됐다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">빨리 크는 회사는 보통 두 청구서를 받는다 — 받을 돈(매출채권)과 쌓을 물건(재고)</text>

  <!-- 안 날아온: 매출채권 -->
  <rect x="80" y="130" width="500" height="540" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="330" y="174" fill="#22c55e" font-size="23" font-weight="700" text-anchor="middle">안 날아온 청구서</text>
  <text x="330" y="204" fill="#94a3b8" font-size="16" text-anchor="middle">받을 돈 (매출채권 ÷ 매출)</text>
  <text x="160" y="300" fill="#94a3b8" font-size="18">2017</text>
  <rect x="160" y="320" width="340" height="50" rx="6" fill="#ef4444" opacity="0.6"/>
  <text x="180" y="354" fill="#f1f5f9" font-size="22" font-weight="700">38%</text>
  <text x="160" y="440" fill="#94a3b8" font-size="18">2025</text>
  <rect x="160" y="460" width="74" height="50" rx="6" fill="#22c55e" opacity="0.85"/>
  <text x="250" y="494" fill="#22c55e" font-size="22" font-weight="700">8.3%</text>
  <text x="330" y="600" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">받을 돈을 늘리지 않으며 컸다</text>
  <text x="330" y="634" fill="#94a3b8" font-size="14" text-anchor="middle">외상으로 매출을 부풀리지 않았다 (관찰)</text>

  <!-- 날아온: 재고 -->
  <rect x="620" y="130" width="500" height="540" rx="14" fill="#1a1012" stroke="#ef4444" stroke-width="2"/>
  <text x="870" y="174" fill="#ef4444" font-size="23" font-weight="700" text-anchor="middle">날아온 청구서</text>
  <text x="870" y="204" fill="#94a3b8" font-size="16" text-anchor="middle">쌓을 물건 (재고자산)</text>
  <text x="700" y="300" fill="#94a3b8" font-size="18">2017</text>
  <rect x="700" y="320" width="30" height="50" rx="6" fill="#475569"/>
  <text x="740" y="354" fill="#94a3b8" font-size="20" font-weight="700">51억</text>
  <text x="700" y="440" fill="#94a3b8" font-size="18">2025</text>
  <rect x="700" y="460" width="360" height="50" rx="6" fill="#ef4444" opacity="0.85"/>
  <text x="720" y="494" fill="#f1f5f9" font-size="22" font-weight="700">827억</text>
  <text x="870" y="600" fill="#ef4444" font-size="18" font-weight="700" text-anchor="middle">16배 — 매출(13.6배)보다 빠르다</text>
  <text x="870" y="634" fill="#94a3b8" font-size="14" text-anchor="middle">만들 물건은 미리 쌓으며 컸다</text>

  <text x="600" y="712" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">정확히는 — "받을 돈은 늦추지 않으면서, 만들 물건은 미리 쌓으며 컸다"</text>
  <text x="600" y="742" fill="#64748b" font-size="14" text-anchor="middle">"성장 비용을 통째로 면제받았다"는 과장이다</text>
</svg>
