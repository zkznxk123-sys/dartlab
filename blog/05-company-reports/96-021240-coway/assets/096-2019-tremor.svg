<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>2019년 분기 영업이익 — 단 한 분기의 떨림</title>
  <desc>2019년 1~3분기는 1,350억대로 평소와 같은데 4분기만 446억으로 약 1/3로 꺼졌다. 주인이 두 번 바뀐 그 분기.</desc>
  <rect width="1080" height="680" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">연간으로 뭉개면 사라지는, 한 분기의 떨림</text>
  <text x="540" y="90" fill="#64748b" font-size="17" text-anchor="middle">2019년 분기 영업이익 — 주인이 가장 어지럽게 바뀌던 해</text>

  <line x1="120" y1="150" x2="120" y2="540" stroke="#334155" stroke-width="2"/>
  <line x1="120" y1="540" x2="980" y2="540" stroke="#334155" stroke-width="2"/>

  <rect x="180" y="190" width="140" height="350" fill="#22c55e" opacity="0.8"/>
  <text x="250" y="178" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">1,352</text>
  <text x="250" y="566" fill="#94a3b8" font-size="16" text-anchor="middle">2019 Q1</text>

  <rect x="360" y="183" width="140" height="357" fill="#22c55e" opacity="0.8"/>
  <text x="430" y="171" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">1,382</text>
  <text x="430" y="566" fill="#94a3b8" font-size="16" text-anchor="middle">2019 Q2</text>

  <rect x="540" y="177" width="140" height="363" fill="#22c55e" opacity="0.8"/>
  <text x="610" y="165" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">1,403</text>
  <text x="610" y="566" fill="#94a3b8" font-size="16" text-anchor="middle">2019 Q3</text>

  <rect x="720" y="425" width="140" height="115" fill="#ef4444" opacity="0.9"/>
  <text x="790" y="413" fill="#ef4444" font-size="26" font-weight="700" text-anchor="middle">446</text>
  <text x="790" y="566" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">2019 Q4</text>

  <text x="790" y="455" fill="#0a0e1a" font-size="13" text-anchor="middle" font-weight="700">1/3</text>

  <rect x="120" y="600" width="860" height="60" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="145" y="628" fill="#f1f5f9" font-size="17" font-weight="700">웅진 재인수(3월)·넷마블 매각결정(12월)이 겹친 그 분기, 영업이익이 1/3로 꺼졌다</text>
  <text x="145" y="650" fill="#94a3b8" font-size="14">연간으로 합산하면 이 떨림은 거의 사라진다 — "흔적 0"이 아니라 "뭉개면 사라지는 흔적 1"</text>
</svg>
