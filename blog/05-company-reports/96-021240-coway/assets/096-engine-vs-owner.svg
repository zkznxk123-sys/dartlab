<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>소유권과 현금 엔진이 갈라선 자리</title>
  <desc>소유권은 자본시장에서 세 번 거래됐지만 현금 엔진은 코디·렌탈 약정에 묶여 주인을 인식하지 못했다. 호텔신라(이익 귀속 상실)와 다른 종류의 분리.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">소유권과 현금이 갈라선 자리</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">같은 회사의 두 층이 서로를 거의 인식하지 못했다</text>

  <!-- 소유권 층 -->
  <rect x="70" y="130" width="500" height="320" rx="14" fill="#1a1012" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="174" fill="#ef4444" font-size="23" font-weight="700" text-anchor="middle">위층 — 소유권 (주식)</text>
  <text x="100" y="222" fill="#f1f5f9" font-size="18">웅진 → MBK(2013) → 웅진(2019.3)</text>
  <text x="100" y="252" fill="#f1f5f9" font-size="18">→ 넷마블(2019.12)</text>
  <text x="100" y="300" fill="#94a3b8" font-size="16">자본시장에서 9년간 3번 손바뀜</text>
  <text x="100" y="332" fill="#94a3b8" font-size="16">회사를 '사고파는 자산'으로 봄</text>
  <text x="320" y="400" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">격변</text>

  <!-- 현금엔진 층 -->
  <rect x="630" y="130" width="500" height="320" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="174" fill="#22c55e" font-size="23" font-weight="700" text-anchor="middle">아래층 — 현금 엔진 (약정)</text>
  <text x="660" y="222" fill="#f1f5f9" font-size="18">렌탈 약정 수백만 건 + 코디 방문관리</text>
  <text x="660" y="270" fill="#94a3b8" font-size="16">매달 자동으로 들어오는 사용료</text>
  <text x="660" y="302" fill="#94a3b8" font-size="16">주인이 바뀌어도 코디도 렌탈료도 그대로</text>
  <text x="660" y="334" fill="#94a3b8" font-size="16">현금은 '주식'이 아니라 '계약'에 묶임</text>
  <text x="880" y="400" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">미동 없음</text>

  <!-- 대조 -->
  <rect x="70" y="480" width="1060" height="200" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="522" fill="#fbbf24" font-size="20" font-weight="700">호텔신라와 비교하면 — 정반대 종류의 분리</text>
  <text x="100" y="562" fill="#94a3b8" font-size="17">· 호텔신라: 매출은 장부에 남는데 <tspan fill="#ef4444">이익</tspan>이 따이공·공항으로 새 나감 = 이익의 귀속 상실</text>
  <text x="100" y="598" fill="#94a3b8" font-size="17">· 코웨이: 이익은 멀쩡히 남는데 <tspan fill="#ef4444">회사 자체</tspan>가 반복 거래됐는데도 곡선에 안 비침 = 소유권이 겉돎</text>
  <text x="100" y="640" fill="#f1f5f9" font-size="18" font-weight="700">한쪽은 이익이 새 나갔고, 다른 쪽은 소유권이 겉돌았다</text>
  <text x="100" y="668" fill="#64748b" font-size="14">※ 인과가 아니라 곡선의 침묵이 보여주는 정황</text>
</svg>
