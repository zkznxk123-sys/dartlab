<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>코웨이 — 주인 셋이 바뀌는데 미동 없는 영업이익 곡선</title>
  <desc>9년간 소유권이 세 번 거래됐는데 연간 영업이익 곡선은 우상향을 거의 흐트러뜨리지 않았다. 2019년 한 해만 살짝 들어갔다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">주인 셋이 바뀌는데, 곡선은 조용하다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">코웨이(021240) 연간 영업이익 — 매각 사건을 핀으로 꽂아도 거의 미동 없음</text>

  <line x1="140" y1="160" x2="140" y2="620" stroke="#334155" stroke-width="1.5"/>
  <line x1="140" y1="620" x2="1080" y2="620" stroke="#334155" stroke-width="1.5"/>
  <polyline fill="none" stroke="#22c55e" stroke-width="4" points="140,462 240,399 340,377 440,406 540,337 640,321 740,304 840,279 940,249 1040,210"/>
  <circle cx="140" cy="462" r="5" fill="#22c55e"/><text x="140" y="448" fill="#94a3b8" font-size="13" text-anchor="middle">3,388</text>
  <circle cx="440" cy="406" r="7" fill="#f59e0b"/><text x="440" y="392" fill="#f59e0b" font-size="13" text-anchor="middle">4,583</text>
  <circle cx="1040" cy="210" r="5" fill="#22c55e"/><text x="1040" y="196" fill="#22c55e" font-size="13" text-anchor="middle">8,787</text>

  <!-- ownership pins -->
  <line x1="440" y1="160" x2="440" y2="406" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="440" y="150" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">2019: 웅진 재인수(3월)</text>
  <text x="440" y="172" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">→ 넷마블 매각(12월)</text>
  <text x="180" y="200" fill="#94a3b8" font-size="14">※ 2013 MBK 매각(약 1.09조)은 차트 시작 이전</text>

  <g fill="#64748b" font-size="12" text-anchor="middle">
    <text x="140" y="642">2016</text><text x="340" y="642">2018</text><text x="440" y="642">2019</text><text x="540" y="642">2020</text><text x="740" y="642">2022</text><text x="1040" y="642">2025</text>
  </g>

  <rect x="140" y="664" width="940" height="44" rx="8" fill="#11161f" stroke="#fbbf24" stroke-width="1"/>
  <text x="160" y="692" fill="#fbbf24" font-size="16" font-weight="700">소유권은 자본시장에서 세 번 거래됐지만, 영업이익 곡선엔 그 매매가 거의 안 비쳤다</text>
</svg>
