<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>코웨이 소유권 3번의 손바뀜</title>
  <desc>웅진에서 사모펀드 MBK로(2013), 다시 웅진으로(2019.3), 그리고 게임회사 넷마블로(2019.12). 9년간 주인이 세 번 바뀌었다.</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">9년간 주인이 세 번 바뀌었다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">발명한 쪽(웅진)은 두 번 놓쳤고, 과실은 사모펀드와 새 주인에게로</text>

  <line x1="120" y1="320" x2="1080" y2="320" stroke="#334155" stroke-width="3"/>

  <circle cx="180" cy="320" r="12" fill="#94a3b8"/>
  <text x="180" y="250" fill="#cbd5e1" font-size="20" font-weight="700" text-anchor="middle">웅진</text>
  <text x="180" y="278" fill="#94a3b8" font-size="14" text-anchor="middle">렌탈 모델 발명·성장</text>
  <text x="180" y="365" fill="#64748b" font-size="14" text-anchor="middle">~2012</text>

  <text x="350" y="312" fill="#ef4444" font-size="30">→</text>
  <circle cx="470" cy="320" r="12" fill="#ef4444"/>
  <text x="470" y="250" fill="#ef4444" font-size="20" font-weight="700" text-anchor="middle">MBK파트너스</text>
  <text x="470" y="278" fill="#94a3b8" font-size="14" text-anchor="middle">사모펀드 · 약 1.09조</text>
  <text x="470" y="365" fill="#64748b" font-size="14" text-anchor="middle">2013 (웅진 위기로 매각)</text>

  <text x="630" y="312" fill="#f59e0b" font-size="30">→</text>
  <circle cx="730" cy="320" r="12" fill="#f59e0b"/>
  <text x="730" y="250" fill="#f59e0b" font-size="20" font-weight="700" text-anchor="middle">웅진 (재인수)</text>
  <text x="730" y="278" fill="#94a3b8" font-size="14" text-anchor="middle">되샀으나 빚 못 견딤</text>
  <text x="730" y="365" fill="#64748b" font-size="14" text-anchor="middle">2019.3</text>

  <text x="850" y="312" fill="#3b82f6" font-size="30">→</text>
  <circle cx="960" cy="320" r="12" fill="#3b82f6"/>
  <text x="960" y="250" fill="#60a5fa" font-size="20" font-weight="700" text-anchor="middle">넷마블</text>
  <text x="960" y="278" fill="#94a3b8" font-size="14" text-anchor="middle">게임회사가 인수</text>
  <text x="960" y="365" fill="#64748b" font-size="14" text-anchor="middle">2019.12 계약 (이듬해 완료)</text>

  <rect x="120" y="430" width="960" height="150" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="150" y="472" fill="#f1f5f9" font-size="19" font-weight="700">사모펀드 → 옛 모회사 → 게임회사. 9개월 새(2019.3→12) 두 번 손바뀜</text>
  <text x="150" y="508" fill="#94a3b8" font-size="16">그런데 정수기를 빌려 쓰는 사용자는 아무 변화도 느끼지 못했다 — 코디도, 렌탈료도 그대로</text>
  <text x="150" y="544" fill="#fbbf24" font-size="16" font-weight="700">주인은 주식에 묶였고, 돈은 매달 우리 집 문을 두드린 코디에게 묶여 있었다</text>
</svg>
