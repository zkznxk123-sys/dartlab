<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>21.7%라는 이상 신호 — SaaS 전부터 두꺼웠다</title>
  <desc>더존의 영업이익률은 클라우드 구독 전환 이전인 2016년에 이미 21.7%였다. 마진의 뿌리는 SaaS가 아니라 의무 단말 락인이다.</desc>
  <rect width="1200" height="700" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">마진은 SaaS가 만든 게 아니다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">영업이익률 — 클라우드 구독 전환 이전인 2016년에 이미 21.7%</text>

  <line x1="120" y1="150" x2="120" y2="560" stroke="#334155" stroke-width="1.5"/>
  <line x1="120" y1="560" x2="1100" y2="560" stroke="#334155" stroke-width="1.5"/>
  <text x="105" y="200" fill="#475569" font-size="13" text-anchor="end">30%</text>
  <text x="105" y="370" fill="#475569" font-size="13" text-anchor="end">15%</text>
  <text x="105" y="560" fill="#475569" font-size="13" text-anchor="end">0%</text>

  <!-- OPM line: 2016-2025, y=560-(opm/30)*410 -->
  <polyline fill="none" stroke="#fbbf24" stroke-width="3.5" points="160,263 264,217 368,235 472,213 576,218 680,255 784,355 888,293 992,261 1096,169"/>
  <circle cx="160" cy="263" r="7" fill="#22c55e"/><text x="160" y="248" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">21.7%</text>
  <text x="160" y="585" fill="#22c55e" font-size="13" text-anchor="middle">2016</text>
  <text x="160" y="603" fill="#64748b" font-size="11" text-anchor="middle">SaaS 전</text>
  <circle cx="784" cy="355" r="6" fill="#ef4444"/><text x="784" y="378" fill="#ef4444" font-size="14" text-anchor="middle">15.0%</text>
  <text x="784" y="585" fill="#64748b" font-size="13" text-anchor="middle">2022</text>
  <circle cx="1096" cy="169" r="7" fill="#22c55e"/><text x="1096" y="154" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">28.6%</text>
  <text x="1096" y="585" fill="#22c55e" font-size="13" text-anchor="middle">2025</text>

  <rect x="120" y="620" width="980" height="60" rx="10" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="145" y="648" fill="#f1f5f9" font-size="17" font-weight="700">"SaaS로 바꿔서 마진이 좋아졌다"는 서사를, 회사 자신의 시작점 숫자(2016 21.7%)가 반증한다</text>
  <text x="145" y="670" fill="#94a3b8" font-size="14">마진의 뿌리 = SaaS가 아니라 갈아타기 어려운 의무 단말 락인 · ※2025 28.6%는 연간(4분기 36.3%와 구분)</text>
</svg>
