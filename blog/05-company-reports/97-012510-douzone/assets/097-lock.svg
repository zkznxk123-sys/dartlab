<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 700" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>회계기간이라는 자물쇠 — 차원이 다른 전환비용</title>
  <desc>일반 SW의 전환비용은 귀찮음이지만, 회계 단말의 전환비용은 법적 신고의 단절 위험이다. 중견·중소 ERP 80%대 점유가 이중 락인을 만든다.</desc>
  <rect width="1080" height="700" fill="#0a0e1a"/>
  <text x="540" y="56" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">회계기간이라는 자물쇠</text>
  <text x="540" y="90" fill="#64748b" font-size="17" text-anchor="middle">왜 한 번 깔면 못 갈아타나 — 차원이 다른 전환비용</text>

  <rect x="70" y="130" width="450" height="230" rx="12" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
  <text x="295" y="174" fill="#f59e0b" font-size="21" font-weight="700" text-anchor="middle">일반 소프트웨어</text>
  <text x="100" y="220" fill="#f1f5f9" font-size="18">전환비용 = '귀찮음'</text>
  <text x="100" y="258" fill="#94a3b8" font-size="15">마음에 안 들면 바꾸면 된다</text>
  <text x="100" y="288" fill="#94a3b8" font-size="15">데이터 옮기고 다시 배우면 끝</text>
  <text x="295" y="335" fill="#f59e0b" font-size="17" font-weight="700" text-anchor="middle">갈아탈 수 있다</text>

  <rect x="560" y="130" width="450" height="230" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="785" y="174" fill="#22c55e" font-size="21" font-weight="700" text-anchor="middle">회계 장부 단말</text>
  <text x="590" y="220" fill="#f1f5f9" font-size="18">전환비용 = '신고의 단절'</text>
  <text x="590" y="258" fill="#94a3b8" font-size="15">회계연도 중 바꾸면 신고 연속성 깨짐</text>
  <text x="590" y="288" fill="#94a3b8" font-size="15">법적 위험이 걸린다</text>
  <text x="785" y="335" fill="#22c55e" font-size="17" font-weight="700" text-anchor="middle">사실상 못 갈아탄다</text>

  <rect x="70" y="400" width="940" height="120" rx="12" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="540" y="442" fill="#60a5fa" font-size="20" font-weight="700" text-anchor="middle">+ 중견·중소 ERP 80%대 점유 (업계·언론 추정)</text>
  <text x="540" y="480" fill="#94a3b8" font-size="16" text-anchor="middle">이 80%는 단순 시장 점유가 아니라</text>
  <text x="540" y="506" fill="#f1f5f9" font-size="17" font-weight="700" text-anchor="middle">'국가가 강제한 의무 데이터가 매일 거쳐 가는 단말'의 점유율</text>

  <rect x="70" y="555" width="940" height="110" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="597" fill="#f1f5f9" font-size="18" font-weight="700">신고 의무(못 빠짐) × 압도적 점유(대안 없음) = 이중 락인</text>
  <text x="100" y="633" fill="#94a3b8" font-size="16">트래픽 독점으로도 마진 독점엔 못 간 카카오와 달리, 더존은 '안 쓰면 안 되는' 의무 위에 단말을 깔았다</text>
</svg>
