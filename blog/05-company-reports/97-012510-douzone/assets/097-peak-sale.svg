<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>정점에서, 스스로 문을 닫는다 — EQT 매각과 상장폐지</title>
  <desc>역대 최대 실적의 정점에서 창업주·신한 지분 37.6%를 EQT에 1.3조에 넘기고, 잔여 주식을 2.2조에 공개매수해 자진 상장폐지를 택했다.</desc>
  <rect width="1200" height="700" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">정점에서, 스스로 문을 닫는다</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">잘나가는 회사가, 그것도 역대 최대 실적의 해에, 왜 자기를 파는가</text>

  <!-- 정점 -->
  <rect x="70" y="130" width="500" height="240" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="174" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">2025 — 역대 최대 실적</text>
  <text x="100" y="222" fill="#f1f5f9" font-size="19">매출 4,463억 <tspan fill="#64748b" font-size="14">(역대 최대)</tspan></text>
  <text x="100" y="262" fill="#f1f5f9" font-size="19">영업이익 1,277억 <tspan fill="#64748b" font-size="14">(역대 최대)</tspan></text>
  <text x="100" y="302" fill="#f1f5f9" font-size="19">영업이익률 28.6% <tspan fill="#64748b" font-size="14">(연간)</tspan></text>
  <text x="100" y="344" fill="#22c55e" font-size="17" font-weight="700">가장 잘나가던 그 해</text>

  <text x="595" y="258" fill="#fbbf24" font-size="40">→</text>

  <!-- 매각 -->
  <rect x="640" y="130" width="490" height="240" rx="14" fill="#0f141f" stroke="#3b82f6" stroke-width="2"/>
  <text x="885" y="174" fill="#60a5fa" font-size="22" font-weight="700" text-anchor="middle">2025.11 — EQT에 매각</text>
  <text x="670" y="220" fill="#f1f5f9" font-size="18">경영권 37.6% → 1.3조 (주당 12만원)</text>
  <text x="670" y="252" fill="#94a3b8" font-size="15">창업주 김용우 23.2% + 신한 14.4%</text>
  <text x="670" y="290" fill="#f1f5f9" font-size="18">잔여 주식 공개매수 → 약 2.2조 추가</text>
  <text x="670" y="322" fill="#94a3b8" font-size="15">지분 94% 확보 → 완전자회사</text>
  <text x="885" y="356" fill="#3b82f6" font-size="17" font-weight="700">자진 상장폐지</text>

  <rect x="70" y="400" width="1060" height="270" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="444" fill="#fbbf24" font-size="21" font-weight="700" text-anchor="middle">사모펀드가 1조 3천억을 베팅한 것은 '좋은 SW'가 아니라 '법이 보증하는 현금흐름'</text>
  <text x="100" y="490" fill="#94a3b8" font-size="16">· 사모펀드 바이아웃의 표준 타깃 = 안정적·예측 가능한 현금흐름 + 높은 마진</text>
  <text x="100" y="522" fill="#94a3b8" font-size="16">· 그러니 "데이터 자산이라 팔렸다"는 사후 합리화 — 데이터 없어도 좋은 먹잇감</text>
  <text x="100" y="554" fill="#f1f5f9" font-size="17" font-weight="700">· 단 하나 고유한 것 = 그 예측가능성의 원천이 '법이 강제한 의무 매출'이라는 점</text>
  <text x="100" y="586" fill="#94a3b8" font-size="16">경기가 좋든 나쁘든 기업은 세금 신고를 해야 하고, 그 장부 단말은 더존이 쥐고 있다</text>
  <line x1="100" y1="608" x2="1100" y2="608" stroke="#334155" stroke-width="1"/>
  <text x="600" y="644" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">안 써도 그만인 프로그램 한 자루가, 안 쓰면 안 되는 1.3조 길목이 됐다</text>
</svg>
