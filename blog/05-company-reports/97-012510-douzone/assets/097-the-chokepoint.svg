<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>더존비즈온 — 안 써도 그만인 SW를 안 쓰면 안 되는 길목으로</title>
  <desc>대부분의 소프트웨어는 안 써도 살 수 있지만 한국 기업의 세무·회계 장부는 국세청 신고 의무로 반드시 존재해야 한다. 더존은 그 의무의 길목을 점유했다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="32" font-weight="700" text-anchor="middle">안 써도 그만 vs 안 쓰면 안 되는</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">더존비즈온(012510) — 좋은 SW가 아니라 '법이 강제한 의무의 길목'을 쥐었다</text>

  <rect x="70" y="130" width="500" height="220" rx="14" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="174" fill="#f59e0b" font-size="22" font-weight="700" text-anchor="middle">대부분의 소프트웨어</text>
  <text x="100" y="218" fill="#f1f5f9" font-size="18">PDF 편집기 · 문서 작성기 · 그래픽 툴</text>
  <text x="100" y="256" fill="#94a3b8" font-size="16">대안이 있고, 안 써도 산다</text>
  <text x="100" y="292" fill="#94a3b8" font-size="16">좋아서 쓰는 것 — 가격·품질 경쟁</text>
  <text x="320" y="332" fill="#f59e0b" font-size="18" font-weight="700" text-anchor="middle">안 써도 그만</text>

  <rect x="630" y="130" width="500" height="220" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="174" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">한국 기업의 회계 장부</text>
  <text x="660" y="218" fill="#f1f5f9" font-size="18">국세청 신고 의무 = 법적 강제</text>
  <text x="660" y="256" fill="#94a3b8" font-size="16">반드시 존재해야 한다</text>
  <text x="660" y="292" fill="#94a3b8" font-size="16">회계연도 중 갈아타기 거의 불가</text>
  <text x="880" y="332" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">안 쓰면 안 됨</text>

  <rect x="70" y="380" width="1060" height="300" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="424" fill="#fbbf24" font-size="22" font-weight="700" text-anchor="middle">더존은 그 '의무의 길목'에 단말을 깔았다</text>
  <text x="600" y="464" fill="#94a3b8" font-size="16" text-anchor="middle">1991년 세무사 책상의 회계 프로그램 → 중견·중소 ERP 80%대 점유</text>
  <text x="600" y="500" fill="#94a3b8" font-size="16" text-anchor="middle">시장을 새로 만든 게 아니라, 국가가 법으로 강제해 둔 길목에 올라탔다</text>
  <line x1="200" y1="525" x2="1000" y2="525" stroke="#334155" stroke-width="1"/>
  <text x="320" y="568" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">영업이익률 28.6%</text>
  <text x="320" y="594" fill="#64748b" font-size="14" text-anchor="middle">SaaS 전 2016년 이미 21.7%</text>
  <text x="880" y="568" fill="#3b82f6" font-size="20" font-weight="700" text-anchor="middle">EQT에 경영권 1.3조 매각</text>
  <text x="880" y="594" fill="#64748b" font-size="14" text-anchor="middle">정점에서 자진 상장폐지</text>
  <text x="600" y="648" fill="#f1f5f9" font-size="18" font-weight="700" text-anchor="middle">관통선 — 안 써도 그만인 SW가 안 쓰면 안 되는 1.3조 길목이 됐다</text>
  <text x="600" y="676" fill="#64748b" font-size="14" text-anchor="middle">사모펀드가 산 것은 '좋은 SW'가 아니라 '법이 보증하는 현금흐름'</text>
</svg>
