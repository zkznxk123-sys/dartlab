<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>SK바이오팜 — 2026년에 봐야 할 다섯 가지</title>
  <desc>세노바메이트 미국 매출 추세, 두 번째 상업화 제품, 판관비 대비 매출 증가율, 순이익과 영업이익의 격차, 유럽·기타 시장 회수 — 직판 베팅의 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">매출의 크기가 아니라, 깔아둔 비용을 매출이 얼마나 넘어서는가</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">세노바메이트 미국 매출 추세</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">직판 회수가 계속되는가 — 미국 매출이 직판 비용선을 더 벌릴수록 이익률이 오른다</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">두 번째 상업화 제품</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">깔아둔 직판 채널이 다음 제품을 실어 나르는가 — 채널 '재사용성' 가설의 첫 검증</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">판관비 증가율 대비 매출 증가율</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">판관비도 함께 는다(22년 3,395→25년 4,599). 매출이 더 빨라야 마진이 두꺼워진다</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">순이익과 영업이익의 격차</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">24·25년 순익&gt;영익의 영업외·세금효과가 일회성인지 — 본업의 힘은 영업이익으로</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">유럽·기타 시장의 회수</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">미국은 직판, 유럽은 라이선스아웃(아벨) — 두 경로의 수익이 각각 어떻게 들어오나</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">약을 만든 게 아니라, 미국에 직접 파는 조직을 만들었다</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">— 그 비용이 한때 약값보다 컸고, 매출이 그것을 넘은 순간 손익의 부호가 바뀌었다</text>
</svg>
