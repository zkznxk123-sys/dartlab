<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>SK바이오팜 — 약 파는 비용이 약값보다 컸던 해</title>
  <desc>2022년 SK바이오팜의 판매비와관리비 3,395억이 그해 매출 2,462억보다 컸다. 매출원가는 25년 429억(매출총이익률 94%)으로 약값에서 제조 원가는 거의 0이며, 비용의 정체는 제조가 아니라 미국 직판 영업이다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="58" fill="#f1f5f9" font-size="33" font-weight="700" text-anchor="middle">약 파는 비용이 약값보다 컸다</text>
  <text x="600" y="92" fill="#64748b" font-size="17" text-anchor="middle">SK바이오팜(326030) — 2022년, 신약 R&amp;D 회사라는 간판 뒤의 숫자</text>

  <!-- 축 -->
  <line x1="180" y1="170" x2="180" y2="500" stroke="#334155" stroke-width="1.5"/>
  <line x1="180" y1="500" x2="1020" y2="500" stroke="#334155" stroke-width="1.5"/>

  <!-- 매출 막대: 2,462 (높이 261) -->
  <rect x="320" y="239" width="180" height="261" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="218" fill="#60a5fa" font-size="26" font-weight="700" text-anchor="middle">2,462억</text>
  <text x="410" y="530" fill="#94a3b8" font-size="18" text-anchor="middle">매출 (판 약값)</text>

  <!-- 판관비 막대: 3,395 (높이 360) -->
  <rect x="700" y="140" width="180" height="360" rx="6" fill="#3a2a10" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="790" y="119" fill="#fbbf24" font-size="26" font-weight="700" text-anchor="middle">3,395억</text>
  <text x="790" y="530" fill="#94a3b8" font-size="18" text-anchor="middle">판관비 (파는 비용)</text>

  <!-- 격차 표시 -->
  <line x1="500" y1="239" x2="700" y2="239" stroke="#475569" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="600" y="195" fill="#f59e0b" font-size="16" font-weight="700" text-anchor="middle">+933억</text>
  <text x="600" y="178" fill="#64748b" font-size="13" text-anchor="middle">비용이 매출보다</text>

  <rect x="180" y="560" width="840" height="120" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="210" y="600" fill="#f1f5f9" font-size="18" font-weight="700">매출원가는 2025년 단 429억 — 매출총이익률 94%, 약값에서 공장 원가는 거의 0</text>
  <text x="210" y="634" fill="#94a3b8" font-size="16">그렇다면 매출보다 컸던 그 비용으로 이 회사가 산 것은? 분자가 아니라</text>
  <text x="210" y="662" fill="#22c55e" font-size="17" font-weight="700">미국 의사에게 처방전을 받아내는 직판 영업 인프라</text>
</svg>
