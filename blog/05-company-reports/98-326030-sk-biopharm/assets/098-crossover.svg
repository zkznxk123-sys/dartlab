<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>매출이 직판 비용선을 추월하는 순간 — 손익의 부호가 뒤집힌다</title>
  <desc>2022년 매출 2,462억은 판관비 3,395억보다 작았다(적자). 매출이 24년 5,476억, 25년 7,067억으로 판관비를 추월하자 영업이익이 -1,311억에서 +2,039억으로 부호가 뒤집혔다. 흑자전환의 변수는 매출의 크기가 아니라 비용선을 추월했느냐다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">매출이 비용선을 추월한 순간</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">흑자전환의 변수는 매출의 '크기'가 아니라 '깔아둔 비용을 넘느냐'였다</text>

  <!-- 라인 차트 영역 -->
  <line x1="160" y1="150" x2="160" y2="470" stroke="#334155" stroke-width="1.5"/>
  <line x1="160" y1="470" x2="1060" y2="470" stroke="#334155" stroke-width="1.5"/>
  <text x="145" y="165" fill="#475569" font-size="13" text-anchor="end">7천억</text>
  <text x="145" y="320" fill="#475569" font-size="13" text-anchor="end">3.5천억</text>
  <text x="145" y="470" fill="#475569" font-size="13" text-anchor="end">0</text>

  <!-- x labels -->
  <text x="280" y="498" fill="#94a3b8" font-size="15" text-anchor="middle">2022</text>
  <text x="540" y="498" fill="#94a3b8" font-size="15" text-anchor="middle">2023</text>
  <text x="800" y="498" fill="#94a3b8" font-size="15" text-anchor="middle">2024</text>
  <text x="1010" y="498" fill="#94a3b8" font-size="15" text-anchor="middle">2025</text>

  <!-- 판관비 라인 (amber): 3395/3583/4082/4599 → y=470-val/7067*320 -->
  <polyline fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="7 4" points="280,316 540,308 800,285 1010,262"/>
  <text x="280" y="300" fill="#f59e0b" font-size="13" text-anchor="middle">판관비 3,395</text>
  <text x="1010" y="248" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">판관비 4,599</text>

  <!-- 매출 라인 (blue): 2462/3549/5476/7067 -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="3.5" points="280,359 540,309 800,222 1010,150"/>
  <circle cx="280" cy="359" r="6" fill="#3b82f6"/><text x="280" y="382" fill="#60a5fa" font-size="13" text-anchor="middle">매출 2,462</text>
  <circle cx="1010" cy="150" r="7" fill="#3b82f6"/><text x="975" y="140" fill="#60a5fa" font-size="14" font-weight="700" text-anchor="middle">매출 7,067</text>

  <!-- 교차점 표시 -->
  <circle cx="620" cy="297" r="9" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <text x="620" y="200" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">추월 지점</text>
  <line x1="620" y1="210" x2="620" y2="288" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- 영업이익 부호 띠 -->
  <text x="160" y="555" fill="#94a3b8" font-size="15" font-weight="700">영업이익</text>
  <rect x="240" y="540" width="80" height="34" rx="6" fill="#3a1515" stroke="#ef4444" stroke-width="1.5"/>
  <text x="280" y="563" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">-1,311</text>
  <rect x="500" y="540" width="80" height="34" rx="6" fill="#3a1515" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="563" fill="#ef4444" font-size="15" font-weight="700" text-anchor="middle">-375</text>
  <rect x="760" y="540" width="80" height="34" rx="6" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="800" y="563" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">+963</text>
  <rect x="970" y="540" width="80" height="34" rx="6" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1010" y="563" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">+2,039</text>

  <rect x="160" y="610" width="900" height="86" rx="12" fill="#11161f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="185" y="648" fill="#f1f5f9" font-size="17" font-weight="700">2022년에도 매출은 있었지만(2,462억) 적자였다 — 진짜 변수는 매출 크기가 아니다.</text>
  <text x="185" y="678" fill="#94a3b8" font-size="15">매출이 판관비선을 추월하자(2024~) 영업이익의 부호가 뒤집혔다. ※판관비도 함께 증가 — 순수 고정비 레버리지는 아님</text>
</svg>
