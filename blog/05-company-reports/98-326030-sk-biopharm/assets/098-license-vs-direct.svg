<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>기술수출(정석) vs 직판(SK의 선택) — 같은 약, 다른 소유 구조</title>
  <desc>한국 신약사의 정석은 임상 중간에 글로벌 제약사에 라이선스아웃하고 로열티를 받는 것이지만, SK바이오팜은 가장 큰 시장 미국만 직판 자회사 SK Life Science를 깔고 직접 팔았다. 유럽은 아벨 테라퓨틱스에 라이선스아웃했다.</desc>
  <rect width="1200" height="700" fill="#0a0e1a"/>
  <text x="600" y="56" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">같은 약, 다른 소유 구조</text>
  <text x="600" y="90" fill="#64748b" font-size="17" text-anchor="middle">세노바메이트를 미국에서 — 정석을 거부하고 끝까지 직접 들고 갔다</text>

  <!-- 정석: 라이선스아웃 -->
  <rect x="70" y="130" width="500" height="430" rx="14" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="174" fill="#f59e0b" font-size="22" font-weight="700" text-anchor="middle">정석 — 기술수출(라이선스아웃)</text>
  <text x="100" y="220" fill="#f1f5f9" font-size="17">· 임상 중간에 글로벌 제약사에 권리 판매</text>
  <text x="100" y="256" fill="#f1f5f9" font-size="17">· 계약금·로열티를 일찍 받는다</text>
  <text x="100" y="292" fill="#94a3b8" font-size="16">· 위험은 덜지만…</text>
  <text x="100" y="328" fill="#ef4444" font-size="17" font-weight="700">· 약이 버는 돈 대부분은 사 간 회사 몫</text>
  <line x1="100" y1="356" x2="540" y2="356" stroke="#334155" stroke-width="1"/>
  <text x="100" y="396" fill="#94a3b8" font-size="15">한국 신약사 다수가 택하는 길.</text>
  <text x="100" y="424" fill="#94a3b8" font-size="15">SK바이오팜도 유럽은 이 길</text>
  <text x="100" y="452" fill="#f59e0b" font-size="16" font-weight="700">(아벨 테라퓨틱스에 라이선스아웃)</text>
  <text x="320" y="520" fill="#f59e0b" font-size="18" font-weight="700" text-anchor="middle">위험↓ · 돈 일찍 · 소유 안 함</text>

  <!-- SK의 선택: 직판 -->
  <rect x="630" y="130" width="500" height="430" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2"/>
  <text x="880" y="174" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">SK의 선택 — 미국 직판</text>
  <text x="660" y="220" fill="#f1f5f9" font-size="17">· 미국에 직판 자회사 SK Life Science</text>
  <text x="660" y="256" fill="#f1f5f9" font-size="17">· 영업 조직 직접 고용, 직접 판매</text>
  <text x="660" y="292" fill="#94a3b8" font-size="16">· 위험을 먼저 떠안지만…</text>
  <text x="660" y="328" fill="#22c55e" font-size="17" font-weight="700">· 약이 버는 돈을 끝까지 자기가 가짐</text>
  <line x1="660" y1="356" x2="1100" y2="356" stroke="#334155" stroke-width="1"/>
  <text x="660" y="396" fill="#94a3b8" font-size="15">가장 크고 비싼 시장 미국만</text>
  <text x="660" y="424" fill="#94a3b8" font-size="15">가치사슬 끝까지 소유</text>
  <text x="660" y="452" fill="#22c55e" font-size="16" font-weight="700">(한국 기업이 발굴한 신약의 미국 직접 판매)</text>
  <text x="880" y="520" fill="#22c55e" font-size="18" font-weight="700" text-anchor="middle">위험↑ · 출혈 먼저 · 끝까지 소유</text>

  <text x="600" y="616" fill="#fbbf24" font-size="19" font-weight="700" text-anchor="middle">그 '끝까지 소유'의 비용이 손익에 박혔다 — 판관비가 매출보다 컸던 해</text>
  <text x="600" y="650" fill="#64748b" font-size="15" text-anchor="middle">직판은 모든 시장이 아니라, 가장 큰 시장 하나에 집중한 베팅</text>
</svg>
