<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>영업이익과 영업현금흐름이 동시에 부호를 바꾼 궤적</title>
  <desc>2022년 영업이익 -1,311억·영업현금흐름 -1,599억의 적자에서, 2024년 둘 다 플러스로 전환하고 2025년 영업이익 +2,039억·영업CF +1,763억에 이른다. 손익과 현금이 동시에 마이너스에서 플러스로 넘어갔다.</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>
  <text x="600" y="52" fill="#f1f5f9" font-size="30" font-weight="700" text-anchor="middle">손익도 현금도, 동시에 부호가 뒤집혔다</text>
  <text x="600" y="86" fill="#64748b" font-size="16" text-anchor="middle">영업이익과 영업현금흐름이 함께 마이너스에서 플러스로 (2022 → 2025)</text>

  <!-- zero line -->
  <line x1="180" y1="330" x2="1080" y2="330" stroke="#475569" stroke-width="2"/>
  <text x="165" y="335" fill="#64748b" font-size="14" text-anchor="end">0</text>

  <!-- x labels -->
  <text x="300" y="560" fill="#94a3b8" font-size="15" text-anchor="middle">2022</text>
  <text x="540" y="560" fill="#94a3b8" font-size="15" text-anchor="middle">2023</text>
  <text x="780" y="560" fill="#94a3b8" font-size="15" text-anchor="middle">2024</text>
  <text x="1020" y="560" fill="#94a3b8" font-size="15" text-anchor="middle">2025</text>

  <!-- 영업이익 라인 (green) -->
  <polyline fill="none" stroke="#22c55e" stroke-width="3.5" points="300,448 540,364 780,243 1020,146"/>
  <circle cx="300" cy="448" r="6" fill="#ef4444"/>
  <circle cx="1020" cy="146" r="7" fill="#22c55e"/>
  <text x="300" y="472" fill="#ef4444" font-size="14" text-anchor="middle">-1,311</text>
  <text x="1020" y="134" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">+2,039</text>
  <text x="1055" y="200" fill="#22c55e" font-size="14" font-weight="700">영업이익</text>

  <!-- 영업CF 라인 (blue) -->
  <polyline fill="none" stroke="#3b82f6" stroke-width="3.5" stroke-dasharray="8 4" points="300,474 540,415 780,245 1020,171"/>
  <circle cx="300" cy="474" r="6" fill="#ef4444"/>
  <circle cx="1020" cy="171" r="7" fill="#3b82f6"/>
  <text x="300" y="498" fill="#ef4444" font-size="14" text-anchor="middle">-1,599</text>
  <text x="1020" y="225" fill="#60a5fa" font-size="15" font-weight="700" text-anchor="middle">+1,763</text>
  <text x="1055" y="250" fill="#60a5fa" font-size="14" font-weight="700">영업CF</text>

  <!-- 전환 구간 -->
  <rect x="640" y="120" width="180" height="220" rx="8" fill="#22c55e" opacity="0.06"/>
  <text x="730" y="115" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">2024 전환</text>

  <rect x="180" y="582" width="900" height="46" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="1.5"/>
  <text x="200" y="611" fill="#f1f5f9" font-size="16" font-weight="700">깔아둔 직판 비용을 매출이 추월하자, 손익(영업이익)과 현금(영업CF)의 부호가 동시에 뒤집혔다</text>
</svg>
