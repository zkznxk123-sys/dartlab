<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>순손실을 낸 해에 영업현금 2.48조 — 현금 찍는 공장은 멀쩡하다</title>
  <desc>2025년 영업이익 +1조2,376억, 영업활동현금흐름 +2조4,816억인데 당기순이익은 -4,130억이다. 본업과 현금은 멀쩡한데 영업이익 아래에서만 무너졌다.</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">현금 찍는 공장은 멀쩡하다</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">2025년 — 순손실을 낸 바로 그 해, 영업현금은 2.48조가 들어왔다</text>

  <!-- zero line -->
  <line x1="120" y1="470" x2="1080" y2="470" stroke="#475569" stroke-width="2"/>
  <text x="105" y="475" fill="#64748b" font-size="13" text-anchor="end">0</text>

  <!-- 영업이익 +12,376 → 179px -->
  <rect x="200" y="291" width="180" height="179" rx="6" fill="#0f2a1a" stroke="#22c55e" stroke-width="2"/>
  <text x="290" y="270" fill="#22c55e" font-size="24" font-weight="700" text-anchor="middle">+12,376</text>
  <text x="290" y="500" fill="#94a3b8" font-size="17" text-anchor="middle">영업이익</text>

  <!-- 영업CF +24,816 → 360px -->
  <rect x="510" y="110" width="180" height="360" rx="6" fill="#0f1a2a" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="600" y="92" fill="#60a5fa" font-size="24" font-weight="700" text-anchor="middle">+24,816</text>
  <text x="600" y="500" fill="#94a3b8" font-size="17" text-anchor="middle">영업현금흐름</text>
  <text x="600" y="522" fill="#64748b" font-size="14" text-anchor="middle">(2.48조)</text>

  <!-- 순이익 -4,130 → 60px 아래 -->
  <rect x="820" y="470" width="180" height="60" rx="6" fill="#3a1515" stroke="#ef4444" stroke-width="2"/>
  <text x="910" y="558" fill="#ef4444" font-size="24" font-weight="700" text-anchor="middle">-4,130</text>
  <text x="910" y="455" fill="#94a3b8" font-size="17" text-anchor="middle">당기순이익</text>

  <rect x="120" y="566" width="960" height="58" rx="10" fill="#11161f" stroke="#22c55e" stroke-width="1.5"/>
  <text x="145" y="600" fill="#f1f5f9" font-size="16" font-weight="700">본업(영업이익)도 현금(영업CF)도 두껍게 플러스 — 무너진 건 영업 그 자체가 아니라 영업이익 '아래'다</text>
</svg>
