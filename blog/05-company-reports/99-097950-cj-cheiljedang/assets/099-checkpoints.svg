<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 740" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>CJ제일제당 — 2026년에 봐야 할 다섯 가지</title>
  <desc>4분기 손상 재발 여부, 발효 업황, 본업 영업이익 둔화 멈춤, 부채비율과 이자보상, 대한통운 제외 식품·바이오 부문 이익 — 다음 1년 관전 포인트.</desc>
  <rect width="1080" height="740" fill="#0a0e1a"/>
  <text x="540" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">2026년에 봐야 할 다섯 가지</text>
  <text x="540" y="86" fill="#64748b" font-size="16" text-anchor="middle">매출이 아니라, 영업이익 '아래'에서 매년 12월에 무슨 일이 벌어지는가</text>

  <g>
    <rect x="90" y="115" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="161" r="20" fill="#fbbf24"/><text x="135" y="168" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">1</text>
    <text x="180" y="152" fill="#f1f5f9" font-size="21" font-weight="700">4분기 손상의 재발 여부</text>
    <text x="180" y="184" fill="#94a3b8" font-size="16">2024Q4·2025Q4 연속으로 터진 결산 손상이 2026Q4에도 반복되나 — 한 해 사고인가 구조인가</text>

    <rect x="90" y="219" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="265" r="20" fill="#fbbf24"/><text x="135" y="272" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">2</text>
    <text x="180" y="256" fill="#f1f5f9" font-size="21" font-weight="700">발효(그린바이오) 업황</text>
    <text x="180" y="288" fill="#94a3b8" font-size="16">매각을 철회하고 끌어안은 엔진이 실제로 도는지 — 라이신 등 사료 아미노산 가격·가동률</text>

    <rect x="90" y="323" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="369" r="20" fill="#fbbf24"/><text x="135" y="376" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">3</text>
    <text x="180" y="360" fill="#f1f5f9" font-size="21" font-weight="700">본업 영업이익의 둔화 멈춤</text>
    <text x="180" y="392" fill="#94a3b8" font-size="16">24→25년 -20% 흐름이 멈추는지 — 매출(-6.9%)과 함께 영업이익 바닥 확인</text>

    <rect x="90" y="427" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="473" r="20" fill="#fbbf24"/><text x="135" y="480" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">4</text>
    <text x="180" y="464" fill="#f1f5f9" font-size="21" font-weight="700">부채비율 157%와 이자보상</text>
    <text x="180" y="496" fill="#94a3b8" font-size="16">영업현금 2조+가 이자·차입을 감당하는 균형 — 부채비율 단독이 아니라 현금 창출력과 함께</text>

    <rect x="90" y="531" width="900" height="92" rx="10" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
    <circle cx="135" cy="577" r="20" fill="#fbbf24"/><text x="135" y="584" fill="#0a0e1a" font-size="22" font-weight="700" text-anchor="middle">5</text>
    <text x="180" y="568" fill="#f1f5f9" font-size="21" font-weight="700">대한통운 제외 식품·바이오 이익</text>
    <text x="180" y="600" fill="#94a3b8" font-size="16">연결 덩치를 걷어낸 진짜 본업(식품+바이오)의 영업이익 — 부문 공시로 확인</text>
  </g>
  <text x="540" y="678" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">맨 밑줄이 거짓말을 하는 게 아니라, 1년에 한 번 진실을 몰아서 말한다</text>
  <text x="540" y="710" fill="#64748b" font-size="14" text-anchor="middle">— 영업으로 번 현금으로 매년 12월에 자기 장부를 한 번씩 청소하는 회사</text>
</svg>
