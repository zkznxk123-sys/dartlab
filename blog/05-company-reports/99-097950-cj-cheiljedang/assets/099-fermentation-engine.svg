<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>설탕솥에서 발효조까지 — 진짜 엔진은 안 보이는 발효</title>
  <desc>1953년 설탕 정제에서 시작해 조미료(글루탐산 발효), 사료용 아미노산(라이신)으로 번진 60년 발효 계보가 고마진 B2B 엔진이고, 비비고 식품은 그 발효 계보의 가장 바깥 껍질이다.</desc>
  <rect width="1200" height="640" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">설탕솥에서 발효조까지</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">같은 발효 화학공학 — 진짜 엔진은 라면이 아니라 미생물이다</text>

  <!-- 계보 흐름 -->
  <rect x="70" y="150" width="220" height="120" rx="12" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="195" fill="#f59e0b" font-size="19" font-weight="700" text-anchor="middle">1953 설탕</text>
  <text x="180" y="228" fill="#94a3b8" font-size="14" text-anchor="middle">제일제당 정제 설비</text>
  <text x="180" y="250" fill="#64748b" font-size="13" text-anchor="middle">(삼성 모태)</text>

  <text x="312" y="218" fill="#fbbf24" font-size="32">→</text>

  <rect x="360" y="150" width="220" height="120" rx="12" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="195" fill="#f59e0b" font-size="19" font-weight="700" text-anchor="middle">조미료</text>
  <text x="470" y="228" fill="#94a3b8" font-size="14" text-anchor="middle">글루탐산 발효</text>
  <text x="470" y="250" fill="#64748b" font-size="13" text-anchor="middle">미생물로 길러낸다</text>

  <text x="602" y="218" fill="#fbbf24" font-size="32">→</text>

  <rect x="650" y="150" width="220" height="120" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="2.5"/>
  <text x="760" y="195" fill="#22c55e" font-size="19" font-weight="700" text-anchor="middle">아미노산</text>
  <text x="760" y="228" fill="#94a3b8" font-size="14" text-anchor="middle">라이신·트립토판</text>
  <text x="760" y="250" fill="#22c55e" font-size="13" text-anchor="middle">세계적 B2B</text>

  <text x="892" y="218" fill="#fbbf24" font-size="32">→</text>

  <rect x="940" y="150" width="200" height="120" rx="12" fill="#11161f" stroke="#334155" stroke-width="1.5"/>
  <text x="1040" y="195" fill="#94a3b8" font-size="19" font-weight="700" text-anchor="middle">비비고</text>
  <text x="1040" y="228" fill="#64748b" font-size="14" text-anchor="middle">식품 — 간판</text>
  <text x="1040" y="250" fill="#64748b" font-size="13" text-anchor="middle">바깥 껍질</text>

  <rect x="70" y="320" width="1070" height="120" rx="12" fill="#0f1a17" stroke="#22c55e" stroke-width="1.5"/>
  <text x="605" y="362" fill="#22c55e" font-size="20" font-weight="700" text-anchor="middle">척추는 라면·만두가 아니라 발효(미생물)다</text>
  <text x="605" y="398" fill="#94a3b8" font-size="16" text-anchor="middle">설탕→조미료→아미노산은 전부 같은 발효 화학공학 — 손에 잡히는 비비고는 그 계보의 가장 바깥 층</text>
  <text x="605" y="424" fill="#64748b" font-size="14" text-anchor="middle">이 발효 엔진의 값어치는 5막에서 '6조 매각설 철회'로, 3막에서 '영업현금 2.48조'로 증명된다</text>

  <rect x="70" y="470" width="1070" height="120" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="512" fill="#f1f5f9" font-size="17" font-weight="700">'식품회사가 아니라 발효회사'는 정체성 단정이 아니라 — 이익의 무게중심을 가리키는 배경이다</text>
  <text x="100" y="548" fill="#94a3b8" font-size="15">간판(비비고)으로 읽으면 이 회사의 고마진 엔진이 안 보인다. 사료·조미료를 만드는 미생물이 진짜 돈줄.</text>
  <text x="100" y="574" fill="#64748b" font-size="13">※'세계 1위'는 회사·업계 주장 — 본문은 '세계 상위/세계적'으로 표기</text>
</svg>
