<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>안 판 것이 진짜 엔진 — 발효는 쥐고, 사료는 잘랐다</title>
  <desc>그린바이오(발효) 사업은 2024년 11월 약 6조 매각 발표 후 2025년 4월 철회해 끌어안았고, 정작 중단영업으로 잘라낸 것은 저마진 사료(F&amp;C)였다. 통념과 달리 안 판 것이 진짜 엔진이다.</desc>
  <rect width="1200" height="660" fill="#0a0e1a"/>
  <text x="600" y="54" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">안 판 것이 진짜 엔진이었다</text>
  <text x="600" y="88" fill="#64748b" font-size="16" text-anchor="middle">통념의 역전 — 판 것과 안 판 것이 거꾸로였다</text>

  <!-- 발효: 쥠 -->
  <rect x="70" y="130" width="510" height="360" rx="14" fill="#0f1a17" stroke="#22c55e" stroke-width="2.5"/>
  <text x="325" y="176" fill="#22c55e" font-size="22" font-weight="700" text-anchor="middle">발효(그린바이오) — 쥐었다</text>
  <text x="100" y="224" fill="#f1f5f9" font-size="17">· 2024.11 매각 발표 (추정 약 6조)</text>
  <text x="100" y="258" fill="#94a3b8" font-size="15">· MBK·중국 광신·매화그룹 인수 후보</text>
  <text x="100" y="296" fill="#f1f5f9" font-size="17">· 2025.4 매각 철회 → '안 팔고 키운다'</text>
  <text x="100" y="330" fill="#94a3b8" font-size="15">· 2024 바이오부문 영익 약 3,376억(매출 4.21조)</text>
  <text x="100" y="364" fill="#f1f5f9" font-size="17">· 2026.3 관련 자산(Batavia) 완전 인수</text>
  <line x1="100" y1="392" x2="550" y2="392" stroke="#334155" stroke-width="1"/>
  <text x="325" y="436" fill="#22c55e" font-size="19" font-weight="700" text-anchor="middle">시장이 6조에 매겼고,</text>
  <text x="325" y="466" fill="#22c55e" font-size="19" font-weight="700" text-anchor="middle">회사는 도로 끌어안았다</text>

  <!-- 사료: 잘랐다 -->
  <rect x="620" y="130" width="510" height="360" rx="14" fill="#1a1610" stroke="#f59e0b" stroke-width="2"/>
  <text x="875" y="176" fill="#f59e0b" font-size="22" font-weight="700" text-anchor="middle">사료(F&amp;C) — 잘랐다</text>
  <text x="650" y="224" fill="#f1f5f9" font-size="17">· 저마진 사료 사업</text>
  <text x="650" y="258" fill="#94a3b8" font-size="15">· 중단영업으로 분류·정리</text>
  <text x="650" y="296" fill="#f1f5f9" font-size="17">· 2025Q4 매출이 타 분기보다 약 1,700억 적음</text>
  <text x="650" y="330" fill="#94a3b8" font-size="15">  (사료 중단영업 반영으로 보임)</text>
  <line x1="650" y1="392" x2="1100" y2="392" stroke="#334155" stroke-width="1"/>
  <text x="875" y="436" fill="#f59e0b" font-size="19" font-weight="700" text-anchor="middle">군더더기는 도려내고,</text>
  <text x="875" y="466" fill="#f59e0b" font-size="19" font-weight="700" text-anchor="middle">값진 엔진은 지켰다</text>

  <rect x="70" y="510" width="1060" height="110" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="552" fill="#fbbf24" font-size="18" font-weight="700" text-anchor="middle">4분기 손상도 '값진 엔진 처분'이 아니다 — 회사 설명상 바이오제약(신약) 부진 + 자산 평가</text>
  <text x="600" y="588" fill="#94a3b8" font-size="15" text-anchor="middle">돈 버는 발효(그린바이오)와 손실 낸 바이오제약은 다른 사업이다 (매각철회·손상사유는 외부 공시 인용)</text>
</svg>
