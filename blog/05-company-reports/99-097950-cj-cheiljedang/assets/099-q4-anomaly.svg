<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>CJ제일제당 — 4분기에만 거짓말하는 맨 밑줄</title>
  <desc>2025년 분기별로 영업이익은 모두 플러스인데 당기순이익은 1~3분기만 플러스이고 4분기에 -7,987억으로 급락한다. 같은 4분기 영업이익은 +2,048억으로 멀쩡하다. 2024년 4분기에도 영업이익 +3,773억·순이익 -1,528억으로 똑같은 일이 일어났다.</desc>
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <text x="600" y="52" fill="#f1f5f9" font-size="31" font-weight="700" text-anchor="middle">맨 밑줄은 4분기에만 무너진다</text>
  <text x="600" y="86" fill="#64748b" font-size="16" text-anchor="middle">2025년 분기별 — 영업이익(본업)은 멀쩡한데 순이익만 4분기에 급락</text>

  <!-- zero line -->
  <line x1="120" y1="300" x2="1080" y2="300" stroke="#475569" stroke-width="2"/>
  <text x="105" y="305" fill="#64748b" font-size="13" text-anchor="end">0</text>

  <!-- 분기 그룹: 4개, 각 그룹 영업이익(green)+순이익(blue/red) -->
  <!-- 25Q1 cx~240 -->
  <rect x="180" y="200" width="48" height="100" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="240" y="283" width="48" height="17" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="234" y="328" fill="#94a3b8" font-size="14" text-anchor="middle">25Q1</text>
  <!-- 25Q2 -->
  <rect x="390" y="194" width="48" height="106" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="450" y="237" width="48" height="63" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="444" y="328" fill="#94a3b8" font-size="14" text-anchor="middle">25Q2</text>
  <!-- 25Q3 -->
  <rect x="600" y="196" width="48" height="104" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="660" y="264" width="48" height="36" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="654" y="328" fill="#94a3b8" font-size="14" text-anchor="middle">25Q3</text>
  <!-- 25Q4 -->
  <rect x="810" y="239" width="48" height="61" fill="#0f2a1a" stroke="#22c55e" stroke-width="2"/>
  <text x="834" y="230" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">+2,048</text>
  <rect x="870" y="300" width="48" height="240" fill="#3a1515" stroke="#ef4444" stroke-width="2.5"/>
  <text x="894" y="565" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">-7,987</text>
  <text x="864" y="328" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">25Q4</text>

  <!-- legend -->
  <rect x="990" y="180" width="20" height="20" fill="#0f2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1018" y="196" fill="#22c55e" font-size="14">영업이익</text>
  <rect x="990" y="212" width="20" height="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1018" y="228" fill="#60a5fa" font-size="14">순이익(＋)</text>
  <rect x="990" y="244" width="20" height="20" fill="#3a1515" stroke="#ef4444" stroke-width="1.5"/>
  <text x="1018" y="260" fill="#ef4444" font-size="14">순이익(－)</text>

  <rect x="120" y="600" width="960" height="96" rx="12" fill="#11161f" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="145" y="638" fill="#f1f5f9" font-size="17" font-weight="700">4분기 영업이익은 +2,048억으로 멀쩡한데, 순이익만 -7,987억 — 영업 '아래'(손상)가 무너뜨렸다.</text>
  <text x="145" y="670" fill="#94a3b8" font-size="15">1년 전 2024Q4에도 똑같이: 영업이익 +3,773억 / 순이익 -1,528억. 2년 연속 4분기에만 갈라선다.</text>
</svg>
