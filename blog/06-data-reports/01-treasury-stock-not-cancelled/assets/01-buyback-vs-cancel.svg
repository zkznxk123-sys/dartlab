<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <title>자사주 매입·소각·처분이 발행주식수에 미치는 효과</title>
  <desc>매입은 발행주식수 변화 없이 금고 보관, 소각은 발행주식수 영구 감소(진짜 환원), 처분은 금고 물량이 시장으로 되돌아와 잠재 희석. 세 행위의 효과 비교.</desc>
  <defs>
    <linearGradient id="bg01c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bg01c)" rx="16"/>

  <text x="600" y="58" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="26" font-weight="700">같은 '자사주', 세 갈래로 갈린다</text>
  <text x="600" y="90" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15">발행주식수에 미치는 효과는 정반대까지 벌어진다</text>

  <!-- Panel 1: 매입 -->
  <rect x="40" y="135" width="360" height="400" rx="14" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="180" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="20" font-weight="700">매입 (취득)</text>
  <text x="220" y="210" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">시장에서 자기 주식을 사들임</text>
  <text x="220" y="280" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">발행주식수</text>
  <text x="220" y="318" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="30" font-weight="700">변화 없음</text>
  <text x="220" y="342" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="18">→</text>
  <line x1="80" y1="375" x2="360" y2="375" stroke="#1e293b"/>
  <text x="220" y="412" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">유통 물량 ↓</text>
  <text x="220" y="438" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">주식은 회사 금고로</text>
  <rect x="100" y="470" width="240" height="40" rx="8" fill="#1e293b"/>
  <text x="220" y="495" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="14" font-weight="700">잠재 물량 (환원 미확정)</text>

  <!-- Panel 2: 소각 (highlighted) -->
  <rect x="420" y="135" width="360" height="400" rx="14" fill="#0f1d17" stroke="#22c55e" stroke-width="2"/>
  <rect x="600" y="120" width="0" height="0"/>
  <rect x="618" y="122" width="124" height="26" rx="13" fill="#22c55e"/>
  <text x="680" y="140" text-anchor="middle" fill="#06210f" font-family="system-ui, sans-serif" font-size="13" font-weight="700">진짜 환원</text>
  <text x="600" y="184" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="20" font-weight="700">소각</text>
  <text x="600" y="214" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">보유한 자사주를 없앰</text>
  <text x="600" y="280" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">발행주식수</text>
  <text x="600" y="318" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="30" font-weight="700">영구 감소</text>
  <text x="600" y="342" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="18">↓</text>
  <line x1="460" y1="375" x2="740" y2="375" stroke="#1e3a2a"/>
  <text x="600" y="412" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">주당 이익·배당 ↑</text>
  <text x="600" y="438" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">되돌릴 수 없음</text>
  <rect x="480" y="470" width="240" height="40" rx="8" fill="#14321f"/>
  <text x="600" y="495" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="14" font-weight="700">주주의 몫으로 확정</text>

  <!-- Panel 3: 처분 -->
  <rect x="800" y="135" width="360" height="400" rx="14" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="980" y="180" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="20" font-weight="700">처분 (되팔기)</text>
  <text x="980" y="210" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">금고의 자사주를 다시 매각</text>
  <text x="980" y="280" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">금고 → 시장</text>
  <text x="980" y="318" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="30" font-weight="700">물량 복귀</text>
  <text x="980" y="342" text-anchor="middle" fill="#fb923c" font-family="system-ui, sans-serif" font-size="18">↑</text>
  <line x1="840" y1="375" x2="1120" y2="375" stroke="#1e293b"/>
  <text x="980" y="412" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">유통 물량 ↑</text>
  <text x="980" y="438" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">매입 효과가 되돌아감</text>
  <rect x="860" y="470" width="240" height="40" rx="8" fill="#1e293b"/>
  <text x="980" y="495" text-anchor="middle" fill="#fdba74" font-family="system-ui, sans-serif" font-size="14" font-weight="700">잠재 희석 실현</text>

  <text x="600" y="575" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">매입은 신호일 뿐 — 소각이라야 결과다</text>
</svg>
