<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <title>순주주환원 분류 분포 — 희석형 1,363곳 vs 적극환원 7곳</title>
  <desc>배당, 자사주 매입, 최근 증자 점수 합으로 분류한 전상장사 2,933곳. 희석형 1,363곳, 중립 1,429곳, 환원형 134곳, 적극환원은 단 7곳.</desc>
  <defs>
    <linearGradient id="bg01d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="520" fill="url(#bg01d)" rx="16"/>

  <text x="600" y="54" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="26" font-weight="700">한국 증시 주주환원 온도</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15">배당(+1) · 자사주 매입(+1) · 최근 증자(−1) 점수 합 · 전상장사 2,933곳</text>

  <!-- 희석형 1363 -->
  <text x="235" y="184" text-anchor="end" fill="#fb7185" font-family="system-ui, sans-serif" font-size="16" font-weight="700">희석형</text>
  <rect x="250" y="158" width="763" height="48" rx="5" fill="#9f1239"/>
  <text x="1028" y="188" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">1,363</text>

  <!-- 중립 1429 -->
  <text x="235" y="262" text-anchor="end" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="16" font-weight="700">중립</text>
  <rect x="250" y="236" width="800" height="48" rx="5" fill="#475569"/>
  <text x="1065" y="266" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">1,429</text>

  <!-- 환원형 134 -->
  <text x="235" y="340" text-anchor="end" fill="#86efac" font-family="system-ui, sans-serif" font-size="16" font-weight="700">환원형</text>
  <rect x="250" y="314" width="75" height="48" rx="5" fill="#15803d"/>
  <text x="340" y="344" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">134</text>

  <!-- 적극환원 7 -->
  <text x="235" y="418" text-anchor="end" fill="#4ade80" font-family="system-ui, sans-serif" font-size="16" font-weight="700">적극환원</text>
  <rect x="250" y="392" width="5" height="48" rx="2" fill="#22c55e"/>
  <text x="272" y="422" fill="#4ade80" font-family="system-ui, sans-serif" font-size="18" font-weight="700">7</text>
  <!-- callout -->
  <line x1="300" y1="416" x2="560" y2="416" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="560" y="392" width="470" height="48" rx="10" fill="#0f1d17" stroke="#22c55e" stroke-width="1.5"/>
  <text x="585" y="422" fill="#4ade80" font-family="system-ui, sans-serif" font-size="16" font-weight="700">배당 + 자사주 둘 다 한 '적극환원'은 단 7곳 (0.2%)</text>

  <text x="600" y="492" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">희석형(증자로 지분 희석)이 1,363곳으로 가장 많다</text>
</svg>
