<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560">
  <title>전상장사 2,933곳 중 자사주 보유 798곳, 그중 742곳(93%)이 최근 1년 소각 0</title>
  <desc>전체 상장사 2,933곳에서 자사주 보유 798곳으로 좁히고, 그 798곳 중 742곳(93%)은 최근 1년 소각이 0, 56곳만 소각. 매입한 139곳 중에서도 110곳(79%)이 소각 0.</desc>
  <defs>
    <linearGradient id="bg01f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" fill="url(#bg01f)" rx="16"/>

  <text x="600" y="54" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="26" font-weight="700">자사주를 쥐고도, 줄이지 않는다</text>
  <text x="600" y="86" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15">최신 정기보고서(당기) 기준 · dartlab.scan("capital") 전수</text>

  <!-- Bar A: 전체 2933 -->
  <rect x="150" y="130" width="900" height="60" rx="8" fill="#334155"/>
  <text x="170" y="167" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">전체 상장사</text>
  <text x="1030" y="167" text-anchor="end" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="20" font-weight="700">2,933곳</text>

  <!-- funnel taper -->
  <path d="M150 190 L150 280 M1050 190 L395 280" stroke="#1e293b" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>

  <!-- Bar B: 자사주 보유 798 = 소각0 742(amber) + 소각 56(green) -->
  <text x="150" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15">자사주 보유 <tspan fill="#e2e8f0" font-weight="700">798곳</tspan> <tspan fill="#64748b" font-size="13">(전체의 27%)</tspan></text>
  <rect x="150" y="285" width="228" height="64" rx="6" fill="#b45309"/>
  <rect x="378" y="285" width="17" height="64" rx="3" fill="#22c55e"/>
  <text x="170" y="316" fill="#fde68a" font-family="system-ui, sans-serif" font-size="14">최근 1년 소각 0</text>
  <text x="170" y="338" fill="#ffffff" font-family="system-ui, sans-serif" font-size="20" font-weight="700">742곳</text>
  <text x="405" y="332" fill="#4ade80" font-family="system-ui, sans-serif" font-size="13">소각 56곳</text>

  <!-- 93% callout -->
  <rect x="560" y="270" width="520" height="100" rx="12" fill="#0f172a" stroke="#b45309" stroke-width="1.5"/>
  <text x="610" y="338" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="58" font-weight="800">93%</text>
  <text x="740" y="312" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="17" font-weight="700">자사주 보유사 10곳 중 9곳</text>
  <text x="740" y="338" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="15">최근 1년간 단 한 주도 소각 안 함</text>

  <!-- Bar C: 매입 139 중 소각0 110 -->
  <line x1="150" y1="408" x2="1050" y2="408" stroke="#1e293b"/>
  <text x="150" y="448" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15">최근 1년 자사주 <tspan fill="#e2e8f0" font-weight="700">매입 139곳</tspan> 중에서도</text>
  <rect x="150" y="466" width="640" height="44" rx="6" fill="#1e293b"/>
  <rect x="150" y="466" width="506" height="44" rx="6" fill="#7c5410"/>
  <text x="170" y="494" fill="#fde68a" font-family="system-ui, sans-serif" font-size="16" font-weight="700">110곳 (79%)이 같은 기간 소각 0</text>
  <text x="1030" y="494" text-anchor="end" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">처분(되팔기) 131곳 — 잠재 희석</text>
</svg>
