name: "2026 한국 경제 전망"
title: "성장률은 2.5%, 그런데 왜 안 풀릴까 — 2026 경제 전망"
date: 2026-06-25
sector: macro

caption: |
  "2026년 한국 경제"라고 쓰면 한 단어가 따라붙습니다 — 회복. 그런데 숫자를 펴 보면, 무게추 두 개가 서로 반대로 움직입니다. (※ 속보가 아니라 주요 기관의 연간 전망 정리입니다.)

  위를 가리키는 건 성장입니다. KDI는 2.5%, 자본시장연구원은 2.0%로 봅니다 — 회복이라는 데는 같지만 기관끼리도 갈립니다. 동력은 반도체 수출과 내수 개선세입니다.

  아래로 누르는 건 가격입니다. 원달러 환율은 팬데믹 전으로 돌아가지 않습니다 — 자본시장연구원은 균형 수준 자체가 한 단계 올라갔다고 봅니다(일시적 급등이 아니라 구조적). 기준금리는 2.5%로 이미 중립 수준이라 내릴 자리가 좁고, 물가는 유가 하락에 2.2%로 둔화 전망이지만 고환율이 변수로 남습니다.

  그래서 2026년의 질문은 "회복이냐 아니냐"가 아닙니다. "반도체가 끄는 회복이, 높아진 환율·금리 부담을 이기느냐"입니다. 반도체 수출이 꺾이거나 환율이 다시 튀는 순간이 분기점입니다. dartlab은 그 신호를 공시·데이터로 따라갑니다.
pinnedComment: "수치 출처 — KDI 경제전망(2026.5.13, 성장 2.5%·물가 2.2%) · 자본시장연구원 2026 거시경제 주요 이슈(성장 2.0%·기준금리 2.5%·환율 구조적 상향). 모두 전망치이며, 투자 판단의 책임은 본인에게 있습니다."

