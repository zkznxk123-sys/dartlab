corpName: "삼성바이오로직스"
title: "삼성바이오로직스는 좋은 숫자보다 공장 가동을 봅니다"
date: 2026-06-28
sector: biopharma
caption: |
  삼성바이오로직스는 최근 실적만 보면 이미 좋아 보이는 기업입니다.

  2026년 1분기 CDMO 사업 매출은 1조2571억원, 영업이익은 5808억원이었습니다.
  회사는 1~4공장 풀가동과 프로젝트 실행력이 실적을 이끌었다고 설명했습니다.

  하지만 이 회사를 볼 때 핵심은 좋은 숫자를 외우는 게 아닙니다.
  새로 늘어난 생산능력이 실제 매출과 남는 이익으로 바뀌는지 보는 것입니다.

  록빌 인수로 총 생산능력은 84만5000리터가 됐고, 5공장 램프업도 진행 중입니다.
  분모가 커진 만큼 다음 질문은 더 선명합니다.
  새 공장이 마진을 지키며 차는가, 아니면 한동안 고정비 부담으로 남는가.
explainers:
  - term: "록빌"
    body: "미국 메릴랜드주의 바이오의약품 제조 거점입니다. 삼성바이오로직스가 GSK 제조시설을 인수해 첫 미국 생산기지로 삼은 곳입니다."
  - term: "CDMO"
    body: "고객사의 의약품 개발과 생산을 대신 수행하는 위탁개발생산 사업입니다. 설비가 찰수록 고정비 부담이 낮아지는 구조를 봅니다."
