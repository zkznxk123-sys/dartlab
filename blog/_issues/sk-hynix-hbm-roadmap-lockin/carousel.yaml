title: "SK하이닉스는 HBM 가격보다 고객 로드맵을 봅니다"
date: 2026-06-28
sector: semiconductor
caption: |
  SK하이닉스는 지금 숫자만 봐도 좋은 기업처럼 보입니다.
  하지만 이 회사를 볼 때 핵심은 HBM 가격이 얼마나 올랐는지 하나가 아닙니다.

  AI 서버 고객의 다음 플랫폼에 얼마나 깊게 들어가 있는지 봐야 합니다.
  메모리 회사의 힘은 샘플, 고객 인증, 양산, 장기 공급이 끊기지 않을 때 더 강해집니다.

  2026년 6월 NVIDIA와의 다년 파트너십, 12단 HBM4E 샘플 출하는 같은 방향을 가리킵니다.
  단기 실적보다 더 중요한 질문은 로드맵 잠금입니다.

  다음 체크포인트는 간단합니다.
  HBM4E 고객 인증이 지연 없이 양산으로 넘어가는가.
  증설이 수율, 열, 현금흐름을 해치지 않고 공급으로 바뀌는가.
explainers:
  - term: "HBM"
    body: "High Bandwidth Memory의 약자입니다. AI GPU 옆에 붙어 대량 데이터를 빠르게 주고받는 고부가 D램입니다."
  - term: "고객 인증"
    body: "샘플을 고객사가 실제 플랫폼에서 검증하는 단계입니다. 좋은 샘플도 인증과 양산 전환이 늦어지면 매출 인식이 밀릴 수 있습니다."
  - term: "MR-MUF"
    body: "여러 D램 칩을 쌓은 뒤 칩 사이를 보호재로 채우는 패키징 기술입니다. 열과 안정성이 HBM 경쟁력의 일부가 됩니다."
