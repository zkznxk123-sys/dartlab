<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>dartlab Pyodide POC</title>
  <style>
    body { font-family: ui-monospace, Menlo, Consolas, monospace; padding: 16px; max-width: 960px; margin: auto; }
    #log { white-space: pre-wrap; background: #111; color: #0f0; padding: 12px; border-radius: 6px; min-height: 400px; font-size: 12px; overflow-y: auto; max-height: 80vh; }
    button { padding: 8px 14px; margin-right: 8px; font-size: 14px; cursor: pointer; }
    .bar { margin-bottom: 12px; }
    .stat { display: inline-block; margin-right: 16px; padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>dartlab Pyodide POC</h2>
  <div class="bar">
    <button id="runBasic">Phase 1 (parquet)</button>
    <button id="runFull">Phase 2 (dartlab)</button>
    <button id="runAsk">Phase 3 (AI ask)</button>
    <span class="stat" id="memStat">메모리: -</span>
    <span class="stat" id="timeStat">경과: -</span>
  </div>
  <div class="bar">
    <select id="providerSelect">
      <option value="gemini">Gemini</option>
      <option value="openai">OpenAI</option>
    </select>
    <input id="apiKey" type="password" placeholder="API 키 붙여넣기" style="width:400px;padding:4px 8px;font-family:inherit;">
  </div>
  <pre id="log"></pre>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js"></script>
  <script>
    const logEl = document.getElementById("log");
    const memStat = document.getElementById("memStat");
    const timeStat = document.getElementById("timeStat");
    let pyodide = null;

    const log = (msg) => { console.log(msg); logEl.textContent += msg + "\n"; logEl.scrollTop = logEl.scrollHeight; };
    const updateMem = () => {
      if (performance.memory) {
        const mb = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(0);
        const limit = (performance.memory.jsHeapSizeLimit / 1024 / 1024).toFixed(0);
        memStat.textContent = `JS heap: ${mb} / ${limit} MB`;
      }
    };
    setInterval(updateMem, 500);

    async function ensurePyodide() {
      if (pyodide) return pyodide;
      log("[1] Pyodide 로드 중...");
      pyodide = await loadPyodide();
      log("    Pyodide " + pyodide.version);
      log("[2] 빌트인 패키지 로드...");
      await pyodide.loadPackage(["polars", "pyarrow", "micropip", "beautifulsoup4", "lxml", "httpx", "pydantic", "rich", "sqlite3", "numpy"]);
      log("    완료");
      pyodide.setStdout({ batched: (msg) => log("    " + msg) });
      return pyodide;
    }

    // ── Phase 1 ──
    async function runBasic() {
      logEl.textContent = "";
      const t0 = performance.now();
      const timer = setInterval(() => { timeStat.textContent = `경과: ${((performance.now() - t0) / 1000).toFixed(1)}s`; }, 200);
      try {
        const py = await ensurePyodide();
        log("[3] HF finance parquet fetch...");
        const resp = await fetch("https://huggingface.co/datasets/eddmpython/dartlab-data/resolve/main/dart/finance/005930.parquet");
        const buf = new Uint8Array(await resp.arrayBuffer());
        log(`    ${(buf.length / 1024).toFixed(0)} KB`);
        log("[4] pyarrow → polars...");
        py.globals.set("parquet_bytes", py.toPy(buf));
        await py.runPythonAsync(`
import polars as pl, pyarrow.parquet as pq, io
df = pl.from_arrow(pq.read_table(io.BytesIO(bytes(parquet_bytes))))
print(f"shape: {df.shape}")
        `);
        log("\n✅ Phase 1 완료 (" + ((performance.now() - t0) / 1000).toFixed(1) + "s)");
      } catch (e) { log("\n❌ " + (e.message || e)); }
      finally { clearInterval(timer); updateMem(); }
    }

    // ── Phase 2 ──
    async function runFull() {
      logEl.textContent = "";
      const t0 = performance.now();
      const timer = setInterval(() => { timeStat.textContent = `경과: ${((performance.now() - t0) / 1000).toFixed(1)}s`; }, 200);
      try {
        const py = await ensurePyodide();
        log("[3] dartlab wheel 설치...");
        const wheelResp = await fetch("/dartlab-0.9.8-py3-none-any.whl?v=" + Date.now());
        const wheelBuf = new Uint8Array(await wheelResp.arrayBuffer());
        py.FS.writeFile("/tmp/dartlab.whl", wheelBuf);
        log(`    ${(wheelBuf.length / 1024).toFixed(0)} KB`);
        await py.runPythonAsync(`
import micropip
await micropip.install(["diff-match-patch", "openpyxl"])
import zipfile, site
whl = zipfile.ZipFile("/tmp/dartlab.whl")
sp = site.getsitepackages()[0] if site.getsitepackages() else "/lib/python3.12/site-packages"
whl.extractall(sp)
whl.close()
print("dartlab 설치 완료")
        `);
        log("[4] HF parquet pre-fetch...");
        const HF = "https://huggingface.co/datasets/eddmpython/dartlab-data/resolve/main";
        for (const cat of [{dir:"dart/docs",name:"docs"},{dir:"dart/finance",name:"finance"},{dir:"dart/report",name:"report"}]) {
          const r = await fetch(`${HF}/${cat.dir}/005930.parquet`);
          if (!r.ok) { log(`    ⚠ ${cat.name} 실패`); continue; }
          const buf = new Uint8Array(await r.arrayBuffer());
          py.FS.mkdirTree(`/data/${cat.dir}`);
          py.FS.writeFile(`/data/${cat.dir}/005930.parquet`, buf);
          log(`    ${cat.name}: ${(buf.length / 1024).toFixed(0)} KB`);
        }
        log("[5] import dartlab + Company...");
        await py.runPythonAsync(`
import dartlab
print(f"dartlab {dartlab.__version__}")
c = dartlab.Company("005930")
print(f"Company: {c.stockCode}")
        `);
        log("[6] c.show('IS')...");
        await py.runPythonAsync(`print(f"IS: {c.show('IS').shape}")`);
        log("[7] c.analysis('수익성')...");
        await py.runPythonAsync(`
result = c.analysis("financial", "수익성")
if isinstance(result, dict):
    for k, v in list(result.items())[:5]: print(f"  {k}: {type(v).__name__}")
        `);
        log("[8] c.review('수익성')...");
        await py.runPythonAsync(`
import traceback, io
try:
    md = c.review("수익성").toMarkdown()
    print(f"review: {len(md)}자")
    print(md[:300])
except Exception:
    buf = io.StringIO(); traceback.print_exc(file=buf); print(buf.getvalue())
        `);
        log("\n✅ Phase 2 완료 (" + ((performance.now() - t0) / 1000).toFixed(1) + "s)");
      } catch (e) { log("\n❌ " + (e.stack || e.message || e)); }
      finally { clearInterval(timer); updateMem(); }
    }

    // ── Phase 3: AI ask ──
    async function runAsk() {
      const provider = document.getElementById("providerSelect").value;
      const apiKey = document.getElementById("apiKey").value.trim();
      if (!apiKey) { log("⚠ API 키를 입력하세요"); return; }

      logEl.textContent = "";
      const t0 = performance.now();
      const timer = setInterval(() => { timeStat.textContent = `경과: ${((performance.now() - t0) / 1000).toFixed(1)}s`; }, 200);
      try {
        const py = await ensurePyodide();
        try { await py.runPythonAsync(`import dartlab`); } catch { log("⚠ Phase 2를 먼저 실행하세요"); return; }

        log(`[1] ${provider} 키 설정...`);
        py.globals.set("_provider", provider);
        py.globals.set("_api_key", apiKey);
        await py.runPythonAsync(`
import os
if _provider == "gemini":
    os.environ["GEMINI_API_KEY"] = _api_key
    os.environ["GOOGLE_API_KEY"] = _api_key
elif _provider == "openai":
    os.environ["OPENAI_API_KEY"] = _api_key
print(f"{_provider} 키 설정 완료")
        `);

        log("[2] Gemini 직접 API 호출 테스트...");
        await py.runPythonAsync(`
import traceback, io, os, httpx

key = os.environ.get("GEMINI_API_KEY", "")
print(f"  키 길이: {len(key)}")

# httpx로 Gemini API 직접 호출
url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={key}"
body = {"contents": [{"parts": [{"text": "삼성전자 수익성을 한 문장으로"}]}]}

try:
    r = httpx.post(url, json=body, timeout=30)
    print(f"  HTTP {r.status_code}")
    if r.status_code == 200:
        data = r.json()
        text = data["candidates"][0]["content"]["parts"][0]["text"]
        print(f"  Gemini 응답: {text[:500]}")
    else:
        print(f"  에러: {r.text[:300]}")
except Exception:
    buf = io.StringIO(); traceback.print_exc(file=buf); print(buf.getvalue())
        `);

        log("\n✅ Phase 3 완료 (" + ((performance.now() - t0) / 1000).toFixed(1) + "s)");
      } catch (e) { log("\n❌ " + (e.stack || e.message || e)); }
      finally { clearInterval(timer); updateMem(); }
    }

    document.getElementById("runBasic").addEventListener("click", runBasic);
    document.getElementById("runFull").addEventListener("click", runFull);
    document.getElementById("runAsk").addEventListener("click", runAsk);
  </script>
</body>
</html>
