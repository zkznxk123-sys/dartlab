<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>dartlab Pyodide POC</title>
  <style>
    body { font-family: ui-monospace, Menlo, Consolas, monospace; padding: 16px; max-width: 960px; margin: auto; }
    #log { white-space: pre-wrap; background: #111; color: #0f0; padding: 12px; border-radius: 6px; min-height: 320px; font-size: 12px; }
    button { padding: 8px 14px; margin-right: 8px; font-size: 14px; }
    .bar { margin-bottom: 12px; }
    .stat { display: inline-block; margin-right: 16px; padding: 4px 8px; background: #eee; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>dartlab Pyodide POC — Phase 1 (analysis 실행 가능성)</h2>
  <p>목표: 브라우저에서 Pyodide 로드 → polars 설치 → HF 에서 005930 finance parquet fetch → polars 로 읽고 기본 비율 계산.</p>
  <div class="bar">
    <button id="run">실행</button>
    <span class="stat" id="memStat">메모리: -</span>
    <span class="stat" id="timeStat">경과: -</span>
  </div>
  <pre id="log"></pre>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js"></script>
  <script>
    const logEl = document.getElementById("log");
    const memStat = document.getElementById("memStat");
    const timeStat = document.getElementById("timeStat");
    const log = (msg) => {
      console.log(msg);
      logEl.textContent += msg + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    };

    const updateMem = () => {
      if (performance.memory) {
        const mb = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(0);
        const limit = (performance.memory.jsHeapSizeLimit / 1024 / 1024).toFixed(0);
        memStat.textContent = `JS heap: ${mb} / ${limit} MB`;
      }
    };
    setInterval(updateMem, 500);

    async function main() {
      const t0 = performance.now();
      const tick = () => {
        const sec = ((performance.now() - t0) / 1000).toFixed(1);
        timeStat.textContent = `경과: ${sec}s`;
      };
      const timer = setInterval(tick, 200);

      try {
        log("[1/6] Pyodide 로드 중...");
        const pyodide = await loadPyodide();
        log("      Pyodide " + pyodide.version + " OK");

        log("[2/6] micropip + polars 설치 중 (polars wheel 크기 주의)...");
        await pyodide.loadPackage(["micropip", "numpy"]);
        await pyodide.runPythonAsync(`
import micropip
await micropip.install(["polars"])
        `);
        log("      polars 설치 완료");

        log("[3/6] polars import 확인...");
        await pyodide.runPythonAsync(`
import polars as pl
print("polars", pl.__version__)
        `);

        log("[4/6] HF 에서 005930 finance parquet fetch (CORS 확인)...");
        const url = "https://huggingface.co/datasets/eddmpython/dartlab-data/resolve/main/dart/finance/005930.parquet";
        const resp = await fetch(url);
        if (!resp.ok) throw new Error("HF fetch 실패: " + resp.status);
        const buf = new Uint8Array(await resp.arrayBuffer());
        log(`      다운로드 완료: ${(buf.length / 1024).toFixed(0)} KB`);

        log("[5/6] Pyodide FS 에 parquet 쓰고 polars 로 로드...");
        pyodide.FS.writeFile("/tmp/finance.parquet", buf);
        await pyodide.runPythonAsync(`
import polars as pl
df = pl.read_parquet("/tmp/finance.parquet")
print("shape", df.shape)
print("columns", df.columns[:10])
print(df.head(3))
        `);

        log("[6/6] 기본 비율 계산 (매출액/영업이익 추출)...");
        await pyodide.runPythonAsync(`
import polars as pl
df = pl.read_parquet("/tmp/finance.parquet")
# 계정명 컬럼 찾기
name_col = "계정명" if "계정명" in df.columns else ("account_nm" if "account_nm" in df.columns else None)
print("name_col:", name_col)
if name_col:
    targets = ["매출액", "영업이익", "당기순이익"]
    hit = df.filter(pl.col(name_col).is_in(targets))
    print(hit)
        `);

        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
        log(`\n✅ POC 성공 (총 ${elapsed}s)`);
        log("→ Phase 1 기반 확인: pyodide + polars + HF parquet + 계정 추출 동작");
      } catch (e) {
        log("\n❌ 실패: " + (e.stack || e.message || e));
      } finally {
        clearInterval(timer);
        tick();
        updateMem();
      }
    }

    document.getElementById("run").addEventListener("click", main);
  </script>
</body>
</html>
