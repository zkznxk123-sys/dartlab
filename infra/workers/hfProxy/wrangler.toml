name = "dartlab-hf-proxy"
main = "worker.js"
compatibility_date = "2024-12-01"

# HF resolve/main parquet 레인지 프록시 — 공개 데이터셋(/hf·/naver)은 secret 불필요.
# /news 라우트만 private 데이터셋(dartlab-news-private) read 토큰이 필요 →
#   wrangler secret put HF_NEWS_TOKEN   (read-only · dartlab-news-private 한정 발급)
# 시크릿 미설정이어도 /news 는 빈배열 noop 으로 안전 동작(배선만 먼저, 토큰은 나중).
# ALLOW_ORIGIN 은 실제 사이트 origin 으로 좁힘(로컬 dev 는 와일드카드로 임시 허용 가능).
[vars]
ALLOW_ORIGIN = "https://eddmpython.github.io"
