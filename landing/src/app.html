<!doctype html>
<html lang="ko" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			/* 테마 초기화 — paint 전 data-theme 선세팅(FOUC 방지). 선호 dark 기본. 라우트별 적용은 +layout 이 보정. */
			try {
				var t = localStorage.getItem('dl-theme') === 'light' ? 'light' : 'dark';
				document.documentElement.dataset.theme = t;
				document.documentElement.style.colorScheme = t;
			} catch (e) {}
			/* 브랜드 초기화 — paint 전 data-brand/data-conv/커스텀 accent 선세팅. BrandSwitch 와 동일 규약
			   (dl-brand·dl-conv localStorage). BrandSwitch 미마운트 라우트(/report 등 새 탭)도 사용자가 고른
			   브랜드 색을 따르게 — 전역 SSOT(그동안 BrandSwitch 있는 화면만 리테마되던 누락 보정). */
			try {
				var el = document.documentElement;
				var b = localStorage.getItem('dl-brand') || '';
				if (b.indexOf('custom:') === 0) {
					var hex = b.slice(7);
					var n = parseInt(hex.replace('#', ''), 16);
					el.style.setProperty('--p-accent-500', hex);
					el.style.setProperty('--p-accent-500-rgb', ((n >> 16) & 255) + ', ' + ((n >> 8) & 255) + ', ' + (n & 255));
				} else if (b) {
					el.dataset.brand = b;
				}
				if (localStorage.getItem('dl-conv') === 'green-up') el.dataset.conv = 'green-up';
			} catch (e) {}
		</script>
		<meta name="theme-color" content="#050811" />
		<meta name="color-scheme" content="dark" />
		<meta name="robots" content="index, follow" />
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/icon-192.png" />
		<link rel="alternate" type="application/atom+xml" title="DartLab Blog" href="https://eddmpython.github.io/dartlab/feed.xml" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-prerender="true" class="bg-dl-bg-dark text-dl-text antialiased" style="font-family: 'Pretendard Variable', 'Inter', ui-sans-serif, system-ui, sans-serif;">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
