<!doctype html>
<html lang="ko" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#050811" />
		<meta name="color-scheme" content="dark" />
		<meta name="robots" content="index, follow" />
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="%sveltekit.assets%/icon-192.png" />
		<link rel="alternate" type="application/atom+xml" title="DartLab Blog" href="https://eddmpython.github.io/dartlab/feed.xml" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-prerender="true" class="bg-dl-bg-dark text-dl-text antialiased" style="font-family: 'Pretendard Variable', 'Inter', ui-sans-serif, system-ui, sans-serif;">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
