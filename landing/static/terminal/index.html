<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DartLab Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
:root{
  --bg:#050811; --panel:#0f1219; --panel2:#141925; --head:#161b28;
  --bd:#1e2433; --bdHi:#2a3142; --bdAmber:#3a2c18;
  --amber:#fb923c; --amberDim:#b1701f; --credit:#ea4647;
  --up:#34d399; --dn:#f0616f; --good:#60a5fa; --warn:#fbbf24; --industry:#a78bfa;
  --txt:#f1f5f9; --dim:#94a3b8; --dimmer:#64748b;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Pretendard Variable','Pretendard',system-ui,sans-serif;
  --cond:'Pretendard Variable','Pretendard',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:11px;line-height:1.25;
  -webkit-font-smoothing:antialiased;overflow:hidden;}
#root,.terminal{height:100vh;display:flex;flex-direction:column;}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.r{text-align:right;}
.dim{color:var(--dim);} .tUp{color:var(--up);} .tDn{color:var(--dn);}
.tGood{color:var(--good);} .tWarn{color:var(--warn);} .tNeu{color:var(--txt);}
.tAmber{color:var(--amber);} .tCredit{color:var(--credit);} .tInd{color:var(--industry);}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1c222b;border-radius:0;}
::-webkit-scrollbar-thumb:hover{background:#2b333e;}

/* ============================ TOP BAR ============================ */
.topBar{display:flex;align-items:center;gap:14px;height:36px;flex:0 0 36px;
  background:linear-gradient(180deg,#0c1117,#070a0e);border-bottom:1px solid var(--bdAmber);
  padding:0 12px;}
.brand{display:flex;align-items:center;gap:7px;}
.brandMark{color:var(--amber);font-size:15px;letter-spacing:-2px;}
.brandName{font-family:var(--cond);font-weight:700;font-size:15px;letter-spacing:1px;color:#fff;}
.brandTag{font-family:var(--cond);font-weight:600;font-size:9px;letter-spacing:2px;color:var(--amber);
  border:1px solid var(--bdAmber);padding:1px 5px;border-radius:2px;}
.cmdBar{flex:1;display:flex;align-items:center;gap:8px;background:#0a0e13;border:1px solid var(--bdHi);
  border-radius:3px;padding:3px 8px;max-width:560px;position:relative;}
.cmdBar:focus-within{border-color:var(--amber);box-shadow:0 0 0 1px rgba(255,158,44,.25);}
.cmdPrompt{font-family:var(--mono);font-size:10px;color:var(--amber);font-weight:700;}
.cmdInput{flex:1;background:transparent;border:none;color:var(--txt);font-family:var(--mono);
  font-size:11px;outline:none;}
.cmdInput::placeholder{color:var(--dimmer);}
.cmdGo{background:var(--amber);color:#1a1206;font-family:var(--cond);font-weight:700;font-size:11px;
  letter-spacing:1px;border:none;border-radius:2px;padding:2px 12px;cursor:pointer;}
.cmdGo:hover{background:#ffb454;}
.cmdFlash{position:absolute;right:54px;font-family:var(--mono);font-size:9px;color:var(--amber);
  background:#1a1206;border:1px solid var(--bdAmber);padding:1px 6px;border-radius:2px;}
.topRight{display:flex;align-items:center;gap:14px;margin-left:auto;}
.langSwitch{display:flex;border:1px solid var(--bd);border-radius:3px;overflow:hidden;}
.langBtn{background:#0a0e13;color:var(--dim);font-family:var(--cond);font-weight:600;font-size:10px;
  letter-spacing:.5px;border:none;padding:3px 8px;cursor:pointer;border-right:1px solid var(--bd);}
.langBtn:last-child{border-right:none;}
.langBtn.on{background:var(--amber);color:#1a1206;}
.langBtn:hover:not(.on){color:var(--txt);}
.clock{font-size:10px;color:var(--txt);letter-spacing:.5px;}
.connDot{display:flex;align-items:center;gap:5px;font-family:var(--cond);font-size:10px;color:var(--dim);
  letter-spacing:.5px;}
.connDot .dot{width:6px;height:6px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);
  animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ============================ TICKER ============================ */
.tickerStrip{flex:0 0 22px;height:22px;overflow:hidden;background:#080b0f;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;}
.tickerTrack{display:flex;gap:26px;white-space:nowrap;animation:scroll 60s linear infinite;padding-left:12px;}
.tickerTrack:hover{animation-play-state:paused;}
@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.tickerItem{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:10px;}
.tickerItem b{color:var(--txt);font-family:var(--cond);font-weight:700;letter-spacing:.3px;}
.tickerItem:hover b{color:var(--amber);}
.tickerItem .mono{font-size:10px;}

/* ============================ BOARD ============================ */
.board{flex:1;min-height:0;display:grid;grid-template-columns:248px minmax(0,1fr) 432px;gap:3px;
  padding:3px;background:#04060800;}
.col{display:flex;flex-direction:column;gap:3px;min-height:0;overflow-y:auto;overflow-x:hidden;padding-right:2px;}
.col>*{flex:0 0 auto;}
.rowSplit{display:grid;grid-template-columns:1fr 1fr;gap:3px;align-items:stretch;}
.rowSplit>.panel{min-height:0;}

/* ============================ PANEL ============================ */
.panel{background:var(--panel);border:1px solid var(--bd);border-radius:2px;display:flex;flex-direction:column;
  min-height:0;}
.panelHead{display:flex;align-items:center;gap:7px;height:16px;flex:0 0 16px;padding:0 7px;
  background:linear-gradient(180deg,#10151b,#0b0f14);border-bottom:1px solid var(--bd);overflow:hidden;}
.panelTitle{font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:1.2px;color:var(--amber);
  text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1;}
.panelSub{font-family:var(--mono);font-size:8.5px;color:var(--dimmer);letter-spacing:.3px;white-space:nowrap;flex-shrink:0;}
.panelRight{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:9px;color:var(--dim);
  flex-shrink:0;white-space:nowrap;padding-left:6px;}
.panelBody{padding:5px 6px;flex:1;min-height:0;}
.panelBody.flush{padding:0;}
.liveDot{color:var(--up);font-family:var(--mono);font-size:8px;letter-spacing:1px;}
.liveDot::before{content:'●';font-size:6px;margin-right:3px;vertical-align:middle;}

/* ============================ TABLES (grid) ============================ */
table.grid{width:100%;border-collapse:collapse;font-size:10px;}
table.grid th{font-family:var(--cond);font-weight:600;font-size:8.5px;letter-spacing:.6px;color:var(--dimmer);
  text-transform:uppercase;text-align:left;padding:3px 7px;border-bottom:1px solid var(--bd);position:sticky;top:0;
  background:var(--panel);}
table.grid th.r{text-align:right;}
table.grid td{padding:2.5px 7px;border-bottom:1px solid #0d1116;}
table.grid tbody tr{cursor:pointer;}
table.grid tbody tr:hover{background:#0e1319;}
table.grid tbody tr.on{background:rgba(255,158,44,.09);box-shadow:inset 2px 0 0 var(--amber);}
.sym{font-family:var(--cond);font-weight:600;color:var(--txt);letter-spacing:.3px;}

/* ============================ MARKET PULSE ============================ */
.pulseRow{display:flex;gap:10px;align-items:center;}
.gauge{display:flex;flex-direction:column;align-items:center;}
.gaugeSub{font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:.5px;margin-top:-6px;}
.pulseStats{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;}
.kv{display:flex;justify-content:space-between;font-size:10px;}
.kv span{color:var(--dim);font-family:var(--cond);letter-spacing:.4px;}
.kv b{font-family:var(--mono);font-weight:600;}
.pulseFoot{display:flex;align-items:center;gap:6px;margin-top:7px;padding-top:6px;border-top:1px solid var(--bd);
  font-size:10px;}
.pulseFoot>span:first-child{color:var(--dim);font-family:var(--cond);letter-spacing:.4px;}
.pulseFoot .dim{font-size:8.5px;margin-left:auto;}

/* ============================ SECTOR MAP ============================ */
.sectorGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;}
.sectorCell{border:1px solid var(--bd);border-radius:2px;padding:5px 5px 4px;display:flex;flex-direction:column;gap:1px;}
.sName{font-family:var(--cond);font-weight:600;font-size:10px;color:var(--txt);letter-spacing:.2px;}
.sChg{font-family:var(--mono);font-size:10px;font-weight:600;}

/* ============================ MACRO / LIQ ============================ */
.liqBar{padding:7px;border-top:1px solid var(--bd);}
.liqLabel{display:flex;justify-content:space-between;font-size:9.5px;margin-bottom:4px;}
.liqLabel span{color:var(--dim);font-family:var(--cond);letter-spacing:.4px;}
.liqLabel b{font-family:var(--mono);}
.liqTrack{height:5px;background:#10151b;border-radius:3px;overflow:hidden;position:relative;}
.liqFill{height:100%;background:linear-gradient(90deg,var(--amberDim),var(--amber));}
.liqRange{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;color:var(--dimmer);margin-top:2px;}

/* ============================ FLOW RADAR ============================ */
.flowList{display:flex;flex-direction:column;gap:5px;}
.flowRow{display:grid;grid-template-columns:62px 1fr 52px;align-items:center;gap:7px;}
.flowName{font-family:var(--cond);font-weight:600;font-size:10px;color:var(--txt);}
.flowTrack{height:8px;background:#0e1218;border-radius:2px;overflow:hidden;}
.flowFill{height:100%;}
.flowFill.pos{background:linear-gradient(90deg,#1c6b4d,var(--up));}
.flowFill.neg{background:linear-gradient(90deg,#7a2a33,var(--dn));}
.flowV{font-size:10px;text-align:right;}

/* ============================ SYMBOL HEADER ============================ */
.symHead{background:linear-gradient(180deg,#0d1219,#090d12);border:1px solid var(--bd);border-radius:2px;
  padding:5px 10px;display:flex;align-items:center;gap:16px;flex:0 0 auto;}
.symTop{display:flex;align-items:baseline;gap:8px;}
.symCode{font-family:var(--mono);font-weight:700;font-size:18px;color:#fff;letter-spacing:.5px;}
.symBadge{font-family:var(--cond);font-weight:700;font-size:9px;letter-spacing:1px;padding:1px 5px;border-radius:2px;}
.symBadge.kr{background:rgba(90,169,255,.15);color:var(--good);border:1px solid rgba(90,169,255,.3);}
.symBadge.us{background:rgba(255,158,44,.15);color:var(--amber);border:1px solid var(--bdAmber);}
.symName{font-family:var(--cond);font-weight:600;font-size:13px;color:var(--txt);}
.symMeta{font-family:var(--mono);font-size:8.5px;color:var(--dimmer);margin-top:2px;letter-spacing:.3px;}
.symPrice{display:flex;flex-direction:column;align-items:flex-end;}
.symLast{font-family:var(--mono);font-weight:700;font-size:22px;line-height:1;}
.symChg{font-family:var(--mono);font-size:11px;margin-top:2px;}
.symStats{margin-left:auto;display:grid;grid-template-columns:repeat(6,auto);gap:2px 16px;}
.symStat{display:flex;flex-direction:column;}
.symStat span{font-family:var(--cond);font-size:8.5px;color:var(--dimmer);letter-spacing:.6px;text-transform:uppercase;}
.symStat b{font-family:var(--mono);font-size:11px;color:var(--txt);font-weight:500;}

/* ============================ CHART ============================ */
.chartWrap{position:relative;width:100%;height:136px;min-height:134px;overflow:hidden;}
.chartWrap canvas{display:block;width:100%;height:100%;}
.ohlcTag{position:absolute;top:5px;left:8px;display:flex;gap:11px;font-family:var(--mono);font-size:10px;
  color:var(--dim);pointer-events:none;}
.ohlcTag b{color:var(--txt);font-weight:600;}
.legendTag{position:absolute;top:5px;right:70px;display:flex;gap:12px;font-family:var(--mono);font-size:9px;
  pointer-events:none;}
.chartCtl{display:flex;gap:8px;align-items:center;}
.segGroup{display:flex;border:1px solid var(--bd);border-radius:2px;overflow:hidden;}
.seg{background:#0a0e13;color:var(--dim);font-family:var(--mono);font-size:9px;border:none;
  padding:2px 6px;cursor:pointer;border-right:1px solid var(--bd);}
.seg:last-child{border-right:none;}
.seg.on{background:var(--amber);color:#1a1206;font-weight:600;}
.seg:hover:not(.on){color:var(--txt);}

/* ============================ TECH / RISK ============================ */
.techGrid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:var(--bd);}
.techCell{background:var(--panel);padding:6px 8px;display:flex;flex-direction:column;gap:1px;}
.techL{font-family:var(--cond);font-size:8.5px;color:var(--dimmer);letter-spacing:.6px;text-transform:uppercase;}
.techV{font-size:13px;font-weight:600;}

/* ============================ CROSS-ASSET ============================ */
.corrTable{width:100%;border-collapse:collapse;font-size:9.5px;}
.corrTable th.corrHd{font-family:var(--mono);font-size:8px;color:var(--dim);padding:3px 2px;font-weight:500;}
.corrSide{font-family:var(--mono);font-size:8px;color:var(--dim);padding:2px 5px;white-space:nowrap;}
.corrCell{font-family:var(--mono);text-align:center;padding:4px 2px;color:var(--txt);
  border:1px solid #0a0d11;font-variant-numeric:tabular-nums;}

/* ============================ SCENARIO ============================ */
.scenWrap{display:grid;grid-template-columns:1fr 1.3fr;}
.scenInputs{border-right:1px solid var(--bd);padding:7px;display:flex;flex-direction:column;gap:5px;}
.scenInput{display:flex;justify-content:space-between;font-size:10px;}
.scenInput span{color:var(--dim);font-family:var(--cond);letter-spacing:.3px;}
.scenImpacts{padding:7px;display:flex;flex-direction:column;gap:5px;}
.scenImpact{display:grid;grid-template-columns:1fr auto auto;align-items:baseline;gap:8px;font-size:10px;}
.scenImpact>span:first-child{color:var(--dim);font-family:var(--cond);}
.scenImpact b{font-size:12px;font-weight:600;text-align:right;}
.scenPct{font-family:var(--mono);font-size:9px;}
.runBtn{background:#1a1206;border:1px solid var(--bdAmber);color:var(--amber);font-family:var(--cond);
  font-weight:700;font-size:9px;letter-spacing:.5px;padding:2px 8px;border-radius:2px;cursor:pointer;}
.runBtn:hover{background:var(--amber);color:#1a1206;}

/* ============================ ORDER BOOK ============================ */
.bookHead{display:grid;grid-template-columns:1fr 1fr 1fr;font-family:var(--cond);font-size:8px;
  color:var(--dimmer);letter-spacing:.6px;padding:3px 7px;border-bottom:1px solid var(--bd);text-transform:uppercase;}
.book{display:flex;flex-direction:column;}
.bookRow{display:grid;grid-template-columns:1fr 1fr 1fr;position:relative;font-family:var(--mono);font-size:9.5px;
  padding:1.5px 7px;align-items:center;}
.bookDepth{position:absolute;top:0;bottom:0;opacity:.16;}
.bookDepth.ask{right:0;background:var(--dn);}
.bookDepth.bid{left:0;background:var(--up);}
.bookRow span{position:relative;z-index:1;}
.execBtns{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:5px 7px;}
.execBuy,.execSell{font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:1px;border:none;
  padding:4px;border-radius:2px;cursor:pointer;}
.execBuy{background:rgba(54,211,153,.16);color:var(--up);border:1px solid rgba(54,211,153,.35);}
.execSell{background:rgba(255,91,110,.16);color:var(--dn);border:1px solid rgba(255,91,110,.35);}
.execBuy:hover{background:rgba(54,211,153,.28);}.execSell:hover{background:rgba(255,91,110,.28);}

/* ============================ FUNDAMENTALS ============================ */
.fundGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);}
.fundCell{background:var(--panel);padding:5px 8px;display:flex;flex-direction:column;}
.fundL{font-family:var(--cond);font-size:8.5px;color:var(--dimmer);letter-spacing:.5px;text-transform:uppercase;}
.fundV{font-size:13px;font-weight:600;color:var(--txt);}

/* ============================ FINANCIALS ============================ */
.finCtl{display:flex;gap:0;border:1px solid var(--bd);border-radius:2px;overflow:hidden;}
.finCtl .seg.acct{border-left:1px solid var(--bdHi);}
.finTabs{display:flex;border-bottom:1px solid var(--bd);}
.finTab{flex:1;background:var(--panel2);color:var(--dim);font-family:var(--cond);font-weight:600;font-size:10px;
  letter-spacing:.5px;border:none;border-right:1px solid var(--bd);padding:4px;cursor:pointer;}
.finTab:last-child{border-right:none;}
.finTab.on{background:rgba(255,158,44,.1);color:var(--amber);box-shadow:inset 0 -2px 0 var(--amber);}
.finTab:hover:not(.on){color:var(--txt);}
.finScroll{max-height:78px;overflow-y:auto;}
.finTable{width:100%;border-collapse:collapse;font-size:10px;}
.finTable th{font-family:var(--cond);font-size:8.5px;color:var(--dimmer);letter-spacing:.5px;text-transform:uppercase;
  padding:3px 7px;text-align:right;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--panel);}
.finTable th.finAcct{text-align:left;}
.finAcct{text-align:left;font-family:var(--sans);color:var(--txt);padding:2.5px 7px;white-space:nowrap;}
.finTable td.r{font-family:var(--mono);padding:2.5px 7px;}
.finTable tr.finKey{background:rgba(255,158,44,.05);}
.finTable tr.finKey .finAcct{color:var(--amber);font-weight:600;}
.finTable tbody tr:hover{background:#0e1319;}
.finNote{font-family:var(--mono);font-size:7.5px;color:var(--dimmer);padding:2px 7px;border-top:1px solid var(--bd);
  letter-spacing:.3px;}

/* ============================ CREDIT ============================ */
.creditTop{padding:5px 7px;border-bottom:1px solid var(--bd);}
.creditGrade{display:flex;align-items:baseline;gap:10px;}
.cgVal{font-family:var(--mono);font-weight:700;font-size:19px;letter-spacing:.5px;}
.cgSub{font-size:10px;color:var(--dim);}
.cgSub b{font-family:var(--mono);}
.creditTracks{padding:5px 7px;display:flex;flex-direction:column;gap:3px;}
.ctRow{display:grid;grid-template-columns:54px 1fr 26px;align-items:center;gap:7px;}
.ctName{font-family:var(--cond);font-weight:600;font-size:10px;color:var(--txt);}
.ctTrack{height:6px;background:#10151b;border-radius:2px;overflow:hidden;}
.ctFill{height:100%;background:linear-gradient(90deg,var(--amberDim),var(--amber));}
.ctVal{font-family:var(--mono);font-size:10px;text-align:right;color:var(--txt);}
.creditAgency{font-family:var(--mono);font-size:9px;color:var(--dim);padding:0 7px 5px;}
.creditDiv{font-size:9px;color:var(--dim);line-height:1.35;padding:4px 7px;border-top:1px solid var(--bd);
  text-wrap:pretty;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ============================ ANALYSIS ============================ */
.anSummary{font-size:10px;line-height:1.4;color:var(--txt);padding:5px 7px;border-bottom:1px solid var(--bd);
  text-wrap:pretty;background:rgba(255,158,44,.03);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.anTracks{padding:4px 7px;display:flex;flex-direction:column;gap:3px;}
.anRow{display:grid;grid-template-columns:58px 60px 1fr;align-items:baseline;gap:7px;}
.anName{font-family:var(--cond);font-weight:600;font-size:10px;color:var(--amber);}
.anDelta{font-size:10px;font-weight:600;text-align:right;}
.anVerdict{font-size:9.5px;color:var(--dim);line-height:1.3;text-wrap:pretty;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}

/* ============================ DISCLOSURE ============================ */
.filings{display:flex;flex-direction:column;border-bottom:1px solid var(--bd);}
.filingRow{display:grid;grid-template-columns:70px 76px 1fr auto;align-items:center;gap:7px;padding:3px 7px;
  font-size:9.5px;cursor:pointer;border-bottom:1px solid #0c1015;}
.filingRow:hover{background:#0e1319;}
.fDate{font-size:9px;color:var(--dim);}
.fType{font-family:var(--cond);font-weight:600;font-size:9px;letter-spacing:.3px;padding:1px 4px;border-radius:2px;
  text-align:center;white-space:nowrap;}
.fType.kr{background:rgba(90,169,255,.12);color:var(--good);}
.fType.us{background:rgba(255,158,44,.12);color:var(--amber);}
.fTitle{color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fSrc{font-family:var(--mono);font-size:8.5px;color:var(--amberDim);}
.discBody{padding:7px;}
.discSection{font-family:var(--cond);font-weight:700;font-size:10px;color:var(--amber);letter-spacing:.4px;
  margin-bottom:5px;}
.discText{font-size:10px;line-height:1.5;color:var(--dim);text-wrap:pretty;}
.discMarker{font-family:var(--mono);font-size:8px;color:var(--dimmer);margin-top:6px;letter-spacing:.3px;
  border-top:1px dashed var(--bd);padding-top:5px;}

/* ============================ EARNINGS ============================ */
.divStrip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border-bottom:1px solid var(--bd);}
.divCell{background:var(--panel);padding:5px 7px;display:flex;flex-direction:column;}
.divCell span{font-family:var(--cond);font-size:8px;color:var(--dimmer);letter-spacing:.5px;text-transform:uppercase;}
.divCell b{font-size:11px;color:var(--txt);}
.events{padding:5px 7px;display:flex;flex-direction:column;gap:3px;}
.eventRow{display:grid;grid-template-columns:72px 64px 1fr;align-items:center;gap:6px;font-size:9.5px;}
.eDate{font-size:9px;color:var(--dim);}
.eTag{font-family:var(--cond);font-weight:700;font-size:8px;letter-spacing:.5px;padding:1px 4px;border-radius:2px;
  border:1px solid var(--bd);text-align:center;}
.eName{color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ============================ AI ASSISTANT ============================ */
.conf{font-family:var(--cond);font-size:9px;color:var(--dim);letter-spacing:.5px;}
.aiQ{font-family:var(--mono);font-size:9.5px;color:var(--amber);padding:4px 7px;border-bottom:1px solid var(--bd);
  background:rgba(255,158,44,.04);}
.aiSteps{padding:4px 7px;display:flex;flex-direction:column;gap:1px;border-bottom:1px solid var(--bd);}
.aiStep{display:grid;grid-template-columns:74px 1fr auto;align-items:center;gap:6px;font-size:9px;}
.aiTool{font-family:var(--cond);font-weight:700;font-size:9px;color:var(--good);letter-spacing:.3px;}
.aiCall{font-size:9px;color:var(--txt);}
.aiRef{font-family:var(--mono);font-size:8px;color:var(--dimmer);}
.aiAnswer{font-size:9.5px;line-height:1.4;color:var(--txt);padding:5px 7px;text-wrap:pretty;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

/* ============================ STATUS BAR ============================ */
.statusBar{flex:0 0 22px;height:22px;display:flex;align-items:center;gap:14px;padding:0 12px;
  background:linear-gradient(180deg,#0b0f14,#070a0e);border-top:1px solid var(--bdAmber);
  font-family:var(--cond);font-size:9.5px;color:var(--dim);letter-spacing:.4px;}
.sbItem{display:flex;align-items:center;gap:4px;white-space:nowrap;}
.sbItem b{font-family:var(--mono);font-size:9px;}
.sbSpacer{flex:1;}

/* ============================ ENGINE TITLE TINTS ============================ */
.panel.eAnalysis .panelTitle{color:var(--amber);}
.panel.eCredit .panelTitle{color:var(--credit);}
.panel.eMacro .panelTitle{color:var(--warn);}
.panel.eQuant .panelTitle{color:var(--up);}
.panel.eIndustry .panelTitle{color:var(--industry);}
.panel.eValuation .panelTitle{color:var(--valuation,#10b981);}
.panel.eChanges .panelTitle{color:var(--amber);}

/* ============================ LOADING ============================ */
.bootScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:50;}
.bootMark{font-family:var(--cond);font-weight:800;font-size:30px;letter-spacing:1px;color:#fff;}
.bootMark span{color:var(--amber);}
.bootBar{width:220px;height:3px;background:#141925;border-radius:2px;overflow:hidden;position:relative;}
.bootFill{height:100%;width:40%;background:linear-gradient(90deg,var(--amber),var(--credit));
  position:absolute;animation:bootslide 1.1s ease-in-out infinite;}
@keyframes bootslide{0%{left:-40%;}100%{left:100%;}}
.bootMsg{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.4px;}
.bootMsg b{color:var(--up);}

/* ============================ RETURNS / RISK ============================ */
.retGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);}
.retCell{background:var(--panel);padding:5px 7px;display:flex;flex-direction:column;}
.retCell span{font-family:var(--cond);font-size:8.5px;color:var(--dimmer);letter-spacing:.5px;text-transform:uppercase;}
.retCell b{font-family:var(--mono);font-size:12px;font-weight:600;}
.w52{padding:7px;border-top:1px solid var(--bd);}
.w52Track{height:6px;background:#141925;border-radius:3px;position:relative;margin:5px 0 3px;}
.w52Fill{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,var(--amberDim),var(--amber));border-radius:3px;}
.w52Dot{position:absolute;top:-2px;width:2px;height:10px;background:#fff;}
.w52Lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);}

/* ============================ PEERS ============================ */
.peerList{display:flex;flex-direction:column;}
.peerRow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;padding:3px 7px;
  border-bottom:1px solid #131722;cursor:pointer;font-size:10px;}
.peerRow:hover{background:#141925;}
.peerRow.self{background:rgba(251,146,60,.08);box-shadow:inset 2px 0 0 var(--amber);}
.peerName{display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.peerName b{font-family:var(--cond);font-weight:600;color:var(--txt);}
.peerName .pc{font-family:var(--mono);font-size:8.5px;color:var(--dimmer);}
.peerBar{display:grid;grid-template-columns:64px 50px;align-items:center;gap:6px;}
.peerBarTrack{height:7px;background:#141925;border-radius:2px;overflow:hidden;}
.peerBarFill{height:100%;background:linear-gradient(90deg,var(--industry),#c4b5fd);}
.peerRev{font-family:var(--mono);font-size:9px;text-align:right;color:var(--dim);}

/* ============================ STORY ============================ */
.storyCard{padding:5px 8px;}
.storyTag{display:inline-block;font-family:var(--cond);font-weight:700;font-size:8px;letter-spacing:1px;
  color:var(--credit);border:1px solid rgba(234,70,71,.4);border-radius:2px;padding:1px 5px;margin-bottom:5px;}
.storyTitle{font-size:11px;line-height:1.35;color:var(--txt);font-weight:600;text-wrap:pretty;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.storyMeta{font-family:var(--mono);font-size:9px;color:var(--dimmer);margin-top:3px;}
.storyLink{color:var(--amber);text-decoration:none;}
.storyEmpty{padding:10px 8px;font-size:10px;color:var(--dimmer);font-family:var(--mono);line-height:1.5;}

/* ============================ TAILWIND MATRIX ============================ */
.twTable{width:100%;border-collapse:collapse;font-size:10px;}
.twTable th{font-family:var(--cond);font-size:8px;color:var(--dimmer);letter-spacing:.5px;padding:3px 4px;text-transform:uppercase;}
.twTable td{padding:3px 6px;}
.twName{font-family:var(--cond);font-weight:600;color:var(--txt);white-space:nowrap;}
.twCell{font-family:var(--mono);text-align:center;border:1px solid #0d1119;}

/* ============================ MOVERS ============================ */
.moversWrap{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd);}
.moverCol{background:var(--panel);padding:5px 7px;}
.moverHd{font-family:var(--cond);font-size:8px;letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;}
.moverRow{display:flex;justify-content:space-between;gap:6px;font-size:9.5px;padding:1.5px 0;cursor:pointer;}
.moverRow:hover{opacity:.8;}
.moverRow .mn{font-family:var(--cond);color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.moverRow .mv{font-family:var(--mono);flex-shrink:0;}

/* ============================ MACRO QUADRANT ============================ */
.quadWrap{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:7px;}
.quadBox{border:1px solid var(--bd);border-radius:3px;padding:6px 8px;}
.quadMkt{font-family:var(--cond);font-weight:700;font-size:9px;letter-spacing:.6px;color:var(--dim);}
.quadPhase{font-family:var(--cond);font-weight:700;font-size:13px;margin:2px 0;}
.quadDesc{font-size:9px;color:var(--dim);line-height:1.35;text-wrap:pretty;}
.quadAssets{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.assetChip{font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:2px;border:1px solid var(--bd);}
.assetChip.ow{color:var(--up);border-color:rgba(52,211,153,.3);}
.assetChip.uw{color:var(--dn);border-color:rgba(240,97,111,.3);}
.assetChip.nu{color:var(--dim);}
.dataBadge{font-family:var(--mono);font-size:8px;color:var(--dimmer);}

/* ============================ LOGO ============================ */
.brandLogo{width:24px;height:24px;border-radius:6px;display:block;}

/* ============================ GRADE CHIPS (scan signature) ============================ */
.gradeStrip{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd);}
.gradeChip{background:var(--panel);padding:4px 5px;display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center;position:relative;}
.gradeChip::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gc,#94a3b8);opacity:.7;}
.gcLabel{font-family:var(--cond);font-size:8.5px;color:var(--dimmer);letter-spacing:.3px;}
.gcVal{font-family:var(--cond);font-weight:700;font-size:14px;line-height:1;}
.gcVal.tUp{color:var(--up);} .gcVal.tGood{color:var(--good);} .gcVal.tNeu{color:var(--txt);}
.gcVal.tWarn{color:var(--warn);} .gcVal.tDn{color:var(--dn);}
.ecoMeta{display:flex;gap:14px;padding:4px 8px;border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.ecoMeta .em{display:flex;flex-direction:column;}
.ecoMeta .em span{font-family:var(--cond);font-size:8px;color:var(--dimmer);letter-spacing:.5px;text-transform:uppercase;}
.ecoMeta .em b{font-family:var(--mono);font-size:12px;color:var(--txt);}

/* ============================ RADAR ============================ */
.radarWrap{display:flex;align-items:center;gap:6px;padding:3px;}
.radarWrap canvas{display:block;}
.radarLegend{display:flex;flex-direction:column;gap:3px;flex:1;}
.radarLegend .rl{display:flex;justify-content:space-between;font-size:9.5px;}
.radarLegend .rl span{font-family:var(--cond);color:var(--dim);}
.radarLegend .rl b{font-family:var(--mono);}

/* ============================ CHANGES (Δ) ============================ */
.chgList{display:flex;flex-direction:column;}
.chgRow{display:grid;grid-template-columns:84px 1fr 56px;align-items:center;gap:8px;padding:3px 8px;border-bottom:1px solid #131722;}
.chgName{font-family:var(--cond);font-weight:600;font-size:10px;color:var(--txt);}
.chgBarWrap{height:8px;background:#141925;border-radius:2px;position:relative;overflow:hidden;}
.chgBarMid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--bdHi);}
.chgBar{position:absolute;top:0;bottom:0;}
.chgBar.pos{background:var(--up);left:50%;} .chgBar.neg{background:var(--dn);right:50%;}
.chgVal{font-family:var(--mono);font-size:10px;text-align:right;}

/* ============================ GOVERNANCE / PATTERN ============================ */
.govGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bd);}
.govCell{background:var(--panel);padding:4px 7px;display:flex;flex-direction:column;gap:1px;}
.govCell span{font-family:var(--cond);font-size:8px;color:var(--dimmer);letter-spacing:.5px;text-transform:uppercase;}
.govCell b{font-family:var(--mono);font-size:12px;color:var(--txt);}
.patBig{padding:5px;text-align:center;}
.patBig .pv{font-family:var(--cond);font-weight:700;font-size:16px;color:var(--industry);}
.patBig .ps{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px;}

/* ============================ SCREENER (grade chips in watchlist) ============================ */
.scrRow{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:7px;padding:3px 7px;border-bottom:1px solid #131722;cursor:pointer;}
.scrRow:hover{background:#141925;} .scrRow.on{background:rgba(251,146,60,.08);box-shadow:inset 2px 0 0 var(--amber);}
.scrName{display:flex;flex-direction:column;min-width:0;}
.scrName b{font-family:var(--cond);font-weight:600;font-size:10px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.scrName .si{font-family:var(--mono);font-size:8px;color:var(--dimmer);}
.scrGrades{display:flex;gap:2px;}
.gPill{font-family:var(--cond);font-weight:700;font-size:8.5px;padding:1px 4px;border-radius:2px;line-height:1.4;}
.gPill.tUp{background:rgba(52,211,153,.14);color:var(--up);}
.gPill.tGood{background:rgba(96,165,250,.14);color:var(--good);}
.gPill.tNeu{background:rgba(148,163,184,.12);color:var(--dim);}
.gPill.tWarn{background:rgba(251,191,36,.14);color:var(--warn);}
.gPill.tDn{background:rgba(240,97,111,.14);color:var(--dn);}
.scrRet{font-family:var(--mono);font-size:9.5px;text-align:right;width:42px;}

/* ============================ PROVENANCE TAG ============================ */
.provTag{font-family:var(--mono);font-size:7.5px;font-weight:600;letter-spacing:.4px;padding:1px 4px;border-radius:2px;line-height:1.5;flex-shrink:0;cursor:help;}
.provTag.pLive{color:var(--up);background:rgba(52,211,153,.12);}
.provTag.pDeriv{color:var(--amber);background:rgba(251,146,60,.12);}
.provTag.pWire{color:var(--dn);background:rgba(240,97,111,.12);border:1px dashed rgba(240,97,111,.4);}

/* ============================ VERDICT (hero) ============================ */
.verdictWrap{display:grid;grid-template-columns:88px 1fr;gap:0;}
.verdictScore{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px;border-right:1px solid var(--bd);}
.vsNum{font-family:var(--mono);font-weight:700;font-size:26px;line-height:1;}
.vsBand{font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:.5px;}
.vsLabel{font-family:var(--cond);font-size:8px;color:var(--dimmer);letter-spacing:.6px;text-transform:uppercase;}
.verdictBody{padding:6px 8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.vRow{display:flex;flex-direction:column;gap:3px;font-size:10px;line-height:1.3;}
.vRow .vk{font-family:var(--cond);font-weight:700;font-size:8.5px;letter-spacing:.4px;padding:1px 5px;border-radius:2px;align-self:flex-start;}
.vRow.s .vk{color:var(--up);background:rgba(52,211,153,.12);}
.vRow.c .vk{color:var(--dn);background:rgba(240,97,111,.12);}
.vList{display:flex;flex-direction:column;gap:2px;color:var(--txt);}
.vRiskline{display:flex;gap:10px;padding:5px 9px;border-top:1px solid var(--bd);font-size:9.5px;}
.vRiskline span{font-family:var(--cond);color:var(--dim);}
.vRiskline b{font-family:var(--mono);}

/* ============================ PERCENTILE ============================ */
.pctList{display:flex;flex-direction:column;}
.pctRow{display:grid;grid-template-columns:62px 1fr 70px;align-items:center;gap:8px;padding:2px 8px;border-bottom:1px solid #131722;}
.pctName{font-family:var(--cond);font-weight:600;font-size:10px;color:var(--txt);}
.pctTrack{height:9px;background:#141925;border-radius:2px;position:relative;overflow:hidden;}
.pctFill{position:absolute;left:0;top:0;bottom:0;border-radius:2px;}
.pctMark{position:absolute;top:-1px;width:1px;height:11px;background:rgba(255,255,255,.25);}
.pctVal{font-family:var(--mono);font-size:9px;text-align:right;white-space:nowrap;}
.pctVal b{font-weight:700;}
.pctNote{font-family:var(--mono);font-size:7.5px;color:var(--dimmer);padding:2px 8px;border-top:1px solid var(--bd);}

/* ============================ VALUATION ============================ */
.valTop{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd);}
.valCell{background:var(--panel);padding:6px 8px;}
.valCell .vl{font-family:var(--cond);font-size:8px;color:var(--dimmer);letter-spacing:.5px;text-transform:uppercase;}
.valCell .vv{font-family:var(--mono);font-size:13px;font-weight:600;}
.valCell .vsub{font-family:var(--mono);font-size:8.5px;color:var(--dim);}
.fairBand{padding:5px 9px 6px;}
.fairTrack{height:8px;border-radius:3px;background:linear-gradient(90deg,#22543d,#1e3a8a);position:relative;margin:12px 0 5px;}
.fairRange{position:absolute;top:0;bottom:0;background:rgba(251,146,60,.35);border-left:1px solid var(--amber);border-right:1px solid var(--amber);}
.fairNow{position:absolute;top:-5px;width:2px;height:18px;background:#fff;}
.fairNowLbl{position:absolute;top:-15px;transform:translateX(-50%);font-family:var(--mono);font-size:8px;color:#fff;white-space:nowrap;}
.fairLbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);}
.valVerdict{padding:4px 7px;border-top:1px solid var(--bd);font-size:9.5px;text-wrap:pretty;line-height:1.35;}

/* ============================ RISK FLAGS ============================ */
.riskWrap{padding:5px 6px;display:flex;flex-wrap:wrap;gap:4px;}
.riskRow{display:flex;align-items:center;gap:6px;padding:3px 8px;border-radius:3px;border:1px solid var(--bd);}
.riskRow.red{background:rgba(240,97,111,.07);border-color:rgba(240,97,111,.3);}
.riskRow.yellow{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.25);}
.riskRow.green{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.25);flex:1;}
.riskDot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.riskDot.red{background:var(--dn);box-shadow:0 0 6px var(--dn);}
.riskDot.yellow{background:var(--warn);}
.riskDot.green{background:var(--up);}
.riskName{font-family:var(--cond);font-weight:600;font-size:10px;color:var(--txt);}
.riskDetail{font-family:var(--mono);font-size:8.5px;color:var(--dim);}

@media(max-width:1320px){
  .board{grid-template-columns:230px minmax(0,1fr) 400px;}
  .symStats{grid-template-columns:repeat(3,auto);}
}
</style>
