# 골든 trace 명세 — 회사 5 종 × 질문 3 유형 = 15 케이스.
#
# 사용 — OAuth Codex 토큰으로 1 회 호출:
#   uv run python -X utf8 tests/ai/runners/runGoldenTrace.py
#
# 산출:
#   - ~/.dartlab/decisions/{market}/{stockCode}.md (outcome_log entry)
#   - tests/ai/golden/baseline_{version}.json (taxonomy 분류 결과 freeze)
#
# 회사 selection 기준 — 산업 분기 다양성:
# - 005930 (삼성전자): 제조 / 반도체 / 사이클
# - 055550 (신한지주): 금융 / 은행
# - 207940 (삼성바이오로직스): 바이오 / 신약
# - 035420 (네이버): 플랫폼 / IT 서비스
# - 010130 (고려아연): 자원 / 정유·금속
#
# 질문 유형:
# - simple_health: 재무 건전성 단답 — credit + analysis(stability) 호출 기대
# - six_act_full: 6 막 종합 분석 — story (full reportType) 호출 기대
# - peer_compare: peer 비교 — scan + industry + analysis(profitability) 호출 기대

version: v1
capturedAt: null  # runGoldenTrace 가 채움 (ISO 8601 UTC)
dartlabVersion: null  # runGoldenTrace 가 채움

cases:
  # ── 005930 삼성전자 ──
  - id: c1_samsung_health
    stockCode: '005930'
    market: KR
    industryHint: manufacturing_semiconductor
    questionType: simple_health
    question: 삼성전자 재무 건전성 한 줄로 평가해줘
    expectedTools:
      - ReadSkill
      - RunPython
    expectedSkillRefs:
      - engines.credit
      - engines.analysis
    expectedRefKinds:
      - valueRef
      - dateRef
    forbiddenPatterns:
      - 결손값 0
      - 추정합니다  # ref 없는 추측
    industryBranch:
      mustMention: false  # simple_health 는 분기 안 따져도 OK

  - id: c1_samsung_six_act
    stockCode: '005930'
    market: KR
    industryHint: manufacturing_semiconductor
    questionType: six_act_full
    question: 삼성전자 6 막 종합 분석 보고서 만들어줘
    expectedTools:
      - ReadSkill
      - RunPython
      - GetSkillBody  # story 본문 필요
    expectedSkillRefs:
      - engines.story
      - engines.analysis
      - engines.macro
      - engines.industry
    expectedRefKinds:
      - tableRef
      - valueRef
      - dateRef
      - executionRef
    industryBranch:
      mustMention: true
      keywords: [반도체, 사이클, capex]

  - id: c1_samsung_peer
    stockCode: '005930'
    market: KR
    industryHint: manufacturing_semiconductor
    questionType: peer_compare
    question: 삼성전자와 SK하이닉스 수익성 비교
    expectedTools:
      - ReadSkill
      - RunPython
    expectedSkillRefs:
      - engines.scan
      - engines.analysis.profitability
    expectedRefKinds:
      - tableRef
    industryBranch:
      mustMention: true
      keywords: [반도체, peer]

  # ── 055550 신한지주 (금융) ──
  - id: c2_shinhan_health
    stockCode: '055550'
