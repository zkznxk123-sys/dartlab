  - id: c1_samsung_health
    stockCode: '005930'
    market: KR
    industryHint: manufacturing_semiconductor
    questionType: simple_health
    question: 삼성전자 재무 건전성 한 줄로 평가해줘
    expectedTools:
      - ReadSkill
      - RunPython
    expectedSkillRefs:
      - engines.credit
      - engines.analysis
    expectedRefKinds:
      - valueRef
      - dateRef
    forbiddenPatterns:
      - 결손값 0
      - 추정합니다  # ref 없는 추측
    industryBranch:
      mustMention: false  # simple_health 는 분기 안 따져도 OK

  - id: c1_samsung_six_act
    stockCode: '005930'
    market: KR
    industryHint: manufacturing_semiconductor
    questionType: six_act_full
    question: 삼성전자 6 막 종합 분석 보고서 만들어줘
    expectedTools:
      - ReadSkill
      - RunPython
      - GetSkillBody  # story 본문 필요
    expectedSkillRefs:
      - engines.story
      - engines.analysis
      - engines.macro
      - engines.industry
    expectedRefKinds:
      - tableRef
      - valueRef
      - dateRef
      - executionRef
    industryBranch:
      mustMention: true
      keywords: [반도체, 사이클, capex]

