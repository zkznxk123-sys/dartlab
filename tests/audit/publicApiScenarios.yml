waivers:
  dartlab.ask.call:
    owner: release
    expires: "2026-12-31"
    reason: "provider API key와 외부 LLM 네트워크가 필요하므로 접근 smoke만 필수로 둔다."
  dartlab.collect.call:
    owner: release
    expires: "2026-12-31"
    reason: "DART API key가 필요한 수집 side effect. dry-run 계약 추가 전까지 접근 smoke와 릴리스 문서로 관리."
  dartlab.collectAll.call:
    owner: release
    expires: "2026-12-31"
    reason: "대량 수집 side effect. 운영자 전용 경로라 productSmoke 실행 대상에서 제외."
  dartlab.setup.call:
    owner: release
    expires: "2026-12-31"
    reason: "interactive credential setup. 접근 smoke만 필수."
