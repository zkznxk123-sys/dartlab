<!doctype html>
<html lang="ko" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0f0f10" />
		<meta name="color-scheme" content="dark" />
		<meta name="robots" content="noindex, nofollow" />
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
		/>
		<!-- 공동배선(parity) — public(landing) app.html 과 동일 폰트. 터미널 숫자·라벨이 --dl-font-mono(JetBrains Mono)
		     ·--dl-font-ui(Inter) 를 쓰는데, 이 링크가 없으면 로컬은 시스템 mono 로 폴백해 GitHub Pages 와 글자 모양·
		     tabular 정렬·격자 높이가 미세하게 어긋난다. Newsreader 는 design typography.css 가 @import 하므로 공유. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png" />
		%sveltekit.head%
	</head>
	<body
		style="margin: 0; background: var(--dl-bg-base, #0f0f10); color: var(--dl-ink, #e7e7ea); font-family: 'Pretendard Variable', 'Inter', ui-sans-serif, system-ui, sans-serif;"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
